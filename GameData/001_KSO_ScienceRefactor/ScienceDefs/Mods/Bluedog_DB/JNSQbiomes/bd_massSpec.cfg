@EXPERIMENT_DEFINITION:HAS[#id[bd_massSpec]]
{
	%RESULTS
	{
        KerbinSrfLandedAridHighlands* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedBadlands_00 // Some small levels of actual radioactive isotopes show up in minute quantities here. Could be worth more checking?
        
        MunSrfLandedPolarIceCraters* = #ScienceRefactor_bd_massSpec_MunSrfLandedPolarCrater_00 // High levels of irridium left over from the impact are detectable in all samples from this crater.
        MunSrfLandedVoronoiCraters* = #ScienceRefactor_bd_massSpec_MunSrfLandedHighlandCraters_00 // Isotope readings combined with the spectroscopy show this region to be slightly younger than most others.
        MunSrfLandedExoticCraters* = #ScienceRefactor_bd_massSpec_MunSrfLandedEastFarsideCrater_00 // Trace readings of water are detected in some of the darker regions of the large crater.
        
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_massSpec_MinmusSrfLandedGreaterFlats_00 // Readings from here show that several different major salts make up the bulk of the salinization lines present in the spectroscopic readings.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_massSpec_MinmusSrfLandedLesserFlats_00 // Strangely the salinity is not as strong here allowing more precise chemistry makeups to be identified from this location.
	}
}