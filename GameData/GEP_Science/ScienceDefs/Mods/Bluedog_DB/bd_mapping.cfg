@EXPERIMENT_DEFINITION:HAS[#id[bd_mapping]]
{
    %RESULTS
    {
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_mapping_GrannusInSpaceLowNorthPolarZone_00 // The polar zone resolves into a restless, dark-red quilt of convection cells. The exposure settings argue with the star.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_mapping_GrannusInSpaceLowNorthSubpolarZone_00 // Subpolar structures smear and reform between scan lines, as if Grannus is deliberately refusing to hold still for the map.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_mapping_GrannusInSpaceLowNorthTemperateZone_00 // Temperate latitudes show long, faint bands of activity. The telemetry arrives late, but the turbulence never does.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_mapping_GrannusInSpaceLowNorthTropicZone_00 // The tropic zone brightens in uneven patches, punctuated by brief flares that force the camera to blink.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_mapping_GrannusInSpaceLowEquatorialZone_00 // The equator looks like a slow, boiling river of light. You label it “terrain” because the software insists on a word.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_mapping_GrannusInSpaceLowSouthTropicZone_00 // Southern tropics show a mottled glare and sudden hot spots. You file a note: “Do not zoom in with your face.”
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_mapping_GrannusInSpaceLowSouthTemperateZone_00 // The south temperate belt carries subtler texture, like worn fabric. It still feels heavy, even from orbit.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_mapping_GrannusInSpaceLowSouthSubpolarZone_00 // Subpolar dimming makes the features look deeper than they are. The map team debates shadows on something that has no ground.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_mapping_GrannusInSpaceLowSouthPolarZone_00 // The south pole flickers with filamentary arcs near the limb. The downlink stutters, as if intimidated.

        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_mapping_TaranisInSpaceLowMagmaSea_00 // The magma sea shines dull-orange under the red sun, with convection patterns like scars. You can almost hear the heat through the data.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_mapping_TaranisInSpaceLowMagmaShores_00 // Shorelines form jagged, glassy margins where glow fades into black rock. The terminator crawls, but your orbit screams past it.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_mapping_TaranisInSpaceLowScorchedLowlands_00 // Scorched lowlands appear blistered and cracked, with long-flow features frozen mid-run. The map legend runs out of polite adjectives.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_mapping_TaranisInSpaceLowMidlands_00 // The midlands show ridges and basins arranged like warped plates. Every frame looks like it was taken in a hurry—because it was.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_mapping_TaranisInSpaceLowHighlands_00 // Highlands throw razor shadows that stretch forever in the weak light. You mark them “avoid” and hope someone reads it before landing.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_mapping_TaranisInSpaceLowDarkSideMidlands_00 // On the dark side, the camera drinks in darkness and finds faint relief anyway. It feels like mapping a place that hasn’t been “morning” in ages.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_mapping_TaranisInSpaceLowDarkSideHighlands_00 // Dark-side highlands are hard-edged silhouettes with cold, fractured slopes. The numbers come back slower than your doubts.
        TaranisInSpaceLowPoles* = #GEPscience_bd_mapping_TaranisInSpaceLowPoles_00 // The poles look like stressed, brittle terrain with strange brightness near the horizon. The boundary lines wobble with every attitude correction.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_mapping_ToutatisInSpaceLowSunnyLowlands_00 // Sunny lowlands show wind-sculpted plains and heat-bleached tones beneath the dim red glare. The surface looks tired.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_mapping_ToutatisInSpaceLowSunnyHighlands_00 // Sunny highlands rise in sharp folds with long, hot shadows. The mapping software keeps trying to “enhance” the glare into nonsense.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_mapping_ToutatisInSpaceLowTransitionalLowlands_00 // Transitional lowlands form a narrow band of calmer contrast near the terminator. You pin it as “maybe livable-ish,” then remember the comm delay.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_mapping_ToutatisInSpaceLowTransitionalHighlands_00 // Transitional highlands look rugged but less tortured, like the planet is negotiating with itself. The map tiles arrive one argument at a time.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_mapping_ToutatisInSpaceLowDarkSideLowlands_00 // Dark-side lowlands are muted and smooth, with faint streaks hinting at cold flow. The night here feels older than the mission plan.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_mapping_ToutatisInSpaceLowDarkSideHighlands_00 // Dark-side highlands stand like black teeth against a thin atmospheric haze. You wonder how something so silent can look so sharp.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_mapping_ToutatisInSpaceLowSoutheasternMountains_00 // The southeastern mountains form clustered spines and deep cuts, casting layered shadows near the edge of daylight. Navigation will be “exciting.”
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_mapping_ToutatisInSpaceLowWesternMountains_00 // Western ranges stretch in long, uneven chains, as if shoved sideways by ancient stress. The scan line drifts, and so does your confidence.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_mapping_ToutatisInSpaceLowDarkSideMountains_00 // Dark-side mountains barely reveal themselves until you crank the gain and accept the noise. It’s like the planet is hiding its best features on purpose.

        NodensInSpaceLowSaltySeas* = #GEPscience_bd_mapping_NodensInSpaceLowSaltySeas_00 // The seas gleam a darker, mineral-heavy blue under Grannus’ dim red light, with storm bands scribbled across them like pencil marks.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_mapping_NodensInSpaceLowSaltySeas_01 // The map tiles come in slowly, each packet delayed just long enough to make you wonder if the ocean moved while you weren’t looking.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_mapping_NodensInSpaceLowFreshWater_00 // Inland waters show up as calmer, softer-toned patches with branching channels feeding them like veins.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_mapping_NodensInSpaceLowFreshWater_01 // The imaging team argues about “freshness” from orbit; you label it “less suspiciously shiny” and send it anyway.
        NodensInSpaceLowShores* = #GEPscience_bd_mapping_NodensInSpaceLowShores_00 // Bright ribbons trace the coasts, where shallow water fades into land in gradients too neat to be accidental.
        NodensInSpaceLowShores* = #GEPscience_bd_mapping_NodensInSpaceLowShores_01 // The shoreline mosaic looks inviting until you remember how far away “inviting” is, and how long it takes to ask permission to zoom.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_NodensInSpaceLowTropicalLowlands_00 // Broad, low-lying regions sit under persistent haze, with winding dark channels cutting through like spilled ink.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_NodensInSpaceLowTropicalLowlands_01 // Cloud shadows crawl over the scan while the downlink crawls back to you; it’s a race nobody wins quickly.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_NodensInSpaceLowTemperateLowlands_00 // The lowlands resolve into sweeping plains and subtle patchwork textures, broken by long, straight weather fronts.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_NodensInSpaceLowTemperateLowlands_01 // The terrain looks “almost familiar” for half a second, then the color balance reminds you this sun is not the one you trained under.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_NodensInSpaceLowTropicalMidlands_00 // Mid-elevation terrain rises in gentle folds, with mottled patterns that could be deposits, erosion… or something everyone will argue about.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_NodensInSpaceLowTropicalMidlands_01 // You tag several features as “follow-up required” and immediately regret how far the follow-up is.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_NodensInSpaceLowTemperateMidlands_00 // Ridges and basins alternate in tidy bands, suggesting layered geology laid out like pages in a book.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_NodensInSpaceLowTemperateMidlands_01 // The scan line jitters as you adjust attitude; Mission Control’s reply arrives later, as if they’re steering from another century.
        NodensInSpaceLowHighlands* = #GEPscience_bd_mapping_NodensInSpaceLowHighlands_00 // The highlands throw sharp, long shadows even at local noon, their relief exaggerated by the weak, reddish illumination.
        NodensInSpaceLowHighlands* = #GEPscience_bd_mapping_NodensInSpaceLowHighlands_01 // You generate a preliminary relief map and wonder how many landers it will take before the word “preliminary” stops being funny.
        NodensInSpaceLowTundra* = #GEPscience_bd_mapping_NodensInSpaceLowTundra_00 // Pale, open stretches surround darker islands of terrain, with frostlike streaks tracing the cold flow of wind and time.
        NodensInSpaceLowTundra* = #GEPscience_bd_mapping_NodensInSpaceLowTundra_01 // The sensor insists it’s getting a clean read; the static-filled comms insist you are not.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_mapping_NodensInSpaceLowIceCaps_00 // The ice caps blaze bright enough to push the camera’s exposure into complaint mode, their edges scalloped and uneven.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_mapping_NodensInSpaceLowIceCaps_01 // You dial the gain down, mark the boundary contours, and note that even the “bright” parts of Nodens feel dim this far from home.

        BelisamaInSpaceLowFlats* = #GEPscience_bd_mapping_BelisamaInSpaceLowFlats_00 // The flats stitch into a smooth, dim mosaic, with Nodens hanging in the corner of every other frame like it’s supervising the survey.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_BelisamaInSpaceLowTropicalLowlands_00 // The so-called “tropical” lowlands look cold and sharp-edged in Grannus’ red light, traced by subtle flow patterns that don’t want to explain themselves.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_BelisamaInSpaceLowTemperateLowlands_00 // Broad lowland basins resolve into muted, layered textures; the map tiles arrive late enough to feel like they’ve cooled on the way down.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_BelisamaInSpaceLowTropicalMidlands_00 // The midlands show folded ridges and shallow scarps, as if the surface was gently crumpled and then left alone for ages.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_BelisamaInSpaceLowTemperateMidlands_00 // Long, faint lineations run across the midlands like old stress marks; you tag them for follow-up and immediately remember the comm delay.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_mapping_BelisamaInSpaceLowHighlands_00 // Highlands cast long, uneasy shadows under the weak red sun, making every slope look steeper than it probably is.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_mapping_BelisamaInSpaceLowPoles_00 // Polar terrain appears brittle and over-contrasted, with darkness pooling in low spots where “day” doesn’t seem to do much work.

        SucellusInSpaceLowBasins* = #GEPscience_bd_mapping_SucellusInSpaceLowBasins_00 // Basin floors come back as dark, quiet patches with bright speckling—either exposed metal, fresh rubble, or the camera just being nervous.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_mapping_SucellusInSpaceLowLowlands_00 // The lowlands map into a dull patchwork of plains and shallow troughs; it looks resource-rich in theory, and very far away in practice.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_SucellusInSpaceLowTropicalMidlands_00 // The “tropical” midlands show rippled, banded terrain that hints at buried layers; the scanline noise makes it feel like the planet is arguing back.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_SucellusInSpaceLowTemperateMidlands_00 // Midlands resolve into broad ridges and gentle breaks, with isolated bright streaks that get everyone’s attention for all the wrong reasons.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_mapping_SucellusInSpaceLowHighlands_00 // Highland blocks stand out like broken plates, their edges sharply defined in the thin light and the harsh radiation environment.
        SucellusInSpaceLowPoles* = #GEPscience_bd_mapping_SucellusInSpaceLowPoles_00 // The poles are a study in extremes: stark contrast, stubborn shadows, and a map legend that keeps running out of safe-sounding words.

        CaireenInSpaceLowLowlands* = #GEPscience_bd_mapping_CaireenInSpaceLowLowlands_00 // Low “lowlands” on Caireen are mostly just the flatter lumps; the mosaic makes it look like a captured rock that never stopped tumbling inside.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_mapping_CaireenInSpaceLowMidlands_00 // The midlands are ridged and irregular, with tiny crater chains that seem too neat until you remember the camera loves patterns.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_mapping_CaireenInSpaceLowHighlands_00 // Highlands form sharp knobs and spines that throw exaggerated shadows; you note “landing hazard” and let future-you worry about it.
        CaireenInSpaceLowPoles* = #GEPscience_bd_mapping_CaireenInSpaceLowPoles_00 // At the poles the surface fades into a noisy, high-contrast smear—partly geometry, partly darkness, and partly the feeling of mapping something that barely counts as a world.

        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_mapping_SironaInSpaceLowDarkTropicalBands_00 // Dark tropical bands map as broad, ink-black streams beneath the faint ring-glow; the mosaic arrives late, but the stripes don’t move an inch.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_mapping_SironaInSpaceLowLightTropicalBands_00 // Light tropical bands reflect the red sun like brushed metal, forcing the camera to squint while the downlink dribbles in.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_mapping_SironaInSpaceLowDarkTemperateBands_00 // Temperate dark bands show knotted vortices and wavering edges, like the atmosphere is doodling while you try to draw straight lines.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_mapping_SironaInSpaceLowLightTemperateBands_00 // Light temperate bands resolve into smoother lanes with subtle ripples; you tag them “calm” knowing that’s a very relative word out here.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_mapping_SironaInSpaceLowDarkPolarBands_00 // The dark polar bands curl around the cap like a tightening belt; the map team argues about depth with minutes of delay between each sentence.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_mapping_SironaInSpaceLowLightPolarBands_00 // Light polar bands form pale arcs near the limb, half-hidden by low sun angles and the uncomfortable sense of being watched by a giant.

        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_AirmedInSpaceLowTropicalLowlands_00 // Tropical lowlands stitch into channel-cut plains; it still feels cold when every command has to cross interplanetary silence.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_AirmedInSpaceLowTemperateLowlands_00 // Temperate lowlands appear as broad, muted basins with faint ridges, the kind of terrain that would be “easy” if it weren’t so far away.
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_AirmedInSpaceLowTropicalMidlands_00 // Tropical midlands show rolling folds and mottled patches that could be deposits or shadow tricks; you schedule a re-pass and then wait.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_AirmedInSpaceLowTemperateMidlands_00 // Temperate midlands resolve into long, parallel lineations, like someone combed the surface and left the marks to cool under red daylight.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_mapping_AirmedInSpaceLowHighlands_00 // Highlands rise as sharp blocks with long shadows that exaggerate every slope; the hazard map grows faster than the bandwidth.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_mapping_AirmedInSpaceLowDarkenedLowlands_00 // Darkened lowlands swallow contrast and reveal only faint streaks; you boost the gain and accept that half the “detail” is noise and nerves.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_mapping_AirmedInSpaceLowDarkenedMidlands_00 // Darkened midlands come back grainy but coherent, with ridges cutting through like ribs; the data feels older by the time it reaches you.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_mapping_AirmedInSpaceLowDarkenedHighlands_00 // Darkened highlands stand as jagged silhouettes near the terminator; you mark landing zones in pencil, because ink feels too permanent.
        AirmedInSpaceLowPoles* = #GEPscience_bd_mapping_AirmedInSpaceLowPoles_00 // Polar terrain shows brittle textures and strange brightness at low angles; the map looks unfinished until the next packet finally arrives.

        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_mapping_BorvoInSpaceLowTropicalCraquelure_00 // Tropical craquelure patterns spider across the surface like cracked varnish, each plate edge catching the dim red light.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_mapping_BorvoInSpaceLowTemperateCraquelure_00 // Temperate craquelure resolves into larger, calmer polygons, as if the ground cooled slowly and is still thinking about breaking.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_BorvoInSpaceLowTropicalLowlands_00 // Tropical lowlands map into darker pools between fractured fields; every clean tile feels like a small victory over distance.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_BorvoInSpaceLowTemperateLowlands_00 // Temperate lowlands show smoother lanes amid the cracks, with subtle flow lines that hint at past movement without promising it stopped.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_BorvoInSpaceLowTropicalMidlands_00 // Tropical midlands rise in rough steps, their textures alternating between dusty and glassy; the sensor can’t decide what it’s seeing either.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_BorvoInSpaceLowTemperateMidlands_00 // Temperate midlands appear as banded ridges and shallow troughs; the relief pops when the sun angle is right and vanishes when it isn’t.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_mapping_BorvoInSpaceLowHighlands_00 // Highlands stand out as bright, fractured knobs with shadows that run long; you can almost hear the navigation computer sigh.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_mapping_BorvoInSpaceLowMajorCraters_00 // Major craters map with sharp rims and bright ejecta rays, like someone threw stones into wet paint and then froze time.
        BorvoInSpaceLowPoles* = #GEPscience_bd_mapping_BorvoInSpaceLowPoles_00 // The poles are a high-contrast blur of low-angle glare and stubborn darkness; you annotate margins and let the next orbit fill the gaps.

        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_DamonaInSpaceLowTropicalLowlands_00 // Tropical lowlands show broad plains interrupted by sinuous scars; the pattern looks familiar until the red sun paints it wrong.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_DamonaInSpaceLowTemperateLowlands_00 // Temperate lowlands map as gentle basins with isolated ridges, a quiet landscape that makes the comm static feel louder.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_DamonaInSpaceLowTropicalMidlands_00 // Tropical midlands resolve into folded terrain with speckled patches; you flag anomalies and watch the timer tick toward the next reply window.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_DamonaInSpaceLowTemperateMidlands_00 // Temperate midlands form long, worn ridgelines, as if erosion had plenty of time and nobody to impress.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_mapping_DamonaInSpaceLowHighlands_00 // Highlands appear as broken plateaus with knife-edge shadows; you add a note: “Do not trust the lighting. Ever.”
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_mapping_DamonaInSpaceLowImpactBasin_00 // The impact basin maps as a vast, subtle depression with concentric textures, like a fingerprint pressed into cooling ground.
        DamonaInSpaceLowPoles* = #GEPscience_bd_mapping_DamonaInSpaceLowPoles_00 // Polar regions show frosted-looking tones and abrupt contrast near the limb; the map completes itself one delayed tile at a time.

        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_EponaInSpaceLowTropicalLowlands_00 // The lowlands map as broad, dim plains with faint, branching scars—like something tried to flow here and then froze mid-thought under Grannus’ red dusk.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_EponaInSpaceLowTemperateLowlands_00 // Subtle ridges and shallow basins stitch together slowly, each tile arriving with just enough delay to make the landscape feel older than the mission.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_mapping_EponaInSpaceLowTropicalUplands_00 // The uplands show rougher texture and sharper shadows, as if the crust is wrinkled and brittle where the light is weakest.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_mapping_EponaInSpaceLowTemperateUplands_00 // Patchy brightness suggests mixed ice and dust; the camera can’t decide if it’s seeing geology or glare, so it records both.
        EponaInSpaceLowHighlands* = #GEPscience_bd_mapping_EponaInSpaceLowHighlands_00 // Highland blocks stand out like broken plates, their long shadows exaggerated by the dim red sun and your nervous contrast settings.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_mapping_EponaInSpaceLowGrandPeaks_00 // Grand peaks punch through the haze of distance as knife-edged silhouettes; you tag them “spectacular” and “do not land” in the same breath.
        EponaInSpaceLowCraters* = #GEPscience_bd_mapping_EponaInSpaceLowCraters_00 // Craters appear crisp and strangely clean, with ejecta patterns that look freshly combed despite the deep cold.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_mapping_EponaInSpaceLowVolcanoes_00 // The “volcano” regions map as dark mounds with radiating textures—possibly ancient vents, possibly the camera insisting on drama.
        EponaInSpaceLowPoles* = #GEPscience_bd_mapping_EponaInSpaceLowPoles_00 // The poles brighten into a hard, pale glare; the mosaic completes one reluctant strip at a time, as if the planet prefers to stay uncharted.

        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_RosmertaInSpaceLowTropicalLowlands_00 // Rosmerta’s lowlands resolve into smooth, quiet expanses—lonely terrain made lonelier by the long pause between each downlinked line.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_RosmertaInSpaceLowTemperateLowlands_00 // A gentle patchwork of tones suggests thin deposits and worn surfaces; nothing “moves,” yet the map still feels impatient.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_RosmertaInSpaceLowTropicalMidlands_00 // Midlands rise in modest folds with scattered bright flecks; every anomaly gets a name because it’s all we have for company out here.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_RosmertaInSpaceLowTemperateMidlands_00 // Shallow ridges and troughs form a subdued banding, like the moon is whispering its history instead of saying it plainly.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_mapping_RosmertaInSpaceLowHighlands_00 // Highlands cast sharp, thin shadows across rough ground; the lighting makes everything look sharper, colder, and farther away than it already is.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_mapping_RosmertaInSpaceLowPoles_00 // The poles fade into high-contrast edges and stubborn darkness; the scan feels like writing a letter to someone who won’t answer.

        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_mapping_RAB-58EInSpaceLowLowlands_00 // The lowlands map into irregular, dark patches with sudden bright specks—either boulders, frost, or your sensor trying to guess what this captured thing is.
        RAB-58EInSpaceLowEasternHighlands* = #GEPscience_bd_mapping_RAB-58EInSpaceLowEasternHighlands_00 // Eastern highlands show jagged relief and torn-looking scarps; you label features quickly, before the next comm window slips away.
        RAB-58EInSpaceLowWesternHighlands* = #GEPscience_bd_mapping_RAB-58EInSpaceLowWesternHighlands_00 // Western highlands stitch into a rough, asymmetric spine, as if the body was assembled from leftovers and never got a final polish.

        CernunnosInSpaceLowTropicalLowlands* = #GEPscience_bd_mapping_CernunnosInSpaceLowTropicalLowlands_00 // Lowlands appear as broad, dim fields with faint flow-like streaks; if there’s warmth beneath the ice, it’s keeping secrets very politely.
        CernunnosInSpaceLowTemperateLowlands* = #GEPscience_bd_mapping_CernunnosInSpaceLowTemperateLowlands_00 // The terrain resolves into shallow basins and gentle ridges, the kind of “easy” map that still feels unsettling under a weak red sun.
        CernunnosInSpaceLowTropicalMidlands* = #GEPscience_bd_mapping_CernunnosInSpaceLowTropicalMidlands_00 // Midlands show worn, banded textures—layers on layers—like the dwarf planet has been collecting winters for a very long time.
        CernunnosInSpaceLowTemperateMidlands* = #GEPscience_bd_mapping_CernunnosInSpaceLowTemperateMidlands_00 // Subtle lineations run across the midlands; the team debates their origin with minutes of silence between every opinion.
        CernunnosInSpaceLowHighlands* = #GEPscience_bd_mapping_CernunnosInSpaceLowHighlands_00 // Highlands rise as bright, fractured knobs with shadows that stretch too far; you start marking hazards and don’t really stop.
        CernunnosInSpaceLowSouthPolarHills* = #GEPscience_bd_mapping_CernunnosInSpaceLowSouthPolarHills_00 // The south polar hills map as clustered hummocks and shallow cuts, a lumpy border where daylight barely seems to count.
        CernunnosInSpaceLowNorthPole* = #GEPscience_bd_mapping_CernunnosInSpaceLowNorthPole_00 // The north pole becomes a stark bullseye of pale ice and deep shadow; for a moment, it feels like you’re mapping the edge of the system itself.
    }
}