@EXPERIMENT_DEFINITION:HAS[#id[bd_massSpec]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_bd_massSpec_SunFlyingLow_00 // The spectrometer is immediately flooded with hydrogen and helium. It logs the rest as “also: extreme regret.”
		SunFlyingHigh* = #JNSQscience_bd_massSpec_SunFlyingHigh_00 // The intake sniffs a thinner, hotter mix and the peaks sharpen into a very clear message: you are sampling the Sun, and the Sun is sampling you back.

		MohoSrfLandedPoles* = #JNSQscience_bd_massSpec_MohoSrfLandedPoles_00 // In the cooler shadows, a faint whisper of trapped volatiles shows up between the rock peaks. The instrument rereads the sample just to be sure it wasn’t dreaming.
		MohoSrfLandedLowlands* = #JNSQscience_bd_massSpec_MohoSrfLandedLowlands_00 // The chamber fills with baked dust and metal-rich grains. Everything about the spectrum says “sun-cooked.”
		MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_massSpec_MohoSrfLandedPolarIceCraters_00 // The sample is mostly sterile regolith, but the cold trap signatures tease a few stubborn compounds clinging to the dark. Mission Control suddenly becomes very interested.
		MohoSrfLandedHighlands* = #JNSQscience_bd_massSpec_MohoSrfLandedHighlands_00 // Coarser, cleaner silicate signatures dominate here. The spectrometer appreciates the simplicity, even if your boots do not.
		MohoSrfLandedMidlands* = #JNSQscience_bd_massSpec_MohoSrfLandedMidlands_00 // A steady, boring mix of minerals rolls in—until a few sputtered atoms spike the plot like static. The Sun is doing surface chemistry for you.
		MohoSrfLandedCraters* = #JNSQscience_bd_massSpec_MohoSrfLandedCraters_00 // Fresh pulverized rock and impact glass dust coat the inlet. The isotope ratios look like they’ve been through an argument at high speed.
		MohoSrfLandedExoticCraters* = #JNSQscience_bd_massSpec_MohoSrfLandedExoticCraters_00 // The spectrum is crowded with odd trace peaks and messy ratios. The instrument labels the sample “technically valid, emotionally upsetting.”
		MohoSrfLandedRareCraters* = #JNSQscience_bd_massSpec_MohoSrfLandedRareCraters_00 // A few unusual peaks appear, then vanish on the second pass. Either the crater is special, or the sample jar just blinked.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_massSpec_MohoSrfLandedVoronoiCraters_00 // The composition repeats with uncanny consistency from scoop to scoop. It’s like the surface was stamped out of identical tiles.
		MohoSrfLandedNotableCraters* = #JNSQscience_bd_massSpec_MohoSrfLandedNotableCraters_00 // The plot is broader and richer than expected for “just rock.” The spectrometer adds a little marker that looks suspiciously like a gold star.
		MohoSrfLandedPeaks* = #JNSQscience_bd_massSpec_MohoSrfLandedPeaks_00 // Sharp grains and exposed minerals dominate, with a dusting of sun-sputtered atoms. The instrument notes that “vacuum” is not a contaminant, but it sure feels like one.

		KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_massSpec_KerbinSrfLandedBaikerbanur_00 // The spectrum is mostly dry dust, with sharp little peaks of stamp ink and “visitor processing.” The instrument requests a passport.
		KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_massSpec_KerbinSrfLandedBaikerbanurLaunchpad_00 // Exhaust residue, oxidizer whispers, and a big “please sample upwind” signature. The safety officer adds a new rule: no sniffing the pad.
		KerbinSrfLandedCrawlerway* = #JNSQscience_bd_massSpec_KerbinSrfLandedCrawlerway_00 // Crushed rock dust dominates, with rubber and soot in the fine print. A supervisor asks if your sensor has a reflective vest.
		KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_massSpec_KerbinSrfLandedIslandAirfield_00 // Salty aerosol and damp grit show up immediately, followed by a faint jet-fuel aftertaste. Your sample tray begins a slow, meaningful corrosion.
		KerbinSrfLandedKSC* = #JNSQscience_bd_massSpec_KerbinSrfLandedKSC_00 // A wonderful blend of concrete dust, snack salt, toner, and determination. Public Relations asks if you can re-label it as “Inspirational Atmosphere.”
		KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DCentralBuilding_00 // Everything looks suspiciously clean—until a tiny peak appears at “classified solvent.” A scientist smiles and stands between you and the print button.
		KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DCornerLab_00 // The mass peaks spell out “unknown polymer” and “do not ask.” The lab door clicks shut like it has opinions.
		KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DMainBuilding_00 // Paint fumes, coolant, and coffee form a stable three-phase mixture. An engineer requests you stop calling it “a mixture.”
		KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DObservatory_00 // Crisp air, dew, and a hint of lens cleaner drift through the spectrum. The operator asks you to keep your ionization “quiet.”
		KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DSideLab_00 // Strong acetone, solder flux, and the unmistakable aroma of “just a quick test.” Your report is returned with a calibration sticker and no eye contact.
		KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DSmallLab_00 // The peaks are unnervingly perfect and repeatable, like the air was standardized. Someone offers you a nondisclosure form and a very clean rag.
		KerbinSrfLandedR&DTanks* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DTanks_00 // Trace propellant vapors, rust, and a stern note of “step back.” Safety provides a checklist, a respirator, and a suggestion to stop being curious.
		KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_massSpec_KerbinSrfLandedR&DWindTunnel_00 // With the fans off, the spectrum is calm; with the fans on, it becomes “all particles everywhere at once.” The wind tunnel wins the argument by being louder.
		KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_massSpec_KerbinSrfLandedSPHMainBuilding_00 // Kerosene hints, hydraulic fluid, and aluminum dust: the classic hangar bouquet. An annoyed engineer asks if you can filter out “reality.”
		KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_massSpec_KerbinSrfLandedSPHRoundTank_00 // The instrument detects insulation fibers and immediately regrets having an intake. A technician insists you are analyzing “non-scientific fluff.”
		KerbinSrfLandedSPHTanks* = #JNSQscience_bd_massSpec_KerbinSrfLandedSPHTanks_00 // Solvents, paint chips, and a tiny peak that everyone agrees is “definitely not oxidizer.” The peak is promoted to “noise” by official decree.
		KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_massSpec_KerbinSrfLandedSPHWaterTower_00 // Water vapor, algae, and rust ions arrive in cheerful clumps. The tower contributes an authentic “maintenance cologne.”
		KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishEast_00 // Ozone from electronics and grease from moving parts show up on cue. The dish slews and the tech blames “space doing that.”
		KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishNorth_00 // The spectrum is clean until the motors spin, then you get a strong signature of “approved machinery.” You are reminded to keep your detector out of the beam’s feelings.
		KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishSouth_00 // Neat peaks of gravel dust and cable jacket plastic, arranged with uncomfortable discipline. The staff approves your data and disapproves your presence.
		KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationHub_00 // Floor polish volatiles, warm electronics breath, and ancient snack salt form a proud indoor atmosphere. Your sample is confiscated as “mission-critical debris.”
		KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_massSpec_KerbinSrfLandedVABMainBuilding_00 // Concrete dust and metal fines rain into the intake like industrial snowfall. The crane moves and your spectrum develops “dynamic urgency.”
		KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_massSpec_KerbinSrfLandedVABPodMemorial_00 // A quiet baseline: clean air, faint stone dust, and respectful silence. Even the instrument seems to lower its voice.
		KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_massSpec_KerbinSrfLandedVABRoundTank_00 // High-grade paint, solvent, and a strong peak at “stop looking.” Security appears in the spectrum before they appear in your peripheral vision.
		KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_massSpec_KerbinSrfLandedVABSouthComplex_00 // Hot metal ions, flux residue, and a spicy hint of welding smoke dominate the scan. Safety asks you to stop sampling anything that is still warm.
		KerbinSrfLandedVABTanks* = #JNSQscience_bd_massSpec_KerbinSrfLandedVABTanks_00 // Dust, rubber, and trace propellant aroma combine into “normal operations.” The official recommendation is to record the data and forget the smell.
		KerbinSrfLandedWoomerang* = #JNSQscience_bd_massSpec_KerbinSrfLandedWoomerang_00 // The spectrum shifts mid-scan as the wind relocates your entire experiment. Results indicate mostly air, occasionally clipboard, always gust.

        KerbinFlyingLow* = #JNSQscience_bd_massSpec_KerbinFlyingLow_00 // The intake fills with humid air, pollen, and something that can only be described as “snack crumbs in suspension.”
		KerbinFlyingHigh* = #JNSQscience_bd_massSpec_KerbinFlyingHigh_00 // The mass spectrometer confirms the atmosphere is getting thinner. It also confirms your cabin air is getting staler.
		KerbinSrfLandedHighlands* = #JNSQscience_bd_massSpec_KerbinSrfLandedHighlands_00 // The spectrum shows clean air with a sharp bite of dust and rock grit. The instrument labels it “refreshing,” which is not a measurement unit.
		KerbinSrfLandedShores* = #JNSQscience_bd_massSpec_KerbinSrfLandedShores_00 // Salt spray and damp air coat the inlet. The readout is mostly seawater… plus a surprising amount of sunscreen.
		KerbinSrfLandedMidlands* = #JNSQscience_bd_massSpec_KerbinSrfLandedMidlands_00 // A comfortable mix of air and soil aerosols drifts into the chamber. Trace compounds strongly correlate with “somebody is having a picnic nearby.”
		KerbinSrfLandedLowlands* = #JNSQscience_bd_massSpec_KerbinSrfLandedLowlands_00 // The sample is warmer, wetter, and full of tiny organic traces. The instrument politely requests you stop breathing directly into it.
		KerbinSrfLandedAridLowlands* = #JNSQscience_bd_massSpec_KerbinSrfLandedAridLowlands_00 // Dry air and fine dust dominate the spectrum. The spectrometer briefly considers renaming itself a “sand counter.”
		KerbinSrfLandedAridMidlands* = #JNSQscience_bd_massSpec_KerbinSrfLandedAridMidlands_00 // The sample is all windblown grit and stubborn dryness. Mission Control asks if the inlet is clogged; you reply that the whole biome is clogged.
		KerbinSrfLandedAridHighlands* = #JNSQscience_bd_massSpec_KerbinSrfLandedAridHighlands_00 // Sharp mineral dust and sun-baked aerosols show up clearly. The instrument detects “badlands” in spirit, if not in spelling.
		KerbinSrfLandedAridMountains* = #JNSQscience_bd_massSpec_KerbinSrfLandedAridMountains_00 // Thin air carries powdered rock like a badge of honor. The spectrometer records a clean spectrum with a gritty aftertaste.
		KerbinSrfLandedGreatLake* = #JNSQscience_bd_massSpec_KerbinSrfLandedGreatLake_00 // The inlet drinks in mist and freshwater droplets. The data comes back mostly “wet,” with a footnote about “definitely splashed.”
		KerbinSrfLandedInlandWater* = #JNSQscience_bd_massSpec_KerbinSrfLandedInlandWater_00 // The spectrum is water-rich and pleasantly boring. Your report is less boring because the equipment is now damp.
		KerbinSrfLandedKreenwichSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedKreenwichSea_00 // Briny spray and humid air flood the sample chamber. The instrument identifies “ocean,” then adds: “also boat smell, somehow.”
		KerbinSrfLandedArcticSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedArcticSea_00 // Cold air carries ice crystals into the inlet like tiny knives. The spectrometer reports a clean sample and a personal grudge.
		KerbinSrfLandedForemansSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedForemansSea_00 // Sea spray, damp air, and a faint hint of fuel residue swirl together. The readout suggests someone has been testing something nearby.
		KerbinSrfLandedTriangulusSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedTriangulusSea_00 // The sample is salty, wet, and extremely consistent. The plot looks so perfect you suspect it’s showing off.
		KerbinSrfLandedNorthernSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedNorthernSea_00 // The spectrum is heavy on moisture and salt with a chill edge. The instrument’s heater turns on and immediately regrets it.
		KerbinSrfLandedSub-ArcticSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedSub-ArcticSea_00 // Cold brine aerosols and drifting ice dust dominate the intake. The spectrometer declares the particles “crunchy,” then refuses further commentary.
		KerbinSrfLandedEasternSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedEasternSea_00 // The inlet catches a steady stream of sea mist. The signature is textbook “ocean,” with a bonus spike labeled “waves hit the housing.”
		KerbinSrfLandedWesternSea* = #JNSQscience_bd_massSpec_KerbinSrfLandedWesternSea_00 // Salty air and spray fill the chamber in rhythmic bursts. The mass peaks line up with each splash like the sea is doing calibration taps.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_massSpec_KerbinSrfLandedWelcomeBackIsland_00 // The spectrum shows clean sea air mixed with odd trace exhausts. It’s as if the island itself is politely reminding you where rockets usually end up.

		MunSrfLandedHighlands* = #JNSQscience_bd_massSpec_MunSrfLandedHighlands_00 // The intake pulls in sharp, dry dust with a stubborn lack of volatiles. The spectrometer confirms: yes, it’s still the Mun.
		MunSrfLandedMidlands* = #JNSQscience_bd_massSpec_MunSrfLandedMidlands_00 // Fine regolith particles drift into the chamber and coat everything immediately. The data is excellent right up until the instrument becomes “part of the surface.”
		MunSrfLandedLowlands* = #JNSQscience_bd_massSpec_MunSrfLandedLowlands_00 // The sample contains denser, darker dust and impact fines. The spectrum looks like the Mun has been grinding itself into powder for fun.
		MunSrfLandedPolarIceCraters* = #JNSQscience_bd_massSpec_MunSrfLandedPolarIceCraters_00 // The spectrometer catches faint volatile signatures hiding in the cold dust. Mission Control gets excited and you pretend you don’t hear them.
		MunSrfLandedExoticCraters* = #JNSQscience_bd_massSpec_MunSrfLandedExoticCraters_00 // The sample includes weird glassy grains and mixed ejecta. The instrument insists the crater is “chemically dramatic.”
		MunSrfLandedRareCraters* = #JNSQscience_bd_massSpec_MunSrfLandedRareCraters_00 // Fresh-looking dust shows cleaner, sharper peaks. It’s like the Mun just opened a new bag of surface.
		MunSrfLandedVoronoiCraters* = #JNSQscience_bd_massSpec_MunSrfLandedVoronoiCraters_00 // The composition repeats with uncanny regularity from scoop to scoop. The spectrometer checks its settings twice and then stops asking questions.
		MunSrfLandedNotableCraters* = #JNSQscience_bd_massSpec_MunSrfLandedNotableCraters_00 // The grains here show a broader spread of materials than expected. The crater earns its name by being annoyingly interesting.
		MunSrfLandedMountains* = #JNSQscience_bd_massSpec_MunSrfLandedMountains_00 // Coarser particles and exposed rock fragments dominate the sample. The instrument is pleased to see something that isn’t 90% dust for once.

		MinmusSrfLandedPoles* = #JNSQscience_bd_massSpec_MinmusSrfLandedPoles_00 // The sample is cold and faintly volatile-rich compared to the surrounding terrain. The spectrometer notes that “frost is not a flavor.”
		MinmusSrfLandedLowlands* = #JNSQscience_bd_massSpec_MinmusSrfLandedLowlands_00 // Powdery surface grains show bright, clean peaks with odd salts mixed in. You try not to lick anything to verify.
		MinmusSrfLandedMidlands* = #JNSQscience_bd_massSpec_MinmusSrfLandedMidlands_00 // A tidy blend of dust and sparkling grains enters the chamber. The instrument reports “stable,” which is more than you can say for your landing legs.
		MinmusSrfLandedHighlands* = #JNSQscience_bd_massSpec_MinmusSrfLandedHighlands_00 // The sample contains more rocky fragments and fewer fine powders. The spectrum looks like Minmus decided to be serious up here.
		MinmusSrfLandedBasins* = #JNSQscience_bd_massSpec_MinmusSrfLandedBasins_00 // The intake fills with ultra-fine, unusually uniform material. The spectrometer finds lots of salts and volatiles, and absolutely no dessert topping.
		MinmusSrfLandedBrownBasins* = #JNSQscience_bd_massSpec_MinmusSrfLandedBrownBasins_00 // The same smooth basin material, but dusted with darker contaminants. The spectrometer calls it “seasoned,” which again is not a measurement unit.
		MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_massSpec_MinmusSrfLandedBrownLowlands_00 // Darker grains skew the spectrum toward heavier minerals. The data suggests the “brown” is not just a lighting problem.
		MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_massSpec_MinmusSrfLandedBrownMidlands_00 // The chamber collects mixed bright and dark particles in neat layers. The instrument produces a graph that looks like a messy sandwich.
		MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_massSpec_MinmusSrfLandedBrownHighlands_00 // Coarser dark grit dominates the sample here. The spectrometer flags “abrasive” and you immediately stop shaking the container.
		MinmusSrfLandedMountains* = #JNSQscience_bd_massSpec_MinmusSrfLandedMountains_00 // The sample is mostly sharp dust and rock chips from steep slopes. The spectrometer approves, then asks if you can please stop sliding downhill.

        EveFlyingLow* = #JNSQscience_bd_massSpec_EveFlyingLow_00 // The intake gulps thick, hot air full of stubbornly purple aerosols. The spectrum is mostly carbon dioxide and “haze, somehow.”
		EveFlyingHigh* = #JNSQscience_bd_massSpec_EveFlyingHigh_00 // The upper air thins out and the peaks sharpen. It’s still mostly carbon dioxide and nitrogen, just with fewer things trying to gum up the inlet.
		EveSrfLandedPoles* = #JNSQscience_bd_massSpec_EveSrfLandedPoles_00 // Colder air carries fewer heavy aerosols, but the chamber still fills fast. The instrument notes a cleaner mix and a lot of very unfriendly frost dust.
		EveSrfLandedLowlands* = #JNSQscience_bd_massSpec_EveSrfLandedLowlands_00 // The sample is dense, hot, and eager to be anywhere but the chamber. The readout is dominated by carbon dioxide with a side of “pressure problem.”
		EveSrfLandedMidlands* = #JNSQscience_bd_massSpec_EveSrfLandedMidlands_00 // A steadier mix comes through, with faint mineral traces riding along on fine dust. The spectrometer labels it “breathable only by rocks.”
		EveSrfLandedHighlands* = #JNSQscience_bd_massSpec_EveSrfLandedHighlands_00 // The peaks look cleaner here, as if the air is taking a break from being dramatic. Then the inlet clogs anyway, because this is still Eve.
		EveSrfLandedPeaks* = #JNSQscience_bd_massSpec_EveSrfLandedPeaks_00 // For a moment the spectrum is almost tidy: less aerosol, more crisp gas lines. The instrument saves the run under “Rare Victory.”
		EveSrfLandedMountains* = #JNSQscience_bd_massSpec_EveSrfLandedMountains_00 // Rock dust dominates the sample, with heavy-gas lines punching through underneath. The chamber contents are now officially “gritty and oppressive.”
		EveSrfLandedShores* = #JNSQscience_bd_massSpec_EveSrfLandedShores_00 // The spectrum spikes with wet, acidic mist and salty aerosols kicked up from nearby surf. The instrument requests a rinse cycle you do not have.
		EveSrfLandedKrakensWell* = #JNSQscience_bd_massSpec_EveSrfLandedKrakensWell_00 // The sample contains the usual thick gases… plus odd trace peaks that repeat too consistently. Mission Control suggests you “log it and leave.”

		GillySrfLandedLowlands* = #JNSQscience_bd_massSpec_GillySrfLandedLowlands_00 // Fine dust drifts in like it’s trying to escape Gilly’s gravity. The spectrum is mostly minerals, with a faint whiff of Eve’s neighborhood stuck to the grains.
		GillySrfLandedMidlands* = #JNSQscience_bd_massSpec_GillySrfLandedMidlands_00 // A bland mix of pulverized rock fills the chamber. The instrument helpfully confirms you have, in fact, sampled “lumpy asteroid.”
		GillySrfLandedHighlands* = #JNSQscience_bd_massSpec_GillySrfLandedHighlands_00 // Coarser grit and sun-baked fragments dominate the intake. The readout is clean, dry, and impressively uncooperative.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_massSpec_DunaSrfLandedIceCaps_00 // The chamber fills with fine frost grains and dusty ice. Water shows up clearly, with carbon dioxide clinging on like it refuses to sublimate.
		DunaSrfLandedHighlands* = #JNSQscience_bd_massSpec_DunaSrfLandedHighlands_00 // Coarser rock grit dominates the spectrum here. The “rusty dust” signature drops off, replaced by cleaner silicate peaks.
		DunaSrfLandedMidlands* = #JNSQscience_bd_massSpec_DunaSrfLandedMidlands_00 // A familiar cocktail of carbon dioxide, nitrogen, and airborne red fines floods the inlet. The iron-rich dust insists on being counted as “atmosphere.”
		DunaSrfLandedLowlands* = #JNSQscience_bd_massSpec_DunaSrfLandedLowlands_00 // The sample is thicker with suspended dust and heavier grains. The peaks suggest wind-sorted fines with a few salty surprises mixed in.
		DunaSrfLandedCraters* = #JNSQscience_bd_massSpec_DunaSrfLandedCraters_00 // Impact-mixed grains produce a messy, broadened spectrum. The instrument flags glassy fragments and pulverized everything.
		DunaSrfLandedRareCraters* = #JNSQscience_bd_massSpec_DunaSrfLandedRareCraters_00 // Fresher-looking dust yields sharper peaks and fewer weathered oddities. The crater seems proud of its “new material smell.”
		DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_massSpec_DunaSrfLandedVoronoiCraters_00 // The composition repeats with uncanny consistency from scoop to scoop. It’s like the surface was stamped out of identical recipes.
		DunaSrfLandedNotableCraters* = #JNSQscience_bd_massSpec_DunaSrfLandedNotableCraters_00 // The ratios look slightly “off” in a way that keeps repeating. Mission Control says “interesting,” which usually means “take more samples.”
		DunaSrfLandedExoticCraters* = #JNSQscience_bd_massSpec_DunaSrfLandedExoticCraters_00 // Strange trace peaks pop up between the usual dust lines. The spectrometer labels the sample “valid,” then quietly starts a second run.
		DunaSrfLandedTrenches* = #JNSQscience_bd_massSpec_DunaSrfLandedTrenches_00 // Shadowed dust and exposed layers add faint volatile hints to the usual mineral signature. Something down here is better at hiding from the Sun.
		DunaSrfLandedNotablePlains* = #JNSQscience_bd_massSpec_DunaSrfLandedNotablePlains_00 // Extremely uniform fines give a clean, boring spectrum—until a gust dumps a whole new layer into the inlet at once.
		DunaSrfLandedNotableMountains* = #JNSQscience_bd_massSpec_DunaSrfLandedNotableMountains_00 // Exposed bedrock fragments push the spectrum toward heavier minerals. The dust is still present, but it has to share the spotlight.
		DunaSrfLandedMountains* = #JNSQscience_bd_massSpec_DunaSrfLandedMountains_00 // Thin air and sharp grit combine into a very crunchy sample. The instrument reports “rocks,” with a sub-note: “many, many rocks.”
		DunaSrfLandedVolcano* = #JNSQscience_bd_massSpec_DunaSrfLandedVolcano_00 // Mineral peaks spike alongside faint sulfur-bearing traces and extra carbon dioxide. The plot strongly suggests the ground is still trying to breathe.
		DunaFlyingLow* = #JNSQscience_bd_massSpec_DunaFlyingLow_00 // Thick carbon dioxide and nitrogen roll in with enough suspended dust to qualify as a second sample. The red aerosols register like they’re trying to clog the math.
		DunaFlyingHigh* = #JNSQscience_bd_massSpec_DunaFlyingHigh_00 // The gas lines sharpen as the dust thins out. The spectrometer detects a cleaner upper mix and a strong “please don’t descend again” trend.

		IkeSrfLandedPoles* = #JNSQscience_bd_massSpec_IkeSrfLandedPoles_00 // Cold-trapped grains add faint volatile signatures to an otherwise dry, rocky spectrum. The instrument seems surprised to find anything even slightly willing to evaporate.
		IkeSrfLandedMountains* = #JNSQscience_bd_massSpec_IkeSrfLandedMountains_00 // Jagged rock chips dominate the intake. The spectrum is heavy on silicates and metals, like Ike is daring you to call it “just a moon.”
		IkeSrfLandedMidlands* = #JNSQscience_bd_massSpec_IkeSrfLandedMidlands_00 // Fine regolith dust produces a stable, repetitive readout. The chamber coating is also stable, repetitive, and now permanent.
		IkeSrfLandedLowlands* = #JNSQscience_bd_massSpec_IkeSrfLandedLowlands_00 // Softer, finer grains show more mixed minerals and impact fines. The sample behaves like powder that’s been ground for a very long time.
		IkeSrfLandedHighlands* = #JNSQscience_bd_massSpec_IkeSrfLandedHighlands_00 // Brighter, cleaner fragments shift the peaks slightly lighter and sharper. The surface here feels less “melted together” than the lowlands.

		EdnaInSpaceLow* = #JNSQscience_bd_massSpec_EdnaInSpaceLow_00 // The spectrometer mostly reads your own vented gases—until a stray dark grain pings the detector. The few particles it catches look carbon-rich and stubbornly cold.
		EdnaSrfLandedLowlands* = #JNSQscience_bd_massSpec_EdnaSrfLandedLowlands_00 // Dark, dusty grains dominate with strong carbon signatures. The instrument politely avoids calling it “space soot,” but it’s thinking it.
		EdnaSrfLandedMidlands* = #JNSQscience_bd_massSpec_EdnaSrfLandedMidlands_00 // Mixed rock and dark fines produce a broad, uneven spectrum. The sample looks like someone blended “asteroid” on a low setting.
		EdnaSrfLandedHighlands* = #JNSQscience_bd_massSpec_EdnaSrfLandedHighlands_00 // Coarser fragments and cleaner minerals sharpen the peaks. For a moment, Edna seems almost organized.
		EdnaSrfLandedPolarIceCraters* = #JNSQscience_bd_massSpec_EdnaSrfLandedPolarIceCraters_00 // Cold-trapped volatiles finally show themselves in the data. The instrument logs a faint cocktail of ices hiding beneath a dust blanket.
		EdnaSrfLandedWhites* = #JNSQscience_bd_massSpec_EdnaSrfLandedWhites_00 // Bright grains spike strong ice-like signatures with lighter mineral traces. The spectrometer labels it “reflective,” then asks why the dark planet has a white patch.

		DakInSpaceLow* = #JNSQscience_bd_massSpec_DakInSpaceLow_00 // The detector catches intermittent puffs of dust and a suspicious amount of “nothing.” Each time it does get a hit, the grains look chemically messy—like Dak can’t pick a single story.
		DakSrfLandedLowlands* = #JNSQscience_bd_massSpec_DakSrfLandedLowlands_00 // Crumbly regolith yields a carbon-heavy spectrum with scattered mineral spikes. The sample looks like it was assembled from leftovers.
