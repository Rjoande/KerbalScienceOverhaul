        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_00 // You wonder if you could fry an egg here.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_01 // You decide that Mission Control decided to send you here because they wanted to see how good fried kerbonaut is.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_02 // You are almost more amazed that you got here than at the fact that you haven't melted yet.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_03 // You close your eyes. The sun is still clearly visible!
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_04 // All your snacks are getting crispy and brown around the edges. Luckily, you prefer them well done.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_05 // As the craft gets closer to Kerbol, you start to feel the effects of the heat on the craft. You break out the extra water, and make a note.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_06 // You ask Mission Control why they put you so close to Kerbol. They respond: "Science isn't about WHY. It's about WHY NOT." You can only wonder what that's supposed to mean.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_07 // You put on your spacesuit and activate the air conditioning.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_08 // Your personal freezer isn't working particularly well anymore and all your ice cream has melted.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_09 // You are pretty sure being this close to the sun isn't safe.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_10 // You look out the window trying to see something. Log: "Breath makes window foggy. Momentarily dissipates. Causes dizziness if repeated in rapid succession."
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_11 // "Is it just me, or is it getting really hot in here?"
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_12 // Theories predict that, at this distance, neutrino radiation is so high that you might even detect a collision.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_13 // You feel nervous as the sun's radiation blasts the windows. It's like a hand reaching out towards your spacecraft.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_14 // Your very expensive sunglasses seem to have no use here.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_15 // You decide that Kerbolar wind won't be a good candidate for exhaustive atmospheric analysis.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_16 // Why me?
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_17 // You look through the window. And then you realize that the only thing you can see is a giant ball of plasma.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_18 // Looking through your cockpit window, you now understand the expression "Light at the end of the tunnel".
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_19 // How did I... get here?
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_20 // "'Go to space,' they said. 'It'll be fun,' they said..."
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_21 // "Ohhh, the Sun. I'm gonna meet the Sun. Oh no! What'll I say? 'Hi! Hi, Sun!' Oh, boy!"
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_22 // You question the safety of this mission.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_23 // Mission Control questions your choice of orbit, but at least you will get a nice tan.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_24 // You record the lack of sunglasses on the spacecraft.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_25 // Good thing we brought sunglasses.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_26 // You might want to put on some sunglasses.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_27 // Since you're really close to the Sun, you decide to put on your sunglasses.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_28 // You're starting to think getting this close to the Sun was a very bad idea.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_29 // You are going to have some really weird tan lines when you get back.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_30 // It's so shiny, you wanna touch it!
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_31 // The radiation causes a tingly sensation.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_32 // You wonder how long mission control wishes to fry you for.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_33 // A large curlicue of plasma comes off the sun. You wonder what it is.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_34 // You see a few large sunspots. They look like really big dents.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_35 // You realize that the sun is very hot, maybe you should come back at night.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_36 // You tell Mission Control that no, your stupid plan to "go to the sun at night" did not work.
        SunInSpaceLow* = #CSS_crewReport_SunInSpaceLow_37 // All the sunglasses we brought don't work. We should demand a refund, if we survive.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_00 // You stare up at space. And to the left at space. And to the right. You slowly realize that pretty much everywhere you look at is space.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_01 // The crew seems to have forgotten their sunscreen.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_02 // The future's so bright, I gotta wear shades. Also the sun.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_03 // You check your snack stores again, hoping they will last through the mission.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_04 // You are feeling extremely lost and lonely.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_05 // You realize the sun won't be setting anytime soon and wish you had installed some window shades.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_06 // You are bored, as nothing of interest is happening.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_07 // You press your face against the window and gaze at the wonders of space... only to be cut off by Mission Control reminding you to write a report.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_08 // You close your eyes. That seems to be the only way to make the sun disappear.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_09 // You gaze into open space, and you just can't believe how vastly, hugely, mind-bogglingly big it is.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_10 // You realize that you forgot to pack some snacks. You wonder if it is too late to turn back.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_11 // You decide that now would be a good time to take another nap.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_12 // Are we there yet? Huh? HUH? ARE WE THERE YET?!?
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_13 // You see a bright, shiny object in the sky... and wonder to yourself... did I leave the stove on?
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_14 // You don't much feel like going outside.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_15 // "I wish I'd packed that sun tan lotion."
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_16 // You perceive a small flash of white light at the edge of your vision.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_17 // Are we there yet?
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_18 // It's actually really boring out here.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_19 // Did something move past the capsule's window, or was that just a radiation-induced hallucination?
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_20 // Wow, what a beautiful galaxy! Wait... that's a smudge on the window. A beautiful smudge.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_21 // The crew contemplates the rocket's infinite cosmic potential... and its cramped living space.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_22 // Interplanetary space, with nothing to look at but the stars, makes you feel lonely.
        SunInSpaceHigh* = #CSS_crewReport_SunInSpaceHigh_23 // You can't believe leaving your hot dog outside didn't heat it up.

        MohoSrfLanded* = #CSS_crewReport_MohoSrfLanded_00 // Brownish red or reddish brown? It's good to think about the big questions.
        MohoSrfLandedNorthPole* = #CSS_crewReport_MohoSrfLandedNorthPole_00 // Grey rocks and grey dirt. What a *great* location!
        MohoSrfLandedNorthernSinkholeRidge* = #CSS_crewReport_MohoSrfLandedNorthernSinkholeRidge_00 // You gaze in amazement at the sinkhole and wonder how it formed. You decide it was probably just an oversight.
        MohoSrfLandedNorthernSinkhole* = #CSS_crewReport_MohoSrfLandedNorthernSinkhole_00 // You ponder the mystery of where Moho's atmosphere went. You're glad it doesn't have one anymore, because that would make coming back really hard.
        MohoSrfLandedMidlands* = #CSS_crewReport_MohoSrfLandedMidlands_00 // Sure is hot in here.
        MohoSrfLandedWesternLowlands* = #CSS_crewReport_MohoSrfLandedWesternLowlands_00 // You decide that it's hard to be an explorer.
        MohoSrfLandedCentralLowlands* = #CSS_crewReport_MohoSrfLandedCentralLowlands_00 // The crew considers which snacks would taste best if cooked.
        MohoSrfLandedHighlands* = #CSS_crewReport_MohoSrfLandedHighlands_00 // You haven't been this hot since that day in training when your suit caught fire. You worry about it happening again.
        MohoSrfLandedMinorCraters* = #CSS_crewReport_MohoSrfLandedMinorCraters_00 // Jeb wants to know if a rover would powerslide here. Badly.
        MohoSrfLandedSouthWesternLowlands* = #CSS_crewReport_MohoSrfLandedSouthWesternLowlands_00 // You wonder how much ore could be mined here. You tell mission control that the mining rights are yours.
        MohoSrfLandedSouthEasternLowlands* = #CSS_crewReport_MohoSrfLandedSouthEasternLowlands_00 // Sure is lonely here on Moho.
        MohoSrfLandedCanyon* = #CSS_crewReport_MohoSrfLandedCanyon_00 // It appears the heat shielding is melting. The Kerbals are sweating and hot.
        MohoSrfLandedSouthPole* = #CSS_crewReport_MohoSrfLandedSouthPole_00 // This pole is much less interesting.
        MohoSrfLandedSouthPole* = #CSS_crewReport_MohoSrfLandedSouthPole_01 // You look for a big hole in the ground. Is this the wrong pole?
        MohoInSpaceLow* = #CSS_crewReport_MohoInSpaceLow_00 // You watch the fuel gauge anxiously.
        MohoInSpaceLow* = #CSS_crewReport_MohoInSpaceLow_01 // After some arguments with mission control you come to the conclusion that Moho is a giant cookie.
        MohoInSpaceHigh* = #CSS_crewReport_MohoInSpaceHigh_00 // You discover that it is possible to fry an egg on the console by the viewport. You note it down as a possible economic reason to go into space.
        MohoInSpaceHigh* = #CSS_crewReport_MohoInSpaceHigh_01 // You hear the structure of the spacecraft creaking and groaning due to thermal expansion. You hope the person who designed it knew what they were doing.
        MohoInSpaceHigh* = #CSS_crewReport_MohoInSpaceHigh_02 // Moho is beautiful. You take a picture, then realize you're out of batteries.

        EveSrfLandedPoles* = #CSS_crewReport_EveSrfLandedPoles_00 // Maybe smuggling some snacks into the command module wasn't a bad idea, after all.
        EveSrfLandedPoles* = #CSS_crewReport_EveSrfLandedPoles_01 // The Poles seem every bit as inhospitable as the rest of this pressure-cooker of a planet.
        EveSrfLandedMidlands* = #CSS_crewReport_EveSrfLandedMidlands_00 // You have a feeling that landing here may have been a bad idea.
        EveSrfLandedMidlands* = #CSS_crewReport_EveSrfLandedMidlands_01 // "I want to go home".
        EveSrfLandedExplodiumSea* = #CSS_crewReport_EveSrfLandedExplodiumSea_00 // You still cherish the hope that you packed enough fuel.
        EveSrfLandedLowlands* = #CSS_crewReport_EveSrfLandedLowlands_00 // The ship computer starts playing the tune to the song Purple Rain all on its own.
        EveSrfLandedLowlands* = #CSS_crewReport_EveSrfLandedLowlands_01 // After hearing the creaks of your capsule, you regret visiting Eve.
        EveSrfLandedHighlands* = #CSS_crewReport_EveSrfLandedHighlands_00 // We have successfully landed on Eve! However, the crew is expressing doubts about the lander's ability to leave.
        EveSrfLandedHighlands* = #CSS_crewReport_EveSrfLandedHighlands_01 // The purple souposphere swirls menacingly around the craft out of the windows.
        EveSrfLandedPeaks* = #CSS_crewReport_EveSrfLandedPeaks_00 // The gravity is getting us down. Hopefully that doesn't include down the mountain.
        EveSrfLandedPeaks* = #CSS_crewReport_EveSrfLandedPeaks_01 // There's nowhere flat around here, and the high gravity means it's a struggle to walk around the cabin and makes you constantly fall out of your chair.
        EveSrfLandedImpactEjecta* = #CSS_crewReport_EveSrfLandedImpactEjecta_00 // Your crew asks Mission Control if snacks can be turned into fuel.
        EveSrfLandedImpactEJecta* = #CSS_crewReport_EveSrfLandedImpactEJecta_01 // You feel that your ship is under a lot of pressure.
        EveSrfLandedCraterLake* = #CSS_crewReport_EveSrfLandedCraterLake_00 // The purple sea sparkles nearby, looking innocent enough to those not in it.
        EveSrfLandedWesternSea* = #CSS_crewReport_EveSrfLandedWesternSea_00 // You don't fancy going outside, so you have a snack instead.
        EveSrfLandedOlympus* = #CSS_crewReport_EveSrfLandedOlympus_00 // There's a lot of sky out of the window. Even the terrain is intimidating here on Eve.
        EveSrfLandedOlympus* = #CSS_crewReport_EveSrfLandedOlympus_01 // That altimeter is still reading awful high. Are you sure we've actually landed?
        EveSrfLandedEasternSea* = #CSS_crewReport_EveSrfLandedEasternSea_00 // Purple sea, purple sky, purple ground. You rub your eyes and search in vain for something not purple.
        EveSrfLandedFoothills* = #CSS_crewReport_EveSrfLandedFoothills_00 // The more you look at them, the more the rolling purple hills start to blend together as a blur.
        EveSrfLandedFoothills* = #CSS_crewReport_EveSrfLandedFoothills_01 // Even Eve has baby mountains. Naturally, they're bigger than Kerbin's.
        EveSrfLandedShallows* = #CSS_crewReport_EveSrfLandedShallows_00 // Flat coastal plains provide an ideal landing spot for craft, but not one for taking off from.
        EveSrfSplashedPoles* = #CSS_crewReport_EveSrfSplashedPoles_00 // The ocean is feeling a bit too cold...
        EveSrfSplashedExplodiumSea* = #CSS_crewReport_EveSrfSplashedExplodiumSea_00 // Explodium, you say? Can we turn this stuff into rocket fuel?.....it's just metaphorical? Aww.
        EveSrfSplashedExplodiumSea* = #CSS_crewReport_EveSrfSplashedExplodiumSea_01 // Mission Control assures you that it's grape juice outside and you can drink it without harm. You, however, become skeptical when it begins peeling the paint off the ship.
        EveSrfSplashedLowlands* = #CSS_crewReport_EveSrfSplashedLowlands_00 // Short circuit in Wire Five!
        EveSrfSplashedImpactEjecta* = #CSS_crewReport_EveSrfSplashedImpactEjecta_00 // You catch a whiff of something chemical-y. Are you sure that hatch is closed properly?
        EveSrfSplashedCraterLake* = #CSS_crewReport_EveSrfSplashedCraterLake_00 // You see the purple liquid that is Eve's ocean leak into the capsule. You get the suspicion that you may be in big trouble.
        EveSrfSplashedCraterLake* = #CSS_crewReport_EveSrfSplashedCraterLake_01 // This reminds you of a time you saw a man get trapped in a vat of grape soda. Unfortunately, you can't drink your way out of this one.
        EveSrfSplashedWesternSea* = #CSS_crewReport_EveSrfSplashedWesternSea_00 // Even though your suit should be airtight, you swear that the capsule reeks faintly of nail polish remover.
        EveSrfSplashedWesternSea* = #CSS_crewReport_EveSrfSplashedWesternSea_01 // A small wave slaps against the craft, causing you to lose your balance in the high gravity and fall over again.
        EveSrfSplashedEasternSea* = #CSS_crewReport_EveSrfSplashedEasternSea_00 // As you see the purple ocean surrounding you, you start to wonder how you'll ever get back home.
        EveSrfSplashedEasternSea* = #CSS_crewReport_EveSrfSplashedEasternSea_01 // This stuff probably has so many uses, and you could make a killing off of it if you could only figure out how to bring it back with you.
        EveSrfSplashedShallows* = #CSS_crewReport_EveSrfSplashedShallows_00 // We're bouncing a bit too much here.
        EveSrfSplashedShallows* = #CSS_crewReport_EveSrfSplashedShallows_01 // You're pretty sure this (isn't) grape juice.
        EveFlyingLowPoles* = #CSS_crewReport_EveFlyingLowPoles_00 // The wind and crew are screaming.
        EveFlyingLowPoles* = #CSS_crewReport_EveFlyingLowPoles_01 // You start having second thoughts about landing...
        EveFlyingLowMidlands* = #CSS_crewReport_EveFlyingLowMidlands_00 // They said that the crew would be getting a raise when they returned, but you've never heard of anyone getting a raise. Ever. We're not even paid!
        EveFlyingLowExplodiumSea* = #CSS_crewReport_EveFlyingLowExplodiumSea_00 // After looking through the window, you inform Mission Control you figured out where all the grape soda from the break room fridge keeps going.
        EveFlyingLowExplodiumSea* = #CSS_crewReport_EveFlyingLowExplodiumSea_01 // The ocean is nearly mirror-flat.
        EveFlyingLowLowlands* = #CSS_crewReport_EveFlyingLowLowlands_00 // You get a sudden urge for grape juice.
        EveFlyingLowLowlands* = #CSS_crewReport_EveFlyingLowLowlands_01 // Flying through the soupy air is a slow process.
        EveFlyingLowHighlands* = #CSS_crewReport_EveFlyingLowHighlands_00 // The crew wonders if there are enough snacks.
        EveFlyingLowHighlands* = #CSS_crewReport_EveFlyingLowHighlands_01 // Small air currents are amplified in power by the high atmospheric density, and the craft rocks as it flies.
        EveFlyingLowPeaks* = #CSS_crewReport_EveFlyingLowPeaks_00 // Mountains rise all around you to stab into the heavy sky.
        EveFlyingLowPeaks* = #CSS_crewReport_EveFlyingLowPeaks_01 // The communications system crackles with unknown interference.
        EveFlyingLowImpactEjecta* = #CSS_crewReport_EveFlyingLowImpactEjecta_00 // The equipment is strained to the limits. We should be fine, as long as we don't make any sudden movements.
        EveFlyingLowImpactEjects* = #CSS_crewReport_EveFlyingLowImpactEjects_01 // A blob of molten exterior paint slowly crawls up the window glass.
        EveFlyingLowCraterLake* = #CSS_crewReport_EveFlyingLowCraterLake_00 // The Crater Lake extends for miles towards the horizon. Why isn't it called the Crater Sea?
        EveFlyingLowCraterLake* = #CSS_crewReport_EveFlyingLowCraterLake_01 // There's no alien sea monsters down there, right?
        EveFlyingLowWesternSea* = #CSS_crewReport_EveFlyingLowWesternSea_00 // The vile lake shimmers beneath the crushing atmosphere.
        EveFlyingLowWesternSea* = #CSS_crewReport_EveFlyingLowWesternSea_01 // You try not to imagine what getting stuck in that liquid would be like.
        EveFlyingLowOlympus* = #CSS_crewReport_EveFlyingLowOlympus_00 // Please don't try and land here. We don't want to end up as debris on a mountainside.
        EveFlyingLowOlympus* = #CSS_crewReport_EveFlyingLowOlympus_01 // The disconnect between the sea-level and radar altimeters is scarily large.
        EveFlyingLowEasternSea* = #CSS_crewReport_EveFlyingLowEasternSea_00 // The presence of a sluggish gust of wind moving across the sea is betrayed by a patch of ripples.
        EveFlyingLowEasternSea* = #CSS_crewReport_EveFlyingLowEasternSea_01 // The capsule window glass feels uncomfortably warm to the touch.
        EveFlyingLowFoothills* = #CSS_crewReport_EveFlyingLowFoothills_00 // You can't see the edge of the hills, even from here.
        EveFlyingLowFoothills* = #CSS_crewReport_EveFlyingLowFoothills_01 // The manufacturer offered us our money back if the capsule gets crushed, so there's that at least.
        EveFlyingLowShallows* = #CSS_crewReport_EveFlyingLowShallows_00 // You could swear you see shapes lurking under the purple surface.
        EveFlyingLowShallows* = #CSS_crewReport_EveFlyingLowShallows_01 // As you look out at the sea, its purple color reminds you of your favorite soft drink.
        EveFlyingHigh* = #CSS_crewReport_EveFlyingHigh_00 // After various tests you can confirm that it is indeed "very purple".
        EveFlyingHigh* = #CSS_crewReport_EveFlyingHigh_01 // A tendril of glowing plasma streams off of a protruding rivet.
        EveFlyingHigh* = #CSS_crewReport_EveFlyingHigh_02 // Atmospheric entry is dangerous here. Praying to your relevant deity is recommended to alleviate stress.
        EveFlyingHigh* = #CSS_crewReport_EveFlyingHigh_03 // High above the toxic clouds and crushing pressure, things don't seem quite so bad.
        EveInSpaceLow* = #CSS_crewReport_EveInSpaceLow_00 // What smells like purple?
        EveInSpaceLow* = #CSS_crewReport_EveInSpaceLow_01 // Well, purple is your favorite color. Maybe there are purple flowers you can take home?
        EveInSpaceLow* = #CSS_crewReport_EveInSpaceLow_02 // That is definitely a deep commitment to purple.
        EveInSpaceLow* = #CSS_crewReport_EveInSpaceLow_03 // The world looks incredibly toxic and inhospitable.
        EveInSpaceHigh* = #CSS_crewReport_EveInSpaceHigh_00 // You think you see Gilly, but it turns out to be a spare peanut.
        EveInSpaceHigh* = #CSS_crewReport_EveInSpaceHigh_01 // Eve's sky glows a beautiful green on the terminator, between day and night.
        EveInSpaceHigh* = #CSS_crewReport_EveInSpaceHigh_02 // The atmosphere shimmers like rocket fuel.
        EveInSpaceHigh* = #CSS_crewReport_EveInSpaceHigh_03 // Eve looks beautiful from up here. You suspect this to be a ruse to lull you into a false sense of security.

        GillySrfLandedMidlands* = #CSS_crewReport_GillySrfLandedMidlands_00 // This landing spot is definitely not flat, but the gravity is so low it barely matters.
        GillySrfLandedMidlands* = #CSS_crewReport_GillySrfLandedMidlands_01 // A shallow slope can be vertical and vice versa. Gilly has some very confusing geometries from down here.
        GillySrfLandedLowlands* = #CSS_crewReport_GillySrfLandedLowlands_02 // You contemplate running around the circular walls of the crew capsule like a caffeinated hamster, to see if it would generate enough force to tip over the lander.
        GillySrfLandedLowlands* = #CSS_crewReport_GillySrfLandedLowlands_03 // You feel no change in gravity.
        GillySrfLandedHighlands* = #CSS_crewReport_GillySrfLandedHighlands_00 // You consider going for a hike, but you are afraid that your first step will launch you right off the surface.
        GillySrfLandedHighlands* = #CSS_crewReport_GillySrfLandedHighlands_01 // You feel a surge in gravity. Mentioning nothing to Mission Control, you put on your brown pants.
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_00 // "I didn't know they made them this small."
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_01 // You wonder if anything would have a TWR of less than one here.
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_02 // What is this, a moon for ants?
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_03 // This place looks a bit boring. You start calculating what it would take to deorbit it into Eve, until your calculator gives you a NaN error. Mission Control refuses to do calculations for you.
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_04 // It looks small and not very tasty.
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_05 // You look down to the surface. It's so close! Of course you don't want to end up lithobraking on those hills by accident, but at this speed it probably wouldn't be that bad.
        GillyInSpaceLow* = #CSS_crewReport_GillyInSpaceLow_06 // You think you can stick your arm out and touch the surface.
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_00 // Somehow your foot has become stuck in the controls. Who has been chewing gum?
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_01 // Yup. It's tiny.
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_02 // In retrospect, you imagined it to be bigger.
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_03 // It looks like a potato. You are starting to feel very hungry.
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_04 // A rock so little must have very little gravity. Next time, you'll bring a golf club.
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_05 // How cute! Despite its potato-like appearance, Gilly is an adorable little asteroid.
        GillyInSpaceHigh* = #CSS_crewReport_GillyInSpaceHigh_06 // The color and highly irregular shape of Gilly remind you of a potato. You suddenly wonder where the chips are.

        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_00 // You look out the window and can no longer remember if you've already returned from a mission or are yet to depart.
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_01 // You think you should get inside the VAB and discuss if the rocket is good enough.
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_02 // As you sit in the capsule, you can't help but wonder why you haven't taken off yet.
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_03 // This is our Space Center. We're home.
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_04 // Was a rocket really necessary to get here?
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_05 // Deja Vu!
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_06 // You should probably climb the VAB!
        KerbinSrfLandedKSC* = #CSS_crewReport_KerbinSrfLandedKSC_07 // Um, did we actually go anywhere? This looks awfully familiar.
        KerbinSrfLandedAdministration* = #CSS_crewReport_KerbinSrfLandedAdministration_00 // You watch Montimer swing a golf ball into the pond.
        KerbinSrfLandedAstronautComplex* = #CSS_crewReport_KerbinSrfLandedAstronautComplex_00 // You are just happy that we didn't land on any of the new recruits.
        KerbinSrfLandedBaikerbanur* = #CSS_crewReport_KerbinSrfLandedBaikerbanur_00 // This old, neglected spaceport really is a sorry sight nowadays, a grave insult to its proud history.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_crewReport_KerbinSrfLandedBaikerbanurLaunchpad_00 // You can't help but feel reverence at sitting where the first pioneers of Kerbal spaceflight sat, before the KSC was even lines on paper.
        KerbinSrfLandedCrawlerway* = #CSS_crewReport_KerbinSrfLandedCrawlerway_00 // You pretend to be the Crawler driver. After a few minutes you realize that you'd rather fly to space.
        KerbinSrfLandedFlagPole* = #CSS_crewReport_KerbinSrfLandedFlagPole_00 // You wonder if this will be the site of your grave marker.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_00 // You look up at the stars and begin to count. You realize you should take off before you fall asleep.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_01 // You regret wearing a red shirt to work today.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_02 // You're not sure this is the right place to be.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_03 // You are waiting impatiently.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_04 // "Are we going to launch? If not, I want cookies."
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_05 // You pause for a moment to rethink your life.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_06 // "Are we there yet?"
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_07 // You pick up your pencil, but get distracted by the thought of space.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_08 // This place looks very familiar.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_09 // "Ignition, check. Fuel gauge, check. Parachute, check. Microwave, check. Wait, microwave?"
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_10 // You mutter a personal version of Shepard's Prayer.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_11 // You get impatient and try to find the launch button so you can go to space already.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_12 // The launchpad... very interesting terrain we have here.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_13 // You wonder why you experienced over 3 gs when the rocket was moved to the pad.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_14 // Just a heads' up: We're gonna have a superconductor turned up full blast and pointed at you for the duration of the flight. Honestly, we're throwing science at the wall here. Best case scenario, you gain some superpowers. Worst case, you get commemorated.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_15 // We don't seem to be moving very fast right now.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_16 // Are we there yet?
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_17 // “Wait! Let me out, I changed my mind!"
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_18 // Check ignition and may Von Kerman's love be with you.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_19 // You wonder what that nasty smell is. Either there is a serious propellant leak or Bob had burritos for lunch. Again.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_20 // You examine the blinking lights and stare intensely at the fuel gauges. Looks like we are ready to go.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_21 // Mission Control reminds you that getting out and pushing is often a viable tactic.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_22 // You furtively pull out the corned beef sandwich you smuggled on board and take a bite. Some crumbs drop into the flight controls, but no worries - they should float right back out once you're in space.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_23 // You wonder where Gunther Wendt.
        KerbinSrfLandedLaunchPad* = #CSS_crewReport_KerbinSrfLandedLaunchPad_24 // Flipping trough the Prelaunch Checklist you open a page that simply reads "Your Commercials could be here". You finally realize that Montimer is overtaxing his authority - literary.
        KerbinSrfLandedMissionControl* = #CSS_crewReport_KerbinSrfLandedMissionControl_00 // Mission report: we didn't go very far. Can't you see me waving at you?
        KerbinSrfLandedR&D* = #CSS_crewReport_KerbinSrfLandedR&D_00 // The R&D folks start disassembling your ship as soon as it lands.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_crewReport_KerbinSrfLandedR&DCentralBuilding_00 // Quick, fire the engines back up before the R&D folks disassemble them!
        KerbinSrfLandedR&DCornerLab* = #CSS_crewReport_KerbinSrfLandedR&DCornerLab_00 // The R&D techs are concentrating so hard that they didn't even see us land.
        KerbinSrfLandedR&DMainBuilding* = #CSS_crewReport_KerbinSrfLandedR&DMainBuilding_00 // You would send your report out, but the R&D techs already disassembled the comms antenna.
        KerbinSrfLandedR&DObservatory* = #CSS_crewReport_KerbinSrfLandedR&DObservatory_00 // You hope the R&D folks were watching that landing. Textbook perfect, if I do say so myself.
        KerbinSrfLandedR&DSideLab* = #CSS_crewReport_KerbinSrfLandedR&DSideLab_00 // The R&D folks are awestruck at the sight of your ship, having never seen one fully assembled before.
        KerbinSrfLandedR&DSmallLab* = #CSS_crewReport_KerbinSrfLandedR&DSmallLab_00 // We landed ON TOP of the building (you think). Now that is a pinpoint landing!
        KerbinSrfLandedR&DTanks* = #CSS_crewReport_KerbinSrfLandedR&DTanks_00 // You hope the rocket exhaust doesn't catch whatever strange substance is in those tanks on fire.
        KerbinSrfLandedR&DWindTunnel* = #CSS_crewReport_KerbinSrfLandedR&DWindTunnel_00 // You catch the complex on fire trying to counteract the wind with your rocket engines. Oh well, snack time!
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_00 // You think that you should be flying the craft instead of making boring logs.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_01 // You take a piece of paper from your notepad and draw a spaceplane on it.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_02 // Despite its name, the runway does not actually run.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_03 // The runway seems to run a long way.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_04 // There's a nice view of mission control from here. You can see them waving back.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_05 // You take a sip of a soft drink before igniting the engines. Or was that after?
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_06 // Don't buzz the tower. The guy paying your salary is standing there and he doesn't want his coffee spilled.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_07 // “Clear Right. Clear Left. We're good here. Ground control come in. Over."
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_08 // Reporting from the Runway. Good thing there's not a lot of traffic, because I don't think we ever got the clearance to be here.
        KerbinSrfLandedRunway* = #CSS_crewReport_KerbinSrfLandedRunway_09 // This runway needs a ramp.
        KerbinSrfLandedSPH* = #CSS_crewReport_KerbinSrfLandedSPH_00 // You hope they can still roll the planes out, having landed this close to the SPH.
        KerbinSrfLandedSPHMainBuilding* = #CSS_crewReport_KerbinSrfLandedSPHMainBuilding_00 // Whew, that was a close one, we almost hit the SPH!
        KerbinSrfLandedSPHRoundTank* = #CSS_crewReport_KerbinSrfLandedSPHRoundTank_00 // You notice that your ship looks strangely similar to the tanks over there.
        KerbinSrfLandedSPHTanks* = #CSS_crewReport_KerbinSrfLandedSPHTanks_00 // You feel inadequate in your little ship surrounded by all these huge tanks.
        KerbinSrfLandedSPHWaterTower* = #CSS_crewReport_KerbinSrfLandedSPHWaterTower_00 // You consider jumping out of the spacecraft and climbing the water tower.
        KerbinSrfLandedTrackingStation* = #CSS_crewReport_KerbinSrfLandedTrackingStation_00 // You sure hope they can track you from here.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_crewReport_KerbinSrfLandedTrackingStationDishEast_00 // You make loud noises into your comms headset, wondering if there will be a feedback loop this close to the tracking dish.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_crewReport_KerbinSrfLandedTrackingStationDishNorth_00 // So, what was the point of this flight again?
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_crewReport_KerbinSrfLandedTrackingStationDishSouth_00 // All the way to the south tracking dish. Now we're exploring the universe (one small step at a time).
        KerbinSrfLandedTrackingStationHub* = #CSS_crewReport_KerbinSrfLandedTrackingStationHub_00 // Look ma, no hands!
        KerbinSrfLandedVAB* = #CSS_crewReport_KerbinSrfLandedVAB_00 // There seem to be a lot of strange green lifeforms building something here. Oh yeah, we're still at the VAB.
        KerbinSrfLandedVABMainBuilding* = #CSS_crewReport_KerbinSrfLandedVABMainBuilding_00 // Wow, that was a short trip!
        KerbinSrfLandedVABPodMemorial* = #CSS_crewReport_KerbinSrfLandedVABPodMemorial_00 // Take THAT memorial! This is a REAL ship!
        KerbinSrfLandedVABRoundTank* = #CSS_crewReport_KerbinSrfLandedVABRoundTank_00 // We really should have landed INSIDE the tank.
        KerbinSrfLandedVABSouthComplex* = #CSS_crewReport_KerbinSrfLandedVABSouthComplex_00 // You're not really sure what goes on in this building. Then again, that applies to most KSC facilities.
        KerbinSrfLandedVABTanks* = #CSS_crewReport_KerbinSrfLandedVABTanks_00 // Nice piloting. We made it back to KSC in one(ish) piece.
        KerbinSrfLandedIslandAirfield* = #CSS_crewReport_KerbinSrfLandedIslandAirfield_00 // The crumbling control tower looks like it's ready to fall and squash you and your ship any second now.
        KerbinSrfLandedWoomerang* = #CSS_crewReport_KerbinSrfLandedWoomerang_00 // Welcome to Woomerang. Is this it? You expected more.
        KerbinFlyingLowKSC* = #CSS_crewReport_KerbinFlyingLowKSC_00 // Woohoo! We're doin' it! Space b****es!!
        KerbinFlyingHighKSC* = #CSS_crewReport_KerbinFlyingHighKSC_00 // You look out the window and think that you can just make out KSC below.

        KerbinSrfLandedWater* = #CSS_crewReport_KerbinSrfLandedWater_00 // Does our craft float? Maybe we'll get to test it.
        KerbinSrfLandedGrasslands* = #CSS_crewReport_KerbinSrfLandedGrasslands_00 // You look forward to opening the capsule door and smelling the fresh earthy smell of grass. Oh yeah, we have to wear these stupid spacesuits even on Kerbin. Who's great idea was that?
        KerbinSrfLandedGrasslands* = #CSS_crewReport_KerbinSrfLandedGrasslands_01 // The crew is embroiled in an argument over whether the grass is in fact greener on the other side.
        KerbinSrfLandedHighlands* = #CSS_crewReport_KerbinSrfLandedHighlands_00 // KSC, we have landed. I think. The altimeter still shows way too high for us to be on the ground, but our velocity is zero. So there you have it. Maybe.
        KerbinSrfLandedHighlands* = #CSS_crewReport_KerbinSrfLandedHighlands_01 // Landing in the Highlands woohoo! Break out the celebratory kilts and bagpipes!
        KerbinSrfLandedShores* = #CSS_crewReport_KerbinSrfLandedShores_00 // You want to throw a beach party but Mission Control orders you to focus on the mission.
        KerbinSrfLandedShores* = #CSS_crewReport_KerbinSrfLandedShores_01 // The shores look inviting as you watch the waves roll in to the coast.
        KerbinSrfLandedShores* = #CSS_crewReport_KerbinSrfLandedShores_02 // The shores appear to have a blue liquid nearby.
        KerbinSrfLandedMountains* = #CSS_crewReport_KerbinSrfLandedMountains_00 // You feel like the king of the world standing on this mountain. Or at least the king of the mountain.
        KerbinSrfLandedMountains* = #CSS_crewReport_KerbinSrfLandedMountains_01 // As your craft settles precipitously near a sharp drop, you reflect on the need to attach cleats to all future landing gear.
        KerbinSrfLandedDeserts* = #CSS_crewReport_KerbinSrfLandedDeserts_00 // You imagine how hot it would be if the capsule did not have the a/c on.
        KerbinSrfLandedDeserts* = #CSS_crewReport_KerbinSrfLandedDeserts_01 // Is that an oasis?
        KerbinSrfLandedDeserts* = #CSS_crewReport_KerbinSrfLandedDeserts_02 // You are so very thirsty.
        KerbinSrfLandedDeserts* = #CSS_crewReport_KerbinSrfLandedDeserts_03 // The crew complains about the heat.
        KerbinSrfLandedBadlands* = #CSS_crewReport_KerbinSrfLandedBadlands_00 // You start to feel very nervous about all the bad things you said about the Badlands.
        KerbinSrfLandedBadlands* = #CSS_crewReport_KerbinSrfLandedBadlands_01 // You became a kerbonaut specifically to get away from the Badlands. And now here you are. Congratulations.
        KerbinSrfLandedBadlands* = #CSS_crewReport_KerbinSrfLandedBadlands_02 // You try to have a good time. You fail.
        KerbinSrfLandedTundra* = #CSS_crewReport_KerbinSrfLandedTundra_00 // As you shiver even inside a heated capsule, you find it hard to believe that your ancestors once lived in such conditions.
        KerbinSrfLandedTundra* = #CSS_crewReport_KerbinSrfLandedTundra_01 // You peer out the spacecraft window at the stunted plant growth, and wonder if this is where the first Kerbal came from.
        KerbinSrfLandedTundra* = #CSS_crewReport_KerbinSrfLandedTundra_02 // Maybe you'll see a bear! Or a wolf! Or an Eskimo!
        KerbinSrfLandedIceCaps* = #CSS_crewReport_KerbinSrfLandedIceCaps_00 // You wish you’d brought your ice skates.
        KerbinSrfLandedIceCaps* = #CSS_crewReport_KerbinSrfLandedIceCaps_01 // You think that you'd appreciate the stark beauty of the pristine poles more if it wasn't so cold.
        KerbinSrfLandedICeCaps* = #CSS_crewReport_KerbinSrfLandedICeCaps_02 // Ooh, that aurora is pretty! Wonder what it looks like from space?
        KerbinSrfLandedNorthernIceShelf* = #CSS_crewReport_KerbinSrfLandedNorthernIceShelf_00 // You've heard the legends of Santa Klaus living at the North Pole. Quite why he would live in such a freezing, desolate place is beyond you.
        KerbinSrfLandedNorthernIceShelf* = #CSS_crewReport_KerbinSrfLandedNorthernIceShelf_01 // We're here in this terrible place, and there's not even an igloo to be seen.
        KerbinSrfLandedSouthernIceShelf* = #CSS_crewReport_KerbinSrfLandedSouthernIceShelf_00 // The freezing, windswept and featureless ice plains stretch over the horizon.
        KerbinSrfLandedSouthernIceShelf* = #CSS_crewReport_KerbinSrfLandedSouthernIceShelf_02 // The crew is disappointed at the distinct lack of tuxedo-wearing birds.
        KerbinSrfSplashedWater* = #CSS_crewReport_KerbinSrfSplashedWater_00 // Arr mateys! Let's show those landlubbers at KSC who the masters of the high seas truly are!
        KerbinSrfSplashedWater* = #CSS_crewReport_KerbinSrfSplashedWater_01 // You don't need to worry about pirates, right? Surely they're only after regular ships not spaceships.
        KerbinSrfSplashedWater* = #CSS_crewReport_KerbinSrfSplashedWater_02 // I hope the hatch doesn't break and flood the pod.
        KerbinSrfSplashedWater* = #CSS_crewReport_KerbinSrfSplashedWater_03 // "I can't swim!"
        KerbinSrfSplashedWater* = #CSS_crewReport_KerbinSrfSplashedWater_04 // Hey little guy! I shall call him Squishy and he shall be mine, and he shall be my Squishy. Come here Squishy...
        KerbinSrfSplashedGrasslands* = #CSS_crewReport_KerbinSrfSplashedGrasslands_00 // You're bobbing around in a muddy pond in a field. Surely there's more glamorous places for a kerbonaut to be.
        KerbinSrfSplashedShores* = #CSS_crewReport_KerbinSrfSplashedShores_00 // Who needs a swimsuit? Chicks dig spacesuits.
        KerbinSrfSplashedShores* = #CSS_crewReport_KerbinSrfSplashedShores_01 // No! Not the water!
        KerbinSrfSplashedShores* = #CSS_crewReport_KerbinSrfSplashedShores_02 // Your ship is wet. You suspect that if you exited the ship you would be too.
        KerbinSrfSplashedShores* = #CSS_crewReport_KerbinSrfSplashedShores_03 // The crew highly doubts the floating capabilities of this craft.
        KerbinSrfSplashedShores* = #CSS_crewReport_KerbinSrfSplashedShores_04 // You see a fish swimming by the window. It looks like you are under water.
        KerbinSrfSplashedDeserts* = #CSS_crewReport_KerbinSrfSplashedDeserts_00 // Waves lapping against the window are one of the last things you would expect to find in a desert, behind "penguins" and "a Yeti" but ahead of "Mortimer's underwear".
        KerbinSrfSplashedBadlands* = #CSS_crewReport_KerbinSrfSplashedBadlands_00 // The water must be hot, since the capsule interior is getting rather warm.
        KerbinSrfSplashedTundra* = #CSS_crewReport_KerbinSrfSplashedTundra_00 // That water sure looks chilly. You're glad you're in here and not in it.
        KerbinSrfSplashedIceCaps* = #CSS_crewReport_KerbinSrfSplashedIceCaps_00 // A small piece of ice clacks against the window. You can feel the cold through the thickened glass.
        KerbinSrfSplashedNorthernIceShelf* = #CSS_crewReport_KerbinSrfSplashedNorthernIceShelf_00 // You watch a large iceberg accompanied by a swarm of growlers make its stately way past.
        KerbinSrfSplashedSouthernIceShelf* = #CSS_crewReport_KerbinSrfSplashedSouthernIceShelf_01 // You feel naming your ship the Unsinkable may have been a bad idea in this environment.
        KerbinFlyingLowWater* = #CSS_crewReport_KerbinFlyingLowWater_00 // You see a spray of water whipped up by the air rushing out of your way.
        KerbinFlyingLowWater* = #CSS_crewReport_KerbinFlyingLowWater_01 // You are flying so low you notice disturbances in the water from your craft.
        KerbinFlyingLowWater* = #CSS_crewReport_KerbinFlyingLowWater_02 // From this perspective you can see the underwater topology.
        KerbinFlyingLowWater* = #CSS_crewReport_KerbinFlyingLowWater_03 // You wonder if it's safe to drink the water.
        KerbinFlyingLowWater* = #CSS_crewReport_KerbinFlyingLowWater_04 // The water looks so peaceful from here.
        KerbinFlyingLowWater* = #CSS_crewReport_KerbinFlyingLowWater_05 // You imagine all the wonderful creatures that live below the surface that would probably eat you. Or at least brush up against your leg while swimming.
        KerbinFlyingLowGrasslands* = #CSS_crewReport_KerbinFlyingLowGrasslands_00 // There's something on the wing, some.....thing....
        KerbinFlyingLowGrasslands* = #CSS_crewReport_KerbinFlyingLowGrasslands_01 // It's very comforting to see this much green below you.
        KerbinFlyingLowGrasslands* = #CSS_crewReport_KerbinFlyingLowGrasslands_02 // The ground here has been highly manicured. You note the number of groundskeepers the planet must have.
        KerbinFlyingLowHighlands* = #CSS_crewReport_KerbinFlyingLowHighlands_00 // You get a great view of the highlands.
        KerbinFlyingLowHighlands* = #CSS_crewReport_KerbinFlyingLowHighlands_01 // There can be only one report from the Highlands!
        KerbinFlyingLowHighlands* = #CSS_crewReport_KerbinFlyingLowHighlands_02 // It’s pretty boring out here. This must be why there aren’t many cities on Kerbin.
        KerbinFlyingLowShores* = #CSS_crewReport_KerbinFlyingLowShores_00 // The crew is disappointed by the absence of bikinis in the area.
        KerbinFlyingLowShores* = #CSS_crewReport_KerbinFlyingLowShores_01 // You look out the window and see a piece of your rocket fly off. It wasn't important anyways.
        KerbinFlyingLowShores* = #CSS_crewReport_KerbinFlyingLowShores_02 // "Crew reporting in. We'll get back to you… about to eat lunch."
        KerbinFlyingLowMountains* = #CSS_crewReport_KerbinFlyingLowMountains_00 // You calculate the chance of impact at this altitude. It does not make you feel safe.
        KerbinFlyingLowMountains* = #CSS_crewReport_KerbinFlyingLowMountains_01 // You keep a sharp lookout for sudden mountains.
        KerbinFlyingLowMountains* = #CSS_crewReport_KerbinFlyingLowMountains_02 // Okay, just hallucinating.
        KerbinFlyingLowMountains* = #CSS_crewReport_KerbinFlyingLowMountains_03 // As you hurtle past the mountainside at a reckless speed, you almost hit a very surprised mountain goat.
        KerbinFlyingLowDeserts* = #CSS_crewReport_KerbinFlyingLowDeserts_00 // You look out the window hoping to find a tasty cake until you realize somebody made a slight spelling error in the flight plan.
        KerbinFlyingLowDeserts* = #CSS_crewReport_KerbinFlyingLowDeserts_01 // The heat rising from the sand causes the desert to move and shimmer.
        KerbinFlyingLowDeserts* = #CSS_crewReport_KerbinFlyingLowDeserts_02 // You look around and see no water for miles. You begin to wonder why you didn't bring more.
        KerbinFlyingLowDeserts* = #CSS_crewReport_KerbinFlyingLowDeserts_03 // You wonder if crashing here would create a glass crater. Then you realize how cool that would be.
        KerbinFlyingLowDeserts* = #CSS_crewReport_KerbinFlyingLowDeserts_04 // In anticipation of the heat, you turn on the air conditioning.
        KerbinFlyingLowBadlands* = #CSS_crewReport_KerbinFlyingLowBadlands_00 // You start to share scary stories about the strange things found in the Badlands, but Mission Control shushes you.
        KerbinFlyingLowBadlands* = #CSS_crewReport_KerbinFlyingLowBadlands_01 // This looks like a bad place to land.
        KerbinFlyingLowBadlands* = #CSS_crewReport_KerbinFlyingLowBadlands_02 // You bet this is where all the cool kids come to land.
        KerbinFlyingLowBadlands* = #CSS_crewReport_KerbinFlyingLowBadlands_03 // You have a bad feeling about this.
        KerbinFlyingLowBadlands* = #CSS_crewReport_KerbinFlyingLowBadlands_04 // Crashing here would not be good.
        KerbinFlyingLowTundra* = #CSS_crewReport_KerbinFlyingLowTundra_00 // You look at the ground below you and see the frosted hills. It reminds you of the cake you had for breakfast.
        KerbinFlyingLowTundra* = #CSS_crewReport_KerbinFlyingLowTundra_01 // You look down and see a glimmer. There's gold in these hills!
        KerbinFlyingLowTundra* = #CSS_crewReport_KerbinFlyingLowTundra_02 // You see patches of frozen grass. It looks like it's pretty cold out there.
        KerbinFlyingLowTundra* = #CSS_crewReport_KerbinFlyingLowTundra_03 // Moose!
        KerbinFlyingLowTundra* = #CSS_crewReport_KerbinFlyingLowTundra_04 // Please don't land here, please don't land here, please don't land here...
        KerbinFlyingLowIceCaps* = #CSS_crewReport_KerbinFlyingLowIceCaps_00 // The snowy ice caps look so fluffy and soft to land on.
        KerbinFlyingLowIceCaps* = #CSS_crewReport_KerbinFlyingLowIceCaps_01 // You look down and are blinded by the white snow.
        KerbinFlyingLowNorthernIceShelf* = #CSS_crewReport_KerbinFlyingLowNorthernIceShelf_00 // Even flying above the cold, white plains, you're not free of its icy grip.
        KerbinFlyingLowNorthernIceShelf* = #CSS_crewReport_KerbinFlyingLowNorthernIceShelf_01 // You think you see some land on the horizon from your aerial vantage point, but the glare makes it difficult to see.
        KerbinFlyingLowSouthernIceShelf* = #CSS_crewReport_KerbinFlyingLowSouthernIceShelf_00 // You look down and see a sheet of shining white ice. If you stare at it too long, your eyes start to water.
        KerbinFlyingLowSouthernIceShelf* = #CSS_crewReport_KerbinFlyingLowSouthernIceShelf_01 // The ice sheet is strangely uniform from the air, with a total lack of major crevasses and joints.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_00 // From this high up, the Badlands doesn't look so bad. You still don't want to crash there though.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_01 // Whatever lives in the Badlands can't get you up here. You hope.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_02 // You are almost in an orbit with your home planet.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_03 // You wonder what is down there on the surface. If only you had some binoculars.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_04 // A golf ball pings against the side of the spaceship. How the heck did someone hit a ball that hard??
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_05 // You can't smell the cows anymore.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_06 // *singing* "Colorado Rocky Mountain high. I've seen it rainin' fire in the sky". Ah, good 'ol John Denver.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_07 // You feel a certain satisfaction at being higher than the Highlands.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_08 // Is that the desert down there? It looks awful dry and sandy.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_09 // Wow that desert is big. You squint your eyes and try to count the palm trees.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_10 // Over the ice and through the atmosphere, to KSC we go! You wonder if grandmothers house is on the way.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_11 // You discover that you are the only one of the entire crew who still believes that your presents come from Santa.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_12 // The mountains rise up from the grasslands of Kerbin. They seem so much smaller from up here.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_13 // Even from up here, Kerbin's mountains remain an imposing sight.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_14 // You mock the seagulls with their ugly faces, funny voices, and low flight ceiling.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_15 // You squint through the window, hoping to catch a glance of the Kerbals sunning themselves on the beach below.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_16 // Nothing down there looks like it's enjoying itself.
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_17 // The stunted trees below make it seem like you are further away than you already are. Are we in space yet? And when do we break out the snacks?
        KerbinFlyingHigh* = #CSS_crewReport_KerbinFlyingHigh_18 // What's that big shadow? Is that...a kraken?
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_00 // Did you remember to pack your Agoraphobia medication?
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_01 // You float through the air, eating the levitating chips.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_02 // Alarmingly, one side of the ship feels really hot. The other side doesn't, though, so it should be fine.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_03 // You stare out the window in deep thought, pondering the answer to the ultimate question, before being rudely interrupted by the Mission Control.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_04 // You marvel at the weightless nuts and bolts as they dance around the cabin. You briefly wonder what parts of your craft they had once held in place.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_05 // You're in space and not dead. The crew and Mission Control have agreed that it's indeed a big step forward.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_06 // Much to your chagrin, Scott Kerman gets on the radio and begins educating the crew about proper bathroom procedures. Again.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_07 // You attempt to perform a juggling act, only to have the balls fly off in various directions due to micro-gravity. You hope they didn't hit any important buttons this time.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_08 // LOOK! Another star! And hey... there's another! Wow, space is awesome.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_09 // After rigorous testing, the crew has determined that micro-gravity increases the fun of bouncy balls by 200%.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_10 // "This is why we need fancy suits, huh?"
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_11 // Even from space the vast swaths of grass appear a technicolor green. You feel proud to have come from such a beautiful place.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_12 // You marvel at how beautifully-manicured kerbalkind's lawn is.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_13 // They didn't fly into space, storm a beach or bring back gold! No, sir, we did! It's you and me against the world, son!
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_14 // This is Major Kerman to Mission Control, I'm feeling very still. And I think my spaceship knows which way to go.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_15 // It's time to leave the capsule... right?
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_16 // Are we there yet?
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_17 // We should have fixed the GPS before taking off so we'd know what biome we're in. Oh well, rocket fuel is expensive.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_18 // From this altitude, you realize that you'll pass over the Badlands several times per hour. This worries you more than it should.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_19 // Hey, it looks like my globe!
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_20 // "Hey, I can see Jeb's Ego from here!"
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_21 // "TO INFINITY, AND BEYOND!"
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_22 // Yep, we're in space alright, but you bet that if we left the landing gear down it would hit that mountaintop.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_23 // You feel dizzy, unable to keep your head from spinning. If you are going to build a larger crew pod, a web of ropes inside might be of help.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_24 // Planet Kerbin is blue and there is nothing I can do.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_25 // You reflect on the meaningful events it took you to get here, warmly recalling the moment you first decided to become an astronaut. It was just this morning.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_26 // You are chatting to Mission Control when your radio channel is interrupted by some guy named Major Tom frantically saying something has gone wrong. You tell him take a protein pill and put his helmet on.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_27 // You kill some time chatting with a random radio operator.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_28 // The command console reads: "Welcome to space. Please enjoy your stay."
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_29 // The crew is reading books to pass the time.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_30 // Just a little bit further to go!
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_31 // Bail out!
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_32 // Don't bail out!
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_33 // Do we have enough fuel to make it into real space?
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_34 // If you rotate the craft, we might end up aerobraking...
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_35 // As you gaze down on your home planet, you are simultaneously filled with wonder and amazed that you made it this far without exploding.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_36 // Here you are sitting in a tin can, far above the world.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_37 // "Wheeeeeeeeeeeeeee!"
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_38 // "Space? SPACE! SPAAACCCCCE!"
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_39 // You never get tired of the view from space, even flying over this part of the planet.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_40 // You think that KSC may be somewhere below the clouds.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_41 // If you were in charge of creating Kerbin you wouldn't have wasted so much space on an empty desert. They could at least give it a swimming pool or something.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_42 // You gaze in wonder at the auroras and wonder if they are related to rainbows.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_43 // You contemplate the vast swaths of ice below, wondering if any Kerbals have ever been there.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_44 // You peer down at the mountains below, wondering if there is anyone down there looking up at you.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_45 // You tell Mission Control that some of those mountains seem perfectly suited for an observatory.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_46 // The beach looks inviting even from space. Too bad we forgot to pack cocktails.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_47 // You prepare your bathing suit in case Mission Control wants you to land there.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_48 // From this height, you can clearly see where hard ice meets harsh rock meets cold snow. Not a very nice place to live.
        KerbinInSpaceLow* = #CSS_crewReport_KerbinInSpaceLow_49 // From this distance the already tiny plants growing on the tundra below are so small you can barely see them.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_00 // You almost have a panic attack as your instrumentation warns that you are directly over the Badlands. Then you laugh as you remember that you're over a quarter million kilometers away.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_01 // You have mixed feelings about being this far away from Kerbin. On the one hand you're pretty far from home, but on the other hand you're pretty far from the Badlands.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_02 // Almost back to KSC. Just an atmosphere and a few thousand kilometers between us.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_03 // From up here, the desert and the oceans look like one giant beach! Beaches are fun!
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_04 // The spacecraft's crew and some of the guys at Mission Control are playing chess over the radio.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_05 // You look out the window only to realize you forgot your keys at home.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_06 // You can see the Badlands from orbit. Ew.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_07 // "Log: The alien planet seems remarkably similar to our own. Oh wait..."
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_08 // You wonder at the fact that Kerbin is mostly green.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_09 // Agoraphobia sets in...
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_10 // You really are high as a kite, rocket-man. Maybe higher.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_11 // Bound for the stars.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_12 // You think about all the great times you had hanging out on the shores below. Anyway, hasn't it been a while since we had some snacks??
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_13 // From space, everything looks like a giant beach! Especially the actual beaches!
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_14 // You observe the Highlands from orbit, marveling at how tiny they look.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_15 // You become homesick thinking about the mountains of Kerbin being the closest part of the planet to you at this altitude. Then you have some snacks, and it's all better.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_16 // You wonder if you will make it home safe.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_17 // You count the snowstorms passing over the Tundra below and are suddenly glad you don't have to be down there.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_18 // Is that Tundra below? You are so far from the planet that you can only make a wild guess. So you do, and report it as solid fact back to KSC.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_19 // You briefly contemplate your navel as you watch the planet pass below you.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_20 // Although the planet is indeed very round, you wonder if perhaps its roundness has been exaggerated.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_21 // Your slide rule breaks, and you begin to search for your backup before realizing that you don't know how to use a slide rule anyway.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_22 // You swear you saw a blue police box flashing away on a retrograde orbit.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_23 // Let's engage Warp Drive... wait, we don't have a Warp Drive?
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_24 // Everything looks so small from up here.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_25 // KSC, I hope you know where I am, cause I just spilled coffee on the roadmap.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_26 // Ooh that aurora is pretty! Wonder what it looks like from the ground?
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_27 // You really want to get out and take a walk, but there's nothing to walk on.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_28 // You make an observation, but the lack of gravity stops your pen from working. Perhaps you should have brought a pencil.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_29 // The surface of Kerbin is the shore of the cosmic ocean. Recently you've waded a little way out, maybe ankle-deep, and the water seems inviting.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_30 // "Crew reporting in. Everything is nominal here."
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_31 // The planet appears to be round! It's not flat like we thought!
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_32 // You strain to see detail on the surface below, but all that you can see are the broad strokes of biomes below.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_33 // You hope that when you come back, you'll land in the Grasslands.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_34 // You can barely make out the ridges of Kerbin's mountains from this altitude, but enjoy a few snacks with the view.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_35 // From this distance, Kerbin's mountain ranges blend into one big blob.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_36 // You look down over the vast ocean below and wonder how many glasses it would take to empty all that water.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_37 // From here Kerbin looks like a smooth blue marble. You never were good at that game.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_38 // As you watch the great blue seas of Kerbin pass by you wonder what lays hidden in the depths.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_39 // Wow, that ocean really is big. You're glad you aren't trying to sail across it.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_40 // As you watch Kerbin's oceans from the depths of outer space you ask KSC if there are space pirates. KSC assures you that pirate ships have sails instead of rockets and thus cannot achieve orbit.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_41 // You can't see any plant life below, and can't decide whether it's because you are too far away, or that nothing grows here.
        KerbinInSpaceHigh* = #CSS_crewReport_KerbinInSpaceHigh_42 // Is it still the Highlands if you're over a quarter million meters above it?

        MunSrfLanded* = #CSS_crewReport_MunSrfLanded_00 // You feel awestruck at the beaten up nature of the Mun.
        MunSrfLandedMidlands* = #CSS_crewReport_MunSrfLandedMidlands_00 // Ahh, the Midlands. The only flat place on this not-made-of-cheese rock.
        MunSrfLandedNorthernBasin* = #CSS_crewReport_MunSrfLandedNorthernBasin_00 // Another place to gain the 'First snack ever eaten here in the history of Kerbalkind' achievement. Let's get to it!
        MunSrfLandedEastCrater* = #CSS_crewReport_MunSrfLandedEastCrater_00 // One small step for man, one giant bill for mankind.
        MunSrfLandedNorthwestCrater* = #CSS_crewReport_MunSrfLandedNorthwestCrater_00 // This would be an awesome spot to film a movie. "North by Northwest Crater".
        MunSrfLandedSouthwestCrater* = #CSS_crewReport_MunSrfLandedSouthwestCrater_00 // This would be a great spot for the first Munar music festival. 'South by Southwest Crater'
        MunSrfLandedFarsideCrater* = #CSS_crewReport_MunSrfLandedFarsideCrater_00 // Boy, the lighting up here sure looks weird. Almost as if you were on a sound stage or something.
        MunSrfLandedCanyons* = #CSS_crewReport_MunSrfLandedCanyons_00 // Seeing the dark canyon makes you wonder what wonders lie down there.
        MunSrfLandedPolarCrater* = #CSS_crewReport_MunSrfLandedPolarCrater_00 // It feels strangely dangerous out there. Mission Control insists it's safe, but you don't think they would know very well.
        MunSrfLandedPoles* = #CSS_crewReport_MunSrfLandedPoles_00 // The crew cannot stop hyperventilating.
        MunSrfLandedPolarLowlands* = #CSS_crewReport_MunSrfLandedPolarLowlands_00 // You put on your polarized aviator sunglasses. Now you can look cool AND be situationally appropriate.
        MunSrfLandedHighlands* = #CSS_crewReport_MunSrfLandedHighlands_00 // You survey the vista that spreads out before you as you munch on some snacks.
        MunSrfLandedHighlandCraters* = #CSS_crewReport_MunSrfLandedHighlandCraters_00 // Struck by a sudden urge to say something witty, you nearly choke on your snack.
        MunSrfLandedMidlandCraters* = #CSS_crewReport_MunSrfLandedMidlandCraters_00 // You muse on the chances of having landed in this specific crater. Oh yeah, we picked it from data from a pre-scan mission. There was a pre-scan mission, right?!
        MunSrfLandedEastFarsideCrater* = #CSS_crewReport_MunSrfLandedEastFarsideCrater_00 // You begin to indicate concerns regarding whether or not the landing was simply an elaborate hoax, but the communications are interrupted by a strange voice telling you to keep quiet.
        MunSrfLandedTwinCraters* = #CSS_crewReport_MunSrfLandedTwinCraters_00 // The twin craters remind you of some other twin things. But we won't get into that here.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_00 // You resist the urge to take your craft down even lower and 'thread the needle'.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_01 // You glance out your window at the surface... Whoa! Who put mountains this high on a rock this small?!
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_02 // Your ships suffers a minor depressurization, but quick thinking and lots of bubble gum manage to solve the problem before it gets out of hand.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_03 // Looking down at the Mun's surface, you suddenly feel tempted to eat cheese.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_04 // "Crew reporting in. We are currently near the Mun. It turns out it's much bigger than we thought it was."
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_05 // Great, we've made it this far! Now, how to land?
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_06 // Wasn't there an opera written about this once?
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_07 // You don't know if the crater rims would be a good landing site. Probably not, but they would certainly be... interesting.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_08 // Ah the "East Crater". Yes, now that you're up close you can definitely tell which one it is. You totally didn't look at the map.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_09 // ANOTHER crater?! Does this place have ANY flat land??
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_10 // You wonder if your report can even make it back to Kerbin from here - you are on the Farside of the Mun, after all.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_11 // You report to Mission Control that you have found no evidence of the long-standing claim that a cow jumped over the Mun.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_12 // You try to decide which area would make the best landing spot. Then you make a back-up list of places that would make a good crash-landing spot.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_13 // Those highland craters think they're so much better than the other craters. Well they don't look so great from up here!
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_14 // Crew report begins. I'm hungry. Will eat snacks. Crew report ends.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_15 // Without atmosphere, weather, or major seismic activity, the Mun's craters are remarkably well-preserved. You make sure to take plenty of pictures and note this in your report.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_16 // You remember watching a documentary on one of the leading theories explaining the formation of the Mun. It's hard to believe that the sterile surface below was once a literal sea of fire.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_17 // In addition to the rather round craters, there also appear to be areas that are far more irregular in shape. The scientists are calling these 'basins'.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_18 // You report that the ship makes scary noises at night and you can't sleep. Mission Control advises leaving on the night light.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_19 // You thank Mission Control for helping you get this far.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_20 // The Mun's Polar Lowlands don't seem that different from the rest of the Mun.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_21 // The crew is incredibly impressed with the engineering of this spacecraft. They especially admire the cleverly-recessed, climate-controlled snack bar.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_22 // Nothing to report Mission Control! Except for the fact that we're flying over the Mun but you already know that.
        MunInSpaceLow* = #CSS_crewReport_MunInSpaceLow_23 // Those Twin Craters don't look very similar. Perhaps they are fraternal twins.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_00 // From this high up, the canyons look like scars across the Mun's face. Which is appropriate considering how much the Mun has survived millennia after millennia.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_01 // You are very proud of yourself for reaching this far!
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_02 // You see a great sphere of moldy cheese... Oh, no wait, its just the Mun.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_03 // What kind of geologic formation is THAT?
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_04 // Hey, that looks sort of like the arch from McKerbal's.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_05 // You look back at Kerbin. I looks rather small.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_06 // It seems that the Mun is one big giant rock with no atmosphere.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_07 // Those craters... what could they be caused by?
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_08 // "Here I am floating in a tin can, far above the Mun."
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_09 // You wonder if those craters were caused by the impacts of launches before you. Mission Control laughs nervously and urges you otherwise.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_10 // You sketch a map of the munar surface with the intention of taking it home to frame and hang on your wall. And, because you have time, you make a few autographed copies to sell on kBay.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_11 // You gaze down at the crater below as crumbs from the snack you are eating fall out of your mouth.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_12 // Wow the Mun looks pretty beat up. Look at all those holes.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_13 // The crater below reminds you of snacks. Of course everything reminds you of snacks.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_14 // You request a bedtime story from Mission Control.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_15 // Huh. The Mun kinda looks like a giant golf ball. You nervously keep an eye out for a giant golf club.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_16 // Staring at the crater-filled surface of the Mun you are suddenly thankful for Kerbin's thick atmosphere.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_17 // Ha the Mun is so small and adorab--holy crap, it's getting big really fast.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_18 // All systems nominal. The ship is happy so you're happy.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_19 // Watching the pockmarked munar surface get larger and larger as you get closer and closer is a sight you'll treasure forever.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_20 // You try to imagine the sheer kinetic energy released when whatever made those giant craters impacted. Must've been quite a sight.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_21 // You and Mission Control are playing Battleship over the radio. Curses! There goes your kruiser.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_22 // You take out your sketchbook and make a drawing of the munar surface. Then you give it a smiley face so it looks happy to see you!
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_23 // As you approach the Mun, you take the time to rehearse several contingency plans in case of an emergency.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_24 // You take the time to study the schematics of your spacecraft. You are greatly impressed and slightly worried at how many corners were cut during its design and construction.
        MunInSpaceHigh* = #CSS_crewReport_MunInSpaceHigh_25 // The Twin Craters remind you of a cell dividing.

        MinmusSrfLanded* = #CSS_crewReport_MinmusSrfLanded_00 // You try jumping into the air and strafing at the same time. Now, if only you had a water pistol...
        MinmusSrfLandedHighlands* = #CSS_crewReport_MinmusSrfLandedHighlands_00 // The curvature of Minmus is easily visible from here.
        MinmusSrfLandedMidlands* = #CSS_crewReport_MinmusSrfLandedMidlands_00 // Low gravity and interesting terrain visible from the window invite you to come outside.
        MinmusSrfLandedLowlands* = #CSS_crewReport_MinmusSrfLandedLowlands_00 // You wonder why are you still sitting in your capsule while there's so much fun to have outside.
        MinmusSrfLandedFlats* = #CSS_crewReport_MinmusSrfLandedFlats_00 // You look up at Kerbin and it looks smaller than ever. You think you can just about make out the Mun, too.
        MinmusSrfLandedGreatFlats* = #CSS_crewReport_MinmusSrfLandedGreatFlats_00 // You note that landing on a perfectly flat surface is somewhat boring.
        MinmusSrfLandedGreaterFlats* = #CSS_crewReport_MinmusSrfLandedGreaterFlats_00 // The ground here is completely flat. It's really boring.
        MinmusSrfLandedLesserFlats* = #CSS_crewReport_MinmusSrfLandedLesserFlats_00 // "I could be bounded in a nutshell, and count myself a king of infinite space."
        MinmusSrfLandedPoles* = #CSS_crewReport_MinmusSrfLandedPoles_00 // Well, it looks no different from here than it did from far away.
        MinmusSrfLandedSlopes* = #CSS_crewReport_MinmusSrfLandedSlopes_00 // Don't fall over, don't fall over, don't fall over...
        MinmusSrfLandedSlopes* = #CSS_crewReport_MinmusSrfLandedSlopes_01 // It's completely beyond your understanding why you decided to land here and not on the perfectly flat surface of the frozen lake below.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_00 // You wonder if it's possible to EVA to the surface and back.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_01 // You wonder if landing on the top of a mountain will consume less fuel. It would be harder, though.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_02 // Jet-packing down there would probably be fun. You doubt you could get back up, though.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_03 // You wonder if Minmus tastes of mint, and if you could make a fortune selling tiny edible planets.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_04 // You watch Minmus' surface shimmer beneath and wonder if your tongue would stick to the ground upon a thorough licking.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_05 // Here we are. The giant mint in space.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_06 // You look out of the window and suddenly feel homesick.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_07 // Let's go back, I saw a cool rock down there.
        MinmusInSpaceLow* = #CSS_crewReport_MinmusInSpaceLow_08 // I know there is no atmosphere, but it still feels stinky, like overripe cheese.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_00 // You note that your radio fails to transmit when set to the OFF position.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_01 // Kerbin looks small. The Mun looks small. Even the Sun looks small. You turn the binoculars the right way round.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_02 // Please let it be a sea of lime sherbet.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_03 // Well, it's certainly much smaller in person.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_04 // Kerbin's smaller moon isn't as impressive as the other one. However, it does look much more yummy.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_05 // At this distance, Kerbin is little more than a pale blue dot, floating the the inky vastness of space.
        MinmusInSpaceHigh* = #CSS_crewReport_MinmusInSpaceHigh_06 // Hm, how much debris could you kick up if you jumped into one of those lakes from here?

        DunaSrfLanded* = #CSS_crewReport_DunaSrfLanded_00 // It is quite dusty outside.
        DunaSrfLandedPoles* = #CSS_crewReport_DunaSrfLandedPoles_00 // Why did we land here again? There's nothing here but ice in all directions.
        DunaSrfLandedPoles* = #CSS_crewReport_DunaSrfLandedPoles_01 // A spiderweb of ice crystals spreads across the pod window as it cools.
        DunaSrfLandedMidlands* = #CSS_crewReport_DunaSrfLandedMidlands_00 // Very small piles of fine red dust are being deposited on the windows by the thin atmosphere.
        DunaSrfLandedMidlands* = #CSS_crewReport_DunaSrfLandedMidlands_01 // You look through the thickened glass and see small hills to the horizon.
        DunaSrfLandedLowlands* = #CSS_crewReport_DunaSrfLandedLowlands_00 // Dark spots on the surface of Duna were once thought to be the darkness of vegetation growing near the poles as the seasons change. It is now known that the dark coloration is in fact caused by seasonal dust storms.
        DunaSrfLandedLowlands* = #CSS_crewReport_DunaSrfLandedLowlands_01 // A monster dust devil winds its way across the plains in the distance, kicking up a trail of fine dust in its wake.
        DunaSrfLandedCraters* = #CSS_crewReport_DunaSrfLandedCraters_00 // Duna's surface seems to be covered with dunes. You remark that the planet was aptly-named.
        DunaSrfLandedCraters* = #CSS_crewReport_DunaSrfLandedCraters_01 // You look out and see the crater floor filled with sand sculpted into patterns by the wind currents.
        DunaSrfLandedHighlands* = #CSS_crewReport_DunaSrfLandedHighlands_00 // "It's extremely red; over."
        DunaSrfLandedHighlands* = #CSS_crewReport_DunaSrfLandedHighlands_01 // I spy with my little eye something beginning with "h".. yes, it's "hill".
        DunaSrfLandedHighlands* = #CSS_crewReport_DunaSrfLandedHighlands_02 // You write down 'red', 'bouldered', and 'dusty' in the logbook.
        DunaSrfLandedMidlandSea* = #CSS_crewReport_DunaSrfLandedMidlandSea_00 // The gentle winds on the lowland plains deposit a fine coating of dust on the window, turning the world even redder.
        DunaSrfLandedMidlandSea* = #CSS_crewReport_DunaSrfLandedMidlandSea_01 // "Goooood morning ladies and gentlekerbs, the weather outlook for today features highs of a nippy -5 degrees with the dust storm hazard level at medium-high. If you're going out, be sure to bundle up warm and always carry a respirator. This is Jeb, for KSWN."
        DunaSrfLandedNorthernBasin* = #CSS_crewReport_DunaSrfLandedNorthernBasin_00 // The red landscape outside the window doesn't look particularly inviting. Do you have to go out there?
        DunaSrfLandedNorthernBasin* = #CSS_crewReport_DunaSrfLandedNorthernBasin_01 // Sand starts to pile up on the window ledge. That's right, sand! Not dust for once!
        DunaSrfLandedSouthernBasin* = #CSS_crewReport_DunaSrfLandedSouthernBasin_00 // The ice is slowly creeping over the ancient lava field. You hope it doesn't creep over you, too.
        DunaSrfLandedSouthernBasin* = #CSS_crewReport_DunaSrfLandedSouthernBasin_01 // One side of the basin is mostly ice, the other is mostly rock. You check the map to see which side you landed on.
        DunaSrfLandedNorthernShelf* = #CSS_crewReport_DunaSrfLandedNorthernShelf_00 // You squint through the dust-are those mountains off in the distance? ...Those aren't mountains-they're canyon walls!
        DunaSrfLandedNorthernShelf* = #CSS_crewReport_DunaSrfLandedNorthernShelf_01 // With the craft now still, the red Dunaian sand starts to pile up on the window. You try to tap the window to knock it off, until a wind gust does that for you.
        DunaSrfLandedMidlandCanyon* = #CSS_crewReport_DunaSrfLandedMidlandCanyon_00 // The canyon walls here look...curvy. Odd.
        DunaSrfLandedMidlandCanyon* = #CSS_crewReport_DunaSrfLandedMidlandCanyon_01 // The chasm looks ominous from down here, like any self-respecting canyon should.
        DunaSrfLandedEasternCanyon* = #CSS_crewReport_DunaSrfLandedEasternCanyon_00 // The canyon is so huge and dusty you can't see the other wall. It makes you feel perticularly small. Well... OK, stop rubbing it in, Duna!
        DunaSrfLandedEasternCanyon* = #CSS_crewReport_DunaSrfLandedEasternCanyon_01 // The air is thick with dust down here, and the haze reduces visibility to a couple of hundred metres or so.
        DunaSrfLandedWesternCanyon* = #CSS_crewReport_DunaSrfLandedWesternCanyon_00 // This canyon looks pretty narrow and relatively dust free, letting you get a clear view of the walls.
        DunaSrfLandedWesternCanyon* = #CSS_crewReport_DunaSrfLandedWesternCanyon_01 // You imagine the canyon as a groove in a giant, red vinyl record. Actually, maybe music-loving aliens built this?
        DunaSrfLandedPolarHighlands* = #CSS_crewReport_DunaSrfLandedPolarHighlands_00 // You look out and see a network of tunnels running beneath the ice to a nearby hole, and try not to think about what this says about the ice.
        DunaSrfLandedPolarHighlands* = #CSS_crewReport_DunaSrfLandedPoalrHighlands_01 // The craft briefly slides and judders over the ice before coming to a stop. It takes a while to let go of the grip handles.
        DunaSrfLandedPolarCraters* = #CSS_crewReport_DunaSrfLandedPolarCraters_00 // You look out at the vast icy bowl in the landscape and dearly hope the EVA suits are climate controlled.
        DunaSrfLandedPolarCraters* = #CSS_crewReport_DunaSrfLandedPolarCraters_01 // The cabin radiator clicks on, dispelling the cold seeping into the craft.
        DunaFlyingLow* = #CSS_crewReport_DunaFlyingLow_00 // You really like Duna. It reminds you of chocolate pancakes.
        DunaFlyingLowPoles* = #CSS_crewReport_DunaFlyingLowPoles_00 // A scattering of tiny ice crystals flows past the window like dust particles.
        DunaFlyingLowPoles* = #CSS_crewReport_DunaFlyingLowPoles_01 // The pod window is cold to the touch. Better hope there's some mittens in the cupboard.
        DunaFlyingLowMidlands* = #CSS_crewReport_DunaFlyingLowMidlands_00 // The low red hills start to blend into one another in the distance. You rub your eyes.
        DunaFlyingLowMidlands* = #CSS_crewReport_DunaFlyingLowMidlands_01 // The planet looks very red, which reminds you of the red chicken you left in the astronaut complex fridge. You dearly hope it will still be there when you come back, because you ARE coming back. Right, Mission Control?
        DunaFlyingLowLowlands* = #CSS_crewReport_DunaFlyingLowLowlands_00 // The plains below are criscrossed with lines of disturbed sand, like sand-based crazy paving.
        DunaFlyingLowLowlands* = #CSS_crewReport_DunaFlyingLowLowlands_01 // You gaze at the planet, and realize you'll have no problems keeping your night vision.
        DunaFlyingLowCraters* = #CSS_crewReport_DunaFlyingLowCraters_00 // You shiver in your seat. Your thoughts turn to the glowing warmth of re-entry into Kerbin's atmosphere and you start to miss your family.
        DunaFlyingLowCraters* = #CSS_crewReport_DunaFlyingLowCraters_01 // You see the crater walls looming imposingly off in the distance. Whatver made this, it must have been a big ol' wallop.
        DunaFlyingLowHighlands* = #CSS_crewReport_DunaFlyingLowHighlands_00 // You think you see a face. Maybe it was a trick of the light... No, no... that's a face.
        DunaFlyingLowHighlands* = #CSS_crewReport_DunaFlyingLowHighlands_01 // You can get a good enough vantage point at the surface, why bother with coming up that little bit higher?
        DunaFlyingLowMidlandSea* = #CSS_crewReport_DunaFlyingLowMidlandSea_00 // You spot a towering column of dust far off in the distance. Wonder what that could be?
        DunaFlyingLowMidlandSea* = #CSS_crewReport_DunaFlyingLowMidlandSea_01 // There's a monster dust storm bearing down on your landing spot. Might not want to spend too much time there.
        DunaFlyingLowNorthernBasin* = #CSS_crewReport_DunaFlyingLowNorthernBasin_00 // The smell of the snacks you put on to warm up earlier starts to make you hungry at a bad time.
        DunaFlyingLowNorthernBasin* = #CSS_crewReport_DunaFlyingLowNorthernBasin_01 // In the low Duna gravity, things fly further. You know that because you just got hit in the face by a boot thrown at you by turbulence.
        DunaFlyingLowSouthernBasin* = #CSS_crewReport_DunaFlyingLowSouthernBasin_00 // A sudden gust of freezing wind almost blows the ship off course. Such are the hazards of being near the icy zones.
        DunaFlyingLowSouthernBasin* = #CSS_crewReport_DunaFlyingLowSouthernBasin_01 // You want to do a barrel roll, until you realise KSC is closely monitoring all craft telemetry and you'd rather keep your job when you return.
        DunaFlyingLowNorthernShelf* = #CSS_crewReport_DunaFlyingLowNorthernShelf_00 // The huge scar scraped out of the surface stretches all the way to the reddish, hazy horizon.
        DunaFlyingLowNorthernShelf* = #CSS_crewReport_DunaFlyingLowNorthernShelf_01 // A powerful gust of wind shakes the capsule violently and a long-forgotten snack falls out of the overhead locker.
        DunaFlyingLowMidlandCanyon* = #CSS_crewReport_DunaFlyingLowMidlandCanyon_00 // This one will take some landing skill. You try to pick out a spot that isn't too steeply sloping.
        DunaFlyingLowMidlandCanyon* = #CSS_crewReport_DunaFlyingLowMidlandCanyon_01 // You can't see much more from here, as the canyon curves out of your view.
        DunaFlyingLowEasternCanyon* = #CSS_crewReport_DunaFlyingLowEasternCanyon_00 // There's so much dust you can barely see the ground. You're flying blind with only the altimeter to tell you of the nearby ground.
        DunaFlyingLowEasternCanyon* = #CSS_crewReport_DunaFlyingLowEasternCanyon_01 // The dust clouds roil past the window, as though the very air is alive with sand.
        DunaFlyingLowWesternCanyon* = #CSS_crewReport_DunaFlyingLowWesternCanyon_00 // You look down, and hope you don't land on one of the steep walls. That would be... problematic.
        DunaFlyingLowWesternCanyon* = #CSS_crewReport_DunaFlyingLowWesternCanyon_01 // The canyon stretches off to the hazy horizon in both directions. You feel like you've said something similar before.
        DunaFlyingLowPolarHighlands* = #CSS_crewReport_DunaFlyingLowPolarHighlands_00 // The icy hills stretch out in all directions beneath you. The ice glare makes it difficult to look down.
        DunaFlyingLowPolarHighlands* = #CSS_crewReport_DunaFlyingLowPolarHighlands_01 // You find a page in the safety manual on how to deal with space polar bear attacks. Unfortunately, all it says is "run away".
        DunaFlyingLowPolarCraters* = #CSS_crewReport_DunaFlyingLowPolarCraters_00 // All you can see is pinkish ice to the horizon, albeit lacking the dust haze of the lower latitudes.
        DunaFlyingLowPolarCraters* = #CSS_crewReport_DunaFlyingLowPolarCraters_01 // You fumble around the glovebox for a pair of sunglasses to protect from the ice glare, which is strong even in the weak Dunaian sun.
        DunaFlyingHigh* = #CSS_crewReport_DunaFlyingHigh_00 // There seems to be something resembling a face on the surface of a planet, but it's only a play of light and shadow.
        DunaFlyingHigh* = #CSS_crewReport_DunaFlyingHigh_01 // The faint whistle of the the thin air around the capsule is almost relaxing.
        DunaFlyingHigh* = #CSS_crewReport_DunaFlyingHigh_02 // You look outside to try and spot Duna's version of the "thin blue line", but there is none to be seen.
        DunaInSpaceLow* = #CSS_crewReport_DunaInSpaceLow_00 // Can it be Kerbiformed?
        DunaInSpaceLow* = #CSS_crewReport_DunaInSpaceLow_01 // Duna. Kerbin's small, failed twin. The thought of what it could have been makes you sad.
        DunaInSpaceLow* = #CSS_crewReport_DunaInSpaceLow_02 // As you orbit the planet, you pick up what appears to be a TV signal from Kerbin. It's so badly distorted that you can't make neither head nor tail of it.
        DunaInSpaceHigh* = #CSS_crewReport_DunaInSpaceHigh_00 // The crew is concerned that the planet is "too red". Mission Control does not believe this is a good reason to go home.
        DunaInSpaceHigh* = #CSS_crewReport_DunaInSpaceHigh_01 // Hopefully wherever you are is out of the grasping graviational claws of Ike.
        DunaInSpaceHigh* = #CSS_crewReport_DunaInSpaceHigh_02 // Is it a big tomato?

        IkeSrfLandedPolarLowlands* = #CSS_crewReport_IkeSrfLandedPolarLowlands_00 // Well, we're down in the big black bowl, the big black bowl...
        IkeSrfLandedPolarLowlands* = #CSS_crewReport_IkeSrfLandedPolarLowlands_01 // The high walls of the polar depression throw long shadows over the already-dark ground outside.
        IkeSrfLandedMidlands* = #CSS_crewReport_IkeSrfLandedMidlands_00 // You ask Mission Control what you're doing here.
        IkeSrfLandedMidlands* = #CSS_crewReport_IkeSrfLandedMidlands_01 // You're not so sure you like Ike any more.
        IkeSrfLandedEasternMountainRidge* = #CSS_crewReport_IkeSrfLandedEasternMountainRidge_00 // Every moon has two sides, and you feel like you landed on the right one.
        IkeSrfLandedEasternMountainRidge* = #CSS_crewReport_IkeSrfLandedEasternMountainRidge_01 // Even here, Duna is still peeking above the horizon to watch you.
        IkeSrfLandedWesternMountainRidge* = #CSS_crewReport_IkeSrfLandedWesternMountainRidge_00 // That bit of ground looks wobbly. Maybe the Lowlands would have been a more stable place to land?
        IkeSrfLandedWesternMountainRidge* = #CSS_crewReport_IkeSrfLandedWesternMountainRidge_01 // You're itching to get out of the capsule and jump around on the mountain.
        IkeSrfLandedLowlands* = #CSS_crewReport_IkeSrfLandedLowlands_00 // You see a green blur outside, and hope it isn't the kraken.
        IkeSrfLandedLowlands* = #CSS_crewReport_IkeSrfLandedLowlands_01 // The ground is dark, and the sky is dark. Did we actually land?
        IkeSrfLandedSouthEasternMountainRange* = #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_00 // More grey mountains. How exciting.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_01 // These mountains are big. You look out and see them rising to the stars around you.
        IkeSrfLandedSouthPole* = #CSS_crewReport_IkeSrfLandedSouthPole_00 // You plant your foot on a smooth patch on the floor and almost slide over. You thank Ike's low gravity.
        IkeSrfLandedSouthPole* = #CSS_crewReport_IkeSrfLandedSouthPole_01 // By now, you're starting to think the grey of the surface has leached the colour from your vision. You hope you don't turn grey yourself.
        IkeSrfLandedCentralMountainRange* = #CSS_crewReport_IkeSrfLandedCentralMountainRange_00 // You could sit in here forever, watching the dust storms roll across the Dunaian surface far away through the thickened glass.
        IkeSrfLandedCentralMountainRange* = #CSS_crewReport_IkeSrfLandedCentralMountainRange_01 // You crane your neck against the window, trying to get a glimpse of Duna.
        IkeInSpaceLow* = #CSS_crewReport_IkeInSpaceLow_00 // Ike looks dark and foreboding. Can we go to Duna instead?
        IkeInSpaceLow* = #CSS_crewReport_IkeInSpaceLow_01 // Some of those mountains reach up pretty darn high. You make sure to check the altimeter.
        IkeInSpaceHigh* = #CSS_crewReport_IkeInSpaceHigh_00 // You ask Mission Control if they, too, like Ike.
        IkeInSpaceHigh* = #CSS_crewReport_IkeInSpaceHigh_01 // There's Ike, though the thick glass of the capsule window. You're not sure if you like it.

        DresSrfLanded* = #CSS_crewReport_DresSrfLanded_00 // You were right... it does, in fact, seem to be a giant potato.
        DresSrfLandedHighlands* = #CSS_crewReport_DresSrfLandedHighlands_00 // It is exactly as gray and icy as expected. Not a bit of gray less, not a bit of ice more.
        DresSrfLandedImpactEjecta* = #CSS_crewReport_DresSrfLandedImpactEjecta_00 // You see scorch marks and are reminded of back home at the KSC.
        DresSrfLandedCanyons* = #CSS_crewReport_DresSrfLandedCanyons_00 // You bask in the knowledge that you have successfully landed on the Mun. Wait.
        DresInSpaceLow* = #CSS_crewReport_DresInSpaceLow_00 // It's very gray and icy down there. The VAB team is going to use this to lobby for better gray-resistant landing legs.
        DresInSpaceLow* = #CSS_crewReport_DresInSpaceLow_01 // This looks too small to be a planet.
        DresInSpaceLow* = #CSS_crewReport_DresInSpaceLow_02 // You see debris from what looks like an impact...
        DresInSpaceHigh* = #CSS_crewReport_DresInSpaceHigh_00 // You see what appears to be burn marks, and suddenly feel bad for Dres.
        DresInSpaceHigh* = #CSS_crewReport_DresInSpaceHigh_01 // After noticing a large cut across Dres' surface, you wonder if any band-aids in the first aid kit are big enough.
        DresInSpaceHigh* = #CSS_crewReport_DresInSpaceHigh_02 // Watching the planet turn beneath you, you miss home.

        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_00 // You can feel the green all around you now. This is awesome.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_01 // This seems like a situation Jebediah would like to be in, just with more SRBs and explosions.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_02 // As you look up through the stormy green clouds, it strikes you that maybe flying that low in Jool's atmosphere wasn't such a good idea.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_03 // The craft is shaking and feels very unstable.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_04 // You realize you are not a probe.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_05 // Your aerobraking attempt has turned into an aero landing. Was this part of the plan?
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_06 // Mission Control asks for a report, but all you can picture is a giant valedictory explosion.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_07 // You may have gotten yourself into a bit of a pickle.
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_08 // Landing on Jool, eh? Why not?
        JoolFlyingLow* = #CSS_crewReport_JoolFlyingLow_09 // Still no sign of a surface. Perhaps if you flew even lower?
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_00 // While observing from the window you get startled as Jool seems to look back at you! After a moment of confusion you find out that it was your face reflecting from the window and comment on the screams to have been "only radio chatter".
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_01 // As the craft flies through the dense green clouds, it slows down dramatically. Just don't get stuck.
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_02 // It's more than disconcerting to see clouds in all directions.
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_03 // You see a massive lightning bolt in the far off clouds. You nervously ask Mission Control if the ship is rated for that kind of discharge.
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_04 // The planet before you resembles nothing so much as a giant tennis ball. Perhaps it has fuzz that can be harvested to build a space elevator?
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_05 // You look out the window and are amazed by the view.
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_06 // You wonder if you will live to see the next hour.
        JoolFlyingHigh* = #CSS_crewReport_JoolFlyingHigh_07 // You hope the aerobrake won’t be an aero landing.
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_00 // You wonder if orange juice here is green.
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_01 // The green color of the atmosphere reminds you of the soft grass of Kerbin. Sort of.
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_02 // You note just how big Jool is, and try not to think about how small it makes you feel.
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_03 // The massive size of the Van Allen radiation belts is ripping electrons from the ship's hull. You carefully avoid the walls, avoiding to be zapped with the mother of all static discharges.
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_04 // Maybe you'd be able to get a sample of metallic hydrogen before the inevitable crunch?
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_05 // The green orb is looking very big now.
        JoolInSpaceLow* = #CSS_crewReport_JoolInSpaceLow_06 // As you look down upon the great green planet, you think you can see a stirring of the clouds far, far below.
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_00 // You see three big moons and two little ones. You want to land on them all.
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_01 // Captain's log: "We are out of snacks."
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_02 // We're very far from home.
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_03 // Glancing out the viewport, you see a gray disc blitz by. You start to think you are not alone.
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_04 // As you ponder at the planet's hue you are reminded that green is the color preferred most by geniuses.
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_05 // You think about Jool's radiation belts and are wondering if you're still alive.
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_06 // Suprisingly, the radiation here is only 1.5 MR/hr. Oh wait, that's a capital M...
        JoolInSpaceHigh* = #CSS_crewReport_JoolInSpaceHigh_07 // It's not 3 Roentgens. It's 1,500,000 Roentgens.

        LaytheSrfLanded* = #CSS_crewReport_LaytheSrfLanded_00 // You miss your family. You begin to write a postcard.
        LaytheSrfLandedPoles* = #CSS_crewReport_LaytheSrfLandedPoles_00 // One day we will have a permanent base here. One day.
        LaytheSrfLandedShores* = #CSS_crewReport_LaytheSrfLandedShores_00 // It appears that we are very much on the ground right now.
        LaytheSrfLandedDunes* = #CSS_crewReport_LaytheSrfLandedDunes_00 // You wonder if you just could sit on the beach, relax, and have a margarita.
        LaytheSrfLandedCrescentBay* = #CSS_crewReport_LaytheSrfLandedCrescentBay_00 // After hearing the air is breathable, you open your space helmet, only to find that breathable does not mean odorless or pleasant.
        LaytheSrfLandedTheSagenSea* = #CSS_crewReport_LaytheSrfLandedTheSagenSea_00 // As you look out the window, you see something glowing below you. You decide it's probably best to get to shore as soon as possible.
        LaytheSrfSplashed* = #CSS_crewReport_LaytheSrfSplashed_00 // Looking at the map of Laythe to figure out which of the islands is the closest, you know it'll be a long swim for any chance of rescue.
        LaytheSrfSplashedCrescentBay* = #CSS_crewReport_LaytheSrfSplashedCrescentBay_00 // You suddenly realize that you forgot to bring your towel.
        LaytheSrfSplashedTheSagenSea* = #CSS_crewReport_LaytheSrfSplashedTheSagenSea_00 // You wish you had brought a boat.
        LaytheSrfSplashedTheSagenSea* = #CSS_crewReport_LaytheSrfSplashedTheSagenSea_00 // You thought you saw something moving in the water. Leaving the capsule might not be a good idea.
        LaytheFlyingLow* = #CSS_crewReport_LaytheFlyingLow_00 // Are you sure we aren't on Kerbin?
        LaytheFlyingLowPoles* = #CSS_crewReport_LaytheFlyingLowPoles_00 // You started daydreaming about being the captain of the Space Battleship 'Spirit of Kerbin', until being woken up by a beeping sound.
        LaytheFlyingLowShores* = #CSS_crewReport_LaytheFlyingLowShores_00 // The ocean looks inviting. You realize that you forgot your swimsuit. Oh well, Mission Control would never have approved.
        LaytheFlyingLowDunes* = #CSS_crewReport_LaytheFlyingLowDunes_00 // The crew deliberates heavily on the correct way to pronounce 'Laythe'.
        LaytheFlyingLowCrescentBay* = #CSS_crewReport_LaytheFlyingLowCrescentBay_00 // The atmosphere appears to have blocked most of Jool's radiation at this altitude. You hope your tan doesn't suffer as a result.
        LaytheFlyingLowTheSagenSea* = #CSS_crewReport_LaytheFlyingLowTheSagenSea_00 // You look at the moon below and feel homesick.
        LaytheFlyingHigh* = #CSS_crewReport_LaytheFlyingHigh_00 // Readings for alpha and beta radiation are low here, but there are still elevated readings for X-Rays and gamma radiation.
        LaytheInSpaceLow* = #CSS_crewReport_LaytheInSpaceLow_00 // Your radiation instruments are showing some strange results. Perhaps Laythe has a magnetic field that is interacting with Jool's.
        LaytheInSpaceLow* = #CSS_crewReport_LaytheInSpaceLow_01 // You start to think how lucky you are that the Radiation Belt DLC for life isn't out yet.
        LaytheInSpaceHigh* = #CSS_crewReport_LaytheInSpaceHigh_00 // The radiation here must be intense. You are glad the cockpit of your spacecraft is heavily shielded.
        LaytheInSpaceHigh* = #CSS_crewReport_LaytheInSpaceHigh_01 // As you gaze at Laythe, you begin to wonder whether Kerbin is the only planet harboring life.
        LaytheInSpaceHigh* = #CSS_crewReport_LaytheInSpaceHigh_02 // As the crew look down upon Laythe, they are reminded of home and the huge distance they have traveled.
        LaytheInSpaceHigh* = #CSS_crewReport_LaytheInSpaceHigh_03 // You know this blue liquid can't be water. This moon is outside the habatible zone. 

        VallSrfLanded* = #CSS_crewReport_VallSrfLanded_00 // Quakes rattle tools and loose gear every few minutes.
        VallSrfLandedMidlands* = #CSS_crewReport_VallSrfLandedMidlands_00 // You note that Vall is "Cold, desolate... lonely." Mission Control tells you to quit being so melodramatic.
        VallSrfLandedHighlands* = #CSS_crewReport_VallSrfLandedHighlands_00 // You can't wait to go outside. It looks so beautiful!
        VallSrfLandedLowlands* = #CSS_crewReport_VallSrfLandedLowlands_00 // Everything in the ship just bounced, that was one heck of a quake!
        VallInSpaceLow* = #CSS_crewReport_VallInSpaceLow_00 // Staring out the window, you realize how blue the moon is.
        VallInSpaceLow* = #CSS_crewReport_VallInSpaceLow_01 // The surface looks broken by eons of geological activity.
        VallInSpaceLow* = #CSS_crewReport_VallInSpaceLow_02 // As you stare, something stirs inside you. You make a note to cook your food more carefully next time.
        VallInSpaceHigh* = #CSS_crewReport_VallInSpaceHigh_00 // As you take your notes, you notice that Vall can fit in the hole of your clipboard.
        VallInSpaceHigh* = #CSS_crewReport_VallInSpaceHigh_01 // You can swear you saw a black formation near the south pole, but you lost it before you could grab the binoculars.
        VallInSpaceHigh* = #CSS_crewReport_VallInSpaceHigh_02 // The moon is a beautiful mosaic of blue and white.
        VallInSpaceHigh* = #CSS_crewReport_VallInSpaceHigh_03 // You wonder why this moon’s inclination is exactly the same as Vall's.

        TyloSrfLanded* = #CSS_crewReport_TyloSrfLanded_00 // You feel surprisingly light.
        TyloSrfLandedHighlands* = #CSS_crewReport_TyloSrfLandedHighlands_00 // The gravity is quite heavy and reminds you of home.
        TyloSrfLandedLowlands* = #CSS_crewReport_TyloSrfLandedLowlands_00 // You can't walk a few meters without your face becoming friends with the surface. It is a little agitating.
        TyloSrfLandedMara* = #CSS_crewReport_TyloSrfLandedMara_00 // You congratulate yourself on getting down here without excessive lithobraking. You then begin calculating your delta-V to see if you can get home.
        TyloInSpaceLow* = #CSS_crewReport_TyloInSpaceLow_00 // You wonder why, despite its size, Tylo doesn't have an atmosphere.
        TyloInSpaceLow* = #CSS_crewReport_TyloInSpaceLow_01 // The crew wonders why they even need to land on this miserable rock.
        TyloInSpaceHigh* = #CSS_crewReport_TyloInSpaceHigh_00 // Was this orbit intentional, or is Mission Control hiding something from you?
        TyloInSpaceHigh* = #CSS_crewReport_TyloInSpaceHigh_01 // It's like Kerbin, but without all the cool stuff like an atmosphere, oceans, or tectonic plates. Okay, so it's not like Kerbin at all.

        BopSrfLanded* = #CSS_crewReport_BopSrfLanded_00 // The landing legs sink into the surface and make a squelching sound.
        BopSrfLandedPeaks* = #CSS_crewReport_BopSrfLandedPeaks_00 // I can see Kerbin from here! I wish I had a telescope...
        BopSrfLandedPeaks* = #CSS_crewReport_BopSrfLandedPeaks_01 // Mission Control tells you that the amazing vista you see is just an optical illusion. You take some picture anyway.
        BopSrfLandedRidges* = #CSS_crewReport_BopSrfLandedRidges_00 // You hear an odd noise on the radio, most probably caused by radiation from the host planet.
        BopSrfLandedPoles* = #CSS_crewReport_BopSrfLandedPoles_00 // You're not sure why, but this place gives you an eerie feeling.
        BopSrfLandedSlopes* = #CSS_crewReport_BopSrfLandedSlopes_00 // From here Bop looks entirely untrustworthy.
        BopSrfLandedValley* = #CSS_crewReport_BopSrfLandedValley_00 // You smell squid. The pilot must be eating sushi. What else could it be?
        BopInSpaceLow* = #CSS_crewReport_BopInSpaceLow_00 // You wonder if Twist and Pull are around here somewhere?
        BopInSpaceLow* = #CSS_crewReport_BopInSpaceLow_01 // You stare out of the window, only to see some rough, jagged terrain that fails to please the eye.
        BopInSpaceLow* = #CSS_crewReport_BopInSpaceLow_02 // Bop looks unremarkable. TOO unremarkable. Surely it's hiding some dark secret...
        BopInSpaceLow* = #CSS_crewReport_BopInSpaceLow_03 // That mountain high enough to hit you. You hope you are landing.
        BopInSpaceLow* = #CSS_crewReport_BopInSpaceLow_04 // Last time we went to Gilly, we did not come back... oh? This is Bop?
        BopInSpaceHigh* = #CSS_crewReport_BopInSpaceHigh_00 // This rock looks completely unremarkable. You have an uneasy feeling about it, most probably because you’ve been out of tasty snacks for the last six months.
        BopInSpaceHigh* = #CSS_crewReport_BopInSpaceHigh_01 // The captured asteroid looks like a big brown potato. You can't help but wonder if changing inclination was worth the trouble.
        BopInSpaceHigh* = #CSS_crewReport_BopInSpaceHigh_02 // Stuck in an eccentric, inclined orbit, this rock offers nothing to look at. A complete waste of time.
        BopInSpaceHigh* = #CSS_crewReport_BopInSpaceHigh_03 // Bop looks remarkably like a potato from this height.
        BopInSpaceHigh* = #CSS_crewReport_BopInSpaceHigh_04 // Mission Control informs you that that no, that is not a potato outside your window.
        BopInSpaceHigh* = #CSS_crewReport_BopInSpaceHigh_05 // You realize that that mountain is remarkably high.

        PolSrfLanded* = #CSS_crewReport_PolSrfLanded_00 // The crew has been reduced to excessive sneezing.
        PolSrfLandedPoles* = #CSS_crewReport_PolSrfLandedPoles_00 // You can't help but giggle realizing that you've landed on the pole of Pol. Mission Control is not amused.
        PolSrfLandedLowlands* = #CSS_crewReport_PolSrfLandedLowlands_00 // You are happy that landing is over.
        PolSrfLandedHighlands* = #CSS_crewReport_PolSrfLandedHighlands_00 // You wonder if you can bring back some pol for your garden on Kerbin.
        PolInSpaceLow* = #CSS_crewReport_PolInSpaceLow_00 // Turns out Pol is real, and not just a speck of pollen on the lens of Galileo Kerman's telescope. Who knew?
        PolInSpaceLow* = #CSS_crewReport_PolInSpaceLow_01 // Just looking at the surface makes you sneeze.
        PolInSpaceHigh* = #CSS_crewReport_PolInSpaceHigh_00 // You wipe off the window to make sure that speck you see is not a piece of pollen.

        EelooSrfLanded* = #CSS_crewReport_EelooSrfLanded_00 // You wonder about the ship that got you here. Are you really sure you can get back?
        EelooSrfLanded* = #CSS_crewReport_EelooSrfLanded_01 // As you trip and fall on a very small rock, you begin to lose feeling in your arms. Terrified of the sub zero temperatures, you look down and realize you've been laying on them.
        EelooSrfLanded* = #CSS_crewReport_EelooSrfLanded_02 // You feel cold.
        EelooSrfLanded* = #CSS_crewReport_EelooSrfLanded_03 // You feel very cold.
        EelooSrfLanded* = #CSS_crewReport_EelooSrfLanded_04 // You feel very hot. The physician diagnoses you with extreme hypothermia. Then you realize you hallucinated the physician.
        EelooSrfLandedPoles* = #CSS_crewReport_EelooSrfLandedPoles_00 // You look out the windows and see ice. Lots and lots of ice. And some rocks here and there. Icy rocks.
        EelooSrfLandedNorthernGlaciers* = #CSS_crewReport_EelooSrfLandedNorthernGlaciers_00 // From this far away, the radio seems to be a bit patchy. You can hear static blocking out your next instructions. Oh well, it probably wasn't important anyway.
        EelooSrfLandedLowlands* = #CSS_crewReport_EelooSrfLandedLowlands_00 // You report that Eeloo is "distant and lonely". Mission Control is not happy and demands more information.
        EelooSrfLandedHighlands* = #CSS_crewReport_EelooSrfLandedHighlands_00 // You take notes on how barren and lonely Eeloo is. You then try to calculate how long it will take for the signal to get to and from Kerbin.
        EelooSrfLandedIceCanyons* = #CSS_crewReport_EelooSrfLandedIceCanyons_00 // It seems you have eaten all of your snacks. You start weeping quietly in the corner.
        EelooSrfLandedIceCanyons* = #CSS_crewReport_EelooSrfLandedIceCanyons_01 // It's cold here.
        EelooSrfLandedCraters* = #CSS_crewReport_EelooSrfLandedCraters_00 // You look out of the capsule and can't find Kerbin. What has mission control gotten you into this time?
        EelooSrfLandedMidlands* = #CSS_crewReport_EelooSrfLandedMidlands_00 // You wonder what's beneath the ice...
        EelooInSpaceLow* = #CSS_crewReport_EelooInSpaceLow_00 // You note that the capsule is not equipped with central heating, and Mission Control informs you this is because you were meant to go to Moho. This does not instill you with confidence.
        EelooInSpaceLow* = #CSS_crewReport_EelooInSpaceLow_01 // For a moment, you can't quite remember which star is your sun.
        EelooInSpaceLow* = #CSS_crewReport_EelooInSpaceLow_02 // I feel like we could go anywhere. Let's go. Like, now. Really, anywhere.
        EelooInSpaceLow* = #CSS_crewReport_EelooInSpaceLow_03 // The crew look out towards the frozen ice ball Eeloo, and are momentarily lost for words. Few of Kerbal-kind have made it this far from home, and the courage, determination, and drive their species has to put them here dawns on everyone. Their thoughts are profound and humble, that so few are supported by so many.
        EelooInSpaceLow* = #CSS_crewReport_EelooInSpaceLow_04 // Eeloo's sleek surface reminds you of home's ice caps. After some thinking about your distance from home, you go to sleep.
        EelooInSpaceLow* = #CSS_crewReport_EelooInSpaceLow_05 // You're beginning to regret not bringing along the extra bag of snacks.
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_00 // The orbit of Eeloo being so odd, you begin to ponder the existence of a planet beyond it. You think a good name for this planet would be "Planet Y".
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_01 // You look out the window and notice beige stripes and spots on the surface. You immediately wonder if it's cookie dough.
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_02 // It reminds you of a snowball. Is it winter already?
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_03 // It looks like a great big spherical ice cube!
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_04 // Now this is an icy planet. You start imagining epic snowball fights in micro-gravity.
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_05 // Eeloo looks very white; maybe someone covered it in a giant bed sheet?
        EelooInSpaceHigh* = #CSS_crewReport_EelooInSpaceHigh_06 // As you stare down at the splintered, lifeless surface, a question forms in your mind: "Was this really worth it?"
    }
}