		CaireenInSpaceLowMidlands* = #GEPscience_bd_camera_CaireenInSpaceLowMidlands_00 // The midlands appear as uneven terrain with long shadows that exaggerate every bump. You start a map and realize you’re basically photographing a really grumpy potato.
