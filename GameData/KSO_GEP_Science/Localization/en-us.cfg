        #GEPscience_bd_oso_GrannusInSpaceLow_00 = The sensors saturate in a deep red glare; the radiation counter files a complaint and the shutters snap shut.
        #GEPscience_bd_oso_GrannusInSpaceLow_01 = A “quiet” flare rolls past and still kicks the instrument into safe-mode. Your data packet waits its turn in the long return queue.
        #GEPscience_bd_oso_GrannusInSpaceHigh_00 = Even from up here, Grannus is an angry ruby that keeps trying to cook your panels one photon at a time.
        #GEPscience_bd_oso_GrannusInSpaceHigh_01 = Long-baseline readings show slow, heavy pulses of activity. Mission Control requests “less poetry, more numbers” and receives both.
        #GEPscience_bd_oso_TaranisInSpaceLow_00 = The day side reflects heat like a forge mirror; the solar spectrum comes back sharp, hot, and slightly insulting.
        #GEPscience_bd_oso_TaranisInSpaceLow_01 = Crossing into the night hemisphere, the flux graph falls off a cliff. The sudden silence is almost worse than the glare.
        #GEPscience_bd_oso_TaranisInSpaceHigh_00 = From high orbit, Taranis looks like a coin split between ember and ink, and neither side offers much shelter from the particle stream.
        #GEPscience_bd_oso_TaranisInSpaceHigh_01 = The readings alternate between “too much” and “not enough” as the orbit watches the same brutal day-night divide repeat.
        #GEPscience_bd_oso_ToutatisInSpaceLow_00 = Over the twilight band, the thin air adds a faint smear to the measurements—like somebody breathed on the sensor window.
        #GEPscience_bd_oso_ToutatisInSpaceLow_01 = The baked side dumps heat upward while the dark side contributes mostly static and uncomfortable graphs.
        #GEPscience_bd_oso_ToutatisInSpaceHigh_00 = Grannus is a dim red point from here, but the radiation counter refuses to accept the word “dim.”
        #GEPscience_bd_oso_ToutatisInSpaceHigh_01 = Subtle scattering from Toutatis’ near-vacuum shows up in the data. Mission Control asks if you can “turn the sun down.” You pretend to try.
        #GEPscience_bd_oso_NodensInSpaceLow_00 = The red sun’s spectrum comes back with big bites missing where Nodens’ thick air drinks it in. The graph looks like it has teeth.
        #GEPscience_bd_oso_NodensInSpaceLow_01 = The planet’s clouds throw back a dull, rusty glare; the sensors keep asking if you parked too close. You did.
        #GEPscience_bd_oso_NodensInSpaceHigh_00 = From high orbit, Nodens’ magnetic shielding shows up as a broad, steady “not as bad as it could be.” Everyone celebrates responsibly.
        #GEPscience_bd_oso_NodensInSpaceHigh_01 = The long integration run finishes, then spends even longer waiting in the transmission queue. Distance adds latency to everything, even excitement.
        #GEPscience_bd_oso_BelisamaInSpaceLow_00 = The locked day side bakes under a dim crimson lamp while the night side stays stubbornly cold. The data is half blaze, half void.
        #GEPscience_bd_oso_BelisamaInSpaceLow_01 = A Nodens eclipse cuts the solar signal like a knife. The instrument logs it as “unexpected darkness event,” which feels accurate.
        #GEPscience_bd_oso_BelisamaInSpaceHigh_00 = With only a weak field, the readings jitter whenever the star exhales. Mission Control recommends “less star, more calm.”
        #GEPscience_bd_oso_BelisamaInSpaceHigh_01 = High above, Belisama and Nodens move like a paired clockwork. The sun’s output ticks against them with unsettling regularity.
