// Camera experiment canonicalization priority: Bluedog_DB > Tantares > TantaresSP
// Canon IDs:
// - Bluedog_DB:  bd_ALSEP_LRRR
// - Tantares:    tantares_laser_reflector
// - TantaresSP:  tantares_sp_laser_reflector


// --- Tier 1: Bluedog_DB present -> everything -> bd_ALSEP_LRRR
@PART:HAS[@MODULE:HAS[#experimentID[tantares_laser_reflector]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_laser_reflector]]
  { @experimentID = bd_ALSEP_LRRR }
}
@PART:HAS[@MODULE:HAS[#experimentID[tantares_sp_laser_reflector]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_sp_laser_reflector]]
  { @experimentID = bd_ALSEP_LRRR }
}

// remove duplicates under Bluedog_DB
!EXPERIMENT_DEFINITION:HAS[#id[tantares_laser_reflector]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_laser_reflector]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}


// --- Tier 2: Tantares present, Bluedog_DB absent -> TantaresSP -> tantares_laser_reflector
@PART:HAS[@MODULE:HAS[#experimentID[tantares_sp_laser_reflector]]]:NEEDS[Tantares,!Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_sp_laser_reflector]]
  { @experimentID = tantares_visible_light_camera }
}

// remove duplicates under Tantares
!EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_laser_reflector]]:NEEDS[Tantares,!Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
