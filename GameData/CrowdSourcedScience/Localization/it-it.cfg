        #CSS_seismicScan_PolSrfLandedMidlands_00 = Il sensore registra vibrazioni molto deboli, che potrebbero fornire un indizio sul perché Pol sia così sbriciolato.
        #CSS_seismicScan_EelooSrfLanded_00 = C'è un leggero terremoto ogni tanto, ma non molta attività degna di nota.
