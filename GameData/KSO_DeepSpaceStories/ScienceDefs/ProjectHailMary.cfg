@EXPERIMENT_DEFINITION:HAS[#id[bd_oso|bd_atm]]
{
    %RESULTS
    {
        KerbinInSpaceLow* = #DSS_PHM_bd_oso_KerbinInSpaceLow_00 // The solar image contains a few tiny black specks drifting across Kerbol's photosphere. The cleaning checklist now includes "wipe lens, then panic quietly."
        KerbinInSpaceLow* = #DSS_PHM_bd_oso_KerbinInSpaceLow_01 // The dots persist after recalibration, refocusing, and one firm tap from Bill. They are either real, or the instrument has developed very dramatic dust.
        KerbinInSpaceLow* = #DSS_PHM_bd_oso_KerbinInSpaceLow_02 // Several specks cross brighter regions without glinting. That is rude behavior for ordinary particles.
        KerbinInSpaceLow* = #DSS_PHM_bd_oso_KerbinInSpaceLow_03 // The dark flecks seem to absorb light rather than reflect it. Mission Control asks if Kerbol is supposed to have crumbs.
        KerbinInSpaceHigh* = #DSS_PHM_bd_oso_KerbinInSpaceHigh_00 // Long-duration images show more dots than the first pass recorded. The telescope has not gotten dirtier, which is less comforting than expected.
        KerbinInSpaceHigh* = #DSS_PHM_bd_oso_KerbinInSpaceHigh_01 // The specks gather where Kerbol is brightest, like tiny snack-seeking tourists with no regard for stellar safety rules.
        KerbinInSpaceHigh* = #DSS_PHM_bd_oso_KerbinInSpaceHigh_02 // Photometry shows small bites missing from the solar output. Nobody says "bites" in the report, but everyone thinks it very loudly.
        KerbinInSpaceHigh* = #DSS_PHM_bd_oso_KerbinInSpaceHigh_03 // The dark swarm is denser than before, and Kerbol is fractionally dimmer in exactly the wrong way. Gene requests a second copy of the data and a much larger cup of coffee.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_IRradiometer]]
{
    %RESULTS
    {
        SunInSpaceLow* = #DSS_PHM_bd_IRradiometer_SunInSpaceLow_00 // The infrared signal includes strong emission inconsistent with ordinary Kerbolar plasma. The instrument insists this is not a snack crumb, unless the snack is hotter than the oven.
        SunInSpaceLow* = #DSS_PHM_bd_IRradiometer_SunInSpaceLow_01 // Localized heat pockets drift across the image without following the plasma flow. Mission Control files this under "moving hot dots" until someone invents a less worrying category.
        SunInSpaceLow* = #DSS_PHM_bd_IRradiometer_SunInSpaceLow_02 // Several dark specks flare brightly in infrared after crossing the photosphere. They appear to be eating light and burping heat, which is not currently in the manual.
        SunInSpaceLow* = #DSS_PHM_bd_IRradiometer_SunInSpaceLow_03 // The detector records tiny objects storing and releasing energy in bursts. Their energy density is much too high for chemical fuel, and Bob has gone very quiet.
        SunInSpaceHigh* = #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_00 // Infrared tracking shows the warm spots moving independently of Kerbol's surface rotation. That is exciting, provided excitement includes a little dread.
        SunInSpaceHigh* = #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_01 // The thermal spectrum suggests compact energy reservoirs orders of magnitude beyond known propellants. Wernher asks whether "known" is negotiable.
        SunInSpaceHigh* = #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_02 // The swarm's infrared output rises after exposure to direct starlight, then falls in neat pulses. It looks less like heating and more like charging.
        SunInSpaceHigh* = #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_03 // The readout implies a harvestable energy cycle, if anyone can collect the dots without becoming part of their lunch route.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[infraredTelescope]]
{
    %RESULTS
    {
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_00 // Several distant stars show the same slow infrared drift and dimming pattern. The telescope labels them "probably not fine," which is unusually emotional for a telescope.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_01 // Long-baseline observations confirm that some stars are fading in a very familiar way. Bob underlines "familiar" three times and then stops smiling.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_02 // Other stars remain stable across the full observation period, bright and stubbornly normal. Mission Control is now very interested in why they are being so unhelpfully healthy.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_03 // The dimming stars share a subtle excess infrared signature, as though something is converting stolen light into waste heat. That sentence makes everyone in the room need a snack.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_04 // A few nearby stellar systems show no measurable decline at all. Either they are naturally resistant, or something out there is doing a much better job than we are.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_05 // The stable targets do not match the unstable ones in temperature, age, or color. The unknown mechanism has failed to be polite enough to follow one simple rule.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_06 // The survey map now has two categories: stars getting dimmer, and stars that should be investigated immediately before they start getting dimmer too.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_07 // Mission directive updated: prioritize stable systems for follow-up observation. Gene adds that this is not panic, it is "strategic looking."
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[infraredTelescope]]:NEEDS[GEP]
{
    %RESULTS
    {
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP00 // The telescope detects an Astrophage-like infrared signature around Grannus, but the star's luminosity remains stubbornly constant. Bob checks the graph upside down, then quietly turns it back over.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP01 // Grannus shows the same warm spectral flecks seen near Kerbol, yet its output is not falling. This should not be possible, which is a very exciting phrase unless you are nearby.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP02 // Repeated observations suggest the Astrophage population around Grannus is stable instead of multiplying away into a stellar buffet. Mission Control dislikes mysteries that can count.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP03 // The infrared excess persists, but Grannus does not dim measurably over the observation window. Either something is holding the swarm in equilibrium, or the telescope has learned sarcasm.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP04 // The pattern near Grannus looks like feeding without growth, which is not how anything with access to a star-sized snack should behave. Gene marks the system as "important" and underlines it until the pencil breaks.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP05 // Kerbol's dimming curve and Grannus's steady light do not agree, despite both showing Astrophage signatures. The difference may be the clue, or just the universe being needlessly dramatic.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP06 // Grannus appears to host Astrophages without surrendering luminosity. Wernher asks whether stars can have immune systems, then immediately pretends he asked a more sensible question.
        SunInSpaceHigh* = #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP07 // The stable Grannus readings are promoted from anomaly to possible solution. The telescope keeps staring, which is good, because everyone else is blinking too much.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_IRspec|tantares_ultraviolet_light_camera]]
{
    %RESULTS
    {
        EveInSpace* = #DSS_PHM_bd_IRspec_EveInSpace_00 // Infrared spectra reveal a faint luminous filament connecting Kerbol to Eve. It is too straight, too steady, and far too smug to be random solar wind.
        EveInSpace* = #DSS_PHM_bd_IRspec_EveInSpace_01 // The filament holds a consistent spectral signature along its entire length. Mission Control briefly celebrates clean data before realizing clean data can still be horrifying.
        EveInSpace* = #DSS_PHM_bd_IRspec_EveInSpace_02 // Particle motion within the glow shows a clear direction toward Eve. Bob notes that "flowing uphill through space" is not normally on the list of natural phenomena.
        EveInSpace* = #DSS_PHM_bd_IRspec_EveInSpace_03 // The Petrova-Kerman Line resolves into a coherent path rather than a diffuse plume. Gene requests that everyone stop calling it "the glowing snack trail" in official reports.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_dust]]
{
    %RESULTS
    {
        EveInSpace* = #DSS_PHM_bd_dust_EveInSpace_00 // The dust counter registers a dense stream of Astrophages moving along the Petrova-Kerman Line. The flow has lanes, which is upsetting because space is not supposed to have traffic.
        EveInSpace* = #DSS_PHM_bd_dust_EveInSpace_01 // Counts rise and fall in pulses, as if clumps of particles are traveling in organized waves. It resembles a highway, except the vehicles eat starlight and do not use turn signals.
        EveInSpace* = #DSS_PHM_bd_dust_EveInSpace_02 // The detector maps a steady particulate corridor rather than a diffuse cloud. Whatever is happening here, it is moving material at scale and with uncomfortable efficiency.
        EveInSpace* = #DSS_PHM_bd_dust_EveInSpace_03 // Flux measurements suggest far more Astrophages in the line than in the surrounding space. The empty regions beside it look less empty now and more like shoulders on a road.
        EveInSpace* = #DSS_PHM_bd_dust_EveInSpace_04 // The stream keeps its direction even as local dust and plasma drift elsewhere. Natural particles wander; these appear to commute.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[atmosphereAnalysis]]
{
    %RESULTS
    {
        EveFlyingHigh* = #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_00 // The analyzer detects an unusual particulate concentration in Eve's upper atmosphere, far above the denser purple soup below. The particles appear to prefer carbon dioxide, which is a strange preference but not the strangest one today.
        EveFlyingHigh* = #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_01 // Trace sampling shows Astrophage-like particles clustering where the CO2 fraction is highest. Mission Control asks whether this counts as chemistry, biology, or a very tiny dining recommendation.
        EveFlyingHigh* = #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_02 // The particulates do not drift like ordinary aerosols; they adjust course in coordinated motions through the upper atmosphere. Bob writes "swarm behavior?" and then adds three question marks for safety.
        EveFlyingHigh* = #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_03 // The atmospheric mix may be acting as an attractor or catalyst for the particles. That would explain the concentration, and also explain why nobody wants to open a window.
        EveFlyingHigh* = #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_04 // Spectral traces suggest the particles interact weakly with Eve's carbon dioxide before re-emitting heat. The analyzer calls this "nonstandard," which is instrument-speak for backing away slowly.
        EveFlyingHigh* = #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_05 // The upper atmosphere contains thin bands of coordinated particulate flow, all sliding along the same invisible preference for CO2-rich air. Eve is already inhospitable enough without learning to bait the sky.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_IRspec|tantares_ultraviolet_light_camera]]:NEEDS[GEP]
{
    %RESULTS
    {
        SironaInSpace* = #DSS_PHM_bd_IRspec_SironaInSpace_00 // The infrared filament from Grannus converges cleanly on Sirona. That is less like a planet and more like a destination, which makes everyone dislike the word "destination."
        SironaInSpace* = #DSS_PHM_bd_IRspec_SironaInSpace_01 // Spectral tracking confirms the Petrova-Kerman Line from Grannus terminates at Sirona's orbital neighborhood. The line does not wander, smear, or behave like anything trying to be natural.
        SironaInSpace* = #DSS_PHM_bd_IRspec_SironaInSpace_02 // The energy signature remains coherent along the filament from Grannus, then dissipates sharply near Sirona. You decide to scan again, as though repetition might make it less pointed.
        SironaInSpace* = #DSS_PHM_bd_IRspec_SironaInSpace_03 // Infrared intensity drops in a tight region around Sirona, suggesting the incoming particles are releasing or losing stored energy there. You mark the endpoint with a circle, then a larger circle, then a very worried circle.
        SironaInSpace* = #DSS_PHM_bd_IRspec_SironaInSpace_04 // The filament from Grannus narrows as it approaches Sirona, maintaining its spectral identity until the last measurable segment. Space is supposed to be wide, but this is acting like plumbing.
        SironaInSpace* = #DSS_PHM_bd_IRspec_SironaInSpace_05 // Sirona sits exactly where the Petrova-Kerman Line's structure collapses into diffuse thermal noise. You call this a confirmed endpoint, and immediately regret confirming things.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_dust]]:NEEDS[GEP]
{
    %RESULTS
    {
        SironaInSpace* = #DSS_PHM_bd_dust_SironaInSpace_00 // The dust counter detects Astrophage particles moving both toward and away from Sirona along the Petrova-Kerman Line.
        SironaInSpace* = #DSS_PHM_bd_dust_SironaInSpace_01 // Inbound and outbound particle counts are nearly equal over the observation window. The net flow is approximately zero, which is either reassuring or the most suspicious kind of balance.
        SironaInSpace* = #DSS_PHM_bd_dust_SironaInSpace_02 // The stream does not stop at Sirona so much as trade places around it. You call this a dynamic equilibrium, because "organized cosmic milling-about" sounded less professional.
        SironaInSpace* = #DSS_PHM_bd_dust_SironaInSpace_03 // Particle velocities differ by direction, but the total flux cancels out to within instrument uncertainty. You tap the display and whisper that nature usually needs a reason to be this tidy.
        SironaInSpace* = #DSS_PHM_bd_dust_SironaInSpace_04 // The line remains dense, active, and structured despite showing no net transport. It resembles a highway interchange where every vehicle is made of bad news and stored sunlight.
        SironaInSpace* = #DSS_PHM_bd_dust_SironaInSpace_05 // Astrophage impacts arrive in paired waves, one inbound and one outbound, keeping the local concentration steady. Something here is balancing the system.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[atmosphereAnalysis]]:NEEDS[GEP]
{
    %RESULTS
    {
        SironaFlyingHigh* = #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_00 // The analyzer detects living microorganisms suspended in the upper atmosphere, clustered wherever Astrophage particles are most concentrated. Something here is eating the star-eaters, which is the best bad news anyone has heard today.
        SironaFlyingHigh* = #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_01 // Microscopic sampling reveals active biological agents interacting directly with Astrophages. You propose the name Sironamoeba, then refuses to let anyone vote on it.
        SironaFlyingHigh* = #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_02 // The organisms appear to feed on Astrophages or bind to them in a tightly coupled ecological relationship. Whether this is predation or symbiosis, the Astrophages do not seem to be winning.
        SironaFlyingHigh* = #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_03 // Particle counts drop sharply in air masses rich with Sironamoebae. The upper atmosphere may be acting less like a trap and more like a very tiny buffet with consequences.
        SironaFlyingHigh* = #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_04 // Population modeling suggests the microorganisms limit Astrophage growth before it becomes exponential. Mission Control briefly cheers, then remembers Kerbol System does not have any of these yet.
        SironaFlyingHigh* = #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_05 // The atmospheric sample contains a possible biological control mechanism for Astrophages! Gene marks it as a candidate solution to save Kerbol, underlines it twice, and tells everyone not to celebrate while absolutely celebrating.
    }
}