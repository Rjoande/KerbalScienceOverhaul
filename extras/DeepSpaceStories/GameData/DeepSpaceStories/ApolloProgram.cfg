@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        MunSrfLanded* = #CinematicPack_Apollo_crewReport_MunSrfLanded_00 // Touchdown confirmed. Engine cutoff. Checklist complete. Marking the moment as 'nominal' so nobody gets too excited.
		MunSrfLanded* = #CinematicPack_Apollo_crewReport_MunSrfLanded_01 // You read the short checklist twice, then once more for luck. Outside is silent. Inside is busy pretending it isn't historic.
		MunSrfLanded* = #CinematicPack_Apollo_crewReport_MunSrfLanded_02 // "Crew report: Contact light. Stable. Systems green." The words feel much smaller than the horizon.
		MunSrfLanded* = #CinematicPack_Apollo_crewReport_MunSrfLanded_03 // You take one long look out the window and add, very calmly, "We appear to be on the Mun." Mission Control underlines it three times.
        
        MunInSpaceHigh* = #CinematicPack_Apollo_crewReport_MunInSpaceHigh_00 // Kerbin, we have a problem...
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
    %RESULTS
    {
        MunSrfLanded* = #CinematicPack_Apollo_bd_camera_MunSrfLanded_00 // Surface photography initiated. Exposure set for high contrast. The regolith still manages to look like every shade of grey at once.
		MunSrfLanded* = #CinematicPack_Apollo_bd_camera_MunSrfLanded_01 // You take a careful panorama for the mission log. The horizon is crisp, the shadows are sharp, and nobody says the word "historic" on the radio.
		MunSrfLanded* = #CinematicPack_Apollo_bd_camera_MunSrfLanded_02 // A close-up of a bootprint is filed as "surface interaction documentation". Mission Control requests three copies and a frame.
    }
}