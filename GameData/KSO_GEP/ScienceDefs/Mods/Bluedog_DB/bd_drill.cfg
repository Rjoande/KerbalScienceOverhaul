@EXPERIMENT_DEFINITION:HAS[#id[bd_drill]]
{
    %RESULTS
    {
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_drill_TaranisSrfLandedMagmaShores_00 // The drill skates on a thin crust before punching through into warmer layers that make the bit glow. You abort on instinct and get an approval message long after the fact.
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_drill_TaranisSrfLandedMagmaShores_01 // A fragile, glassy core comes up fused with black beads and heat-altered fragments. The red sun doesn’t feel like “day,” it feels like standing too close to a warning label.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_drill_TaranisSrfLandedScorchedLowlands_00 // The surface is sintered into something between rock and ceramic, and the drill hates both options. Every second of operation feels expensive in power and patience.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_drill_TaranisSrfLandedScorchedLowlands_01 // The core shows rapid melt-and-freeze history, with sharp boundaries that look freshly made despite their age. You log the sample and try not to think about how quiet it is without an atmosphere.
        TaranisSrfLandedMidlands* = #GEPscience_bd_drill_TaranisSrfLandedMidlands_00 // The drill finds a loose regolith cap over unexpectedly dense material, like someone swapped the ground while you weren’t looking. The red glare makes the dust look warm even when it’s not.
        TaranisSrfLandedMidlands* = #GEPscience_bd_drill_TaranisSrfLandedMidlands_01 // A thin layer of impact breccia appears, packed with angular fragments and tiny voids. The analyzer flags radiation damage artifacts and you pretend not to take it personally.
        TaranisSrfLandedHighlands* = #GEPscience_bd_drill_TaranisSrfLandedHighlands_00 // Brittle rock fractures ahead of the bit, turning drilling into “careful grinding.” You keep the feed rate low and your expectations lower.
        TaranisSrfLandedHighlands* = #GEPscience_bd_drill_TaranisSrfLandedHighlands_01 // The extracted core is sharply layered, with dark bands that absorb heat and lighter bands that crack from thermal shock. You schedule a follow-up and remember scheduling means nothing without a clock you trust.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_drill_TaranisSrfLandedDarkSideMidlands_00 // On the dark side, the drill squeals like it’s drilling into a freezer full of gravel. Chips drift lazily away, unhelpful and extremely confident.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_drill_TaranisSrfLandedDarkSideMidlands_01 // The core includes cold-trapped volatiles that sublimate as soon as they see your equipment’s warmth. You capture the readings quickly, because “quickly” is the only advantage you have.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_drill_TaranisSrfLandedDarkSideHighlands_00 // The drill motor draws more power as lubricants thicken and everything contracts. You begin to envy planets with the decency to be merely cold.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_drill_TaranisSrfLandedDarkSideHighlands_01 // The sample is a dark, brittle column with microcracks that form a perfect map of stress. You transmit the map and wait in silence for someone, somewhere, to nod.
        TaranisSrfLandedPoles* = #GEPscience_bd_drill_TaranisSrfLandedPoles_00 // The drill pulls up fine, charged dust that clings to everything like it owns the place. You add “anti-static” to the list of things you should have brought.
        TaranisSrfLandedPoles* = #GEPscience_bd_drill_TaranisSrfLandedPoles_01 // A compacted layer below suggests long-term migration of particles across the surface, guided by forces you can’t feel but can measure. Under the dim red sun, the readings feel more real than the view.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_drill_ToutatisSrfLandedSunnyLowlands_00 // The surface is baked into a crust that dulls the bit almost immediately. The core shows sintered grains and fused dust, like the ground has been lightly welded.
        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_drill_ToutatisSrfLandedSunnyLowlands_01 // Beneath the crust, the drill hits a tougher layer that rings through the frame in high gravity. You pause to let it cool, then realize “cool” is a relative term here.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_drill_ToutatisSrfLandedSunnyHighlands_00 // Hard, fractured rock forces a slow, careful bore, and the drill’s vibration pattern looks like nervous handwriting. You watch the power budget and the horizon shimmer under that red light.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_drill_ToutatisSrfLandedSunnyHighlands_01 // The core contains dense mineral bands and glassy patches that suggest past heating events. You tag the sample “do not drop” twice.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_drill_ToutatisSrfLandedTransitionalLowlands_00 // The drill cuts through alternating layers of powder and cemented grit, as if the planet can’t decide what it wants to be. Your shadow shifts in ways that make “afternoon” feel like a prank.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_drill_ToutatisSrfLandedTransitionalLowlands_01 // The core includes thin bright layers that the scanner flags as unusual salts or frost residues. You wait for confirmation, then remember you’re already standing on the confirmation.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_drill_ToutatisSrfLandedTransitionalHighlands_00 // The bit bites into a tough cap, then breaks into crumbly material that pours out like dry snow. The sudden change makes you double-check the depth readout three times.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_drill_ToutatisSrfLandedTransitionalHighlands_01 // Deep in the core, temperature gradients are sharp enough to show up as instrument drift. You correct the drift and quietly blame the planet for being inconvenient.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_drill_ToutatisSrfLandedDarkSideLowlands_00 // The drill chips brittle material that behaves like frozen stone, despite the near-vacuum. The darkness makes every indicator light feel too bright.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_drill_ToutatisSrfLandedDarkSideLowlands_01 // The core has pockets that sublimate into a brief fog inside the sampler before vanishing. You log it as “volatile present” and “please don’t open without gloves.”
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_drill_ToutatisSrfLandedDarkSideHighlands_00 // Progress is slow in the cold, dense terrain; the drill keeps binding as the borehole contracts. You stop, reverse, and learn a new appreciation for patience as a procedure.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_drill_ToutatisSrfLandedDarkSideHighlands_01 // The extracted column shows stress fractures and layered deposits that look undisturbed for ages. You feel the delay to home in the quiet between tool noises.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_drill_ToutatisSrfLandedSoutheasternMountains_00 // The drill hits uplifted bedrock with embedded angular fragments, like a mountain built from broken history. High gravity makes every tool feel heavier than the checklist implies.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_drill_ToutatisSrfLandedSoutheasternMountains_01 // The core reveals breccia and fine dust seams, hinting at old impacts and slow settling. You package the sample carefully, because dropping it would be louder than the radio.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_drill_ToutatisSrfLandedWesternMountains_00 // A stubborn, crystalline layer forces the drill to run hot and slow, and the bit complains the whole time. The red sun glares off rock faces like it’s trying to read your notes.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_drill_ToutatisSrfLandedWesternMountains_01 // The sample shows thin, bright veins that don’t match your onboard database. You send the spectra anyway, confident that future-you will be annoyed in a different time zone.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_drill_ToutatisSrfLandedDarkSideMountains_00 // The drill shudders through cold, brittle ridges and pulls up a core that fractures into neat segments. You label each segment before it decides to become “many segments.”
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_drill_ToutatisSrfLandedDarkSideMountains_01 // The core contains dark, dense layers with occasional frosty inclusions that vanish when warmed by your instruments. You capture the readings fast and stare into the unfamiliar night while the upload crawls home.

        NodensSrfLandedShores* = #GEPscience_bd_drill_NodensSrfLandedShores_00 // The drill pulls up a soggy, layered core that slumps as soon as it meets the air. The signal saying “reduce feed rate” arrives long after you already reduced it.
        NodensSrfLandedShores* = #GEPscience_bd_drill_NodensSrfLandedShores_01 // Fine grains and salty crusts show up in neat bands, like the shoreline has been tidying itself for ages. Under the dim red sun it all looks the same color until the instruments disagree.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_drill_NodensSrfLandedTropicalLowlands_00 // The first meter is springy and dark, then turns into stubborn clay that makes the drill complain in three different tones. Mission Control’s advice arrives after you’ve already invented new advice.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_drill_NodensSrfLandedTropicalLowlands_01 // The core shows pockets of moisture and odd inclusions that your sensors label “interesting” and your stomach labels “don’t sniff it.” Even the daylight feels unfamiliar under this red sky.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_drill_NodensSrfLandedTemperateLowlands_00 // A compacted layer stops the drill abruptly, as if the planet hid a floorboard just for you. You mark the time, then remember “time” is a suggestion this far out.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_drill_NodensSrfLandedTemperateLowlands_01 // The sample alternates between dust and cemented grit, hinting at cycles your charts don’t have names for yet. The low-latency demo back home did not prepare you for the real latency.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_drill_NodensSrfLandedTropicalMidlands_00 // The drill bites into a harder, reddish rock layer that throws off warm chips like tiny sparks. You realize you’ve started judging “noon” by temperature changes instead of light.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_drill_NodensSrfLandedTropicalMidlands_01 // Beneath the surface, the core shifts from porous stone to dense bands with trapped gases that ping the analyzer. You queue the data for transmission and practice patience as an operational skill.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_drill_NodensSrfLandedTemperateMidlands_00 // The core is a tidy stack of sediments capped by a tougher layer that looks like it was baked in place. Under Grannus, even “baked” feels like a different recipe.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_drill_NodensSrfLandedTemperateMidlands_01 // Small mineral veins show up like bright threads in the scan, but they don’t match your reference library. The library update is scheduled to arrive… eventually.
        NodensSrfLandedHighlands* = #GEPscience_bd_drill_NodensSrfLandedHighlands_00 // The drill chatters on fractured bedrock, and the vibration readout looks like a seismograph having a bad day. You wait for confirmation before changing settings, then remember confirmation is hours away.
        NodensSrfLandedHighlands* = #GEPscience_bd_drill_NodensSrfLandedHighlands_01 // A cold, clean-looking core comes up with dense grains and thin, brittle layers that snap when handled. The horizon haze under the red sun makes the landscape feel flatter than the data insists.
        NodensSrfLandedTundra* = #GEPscience_bd_drill_NodensSrfLandedTundra_00 // Permafrost fights back; steam and frost form at the borehole like the planet is exhaling. The drill works better once it stops being surprised by the temperature.
        NodensSrfLandedTundra* = #GEPscience_bd_drill_NodensSrfLandedTundra_01 // The sample includes icy lenses and gritty bands that suggest repeated freezing and thawing. Your day/night cues are so off that you log it as “whenever the shadow finally moved.”
        NodensSrfLandedIceCaps* = #GEPscience_bd_drill_NodensSrfLandedIceCaps_00 // The drill extracts a clear, stubborn cylinder of ice with trapped bubbles that sparkle under the red light. You consider calling it “glacier candy” and decide not to put that in the official report.
        NodensSrfLandedIceCaps* = #GEPscience_bd_drill_NodensSrfLandedIceCaps_01 // Beneath the top layer, darker dust streaks appear in the ice like old storms caught in a freezer. The report you send is concise, because long messages take too long to regret.

        BelisamaSrfLandedFlats* = #GEPscience_bd_drill_BelisamaSrfLandedFlats_00 // The drill pulls up a neat cylinder of fine grains over a stubborn, compacted layer. The horizon never changes much here, so you use the comm-delay timer as your “clock.”
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_drill_BelisamaSrfLandedTropicalLowlands_00 // A damp, clinging regolith cakes the bit, then suddenly gives way to gritty bands that scrape like sandpaper. Under the dim red sun, “warm” and “bright” stopped meaning the same thing days ago.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_drill_BelisamaSrfLandedTemperateLowlands_00 // The core shows alternating soft dust and cemented crusts, like the ground has been quietly rebuilding itself. Your status report arrives home long after the drill has finished bragging.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_drill_BelisamaSrfLandedTropicalMidlands_00 // The drill chatters through fractured material and brings up chips that look glassy in the red light. You mark “noon” by motor temperature, because the sky isn’t helping.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_drill_BelisamaSrfLandedTemperateMidlands_00 // A clean break reveals layered sediments with tiny voids that ping the analyzer. You wonder how many cycles happened out here with nobody watching.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_drill_BelisamaSrfLandedHighlands_00 // Hard bedrock turns drilling into careful grinding, with vibrations that feel louder than the landscape deserves. The instruments insist it’s normal; your nerves take longer to agree.
        BelisamaSrfLandedPoles* = #GEPscience_bd_drill_BelisamaSrfLandedPoles_00 // The bit bites into cold, dusty ice and the sample fogs the container for a moment before clearing. You log the readings fast, because “stable” is a temporary condition this far from home.

        SucellusSrfLandedBasins* = #GEPscience_bd_drill_SucellusSrfLandedBasins_00 // The drill sinks through loose fill and hits a dense layer like a buried floor. The core reads like a history book written in dust, with every chapter delayed on the way back.
        SucellusSrfLandedLowlands* = #GEPscience_bd_drill_SucellusSrfLandedLowlands_00 // Fine regolith gives way to chunky fragments packed tight, as if the ground was shaken and re-settled. The red sun makes everything look calm while the data says otherwise.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_drill_SucellusSrfLandedTropicalMidlands_00 // The sample comes up banded—dark mineral streaks over pale, brittle layers that flake when handled. You start trusting spectrometers more than your eyes.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_drill_SucellusSrfLandedTemperateMidlands_00 // A surprisingly uniform core suggests long, quiet deposition with only occasional disturbances. It’s a very patient planet; your comms link is learning from it.
        SucellusSrfLandedHighlands* = #GEPscience_bd_drill_SucellusSrfLandedHighlands_00 // The drill fights crystalline rock and finally extracts a heavy, dense column that thumps into the cradle. You label it “valuable” and immediately think about how far it has to travel.
        SucellusSrfLandedPoles* = #GEPscience_bd_drill_SucellusSrfLandedPoles_00 // Cold-trapped volatiles hiss out of the borehole and vanish into the thin nothingness. By the time the caution message arrives, you’ve already closed the sampler and held your breath anyway.

        CaireenSrfLandedLowlands* = #GEPscience_bd_drill_CaireenSrfLandedLowlands_00 // The drill pulls up mixed rubble—captured fragments packed with fines, like the moon never quite decided what it is. The whole place feels borrowed, including your sense of direction.
        CaireenSrfLandedMidlands* = #GEPscience_bd_drill_CaireenSrfLandedMidlands_00 // A shallow crust breaks into irregular chunks, then turns to powder that clings to every surface. You begin to suspect Caireen was assembled from spare parts, and not the matching set.
        CaireenSrfLandedHighlands* = #GEPscience_bd_drill_CaireenSrfLandedHighlands_00 // The bit catches on jagged inclusions and the core fractures into tidy segments as it’s extracted. You bag each piece carefully; replacing them would take longer than waiting for Mission Control to answer.
        CaireenSrfLandedPoles* = #GEPscience_bd_drill_CaireenSrfLandedPoles_00 // The drill finds icy grains mixed with dark dust that absorbs the red sunlight like it’s hoarding heat. The analyzer calls it “interesting,” which is the polite term for “unknown.”

        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_drill_AirmedSrfLandedTropicalLowlands_00 // The drill chews through dark fines and pulls up a compacted core that looks “warm” only because everything does under a dim red sun. The bit’s radiation warning blinks like it’s trying to get a word in over the comm delay.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_drill_AirmedSrfLandedTemperateLowlands_00 // A thin crust gives way to loose rubble, then abruptly to something harder that rings through the frame. You log the depth and realize “time of day” here is whatever the instruments agree on.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_drill_AirmedSrfLandedTropicalMidlands_00 // The sample comes up layered—powder, grit, then a brittle band that flakes into glittering shards. Sirona hangs in the sky like a reminder that you are definitely not at home.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_drill_AirmedSrfLandedTemperateMidlands_00 // The drill extracts a tidy cylinder of compacted regolith with odd inclusions the analyzer can’t name yet. You queue the spectra for upload and practice patience as a mission task.
        AirmedSrfLandedHighlands* = #GEPscience_bd_drill_AirmedSrfLandedHighlands_00 // Fractured bedrock turns drilling into careful grinding, with vibrations that feel too loud for such an airless place. The “reduce feed rate” message arrives after you already did, twice.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_drill_AirmedSrfLandedDarkenedLowlands_00 // In the darkened terrain the drill motor sounds different, like the cold is tightening the whole machine. The core shows fine dust over darker, denser grains that drink the red light.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_drill_AirmedSrfLandedDarkenedMidlands_00 // The bit bites into stubborn material and the core fractures into neat segments as it’s extracted. You label each piece before it decides to become “many pieces.”
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_drill_AirmedSrfLandedDarkenedHighlands_00 // The drill stalls on a crystalline layer and finally breaks through with a jolt that makes every bolt feel suspect. The sample is sharp-edged and ancient-looking, like it’s been waiting alone for this moment.
        AirmedSrfLandedPoles* = #GEPscience_bd_drill_AirmedSrfLandedPoles_00 // Cold-trapped volatiles briefly fog the sampler before vanishing into nothingness. You seal it quickly and wonder how long “quickly” takes to reach Mission Control from here.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_drill_BorvoSrfLandedTropicalCraquelure_00 // The drill drops into a network of cracks and pulls up icy grains welded to darker dust. The thin air carries a faint chemical bite you decide not to describe as “snacky.”
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_drill_BorvoSrfLandedTemperateCraquelure_00 // The core shows fractured ice plates with fine material packed between them, like the ground has been flexing in slow motion. Under the red sun, the shadows don’t behave the way your instincts expect.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_drill_BorvoSrfLandedTropicalLowlands_00 // A soft, porous layer collapses slightly around the borehole, then firms up into gritty ice-cement. You send the data home and imagine it arriving to applause several light-minutes late.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_drill_BorvoSrfLandedTemperateLowlands_00 // The drill produces a cold, pale cylinder with trapped bubbles that ping the analyzer as pressure changes. The atmosphere is just thick enough to make sounds, and just thin enough to make them unsettling.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_drill_BorvoSrfLandedTropicalMidlands_00 // The bit scrapes through mixed regolith and ice, leaving a borehole that tries to frost over around the edges. The sample smells faintly of “lab,” which is not a comforting smell this far out.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_drill_BorvoSrfLandedTemperateMidlands_00 // Layered deposits come up like a frozen parfait: dust, ice, dust, ice. You resist naming the layers after snacks, mostly because the upload would take forever.
        BorvoSrfLandedHighlands* = #GEPscience_bd_drill_BorvoSrfLandedHighlands_00 // Harder ice-rock composite makes the drill run hot despite the cold surroundings. You log the power draw and glance at Sirona, wondering if it’s judging your technique.
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_drill_BorvoSrfLandedMajorCraters_00 // The core is chaotic—shocked fragments, glassy beads, and compacted fines jammed together. It reads like a violent story told very quietly under a dim red sky.
        BorvoSrfLandedPoles* = #GEPscience_bd_drill_BorvoSrfLandedPoles_00 // The drill pulls up almost pure ice with thin dark streaks like old storms trapped in a freezer. You seal the sample and wait out the long silence before the next instruction arrives.

        DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_drill_DamonaSrfLandedTropicalLowlands_00 // The drill bites into powdery dust that clings to everything, then hits a dense layer that feels like a buried lid. The red sun makes the landscape look familiar until the instruments disagree.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_drill_DamonaSrfLandedTemperateLowlands_00 // A brittle crust fractures cleanly and the core comes up in sharp rings, like it was pre-cut for convenience. The convenience ends when you remember how far the data has to travel.
        DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_drill_DamonaSrfLandedTropicalMidlands_00 // The sample shows fine grains over compacted rubble, with tiny voids that pop on the analyzer as trapped gases escape. You find yourself listening to machines because the world outside is too quiet.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_drill_DamonaSrfLandedTemperateMidlands_00 // The drill extracts a dark, dense column that looks older than your entire mission plan. You tag it “pristine” and immediately worry about dropping it in this low gravity.
        DamonaSrfLandedHighlands* = #GEPscience_bd_drill_DamonaSrfLandedHighlands_00 // Jagged inclusions make the bit chatter, then settle into a steady grind through cold rock. “Day” here is just the red light shifting between “dim” and “dimmer.”
        DamonaSrfLandedImpactBasin* = #GEPscience_bd_drill_DamonaSrfLandedImpactBasin_00 // The core is impact-mixed breccia: angular shards locked in fine dust, like history held together by stubbornness. By the time your summary reaches home, the basin will still be waiting.
        DamonaSrfLandedPoles* = #GEPscience_bd_drill_DamonaSrfLandedPoles_00 // The drill releases a brief shimmer of sublimating frost that vanishes as fast as it appears. You capture the readings fast, because Damona does not seem interested in second chances.

        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_drill_EponaSrfLandedTropicalLowlands_00 // The drill pulls up damp fines over a tougher, compacted layer that fights extraction. Under the dim red sun, the “done” light feels more reliable than the sky.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_drill_EponaSrfLandedTemperateLowlands_00 // A neat core of mixed grit and cemented crust suggests slow cycles you can’t see, only measure. The confirmation ping from home arrives after you’ve already packed the sample.
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_drill_EponaSrfLandedTropicalUplands_00 // The bit chatters in coarse regolith and brings up angular fragments that look freshly broken. You log the time, then remember local “time” is mostly a rumor.
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_drill_EponaSrfLandedTemperateUplands_00 // The core alternates between powdery bands and stubborn layers that feel heat-baked. The landscape looks calm, but the drill motor insists it’s working overtime.
        EponaSrfLandedHighlands* = #GEPscience_bd_drill_EponaSrfLandedHighlands_00 // Hard bedrock turns drilling into careful grinding, with vibrations that sound louder in the long isolation. You make an adjustment and wait for the delayed advice to disagree.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_drill_EponaSrfLandedGrandPeaks_00 // The drill bites into dense, cold rock and extracts a heavy column with thin, bright veins the analyzer can’t name yet. The red sunlight makes everything look uniform until the spectra prove otherwise.
        EponaSrfLandedCraters* = #GEPscience_bd_drill_EponaSrfLandedCraters_00 // Impact-mixed rubble jams the bit, then suddenly clears into a compacted layer like a buried floor. The sample reads like violence that happened quietly a very long time ago.
        EponaSrfLandedVolcanoes* = #GEPscience_bd_drill_EponaSrfLandedVolcanoes_00 // The first centimeters are brittle and glassy, then the core warms and smells faintly “engine-room.” You decide not to touch the sample bare-handed, even if the gloves arrive as a suggestion.
        EponaSrfLandedPoles* = #GEPscience_bd_drill_EponaSrfLandedPoles_00 // Cold-trapped frost fogs the sampler for a heartbeat before vanishing into thin air. You seal it fast, because “second chances” take too long out here.

        RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_drill_RosmertaSrfLandedTropicalLowlands_00 // The drill draws up sticky fines that cling to the bit, then breaks free with a gritty snap. The daylight feels wrong under this red sun, like the planet is lit from memory.
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_drill_RosmertaSrfLandedTemperateLowlands_00 // A layered core—dust, crust, dust—suggests long quiet settling with occasional interruptions. The transmission queue is longer than your patience, but you send it anyway.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_drill_RosmertaSrfLandedTropicalMidlands_00 // The bit scrapes through fractured material and produces a core that flakes into sharp, dry sheets. You keep your hands steady and let the instruments do the worrying.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_drill_RosmertaSrfLandedTemperateMidlands_00 // The sample comes up surprisingly uniform, with tiny voids that pop on the analyzer as pressure changes. In the silence between comm windows, those tiny pops feel enormous.
        RosmertaSrfLandedHighlands* = #GEPscience_bd_drill_RosmertaSrfLandedHighlands_00 // Dense rock resists the drill until it finally yields a clean cylinder that thumps into the cradle. You label it carefully, because even labels feel important this far from home.
        RosmertaSrfLandedPoles* = #GEPscience_bd_drill_RosmertaSrfLandedPoles_00 // The drill releases a brief hiss of sublimating volatiles and then nothing at all. The caution message arrives later; you file it under “already learned.”

        RAB-58ESrfLandedLowlands* = #GEPscience_bd_drill_RAB-58ESrfLandedLowlands_00 // The drill sinks into loose rubble and extracts a core that looks assembled from mismatched fragments. The analyzer calls it “heterogeneous,” which is a polite way of saying “what even is this.”
