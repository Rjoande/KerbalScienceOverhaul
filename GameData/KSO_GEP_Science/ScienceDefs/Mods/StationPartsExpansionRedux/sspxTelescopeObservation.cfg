@EXPERIMENT_DEFINITION:HAS[#id[sspxTelescopeObservation]]
{
    %RESULTS
    {
        GrannusFlyingHigh* = #GEPscience_sspxTelescopeObservation_GrannusFlyingHigh_00 // You try to steady the telescope while the red glare floods every sensor. The star does not cooperate with 'high-altitude' astronomy.
        GrannusInSpaceLow* = #GEPscience_sspxTelescopeObservation_GrannusInSpaceLow_00 // With Grannus filling half the sky, you use it as a giant light shield and hunt for faint points that do not drift when you blink.
        GrannusInSpaceHigh* = #GEPscience_sspxTelescopeObservation_GrannusInSpaceHigh_00 // Farther out, the red ember still stains the optics, but the background finally goes dark enough to count galaxies between the comms pings.
        GrannusInSpace* = #GEPscience_sspxTelescopeObservation_GrannusInSpace_00 // You wonder whether pointing the telescope directly at Grannus counts as a deep-field observation.
        GrannusInSpace* = #GEPscience_sspxTelescopeObservation_GrannusInSpace_01 // You point at Grannus, which is technically a “far away” star… from Kerbin point of view. You are not helping its case.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_00 // You point the telescope away from Grannus and find Kerbol: a distant, ordinary star that somehow feels like a landmark.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_01 // Kerbol fits neatly into the field of view. You remember when it filled the sky and made everything feel close.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_02 // You log “target acquired: Kerbol.” For a moment, the word “target” feels like the wrong category.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_03 // Kerbol is just another point source out here. You don’t like how easy it is to say that.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_04 // Kerbol’s light arrives thin and delayed, like a postcard that took years to cross the dark.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_05 // Kerbol shines steady and unremarkable, which is exactly why it hurts a little to look at it.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_06 // You take a “deep field” image and label one bright dot “home star,” just so the archive remembers.

        TaranisSrfLandedMagmaShores* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedMagmaShores_00 // Heat ripples off the magma like a bad mirage. The telescope produces beautiful stars and a suspicious smell from the heat sink.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedScorchedLowlands_00 // The ground looks sunburned and slightly incandescent. Your long exposure turns into modern art the moment the mount warms up.
        TaranisSrfLandedMidlands* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedMidlands_00 // The tripod sits on rock that never really cools. You log a careful star survey and a less careful note about sunblock.
        TaranisSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedHighlands_00 // Above the worst of the shimmer, the sky sharpens up. The red sun is still too close for comfort, so you observe in short, nervous bursts.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedDarkSideMidlands_00 // No atmosphere, no twinkle, just a cold black sky and unfamiliar patterns. The best data arrives long before Mission Control can react to it.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedDarkSideHighlands_00 // The horizon is a jagged silhouette against a thin red glow from far away. You catch a transit and immediately wonder how long the results will take to get home.
        TaranisSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_TaranisSrfLandedPoles_00 // Long shadows make a perfect baffle for the telescope. You run a quiet sweep of the sky, listening to the radio delay answer itself.
        TaranisSrfSplashedMagmaSea* = #GEPscience_sspxTelescopeObservation_TaranisSrfSplashedMagmaSea_00 // The telescope is technically deployed over liquid rock. The image is steady, the instrument is not, and you decide that counts as science.
        TaranisSrfSplashedMagmaShores* = #GEPscience_sspxTelescopeObservation_TaranisSrfSplashedMagmaShores_00 // Half the mount is misted with glowing droplets. You get one crisp frame before the safety sensors insist on a cooling break.
        TaranisInSpaceLow* = #GEPscience_sspxTelescopeObservation_TaranisInSpaceLow_00 // In low orbit, the bright day side blows out the view, so you swing over the night side and let the planet block Grannus like a giant shutter.
        TaranisInSpaceHigh* = #GEPscience_sspxTelescopeObservation_TaranisInSpaceHigh_00 // From high orbit you can watch the terminator crawl while the telescope stares past it. The sky looks wrong in a way you cannot quite calibrate.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSunnyLowlands_00 // The bright side dust reflects a harsh red tint into the tube. You manage a clean star field by pointing away from the glow and holding your breath.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSunnyHighlands_00 // From the high ground, the sunlit haze is thinner and the tracking is smoother. The red sun still tries to photobomb every exposure.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedTransitionalLowlands_00 // The twilight band gives you just enough darkness and just enough warmth. You take a long look at unfamiliar constellations and feel very far away.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedTransitionalHighlands_00 // Up here the boundary between fire and ice is a thin line on the horizon. The telescope loves it, and the comms delay does not.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideLowlands_00 // The stars do not twinkle at all, which is unsettling. Your log notes excellent seeing and a growing desire for a brighter cabin light.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideHighlands_00 // The dark side sky is so sharp it feels artificial. You capture a faint nebula and wait for the delayed applause from home.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSoutheasternMountains_00 // Ridges and shadows keep stray glare out of the optics. You run a careful sweep and pretend the red sunrise is not creeping toward you.
        ToutatisSrfLandedWesternMountains* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedWesternMountains_00 // The rock underfoot is cold on one side and warm on the other. The telescope mount complains in creaks and still delivers a decent star chart.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideMountains_00 // A mountain blocks the faint red horizon glow like a perfect observatory wall. The data is excellent and the silence is too.
        ToutatisFlyingHigh* = #GEPscience_sspxTelescopeObservation_ToutatisFlyingHigh_00 // You are allegedly in the upper atmosphere, which mostly means you are above the dust and still not hearing from Mission Control yet.
        ToutatisInSpaceLow* = #GEPscience_sspxTelescopeObservation_ToutatisInSpaceLow_00 // Close in, you use Toutatis itself to hide Grannus behind the limb and scan the sky in the brief, quiet shadow.
        ToutatisInSpaceHigh* = #GEPscience_sspxTelescopeObservation_ToutatisInSpaceHigh_00 // From farther out, the planet is a small disk split between bright and dark. The telescope stares into the gap between stars, trying to find something new.

        NodensSrfLandedShores* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedShores_00 // The ocean throws red light into the telescope tube. You log “excellent horizon, mediocre glare” and wipe salt off the eyepiece anyway.
        NodensSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedTropicalLowlands_00 // Warm, wet air makes the stars wobble like jelly. The telescope insists the universe is not actually melting.
        NodensSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedTemperateLowlands_00 // The sky looks familiar only until you start mapping it. You double-check the coordinates and remember the comm delay will argue later.
        NodensSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedTropicalMidlands_00 // Above the thickest haze, the telescope resolves faint points that the naked eye misses. The red sun still tries to sneak into every exposure.
        NodensSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedTemperateMidlands_00 // You run a careful star survey and get a clean dataset. Mission Control will receive it after you’ve already started worrying about the next one.
        NodensSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedHighlands_00 // Thin air, sharp stars, and a distant red glow on the horizon. The telescope finally feels like it’s doing its job instead of taking a bath.
        NodensSrfLandedTundra* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedTundra_00 // The cold steadies the optics and your hands. The sky is crisp, quiet, and completely unfamiliar in a way that makes you whisper anyway.
        NodensSrfLandedIceCaps* = #GEPscience_sspxTelescopeObservation_NodensSrfLandedIceCaps_00 // The ice reflects a dim red twilight even at “night.” You use your own shadow as a sunshade and pretend that’s an approved procedure.
        NodensSrfSplashedSaltySeas* = #GEPscience_sspxTelescopeObservation_NodensSrfSplashedSaltySeas_00 // Floating telescope operations are declared “possible” and “inadvisable.” The stars are steady; the platform is not.
        NodensSrfSplashedFreshWater* = #GEPscience_sspxTelescopeObservation_NodensSrfSplashedFreshWater_00 // The telescope rides gentle swells while you chase long exposures. You note that the universe does not care about your waterproofing rating.
        NodensSrfSplashedShores* = #GEPscience_sspxTelescopeObservation_NodensSrfSplashedShores_00 // Half land, half water, all glare. You get one beautiful frame and then spend ten minutes cleaning droplets off the lens cap.
        NodensInSpaceLow* = #GEPscience_sspxTelescopeObservation_NodensInSpaceLow_00 // Nodens blocks the red sun like a giant shutter. In the brief shadow, the telescope finds faint patterns that don’t match any “back home” charts.
        NodensInSpaceHigh* = #GEPscience_sspxTelescopeObservation_NodensInSpaceHigh_00 // Far out, Nodens is a colored coin under a dim ember. You stare past it into a starfield that feels too quiet for how much data it holds.

        BelisamaSrfLandedFlats* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedFlats_00 // The ground is still and the sky is not. Nodens hangs in the same place forever, making the telescope feel like it’s being watched back.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTropicalLowlands_00 // Warm terrain and a dim red sky make for strange lighting. You take calibration shots and realize “normal” is no longer a setting.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTemperateLowlands_00 // The stars are sharp, but your sense of direction isn’t. You mark a new reference grid and accept that it will be argued over later.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTropicalMidlands_00 // You line up a long exposure and Nodens refuses to move out of frame. Tidal locking is great for stability and terrible for composition.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTemperateMidlands_00 // The telescope tracks smoothly while the radio stays stubbornly silent. The delay makes every discovery feel like it happened twice.
        BelisamaSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedHighlands_00 // From high ground, the sky goes darker and the red sun feels farther away. You log a clean survey and a note: “Do not look down at Nodens too long.”
        BelisamaSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedPoles_00 // Low-angle light turns everything into a baffle. You sweep the sky in long, quiet arcs and try not to count seconds between replies.
        BelisamaInSpaceLow* = #GEPscience_sspxTelescopeObservation_BelisamaInSpaceLow_00 // Belisama’s limb blocks Grannus, leaving a narrow cone of darkness to work with. The telescope pulls faint targets out of the void like they were waiting.
        BelisamaInSpaceHigh* = #GEPscience_sspxTelescopeObservation_BelisamaInSpaceHigh_00 // Nodens and Belisama sit locked together below you, unmoving partners. The rest of the sky drifts by slowly, as if even the stars are conserving fuel.

        SucellusSrfLandedBasins* = #GEPscience_sspxTelescopeObservation_SucellusSrfLandedBasins_00 // The basin walls cut the red horizon glow into neat slices. The telescope loves the darkness; your nerves do not.
        SucellusSrfLandedLowlands* = #GEPscience_sspxTelescopeObservation_SucellusSrfLandedLowlands_00 // The surface looks like it wants to be mined, not admired. You point the telescope up anyway—resources can wait for starlight.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_SucellusSrfLandedTropicalMidlands_00 // The “tropical” label feels optimistic under a dim red sun. The sky survey comes back clean, cold, and very far from home.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_SucellusSrfLandedTemperateMidlands_00 // The mount settles into gritty soil and holds steady. You record an unfamiliar constellation and wonder what it’s called on the other side of the delay.
        SucellusSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_SucellusSrfLandedHighlands_00 // Higher up, the horizon glow thins and the stars sharpen. You catch a faint smear of light and label it “probably not a smudge this time.”
        SucellusSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_SucellusSrfLandedPoles_00 // Shadows here last long enough to feel permanent. You run long exposures and listen to the radio take its time remembering you exist.
        SucellusInSpaceLow* = #GEPscience_sspxTelescopeObservation_SucellusInSpaceLow_00 // Close orbit gives you quick shadows and quick views. The telescope works between sunlit passes like it’s sneaking science past the red glare.
        SucellusInSpaceHigh* = #GEPscience_sspxTelescopeObservation_SucellusInSpaceHigh_00 // From high above, Sucellus is a small, dark disk in a crowded, unfamiliar sky. The telescope finds more targets than you have names for.

        CaireenSrfLandedLowlands* = #GEPscience_sspxTelescopeObservation_CaireenSrfLandedLowlands_00 // The telescope is larger than the horizon. You point it up and the stars look sharp enough to cut through the comm delay.
        CaireenSrfLandedMidlands* = #GEPscience_sspxTelescopeObservation_CaireenSrfLandedMidlands_00 // The sky is black, the red sun is a distant bruise, and Sucellus looms nearby. You take measurements and feel like a footnote in someone else’s system.
        CaireenSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_CaireenSrfLandedHighlands_00 // A tiny ridge makes a perfect glare shield. You capture a clean star field and wonder how many messages it will take to convince anyone.
        CaireenSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_CaireenSrfLandedPoles_00 // The light barely changes and your shadows barely move. The telescope tracks smoothly while you count the seconds to the next delayed “copy.”
        CaireenInSpaceLow* = #GEPscience_sspxTelescopeObservation_CaireenInSpaceLow_00 // Caireen drops away into nothingness almost immediately. The telescope stares into deep space and the return signal feels like it’s traveling through time.
        CaireenInSpaceHigh* = #GEPscience_sspxTelescopeObservation_CaireenInSpaceHigh_00 // From far out, Caireen is nearly invisible and that feels appropriate. You log the quietest sky you’ve ever seen under the dimmest red sun you’ve ever avoided looking at.

        SironaInSpaceLow* = #GEPscience_sspxTelescopeObservation_SironaInSpaceLow_00 // Sirona’s banded glare tries to wash out the view, so you hide in its shadow and hunt for faint stars that don’t belong to any familiar map.
        SironaInSpaceHigh* = #GEPscience_sspxTelescopeObservation_SironaInSpaceHigh_00 // Farther out, the dim red sun feels smaller and the sky feels larger. You log a clean starfield and a long wait for anyone else to see it.

        AirmedSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTropicalLowlands_00 // Warm ground and a red-tinged sky make the telescope fight for contrast. You calibrate twice and still end up naming a new “definitely-not-a-smudge.”
        AirmedSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTemperateLowlands_00 // The air steadies for a moment and the stars snap into focus. You capture a tidy survey and then remember the comm delay will question it later.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTropicalMidlands_00 // From higher terrain, the horizon glow thins and the optics behave. The constellations still look wrong, but the data is right.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTemperateMidlands_00 // The telescope tracks smoothly while the radio stays quiet. You file the results and feel like you mailed them into the future.
        AirmedSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedHighlands_00 // Thin air, sharp stars, and a dim red sun that refuses to be ignored. You build a new pointing model because the old one feels homesick.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedDarkenedLowlands_00 // The sky is darker here, like the world is trying to hide. The telescope rewards the secrecy with crisp points of light and an uneasy silence.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedDarkenedMidlands_00 // In the long shadowed midlands, you can run exposures that would be impossible back home. The only thing that blurs is your sense of time.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedDarkenedHighlands_00 // High, dark, and quiet—perfect observing conditions and terrible for morale. The stars are razor-sharp, and your logbook handwriting is not.
        AirmedSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_AirmedSrfLandedPoles_00 // Low-angle red light skims the horizon for ages. You use the terrain as a sunshade and map the sky while waiting for delayed “copy.”
        AirmedInSpaceLow* = #GEPscience_sspxTelescopeObservation_AirmedInSpaceLow_00 // Airmed’s limb blocks the red glare like a moving shutter. In the brief darkness, the telescope finds faint targets faster than you can label them.
        AirmedInSpaceHigh* = #GEPscience_sspxTelescopeObservation_AirmedInSpaceHigh_00 // From high orbit, Airmed is a small disk under a distant ember. You watch unfamiliar star patterns drift by and feel very far from any checklist.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTropicalCraquelure_00 // The cracked ground looks like it’s been overcooked. The telescope shows a calm sky above it, which feels like a practical joke.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTemperateCraquelure_00 // Fine fractures crunch underfoot as you align the mount. The stars hold steady while the radio delay makes every discovery feel solitary.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTropicalLowlands_00 // Heat haze turns bright stars into tiny commas. You shorten exposures and still manage a survey that doesn’t look like handwriting.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTemperateLowlands_00 // The air is cooler and the optics settle down. You log a neat starfield and wonder what it’s called on the other side of the system.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTropicalMidlands_00 // Higher ground gives you darker skies and fewer excuses. The telescope pulls faint smears out of the void and you pretend they were planned targets.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTemperateMidlands_00 // The tracker hums, the sky stays still, and the comms stay slow. You collect excellent data and no immediate reassurance whatsoever.
        BorvoSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedHighlands_00 // From the highlands, the dim red sun sits low and watchful. You take long exposures and catch yourself listening for a reply that can’t arrive yet.
        BorvoSrfLandedMajorCraters* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedMajorCraters_00 // The crater walls make a perfect baffle against the horizon glow. The sky is so sharp it feels artificial, and the telescope loves it.
        BorvoSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_BorvoSrfLandedPoles_00 // Shadows here last long enough to become landmarks. You map the stars in silence and mark the time by how long the transmitter stays bored.
        BorvoInSpaceLow* = #GEPscience_sspxTelescopeObservation_BorvoInSpaceLow_00 // You dip into orbital night and let Borvo block the red sun. The telescope finds faint points that make your old star charts feel obsolete.
        BorvoInSpaceHigh* = #GEPscience_sspxTelescopeObservation_BorvoInSpaceHigh_00 // From far out, Borvo is a dark coin with bright edges. You stare past it into deep space and wait for your results to travel home at conversation speed.

        DamonaSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTropicalLowlands_00 // The telescope keeps trying to compensate for the red glare. You keep trying to convince it that the sky really does look like this now.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTemperateLowlands_00 // The stars are steady, but the world feels like it’s holding its breath. You log a clean sweep and a note: “Delay makes applause late.”
        DamonaSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTropicalMidlands_00 // From the midlands, the horizon glow is thinner and the sky is darker. The telescope picks out faint structure and your confidence picks a fight with the unknown.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTemperateMidlands_00 // The mount settles into firm ground and the tracking is perfect. You record an unfamiliar cluster and immediately miss having a quick second opinion.
        DamonaSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedHighlands_00 // High altitude turns the red sun into a distant nuisance instead of a constant problem. You run long exposures and feel the system’s distance in every quiet second.
        DamonaSrfLandedImpactBasin* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedImpactBasin_00 // The basin walls cut stray light like an observatory dome made of geology. The telescope delivers pristine starfields and you try not to think about the scale of the crater.
        DamonaSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_DamonaSrfLandedPoles_00 // The light barely changes, but the stars do. You chart them patiently, knowing the confirmation will arrive after you’ve already moved on.
        DamonaInSpaceLow* = #GEPscience_sspxTelescopeObservation_DamonaInSpaceLow_00 // Damona’s shadow is brief and precious. You squeeze in a quick scan of the darkest sky you can find and transmit it into the long wait.
        DamonaInSpaceHigh* = #GEPscience_sspxTelescopeObservation_DamonaInSpaceHigh_00 // From high orbit, Damona shrinks to a speck under a dim red ember. The telescope looks outward and you feel like the only person in the universe doing paperwork.

        EponaSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedTropicalLowlands_00 // The “tropics” are a polite label for ice under a dim red sun. The telescope finds crisp stars and a reminder that warmth is now mostly theoretical.
        EponaSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedTemperateLowlands_00 // The horizon glows faintly red, just enough to haunt long exposures. You build a new star chart and wonder how long it will take to be believed.
        EponaSrfLandedTropicalUplands* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedTropicalUplands_00 // Higher ground makes a better baffle against the red glare. The sky is sharp, silent, and not arranged like any constellation you remember.
        EponaSrfLandedTemperateUplands* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedTemperateUplands_00 // The mount bites into hard crust and holds steady. The telescope delivers excellent data, then you wait through the delay like it’s part of the experiment.
        EponaSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedHighlands_00 // Thin air and cold optics make the images almost too clean. You catch a faint smear of light and label it “not a lens smear (probably).”
        EponaSrfLandedGrandPeaks* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedGrandPeaks_00 // From the peaks, Epona feels like a dark observatory dome. The stars look close enough to poke, but the radio still answers from far away.
        EponaSrfLandedCraters* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedCraters_00 // Crater walls block the low red glow like a ready-made sunshade. You run long exposures and listen to silence stretch between check-ins.
        EponaSrfLandedVolcanoes* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedVolcanoes_00 // Heat shimmer fights the optics, hinting that Epona isn’t all frozen inside. You log the best sky you can get between thermal warnings.
        EponaSrfLandedPoles* = #GEPscience_sspxTelescopeObservation_EponaSrfLandedPoles_00 // The light barely changes, just fades from red to darker red. Perfect for astronomy, less perfect for remembering what “day” means.
        EponaInSpaceLow* = #GEPscience_sspxTelescopeObservation_EponaInSpaceLow_00 // You let Epona’s limb hide the red sun and steal a narrow cone of darkness. The telescope finds faint targets faster than your messages can leave.
        EponaInSpaceHigh* = #GEPscience_sspxTelescopeObservation_EponaInSpaceHigh_00 // From far out, Epona is a cold disk under a distant ember. You survey a quiet sky and feel the delay turn discoveries into time capsules.

        RosmertaSrfLandedTropicalLowlands* = #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTropicalLowlands_00 // Rosmerta’s “tropics” are cold, airless, and lonely. The telescope loves the steady vacuum; you do not love how big the sky feels.
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTemperateLowlands_00 // Epona hangs nearby like a giant night-light, tinting the surface in dull red. You aim away from the glow and map unfamiliar star patterns.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTropicalMidlands_00 // The ground is powdery and patient, like it’s been waiting a long time for visitors. The telescope delivers pin-sharp stars and no immediate reassurance.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTemperateMidlands_00 // You run a careful survey while the radio delay answers yesterday’s questions. The stars do not twinkle here, which is somehow worse.
        RosmertaSrfLandedHighlands* = #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedHighlands_00 // From the highlands, Epona’s glare is easier to dodge. You capture a clean field and realize you’re building a whole new “north.”
