        LaytheFlyingLowArcticSea* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowArcticSea_00 // Cold air and dry layers shear over the surface, with only thin ribbons of humidity near the water. The analyzer reports fewer aerosols and more turbulence.
