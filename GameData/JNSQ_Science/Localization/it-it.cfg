        #JNSQscience_sspxFishStudy_KrelInSpaceHigh_01 = Registri attività ridotta nel buio prolungato. I pesci registrano rispetto ridotto per il tuo prendere appunti.
        #JNSQscience_sspxFishStudy_AdenSrfLanded_00 = La superficie è roccia nuda e ombre lunghe. I pesci fissano fuori come se si aspettassero che la roccia inizi a nuotare in risposta.
