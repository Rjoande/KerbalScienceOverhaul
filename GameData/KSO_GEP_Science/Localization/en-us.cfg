        #GEPscience_bd_orbitalScope_DamonaInSpaceLowImpactBasin_00 = The impact basin dominates multiple frames like a scar that never healed straight. You stitch a wide swath around it, because this feature will be the only thing everyone agrees on.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowPoles_00 = The poles brighten and darken in sharp patches with no gentle transitions, as if the surface can’t decide what it’s made of. You capture extra coverage and try not to wonder what’s happening down there.

        #GEPscience_bd_orbitalScope_EponaInSpaceHigh_00 = From high orbit, Epona is a cold marble under a dim red sun, with a faint haze that makes the mosaic arrive as a slow, uncertain reveal. The map team back home argues over “ice” versus “cloud” while the signal crawls through relays.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTropicalLowlands_00 = The tropical lowlands look dark and smooth, like frozen ground pretending to be calm water. Your overlap grid is perfect; the lighting isn’t, and the stitch seams show it.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTemperateLowlands_00 = Temperate lowlands resolve into broad plains with subtle streaking that only appears at low sun angles. You schedule another pass and remember that “later” is very far away out here.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTropicalUplands_00 = The tropical uplands cast long shadows that exaggerate every ridge into a warning sign. The camera loves the contrast; the landing planners do not.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTemperateUplands_00 = Temperate uplands show mottled tones that don’t match neat elevation lines, hinting at mixed materials under the ice. You tag it “composition?” and let the delayed debates begin.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowHighlands_00 = The highlands sharpen into fractured plateaus with bright outcrops that make excellent control points. They also make excellent reminders that this world is not built for comfort.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowGrandPeaks_00 = The Grand Peaks rise like jagged teeth at the terminator, throwing shadows deep enough to swallow your dynamic range. Your mosaic looks dramatic, and you’re not sure that’s a compliment.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowCraters_00 = Craters stitch together neatly—finally, something that holds still—until you notice faint drifted deposits softening rims between passes. Even the scars are changing in the red twilight.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowVolcanoes_00 = The volcano fields show dark cones and stained terrain that read as “recent” even from orbit. The camera’s sensor warms just looking at them, which is probably not how heat works.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowPoles_00 = The poles brighten into harsh patches with scalloped edges that refuse to look like simple frost. You take extra coverage and quietly hope the planet stays frozen while you’re nearby.

        #GEPscience_bd_orbitalScope_RosmertaInSpaceHigh_00 = From high orbit, Rosmerta is a lonely speck circling Epona, lit by a tired red sun and surrounded by too much empty. The full mosaic trickles back so slowly it feels like you’re mapping a memory.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTropicalLowlands_00 = The lowlands are flat, airless, and unforgivingly crisp—every pebble wants to be a landmark. Radiation noise peppering the frames is your reminder that “crisp” comes with a price.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTemperateLowlands_00 = Temperate lowlands show smooth basins and dusted flats that stitch cleanly into a usable map. The result is tidy in the same way an empty room is tidy.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTropicalMidlands_00 = Tropical midlands break into ridges and shallow troughs that look like frozen waves. You set more control points than you need, mostly to feel in control.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTemperateMidlands_00 = The midlands are mottled with bright flecks that pop under the dim light, then vanish at a different angle. You label them “outcrops” and resist naming them after snacks.
