        // === Bluedog_DB ===
        // ALSEP
        #ScienceRefactor_bd_ALSEP_ActiveSeismic_default_00 = Dati del test sismico attivo dalla superficie.
        #ScienceRefactor_bd_ALSEP_Camera_default_00 = Le vedute dalla superficie di un altro mondo incantano chi è rimasto a casa!
        #ScienceRefactor_bd_ALSEP_CPLEE_default_00 = Vengono misurati numeri, velocità e direzioni di elettroni e ioni vicino alla superficie. Questo offre indicazioni sul vento solare, sui raggi cosmici solari a bassa energia e sulla magnetosfera locale.
        #ScienceRefactor_bd_ALSEP_Gravimeter_default_00 = Dati di osservazione gravitazionale a lungo termine dalla superficie.
        #ScienceRefactor_bd_ALSEP_HeatFlow_default_00 = Usando una combinazione di riscaldatori e termometri perforati nella superficie, è possibile misurare la conducibilità termica del suolo locale.
        #ScienceRefactor_bd_ALSEP_Magnetometer_default_00 = Dati del campo magnetico a lungo termine dalla superficie. 
        #ScienceRefactor_bd_ALSEP_Meteorite_default_00 = Dati a lungo termine su ejecta e meteoriti dalla superficie.
        #ScienceRefactor_bd_ALSEP_RadioTelescope_default_00 = Dati a lungo termine del radiotelescopio dalla superficie.
        #ScienceRefactor_bd_ALSEP_SEP_default_00 = Vengono misurate le proprietà conduttive della superficie a diverse profondità.
        #ScienceRefactor_bd_ALSEP_SolarWind_default_00 = Dati di osservazione del vento solare a lungo termine dalla superficie.
        #ScienceRefactor_bd_ALSEP_SWC_default_00 = Dopo aver lasciato il foglio di lamina al sole per alcune ore, sei pronto a riporlo per il viaggio di ritorno. Speri di ricordare il modo corretto di piegarlo...
        #ScienceRefactor_bd_ALSEP_Telescope_default_00 = Osservazione visiva a lungo termine dei cieli.

        #ScienceRefactor_bd_ALSEP_LRRR_default_00 = Ora che il riflettore è installato, gli scienziati a casa potranno misurare con grande precisione la distanza da questo punto.
        #ScienceRefactor_bd_ALSEP_LRRR_KerbinSrfLanded_00 = Già, sembra riflettente. E adesso?
        #ScienceRefactor_bd_ALSEP_LRRR_MunSrfLanded_00 = Ora che il riflettore è installato, gli scienziati su Kerbin potranno misurare con grande precisione la distanza da Mun.
        #ScienceRefactor_bd_ALSEP_LRRR_MinmusSrfLanded_00 = Ora che il riflettore è installato, gli scienziati su Kerbin potranno misurare con grande precisione la distanza da Minmus.

        #ScienceRefactor_bd_ALSEP_UVscope_default_00 = Fotografi diversi bersagli astronomici, catturando stelle calde e luminose in giovani ammassi stellari, residui gassosi di supernovae e strane strutture evanescenti sui pianeti.
        #ScienceRefactor_bd_ALSEP_UVscope_KerbinSrfLanded_00 = Questo telescopio è progettato per l'uso nello spazio, ma pensi di poter sostituire la pellicola con quella di una macchina fotografica usa e getta per ottenere qualche immagine in luce visibile del paesaggio. Ti sbagliavi. Decidi che la prossima volta che passerai di qui porterai un cannocchiale, oppure un obiettivo a lunga focale, o magari un buon paio di binocoli.
        #ScienceRefactor_bd_ALSEP_UVscope_MunSrfLanded_00 = La fotocamera nel lontano ultravioletto è puntata verso Kerbin usando i cerchi di puntamento digitali integrati e un piccolo cercatore. L'immagine rivela una luminosa kerbincorona, formata dalla luce proveniente dagli strati esterni dell'atmosfera di Kerbin. Strano: finora si pensava che l'atmosfera di Kerbin terminasse esattamente a 70 chilometri, ma questa kerbincorona si estende fino a 15 raggi di Kerbin, ovvero 9.000 chilometri. Il bagliore atmosferico prodotto dalla radiazione solare illumina la metà del disco di Kerbin rivolta verso il Sole, e sono visibili anche le zone aurorali insieme a due fasce equatoriali di bagliore atmosferico. La fotocamera viene puntata anche verso diversi bersagli astronomici ed è in grado di osservare regioni di formazione stellare in galassie vicine molto meglio rispetto alla fotografia in luce visibile.
        #ScienceRefactor_bd_ALSEP_UVscope_MinmusSrfLanded_00 = Dal suo punto di osservazione sulla superficie di Minmus, la fotocamera nel lontano ultravioletto è puntata verso Kerbin e Mun per studiare l'interazione tra la kerbincorona, la coda magnetica e Mun. Nelle lunghe esposizioni viene rilevato un debole bagliore su Mun. Vengono inoltre rilevate e analizzate la corona del Sole e il vento stellare, mostrando forti linee di emissione dell'“elio”. I tecnici in laboratorio dicono di non aver mai sentito parlare dell'elio prima d'ora, quindi potrebbe trattarsi di un elemento del tutto nuovo, presente solo nello spazio. Dati molto preliminari, ma roba entusiasmante.
        #ScienceRefactor_bd_ALSEP_UVscope_MohoSrfLanded_00 = Applicando un filtro speciale, la fotocamera nel lontano ultravioletto è in grado di scattare immagini dettagliate e ad alta risoluzione del disco solare, rilevando regioni turbolente e spumeggianti, oltre a filamenti e protuberanze. Quando viene puntata lontano dal Sole, la fotocamera risolve lo spettro ricco di sodio della coda cometaria di Moho.
        #ScienceRefactor_bd_ALSEP_UVscope_GillySrfLanded_00 = La fotocamera nel lontano ultravioletto riprende immagini di Eve, rivelando una brillante corona di particelle ionizzate che sfuggono dal pianeta a causa dei venti kerbolari. Praticamente tutto su Eve è incredibilmente violaceo, quindi non sorprende che nell'ultravioletto si trovino fenomeni davvero interessanti.
        #ScienceRefactor_bd_ALSEP_UVscope_EveSrfLanded_00 = Solo perché questo è un pianeta incredibilmente violaceo non significa che una fotocamera ultravioletta funzioni qui. Già. Evviva. Ora sappiamo che la radiazione nel lontano ultravioletto non penetra l'atmosfera di Eve, ma dai, potevi mandare qui un semplice fotometro invece di un costoso astrografo placcato in oro. Ci sono così tanti posti migliori dove installare questo strumento. Tipo montarlo su una sorta di telescopio solare su una stazione spaziale, oppure inviarlo sulla luna di Eve e osservare da lì.
        #ScienceRefactor_bd_ALSEP_UVscope_DunaSrfLanded_00 = La polvere nell'atmosfera di Duna impedisce a una parte consistente della radiazione nel lontano ultravioletto di raggiungere lo strumento, tuttavia con esposizioni prolungate è visibile un debole bagliore proveniente da Ike, soprattutto quando è “pieno”, indicando curiosamente una qualche interazione con la corona di Duna.
        #ScienceRefactor_bd_ALSEP_UVscope_IkeSrfLanded_00 = Lo strumento è puntato verso diversi bersagli astronomici lontani, ma il più importante di tutti è la vista di Duna. È presente una corona di particelle ionizzate degli strati alti dell'atmosfera, spazzate via dal vento solare, talmente estesa da minacciare di riempire l'intero campo visivo della fotocamera. Sembra infatti che l'alta atmosfera di Duna possa interagire direttamente con Ike in determinati momenti.
        #ScienceRefactor_bd_ALSEP_UVscope_DresSrfLanded_00 = Non essendoci altri corpi astronomici vicini da osservare, la fotocamera nel lontano ultravioletto viene puntata esclusivamente verso bersagli distanti per costruire una visione completa dell'intero cielo. I dati raccolti da questa posizione remota saranno fondamentali per mappare le regioni galattiche di formazione stellare, le classificazioni spettrali delle giovani stelle calde e... OH CIELO che cos'è questo debole arco polveroso nel cielo che diffonde la luce? Sembra esserci una sorta di disco di detriti attorno a Dres.
        #ScienceRefactor_bd_ALSEP_UVscope_LaytheSrfLanded_00 = La radiazione ultravioletta non penetra l'atmosfera di Laythe, ma la buona notizia è che la condensa umida fa sembrare l'involucro dorato ancora più luccicante.
        #ScienceRefactor_bd_ALSEP_UVscope_JoolSrfLanded_00 = Curiosità: la radiazione ultravioletta non riesce a penetrare le nuvole verdi.
        #ScienceRefactor_bd_ALSEP_UVscope_VallSrfLanded_00 = La fotocamera nel lontano ultravioletto è puntata verso i satelliti del sistema di Jool. Laythe presenta una complessa corona luminosa che costituisce la sua esosfera, fondendosi gradualmente in un toro di gas incredibilmente brillante che circonda l'orbita di Laythe. Stranamente, nonostante l'apparente assenza di atmosfera, anche Tylo possiede una corona piuttosto luminosa, come se avesse un'esosfera simile a quella di Laythe e Kerbin. L'atmosfera di Jool brilla intensamente con un drammatico schema aurorale in rapido cambiamento.
        #ScienceRefactor_bd_ALSEP_UVscope_TyloSrfLanded_00 = La fotocamera nel lontano ultravioletto è puntata verso i satelliti del sistema di Jool. Laythe presenta una complessa corona luminosa che costituisce la sua esosfera, fondendosi gradualmente in un toro di gas incredibilmente brillante che circonda l'orbita di Laythe. Vall è associata a un toro di gas decisamente più debole, con alcuni “punti caldi” evidenti che potrebbero corrispondere a regioni più basse della sua crosta. L'atmosfera di Jool brilla intensamente con un drammatico schema aurorale in rapido cambiamento.
        #ScienceRefactor_bd_ALSEP_UVscope_BopSrfLanded_00 = La fotocamera nel lontano ultravioletto è puntata verso i satelliti del sistema di Jool. Laythe presenta una complessa corona luminosa che costituisce la sua esosfera, fondendosi gradualmente in un toro di gas incredibilmente brillante che circonda l'orbita di Laythe. Vall è associata a un toro di gas decisamente più debole, con alcuni “punti caldi” evidenti che potrebbero corrispondere a regioni più basse della sua crosta. Anche Tylo possiede una corona piuttosto luminosa, come se avesse un'esosfera simile a quella di Laythe e Kerbin. L'atmosfera di Jool brilla intensamente con un drammatico schema aurorale in rapido cambiamento.
        #ScienceRefactor_bd_ALSEP_UVscope_PolSrfLanded_00 = La fotocamera nel lontano ultravioletto è puntata verso i satelliti del sistema di Jool. Laythe presenta una complessa corona luminosa che costituisce la sua esosfera, fondendosi gradualmente in un toro di gas incredibilmente brillante che circonda l'orbita di Laythe. Vall è associata a un toro di gas decisamente più debole, con alcuni “punti caldi” evidenti che potrebbero corrispondere a regioni più basse della sua crosta. Anche Tylo possiede una corona piuttosto luminosa, come se avesse un'esosfera simile a quella di Laythe e Kerbin. L'atmosfera di Jool brilla intensamente con un drammatico schema aurorale in rapido cambiamento. Da un'orbita così distante, la joolcorona è visibile debolmente come una complessa rete di flussi di vento stellare, campi magnetici arcuati e interazioni con i tori di gas. Lo spettro di Bop sembra completamente sbagliato, ma non riesci a capire bene perché.
        #ScienceRefactor_bd_ALSEP_UVscope_EelooSrfLanded_00 = Lontano dal Sole e con uno speciale filtro coronografico, la fotocamera viene configurata per acquisire immagini a esposizione ultra-prolungata dell'intero vento solare del sistema di Kerbol. Le interazioni tra i campi magnetici dei pianeti vengono mappate in sottili pattern di luce e ombra. Le regioni di formazione stellare della Via Lattea si stagliano come uno sfondo luminoso e irregolare, e sarà necessario un notevole impegno per separare il fondo stellato dal più debole deflusso coronale. Ma quaggiù... hai tutto il tempo che serve.

        // bd_atm
        #ScienceRefactor_bd_atm_default_00 = Raccolte immagini ad alta risoluzione del Sole.
        #ScienceRefactor_bd_atm_default_01 = Queste foto fanno quasi pensare che ci sia... una specie di buco nella corona del Sole.
        #ScienceRefactor_bd_atm_default_02 = Un'enorme protuberanza si estende dal Sole. La nostra casa è solo un puntino al confronto.
        #ScienceRefactor_bd_atm_default_03 = Raccolte misurazioni in H-alpha della cromosfera del Sole durante un brillamento solare.
        #ScienceRefactor_bd_atm_GillyInSpace_00 = Monitoraggio dell'attività dei brillamenti solari... sembra tutto tranquillo, per ora.
        #ScienceRefactor_bd_atm_MohoInSpace_00 = Monitoraggio dell'attività dei brillamenti solari. Anche uno piccolo diretto verso il veicolo potrebbe essere catastrofico, se ci cogliesse impreparati.
        #ScienceRefactor_bd_atm_SunInSpaceLow_00 = In qualche modo dubiti che il supporto del telescopio sia stato progettato per avvicinarsi così tanto...
        #ScienceRefactor_bd_atm_KerbinFlyingHigh_00 = Sembra che il supporto del telescopio si trovi attualmente nell'atmosfera. Sta rientrando in anticipo? Forse c'entra qualcosa il Sole.
        #ScienceRefactor_bd_atm_DunaInSpace_00 = Monitoraggio dell'attività dei brillamenti solari... sembra tutto tranquillo, per ora.
        #ScienceRefactor_bd_atm_JoolInSpace_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Jool e le sue lune, rivelando splendidi dettagli delle nubi turbinanti di Jool.
        #ScienceRefactor_bd_atm_JoolInSpace_01 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare le lune di Jool. Laythe sembra avere un sistema meteorologico non troppo dissimile da quello di Kerbin.
        #ScienceRefactor_bd_atm_JoolInSpace_02 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare le lune di Jool. Sembra esserci una corona attorno a Vall... aspetta, no, sono solo pennacchi di vapore acqueo.
        #ScienceRefactor_bd_atm_JoolInSpace_03 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare le lune di Jool. Il telescopio mappa i crateri di Tylo.
        #ScienceRefactor_bd_atm_LaytheInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Jool. Le osservazioni visive restituiscono splendide immagini delle bande nuvolose turbinanti del pianeta verde.
        #ScienceRefactor_bd_atm_LaytheInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Laythe. Vengono osservati i pattern delle nubi di Laythe. La dinamica atmosferica è piuttosto simile a quella di Kerbin.
        #ScienceRefactor_bd_atm_VallInSpace_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Jool. Le osservazioni visive restituiscono splendide immagini delle bande nuvolose turbinanti del pianeta verde.
        #ScienceRefactor_bd_atm_TyloInSpace_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Jool. Le osservazioni visive restituiscono splendide immagini delle bande nuvolose turbinanti del pianeta verde.
        #ScienceRefactor_bd_atm_BopInSpace_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Jool. Le osservazioni visive restituiscono splendide immagini delle bande nuvolose turbinanti del pianeta verde.
        #ScienceRefactor_bd_atm_PolInSpace_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Jool. Le osservazioni visive restituiscono splendide immagini delle bande nuvolose turbinanti del pianeta verde.
        #ScienceRefactor_bd_atm_EelooInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Purtroppo il telescopio è troppo vicino a Eeloo per ottenere buone immagini del pianeta.
        #ScienceRefactor_bd_atm_EelooInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Rimuovendo i filtri, il telescopio può essere usato per studiare Eeloo. È possibile ricostruire mappe dettagliate del terreno di Eeloo.

        // bd_bioexp
        #ScienceRefactor_bd_bioexp_default_00 = Le osservazioni delle piccole creature suggeriscono che si stiano adattando all'ambiente di microgravità con sorprendente rapidità.
        #ScienceRefactor_bd_bioexp_default_01 = Ci sono prove che le rane abbiano popolato Kerbin per oltre 200 milioni di anni, almeno quanto i kerbal.
        #ScienceRefactor_bd_bioexp_default_02 = La rana più grande del mondo è la rana golia dell'Africa occidentale: può raggiungere i 38 centimetri di lunghezza e pesare fino a 3 chili. Uno scheletro di rana golia è esposto in Frogs: A Chorus of Colors.
        #ScienceRefactor_bd_bioexp_default_03 = Una delle più piccole è il rospo arboricolo cubano, che cresce fino a circa un centimetro di lunghezza.
        #ScienceRefactor_bd_bioexp_default_04 = Sebbene la durata della vita delle rane in natura sia sconosciuta, è noto che rane in cattività possano vivere più di 20 anni.
        #ScienceRefactor_bd_bioexp_default_05 = Esistono oltre 6.000 specie di rane nel mondo. Gli scienziati continuano a cercarne di nuove.
        #ScienceRefactor_bd_bioexp_default_06 = I rospi sono rane. Il termine “rospo” viene solitamente usato per rane con pelle verrucosa e secca, oltre che con zampe posteriori più corte.
        #ScienceRefactor_bd_bioexp_default_07 = Le rane hanno un'eccellente visione notturna e sono molto sensibili al movimento. Gli occhi sporgenti della maggior parte delle rane permettono loro di vedere davanti, ai lati e parzialmente dietro. Quando una rana ingoia il cibo, ritrae gli occhi nel palato per aiutare a spingerlo giù per la gola.
        #ScienceRefactor_bd_bioexp_default_08 = Le rane furono i primi animali terrestri dotati di corde vocali. I maschi hanno sacche vocali, tasche di pelle che si riempiono d'aria. Questi palloni amplificano i suoni come un megafono e alcuni richiami possono essere uditi da oltre un chilometro di distanza.
        #ScienceRefactor_bd_bioexp_default_09 = Spinte dalle loro lunghe zampe, molte rane possono saltare per più di 20 volte la lunghezza del proprio corpo.
        #ScienceRefactor_bd_bioexp_default_10 = La rana volante arboricola del Costa Rica plana da un ramo all'altro grazie alle sue zampe. Le membrane tra dita delle mani e dei piedi si estendono, aiutando la rana a planare.
        #ScienceRefactor_bd_bioexp_default_11 = Per mimetizzarsi nell'ambiente, la rana di Budgett è di colore marrone fangoso, mentre la rana muschiosa vietnamita ha pelle maculata e protuberanze che la fanno sembrare piccoli ciuffi di muschio o licheni.
        #ScienceRefactor_bd_bioexp_default_12 = Molte rane velenose, come la rana dorata velenosa e la rana tintoria velenosa, hanno colori vistosi per avvertire i predatori della loro pelle tossica. Alcune rane colorate, come la rana ladra di Fort Randolph, hanno sviluppato la stessa colorazione di una specie velenosa con cui convivono. Pur non essendo tossiche, queste imitatrici possono ottenere protezione dai predatori apparendo pericolose.
        #ScienceRefactor_bd_bioexp_default_13 = La rana australiana che trattiene l'acqua è un'abitante del deserto che può attendere fino a sette anni la pioggia. Si scava una tana sottoterra e si avvolge in un bozzolo trasparente formato dalla propria pelle mutata.
        #ScienceRefactor_bd_bioexp_default_14 = Quasi tutte le rane fecondano le uova all'esterno del corpo della femmina. Il maschio abbraccia la femmina intorno alla vita in un amplesso chiamato amplexus. Feconda le uova mentre la femmina le depone. L'amplexus può durare ore o giorni. Una coppia di rospi andini è rimasta in amplexus per quattro mesi.
        #ScienceRefactor_bd_bioexp_default_15 = La rana incubatrice gastrica australiana ingoia le uova fecondate. I girini rimangono nello stomaco fino a otto settimane, per poi saltare fuori dalla bocca come piccole rane. Durante il periodo di incubazione, le secrezioni gastriche cessano, altrimenti la femmina digerirebbe la propria prole.
        #ScienceRefactor_bd_bioexp_default_16 = Tra le rane di Darwin, è il maschio a ingoiare e conservare i girini in sviluppo nel proprio sacco vocale fino a quando emergono come giovani rane.
        #ScienceRefactor_bd_bioexp_default_17 = Come tutti gli anfibi, le rane sono a sangue freddo, il che significa che la loro temperatura corporea cambia con quella dell'ambiente circostante. Quando le temperature scendono, alcune rane scavano tane nel terreno o nel fango sul fondo degli stagni. Svernano in queste tane fino alla primavera, completamente immobili e respirando a malapena.
        #ScienceRefactor_bd_bioexp_default_18 = La rana dei boschi può vivere a nord del Circolo Polare Artico, sopravvivendo per settimane con il 65 percento del corpo congelato. Questa rana utilizza il glucosio nel sangue come una sorta di antigelo, che si concentra negli organi vitali proteggendoli dai danni mentre il resto del corpo congela completamente.
        #ScienceRefactor_bd_bioexp_default_19 = Le rane sono creature d'acqua dolce, anche se alcune specie, come la rana leopardo della Florida, sono in grado di vivere in acque salmastre o quasi completamente salate.
        #ScienceRefactor_bd_bioexp_default_20 = La rana marsupiale conserva le uova in una sacca simile a quella di un canguro. Quando le uova si schiudono in girini, apre la sacca con le dita dei piedi e li riversa nell'acqua.
        #ScienceRefactor_bd_bioexp_default_21 = Pipa pipa, il rospo del Suriname del Sud America, trasporta i piccoli incorporati nella pelle del dorso. Dopo l'accoppiamento, le uova sprofondano gradualmente nella schiena della femmina e si forma un cuscinetto di pelle sopra di esse. Le giovani rane in sviluppo sono visibili all'interno delle loro tasche per diversi giorni prima della schiusa. Emergeno nell'arco di più giorni, spingendo fuori prima la testa e le zampe anteriori, poi liberandosi con fatica.
        #ScienceRefactor_bd_bioexp_KerbinSrfLanded_00 = Le piccole creature sembrano felici di essere tornate a casa su Kerbin.
        #ScienceRefactor_bd_bioexp_KerbinInSpace_00 = Le creature sembrano confuse su quale sia l'alto o il basso, ma per il resto appaiono piuttosto contente.
        #ScienceRefactor_bd_bioexp_KerbinFlying_00 = Una rana volante, detta anche rana planatrice, è una rana capace di effettuare un volo planato. In pratica può scendere con un angolo inferiore ai 45° rispetto all'orizzontale. Altre rane arboricole non volanti possono scendere solo con angoli superiori ai 45°, in quello che viene definito paracadutaggio.
        #ScienceRefactor_bd_bioexp_MunSrfLanded_00 = Qualcuno intervistato da The Quibbler ha affermato di aver riportato con sé un sacco di rane di Mun per dimostrare di essere davvero volato su Mun a bordo di un Cleansweep 6.

        // bd_camera
        #ScienceRefactor_bd_camera_default_00 = Scatti una foto di qualunque cosa stia inquadrando la fotocamera. Carina.
        #ScienceRefactor_bd_camera_default_01 = Sarebbe un'aggiunta perfetta all'album fotografico del CSK!
        #ScienceRefactor_bd_camera_default_02 = Vorresti che la foto appena scattata potesse essere stampata subito come una polaroid. Chissà, potrebbe diventare la prossima grande moda del turismo spaziale.
        #ScienceRefactor_bd_camera_default_03 = La velocità dell'otturatore è stata impostata per sbaglio su un tempo lunghissimo e la foto risultante è una grossa strisciata che ti ricorda uno yogurt aromatizzato.
        #ScienceRefactor_bd_camera_default_04 = Mentre scatti quella che può essere descritta solo come una foto capolavoro, valuti le tue possibilità come fotografo di professione.
        #ScienceRefactor_bd_camera_default_05 = In che senso le impostazioni sono tutte sbagliate? Diaframma schiaframma, questa è scienza!
        #ScienceRefactor_bd_camera_SunInSpaceHigh_00 = È molto luminosa e molto bella. Kerbol, la stella che tiene in vita i kerbal...
        #ScienceRefactor_bd_camera_SunInSpaceLow_00 = La luce emanata da Kerbol ha reso l'immagine completamente bianca. Per fortuna non hai danneggiato la fotocamera...
        #ScienceRefactor_bd_camera_KerbinSrfLandedAdministration_00 = Gli amministratori brontolano e quasi nessuno sorride, ma riesci a ottenere una foto di gruppo di tutti, tranne Stan, di cui hai tagliato la testa nell'inquadratura.
        #ScienceRefactor_bd_camera_KerbinSrfLandedAstronautComplex_00 = Gli astronauti, per come sono fatti, iniziano a litigare per decidere chi starà al centro della foto di gruppo. Inutile dirlo, ha vinto Jeb.
        #ScienceRefactor_bd_camera_KerbinSrfLandedCrawlerway_00 = La pista di trasporto è una lunga striscia di cemento, ma la tua foto potrebbe finire un giorno in una galleria d'arte astratta.
        #ScienceRefactor_bd_camera_KerbinSrfLandedFlagPole_00 = È un benedetto pennone. E oggi non c'è nemmeno una bandiera. Quindi hai fotografato un lungo bastone di metallo.
        #ScienceRefactor_bd_camera_KerbinSrfLandedLaunchPad_00 = I dettagli attorno alla piattaforma di lancio piaceranno moltissimo a chi gioca all'ultimo videogioco, Human Space Program, un gioco molto popolare su una razza immaginaria di creature che va nello spazio.
        #ScienceRefactor_bd_camera_KerbinSrfLandedMissionControl_00 = Le foto dall'interno del Controllo Missione sono state confiscate all'ingresso da un kerbal molto grosso di nome Arnold. Non hai discusso.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&D_00 = All'inizio i ricercatori erano felicissimi che fotografassi i loro esperimenti, ma quando hai iniziato a fare domande su cosa rivelassero si sono arrabbiati e ti hanno detto che era roba altamente tecnica, esplosiva e complicata, e che non avresti capito.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DCentralBuilding_00 = Ora hai una foto di un grande edificio di cemento, senza insegne e senza nome.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DCornerLab_00 = Ora hai un'altra foto di un altro grande edificio di cemento, e per giunta è all'angolo.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DMainBuilding_00 = Un altro grande edificio di cemento. Vorresti davvero avere foto dall'interno, ma i ricercatori non ti lasciano entrare, dato che facevi troppe domande a cui non sapevano rispondere.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DObservatory_00 = Quando hai chiesto se potevi attaccare la fotocamera al telescopio per scattare qualche foto ti hanno guardato in modo strano. Però sei riuscito a fare una bella foto del telescopio.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DSideLab_00 = Guarda, un altro edificio di cemento. Un giorno potrai raccontare ai tuoi nipoti una storia incredibile su qualcosa che non ti è mai successo in questo edificio.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DSmallLab_00 = Per un attimo ti è parso di vedere, dietro la finestra, una figura alta e vagamente simile a un kerbal, con pelle bruno rosata, testa rotonda e quasi quattro volte l'altezza di un kerbal normale. Inquietante. Purtroppo la foto che hai scattato è sfocata. Nessuno ti crederà.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DTanks_00 = È un grande serbatoio pieno di qualcosa che non riesci a identificare e i ricercatori si rifiutano di dirti cosa sia.
        #ScienceRefactor_bd_camera_KerbinSrfLandedR&DWindTunnel_00 = Le foto dell'ultimo test in galleria del vento del nuovo veicolo di lancio sono state confiscate di nuovo da Arnold, il kerbal gigante. I giornali parlano di un successo clamoroso, ma tu sai che non è così. Solo che non hai più prove. Il test con equipaggio andrà avanti.
        #ScienceRefactor_bd_camera_KerbinSrfLandedRunway_00 = Le foto degli aerei in atterraggio che hai scattato sono venute davvero bene e sono apparse su Kane's Defense Weekly.
        #ScienceRefactor_bd_camera_KerbinSrfLandedSPH_00 = Diverse foto dell'ultima generazione di spazioplani sono finite al pubblico e la colpa, a quanto pare, è tua.
        #ScienceRefactor_bd_camera_KerbinSrfLandedSPHMainBuilding_00 = Dovresti tornare sulla pista per altre foto di aerei. Le foto di grandi edifici di cemento non sono poi così interessanti.
        #ScienceRefactor_bd_camera_KerbinSrfLandedSPHRoundTank_00 = È un serbatoio pieno di carburante per jet. Almeno i piloti dicono così, ma in segreto credi che sia il deposito delle scorte di birra di Jeb.
        #ScienceRefactor_bd_camera_KerbinSrfLandedSPHTanks_00 = Se la birra di Jeb non è nel serbatoio rotondo, allora dev'essere qui. Purtroppo, se ti sbagli quando apri il serbatoio, probabilmente morirai.
        #ScienceRefactor_bd_camera_KerbinSrfLandedSPHWaterTower_00 = Nella caccia al deposito di birra di Jeb hai fotografato la torre dell'acqua. Purtroppo Arnold, il kerbal gigante, ti ha ordinato di scendere a metà della scalata verso la cima, così da smentire la tua teoria.
        #ScienceRefactor_bd_camera_KerbinSrfLandedTrackingStation_00 = Mentre inizi a fotografare le grandi antenne paraboliche della zona, vedi arrivare un'auto governativa nera, ma non scende nessuno. Restano lì. A guardarti.
        #ScienceRefactor_bd_camera_KerbinSrfLandedTrackingStationDishEast_00 = L'auto governativa nera gira l'angolo mentre ti dirigi verso l'antenna est. Forse la tua fotocamera li mette a disagio.
        #ScienceRefactor_bd_camera_KerbinSrfLandedTrackingStationDishNorth_00 = Quattro kerbal in completo nero con cravatta e occhiali scuri sono scesi tutti dall'auto. Uno di loro parla al polso per qualche motivo, mentre ti fissa direttamente mentre scatti le foto.
        #ScienceRefactor_bd_camera_KerbinSrfLandedTrackingStationDishSouth_00 = Mentre ti affretti verso l'antenna sud, giri l'angolo e finisci addosso ad Arnold, seguito da uno degli uomini in nero. Un lampo accecante e, quando ti svegli, non c'è più nessuno, non ricordi nulla e la fotocamera è vuota, senza nemmeno una foto.
        #ScienceRefactor_bd_camera_KerbinSrfLandedTrackingStationHub_00 = Sei riuscito a scattare una foto dell'hub, ma alla distanza da cui l'hai presa sembra solo una casa mobile con tre grandi antenne satellitari nel prato davanti.
        #ScienceRefactor_bd_camera_KerbinSrfLandedVAB_00 = L'EAV è così alto che hai dovuto sdraiarti per farlo entrare nell'inquadratura. Hai vinto un premio da 50 dollari in un concorso di fotografia astratta con questa immagine.
        #ScienceRefactor_bd_camera_KerbinSrfLandedVABMainBuilding_00 = Dopo aver vinto 50 dollari con l'altra foto dell'EAV, hai deciso di riprovarci allo stesso modo. Purtroppo ormai è una cosa vecchia e tutti scattano foto sdraiandosi per terra.
        #ScienceRefactor_bd_camera_KerbinSrfLandedVABPodMemorial_00 = Il memoriale è un cupo promemoria di tutte le anime coraggiose che sono venute prima e hanno dato la vita per il bene superiore. Almeno questo è ciò che dicono i ricercatori e gli ingegneri che le hanno fatte saltare in aria.
        #ScienceRefactor_bd_camera_KerbinSrfLandedVABRoundTank_00 = La caccia al deposito di birra di Jeb continua...
        #ScienceRefactor_bd_camera_KerbinSrfLandedVABSouthComplex_00 = Gli ingegneri hanno scelto questo punto per la loro foto di gruppo. Era bellissima e tutti e 219 ti hanno chiesto di farne una copia.
        #ScienceRefactor_bd_camera_KerbinSrfLandedVABTanks_00 = La squadra di terra ha scelto questo posto per la sua foto di gruppo. Sei quasi certo che fosse solo un pretesto per proteggere il deposito di birra di Jeb.
        #ScienceRefactor_bd_camera_KerbinSrfLandedKSC_00 = Era molto più facile far entrare l'intero CSK in un'immagine dall'alto. Salire in cima all'EAV non è bastato, ma sei comunque riuscito a ottenere uno scatto abbastanza buono dell'area.
        #ScienceRefactor_bd_camera_KerbinSrfLanded_00 = Non l'hai già visto?
        #ScienceRefactor_bd_camera_KerbinSrfLandedGrasslands_00 = Grandi distese ondulate di erba alta, con pochissimi alberi, creano un'immagine pastorale a cui non hai saputo resistere.
        #ScienceRefactor_bd_camera_KerbinSrfLandedTundra_00 = La tundra gelata offre una vista severa, quasi priva di vita su larga scala, ma di una bellezza serena.
        #ScienceRefactor_bd_camera_KerbinSrfLandedMountains_00 = I panorami montani di Kerbin sono bellissimi da ammirare e regalano alcune delle migliori foto che tu abbia mai scattato.
        #ScienceRefactor_bd_camera_KerbinSrfLandedBadlands_00 = Le striature di colore nei paesaggi a strati dei calanchi creano immagini vivide al tramonto.
        #ScienceRefactor_bd_camera_KerbinSrfLandedDeserts_00 = Le dune ondulate, le vaste distese di sabbia interrotte solo da qualche oasi e le condizioni di luce ti fanno sentire come Kansel Kadams.
        #ScienceRefactor_bd_camera_KerbinSrfLandedHighlands_00 = Anche se i kerbal di questa zona parlano con un accento marcato che capisci a malapena, ti hanno comunque guidato verso punti nelle colline che permettono di far emergere la loro bellezza discreta nelle tue foto.
        #ScienceRefactor_bd_camera_KerbinSrfLandedIceCaps_00 = Ghiacciai, immense distese di ghiaccio e crepacci creano un paesaggio vario, catturato splendidamente nelle tue foto. Ora però hai anche il naso congelato.
        #ScienceRefactor_bd_camera_KerbinSrfLandedShores_00 = Le foto della costa che hai scattato sono state recentemente concesse in licenza a una compagnia di viaggi per realizzare brochure e portare turisti in spiaggia.
        #ScienceRefactor_bd_camera_KerbinSrfLandedWater_00 = Anche se l'oceano a volte è bellissimo e terribile, oggi è quasi liscio come vetro e catturi il riflesso del sole sulla superficie al tramonto, creando una splendida immagine.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowGrasslands_00 = La prateria copre la maggior parte della superficie di Kerbin ed è dove vivono la maggior parte dei kerbal. La superficie è coperta da fattorie e dall'occasionale città.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowShores_00 = L'acqua vicino alla costa ha una tonalità di blu più chiara dove è più bassa. Se potessi zoomare di più, magari riusciresti a vedere qualche kerbal che si gode una giornata in spiaggia.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowMountains_00 = I picchi innevati erano una delle mete preferite dei kerbal più avventurosi. Almeno prima dell'invenzione dei viaggi spaziali.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowHighlands_00 = Le montagne sfumano in terreni più bassi con dorsali ramificate. Le colline sono a strisce, dove le valli tagliano diversi strati di roccia.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowDesert_00 = Le sabbie sembrano piatte rispetto al resto del terreno di Kerbin. Ci sono strani cerchi sulla superficie che, a detta del Controllo Missione, sono fattorie.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowWater_00 = La superficie dell'oceano è punteggiata dalle scie delle navi che attraversano i mari di Kerbin.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowBadlands_00 = La superficie appare rocciosa e difficile da attraversare. Confermi che i calanchi sono davvero calanchi.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowTundra_00 = Avvisti alcune basi militari krussiane nella neve. L'agenzia governativa che ti ha assegnato l'incarico ne sarà soddisfatta.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowIceCaps_00 = La luce del Sole riflessa dalla neve sovrasta la fotocamera.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowNorthernIceShelf_00 = Le relazioni con il pubblico dicono che hai avvistato il Kracken dono, ma in realtà no.
        #ScienceRefactor_bd_camera_KerbinInSpaceLowSouthernIceShelf_00 = Qui non c'è molto oltre a una distesa piatta di ghiaccio.
        #ScienceRefactor_bd_camera_KerbinInSpaceLow_00 = Chi l'avrebbe detto che l'agenzia spaziale avrebbe spiato tutti questi krussiani?
        #ScienceRefactor_bd_camera_KerbinInSpaceHigh_00 = C'è qualcosa di molto familiare in tutta quest'acqua e questa terra che vedi.
        #ScienceRefactor_bd_camera_MunSrfLandedCanyons_00 = I dati delle immagini dei canyon su Mun mostrano che un tempo era geologicamente attivo, ma non lo è più.
        #ScienceRefactor_bd_camera_MunSrfLandedEastCrater_00 = Le foto del cratere orientale aiutano a rispondere ad alcune domande fondamentali sulla superficie di Mun e su come sia stata influenzata da grandi impatti.
        #ScienceRefactor_bd_camera_MunSrfLandedEastFarsideCrater_00 = I dati di imaging di questo impatto “minore” si sono rivelati importanti quanto quelli dei grandi crateri attorno a Mun.
        #ScienceRefactor_bd_camera_MunSrfLandedFarsideCrater_00 = Sito di atterraggio preferito da molti, le prove fotografiche aiutano a rivelare che questo cratere è tra i più antichi della superficie.
        #ScienceRefactor_bd_camera_MunSrfLandedHighland_00 = Le regioni collinari di Mun sembrano essersi formate durante un periodo in cui la superficie di Mun era ancora geologicamente attiva.
        #ScienceRefactor_bd_camera_MunSrfLandedHighlandCraters_00 = Questi piccoli crateri da impatto sono più giovani e quindi i dati fotografici aiutano a rispondere a molte domande sulle diverse ere d'impatto di Mun.
        #ScienceRefactor_bd_camera_MunSrfLandedMidlands_00 = Come in altre regioni di Mun, i dati di imaging mostrano che le pianure sembrano essere state spinte verso l'alto durante un periodo di attività geologica su Mun.
        #ScienceRefactor_bd_camera_MunSrfLandedMidlandCraters_00 = Come in altre aree di impatti minori, le prove fotografiche mostrano che i crateri delle pianure sono più giovani rispetto ad altre zone d'impatto attorno a Mun.
        #ScienceRefactor_bd_camera_MunSrfLandedNorthernBasin_00 = Questo gigantesco bacino sembra essere il risultato di roccia fusa che, in un lontano passato, è colata sulla superficie. I dati di imaging dal suolo non aiutano a capire cosa possa averla fatta scorrere in primo luogo.
        #ScienceRefactor_bd_camera_MunSrfLandedNorthwestCrater_00 = Questa enorme regione d'impatto si è formata nei primissimi tempi della formazione di Mun, e i dati di imaging aiuteranno a capirla meglio.
        #ScienceRefactor_bd_camera_MunSrfLandedPolarCrater_00 = Questa regione d'impatto ad alta latitudine si è formata più o meno nello stesso periodo del cratere nord-occidentale, risultando tra le aree più antiche di Mun. I dati fotografici di questa regione aiutano a rivelare i dettagli dell'impatto e delle sue conseguenze.
        #ScienceRefactor_bd_camera_MunSrfLandedPolarLowlands_00 = I bassopiani polari sembrano una regione formatasi durante un periodo geologicamente attivo e influenzata dai colossali eventi d'impatto di quel tempo. Le prove fotografiche aiutano a mostrare come questi processi abbiano interagito.
        #ScienceRefactor_bd_camera_MunSrfLandedPoles_00 = I dati di imaging dei poli aiutano a rispondere a domande sulla formazione di Mun e sull'eventuale presenza di risorse utili alla creazione di una base di superficie.
        #ScienceRefactor_bd_camera_MunSrfLandedSouthwestCrater_00 = Anche il cratere sud-occidentale si è formato più o meno nello stesso periodo degli altri crateri colossali della superficie. Le prove fotografiche aiutano a rispondere a molte domande su questo periodo violento della storia di Mun.
        #ScienceRefactor_bd_camera_MunSrfLandedTwinCraters_00 = Formati quando due corpi in orbita l'uno attorno all'altro hanno colpito Mun, le foto dei crateri gemelli hanno mostrato che questa regione è più giovane di quanto si pensasse in origine.
        #ScienceRefactor_bd_camera_MunSrfLanded_00 = Il terreno è molto grigio. Attorno a te ci sono pendii e montagne.
        #ScienceRefactor_bd_camera_MunInSpaceLowMidlands_00 = La superficie è costellata di piccoli crateri da impatto. Le aree piatte potrebbero essersi formate grazie ad attività vulcanica.
        #ScienceRefactor_bd_camera_MunInSpaceLowMidlandCraters_00 = Ti chiedi quanto grande debba essere un asteroide per creare crateri così larghi, prima di renderti conto che su Mun ce ne sono di molto più grandi.
        #ScienceRefactor_bd_camera_MunInSpaceLowHighlands_00 = Le colline appaiono più chiare.
        #ScienceRefactor_bd_camera_MunInSpaceLowHighlandCraters_00 = Alcuni di questi crateri sembrano molto più antichi di quelli nelle pianure di Mun.
        #ScienceRefactor_bd_camera_MunInSpaceLowCanyons_00 = Le pareti ripide dei canyon potrebbero rendere difficile l'atterraggio.
        #ScienceRefactor_bd_camera_MunInSpaceLowNorthernBasin_00 = Il bacino si è probabilmente formato per attività vulcanica.
        #ScienceRefactor_bd_camera_MunInSpaceLowEastCrater_00 = Uno dei punti di riferimento più evidenti su Mun quando lo si osserva dalla superficie di Kerbin, i kerbal hanno passato millenni a ipotizzare cosa possa averlo creato.
        #ScienceRefactor_bd_camera_MunInSpaceLowNorthwestCrater_00 = Solo un altro cratere da impatto, situato a nord-ovest.
        #ScienceRefactor_bd_camera_MunInSpaceLowSouthwestCrater_00 = Solo un altro cratere da impatto, situato a sud-ovest.
        #ScienceRefactor_bd_camera_MunInSpaceLowFarsideCrater_00 = RiflettI sul fatto che sei il primo kerbal a vedere questa parte di Mun.
        #ScienceRefactor_bd_camera_MunInSpaceLowTwinCraters_00 = Nonostante la somiglianza, questi crateri potrebbero essere stati creati a milioni di anni di distanza.
        #ScienceRefactor_bd_camera_MunInSpaceLowEastFarsideCrater_00 = Il cratere è splendidamente inquadrato da Kerbin che sorge oltre l'orizzonte.
        #ScienceRefactor_bd_camera_MunInSpaceLowPolarCrater_00 = A differenza degli altri crateri di Mun, questo è ben lontano dall'equatore.
        #ScienceRefactor_bd_camera_MunInSpaceLowPoles_00 = Non è molto diverso dal resto di Mun, tranne per il fatto che alcune parti della regione polare ricevono luce solare quasi tutto l'anno.
        #ScienceRefactor_bd_camera_MunInSpaceLowPolarLowlands_00 = Le aree più basse vicino ai poli potrebbero contenere ghiaccio d'acqua, dove alcuni crateri restano nell'oscurità eterna. Oppure no. Non è che tu riesca a vedere qualcosa lì dentro.
        #ScienceRefactor_bd_camera_MunInSpaceLow_00 = Ora che sei più vicino alla luna, vedi che i crateri hanno devastato la superficie. Anche le pianure sono spietate, il che ti fa pensare che il tempo abbia lasciato il segno sulla superficie di Mun...
        #ScienceRefactor_bd_camera_MunInSpaceHigh_00 = Mun appare molto craterizzato, mentre i bassopiani si stendono intatti sotto tutte le montagne.
        #ScienceRefactor_bd_camera_MinmusSrfLandedLowlands_00 = In foto, i bassopiani dolcemente ondulati sembrano quasi la superficie di un mare ribollente di gelato alla menta fuso.
        #ScienceRefactor_bd_camera_MinmusSrfLandedHighlands_00 = Le regioni collinari di Minmus sono difficili da distinguere dalle altre nelle foto e servono misurazioni di quota per sapere dove avviene la transizione.
        #ScienceRefactor_bd_camera_MinmusSrfLandedSlopes_00 = I pendii molto irregolari di Minmus sono spesso osservati nelle foto come se fossero “palline di gelato” sulla superficie.
        #ScienceRefactor_bd_camera_MinmusSrfLandedFlats_00 = È piatto, interrotto da un netto aumento di quota lungo il perimetro. Le immagini aiutano a mostrare quanto questa regione sia davvero quasi perfettamente livellata.
        #ScienceRefactor_bd_camera_MinmusSrfLandedGreatFlats_00 = Una delle più grandi regioni pianeggianti della superficie, in foto i terreni più piatti sembrano un lago ghiacciato perfettamente liscio di liquido verde.
        #ScienceRefactor_bd_camera_MinmusSrfLandedGreaterFlats_00 = La più grande regione piatta continua della superficie, i terreni piattissimi potrebbero essere stati un tempo un mare di liquido in superficie, congelato da tempo. Le immagini di questa regione rivelano quanto sia estesa, dato che alcune aree arrivano davvero fino all'orizzonte senza cambiare aspetto.
        #ScienceRefactor_bd_camera_MinmusSrfLandedLesserFlats_00 = Queste regioni piatte più piccole compaiono spesso attorno alla luna e probabilmente erano laghetti in passato. Le foto scattate qui sono circondate da grandi colline che formano i pendii e le regioni più alte di Minmus.
        #ScienceRefactor_bd_camera_MinmusSrfLandedPoles_00 = I dati di imaging dei poli aiutano a rispondere alla domanda se Minmus fosse un tempo una cometa catturata da Kerbin o se una razza aliena abbia semplicemente rovesciato una gigantesca ciotola di gelato alla menta. I ricercatori propendono per la prima ipotesi, ma il pubblico ha un'altra idea...
        #ScienceRefactor_bd_camera_MinmusSrfLanded_00 = La superficie color menta ti stupisce mentre guardi sopra e sotto il punto in cui hai scattato questa foto.
        #ScienceRefactor_bd_camera_MinmusInSpaceLow_00 = Minmus rivela un terreno vario. Alti altipiani si estendono per chilometri e le pianure sotto di essi arrivano ancora più lontano.
        #ScienceRefactor_bd_camera_MinmusInSpaceHigh_00 = Da così lontano, Minmus somiglia a una piccola pallina di gelato alla menta...
        #ScienceRefactor_bd_camera_MohoSrfLandedHighlands_00 = Le foto di superficie nelle colline rivelano che Moho deve essere stato vulcanicamente attivo in qualche momento del passato. I campi di lava e altre formazioni geologiche di questa regione potevano formarsi solo grazie a tale attività.
        #ScienceRefactor_bd_camera_MohoSrfLandedMidlands_00 = Le foto scattate nella regione delle pianure rafforzano ulteriormente l'idea che gran parte della superficie di Moho sia stata modellata dal vulcanismo.
        #ScienceRefactor_bd_camera_MohoSrfLandedMinorCraters_00 = Questi vari piccoli crateri sono numerosi sulla superficie di Moho e le foto al loro interno aiutano a rispondere ad alcune domande sui suoi periodi di attività geologica.
        #ScienceRefactor_bd_camera_MohoSrfLandedNorthPole_00 = A differenza del suo opposto polare, il polo nord di Moho è estremamente irregolare e craterizzato, con differenze enormi tra punti alti e bassi. Le prove fotografiche mostrano chiaramente una superficie molto varia.
        #ScienceRefactor_bd_camera_MohoSrfLandedNorthernSinkhole_00 = Un tempo circolavano molte storie secondo cui in questa regione esistesse un enorme buco che penetrava in profondità nel pianeta. Le prove fotografiche hanno mostrato che non è vero. Le proteste del pubblico per un presunto insabbiamento governativo hanno raggiunto proporzioni epiche.
        #ScienceRefactor_bd_camera_MohoSrfLandedNorthernSinkholeRidge_00 = Una lunga e stretta dorsale che attraversa buona parte di questa regione di doline appare in modo netto nelle fotografie. Si ritiene sia il prodotto del vulcanismo, ma serviranno ulteriori studi.
        #ScienceRefactor_bd_camera_MohoSrfLandedCentralLowlands_00 = Le regioni di depressioni centrali del pianeta ospitano numerosi piccoli crateri e formazioni rocciose simili a dune, visibili ripetutamente nelle immagini di queste aree.
        #ScienceRefactor_bd_camera_MohoSrfLandedWesternLowlands_00 = In modo simile alle altre regioni di bassopiani del pianeta, nei dati di imaging compaiono regolarmente prove di vulcanismo e impatti ripetuti.
        #ScienceRefactor_bd_camera_MohoSrfLandedSouthWesternLowlands_00 = Le regioni di bassopiani a ovest, proprio come le altre aree basse del pianeta, ospitano chiare formazioni geologiche create dal vulcanismo e le prove fotografiche aiuteranno a colmare le lacune nelle nostre conoscenze di questo mondo.
        #ScienceRefactor_bd_camera_MohoSrfLandedSouthEasternLowlands_00 = Ulteriori studi delle varie regioni di bassopiani nei dati di imaging aiuteranno a identificare le cause del passato vulcanico di Moho e saranno utili anche nello studio dell'erosione mareale causata dal Sole.
        #ScienceRefactor_bd_camera_MohoSrfLandedCanyon_00 = I canyon profondi e le pareti ripide sono un'ulteriore prova dell'attività geologica del pianeta, dato che nessun liquido avrebbe potuto erodere questa regione. Le prove fotografiche supportano l'idea che quest'area sia stata creata tramite attività vulcanica.
        #ScienceRefactor_bd_camera_MohoSrfLandedSouthPole_00 = Il polo sud di Moho è simile per aspetto e formazione alle varie regioni di bassopiani. Quasi uniforme in quota, con pochissimi crateri o differenze tra punti alti e bassi, i dati di imaging rivelano che è tanto diverso dal polo nord nell'aspetto quanto lo è nella posizione.
        #ScienceRefactor_bd_camera_MohoSrfLanded_00 = Dopo la discesa, noti le caratteristiche distintive del pianeta. I crateri sono visibili fin dove arriva lo sguardo.
        #ScienceRefactor_bd_camera_MohoInSpaceLow_00 = I crateri sulla superficie di Moho diventano chiarissimi. Con un dettaglio immenso, i crateri hanno crateri. Questo ti ricorda che sei decisamente troppo vicino per sentirti a tuo agio...
        #ScienceRefactor_bd_camera_MohoInSpaceHigh_00 = Moho fluttua lontano, martoriato dai crateri. Riesci quasi a percepire il calore della stella madre, Kerbol...
        #ScienceRefactor_bd_camera_EveSrfLanded_00 = La sabbia viola di questo pianeta denso si stende su tutta la superficie. Ti viene fame e ti chiedi se questa sabbia sia tossica, se la mangi...
        #ScienceRefactor_bd_camera_EveSrfLandedPoles_00 = I dati di imaging dalla superficie mostrano quanto i poli di Eve siano davvero uniformi e regolari. Si rivelano leggere variazioni di quota, ma esistono pochissime caratteristiche estese a spezzare queste regioni quasi piatte.
        #ScienceRefactor_bd_camera_EveSrfLandedExplodiumSea_00 = Un vasto mare basso di idrocarburi liquidi appare di un viola vivido nei dati di imaging. È piuttosto evidente che la colorazione causata dagli idrocarburi, sia nel mare sia nell'atmosfera, conferisca a Eve il suo aspetto distintivo.
        #ScienceRefactor_bd_camera_EveSrfLandedLowlands_00 = Quote molto basse e paesaggi dolci e ondulati compongono gran parte dei bassopiani, creando un'immagine molto viola e pittoresca.
        #ScienceRefactor_bd_camera_EveSrfLandedMidlands_00 = Simili ai bassopiani, le pianure differiscono soprattutto per la quota. Lo stesso paesaggio ondulato, con pochissime caratteristiche, è catturato chiaramente nei dati di imaging.
        #ScienceRefactor_bd_camera_EveSrfLandedHighlands_00 = Anche se le aree che portano alle cime presentano paesaggi spezzati e irregolari, la maggior parte delle colline si rivela nelle foto estremamente simile alle altre regioni emerse del pianeta.
        #ScienceRefactor_bd_camera_EveSrfLandedPeaks_00 = Una caratteristica straordinaria di Eve sono le cime nette e appuntite che si innalzano per migliaia di metri sopra la superficie, con scogliere a picco e canyon incastonati tra di esse. I dati di imaging di quest'area si sono rivelati i preferiti del pubblico per i panorami e l'aspetto inconfondibile.
        #ScienceRefactor_bd_camera_EveSrfLandedImpactEjecta_00 = Le strette fasce di piroclasti da impatto stanno affascinando gli scienziati, che faticano a interpretare i dati di imaging, i quali sembrano mostrare numerose regioni del pianeta dove corpi hanno attraversato l'atmosfera e hanno colpito la superficie.
        #ScienceRefactor_bd_camera_EveFlyingLow_00 = Con numerose aree basse e vaste regioni continue, i dati di imaging raccolti in volo si rivelano di grande valore per gli scienziati.
        #ScienceRefactor_bd_camera_EveFlyingHigh_00 = Con i pochi dettagli di superficie cancellati dalla quota, i dati fotografici da alta quota sono per lo più utili a rifinire i dati di mappatura del pianeta.
        #ScienceRefactor_bd_camera_EveInSpaceLow_00 = Eve ti accoglie con grande entusiasmo mentre le sfrecci accanto, rivelando quanto siano vasti i suoi oceani Explodium. Ora vuoi un ghiacciolo all'uva...
        #ScienceRefactor_bd_camera_EveInSpaceHigh_00 = Eve luccica con la sua tonalità viola sotto di te. O forse sopra? Non te lo ricordi...
        #ScienceRefactor_bd_camera_GillySrfLanded_00 = La foto mostra una grande varietà di montagne. Davvero non c'è altro qui.
        #ScienceRefactor_bd_camera_GillySrfLandedLowlands_00 = La superficie molto irregolare di questo asteroide catturato risalta nettamente nei dati di imaging. Persino i bassopiani non sono davvero bassi nella maggior parte dei punti e trovare terreno in piano è quasi impossibile, anche guardando le fotografie.
        #ScienceRefactor_bd_camera_GillySrfLandedMidlands_00 = Le pianure, come le altre regioni di questa roccia desolata, sono tanto irregolari quanto dall'aspetto strano. Il colore beige della superficie risalta in forte contrasto contro le pareti di valli e montagne.
        #ScienceRefactor_bd_camera_GillySrfLandedHighlands_00 = Le regioni collinari sono più erratiche per forma, quota e pendenza di qualunque altra regione di questo piccolo corpo, creando ombre lunghe e cime ben visibili che spiccano nettamente nei dati di imaging.
        #ScienceRefactor_bd_camera_GillyInSpaceLow_00 = Gilly, un asteroide catturato di colore beige, rivela un terreno estremamente estremo. Una scia nella foto mostra la sua rapida rotazione.
        #ScienceRefactor_bd_camera_GillyInSpaceHigh_00 = Gilly a malapena sembra un puntino nella foto.
        #ScienceRefactor_bd_camera_DunaSrfLanded_00 = La terra rossa sotto di te sembra grossolana e secca. Aspetta, quella roccia si è spostata tra una foto e l'altra?
        #ScienceRefactor_bd_camera_DunaSrfLandedHighlands_00 = Le foto mostrano le colline ondulate delle colline di Duna e la superficie irregolare, indicando la presenza di attività geologica in un lontanissimo passato.
        #ScienceRefactor_bd_camera_DunaSrfLandedCraters_00 = I crateri da impatto sulla superficie di Duna sono facilmente visibili nei dati di imaging grazie ai livelli molto bassi di erosione.
        #ScienceRefactor_bd_camera_DunaSrfLandedPoles_00 = I poli coperti di ghiaccio di Duna brillano intensamente nelle foto e i dettagli dei campi glaciali fratturati diventano subito evidenti.
        #ScienceRefactor_bd_camera_DunaSrfLandedLowlands_00 = I bassopiani, come molte altre aree di Duna, variano per quota e caratteristiche di superficie. I dati di imaging rivelano che la presenza prolungata di liquidi in superficie ha contribuito all'erosione, in combinazione con l'attività geologica.
        #ScienceRefactor_bd_camera_DunaSrfLandedMidlands_00 = Le pianure non hanno un confine netto tra le regioni, rendendo difficile stabilire dove finiscano le colline, dove inizino le pianure e dove subentrino i bassopiani. Ulteriori prove nei dati di imaging dell'attività geologica passata terranno i ricercatori in agitazione per anni, ne sei certo.
        #ScienceRefactor_bd_camera_DunaFlyingLow_00 = I dettagli di superficie che mostrano erosione, attività meteorologica e attività geologica a lungo termine sono facilmente visibili nelle foto da bassa quota.
        #ScienceRefactor_bd_camera_DunaFlyingHigh_00 = I dettagli della superficie svaniscono, ma le caratteristiche su larga scala che rivelano cambiamenti a lungo termine restano inequivocabili nelle foto da alta quota.
        #ScienceRefactor_bd_camera_DunaInSpaceLow_00 = Duna presenta un'ampia varietà di terreni, che vanno da profondi abissi a alte catene montuose e pianure. Le sue calotte ghiacciate sono grandi e dominano i poli.
        #ScienceRefactor_bd_camera_DunaInSpaceHigh_00 = Il pallido puntino arancione somiglia a una palla di ruggine, oppure a un cupcake di velluto rosso...
        #ScienceRefactor_bd_camera_IkeSrfLanded_00 = Le immagini mostrano prove rocciose di una recente attività tettonica.
        #ScienceRefactor_bd_camera_IkeSrfLandedPolarLowlands_00 = I bassopiani polari sono una delle poche regioni abbastanza pianeggianti della superficie di Ike. Non si sa se in passato fosse un cratere da impatto o semplicemente una caratteristica del terreno, e le foto non aiutano a risolvere questa domanda fastidiosa.
        #ScienceRefactor_bd_camera_IkeSrfLandedMidlands_00 = Come per la maggior parte di Ike, le pianure sono un paesaggio spezzato, segnato da grandi differenze di quota, pendii ripidi e scogliere, oltre a una notevole assenza di crateri, tutto chiaramente visibile nei dati di imaging.
        #ScienceRefactor_bd_camera_IkeSrfLandedLowlands_00 = I bassopiani di Ike sono profonde depressioni a quote molto inferiori rispetto al resto della luna. I dati di imaging mostrano che le regioni di transizione di queste aree sono estremamente ripide e salgono rapidamente verso dorsali montuose e le quote più alte delle pianure.
        #ScienceRefactor_bd_camera_IkeSrfLandedEasternMountainRidge_00 = La vetta più alta della superficie si trova lungo la dorsale montuosa orientale e si rivela uno dei posti migliori per scattare immagini ad ampio campo della superficie.
        #ScienceRefactor_bd_camera_IkeSrfLandedWesternMountainRidge_00 = La dorsale montuosa occidentale, pur essendo complessivamente più bassa in quota, attraversa quasi l'intera superficie di Ike da polo a polo e i suoi molti altipiani sarebbero molto pittoreschi, se solo riuscissi a vedere qualcosa. Purtroppo questa regione è sempre rivolta lontano da Duna e resta in gran parte al buio, a causa dei bassi livelli di luce solare.
        #ScienceRefactor_bd_camera_IkeSrfLandedCentralMountainRange_00 = La catena montuosa centrale, in media, è ancora più bassa in quota rispetto alla dorsale occidentale, ma è sempre rivolta verso Duna. Questo crea opportunità per viste spettacolari attraverso la superficie di Ike e nello spazio verso Duna, di cui approfitti con la tua fotocamera.
        #ScienceRefactor_bd_camera_IkeSrfLandedSouthEasternMountainRange_00 = Come la dorsale montuosa occidentale, la catena orientale si trova sul lato di Ike rivolto lontano da Duna e rimane nell'oscurità per gran parte del tempo. Le tue immagini fanno ben poco per illuminare quest'area.
        #ScienceRefactor_bd_camera_IkeSrfLandedSouthPole_00 = Il polo sud di Ike è un colossale altopiano che in molti punti supera i 9.000 metri. Ha anche una pendenza media abbastanza uniforme, rendendolo un ottimo posto per atterraggi e ricerca. Tuttavia, a causa dell'inclinazione assiale di Ike, è rivolto lontano da Duna e resta per lo più in ombra, tranne nelle aree più occidentali, rendendo i dati di imaging difficili da interpretare.
        #ScienceRefactor_bd_camera_IkeInSpaceLow_00 = Ike mostra molto chiaramente il suo terreno consumato. Le catene montuose dominano la superficie, mentre le pianure appaiono in grandi chiazze scure.
        #ScienceRefactor_bd_camera_IkeInSpaceHigh_00 = La roccia che chiamiamo Ike è enorme. Da così lontano sembra piuttosto densa. Sembra anche avere un terreno molto accidentato, più della tua luna.
        #ScienceRefactor_bd_camera_DresSrfLanded_00 = La superficie è desolata, con colline sparse attorno a te. Le aree piatte che vedevi prima non sono così piatte come pensavi.
        #ScienceRefactor_bd_camera_DresSrfLandedPoles_00 = La superficie di Dres è ben nota per la sua scarsità di crateri e i poli non fanno eccezione. Le prove fotografiche lo confermano.
        #ScienceRefactor_bd_camera_DresSrfLandedHighlands_00 = Le colline di Dres non sono poi così alte rispetto a regioni simili del sistema, nonostante il nome. Sono piccole come estensione e nelle foto risultano in gran parte prive di crateri. Strano, considerando che dovrebbero essere le aree più alte ed esposte del pianeta.
        #ScienceRefactor_bd_camera_DresSrfLandedMidlands_00 = I dati di imaging mostrano che le pianure di Dres sono un paesaggio irregolare e spezzato, senza confini netti tra le regioni e con frequenti cambi di quota.
        #ScienceRefactor_bd_camera_DresSrfLandedLowlands_00 = Le regioni di bassopiani di Dres sono vaste e le prove fotografiche mostrano che la maggior parte dei pochi crateri da impatto della superficie si trova proprio qui.
        #ScienceRefactor_bd_camera_DresSrfLandedRidges_00 = Le dorsali di Dres non sono alte, nonostante il nome. Le foto di queste zone le mostrano ripide e molto irregolari.
        #ScienceRefactor_bd_camera_DresSrfLandedImpactEjecta_00 = Le regioni d'impatto di Dres sono circondate da piccole coltri di piroclasti, dove i detriti della collisione si sono sparsi dal punto d'impatto. Le prove fotografiche mostrano chiaramente quanto siano ridotte queste aree.
        #ScienceRefactor_bd_camera_DresSrfLandedImpactCraters_00 = Come altri corpi privi di atmosfera, Dres ha crateri da impatto, anche se in numero molto ridotto. I tuoi dati di imaging delle zone sospette potrebbero aiutare a identificarne altri.
        #ScienceRefactor_bd_camera_DresSrfLandedCanyons_00 = I canyon di Dres hanno alcune delle pareti più ripide e più alte che tu abbia visto finora. Le foto della regione sono difficili da analizzare perché queste zone restano quasi sempre in ombra, per via delle scogliere.
        #ScienceRefactor_bd_camera_DresInSpaceLow_00 = Ora che sei più vicino a Dres, inizi a raccogliere prove che non sia un pianeta, ma un pianeta nano, un tempo un gigantesco asteroide errante.
        #ScienceRefactor_bd_camera_DresInSpaceHigh_00 = Dres ti ricorda Mun. Ha un terreno piuttosto irregolare e una tonalità grigia.
        #ScienceRefactor_bd_camera_JoolFlyingLow_00 = Jool sembra nient'altro che una zuppa calda e tossica. Meglio andarsene subito!
        #ScienceRefactor_bd_camera_JoolFlyingHigh_00 = Jool sembra verde e coccoloso, una preziosa aggiunta scientifica per tutti i kerbal.
        #ScienceRefactor_bd_camera_JoolInSpaceLow_00 = La tonalità verde di Jool domina la foto con un'immensità impressionante.
        #ScienceRefactor_bd_camera_JoolInSpaceHigh_00 = Le numerose lune di Jool si vedono magnificamente davanti a lei, come un balletto di briciole attorno a quella torta al lime che hai appena divorato.
        #ScienceRefactor_bd_camera_LaytheSrfLanded_00 = Le spiagge sabbiose con dune e acque incontaminate ti fanno pensare a Kerbin.
        #ScienceRefactor_bd_camera_LaytheSrfLandedDunes_00 = La sabbia entra in ogni fessura!
        #ScienceRefactor_bd_camera_LaytheSrfLandedShores_00 = La costa è più fangosa di quella di Kerbin.
        #ScienceRefactor_bd_camera_LaytheSrfLandedPoles_00 = Enormi tavolati di ghiaccio sono interrotti solo dall'aurora boreale. La vista è incredibile.
        #ScienceRefactor_bd_camera_LaytheSrfLandedCrescentBay_00 = La baia Mezzaluna sembra una specie di atollo fatto di dune.
        #ScienceRefactor_bd_camera_LaytheSrfLandedTheSaganSea_00 = L'acqua sembra molto fredda.
        #ScienceRefactor_bd_camera_LaytheFlyingLow_00 = Da qui, nulla sembra diverso da Kerbin.
        #ScienceRefactor_bd_camera_LaytheFlyingHigh_00 = Laythe sembra avere un enorme potenziale come avamposto coloniale.
        #ScienceRefactor_bd_camera_LaytheInSpaceLow_00 = Laythe ha isole, acqua e un'atmosfera. Non mi sorprenderebbe se trovassimo dei microkerbal qui...
        #ScienceRefactor_bd_camera_LaytheInSpaceHigh_00 = Da qui, Laythe sembra una biglia azzurra pallida.
        #ScienceRefactor_bd_camera_VallSrfLanded_00 = Su questa luna non ci sono punti di atterraggio davvero pianeggianti. Forse è una conseguenza del criovulcanismo o delle forze mareali esercitate su Vall.
        #ScienceRefactor_bd_camera_VallSrfLandedPoles_00 = I poli sembrano meno ostili di altre parti di Vall. Resta comunque un polo che non vorresti incontrare in un vicolo.
        #ScienceRefactor_bd_camera_VallSrfLandedMidlands_00 = La fotocamera si prende un momento per godersi il panorama.
        #ScienceRefactor_bd_camera_VallSrfLandedlowlands_00 = Hai la sensazione che la superficie possa cedere da un momento all'altro.
        #ScienceRefactor_bd_camera_VallSrfLandedHighlands_00 = Alcune enormi forze mareali hanno spinto queste montagne fin lassù.
        #ScienceRefactor_bd_camera_VallInSpaceLow_00 = Vall presenta pianure blu e catene montuose azzurro chiaro che serpeggiano sulla superficie del pianeta in ogni direzione.
        #ScienceRefactor_bd_camera_VallInSpaceHigh_00 = Vall si erge fiera, lontana, come un puntino azzurro pallido.
        #ScienceRefactor_bd_camera_TyloSrfLanded_00 = Tylo presenta una superficie molto polverosa. I crateri visti dall'alto ora sembrano solo un'altra caratteristica del terreno.
        #ScienceRefactor_bd_camera_TyloSrfLandedMajorCrater_00 = Sembra che il Kraken abbia appoggiato qui un bicchiere bagnato.
        #ScienceRefactor_bd_camera_TyloSrfLandedMajorCrater_01 = Assomiglia un po' a una grande zuppiera.
        #ScienceRefactor_bd_camera_TyloSrfLandedMajorCrater_02 = Il cratere è profondo e freddo... più o meno come tutti i crateri.
        #ScienceRefactor_bd_camera_TyloSrfLandedMinorCraters_00 = Sai cosa si dice: anche il più piccolo dei crateri può diventare grande, prima o poi.
        #ScienceRefactor_bd_camera_TyloSrfLandedHighlands_00 = Il panorama è spettacolare. Dovremmo costruire un campeggio qui.
        #ScienceRefactor_bd_camera_TyloSrfLandedMidlands_00 = La luce gioca con colline e vallate, creando una scena drammatica.
        #ScienceRefactor_bd_camera_TyloSrfLandedLowlands_00 = Polveroso e scuro, in qualche modo ti ricorda che questo fine settimana dovresti sistemare la soffitta.
        #ScienceRefactor_bd_camera_TyloSrfLandedMara_00 = Scivolare su e giù lungo il bordo del cratere potrebbe essere divertente.
        #ScienceRefactor_bd_camera_TyloInSpaceLow_00 = Tylo è enorme. È una roccia massiccia grande quanto Kerbin. I puntini si rivelano essere decine di migliaia di crateri. Tylo mostra una superficie duramente martoriata, simile a quella di Mun. Gli scienziati in laboratorio deducono che Tylo contenga effettivamente tracce di cobalto.
        #ScienceRefactor_bd_camera_TyloInSpaceHigh_00 = Tylo, da così lontano, appare punteggiato. Perché non l'abbiamo chiamato Macchia?
        #ScienceRefactor_bd_camera_BopSrfLanded_00 = Bop emana un'atmosfera particolare. È molto scuro e desolato. È stato forse una cometa?
        #ScienceRefactor_bd_camera_BopSrfLandedPoles_00 = Da qui, Bop sembra un enorme deposito di carbonio.
        #ScienceRefactor_bd_camera_BopSrfLandedSlopes_00 = Qualcuno ha rovesciato del caffè sulla foto, rendendola illeggibile.
        #ScienceRefactor_bd_camera_BopSrfLandedMara_00 = Molto tempo fa, questo pianeta è stato visitato da un enorme asteroide.
        #ScienceRefactor_bd_camera_BopSrfLandedRidges_00 = La superficie di questo luogo sembra composta da un tipo di suolo diverso rispetto al resto di Bop, il che suggerisce che Bop fosse un pianeta attivo in passato... oppure qualcuno ha semplicemente scaricato qui della terra.
        #ScienceRefactor_bd_camera_BopSrfLandedValley_00 = Il marroncino marrone di qui sembra lo stesso marrone marroncino di laggiù.
        #ScienceRefactor_bd_camera_BopSrfLandedPeaks_00 = La vista è decisamente cupa.
        #ScienceRefactor_bd_camera_BopInSpaceLow_00 = Bop sembra mostrare un cratere con un bordo bianco che potrebbe essere la prova di un giovane Bop catturato in un giovane sistema di Jool.
        #ScienceRefactor_bd_camera_BopInSpaceHigh_00 = Bop sembra un asteroide catturato di colore marrone, non troppo diverso da Gilly. Forse sono imparentati.
        #ScienceRefactor_bd_camera_PolSrfLanded_00 = A quanto pare sei atterrato. La superficie gialla e color cachi sembra gradevole. Aspetta, stai scivolando giù dalla scogliera?
        #ScienceRefactor_bd_camera_PolSrfLandedPoles_00 = Su Pol, i poli sono piuttosto diversi dal resto del corpo.
        #ScienceRefactor_bd_camera_PolSrfLandedLowlands_00 = Da qui, Pol sembra fatta di pasta per biscotti.
