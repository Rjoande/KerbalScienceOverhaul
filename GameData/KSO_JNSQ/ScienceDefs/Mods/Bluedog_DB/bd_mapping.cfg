@EXPERIMENT_DEFINITION:HAS[#id[bd_mapping]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQ_bd_mapping_SunInSpaceLowNorthPolarZone_00 // The view is a blinding arc with a faintly darker cap at the edge. The camera insists the Sun has “terrain,” and you begin to worry about the camera.
        SunInSpaceLowNorthSubpolarZone* = #JNSQ_bd_mapping_SunInSpaceLowNorthSubpolarZone_00 // Your exposure settings surrender almost immediately. The image comes back as “mostly Sun” with a polite note suggesting you stop.
        SunInSpaceLowNorthTemperateZone* = #JNSQ_bd_mapping_SunInSpaceLowNorthTemperateZone_00 // Subtle banding shows through the glare for a moment before the sensor gives up. You call it a successful map if you squint hard enough.
        SunInSpaceLowNorthTropicZone* = #JNSQ_bd_mapping_SunInSpaceLowNorthTropicZone_00 // You catch a brief, ghostly gradient across the disk. Mission Control asks if that means “safe,” and you pretend you didn’t hear them.
        SunInSpaceLowEquatorialZone* = #JNSQ_bd_mapping_SunInSpaceLowEquatorialZone_00 // The center of the disk is pure white with a razor-bright edge. The mapping team labels it “featureless” and then adds three more warning stickers.
        SunInSpaceLowSouthTropicZone* = #JNSQ_bd_mapping_SunInSpaceLowSouthTropicZone_00 // A few darker blotches flicker into view between saturation spikes. The camera makes a sound you don’t remember installing.
        SunInSpaceLowSouthTemperateZone* = #JNSQ_bd_mapping_SunInSpaceLowSouthTemperateZone_00 // The Sun’s limb looks slightly less angry here, for about half a second. Then the readout turns into modern art.
        SunInSpaceLowSouthSubpolarZone* = #JNSQ_bd_mapping_SunInSpaceLowSouthSubpolarZone_00 // The image shows a faint falloff and a lot of regret. The map file is tagged “DO NOT REPEAT.”
        SunInSpaceLowSouthPolarZone* = #JNSQ_bd_mapping_SunInSpaceLowSouthPolarZone_00 // The polar region registers as a dimmer crescent against impossible brightness. You add a note: “Yes, even the poles are trying to kill the camera.”

        MohoInSpaceLow* = #JNSQ_bd_mapping_MohoInSpaceLow_00 // Repeat mapping passes pick out crisp, youthful lineaments—scarps and narrow troughs that cut across older terrain with surprisingly sharp edges. The geometry fits slow global contraction with occasional fault slip.
        MohoInSpaceLow* = #JNSQ_bd_mapping_MohoInSpaceLow_01 // Several ridges cast knife-thin shadows, and adjacent slopes show fresh-looking streaks of disturbed regolith. The best explanation is recent, localized shaking rather than any large-scale resurfacing.
        MohoInSpaceLow* = #JNSQ_bd_mapping_MohoInSpaceLow_02 // In high-resolution strips, some crater floors look subtly “combed,” with boulder trains and dust aprons aligned to nearby fracture traces. It suggests intermittent ground vibration gently sorting and redistributing surface material over time.
        MohoInSpaceLowPoles* = #JNSQ_bd_mapping_MohoInSpaceLowPoles_00 // The polar terrain resolves into sharp shadows and bright patches. The map comes back with a footnote: “Possible cold traps. Do not lick.”
        MohoInSpaceLowLowlands* = #JNSQ_bd_mapping_MohoInSpaceLowLowlands_00 // The lowlands spread out in battered, dark plains between crater rims. Everything looks like it’s been sandblasted for fun.
        MohoInSpaceLowPolarIceCraters* = #JNSQ_bd_mapping_MohoInSpaceLowPolarIceCraters_00 // Bright flecks cling to the floors of shadowed craters. The mapping team highlights them and writes “how is this even here?”
        MohoInSpaceLowHighlands* = #JNSQ_bd_mapping_MohoInSpaceLowHighlands_00 // The highlands are a tangled web of ridges and impacts. The contour lines start to look like they’re sweating.
        MohoInSpaceLowMidlands* = #JNSQ_bd_mapping_MohoInSpaceLowMidlands_00 // Subtle elevation changes show up as long, harsh shadows. The sun angle does most of the cartography for you.
        MohoInSpaceLowCraters* = #JNSQ_bd_mapping_MohoInSpaceLowCraters_00 // Craters overlap craters until the surface becomes a quilt of rims. You mark several as “too round to trust.”
        MohoInSpaceLowExoticCraters* = #JNSQ_bd_mapping_MohoInSpaceLowExoticCraters_00 // Strange crater patterns and odd ejecta fans dominate the frame. Someone suggests “meteorology,” then remembers where you are.
        MohoInSpaceLowRareCraters* = #JNSQ_bd_mapping_MohoInSpaceLowRareCraters_00 // A few unusually preserved craters stand out like they’re posing. You tag them for study and for avoiding at high speed.
        MohoInSpaceLowVoronoiCraters* = #JNSQ_bd_mapping_MohoInSpaceLowVoronoiCraters_00 // The crater field breaks into cell-like patches that look almost organized. The map team argues whether the planet is messing with them.
        MohoInSpaceLowNotableCraters* = #JNSQ_bd_mapping_MohoInSpaceLowNotableCraters_00 // Several massive craters steal the entire image. The cartographers immediately start naming them after snacks.
        MohoInSpaceLowPeaks* = #JNSQ_bd_mapping_MohoInSpaceLowPeaks_00 // Jagged peaks cast dagger-thin shadows across scorched slopes. The map is beautiful in the way a warning sign is beautiful.

        EveInSpaceLowPoles* = #JNSQ_bd_mapping_EveInSpaceLowPoles_00 // The camera mostly maps a bright violet cap of cloud, with a few darker seams spiraling around it. You label it “probably poles” and underline “probably.”
        EveInSpaceLowLowlands* = #JNSQ_bd_mapping_EveInSpaceLowLowlands_00 // A uniform blanket of haze hides the ground, but the cloud deck has broad, lazy swirls. If the lowlands are down there, they’re keeping their secrets.
        EveInSpaceLowMidlands* = #JNSQ_bd_mapping_EveInSpaceLowMidlands_00 // The image shows layered cloud bands with subtle texture changes. The cartographers start drawing contour lines on clouds and pretend it’s normal.
        EveInSpaceLowHighlands* = #JNSQ_bd_mapping_EveInSpaceLowHighlands_00 // Thinner wisps and sharper shadows hint at higher terrain below the overcast. You get exactly one glimpse of something solid before the purple returns.
        EveInSpaceLowPeaks* = #JNSQ_bd_mapping_EveInSpaceLowPeaks_00 // A brief break in the clouds reveals jagged silhouettes punching upward. The camera tries to focus, then remembers Eve doesn’t do “clear skies.”
        EveInSpaceLowMountains* = #JNSQ_bd_mapping_EveInSpaceLowMountains_00 // Long cloud shadows stretch in suspiciously ridge-like patterns. You can’t see the mountains, but the atmosphere seems to know where they are.
        EveInSpaceLowShores* = #JNSQ_bd_mapping_EveInSpaceLowShores_00 // The cloud edge changes shape along a smooth, curving boundary. Either that’s coastline… or Eve is drawing fake maps for fun.
        EveInSpaceLowExplodiumSea* = #JNSQ_bd_mapping_EveInSpaceLowExplodiumSea_00 // Bright glare blooms across the cloud tops above the supposed sea. The mapping team calls it “specular reflection,” and everyone agrees not to test the word “Explodium.”
        EveInSpaceLowPolarLakes* = #JNSQ_bd_mapping_EveInSpaceLowPolarLakes_00 // Patchy cloud holes and sharp temperature-looking gradients mark the region. The lakes remain invisible, but the weather seems to orbit them.
        EveInSpaceLowPetrolLakes* = #JNSQ_bd_mapping_EveInSpaceLowPetrolLakes_00 // Dark, slow-moving cloud stains hover over the basin area. Someone writes “oily” on the map, then crosses it out twice.
        EveInSpaceLowSeaofAkron* = #JNSQ_bd_mapping_EveInSpaceLowSeaofAkron_00 // The cloud deck forms a broad spiral with a clean outer arc. You tag it as a major basin and the atmosphere tags you back with static.
        EveInSpaceLowSeaofNessus* = #JNSQ_bd_mapping_EveInSpaceLowSeaofNessus_00 // A wide, smooth cloud sheet sits over the region like a lid. Whatever’s underneath, it’s apparently not invited to the photo.
        EveInSpaceLowSeaofTaniwha* = #JNSQ_bd_mapping_EveInSpaceLowSeaofTaniwha_00 // The camera catches a ragged front line of clouds that looks like it’s chewing its way across the surface. Mapping this in visible light feels like filing paperwork in a hurricane.
        EveInSpaceLowSeaofGigan* = #JNSQ_bd_mapping_EveInSpaceLowSeaofGigan_00 // High, bright cloud anvils cluster here in repeating cells. You map the storm tops and call it “good enough for orbit.”
        EveInSpaceLowSeaofRodan* = #JNSQ_bd_mapping_EveInSpaceLowSeaofRodan_00 // Thin streaks of cloud race in parallel lanes, like wind tunnels painted on the sky. The surface might as well be theoretical.
        EveInSpaceLowSeaofGojira* = #JNSQ_bd_mapping_EveInSpaceLowSeaofGojira_00 // A dense, rolling cloud mass sits over the basin with a darker core. The photo is ominous in a very meteorological way.
        EveInSpaceLowSeaofGhidorah* = #JNSQ_bd_mapping_EveInSpaceLowSeaofGhidorah_00 // Three distinct cloud arms twist out from a central knot. You mark it as “tri-lobed circulation” and stop yourself from naming it.
        EveInSpaceLowSeaofBagorah* = #JNSQ_bd_mapping_EveInSpaceLowSeaofBagorah_00 // The region shows unusually smooth cloud texture with faint, repeated ripples. The map looks calm, which is the most suspicious result yet.
        EveInSpaceLowKrakensWell* = #JNSQ_bd_mapping_EveInSpaceLowKrakensWell_00 // The clouds dip into a broad, circular swirl as if something is pulling them down. You can’t see the “well,” but you can definitely see the warning sign.

        GillyInSpaceLowLowlands* = #JNSQ_bd_mapping_GillyInSpaceLowLowlands_00 // The “lowlands” look like shallow scoops on a lumpy pebble. The camera produces a map and a reminder that “down” is negotiable here.
        GillyInSpaceLowMidlands* = #JNSQ_bd_mapping_GillyInSpaceLowMidlands_00 // The surface texture barely changes, but the shadows do. Your “midlands” contour lines are mostly an argument with sunlight.
        GillyInSpaceLowHighlands* = #JNSQ_bd_mapping_GillyInSpaceLowHighlands_00 // The high points are jagged knobs and ridges that stick out like broken teeth. The map is ninety percent boulders and ten percent regret.

        KerbinInSpaceLowArcticSea* = #JNSQ_bd_mapping_KerbinInSpaceLowArcticSea_00 // The mapping camera catches a patchwork of ice and open water. Someone circles a “do not splash down” zone in red.
        KerbinInSpaceLowAridHighlands* = #JNSQ_bd_mapping_KerbinInSpaceLowAridHighlands_00 // Sharp ridgelines and dry cuts throw long shadows. This place looks like it erodes out of spite.
        KerbinInSpaceLowAridLowlands* = #JNSQ_bd_mapping_KerbinInSpaceLowAridLowlands_00 // The low terrain is a maze of pale flats and dried channels. You tag several “maybe river once?” features for later.
        KerbinInSpaceLowAridMidlands* = #JNSQ_bd_mapping_KerbinInSpaceLowAridMidlands_00 // Dusty rolling terrain forms gentle bands and swirls. The map looks like someone smudged it with a glove.
        KerbinInSpaceLowAridMountains* = #JNSQ_bd_mapping_KerbinInSpaceLowAridMountains_00 // Jagged spines and broken plateaus dominate the frame. You mark a few passes that might be survivable by rover.
        KerbinInSpaceLowEasternSea* = #JNSQ_bd_mapping_KerbinInSpaceLowEasternSea_00 // Thin white streaks of ship wakes crisscross the water. Kerbals really will drive anywhere there’s a horizon.
        KerbinInSpaceLowForemansSea* = #JNSQ_bd_mapping_KerbinInSpaceLowForemansSea_00 // The sea surface is busy with waves and weather lines. You can almost hear Mission Control debating “storm” versus “snack break.”
        KerbinInSpaceLowGreatLake* = #JNSQ_bd_mapping_KerbinInSpaceLowGreatLake_00 // A huge inland mirror fills the image, rimmed with irregular shorelines. The cartographers immediately argue where to put the “You Are Here.”
        KerbinInSpaceLowInlandWater* = #JNSQ_bd_mapping_KerbinInSpaceLowInlandWater_00 // Lakes and waterways glint in disconnected patches. The map team starts drawing arrows and asking where the rivers went.
        KerbinInSpaceLowKreenwichSea* = #JNSQ_bd_mapping_KerbinInSpaceLowKreenwichSea_00 // The coastline here has too many tidy curves to be comforting. You double-check the camera isn’t secretly drawing cartoons.
        KerbinInSpaceLowLowlands* = #JNSQ_bd_mapping_KerbinInSpaceLowLowlands_00 // Broad, gentle terrain makes for easy mapping. The image is mostly farms, fields, and the occasional city-shaped speck.
        KerbinInSpaceLowMidlands* = #JNSQ_bd_mapping_KerbinInSpaceLowMidlands_00 // Rolling country spreads out in textured bands. You can practically see the roads trying their best to be straight.
        KerbinInSpaceLowNorthernSea* = #JNSQ_bd_mapping_KerbinInSpaceLowNorthernSea_00 // The northern waters look darker and colder, with scattered ice edges. The map comes back labeled “brisk” for reasons unclear.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQ_bd_mapping_KerbinInSpaceLowSub-ArcticSea_00 // The camera catches an uneasy boundary between pack ice and open water. It looks like the planet is wearing a cracked white collar.
        KerbinInSpaceLowTriangulusSea* = #JNSQ_bd_mapping_KerbinInSpaceLowTriangulusSea_00 // Three distinct fronts meet in a neat wedge of changing color. The mapping team insists it’s natural; you are not convinced.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQ_bd_mapping_KerbinInSpaceLowWelcomeBackIsland_00 // A tiny island speck shows suspiciously straight lines and cleared ground. You mark it “welcoming” and also “probably a trap for sloppy pilots.”
        KerbinInSpaceLowWesternSea* = #JNSQ_bd_mapping_KerbinInSpaceLowWesternSea_00 // Long swell lines rake across the sea in parallel streaks. The map looks serene, which somehow feels like a warning.

        MunInSpaceLowExoticCraters* = #JNSQ_bd_mapping_MunInSpaceLowExoticCraters_00 // Craters here stack on craters, with rims that don’t agree on which way is up. You label the region “geologically overachieving.”
        MunInSpaceLowLowlands* = #JNSQ_bd_mapping_MunInSpaceLowLowlands_00 // Darker plains between impacts make the surface look almost calm. “Almost” does a lot of work on the Mun.
        MunInSpaceLowMountains* = #JNSQ_bd_mapping_MunInSpaceLowMountains_00 // Knife-edge peaks throw shadows like spilled ink. The map team quietly adds extra contour lines just to be safe.
        MunInSpaceLowNotableCraters* = #JNSQ_bd_mapping_MunInSpaceLowNotableCraters_00 // Two standout craters dominate the frame, linked by scars and ejecta rays. Even the camera seems impressed.
        MunInSpaceLowPolarIceCraters* = #JNSQ_bd_mapping_MunInSpaceLowPolarIceCraters_00 // The polar craters hide in shadow with bright flecks along the rims. Something down there really doesn’t want to evaporate.
        MunInSpaceLowRareCraters* = #JNSQ_bd_mapping_MunInSpaceLowRareCraters_00 // A pair of old, battered craters show softened rims and messy floors. They look like they’ve been taking hits since forever.
        MunInSpaceLowVoronoiCraters* = #JNSQ_bd_mapping_MunInSpaceLowVoronoiCraters_00 // The crater fields form repeating cell-like patterns. You briefly suspect the Mun is tessellating on purpose.

        MinmusInSpaceLowBasins* = #JNSQ_bd_mapping_MinmusInSpaceLowBasins_00 // Wide smooth basins spread out like spilled mint frosting. The map is so flat it feels like the camera is mocking you.
        MinmusInSpaceLowBrownBasins* = #JNSQ_bd_mapping_MinmusInSpaceLowBrownBasins_00 // The same smooth basins, but stained darker in broad patches. Someone writes “chocolate swirl?” and gets a stern look.
        MinmusInSpaceLowBrownHighlands* = #JNSQ_bd_mapping_MinmusInSpaceLowBrownHighlands_00 // Dark-tinted high ground breaks up the usual pale surface. The contrast makes the relief pop like a bad idea.
        MinmusInSpaceLowBrownLowlands* = #JNSQ_bd_mapping_MinmusInSpaceLowBrownLowlands_00 // The low areas look dusted with something that isn’t mint-colored. You flag it for “mystery dirt” analysis.
        MinmusInSpaceLowBrownMidlands* = #JNSQ_bd_mapping_MinmusInSpaceLowBrownMidlands_00 // A mottled band of terrain interrupts the smooth gradients. The cartographers call it “ugly,” then remember they’re scientists.
        MinmusInSpaceLowMidlands* = #JNSQ_bd_mapping_MinmusInSpaceLowMidlands_00 // Subtle ridges and gentle rises show up between the flats. It’s the kind of terrain you’d miss without a proper map.
        MinmusInSpaceLowMountains* = #JNSQ_bd_mapping_MinmusInSpaceLowMountains_00 // Steep slopes and sharp ridgelines carve the surface into dramatic wedges. The map team requests more caution and fewer bravado landings.
        MinmusInSpaceLowPoles* = #JNSQ_bd_mapping_MinmusInSpaceLowPoles_00 // The polar terrain looks clean and bright, with long shadows from tiny rises. The map comes back labeled “crisp,” again for unclear reasons.

        DunaInSpaceLowIceCaps* = #JNSQ_bd_mapping_DunaInSpaceLowIceCaps_00 // The polar caps glare bright through thin haze, with wind-swept edges like torn paper. You mark several "smooth" zones that are probably anything but.
        DunaInSpaceLowHighlands* = #JNSQ_bd_mapping_DunaInSpaceLowHighlands_00 // Rugged uplands form broken ridges and dusty scarps. The shadows look sharp enough to cut parachute lines.
        DunaInSpaceLowMidlands* = #JNSQ_bd_mapping_DunaInSpaceLowMidlands_00 // Rolling terrain fades between old impacts and broad plains. It's the kind of landscape that hides rocks in every "flat" spot.
        DunaInSpaceLowLowlands* = #JNSQ_bd_mapping_DunaInSpaceLowLowlands_00 // Dark low basins spread out like dried spill stains across the rust. Mission Control asks for landing sites; you offer "somewhere that isn't shaped like trouble."
        DunaInSpaceLowCraters* = #JNSQ_bd_mapping_DunaInSpaceLowCraters_00 // Overlapping bowls and ejecta rays stitch the surface into a messy quilt. The map team starts naming rims after snacks to stay calm.
        DunaInSpaceLowRareCraters* = #JNSQ_bd_mapping_DunaInSpaceLowRareCraters_00 // A few unusually crisp craters stand out like fresh dents in an ancient hull. You tag them as "new-ish" and immediately feel old.
        DunaInSpaceLowVoronoiCraters* = #JNSQ_bd_mapping_DunaInSpaceLowVoronoiCraters_00 // The impacts arrange into oddly cell-like patches. The pattern looks engineered until you remember nature also enjoys geometry.
        DunaInSpaceLowNotableCraters* = #JNSQ_bd_mapping_DunaInSpaceLowNotableCraters_00 // Several giant craters dominate the frame, with floors that look suspiciously level. You add a note: "flat does not mean safe."
        DunaInSpaceLowExoticCraters* = #JNSQ_bd_mapping_DunaInSpaceLowExoticCraters_00 // Strange rims, uneven ejecta, and lopsided scars make this field look like it lost a fight. The camera politely refuses to guess what happened.
        DunaInSpaceLowTrenches* = #JNSQ_bd_mapping_DunaInSpaceLowTrenches_00 // Long, dark cuts snake across the terrain like someone dragged a claw through dust. You highlight the deepest lines and write "no rovers."
        DunaInSpaceLowNotablePlains* = #JNSQ_bd_mapping_DunaInSpaceLowNotablePlains_00 // Broad open plains stretch between scattered craters, almost inviting. You zoom in and the invitation is revoked by boulders.
        DunaInSpaceLowNotableMountains* = #JNSQ_bd_mapping_DunaInSpaceLowNotableMountains_00 // A chain of peaks punches up through the haze, casting dramatic spokes of shadow. The cartographers argue whether the ridge is one mountain or many bad decisions.
        DunaInSpaceLowMountains* = #JNSQ_bd_mapping_DunaInSpaceLowMountains_00 // Jagged high relief makes the contour map look like a stressed-out scribble. You can practically hear the lander's suspension whimpering.
        DunaInSpaceLowVolcano* = #JNSQ_bd_mapping_DunaInSpaceLowVolcano_00 // A broad dome and dark flows suggest the surface once tried to be liquid. You annotate the map with "probably asleep" and underline "probably."

        IkeInSpaceLowPoles* = #JNSQ_bd_mapping_IkeInSpaceLowPoles_00 // The poles show stark brightness contrasts between sunlit ridges and deep shadow. The map comes back as fifty shades of grey and one shade of "watch your step."
        IkeInSpaceLowMountains* = #JNSQ_bd_mapping_IkeInSpaceLowMountains_00 // Ragged ranges carve the surface into sharp wedges. You circle a few passes that look navigable, then remember gravity is optional here.
        IkeInSpaceLowMidlands* = #JNSQ_bd_mapping_IkeInSpaceLowMidlands_00 // The midlands are a patchwork of rough ground and shallow basins. It's like the terrain couldn't decide whether to be crater or not.
        IkeInSpaceLowLowlands* = #JNSQ_bd_mapping_IkeInSpaceLowLowlands_00 // Dark plains pool between higher ridges in broad, calm-looking patches. The calm patches are where the worst rocks hide.
        IkeInSpaceLowHighlands* = #JNSQ_bd_mapping_IkeInSpaceLowHighlands_00 // High ground is heavily weathered and pocked, with rims on top of rims. You wonder how many impacts it takes before a moon files a complaint.

        EdnaInSpaceLowLowlands* = #JNSQ_bd_mapping_EdnaInSpaceLowLowlands_00 // The lowlands are dim, dusty and uneven, with gentle basins that fade into darkness. Mapping feels like trying to outline a shadow with another shadow.
        EdnaInSpaceLowMidlands* = #JNSQ_bd_mapping_EdnaInSpaceLowMidlands_00 // Subtle ridges and long slopes show up only when the sun angle cooperates. You take three passes and stitch them into something that resembles certainty.
        EdnaInSpaceLowHighlands* = #JNSQ_bd_mapping_EdnaInSpaceLowHighlands_00 // Edna's highlands are jagged and broken, with bright highlights on sharp edges. The map looks like a crumpled sheet of charcoal paper.
        EdnaInSpaceLowPolarIceCraters* = #JNSQ_bd_mapping_EdnaInSpaceLowPolarIceCraters_00 // Shadowed polar craters hide bright flecks that refuse to be explained. You flag them as "cold-trap candidates" and "do not disturb."
        EdnaInSpaceLowWhites* = #JNSQ_bd_mapping_EdnaInSpaceLowWhites_00 // A pale region stands out against the otherwise dark surface like chalk on slate. The team debates frost, salt, or "Edna being dramatic."

        DakInSpaceLowLowlands* = #JNSQ_bd_mapping_DakInSpaceLowLowlands_00 // The low areas look like scooped-out dents in a lumpy potato. You mark several as "good for landing" and then add "maybe" in smaller letters.
        DakInSpaceLowMidlands* = #JNSQ_bd_mapping_DakInSpaceLowMidlands_00 // The midlands roll in irregular humps and shallow pits with no obvious pattern. The map grid feels more like a suggestion than a coordinate system.
        DakInSpaceLowHighlands* = #JNSQ_bd_mapping_DakInSpaceLowHighlands_00 // High spots stick up as sharp knobs with exaggerated shadows. You can't tell if you're mapping terrain or a particularly angry rock garden.

        DresInSpaceLowPoles* = #JNSQ_bd_mapping_DresInSpaceLowPoles_00 // The poles show crisp albedo contrasts and long, cold shadows. The map is neat enough that you briefly forget Dres is trying to hide.
        DresInSpaceLowHighlands* = #JNSQ_bd_mapping_DresInSpaceLowHighlands_00 // Highlands rise in fractured plates and ridges, battered by old impacts. The contour lines pile up like paperwork.
        DresInSpaceLowMidlands* = #JNSQ_bd_mapping_DresInSpaceLowMidlands_00 // Midlands look deceptively smooth until you zoom in and find endless micro-craters. You label it "flat-ish" for legal reasons.
        DresInSpaceLowLowlands* = #JNSQ_bd_mapping_DresInSpaceLowLowlands_00 // Lowlands form darker basins that collect ejecta and dust. The camera captures a few suspiciously level floors-perfect for traps, or bases.
        DresInSpaceLowCanyon* = #JNSQ_bd_mapping_DresInSpaceLowCanyon_00 // A deep, winding canyon slices across the surface like a tear. The mapping team draws it in thick ink and calls it "unmissable."

        JoolInSpaceLowEquatorialBands* = #JNSQ_bd_mapping_JoolInSpaceLowEquatorialBands_00 // The equatorial bands look like green taffy stretched around the planet. The map team argues which stripe is “up.”
        JoolInSpaceLowExposedLowerDeck* = #JNSQ_bd_mapping_JoolInSpaceLowExposedLowerDeck_00 // A darker tear in the upper clouds reveals a deeper layer moving the wrong direction. You label it “lower deck” and stop asking questions.
        JoolInSpaceLowSubpolarBands* = #JNSQ_bd_mapping_JoolInSpaceLowSubpolarBands_00 // The subpolar belts break into chevrons and ragged streamers. Your grid lines wobble as if the planet is breathing.
        JoolInSpaceLowNorthPole* = #JNSQ_bd_mapping_JoolInSpaceLowNorthPole_00 // The north pole swirls into a tight, pale vortex. It looks like a drain you should not stand near.
        JoolInSpaceLowSouthPole* = #JNSQ_bd_mapping_JoolInSpaceLowSouthPole_00 // The south polar cap is a messy spiral with bright knots. The camera returns a map and an unsolicited safety warning.
        JoolInSpaceLowStormComplex* = #JNSQ_bd_mapping_JoolInSpaceLowStormComplex_00 // A cluster of storms forms interlocking ovals, like someone pressed bubble wrap into the clouds. The “pop” is implied.

        LaytheInSpaceLowShores* = #JNSQ_bd_mapping_LaytheInSpaceLowShores_00 // Coastlines trace bright sand fringes around dark ocean. Every bay looks like a tempting landing site and a terrible landing site.
        LaytheInSpaceLowShallows* = #JNSQ_bd_mapping_LaytheInSpaceLowShallows_00 // The water shifts color near the islands, outlining reefs and flats. The map comes back annotated: “do not underestimate waves.”
        LaytheInSpaceLowInlandWater* = #JNSQ_bd_mapping_LaytheInSpaceLowInlandWater_00 // Inland seas glitter between ridges, connected by channels that appear and disappear. You start to suspect the tides have opinions.
        LaytheInSpaceLowKrenwichSea* = #JNSQ_bd_mapping_LaytheInSpaceLowKrenwichSea_00 // The sea is framed by scattered archipelagos, with long wind streaks across the surface. The cartographers immediately draw shipping lanes.
        LaytheInSpaceLowArcticSea* = #JNSQ_bd_mapping_LaytheInSpaceLowArcticSea_00 // The northern water is mottled with bright ice rafts. The map is crisp until a cloud bank tries to eat the coastline.
        LaytheInSpaceLowJoolwardSea* = #JNSQ_bd_mapping_LaytheInSpaceLowJoolwardSea_00 // A broad expanse of water with heavy cloud shadows drifting Joolward. It’s hard to tell where sea ends and sky begins.
        LaytheInSpaceLowPolwardSea* = #JNSQ_bd_mapping_LaytheInSpaceLowPolwardSea_00 // Dark water fades into pale ice fields toward the pole. You mark a sharp boundary and write “probably thin.”
        LaytheInSpaceLowHighlands* = #JNSQ_bd_mapping_LaytheInSpaceLowHighlands_00 // Upland terrain forms terraces and scarps above the coasts. The shadows make everything look steeper than your landing legs would like.
        LaytheInSpaceLowMountains* = #JNSQ_bd_mapping_LaytheInSpaceLowMountains_00 // Peak chains punch through thin cloud wisps, casting dagger shadows. The map team adds extra contour intervals out of respect.
        LaytheInSpaceLowIceCaps* = #JNSQ_bd_mapping_LaytheInSpaceLowIceCaps_00 // Bright caps spill outward in lobes, broken by darker fractures. Something here is flowing without anyone’s permission.
        LaytheInSpaceLowEnclosedFaults* = #JNSQ_bd_mapping_LaytheInSpaceLowEnclosedFaults_00 // A web of enclosed cracks and grabens outlines polygonal blocks. The camera makes it look like a planet-sized ceramic glaze.
        LaytheInSpaceLowLowlands* = #JNSQ_bd_mapping_LaytheInSpaceLowLowlands_00 // Low, rolling ground fills in between the coasts and highlands, speckled with small craters. You circle several “flat” zones and then zoom in.
        LaytheInSpaceLowMidlands* = #JNSQ_bd_mapping_LaytheInSpaceLowMidlands_00 // Mid-elevation terrain shows braided ridges and shallow basins. It maps cleanly, which feels suspicious on Laythe.

        VallInSpaceLowPoles* = #JNSQ_bd_mapping_VallInSpaceLowPoles_00 // The poles are bright and smooth from altitude, with faint scars spiraling outward. The map reads like ice that’s been stirred.
        VallInSpaceLowHighlands* = #JNSQ_bd_mapping_VallInSpaceLowHighlands_00 // Highlands show ridges and shattered plates in pale blue. The shadows stretch like cold fingers.
        VallInSpaceLowMidlands* = #JNSQ_bd_mapping_VallInSpaceLowMidlands_00 // Midlands alternate between rough hummocks and smoother plains. The terrain looks like it was frozen mid-collapse.
        VallInSpaceLowLowlands* = #JNSQ_bd_mapping_VallInSpaceLowLowlands_00 // Dark low plains spread between brighter uplifts, cut by long, sinuous troughs. You label them “canyons” and “do not enter.”
        VallInSpaceLowMountains* = #JNSQ_bd_mapping_VallInSpaceLowMountains_00 // Mountains rise sharply from the plains, with bright crests and deep blue shade. Landing here would be a negotiation.
