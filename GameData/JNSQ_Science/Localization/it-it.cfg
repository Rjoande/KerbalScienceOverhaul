        #JNSQscience_bd_poke_HuygenSrfLandedPoles_00 = È tutto rigido e ben compattato: la sonda avanza solo con spinte lente e riluttanti.
        #JNSQscience_bd_poke_HuygenSrfLandedPolarHighlands_00 = Uno strato fragile e vitreo si frattura nettamente, poi blocca l'asta con graniglia congelata.
        #JNSQscience_bd_poke_HuygenSrfLandedShores_00 = Suolo bagnato e pesante oppone poca resistenza finché non si aggrappa all'asta come se volesse farsi dare un passaggio.
        #JNSQscience_bd_poke_HuygenSrfLandedMethaneLakes_00 = Una crosta sottile cede con uno schiocco, poi la sonda incontra uno strato liscio e cedevole che ispira una sfiducia profonda.
        #JNSQscience_bd_poke_RigaSrfLandedLowlands_00 = Il suolo è piacevolmente familiare, finché in profondità non si compatta molto più del previsto.
