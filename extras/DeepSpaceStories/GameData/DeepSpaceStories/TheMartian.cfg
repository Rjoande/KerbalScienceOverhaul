@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_Martian_crewReport_DunaSrfLanded_00 // The habitat smells like warm electronics and damp soil. The potato boxes are parked as close to the RTG as Mission Control will let us admit.
        DunaSrfLanded* = #DSS_Martian_crewReport_DunaSrfLanded_01 // We rerouted RTG “waste” heat through a radiator “test setup” and now the cabin is livable. The manual did not cover this, but the manual is not here.
        DunaSrfLanded* = #DSS_Martian_crewReport_DunaSrfLanded_02 // The rover battery is now the greenhouse battery. The rover is not thrilled. The potatoes, however, have issued no complaints.
        DunaSrfLanded* = #DSS_Martian_crewReport_DunaSrfLanded_03 // Duna dust has breached the airlock again. We sealed one leak with a snack wrapper, a hose clamp, and an amount of confidence that should not be logged.
        DunaSrfLanded* = #DSS_Martian_crewReport_DunaSrfLanded_04 // Someone suggested cracking open the emergency fuel line “just a little” for warmth. The idea was discussed, then firmly rejected as a very bad one.
        DunaSrfLanded* = #DSS_Martian_crewReport_DunaSrfLanded_05 // The CO2 scrubber started making a sad noise, so we tapped it until it behaved. We are officially calling this “percussive maintenance” and pretending it was planned.

        DunaInSpaceHigh* = #DSS_Martian_crewReport_DunaInSpaceHigh_00 // We are “in formation” with Duna at several kilometers per second. Someone asks if a hull breach counts as a rendezvous maneuver. The answer is no, but the air is leaving fast enough to argue.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_Martian_evaReport_DunaSrfLanded_00 // You take one look at the nearest dead probe and start mentally inventorying its parts. That antenna could be a shovel. Or a ladle. Or both.
        DunaSrfLanded* = #DSS_Martian_evaReport_DunaSrfLanded_01 // You arrange rocks into a message for anything passing overhead. It says “HELLO” until the wind helpfully rearranges it into “HLL O”.
        DunaSrfLanded* = #DSS_Martian_evaReport_DunaSrfLanded_02 // The suit manual wants “scheduled EVA tasks.” The planet wants “improvise.” You repurpose a discarded panel as a windbreak and pretend it was the plan.
        DunaSrfLanded* = #DSS_Martian_evaReport_DunaSrfLanded_03 // You build a rock-sign that reads “SEND SNACKS.”

        DunaInSpaceLow* = #DSS_Martian_evaReport_DunaInSpaceLow_00 // A tiny suit breach turns you into a panicked thruster. You call it “Iron-kerbal mode” and try to look like you meant to do that.
        DunaInSpaceLow* = #DSS_Martian_evaReport_DunaInSpaceLow_01 // You clamp a patch over a suit leak and still get a gentle push. Congratulations: you have invented a maneuvering system powered by regret.
        DunaInSpaceLow* = #DSS_Martian_evaReport_DunaInSpaceLow_02 // The escaping air from a suit breach gives you just enough delta-v to “adjust your trajectory.” The rules call it an accident. You call it a burn.
        DunaInSpaceLow* = #DSS_Martian_evaReport_DunaInSpaceLow_03 // You try to stabilize your spin by pointing a suit leak the other way. It works briefly, until physics remembers you are shaped like a confused potato.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_Martian_bd_camera_DunaSrfLanded_00 // The camera catches a panorama of red dust, scattered hardware, and one brave line of rocks spelling “HI”. The wind tries to edit the message into something less optimistic.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_mapping]]
{
    %RESULTS
    {
        DunaInSpaceLow* = #DSS_Martian_bd_mapping_DunaInSpaceLow_00 // Low orbit turns Duna into a grid of problems you can finally measure. The map fills with “maybe flat” areas and “definitely not flat” areas.
        DunaInSpaceLow* = #DSS_Martian_bd_mapping_DunaInSpaceLow_01 // You tag a string of smooth-looking terrain as a potential traverse route, then zoom in and discover it’s just smaller rocks.
        DunaInSpaceLow* = #DSS_Martian_bd_mapping_DunaInSpaceLow_02 // The scan highlights a suspiciously straight line that might be an old probe track, or a shadow, or a bad pixel that refuses to die. You log it anyway: future-you can argue with present-you.

    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_orbitalScope]]
{
    %RESULTS
    {
        DunaInSpaceLow* = #DSS_Martian_bd_orbitalScope_DunaInSpaceLow_00 // Mission Control asks you to “confirm whether any assets have been left on the surface.” You zoom in until you can identify the exact shape of your bad decisions.
        DunaInSpaceLow* = #DSS_Martian_bd_orbitalScope_DunaInSpaceLow_01 // The orbital scope picks out a tiny glint that is either a forgotten tool, a discarded panel, or a very smug rock. Mission Control requests three more passes “just to be sure.”
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS
    {
        DunaInSpaceLow* = #DSS_Martian_bd_SIGINT_DunaInSpaceLow_00 // The receiver locks onto a faint, outdated ping from a surface probe that was officially “decommissioned.” It is now very unofficially broadcasting what sounds like SOS.
        DunaInSpaceLow* = #DSS_Martian_bd_SIGINT_DunaInSpaceLow_01 // A dead probe starts transmitting in neat little bursts, like it’s trying to remember how to talk. Mission Control asks if you can “just listen” without getting emotionally attached.
        DunaInSpaceLow* = #DSS_Martian_bd_SIGINT_DunaInSpaceLow_02 // You triangulate the signal to an old landing site. The probe repeats a status packet, then switches to a distress tone, as if it has finally noticed it’s alone.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_surveillance]]
{
    %RESULTS
    {
        DunaInSpaceLow* = #DSS_Martian_bd_surveillance_DunaInSpaceLow_00 // The surveillance pass shows a new set of tracks that were not on yesterday’s map. Either the wind learned to drive, or someone is doing unscheduled “maintenance” again.
        DunaInSpaceLow* = #DSS_Martian_bd_surveillance_DunaInSpaceLow_01 // A small cluster of objects near the habitat has shifted position by a few meters. Mission Control calls them “assets.” You call them “things that definitely walked there.”
        DunaInSpaceLow* = #DSS_Martian_bd_surveillance_DunaInSpaceLow_02 // A patch of dust looks freshly scoured, like something was dragged across it with purpose. No one admits to it on the radio, which is how you know it happened.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[sspxPlantGrowth]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_00 // The potato leaves stay stubbornly green in spite of the dust, the cold, and the fact that half the “soil” is improvised. You decide that counts as a scientific breakthrough.
        DunaSrfLanded* = #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_01 // Growth rates spike whenever the RTG heat loop behaves and crash whenever it doesn’t. The plants are voting very clearly on your engineering choices.
        DunaSrfLanded* = #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_02 // You log “nutrient solution adjustments” and “humidity tuning,” which is the official way to say you are keeping potatoes alive with repurposed tubing and determination.
    }
}