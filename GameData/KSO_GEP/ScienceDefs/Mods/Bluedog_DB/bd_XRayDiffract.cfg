@EXPERIMENT_DEFINITION:HAS[#id[bd_XRayDiffract]]
{
    %RESULTS
    {
		TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_XRayDiffract_TaranisSrfLandedScorchedLowlands_00 // The diffraction peaks look heat-baked and tired, like the crystals have been doing pushups under a red sun for centuries.
        TaranisSrfLandedMidlands* = #GEPscience_bd_XRayDiffract_TaranisSrfLandedMidlands_00 // Crystal grains show signs of rapid cooling and reheating. Taranis seems to have a strict “no comfortable temperatures” policy.
        TaranisSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_TaranisSrfLandedHighlands_00 // The lattice spacing is stretched in odd directions, as if the rocks keep bracing for sunrise that comes in sideways.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_XRayDiffract_TaranisSrfLandedDarkSideMidlands_00 // The pattern is sharp and brittle-clean. Whatever formed here froze fast and stayed that way, far from any friendly warmth.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_XRayDiffract_TaranisSrfLandedDarkSideHighlands_00 // Several phases appear locked together like a bad compromise between fire and darkness. The rock refuses to pick a side.
        TaranisSrfLandedPoles* = #GEPscience_bd_XRayDiffract_TaranisSrfLandedPoles_00 // The diffractogram suggests shock-fractured crystals and radiation-scuffed surfaces. Even the poles feel dangerously close to Grannus.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedSunnyLowlands_00 // The diffraction lines are smeared by thermal stress. The sunny side is trying to turn every mineral into a puddle.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedSunnyHighlands_00 // High-temperature minerals dominate, with hints of baked crust underneath. Your instrument requests sunscreen.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedTransitionalLowlands_00 // Mixed phases show up in uneasy balance, as if the ground can’t decide whether to simmer or shiver.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedTransitionalHighlands_00 // The lattice looks repeatedly flexed, like the rock has been breathing in and out with the moving comfort zone.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideLowlands_00 // The peaks are crisp and cold, with signs of frost-bound fractures. The sample feels like it’s holding its breath.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideHighlands_00 // A brittle, fine-grained signature suggests constant cracking in the dark. The crystals are sharp enough to cut radio silence.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedSoutheasternMountains_00 // Several high-pressure phases appear where they shouldn’t. Something here got squeezed hard, long before we showed up.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedWesternMountains_00 // The diffraction pattern shows layered recrystallization, like the mountains have been rebuilt one thermal cycle at a time.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideMountains_00 // The lattice is pristine but strained, as if the entire ridge is one long, frozen memory of heat.

        NodensSrfLandedShores* = #GEPscience_bd_XRayDiffract_NodensSrfLandedShores_00 // Hydrated minerals show up alongside salts and sands. The planet is practically begging for long-term plans and waterproof clipboards.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_NodensSrfLandedTropicalLowlands_00 // The pattern hints at clays and altered rock. Something here has been quietly doing chemistry while we were light-minutes away.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_NodensSrfLandedTemperateLowlands_00 // A stable mix of common minerals appears, with subtle weathering products. Nodens is doing “normal” in a very not-normal neighborhood.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_NodensSrfLandedTropicalMidlands_00 // Crystal structures suggest repeated wet-dry cycles. Mission Control asks if the rocks are trying to write us a message.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_NodensSrfLandedTemperateMidlands_00 // The diffractogram is almost boringly tidy—then you notice trace phases that imply long, slow planetary processing.
        NodensSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_NodensSrfLandedHighlands_00 // Coarse grains and clean peaks suggest ancient crustal material. It’s the kind of rock you build a base on, if you can handle the comm delay.
        NodensSrfLandedTundra* = #GEPscience_bd_XRayDiffract_NodensSrfLandedTundra_00 // Cold-weather alteration phases appear, locked in place. The sample crunches like it knows winter has a schedule.
        NodensSrfLandedIceCaps* = #GEPscience_bd_XRayDiffract_NodensSrfLandedIceCaps_00 // The instrument detects water-ice signatures mixed with windblown grit. Even out here under a dim red sun, the chemistry stays busy.

        BelisamaSrfLandedFlats* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedFlats_00 // The diffraction peaks are neat and uniform—fine, well-ground regolith that’s been patiently waiting under Grannus’s dim red light.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTropicalLowlands_00 // Crystal signatures suggest repeated surface “gardening” by impacts. Belisama keeps getting raked, and it shows.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTemperateLowlands_00 // Several phases look slightly strained, like the minerals have been holding their shape through very long, very cold nights.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTropicalMidlands_00 // The pattern hints at mixed grains—some fresh, some space-worn—stirred together under a sky that never quite feels familiar.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTemperateMidlands_00 // Tiny peak shifts suggest microfractures and slow thermal creep. Nothing here happens fast, except the comm delay.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedHighlands_00 // Strong, sharp peaks indicate exposed crystalline rock with little dust coating—good geology, terrible footing.
        BelisamaSrfLandedPoles* = #GEPscience_bd_XRayDiffract_BelisamaSrfLandedPoles_00 // The signature is crisp but scarred: cold-trapped fines and radiation-etched grains that have been quietly accumulating for ages.

        SucellusSrfLandedBasins* = #GEPscience_bd_XRayDiffract_SucellusSrfLandedBasins_00 // Impact-breccia fingerprints dominate the scan. The crystals look welded together by ancient violence and then left to chill indefinitely.
        SucellusSrfLandedLowlands* = #GEPscience_bd_XRayDiffract_SucellusSrfLandedLowlands_00 // A gritty mix of dark minerals shows up, with hints of metal-rich phases. Sucellus might actually pay for the trip—eventually.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_SucellusSrfLandedTropicalMidlands_00 // The lattice spacing looks inconsistent across grains, as if the surface has been lightly “cooked” by radiation and time.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_SucellusSrfLandedTemperateMidlands_00 // Several weak peaks appear and vanish between scans. Either the sample is complex, or Sucellus is messing with our instruments.
        SucellusSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_SucellusSrfLandedHighlands_00 // The diffractogram suggests older, cleaner crustal material—less dust, more stubborn crystals, and zero interest in being friendly.
        SucellusSrfLandedPoles* = #GEPscience_bd_XRayDiffract_SucellusSrfLandedPoles_00 // Cold-stiffened grains give razor-sharp peaks, but there’s a faint amorphous background from constant particle scuffing.

        CaireenSrfLandedLowlands* = #GEPscience_bd_XRayDiffract_CaireenSrfLandedLowlands_00 // The scan shows simple, primitive minerals with plenty of fractured grains—classic “captured rock” energy.
        CaireenSrfLandedMidlands* = #GEPscience_bd_XRayDiffract_CaireenSrfLandedMidlands_00 // Peaks broaden like the crystals have been repeatedly shocked and cracked. Living in Sucellus’s neighborhood is not relaxing.
        CaireenSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_CaireenSrfLandedHighlands_00 // Coarser fragments produce stronger reflections, suggesting exposed boulders just barely held together by gravity and optimism.
        CaireenSrfLandedPoles* = #GEPscience_bd_XRayDiffract_CaireenSrfLandedPoles_00 // The pattern is cold-clean and dust-light, as if loose fines can’t settle here for long before getting lofted into the void.

        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedTropicalLowlands_00 // The diffraction peaks split into two familiar families: tough, bright minerals mixed with darker, shock-stressed grains. Airmed’s “two-tone” problem goes all the way down.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedTemperateLowlands_00 // The scan shows fine regolith with lots of microfracturing, like the ground has been quietly flinching under a dim red sunrise for ages.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedTropicalMidlands_00 // Several high-strain phases appear where you’d expect calmer crystals. Whatever hit Airmed didn’t believe in gentle introductions.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedTemperateMidlands_00 // A bland-looking sample produces an uncomfortably complex pattern. Mission Control will love it… once the results finish crawling home across the comm delay.
        AirmedSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedHighlands_00 // Sharp peaks and coarse grains suggest exposed bedrock with minimal dust cover. The geology is proud, angular, and completely uninterested in comfort.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedDarkenedLowlands_00 // Dark minerals dominate, with broad peaks from radiation-scuffed crystal faces. The surface looks like it’s been sandblasted by space itself.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedDarkenedMidlands_00 // The diffractogram shows mixed phases welded together by repeated shocks. Airmed’s dark side has had time to remember every impact.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedDarkenedHighlands_00 // Clean reflections sit atop a faint amorphous haze, as if the rock is solid but its surface has been quietly erased grain by grain.
        AirmedSrfLandedPoles* = #GEPscience_bd_XRayDiffract_AirmedSrfLandedPoles_00 // Cold-stiffened grains give crisp peaks, but the background noise hints at relentless particle damage. Even the poles feel too exposed out here.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedTropicalCraquelure_00 // The pattern swings between rock-like and ice-like signatures, with fractured crystal domains everywhere. “Craquelure” is apparently a mineralogical lifestyle.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedTemperateCraquelure_00 // Repeated freeze-crack textures show up as broadened peaks and mixed phases. The ground can’t decide whether to be dust, ice, or both at once.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedTropicalLowlands_00 // Several hydrated-looking phases appear alongside gritty silicates. Borvo is quietly doing chemistry under a sky that never feels familiar.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedTemperateLowlands_00 // The diffractogram suggests fine, wind-worked grains and a stubborn volatile component. Your sample jar fogs up, just to be dramatic.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedTropicalMidlands_00 // Crystal spacing shifts across grains like the material has been flexed by slow seasons and long nights. Borvo’s clock runs differently under Grannus.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedTemperateMidlands_00 // A surprisingly orderly mineral mix shows up—then trace peaks hint at something stranger hiding in the bulk. The instrument refuses to elaborate.
        BorvoSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedHighlands_00 // Strong, clean reflections indicate older, less-weathered material. It’s the kind of crust that makes you wonder what Borvo looked like before it learned secrets.
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedMajorCraters_00 // Shock phases and pulverized grains dominate the scan. The crater material reads like a geological incident report with all the details blacked out.
        BorvoSrfLandedPoles* = #GEPscience_bd_XRayDiffract_BorvoSrfLandedPoles_00 // Cold-trapped volatiles show up mixed with abrasive fines. The crystals look pristine, but the environment is anything but gentle.

        DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedTropicalLowlands_00 // The diffraction peaks are simple, sparse, and bruised—basic minerals with plenty of shock damage. Damona keeps its story short and violent.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedTemperateLowlands_00 // Fine grains produce broad reflections from constant cracking and settling. The surface feels like it’s still recovering from old mistakes.
        DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedTropicalMidlands_00 // Several phases appear partially amorphized, like the crystal structure gave up halfway. Even the rocks seem tired out here.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedTemperateMidlands_00 // The scan suggests mixed ejecta and reworked regolith, stirred together over very long, very quiet nights beneath a dim red sun.
        DamonaSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedHighlands_00 // Coarse fragments yield sharp peaks, hinting at exposed, ancient material. It’s solid, stubborn, and exactly as welcoming as it sounds.
        DamonaSrfLandedImpactBasin* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedImpactBasin_00 // High-pressure signatures appear where they absolutely should not be. Whatever carved this basin left a mineral fingerprint big enough to see from home—eventually.
        DamonaSrfLandedPoles* = #GEPscience_bd_XRayDiffract_DamonaSrfLandedPoles_00 // Crisp peaks and low dust content suggest ongoing loss of fines to the void. The poles are clean, cold, and unhelpfully far away.

        EponaSrfLanded* = #GEPscience_bd_XRayDiffract_EponaSrfLanded_00 // X-ray peaks show ice-laced rock with a hint of trapped volatiles. The sample looks like it’s been waiting a very long time for a warmer message from home.
        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_EponaSrfLandedTropicalLowlands_00 // Broad peaks suggest fine, frost-ground grains mixed with darker minerals. Epona’s dim red daylight doesn’t melt much, but it does a great job of cracking things.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_EponaSrfLandedTemperateLowlands_00 // The pattern shows clathrate-like signatures alongside ordinary silicates. Even the boring plains seem to be hiding a cold, pressurized secret.
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_XRayDiffract_EponaSrfLandedTropicalUplands_00 // Multiple phases overlap like layered snowfall turned to stone. The lattice spacing shifts just enough to make you double-check your calibration… again… after the comm delay.
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_XRayDiffract_EponaSrfLandedTemperateUplands_00 // Sharp reflections from tougher crystals sit on a faint amorphous haze. The surface has been quietly sandblasted by radiation while the sun pretends it’s helping.
        EponaSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_EponaSrfLandedHighlands_00 // Coarse grains give strong, clean peaks—ancient crustal material with minimal weathering. It’s sturdy enough to build on, assuming you like building in the dark.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_XRayDiffract_EponaSrfLandedGrandPeaks_00 // High-pressure phases appear where they shouldn’t on an icy world. Either these peaks were squeezed hard, or Epona’s interior is still doing something interesting.
        EponaSrfLandedCraters* = #GEPscience_bd_XRayDiffract_EponaSrfLandedCraters_00 // Shock-broadened peaks and powdered grains dominate the scan. The craters read like a long, quiet argument between impacts and ice.
        EponaSrfLandedVolcanoes* = #GEPscience_bd_XRayDiffract_EponaSrfLandedVolcanoes_00 // Unexpected mineral ordering shows signs of heating and rapid re-freezing. If this is cryovolcanic material, it’s the coldest kind of ‘fresh lava’ you’ll ever regret touching.
        EponaSrfLandedPoles* = #GEPscience_bd_XRayDiffract_EponaSrfLandedPoles_00 // Crisp, cold peaks and low dust signatures suggest continual loss of fines to the void. The polar ground is clean, brittle, and entirely uninterested in footprints.

        RosmertaSrfLanded* = #GEPscience_bd_XRayDiffract_RosmertaSrfLanded_00 // The diffractogram is simple, sharp, and unfriendly—airless rock with radiation-scuffed crystal faces. Rosmerta keeps its mineralogy as lonely as its orbit.
        RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTropicalLowlands_00 // Fine regolith produces broadened peaks from constant micro-impacts. The grains look like they’ve been slowly pulverized under an indifferent red sun.
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTemperateLowlands_00 // A dusty mix of common minerals shows faint shock features. The surface is basically a museum exhibit, curated by time and particle storms.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTropicalMidlands_00 // Several weak peaks hint at exotic trace phases—then vanish in noise. Either the sample is tricky, or Rosmerta enjoys practical jokes at light-minute distances.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTemperateMidlands_00 // The lattice spacing is remarkably consistent across grains, as if the rock has been cold-soaked forever. Your heater feels personally attacked.
        RosmertaSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_RosmertaSrfLandedHighlands_00 // Coarser fragments yield strong reflections from older, cleaner material. The highlands look like they’ve been chipped straight out of deep time.
        RosmertaSrfLandedPoles* = #GEPscience_bd_XRayDiffract_RosmertaSrfLandedPoles_00 // Cold-trapped fines give razor-sharp peaks, but the background haze suggests constant radiation damage. Even the quiet places aren’t truly quiet out here.

        RAB-58ESrfLanded* = #GEPscience_bd_XRayDiffract_RAB-58ESrfLanded_00 // The scan can’t decide: some peaks scream ‘rock’, others whisper ‘ice’. For a suspected capture, that’s a very on-brand way to dodge questions.
        RAB-58ESrfLandedLowlands* = #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedLowlands_00 // Broad, low-intensity reflections suggest loosely packed grains and poor crystal order. Whatever this is, it’s been rattled around the system for a long time.
        RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedEasternHighlands_00 // Sharper peaks indicate tougher, more crystalline material—possibly the ‘core’ of a body that didn’t start life here. Mission Control adds ‘where from?’ to a very long list.
        RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedWesternHighlands_00 // Mixed phases and strained lattices imply repeated shocks and thermal cycling. The rock looks like it has traveled far, and it remembers every kilometer.

        CernunnosSrfLanded* = #GEPscience_bd_XRayDiffract_CernunnosSrfLanded_00 // Icy signatures overlay a sparse rocky framework, with traces that look like ancient, frozen volatiles. The dwarf world feels like a storage closet for the outer system.
        CernunnosSrfLandedTropicalLowlands* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTropicalLowlands_00 // Fine frost and grit produce a layered pattern of ice and silicate peaks. Under Grannus’s dim glow, the ground changes slowly—but it does change.
        CernunnosSrfLandedTemperateLowlands* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTemperateLowlands_00 // The diffractogram shows clean ice peaks plus a dusty mineral background. It’s like someone mixed snow with sand and then removed all the fun.
        CernunnosSrfLandedTropicalMidlands* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTropicalMidlands_00 // Peak splitting suggests multiple ice phases and stress-fractured grains. The surface seems to creak with every long, red-tinted day-night cycle.
        CernunnosSrfLandedTemperateMidlands* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTemperateMidlands_00 // A surprisingly ordered crystal signature appears, hinting at slow annealing in deep cold. The planet has had time to organize itself—unlike our schedule.
        CernunnosSrfLandedHighlands* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedHighlands_00 // Coarse fragments give strong reflections from old, less-processed material. The highlands look like they’ve been exposed since before anyone thought to name them.
        CernunnosSrfLandedSouthPolarHills* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedSouthPolarHills_00 // Cold-stiffened grains give crisp peaks, but there’s a faint amorphous smear from relentless particle scuffing. The hills are sharp in every sense.
        CernunnosSrfLandedNorthPole* = #GEPscience_bd_XRayDiffract_CernunnosSrfLandedNorthPole_00 // The scan shows nearly pure cold-trap ice with trace dust inclusions. It’s pristine, eerie, and so far away the results arrive home feeling nostalgic.
	}
}