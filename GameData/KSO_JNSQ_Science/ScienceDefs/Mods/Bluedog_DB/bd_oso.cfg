@EXPERIMENT_DEFINITION:HAS[#id[bd_oso]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_bd_oso_SunInSpaceLow_00 // The dedicated sensors immediately regret this assignment, but they still record furious radiation spikes and a steady gale of energetic particles. You label the dataset “Kerbol: Yes.”
		SunInSpaceHigh* = #JNSQscience_bd_oso_SunInSpaceHigh_00 // Out in interplanetary space, the readings settle into a clean baseline: mostly steady sunlight, faint dust, and the occasional hiccup that makes Mission Control sit up straight.
		EdnaInSpaceLow* = #JNSQscience_bd_oso_EdnaInSpaceLow_00 // Edna’s slow, clean eclipses make perfect calibration dips for the solar monitors. The sunlight out here feels distant, but it’s still very much in charge.
		EdnaInSpaceHigh* = #JNSQscience_bd_oso_EdnaInSpaceHigh_00 // From high over Edna, Kerbol’s output looks subdued and remarkably stable. The scientists celebrate the quiet; the engineers celebrate that nothing is melting.
		DakInSpaceLow* = #JNSQscience_bd_oso_DakInSpaceLow_00 // Dak tumbles below like a lumpy potato, chopping the sunlight into rapid flashes across the detectors. The sensors log “shadow noise” and also “potato noise.”
		DakInSpaceHigh* = #JNSQscience_bd_oso_DakInSpaceHigh_00 // At this distance, even Kerbol’s tantrums arrive as polite ripples in the data. Mission Control calls it “good science,” and you call it “finally, a break.”
        LindorInSpaceLow* = #JNSQscience_bd_oso_LindorInSpaceLow_00 // Lindor’s huge magnetic grip turns your “solar” observatory into a particle-counting machine. Somewhere in the noise, Kerbol is still shining… probably.
		LindorInSpaceHigh* = #JNSQscience_bd_oso_LindorInSpaceHigh_00 // Far above Lindor, the sensors finally get a cleaner look at Kerbol—now reduced to a cold, distant lamp. The data is quiet, precise, and a little unsettling.
		KrelInSpaceLow* = #JNSQscience_bd_oso_KrelInSpaceLow_00 // Krel’s tight orbit makes Lindor constantly flick the sunlight on and off like a gigantic shutter. The scientists cheer; the engineers complain about “eclipse spam.”
		KrelInSpaceHigh* = #JNSQscience_bd_oso_KrelInSpaceHigh_00 // From high over Krel, the solar signal is faint but stable—until Lindor drifts across the view and your graphs fall neatly to zero again.
		AdenInSpaceLow* = #JNSQscience_bd_oso_AdenInSpaceLow_00 // Aden reflects just enough light to confuse the sensors into logging “surface glint” as “solar event.” You rename the file before anyone notices.
		AdenInSpaceHigh* = #JNSQscience_bd_oso_AdenInSpaceHigh_00 // Up here, Lindor dominates the sky and Kerbol is a weak, steady source. The observatory settles into long, boring readings—exactly what the specialists wanted.
		HuygenInSpaceLow* = #JNSQscience_bd_oso_HuygenInSpaceLow_00 // Huygen’s hazy glow and energetic particle environment hammer the instruments with false alarms. Mission Control asks if the Sun is exploding; you answer “not locally.”
		HuygenInSpaceHigh* = #JNSQscience_bd_oso_HuygenInSpaceHigh_00 // Above Huygen’s amber veil, the sensors track Kerbol’s thin output with surprising clarity. Occasional spikes suggest the system is still very much alive—and not always friendly.
		RigaInSpaceLow* = #JNSQscience_bd_oso_RigaInSpaceLow_00 // Riga’s muted surface throws back a weak, steady sheen while the sensors strain for photons. The report reads: “Solar input detected. Barely.”
		RigaInSpaceHigh* = #JNSQscience_bd_oso_RigaInSpaceHigh_00 // High over Riga, the observatory gets a clean baseline: dim sunlight, sparse dust, and the comforting absence of anything trying to cook the hardware.
		TalosInSpaceLow* = #JNSQscience_bd_oso_TalosInSpaceLow_00 // Kerbol is so distant here that the detectors begin reporting “solar” values in fractions of a fraction. The instruments ask—silently—for a different job.
		TalosInSpaceHigh* = #JNSQscience_bd_oso_TalosInSpaceHigh_00 // At Talos’s high orbit, the Sun becomes background and the background becomes the story. You log a pristine, cold dataset and try not to think about the return trip.
        CelesInSpaceLow* = #JNSQscience_bd_oso_CelesInSpaceLow_00 // Celes offers a beautifully cold, quiet baseline. The sensors dutifully log faint sunlight… and an inexplicable “NDA” stamp that nobody remembers adding.
		CelesInSpaceHigh* = #JNSQscience_bd_oso_CelesInSpaceHigh_00 // Far above Celes, the Sun is just a dim, steady reference point. The data is clean enough to make the analysts suspicious.
		TamInSpaceLow* = #JNSQscience_bd_oso_TamInSpaceLow_00 // Tam’s lumpy shape chops the distant sunlight into jittery little flickers. The observatory labels the pattern “KB 4089848” and calls it a day.
		TamInSpaceHigh* = #JNSQscience_bd_oso_TamInSpaceHigh_00 // High over Tam, the detectors start counting photons like precious cargo. Mission Control asks if the Sun is still on; technically, yes.
		HamekInSpaceLow* = #JNSQscience_bd_oso_HamekInSpaceLow_00 // The sensors spot subtle absorption where there shouldn’t be any, like the sunlight is getting “filtered” by the color of Hamek itself. The scientists add a new folder: “Why Is It Red.”
		HamekInSpaceHigh* = #JNSQscience_bd_oso_HamekInSpaceHigh_00 // From high orbit, Hamek sits under a faint, steady drizzle of sunlight. The instruments report normal output—while everyone argues about how anything looks that color in the first place.
        NaraInSpaceLow* = #JNSQscience_bd_oso_NaraInSpaceLow_00 // Nara’s cold hydrogen haze glows faintly as the solar wind stirs it. The sensors record a soft auroral shimmer and a lot of very patient photons.
		NaraInSpaceHigh* = #JNSQscience_bd_oso_NaraInSpaceHigh_00 // High above Nara, Kerbol is a stubborn pinprick. The observatory logs a clean, weak solar baseline and wonders how anything out here ever warms up.
		AmosInSpaceLow* = #JNSQscience_bd_oso_AmosInSpaceLow_00 // Amos reflects almost nothing, which is perfect—until the particle counter starts clicking like it’s picked a fight with Nara’s neighborhood.
		AmosInSpaceHigh* = #JNSQscience_bd_oso_AmosInSpaceHigh_00 // Far from Amos, the solar signal is so thin the readout tries to round down to “meh.” The scientists cheer anyway: the instruments still see it.
		EnonInSpaceLow* = #JNSQscience_bd_oso_EnonInSpaceLow_00 // Enon’s bright ice throws back a sharp glint that briefly convinces the sensors the Sun is closer. It isn’t, but the graphs look confident.
		EnonInSpaceHigh* = #JNSQscience_bd_oso_EnonInSpaceHigh_00 // At high orbit, the glare fades into a steady trickle of sunlight. Most of the dataset is “baseline,” with a few dramatic dust impacts for flavor.
		PraxInSpaceLow* = #JNSQscience_bd_oso_PraxInSpaceLow_00 // Prax clings to the fringe and the sunlight shows up accordingly: faint, steady, and easy to miss if you blink. The observatory measures it anyway, out of spite.
		PraxInSpaceHigh* = #JNSQscience_bd_oso_PraxInSpaceHigh_00 // High above Prax, the data is pure emptiness with a solar signature running through it. Mission Control calls it “excellent calibration,” and nobody argues.
    }
}