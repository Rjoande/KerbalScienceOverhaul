        #GEPscience_bd_massSpec_RosmertaInSpaceLow_00 = Mostly emptiness, with occasional sputtered oxygen and sodium flashes kicked off the surface by harsh radiation and long, lonely orbits.
        #GEPscience_bd_massSpec_RosmertaSrfLandedTropicalLowlands_00 = Dark regolith and faint water-ice signatures mix with implanted ions; the readout feels like a letter addressed to “anyone, anywhere.”
        #GEPscience_bd_massSpec_RosmertaSrfLandedTemperateLowlands_00 = Silicates dominate, with small salt hints and stubborn carbon traces; the analyzer can’t decide if it’s geology or just old debris.
        #GEPscience_bd_massSpec_RosmertaSrfLandedTropicalMidlands_00 = Fine dust produces clean mineral peaks; every so often a volatile fragment appears, then vanishes like it remembered it shouldn’t exist here.
        #GEPscience_bd_massSpec_RosmertaSrfLandedTemperateMidlands_00 = Metal oxides and silicate fragments stack up; the chamber fills with grit that has never known an atmosphere.
        #GEPscience_bd_massSpec_RosmertaSrfLandedHighlands_00 = Coarse grains sharpen the spectrum—more metals, fewer volatiles; the high ground reads like it’s been sandblasted by space itself.
        #GEPscience_bd_massSpec_RosmertaSrfLandedPoles_00 = Shadow-stored frost gives brief, delicate peaks—water and trace nitrogen-bearing fragments—before the sampler’s heat scares them away.

        #GEPscience_bd_massSpec_RAB-58EInSpaceLow_00 = The instrument catches sporadic whiffs of dust and a few volatile fragments; whatever this moonlet is, it’s trying hard not to explain itself.
        #GEPscience_bd_massSpec_RAB-58ESrfLandedLowlands_00 = Mixed rock-and-ice grains flood the inlet; the composition refuses to pick “snowball” or “stone,” so the chart picks both.
        #GEPscience_bd_massSpec_RAB-58ESrfLandedEasternHighlands_00 = The eastern ridge dust runs more metal-rich, with sharper silicate lines; it looks like a different story was glued onto this orbit long ago.
        #GEPscience_bd_massSpec_RAB-58ESrfLandedWesternHighlands_00 = The western highlands show cleaner ice signatures and lighter volatiles; the mass spec labels it “interesting” and saves extra copies for the long trip home.

        #GEPscience_bd_massSpec_CernunnosInSpaceLow_00 = A whisper of sublimated molecules—mostly nitrogen-bearing fragments with faint hydrocarbons—drifts off into the cold, lit by a tired red sun.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTropicalLowlands_00 = “Tropical” still means freezing: nitrogen and methane ices dominate, with dark grains adding a thin organic smear across the spectrum.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTemperateLowlands_00 = Water ice and mixed volatiles show steady peaks; the analyzer reports a “workable inventory,” which is a brave thing to say this far out.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTropicalMidlands_00 = Frosty regolith gives alternating ice and mineral signatures; the chart looks like it’s breathing very slowly.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTemperateMidlands_00 = More silicates appear between the ice peaks, as if the surface is thinning out its winter coat one grain at a time.
        #GEPscience_bd_massSpec_CernunnosSrfLandedHighlands_00 = Coarser mineral fragments boost metal traces while the ices retreat; the high ground reads older, drier, and quietly stubborn.
        #GEPscience_bd_massSpec_CernunnosSrfLandedSouthPolarHills_00 = Cold-trapped volatiles cluster in tidy lines; the sampler warms them just enough to prove they’re real.
        #GEPscience_bd_massSpec_CernunnosSrfLandedNorthPole_00 = The north pole spectrum is heavy with nitrogen-rich frost and faint methane; the data packet feels like it takes longer to leave than it does to collect.

        // bd_microwaveSpec
        #GEPscience_bd_microwaveSpec_GrannusInSpaceHigh_00 = The receiver hears Grannus before you really see it: a steady red-dwarf hiss that makes Mission Control feel very, very far away.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthPolarZone_00 = The polar zone reads oddly subdued, like the star is saving its energy for somewhere else. The data packet takes its sweet time getting home.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthSubpolarZone_00 = Microwave brightness wiggles in a slow rhythm, as if Grannus is breathing. You check the cabin CO2 scrubber anyway.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthTemperateZone_00 = Fine mottling shows up in the scan—warm speckles and cooler patches trading places faster than your comms can keep up.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthTropicZone_00 = The tropic band throws brief spikes that look like tiny flares. You label them “Do Not Point At Again” and press transmit.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowEquatorialZone_00 = The equator is a noisy, bright stripe in microwaves. Grannus feels close enough to touch, but the reply from Kerbin arrives like an echo.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthTropicZone_00 = The southern tropics show a sharp gradient, as if the star’s surface changes texture from one orbit to the next.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthTemperateZone_00 = Stable readings at last—then a sudden burst washes out the baseline. You pretend that was expected and log it as “dynamic.”
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthSubpolarZone_00 = The signal drops, then returns stronger, like the star is playing with your antenna. It’s not funny, but you laugh anyway.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthPolarZone_00 = The south polar region looks cooler in the microwave profile, a quiet cap on a not-at-all-quiet star under a dim red glare.

        #GEPscience_bd_microwaveSpec_TaranisInSpaceHigh_00 = From high above, Taranis looks like a coin tossed between furnace and freezer. The microwave profile agrees, and the long-distance upload takes forever.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowMagmaSea_00 = The molten surface screams in microwave brightness; it’s less “reflected signal” and more “planetary radiator.” Your instrument smells like hot metal.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowMagmaShores_00 = The shoreline zone shows chaotic patchwork—cool crust plates drifting over hotter glow. It’s like watching a lava lamp from very far from home.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowScorchedLowlands_00 = The lowlands return a harsh, dry signature with almost no softness to it. The numbers feel as baked as the landscape looks.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowMidlands_00 = Microwave texture suggests fractured rock and fresh flows mixed together. You note that “fresh” is doing a lot of work this close to a red dwarf.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowHighlands_00 = The highlands read rougher and slightly cooler, but not by much. Your checklist includes “do not land unless you enjoy glowing.”
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowDarkSideMidlands_00 = The dark side midlands come back cold and quiet—finally a stable baseline. Then you remember “quiet” out here just means “waiting.”
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowDarkSideHighlands_00 = The dark highlands show sharp, brittle contrasts, like the surface is cracked glass. The scan finishes before the sunlit side can catch up.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowPoles_00 = Polar readings hint at regolith that never quite warms, even in this system. You briefly wonder what “night” even means on a world like this.

        #GEPscience_bd_microwaveSpec_ToutatisInSpaceHigh_00 = Toutatis’ microwave brightness swings wildly with its eternal day and night. Somewhere back home, the tracking station asks if the antenna is still attached.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowSunnyLowlands_00 = The sunny lowlands radiate strongly, as if the planet is set to “defrost.” You assure the team you did not press the wrong button.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowSunnyHighlands_00 = The highlands on the bright side look rough and heat-soaked, with little pockets that cool faster after local dusk. If it has dusk.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowTransitionalLowlands_00 = The twilight lowlands show the most “reasonable” microwave return you’ve seen in ages. Reasonable is still pretty weird under a red sun.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowTransitionalHighlands_00 = Transitional highlands read as fractured ridges with cooler shadows and warmer faces. It’s the closest thing to a comfort zone your sensors can find.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowDarkSideLowlands_00 = The dark side lowlands come back faint and cold, but with subtle bright flecks that suggest denser material just below the surface.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowDarkSideHighlands_00 = Dark highlands show crisp, icy-cold signatures broken by occasional warmer spots—either exposed rock, or your instrument is shivering.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowSoutheasternMountains_00 = Mountain returns are jagged and variable, like steep slopes are hiding different layers. The scan makes you want a flashlight the size of a rocket.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowWesternMountains_00 = The western range looks thermally patchy, hinting at mixed rock types and loose debris. You tag it “landslide-y” and move on.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowDarkSideMountains_00 = The dark side mountains are a microwave silhouette—cold ridges with thin warm seams. It feels like the planet is quietly daring you to get closer.

        #GEPscience_bd_microwaveSpec_NodensInSpaceHigh_00 = The microwave map paints Nodens as a world of wet lows and dry highs under a tired red sun; the transmission delay makes it feel even farther away.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowSaltySeas_00 = Over the salty seas, the return is muted and smooth—liquid surfaces swallowing microwaves like they’re keeping secrets from Mission Control.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowFreshWater_00 = The freshwater patches come back with a cleaner, stronger signature; something down there is very good at holding onto liquid.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowShores_00 = Shorelines flicker between land and sea responses, a ragged dielectric border you can trace even when the sky below is unfamiliar and hazy.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTropicalLowlands_00 = The tropical lowlands show damp, heavy-looking signals—either saturated ground, thick air effects, or both arguing with your instrument.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTemperateLowlands_00 = Temperate lowlands read steadier, like soils that cycle moisture slowly; you file it under “possibly comfy, definitely distant.”
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTropicalMidlands_00 = The midlands return a rougher texture signature, with pockets of higher moisture that don’t match the terrain you expected.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTemperateMidlands_00 = A patchwork of dry ridges and wetter basins shows up in microwaves; it looks organized enough to be tempting, which is suspicious.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowHighlands_00 = Highlands are bright and crisp in the scan—dry, rocky, and sharp-edged, like Nodens is trying to stay armored against its red star.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTundra_00 = The tundra’s microwave profile hints at shallow freeze-thaw layers; the numbers look cold even before the long comms lag confirms you’re alone out here.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowIceCaps_00 = Ice caps come back with a clean, high-contrast return—hard, cold surfaces that make your antenna feel like it’s pointing into silence.

        #GEPscience_bd_microwaveSpec_BelisamaInSpaceHigh_00 = From high orbit, Belisama is a pale, airless disk with a microwave sheen that changes subtly as Nodens hangs nearby like a constant landmark.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowFlats_00 = The flats reflect evenly, suggesting fine regolith spread like dust on a workbench—no air to stir it, no warmth to soften it.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTropicalLowlands_00 = “Tropical” is just a label here, but the lowlands still read slightly warmer and smoother, as if the surface grains are packed tight.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTemperateLowlands_00 = Temperate lowlands show a bland, steady return—good for calibration, bad for anyone hoping the moon would be welcoming.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTropicalMidlands_00 = The midlands scatter the signal with a gritty texture signature; you imagine tiny rocks patiently waiting out the red daylight.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTemperateMidlands_00 = Microwave brightness dips in shallow bands, hinting at compositional streaks that wrap the moon like old scars.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowHighlands_00 = The highlands kick back a harsher, brighter return—exposed rock faces with nowhere to hide from space or from the long trip home.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowPoles_00 = Polar regions come back cold and sharp, with occasional bright flecks that might be cleaner ice or just very honest stone.

        #GEPscience_bd_microwaveSpec_SucellusInSpaceHigh_00 = Sucellus looks like a resource list with a horizon—its microwave reflectivity suggests dense, metallic-rich patches scattered across a dark dwarf world.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowBasins_00 = Basin floors absorb more than expected, as if fines have pooled there; you mark them as “interesting” and pretend that means “safe.”
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowLowlands_00 = Lowlands show mixed returns—rubble, slabs, and something dense beneath—like the planet is half-built and never finished.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowTropicalMidlands_00 = The midlands produce crisp, high-frequency texture cues; the scan feels clinical in the dim red light, which is somehow worse.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowTemperateMidlands_00 = Temperate bands show subtle conductivity shifts, consistent with different mineral mixes; it’s a comforting kind of boring, far from home.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowHighlands_00 = Highlands reflect strongly in places, hinting at exposed metal-bearing rock; you can almost hear the accountants cheering through the comm delay.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowPoles_00 = Polar returns are colder and cleaner, with fewer “busy” textures—either smoother terrain, or just fewer surprises where the sun barely helps.

        #GEPscience_bd_microwaveSpec_CaireenInSpaceHigh_00 = Caireen is a tiny, captured wanderer with a microwave signature that changes every orbit—like a spun stone flashing different faces at a distant red sun.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowLowlands_00 = Lowlands give a soft, low-contrast return consistent with loose rubble; you worry briefly about what “surface” even means here.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowMidlands_00 = Midlands scatter the signal in a noisy way, suggesting blocky debris and uneven slopes that would make a landing radar very unhappy.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowHighlands_00 = Highlands come back bright and jagged—hard rock sticking out of a rubble coat, daring you to get closer.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowPoles_00 = The poles read cold and oddly uniform, as if fines have migrated and settled there over ages of quiet orbiting and zero comfort.

        #GEPscience_bd_microwaveSpec_SironaInSpaceHigh_00 = At this distance the microwave receiver mostly hears Sirona's magnetosphere crackle; the red sunlight feels weak and the data link feels weaker.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowDarkTropicalBands_00 = The dark tropical bands absorb microwaves more strongly, as if the cloud tops are thicker here. You label it "storm pantry" and send the packet into the void.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowLightTropicalBands_00 = The light tropical bands return a cleaner, brighter signal-higher, drier cloud decks that make calibration almost comforting.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowDarkTemperateBands_00 = Temperate dark bands show sharp gradients in brightness temperature; something is churning beneath and not bothering to explain itself.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowLightTemperateBands_00 = The light temperate bands scatter the beam with fine structure, like layered haze sheets stacked under a dim red sky.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowDarkPolarBands_00 = Polar darkness reads as microwave-smooth, then spikes without warning. Either the auroras are loud, or Sirona is trying to get your attention.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowLightPolarBands_00 = The light polar bands look deceptively uniform-until you compare successive orbits and realize the "uniform" pattern is moving.

        #GEPscience_bd_microwaveSpec_AirmedInSpaceHigh_00 = Airmed's microwave return is simple, cold, and harsh-an airless scar in a system where even sunlight arrives tired.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTropicalLowlands_00 = The lowlands give a muted, dusty signature, like powdered rock that's been hammered flat by ages of impacts.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTemperateLowlands_00 = Temperate lowlands reflect a little brighter-either coarser grains, or fresher ejecta that hasn't been space-weathered into silence yet.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTropicalMidlands_00 = Midlands scatter the beam unevenly, suggesting blocky rubble mixed with smoother patches. You imagine it crunching under boots you might never send.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTemperateMidlands_00 = The temperate midlands show alternating strips of high and low reflectivity-two-toned, just like the maps warned.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowHighlands_00 = Highlands come back crisp and bright, exposed rock faces that have nowhere to hide from Sirona's radiation belts.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowDarkenedLowlands_00 = Darkened lowlands soak up microwaves more than expected; you mark them as "fine-grained" and "probably messy."
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowDarkenedMidlands_00 = Darkened midlands show a speckled dielectric pattern, as if the surface is a quilt of old lava and impact glass.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowDarkenedHighlands_00 = Even the darkened highlands reflect sharply-dark in visible light doesn't mean soft in microwaves.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowPoles_00 = The poles look cold and strangely uniform, with a few bright flecks that could be cleaner ice-or just very honest stone.

        #GEPscience_bd_microwaveSpec_BorvoInSpaceHigh_00 = Borvo's microwave spectrum refuses to pick a story: part dusty, part icy, and wrapped in an atmosphere that blurs the truth across a long comms delay.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTropicalCraquelure_00 = The craquelure fields show high-contrast returns, like fractured plates with different compositions wedged between the cracks.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTemperateCraquelure_00 = Temperate cracks look slightly 'wetter' in the microwave response-either buried volatiles, or an atmosphere that's playing tricks close to the ground.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTropicalLowlands_00 = Tropical lowlands emit strongly through the haze, hinting at smoother terrain or finer grains warmed by weak red sunlight.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTemperateLowlands_00 = Temperate lowlands come back steadier, with a dielectric signature consistent with mixed rock and ice. The word "mixed" does a lot of work out here.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTropicalMidlands_00 = Midlands show rougher scattering and small bright spots that repeat each orbit-solid outcrops poking through whatever covers the plains.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTemperateMidlands_00 = Temperate midlands have a soft microwave sheen that suggests frost in the shadows, even if the atmosphere insists it's "low pressure."
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowHighlands_00 = Highlands read as colder and more reflective-either cleaner ice patches or bare rock ridges. You wish the spectrum could just write a postcard.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowMajorCraters_00 = Major craters have bright rims and dull floors, a neat microwave lesson in ejecta sorting that still feels alien under a red sun.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowPoles_00 = Polar returns shift with viewing angle, implying layered deposits. You schedule a follow-up, then remember how far 'follow-up' is from home.

        #GEPscience_bd_microwaveSpec_DamonaInSpaceHigh_00 = Damona is a small gray target with a big past; the microwave profile is mostly cold rock and old scars, sent home at the speed of patience.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTropicalLowlands_00 = Lowlands give a bland, low-contrast return-fine regolith spread thinly over something harder beneath.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTemperateLowlands_00 = Temperate lowlands reflect a bit brighter, suggesting coarser grains that haven't been ground down as evenly.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTropicalMidlands_00 = Midlands show a noisy texture signature, like broken slabs and loose debris fighting over what counts as 'surface.'
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTemperateMidlands_00 = Temperate midlands have subtle conductivity shifts that trace ancient flows of ejecta across the terrain.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowHighlands_00 = Highlands kick back a sharp signal from exposed bedrock; it's the kind of clean data you only get where nothing is alive to complain.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowImpactBasin_00 = The impact basin is a microwave bullseye: bright, dense material on the rim and darker, finer deposits pooled in the center.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowPoles_00 = Polar scans come back cold and quiet, with just enough structure to suggest slow migration of fines in an airless, endless night.

        #GEPscience_bd_microwaveSpec_EponaInSpaceHigh_00 = From high orbit, Epona’s microwave glow looks like a cold shell over something warmer. The dim red sun doesn’t help, and neither does the long wait for Mission Control to answer.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTropicalLowlands_00 = The lowlands radiate like packed, icy ground with just enough “wet” behavior to make you double-check the calibration.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTemperateLowlands_00 = These plains come back smoother and colder in the spectrum, as if the surface is a tidy freezer that never gets opened.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTropicalUplands_00 = The uplands scatter the beam with a rougher texture signature—broken crust, wind-shaped deposits, or both arguing in the numbers.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTemperateUplands_00 = The return is bright and crisp, suggesting cleaner ice or coarser grains that don’t absorb much microwave energy.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowHighlands_00 = Highlands show sharp contrasts orbit to orbit, like thin frost layers shifting with a day-night cycle that barely feels like “day.”
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowGrandPeaks_00 = The peaks are microwave-bright and stubbornly cold—exposed ridges that look like they’ve never forgiven the universe.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowCraters_00 = Crater rims and floors split cleanly in the data: dense ejecta up high, finer pooled material below, all lit by a weak red twilight.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowVolcanoes_00 = The “volcanoes” biome runs warmer than its surroundings in microwaves—either fresh deposits, thin crust, or Epona quietly proving it’s not done yet.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowPoles_00 = Polar readings stay uniformly cold with occasional bright flecks, hinting at layered deposits that have been stacking up for a very long, very distant winter.

        #GEPscience_bd_microwaveSpec_RosmertaInSpaceHigh_00 = Rosmerta is a small, airless target with a microwave signature that feels more like bookkeeping than exploration—until you remember how far from home you are.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTropicalLowlands_00 = “Tropical” is just a label, but the lowlands still read as fine, dusty regolith spread smooth as a lab bench.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTemperateLowlands_00 = These lowlands reflect slightly brighter, suggesting coarser grains or fresher material that hasn’t been space-weathered into silence.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTropicalMidlands_00 = The midlands return a gritty scatter pattern—blocky debris and shallow slopes doing their best to confuse a tidy spectrum.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTemperateMidlands_00 = Subtle conductivity shifts trace faint bands across the terrain, like old scars that only show up when you listen in microwaves.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowHighlands_00 = Highlands kick back a sharp, rock-forward signal: exposed faces with nowhere to hide under the dim red sun.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowPoles_00 = The poles look colder and cleaner, with a narrow range of returns that screams “nothing’s happening here” a little too loudly.

        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceHigh_00 = RAB-58E barely registers as more than a wobbling dot, but the microwave spectrum hints at a captured body with an identity crisis: rock, ice, or both.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceLowLowlands_00 = The “lowlands” absorb more than expected—fine rubble, porous ice, or a surface that doesn’t want to give straight answers.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceLowEasternHighlands_00 = The eastern highlands reflect brighter and rougher, consistent with blocky material exposed along ridges.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceLowWesternHighlands_00 = Western highlands come back colder and slightly smoother, as if shadowed slopes have been frosting over between long, slow days.

        #GEPscience_bd_microwaveSpec_CernunnosInSpaceHigh_00 = From high orbit, Cernunnos reads like a quiet, icy ledger entry on the outskirts of the Grannus system—cold numbers arriving after colder minutes of delay.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTropicalLowlands_00 = Lowlands show a soft microwave sheen consistent with fine, dusty ice—an old surface that’s been gently erased by time.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTemperateLowlands_00 = The spectrum suggests mixed grain sizes, like drifted deposits settling into flats while the dim red sun does almost nothing about it.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTropicalMidlands_00 = Midlands scatter the beam with a crunchy texture signature—broken crust and rubble fields layered over something denser.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTemperateMidlands_00 = These midlands read slightly brighter, hinting at cleaner ice patches or compacted deposits that reflect more efficiently.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowHighlands_00 = Highlands return crisp, high-contrast signatures that look like exposed ridges and harder substrate peeking through the frost.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowSouthPolarHills_00 = The south polar hills show cold slopes with thin bright seams—layering that suggests slow migration of volatiles in near-eternal twilight.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowNorthPole_00 = The north pole comes back uniformly cold with occasional bright specks, like a sparse family of small companions left behind in the microwave map.

        // bd_multiSpec
        #GEPscience_bd_multiSpec_GrannusInSpaceHigh_00 = From this far out, Grannus is a calm red disk—until the ultraviolet band betrays bright scars of active regions crawling across it.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthPolarZone_00 = Multispectral scans show the pole mottled with cooler patches and sudden hot flashes; Mission Control calls it “weather,” and then corrects themselves.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthSubpolarZone_00 = False-color imaging outlines a drifting band of magnetic turbulence. The antenna also outlines why the signal keeps dropping out.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthTemperateZone_00 = The “temperate” zone is still hot enough to make the detector complain in several languages. The compositional map is beautiful anyway.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthTropicZone_00 = A bright ring of emission lines suggests a dense tangle of charged particles. You try not to think about what that means for your return trajectory.
