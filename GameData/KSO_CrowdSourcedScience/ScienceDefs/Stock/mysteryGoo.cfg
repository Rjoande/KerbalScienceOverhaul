        EveSrfSplashedEasternSea* = #CSS_mysteryGoo_EveSrfSplashedEasternSea_00 // The Goo breaks free of the canister, excited for a swim. Upon contact with the purple liquid, however, it quickly returns and curls up in the corner.
        EveSrfSplashedShallows* = #CSS_mysteryGoo_EveSrfSplashedShallows_00 // A tiny wave washes over the canister. The Goo panics.
        EveFlyingLow* = #CSS_mysteryGoo_EveFlyingLow_00 // The Goo now appears like a straw blown painting. It looks distinctly purple but so does everything else.
        EveFlyingLow* = #CSS_mysteryGoo_EveFlyingLow_01 // The Goo's structure is being blown and reformed by the wind as you fly.
        EveFlyingHigh* = #CSS_mysteryGoo_EveFlyingHigh_00 // The Goo is building its own rocket, not trusting you to bring it back home.
        EveFlyingHigh* = #CSS_mysteryGoo_EveFlyingHigh_01 // The Goo has either completely disappeared or been bleached purple.
        EveInSpaceLow* = #CSS_mysteryGoo_EveInSpaceLow_00 // The Goo indicates to you that it would prefer a different travel destination.
        EveInSpaceLow* = #CSS_mysteryGoo_EveInSpaceLow_01 // The Goo stares nervously at Eve.
        EveInSpaceHigh* = #CSS_mysteryGoo_EveInSpaceHigh_00 // The Goo is staring towards the planet. Is it homesick?
        EveInSpaceHigh* = #CSS_mysteryGoo_EveInSpaceHigh_01 // The Goo is practicing turning purple to blend in.

        GillySrfLanded* = #CSS_mysteryGoo_GillySrfLanded_00 // The Goo has clumped up into a spheroid and become slightly brittle.
        GillySrfLanded* = #CSS_mysteryGoo_GillySrfLanded_01 // You don't think the Goo has any trust in Gilly.
        GillySrfLanded* = #CSS_mysteryGoo_GillySrfLanded_02 // The Goo slowly bounces up and down in the canister; it isn't sure if its in space or on a moon.
        GillySrfLandedMidlands* = #CSS_mysteryGoo_GillySrfLandedMidlands_00 // The Goo is acting like it's about to go home.
        GillySrfLandedLowlands* = #CSS_mysteryGoo_GillySrfLandedLowlands_00 // The Goo spins gracefully in the micro-gravity.
        GillySrfLandedHighlands* = #CSS_mysteryGoo_GillySrfLandedHighlands_00 // The Goo rolls placidly around the container.
        GillyInSpaceLow* = #CSS_mysteryGoo_GillyInSpaceLow_00 // The Goo has turned into a hard cone. You wonder if it could hold some snacks?
        GillyInSpaceLow* = #CSS_mysteryGoo_GillyInSpaceLow_01 // For a brief moment, the Goo defies all known laws of physics and takes the shape of a 4-D hyper-cube. Attempting to comprehend this only succeeds in giving you a headache.
        GillyInSpaceHigh* = #CSS_mysteryGoo_GillyInSpaceHigh_00 // The Goo begins to spin around inside its canister, and it looks like its rapidly changing colors.
        GillyInSpaceHigh* = #CSS_mysteryGoo_GillyInSpaceHigh_01 // The Goo looks incredulous.

        KerbinSrfLandedKSC* = #CSS_mysteryGoo_KerbinSrfLandedKSC_00 // The goo lunges towards the nearest dumpster, perhaps the one that the goo can came from in the first place.
        KerbinSrfLandedKSC* = #CSS_mysteryGoo_KerbinSrfLandedKSC_01 // The Goo has given up and is heading home.
        KerbinSrfLandedKSC* = #CSS_mysteryGoo_KerbinSrfLandedKSC_02 // The goo seems to be giving you a funny look.
        KerbinSrfLandedKSC* = #CSS_mysteryGoo_KerbinSrfLandedKSC_03 // The Goo seems bored.
        KerbinSrfLandedKSC* = #CSS_mysteryGoo_KerbinSrfLandedKSC_04 // The Goo looks as if it is a puddle of water.
        KerbinSrfLandedKSC* = #CSS_mysteryGoo_KerbinSrfLandedKSC_05 // The Goo needs to go back to the lab.
        KerbinSrfLandedAdministration* = #CSS_mysteryGoo_KerbinSrfLandedAdministration_00 // The Goo wants to go the other way.
