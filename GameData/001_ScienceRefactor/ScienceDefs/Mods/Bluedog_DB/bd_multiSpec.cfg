        EarthInSpaceLowShores* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowShores_00 // Multispectral data is collected to study coastal errosion.
        EarthInSpaceLowDeserts* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowDeserts_00 // The data collected from this instrument is used to collect data on errosion is contributing to the growth of deserts.
        EarthInSpaceLowWater* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowWater_00 // Multispectral analysis and thermal imagery provides insight oceanic weather formation, aquatic biology, rising sea temperatures, and the formation of algae blooms.
