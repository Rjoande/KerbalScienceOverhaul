        MinmusSrfLandedLowlands* = #CSS_temperatureScan_MinmusSrfLandedLowlands_00 // Temperature reads "Minty Fresh". You make an addendum requesting that all future thermometers use numbers instead of wisecracks.
        MinmusSrfLandedFlats* = #CSS_temperatureScan_MinmusSrfLandedFlats_00 // The thermometer suddenly reads NaN. One of the wires must have come loose again.
        MinmusSrfLandedGreatFlats* = #CSS_temperatureScan_MinmusSrfLandedGreatFlats_00 // The ground seems to reflect most of the Sun's thermal energy, yet the ground temperature is much higher than it should be. This warrants further investigation.
