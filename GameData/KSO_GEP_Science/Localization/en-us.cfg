        #GEPscience_bd_UVspec_SironaInSpaceLowLightPolarBands_00 = UV brightness rises along the limb and then collapses into deep absorption, like you’re skimming the edge of a glowing shell. The red sun makes it feel like you’re watching it through a warning light.
        #GEPscience_bd_UVspec_SironaInSpaceHigh_00 = From high above, Sirona becomes a clean atmospheric signature with intermittent UV outbursts that punch through the average. The long communications delay makes each burst feel like it happened a lifetime ago.

        #GEPscience_bd_UVspec_AirmedInSpaceLowTropicalLowlands_00 = The UV return is uneven, as if one half of the ground refuses to reflect politely. With no real air to smooth things out, every scar shows up in brutal detail.
