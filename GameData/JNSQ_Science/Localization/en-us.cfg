        #JNSQscience_evaReport_LaytheSrfLandedMountains_01 = The air feels thin through the suit systems, and every step sounds loud on bare stone. You take a photo and avoid looking down.
        #JNSQscience_evaReport_LaytheSrfLandedIceCaps_00 = Everything is blindingly bright and painfully cold. You report that the ice is solid, the wind is not, and your toes have filed a complaint.
        #JNSQscience_evaReport_LaytheSrfLandedIceCaps_01 = The frozen ground crunches under your boots in a very official-sounding way. You note the temperature and wonder how the nearby seas stay liquid.
