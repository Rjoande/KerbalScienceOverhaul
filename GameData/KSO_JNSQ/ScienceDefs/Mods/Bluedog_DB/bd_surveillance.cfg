@EXPERIMENT_DEFINITION:HAS[#id[bd_surveillance]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_surveillance_SunInSpaceLowNorthPolarZone_00 // The North Polar Zone looks oddly subdued through the glare, with dark patches that make the instruments whisper “open field lines.”
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_surveillance_SunInSpaceLowNorthSubpolarZone_00 // You track bright streamers curling away from the limb. It’s beautiful in the same way a welding torch is beautiful.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_surveillance_SunInSpaceLowNorthTemperateZone_00 // Granular texture boils across the view like a living map; the camera briefly gives up and declares everything “too bright.”
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_surveillance_SunInSpaceLowNorthTropicZone_00 // A chain of active regions drifts by, flickering and rearranging faster than Mission Control can label them.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_surveillance_SunInSpaceLowEquatorialZone_00 // The equator is a riot of mottled cells and seething light. You realize “surveillance” is a generous word for “staring into the furnace.”
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_surveillance_SunInSpaceLowSouthTropicZone_00 // A looping arc rises off the edge and fades; your optics catch it, your heat shielding pretends it didn’t.
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_surveillance_SunInSpaceLowSouthTemperateZone_00 // A broad dim band cuts through the brightness, hinting at massive flows you can’t see—only infer.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_surveillance_SunInSpaceLowSouthSubpolarZone_00 // The glare eases just enough to reveal tangled filaments. They look like warnings written in light.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_surveillance_SunInSpaceLowSouthPolarZone_00 // The South Polar Zone shows stark contrast and sudden flickers. The sensors log it faithfully while you reconsider every life choice.

        MohoInSpaceLowPoles* = #JNSQscience_bd_surveillance_MohoInSpaceLowPoles_00 // The poles glow stark under a low sun angle; every shadow looks deep enough to hide a bad idea.
		MohoInSpaceLowLowlands* = #JNSQscience_bd_surveillance_MohoInSpaceLowLowlands_00 // Darker lowlands pool with fine debris, as if Moho has been sweeping its impacts into the same corners for ages.
		MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_surveillance_MohoInSpaceLowPolarIceCraters_00 // Bright patches cling to crater floors that never see daylight; the sensor flags them as “persistently stubborn.”
		MohoInSpaceLowHighlands* = #JNSQscience_bd_surveillance_MohoInSpaceLowHighlands_00 // Jagged highlands cast razor shadows; the terrain looks like it was heat-treated into sharpness.
		MohoInSpaceLowMidlands* = #JNSQscience_bd_surveillance_MohoInSpaceLowMidlands_00 // The midlands show tired ridges and scoured slopes, all pointing away from Kerbol like they are bracing for it.
		MohoInSpaceLowCraters* = #JNSQscience_bd_surveillance_MohoInSpaceLowCraters_00 // Craters overlap in every size class, a neatly chaotic record of “stand too close to the system’s firing range.”
		MohoInSpaceLowExoticCraters* = #JNSQscience_bd_surveillance_MohoInSpaceLowExoticCraters_00 // Several craters wear strange halos and streaks; your software calls it “unusual albedo,” your gut calls it “don’t.”
		MohoInSpaceLowRareCraters* = #JNSQscience_bd_surveillance_MohoInSpaceLowRareCraters_00 // A few impacts remain crisp and bright, like they arrived late to a party that ended billions of years ago.
		MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_surveillance_MohoInSpaceLowVoronoiCraters_00 // The crater field breaks into unnervingly regular cells, as if Moho tried to organize its pain into a pattern.
		MohoInSpaceLowNotableCraters* = #JNSQscience_bd_surveillance_MohoInSpaceLowNotableCraters_00 // One basin dominates the frame with terraced walls and slumps. The shadows inside look like a separate biome.
		MohoInSpaceLowPeaks* = #JNSQscience_bd_surveillance_MohoInSpaceLowPeaks_00 // Needle-like peaks punch above the ridges, catching the first light and daring you to pick a landing site.

		EveInSpaceLowPoles* = #JNSQscience_bd_surveillance_EveInSpaceLowPoles_00 // The polar regions glow a paler shade through the haze, with streaks that look like the planet tried to frost itself.
        EveInSpaceLowLowlands* = #JNSQscience_bd_surveillance_EveInSpaceLowLowlands_00 // Broad lowland flats ripple with subtle color bands, as if the ground was painted and then left out in the rain.
        EveInSpaceLowMidlands* = #JNSQscience_bd_surveillance_EveInSpaceLowMidlands_00 // The midlands show long, tired ridgelines and winding channels that refuse to explain what carved them.
        EveInSpaceLowHighlands* = #JNSQscience_bd_surveillance_EveInSpaceLowHighlands_00 // Highlands shadows pile up into dramatic relief; your imaging software quietly asks for a safer planet.
        EveInSpaceLowPeaks* = #JNSQscience_bd_surveillance_EveInSpaceLowPeaks_00 // A few peaks punch above the murk like islands in a purple sky, sharp enough to make you flinch from orbit.
        EveInSpaceLowExplodiumSea* = #JNSQscience_bd_surveillance_EveInSpaceLowExplodiumSea_00 // The sea throws back a blinding violet glint that overwhelms the sensor for a moment; definitely not grape juice.
        EveInSpaceLowMountains* = #JNSQscience_bd_surveillance_EveInSpaceLowMountains_00 // Mountain ranges form dark, jagged spines with valleys swallowed by cloud, hiding all the interesting details on purpose.
        EveInSpaceLowShores* = #JNSQscience_bd_surveillance_EveInSpaceLowShores_00 // Along the shoreline, foamy bands and stained shallows draw an ugly border between land and whatever that liquid is.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_surveillance_EveInSpaceLowPolarLakes_00 // Small polar lakes sit like ink blots on the landscape, too still for comfort and too dark for a simple reflection.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_surveillance_EveInSpaceLowPetrolLakes_00 // These lakes shine with an oily sheen, making neat geometric glitters that your eyes insist are artificial.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofAkron_00 // Patchy cloud shadows race across the Akron Sea, while the surface below stays unnervingly smooth.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofNessus_00 // The Nessus Sea shows long, curling surface streaks that look like currents drawing warnings in cursive.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofTaniwha_00 // A storm cell over the Taniwha Sea spirals into a perfect pinwheel; the atmosphere is showing off again.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofGigan_00 // Wave trains on the Gigan Sea march in parallel lines, too orderly until the wind tears them apart.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofRodan_00 // Over the Rodan Sea, lightning flickers under the clouds in brief, silent flashes that your camera barely catches.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofGojira_00 // The Gojira Sea churns near the coast in mottled swirls, as if something huge just rolled over down there.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofGhidorah_00 // Multiple cloud bands converge over the Ghidorah Sea, tangling into a three-way knot of weather and bad decisions.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_surveillance_EveInSpaceLowSeaofBagorah_00 // The Bagorah Sea has bright slicks and dim streaks that drift apart like they do not want to be mixed.
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_surveillance_EveInSpaceLowKrakensWell_00 // Krakens Well forms a dark spiral stain on the surface; the closer you look, the less your brain likes the geometry.

        GillyInSpaceLowLowlands* = #JNSQscience_bd_surveillance_GillyInSpaceLowLowlands_00 // The “lowlands” are just slightly less pointy; boulder fields and hard shadows make everything look loose and temporary.
		GillyInSpaceLowMidlands* = #JNSQscience_bd_surveillance_GillyInSpaceLowMidlands_00 // From low orbit, Gilly’s midlands wobble under rapid rotation, turning each pass into a new angle on the same lump.
		GillyInSpaceLowHighlands* = #JNSQscience_bd_surveillance_GillyInSpaceLowHighlands_00 // The highlands are a mess of ridges and pits with brutal contrast; you can practically hear the regolith sliding away.

        KerbinInSpaceLowShores* = #JNSQscience_bd_surveillance_KerbinInSpaceLowShores_00 // Coastal shallows reveal sandbars, kelp lines, and more tiny umbrellas than Mission Control wants to count.
        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_surveillance_KerbinInSpaceLowIceCaps_00 // Polar imaging shows long cracks and pressure ridges that look like someone tried to fold the planet.
        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_surveillance_KerbinInSpaceLowIceCaps_01 // A few dark specks on the ice resolve into tiny research outposts. They are either brave or very bored.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowMidlands_00 // Wide, gentle terrain makes for easy roads. You also spot several that end abruptly in the middle of nowhere.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowMidlands_01 // Farm plots form neat grids across the Midlands. Someone down there really loves right angles.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowMidlands_02 // A faint smoke plume marks a controlled burn. The camera helpfully labels it: definitely not a rocket launch.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowLowlands_00 // Lowlands rivers braid and curve like spilled snacks. The floodplains look busy and well traveled.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowLowlands_01 // You spot a string of identical storage tanks. Either fuel depots or the world's least exciting art project.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowLowlands_02 // Night-side glare suggests dense settlements. You file it under: home, but suspiciously bright.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridLowlands_00 // Heat haze makes the surface shimmer, but you still catch a long straight track across the sands.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridLowlands_01 // Several reflective panels in the Arid Lowlands form a perfect rectangle. Solar farm or secret sign?
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridLowlands_02 // A dust plume follows something fast and ground-bound. You zoom in and decide not to ask questions.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMidlands_00 // Eroded ridges cast sharp shadows that make the Arid Midlands look like crumpled foil.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMidlands_01 // Old dry channels snake through the basin. If they ever carried water, it was a long time ago.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMidlands_02 // A lonely runway strip appears in the middle of nowhere. You mark it as unexpected convenience.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridHighlands_00 // The terrain breaks into jagged mesas and gullies. Excellent hiding spots, terrible picnic spots.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridHighlands_01 // An oddly circular depression shows up on the scan. Mission Control insists it is totally natural.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridHighlands_02 // Fresh scrape marks suggest active quarrying. Someone is rearranging the Arid Highlands one scoop at a time.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMountains_00 // Steep badland peaks throw knife-edge shadows. The camera struggles to decide what counts as up.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMountains_01 // A switchback road clings to the slopes. You admire the engineering and fear the brakes.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMountains_02 // Strange light-colored streaks run down the faces. Landslides, or just the mountains shedding sand?
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_surveillance_KerbinInSpaceLowGreatLake_00 // The Great Lake is calm enough to mirror clouds. For a moment, orbit feels like flying over flying.
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_surveillance_KerbinInSpaceLowGreatLake_01 // Boat wakes draw bright lines across the water. Someone is either racing or very late for dinner.
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_surveillance_KerbinInSpaceLowGreatLake_02 // Sediment blooms paint the shallows. The lake is quietly showing off its internal plumbing.
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_surveillance_KerbinInSpaceLowInlandWater_00 // Small inland water bodies glitter like dropped coins. The camera auto-focuses on sparkly.
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_surveillance_KerbinInSpaceLowInlandWater_01 // Shorelines look scalloped and irregular, hinting at rising and falling water levels.
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_surveillance_KerbinInSpaceLowInlandWater_02 // A cluster of docks suggests a lakeside town. You try to wave. It does not work.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowKreenwichSea_00 // Shipping lanes cut across the Kreenwich Sea in tidy curves. The ocean is basically a road with waves.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowKreenwichSea_01 // A storm cell builds offshore, with spiral bands forming fast. You tag it as watch closely.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowKreenwichSea_02 // An unfamiliar wake pattern trails a larger vessel. Mission Control suddenly becomes very interested.
        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowArcticSea_00 // Sea ice fractures into plates with dark leads between them. The ArcticSea looks like a cracked window.
        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowArcticSea_01 // A thin line of ships hugs the open water. Supply runs, research, or both.
        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowArcticSea_02 // Sun glint off ice makes the image harsh. You tweak exposure and catch a tiny coastal station.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowForemansSea_00 // The ForemansSea is speckled with fishing boats, each leaving a tiny signature of persistence.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowForemansSea_01 // Cloud shadows march across the water. It looks like the sea is being quietly inspected by the sky.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowForemansSea_02 // A bright slick spreads near the surface. Could be algae, could be something worth a memo.
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowTriangulusSea_00 // The TriangulusSea coastline forms sharp angles that make the map team happy.
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowTriangulusSea_01 // Long wave trains roll in from deep water. Perfect surf, terrible for small craft.
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowTriangulusSea_02 // You spot an isolated beacon flashing in a steady rhythm. It feels oddly deliberate.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowNorthernSea_00 // The NorthernSea shows heavy traffic and long wakes. Home waters, busy waters.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowNorthernSea_01 // A cold front sweeps over the sea, laying down a clean line of cloud. Weather division applauds.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowNorthernSea_02 // Floating debris in a narrow patch resolves into a recovery flotilla. Someone lost something expensive.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowSub-ArcticSea_00 // Patchy ice and open water mingle here. The Sub-ArcticSea cannot decide what season it is.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowSub-ArcticSea_01 // A solitary vessel tracks a zigzag course, as if searching. You log it under patterned behavior.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowSub-ArcticSea_02 // Low sun casts long shadows on the ice fields. Everything looks dramatic, including your paperwork.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowEasternSea_00 // Coastal cities line the EasternSea like beads. Lights, ports, and a lot of tiny moving dots.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowEasternSea_01 // A river delta fans out into murky water. The sediment patterns look like fingerprints.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowEasternSea_02 // You catch a brief flash from a mirror or window. Someone down there might be waving back.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowWesternSea_00 // The WesternSea is rougher than expected, with whitecaps visible even from orbit.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowWesternSea_01 // Two storm systems chase each other across the water. Atmospheric models will love this mess.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_surveillance_KerbinInSpaceLowWesternSea_02 // A long wake splits into smaller wakes near shore. Either a harbor approach or a very organized migration.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_surveillance_KerbinInSpaceLowWelcomeBackIsland_00 // A huge painted marker on the island reads something welcoming. The camera refuses to admit it can read.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_surveillance_KerbinInSpaceLowWelcomeBackIsland_01 // Recovery boats circle offshore in practiced loops. WelcomeBackIsland lives up to its name.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_surveillance_KerbinInSpaceLowWelcomeBackIsland_02 // A small airstrip and a lot of shiny tents suggest a standing pick up the astronauts operation.

        MunInSpaceLowLowlands* = #JNSQscience_bd_surveillance_MunInSpaceLowLowlands_00 // Darker plains collect ejecta and dust; the lowlands look like the Mun’s filing cabinet for fallen rocks.
		MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_surveillance_MunInSpaceLowPolarIceCraters_00 // Shaded polar craters hold stubborn bright patches; the ice is doing its best impression of permanence.
		MunInSpaceLowExoticCraters* = #JNSQscience_bd_surveillance_MunInSpaceLowExoticCraters_00 // The farside basins show odd streaks and angles; you label them “exotic” and hope that counts as an explanation.
		MunInSpaceLowRareCraters* = #JNSQscience_bd_surveillance_MunInSpaceLowRareCraters_00 // A few crisp impacts sit apart from the usual clusters, like the Mun is rationing its craters on purpose.
		MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_surveillance_MunInSpaceLowVoronoiCraters_00 // The crater field tiles into an eerie, tidy pattern; the Mun is trying very hard to become graph paper.
		MunInSpaceLowNotableCraters* = #JNSQscience_bd_surveillance_MunInSpaceLowNotableCraters_00 // A couple of headline craters steal the view with dramatic rims; you can see why maps put them in bold.
		MunInSpaceLowMountains* = #JNSQscience_bd_surveillance_MunInSpaceLowMountains_00 // Jagged mountain spines throw knife-edge shadows; you consider landing, then immediately reconsider.

		MinmusInSpaceLowPoles* = #JNSQscience_bd_surveillance_MinmusInSpaceLowPoles_00 // The poles glitter like frosted sugar; the reflectivity is high enough to make the camera squint.
		MinmusInSpaceLowLowlands* = #JNSQscience_bd_surveillance_MinmusInSpaceLowLowlands_00 // Smooth lowlands spread out like spilled icing; any rover route here looks deceptively easy.
		MinmusInSpaceLowMidlands* = #JNSQscience_bd_surveillance_MinmusInSpaceLowMidlands_00 // The midlands ripple with gentle ridges, like someone stirred the surface and stopped halfway.
		MinmusInSpaceLowHighlands* = #JNSQscience_bd_surveillance_MinmusInSpaceLowHighlands_00 // Highlands rise in pale shelves; the shadows are soft, which somehow feels suspicious.
		MinmusInSpaceLowBasins* = #JNSQscience_bd_surveillance_MinmusInSpaceLowBasins_00 // The basins are broad and flat like landing pads; Minmus keeps offering you the easy option.
		MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_surveillance_MinmusInSpaceLowBrownBasins_00 // Brown basins look like someone spilled cocoa; your instruments insist it is not a snack.
		MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_surveillance_MinmusInSpaceLowBrownLowlands_00 // Brown lowlands form a darker ring that reads like a stain the map refuses to forget.
		MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_surveillance_MinmusInSpaceLowBrownMidlands_00 // Brown midlands show mottled patches, as if the surface is quietly repainting itself.
		MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_surveillance_MinmusInSpaceLowBrownHighlands_00 // Brown highlands cap the ridges with sharp boundaries; you double-check that it is not a texture seam.
		MinmusInSpaceLowMountains* = #JNSQscience_bd_surveillance_MinmusInSpaceLowMountains_00 // Mountain ridges poke up like broken candy shards; plenty of grip, assuming you survive the slope.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_surveillance_DunaInSpaceLowIceCaps_00 // The ice caps gleam through a thin haze, with wind-carved edges that look like they are slowly trying to escape.
		DunaInSpaceLowHighlands* = #JNSQscience_bd_surveillance_DunaInSpaceLowHighlands_00 // The highlands are a maze of ridges and shadows; whatever weather Duna has, it has been busy for a long time.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_surveillance_DunaInSpaceLowMidlands_00 // The midlands show broad, dusty flats cut by faint channels that refuse to admit they were ever rivers.
		DunaInSpaceLowLowlands* = #JNSQscience_bd_surveillance_DunaInSpaceLowLowlands_00 // Lowlands settle into wide basins of darker dust, as if the planet is collecting leftovers in the bottom of the bowl.
		DunaInSpaceLowCraters* = #JNSQscience_bd_surveillance_DunaInSpaceLowCraters_00 // Craters overlap like fingerprints, each impact politely signing over the last one.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_surveillance_DunaInSpaceLowRareCraters_00 // A few rare craters stand out with crisp rims and bright ejecta, like they happened while nobody was looking.
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_surveillance_DunaInSpaceLowVoronoiCraters_00 // The crater field breaks into oddly tiled cells; the pattern is so neat your map software gets smug about it.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_surveillance_DunaInSpaceLowNotableCraters_00 // One crater dominates the scene with terraces and slumped walls, practically begging for a closer look and a safer job.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_surveillance_DunaInSpaceLowExoticCraters_00 // These craters have weird halos and streaks that do not match the dust; you label them “exotic” and move on quickly.
		DunaInSpaceLowTrenches* = #JNSQscience_bd_surveillance_DunaInSpaceLowTrenches_00 // Long trenches cut the surface like scratches in glass, each one casting a shadow deep enough to swallow a rover.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_surveillance_DunaInSpaceLowNotablePlains_00 // The plains are unusually smooth and uniform, which on Duna feels less comforting than it should.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_surveillance_DunaInSpaceLowNotableMountains_00 // A few mountains rise sharper than the rest, poking into the haze like the planet is making a point.
		DunaInSpaceLowMountains* = #JNSQscience_bd_surveillance_DunaInSpaceLowMountains_00 // Mountain chains throw dark, jagged shadows across the dust; the slopes look like they would eat wheels for breakfast.
		DunaInSpaceLowVolcano* = #JNSQscience_bd_surveillance_DunaInSpaceLowVolcano_00 // A lone volcanic feature stains the ground in dark flows, as if Duna is still practicing the idea of being alive.

		IkeInSpaceLowPoles* = #JNSQscience_bd_surveillance_IkeInSpaceLowPoles_00 // Ike’s poles are scuffed and pitted, with bright patches that look like exposed rock peeking through powdered grit.
		IkeInSpaceLowMountains* = #JNSQscience_bd_surveillance_IkeInSpaceLowMountains_00 // The mountains are lumpy and steep, casting harsh shadows that make navigation feel like a prank.
		IkeInSpaceLowMidlands* = #JNSQscience_bd_surveillance_IkeInSpaceLowMidlands_00 // Ike’s midlands are cracked and uneven, a patchwork of old impacts pretending to be terrain.
		IkeInSpaceLowLowlands* = #JNSQscience_bd_surveillance_IkeInSpaceLowLowlands_00 // The lowlands sit in broad dark basins, collecting debris like Ike has a long memory and nowhere to put it.
		IkeInSpaceLowHighlands* = #JNSQscience_bd_surveillance_IkeInSpaceLowHighlands_00 // Highlands show rugged ridges and fractured plateaus, as if the whole moon was once bent and never forgiven.

        EdnaInSpaceLowLowlands* = #JNSQscience_bd_surveillance_EdnaInSpaceLowLowlands_00 // The lowlands are a dark, bruised patchwork; it looks like someone tried to erase the craters and gave up halfway.
		EdnaInSpaceLowMidlands* = #JNSQscience_bd_surveillance_EdnaInSpaceLowMidlands_00 // The midlands show gentle rises and shallow scars, as if Edna is keeping its rougher history just out of sight.
		EdnaInSpaceLowHighlands* = #JNSQscience_bd_surveillance_EdnaInSpaceLowHighlands_00 // Highlands throw long, cold shadows; every ridge looks like it could hide a very inconvenient boulder field.
		EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_surveillance_EdnaInSpaceLowPolarIceCraters_00 // Polar craters hold stubborn bright patches that never get the memo about daylight.
