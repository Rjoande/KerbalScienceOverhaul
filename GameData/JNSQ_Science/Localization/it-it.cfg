        #JNSQscience_bd_multiSpec_PolInSpaceLowHighlands_00 = Gli altipiani restituiscono uno spettro più luminoso e più ruvido con forte contrasto d'ombra dal terreno bitorzoluto. Il composito fa sembrare Pol una gemma friabile.
