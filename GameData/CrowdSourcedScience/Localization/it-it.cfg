        #CSS_atmosphereAnalysis_EveFlyingLowExplodiumSea_00 = Non è certo acqua, visto che nell'aria non c'è alcuna traccia.
        #CSS_atmosphereAnalysis_EveFlyingLowLowlands_00 = Ancora nessun indizio sul perché sia tutto così viola!
