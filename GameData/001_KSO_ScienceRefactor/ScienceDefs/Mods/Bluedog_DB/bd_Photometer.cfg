@EXPERIMENT_DEFINITION:HAS[#id[bd_Photometer]]
{
	@title = #ScienceRefactor_bd_Photometer_title // Photometry Data
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_Photometer_default_00 // You measure the brightness of the body below in the instrument's view.
        InSpace* = #ScienceRefactor_bd_Photometer_default_01 // The photometer takes local brightness measurements.
        InSpace* = #ScienceRefactor_bd_Photometer_default_02 // Albedo of the surface below is measured with the instrument.

        SunInSpace* = #ScienceRefactor_bd_Photometer_SunInSpace_00 // The Sun is extraordinarily bright. Are you surprised?
        SunInSpaceLow* = #ScienceRefactor_bd_Photometer_SunInSpaceLow_00 // Mission control messages "DO NOT LOOK DIRECTLY AT THE SUN"
        SunInSpaceLow* = #ScienceRefactor_bd_Photometer_SunInSpaceLow_01 // IR measurements briefly go off the charts before the instrument enters safe-mode to prevent damage
        SunInSpaceHigh* = #ScienceRefactor_bd_Photometer_SunInSpaceHigh_00 // Kerbol is bright, very bright.

        MohoInSpaceLow* = #ScienceRefactor_bd_Photometer_MohoInSpaceLow_00 // Some large areas appear darker than the rest of the planet. You should send a camera to take a proper look.
        MohoInSpaceHigh* = #ScienceRefactor_bd_Photometer_MohoInSpaceHigh_00 // The Kerbol-facing side of Moho appears very bright although maybe not as bright as you would expect.

        EveInSpaceLow* = #ScienceRefactor_bd_Photometer_EveInSpaceLow_00 // Eve seems to have a nearly continous level of surface brightness. Is it a perfectly smooth body? Or perhaps its covered in thick cloud?
        EveInSpaceHigh* = #ScienceRefactor_bd_Photometer_EveInSpaceHigh_00 // The photometry data shows this planet to be brighter than Kerbin.

		GillyInSpaceLow* = #ScienceRefactor_bd_Photometer_GillyInSpaceLow_00 // The results are quite even despite imaging from quite close up. The surface must be quite smooth.
		GillyInSpaceHigh* = #ScienceRefactor_bd_Photometer_GillyInSpaceHigh_00 // This small body is returning rather dim results despite proximity to the Sun.

        KerbinInSpaceLow* = #ScienceRefactor_bd_Photometer_KerbinInSpaceLow_00 // The brightness levels change from moment to moment. Can we reconstruct the cloud patterns from such rudimentary data?
        KerbinInSpaceHigh* = #ScienceRefactor_bd_Photometer_KerbinInSpaceHigh_00 // Telling apart surface features from clouds is quite difficult with a simple measurement of light intensity.

		MunInSpaceLow* = #ScienceRefactor_bd_Photometer_MunInSpaceLow_00 // The variations are small but frequent. The far side seems as interesting as the near side, we should definitely send more complex instruments to investigate further.
		MunInSpaceHigh* = #ScienceRefactor_bd_Photometer_MunInSpaceHigh_00 // To our surprise it seems fairly easy to match the brightness measurements to telescope obervations of the near side surface.

		MinmusInSpaceLow* = #ScienceRefactor_bd_Photometer_MinmusInSpaceLow_00 // The photometry shows significant areas of perfectly level results. Flats or plains perhaps?
		MinmusInSpaceHigh* = #ScienceRefactor_bd_Photometer_MinmusInSpaceHigh_00 // They say Minmus is minty green. Can't really tell with this instrument.

        DunaInSpaceLow* = #ScienceRefactor_bd_Photometer_DunaInSpaceLow_00 // Dissapointingly there seems to be little evidence of cloud layers on Duna. Perhaps it has a thin atmosphere.
        DunaInSpaceHigh* = #ScienceRefactor_bd_Photometer_DunaInSpaceHigh_00 // The poles of Duna seem a lot brighter than the rest of the surface, could there be ice?

		IkeInSpaceLow* = #ScienceRefactor_bd_Photometer_IkeInSpaceLow_00 // We're not getting much useful results from Ike. We'll need a more sophisticated instrument to study the surface.
		IkeInSpaceHigh* = #ScienceRefactor_bd_Photometer_IkeInSpaceHigh_00 // This body is darker than we expected.

        JoolInSpaceLow* = #ScienceRefactor_bd_Photometer_JoolInSpaceLow_00 // Jool is returning a lot of variation vertically but not laterally. If there are clouds on this purported gas giant, they must be in bands.
        JoolInSpaceHigh* = #ScienceRefactor_bd_Photometer_JoolInSpaceHigh_00 // Jool is big. And it seems quite bright despite its distance from the Sun.

		LaytheInSpaceLow* = #ScienceRefactor_bd_Photometer_LaytheInSpaceLow_00 // A great deal of variation is measured and the bright areas seem to move a lot. Could it be? A Joolian moon with an atmosphere?
		LaytheInSpaceHigh* = #ScienceRefactor_bd_Photometer_LaytheInSpaceHigh_00 // Laythe seems reasonably bright with a lot of variation, lets move the instrument into a lower orbit for a closer look.

		VallInSpaceLow* = #ScienceRefactor_bd_Photometer_VallInSpaceLow_00 // Vall seems quite bright all things considered. Some of the science team are claiming it could be covered in ice.
		VallInSpaceHigh* = #ScienceRefactor_bd_Photometer_VallInSpaceHigh_00 // The surface of Vall seems quite varied.

		BopInSpaceLow* = #ScienceRefactor_bd_Photometer_BopInSpaceLow_00 // A closer look suggests Bop is probably a bit lumpy but not heavily cratered.
		BopInSpaceHigh* = #ScienceRefactor_bd_Photometer_BopInSpaceHigh_00 // Bop is tiny and there doesnt seem much interesting about the brightness results.

		TyloInSpaceLow* = #ScienceRefactor_bd_Photometer_TyloInSpaceLow_00 // Adjusted for distance, the results for Tylo seems kind of similar to the Mun. Don't you wonder what it really looks like?
		TyloInSpaceHigh* = #ScienceRefactor_bd_Photometer_TyloInSpaceHigh_00 // Like most of Jool's moons, the results show variations in brightness suggesting an interesting surface. We must investigate further.

		PolInSpaceLow* = #ScienceRefactor_bd_Photometer_PolInSpaceLow_00 // The science team have analyzed the results and think Pol might have some strange terrain. We'll need a much higher resolution instrument to know more though.
		PolInSpaceHigh* = #ScienceRefactor_bd_Photometer_PolInSpaceHigh_00 // Pol's albedo is darker than some of the other Joolian moons. Perhaps it has a strange colour too?

        EelooInSpaceLow* = #ScienceRefactor_bd_Photometer_EelooInSpaceLow_00 // Up close, it seems Eeloo is brighter than expected after accounting for its distance from the Sun. Another candidate for an icy body perhaps?
        EelooInSpaceHigh* = #ScienceRefactor_bd_Photometer_EelooInSpaceHigh_00 // Eeloo is so far from the Sun its difficult to get a useful result from a basic photometer.
	}
}