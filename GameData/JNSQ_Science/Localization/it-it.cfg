        #JNSQscience_bd_poke_CelesSrfLandedLowlands_00 = Polvere chiara e fine cede liscia, poi si compatta in una guaina ostinata attorno alla sonda.
        #JNSQscience_bd_poke_CelesSrfLandedMidlands_00 = La superficie sembra stranamente uniforme: l'asta entra con resistenza costante, come graniglia già impaccata.
