        // === HabTech2 ===
        // MCE
        #JNSQscience_MCE_SunInSpaceLow_00 = MCE’s COTS boards get a first-hand lesson in “solar weather,” while HDTV tries to keep its sensor from cooking and SIMPLE tries not to turn into a very expensive kite.
        #JNSQscience_MCE_SunInSpaceLow_01 = KSS-IMAP logs wild swings in charged particles; REX-J runs a self-check and politely suggests you stop calling this “near-space.”
        #JNSQscience_MCE_SunInSpaceHigh_00 = Far from any one world, MCE records the steady hKss and pop of interplanetary space; the survivability report becomes a long list of “still functioning.”
        #JNSQscience_MCE_SunInSpaceHigh_01 = KSS-IMAP can’t map “nothing,” so it maps trends instead; HDTV captures black-on-black calibration frames that the engineers insist are “beautiful.”
        #JNSQscience_MCE_MohoInSpaceLow_00 = Moho’s brutal thermal cycling turns the MCE bay into a stress test oven; COTS parts drift out of spec, wander back, and pretend nothing happened.
        #JNSQscience_MCE_MohoInSpaceLow_01 = HDTV gets razor-sharp terrain shots; KSS-IMAP confirms “no atmosphere detected,” and GLIMS files a formal complaint about the lack of storms.
