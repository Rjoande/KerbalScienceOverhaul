		#JNSQscience_bd_massSpec_MunSrfLandedRareCraters_00 = Fresh-looking dust shows cleaner, sharper peaks. It’s like the Mun just opened a new bag of surface.
		#JNSQscience_bd_massSpec_MunSrfLandedVoronoiCraters_00 = The composition repeats with uncanny regularity from scoop to scoop. The spectrometer checks its settings twice and then stops asking questions.
		#JNSQscience_bd_massSpec_MunSrfLandedNotableCraters_00 = The grains here show a broader spread of materials than expected. The crater earns its name by being annoyingly interesting.
		#JNSQscience_bd_massSpec_MunSrfLandedMountains_00 = Coarser particles and exposed rock fragments dominate the sample. The instrument is pleased to see something that isn’t 90% dust for once.

		#JNSQscience_bd_massSpec_MinmusSrfLandedPoles_00 = The sample is cold and faintly volatile-rich compared to the surrounding terrain. The spectrometer notes that “frost is not a flavor.”
		#JNSQscience_bd_massSpec_MinmusSrfLandedLowlands_00 = Powdery surface grains show bright, clean peaks with odd salts mixed in. You try not to lick anything to verify.
		#JNSQscience_bd_massSpec_MinmusSrfLandedMidlands_00 = A tidy blend of dust and sparkling grains enters the chamber. The instrument reports “stable,” which is more than you can say for your landing legs.
		#JNSQscience_bd_massSpec_MinmusSrfLandedHighlands_00 = The sample contains more rocky fragments and fewer fine powders. The spectrum looks like Minmus decided to be serious up here.
		#JNSQscience_bd_massSpec_MinmusSrfLandedBasins_00 = The intake fills with ultra-fine, unusually uniform material. The spectrometer finds lots of salts and volatiles, and absolutely no dessert topping.
		#JNSQscience_bd_massSpec_MinmusSrfLandedBrownBasins_00 = The same smooth basin material, but dusted with darker contaminants. The spectrometer calls it “seasoned,” which again is not a measurement unit.
		#JNSQscience_bd_massSpec_MinmusSrfLandedBrownLowlands_00 = Darker grains skew the spectrum toward heavier minerals. The data suggests the “brown” is not just a lighting problem.
		#JNSQscience_bd_massSpec_MinmusSrfLandedBrownMidlands_00 = The chamber collects mixed bright and dark particles in neat layers. The instrument produces a graph that looks like a messy sandwich.
		#JNSQscience_bd_massSpec_MinmusSrfLandedBrownHighlands_00 = Coarser dark grit dominates the sample here. The spectrometer flags “abrasive” and you immediately stop shaking the container.
		#JNSQscience_bd_massSpec_MinmusSrfLandedMountains_00 = The sample is mostly sharp dust and rock chips from steep slopes. The spectrometer approves, then asks if you can please stop sliding downhill.

        #JNSQscience_bd_massSpec_EveFlyingLow_00 = The intake gulps thick, hot air full of stubbornly purple aerosols. The spectrum is mostly carbon dioxide and “haze, somehow.”
		#JNSQscience_bd_massSpec_EveFlyingHigh_00 = The upper air thins out and the peaks sharpen. It’s still mostly carbon dioxide and nitrogen, just with fewer things trying to gum up the inlet.
		#JNSQscience_bd_massSpec_EveSrfLandedPoles_00 = Colder air carries fewer heavy aerosols, but the chamber still fills fast. The instrument notes a cleaner mix and a lot of very unfriendly frost dust.
		#JNSQscience_bd_massSpec_EveSrfLandedLowlands_00 = The sample is dense, hot, and eager to be anywhere but the chamber. The readout is dominated by carbon dioxide with a side of “pressure problem.”
