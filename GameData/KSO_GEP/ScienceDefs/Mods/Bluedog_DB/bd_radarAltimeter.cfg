        BorvoFlyingLowMajorCraters* = #GEPscience_bd_radarAltimeter_BorvoFlyingLowMajorCraters_00 // Crater rims spike hard, then plunge into deep bowls with clean inner returns. You briefly admire the geometry before remembering you’re inside it.
        BorvoFlyingLowPoles* = #GEPscience_bd_radarAltimeter_BorvoFlyingLowPoles_00 // The poles read as broad, gently sloped high ground with fewer abrupt breaks. “Fewer” is the best adjective you get today.
        BorvoFlyingHighTropicalCraquelure* = #GEPscience_bd_radarAltimeter_BorvoFlyingHighTropicalCraquelure_00 // From higher up, the cracked regions merge into wide, rough belts in the profile. The pattern looks deliberate until you remember nothing out here is trying to help.
        BorvoFlyingHighTemperateCraquelure* = #GEPscience_bd_radarAltimeter_BorvoFlyingHighTemperateCraquelure_00 // Echoes smooth into a coarse, mottled elevation field with persistent jitter. Borvo’s air keeps you aloft and keeps you waiting for permission.
        BorvoFlyingHighTropicalLowlands* = #GEPscience_bd_radarAltimeter_BorvoFlyingHighTropicalLowlands_00 // The lowlands flatten into a stable reference level beneath the haze. It’s comforting, which is why you double-check the calibration.
        BorvoFlyingHighTemperateLowlands* = #GEPscience_bd_radarAltimeter_BorvoFlyingHighTemperateLowlands_00 // Gentle gradients form a map you could almost navigate by. “Almost” is doing a lot of work under a dim red sun.
        BorvoFlyingHighTropicalMidlands* = #GEPscience_bd_radarAltimeter_BorvoFlyingHighTropicalMidlands_00 // The radar outlines broad swells that drift slightly between passes. Either the terrain is subtle, or the atmosphere is rewriting your map.
