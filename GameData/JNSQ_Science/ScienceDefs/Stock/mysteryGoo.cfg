        MinmusSrfLandedBrownHighlands* = #JNSQscience_mysteryGoo_MinmusSrfLandedBrownHighlands_01 // The Goo pulls away from the container walls and huddles in the center, as if the high ground is making it nervous.
        
		DunaSrfLandedRareCraters* = #JNSQscience_mysteryGoo_DunaSrfLandedRareCraters_00 // The Goo gently sloshes back and forth, as if it’s trying to pretend this crater is a tiny sea.
