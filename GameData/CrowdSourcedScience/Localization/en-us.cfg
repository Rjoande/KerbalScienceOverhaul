        #CSS_crewReport_KerbinInSpaceHigh_40 = As you watch Kerbin's oceans from the depths of outer space you ask KSC if there are space pirates. KSC assures you that pirate ships have sails instead of rockets and thus cannot achieve orbit.
        #CSS_crewReport_KerbinInSpaceHigh_41 = You can't see any plant life below, and can't decide whether it's because you are too far away, or that nothing grows here.
        #CSS_crewReport_KerbinInSpaceHigh_42 = Is it still the Highlands if you're over a quarter million meters above it?
        #CSS_crewReport_MunSrfLanded_00 = You feel awestruck at the beaten up nature of the Mun.
        #CSS_crewReport_MunSrfLandedMidlands_00 = Ahh, the Midlands. The only flat place on this not-made-of-cheese rock.
        #CSS_crewReport_MunSrfLandedNorthernBasin_00 = Another place to gain the 'First snack ever eaten here in the history of Kerbalkind' achievement. Let's get to it!
        #CSS_crewReport_MunSrfLandedEastCrater_00 = One small step for man, one giant bill for mankind.
        #CSS_crewReport_MunSrfLandedNorthwestCrater_00 = This would be an awesome spot to film a movie. "North by Northwest Crater".
        #CSS_crewReport_MunSrfLandedSouthwestCrater_00 = This would be a great spot for the first Munar music festival. 'South by Southwest Crater'
        #CSS_crewReport_MunSrfLandedFarsideCrater_00 = Boy, the lighting up here sure looks weird. Almost as if you were on a sound stage or something.
        #CSS_crewReport_MunSrfLandedCanyons_00 = Seeing the dark canyon makes you wonder what wonders lie down there.
        #CSS_crewReport_MunSrfLandedPolarCrater_00 = It feels strangely dangerous out there. Mission Control insists it's safe, but you don't think they would know very well.
        #CSS_crewReport_MunSrfLandedPoles_00 = The crew cannot stop hyperventilating.
        #CSS_crewReport_MunSrfLandedPolarLowlands_00 = You put on your polarized aviator sunglasses. Now you can look cool AND be situationally appropriate.
        #CSS_crewReport_MunSrfLandedHighlands_00 = You survey the vista that spreads out before you as you munch on some snacks.
        #CSS_crewReport_MunSrfLandedHighlandCraters_00 = Struck by a sudden urge to say something witty, you nearly choke on your snack.
        #CSS_crewReport_MunSrfLandedMidlandCraters_00 = You muse on the chances of having landed in this specific crater. Oh yeah, we picked it from data from a pre-scan mission. There was a pre-scan mission, right?!
        #CSS_crewReport_MunSrfLandedEastFarsideCrater_00 = You begin to indicate concerns regarding whether or not the landing was simply an elaborate hoax, but the communications are interrupted by a strange voice telling you to keep quiet.
        #CSS_crewReport_MunSrfLandedTwinCraters_00 = The twin craters remind you of some other twin things. But we won't get into that here.
        #CSS_crewReport_MunInSpaceLow_00 = You resist the urge to take your craft down even lower and 'thread the needle'.
        #CSS_crewReport_MunInSpaceLow_01 = You glance out your window at the surface... Whoa! Who put mountains this high on a rock this small?!
        #CSS_crewReport_MunInSpaceLow_02 = Your ships suffers a minor depressurization, but quick thinking and lots of bubble gum manage to solve the problem before it gets out of hand.
        #CSS_crewReport_MunInSpaceLow_03 = Looking down at the Mun's surface, you suddenly feel tempted to eat cheese.
        #CSS_crewReport_MunInSpaceLow_04 = "Crew reporting in. We are currently near the Mun. It turns out it's much bigger than we thought it was."
        #CSS_crewReport_MunInSpaceLow_05 = Great, we've made it this far! Now, how to land?
        #CSS_crewReport_MunInSpaceLow_06 = Wasn't there an opera written about this once?
        #CSS_crewReport_MunInSpaceLow_07 = You don't know if the crater rims would be a good landing site. Probably not, but they would certainly be... interesting.
        #CSS_crewReport_MunInSpaceLow_08 = Ah the "East Crater". Yes, now that you're up close you can definitely tell which one it is. You totally didn't look at the map.
        #CSS_crewReport_MunInSpaceLow_09 = ANOTHER crater?! Does this place have ANY flat land??
        #CSS_crewReport_MunInSpaceLow_10 = You wonder if your report can even make it back to Kerbin from here - you are on the Farside of the Mun, after all.
        #CSS_crewReport_MunInSpaceLow_11 = You report to Mission Control that you have found no evidence of the long-standing claim that a cow jumped over the Mun.
        #CSS_crewReport_MunInSpaceLow_12 = You try to decide which area would make the best landing spot. Then you make a back-up list of places that would make a good crash-landing spot.
        #CSS_crewReport_MunInSpaceLow_13 = Those highland craters think they're so much better than the other craters. Well they don't look so great from up here!
        #CSS_crewReport_MunInSpaceLow_14 = Crew report begins. I'm hungry. Will eat snacks. Crew report ends.
        #CSS_crewReport_MunInSpaceLow_15 = Without atmosphere, weather, or major seismic activity, the Mun's craters are remarkably well-preserved. You make sure to take plenty of pictures and note this in your report.
        #CSS_crewReport_MunInSpaceLow_16 = You remember watching a documentary on one of the leading theories explaining the formation of the Mun. It's hard to believe that the sterile surface below was once a literal sea of fire.
        #CSS_crewReport_MunInSpaceLow_17 = In addition to the rather round craters, there also appear to be areas that are far more irregular in shape. The scientists are calling these 'basins'.
        #CSS_crewReport_MunInSpaceLow_18 = You report that the ship makes scary noises at night and you can't sleep. Mission Control advises leaving on the night light.
        #CSS_crewReport_MunInSpaceLow_19 = You thank Mission Control for helping you get this far.
        #CSS_crewReport_MunInSpaceLow_20 = The Mun's Polar Lowlands don't seem that different from the rest of the Mun.
        #CSS_crewReport_MunInSpaceLow_21 = The crew is incredibly impressed with the engineering of this spacecraft. They especially admire the cleverly-recessed, climate-controlled snack bar.
        #CSS_crewReport_MunInSpaceLow_22 = Nothing to report Mission Control! Except for the fact that we're flying over the Mun but you already know that.
        #CSS_crewReport_MunInSpaceLow_23 = Those Twin Craters don't look very similar. Perhaps they are fraternal twins.
        #CSS_crewReport_MunInSpaceHigh_00 = From this high up, the canyons look like scars across the Mun's face. Which is appropriate considering how much the Mun has survived millennia after millennia.
        #CSS_crewReport_MunInSpaceHigh_01 = You are very proud of yourself for reaching this far!
        #CSS_crewReport_MunInSpaceHigh_02 = You see a great sphere of moldy cheese... Oh, no wait, its just the Mun.
        #CSS_crewReport_MunInSpaceHigh_03 = What kind of geologic formation is THAT?
        #CSS_crewReport_MunInSpaceHigh_04 = Hey, that looks sort of like the arch from McKerbal's.
        #CSS_crewReport_MunInSpaceHigh_05 = You look back at Kerbin. I looks rather small.
        #CSS_crewReport_MunInSpaceHigh_06 = It seems that the Mun is one big giant rock with no atmosphere.
        #CSS_crewReport_MunInSpaceHigh_07 = Those craters... what could they be caused by?
        #CSS_crewReport_MunInSpaceHigh_08 = "Here I am floating in a tin can, far above the Mun."
        #CSS_crewReport_MunInSpaceHigh_09 = You wonder if those craters were caused by the impacts of launches before you. Mission Control laughs nervously and urges you otherwise.
        #CSS_crewReport_MunInSpaceHigh_10 = You sketch a map of the munar surface with the intention of taking it home to frame and hang on your wall. And, because you have time, you make a few autographed copies to sell on kBay.
        #CSS_crewReport_MunInSpaceHigh_11 = You gaze down at the crater below as crumbs from the snack you are eating fall out of your mouth.
        #CSS_crewReport_MunInSpaceHigh_12 = Wow the Mun looks pretty beat up. Look at all those holes.
        #CSS_crewReport_MunInSpaceHigh_13 = The crater below reminds you of snacks. Of course everything reminds you of snacks.
        #CSS_crewReport_MunInSpaceHigh_14 = You request a bedtime story from Mission Control.
        #CSS_crewReport_MunInSpaceHigh_15 = Huh. The Mun kinda looks like a giant golf ball. You nervously keep an eye out for a giant golf club.
        #CSS_crewReport_MunInSpaceHigh_16 = Staring at the crater-filled surface of the Mun you are suddenly thankful for Kerbin's thick atmosphere.
        #CSS_crewReport_MunInSpaceHigh_17 = Ha the Mun is so small and adorab--holy crap, it's getting big really fast.
        #CSS_crewReport_MunInSpaceHigh_18 = All systems nominal. The ship is happy so you're happy.
        #CSS_crewReport_MunInSpaceHigh_19 = Watching the pockmarked munar surface get larger and larger as you get closer and closer is a sight you'll treasure forever.
        #CSS_crewReport_MunInSpaceHigh_20 = You try to imagine the sheer kinetic energy released when whatever made those giant craters impacted. Must've been quite a sight.
        #CSS_crewReport_MunInSpaceHigh_21 = You and Mission Control are playing Battleship over the radio. Curses! There goes your kruiser.
        #CSS_crewReport_MunInSpaceHigh_22 = You take out your sketchbook and make a drawing of the munar surface. Then you give it a smiley face so it looks happy to see you!
        #CSS_crewReport_MunInSpaceHigh_23 = As you approach the Mun, you take the time to rehearse several contingency plans in case of an emergency.
        #CSS_crewReport_MunInSpaceHigh_24 = You take the time to study the schematics of your spacecraft. You are greatly impressed and slightly worried at how many corners were cut during its design and construction.
        #CSS_crewReport_MunInSpaceHigh_25 = The Twin Craters remind you of a cell dividing.
        #CSS_crewReport_MinmusSrfLanded_00 = You try jumping into the air and strafing at the same time. Now, if only you had a water pistol...
        #CSS_crewReport_MinmusSrfLandedHighlands_00 = The curvature of Minmus is easily visible from here.
        #CSS_crewReport_MinmusSrfLandedMidlands_00 = Low gravity and interesting terrain visible from the window invite you to come outside.
        #CSS_crewReport_MinmusSrfLandedLowlands_00 = You wonder why are you still sitting in your capsule while there's so much fun to have outside.
        #CSS_crewReport_MinmusSrfLandedFlats_00 = You look up at Kerbin and it looks smaller than ever. You think you can just about make out the Mun, too.
        #CSS_crewReport_MinmusSrfLandedGreatFlats_00 = You note that landing on a perfectly flat surface is somewhat boring.
        #CSS_crewReport_MinmusSrfLandedGreaterFlats_00 = The ground here is completely flat. It's really boring.
        #CSS_crewReport_MinmusSrfLandedLesserFlats_00 = "I could be bounded in a nutshell, and count myself a king of infinite space."
        #CSS_crewReport_MinmusSrfLandedPoles_00 = Well, it looks no different from here than it did from far away.
        #CSS_crewReport_MinmusSrfLandedSlopes_00 = Don't fall over, don't fall over, don't fall over...
        #CSS_crewReport_MinmusSrfLandedSlopes_01 = It's completely beyond your understanding why you decided to land here and not on the perfectly flat surface of the frozen lake below.
        #CSS_crewReport_MinmusInSpaceLow_00 = You wonder if it's possible to EVA to the surface and back.
        #CSS_crewReport_MinmusInSpaceLow_01 = You wonder if landing on the top of a mountain will consume less fuel. It would be harder, though.
        #CSS_crewReport_MinmusInSpaceLow_02 = Jet-packing down there would probably be fun. You doubt you could get back up, though.
        #CSS_crewReport_MinmusInSpaceLow_03 = You wonder if Minmus tastes of mint, and if you could make a fortune selling tiny edible planets.
        #CSS_crewReport_MinmusInSpaceLow_04 = You watch Minmus' surface shimmer beneath and wonder if your tongue would stick to the ground upon a thorough licking.
        #CSS_crewReport_MinmusInSpaceLow_05 = Here we are. The giant mint in space.
        #CSS_crewReport_MinmusInSpaceLow_06 = You look out of the window and suddenly feel homesick.
        #CSS_crewReport_MinmusInSpaceLow_07 = Let's go back, I saw a cool rock down there.
        #CSS_crewReport_MinmusInSpaceLow_08 = I know there is no atmosphere, but it still feels stinky, like overripe cheese.
        #CSS_crewReport_MinmusInSpaceHigh_00 = You note that your radio fails to transmit when set to the OFF position.
        #CSS_crewReport_MinmusInSpaceHigh_01 = Kerbin looks small. The Mun looks small. Even the Sun looks small. You turn the binoculars the right way round.
        #CSS_crewReport_MinmusInSpaceHigh_02 = Please let it be a sea of lime sherbet.
        #CSS_crewReport_MinmusInSpaceHigh_03 = Well, it's certainly much smaller in person.
        #CSS_crewReport_MinmusInSpaceHigh_04 = Kerbin's smaller moon isn't as impressive as the other one. However, it does look much more yummy.
        #CSS_crewReport_MinmusInSpaceHigh_05 = At this distance, Kerbin is little more than a pale blue dot, floating the the inky vastness of space.
        #CSS_crewReport_MinmusInSpaceHigh_06 = Hm, how much debris could you kick up if you jumped into one of those lakes from here?
        #CSS_crewReport_DunaSrfLanded_00 = It is quite dusty outside.
        #CSS_crewReport_DunaSrfLandedPoles_00 = Why did we land here again? There's nothing here but ice in all directions.
        #CSS_crewReport_DunaSrfLandedPoles_01 = A spiderweb of ice crystals spreads across the pod window as it cools.
        #CSS_crewReport_DunaSrfLandedMidlands_00 = Very small piles of fine red dust are being deposited on the windows by the thin atmosphere.
        #CSS_crewReport_DunaSrfLandedMidlands_01 = You look through the thickened glass and see small hills to the horizon.
        #CSS_crewReport_DunaSrfLandedLowlands_00 = Dark spots on the surface of Duna were once thought to be the darkness of vegetation growing near the poles as the seasons change. It is now known that the dark coloration is in fact caused by seasonal dust storms.
        #CSS_crewReport_DunaSrfLandedLowlands_01 = A monster dust devil winds its way across the plains in the distance, kicking up a trail of fine dust in its wake.
        #CSS_crewReport_DunaSrfLandedCraters_00 = Duna's surface seems to be covered with dunes. You remark that the planet was aptly-named.
        #CSS_crewReport_DunaSrfLandedCraters_01 = You look out and see the crater floor filled with sand sculpted into patterns by the wind currents.
        #CSS_crewReport_DunaSrfLandedHighlands_00 = "It's extremely red; over."
        #CSS_crewReport_DunaSrfLandedHighlands_01 = I spy with my little eye something beginning with "h".. yes, it's "hill".
        #CSS_crewReport_DunaSrfLandedHighlands_02 = You write down 'red', 'bouldered', and 'dusty' in the logbook.
        #CSS_crewReport_DunaSrfLandedMidlandSea_00 = The gentle winds on the lowland plains deposit a fine coating of dust on the window, turning the world even redder.
        #CSS_crewReport_DunaSrfLandedMidlandSea_01 = "Goooood morning ladies and gentlekerbs, the weather outlook for today features highs of a nippy -5 degrees with the dust storm hazard level at medium-high. If you're going out, be sure to bundle up warm and always carry a respirator. This is Jeb, for KSWN."
        #CSS_crewReport_DunaSrfLandedNorthernBasin_00 = The red landscape outside the window doesn't look particularly inviting. Do you have to go out there?
        #CSS_crewReport_DunaSrfLandedNorthernBasin_01 = Sand starts to pile up on the window ledge. That's right, sand! Not dust for once!
        #CSS_crewReport_DunaSrfLandedSouthernBasin_00 = The ice is slowly creeping over the ancient lava field. You hope it doesn't creep over you, too.
        #CSS_crewReport_DunaSrfLandedSouthernBasin_01 = One side of the basin is mostly ice, the other is mostly rock. You check the map to see which side you landed on.
        #CSS_crewReport_DunaSrfLandedNorthernShelf_00 = You squint through the dust-are those mountains off in the distance? ...Those aren't mountains-they're canyon walls!
        #CSS_crewReport_DunaSrfLandedNorthernShelf_01 = With the craft now still, the red Dunaian sand starts to pile up on the window. You try to tap the window to knock it off, until a wind gust does that for you.
        #CSS_crewReport_DunaSrfLandedMidlandCanyon_00 = The canyon walls here look...curvy. Odd.
        #CSS_crewReport_DunaSrfLandedMidlandCanyon_01 = The chasm looks ominous from down here, like any self-respecting canyon should.
        #CSS_crewReport_DunaSrfLandedEasternCanyon_00 = The canyon is so huge and dusty you can't see the other wall. It makes you feel perticularly small. Well... OK, stop rubbing it in, Duna!
        #CSS_crewReport_DunaSrfLandedEasternCanyon_01 = The air is thick with dust down here, and the haze reduces visibility to a couple of hundred metres or so.
        #CSS_crewReport_DunaSrfLandedWesternCanyon_00 = This canyon looks pretty narrow and relatively dust free, letting you get a clear view of the walls.
        #CSS_crewReport_DunaSrfLandedWesternCanyon_01 = You imagine the canyon as a groove in a giant, red vinyl record. Actually, maybe music-loving aliens built this?
        #CSS_crewReport_DunaSrfLandedPolarHighlands_00 = You look out and see a network of tunnels running beneath the ice to a nearby hole, and try not to think about what this says about the ice.
        #CSS_crewReport_DunaSrfLandedPoalrHighlands_01 = The craft briefly slides and judders over the ice before coming to a stop. It takes a while to let go of the grip handles.
        #CSS_crewReport_DunaSrfLandedPolarCraters_00 = You look out at the vast icy bowl in the landscape and dearly hope the EVA suits are climate controlled.
        #CSS_crewReport_DunaSrfLandedPolarCraters_01 = The cabin radiator clicks on, dispelling the cold seeping into the craft.
        #CSS_crewReport_DunaFlyingLow_00 = You really like Duna. It reminds you of chocolate pancakes.
        #CSS_crewReport_DunaFlyingLowPoles_00 = A scattering of tiny ice crystals flows past the window like dust particles.
        #CSS_crewReport_DunaFlyingLowPoles_01 = The pod window is cold to the touch. Better hope there's some mittens in the cupboard.
        #CSS_crewReport_DunaFlyingLowMidlands_00 = The low red hills start to blend into one another in the distance. You rub your eyes.
        #CSS_crewReport_DunaFlyingLowMidlands_01 = The planet looks very red, which reminds you of the red chicken you left in the astronaut complex fridge. You dearly hope it will still be there when you come back, because you ARE coming back. Right, Mission Control?
        #CSS_crewReport_DunaFlyingLowLowlands_00 = The plains below are criscrossed with lines of disturbed sand, like sand-based crazy paving.
        #CSS_crewReport_DunaFlyingLowLowlands_01 = You gaze at the planet, and realize you'll have no problems keeping your night vision.
        #CSS_crewReport_DunaFlyingLowCraters_00 = You shiver in your seat. Your thoughts turn to the glowing warmth of re-entry into Kerbin's atmosphere and you start to miss your family.
        #CSS_crewReport_DunaFlyingLowCraters_01 = You see the crater walls looming imposingly off in the distance. Whatver made this, it must have been a big ol' wallop.
        #CSS_crewReport_DunaFlyingLowHighlands_00 = You think you see a face. Maybe it was a trick of the light... No, no... that's a face.
        #CSS_crewReport_DunaFlyingLowHighlands_01 = You can get a good enough vantage point at the surface, why bother with coming up that little bit higher?
        #CSS_crewReport_DunaFlyingLowMidlandSea_00 = You spot a towering column of dust far off in the distance. Wonder what that could be?
        #CSS_crewReport_DunaFlyingLowMidlandSea_01 = There's a monster dust storm bearing down on your landing spot. Might not want to spend too much time there.
        #CSS_crewReport_DunaFlyingLowNorthernBasin_00 = The smell of the snacks you put on to warm up earlier starts to make you hungry at a bad time.
        #CSS_crewReport_DunaFlyingLowNorthernBasin_01 = In the low Duna gravity, things fly further. You know that because you just got hit in the face by a boot thrown at you by turbulence.
        #CSS_crewReport_DunaFlyingLowSouthernBasin_00 = A sudden gust of freezing wind almost blows the ship off course. Such are the hazards of being near the icy zones.
        #CSS_crewReport_DunaFlyingLowSouthernBasin_01 = You want to do a barrel roll, until you realise KSC is closely monitoring all craft telemetry and you'd rather keep your job when you return.
        #CSS_crewReport_DunaFlyingLowNorthernShelf_00 = The huge scar scraped out of the surface stretches all the way to the reddish, hazy horizon.
        #CSS_crewReport_DunaFlyingLowNorthernShelf_01 = A powerful gust of wind shakes the capsule violently and a long-forgotten snack falls out of the overhead locker.
        #CSS_crewReport_DunaFlyingLowMidlandCanyon_00 = This one will take some landing skill. You try to pick out a spot that isn't too steeply sloping.
        #CSS_crewReport_DunaFlyingLowMidlandCanyon_01 = You can't see much more from here, as the canyon curves out of your view.
        #CSS_crewReport_DunaFlyingLowEasternCanyon_00 = There's so much dust you can barely see the ground. You're flying blind with only the altimeter to tell you of the nearby ground.
        #CSS_crewReport_DunaFlyingLowEasternCanyon_01 = The dust clouds roil past the window, as though the very air is alive with sand.
        #CSS_crewReport_DunaFlyingLowWesternCanyon_00 = You look down, and hope you don't land on one of the steep walls. That would be... problematic.
        #CSS_crewReport_DunaFlyingLowWesternCanyon_01 = The canyon stretches off to the hazy horizon in both directions. You feel like you've said something similar before.
        #CSS_crewReport_DunaFlyingLowPolarHighlands_00 = The icy hills stretch out in all directions beneath you. The ice glare makes it difficult to look down.
        #CSS_crewReport_DunaFlyingLowPolarHighlands_01 = You find a page in the safety manual on how to deal with space polar bear attacks. Unfortunately, all it says is "run away".
        #CSS_crewReport_DunaFlyingLowPolarCraters_00 = All you can see is pinkish ice to the horizon, albeit lacking the dust haze of the lower latitudes.
        #CSS_crewReport_DunaFlyingLowPolarCraters_01 = You fumble around the glovebox for a pair of sunglasses to protect from the ice glare, which is strong even in the weak Dunaian sun.
        #CSS_crewReport_DunaFlyingHigh_00 = There seems to be something resembling a face on the surface of a planet, but it's only a play of light and shadow.
        #CSS_crewReport_DunaFlyingHigh_01 = The faint whistle of the the thin air around the capsule is almost relaxing.
        #CSS_crewReport_DunaFlyingHigh_02 = You look outside to try and spot Duna's version of the "thin blue line", but there is none to be seen.
        #CSS_crewReport_DunaInSpaceLow_00 = Can it be Kerbiformed?
        #CSS_crewReport_DunaInSpaceLow_01 = Duna. Kerbin's small, failed twin. The thought of what it could have been makes you sad.
        #CSS_crewReport_DunaInSpaceLow_02 = As you orbit the planet, you pick up what appears to be a TV signal from Kerbin. It's so badly distorted that you can't make neither head nor tail of it.
        #CSS_crewReport_DunaInSpaceHigh_00 = The crew is concerned that the planet is "too red". Mission Control does not believe this is a good reason to go home.
        #CSS_crewReport_DunaInSpaceHigh_01 = Hopefully wherever you are is out of the grasping graviational claws of Ike.
        #CSS_crewReport_DunaInSpaceHigh_02 = Is it a big tomato?
        #CSS_crewReport_IkeSrfLandedPolarLowlands_00 = Well, we're down in the big black bowl, the big black bowl...
        #CSS_crewReport_IkeSrfLandedPolarLowlands_01 = The high walls of the polar depression throw long shadows over the already-dark ground outside.
        #CSS_crewReport_IkeSrfLandedMidlands_00 = You ask Mission Control what you're doing here.
        #CSS_crewReport_IkeSrfLandedMidlands_01 = You're not so sure you like Ike any more.
        #CSS_crewReport_IkeSrfLandedEasternMountainRidge_00 = Every moon has two sides, and you feel like you landed on the right one.
        #CSS_crewReport_IkeSrfLandedEasternMountainRidge_01 = Even here, Duna is still peeking above the horizon to watch you.
        #CSS_crewReport_IkeSrfLandedWesternMountainRidge_00 = That bit of ground looks wobbly. Maybe the Lowlands would have been a more stable place to land?
        #CSS_crewReport_IkeSrfLandedWesternMountainRidge_01 = You're itching to get out of the capsule and jump around on the mountain.
        #CSS_crewReport_IkeSrfLandedLowlands_00 = You see a green blur outside, and hope it isn't the kraken.
        #CSS_crewReport_IkeSrfLandedLowlands_01 = The ground is dark, and the sky is dark. Did we actually land?
        #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_00 = More grey mountains. How exciting.
        #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_01 = These mountains are big. You look out and see them rising to the stars around you.
        #CSS_crewReport_IkeSrfLandedSouthPole_00 = You plant your foot on a smooth patch on the floor and almost slide over. You thank Ike's low gravity.
        #CSS_crewReport_IkeSrfLandedSouthPole_01 = By now, you're starting to think the grey of the surface has leached the colour from your vision. You hope you don't turn grey yourself.
        #CSS_crewReport_IkeSrfLandedCentralMountainRange_00 = You could sit in here forever, watching the dust storms roll across the Dunaian surface far away through the thickened glass.
        #CSS_crewReport_IkeSrfLandedCentralMountainRange_01 = You crane your neck against the window, trying to get a glimpse of Duna.
        #CSS_crewReport_IkeInSpaceLow_00 = Ike looks dark and foreboding. Can we go to Duna instead?
        #CSS_crewReport_IkeInSpaceLow_01 = Some of those mountains reach up pretty darn high. You make sure to check the altimeter.
        #CSS_crewReport_IkeInSpaceHigh_00 = You ask Mission Control if they, too, like Ike.
        #CSS_crewReport_IkeInSpaceHigh_01 = There's Ike, though the thick glass of the capsule window. You're not sure if you like it.
        #CSS_crewReport_DresSrfLanded_00 = You were right... it does, in fact, seem to be a giant potato.
        #CSS_crewReport_DresSrfLandedHighlands_00 = It is exactly as gray and icy as expected. Not a bit of gray less, not a bit of ice more.
        #CSS_crewReport_DresSrfLandedImpactEjecta_00 = You see scorch marks and are reminded of back home at the KSC.
        #CSS_crewReport_DresSrfLandedCanyons_00 = You bask in the knowledge that you have successfully landed on the Mun. Wait.
        #CSS_crewReport_DresInSpaceLow_00 = It's very gray and icy down there. The VAB team is going to use this to lobby for better gray-resistant landing legs.
        #CSS_crewReport_DresInSpaceLow_01 = This looks too small to be a planet.
        #CSS_crewReport_DresInSpaceLow_02 = You see debris from what looks like an impact...
        #CSS_crewReport_DresInSpaceHigh_00 = You see what appears to be burn marks, and suddenly feel bad for Dres.
        #CSS_crewReport_DresInSpaceHigh_01 = After noticing a large cut across Dres' surface, you wonder if any band-aids in the first aid kit are big enough.
