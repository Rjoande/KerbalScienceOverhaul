        LaytheSrfSplashedShallows* = #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedShallows_00 // With the seabed close below, the bay reports alternating readings as the craft bobs—like it can’t choose between “water sample” and “ground sample.”
        LaytheSrfSplashedInlandWater* = #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedInlandWater_00 // The calmer water still makes several materials discolor and recoil from the sample injector. The lab files it under “water-avoidant behavior.”
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedKrenwichSea_00 // One metal coupon begins to rust before you finish closing the hatch. The lab politely suggests “less ocean, more lab.”
