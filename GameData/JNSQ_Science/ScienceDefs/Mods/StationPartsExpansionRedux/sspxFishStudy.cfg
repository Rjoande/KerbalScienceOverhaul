@EXPERIMENT_DEFINITION:HAS[#id[sspxFishStudy]]
{
    %RESULTS
    {
        SunFlyingHigh* = #JNSQscience_sspxFishStudy_SunFlyingHigh_00 // The tank starts to feel like a teapot. The fish migrate to the “cold corner” and glare at the thermostat.
        SunFlyingHigh* = #JNSQscience_sspxFishStudy_SunFlyingHigh_01 // The radiation badge turns an exciting color. The fish respond by acting as if you are personally responsible.

        EveSrfSplashed* = #JNSQscience_sspxFishStudy_EveSrfSplashed_00 // The fish stare out at the endless purple sea and unanimously vote to stay inside the tank.
        EveSrfSplashed* = #JNSQscience_sspxFishStudy_EveSrfSplashed_01 // The habitat rocks gently with the waves; the fish treat it like an amusement ride and refuse to look impressed.
        EveSrfSplashed* = #JNSQscience_sspxFishStudy_EveSrfSplashed_02 // The external pressure makes the aquarium look like it’s trying to become a cube. The fish vote to remain indoors.
		EveSrfSplashed* = #JNSQscience_sspxFishStudy_EveSrfSplashed_03 // A tiny purple sheen appears on the intake filters. You log it as “not compatible with gills” and seal everything twice.
        EveFlyingHigh* = #JNSQscience_sspxFishStudy_EveFlyingHigh_00 // The outside pressure gauge climbs again; the fish keep to the “deep end” of the tank as if it helps.
        EveFlyingHigh* = #JNSQscience_sspxFishStudy_EveFlyingHigh_01 // The light filtering through Eve’s haze turns everything strange colors. The fish look offended by the new décor.

        KerbinSrfSplashed* = #JNSQscience_sspxFishStudy_KerbinSrfSplashed_00 // The fish get noticeably excited when the tank water “sounds” like the ocean outside. Nobody can explain how they know.
        KerbinSrfSplashed* = #JNSQscience_sspxFishStudy_KerbinSrfSplashed_01 // Mission Control asks if we can “just let them out.” The fish immediately hide behind the filter.
        KerbinSrfSplashed* = #JNSQscience_sspxFishStudy_KerbinSrfSplashed_02 // The fish seem delighted by the familiar sloshing. Mission Control requests you stop naming them after flight directors.
		KerbinSrfSplashed* = #JNSQscience_sspxFishStudy_KerbinSrfSplashed_03 // You compare the tank water to the surrounding ocean. Conclusion: one is carefully balanced, the other contains snacks.
        KerbinFlyingHigh* = #JNSQscience_sspxFishStudy_KerbinFlyingHigh_00 // The tank sloshes with every little bump. The fish respond by forming a tight, disapproving committee.
        KerbinFlyingHigh* = #JNSQscience_sspxFishStudy_KerbinFlyingHigh_01 // Sunlight flashes across the cabin as clouds roll by below; the fish chase the bright patches like it’s feeding time.
		
        DunaFlyingHigh* = #JNSQscience_sspxFishStudy_DunaFlyingHigh_00 // The heaters work overtime and the fish slow to a suspiciously statue-like pace. Nobody mention “hibernation” on the radio.
        DunaFlyingHigh* = #JNSQscience_sspxFishStudy_DunaFlyingHigh_01 // Fine dust works its way into every seal except, somehow, the fish tank. The fish look smug about it.

        EdnaSrfLanded* = #JNSQscience_sspxFishStudy_EdnaSrfLanded_00 // Without a sunlamp the tank looks like a dark void. The fish keep close together and pretend it’s a school exercise.
        EdnaSrfLanded* = #JNSQscience_sspxFishStudy_EdnaSrfLanded_01 // The water tries to frost at the edges of the habitat. The fish give you the kind of look that says “fix it.”
        EdnaInSpaceLow* = #JNSQscience_sspxFishStudy_EdnaInSpaceLow_00 // The planet below is dim and distant; the fish orient to the only bright thing in the cabin: the snack wrapper.
        EdnaInSpaceLow* = #JNSQscience_sspxFishStudy_EdnaInSpaceLow_01 // In low gravity, currents linger longer. The fish surf invisible whirlpools like tiny, serious astronauts.
        EdnaInSpaceHigh* = #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_00 // Out here it’s just starlight and humming fans; the fish stop darting and settle into slow, careful loops.
        EdnaInSpaceHigh* = #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_01 // A radiation alarm chirps once and everyone panics except the fish, who continue being quietly judgmental.

        DakSrfLanded* = #JNSQscience_sspxFishStudy_DakSrfLanded_00 // Near-zero gravity turns the tank into a floating globe. The fish immediately start swimming in every direction at once.
        DakSrfLanded* = #JNSQscience_sspxFishStudy_DakSrfLanded_01 // You anchor the habitat to a potato-shaped rock and the fish keep bumping the “ceiling,” because it’s now optional.
        DakInSpaceLow* = #JNSQscience_sspxFishStudy_DakInSpaceLow_00 // The asteroid tumbles below and the light strobes through the window. The fish interpret this as a rave.
        DakInSpaceLow* = #JNSQscience_sspxFishStudy_DakInSpaceLow_01 // The fish discover they can stop instantly and just… hover. They do this repeatedly to show off.
        DakInSpaceHigh* = #JNSQscience_sspxFishStudy_DakInSpaceHigh_00 // With Dak shrinking to a pebble, the fish behave like the whole universe is their aquarium now.
        DakInSpaceHigh* = #JNSQscience_sspxFishStudy_DakInSpaceHigh_01 // The tank currents finally settle into perfect symmetry. The fish look disappointed that you didn’t do it on purpose.

		EdnaSrfLanded* = #JNSQscience_sspxFishStudy_EdnaSrfLanded_00 // The heaters run nonstop while the fish drift lazily, as if conserving every last wiggle. You envy their life choices.
		EdnaSrfLanded* = #JNSQscience_sspxFishStudy_EdnaSrfLanded_01 // Outside is dark and quiet; inside, the fish stare back like they’re taking *you* as the sample.
		EdnaInSpaceLow* = #JNSQscience_sspxFishStudy_EdnaInSpaceLow_00 // The fish adapt to microgravity by inventing new directions. Up is now a suggestion.
		EdnaInSpaceLow* = #JNSQscience_sspxFishStudy_EdnaInSpaceLow_01 // Longer observation shows reduced activity and tighter schooling. It’s either stress, or they’ve formed a union.
		EdnaInSpaceHigh* = #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_00 // With Edna shrinking below, the aquarium becomes the brightest thing onboard. The fish act like they own the place.
		EdnaInSpaceHigh* = #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_01 // You log a stable, efficient ecosystem. Then one fish steals another’s food and the whole model collapses.

		DakSrfLanded* = #JNSQscience_sspxFishStudy_DakSrfLanded_00 // The craft’s low gravity turns feeding time into a three-dimensional chase. The fish are winning.
		DakSrfLanded* = #JNSQscience_sspxFishStudy_DakSrfLanded_01 // You secure the aquarium for “potato-world vibrations.” The fish interpret this as a new ride.
		DakInSpaceLow* = #JNSQscience_sspxFishStudy_DakInSpaceLow_00 // The tank’s currents form odd loops as Dak tumbles below. The fish treat it as a sport.
		DakInSpaceLow* = #JNSQscience_sspxFishStudy_DakInSpaceLow_01 // Schooling behavior becomes a synchronized swirl. You consider selling tickets.
		DakInSpaceHigh* = #JNSQscience_sspxFishStudy_DakInSpaceHigh_00 // Far from Dak, the fish settle into a calm glide pattern. It’s almost serene—until snack time.
		DakInSpaceHigh* = #JNSQscience_sspxFishStudy_DakInSpaceHigh_01 // Life support efficiency remains excellent. The fish, however, demand larger quarters and a window seat.

        JoolFlyingHigh* = #JNSQscience_sspxFishStudy_JoolFlyingHigh_00 // The cabin shudders in Jool’s upper winds. The fish form a tight school and pretend this is normal.
        JoolFlyingHigh* = #JNSQscience_sspxFishStudy_JoolFlyingHigh_01 // Green light pulses through the haze outside. The fish keep circling the filter like it’s the only stable thing in the universe.

        LaytheSrfSplashed* = #JNSQscience_sspxFishStudy_LaytheSrfSplashed_00 // The habitat bobs on Laythe’s ocean. The fish press up to the glass like they recognize the smell of “real water.”
        LaytheSrfSplashed* = #JNSQscience_sspxFishStudy_LaytheSrfSplashed_01 // Waves slap the hull in a steady rhythm. The fish synchronize their swimming, as if they’re trying to steer.
        LaytheFlyingHigh* = #JNSQscience_sspxFishStudy_LaytheFlyingHigh_00 // Sunlight flickers off the sea far below. The fish chase the moving reflections and ignore your carefully worded observations.
        LaytheFlyingHigh* = #JNSQscience_sspxFishStudy_LaytheFlyingHigh_01 // Thin air and loud engines; the tank water sloshes. The fish respond by inventing a new sport: competitive drifting.

        TyloFlyingHigh* = #JNSQscience_sspxFishStudy_TyloFlyingHigh_00 // Outside is a pale haze and bitter cold. The fish slow down and hover near the heater like it’s a sacred monument.
        TyloFlyingHigh* = #JNSQscience_sspxFishStudy_TyloFlyingHigh_01 // The pressure gauge barely twitches, but the tank feels “quiet.” The fish adopt stern, efficient swimming patterns and judge you for blinking.

        LindorFlyingHigh* = #JNSQscience_sspxFishStudy_LindorFlyingHigh_00 // Outside, the clouds roll by in calm, lazy bands. Inside, the fish do the same, as if trying to blend in.
        LindorFlyingHigh* = #JNSQscience_sspxFishStudy_LindorFlyingHigh_01 // The instruments insist everything is fine, then immediately change their minds. The fish remain unimpressed by the drama.
        LindorInSpaceLow* = #JNSQscience_sspxFishStudy_LindorInSpaceLow_00 // Lindor’s faint swirls drift beneath you like a slow whirlpool. The fish watch the view and forget to be fish for a while.
        LindorInSpaceLow* = #JNSQscience_sspxFishStudy_LindorInSpaceLow_01 // Someone suggests the planet might be full of chocolate. The fish start following the snack drawer with renewed interest.
        LindorInSpaceHigh* = #JNSQscience_sspxFishStudy_LindorInSpaceHigh_00 // Lindor shrinks to a serene marble. The fish settle into steady loops, as if long-distance travel is just another current.
        LindorInSpaceHigh* = #JNSQscience_sspxFishStudy_LindorInSpaceHigh_01 // The habitat feels very small out here. The fish respond by taking up as much of the tank as physically possible.

        KrelSrfLanded* = #JNSQscience_sspxFishStudy_KrelSrfLanded_00 // The pale ground looks oddly vein-like through the viewport. The fish keep circling the filter like they’re studying a specimen too.
        KrelSrfLanded* = #JNSQscience_sspxFishStudy_KrelSrfLanded_01 // Low gravity makes every water ripple linger. The fish learn to “hover” and never stop showing off.
        KrelInSpaceLow* = #JNSQscience_sspxFishStudy_KrelInSpaceLow_00 // Krel slides below like a bleached pebble, with Lindor looming nearby. The fish orient to the biggest shadow in the window.
        KrelInSpaceLow* = #JNSQscience_sspxFishStudy_KrelInSpaceLow_01 // Tiny tugs from the local gravity make the tank slosh in slow motion. The fish treat it as scheduled entertainment.
        KrelInSpaceHigh* = #JNSQscience_sspxFishStudy_KrelInSpaceHigh_00 // Krel becomes a dot and Lindor becomes the problem. The fish vote unanimously for “no more dots.”
        KrelInSpaceHigh* = #JNSQscience_sspxFishStudy_KrelInSpaceHigh_01 // You record reduced activity in prolonged darkness. The fish record reduced respect for your note-taking.

        AdenSrfLanded* = #JNSQscience_sspxFishStudy_AdenSrfLanded_00 // The surface is plain rock and long shadows. The fish stare out as if expecting the rock to start swimming back.
        AdenSrfLanded* = #JNSQscience_sspxFishStudy_AdenSrfLanded_01 // Someone mentions “different inside.” The fish immediately investigate the tank walls for secret passages.
        AdenInSpaceLow* = #JNSQscience_sspxFishStudy_AdenInSpaceLow_00 // Aden rolls beneath you like a brown marble in a giant’s hand. The fish keep swimming laps like they’re mapping the whole thing.
        AdenInSpaceLow* = #JNSQscience_sspxFishStudy_AdenInSpaceLow_01 // Lindor dominates the skybox, even from here. The fish follow its glow, then act like they meant to.
        AdenInSpaceHigh* = #JNSQscience_sspxFishStudy_AdenInSpaceHigh_00 // Aden fades into the background and the cabin feels quieter. The fish slow down and become suspiciously contemplative.
        AdenInSpaceHigh* = #JNSQscience_sspxFishStudy_AdenInSpaceHigh_01 // You attempt a rigorous behavioral assessment. The fish respond with a rigorous assessment of your face.

        HuygenSrfLanded* = #JNSQscience_sspxFishStudy_HuygenSrfLanded_00 // Amber haze turns every shadow soft and strange. The fish pick a corner and pretend they can’t see you.
        HuygenSrfLanded* = #JNSQscience_sspxFishStudy_HuygenSrfLanded_01 // The outside air looks heavy even through glass. The fish stay near the bubbler like it’s the only trustworthy atmosphere.
        HuygenSrfSplashed* = #JNSQscience_sspxFishStudy_HuygenSrfSplashed_00 // The habitat rocks gently on dark, amber water. The fish press to the glass like they’re comparing notes with the outside.
        HuygenSrfSplashed* = #JNSQscience_sspxFishStudy_HuygenSrfSplashed_01 // Every wave slaps the hull with a sticky-sounding rhythm. The fish synchronize their swimming and look pleased with themselves.
        HuygenFlyingHigh* = #JNSQscience_sspxFishStudy_HuygenFlyingHigh_00 // The haze outside never really clears; it just changes shade. The fish respond by sulking in the “deep” end of the tank.
        HuygenFlyingHigh* = #JNSQscience_sspxFishStudy_HuygenFlyingHigh_01 // The cabin creaks under steady pressure changes. The fish form a tight school and glare at the pressure gauge.
        HuygenInSpaceLow* = #JNSQscience_sspxFishStudy_HuygenInSpaceLow_00 // Huygen glows with an uneasy amber sheen below. The fish drift toward the window light like it’s a second sun.
        HuygenInSpaceLow* = #JNSQscience_sspxFishStudy_HuygenInSpaceLow_01 // You note signs of stress in the tank ecosystem. The fish note signs of stress in the tank ecosystem manager.
        HuygenInSpaceHigh* = #JNSQscience_sspxFishStudy_HuygenInSpaceHigh_00 // The amber moon shrinks and the unknown grows. The fish abandon darting and adopt slow, economical orbits.
        HuygenInSpaceHigh* = #JNSQscience_sspxFishStudy_HuygenInSpaceHigh_01 // You log “long-duration adaptation trending positive.” The fish log “long-duration patience trending negative.”

        RigaSrfLanded* = #JNSQscience_sspxFishStudy_RigaSrfLanded_00 // Parts of the landscape look almost familiar from orbit. The fish relax a little, as if “familiar” is a measurable parameter.
        RigaSrfLanded* = #JNSQscience_sspxFishStudy_RigaSrfLanded_01 // The habitat settles onto firm ground and everything stops wobbling. The fish immediately miss the wobbling.
        RigaFlyingHigh* = #JNSQscience_sspxFishStudy_RigaFlyingHigh_00 // The air outside is thin enough to be mostly idea. The fish keep close to the heater and act like that explains everything.
        RigaFlyingHigh* = #JNSQscience_sspxFishStudy_RigaFlyingHigh_01 // Bright terrain flashes by beneath the clouds. The fish chase the shifting reflections as if they’re hunting sunbeams.
        RigaInSpaceLow* = #JNSQscience_sspxFishStudy_RigaInSpaceLow_00 // Riga’s surface patterns look strangely welcoming for a distant moon. The fish stare at it like they’re being homesick on purpose.
        RigaInSpaceLow* = #JNSQscience_sspxFishStudy_RigaInSpaceLow_01 // The tank currents stabilize in low orbit. The fish immediately find a way to make them chaotic again.
        RigaInSpaceHigh* = #JNSQscience_sspxFishStudy_RigaInSpaceHigh_00 // Riga fades to a small, sturdy dot. The fish pick a slow route and stick to it with impressive discipline.
        RigaInSpaceHigh* = #JNSQscience_sspxFishStudy_RigaInSpaceHigh_01 // You measure nutrient cycling and declare it “acceptable.” The fish declare the food schedule “inadequate.”

        TalosSrfLanded* = #JNSQscience_sspxFishStudy_TalosSrfLanded_00 // The ground outside is richly colored and completely uninterested in you. The fish respond by becoming richly colored and interested in snacks.
        TalosSrfLanded* = #JNSQscience_sspxFishStudy_TalosSrfLanded_01 // The light looks different here, like it forgot how to be normal. The fish chase the strange highlights and call it research.
        TalosInSpaceLow* = #JNSQscience_sspxFishStudy_TalosInSpaceLow_00 // Talos spins below like a painted stone. The fish drift in slow circles, as if trying to match the rotation.
        TalosInSpaceLow* = #JNSQscience_sspxFishStudy_TalosInSpaceLow_01 // With nothing but void outside, every bubble in the tank seems louder. The fish flinch at each one, then act tough.
        TalosInSpaceHigh* = #JNSQscience_sspxFishStudy_TalosInSpaceHigh_00 // Talos becomes a speck and Lindor’s system becomes a memory. The fish reduce activity and conserve everything, including enthusiasm.
        TalosInSpaceHigh* = #JNSQscience_sspxFishStudy_TalosInSpaceHigh_01 // You write that isolation increases schooling behavior. The fish write that isolation increases the urge to bite the feeder tube.

        EelooSrfLanded* = #JNSQscience_sspxFishStudy_EelooSrfLanded_00 // The tank heater clicks on and off for hours. The fish gather around it like it’s a campfire with rules.
        EelooSrfLanded* = #JNSQscience_sspxFishStudy_EelooSrfLanded_01 // Everything outside is white and silent. The fish respond by inventing a new sport: competitive not-moving.
        EelooFlyingHigh* = #JNSQscience_sspxFishStudy_EelooFlyingHigh_00 // The atmosphere is barely an atmosphere, but it still finds a way to chill the cabin. The fish drift nearer the warm side and look betrayed.
        EelooFlyingHigh* = #JNSQscience_sspxFishStudy_EelooFlyingHigh_01 // Icy haze streaks past the window. The fish track it like it’s a documentary about very slow prey.
        EelooInSpaceLow* = #JNSQscience_sspxFishStudy_EelooInSpaceLow_00 // Eeloo’s bright surface slides by underneath, glare and shadows trading places. The fish chase the shifting light patches like it’s feeding time.
        EelooInSpaceLow* = #JNSQscience_sspxFishStudy_EelooInSpaceLow_01 // The habitat hum becomes the loudest thing for kilometers. The fish make slow loops and pretend they can’t hear you taking notes.
        EelooInSpaceHigh* = #JNSQscience_sspxFishStudy_EelooInSpaceHigh_00 // Eeloo shrinks to a pale bead in the dark. The fish settle into calm, efficient orbits, as if conserving enthusiasm.
        EelooInSpaceHigh* = #JNSQscience_sspxFishStudy_EelooInSpaceHigh_01 // Out here, every bubble sounds important. The fish flinch once, then act like it was a planned drill.

        CelesSrfLanded* = #JNSQscience_sspxFishStudy_CelesSrfLanded_00 // The surface looks like it signed an NDA with the sunlight. The fish stare out and then at you, as if you also signed something.
        CelesSrfLanded* = #JNSQscience_sspxFishStudy_CelesSrfLanded_01 // The tank’s reflection in the viewport is brighter than the world outside. The fish keep swimming anyway, purely out of spite.
        CelesInSpaceLow* = #JNSQscience_sspxFishStudy_CelesInSpaceLow_00 // Celes drifts below like a quiet, secretive pebble. The fish align with the station’s spin and call it “schooling.”
        CelesInSpaceLow* = #JNSQscience_sspxFishStudy_CelesInSpaceLow_01 // The only lively thing in the whole scene is the fish. You write that down and feel slightly judged.
        CelesInSpaceHigh* = #JNSQscience_sspxFishStudy_CelesInSpaceHigh_00 // From high orbit, Celes becomes a dot with too many unanswered questions. The fish respond with the only valid scientific method: staring.
        CelesInSpaceHigh* = #JNSQscience_sspxFishStudy_CelesInSpaceHigh_01 // The tank currents stabilize perfectly. The fish immediately ruin it, proving chaotic behavior is universal.

        TamSrfLanded* = #JNSQscience_sspxFishStudy_TamSrfLanded_00 // The ground outside looks sharp, cold, and unwelcoming. The fish gather in a tight cluster and pretend they are a single larger fish.
        TamSrfLanded* = #JNSQscience_sspxFishStudy_TamSrfLanded_01 // Micro-bounces from docking thumps ripple through the tank for ages. The fish surf the waves like it’s training for something terrible.
        TamInSpaceLow* = #JNSQscience_sspxFishStudy_TamInSpaceLow_00 // Tam tumbles below, refusing to pick a “down.” The fish match the rotation until they get bored and declare victory.
        TamInSpaceLow* = #JNSQscience_sspxFishStudy_TamInSpaceLow_01 // Low gravity turns every fin flick into a long glide. The fish learn this instantly and never stop showing off.
        TamInSpaceHigh* = #JNSQscience_sspxFishStudy_TamInSpaceHigh_00 // Tam fades into a speck and the cabin feels smaller. The fish increase their “personal space” by claiming the entire tank.
        TamInSpaceHigh* = #JNSQscience_sspxFishStudy_TamInSpaceHigh_01 // You log “reduced activity in deep space.” The fish log “reduced patience with the observer.”

        HamekSrfLanded* = #JNSQscience_sspxFishStudy_HamekSrfLanded_00 // The surface color makes the tank water look normal by comparison. The fish stare out like the planet is doing this on purpose.
        HamekSrfLanded* = #JNSQscience_sspxFishStudy_HamekSrfLanded_01 // Dust and shadows play tricks on the lighting. The fish chase phantom highlights, then act embarrassed when you notice.
        HamekInSpaceLow* = #JNSQscience_sspxFishStudy_HamekInSpaceLow_00 // Hamek’s strange hues roll by beneath you like spilled paint. The fish track the view and forget to be dramatic for a full minute.
        HamekInSpaceLow* = #JNSQscience_sspxFishStudy_HamekInSpaceLow_01 // The habitat’s little vibrations set up gentle standing waves in the tank. The fish treat it as a free moving sidewalk.
        HamekInSpaceHigh* = #JNSQscience_sspxFishStudy_HamekInSpaceHigh_00 // From high above, Hamek becomes a red fleck in an ocean of black. The fish slow down and look thoughtfully annoyed.
        HamekInSpaceHigh* = #JNSQscience_sspxFishStudy_HamekInSpaceHigh_01 // The tank lights click to “night mode.” The fish immediately switch to “mysterious mode” and refuse to explain themselves.

        NaraSrfLanded* = #JNSQscience_sspxFishStudy_NaraSrfLanded_00 // Outside, Nara’s cold haze presses in on the habitat. Inside, the fish stick to the warmest corner like it’s a national park.
        NaraSrfLanded* = #JNSQscience_sspxFishStudy_NaraSrfLanded_01 // The hull creaks faintly under the thick air. The fish respond by forming a tight school and staring at the bubbler with suspicion.
        NaraFlyingHigh* = #JNSQscience_sspxFishStudy_NaraFlyingHigh_00 // The clouds below look endless and heavy. The fish swim slow, as if the whole tank is “high pressure” too.
        NaraFlyingHigh* = #JNSQscience_sspxFishStudy_NaraFlyingHigh_01 // Instruments complain about density and drag. The fish ignore the readouts and judge your piloting instead.
        NaraInSpaceLow* = #JNSQscience_sspxFishStudy_NaraInSpaceLow_00 // Nara’s dim bands slide beneath you like a stormy marble. The fish track the moving shadows and forget to be dramatic for a minute.
        NaraInSpaceLow* = #JNSQscience_sspxFishStudy_NaraInSpaceLow_01 // The tank currents line up with the station’s attitude control. The fish immediately swim against them to prove a point.
        NaraInSpaceHigh* = #JNSQscience_sspxFishStudy_NaraInSpaceHigh_00 // From up here, Nara is small and unsettlingly calm. The fish reduce activity and adopt slow, efficient loops.
        NaraInSpaceHigh* = #JNSQscience_sspxFishStudy_NaraInSpaceHigh_01 // The cabin feels far from everything. The fish respond by taking up the entire tank, just to make a statement.

        AmosSrfLanded* = #JNSQscience_sspxFishStudy_AmosSrfLanded_00 // Amos sits silent and dark outside the window. The fish keep circling the filter like they’re trying to find “down.”
        AmosSrfLanded* = #JNSQscience_sspxFishStudy_AmosSrfLanded_01 // Low gravity turns every fin flick into a long glide. The fish discover this instantly and never stop showing off.
        AmosInSpaceLow* = #JNSQscience_sspxFishStudy_AmosInSpaceLow_00 // Amos tumbles below, refusing to pick an orientation. The fish match the rotation until they get bored and declare victory.
        AmosInSpaceLow* = #JNSQscience_sspxFishStudy_AmosInSpaceLow_01 // Tiny attitude corrections ripple through the tank for ages. The fish surf the lingering waves like it’s training.
        AmosInSpaceHigh* = #JNSQscience_sspxFishStudy_AmosInSpaceHigh_00 // Amos becomes a speck next to the larger darkness beyond. The fish slow down and stick close together without admitting why.
        AmosInSpaceHigh* = #JNSQscience_sspxFishStudy_AmosInSpaceHigh_01 // You log “increased schooling behavior with isolation.” The fish log “increased need for snacks with isolation.”

        EnonSrfLanded* = #JNSQscience_sspxFishStudy_EnonSrfLanded_00 // The landscape looks like it’s made of cold excuses. The fish cluster around the heater and glare at you for bringing them here.
        EnonSrfLanded* = #JNSQscience_sspxFishStudy_EnonSrfLanded_01 // Everything outside is pale and still. The fish respond by becoming pale and still, but only until feeding time.
        EnonInSpaceLow* = #JNSQscience_sspxFishStudy_EnonInSpaceLow_00 // Enon slides beneath the habitat like a quiet, bright coin. The fish chase the shifting window-light as if it’s food.
        EnonInSpaceLow* = #JNSQscience_sspxFishStudy_EnonInSpaceLow_01 // The station’s hum is louder than the world below. The fish do slow laps and pretend they don’t hear your observations.
        EnonInSpaceHigh* = #JNSQscience_sspxFishStudy_EnonInSpaceHigh_00 // Enon shrinks into the black and the tank feels like the whole universe. The fish swim careful, economical circles.
        EnonInSpaceHigh* = #JNSQscience_sspxFishStudy_EnonInSpaceHigh_01 // The lights click to “night mode.” The fish instantly switch to “mysterious mode” and refuse to explain themselves.

        PraxSrfLanded* = #JNSQscience_sspxFishStudy_PraxSrfLanded_00 // Prax looks like it’s always on the edge of being discovered. The fish investigate every seam of the tank like it’s a frontier too.
        PraxSrfLanded* = #JNSQscience_sspxFishStudy_PraxSrfLanded_01 // Weak gravity makes the water behave strangely. The fish treat every floating ripple like a personal invitation.
        PraxInSpaceLow* = #JNSQscience_sspxFishStudy_PraxInSpaceLow_00 // Prax spins below like a stubborn pebble. The fish hold formation until someone bumps the tank, then it’s chaos science.
        PraxInSpaceLow* = #JNSQscience_sspxFishStudy_PraxInSpaceLow_01 // The view outside has no comforting “up.” The fish demonstrate perfect three-dimensional smugness.
        PraxInSpaceHigh* = #JNSQscience_sspxFishStudy_PraxInSpaceHigh_00 // Prax fades to a dot and the cabin feels smaller. The fish claim more “personal space” by occupying all available space.
        PraxInSpaceHigh* = #JNSQscience_sspxFishStudy_PraxInSpaceHigh_01 // You write “long-duration adaptation appears stable.” The fish write “long-duration observer appears questionable.”
    }
}