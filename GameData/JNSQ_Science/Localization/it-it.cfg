        #JNSQscience_seismicScan_MohoSrfLanded_00 = Il sismometro registra un debole ticchettio ripetitivo che fluttua lentamente in frequenza: la corrispondenza migliore è uno scorrimento episodico lungo la faglia, mentre Moho continua a raffreddarsi e contrarsi.
