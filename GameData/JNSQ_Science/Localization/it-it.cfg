        #JNSQscience_bd_hydrometer_KerbinSrfLandedLaunchPad_00 = Le letture schizzano ogni volta che la rampa sfiata qualcosa. La squadra della rampa suggerisce di smettere di sventolare il sensore vicino alle parti rumorose.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedMissionControl_00 = Il tuo idrometro viene confiscato per "segretezza operativa dell'umidità". Ti viene restituito con un nuovo adesivo e senza dati.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&D_00 = Lo strumento rileva vapore acqueo, refrigerante e qualcosa etichettato "NON FARE". Gli scienziati annuiscono e chiudono la porta con educazione.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DCentralBuilding_00 = L'aria è regolata con tanta cura da sembrare pre approvata. Il tuo rapporto viene inoltrato a tre comitati per ulteriore asciugatura.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DCornerLab_00 = L'umidità cambia ogni volta che qualcuno dice "solo un test veloce". L'idrometro inizia a emettere bip per autodifesa.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DMainBuilding_00 = I livelli di umidità correlano fortemente con il consumo di caffè e gli appunti frenetici. Nessuno ammette che sia una variabile controllata.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DObservatory_00 = Sul sensore si forma un sottile strato di rugiada. L'operatore del telescopio ti ricorda che questo non è, tecnicamente, una stazione meteo.
