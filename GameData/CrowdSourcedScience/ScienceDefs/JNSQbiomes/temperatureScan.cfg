@EXPERIMENT_DEFINITION:HAS[#id[temperatureScan]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedPolarIceCraters* = #CSS_temperatureScan_MohoSrfLandedNorthernSinkhole_00 // The thermal gradient data forms a very pretty chart.
        MohoSrfLandedLowlands* = #CSS_temperatureScan_MohoSrfLandedCentralLowlands_00 // Temperature in the shadow seems to be quite low.
        MohoSrfLandedCraters* = #CSS_temperatureScan_MohoSrfLandedMinorCraters_00 // The experiment is a success! The team predicted there would be numbers in the data!
        
        EveSrfLandedPetrolLakes* = #CSS_temperatureScan_EveSrfLandedCraterLake_00 // You consider dunking the thermometer in the lake to cool it off.
        EveSrfLandedMountains* = #CSS_temperatureScan_EveSrfLandedOlympus_00 // You're not sure whether you want to go any higher, lest you be burned by the sun as well as everything else.
        EveSrfLandedMountains* = #CSS_temperatureScan_EveSrfLandedOlympus_01 // The temperature isn't as ludicrous all the way up here, but you're still not going outside without some ice packs.
        EveSrfLandedShores* = #CSS_temperatureScan_EveSrfLandedShallows_00 // Sun, sea and sand are all here, and the temperature is lovely and warm to boot.
        EveSrfSplashedPetrolLakes* = #CSS_temperatureScan_EveSrfSplashedCraterLake_00 // The data suggests a suitable temperature for frying kalamari.
        EveSrfSplashedPolarLakes* = #CSS_temperatureScan_EveSrfSplashedCraterLake_01 // Despite the lack of not-water interchange, the temperature in this basin sea is the same as the rest.
        EveSrfSplashedShores* = #CSS_temperatureScan_EveSrfSplashedShallows_00 // The labels on the thermometer have dissolved, but the reading is all the way at the top anyway.
        EveSrfSplashedShores* = #CSS_temperatureScan_EveSrfSplashedShallows_01 // Quite how this ocean doesn't boil is lost on you, since it's well above the boiling point of.....what was the ocean made of again?
        EveFlyingLowPetrolLakes* = #CSS_temperatureScan_EveFlyingLowCraterLake_00 // If these aerial readings are anything to go by, dipping your toe in the sea would leave it charcoaled as well as dissolved and crushed.
        EveFlyingLowMountains* = #CSS_temperatureScan_EveFlyingLowOlympus_00 // You hope whatever part is stopping you from slamming into the mountainside doesn't melt in these temperatures.
        EveFlyingLowShores* = #CSS_temperatureScan_EveFlyingLowShallows_00 // I tell you what is shallow, and that's the atmosphere temperature gradient.
        
        KerbinSrfLandedMidlands* = #CSS_temperatureScan_KerbinSrfLandedGrasslands_00 // The temperature here is quite pleasant. This would be a nice place to live.
        KerbinSrfLandedMidlands* = #CSS_temperatureScan_KerbinSrfLandedGrasslands_01 // You don't need any fancy measurements to tell you that it's nice outside.
        KerbinSrfLandedMidlands* = #CSS_temperatureScan_KerbinSrfLandedGrasslands_02 // The temperature here is 'normal'. Guess the calibration worked.
        KerbinSrfLandedAridMidlands* = #CSS_temperatureScan_KerbinSrfLandedDeserts_00 // It's hot here. That's not a reading, you learned it in primary school.
        KerbinSrfLandedAridMidlands* = #CSS_temperatureScan_KerbinSrfLandedDeserts_01 // Large plumes of heat are rising from the surface of the desert.
        KerbinSrfLandedAridMidlands* = #CSS_temperatureScan_KerbinSrfLandedDeserts_02 // The temperature here is very hot.
        KerbinSrfLandedAridMidlands* = #CSS_temperatureScan_KerbinSrfLandedDeserts_03 // The temperature is too hot to live here.
        KerbinSrfLandedAridMidlands* = #CSS_temperatureScan_KerbinSrfLandedDeserts_04 // The thermometer quickly rises beyond the scale limit. You put it back into the shadows before it bursts.
        KerbinSrfLandedAridHighlands* = #CSS_temperatureScan_KerbinSrfLandedBadlands_00 // The temperature here appears to fluctuate depending on the time of day.
        KerbinSrfLandedAridHighlands* = #CSS_temperatureScan_KerbinSrfLandedBadlands_01 // The temperature is bad, and it's getting worse every minute.
        KerbinSrfLandedAridHighlands* = #CSS_temperatureScan_KerbinSrfLandedBadlands_02 // Man the EVA is gonna suck.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedNorthernIceShelf_00 // It's cold enough to freeze even salty sea water completely solid.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedNorthernIceShelf_01 // A rise in temperature would be very alarming, considering you are standing on something eminently meltable.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedSouthernIceShelf_00 // A note at the back of the equipment manual states "Warranty void if exposed to temperatures below 0C". You're pretty sure it's colder than that.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedSouthernIceShelf_01 // A thick layer of rime ice has formed on the thermometer, telling you all you need to know.
        KerbinSrfSplashed* = #CSS_temperatureScan_KerbinSrfSplashedWater_00 // The engineers hadn't planned on water, so the numbers have all washed off the thermometer, making it unreadable.
        KerbinSrfSplashed* = #CSS_temperatureScan_KerbinSrfSplashedWater_01 // The water is colder than the surrounding air.
        KerbinSrfSplashed* = #CSS_temperatureScan_KerbinSrfSplashedWater_02 // You have to stick your head underwater in order to see what the thermometer says.
        KerbinSrfSplashedMidlands* = #CSS_temperatureScan_KerbinSrfSplashedGrasslands_00 // The water cools down the temperature a bit, and it's a bit cooler than would be comfortable.
        KerbinSrfSplashedAridMidlands* = #CSS_temperatureScan_KerbinSrfSplashedDeserts_00 // The water is invitingly warm. This place would make a great inland beach resort.
        KerbinSrfSplashedAridHighlands* = #CSS_temperatureScan_KerbinSrfSplashedBadlands_00 // It's hot enough you could reheat some snacks by dunking them in the water.
        KerbinSrfSplashedIceCaps* = #CSS_temperatureScan_KerbinSrfSplashedNorthernIceShelf_00 // The water is cold as ice. In fact, it is largely ice.
        KerbinSrfSplashedIceCaps* = #CSS_temperatureScan_KerbinSrfSplashedSouthernIceShelf_00 // Any creatures living in this frigid water would need some serious adaptations to not freeze to death.
        KerbinFlyingLowMidlands* = #CSS_temperatureScan_KerbinFlyingLowGrasslands_00 // The temperature seems cool and comfortable. It is probably due to the acres of green grass that stretch to the horizon.
        KerbinFlyingLowMidlands* = #CSS_temperatureScan_KerbinFlyingLowGrasslands_01 // As you perform temperature scans over the Grasslands, you take care not hit any trees.
        KerbinFlyingLowAridMidlands* = #CSS_temperatureScan_KerbinFlyingLowDeserts_00 // Even here above the surface it is hot. The thermometer reads 270 degrees. You wonder if that is in Celsius, Fahrenheit, or Kelvin. Oh well, the scientist back at KSC will figure it out.
        KerbinFlyingLowAridMidlands* = #CSS_temperatureScan_KerbinFlyingLowDeserts_01 // Your temperature readings over the desert surprise exactly nobody back at KSC.
        KerbinFlyingLowAridHighlands* = #CSS_temperatureScan_KerbinFlyingLowBadlands_00 // It is HOT! You don't know whether it's the normal ambient temperature here or whether the spacecraft is burning up. Either way, we should have installed air conditioning.
        KerbinFlyingLowAridHighlands* = #CSS_temperatureScan_KerbinFlyingLowBadlands_01 // You pour the remains of your juice pack over the engines in a frantic attempt to keep them from overheating.
        KerbinFlyingLowIceCaps* = #CSS_temperatureScan_KerbinFlyingLowNorthernIceShelf_00 // The temperature is extremely low. It has to be, to maintain such a colossal mass of ice like that below.
        KerbinFlyingLowIceCaps* = #CSS_temperatureScan_KerbinFlyingLowNorthernIceShelf_01 // Wind chill from the strong winds that howl across the flats drops the temperature even lower.
        KerbinFlyingLowIceCaps* = #CSS_temperatureScan_KerbinFlyingLowSouthernIceShelf_00 // The atmospheric drag causes a measurable, welcome increase in temperature.
        KerbinFlyingLowIceCaps* = #CSS_temperatureScan_KerbinFlyingLowSouthernIceShelf_01 // It's many degrees below zero. No wonder this place was so hazardous to early explorers.
        
        MunSrfLandedNotableCraters* = #CSS_temperatureScan_MunSrfLandedEastCrater_00 // The temperature fluctuates wildly with the rotation of the moon, as the crater moves from day to night.
        MunSrfLandedNotableCraters* = #CSS_temperatureScan_MunSrfLandedTwinCraters_00 // You aren't sure which crater to take the temperature in, so you pick one at random. After all they're twins, so the readings should be the same, right?
        MunSrfLandedRareCraters* = #CSS_temperatureScan_MunSrfLandedNorthwestCrater_00 // The inclined angle of the solar radiation at this latitude has a marked effect on the temperature, which you make note of in your report.
        MunSrfLandedRareCraters* = #CSS_temperatureScan_MunSrfLandedSouthwestCrater_00 // The temperature here is rather boring. That's right, I said it. Boring. B-O-R-I-N-G!
        MunSrfLandedExoticCraters* = #CSS_temperatureScan_MunSrfLandedFarsideCrater_00 // Between the dusty atmosphere and the reduced light in the crater it is difficult to read the thermometer.
        MunSrfLandedExoticCraters* = #CSS_temperatureScan_MunSrfLandedEastFarsideCrater_00 // It's chilly. You want to take a walk around the canyon rim to warm up.
        MunSrfLandedPolarIceCraters* = #CSS_temperatureScan_MunSrfLandedPolarCrater_00 // It's pretty cold here. You'd almost think Kerbol hadn't shined in this crater since it was formed!
        MunSrfLandedLowlands* = #CSS_temperatureScan_MunSrfLandedPolarLowlands_00 // Seems like a great snack-time temperature. Let's make it happen!
        MunSrfLandedVoronoiCraters* = #CSS_temperatureScan_MunSrfLandedHighlandCraters_00 // The long shadows cast by the crater rims make this region colder than the surrounding highlands.
        MunSrfLandedVoronoiCraters* = #CSS_temperatureScan_MunSrfLandedMidlandCraters_00 // You're unsure about the surrounding area, but your temperature is definitely elevated after that landing. Wooohooo!
        
        MinmusSrfLandedBasins* = #CSS_temperatureScan_MinmusSrfLandedFlats_00 // The thermometer suddenly reads NaN. One of the wires must have come loose again.
        MinmusSrfLandedBasins* = #CSS_temperatureScan_MinmusSrfLandedGreatFlats_00 // The ground seems to reflect most of the Sun's thermal energy, yet the ground temperature is much higher than it should be. This warrants further investigation.
        MinmusSrfLandedBasins* = #CSS_temperatureScan_MinmusSrfLandedGreaterFlats_00 // The temperature reading suggests that this area might be made of ice cream. Acquiring a surface sample is highly recommended.
        MinmusSrfLandedBasins* = #CSS_temperatureScan_MinmusSrfLandedLesserFlats_00 // The temperature is just cold enough for a good ice cream cone.
        
        DunaSrfLandedIceCaps* = #CSS_temperatureScan_DunaSrfLandedPoles_00 // The air is cold. The atmosphere must not support a strong greenhouse effect.
        DunaSrfLandedMidlands* = #CSS_temperatureScan_DunaSrfLandedMidlandSea_00 // You thought of desert worlds as hot, not places to freeze your everything off.
        DunaSrfLandedMidlands* = #CSS_temperatureScan_DunaSrfLandedMidlandSea_01 // Another cold day on Duna. Holidaying on the shores of the Great Western Desert seems very far away now.
        DunaSrfLandedNotablePlains* = #CSS_temperatureScan_DunaSrfLandedNorthernBasin_00 // Coldness is taken as a given on Duna, and this place is no exception. It's freezing.
        DunaSrfLandedNotablePlains* = #CSS_temperatureScan_DunaSrfLandedSouthernBasin_00 // The slushy ice-dust mixture found here cakes to the thermometer, insulating it from the wind.
        DunaSrfLandedNotableMountains* = #CSS_temperatureScan_DunaSrfLandedNorthernShelf_00 // It's Duna, it's cold and it's even colder with the wind chill. What a surprise...and now the thermometer's blown away.
        DunaSrfLandedNotableMountains* = #CSS_temperatureScan_DunaSrfLandedNorthernShelf_01 // These winds blow straight off the polar ice cap, bringing with them a savagely biting icy chill.
        DunaSrfLandedNotableMountains* = #CSS_temperatureScan_DunaSrfLandedPolarHighlands_00 // Temperatures range between bitterly cold and cold enough to freeze the very air solid.
        DunaSrfLandedTrenches* = #CSS_temperatureScan_DunaSrfLandedMidlandCanyon_00 // A gentle breeze starts up, and even that is enough to drop the temperature and remind you of how cold it is.
        DunaSrfLandedTrenches* = #CSS_temperatureScan_DunaSrfLandedEasternCanyon_00 // The sun breaks through the thick haze, warming the thermometer enough for it to defrost and the gauge to become clearly visible again.
        DunaSrfLandedTrenches* = #CSS_temperatureScan_DunaSrfLandedEasternCanyon_01 // The cold sink nature of the canyon makes this place even more bitingly cold at nights.
        DunaSrfLandedTrenches* = #CSS_temperatureScan_DunaSrfLandedWesternCanyon_00 // This canyon doesn't seem as cold as one would expect given its cold sink status.
        DunaSrfLandedTrenches* = #CSS_temperatureScan_DunaSrfLandedWesternCanyon_01 // It's warmer than expected in here. Either it's radiation off the walls or lack of much wind chill.
        DunaFlyingLowIceCaps* = #CSS_temperatureScan_DunaFlyingLowPoles_00 // You wish you could drink a cup of hot chocolate, but you can't take your helmet off. The thermometer seems to be frozen solid.
        DunaFlyingLowMidlands* = #CSS_temperatureScan_DunaFlyingLowMidlandSea_00 // Temperatures drop when the wind picks up. Drop more, that is.
        DunaFlyingLowMidlands* = #CSS_temperatureScan_DunaFlyingLowMidlandSea_01 // A dust haze drifts in front of Kerbol, and it gets just that little bit colder.
        DunaFlyingLowNotablePlains* = #CSS_temperatureScan_DunaFlyingLowNorthernBasin_00 // Temperatures decrease noticeably near the basin floor, indicating the presence of a layer of cold air.
        DunaFlyingLowNotablePlains* = #CSS_temperatureScan_DunaFlyingLowSouthernBasin_00 // Well done, Kerlock. You figured out that Duna is cold. Woot!
        DunaFlyingLowNotableMountains* = #CSS_temperatureScan_DunaFlyingLowNorthernShelf_00 // That little bit of altitude doesn't protect you from the icy canyon wind.
        DunaFlyingLowNotableMountains* = #CSS_temperatureScan_DunaFlyingLowPolarHighlands_00 // A gust of even colder air buffets the craft. The temperature drops by another few degrees.
        DunaFlyingLowTrenches* = #CSS_temperatureScan_DunaFlyingLowMidlandCanyon_00 // The thermometer has a bubble in it, so you gently tap it and end up making even more bubbles.
        DunaFlyingLowTrenches* = #CSS_temperatureScan_DunaFlyingLowEasternCanyon_00 // Above the dust, you can finally see the effect sunlight has on the temperature, as though the craft is basking in the feeble warmth.
        DunaFlyingLowTrenches* = #CSS_temperatureScan_DunaFlyingLowEasternCanyon_01 // The sinking cold air is below you up here, and mixes with slightly warmer air from other zones.
        DunaFlyingLowTrenches* = #CSS_temperatureScan_DunaFlyingLowWesternCanyon_00 // The thicker air here wicks away heat from the thermometer more effectively than elsewhere.
        DunaFlyingLowTrenches* = #CSS_temperatureScan_DunaFlyingLowWesternCanyon_01 // The canyon walls are channelling warmer air from the Midland Sea to the south, but at a relatively slow wind speed.
        
        IkeSrfLandedPoles* = #CSS_temperatureScan_IkeSrfLandedPolarLowlands_00 // Sunlight here is limited, so it's cold enough to freeze water even in a vacuum.
        IkeSrfLandedPoles* = #CSS_temperatureScan_IkeSrfLandedPolarLowlands_01 // Kerbol rarely reaches above the precipices and crags surrounding the depression, making it perpetually cold.
        IkeSrfLandedPoles* = #CSS_temperatureScan_IkeSrfLandedSouthPole_00 // The sun's just as warm as it can be at Duna distance, but the ground is freezing cold.
        IkeSrfLandedPoles* = #CSS_temperatureScan_IkeSrfLandedSouthPole_01 // The reading makes you realise you're cold. You decide to go and have some hot koffee.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedEasternMountainRidge_00 // Temperatures range from below freezing during the day to halfway to absolute zero at nights.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedEasternMountainRidge_01 // Being high up doesn't seem to affect the temperature much in the absence of an atmosphere.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedWesternMountainRidge_00 // The high albedo of the light grey dust reflects a lot of heat off the surface.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedWesternMountainRidge_01 // It's about as cold as you expect it to be at Duna's distance, and altitude (unsurprisingly) doesn't affect it at all.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedSouthEasternMountainRange_00 // Where's the thermometer? It's got enough dust on to blend into the grey rock.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedSouthEasternMountainRange_01 // The higher albedo of the lighter highlands makes the rocks, and you, colder.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedCentralMountainRange_00 // The weak thermal back radiation from Duna brings noticeable warmth during nights.
        IkeSrfLandedMountains* = #CSS_temperatureScan_IkeSrfLandedCentralMountainRange_01 // The temperature plunges whenever Duna eclipses the sun. Bad Duna!
        
        DresSrfLandedCanyon* = #CSS_temperatureScan_DresSrfLandedCanyons_00 // The temperature readings are as dull and unremarkable as Dres itself.

        LaytheSrfLandedIceCaps* = #CSS_temperatureScan_LaytheSrfLandedPoles_00 // Kerbol looks smaller than you remember, it is not sending much heat to the surface. Why does the water stay liquid?
        LaytheSrfLandedShores* = #CSS_temperatureScan_LaytheSrfLandedDunes_00 // Kerbol is small in the sky, but the sand is much warmer than the air. You could almost take your boots off!
        LaytheSrfSplashed* = #CSS_temperatureScan_LaytheSrfSplashedCrescentBay_00 // Temperatures are similar to those of Kerbin's polar regions. The water hasn't frozen, though, most probably due to the high salinity.
        LaytheSrfSplashed* = #CSS_temperatureScan_LaytheSrfSplashedTheSagenSea_00 // You wonder why the water isn't frozen.
        LaytheSrfSplashed* = #CSS_temperatureScan_LaytheSrfSplashedTheSagenSea_01 // The temperature is similar to being in a freezer.
        LaytheFlyingLowIceCaps* = #CSS_temperatureScan_LaytheFlyingLowPoles_00 // Your temperature scan shows that it is too cold to pop a window open.
        
        BopSrfLandedMountains* = #CSS_temperatureScan_BopSrfLandedPeaks_00 // The thermometer reads 66.6 degrees Celsius. That... that can't be right.
        
        EelooSrfLandedCanyon* = #CSS_temperatureScan_EelooSrfLandedIceCanyons_00 // Even the more pleasant parts of this planet are inhospitable.
        EelooSrfLandedCanyon* = #CSS_temperatureScan_EelooSrfLandedIceCanyons_01 // Why did we go here? It's too cold for anything.
    }
}