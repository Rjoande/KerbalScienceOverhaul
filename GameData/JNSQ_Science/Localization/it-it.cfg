        #JNSQscience_bd_multiSpec_HamekInSpaceLowMidlands_00 = Le Midlands mostrano ampi gradienti ripetuti che emergono solo quando i canali sono combinati. È come se il pianeta stesse nascondendo una seconda mappa sotto la prima.
