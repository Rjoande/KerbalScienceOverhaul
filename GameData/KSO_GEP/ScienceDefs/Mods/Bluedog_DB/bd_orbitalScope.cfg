@EXPERIMENT_DEFINITION:HAS[#id[bd_orbitalScope]]
{
    %RESULTS
    {
        GrannusInSpaceHigh* = #GEPscience_bd_orbitalScope_GrannusInSpaceHigh_00 // From this high up, Grannus looks less like a “body” and more like an argument between your lens filters. The mosaic team files it under “mostly red, definitely loud.”
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthPolarZone_00 // The polar glow resolves into tight, restless patterns that refuse to sit still between frames. Stitching software suggests “try again when physics calms down.”
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthSubpolarZone_00 // Sequential shots catch faint, curling bands that look like someone smeared jam across the sensor. You clean the lens. The jam stays.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthTemperateZone_00 // Granular textures crawl across the view as if the “surface” is thinking about becoming someplace else. Your map grid politely pretends this is normal.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthTropicZone_00 // A darker patch drifts through the frame and the exposure meter panics. You label it “interesting” and do not zoom any closer.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowEquatorialZone_00 // The equatorial region blazes in layered reds and oranges, with ripples that make every overlap seam obvious. Congratulations: you mapped a wiggle.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthTropicZone_00 // The camera catches brief bright freckles that come and go between passes. Mission Control calls them “features.” You call them “reasons to keep distance.”
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthTemperateZone_00 // The mosaics show subtle banding that doesn’t match any neat latitude line. The cartographers sigh, then ask for more data anyway.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthSubpolarZone_00 // A pale halo near the limb makes the edges of every frame glow. Your best correction is “crop aggressively.”
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthPolarZone_00 // The southern polar zone looks calmer for exactly one picture. The next frame disagrees, and the report gains several extra warning labels.

        TaranisInSpaceHigh* = #GEPscience_bd_orbitalScope_TaranisInSpaceHigh_00 // From high orbit, Taranis is a stark half-and-half: one side incandescent, the other swallowed by darkness. The downlink delay means the map team sees it long after you’ve finished flinching.
        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowMagmaSea_00 // The Magma Sea saturates the camera so thoroughly that “red” stops being a color and becomes a lifestyle. The mosaic is filed with a recommended viewing distance of “far.”
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowMagmaShores_00 // Along the shores, glowing margins crawl like hot ink between frames. Your stitching points keep melting into new ones.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowScorchedLowlands_00 // The sunbaked lowlands glare back at the optics like polished metal. You bracket exposures and still get “bright” in three different ways.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowMidlands_00 // The midlands show crisp textures where the light isn’t trying to cook the sensor. For a moment, mapping feels almost routine—until the comms queue reminds you how far away “routine” is.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowHighlands_00 // Long shadows carve the highlands into sharp ridges and deeper blacks than your printer can handle. The map team requests “less dramatic terrain,” and you laugh at the idea.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowDarkSideMidlands_00 // The dark side midlands are barely there, a cold outline under starlight and instrument noise. You send it anyway; the emptiness is part of the data.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowDarkSideHighlands_00 // A few faint highlights betray jagged peaks in the darkness. The mosaic looks like someone tried to photograph a mountain using only patience.
        TaranisInSpaceLowPoles* = #GEPscience_bd_orbitalScope_TaranisInSpaceLowPoles_00 // The poles sit in uneasy light, neither fully scorched nor fully hidden. Your sequential frames show subtle brightness swings that make the terminator feel alive.

        ToutatisInSpaceHigh* = #GEPscience_bd_orbitalScope_ToutatisInSpaceHigh_00 // High above Toutatis, the baked hemisphere and the frozen one make a crisp boundary that doesn’t care about your schedule. You finish the photo run, then wait for the slow trickle of images to reach home.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowSunnyLowlands_00 // The sunny lowlands are bright enough to wash out fine detail unless you underexpose like you mean it. The resulting mosaic looks “perfectly safe” and “definitely hot.”
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowSunnyHighlands_00 // The highlands throw hard-edged shadows that drift just enough between frames to taunt the stitcher. You mark the seams as “scientific.”
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowTransitionalLowlands_00 // In the transition zone, faint haze softens contrasts and makes the surface look quietly uncertain. Your map notes read: “Possible comfort band. Still not comfortable.”
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowTransitionalHighlands_00 // The transitional highlands show layered ridges and muted tones under the dim red light. The camera finally stops complaining and starts doing its job.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideLowlands_00 // The dark side lowlands are a low-contrast study in “almost nothing.” You enhance the images until the noise forms a convincing continent, then dial it back.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideHighlands_00 // Peaks on the night side catch occasional glints that appear and vanish from pass to pass. You decide they’re real and not the universe winking at you.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowSoutheasternMountains_00 // The mountains punch through the thin haze with sharp profiles near the day-night boundary. The mosaic makes them look like they’re guarding the only reasonable place on the planet.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowWesternMountains_00 // Broad ridgelines roll by in long, slow sequences, giving plenty of overlap for stitching. Plenty of overlap, and plenty of time to feel very far from anywhere familiar.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideMountains_00 // The dark side mountains are silhouettes against star-lit nothing, with just enough definition to be ominous. Mission Control asks for a clearer map; you ask for a brighter universe.

        NodensInSpaceHigh* = #GEPscience_bd_orbitalScope_NodensInSpaceHigh_00 // From high orbit, Nodens is a dim jewel under the red sun—too familiar in shape, too unfamiliar in tone. The map team queues the data behind three relay hops and a lot of sighing.
        NodensInSpaceHigh* = #GEPscience_bd_orbitalScope_NodensInSpaceHigh_01 // The planet-wide mosaic preview loads slowly, line by line, like Nodens is being revealed on purpose. Someone notes “habitable-looking” and immediately adds “probably not for us.”
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_orbitalScope_NodensInSpaceLowSaltySeas_00 // The salty seas reflect a dull copper sky, broken by long, wind-streaked patterns. The stitching software flags “moving texture,” which is a polite way of saying “waves.”
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_orbitalScope_NodensInSpaceLowSaltySeas_01 // Sequential frames show broad currents curling like ink across the water. You schedule another pass and hope the comms delay doesn’t outlast the weather.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_orbitalScope_NodensInSpaceLowFreshWater_00 // Freshwater basins appear darker and calmer than the open seas, with shorelines that don’t quite match last orbit’s images. Either the water moves, or the planet is messing with your landmarks.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_orbitalScope_NodensInSpaceLowFreshWater_01 // The camera catches thin haze over the lakes that smears the contrast just enough to be annoying. You file it under “atmosphere present, patience required.”
        NodensInSpaceLowShores* = #GEPscience_bd_orbitalScope_NodensInSpaceLowShores_00 // The shores are a jagged boundary of foam-bright and soil-dark, constantly rearranged between passes. The mosaic is going to need fewer dreams and more control points.
        NodensInSpaceLowShores* = #GEPscience_bd_orbitalScope_NodensInSpaceLowShores_01 // Sandbars and deltas show up as pale freckles that drift with every orbit. Cartography requests “one stable coastline,” and Nodens declines.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalLowlands_00 // The tropical lowlands are a patchwork of muted greens and browns under red sunlight, like a postcard printed with the wrong ink. You correct the color balance and it still looks alien.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalLowlands_01 // Long cloud shadows slide across the lowlands between frames, drawing temporary continents. Mission Control calls it “dynamic lighting”; you call it “ruined overlap.”
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateLowlands_00 // Temperate lowlands show broad plains cut by faint channels that only appear at certain sun angles. You plan a second pass because Nodens refuses to hold still for your map.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateLowlands_01 // The terrain looks comfortable right up until the haze makes the horizon vanish into red. The camera labels it “normal scattering”; your gut labels it “far from home.”
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalMidlands_00 // The tropical midlands resolve into rolling ridges and basins with sharper relief than expected. The mosaic preview looks like a place you could walk—until you remember the signal delay to ask permission.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalMidlands_01 // Subtle tonal banding suggests different surface materials, or different kinds of regret. You increase exposure time and promise the lens you’ll stop pointing it at the sun.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateMidlands_00 // Temperate midlands provide clean, high-contrast frames when the clouds cooperate. For several glorious minutes, mapping feels almost like home—only redder and quieter.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateMidlands_01 // Repeated passes show faint fog pooling in low spots, changing the scene just enough to break automated stitching. The computer demands “ground truth”; you are currently in space.
        NodensInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowHighlands_00 // The highlands throw long, razor-edged shadows that make every ridge look taller than it should be. You label the file “Do Not Land Here (Probably).”
        NodensInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_NodensInSpaceLowHighlands_01 // Bright rock outcrops punctuate the darker slopes like warning lights. The camera’s stabilization works overtime while the planet calmly pretends it isn’t intimidating.
        NodensInSpaceLowTundra* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTundra_00 // The tundra sits under a thin, milky veil that softens everything into gray-red gradients. The mosaic resembles a bruise with topography.
        NodensInSpaceLowTundra* = #GEPscience_bd_orbitalScope_NodensInSpaceLowTundra_01 // Frost-dusted patches appear and vanish from orbit to orbit, as if the ground is breathing. You check the timestamp twice; the planet is simply fast at being strange.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_orbitalScope_NodensInSpaceLowIceCaps_00 // The ice caps are bright enough to challenge the sensor even through the haze, with fracture lines like spiderwebs across the poles. The stitching software suggests sunglasses.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_orbitalScope_NodensInSpaceLowIceCaps_01 // Edges of the caps show scalloped margins that shift between passes, hinting at active winds or seasonal creep. You tag the series “keep watching” and “do not lick.”

        BelisamaInSpaceHigh* = #GEPscience_bd_orbitalScope_BelisamaInSpaceHigh_00 // From high orbit, Belisama is a pale disk under a dim red sun, with Nodens hanging nearby like a silent supervisor. The full mosaic takes ages to downlink, one unsettling strip at a time.
        BelisamaInSpaceLowFlats* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowFlats_00 // The Flats give clean, repeatable frames—until you notice the same “clean” cracks never line up between passes. Your stitching software calls it “parallax,” and you call it “Belisama.”
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTropicalLowlands_00 // The tropical lowlands are dark and smooth in the red light, with faint streaks that look like someone dragged a brush across the surface. Control points are easy to pick, harder to trust.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTemperateLowlands_00 // In the temperate lowlands, subtle ridges emerge only at certain sun angles. You schedule another orbit and remember that “tomorrow” is a long word out here.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTropicalMidlands_00 // The tropical midlands show rolling, blocky terrain that makes a satisfying mosaic grid. Then the shadows shift and the grid becomes “interpretive.”
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTemperateMidlands_00 // The temperate midlands look like they’ve been pressed flat and then wrinkled again. The map team asks what caused it; you send them more pictures and let them argue at leisure.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowHighlands_00 // The highlands throw razor shadows that make every ridge look landable right up until you zoom in. The camera resolves boulders; your confidence does not.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_orbitalScope_BelisamaInSpaceLowPoles_00 // The poles gleam with higher albedo patches that overexpose just enough to be annoying. You bracket the shots and still end up with “white” in three different flavors.

        SucellusInSpaceHigh* = #GEPscience_bd_orbitalScope_SucellusInSpaceHigh_00 // From high orbit, Sucellus looks like a cold, resource-rich rumor drifting under the red sun. The radiated noise in the frames is a reminder that even the camera is far from home.
        SucellusInSpaceLowBasins* = #GEPscience_bd_orbitalScope_SucellusInSpaceLowBasins_00 // The basins form broad bowls with sharp rims that stitch beautifully into a near-perfect map. Near-perfect, until the exposure gradient turns every basin into its own lighting experiment.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_orbitalScope_SucellusInSpaceLowLowlands_00 // Lowlands reveal faint banding and mottled tones that make geologists whisper “metal” like it’s a snack. You mark the anomalies and try not to imagine mining equipment this far out.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_SucellusInSpaceLowTropicalMidlands_00 // The tropical midlands are a patchwork of textures that refuses to repeat from pass to pass. The mosaic team requests “one stable surface,” and Sucellus politely declines.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_SucellusInSpaceLowTemperateMidlands_00 // Temperate midlands provide crisp edges and useful relief—finally, a map that looks like a map. Then the comms delay hits and it feels like you mapped it for ghosts.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_SucellusInSpaceLowHighlands_00 // Highlands show jagged spines and bright outcrops that punch through the dim lighting. Your stitching points cluster around them like frightened kerbals around a campfire.
        SucellusInSpaceLowPoles* = #GEPscience_bd_orbitalScope_SucellusInSpaceLowPoles_00 // The poles are stark, bright, and noisy all at once, as if the universe is adding static on purpose. You file the dataset under “polar coverage achieved, sanity optional.”

        CaireenInSpaceHigh* = #GEPscience_bd_orbitalScope_CaireenInSpaceHigh_00 // From high orbit, Caireen is barely more than a shaped shadow beside Sucellus, lit by a tired red sun. You take comfort in the fact that the map can’t get lost—there’s almost nowhere to go.
        CaireenInSpaceLowLowlands* = #GEPscience_bd_orbitalScope_CaireenInSpaceLowLowlands_00 // The lowlands are smoother than expected, broken by scattered blocks that look newly delivered. You run the mosaic twice, just to be sure the “new” isn’t your compression artifacts.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_orbitalScope_CaireenInSpaceLowMidlands_00 // Midlands imaging produces a lumpy, uneven quilt of rock that the stitcher hates and the scientists love. Someone suggests it was captured; the terrain answers, “still adjusting.”
        CaireenInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_CaireenInSpaceLowHighlands_00 // The highlands cast long, dramatic shadows that make Caireen look bigger than it deserves. You zoom in and remember it’s still just a small moon with very sharp opinions.
        CaireenInSpaceLowPoles* = #GEPscience_bd_orbitalScope_CaireenInSpaceLowPoles_00 // The poles show bright flecks and dark voids with no polite transition between them. Your final mosaic looks like a caution sign that learned geology.

        SironaInSpaceHigh* = #GEPscience_bd_orbitalScope_SironaInSpaceHigh_00 // Sirona’s rings cut thin, bright arcs across the dark like someone scratched a compass line into space. The exposure meter oscillates between “beautiful” and “are you sure.”
        SironaInSpaceHigh* = #GEPscience_bd_orbitalScope_SironaInSpaceHigh_01 // The wide-angle mosaic catches the rings as a faint, glittering halo, offset by the red sun’s tired glow. You send the frames home and imagine the map team watching them load, one shimmering strip at a time.
        SironaInSpaceHigh* = #GEPscience_bd_orbitalScope_SironaInSpaceHigh_02 // From high orbit, Sirona is a striped marble under a dim red sun, and the “surface” never holds still for your map grid. The downlink delay makes the planet feel like it’s happening somewhere else.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands swallow contrast and hide details like they’re shy. Frame-to-frame drift turns your careful overlap plan into an interpretive art piece.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_orbitalScope_SironaInSpaceLowLightTropicalBands_00 // The light tropical bands overexpose just enough to erase fine structure, then bring it back in the next pass. Your stitching software files a complaint and requests a calmer atmosphere.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkTemperateBands_00 // Subtle ripples in the dark temperate bands break into new patterns between orbits. You tag the mosaics “dynamic,” which is the polite term for “uncooperative.”
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_orbitalScope_SironaInSpaceLowLightTemperateBands_00 // The lighter temperate bands show shear lines sharp enough to use as map edges—until they slide sideways while you’re still photographing them. Sirona refuses to pose.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkPolarBands_00 // The dark polar bands are noisy and low-contrast, like the camera is peering into a deep well. You add more passes and accept that “north” is a suggestion here.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_orbitalScope_SironaInSpaceLowLightPolarBands_00 // The light polar bands bloom with glare at the limb, then vanish into haze. You bracket exposures and still end up with “bright” in multiple incompatible ways.

        AirmedInSpaceHigh* = #GEPscience_bd_orbitalScope_AirmedInSpaceHigh_00 // From high orbit, Airmed looks almost welcoming, until the red sun turns every highlight unfamiliar. The map preview arrives late enough that you’ve already flown past your own first impressions.
        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowTropicalLowlands_00 // The tropical lowlands form broad, readable shapes that stitch cleanly—right up until long shadows shift and redraw the boundaries. You log “repeat pass” and wait out the comms lag.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowTemperateLowlands_00 // Temperate lowlands show faint channeling and subtle tonal changes that only appear at low sun angles. You time the camera carefully and still feel like you’re guessing from far away.
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowTropicalMidlands_00 // The tropical midlands resolve into ridges and basins with crisp relief under the dim light. Control points are plentiful; confidence is not.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowTemperateMidlands_00 // The temperate midlands are a mottled quilt of materials that looks different every orbit as haze comes and goes. Your mosaic tool calls it “variable transparency,” which sounds nicer than “annoying.”
        AirmedInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowHighlands_00 // Highlands throw hard-edged shadows that make the terrain look sharper than it probably is. The camera loves it; the landing planners do not.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedLowlands_00 // In the darkened lowlands, noise and low contrast compete for ownership of the image. You enhance gently, because “inventing continents” is frowned upon.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedMidlands_00 // Darkened midlands show just enough texture to be unsettling—lumps, ridges, and voids that refuse neat classification. You label features by coordinates and let future you worry about names.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedHighlands_00 // Darkened highlands appear as silhouettes with occasional glints, like the world is hiding its sharp parts. The mosaic looks like a warning sign that learned geology.
        AirmedInSpaceLowPoles* = #GEPscience_bd_orbitalScope_AirmedInSpaceLowPoles_00 // The poles brighten abruptly with patches that don’t behave like simple frost or rock. You schedule extra coverage, because “what is that?” takes a long time to reach home.

        BorvoInSpaceHigh* = #GEPscience_bd_orbitalScope_BorvoInSpaceHigh_00 // From high orbit, Borvo is a cracked-looking sphere under a tired red sun, as if it cooled too fast and never stopped complaining. The full mosaic trickles back through relays like a slow confession.
        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalCraquelure_00 // Tropical craquelure shows fine, branching fractures that shift in apparent width as lighting changes. Your stitching points multiply until the software begs for mercy.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateCraquelure_00 // Temperate craquelure forms wider, calmer crack networks—calmer, not calm. The pattern is perfect for mapping and terrible for thinking about up close.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalLowlands_00 // Tropical lowlands sit between crack fields like islands of smoother ground, but even they have subtle wrinkling. You log it as “stable region” with a very small asterisk.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateLowlands_00 // Temperate lowlands offer clean frames and consistent tones, making you briefly forget how far away you are. Then the downlink delay reminds you that “briefly” is doing a lot of work.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalMidlands_00 // Tropical midlands are a jumble of ridges and broken plates that make the mosaic look like a dropped tile floor. The camera captures every edge; your nerves capture the rest.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateMidlands_00 // Temperate midlands show layered textures that alternate between smooth and shattered in neat bands. Geologists call it “interesting”; you call it “please don’t make me land here.”
        BorvoInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowHighlands_00 // The highlands sparkle with bright outcrops that punch through the dim lighting. They make excellent control points and excellent reasons to keep a safe altitude.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowMajorCraters_00 // Major craters anchor the mosaic with unmistakable rims and ejecta patterns. The shadows inside look deep enough to store spare rockets, but the camera cannot confirm.
        BorvoInSpaceLowPoles* = #GEPscience_bd_orbitalScope_BorvoInSpaceLowPoles_00 // Polar terrain is stark and high-contrast, with fracture lines converging toward the top like the world is being wrapped shut. You take extra overlap and hope the seams are the only thing that closes.

        DamonaInSpaceHigh* = #GEPscience_bd_orbitalScope_DamonaInSpaceHigh_00 // From high orbit, Damona is a quiet, solid presence beneath the red sun, with nothing about its colors quite matching “home.” The map team back there will argue over these pixels long after you’ve moved on.
        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowTropicalLowlands_00 // Tropical lowlands show broad plains with faint streaking that only appears when the light hits just right. You plan another pass and accept that patience is part of the payload.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowTemperateLowlands_00 // Temperate lowlands stitch neatly into a readable mosaic, almost comforting in their consistency. Almost—until haze rolls through and blurs the edges between frames.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowTropicalMidlands_00 // Tropical midlands reveal ridges and shallow basins that make the terrain look worked-over and tired. The camera is happy; the interpretation will take months of delayed conversations.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowTemperateMidlands_00 // Temperate midlands are mottled with subtle albedo patches that don’t line up with obvious topography. You flag “composition?” and let the lab coats fight over it later.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowHighlands_00 // Highlands cast long shadows that exaggerate every slope and make safe ground look dramatic. The mosaic is beautiful in a slightly threatening way.
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowImpactBasin_00 // The impact basin dominates multiple frames like a scar that never healed straight. You stitch a wide swath around it, because this feature will be the only thing everyone agrees on.
        DamonaInSpaceLowPoles* = #GEPscience_bd_orbitalScope_DamonaInSpaceLowPoles_00 // The poles brighten and darken in sharp patches with no gentle transitions, as if the surface can’t decide what it’s made of. You capture extra coverage and try not to wonder what’s happening down there.

        EponaInSpaceHigh* = #GEPscience_bd_orbitalScope_EponaInSpaceHigh_00 // From high orbit, Epona is a cold marble under a dim red sun, with a faint haze that makes the mosaic arrive as a slow, uncertain reveal. The map team back home argues over “ice” versus “cloud” while the signal crawls through relays.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_EponaInSpaceLowTropicalLowlands_00 // The tropical lowlands look dark and smooth, like frozen ground pretending to be calm water. Your overlap grid is perfect; the lighting isn’t, and the stitch seams show it.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_EponaInSpaceLowTemperateLowlands_00 // Temperate lowlands resolve into broad plains with subtle streaking that only appears at low sun angles. You schedule another pass and remember that “later” is very far away out here.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_orbitalScope_EponaInSpaceLowTropicalUplands_00 // The tropical uplands cast long shadows that exaggerate every ridge into a warning sign. The camera loves the contrast; the landing planners do not.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_orbitalScope_EponaInSpaceLowTemperateUplands_00 // Temperate uplands show mottled tones that don’t match neat elevation lines, hinting at mixed materials under the ice. You tag it “composition?” and let the delayed debates begin.
        EponaInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_EponaInSpaceLowHighlands_00 // The highlands sharpen into fractured plateaus with bright outcrops that make excellent control points. They also make excellent reminders that this world is not built for comfort.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_orbitalScope_EponaInSpaceLowGrandPeaks_00 // The Grand Peaks rise like jagged teeth at the terminator, throwing shadows deep enough to swallow your dynamic range. Your mosaic looks dramatic, and you’re not sure that’s a compliment.
        EponaInSpaceLowCraters* = #GEPscience_bd_orbitalScope_EponaInSpaceLowCraters_00 // Craters stitch together neatly—finally, something that holds still—until you notice faint drifted deposits softening rims between passes. Even the scars are changing in the red twilight.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_orbitalScope_EponaInSpaceLowVolcanoes_00 // The volcano fields show dark cones and stained terrain that read as “recent” even from orbit. The camera’s sensor warms just looking at them, which is probably not how heat works.
        EponaInSpaceLowPoles* = #GEPscience_bd_orbitalScope_EponaInSpaceLowPoles_00 // The poles brighten into harsh patches with scalloped edges that refuse to look like simple frost. You take extra coverage and quietly hope the planet stays frozen while you’re nearby.

        RosmertaInSpaceHigh* = #GEPscience_bd_orbitalScope_RosmertaInSpaceHigh_00 // From high orbit, Rosmerta is a lonely speck circling Epona, lit by a tired red sun and surrounded by too much empty. The full mosaic trickles back so slowly it feels like you’re mapping a memory.
        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTropicalLowlands_00 // The lowlands are flat, airless, and unforgivingly crisp—every pebble wants to be a landmark. Radiation noise peppering the frames is your reminder that “crisp” comes with a price.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTemperateLowlands_00 // Temperate lowlands show smooth basins and dusted flats that stitch cleanly into a usable map. The result is tidy in the same way an empty room is tidy.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTropicalMidlands_00 // Tropical midlands break into ridges and shallow troughs that look like frozen waves. You set more control points than you need, mostly to feel in control.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTemperateMidlands_00 // The midlands are mottled with bright flecks that pop under the dim light, then vanish at a different angle. You label them “outcrops” and resist naming them after snacks.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_RosmertaInSpaceLowHighlands_00 // Highlands cast knife-edged shadows that make the terrain look sharper than it probably is. Your mosaic becomes a catalog of places you are very glad to be orbiting, not standing on.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_orbitalScope_RosmertaInSpaceLowPoles_00 // The poles show bright patches and dark voids with no gentle transitions, as if the surface can’t decide what it’s made of. The map reads like a warning label with coordinates.

        RAB-58EInSpaceHigh* = #GEPscience_bd_orbitalScope_RAB-58EInSpaceHigh_00 // From high orbit, RAB-58E is barely a world at all—just a captured question mark circling the edge of Epona’s domain. The imaging run finishes quickly; the data takes forever to admit it exists.
        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowLowlands_00 // The lowlands are a smooth, dark smear punctuated by a few stubborn boulders that make good stitching anchors. If this is a snowball, it’s the grumpiest one you’ve ever seen.
        RAB-58EInSpaceLowEasternHighlands* = #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowEasternHighlands_00 // The eastern highlands show brighter material on steep slopes, like something fresher is exposed there. You zoom in, then remember you can’t ask the surface what it is for several light-minutes.
        RAB-58EInSpaceLowWesternHighlands* = #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowWesternHighlands_00 // Western highlands resolve into lumpy ridges that change character with every sun angle, making the mosaic feel inconsistent on purpose. You file it under “captured body, captured patience.”

        CernunnosInSpaceHigh* = #GEPscience_bd_orbitalScope_CernunnosInSpaceHigh_00 // From high orbit, Cernunnos is an icy dwarf drifting under the dim red sun, surrounded by the suspicion that it isn’t truly alone out here. The planet-wide mosaic arrives in slow strips, like the void is metering out permission to look.
        CernunnosInSpaceLowTropicalLowlands* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTropicalLowlands_00 // Tropical lowlands appear as broad, pale plains with faint streaks that could be wind-sculpted frost or something stranger. Your stitcher behaves, but your imagination does not.
        CernunnosInSpaceLowTemperateLowlands* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTemperateLowlands_00 // Temperate lowlands show gentle texture that makes mapping almost relaxing—until the silence and comms delay remind you how far “relaxing” had to travel to get here.
        CernunnosInSpaceLowTropicalMidlands* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTropicalMidlands_00 // Tropical midlands break into low ridges and shallow basins, a quiet pattern repeated with unsettling consistency. The mosaic looks like a place that has been waiting a long time.
        CernunnosInSpaceLowTemperateMidlands* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTemperateMidlands_00 // Temperate midlands reveal mottled albedo patches that don’t correlate with obvious topography. You flag them for later analysis and accept that “later” will be argued across a very long link.
        CernunnosInSpaceLowHighlands* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowHighlands_00 // The highlands throw long shadows that make every slope look steeper and colder than it already is. You capture extra overlap because the terrain feels like it’s daring your map to be wrong.
        CernunnosInSpaceLowSouthPolarHills* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowSouthPolarHills_00 // The south polar hills form clustered lumps and ridges that read like frozen surf, stopped mid-motion. Your mosaic is technically excellent and emotionally unsettling.
        CernunnosInSpaceLowNorthPole* = #GEPscience_bd_orbitalScope_CernunnosInSpaceLowNorthPole_00 // The north pole is a bright cap with subtle cracks that spider outward in thin lines. The camera resolves them cleanly; the thought of what they mean does not.
