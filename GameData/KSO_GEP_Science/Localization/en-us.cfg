        #GEPscience_SEDA_BelisamaInSpaceHigh_00 = At altitude, SEDA catches Belisama drifting in and out of Nodens’ space-weather shadow. Sheltered readings give way to sudden spikes, like the moon can’t decide whether it wants protection.
        #GEPscience_SEDA_SucellusInSpaceLow_00 = Near Sucellus, the lack of a real magnetic field turns space into a direct-to-hardware delivery system for heavy ions and energetic particles. The materials tray gains a “finish” that no brochure ever mentioned.
        #GEPscience_SEDA_SucellusInSpaceHigh_00 = Farther out, SEDA finally measures the local particle flow without the planet getting in the way. The baseline is thin, cold, and persistent—exactly what a red sun sends when it has all the time in the universe.
        #GEPscience_SEDA_CaireenInSpaceLow_00 = Caireen’s irregular neighborhood is full of tiny surprises: dust grains, charge surges, and impacts too small to see but big enough to register. The instruments agree on one thing—this is not a friendly parking orbit.
        #GEPscience_SEDA_CaireenInSpaceHigh_00 = Above Caireen, long stretches of emptiness are interrupted by brief, sharp particle bursts and drifting grit. The data arrives late, and the silence between transmissions feels even longer.
