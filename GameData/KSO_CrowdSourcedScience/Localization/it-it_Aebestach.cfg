        #CSS_Aebestach_mysteryGoo_Tylo_03 = Melma in orbita bassa di Tylo. Sotto lo sguardo di Tylo.
        #CSS_Aebestach_mysteryGoo_Tylo_04 = Melma in orbita alta di Tylo. Finalmente rilassata.
