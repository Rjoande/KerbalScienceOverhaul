        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthPolarZone_00 = The polar zone looks slightly “less impossible” than the rest. You take what victories you can get this far from home.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthSubpolarZone_00 = The thermal gradient here shimmers like a living thing. Mission Control receives the data later, when “later” arrives.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthTemperateZone_00 = The image is a careful balance between science and not setting the camera on fire. So far, science is winning.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthTropicZone_00 = Heat ripples smear the picture into red velvet bands. You label it “tropics” and pretend you meant to do that.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowEquatorialZone_00 = The equator is pure glare and fury; the only cool feature is the automatic shutter slamming shut in self-defense.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthTropicZone_00 = The camera resolves subtle texture in the glow, like currents made of light. You feel small, and then you log it.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthTemperateZone_00 = The thermal map settles into steady stripes. It’s oddly comforting, in a “giant star trying to cook you” way.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthSubpolarZone_00 = You catch fleeting cooler patches riding the turbulence. They’re gone before you can blink, but the recorder got them.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthPolarZone_00 = The far pole comes out crisp for a moment, then saturates again. You annotate: “briefly cooperative.”

        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedMagmaShores_00 = The ground is hot enough to make your boots reconsider their career choices; the shoreline glows like a warning label.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedScorchedLowlands_00 = Even “lowlands” radiate heat like a stovetop left on. You quietly move your snack warmer somewhere else.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedMidlands_00 = Dark patches cool faster than bright ones, painting the terrain in thermal camouflage under the dim red sun.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedHighlands_00 = The high ground sheds heat into space like it’s eager to escape. You relate to that.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedDarkSideMidlands_00 = The infrared image is mostly cold silence, with occasional warm specks from your own equipment. Taranis does not forgive.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedDarkSideHighlands_00 = The dark-side highlands look brittle-cold; anything warm stands out immediately—especially you.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedPoles_00 = The poles are a stark thermal “nope.” Your heater becomes the brightest feature in the whole panorama.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfSplashedMagmaSea_00 = The “sea” is a glaring sheet of molten brightness. You confirm it is, in fact, not suitable for swimming.
        #GEPscience_tantares_infrared_light_camera_TaranisSrfSplashedMagmaShores_00 = The shoreline temperature gradient is sharp enough to draw with a ruler. You do, because you can’t touch it.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowMagmaSea_00 = From low orbit, the magma sea is a beacon in infrared, screaming “active.” The signal arrives home after a long, long wait.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowMagmaShores_00 = The shores trace a hot, jagged outline like a glowing coastline on a night map—except the night is permanent somewhere.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowScorchedLowlands_00 = The lowlands retain heat stubbornly, as if they’re hoarding it against the coming darkness.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowMidlands_00 = Patchy thermal textures hint at different rock types. The camera can’t tell you what they are, only that they’re angry.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowHighlands_00 = Highlands cool in broad plates, broken by warmer fractures. You flag the fractures and promise not to land on them.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowDarkSideMidlands_00 = The dark side is a cold sink with faint, wandering warm lines—likely thermal inertia, possibly your imagination.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowDarkSideHighlands_00 = The coldest regions turn the planet into a negative image: your spacecraft heat reflections become the landscape.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowPoles_00 = The poles barely register above the background. The camera finally relaxes, then remembers the sunward side exists.
        #GEPscience_tantares_infrared_light_camera_TaranisInSpaceHigh_00 = From high orbit, Taranis is a split personality: one hemisphere incandescent, the other nearly invisible in the cold.

        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedSunnyLowlands_00 = The sunward lowlands radiate like warmed metal; your shadow is the only thing that looks “cool” for once.
        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedSunnyHighlands_00 = The highlands glow with stored heat, and the camera finds hot edges where rock faces the endless day.
        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedTransitionalLowlands_00 = The twilight band shows gentle gradients and sharp surprises—warm pockets where heat clings and cold pockets where it doesn’t.
        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedTransitionalHighlands_00 = The transition-zone highlands show striping from slopes and ridges. You can almost see the day-night battle line.
        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedDarkSideLowlands_00 = The dark-side lowlands are brutally cold; your engine bells become the dominant thermal feature, which feels embarrassing.
        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedDarkSideHighlands_00 = The highlands on the dark side look like frozen stone teeth. The camera reports “very cold” in several enthusiastic formats.
