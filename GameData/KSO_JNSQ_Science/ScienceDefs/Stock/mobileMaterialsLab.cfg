@EXPERIMENT_DEFINITION:HAS[#id[mobileMaterialsLab]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_mobileMaterialsLab_SunFlyingLow_00 // The materials bay opens and instantly becomes a materials bay-shaped kiln. Several samples “reclassify” themselves into simpler elements.
        SunFlyingHigh* = #JNSQscience_mobileMaterialsLab_SunFlyingHigh_00 // In the thinner outer layers, radiation does most of the work: coatings discolor, foils embrittle, and the lab quietly recommends never using “sunbaked” as a design feature.

        MohoSrfLandedPoles* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedPoles_00 // You open the bay and briefly enjoy temperatures that are only “terrible” instead of “catastrophic.” The samples still look pre-toasted.
        MohoSrfLandedPoles* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedPoles_01 // The materials clink and contract as they cool in the shade. Mission Control asks if “not melting” counts as a breakthrough.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedPolarIceCraters_00 // A chilled sample plate fogs up instantly. Whatever is lurking in this shadow is trying very hard to stay solid.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedPolarIceCraters_01 // Tiny crystals form on one container, then vanish as soon as they see light. The lab logs it as “existentially unstable frost.”
        MohoSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedMidlands_00 // The baseline tests look normal until the heat soak kicks in. The lab notes: “Normal, but angrier.”
        MohoSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedMidlands_01 // Several alloys show unexpected brittleness, like they’ve been slowly baked for ages. You label the tray “Moho seasoning.”
        MohoSrfLandedCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedCraters_00 // Fine dust slips into the hinges and instantly becomes a new abrasive compound. The bay now grinds with confidence.
        MohoSrfLandedCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedCraters_01 // Impact debris in the trays shows shock-fractures and fused grains. The lab calls it “pre-crushed, lightly toasted geology.”
        MohoSrfLandedExoticCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedExoticCraters_00 // One sample comes back with a glossy sheen, as if the crater tried to glaze it. The sensor suite insists it’s not paint.
        MohoSrfLandedExoticCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedExoticCraters_01 // Thermal cycling makes the test strips curl and twist in odd patterns. You swear the crater is doing it on purpose.
        MohoSrfLandedRareCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedRareCraters_00 // Fresh-looking shards show clean breaks and sharp edges. The lab is delighted to find something Moho hasn’t weathered into grumpiness yet.
        MohoSrfLandedRareCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedRareCraters_01 // The trays pick up trace volatiles trapped in the rubble, like the crater briefly bottled a secret before the heat could steal it.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedVoronoiCraters_00 // The samples crack along neat lines, matching the terrain’s strange tiling. Even the materials prefer to fail with geometry.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedVoronoiCraters_01 // Repeated heating leaves a honeycomb of microfractures in the ceramics. The lab logs “patterned stress” and quietly panics.
        MohoSrfLandedNotableCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedNotableCraters_00 // The bay reports a thick blanket of melted-and-quenched debris. The crater seems proud of its ability to rearrange matter violently.
        MohoSrfLandedNotableCraters* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedNotableCraters_01 // Several materials pick up a fine metallic dust that clings to everything. You now have “sparkly science” in every compartment.
        MohoSrfLandedPeaks* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedPeaks_00 // Dense rock chips make the mass sensors double-check themselves. The lab concludes these peaks have serious “roots.”
        MohoSrfLandedPeaks* = #JNSQscience_mobileMaterialsLab_MohoSrfLandedPeaks_01 // The trays rattle in the constant temperature swing between sun and shade. The experiment is mostly learning what survives being on a giant stovetop.

        EveSrfLandedKrakensWell* = #JNSQscience_mobileMaterialsLab_EveSrfLandedKrakensWell_00 // The materials sit under a strange static haze. Adhesives slowly unstick, like they are getting stage fright.
        EveSrfLandedKrakensWell* = #JNSQscience_mobileMaterialsLab_EveSrfLandedKrakensWell_01 // A few samples develop hairline cracks that do not match the temperature or pressure logs. You label them “unhelpful”.
        EveSrfSplashedShores* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedShores_00 // Some samples float confidently for a moment, then soak through and drop like rocks. Eve loves surprises.
        EveSrfSplashedPolarLakes* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedPolarLakes_00 // The colder lake slows the reactions, but not by much. Corrosion here is simply more patient.
        EveSrfSplashedPolarLakes* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedPolarLakes_01 // Rubbers stiffen, greases turn to paste, and the test labels try to detach and escape.
        EveSrfSplashedPetrolLakes* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedPetrolLakes_00 // The slick fluid seeps into every porous sample. Sponges, fabrics, and hopes come out stained purple.
        EveSrfSplashedPetrolLakes* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedPetrolLakes_01 // Several polymers swell up like balloons, then slump into shapeless blobs. The lab notes call this “not ideal”.
        EveSrfSplashedSeaofAkron* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofAkron_00 // A tiny electrical spark skitters across the surface film. Nothing explodes, which feels suspiciously disappointing.
        EveSrfSplashedSeaofAkron* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofAkron_01 // The heavier samples sink with a slow, deliberate motion, leaving an oily trail that clings to everything.
        EveSrfSplashedSeaofNessus* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofNessus_00 // The bay fills with a sharp, solvent smell as coatings dissolve into the sea. Filters work overtime.
        EveSrfSplashedSeaofNessus* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofNessus_01 // Metals pit rapidly, but some ceramics come out almost pristine, as if the sea picked favorites.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofTaniwha_00 // The liquid tugs at the samples in little pulses. The spring steel “twangs” like it heard a rumor.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofTaniwha_01 // Fine dust rises from nowhere and sticks to every wet surface. You now have “mud-proof” data.
        EveSrfSplashedSeaofGigan* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGigan_00 // The fluid is so dense it sloshes like syrup. Foams compress, rebound, and then stay embarrassed.
        EveSrfSplashedSeaofGigan* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGigan_01 // Several paints peel off in perfect sheets, revealing bare metal that immediately starts to fizz.
        EveSrfSplashedSeaofRodan* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofRodan_00 // Wind-driven spray peppers the bay. Soft materials get abraded as if they were in a sandblaster.
        EveSrfSplashedSeaofRodan* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofRodan_01 // The samples come back coated in a gritty residue that refuses to rinse off. You consider naming it.
        EveSrfSplashedSeaofGojira* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGojira_00 // The sea leaves a heavy film on everything. Hinges stiffen and begin to complain audibly.
        EveSrfSplashedSeaofGojira* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGojira_01 // A few organic samples discolor and curl up like overcooked snacks. You do not record any taste tests.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGhidorah_00 // The liquid seems layered. Some samples float, then roll over and sink as if pulled by three different rules.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGhidorah_01 // Corrosion patterns form in branching streaks, like the sea is drawing a map across the metal.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofBagorah_00 // The bay fills with sticky droplets that cling to lenses and seals. Cleanup becomes a separate experiment.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofBagorah_01 // Several plastics soften into a tar-like mess, while the composites shrug it off and look smug.

        KerbinSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedLowlands_00 // The Lowlands are so humid that condensation beads on the sample canisters immediately. Several labels dissolve into modern art.
        KerbinSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedLowlands_01 // Mud splatters the doors as the bay opens. One sample is now officially classified as mostly Lowlands.
        KerbinSrfLandedAridLowlands* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridLowlands_00 // Fine, dry grit from the Arid Lowlands works its way into every hinge and latch. The lab now sounds like it's chewing sand.
        KerbinSrfLandedAridLowlands* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridLowlands_01 // The samples bake in the sun until the temperature alarms get offended. You close the bay and pretend it was a calibration test.
        KerbinSrfLandedAridMountains* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridMountains_00 // In the Arid Mountains, the bay door opens and immediately regrets the decision. Abrasive dust tries to sandblast the instruments.
        KerbinSrfLandedAridMountains* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridMountains_01 // A loose sample tray slides downhill in slow motion. You record the data as gravity still working.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedWelcomeBackIsland_00 // WelcomeBack Island is littered with sun-bleached straps and mysterious scorch marks. The samples seem right at home.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_mobileMaterialsLab_KerbinSrfLandedWelcomeBackIsland_01 // You run a full exposure test and immediately collect a souvenir: a tiny shell stuck to the door seal. It counts as contamination and morale.
        KerbinSrfSplashed* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashed_00 // After a quick dunk, the materials bay comes up dripping and slightly insulted. The readouts suggest water is, in fact, wet.
        KerbinSrfSplashed* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashed_01 // Your sample racks slosh as you bob around. Mission Control reminds you that marine testing is not a recreational activity.
        KerbinSrfSplashedGreatLake* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedGreatLake_00 // Freshwater from the Great Lake rinses the bay clean, then leaves a green film on everything. The algae are very thorough.
        KerbinSrfSplashedGreatLake* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedGreatLake_01 // You cycle the trays underwater and watch bubbles stream out of every seam. The engineers write back: please stop that.
        KerbinSrfSplashedInlandWater* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedInlandWater_00 // The Inland Water is calm enough for careful testing. Then a wave sneaks in and rearranges your samples by color.
        KerbinSrfSplashedInlandWater* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedInlandWater_01 // The bay doors open underwater and a curious fish investigates. You log it as external inspector.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedKreenwichSea_00 // The Kreenwich Sea tastes like salt and regret. Corrosion tests begin the moment the bay doors crack open.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedKreenwichSea_01 // Sea spray leaves crystalline patterns on the sample plates. You briefly consider calling it art to justify the extra funding.
        KerbinSrfSplashedForemansSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedForemansSea_00 // The Foremans Sea is choppy, and the lab gets a vigorous shake. Several samples experience accelerated endurance testing.
        KerbinSrfSplashedForemansSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedForemansSea_01 // Saltwater seeps into places it has no business being. You add a new category to the report: sneaky.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedTriangulusSea_00 // Something in the Triangulus Sea foams when it meets the samples. You decide not to ask what else is in the water.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedTriangulusSea_01 // Your instruments register a sudden spike in conductivity. The ocean appears to be winning the experiment.
        KerbinSrfSplashedEasternSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedEasternSea_00 // The Eastern Sea coats everything in a salty film that dries in seconds. The materials are now seasoned.
        KerbinSrfSplashedEasternSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedEasternSea_01 // A rolling swell tips the craft just enough to dunk the bay twice. You claim it was a controlled repeat test.
        KerbinSrfSplashedWesternSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedWesternSea_00 // The Western Sea is rougher than expected, and the sample trays rattle like a box of bolts. Great data, terrible sound.
        KerbinSrfSplashedWesternSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedWesternSea_01 // Water rushes in and out of the bay with each wave, scrubbing the samples like they're in a washing machine. Science has never been so loud.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedNorthernSea_00 // The Northern Sea is cold enough to numb your fingers through the gloves. The bay forms a thin rim of ice between tests.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedNorthernSea_01 // Brisk waves slap the hull and drench the lab. The samples take it stoically; you do not.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedSub-ArcticSea_00 // Sub-Arctic seawater is icy and briny, and the bay door comes back up with slush in the hinges. That seems suboptimal.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedSub-ArcticSea_01 // Some samples freeze to the rack for a moment before snapping free. You note the adhesion strength and your rising annoyance.
        KerbinSrfSplashedArcticSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedArcticSea_00 // The Arctic Sea tries to freeze the bay shut. You win by applying patience and a concerning amount of power.
        KerbinSrfSplashedArcticSea* = #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedArcticSea_01 // Cold brine coats the samples and crystallizes instantly when exposed to air. The resulting frost patterns are strangely beautiful.

        MunSrfLandedMountains* = #JNSQscience_mobileMaterialsLab_MunSrfLandedMountains_00 // The slopes make the lab feel like it’s always leaning. One canister slides a whole centimeter over an hour. Practically, a sprint.
        MunSrfLandedMountains* = #JNSQscience_mobileMaterialsLab_MunSrfLandedMountains_01 // Fine mountain dust scratches up every surface. The materials start polishing themselves in response, which is deeply unsettling.

        MinmusSrfLandedPoles* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedPoles_00 // Several samples develop a glittery frost that refuses to sublimate. The lab smells faintly of “cold.”
        MinmusSrfLandedPoles* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedPoles_01 // The colder dust here makes some materials crackle with tiny static pops whenever you move the tray.
        MinmusSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedLowlands_00 // Fine greenish dust works its way into every hinge and seam. The materials tray now opens with “character.”
        MinmusSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedLowlands_01 // A foam sample puffs up slightly, then stays that way as if proud of itself. You log it as “unexpectedly confident.”
        MinmusSrfLandedBrownBasins* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownBasins_00 // Darker dust stains the samples as if it’s trying to mark its territory. The stain does not come off with brushing.
        MinmusSrfLandedBrownBasins* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownBasins_01 // Several materials warm slightly in direct sun, then cool instantly in shadow. The brown surface makes the swings feel sharper.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownLowlands_00 // The brown dust clings stubbornly to polymers and cloth. Your “control sample” is no longer controlling anything.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownLowlands_01 // A clear sample turns cloudy where the darker grit embeds itself. You label it “optically offended.”
        MinmusSrfLandedBrownMidlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownMidlands_00 // The mottled ground leaves the samples with a speckled coat, like they’ve been peppered. You resist seasoning jokes.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownMidlands_01 // A plated sample develops tiny dull patches that spread in a branching pattern. You note “possible chemical reaction, or Minmus moodiness.”
        MinmusSrfLandedBrownHighlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownHighlands_00 // The darker highland dust reacts with one metal to form a flat, matte crust. The sample looks older than it did yesterday.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownHighlands_01 // A brittle composite sheds a fine powder at the slightest touch. You decide to stop touching it for science.
        MinmusInSpaceLow* = #JNSQscience_mobileMaterialsLab_MinmusInSpaceLow_00 // The samples ping and click as they cool unevenly in sunlight and shadow. Low orbit is a very rude temperature cycle.
        MinmusInSpaceLow* = #JNSQscience_mobileMaterialsLab_MinmusInSpaceLow_01 // A few materials accumulate a faint dusty film from nearby particles. Even in space, Minmus finds a way to get everywhere.

        DunaSrfLandedRareCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedRareCraters_00 // The dust here finds its way into every hinge and seam, as if the crater itself is trying to claim your equipment. One container starts squeaking in protest.
        DunaSrfLandedRareCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedRareCraters_01 // A pebble ricochets into the sample bay on a lazy arc. Low gravity makes even the debris feel like it has time to be dramatic.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedVoronoiCraters_00 // The patterned ground seems to encourage patterned results; several samples develop neat cracks and repeating ripples that look uncomfortably “intentional”.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedVoronoiCraters_01 // The sensors report tiny, regular temperature swings while the bay is open. You suspect swirling micro-drafts are marching through the pits below.
        DunaSrfLandedNotableCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedNotableCraters_00 // The sample tray vibrates faintly, then stops, then vibrates again. You blame the crater walls for “channeling wind” because the alternative is blaming the samples.
        DunaSrfLandedNotableCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedNotableCraters_01 // A dark film coats the optics almost immediately, turning every close-up into abstract art. The materials don’t change much, but your camera definitely does.
        DunaSrfLandedExoticCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedExoticCraters_00 // Liquids try to freeze and boil at the same time, leaving a lace of crystals around the canisters. The solids remain stubbornly unimpressed.
        DunaSrfLandedExoticCraters* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedExoticCraters_01 // Pale grains tumble into the bay and cling to everything, including the labels. You file this under “interesting deposits” and “future cleaning problem”.
        DunaSrfLandedMountains* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedMountains_00 // The samples shift and settle at odd angles as the lander rests on uneven ground. Low gravity turns every tiny slide into a slow-motion rearrangement.
        DunaSrfLandedMountains* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedMountains_01 // Cold-soaked rock radiates into the bay whenever the doors open. Several composites become brittle enough to snap when the vibration table barely taps them.
        DunaSrfLandedVolcano* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedVolcano_00 // Dark grit from the volcanic ground streaks the bay like soot, and the sensors report a slight warmth compared to the surrounding dust. The plastics relax just enough to warp and then “remember” the warp.
        DunaSrfLandedVolcano* = #JNSQscience_mobileMaterialsLab_DunaSrfLandedVolcano_01 // Porous black grains cling to a magnetized sample and build a fuzzy coat. You write “unexpectedly cooperative” and then add “do not inhale” in larger letters.

        IkeSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_IkeSrfLandedMidlands_00 // The dust works its way into the experiment trays and turns a few liquids into gritty paste. One container now makes a faint clicking sound when you shake it.
		IkeSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_IkeSrfLandedLowlands_00 // The samples pick up a dark coating of regolith that refuses to let go. The lab notes describe it as “magnetically annoying,” which is not a measurement unit.
		IkeSrfLandedHighlands* = #JNSQscience_mobileMaterialsLab_IkeSrfLandedHighlands_00 // Under the harsh light, reflective foils wrinkle and crackle, and one gel sample forms sharp edges as if it’s trying to become a rock and fit in.
		IkeInSpaceLow* = #JNSQscience_mobileMaterialsLab_IkeInSpaceLow_00 // In hard vacuum, several materials boil, freeze, and sublimate in quick succession, leaving behind a fine glitter that drifts around the bay like it owns the place.
		IkeInSpaceHigh* = #JNSQscience_mobileMaterialsLab_IkeInSpaceHigh_00 // With Ike shrinking to a charcoal speck below, the samples settle into slow, quiet motion—until a stray vibration makes them all rearrange themselves into a new “stable” configuration.

        EdnaSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedLowlands_00 // The exposed samples develop a fine, dark dusting. The “clean” control is now the messiest one.
        EdnaSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedLowlands_01 // A foil strip becomes brittle and crackles when flexed, like Edna is quietly stealing heat from everything.
        EdnaSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedMidlands_00 // Several materials contract hard enough to pop their mounts loose. The lab politely suggests “less enthusiasm” next time.
        EdnaSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedMidlands_01 // A polymer sample turns glassy and clicks when tapped, producing a sound that feels too loud for this place.
        EdnaSrfLandedHighlands* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedHighlands_00 // The rougher samples shed grains that cling to everything. Even the “non-stick” coating gives up.
        EdnaSrfLandedHighlands* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedHighlands_01 // A ceramic tile survives perfectly, which is suspicious. You mark it down as “overconfident.”
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedPolarIceCraters_00 // The cold-soaked samples frost over in the shade, then refuse to thaw even under direct lamp light.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedPolarIceCraters_01 // A metal coupon comes back with tiny pits, as if the airless dark still found a way to “weather” it.
        EdnaSrfLandedWhites* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedWhites_00 // The bright ground leaves a pale residue on the sample rack. It looks clean until you realize it wasn’t there before.
        EdnaSrfLandedWhites* = #JNSQscience_mobileMaterialsLab_EdnaSrfLandedWhites_01 // One coating discolors toward the same washed-out tone as the surface outside, like it’s trying to blend in.
        EdnaInSpaceLow* = #JNSQscience_mobileMaterialsLab_EdnaInSpaceLow_00 // The exposed materials cool rapidly in shadow; the lab notes a temperature swing that feels personally insulting.
        EdnaInSpaceLow* = #JNSQscience_mobileMaterialsLab_EdnaInSpaceLow_01 // A thin film curls toward the planet as you pass over the nightside, then flattens when you cross into light.
        EdnaInSpaceHigh* = #JNSQscience_mobileMaterialsLab_EdnaInSpaceHigh_00 // Out here the samples mostly do nothing, which the lab interprets as “excellent data” and you interpret as “rude.”
        EdnaInSpaceHigh* = #JNSQscience_mobileMaterialsLab_EdnaInSpaceHigh_01 // A sensor window accumulates a faint haze that won’t wipe off, as if even empty space around Edna wants to leave a mark.

        DakSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_DakSrfLandedLowlands_00 // The material bay opens and everything immediately tries to become one with the dust. Vacuum makes the samples look oddly “freshly unwrapped.”
        DakSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_DakSrfLandedLowlands_01 // Several test strips crackle with static and attract grit like a magnet that forgot magnets don’t work here. You label it “electrostatic potato seasoning.”
        DakSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_DakSrfLandedMidlands_00 // Micro-impacts ping the exposed plates while you watch. The softer samples are already developing a “mysterious cratering” pattern.
        DakSrfLandedMidlands* = #JNSQscience_mobileMaterialsLab_DakSrfLandedMidlands_01 // The adhesive sample refuses to behave without air, slowly bubbling like it’s embarrassed to be observed. You note: “Outgassing is a drama queen.”
        DakSrfLandedHighlands* = #JNSQscience_mobileMaterialsLab_DakSrfLandedHighlands_00 // Sharp grains sandblast the samples when you tap the bay. The abrasion tiles are smug about it, which is not a property you expected in ceramics.
        DakSrfLandedHighlands* = #JNSQscience_mobileMaterialsLab_DakSrfLandedHighlands_01 // Thermal sensors show rapid swings between sunlight and shadow. One alloy flexes just enough to make you nervous about “potato-shaped tolerances.”
        DakInSpaceLow* = #JNSQscience_mobileMaterialsLab_DakInSpaceLow_00 // In low orbit, the samples cool down fast and stay that way. The foam insulator performs excellently, but the glass develops a faint spiderweb of stress lines.
        DakInSpaceLow* = #JNSQscience_mobileMaterialsLab_DakInSpaceLow_01 // The radiation dosimeter ticks along while the metals quietly frost over. A lubricant sample becomes a lubricant suggestion and drifts into a corner.
        DakInSpaceHigh* = #JNSQscience_mobileMaterialsLab_DakInSpaceHigh_00 // At high altitude, the bay reports mostly vacuum and cold, with a steady trickle of particle hits. The shielded fabric holds up; the unshielded film turns brittle and offended.
        DakInSpaceHigh* = #JNSQscience_mobileMaterialsLab_DakInSpaceHigh_01 // The exposed composites take on a dull, chalky look as if space is gently erasing them. You close the bay before Dak’s “siren’s call” convinces the samples to leave.

        DresSrfLandedPoles* = #JNSQscience_mobileMaterialsLab_DresSrfLandedPoles_00 // The colder samples contract with a tiny ping and refuse to un-stick from the tray. You note: “highly cooperative, until touched.”
