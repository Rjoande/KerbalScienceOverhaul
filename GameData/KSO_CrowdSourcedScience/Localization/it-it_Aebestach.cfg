        #CSS_Aebestach_mysteryGoo_Moho_01 = Melma nella catena settentrionale di doline di Moho. Fatica nel calore.
        #CSS_Aebestach_mysteryGoo_Moho_02 = Melma nelle pianure di Moho. Caldo.
