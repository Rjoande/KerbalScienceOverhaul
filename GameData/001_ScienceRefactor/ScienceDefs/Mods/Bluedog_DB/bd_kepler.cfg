@EXPERIMENT_DEFINITION:HAS[#id[bd_kepler]]
{
    @title = #ScienceRefactor_bd_kepler_title // Exoplanetary Transit Observations
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_kepler_default_00 // The instrument detects a subtle dip in brightness of a distant star, light-years away. This indicates the discovery of a new exoplanet!
        InSpace* = #ScienceRefactor_bd_kepler_default_01 // The instrument measures a large change in brightness of an observed star, indicating either a large gas giant exoplanet or a binary planetary system have transited the star.
        InSpace* = #ScienceRefactor_bd_kepler_default_02 // Long, periodic instances of dimming are observed in a distant red giant. This is a rare discovery with data suggesting this system has had a large planetary collision, resulting in a large, scattered debris field forming a temporary asteroid belt around the star. 
        InSpace* = #ScienceRefactor_bd_kepler_default_03 // Collected data from this instrument has made an important discovery! Because of this instrument, scientists now can confirm that planets outnumber stars in our galaxy. While this seems inuitive, this could not be conclusively proven until several exoplanetary transits were observed. 
        InSpace* = #ScienceRefactor_bd_kepler_default_04 // A wide field of stars are being monitored by this instrument for exoplanet transits. Currently none are being observed but a transit could happen at any moment. Best keep your eyes peeled!
        InSpace* = #ScienceRefactor_bd_kepler_default_05 // A transit is observed around a Sun-like star of a possibly rocky planet. Could this be a habitable planet? Only future scientific investigations can tell.
       
        KerbinInSpaceLow* = #ScienceRefactor_bd_kepler_KerbinInSpaceLow_00 // The bright glow of Kerbin's surface and its exosphere seems to be diminishing the effectiveness of this instument. Perhaps it would function better in a higher orbit?
        KerbinInSpaceHigh* = #ScienceRefactor_bd_kepler_KerbinInSpaceHigh_00 // While observational data seems to be better than if they were collected in low orbit, it seems Kerbin's magnetosphere is able to effect the highly sensitive instrument and reduce the instruments maximum effectiveness. Perhaps it would be best to take measurements outside of Kerbin's orbit?
        KerbinInSpace* = #ScienceRefactor_bd_kepler_KerbinInSpace_00 // The instrument seems to be functioning at an adequate capacity in Kerbin orbit. Just try to avoid pointing it at Kerbin or Kerbol, as that would cause the instrument's sensitive CCD to be rendered unoperable.

        SunInSpaceLow* = #ScienceRefactor_bd_kepler_SunInSpaceLow_00 // Way too close to the sun! The intense magnetic field and brightness of the sun seem to be massively interfering with the highly sensitive instrument, rendering it practically unusable.
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_00 // The instrument detects a subtle dip in brightness of a distant star, light-years away. This indicates the discovery of a new exoplanet!
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_01 // The instrument measures a large change in brightness of an observed star, indicating either a large gas giant exoplanet or a binary planetary system have transited the star.
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_02 // Long, periodic instances of dimming are observed in a distant red giant. This is a rare discovery with data suggesting this system has had a large planetary collision, resulting in a large, scattered debris field forming a temporary asteroid belt around the star. 
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_03 // Collected data from this instrument has made an important discovery! Because of this instrument, scientists now can confirm that planets outnumber stars in our galaxy. While this seems inuitive, this could not be conclusively proven until several exoplanetary transits were observed. 
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_04 // A wide field of stars are being monitored by this instrument for exoplanet transits. Currently none are being observed but a transit could happen at any moment. Best keep your eyes peeled!
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_05 // A transit is observed around a Sun-like star of a possibly rocky planet. Could this be a habitable planet? Only future scientific investigations can tell. 
        SunInSpace* = #ScienceRefactor_bd_kepler_SunInSpace_06 // It seems that this instrument operates best in a solar orbit rather than an orbit around a planetary body. Just don't point it at the Sun, you'll fry the instrument! 

        EarthInSpaceLow* = #ScienceRefactor_bd_kepler_EarthInSpaceLow_00 // The bright glow of Earth's surface and its exosphere seems to be diminishing the effectiveness of this instument. Perhaps it would function better in a higher orbit?
        EarthInSpaceHigh* = #ScienceRefactor_bd_kepler_EarthInSpaceHigh_00 // While observational data seems to be better than if they were collected in low orbit, it seems Earth's magnetosphere is able to effect the highly sensitive instrument and reduce the instruments maximum effectiveness. Perhaps it would be best to take measurements outside of Earth's orbit?
        EarthInSpace* = #ScienceRefactor_bd_kepler_EarthInSpace_00 // The instrument seems to be functioning at an adequate capacity in Earth orbit. Just try to avoid pointing it at Earth or the Sun, as that would cause the instrument's sensitive CCD to be rendered unoperable.
    }
}