@EXPERIMENT_DEFINITION:HAS[#id[bd_massSpec]]
{
    %RESULTS
    {
		GrannusInSpaceLow* = #GEPscience_bd_massSpec_GrannusInSpaceLow_00 // Hydrogen and helium dominate the scan; the spectrum jitters with charged particles, and the instrument helpfully summarizes it as “very star.”
        GrannusFlyingLow* = #GEPscience_bd_massSpec_GrannusFlyingLow_00 // Ionized hydrogen floods the detector while a few heavier ions ride along like stowaways in the stellar wind.
        GrannusFlyingHigh* = #GEPscience_bd_massSpec_GrannusFlyingHigh_00 // The signal thins but stays angry—helium peaks remain sharp and the particle rain keeps arguing with the electronics.

        TaranisInSpaceLow* = #GEPscience_bd_massSpec_TaranisInSpaceLow_00 // A faint, lopsided exosphere shows up—metal atoms boiled off under the dim red sun and drifting away toward the cold side.
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_massSpec_TaranisSrfLandedMagmaShores_00 // Silicate vapors spike hard near the hot ground; the intake valve politely requests you stop hovering near molten things.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_massSpec_TaranisSrfLandedScorchedLowlands_00 // Mostly rock-derived ions—sodium, potassium, and a lot of “freshly cooked”—with nothing to soften the reading but distance and delay.
        TaranisSrfLandedMidlands* = #GEPscience_bd_massSpec_TaranisSrfLandedMidlands_00 // Almost no gas at all; just stubborn dust grains and trace sputtered metals, as if the planet is rationing its atoms.
        TaranisSrfLandedHighlands* = #GEPscience_bd_massSpec_TaranisSrfLandedHighlands_00 // Thin whispers of metal vapors and oxidized fragments; the red sun bakes the peaks while Kerbin waits patiently for the data.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_massSpec_TaranisSrfLandedDarkSideMidlands_00 // Cold-trapped volatiles appear in brief, quiet peaks—carbon monoxide and faint nitrogen hints—then fade as the sensor warms.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_massSpec_TaranisSrfLandedDarkSideHighlands_00 // The scan catches frost-born molecules like a hoard in the dark; the moment heat arrives, the inventory starts disappearing.
        TaranisSrfLandedPoles* = #GEPscience_bd_massSpec_TaranisSrfLandedPoles_00 // Mixed signatures from both hemispheres—hot-side sputtering and cold-side frost arguing over which one gets to be “the atmosphere.”

        ToutatisInSpaceLow* = #GEPscience_bd_massSpec_ToutatisInSpaceLow_00 // CO2 trails the planet in a thin, ragged halo; ions stream off downwind, and Mission Control receives the numbers after a long, quiet pause.
        ToutatisFlyingLow* = #GEPscience_bd_massSpec_ToutatisFlyingLow_00 // CO2 dominates with nitrogen and argon riding along; suspended dust adds extra peaks labeled “probably from something you did.”
        ToutatisFlyingHigh* = #GEPscience_bd_massSpec_ToutatisFlyingHigh_00 // Upper air is sparse and partly ionized; oxygen fragments and carbon monoxide appear where the red sunlight bites hardest.
        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_massSpec_ToutatisSrfLandedSunnyLowlands_00 // Hot-side air is mostly CO2, but the baked ground adds extra carbon compounds like it’s exhaling through cracks.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_massSpec_ToutatisSrfLandedSunnyHighlands_00 // Thin CO2 with a metallic tang from wind-scoured rock; the instrument is basically sipping vacuum and calling it work.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_massSpec_ToutatisSrfLandedTransitionalLowlands_00 // Composition steadies—CO2, a sniff of nitrogen, and enough argon to prove the readout isn’t just loneliness.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_massSpec_ToutatisSrfLandedTransitionalHighlands_00 // The “comfort zone” still tastes sharp and thin; gusts keep throwing grit into the analyzer right as the uplink window opens.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_massSpec_ToutatisSrfLandedDarkSideLowlands_00 // Cold traps hold onto CO2 frost and trace volatiles; the scan reads like a freezer inventory written in mass-to-charge.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_massSpec_ToutatisSrfLandedDarkSideHighlands_00 // The air thins to almost nothing; most of what registers is slow sublimation and a few solitary ions wandering past.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_massSpec_ToutatisSrfLandedSoutheasternMountains_00 // Rock dust dominates the spectrum; the mass spec flags heavier traces that might be concentrated in these ridges.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_massSpec_ToutatisSrfLandedWesternMountains_00 // A mix of CO2 and pulverized minerals; the analyzer requests a dust cover, a filter swap, and a shorter mission duration.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_massSpec_ToutatisSrfLandedDarkSideMountains_00 // Mostly CO2 fragments and stubborn mineral grains; the silence outside makes the comms delay feel even longer.

        NodensInSpaceLow* = #GEPscience_bd_massSpec_NodensInSpaceLow_00 // The upper atmosphere leaks into space in thin, ionized threads; the readout looks familiar until the red-lit chemistry starts scribbling in the margins.
        NodensFlyingLow* = #GEPscience_bd_massSpec_NodensFlyingLow_00 // Nitrogen and oxygen dominate, with water and trace gases riding along; it’s almost comforting—right up until you remember how far the data has to travel home.
        NodensFlyingHigh* = #GEPscience_bd_massSpec_NodensFlyingHigh_00 // The air thins and grows reactive; photochemical fragments spike under the dim red sun, and the analyzer keeps asking if “we meant to be up here.”
        NodensSrfLandedShores* = #GEPscience_bd_massSpec_NodensSrfLandedShores_00 // Sea-salt aerosols and wet minerals flood the spectrum; the machine smells “ocean” but insists it’s just being scientific about it.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_NodensSrfLandedTropicalLowlands_00 // Warm, heavy air carries water and faint organic traces; the instrument labels several peaks as “interesting” and then goes quiet for a long uplink window.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_NodensSrfLandedTemperateLowlands_00 // A steady mix of common gases with soil dust mixed in; it’s the kind of normal you only get on a world that isn’t yours.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_NodensSrfLandedTropicalMidlands_00 // Drier air, more mineral grit, and a stubborn haze of unknown fragments; the red sun bakes everything slowly and thoroughly.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_NodensSrfLandedTemperateMidlands_00 // Mostly mundane gases, plus a sharp little cluster of trace compounds that refuses to match the library back on Kerbin.
        NodensSrfLandedHighlands* = #GEPscience_bd_massSpec_NodensSrfLandedHighlands_00 // Thin air and rock dust dominate; heavier ions appear as if the mountains are quietly shedding their chemistry into the wind.
        NodensSrfLandedTundra* = #GEPscience_bd_massSpec_NodensSrfLandedTundra_00 // Cold air, thin moisture, and a faint whiff of trapped volatiles; the spectrum reads like a freezer that’s been sealed for ages.
        NodensSrfLandedIceCaps* = #GEPscience_bd_massSpec_NodensSrfLandedIceCaps_00 // Water ice signatures are strong, but the trace peaks are stranger—cold-stored molecules that only exist because the sun here doesn’t shine like home.

        BelisamaInSpaceLow* = #GEPscience_bd_massSpec_BelisamaInSpaceLow_00 // A near-vacuum, salted with sputtered atoms and passing plasma from Nodens; the peaks arrive in lonely bursts, like messages that don’t know if anyone is listening.
        BelisamaSrfLandedFlats* = #GEPscience_bd_massSpec_BelisamaSrfLandedFlats_00 // The intake mostly samples dust; metal and silicate fragments dominate, with a few volatile ghosts that vanish as soon as the analyzer warms up.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_BelisamaSrfLandedTropicalLowlands_00 // “Tropical” turns out to mean sun-baked regolith; the spectrum is hot rock, colder emptiness, and one stubborn peak that might be sodium.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_BelisamaSrfLandedTemperateLowlands_00 // Fine-grain minerals and trace metals, sandblasted into uniformity by time and tides; Nodens hangs overhead like a reminder.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_BelisamaSrfLandedTropicalMidlands_00 // The dust gets sharper, more glassy; the mass spec politely asks whether we brought enough filters for an entire moon.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_BelisamaSrfLandedTemperateMidlands_00 // Sparse volatiles, abundant rock fragments, and a thin frosting of implanted ions; it’s like the surface has been quietly collecting space weather.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_massSpec_BelisamaSrfLandedHighlands_00 // High ground, low pressure, and lots of fractured silicates; every peak in the spectrum feels chipped out of the landscape itself.
        BelisamaSrfLandedPoles* = #GEPscience_bd_massSpec_BelisamaSrfLandedPoles_00 // Cold-trapped molecules show up briefly—then fade as sunlight shifts; the analyzer logs them anyway, for someone far away to interpret later.

        SucellusInSpaceLow* = #GEPscience_bd_massSpec_SucellusInSpaceLow_00 // A faint exosphere of sputtered metals surrounds this dwarf world; the instrument calls it an “atmosphere” only because it has to put something in the box.
        SucellusSrfLandedBasins* = #GEPscience_bd_massSpec_SucellusSrfLandedBasins_00 // Basin dust is rich in heavy fragments; the spectrum leans metallic, as if the ground is daring you to try mining it this far from home.
        SucellusSrfLandedLowlands* = #GEPscience_bd_massSpec_SucellusSrfLandedLowlands_00 // Silicates and iron-rich grains dominate; trace volatiles appear as short-lived spikes, like the surface is reluctantly breathing.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_SucellusSrfLandedTropicalMidlands_00 // Sunlit regolith releases a thin trickle of gas; most of what you measure is still just dust trying to become data.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_SucellusSrfLandedTemperateMidlands_00 // The chemical profile steadies into “rock and more rock,” with a few implanted ions that hint at a busy space environment under the red sun.
        SucellusSrfLandedHighlands* = #GEPscience_bd_massSpec_SucellusSrfLandedHighlands_00 // Coarser grains, cleaner metal peaks, and almost no volatiles; the high ground feels old, dry, and very sure of itself.
        SucellusSrfLandedPoles* = #GEPscience_bd_massSpec_SucellusSrfLandedPoles_00 // Cold traps cling to faint molecular signatures; the peaks are delicate, like they might blow away if you look at them too hard.

        CaireenInSpaceLow* = #GEPscience_bd_massSpec_CaireenInSpaceLow_00 // Tiny Caireen sheds a whisper of atoms into space; most of what the mass spec sees is dust and the emptiness between long communications pings.
        CaireenSrfLandedLowlands* = #GEPscience_bd_massSpec_CaireenSrfLandedLowlands_00 // Lightweight regolith floods the intake; mineral fragments dominate, with a few odd volatiles that suggest this moon was captured with secrets intact.
        CaireenSrfLandedMidlands* = #GEPscience_bd_massSpec_CaireenSrfLandedMidlands_00 // The spectrum is mostly crushed rock and electrostatic cling; the sample behaves like it wants to leave and never come back down.
        CaireenSrfLandedHighlands* = #GEPscience_bd_massSpec_CaireenSrfLandedHighlands_00 // Coarse grains and sharper metal traces show up; the analyzer labels several peaks as “unknown” and saves them for a scientist who isn’t light-minutes away.
        CaireenSrfLandedPoles* = #GEPscience_bd_massSpec_CaireenSrfLandedPoles_00 // Cold-stored molecules appear in faint, tidy lines; the data feels like a message in a bottle, drifting slowly back toward home.

        SironaFlyingLow* = #GEPscience_bd_massSpec_SironaFlyingLow_00 // Hydrogen and helium fill the chamber, with a stubborn methane peak; the readout jitters whenever Sirona's brutal field decides to add extra ions.
        SironaFlyingHigh* = #GEPscience_bd_massSpec_SironaFlyingHigh_00 // The upper air is mostly hydrogen fragments and charged helium; the dim red sunlight and radiation make the spectrum look like it's sparking.
        SironaInSpaceLow* = #GEPscience_bd_massSpec_SironaInSpaceLow_00 // Only a thin whisper of gas reaches the inlet, but it's highly energized; the instrument logs it carefully while the long transmission window crawls open.

        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_AirmedSrfLandedTropicalLowlands_00 // Powdered regolith dominates, with trace volatiles that flash and fade as if the warm side is still leaking its last secrets.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_AirmedSrfLandedTemperateLowlands_00 // Mostly crushed rock and implanted ions; the spectrum is clean enough that every odd peak feels like a message from far away.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_AirmedSrfLandedTropicalMidlands_00 // Sun-baked grains shed sodium and potassium signatures; the analyzer insists this counts as "atmospheric sampling" on a technicality.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_AirmedSrfLandedTemperateMidlands_00 // A steady mineral profile with a faint carbon trace; whatever tinted this surface didn't bother leaving a label.
        AirmedSrfLandedHighlands* = #GEPscience_bd_massSpec_AirmedSrfLandedHighlands_00 // Coarser fragments show stronger metal peaks; the higher ground seems to have taken the impacts personally.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_massSpec_AirmedSrfLandedDarkenedLowlands_00 // The darker soil carries extra carbon compounds and odd sulfur hints; under the red sun, it looks like the ground is quietly smoldering.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_massSpec_AirmedSrfLandedDarkenedMidlands_00 // Dust and trace organics ride together in the spectrum; the library back home will have opinions - eventually.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_massSpec_AirmedSrfLandedDarkenedHighlands_00 // Dark grit overwhelms the inlet and leaves a chemical fingerprint unlike the bright side; the instrument requests a filter and a shorter commute.
        AirmedSrfLandedPoles* = #GEPscience_bd_massSpec_AirmedSrfLandedPoles_00 // Cold-trapped molecules appear as neat little peaks, then vanish as the sampler warms; you save the data before it changes its mind.
        AirmedInSpaceLow* = #GEPscience_bd_massSpec_AirmedInSpaceLow_00 // Airmed contributes little more than dust and sputtered atoms; the mass spec calls it an exosphere and then apologizes for the confidence.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_massSpec_BorvoSrfLandedTropicalCraquelure_00 // Cracked ground dust fills the spectrum, plus a faint methane seep; the planet-moon seems to be exhaling through its fractures.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_massSpec_BorvoSrfLandedTemperateCraquelure_00 // Mineral grains and nitrogen frost signatures mix together; the surface can't decide whether it's rock, ice, or both.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_BorvoSrfLandedTropicalLowlands_00 // Lowland air adds a heavy nitrogen background while the sample adds hydrocarbons; it smells like chemistry with no instructions.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_BorvoSrfLandedTemperateLowlands_00 // Nitrogen, a touch of methane, and lots of fine dust; the instrument logs it as "breathable-ish" and gets scolded by the checklist.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_BorvoSrfLandedTropicalMidlands_00 // Drier air, sharper grit, and a few heavier organics; the red sun's weak light still manages to cook interesting molecules.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_BorvoSrfLandedTemperateMidlands_00 // The spectrum steadies into nitrogen and minerals, with argon as a quiet marker that the sensor is still awake.
        BorvoSrfLandedHighlands* = #GEPscience_bd_massSpec_BorvoSrfLandedHighlands_00 // Thin atmosphere and coarse grains push metal peaks higher; the wind up here feels like it's been traveling a long way.
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_massSpec_BorvoSrfLandedMajorCraters_00 // Excavated material shows stronger metal traces and odd volatiles; whatever hit here left chemistry on the rim.
        BorvoSrfLandedPoles* = #GEPscience_bd_massSpec_BorvoSrfLandedPoles_00 // Cold air concentrates methane and trace condensates; the mass spec reads it like a freezer inventory under a dim red lamp.
        BorvoFlyingLow* = #GEPscience_bd_massSpec_BorvoFlyingLow_00 // Nitrogen dominates with methane and a pinch of argon; the analyzer can't decide if it's tasting frozen air or dusty breath.
        BorvoFlyingHigh* = #GEPscience_bd_massSpec_BorvoFlyingHigh_00 // The air thins and breaks into fragments; methane lines weaken while ionized nitrogen starts creeping up the chart.
        BorvoInSpaceLow* = #GEPscience_bd_massSpec_BorvoInSpaceLow_00 // A ragged halo of nitrogen and methane ions trails off into space; the peaks arrive in bursts between long, quiet comm gaps.

        DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_DamonaSrfLandedTropicalLowlands_00 // Gray dust and silicate fragments dominate; any volatiles present seem embarrassed and hide below the noise floor.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_DamonaSrfLandedTemperateLowlands_00 // A simple mineral profile with a few implanted ions; the readout is so quiet you can almost hear the comm delay.
        DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_DamonaSrfLandedTropicalMidlands_00 // Coarser grains add clearer metal peaks; the surface looks ancient, like it stopped reacting a long time ago.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_DamonaSrfLandedTemperateMidlands_00 // Mostly rock powder with a faint oxidized signature; the analyzer notes "barren confirmed" and saves the file anyway.
        DamonaSrfLandedHighlands* = #GEPscience_bd_massSpec_DamonaSrfLandedHighlands_00 // Sharp, glassy fragments hint at old violence; the mass spec dutifully catalogs the debris like it's still happening.
        DamonaSrfLandedImpactBasin* = #GEPscience_bd_massSpec_DamonaSrfLandedImpactBasin_00 // Impact-melt chemistry stands out - metal-rich dust and unusual trace peaks; the basin still remembers the hit.
        DamonaSrfLandedPoles* = #GEPscience_bd_massSpec_DamonaSrfLandedPoles_00 // Cold traps offer a brief, delicate set of molecular peaks; you transmit them quickly before sunlight and time erase the evidence.
        DamonaInSpaceLow* = #GEPscience_bd_massSpec_DamonaInSpaceLow_00 // Damona sheds a sparse spray of atoms and dust; most of the spectrum is emptiness, and the emptiness is very far from home.

        EponaInSpaceLow* = #GEPscience_bd_massSpec_EponaInSpaceLow_00 // A thin halo of nitrogen fragments and stray methane ions brushes the inlet; the peaks arrive in sleepy bursts under the dim red sun.
        EponaFlyingHigh* = #GEPscience_bd_massSpec_EponaFlyingHigh_00 // Nitrogen dominates, but the upper air is photochemically shredded—odd radicals and ion clusters stack up like static in the signal.
        EponaFlyingLow* = #GEPscience_bd_massSpec_EponaFlyingLow_00 // Mostly nitrogen, with a clean methane shoulder and a quiet argon marker; the analyzer calls it “simple” and then flags three unexplained trace peaks anyway.
        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_EponaSrfLandedTropicalLowlands_00 // Warmer ground releases trapped volatiles—methane, nitrogen, and a faint organic haze—before freezing the sampler’s optimism solid.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_EponaSrfLandedTemperateLowlands_00 // Fine icy grains and salts flood the chamber; the chemistry looks like a frozen sea that never agreed to be liquid.
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_massSpec_EponaSrfLandedTropicalUplands_00 // Thin frost and wind-scoured dust give sharper mineral lines; whatever warmth exists here is still measured in “less cold.”
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_massSpec_EponaSrfLandedTemperateUplands_00 // Rock-and-ice signatures balance out, with argon clinging in tiny amounts; the spectrum feels like it’s been waiting a long time.
        EponaSrfLandedHighlands* = #GEPscience_bd_massSpec_EponaSrfLandedHighlands_00 // Coarser grains boost metal peaks and silicate fragments; the air tastes thin and far away, even from inside a capsule.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_massSpec_EponaSrfLandedGrandPeaks_00 // The peaks shed gritty, metal-rich dust; the mass spec logs it meticulously while the transmission window to home stays stubbornly closed.
        EponaSrfLandedCraters* = #GEPscience_bd_massSpec_EponaSrfLandedCraters_00 // Impact-mixed material shows unexpected volatiles tucked in shadowed grains; the crater floor reads like a sealed pantry.
        EponaSrfLandedVolcanoes* = #GEPscience_bd_massSpec_EponaSrfLandedVolcanoes_00 // Heated vents spike the chart with fresh gases—methane fragments, nitrogen, and strange heavier compounds that suggest a warm interior, briefly saying hello.
        EponaSrfLandedPoles* = #GEPscience_bd_massSpec_EponaSrfLandedPoles_00 // Cold-trapped molecules line up neatly—nitrogen ice, methane traces, and water-rich grains—then fade as the sampler warms and the sun crawls along.

        RosmertaInSpaceLow* = #GEPscience_bd_massSpec_RosmertaInSpaceLow_00 // Mostly emptiness, with occasional sputtered oxygen and sodium flashes kicked off the surface by harsh radiation and long, lonely orbits.
        RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_RosmertaSrfLandedTropicalLowlands_00 // Dark regolith and faint water-ice signatures mix with implanted ions; the readout feels like a letter addressed to “anyone, anywhere.”
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_RosmertaSrfLandedTemperateLowlands_00 // Silicates dominate, with small salt hints and stubborn carbon traces; the analyzer can’t decide if it’s geology or just old debris.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_RosmertaSrfLandedTropicalMidlands_00 // Fine dust produces clean mineral peaks; every so often a volatile fragment appears, then vanishes like it remembered it shouldn’t exist here.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_RosmertaSrfLandedTemperateMidlands_00 // Metal oxides and silicate fragments stack up; the chamber fills with grit that has never known an atmosphere.
        RosmertaSrfLandedHighlands* = #GEPscience_bd_massSpec_RosmertaSrfLandedHighlands_00 // Coarse grains sharpen the spectrum—more metals, fewer volatiles; the high ground reads like it’s been sandblasted by space itself.
        RosmertaSrfLandedPoles* = #GEPscience_bd_massSpec_RosmertaSrfLandedPoles_00 // Shadow-stored frost gives brief, delicate peaks—water and trace nitrogen-bearing fragments—before the sampler’s heat scares them away.

        RAB-58EInSpaceLow* = #GEPscience_bd_massSpec_RAB-58EInSpaceLow_00 // The instrument catches sporadic whiffs of dust and a few volatile fragments; whatever this moonlet is, it’s trying hard not to explain itself.
        RAB-58ESrfLandedLowlands* = #GEPscience_bd_massSpec_RAB-58ESrfLandedLowlands_00 // Mixed rock-and-ice grains flood the inlet; the composition refuses to pick “snowball” or “stone,” so the chart picks both.
        RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_massSpec_RAB-58ESrfLandedEasternHighlands_00 // The eastern ridge dust runs more metal-rich, with sharper silicate lines; it looks like a different story was glued onto this orbit long ago.
        RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_massSpec_RAB-58ESrfLandedWesternHighlands_00 // The western highlands show cleaner ice signatures and lighter volatiles; the mass spec labels it “interesting” and saves extra copies for the long trip home.

        CernunnosInSpaceLow* = #GEPscience_bd_massSpec_CernunnosInSpaceLow_00 // A whisper of sublimated molecules—mostly nitrogen-bearing fragments with faint hydrocarbons—drifts off into the cold, lit by a tired red sun.
        CernunnosSrfLandedTropicalLowlands* = #GEPscience_bd_massSpec_CernunnosSrfLandedTropicalLowlands_00 // “Tropical” still means freezing: nitrogen and methane ices dominate, with dark grains adding a thin organic smear across the spectrum.
        CernunnosSrfLandedTemperateLowlands* = #GEPscience_bd_massSpec_CernunnosSrfLandedTemperateLowlands_00 // Water ice and mixed volatiles show steady peaks; the analyzer reports a “workable inventory,” which is a brave thing to say this far out.
        CernunnosSrfLandedTropicalMidlands* = #GEPscience_bd_massSpec_CernunnosSrfLandedTropicalMidlands_00 // Frosty regolith gives alternating ice and mineral signatures; the chart looks like it’s breathing very slowly.
        CernunnosSrfLandedTemperateMidlands* = #GEPscience_bd_massSpec_CernunnosSrfLandedTemperateMidlands_00 // More silicates appear between the ice peaks, as if the surface is thinning out its winter coat one grain at a time.
        CernunnosSrfLandedHighlands* = #GEPscience_bd_massSpec_CernunnosSrfLandedHighlands_00 // Coarser mineral fragments boost metal traces while the ices retreat; the high ground reads older, drier, and quietly stubborn.
        CernunnosSrfLandedSouthPolarHills* = #GEPscience_bd_massSpec_CernunnosSrfLandedSouthPolarHills_00 // Cold-trapped volatiles cluster in tidy lines; the sampler warms them just enough to prove they’re real.
        CernunnosSrfLandedNorthPole* = #GEPscience_bd_massSpec_CernunnosSrfLandedNorthPole_00 // The north pole spectrum is heavy with nitrogen-rich frost and faint methane; the data packet feels like it takes longer to leave than it does to collect.
	}
}