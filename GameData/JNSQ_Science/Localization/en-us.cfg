        #JNSQscience_bd_soilScoop_KerbinSrfLandedVABTanks_00 = You expose a layered deposit of dust and tire tracks like a geological record of panic. The sample is filed under “normal operations.”
        #JNSQscience_bd_soilScoop_KerbinSrfLandedKSC_00 = The scoop finds a perfectly ordinary soil profile until it uncovers a buried cable sleeve. The sleeve is immediately promoted to “ground feature” and assigned a guard.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedIslandAirfield_00 = The scoop brings up damp sand and salty grit that clumps into stubborn little balls. The sample smells like sea breeze and questionable hangar maintenance.
