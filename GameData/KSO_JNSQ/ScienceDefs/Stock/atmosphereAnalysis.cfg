@EXPERIMENT_DEFINITION:HAS[#id[atmosphereAnalysis]]
{
    %RESULTS
    {
        SunFlyingLowNorthPolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthPolarZone_00 // The analyzer reports mostly ionized hydrogen with a side of helium. It also reports that the “polar breeze” is trying to peel the sensor apart.
        SunFlyingLowNorthSubpolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthSubpolarZone_00 // Hydrogen dominates the readout, helium follows behind, and the rest of the periodic table files a missing-person report.
        SunFlyingLowNorthTemperateZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthTemperateZone_00 // The spectrum is so clean it’s suspicious: hydrogen, helium, and a whole lot of “this is not normal air.”
        SunFlyingLowNorthTropicZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthTropicZone_00 // The intake registers hydrogen and helium plasma. The thermal shielding registers regret.
        SunFlyingLowEquatorialZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowEquatorialZone_00 // Dense, hot, and very charged: hydrogen and helium with enough ionization to make the instrument crackle audibly.
        SunFlyingLowSouthTropicZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthTropicZone_00 // Composition looks steady — hydrogen with a modest helium fraction — while turbulence makes the readings dance like they’re trying to escape.
        SunFlyingLowSouthTemperateZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthTemperateZone_00 // The analyzer keeps trying to label the sample “atmosphere,” then crosses it out and writes “energetic soup.”
        SunFlyingLowSouthSubpolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthSubpolarZone_00 // Hydrogen and helium again, but with sharper particle spikes. Something down there is throwing tantrums into the sky.
        SunFlyingLowSouthPolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthPolarZone_00 // Polar flows load the intake with fast ions. The instrument confirms the mixture as hydrogen, helium, and panic.
        SunFlyingHighNorthPolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthPolarZone_00 // Up here the “air” thins to whispers of hydrogen and helium, but the charged particles still arrive in enthusiastic swarms.
        SunFlyingHighNorthSubpolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthSubpolarZone_00 // The sample is almost pure hydrogen and helium, stretched so thin the analyzer has to average over “a while.”
        SunFlyingHighNorthTemperateZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthTemperateZone_00 // Hydrogen and helium remain the headline. The footnote is a steady stream of ionized particles fleeing outward.
        SunFlyingHighNorthTropicZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthTropicZone_00 // The gases are sparse but energetic; the analyzer logs hydrogen/helium and several pages of warning beeps.
        SunFlyingHighEquatorialZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighEquatorialZone_00 // The outer layers read as hydrogen and helium with a pronounced outflow signature. You may be riding the world’s angriest breeze.
        SunFlyingHighSouthTropicZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthTropicZone_00 // The instrument confirms hydrogen and helium, then quietly notes that the sample is leaving faster than you are.
        SunFlyingHighSouthTemperateZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthTemperateZone_00 // The spectrum is dominated by hydrogen with helium in support. The density is low, but the radiation is not.
        SunFlyingHighSouthSubpolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthSubpolarZone_00 // Hydrogen and helium traces stream past in streaks; the analyzer suggests calling this “wind” instead of “weather.”
        SunFlyingHighSouthPolarZone* = #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthPolarZone_00 // Polar regions show the same hydrogen-helium mix, but with harder particle impacts that make the sensor sound like it’s being sandblasted by light.

        EveSrfLanded* = #JNSQscience_atmosphereAnalysis_EveSrfLanded_00 // The analyzer reports mostly carbon dioxide with a dash of nitrogen. It also reports “do not inhale” in bold.
        EveSrfLanded* = #JNSQscience_atmosphereAnalysis_EveSrfLanded_01 // The pumps labor against the thick air. Filters come back tinted purple and slightly offended.
        EveSrfLanded* = #JNSQscience_atmosphereAnalysis_EveSrfLanded_02 // Trace compounds show up that look eager to corrode something important. You hope that “important” is not you.
        EveSrfLanded* = #JNSQscience_atmosphereAnalysis_EveSrfLanded_03 // The readout is stable, dense, and hot. Eve’s atmosphere is not subtle about any of those.
        EveFlyingLow* = #JNSQscience_atmosphereAnalysis_EveFlyingLow_00 // Low-altitude samples contain plenty of aerosols and droplets. Visibility problems now have a chemical signature.
        EveFlyingLow* = #JNSQscience_atmosphereAnalysis_EveFlyingLow_01 // The intake collects a sticky film almost immediately. The analyzer suggests “cleaning” and “praying”.
        EveFlyingLow* = #JNSQscience_atmosphereAnalysis_EveFlyingLow_02 // Composition remains CO2-rich, but the trace gases spike in pockets like invisible weather.
        EveFlyingLow* = #JNSQscience_atmosphereAnalysis_EveFlyingLow_03 // The sampler registers warm, heavy air with enough reactive chemistry to keep the lab busy for years.
        EveFlyingHigh* = #JNSQscience_atmosphereAnalysis_EveFlyingHigh_00 // Up high, the air thins but the haze persists. The analyzer finds fine particles that refuse to settle.
        EveFlyingHigh* = #JNSQscience_atmosphereAnalysis_EveFlyingHigh_01 // Sun-processed byproducts increase with altitude. The spectrum looks like someone scribbled in the margins.
        EveFlyingHigh* = #JNSQscience_atmosphereAnalysis_EveFlyingHigh_02 // Droplet counts drop, but not to zero. Eve’s clouds are determined to follow you.
        EveFlyingHigh* = #JNSQscience_atmosphereAnalysis_EveFlyingHigh_03 // The upper atmosphere is still mostly CO2 and nitrogen, just colder and meaner about it.
        EveSrfLandedHighlands* = #JNSQscience_atmosphereAnalysis_EveSrfLandedHighlands_00 // Altitude helps only a little; the air is still dense, with extra dust for texture.
        EveSrfLandedHighlands* = #JNSQscience_atmosphereAnalysis_EveSrfLandedHighlands_01 // The analyzer reports fewer heavy vapors, but more abrasive grit. Your suit agrees.
        EveSrfLandedKrakensWell* = #JNSQscience_atmosphereAnalysis_EveSrfLandedKrakensWell_00 // Ion counts jump near the rim and the spectrum grows noisy. The air feels 'wrong' on paper.
        EveSrfLandedKrakensWell* = #JNSQscience_atmosphereAnalysis_EveSrfLandedKrakensWell_01 // The analyzer keeps recalibrating as if the atmosphere is hiding something in the Well.
        EveSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_EveSrfLandedLowlands_00 // The intake struggles; the lowland air is thick, warm, and chemically busy.
        EveSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_EveSrfLandedLowlands_01 // Filters catch oily aerosols that were definitely not in the mission brochure.
        EveSrfLandedMidlands* = #JNSQscience_atmosphereAnalysis_EveSrfLandedMidlands_00 // Readings stabilize here: dense, hot air with a complicated vapor signature.
        EveSrfLandedMidlands* = #JNSQscience_atmosphereAnalysis_EveSrfLandedMidlands_01 // A faint sweet-solvent note shows up again. The science team will argue about it for weeks.
        EveSrfLandedPeaks* = #JNSQscience_atmosphereAnalysis_EveSrfLandedPeaks_00 // Up here the spectrum shows more photochemical byproducts riding the winds.
        EveSrfLandedPeaks* = #JNSQscience_atmosphereAnalysis_EveSrfLandedPeaks_01 // The air teases you by being thinner, yet remains far from breathable.
        EveSrfLandedPoles* = #JNSQscience_atmosphereAnalysis_EveSrfLandedPoles_00 // The analyzer finds cold layers and a stubborn purple haze. Nothing about it suggests breathing.
        EveSrfLandedPoles* = #JNSQscience_atmosphereAnalysis_EveSrfLandedPoles_01 // Tiny crystals ping the intake while the composition stays relentlessly hostile.
        EveSrfLandedShores* = #JNSQscience_atmosphereAnalysis_EveSrfLandedShores_00 // Sea spray coats the intake; the analyzer flags corrosive droplets immediately.
        EveSrfLandedShores* = #JNSQscience_atmosphereAnalysis_EveSrfLandedShores_01 // Humidity spikes and the instrument notes a moisture-rich layer hugging the coastline.
        EveFlyingLowExplodiumSea* = #JNSQscience_atmosphereAnalysis_EveFlyingLowExplodiumSea_00 // Low over the Explodium Sea, vapor signatures rise sharply and refuse to be ignored.
        EveFlyingLowExplodiumSea* = #JNSQscience_atmosphereAnalysis_EveFlyingLowExplodiumSea_01 // Sea spray microdroplets pepper the inlet; the analyzer shouts 'corrosive'.
        EveFlyingLowHighlands* = #JNSQscience_atmosphereAnalysis_EveFlyingLowHighlands_00 // Over the highlands the air dries slightly; dust dominates the intake.
        EveFlyingLowHighlands* = #JNSQscience_atmosphereAnalysis_EveFlyingLowHighlands_01 // The analyzer finds fewer wet droplets but more sharp grit.
        EveFlyingLowKrakensWell* = #JNSQscience_atmosphereAnalysis_EveFlyingLowKrakensWell_00 // Flying low over the Well, ion counts spike and the sampler jitters for no reason.
        EveFlyingLowKrakensWell* = #JNSQscience_atmosphereAnalysis_EveFlyingLowKrakensWell_01 // A narrow unknown line appears in the spectrum; Mission Control asks you to ignore it.
        EveFlyingLowLowlands* = #JNSQscience_atmosphereAnalysis_EveFlyingLowLowlands_00 // Dense lowland air overwhelms the pumps; composition is steady but oppressive.
        EveFlyingLowLowlands* = #JNSQscience_atmosphereAnalysis_EveFlyingLowLowlands_01 // A sticky mist loads the filters until the instrument starts complaining.
        EveFlyingLowMidlands* = #JNSQscience_atmosphereAnalysis_EveFlyingLowMidlands_00 // Midland air carries mixed dust and droplets; the readout wobbles with turbulence.
        EveFlyingLowMidlands* = #JNSQscience_atmosphereAnalysis_EveFlyingLowMidlands_01 // A thin purple haze persists even here, tasting the filters with every sample.
        EveFlyingLowMountains* = #JNSQscience_atmosphereAnalysis_EveFlyingLowMountains_00 // Turbulence shakes the intake; composition jumps with every altitude bump.
        EveFlyingLowMountains* = #JNSQscience_atmosphereAnalysis_EveFlyingLowMountains_01 // Cloud wisps scrape the hull and leave concentrated condensates on the sampler.
        EveFlyingLowPeaks* = #JNSQscience_atmosphereAnalysis_EveFlyingLowPeaks_00 // Skimming the peaks, fast winds produce sharp spikes in the trace-gas readout.
        EveFlyingLowPeaks* = #JNSQscience_atmosphereAnalysis_EveFlyingLowPeaks_01 // Sun-processed chemistry is stronger up here; reactive traces jump out of the spectrum.
        EveFlyingLowPetrolLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingLowPetrolLakes_00 // Over the Petrol Lakes, organic bands dominate the spectrum in an oily chorus.
        EveFlyingLowPetrolLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingLowPetrolLakes_01 // The analyzer flags flammable-looking volatiles and recommends not sparking anything.
        EveFlyingLowPolarLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingLowPolarLakes_00 // Over the Polar Lakes, a cooler layer sits above the liquid like a lid.
        EveFlyingLowPolarLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingLowPolarLakes_01 // Localized vapors rise in narrow columns and show up as neat spikes.
        EveFlyingLowSeaofAkron* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofAkron_00 // The Sea of Akron exhales a sharp solvent signature into the low air.
        EveFlyingLowSeaofAkron* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofAkron_01 // Purple droplets stick to the sampler head and broaden every spectral line.
        EveFlyingLowSeaofBagorah* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofBagorah_00 // Bagorah haze is sticky; filters saturate fast and smell like solvents through the scrubbers.
        EveFlyingLowSeaofBagorah* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofBagorah_01 // The analyzer detects heavy organics and acid traces. You write 'do not inhale' twice.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGhidorah_00 // Ghidorah air shows three competing layers; the spectrum looks braided.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGhidorah_01 // Ratios alternate every few seconds, as if crossing invisible boundaries.
        EveFlyingLowSeaofGigan* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGigan_00 // Gigan air is heavy with suspended droplets; visibility and optimism both drop.
        EveFlyingLowSeaofGigan* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGigan_01 // The sample shows dense aerosols and trace salts; the instrument wheezes politely.
        EveFlyingLowSeaofGojira* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGojira_00 // Gojira samples contain thick fog droplets; the chemistry bands smear together.
        EveFlyingLowSeaofGojira* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGojira_01 // The intake comes back coated in purple film. It still reads 'unsafe'.
        EveFlyingLowSeaofNessus* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofNessus_00 // Nessus air is humid and hazy; droplets linger long after you leave the cloud wisps.
        EveFlyingLowSeaofNessus* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofNessus_01 // The analyzer reports a smooth, uniform mix, like the sea is well-stirred.
        EveFlyingLowSeaofRodan* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofRodan_00 // Rodan winds drive gritty spray; particles rattle the inlet like hail.
        EveFlyingLowSeaofRodan* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofRodan_01 // The analyzer reports a high particulate load and a strangely 'sharp' haze.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofTaniwha_00 // Taniwha produces erratic spikes; intake pressure oscillates like it's nervous.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofTaniwha_01 // The analyzer blames turbulence. You blame the name.
        EveFlyingHighExplodiumSea* = #JNSQscience_atmosphereAnalysis_EveFlyingHighExplodiumSea_00 // Over the Explodium Sea, even high samples keep a sharp vapor fingerprint.
        EveFlyingHighExplodiumSea* = #JNSQscience_atmosphereAnalysis_EveFlyingHighExplodiumSea_01 // Upper haze carries fine droplets from below; they sparkle on the sensor window.
        EveFlyingHighHighlands* = #JNSQscience_atmosphereAnalysis_EveFlyingHighHighlands_00 // Highland updrafts push dust high; gritty aerosols show up even at altitude.
        EveFlyingHighHighlands* = #JNSQscience_atmosphereAnalysis_EveFlyingHighHighlands_01 // The spectrum looks drier here, with fewer big droplets and more fine particulates.
        EveFlyingHighKrakensWell* = #JNSQscience_atmosphereAnalysis_EveFlyingHighKrakensWell_00 // High over the Well, ionization spikes fade but never vanish completely.
        EveFlyingHighKrakensWell* = #JNSQscience_atmosphereAnalysis_EveFlyingHighKrakensWell_01 // The analyzer keeps finding the same narrow anomaly line at the same longitude.
        EveFlyingHighLowlands* = #JNSQscience_atmosphereAnalysis_EveFlyingHighLowlands_00 // From high above the lowlands, local scents fade into a global haze signature.
        EveFlyingHighLowlands* = #JNSQscience_atmosphereAnalysis_EveFlyingHighLowlands_01 // A weak bump hints at vapors rising from below, then vanishes in the noise.
        EveFlyingHighMidlands* = #JNSQscience_atmosphereAnalysis_EveFlyingHighMidlands_00 // Upper winds smear out local differences; the readout becomes monotonously consistent.
        EveFlyingHighMidlands* = #JNSQscience_atmosphereAnalysis_EveFlyingHighMidlands_01 // The analyzer maps layered hazes stacked like pancakes.
        EveFlyingHighMountains* = #JNSQscience_atmosphereAnalysis_EveFlyingHighMountains_00 // Mountain convection lofts condensates; the analyzer catches a concentrated plume.
        EveFlyingHighMountains* = #JNSQscience_atmosphereAnalysis_EveFlyingHighMountains_01 // Thin air, strong winds, and a constant dusting of purple haze across the intake.
        EveFlyingHighPeaks* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPeaks_00 // At this altitude, UV-processed traces dominate; the analyzer seems delighted.
        EveFlyingHighPeaks* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPeaks_01 // The cloud deck below looks like a purple ocean, and the air above it is still unfriendly.
        EveFlyingHighPetrolLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPetrolLakes_00 // High over the Petrol Lakes, organic bands persist more than they should.
        EveFlyingHighPetrolLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPetrolLakes_01 // Photochemical products form a thin veil that trails downwind.
        EveFlyingHighPolarLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPolarLakes_00 // High above the Polar Lakes, a cool plume stands out against the warm background.
        EveFlyingHighPolarLakes* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPolarLakes_01 // Localized condensates ride upward into the haze and leave neat signatures.
        EveFlyingHighPoles* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPoles_00 // High polar air is thin and cold; the analyzer mostly tastes upper-haze particles.
        EveFlyingHighPoles* = #JNSQscience_atmosphereAnalysis_EveFlyingHighPoles_01 // Trace gases look cleaner here, until a purple cloud sheet slides underneath.
        EveFlyingHighSeaofAkron* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofAkron_00 // Akron contributes a narrow vapor signature that survives into the upper air.
        EveFlyingHighSeaofAkron* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofAkron_01 // You sample a thin, reactive haze that burns off quickly in sunlight.
        EveFlyingHighSeaofBagorah* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofBagorah_00 // Bagorah contributes heavy aerosols that linger in the upper haze long after you pass.
        EveFlyingHighSeaofBagorah* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofBagorah_01 // The analyzer flags long-chain compounds and suggests washing the instrument.
        EveFlyingHighSeaofGhidorah* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGhidorah_00 // Ghidorah's upper air is layered in threes; the analyzer draws three clean bands.
        EveFlyingHighSeaofGhidorah* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGhidorah_01 // Ratios oscillate with altitude, as if sampling three different skies.
        EveFlyingHighSeaofGigan* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGigan_00 // Gigan sends heavy aerosols upward; the high-air sample is unusually cloudy.
        EveFlyingHighSeaofGigan* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGigan_01 // Droplet sizes trend larger; the analyzer calls it 'aggressive condensation'.
        EveFlyingHighSeaofGojira* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGojira_00 // Gojira haze is thick and reflective; the spectrum is smeared by droplets.
        EveFlyingHighSeaofGojira* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGojira_01 // A persistent film forms on the intake; you scrape it off and pretend it's fine.
        EveFlyingHighSeaofNessus* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofNessus_00 // Nessus stays uniform from above: smooth haze and very few surprises in the sample.
        EveFlyingHighSeaofNessus* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofNessus_01 // The analyzer reports steady composition with a high droplet fraction.
        EveFlyingHighSeaofRodan* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofRodan_00 // Rodan's upper air carries wind-blown dust; the sample is gritty even here.
        EveFlyingHighSeaofRodan* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofRodan_01 // The analyzer sees dry layers stacked over moist ones, like weather with attitude.
        EveFlyingHighSeaofTaniwha* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofTaniwha_00 // Even high up, Taniwha gives intermittent spikes, like the atmosphere is hiccuping.
        EveFlyingHighSeaofTaniwha* = #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofTaniwha_01 // The instrument records a repeating wave in composition and refuses to explain it.
        EveFlyingHighShores* = #JNSQscience_atmosphereAnalysis_EveFlyingHighShores_00 // Coastal plumes rise to the cloud deck; salt-like particles register faintly.
        EveFlyingHighShores* = #JNSQscience_atmosphereAnalysis_EveFlyingHighShores_01 // The analyzer detects a moisture-rich layer lingering above the shoreline.

        KerbinSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedLowlands_00 // Humidity is high and the sensor keeps fogging up. The air is thick with the scent of warm plants.
		KerbinSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedLowlands_01 // The analyzer calls it "nominal" but also "sticky". You decide both can be true.
        KerbinSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedLowlands_02 // It detects river mist, soil smell, and just a hint of snack crumbs in the wind. Home, confirmed.
		KerbinSrfLandedAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridLowlands_00 // Mostly dry air with a lot of fine dust. The intake starts coughing like an old engine.
		KerbinSrfLandedAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridLowlands_01 // Trace salts and silicates dominate the sample; you tap the housing and a small dune falls out.
        KerbinSrfLandedAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridLowlands_02 // Dust and hot, thin air dominate the sample. The only moisture is the sweat in your helmet.
		KerbinSrfLandedAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridMountains_00 // Oxygen is lower and winds are higher. The analyzer has to be held down so it doesn't become a glider.
		KerbinSrfLandedAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridMountains_01 // The sample looks clean until you see the abrasive grit stuck to every surface. Mountain air, now with extra sand.
        KerbinSrfLandedAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridMountains_02 // The analyzer confirms oxygen and nitrogen in the expected proportions, but with very low water content at this altitude.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_00 // Salty sea air mixed with a faint whiff of scorched propellant. The analyzer calls it "celebratory contamination".
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_01 // Trace fuels, sea spray, and something that might be snack crumbs. This island really does welcome you back.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_02 // The analyzer reports nitrogen, oxygen, argon… and a faint whiff of jet exhaust. You call it “infrastructure.”
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_03 // The sample contains salt spray, scorched ablator residue, and an alarming amount of cheering.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_04 // Trace rocket exhaust hangs in the breeze. Recovery crews are definitely nearby.
		KerbinFlyingLowLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowLowlands_00 // The sampler draws in heavy, humid air. Condensation forms inside the chamber faster than you can wipe the window.
		KerbinFlyingLowLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowLowlands_01 // The analyzer reports a thick layer of water vapor and organics. You can almost hear the mosquitoes cheering.
		KerbinFlyingHighLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighLowlands_00 // Up here the humidity drops, but the analyzer still spots a rising plume of moisture from the warm lowlands.
		KerbinFlyingHighLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighLowlands_01 // The mix is calm and uniform, with just enough haze to remind you the ground is still doing evaporation down there.
		KerbinFlyingLowAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowAridLowlands_00 // Dust grains ping the intake like tiny bullets. The analyzer flags "high particulate content" and "poor life choices".
		KerbinFlyingLowAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowAridLowlands_01 // The air is hot, thin, and full of sand. The sensor needs a bath and maybe an apology.
		KerbinFlyingHighAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighAridLowlands_00 // From higher altitude, the dust becomes a broad veil. The analyzer logs a faint, planet-sized sand haze.
		KerbinFlyingHighAridLowlands* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighAridLowlands_01 // The gas mix is mostly normal, but the sample carries a persistent dryness that makes your lips crack in sympathy.
		KerbinFlyingLowAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowAridMountains_00 // Turbulence shakes the analyzer so hard the graph looks like modern art. The air is thin and the dust is stubborn.
		KerbinFlyingLowAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowAridMountains_01 // The sample is crisp, cold, and gritty. You would call it refreshing if it stopped scratching the sensor lens.
		KerbinFlyingHighAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighAridMountains_00 // The analyzer spots wispy high-altitude dust and strong wind shear above the rugged peaks.
		KerbinFlyingHighAridMountains* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighAridMountains_01 // The mix is cleanest here, except for fine particles that seem determined to reach space on their own.
		KerbinFlyingLowGreatLake* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowGreatLake_00 // The sample is damp and surprisingly fresh; only a light trace of minerals rides along with the mist.
		KerbinFlyingLowGreatLake* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowGreatLake_01 // Humidity spikes as you skim the lake. The analyzer records droplets, aerosols, and a faint algae smell.
		KerbinFlyingHighGreatLake* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighGreatLake_00 // From up high the lake contributes a cool plume of moisture. The analyzer notes a tidy, localized humidity layer.
		KerbinFlyingHighGreatLake* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighGreatLake_01 // The gas mix is normal, but the water vapor signature is strong enough to draw a little cloud right under you.
		KerbinFlyingLowInlandWater* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowInlandWater_00 // The intake gulps moist air with very little salt.
		KerbinFlyingLowInlandWater* = #JNSQscience_atmosphereAnalysis_KerbinFlyingLowInlandWater_01 // Spray and mist coat the sensor. The sample includes water droplets and a hint of muddy shoreline.
		KerbinFlyingHighInlandWater* = #JNSQscience_atmosphereAnalysis_KerbinFlyingHighInlandWater_00 // Moisture from the inland waters rises in thin sheets. The analyzer maps it like invisible rivers in the sky.
