        #JNSQscience_barometerScan_DunaSrfLandedIceCaps_00 = La lancetta sta un filo più in alto del previsto. Il ghiaccio polare in sublimazione sta immettendo silenziosamente un po' di gas extra nell'aria locale.
        #JNSQscience_barometerScan_DunaSrfLandedIceCaps_01 = Un improvviso rialzo di pressione colpisce il sensore, poi svanisce. Qualcosa sotto la brina ha appena "espirato" e ha fatto finta di niente.
        #JNSQscience_barometerScan_DunaSrfLandedRareCraters_00 = Giù nel punto basso del cratere, la pressione sale di una quantità minuscola ma misurabile. Duna ti ricompensa con la versione più sottile possibile di "aria più spessa".
        #JNSQscience_barometerScan_DunaSrfLandedRareCraters_01 = La lettura suggerisce che qui potresti quasi gonfiare un paracadute. Suggerisce anche che non dovresti comunque provare a respirare.
        #JNSQscience_barometerScan_DunaSrfLandedVoronoiCraters_00 = La pressione oscilla in piccoli impulsi regolari mentre la polvere sfreccia sul terreno bucherellato. Il barometro lo registra: tu fulmini con lo sguardo quel motivo a terra.
        #JNSQscience_barometerScan_DunaSrfLandedVoronoiCraters_01 = Un lieve effetto da conca spinge la pressione verso l'alto, poi si ferma. Persino l'"aria extra" di Duna sembra avere un budget rigidissimo.
        #JNSQscience_barometerScan_DunaSrfLandedNotableCraters_00 = Il cratere fa da scodella, intrappolando aria leggermente più densa vicino al fondo. Il sensore finalmente ha qualcosa da misurare oltre a "quasi niente".
        #JNSQscience_barometerScan_DunaSrfLandedNotableCraters_01 = Una lieve raffica gira attorno al bordo e il barometro sussulta. È la cosa più vicina a un meteo che si possa chiamare "sicuro di sé".
        #JNSQscience_barometerScan_DunaSrfLandedExoticCraters_00 = L'aria fredda sprofonda nel cratere e la pressione sale più di quanto ti aspetteresti su Duna. Lo strumento sembra soddisfatto delle cifre extra.
        #JNSQscience_barometerScan_DunaSrfLandedExoticCraters_01 = Quando la temperatura scende, la pressione sale, poi si allenta di nuovo. Il cratere sta facendo un lento ciclo giornaliero di "respiro".
        #JNSQscience_barometerScan_DunaSrfLandedTrenches_00 = Il fondo della trincea è abbastanza in basso che l'atmosfera sembra quasi sostanziale (per gli standard di Duna). La curva di pressione finalmente sembra una curva.
        #JNSQscience_barometerScan_DunaSrfLandedTrenches_01 = Venti che ululano lungo il taglio generano piccoli picchi netti sulla lettura. La trincea trasforma aria sottile in aria rumorosa.
        #JNSQscience_barometerScan_DunaSrfLandedMountains_00 = La lettura cala con la quota finché il barometro sta per lo più misurando il proprio ottimismo. L'aria sottile diventa più sottile.
        #JNSQscience_barometerScan_DunaSrfLandedMountains_01 = Una breve calma rende la traccia di pressione una linea dritta. Registri i dati e anche il silenzio.
        #JNSQscience_barometerScan_DunaSrfLandedVolcano_00 = La pressione sta vicino alla media, ma il suolo caldo agita piccole correnti ascensionali che fanno tremare la lancetta. Il pianeta non sta fermo per una base pulita.
        #JNSQscience_barometerScan_DunaSrfLandedVolcano_01 = Polvere fine e granulosa picchietta ripetutamente l'aspirazione e la lettura sfarfalla. Il barometro insiste che è un "evento transitorio": tu lo chiami "Duna".
        #JNSQscience_barometerScan_IkeSrfLanded_00 = Il barometro segnala con orgoglio uno "zero" incrollabile, con brevi picchi solo quando sollevi polvere proprio davanti all'aspirazione.
        #JNSQscience_barometerScan_IkeSrfLanded_01 = Esegui la scansione di pressione due volte, poi una terza per scaramanzia. Ike insiste ancora che qui non c'è assolutamente nulla da respirare.
