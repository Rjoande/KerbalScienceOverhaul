@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        DunaInSpaceHigh* = #DSS_MarsOne_crewReport_DunaInSpaceHigh_00 // Public log: Cruise phase successful. The red planet is in view, and confidence remains high across all mission elements.
        DunaInSpaceHigh* = #DSS_MarsOne_crewReport_DunaInSpaceHigh_01 // Private note: The brochures promised margins. The console promises beeping. We are quietly rooting for the beeping.

        DunaInSpaceLow* = #DSS_MarsOne_crewReport_DunaInSpaceLow_00 // Public log: Duna orbit achieved. Surface operations are proceeding according to plan. The team is excited to begin the next phase.
        DunaInSpaceLow* = #DSS_MarsOne_crewReport_DunaInSpaceLow_01 // Private note: We keep saying “according to plan” because it sounds like a plan exists. Landing fuel says otherwise.

        DunaSrfLanded* = #DSS_MarsOne_crewReport_DunaSrfLanded_00 // Public log: Touchdown confirmed. Hab systems are stable, and the crew is establishing a sustainable surface routine.
        DunaSrfLanded* = #DSS_MarsOne_crewReport_DunaSrfLanded_01 // Private note: Everything is red, including the filters. We can make this work, assuming the spare parts don’t get any ideas.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_00 // Public log: First EVA on Duna completed. Surface stability is good, and crew mobility is within predicted limits.
        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_01 // Private note: The suit works. The dust works harder. It’s already in places we didn’t know existed.

        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_02 // Public log: Hab exterior inspection shows nominal performance. The environment is manageable with proper procedures.
        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_03 // Private note: “Proper procedures” currently includes brushing orange sand off everything, including our optimism.

        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_04 // Public log: Communications check successful. Visual conditions are clear, and the landscape offers excellent survey opportunities.
        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_05 // Private note: The horizon is beautiful in a “no ride home” sort of way. We waved at it anyway.

        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_06 // Public log: Equipment deployment progressing smoothly. Resource plans remain on schedule.
        DunaSrfLanded* = #DSS_MarsOne_evaReport_DunaSrfLanded_07 // Private note: The checklist says “deploy.” The hardware says “maybe later.” We’re negotiating politely with a wrench.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_bioexp]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_00 // Public log: Biological exposure test initiated. Samples remain sealed, stable, and fully within expected parameters.
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_01 // Private note: “Expected parameters” were written by someone who assumed we’d have replacements. We do not have replacements.

        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_02 // Public log: Growth chamber deployed successfully. Environmental control appears adequate for the planned observation window.
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_03 // Private note: The chamber is a tiny, expensive promise. We are now responsible for keeping the promise alive.

        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_04 // Public log: Nutrient medium and control samples are behaving normally. No contamination detected at this time.
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_05 // Private note: If anything contaminates anything, the press release will call it “unexpected adaptation.”

        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_06 // Public log: Exposure tray opened briefly. Surface dust interaction recorded for later lab review.
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_07 // Private note: Duna dust found the tray instantly, like it has a subscription. It’s probably in the sample labels now.

        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_08 // Public log: Bio-monitor readings remain nominal. The experiment continues to validate mission sustainability projections.
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_09 // Private note: The projections assume “resupply” is a real word and not a bedtime story.

        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_10 // Public log: Long-term viability test ongoing. Initial results suggest controlled biology can operate under local conditions.
        DunaSrfLanded* = #DSS_MarsOne_bd_bioexp_DunaSrfLanded_11 // Private note: Controlled biology, yes. Controlled logistics, no. We’re running an experiment inside an experiment.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_00 // Official image set: “First Steps.” Framing is excellent, shadows are dramatic, and the landing site looks exactly as advertised.
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_01 // Private caption: The lens keeps fogging from our breath. It’s not in the brochure draft.

        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_02 // Official image set: Habitat exterior survey complete. All panels appear secure and operations are proceeding on schedule.
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_03 // Private caption: The camera doesn’t record the part where we hold a panel in place while someone says “just one more shot.”

        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_04 // Official image set: Panorama stitched successfully. Terrain looks suitable for expansion and future surface activity.
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_05 // Private caption: The panorama also stitched in our spare parts pile. We cropped it out for morale reasons.

        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_06 // Official image set: Sample sites documented. Dust patterns and soil texture captured for later analysis.
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_07 // Private caption: Dust patterns are “everywhere.” The camera now has its own dust patterns.

        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_08 // Official image set: Crew portrait session completed. Everyone appears confident and ready for the mission ahead.
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_09 // Private caption: We practiced confident faces until the suit speakers stopped picking up the sighs.

        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_10 // Official image set: Sunset sequence recorded. A fitting symbol of a bold new chapter in exploration.
        DunaSrfLanded* = #DSS_MarsOne_bd_camera_DunaSrfLanded_11 // Private caption: It’s beautiful. It also reminds us the calendar keeps moving even when the return plan doesn’t.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_cosmicRay]]
{
    %RESULTS
    {
        DunaInSpaceLow* = #DSS_MarsOne_bd_cosmicRay_DunaInSpaceLow_00 // Public log: Cosmic ray counts are within mission tolerances. Shielding performance is considered adequate for continued operations.
        DunaInSpaceLow* = #DSS_MarsOne_bd_cosmicRay_DunaInSpaceLow_01 // Private note: “Adequate” is a comforting word. The detector disagrees in a very energetic way.

        DunaSrfLanded* = #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_00 // Public log: Surface radiation survey complete. Readings remain stable across the immediate area of the habitat.
        DunaSrfLanded* = #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_01 // Private note: The ground helps a little. The sky makes up the difference. We’re starting to appreciate thick walls.
        
        DunaSrfLanded* = #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_00 // Public log: Long-duration exposure test started. Data will refine projections for extended habitation.
        DunaSrfLanded* = #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_01 // Private note: The projections were optimistic. The particles are not interested in our optimism.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_drill]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_MarsOne_bd_drill_DunaSrfLanded_00 // The drill bites into crusty regolith, then suddenly chatters like it found something harder. The chips come up darker and cold to the touch, possibly the ice everyone promised.
        DunaSrfLanded* = #DSS_MarsOne_bd_drill_DunaSrfLanded_01 // You punch deeper, expecting clean ice. Instead you get a stubborn, dusty frost that clings to everything and melts into an unhelpful paste. “Water confirmed” is technically true, if you squint.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_hydrometer]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_00 // The hydrometer insists there’s hydrogen down here. Mission Control calls it “ice confirmed.” The crew calls it “maybe, eventually, if we can reach it.”
        DunaSrfLanded* = #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_01 // You map a faint moisture signature that looks fantastic on a chart. In reality, it’s a thin, stingy layer that feels like it was rationed by the planet itself.
        DunaSrfLanded* = #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_02 // Readings spike near a colder patch of ground. The numbers are hopeful, but the margins are tiny—exactly like the mission plan.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[sspxPlantGrowth]]
{
    %RESULTS
    {
        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 // Public log: Germination cycle initiated. Early sprout counts match projections and indicate strong potential for sustained surface cultivation.
        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 // Private note: The sprouts look brave. So do we. Both are running on a schedule written by people who aren’t here.

        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 // Public log: Growth chamber humidity and light levels remain within nominal bands. Leaf development is proceeding without major anomalies.
        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 // Private note: “Nominal” means the heater only clicks ominously sometimes. We took turns staring at it until it behaved.

        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 // Public log: Regolith amendment trial underway. Preliminary readings suggest workable nutrient uptake under controlled conditions.
        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 // Private note: The soil is mostly “dust” and “regret.” We’re teaching plants to ignore both.

        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 // Public log: Water-use efficiency test shows improved recovery in the closed loop system. Resource planning remains viable.
        DunaSrfLanded* = #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 // Private note: The loop is closed because it has to be. Every drop has a job, and half the jobs are panic-related.
    }
}