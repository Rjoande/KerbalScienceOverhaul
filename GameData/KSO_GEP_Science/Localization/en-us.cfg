        #GEPscience_bd_SiteSurvey_CaireenSrfLandedMidlands_00 = The midlands roll in gentle waves that would be pretty if the comm delay didn’t make every correction feel late. You map a hop-by-hop route and label it “please don’t trip.”
        #GEPscience_bd_SiteSurvey_CaireenSrfLandedHighlands_00 = From the highlands, Sucellus fills the sky like a silent supervisor, and the horizon drops away fast in low gravity. The survey recommends short EVAs and very firm tether policies.
        #GEPscience_bd_SiteSurvey_CaireenSrfLandedPoles_00 = The poles are bright, brittle-looking, and dusted with something that refuses to behave like snow. You approve a site for sampling with the note: “touch lightly, leave quickly.”

        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTropicalLowlands_00 = Targeted frames show a smooth-looking plain that turns out to be a quilt of scars under Grannus’ dim red light. The site is “acceptable,” with the usual warning about comm delays making panic unproductive.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTemperateLowlands_00 = The camera picks out subtle ripples and shallow trenches that the eye keeps missing in the two-toned glare. You mark a landing ellipse and write: “trust instruments, not vibes.”
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTropicalMidlands_00 = Ridges throw long shadows that refuse to match your intuition this far from home. The survey recommends approaching from the sunward side and keeping the antenna pointed like it’s your job.
