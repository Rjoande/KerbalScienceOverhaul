        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_09 // The temperature in orbit low around the Mun is much as that of outer space. Perhaps because technically it's outer space.
        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_10 // Temperatures here are well within expectations. Still, it's better to have the hard data to confirm.
