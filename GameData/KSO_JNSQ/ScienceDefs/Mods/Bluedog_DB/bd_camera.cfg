@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_bd_camera_SunFlyingLow_00 // The camera peers into a boiling haze of light and heat-shimmer. The image resolves into nothing but glare and a warning icon.
		SunFlyingHigh* = #JNSQscience_bd_camera_SunFlyingHigh_00 // You snap a wide shot of the Sun’s upper layers. Wispy streamers and rippling fronts smear across the frame as the optics struggle to keep up.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_camera_SunInSpaceLowNorthPolarZone_00 // The polar region shows tight whorls of glowing filaments. The camera insists this is “normal weather.”
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_camera_SunInSpaceLowNorthSubpolarZone_00 // A chain of darker freckles marches around the zone. You try to focus; the autofocus files a complaint.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_camera_SunInSpaceLowNorthTemperateZone_00 // The surface resolves into a bubbling, granular texture. Exposure control is now mostly optimism.
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_camera_SunInSpaceLowNorthTropicZone_00 // Bright loops arc over the horizon for a heartbeat before the sensor gives up and floods white.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_camera_SunInSpaceLowEquatorialZone_00 // A wavering belt cuts across the frame. You can’t tell if it’s rotation, vibration, or both arguing.
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_camera_SunInSpaceLowSouthTropicZone_00 // Sparkling knots pepper the view, then the camera helpfully suggests you “consider pointing elsewhere.”
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_camera_SunInSpaceLowSouthTemperateZone_00 // You catch a moment of relative calm, then streaks crawl across the image like the pixels are melting.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_camera_SunInSpaceLowSouthSubpolarZone_00 // Limb shadows make the surface look layered and deep. Mission Control asks you not to name the layers.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_camera_SunInSpaceLowSouthPolarZone_00 // The polar glow forms a neat ring in the photo. The next frame is pure white and smells expensive.

        MohoSrfLandedPoles* = #JNSQscience_bd_camera_MohoSrfLandedPoles_00 // You photograph the polar ground from the lander. Half the frame is razor-edged shadow, the other half is pure glare.
		MohoInSpaceLowPoles* = #JNSQscience_bd_camera_MohoInSpaceLowPoles_00 // From low orbit, the poles look scraped clean, with shadows that stay sharp even as everything else washes out.
		MohoSrfLandedLowlands* = #JNSQscience_bd_camera_MohoSrfLandedLowlands_00 // The lowlands come out flat and overexposed, like the planet is trying to erase its own details.
		MohoInSpaceLowLowlands* = #JNSQscience_bd_camera_MohoInSpaceLowLowlands_00 // The camera maps broad, pale basins and thin dark seams. The contrast curve is basically a cliff.
		MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_camera_MohoSrfLandedPolarIceCraters_00 // In the crater shade, faint sparkles show up where nothing should sparkle. You take extra shots, just in case.
		MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_camera_MohoInSpaceLowPolarIceCraters_00 // The crater floors stay stubbornly dark, but a few pixels glint as you pass overhead—like the rock is hiding something reflective.
		MohoSrfLandedHighlands* = #JNSQscience_bd_camera_MohoSrfLandedHighlands_00 // The highlands look baked and brittle up close. Fine dust clings to the lens housing like it wants a ride home.
		MohoInSpaceLowHighlands* = #JNSQscience_bd_camera_MohoInSpaceLowHighlands_00 // Ridges and plateaus cast long, clean shadows. The surface looks carved rather than worn.
		MohoSrfLandedMidlands* = #JNSQscience_bd_camera_MohoSrfLandedMidlands_00 // The midlands photograph as endless fractured plates. Every crack seems to point toward the Sun.
		MohoInSpaceLowMidlands* = #JNSQscience_bd_camera_MohoInSpaceLowMidlands_00 // The midlands form a messy patchwork of light and dark. Your “simple survey” becomes a mosaic project.
		MohoSrfLandedCraters* = #JNSQscience_bd_camera_MohoSrfLandedCraters_00 // The crater wall fills the frame in harsh light. The camera can’t decide if it’s terrain or a solar flare.
		MohoInSpaceLowCraters* = #JNSQscience_bd_camera_MohoInSpaceLowCraters_00 // Craters stack on craters in the images, each rim throwing a knife-thin shadow. There’s barely any “flat” left.
		MohoSrfLandedExoticCraters* = #JNSQscience_bd_camera_MohoSrfLandedExoticCraters_00 // The crater material photographs with odd tones that don’t match the rest of Moho. Calibration says you’re fine; your eyes disagree.
		MohoInSpaceLowExoticCraters* = #JNSQscience_bd_camera_MohoInSpaceLowExoticCraters_00 // The camera catches pockets of unusual coloration around certain craters, as if something different splashed up from below.
		MohoSrfLandedRareCraters* = #JNSQscience_bd_camera_MohoSrfLandedRareCraters_00 // This crater’s texture looks wrong in a very specific way. You take a careful series, then stop looking at it too closely.
		MohoInSpaceLowRareCraters* = #JNSQscience_bd_camera_MohoInSpaceLowRareCraters_00 // A few craters stand out with geometry that’s almost too neat. The images feel like they’re demonstrating a point.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_camera_MohoSrfLandedVoronoiCraters_00 // Up close, the ground breaks into repeating cells like cracked glaze. The pattern seems to continue past the edges of the shot.
		MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_camera_MohoInSpaceLowVoronoiCraters_00 // From orbit, the cratering resolves into a tiled network. The camera’s compression algorithm gives up and saves everything.
		MohoSrfLandedNotableCraters* = #JNSQscience_bd_camera_MohoSrfLandedNotableCraters_00 // You frame the “notable” crater as instructed. The result is a perfect postcard of heat, dust, and regret.
		MohoInSpaceLowNotableCraters* = #JNSQscience_bd_camera_MohoInSpaceLowNotableCraters_00 // Mission Control asks for a panorama. You provide a long, sweaty look at the most photogenic hole on the planet.
        MohoSrfLandedPeaks* = #JNSQscience_bd_camera_MohoSrfLandedPeaks_00 // The peaks blaze in direct sunlight while the valleys go pitch-black. It’s the first time you’ve seen a landscape with no middle ground.
		MohoInSpaceLowPeaks* = #JNSQscience_bd_camera_MohoInSpaceLowPeaks_00 // Spines and summits catch the light like broken glass. The camera keeps dimming itself as if it’s being scolded.

        EveSrfLandedMountains* = #JNSQscience_bd_camera_EveSrfLandedMountains_00 // The mountains rise like dark islands in a purple sky. Every shadow looks deeper than it should.
		EveSrfLandedShores* = #JNSQscience_bd_camera_EveSrfLandedShores_00 // The shoreline is a hard boundary between violet surf and even more violet land. The camera keeps trying to color-correct it into nonsense.
		EveSrfLandedKrakensWell* = #JNSQscience_bd_camera_EveSrfLandedKrakensWell_00 // The ground drops away into a bruise-colored hollow. The flash refuses to illuminate the bottom, as if it’s politely declining.

		EveSrfSplashedExplodiumSea* = #JNSQscience_bd_camera_EveSrfSplashedExplodiumSea_00 // The surface gleams with an oily purple sheen. The lens fogs instantly, leaving the horizon as a smear of color and concern.
		EveSrfSplashedShores* = #JNSQscience_bd_camera_EveSrfSplashedShores_00 // A low shot of the surf catches foam that looks almost luminous. The next image includes a warning about “unexpected moisture.”
		EveSrfSplashedPolarLakes* = #JNSQscience_bd_camera_EveSrfSplashedPolarLakes_00 // The lake is dark, still, and far too reflective. You can’t tell if you’re seeing clouds or something watching the clouds.
		EveSrfSplashedPetrolLakes* = #JNSQscience_bd_camera_EveSrfSplashedPetrolLakes_00 // The liquid has a slick, heavy look that makes the camera’s exposure crawl. The air smells like it wants to dissolve the tripod.
		EveSrfSplashedSeaofAkron* = #JNSQscience_bd_camera_EveSrfSplashedSeaofAkron_00 // Ripples roll across a purple plain all the way to the haze. The color is so uniform it feels staged.
		EveSrfSplashedSeaofNessus* = #JNSQscience_bd_camera_EveSrfSplashedSeaofNessus_00 // The waterline looks sharp, then wavers when you blink. The photo comes out perfectly steady anyway.
		EveSrfSplashedSeaofTaniwha* = #JNSQscience_bd_camera_EveSrfSplashedSeaofTaniwha_00 // Waves slap the hull with slow confidence. The camera captures a glossy surface that never seems to sparkle.
		EveSrfSplashedSeaofGigan* = #JNSQscience_bd_camera_EveSrfSplashedSeaofGigan_00 // The sea is a broad sheet of violet with darker streaks beneath. You label them “currents” and move on quickly.
		EveSrfSplashedSeaofRodan* = #JNSQscience_bd_camera_EveSrfSplashedSeaofRodan_00 // The haze turns the far horizon into a soft gradient. Up close, bubbles pop against the lens hood like tiny alarms.
		EveSrfSplashedSeaofGojira* = #JNSQscience_bd_camera_EveSrfSplashedSeaofGojira_00 // The surface looks calm until the wind changes. The photo catches a pattern of ripples that don’t match the gusts.
		EveSrfSplashedSeaofGhidorah* = #JNSQscience_bd_camera_EveSrfSplashedSeaofGhidorah_00 // Multiple wave sets cross at odd angles, as if arguing about which way is forward. The camera records the dispute faithfully.
		EveSrfSplashedSeaofBagorah* = #JNSQscience_bd_camera_EveSrfSplashedSeaofBagorah_00 // The sea reflects the purple sky so cleanly it feels like a mirror. You double-check that you’re not floating upside-down.

		EveInSpaceLowPoles* = #JNSQscience_bd_camera_EveInSpaceLowPoles_00 // Over the poles, the cloud deck tightens into pale spirals. The surface below is only a rumor in the gaps.
		EveInSpaceLowLowlands* = #JNSQscience_bd_camera_EveInSpaceLowLowlands_00 // The lowlands sit under a thick blanket of violet haze. Occasional clearings hint at flat expanses that never quite stay visible.
		EveInSpaceLowMidlands* = #JNSQscience_bd_camera_EveInSpaceLowMidlands_00 // Broken cloud shadows crawl over the midlands. The camera catches a landscape that looks closer than it is.
		EveInSpaceLowHighlands* = #JNSQscience_bd_camera_EveInSpaceLowHighlands_00 // The highlands push up against the haze, dark and jagged. For a moment, the terrain looks like it’s reaching for the orbiter.
		EveInSpaceLowPeaks* = #JNSQscience_bd_camera_EveInSpaceLowPeaks_00 // Needle-like peaks punch through lighter cloud layers. The shot comes out crisp, and that somehow makes it worse.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_camera_EveInSpaceLowExplodiumSea_00 // The sea shows through as a deep, glossy purple patch. Sunlight glints off it like a warning label.
		EveInSpaceLowMountains* = #JNSQscience_bd_camera_EveInSpaceLowMountains_00 // The mountains cast shadows that survive the haze. The contrast makes the range look unreal, like it was drawn on afterward.
		EveInSpaceLowShores* = #JNSQscience_bd_camera_EveInSpaceLowShores_00 // A thin, winding boundary marks where land meets sea. The line is so clean you suspect the planet is mocking your map.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_camera_EveInSpaceLowPolarLakes_00 // The polar lakes appear as dark coins in pale cloud. They vanish behind haze and reappear exactly where you didn’t expect them.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_camera_EveInSpaceLowPetrolLakes_00 // The lakes look heavier than water should look from orbit. The camera’s auto-white-balance gives up and calls it “purple.”
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_camera_EveInSpaceLowSeaofAkron_00 // The sea spreads out like spilled ink under the clouds. You can’t find a shoreline for longer than a heartbeat.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_camera_EveInSpaceLowSeaofNessus_00 // The cloud breaks reveal a smooth violet plane below. The glare looks delayed, like the light is thinking about it first.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_camera_EveInSpaceLowSeaofTaniwha_00 // Subtle bands in the sea show through thin haze. They don’t align with wind patterns, but they do align with your unease.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_camera_EveInSpaceLowSeaofGigan_00 // Dark streaks cross the sea in broad arcs. The camera tags them as “features” and refuses to elaborate.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_camera_EveInSpaceLowSeaofRodan_00 // The sea reflects the cloud tops back at you, doubled and distorted. For a second you can’t tell what’s above and what’s below.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_camera_EveInSpaceLowSeaofGojira_00 // A wide violet patch shifts in tone as you pass overhead. It looks less like water and more like a surface pretending.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_camera_EveInSpaceLowSeaofGhidorah_00 // The haze thins just enough to show intersecting wave patterns. They look organized, like a diagram.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_camera_EveInSpaceLowSeaofBagorah_00 // The sea gleams faintly through purple smog. The highlight follows you longer than it should.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_camera_EveInSpaceLowKrakensWell_00 // A dark depression sits under a swirl of thinner cloud. The camera finds the center immediately, like it already knew where to look.

        GillyInSpaceLowLowlands* = #JNSQscience_bd_camera_GillyInSpaceLowLowlands_00 // You photograph the lowlands from “orbit,” which feels suspiciously like a slow fall. The terrain looks like spilled gravel held together by stubbornness.
		GillyInSpaceLowMidlands* = #JNSQscience_bd_camera_GillyInSpaceLowMidlands_00 // The midlands slide past beneath you in lazy parallax. In the pictures, every boulder throws a shadow big enough to be a landmark.
		GillyInSpaceLowHighlands* = #JNSQscience_bd_camera_GillyInSpaceLowHighlands_00 // The highlands fill the frame with jagged ridges and sharp contrast. The camera catches a horizon that curves so slightly it’s more of a suggestion.

        KerbinSrfLandedMidlands* = #JNSQscience_bd_camera_KerbinSrfLandedMidlands_00 // You snap a photo of rolling green terrain stitched with rivers and roads. It looks ordinary enough to make you homesick.
		KerbinSrfLandedLowlands* = #JNSQscience_bd_camera_KerbinSrfLandedLowlands_00 // The camera captures flat, wet ground and low fog hugging the horizon. The lens comes back with a fine coat of 'local' mud.
		KerbinSrfLandedAridLowlands* = #JNSQscience_bd_camera_KerbinSrfLandedAridLowlands_00 // A dusty plain stretches out in pale browns and tired greens. The autofocus keeps locking onto heat shimmer.
		KerbinSrfLandedAridMidlands* = #JNSQscience_bd_camera_KerbinSrfLandedAridMidlands_00 // Scrubland and broken rock make a mottled pattern under harsh light. The picture feels crunchy, somehow.
		KerbinSrfLandedAridHighlands* = #JNSQscience_bd_camera_KerbinSrfLandedAridHighlands_00 // Sun-bleached ridges cast sharp shadows like someone turned the contrast knob too far. The photo comes out as a perfect geology poster.
		KerbinSrfLandedAridMountains* = #JNSQscience_bd_camera_KerbinSrfLandedAridMountains_00 // Jagged peaks rise out of the dry haze, each one daring the tripod to tip over. The camera records a distant dust devil as a polite blur.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_camera_KerbinSrfLandedWelcomeBackIsland_00 // A small island fills the frame—tracks, splash marks, and a suspiciously familiar parachute in the distance. You label the shot 'home, again.'
		KerbinSrfSplashedShores* = #JNSQscience_bd_camera_KerbinSrfSplashedShores_00 // You photograph the surf at water level. Half the image is foam and glare, the other half is a very wet camera housing.
		KerbinSrfSplashedGreatLake* = #JNSQscience_bd_camera_KerbinSrfSplashedGreatLake_00 // The lake is glassy and calm, reflecting clouds like a mirror. Your wake ruins the symmetry for science.
		KerbinSrfSplashedInlandWater* = #JNSQscience_bd_camera_KerbinSrfSplashedInlandWater_00 // Murky water and reeds frame a surprisingly peaceful shot. Something bumps the hull and the next photo is taken accidentally.
		KerbinSrfSplashedKreenwichSea* = #JNSQscience_bd_camera_KerbinSrfSplashedKreenwichSea_00 // A tidy horizon cuts the frame, as if the sea is trying to look official. The camera insists the water is 'very blue' and moves on.
		KerbinSrfSplashedArcticSea* = #JNSQscience_bd_camera_KerbinSrfSplashedArcticSea_00 // You catch floating ice and a pale sky in the same frame. Frost creeps across the lens between shots like it owns the place.
		KerbinSrfSplashedForemansSea* = #JNSQscience_bd_camera_KerbinSrfSplashedForemansSea_00 // Choppy water peppers the lens with salt spray. The camera keeps taking pictures faster than you can wipe them.
		KerbinSrfSplashedTriangulusSea* = #JNSQscience_bd_camera_KerbinSrfSplashedTriangulusSea_00 // Waves cross in neat angles, making the surface look suspiciously patterned. You take a second shot in case the sea changes its mind.
		KerbinSrfSplashedNorthernSea* = #JNSQscience_bd_camera_KerbinSrfSplashedNorthernSea_00 // The water stretches out under low, grey cloud. It's a very dramatic postcard with very little postcard cheer.
		KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_bd_camera_KerbinSrfSplashedSub-ArcticSea_00 // Slush and dark water mingle in swirling streaks. The camera captures the moment right before your fingers go numb.
		KerbinSrfSplashedEasternSea* = #JNSQscience_bd_camera_KerbinSrfSplashedEasternSea_00 // Sunlight skims the water and turns everything into glitter. The exposure meter fights bravely and loses.
		KerbinSrfSplashedWesternSea* = #JNSQscience_bd_camera_KerbinSrfSplashedWesternSea_00 // The water gleams with long, warm reflections. Every picture looks like a brochure until a wave smacks the side of the craft.
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_camera_KerbinInSpaceLowMidlands_00 // A quilt of greens and greys slides beneath you, broken by winding rivers. The camera makes Kerbin look carefully assembled.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_camera_KerbinInSpaceLowLowlands_00 // Lowlands fade into misty bands where cloud shadows drift like slow bruises. You zoom in and realize how much of 'home' is waterlogged.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_camera_KerbinInSpaceLowAridLowlands_00 // Pale flats and dry channels draw thin lines across the surface. Even from orbit, the terrain looks thirsty.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_camera_KerbinInSpaceLowAridMidlands_00 // Patchy tan uplands meet greener edges in irregular borders. The contrast looks like someone spilled sand across a map.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_camera_KerbinInSpaceLowAridHighlands_00 // Rugged, light-colored ridges catch the sun and throw long shadows. The image comes out crisp enough to make you trust the planet again.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_camera_KerbinInSpaceLowAridMountains_00 // Sharp mountain spines cut through a veil of thin cloud, with dust hazing the valleys. The camera captures the kind of scenery that hurts your landing plans.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_camera_KerbinInSpaceLowGreatLake_00 // A dark inland lake sits like a perfectly poured ink blot. Cloud reflections slide across it as you pass overhead.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_camera_KerbinInSpaceLowInlandWater_00 // Narrow waterways lace through greener land, flashing silver in the sun. The camera keeps framing them like they're trying to spell something.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_camera_KerbinInSpaceLowKreenwichSea_00 // Coastlines curve cleanly around a broad sea, neat enough to be a demonstration diagram. You take a photo before the clouds can ruin it.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_camera_KerbinInSpaceLowArcticSea_00 // The sea near the pole is mottled with ice and open water in swirling patches. The camera's sensor looks cold just watching it.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_camera_KerbinInSpaceLowForemansSea_00 // Whitecaps and cloud shadows make the sea look restless even from orbit. Your picture is mostly texture and momentum.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_camera_KerbinInSpaceLowTriangulusSea_00 // Three distinct cloud bands converge over the sea, making an accidental arrow shape. The camera frames it like it's intentional.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_camera_KerbinInSpaceLowNorthernSea_00 // A broad, dark expanse sits under a heavy cloud deck. The shoreline appears and disappears as if it's being edited live.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_camera_KerbinInSpaceLowSub-ArcticSea_00 // Cold currents draw faint streaks beneath broken cloud. The camera catches slushy margins that look like the sea is fraying.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_camera_KerbinInSpaceLowEasternSea_00 // Morning light turns the water into a bright ribbon along the coast. The highlight follows your orbit like it wants another pass.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_camera_KerbinInSpaceLowWesternSea_00 // Late light softens the sea into deep blues and long shadows. The camera makes it look calm, which you know is a lie.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_camera_KerbinInSpaceLowWelcomeBackIsland_00 // A tiny island dot sits in a wide ocean frame, with a suspiciously straight line across it. You zoom in and decide you didn't see that.

        MunSrfLandedHighlands* = #JNSQscience_bd_camera_MunSrfLandedHighlands_00 // You photograph fractured highland rock. Every shard casts a crisp shadow, like the Mun is rendered in “maximum sharp.”
		MunSrfLandedLowlands* = #JNSQscience_bd_camera_MunSrfLandedLowlands_00 // The lowlands come out as smooth, dusty plains with very few landmarks. It’s a perfect picture of “where did we park?”
		MunSrfLandedPolarIceCraters* = #JNSQscience_bd_camera_MunSrfLandedPolarIceCraters_00 // In the polar crater shade, the camera catches faint sparkles that don’t belong in a place with no air and no mercy.
		MunSrfLandedExoticCraters* = #JNSQscience_bd_camera_MunSrfLandedExoticCraters_00 // The ejecta patterns look oddly streaked and mismatched. The calibration chart insists it’s all the same color anyway.
		MunSrfLandedRareCraters* = #JNSQscience_bd_camera_MunSrfLandedRareCraters_00 // This crater’s rim is unusually clean and round, like it was stamped into the surface instead of blasted out.
		MunSrfLandedVoronoiCraters* = #JNSQscience_bd_camera_MunSrfLandedVoronoiCraters_00 // The ground breaks into repeating polygon tiles. The camera’s compression algorithm quietly panics and saves everything.
		MunSrfLandedNotableCraters* = #JNSQscience_bd_camera_MunSrfLandedNotableCraters_00 // A “notable” crater fills the frame exactly as the checklist demands. Mission Control requests it again “for navigation purposes.”
		MunSrfLandedMountains* = #JNSQscience_bd_camera_MunSrfLandedMountains_00 // Jagged peaks and pitch-black valleys dominate the shot. There is no gentle lighting on the Mun—only decisions.
		MunInSpaceLowHighlands* = #JNSQscience_bd_camera_MunInSpaceLowHighlands_00 // From low orbit, the highlands look like crumpled foil dusted in grey. Shadows draw a relief map you can feel through the screen.
		MunInSpaceLowLowlands* = #JNSQscience_bd_camera_MunInSpaceLowLowlands_00 // Broad, smooth basins slide beneath you like poured powder. The photo makes landing look easy, which is how the Mun gets you.
		MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_camera_MunInSpaceLowPolarIceCraters_00 // Polar craters show dark floors with tiny bright flecks around the rims. You mark the coordinates and pretend it’s routine.
		MunInSpaceLowExoticCraters* = #JNSQscience_bd_camera_MunInSpaceLowExoticCraters_00 // A few crater fields stand out in subtly different tones, as if the Mun patched itself with the wrong rock.
		MunInSpaceLowRareCraters* = #JNSQscience_bd_camera_MunInSpaceLowRareCraters_00 // Several craters are suspiciously symmetrical at this altitude. The camera frames them like targets without being asked.
		MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_camera_MunInSpaceLowVoronoiCraters_00 // The polygon network stretches for kilometers in a neat, unnatural pattern. It looks like the surface was tiled on purpose.
		MunInSpaceLowNotableCraters* = #JNSQscience_bd_camera_MunInSpaceLowNotableCraters_00 // The landmark crater’s shadow makes a clean, bold shape from orbit. It points nowhere helpful, but it sure is memorable.
		MunInSpaceLowMountains* = #JNSQscience_bd_camera_MunInSpaceLowMountains_00 // Mountain ridges throw long shadows across the regolith. The picture makes them look taller than your fuel budget.

        MinmusSrfLandedMidlands* = #JNSQscience_bd_camera_MinmusSrfLandedMidlands_00 // The “midlands” look like someone tried to smooth the mint and quit halfway. The camera captures scuffs, ridges, and a lot of quiet emptiness.
		MinmusSrfLandedBasins* = #JNSQscience_bd_camera_MinmusSrfLandedBasins_00 // Down in the basin, the surface is almost offensively level. The photo makes it look like a frozen spill that decided to become terrain.
		MinmusSrfLandedBrownBasins* = #JNSQscience_bd_camera_MinmusSrfLandedBrownBasins_00 // The basin here has a dingy tint, like the mint has been left out too long. The camera keeps insisting it’s the same material anyway.
		MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_camera_MinmusSrfLandedBrownLowlands_00 // The low ground is darker and dustier than expected, as if the usual frosting has been scraped away. You take several shots and pretend this is normal.
		MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_camera_MinmusSrfLandedBrownMidlands_00 // The midlands shift toward a dull brown-green in the harsh light. The image looks like “Minmus” trying on a disguise.
		MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_camera_MinmusSrfLandedBrownHighlands_00 // Even the high ground has a muted, weathered tone here. The camera captures crisp shadows that make the color change feel deliberate.
		MinmusSrfLandedMountains* = #JNSQscience_bd_camera_MinmusSrfLandedMountains_00 // The mountains are all awkward angles and broken slabs, piled like scoops that fell off the cone. The camera loves it; the landing gear doesn’t.
		MinmusInSpaceLowPoles* = #JNSQscience_bd_camera_MinmusInSpaceLowPoles_00 // The poles show bright patches and long shadows in stark contrast. The camera’s histogram is basically a picket fence.
		MinmusInSpaceLowLowlands* = #JNSQscience_bd_camera_MinmusInSpaceLowLowlands_00 // The lowlands drift beneath you as smooth, pale fields with barely any texture. It’s the kind of scenery that makes you lose your sense of speed.
