@EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_xray_spectrometer]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthPolarZone_00 // The spectrometer records sharp, restless X-ray bursts over the polar zone, like magnetic threads snapping and re-tying themselves.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthPolarZone_01 // The polar spectrum is bright and spiky, with counts that surge without warning. The instrument labels it “energetic.”
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthSubpolarZone_00 // X-ray intensity rises and falls in slow waves, as if the Sun is breathing heat through invisible bands.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthSubpolarZone_01 // A dense forest of lines resolves in the scan; the readout suggests hot plasma doing complicated things on purpose.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTemperateZone_00 // The spectrum steadies into a broad glow with occasional needle-like spikes. Even “calm” here is loud.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTemperateZone_01 // Background counts climb until the detector asks for a break. Mission Control says, “That means it’s working.”
        SunInSpaceLowNorthTropicZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTropicZone_00 // The spectrometer catches frequent micro-bursts, rapid little flashes that add up to a very noisy day.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTropicZone_01 // Line strengths shift quickly along the track, hinting at active regions sliding beneath your orbit.
        SunInSpaceLowEquatorialZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowEquatorialZone_00 // The equatorial band blazes with sustained X-rays and intermittent flares that saturate the plot in a satisfying way.
        SunInSpaceLowEquatorialZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowEquatorialZone_01 // The spectrum looks like a textbook that caught fire. The detector remains professionally impressed.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTropicZone_00 // X-ray emission flickers in clustered patches, as if the Sun is scribbling in heat along this latitude.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTropicZone_01 // A few lines strengthen dramatically, then fade before anyone can brag about predicting them.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTemperateZone_00 // The scan smooths into a broad continuum with short-lived spikes, like sparks thrown off a grinding wheel.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTemperateZone_01 // The instrument logs “stable trend,” immediately followed by “trend no longer stable.”
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthSubpolarZone_00 // Counts climb as you pass over a bright patch, then drop into a quieter glow. The Sun refuses to be uniform.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthSubpolarZone_01 // The spectrum shows hot plasma signatures with just enough variation to start an argument on the ground.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthPolarZone_00 // The polar zone returns intense, sharp features that repeat each pass, as if the Sun keeps a schedule only it can read.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthPolarZone_01 // X-rays spike in sudden bursts; the detector flags them and then politely asks you to stop pointing at the Sun.
        SunInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceHigh_00 // From high over Kerbol, the spectrum becomes a blazing average punctuated by rare, enormous surges that dwarf everything else.
        SunInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_SunInSpaceHigh_01 // The detector spends most of its time counting “all of the X-rays,” then produces a plot that looks suspiciously like a warning label.

        MohoInSpaceLowPoles* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPoles_00 // The scan shows crisp fluorescence from pale regolith with a faint volatile whisper near the noise floor.
        MohoInSpaceLowPoles* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPoles_01 // Clean mineral lines stand out sharply; the poles look chemically tidy compared to the rest of Moho’s scorched crust.
        MohoInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowLowlands_00 // Darker plains damp the light lines and boost heavier ones, as if the lowlands have a more metallic appetite.
        MohoInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowLowlands_01 // X-ray fluorescence maps into broad patches, hinting at thick, baked dust over stubborn bedrock.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPolarIceCraters_00 // Bright rims and shadowed floors split the spectrum in two: rock outside, quiet cold hints within.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPolarIceCraters_01 // The detector catches a muted signature from the crater interiors, like something reflective is hiding under dust.
        MohoInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowHighlands_00 // The highlands punch out strong silicate lines with minimal smearing. Less dust, more honest rock.
        MohoInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowHighlands_01 // Ratios shift across ridges as if layers were peeled back and left exposed for inspection.
        MohoInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowMidlands_00 // A steady baseline breaks into subtle composition waves, suggesting thoroughly churned surface material.
        MohoInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowMidlands_01 // The spectrum repeats with small variations, like impacts have mixed everything just enough to be annoying.
        MohoInSpaceLowCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowCraters_00 // Fresh crater rims glow brighter in X-rays, revealing newly exposed material like a cross-section in chemistry.
        MohoInSpaceLowCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowCraters_01 // Floor and rim disagree strongly in the scan; the crater is proudly showing you what’s underneath.
        MohoInSpaceLowExoticCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowExoticCraters_00 // Line ratios look oddly skewed, implying an unusual blend of melt and foreign impact debris.
        MohoInSpaceLowExoticCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowExoticCraters_01 // The spectrum is messy in an exciting way. Mission Control requests you define “exotic” in triplicate.
        MohoInSpaceLowRareCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowRareCraters_00 // A few sharp spikes stand out like punctuation marks; something here does not match the neighborhood.
        MohoInSpaceLowRareCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowRareCraters_01 // The scan suggests a concentrated deposit mixed into the ejecta. Someone circles it and writes “maybe important.”
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowVoronoiCraters_00 // Repeating crater patterns produce repeating spectral patterns, like the surface is tiled with two mineral recipes.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowVoronoiCraters_01 // Alternating rims and flats trade dominance between signatures. The map looks engineered, which is unsettling.
        MohoInSpaceLowNotableCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowNotableCraters_00 // Strong fluorescence traces a dramatic boundary around the basin, with exposed material shining through the baked coating.
        MohoInSpaceLowNotableCraters* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowNotableCraters_01 // The spectrum shifts in clean steps across the feature, as if Moho laid out labels for you.
        MohoInSpaceLowPeaks* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPeaks_00 // Peaks return the cleanest spikes of the pass—bare rock fluorescing hard under relentless sunlight.
        MohoInSpaceLowPeaks* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPeaks_01 // The detector logs excellent contrast and then complains about how quickly the terrain falls away again.
        MohoInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceHigh_00 // From high orbit, Moho reduces to a hot, rocky average with only broad compositional trends surviving the blur.
        MohoInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_MohoInSpaceHigh_01 // The scan becomes “mostly Moho,” plus a lot of background. The instrument insists the averages still count as science.

        EveInSpaceLowPoles* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPoles_00 // The polar regions return a cold, muted spectrum; the thick air below swallows the softer lines before they can reach you.
        EveInSpaceLowPoles* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPoles_01 // Bright flashes at the limb hint at high-altitude particles, then the ground signature fades back into purple silence.
        EveInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowLowlands_00 // The lowlands fluoresce unevenly, as if the surface is dusted with mixed deposits and then sealed under heavy haze.
        EveInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowLowlands_01 // Broad mineral features smear together through the atmosphere; you can still tell the ground is complicated and stubborn.
        EveInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowMidlands_00 // The midlands produce a steady baseline with occasional sharp spikes—little windows where the air cooperates for a moment.
        EveInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowMidlands_01 // Line ratios drift from pass to pass, like the planet is daring you to claim “representative sampling.”
        EveInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowHighlands_00 // The highlands give cleaner, stronger rock lines; elevation buys you a little clarity against the crushing air.
        EveInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowHighlands_01 // Distinct silicate peaks stand out with surprising confidence. Eve is hostile, but not shy.
        EveInSpaceLowPeaks* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPeaks_00 // Over the tallest peaks the spectrum snaps into focus—sharp mineral spikes punching through the atmospheric filter.
        EveInSpaceLowPeaks* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPeaks_01 // The detector practically sighs with relief: “Finally, less air.” The data team replies: “Finally, more arguments.”
        EveInSpaceLowExplodiumSea* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowExplodiumSea_00 // The scan lights up with odd, energetic features that make the instrument’s safety monitor blink twice.
        EveInSpaceLowExplodiumSea* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowExplodiumSea_01 // The “sea” signature is not water-like at all; the spectrum looks like chemistry with a sense of humor and a waiver.
        EveInSpaceLowMountains* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowMountains_00 // Mountain ridges throw back crisp fluorescence in brief bursts between cloud decks.
        EveInSpaceLowMountains* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowMountains_01 // Strong lines trace exposed material along the slopes, then vanish under a thick atmospheric curtain.
        EveInSpaceLowShores* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowShores_00 // Coastal regions show a split personality: bright mineral edges beside a dull, absorptive sea signal.
        EveInSpaceLowShores* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowShores_01 // The spectrum draws a thin, sharp boundary where land meets liquid. It’s the cleanest line Eve has offered you all day.
        EveInSpaceLowPolarLakes* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPolarLakes_00 // The lakes reflect a soft, flattened spectrum; whatever’s down there keeps its secrets under dense air and cold haze.
        EveInSpaceLowPolarLakes* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPolarLakes_01 // Faint salty hints appear near the shorelines, then dissolve into noise like they were never there.
        EveInSpaceLowPetrolLakes* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPetrolLakes_00 // The low-energy end drops away hard, leaving a heavier, darker fingerprint that feels very “not water.”
        EveInSpaceLowPetrolLakes* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowPetrolLakes_01 // The detector notes unusual absorption patterns over the lakes. Someone writes “smells like trouble” on the graph.
        EveInSpaceLowSeaofAkron* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofAkron_00 // The sea returns a subdued glow with a sharp coastal accent—minerals at the edge, mystery in the middle.
        EveInSpaceLowSeaofAkron* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofAkron_01 // Reflections off the upper haze add a wobbly background; the ocean below remains stubbornly opaque to soft X-rays.
        EveInSpaceLowSeaofNessus* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofNessus_00 // The spectrum steadies into broad features, as if the sea is chemically consistent and emotionally uninterested.
        EveInSpaceLowSeaofNessus* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofNessus_01 // A few bright spikes near the coast suggest sediments or deposits washed in from land. Eve’s oceans keep receipts.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofTaniwha_00 // The scan shows a smooth, heavy signature with intermittent flickers from the atmosphere above.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofTaniwha_01 // The instrument maps subtle gradients across the water, then refuses to guess what they mean without “more funding.”
        EveInSpaceLowSeaofGigan* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofGigan_00 // Thick haze scatters the signal into a soft wash, but the strongest lines still push through like they own the place.
        EveInSpaceLowSeaofGigan* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofGigan_01 // The sea’s signature looks deep and dense, with a coastal rim that reads like ground-up rock stirred into liquid.
        EveInSpaceLowSeaofRodan* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofRodan_00 // The detector catches rhythmic changes as cloud layers pass beneath—your “sea scan” includes a free atmospheric survey.
        EveInSpaceLowSeaofRodan* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofRodan_01 // The waterline is chemically sharp, but the interior is a broad, dark plateau of absorption and unanswered questions.
        EveInSpaceLowSeaofGojira* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofGojira_00 // Strong, heavy-element features dominate; the softer lines are eaten alive by atmosphere and whatever vapor hangs over the sea.
        EveInSpaceLowSeaofGojira* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofGojira_01 // The spectrum looks like it has weight. Mission Control suggests you stop describing data as “menacing.”
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofGhidorah_00 // Multiple broad peaks blend into a complex fingerprint that resists tidy labeling.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofGhidorah_01 // Coastal fluorescence flares briefly, then the sea signature settles back into a thick, dark baseline.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofBagorah_00 // The scan returns a surprisingly uniform signature across wide areas, as if the sea is well-mixed and proud of it.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowSeaofBagorah_01 // A faint edge effect hints at sediments near shore, then disappears into atmospheric scatter.
        EveInSpaceLowKrakensWell* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowKrakensWell_00 // The region below produces an odd contrast: strong local spikes against a muted background, like a scar in the planet’s chemistry.
        EveInSpaceLowKrakensWell* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceLowKrakensWell_01 // The spectrometer flags repeating anomalies on each pass. The flight team responds by pretending they did not read the name.
        EveInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceHigh_00 // From high orbit, Eve reduces to broad, purple-tinted averages; the atmosphere dominates the softer bands and smooths the rest.
        EveInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_EveInSpaceHigh_01 // The detector spends long minutes counting background, then logs Eve’s global signature as “heavy, hot, and unhelpfully confident.”

        GillyInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_GillyInSpaceLowLowlands_00 // The spectrometer teases out a weak, patchy mineral signature. Most of the signal is “tiny lumpy rock, doing its best.”
        GillyInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_GillyInSpaceLowMidlands_00 // Line strengths wobble as the terrain rolls underneath you. Gilly’s uneven surface makes the spectrum look slightly embarrassed.
        GillyInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_GillyInSpaceLowHighlands_00 // A few sharp spikes pop out from brighter ground. Exposed material on the highs fluoresces like it wants to be noticed.
        GillyInSpaceHigh* = #JNSQscience_tantares_xray_spectrometer_GillyInSpaceHigh_00 // From high above, Gilly is mostly background counts with a small, stubborn rocky fingerprint in the middle.

        KerbinInSpaceLowIceCaps* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowIceCaps_00 // The spectrometer catches faint polar X-rays flickering along the edge of the atmosphere. It feels like Kerbin is quietly humming.
        KerbinInSpaceLowIceCaps* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowIceCaps_01 // Hard glare, soft X-rays, and a lot of very cold oxygen. The readout adds: “Do not lick.”
        KerbinInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowHighlands_00 // The spectrum shows a tidy mix of silicates with a sprinkling of “something organic-ish.” Kerbin is showing off again.
        KerbinInSpaceLowHighlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowHighlands_01 // X-ray fluorescence hints at varied rock layers under the rolling terrain. The hills are more complicated than they look.
        KerbinInSpaceLowMountains* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowMountains_00 // Sharp mineral lines spike as you pass over the tallest peaks. The mountains are practically shouting “I’m made of rock!”
        KerbinInSpaceLowMountains* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowMountains_01 // Snowy ridges throw back a clean, bright signature. Mission Control requests you stop calling it “mountain sparkle.”
        KerbinInSpaceLowShores* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowShores_00 // The coastline gives a salty little fingerprint in the spectrum. Seas, sand, and a suspicious amount of “probably snacks.”
        KerbinInSpaceLowShores* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowShores_01 // Shallow waters and wet ground brighten the low-energy end of the scan. The instrument seems pleased with the beach.
        KerbinInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowMidlands_00 // A broad, steady signal suggests uniform terrain with scattered hotspots of “Kerbal activity.” The lab flags it as “very normal.”
        KerbinInSpaceLowMidlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowMidlands_01 // The X-ray map looks like someone spilled a neat pattern of minerals across the plains. Kerbin remains annoyingly well-behaved.
        KerbinInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowLowlands_00 // The lowlands return a smooth, consistent spectrum with occasional metallic flashes. You try not to think about what’s causing them.
        KerbinInSpaceLowLowlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowLowlands_01 // Fluorescence readings suggest rich soils and varied deposits beneath the green. Kerbin’s surface is busy even when it looks calm.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridLowlands_00 // Dusty terrain boosts silicon-rich lines and mutes everything else. The planet is doing its best impression of “dry.”
        KerbinInSpaceLowAridLowlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridLowlands_01 // The spectrometer logs a fine-grained mineral signature consistent with wind-worked ground. It also logs: “Stop shaking the probe.”
        KerbinInSpaceLowAridMidlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridMidlands_00 // A layered spectrum suggests mixed sediments and exposed rock. The arid bands look like they’ve been sandblasted for ages.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridMidlands_01 // X-rays reveal patchy composition changes that match the terrain’s subtle stripes. You name the pattern “Desert Zebra,” for science.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridHighlands_00 // Elevated dry ground shows stronger, cleaner rock lines than the lowlands. Less haze, more geology.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridHighlands_01 // The scan suggests old, worn surfaces with surprisingly uniform minerals. Kerbin is tidier up here.
        KerbinInSpaceLowAridMountains* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridMountains_00 // The arid peaks produce crisp mineral spikes with very little atmospheric interference. It’s like scanning a textbook diagram.
        KerbinInSpaceLowAridMountains* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowAridMountains_01 // Thin air and bare rock make the spectrum easy to read. Mission Control celebrates by immediately asking for “just one more pass.”
        KerbinInSpaceLowGreatLake* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowGreatLake_00 // Water dampens the rock signal, but dissolved salts leave a faint signature behind. The lake is quietly chemistry-ing.
        KerbinInSpaceLowGreatLake* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowGreatLake_01 // The spectrum shifts at the shoreline where wet ground meets dry. The instrument labels it “interesting squishy boundary.”
        KerbinInSpaceLowInlandWater* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowInlandWater_00 // The scan catches soft X-ray reflections off scattered inland waters. The results are mostly calm, like the view.
        KerbinInSpaceLowInlandWater* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowInlandWater_01 // A small bump in the spectrum hints at minerals washed in from surrounding land. Kerbin’s puddles have opinions.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowKreenwichSea_00 // The sea returns a subdued signature with a crisp salty edge near the coast. The spectrometer calls it “briny, but polite.”
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowKreenwichSea_01 // Low-energy X-rays scatter off cloud shadows and waves. You briefly wonder if waves can look smug.
        KerbinInSpaceLowArcticSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowArcticSea_00 // Cold water and ice haze flatten the spectrum, but the boundary lines stay sharp. The polar seas are doing serious science.
        KerbinInSpaceLowArcticSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowArcticSea_01 // A faint signature suggests salty water under a cold surface. Mission Control writes “possible snacks preserved indefinitely” in the margins.
        KerbinInSpaceLowForemansSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowForemansSea_00 // The spectrometer reads a steady marine signature with mild variations, as if the sea is refusing to be dramatic.
        KerbinInSpaceLowForemansSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowForemansSea_01 // Trace elements cluster near the coast in the scan. Erosion is basically free sample delivery.
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowTriangulusSea_00 // The scan draws a neat chemical gradient across the water. Someone at KSC insists it looks “very triangular.”
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowTriangulusSea_01 // Reflected X-rays pulse with changing cloud cover. The ocean keeps photobombing your measurements.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowNorthernSea_00 // The spectrum is clean and cool, with faint salty features. The north is calm, which feels suspicious.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowNorthernSea_01 // The instrument detects subtle differences between open water and coastal shallows. It’s mapping the sea’s “edge behavior.”
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowSub-ArcticSea_00 // Mixed cold-water signatures and intermittent ice reflections make the data messy. The spectrometer calls it “complicated water.”
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowSub-ArcticSea_01 // A cold, salty fingerprint repeats each pass, like the sea is signing its name. You consider framing the plot.
        KerbinInSpaceLowEasternSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowEasternSea_00 // The scan catches broad marine signals with occasional bright flashes from storms. Weather keeps trying to join the experiment.
        KerbinInSpaceLowEasternSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowEasternSea_01 // Dissolved salts and suspended sediments tweak the spectrum near shorelines. Kerbin’s oceans are never just “water.”
        KerbinInSpaceLowWesternSea* = #JNSQscience_tantares_xray_spectrometer_KerbinInSpaceLowWesternSea_00 // The water’s signature is steady, but the coastline adds a sharp mineral accent. The west is putting on a good show.
