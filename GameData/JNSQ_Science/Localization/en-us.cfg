        #JNSQscience_crewReport_HuygenInSpaceHigh_01 = The limb glow is obvious even from here. You log: atmosphere confirmed, patience required.

        #JNSQscience_crewReport_RigaSrfLandedLowlands_00 = The horizon is a low, grey-blue line under a faint haze. Lindor hangs above like a frozen lantern.
