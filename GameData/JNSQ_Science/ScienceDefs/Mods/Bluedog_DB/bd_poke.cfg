@EXPERIMENT_DEFINITION:HAS[#id[bd_poke]]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #JNSQscience_bd_poke_MohoSrfLandedPoles_00 // The surface is brittle and gritty; it cracks before the probe meets stubborn rock.
        MohoSrfLandedLowlands* = #JNSQscience_bd_poke_MohoSrfLandedLowlands_00 // The baked dust compresses into a hard plug around the shaft almost immediately.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_poke_MohoSrfLandedPolarIceCraters_00 // A crunchy, pale layer gives way, then the tip hits something that feels like frozen stone.
        MohoSrfLandedHighlands* = #JNSQscience_bd_poke_MohoSrfLandedHighlands_00 // The ground is sharp and fractured; the probe only manages a shallow, scratchy entry.
        MohoSrfLandedMidlands* = #JNSQscience_bd_poke_MohoSrfLandedMidlands_00 // Fine powder yields politely, then firms up into a dense, heat-cooked pack.
        MohoSrfLandedCraters* = #JNSQscience_bd_poke_MohoSrfLandedCraters_00 // Loose ejecta collapses around the probe; depth increases quickly before resistance ramps up.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_poke_MohoSrfLandedExoticCraters_00 // The tip skates on a glassy patch, then drops into softer grit; the graph looks spiky.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_poke_MohoSrfLandedRareCraters_00 // Fresh-looking debris is fluffy at first, then compacts hard as you keep pushing.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_poke_MohoSrfLandedVoronoiCraters_00 // The probe alternates between “easy” and “nope” in repeating patches across the terrain.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_poke_MohoSrfLandedNotableCraters_00 // A thick rubble blanket crunches loudly and then grips the shaft like it’s offended.
        MohoSrfLandedPeaks* = #JNSQscience_bd_poke_MohoSrfLandedPeaks_00 // There’s barely any soil up here; the probe just taps rock and reports “rock.”

        EveSrfLandedPoles* = #JNSQscience_bd_poke_EveSrfLandedPoles_00 // The surface is dense and slightly tacky; the probe sinks slowly, as if the ground is thinking about it.
        EveSrfLandedLowlands* = #JNSQscience_bd_poke_EveSrfLandedLowlands_00 // The purple soil squishes, then tightens around the shaft with unsettling enthusiasm.
        EveSrfLandedMidlands* = #JNSQscience_bd_poke_EveSrfLandedMidlands_00 // It starts soft, then turns stubbornly firm; the pressure down here is doing half the work for you.
        EveSrfLandedHighlands* = #JNSQscience_bd_poke_EveSrfLandedHighlands_00 // The ground is dry and compacted; penetration is shallow and the probe squeaks in protest.
        EveSrfLandedPeaks* = #JNSQscience_bd_poke_EveSrfLandedPeaks_00 // Thin gritty cover over hard substrate; the probe quickly bottoms out and pretends that was the plan.
        EveSrfLandedMountains* = #JNSQscience_bd_poke_EveSrfLandedMountains_00 // The probe meets fractured material under a thin dust veneer; readings jump with every crunchy layer.
        EveSrfLandedShores* = #JNSQscience_bd_poke_EveSrfLandedShores_00 // Wet, heavy mud barely resists at first, then clings to the shaft like it wants to come along.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_poke_EveSrfLandedKrakensWell_00 // The surface gives just a little… then keeps giving; the depth reading becomes uncomfortably optimistic.

        GillySrfLandedLowlands* = #JNSQscience_bd_poke_GillySrfLandedLowlands_00 // The probe pushes in, and the lander tries to drift away; the “soil” is mostly floaty dust.
        GillySrfLandedMidlands* = #JNSQscience_bd_poke_GillySrfLandedMidlands_00 // Light pressure is enough to sink the shaft, but the ground offers almost no consistent resistance.
        GillySrfLandedHighlands* = #JNSQscience_bd_poke_GillySrfLandedHighlands_00 // You poke the surface and the whole hillside seems ready to leave; the material is loose and unwilling to stay put.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_poke_KerbinSrfLandedAdministration_00 // You push the penetrometer into the carpet until it hits something unyielding: policy. The receptionist hands you a “Floor Integrity Incident” form.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_poke_KerbinSrfLandedAstronautComplex_00 // The couch offers minimal resistance until you strike a legendary crumb layer. The crew insists it is “structural padding.”
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_poke_KerbinSrfLandedBaikerbanur_00 // The dusty ground compacts nicely, then refuses to budge—much like the local paperwork queue. Your notes receive two extra stamps for “firmness.”
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_poke_KerbinSrfLandedBaikerbanurLaunchpad_00 // The pad surface laughs at your probe, so you try a crack at the edge. A safety officer explains that “approved poking zones” are clearly marked (somewhere).
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_poke_KerbinSrfLandedCrawlerway_00 // Gravel yields, tar resists, and the probe comes back wearing a new coat. The crawler crew calls this “normal adhesion science” and asks you to stop.
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_poke_KerbinSrfLandedFlagPole_00 // The soil is soft right up until you hit the foundation. A guard politely informs you the flag is supported by “classified hardness.”
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_poke_KerbinSrfLandedIslandAirfield_00 // The tarmac is stubborn and the ground beside it is soggy and confused. Your graph looks like it has had a long day near the ocean.
        KerbinSrfLandedKSC* = #JNSQscience_bd_poke_KerbinSrfLandedKSC_00 // You pick an innocent patch of ground and immediately find a buried cable conduit. The engineers applaud your “excellent detection method” and confiscate the probe.
        KerbinSrfLandedLaunchPad* = #JNSQscience_bd_poke_KerbinSrfLandedLaunchPad_00 // The concrete is rock-hard until a vent cycle mists everything and turns the top layer into slippery paste. You record a dramatic phase change and a louder warning siren.
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_poke_KerbinSrfLandedMissionControl_00 // The floor is too polished to be poked without approval, so you test a corner planter instead. Mission Control declares the soil “non-operational” and still wants the report.
        KerbinSrfLandedR&D* = #JNSQscience_bd_poke_KerbinSrfLandedR&D_00 // The sample resists penetration in ways that suggest it was engineered to do so on purpose. A scientist notes this is “expected behavior” and locks the cabinet.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_poke_KerbinSrfLandedR&DCentralBuilding_00 // The probe barely dents the immaculate flooring before an alarmed intern appears with tape, cones, and forms. Your result is filed under “unscheduled surface interaction.”
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_poke_KerbinSrfLandedR&DCornerLab_00 // The material yields like foam, then snaps back like it is offended. Someone whispers that you have discovered the “prototype anti-poke composite.”
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_poke_KerbinSrfLandedR&DMainBuilding_00 // The probe sinks smoothly until a nearby test stand vibrates and your readings become interpretive. Engineers suggest calling it “dynamic cohesion.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_poke_KerbinSrfLandedR&DObservatory_00 // A thin layer of dust gives way to a very stubborn platform base. The astronomer requests you keep your science “below the optics.”
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_poke_KerbinSrfLandedR&DSideLab_00 // You poke into a tray of “totally normal soil” and hit a hidden mesh at exactly 3 cm. The lab tech smiles and says, “Calibration feature.”
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_poke_KerbinSrfLandedR&DSmallLab_00 // The sample is suspiciously uniform and stops the probe at a perfectly repeatable depth. The scientist asks how you feel about signing a non-disclosure agreement.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_poke_KerbinSrfLandedR&DTanks_00 // The ground around the tanks is compacted to “please don’t settle” hardness. Your probe rebounds slightly, as if it knows better.
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_poke_KerbinSrfLandedR&DWindTunnel_00 // The surface yields, then the wind tunnel starts and sandblasts your notes into new punctuation. The official conclusion is “variable under wind.”
        KerbinSrfLandedRunway* = #JNSQscience_bd_poke_KerbinSrfLandedRunway_00 // The runway is effectively un-pokeable, which is comforting for landing. Ground crew asks you to keep your probe away from anything with wheels or schedules.
        KerbinSrfLandedSPH* = #JNSQscience_bd_poke_KerbinSrfLandedSPH_00 // The hangar floor is tough, but the scattered rivets provide crunchy surprises. You log “heterogeneous debris layer” and get a tired nod from an engineer.
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_poke_KerbinSrfLandedSPHMainBuilding_00 // Expansion joints accept the probe happily, then abruptly stop it with metal edging. A supervisor requests you stop “testing the building’s feelings.”
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_poke_KerbinSrfLandedSPHRoundTank_00 // You poke the padding around the round tank and it yields with theatrical squish. Someone yells, “That’s insulation, not a biome!”
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_poke_KerbinSrfLandedSPHTanks_00 // The ground is firm and orderly, like it has been compacted by years of rolling heavy things over it. Your probe comes back smelling faintly of paint and regret.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_poke_KerbinSrfLandedSPHWaterTower_00 // The soil is damp, then suddenly very hard where the foundation begins. The safety officer recommends you poke “away from the dripping part.”
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationDishEast_00 // Gravel crunches, then a buried cable tray halts the probe like a stern finger. The technician claims the dish requires “premium subterranean organization.”
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationDishNorth_00 // You get clean data until the dish slews and everyone looks at you like you did it. The probe is declared “electromagnetically suspicious” and escorted off the pad.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationDishSouth_00 // The surface is compacted, disciplined, and clearly maintained by someone who dislikes surprises. Your probe finds none, which somehow feels like the biggest surprise.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationHub_00 // The floor refuses penetration entirely, so you test a dusty corner seam instead. The hub logs your activity as “maintenance” and bills R&D.
        KerbinSrfLandedVAB* = #JNSQscience_bd_poke_KerbinSrfLandedVAB_00 // You push the probe into the concrete and immediately meet rebar at an impolite depth. The VAB remains standing; your probe files a complaint.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_poke_KerbinSrfLandedVABMainBuilding_00 // The surface is firm until a nearby crane rumbles and the readings jitter in sympathy. Engineers suggest you call it “vibrational pseudo-softening.”
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_poke_KerbinSrfLandedVABPodMemorial_00 // You perform a single, respectful poke at the edge of the path and stop. The result is “stable, solemn, and definitely not to be repeated.”
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_poke_KerbinSrfLandedVABRoundTank_00 // The probe meets compacted ground and then a security glare. The tank is declared “not a poke target,” which you hadn’t written down yet (but should have).
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_poke_KerbinSrfLandedVABSouthComplex_00 // Slag and grit give a crunchy layer over very hard ground. The welders approve of your “texture study” and request you stop sampling near hot things.
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_poke_KerbinSrfLandedVABTanks_00 // The soil is packed tight from constant traffic and occasional panic. Your data shows high cohesion and higher “please keep clear” signage density.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_poke_KerbinSrfLandedWoomerang_00 // The ground is firm, then a gust relocates your equipment and your confidence. You record the depth anyway, mostly from wherever you land.

        KerbinSrfLandedLowlands* = #JNSQscience_bd_poke_KerbinSrfLandedLowlands_00 // The Lowlands are soft and a little damp; the probe sinks in happily.
        KerbinSrfLandedMidlands* = #JNSQscience_bd_poke_KerbinSrfLandedMidlands_00 // The Midlands are springy and firm, offering a respectable amount of pushback.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_poke_KerbinSrfLandedAridLowlands_00 // The Arid Lowlands are mostly loose grit; the shaft slides in with barely any effort.
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_poke_KerbinSrfLandedAridMidlands_00 // The Arid Midlands have a crusty top layer that gives way to softer material underneath.
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_poke_KerbinSrfLandedAridHighlands_00 // The Arid Highlands are baked and compacted; penetration is shallow and stubborn.
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_poke_KerbinSrfLandedAridMountains_00 // The Arid Mountains are rocky and unforgiving; the probe stops with a very scientific “clink.”
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_poke_KerbinSrfLandedWelcomeBackIsland_00 // The ground here is oddly packed, like it’s been stomped flat by returning heroes.

        MunSrfLandedPoles* = #JNSQscience_bd_poke_MunSrfLandedPoles_00 // The polar regolith is cold and tightly packed; you hit solid material sooner than expected.
        MunSrfLandedHighlands* = #JNSQscience_bd_poke_MunSrfLandedHighlands_00 // The Highlands are hard and fractured; the probe refuses to go in more than a little.
        MunSrfLandedMidlands* = #JNSQscience_bd_poke_MunSrfLandedMidlands_00 // The Midlands are a fine, powdery layer over firm ground; readings are pleasantly boring.
        MunSrfLandedLowlands* = #JNSQscience_bd_poke_MunSrfLandedLowlands_00 // The Lowlands are deeper dust; the probe sinks farther before meeting real resistance.
        MunSrfLandedPolarIceCraters* = #JNSQscience_bd_poke_MunSrfLandedPolarIceCraters_00 // A brittle top layer crumbles, then the tip meets something that will not be negotiated with.
        MunSrfLandedExoticCraters* = #JNSQscience_bd_poke_MunSrfLandedExoticCraters_00 // The surface alternates between crunchy and glassy; your numbers look confused.
        MunSrfLandedRareCraters* = #JNSQscience_bd_poke_MunSrfLandedRareCraters_00 // The material is loose and freshly churned; it pokes like it hasn’t settled down yet.
        MunSrfLandedVoronoiCraters* = #JNSQscience_bd_poke_MunSrfLandedVoronoiCraters_00 // It feels like poking a tiled floor made of dust and rock; resistance changes in neat patches.
        MunSrfLandedNotableCraters* = #JNSQscience_bd_poke_MunSrfLandedNotableCraters_00 // The ejecta layer is thick and gritty; it gives at first, then grips the shaft stubbornly.
        MunSrfLandedMountains* = #JNSQscience_bd_poke_MunSrfLandedMountains_00 // You barely start the test before hitting something solid; the Mun is not impressed by your poking.

        MinmusSrfLandedPoles* = #JNSQscience_bd_poke_MinmusSrfLandedPoles_00 // The polar crust cracks and crunches; beneath it, the ground turns surprisingly rigid.
        MinmusSrfLandedLowlands* = #JNSQscience_bd_poke_MinmusSrfLandedLowlands_00 // The Lowlands are fluffy and deep; the probe sinks in like it found a new hobby.
        MinmusSrfLandedMidlands* = #JNSQscience_bd_poke_MinmusSrfLandedMidlands_00 // The Midlands are firmer than they look, with a faintly sticky resistance.
        MinmusSrfLandedHighlands* = #JNSQscience_bd_poke_MinmusSrfLandedHighlands_00 // The Highlands are wind-smoothed and tough; penetration is shallow and clean.
        MinmusSrfLandedBasins* = #JNSQscience_bd_poke_MinmusSrfLandedBasins_00 // The Basin material is extremely soft and fine; you can’t find “bottom” without trying harder.
        MinmusSrfLandedBrownBasins* = #JNSQscience_bd_poke_MinmusSrfLandedBrownBasins_00 // The darker basin soil packs tighter; it resists more than the pale stuff nearby.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_poke_MinmusSrfLandedBrownLowlands_00 // The Brown Lowlands clump together and fight the probe; it’s like poking dried snack crumbs.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_poke_MinmusSrfLandedBrownMidlands_00 // The Brown Midlands give moderate resistance with occasional crunchy bits.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_poke_MinmusSrfLandedBrownHighlands_00 // The Brown Highlands are crusted and hard; the probe complains via vibrations.
        MinmusSrfLandedMountains* = #JNSQscience_bd_poke_MinmusSrfLandedMountains_00 // The mountain slopes have only a thin layer of powder before the probe hits something solid.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_poke_DunaSrfLandedIceCaps_00 // The probe crunches through a brittle crust, then hits something that feels like frozen cement.
        DunaSrfLandedHighlands* = #JNSQscience_bd_poke_DunaSrfLandedHighlands_00 // The highland dirt is sharp and compact; the force readout climbs faster than expected.
        DunaSrfLandedMidlands* = #JNSQscience_bd_poke_DunaSrfLandedMidlands_00 // Fine red dust gives way politely, then packs tight around the shaft like it’s trying to keep it.
        DunaSrfLandedLowlands* = #JNSQscience_bd_poke_DunaSrfLandedLowlands_00 // The lowlands swallow the probe deeper than they look; the surface layer is thick and loose.
        DunaSrfLandedCraters* = #JNSQscience_bd_poke_DunaSrfLandedCraters_00 // The ground alternates between powder and chunky ejecta; the resistance profile looks lumpy.
        DunaSrfLandedRareCraters* = #JNSQscience_bd_poke_DunaSrfLandedRareCraters_00 // Fresh-looking debris collapses around the probe; the numbers suggest a fluffy, unsettled layer.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_poke_DunaSrfLandedVoronoiCraters_00 // Poking across the patterned terrain gives repeating “soft-hard-soft” readings in neat patches.
        DunaSrfLandedNotableCraters* = #JNSQscience_bd_poke_DunaSrfLandedNotableCraters_00 // A deep rubble blanket crunches loudly, then locks up around the shaft with gritty enthusiasm.
        DunaSrfLandedExoticCraters* = #JNSQscience_bd_poke_DunaSrfLandedExoticCraters_00 // The tip scrapes something glassy before sliding into finer dust; your graph develops spikes.
        DunaSrfLandedTrenches* = #JNSQscience_bd_poke_DunaSrfLandedTrenches_00 // The trench floor is compacted and stubborn, like everything slid down here and packed itself tight.
        DunaSrfLandedNotablePlains* = #JNSQscience_bd_poke_DunaSrfLandedNotablePlains_00 // Wind-smoothed ground resists at first, then yields in a clean, uniform push.
        DunaSrfLandedNotableMountains* = #JNSQscience_bd_poke_DunaSrfLandedNotableMountains_00 // The probe meets fractured rock under a thin dust veneer; penetration is shallow and jumpy.
        DunaSrfLandedMountains* = #JNSQscience_bd_poke_DunaSrfLandedMountains_00 // You barely start before striking solid material; the mountains refuse to be scientifically inconvenienced.
        DunaSrfLandedVolcano* = #JNSQscience_bd_poke_DunaSrfLandedVolcano_00 // The surface is dark and brittle; it crumbles, then abruptly stops the probe like a hidden plate.

        IkeSrfLandedPoles* = #JNSQscience_bd_poke_IkeSrfLandedPoles_00 // The polar regolith is cold and tight-packed; it doesn’t let the probe in without a fight.
        IkeSrfLandedMountains* = #JNSQscience_bd_poke_IkeSrfLandedMountains_00 // A thin dust layer gives way to hard, blocky ground; the shaft taps something solid almost immediately.
        IkeSrfLandedMidlands* = #JNSQscience_bd_poke_IkeSrfLandedMidlands_00 // Powder on top, firm underneath—an admirably straightforward poke with respectable numbers.
        IkeSrfLandedLowlands* = #JNSQscience_bd_poke_IkeSrfLandedLowlands_00 // The lowlands are deeper and looser; the probe sinks farther before the resistance ramps up.
        IkeSrfLandedHighlands* = #JNSQscience_bd_poke_IkeSrfLandedHighlands_00 // The highlands feel dry and cemented; the probe grinds in with a reluctant, scratchy shove.

        EdnaSrfLandedLowlands* = #JNSQscience_bd_poke_EdnaSrfLandedLowlands_00 // The probe meets a thin, fluffy layer before the ground turns stubbornly compact.
        EdnaSrfLandedMidlands* = #JNSQscience_bd_poke_EdnaSrfLandedMidlands_00 // Powder compresses into a firm plug around the shaft; Edna prefers its dust pre-packed.
        EdnaSrfLandedHighlands* = #JNSQscience_bd_poke_EdnaSrfLandedHighlands_00 // The surface is gritty and fractured; you get a shallow poke and a lot of scratchy feedback.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_bd_poke_EdnaSrfLandedPolarIceCraters_00 // A brittle crust crunches away, then the tip hits something cold and rock-hard.
        EdnaSrfLandedWhites* = #JNSQscience_bd_poke_EdnaSrfLandedWhites_00 // Bright, fine dust drifts aside easily, but quickly stiffens into a dense, squeaky layer.

        DakSrfLandedLowlands* = #JNSQscience_bd_poke_DakSrfLandedLowlands_00 // The probe goes in with almost no force, and the lander tries to recoil away from the “effort.”
        DakSrfLandedMidlands* = #JNSQscience_bd_poke_DakSrfLandedMidlands_00 // You push, the surface yields, and then everything floats; cohesion here is mostly a suggestion.
        DakSrfLandedHighlands* = #JNSQscience_bd_poke_DakSrfLandedHighlands_00 // Loose rubble shifts under the tip; the readings wobble like the whole world is shrugging.

        DresSrfLandedPoles* = #JNSQscience_bd_poke_DresSrfLandedPoles_00 // The soil is cold and tight-packed; the probe bites in slowly, like it’s drilling into patience.
        DresSrfLandedHighlands* = #JNSQscience_bd_poke_DresSrfLandedHighlands_00 // A thin dust veneer hides hard ground; the probe bottoms out with an unhelpful “thunk.”
        DresSrfLandedMidlands* = #JNSQscience_bd_poke_DresSrfLandedMidlands_00 // Fine dust gives way evenly, producing a wonderfully dull, consistent resistance curve.
        DresSrfLandedLowlands* = #JNSQscience_bd_poke_DresSrfLandedLowlands_00 // The probe sinks deep into soft regolith before the force finally starts to climb.
        DresSrfLandedCanyon* = #JNSQscience_bd_poke_DresSrfLandedCanyon_00 // Layered material collapses in little slides; every push finds a new texture to argue with.

        LaytheSrfLandedShores* = #JNSQscience_bd_poke_LaytheSrfLandedShores_00 // The probe sinks into wet sand and comes back up with a heavy, clingy coating.
        LaytheSrfLandedShallows* = #JNSQscience_bd_poke_LaytheSrfLandedShallows_00 // The saturated ground offers little resistance until you hit a gritty, compact layer beneath.
        LaytheSrfLandedLowlands* = #JNSQscience_bd_poke_LaytheSrfLandedLowlands_00 // Soft, damp soil compresses easily; the force curve rises slowly and steadily.
        LaytheSrfLandedMidlands* = #JNSQscience_bd_poke_LaytheSrfLandedMidlands_00 // The surface is springy at first, then firms up like it’s been packed by relentless weather.
        LaytheSrfLandedHighlands* = #JNSQscience_bd_poke_LaytheSrfLandedHighlands_00 // Dry, crusted material fights the probe; progress comes in reluctant, crunchy steps.
        LaytheSrfLandedMountains* = #JNSQscience_bd_poke_LaytheSrfLandedMountains_00 // There’s only a thin veneer of loose stuff before the tip taps something solid and unforgiving.
        LaytheSrfLandedIceCaps* = #JNSQscience_bd_poke_LaytheSrfLandedIceCaps_00 // A brittle crust fractures cleanly, then the shaft stops short against hard, cold ice.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_bd_poke_LaytheSrfLandedEnclosedFaults_00 // The probe finds fractures and voids; readings jump between “nothing” and “absolutely not.”

        VallSrfLandedPoles* = #JNSQscience_bd_poke_VallSrfLandedPoles_00 // The probe crunches into frozen grains, then meets a slick layer that refuses further negotiation.
        VallSrfLandedLowlands* = #JNSQscience_bd_poke_VallSrfLandedLowlands_00 // Powdery frost collapses around the shaft; it sinks deep before the resistance finally climbs.
        VallSrfLandedMidlands* = #JNSQscience_bd_poke_VallSrfLandedMidlands_00 // A compact crust gives consistent, dull numbers—until a brittle layer snaps and resets the curve.
        VallSrfLandedHighlands* = #JNSQscience_bd_poke_VallSrfLandedHighlands_00 // The surface is hard and glassy; the probe squeals faintly as it scrapes its way in.
        VallSrfLandedMountains* = #JNSQscience_bd_poke_VallSrfLandedMountains_00 // Thin dust over fractured ice-rock mix; penetration is shallow and the force spikes erratically.

        TyloSrfLandedPoles* = #JNSQscience_bd_poke_TyloSrfLandedPoles_00 // The regolith is tightly packed by gravity; the probe barely advances before the force maxes out.
        TyloSrfLandedLowlands* = #JNSQscience_bd_poke_TyloSrfLandedLowlands_00 // Deep-looking dust turns dense almost immediately; Tylo compresses everything into obedience.
        TyloSrfLandedMidlands* = #JNSQscience_bd_poke_TyloSrfLandedMidlands_00 // The probe sinks a little, then stalls in firm, uniform material that feels mechanically “settled.”
        TyloSrfLandedHighlands* = #JNSQscience_bd_poke_TyloSrfLandedHighlands_00 // Chunky debris shifts and locks up around the shaft; each push finds a new hard stop.
        TyloSrfLandedMountains* = #JNSQscience_bd_poke_TyloSrfLandedMountains_00 // You manage a token poke before striking solid ground; the mountain does not appreciate experiments.

