        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedWesternMountains_00 = Ridge shadows carve deep cold channels; you start to understand why this world feels like two planets stitched together.
        #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedDarkSideMountains_00 = The mountains on the night side are almost the same temperature as space. You check the lens cap twice.
