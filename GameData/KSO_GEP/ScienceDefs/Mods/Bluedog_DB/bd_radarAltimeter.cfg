        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_radarAltimeter_SironaInSpaceLowDarkTropicalBands_00 // From low orbit, the radar paints the top of the atmosphere like a rolling sea of shadows. Defining “sea level” here requires more paperwork than fuel.
