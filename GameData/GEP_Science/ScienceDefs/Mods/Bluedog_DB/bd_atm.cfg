@EXPERIMENT_DEFINITION:HAS[#id[bd_atm]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_atm_GrannusInSpaceLow_00 // The mount insists it was built for “solar” work, then quietly admits this red dwarf is a different kind of solar. You begin a flare watch and label the file: “DO NOT LOOK AWAY.”
        GrannusInSpaceHigh* = #GEPscience_bd_atm_GrannusInSpaceHigh_00 // From far out, Grannus is a dim ember with a lot of empty around it. The flare log stays mostly calm, which somehow makes the silence feel louder.
        
        TaranisInSpaceLow* = #GEPscience_bd_atm_TaranisInSpaceLow_00 // Grannus hangs low and red, and the mount needs longer exposures than anyone is comfortable with. You record flare activity and schedule the report for whenever the signal finally crawls home.
        TaranisInSpaceHigh* = #GEPscience_bd_atm_TaranisInSpaceHigh_00 // With Taranis below and a ruby star ahead, it’s hard to tell what “noon” is supposed to look like anymore. The instruments call it stable; you call it “stable, but unsettling.”

        ToutatisInSpaceLow* = #GEPscience_bd_atm_ToutatisInSpaceLow_00 // The mount watches Grannus flicker over Toutatis’ harsh day-side glare. You argue with the instruments about whether that was a flare or just the planet trying to cook the optics.
        ToutatisInSpaceHigh* = #GEPscience_bd_atm_ToutatisInSpaceHigh_00 // At this altitude, Grannus is a dull ruby in a lot of black. You start a long flare watch and realize Mission Control will get the summary roughly one bedtime later.

        NodensInSpaceLow* = #GEPscience_bd_atm_NodensInSpaceLow_00 // The telescope mount locks onto Grannus. The star looks more ember than spotlight, so you crank up the exposure and note that any flare warning will reach home long after the flare does.
        NodensInSpaceHigh* = #GEPscience_bd_atm_NodensInSpaceHigh_00 // From up here, Nodens’ thick limb haze glows faintly in Grannus’ red light. The mount reports “quiet conditions,” which is somehow less comforting this far from familiar skies.

        BelisamaInSpaceLow* = #GEPscience_bd_atm_BelisamaInSpaceLow_00 // The mount peers past Nodens’ glow at the small red sun that rules this system. You log a faint flare and wonder how many hours later Mission Control will learn you noticed.
        BelisamaInSpaceHigh* = #GEPscience_bd_atm_BelisamaInSpaceHigh_00 // Grannus looks distant enough to be decorative, until the sensors remind you it still throws tantrums. You keep watching anyway—out here, forewarning is the closest thing to comfort.

        SucellusInSpaceLow* = #GEPscience_bd_atm_SucellusInSpaceLow_00 // The telescope mount stares at Grannus and reports “low flare activity.” You add a note: “Low flare activity is still flare activity, and we are very, very far away.”
        SucellusInSpaceHigh* = #GEPscience_bd_atm_SucellusInSpaceHigh_00 // From high orbit, Sucellus is just a dark lump under an ember-red sun. Longer exposures tease out faint structure in the corona and a lot of empty space to think about.

        CaireenInSpaceLow* = #GEPscience_bd_atm_CaireenInSpaceLow_00 // Caireen is small enough that the mount spends more time keeping steady than observing. When it finally locks onto Grannus, the flare log fills with “maybe” and “check again later.”
        CaireenInSpaceHigh* = #GEPscience_bd_atm_CaireenInSpaceHigh_00 // The mount uses Grannus as a calibration target because it’s the only thing that looks stable out here. The data packet is queued for transmission; the confirmation will arrive after everyone’s next snack cycle.

        SironaInSpaceLow* = #GEPscience_bd_atm_SironaInSpaceLow_00 // Sirona’s harsh environment makes the sensors complain in several new ways. Between the noise and the glare, the mount still manages to track Grannus and flag a brief flare event as “not our favorite.”
        SironaInSpaceHigh* = #GEPscience_bd_atm_SironaInSpaceHigh_00 // High above Sirona, the red sun paints faint highlights on the cloud tops. The telescope mount logs a quiet interval and you realize “quiet” means “nothing happened yet.”

        AirmedInSpaceLow* = #GEPscience_bd_atm_AirmedInSpaceLow_00 // The mount locks onto Grannus while Airmed’s battered surface spins below. The flare readout stays quiet, and you still double-check the radiation warnings out of habit.
        AirmedInSpaceHigh* = #GEPscience_bd_atm_AirmedInSpaceHigh_00 // From high above Airmed’s odd two-toned scars, Grannus looks like a distant ember. You log a long exposure and mark the data “worth the wait for downlink.”

        BorvoInSpaceLow* = #GEPscience_bd_atm_BorvoInSpaceLow_00 // Borvo’s thin haze tries to paint the view with a faint tint, but the mount holds steady on Grannus. The instruments complain about “low signal,” which is accurate and not helpful.
        BorvoInSpaceHigh* = #GEPscience_bd_atm_BorvoInSpaceHigh_00 // The mount watches a dim red sun over a moon that can’t decide if it’s rock or ice. You record a minor flicker and wonder how many snack breaks away Mission Control is from hearing about it.

        DamonaInSpaceLow* = #GEPscience_bd_atm_DamonaInSpaceLow_00 // The telescope mount tracks Grannus while Damona’s big scar drifts past beneath you. No big flares—just a steady, watchful glow that makes the silence feel scientific.
        DamonaInSpaceHigh* = #GEPscience_bd_atm_DamonaInSpaceHigh_00 // Damona shrinks to a gray speck and Grannus becomes the only “weather” worth monitoring. You file the flare log under “mostly calm,” and add “for now.”

        EponaInSpaceLow* = #GEPscience_bd_atm_EponaInSpaceLow_00 // The telescope mount tries to calibrate for a sun that’s red, dim, and still bossy. The readings say “stable,” and you write “stable, but weird” in the margin anyway.
        EponaInSpaceHigh* = #GEPscience_bd_atm_EponaInSpaceHigh_00 // Epona rolls below with a day/night line that feels softer than it should. The mount logs a small flare event and you tag it “PLEASE FORWARD TO HOMEWORLD, EVENTUALLY.”

        RosmertaInSpaceLow* = #GEPscience_bd_atm_RosmertaInSpaceLow_00 // The mount tracks Grannus through Rosmerta’s limb haze; the red light makes every flare look like a slow smolder. You schedule longer exposures and try not to think about how “later” keeps getting later out here.
        RosmertaInSpaceHigh* = #GEPscience_bd_atm_RosmertaInSpaceHigh_00 // From high above Rosmerta, Grannus is a lonely ember in a lot of black. The flare log stays calm, and you note that “calm” is not the same as “safe,” just quieter.

        RAB-58EInSpaceLow* = #GEPscience_bd_atm_RAB-58EInSpaceLow_00 // Keeping a steady lock near RAB-58E takes more effort than the actual observing. Once the mount finally settles on Grannus, the data comes in faint and stubborn—like the sun is trying to keep secrets.
        RAB-58EInSpaceHigh* = #GEPscience_bd_atm_RAB-58EInSpaceHigh_00 // Up here, RAB-58E is a lumpy shadow and Grannus is a dim red dot with attitude. The mount flags a brief flicker; you tag the packet “important” and accept that the reply will arrive several snack cycles from now.

        CernunnosInSpaceLow* = #GEPscience_bd_atm_CernunnosInSpaceLow_00 // Cernunnos’ dark horizon makes Grannus’ red glow feel even more unnatural. The telescope mount logs minor flare activity and you write “minor” with very careful handwriting.
        CernunnosInSpaceHigh* = #GEPscience_bd_atm_CernunnosInSpaceHigh_00 // At this altitude, Cernunnos looks small and the red sun looks smaller—yet it still runs the whole show. The mount keeps watch for sudden brightening and you keep watch for the mount getting ideas.

        InSpaceHigh* = #GEPscience_TwoStarsDilemma_00 // You hesitate at the pointing controls. Which “sun” is the right one today? You ask Mission Control, then watch the comm timer tick upward.
        InSpaceHigh* = #GEPscience_TwoStarsDilemma_01 // Two suns, one telescope, and a narrow observation window. Mission Control promises an answer “as soon as possible,” which could be hours. Long enough for the opportunity to quietly move on without you.
    }
}
