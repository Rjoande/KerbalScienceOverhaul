        #GEPscience_bd_orbitalScope_BorvoInSpaceHigh_00 = From high orbit, Borvo is a cracked-looking sphere under a tired red sun, as if it cooled too fast and never stopped complaining. The full mosaic trickles back through relays like a slow confession.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalCraquelure_00 = Tropical craquelure shows fine, branching fractures that shift in apparent width as lighting changes. Your stitching points multiply until the software begs for mercy.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateCraquelure_00 = Temperate craquelure forms wider, calmer crack networks—calmer, not calm. The pattern is perfect for mapping and terrible for thinking about up close.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalLowlands_00 = Tropical lowlands sit between crack fields like islands of smoother ground, but even they have subtle wrinkling. You log it as “stable region” with a very small asterisk.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateLowlands_00 = Temperate lowlands offer clean frames and consistent tones, making you briefly forget how far away you are. Then the downlink delay reminds you that “briefly” is doing a lot of work.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalMidlands_00 = Tropical midlands are a jumble of ridges and broken plates that make the mosaic look like a dropped tile floor. The camera captures every edge; your nerves capture the rest.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateMidlands_00 = Temperate midlands show layered textures that alternate between smooth and shattered in neat bands. Geologists call it “interesting”; you call it “please don’t make me land here.”
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowHighlands_00 = The highlands sparkle with bright outcrops that punch through the dim lighting. They make excellent control points and excellent reasons to keep a safe altitude.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowMajorCraters_00 = Major craters anchor the mosaic with unmistakable rims and ejecta patterns. The shadows inside look deep enough to store spare rockets, but the camera cannot confirm.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowPoles_00 = Polar terrain is stark and high-contrast, with fracture lines converging toward the top like the world is being wrapped shut. You take extra overlap and hope the seams are the only thing that closes.

        #GEPscience_bd_orbitalScope_DamonaInSpaceHigh_00 = From high orbit, Damona is a quiet, solid presence beneath the red sun, with nothing about its colors quite matching “home.” The map team back there will argue over these pixels long after you’ve moved on.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTropicalLowlands_00 = Tropical lowlands show broad plains with faint streaking that only appears when the light hits just right. You plan another pass and accept that patience is part of the payload.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTemperateLowlands_00 = Temperate lowlands stitch neatly into a readable mosaic, almost comforting in their consistency. Almost—until haze rolls through and blurs the edges between frames.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTropicalMidlands_00 = Tropical midlands reveal ridges and shallow basins that make the terrain look worked-over and tired. The camera is happy; the interpretation will take months of delayed conversations.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTemperateMidlands_00 = Temperate midlands are mottled with subtle albedo patches that don’t line up with obvious topography. You flag “composition?” and let the lab coats fight over it later.
