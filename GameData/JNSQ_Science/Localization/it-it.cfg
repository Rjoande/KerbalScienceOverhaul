        #JNSQscience_magnetometer_AmosInSpaceHigh_01 = Qui il campo è sottile e irregolare, come se stessi sfiorando l'ultimo bordo sfilacciato dell'influenza di Nara.
        #JNSQscience_magnetometer_EnonInSpaceLow_00 = Non compare alcun campo globale, ma le letture derivano in modo uniforme, come se correnti venissero guidate attraverso materiale freddo laggiù.
        #JNSQscience_magnetometer_EnonInSpaceLow_01 = Enon è magneticamente quieto: il segnale più forte è il campo di Nara steso sull'orbita della luna.
        #JNSQscience_magnetometer_EnonInSpaceHigh_00 = Il magnetometro registra uno sfondo calmo con lente pieghe e torsioni, modellato più da Nara che da Enon.
        #JNSQscience_magnetometer_EnonInSpaceHigh_01 = I dati sembrano stirati e lontani, come un debole eco di una struttura magnetica molto più grande.
        #JNSQscience_magnetometer_PraxInSpaceLow_00 = Prax non offre alcun vero campo. Il magnetometro mappa soprattutto l'estensione di Nara e la chiude lì.
        #JNSQscience_magnetometer_PraxInSpaceLow_01 = Compaiono alcuni blip tremolanti, poi spariscono: o minuscoli frammenti di crosta o la tua astronave che fa di nuovo disordine.
