@EXPERIMENT_DEFINITION:HAS[#id[bd_Photometer]]
{
    %RESULTS
    {
        EdnaInSpaceLow* = #JNSQscience_bd_Photometer_EdnaInSpaceLow_00 // The photometer struggles to separate Edna from the starfield until a few oddly bright patches slide through the field of view. Whatever is down there, it’s doing its best to look like “nothing.”
        EdnaInSpaceHigh* = #JNSQscience_bd_Photometer_EdnaInSpaceHigh_00 // Integrated brightness comes back as “dim, but stubbornly consistent.” Mission Control suggests you’re measuring the universe’s most dedicated little speck.

        DakInSpaceLow* = #JNSQscience_bd_Photometer_DakInSpaceLow_00 // The light curve bounces all over the place as Dak tumbles, alternating between dusty dullness and brief, attention-grabbing flashes. The scientists insist this is normal; the engineers insist it is not.
        DakInSpaceHigh* = #JNSQscience_bd_Photometer_DakInSpaceHigh_00 // Dak barely registers until it rotates just right and pings the sensor like it wants to be noticed. You decide the “siren’s call” is probably just geometry. Probably.

        DresInSpaceLow* = #JNSQscience_bd_Photometer_DresInSpaceLow_00 // Albedo readings show a pale surface with scattered darker streaks that don’t match the simple “boring rock” model. You tag the brighter zones for “future solar panel optimism.”
        DresInSpaceHigh* = #JNSQscience_bd_Photometer_DresInSpaceHigh_00 // Dres’ overall brightness is higher than expected for something that tries so hard to hide in plain sight. The colonization team starts arguing over paint colors for the first habitat.

        LindorInSpaceLow* = #JNSQscience_bd_Photometer_LindorInSpaceLow_00 // The photometer maps bright banding and a few stubbornly dark swirls across Lindor’s face. Mission Control asks if the dim patches are “water,” “chocolate,” or “instrument error.”
        LindorInSpaceHigh* = #JNSQscience_bd_Photometer_LindorInSpaceHigh_00 // From far away, Lindor looks like a calm, bluish coin—until the numbers say it’s not calm at all. You file the report under “polite lies told by distant planets.”

        KrelInSpaceLow* = #JNSQscience_bd_Photometer_KrelInSpaceLow_00 // Up close, Krel’s pale surface shows thin, darker “veins” that make the brightness jump with every rotation. Someone in the back mutters that the moon is being vain again.
        KrelInSpaceHigh* = #JNSQscience_bd_Photometer_KrelInSpaceHigh_00 // Krel nearly vanishes in the glare and reflected light around its parent, but careful subtraction leaves a faint, steady sparkle. The scientists cheer because they have successfully measured “almost nothing.”

        AdenInSpaceLow* = #JNSQscience_bd_Photometer_AdenInSpaceLow_00 // Aden’s overall albedo is depressingly low, but a few brighter flecks flash past the sensor like scuffed paint. The “old scientists with afros” would be thrilled you wrote that down.
        AdenInSpaceHigh* = #JNSQscience_bd_Photometer_AdenInSpaceHigh_00 // At this distance Aden is just a dot with a heartbeat—regular, tiny flickers as it turns. It’s a metronome made of brown marble.

        HuygenInSpaceLow* = #JNSQscience_bd_Photometer_HuygenInSpaceLow_00 // Huygen’s hazy amber sheen softens every brightness transition, as if you’re measuring light through frosted glass. The atmosphere is clearly doing most of the talking.
        HuygenInSpaceHigh* = #JNSQscience_bd_Photometer_HuygenInSpaceHigh_00 // Even far out, Huygen stays oddly warm-toned compared to its neighbors. The debate shifts from “is it hostile?” to “is it pretending not to be?”

        RigaInSpaceLow* = #JNSQscience_bd_Photometer_RigaInSpaceLow_00 // Riga’s light levels show a broad, familiar-looking patch that makes the team uncomfortable in a nostalgic way. You add a note: “similarity to home planet not statistically validated.”
        RigaInSpaceHigh* = #JNSQscience_bd_Photometer_RigaInSpaceHigh_00 // Riga holds a steady, brownish brightness with only gentle variations. If there’s any haze at all, it’s subtle enough to make everyone argue about calibration.

        TalosInSpaceLow* = #JNSQscience_bd_Photometer_TalosInSpaceLow_00 // Talos’ strong colorations translate into sharp photometric contrasts that almost clip the sensor at peak brightness. You flag the high-albedo streaks as “tempting targets.”
        TalosInSpaceHigh* = #JNSQscience_bd_Photometer_TalosInSpaceHigh_00 // Talos still throws a bold, two-tone light curve from high space, like it’s advertising its best features. The concluding recommendation is simply: “go there and pick one.”

        CelesInSpaceLow* = #JNSQscience_bd_Photometer_CelesInSpaceLow_00 // The photometer picks up a few unnaturally crisp bright spikes that don’t fit “just rock.” When you ask the research teams about it, they reply “NDA.”
        CelesInSpaceHigh* = #JNSQscience_bd_Photometer_CelesInSpaceHigh_00 // From high above, Celes looks like a perfectly ordinary, stubbornly dull moon. The numbers insist it’s ordinary a little too perfectly.

        TamInSpaceLow* = #JNSQscience_bd_Photometer_TamInSpaceLow_00 // Tam’s light curve jitters wildly as the little irregular chunk turns end-over-end. The best scientific summary is: “hostile gravel, confirmed.”
        TamInSpaceHigh* = #JNSQscience_bd_Photometer_TamInSpaceHigh_00 // At distance, Tam is mostly absence—barely enough reflected light to keep the sensor confident it’s still there. Kuiper Kerman would be proud of how hard it tries to hide.

        HamekInSpaceLow* = #JNSQscience_bd_Photometer_HamekInSpaceLow_00 // The readings come back with an aggressive, reddish bias that makes the calibration team argue with each other and the instrument. Whatever Hamek is made of, it’s very committed to being that color.
        HamekInSpaceHigh* = #JNSQscience_bd_Photometer_HamekInSpaceHigh_00 // Even far away, Hamek refuses to look neutral; the brightness and tint stay wrong in exactly the same way every pass. The official note reads: “explanation pending; unease increasing.”

        NaraInSpaceLow* = #JNSQscience_bd_Photometer_NaraInSpaceLow_00 // The photometer sees a dim world wrapped in a faint, oversized halo. The readings suggest a thick, light-scattering envelope doing its best to hide what’s underneath.
        NaraInSpaceHigh* = #JNSQscience_bd_Photometer_NaraInSpaceHigh_00 // Even from far away, Nara’s brightness refuses to behave like bare rock. The best fit model involves reflective high clouds and a lot of unanswered questions.

        AmosInSpaceLow* = #JNSQscience_bd_Photometer_AmosInSpaceLow_00 // Amos comes back as “dark, darker, darkest,” with a few sharp bright scratches that flash by as it rotates. You mark them as either exposed ice or the universe’s smallest spotlight.
        AmosInSpaceHigh* = #JNSQscience_bd_Photometer_AmosInSpaceHigh_00 // At distance, Amos is nearly swallowed by the background. The photometer confirms it exists, mostly by proving it can barely see it.

        EnonInSpaceLow* = #JNSQscience_bd_Photometer_EnonInSpaceLow_00 // The sensor immediately complains about being dazzled. Enon’s surface is so bright and clean-looking that the gain control starts negotiating for hazard pay.
        EnonInSpaceHigh* = #JNSQscience_bd_Photometer_EnonInSpaceHigh_00 // Enon stays conspicuously visible even out here, shining like a cold lantern. The light curve is steady enough to make the scientists suspicious.

        PraxInSpaceLow* = #JNSQscience_bd_Photometer_PraxInSpaceLow_00 // Prax shows a patchwork of modest brightness swings with each turn, like a scuffed ball bearing rolling under a lamp. The “fringe world” has plenty of texture for something so far out.
        PraxInSpaceHigh* = #JNSQscience_bd_Photometer_PraxInSpaceHigh_00 // From high space, Prax is a small, stubborn dot with a repeating flicker. The photometer files it under “regularly irregular,” which is apparently a real category now.
    }
}