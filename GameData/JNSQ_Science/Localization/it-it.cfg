        #JNSQscience_bd_XRayDiffract_BopSrfLandedLowlands_00 = Picchi ampi e rumorosi indicano polvere poco legata con grani sparsi ricchi di metalli: è il tipo di superficie che preferirebbe essere ovunque altro.
        #JNSQscience_bd_XRayDiffract_BopSrfLandedHighlands_00 = Alcune ostinate fasi cristalline spiccano sullo sfondo di macerie: le alture sembrano materiale più vecchio che è sopravvissuto alla macinazione.
        #JNSQscience_bd_XRayDiffract_PolSrfLandedPoles_00 = Picchi luminosi del ghiaccio dominano, ma sono intrecciati con strane fasi minori che rendono lo spettro quasi decorativo in modo preoccupante.
        #JNSQscience_bd_XRayDiffract_PolSrfLandedMountains_00 = Il tracciato mostra fragili cristalli di ghiaccio mescolati a inclusioni polverose e firme fratturate: le guglie di Pol sembrano costruite con materiale delicato e complicato.
        #JNSQscience_bd_XRayDiffract_KrelSrfLandedLowlands_00 = Il tracciato è dominato da silicati chiari e polverosi: il campione è finemente macinato e inquietantemente uniforme.
        #JNSQscience_bd_XRayDiffract_KrelSrfLandedMidlands_00 = Compare una seconda fase minerale come sottili picchi netti, come se la superficie fosse intrecciata di vene fragili.
        #JNSQscience_bd_XRayDiffract_KrelSrfLandedHighlands_00 = Reticelle cristalline sotto sforzo e firme di breccia suggeriscono che le alture siano macerie fratturate che fingono di essere roccia di fondo.
        #JNSQscience_bd_XRayDiffract_KrelSrfLandedPoles_00 = Forti picchi del ghiaccio si appoggiano su minerali polverosi: i poli conservano una tenue brinata di volatili dove la luce del sole perde.
        #JNSQscience_bd_XRayDiffract_AdenSrfLandedLowlands_00 = Dominano firme basaltiche, con una strisciata di vetro d'impatto che fa sembrare l'intero grafico leggermente fuso.
        #JNSQscience_bd_XRayDiffract_AdenSrfLandedMidlands_00 = Silicati misti e ossidi metallici si sovrappongono nella scansione, come se qualcuno avesse mescolato la crosta mentre si raffreddava.
        #JNSQscience_bd_XRayDiffract_AdenSrfLandedHighlands_00 = Spiccano picchi più netti da fasi cristalline più tenaci: le colline sembrano meno alterate e più ostinate.
        #JNSQscience_bd_XRayDiffract_AdenSrfLandedMountains_00 = Deformazione di reticella e firme di minerali frantumati impennano nel responso: queste montagne non sono state assemblate con delicatezza.
        #JNSQscience_bd_XRayDiffract_AdenSrfLandedPoles_00 = Volatili intrappolati dal freddo aggiungono qualche picco extra al solito miscuglio di roccia, quanto basta per rendere il grafico interessante.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedLowlands_00 = Dominano picchi del ghiaccio d'acqua con sotto una ampia "foschia" organica: qui tutto sembra rivestito di qualcosa di ostinato.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedMidlands_00 = Fasi simili ai clatrati e ghiaccio a grana fine compaiono insieme: il campione dà l'impressione di voler sublimare a metà scansione.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedHighlands_00 = Compaiono picchi più puliti di ghiaccio e silicati con minori contributi organici, come se la foschia non arrivasse altrettanto bene quassù.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedMountains_00 = Cristalli di ghiaccio fratturati e reticelle sotto sforzo affollano il tracciato: il terreno alto è fragile, croccante e complicato.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedPeaks_00 = Picchi del ghiaccio molto netti con piccole fasi esotiche suggeriscono cristalli cresciuti lentamente nel freddo profondo, indisturbati per ere.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedPolarLowlands_00 = Forti firme del ghiaccio si mescolano a deboli fasi di gas intrappolato: i poli sembrano un congelatore pieno di sorprese.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedPoles_00 = Torna una serie ordinata di picchi del ghiaccio con strani extra simili a sali: lo strumento lo registra come "chimicamente sicuro di sé".
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedPolarHighlands_00 = Diversi picchi si spostano come se i cristalli fossero insolitamente densi: questo ghiaccio è stato compattato per fare sul serio.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedShores_00 = Sali, ghiaccio e sedimenti fini si impilano in uno spettro affollato: la costa è stata lavata, congelata e lavata di nuovo.
        #JNSQscience_bd_XRayDiffract_HuygenSrfLandedMethaneLakes_00 = I picchi cristallini quasi scompaiono in una gobba cerosa di fondo: qualunque cosa sia, è più "pappetta" che "roccia".
        #JNSQscience_bd_XRayDiffract_RigaSrfLandedLowlands_00 = Torna un miscuglio familiare di silicati con fasi simili alle argille: Riga sta facendo di tutto per sembrare confortevole sulla carta.
        #JNSQscience_bd_XRayDiffract_RigaSrfLandedMidlands_00 = Grani selezionati dal vento producono picchi puliti e coerenti: le pianure sono polverose, secche e fastidiosamente ben organizzate.
        #JNSQscience_bd_XRayDiffract_RigaSrfLandedHighlands_00 = Fasi cristalline robuste dominano con minima alterazione: questa firma è più vicina a una "crosta originale".
        #JNSQscience_bd_XRayDiffract_RigaSrfLandedMountains_00 = Mescolamento di breccia e deformazione di reticella spalmiano diversi picchi: le montagne sembrano roccia spinta oltre il limite della pazienza.
        #JNSQscience_bd_XRayDiffract_RigaSrfLandedPoles_00 = Deboli picchi del ghiaccio compaiono nonostante tutto il resto sia roccia: i poli conservano una riluttante crosta di brina.
        #JNSQscience_bd_XRayDiffract_TalosSrfLandedLowlands_00 = Compaiono picchi ampi e più fasi minerali simili a pigmenti: i bassopiani sono praticamente colorazione in polvere.
        #JNSQscience_bd_XRayDiffract_TalosSrfLandedMidlands_00 = Diverse fasi contenenti ferro si sovrappongono nel grafico: lo spettro non riesce a decidere cosa significhi davvero "color Talos".
        #JNSQscience_bd_XRayDiffract_TalosSrfLandedHighlands_00 = Spiccano picchi più netti da cristalli resistenti: le colline conservano la loro struttura e i loro segreti.
        #JNSQscience_bd_XRayDiffract_TalosSrfLandedMountains_00 = Dominano reticelle fratturate e firme da alto sforzo: queste montagne sono sotto stress da moltissimo tempo.
        #JNSQscience_bd_XRayDiffract_TalosSrfLandedPoles_00 = Firme del ghiaccio si mescolano a sali luminosi: i poli sono dove Talos nasconde tutto ciò che potrebbe evaporare.
        #JNSQscience_bd_XRayDiffract_EelooSrfLandedPoles_00 = Il diffrattogramma è dominato da ostinati picchi del ghiaccio, con quanto basta di silicati polverosi mescolati dentro da ricordarti che è comunque un mondo, non un congelatore.
        #JNSQscience_bd_XRayDiffract_EelooSrfLandedMidlands_00 = Picchi ampi e stanchi suggeriscono regolite polverizzata e ricongelata innumerevoli volte: le pianure sono "processate" più di quanto siano composte.
        #JNSQscience_bd_XRayDiffract_EelooSrfLandedCanyon_00 = I grani scuri del canyon restituiscono per lo più silicati ordinari con una lieve strisciata vetrosa, come se le pareti fossero state segnate una volta e non avessero mai smesso di ricordarlo.
        #JNSQscience_bd_XRayDiffract_CelesSrfLandedLowlands_00 = Minerali fini e secchi producono picchi puliti e semplici: i bassopiani sembrano essere stati macinati in una polvere uniforme e lasciati lì.
        #JNSQscience_bd_XRayDiffract_CelesSrfLandedMidlands_00 = Un insieme secondario di picchi netti suggerisce sottili vene fragili che tagliano la polvere: qualcosa qui ha cristallizzato tardi e in fretta.
        #JNSQscience_bd_XRayDiffract_CelesSrfLandedHighlands_00 = Dominano fasi cristalline robuste con meno "sfocatura polverosa", come se le colline fossero l'unico posto in cui la superficie non sia stata macinata fino alla noia.
        #JNSQscience_bd_XRayDiffract_CelesSrfLandedMountains_00 = La deformazione di reticella compare ovunque nel grafico: le montagne sembrano roccia schiacciata spinta verso l'alto e invitata a fingere di essere stabile.
        #JNSQscience_bd_XRayDiffract_CelesSrfLandedPoles_00 = Picchi di brina si impilano ordinatamente sopra la solita firma della roccia: i poli stanno accumulando volatili in bella vista, con discrezione.
        #JNSQscience_bd_XRayDiffract_TamSrfLandedLowlands_00 = Lo spettro sembra macerie miste: silicati, grani scuri e cristalli fratturati che si sovrappongono come un sacchetto di avanzi schiacciati.
        #JNSQscience_bd_XRayDiffract_TamSrfLandedMidlands_00 = Picchi ampi e rumorosi suggeriscono polvere ultra fine con grani più densi sparsi: le pianure sono un campo di polvere con sorprese occasionali.
        #JNSQscience_bd_XRayDiffract_TamSrfLandedHighlands_00 = Alcune fasi minerali resistenti rendono il tracciato più netto: le colline sembrano il posto in cui i pezzi più grandi sono sopravvissuti alla macinazione.
        #JNSQscience_bd_XRayDiffract_TamSrfLandedTwinCraters_00 = Firme di fusione d'impatto vetrosa spalmiano diversi picchi in una gobba liscia: i crateri gemelli ricordano chiaramente di essere stati liquidi per un attimo.
        #JNSQscience_bd_XRayDiffract_TamSrfLandedCraters_00 = Frammenti mescolati dallo shock restituiscono un diffrattogramma disordinato e stratificato: i fondi dei crateri sono album geologici senza indice.
        #JNSQscience_bd_XRayDiffract_TamSrfLandedPockmarks_00 = Picchi insolitamente allargati suggeriscono materiale poroso e fragile: qualunque cosa abbia creato queste cavità ha lasciato anche minerali che non amano restare al loro posto.
        #JNSQscience_bd_XRayDiffract_HamekSrfLandedLowlands_00 = Fasi contenenti ferro affollano la scansione con una "firma" rossastra nella chimica: i bassopiani sembrano macchiati fino in profondità.
        #JNSQscience_bd_XRayDiffract_HamekSrfLandedMidlands_00 = Più famiglie minerali si sovrappongono in un'armonia scomoda, come se la superficie fosse stata mescolata, tinta e poi lasciata senza spiegazioni.
        #JNSQscience_bd_XRayDiffract_HamekSrfLandedHighlands_00 = Picchi più netti da cristalli più tenaci tagliano il disordine: quassù i minerali sembrano più organizzati, ma non meno sospetti.
        #JNSQscience_bd_XRayDiffract_HamekSrfLandedPoles_00 = Volatili intrappolati dal freddo aggiungono picchi extra netti alla base del solito miscuglio di roccia: i poli sono dove Hamek conserva tutto ciò che potrebbe scappare.
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedLowlands_00 = Il diffrattometro restituisce fasi di ghiaccio compattate mescolate a fine graniglia scura: i bassopiani sembrano un congelatore sotto una coperta pesante.
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedMidlands_00 = Diversi picchi si sdoppiano in doppietti deformati, suggerendo minerali compressi e rilasciati ripetutamente dal peso dell'atmosfera di Nara.
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedHighlands_00 = Qui emergono firme di silicati più pulite, ma sono spolverate di ostinati cristalli di volatili che si rifiutano di essere "solo roccia".
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedMountains_00 = Polimorfi da alta pressione e reticelle sotto sforzo dominano la scansione: le montagne sembrano essere state spinte verso l'alto e mantenute in tensione.
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedPolarLowlands_00 = I picchi del ghiaccio si fanno più netti e luminosi, con extra simili ai clatrati che suggeriscono che il freddo stia intrappolando più della sola acqua.
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedPoles_00 = Il tracciato è ghiaccio netto e ordinato con deboli picchi esotici, come se i poli stessero archiviando con cura i volatili per dopo.
        #JNSQscience_bd_XRayDiffract_NaraSrfLandedPolarHighlands_00 = Fasi cristalline dense e compattate compaiono accanto a fragili silicati: questo ghiaccio sembra essere stato pressato fino a diventare geologia seria.
        #JNSQscience_bd_XRayDiffract_AmosSrfLandedLowlands_00 = Picchi ampi e rumorosi suggeriscono regolite ultra fine, scura come fuliggine, mescolata a una brina sottile: la superficie è per lo più "mistero in polvere".
        #JNSQscience_bd_XRayDiffract_AmosSrfLandedMidlands_00 = La scansione mostra silicati misti con una gobba di fondo ricca di carbonio, come se i grani fossero ricoperti di qualcosa che odia essere analizzato.
        #JNSQscience_bd_XRayDiffract_AmosSrfLandedHighlands_00 = Picchi più netti da cristalli più tenaci spiccano sulla polvere scura: le colline sono dove i pezzi più grandi sono sopravvissuti alla macinazione.
        #JNSQscience_bd_XRayDiffract_AmosSrfLandedMountains_00 = Reticelle fratturate e fasi di breccia affollano il responso: queste montagne sembrano macerie impilate per caso.
        #JNSQscience_bd_XRayDiffract_AmosSrfLandedPoles_00 = Un sottile velo di picchi di ghiaccio pulito si appoggia sui soliti minerali scuri: i poli sono l'unico posto in cui Amos sembra anche solo vagamente educato.
        #JNSQscience_bd_XRayDiffract_EnonSrfLandedLowlands_00 = Dominano firme luminose del ghiaccio con piccole fasi simili a sali: i bassopiani sembrano un foglio liscio di congelato "quasi puro".
        #JNSQscience_bd_XRayDiffract_EnonSrfLandedMidlands_00 = Il diffrattogramma mostra polimorfi del ghiaccio a strati e fine polvere silicatata: è neve, ma con un sistema di archiviazione geologico.
        #JNSQscience_bd_XRayDiffract_EnonSrfLandedHighlands_00 = Picchi netti e puliti suggeriscono cristalli più grandi e meglio formati: le colline sembrano meno rimescolate e più silenziosamente antiche.
        #JNSQscience_bd_XRayDiffract_EnonSrfLandedPoles_00 = Tornano picchi del ghiaccio molto netti con deboli indizi di volatili intrappolati: i poli sembrano una cassaforte a freddo profondo.
        #JNSQscience_bd_XRayDiffract_PraxSrfLandedLowlands_00 = Il tracciato è un miscuglio disordinato di silicati e ghiaccio sporco: i bassopiani di Prax sembrano il punto in cui l'universo ha spazzato un pavimento e ha lasciato tutto qui.
        #JNSQscience_bd_XRayDiffract_PraxSrfLandedMidlands_00 = Picchi ampi indicano regolite fine con grani più densi sparsi: le pianure sono roccia in polvere con cristalli ostinati occasionali.
        #JNSQscience_bd_XRayDiffract_PraxSrfLandedHighlands_00 = Fasi cristalline robuste emergono dal rumore, implicando materiale meno alterato che spunta attraverso la polvere.
        #JNSQscience_bd_XRayDiffract_PraxSrfLandedMountains_00 = Deformazione di reticella e firme di breccia mescolata dall'impatto spalmiano la scansione: le montagne sembrano stress e collisioni diventati solidi.
        #JNSQscience_bd_XRayDiffract_PraxSrfLandedPoles_00 = I picchi del ghiaccio si impilano ordinatamente sul miscuglio di base della roccia: i poli stanno accumulando in silenzio tutto ciò che può congelare e restare fermo.

        // bd_XrayImaging
        #JNSQscience_bd_XRayImaging_SunInSpaceLow_00 = Il rilevatore si pente all'istante di essere puntato anche solo vagamente verso Kerbol: archi coronali brillano ai raggi X finché lo strumento implora la modalità sicura.
        #JNSQscience_bd_XRayImaging_SunInSpaceHigh_00 = Lontano dall'abbagliamento immediato di Kerbol, il cielo si risolve in puntini di raggi X duri: sistemi energetici che fanno cose violente molto, molto lontano.
        #JNSQscience_bd_XRayImaging_MohoInSpaceLow_00 = Moho è un parasole sorprendentemente efficace: con Kerbol schermato, alcune sorgenti di raggi X nervose finalmente spiccano dal rumore di fondo.
        #JNSQscience_bd_XRayImaging_MohoInSpaceHigh_00 = Il calore e la radiazione provano a trasformare ogni pixel in "scienza". Dopo aver filtrato la scarica statica, ti resta una mappa pulita di oggetti luminosi e arrabbiati.
        #JNSQscience_bd_XRayImaging_EveInSpaceLow_00 = L'alta atmosfera di Eve si mangia i raggi X più morbidi, quindi ti affidi alle bande più dure e riesci comunque a catturare diversi brevi, ustionanti impulsi da bersagli lontani.
        #JNSQscience_bd_XRayImaging_EveInSpaceHigh_00 = Con Eve e Kerbol che per una volta si comportano bene, l'imager costruisce un campo nitido di punti ad alta energia che di sicuro non sono stelle in luce visibile.
        #JNSQscience_bd_XRayImaging_GillyInSpaceLow_00 = La roccetta minuscola esegue per caso occultazioni perfette. Ogni volta che attraversa l'inquadratura, sorgenti di raggi X nascoste compaiono dal nulla come per magia.
        #JNSQscience_bd_XRayImaging_GillyInSpaceHigh_00 = Con poca interferenza locale, l'imager registra deboli bagliori costanti di raggi X e alcuni lampi improvvisi. Da qualche parte là fuori, qualcosa è molto caldo.
        #JNSQscience_bd_XRayImaging_KerbinInSpaceLow_00 = L'ambiente spaziale di Kerbin continua a far scattare i contatori, ma tra un colpo e l'altro riesci comunque a mappare alcuni ostinati punti di raggi X duri.
        #JNSQscience_bd_XRayImaging_KerbinInSpaceHigh_00 = Sopra la maggior parte delle interferenze, il cielo diventa una costellazione sparsa di sorgenti violentemente calde che si rifiutano di sembrare "normali".
        #JNSQscience_bd_XRayImaging_MunInSpaceLow_00 = Con Kerbin comodamente schermato, il fondo cala e deboli sorgenti di raggi X emergono, un'esposizione accurata alla volta.
        #JNSQscience_bd_XRayImaging_MunInSpaceHigh_00 = Mun si riduce a una moneta grigia sotto di te, mentre il rilevatore conta una pioggerellina costante di fotoni da guai molto lontani.
        #JNSQscience_bd_XRayImaging_MinmusInSpaceLow_00 = Minmus è un piccolo disco occultante perfetto: a ogni passaggio nasconde una sorgente di raggi X e ne rivela un'altra, come un trucco di calibrazione.
        #JNSQscience_bd_XRayImaging_MinmusInSpaceHigh_00 = Il vuoto è ottimo per tarare lo strumento, finché un bagliore improvviso fa impennare il responso e manda in fumo la tua sessione "tranquilla".
        #JNSQscience_bd_XRayImaging_DunaInSpaceLow_00 = L'aria sottile interferisce ancora con le bande più morbide, quindi ti affidi ai raggi X più duri e ne esci con un campo sorprendentemente pulito.
        #JNSQscience_bd_XRayImaging_DunaInSpaceHigh_00 = Con Duna lontano sotto, l'imager costruisce una mappa di minuscoli puntini roventi che somigliano più ad avvisi che a stelle.
        #JNSQscience_bd_XRayImaging_IkeInSpaceLow_00 = L'orizzonte frastagliato di Ike funziona come un otturatore. L'imager lo usa per separare il rumore locale dalle vere sorgenti di raggi X.
        #JNSQscience_bd_XRayImaging_IkeInSpaceHigh_00 = Nella calma sopra Ike, alcuni punti restano irragionevolmente luminosi. Qualunque cosa li produca sta lavorando a temperature assurde.
        #JNSQscience_bd_XRayImaging_EdnaInSpaceLow_00 = L'oscurità di Edna è uno sfondo perfetto: con l'abbagliamento sotto controllo, tiri fuori alcuni deboli punti di raggi X da oggetti che girano a temperature assurde.
        #JNSQscience_bd_XRayImaging_EdnaInSpaceHigh_00 = Quassù i conteggi arrivano lenti e regolari, finché un picco improvviso ti ricorda che lo spazio "silenzioso" contiene comunque sorprese molto calde.
        #JNSQscience_bd_XRayImaging_DakInSpaceLow_00 = L'orizzonte grumoso della patata fa tremare l'inquadratura, ma blocca bene anche la luce parassita: l'imager rileva diverse sorgenti di raggi X duri nascoste nel rumore.
        #JNSQscience_bd_XRayImaging_DakInSpaceHigh_00 = Con Dak ridotto a un puntino, lo strumento dipinge una mappa rada di puntini energetici. Minuscole fornaci lontane che bruciano nel buio.
        #JNSQscience_bd_XRayImaging_DresInSpaceLow_00 = Dres è dolorosamente banale in luce visibile, ma il cielo ai raggi X dietro di lui non lo è affatto: alcune sorgenti compatte spiccano come spie di avvertimento.
        #JNSQscience_bd_XRayImaging_DresInSpaceHigh_00 = Sopra il mondo più solitario, registri una sottile pioggerellina di fotoni ad alta energia e ti chiedi che tipo di caos serva per brillare così.
        #JNSQscience_bd_XRayImaging_JoolInSpaceLow_00 = L'imager continua a essere bersagliato da particelle energetiche, ma tra un "ahia" e l'altro catturi luminosi raggi X aurorali e alcune sorgenti lontane, violentemente calde.
        #JNSQscience_bd_XRayImaging_JoolInSpaceHigh_00 = Più lontano dai peggiori capricci di Jool, il rilevatore si calma abbastanza da abbozzare un campo pulito di puntini di raggi X duri provenienti da oggetti assurdamene caldi.
        #JNSQscience_bd_XRayImaging_LaytheInSpaceLow_00 = Jool rovina l'intero rilievo con un bagliore ad alta energia: dopo qualche puntamento creativo, riesci comunque a strappare una manciata di "bruciatori" di raggi X lontani.
        #JNSQscience_bd_XRayImaging_LaytheInSpaceHigh_00 = Con Laythe stabile sotto e Jool meno d'intralcio, l'imager costruisce una nitida mappa del cielo ad alta energia: stelle che brillano solo quando sono pericolosamente calde.
        #JNSQscience_bd_XRayImaging_VallInSpaceLow_00 = Il bordo scuro di Vall è un otturatore perfetto: mentre l'orizzonte scorre, deboli sorgenti di raggi X compaiono e scompaiono come un controllo di calibrazione.
        #JNSQscience_bd_XRayImaging_VallInSpaceHigh_00 = Nel quartiere quieto e gelido di Vall, lo strumento conta una sottile pioggerellina di fotoni da fornaci lontane che funzionano a milioni di kelvin.
        #JNSQscience_bd_XRayImaging_TyloInSpaceLow_00 = La massa di Tylo ti offre una piattaforma stabile e un comodo parasole, permettendo all'imager di estrarre veri punti di raggi X dal rumoroso vicinato di Jool.
        #JNSQscience_bd_XRayImaging_TyloInSpaceHigh_00 = Sopra Tylo, il fondo finalmente si comporta bene: il rilevatore registra una rada costellazione di sorgenti di raggi X duri che sembrano guai disposti su una griglia ordinata.
        #JNSQscience_bd_XRayImaging_BopInSpaceLow_00 = L'orizzonte grumoso di Bop fa tremare l'inquadratura, ma blocca bene anche l'abbagliamento parassita: ogni occultazione rivela un altro debole e caldo emettitore di raggi X.
        #JNSQscience_bd_XRayImaging_BopInSpaceHigh_00 = Con Bop ridotto a un puntino che ruota, l'imager registra deboli bagliori costanti di raggi X: sistemi lontani che fanno cose energetiche che preferiresti non avere vicino.
        #JNSQscience_bd_XRayImaging_PolInSpaceLow_00 = Strane interferenze locali continuano a far impennare i conteggi, eppure il cielo si risolve comunque in punti netti di raggi X da gas estremamente caldo ben oltre Jool.
        #JNSQscience_bd_XRayImaging_PolInSpaceHigh_00 = Molto sopra Pol, il rilevatore scorre liscio e tranquillo, finché un'esplosione improvvisa ti ricorda che l'universo produce calore in modi teatrali.
        #JNSQscience_bd_XRayImaging_LindorInSpaceLow_00 = L'ambiente carico di Lindor continua a tempestare il rilevatore, ma i poli brillano comunque di raggi X energetici come un'etichetta di avvertimento.
        #JNSQscience_bd_XRayImaging_LindorInSpaceHigh_00 = Più lontano, il rumore finalmente cala e il cielo si risolve in puntini di raggi X duri da sistemi abbastanza caldi da stare facendo qualcosa di terribile.
        #JNSQscience_bd_XRayImaging_KrelInSpaceLow_00 = Krel è un piccolo parasole molto comodo: con Lindor schermato, diverse deboli sorgenti di raggi X spuntano dal fondo come se stessero aspettando.
        #JNSQscience_bd_XRayImaging_KrelInSpaceHigh_00 = Molto sopra la luna pallida, l'imager registra fotoni costanti da gas estremamente caldo lontano, e si sente stranamente giudicato dal silenzio.
        #JNSQscience_bd_XRayImaging_AdenInSpaceLow_00 = Aden sobbalza nell'inquadratura e per caso esegue occultazioni perfette, rivelando per un attimo sorgenti di raggi X nascoste nell'abbagliamento.
        #JNSQscience_bd_XRayImaging_AdenInSpaceHigh_00 = Con Aden ridotto a un puntino, ottieni un campo di raggi X pulito e rado, minuscoli punti che esistono solo perché qualcosa è a milioni di kelvin.
        #JNSQscience_bd_XRayImaging_HuygenInSpaceLow_00 = La luna velata aggiunge la sua assorbimento soffice e un bagliore parassita, quindi ti affidi alle bande più dure e riesci comunque a catturare alcuni emettitori netti e violenti.
        #JNSQscience_bd_XRayImaging_HuygenInSpaceHigh_00 = Lontano dalla foschia di Huygen, l'imager costruisce una mappa nitida di punti ad alta energia che di sicuro non sono luce stellare "normale".
        #JNSQscience_bd_XRayImaging_RigaInSpaceLow_00 = L'ampio disco di Riga schermà il peggio del fondo e il rilevatore trova subito diverse ostinate sorgenti di raggi X che si rifiutano di stare zitte.
        #JNSQscience_bd_XRayImaging_RigaInSpaceHigh_00 = Molto sopra la grande biglia marrone, i conteggi arrivano lenti e puliti, finché un breve impulso fa impennare il grafico e rovina la tua calma.
        #JNSQscience_bd_XRayImaging_TalosInSpaceLow_00 = Talos produce quasi nessuna interferenza locale, il che è perfetto, finché lo strumento non cattura un lampo improvviso da qualcosa di inimmaginabilmente caldo.
        #JNSQscience_bd_XRayImaging_TalosInSpaceHigh_00 = Nel freddo e nel buio dell'orbita alta, il cielo diventa una sottile costellazione di raggi X duri: fornaci lontane che bruciano senza fiamma visibile.
        #JNSQscience_bd_XRayImaging_EelooInSpaceLow_00 = Eeloo è un ottimo parasole: con l'abbagliamento ridotto, compaiono deboli puntini di raggi X, gas lontano riscaldato ben oltre il "ragionevole".
        #JNSQscience_bd_XRayImaging_EelooInSpaceHigh_00 = Nel freddo buio, il rilevatore conta una sottile pioggerellina di raggi X duri da oggetti che devono stare viaggiando a milioni di kelvin.
        #JNSQscience_bd_XRayImaging_CelesInSpaceLow_00 = Usando Celes come otturatore, isoli una ostinata sorgente ad alta energia... poi entrambe le squadre di analisi marcano il file "NDA" e se ne vanno.
        #JNSQscience_bd_XRayImaging_CelesInSpaceHigh_00 = Con interferenza locale quasi zero, l'imager costruisce un campo nitido di punti di raggi X taglienti: stelle che brillano solo quando sono pericolosamente calde.
        #JNSQscience_bd_XRayImaging_TamInSpaceLow_00 = Tam sobbalza nell'inquadratura e per caso esegue occultazioni perfette, rivelando per un attimo lampi da bersagli estremamente caldi e molto lontani.
        #JNSQscience_bd_XRayImaging_TamInSpaceHigh_00 = Le letture sono per lo più quiete e deboli, finché un picco improvviso ti ricorda che da qualche parte là fuori qualcosa sta bollendo a temperature assurde.
        #JNSQscience_bd_XRayImaging_HamekInSpaceLow_00 = Lo strano colore di Hamek non conta ai raggi X: il cielo dietro di lui si accende comunque di sorgenti compatte alimentate da plasma ustionante.
        #JNSQscience_bd_XRayImaging_HamekInSpaceHigh_00 = Molto sopra il mondo rosso, mappi una rada costellazione di raggi X duri: minuscoli punti che esistono perché qualcosa è violentemente, impossibilmente caldo.
        #JNSQscience_bd_XRayImaging_NaraInSpaceLow_00 = L'involucro di idrogeno freddo di Nara non dovrebbe brillare affatto, eppure deboli archi di raggi X tracciano dove particelle energetiche si schiantano negli strati superiori.
        #JNSQscience_bd_XRayImaging_NaraInSpaceHigh_00 = Con Nara ridotta a un disco lontano, l'imager si calma e cataloga minuscoli puntini di raggi X duri, sistemi lontani a temperature ridicole.
        #JNSQscience_bd_XRayImaging_AmosInSpaceLow_00 = Amos è un ottimo otturatore contro Nara: mentre la luna attraversa la vista, sorgenti di raggi X nascoste lampeggiano accendendosi e spegnendosi.
        #JNSQscience_bd_XRayImaging_AmosInSpaceHigh_00 = Molto sopra Amos, la frequenza dei conteggi è quasi noiosa, finché un impulso netto fa impennare il grafico e tutti improvvisamente prestano attenzione.
        #JNSQscience_bd_XRayImaging_EnonInSpaceLow_00 = Il bordo luminoso di Enon è perfetto per le occultazioni: il cielo dietro rivela alcuni ostinati fari di raggi X che si rifiutano di essere "solo stelle".
        #JNSQscience_bd_XRayImaging_EnonInSpaceHigh_00 = Lontano da Enon, l'imager costruisce una rada costellazione di raggi X duri, la prova che da qualche parte là fuori qualcosa sta bollendo in modo violento.
        #JNSQscience_bd_XRayImaging_PraxInSpaceLow_00 = L'orbita periferica di Prax mantiene tutto abbastanza quieto da tarare il rilevatore: il fondo cala e deboli punti di raggi X emergono uno a uno.
        #JNSQscience_bd_XRayImaging_PraxInSpaceHigh_00 = Con Prax ridotto a un punto, lo strumento registra una sottile pioggerellina di fotoni ad alta energia da gas caldo lontano e catastrofi improvvise.

        // logIonTrap
        #JNSQscience_logIonTrap_SunInSpaceLow_00 = La trappola ionica satura quasi all'istante. Gli ioni sono fin troppo eccitati così vicino al sole.
        #JNSQscience_logIonTrap_SunInSpaceHigh_00 = Nello spazio interplanetario, il flusso di ioni arriva in strati regolari con occasionali picchi a raffiche che non coincidono con nulla di locale.
        #JNSQscience_logIonTrap_EdnaInSpaceLow_00 = Una debole scia di ioni sputterizzati segue Edna, ma la trappola raccoglie soprattutto lo stesso vento solare rado che c'è dappertutto quassù.
        #JNSQscience_logIonTrap_EdnaInSpaceHigh_00 = I conteggi restano bassi e regolari. Edna aggiunge poco più di una piccola ombra in un flusso di particelle per il resto tranquillo.
        #JNSQscience_logIonTrap_DakInSpaceLow_00 = Un passaggio ravvicinato su Dak solleva un breve spruzzo di polvere carica e poi gli ioni tornano subito a vagare senza meta.
        #JNSQscience_logIonTrap_DakInSpaceHigh_00 = Le letture sono per lo più particelle di fondo.
        #JNSQscience_logIonTrap_LindorInSpaceLow_00 = La trappola ionica si riempie di ioni freddi e lenti. Lo scudo invisibile di Lindor sta lavorando sul serio.
        #JNSQscience_logIonTrap_LindorInSpaceHigh_00 = Anche molto lontano, il rilevatore continua a ticchettare con particelle intrappolate. L'influenza di Lindor è sleale.
        #JNSQscience_logIonTrap_KrelInSpaceLow_00 = Sopra Krel, la trappola cattura un sottile spruzzo di sali sputterizzati mescolati nel plasma vagante di Lindor.
        #JNSQscience_logIonTrap_KrelInSpaceHigh_00 = Lontano da Krel, le letture si fanno uniformi in una corrente costante che sussurra ancora "pianeta madre vicino".
        #JNSQscience_logIonTrap_AdenInSpaceLow_00 = Un breve impulso di polvere carica fa scattare i sensori: Aden rilascia più particelle di quante ne avrebbe diritto.
        #JNSQscience_logIonTrap_AdenInSpaceHigh_00 = La trappola conta per lo più ioni di fondo, con picchi occasionali quando attraversi un foglio di plasma.
        #JNSQscience_logIonTrap_HuygenInSpaceLow_00 = La foschia superiore lascia filtrare un cocktail disordinato di ioni: la trappola lo registra come "chimica estremamente entusiasta".
        #JNSQscience_logIonTrap_HuygenInSpaceHigh_00 = Sopra il bagliore, il flusso torna ordinato. Le linee di campo di Lindor sono chiaramente al comando.
        #JNSQscience_logIonTrap_RigaInSpaceLow_00 = Riga rimescola il plasma come un mestolo in una zuppa. La trappola ionica registra raffiche vorticose e margini netti.
        #JNSQscience_logIonTrap_RigaInSpaceHigh_00 = Il tasso di conteggio sale e scende con un ritmo lento, come se Riga stesse attraversando fasce di particelle intrappolate.
        #JNSQscience_logIonTrap_TalosInSpaceLow_00 = Talos contribuisce con un timido sbuffo di ioni, poi torna a far finta di non esserci.
        #JNSQscience_logIonTrap_TalosInSpaceHigh_00 = Quasi nulla cambia per minuti alla volta. La trappola ionica comincia ad apprezzare il silenzio.
        #JNSQscience_logIonTrap_CelesInSpaceLow_00 = La trappola ionica cattura un tenue filo di ioni che sembra più il respiro sottile di Eeloo che qualunque cosa Celes riesca a produrre.
        #JNSQscience_logIonTrap_CelesInSpaceHigh_00 = Quassù il vento solare è avaro. Il rilevatore registra una lenta pioggerellina di particelle cariche e un sacco di nulla.
        #JNSQscience_logIonTrap_TamInSpaceLow_00 = Un breve impulso di graniglia carica fa scattare i sensori mentre la superficie di Tam viene sabbiata fino a diventare ioni.
        #JNSQscience_logIonTrap_TamInSpaceHigh_00 = Le letture si appiattiscono in conteggi di fondo regolari, occasionalmente interrotti da una raffica di plasma di passaggio.
        #JNSQscience_logIonTrap_HamekInSpaceLow_00 = La trappola raccoglie un miscuglio insolito di ioni vicino a Hamek. Gli spettri non combaciano del tutto con le solite aspettative di ghiaccio e polvere.
        #JNSQscience_logIonTrap_HamekInSpaceHigh_00 = I conteggi di particelle scendono così in basso che inizi a sospettare che l'universo stia semplicemente finendo gli ioni di riserva.
        #JNSQscience_logIonTrap_NaraInSpaceLow_00 = La trappola si riempie di ioni leggeri e raffiche tremolanti. L'alta atmosfera e la magnetosfera di Nara stanno avendo una conversazione molto rumorosa.
        #JNSQscience_logIonTrap_NaraInSpaceHigh_00 = Nel profondo spazio i conteggi si calmano, ma un tenue e persistente deriva suggerisce che Nara stia ancora influenzando il flusso da lontano.
        #JNSQscience_logIonTrap_AmosInSpaceLow_00 = Un sottile spruzzo di polvere carica sfiora il rilevatore mentre Amos attraversa il plasma di Nara come un sassolino nella foschia.
        #JNSQscience_logIonTrap_AmosInSpaceHigh_00 = Per lo più ioni di fondo, con brevi picchi ogni volta che finisci in un filamento vagante del dominio di Nara.
        #JNSQscience_logIonTrap_EnonInSpaceLow_00 = La trappola ionica cattura ioni freddi del gruppo dell'acqua strappati dalla superficie ghiacciata di Enon, come una palla di neve che evapora in silenzio nello spazio.
        #JNSQscience_logIonTrap_EnonInSpaceHigh_00 = Il flusso si assottiglia in una pioggerellina rada. Il contributo di Enon svanisce finché non resta che un'altra ombra silenziosa.
        #JNSQscience_logIonTrap_PraxInSpaceLow_00 = La trappola registra ping irregolari di graniglia carica, come se Prax stesse perdendo minuscole particelle nel buio una a una.
        #JNSQscience_logIonTrap_PraxInSpaceHigh_00 = Le letture si appiattiscono in un vuoto costante.

        // logmmImpacts
        #JNSQscience_logmmImpacts_SunInSpaceLow_00 = Il contatore d'impatto ticchetta senza sosta, ma la maggior parte dei "meteoroidi" sono grani di polvere che non sopravvivono al primo assaggio del sole.
        #JNSQscience_logmmImpacts_SunInSpaceHigh_00 = Lunghi tratti di silenzio sono interrotti da un ping solitario. La polvere interplanetaria non si cura di quale orbita tu stia attraversando.
        #JNSQscience_logmmImpacts_EdnaInSpaceLow_00 = Una grandinata ruvida di minuscoli impatti suggerisce che Edna stia raccogliendo più materiale della fascia di quanto chiunque si aspettasse.
        #JNSQscience_logmmImpacts_EdnaInSpaceHigh_00 = Gli impatti si diradano in occasionali vagabondi, come sassolini che attraversano il buio per conto loro.
        #JNSQscience_logmmImpacts_DakInSpaceLow_00 = Dak sembra indossare un debole alone di ghiaia: il sensore fa ping ping ping mentre sfiori la "superficie" grumosa.
        #JNSQscience_logmmImpacts_DakInSpaceHigh_00 = Qui si registrano solo pochi impatti, come se qualcuno stesse scrollando briciole da uno spuntino molto lontano.
        #JNSQscience_logmmImpacts_LindorInSpaceLow_00 = Il contatore d'impatto ticchetta mentre grani di ghiaccio vaganti e graniglia tempestano lo scafo. Il vicinato di Lindor è tutto fuorché ordinato.
        #JNSQscience_logmmImpacts_LindorInSpaceHigh_00 = Un raro tic echeggia nella cabina. Anche lontano da tutto, l'universo continua a lanciare briciole.
        #JNSQscience_logmmImpacts_KrelInSpaceLow_00 = Il sensore vibra in brevi raffiche, come se Krel si trascinasse dietro una sottile scia di polvere pallida lungo la sua orbita stretta.
        #JNSQscience_logmmImpacts_KrelInSpaceHigh_00 = Quassù non colpisce quasi nulla. Krel sembra piccolo perfino alla graniglia alla deriva.
        #JNSQscience_logmmImpacts_AdenInSpaceLow_00 = Una tempestata costante suggerisce che la traccia di Aden sia disseminata di grani scuri e ostinati che si rifiutano di andarsene.
        #JNSQscience_logmmImpacts_AdenInSpaceHigh_00 = Si registrano solo pochi tocchi leggeri. Il resto dello spazio ti manca per un margine enorme.
        #JNSQscience_logmmImpacts_HuygenInSpaceLow_00 = Il contatore fa ping mentre particelle fini e appiccicose colpiscono l'involucro. La foschia di Huygen sembra determinata a viaggiare.
        #JNSQscience_logmmImpacts_HuygenInSpaceHigh_00 = Impatti radi, ognuno un promemoria che il buio tra i mondi è ancora pieno di granelli vaganti.
        #JNSQscience_logmmImpacts_RigaInSpaceLow_00 = Un tamburellare regolare implica che Riga stia raccogliendo più detriti di quanto la sua dimensione meriti. Meno male che hai pannelli robusti.
        #JNSQscience_logmmImpacts_RigaInSpaceHigh_00 = Gli impatti rallentano in colpi occasionali. Per una volta, la tua nave è il bersaglio più grande nei paraggi.
        #JNSQscience_logmmImpacts_TalosInSpaceLow_00 = Il rilevatore schizza vicino a Talos, come se i suoi colori vistosi avessero anche una nuvola abbinata di minuscoli "souvenir".
        #JNSQscience_logmmImpacts_TalosInSpaceHigh_00 = Lungo silenzio, poi un singolo tonfo. Lo spazio è quasi vuoto, ma non è mai del tutto educato.
        #JNSQscience_logmmImpacts_CelesInSpaceLow_00 = Il contatore vibra di piccoli colpi, come se Celes fosse avvolto in una sottile nuvola di graniglia. Il file dati etichetta cortesemente la sorgente "REDACTED".
        #JNSQscience_logmmImpacts_CelesInSpaceHigh_00 = Meno impatti quassù, solo il colpetto occasionale, come qualcuno che bussa a una porta con scritto "NDA".
        #JNSQscience_logmmImpacts_TamInSpaceLow_00 = Uno staccato di ping suggerisce che Tam stia spargendo briciole nella propria orbita. Simpatica roccetta ostile, eh?
        #JNSQscience_logmmImpacts_TamInSpaceHigh_00 = Gli impatti arrivano più di rado, ma sembrano più secchi. Qualunque cosa ci sia quassù ha avuto tempo di prendere velocità.
        #JNSQscience_logmmImpacts_HamekInSpaceLow_00 = Il rilevatore registra gli impatti e la schermatura si guadagna una debole macchia ostinata. Nessuno riesce a mettersi d'accordo su che colore sia.
        #JNSQscience_logmmImpacts_HamekInSpaceHigh_00 = Un ping raro, poi lungo silenzio. La polvere misteriosa prima o poi ti trova comunque.
        #JNSQscience_logmmImpacts_NaraInSpaceLow_00 = Il contatore scatta con regolarità per minuscoli grani veloci. Le alte quote di Nara sembrano perdere brillantini nello spazio.
        #JNSQscience_logmmImpacts_NaraInSpaceHigh_00 = Gli impatti sono radi, ma ognuno arriva con un crepitio di statica, come se la polvere portasse una carica.
        #JNSQscience_logmmImpacts_AmosInSpaceLow_00 = Tocchi leggeri si registrano mentre puntini scuri tempestano lo scafo. Amos non sembra granché, ma chiaramente sta raccogliendo compagnia.
        #JNSQscience_logmmImpacts_AmosInSpaceHigh_00 = Qui non colpisce quasi nulla.
        #JNSQscience_logmmImpacts_EnonInSpaceLow_00 = Il sensore segnala una raffica di grani luminosi e ghiacciati. È come orbitare dentro una nevicata molto silenziosa.
        #JNSQscience_logmmImpacts_EnonInSpaceHigh_00 = Qui si registrano solo pochi impatti, ognuno un piccolo promemoria che lo spazio "pulito" è un mito.
        #JNSQscience_logmmImpacts_PraxInSpaceLow_00 = Un tamburellare lento e costante suggerisce che Prax viva ai margini, dove le particelle vaganti vanno a passeggiare.
        #JNSQscience_logmmImpacts_PraxInSpaceHigh_00 = Lunghi intervalli tra gli impatti, poi un singolo ping. Lo spazio conserva le sue sorprese per chi ha pazienza.

        // === HabTech2 ===
        // MCE
        #JNSQscience_MCE_SunInSpaceLow_00 = Le schede COTS dell'MCE ricevono una lezione diretta sul "meteo solare", mentre HDTV cerca di non far cuocere il sensore e il SIMPLE cerca di non trasformarsi in un aquilone costosissimo.
        #JNSQscience_MCE_SunInSpaceLow_01 = Il KSS-IMAP registra oscillazioni selvagge di particelle cariche. Il REX-J esegue un autocontrollo e suggerisce con garbo di smetterla di chiamarlo "quasi spazio".
        #JNSQscience_MCE_SunInSpaceHigh_00 = Lontano da qualunque singolo mondo, l'MCE registra l'hKss costante e il pop dello spazio interplanetario: il rapporto di sopravvivenza diventa una lunga lista di "ancora funzionante".
        #JNSQscience_MCE_SunInSpaceHigh_01 = Il KSS-IMAP non può mappare il "nulla", quindi mappa le tendenze: l'HDTV cattura fotogrammi di calibrazione nero su nero che gli ingegneri insistono siano "bellissimi".
        #JNSQscience_MCE_MohoInSpaceLow_00 = Il brutale ciclo termico di Moho trasforma il vano MCE in un forno da test di stress: i componenti COTS escono dalle specifiche, ci rientrano e fanno finta che non sia successo niente.
        #JNSQscience_MCE_MohoInSpaceLow_01 = L'HDTV ottiene scatti del terreno affilati come rasoi. Il KSS-IMAP conferma "nessuna atmosfera rilevata", e il GLIMS presenta un reclamo formale per la mancanza di tempeste.
        #JNSQscience_MCE_MohoInSpaceHigh_00 = In alto sopra Moho, gli strumenti misurano più ambiente che pianeta: la suite sopravvive con attenti cicli di alimentazione e preghiere silenziose ai pannelli radiatori.
        #JNSQscience_MCE_MohoInSpaceHigh_01 = Il REX-J esegue test su giunti e lubrificanti nell'ombra fredda: il SIMPLE resta gonfio, ma tutti concordano che sembri nervoso.
        #JNSQscience_MCE_EveInSpaceLow_00 = Il GLIMS cattura lampi luminosi e fugaci sopra le cime delle nubi di Eve: l'HDTV mette alla prova la gamma dinamica finché i bianchi fioriscono e il Controllo Missione litiga sull'esposizione.
        #JNSQscience_MCE_EveInSpaceLow_01 = Il KSS-IMAP produce una mappa globale di sistemi vorticosi: l'elettronica COTS sopporta letture costanti di umidità che in realtà non può percepire.
        #JNSQscience_MCE_EveInSpaceHigh_00 = Dall'orbita alta, Il KSS-IMAP ricuce un rilievo atmosferico completo: i risultati sono "completi", "terrificanti" e "molto viola".
        #JNSQscience_MCE_EveInSpaceHigh_01 = Il GLIMS osserva il lato notturno in cerca di luce transitoria: la suite registra eventi ripetuti e li etichetta "interessanti" per evitare di usare la parola "sinistro".
        #JNSQscience_MCE_GillyInSpaceLow_00 = Il mantenimento d'orbita attorno a Gilly è metà della missione: il REX-J esegue minuscole correzioni che sembrano eroiche e l'HDTV fatica a tenere l'orizzonte grumoso nell'inquadratura.
        #JNSQscience_MCE_GillyInSpaceLow_01 = La suite registra gentili impatti di polvere ed escursioni termiche estreme: il SIMPLE resta gonfio, soprattutto perché c'è pochissima gravità pronta a contraddirlo.
        #JNSQscience_MCE_GillyInSpaceHigh_00 = In alto sopra Gilly, l'MCE passa più tempo a cercare il bersaglio che a osservarlo. Il KSS-IMAP archivia una mappa atmosferica composta interamente da "nessuna".
        #JNSQscience_MCE_GillyInSpaceHigh_01 = I test di sopravvivenza COTS di lunga durata producono il tipo migliore di dati: noiosi, coerenti e solo leggermente allarmanti quando i contatori di radiazione schizzano.
        #JNSQscience_MCE_KerbinInSpaceLow_00 = L'MCE segnala lampi GLIMS sul lato notturno mentre Il KSS-IMAP ricuce una mappa atmosferica: il pacchetto HDTV lo chiama "carino" e gli ingegneri lo chiamano "dati".
        #JNSQscience_MCE_KerbinInSpaceLow_01 = Il REX-J esegue con successo una "regolazione di precisione" al rack dell'attrezzatura: il pannello gonfiabile del SIMPLE resta ben teso e l'elettronica COTS quasi non si lamenta.
        #JNSQscience_MCE_KerbinInSpaceHigh_00 = Molto sopra Kerbin, la suite registra un ambiente di microgravità più quieto ma un fondo di radiazione più rumoroso: i margini di sopravvivenza vengono ricalcolati con molte più occhiate torve.
        #JNSQscience_MCE_KerbinInSpaceHigh_01 = La copertura globale di Il KSS-IMAP sembra ottima finché il Controllo Missione non nota il tappo dell'obiettivo in un fotogramma di calibrazione dell'HDTV: il GLIMS cattura comunque lampi transitori dove le nubi sono più alte.
        #JNSQscience_MCE_MunInSpaceLow_00 = La bassa orbita munare produce nell'HDTV un contrasto eccellente e un ciclo termico terribile: i componenti COTS passano, ma solo dopo diversi grafici di temperatura molto drammatici.
        #JNSQscience_MCE_MunInSpaceLow_01 = Il GLIMS rileva esattamente zero fulmini (che sorpresa). Il KSS-IMAP mappa un "sottile nulla", e il REX-J continua a cercare di afferrare polvere che si rifiuta di comportarsi nel vuoto.
        #JNSQscience_MCE_MunInSpaceHigh_00 = Dall'orbita munare alta, l'MCE registra un ambiente di particelle più duro e un ping costante di impatti di micrometeoroidi: il rapporto di sopravvivenza guadagna diverse nuove note a piè di pagina.
        #JNSQscience_MCE_MunInSpaceHigh_01 = I test dell'HDTV catturano una falce ordinata di Kerbin mentre la struttura gonfiabile del SIMPLE si irrigidisce in un pallone dall'aria costosissima: tutti concordano che sia "nominale".
        #JNSQscience_MCE_MinmusInSpaceLow_00 = L'abbagliamento di Minmus rende insidiosa la calibrazione dell'HDTV. Il KSS-IMAP restituisce mappe pulite e coerenti mentre il REX-J scopre che la bassa gravità fa sembrare ogni compito troppo sicuro di sé.
        #JNSQscience_MCE_MinmusInSpaceLow_01 = L'MCE registra freddo intenso, delicati impatti di particolato e hardware COTS sorprendentemente collaborativo: il GLIMS conferma di nuovo che "nessuna tempesta" è comunque un risultato.
        #JNSQscience_MCE_MinmusInSpaceHigh_00 = In alto sopra Minmus, la suite registra un fondo stabile con meno disturbi locali: il miglior esito è che non succeda nulla di inatteso per molto tempo.
        #JNSQscience_MCE_MinmusInSpaceHigh_01 = La prova di lunga durata mostra i sistemi COTS che lentamente escono dalle specifiche, poi rientrano dopo un riavvio: la conclusione ufficiale è "lo spazio è maleducato, ma prevedibile".
