        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_00 // The Goo is developing a nice tan.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_01 // The Goo skitters around in its canister!
