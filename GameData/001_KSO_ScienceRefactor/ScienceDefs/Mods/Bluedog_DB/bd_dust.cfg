@EXPERIMENT_DEFINITION:HAS[#id[bd_dust]]
{
	@title = #ScienceRefactor_bd_dust_title // Dust Analysis
	!RESULTS{}
    %RESULTS
	{
		default = #ScienceRefactor_bd_dust_default_00 // The collided grains seem to be rather small.
		InSpace* = #ScienceRefactor_bd_dust_default_01 // The dust forms to a pancake-shaped cloud. This could cause a counterglow.

		KerbinSrfLandedLaunchpad* = #ScienceRefactor_bd_dust_KerbinSrfLandedLaunchpad_00 // The entering grains consists of burnt rocket fuel particles.
		KerbinSrfLandedRunway* = #ScienceRefactor_bd_dust_KerbinSrfLandedRunway_00 // The dust seems consists of pollution particles.
		KerbinSrfLandedKSC* = #ScienceRefactor_bd_dust_KerbinSrfLandedKSC_00 // There is evidence that the dust consists of pollen, Kerbal hairs and spacesuit fibers.
		KerbinFlyingLowGrasslands* = #ScienceRefactor_bd_dust_KerbinFlyingLowGrasslands_00 // The density of the grains seems to be the same of pollen. Achoo..
		KerbinFlyingLowDeserts* = #ScienceRefactor_bd_dust_KerbinFlyingLowDeserts_00 // Lots of collisions, quite a dusty place.
		KerbinFlyingLowBadlands* = #ScienceRefactor_bd_dust_KerbinFlyingLowBadlands_00 // The same dust you can find on our bookshelves.
		KerbinFlyingLowShores* = #ScienceRefactor_bd_dust_KerbinFlyingLowShores_00 // A loose granular material. Probably the same you can find blanketing the beaches, riverbeds and deserts of Kerbin.
		KerbinFlyingLowIceCaps* = #ScienceRefactor_bd_dust_KerbinFlyingLowIceCaps_00 // Dust with a complex spectral signature incoming.
		KerbinInSpaceLow* = #ScienceRefactor_bd_dust_KerbinInSpaceLow_00 // We found evidence of extremely fine particles of mineral dust.
		KerbinInSpaceLow* = #ScienceRefactor_bd_dust_KerbinInSpaceLow_01 // A different dust up here. It seems to form a shape.
		
		MunInSpaceHigh* = #ScienceRefactor_bd_dust_MunInSpaceHigh_00 // This dust is not like talcum powder. It is kind of evil. It follows electric field lines, it works its way in equipment.
		MunInSpaceLow* = #ScienceRefactor_bd_dust_MunInSpaceLow_00 // High Densities! Good impact rate. Dust on low altitude should be able to cast a glow on sunset.
		MunInSpaceLowTwinCraters* = #ScienceRefactor_bd_dust_MunInSpaceLowTwinCraters_00 // After every grain collision follows a collision with the same charge.
		MunInSpaceLowEastFarsideCrater* = #ScienceRefactor_bd_dust_MunInSpaceLowEastFarsideCrater_00 // Lower collision rate, but heavy impacts.
		MunInSpaceLowMidlandCraters* = #ScienceRefactor_bd_dust_MunInSpaceLowMidlandCraters_00 // Lower collision rate and weak impacts.
		MunInSpaceLowMidlands* = #ScienceRefactor_bd_dust_MunInSpaceLowMidlands_00 // Collision rate and impacts on an mean level.
		MunInSpaceLowHighlands* = #ScienceRefactor_bd_dust_MunInSpaceLowHighlands_00 // The grains have a high charge.
		MunInSpaceLowPolarLowlands* = #ScienceRefactor_bd_dust_MunInSpaceLowPolarLowlands_00 // No grains are entering the sensor. Perhaps it is too cold.
		MunInSpaceLowFarsideCrater* = #ScienceRefactor_bd_dust_MunInSpaceLowFarsideCrater_00 // Almost no collision, weak impacts.
		MunSrfLanded* = #ScienceRefactor_bd_dust_MunSrfLanded_00 // Truth! The munar exosphere contains dust due to electrostatic levitation.

		MinmusInSpaceHigh* = #ScienceRefactor_bd_dust_MinmusInSpaceHigh_00 // Almost no impacts. Density is lower than the density of water. But higher than the density of our cafeteria mint ice.
		MinmusInSpaceLowHighlands* = #ScienceRefactor_bd_dust_MinmusInSpaceLowHighlands_00 // We did find sulfate coatings on the ionized dust particles.
		MinmusInSpaceLowMidlands* = #ScienceRefactor_bd_dust_MinmusInSpaceLowMidlands_00 // The can of our instrument looks like a mint sundae. Results suggest that the particles being deposited have different composition to those still at higher altitudes.
		MinmusInSpaceLowSlopes* = #ScienceRefactor_bd_dust_MinmusInSpaceLowSlopes_00 // Low level dust.
		MinmusInSpaceLowGreatFlats* = #ScienceRefactor_bd_dust_MinmusInSpaceLowGreatFlats_00 // Notably no sulphate particles are present in the dust sampled. Indicating a lack of anthropogenic pollution.
		MinmusInSpaceLowGreaterFlats* = #ScienceRefactor_bd_dust_MinmusInSpaceLowGreaterFlats_00 // Traces of dust from gypsum, quartz, NaCl (which may be sea salt or mineral halite), calcium rich particles, and calcium carbonates.
		MinmusInSpaceLowLesserFlats* = #ScienceRefactor_bd_dust_MinmusInSpaceLowLesserFlats_00 // Moderate dust storm.
		MinmusInSpaceLowFlats* = #ScienceRefactor_bd_dust_MinmusInSpaceLowFlats_00 // Composition of particles with diameter greater than 1my.
		MinmusInSpaceLowPoles* = #ScienceRefactor_bd_dust_MinmusInSpaceLowPoles_00 // Finding a lack of coatings on the ionized dust particles.

		GillyInSpaceLow* = #ScienceRefactor_bd_dust_GillyInSpaceLow_00 // Dust with silicate cores colliding in the back of the instrument.
		GillySrfLanded* = #ScienceRefactor_bd_dust_GillySrfLanded_00 // These grains have a sooty mantle consisting of amorphous carbon.

		MohoInSpaceLow* = #ScienceRefactor_bd_dust_MohoInSpaceLow_00 // Density is almost as high as the density of flying ash.
		MohoSrfLanded* = #ScienceRefactor_bd_dust_MohoSrfLanded_00 // Fine powder made up of glassy spheres from sub-micron to more than 100 microns in size. Specific gravity 1.9 to 2.4 and a bulk density of 0.8-1 ton per cubic meter.

		EveInSpaceLow* = #ScienceRefactor_bd_dust_EveInSpaceLow_00 // The dust is glass like. Strong impacts incoming.
		EveFlying* = #ScienceRefactor_bd_dust_EveFlying_00 // The heavy impacts and the high collision rate are quite a stress test.

		DunaInSpaceLow* = #ScienceRefactor_bd_dust_DunaInSpaceLow_00 // Incoming Grains vary in size between a few tenths of a nanometer to a few microns.
		DunaSrfLanded* = #ScienceRefactor_bd_dust_DunaSrfLanded_00 // The dust is quite grainy and shows sand like collisions.

		IkeInSpaceLow* = #ScienceRefactor_bd_dust_IkeInSpaceLow_00 // Dust particles are few and far between.
		IkeSrfLanded* = #ScienceRefactor_bd_dust_IkeSrfLanded_00 // Only a few dust particles are entering the sensor. We should have brought a shovel.

		DresInSpaceLow* = #ScienceRefactor_bd_dust_DresInSpaceLow_00 // The dust seems to be composed of carbonaceous, silicate, and metallic grains.
		DresSrfLanded* = #ScienceRefactor_bd_dust_DresSrfLanded_00 // The dust is so dense that it absorbs and scatters sun light.

		JoolInSpaceLow* = #ScienceRefactor_bd_dust_JoolInSpaceLow_00 // No dust or the grains are too small to be recognized by the instrument.

		LaytheInSpaceLow* = #ScienceRefactor_bd_dust_LaytheInSpaceLow_00 // The dust tries to from a shape. We observed the same behavior near Kerbin.
		LaytheSrfLanded* = #ScienceRefactor_bd_dust_LaytheSrfLanded_00 // A loose granular material. Probably it consists of calcium carbonate.
		LaytheSrfSplashed* = #ScienceRefactor_bd_dust_LaytheSrfSplashed_00 // No grains are entering the sensor.

		VallInSpaceLow* = #ScienceRefactor_bd_dust_VallInSpaceLow_00 // Dust tries to form a shape. Lower density than water.
		VallSrfLanded* = #ScienceRefactor_bd_dust_VallSrfLanded_00 // The cold seems to trap the dust particles on the surface.

		TyloInSpaceLow* = #ScienceRefactor_bd_dust_TyloInSpaceLow_00 // Avoid this one, it is just a lot of dust and drag and means nothing in the end.
		TyloSrfLanded* = #ScienceRefactor_bd_dust_TyloSrfLanded_00 // Due to the high gravity the dust clumps together to spheres.

		BopInSpaceLow* = #ScienceRefactor_bd_dust_BopInSpaceLow_00 // The dust is clustering to dense cores.
		BopSrfLanded* = #ScienceRefactor_bd_dust_BopSrfLanded_00 // Too much dust in the sensor.

		PolInSpaceLow* = #ScienceRefactor_bd_dust_PolInSpaceLow_00 // Dusting this one would be a good start.
		PolSrfLanded* = #ScienceRefactor_bd_dust_PolSrfLanded_00 // Weak impacts. Probably phosphoric or sulfuric origin.

		EelooInSpaceLow* = #ScienceRefactor_bd_dust_EelooInSpaceLow_00 // Dust particles are few and far between.
		EelooSrfLanded* = #ScienceRefactor_bd_dust_EelooSrfLanded_00 // The Dust consists of CO, silicon carbide, amorphous silicate and lots of ice.

        SarnusInSpaceLow* = #ScienceRefactor_bd_dust_SarnusInSpaceLow_00 // Very small particles detected and seem to have been deflected from the ring plane
		SarnusInSpaceHigh* = #ScienceRefactor_bd_dust_SarnusInSpaceHigh_00 // There appears to be a ring of dust particles around Sarnus
		
        TektoInSpace* = #ScienceRefactor_bd_dust_TektoInSpace_00 // There is only a small amount of particles detected
        TektoInSpace* = #ScienceRefactor_bd_dust_TektoInSpace_01 // Tekto's inclination does not appear to allow it to capture many ring particles
        
        SlateInSpace* = #ScienceRefactor_bd_dust_SlateInSpace_00 // Incoming Grains vary in size between a few tenths of a nanometer to a few microns
        SlateLanded* = #ScienceRefactor_bd_dust_SlateLanded_00 // The cold seems to trap the dust particles on the surface
        SlateLanded* = #ScienceRefactor_bd_dust_SlateLanded_01 // Density is almost as high as the density of flying ash
        
        HaleInSpace* = #ScienceRefactor_bd_dust_HaleInSpace_00 // Incoming Grains vary in size between a few tenths of a nanometer to a few microns
        HaleInSpacelow* = #ScienceRefactor_bd_dust_HaleInSpacelow_00 // Detected particles are rapidly increasing in frequency the closer we are to the planet's ring plane
        HaleLanded* = #ScienceRefactor_bd_dust_HaleLanded_00 // The detected grains are certainly material from the rings given their proximity
        
        OvokInSpace* = #ScienceRefactor_bd_dust_OvokInSpace_00 // Dust tries to form a shape. Lower density than water
        OvokLanded* = #ScienceRefactor_bd_dust_OvokLanded_00 // Dust appears to be a very fine and fluffy material. It could just be snow...
			
		UrlumInSpace* = #ScienceRefactor_bd_dust_UrlumInSpace_00 //  No dust or the grains are too small to be recognized by the instrument
		UrlumInSpaceHigh* = #ScienceRefactor_bd_dust_UrlumInSpaceHigh_00 // Some particles are detected and could be part of a faint ring around the planet
		
        WalInSpace* = #ScienceRefactor_bd_dust_WalInSpace_00 // The dust tries to from a shape. We observed the same behavior near Kerbin
        WalInSpace* = #ScienceRefactor_bd_dust_WalInSpace_01 // Weak impacts. Probably phosphoric or sulfuric origin
        
        TalInSpace* = #ScienceRefactor_bd_dust_TalInSpace_00 // Very fine impacts, could be snowflakes
        TalInSpace* = #ScienceRefactor_bd_dust_TalInSpace_01 // Fine, powdery impacts detected at the highest sensitivity
				
        PriaxInSpace* = #ScienceRefactor_bd_dust_PriaxInSpace_00 // Some dust particles detected, likely deflected by the Priax-Polta resonance
        PriaxInSpaceLow* = #ScienceRefactor_bd_dust_PriaxInSpaceLow_00 // Dust measurements are similar to what we expect around rocky asteroids
        
        PoltaInSpace* = #ScienceRefactor_bd_dust_PoltaInSpace_00 // Some dust particles detected, likely deflected by the Priax-Polta resonance
        PoltaInSpaceLow* = #ScienceRefactor_bd_dust_PoltaInSpaceLow_00 // Very fine impacts, could be snowflakes
			
		NeidonInSpace* = #ScienceRefactor_bd_dust_NeidonInSpace_00 // No dust or the grains are too small to be recognized by the instrument.
		NeidonInSpace* = #ScienceRefactor_bd_dust_NeidonInSpace_01 // Dust particles are few and far between
		
        ThatmoInSpaceHigh* = #ScienceRefactor_bd_dust_ThatmoInSpaceHigh_00 // Faint snowy particles detected, which could be Thatmo's atmosphere being blown away
        ThatmoInSpaceLow* = #ScienceRefactor_bd_dust_ThatmoInSpaceLow_00 // Ice, ice, baby! But likely not vanilla. We're thinking Nitrogen
    }
}