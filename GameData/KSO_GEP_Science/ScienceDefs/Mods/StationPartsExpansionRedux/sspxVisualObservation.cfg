@EXPERIMENT_DEFINITION:HAS[#id[sspxVisualObservation]]
{
    //@biomeMask = 3
    %RESULTS
    {
        GrannusFlyingHigh* = #GEPscience_sspxVisualObservation_GrannusFlyingHigh_00 // The dim red light fills the cabin like an old warning lamp, and the horizon refuses to look “up” or “down” for long.
        GrannusInSpaceLow* = #GEPscience_sspxVisualObservation_GrannusInSpaceLow_00 // Up close, Grannus is less “sunrise” and more “endless ember”; you instinctively check the radio, even though Kerbin is far beyond caring distance.
        GrannusInSpaceHigh* = #GEPscience_sspxVisualObservation_GrannusInSpaceHigh_00 // Grannus shrinks to a ruddy coin, and everything else becomes black, quiet, and very, very patient.

        TaranisInSpaceLow* = #GEPscience_sspxVisualObservation_TaranisInSpaceLow_00 // One side glows like it’s remembering how to be liquid; the other side is a hard, lightless bruise, and you can’t decide which is worse to stare at.
        TaranisInSpaceHigh* = #GEPscience_sspxVisualObservation_TaranisInSpaceHigh_00 // From high orbit, Taranis looks like a tiny argument between fire and night, settled only by vacuum.
        TaranisSrfLandedMagmaShores* = #GEPscience_sspxVisualObservation_TaranisSrfLandedMagmaShores_00 // The shoreline is a bright, slow “wave” that never breaks; you log it as “beautiful” and immediately regret using that word near molten rock.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_sspxVisualObservation_TaranisSrfLandedScorchedLowlands_00 // The ground is baked into sharp simplicity, like the planet is trying to erase its own surface as fast as you can look at it.
        TaranisSrfLandedMidlands* = #GEPscience_sspxVisualObservation_TaranisSrfLandedMidlands_00 // The terrain fades from glare to shadow in a few kilometers, as if the world can’t commit to being seen.
        TaranisSrfLandedHighlands* = #GEPscience_sspxVisualObservation_TaranisSrfLandedHighlands_00 // The high ground gives you a longer view of the divide between incandescent day and frozen night, and neither side looks interested in visitors.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_sspxVisualObservation_TaranisSrfLandedDarkSideMidlands_00 // The darkness isn’t just “no light” here; it feels like the planet is actively saving it up.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_sspxVisualObservation_TaranisSrfLandedDarkSideHighlands_00 // You can almost convince yourself the stars are brighter—until you remember they’re the same stars, and you’re just more alone under them.
        TaranisSrfLandedPoles* = #GEPscience_sspxVisualObservation_TaranisSrfLandedPoles_00 // The low sun angle makes everything look razor-edged and unreal, like the world is a model somebody forgot to finish.
        TaranisSrfSplashedMagmaSea* = #GEPscience_sspxVisualObservation_TaranisSrfSplashedMagmaSea_00 // The surface ripples lazily, glowing from within; you record a “splash report” and decide that wording was a mistake.
        TaranisSrfSplashedMagmaShores* = #GEPscience_sspxVisualObservation_TaranisSrfSplashedMagmaShores_00 // The craft bobs beside a shoreline that radiates heat like a furnace door; you keep the window shutter mostly closed on principle.

        ToutatisFlyingHigh* = #GEPscience_sspxVisualObservation_ToutatisFlyingHigh_00 // The thin haze barely counts as sky, but it’s enough to smear the red sunlight into a dull band that makes the world look tired.
        ToutatisInSpaceLow* = #GEPscience_sspxVisualObservation_ToutatisInSpaceLow_00 // The bright hemisphere and the dark hemisphere meet in a sharp seam, and the terminator looks like the only place that might forgive you.
        ToutatisInSpaceHigh* = #GEPscience_sspxVisualObservation_ToutatisInSpaceHigh_00 // From far out, Toutatis is a two-tone coin with a cold face and a hot face, flipping silently in a very distant orbit.
        ToutatisSrfLandedSunnyLowlands* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedSunnyLowlands_00 // The sunward lowlands shimmer with heat haze over bare rock, and your shadow looks unnaturally crisp in the thin air.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedSunnyHighlands_00 // From the sunny heights, the landscape seems scorched clean of detail; you write “featureless” and then add “(aggressively).”
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedTransitionalLowlands_00 // Here the light softens and the temperature stops trying to win; you catch yourself thinking “base site” and quickly stop.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedTransitionalHighlands_00 // The twilight zone stretches out in muted reds and greys, and for a moment the planet almost pretends to be hospitable.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedDarkSideLowlands_00 // The night side feels deep and heavy, like the ground is holding onto cold as a personal hobby.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedDarkSideHighlands_00 // The stars above the dark highlands seem close enough to poke, but the radio delay reminds you they’re not the only far thing.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedSoutheasternMountains_00 // The mountains throw long shadows across the borderlands, carving the landscape into light and dark like a diagram for survival.
        ToutatisSrfLandedWesternMountains* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedWesternMountains_00 // The western peaks stand like broken teeth against the dim red sky, and you briefly wonder if the planet is chewing on your courage.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_sspxVisualObservation_ToutatisSrfLandedDarkSideMountains_00 // The dark-side mountains are silhouettes stacked on silhouettes; you log the view and leave out how quiet it feels in your helmet.

        NodensFlyingHigh* = #GEPscience_sspxVisualObservation_NodensFlyingHigh_00 // The thick air turns the dim red sunlight into a muted glow, and the world below looks almost inviting—almost.
        NodensInSpaceLow* = #GEPscience_sspxVisualObservation_NodensInSpaceLow_00 // Nodens fills the window with blues and greens under an ember sun, and you suddenly remember how long the comm delay really is.
        NodensInSpaceHigh* = #GEPscience_sspxVisualObservation_NodensInSpaceHigh_00 // From far out, Nodens is a small, calm-looking promise in a very empty sky, and your cabin feels even smaller.
        NodensSrfLandedShores* = #GEPscience_sspxVisualObservation_NodensSrfLandedShores_00 // The shoreline fog glows faintly red at dawn, and every wave feels like it’s breaking on someone else’s planet.
        NodensSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_NodensSrfLandedTropicalLowlands_00 // The lowlands look lush from inside the glass, but the light is wrong—like the sun is pretending to be warmer than it is.
        NodensSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_NodensSrfLandedTemperateLowlands_00 // A quiet, wide landscape stretches out under a dull crimson sun, and you keep looking for movement you can’t explain.
        NodensSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_NodensSrfLandedTropicalMidlands_00 // From the midlands, distant cloud banks pile up like slow storms, and you wonder how many days “a day” is supposed to feel like here.
        NodensSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_NodensSrfLandedTemperateMidlands_00 // The terrain rolls away in soft colors, but nothing matches the maps back home—because “back home” is nowhere nearby.
        NodensSrfLandedHighlands* = #GEPscience_sspxVisualObservation_NodensSrfLandedHighlands_00 // The highlands give you a longer horizon and a shorter sense of safety, as if the planet is testing your confidence at altitude.
        NodensSrfLandedTundra* = #GEPscience_sspxVisualObservation_NodensSrfLandedTundra_00 // The ground is pale and still, reflecting the red light like a warning sign, and the silence outside seems thick enough to measure.
        NodensSrfLandedIceCaps* = #GEPscience_sspxVisualObservation_NodensSrfLandedIceCaps_00 // The ice catches the ember sun and throws it back as a cold glare, making the world look beautiful in a way that feels unearned.
        NodensSrfSplashedSaltySeas* = #GEPscience_sspxVisualObservation_NodensSrfSplashedSaltySeas_00 // The sea surface shimmers darkly under the red sun, and you log the view while quietly checking every seal twice.
        NodensSrfSplashedFreshWater* = #GEPscience_sspxVisualObservation_NodensSrfSplashedFreshWater_00 // The water looks clean and familiar until the sky reminds you it isn’t, and you can’t decide whether to feel relieved or uneasy.
        NodensSrfSplashedShores* = #GEPscience_sspxVisualObservation_NodensSrfSplashedShores_00 // You bob near the coast watching red-lit waves crawl in and out, and it feels like the planet is breathing very slowly.

        BelisamaInSpaceLow* = #GEPscience_sspxVisualObservation_BelisamaInSpaceLow_00 // Belisama hangs close to Nodens like it’s afraid to drift away, and the locked dance between them is unsettlingly intimate.
        BelisamaInSpaceHigh* = #GEPscience_sspxVisualObservation_BelisamaInSpaceHigh_00 // From high orbit, you can see how tightly Belisama clings to Nodens, two worlds staring at each other forever under a tired red sun.
        BelisamaSrfLandedFlats* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedFlats_00 // The flats are smooth and quiet, and the sky is dominated by Nodens—so huge it feels less like a view and more like supervision.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedTropicalLowlands_00 // “Tropical” is just a label on a cold moon; the lowlands lie dim and inert, lit by a sun that never quite looks awake.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedTemperateLowlands_00 // The lowlands stretch toward a horizon that never changes much, and you wonder what it’s like to live where the sky’s main feature never moves.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedTropicalMidlands_00 // The midlands feel suspended between rock and sky, with Nodens fixed in place as if someone nailed it there for reference.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedTemperateMidlands_00 // Subtle ridges cast long shadows in the red light, and the landscape looks like it’s been waiting a very long time for observers.
        BelisamaSrfLandedHighlands* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedHighlands_00 // From the highlands, the tidally-locked view is unmistakable: one face for Nodens, one face for darkness, and no room for compromise.
        BelisamaSrfLandedPoles* = #GEPscience_sspxVisualObservation_BelisamaSrfLandedPoles_00 // The low sun angle turns every bump into a blade of shadow, and the stillness feels like a rule, not an accident.

        SucellusInSpaceLow* = #GEPscience_sspxVisualObservation_SucellusInSpaceLow_00 // Sucellus looks heavy for its size—dark, dense, and purposeful—like it’s hoarding secrets in the gaps between craters.
        SucellusInSpaceHigh* = #GEPscience_sspxVisualObservation_SucellusInSpaceHigh_00 // From far away, Sucellus is a small, stubborn dot in an even smaller system, and the red sun makes everything feel underpowered.
        SucellusSrfLandedBasins* = #GEPscience_sspxVisualObservation_SucellusSrfLandedBasins_00 // The basins are deep bowls of shadow and glare, and you catch yourself staring like the ground might reveal what it’s made of if you look hard enough.
        SucellusSrfLandedLowlands* = #GEPscience_sspxVisualObservation_SucellusSrfLandedLowlands_00 // The lowlands are rough and resourceful-looking, the kind of terrain that makes engineers talk quietly and accountants smile nervously.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_SucellusSrfLandedTropicalMidlands_00 // The midlands roll on in dull reds and greys, and the planet feels less like a destination and more like a quarry that never asked to be one.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_SucellusSrfLandedTemperateMidlands_00 // The light is dim, the rock is darker, and your reflections in the window are the brightest thing in sight.
        SucellusSrfLandedHighlands* = #GEPscience_sspxVisualObservation_SucellusSrfLandedHighlands_00 // From the highlands, the horizon looks chipped and metallic, and you start imagining what the drills would sound like in this silence.
        SucellusSrfLandedPoles* = #GEPscience_sspxVisualObservation_SucellusSrfLandedPoles_00 // The poles sit under a thin, cold glare, and the shadows seem to last longer than they should—like the day forgot to arrive.

        CaireenInSpaceLow* = #GEPscience_sspxVisualObservation_CaireenInSpaceLow_00 // Caireen is tiny and irregular, an adopted speck circling Sucellus as if it’s still deciding whether to stay captured.
        CaireenInSpaceHigh* = #GEPscience_sspxVisualObservation_CaireenInSpaceHigh_00 // From high orbit, Caireen nearly disappears, and you realize how easy it would be to lose a moon out here and never notice.
        CaireenSrfLandedLowlands* = #GEPscience_sspxVisualObservation_CaireenSrfLandedLowlands_00 // The lowlands are a jumble of rock and angles, lit by a red sun that makes every surface look older than it probably is.
        CaireenSrfLandedMidlands* = #GEPscience_sspxVisualObservation_CaireenSrfLandedMidlands_00 // From the midlands, Sucellus dominates the sky like a dark anchor, and you feel very aware of how temporary “landing” can be.
        CaireenSrfLandedHighlands* = #GEPscience_sspxVisualObservation_CaireenSrfLandedHighlands_00 // The highlands give you a wide view of nothing but stone and space, and the emptiness feels like it’s watching back.
        CaireenSrfLandedPoles* = #GEPscience_sspxVisualObservation_CaireenSrfLandedPoles_00 // The polar terrain is stark and sharp, and the red light turns the shadows into long, silent warnings.

        SironaFlyingHigh* = #GEPscience_sspxVisualObservation_SironaFlyingHigh_00 // The cloud tops roll by like slow bruises under the ember sun; every glance outside feels like eavesdropping on weather too big to care.
        SironaInSpaceLow* = #GEPscience_sspxVisualObservation_SironaInSpaceLow_00 // Sirona’s bands twist in muted reds and tans, and you catch yourself waiting for a reply from Mission Control that won’t arrive for a long while.
        SironaInSpaceHigh* = #GEPscience_sspxVisualObservation_SironaInSpaceHigh_00 // From high orbit, Sirona’s rings are a faint, pale scratch around a dark giant—delicate, distant, and absolutely not comforting.

        AirmedSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedTropicalLowlands_00 // Warm-toned plains stretch to a low horizon, but the red daylight makes every shadow look like it belongs to someone else’s world.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedTemperateLowlands_00 // The lowlands look calm enough to settle, until you remember the sky’s color and the comm delay that turns “hello” into a historical document.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedTropicalMidlands_00 // From the midlands, the terrain fades into dusty reds and greys; the view is wide, and the loneliness has room to expand.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedTemperateMidlands_00 // The muted landscape seems almost familiar for a moment—then the dim sun angle makes everything feel slightly tilted from reality.
        AirmedSrfLandedHighlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedHighlands_00 // The high ground gives you a longer view and a shorter patience; the horizon looks sharp, like it was cut out of the sky.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedDarkenedLowlands_00 // The light here is noticeably weaker, as if the ground is hoarding it; you log “poor visibility” and underline “mood.”
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedDarkenedMidlands_00 // The dim red glow never quite reaches the valleys, and the shadows look deep enough to hide entire mission plans.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_sspxVisualObservation_AirmedSrfLandedDarkenedHighlands_00 // Even from high terrain, the darkened regions stay stubbornly dull—like the landscape is refusing to be properly observed.
        AirmedSrfLandedPoles* = #GEPscience_sspxVisualObservation_AirmedSrfLandedPoles_00 // The low sun skims the horizon forever, turning every ridge into a long black line and making time feel oddly stretched.
        AirmedInSpaceLow* = #GEPscience_sspxVisualObservation_AirmedInSpaceLow_00 // Airmed hangs beneath the red sun like a small, quiet target; you can see surface contrasts clearly, and still feel completely out of reach.
        AirmedInSpaceHigh* = #GEPscience_sspxVisualObservation_AirmedInSpaceHigh_00 // From far away, Airmed is a tiny, disciplined circle in a huge black field—easy to lose, hard to forget.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_sspxVisualObservation_BorvoSrfLandedTropicalCraquelure_00 // The ground is cracked into tight plates, like dried paint on an ancient hull; the red light makes the fractures look freshly opened.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_sspxVisualObservation_BorvoSrfLandedTemperateCraquelure_00 // Wide, brittle-looking crust patterns stretch in every direction, and you can’t shake the feeling the surface is pretending to be solid.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_BorvoSrfLandedTropicalLowlands_00 // The lowlands glow faintly under the ember sun, and the heat-shimmer makes distant terrain wobble like a bad transmission.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_BorvoSrfLandedTemperateLowlands_00 // Flat expanses and shallow rises pass the window like slow waves of stone, all of it lit in a tired, reddish wash.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_BorvoSrfLandedTropicalMidlands_00 // From the midlands, the cracks and ridges form a map nobody drew on purpose; you file it under “unhelpfully interesting.”
        BorvoSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_BorvoSrfLandedTemperateMidlands_00 // The midlands look orderly until you stare too long—then the patterns start to feel like they’re aligned for reasons you don’t want to guess at.
        BorvoSrfLandedHighlands* = #GEPscience_sspxVisualObservation_BorvoSrfLandedHighlands_00 // The highlands give a commanding view of a surface that seems stressed and fragmented, like the moon is holding itself together out of stubbornness.
        BorvoSrfLandedMajorCraters* = #GEPscience_sspxVisualObservation_BorvoSrfLandedMajorCraters_00 // The crater walls frame the sky like a bowl of red-tinted emptiness, and the far rim looks impossibly far for something so close.
        BorvoSrfLandedPoles* = #GEPscience_sspxVisualObservation_BorvoSrfLandedPoles_00 // At the poles, the light comes in low and cold; the cracked surface throws long shadows that make navigation feel like deciphering a barcode.
        BorvoFlyingHigh* = #GEPscience_sspxVisualObservation_BorvoFlyingHigh_00 // Through thin haze, Borvo’s surface textures blur into a mottled patchwork, and the red sun turns altitude into a kind of quiet pressure.
        BorvoInSpaceLow* = #GEPscience_sspxVisualObservation_BorvoInSpaceLow_00 // From low orbit, the craquelure patterns are unmistakable—an entire world of fractures, circling in silence under an ember star.
        BorvoInSpaceHigh* = #GEPscience_sspxVisualObservation_BorvoInSpaceHigh_00 // Borvo shrinks to a small, pale blemish, and the space around it feels too empty to be accidental.

        DamonaSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_DamonaSrfLandedTropicalLowlands_00 // The lowlands look soft-edged in the dim red light, as if the world is trying to hide details from your clipboard.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_DamonaSrfLandedTemperateLowlands_00 // A broad, quiet plain stretches away; you write “stable” and then stare at the sky until the word feels questionable.
        DamonaSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_DamonaSrfLandedTropicalMidlands_00 // The midlands give a long view of subdued ridges and slopes, all under a sun that makes daylight feel like evening.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_DamonaSrfLandedTemperateMidlands_00 // The terrain rolls gently, but the color palette is all wrong—like somebody turned down the saturation on reality.
        DamonaSrfLandedHighlands* = #GEPscience_sspxVisualObservation_DamonaSrfLandedHighlands_00 // From the highlands, the horizon looks clean and distant, and the silence outside feels like it has mass.
        DamonaSrfLandedImpactBasin* = #GEPscience_sspxVisualObservation_DamonaSrfLandedImpactBasin_00 // The basin is a vast scar with walls that catch the red light unevenly; it’s hard not to imagine the impact still echoing.
        DamonaSrfLandedPoles* = #GEPscience_sspxVisualObservation_DamonaSrfLandedPoles_00 // The polar view is stark and flat-lit, with shadows stretched thin across the ground like long, dark communications cables.
        DamonaInSpaceLow* = #GEPscience_sspxVisualObservation_DamonaInSpaceLow_00 // Damona’s surface contrasts are crisp in low orbit, but the dim red sun keeps the whole scene feeling strangely underlit and remote.
        DamonaInSpaceHigh* = #GEPscience_sspxVisualObservation_DamonaInSpaceHigh_00 // From high orbit, Damona is a small, quiet disk—one more outpost of rock in a system where distance is the main feature.

        EponaFlyingHigh* = #GEPscience_sspxVisualObservation_EponaFlyingHigh_00 // The clouds and ice below are lit like late dusk, and you keep expecting the red sun to brighten up and do its job.
        EponaInSpaceLow* = #GEPscience_sspxVisualObservation_EponaInSpaceLow_00 // Epona’s frozen face looks calm from here, but the faint hints of activity make you wonder what’s moving under all that cold.
        EponaInSpaceHigh* = #GEPscience_sspxVisualObservation_EponaInSpaceHigh_00 // From far out, Epona is a dim coin in a darker sea; you can almost feel the distance in the radio static.
        EponaSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_EponaSrfLandedTropicalLowlands_00 // The “tropics” are mostly a cartographer’s optimism—everything is pale, cold, and tinted red like a perpetual warning light.
        EponaSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_EponaSrfLandedTemperateLowlands_00 // Long, flat horizons make it easy to watch the sky and hard to ignore how little warmth it gives back.
        EponaSrfLandedTropicalUplands* = #GEPscience_sspxVisualObservation_EponaSrfLandedTropicalUplands_00 // The uplands catch more light, but it’s still the wrong color; the landscape feels like it’s been refrigerated for centuries.
        EponaSrfLandedTemperateUplands* = #GEPscience_sspxVisualObservation_EponaSrfLandedTemperateUplands_00 // You stare out at quiet ridgelines and try to decide if the “day” is actually changing, or if you’re just hoping.
        EponaSrfLandedHighlands* = #GEPscience_sspxVisualObservation_EponaSrfLandedHighlands_00 // From the high ground, the world looks sealed shut—an icy lid with just enough cracks to make you curious.
        EponaSrfLandedGrandPeaks* = #GEPscience_sspxVisualObservation_EponaSrfLandedGrandPeaks_00 // The peaks cut into the dim sky like broken teeth, and the shadows look deep enough to store entire winters.
        EponaSrfLandedCraters* = #GEPscience_sspxVisualObservation_EponaSrfLandedCraters_00 // The crater rims hold on to darkness even at local noon; you log it as “excellent for brooding.”
        EponaSrfLandedVolcanoes* = #GEPscience_sspxVisualObservation_EponaSrfLandedVolcanoes_00 // Dark vents and stained slopes hint at warmth below, but the surface remains stubbornly frozen, as if ashamed of its own heat.
        EponaSrfLandedPoles* = #GEPscience_sspxVisualObservation_EponaSrfLandedPoles_00 // The red sun skims the horizon forever, turning the ice into a dull mirror that refuses to look friendly.

        RosmertaInSpaceLow* = #GEPscience_sspxVisualObservation_RosmertaInSpaceLow_00 // Rosmerta is small and sharp-edged, like a piece chipped off a larger world and never properly introduced.
        RosmertaInSpaceHigh* = #GEPscience_sspxVisualObservation_RosmertaInSpaceHigh_00 // From high orbit, Rosmerta nearly vanishes against the black; it’s the kind of place you could lose on purpose.
        RosmertaSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_RosmertaSrfLandedTropicalLowlands_00 // The lowlands are cold, grey, and absolutely airless—“tropical” here just means “not as bad as the poles.”
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_sspxVisualObservation_RosmertaSrfLandedTemperateLowlands_00 // Fine textures and faint ridges show up only when the red light hits just right, like the moon is rationing details.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_sspxVisualObservation_RosmertaSrfLandedTropicalMidlands_00 // The midlands look worn and patient, as if they’ve been waiting to be noticed for a very long time.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_sspxVisualObservation_RosmertaSrfLandedTemperateMidlands_00 // You keep watching the horizon for weather that can’t exist, then remember you’re standing in vacuum.
        RosmertaSrfLandedHighlands* = #GEPscience_sspxVisualObservation_RosmertaSrfLandedHighlands_00 // The highlands give a wide view of quiet rock and long shadows; it feels like the landscape is listening.
        RosmertaSrfLandedPoles* = #GEPscience_sspxVisualObservation_RosmertaSrfLandedPoles_00 // The polar terrain is stark and flat-lit, and the dim red sun makes the whole world feel like it’s running on low power.

        RAB-58EInSpaceLow* = #GEPscience_sspxVisualObservation_RAB-58EInSpaceLow_00 // The moonlet looks like a captured stray—oddly placed, oddly shaped, and entirely uninterested in explaining itself.
        RAB-58EInSpaceHigh* = #GEPscience_sspxVisualObservation_RAB-58EInSpaceHigh_00 // From far away, it’s barely a mark on the void; you double-check the tracking just to prove it’s really there.
        RAB-58ESrfLandedLowlands* = #GEPscience_sspxVisualObservation_RAB-58ESrfLandedLowlands_00 // The surface is cramped and jagged, and the dim light makes every rock look like it’s hiding a second rock behind it.
        RAB-58ESrfLandedEasternHighlands* = #GEPscience_sspxVisualObservation_RAB-58ESrfLandedEasternHighlands_00 // From the eastern high ground, Epona feels uncomfortably close in the sky for something that takes so long to answer.
        RAB-58ESrfLandedWesternHighlands* = #GEPscience_sspxVisualObservation_RAB-58ESrfLandedWesternHighlands_00 // The western heights are all shadow and sharp angles; you note the view and try not to imagine drifting off with a careless hop.

        CernunnosInSpaceLow* = #GEPscience_sspxVisualObservation_CernunnosInSpaceLow_00 // Cernunnos is an icy dwarf with a lonely look—bright patches of frost and dark scars, all under a sun that barely shows up.
        CernunnosInSpaceHigh* = #GEPscience_sspxVisualObservation_CernunnosInSpaceHigh_00 // From high orbit, it’s a small, pale bead on a vast string of nothing; “remote” feels like an understatement.
        CernunnosSrfLandedTropicalLowlands* = #GEPscience_sspxVisualObservation_CernunnosSrfLandedTropicalLowlands_00 // The lowlands are hard-frozen and faintly red-lit; if anything is “tropical” here, it’s your imagination.
