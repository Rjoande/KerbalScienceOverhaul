@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedLowlands* = #CSS_mysteryGoo_MohoSrfLandedCentralLowlands_00 // The Goo bakes into a substance suspiciously like hardened bubble gum.
        MohoSrfLandedCraters* = #CSS_mysteryGoo_MohoSrfLandedMinorCraters_00 // The Goo is getting very dusty. You wonder if it will sneeze.
        MohoSrfLandedCraters* = #CSS_mysteryGoo_MohoSrfLandedMinorCraters_01 // The Goo has taken on a nice golden brown.
        
        EveSrfLandedPetrolLakes* = #CSS_mysteryGoo_EveSrfLandedCraterLake_00 // The Goo looks very distressed.
        EveSrfLandedMountains* = #CSS_mysteryGoo_EveSrfLandedOlympus_00 // The Goo lumps up in the middle of the container. Is it afraid of falling out?
        EveSrfLandedShores* = #CSS_mysteryGoo_EveSrfLandedShallows_00 // The Goo has produced a cooler and offers you a tiny cold beer.
        EveSrfSplashedPetrolLakes* = #CSS_mysteryGoo_EveSrfSplashedCraterLake_00 // The Goo appears to have merged with the liquid.
        EveSrfSplashedShores* = #CSS_mysteryGoo_EveSrfSplashedShallows_00 // A tiny wave washes over the canister. The Goo panics.
        
        KerbinSrfLandedMidlands* = #CSS_mysteryGoo_KerbinSrfLandedGrasslands_00 // The Goo takes on the shape of a leaf.
        KerbinSrfLandedMidlands* = #CSS_mysteryGoo_KerbinSrfLandedGrasslands_01 // The Goo turns green with envy.
        KerbinSrfLandedMidlands* = #CSS_mysteryGoo_KerbinSrfLandedGrasslands_02 // The Goo greedily gobbles up dirt and plant matter. You make a mental note not to touch it.
        KerbinSrfLandedAridMidlands* = #CSS_mysteryGoo_KerbinSrfLandedDeserts_00 // The Goo seems to hate it here.
        KerbinSrfLandedAridMidlands* = #CSS_mysteryGoo_KerbinSrfLandedDeserts_01 // The Goo dehydrates quickly.
        KerbinSrfLandedAridMidlands* = #CSS_mysteryGoo_KerbinSrfLandedDeserts_02 // The Goo appears to be drying up here. Maybe all this hot, dry weather has something to do with it.
        KerbinSrfLandedAridMidlands* = #CSS_mysteryGoo_KerbinSrfLandedDeserts_03 // The Goo appears not to be wet. Likely due to lack of water.
        KerbinSrfLandedAridHighlands* = #CSS_mysteryGoo_KerbinSrfLandedBadlands_00 // As the goo churns in its container you are reminded of a horror movie where an amorphous goo devours everything in its path. Hope this experiment ends better than the movie.
        KerbinSrfLandedAridHighlands* = #CSS_mysteryGoo_KerbinSrfLandedBadlands_01 // You try to decide which terrifies you more: Mystery Goo or the Badlands. You break down and cry instead.
        KerbinSrfLandedAridHighlands* = #CSS_mysteryGoo_KerbinSrfLandedBadlands_02 // The Mystery Goo explodes. Badlands landing confirmed.
        KerbinSrfLandedIceCaps* = #CSS_mysteryGoo_KerbinSrfLandedNorthernIceShelf_00 // Bits of ice and snow become lodged in the Goo as you open the container. The Goo doesn't seem too happy about that.
        KerbinSrfLandedIceCaps* = #CSS_mysteryGoo_KerbinSrfLandedNorthernIceShelf_01 // The Goo's temperature suddenly drops several dozen degrees below ambient, as if proving it could do better.
        KerbinSrfLandedIceCaps* = #CSS_mysteryGoo_KerbinSrfLandedSouthernIceShelf_00 // The Goo shivers as you open the container. You could swear you hear it say "Hey! Shut the door!"
        KerbinSrfLandedIceCaps* = #CSS_mysteryGoo_KerbinSrfLandedSouthernIceShelf_01 // The Goo decides that the best way to stay warm is by being inside your spacesuit. You aren't too happy about this arrangement.
        KerbinSrfSplashed* = #CSS_mysteryGoo_KerbinSrfSplashedWater_00 // The Goo dives underwater and comes back with a little jellyfish buddy.
        KerbinSrfSplashed* = #CSS_mysteryGoo_KerbinSrfSplashedWater_01 // The Goo seems to be soaking up the water like a sponge.
        KerbinSrfSplashed* = #CSS_mysteryGoo_KerbinSrfSplashedWater_02 // You douse the Goo in shark repellent and tell it to spread itself out around the craft.
        KerbinSrfSplashed* = #CSS_mysteryGoo_KerbinSrfSplashedWater_03 // The Goo escapes into the water!
        KerbinSrfSplashed* = #CSS_mysteryGoo_KerbinSrfSplashedWater_04 // The Goo is freshly hydrated and starts to dissolve.
        KerbinSrfSplashed* = #CSS_mysteryGoo_KerbinSrfSplashedWater_05 // In an effort to remain invisible, the Goo turns itself into a fish. A fish shape. A fishy shape. It looks like a fish.
        KerbinSrfSplashedMidlands* = #CSS_mysteryGoo_KerbinSrfSplashedGrasslands_00 // The Goo does not like being covered in muddy water.
        KerbinSrfSplashedAridMidlands* = #CSS_mysteryGoo_KerbinSrfSplashedDeserts_00 // The goo reached out tentatively, as though not believing the water is real.
        KerbinSrfSplashedAridHighlands* = #CSS_mysteryGoo_KerbinSrfSplashedBadlands_00 // The Goo is trying its best to not float out of its container. It must really want to stay with the ship.
        KerbinSrfSplashedIceCaps* = #CSS_mysteryGoo_KerbinSrfSplashedNorthernIceShelf_00 // The Goo seems very unhappy at its dunking in the icy water.
        KerbinSrfSplashedIceCaps* = #CSS_mysteryGoo_KerbinSrfSplashedSouthernIceShelf_00 // The Goo seems curious about the icy slush in the water.
        
        MunSrfLandedNotableCraters* = #CSS_mysteryGoo_MunSrfLandedEastCrater_00 // The Goo sits there contentedly. You're not sure how an inanimate Goo can be content, but that really is the only way to describe it.
        MunSrfLandedNotableCraters* = #CSS_mysteryGoo_MunSrfLandedTwinCraters_00 // The Goo is bouncing from one crater to the other like flubber.
        MunSrfLandedRareCraters* = #CSS_mysteryGoo_MunSrfLandedNorthwestCrater_00 // You call the Goo a goober. It completely ignores you. So does Mission Control.
        MunSrfLandedRareCraters* = #CSS_mysteryGoo_MunSrfLandedSouthwestCrater_00 // The Goo seems to be imitating the paparazzi, following you around and constantly flashing like it's taking pictures of you.
        MunSrfLandedExoticCraters* = #CSS_mysteryGoo_MunSrfLandedFarsideCrater_00 // The Goo is happy to be on the far side of anything. Especially if it isn't actively crashing into it.
        MunSrfLandedExoticCraters* = #CSS_mysteryGoo_MunSrfLandedEastFarsideCrater_00 // The Goo seems to have gotten dirty. Did anyone bring a duster?
        MunSrfLandedPolarIceCraters* = #CSS_mysteryGoo_MunSrfLandedPolarCrater_00 // The Goo seems to have split in two and moved to opposite ends of its container.
        MunSrfLandedLowlands* = #CSS_mysteryGoo_MunSrfLandedPolarLowlands_00 // The Goo seems to be trying to do the limbo under one of the landing struts. Strange stuff, that Goo.
        MunSrfLandedVoronoiCraters* = #CSS_mysteryGoo_MunSrfLandedHighlandCraters_00 // The Goo rolls around and around the rim of the crater, slowly moving toward the lowest part in the center.
        MunSrfLandedVoronoiCraters* = #CSS_mysteryGoo_MunSrfLandedMidlandCraters_00 // The Goo is no less gooey here than elsewhere. Strange stuff.
        
        MinmusSrfLandedBasins* = #CSS_mysteryGoo_MinmusSrfLandedFlats_00 // The Goo is erupting into dance!
        MinmusSrfLandedBasins* = #CSS_mysteryGoo_MinmusSrfLandedGreatFlats_00 // The Goo appears to be... licking its lips? You recheck the oxygen levels in your suit.
        MinmusSrfLandedBasins* = #CSS_mysteryGoo_MinmusSrfLandedGreaterFlats_00 // The Goo flops out of the container and becomes indistinguishable from the surface.
        MinmusSrfLandedBasins* = #CSS_mysteryGoo_MinmusSrfLandedLesserFlats_00 // The Goo seems less flat than before.
        MinmusSrfLandedMountains* = #CSS_mysteryGoo_MinmusSrfLandedSlopes_00 // The Goo looks hungry. Very hungry.
        
        DunaSrfLandedIceCaps* = #CSS_mysteryGoo_DunaSrfLandedPoles_00 // The Goo shrinks from the openings in its container and sticks to the shadows at the back. Maybe it's dazzled by the ice too?
        DunaSrfLandedMidlands* = #CSS_mysteryGoo_DunaSrfLandedMidlandSea_00 // The Goo looks bored here. So are you.
        DunaSrfLandedNotablePlains* = #CSS_mysteryGoo_DunaSrfLandedNorthernBasin_00 // The Goo arranges itself into a ring-shaped blob.
        DunaSrfLandedNotablePlains* = #CSS_mysteryGoo_DunaSrfLandedSouthernBasin_00 // The Goo looks to be shivering, and has gone pink.
        DunaSrfLandedNotableMountains* = #CSS_mysteryGoo_DunaSrfLandedNorthernShelf_00 // The Goo looks to be cowering in a corner of its container. Maybe it's unsettled by the wind as well.
        DunaSrfLandedNotableMountains* = #CSS_mysteryGoo_DunaSrfLandedNorthernShelf_01 // The Goo must have battened down the hatches and hid, since there's no sign of it.
        DunaSrfLandedNotableMountains* = #CSS_mysteryGoo_DunaSrfLandedPolarHighlands_00 // The Goo slowly rotates, catching what little dust is in the air at these latitudes.
        DunaSrfLandedNotableMountains* = #CSS_mysteryGoo_DunaSrfLandedPolarHighlands_01 // The Goo staunchly avoids one side of the container. Did we pick the wrong pole?
        DunaSrfLandedTrenches* = #CSS_mysteryGoo_DunaSrfLandedMidlandCanyon_00 // The Goo goes as red as the ground.
        DunaSrfLandedTrenches* = #CSS_mysteryGoo_DunaSrfLandedMidlandCanyon_01 // The Goo puts on a helmet. You wonder why.
        DunaSrfLandedTrenches* = #CSS_mysteryGoo_DunaSrfLandedEasternCanyon_00 // The Goo turns as red as the surrounding dust clouds.
        DunaSrfLandedTrenches* = #CSS_mysteryGoo_DunaSrfLandedEasternCanyon_01 // The Goo looks to be wearing a facemask. How it got in there is a mystery (it's not called 'mystery' for nothing), but it sure knows its priorities.
        DunaSrfLandedTrenches* = #CSS_mysteryGoo_DunaSrfLandedWesternCanyon_00 // The Goo turns a reddish colour, like it has everywhere else.
        DunaSrfLandedTrenches* = #CSS_mysteryGoo_DunaSrfLandedWesternCanyon_01 // The Goo looks impressed with something.
        DunaSrfLandedExoticCraters* = #CSS_mysteryGoo_DunaSrfLandedPolarCraters_00 // The Goo turns the same colour as the ice.
        
        IkeSrfLandedPoles* = #CSS_mysteryGoo_IkeSrfLandedPolarLowlands_00 // The Goo turns black, as if camouflaging.
        IkeSrfLandedPoles* = #CSS_mysteryGoo_IkeSrfLandedSouthPole_00 // The Goo asks you to scrape the grey caking of dust off its container.
        IkeSrfLandedMountains* = #CSS_mysteryGoo_IkeSrfLandedEasternMountainRidge_00 // The Goo seems to become even more cryptic in this place.
        IkeSrfLandedMountains* = #CSS_mysteryGoo_IkeSrfLandedWesternMountainRidge_00 // The Goo likes the mountains.
        IkeSrfLandedMountains* = #CSS_mysteryGoo_IkeSrfLandedSouthEasternMountainRange_00 // The Goo seems to dislike the dust on its container.
        IkeSrfLandedMountains* = #CSS_mysteryGoo_IkeSrfLandedCentralMountainRange_00 // The Goo forms into the shape of an eye, as if trying to win the staring match with Duna.
        
        DresSrfLandedCanyon* = #CSS_mysteryGoo_DresSrfLandedCanyons_00 // The Goo trembles. Is it fear?
        
        LaytheSrfLandedShores* = #CSS_mysteryGoo_LaytheSrfLandedDunes_00 // The Goo twists into strange and frightening forms, possibly due to a strong magnetic field on this moon.
        LaytheSrfLandedMountains* = #CSS_mysteryGoo_LaytheSrfLandedPeaks_00 // The Goo is forming shapes that mimic the terrain nearby. You conclude it likes this location.
        
        BopSrfLandedMountains* = #CSS_mysteryGoo_BopSrfLandedPeaks_00 // The Goo turns into an odd, green-colored ball.
        
        EelooSrfLandedCanyon* = #CSS_mysteryGoo_EelooSrfLandedIceCanyons_00 // The ground seems to be somewhat reminiscent of Kerbin's mountains.
        EelooSrfLandedCanyon* = #CSS_mysteryGoo_EelooSrfLandedIceCanyons_00 // The sides of the container, for the first time, are clean! The Goo has gathered at the bottom, and looks very dusty.
    }
}