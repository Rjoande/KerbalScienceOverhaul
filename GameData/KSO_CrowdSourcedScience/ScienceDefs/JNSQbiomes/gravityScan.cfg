@EXPERIMENT_DEFINITION:HAS[#id[gravityScan]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedCraters* = #CSS_gravityScan_MohoSrfLandedMinorCraters_00 // The sensor is giving odd readings here.
        
        EveSrfLandedPetrolLakes* = #CSS_gravityScan_EveSrfLandedCraterLake_00 // Holy gravioli, that's a lot of them!
        EveSrfLandedMountains* = #CSS_gravityScan_EveSrfLandedOlympus_00 // The free-air gravity anomaly is enormous. The roots on these mountains must be like a huge geological tree trunk.
        EveSrfLandedMountains* = #CSS_gravityScan_EveSrfLandedOlympus_01 // The position from the top of the world gives detailed insight into Eve's crustal structure.
        EveSrfLandedShores* = #CSS_gravityScan_EveSrfLandedShallows_00 // So heavy... its weight level must be over 9000!
        EveInSpaceLowMountains* = #CSS_gravityScan_EveInSpaceLowOlympus_00 // The signals of the huge mountains dwarf all those around them.
        EveInSpaceLowMountains* = #CSS_gravityScan_EveInSpaceLowOlympus_01 // The regional gravitational anomaly suggests the mountain roots extend down dozens of miles into Eve's mantle.
        EveInSpaceLowShores* = #CSS_gravityScan_EveInSpaceLowShallows_00 // The shallower portions of the oceans don't have a lot going for them gravimetrically.
        EveInSpaceLowShores* = #CSS_gravityScan_EveInSpaceLowShallows_01 // You hope the liquid down there is dense so you don't sink into it. Someone tells you buoyancy doesn't work like that.
        EveInSpaceHighMountains* = #CSS_gravityScan_EveInSpaceHighOlympus_00 // Every needle swings to point at the huge rocky edifice on the distant surface.
        EveInSpaceHighShores* = #CSS_gravityScan_EveInSpaceHighShallows_00 // You wonder if you could use the gravimeter to try and scan for creatures under the purple waves.

        KerbinSrfLandedMidlands* = #CSS_gravityScan_KerbinSrfLandedGrasslands_00 // The graviolis seem strangely attracted to the grass. There aren't more of them, but they seem more content here.
        KerbinSrfLandedMidlands* = #CSS_gravityScan_KerbinSrfLandedGrasslands_01 // The grass doesn't seem to be too bothered by gravity. Look at them, swaying in the wind and such.
        KerbinSrfLandedMidlands* = #CSS_gravityScan_KerbinSrfLandedGrasslands_02 // Huh, the gravity here is exactly the same as at Jeb's house. Who'd have guessed.
        KerbinSrfLandedAridMidlands* = #CSS_gravityScan_KerbinSrfLandedDeserts_00 // You look around at some dried bones scattered on the ground, and feel the tug of Kerbin's gravitational field pulling you to the earth. Or maybe that is just your imagination. Time for some snacks!
        KerbinSrfLandedAridMidlands* = #CSS_gravityScan_KerbinSrfLandedDeserts_01 // You splash juice over the gravity scanner. It was probably pretty thirsty.
        KerbinSrfLandedAridHighlands* = #CSS_gravityScan_KerbinSrfLandedBadlands_00 // The gravity here is just...gravity. The scientists said it would somehow be 'bad' gravity. Wish we were paid like them for being wrong, rather than exploding in a giant crashing fireball.
        KerbinSrfLandedAridHighlands* = #CSS_gravityScan_KerbinSrfLandedBadlands_01 // Yep, looks like the same gravity you find anywhere else on Kerbin. Seems that gravity isn't too impressed by the so-called 'Badlands'.
        KerbinSrfLandedAridHighlands* = #CSS_gravityScan_KerbinSrfLandedBadlands_02 // Gravity doesn't care that you're in the Badlands. Gravity knows how to treat everything right.
        KerbinSrfLandedIceCaps* = #CSS_gravityScan_KerbinSrfLandedNorthernIceShelf_00 // Gravity is lower compared to the land of the ice caps. There must be a serious lack of rock beneath your feet.
        KerbinSrfLandedIceCaps* = #CSS_gravityScan_KerbinSrfLandedNorthernIceShelf_01 // You hit upon the idea of using gravimetric analysis to map the bathymetry underneath the impenetrable pack ice.
        KerbinSrfLandedIceCaps* = #CSS_gravityScan_KerbinSrfLandedSouthernIceShelf_00 // The gravimeter abruptly stops working. On closer inspection, the heat of the circuitry melted some salty ice, shorting the very expensive equipment.
        KerbinSrfLandedIceCaps* = #CSS_gravityScan_KerbinSrfLandedSouthernIceShelf_01 // Gravitationally speaking, the southern ice sheet is as featureless as its surface.
        KerbinInSpaceLowMidlands* = #CSS_gravityScan_KerbinInSpaceLowGrasslands_00 // You happily munch on a snack while performing a gravity scan over the Grasslands.
        KerbinInSpaceLowMidlands* = #CSS_gravityScan_KerbinInSpaceLowGrasslands_01 // A scientist at KSC once told you that without gravity, the grass would grow into outer space! On second thought, he probably wasn't a real scientist.
        KerbinInSpaceLowMidlands* = #CSS_gravityScan_KerbinInSpaceLowGrasslands_02 // The instrument surveys the gravity over the Grasslands. It appears the field is very stable here.
        KerbinInSpaceLowAridMidlands* = #CSS_gravityScan_KerbinInSpaceLowDeserts_00 // The dunes appear to have a stable gravity, though some spikes indicate the underground terrain varies in composition.
        KerbinInSpaceLowAridMidlands* = #CSS_gravityScan_KerbinInSpaceLowDeserts_01 // Gravitational data from orbit reveals an incredibly complex network of subterranean formations beneath the deserts of Kerbin.
        KerbinInSpaceLowAridHighlands* = #CSS_gravityScan_KerbinInSpaceLowBadlands_00 // *singing* 'Get low, get low, get low, get low'. Oh yeah, gravity. Yeah, we got that.
        KerbinInSpaceLowAridHighlands* = #CSS_gravityScan_KerbinInSpaceLowBadlands_01 // The gravitational data is completely nominal, something you didn't expect passing over a place called the 'Badlands'.
        KerbinInSpaceLowAridHighlands* = #CSS_gravityScan_KerbinInSpaceLowBadlands_02 // Turns out Badlands gravity is just like regular gravity. Who knew?
        KerbinInSpaceLowIceCaps* = #CSS_gravityScan_KerbinInSpaceLowNorthernIceShelf_00 // The sensor detects variances under the surface of the ice. Is there a landmass underneath?
        KerbinInSpaceLowIceCaps* = #CSS_gravityScan_KerbinInSpaceLowNorthernIceShelf_01 // You feel much more comfortable doing gravimetry from up here rather than down there, freezing your butt off.
        KerbinInSpaceLowIceCaps* = #CSS_gravityScan_KerbinInSpaceLowSouthernIceShelf_00 // The gravitational signature moves only slightly as you pass over the southern ice cap. Looks like it's water all the way down.
        KerbinInSpaceLowIceCaps* = #CSS_gravityScan_KerbinInSpaceLowSouthernIceShelf_01 // Graviolis cascade down towards the surface, closely following magnetic field lines.
        KerbinInSpaceHighMidlands* = #CSS_gravityScan_KerbinInSpaceHighGrasslands_00 // Gravity scans over the Grasslands are normal...too normal. You begin to suspect that the grass is hiding something.
        KerbinInSpaceHighMidlands* = #CSS_gravityScan_KerbinInSpaceHighGrasslands_01 // As you fly high over the Grasslands you can feel the graviolis swarming around you. They seem excited.
        KerbinInSpaceHighAridMidlands* = #CSS_gravityScan_KerbinInSpaceHighDeserts_00 // Orbital gravity scans make the deserts far more interesting than they appear to be to the naked eye.
        KerbinInSpaceHighAridMidlands* = #CSS_gravityScan_KerbinInSpaceHighDeserts_01 // The graviolis here seem dry and dusty like the surface below. You consider offering them a glass of water, but have no idea how to speak gravioli.
        KerbinInSpaceHighAridHighlands* = #CSS_gravityScan_KerbinInSpaceHighBadlands_00 // The sensor gives a very negative readout as you pass over the badlands.
        KerbinInSpaceHighAridHighlands* = #CSS_gravityScan_KerbinInSpaceHighBadlands_01 // You somehow get the feeling that the gravitational sensor disapproves of what it's seeing.
        KerbinInSpaceHighAridHighlands* = #CSS_gravityScan_KerbinInSpaceHighBadlands_02 // The gravity scanner seems surlier than usual.
        KerbinInSpaceHighIceCaps* = #CSS_gravityScan_KerbinInSpaceHighNorthernIceShelf_00 // The frozen-over Northern Ocean bears a distinctive gravitational signature together with the polar hills ringing it.
        KerbinInSpaceHighIceCaps* = #CSS_gravityScan_KerbinInSpaceHighNorthernIceShelf_01 // Frozen sea appears to have the same gravimetric characteristics as normal sea.
        KerbinInSpaceHighIceCaps* = #CSS_gravityScan_KerbinInSpaceHighSouthernIceShelf_00 // You could swear the gravitational signature changed since you last looked. Did a bug lump of ice just melt?
        KerbinInSpaceHighIceCaps* = #CSS_gravityScan_KerbinInSpaceHighSouthernIceShelf_01 // Most of the reading is clouded out by noise from the adjoining continent.

        MunSrfLandedPoles* = #CSS_gravityScan_MunSrfLandedNorthernBasin_00 // The graviolis are strangely non-polar here.
        MunSrfLandedPoles* = #CSS_gravityScan_MunSrfLandedPolarLowlands_00 // The gravity scan is far less interesting than snacks. You emphatically relay this back to Mission Control.
        MunSrfLandedNotableCraters* = #CSS_gravityScan_MunSrfLandedEastCrater_00 // The ship slides a few inches down into the crater as the graviolis swarm around you.
        MunSrfLandedNotableCraters* = #CSS_gravityScan_MunSrfLandedTwinCraters_00 // The graviolis seem to be distributed directly between the two craters.
        MunSrfLandedRareCraters* = #CSS_gravityScan_MunSrfLandedNorthwestCrater_00 // The graviolis here seem to be 'tilted', whatever that means.
        MunSrfLandedRareCraters* = #CSS_gravityScan_MunSrfLandedSouthwestCrater_01 // The gravity scans here are normal. Nothing to see here folks, move along.
        MunSrfLandedPolarIceCraters* = #CSS_gravityScan_MunSrfLandedPolarCrater_00 // Despite our location the graviolis don't seem to be polarized.
        MunSrfLandedVoronoiCraters* = #CSS_gravityScan_MunSrfLandedMidlandCraters_00 // The graviolis seem to be resting at the bottom of the craters. You make a note of this.
        MunSrfLandedExoticCraters* = #CSS_gravityScan_MunSrfLandedEastFarsideCrater_00 // The graviolis are having fun bouncing off the crater walls.
        MunInSpaceLowNotableCraters* = #CSS_gravityScan_MunInSpaceLowEastCrater_01 // Perhaps one day this data will be used to model tidal patterns back on Kerbin. Or something like that.
        MunInSpaceLowExoticCraters* = #CSS_gravityScan_MunInSpaceLowFarsideCrater_00 // The graviolis report nominal readings for a crater this size. Maybe the next one will change things up.
        MunInSpaceLowPolarIceCraters* = #CSS_gravityScan_MunInSpaceLowPolarCrater_00 // The scientists explained that accurate gravitational modelling is critical for ensuring navigation accuracy for future missions. Fine by you, especially if it means getting to go back again.
        MunInSpaceLowPoles* = #CSS_gravityScan_MunInSpaceLowPolarLowlands_00 // Your gravity scan yields delicious science while you munch on a delicious snack.
        MunInSpaceLowVoronoiCraters* = #CSS_gravityScan_MunInSpaceLowHighlandCraters_00 // Wow these gravioli particles sure get excited when you activate the scanner.
        MunInSpaceLowVoronoiCraters* = #CSS_gravityScan_MunInSpaceLowMidLandCraters_00 // You are slowly getting an accurate map of gravitational variances across the munar surface. It's not nearly as uniform as you thought it would be.
        MunInSpaceLowExoticCraters* = #CSS_gravityScan_MunInSpaceLowEastFarsideCrater_00 // The gravity fluctuates slightly - but noticeably - as you pass over the crater below.
        MunInSpaceLowExoticCraters* = #CSS_gravityScan_MunInSpaceLowEastFarsideCrater_01 // You try to convince the graviolis that this is indeed an entirely new crater and not at all the same as the last one.
        MunInSpaceLowNotableCraters* = #CSS_gravityScan_MunInSpaceLowTwinCraters_00 // The gravitational anomalies below don't seem to fit the usual explanation of basaltic lava flows. The scientists at KSC are determined to find an alternative theory.
        MunInSpaceHighLowlands* = #CSS_gravityScan_MunInSpaceHighNorthernBasin_00 // A scientist back at KSC is guiding you through this gravity scan. He seems awfully excited about something called 'mascons'.
        MunInSpaceHighNotableCraters* = #CSS_gravityScan_MunInSpaceHighEastCrater_00 // Reading: nominal. It's a crater on the mun, what did you expect?
        MunInSpaceHighRareCraters* = #CSS_gravityScan_MunInSpaceHighNorthwestCrater_00 // Bit by bit, the scientists back at KSC are using your data to build an accurate gravitational model of the Mun.
        MunInSpaceHighRareCraters* = #CSS_gravityScan_MunInSpaceHighSouthwestCrater_00 // The gravity scanner has finished printing a black-and-white model of the Mun's gravity field. It looks rather dull so you take out your crayons and start colouring.
        MunInSpaceHighExoticCraters* = #CSS_gravityScan_MunInSpaceHighFarsideCrater_00 // The Mun's low gravity seems ideal for orbital infrastructure. You hope you live long enough to help make that happen.
        MunInSpaceHighExoticCraters* = #CSS_gravityScan_MunInSpaceHighEastFarsideCrater_01 // There might be a slight gravitational anomaly here. Or you might just be seeing things and be in dire need of a snack.
        MunInSpaceHighPolarIceCraters* = #CSS_gravityScan_MunInSpaceHighPolarCrater_00 // The gravitational anomaly emanated by the huge crater below has actually managed to ever so slightly adjust your orbit.
        MunInSpaceHighPoles* = #CSS_gravityScan_MunInSpaceHighPolarLowlands_00 // The KSC scientists seem particularly interested in gravity readings while over the Mun's poles.
        MunInSpaceHighVoronoiCraters* = #CSS_gravityScan_MunInSpaceHighHighlandCraters_00 // You transmit the data back to KSC. Perhaps they can send you back something useful after they've processed the information.
        
        MinmusSrfLandedBasins* = #CSS_gravityScan_MinmusSrfLandedGreatFlats_00 // The gravity readings dash your hopes - based on its size, Minmus is far too dense to be made of ice cream.
        MinmusSrfLandedBasins* = #CSS_gravityScan_MinmusSrfLandedGreaterFlats_00 // Despite assurances from mission planners that the readings here would be off the charts, the sensor refuses to register anything higher than "rather weak" gravity.
        MinmusSrfLandedBasins* = #CSS_gravityScan_MinmusSrfLandedLesserFlats_00 // The readings are conclusive: What goes up will take a fairly long time to come down.
        MinmusSrfLandedMountains* = #CSS_gravityScan_MinmusSrfLandedSlopes_00 // The sensor is picking up a lateral gravity gradient... Oh wait, it's just the tilt of the slope. Why did we land here again?
        MinmusInSpaceHighBasins* = #CSS_gravityScan_MinmusInSpaceHighFlats_00 // The needle doesn't seem to be moving. You're unsure whether this means that the instrument isn't working, or that the gravity is very, very weak.

        DunaSrfLandedIceCaps* = #CSS_gravityScan_DunaSrfLandedPoles_00 // A burst of gas from underneath jolts the ship, and you have to reset the detector.
        DunaSrfLandedMidlands* = #CSS_gravityScan_DunaSrfLandedMidlandSea_00 // The net gravity strength here varies ever so slightly with Ike's libration pattern.
        DunaSrfLandedMidlands* = #CSS_gravityScan_DunaSrfLandedMidlandSea_01 // All the while the sensor is running, you find yourself hoping aloud that the sand stays out of it. The warranty was voided long ago, and gravimeters are expensive!
        DunaSrfLandedNotablePlains* = #CSS_gravityScan_DunaSrfLandedNorthernBasin_00 // The detector doesn't pick up much out of the ordinary.
        DunaSrfLandedNotablePlains* = #CSS_gravityScan_DunaSrfLandedSouthernBasin_01 // The ice cap in the south distorts the gravity here slightly, and the basin itself shows the signatures of volcanic activity.
        DunaSrfLandedNotableMountains* = #CSS_gravityScan_DunaSrfLandedNorthernShelf_00 // The sensor attempts to measure the gravity through the craft's shaking in the winds. Eventally, it gives up and asks for a shock absorber.
        DunaSrfLandedNotableMountains* = #CSS_gravityScan_DunaSrfLandedNorthernShelf_01 // The wind drops for long enough to allow the meter to complete its readings. Gravity looks to be ever so slightly lower here, but internal structure is the same.
        DunaSrfLandedNotableMountains* = #CSS_gravityScan_DunaSrfLandedPolarHighlands_00 // Picking up a Kerbin-sized hunk of ice is easy. If you entered a strongkerbal contest remotely, you would win gold!
        DunaSrfLandedTrenches* = #CSS_gravityScan_DunaSrfLandedMidlandCanyon_00 // Looks like standard crustal patterns here. Whatever made this canyon wasn't anything tectonic.
        DunaSrfLandedTrenches* = #CSS_gravityScan_DunaSrfLandedEasternCanyon_00 // That's a big bump on the Kouguer graph, which suggests significant crustal thinning is present in the area.
        DunaSrfLandedTrenches* = #CSS_gravityScan_DunaSrfLandedWesternCanyon_00 // The lack of any gravimetric anomalies here and the proximity to an ex-sea suggests this valley was carved by water or other erosional processes.
        DunaSrfLandedExoticCraters* = #CSS_gravityScan_DunaSrfLandedPolarCraters_00 // While the detector does its thing, you distract yourself with a view of the pretty white landscape.
        DunaInSpaceLowIceCaps* = #CSS_gravityScan_DunaInSpaceLowPoles_00 // There doesn't seem to be any gravity here. You grab a towel that is floating by and stow it away.
        DunaInSpaceLowMidlands* = #CSS_gravityScan_DunaInSpaceLowMidlandSea_00 // A dip as the elevation drops, and a bump as it rises. Nothing special, really.
        DunaInSpaceLowMidlands* = #CSS_gravityScan_DunaInSpaceLowMidlandSea_01 // Readings spew from the device onto the monitor as a wavy line, but not really that wavy.
        DunaInSpaceLowNotablePlains* = #CSS_gravityScan_DunaInSpaceLowNorthernBasin_00 // Overall gravity strength forms a W-shaped graph thanks to the presence of the rebound peak.
        DunaInSpaceLowNotablePlains* = #CSS_gravityScan_DunaInSpaceLowSouthernBasin_01 // Not too exciting. There's a tiny dip in overall strength, the Kouguer wave shows a bump as if the crust was thinner here.
        DunaInSpaceLowNotableMountains* = #CSS_gravityScan_DunaInSpaceLowNorthernShelf_00 // The local gravity strength dips extremely noticeably (well, relatively speaking) as you pass over the huge chasm.
        DunaInSpaceLowNotableMountains* = #CSS_gravityScan_DunaInSpaceLowNorthernShelf_01 // The various gravimetric lines go crazy, probably related to the giant canyon below. You didn't need this fancy kit to spot it.
        DunaInSpaceLowNotableMountains* = #CSS_gravityScan_DunaInSpaceLowPolarHighlands_00 // Slight variations in gravity hint at the presence of entire moutains buried deep within the ice.
        DunaInSpaceLowTrenches* = #CSS_gravityScan_DunaInSpaceLowMidlandCanyon_00 // No major variations are detected, aside from a tiny drop in overall gravity as you pass over the valley.
        DunaInSpaceLowTrenches* = #CSS_gravityScan_DunaInSpaceLowEasternCanyon_00 // Readings scroll across the screen, and when you pass over the canyon gravity drops slightly while the Kouguer reading spikes.
        DunaInSpaceLowTrenches* = #CSS_gravityScan_DunaInSpaceLowWesternCanyon_00 // The needle dips slightly as you pass over the chasm, but there are no significant tectonic-associated changes.
        DunaInSpaceLowExoticCraters* = #CSS_gravityScan_DunaInSpaceLowPolarCraters_00 // The size of the blip created by the depression is too large for the ice alone, the crater must extend into the rock deep below.
        DunaInSpaceHighIceCaps* = #CSS_gravityScan_DunaInSpaceHighPoles_00 // The ice far below doesn't seem to affect the gravity much. Try getting closer.
        DunaInSpaceHighMidlands* = #CSS_gravityScan_DunaInSpaceHighMidlandSea_00 // You bash the monitor, as the line isn't moving. It still doesn't move.
        DunaInSpaceHighMidlands* = #CSS_gravityScan_DunaInSpaceHighMidlandSea_01 // The readings slowly collate into a gravimetric map of... one single colour, with a dip thanks to Ike in the middle.
        DunaInSpaceHighNotablePlains* = #CSS_gravityScan_DunaInSpaceHighNorthernBasin_00 // Not much. There are two small dips from passing over the basin, maybe a lower-altitude observation will reveal more?
        DunaInSpaceHighNotablePlains* = #CSS_gravityScan_DunaInSpaceHighSouthernBasin_00 // Getting a lot of interference from the ice caps and Ike, but there looks to be some small anomalies.
        DunaInSpaceHighNotableMountains* = #CSS_gravityScan_DunaInSpaceHighNorthernShelf_00 // Even from high orbit, the effects of the canyon appear clearly on the readout.
        DunaInSpaceHighNotableMountains* = #CSS_gravityScan_DunaInSpaceHighNorthernShelf_01 // "Pilot! Follow that anomaly!". Huehuehue. Always wanted to say that.
        DunaInSpaceHighNotableMountains* = #CSS_gravityScan_DunaInSpaceHighPolarHighlands_00 // Doing a cartwheel takes no effort. You accidentally hit a switch while spinning, hopefully it didn't do anything.
        DunaInSpaceHighTrenches* = #CSS_gravityScan_DunaInSpaceHighMidlandCanyon_00 // Ike's influence is especially strong here (it's right overhead), making it very hard to conduct precise measurements of the ground.
        DunaInSpaceHighTrenches* = #CSS_gravityScan_DunaInSpaceHighEasternCanyon_00 // While the machine beeps and whirrs doing its thing, you invent the new sport of zero-G wall tennis with a crumpled page from a safety manual as the ball and a book as the bat.
        DunaInSpaceHighTrenches* = #CSS_gravityScan_DunaInSpaceHighWesternCanyon_00 // Whatever impact that canyon has, it must be pretty small as you aren't getting much from way up here.
        DunaInSpaceHighExoticCraters* = #CSS_gravityScan_DunaInSpaceHighPolarCraters_00 // From up here you can get a gravimetric image of the whole area, with the crater clearly visible as an area of lower gravity.

        IkeSrfLandedPoles* = #CSS_gravityScan_IkeSrfLandedPolarLowlands_00 // Gravity scans hint at crustal deformation akin to that of a large impact crater.
        IkeSrfLandedPoles* = #CSS_gravityScan_IkeSrfLandedPolarLowlands_01 // It's peaceful on the gravity front up here, with Midlands on all sides and few large nearby mountains.
        IkeSrfLandedPoles* = #CSS_gravityScan_IkeSrfLandedSouthPole_00 // The gravimeter clicks as it analyses the effects of the electrostatic nature of the dust on gravioli particles.
        IkeSrfLandedPoles* = #CSS_gravityScan_IkeSrfLandedSouthPole_01 // Mission Control tells you to stop bashing the sensor to make it run faster.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedEasternMountainRidge_00 // The gravitational anomaly generated by the mountain chain is clearly visible on the scanner.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedEasternMountainRidge_01 // The centre of gravity here is noticeably different from Ike's geometric centre.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedWesternMountainRidge_00 // You'd say you can feel the higher gravity here, but that would be silly. The gravimeter does, though.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedWesternMountainRidge_01 // The roots of the massive mountains don't have a distinct signature, suggesting Ike is solid for a long way down.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedSouthEasternMountainRange_00 // The dust is attracted to electric charge, and currently it's all over the gravimeter.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedSouthEasternMountainRange_01 // The line waves lazily across the display. Everything seems to run slower on Ike, as though the low gravity is slowing time.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedCentralMountainRange_00 // The gravity strength varies slightly with time, suggesting Ike is is an elliptical orbit.
        IkeSrfLandedMountains* = #CSS_gravityScan_IkeSrfLandedCentralMountainRange_01 // Duna's gravitational influence is strong here. With these tidal forces, it's little wonder Ike and Duna are mutually locked.
        IkeInSpaceLowMountains* = #CSS_gravityScan_IkeInSpaceLowEasternMountainRidge_00 // The needle jumps rapidly as you pass over he hulking mountains below, before returning to normal.
        IkeInSpaceLowMountains* = #CSS_gravityScan_IkeInSpaceLowWesternMountainRidge_01 // Now THAT is a gravity anomaly and a half. You start to worry about your orbital altitude.
        IkeInSpaceLowMountains* = #CSS_gravityScan_IkeInSpaceLowWesternMountainRidge_02 // The huge mountain range below leaves a very clear signature on the chart.
        IkeInSpaceLowMountains* = #CSS_gravityScan_IkeInSpaceLowSouthEasternMountainRange_00 // The mountains have a clear gravimetric signature, distinct from all the other features around them.
        IkeInSpaceLowMountains* = #CSS_gravityScan_IkeInSpaceLowCentralMountainRange_00 // That's a big bump, and that can only mean one thing - a big mountain (or many mountains)!
        IkeInSpaceLowPoles* = #CSS_gravityScan_IkeInSpaceLowPolarLowlands_00 // Gravity dips slightly as you pass over the depression, but the change is marginal.
        IkeInSpaceLowPoles* = #CSS_gravityScan_IkeInSpaceLowSouthPole_00 // Many craters are invisible in the long shadows, so the gravimetry readout helps locate them.
        IkeInSpaceHighMountains* = #CSS_gravityScan_IkeInSpaceHighEasternMountainRidge_00 // The gravitational influence of the ridge below is fuzzy but visible even this high up.
        IkeInSpaceHighMountains* = #CSS_gravityScan_IkeInSpaceHighWesternMountainRidge_00 // The beeping of the device startles you, and the reading startles you even more.
        IkeInSpaceHighMountains* = #CSS_gravityScan_IkeInSpaceHighWesternMountainRidge_01 // The gravimeter notices the mountains before you do. And some mountains they are!
        IkeInSpaceHighMountains* = #CSS_gravityScan_IkeInSpaceHighSouthEasternMountainRange_00 // According to the "Gravimetric Signature Identification Guide Volume XII", that reading means "mountain".
        IkeInSpaceHighMountains* = #CSS_gravityScan_IkeInSpaceHighCentralMountainRange_00 // Pointing the detector towards the north and south gives you high readings, towards the east or west they drop. Hrm.
        IkeInSpaceHighPoles* = #CSS_gravityScan_IkeInSpaceHighPolarLowlands_00 // The sensor is registering the influence of the nearby Eastern Mountain Ridge on top of the other signals, but it's tenuous.
        IkeInSpaceHighPoles* = #CSS_gravityScan_IkeInSpaceHighSouthPole_00 // Large amounts of piled regolith are visible in the data, even from this great height.
        
        DresSrfLandedCanyon* = #CSS_gravityScan_DresSrfLandedCanyons_00 // The gravity is so low, you wonder if Dres is a planet at all!

        LaytheSrfLandedIceCaps* = #CSS_gravityScan_LaytheSrfLandedPoles_00 // Shaking the scanner does not seem to budge it. Instead you get out a golf ball and club. Gravity must be weaker than on Kerbin because you just hit it far enough for a hole in one!
        LaytheInSpaceLowPoles* = #CSS_gravityScan_LaytheInSpaceLowPoles_00 // Your scanner shows that the gravitational draw of this moon does not change wherever you go. The water makes the planet smoother than a baby Kerbal's bottom.

        BopSrfLandedMountains* = #CSS_gravityScan_BopSrfLandedPeaks_00 // The scanner seems split between Jool and Bop. You put it down to a defect.
        BopSrfLandedMountains* = #CSS_gravityScan_BopSrfLandedPeaks_01 // The scanner refuses to point at Bop. After frantic calls to the manufacturer, Mission Control tells you that it is rated to high.
        BopSrfLandedLowlands* = #CSS_gravityScan_BopSrfLandedValley_00 // You get weird results. Something seems Krakeny...
        BopInSpaceLowMountains* = #CSS_gravityScan_BopInSpaceLowPeaks_00 // The peaks seem rather close. The gravity scanner agrees.
        BopInSpaceLowMountains* = #CSS_gravityScan_BopInSpaceLowPeaks_01 // Scanning returns a result of "0".
        BopInSpaceHighMountains* = #CSS_gravityScan_BopInSpaceHighPeaks_00 // The scanner is still pointing at Jool.
        BopInSpaceHighMountains* = #CSS_gravityScan_BopInSpaceHighPeaks_01 // What does this "%NaN%" mean? Mission Control tells you to watch out for Krakens.
    }
}
