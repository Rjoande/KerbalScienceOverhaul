@EXPERIMENT_DEFINITION:HAS[#id[bd_Photometer]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_Photometer_GrannusInSpaceLow_00 // The photometer pegs red and stays there. You back away from the viewport anyway.
        GrannusInSpaceLow* = #GEPscience_bd_Photometer_GrannusInSpaceLow_01 // Even with heavy filtering, Grannus paints the detector a deep crimson. The readout smells faintly of hot electronics.
        GrannusInSpaceHigh* = #GEPscience_bd_Photometer_GrannusInSpaceHigh_00 // The brightness curve looks calm from up here, but every confirmation from Mission Control arrives long after you have already flinched.
        GrannusInSpaceHigh* = #GEPscience_bd_Photometer_GrannusInSpaceHigh_01 // Subtle dips suggest starspots drifting across the disc. Or the photometer is learning to blink.

        TaranisInSpaceLow* = #GEPscience_bd_Photometer_TaranisInSpaceLow_00 // Low orbit reveals a razor-sharp border between glowing day side and endless night. The exposure settings argue with themselves.
        TaranisInSpaceLow* = #GEPscience_bd_Photometer_TaranisInSpaceLow_01 // Reflected light is less shine and more glare. The instrument helpfully proposes incandescence as a unit.
        TaranisInSpaceHigh* = #GEPscience_bd_Photometer_TaranisInSpaceHigh_00 // From high orbit the phase curve is lopsided, like the planet forgot to rotate on schedule.
        TaranisInSpaceHigh* = #GEPscience_bd_Photometer_TaranisInSpaceHigh_01 // The dim red sun still overwhelms the baked hemisphere, while the dark side drops so low the sensor starts seeing your own spacecraft.
        
        ToutatisInSpaceLow* = #GEPscience_bd_Photometer_ToutatisInSpaceLow_00 // The photometer traces a bright, baked crescent and a cold dark half. The twilight band is the only place the numbers look negotiable.
        ToutatisInSpaceLow* = #GEPscience_bd_Photometer_ToutatisInSpaceLow_01 // Brightness changes with terrain and haze. The thin air makes the hot side look like it is trying to glow through itself.
        ToutatisInSpaceHigh* = #GEPscience_bd_Photometer_ToutatisInSpaceHigh_00 // Averaged over the whole disc, Toutatis looks almost reasonable. Nobody believes the word reasonable belongs out here.
        ToutatisInSpaceHigh* = #GEPscience_bd_Photometer_ToutatisInSpaceHigh_01 // Long exposures pick up a faint limb glow in the thin atmosphere. The confirmation arrives after the moment has already passed.

        NodensInSpaceLow* = #GEPscience_bd_Photometer_NodensInSpaceLow_00 // Nodens shines through a thick, busy atmosphere. The brightest patches shift like slow storm systems under a dim red sun.
        NodensInSpaceLow* = #GEPscience_bd_Photometer_NodensInSpaceLow_01 // The photometer catches occasional glints that might be liquid water. Mission Control’s reply arrives after you’ve already double-checked the exposure.
        NodensInSpaceHigh* = #GEPscience_bd_Photometer_NodensInSpaceHigh_00 // From high orbit, Nodens’ phase curve looks almost inviting—until you remember how far “almost” is from home.
        NodensInSpaceHigh* = #GEPscience_bd_Photometer_NodensInSpaceHigh_01 // The world’s brightness varies with a stubborn regularity. The numbers feel familiar, but the red-tinted daylight does not.
        
        BelisamaInSpaceLow* = #GEPscience_bd_Photometer_BelisamaInSpaceLow_00 // Belisama is stark and airless, with bright scars and darker plains. The detector keeps trying to blame the harsh contrast on your hands.
        BelisamaInSpaceLow* = #GEPscience_bd_Photometer_BelisamaInSpaceLow_01 // Nodens’ glow keeps sneaking into the readings, as if the planet refuses to let its moon have a private moment.
        BelisamaInSpaceHigh* = #GEPscience_bd_Photometer_BelisamaInSpaceHigh_00 // The light curve repeats like a metronome—mutual tidal locking made visible as math.
        BelisamaInSpaceHigh* = #GEPscience_bd_Photometer_BelisamaInSpaceHigh_01 // Eclipses carve clean bites out of the data. The only messy part is your excitement arriving long before the delayed confirmation.

        SucellusInSpaceLow* = #GEPscience_bd_Photometer_SucellusInSpaceLow_00 // Sucellus is darker than you’d like for a “resource-rich” rumor. The photometer politely asks if the lens cap is still on.
        SucellusInSpaceLow* = #GEPscience_bd_Photometer_SucellusInSpaceLow_01 // Occasional bright flecks flash by—frost, exposed mineral, or just the universe adding noise to your precious measurements.
        SucellusInSpaceHigh* = #GEPscience_bd_Photometer_SucellusInSpaceHigh_00 // At this distance, Sucellus is a dim bead under a dimmer sun. Long exposures turn patience into a flight requirement.
        SucellusInSpaceHigh* = #GEPscience_bd_Photometer_SucellusInSpaceHigh_01 // The signal is thin and grainy, but the averages hint at patchy bright regions. You label them “interesting” and hope you’re not lying.

        CaireenInSpaceLow* = #GEPscience_bd_Photometer_CaireenInSpaceLow_00 // Caireen’s brightness stutters with every change in angle, like a lumpy rock trying to hide its shape in the shadows.
        CaireenInSpaceLow* = #GEPscience_bd_Photometer_CaireenInSpaceLow_01 // The tiny moon reflects just enough light to prove it exists. The rest of the time the photometer is mostly measuring your doubt.
        CaireenInSpaceHigh* = #GEPscience_bd_Photometer_CaireenInSpaceHigh_00 // From high orbit, Caireen is a dot with opinions. You take a lot of samples and let statistics do the talking.
        CaireenInSpaceHigh* = #GEPscience_bd_Photometer_CaireenInSpaceHigh_01 // The curve is barely there, but it repeats—an unending little orbit around Sucellus, recorded as faint pulses in the dark.

        SironaInSpaceLow* = #GEPscience_bd_Photometer_SironaInSpaceLow_00 // Sirona’s bands ripple in dull ruby light, and the polar regions flicker brighter like someone is slowly drawing curtains.
        SironaInSpaceLow* = #GEPscience_bd_Photometer_SironaInSpaceLow_01 // The photometer keeps catching faint pulses near the poles. You label them “aurora” and try not to imagine the planet watching back.
        SironaInSpaceHigh* = #GEPscience_bd_Photometer_SironaInSpaceHigh_00 // From high orbit the phase curve is smooth, with subtle bumps that repeat like clockwork storms under a dim red sun.
        SironaInSpaceHigh* = #GEPscience_bd_Photometer_SironaInSpaceHigh_01 // Sirona still dominates the detector from this far out. Exposure settings are mostly “don’t blink” and “wait for Mission Control to catch up.”
                
        AirmedInSpaceLow* = #GEPscience_bd_Photometer_AirmedInSpaceLow_00 // Airmed is all hard contrast: bright fresh scars against dark basins, lit by a weak red sun and a looming giant’s glow.
        AirmedInSpaceLow* = #GEPscience_bd_Photometer_AirmedInSpaceLow_01 // Close in, the albedo map looks like a history of impacts written in grayscale. Your report arrives home long after you’ve already named the features.
        AirmedInSpaceHigh* = #GEPscience_bd_Photometer_AirmedInSpaceHigh_00 // The light curve repeats with metronome regularity, as if Airmed has only one good side and no interest in showing the rest.
        AirmedInSpaceHigh* = #GEPscience_bd_Photometer_AirmedInSpaceHigh_01 // When Airmed slips into Sirona’s shadow the readings fall to almost nothing. For a moment you’re not sure if it’s an eclipse or loneliness.

        BorvoInSpaceLow* = #GEPscience_bd_Photometer_BorvoInSpaceLow_00 // Borvo’s haze smears the highlights, turning the world into a soft lantern under the red sun. Brighter caps or higher clouds stand out at the edges.
        BorvoInSpaceLow* = #GEPscience_bd_Photometer_BorvoInSpaceLow_01 // The photometer catches occasional glints through thinner patches—ice, liquid, or just the instrument getting hopeful.
        BorvoInSpaceHigh* = #GEPscience_bd_Photometer_BorvoInSpaceHigh_00 // Borvo’s phase curve is muted and rounded by atmosphere, but the average reflectance hints at a pale, possibly icy surface.
        BorvoInSpaceHigh* = #GEPscience_bd_Photometer_BorvoInSpaceHigh_01 // Long exposures make Borvo seem to brighten and dim like it’s breathing. You check the cabin sensors, just to be sure.

        DamonaInSpaceLow* = #GEPscience_bd_Photometer_DamonaInSpaceLow_00 // Damona is a dim little ember of rock. A few bright flecks might be frost, or just stubborn minerals reflecting the last of the red light.
        DamonaInSpaceLow* = #GEPscience_bd_Photometer_DamonaInSpaceLow_01 // The lighting is wrong out here—shadows run long, and the photometer keeps asking if this counts as “day.”
        DamonaInSpaceHigh* = #GEPscience_bd_Photometer_DamonaInSpaceHigh_00 // From high orbit Damona is barely a dot, and the data is mostly noise with a faint, repeating signal you refuse to ignore.
        DamonaInSpaceHigh* = #GEPscience_bd_Photometer_DamonaInSpaceHigh_01 // After stacking far too many exposures, you get an albedo estimate: dark, dusty, and surprisingly consistent—like it’s been waiting a very long time.

        EponaInSpaceLow* = #GEPscience_bd_Photometer_EponaInSpaceLow_00 // Epona’s limb shows a faint, cold glow in the thin red daylight. The photometer insists the “night side” is still brighter than it should be.
        EponaInSpaceLow* = #GEPscience_bd_Photometer_EponaInSpaceLow_01 // Bright patches slide under a restless haze, hinting at ice fields and cloud decks. Gene’s confirmation arrives after you’ve already rerun the exposure.
        EponaInSpaceHigh* = #GEPscience_bd_Photometer_EponaInSpaceHigh_00 // From high orbit, Epona’s phase curve looks smooth and subdued—like the sun is turned down and the planet is trying to keep it that way.
        EponaInSpaceHigh* = #GEPscience_bd_Photometer_EponaInSpaceHigh_01 // Long integrations reveal tiny, repeating brightening events. Either weather is circulating, or the sensor is hallucinating from boredom.

        RosmertaInSpaceLow* = #GEPscience_bd_Photometer_RosmertaInSpaceLow_00 // Rosmerta flashes between blinding ice and bottomless shadow with every turn. The photometer logs the contrast and you log the chills.
        RosmertaInSpaceLow* = #GEPscience_bd_Photometer_RosmertaInSpaceLow_01 // A few bright scars stand out like fresh scratches on an old, lonely stone. You name them “Hello” and “Please Reply.”
        RosmertaInSpaceHigh* = #GEPscience_bd_Photometer_RosmertaInSpaceHigh_00 // The light curve is clean and predictable, as if Rosmerta has resigned herself to being measured from far away.
        RosmertaInSpaceHigh* = #GEPscience_bd_Photometer_RosmertaInSpaceHigh_01 // When Epona’s glow sneaks into the readings, the data looks warmer than it should. It’s just reflected light, but it still feels like company.

        RAB-58EInSpaceLow* = #GEPscience_bd_Photometer_RAB-58EInSpaceLow_00 // The photometer can barely keep up with RAB-58E’s rapid brightness changes. It’s less “world” and more “spinning argument.”
        RAB-58EInSpaceLow* = #GEPscience_bd_Photometer_RAB-58EInSpaceLow_01 // One side is unexpectedly bright, then it’s gone. Captured rock or captured snowball, the little thing refuses to sit still.
        RAB-58EInSpaceHigh* = #GEPscience_bd_Photometer_RAB-58EInSpaceHigh_00 // At this distance the signal is mostly noise and stubbornness. You stack exposures until a faint periodic wobble emerges.
        RAB-58EInSpaceHigh* = #GEPscience_bd_Photometer_RAB-58EInSpaceHigh_01 // The curve suggests an irregular shape with mismatched surfaces. Mission Control agrees—eventually—when the report finally catches up.

        CernunnosInSpaceLow* = #GEPscience_bd_Photometer_CernunnosInSpaceLow_00 // Cernunnos is a quiet, icy disc with darker stains that drink the red sunlight. The photometer calls it “low albedo”; you call it unsettling.
        CernunnosInSpaceLow* = #GEPscience_bd_Photometer_CernunnosInSpaceLow_01 // A thin bright rim appears at certain angles, like frost waking up briefly before slipping back into the cold.
        CernunnosInSpaceHigh* = #GEPscience_bd_Photometer_CernunnosInSpaceHigh_00 // From high orbit, Cernunnos is a dim bead at the edge of everything. The instrument needs patience; the crew needs distractions.
        CernunnosInSpaceHigh* = #GEPscience_bd_Photometer_CernunnosInSpaceHigh_01 // The averaged brightness hints at mixed ice and dark material, repeating with slow rotation. Out here, even a steady curve feels like a message.
    }
}