		KrelInSpaceHigh* = #JNSQscience_bd_multiSpec_KrelInSpaceHigh_00 // From high orbit, Krel’s pale disk stays stubbornly uniform until you stack the bands. Then the “veins” appear as faint, repeating contrasts that make everyone uncomfortable.
		KrelInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_KrelInSpaceLowLowlands_00 // The lowlands run slightly darker and warmer, suggesting fine dust pooled into the basins. Gravity may be weak here, but it still sorts the mess.
