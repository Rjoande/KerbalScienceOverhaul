        BorvoFlyingLowTropicalCraquelure* = #GEPscience_bd_radarAltimeter_BorvoFlyingLowTropicalCraquelure_00 // Low over the cracked terrain, the altimeter chatters with rapid micro-returns. Whatever this crust is, it’s doing its best impression of shattered glass.
