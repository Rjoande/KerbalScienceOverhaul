        #JNSQscience_evaReport_AdenInSpaceLowHighlands_00 = The highlands pass beneath in jagged bands. You note the dramatic shadows and the total lack of anywhere comfy to sit.
        #JNSQscience_evaReport_AdenInSpaceLowHighlands_01 = Your suit drifts a little too freely, and you remember that “let go” is not a valid navigation plan.
        #JNSQscience_evaReport_AdenInSpaceLowMountains_00 = Over the mountains, the horizon rises and falls in sharp teeth. You keep one hand on the ship, just in case space gets ideas.
        #JNSQscience_evaReport_AdenInSpaceLowMountains_01 = You record an EVA report, then immediately record a second report about how hard it is to write while floating.
        #JNSQscience_evaReport_AdenInSpaceLowPoles_00 = The polar region looks colder from here, which is impressive because “colder than vacuum” should not be possible.
        #JNSQscience_evaReport_AdenInSpaceLowPoles_01 = You watch the shadows stretch across the pole and decide the darkness is winning.
        #JNSQscience_evaReport_AdenInSpaceHigh_00 = From high above, Aden shrinks to a brown bead while Lindor dominates the sky like it owns the place.
        #JNSQscience_evaReport_AdenInSpaceHigh_01 = You spin slowly in the void and file a report that is mostly “quiet,” with a footnote that says “very, very quiet.”

        #JNSQscience_evaReport_HuygenSrfLanded_00 = You take a careful step; the lands disappear into orange haze. Your suit reports high pressure outside and you believe it.
        #JNSQscience_evaReport_HuygenSrfLanded_01 = The ground feels solid underfoot, but flat, dark ground stretches under a dim sky. You log: visibility poor, atmosphere stubborn, morale acceptable.
        #JNSQscience_evaReport_HuygenSrfLandedLowlands_00 = The ground squishes a little under your boots, then stubbornly pretends it didn't.
        #JNSQscience_evaReport_HuygenSrfLandedLowlands_01 = A cold, dense haze clings to your suit like it pays rent.
        #JNSQscience_evaReport_HuygenSrfLandedMidlands_00 = You can see the landscape rolling away... until it fades into a featureless amber wall.
        #JNSQscience_evaReport_HuygenSrfLandedMidlands_01 = Your helmet lights illuminate fog, then more fog, and then the concept of fog.
        #JNSQscience_evaReport_HuygenSrfLandedHighlands_00 = The wind feels slow but strong, like the air is thinking hard about pushing you over.
        #JNSQscience_evaReport_HuygenSrfLandedHighlands_01 = Distant dark ridges appear and vanish as the haze shifts. You write "mostly ridges" in the report.
        #JNSQscience_evaReport_HuygenSrfLandedMountains_00 = Low gravity encourages heroic poses. High pressure immediately humbles them.
        #JNSQscience_evaReport_HuygenSrfLandedMountains_01 = You hop, drift, and land like a feather. The mountain replies with a gust and a creak of your suit seals.
        #JNSQscience_evaReport_HuygenSrfLandedPeaks_00 = Up here the haze thins just enough to show how much haze there still is.
        #JNSQscience_evaReport_HuygenSrfLandedPeaks_01 = The sky is a muted gold, and the horizon looks close enough to poke. You decide not to test that.
        #JNSQscience_evaReport_HuygenSrfLandedPolarLowlands_00 = The ground is dark and brittle, patterned like cracked paint left out in the cold.
        #JNSQscience_evaReport_HuygenSrfLandedPolarLowlands_01 = Frost gathers on your suit fittings almost immediately. You log it as "enthusiastic condensation."
        #JNSQscience_evaReport_HuygenSrfLandedPoles_00 = Everything is muffled here; even your footsteps sound like they are wearing mittens.
        #JNSQscience_evaReport_HuygenSrfLandedPoles_01 = Your compass makes a confident suggestion, then remembers there is no magnetic field and gives up.
        #JNSQscience_evaReport_HuygenSrfLandedPolarHighlands_00 = The slope rises into a dim glow, like the sun is trying not to bother anyone.
        #JNSQscience_evaReport_HuygenSrfLandedPolarHighlands_01 = Wind-carved rock and frozen grime compete for the title of "most unwelcoming."
        #JNSQscience_evaReport_HuygenSrfLandedShores_00 = The shoreline is glossy and black, as if the planet spilled something and never cleaned it up.
        #JNSQscience_evaReport_HuygenSrfLandedShores_01 = Little ripples lick at the edge of the land. Your suit sensors politely ask you to stop staring and step back.
        #JNSQscience_evaReport_HuygenSrfSplashed_00 = You float with your pack keeping you barely upright; a black, glossy lake swallows reflections. You set every switch to 'no sparks'.
        #JNSQscience_evaReport_HuygenSrfSplashed_01 = The liquid surface ripples like slow-moving oil. The liquid beads on your boots and runs away like it knows you are trouble.
        #JNSQscience_evaReport_HuygenSrfSplashedShores_00 = You float higher than you should, bobbing in cold liquid that refuses to behave like water.
        #JNSQscience_evaReport_HuygenSrfSplashedShores_01 = The suit stays sealed, but the sound of slow sloshing is unsettlingly loud in your helmet.
        #JNSQscience_evaReport_HuygenSrfSplashedMethaneLakes_00 = You are in a methane lake. You record this fact several times, just to make sure it is real.
        #JNSQscience_evaReport_HuygenSrfSplashedMethaneLakes_01 = The surface is dark and smooth, broken by lazy bubbles. You keep your thoughts far away from "sparks."
        #JNSQscience_evaReport_HuygenFlyingLow_00 = Flying here feels like swimming through syrup. your radio crackles; the silence outside does not care, and your jetpack over-corrects like it is proud of itself.
        #JNSQscience_evaReport_HuygenFlyingLow_01 = You try an EVA hop and the thick air catches you. Icy ridges poke through low cloud like dark teeth, so you navigate by instruments and optimism.
        #JNSQscience_evaReport_HuygenFlyingLowLowlands_00 = Hanging onto the ladder, you watch the lowlands blur beneath a thick amber soup.
        #JNSQscience_evaReport_HuygenFlyingLowLowlands_01 = The air buffets you with slow punches. You log "wind: determined."
        #JNSQscience_evaReport_HuygenFlyingLowMidlands_00 = The ground comes in brief, blurry glimpses between drifting curtains of haze.
        #JNSQscience_evaReport_HuygenFlyingLowMidlands_01 = Turbulence nudges you like a bored giant flicking your helmet.
        #JNSQscience_evaReport_HuygenFlyingLowHighlands_00 = Dark highlands loom out of the fog, then sink back into it like shy sea monsters.
        #JNSQscience_evaReport_HuygenFlyingLowHighlands_01 = You can almost believe you see detail down there, until the haze laughs and rearranges itself.
        #JNSQscience_evaReport_HuygenFlyingLowMountains_00 = Updrafts over the mountains lift you gently, as if the planet is trying to inhale you.
        #JNSQscience_evaReport_HuygenFlyingLowMountains_01 = The air is thick enough to feel with your gloves. You write "do not remove gloves" just in case.
        #JNSQscience_evaReport_HuygenFlyingLowPeaks_00 = Peaks stab upward through the haze, trying their best to reach cleaner air.
        #JNSQscience_evaReport_HuygenFlyingLowPeaks_01 = The view is jagged rock, amber sky, and a lot of "maybe" in between.
        #JNSQscience_evaReport_HuygenFlyingLowPolarLowlands_00 = The polar flats below are streaked with dark patches and pale crust, like spilled ink on snow.
        #JNSQscience_evaReport_HuygenFlyingLowPolarLowlands_01 = Your suit creaks softly as pressure and cold argue about who gets to be uncomfortable.
        #JNSQscience_evaReport_HuygenFlyingLowPoles_00 = The pole is a dim target beneath a heavy sky. It feels like flying through a muted painting.
        #JNSQscience_evaReport_HuygenFlyingLowPoles_01 = Static crackles in your comms as if the atmosphere is chewing on the signal.
        #JNSQscience_evaReport_HuygenFlyingLowPolarHighlands_00 = The polar highlands look sharp at the edges and soft everywhere else, thanks to the ever-present haze.
        #JNSQscience_evaReport_HuygenFlyingLowPolarHighlands_01 = You cling tighter as a slow gust rolls you sideways. The report includes the word "wheee" crossed out.
        #JNSQscience_evaReport_HuygenFlyingLowShores_00 = The coastline below draws a dark, wavering line where land and strange sea negotiate.
        #JNSQscience_evaReport_HuygenFlyingLowShores_01 = You watch waves chase the shore at a leisurely pace. Even the water here takes its time.
        #JNSQscience_evaReport_HuygenFlyingLowMethaneLakes_00 = The lake surface reflects almost nothing; it is like staring at a polished shadow.
        #JNSQscience_evaReport_HuygenFlyingLowMethaneLakes_01 = A faint sheen glints, then disappears. You decide the lake is being intentionally dramatic.
        #JNSQscience_evaReport_HuygenFlyingHigh_00 = Up here the haze glows amber and your visor stays almost clear. Higher ground gives you a slightly better view, briefly. You call this 'progress'.
        #JNSQscience_evaReport_HuygenFlyingHigh_01 = The wind changes its mind every few seconds. Wind scrapes across uplands with a steady shove. You write: atmosphere has layers, each with opinions.
        #JNSQscience_evaReport_HuygenInSpaceLow_00 = You drift over the terminator and watch the limb glow. Dark ground stretches under a dim sky. You log: beautiful, frustrating, scientifically useful.
        #JNSQscience_evaReport_HuygenInSpaceLowLowlands_00 = From low orbit, the lowlands are a dark stain under a glowing atmospheric rim.
        #JNSQscience_evaReport_HuygenInSpaceLowLowlands_01 = You try to pick out details, but the haze turns everything into an impressionist painting.
        #JNSQscience_evaReport_HuygenInSpaceLowMidlands_00 = The midlands form gentle gradients that fade into the planet-wide amber veil.
        #JNSQscience_evaReport_HuygenInSpaceLowMidlands_01 = You record the boundary lines with confidence, and then watch them vanish under drifting haze.
        #JNSQscience_evaReport_HuygenInSpaceLowHighlands_00 = The highlands appear as darker blotches, like bruises under translucent skin.
        #JNSQscience_evaReport_HuygenInSpaceLowHighlands_01 = The atmosphere scatters the light into a soft glow that makes the terrain look unreal.
        #JNSQscience_evaReport_HuygenInSpaceLowMountains_00 = Mountain chains show up as jagged shadows that the haze tries very hard to erase.
        #JNSQscience_evaReport_HuygenInSpaceLowMountains_01 = You log the peaks by their silhouettes, because the planet refuses to provide surface clarity.
        #JNSQscience_evaReport_HuygenInSpaceLowPeaks_00 = The peaks are tiny dark points that barely win against the haze.
        #JNSQscience_evaReport_HuygenInSpaceLowPeaks_01 = You wonder how something so tall can still look so shy from orbit.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarLowlands_00 = The polar lowlands are mottled with pale patches that might be frost, or might be the atmosphere lying again.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarLowlands_01 = The limb glow near the pole is bright and thick, like the air is piled up there.
        #JNSQscience_evaReport_HuygenInSpaceLowPoles_00 = The pole is a muted bullseye under a dome of amber light.
        #JNSQscience_evaReport_HuygenInSpaceLowPoles_01 = You note the lack of sharp contrast and suspect the atmosphere is smoothing everything on purpose.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarHighlands_00 = The polar highlands cast faint shadows that look smudged at the edges.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarHighlands_01 = You track ridgelines for a moment before haze bands drift over and politely end the observation.
        #JNSQscience_evaReport_HuygenInSpaceLowShores_00 = The shores are a thin dark outline where land meets unfamiliar seas.
        #JNSQscience_evaReport_HuygenInSpaceLowShores_01 = You can almost see waves. You can definitely see the atmosphere doing its best to hide them.
        #JNSQscience_evaReport_HuygenInSpaceLowMethaneLakes_00 = The methane lakes are perfect dark pools, absorbing light like they are hoarding it.
        #JNSQscience_evaReport_HuygenInSpaceLowMethaneLakes_01 = You log the lakes as "present" and resist the urge to add "menacingly."
        #JNSQscience_evaReport_HuygenInSpaceHigh_00 = From high orbit, Huygen is a small amber world with a bright rim and a secretive surface.
        #JNSQscience_evaReport_HuygenInSpaceHigh_01 = The planet looks sealed under its thick atmosphere. You write that you feel watched, then delete that sentence.
        #JNSQscience_evaReport_HuygenInSpaceHigh_02 = From high above, Huygen is an amber marble wrapped in a thick veil. You wave anyway; it does not wave back.
        #JNSQscience_evaReport_HuygenInSpaceHigh_03 = You double-check your tether and stare down at a world that refuses to show its surface. The science team calls that 'interesting'.

        #JNSQscience_evaReport_RigaSrfLandedLowlands_00 = The lowlands look like Kerbin forgot to finish painting. Your boots crunch into powder that refuses to stay down.
        #JNSQscience_evaReport_RigaSrfLandedLowlands_01 = You take a confident step and immediately regret the word “confident.” Low gravity turns walking into interpretive dance.
        #JNSQscience_evaReport_RigaSrfLandedMidlands_00 = The midlands roll on forever, subtle and stubbornly familiar. You keep expecting grass to appear and apologize.
        #JNSQscience_evaReport_RigaSrfLandedMidlands_01 = You kick a pebble. It arcs away like it’s filing for orbital citizenship.
        #JNSQscience_evaReport_RigaSrfLandedHighlands_00 = The highlands are sharp and cold, with shadows that look deeper than they should be. Your suit feels like the only warm thing in the universe.
        #JNSQscience_evaReport_RigaSrfLandedHighlands_01 = You pause to admire the view and immediately fog your visor with excited breathing. Mission Control calls that “data.”
        #JNSQscience_evaReport_RigaSrfLandedMountains_00 = The mountains loom close, jagged and stubborn. You double-check your footing and still drift a little when you hop.
        #JNSQscience_evaReport_RigaSrfLandedMountains_01 = Every step sounds loud in your helmet and silent everywhere else. The thin air is mostly there for decoration.
        #JNSQscience_evaReport_RigaSrfLandedPoles_00 = Frosty grains glitter at the poles, too bright against the dark sky. You try to brush some off and it clings like static.
        #JNSQscience_evaReport_RigaSrfLandedPoles_01 = You feel like you should shiver, but the suit handles that part. Your brain does the rest anyway.
        #JNSQscience_evaReport_RigaFlyingLowLowlands_00 = You jet along just above the flats, “flying” through a haze that barely counts as atmosphere. The ground scrolls by like a very cold conveyor belt.
        #JNSQscience_evaReport_RigaFlyingLowLowlands_01 = The air tugs at you in tiny, unhelpful ways. Your pack does all the real work and demands overtime pay.
        #JNSQscience_evaReport_RigaFlyingLowMidlands_00 = The midlands rise and dip beneath you while you try to pretend this is controlled flight. The suit politely refuses to agree.
        #JNSQscience_evaReport_RigaFlyingLowMidlands_01 = You skim over ridges that look soft from above and cruel up close. You decide to stay above.
        #JNSQscience_evaReport_RigaFlyingLowHighlands_00 = Thin air and broken terrain make for bumpy “aerodynamics.” You wobble, stabilize, and call it a successful maneuver.
        #JNSQscience_evaReport_RigaFlyingLowHighlands_01 = The haze catches the light in faint bands as you pass. For a moment, it almost feels like weather.
        #JNSQscience_evaReport_RigaFlyingLowMountains_00 = You cruise past rocky spines and try not to think about how little air there is to slow you down. Gravity seems eager to participate.
        #JNSQscience_evaReport_RigaFlyingLowMountains_01 = The peaks rush by under your boots. You file a report describing it as “exciting” to avoid admitting “terrifying.”
        #JNSQscience_evaReport_RigaFlyingLowPoles_00 = Over the poles, everything gets brighter and harsher at once. Even the tiny haze looks brittle.
        #JNSQscience_evaReport_RigaFlyingLowPoles_01 = Icy grains swirl up in slow motion when you pass low. You watch them float as if they’re unsure where “down” is.
        #JNSQscience_evaReport_RigaFlyingHighLowlands_00 = Up high, the last threads of air brush your suit and then give up. The lowlands blur into broad, quiet shapes below.
        #JNSQscience_evaReport_RigaFlyingHighLowlands_01 = You can almost forget you’re still in an atmosphere—until your instruments insist you are, technically.
        #JNSQscience_evaReport_RigaFlyingHighMidlands_00 = The midlands flatten into gentle bands as you climb. Lindor hangs huge in the sky, supervising your “flight.”
        #JNSQscience_evaReport_RigaFlyingHighMidlands_01 = The suit jets hiss softly, the only sound that matters. Everything else is cold silence and slow motion.
        #JNSQscience_evaReport_RigaFlyingHighHighlands_00 = From high altitude, the highlands look like shattered stone laid out with care. The haze is so thin it feels like a rumor.
        #JNSQscience_evaReport_RigaFlyingHighHighlands_01 = You drift, correct, and drift again. Aerodynamics offers a brief shrug and leaves.
        #JNSQscience_evaReport_RigaFlyingHighMountains_00 = The mountain chain becomes a jagged line beneath you. You keep your movements small; big mistakes travel far here.
        #JNSQscience_evaReport_RigaFlyingHighMountains_01 = Your shadow isn’t just on the ground—it’s on your confidence. You log that as “situational awareness.”
        #JNSQscience_evaReport_RigaFlyingHighPoles_00 = The polar caps glitter under distant sunlight. The air up here is almost nothing, and it still manages to be cold.
        #JNSQscience_evaReport_RigaFlyingHighPoles_01 = You watch the pole slide under you and wonder how something can be so bright and so empty at the same time.
        #JNSQscience_evaReport_RigaInSpaceLowLowlands_00 = You float above the lowlands and can see every little scar and smooth patch without the cockpit glass. Riga’s haze draws a faint outline around it.
        #JNSQscience_evaReport_RigaInSpaceLowLowlands_01 = Below, the flats look calm and easy. You know that’s a lie because you’ve tried walking there.
        #JNSQscience_evaReport_RigaInSpaceLowMidlands_00 = The midlands spread out beneath you in gentle folds. It looks almost welcoming, which is suspicious for a place this cold.
        #JNSQscience_evaReport_RigaInSpaceLowMidlands_01 = Lindor fills the background like a guardian giant. You wave anyway, just in case.
        #JNSQscience_evaReport_RigaInSpaceLowHighlands_00 = From here the highlands are a maze of shadows and sharp light. You drift and feel very small and very employed.
        #JNSQscience_evaReport_RigaInSpaceLowHighlands_01 = You compare the terrain to Kerbin out loud and immediately get corrected by three different scientists.
        #JNSQscience_evaReport_RigaInSpaceLowMountains_00 = The mountain peaks look even meaner without the ship between you and them. You keep one hand on the rail and pretend it helps.
        #JNSQscience_evaReport_RigaInSpaceLowMountains_01 = Your suit jets puff gently as you translate along the hull. The mountains below look like they’re reaching up for you.
        #JNSQscience_evaReport_RigaInSpaceLowPoles_00 = The poles shine like sprinkled sugar against dark rock. The thin haze makes a faint halo at the limb.
        #JNSQscience_evaReport_RigaInSpaceLowPoles_01 = You spot tiny bright streaks and decide they’re “interesting deposits.” That sounds better than “mysterious glitter.”
        #JNSQscience_evaReport_RigaInSpaceHigh_00 = From high above, Riga is a brown-grey marble with a whisper-thin rim of haze. Lindor sits nearby like it owns the view.
        #JNSQscience_evaReport_RigaInSpaceHigh_01 = The whole moon looks quietly familiar and completely inhospitable. You record the paradox and then stare at it a little longer.

        #JNSQscience_evaReport_TalosSrfLandedLowlands_00 = Your boots barely sink in before the dust decides it wants to follow you home.
