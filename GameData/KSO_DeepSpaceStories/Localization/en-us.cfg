        // The Expanse
        #DSS_Expanse_crewReport_DresInSpaceLow_00 = You look down at Dres and think it would make a great depot, once someone figures out how to stop “temporary” from becoming “permanent.”
        #DSS_Expanse_crewReport_DresInSpaceLow_01 = The thrusters puff in short, stingy bursts. Reaction mass is treated like water: measured, recycled, and argued over.
        #DSS_Expanse_crewReport_DresInSpaceHigh_00 = From up here Dres is a pale dot with a long commute attached. The life-support readouts feel like the most important view.
        #DSS_Expanse_crewReport_DresInSpaceHigh_01 = You catch yourself planning the next shipment: air filters, spare seals, and anything that can be repurposed twice before it breaks.
        #DSS_Expanse_crewReport_DresSrfLanded_00 = Low gravity makes every step feel like working a shift on a trampoline. You recommend handrails before someone “accidentally” achieves orbit.
        #DSS_Expanse_crewReport_DresSrfLanded_01 = The cabin smells like warmed insulation and recycled air. The crew debates whether the first real habitat is a module, a trench, or “just keep living in the lander.”
        #DSS_Expanse_evaReport_DresInSpaceLow_00 = You hook a tether out of habit. The reel ticks like a metronome for “don’t drift, don’t waste.”
        #DSS_Expanse_evaReport_DresInSpaceLow_01 = Every puff of the suit jets feels like spending somebody’s air. You decide to move like you’re on a schedule.
        #DSS_Expanse_evaReport_DresInSpaceHigh_00 = Dres is a pale rock with a lot of empty around it. The emptiness feels like the real terrain.
        #DSS_Expanse_evaReport_DresInSpaceHigh_01 = You check your O2 again, then again. Out here, the suit is the only station you can count on.
        #DSS_Expanse_evaReport_DresSrfLanded_00 = You do a gentle hop and immediately regret it. Low gravity is fun until you remember how far “up” is.
        #DSS_Expanse_evaReport_DresSrfLanded_01 = The dust clings to everything like it owns the place. You start thinking in terms of seals, filters, and how long “temporary” can last.
        #DSS_Expanse_bd_cosmicRay_DresInSpaceLow_00 = Cosmic ray counts spike as you skim above Dres. No field, no air, just raw flux. Someone notes that out here, “weather” comes through the hull.
		#DSS_Expanse_bd_cosmicRay_DresInSpaceHigh_00 = The detector ticks like a bad metronome in the deep black around Dres. You file the numbers under “long-haul habitation problems” and try not to think about what “adaptation” might mean.
		#DSS_Expanse_bd_cosmicRay_DresSrfLanded_00 = On the surface, the regolith buys you a little shielding and the count rate finally settles down. You start drafting a plan: thicker walls, buried modules, and a genetics lab nobody has to admit they wanted.
        #DSS_Expanse_mysteryGoo_EveInSpaceHigh_00 = Mission Control calls this a “safe orbit.” The crew calls it “quarantine range.” The sealed canisters stay strapped down, and the checklist has more “DO NOT OPEN” than “observe.”
        #DSS_Expanse_mysteryGoo_EveInSpaceHigh_01 = The Goo draws itself into a tight, glossy purple skin and presses against the container like it’s trying to fall down faster. You add a note: “If disposal is suggested, pretend you didn’t hear it.”
        #DSS_Expanse_surfaceSample_TyloSrfLanded_00 = The sample is pale, dry, and stubbornly ordinary. You log it anyway—what matters is whether it can be turned into air, water, shielding, or brick.
        #DSS_Expanse_surfaceSample_TyloSrfLanded_01 = You bag the regolith like it’s inventory, not treasure. Notes focus on processing temps, contaminants, and how much habitat it could buy per ton.
        #DSS_Expanse_surfaceSample_TyloSrfLanded_02 = You sift the regolith and imagine planters instead of sample bags. If any tidal-driven heating or buried volcanism is leaking trace minerals upward, it might be the difference between “dust” and “soil.”
        #DSS_Expanse_surfaceSample_TyloSrfLanded_03 = The chemistry is stingy, but not hopeless. You flag the sample for nutrient assays—because if this can be coaxed into growing anything, it changes Tylo from “outpost” to “home.”
        #DSS_Expanse_surfaceSample_TyloSrfLanded_04 = You run a quick nutrient check and laugh at the result. As soil, it’s useless—but as a sterile substrate in a closed loop? Maybe. If you can afford the water.
        #DSS_Expanse_surfaceSample_TyloSrfLanded_05 = The regolith is sharp, dry, and chemically uninviting. You note that crops won’t grow in it—they’ll grow around it, under lamps, fed by tanks, with Tylo dirt only holding things in place.
        #DSS_Expanse_bd_drill_TyloSrfLanded_00 = The drill bites through the dust into a crusty, salt-streaked layer. Deeper down, the core comes up with darker flecks that the lab flags as “interesting organics” and “please keep sealed.”
        #DSS_Expanse_bd_drill_TyloSrfLanded_01 = A few centimeters in, the cuttings change from pale grit to damp-ish clumps that smell faintly of old filters. You log “salts + complex carbon traces” and recommend a dedicated containment bin for the next sample run.
        #DSS_Expanse_bd_drill_TyloSrfLanded_02 = The drill chews through powdery dust, then bites into a crust that comes up faintly yellow. The analyzer flags salts-rich fines. Tylo’s “sterile” ground is hiding a chemical personality.
        #DSS_Expanse_bd_drill_TyloSrfLanded_03 = Your core sample has layers: gray dust on top, then a gritty band loaded with carbon compounds. The notes immediately drift from “geology” to “industry”: binders, processing feedstock, and what you can build if you can dig.
        #DSS_Expanse_bd_GeigerCounter_EveInSpaceLow_00 = The counter ticks with professional enthusiasm. Mission Control recommends “standard quarantine posture” and refuses to define it.
        #DSS_Expanse_bd_GeigerCounter_EveInSpaceLow_01 = A brief spike trips an auto-flag labeled “PURPLE SOLUTION: NOMINAL.” You decide you were happier before you could read.
        #DSS_Expanse_bd_IRradiometer_EveInSpaceLow_00 = A fresh, bright-hot smear blooms across the IR map: too sharp and too new to be weather. Mission Control asks if you “saw anything fall,” then reminds you that Eve is the approved place for problems to go quiet.
        #DSS_Expanse_bd_microwaveSpec_EveInSpaceLow_00 = The microwave spectrum shows a sharp patch of freshly scoured surface, too “clean” to be natural for long on Eve. Someone asks if you logged any unplanned “deliveries.”
        #DSS_Expanse_bd_microwaveSpec_EveInSpaceLow_01 = A narrow-band echo comes back stronger than it should, like a new field of debris is still tumbling through the soup below. You file it under “impact… or disposal.”
        #DSS_Expanse_bd_SIGINT_EveInSpaceLow_00 = The receiver locks onto a tight burst pattern that looks almost like a handshake, then dissolves into static. Mission Control suggests you “log it and do not engage,” as if that’s a thing you can do with radio waves.
        #DSS_Expanse_bd_SIGINT_EveInSpaceLow_01 = A weak carrier rides the noise floor, repeating on a schedule, but the source is somewhere under Eve’s purple lid. The notes field quietly gains a new checkbox: “Possible disposal beacon.”
        #DSS_Expanse_bd_SIGINT_DresInSpaceLow_00 = The receivers sweep every band and find nothing but thermal hiss. Dres is quiet in the way that makes planners start drawing infrastructure charts.
		#DSS_Expanse_bd_SIGINT_DresInSpaceLow_01 = No chatter, no beacons, no stray pings, just empty spectrum. You tag the file “pristine baseline” and imagine how quickly it’ll vanish once the first big operators move in.
        #DSS_Expanse_bd_soilScoop_TyloSrfLanded_00 = You scoop up a heavy, gritty handful that behaves more like crushed rock than “soil.” Under Tylo gravity, even a sample bag feels like it wants overtime pay.
        #DSS_Expanse_bd_soilScoop_TyloSrfLanded_01 = The scoop scrapes over compacted dust and comes up with sharp grains and a few oddly clumped fines. You note that anything grown here will need imported biology, and a lot of engineering.
        #DSS_Expanse_bd_UVspec_EveInSpaceLow_00 = The UV readout flares over a fresh scar: bright edges, hot dust, and chemistry that hasn’t had time to get “Eve-colored” yet. Mission Control asks if you logged any flashes in the last orbit.
        #DSS_Expanse_bd_UVspec_EveInSpaceLow_01 = A thin ultraviolet shadow drifts downrange like a new plume spreading into the upper haze. The spectrum looks uncomfortably similar to “spent stages,” but nobody uses those words on the record.

        // The Martian
        #DSS_Martian_crewReport_DunaSrfLanded_00 = The habitat smells like warm electronics and damp soil. The potato boxes are parked as close to the RTG as Mission Control will let us admit.
        #DSS_Martian_crewReport_DunaSrfLanded_01 = We rerouted RTG “waste” heat through a radiator “test setup” and now the cabin is livable. The manual did not cover this, but the manual is not here.
        #DSS_Martian_crewReport_DunaSrfLanded_02 = The rover battery is now the greenhouse battery. The rover is not thrilled. The potatoes, however, have issued no complaints.
        #DSS_Martian_crewReport_DunaSrfLanded_03 = Duna dust has breached the airlock again. We sealed one leak with a snack wrapper, a hose clamp, and an amount of confidence that should not be logged.
        #DSS_Martian_crewReport_DunaSrfLanded_04 = Someone suggested cracking open the emergency fuel line “just a little” for warmth. The idea was discussed, then firmly rejected as a very bad one.
        #DSS_Martian_crewReport_DunaSrfLanded_05 = The CO2 scrubber started making a sad noise, so we tapped it until it behaved. We are officially calling this “percussive maintenance” and pretending it was planned.
        #DSS_Martian_crewReport_DunaInSpaceHigh_00 = We are “in formation” with Duna at several kilometers per second. Someone asks if a hull breach counts as a rendezvous maneuver. The answer is no, but the air is leaving fast enough to argue.
        #DSS_Martian_evaReport_DunaSrfLanded_00 = You take one look at the nearest dead probe and start mentally inventorying its parts. That antenna could be a shovel. Or a ladle. Or both.
        #DSS_Martian_evaReport_DunaSrfLanded_01 = You arrange rocks into a message for anything passing overhead. It says “HELLO” until the wind helpfully rearranges it into “HLL O”.
        #DSS_Martian_evaReport_DunaSrfLanded_02 = The suit manual wants “scheduled EVA tasks.” The planet wants “improvise.” You repurpose a discarded panel as a windbreak and pretend it was the plan.
        #DSS_Martian_evaReport_DunaSrfLanded_03 = You build a rock-sign that reads “SEND SNACKS.”
        #DSS_Martian_evaReport_DunaInSpaceLow_00 = A tiny suit breach turns you into a panicked thruster. You call it “Iron-kerbal mode” and try to look like you meant to do that.
        #DSS_Martian_evaReport_DunaInSpaceLow_01 = You clamp a patch over a suit leak and still get a gentle push. Congratulations: you have invented a maneuvering system powered by regret.
        #DSS_Martian_evaReport_DunaInSpaceLow_02 = The escaping air from a suit breach gives you just enough delta-v to “adjust your trajectory.” The rules call it an accident. You call it a burn.
        #DSS_Martian_evaReport_DunaInSpaceLow_03 = You try to stabilize your spin by pointing a suit leak the other way. It works briefly, until physics remembers you are shaped like a confused potato.
        #DSS_Martian_bd_camera_DunaSrfLanded_00 = The camera catches a panorama of red dust, scattered hardware, and one brave line of rocks spelling “HI”. The wind tries to edit the message into something less optimistic.
        #DSS_Martian_bd_mapping_DunaInSpaceLow_00 = Low orbit turns Duna into a grid of problems you can finally measure. The map fills with “maybe flat” areas and “definitely not flat” areas.
        #DSS_Martian_bd_mapping_DunaInSpaceLow_01 = You tag a string of smooth-looking terrain as a potential traverse route, then zoom in and discover it’s just smaller rocks.
        #DSS_Martian_bd_mapping_DunaInSpaceLow_02 = The scan highlights a suspiciously straight line that might be an old probe track, or a shadow, or a bad pixel that refuses to die. You log it anyway: future-you can argue with present-you.
        #DSS_Martian_bd_orbitalScope_DunaInSpaceLow_00 = Mission Control asks you to “confirm whether any assets have been left on the surface.” You zoom in until you can identify the exact shape of your bad decisions.
        #DSS_Martian_bd_orbitalScope_DunaInSpaceLow_01 = The orbital scope picks out a tiny glint that is either a forgotten tool, a discarded panel, or a very smug rock. Mission Control requests three more passes “just to be sure.”
        #DSS_Martian_bd_SIGINT_DunaInSpaceLow_00 = The receiver locks onto a faint, outdated ping from a surface probe that was officially “decommissioned.” It is now very unofficially broadcasting what sounds like SOS.
        #DSS_Martian_bd_SIGINT_DunaInSpaceLow_01 = A dead probe starts transmitting in neat little bursts, like it’s trying to remember how to talk. Mission Control asks if you can “just listen” without getting emotionally attached.
        #DSS_Martian_bd_SIGINT_DunaInSpaceLow_02 = You triangulate the signal to an old landing site. The probe repeats a status packet, then switches to a distress tone, as if it has finally noticed it’s alone.
        #DSS_Martian_bd_surveillance_DunaInSpaceLow_00 = The surveillance pass shows a new set of tracks that were not on yesterday’s map. Either the wind learned to drive, or someone is doing unscheduled “maintenance” again.
        #DSS_Martian_bd_surveillance_DunaInSpaceLow_01 = A small cluster of objects near the habitat has shifted position by a few meters. Mission Control calls them “assets.” You call them “things that definitely walked there.”
        #DSS_Martian_bd_surveillance_DunaInSpaceLow_02 = A patch of dust looks freshly scoured, like something was dragged across it with purpose. No one admits to it on the radio, which is how you know it happened.
        #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_00 = The potato leaves stay stubbornly green in spite of the dust, the cold, and the fact that half the “soil” is improvised. You decide that counts as a scientific breakthrough.
        #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_01 = Growth rates spike whenever the RTG heat loop behaves and crash whenever it doesn’t. The plants are voting very clearly on your engineering choices.
        #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_02 = You log “nutrient solution adjustments” and “humidity tuning,” which is the official way to say you are keeping potatoes alive with repurposed tubing and determination.
        
        // === Val-Vall Jokes ===
        #JNSQscience_ValVall_00 = Someone keeps saying “Val on Vall” over the radio, and now the whole crew can’t stop laughing.
        #JNSQscience_ValVall_01 = You double-check the navigation computer. The target is Vall. The pilot writes “Val” on the checklist anyway.
        #JNSQscience_ValVall_02 = Mission Control asks for a status report. You answer “Val is on Vall—” and immediately hear muffled giggling on the channel.
        #JNSQscience_ValVall_03 = You label the sample container “VAL/L” to be safe. This somehow makes it worse.
        #JNSQscience_ValVall_04 = The flight log autocorrects “Vall” to “Val”. You consider filing a bug report, then remember you’re the one holding the pen.
        #JNSQscience_ValVall_05 = You rehearse the landing callouts carefully: “Vall. With two Ls.” Nobody listens.
        #JNSQscience_ValVall_06 = In the end, it looks like we really will have to send Val to Vall.
        #JNSQscience_ValVall_07 = You wonder if “Vall” is just short for “Vallentina.”
    }
}

