        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_radarAltimeter_AirmedInSpaceLowDarkenedLowlands_00 // Over the darker terrain, the return signal gets stronger and oddly steadier. It’s like the two-toned surface is made of two different answers.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_radarAltimeter_AirmedInSpaceLowDarkenedMidlands_00 // The dark midlands show rough, broken relief with sudden drops. You wonder what turned this side different, then remember the comm delay won’t answer you.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_radarAltimeter_AirmedInSpaceLowDarkenedHighlands_00 // The dark highlands throw long radar shadows behind jagged ridgelines. Somewhere above, Sirona hangs in the sky like a reminder you’re still a moon.
