        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DObservatory_00 = The scoop finds fine grit and dew under the platform edge. The operator requests you keep your excavation “astronomically quiet.”
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DSideLab_00 = You expose an impressively uniform layer… until it turns out to be spilled pellets from a “totally unrelated” experiment. Everyone suddenly remembers another meeting.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DSmallLab_00 = The scoop produces a sample cup full of identical granules, suspiciously identical. A scientist stamps it “CALIBRATED” and refuses eye contact.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DTanks_00 = The ground is compacted, stained, and deeply uninterested in being disturbed. The scoop returns smelling like regulations and fuel logs.
