        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowTropicalLowlands_00 = Dall'orbita, i bassopiani tropicali mostrano macchie luminose in UV che non coincidono con le mappe nel visibile, come una seconda superficie che solo la luce può vedere.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowTemperateLowlands_00 = Lunghe corsie scure in UV tagliano le pianure temperate, mentre sottili fili luminosi suggeriscono vene minerali deposte in ere quiete e lontane.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowTropicalUplands_00 = Gli altopiani tropicali fluorescono in bande a chiazze, come se vento e radiazione stessero revisionando il terreno riga per riga.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowTemperateUplands_00 = L'UV evidenzia creste e abrasioni sottili, il downlink in ritardo le fa sembrare caratteristiche prese in prestito dal passato.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowHighlands_00 = Le linee di cresta delle colline brillano ai bordi in UV, con bacini in ombra che inghiottono dettagli e fiducia allo stesso modo.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowGrandPeaks_00 = Le cime più alte mostrano cicatrici luminose in UV, rendendo le montagne più affilate e più lontane da casa di quanto dovrebbero.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowCraters_00 = I crateri incidono anelli luminosi in UV sulla superficie, con raggi che puntano il vuoto con grande autorità.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowVolcanoes_00 = Le regioni vulcaniche appaiono insolitamente attive in UV, con deboli bagliori che spingono il team scientifico a chiedere "solo un altro passaggio" da diversi minuti di distanza.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceLowPoles_00 = I poli si accendono e si spengono in UV a seconda dell'angolo, una pallida corona che non sta mai ferma sotto il sole rosso e fioco.
        #GEPscience_tantares_ultraviolet_light_camera_EponaInSpaceHigh_00 = Da molto in alto, Epona è un disco quieto con una marezzatura UV attenuata, il ritardo del segnale trasforma ogni immagine in una cartolina di "poco fa".
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaSrfLandedTropicalLowlands_00 = La camera UV non vede quasi nulla oltre a regolite scura, finché alcuni granelli non lampeggiano luminosi, come piccole scintille su pietra gelata.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaSrfLandedTemperateLowlands_00 = I bassopiani temperati restano fiocamente scuri in UV e ostinatamente senza dettagli, il disegno più chiaro è il rumore della camera che insiste di stare ancora funzionando.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaSrfLandedTropicalMidlands_00 = La roccia fratturata fluoresce lungo bordi freschi, tracciando sottili linee pallide che sembrano troppo nitide per qualcosa di così freddo.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaSrfLandedTemperateMidlands_00 = L'UV rivela una lieve fasciatura sui pendii esposti, la luna sembra levigata e archiviata.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaSrfLandedHighlands_00 = Le facce delle colline scintillano luminose in UV su creste affilate, mentre le ombre restano assolute e un po' troppo a loro agio.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaSrfLandedPoles_00 = Il suolo polare dà un breve scintillio UV e poi cade nel nulla, persino la luce sembra riluttante qui.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceLowTropicalLowlands_00 = Dall'orbita bassa, i bassopiani tropicali appaiono quasi neri in UV con puntini luminosi sparsi, come se qualcuno avesse spruzzato polvere fosforescente e poi se ne fosse andato.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceLowTemperateLowlands_00 = Ampie pianure scure in UV sono tracciate da deboli cuciture luminose che potrebbero essere fratture, o Rosmerta che si sta vantando in silenzio.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceLowTropicalMidlands_00 = Le pianure tropicali formano una rete spezzata di risalti UV su campi di detriti, Epona incombe lì vicino, un punto di riferimento che non sbatte le palpebre.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceLowTemperateMidlands_00 = Sottili aloni UV delineano affioramenti isolati, i dati arrivano tardi, come se attraversare il silenzio richiedesse fatica.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceLowHighlands_00 = Le creste lampeggiano luminose in UV quando cambia l'angolo del sole, facendo sembrare che il terreno sbatta le palpebre al rallentatore.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceLowPoles_00 = I poli mostrano deboli corone UV senza un disegno chiaro, gli scienziati lo chiamano "interessante" su un canale in ritardo.
        #GEPscience_tantares_ultraviolet_light_camera_RosmertaInSpaceHigh_00 = Da molto in alto, Rosmerta è un piccolo puntino freddo con una firma UV dura, facile da misurare e difficile da far sembrare normale.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58ESrfLandedLowlands_00 = La camera UV trova una spruzzata di granelli luminosi nei bassopiani, come se qualcuno avesse sparso polvere fosforescente e poi ti avesse lasciato solo con il silenzio.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58ESrfLandedEasternHighlands_00 = Le rocce delle colline orientali fluorescono lungo bordi affilati come rasoi, il downlink in ritardo fa sembrare che la piccola luna ti stia sbattendo le palpebre.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58ESrfLandedWesternHighlands_00 = Nelle colline occidentali, facce di frattura fresche si accendono luminose in UV contro detriti opachi, come se la pietra fosse ancora "calda" per stress antichi.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58EInSpaceLowLowlands_00 = Dall'orbita bassa, i bassopiani sono perlopiù scuri in UV con puntini sparsi di fluorescenza, si legge come un cielo stellato dipinto sulla roccia.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali tracciano sottili cuciture luminose in UV che non coincidono con le mappe nel visibile, "non familiare" diventa una linea di contorno.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali lampeggiano in UV lungo bordi di crateri e creste, poi spariscono nell'ombra, un mondo acceso spento sotto un sole rosso e fioco.
        #GEPscience_tantares_ultraviolet_light_camera_RAB-58EInSpaceHigh_00 = In alta quota, RAB-58E è un puntino freddo con una firma UV dura, l'immagine arriva abbastanza tardi da sembrare un ricordo.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedTropicalLowlands_00 = I bassopiani tropicali fluorescono in strisciate a chiazze, come se la chimica della superficie stesse cercando di parlare in una lingua che solo l'UV può sentire.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedTemperateLowlands_00 = Polvere scura in UV ricopre la pianura temperata, i graffi dei tuoi stivali brillano per poco, rendendo le tue impronte il ritorno scientifico più entusiasta finora.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedTropicalMidlands_00 = Le pianure tropicali mostrano sottili fili luminosi in UV su terreno spezzato, come vene minerali tracciate con una penna molto nervosa.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedTemperateMidlands_00 = Una lieve fasciatura UV compare sui pendii esposti, la telemetria quieta e in ritardo fa sembrare che il pianeta stia rispondendo lentamente di proposito.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedHighlands_00 = Le creste delle colline si accendono luminose in UV lungo spigoli affilati, trasformando vecchie cicatrici in contorni netti che sembrano troppo freschi per qualcosa di così lontano.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedSouthPolarHills_00 = Le colline polari meridionali scintillano di freddi puntini UV che svaniscono a ogni minima ombra, persino la camera sembra esitante quassù.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosSrfLandedNorthPole_00 = Vicino al Polo Nord, il ritorno UV oscilla tra un tenue scintillio e una penombra assoluta, come se la luce fosse razionata.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowTropicalLowlands_00 = Dall'orbita bassa, i bassopiani tropicali formano una mappa UV marezzata che non coincide con quella nel visibile, è come se il mondo avesse due facce.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowTemperateLowlands_00 = Lunghe corsie scure in UV tagliano le pianure temperate, bordate da sottili cuciture luminose che accennano a fratture o depositi.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano risalti UV sinuosi che vanno e vengono con l'angolo, il Controllo Missione reagisce diversi minuti dopo di te.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowTemperateMidlands_00 = Aloni UV aderiscono ad affioramenti sparsi, lasciando il terreno appena delineato, come se qualcuno lo avesse ricalcato per un rapporto che non arriverà presto.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowHighlands_00 = Le colline brillano in UV lungo bordi di crateri e linee di cresta mentre i bacini restano neri in UV, il contrasto sembra clinico sotto la debole luce rossa di Grannus.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowSouthPolarHills_00 = La regione polare meridionale mostra una debole corona UV che si spezza in archi sfrangiati, bella, e quindi sospetta.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceLowNorthPole_00 = Sopra il Polo Nord, il segnale UV si assottiglia in un pallido tremolio e poi cade nel rumore, il tipo di dato più solitario.
        #GEPscience_tantares_ultraviolet_light_camera_CernunnosInSpaceHigh_00 = Da molto in alto, Cernunnos è un piccolo disco freddo con una marezzatura UV attenuata, "vicino" non è una parola che nessuno usa quassù.

        // === Multistar Pack ===
        //bd_Photometer -- "Exoplanet transit" gag
        #GEPscience_bd_kepler_exoplanet_00 = Registri un perfetto "transito di esopianeta" mentre il pianeta locale attraversa una stella distante. Tecnicamente corretto resta corretto.
        #GEPscience_bd_kepler_exoplanet_01 = Transito di esopianeta confermato! La curva di luce è da manuale: ingresso netto, uscita pulita e una distinta sensazione che tu stia barando.
        #GEPscience_bd_kepler_exoplanet_02 = Il team festeggia la scoperta di un esopianeta. Tu annoti in silenzio che ha una mappa molto familiare e un numero sospetto di bandiere.
        #GEPscience_bd_kepler_exoplanet_03 = Rilevi un "transito" e stimi il raggio dell'"esopianeta" con grande precisione. Stimi anche il raggio del rotolamento di occhi degli scienziati a casa.
        #GEPscience_bd_kepler_exoplanet_04 = La stella si attenua esattamente come previsto. L'"esopianeta" compare anche esattamente dove diceva lo schermo di navigazione. La scienza va avanti.

        // Distant Kerbol
        #GEPscience_farKerbol_00 = Punta il telescopio lontano da Grannus e trova Kerbol: una stella distante e ordinaria che, in qualche modo, sembra un punto di riferimento.
        #GEPscience_farKerbol_01 = Kerbol entra comodamente nel campo visivo. Ti ricordi quando riempiva il cielo e faceva sembrare tutto vicino.
        #GEPscience_farKerbol_02 = Registri "bersaglio acquisito: Kerbol." Per un attimo, la parola "bersaglio" ti sembra una categoria sbagliata.
        #GEPscience_farKerbol_03 = Quassù Kerbol è solo un'altra sorgente puntiforme. Non ti piace quanto sia facile dirlo.
        #GEPscience_farKerbol_04 = La luce di Kerbol arriva sottile e in ritardo, come una cartolina che ha impiegato anni ad attraversare il buio.
        #GEPscience_farKerbol_05 = Kerbol brilla stabile e senza pretese, ed è proprio per questo che fa un po' male guardarlo.
        #GEPscience_farKerbol_06 = Scatti un'immagine "deep field" e etichetti un punto luminoso come "stella di casa", giusto perché l'archivio se lo ricordi.
        #GEPscience_farKerbol_IR_00 = Kerbol è un punto debole e distante nell'infrarosso. Fissi il pixel più a lungo di quanto richieda il protocollo, poi fai finta di stare controllando la calibrazione.
        #GEPscience_farKerbol_UV_00 = Rilevi un debole brillamento UV lontano. È rassicurante sapere che Kerbol fa ancora cose da Kerbol anche senza di te.
        #GEPscience_farKerbol_Xray_00 = Lo spettro corrisponde a una stella familiare. La nostalgia di casa è un errore sistematico non modellato.
        #GEPscience_farKerbol_Xray_01 = I raggi X di Kerbol si registrano a malapena a questa distanza. Salvi comunque il dataset, come un souvenir.

        //bd_atm, bd_oso
        #GEPscience_TwoStarsDilemma_00 = Esiti sui comandi di puntamento. Quale "sole" è quello giusto oggi? Lo chiedi al Controllo Missione, poi guardi il timer delle comunicazioni salire.
        #GEPscience_TwoStarsDilemma_01 = Due soli, un telescopio e una finestra di osservazione stretta. Il Controllo Missione promette una risposta "il prima possibile", che potrebbe voler dire ore. Abbastanza perché l'occasione se ne vada in silenzio senza di te.
    }
}

