@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
	%RESULTS
	{
        KerbinSrfLandedMidlands* = #ScienceRefactor_bd_camera_KerbinSrfLandedGrasslands_00 // Large rolling fields of long grass with very few trees create a pastoral image you couldn't pass up.
        KerbinSrfLandedAridHighlands* = #ScienceRefactor_bd_camera_KerbinSrfLandedBadlands_00 // The striation of colors in layered landscapes of the badlands create vivid images at sunset.
        KerbinSrfLandedAridMidlands* = #ScienceRefactor_bd_camera_KerbinSrfLandedDeserts_00 // The rolling dunes, the vast plains of sand broken only by an occasional oasis and the lighting conditions make you feel like Kansel Kadams.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_camera_KerbinInSpaceLowGrasslands_00 // The grasslands make up most of Kerbin’s surface, and where most Kerbals live. The surface is covered by farms and the occasional city.
        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_camera_KerbinInSpaceLowDesert_00 // The sands look flat compared to the rest of Kerbin’s terrain. There are some strange circles on the surface, which command tells you are farms.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_camera_KerbinInSpaceLowBadlands_00 // The surface looks rocky and difficult to navigate. You confirm the badlands are in fact bad.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_camera_KerbinInSpaceLowNorthernIceShelf_00 // Public Outreach tells the public you spotted the Gift Kracken, but you didn’t really.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_camera_KerbinInSpaceLowSouthernIceShelf_00 // There isn’t much here but a flat sheet of ice.
        
        MunSrfLandedExoticCraters* = #ScienceRefactor_bd_camera_MunSrfLandedEastFarsideCrater_00 // Imaging data from this "smaller" impact has proven just as important as that from the large craters around the Mun.
        MunSrfLandedExoticCraters* = #ScienceRefactor_bd_camera_MunSrfLandedFarsideCrater_00 // A favorite landing site of many, photographic evidence helps to reveal this crater to be one of the oldest on the surface.
        MunSrfLandedRareCraters* = #ScienceRefactor_bd_camera_MunSrfLandedNorthwestCrater_00 // This enormous impact region was formed during the earliest days of the Mun's formation which imaging data will help understand.
        MunSrfLandedVoronoiCraters* = #ScienceRefactor_bd_camera_MunSrfLandedHighlandCraters_00 // These small impact craters are younger and therefore photographic data helps to answer many questions about the different impact eras of the Mun.
        MunSrfLandedVoronoiCraters* = #ScienceRefactor_bd_camera_MunSrfLandedMidlandCraters_00 // As with other smaller impact regions, the midland craters are shown through photo evidence to be younger than other impact areas around the Mun.
        MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowFarsideCrater_00 // You reflect on how you’re the first kerbal to see this part of the Mun.
        MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowEastFarsideCrater_00 // The crater is nicely framed by Kerbin rising over the horizon.
        MunInSpaceLowNotableCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowEastCrater_00 // One of the most prominent landmarks on the Mun when viewed from the surface of Kerbin, Kerbals have spent millennia guessing what might have created it.
        MunInSpaceLowNotableCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowTwinCraters_00 // Despite their similarity, these craters may have been created millions of years apart
        MunInSpaceLowPolarIceCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowPolarCrater_00 // Unlike the rest of the Mun’s craters, this one is far from the equator.
        MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowMidlandCraters_00 // You wonder how big of an asteroid is needed to make craters this wide, before realizing there are far larger craters on the Mun.
        MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_camera_MunInSpaceLowHighlandCraters_00 // Some of these craters look to be far older than the ones in the Mun’s midlands
        
        MinmusSrfLandedMountains* = #ScienceRefactor_bd_camera_MinmusSrfLandedSlopes_00 // The highly irregular slopes of Minmus have often been observed in photos as appearing to be "scoops of ice cream" on the surface.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_camera_MinmusSrfLandedFlats_00 // It's flat, punctuated by a sharp increase in altitude around the perimeter. Images help to show just how nearly perfectly level this region really is.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_camera_MinmusSrfLandedLesserFlats_00 // These smaller flat regions appear regularly around the moon and likely were small lakes at some point. Photos taken in this region are surrounded on all sides by large hills forming the slopes and higher regions of Minmus.
        
        MohoSrfLandedCraters* = #ScienceRefactor_bd_camera_MohoSrfLandedMinorCraters_00 // These various small craters are numerous on the surface of Moho and photos within them are helping to answer some of the questions about it's geologically active periods.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_camera_MohoSrfLandedCentralLowlands_00 // The lowland regions of the planet are home to numerous small craters and dune like rock formations shown repeatedly in pictures of these regions.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_camera_MohoSrfLandedWesternLowlands_00 // Similar to the other lowland regions of the planet, evidence of volcanism and repeated impacts show up regularly in image data.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_camera_MohoSrfLandedSouthEasternLowlands_00 // Further study of the various lowland regions in image data will all help to identify the causes of Moho's volcanic past and will help in the study of tidal erosion caused by the sun.
        
        DunaSrfLandedIceCaps* = #ScienceRefactor_bd_camera_DunaSrfLandedPoles_00 // The ice covered poles of Duna shine brightly in pictures and details of the broken glacier fields become readily apparent.
        
        IkeSrfLandedPoles* = #ScienceRefactor_bd_camera_IkeSrfLandedPolarLowlands_00 // The polar lowlands are one of the few fairly level regions of Ike's surface. It is unknown whether this is formerly an impact crater or simply a surface feature and photos do not help to determine the answer to this nagging question.
        
        DresSrfLandedCanyon* = #ScienceRefactor_bd_camera_DresSrfLandedCanyons_00 // The canyons of Dres have some of the steepest and tallest walls you have seen yet. Photos of the region are difficult to analyze because these zones are in nearly constant shadow from the cliff sides.
        
        LaytheSrfLandedShores* = #ScienceRefactor_bd_camera_LaytheSrfLandedDunes_00 // Sand is entering every nook and cranny!
        LaytheSrfLandedIceCaps* = #ScienceRefactor_bd_camera_LaytheSrfLandedPoles_00 // Massive ice shelfs are only broken by the aurora borealis... The view is amazing
        
        BopSrfLandedMidlands* = #ScienceRefactor_bd_camera_BopSrfLandedSlopes_00 // Somebody has spilled coffee over the photo. Rendering it illegible.
        BopSrfLandedHighlands* = #ScienceRefactor_bd_camera_BopSrfLandedRidges_00 // The surface of this place seems to be a different kind of soil than elsewhere on Bop, which implies that Bop was an acive planet in the past... or someone just dumping dirt over here.
        BopSrfLandedLowlands* = #ScienceRefactor_bd_camera_BopSrfLandedValley_00 // The brownish brown over here looks the same brown as the brownish brown over there.
        BopSrfLandedMountains* = #ScienceRefactor_bd_camera_BopSrfLandedPeaks_00 // The view is definitely a dark one.
        
        EelooSrfLandedCanyon* = #ScienceRefactor_bd_camera_EelooSrfLandedIceCanyons_00 // Looks to be a pretty dangerous environment over here.
    }
}