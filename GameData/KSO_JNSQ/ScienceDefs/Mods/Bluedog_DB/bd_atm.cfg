@EXPERIMENT_DEFINITION:HAS[#id[bd_atm]]
{
    %RESULTS
    {
        EveInSpaceLow* = #JNSQscience_bd_atm_EveInSpaceLow_00 // Eve’s clouds throw purple glare into the optics; flare monitoring still works, but every “quiet Sun” looks suspiciously tinted.
        EveInSpaceHigh* = #JNSQscience_bd_atm_EveInSpaceHigh_00 // From high above Eve, the telescope gets a cleaner view—until the planet’s limb turns into a giant purple light shield.
        MunInSpaceLow* = #JNSQscience_bd_atm_MunInSpaceLow_00 // Low Munar orbit means constant crater-glare in the sensors; the flare watch stays on, and so does the dust cover.
        MunInSpaceHigh* = #JNSQscience_bd_atm_MunInSpaceHigh_00 // Farther out, the Sun sits steady in the mount—no atmosphere, no mercy, and a very urgent need for shutters.
        MinmusInSpaceLow* = #JNSQscience_bd_atm_MinmusInSpaceLow_00 // Minmus keeps reflecting into the readings; the flare monitor insists the Sun is fine, it’s just getting “extra bright” from below.
        MinmusInSpaceHigh* = #JNSQscience_bd_atm_MinmusInSpaceHigh_00 // High over Minmus, the instrument logs the Sun calmly while the icy moon below reflects enough light to make the engineers squint.
        IkeInSpaceLow* = #JNSQscience_bd_atm_IkeInSpaceLow_00 // Sunwatch duty over Ike is mostly “keep the shutters ready” while Duna’s rusty glare tries to photobomb every exposure.
        IkeInSpaceHigh* = #JNSQscience_bd_atm_IkeInSpaceHigh_00 // From high above Ike, the Sun looks calm and far away; the telescope spends the extra resolution checking Duna’s storms for their own strange brightness.
        EdnaInSpaceLow* = #JNSQscience_bd_atm_EdnaInSpaceLow_00 // Near Edna, the Sun looks small and sharp; the optics appreciate the darkness, even if everything else keeps trying to freeze solid.
        EdnaInSpaceHigh* = #JNSQscience_bd_atm_EdnaInSpaceHigh_00 // From high above Edna, the flare monitor logs long, quiet stretches—punctuated by brief, neat dimmings as something drifts through the line of sight.
        DakInSpaceLow* = #JNSQscience_bd_atm_DakInSpaceLow_00 // Dak’s lumpy little gravity makes pointing “interesting”; the Sun keeps slipping behind the instrument’s own baffles like it’s playing peekaboo.
        DakInSpaceHigh* = #JNSQscience_bd_atm_DakInSpaceHigh_00 // With Dak reduced to a tiny speck below, tracking finally settles down, leaving you alone with a distant Sun and a lot of very empty sky.
        DresInSpaceLow* = #JNSQscience_bd_atm_DresInSpaceLow_00 // Dres throws a pale wash of reflected light into the sensors; the telescope insists the Sun is steady, but your eyes disagree.
        DresInSpaceHigh* = #JNSQscience_bd_atm_DresInSpaceHigh_00 // High over Dres, the instrument records a calm solar profile while the background stays unnervingly clean—almost like the universe is holding its breath.
        LindorInSpaceLow* = #JNSQscience_bd_atm_LindorInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the optics linger on Lindor’s broad bands and faint glows, trying to decide if the planet is made of weather or secrets.
        LindorInSpaceHigh* = #JNSQscience_bd_atm_LindorInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the telescope turns into a system surveyor, tracing moon orbits and thin contrasts in Lindor’s cold, towering cloud tops.
        KrelInSpaceLow* = #JNSQscience_bd_atm_KrelInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, you zoom in on Krel’s pale, strained-looking surface: fine cracks and ridges arranged like the moon is being gently pulled apart.
        KrelInSpaceHigh* = #JNSQscience_bd_atm_KrelInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, Krel becomes a bright fleck against Lindor’s bulk, and the instrument dutifully logs each sharp eclipse as if it were a heartbeat.
        AdenInSpaceLow* = #JNSQscience_bd_atm_AdenInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, Aden’s brown terrain resolves into dust, blocks, and shadowy hollows that look like they were carved with impatience.
        AdenInSpaceHigh* = #JNSQscience_bd_atm_AdenInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, you watch Aden drift through Lindor’s reflected light, its entire world alternating between “dim” and “very dim.”
        HuygenInSpaceLow* = #JNSQscience_bd_atm_HuygenInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the telescope studies Huygen’s amber haze, where sunlight fades into a soft smear long before it reaches anything solid.
        HuygenInSpaceHigh* = #JNSQscience_bd_atm_HuygenInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, Huygen’s glow is obvious even from afar: an atmospheric shell that keeps its surface politely out of the conversation.
        RigaInSpaceLow* = #JNSQscience_bd_atm_RigaInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, Riga’s big, brown face fills the view; some patterns look oddly familiar until you remember you’re very far from home.
        RigaInSpaceHigh* = #JNSQscience_bd_atm_RigaInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the telescope makes careful global passes, stitching together a map of Riga that feels like a deliberate imitation, minus all the comfortable parts.
        TalosInSpaceLow* = #JNSQscience_bd_atm_TalosInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, Talos shows stark relief and long shadows; every crater edge looks too crisp, like the world is trying to stay unreadable.
        TalosInSpaceHigh* = #JNSQscience_bd_atm_TalosInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, Talos is a lonely point near Lindor, and the instrument quietly logs how much empty sky there is between everything important.
        CelesInSpaceLow* = #JNSQscience_bd_atm_CelesInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the mount becomes a very expensive zoom lens for Eeloo and Celes’ stark terrain.
        CelesInSpaceHigh* = #JNSQscience_bd_atm_CelesInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, you use the steady platform to take careful mosaics of the Eeloo system against an unnervingly black sky.
        TamInSpaceLow* = #JNSQscience_bd_atm_TamInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the telescope tracks Tam’s irregular spin and hunts for faint debris that might be tagging along.
        TamInSpaceHigh* = #JNSQscience_bd_atm_TamInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, Tam stops being a dot and becomes a problem with edges, shadows, and a suspicious number of sharp angles.
        HamekInSpaceLow* = #JNSQscience_bd_atm_HamekInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the optics study Hamek’s odd redness and look for anything thin or hazy that shouldn’t be there.
        HamekInSpaceHigh* = #JNSQscience_bd_atm_HamekInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the “solar” telescope quietly catalogs the darkness around Hamek, and how much of it seems to be missing.
        NaraInSpaceLow* = #JNSQscience_bd_atm_NaraInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the optics study Nara’s cold, heavy haze and the faint, shifting bands that pass for “weather” out here.
        NaraInSpaceHigh* = #JNSQscience_bd_atm_NaraInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the telescope becomes a system scout, timing distant eclipses and watching Nara’s clouds rearrange themselves without explanation.
        AmosInSpaceLow* = #JNSQscience_bd_atm_AmosInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, you map Amos’ dark surface. Every shadow looks deeper than it should, and the bright spots feel accidental.
        AmosInSpaceHigh* = #JNSQscience_bd_atm_AmosInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, Amos becomes a calibration target: a small, stubborn disk against a lot of empty sky.
        EnonInSpaceLow* = #JNSQscience_bd_atm_EnonInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, Enon’s bright ice floods the sensors; you end up photographing cracks, glare, and the edge where “white” stops being a useful number.
        EnonInSpaceHigh* = #JNSQscience_bd_atm_EnonInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the telescope takes long exposures around Enon, hoping to catch faint dust, faint debris, or anything else that might be keeping it company.
        PraxInSpaceLow* = #JNSQscience_bd_atm_PraxInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the optics sweep Prax’s ridges and flats, assembling a careful map of a world that looks like an afterthought with sharp corners.
        PraxInSpaceHigh* = #JNSQscience_bd_atm_PraxInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, you use Prax as a pointer scanning nearby space for strays, because every big system out here seems to have extras.
    }
}
