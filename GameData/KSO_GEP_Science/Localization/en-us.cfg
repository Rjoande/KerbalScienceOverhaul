        #GEPscience_bd_orbitalScope_CaireenInSpaceLowPoles_00 = The poles show bright flecks and dark voids with no polite transition between them. Your final mosaic looks like a caution sign that learned geology.

        #GEPscience_bd_orbitalScope_SironaInSpaceHigh_00 = Sirona’s rings cut thin, bright arcs across the dark like someone scratched a compass line into space. The exposure meter oscillates between “beautiful” and “are you sure.”
        #GEPscience_bd_orbitalScope_SironaInSpaceHigh_01 = The wide-angle mosaic catches the rings as a faint, glittering halo, offset by the red sun’s tired glow. You send the frames home and imagine the map team watching them load, one shimmering strip at a time.
        #GEPscience_bd_orbitalScope_SironaInSpaceHigh_02 = From high orbit, Sirona is a striped marble under a dim red sun, and the “surface” never holds still for your map grid. The downlink delay makes the planet feel like it’s happening somewhere else.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkTropicalBands_00 = The dark tropical bands swallow contrast and hide details like they’re shy. Frame-to-frame drift turns your careful overlap plan into an interpretive art piece.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowLightTropicalBands_00 = The light tropical bands overexpose just enough to erase fine structure, then bring it back in the next pass. Your stitching software files a complaint and requests a calmer atmosphere.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkTemperateBands_00 = Subtle ripples in the dark temperate bands break into new patterns between orbits. You tag the mosaics “dynamic,” which is the polite term for “uncooperative.”
        #GEPscience_bd_orbitalScope_SironaInSpaceLowLightTemperateBands_00 = The lighter temperate bands show shear lines sharp enough to use as map edges—until they slide sideways while you’re still photographing them. Sirona refuses to pose.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkPolarBands_00 = The dark polar bands are noisy and low-contrast, like the camera is peering into a deep well. You add more passes and accept that “north” is a suggestion here.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowLightPolarBands_00 = The light polar bands bloom with glare at the limb, then vanish into haze. You bracket exposures and still end up with “bright” in multiple incompatible ways.

        #GEPscience_bd_orbitalScope_AirmedInSpaceHigh_00 = From high orbit, Airmed looks almost welcoming, until the red sun turns every highlight unfamiliar. The map preview arrives late enough that you’ve already flown past your own first impressions.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowTropicalLowlands_00 = The tropical lowlands form broad, readable shapes that stitch cleanly—right up until long shadows shift and redraw the boundaries. You log “repeat pass” and wait out the comms lag.
