@EXPERIMENT_DEFINITION:HAS[#id[bd_hydrometer]]
{
    %RESULTS
    {
        SunFlyingHigh* = #JNSQscience_bd_hydrometer_SunFlyingHigh_00 // The hydrometer reports “0% moisture,” then the readout begins to soften around the edges.
		SunFlyingLow* = #JNSQscience_bd_hydrometer_SunFlyingLow_00 // The sensor needle spins, pauses on “YES,” and the instrument politely requests to be moved somewhere less… Sun.
        
        EveSrfSplashed* = #JNSQscience_bd_hydrometer_EveSrfSplashed_00 // The hydrometer confidently reports “100%.” It refuses to elaborate on what, exactly, is being measured.
		EveSrfLandedMountains* = #JNSQscience_bd_hydrometer_EveSrfLandedMountains_00 // Up here the needle finally drops… slightly. Eve still manages to feel damp through a sealed suit.
		EveSrfLandedShores* = #JNSQscience_bd_hydrometer_EveSrfLandedShores_00 // Coastal air loads the sensor with a sticky haze. The readout climbs while the casing starts to “sweat.”
		EveSrfLandedKrakensWell* = #JNSQscience_bd_hydrometer_EveSrfLandedKrakensWell_00 // Humidity pulses in slow waves, like the ground is breathing. Mission Control suggests you don’t name the pattern.

		KerbinSrfLandedAdministration* = #JNSQscience_bd_hydrometer_KerbinSrfLandedAdministration_00 // Hydrometer reads 80% accountants' sweat, 20% coffee vapor. You are handed a form to certify the form.
		KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_hydrometer_KerbinSrfLandedAstronautComplex_00 // The air is a heroic blend of humidity, snack crumbs, and 'training' laundry.
		KerbinSrfLandedCrawlerway* = #JNSQscience_bd_hydrometer_KerbinSrfLandedCrawlerway_00 // Moisture clings to the concrete like it is trying to hitch a ride to orbit. Safety insists the hydrometer wear a helmet.
		KerbinSrfLandedFlagPole* = #JNSQscience_bd_hydrometer_KerbinSrfLandedFlagPole_00 // You measure the air around the flagpole. Security asks why you are 'calibrating national pride' without approval.
		KerbinSrfLandedLaunchPad* = #JNSQscience_bd_hydrometer_KerbinSrfLandedLaunchPad_00 // Readings spike whenever the pad vents anything at all. The pad crew suggests you stop waving the sensor near the loud bits.
		KerbinSrfLandedMissionControl* = #JNSQscience_bd_hydrometer_KerbinSrfLandedMissionControl_00 // Your hydrometer is confiscated for 'operational humidity secrecy'. It is returned with a new sticker and no data.
		KerbinSrfLandedR&D* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&D_00 // The instrument detects water vapor, coolant, and something labeled 'DO NOT'. The scientists nod and close the door politely.
		KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DCentralBuilding_00 // The air is so carefully regulated it feels pre-approved. Your report is routed to three committees for additional drying.
		KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DCornerLab_00 // Humidity changes every time someone says 'just a quick test'. The hydrometer begins to beep in self-defense.
		KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DMainBuilding_00 // Moisture levels correlate strongly with coffee consumption and frantic scribbling. Nobody admits this is a controlled variable.
		KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DObservatory_00 // A thin layer of dew forms on the sensor. The telescope operator reminds you this is not, technically, a weather station.
		KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DSideLab_00 // The hydrometer reports 'mildly damp' and 'highly suspicious'. A lab coat appears to escort you away from the vents.
		KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DSmallLab_00 // Humidity is off the charts for such a tiny room. You are informed the charts are classified and also possibly on fire.
		KerbinSrfLandedR&DTanks* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DTanks_00 // The air tastes like metal, mystery, and regret. The hydrometer politely requests you do not inhale the sample again.
		KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DWindTunnel_00 // The tunnel dries the sensor instantly, then a safety water test soaks it again. The official conclusion is 'it varies'.
		KerbinSrfLandedRunway* = #JNSQscience_bd_hydrometer_KerbinSrfLandedRunway_00 // Jet wash turns your humidity graph into modern art. The ground crew calls it 'normal' and kicks a puddle for emphasis.
		KerbinSrfLandedSPH* = #JNSQscience_bd_hydrometer_KerbinSrfLandedSPH_00 // The hangar air is damp with effort and unspoken design compromises. The hydrometer is told to stop judging the prototypes.
		KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHMainBuilding_00 // Humidity rises near the big doors as sea air sneaks in. Security asks you to submit a door-opening permit retroactively.
		KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHRoundTank_00 // Readings near the round tank are very humid and very 'please do not open'. You decide to trust the warning label.
		KerbinSrfLandedSPHTanks* = #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHTanks_00 // Condensation patterns suggest the tanks are quietly weeping. An engineer denies this and wipes the sensor with a wrench.
		KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHWaterTower_00 // The hydrometer reports 'yes, there is water nearby'. This is filed as a major breakthrough and a minor splash hazard.
		KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationDishEast_00 // Humidity looks normal until you stand under the dish. Then it becomes 'suspiciously monitored'. You wave anyway.
		KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationDishNorth_00 // The dish crew suspects your hydrometer is eavesdropping. You assure them it only listens to dampness.
		KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationDishSouth_00 // As you record humidity, someone in sunglasses records you. Both datasets are promptly redacted.
		KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationHub_00 // Inside the hub, the air is dry, cold, and full of important silence. The hydrometer beeps once, quietly, and stops.
		KerbinSrfLandedVAB* = #JNSQscience_bd_hydrometer_KerbinSrfLandedVAB_00 // Humidity increases with altitude inside this giant building, like the rockets are perspiring. The engineers insist it is 'character'.
		KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_hydrometer_KerbinSrfLandedVABMainBuilding_00 // Moisture levels peak near fresh paint and fresh panic. The safety officer stamps your report 'NOT APPROVED' in triplicate.
		KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_hydrometer_KerbinSrfLandedVABPodMemorial_00 // The air is still and respectfully damp. The hydrometer lowers its tone and records a moment of silence per protocol.
		KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_hydrometer_KerbinSrfLandedVABRoundTank_00 // Humidity is low, but suspicion is high. A guard asks why your sensor keeps pointing at the tank.
		KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_hydrometer_KerbinSrfLandedVABSouthComplex_00 // Welders add steam to the air one enthusiastic spark at a time. Your data is added to the 'things that fog goggles' folder.
		KerbinSrfLandedVABTanks* = #JNSQscience_bd_hydrometer_KerbinSrfLandedVABTanks_00 // The tanks seem to exhale warm, wet air between tests. You note this and are told to stop anthropomorphizing hardware.
		KerbinSrfLandedKSC* = #JNSQscience_bd_hydrometer_KerbinSrfLandedKSC_00 // A broad scan confirms a shocking result: Kerbin has air, and it contains moisture. Public Outreach wants a poster.
		KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_hydrometer_KerbinSrfLandedIslandAirfield_00 // The damp sea breeze makes every reading drift toward 'salty'. The hydrometer immediately develops a rugged, coastal accent.
		KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_hydrometer_KerbinSrfLandedBaikerbanur_00 // Dry air, dusty gusts, and forms with extra stamps. The hydrometer records low humidity and high administrative pressure.
		KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_hydrometer_KerbinSrfLandedBaikerbanurLaunchpad_00 // Coolant vents turn the local air into instant fog and instant rules. You are escorted to the approved humidity zone.
		KerbinSrfLandedWoomerang* = #JNSQscience_bd_hydrometer_KerbinSrfLandedWoomerang_00 // Winds whip moisture around like it is trying to dodge paperwork. The hydrometer spins, shrugs, and logs 'moving target'.

        KerbinSrfSplashed* = #JNSQscience_bd_hydrometer_KerbinSrfSplashed_00 // The hydrometer immediately pegs the meter. The sensor housing starts fogging up from the outside.
        KerbinSrfSplashed* = #JNSQscience_bd_hydrometer_KerbinSrfSplashed_01 // The scanner readouts reveal that you are IN THE WATER!!!!!!!!!
		KerbinSrfLandedMidlands* = #JNSQscience_bd_hydrometer_KerbinSrfLandedMidlands_00 // Moisture levels are pleasantly high. Your visor agrees and begins to mist.
		KerbinSrfLandedLowlands* = #JNSQscience_bd_hydrometer_KerbinSrfLandedLowlands_00 // Warm, heavy air pushes the needle up. Everything feels a little bit squishy.
		KerbinSrfLandedAridLowlands* = #JNSQscience_bd_hydrometer_KerbinSrfLandedAridLowlands_00 // The air is dry, but the instrument still finds a stubborn trace of moisture hiding in the dust.
		KerbinSrfLandedAridMidlands* = #JNSQscience_bd_hydrometer_KerbinSrfLandedAridMidlands_00 // Humidity stays low enough that even your snacks feel extra crunchy.
		KerbinSrfLandedAridHighlands* = #JNSQscience_bd_hydrometer_KerbinSrfLandedAridHighlands_00 // The arid wind strips moisture out of the air faster than you can say “calibrate.”
		KerbinSrfLandedAridMountains* = #JNSQscience_bd_hydrometer_KerbinSrfLandedAridMountains_00 // Thin, dry air and sun-baked rock leave the sensor begging for a sip.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_hydrometer_KerbinSrfLandedWelcomeBackIsland_00 // Readings spike as sea spray and warm island air gang up on the poor sensor at once.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_hydrometer_DunaSrfLandedIceCaps_00 // The hydrometer finally twitches upward. The intake promptly frosts over in protest.
		DunaSrfLandedRareCraters* = #JNSQscience_bd_hydrometer_DunaSrfLandedRareCraters_00 // Shaded crater air holds a faint, stubborn trace of vapor. It’s the closest thing to “damp” you’ve seen here.
		DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_hydrometer_DunaSrfLandedVoronoiCraters_00 // Readings vary in a repeating pattern that matches the terrain. The planet appears to be sorted by dryness.
		DunaSrfLandedNotableCraters* = #JNSQscience_bd_hydrometer_DunaSrfLandedNotableCraters_00 // The deeper air pocket registers slightly higher moisture, as if the crater is hoarding it.
		DunaSrfLandedExoticCraters* = #JNSQscience_bd_hydrometer_DunaSrfLandedExoticCraters_00 // The sensor reports a tiny spike, then zero, then a tiny spike again. You suspect the ground is stealing the moisture between samples.
		DunaSrfLandedTrenches* = #JNSQscience_bd_hydrometer_DunaSrfLandedTrenches_00 // Down in the trench, heavier air lingers a little longer. The hydrometer calls it “marginally less hopeless.”
		DunaSrfLandedNotablePlains* = #JNSQscience_bd_hydrometer_DunaSrfLandedNotablePlains_00 // Dusty winds blast the inlet clean. Moisture readings remain stubbornly close to “none at all.”
		DunaSrfLandedNotableMountains* = #JNSQscience_bd_hydrometer_DunaSrfLandedNotableMountains_00 // The needle drops with altitude until it’s basically a decorative feature. At least the view is dry.
		DunaSrfLandedMountains* = #JNSQscience_bd_hydrometer_DunaSrfLandedMountains_00 // The hydrometer tries to measure humidity, then seems to give up and report “crisp.”
		DunaSrfLandedVolcano* = #JNSQscience_bd_hydrometer_DunaSrfLandedVolcano_00 // Warm vents burp out a brief, measurable haze. The instrument celebrates, then gets dust in its face.

        LaytheSrfSplashed* = #JNSQscience_bd_hydrometer_LaytheSrfSplashed_00 // The hydrometer instantly saturates. Condensation forms so fast the readout looks blurry.
		LaytheSrfLandedShallows* = #JNSQscience_bd_hydrometer_LaytheSrfLandedShallows_00 // Moisture levels stay high even with your boots “technically” on land. The sensor keeps getting sea spray in its intake.
		LaytheSrfLandedHighlands* = #JNSQscience_bd_hydrometer_LaytheSrfLandedHighlands_00 // Cooler air knocks the humidity down a bit, but it still smells like ocean from up here.
		LaytheSrfLandedMountains* = #JNSQscience_bd_hydrometer_LaytheSrfLandedMountains_00 // The needle drops with altitude until fog rolls in and freezes on the intake rim.
		LaytheSrfLandedIceCaps* = #JNSQscience_bd_hydrometer_LaytheSrfLandedIceCaps_00 // Cold air holds little vapor… until a gust arrives and spikes the reading before everything ices over again.
		LaytheSrfLandedEnclosedFaults* = #JNSQscience_bd_hydrometer_LaytheSrfLandedEnclosedFaults_00 // Trapped, damp air pools in the cracks. The hydrometer reports “persistent fog habitat.”
		LaytheSrfLandedLowlands* = #JNSQscience_bd_hydrometer_LaytheSrfLandedLowlands_00 // Warm lowland air pushes the reading upward until the instrument politely requests a towel.
		LaytheSrfLandedMidlands* = #JNSQscience_bd_hydrometer_LaytheSrfLandedMidlands_00 // Moisture sits in a steady middle range. Perfect conditions for growing… something… on your equipment.

		TyloFlyingLow* = #JNSQscience_bd_hydrometer_TyloFlyingLow_00 // The hydrometer mostly reads “none,” but occasionally catches faint condensables in the thin haze near the surface.
		TyloFlyingHigh* = #JNSQscience_bd_hydrometer_TyloFlyingHigh_00 // Any trace vanishes with altitude. The instrument returns a crisp zero and stops trying so hard.
		TyloSrfLandedPoles* = #JNSQscience_bd_hydrometer_TyloSrfLandedPoles_00 // Brief spikes appear when frost sublimates in sunlight. The sensor calls this “weather,” reluctantly.
		TyloSrfLandedMountains* = #JNSQscience_bd_hydrometer_TyloSrfLandedMountains_00 // Thin, cold air and bare rock leave the reading pinned near zero. Even the instrument looks thirsty.
		TyloSrfLandedHighlands* = #JNSQscience_bd_hydrometer_TyloSrfLandedHighlands_00 // The hydrometer detects almost nothing airborne. Any moisture here is already a solid and very proud of it.
		TyloSrfLandedMidlands* = #JNSQscience_bd_hydrometer_TyloSrfLandedMidlands_00 // Readings wobble as dusty gusts hit the inlet. It’s hard to tell if Tylo is dry or just throwing powder at the sensor.
		TyloSrfLandedLowlands* = #JNSQscience_bd_hydrometer_TyloSrfLandedLowlands_00 // Near the ground, a tiny trace appears and disappears with temperature swings, like the surface is breathing out frost.

        LindorFlyingHigh* = #JNSQscience_bd_hydrometer_LindorFlyingHigh_00 // The upper haze is surprisingly “dry.” The sensor still logs trace condensables drifting between the bands.
		LindorFlyingLow* = #JNSQscience_bd_hydrometer_LindorFlyingLow_00 // Pressure and cold overwhelm the intake; the hydrometer reports a thick soup of condensables and refuses to guess whether it’s water or chocolate.

		HuygenFlyingHigh* = #JNSQscience_bd_hydrometer_HuygenFlyingHigh_00 // Moisture drops off sharply with altitude, leaving only a thin, amber haze and a stubborn methane trace.
		HuygenFlyingLow* = #JNSQscience_bd_hydrometer_HuygenFlyingLow_00 // The readout climbs fast in the thick air. Whatever’s “humid” here is definitely not the kind that rusts.
		HuygenSrfSplashed* = #JNSQscience_bd_hydrometer_HuygenSrfSplashed_00 // The hydrometer saturates instantly. It helpfully confirms you are, in fact, inside a liquid.
		HuygenSrfLandedLowlands* = #JNSQscience_bd_hydrometer_HuygenSrfLandedLowlands_00 // Low, heavy air keeps the sensor steadily high. The haze feels close enough to chew.
		HuygenSrfLandedMidlands* = #JNSQscience_bd_hydrometer_HuygenSrfLandedMidlands_00 // Humidity holds at a stable middle value, as if Huygen is carefully rationing its weather.
		HuygenSrfLandedHighlands* = #JNSQscience_bd_hydrometer_HuygenSrfLandedHighlands_00 // Cooler, thinner air pulls the reading down, but methane still lingers stubbornly near the ground.
		HuygenSrfLandedMountains* = #JNSQscience_bd_hydrometer_HuygenSrfLandedMountains_00 // Altitude wins: the needle drops, then jitters whenever a cold gust dumps fresh condensate.
		HuygenSrfLandedPeaks* = #JNSQscience_bd_hydrometer_HuygenSrfLandedPeaks_00 // The sensor reads low… until a passing veil of haze spikes it for a moment, like a cloud brushing your helmet.
		HuygenSrfLandedPolarLowlands* = #JNSQscience_bd_hydrometer_HuygenSrfLandedPolarLowlands_00 // The air is cold and dense; the hydrometer picks up a faint “wetness” from slow, steady sublimation.
		HuygenSrfLandedPoles* = #JNSQscience_bd_hydrometer_HuygenSrfLandedPoles_00 // The reading barely moves until sunlight hits nearby frost, then the needle jumps in a brief, chilly puff.
		HuygenSrfLandedPolarHighlands* = #JNSQscience_bd_hydrometer_HuygenSrfLandedPolarHighlands_00 // Thin polar air keeps the numbers down, but the instrument still detects an occasional methane-rich wisp.
		HuygenSrfLandedShores* = #JNSQscience_bd_hydrometer_HuygenSrfLandedShores_00 // Coastal haze pushes the measurement higher. The sensor gets sticky films on its inlet almost immediately.
		HuygenSrfLandedMethaneLakes* = #JNSQscience_bd_hydrometer_HuygenSrfLandedMethaneLakes_00 // The hydrometer maxes out and stays there. It’s not sure it’s measuring “humidity” anymore so much as “being near a lake.”

		RigaFlyingHigh* = #JNSQscience_bd_hydrometer_RigaFlyingHigh_00 // The hydrometer reports essentially nothing. Riga’s upper air is more idea than atmosphere.
		RigaFlyingLow* = #JNSQscience_bd_hydrometer_RigaFlyingLow_00 // Near the surface, the needle twitches just above zero, as if embarrassed to admit it found anything at all.
		RigaSrfLandedLowlands* = #JNSQscience_bd_hydrometer_RigaSrfLandedLowlands_00 // The reading sits on the floor with occasional tiny bumps, likely from brief sublimation over sunlit ground.
		RigaSrfLandedMidlands* = #JNSQscience_bd_hydrometer_RigaSrfLandedMidlands_00 // Dry, cold, and thin: the instrument logs a flat line and a lot of electrical noise.
		RigaSrfLandedHighlands* = #JNSQscience_bd_hydrometer_RigaSrfLandedHighlands_00 // Higher terrain drives the last traces away; the hydrometer declares the air “functionally empty.”
		RigaSrfLandedMountains* = #JNSQscience_bd_hydrometer_RigaSrfLandedMountains_00 // The sensor stays pinned at zero, but the intake frosts anyway—apparently solids don’t need permission.
		RigaSrfLandedPoles* = #JNSQscience_bd_hydrometer_RigaSrfLandedPoles_00 // A faint, repeatable puff appears with each lighting change. Riga is breathing, just very quietly.

        EelooFlyingLow* = #JNSQscience_bd_hydrometer_EelooFlyingLow_00 // The hydrometer registers a faint, fickle trace—mostly from whatever you just kicked into the air.
		EelooFlyingHigh* = #JNSQscience_bd_hydrometer_EelooFlyingHigh_00 // The readout stays pinned at “almost nothing.” The instrument seems offended you even asked.
		EelooSrfLanded* = #JNSQscience_bd_hydrometer_EelooSrfLanded_00 // Any “moisture” here is doing an excellent job of staying solid.
		EelooSrfLandedPoles* = #JNSQscience_bd_hydrometer_EelooSrfLandedPoles_00 // The sensor reports values so low they feel more like a personal judgement.
		EelooSrfLandedHighlands* = #JNSQscience_bd_hydrometer_EelooSrfLandedHighlands_00 // Thin air, hard ice, and a needle that refuses to rise.
		EelooSrfLandedMidlands* = #JNSQscience_bd_hydrometer_EelooSrfLandedMidlands_00 // A brief blip appears when sunlight warms the frost, then vanishes again.
		EelooSrfLandedLowlands* = #JNSQscience_bd_hydrometer_EelooSrfLandedLowlands_00 // The reading climbs slightly in the sheltered air, like the lowlands are hoarding the last few molecules.
		EelooSrfLandedCanyon* = #JNSQscience_bd_hydrometer_EelooSrfLandedCanyon_00 // You stir up a pale, icy haze and the hydrometer finally looks busy for a moment.

		NaraFlyingLow* = #JNSQscience_bd_hydrometer_NaraFlyingLow_00 // The sensor saturates on “condensables” and then seems unsure what the word “humidity” means anymore.
		NaraFlyingHigh* = #JNSQscience_bd_hydrometer_NaraFlyingHigh_00 // Up here the reading drops off sharply; the haze thins, but never quite goes away.
		NaraSrfLanded* = #JNSQscience_bd_hydrometer_NaraSrfLanded_00 // The instrument insists the air is full of something that wants to condense. It does not specify what.
		NaraSrfLandedLowlands* = #JNSQscience_bd_hydrometer_NaraSrfLandedLowlands_00 // Dense lowland air keeps the needle high and steady, like the atmosphere is pooling on the ground.
		NaraSrfLandedMidlands* = #JNSQscience_bd_hydrometer_NaraSrfLandedMidlands_00 // Readings hover in a stable band, as if Nara is carefully metering out its weather.
		NaraSrfLandedHighlands* = #JNSQscience_bd_hydrometer_NaraSrfLandedHighlands_00 // Cooler, thinner air pulls the numbers down, but the sensor still catches drifting misty traces.
		NaraSrfLandedMountains* = #JNSQscience_bd_hydrometer_NaraSrfLandedMountains_00 // The hydrometer jitters with every gust, then settles on a stubborn “still not dry.”
		NaraSrfLandedPolarLowlands* = #JNSQscience_bd_hydrometer_NaraSrfLandedPolarLowlands_00 // Cold, heavy air produces periodic spikes as frost breathes off the surface.
		NaraSrfLandedPoles* = #JNSQscience_bd_hydrometer_NaraSrfLandedPoles_00 // Condensation happens so readily the intake gets a thin crust. The instrument calls this “sample collection.”
		NaraSrfLandedPolarHighlands* = #JNSQscience_bd_hydrometer_NaraSrfLandedPolarHighlands_00 // Thin polar air keeps the reading low—until a veil of haze sweeps past and bumps it right back up.
    }
}