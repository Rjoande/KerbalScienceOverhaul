        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_18 // The Goo violently shakes in the container. It doesn't seem to be liking the extreme heat one bit.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_19 // In an attempt to cool itself down, the Goo has expanded to fill the container.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_20 // The Goo is evaporating quite quickly.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_21 // Oh great! the Goo has evaporated.
        SunInSpaceHigh* = #CSS_mysteryGoo_SunInSpaceHigh_00 // The Goo looks like a rainbow.
        SunInSpaceHigh* = #CSS_mysteryGoo_SunInSpaceHigh_01 // The Goo has made an official request for overtime pay.
        SunInSpaceHigh* = #CSS_mysteryGoo_SunInSpaceHigh_02 // You aren't sure if the Goo is tanning or not.
        SunInSpaceHigh* = #CSS_mysteryGoo_SunInSpaceHigh_03 // The Goo moves in bubbles around the container. It's very mesmerizing. You could watch it for hours...
        SunInSpaceHigh* = #CSS_mysteryGoo_SunInSpaceHigh_04 // Out of the corner of your eye you could've sworn the Goo turned into two paddles and a ball, but when you look straight at the monitor, sadly, there is no pong game to pass the endless hours in space.
