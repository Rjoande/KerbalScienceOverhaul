        // --- crewReport ---
        //   Sun
        #CSS_Aebestach_crewReport_SunFlyingLow_01 = Volo basso sopra Sole. Caldo. Caldissimo. Stai imparando cosa significa "arrostito".
        #CSS_Aebestach_crewReport_SunInSpaceLow_01 = Sorvolo ad alta quota del Sole. Sempre caldo. Pensi di richiedere l'indennità di calore.
        //   Dres
        #CSS_Aebestach_crewReport_Dres_01 = Crateri da impatto di Dres. Qualcuno ha colpito la patata.
        //   Tylo
        #CSS_Aebestach_crewReport_Tylo_01 = Pianure di Tylo. Zona grigia su una gigantesca luna grigia.
        #CSS_Aebestach_crewReport_Tylo_02 = Crateri minori di Tylo. Cicatrici da impatto.
        #CSS_Aebestach_crewReport_Tylo_03 = Crateri maggiori di Tylo. Cicatrici più grandi.
        #CSS_Aebestach_crewReport_Tylo_04 = I tre grandi crateri di Tylo. Tycho, Galileo, Grissom e Gagarin ti salutano.
        //   Pol
        #CSS_Aebestach_crewReport_Pol_01 = Pianure di Pol. Zona grigia tra rocce colorate: la variazione di albedo suggerisce una composizione mineralogica diversa. La geologia di Pol sfida ogni classificazione, proprio come i suoi colori.
        //   Eeloo
        #CSS_Aebestach_crewReport_Eeloo_01 = Fragipan di Eeloo. Lembo ghiacciato.
        #CSS_Aebestach_crewReport_Eeloo_02 = Campo di Babbage di Eeloo. Terreno ghiacciato.
        #CSS_Aebestach_crewReport_Eeloo_03 = Ghiacciai australi di Eeloo. Mondo di ghiaccio.
        #CSS_Aebestach_crewReport_Eeloo_04 = Ghiacciaio Mu di Eeloo. Freddo fiume di ghiaccio.

        // --- evaReport ---
