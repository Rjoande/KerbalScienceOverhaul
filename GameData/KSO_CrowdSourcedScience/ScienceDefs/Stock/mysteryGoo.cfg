        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_03 // The Goo is beginning to glow. A lot.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_04 // The Goo bubbles, releasing a noxious gas and whimpering slightly.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_05 // You notice that the Goo has started to glow and has become very radioactive. It would be of best interest to stay away!
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_06 // The Goo seems to have gone all wobbly.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_07 // The Goo is starting to sweat.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_08 // The Goo boils on one side and freezes on the other.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_09 // The Goo explodes.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_10 // The Goo almost burns up as the sun heats the spacecraft.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_11 // The Goo starts to turn red.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_12 // The Goo seems to be very concerned about burning up.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_13 // The Goo morphs into a mesmerizing array of shapes.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_14 // The Goo shrivels up and gives you the evil eye.
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_15 // Say, why's the Goo sizzling?
        SunInSpaceLow* = #CSS_mysteryGoo_SunInSpaceLow_16 // The Goo seems to be dancing from the radiation. The Kerbals back at Mission Control decide to join in.
