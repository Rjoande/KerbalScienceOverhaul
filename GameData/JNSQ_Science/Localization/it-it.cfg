        #JNSQscience_bd_multiSpec_EelooInSpaceLowLowlands_00 = Il terreno basso tende al più scuro e trattiene calore più a lungo fino al crepuscolo locale. Il composito suggerisce regolite fine e sporca raccolta nei bacini.
        #JNSQscience_bd_multiSpec_EelooInSpaceLowCanyon_00 = Le pareti del canyon si dividono in strisce spettrali distinte, come pagine esposte di un libro di ghiaccio. L'infrarosso delinea una spina fredda che attraversa il taglio.
        #JNSQscience_bd_multiSpec_CelesInSpaceHigh_00 = Da un'orbita alta, Celes è una scheggia pallida con una curva di riflettanza sorprendentemente netta. Sembra piccolo, semplice e silenziosamente sbagliato in falsi colori.
