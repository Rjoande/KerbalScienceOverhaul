        #GEPscience_bd_camera_CernunnosSrfLandedTemperateLowlands_00 = Una ripresa di terreno pianeggiante arriva nitida e senza colore, tranne la tinta rossa del sole. Il cervello continua a provare a inserire dei blu familiari.
        #GEPscience_bd_camera_CernunnosSrfLandedTropicalMidlands_00 = Le pianure mostrano creste stratificate e bacini poco profondi in ombre lunghe e nette. La camera lo fa sembrare tardo pomeriggio ovunque.
        #GEPscience_bd_camera_CernunnosSrfLandedTemperateMidlands_00 = Scatti un ampio panorama e l'orizzonte sembra troppo pulito, troppo vuoto. Il ritardo del downlink aggiunge un ulteriore strato di quiete.
        #GEPscience_bd_camera_CernunnosSrfLandedHighlands_00 = Le colline si alzano come spine scure contro un cielo macchiato di stelle. Inquadri con cura, perché non vuoi sprecare nemmeno un attimo di questa distanza.
        #GEPscience_bd_camera_CernunnosSrfLandedSouthPolarHills_00 = Le colline polari meridionali si fotografano come creste chiare con ombre assottigliate, lunghe. Sembra che il sole stia scivolando di lato apposta.
        #GEPscience_bd_camera_CernunnosSrfLandedNorthPole_00 = Al polo nord la luce sfiora appena il suolo e si rifiuta di sembrare giorno. La camera la cattura comunque, diligente come sempre.
        #GEPscience_bd_camera_CernunnosInSpaceHigh_00 = Da un'orbita alta, Cernunnos è un mondo piccolo e severo sotto un debole sole rosso. La foto sembra una cartolina spedita da molto lontano.
        #GEPscience_bd_camera_CernunnosInSpaceLowTropicalLowlands_00 = L'orbita bassa mostra i bassopiani tropicali come ampie zone dai toni smorzati con leggere striature. La etichetti "striscia di rilievo" e "ancora non a casa".
        #GEPscience_bd_camera_CernunnosInSpaceLowTemperateLowlands_00 = I bassopiani temperati sembrano lisci finché non zoomi e trovi una punteggiatura di piccole cicatrici. La camera consegna dettagli, la tua tabella di marcia consegna ritardi.
        #GEPscience_bd_camera_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure proiettano ombre drammatiche che rendono il terreno più tagliente di quanto probabilmente sia. Scatti fotogrammi extra per non lasciare che vinca l'illuminazione.
        #GEPscience_bd_camera_CernunnosInSpaceLowNorthPole_00 = Il polo nord appare come una chiazza pallida avvolta da lunghe ombre. Scatti la foto e senti il silenzio radio prima ancora che accada.

        // bd_cosmicRay
        #GEPscience_bd_cosmicRay_GrannusFlyingLow_00 = Il contatore schizza così in alto che la traccia sembra arte moderna. Il Controllo Missione la vedrà dopo i prossimi minuti-luce passati a litigare con l'antenna.
        #GEPscience_bd_cosmicRay_GrannusFlyingHigh_00 = Anche solo sfiorando quel bagliore rossastro, il rivelatore continua a ripetere: "sì, è tanto". Il sole rosso e fioco non ha alcun interesse per il tuo comfort.
        #GEPscience_bd_cosmicRay_GrannusInSpaceHigh_00 = Lontano dai capricci immediati della stella, il flusso si stabilizza in una pioggerellina solitaria che arriva da ogni direzione. Ti accorgi all'improvviso di quanto sia silenziosa la cabina.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthPolarZone_00 = Un'impennata asimmetrica suggerisce che le particelle vengano incanalate lungo i campi polari. Il chiarore aurorale sotto di te è sottile, come se non volesse farsi notare.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthSubpolarZone_00 = Il rateo oscilla con un ritmo lento che non coincide con alcun ciclo giorno-notte sensato. Lo etichetti "stranezze da sole rosso" per dopo.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthTemperateZone_00 = Lo strumento registra brevi raffiche che arrivano a grumi, non in flussi continui. Ti chiedi quante di quelle particelle siano partite prima che tu nascessi.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthTropicZone_00 = Le energie delle particelle salgono e scendono, come se la stella stesse respirando. Il ritardo radio rende quel respiro fin troppo personale.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowEquatorialZone_00 = Il flusso è alto e stranamente uniforme, come un nastro trasportatore di protoni. È la cosa più "normale" che tu abbia visto quassù, e questo è inquietante.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthTropicZone_00 = Un picco netto coincide con un lieve aumento di luminosità del disco rosso. Lo registri come flare e provi a non sembrare impressionato.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthTemperateZone_00 = I conteggi calano appena, poi risalgono, suggerendo schermature a chiazze nell'ambiente della stella. "A chiazze" non è una parola rassicurante nello spazio.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthSubpolarZone_00 = Il rivelatore registra una spruzzata di nuclei pesanti che rende i grafici spigolosi e costosi. Ti prometti di smettere di volare dentro qualunque cosa fosse.
        #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthPolarZone_00 = Il canale polare si accende di nuovo, come se la stella ti stesse puntando apposta. Valuti di presentare reclamo alla fisica.
        #GEPscience_bd_cosmicRay_TaranisSrfLandedScorchedLowlands_00 = Senza aria dietro cui nascondersi, i raggi cosmici colpiscono il rivelatore come minuscoli colpi di martello. Il terreno cotto brilla appena, e i dati sembrano più caldi dell'orizzonte al sole.
        #GEPscience_bd_cosmicRay_TaranisSrfLandedMidlands_00 = Il rateo è brutale e costante, come il metronomo dell'universo. È difficile capire se sia mezzogiorno, mezzanotte o semplicemente "Taranis".
        #GEPscience_bd_cosmicRay_TaranisSrfLandedHighlands_00 = Il terreno elevato ti dà una vista un po' più libera del cielo e una vista un po' peggiore delle tue probabilità. Il rivelatore è d'accordo e accelera i tic.
        #GEPscience_bd_cosmicRay_TaranisSrfLandedDarkSideMidlands_00 = Il paesaggio freddo e nero non riduce la radiazione, la rende solo più rumorosa. Ogni click ricorda che la "notte" non è uno scudo.
        #GEPscience_bd_cosmicRay_TaranisSrfLandedDarkSideHighlands_00 = Lo strumento registra particelle energetiche con meno rumore termico, producendo una splendida e nitida rovina. Trasmetti la peggiore notizia, misurata nel modo più pulito di sempre.
        #GEPscience_bd_cosmicRay_TaranisSrfLandedPoles_00 = Il flusso cambia con la latitudine, suggerendo linee di campo deboli e riluttanti. Il sole rosso e fioco resta basso sull'orizzonte, come se stesse origliando.
        #GEPscience_bd_cosmicRay_TaranisSrfSplashedMagmaSea_00 = Il rivelatore è tecnicamente operativo, ma tutto il resto sta cercando di diventare una pozzanghera. Ai raggi cosmici non importa che tu sia "ammarrato" nella lava.
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowMagmaSea_00 = Sopra la lucentezza fusa, lo strumento intercetta raffiche che sembrano particelle secondarie provenienti dal basso. Decidi di non chiederti come il "basso" le stia producendo.
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowScorchedLowlands_00 = I conteggi di origine stellare sono intensi e leggermente direzionali, come se la stella stesse lanciando ghiaia. Il lato diurno, illuminato di rosso, sembra incandescente e impaziente.
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowMidlands_00 = Lo spettro mostra un mix duro di ioni leggeri con occasionali colpi pesanti. Etichetti il file "portare più schermatura la prossima volta".
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowHighlands_00 = I valori aumentano sopra le alture, probabilmente per la riduzione delle ombre locali. È bello sapere che nemmeno le rocce possono nasconderti.
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowDarkSideMidlands_00 = Nell'ombra del pianeta, la componente solare cala e prende il sopravvento il fondo galattico. I numeri sono più calmi, ma la sensazione no.
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowDarkSideHighlands_00 = Una pioggerellina lenta e persistente di nuclei ad alta energia arriva dallo spazio profondo. È il tipo di dato che ti ricorda che sei molto, molto lontano.
        #GEPscience_bd_cosmicRay_TaranisInSpaceLowPoles_00 = I passaggi polari mostrano piccoli cali irregolari che suggeriscono una guida magnetica debole. "Debole" è comunque meglio di "assente", supponi.
        #GEPscience_bd_cosmicRay_TaranisInSpaceHigh_00 = Da un'orbita alta, la spaccatura giorno-notte a due facce del pianeta sembra irreale. Il click regolare del rivelatore è l'unica cosa che pare onesta.
        #GEPscience_bd_cosmicRay_ToutatisFlyingLow_00 = L'aria sottile si accorge a malapena delle particelle che la attraversano, e il rivelatore nemmeno. Almeno il ritardo radio ti dà il tempo di pentirti della quota scelta.
        #GEPscience_bd_cosmicRay_ToutatisFlyingHigh_00 = I conteggi aumentano mentre l'atmosfera si assottiglia fino a quasi sparire. Il cielo sfuma verso il nero, anche sotto il sole rosso e fioco.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceHigh_00 = Il flusso si assesta in un mix di sorgenti guidate dalla stella e davvero lontane. Fissi il terminatore del pianeta e realizzi che "casa" non è all'orizzonte.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedSunnyLowlands_00 = La superficie è luminosa e calda, e il rivelatore ticchetta come se applaudisse la radiazione. Annota che "soleggiato" non è la stessa cosa di "sicuro".
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedSunnyHighlands_00 = Il suolo elevato e cotto dal sole aggiunge rumore termico, ma il rateo di particelle emerge comunque. La fisica pretende di essere misurata, anche qui.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedTransitionalLowlands_00 = Vicino alla linea della zona di comfort, l'atmosfera offre il minimo accenno di schermatura. I dati suggeriscono che "minimo accenno" sia un termine tecnico.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedTransitionalHighlands_00 = I conteggi oscillano con la pendenza locale e con l'orizzonte, come se il terreno potesse proiettare un'ombra di radiazione. Non può, ma è carino che tu abbia controllato.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedDarkSideLowlands_00 = Nel buio freddo, i click del rivelatore sembrano fare eco. L'universo continua a tirarti addosso particelle, tu semplicemente le noti di più.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedDarkSideHighlands_00 = Lo spettro mostra meno secondarie a bassa energia e più impatti diretti. Sono dati più puliti, ottenuti con l'illuminazione meno amichevole immaginabile.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedSoutheasternMountains_00 = Le montagne incorniciano una striscia di cielo stretta, ma i raggi cosmici arrivano comunque da ogni direzione. Cominci a sospettare che "ovunque" sia il loro bioma.
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedWesternMountains_00 = Un gruppo di eventi ad alta energia suggerisce un breve scroscio di nuclei pesanti. Lo battezzi "Benvenuto dei Monti Occidentali".
        #GEPscience_bd_cosmicRay_ToutatisSrfLandedDarkSideMountains_00 = Le cime fredde non offrono protezione, solo un contrasto migliore per le stelle. Il rivelatore tiene il tempo mentre tu ti senti molto piccolo.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowSunnyLowlands_00 = Sopra il lato diurno luminoso, domina la componente guidata dalla stella e il rateo si gonfia. Il pianeta sotto sembra arrostire lentamente.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowSunnyHighlands_00 = Il rivelatore intercetta più secondarie, probabilmente innescate dal terreno illuminato. Il grafico schizza in un modo che pare compiaciuto.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowTransitionalLowlands_00 = Il flusso mostra un lieve calo lungo la regione del terminatore, suggerendo una modesta interazione atmosferica. "Modesta" sta facendo un sacco di lavoro in quella frase.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowTransitionalHighlands_00 = Le energie restano alte, ma il rateo complessivo si attenua leggermente mentre segui la fascia crepuscolare. La vista è bellissima in un modo che mette a disagio.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowDarkSideLowlands_00 = Nell'ombra, il contributo solare cala e il fondo galattico diventa evidente. È come abbassare un altoparlante e sentire l'altro.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowDarkSideHighlands_00 = Il rivelatore registra una radiazione dura e costante con modulazione minima. L'emisfero oscuro sembra senza tempo, e i dati sono d'accordo.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowSoutheasternMountains_00 = Un andamento frastagliato dei conteggi suggerisce che la geometria locale stia influenzando le secondarie. Lo archivi sotto "le montagne si creano i loro problemi".
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowWesternMountains_00 = Il rateo sfarfalla mentre passi sopra terreno accidentato e aria sottile. Ti chiedi se il pianeta stia cercando di scrollarsi di dosso le particelle.
        #GEPscience_bd_cosmicRay_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne in ombra producono un segnale più freddo e pulito con lo stesso flusso implacabile. Al rivelatore non importa quale lato sia "su".

        #GEPscience_bd_cosmicRay_NodensSrfLanded_00 = Il contatore di raggi cosmici crepita, anche sotto la fitta atmosfera di Nodens. Il ritardo del collegamento fa sentire casa ancora più lontana.
        #GEPscience_bd_cosmicRay_NodensSrfSplashedSaltySeas_00 = L'acqua salata schiaffeggia lo scafo mentre il rivelatore conta indisturbato attraverso la "schermatura". Gli spruzzi di sale non sono una strategia contro le radiazioni.
        #GEPscience_bd_cosmicRay_NodensSrfSplashedFreshWater_00 = Il lago è calmo, ma il contatore continua a fare clic per via di visitatori lontani e pieni di energia. L'acqua dolce sembra più sicura di quanto misuri.
        #GEPscience_bd_cosmicRay_NodensSrfSplashedShores_00 = Lungo la costa, onde e particelle arrivano in serie regolari. Il cielo sembra familiare—finché non ricordi che è illuminato da un sole rosso e fioco.
        #GEPscience_bd_cosmicRay_NodensFlyingLow_00 = Le nuvole basse brillano di rosso-ruggine al tramonto, e il contatore impenna ogni volta che si diradano. Lo annoti ora, Controllo Missione lo leggerà più tardi.
        #GEPscience_bd_cosmicRay_NodensFlyingHigh_00 = In alto, nell'aria superiore di Nodens, la schermatura svanisce e i numeri salgono. L'orizzonte è troppo curvo, il sole troppo rosso, e i clic troppo sinceri.
        #GEPscience_bd_cosmicRay_NodensInSpaceLowSaltySeas_00 = Il flusso mostra un mix di capricci stellari e raggi davvero antichi. La cabina sembra piccola, lontano da casa.
        #GEPscience_bd_cosmicRay_NodensInSpaceHigh_00 = In alto sopra Nodens, il fondo di raggi cosmici si assesta in un sibilo costante che arriva da ogni direzione. Il sole rosso e fioco è solo un'altra lampada lontana, ormai.
        
        #GEPscience_bd_cosmicRay_BelisamaSrfLanded_00 = Il rivelatore ticchetta senza tregua, mentre Nodens resta appeso sempre nello stesso punto. A queste distanze, la distinzione tra giorno e notte è opzionale.
        #GEPscience_bd_cosmicRay_BelisamaInSpaceLowFlats_00 = In orbita bassa sopra Belisama, i conteggi oscillano mentre la luna e Nodens si scambiano l'ombra. Il sole rosso e fioco ti trova lo stesso.
        #GEPscience_bd_cosmicRay_BelisamaInSpaceHigh_00 = Da un'orbita alta, Belisama e Nodens sembrano bloccati in un muto faccia a faccia. Il ticchettio costante del contatore è l'unica conversazione che arriva sempre in orario.
        
        #GEPscience_bd_cosmicRay_SucellusSrfLanded_00 = Su Sucellus non c'è aria che possa contraddire i dati: il rivelatore conferma che l'universo non è affatto poco popolato.
        #GEPscience_bd_cosmicRay_SucellusInSpaceLow_00 = Radente su Sucellus, le secondarie dalla superficie aggiungono picchi extra allo spettro. L'estrazione può aspettare, la schermatura no.
        #GEPscience_bd_cosmicRay_SucellusInSpaceHigh_00 = In alto sopra Sucellus, le letture si smussano in una pioggerellina fredda e costante. Sembra che lo spazio stesso stia facendo controllo qualità.
        
        #GEPscience_bd_cosmicRay_CaireenSrfLanded_00 = La gravità debole di Caireen rende facile l'installazione, ma i raggi cosmici rendono più difficile restare. Il sole rosso e fioco dà a tutto una tinta preoccupata.
        #GEPscience_bd_cosmicRay_CaireenInSpaceLow_00 = In orbita bassa su Caireen il tasso sfarfalla mentre la luna bitorzoluta ora blocca ora rivela il cielo. È l'unico "meteo" qui.
        #GEPscience_bd_cosmicRay_CaireenInSpaceHigh_00 = Da un'orbita alta, Caireen è solo un sassolino catturato che fa da scorta a Sucellus. Il rivelatore non è d'accordo, contando particelle come se fosse un bersaglio.
        
        #GEPscience_bd_cosmicRay_SironaFlyingLow_00 = L'atmosfera attutisce alcune particelle, ma non abbastanza da rilassarti. Il rivelatore continua a contare come se nulla fosse strano, qui.
        #GEPscience_bd_cosmicRay_SironaFlyingHigh_00 = In alto nell'aria superiore, la schermatura cala e i numeri salgono. L'orizzonte curva troppo e il ritardo radio si allunga troppo.
        #GEPscience_bd_cosmicRay_SironaInSpaceHigh_00 = In alto sopra Sirona, la lettura diventa un sibilo quieto che arriva da ogni direzione. È il tipo di costanza più solitario.
        
        #GEPscience_bd_cosmicRay_AirmedInSpaceHigh_00 = Da un'orbita alta, il fondo dei raggi cosmici si stabilizza e il sole rosso si riduce a un puntino cupo. Il ritardo nelle comunicazioni resta enorme.
        
        #GEPscience_bd_cosmicRay_BorvoFlyingLow_00 = In basso nella foschia, il contatore gracchia ogni volta che le nubi si assottigliano. Il cielo rosso sembra poco familiare, anche quando prova a essere "bello".
        #GEPscience_bd_cosmicRay_BorvoFlyingHigh_00 = Quasi al limite dell'atmosfera, riesci quasi a vedere lo spazio—e a quanto pare è pieno di visitatori energetici.
        #GEPscience_bd_cosmicRay_BorvoInSpaceHigh_00 = In alto sopra Borvo, la lettura diventa un sibilo quieto che arriva da ogni direzione. È il tipo di costanza più solitario.
                
        #GEPscience_bd_cosmicRay_DamonaInSpaceHigh_00 = Da un'orbita alta, il fondo dei raggi cosmici si stabilizza e il sole rosso si riduce a un puntino cupo. Il ritardo nelle comunicazioni resta enorme.
        
        #GEPscience_bd_cosmicRay_EponaFlyingHigh_00 = In alto, nell'alta atmosfera di Epona, la protezione svanisce e il tasso aumenta. Il cielo si scurisce in fretta sotto un sole rosso e fioco.
        #GEPscience_bd_cosmicRay_EponaFlyingLow_00 = In basso, nell'aria rossastra di Epona, il contatore gracchia ogni volta che la schermatura si assottiglia. Ogni picco arriva dopo una lunga pausa radio.
        #GEPscience_bd_cosmicRay_EponaInSpaceHigh_00 = In alto sopra Epona, il fondo dei raggi cosmici si stabilizza in un sibilo freddo che arriva da ogni direzione. Il sole rosso è un puntino cupo e il ritardo sembra enorme.
        #GEPscience_bd_cosmicRay_EponaInSpaceLow_00 = I conteggi aumentano quando il bordo sottile lascia "aprire" il cielo. Il sole rosso e fioco aggiunge un bordo tagliente al grafico.
        #GEPscience_bd_cosmicRay_EponaInSpaceLow_01 = L'atmosfera assorbe le particelle deboli, ma quelle più energetiche passano lo stesso. La telemetria arriva tardi, come sempre quassù.
        #GEPscience_bd_cosmicRay_EponaSrfLanded_00 = Il contatore ticchetta nell'aria fredda di azoto. Il sole rosso e fioco e il campo debole rendono i numeri… personali.
        #GEPscience_bd_cosmicRay_EponaSrfLandedCraters_00 = Nei crateri, i secondari dalle pareti aggiungono picchi extra allo spettro. Il segnale di ritorno si prende il suo tempo.
        #GEPscience_bd_cosmicRay_EponaSrfLandedGrandPeaks_00 = Sulle grandi vette, il rivelatore gira in modo nitido e implacabile. Il campo debole di Epona oppone solo una resistenza cortese.
        #GEPscience_bd_cosmicRay_EponaSrfLandedPoles_00 = Ai poli, giorno e notte si confondono sotto un sole rosso e fioco. Il contatore si rifiuta di confondersi con loro.
        #GEPscience_bd_cosmicRay_EponaSrfLandedVolcanoes_00 = Vicino ai vulcani, sfiati caldi incontrano aria fredda, il contatore ticchetta comunque. Il campo debole di Epona non è un granché come scudo.
        
        #GEPscience_bd_cosmicRay_RosmertaInSpaceHigh_00 = In alto sopra Rosmerta, i clic si assestano in una pioggerellina costante dal profondo spazio. La luna sembra abbastanza sola da essere d'accordo coi dati.
        #GEPscience_bd_cosmicRay_RosmertaInSpaceLowHighlands_00 = Radente sugli altopiani di Rosmerta, il contatore quasi non si ferma mai. Il sole rosso è piccolo, la radiazione no.
        #GEPscience_bd_cosmicRay_RosmertaInSpaceLow_00 = Il rivelatore mappa una pioggerellina non filtrata di particelle ad alta energia. Il silenzio tra un check-in e l'altro sembra più lungo.
        #GEPscience_bd_cosmicRay_RosmertaSrfLanded_00 = Il contatore registra impatti non filtrati da ogni direzione. Niente aria, niente campo, niente discussioni.
        
        #GEPscience_bd_cosmicRay_RAB-58EInSpaceHigh_00 = In alto sopra RAB-58E, i conteggi si smussano in una solitaria pioggerellina extrasolare. Lo strumento continua a lavorare, i tuoi nervi ci provano.
        #GEPscience_bd_cosmicRay_RAB-58EInSpaceLow_00 = Alcune raffiche suggeriscono secondari dalla superficie. Non è chiaro cosa sia RAB-58E, ma sta collaborando.
        #GEPscience_bd_cosmicRay_RAB-58EInSpaceLow_01 = Radente sopra gli altopiani occidentali, alcune raffiche suggeriscono secondari dalla superficie. Non è chiaro cosa sia RAB-58E, ma sta collaborando.
        #GEPscience_bd_cosmicRay_RAB-58ESrfLandedLowlands_00 = Nei bassopiani, il rivelatore ticchetta regolare in gravità quasi zero. Qualunque cosa sia questo planetesimo, non ti sta schermando.
        #GEPscience_bd_cosmicRay_RAB-58ESrfLandedHighlands_00 = Appollaiato sugli altopiani, impatti pesanti centrano in pieno lo schermo. Il suolo sembra calmo, il cielo no.
        
        #GEPscience_bd_cosmicRay_CernunnosInSpaceHigh_00 = In alto sopra Cernunnos, il display diventa costante e freddo, come se il profondo spazio stesse facendo burocrazia. Ti manca avere qualcosa "vicino".
        #GEPscience_bd_cosmicRay_CernunnosInSpaceLow_00 = Il display resta stranamente calmo per un mondo senza aria, poi impennna di colpo. Qui la calma è temporanea.
        #GEPscience_bd_cosmicRay_CernunnosInSpaceLow_01 = Lunghi tratti lisci si interrompono con rari nuclei pesanti. Il sole rosso e fioco non migliora la schermatura.
        #GEPscience_bd_cosmicRay_CernunnosSrfLanded_00 = Il contatore segnala una pioggia sottile e implacabile dal profondo spazio. Quassù, il "fondo" è di compagnia.
        #GEPscience_bd_cosmicRay_CernunnosSrfLanded_01 = Qui il tasso resta modesto, poi impennna senza preavviso. "Modesto" sta facendo parecchio lavoro.
        #GEPscience_bd_cosmicRay_CernunnosSrfLanded_02 = Lunghi tratti quieti finiscono con improvvise scosse di ioni pesanti. Il sole rosso non ti avvisa.
        
        #GEPscience_bd_cosmicRay_CernunnosSrfLandedTemperateLowlands_00 = Il contatore segnala una pioggia sottile e implacabile dal profondo spazio. Quassù, il "fondo" è di compagnia.

        #GEPscience_bd_cosmicRay_GEPInSpaceLow_00 = Il rivelatore mappa piogge di particelle. Quassù persino il "fondo" sembra meteo.
		#GEPscience_bd_cosmicRay_GEPInSpaceLow_01 = Radente in orbita bassa, il flusso sale e scende mentre il corpo blocca porzioni di cielo. Il sole rosso aggiunge il suo bordo tagliente ai numeri.
		#GEPscience_bd_cosmicRay_GEPInSpaceLow_02 = L'orbita bassa presenta raffiche mescolate a una pioggerellina fredda dal profondo spazio. Lo trasmetti ora, il ritardo lo consegna dopo.
		#GEPscience_bd_cosmicRay_GEPSrfLanded_00 = Lo strumento registra un flusso pulito di impatti ad alta energia. I dati sono ottimi, la sensazione di essere "molto lontano" lo è di più.
		#GEPscience_bd_cosmicRay_GEPSrfLanded_01 = Pianti il rivelatore a terra e lui comincia subito a ticchettare come se ne andasse fiero. Sotto un sole rosso e fioco, ciò non è affatto rassicurante.
		#GEPscience_bd_cosmicRay_GEPSrfLanded_02 = Il contatore batte regolare durante il lungo silenzio tra un evento e l'altro. Il cielo sembra sbagliato in un modo che i grafici non sanno spiegare.

        // bd_drill
        #GEPscience_bd_drill_TaranisSrfLandedMagmaShores_00 = Il trapano pattina su una crosta sottile prima di sfondarla e raggiungere strati più caldi che rendono incandescente la punta. Interrompi d'istinto e ricevi un messaggio di approvazione molto dopo, a cose fatte.
        #GEPscience_bd_drill_TaranisSrfLandedMagmaShores_01 = Risale un carotaggio fragile e vetroso, fuso con perline nere e frammenti alterati dal calore. Il sole rosso non sembra "giorno", sembra stare troppo vicino a un'etichetta di avvertimento.
        #GEPscience_bd_drill_TaranisSrfLandedScorchedLowlands_00 = La superficie è sinterizzata in qualcosa a metà tra roccia e ceramica, e il trapano odia entrambe le opzioni. Ogni secondo di funzionamento sembra costare caro, in energia e pazienza.
        #GEPscience_bd_drill_TaranisSrfLandedScorchedLowlands_01 = Il carotaggio mostra una storia di rapide fusioni e ricongelamenti, con confini netti che sembrano appena formati nonostante l'età. Registi il campione e cerchi di non pensare a quanto sia silenzioso senza un'atmosfera.
        #GEPscience_bd_drill_TaranisSrfLandedMidlands_00 = Il trapano trova un sottile tappo di regolite sciolta sopra un materiale sorprendentemente denso, come se qualcuno avesse scambiato il terreno mentre non guardavi. Il bagliore rosso fa sembrare calda la polvere anche quando non lo è.
        #GEPscience_bd_drill_TaranisSrfLandedMidlands_01 = Compare un sottile strato di breccia da impatto, pieno di frammenti angolosi e minuscoli vuoti. L'analizzatore segnala artefatti da danno radiativo e tu fai finta di non prenderla sul personale.
        #GEPscience_bd_drill_TaranisSrfLandedHighlands_00 = La roccia fragile si frattura davanti alla punta, trasformando la perforazione in una "rettifica prudente". Tieni bassa la velocità di avanzamento, e ancora più basse le aspettative.
        #GEPscience_bd_drill_TaranisSrfLandedHighlands_01 = Il carotaggio estratto è nettamente stratificato: bande scure che assorbono calore e bande chiare che si spaccano per shock termico. Pianifichi un controllo successivo e ricordi che pianificare non significa nulla senza un orologio di cui ti fidi.
        #GEPscience_bd_drill_TaranisSrfLandedDarkSideMidlands_00 = Nelle pianure in ombra, il trapano stride come se stesse perforando un congelatore pieno di ghiaia. I trucioli si allontanano pigramente, inutili e fin troppo sicuri di sé.
        #GEPscience_bd_drill_TaranisSrfLandedDarkSideMidlands_01 = Il carotaggio include volatili intrappolati dal freddo che sublimano non appena incontrano il calore della tua attrezzatura. Acquisisci i dati in fretta, perché "in fretta" è l'unico vantaggio che hai.
        #GEPscience_bd_drill_TaranisSrfLandedDarkSideHighlands_00 = Il motore del trapano assorbe più energia man mano che i lubrificanti si addensano e tutto si contrae. Inizi a invidiare i pianeti che hanno almeno la decenza di essere semplicemente freddi.
        #GEPscience_bd_drill_TaranisSrfLandedDarkSideHighlands_01 = Il campione è una colonna scura e fragile, con microfratture che disegnano una mappa perfetta delle tensioni. Trasmetti la mappa e aspetti in silenzio che qualcuno, da qualche parte, annuisca.
        #GEPscience_bd_drill_TaranisSrfLandedPoles_00 = Il trapano tira su una polvere fine e carica che si attacca a tutto come se fosse casa sua. Aggiungi "antistatico" alla lista di cose che avresti dovuto portare.
        #GEPscience_bd_drill_TaranisSrfLandedPoles_01 = Uno strato compattato più sotto suggerisce una migrazione di lungo periodo delle particelle sulla superficie, guidata da forze che non puoi percepire ma puoi misurare. Sotto il debole sole rosso, i dati sembrano più reali del panorama.
        #GEPscience_bd_drill_ToutatisSrfLandedSunnyLowlands_00 = La superficie è cotta in una crosta che smussa quasi subito la punta. Il carotaggio mostra granuli sinterizzati e polvere fusa, come se il terreno fosse stato leggermente saldato.
        #GEPscience_bd_drill_ToutatisSrfLandedSunnyLowlands_01 = Sotto la crosta, il trapano urta uno strato più duro che risuona nel telaio con l'alta gravità. Ti fermi per farlo raffreddare, poi realizzi che "raffreddare" qui è un termine relativo.
        #GEPscience_bd_drill_ToutatisSrfLandedSunnyHighlands_00 = Roccia dura e fratturata impone un foro lento e prudente, e lo schema di vibrazioni del trapano sembra una grafia nervosa. Controlli il bilancio energetico e l'orizzonte che tremola sotto quella luce rossa.
        #GEPscience_bd_drill_ToutatisSrfLandedSunnyHighlands_01 = Il carotaggio contiene bande minerali dense e chiazze vetrose che suggeriscono antichi eventi di riscaldamento. Etichetti il campione "non farlo cadere" due volte.
        #GEPscience_bd_drill_ToutatisSrfLandedTransitionalLowlands_00 = Il trapano attraversa strati alterni di polvere e graniglia cementata, come se il pianeta non riuscisse a decidersi su cosa voglia essere. La tua ombra si sposta in modi che fanno sembrare il "pomeriggio" uno scherzo.
        #GEPscience_bd_drill_ToutatisSrfLandedTransitionalLowlands_01 = Il carotaggio include sottili strati chiari che lo scanner segnala come sali insoliti o residui di brina. Aspetti una conferma, poi ricordi che ci stai già sopra, alla conferma.
        #GEPscience_bd_drill_ToutatisSrfLandedTransitionalHighlands_00 = La punta morde una crosta tenace, poi passa a un materiale friabile che cola fuori come neve secca. Il cambiamento improvviso ti fa ricontrollare la lettura della profondità tre volte.
        #GEPscience_bd_drill_ToutatisSrfLandedTransitionalHighlands_01 = In profondità nel carotaggio, i gradienti di temperatura sono abbastanza netti da comparire come deriva strumentale. Correggi la deriva e, in silenzio, dai la colpa al pianeta per essere scomodo.
        #GEPscience_bd_drill_ToutatisSrfLandedDarkSideLowlands_00 = Il trapano scheggia materiale fragile che si comporta come pietra congelata, nonostante il quasi vuoto. L'oscurità fa sembrare troppo luminosa ogni spia.
        #GEPscience_bd_drill_ToutatisSrfLandedDarkSideLowlands_01 = Il carotaggio ha sacche che sublimano in una breve foschia dentro il campionatore, poi svaniscono. Lo registri come "volatili presenti" e "per favore non aprire senza guanti".
        #GEPscience_bd_drill_ToutatisSrfLandedDarkSideHighlands_00 = Nel terreno freddo e denso i progressi sono lenti, il trapano continua a bloccarsi mentre il foro si contrae. Ti fermi, inverti e scopri un nuovo rispetto per la pazienza come procedura.
        #GEPscience_bd_drill_ToutatisSrfLandedDarkSideHighlands_01 = La colonna estratta mostra fratture da stress e depositi stratificati che sembrano indisturbati da ere. Percepisci il ritardo verso casa nel silenzio tra i rumori degli strumenti.
        #GEPscience_bd_drill_ToutatisSrfLandedSoutheasternMountains_00 = Il trapano incontra roccia di base sollevata con frammenti angolosi inglobati, come una montagna costruita con storia spezzata. L'alta gravità fa sentire ogni attrezzo più pesante di quanto dica la checklist.
        #GEPscience_bd_drill_ToutatisSrfLandedSoutheasternMountains_01 = Il carotaggio rivela breccia e sottili venature di polvere, indizi di antichi impatti e lento assestamento. Imballi il campione con cura, perché farlo cadere sarebbe più rumoroso della radio.
        #GEPscience_bd_drill_ToutatisSrfLandedWesternMountains_00 = Uno strato cristallino e ostinato costringe il trapano a lavorare caldo e lento, e la punta si lamenta per tutto il tempo. Il sole rosso abbaglia sulle pareti rocciose come se stesse cercando di leggere i tuoi appunti.
        #GEPscience_bd_drill_ToutatisSrfLandedWesternMountains_01 = Il campione mostra sottili venature chiare che non corrispondono al database di bordo. Inoltri comunque gli spettri, sicuro che il te-futuro si irriterà in un fuso orario diverso.
        #GEPscience_bd_drill_ToutatisSrfLandedDarkSideMountains_00 = Il trapano sobbalza tra creste fredde e fragili e tira su un carotaggio che si spezza in segmenti ordinati. Etichetti ogni segmento prima che decida di diventare "molti segmenti".
        #GEPscience_bd_drill_ToutatisSrfLandedDarkSideMountains_01 = Il carotaggio contiene strati scuri e densi con occasionali inclusioni brinose che svaniscono quando vengono riscaldate dai tuoi strumenti. Catturi i dati in fretta e fissi la notte sconosciuta mentre il caricamento torna a casa a passo di lumaca.
        #GEPscience_bd_drill_NodensSrfLandedShores_00 = Il trapano tira su un carotaggio fradicio e stratificato che si affloscia non appena incontra l'aria. Il segnale che dice "riduci la velocità di avanzamento" arriva molto dopo che l'hai già ridotta.
        #GEPscience_bd_drill_NodensSrfLandedShores_01 = Granuli fini e croste saline compaiono in bande ordinate, come se la costa si stesse mettendo in ordine da secoli. Sotto il debole sole rosso sembra tutto dello stesso colore, finché gli strumenti non la pensano diversamente.
        #GEPscience_bd_drill_NodensSrfLandedTropicalLowlands_00 = Il primo metro è elastico e scuro, poi diventa argilla ostinata che fa "lamentare" il trapano con tre tonalità diverse. I consigli del Centro di Controllo arrivano dopo che ti sei già inventato dei consigli nuovi.
        #GEPscience_bd_drill_NodensSrfLandedTropicalLowlands_01 = Il carotaggio mostra sacche di umidità e inclusioni strane che i sensori etichettano come "interessanti" e lo stomaco etichetta come "non annusarlo". Persino la luce del giorno sembra estranea sotto questo cielo rosso.
        #GEPscience_bd_drill_NodensSrfLandedTemperateLowlands_00 = Uno strato compattato ferma il trapano di colpo, come se il pianeta avesse nascosto un pavimento apposta per te. Segni l'ora, poi ricordi che "l'ora" qui è solo un suggerimento.
        #GEPscience_bd_drill_NodensSrfLandedTemperateLowlands_01 = Il campione alterna polvere e graniglia cementata, suggerendo cicli che le tue tabelle non sanno ancora come chiamare. La demo a bassa latenza a casa non ti aveva preparato alla latenza vera.
        #GEPscience_bd_drill_NodensSrfLandedTropicalMidlands_00 = Il trapano morde uno strato di roccia più dura e rossastra che sprigiona trucioli caldi come minuscole scintille. Ti accorgi che hai iniziato a giudicare il "mezzogiorno" dai cambiamenti di temperatura, non dalla luce.
        #GEPscience_bd_drill_NodensSrfLandedTropicalMidlands_01 = Sotto la superficie, il carotaggio passa da pietra porosa a bande dense con gas intrappolati che fanno segnalare l'analizzatore. Metti i dati in coda per la trasmissione e ti alleni alla pazienza come competenza operativa.
        #GEPscience_bd_drill_NodensSrfLandedTemperateMidlands_00 = Il carotaggio è una pila ordinata di sedimenti, sormontata da uno strato più duro che sembra cotto sul posto. Sotto Grannus, anche "cotto" sembra una ricetta diversa.
        #GEPscience_bd_drill_NodensSrfLandedTemperateMidlands_01 = Piccole venature minerali compaiono nelle scansioni come fili luminosi, ma non corrispondono alla tua libreria di riferimento. L'aggiornamento della libreria è previsto in arrivo... prima o poi.
        #GEPscience_bd_drill_NodensSrfLandedHighlands_00 = Il trapano sobbalza sul basamento fratturato e la lettura delle vibrazioni sembra un sismografo in una brutta giornata. Aspetti una conferma prima di cambiare impostazioni, poi ricordi che la conferma è lontana ore.
        #GEPscience_bd_drill_NodensSrfLandedHighlands_01 = Risale un carotaggio freddo dall'aspetto pulito, con granuli densi e strati sottili e fragili che si spezzano alla manipolazione. La foschia sull'orizzonte sotto il sole rosso fa sembrare il paesaggio più piatto di quanto i dati insistano.
        #GEPscience_bd_drill_NodensSrfLandedTundra_00 = Il permafrost oppone resistenza, vapore e brina si formano al foro come se il pianeta stesse espirando. Il trapano funziona meglio quando smette di sorprendersi per la temperatura.
        #GEPscience_bd_drill_NodensSrfLandedTundra_01 = Il campione include lenti di ghiaccio e bande granulose che suggeriscono ripetuti cicli di gelo e disgelo. I segnali giorno notte sono così sballati che lo registri come "quando l'ombra si è finalmente mossa".
        #GEPscience_bd_drill_NodensSrfLandedIceCaps_00 = Il trapano estrae un cilindro di ghiaccio limpido e ostinato, con bolle intrappolate che scintillano sotto la luce rossa. Ti viene da chiamarlo "caramella da ghiacciaio" e decidi di non scriverlo nel rapporto ufficiale.
        #GEPscience_bd_drill_NodensSrfLandedIceCaps_01 = Sotto lo strato superficiale, nel ghiaccio compaiono striature di polvere più scura, come vecchie tempeste intrappolate in un congelatore. Il rapporto che invii è conciso, perché i messaggi lunghi richiedono troppo tempo per pentirsene.
        #GEPscience_bd_drill_BelisamaSrfLandedFlats_00 = Il trapano tira su un cilindro ordinato di granuli fini sopra uno strato ostinato e compattato. Qui l'orizzonte cambia poco, quindi usi il timer del ritardo comunicazioni come "orologio".
        #GEPscience_bd_drill_BelisamaSrfLandedTropicalLowlands_00 = Una regolite umida e appiccicosa incrosta la punta, poi all'improvviso lascia il posto a bande granulose che graffiano come carta vetrata. Sotto il debole sole rosso, "caldo" e "luminoso" hanno smesso di significare la stessa cosa da giorni.
        #GEPscience_bd_drill_BelisamaSrfLandedTemperateLowlands_00 = Il carotaggio mostra un'alternanza di polvere soffice e croste cementate, come se il terreno si stesse ricostruendo in silenzio. Il tuo rapporto di stato arriva a casa molto dopo che il trapano ha finito di vantarsi.
        #GEPscience_bd_drill_BelisamaSrfLandedTropicalMidlands_00 = Il trapano vibra attraversando materiale fratturato e tira su schegge che alla luce rossa sembrano vetrose. Segni il "mezzogiorno" in base alla temperatura del motore, perché il cielo non aiuta.
        #GEPscience_bd_drill_BelisamaSrfLandedTemperateMidlands_00 = Una frattura netta rivela sedimenti stratificati con minuscoli vuoti che fanno segnalare l'analizzatore. Ti chiedi quanti cicli siano accaduti quassù senza che nessuno guardasse.
        #GEPscience_bd_drill_BelisamaSrfLandedHighlands_00 = Il basamento duro trasforma la perforazione in una rettifica prudente, con vibrazioni che sembrano più forti di quanto il paesaggio meriti. Gli strumenti insistono che è normale, ai tuoi nervi serve più tempo per essere d'accordo.
        #GEPscience_bd_drill_BelisamaSrfLandedPoles_00 = La punta morde ghiaccio freddo e polveroso e il campione appanna per un attimo il contenitore prima di schiarirsi. Registri i dati in fretta, perché "stabile" è una condizione temporanea così lontano da casa.
        #GEPscience_bd_drill_SucellusSrfLandedBasins_00 = Il trapano affonda in un riempimento sciolto e colpisce uno strato denso come un pavimento sepolto. Il carotaggio si legge come un libro di storia scritto nella polvere, con ogni capitolo rallentato lungo la via del ritorno.
        #GEPscience_bd_drill_SucellusSrfLandedLowlands_00 = La regolite fine lascia il posto a frammenti grossolani impaccati stretti, come se il terreno fosse stato scosso e poi riassestato. Il sole rosso fa sembrare tutto calmo mentre i dati dicono il contrario.
        #GEPscience_bd_drill_SucellusSrfLandedTropicalMidlands_00 = Il campione risale a bande, con striature minerali scure sopra strati chiari e fragili che si sfaldano alla manipolazione. Inizi a fidarti più degli spettrometri che dei tuoi occhi.
        #GEPscience_bd_drill_SucellusSrfLandedTemperateMidlands_00 = Un carotaggio sorprendentemente uniforme suggerisce una deposizione lunga e quieta, con solo disturbi occasionali. È un pianeta molto paziente, anche il tuo collegamento radio sta imparando da lui.
        #GEPscience_bd_drill_SucellusSrfLandedHighlands_00 = Il trapano lotta contro roccia cristallina e alla fine estrae una colonna pesante e densa che tonfa nel supporto. La etichetti "preziosa" e pensi subito a quanta strada deve fare.
        #GEPscience_bd_drill_SucellusSrfLandedPoles_00 = Volatili intrappolati dal freddo sibilano fuori dal foro e svaniscono nel sottile nulla. Quando arriva il messaggio di cautela, hai già chiuso il campionatore e trattenuto il respiro lo stesso.
        #GEPscience_bd_drill_CaireenSrfLandedLowlands_00 = Il trapano tira su macerie miste: frammenti catturati impaccati con fini, come se la luna non avesse mai deciso davvero cosa sia. Tutto qui sembra in prestito, compreso il tuo senso dell'orientamento.
        #GEPscience_bd_drill_CaireenSrfLandedMidlands_00 = Una crosta superficiale si rompe in pezzi irregolari, poi diventa polvere che si attacca a ogni superficie. Cominci a sospettare che Caireen sia stata assemblata con pezzi di ricambio, e non della stessa serie.
        #GEPscience_bd_drill_CaireenSrfLandedHighlands_00 = La punta si impunta su inclusioni frastagliate e il carotaggio si frattura in segmenti ordinati durante l'estrazione. Imbuchi ogni pezzo con cura, rimpiazzarli richiederebbe più tempo che aspettare la risposta del Controllo Missione.
        #GEPscience_bd_drill_CaireenSrfLandedPoles_00 = Il trapano trova granuli di ghiaccio mescolati a polvere scura che assorbe la luce rossa come se stesse accumulando calore. L'analizzatore lo definisce "interessante", che è il termine educato per dire "sconosciuto".
        #GEPscience_bd_drill_AirmedSrfLandedTropicalLowlands_00 = Il trapano macina fini scure e tira su un carotaggio compattato che sembra "caldo" solo perché sotto un debole sole rosso tutto sembra così. L'avviso di radiazione sulla punta lampeggia come se stesse cercando di infilarsi nella conversazione oltre il ritardo radio.
        #GEPscience_bd_drill_AirmedSrfLandedTemperateLowlands_00 = Una crosta sottile lascia il posto a macerie sciolte, poi di colpo a qualcosa di più duro che risuona nel telaio. Registri la profondità e realizzi che qui "l'ora del giorno" è qualunque cosa su cui gli strumenti riescano a mettersi d'accordo.
        #GEPscience_bd_drill_AirmedSrfLandedTropicalMidlands_00 = Il campione risale stratificato: polvere, graniglia, poi una banda fragile che si sfalda in schegge luccicanti. Sirona resta nel cielo come promemoria che non sei decisamente a casa.
        #GEPscience_bd_drill_AirmedSrfLandedTemperateMidlands_00 = Il trapano estrae un cilindro ordinato di regolite compattata con inclusioni strane che l'analizzatore non sa ancora nominare. Metti gli spettri in coda per l'invio e ti alleni alla pazienza come compito di missione.
        #GEPscience_bd_drill_AirmedSrfLandedHighlands_00 = Il basamento fratturato trasforma la perforazione in una rettifica prudente, con vibrazioni che sembrano troppo forti per un luogo senza aria. Il messaggio "riduci la velocità di avanzamento" arriva dopo che l'hai già fatto, due volte.
        #GEPscience_bd_drill_AirmedSrfLandedDarkenedLowlands_00 = Nel terreno in ombra il motore del trapano suona diverso, come se il freddo stesse irrigidendo l'intera macchina. Il carotaggio mostra polvere fine sopra granuli più scuri e densi che bevono la luce rossa.
        #GEPscience_bd_drill_AirmedSrfLandedDarkenedMidlands_00 = La punta morde materiale ostinato e il carotaggio si frattura in segmenti ordinati durante l'estrazione. Etichetti ogni pezzo prima che decida di diventare "molti pezzi".
        #GEPscience_bd_drill_AirmedSrfLandedDarkenedHighlands_00 = Il trapano si pianta su uno strato cristallino e alla fine sfonda con uno scossone che rende sospetto ogni bullone. Il campione ha spigoli vivi e un aspetto antichissimo, come se avesse aspettato da solo questo momento.
        #GEPscience_bd_drill_AirmedSrfLandedPoles_00 = Volatili intrappolati dal freddo appannano per un attimo il campionatore, poi svaniscono nel nulla. Sigilli tutto in fretta e ti chiedi quanto tempo impieghi "in fretta" a raggiungere il Controllo Missione da qui.
        #GEPscience_bd_drill_BorvoSrfLandedTropicalCraquelure_00 = Il trapano scende in una rete di crepe e tira su granuli di ghiaccio saldati a polvere più scura. L'aria sottile porta un lieve pizzicore chimico che decidi di non descrivere come "stuzzicante".
        #GEPscience_bd_drill_BorvoSrfLandedTemperateCraquelure_00 = Il carotaggio mostra lastre di ghiaccio fratturate con materiale fine stipato tra di loro, come se il terreno si fosse piegato al rallentatore. Sotto il sole rosso, le ombre non si comportano come si aspetterebbero i tuoi riflessi.
        #GEPscience_bd_drill_BorvoSrfLandedTropicalLowlands_00 = Uno strato morbido e poroso collassa leggermente attorno al foro, poi si compatta in ghiaccio cementato e granuloso. Inoltri i dati a casa e immagini che arrivino tra applausi con diversi minuti luce di ritardo.
        #GEPscience_bd_drill_BorvoSrfLandedTemperateLowlands_00 = Il trapano produce un cilindro freddo e pallido con bolle intrappolate che fanno segnalare l'analizzatore quando la pressione cambia. L'atmosfera è appena abbastanza densa da far passare i suoni, e appena abbastanza rarefatta da renderli inquietanti.
        #GEPscience_bd_drill_BorvoSrfLandedTropicalMidlands_00 = La punta gratta regolite mista a ghiaccio, lasciando un foro che prova a brinarsi ai bordi. Il campione odora vagamente di "laboratorio", che non è un odore rassicurante così lontano.
        #GEPscience_bd_drill_BorvoSrfLandedTemperateMidlands_00 = I depositi stratificati risalgono come un dessert congelato: polvere, ghiaccio, polvere, ghiaccio. Resisti alla tentazione di dare nomi da snack agli strati, soprattutto perché il caricamento richiederebbe un'eternità.
        #GEPscience_bd_drill_BorvoSrfLandedHighlands_00 = Un composito più duro di ghiaccio e roccia fa lavorare il trapano a caldo nonostante l'ambiente gelido. Registri l'assorbimento e lanci un'occhiata a Sirona, chiedendoti se stia giudicando la tua tecnica.
        #GEPscience_bd_drill_BorvoSrfLandedMajorCraters_00 = Il carotaggio è caotico: frammenti da shock, perline vetrose e fini compattati incastrati insieme. Sembra una storia violenta raccontata con voce bassissima sotto un debole cielo rosso.
        #GEPscience_bd_drill_BorvoSrfLandedPoles_00 = Il trapano tira su ghiaccio quasi puro con sottili striature scure, come vecchie tempeste intrappolate in un congelatore. Sigilli il campione e attraversi il lungo silenzio in attesa della prossima istruzione.
        #GEPscience_bd_drill_DamonaSrfLandedTropicalLowlands_00 = Il trapano morde polvere farinosa che si attacca a tutto, poi incontra uno strato denso che sembra un coperchio sepolto. Il sole rosso rende il paesaggio familiare finché gli strumenti non la pensano diversamente.
        #GEPscience_bd_drill_DamonaSrfLandedTemperateLowlands_00 = Una crosta fragile si frattura con un taglio netto e il carotaggio risale in anelli affilati, come se fosse già stato pretagliato per comodità. La comodità finisce quando ricordi quanta strada devono fare i dati.
        #GEPscience_bd_drill_DamonaSrfLandedTropicalMidlands_00 = Il campione mostra granuli fini sopra macerie compattate, con minuscoli vuoti che fanno segnalare l'analizzatore mentre i gas intrappolati sfuggono. Ti ritrovi ad ascoltare le macchine perché il mondo fuori è troppo silenzioso.
        #GEPscience_bd_drill_DamonaSrfLandedTemperateMidlands_00 = Il trapano estrae una colonna scura e densa che sembra più vecchia dell'intero tuo piano di missione. La etichetti "intatta" e ti preoccupi subito di farla cadere con questa bassa gravità.
        #GEPscience_bd_drill_DamonaSrfLandedHighlands_00 = Inclusioni frastagliate fanno vibrare la punta, poi il lavoro si assesta in una rettifica costante attraverso roccia fredda. Qui il "giorno" è solo la luce rossa che scivola tra "debole" e "ancora più debole".
        #GEPscience_bd_drill_DamonaSrfLandedImpactBasin_00 = Il carotaggio è breccia rimescolata da impatto: schegge angolose bloccate in polvere fine, come storia tenuta insieme per pura ostinazione. Quando il tuo riassunto arriverà a casa, il bacino sarà ancora lì ad aspettare.
        #GEPscience_bd_drill_DamonaSrfLandedPoles_00 = Il trapano libera un breve tremolio di brina in sublimazione che svanisce veloce quanto appare. Acquisisci i dati in fretta, perché Damona non sembra interessata alle seconde possibilità.
        #GEPscience_bd_drill_EponaSrfLandedTropicalLowlands_00 = Il trapano tira su fini umidi sopra uno strato più duro e compattato che resiste all'estrazione. Sotto il debole sole rosso, la spia "fine" sembra più affidabile del cielo.
        #GEPscience_bd_drill_EponaSrfLandedTemperateLowlands_00 = Un carotaggio ordinato di graniglia mista e crosta cementata suggerisce cicli lenti che non puoi vedere, solo misurare. Il ping di conferma da casa arriva dopo che hai già impacchettato il campione.
        #GEPscience_bd_drill_EponaSrfLandedTropicalUplands_00 = La punta vibra nella regolite grossolana e tira su frammenti angolosi che sembrano appena spezzati. Registri l'ora, poi ricordi che qui l'"ora" locale è per lo più una voce.
        #GEPscience_bd_drill_EponaSrfLandedTemperateUplands_00 = Il carotaggio alterna bande polverose e strati ostinati che sembrano cotti dal calore. Il paesaggio sembra calmo, ma il motore del trapano insiste che sta lavorando a ritmi impossibili.
        #GEPscience_bd_drill_EponaSrfLandedHighlands_00 = Il basamento duro trasforma la perforazione in una rettifica prudente, con vibrazioni che suonano più forti nella lunga solitudine. Fai una regolazione e aspetti che il consiglio in ritardo non sia d'accordo.
        #GEPscience_bd_drill_EponaSrfLandedGrandPeaks_00 = Il trapano morde roccia densa e fredda ed estrae una colonna pesante con sottili venature chiare che l'analizzatore non sa ancora nominare. La luce rossa rende tutto uniforme finché gli spettri non dimostrano il contrario.
        #GEPscience_bd_drill_EponaSrfLandedCraters_00 = Macerie rimescolate da impatto inceppano la punta, poi all'improvviso lasciano il posto a uno strato compattato come un pavimento sepolto. Il campione parla di violenza accaduta in silenzio, molto tempo fa.
        #GEPscience_bd_drill_EponaSrfLandedVolcanoes_00 = I primi centimetri sono fragili e vetrosi, poi il carotaggio si scalda e odora vagamente di "sala macchine". Decidi di non toccare il campione a mani nude, anche se i guanti arrivano come un semplice suggerimento.
        #GEPscience_bd_drill_EponaSrfLandedPoles_00 = Brina intrappolata dal freddo appanna il campionatore per un battito di cuore, poi svanisce nell'aria sottile. Sigilli tutto in fretta, perché qui le "seconde possibilità" richiedono troppo tempo.
        #GEPscience_bd_drill_RosmertaSrfLandedTropicalLowlands_00 = Il trapano tira su fini appiccicosi che si attaccano alla punta, poi si libera con uno schiocco granuloso. La luce del giorno sembra sbagliata sotto questo sole rosso, come se il pianeta fosse illuminato dal ricordo.
        #GEPscience_bd_drill_RosmertaSrfLandedTemperateLowlands_00 = Un carotaggio stratificato, polvere, crosta, polvere, suggerisce un lungo e quieto assestamento con interruzioni occasionali. La coda di trasmissione è più lunga della tua pazienza, ma invii comunque.
        #GEPscience_bd_drill_RosmertaSrfLandedTropicalMidlands_00 = La punta gratta materiale fratturato e produce un carotaggio che si sfalda in fogli secchi e taglienti. Tieni ferme le mani e lasci che siano gli strumenti a preoccuparsi.
        #GEPscience_bd_drill_RosmertaSrfLandedTemperateMidlands_00 = Il campione risale sorprendentemente uniforme, con minuscoli vuoti che fanno segnalare l'analizzatore quando la pressione cambia. Nel silenzio tra le finestre radio, quei piccoli scoppiettii sembrano enormi.
        #GEPscience_bd_drill_RosmertaSrfLandedHighlands_00 = La roccia densa resiste al trapano finché alla fine cede e lascia un cilindro pulito che tonfa nel supporto. Lo etichetti con cura, perché persino le etichette sembrano importanti così lontano da casa.
        #GEPscience_bd_drill_RosmertaSrfLandedPoles_00 = Il trapano libera un breve sibilo di volatili in sublimazione e poi più nulla. Il messaggio di cautela arriva dopo, lo archivi sotto "già imparato".
        #GEPscience_bd_drill_RAB-58ESrfLandedLowlands_00 = Il trapano affonda in macerie sciolte ed estrae un carotaggio che sembra assemblato con frammenti che non combaciano. L'analizzatore lo definisce "eterogeneo", che è un modo educato per dire "ma che cos'è, esattamente".
        #GEPscience_bd_drill_RAB-58ESrfLandedEasternHighlands_00 = La punta si impunta su inclusioni frastagliate e il campione si frattura in segmenti ordinati durante il sollevamento. Imbuchi ogni pezzo prima che la microgravità trasformi "campione" in "confetti".
        #GEPscience_bd_drill_RAB-58ESrfLandedWesternHighlands_00 = Uno strato più scuro e denso consuma il trapano e risale con schegge vetrose mescolate. Sotto il debole sole rosso, quel luccichio sembra invitante finché i dati non dicono "no".
        #GEPscience_bd_drill_CernunnosSrfLandedTropicalLowlands_00 = Il trapano tira su granuli fini sopra graniglia cementata dal ghiaccio che resiste all'estrazione come se avesse un posto fisso. Osservi la barra di avanzamento lenta e senti ogni secondo di distanza.
        #GEPscience_bd_drill_CernunnosSrfLandedTemperateLowlands_00 = Una crosta fragile si spezza con un taglio netto, rivelando un carotaggio chiaro e stratificato con striature scure che assorbono la luce rossa. Smetti di giudicare il "mezzogiorno" dalla luminosità e inizi a usare la temperatura.
        #GEPscience_bd_drill_CernunnosSrfLandedTropicalMidlands_00 = La punta lavora a caldo in uno strato misto di macerie e fini compattati, e il tono del motore cambia come se si lamentasse. I consigli del Controllo Missione arrivano dopo che ti sei già scusato con il trapano.
        #GEPscience_bd_drill_CernunnosSrfLandedTemperateMidlands_00 = Il carotaggio mostra bande alternate di polvere e materiale più duro, indizi di cicli lenti ed eventi improvvisi. Il cielo non offre segnali familiari, quindi ti fidi dei numeri.
        #GEPscience_bd_drill_CernunnosSrfLandedHighlands_00 = La perforazione diventa una rettifica prudente attraverso roccia densa e fredda che sembra più vecchia del piano di missione. Confezioni il campione con cura extra, perché i ricambi sono davvero lontani.
        #GEPscience_bd_drill_CernunnosSrfLandedSouthPolarHills_00 = Il trapano espone strati freddi e compattati che si crepano per stress termico mentre si scaldano nel campionatore. Registri i pattern di frattura e fai finta che il lungo silenzio sia normale.
        #GEPscience_bd_drill_CernunnosSrfLandedNorthPole_00 = Risale ghiaccio quasi puro striato di polvere scura, come vecchie tempeste intrappolate in un congelatore. Sigilli il contenitore in fretta e aspetti il ritardo radio per sentirti dire che hai fatto la cosa giusta.

        // bd_dust
        #GEPscience_bd_dust_GrannusFlyingLowNorthPolarZone_00 = Gli impatti di polvere aumentano di colpo ogni volta che si intensificano le linee di campo polari, come se la stella stesse sabbiando il sensore di proposito.
        #GEPscience_bd_dust_GrannusFlyingLowNorthSubpolarZone_00 = Il rilevatore registra frastagliate "tempeste di graniglia" che vanno e vengono senza preavviso. Il Controllo Missione riceve l'allarme diverse ore dopo che tu hai smesso di preoccupartene.
        #GEPscience_bd_dust_GrannusFlyingLowNorthTemperateZone_00 = Qui le dimensioni dei granuli tendono a essere maggiori e i conteggi pulsano con un ritmo lento che fa sembrare il ciclo giorno notte un suggerimento, non una regola.
        #GEPscience_bd_dust_GrannusFlyingLowNorthTropicZone_00 = La polvere carica si raggruma in piccoli flussi che tracciano corsie magnetiche invisibili sotto il debole bagliore rosso.
        #GEPscience_bd_dust_GrannusFlyingLowEquatorialZone_00 = L'ambiente equatoriale è così affollato che lo strumento rinuncia alla poesia e stampa solo numeri. Tanti numeri.
        #GEPscience_bd_dust_GrannusFlyingLowSouthTropicZone_00 = La densità di polvere cala, poi torna alta di scatto in improvvise impennate, come se la stella stesse respirando nella tua direzione.
        #GEPscience_bd_dust_GrannusFlyingLowSouthTemperateZone_00 = Il sensore rileva una graniglia più fine e uniforme, coerente con polvere di lunga durata trasportata da flussi di plasma stabili lontano da qualunque cielo "normale".
        #GEPscience_bd_dust_GrannusFlyingLowSouthSubpolarZone_00 = Gli impatti arrivano in grappoli serrati, suggerendo che la polvere sia guidata da campi intensi invece di vagare liberamente.
        #GEPscience_bd_dust_GrannusFlyingLowSouthPolarZone_00 = Una breve pausa è seguita da una pioggia netta di granuli duri, la etichetti "sorpresa polare" e speri che l'R&D abbia un nome migliore.
        #GEPscience_bd_dust_GrannusFlyingHigh_00 = A questa quota i conteggi di polvere si diradano, ma ogni granello colpisce come se avesse viaggiato molto a lungo per incontrarti.
        #GEPscience_bd_dust_GrannusInSpaceLowNorthPolarZone_00 = In orbita bassa sopra la zona polare settentrionale si vedono flussi di polvere densi e veloci allineati con archi magnetici. Il ritardo radio fa sembrare di leggere il meteo di ieri da una stella.
        #GEPscience_bd_dust_GrannusInSpaceLowNorthSubpolarZone_00 = La densità di polvere varia di ordini di grandezza in un solo passaggio, indicando un confinamento in strutture strette più che una nube uniforme.
        #GEPscience_bd_dust_GrannusInSpaceLowNorthTemperateZone_00 = I granuli appaiono insolitamente refrattari, qualunque cosa fosse fragile avrebbe mollato questo lavoro molto prima del tuo arrivo.
        #GEPscience_bd_dust_GrannusInSpaceLowNorthTropicZone_00 = Una banda persistente di polvere fine abbraccia questa latitudine, trasformando il bagliore della stella in un alone tenue e granuloso sui monitor.
        #GEPscience_bd_dust_GrannusInSpaceLowEquatorialZone_00 = Lo strumento segnala un "fruscio" costante di micrometeoroidi. Sospetti che l'universo stia cercando di escluderti.
        #GEPscience_bd_dust_GrannusInSpaceLowSouthTropicZone_00 = I granuli di polvere mostrano un'ampia distribuzione di dimensioni, come se più sorgenti si mescolassero lontano da casa e nessuno si fosse preso la briga di etichettare i contenitori.
        #GEPscience_bd_dust_GrannusInSpaceLowSouthTemperateZone_00 = I conteggi sono abbastanza stabili da poterli mappare, cosa al tempo stesso rassicurante e inquietante così vicino a qualcosa su cui non si può atterrare.
        #GEPscience_bd_dust_GrannusInSpaceLowSouthSubpolarZone_00 = Un incremento stretto suggerisce che la polvere sia intrappolata in un filamento duraturo simile a un anello. Lo archivi sotto "pericolo" e "bello".
        #GEPscience_bd_dust_GrannusInSpaceLowSouthPolarZone_00 = Il rilevatore cattura brevi e intense raffiche di polvere coerenti con eventi di deflusso polare, i dati arrivano al CSK quando l'evento sembra già un ricordo.
        #GEPscience_bd_dust_GrannusInSpaceHigh_00 = Più lontano, la polvere diventa rara e antica. I pochi granuli che intercetti sembrano messaggi da molto lontano, consegnati senza indirizzo di ritorno.
        #GEPscience_bd_dust_TaranisSrfLandedMagmaShores_00 = Granuli cinerei si attaccano a tutto come se l'attrazione elettrostatica fosse l'hobby preferito del pianeta. Il sensore suggerisce "non inalare", anche se non c'è nulla con cui inalare.
        #GEPscience_bd_dust_TaranisSrfLandedScorchedLowlands_00 = Qui i granuli di polvere sono fusi in minuscole perline vetrose, probabilmente riscaldate di colpo e ricongelate sul lato arso dal sole.
        #GEPscience_bd_dust_TaranisSrfLandedMidlands_00 = La regolite è così secca e tagliente che registra una pioggerella costante di micro-impatti ogni volta che anche solo fai oscillare il lander.
        #GEPscience_bd_dust_TaranisSrfLandedHighlands_00 = Un sottile strato di polvere fine riveste i terreni elevati, con dimensioni dei granuli che suggeriscono una lenta abrasione sotto cicli termici estremi.
        #GEPscience_bd_dust_TaranisSrfLandedDarkSideMidlands_00 = Nel buio gelido, la polvere diventa fragile e soffice, lo strumento la legge come zucchero a velo, senza la gioia.
        #GEPscience_bd_dust_TaranisSrfLandedDarkSideHighlands_00 = La scarsa mobilità della polvere è suggerita da una stretta concentrazione delle dimensioni dei granuli, come se tutto ciò che poteva muoversi fosse già scivolato a valle molto tempo fa.
        #GEPscience_bd_dust_TaranisSrfLandedPoles_00 = La polvere dei poli mostra popolazioni miste, suggerendo un trasporto attraverso il terminatore dove "giorno" e "notte" si alternano nel risultare inquietanti.
        #GEPscience_bd_dust_TaranisSrfSplashed_00 = Il sensore registra particolato caldo e pesante che si solleva sopra la lava prima di ricadere come glitter con cattive intenzioni.
        #GEPscience_bd_dust_TaranisInSpaceLowMagmaSea_00 = Sopra il mare di lava, la densità di polvere raggiunge il massimo e i granuli sembrano appena rielaborati. Quasi senti sfrigolare la superficie attraverso i dati.
        #GEPscience_bd_dust_TaranisInSpaceLowMagmaShores_00 = Un confine brillante di polvere potenziata segue la costa lavica, suggerendo una forte carica locale e un rapido sollevamento vicino all'interfaccia caldo freddo.
        #GEPscience_bd_dust_TaranisInSpaceLowScorchedLowlands_00 = La firma della polvere è dominata da granuli più grandi e densi, coerenti con materiale sinterizzato dell'emisfero incandescente.
        #GEPscience_bd_dust_TaranisInSpaceLowMidlands_00 = La polvere fine forma nubi a chiazze che derivano verso il terminatore. I disegni sembrano meteo, ma senza il conforto dell'aria.
        #GEPscience_bd_dust_TaranisInSpaceLowHighlands_00 = I conteggi dei granuli diminuiscono con la quota sopra le colline, indicando che la superficie trattiene la sua polvere con una presa ostinata, sigillata dal vuoto.
        #GEPscience_bd_dust_TaranisInSpaceLowDarkSideMidlands_00 = Il lato in ombra mostra meno granuli in generale, ma quelli rilevati sono estremamente fini, come se le particelle più grandi si fossero congelate sul posto e non se ne fossero mai andate.
        #GEPscience_bd_dust_TaranisInSpaceLowDarkSideHighlands_00 = La polvere compare a tratti in sottili veli, suggerendo un lento sollevamento elettrostatico nella debole luce riflessa dallo spazio lontano.
        #GEPscience_bd_dust_TaranisInSpaceLowPoles_00 = I passaggi polari rivelano fasce alternate polverose e pulite allineate con il terreno locale. La navigazione le definisce "interessanti", che non è mai un buon segno.
        #GEPscience_bd_dust_TaranisInSpaceHigh_00 = Dall'orbita alta l'ambiente di polvere si media in un velo sottile e irregolare. Il pianeta sotto continua a sembrare diviso tra fuoco e notte eterna.
        #GEPscience_bd_dust_ToutatisSrfLandedSunnyLowlands_00 = Il terreno cotto rilascia polvere secca che saltella a piccoli balzi ogni volta che si accumula elettricità statica. Il sole rosso fa sembrare tutta la scena il problema di un altro pianeta.
        #GEPscience_bd_dust_ToutatisSrfLandedSunnyHighlands_00 = In quota dominano granuli più grossolani, segno che le particelle fini o se ne sono andate da tempo, oppure si stanno nascondendo in ogni tua guarnizione.
        #GEPscience_bd_dust_ToutatisSrfLandedTransitionalLowlands_00 = Qui la polvere ha dimensioni e cariche miste, come se il pianeta non riuscisse a decidersi se essere caldo, freddo o semplicemente scomodo.
        #GEPscience_bd_dust_ToutatisSrfLandedTransitionalHighlands_00 = Il sensore rileva una popolazione di polvere "di fondo" stabile, suggerendo una stretta fascia di comfort in cui le particelle possono muoversi senza friggere o congelare all'istante.
        #GEPscience_bd_dust_ToutatisSrfLandedDarkSideLowlands_00 = Sul lato freddo, gli impatti di polvere quasi spariscono, ma i granuli fini restano ostinatamente attaccati allo strumento come se avessero paura di mollare la presa.
        #GEPscience_bd_dust_ToutatisSrfLandedDarkSideHighlands_00 = Le firme dei granuli suggeriscono polvere fragile, fratturata dal gelo, che si sbriciola alla minima vibrazione. Cerchi di non vibrare.
        #GEPscience_bd_dust_ToutatisSrfLandedSoutheasternMountains_00 = La polvere di montagna mostra granuli taglienti e angolosi, coerenti con una frammentazione meccanica recente, forse dovuta a rapidi sbalzi termici vicino al terminatore.
        #GEPscience_bd_dust_ToutatisSrfLandedWesternMountains_00 = Il rilevatore intercetta sbuffi periodici di polvere, come se lontane frane a valle avvenissero secondo un calendario di cui nessuno ti ha avvisato.
        #GEPscience_bd_dust_ToutatisSrfLandedDarkSideMountains_00 = Anche nel buio, la polvere è elettricamente vivace, lo strumento registra eventi di carica che ti fanno rizzare i peli dentro il casco.
        #GEPscience_bd_dust_ToutatisFlyingLowSunnyLowlands_00 = Vicino alla superficie, l'aria sottile riesce comunque a trasportare polvere in tende striate. È come il meteo, ma più silenzioso e più giudicante.
        #GEPscience_bd_dust_ToutatisFlyingLowSunnyHighlands_00 = La densità di polvere diminuisce con la quota, ma i granuli sono più veloci e più cattivi. L'aerodinamica non era invitata a questa festa.
        #GEPscience_bd_dust_ToutatisFlyingLowTransitionalLowlands_00 = Il sensore vede fronti ondulati di polvere fine che scorrono lungo il confine tra giorno e notte, come se il pianeta stesse spazzando i pavimenti.
        #GEPscience_bd_dust_ToutatisFlyingLowTransitionalHighlands_00 = I granuli di polvere si raggruppano in bande transitorie, indicando che i venti locali esistono giusto il tempo di essere fastidiosi.
        #GEPscience_bd_dust_ToutatisFlyingLowDarkSideLowlands_00 = L'aria del lato freddo trasporta pochissima polvere, finché una raffica improvvisa consegna una breve burrasca granulosa e poi fa finta che non sia successo nulla.
        #GEPscience_bd_dust_ToutatisFlyingLowDarkSideHighlands_00 = I granuli fini restano sospesi più a lungo del previsto, segno che una portanza debole e una forte elettrostatica stanno facendo squadra contro i tuoi filtri.
        #GEPscience_bd_dust_ToutatisFlyingLowSoutheasternMountains_00 = Nei dati compaiono segnali simili a correnti ascensionali mentre la polvere viene sollevata lungo i fianchi delle montagne. Il termine "corrente ascensionale" suona fin troppo ottimista così lontano da casa.
        #GEPscience_bd_dust_ToutatisFlyingLowWesternMountains_00 = Gli impatti di polvere arrivano in raffiche ritmiche, coerenti con flusso turbolento che scavalca le creste e si riversa sottovento.
        #GEPscience_bd_dust_ToutatisFlyingLowDarkSideMountains_00 = Il rilevatore registra granuli rari ma molto carichi, come se le montagne in ombra stessero accumulando elettricità statica in silenzio, per dopo.
        #GEPscience_bd_dust_ToutatisFlyingHigh_00 = In alto, nella tenue atmosfera, la polvere diventa una foschia leggera di granuli minuscoli. Il sole rosso sembra più debole, ma la solitudine no.
        #GEPscience_bd_dust_ToutatisInSpaceLowSunnyLowlands_00 = In orbita bassa sopra il lato illuminato si vede un alone di polvere persistente, con particelle sollevate più in alto di quanto ai pianificatori di missione sarebbe piaciuto.
        #GEPscience_bd_dust_ToutatisInSpaceLowSunnyHighlands_00 = Qui i conteggi dei granuli sono inferiori, ma la distribuzione delle dimensioni si sposta verso particelle più pesanti, suggerendo sorgenti locali e tempi di viaggio brevi.
        #GEPscience_bd_dust_ToutatisInSpaceLowTransitionalLowlands_00 = La regione del terminatore produce la polvere più strana: stati di carica misti e un comportamento di aggregazione che sembra quasi cooperativo.
        #GEPscience_bd_dust_ToutatisInSpaceLowTransitionalHighlands_00 = La densità di polvere varia con il terreno, permettendo una rozza "mappa della polvere" che è anche una mappa dei pericoli per qualunque cosa abbia parti in movimento.
        #GEPscience_bd_dust_ToutatisInSpaceLowDarkSideLowlands_00 = Il lato in ombra è più quieto, con meno impatti e granuli più fini, come polvere che ha avuto molto tempo per depositarsi e riflettere.
        #GEPscience_bd_dust_ToutatisInSpaceLowDarkSideHighlands_00 = Picchi occasionali suggeriscono piccole valanghe o lenti eventi di sollevamento elettrostatico nel freddo. I dati arrivano a casa tardi, come sempre.
        #GEPscience_bd_dust_ToutatisInSpaceLowSoutheasternMountains_00 = Sopra il terreno accidentato, la polvere compare in pennacchi stretti che svaniscono rapidamente, indicando meccanismi di rilascio localizzati e di breve durata.
        #GEPscience_bd_dust_ToutatisInSpaceLowWesternMountains_00 = Il rilevatore vede una scia di incrementi di polvere dietro le montagne, coerente con venti più in basso che modellano l'ambiente di polvere alle quote superiori.
        #GEPscience_bd_dust_ToutatisInSpaceLowDarkSideMountains_00 = I granuli fini formano una nube tenue e a chiazze sopra le montagne in ombra, sostenuta più dalla carica che da un'atmosfera rispettabile.
        #GEPscience_bd_dust_ToutatisInSpaceHigh_00 = Dall'orbita alta, il campo di polvere si assottiglia in una lieve strisciata simile a un anello attorno al pianeta. È bellissimo, nel senso di "per favore non graffiare i pannelli solari".
        #GEPscience_bd_dust_NodensSrfLandedShores_00 = Il sensore si riempie di graniglia umida e cristalli di sale. Sotto il debole sole rosso sembra quasi familiare, finché i numeri non arrivano in ritardo e non sono d'accordo.
        #GEPscience_bd_dust_NodensSrfLandedTropicalLowlands_00 = L'aria densa tiene in sospensione le particelle fini come se ne andasse fiera. Alcuni granuli sembrano sospettosamente organici, ed è un pensiero eccitante da ricevere attraverso un lungo ritardo radio.
        #GEPscience_bd_dust_NodensSrfLandedTemperateLowlands_00 = Un fondo costante di polvere minerale è mescolato a puntini fibrosi che si rifiutano di identificarsi. Il Controllo Missione suggerisce: "non leccare lo strumento".
