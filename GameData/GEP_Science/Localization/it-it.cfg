        #GEPscience_bd_camera_TaranisSrfLandedScorchedLowlands_01 = La fotocamera cattura l'increspatura di calore sopra le pianure bruciate anche senza aria che la trasporti. La foto sembra troppo immobile per un posto così estremo.
