        #JNSQscience_evaReport_EveInSpaceLowPetrolLakes_01 = Ti immagini l'sentore e apprezzi subito l'aria sigillata della cabina.
        #JNSQscience_evaReport_EveInSpaceLowSeaofAkron_00 = Il mare di Akron incide una vistosa chiazza viola nella terra sottostante.
        #JNSQscience_evaReport_EveInSpaceLowSeaofAkron_01 = La luce scintilla sulla superficie in un modo che quasi la fa sembrare invitante. Quasi.
