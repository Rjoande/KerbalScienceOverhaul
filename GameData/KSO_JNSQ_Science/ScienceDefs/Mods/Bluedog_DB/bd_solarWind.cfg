@EXPERIMENT_DEFINITION:HAS[#id[bd_solarWind]]
{
    %RESULTS
    {
        EdnaInSpaceLow* = #JNSQscience_bd_solarWind_EdnaInSpaceLow_00 // Solar wind pings off Edna’s dark surface and comes back carrying a faint dust signature.
		EdnaInSpaceLow* = #JNSQscience_bd_solarWind_EdnaInSpaceLow_01 // Each time Edna occludes Kerbol, the particle counter drops to near-zero, then surges back like it was holding its breath.
		EdnaInSpaceHigh* = #JNSQscience_bd_solarWind_EdnaInSpaceHigh_00 // Out here the wind is thin and steady; Edna just sits in it, collecting a slow rain of ions.
		EdnaInSpaceHigh* = #JNSQscience_bd_solarWind_EdnaInSpaceHigh_01 // The stream direction wobbles in long, lazy cycles... plenty of time to argue whether it’s “wind” or “really fast emptiness.”

		DakInSpaceLow* = #JNSQscience_bd_solarWind_DakInSpaceLow_00 // The little potato charges up fast; sharp spikes appear whenever sunlit dust gets kicked loose.
		DakInSpaceLow* = #JNSQscience_bd_solarWind_DakInSpaceLow_01 // A faint, periodic “whistle” shows up in the data. Mission Control insists it’s just the instrument’s mood.
		DakInSpaceHigh* = #JNSQscience_bd_solarWind_DakInSpaceHigh_00 // Dak barely dents the flow; the solar wind sweeps past as if it forgot to notice the moon at all.
		DakInSpaceHigh* = #JNSQscience_bd_solarWind_DakInSpaceHigh_01 // Occasional dips match Dak’s orbit around Edna, suggesting it sometimes hides in the bigger body’s wake.

        JoolInSpaceLow* = #JNSQscience_bd_solarWind_JoolInSpaceLow_00 // The particle counter keeps “finding” the solar wind, then losing it again in Jool’s roiling magnetic chaos.

        LindorInSpaceLow* = #JNSQscience_bd_solarWind_LindorInSpaceLow_00 // The solar wind slams into Lindor’s magnetic wall and sprays the detector with turbulent, redirected particles.
		LindorInSpaceLow* = #JNSQscience_bd_solarWind_LindorInSpaceLow_01 // Charged particles get herded into looping paths; the readout looks like the wind is being braided.
		LindorInSpaceHigh* = #JNSQscience_bd_solarWind_LindorInSpaceHigh_00 // Far out, the wind is faint but steady—until Lindor’s distant bow shock makes the stream suddenly lumpy.
		LindorInSpaceHigh* = #JNSQscience_bd_solarWind_LindorInSpaceHigh_01 // The flow bends around Lindor long before you get close, like the planet is politely pushing on space itself.

		KrelInSpaceLow* = #JNSQscience_bd_solarWind_KrelInSpaceLow_00 // Most of what you measure down here is Lindor’s magnetosphere sloshing around, with a little solar wind mixed in for flavor.
		KrelInSpaceLow* = #JNSQscience_bd_solarWind_KrelInSpaceLow_01 // Krel’s surface charges up fast; the readings jump whenever sunlight hits fresh dust.
		KrelInSpaceHigh* = #JNSQscience_bd_solarWind_KrelInSpaceHigh_00 // The stream is thin and steady this far out, like Kerbol is whispering from across the system.
		KrelInSpaceHigh* = #JNSQscience_bd_solarWind_KrelInSpaceHigh_01 // A long, lopsided wake trails behind Krel in the flow.

		AdenInSpaceLow* = #JNSQscience_bd_solarWind_AdenInSpaceLow_00 // Aden’s tiny gravity can’t hold onto much, but the solar wind still manages to sandblast it politely.
		AdenInSpaceLow* = #JNSQscience_bd_solarWind_AdenInSpaceLow_01 // The detector records sharp spikes when Lindor’s shadow line sweeps past. Sudden calm, then a hit of charged particles.
		AdenInSpaceHigh* = #JNSQscience_bd_solarWind_AdenInSpaceHigh_00 // Out here you mostly see a weak, clean flow punctuated by occasional bursts from Lindor’s plasma environment.
		AdenInSpaceHigh* = #JNSQscience_bd_solarWind_AdenInSpaceHigh_01 // The wind direction drifts slowly, like it’s trying to remember which way Kerbol is.

		HuygenInSpaceLow* = #JNSQscience_bd_solarWind_HuygenInSpaceLow_00 // Huygen’s upper haze lights up electrically; the solar wind leaves a clear “this is where the atmosphere starts” signature.
		HuygenInSpaceLow* = #JNSQscience_bd_solarWind_HuygenInSpaceLow_01 // You catch pickup ions peeling off the top of the atmosphere and joining the stream like runaway balloons.
		HuygenInSpaceHigh* = #JNSQscience_bd_solarWind_HuygenInSpaceHigh_00 // A broad, gentle bow shock shows up in the data: solar wind, meet thick air; thick air, be annoyed.
		HuygenInSpaceHigh* = #JNSQscience_bd_solarWind_HuygenInSpaceHigh_01 // The flow becomes lumpy and turbulent near Huygen, as if the moon is stirring the wind with an invisible spoon.

		RigaInSpaceLow* = #JNSQscience_bd_solarWind_RigaInSpaceLow_00 // Riga’s near-vacuum offers no cushion; the solar wind hits hard and the sensor sees the splashback as sputtered particles.
		RigaInSpaceLow* = #JNSQscience_bd_solarWind_RigaInSpaceLow_01 // The readings dip sharply in Riga’s wake, then recover in a ragged surge as the flow reconnects.
		RigaInSpaceHigh* = #JNSQscience_bd_solarWind_RigaInSpaceHigh_00 // A faint plasma sheet signature comes and goes. Lindor’s magnetotail makes this “solar wind” feel like a group project.
		RigaInSpaceHigh* = #JNSQscience_bd_solarWind_RigaInSpaceHigh_01 // The particle energy spectrum shifts in slow cycles, matching Riga’s passage through different parts of Lindor’s magnetic environment.

		TalosInSpaceLow* = #JNSQscience_bd_solarWind_TalosInSpaceLow_00 // Talos alternates between calm flow and sudden buffeting, its tilted orbit keeps wandering into and out of Lindor’s magnetic leftovers.
		TalosInSpaceLow* = #JNSQscience_bd_solarWind_TalosInSpaceLow_01 // The detector sees a clean stream, then a messy one, like the solar wind can’t decide if Talos counts as “in the way.”
		TalosInSpaceHigh* = #JNSQscience_bd_solarWind_TalosInSpaceHigh_00 // Farther up, the wind is weaker but steadier.
		TalosInSpaceHigh* = #JNSQscience_bd_solarWind_TalosInSpaceHigh_01 // A thin, stretched wake trails behind Talos, pointing like an arrow that refuses to agree with the navball.

        CelesInSpaceLow* = #JNSQscience_bd_solarWind_CelesInSpaceLow_00 // With no shielding, Celes takes the solar wind right on the surface; the sensor catches a spray of sputtered particles.
		CelesInSpaceLow* = #JNSQscience_bd_solarWind_CelesInSpaceLow_01 // Sunlit terrain charges up and the readings jump in sharp, dusty bursts whenever you cross the terminator.
		CelesInSpaceHigh* = #JNSQscience_bd_solarWind_CelesInSpaceHigh_00 // Out here the wind is cleaner; occasional dips hint at Eeloo’s wake drifting through the stream.
		CelesInSpaceHigh* = #JNSQscience_bd_solarWind_CelesInSpaceHigh_01 // You log a slow rain of ions and wonder how long it takes to “sandblast” ice with something you can’t see.

		TamInSpaceLow* = #JNSQscience_bd_solarWind_TamInSpaceLow_00 // Tam’s loose rubble crackles with static; the detector records little surges as dust grains charge and lift.
		TamInSpaceLow* = #JNSQscience_bd_solarWind_TamInSpaceLow_01 // The solar wind implants itself into the surface, leaving a signature that reads like “space has been here a while.”
		TamInSpaceHigh* = #JNSQscience_bd_solarWind_TamInSpaceHigh_00 // The wind is thin and quiet, broken by brief patches of disturbed flow from Eeloo’s neighborhood.
		TamInSpaceHigh* = #JNSQscience_bd_solarWind_TamInSpaceHigh_01 // Direction and energy drift in lazy waves—space weather, but with a distant, icy moon making the rules.

		HamekInSpaceLow* = #JNSQscience_bd_solarWind_HamekInSpaceLow_00 // The solar wind peppers Hamek’s surface and kicks off a faint cloud of ions, as if the ground is shedding sparks.
		HamekInSpaceLow* = #JNSQscience_bd_solarWind_HamekInSpaceLow_01 // The sensor reports steady implantation into the topmost grains—space slowly “seasoning” the regolith.
		HamekInSpaceHigh* = #JNSQscience_bd_solarWind_HamekInSpaceHigh_00 // The stream is weak this far out, but it’s relentless; the detector counts particles like slow, patient footsteps.
		HamekInSpaceHigh* = #JNSQscience_bd_solarWind_HamekInSpaceHigh_01 // Long stretches of calm are interrupted by brief gusts—just enough to remind you Kerbol still reaches here.

        NaraInSpaceLow* = #JNSQscience_bd_solarWind_NaraInSpaceLow_00 // The solar wind piles up ahead of Nara like a glowing bow wave; the readings get rough and jumpy fast.
		NaraInSpaceLow* = #JNSQscience_bd_solarWind_NaraInSpaceLow_01 // Charged particles skim the top of Nara’s thick air and get flung aside, leaving a sharp “do not enter” line in the data.
		NaraInSpaceHigh* = #JNSQscience_bd_solarWind_NaraInSpaceHigh_00 // Far above Nara, the wind is faint but still bends early—something big and invisible is pushing back.
		NaraInSpaceHigh* = #JNSQscience_bd_solarWind_NaraInSpaceHigh_01 // The detector logs a broad, slow ripple pattern that looks suspiciously like Nara’s magnetosphere breathing.

		AmosInSpaceLow* = #JNSQscience_bd_solarWind_AmosInSpaceLow_00 // Amos has no shield at all; the solar wind hits the surface and a thin spray of ions answers back.
		AmosInSpaceLow* = #JNSQscience_bd_solarWind_AmosInSpaceLow_01 // The flux drops suddenly as Amos slips into Nara’s wake, then snaps back when it re-enters open flow.
		AmosInSpaceHigh* = #JNSQscience_bd_solarWind_AmosInSpaceHigh_00 // Out here the stream is clean and steady, with occasional rough patches from Nara’s distant magnetic tail.
		AmosInSpaceHigh* = #JNSQscience_bd_solarWind_AmosInSpaceHigh_01 // The wind direction drifts just enough to make the navball arguments start up again.

		EnonInSpaceLow* = #JNSQscience_bd_solarWind_EnonInSpaceLow_00 // The solar wind sputters material off Enon’s cold surface; the sensor catches a faint “icy grit” signature.
		EnonInSpaceLow* = #JNSQscience_bd_solarWind_EnonInSpaceLow_01 // Sunlit terrain charges up and the instrument reports sharp spikes, like the moon is crackling under a wool sweater.
		EnonInSpaceHigh* = #JNSQscience_bd_solarWind_EnonInSpaceHigh_00 // A thin, fast stream slides past Enon with little warning; the counts feel like they’re arriving from very far away.
		EnonInSpaceHigh* = #JNSQscience_bd_solarWind_EnonInSpaceHigh_01 // Brief turbulence hints at Nara’s influence even out here—space weather, courtesy of the parent planet.

		PraxInSpaceLow* = #JNSQscience_bd_solarWind_PraxInSpaceLow_00 // The solar wind behaves until Prax crosses into Nara’s disturbed region, where the numbers turn into a noisy mess.
		PraxInSpaceLow* = #JNSQscience_bd_solarWind_PraxInSpaceLow_01 // You log bursts of particles that look like dust charging and lifting, then settling as the shadow line passes.
		PraxInSpaceHigh* = #JNSQscience_bd_solarWind_PraxInSpaceHigh_00 // The stream is weak but relentless; the detector ticks away like a metronome set to “outer system.”
		PraxInSpaceHigh* = #JNSQscience_bd_solarWind_PraxInSpaceHigh_01 // A stretched wake signature trails behind Prax, as if the moon is drawing a line through the wind with a blunt pencil.
    }
}