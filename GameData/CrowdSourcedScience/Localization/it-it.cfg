        #CSS_atmosphereAnalysis_EveSrfLandedMidlands_00 = L'aria è pesante, calda e per niente accogliente.
        #CSS_atmosphereAnalysis_EveSrfLandedMidlands_01 = Ora sei assolutamente certo che il viola sia un colore strano.
