        #GEPscience_bd_UVspec_AirmedInSpaceHigh_00 = From high orbit, Airmed is a tiny, two-toned fleck with a lot of empty space around it. The spectrum is cleanest when you stop expecting it to be comfortable.

        #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalCraquelure_00 = UV absorption bands deepen over the cracked terrain, suggesting a haze-rich atmosphere that loves swallowing short wavelengths. The surface below looks like it’s trying to peel away from the cold.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateCraquelure_00 = The spectrometer catches subtle UV scattering changes that track with the crack patterns, as if gases pool and thin along them. Borvo’s “low pressure” still has plenty of opinions.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalLowlands_00 = The atmosphere writes broad, smooth UV absorption over a muted surface reflectance. Methane signatures stand out even under Grannus’ dim light, which is unfairly efficient.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateLowlands_00 = A faint ultraviolet haze shoulder appears, consistent with photochemical smog building up high above. You save the plot as “definitely not just fog.”
        #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalMidlands_00 = Over higher ground the surface contributes more to the UV curve, sharpening the slope and exposing mineral hints. The planet still keeps most of its secrets behind a thin, cold veil.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateMidlands_00 = The UV spectrum steadies into repeatable bands, then drifts as winds move the upper haze around. You can almost hear the atmosphere shuffling papers.
        #GEPscience_bd_UVspec_BorvoInSpaceLowHighlands_00 = The UV return brightens slightly, possibly from cleaner air columns or lighter surface material. For a moment, the data feels close—then the comm delay reminds you it isn’t.
        #GEPscience_bd_UVspec_BorvoInSpaceLowMajorCraters_00 = The craters show a distinctive UV albedo pattern, as if excavated material reflects differently than the surrounding plains. The atmosphere softens the contrast, like it’s trying to be polite.
