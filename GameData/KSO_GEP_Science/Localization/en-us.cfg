        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceHigh_00 = From far up, Toutatis is a bright half and a dead half, with a thin twilight seam where the interesting questions live.

        #GEPscience_tantares_infrared_light_camera_NodensSrfLandedShores_00 = The surf line shows up as a sharp thermal edge - warm water, cooler land, and one very warm camera operator.
        #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTropicalLowlands_00 = The lowlands radiate all the day's heat back at you. The air is thick enough that even shadows feel warm.
        #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTemperateLowlands_00 = Thermal contrast is subtle here; you end up calibrating the camera against your own helmet's hot spots.
        #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTropicalMidlands_00 = Warm ridges and cooler gullies paint a topographic map in heat. The data packet will arrive... eventually.
        #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTemperateMidlands_00 = The ground cools in neat patches, like different rocks are playing different games. The camera approves.
