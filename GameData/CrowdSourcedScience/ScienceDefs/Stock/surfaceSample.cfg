        IkeSrfLandedLowlands* = #CSS_surfaceSample_IkeSrfLandedLowlands_00 // The surface sample is one of the darkest colored things you have ever encountered in your life. You put it in the bottom of the sample container and try to forget how much it scared you.
        IkeSrfLandedLowlands* = #CSS_surfaceSample_IkeSrfLandedLowlands_01 // The lowlands soil is dark and loose. As a joke you put some in your pipe and smoke it - it caught fire and you now have to explain to Mission Control why the fire alarm went off.
