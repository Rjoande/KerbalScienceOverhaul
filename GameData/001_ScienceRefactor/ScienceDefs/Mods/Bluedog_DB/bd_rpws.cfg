@EXPERIMENT_DEFINITION:HAS[#id[bd_rpws]]
{
    @title = #ScienceRefactor_bd_rpws_title // Radio Plasma Wave Data
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_rpws_default_00 // You measure background radio and plasma interference.
        InSpace* = #ScienceRefactor_bd_rpws_default_01 // Measurements of localized plasma waves are taken.
        InSpace* = #ScienceRefactor_bd_rpws_default_02 // Radio waves and ionized particles are recorded.
        InSpace* = #ScienceRefactor_bd_rpws_default_03 // Radio waves and ionized particles are recorded. This will be a sick mixtape.

        SunInSpace* = #ScienceRefactor_bd_rpws_SunInSpace_00 // The star fills space with background radiation detectable in the radio wavelength.
        SunInSpaceLow* = #ScienceRefactor_bd_rpws_SunInSpaceLow_00 // Very powerful radio waves are given off by star.
        SunInSpaceHigh* = #ScienceRefactor_bd_rpws_SunInSpaceHigh_00 // Charged particles are detected even at this distance.

        MohoInSpace* = #ScienceRefactor_bd_rpws_MohoInSpace_00 // Radio Plasma Wave Data recorded from Moho.
        MohoInSpace* = #ScienceRefactor_bd_rpws_MohoInSpace_01 // There is no atmospheric interference coming from Moho.
        MohoInSpace* = #ScienceRefactor_bd_rpws_MohoInSpace_02 // *Loud static and whining*

        EveInSpace* = #ScienceRefactor_bd_rpws_EveInSpace_00 // Eve's powerful magnetic field appear to be deflecting a lot of ionized particles.
        EveInSpaceLow* = #ScienceRefactor_bd_rpws_EveInSpaceLow_00 // Analysis of the recorded data hints to lightning as the cause of the radio disturbance.
        EveInSpaceHigh* = #ScienceRefactor_bd_rpws_EveInSpaceHigh_00 // Charged particles are detected all along Eve's magnetotail.

		GillyInSpace* = #ScienceRefactor_bd_rpws_GillyInSpace_00 // Radio interference recorded is found to be particles deflected by Eve.

        KerbinInSpace* = #ScienceRefactor_bd_rpws_KerbinInSpace_00 // Radio interference is caused by deflections from the atmosphere.
        KerbinInSpaceLow* = #ScienceRefactor_bd_rpws_KerbinInSpaceLow_00 // You pickup a radio broadcast of a heated scientific debate. Unsurprisingly the Kraken is winning.
        KerbinInSpaceLow* = #ScienceRefactor_bd_rpws_KerbinInSpaceLow_01 // The Kerbin atmosphere is found to deflect a lot of particles and long-wavelength radio waves.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_rpws_KerbinInSpaceHigh_00 // Radio signals mixed with deflected charged particles are detected.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_rpws_KerbinInSpaceHigh_01 // *static* Get off this frequency... *static*
        KerbinInSpaceHigh* = #ScienceRefactor_bd_rpws_KerbinInSpaceHigh_02 // A strong carrier wave from a DSN Antenna is detected.

		MunInSpace* = #ScienceRefactor_bd_rpws_MunInSpace_00 // Radio plasma recordings from around the Mun further evidence the lack of atmosphere.
		MunInSpaceLow* = #ScienceRefactor_bd_rpws_MunInSpaceLow_00 // A strange transmission is picked up from the dark side of the Mun *static* sun is *static* same *static* relative *static* you're older *static*...

		MinmusInSpace* = #ScienceRefactor_bd_rpws_MinmusInSpace_00 // Ionized particles detected along with background radio signals from Kerbin.
		MinmusInSpace* = #ScienceRefactor_bd_rpws_MinmusInSpace_01 // Deflected radio waves from Kerbin are found to reach as far our as Minmus.

        DunaInSpace* = #ScienceRefactor_bd_rpws_DunaInSpace_00 // Data shows some localized radio deflections or emissions on the northern hemisphere.
        DunaInSpace* = #ScienceRefactor_bd_rpws_DunaInSpace_01 // The antennas record some low-gain interference with intermittent bounces likely cause by faint ionized particles.
        DunaInSpaceLow* = #ScienceRefactor_bd_rpws_DunaInSpaceLow_00 // There appears to be some sort of ionization happening on the lower atmosphere, despite its weak nature.

		IkeInSpace* = #ScienceRefactor_bd_rpws_IkeInSpace_00 // Radio wavelength analysis show ionized interference not originated from Ike or Duna.
		IkeInSpace* = #ScienceRefactor_bd_rpws_IkeInSpace_01 // Recordings show only background waves caused by either Jool or Kerbol.

        DresInSpace* = #ScienceRefactor_bd_rpws_DresInSpace_00 // Kerbol's electromagnetic radiation is still strongly detected at this distance.
        DresInSpace* = #ScienceRefactor_bd_rpws_DresInSpace_01 // Wave analysis indicates surface scattering unhindered by any atmosphere.

        JoolInSpace* = #ScienceRefactor_bd_rpws_JoolInSpace_00 // The strong magnetic field deflects a vast amount of the star's solar radiation.
        JoolInSpaceLow* = #ScienceRefactor_bd_rpws_JoolInSpaceLow_00 // The inside of the planet's magnetosphere registers much different wave patterns than those from outside.
        JoolInSpaceHigh* = #ScienceRefactor_bd_rpws_JoolInSpaceHigh_00 // Jool's magnetic field creates unique radio wave disruptions that should hint at its internal composition.

		LaytheInSpace* = #ScienceRefactor_bd_rpws_LaytheInSpace_00 // Jool's magnetic fields appear to be trapping a lot of plasma on Laythe's orbit.
		LaytheInSpace* = #ScienceRefactor_bd_rpws_LaytheInSpace_01 // The antennas record a symphony of radio signals caused by strong magnetic interactions between the planet and Laythe.
		LaytheInSpaceLow* = #ScienceRefactor_bd_rpws_LaytheInSpaceLow_00 // 4, 8, 15, 16, 23, 42... 4, 8, 15, 16...

		VallInSpace* = #ScienceRefactor_bd_rpws_VallInSpace_00 // Energized particles caused by the planet's ionosphere continue to echo even at the altitude.
		VallInSpace* = #ScienceRefactor_bd_rpws_VallInSpace_01 // Radio wave data recorded from around Vall. The planet still heavily influences all activity in this spectrum.

		TyloInSpace* = #ScienceRefactor_bd_rpws_TyloInSpace_00 // Tylo is found to also be largely shielded by the planet's magnetic field.
		TyloInSpace* = #ScienceRefactor_bd_rpws_TyloInSpace_01 // Faint ionized particles detected to echo behind Tylo, likely deflected during its orbit.

		PolInSpace* = #ScienceRefactor_bd_rpws_PolInSpace_00 // Pol appears to have little interaction with charged particles from the planet.
		PolInSpace* = #ScienceRefactor_bd_rpws_PolInSpace_01 // Background echoes from the planet recorded at this altitude appear to be a hit on social media, but are of little scientific value.

		BopInSpace* = #ScienceRefactor_bd_rpws_BopInSpace_00 // A signal faintly resembling Morse code is detected but follows no discernible electronic or natural pattern.
		BopInSpace* = #ScienceRefactor_bd_rpws_BopInSpace_01 // Radio signals detected look to be a heavily degraded bounce of the spacecraft's own signal; likely deflected by the bow shock of the planet's magnetic field.

        EelooInSpace* = #ScienceRefactor_bd_rpws_EelooInSpace_00 // There's no detectable ionization patterns from the background waves detected around Eeloo.
        EelooInSpace* = #ScienceRefactor_bd_rpws_EelooInSpace_01 // A very fain signal from Kerbin's DSN is detected.

        AsteroidInSpaceMettalic* = #ScienceRefactor_bd_rpws_AsteroidInSpaceMettalic_00 // Radio wave disruption suggest some magnetic iteration from the asteroid.
        AsteroidInSpaceStony* = #ScienceRefactor_bd_rpws_AsteroidInSpaceStony_00 // The asteroid appears to have no magnetic interaction with traveling waves.

        SarnusInSpace* = #ScienceRefactor_bd_rpws_SarnusInSpace_00 // Radio emission measurements ranging around 50 to 500 kHz are analyzed to get a more accurate rate of the planet's rotation by its periodic effect on chargd particles
        SarnusInSpace* = #ScienceRefactor_bd_rpws_SarnusInSpace_01 // The antennae record very eerie sounds as radio sources move with the magnetic field
        SarnusInSpace* = #ScienceRefactor_bd_rpws_SarnusInSpace_02 // Sarnus is found to have a very complex range of incredibly powerful radio emissions
        SarnusInSpace* = #ScienceRefactor_bd_rpws_SarnusInSpace_03 // Measurements of the rotation rate of the planet's plasma give good indication of the speed at which the magnetic lines rotate; as the plasma is directly affected by the magnetic field

		TektoInSpace* = #ScienceRefactor_bd_rpws_TektoInSpace_00 // Recording show that the ionosphere's structure and dynamics are greatly affected by Sarnus' magnetosphere
		TektoInSpace* = #ScienceRefactor_bd_rpws_TektoInSpace_01 // Atoms and molecules in the moon's upper atmosphere appear to be ionized by high energy particles originating from both Kerbol and a bombardment by Sarnus' magnetosphere

		SlateInSpaceHigh* = #ScienceRefactor_bd_rpws_SlateInSpaceHigh_00 // The instrument records some background noise from the planet
		SlateInSpace* = #ScienceRefactor_bd_rpws_SlateInSpace_00 // Some detected noise is found to be an emission of plasma either deflected or generated by Sarnus
		SlateInSpaceLow* = #ScienceRefactor_bd_rpws_SlateInSpaceLow_00 // There is very little recorded interaction from the moon below. Likely due to the a lack of both atmosphere or active magnetism

		HaleInSpaceHigh* = #ScienceRefactor_bd_rpws_HaleInSpaceHigh_00 // Recorded disturbances resonate in a similar pattern matching the planet's rings
		HaleInSpaceLow* = #ScienceRefactor_bd_rpws_HaleInSpaceLow_00 // Measurements hardly distinguish the moon from the rings in which it resides
		HaleInSpace* = #ScienceRefactor_bd_rpws_HaleInSpace_00 // The instrument records some background noise from the planet

		OvokInSpaceHigh* = #ScienceRefactor_bd_rpws_OvokInSpaceHigh_00 // Recorded disturbances resonate in a similar pattern matching the planet's rings
		OvokInSpace* = #ScienceRefactor_bd_rpws_OvokInSpace_00 // Radio interference recorded is found to be just the rings in the background

        UrlumInSpace* = #ScienceRefactor_bd_rpws_UrlumInSpace_00 // Incredibly complex radio signatures are recorded quite unlike any other body in the solar system
        UrlumInSpace* = #ScienceRefactor_bd_rpws_UrlumInSpace_01 // Radio signatures confirm that Urlum has a very powerful and active magnetic field given its effect on solar plasma

		WalInSpaceLow* = #ScienceRefactor_bd_rpws_WalInSpaceLow_00 // The instrument detects radio disturbances as the moon interacts with Urlum's magnetosphere
		WalInSpaceHigh* = #ScienceRefactor_bd_rpws_WalInSpaceHigh_00 // A swirl of ionized particles is detected, stirred up by the motion of Wal's sub-satellite, Tal

        TalInSpace* = #ScienceRefactor_bd_rpws_TalInSpace_00 // Radio interference is consistent with metallic material disrupting Wal's magnetic field
        TalInSpace* = #ScienceRefactor_bd_rpws_TalInSpace_01 // Plasma interactions appear to be timed with Tal's orbit around its parent moon

		PriaxInSpaceHigh* = #ScienceRefactor_bd_rpws_PriaxInSpaceHigh_00 // Very small fluctuations are detected at this altitude, but do not appear to be caused by Priax
		PriaxInSpaceLow* = #ScienceRefactor_bd_rpws_PriaxInSpaceLow_00 // Another pass of radio-plasma science still only detect background radiation from Urlum

		PoltaInSpaceHigh* = #ScienceRefactor_bd_rpws_PoltaInSpaceHigh_00 // The instrument detects the effects of the Polta-Priax orbital resonance
		PoltaInSpaceLow* = #ScienceRefactor_bd_rpws_PoltaInSpaceLow_00 // Varying measurements suggest Polta might either contain some liquid under its crust, or be geologically active

        NeidonInSpace* = #ScienceRefactor_bd_rpws_NeidonInSpace_00 // Neidon has some strong radio-plasma readings, particularly  at the higher magnetic latitudes, near its North pole
        NeidonInSpace* = #ScienceRefactor_bd_rpws_NeidonInSpace_01 // Measurements of the affected solar plasma are consistent with the transient effect of non-dipolar components within its magnetic field

		ThatmoInSpaceHigh* = #ScienceRefactor_bd_rpws_ThatmoInSpaceHigh_00 // There is some interference detected which could be some ionization process occurring on Thatmo's upper atmosphere
		ThatmoInSpaceLow* = #ScienceRefactor_bd_rpws_ThatmoInSpaceLow_00 // The radio antennas detect a measurable disturbance on Neidon's background radio emissions as the moon passes by
    }
}