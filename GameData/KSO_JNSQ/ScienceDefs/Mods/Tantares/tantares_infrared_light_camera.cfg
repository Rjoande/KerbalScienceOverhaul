@EXPERIMENT_DEFINITION:HAS[#id[tantares_infrared_light_camera]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_tantares_infrared_light_camera_SunFlyingLow_00 // The infrared camera sees nothing but heat and a very concerned craft silhouette.
        SunFlyingLow* = #JNSQscience_tantares_infrared_light_camera_SunFlyingLow_01 // Local turbulence scribbles warm streaks across the view. You record it and do not linger.
        SunFlyingLow* = #JNSQscience_tantares_infrared_light_camera_SunFlyingLow_02 // The infrared image is just a single, angry color. The camera politely suggests you leave.
        SunFlyingLow* = #JNSQscience_tantares_infrared_light_camera_SunFlyingLow_03 // Everything is hot, including the lens housing. Especially the lens housing.
        SunFlyingHigh* = #JNSQscience_tantares_infrared_light_camera_SunFlyingHigh_00 // At altitude, the Sun becomes a layered glow: brighter beneath, darker above, all of it hostile.
        SunFlyingHigh* = #JNSQscience_tantares_infrared_light_camera_SunFlyingHigh_01 // The sensor rides the edge of saturation while faint structure slides past like waves of warmth.
        SunFlyingHigh* = #JNSQscience_tantares_infrared_light_camera_SunFlyingHigh_02 // Thermal contours ripple and twist across the blazing disc as the camera tries to keep up with the turbulence.
        SunFlyingHigh* = #JNSQscience_tantares_infrared_light_camera_SunFlyingHigh_03 // You capture cooler dark patches surrounded by brighter rims, like the Sun is scowling at your spacecraft.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthPolarZone_00 // Infrared mapping shows a patchwork of hot filaments and cooler pockets, arranged like someone spilled science on a globe.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthPolarZone_01 // The polar zone trends slightly cooler in broad averages, but the fine structure is still pure chaos.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthSubpolarZone_00 // Heat blooms and fades in looping bands as the camera tracks unstable, shifting thermal patterns.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthSubpolarZone_01 // The instrument flags “rapid variability” and then runs out of warning labels.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthTemperateZone_00 // Temperature gradients form long streaks that shear past each other, hinting at powerful flows beneath the bright surface.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthTemperateZone_01 // You spot several cooler ovals drifting across hotter background, like slow-moving bruises on a furnace.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthTropicZone_00 // Infrared contrast reveals broad hot lanes threaded with cooler gaps, as if the Sun is breathing through a grate.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowNorthTropicZone_01 // A bright thermal arc grows, twists, and fades before you can finish saying “that seems normal.”
        SunInSpaceLowEquatorialZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowEquatorialZone_00 // The equatorial belt shows the strongest thermal banding, with hot ridges marching along like a conveyor of trouble.
        SunInSpaceLowEquatorialZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowEquatorialZone_01 // The camera’s map looks like a weather report written by someone who has never felt fear before.
