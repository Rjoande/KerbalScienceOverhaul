        #GEPscience_bd_massSpec_GrannusInSpaceLow_00 = Idrogeno ed elio dominano la scansione, lo spettro sussulta per le particelle cariche e lo strumento, premuroso, lo riassume come "molto stellare".
        #GEPscience_bd_massSpec_GrannusFlyingLow_00 = L'idrogeno ionizzato inonda il rivelatore, mentre pochi ioni più pesanti viaggiano insieme come clandestini nel vento stellare.
        #GEPscience_bd_massSpec_GrannusFlyingHigh_00 = Il segnale si assottiglia ma resta aggressivo: i picchi dell'elio rimangono netti e la pioggia di particelle continua a litigare con l'elettronica.
        #GEPscience_bd_massSpec_TaranisInSpaceLow_00 = Compare una tenue esosfera sbilanciata: atomi metallici evaporati sotto il debole sole rosso e alla deriva verso il lato freddo.
        #GEPscience_bd_massSpec_TaranisSrfLandedMagmaShores_00 = I vapori di silicati impennano vicino al suolo rovente, la valvola d'aspirazione ti chiede educatamente di smetterla di librarti vicino a cose fuse.
        #GEPscience_bd_massSpec_TaranisSrfLandedScorchedLowlands_00 = Perlopiù ioni derivati dalla roccia: sodio, potassio e parecchio "appena cotto", senza nulla ad addolcire la lettura se non distanza e ritardo.
        #GEPscience_bd_massSpec_TaranisSrfLandedMidlands_00 = Quasi nessun gas: solo granuli di polvere ostinati e tracce di metalli sputterati, come se il pianeta razionasse i suoi atomi.
        #GEPscience_bd_massSpec_TaranisSrfLandedHighlands_00 = Tenui sussurri di vapori metallici e frammenti ossidati, il sole rosso cuoce le cime mentre Kerbin aspetta pazientemente i dati.
        #GEPscience_bd_massSpec_TaranisSrfLandedDarkSideMidlands_00 = I volatili intrappolati dal freddo compaiono in picchi brevi e silenziosi, monossido di carbonio e un lieve accenno di azoto, poi svaniscono mentre il sensore si scalda.
        #GEPscience_bd_massSpec_TaranisSrfLandedDarkSideHighlands_00 = La scansione intercetta molecole nate dalla brina come un tesoro nell'ombra, appena arriva il calore, l'inventario comincia a sparire.
        #GEPscience_bd_massSpec_TaranisSrfLandedPoles_00 = Firme miste da entrambi gli emisferi: sputtering del lato caldo e brina del lato freddo che discutono su chi dei due meriti di chiamarsi "atmosfera".
        #GEPscience_bd_massSpec_ToutatisInSpaceLow_00 = La CO2 segue il pianeta in un alone sottile e sfrangiato, gli ioni scivolano via sottovento e il Controllo Missione riceve i numeri dopo una lunga pausa silenziosa.
        #GEPscience_bd_massSpec_ToutatisFlyingLow_00 = Domina la CO2 con azoto e argon al seguito, la polvere in sospensione aggiunge picchi extra etichettati "probabilmente colpa di qualcosa che hai fatto".
        #GEPscience_bd_massSpec_ToutatisFlyingHigh_00 = L'aria alta è rara e in parte ionizzata, frammenti di ossigeno e monossido di carbonio compaiono dove la luce rossa morde più forte.
        #GEPscience_bd_massSpec_ToutatisSrfLandedSunnyLowlands_00 = L'aria del lato caldo è soprattutto CO2, ma il terreno cotto aggiunge composti del carbonio come se stesse espirando attraverso le crepe.
        #GEPscience_bd_massSpec_ToutatisSrfLandedSunnyHighlands_00 = CO2 sottile con un retrogusto metallico dalla roccia levigata dal vento, lo strumento in pratica sorseggia vuoto e lo chiama lavoro.
        #GEPscience_bd_massSpec_ToutatisSrfLandedTransitionalLowlands_00 = La composizione si stabilizza: CO2, un soffio di azoto e abbastanza argon da dimostrare che il display non è solo solitudine.
        #GEPscience_bd_massSpec_ToutatisSrfLandedTransitionalHighlands_00 = La "zona di comfort" ha comunque un sapore tagliente e rarefatto, le raffiche continuano a buttare graniglia nell'analizzatore proprio mentre si apre la finestra di uplink.
        #GEPscience_bd_massSpec_ToutatisSrfLandedDarkSideLowlands_00 = I cold trap trattengono brina di CO2 e volatili in traccia, la scansione sembra l'inventario di un congelatore, scritto in massa su carica.
        #GEPscience_bd_massSpec_ToutatisSrfLandedDarkSideHighlands_00 = L'aria si assottiglia fino a quasi nulla, la maggior parte di ciò che si registra è sublimazione lenta e qualche ione solitario che passa di lì.
        #GEPscience_bd_massSpec_ToutatisSrfLandedSoutheasternMountains_00 = La polvere di roccia domina lo spettro, lo spettrometro di massa segnala tracce più pesanti che potrebbero essere concentrate in queste dorsali.
        #GEPscience_bd_massSpec_ToutatisSrfLandedWesternMountains_00 = Un mix di CO2 e minerali polverizzati, l'analizzatore richiede un copripolvere, un cambio filtro e una durata di missione più breve.
        #GEPscience_bd_massSpec_ToutatisSrfLandedDarkSideMountains_00 = Perlopiù frammenti di CO2 e granuli minerali ostinati, il silenzio fuori rende il ritardo nelle comunicazioni ancora più lungo.
        #GEPscience_bd_massSpec_NodensInSpaceLow_00 = L'alta atmosfera filtra nello spazio in sottili fili ionizzati, il display sembra familiare finché la chimica in luce rossa non comincia a scarabocchiare ai margini.
        #GEPscience_bd_massSpec_NodensFlyingLow_00 = Azoto e ossigeno dominano, con acqua e gas in traccia al seguito, è quasi rassicurante, finché non ricordi quanto lontano devono viaggiare i dati per tornare a casa.
        #GEPscience_bd_massSpec_NodensFlyingHigh_00 = L'aria si assottiglia e diventa reattiva, i frammenti fotochimici schizzano sotto il debole sole rosso e l'analizzatore continua a chiedere se "volevamo davvero stare quassù".
        #GEPscience_bd_massSpec_NodensSrfLandedShores_00 = Aerosol di sale marino e minerali umidi inondano lo spettro, la macchina "sente" l'oceano, ma insiste che è solo rigore scientifico.
        #GEPscience_bd_massSpec_NodensSrfLandedTropicalLowlands_00 = Aria calda e pesante trasporta acqua e lievi tracce organiche, lo strumento etichetta diversi picchi come "interessanti" e poi tace per una lunga finestra di uplink.
        #GEPscience_bd_massSpec_NodensSrfLandedTemperateLowlands_00 = Un mix stabile di gas comuni con polvere del suolo mescolata, è quel tipo di normalità che ottieni solo su un mondo che non è il tuo.
        #GEPscience_bd_massSpec_NodensSrfLandedTropicalMidlands_00 = Aria più secca, più graniglia minerale e una foschia ostinata di frammenti ignoti, il sole rosso cuoce tutto lentamente e a fondo.
        #GEPscience_bd_massSpec_NodensSrfLandedTemperateMidlands_00 = Perlopiù gas banali, più un piccolo gruppo tagliente di composti in traccia che si rifiuta di combaciare con la libreria su Kerbin.
        #GEPscience_bd_massSpec_NodensSrfLandedHighlands_00 = Aria sottile e polvere di roccia dominano, ioni più pesanti compaiono come se le colline stessero perdendo la loro chimica nel vento, in silenzio.
        #GEPscience_bd_massSpec_NodensSrfLandedTundra_00 = Aria fredda, poca umidità e un lieve sentore di volatili intrappolati, lo spettro sembra un congelatore sigillato da secoli.
        #GEPscience_bd_massSpec_NodensSrfLandedIceCaps_00 = Le firme del ghiaccio d'acqua sono forti, ma i picchi in traccia sono più strani: molecole conservate dal freddo che esistono solo perché qui il sole non brilla come a casa.
        #GEPscience_bd_massSpec_BelisamaInSpaceLow_00 = Quasi vuoto, con un pizzico di atomi sputterati e plasma di passaggio da Nodens, i picchi arrivano in scatti solitari, come messaggi che non sanno se qualcuno stia ascoltando.
        #GEPscience_bd_massSpec_BelisamaSrfLandedFlats_00 = L'aspirazione campiona quasi solo polvere, dominano frammenti metallici e silicati, con qualche fantasma volatile che svanisce appena l'analizzatore si scalda.
        #GEPscience_bd_massSpec_BelisamaSrfLandedTropicalLowlands_00 = "Tropicali" significa regolite cotta dal sole, lo spettro è roccia calda, vuoto più freddo e un picco ostinato che potrebbe essere sodio.
        #GEPscience_bd_massSpec_BelisamaSrfLandedTemperateLowlands_00 = Minerali a grana fine e metalli in traccia, sabbiati fino all'uniformità da tempo e maree, Nodens resta sospeso sopra come promemoria.
        #GEPscience_bd_massSpec_BelisamaSrfLandedTropicalMidlands_00 = La polvere diventa più tagliente e più vetrosa, lo spettrometro di massa chiede educatamente se abbiamo portato abbastanza filtri per un'intera luna.
        #GEPscience_bd_massSpec_BelisamaSrfLandedTemperateMidlands_00 = Pochi volatili, molti frammenti di roccia e una sottile brinata di ioni impiantati, è come se la superficie stesse collezionando meteo spaziale in silenzio.
        #GEPscience_bd_massSpec_BelisamaSrfLandedHighlands_00 = Altitudine elevata, pressione bassa e tanti silicati fratturati, ogni picco dello spettro sembra scalpellato direttamente dal paesaggio.
        #GEPscience_bd_massSpec_BelisamaSrfLandedPoles_00 = Le molecole intrappolate dal freddo compaiono per un attimo, poi svaniscono mentre la luce del sole cambia, l'analizzatore le registra lo stesso, per qualcuno molto lontano che le interpreterà più tardi.
        #GEPscience_bd_massSpec_SucellusInSpaceLow_00 = Un'esosfera tenue di metalli sputterati circonda questo mondo nano, lo strumento la chiama "atmosfera" solo perché deve scrivere qualcosa nella casella.
        #GEPscience_bd_massSpec_SucellusSrfLandedBasins_00 = La polvere dei bacini è ricca di frammenti pesanti, lo spettro tende al metallico, come se il suolo ti stesse sfidando a provare a estrarre risorse così lontano da casa.
        #GEPscience_bd_massSpec_SucellusSrfLandedLowlands_00 = Dominano silicati e granuli ricchi di ferro, i volatili in traccia compaiono come picchi fugaci, come se la superficie respirasse controvoglia.
        #GEPscience_bd_massSpec_SucellusSrfLandedTropicalMidlands_00 = La regolite illuminata dal sole rilascia un sottile filo di gas, la maggior parte di ciò che misuri è comunque solo polvere che prova a diventare dati.
        #GEPscience_bd_massSpec_SucellusSrfLandedTemperateMidlands_00 = Il profilo chimico si stabilizza in "roccia e altra roccia", con qualche ione impiantato che suggerisce un ambiente spaziale vivace sotto il sole rosso.
        #GEPscience_bd_massSpec_SucellusSrfLandedHighlands_00 = Granuli più grossi, picchi metallici più puliti e quasi nessun volatile, le alture sembrano antiche, secche e molto sicure di sé.
        #GEPscience_bd_massSpec_SucellusSrfLandedPoles_00 = I cold trap trattengono deboli firme molecolari, i picchi sono delicati, come se potessero volare via se li guardi troppo intensamente.
        #GEPscience_bd_massSpec_CaireenInSpaceLow_00 = Il piccolo Caireen lascia trapelare un sussurro di atomi nello spazio, per lo più lo spettrometro vede polvere e il vuoto tra lunghi ping di comunicazione.
        #GEPscience_bd_massSpec_CaireenSrfLandedLowlands_00 = La regolite leggera inonda l'aspirazione, dominano frammenti minerali, con qualche volatile anomalo che suggerisce che questa luna sia stata catturata con i suoi segreti intatti.
        #GEPscience_bd_massSpec_CaireenSrfLandedMidlands_00 = Lo spettro è soprattutto roccia frantumata e adesione elettrostatica, il campione si comporta come se volesse andarsene e non tornare mai più giù.
        #GEPscience_bd_massSpec_CaireenSrfLandedHighlands_00 = Compaiono granuli più grossi e tracce metalliche più nette, l'analizzatore etichetta diversi picchi come "sconosciuti" e li conserva per uno scienziato che non sia a minuti luce di distanza.
        #GEPscience_bd_massSpec_CaireenSrfLandedPoles_00 = Molecole conservate dal freddo compaiono in linee deboli e ordinate, i dati sembrano un messaggio in bottiglia, che deriva lentamente di ritorno verso casa.
        #GEPscience_bd_massSpec_SironaFlyingLow_00 = Idrogeno ed elio riempiono la camera, con un picco ostinato di metano, il display sfarfalla ogni volta che il brutale campo di Sirona decide di aggiungere ioni extra.
        #GEPscience_bd_massSpec_SironaFlyingHigh_00 = L'aria alta è soprattutto frammenti di idrogeno ed elio carico, la debole luce rossa e la radiazione fanno sembrare lo spettro in scintille.
        #GEPscience_bd_massSpec_SironaInSpaceLow_00 = All'ingresso arriva solo un tenue filo di gas, ma è molto energetico, lo strumento lo registra con cura mentre la lunga finestra di trasmissione si apre lentamente.
        #GEPscience_bd_massSpec_AirmedSrfLandedTropicalLowlands_00 = Domina la regolite polverizzata, con volatili in traccia che lampeggiano e svaniscono, come se il lato caldo stesse ancora perdendo i suoi ultimi segreti.
        #GEPscience_bd_massSpec_AirmedSrfLandedTemperateLowlands_00 = Perlopiù roccia frantumata e ioni impiantati, lo spettro è abbastanza pulito da far sembrare ogni picco strano un messaggio da molto lontano.
        #GEPscience_bd_massSpec_AirmedSrfLandedTropicalMidlands_00 = I granuli cotti dal sole rilasciano firme di sodio e potassio, l'analizzatore insiste che questo conti come "campionamento atmosferico" per un cavillo tecnico.
        #GEPscience_bd_massSpec_AirmedSrfLandedTemperateMidlands_00 = Un profilo minerale stabile con una tenue traccia di carbonio, qualunque cosa abbia colorato questa superficie non si è preoccupata di lasciare un'etichetta.
        #GEPscience_bd_massSpec_AirmedSrfLandedHighlands_00 = Frammenti più grossi mostrano picchi metallici più forti, le alture sembrano aver preso gli impatti sul personale.
        #GEPscience_bd_massSpec_AirmedSrfLandedDarkenedLowlands_00 = Il suolo più scuro porta composti del carbonio extra e strani accenni di zolfo, sotto il sole rosso sembra che il terreno covi braci in silenzio.
        #GEPscience_bd_massSpec_AirmedSrfLandedDarkenedMidlands_00 = Polvere e organici in traccia viaggiano insieme nello spettro, la libreria a casa avrà delle opinioni, prima o poi.
        #GEPscience_bd_massSpec_AirmedSrfLandedDarkenedHighlands_00 = La graniglia scura travolge l'ingresso e lascia un'impronta chimica diversa dal lato luminoso, lo strumento richiede un filtro e un tragitto più breve.
        #GEPscience_bd_massSpec_AirmedSrfLandedPoles_00 = Le molecole intrappolate dal freddo compaiono come picchi piccoli e ordinati, poi svaniscono mentre il campionatore si scalda, salvi i dati prima che cambino idea.
        #GEPscience_bd_massSpec_AirmedInSpaceLow_00 = Airmed contribuisce con poco più di polvere e atomi sputterati, lo spettrometro di massa lo chiama esosfera e poi si scusa per la sicurezza mostrata.
        #GEPscience_bd_massSpec_BorvoSrfLandedTropicalCraquelure_00 = La polvere del terreno crepato riempie lo spettro, più un tenue trasudamento di metano, la luna pianeta sembra espirare attraverso le fratture.
        #GEPscience_bd_massSpec_BorvoSrfLandedTemperateCraquelure_00 = Granuli minerali e firme di brina d'azoto si mescolano, la superficie non sa decidere se è roccia, ghiaccio o entrambe le cose.
        #GEPscience_bd_massSpec_BorvoSrfLandedTropicalLowlands_00 = L'aria dei bassopiani aggiunge un pesante fondo di azoto mentre il campione aggiunge idrocarburi, sa di chimica senza istruzioni.
        #GEPscience_bd_massSpec_BorvoSrfLandedTemperateLowlands_00 = Azoto, un tocco di metano e tanta polvere fine, lo strumento lo registra come "quasi respirabile" e viene rimproverato dalla checklist.
        #GEPscience_bd_massSpec_BorvoSrfLandedTropicalMidlands_00 = Aria più secca, graniglia più tagliente e qualche organico più pesante, la debole luce del sole rosso riesce comunque a cuocere molecole interessanti.
        #GEPscience_bd_massSpec_BorvoSrfLandedTemperateMidlands_00 = Lo spettro si stabilizza in azoto e minerali, con argon come discreto indicatore che il sensore è ancora sveglio.
        #GEPscience_bd_massSpec_BorvoSrfLandedHighlands_00 = Atmosfera sottile e granuli grossi spingono più in alto i picchi metallici, il vento quassù sembra aver viaggiato a lungo.
        #GEPscience_bd_massSpec_BorvoSrfLandedMajorCraters_00 = Il materiale scavato mostra tracce metalliche più forti e volatili insoliti, qualunque cosa abbia colpito qui ha lasciato chimica sul bordo.
        #GEPscience_bd_massSpec_BorvoSrfLandedPoles_00 = L'aria fredda concentra metano e condensati in traccia, lo spettrometro di massa lo legge come l'inventario di un congelatore sotto una debole lampada rossa.
        #GEPscience_bd_massSpec_BorvoFlyingLow_00 = Domina l'azoto con metano e un pizzico di argon, l'analizzatore non sa decidere se sta assaggiando aria gelata o respiro polveroso.
        #GEPscience_bd_massSpec_BorvoFlyingHigh_00 = L'aria si assottiglia e si spezza in frammenti, le linee del metano si indeboliscono mentre l'azoto ionizzato comincia a risalire il grafico.
        #GEPscience_bd_massSpec_BorvoInSpaceLow_00 = Un alone sfrangiato di ioni di azoto e metano si trascina nello spazio, i picchi arrivano a raffiche tra lunghi e silenziosi vuoti di comunicazione.
        #GEPscience_bd_massSpec_DamonaSrfLandedTropicalLowlands_00 = Dominano polvere grigia e frammenti di silicati, gli eventuali volatili sembrano imbarazzati e si nascondono sotto il livello di rumore.
        #GEPscience_bd_massSpec_DamonaSrfLandedTemperateLowlands_00 = Un semplice profilo minerale con qualche ione impiantato, il display è così silenzioso che quasi senti il ritardo nelle comunicazioni.
        #GEPscience_bd_massSpec_DamonaSrfLandedTropicalMidlands_00 = Granuli più grossi danno picchi metallici più chiari, la superficie sembra antica, come se avesse smesso di reagire molto tempo fa.
        #GEPscience_bd_massSpec_DamonaSrfLandedTemperateMidlands_00 = Perlopiù polvere di roccia con una tenue firma ossidata, l'analizzatore annota "arido confermato" e salva comunque il file.
        #GEPscience_bd_massSpec_DamonaSrfLandedHighlands_00 = Frammenti taglienti e vetrosi suggeriscono vecchia violenza, lo spettrometro di massa cataloga diligentemente i detriti come se stesse ancora accadendo.
        #GEPscience_bd_massSpec_DamonaSrfLandedImpactBasin_00 = La chimica della fusione da impatto spicca: polvere ricca di metalli e insoliti picchi in traccia, il bacino si ricorda ancora del colpo.
        #GEPscience_bd_massSpec_DamonaSrfLandedPoles_00 = I cold trap offrono un breve e delicato insieme di picchi molecolari, li trasmetti in fretta prima che luce e tempo cancellino le prove.
        #GEPscience_bd_massSpec_DamonaInSpaceLow_00 = Damona lascia una scarsa spruzzata di atomi e polvere, gran parte dello spettro è vuoto, e quel vuoto è molto lontano da casa.
        #GEPscience_bd_massSpec_EponaInSpaceLow_00 = Un sottile alone di frammenti di azoto e ioni di metano vaganti sfiora l'ingresso, i picchi arrivano in sbuffi assonnati sotto il debole sole rosso.
        #GEPscience_bd_massSpec_EponaFlyingHigh_00 = Domina l'azoto, ma l'aria alta è fatta a pezzi dalla fotochimica: radicali strani e cluster di ioni si accumulano come statica nel segnale.
        #GEPscience_bd_massSpec_EponaFlyingLow_00 = Perlopiù azoto, con una spalla pulita di metano e un tranquillo indicatore di argon, l'analizzatore lo definisce "semplice" e poi segnala comunque tre picchi in traccia senza spiegazione.
        #GEPscience_bd_massSpec_EponaSrfLandedTropicalLowlands_00 = Il suolo più caldo libera volatili intrappolati, metano, azoto e una tenue foschia organica, prima di congelare di colpo l'ottimismo del campionatore.
        #GEPscience_bd_massSpec_EponaSrfLandedTemperateLowlands_00 = Granuli fini di ghiaccio e sali inondano la camera, la chimica sembra un mare ghiacciato che non ha mai accettato di essere liquido.
        #GEPscience_bd_massSpec_EponaSrfLandedTropicalUplands_00 = Brina sottile e polvere levigata dal vento danno linee minerali più nette, qualunque calore esista qui si misura ancora in "meno freddo".
        #GEPscience_bd_massSpec_EponaSrfLandedTemperateUplands_00 = Le firme di roccia e ghiaccio si bilanciano, con argon presente in quantità minime, lo spettro sembra in attesa da molto tempo.
        #GEPscience_bd_massSpec_EponaSrfLandedHighlands_00 = Granuli più grossi amplificano i picchi metallici e i frammenti di silicati, l'aria ha un sapore rarefatto e lontano, perfino dall'interno di una capsula.
        #GEPscience_bd_massSpec_EponaSrfLandedGrandPeaks_00 = Le cime rilasciano polvere ruvida e ricca di metalli, lo spettrometro di massa la registra meticolosamente mentre la finestra di trasmissione verso casa resta ostinatamente chiusa.
        #GEPscience_bd_massSpec_EponaSrfLandedCraters_00 = Il materiale mescolato dagli impatti mostra volatili inattesi nascosti in granuli in ombra, il fondo del cratere si legge come una dispensa sigillata.
        #GEPscience_bd_massSpec_EponaSrfLandedVolcanoes_00 = Gli sfiati riscaldati fanno schizzare il grafico con gas freschi: frammenti di metano, azoto e strani composti più pesanti che suggeriscono un interno caldo, che saluta per un attimo.
        #GEPscience_bd_massSpec_EponaSrfLandedPoles_00 = Le molecole intrappolate dal freddo si allineano in modo ordinato, ghiaccio d'azoto, tracce di metano e granuli ricchi d'acqua, poi svaniscono mentre il campionatore si scalda e il sole avanza lentamente.
        #GEPscience_bd_massSpec_RosmertaInSpaceLow_00 = Perlopiù vuoto, con occasionali lampi di ossigeno e sodio sputterati via dalla superficie da radiazione dura e orbite lunghe e solitarie.
        #GEPscience_bd_massSpec_RosmertaSrfLandedTropicalLowlands_00 = Regolite scura e deboli firme di ghiaccio d'acqua si mescolano a ioni impiantati, il display sembra una lettera indirizzata a "chiunque, ovunque".
        #GEPscience_bd_massSpec_RosmertaSrfLandedTemperateLowlands_00 = Dominano i silicati, con piccoli indizi di sale e ostinate tracce di carbonio, l'analizzatore non sa decidere se sia geologia o solo vecchi detriti.
        #GEPscience_bd_massSpec_RosmertaSrfLandedTropicalMidlands_00 = La polvere fine produce picchi minerali puliti, ogni tanto compare un frammento volatile, poi svanisce come se si fosse ricordato che non dovrebbe esistere qui.
        #GEPscience_bd_massSpec_RosmertaSrfLandedTemperateMidlands_00 = Ossidi metallici e frammenti di silicati si accumulano, la camera si riempie di graniglia che non ha mai conosciuto un'atmosfera.
        #GEPscience_bd_massSpec_RosmertaSrfLandedHighlands_00 = Granuli grossi rendono lo spettro più netto, più metalli e meno volatili, le alture sembrano sabbiate dallo spazio stesso.
        #GEPscience_bd_massSpec_RosmertaSrfLandedPoles_00 = La brina conservata all'ombra dà picchi brevi e delicati, acqua e frammenti in traccia con azoto, prima che il calore del campionatore li spaventi via.
        #GEPscience_bd_massSpec_RAB-58EInSpaceLow_00 = Lo strumento intercetta sporadici sentori di polvere e qualche frammento volatile, qualunque cosa sia questo piccolo corpo, si impegna molto a non spiegarsi.
        #GEPscience_bd_massSpec_RAB-58ESrfLandedLowlands_00 = Granuli misti di roccia e ghiaccio inondano l'ingresso, la composizione si rifiuta di scegliere tra "palla di neve" e "pietra", quindi il grafico registra entrambe.
        #GEPscience_bd_massSpec_RAB-58ESrfLandedEasternHighlands_00 = La polvere della dorsale orientale è più ricca di metalli, con linee di silicati più nette, sembra che una storia diversa sia stata incollata a quest'orbita molto tempo fa.
        #GEPscience_bd_massSpec_RAB-58ESrfLandedWesternHighlands_00 = Le alture occidentali mostrano firme di ghiaccio più pulite e volatili più leggeri, lo spettrometro di massa lo etichetta "interessante" e salva copie extra per il lungo viaggio verso casa.
        #GEPscience_bd_massSpec_CernunnosInSpaceLow_00 = Un sussurro di molecole subliminate, perlopiù frammenti con azoto e lievi idrocarburi, deriva nel freddo, illuminato da un sole rosso stanco.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTropicalLowlands_00 = "Tropicale" significa comunque gelo: dominano i ghiacci di azoto e metano, con granuli scuri che stendono una sottile strisciata organica sullo spettro.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTemperateLowlands_00 = Ghiaccio d'acqua e volatili misti mostrano picchi stabili, l'analizzatore riporta un "inventario utilizzabile", cosa coraggiosa da dire così lontano.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTropicalMidlands_00 = La regolite gelata dà firme alternate di ghiaccio e minerali, il grafico sembra respirare molto lentamente.
        #GEPscience_bd_massSpec_CernunnosSrfLandedTemperateMidlands_00 = Tra i picchi di ghiaccio compaiono più silicati, come se la superficie stesse assottigliando il suo cappotto invernale un granulo alla volta.
        #GEPscience_bd_massSpec_CernunnosSrfLandedHighlands_00 = Frammenti minerali più grossi aumentano le tracce metalliche mentre i ghiacci arretrano, le alture sembrano più antiche, più secche e ostinatamente silenziose.
        #GEPscience_bd_massSpec_CernunnosSrfLandedSouthPolarHills_00 = I volatili intrappolati dal freddo si raggruppano in linee ordinate, il campionatore li scalda giusto quanto basta per dimostrare che sono reali.
        #GEPscience_bd_massSpec_CernunnosSrfLandedNorthPole_00 = Lo spettro del polo nord è carico di brina ricca di azoto e di un tenue metano, sembra che il pacchetto dati impieghi più tempo a partire che a essere raccolto.

        // bd_microwaveSpec
        #GEPscience_bd_microwaveSpec_GrannusInSpaceHigh_00 = Il ricevitore "sente" Grannus prima ancora di vederlo davvero: un sibilo costante da nana rossa che fa sembrare il Controllo Missione molto, molto lontano.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthPolarZone_00 = La zona polare risulta stranamente attenuata, come se la stella stesse risparmiando energia per altrove. Il pacchetto dati si prende tutto il tempo per arrivare a casa.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthSubpolarZone_00 = La luminosità a microonde ondeggia con un ritmo lento, come se Grannus stesse respirando. Tu controlli comunque lo scrubber della CO2 in cabina.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthTemperateZone_00 = Nella scansione compare una marezzatura fine: puntini caldi e chiazze più fredde che si scambiano posto più in fretta di quanto le comunicazioni riescano a seguire.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowNorthTropicZone_00 = La fascia tropicale lancia brevi picchi che sembrano piccoli brillamenti. Li etichetti "NON PUNTARE DI NUOVO" e premi trasmetti.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowEquatorialZone_00 = L'equatore è una striscia rumorosa e brillante nelle microonde. Grannus sembra abbastanza vicino da toccarlo, ma la risposta da Kerbin arriva come un'eco.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthTropicZone_00 = I tropici meridionali mostrano un gradiente netto, come se la superficie della stella cambiasse trama da un'orbita all'altra.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthTemperateZone_00 = Letture stabili, finalmente, poi un'esplosione improvvisa lava via la linea di base. Fingi che fosse previsto e lo registri come "dinamico".
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthSubpolarZone_00 = Il segnale cala, poi torna più forte, come se la stella stesse giocando con la tua antenna. Non fa ridere, ma tu ridi lo stesso.
        #GEPscience_bd_microwaveSpec_GrannusInSpaceLowSouthPolarZone_00 = La regione polare sud appare più fredda nel profilo a microonde, una calotta quieta su una stella tutt'altro che quieta sotto un debole bagliore rosso.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceHigh_00 = Da molto in alto, Taranis sembra una moneta lanciata tra fornace e congelatore. Il profilo a microonde è d'accordo, e l'upload a lunga distanza richiede un'eternità.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowMagmaSea_00 = La superficie fusa urla nella luminosità a microonde: meno "segnale riflesso" e più "radiatore planetario". Il tuo strumento sa di metallo caldo.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowMagmaShores_00 = La zona costiera mostra un patchwork caotico: placche di crosta più fredda alla deriva sopra un bagliore più caldo. È come guardare una lampada di lava da molto lontano da casa.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowScorchedLowlands_00 = I bassopiani restituiscono una firma aspra e secca, quasi senza morbidezza. I numeri sembrano cotti quanto il paesaggio.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowMidlands_00 = La trama a microonde suggerisce roccia fratturata e colate recenti mescolate insieme. Annoti che "recenti" sta facendo un gran lavoro così vicino a una nana rossa.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowHighlands_00 = Le colline risultano più ruvide e leggermente più fredde, ma non di molto. Nella checklist c'è: "non atterrare a meno che tu non ami brillare".
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowDarkSideMidlands_00 = Le pianure del lato in ombra tornano fredde e quiete: finalmente una linea di base stabile. Poi ti ricordi che qui "quiete" significa solo "in attesa".
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowDarkSideHighlands_00 = Le colline in ombra mostrano contrasti netti e fragili, come vetro incrinato. La scansione finisce prima che il lato illuminato riesca a recuperare.
        #GEPscience_bd_microwaveSpec_TaranisInSpaceLowPoles_00 = Le letture polari suggeriscono una regolite che non si scalda mai del tutto, nemmeno in questo sistema. Per un attimo ti chiedi cosa significhi davvero "notte" su un mondo così.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceHigh_00 = La luminosità a microonde di Toutatis oscilla selvaggiamente con il suo giorno e la sua notte eterni. Da qualche parte a casa, la stazione di tracciamento chiede se l'antenna sia ancora attaccata.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani illuminati irradiano forte, come se il pianeta fosse impostato su "scongela". Rassicuri il team: non hai premuto il pulsante sbagliato.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowSunnyHighlands_00 = Le colline del lato luminoso sembrano ruvide e intrise di calore, con piccole sacche che si raffreddano più in fretta dopo il crepuscolo locale. Se esiste un crepuscolo.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowTransitionalLowlands_00 = I bassopiani del crepuscolo mostrano il ritorno a microonde più "ragionevole" che tu abbia visto da secoli. Ragionevole è comunque piuttosto strano sotto un sole rosso.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowTransitionalHighlands_00 = Le colline di transizione risultano creste fratturate con ombre più fresche e versanti più caldi. È la cosa più vicina a una zona di comfort che i tuoi sensori riescano a trovare.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani in ombra tornano deboli e freddi, ma con sottili puntini luminosi che suggeriscono materiale più denso appena sotto la superficie.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowDarkSideHighlands_00 = Le colline in ombra mostrano firme nitide e gelide, interrotte da occasionali punti più caldi: o roccia esposta, o il tuo strumento sta tremando.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowSoutheasternMountains_00 = Il ritorno dalle montagne è frastagliato e variabile, come se i pendii ripidi stessero nascondendo strati diversi. La scansione ti fa desiderare una torcia grande quanto un razzo.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowWesternMountains_00 = La catena occidentale appare termicamente a chiazze, suggerendo tipi di roccia misti e detriti sciolti. La etichetti "da frana" e vai avanti.
        #GEPscience_bd_microwaveSpec_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne del lato in ombra sono una silhouette a microonde: creste fredde con sottili vene calde. Sembra che il pianeta ti stia sfidando in silenzio ad avvicinarti.
        #GEPscience_bd_microwaveSpec_NodensInSpaceHigh_00 = La mappa a microonde dipinge Nodens come un mondo di bassi umidi e alti secchi sotto un sole rosso stanco, il ritardo di trasmissione lo fa sembrare ancora più lontano.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowSaltySeas_00 = Sopra i mari salati, il ritorno è smorzato e uniforme: le superfici liquide ingoiano le microonde come se stessero tenendo segreti al Controllo Missione.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowFreshWater_00 = Le chiazze di acqua dolce tornano con una firma più pulita e più forte, laggiù qualcosa è davvero bravo a trattenere il liquido.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowShores_00 = Le coste sfarfallano tra risposte di terra e mare, un confine dielettrico frastagliato che puoi seguire anche quando il cielo sotto è estraneo e velato.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano segnali umidi e pesanti, suolo saturo, effetti di aria densa o entrambe le cose che litigano con lo strumento.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati risultano più stabili, come suoli che ciclano l'umidità lentamente, lo archivi come "forse comodo, sicuramente lontano".
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTropicalMidlands_00 = Le pianure restituiscono una firma di trama più ruvida, con sacche di umidità più alta che non combaciano con il terreno che ti aspettavi.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTemperateMidlands_00 = Nelle microonde compare un patchwork di creste secche e bacini più umidi, sembra abbastanza ordinato da essere invitante, e questo è sospetto.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowHighlands_00 = Le colline sono luminose e nitide nella scansione: secche, rocciose e dai bordi taglienti, come se Nodens cercasse di restare corazzato contro la sua stella rossa.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowTundra_00 = Il profilo a microonde della tundra suggerisce strati superficiali di gelo e disgelo, i numeri sembrano freddi ancor prima che il lungo ritardo nelle comunicazioni confermi che sei solo quaggiù.
        #GEPscience_bd_microwaveSpec_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate tornano con un ritorno pulito e ad alto contrasto: superfici dure e fredde che fanno sentire l'antenna come se puntasse nel silenzio.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama è un disco pallido e senza aria, con una lucentezza a microonde che cambia in modo sottile mentre Nodens resta lì vicino come punto di riferimento costante.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowFlats_00 = I terreni piatti riflettono in modo uniforme, suggerendo regolite fine distesa come polvere su un banco da lavoro, senza aria che la smuova e senza calore che la ammorbidisca.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTropicalLowlands_00 = "Tropicale" è solo un'etichetta qui, ma i bassopiani risultano comunque un po' più caldi e più lisci, come se i granuli di superficie fossero compattati.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano un ritorno piatto e costante, buono per la calibrazione e pessimo per chi sperava che la luna fosse accogliente.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure disperdono il segnale con una firma di trama granulosa, immagini sassolini minuscoli che aspettano pazientemente la luce rossa del giorno.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowTemperateMidlands_00 = La luminosità a microonde cala in fasce poco profonde, suggerendo striature composizionali che avvolgono la luna come vecchie cicatrici.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowHighlands_00 = Le colline restituiscono un ritorno più aspro e più brillante: pareti di roccia esposta senza un posto dove nascondersi dallo spazio o dal lungo viaggio verso casa.
        #GEPscience_bd_microwaveSpec_BelisamaInSpaceLowPoles_00 = Le regioni polari tornano fredde e nitide, con occasionali puntini luminosi che potrebbero essere ghiaccio più pulito o solo pietra fin troppo sincera.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceHigh_00 = Sucellus sembra una lista di risorse con un orizzonte: la sua riflettività a microonde suggerisce chiazze dense e ricche di metalli sparse su un mondo nano scuro.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowBasins_00 = I fondi dei bacini assorbono più del previsto, come se i fini si fossero raccolti lì, li segni come "interessanti" e fingi che significhi "sicuri".
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowLowlands_00 = I bassopiani mostrano ritorni misti, detriti, lastre e qualcosa di denso sotto, come se il pianeta fosse a metà costruzione e non fosse mai stato finito.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowTropicalMidlands_00 = Le pianure producono indizi di trama nitidi ad alta frequenza, la scansione sembra clinica nella debole luce rossa, e in qualche modo è peggio.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowTemperateMidlands_00 = Le fasce temperate mostrano sottili cambi di conducibilità, coerenti con mix minerali diversi, è un tipo di noia rassicurante, lontano da casa.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowHighlands_00 = Le colline riflettono forte in alcuni punti, suggerendo roccia esposta con metalli, quasi senti i contabili esultare attraverso il ritardo nelle comunicazioni.
        #GEPscience_bd_microwaveSpec_SucellusInSpaceLowPoles_00 = I ritorni polari sono più freddi e più puliti, con meno trame "affollate", o terreno più liscio, o solo meno sorprese dove il sole aiuta a malapena.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceHigh_00 = Caireen è un minuscolo vagabondo catturato, con una firma a microonde che cambia a ogni orbita, come una pietra che gira mostrando facce diverse a un lontano sole rosso.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowLowlands_00 = I bassopiani danno un ritorno morbido e a basso contrasto, coerente con detriti sciolti, ti chiedi per un attimo cosa significhi davvero "superficie" qui.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowMidlands_00 = Le pianure disperdono il segnale in modo rumoroso, suggerendo detriti a blocchi e pendii irregolari che renderebbero un radar d'atterraggio molto infelice.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowHighlands_00 = Le colline tornano luminose e frastagliate: roccia dura che sporge da un mantello di detriti, come a sfidarti ad avvicinarti.
        #GEPscience_bd_microwaveSpec_CaireenInSpaceLowPoles_00 = I poli risultano freddi e stranamente uniformi, come se i fini fossero migrati e si fossero depositati lì dopo ere di orbite quiete e zero comfort.
        #GEPscience_bd_microwaveSpec_SironaInSpaceHigh_00 = A questa distanza il ricevitore a microonde sente soprattutto il crepitio della magnetosfera di Sirona, la luce rossa sembra debole e il collegamento dati ancora più debole.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure assorbono le microonde più intensamente, come se le cime delle nubi fossero più spesse qui. La etichetti "dispensa di tempeste" e spedisci il pacchetto nel vuoto.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowLightTropicalBands_00 = Le bande tropicali chiare restituiscono un segnale più pulito e più brillante: strati nuvolosi più alti e più secchi che rendono la calibrazione quasi rassicurante.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowDarkTemperateBands_00 = Le bande temperate scure mostrano gradienti netti nella temperatura di brillanza, qualcosa ribolle sotto e non si preoccupa di spiegarsi.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare disperdono il fascio con una struttura fine, come strati di foschia sovrapposti sotto un cielo rosso e fioco.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowDarkPolarBands_00 = L'oscurità polare risulta liscia alle microonde, poi schizza senza preavviso. O le aurore sono rumorose, o Sirona sta cercando la tua attenzione.
        #GEPscience_bd_microwaveSpec_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare sembrano ingannevolmente uniformi, finché non confronti orbite successive e capisci che il pattern "uniforme" si sta muovendo.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceHigh_00 = Il ritorno a microonde di Airmed è semplice, freddo e duro: una cicatrice senza aria in un sistema dove perfino la luce del sole arriva stanca.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani danno una firma smorzata e polverosa, come roccia macinata martellata piatta da ere di impatti.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTemperateLowlands_00 = I bassopiani temperati riflettono un po' più luminosi: o granuli più grossi, o ejecta più fresco che non è ancora stato "meteo-spazializzato" fino al silenzio.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTropicalMidlands_00 = Le pianure disperdono il fascio in modo irregolare, suggerendo detriti a blocchi mescolati a chiazze più lisce. Te lo immagini scricchiolare sotto stivali che forse non invierai mai.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowTemperateMidlands_00 = Le pianure temperate mostrano strisce alternate di alta e bassa riflettività, bicolori proprio come avvertivano le mappe.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowHighlands_00 = Le colline tornano nitide e brillanti, pareti di roccia esposta senza un posto dove nascondersi dalle fasce di radiazione di Sirona.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani oscurati assorbono le microonde più del previsto, li segni come "a grana fine" e "probabilmente disordinati".
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowDarkenedMidlands_00 = Le pianure oscurate mostrano un pattern dielettrico punteggiato, come se la superficie fosse una coperta di vecchia lava e vetro da impatto.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowDarkenedHighlands_00 = Anche le colline oscurate riflettono in modo netto: scuro nel visibile non significa morbido nelle microonde.
        #GEPscience_bd_microwaveSpec_AirmedInSpaceLowPoles_00 = I poli sembrano freddi e stranamente uniformi, con qualche puntino luminoso che potrebbe essere ghiaccio più pulito o solo pietra fin troppo sincera.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceHigh_00 = Lo spettro a microonde di Borvo si rifiuta di scegliere una storia: in parte polveroso, in parte ghiacciato e avvolto da un'atmosfera che sfuma la verità attraverso un lungo ritardo nelle comunicazioni.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTropicalCraquelure_00 = I campi di craquelure mostrano ritorni ad alto contrasto, come placche fratturate con composizioni diverse incastrate tra le crepe.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTemperateCraquelure_00 = Le crepe temperate sembrano un po' più "umide" nella risposta a microonde: volatili sepolti oppure un'atmosfera che gioca brutti scherzi vicino al suolo.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali emettono con forza attraverso la foschia, suggerendo terreno più liscio o granuli più fini scaldati dalla debole luce rossa.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTemperateLowlands_00 = I bassopiani temperati tornano più stabili, con una firma dielettrica coerente con roccia e ghiaccio mescolati. La parola "mescolati" fa un gran lavoro quaggiù.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTropicalMidlands_00 = Le pianure mostrano dispersione più ruvida e piccoli punti luminosi che si ripetono a ogni orbita, affioramenti solidi che spuntano da qualunque cosa copra le pianure.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowTemperateMidlands_00 = Le pianure temperate hanno una morbida lucentezza a microonde che suggerisce brina nelle ombre, anche se l'atmosfera insiste che è "a bassa pressione".
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowHighlands_00 = Le colline risultano più fredde e più riflettenti: chiazze di ghiaccio più pulito o creste di roccia nuda. Vorresti che lo spettro scrivesse semplicemente una cartolina.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowMajorCraters_00 = I grandi crateri hanno orli luminosi e fondi spenti, una lezione ordinata di separazione degli ejecta che alle microonde è chiara ma sotto un sole rosso resta aliena.
        #GEPscience_bd_microwaveSpec_BorvoInSpaceLowPoles_00 = I ritorni polari cambiano con l'angolo di osservazione, suggerendo depositi stratificati. Programmi un approfondimento, poi ti ricordi quanto "approfondimento" sia lontano da casa.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceHigh_00 = Damona è un piccolo bersaglio grigio con un grande passato, il profilo a microonde è soprattutto roccia fredda e vecchie cicatrici, spedite a casa alla velocità della pazienza.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani danno un ritorno piatto e a basso contrasto: regolite fine stesa in uno strato sottile sopra qualcosa di più duro.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTemperateLowlands_00 = I bassopiani temperati riflettono un po' più luminosi, suggerendo granuli più grossi che non sono stati macinati in modo così uniforme.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTropicalMidlands_00 = Le pianure mostrano una firma di trama rumorosa, come lastre spezzate e detriti sciolti che litigano su cosa conti come "superficie".
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowTemperateMidlands_00 = Le pianure temperate hanno sottili cambi di conducibilità che tracciano antiche colate di ejecta attraverso il terreno.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowHighlands_00 = Le colline restituiscono un segnale netto dalla roccia di base esposta, è quel tipo di dato pulito che ottieni solo dove non c'è nulla di vivo che possa lamentarsi.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowImpactBasin_00 = Il bacino d'impatto è un bersaglio a microonde: materiale brillante e denso sul bordo e depositi più scuri e più fini raccolti al centro.
        #GEPscience_bd_microwaveSpec_DamonaInSpaceLowPoles_00 = Le scansioni polari tornano fredde e quiete, con abbastanza struttura da suggerire una lenta migrazione dei fini in una notte senza aria e senza fine.
        #GEPscience_bd_microwaveSpec_EponaInSpaceHigh_00 = Dall'orbita alta, il bagliore a microonde di Epona sembra un guscio freddo sopra qualcosa di più caldo. Il debole sole rosso non aiuta, e nemmeno la lunga attesa della risposta del Controllo Missione.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali irradiano come suolo ghiacciato e compattato, con quel tanto di comportamento "umido" da farti ricontrollare la calibrazione.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTemperateLowlands_00 = Queste pianure tornano più lisce e più fredde nello spettro, come un congelatore ordinato che non viene mai aperto.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTropicalUplands_00 = Gli altopiani tropicali disperdono il fascio con una firma di trama più ruvida: crosta spezzata, depositi modellati dal vento, o entrambe le cose che litigano nei numeri.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowTemperateUplands_00 = Il ritorno è luminoso e nitido, suggerendo ghiaccio più pulito o granuli più grossi che assorbono poca energia a microonde.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowHighlands_00 = Le colline mostrano contrasti netti da un'orbita all'altra, come sottili strati di brina che cambiano con un ciclo giorno-notte che a malapena sembra "giorno".
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowGrandPeaks_00 = I grandi picchi sono luminosi alle microonde e ostinatamente freddi: creste esposte che sembrano non aver mai perdonato l'universo.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowCraters_00 = Orli e fondi dei crateri si separano chiaramente nei dati: ejecta denso in alto, materiale più fine raccolto sotto, tutto illuminato da un debole crepuscolo rosso.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowVolcanoes_00 = Il bioma dei vulcani risulta più caldo delle zone circostanti nelle microonde: depositi recenti, crosta sottile oppure Epona che dimostra in silenzio di non aver ancora finito.
        #GEPscience_bd_microwaveSpec_EponaInSpaceLowPoles_00 = Le letture dei poli restano uniformemente fredde con occasionali puntini luminosi, indizio di depositi stratificati che si accumulano da un inverno molto lungo e molto lontano.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceHigh_00 = Rosmerta è un piccolo bersaglio senza aria con una firma a microonde che sembra più contabilità che esplorazione, finché non ti ricordi quanto sei lontano da casa.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTropicalLowlands_00 = "Tropicale" è solo un'etichetta, ma i bassopiani tropicali risultano comunque regolite fine e polverosa stesa liscia come un banco da laboratorio.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTemperateLowlands_00 = Questi bassopiani temperati riflettono un po' più luminosi, suggerendo granuli più grossi o materiale più fresco che non è ancora stato "meteo-spazializzato" fino al silenzio.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTropicalMidlands_00 = Le pianure tropicali restituiscono un pattern di dispersione granuloso: detriti a blocchi e pendii poco inclinati fanno del loro meglio per confondere uno spettro ordinato.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowTemperateMidlands_00 = Sottili cambi di conducibilità tracciano fasce appena visibili sul terreno, come vecchie cicatrici che si notano solo ascoltando nelle microonde.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowHighlands_00 = Le colline restituiscono un segnale netto, tutto roccia: pareti esposte senza un posto dove nascondersi sotto il debole sole rosso.
        #GEPscience_bd_microwaveSpec_RosmertaInSpaceLowPoles_00 = I poli sembrano più freddi e più puliti, con un intervallo ristretto di ritorni che urla "qui non succede nulla" un po' troppo forte.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceHigh_00 = RAB-58E si nota a malapena come qualcosa di più di un puntino oscillante, ma lo spettro a microonde suggerisce un corpo catturato in crisi d'identità: roccia, ghiaccio o entrambe le cose.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceLowLowlands_00 = I bassopiani assorbono più del previsto: detriti fini, ghiaccio poroso o una superficie che non vuole dare risposte dirette.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali riflettono più luminose e più ruvide, coerenti con materiale a blocchi esposto lungo le creste.
        #GEPscience_bd_microwaveSpec_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali tornano più fredde e leggermente più lisce, come se i pendii in ombra si fossero ricoperti di brina tra giorni lunghi e lenti.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos si legge come una voce quieta e ghiacciata ai margini del sistema di Grannus: numeri freddi che arrivano dopo minuti di ritardo ancora più freddi.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano una morbida lucentezza a microonde coerente con ghiaccio fine e polveroso, una superficie antica levigata con delicatezza dal tempo.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTemperateLowlands_00 = Lo spettro suggerisce granuli di dimensioni miste, come depositi trasportati che si assestano nelle pianure mentre il debole sole rosso non fa quasi nulla per cambiarli.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure tropicali disperdono il fascio con una firma di trama croccante: crosta spezzata e campi di detriti stratificati sopra qualcosa di più denso.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowTemperateMidlands_00 = Queste pianure temperate risultano un po' più luminose, indizio di chiazze di ghiaccio più pulito o depositi compattati che riflettono meglio.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowHighlands_00 = Le colline restituiscono firme nitide ad alto contrasto che sembrano creste esposte e substrato più duro che affiora sotto la brina.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowSouthPolarHills_00 = Le colline polari meridionali mostrano pendii freddi con sottili venature luminose: stratificazione che suggerisce lenta migrazione di volatili in un crepuscolo quasi eterno.
        #GEPscience_bd_microwaveSpec_CernunnosInSpaceLowNorthPole_00 = Il polo nord torna uniformemente freddo con occasionali puntini luminosi, come una piccola famiglia di compagni rimasti indietro nella mappa a microonde.

        // bd_multiSpec
        #GEPscience_bd_multiSpec_GrannusInSpaceHigh_00 = Da così lontano, Grannus è un disco rosso calmo, finché la banda ultravioletta non tradisce luminose cicatrici di regioni attive che gli strisciano addosso.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthPolarZone_00 = Le scansioni multispettrali mostrano la zona polare settentrionale marezzata di chiazze più fredde e improvvisi lampi caldi, il Controllo Missione lo chiama "meteo" e poi si corregge.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthSubpolarZone_00 = L'imaging a falsi colori delinea una fascia alla deriva di turbolenza magnetica. Anche l'antenna spiega perché il segnale continua a interrompersi.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthTemperateZone_00 = La zona temperata settentrionale è ancora abbastanza calda da far protestare il rivelatore in più lingue. La mappa composizionale è splendida, comunque.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthTropicZone_00 = Un anello luminoso di righe di emissione suggerisce un fitto groviglio di particelle cariche. Cerchi di non pensare a cosa significhi per la tua traiettoria di ritorno.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowEquatorialZone_00 = La zona equatoriale si risolve in granulazione ondulata e sottili corsie scure in cui lo spettro cambia quel tanto che basta da sembrare inquietante.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthTropicZone_00 = Il passaggio a falsi colori dipinge la zona tropicale meridionale in blu e gialli violenti, apparentemente "solo calibrazione", ma nessuno sembra convinto attraverso il lungo ritardo.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthTemperateZone_00 = Diverse bande concordano su una cosa: la superficie non è "uniforme", è frenetica. Molto frenetica. Lo registri come "scienza", non come "panico".
        #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthSubpolarZone_00 = La firma spettrale cambia bruscamente lungo un confine tenue, come un fronte di tempesta fatto di plasma invece che di nubi.
        #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthPolarZone_00 = La zona polare meridionale sembra ingannevolmente calma nella luce visibile, l'infrarosso dissente a voce alta e senza sosta.
        #GEPscience_bd_multiSpec_TaranisInSpaceHigh_00 = Anche dall'orbita alta, la separazione giorno-notte è netta sotto il debole sole rosso, il composito a falsi colori sembra due pianeti diversi incollati insieme.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowMagmaSea_00 = Lo spettro del mare di lava satura subito le bande calde. Cambi filtri e fai finta che fosse previsto.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowMagmaShores_00 = Le coste di lava si risolvono in gradienti chimici, colate recenti, zattere di crosta e qualcosa che potrebbe essere vetro. Il Controllo Missione chiede se sia sicuro campionare, tu ridi, prima o poi.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowScorchedLowlands_00 = Le terre bruciate riflettono la luce rossa in modo strano e ingoiano del tutto altre lunghezze d'onda, producendo una mappa che urla "fusione recente" in termini scientifici educati.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowMidlands_00 = Il contrasto multibanda suggerisce crosta spezzata e sottili veli di polvere su roccia più scura. Il terminatore scorre abbastanza in fretta da tenere tutti svegli.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowHighlands_00 = Le colline mostrano margini spettrali più netti, come roccia più pulita esposta da continue fratture termiche. La banda fredda non è comunque "fredda", solo meno furiosa.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowDarkSideMidlands_00 = Sul lato in ombra, il canale infrarosso trova calore residuo dove non dovrebbe essercene. Lo etichetti "interessante" e ricontrolli il budget energetico.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowDarkSideHighlands_00 = Le colline in ombra restituiscono uno spettro tenue e piatto, poi schizzano per un attimo mentre un riflesso attraversa l'inquadratura. Brina oppure hai appena trovato la roccia più luccicante del sistema.
        #GEPscience_bd_multiSpec_TaranisInSpaceLowPoles_00 = I poli mostrano una sottile bandatura su più lunghezze d'onda, indizio di una lenta migrazione di volatili intrappolati tra un giorno rovente e una notte permanente.
        #GEPscience_bd_multiSpec_ToutatisInSpaceHigh_00 = Il composito multispettrale evidenzia un sottile bordo atmosferico sul lembo illuminato e un emisfero scuro che sembra molto più lontano da casa di quanto ammettano i numeri.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowSunnyLowlands_00 = Polvere chiara e roccia più scura si separano nettamente tra le bande, trasformando i bassopiani assolati in una lezione ordinata di geologia a falsi colori sotto un sole rosso non proprio amichevole.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowSunnyHighlands_00 = Le colline assolate mostrano forti firme minerali e gradienti termici netti, come se il suolo non sapesse decidere se arrostire o irradiare.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowTransitionalLowlands_00 = I bassopiani di transizione hanno la palette più strana: abbastanza caldi per un bagliore infrarosso, abbastanza freschi per una riflettanza visibile attenuata. Sembra che il pianeta trattenga il respiro.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowTransitionalHighlands_00 = Qui i rapporti spettrali cambiano con l'altitudine, suggerendo roccia diversa o polvere diversa, in ogni caso, è una bella scoperta consegnata con un lungo ritardo nelle comunicazioni.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani in ombra restituiscono una firma fredda e piatta con occasionali puntini luminosi. Il Controllo Missione li chiama "anomalie", tu li chiami "non-atterraggi".
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowDarkSideHighlands_00 = L'infrarosso rileva un debole calore residuo nelle colline, segno che la superficie trattiene il calore più a lungo del previsto. Il lato notturno continua a sembrare infinito.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowSoutheasternMountains_00 = I dati multispettrali fanno risaltare le montagne sud-orientali con strisce composizionali, come terreno a strati esposto da fratture da stress. È bello in un modo leggermente inquietante.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowWesternMountains_00 = Le montagne occidentali mostrano striature ad alta albedo nella banda visibile e un freddo ostinato nell'infrarosso, come se polvere e roccia litigassero su chi possiede il pendio.
        #GEPscience_bd_multiSpec_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne del lato in ombra sono quasi prive di dettagli finché una banda stretta non rivela una tenue foschia che ristagna nelle valli. Archivi l'immagine, poi ricontrolli il puntamento dell'antenna.
        #GEPscience_bd_multiSpec_NodensInSpaceHigh_00 = Dall'orbita alta, Nodens brilla caldo nell'infrarosso, ma le bande nel visibile sono attenuate da una foschia densa che fa sembrare l'intero mondo come un ricordo a metà.
        #GEPscience_bd_multiSpec_NodensInSpaceLowSaltySeas_00 = Sui mari salati, la luce rossa viene assorbita con avidità mentre il vicino infrarosso esplode di rugosità superficiale, lo spettro dice "vento" anche se da qui non lo senti.
        #GEPscience_bd_multiSpec_NodensInSpaceLowFreshWater_00 = Le chiazze di acqua dolce riflettono in modo diverso tra le bande, con una lieve inclinazione verdognola che potrebbe essere alghe oppure solo Nodens che fa il furbo sotto un sole rosso.
        #GEPscience_bd_multiSpec_NodensInSpaceLowShores_00 = Lungo la costa, le bande termiche tracciano bassi fondali caldi e terra più fredda come un confine ordinato disegnato dalla fisica invece che dai cartografi.
        #GEPscience_bd_multiSpec_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano forti firme di umidità e strani rapporti di colore, li segni come "forse rigogliosi" e cerchi di non affezionarti.
        #GEPscience_bd_multiSpec_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati escono come toni stratificati a falsi colori: nubi sottili, aria densa e un suolo che tiene i propri segreti dietro di loro.
        #GEPscience_bd_multiSpec_NodensInSpaceLowTropicalMidlands_00 = Le creste delle pianure tropicali proiettano ombre spettrali nette, la banda UV schizza sulle sommità, indizio di minerali esposti ripuliti dal meteo.
        #GEPscience_bd_multiSpec_NodensInSpaceLowTemperateMidlands_00 = Qui la mappa infrarossa mostra un lento raffreddamento dopo il tramonto, e il lungo ritardo fa sembrare che la notte arrivi due volte.
        #GEPscience_bd_multiSpec_NodensInSpaceLowHighlands_00 = Le colline risultano secche e luminose nella maggior parte delle bande, con sacche di freddo che suggeriscono ghiaccio riparato nascosto dove il sole non arriva.
        #GEPscience_bd_multiSpec_NodensInSpaceLowTundra_00 = Lo spettro della tundra è un patchwork di brina, polvere e qualcosa di più scuro sotto, come se il pianeta indossasse il cappotto invernale al rovescio.
        #GEPscience_bd_multiSpec_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate accecano nel visibile e sono quiete nell'infrarosso, tranne sottili venature calde che somigliano in modo inquietante a crepe.
        #GEPscience_bd_multiSpec_BelisamaInSpaceHigh_00 = Belisama sta accanto a Nodens come un duetto bloccato, i fotogrammi multispettrali mostrano un volto luminoso e uno scuro, come se la luna non si svegliasse mai del tutto.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowFlats_00 = I terreni piatti di Belisama restituiscono uno spettro liscio e grigio: regolite fine, pesantemente "cotta" dalle radiazioni, e non un singolo segno che abbia mai avuto un'atmosfera.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowTropicalLowlands_00 = Nei bassopiani tropicali, la banda termica trova calore residuo in chiazze scure, probabilmente fusione da impatto che si rifiuta di mollare.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano sottili cambi di colore coerenti con granuli di dimensioni miste, in pratica, la polvere ha opinioni su dove dovrebbe stare.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure tropicali risaltano nell'ultravioletto con strisce fresche e luminose: frane recenti o piccoli impatti, congelati sul posto dalla lunga, fredda notte.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowTemperateMidlands_00 = Il composito multispettrale evidenzia ampi vortici di albedo, come antiche maree nella roccia di quando Belisama e Nodens si sono bloccati insieme per la prima volta.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowHighlands_00 = Le colline sembrano brutalmente esposte: bande minerali nette, spigoli duri e una firma termica che crolla appena il sole se ne va.
        #GEPscience_bd_multiSpec_BelisamaInSpaceLowPoles_00 = Ai poli, lo spettro si appiattisce in brina pallida e ombra profonda, l'unico movimento è quello dei tuoi dati che tornano a casa alla velocità della luce.
        #GEPscience_bd_multiSpec_SucellusInSpaceHigh_00 = Anche a questa distanza, Sucellus restituisce margini spettrali netti: troppo puliti, troppo metallici, come un mondo minuscolo costruito con pezzi di ricambio.
        #GEPscience_bd_multiSpec_SucellusInSpaceLowBasins_00 = I bacini mostrano firme scure e dense con puntini luminosi nel visibile: detriti ricchi di metalli che luccicano appena quanto basta da essere sospetti.
        #GEPscience_bd_multiSpec_SucellusInSpaceLowLowlands_00 = I bassopiani producono uno spettro frastagliato e un sibilo di fondo persistente, l'alta radiazione e la roccia esposta rendono i sensori nervosi.
        #GEPscience_bd_multiSpec_SucellusInSpaceLowTropicalMidlands_00 = Le pianure tropicali tendono a essere più calde del dovuto nell'infrarosso, suggerendo bassa inerzia termica: regolite polverosa sopra qualcosa di più duro.
        #GEPscience_bd_multiSpec_SucellusInSpaceLowTemperateMidlands_00 = A falsi colori, le pianure temperate si separano in strisce composizionali pulite, come se il pianeta nano fosse stato assemblato a strati e non fosse mai stato levigato.
        #GEPscience_bd_multiSpec_SucellusInSpaceLowHighlands_00 = Le colline mostrano bande di silicati nitide e occasionali punti riflettenti, se sono metalli, sono quelli che fanno partire i budget agli ingegneri.
        #GEPscience_bd_multiSpec_SucellusInSpaceLowPoles_00 = I poli sono spettralmente piatti finché una banda stretta non rivela tenui volatili intrappolati all'ombra: piccoli premi custoditi da un cielo ostile.
        #GEPscience_bd_multiSpec_CaireenInSpaceHigh_00 = Caireen è poco più di un puntino in movimento finché i filtri non lo separano in colori: roccia antica, cicatrici fresche e un alone freddo di nulla.
        #GEPscience_bd_multiSpec_CaireenInSpaceLowLowlands_00 = I bassopiani di Caireen risultano fortemente alterati dal meteo spaziale, con pendii arrossati e uno spettro che urla "superficie vecchia, nessuna pietà".
        #GEPscience_bd_multiSpec_CaireenInSpaceLowMidlands_00 = Le pianure mostrano un mix sorprendente di colori per una roccia così piccola: frammenti freschi sparsi tra massi antichi e scuriti.
        #GEPscience_bd_multiSpec_CaireenInSpaceLowHighlands_00 = Le alture riflettono con decisione in alcune bande, come pietra fratturata che cattura il debole sole nel modo giusto per sembrare viva.
        #GEPscience_bd_multiSpec_CaireenInSpaceLowPoles_00 = Vicino ai poli, l'infrarosso scende quasi a zero mentre una debole linea luminosa suggerisce brina infilata in tasche di ombra permanente.
        #GEPscience_bd_multiSpec_SironaInSpaceHigh_00 = I fotogrammi multispettrali trasformano Sirona in una mappa meteo vivente: bande del metano, fioriture di calore e tende aurorali, archiviate a casa con qualche secondo di ritardo da molto, molto lontano.
        #GEPscience_bd_multiSpec_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure ingoiano la luce rossa e lasciano filtrare infrarosso dal basso, indizio di risalite calde nascoste sotto un cielo spesso e irrequieto.
        #GEPscience_bd_multiSpec_SironaInSpaceLowLightTropicalBands_00 = Le cime delle nubi chiare abbagliano nei canali visibili mentre la banda del metano le riduce alla forma, il risultato sembra un sistema di tempeste con un carattere tutto suo.
        #GEPscience_bd_multiSpec_SironaInSpaceLowDarkTemperateBands_00 = I gradienti di temperatura si affinano in lunghe strisce e lo spettro dice "venti veloci" anche se tutto ciò che senti è il sibilo della radio.
        #GEPscience_bd_multiSpec_SironaInSpaceLowLightTemperateBands_00 = Nubi più alte e più pallide riflettono quel poco di luce che ricevono, il composito a falsi colori fa sembrare le fasce quasi ordinatamente organizzate. Quasi.
        #GEPscience_bd_multiSpec_SironaInSpaceLowDarkPolarBands_00 = Picchi ultravioletti tracciano un anello aurorale frastagliato sopra la banda polare scura: il campo magnetico di Sirona firma l'immagine con inchiostro brillante.
        #GEPscience_bd_multiSpec_SironaInSpaceLowLightPolarBands_00 = La banda polare chiara sembra calma nel visibile, ma l'infrarosso mostra calore in agitazione sotto, come se il pianeta si rifiutasse di raffreddarsi.
        #GEPscience_bd_multiSpec_AirmedInSpaceHigh_00 = Dall'orbita alta, il volto bicolore di Airmed si separa nettamente per lunghezza d'onda: vecchi lividi, cicatrici più recenti e una superficie sabbiata dal quartiere di Sirona.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani tropicali si dividono in chiazze fresche e alterate tra le bande, le parti "fresche" sembrano comunque ostili, solo più fotogeniche.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowTemperateLowlands_00 = Le bande termiche mostrano un raffreddamento rapido quando arriva la lunga notte, il ritardo della luce fa sembrare che il buio arrivi a rate.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowTropicalMidlands_00 = I margini spettrali si fanno più netti sulle creste, suggerendo roccia esposta con meno copertura di polvere: impatti recenti o una superficie che si rifiuta semplicemente di restare ordinata.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowTemperateMidlands_00 = Il composito multispettrale evidenzia sottili striature composizionali, come strati di danno registrati nei minerali invece che nella burocrazia.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowHighlands_00 = Le colline riflettono con forza in poche bande strette, poi spariscono in altre: pietra pulita e ombre taglienti sotto un debole sole rosso.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani oscurati mostrano riflettanza appiattita e una dura risposta UV, coerente con forti radiazioni che "cuociono" lo strato superiore in qualcosa di nuovo.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowDarkenedMidlands_00 = La mappatura a falsi colori rivela che le pianure oscurate risalgono il pendio a dita, come se la luna venisse lentamente "ridipinta" dal meteo spaziale.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowDarkenedHighlands_00 = Nemmeno le alture sono risparmiate: lo spettro risulta eroso e alterato, con micro-lampi brillanti che potrebbero essere frammenti freschi o ansia del sensore.
        #GEPscience_bd_multiSpec_AirmedInSpaceLowPoles_00 = Le tasche polari restano più fredde nell'infrarosso e una tenue linea luminosa in una banda stretta suggerisce volatili nascosti dove la luce del sole non si decide mai fino in fondo.
        #GEPscience_bd_multiSpec_BorvoInSpaceHigh_00 = Il lembo di Borvo mostra un sottile bordo atmosferico su più bande, il pianeta sembra quasi "vivo" finché non ti ricordi quanta strada deve fare il segnale.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowTropicalCraquelure_00 = Il terreno a craquelure si accende di contrasto termico, suggerendo una crosta fragile sopra qualcosa di più morbido: ghiaccio, polvere o entrambe le cose che litigano insieme.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowTemperateCraquelure_00 = I rapporti spettrali cambiano lungo le fratture, come se le crepe esponessero materiale più pulito sotto una pellicola superficiale macchiata.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali assorbono forte nella banda sensibile al metano, mentre il vicino infrarosso suggerisce brina diffusa o polvere chiara appena sotto la foschia.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowTemperateLowlands_00 = Il composito a falsi colori mostra bruni attenuati e blu freddi, lo strumento non sa decidere se sia calore roccioso o pazienza ghiacciata.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano un patchwork di riflettanza coerente con granuli di dimensioni miste: polvere fine negli avvallamenti e materiale più grossolano sui pendii.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowTemperateMidlands_00 = Con luce da crepuscolo, il canale infrarosso continua a brillare molto dopo che l'immagine nel visibile è svanita, suggerendo una superficie che trattiene il calore più a lungo del previsto.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowHighlands_00 = Le colline risultano più "pulite" in diverse bande, indizio di atmosfera più sottile in alto e meno foschia: finalmente uno sguardo chiaro su ciò di cui Borvo è fatto.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowMajorCraters_00 = Fondi dei crateri ed ejecta si separano in firme spettrali distinte, laggiù qualcosa è abbastanza diverso da valere la trasmissione dati extra.
        #GEPscience_bd_multiSpec_BorvoInSpaceLowPoles_00 = I poli mostrano chiazze luminose e fredde che restano luminose su più bande: se è ghiaccio, è ostinato, se è roccia, è estremamente determinata a interpretare la parte.
        #GEPscience_bd_multiSpec_DamonaInSpaceHigh_00 = Damona è un puntino grigio e butterato finché i filtri non lo separano in età e composizione, poi diventa un catalogo di impatti scritto sotto luce rossa di stella.
        #GEPscience_bd_multiSpec_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali risultano scuri e uniformi nella maggior parte delle bande, coerenti con regolite matura lavorata da micrometeoriti fino a diventare polvere fine e stanca.
        #GEPscience_bd_multiSpec_DamonaInSpaceLowTemperateLowlands_00 = Sottili cambi di colore delineano strutture sepolte sotto la polvere, la superficie sembra semplice finché lo spettro non insiste che non lo è.
        #GEPscience_bd_multiSpec_DamonaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano strisce più luminose in una banda stretta, come frane fresche che non hanno ancora avuto il tempo di "invecchiare nello spazio".
        #GEPscience_bd_multiSpec_DamonaInSpaceLowTemperateMidlands_00 = L'imaging termico rivela un contrasto giorno-notte netto e quasi nessuna ritenzione di calore, il lato notturno sembra clinicamente vuoto.
        #GEPscience_bd_multiSpec_DamonaInSpaceLowHighlands_00 = Le colline riflettono più forte in diversi canali, suggerendo roccia più pulita esposta, è la cosa più vicina al "nuovo" che troverai quaggiù.
        #GEPscience_bd_multiSpec_DamonaInSpaceLowImpactBasin_00 = Il bacino si divide in zone di ejecta distinte per lunghezza d'onda: materiale scavato in profondità, veli più chiari e un centro che sembra ricordarsi l'evento.
        #GEPscience_bd_multiSpec_DamonaInSpaceLowPoles_00 = Le tasche in ombra permanente restano fredde nell'infrarosso e luminose in una banda favorevole alla brina: piccole riserve, in paziente attesa di una missione che possa permettersi il tempo di viaggio.
        #GEPscience_bd_multiSpec_EponaInSpaceHigh_00 = I passaggi multispettrali separano Epona in ghiaccio freddo, tenue foschia e sottili firme del metano, con ogni pacchetto che arriva abbastanza in ritardo da ricordarti quanto sia lontana "casa".
        #GEPscience_bd_multiSpec_EponaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sembrano lisci nel visibile, ma il vicino infrarosso mette in risalto trame brinose e una lieve bandatura che suggerisce un recente rinnovamento della superficie sotto il debole sole rosso.
        #GEPscience_bd_multiSpec_EponaInSpaceLowTemperateLowlands_00 = I canali termici mostrano i bassopiani temperati che perdono calore lentamente nella lunga notte, qualunque cosa ci sia sotto la crosta non si raffredda come roccia morta.
        #GEPscience_bd_multiSpec_EponaInSpaceLowTropicalUplands_00 = Gli altopiani tropicali spostano lo spettro verso ghiaccio più pulito e minerali più duri, come se il vento, o qualcos'altro, levigasse la superficie da ere.
        #GEPscience_bd_multiSpec_EponaInSpaceLowTemperateUplands_00 = La mappatura a falsi colori evidenzia ampie striature tenui: depositi stesi a strati e poi riscritti in silenzio da brina e tempo.
        #GEPscience_bd_multiSpec_EponaInSpaceLowHighlands_00 = Le colline tornano luminose nelle bande favorevoli al ghiaccio e opache in altre, la composizione dice "congelata e complicata", che non è molto rassicurante.
        #GEPscience_bd_multiSpec_EponaInSpaceLowGrandPeaks_00 = I grandi picchi proiettano lame di ombra termica e restituiscono margini minerali nitidi, come se fossero appena esposti in un mondo che dovrebbe essere completamente coperto di brina.
        #GEPscience_bd_multiSpec_EponaInSpaceLowCraters_00 = I tappeti di ejecta si separano nettamente per lunghezza d'onda: superficie scura e antica sopra, materiale scavato più luminoso sotto e un bordo che sembra inquietantemente "nuovo".
        #GEPscience_bd_multiSpec_EponaInSpaceLowVolcanoes_00 = Nell'infrarosso si accendono punti caldi localizzati dove l'immagine nel visibile resta quieta: o Epona ha un cuore caldo, oppure lo strumento sta cercando di mettere in giro voci.
        #GEPscience_bd_multiSpec_EponaInSpaceLowPoles_00 = Le trappole fredde polari brillano debolmente in una banda stretta coerente con volatili: piccole riserve, in paziente attesa di missioni con un segnale migliore.
        #GEPscience_bd_multiSpec_RosmertaInSpaceHigh_00 = Dall'orbita alta, Rosmerta è una moneta pallida e senza aria con una dura risposta UV, un promemoria poco amichevole di cosa facciano le radiazioni così lontano da qualunque cosa familiare.
        #GEPscience_bd_multiSpec_RosmertaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali risultano scuri e alterati nella maggior parte delle bande, con occasionali puntini luminosi che sembrano frammenti freschi sparsi su polvere antica.
        #GEPscience_bd_multiSpec_RosmertaInSpaceLowTemperateLowlands_00 = Le scansioni termiche mostrano un rapido raffreddamento al tramonto: la superficie non trattiene calore, semplicemente smette di averlo.
        #GEPscience_bd_multiSpec_RosmertaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano uno spettro a mosaico, granuli di dimensioni miste e roccia esposta, come se la regolite non sapesse decidere se nascondere la geologia o pubblicizzarla.
        #GEPscience_bd_multiSpec_RosmertaInSpaceLowTemperateMidlands_00 = I compositi a falsi colori rivelano deboli strisce composizionali che corrono dritte per chilometri, come se la luna fosse stata assemblata a strati e mai mescolata.
        #GEPscience_bd_multiSpec_RosmertaInSpaceLowHighlands_00 = Le colline restituiscono bande minerali più nette e ombre più profonde, perfino lo scanner sembra socchiudere gli occhi nel debole rosso.
        #GEPscience_bd_multiSpec_RosmertaInSpaceLowPoles_00 = Le tasche polari restano più fredde e più luminose nei canali sensibili alla brina, suggerendo ghiaccio ostinato nascosto nell'ombra permanente.
        #GEPscience_bd_multiSpec_RAB-58EInSpaceHigh_00 = Da lontano, RAB-58E è solo un puntino alla deriva, finché la separazione multispettrale non mostra che è molto ghiacciato, molto roccioso o molto bravo a mentire.
        #GEPscience_bd_multiSpec_RAB-58EInSpaceLowLowlands_00 = I bassopiani pendono verso uno spettro più piatto e più scuro tipico di detriti maturi, se c'è ghiaccio, tiene un profilo basso.
        #GEPscience_bd_multiSpec_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali si schiariscono nel vicino infrarosso e calano nell'emissione termica, coerenti con ghiaccio più pulito o materiale appena fratturato.
        #GEPscience_bd_multiSpec_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali mostrano un rapporto di colori diverso rispetto all'est, corpo catturato o no, di sicuro non è uniforme.
        #GEPscience_bd_multiSpec_CernunnosInSpaceHigh_00 = Cernunnos si risolve in un pianeta nano freddo e ghiacciato con una lieve marezzatura di albedo, un intero mondo di "periferia" trasmesso attraverso un silenzio lunghissimo.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowTropicalLowlands_00 = I bassopiani tropicali assorbono la luce rossa in modo strano e brillano nelle bande del ghiaccio, suggerendo brina sporca stratificata sopra qualcosa di più scuro.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowTemperateLowlands_00 = L'imaging termico mostra gradienti di temperatura modesti e un raffreddamento lento, la superficie si comporta come ghiaccio compattato mescolato a polvere fine.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowTropicalMidlands_00 = I rapporti multispettrali cambiano con l'altitudine, separando terreno più vecchio e scurito da affioramenti più luminosi che sembrano appena ripuliti.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowTemperateMidlands_00 = La mappatura a falsi colori dipinge lunghe striature che ignorano la topografia: depositi stesi da processi antichi che non hanno chiesto permesso al paesaggio.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowHighlands_00 = Le colline restituiscono margini spettrali nitidi e un contrasto severo: ghiaccio pulito e minerali duri, illuminati da un sole troppo lontano per contare davvero.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowSouthPolarHills_00 = Le colline polari meridionali mostrano firme luminose e fredde con lievi indizi di volatili, piccoli depositi custoditi da ombra e distanza.
        #GEPscience_bd_multiSpec_CernunnosInSpaceLowNorthPole_00 = Il polo nord acceca nel visibile e resta quieto nell'infrarosso, tranne alcune venature calde che somigliano in modo inquietante a un disturbo recente.

        // bd_orbitalScope
        #GEPscience_bd_orbitalScope_GrannusInSpaceHigh_00 = Da quassù, Grannus sembra meno un "corpo" e più una discussione tra i filtri dell'obiettivo. Il team del mosaico lo archivia come "per lo più rosso, decisamente rumoroso".
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthPolarZone_00 = Il bagliore della zona polare settentrionale si risolve in pattern fitti e irrequieti che rifiutano di restare fermi tra un fotogramma e l'altro. Il software di cucitura suggerisce: "riprovare quando la fisica si calma".
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthSubpolarZone_00 = Gli scatti in sequenza catturano deboli bande ricurve che sembrano marmellata strisciata sul sensore. Pulisci la lente. La marmellata resta.
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthTemperateZone_00 = Trame granulari strisciano nell'inquadratura, come se la "superficie" stesse pensando di diventare qualcos'altro. La tua griglia di mappa finge educatamente che sia normale.
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowNorthTropicZone_00 = Una chiazza più scura attraversa l'inquadratura e l'esposimetro va in panico. La etichetti "interessante" e non fai zoom più da vicino.
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowEquatorialZone_00 = La zona equatoriale divampa in rossi e arancioni stratificati, con increspature che rendono ogni giunzione di sovrapposizione fin troppo evidente. Congratulazioni: hai mappato un'ondulazione.
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthTropicZone_00 = La camera cattura brevi lentiggini luminose che compaiono e scompaiono tra un passaggio e l'altro. Il Controllo Missione le chiama "dettagli". Tu le chiami "motivi per mantenere le distanze".
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthTemperateZone_00 = I mosaici mostrano una sottile bandatura che non segue nessuna linea di latitudine ordinata. I cartografi sospirano, poi chiedono comunque altri dati.
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthSubpolarZone_00 = Un alone pallido vicino al bordo fa brillare i margini di ogni fotogramma. La tua correzione migliore è: "ritaglia senza pietà".
        #GEPscience_bd_orbitalScope_GrannusInSpaceLowSouthPolarZone_00 = La zona polare meridionale sembra più calma per esattamente una foto. Il fotogramma successivo non è d'accordo e il rapporto guadagna diverse etichette di avvertimento extra.
        #GEPscience_bd_orbitalScope_TaranisInSpaceHigh_00 = Dall'orbita alta, Taranis è un contrasto netto a metà: un lato incandescente, l'altro inghiottito dal buio. Il ritardo del downlink fa sì che il team di mappatura lo veda molto dopo che tu hai finito di sussultare.
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowMagmaSea_00 = Il mare di lava satura la camera così a fondo che "rosso" smette di essere un colore e diventa uno stile di vita. Il mosaico viene archiviato con una distanza di visione consigliata: "lontano".
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowMagmaShores_00 = Lungo la costa lavica, margini incandescenti strisciano come inchiostro caldo tra un fotogramma e l'altro. I punti di cucitura continuano a sciogliersi e a trasformarsi in nuovi.
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowScorchedLowlands_00 = I bassopiani arsi, cotti dal sole, abbagliano le ottiche come metallo lucidato. Bracketing delle esposizioni e ottieni comunque "luminoso" in tre modi diversi.
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowMidlands_00 = Le pianure mostrano trame nitide dove la luce non sta cercando di cuocere il sensore. Per un attimo, mappare sembra quasi routine, finché la coda delle comunicazioni non ti ricorda quanto sia lontana "routine".
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowHighlands_00 = Ombre lunghe scolpiscono le colline in creste taglienti e neri più profondi di quanto la stampante possa gestire. Il team della mappa chiede "terreno meno drammatico" e tu ridi all'idea.
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowDarkSideMidlands_00 = Le pianure in ombra quasi non esistono: un profilo freddo sotto luce stellare e rumore strumentale. Lo invii lo stesso, il vuoto è parte dei dati.
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowDarkSideHighlands_00 = Pochi deboli riflessi tradiscono picchi frastagliati nel buio. Il mosaico sembra una foto di montagna scattata usando solo pazienza.
        #GEPscience_bd_orbitalScope_TaranisInSpaceLowPoles_00 = I poli stanno in una luce inquieta, né del tutto arsi né del tutto nascosti. I fotogrammi in sequenza mostrano lievi oscillazioni di luminosità che fanno sembrare vivo il terminatore.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceHigh_00 = Molto sopra Toutatis, l'emisfero arrostito e quello congelato formano un confine netto che non ha alcun rispetto per il tuo calendario. Concludi la sessione fotografica, poi aspetti il lento rivolo di immagini che raggiunge casa.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani illuminati sono abbastanza luminosi da lavare via i dettagli fini, a meno che tu non sottoesponga con decisione. Il mosaico risultante sembra "perfettamente sicuro" e "decisamente caldo".
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowSunnyHighlands_00 = Le colline illuminate proiettano ombre dai margini duri che si spostano quanto basta tra i fotogrammi da prendere in giro il software di cucitura. Segni le giunture come "scientifiche".
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowTransitionalLowlands_00 = Nella zona di transizione, una tenue foschia ammorbidisce i contrasti e fa sembrare la superficie silenziosamente incerta. Le note di mappa dicono: "Possibile fascia di comfort. Ancora poco confortevole".
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowTransitionalHighlands_00 = Le colline crepuscolari mostrano creste a strati e toni attenuati sotto il debole rosso. La camera smette finalmente di lamentarsi e inizia a fare il suo lavoro.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani in ombra sono uno studio a basso contrasto di "quasi niente". Migliori le immagini finché il rumore non crea un continente credibile, poi torni indietro.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideHighlands_00 = I picchi sul lato notturno catturano occasionali riflessi che compaiono e scompaiono da un passaggio all'altro. Decidi che sono reali e non l'universo che ti fa l'occhiolino.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowSoutheasternMountains_00 = Le montagne sud-orientali bucano la sottile foschia con profili netti vicino al confine giorno-notte. Il mosaico le fa sembrare a guardia dell'unico posto ragionevole del pianeta.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowWesternMountains_00 = Le montagne occidentali scorrono in lunghe sequenze lente, offrendo molta sovrapposizione per la cucitura. Molta sovrapposizione e molto tempo per sentirti lontano da qualunque cosa familiare.
        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne in ombra sono sagome contro un nulla illuminato dalle stelle, con definizione appena sufficiente a essere minacciosa. Il Controllo Missione chiede una mappa più chiara, tu chiedi un universo più luminoso.
        #GEPscience_bd_orbitalScope_NodensInSpaceHigh_00 = Dall'orbita alta, Nodens è un gioiello tenue sotto il sole rosso: fin troppo familiare nella forma, fin troppo estraneo nel tono. Il team di mappatura mette i dati in coda dietro tre salti di relay e molti sospiri.
        #GEPscience_bd_orbitalScope_NodensInSpaceHigh_01 = L'anteprima del mosaico globale si carica lentamente, riga dopo riga, come se Nodens si stesse rivelando di proposito. Qualcuno osserva "sembra abitabile" e aggiunge subito "probabilmente non per noi".
        #GEPscience_bd_orbitalScope_NodensInSpaceLowSaltySeas_00 = I mari salati riflettono un cielo rame opaco, spezzato da lunghi disegni striati dal vento. Il software di cucitura segnala "texture in movimento", che è un modo educato per dire "onde".
        #GEPscience_bd_orbitalScope_NodensInSpaceLowSaltySeas_01 = I fotogrammi in sequenza mostrano grandi correnti che si arricciano come inchiostro sull'acqua. Programmi un altro passaggio e speri che il ritardo delle comunicazioni non duri più del meteo.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowFreshWater_00 = I bacini di acqua dolce appaiono più scuri e più calmi del mare aperto, con linee di costa che non coincidono del tutto con le immagini dell'orbita precedente. O l'acqua si muove, oppure il pianeta sta giocando con i tuoi punti di riferimento.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowFreshWater_01 = La camera cattura una lieve foschia sopra i laghi che impasta il contrasto quanto basta da essere irritante. Lo archivi come "atmosfera presente, pazienza richiesta".
        #GEPscience_bd_orbitalScope_NodensInSpaceLowShores_00 = La costa è un confine frastagliato tra schiuma luminosa e suolo scuro, che si riordina continuamente tra un passaggio e l'altro. Il mosaico avrà bisogno di meno sogni e di più punti di controllo.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowShores_01 = Barre di sabbia e delta compaiono come lentiggini pallide che si spostano a ogni orbita. La cartografia chiede "una costa stabile" e Nodens rifiuta.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sono un patchwork di verdi e bruni smorzati sotto la luce rossa, come una cartolina stampata con l'inchiostro sbagliato. Correggi il bilanciamento e sembra comunque alieno.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalLowlands_01 = Lunghe ombre di nubi scorrono sui bassopiani tropicali tra i fotogrammi, disegnando continenti provvisori. Il Controllo Missione lo chiama "illuminazione dinamica", tu lo chiami "sovrapposizione rovinata".
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano ampie pianure solcate da canali appena accennati che appaiono solo con certi angoli di sole. Pianifichi un secondo passaggio perché Nodens si rifiuta di restare fermo per la tua mappa.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateLowlands_01 = Il terreno sembra accogliente finché la foschia non fa sparire l'orizzonte nel rosso. La camera lo etichetta "diffusione normale", lo stomaco lo etichetta "lontano da casa".
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalMidlands_00 = Le pianure tropicali si risolvono in creste ondulate e bacini con un rilievo più netto del previsto. L'anteprima del mosaico sembra un posto in cui potresti camminare, finché non ricordi il ritardo del segnale per chiedere permesso.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalMidlands_01 = Una sottile bandatura tonale suggerisce materiali di superficie diversi, o diversi tipi di rimpianto. Aumenti il tempo di esposizione e prometti alla lente che smetterai di puntarla verso il sole.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateMidlands_00 = Le pianure temperate danno fotogrammi puliti e ad alto contrasto quando le nubi collaborano. Per alcuni minuti gloriosi, mappare sembra quasi come a casa, solo più rosso e più silenzioso.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateMidlands_01 = Passaggi ripetuti mostrano una lieve foschia che si accumula nelle depressioni, cambiando la scena quel tanto che basta per rompere la cucitura automatica. Il computer pretende "verità a terra", tu al momento sei nello spazio.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowHighlands_00 = Le colline proiettano ombre lunghe e taglienti che fanno sembrare ogni cresta più alta di quanto dovrebbe. Etichetti il file "Non Atterrare Qui (Forse)".
        #GEPscience_bd_orbitalScope_NodensInSpaceLowHighlands_01 = Affioramenti di roccia chiara punteggiano i pendii più scuri come luci di avvertimento. La stabilizzazione della camera lavora senza sosta mentre il pianeta finge con calma di non essere intimidatorio.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTundra_00 = La tundra sta sotto un velo sottile e lattiginoso che addolcisce tutto in gradienti grigio rossi. Il mosaico sembra un livido con topografia.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTundra_01 = Chiazze spolverate di brina compaiono e scompaiono da un'orbita all'altra, come se il terreno respirasse. Controlli due volte l'orario, il pianeta è semplicemente veloce a essere strano.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate sono abbastanza luminose da mettere alla prova il sensore anche attraverso la foschia, con linee di frattura come ragnatele sui poli. Il software di cucitura suggerisce occhiali da sole.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowIceCaps_01 = I bordi delle calotte ghiacciate mostrano margini smerlati che cambiano tra un passaggio e l'altro, indizio di venti attivi o di uno scorrimento stagionale. Etichetti la serie "tenere d'occhio" e "non leccare".
        #GEPscience_bd_orbitalScope_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama è un disco pallido sotto un debole sole rosso, con Nodens lì vicino come un supervisore silenzioso. Il mosaico completo impiega un'eternità a scendere, una striscia inquietante alla volta.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowFlats_00 = I terreni piatti danno fotogrammi puliti e ripetibili, finché non noti che le stesse crepe "pulite" non si allineano mai tra un passaggio e l'altro. Il software lo chiama "parallasse", tu lo chiami "Belisama".
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sono scuri e lisci nella luce rossa, con deboli striature che sembrano pennellate trascinate sulla superficie. I punti di controllo sono facili da scegliere, più difficili da fidarsi.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTemperateLowlands_00 = Nei bassopiani temperati, sottili creste emergono solo con certi angoli di sole. Pianifichi un'altra orbita e ricordi che "domani" è una parola lunga quassù.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano terreno ondulato e a blocchi che compone una griglia di mosaico soddisfacente. Poi le ombre cambiano e la griglia diventa "interpretativa".
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTemperateMidlands_00 = Le pianure temperate sembrano schiacciate e poi di nuovo increspate. Il team di mappatura chiede cosa l'abbia causato, tu mandi altre foto e li lasci discutere con calma.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowHighlands_00 = Le colline proiettano ombre taglienti che fanno sembrare ogni cresta atterrabile finché non fai zoom. La camera risolve i massi, la tua fiducia no.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowPoles_00 = I poli brillano con chiazze di albedo più alta che sovraespongono quel tanto che basta da essere irritanti. Bracketing degli scatti e finisci comunque con "bianco" in tre gusti diversi.
        #GEPscience_bd_orbitalScope_SucellusInSpaceHigh_00 = Da quest'orbita alta, Sucellus sembra una fredda voce di corridoio piena di risorse che vaga sotto il sole rosso. Il rumore da radiazione nei fotogrammi ricorda che anche la camera è molto lontana da casa.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowBasins_00 = I bacini formano ampie conche dai bordi netti che si assemblano benissimo in una mappa quasi perfetta. Quasi perfetta, finché il gradiente di esposizione non trasforma ogni bacino nel suo esperimento di illuminazione.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowLowlands_00 = I bassopiani rivelano deboli bande e toni marezzati che fanno sussurrare ai geologi "metallo" come fosse uno spuntino. Segni le anomalie e cerchi di non immaginare attrezzature minerarie fin quassù.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowTropicalMidlands_00 = Le pianure tropicali sono un mosaico di texture che si rifiuta di ripetersi da un passaggio all'altro. Il team del mosaico chiede "una superficie stabile", e Sucellus declina cortesemente.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowTemperateMidlands_00 = Le pianure temperate offrono bordi nitidi e un rilievo utile, finalmente una mappa che sembra una mappa. Poi arriva il ritardo delle comunicazioni e sembra di averla mappata per dei fantasmi.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowHighlands_00 = Le colline mostrano dorsali frastagliate e affioramenti luminosi che bucano la scarsa luce. I tuoi punti di cucitura si raccolgono attorno a loro come kerbal spaventati attorno a un falò.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowPoles_00 = I poli sono cupi, luminosi e rumorosi tutti insieme, come se l'universo aggiungesse disturbi apposta. Archivi il dataset come "copertura polare ottenuta, sanità mentale facoltativa".
        #GEPscience_bd_orbitalScope_CaireenInSpaceHigh_00 = Da quest'orbita alta, Caireen è poco più di un'ombra sagomata accanto a Sucellus, illuminata da un sole rosso stanco. Ti consola il fatto che la mappa non possa perdersi, c'è quasi nowhere dove andare.
        #GEPscience_bd_orbitalScope_CaireenInSpaceLowLowlands_00 = I bassopiani sono più lisci del previsto, interrotti da blocchi sparsi che sembrano consegnati ieri. Rielabori il mosaico due volte, giusto per essere certo che quel "nuovo" non sia un artefatto di compressione.
        #GEPscience_bd_orbitalScope_CaireenInSpaceLowMidlands_00 = Le pianure producono un quilt di roccia irregolare e bitorzoluto, che l'algoritmo di cucitura detesta e gli scienziati adorano. Qualcuno suggerisce che sia stato catturato, il terreno risponde: "mi sto ancora adattando".
        #GEPscience_bd_orbitalScope_CaireenInSpaceLowHighlands_00 = Le colline proiettano ombre lunghe e teatrali che fanno sembrare Caireen più grande di quanto meriti. Ingrandisci e ricordi che è pur sempre una piccola luna con opinioni molto taglienti.
        #GEPscience_bd_orbitalScope_CaireenInSpaceLowPoles_00 = I poli mostrano pagliuzze luminose e vuoti scuri senza transizioni educate. Il mosaico finale sembra un cartello di pericolo che ha imparato la geologia.
        #GEPscience_bd_orbitalScope_SironaInSpaceHigh_00 = Gli anelli di Sirona tracciano archi sottili e brillanti nel buio, come se qualcuno avesse inciso una linea di compasso nello spazio. L'esposimetro oscilla tra "bellissimo" e "sei proprio sicuro".
        #GEPscience_bd_orbitalScope_SironaInSpaceHigh_01 = Il mosaico grandangolare cattura gli anelli come un alone tenue e scintillante, compensato dal bagliore stanco del sole rosso. Spedisci i fotogrammi a casa e immagini il team mappe guardarli caricarsi, una striscia luccicante alla volta.
        #GEPscience_bd_orbitalScope_SironaInSpaceHigh_02 = Da quest'orbita alta, Sirona è una biglia a strisce sotto un sole rosso fioco, e la "superficie" non sta mai ferma per la tua griglia. Il ritardo di downlink fa sembrare che il pianeta stia accadendo da qualche altra parte.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure inghiottono il contrasto e nascondono i dettagli come se fossero timidi. La deriva tra un fotogramma e l'altro trasforma il tuo piano di sovrapposizione accurato in un'opera d'arte interpretativa.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowLightTropicalBands_00 = Le bande tropicali chiare sovraespongono quel tanto che basta a cancellare la microstruttura, poi la restituiscono al passaggio successivo. Il software di cucitura inoltra un reclamo e chiede un'atmosfera più tranquilla.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkTemperateBands_00 = Increspature sottili nelle bande temperate scure si spezzano in nuovi schemi tra un'orbita e l'altra. Etichetti i mosaici come "dinamici", che è il termine educato per "poco collaborativi".
        #GEPscience_bd_orbitalScope_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare mostrano linee di shear abbastanza nette da usarle come bordi di mappa, finché non scivolano di lato mentre le stai ancora fotografando. Sirona si rifiuta di mettersi in posa.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowDarkPolarBands_00 = Le bande polari scure sono rumorose e a basso contrasto, come se la camera stesse guardando in un pozzo profondo. Aggiungi altri passaggi e accetti che qui "nord" è un suggerimento.
        #GEPscience_bd_orbitalScope_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare fioriscono in abbaglio al bordo, poi spariscono nella foschia. Bracketi le esposizioni e finisci comunque con "luminoso" in più modi incompatibili.
        #GEPscience_bd_orbitalScope_AirmedInSpaceHigh_00 = Da quest'orbita alta, Airmed sembra quasi accogliente, finché il sole rosso non rende estraneo ogni riflesso. L'anteprima della mappa arriva con tanto ritardo che hai già superato le tue prime impressioni.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani tropicali formano sagome ampie e leggibili che si assemblano pulite, finché le ombre lunghe non cambiano e ridisegnano i confini. Registri "ripetere passaggio" e aspetti il ritardo delle comunicazioni.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano deboli canalizzazioni e sottili variazioni tonali che compaiono solo con il sole basso. Cronometri la camera con cura e ti senti comunque come se stessi tirando a indovinare da lontano.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowTropicalMidlands_00 = Le pianure tropicali si risolvono in dorsali e bacini con un rilievo netto nella luce fioca. I punti di controllo abbondano, la fiducia no.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowTemperateMidlands_00 = Le pianure temperate sono un quilt marezzato di materiali che cambia aspetto a ogni orbita, perché la foschia va e viene. Il tool del mosaico lo chiama "trasparenza variabile", che suona meglio di "fastidioso".
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowHighlands_00 = Le colline proiettano ombre nette dai bordi duri che rendono il terreno più tagliente di quanto probabilmente sia. La camera lo adora, i pianificatori di atterraggio no.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedLowlands_00 = Nei bassopiani scuri, rumore e basso contrasto competono per la proprietà dell'immagine. Migliori con delicatezza, perché "inventare continenti" è malvisto.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedMidlands_00 = Le pianure scure mostrano abbastanza texture da inquietare: gobbe, dorsali e vuoti che rifiutano una classificazione ordinata. Etichetti le caratteristiche con le coordinate e lasci che il te futuro si preoccupi dei nomi.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedHighlands_00 = Le colline scure appaiono come silhouette con qualche luccichio occasionale, come se il mondo stesse nascondendo le sue parti più affilate. Il mosaico sembra un cartello di pericolo che ha imparato la geologia.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowPoles_00 = I poli si illuminano bruscamente con chiazze che non si comportano come semplice brina o roccia. Programmi copertura extra, perché "che cos'è?" impiega molto tempo ad arrivare a casa.
        #GEPscience_bd_orbitalScope_BorvoInSpaceHigh_00 = Da quassù, Borvo è una sfera dall'aria crepata sotto un sole rosso stanco, come se si fosse raffreddata troppo in fretta e non avesse mai smesso di lamentarsi. Il mosaico completo torna a casa goccia a goccia, attraverso i relay, come una confessione lenta.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalCraquelure_00 = La crettatura tropicale mostra fratture sottili e ramificate che sembrano cambiare spessore con la luce. I punti di stitching si moltiplicano finché il software chiede pietà.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateCraquelure_00 = La crettatura temperata forma reti di crepe più ampie e "tranquille"—tranquille, non calme. È un pattern perfetto da mappare e pessimo da immaginare da vicino.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali stanno tra i campi di fratture come isole di terreno più liscio, ma anche lì si notano lievi increspature. Lo registri come "regione stabile" con un asterisco molto piccolo.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateLowlands_00 = I bassopiani temperati offrono fotogrammi puliti e toni coerenti, e per un attimo ti dimentichi quanto sei lontano. Poi il ritardo del downlink ti ricorda che quel "per un attimo" sta facendo un sacco di lavoro.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTropicalMidlands_00 = Le pianure tropicali sono un groviglio di dorsali e placche spezzate che fa sembrare il mosaico un pavimento di piastrelle caduto. La camera cattura ogni spigolo, i nervi catturano il resto.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowTemperateMidlands_00 = Le pianure temperate mostrano texture stratificate che alternano liscio e frantumato in bande ordinate. I geologi dicono "interessante", tu dici "per favore non fatemi atterrare qui."
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowHighlands_00 = Le colline scintillano di affioramenti luminosi che bucano la luce fioca. Ottimi punti di controllo e ottimi motivi per mantenere una quota di sicurezza.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowMajorCraters_00 = I crateri maggiori ancorano il mosaico con bordi ed ejecta inconfondibili. Le ombre dentro sembrano abbastanza profonde da stoccare razzi di scorta, ma la camera non può confermare.
        #GEPscience_bd_orbitalScope_BorvoInSpaceLowPoles_00 = Il terreno polare è spoglio e ad alto contrasto, con linee di frattura che convergono verso la sommità come se il mondo stesse venendo "impacchettato" e chiuso. Aumenti la sovrapposizione e speri che siano solo le cuciture a richiudersi.
        #GEPscience_bd_orbitalScope_DamonaInSpaceHigh_00 = Da alta quota, Damona è una presenza quieta e solida sotto il sole rosso, con colori che non coincidono mai del tutto con "casa". Lì dietro, il team di mappatura discuterà di questi pixel molto dopo che tu avrai già proseguito.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano grandi pianure con deboli striature che compaiono solo quando la luce colpisce nel modo giusto. Pianifichi un altro passaggio e accetti che la pazienza fa parte del payload.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTemperateLowlands_00 = I bassopiani temperati si cuciono in un mosaico leggibile, quasi rassicurante nella loro coerenza. Quasi—finché una foschia non entra in scena e non sfuma i bordi tra un frame e l'altro.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTropicalMidlands_00 = Le pianure tropicali rivelano dorsali e bacini poco profondi che fanno sembrare il terreno lavorato e stanco. La camera è felice, l'interpretazione richiederà mesi di conversazioni a distanza.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowTemperateMidlands_00 = Le pianure temperate sono macchiate da lievi chiazze di albedo che non seguono una topografia ovvia. Segni "composizione?" e lasci che i camici litighino più tardi.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowHighlands_00 = Le colline proiettano ombre lunghe che esagerano ogni pendenza e rendono drammatico anche il terreno più sicuro. Il mosaico è bellissimo in modo vagamente minaccioso.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowImpactBasin_00 = Il bacino d'impatto domina più frame come una cicatrice che non è mai guarita dritta. Cuci una fascia ampia attorno, perché questa sarà l'unica cosa su cui tutti saranno d'accordo.
        #GEPscience_bd_orbitalScope_DamonaInSpaceLowPoles_00 = I poli si accendono e si spengono in chiazze nette senza transizioni gentili, come se la superficie non riuscisse a decidere di cosa è fatta. Raccogli copertura extra e cerchi di non chiederti cosa stia succedendo laggiù.
        #GEPscience_bd_orbitalScope_EponaInSpaceHigh_00 = Da alta quota, Epona è una biglia fredda sotto un sole rosso fioco, con una foschia lieve che fa arrivare il mosaico come una rivelazione lenta e incerta. Il team a casa discute "ghiaccio" contro "nubi" mentre il segnale striscia attraverso i relay.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sembrano scuri e lisci, come terreno ghiacciato che finge di essere acqua calma. La griglia di sovrapposizione è perfetta, l'illuminazione no, e le cuciture si vedono.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTemperateLowlands_00 = I bassopiani temperati si risolvono in ampie pianure con striature sottili che compaiono solo a bassi angoli solari. Pianifichi un altro passaggio e ricordi che "più tardi" è molto lontano, quassù.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTropicalUplands_00 = Gli altopiani tropicali proiettano ombre lunghe che trasformano ogni dorsale in un cartello di avvertimento. La camera adora il contrasto, i pianificatori di atterraggio no.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowTemperateUplands_00 = Gli altopiani temperati mostrano toni marezzati che non seguono linee di quota pulite, suggerendo materiali misti sotto il ghiaccio. Segni "composizione?" e lasci partire i dibattiti in differita.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowHighlands_00 = Le colline si definiscono in altopiani fratturati con affioramenti luminosi ottimi come punti di controllo. Sono anche ottimi promemoria che questo mondo non è costruito per il comfort.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowGrandPeaks_00 = I grandi picchi si alzano come denti frastagliati al terminatore, gettando ombre profonde abbastanza da inghiottire la tua gamma dinamica. Il mosaico è drammatico, e non sei certo che sia un complimento.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowCraters_00 = I crateri si cuciono con facilità—finalmente qualcosa che sta fermo—finché non noti depositi sottili che ammorbidiscono i bordi tra un passaggio e l'altro. Anche le cicatrici cambiano, nel crepuscolo rosso.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowVolcanoes_00 = I vulcani mostrano coni scuri e terreno macchiato che "sa di recente" anche da orbita. Il sensore della camera si scalda solo a guardarli, cosa che probabilmente non è così che funziona il calore.
        #GEPscience_bd_orbitalScope_EponaInSpaceLowPoles_00 = I poli diventano chiazze dure e luminose con bordi a festoni che rifiutano di sembrare semplice brina. Prendi copertura extra e speri in silenzio che il pianeta resti congelato finché sei nei paraggi.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceHigh_00 = Da alta orbita, Rosmerta è un puntino solitario che orbita intorno a Epona, illuminato da un sole rosso stanco e circondato da troppa assenza. Il mosaico completo torna così lentamente che sembra di mappare un ricordo.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sono piatti, privi d'aria e spietatamente nitidi: ogni sassolino vuole diventare un riferimento. Il rumore da radiazione che punteggia i frame ti ricorda che la nitidezza ha un prezzo.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano bacini lisci e distese spolverate di polvere che si cuciono bene in una mappa utilizzabile. Il risultato è ordinato nello stesso modo in cui è ordinata una stanza vuota.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTropicalMidlands_00 = Le pianure tropicali si spezzano in dorsali e avvallamenti poco profondi che sembrano onde congelate. Imposti più punti di controllo del necessario, soprattutto per sentirti in controllo.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowTemperateMidlands_00 = Le pianure temperate sono marezzate di pagliuzze luminose che risaltano nella luce fioca, poi spariscono con un'altra angolazione. Le etichetti "affioramenti" e resisti alla tentazione di chiamarle come degli snack.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowHighlands_00 = Le colline proiettano ombre a lama che fanno sembrare il terreno più tagliente di quanto probabilmente sia. Il tuo mosaico diventa un catalogo di posti che sei molto felice di orbitare e non di calpestare.
        #GEPscience_bd_orbitalScope_RosmertaInSpaceLowPoles_00 = I poli mostrano chiazze luminose e vuoti scuri senza transizioni gentili, come se la superficie non riuscisse a decidere di cosa è fatta. La mappa sembra un'etichetta di avvertimento con delle coordinate.
        #GEPscience_bd_orbitalScope_RAB-58EInSpaceHigh_00 = Da alta orbita, RAB-58E è a malapena un mondo: solo un punto interrogativo catturato che gira al margine del dominio di Epona. La sessione di riprese finisce in fretta, i dati impiegano un'eternità ad ammettere di esistere.
        #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowLowlands_00 = I bassopiani sono una macchia liscia e scura, punteggiata da alcuni massi ostinati che diventano ottimi ancoraggi per lo stitching. Se questo è un ammasso di neve, è il più scontroso che tu abbia mai visto.
        #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali mostrano materiale più chiaro sui pendii ripidi, come se lì fosse esposto qualcosa di più fresco. Zoomi, poi ricordi che non puoi chiedere alla superficie che cosa sia per diversi minuti luce.
        #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali si risolvono in dorsali grumose che cambiano carattere a ogni angolo solare, facendo sembrare il mosaico incoerente di proposito. Lo archivi come "corpo catturato, pazienza catturata."
        #GEPscience_bd_orbitalScope_CernunnosInSpaceHigh_00 = Da alta orbita, Cernunnos è un nano ghiacciato che deriva sotto il sole rosso fioco, con il sospetto che quassù non sia davvero solo. Il mosaico globale arriva in strisce lente, come se il vuoto dosasse il permesso di guardare.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTropicalLowlands_00 = I bassopiani tropicali appaiono come ampie pianure pallide con striature tenui che potrebbero essere brina scolpita dal vento o qualcosa di più strano. Lo stitcher si comporta bene, la tua immaginazione no.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano una texture gentile che rende la mappatura quasi rilassante, finché il silenzio e il ritardo delle comunicazioni non ti ricordano quanta strada ha dovuto fare la parola "rilassante" per arrivare qui.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure tropicali si spezzano in basse dorsali e bacini poco profondi, un pattern tranquillo ripetuto con una coerenza inquietante. Il mosaico sembra un luogo che sta aspettando da molto tempo.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTemperateMidlands_00 = Le pianure temperate rivelano chiazze di albedo marezzate che non si correlano con una topografia ovvia. Le segnali per analisi successive e accetti che "successive" verrà discusso su un collegamento molto lungo.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowHighlands_00 = Le colline proiettano ombre lunghe che fanno sembrare ogni pendio più ripido e più freddo di quanto già sia. Registri sovrapposizione extra perché il terreno sembra sfidare la tua mappa a sbagliare.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowSouthPolarHills_00 = Le colline polari meridionali formano gruppi di gobbe e dorsali che ricordano un surf congelato, fermato a metà movimento. Il mosaico è tecnicamente eccellente e emotivamente inquietante.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowNorthPole_00 = Il polo nord è una calotta luminosa con sottili crepe che si diramano verso l'esterno in linee leggere. La camera le risolve con chiarezza, il pensiero di ciò che potrebbero significare no.

        // bd_oso
        #GEPscience_bd_oso_GrannusInSpaceLow_00 = I sensori vanno in saturazione in un bagliore rosso profondo, il contatore di radiazione presenta un reclamo e gli otturatori scattano chiusi.
        #GEPscience_bd_oso_GrannusInSpaceLow_01 = Una flare "silenziosa" passa e manda comunque lo strumento in modalità di sicurezza. Il tuo pacchetto dati aspetta il suo turno nella lunga coda di ritorno.
        #GEPscience_bd_oso_GrannusInSpaceHigh_00 = Anche da quassù, Grannus è un rubino furioso che continua a cercare di cuocere i pannelli, un fotone alla volta.
        #GEPscience_bd_oso_GrannusInSpaceHigh_01 = Le misure a lunga base mostrano impulsi lenti e pesanti di attività. Il Controllo Missione chiede "meno poesia, più numeri" e riceve entrambi.
        #GEPscience_bd_oso_TaranisInSpaceLow_00 = Il lato diurno riflette calore come uno specchio da forgia, lo spettro solare torna netto, rovente e leggermente offensivo.
        #GEPscience_bd_oso_TaranisInSpaceLow_01 = Attraversando l'emisfero notturno, il grafico del flusso precipita di colpo. Il silenzio improvviso è quasi peggio del bagliore.
        #GEPscience_bd_oso_TaranisInSpaceHigh_00 = Da alta orbita, Taranis sembra una moneta divisa tra brace e inchiostro, e nessuno dei due lati offre molto riparo dal flusso di particelle.
        #GEPscience_bd_oso_TaranisInSpaceHigh_01 = Le letture alternano tra "troppo" e "troppo poco" mentre l'orbita osserva ripetersi lo stesso brutale confine tra giorno e notte.
        #GEPscience_bd_oso_ToutatisInSpaceLow_00 = Sopra la fascia del crepuscolo, l'aria sottile aggiunge una lieve sbavatura alle misure, come se qualcuno avesse soffiato sul vetro del sensore.
        #GEPscience_bd_oso_ToutatisInSpaceLow_01 = Il lato arroventato scarica calore verso l'alto, mentre il lato oscuro contribuisce soprattutto con statica e grafici poco rassicuranti.
        #GEPscience_bd_oso_ToutatisInSpaceHigh_00 = Da qui Grannus è un puntino rosso fioco, ma il contatore di radiazione rifiuta di accettare la parola "fioco".
        #GEPscience_bd_oso_ToutatisInSpaceHigh_01 = Nei dati compare una sottile diffusione dovuta al quasi vuoto di Toutatis. Il Controllo Missione chiede se puoi "abbassare il sole". Fingi di provarci.
        #GEPscience_bd_oso_NodensInSpaceLow_00 = Lo spettro del sole rosso torna con grossi morsi mancanti dove la densa atmosfera di Nodens lo beve. Il grafico sembra avere i denti.
        #GEPscience_bd_oso_NodensInSpaceLow_01 = Le nubi del pianeta rimandano un bagliore opaco e rugginoso, i sensori continuano a chiedere se ti sei parcheggiato troppo vicino. Sì.
        #GEPscience_bd_oso_NodensInSpaceHigh_00 = Da alta orbita, la schermatura magnetica di Nodens appare come un grande e stabile "non è così male come potrebbe". Tutti festeggiano con responsabilità.
        #GEPscience_bd_oso_NodensInSpaceHigh_01 = La lunga integrazione finisce, poi passa ancora più tempo ad aspettare nella coda di trasmissione. La distanza aggiunge latenza a tutto, persino all'entusiasmo.
        #GEPscience_bd_oso_BelisamaInSpaceLow_00 = Il lato diurno bloccato cuoce sotto una lampada cremisi fioca, mentre il lato notturno resta ostinatamente freddo. I dati sono metà fiamma, metà vuoto.
        #GEPscience_bd_oso_BelisamaInSpaceLow_01 = Un'eclissi di Nodens taglia il segnale solare come una lama. Lo strumento la registra come "evento di oscurità inatteso", il che sembra accurato.
        #GEPscience_bd_oso_BelisamaInSpaceHigh_00 = Con solo un campo debole, le letture tremolano ogni volta che la stella espira. Il Controllo Missione consiglia "meno stella, più calma".
        #GEPscience_bd_oso_BelisamaInSpaceHigh_01 = In alto, Belisama e Nodens si muovono come un meccanismo a orologeria in coppia. L'emissione del sole batte contro di loro con una regolarità inquietante.
        #GEPscience_bd_oso_SucellusInSpaceLow_00 = I sensori segnalano una dura tempesta di particelle e poi chiedono educatamente un incarico diverso. Sucellus non negozia.
        #GEPscience_bd_oso_SucellusInSpaceLow_01 = Senza aria che lo ammorbidisca, l'emissione del sole rosso è dolorosamente pulita e dolorosamente forte. Quasi la senti attraverso i numeri.
        #GEPscience_bd_oso_SucellusInSpaceHigh_00 = Più lontano, la stella è più piccola ma resta cattiva. Il contatore insiste che la parte "fioca" è solo una voce.
        #GEPscience_bd_oso_SucellusInSpaceHigh_01 = Il monitoraggio a lunga base mostra lenti picchi che non coincidono con nulla che riconosci. Gli ignoti stanno iniziando a sembrare meteo locale.
        #GEPscience_bd_oso_CaireenInSpaceLow_00 = Il segnale solare sale e crolla mentre Caireen ruota attraversando l'ombra di Sucellus. È come misurare dentro una scatola che lampeggia.
        #GEPscience_bd_oso_CaireenInSpaceLow_01 = La piccola luna riflette quasi nulla, solo un tenue sussurro polveroso di luce rossa e un sacco di radiazione che preferiresti non assaggiare.
        #GEPscience_bd_oso_CaireenInSpaceHigh_00 = Quassù non c'è alcuna misericordia magnetica. La modalità "normale" dello strumento diventa un suggerimento, non un'impostazione.
        #GEPscience_bd_oso_CaireenInSpaceHigh_01 = Il downlink richiede un'eternità, e i dati arrivano con l'aria di essere più vecchi di quando li hai registrati. Persino la luce del sole sembra in ritardo quassù.
        #GEPscience_bd_oso_SironaInSpaceLow_00 = Il vasto campo magnetico di Sirona contorce il vento del sole rosso fioco in un groviglio ringhiante. I sensori lo registrano comunque.
        #GEPscience_bd_oso_SironaInSpaceLow_01 = Un picco di flare colpisce prima gli strumenti. Il pacchetto che lo spiega arriva dopo, da qualche parte dietro la luce.
        #GEPscience_bd_oso_SironaInSpaceHigh_00 = Da alta orbita, Grannus è solo una brace fumante in mezzo a tanto nero, e continua comunque a sparare particelle con entusiasmo.
        #GEPscience_bd_oso_SironaInSpaceHigh_01 = Il contatore di radiazione insiste per essere incluso nel rapporto solare. Lo archivi sotto "questioni correlate".
        #GEPscience_bd_oso_AirmedInSpaceLow_00 = Le ombre nette di Airmed fanno da otturatore perfetto, il bordo del sole appare frastagliato e poco amichevole quassù.
        #GEPscience_bd_oso_AirmedInSpaceLow_01 = La superficie bicolore sfreccia via e i sensori, per un attimo, non sono d'accordo su cosa conti come "luce solare".
        #GEPscience_bd_oso_AirmedInSpaceHigh_00 = Quassù, Airmed è un minuscolo riferimento sotto un cielo rosso. Ogni raffica solare riceve un timestamp e un lungo silenzio.
        #GEPscience_bd_oso_AirmedInSpaceHigh_01 = Il Controllo Missione chiede attività solare "in tempo reale". Inviate i dati più recenti che avete, alla fine.
        #GEPscience_bd_oso_BorvoInSpaceLow_00 = La foschia sottile di Borvo smorza un po' il morso del sole rosso, i sensori misurano ciò che manca e lo chiamano "utile".
        #GEPscience_bd_oso_BorvoInSpaceLow_01 = I riflessi delle pianure brune e delle nubi pallide confondono le letture, finché non ricordi: laggiù, tutto è un filtro.
        #GEPscience_bd_oso_BorvoInSpaceHigh_00 = Ben sopra Borvo, i dati solari si stabilizzano, la stella è fioca, lo sfondo è quieto e i numeri si comportano.
        #GEPscience_bd_oso_BorvoInSpaceHigh_01 = Compaiono lievi variazioni mentre il campo di Borvo spinge le particelle cariche in archi sorprendentemente ordinati.
        #GEPscience_bd_oso_DamonaInSpaceLow_00 = L'orizzonte craterizzato di Damona continua a eclissare il sole, i sensori, con calma, continuano a contare a ogni oscuramento.
        #GEPscience_bd_oso_DamonaInSpaceLow_01 = Il sole rosso sembra piccolo da qui, ma il flusso di particelle non ha ricevuto il messaggio.
        #GEPscience_bd_oso_DamonaInSpaceHigh_00 = Da alta orbita, Damona è un puntino grigio e un oceano di notte: condizioni eccellenti per guardare Grannus fare i capricci.
        #GEPscience_bd_oso_DamonaInSpaceHigh_01 = I dati tornano a casa strisciando su un collegamento lungo, ma le firme delle flare sono inequivocabili anche a questa distanza.
        #GEPscience_bd_oso_EponaInSpaceLow_00 = L'aria sottile e gelida di Epona tinge la luce rossa in un alone strano. I sensori insistono che "vale".
        #GEPscience_bd_oso_EponaInSpaceLow_01 = Con solo un campo debole ad aiutare, gli strumenti registrano ogni raffica carica e chiedono educatamente una schermatura più spessa.
        #GEPscience_bd_oso_EponaInSpaceHigh_00 = Da alta quota sopra Epona, Grannus è una piccola brace con una gran bella attitudine. I grafici delle particelle sembrano offesi.
        #GEPscience_bd_oso_EponaInSpaceHigh_01 = Il pacchetto dati impiega un'eternità a raggiungere casa. La flare che descrive è già arrivata e già passata.
        #GEPscience_bd_oso_RosmertaInSpaceLow_00 = Niente aria, niente campo, niente pietà: solo vento solare grezzo che raschia la superficie di Rosmerta come carta vetrata che non puoi sentire.
        #GEPscience_bd_oso_RosmertaInSpaceLow_01 = I sensori registrano un picco netto all'alba. "Alba" sembra un po' un'esagerazione quassù.
        #GEPscience_bd_oso_RosmertaInSpaceHigh_00 = Ben sopra Rosmerta, il bagliore lontano di Epona continua a infiltrarsi nelle ottiche e a fingere di essere il sole.
        #GEPscience_bd_oso_RosmertaInSpaceHigh_01 = Lo spettro del sole è pulito e freddo, il silenzio tra un aggiornamento e l'altro è più lungo della checklist.
        #GEPscience_bd_oso_RAB-58EInSpaceLow_00 = RAB-58E lampeggia luminoso, poi scompare di nuovo. L'osservatorio segna i bagliori come "eventi di calibrazione inattesi".
        #GEPscience_bd_oso_RAB-58EInSpaceLow_01 = Il tracciatore stellare perde sicurezza vicino al lembo: l'orizzonte irregolare di questo planetesimo continua a mentire su dove sia "su".
        #GEPscience_bd_oso_RAB-58EInSpaceHigh_00 = Qui, vicino al bordo del dominio di Epona, il flusso solare sfarfalla in modo strano. O gli strumenti vanno alla deriva, oppure qualcosa li sta mettendo in ombra.
        #GEPscience_bd_oso_RAB-58EInSpaceHigh_01 = Il sole sembra stabile finché non ingrandisci, piccoli impulsi attraversano le letture come se qualcuno stesse picchiettando la linea.
        #GEPscience_bd_oso_CernunnosInSpaceLow_00 = Qui il sole rosso fioco scalda a malapena i rivelatori, ma l'osservatorio cattura comunque i suoi capricci, solo più piccoli e più soli.
        #GEPscience_bd_oso_CernunnosInSpaceLow_01 = Alzi al massimo il guadagno e scopri che l'universo ha opinioni nel livello di rumore.
        #GEPscience_bd_oso_CernunnosInSpaceHigh_00 = Da alta orbita, Grannus è una brace in un mare nero. Il vento solare è sottile, tagliente e paziente.
        #GEPscience_bd_oso_CernunnosInSpaceHigh_01 = La firma della flare arriva dopo un lungo ritardo, come una cartolina da una stella che non sa che la stai ascoltando.

        // bd_pegasus
        #GEPscience_bd_pegasus_GrannusInSpaceLow_00 = Il contatore d'impatto a malapena ticchetta, qualunque polvere ci sia sembra bruciare prima ancora di bussare.
        #GEPscience_bd_pegasus_GrannusInSpaceLow_01 = Qualche ping secco arriva dal nulla. Quando il Controllo Missione riceve il grafico, tutti hanno già litigato sull'interpretazione.
        #GEPscience_bd_pegasus_GrannusInSpaceHigh_00 = Lunghi tratti di nulla, poi un colpetto solitario. Il rivelatore sembra contare la distanza.
        #GEPscience_bd_pegasus_GrannusInSpaceHigh_01 = Il fondo è costante e basso. Sotto la luce rossa fioca di Grannus, perfino i detriti sembrano esitanti.
        #GEPscience_bd_pegasus_TaranisInSpaceLow_00 = Gli impatti arrivano rapidi ed energici, il rivelatore registra una serie di eventi "PER FAVORE BASTA".
        #GEPscience_bd_pegasus_TaranisInSpaceLow_01 = Un passaggio sopra il lato incandescente coincide con un picco di micro-urti. Il display sembra aver bisogno di crema solare.
        #GEPscience_bd_pegasus_TaranisInSpaceHigh_00 = Anche quassù, i micrometeoroidi si muovono come se fossero in ritardo. Ogni colpo è un piccolo martello.
        #GEPscience_bd_pegasus_TaranisInSpaceHigh_01 = Il contatore si calma sull'arco del lato in ombra, poi si riaccende quando il semiemisfero arroventato torna sotto di voi.
        #GEPscience_bd_pegasus_ToutatisInSpaceLow_00 = L'orbita bassa è sorprendentemente tranquilla, la sottile atmosfera potrebbe spazzare via i frammenti più piccoli prima che arrivino.
        #GEPscience_bd_pegasus_ToutatisInSpaceLow_01 = Il rivelatore fa più click vicino al confine crepuscolare, come se i detriti preferissero la linea tra fuoco e ghiaccio.
        #GEPscience_bd_pegasus_ToutatisInSpaceHigh_00 = In orbita alta il tasso d'impatto aumenta, a quanto pare Toutatis ha il suo piccolo "quartiere" di polvere.
        #GEPscience_bd_pegasus_ToutatisInSpaceHigh_01 = Alcuni colpi più grossi risuonano nella struttura. Programmate un messaggio al Controllo Missione per quando la radio deciderà di arrivare.
        #GEPscience_bd_pegasus_NodensInSpaceLow_00 = Il contatore d'impatto resta educatamente silenzioso. La spessa atmosfera di Nodens sembra fare il suo lavoro laggiù.
        #GEPscience_bd_pegasus_NodensInSpaceLow_01 = Qualche tocco lieve arriva con lunghe pause tra uno e l'altro. Le cime nuvolose in luce rossa sembrano calme, ma i dati dicono "non vuoto".
        #GEPscience_bd_pegasus_NodensInSpaceHigh_00 = Quassù gli urti arrivano un po' più spesso, come se foste usciti dalla coperta protettiva di Nodens e tornati nello spazio aperto.
        #GEPscience_bd_pegasus_NodensInSpaceHigh_01 = Il rivelatore registra un ritmo solitario di impatti. Quando scaricate il grafico, la discussione su "naturale" vs "avanzi" si è già raffreddata.
        #GEPscience_bd_pegasus_BelisamaInSpaceLow_00 = Gli impatti arrivano a grappoli, poi si fermano. Orbitare una luna in rotazione sincrona è come correre in corsie invisibili di polvere.
        #GEPscience_bd_pegasus_BelisamaInSpaceLow_01 = Il contatore schizza quando il bordo in avanzamento di Belisama fa da aratro, poi si assesta come se la luna stesse ripulendo il proprio percorso.
        #GEPscience_bd_pegasus_BelisamaInSpaceHigh_00 = Il ritmo tap-tap svanisce con la quota, ma non scompare mai del tutto. Qualcosa quassù sta tenendo il vicinato in disordine.
        #GEPscience_bd_pegasus_BelisamaInSpaceHigh_01 = Il rivelatore segna alcuni colpi netti sul lato che guarda il pianeta. È difficile non dare la colpa a Nodens, anche senza prove.
        #GEPscience_bd_pegasus_SucellusInSpaceLow_00 = Gli impatti arrivano duri e frequenti, come se Sucellus avesse raccolto graniglia per ere e rifiutasse di condividerla con gentilezza.
        #GEPscience_bd_pegasus_SucellusInSpaceLow_01 = Lo strumento riporta diversi colpi ad alta energia in rapida successione. Lo archivi sotto "motivi per controllare lo scafo più spesso".
        #GEPscience_bd_pegasus_SucellusInSpaceHigh_00 = Lunghi tratti di quiete, poi un ping violento. Qualunque cosa vi colpisca quassù ha avuto molto tempo per prendere velocità.
        #GEPscience_bd_pegasus_SucellusInSpaceHigh_01 = Il tasso resta basso, ma ogni evento sembra energico. Sotto il sole rosso fioco, anche la polvere è un po' ostile.
        #GEPscience_bd_pegasus_CaireenInSpaceLow_00 = Il sensore d'impatto frulla come se aveste attraversato uno starnuto di ghiaia. Caireen sarà piccola, ma lascia in giro opinioni pesanti.
        #GEPscience_bd_pegasus_CaireenInSpaceLow_01 = Una raffica di urti si allinea con l'orbita di Caireen. La luna sembra trascinarsi dietro una debole scia di detriti.
        #GEPscience_bd_pegasus_CaireenInSpaceHigh_00 = Sopra l'orbita stretta, gli impatti si diradano ma persistono. Lo spazio attorno a Caireen non è vuoto come sembra.
        #GEPscience_bd_pegasus_CaireenInSpaceHigh_01 = Il rivelatore registra tocchi sporadici senza uno schema chiaro. Il Controllo Missione suggerisce "continuate a registrare" e "cercate di non pensarci".
        #GEPscience_bd_pegasus_SironaInSpaceLow_00 = Il contatore gracchia mentre sfiorate graniglia proveniente dagli anelli, le "decorazioni" di Sirona stanno letteralmente carteggiando la navicella.
        #GEPscience_bd_pegasus_SironaInSpaceLow_01 = Il contatore d'impatto non sa cosa sia reale: micro-ping si mescolano al crepitio del violento ambiente magnetico di Sirona.
        #GEPscience_bd_pegasus_SironaInSpaceLow_02 = Una raffica di colpi arriva mentre sfiorate le fasce di radiazione. Etichettate il log "forse polvere, forse rovina" per l'analisi successiva.
        #GEPscience_bd_pegasus_SironaInSpaceHigh_00 = Più lontano, gli impatti arrivano in grappoli radi, come se attraversaste corsie invisibili nel vasto sistema di Sirona.
        #GEPscience_bd_pegasus_SironaInSpaceHigh_01 = Il rivelatore registra un colpetto solitario, poi minuti di silenzio. Sotto il sole rosso fioco, perfino i detriti sembrano sussurrare.
        #GEPscience_bd_pegasus_AirmedInSpaceLow_00 = L'orbita bassa attorno ad Airmed produce ticchettii secchi e frequenti: o c'è molta graniglia, oppure la luna sta ancora perdendo pezzi del suo passato.
        #GEPscience_bd_pegasus_AirmedInSpaceLow_01 = Il contatore schizza mentre passate sul terminatore. La luce è sbagliata, i tempi sono sbagliati, e la polvere non sembra importarsene.
        #GEPscience_bd_pegasus_AirmedInSpaceHigh_00 = Più in alto, gli impatti si diradano, ma ognuno è energico—come se aveste dato ai micrometeoroidi più spazio per accelerare.
        #GEPscience_bd_pegasus_AirmedInSpaceHigh_01 = Inviate i dati e ricevete una conferma… prima o poi. Il rivelatore continua ad ascoltare mentre la radio prende la strada panoramica verso casa.
        #GEPscience_bd_pegasus_BorvoInSpaceLow_00 = Lo strumento resta più silenzioso del previsto. La tenue aria di Borvo sotto di voi potrebbe spazzare via i frammenti più piccoli prima che arrivino in orbita.
        #GEPscience_bd_pegasus_BorvoInSpaceLow_01 = Qualche tocco lieve punteggia il passaggio. Il mondo velato sotto sembra calmo, ma la statistica insiste: è ancora un quartiere "attivo".
        #GEPscience_bd_pegasus_BorvoInSpaceHigh_00 = In quota gli impatti diventano più comuni, come se Borvo avesse un'ampia, debole aureola di polvere sopra l'atmosfera.
        #GEPscience_bd_pegasus_BorvoInSpaceHigh_01 = Il rivelatore registra una serie ordinata di urti, poi nulla. Sembra di aver oltrepassato il bordo di un confine invisibile senza che nessuno ve lo dicesse.
        #GEPscience_bd_pegasus_DamonaInSpaceLow_00 = Quasi solo silenzio, con qualche ping solitario. L'orbita di Damona sembra abbandonata, ma non vuota.
        #GEPscience_bd_pegasus_DamonaInSpaceLow_01 = Un colpo deciso risuona nella struttura. Controllate i pannelli, poi ricordate che il Controllo Missione vedrà la nota più tardi comunque.
        #GEPscience_bd_pegasus_DamonaInSpaceHigh_00 = Il contatore quasi non si muove. Quassù, il segnale più forte è quanto siete lontani da tutto ciò che riconoscete.
        #GEPscience_bd_pegasus_DamonaInSpaceHigh_01 = Un singolo colpetto spezza un lungo tratto di nulla. Il rivelatore lo registra diligentemente, come se temesse di perdere l'unico visitatore per giorni.
        #GEPscience_bd_pegasus_EponaInSpaceLow_00 = Il rivelatore resta perlopiù quieto, l'aria di Epona sotto di voi probabilmente spazza via la graniglia più minuta prima che raggiunga l'orbita.
        #GEPscience_bd_pegasus_EponaInSpaceLow_01 = Qualche tocco morbido interrompe il silenzio. Il sole rosso fioco fa sembrare calme le cime nuvolose, ma "calmo" non significa "vuoto".
        #GEPscience_bd_pegasus_EponaInSpaceHigh_00 = In quota gli impatti diventano più frequenti, come se foste saliti fuori dal riparo di Epona e dentro la polvere del sistema.
        #GEPscience_bd_pegasus_EponaInSpaceHigh_01 = Il contatore registra ping solitari ben distanziati. Programmate il downlink e cercate di non pensare a quanto ci vorrà per avere risposta.
        #GEPscience_bd_pegasus_RosmertaInSpaceLow_00 = Una breve raffica di colpi secchi suggerisce che Rosmerta stia perdendo briciole nella propria orbita.
        #GEPscience_bd_pegasus_RosmertaInSpaceLow_01 = Il pattern degli impatti cambia attraversando il terminatore. Sotto luce rossa, è difficile capire dove finisca la "notte" e inizi il "problema".
        #GEPscience_bd_pegasus_RosmertaInSpaceHigh_00 = Gli urti si diradano, ma non si fermano mai del tutto. Qualcosa continua ad alimentare questa piccola corsia di detriti.
        #GEPscience_bd_pegasus_RosmertaInSpaceHigh_01 = Il rivelatore registra un singolo colpo duro dopo minuti di nulla. Rosmerta sembra solitaria dai finestrini, non nei dati.
        #GEPscience_bd_pegasus_RAB-58EInSpaceLow_00 = Il contatore traballa a brevi grappoli, come se questo minuscolo planetesimo si trascinasse dietro una debole scia di graniglia.
        #GEPscience_bd_pegasus_RAB-58EInSpaceLow_01 = Diversi impatti energici arrivano uno dopo l'altro. Etichettate il log "roccia misteriosa è piccante" e andate avanti.
        #GEPscience_bd_pegasus_RAB-58EInSpaceHigh_00 = Sopra l'immediata vicinanza del planetesimo, gli impatti diventano rari e imprevedibili—come se sfioraste il bordo di un alone di polvere.
        #GEPscience_bd_pegasus_RAB-58EInSpaceHigh_01 = Il rivelatore ascolta pazientemente durante lunghi silenzi. Il Controllo Missione lo saprà più tardi. Molto più tardi.
        #GEPscience_bd_pegasus_CernunnosInSpaceLow_00 = Il tasso d'impatto è basso, ma ogni colpo risuona netto nella struttura. Quassù c'è molto spazio per accumulare velocità.
        #GEPscience_bd_pegasus_CernunnosInSpaceLow_01 = Un ping pulito spezza un lungo tratto di nulla. Il vuoto sembra deliberato, come se il sistema trattenesse il respiro.
        #GEPscience_bd_pegasus_CernunnosInSpaceHigh_00 = Quasi nessun impatto viene registrato. Il segnale più forte è quanto il sole rosso e tutto ciò che è familiare siano sbiaditi.
        #GEPscience_bd_pegasus_CernunnosInSpaceHigh_01 = Un singolo colpetto arriva come un visitatore. Lo registrate con cura, perché potrebbe non arrivarne un altro per un po'.

        // bd_Photometer
        #GEPscience_bd_kepler_GrannusInSpaceLow_00 = Il fotometro va a fondo scala sul rosso e ci resta. Voi comunque vi allontanate dall'oblò.
        #GEPscience_bd_kepler_GrannusInSpaceLow_01 = Anche con filtri pesanti, Grannus colora il sensore di un cremisi profondo. Il display odora vagamente di elettronica calda.
        #GEPscience_bd_kepler_GrannusInSpaceHigh_00 = Da quassù la curva di luminosità sembra calma, ma ogni conferma dal Controllo Missione arriva molto dopo che avete già sussultato.
        #GEPscience_bd_kepler_GrannusInSpaceHigh_01 = Lievi cali suggeriscono macchie stellari che scorrono sul disco. O il fotometro sta imparando a sbattere le palpebre.
        #GEPscience_bd_kepler_TaranisInSpaceLow_00 = In orbita bassa si vede un confine affilato tra il lato diurno incandescente e una notte senza fine. Le impostazioni di esposizione litigano fra loro.
        #GEPscience_bd_kepler_TaranisInSpaceLow_01 = La luce riflessa è meno "luccichio" e più abbaglio. Lo strumento propone gentilmente l'incandescenza come unità di misura.
        #GEPscience_bd_kepler_TaranisInSpaceHigh_00 = Dall'orbita alta la curva di fase è sbilenca, come se il pianeta si fosse dimenticato di ruotare secondo tabella.
        #GEPscience_bd_kepler_TaranisInSpaceHigh_01 = Il sole rosso fioco sovrasta comunque l'emisfero arroventato, mentre il lato buio scende così in basso che il sensore comincia a "vedere" la vostra stessa navicella.
        #GEPscience_bd_kepler_ToutatisInSpaceLow_00 = Il fotometro disegna una falce brillante e cotta e una metà fredda e scura. La fascia crepuscolare è l'unico posto in cui i numeri sembrano negoziabili.
        #GEPscience_bd_kepler_ToutatisInSpaceLow_01 = La luminosità cambia con terreno e foschia. L'aria sottile fa sembrare il lato caldo come se stesse cercando di brillare attraverso sé stesso.
        #GEPscience_bd_kepler_ToutatisInSpaceHigh_00 = Mediato sull'intero disco, Toutatis sembra quasi ragionevole. Nessuno crede che "ragionevole" appartenga a questo posto.
        #GEPscience_bd_kepler_ToutatisInSpaceHigh_01 = Le lunghe esposizioni colgono un debole bagliore al bordo nella tenue atmosfera. La conferma arriva dopo che il momento è già passato.
        #GEPscience_bd_kepler_NodensInSpaceLow_00 = Nodens brilla attraverso un'atmosfera spessa e "indaffarata". Le zone più luminose si spostano come lenti sistemi di tempesta sotto un sole rosso fioco.
        #GEPscience_bd_kepler_NodensInSpaceLow_01 = Il fotometro cattura occasionali luccichii che potrebbero essere acqua liquida. La risposta del Controllo Missione arriva dopo che avete già ricontrollato l'esposizione.
        #GEPscience_bd_kepler_NodensInSpaceHigh_00 = Dall'orbita alta, la curva di fase di Nodens sembra quasi invitante—finché non ricordate quanto "quasi" sia lontano da casa.
        #GEPscience_bd_kepler_NodensInSpaceHigh_01 = La luminosità del mondo varia con una regolarità ostinata. I numeri sembrano familiari, ma la luce diurna tinta di rosso no.
        #GEPscience_bd_kepler_BelisamaInSpaceLow_00 = Belisama è netta e priva d'aria, con cicatrici chiare e pianure più scure. Il rivelatore continua a dare la colpa del contrasto brutale alle vostre mani.
        #GEPscience_bd_kepler_BelisamaInSpaceLow_01 = Il bagliore di Nodens continua a infilarsi nei dati, come se il pianeta rifiutasse di lasciare alla sua luna un momento di privacy.
        #GEPscience_bd_kepler_BelisamaInSpaceHigh_00 = La curva di luce si ripete come un metronomo: il blocco mareale reciproco reso visibile dalla matematica.
        #GEPscience_bd_kepler_BelisamaInSpaceHigh_01 = Le eclissi mordono i dati con tagli puliti. L'unica parte disordinata è il vostro entusiasmo, che arriva molto prima della conferma in ritardo.
        #GEPscience_bd_kepler_SucellusInSpaceLow_00 = Sucellus è più scuro di quanto vorreste per una "voce" ricca di risorse. Il fotometro chiede con garbo se il tappo dell'obiettivo sia ancora inserito.
        #GEPscience_bd_kepler_SucellusInSpaceLow_01 = Ogni tanto passano lampi chiari: brina, minerali esposti, o semplicemente l'universo che aggiunge rumore alle vostre misure preziose.
        #GEPscience_bd_kepler_SucellusInSpaceHigh_00 = A questa distanza, Sucellus è una perlina dim sotto un sole ancora più dim. Le lunghe esposizioni trasformano la pazienza in un requisito di volo.
        #GEPscience_bd_kepler_SucellusInSpaceHigh_01 = Il segnale è sottile e granuloso, ma le medie suggeriscono regioni chiare a chiazze. Le etichettate "interessanti" e sperate di non star mentendo.
        #GEPscience_bd_kepler_CaireenInSpaceLow_00 = La luminosità di Caireen balbetta a ogni cambio d'angolo, come una roccia irregolare che prova a nascondere la sua forma nelle ombre.
        #GEPscience_bd_kepler_CaireenInSpaceLow_01 = La piccola luna riflette appena abbastanza luce da provare che esiste. Per il resto del tempo il fotometro sta soprattutto misurando i vostri dubbi.
        #GEPscience_bd_kepler_CaireenInSpaceHigh_00 = Dall'orbita alta, Caireen è un puntino con opinioni. Fate molti campioni e lasciate parlare la statistica.
        #GEPscience_bd_kepler_CaireenInSpaceHigh_01 = La curva quasi non esiste, ma si ripete: una piccola orbita infinita attorno a Sucellus, registrata come deboli pulsazioni nel buio.
        #GEPscience_bd_kepler_SironaInSpaceLow_00 = Le bande di Sirona increspano in una luce rubino opaca, e le regioni polari sfarfallano più brillanti come se qualcuno stesse tirando lentamente delle tende.
        #GEPscience_bd_kepler_SironaInSpaceLow_01 = Il fotometro continua a catturare deboli pulsazioni vicino ai poli. Le etichettate "aurora" e cercate di non immaginare il pianeta che guarda indietro.
        #GEPscience_bd_kepler_SironaInSpaceHigh_00 = Dall'orbita alta la curva di fase è liscia, con lievi gobbe che si ripetono come tempeste a orologeria sotto un sole rosso fioco.
        #GEPscience_bd_kepler_SironaInSpaceHigh_01 = Sirona domina ancora il rivelatore anche da quassù. Le impostazioni di esposizione sono soprattutto "non sbattere le palpebre" e "aspetta che il Controllo Missione recuperi."
        #GEPscience_bd_kepler_AirmedInSpaceLow_00 = Airmed è tutto contrasto duro: cicatrici fresche e chiare contro bacini scuri, illuminate da un sole rosso debole e dal bagliore di un gigante incombonte.
        #GEPscience_bd_kepler_AirmedInSpaceLow_01 = Da vicino, la mappa di albedo sembra una storia di impatti scritta in scala di grigi. Il rapporto arriva a casa molto dopo che avete già battezzato le forme.
        #GEPscience_bd_kepler_AirmedInSpaceHigh_00 = La curva di luce si ripete con regolarità da metronomo, come se Airmed avesse un solo lato "buono" e nessuna voglia di mostrare il resto.
        #GEPscience_bd_kepler_AirmedInSpaceHigh_01 = Quando Airmed scivola nell'ombra di Sirona, i valori crollano quasi a zero. Per un attimo non sapete se sia un'eclissi o solitudine.
        #GEPscience_bd_kepler_BorvoInSpaceLow_00 = La foschia di Borvo impasta le zone più luminose, trasformando il mondo in una lanterna morbida sotto il sole rosso. Ai bordi spiccano calotte più chiare o nubi più alte.
        #GEPscience_bd_kepler_BorvoInSpaceLow_01 = Il fotometro coglie luccichii occasionali attraverso zone più sottili—ghiaccio, liquido, o solo lo strumento che si illude.
        #GEPscience_bd_kepler_BorvoInSpaceHigh_00 = La curva di fase di Borvo è attenuata e arrotondata dall'atmosfera, ma la riflettanza media suggerisce una superficie chiara, forse ghiacciata.
        #GEPscience_bd_kepler_BorvoInSpaceHigh_01 = Le lunghe esposizioni fanno sembrare Borvo che si schiarisca e si scurisca come se respirasse. Controllate i sensori di cabina, per sicurezza.
        #GEPscience_bd_kepler_DamonaInSpaceLow_00 = Damona è una piccola brace di roccia, fioca. Alcuni puntini chiari potrebbero essere brina, o minerali ostinati che riflettono gli ultimi resti di luce rossa.
        #GEPscience_bd_kepler_DamonaInSpaceLow_01 = Qui l'illuminazione è sbagliata: le ombre sono lunghissime e il fotometro continua a chiedere se questo conti davvero come "giorno."
        #GEPscience_bd_kepler_DamonaInSpaceHigh_00 = Dall'orbita alta Damona è appena un puntino, e i dati sono perlopiù rumore con un segnale debole e ripetuto che rifiutate di ignorare.
        #GEPscience_bd_kepler_DamonaInSpaceHigh_01 = Dopo aver sommato fin troppe esposizioni, ottenete una stima di albedo: scura, polverosa e sorprendentemente costante—come se stesse aspettando da molto tempo.
        #GEPscience_bd_kepler_EponaInSpaceLow_00 = Il bordo di Epona mostra un debole bagliore freddo nella sottile luce diurna rossa. Il fotometro insiste che il "lato notturno" è comunque più luminoso di quanto dovrebbe.
        #GEPscience_bd_kepler_EponaInSpaceLow_01 = Chiazze chiare scorrono sotto una foschia irrequieta, suggerendo campi di ghiaccio e banchi di nubi. La conferma di Gene arriva dopo che avete già rifatto l'esposizione.
        #GEPscience_bd_kepler_EponaInSpaceHigh_00 = Dall'orbita alta, la curva di fase di Epona appare liscia e smorzata—come se il sole fosse "abbassato" e il pianeta stesse cercando di mantenerlo così.
        #GEPscience_bd_kepler_EponaInSpaceHigh_01 = Le integrazioni lunghe rivelano piccoli eventi di aumento di luminosità che si ripetono. O il meteo circola, oppure il sensore sta allucinando per noia.
        #GEPscience_bd_kepler_RosmertaInSpaceLow_00 = Rosmerta lampeggia tra ghiaccio accecante e ombra senza fondo a ogni rotazione. Il fotometro registra il contrasto e voi registrate i brividi.
        #GEPscience_bd_kepler_RosmertaInSpaceLow_01 = Alcune cicatrici chiare spiccano come graffi freschi su una pietra vecchia e sola. Le chiamate "Ciao" e "Per favore rispondi."
        #GEPscience_bd_kepler_RosmertaInSpaceHigh_00 = La curva di luce è pulita e prevedibile, come se Rosmerta si fosse rassegnata a essere misurata da lontano.
        #GEPscience_bd_kepler_RosmertaInSpaceHigh_01 = Quando il bagliore di Epona si insinua nei dati, la lettura sembra più calda del dovuto. È solo luce riflessa, ma sembra comunque compagnia.
        #GEPscience_bd_kepler_RAB-58EInSpaceLow_00 = Il fotometro fatica a stare dietro ai rapidi cambi di luminosità di RAB-58E. È meno "mondo" e più "discussione che gira."
        #GEPscience_bd_kepler_RAB-58EInSpaceLow_01 = Un lato è insolitamente luminoso, poi sparisce. Roccia catturata o palla di neve catturata, la piccola cosa rifiuta di stare ferma.
        #GEPscience_bd_kepler_RAB-58EInSpaceHigh_00 = A questa distanza il segnale è soprattutto rumore e ostinazione. Sommate esposizioni finché emerge un debole ondeggiamento periodico.
        #GEPscience_bd_kepler_RAB-58EInSpaceHigh_01 = La curva suggerisce una forma irregolare con superfici disomogenee. Il Controllo Missione concorda—prima o poi—quando il rapporto finalmente li raggiunge.
        #GEPscience_bd_kepler_CernunnosInSpaceLow_00 = Cernunnos è un disco quieto e ghiacciato con macchie più scure che bevono la luce rossa del sole. Il fotometro lo chiama "bassa albedo", voi lo chiamate inquietante.
        #GEPscience_bd_kepler_CernunnosInSpaceLow_01 = A certi angoli compare un sottile bordo brillante, come brina che si sveglia per un attimo prima di ricadere nel freddo.
        #GEPscience_bd_kepler_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos è una perlina fioca ai confini di tutto. Lo strumento ha bisogno di pazienza, l'equipaggio di distrazioni.
        #GEPscience_bd_kepler_CernunnosInSpaceHigh_01 = La luminosità media suggerisce ghiaccio mescolato a materiale scuro, che si ripete con una rotazione lenta. Qui fuori, anche una curva stabile sembra un messaggio.

        // bd_poke
        #GEPscience_bd_poke_TaranisSrfLandedScorchedLowlands_00 = L'asta riesce a malapena a graffiare la crosta vitrea, cotta dal calore, prima di "protestare". Sotto il fioco bagliore rosso di Grannus, perfino il "suolo" sembra voler restare solido.
        #GEPscience_bd_poke_TaranisSrfLandedMidlands_00 = Uno strato superficiale fragile cede a una graniglia sorprendentemente fine, poi si blocca di nuovo di colpo. La curva di forza sembra il battito di un sasso molto arrabbiato.
        #GEPscience_bd_poke_TaranisSrfLandedHighlands_00 = La sonda incontra regolite compattata e sinterizzata che si comporta più come ceramica che come polvere. Quando i dati arrivano a casa, hai già sentito il solitario *thunk*.
        #GEPscience_bd_poke_TaranisSrfLandedDarkSideMidlands_00 = La punta affonda di qualche millimetro nella polvere fredda e colpisce qualcosa di inflessibile sotto. Lo strumento scricchiola nel buio come se gli mancasse la luce del sole.
        #GEPscience_bd_poke_TaranisSrfLandedDarkSideHighlands_00 = La superficie si frattura con uno schiocco netto, poi rimbalza come se si fosse offesa. Il sole rosso qui è solo un debole contorno di luce, ma il terreno resta implacabile.
        #GEPscience_bd_poke_TaranisSrfLandedPoles_00 = Una spolverata di granuli simili a brina si comprime facilmente, poi l'asta si ferma di colpo su un substrato duro. "Morbido sopra, cattivo sotto" sembra un tema ricorrente così lontano da casa.
        #GEPscience_bd_poke_ToutatisSrfLandedSunnyLowlands_00 = Il terreno cotto oppone subito resistenza, come se fosse stato in forno per secoli. La punta esce abbastanza calda da poter fare da scaldino per snack.
        #GEPscience_bd_poke_ToutatisSrfLandedSunnyHighlands_00 = L'asta penetra a malapena prima che la lettura della forza salga bruscamente. Qualunque cosa sia, è stata saldata da un sole senza tregua.
        #GEPscience_bd_poke_ToutatisSrfLandedTransitionalLowlands_00 = La superficie cede in modo crepato e sfogliato, poi si compatta in qualcosa di coeso. Il ciclo termico sembra aver impastato il suolo come una pasta che non dovresti mangiare.
        #GEPscience_bd_poke_ToutatisSrfLandedTransitionalHighlands_00 = Una crosta a strati cede un poco, poi si blocca con uno stop improvviso. I dati suggeriscono alternanza di strati duri e detriti, come se il pianeta non sapesse decidersi.
        #GEPscience_bd_poke_ToutatisSrfLandedDarkSideLowlands_00 = La polvere fredda accoglie educatamente la sonda, finché non urta una lastra sepolta. La registri come "polvere sopra pavimento" e aspetti il lungo ritardo dell'uplink.
        #GEPscience_bd_poke_ToutatisSrfLandedDarkSideHighlands_00 = Il terreno è fragile, cede tutto insieme con un crack secco, poi incastra l'asta. Persino l'oscurità sembra tesa, qui.
        #GEPscience_bd_poke_ToutatisSrfLandedSoutheasternMountains_00 = Detriti compattati oppongono resistenza con costanza, richiedendo molta più forza del previsto. Le giunture della tuta si lamentano, ma i numeri sembrano davvero "da-base-costruibile".
        #GEPscience_bd_poke_ToutatisSrfLandedWesternMountains_00 = La sonda incontra detriti pieni di massi e si rifiuta di scendere oltre. Valuti di rinominare l'esperimento in "bd_stareAtRock".
        #GEPscience_bd_poke_ToutatisSrfLandedDarkSideMountains_00 = Schegge gelate e aria rarefatta rendono l'impatto stranamente secco e vuoto. L'asta risuona come una campana, e nessuno lo sente per diversi minuti.
        #GEPscience_bd_poke_NodensSrfLandedShores_00 = Il terreno umido cede facilmente, con una spinta soddisfacente e un po' "squish". L'aria densa sibila attorno agli stivali mentre il rumore dell'oceano sembra impossibilmente lontano da Kerbin.
        #GEPscience_bd_poke_NodensSrfLandedTropicalLowlands_00 = La sonda affonda più del previsto in un suolo morbido e coeso. Il Controllo Missione chiede se hai "punzecchiato qualcosa di vivo", ma la risposta arriva troppo tardi per suonare sicura.
        #GEPscience_bd_poke_NodensSrfLandedTemperateLowlands_00 = Un suolo elastico oppone una resistenza moderata e resta ben compatto durante l'estrazione. Le letture sembrano promettenti per future fondazioni, quando le navi di rifornimento avranno finito il loro lunghissimo viaggio.
        #GEPscience_bd_poke_NodensSrfLandedTropicalMidlands_00 = Un materiale più duro, simile all'argilla, stringe l'asta e la lascia andare con un pop riluttante. Annoti un'ottima coesione e un livello di pulizia estremamente discutibile.
        #GEPscience_bd_poke_NodensSrfLandedTemperateMidlands_00 = Strati ciottolosi rendono la curva di forza rumorosa e irregolare. L'analisi sembra avvenire su un altro pianeta… perché lo è, sotto quel sole rosso.
        #GEPscience_bd_poke_NodensSrfLandedHighlands_00 = Il terreno ben compattato oppone resistenza con regolarità, suggerendo compressione a lungo termine o cementazione. Se questo mondo ospiterà qualcosa, non sarà su terra traballante.
        #GEPscience_bd_poke_NodensSrfLandedTundra_00 = Una crosta gelata resiste alla prima spinta, poi si rompe lasciando il posto a materiale più morbido sotto. Lo strumento registra un profilo pulito a due strati e una battuta molto poco pulita.
        #GEPscience_bd_poke_NodensSrfLandedIceCaps_00 = L'asta scivola attraverso uno strato superiore granulare e si ferma con decisione sul ghiaccio solido. Sotto la luce fioca di Grannus, perfino la "neve" sembra estranea e lievemente inquietante.
        #GEPscience_bd_poke_BelisamaSrfLandedFlats_00 = La sonda entra liscia, poi incontra uno strato ostinato e compattato che non si muove di un millimetro. La traccia della forza sembra semplice, finché non ricordi quanta strada devono fare i dati.
        #GEPscience_bd_poke_BelisamaSrfLandedTropicalLowlands_00 = La superficie cede con una presa umida e coesa che resta attaccata all'asta quando la estrai. Qualunque cosa significhi "suolo" qui, sembra avere opinioni.
        #GEPscience_bd_poke_BelisamaSrfLandedTemperateLowlands_00 = Una crosta sottile si incrina, poi lascia il posto a un materiale solido e lavorabile. Sotto il fioco sole rosso, è rassicurante trovare qualcosa che si comporti in modo prevedibile.
        #GEPscience_bd_poke_BelisamaSrfLandedTropicalMidlands_00 = La sonda affonda un po' troppo facilmente, poi si irrigidisce quando i granuli si incastrano attorno. Lo strumento segnala ottima coesione e pessime maniere.
        #GEPscience_bd_poke_BelisamaSrfLandedTemperateMidlands_00 = La resistenza ciottolosa arriva a impulsi, come se il terreno fosse stratificato in vecchi depositi. La lettura arriva con minuti di ritardo, ma il *thunk* è stato immediato.
        #GEPscience_bd_poke_BelisamaSrfLandedHighlands_00 = Il terreno ben compattato oppone resistenza con costanza, suggerendo compressione a lungo termine o cementazione. Se qualcuno costruirà qui, serviranno trivelle, non ottimismo.
        #GEPscience_bd_poke_BelisamaSrfLandedPoles_00 = Uno strato superiore fragile e gelido si spezza di netto, poi la sonda si ferma su qualcosa di denso. Le ombre sembrano più lunghe, così lontano da casa.
        #GEPscience_bd_poke_SucellusSrfLandedBasins_00 = Il materiale fine accoglie la sonda, poi si incastra di colpo come se avessi colpito una lastra sepolta. La curva urla "sedimenti sopra qualcosa di più antico".
        #GEPscience_bd_poke_SucellusSrfLandedLowlands_00 = Resistenza moderata e una spinta fluida suggeriscono granuli ben selezionati. Il pacchetto dati finalmente "ping" a casa proprio quando inizi a sentire la mancanza del suono delle radio.
        #GEPscience_bd_poke_SucellusSrfLandedTropicalMidlands_00 = Un terreno appiccicoso e coeso stringe l'asta e la lascia andare con un pop riluttante. L'odore del campione viene registrato come "poco utile".
        #GEPscience_bd_poke_SucellusSrfLandedTemperateMidlands_00 = Una crosta a strati alterna friabile e compatto, come se gli sbalzi di temperatura la cuocessero e la spezzassero da secoli. La etichetti "fastidiosamente interessante".
        #GEPscience_bd_poke_SucellusSrfLandedHighlands_00 = La sonda penetra a malapena prima che la forza salga di colpo nella zona del "no". Sotto la luce rossa di Grannus, le alture sembrano saldate insieme.
        #GEPscience_bd_poke_SucellusSrfLandedPoles_00 = Brina granulare si comprime facilmente, poi la punta urta un substrato solido con uno stop secco. Lo strumento registra un profilo a due strati e un brivido a tre strati.
        #GEPscience_bd_poke_CaireenSrfLandedLowlands_00 = La sonda spinge in una graniglia compatta con una resistenza costante e sabbiosa. I numeri sono puliti, l'orizzonte è alieno e l'uplink è dolorosamente lento.
        #GEPscience_bd_poke_CaireenSrfLandedMidlands_00 = Granuli grossolani fanno vibrare l'asta e rendono il segnale di forza rumoroso. È come punzecchiare una scatola di vetri rotti, con gentilezza.
        #GEPscience_bd_poke_CaireenSrfLandedHighlands_00 = La superficie si comporta come polvere di pietra fragile fusa in una crosta. La punta gratta, stride e ti ricorda che questo mondo non prevede "atterraggi morbidi".
        #GEPscience_bd_poke_CaireenSrfLandedPoles_00 = Una patina fredda e polverosa cede subito a un materiale duro e denso sotto. Il sole rosso scalda appena la scena, ma il terreno resta implacabile.
        #GEPscience_bd_poke_AirmedSrfLandedTropicalLowlands_00 = La sonda morde una graniglia chiara e sciolta, poi si ferma su uno strato più tenace che sembra saldato dal calore. Il silenzio fa sembrare più forti i picchi di forza.
        #GEPscience_bd_poke_AirmedSrfLandedTemperateLowlands_00 = Una crosta sottile si sfalda e rivela particelle fini compattate sotto. La lettura è ordinata, la lunga attesa di conferma no.
        #GEPscience_bd_poke_AirmedSrfLandedTropicalMidlands_00 = La penetrazione è scarsa e ostinata, come se la superficie fosse stata sinterizzata in ceramica. Sotto il fioco sole rosso, il "suolo" è soprattutto atteggiamento.
        #GEPscience_bd_poke_AirmedSrfLandedTemperateMidlands_00 = L'asta scricchiola tra i granuli, poi si blocca di colpo su detriti sepolti. Registri "alta variabilità" e cerchi di non immaginare cosa abbia prodotto quei detriti.
        #GEPscience_bd_poke_AirmedSrfLandedHighlands_00 = La regolite compattata oppone resistenza con costanza, con pochissimo cedimento. Qualunque cosa abbia scolpito Airmed, ha lasciato una superficie che non perdona.
        #GEPscience_bd_poke_AirmedSrfLandedDarkenedLowlands_00 = Polvere fredda e scura accetta la punta per un attimo, poi una lastra densa la ferma di netto. Il grafico arriva dopo, ma il *thunk* è stato immediato.
        #GEPscience_bd_poke_AirmedSrfLandedDarkenedMidlands_00 = Una crosta fragile si frattura con uno schiocco secco e poi blocca la sonda in posizione. Per un attimo pensi di chiamarla "ricerca sull'ancoraggio".
        #GEPscience_bd_poke_AirmedSrfLandedDarkenedHighlands_00 = La sonda graffia appena la superficie prima che la forza salga nella zona del "no". Anche all'ombra, il terreno sembra fuso insieme.
        #GEPscience_bd_poke_AirmedSrfLandedPoles_00 = Granuli polverosi simili a brina si comprimono facilmente, poi passano quasi subito a un substrato solido. Due strati, un sole rosso e zero calore.
        #GEPscience_bd_poke_BorvoSrfLandedTropicalCraquelure_00 = La punta scivola tra piastre crepate e trova un riempimento morbido fra di esse. La curva di resistenza sembra una finestra rotta, appropriato.
        #GEPscience_bd_poke_BorvoSrfLandedTemperateCraquelure_00 = Una crosta fragile e a blocchi cede a gradini, come se il terreno fosse fatto di tegole impilate. L'aria sottile porta un lieve sibilo attorno allo strumento.
        #GEPscience_bd_poke_BorvoSrfLandedTropicalLowlands_00 = La sonda affonda più del previsto in un materiale coeso che resta attaccato durante l'estrazione. Qualunque cosa componga Borvo, non ama lasciar andare.
        #GEPscience_bd_poke_BorvoSrfLandedTemperateLowlands_00 = Una resistenza moderata e costante suggerisce granuli ben selezionati o ghiaccio finemente frantumato. L'atmosfera lo fa sembrare quasi normale, finché non alzi gli occhi verso il sole sbagliato.
        #GEPscience_bd_poke_BorvoSrfLandedTropicalMidlands_00 = Uno strato superiore rigido si incrina, poi cede a qualcosa di più denso e leggermente elastico. I numeri dicono "compresso", la sensazione dice "misterioso".
        #GEPscience_bd_poke_BorvoSrfLandedTemperateMidlands_00 = Interferenze ciottolose rendono la traccia di forza nervosa e irregolare. La etichetti "detriti misti" e l'uplink si prende tutto il tempo che vuole per concordare.
        #GEPscience_bd_poke_BorvoSrfLandedHighlands_00 = La sonda incontra terreno duro e compattato e penetra a malapena. Se Borvo nasconde del ghiaccio, lo sta nascondendo con molta sicurezza.
        #GEPscience_bd_poke_BorvoSrfLandedMajorCraters_00 = Eiezioni sciolte inghiottono la punta, poi si bloccano di colpo su un pezzo sepolto. Lo strumento segnala alta coesione per qualcosa che sembra puro caos.
        #GEPscience_bd_poke_BorvoSrfLandedPoles_00 = Brina granulare si compatta senza problemi, poi passa a uno strato resistente e ghiacciato sotto. Annota "ottima portanza" e "dita dei piedi terribili".
        #GEPscience_bd_poke_DamonaSrfLandedTropicalLowlands_00 = La sonda macina in polvere grigia che si comporta come pietra triturata. La penetrazione è scarsa, come se la superficie fosse stata pressata per secoli.
        #GEPscience_bd_poke_DamonaSrfLandedTemperateLowlands_00 = Una crosta sottile e fragile si spezza e scopre materiale più fine sotto. I dati sono puliti, il paesaggio no.
        #GEPscience_bd_poke_DamonaSrfLandedTropicalMidlands_00 = Granuli grossolani fanno vibrare l'asta e rendono il segnale di forza rumoroso. È come punzecchiare un secchio di ghiaia nel silenzio perfetto del vuoto.
        #GEPscience_bd_poke_DamonaSrfLandedTemperateMidlands_00 = La punta trova tasche morbide alternate a stop duri, suggerendo depositi stratificati. Qualunque cosa sia successa qui, non è successa con delicatezza.
        #GEPscience_bd_poke_DamonaSrfLandedHighlands_00 = Il terreno resiste come regolite fusa, più roccia che suolo. Sotto la luce fioca di Grannus, le alture sembrano particolarmente implacabili.
        #GEPscience_bd_poke_DamonaSrfLandedImpactBasin_00 = Il riempimento fine e sciolto del bacino accoglie la sonda con facilità, poi incontra detriti compattati più in profondità. Il profilo sembra una cicatrice a strati.
        #GEPscience_bd_poke_DamonaSrfLandedPoles_00 = Una patina fredda e polverosa si comprime subito prima che la sonda si fermi su un substrato denso. Il sole rosso aiuta poco, e i numeri lo confermano.
        #GEPscience_bd_poke_EponaSrfLandedTropicalLowlands_00 = La sonda affonda in una crosta fredda e compattata e si ferma su qualcosa di più tenace sotto. La curva di forza è ordinata, la brezza con un vago odore di metano no.
        #GEPscience_bd_poke_EponaSrfLandedTemperateLowlands_00 = Uno strato superficiale fragile si incrina, poi cede a un materiale denso e leggermente elastico. Sotto la fioca luce rossa di Grannus, il "suolo" sembra più un riempimento progettato che terra.
        #GEPscience_bd_poke_EponaSrfLandedTropicalUplands_00 = La penetrazione è scarsa e ostinata, come se il terreno fosse stato sinterizzato sul posto. La lettura arriva tardi, ma il rifiuto è stato immediato.
        #GEPscience_bd_poke_EponaSrfLandedTemperateUplands_00 = La crosta granulare cede di qualche millimetro, poi si blocca di colpo. Qualunque cosa si nasconda sotto l'esterno gelido di Epona, ha reso lo strato superiore molto serio.
        #GEPscience_bd_poke_EponaSrfLandedHighlands_00 = La sonda graffia appena la superficie prima che la forza salga nella zona del "no". Il sottile tepore che speravi di trovare, a quanto pare, è riservato solo agli interni.
        #GEPscience_bd_poke_EponaSrfLandedGrandPeaks_00 = La punta vibra tra granuli taglienti e si incastra su detriti sepolti. Annota "ottima stabilità" e "scarsa ospitalità".
        #GEPscience_bd_poke_EponaSrfLandedCraters_00 = Eiezioni sciolte inghiottono la sonda con facilità, poi urtano detriti compattati con uno stop improvviso. Il profilo sembra una cicatrice a strati, spedita a casa attraverso una distanza enorme.
        #GEPscience_bd_poke_EponaSrfLandedVolcanoes_00 = In superficie è crostoso e fragile, appena sotto è più caldo e molto più denso. Epona potrebbe essere congelata, ma questa "punzecchiata" suggerisce che stia fingendo.
        #GEPscience_bd_poke_EponaSrfLandedPoles_00 = Brina polverosa si comprime all'istante, poi la sonda si ferma sul ghiaccio solido. Il sole rosso consola poco, ma i dati sono piacevolmente chiari.
        #GEPscience_bd_poke_RosmertaSrfLandedTropicalLowlands_00 = La sonda spinge in particelle fini e polverose che restano attaccate per cariche elettrostatiche, poi urta un substrato duro e ghiacciato. Nel silenzio del vuoto, il *tick* dello strumento sembra assordante.
        #GEPscience_bd_poke_RosmertaSrfLandedTemperateLowlands_00 = Una crosta sottile si frattura con uno schiocco netto e rivela granuli compattati sotto. La traccia della forza sembra congelata sul posto da secoli.
        #GEPscience_bd_poke_RosmertaSrfLandedTropicalMidlands_00 = La punta affonda un poco, poi si blocca quando i granuli si incastrano attorno. Registri "alta coesione" e "poca pazienza", mentre aspetti l'uplink.
        #GEPscience_bd_poke_RosmertaSrfLandedTemperateMidlands_00 = Interferenze ciottolose rendono il segnale nervoso come un sismografo ansioso. La superficie di Rosmerta sembra metà polvere e metà ostinazione.
        #GEPscience_bd_poke_RosmertaSrfLandedHighlands_00 = La penetrazione è minima: qualunque cosa sia, è stata compattata fino a diventare quasi roccia. L'orizzonte è abbastanza vuoto da prenderla sul personale.
        #GEPscience_bd_poke_RosmertaSrfLandedPoles_00 = La sonda scivola attraverso brina fragile e si ferma di colpo su ghiaccio denso. Aggiungi una nota: "Non provare a scavare la strada per tornare a casa".
        #GEPscience_bd_poke_RAB-58ESrfLandedLowlands_00 = La sonda affonda più del previsto in materiale soffice, poi incontra un nucleo duro sotto. Roccia catturata o palla di neve? La risposta sembra essere "entrambi, scomodamente".
        #GEPscience_bd_poke_RAB-58ESrfLandedEasternHighlands_00 = La punta gratta, stride e penetra a malapena. Con questa gravità quasi nulla, perfino un "poke" sembra un grosso progetto edilizio.
        #GEPscience_bd_poke_RAB-58ESrfLandedWesternHighlands_00 = La crosta fragile si frantuma in piccole scaglie, poi blocca la sonda contro uno strato solido. Il dataset arriva in un pacchetto ordinato da un minuscolo satellite tutt'altro che ordinato.
        #GEPscience_bd_poke_CernunnosSrfLandedTropicalLowlands_00 = La sonda comprime brina fredda e granulare e si ferma su uno strato di ghiaccio denso sotto. Il sole rosso è lontano, il ghiaccio no.
        #GEPscience_bd_poke_CernunnosSrfLandedTemperateLowlands_00 = Una patina polverosa cede facilmente, poi la forza sale quando la punta incontra materiale compatto e antico. Il grafico sembra un rifiuto lento e paziente.
        #GEPscience_bd_poke_CernunnosSrfLandedTropicalMidlands_00 = La superficie si incrina come ceramica sottile e rivela un substrato più tenace sotto. Quasi si sentono i lunghi secoli di freddo nel modo in cui si spezza.
        #GEPscience_bd_poke_CernunnosSrfLandedTemperateMidlands_00 = Granuli ciottolosi fanno vibrare l'asta e producono un segnale rumoroso, poi la incastrano di colpo. Il terreno sembra detriti misti congelati nel tempo.
        #GEPscience_bd_poke_CernunnosSrfLandedHighlands_00 = La penetrazione è scarsa e la forza sale bruscamente, suggerendo regolite sinterizzata sopra il ghiaccio. Anche un pianeta nano può essere molto fermo nel far rispettare i confini.
        #GEPscience_bd_poke_CernunnosSrfLandedSouthPolarHills_00 = La sonda morde brina modellata dal vento e incontra subito ghiaccio denso e portante. Lo segni come "stabile" e "ancora inquietantemente lontano".
        #GEPscience_bd_poke_CernunnosSrfLandedNorthPole_00 = Uno strato superiore polveroso si compatta in modo uniforme, poi passa a ghiaccio duro con uno stop pulito. Il risultato "ping" a casa tardi, come una cartolina dal confine del nulla.

        // bd_radarAltimeter
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthPolarZone_00 = Il radar insiste di aver trovato una "superficie" sotto il bagliore del nord. Il Controllo Missione inizia a stendere una definizione molto lunga e molto prudente di "superficie".
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthSubpolarZone_00 = Gli echi tornano sfocati e tremolanti, come se la stella respirasse tra un impulso e l'altro. Il ritardo dell'uplink fa sembrare ancora più interminabile la discussione su un'"altitudine valida".
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthTemperateZone_00 = Il segnale di ritorno sfarfalla, disegnando increspature negli strati luminosi sotto. Lo etichetti "terreno" nel registro e aspetti la recensione furibonda.
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthTropicZone_00 = Compaiono ritorni forti, poi svaniscono, come se il bersaglio si fosse spostato per evitarli. Qualcuno suggerisce che la stella stia "schivando il radar" e nessuno ride.
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowEquatorialZone_00 = L'altimetro traccia un confine irregolare e ondulato che si comporta come un liquido, ma non lo è. La controversia ora è ufficialmente misurabile.
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthTropicZone_00 = I ping del radar trovano brusche "scogliere" di intensità del segnale, poi il nulla assoluto. Ricontrolli di non stare facendo altimetria per sbaglio sul vuoto.
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthTemperateZone_00 = Lo strumento segnala un'altitudine stabile per ben tre secondi, poi rinuncia e spara numeri. La consideri un record personale, così lontano da casa.
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthSubpolarZone_00 = La tempistica degli echi suggerisce strati mobili sovrapposti ad altri strati, e nessuno di loro concorda su dove sia il "basso". Il team scientifico lo definisce entusiasmante, tu lo definisci terrificante.
        #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthPolarZone_00 = I ritorni arrivano nitidi e taglienti, cosa sospetta nei pressi di una stella. Aggiungi una nota: "O abbiamo trovato una struttura, oppure il radar mente con grande sicurezza".
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthPolarZone_00 = Ad altitudine maggiore il segnale si stabilizza, delineando ampie bande di latitudine sotto il bagliore rosso. Chiamare "suolo" qualunque parte di tutto questo continua a sembrare sbagliato.
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthSubpolarZone_00 = Il radar dipinge onde leggere sugli strati luminosi sotto, come dune congelate fatte di luce. Il pacchetto dati arriva a casa in ritardo, come sempre.
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthTemperateZone_00 = L'intensità dell'eco sale e scende in cicli lenti che non corrispondono alla tua orbita. Segni "possibili strutture rotanti" e fai finta di non aver avuto un brivido.
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthTropicZone_00 = Una macchia scura sotto la traccia produce un ritorno più forte e più pulito. Il dibattito passa da "impossibile" a "scomodo".
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighEquatorialZone_00 = L'altimetro mappa una fascia ampia e irregolare che sembra scorrere lateralmente tra un passaggio e l'altro. Ti rendi conto che qui "altitudine" potrebbe richiedere un riferimento in movimento.
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthTropicZone_00 = Le interruzioni di segnale si raggruppano in bande, come se qualcosa stesse inghiottendo gli impulsi. Poche ore dopo, il Controllo Missione suggerisce "interferenze strumentali", che è il modo gentile per dire "panico".
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthTemperateZone_00 = La lettura si stabilizza abbastanza da costruire un profilo di quota grezzo. Il profilo sembra fatto di calore, non di roccia.
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthSubpolarZone_00 = La curva di temporizzazione suggerisce confini a strati, ognuno con un riflesso leggermente diverso. Ti chiedi se la stella abbia "meteo", nel modo in cui le montagne hanno meteo.
        #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthPolarZone_00 = L'altimetro disegna una linea di contorno sorprendentemente coerente. Qualcuno a casa la stamperà sicuramente su un poster e la chiamerà mappa.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthPolarZone_00 = Dallo spazio basso il radar trova un ritorno tenue e tremolante al margine del bagliore della stella. Rinomin i silenziosamente il file da "superficie" a "migliore ipotesi".
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthSubpolarZone_00 = Gli echi sono deboli ma ripetibili, e delineano ampie variazioni di quota negli strati luminosi. "Ripetibile" è l'unica parola che mantiene calmi i revisori.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthTemperateZone_00 = Un mosaico di ritorni più forti suggerisce densità irregolare sotto, come colline sepolte fatte di plasma. I numeri sembrano abbastanza scientifici da far partire un'altra discussione.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthTropicZone_00 = Il radar si aggancia a una banda luminosa e riporta una "quota media". Poche ore dopo, il Controllo Missione risponde con un prudente silenzio e una richiesta di altri dati.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowEquatorialZone_00 = Lo strumento abbozza un'ampia fascia in cui il percorso di ritorno si piega e traballa. Annota "rifrazione", poi ti ricordi che stai misurando una stella.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthTropicZone_00 = Un improvviso picco di intensità dell'eco coincide con una regione dall'aspetto più scuro. La registri come "struttura", perché "cosa" suona poco professionale.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthTemperateZone_00 = La traccia dell'altitudine è liscia finché non smette di esserlo, producendo un salto netto come una scogliera di luce. Il ritardo nelle comunicazioni fa sembrare l'attesa di istruzioni ancora più lunga.
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthSubpolarZone_00 = Il ritorno si affievolisce quasi fino a sparire, poi riprende, come se il bersaglio fosse stratificato come nebbia. La tua mappa ora ha linee di contorno "forse".
        #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthPolarZone_00 = Il radar disegna un profilo ordinato della banda polare sotto il fioco bagliore rosso della casa lontana. Segni il risultato: "controverso, ma coerente".
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowMagmaSea_00 = L'altimetro mostra un ampio bacino depresso con una superficie così liscia da comportarsi quasi come uno specchio. Lo archivi sotto "non fare pratica di atterraggio qui".
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowMagmaShores_00 = Netti salti di quota circondano i bacini roventi come onde congelate, solo che brillano. Il confine tra "riva" e "pericolo" è sottilissimo.
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowScorchedLowlands_00 = I ritorni delineano pianure piatte con occasionali creste frastagliate, tutto cotto sotto una luce rossa senza tregua. Il lato notturno è a pochi minuti d'orbita e sembra un altro mondo.
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowMidlands_00 = Un rilievo moderato compare in ondulazioni ripetute, come se la crosta avesse provato a imbarcarsi e si fosse fermata a metà. I dati impiegano un'eternità ad arrivare a casa, ma il terreno non sembra intenzionato a spostarsi.
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowHighlands_00 = Il profilo radar schizza verso alture ripide con crolli spettacolari. Ti chiedi se il pianeta stia cercando di scrollarti di dosso per esserti avvicinato tanto.
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowDarkSideMidlands_00 = L'emisfero oscuro produce echi più puliti, come se il freddo rendesse la superficie più "onesta". I tuoi strumenti non sono d'accordo, ma i tuoi nervi sì.
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowDarkSideHighlands_00 = Picchi aspri sul lato notturno proiettano lunghe "ombre" radar nei dati. Non li vedi, ma l'altimetro li rende fin troppo reali.
        #GEPscience_bd_radarAltimeter_TaranisInSpaceLowPoles_00 = I poli mostrano pendii più dolci e ampie distese tranquille rispetto al violento confine tra giorno e notte. Ti godi per un attimo la calma, poi ricordi quanto la "calma" sia lontana da casa.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighDarkSideHighlands_00 = Le alture del lato notturno producono picchi puliti e bacini profondi nel profilo. La mappa è splendida in un modo che, qui fuori, non riesci a goderti.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighDarkSideLowlands_00 = Sul lato notturno, l'intensità del ritorno è stabile e fredda. Non sai se sia rassicurante o solo efficiente.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighDarkSideMountains_00 = Le creste del lato notturno compaiono come picchi alternati a vuoti. Il ritardo del collegamento fa sembrare l'avviso come se arrivasse da un altro secolo.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighSoutheasternMountains_00 = Da alta quota, le montagne sudorientali si risolvono in dorsali intrecciate. L'atmosfera sottile attenua appena il silenzio inquieto nella cabina.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighSunnyHighlands_00 = L'altimetro delinea un motivo di altopiani e scarpate sotto una luce senza tregua. Il Controllo Missione lo vedrà minuti dopo e discuterà per ore.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighSunnyLowlands_00 = Più in alto, il radar liscia le pianure illuminate in ampie curve di livello luminose. L'emisfero verso il sole sembra ancora arrabbiato, anche ridotto a dati.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighTransitionalHighlands_00 = Le alture del terminatore formano un confine frastagliato tra calore e oscurità. Il radar dice "catena montuosa", lo stomaco dice "muro di confine".
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighTransitionalLowlands_00 = Nella zona di transizione, le variazioni di quota arrivano come onde gentili. È la cosa più vicina al "normale" che questo mondo concede, ed è inquietante.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingHighWesternMountains_00 = Il radar traccia lunghe pieghe aspre lungo le catene occidentali. Lo archivi come "terreno eccellente", cioè eccellente nello spaccare i lander.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowDarkSideHighlands_00 = Le alture del lato notturno producono picchi netti e crolli improvvisi. Ti chiedi cos'altro si nasconda nel freddo che il radar non sa nominare.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowDarkSideLowlands_00 = Sopra le pianure oscure, il radar dipinge una superficie che non puoi vedere affatto. I numeri arrivano più in fretta di quanto le stelle ti lascerebbero chiamare casa.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowDarkSideMountains_00 = Le montagne del lato oscuro scavano profondi vuoti nel segnale di ritorno. Sembra di volare sopra una mappa che qualcuno ha dimenticato di finire.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowSoutheasternMountains_00 = Le montagne restituiscono una spruzzata caotica di echi, come il filo di una lama seghettata. Il registro annota "terreno accidentato" e "non radere".
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowSunnyHighlands_00 = L'altimetro traccia ripide salite cotte dal sole che proiettano lunghe ombre radar. Per un attimo ti manca avere alberi contro cui schiantarti, invece.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowSunnyLowlands_00 = In basso sulle distese illuminate, il ritorno radar è netto e "caldo", come se il suolo stesse cercando di rispondere prima ancora della domanda.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowTransitionalHighlands_00 = Le creste nella zona del terminatore saltano fuori in fretta sul display. L'aria sottile non dà preavvisi, quindi ti fidi dei beep più che dei tuoi occhi.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowTransitionalLowlands_00 = Nella fascia del crepuscolo, gli echi si assestano in un profilo ragionevole, per una volta. Lo etichetti "zona comfort" e lo diffidi subito.
        #GEPscience_bd_radarAltimeter_ToutatisFlyingLowWesternMountains_00 = La quota traballa sopra i picchi occidentali mentre il radar si aggancia alle pareti a strapiombo. Tieni un dito sul pulsante di abort e l'altro sull'interruttore del muto.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowDarkSideHighlands_00 = Il rilievo del lato notturno spicca in contrasto netto: picchi, fosse e niente nel mezzo. Il pianeta sembra scolpito più che consumato.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowDarkSideLowlands_00 = Sopra le pianure oscure, i ritorni radar sono stabili e senza dettagli. Il vuoto sembra più grande quando il sole è alle tue spalle.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne del lato oscuro proiettano lunghe "ombre" radar nei dati di quota. Non le vedi, ma le senti.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowSoutheasternMountains_00 = Le montagne si risolvono in gradoni ripidi e valli spezzate lungo la traccia al suolo. La tua mappa guadagna dettaglio mentre il senso delle proporzioni ti scivola via.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowSunnyHighlands_00 = Le alture rivolte al sole emergono fiere nel profilo radar, tutte spigoli vivi e risposte dure. Almeno le rocce non chiedono perché sei qui.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowSunnyLowlands_00 = I passaggi in orbita bassa ricuciono le basse terre illuminate in una luminosa trapunta di quote. La mandi a casa e immagini la risposta arrivare dopo il tuo prossimo compleanno.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowTransitionalHighlands_00 = Le alture del terminatore segnano una cucitura aspra tra mondi. L'altimetro la tratta come geografia, tu la tratti come un'etichetta di avvertimento.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowTransitionalLowlands_00 = La traccia radar sulle basse terre del crepuscolo mostra una pendenza sorprendentemente uniforme. Qualcuno proporrà un sito di atterraggio, tu sospirerai forte.
        #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowWesternMountains_00 = Le strisciate radar sulle catene occidentali mostrano un terreno ripiegato come metallo accartocciato. Il fioco sole rosso fa sembrare stanchi perfino i grafici.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighFreshWater_00 = I bacini d'acqua dolce appaiono come depressioni lisce nella mappa delle quote. I numeri sembrano rassicurantemente "terrestri", e proprio per questo sono sospetti.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighHighlands_00 = Le alture risaltano come isole frastagliate di quota sopra un terreno più morbido. I picchi sembrano ottimi ripetitori radio e pessimi siti di atterraggio.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighIceCaps_00 = Le calotte polari disegnano altopiani lisci e alti, con bordi netti lungo i margini. Segni le scarpate e fai finta che non ti servirà mai atterrare lì.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighSaltySeas_00 = Da alta quota, i mari salati si spalmano in un ampio livello basso con margini rumorosi. La scala del pianeta ti colpisce quando l'orizzonte si rifiuta di finire.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighShores_00 = Le coste tracciano linee di contorno pulite nei dati, anche dove le nubi nascondono tutto il resto. Al radar non importa il panorama, solo la distanza.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighTemperateLowlands_00 = Le basse terre temperate mostrano ampie pianure alluvionali e sottili creste nel profilo. Ti chiedi se qualcosa sia vivo, poi torni a fissare l'altimetro.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighTemperateMidlands_00 = Le curve di livello radar rivelano valli ramificate e rialzi a gradoni. È quasi una mappa su cui potresti camminare, se non fossi a anni luce da un piano di salvataggio.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighTropicalLowlands_00 = Le basse terre tropicali risultano come un'ampia conca calda con chiazze sparse di asperità. Il Controllo Missione le chiamerà "anomalie" quando il messaggio arriverà.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighTropicalMidlands_00 = Le medie terre si risolvono in ondulazioni morbide come onde al rallentatore. L'aria densa ti tiene in volo, ma ti fa anche sentire in trappola.
        #GEPscience_bd_radarAltimeter_NodensFlyingHighTundra_00 = Il terreno di tundra mostra una rugosità a chiazze, come se il suolo fosse stato rotto e ricongelato. L'altimetro tiene un tempo perfetto, lo stomaco no.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowFreshWater_00 = Il radar trova una superficie liscia e coerente sopra l'acqua dolce, con piccole increspature nella temporizzazione. Per un attimo credi che questo mondo possa perdonare i visitatori.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowHighlands_00 = Le alture producono picchi netti che bucano il tappeto di nubi sul display. I tuoi occhi vedono ancora solo grigio e distanza.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowIceCaps_00 = Sopra le calotte polari, il radar rimbalza con forza e insiste che la superficie è molto piatta. Speri che il ghiaccio condivida la definizione di "superficie".
        #GEPscience_bd_radarAltimeter_NodensFlyingLowSaltySeas_00 = In basso sui mari salati, il disordine delle onde fa "gracchiare" l'altimetro. L'oceano sembra invitante finché non ricordi quanto sia lontana "casa".
        #GEPscience_bd_radarAltimeter_NodensFlyingLowShores_00 = Le linee di costa compaiono come gradini netti tra ritorni bagnati e asciutti. Lo strumento è sicuro, tu no.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowTemperateLowlands_00 = Sopra le pianure temperate, l'altimetro disegna dolci rialzi e bacini poco profondi sotto un fioco sole rosso. Il terreno potrebbe essere amichevole, forse.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowTemperateMidlands_00 = Il radar abbozza terrazzi stratificati nelle medie terre, come se il suolo cambiasse idea di continuo. Lo etichetti "geologia" e continui a volare.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowTropicalLowlands_00 = Aria densa e basse terre calde danno echi forti e quota stabile. C'è qualcosa in quella stabilità che sembra osservarti a sua volta.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowTropicalMidlands_00 = Le ondulazioni delle medie terre scorrono sotto di te nel profilo come lente onde di pietra. Il ritardo del collegamento dati trasforma ogni aggiornamento in un piccolo esercizio di pazienza.
        #GEPscience_bd_radarAltimeter_NodensFlyingLowTundra_00 = La tundra fredda restituisce echi puliti e luminosi, quasi troppo ordinati. Sospetti che il suolo sia congelato, non vuoto.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowFreshWater_00 = Il radar mappa le acque interne come chiazze scure e piatte tra rilievi più alti. Archivi la mappa e immagini che odore abbia la superficie, poi smetti.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowHighlands_00 = Le alture schizzano nette nel profilo, proiettando ombre radar dietro pendii ripidi. Nel rapporto le definisci "spettacolari", cioè "pericolose".
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowIceCaps_00 = I passaggi polari mostrano cupole di ghiaccio lisce con margini fratturati e crolli nascosti. Il fioco sole rosso brilla su un niente che, in realtà, non puoi vedere.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowSaltySeas_00 = Le scansioni in orbita bassa trasformano i mari salati in un livello di riferimento stabile, con una trama irrequieta. In scala di grigi il pianeta sembra accogliente, ma non è mai tutta la storia.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowShores_00 = Dallo spazio, i biomi costieri diventano confini di curva di livello netti tra due mondi. È la linea più pulita che vedi da quando hai lasciato casa.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowTemperateLowlands_00 = L'altimetro ricuce le basse terre temperate in pendenze dolci e percorribili. Riesci quasi a immaginare strade, ed è un pensiero poco utile quassù.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowTemperateMidlands_00 = La mappa rivela lunghi disegni simili a drenaggi incisi nelle medie terre. Se è acqua, è storia… oppure sta accadendo adesso.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowTropicalLowlands_00 = Le basse terre tropicali appaiono ampie e depresse, con segnali ruvidi sparsi come lava antica o montagne giovani. Il pacchetto dati striscia verso casa nel vuoto.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowTropicalMidlands_00 = Le fasce delle medie terre mostrano rialzi e depressioni ritmici, come se la crosta fosse stata impastata. Ti fidi del radar più che degli oblò.
        #GEPscience_bd_radarAltimeter_NodensInSpaceLowTundra_00 = Le regioni di tundra restituiscono echi luminosi e coerenti con una rugosità fine. La superficie sembra solida, ma il silenzio dice il contrario.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowFlats_00 = Il radar disegna vaste pianure livellate che sembrano quasi intenzionali. Sotto la fioca luce rossa di Grannus, "intenzionale" non è una parola rassicurante.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTropicalLowlands_00 = Le basse terre risultano come una conca liscia con chiazze sparse di asperità. La temporizzazione dell'eco è nitida, il lungo silenzio verso il Controllo Missione no.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTemperateLowlands_00 = L'altimetro ricuce dolci rialzi in una mappa utilizzabile. Ti sorprendi a pianificare un percorso in auto, poi ricordi che qui non esiste un carro attrezzi di soccorso.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTropicalMidlands_00 = Ondulazioni dolci compaiono nel profilo come onde congelate. Per un attimo i numeri sembrano familiari, poi il sole rosso oltre l'orizzonte rovina quella sensazione.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTemperateMidlands_00 = Le medie terre si risolvono in terrazzi e scarpate poco profonde, come se la luna stesse lentamente scivolando nella morsa di Nodens. La tua orbita è d'accordo, i tuoi nervi no.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowHighlands_00 = Le alture schizzano nette, proiettando ampie ombre radar dietro facce ripide. Dati eccellenti per scartare siti di atterraggio.
        #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowPoles_00 = I poli risultano come altopiani alti e puliti con margini bruschi. Etichetti i margini "interessanti", così il rapporto suona meno come "avvertimento".
        #GEPscience_bd_radarAltimeter_SucellusInSpaceLowBasins_00 = Il radar trova bacini profondi che sembrano scavati come se qualcuno avesse svuotato la crosta con un cucchiaio. I pacchetti di ritorno strisciano verso casa nel vuoto, ma i "buchi" sono inconfondibili.
        #GEPscience_bd_radarAltimeter_SucellusInSpaceLowLowlands_00 = Le basse terre si mappano come ampie terrazze depresse con sottili increspature di quota. Il silenzio del pianeta fa sembrare più forti anche le misure più pulite.
        #GEPscience_bd_radarAltimeter_SucellusInSpaceLowTropicalMidlands_00 = Le fasce delle medie terre mostrano rialzi e avvallamenti ripetuti, come se il terreno fosse stato impastato e lasciato raffreddare. I monitor delle radiazioni ticchettano in sottofondo, per nulla impressionati.
        #GEPscience_bd_radarAltimeter_SucellusInSpaceLowTemperateMidlands_00 = Il profilo rivela pendii a gradoni e valli lunghe e poco profonde. Ti chiedi come apparirebbero in pieno giorno, poi ricordi che qui la "luce del giorno" è solo un debole suggerimento rosso.
        #GEPscience_bd_radarAltimeter_SucellusInSpaceLowHighlands_00 = Le alture aspre risultano come picchi frastagliati con crolli improvvisi. Il team scientifico le chiamerà "struttura con potenziale risorse" quando i dati arriveranno, tu le chiami "non scendere".
        #GEPscience_bd_radarAltimeter_SucellusInSpaceLowPoles_00 = I passaggi polari mostrano quote ampie e stabili con meno sorprese taglienti. Qui fuori, "meno sorprese" vale come lusso.
        #GEPscience_bd_radarAltimeter_CaireenInSpaceLowLowlands_00 = L'altimetro fatica a decidere dove sia la "superficie media" su un corpo così piccolo. La soluzione è una mappa piena di note a piè di pagina e un pilota pieno di dubbi.
        #GEPscience_bd_radarAltimeter_CaireenInSpaceLowMidlands_00 = Il terreno intermedio risulta bitorzoluto e irregolare, come una roccia catturata che non ha mai imparato a comportarsi. Gli echi sono brevi, la distanza da casa no.
        #GEPscience_bd_radarAltimeter_CaireenInSpaceLowHighlands_00 = Le alture sono tutte spigoli vivi e ombre rapide nel segnale di ritorno. Quasi senti l'antico "carattere" dell'asteroide attraverso i dati.
        #GEPscience_bd_radarAltimeter_CaireenInSpaceLowPoles_00 = I poli mostrano contorni inclinati e irregolari che rendono il "nord" negoziabile. Archivi il dataset e, per un po', eviti di guardare in basso.
        #GEPscience_bd_radarAltimeter_SironaFlyingLowDarkTropicalBands_00 = Il radar segnala felice la tua quota sopra una "superficie" fatta di cime di nubi violentemente organizzate. Il team scientifico insiste che vada benissimo e che non sia affatto controverso.
        #GEPscience_bd_radarAltimeter_SironaFlyingLowLightTropicalBands_00 = Gli echi tornano forti e stabili dalle bande luminose, come se Sirona stesse fingendo di avere un suolo. Scrivi "strato di riferimento" e speri che la discussione resti su Kerbin.
        #GEPscience_bd_radarAltimeter_SironaFlyingLowDarkTemperateBands_00 = Il segnale di ritorno ondeggia con la turbolenza della banda, trasformando la traccia di quota in arte moderna. Il ritardo nelle comunicazioni significa che le urla arriveranno più tardi.
        #GEPscience_bd_radarAltimeter_SironaFlyingLowLightTemperateBands_00 = L'altimetro si aggancia a uno strato riflettente liscio e lo chiama "livello". Per un attimo valuti di credergli, poi ricordi che stai volando dentro un gigante gassoso.
        #GEPscience_bd_radarAltimeter_SironaFlyingLowDarkPolarBands_00 = I ping del radar svaniscono nella foschia polare e tornano tardi, come se l'atmosfera avesse fatto una deviazione. La cabina sembra molto piccola sotto il fioco sole rosso.
        #GEPscience_bd_radarAltimeter_SironaFlyingLowLightPolarBands_00 = La foschia polare luminosa dà echi nitidi e una lettura pericolosamente sicura di sé. Il Controllo Missione amerà i numeri, i revisori odieranno il presupposto.
        #GEPscience_bd_radarAltimeter_SironaFlyingHighDarkTropicalBands_00 = Quassù gli echi sono più deboli, ma insistono ancora nel tracciare un "terreno" ondulato sulle cime delle nubi. Etichetti il dataset "altimetria controversa" e tieni il casco addosso.
        #GEPscience_bd_radarAltimeter_SironaFlyingHighLightTropicalBands_00 = Le bande luminose riflettono quanto basta per abbozzare una baseline di quota liscia. È la bugia più pulita che i tuoi strumenti abbiano mai detto.
        #GEPscience_bd_radarAltimeter_SironaFlyingHighDarkTemperateBands_00 = Il profilo mostra dolci pendii che scivolano tra un passaggio e l'altro, come se il paesaggio non riuscisse a stare fermo. Qui fuori, perfino le mappe sembrano temporanee.
        #GEPscience_bd_radarAltimeter_SironaFlyingHighLightTemperateBands_00 = I ritorni radar delineano strati sovrapposti, ciascuno con una propria idea di "basso". Il ritardo verso casa fa sembrare ogni decisione presa nel passato.
        #GEPscience_bd_radarAltimeter_SironaFlyingHighDarkPolarBands_00 = La fasciatura polare produce echi a chiazze e improvvise interruzioni. Ti chiedi a quale livello di pressione stai davvero misurando, poi decidi che non vuoi saperlo.
        #GEPscience_bd_radarAltimeter_SironaFlyingHighLightPolarBands_00 = Lo strumento disegna una linea di contorno ordinata attorno al polo e lo chiama successo. Tu lo chiami "un confine sorprendentemente coerente per un pianeta senza confini".
        #GEPscience_bd_radarAltimeter_SironaInSpaceLowDarkTropicalBands_00 = Da orbita bassa, il radar dipinge la sommità dell'atmosfera come un mare ondulato di ombre. Definire qui il "livello del mare" richiede più burocrazia che carburante.
        #GEPscience_bd_radarAltimeter_SironaInSpaceLowLightTropicalBands_00 = Le bande luminose danno un ritorno forte e una mappa delle quote liscia. Senti già il dibattito lontano su cosa conti davvero come "mappare le nubi".
        #GEPscience_bd_radarAltimeter_SironaInSpaceLowDarkTemperateBands_00 = L'altimetro traccia ampie depressioni che scivolano lateralmente tra le orbite. Le etichetti "strutture", perché "colline in movimento" suona poco scientifico.
        #GEPscience_bd_radarAltimeter_SironaInSpaceLowLightTemperateBands_00 = Echi puliti disegnano i bordi delle bande come linee di costa su un mondo che si rifiuta di avere coste. Il sole rosso fa sembrare l'intera mappa stanca e lontana.
        #GEPscience_bd_radarAltimeter_SironaInSpaceLowDarkPolarBands_00 = I ritorni polari si spalmano in un anello rumoroso di incertezza, come se il polo si nascondesse dietro strati di meteo. Il silenzio tra un check-in e l'altro sembra più lungo dell'orbita.
        #GEPscience_bd_radarAltimeter_SironaInSpaceLowLightPolarBands_00 = Il radar trova uno strato riflettente luminoso e stabile e costruisce un modello di quota sicuro di sé. Alleghi una nota: "Sicurezza non implica superficie".
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowTropicalLowlands_00 = Il radar abbozza pianure basse e lisce che sembrano ingannevolmente calme sotto il bagliore rosso di Grannus. Le cicatrici si notano solo quando fai zoom.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowTemperateLowlands_00 = Ampi bacini livellati restituiscono echi puliti, come se la luna volesse essere semplice. La storia della superficie non è d'accordo.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowTropicalMidlands_00 = Le medie terre si alzano in rigonfiamenti irregolari, come se Airmed fosse stato ammaccato e non fosse mai tornato del tutto in forma. La mappa si scarica lentamente, un passaggio solitario alla volta.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowTemperateMidlands_00 = Le curve radar rivelano dorsali a gradoni e avvallamenti poco profondi, tutti dall'aspetto consumato e stanco. Lo archivi come "navigabile" e ti penti subito della parola.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowHighlands_00 = Picchi acuminati e scarpate improvvise saltano fuori dal profilo. Ottimo per la geologia, pessimo per qualunque cosa abbia gambe di atterraggio.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowDarkenedLowlands_00 = Sopra il terreno più scuro, il segnale di ritorno diventa più forte e stranamente più stabile. È come se la superficie bicolore fosse fatta di due risposte diverse.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowDarkenedMidlands_00 = Le medie terre scure mostrano un rilievo ruvido e spezzato con crolli improvvisi. Ti chiedi cosa abbia reso diverso questo lato, poi ricordi che il ritardo nelle comunicazioni non ti risponderà.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowDarkenedHighlands_00 = Le colline scure proiettano lunghe ombre radar dietro dorsali frastagliate. Da qualche parte lassù, Sirona resta sospesa nel cielo come promemoria che sei pur sempre una luna.
        #GEPscience_bd_radarAltimeter_AirmedInSpaceLowPoles_00 = I passaggi polari mostrano altopiani appiattiti con transizioni nette ai bordi. I dati sono nitidi, il silenzio tra un check-in e l'altro no.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowTropicalCraquelure_00 = Basso sopra il terreno crepato, l'altimetro "gracchia" con rapidi micro ritorni. Qualunque sia questa crosta, sta facendo del suo meglio per imitare vetro infranto.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowTemperateCraquelure_00 = La superficie fratturata produce una "firma di rugosità" rumorosa ma coerente. Il Controllo Missione la chiamerà tessitura, tu la chiami turbolenza con opinioni.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowTropicalLowlands_00 = Bassopiani lisci danno echi forti e quota stabile nell'aria densa di Borvo. Quella stabilità sembra che la luna ti stia tenendo giù.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowTemperateLowlands_00 = Il radar dipinge ampie pianure piatte con occasionali creste come onde sepolte. Il sole rosso fa sembrare l'orizzonte più vicino di quanto dovrebbe.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowTropicalMidlands_00 = Ondulazioni dolci compaiono come rialzi lenti e ripetuti. Sembra un mondo di dune che non sa decidere se è polvere o ghiaccio.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowTemperateMidlands_00 = Le medie terre si risolvono in terrazzi e valli poco profonde, sorprendentemente ordinate. Questo ti rende sospettoso di ciò che l'atmosfera sta nascondendo.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowHighlands_00 = Un rilievo frastagliato costringe l'altimetro ad agganciarsi a pareti a strapiombo e picchi taglienti. Tieni una mano sull'interruttore di abort e l'altra sul caffè.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowMajorCraters_00 = I bordi dei crateri schizzano in alto, poi precipitano in conche profonde con ritorni interni puliti. Per un attimo ammiri la geometria, poi ricordi che ci sei dentro.
        #GEPscience_bd_radarAltimeter_BorvoFlyingLowPoles_00 = I poli risultano come alture ampie e a dolce pendenza, con meno brusche discontinuità. "Meno" è il miglior aggettivo che ti capita oggi.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighTropicalCraquelure_00 = Da più in alto, le regioni crepate si fondono in ampie fasce ruvide nel profilo. Il disegno sembra intenzionale finché non ricordi che qui fuori niente sta cercando di aiutarti.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighTemperateCraquelure_00 = Gli echi si smussano in un campo di quote grossolano e maculato con tremolio persistente. L'aria di Borvo ti tiene in quota e ti tiene in attesa di autorizzazione.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighTropicalLowlands_00 = Le basse terre si appiattiscono in un livello di riferimento stabile sotto la foschia. È rassicurante, e per questo ricontrolli la calibrazione.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighTemperateLowlands_00 = Dolci gradienti formano una mappa su cui quasi potresti orientarti. Quel "quasi" sta facendo un lavoro enorme sotto un fioco sole rosso.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighTropicalMidlands_00 = Il radar delinea ampie ondulazioni che slittano leggermente tra un passaggio e l'altro. O il terreno è sottile, oppure l'atmosfera sta riscrivendo la tua mappa.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighTemperateMidlands_00 = I contorni delle medie terre appaiono puliti e stratificati, come fogli di crosta impilati. I dati arrivano abbastanza tardi da sembrare storia.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighHighlands_00 = I picchi si innalzano bruscamente, proiettando ombre radar che nascondono ciò che sta dietro. Perfetto per le checklist "non atterrare qui".
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighMajorCraters_00 = I grandi crateri compaiono come depressioni profonde e simmetriche con bordi nitidi. Li etichetti "pericoli" e speri che il messaggio arrivi a casa prima che qualcuno proponga un touchdown.
        #GEPscience_bd_radarAltimeter_BorvoFlyingHighPoles_00 = Il rilievo polare è attenuato e ampio, quasi calmo. La parola "calmo" resta comunque estranea, così lontano da casa.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowTropicalCraquelure_00 = Dall'orbita, le regioni di crettatura risultano come vaste placche ruvide ricucite sulla superficie. È il tipo di mappa che ti fa sussurrare invece di parlare.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowTemperateCraquelure_00 = La strisciata radar mostra terreno fratturato in lunghi campi interconnessi di quote frastagliate. Non sai se sia roccia spezzata o ghiaccio spezzato, e nessuna delle due opzioni è amichevole.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowTropicalLowlands_00 = I passaggi in orbita bassa trasformano i bassopiani tropicali in bacini lisci con piccoli puntini ruvidi sparsi. Il pacchetto striscia nel vuoto verso casa, ma le forme sono inconfondibili.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowTemperateLowlands_00 = Le pianure temperate si compongono in una trapunta di quote ordinata con margini dolci. Una mappa così pulita sembra una trappola.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowTropicalMidlands_00 = Le fasce delle medie terre si alzano in onde lente, poi si piegano in creste più taglienti senza preavviso. Il computer di navigazione sospira in modo udibile.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowTemperateMidlands_00 = Il profilo rivela valli ramificate e rialzi a gradoni, come se la crosta avesse continuato ad assestarsi. Lo salvi sotto "posti dove non cammineremo".
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowHighlands_00 = Le alture spingono in su con picchi ripidi e dorsali spezzate. L'altimetro non batte ciglio, tu sì.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowMajorCraters_00 = I crateri maggiori scavano conche profonde e pulite nel modello di quota, con ritorni luminosi dai bordi. Qualcuno vorrà atterrare in uno per "riparo", e tu ti opporrai ad alta voce.
        #GEPscience_bd_radarAltimeter_BorvoInSpaceLowPoles_00 = I poli mostrano ampi altopiani elevati con pendii lisci e margini netti. I margini ricevono una nuova etichetta: "non derapare".
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowTropicalLowlands_00 = Il radar traccia pianure basse e grigie con lievi increspature, come vecchi flussi congelati sul posto. Tutto sembra più quieto quando la radio impiega minuti a rispondere.
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowTemperateLowlands_00 = Ampie depressioni restituiscono echi stabili che fanno sembrare la luna semplice. I crateri a fossette dicono il contrario.
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowTropicalMidlands_00 = I contorni delle medie terre salgono a gradini irregolari, come se la superficie fosse stata scossa e non fosse mai stata ricolmata. Fissi il grafico e ti senti molto lontano.
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowTemperateMidlands_00 = L'altimetro mappa creste e avvallamenti poco profondi che si ripetono come un motivo consumato. Sotto la luce fioca di Grannus, perfino la ripetizione fa venire i brividi.
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowHighlands_00 = Il rilievo delle alture schizza netto, con lunghe ombre radar dietro scarpate ripide. È un ottimo posto per studiare gli impatti da una distanza di sicurezza.
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowImpactBasin_00 = Il grande bacino mostra un crollo marcato con un bordo rialzato e un interno fratturato. La forma è così chiara da sembrare un cartello di avvertimento.
        #GEPscience_bd_radarAltimeter_DamonaInSpaceLowPoles_00 = I passaggi polari rivelano altopiani inclinati e sottili discontinuità che rendono difficile definire un "terreno in piano". Archivi i dati e tieni la nave puntata verso le stelle.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowTropicalLowlands_00 = Il radar dipinge ampie pianure basse sotto la foschia gelida di Epona, come se la crosta congelata stesse cercando di sembrare calma. Il sole rosso sopra la testa non è d'accordo.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowTemperateLowlands_00 = La temporizzazione degli echi resta stabile sulle basse terre, dando una traccia di quota ordinata che quasi ti fidi. "Quasi" sembra un'unità sensata, quaggiù lontano.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowTropicalUplands_00 = Le alture salgono in ondulazioni lente sul display, come colline sepolte sotto il ghiaccio. Ti chiedi quanta parte sia roccia e quanta sia mistero congelato.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowTemperateUplands_00 = L'altimetro trova creste basse e scarpate gentili, attutite dalla distanza e da un cielo rosso e fioco. Il Controllo Missione vedrà questo passaggio molto dopo di te.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowHighlands_00 = I ritorni delle alture si affinano in pendii ripidi e discontinuità improvvise. Ottimo per una mappa, pessimo per chiunque stia pensando "atterriamo proprio lì".
        #GEPscience_bd_radarAltimeter_EponaFlyingLowGrandPeaks_00 = I picchi schizzano su come denti nel profilo di quota, poi svaniscono sotto la successiva fascia di foschia. Li etichetti "Grandi" così il rapporto suona coraggioso.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowCraters_00 = I bordi dei crateri saltano fuori netti sul radar, poi scendono in conche lisce. La geometria è rassicurante, finché non ricordi cosa li ha creati.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowVolcanoes_00 = Il bioma dei "vulcani" mostra coni sospettosamente alti e pendii fratturati. Se Epona ha del calore dentro, non lo sta condividendo con la cabina di pilotaggio.
        #GEPscience_bd_radarAltimeter_EponaFlyingLowPoles_00 = Il terreno polare risulta come una calotta alta e appiattita con margini netti. Il ghiaccio sembra solido sul grafico, il ritardo nelle comunicazioni sembra più pesante.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighTropicalLowlands_00 = Da più in alto, le basse terre diventano un livello di riferimento liscio sotto la luce tenue di Epona. È il numero più pulito che hai avuto da quando hai lasciato casa.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighTemperateLowlands_00 = Il radar traccia dolci gradienti che fanno sembrare la navigazione facile. Qui fuori, "facile" di solito è una trappola.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighTropicalUplands_00 = Le alture si sfumano in ampi rialzi, come se il paesaggio indossasse una coperta. La coperta è con grande probabilità ghiaccio.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighTemperateUplands_00 = Pendii a gradoni emergono nel profilo come vecchi strati congelati sul posto. Il pacchetto dati striscia verso casa nel vuoto.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighHighlands_00 = Il rilievo delle alture spicca chiaramente anche attraverso l'atmosfera. Salvi la strisciata come "posti da evitare" con entusiasmo professionale.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighGrandPeaks_00 = Picchi alti proiettano lunghe ombre radar che nascondono qualunque cosa ci sia dietro. La mappa guadagna dettaglio, la tua fiducia no.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighCraters_00 = I campi di crateri si fondono in una trama punteggiata, con alcune conche profonde che spiccano ancora. La superficie sembra affollata per un mondo che si sente così solitario.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighVolcanoes_00 = Il terreno si alza in coni acuti e dorsali spezzate, come se qualcosa avesse spinto su e si fosse congelato a metà movimento. Cerchi di non immaginare che spinga di nuovo.
        #GEPscience_bd_radarAltimeter_EponaFlyingHighPoles_00 = I poli appaiono stabili e alti, con meno sorprese taglienti delle medie latitudini. "Meno sorprese" è il miglior conforto che Grannus offra.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTropicalLowlands_00 = Da orbita bassa, il radar ricuce le basse terre tropicali in un ampio bacino poco profondo. Sembra un mondo che potresti rilevare, se la radio non impiegasse un'eternità a rispondere.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTemperateLowlands_00 = Echi puliti delineano pianure temperate con sottili creste, tutte sotto un'alba rossa e fioca. Archivi la mappa e ti senti molto lontano.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTropicalUplands_00 = Le alture si risolvono in ondulazioni dolci come onde congelate sulla crosta. Il "mare" è probabilmente ghiaccio, e il pensiero non aiuta.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTemperateUplands_00 = Il profilo mostra lunghi terrazzi e scarpate poco profonde, come se la superficie si fosse assestata a fasi. I numeri arrivano nitidi, la situazione resta irreale.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowHighlands_00 = Le alture spingono verso l'alto in blocchi aspri con bordi ripidi e ombre profonde nel ritorno. Ottima scienza, ottima etichetta di avvertimento.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowGrandPeaks_00 = I grandi picchi emergono fieri nel modello di quota, abbastanza taglienti da far sospirare il computer di navigazione. Resisti alla tentazione di intitolarli a qualcuno che ti sta simpatico.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowCraters_00 = I crateri scavano conche ordinate nella mappa, bordate da ritorni luminosi. Qualcuno suggerirà "riparo in un cratere" e tu ti opporrai ad alta voce.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowVolcanoes_00 = Le regioni vulcaniche mostrano cupole rialzate e fianchi spezzati che sembrano troppo freschi per stare tranquilli. L'"esterno freddo" di Epona all'improvviso sembra una voce di corridoio educata.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowPoles_00 = I passaggi polari rivelano una calotta alta con margini bruschi e sottili fratture. Il sole rosso scintilla su nulla che tu possa vedere, solo su ciò che il radar insiste sia lì.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTropicalLowlands_00 = Il radar traccia una piccola pianura bassa su Rosmerta che sembra troppo liscia per qualcosa di così malconcio. Anche le lune solitarie sanno sorprenderti.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTemperateLowlands_00 = Gli echi delle basse terre tornano stabili e piatti, come se la superficie stesse cercando di essere poco interessante. La distanza da casa rende il "poco interessante" prezioso.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTropicalMidlands_00 = Le medie terre si alzano in lievi gobbe e avvallamenti poco profondi, appena abbastanza da chiamarli colline. Ti chiedi chi abbia deciso che meritasse un nome, e decidi che aveva ragione.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTemperateMidlands_00 = L'altimetro abbozza pendii a gradoni come vecchie fratture consumate dal tempo. Niente aria, niente meteo: solo freddo paziente.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowHighlands_00 = Le alture compaiono come dorsali frastagliate con fratture nette e lunghe ombre radar. La luna sembra affilata, silenziosa e completamente indifferente.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowPoles_00 = I contorni polari si inclinano in modo strano, facendo sembrare il "nord" un suggerimento. Salvi il dataset sotto "mondo minuscolo, grande silenzio".
        #GEPscience_bd_radarAltimeter_RAB-58EInSpaceLowLowlands_00 = Il radar fatica a definire l'"altitudine" sopra un piccolo satellite catturato dalla forma discutibile. La lettura è metà scienza, metà geometria da patata.
        #GEPscience_bd_radarAltimeter_RAB-58EInSpaceLowEasternHighlands_00 = Le alture orientali schizzano su all'improvviso, poi crollano altrettanto in fretta. È come mappare una roccia che non ha mai accettato di essere una luna.
        #GEPscience_bd_radarAltimeter_RAB-58EInSpaceLowWesternHighlands_00 = Le alture occidentali restituiscono contorni irregolari e bitorzoluti che cambiano a ogni passaggio. Annoti: "o topografia reale, o l'universo ci sta prendendo in giro".
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTropicalLowlands_00 = Il radar mappa ampie pianure basse di terreno oscurato dal ghiaccio sotto la luce rossa di Grannus. Il vuoto sembra più grande quando ha delle curve di livello.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTemperateLowlands_00 = Gli echi delle basse terre tornano lisci e coerenti, suggerendo vaste distese gelate. Ti sorprendi a desiderare strade, poi ricordi che non c'è nessuno che possa percorrerle.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTropicalMidlands_00 = Le medie terre si alzano in ondulazioni lente, come se la crosta fosse stata impastata e poi lasciata congelare. I dati arrivano tardi, ma il freddo è senza tempo.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTemperateMidlands_00 = Il profilo mostra valli lunghe e poco profonde e dolci creste, appena incise nel ghiaccio. Lo archivi come "navigabile" e ti penti subito di aver sfidato la sorte.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowHighlands_00 = Le alture spiccano come blocchi aspri con scarpate ripide e profonde ombre radar. Un pianeta nano con scogliere a grandezza naturale sembra comunque ingiusto.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowSouthPolarHills_00 = Le colline polari meridionali producono contorni fitti e irregolari che sembrano onde congelate a metà rottura. Il sole rosso resta basso e fa sembrare tutto provvisorio.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowNorthPole_00 = Il polo nord risulta come un'ampia calotta elevata con sottili fratture e margini netti. Qui fuori, perfino i poli sembrano il bordo della mappa.

        // bd_rpws
        #GEPscience_bd_rpws_GrannusInSpaceLow_00 = Il ricevitore è sommerso da un rumore radio basso e ringhiante proveniente da Grannus, come un motore lontano che non puoi spegnere.
        #GEPscience_bd_rpws_GrannusInSpaceLow_01 = Raffiche di onde di plasma arrivano in grumi irregolari, il Controllo Missione conferma che i grumi sono reali, non un'interruzione delle comunicazioni.
        #GEPscience_bd_rpws_GrannusInSpaceHigh_00 = Più lontano, il fondo si assottiglia in un sibilo costante, punteggiato da schiocchi netti dell'attività sporadica del sole rosso.
        #GEPscience_bd_rpws_GrannusInSpaceHigh_01 = Lo strumento registra lente increspature nel flusso di particelle cariche, quando il grafico arriva a casa, è già una notizia vecchia.
        #GEPscience_bd_rpws_TaranisInSpaceLow_00 = In orbita bassa, la navicella crepita per eventi di carica superficiale, l'RPWS scrive "statica" con un carattere sorprendentemente arrabbiato.
        #GEPscience_bd_rpws_TaranisInSpaceLow_01 = Taranis non offre alcun riparo magnetico: ogni onda di plasma di Grannus colpisce i sensori in pieno e, subito dopo, i tuoi nervi.
        #GEPscience_bd_rpws_TaranisInSpaceHigh_00 = Più in alto, l'attività delle onde schizza ancora ogni volta che il lato illuminato entra in vista, come se il mondo stesso stesse risuonando.
        #GEPscience_bd_rpws_TaranisInSpaceHigh_01 = I dati suggeriscono ioni strappati dalla superficie che si trascinano via da Taranis, qualcuno propone di chiamarla "coda" e viene corretto all'istante.
        #GEPscience_bd_rpws_ToutatisInSpaceLow_00 = L'orbita bassa cattura deboli toni ionosferici a chiazze sopra l'emisfero caldo, il lato freddo diventa quasi silenzioso.
        #GEPscience_bd_rpws_ToutatisInSpaceLow_01 = L'aria sottile e il campo debole producono riflessioni d'onda confuse e intermittenti, come cercare di ascoltare attraverso una confezione di snack stropicciata.
        #GEPscience_bd_rpws_ToutatisInSpaceHigh_00 = Dall'orbita alta, i segnali più forti si addensano vicino al confine tra giorno e notte, dove l'atmosfera non riesce a decidere cosa vuole essere.
        #GEPscience_bd_rpws_ToutatisInSpaceHigh_01 = Lunghe e lente oscillazioni di plasma viaggiano sul vento di Grannus, i grafici sembrano calmi finché non noti gli avvisi di radiazioni.
        #GEPscience_bd_rpws_NodensInSpaceLow_00 = L'aria densa di Nodens e un campo "normale" creano un'ionosfera molto attiva, l'RPWS sente schiocchi e crepitii che non corrispondono a nessuna apparecchiatura di bordo.
        #GEPscience_bd_rpws_NodensInSpaceLow_01 = Il vento del sole rosso solleva treni d'onda che scorrono lungo le linee magnetiche di Nodens come corde pizzicate… molto lontano da casa.
        #GEPscience_bd_rpws_NodensInSpaceHigh_00 = Più in alto, Nodens proietta una lunga ombra silenziosa nel flusso di plasma, poi all'improvviso il sibilo torna quando attraversi lo spazio aperto.
        #GEPscience_bd_rpws_NodensInSpaceHigh_01 = Nello spettro compare un tono debole e ripetuto, quando viene confermato su Kerbin, Nodens si è già ruotato fuori vista.
        #GEPscience_bd_rpws_BelisamaInSpaceLow_00 = Belisama ha poca schermatura propria: gran parte di ciò che registri è la magnetosfera di Nodens che ondeggia attorno a una luna in rotazione sincrona.
        #GEPscience_bd_rpws_BelisamaInSpaceLow_01 = Le onde si affinano e si deformano vicino al confine tra giorno e notte, come se la superficie stessa si caricassse e scaricasse al rallentatore.
        #GEPscience_bd_rpws_BelisamaInSpaceHigh_00 = Allontanandoti dall'influenza più forte di Nodens, il segnale si assottiglia in un fischio tenue e in un rombo distante dal flusso di particelle di Grannus.
        #GEPscience_bd_rpws_BelisamaInSpaceHigh_01 = L'antenna intercetta brevi ping metallici, probabilmente polvere carica, o un promemoria per smettere di toccare lo scafo senza guanti.
        #GEPscience_bd_rpws_SucellusInSpaceLow_00 = Con un campo magnetico quasi nullo, Sucellus prende il plasma del sole rosso in pieno, la lettura sembra una tempesta senza nuvole.
        #GEPscience_bd_rpws_SucellusInSpaceLow_01 = L'RPWS rileva ioni strappati dalla superficie che formano un'esosfera discontinua e fugace, presente e sparita prima della prossima finestra di comunicazione.
        #GEPscience_bd_rpws_SucellusInSpaceHigh_00 = Più lontano, Sucellus lascia solo una debole scia nel flusso, i segnali più forti sono quelli di Grannus, da cui non puoi scappare.
        #GEPscience_bd_rpws_SucellusInSpaceHigh_01 = Una lenta oscillazione si ripete come un battito cardiaco, ma il "paziente" è un pianeta nano e il medico è in ritardo di diversi minuti luce.
        #GEPscience_bd_rpws_CaireenInSpaceLow_00 = La minuscola Caireen non ha campo né atmosfera, ma disturba comunque il plasma: un piccolo nodo irregolare nell'ombra di Sucellus.
        #GEPscience_bd_rpws_CaireenInSpaceLow_01 = Lo spettro sfarfalla mentre la navicella passa sopra un terreno frastagliato, perfino le onde sembrano incerte su cosa stiano rimbalzando.
        #GEPscience_bd_rpws_CaireenInSpaceHigh_00 = Molto sopra Caireen, quasi tutta l'attività appartiene a Sucellus e al sole rosso, il contributo di Caireen è un'oscillazione appena percepibile.
        #GEPscience_bd_rpws_CaireenInSpaceHigh_01 = L'RPWS registra una breve e limpida banda di silenzio... finché non arriva il pacchetto dati successivo e ti ricorda quanto sia davvero lontano il "silenzio".
        #GEPscience_bd_rpws_SironaInSpaceLow_00 = La magnetosfera di Sirona ruggisce nel ricevitore: sibili stratificati e toni ondeggianti che fanno sembrare inadeguati i pannelli.
        #GEPscience_bd_rpws_SironaInSpaceLow_01 = Forti raffiche si allineano con le regioni aurorali, quando arriva la conferma, Sirona ha già spostato altrove le sue luci.
        #GEPscience_bd_rpws_SironaInSpaceHigh_00 = Più lontano, lo spettro si smussa in un pesante brontolio di fondo del vento di Grannus, con la "firma" di Sirona che ci viaggia sopra.
        #GEPscience_bd_rpws_SironaInSpaceHigh_01 = Registri una lunga oscillazione lenta come una sirena lontana: molto bella, molto inquietante e decisamente non casa.
        #GEPscience_bd_rpws_AirmedInSpaceLow_00 = Airmed non ha alcun campo dietro cui nascondersi, l'RPWS sente il rumore grezzo del plasma che si abbatte sulla navicella come una sabbiatura invisibile.
        #GEPscience_bd_rpws_AirmedInSpaceLow_01 = Schiocchi netti compaiono ogni volta che la luce solare colpisce la superficie sotto: eventi di carica che sembrano la luna che ti schiocchi contro in silenzio.
        #GEPscience_bd_rpws_AirmedInSpaceHigh_00 = Più in alto, Airmed svanisce nella statica, lasciando solo una piccola tacca nel rumore dove la luna blocca il flusso.
        #GEPscience_bd_rpws_AirmedInSpaceHigh_01 = I momenti più tranquilli non sono comunque silenziosi: sono solo un silenzio "da lontano", ritardato e assottigliato dal lungo collegamento verso casa.
        #GEPscience_bd_rpws_BorvoInSpaceLow_00 = L'aria sottile di Borvo e un campo modesto creano un'ionosfera molto attiva, l'RPWS capta fischi che si piegano come se scegliessero la strada panoramica.
        #GEPscience_bd_rpws_BorvoInSpaceLow_01 = Raffiche occasionali a banda larga suggeriscono fulmini lontani o polvere carica, in ogni caso, l'antenna insiste di aver sentito qualcosa.
        #GEPscience_bd_rpws_BorvoInSpaceHigh_00 = Sopra Borvo, l'influenza di Sirona torna come un coro costante, Borvo aggiunge armoniche deboli che slittano con il terminatore.
        #GEPscience_bd_rpws_BorvoInSpaceHigh_01 = I grafici mostrano pacchetti d'onda che arrivano a gruppi, facili da scambiare per interruzioni di comunicazione finché non ricordi che alla fisica non importa.
        #GEPscience_bd_rpws_DamonaInSpaceLow_00 = Damona è freddo, privo d'aria e senza schermatura, l'RPWS registra una statica aspra e fragile, come se il plasma stesse raschiando lo scafo.
        #GEPscience_bd_rpws_DamonaInSpaceLow_01 = Sul lato notturno compare una breve e limpida banda di silenzio, poi svanisce quando il vento del sole rosso ti ritrova.
        #GEPscience_bd_rpws_DamonaInSpaceHigh_00 = Dall'orbita alta, Damona è soprattutto un ostacolo silenzioso nel flusso, i segnali più forti appartengono a Sirona e Grannus.
        #GEPscience_bd_rpws_DamonaInSpaceHigh_01 = Il ricevitore intercetta deboli ping che potrebbero essere polvere carica o la tua immaginazione che riempie i vuoti tra pacchetti in ritardo.
        #GEPscience_bd_rpws_EponaInSpaceLow_00 = La sottile schermatura magnetica di Epona lascia che il plasma del sole rosso scarabocchi tratti rumorosi su tutto lo spettro.
        #GEPscience_bd_rpws_EponaInSpaceLow_01 = L'aria ricca di azoto sotto mormora con fischi deboli e irregolari, le tracce di metano fanno "odorare" interessante al ricevitore (non può sentire odori).
        #GEPscience_bd_rpws_EponaInSpaceHigh_00 = Più in alto, l'influenza di Epona svanisce e prende il sopravvento il sibilo di fondo del sistema, stabile, distante e per nulla confortante.
        #GEPscience_bd_rpws_EponaInSpaceHigh_01 = Lenti treni d'onda scivolano via come maree stanche, quando li riporti, il pianeta è già andato oltre.
        #GEPscience_bd_rpws_RosmertaInSpaceLow_00 = Rosmerta in sé è silenziosa e senza atmosfera, ma l'ambiente di plasma vicino a Epona tiene l'antenna occupata con echi distorti.
        #GEPscience_bd_rpws_RosmertaInSpaceLow_01 = Attraversando l'ombra della luna, il segnale scende quasi al silenzio... poi scatta con un crepitio secco quando torna la luce solare.
        #GEPscience_bd_rpws_RosmertaInSpaceHigh_00 = Da un'orbita più alta, Rosmerta è solo una piccola tacca nel flusso, che blocca per un attimo il vento carico e poi sparisce.
        #GEPscience_bd_rpws_RosmertaInSpaceHigh_01 = Il registratore cattura raffiche lontane dal sole rosso e una debole risposta ritardata dall'ionosfera di Epona, come un botta e risposta attraverso lo spazio vuoto.
        #GEPscience_bd_rpws_RAB-58EInSpaceLow_00 = L'RPWS sente soprattutto pop e ticchettii: polvere carica e ioni strappati dalla superficie che annunciano ogni passaggio ravvicinato.
        #GEPscience_bd_rpws_RAB-58EInSpaceLow_01 = La sua orbita strana ti trascina attraverso condizioni di plasma variabili, il grafico sembra incapace di decidere cosa significhi "normale", qui fuori.
        #GEPscience_bd_rpws_RAB-58EInSpaceHigh_00 = Più lontano, il piccolo satellite lascia solo una lieve oscillazione nello spettro, facile da perdere nella statica di tutto il sistema.
        #GEPscience_bd_rpws_RAB-58EInSpaceHigh_01 = Compaiono e svaniscono alcuni toni puliti, il Controllo Missione chiede se sia interferenza e tu rispondi diversi minuti dopo.
        #GEPscience_bd_rpws_CernunnosInSpaceLow_00 = Cernunnos non offre atmosfera né campo: solo esposizione grezza e fredda al flusso di particelle del sole rosso.
        #GEPscience_bd_rpws_CernunnosInSpaceLow_01 = Lo strumento rileva un debole alone di materiale strappato, così sottile che chiamarlo "esosfera" sembra quasi scortese.
        #GEPscience_bd_rpws_CernunnosInSpaceHigh_00 = Molto sopra Cernunnos, il "silenzio" è solo il sibilo costante del plasma lontano e l'occasionale ping secco di polvere carica.
        #GEPscience_bd_rpws_CernunnosInSpaceHigh_01 = Il ricevitore registra oscillazioni rare e lente con lunghe pause tra loro: un ritmo inquietante per un mondo solitario ai confini del sistema.

        // bd_Scatterometer
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthPolarZone_00 = Il segnale di ritorno sfarfalla come se stesse cercando di misurare il "vento" dentro una zuppa luminosa. Il Controllo Missione suggerisce di annotare "molto veloce" e di non pronunciare mai le unità ad alta voce.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthSubpolarZone_00 = I pattern di diffusione si spalmano in lunghe striature mentre la superficie della stella ribolle sotto di te. I dati arrivano tardi, come se anche i pacchetti venissero spinti di lato dal vento.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthTemperateZone_00 = Lo strumento insiste che sta vedendo bande di flusso stratificate, poi si riavvia per assicurarsi di non stare sognando. Sei d'accordo col riavvio e continui a registrare lo stesso.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthTropicZone_00 = I riflessi pulsano in onde lente, come se il "meteo" ribollisse dal basso e scoppiettasse in superficie. Per un attimo ti mancano le nubi che si limitano a piovere.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowEquatorialZone_00 = I ritorni equatoriali mostrano il taglio più netto, con nastri chiari e scuri che scorrono uno accanto all'altro. Lo etichetti "atmosfera ad alta velocità", perché "stella" non entra nel modulo del rapporto.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthTropicZone_00 = Il backscatter schizza in raffiche irregolari, poi si assesta in un sibilo costante. Qualunque cosa ci sia "là sotto" è molto attiva, e non le importa che tu stia guardando.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthTemperateZone_00 = Lo scatterometro rileva ampie bande di circolazione che slittano durante il tempo necessario a trasmettere l'ultima lettura. È come misurare il vento con il termometro di ieri.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthSubpolarZone_00 = Il segnale diventa rumoroso e "granuloso", come se la stella stesse carteggiando la propria superficie. Valuti di aggiungere un adesivo "non toccare" ai dati.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthPolarZone_00 = I ritorni vicino al polo sono stranamente strutturati, con spirali strette che si rifiutano di mediarsi. La luce rossa fuori fa sembrare il tutto un'etichetta di avvertimento.
        #GEPscience_bd_Scatterometer_GrannusInSpaceHigh_00 = Da alta quota sopra Grannus, lo scatterometro può solo riassumere: "tutto si muove, ovunque, tutto insieme". Il lungo ritardo fa sembrare di ascoltare una fornace lontana attraverso una lattina.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani soleggiati rimandano echi forti e stabili: suolo rovente, aria sottile e venti che si comportano come se fossero in ritardo a un appuntamento. I numeri sembrano reali, il che è stranamente sospetto così lontano da casa.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSunnyHighlands_00 = Sopra le alture illuminate dal sole, il segnale di diffusione ondeggia mentre aria riscaldata scende lungo i pendii in onde sfrangiate. Quasi senti il pianeta sfrigolare attraverso l'antenna.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowTransitionalLowlands_00 = I bassopiani del terminatore mostrano gradienti netti: sacche calme accanto a improvvisi corridoi di raffiche. È il tipo di "brezza" che ti ruberebbe la checklist e il cappello.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowTransitionalHighlands_00 = Le alture della zona di transizione producono un backscatter confuso, come due climi che litigano su chi si prenda la montagna. Lo strumento riporta educatamente "variabile" e si rifiuta di scegliere una parte.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideLowlands_00 = Sul lato oscuro, i ritorni si calmano in flussi deboli e lenti che restano aderenti al suolo. L'atmosfera è così sottile che sembra che il vento sussurri a se stesso.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideHighlands_00 = Le alture oscure mostrano impennate intermittenti, mentre aria fredda scivola e ristagna in canali invisibili. Segni il punto per i futuri piloti a cui piacciono le sorprese.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSoutheasternMountains_00 = Gli echi montani mostrano una forte diffusione direzionale, suggerendo getti persistenti in discesa. Il pacchetto dati arriva con un ritardo tale da farti ricontrollare quale lato sia "giù" oggi.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowWesternMountains_00 = Le catene occidentali restituiscono bande spezzate di turbolenza, come se l'aria sottile si lacerasse sulle creste. Annota: "le montagne fanno ancora cose da montagne".
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideMountains_00 = I ritorni montani del lato oscuro sono radi ma netti: flussi freddi, raffiche improvvise, poi silenzio. È il tipo di meteo che ti fa parlare alla radio solo per sentire qualcosa.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceHigh_00 = Dall'orbita alta, Toutatis sembra diviso tra un emisfero luminoso ruggente e uno oscuro silenzioso, con il confine sempre irrequieto. La mappa globale dello scatterometro sembra un avviso su cosa significhi vivere sul bordo.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowSaltySeas_00 = La superficie del mare rimanda un ritorno vivace e rumoroso: frangenti, raffiche e un sacco di "sì, qui c'è decisamente meteo". La luce rossa fa sembrare i campi d'onda come ruggine in movimento.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowFreshWater_00 = I riflessi sono più lisci e coerenti dei bacini salati, con striature di vento allineate come una grafia accurata. Qualcuno suggerisce che Nodens sia "quasi confortevole" e il ritardo nelle comunicazioni lascia la frase sospesa in modo imbarazzante.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowShores_00 = Terra e acqua si contendono il segnale in un confine frastagliato di diffusione mista. Lo strumento lo chiama "terreno complesso", che è un modo educato per dire "smetti di sorvolare la parte confusa".
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTropicalLowlands_00 = Un backscatter forte e stabile implica venti persistenti a bassa quota e convezione calda. È la prima volta che "tropicale" suona anche solo leggermente minaccioso in un registro di missione.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTemperateLowlands_00 = Ampie bande di vento slittano lentamente, come se l'atmosfera si prendesse il suo tempo per decidere una direzione. I dati arrivano abbastanza tardi da farti sentire come se stessi prevedendo il meteo di ieri.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTropicalMidlands_00 = Il segnale di ritorno pulsa con termiche in risalita e fronti di raffiche che cambiano, riversandosi dalle alture. Lo segni come "ventilato", poi aggiungi una nota: "ventilato, ma lontano".
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTemperateMidlands_00 = I pattern di diffusione mostrano sacche calme alternate a corridoi ruvidi, suggerendo un flusso incanalato dal terreno. Il pianeta ti insegna la sua mappa dei venti un pacchetto in ritardo alla volta.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowHighlands_00 = Il backscatter cala e schizza in rapida successione: aria sottile, forte shear e turbolenza lungo le creste. Lo strumento sopravvive, ma i grafici sembrano nervosi.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTundra_00 = Angoli bassi del sole e superfici fredde producono ritorni nitidi con sottili firme di vento aderenti al suolo. L'atmosfera si sente presente, ma cauta, come se stesse cercando di non svegliare qualcosa.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowIceCaps_00 = Il segnale torna luminoso e pulito, con flussi catabatici che scivolano dal ghiaccio in correnti stabili. Per un attimo invidi la semplicità del meteo congelato.
        #GEPscience_bd_Scatterometer_NodensInSpaceHigh_00 = Da molto sopra Nodens, lo scatterometro abbozza un disegno globale di circolazione e traiettorie di tempesta. È stranamente rassicurante vedere un intero pianeta comportarsi come un pianeta, sotto un sole che non è il tuo.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkTropicalBands_00 = Le bande scure restituiscono un segnale forte e maculato: foschia densa e shear violento che scorre in corsie disciplinate. Il Controllo Missione lo definisce "bellissimo", diversi minuti dopo che tu hai iniziato a preoccuparti.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowLightTropicalBands_00 = Le bande chiare diffondono in modo più uniforme, suggerendo banchi di nubi più alti e più lisci trascinati da venti rapidi. L'atmosfera sembra calma solo perché si muove troppo in fretta per discutere.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkTemperateBands_00 = Il backscatter sfarfalla in treni d'onda, come se le nubi venissero piegate e ripiegate da jet stream enormi. Ti chiedi quanti chilometri significhi "vicino alla superficie" su un gigante gassoso, poi smetti di chiedertelo.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowLightTemperateBands_00 = I ritorni si spalmano in lunghe striature allineate al flusso: venti persistenti con meno interruzioni. Il pacchetto dati arriva come una cartolina da una tempesta che non finisce mai.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkPolarBands_00 = Gli echi polari mostrano spirali strette e improvvise raffiche, suggerendo vortici che non amano essere mediati. Il bagliore rosso fuori fa sembrare ogni spirale un cartello di avvertimento.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowLightPolarBands_00 = Le regioni polari chiare danno una diffusione pulita e ad alto contrasto, con la direzione del vento che scatta tra corsie stabili e vortici caotici. La etichetti "quasi prevedibile" e te ne penti subito.
        #GEPscience_bd_Scatterometer_SironaInSpaceHigh_00 = Dall'orbita alta, Sirona si risolve in una macchina a bande di venti e onde che marcia sotto una luce rossa e fioca. La mappa globale dello scatterometro sembra meno meteo e più meccanica.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalCraquelure_00 = Le pianure crepate restituiscono un segnale denso e puntinato: le raffiche trovano sempre nuovi bordi su cui inciampare. L'atmosfera è abbastanza sottile da essere subdola, ma si muove comunque con decisione sotto la luce rossa e fioca.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateCraquelure_00 = Le striature di vento si allineano lungo le fratture come se qualcuno avesse provato a pettinare la superficie e si fosse arreso a metà. I dati arrivano tardi, come se anche le comunicazioni dovessero attraversare le crepe.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalLowlands_00 = Gli echi dei bassopiani suggeriscono un flusso persistente vicino al suolo, con raffiche occasionali che sembrano fronti di foschia in rapido movimento. Il Controllo Missione chiede "un bollettino meteo" e tu rimandi "sì".
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateLowlands_00 = Lo scatterometro vede venti ampi e stabili che non si curano del tuo orario locale di luce. Qui, "mattina" è soprattutto una voce di corridoio.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalMidlands_00 = Il pattern di ritorno cambia a bande, suggerendo getti guidati dal terreno che scorrono attorno alle medie terre. Annoti il grafico con "gallerie del vento, ma in formato pianeta".
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateMidlands_00 = Chiazze calme si alternano a corridoi ruvidi, come se l'atmosfera avesse delle preferenze. Il sole rosso fa sembrare tutto leggermente sbagliato, numeri inclusi.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowHighlands_00 = Sopra le alture il segnale trema: turbolenza, shear e calme improvvise sottovento alle creste. Lo strumento resiste, ma il grafico sembra sobbalzare.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowMajorCraters_00 = I bacini dei crateri mostrano sacche riparate e improvvise raffiche di tracimazione ai bordi. È il classico problema "bene nella conca, terribile sul bordo".
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowPoles_00 = I ritorni polari sono luminosi e puliti, con flussi catabatici persistenti che scivolano verso i bassi terreni. L'atmosfera tiene il metano discreto e i venti più rumorosi del previsto.
        #GEPscience_bd_Scatterometer_BorvoInSpaceHigh_00 = Dall'orbita alta, i venti di Borvo abbozzano una circolazione sottile e persistente, discreta ma estesa su tutto il pianeta. Il lungo ritardo fa sembrare di guardare il meteo di ieri attraverso un buco della serratura.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTropicalLowlands_00 = Le basse terre restituiscono echi lisci e coerenti, con striature di vento che slittano lentamente sulla superficie fredda. Anche qui, così lontano da casa, l'aria insiste per essere contata.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTemperateLowlands_00 = I venti al suolo sembrano stabili ma stranamente stratificati, come se "piani" diversi dell'atmosfera scorressero uno accanto all'altro. Lo archivi sotto "turbolenza educata".
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTropicalUplands_00 = I ritorni delle alture mostrano shear più forte e corsie di raffiche intermittenti, come se aria fredda venisse versata a valle in fogli invisibili. Il sole rosso fa sembrare ogni confine un livido.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTemperateUplands_00 = Lo scatterometro cattura pattern ondulati che marciano sulle alture: onde di gravità, o il pianeta che sospira, o entrambe. La risposta del Controllo Missione arriva diversi minuti dopo la tua battuta.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowHighlands_00 = Sopra le alture, il segnale sfarfalla per la turbolenza lungo le creste e per sacche più calme sottovento. L'atmosfera è povera di pazienza e ricca di sorprese.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowGrandPeaks_00 = I picchi generano una diffusione netta e direzionale: getti forti e vortici violenti dove il flusso è costretto a scegliere un lato. Consigli ai futuri lander di non sceglierne nessuno.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowCraters_00 = Gli interni dei crateri sembrano ingannevolmente calmi, poi schizzano per raffiche che scavalcano il bordo e tracimano come se fossero di casa. "Riparato" è chiaramente una condizione temporanea.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowVolcanoes_00 = I ritorni si illuminano e si spalmano vicino alle regioni vulcaniche, suggerendo pennacchi caldi che bucano aria fredda e rimescolano venti confusi. Il pianeta potrà anche essere congelato, ma sotto c'è sicuramente qualcosa che non lo è.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowPoles_00 = Gli echi polari sono nitidi, con flussi catabatici persistenti che scivolano verso i bassi terreni. I segnali di giorno e notte qui sono deboli, ma il freddo sa esattamente che ore sono.
        #GEPscience_bd_Scatterometer_EponaInSpaceHigh_00 = Dall'orbita alta, la circolazione di Epona sembra lenta, deliberata e ostinatamente globale, guidata da una luce debole e da segreti più forti. La mappa sembra meteo scritto per un mondo che non si aspetta visitatori.

        // bd_SIGINT
        #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthPolarZone_00 = Grannus riempie la banda con un aspro sibilo polare che va e viene come una bestia dal respiro lento. A questa distanza, il "silenzio" è solo un altro tipo di rumore.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthSubpolarZone_00 = Il ricevitore cattura raffiche crepitanti che sembrano quasi avere un disegno, finché non si spalmanno di nuovo nella statica del sole rosso. Lo etichetti "probabilmente naturale" e salvi comunque tre backup.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthTemperateZone_00 = Un ampio rombo basso domina lo spettro, con piccole increspature sopra come una grafia nervosa. Il Controllo Missione lo vedrà quando il tempo luce glielo permetterà.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthTropicZone_00 = Brevi picchi bucano il fondo, come se qualcosa sotto continuasse a schiarirsi la gola. Lo strumento declina educatamente di spiegare cosa significhi.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowEquatorialZone_00 = La regione equatoriale è rumorosa in modo costante e abrasivo, come un trasmettitore che non ha mai imparato a spegnersi. Inizi a rimpiangere il silenzio normale.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthTropicZone_00 = Per qualche secondo compare un cinguettio debole e ripetuto, poi scompare dietro il ruggito stellare. Segni il timestamp e speri che l'orologio sia giusto.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthTemperateZone_00 = Lo spettro sembra "affollato" senza essere "utile", che a quanto pare è un esito scientifico valido. Almeno ti fa compagnia.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthSubpolarZone_00 = C'è un tono oscillante che sale e scende come se stesse cercando un canale. Ricontrolli due volte la tua antenna, per sicurezza.
        #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthPolarZone_00 = La fascia polare è un fischio freddo sepolto dentro un rumore caldo, in qualche modo rendendo entrambi peggiori. Giureresti che qui la statica suoni giudicante.
        #GEPscience_bd_SIGINT_GrannusInSpaceHigh_00 = Dall'orbita alta le emissioni della stella si appiattiscono in un lavaggio costante e l'universo oltre fa capolino in deboli puntini. L'unico "messaggio" è quanto sei lontano da casa.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowMagmaSea_00 = Sopra il Mare di Magma, il ricevitore va in saturazione con pop secchi e crepitii a banda larga, come se il pianeta stesse friggendo l'aria che non ha. Lo registri come "energetico" e tieni le dita lontane dai tasti caldi.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowMagmaShores_00 = La regione di costa produce raffiche intermittenti che imitano un faro per mezzo battito, poi collassano in rumore. Per un attimo pensi di rispondere, poi ricordi che è sorveglianza passiva.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowScorchedLowlands_00 = Un lavaggio di statica sale e scende in sincronia con il passaggio, come se il terreno bruciato ti riflettesse Grannus addosso. È come ascoltare un urlo che rimbomba su una parete di forno.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowMidlands_00 = Le medie terre sono perlopiù silenziose, tranne minuscoli picchi sottilissimi come aghi che si rifiutano di ripetersi a orario. Qualunque cosa li generi è molto timida o molto veloce.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowHighlands_00 = Le alture disperdono i segnali in scie multipercorso confuse, trasformando toni puliti in fantasmi sfocati. Ti chiedi come possa coordinarsi qualunque trasmissione in un posto che non sa decidere se è fuso o congelato.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowDarkSideMidlands_00 = Sul lato oscuro, lo spettro crolla in una quiete inquieta, interrotta solo dalle perdite della tua stessa navicella. Il vuoto sembra più rumoroso di quanto lo sia mai stato il rumore.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowDarkSideHighlands_00 = Un debole impulso lento appare proprio al limite della rilevabilità, poi svanisce mentre prosegui. Non sai se sia geologia, plasma o la tua immaginazione che colma il vuoto.
        #GEPscience_bd_SIGINT_TaranisInSpaceLowPoles_00 = I poli sussurrano con toni sottili e vaganti, come particelle cariche che cantano su corde invisibili. Lo archivi sotto "bellissimo" e speri che gli auditor accettino la categoria.
        #GEPscience_bd_SIGINT_TaranisInSpaceHigh_00 = Dall'orbita alta, Taranis offre quasi nulla oltre al fondo distante e al ruggito costante del sole rosso. La migliore ricezione che ottieni è il promemoria che l'aiuto è lontano molti minuti.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani soleggiati rimandano uno spettro vivace e tremolante, come se l'aria sottile non riuscisse a stare ferma abbastanza da essere silenziosa. Alcuni picchi sembrano "interessanti" finché non si rivelano la tua elettronica che si lamenta.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowSunnyHighlands_00 = Sopra le alture illuminate dal sole, i segnali si frammentano in echi sovrapposti che si spalmano sulle frequenze. È come se le montagne stessero cercando di parlare una sopra l'altra senza sapere cosa stanno dicendo.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowTransitionalLowlands_00 = Vicino ai bassopiani del crepuscolo, compare un tono portante pulito, svanisce, poi torna leggermente spostato. Passi un intero minuto a discutere con te stesso prima di etichettarlo "artefatto di riflessione".
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowTransitionalHighlands_00 = Le alture del terminatore producono raffiche brevi e nitide che si allineano con l'ora locale come un orologio con i denti mancanti. Noti il pattern e senti un piccolo, irragionevole brivido.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani del lato oscuro sono abbastanza quieti da permetterti di vedere la struttura di fondo dell'universo nel livello di rumore. È calmante, finché non ricordi da quanto lontano quel rumore ha viaggiato.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowDarkSideHighlands_00 = Un tono basso e ondeggiante scorre sopra il silenzio, piegandosi mentre l'orbita cambia, come una stazione lontana leggermente stonata. Ricontrolli: nessuna stazione.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowSoutheasternMountains_00 = Le montagne rimandano uno spettro irregolare a raffiche che sembra qualcosa che prova a trasmettere attraverso un'antenna difettosa. Non sai decidere se essere eccitato o offeso.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowWesternMountains_00 = Un gruppo di picchi a banda stretta appare solo mentre le vette occidentali sono in vista, poi scompare pulito. L'effetto è ripetibile, il che è insieme rassicurante e inquietante.
        #GEPscience_bd_SIGINT_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne del lato oscuro producono deboli echi ritardati di forti segnali altrove, come post-immagini radio. Qui fuori, perfino i riflessi sembrano compagnia.
        #GEPscience_bd_SIGINT_ToutatisInSpaceHigh_00 = Dall'orbita alta, Toutatis diventa un piccolo disco mezzo illuminato e lo spettro si smussa in un silenzio da lunga distanza. L'unico segnale davvero forte è quello che mandi a casa, che arriva molto dopo che hai smesso di ascoltare.
        #GEPscience_bd_SIGINT_NodensInSpaceHigh_00 = Da alta quota sopra Nodens, il ricevitore assorbe un lavaggio costante di rumore ionosferico sotto il fioco sole rosso. Il lungo tempo luce fa sembrare perfino l'"ascolto in tempo reale" archeologia.
        #GEPscience_bd_SIGINT_NodensInSpaceLowSaltySeas_00 = Sopra i Mari Salati, crepitii secchi punteggiano la banda come tempeste lontane che litigano con l'oceano. Contrassegni le raffiche più forti per riascoltarle quando il segnale finalmente striscerà verso casa.
        #GEPscience_bd_SIGINT_NodensInSpaceLowFreshWater_00 = Le regioni di Acque Dolci suonano stranamente "pulite", con un livello di rumore più basso e meno pop selvaggi. Non è comunque silenzio, è solo più educato nel fare rumore.
        #GEPscience_bd_SIGINT_NodensInSpaceLowShores_00 = Lungo le coste, i riflessi spalmano deboli portanti in doppi spettrali. Per un attimo sembra una trasmissione, finché la fisica non ti ricorda che sta solo facendo la drammatica.
        #GEPscience_bd_SIGINT_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali producono un sibilo caldo e affollato che sale e scende con il tuo passaggio. Se c'è un pattern, si sta prendendo il suo tempo per spiegarsi.
        #GEPscience_bd_SIGINT_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati restituiscono uno spettro più calmo con occasionali picchi sottili come aghi. I picchi non si ripetono mai quando li stai guardando, e la cosa sembra personale.
        #GEPscience_bd_SIGINT_NodensInSpaceLowTropicalMidlands_00 = Sopra le medie terre tropicali, la statica a banda larga sboccia come se l'aria stessa stesse ronzando. Ti chiedi com'è stare sotto un cielo illuminato da un sole rosso e non sentire nulla di tutto questo.
        #GEPscience_bd_SIGINT_NodensInSpaceLowTemperateMidlands_00 = Il ricevitore cattura raffiche intermittenti che si allineano con i cambi di terreno, poi scivolano via. Lo archivi sotto "l'ionosfera fa cose da ionosfera".
        #GEPscience_bd_SIGINT_NodensInSpaceLowHighlands_00 = Le alture disperdono i segnali in echi multipercorso confusi. Tutto suona come se arrivasse in ritardo: appropriato, visto dove sei.
        #GEPscience_bd_SIGINT_NodensInSpaceLowTundra_00 = Sopra la tundra, la banda si assottiglia in un sussurro freddo con rari ticchettii nitidi. Ogni tic sembra un piccolo bussare a una porta molto lontana.
        #GEPscience_bd_SIGINT_NodensInSpaceLowIceCaps_00 = Le calotte di ghiaccio riflettono un forte fondo in archi luminosi e lisci nello spettro. È bello in modo sterile, come una cartolina che impiega ore ad arrivare.
        #GEPscience_bd_SIGINT_BelisamaInSpaceHigh_00 = Da alta quota sopra Belisama, Nodens domina il fondo come un vicino rumoroso che non puoi evitare. Il blocco mareale reciproco fa sì che "la stessa faccia" continui a restituire gli stessi picchi sospetti.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowFlats_00 = Sopra le piane, compare un tono a banda stretta, si divide in echi, poi si ricompone mentre ti sposti. Dai la colpa alla geometria, ma ricontrolli comunque l'antenna come un kerbal nervoso.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali restituiscono un sibilo tremolante, come se polvere carica stesse cercando di sintonizzare una radio scuotendola. Non trova mai una stazione.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowTemperateLowlands_00 = I bassopiani temperati producono riflessi puliti e conclusioni sporche. Metà dei "segnali" sono solo Nodens che urla e Belisama che fa educatamente da eco.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowTropicalMidlands_00 = Una breve raffica si ripete mentre lo stesso emisfero in blocco mareale resta in vista. È probabilmente solo un hotspot di riflessione persistente, ma "probabilmente" sembra più piccolo sotto un sole rosso.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowTemperateMidlands_00 = Le medie terre spalmano tutto in ronzìi morbidi e sovrapposti. Sembra che la luna borbotti segreti che in realtà non ha.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowHighlands_00 = Le alture creano post immagini nitide e ritardate di portanti forti. Anche l'ascolto passivo sembra origliare una conversazione tra rocce.
        #GEPscience_bd_SIGINT_BelisamaInSpaceLowPoles_00 = Vicino ai poli, sottili toni vaganti attraversano la banda come fischi smarriti. Segni i timestamp, sapendo che la risposta, se esiste, arriverà molto più tardi.
        #GEPscience_bd_SIGINT_SucellusInSpaceHigh_00 = Da alta quota sopra Sucellus, rumore cosmico e sibilo di radiazioni affollano lo spettro finché il "silenzio" diventa teorico. Il ruggito del sole rosso resta sotto tutto come un motore impaziente.
        #GEPscience_bd_SIGINT_SucellusInSpaceLowBasins_00 = Sopra i bacini, le raffiche spuntano a gruppi e poi spariscono del tutto. Non sai se sia la superficie, il plasma o l'universo che fa apposta a essere poco collaborativo.
        #GEPscience_bd_SIGINT_SucellusInSpaceLowLowlands_00 = Le basse terre restituiscono un sibilo a banda larga granuloso con occasionali picchi secchi. I picchi sembrano importanti finché non si rifiutano di ripetersi.
        #GEPscience_bd_SIGINT_SucellusInSpaceLowTropicalMidlands_00 = Sopra le medie terre tropicali, il ricevitore cavalca un livello di rumore ondulato come una barca su acqua cattiva. Per un attimo ti manca la statica semplice e noiosa.
        #GEPscience_bd_SIGINT_SucellusInSpaceLowTemperateMidlands_00 = Le medie terre temperate producono toni deboli e stabili che slittano con l'orbita. Annoti: "non un trasmettitore, solo una luna con opinioni".
        #GEPscience_bd_SIGINT_SucellusInSpaceLowHighlands_00 = Le alture riflettono segnali forti in echi puliti e ritardati che arrivano come risposte tardive. Qui fuori, perfino i riflessi sembrano compagnia.
        #GEPscience_bd_SIGINT_SucellusInSpaceLowPoles_00 = Sopra i poli, la banda si riempie di fischi sottili e crepitii aspri, come particelle cariche che strofinano palloncini al buio. È scientificamente affascinante e emotivamente poco lusinghiero.
        #GEPscience_bd_SIGINT_CaireenInSpaceHigh_00 = Da alta quota sopra la minuscola Caireen, c'è appena un sussurro che sia suo: soprattutto rumore "preso in prestito" da Sucellus e dal lontano sole rosso. Etichetti le caratteristiche più forti "ambientali", perché "solitario" non è un'unità.
        #GEPscience_bd_SIGINT_CaireenInSpaceLowLowlands_00 = Le basse terre mostrano deboli echi ritardati di portanti più forti nelle vicinanze. È come ascoltare una conversazione attraverso un muro fatto di ghiaia.
        #GEPscience_bd_SIGINT_CaireenInSpaceLowMidlands_00 = Sopra le medie terre, compare un breve cinguettio proprio al limite della rilevabilità, poi scivola via. Fissi il grafico finché non sembra scortese.
        #GEPscience_bd_SIGINT_CaireenInSpaceLowHighlands_00 = Le alture disperdono tutto in minuscoli picchi tremolanti che sembrano quasi intenzionali. Quasi.
        #GEPscience_bd_SIGINT_CaireenInSpaceLowPoles_00 = Vicino ai poli, lo spettro si assottiglia in una quiete fragile con occasionali tic sottili come aghi. Li registri con cura: qui fuori, anche i segnali piccoli meritano rispetto.
        #GEPscience_bd_SIGINT_SironaInSpaceHigh_00 = Da alta quota sopra Sirona, lo spettro è un ruggito ampio e costante, con una debole struttura nascosta sotto. Sotto un fioco sole rosso, anche l'"ascolto in silenzio" sembra sporgersi dentro un vento a lunghissima distanza.
        #GEPscience_bd_SIGINT_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure producono un sibilo a banda larga tremolante che sale e scende con il tuo passaggio. È come se Sirona borbottasse a bassa voce e ti sfidasse a trovarci delle parole.
        #GEPscience_bd_SIGINT_SironaInSpaceLowLightTropicalBands_00 = Sopra le bande tropicali chiare, il livello di rumore si leviga in un lavaggio più caldo e più pulito. Alcuni picchi nitidi bucano il fondo, poi svaniscono prima che tu possa fidartene.
        #GEPscience_bd_SIGINT_SironaInSpaceLowDarkTemperateBands_00 = Le bande temperate scure disperdono deboli portanti in fantasmi sovrapposti. Le contrassegni comunque: qui fuori, anche il "probabilmente naturale" deve fare un lungo viaggio per tornare a casa.
        #GEPscience_bd_SIGINT_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare riflettono il fondo in archi ordinati sul grafico. È quasi regolare, e in qualche modo questo lo rende meno amichevole.
        #GEPscience_bd_SIGINT_SironaInSpaceLowDarkPolarBands_00 = Vicino alle bande polari scure, sottili fischi vagano nella banda come fari smarriti. Lo strumento insiste che sia fisica, il tuo istinto insiste che ti stia fissando.
        #GEPscience_bd_SIGINT_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare danno brevi crepitii luminosi che scattano on e off con la geometria. Ricontrolli due volte la tua antenna, giusto per essere sicuro che il pianeta non stia "rispondendo".
        #GEPscience_bd_SIGINT_AirmedInSpaceHigh_00 = Da alta quota sopra Airmed, la presenza di Sirona cola in ogni canale come un faro vicino. Il contributo della luna è debole, in ritardo e ostinatamente difficile da separare a questa distanza.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali, picchi sparsi compaiono in piccoli gruppi e poi si dissolvono nella statica. Sembra che la superficie malridotta stia riflettendo il segnale di qualcun altro con uno specchio incrinato.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowTemperateLowlands_00 = I bassopiani temperati sono perlopiù un sibilo basso e granuloso con occasionali tic sottili come aghi. Ogni tic viene registrato come se potesse contare ore dopo, quando finalmente arriverà a casa.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowTropicalMidlands_00 = Le medie terre tropicali spalmano tutto in una foschia multipercorso che si rifiuta di restare ferma. Scrivi "effetti del terreno" e fai finta che la spiegazione sia confortante.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowTemperateMidlands_00 = Sopra le medie terre temperate, un tono pulito prova a formarsi e poi si divide in echi. Per un attimo sembra intenzionale, poi la geometria cambia e il "messaggio" evapora.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowHighlands_00 = Le alture restituiscono post immagini nitide e ritardate di portanti più forti nelle vicinanze. Anche l'ascolto passivo sembra origliare Sirona attraverso un muro di cicatrici.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowDarkenedLowlands_00 = Sopra i bassopiani oscurati, la banda scende in una quiete inquieta spezzata da brevi pop secchi. Il silenzio tra un pop e l'altro è la parte che sembra più "lontana".
        #GEPscience_bd_SIGINT_AirmedInSpaceLowDarkenedMidlands_00 = Le medie terre oscurate mostrano deboli increspature ripetute che non si allineano mai due volte allo stesso modo. Inizi a capire perché "bicolore" descriva anche i dati.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowDarkenedHighlands_00 = Le alture oscurate producono picchi sfarfallanti proprio al limite della rilevabilità. Fissi il grafico abbastanza a lungo da farlo sembrare scortese.
        #GEPscience_bd_SIGINT_AirmedInSpaceLowPoles_00 = Vicino ai poli, sottili fischi vagano nello spettro come se cercassero una stazione. Sotto il sole rosso, "smarrito" comincia a suonare come una misura.
        #GEPscience_bd_SIGINT_BorvoInSpaceHigh_00 = Dall'orbita alta, l'atmosfera di Borvo trasforma il fondo in un mormorio morbido e irrequieto. È difficile capire cosa venga dalla luna e cosa sia solo l'universo che fa rumore apposta.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowTropicalCraquelure_00 = Sopra il craquelure tropicale, il ricevitore capta un crepitio staccato che arriva a raffiche. Il pattern sembra quasi parlato finché non ricordi che le rocce possono essere sorprendentemente loquaci nei modi sbagliati.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowTemperateCraquelure_00 = Il craquelure temperato produce rumore tremolante e irregolare con occasionali vuoti puliti che sembrano troppo ordinati. Li etichetti "finestre" e ti penti subito di aver dato un nome a qualcosa, qui fuori.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali restituiscono un sibilo caldo e affollato con alcuni picchi a banda stretta sopra. Qualunque cosa componga Borvo, è molto brava a tenersi i segreti.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowTemperateLowlands_00 = Sopra i bassopiani temperati, lo spettro si leviga in un lavaggio costante, poi cala in modo inatteso. I cali si ripetono abbastanza volte da renderti sospettoso.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowTropicalMidlands_00 = Le medie terre tropicali disperdono i segnali in doppi e tripli sfocati. È come ascoltare una voce in una stanza piena di echi.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowTemperateMidlands_00 = Le medie terre temperate mostrano toni deboli che slittano con l'orbita e non si assestano mai. Noti lo slittamento e ti chiedi se anche Borvo non sappia decidere se è polveroso o ghiacciato.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowHighlands_00 = Le alture sparano pop secchi attraverso il livello di rumore, brevi e luminosi. Sembrano segni di punteggiatura in una frase che nessuno tradurrà per giorni.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowMajorCraters_00 = Sopra i crateri maggiori, riflessi puliti creano ripetizioni nitide e ritardate di portanti forti. Le ripetizioni arrivano come risposte tardive da un posto che non aveva mai promesso di rispondere.
        #GEPscience_bd_SIGINT_BorvoInSpaceLowPoles_00 = Vicino ai poli, sottili fischi e deboli crepitii si intrecciano in un coro fragile. I dati sono freddi, lontani e stranamente belli in un modo da "per favore non restare bloccato qui".
        #GEPscience_bd_SIGINT_DamonaInSpaceHigh_00 = Da alta quota sopra Damona, il ricevitore sente soprattutto rumore preso in prestito e fondo lontano. La luna contribuisce poco più di un quieto accanito sussurro che fa sembrare ancora più lungo il ritardo delle comunicazioni.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sono abbastanza quieti da far risaltare minuscoli tic come colpetti su uno scafo vuoto. Ognuno viene registrato con cura, perché qui fuori anche il "piccolo" merita di essere spedito a casa.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowTemperateLowlands_00 = Sopra i bassopiani temperati, un sibilo basso sale e scende con il tuo passaggio come se la superficie respirasse polvere. Continui ad ascoltare comunque: sotto un sole rosso non ci sono molti compagni.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowTropicalMidlands_00 = Le medie terre tropicali producono picchi brevi e nitidi che svaniscono appena ti senti sicuro. Inizi a sospettare che Damona ami gli scherzi.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowTemperateMidlands_00 = Le medie terre temperate spalmano deboli portanti in fantasmi morbidi e sovrapposti. È come se la luna stesse riproducendo una vecchia trasmissione che non è mai esistita.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowHighlands_00 = Le alture restituiscono post immagini ritardate di segnali più forti nelle vicinanze, pulite e ripetibili. Ripetibile è rassicurante, finché non ricordi quanto tempo serve per confermare qualunque cosa da qui.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowImpactBasin_00 = Sopra il bacino d'impatto, un ampio crepitio sboccia su tutta la banda e poi collassa in quiete. La caratteristica è evidente, come la cicatrice che l'ha prodotta, e altrettanto riluttante a spiegarsi.
        #GEPscience_bd_SIGINT_DamonaInSpaceLowPoles_00 = Vicino ai poli, lo spettro si assottiglia in un silenzio fragile con pochi fischi vaganti. Archivi i dati e cerchi di non pensare a quanto "casa" suoni lontana, in questo quieto.
        #GEPscience_bd_SIGINT_EponaInSpaceHigh_00 = Da alta quota sopra Epona, il ricevitore sente soprattutto il fioco sole rosso e il sibilo dello spazio profondo. Qualunque "risposta" del pianeta arriva come increspature sottili, su cui a casa discuteranno a lungo.
        #GEPscience_bd_SIGINT_EponaInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali di Epona, la banda si riempie di un mormorio morbido e irrequieto, come vento in un'atmosfera che ricorda a malapena il calore. Compaiono alcuni picchi sottili, poi si dissolvono prima che tu possa sentirti brillante.
        #GEPscience_bd_SIGINT_EponaInSpaceLowTemperateLowlands_00 = I bassopiani temperati sono più quieti e lasciano affiorare deboli echi ritardati di sorgenti più forti. Sembra di origliare il meteo di Epona da molto lontano.
        #GEPscience_bd_SIGINT_EponaInSpaceLowTropicalUplands_00 = Gli altopiani tropicali disperdono tutto in doppi e tripli sfocati, trasformando toni puliti in segnali fantasma. Li etichetti "riflessi" e li salvi comunque sotto "sospetti".
        #GEPscience_bd_SIGINT_EponaInSpaceLowTemperateUplands_00 = Una sottile linea simile a una portante resta stabile per diversi secondi, poi scivola via mentre cambia la geometria. Lo strumento insiste che sia fisica, la pancia insiste che Epona stia facendo la vaga.
        #GEPscience_bd_SIGINT_EponaInSpaceLowHighlands_00 = Le colline fanno passare brevi crepitii attraverso il livello di rumore, taglienti come statica su una cuffia fredda. Sotto il sole rosso, anche il rumore naturale sembra avere un'intenzione.
        #GEPscience_bd_SIGINT_EponaInSpaceLowGrandPeaks_00 = Sopra i grandi picchi, gli echi multipercorso arrivano come risposte tardive a domande mai fatte. L'"ascolto passivo" all'improvviso sembra molto attivo.
        #GEPscience_bd_SIGINT_EponaInSpaceLowCraters_00 = Le regioni craterizzate riflettono il forte fondo in ripetizioni nitide e ritardate. È la cosa più simile a una conversazione che ti capiti qui fuori, ed è tutta fatta di specchi.
        #GEPscience_bd_SIGINT_EponaInSpaceLowVolcanoes_00 = Una raffica ampia sboccia nello spettro e poi collassa di nuovo, come se qualcosa di caldo sotto avesse tossito per un attimo nel cielo. Segni il timestamp e vorresti che il ritardo nelle comunicazioni fosse più breve.
        #GEPscience_bd_SIGINT_EponaInSpaceLowPoles_00 = Vicino ai poli, sottili fischi vagano nella banda come fari smarriti. Li registri con cura: qui fuori, "forse" impiega ore per diventare "confermato".
        #GEPscience_bd_SIGINT_RosmertaInSpaceHigh_00 = Dall'orbita alta, Rosmerta è soprattutto silenzio avvolto in rumore preso in prestito dallo spazio vicino. Il vuoto è così completo che sembra che la radio ti stia giudicando.
        #GEPscience_bd_SIGINT_RosmertaInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali, il ricevitore cattura deboli tic al limite della rilevabilità. Ogni tic sembra un gentile promemoria che "solitario" non è un tipo di dato.
        #GEPscience_bd_SIGINT_RosmertaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano un livello di rumore basso e pulito con occasionali picchi sottili come aghi. I picchi non si ripetono mai mentre li stai guardando, e la cosa sembra ingiusta.
        #GEPscience_bd_SIGINT_RosmertaInSpaceLowTropicalMidlands_00 = Le pianure tropicali spalmano portanti lontane in post immagini morbide che restano indietro rispetto al tuo movimento. Sotto un fioco sole rosso, anche i riflessi si prendono il loro tempo.
        #GEPscience_bd_SIGINT_RosmertaInSpaceLowTemperateMidlands_00 = Compare un tono breve e ondeggiante, poi svanisce nella quiete. Lo riascolti due volte e decidi che sì, hai sentito qualcosa, scientificamente.
        #GEPscience_bd_SIGINT_RosmertaInSpaceLowHighlands_00 = Le colline producono echi nitidi e ritardati di sorgenti più forti, come se Rosmerta volesse partecipare senza avere nulla da dire. È stranamente premuroso.
        #GEPscience_bd_SIGINT_RosmertaInSpaceLowPoles_00 = Vicino ai poli, lo spettro si assottiglia in una quiete fragile con rari pop secchi. Il silenzio tra un pop e l'altro è la parte che sembra più "lontana da casa".
        #GEPscience_bd_SIGINT_RAB-58EInSpaceHigh_00 = Da alta quota sopra la minuscola RAB-58E, non c'è quasi nulla oltre al fondo e al ruggito costante del sole rosso. È difficile capire se il planetesimo sia quieto o semplicemente troppo piccolo per lamentarsi.
        #GEPscience_bd_SIGINT_RAB-58EInSpaceLowLowlands_00 = Le basse terre restituiscono una statica debole e tremolante che va e viene con il tuo passaggio. Sembra meno un segnale e più una roccia che non è sicura di cosa sia.
        #GEPscience_bd_SIGINT_RAB-58EInSpaceLowEasternHighlands_00 = Sopra le colline orientali, compare un breve cinguettio proprio al margine del grafico e poi svanisce. Fissi il tracciato finché non sembra che sia il tracciato a fissare te.
        #GEPscience_bd_SIGINT_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali disperdono il forte fondo in minuscoli picchi sfarfallanti, come un'antenna rotta fatta di pietra. Salvi i dati sotto "misteri catturati".
        #GEPscience_bd_SIGINT_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos è un puntino ghiacciato e fioco circondato da quiete a lunga distanza. La banda è così calma che riesci a vedere la struttura di fondo dell'universo, confortante finché non ricordi la distanza.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali, il ricevitore capta un sibilo basso e granuloso con occasionali vuoti puliti che sembrano troppo ordinati. Li etichetti "finestre" e ti penti subito di aver dato un nome a qualcosa, qui fuori.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowTemperateLowlands_00 = I bassopiani temperati sono perlopiù quieti e lasciano scivolare nella banda deboli toni vaganti. Non si assestano mai, come se perfino il rumore non sapesse dove stare.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowTropicalMidlands_00 = Sopra le pianure tropicali, brevi crepitii si accendono e si spengono con la geometria come un faro difettoso. Verifichi i tuoi sistemi, poi scrivi "probabilmente naturale" con una penna molto piccola.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowTemperateMidlands_00 = Le pianure temperate riflettono portanti lontane in ripetizioni morbide e ritardate. Qui fuori, gli echi contano come compagnia.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowHighlands_00 = Le colline fanno passare pop più secchi attraverso il livello di rumore, come statica da un maglione congelato grande quanto un mondo. Non è un messaggio, ma è memorabile.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowSouthPolarHills_00 = Vicino alle colline polari meridionali, sottili fischi scivolano e si piegano mentre l'orbita cambia. L'effetto è ripetibile, il che è rassicurante finché non diventa inquietante.
        #GEPscience_bd_SIGINT_CernunnosInSpaceLowNorthPole_00 = Sopra il polo nord, lo spettro collassa in una quiete inquieta con rari tic precisi. Li registri tutti: ai margini di un sistema da sole rosso, anche i segnali minuscoli sembrano importanti.

        // bd_SiteSurvey
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedMagmaShores_00 = La costa lavica brilla come un'etichetta di pericolo sotto il fioco sole rosso di Grannus. Il Controllo Missione suggerisce di chiamare questo sito "Forse più tardi".
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedScorchedLowlands_00 = Il terreno sembra abbastanza piatto, ma le increspature di calore trasformano ogni masso in un miraggio. Segni la zona "sicura" con un punto interrogativo molto grande.
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedMidlands_00 = Dorsali e avvallamenti incrociano l'area come uno scudo termico crepato. Il rilevamento consiglia un upgrade ai piedi d'atterraggio e una finestra di upload più rapida.
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedHighlands_00 = I declivi frastagliati proiettano ombre lunghe che trasformano la stima delle distanze in un gioco d'azzardo. Il sito prende un voto alto per "interessante" e uno basso per "in piedi".
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedDarkSideMidlands_00 = Nella notte permanente, il terreno è calmo, immobile e sospettosamente poco utile alle telecamere. Le note dicono: "Portare più luci. E pazienza".
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedDarkSideHighlands_00 = Le montagne sono solo sagome contro un tenue orizzonte rosso, come denti nel buio. Segnali diversi punti d'atterraggio "dalla forma perfetta" che probabilmente sono scogliere.
        #GEPscience_bd_SiteSurvey_TaranisSrfLandedPoles_00 = Distese gelate incontrano dorsali affilate senza preavviso, e la luce non si comporta mai come dovrebbe. Il rilevamento conclude: "Scegliere il sito con gli strumenti, non con l'umore".
        #GEPscience_bd_SiteSurvey_TaranisSrfSplashedMagmaSea_00 = La "zona ammaraggio" è un problema liquido e luminoso che cerca di divorarti la fiducia. Sito approvato solo per entusiasmo senza equipaggio.
        #GEPscience_bd_SiteSurvey_TaranisSrfSplashedMagmaShores_00 = La camera riprende bordi che ribollono e crosta che collassa come fuochi d'artificio al rallentatore. Il rilevamento suggerisce operazioni da distanza rispettosa, preferibilmente da un altro bioma.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedSunnyLowlands_00 = I bassopiani illuminati sembrano lisci finché non noti che le "ondulazioni" sono in realtà dorsali affilate. Etichetti l'area: "atterrabile se ti piacciono le sorprese".
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedSunnyHighlands_00 = Il bagliore intenso cancella i dettagli e rende i declivi più amichevoli di quanto siano. Raccomandazione: atterrare altrove, poi arrivare a piedi con gli occhiali da sole.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedTransitionalLowlands_00 = Qui le ombre finalmente si comportano bene, e il terreno sembra sinceramente piatto per una volta. Il rilevamento lo timbra "promettente", che è quanto di più vicino a un complimento riesca a fare.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedTransitionalHighlands_00 = Un mosaico di roccia e polvere forma terrazze ordinate, come se il pianeta avesse provato a mettersi in ordine. Il sito è adatto, a patto che la finestra di comunicazione sia d'accordo.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedDarkSideLowlands_00 = Il buio freddo trasforma ogni depressione in una fossa e ogni rilievo in un mistero. Nota del rilevamento: "Se non lo vedi, non puoi inciampare... probabilmente".
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedDarkSideHighlands_00 = Le colline in ombra salgono verso un cielo nero, con un debole crepuscolo rosso sulle cime. Segni il sito migliore con overlay radar e un forte senso di umiltà.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedSoutheasternMountains_00 = Dorsali a lama tagliano il terreno come se qualcuno avesse accartocciato la crosta. La camera trova un'unica chiazza piatta e la perde subito nell'ombra.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedWesternMountains_00 = Ampie spalle di roccia offrono occasionali altopiani tra scarpate ripide. Il rilevamento consiglia un altipiano, un altipiano di riserva e una riserva della riserva.
        #GEPscience_bd_SiteSurvey_ToutatisSrfLandedDarkSideMountains_00 = Le montagne in ombra sono alte, fredde e ingiustamente drammatiche sotto il bagliore rosso di Grannus. Le zone sicure sono piccole, e il ritardo nelle comunicazioni le fa sembrare ancora più piccole.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedShores_00 = La costa sembra invitante in modo familiare, finché i disegni delle onde non combaciano con l'istinto. Il sito è valutato eccellente per basi ed eccellente per ripensamenti.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTropicalLowlands_00 = Foschia densa e copertura del suolo brillante rendono il terreno difficile da leggere a distanza. Il rilevamento consiglia di atterrare sulla chiazza più chiara e fingere che fosse previsto.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTemperateLowlands_00 = Colline dolci e pianori aperti compaiono nitidi nelle immagini, una rara gentilezza così lontano da casa. Il sito è segnato "ideale", con un asterisco sugli umori del meteo locale.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTropicalMidlands_00 = Le pianure tropicali sono spezzate da dorsali che potrebbero nascondere qualsiasi cosa, dai massi alla delusione. Approvi un sito con buon drenaggio e migliore linea di vista.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTemperateMidlands_00 = Terreno ondulato offre piattaforme dall'aspetto stabile e approcci sensati. Il rilevamento suggerisce questa regione per lavori a lungo termine, a patto che il pianeta sia d'accordo con noi.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedHighlands_00 = Le colline sono aspre, ma la roccia sembra solida e gli orizzonti sono ampi. Segni un altipiano per la scienza e un declivio vicino per il rimpianto.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTundra_00 = Terreno pallido e ombre lunghe fanno sembrare profonde le piccole depressioni e infinite quelle grandi. Il rilevamento raccomanda marcatori luminosi, guanti caldi e regole d'atterraggio molto chiare.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedIceCaps_00 = Il ghiaccio riflette la luce rossa di Grannus in un bagliore rosa strano che inganna le telecamere. Il sito è utilizzabile, ma solo se ti piace una navigazione con dubbi extra.
        #GEPscience_bd_SiteSurvey_NodensSrfSplashedSaltySeas_00 = La superficie sembra calma, ma il moto ondoso suggerisce venti forti appena fuori inquadratura. Il rilevamento lo segna come buona area di ammaraggio e pessimo posto dove far cadere gli attrezzi.
        #GEPscience_bd_SiteSurvey_NodensSrfSplashedFreshWater_00 = L'acqua dolce è scura e vitrea, spezzata da piccole increspature che non si comportano come a casa. Il sito è approvato per campionamenti, campionamenti rapidi, prima che qualcosa cambi idea.
        #GEPscience_bd_SiteSurvey_NodensSrfSplashedShores_00 = Secche e banchi di sabbia si vedono chiaramente, il che è rassicurante e anche sospetto. Il rilevamento consiglia di ancorarsi più al largo e arrivare a piedi come se fosse intenzionale.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedFlats_00 = I terreni piatti sembrano ingannevolmente lisci nel mirino, con Nodens immobile sopra lo stesso orizzonte. Segni diverse piazzole "eccellenti" e noti che il ritardo nelle comunicazioni rende obbligatorio ripensarci due volte.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTropicalLowlands_00 = Qui il suolo più scuro assorbe quel poco di calore che offre il sole rosso, ma nasconde anche solchi bassi. Il sito è valutato "praticabile", a patto di smetterla di chiamare "tropicale" qualunque cosa.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTemperateLowlands_00 = Un'ampia pianura chiara si stende come una checklist vuota pronta a tradirti. Le immagini tornano pulite, e questo è quasi più inquietante dei pericoli.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTropicalMidlands_00 = Rilievi ondulati interrompono la linea di vista ogni poche centinaia di metri, perfetti per sorprese e angoli di relay imbarazzanti. Segnali un sito per avamposto in cima a una dorsale e aggiungi in grassetto: "portare un'antenna più grande".
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTemperateMidlands_00 = Il terreno sembra stabile, ma le ombre non si muovono mai come l'istinto si aspetta sotto questa luce rossa fioca. Annoti il percorso più sicuro con: "fidati degli strumenti, non degli occhi".
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedHighlands_00 = Pendii netti e orizzonti lunghi e fissi rendono difficile stimare le distanze: tutto sembra più vicino e più ripido insieme. Il rilevamento consiglia di atterrare più in basso e salire solo se più tardi ci sentiamo eroici.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedPoles_00 = Il terreno verso i poli è screpolato e luccicante, come se non sapesse decidere se essere polvere o ghiaccio. Approvi un sito con buona visibilità e un avvertimento: "non far cadere niente di piccolo".
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedBasins_00 = Il fondo dei bacini è abbastanza piatto per una base, ma le letture di radiazione non si interessano del tuo comfort. Etichetti il sito "geologia eccellente, permanenza limitata".
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedLowlands_00 = Regolite fine scivola nelle zone basse e addolcisce ogni bordo in camera, nascondendo ciò che potrebbero essere rocce o buchi. Il rilevamento segna un corridoio sicuro e un forte desiderio di cingoli migliori.
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedTropicalMidlands_00 = Queste pianure tropicali sono più scure e un filo meno fredde, un tipo di "bello" sospetto da queste parti. Scegli un sito con buona geometria di relay e tempo minimo passato fuori.
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedTemperateMidlands_00 = Le dorsali sono ordinate, quasi progettate, finché non ingrandisci e vedi che è solo erosione che fa la drammatica. Segni un altopiano per le operazioni e un ripiego per quando l'altopiano non è reale.
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedHighlands_00 = Le colline ti danno una vista ampia su un mondo molto vuoto sotto un sole rosso stanco. Le immagini suggeriscono appoggi solidi, e il dosimetro suggerisce di continuare a muoversi comunque.
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedPoles_00 = Il terreno polare riflette luce quanto basta da confondere esposizione e fiducia dell'equipaggio. Approvi un sito in base alle ombre radar e scrivi: "niente pose eroiche durante le finestre di trasmissione".
        #GEPscience_bd_SiteSurvey_CaireenSrfLandedLowlands_00 = I bassopiani sono un caos di ghiaia e lastre, come un asteroide catturato che prova ancora a sembrare disinvolto. Identifichi una chiazza piatta abbastanza grande per un lander e altre due per le emergenze.
        #GEPscience_bd_SiteSurvey_CaireenSrfLandedMidlands_00 = Le pianure ondulano in onde gentili che sarebbero belle se il ritardo nelle comunicazioni non rendesse ogni correzione "in ritardo". Tracci un percorso a balzi e lo etichetti: "per favore non inciampare".
        #GEPscience_bd_SiteSurvey_CaireenSrfLandedHighlands_00 = Dalle colline, Sucellus riempie il cielo come un supervisore silenzioso, e l'orizzonte crolla in fretta con questa bassa gravità. Il rilevamento consiglia EVA brevi e regole di sicurezza con cavo molto rigide.
        #GEPscience_bd_SiteSurvey_CaireenSrfLandedPoles_00 = I poli sono luminosi, dall'aspetto fragile e spolverati di qualcosa che si rifiuta di comportarsi come neve. Approvi un sito per campionamenti con la nota: "toccare piano, andarsene in fretta".
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTropicalLowlands_00 = I fotogrammi mirati mostrano una pianura dall'aspetto liscio che si rivela una coperta di cicatrici sotto il fioco sole rosso di Grannus. Il sito è "accettabile", con il solito avviso che il ritardo nelle comunicazioni rende inutile il panico.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTemperateLowlands_00 = La camera individua increspature sottili e trincee basse che l'occhio continua a perdere nel bagliore bicolore. Segni un'ellisse d'atterraggio e scrivi: "fidati degli strumenti, non delle sensazioni".
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTropicalMidlands_00 = Le dorsali proiettano ombre lunghe che si rifiutano di seguire l'intuizione, così lontano da casa. Il rilevamento consiglia di avvicinarsi dal lato illuminato e di tenere l'antenna puntata come se fosse il tuo lavoro.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedTemperateMidlands_00 = Le pianure temperate sembrano stabili finché non ingrandisci e noti che i tratti "piatti" sono solo gobbe più piccole. Approvi comunque una chiazza, perché a volte devi scegliere un posto e smettere di fissare.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedHighlands_00 = Le colline offrono una vista spettacolare di Sirona sospesa sopra di te e modi altrettanto spettacolari di ribaltare un lander. Il sito prende voti alti per la scienza e voti bassi per la dignità.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedDarkenedLowlands_00 = Nel terreno più scuro, tutto si confonde nella stessa tonalità poco utile di "forse". Il passaggio di imaging trova un altopiano affidabile e una dozzina circa di illusioni ottiche.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedDarkenedMidlands_00 = Questa zona sembra raschiata, spaccata e poi lasciata raffreddare senza permesso. La segnali solo per visite brevi, soprattutto perché vorresti andartene mentre le radio sono ancora d'accordo.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedDarkenedHighlands_00 = Sagome frastagliate incidono il crepuscolo rosso, e le ombre fanno sembrare i pendii amichevoli fino all'ultimo pixel. La raccomandazione è semplice: atterrare più in basso e salire dopo.
        #GEPscience_bd_SiteSurvey_AirmedSrfLandedPoles_00 = Il terreno polare luccica appena e fa impennare la mappa dei rischi con piccoli dettagli taglienti. Approvi un sito per una sosta rapida, con una nota sul tenere breve il tempo d'esposizione e ancora più brevi gli orari.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalCraquelure_00 = La superficie è spezzata in un mosaico di placche come fango secco, solo che qui fa freddo ed è sotto un sole rosso stanco. Il rilevamento la definisce "strutturalmente interessante" e "ostile alle gambe d'atterraggio".
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateCraquelure_00 = Gli scatti ad alta risoluzione rivelano crepe che formano poligoni ordinati fino all'orizzonte. Scegli una placca abbastanza grande per il lander e ignori con garbo cosa potrebbe esserci sotto.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalLowlands_00 = La foschia addolcisce la vista, ma l'imaging cattura comunque ampie distese tra basse dorsali. Il sito è valutato buono, a patto che l'atmosfera non decida di fare una dimostrazione di meteo durante l'atterraggio.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateLowlands_00 = Il terreno beige marrone potrebbe essere polvere, potrebbe essere ghiaccio che finge di essere polvere, potrebbe essere qualcosa di peggio. Il rilevamento raccomanda un contatto prudente e un cucchiaio campionatore che non faccia domande.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalMidlands_00 = Rilievi a strati e vallate poco profonde rendono la linea di vista verso i relay una negoziazione continua. Approvi un sito sulla cresta e aggiungi: "mettere in conto tempo extra perché il segnale recuperi".
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateMidlands_00 = Le pianure sembrano compatte e dolcemente ondulate, quasi rassicuranti... finché la luce rossa trasforma gli indizi di profondità in supposizioni. Il sito riceve una spunta verde prudente e un "VERIFICARE" in neretto molto marcato.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedHighlands_00 = Da quassù, l'aria sottile di Borvo e gli orizzonti lunghi sembrano enormi e silenziosi. Il rilevamento suggerisce un avamposto in altura per comunicazioni e scienza, ricordando che "grandi panorami non significano terreno piatto".
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedMajorCraters_00 = I fondi dei crateri sono invitanti, ma i bordi sono ripidi e le ombre abbastanza profonde da nascondere un piccolo programma spaziale. Scegli un ripiano illuminato ed eviti il resto come se fosse burocrazia.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedPoles_00 = I poli mostrano distese più lisce interrotte da chiazze luminose e taglienti che non somigliano a nessuna brina familiare. Il sito è approvato per operazioni con ricognizione prima e "niente corse eroiche".
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTropicalLowlands_00 = I bassopiani sono grigi, craterizzati e onesti nel dichiararsi ostili. Il passaggio di imaging trova una sola chiazza piatta grande quanto una piazzola e la rende subito la preferita della missione.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTemperateLowlands_00 = Detriti fini si accumulano in bacini poco profondi, facendo sembrare il terreno più morbido di quanto probabilmente sia. Segni un punto di contatto e annoti che il ritardo nelle comunicazioni trasforma una "correzione minore" in una "scelta di vita".
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTropicalMidlands_00 = Piccole dorsali e microcrateri creano un paesaggio bitorzoluto che sembra incompiuto. Il rilevamento raccomanda balzi brevi, discese lente e di non fidarsi di nessuna ombra pensando che sia bassa.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTemperateMidlands_00 = Le pianure offrono ampie linee di vista su un mondo molto vuoto sotto un sole rosso fioco. Approvi un sito in base alla stabilità e alla rassicurante mancanza di sorprese, per ora.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedHighlands_00 = Le colline sono aspre, fratturate e pronte a mettere alla prova il carrello d'atterraggio. Il sito prende un voto "forse", promosso a "no" se ti piace restare in piedi.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedImpactBasin_00 = La cicatrice del bacino domina ogni fotogramma, a ricordarti che questa luna ha una storia e non è stata gentile. Selezioni un tratto interno liscio per i campioni, con una nota: "attenzione a blocchi di ejecta grandi quanto il rimpianto".
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedPoles_00 = L'illuminazione polare trasforma la superficie in un puzzle in scala di grigi con pezzi mancanti. Il rilevamento approva un sito prudente e consiglia di andarsene prima che cielo e radio tornino a perdere la sincronia.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedTropicalLowlands_00 = L'etichetta "tropicale" non sopravvive al primo contatto con la fioca luce rossa del giorno. I bassopiani sembrano piatti e vetrosi, ma la foschia fa sembrare ogni ombra una trappola di profondità.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedTemperateLowlands_00 = Ampie pianure si stendono sotto un sole rosso stanco, con una lieve foschia di metano che addolcisce l'orizzonte. Il sito è praticabile, purché si atterri con gli strumenti e non a occhio.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedTropicalUplands_00 = Gli altopiani si spezzano in dorsali e avvallamenti poco profondi che ingannano con la luce debole. Segnali alcuni ripiani stabili e aggiungi una nota: "il ritardo nelle comunicazioni rende illegali le imprese all'ultimo secondo".
        #GEPscience_bd_SiteSurvey_EponaSrfLandedTemperateUplands_00 = Il terreno sembra compatto, ma la trama racconta di una crosta sopra qualcosa che un tempo si muoveva. Il rilevamento raccomanda un contatto conservativo e poche scorribande.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedHighlands_00 = Dalle colline, tutto sembra congelato e antico... finché le letture termiche non sussurrano il contrario. Scegli un altopiano con linee di relay libere e prometti di non chiedere cosa c'è sotto il ghiaccio.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedGrandPeaks_00 = Picchi sottili come aghi proiettano ombre lunghe e inutili che non corrispondono mai all'istinto, così lontano da casa. Il "miglior" sito d'atterraggio è quello che esiste sul radar e non solo nella tua immaginazione.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedCraters_00 = I fondi dei crateri sono invitanti, ma i bordi sono ripidi e la luce trasforma le conche in pozzi d'incertezza. Scegli un ripiano sul lato illuminato e etichetti il resto "pericolo panoramico".
        #GEPscience_bd_SiteSurvey_EponaSrfLandedVolcanoes_00 = Sfiati scuri e terreno fratturato suggeriscono che il pianeta ha ancora qualcosa da dire dentro il suo guscio gelato. Il sito è segnato per operazioni senza equipaggio e ritirate molto rapide.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedPoles_00 = Il bagliore polare è lievemente rosa e totalmente ingannevole, trasformando pendii gentili in scherzi ottici. Approvi un sito prudente e scrivi: "ancoraggi, fari, pazienza".
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTropicalLowlands_00 = Il nome dice «tropicale», la realtà dice «senza aria e con spigoli vivi». I bassopiani sembrano lisci, ma gli allarmi di radiazione insistono che non dobbiamo rilassarci.
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTemperateLowlands_00 = Distese piatte si alternano a blocchi sparsi che potrebbero distruggere una gamba d'atterraggio nel silenzio. Segni una zona pulita e programmi una sosta breve, perché qui il cielo non concede pietà.
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTropicalMidlands_00 = Le pianure sono un caos di piccole dorsali e bacini poco profondi, tutto immerso in un debole crepuscolo rosso. Il sopralluogo suggerisce: salto rapido, dati al volo e via, prima che il dubbio raggiunga la missione.
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTemperateMidlands_00 = Alcune grandi terrazze offrono geometria stabile e buona visibilità verso i relay, se la rotazione collabora. Approvi una terrazza e aggiungi: «non inseguire il sole, non aiuta».
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedHighlands_00 = Le colline offrono un'ampia vista sul vuoto e una dose più alta di «perché siamo qui». Il sito è praticabile, ma solo per equipaggi che amano il silenzio freddo e gli uplink interminabili.
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedPoles_00 = Le ombre polari sono abbastanza profonde da nascondere massi interi fino all'ultimo secondo. Scegli una piazzola luminosa confermata dal radar e consigli luci extra più per il morale che per la visibilità.
        #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedLowlands_00 = In gravità quasi zero, i bassopiani sembrano un atterraggio gentile… finché non noti che la superficie è quasi tutta detriti sciolti. Il sopralluogo raccomanda una discesa lenta e una solenne promessa di non starnutire.
        #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedEasternHighlands_00 = Le colline orientali sono frastagliate, con pendenze che sembrano esagerate quando la luce è così fioca e il ritardo radio così reale. Segni uno sperone stabile e lo chiami «abbastanza buono per la scienza».
        #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedWesternHighlands_00 = Il lato occidentale sembra assemblato con rocce avanzate e pura ostinazione. Il sito ottiene un'approvazione prudente, con la nota: «assicurare tutto, compresa la fiducia».
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTropicalLowlands_00 = L'etichetta «tropicale» sembra una battuta raccontata a distanze interplanetarie. I bassopiani sono freddi, aperti e ingannevolmente piatti sotto il debole contrasto del sole rosso.
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTemperateLowlands_00 = Ampie pianure offrono una geometria d'atterraggio pulita e un forte senso di isolamento. Approvi un sito base e annoti che qui gli indizi giorno notte sono più un suggerimento che un orario.
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTropicalMidlands_00 = Le pianure ondulano dolcemente, ma le ombre si allungano e rifiutano di spiegare la loro profondità. Il sopralluogo raccomanda navigazione prima col radar e niente corse teatrali durante le finestre di upload.
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTemperateMidlands_00 = Un mosaico di basse dorsali e bacini poco profondi offre buon riparo ma pessimi angoli per le antenne. Scegli una piazzola in cresta e accetti che in questo sistema «perfetto» non esiste.
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedHighlands_00 = Dalle colline, l'orizzonte curva in un crepuscolo rosso che sembra perennemente in ritardo. Il sito è abbastanza stabile… se ricordiamo che qui «piatto» significa «quasi piatto».
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedSouthPolarHills_00 = Colline nodose e terreno dall'aria fragile creano un labirinto di piccoli pericoli. Approvi un solo corridoio di avvicinamento e sconsigli improvvisazioni quando il Controllo Missione è minuti dietro la realtà.
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedNorthPole_00 = Il polo è luminoso, freddo e inquietantemente silenzioso, come se il mondo trattenesse il fiato. Selezioni una piazzola conservativa e aggiungi: «lascia segnalatori, o diventa un segnalatore».

        // bd_SoilMoisture
        #GEPscience_bd_SoilMoiusture_GrannusInSpaceLow_00 = Il mappatore di umidità misura soprattutto il proprio panico mentre Grannus inonda l'antenna di microonde a rumore rosso, il Controllo Missione riceve il pacchetto "suolo: assente" dopo un lungo, solitario ritardo.
        #GEPscience_bd_SoilMoiusture_TaranisInSpaceLow_00 = La banda L racconta due emisferi: il lato illuminato urla "arido come ossa", mentre quello oscuro sussurra alcune chiazze fredde e deboli che potrebbero nascondere brina sotto le macerie.
        #GEPscience_bd_SoilMoiusture_ToutatisInSpaceLow_00 = La lettura mostra un mondo inaridito con una fascia dall'aria sospettosamente umida vicino al confine del crepuscolo, o c'è ghiaccio sepolto... oppure lo strumento sta diventando creativo sotto questo sole rosso fioco.
        #GEPscience_bd_SoilMoiusture_NodensInSpaceLow_00 = La mappatura in banda L evidenzia ampie fasce bagnate e mari luminosi, ma i pacchetti arrivano così tardi sotto il fioco sole rosso di Grannus che le "condizioni attuali" sono soprattutto "di un po' di tempo fa".
        #GEPscience_bd_SoilMoiusture_BelisamaInSpaceLow_00 = La scansione è quasi priva di dettagli finché una sottile striatura fredda sul lato buio da lungo tempo non suggerisce ghiaccio sepolto, lo strumento la etichetta "umidità" e poi ricontrolla immediatamente la propria sanità mentale.
        #GEPscience_bd_SoilMoiusture_SucellusInSpaceLow_00 = Tutto risulta arido come polvere tranne pochi pixel testardi in ombra profonda, il rapporto in ritardo sembra una checklist: "regolite, regolite, regolite... forse ghiaccio, se sei ottimista".
        #GEPscience_bd_SoilMoiusture_CaireenInSpaceLow_00 = Il mappatore insiste su "nessuna umidità rilevata" finché non sorvola una strana zona idratata, il Controllo Missione discute se sia reale o solo Caireen che rimanda assurdità attraverso un link lungo e solitario.
        #GEPscience_bd_SoilMoiusture_SironaInSpaceLow_00 = Il radar per l'umidità del suolo passa diversi minuti a cercare il "terreno", poi rinuncia e segnala deboli fasce di condensa mutevoli sulle cime delle nubi di Sirona, insieme a un promemoria: non c'è, di fatto, alcun suolo.
        #GEPscience_bd_SoilMoiusture_AirmedInSpaceLow_00 = Airmed risulta uniformemente secco, con alcuni pixel "umidi" testardi che restano appesi alle ombre dei crateri, il downlink in ritardo li definisce "possibili volatili sepolti", il modo educato dello strumento per dire "probabilmente ghiaccio".
        #GEPscience_bd_SoilMoiusture_BorvoInSpaceLow_00 = La scansione segnala zone "bagnate" a chiazze che non si comportano affatto come acqua, sotto il fioco sole rosso il mappatore le rietichetta con discrezione come "liquidi superficiali esotici" e aspetta che il Controllo Missione smetta di chiedere se si possano usare per annaffiare le piante.
        #GEPscience_bd_SoilMoiusture_DamonaInSpaceLow_00 = Tutto risulta freddo, vuoto e secco finché il radar non sfiora il terminatore e cattura una sottile firma di brina, i pacchetti del lungo tragitto arrivano etichettati: "umidità rilevata (definizione negoziabile)".
        #GEPscience_bd_SoilMoiusture_EponaInSpaceLow_00 = La mappa in banda L dipinge Epona con ampi bassopiani "umidi" e alture ostinatamente secche, il downlink in ritardo fa sembrare di leggere il meteo di ieri da mezzo sistema di distanza.
        #GEPscience_bd_SoilMoiusture_RosmertaInSpaceLow_00 = Quasi tutta Rosmerta risulta secca da vuoto, ma alcune fratture fredde mostrano una tenue firma di umidità, lo strumento la etichetta "possibile ghiaccio sepolto" e poi tace per una finestra di trasmissione molto lunga.
        #GEPscience_bd_SoilMoiusture_RAB-58EInSpaceLow_00 = La scansione è soprattutto rumore e riflessi di polvere, finché una piccola zona non schizza su "bagnato" per un attimo, potrebbe essere un grumo di ghiaccio, o solo RAB-58E che ti ricorda quanto tutto appaia strano sotto un sole rosso fioco.
        #GEPscience_bd_SoilMoiusture_CernunnosInSpaceLow_00 = Cernunnos risulta uniformemente secco e amaramente freddo, con un sottile bordo di "umidità" vicino all'ombra permanente, il Controllo Missione lo annota come "volatili simili a brina" e finge che sia rassicurante.

        // bd_soilScoop
        #GEPscience_bd_soilScoop_TaranisSrfLandedScorchedLowlands_00 = La benna solleva una crosta friabile e rivela granuli vetrosi che sembrano ancora offesi dal vicino sole rosso.
        #GEPscience_bd_soilScoop_TaranisSrfLandedMidlands_00 = Il braccio smuove una polvere finissima ed elettrostatica che si attacca a tutto, come se volesse farsi dare un passaggio fino a casa.
        #GEPscience_bd_soilScoop_TaranisSrfLandedHighlands_00 = Sotto la superficie fragile, il materiale è fratturato e tagliente, come se avesse subito cicli termici spietati per ere.
        #GEPscience_bd_soilScoop_TaranisSrfLandedDarkSideMidlands_00 = La benna spacca una pelle gelata e libera un lieve velo di graniglia che sublima, il Controllo Missione risponde dopo una lunga, scomoda pausa.
        #GEPscience_bd_soilScoop_TaranisSrfLandedDarkSideHighlands_00 = Quello che risale è freddo, secco e duro come ceramica, con minuscoli riflessi chiari che svaniscono non appena si scaldano nella luce senza ombre.
        #GEPscience_bd_soilScoop_TaranisSrfLandedMagmaShores_00 = La benna sfiora la crosta costiera e se ne pente subito: sotto c'è un bagliore che significa "ritrai, adesso".
        #GEPscience_bd_soilScoop_TaranisSrfLandedPoles_00 = Un velo di brina lascia spazio a granuli scuri e arsi sotto, come se questo mondo non sapesse decidere se congelare o bruciare.
        #GEPscience_bd_soilScoop_TaranisSrfSplashedMagmaSea_00 = La benna affonda e i sensori vanno in saturazione, riemerge con un rivestimento lucido che si richiude in una pelle solida quasi all'istante.
        #GEPscience_bd_soilScoop_TaranisSrfSplashedMagmaShores_00 = Mescoli la pellicola fusa in superficie e la vedi ripiegarsi in lastre nere e vetrose prima che il calore ritrovi il braccio.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedSunnyLowlands_00 = Lo strato esposto è cotto in una crosta di roccia polverosa, abbastanza calda da far suonare stanco il motore della benna.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedSunnyHighlands_00 = Il braccio raschia graniglia sinterizzata dal sole che strilla come una cerniera malandata, il taglio fresco mostra materiale più scuro sotto.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedTransitionalLowlands_00 = Appena sotto la superficie, la polvere fine lascia spazio a grani compattati: un confine netto tra il lato cotto dal giorno e quello raffreddato dalla notte.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedTransitionalHighlands_00 = La benna scopre piastre sottili e fragili che si sfogliano a strati, come se questo suolo fosse stressato in entrambe le direzioni da sempre.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedDarkSideLowlands_00 = Una crosta pallida di brina cede con un lieve scricchiolio, e un breve sbuffo di gas intrappolato appanna la camera prima di dissolversi.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedDarkSideHighlands_00 = Il braccio solleva graniglia frastagliata cementata dal ghiaccio che scintilla appena sotto la debole luce rossa, poi si spegne mentre si scalda.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedSoutheasternMountains_00 = Quasi solo frammenti di roccia taglienti: il tuo "suolo" è solo montagna che prova a diventare sabbia, molto lentamente e molto rumorosamente.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedWesternMountains_00 = La benna trova sacche riparate di regolite più fine tra dorsali dure, come se l'aria sottile lavorasse solo part-time.
        #GEPscience_bd_soilScoop_ToutatisSrfLandedDarkSideMountains_00 = La superficie si frantuma come ghiaia congelata, e il materiale esposto sembra incollato dal freddo più che dalla chimica.
        #GEPscience_bd_soilScoop_NodensSrfLandedShores_00 = La benna tira su sabbia umida e ciottoli arrotondati, sotto il debole sole rosso, perfino i granelli bagnati sembrano stranamente alieni.
        #GEPscience_bd_soilScoop_NodensSrfLandedTropicalLowlands_00 = Il suolo esposto è scuro e appiccicoso, con umidità che rende ottimisti gli strumenti e sospettosi gli ingegneri.
        #GEPscience_bd_soilScoop_NodensSrfLandedTemperateLowlands_00 = La benna rivela una miscela ordinata di granuli fini e piccoli riflessi minerali: terreno dall'aria stabile su un mondo lontanissimo.
        #GEPscience_bd_soilScoop_NodensSrfLandedTropicalMidlands_00 = Uno strato vischioso, simile ad argilla, viene via a lastre, suggerendo un'alterazione prolungata sotto un cielo spesso.
        #GEPscience_bd_soilScoop_NodensSrfLandedTemperateMidlands_00 = Il sottosuolo è più grossolano e ghiaioso del previsto, come se le tempeste selezionassero i granuli e non smettessero mai.
        #GEPscience_bd_soilScoop_NodensSrfLandedHighlands_00 = La benna porta alla luce graniglia secca e tagliente con poche frazioni fini: è il primo materiale qui che non prova a spalmarsi sul braccio.
        #GEPscience_bd_soilScoop_NodensSrfLandedTundra_00 = Una crosta sottile e compatta si rompe e rivela granuli freddi e umidi sotto: permafrost a cui non importa quanto duri la trasmissione.
        #GEPscience_bd_soilScoop_NodensSrfLandedIceCaps_00 = La benna morde strati di ghiaccio polveroso, la sezione esposta mostra strisce come un diario congelato di stagioni sotto un sole rosso.
        #GEPscience_bd_soilScoop_NodensSrfSplashedSaltySeas_00 = Il braccio pesca sedimento salmastro che si agglomera subito, qualunque sali ci siano qui dentro, sono estremamente orgogliosi di sé.
        #GEPscience_bd_soilScoop_NodensSrfSplashedFreshWater_00 = Limo fine si solleva in nubi lente, e i sensori segnalano chimica complessa che richiederà secoli (ok, ore) di discussioni a casa.
        #GEPscience_bd_soilScoop_NodensSrfSplashedShores_00 = Raccogli sabbia bagnata proprio sulla linea d'acqua e la vedi colare di nuovo al suo posto, come se la costa stesse educatamente annullando la tua scienza.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedFlats_00 = La benna scorre in una crosta compatta levigata dal vento, i granuli si impaccano come se fossero stati pressati per ere sotto luce rossa.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedTropicalLowlands_00 = Lo strato superficiale è più scuro e leggermente appiccicoso, come se la chimica della "fascia calda" non finisse mai di reagire prima del prossimo lunghissimo ritardo radio.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedTemperateLowlands_00 = La regolite è ordinata: polvere fine sopra, granuli croccanti sotto, come se il terreno avesse un programma e lo rispettasse.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedTropicalMidlands_00 = Sollevi una benna di grumi ruvidi che si disfano lentamente nella luce tenue, liberando polvere che prova con impegno a diventare parte della navicella.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedTemperateMidlands_00 = La benna trova granuli pallidi con occasionali pagliuzze vetrose, il laboratorio annota che è "normale", poi aggiunge tre punti interrogativi.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedHighlands_00 = Il braccio raschia frammenti taglienti e schegge di roccia affiorante, come se le alture si rifiutassero attivamente di diventare suolo.
        #GEPscience_bd_soilScoop_BelisamaSrfLandedPoles_00 = Una crosta fredda e fragile si spacca e rivela granuli più scuri sotto, il sole rosso fa sembrare il taglio fresco quasi luminoso.
        #GEPscience_bd_soilScoop_SucellusSrfLandedBasins_00 = La benna tira su detriti impastati dagli impatti: polvere mescolata a schegge spigolose, come se il bacino stesse ancora masticando vecchie collisioni.
        #GEPscience_bd_soilScoop_SucellusSrfLandedLowlands_00 = Il campione è denso per essere "terra", con pagliuzze pesanti che tintinnano nel contenitore, qualcuno a casa inizia subito a discutere di metalli.
        #GEPscience_bd_soilScoop_SucellusSrfLandedTropicalMidlands_00 = I granuli sono insolitamente secchi e felici di caricarsi di statica, risalendo le pareti della benna al rallentatore sotto il fioco giorno rosso.
        #GEPscience_bd_soilScoop_SucellusSrfLandedTemperateMidlands_00 = Scopri una miscela stratificata di fini e graniglia, come se la superficie fosse stata vagliata con delicatezza da processi che, a questa distanza, nessuno sa nominare.
        #GEPscience_bd_soilScoop_SucellusSrfLandedHighlands_00 = La benna porta su roccia pallida e frantumata che non odora di assolutamente nulla: un risultato stranamente inquietante.
        #GEPscience_bd_soilScoop_SucellusSrfLandedPoles_00 = Granuli cementati dal freddo risalgono in un unico grumo, poi si fratturano in frammenti scintillanti non appena si scaldano nel vano strumenti.
        #GEPscience_bd_soilScoop_CaireenSrfLandedLowlands_00 = La benna affonda a malapena e l'intera zona comincia a fluttuare, raccogli un "campione" e una breve lezione di umiltà a bassa gravità.
        #GEPscience_bd_soilScoop_CaireenSrfLandedMidlands_00 = Polvere e ciottolini rotolano insieme nel contenitore, ticchettando piano come una valanga in miniatura che impiegherà ore a fermarsi.
        #GEPscience_bd_soilScoop_CaireenSrfLandedHighlands_00 = Il braccio raschia regolite fresca da un pendio ripido, metà se ne va alla deriva prima che la camera possa dimostrare che sia mai esistita.
        #GEPscience_bd_soilScoop_CaireenSrfLandedPoles_00 = Una sottile patina di brina nasconde sotto graniglia scura, da asteroide: catturata, adottata e ancora non del tutto a casa sotto questo sole rosso.
        #GEPscience_bd_soilScoop_AirmedSrfLandedTropicalLowlands_00 = La benna rompe una crosta cotta dal sole e rivela sotto graniglia chiara, come se Airmed stesse cercando di ridipingersi sotto la fioca luce rossa.
        #GEPscience_bd_soilScoop_AirmedSrfLandedTemperateLowlands_00 = Polvere fine e schegge taglienti scivolano nella vaschetta, i granuli restano appiccicati con ostinazione, probabilmente ancora irritati da tutta quella radiazione.
        #GEPscience_bd_soilScoop_AirmedSrfLandedTropicalMidlands_00 = Una crosta sottile cede a regolite stratificata, chiara sopra e scura sotto, come se la luna avesse dimenticato dove ha messo il confine dei colori.
        #GEPscience_bd_soilScoop_AirmedSrfLandedTemperateMidlands_00 = Il braccio raschia detriti compattati che sembrano selezionati dagli impatti, ogni frammento un piccolo promemoria che Airmed vive pericolosamente.
        #GEPscience_bd_soilScoop_AirmedSrfLandedHighlands_00 = La benna raccoglie soprattutto pietruzze frastagliate, su un mondo così martoriato, il "suolo" è solo roccia che non ha ancora finito di discutere con la gravità.
        #GEPscience_bd_soilScoop_AirmedSrfLandedDarkenedLowlands_00 = Il sottosuolo esposto è quasi nero carbone, inghiotte la luce rossa finché la camera insiste che il tappo dell'obiettivo sia inserito.
        #GEPscience_bd_soilScoop_AirmedSrfLandedDarkenedMidlands_00 = Uno strato nero e polveroso si solleva e si posa con una lentezza esasperante, la reazione del Controllo Missione arriva molto dopo la polvere.
        #GEPscience_bd_soilScoop_AirmedSrfLandedDarkenedHighlands_00 = Sotto la crosta scura, i granuli scintillano di pagliuzze vetrose: belli per un attimo, poi di nuovo persi nelle ombre lunghe.
        #GEPscience_bd_soilScoop_AirmedSrfLandedPoles_00 = Una pelle fragile e brinosa si frattura, rivelando sotto graniglia dura e secca, perfino le parti "fredde" qui sembrano sterilizzate dal sole con aggressività.
        #GEPscience_bd_soilScoop_BorvoSrfLandedTropicalCraquelure_00 = La benna solleva piastre sottili e crepate che si spezzano come vecchia vernice, qualcosa di volatile sibila via nella tenue aria velata.
        #GEPscience_bd_soilScoop_BorvoSrfLandedTemperateCraquelure_00 = La regolite si rompe in blocchi poligonali e giunti polverosi, come se il terreno si fosse piegato e ricongelato per secoli.
        #GEPscience_bd_soilScoop_BorvoSrfLandedTropicalLowlands_00 = Scopri granuli dall'aspetto umido che in realtà non sono umidi, gli strumenti discutono se sia polvere, ghiaccio o una terza cosa segreta.
        #GEPscience_bd_soilScoop_BorvoSrfLandedTemperateLowlands_00 = Il campione è un impasto compatto beige che fa grumi quel tanto che basta per essere sospetto in questa atmosfera sottile con tracce di metano.
        #GEPscience_bd_soilScoop_BorvoSrfLandedTropicalMidlands_00 = La benna espone uno strato più scuro sotto la crosta superficiale, i sensori olfattivi riportano "nulla", il che è stranamente inquietante.
        #GEPscience_bd_soilScoop_BorvoSrfLandedTemperateMidlands_00 = Limo fine e pallini ruvidi rotolano insieme, selezionati come se qualcuno avesse scosso la luna in un barattolo e si fosse dimenticato di smettere.
        #GEPscience_bd_soilScoop_BorvoSrfLandedHighlands_00 = Il braccio raschia granuli pallidi e croccanti che scintillano appena sotto il sole rosso, poi si spengono quando la foschia scivola sul sito.
        #GEPscience_bd_soilScoop_BorvoSrfLandedMajorCraters_00 = Ghiaia di breccia da impatto risale in pezzi taglienti, con fini più morbide stipate tra loro: i crateri di Borvo tengono i loro souvenir ben stretti.
        #GEPscience_bd_soilScoop_BorvoSrfLandedPoles_00 = La benna morde uno strato freddo e crostoso che si frattura di netto, il materiale esposto sembra più fresco di quanto dovrebbe, così lontano da casa.
        #GEPscience_bd_soilScoop_DamonaSrfLandedTropicalLowlands_00 = La benna raccoglie polvere grigia e ciottolini che scivolano come neve secca, il sole rosso fa sembrare tutto più antico di quanto dicano i dati.
        #GEPscience_bd_soilScoop_DamonaSrfLandedTemperateLowlands_00 = Una crosta sottile si rompe e rivela sotto graniglia più scura, come se la superficie stesse cercando di nascondere cosa ha fatto l'ultimo grande impatto.
        #GEPscience_bd_soilScoop_DamonaSrfLandedTropicalMidlands_00 = La regolite è grossolana e graffiante, il contenitore la accoglie con la quieta rassegnazione della scienza a lunga distanza.
        #GEPscience_bd_soilScoop_DamonaSrfLandedTemperateMidlands_00 = Metti a nudo uno strato compattato che tiene insieme per un attimo, poi crolla in ghiaia appena smetti di guardarlo.
        #GEPscience_bd_soilScoop_DamonaSrfLandedHighlands_00 = La benna raccoglie soprattutto frammenti spigolosi, schegge dall'aria recente su una luna che per il resto è tutta cicatrici antiche e silenzio.
        #GEPscience_bd_soilScoop_DamonaSrfLandedImpactBasin_00 = Il braccio scava in ejecta polverizzata: granuli misti, pagliuzze fuse e una trama che dice "episodio violento" senza bisogno di traduzione.
        #GEPscience_bd_soilScoop_DamonaSrfLandedPoles_00 = Una patina fredda e fragile si spacca, sotto c'è polvere scura come lo spazio, in paziente attesa della prossima finestra di trasmissione.
        #GEPscience_bd_soilScoop_EponaSrfLandedTropicalLowlands_00 = La paletta spacca una crosta dura e pallida, i granuli sotto sono più scuri e stranamente compattati, come se "caldo" qui volesse dire "meno congelato" così lontano da casa.
        #GEPscience_bd_soilScoop_EponaSrfLandedTemperateLowlands_00 = Una polvere finissima si solleva pigra nella luce debole, poi si posa con la pazienza di chi sa che il prossimo uplink è tra ore.
        #GEPscience_bd_soilScoop_EponaSrfLandedTropicalUplands_00 = Sotto uno strato superiore fragile, il campione risale in grumi ruvidi che sembrano cicli termici: congela, si assesta, congela di nuovo sotto un fioco sole rosso.
        #GEPscience_bd_soilScoop_EponaSrfLandedTemperateUplands_00 = La paletta riporta un mix di granuli ghiacciati e schegge di roccia affilate, è difficile capire cosa sia "suolo" e cosa sia "storia congelata".
        #GEPscience_bd_soilScoop_EponaSrfLandedHighlands_00 = Il braccio raschia soprattutto frammenti angolari, qualunque alterazione avvenga qui è lenta, fredda e davvero, davvero accurata.
        #GEPscience_bd_soilScoop_EponaSrfLandedGrandPeaks_00 = Una sottile velatura di polvere nasconde granuli ostinati e vetrosi, il tuo "scavo" è più una richiesta educata alla montagna.
        #GEPscience_bd_soilScoop_EponaSrfLandedCraters_00 = La paletta solleva detriti rimescolati dall'impatto con pagliuzze fuse, il fondo del cratere sembra ancora impegnato a rimettersi in ordine.
        #GEPscience_bd_soilScoop_EponaSrfLandedVolcanoes_00 = La crosta superficiale si rompe rivelando granuli più caldi e più scuri, i sensori schizzano per un attimo, poi la risposta allarmata del Controllo Missione arriva molto dopo che hai già ritratto il braccio.
        #GEPscience_bd_soilScoop_EponaSrfLandedPoles_00 = Una pelle di brina si frattura nettamente, esponendo strati a bande di ghiaccio e polvere che sembrano stagioni scritte al rallentatore.
        #GEPscience_bd_soilScoop_RosmertaSrfLandedTropicalLowlands_00 = La paletta raccoglie regolite finissima che in bassa gravità si comporta come fumo, poi si ricorda che dovrebbe essere un solido.
        #GEPscience_bd_soilScoop_RosmertaSrfLandedTemperateLowlands_00 = Un raschio superficiale rivela granuli serrati, come se il terreno fosse stato pressato con delicatezza dal tempo e dal vuoto.
        #GEPscience_bd_soilScoop_RosmertaSrfLandedTropicalMidlands_00 = Il campione è un mix anonimo di polvere e sassolini, quieto, senza aria e in qualche modo ancora un po' solitario.
        #GEPscience_bd_soilScoop_RosmertaSrfLandedTemperateMidlands_00 = La paletta scopre uno strato inferiore più scuro che si attacca elettrostaticamente a tutto, compresa la dignità della telecamera.
        #GEPscience_bd_soilScoop_RosmertaSrfLandedHighlands_00 = Perlopiù schegge appuntite e granuli grossolani, le colline di Rosmerta rifiutano di essere qualcosa di più morbido di "spigoloso".
        #GEPscience_bd_soilScoop_RosmertaSrfLandedPoles_00 = Una sottile glassa di brina lascia il posto a granuli secchi e grigi sotto, abbastanza freddi da conservare segreti, ma non abbastanza gentili da condividerli.
        #GEPscience_bd_soilScoop_RAB-58ESrfLandedLowlands_00 = La paletta solleva un mix confuso di granuli chiari e briciole scure, catturato o no, questo piccolo planetesimo si è portato le sue regole.
        #GEPscience_bd_soilScoop_RAB-58ESrfLandedEasternHighlands_00 = Il braccio raschia materiale friabile e pallido che si frattura come un fragile ghiaccio cementato, poi lascia polvere che si allontana in lente spirali.
        #GEPscience_bd_soilScoop_RAB-58ESrfLandedWesternHighlands_00 = Qui il campione sembra più roccioso: frammenti angolari con una lieve lucentezza, come se due mondi diversi avessero provato a diventare uno e si fossero fermati a metà.
        #GEPscience_bd_soilScoop_CernunnosSrfLandedTropicalLowlands_00 = La paletta rompe una crosta di brina e polvere compattate, sotto, granuli più scuri assorbono la luce rossa come se la mettessero da parte per dopo.
        #GEPscience_bd_soilScoop_CernunnosSrfLandedTemperateLowlands_00 = Limo finissimo si gonfia e poi si deposita a fasi, come se persino la polvere avesse bisogno di tempo per decidere dove stare.
        #GEPscience_bd_soilScoop_CernunnosSrfLandedTropicalMidlands_00 = Lo strato esposto è granulare e secco, con minuscole pagliuzze scintillanti che spariscono non appena si scaldano dentro il contenitore.
        #GEPscience_bd_soilScoop_CernunnosSrfLandedTemperateMidlands_00 = Scopri un mix laminato di granuli chiari e scuri, una prova silenziosa di cicli che durano più del ritardo delle comunicazioni.
        #GEPscience_bd_soilScoop_CernunnosSrfLandedHighlands_00 = La paletta recupera soprattutto detriti angolari, qui il paesaggio sembra scolpito da fratture fredde, non da un'erosione di quelle "gentili".
        #GEPscience_bd_soilScoop_CernunnosSrfLandedSouthPolarHills_00 = Un velo di polvere senza vento scivola di nuovo nel tuo solco, come se la collina stesse educatamente disfacendo la tua scienza.
        #GEPscience_bd_soilScoop_CernunnosSrfLandedNorthPole_00 = Il braccio affonda in strati duri di ghiaccio polveroso, il taglio fresco sembra quasi nero nella fioca luce rossa, e nessuno a casa è d'accordo sul perché.

        // bd_solarWind
        #GEPscience_bd_solarWind_GrannusInSpaceLow_00 = The detector counts particles so fast it looks like it's trying to send a distress call. Grannus' red glare makes "calibration" feel like a polite suggestion.
        #GEPscience_bd_solarWind_GrannusInSpaceHigh_00 = The solar wind is still fierce out here, but it arrives in steadier sheets. Mission Control's replies come back late enough that the data has already formed its own opinions.
        #GEPscience_bd_solarWind_TaranisInSpaceLow_00 = The wind is dense and sharp this close in, slamming straight through the local space like it owns the place. Your probe's log labels one spike "OW" before returning to numbers.
        #GEPscience_bd_solarWind_TaranisInSpaceHigh_00 = Readings rise and fall with each fast sweep over Taranis, as if the planet is moving through a river of charged grit. The red sun never blinks, and neither does the counter.
        #GEPscience_bd_solarWind_ToutatisInSpaceLow_00 = The flow bends and jitters near Toutatis, hinting at a modest magnetic pushback. Every time it steadies, the spacecraft rotates and reminds you how far away "home" isn't.
        #GEPscience_bd_solarWind_ToutatisInSpaceHigh_00 = The wind looks calmer at this altitude, but it carries an unsettling consistency—like a long, quiet lecture from Grannus. You save the dataset and start missing radio static.
        #GEPscience_bd_solarWind_NodensInSpaceLow_00 = The particle stream kinks and curls as Nodens' field and thick air try to argue with the wind. The counter keeps winning, but it sounds slightly less confident down here.
        #GEPscience_bd_solarWind_NodensInSpaceHigh_00 = Above Nodens, the flow smooths into long, steady sheets under the dim red sun. By the time Mission Control replies, the wind has already changed its mind twice.
        #GEPscience_bd_solarWind_BelisamaInSpaceLow_00 = Readings flicker between calm and chaos as Belisama passes through Nodens' wake. The instrument logs the pattern as "helpful," which is not a word it usually uses.
        #GEPscience_bd_solarWind_BelisamaInSpaceHigh_00 = Out of the worst of Nodens' shielding, the wind hits cleanly and with a cold regularity. The locked world below never turns to look, and neither does the sun.
        #GEPscience_bd_solarWind_SucellusInSpaceLow_00 = Near Sucellus there's almost no protection—just a hard rain of charged particles and a lot of "maximum value" on the display. Someone suggests turning the sensitivity down, the wind ignores the suggestion.
        #GEPscience_bd_solarWind_SucellusInSpaceHigh_00 = The wind stays harsh even this far out, a steady push across a small, stubborn world. The data arrives home late and still feels like it has teeth.
        #GEPscience_bd_solarWind_CaireenInSpaceLow_00 = Solar wind slams straight into tiny Caireen and the detector catches a spray of freshly knocked-off ions. It's like the moon is shedding little pieces of itself to answer your question.
        #GEPscience_bd_solarWind_CaireenInSpaceHigh_00 = Farther out, the flow jitters with odd gaps and spikes from passing wakes and shadows. The counter ticks like distant Morse code, but there's nobody nearby to be impressed.
        #GEPscience_bd_solarWind_SironaInSpaceLow_00 = The detector saturates, then tries again, then politely pretends it meant to do that. Sirona's brutal magnetic environment twists the red sun's particle stream into something that feels actively personal.
        #GEPscience_bd_solarWind_SironaInSpaceHigh_00 = Farther out, the wind steadies into broad sheets, but the numbers still wobble with Sirona's far-reaching field. The downlink arrives late, as if even the radio is tired of crossing this much empty.
        #GEPscience_bd_solarWind_AirmedInSpaceLow_00 = Close to Airmed, the wind flickers between harsh exposure and Sirona-cast shelter. Spikes in the log suggest the surface is being sandblasted into a thin cloud of charged grit.
        #GEPscience_bd_solarWind_AirmedInSpaceHigh_00 = The instrument catches long, quiet stretches punctuated by sudden jolts—like passing through invisible wakes. You save the data and wonder how something so "empty" can be so busy.
        #GEPscience_bd_solarWind_BorvoInSpaceLow_00 = The wind piles up and peels around Borvo, making a neat bow shock that the detector traces like a ruler line. Strange pickup ions hint that the thin air is donating molecules whether it wants to or not.
        #GEPscience_bd_solarWind_BorvoInSpaceHigh_00 = At altitude, the flow smooths out, but a faint, repeating ripple suggests Borvo is still dragging a tenuous interaction behind it. The red sun's "breeze" is more of a long-distance shove.
        #GEPscience_bd_solarWind_DamonaInSpaceLow_00 = Tiny Damona offers no protection—just a clean hit of charged particles and a brief spray of freshly liberated ions. The counter ticks calmly, which somehow makes it feel lonelier.
        #GEPscience_bd_solarWind_DamonaInSpaceHigh_00 = Out here the wind is thin, fast, and stubbornly consistent, as if the system has settled into a quiet routine. Mission Control's reply arrives after the interesting part is already over.
        #GEPscience_bd_solarWind_EponaInSpaceLow_00 = The wind thickens into a scratchy hiss as it skims Epona's upper reaches, peppering the detector with hard counts. The red sun feels close enough to be watching.
        #GEPscience_bd_solarWind_EponaInSpaceHigh_00 = Up here it's a steady, cold push of charged particles with occasional ripples like distant thunder. The downlink takes so long that the wind has already rearranged itself by the time anyone replies.
        #GEPscience_bd_solarWind_RosmertaInSpaceLow_00 = The flow stutters and bends in Rosmerta's wake, as if the moon is dragging a thin veil of ions behind it. The instrument calls it "interesting" and then immediately fills the log with warnings.
        #GEPscience_bd_solarWind_RosmertaInSpaceHigh_00 = The wind smooths out into long sheets, but every orbit adds a faint, repeating wobble to the numbers. It's like listening to a far-off heartbeat through a very long radio delay.
        #GEPscience_bd_solarWind_RAB-58EInSpaceLow_00 = Near this lumpy little world, the solar wind is all sharp edges—bursts, gaps, and a spray of freshly knocked-off particles. For a moment, space looks less empty and more… dusty.
        #GEPscience_bd_solarWind_RAB-58EInSpaceHigh_00 = The detector records calm, thin flow interrupted by brief jolts when you cross invisible shadows and wakes. The red sun's "breeze" is patient, relentless, and not at all friendly.
        #GEPscience_bd_solarWind_CernunnosInSpaceLow_00 = The wind piles up, then snaps around Cernunnos like it's wrapping a stubborn rock in an electric scarf. Your probe rotates, the counter spikes, and everything feels very far away.
        #GEPscience_bd_solarWind_CernunnosInSpaceHigh_00 = Even this far out, the stream stays steady and mean, as if distance is just another number to it. Mission Control's response arrives late and somehow sounds smaller than usual.

        // bd_surveillance
        #GEPscience_bd_surveillance_GrannusInSpaceLowNorthPolarZone_00 = La telecamera prova a esporre per i "dettagli di superficie" e invece inventa diverse nuove sfumature di rosso. Il Controllo Missione raccomanda di non zoomare oltre.
        #GEPscience_bd_surveillance_GrannusInSpaceLowNorthSubpolarZone_00 = Nodi scuri di macchie stellari scorrono nel bagliore come lividi su una fornace. Le ottiche presentano un reclamo formale.
        #GEPscience_bd_surveillance_GrannusInSpaceLowNorthTemperateZone_00 = La trama chiazzata della stella sembra vernice in ebollizione vista attraverso una foschia di calore. Il downlink arriva abbastanza tardi da essere "filmato d'archivio".
        #GEPscience_bd_surveillance_GrannusInSpaceLowNorthTropicZone_00 = Una sottile fascia di turbolenza va a fuoco, poi esplode nel bianco. La etichetti "interessante" e "non fissare".
        #GEPscience_bd_surveillance_GrannusInSpaceLowEquatorialZone_00 = L'equatore è una cucitura irrequieta di tremolio e ombra. La tua foto di "ricognizione" è perlopiù icone di avvertimento.
        #GEPscience_bd_surveillance_GrannusInSpaceLowSouthTropicZone_00 = Un minuscolo brillamento graffia l'immagine e sparisce prima che la trasmissione si liberi. Quaggiù perfino le sorprese hanno lag.
        #GEPscience_bd_surveillance_GrannusInSpaceLowSouthTemperateZone_00 = Celle convettive si allineano come scaglie sotto un bagliore cremisi attenuato. Metà del team dà la colpa alla stella, metà al sensore.
        #GEPscience_bd_surveillance_GrannusInSpaceLowSouthSubpolarZone_00 = Il rumore di particelle cariche punteggia il fotogramma come sabbia su una lente. Il rapporto recita: "Ambiente ostile confermato."
        #GEPscience_bd_surveillance_GrannusInSpaceLowSouthPolarZone_00 = Tieni l'otturatore prudente e ottieni comunque una splendida strisciata rossa. Lo strumento lo registra come "SUCCESSO (più o meno)".
        #GEPscience_bd_surveillance_TaranisInSpaceLowMagmaSea_00 = Il mare di magma è così luminoso che sembra qualcuno abbia rovesciato il giorno sul lato notturno. Il pacchetto immagine viene marcato "CALDO" da tre sistemi diversi.
        #GEPscience_bd_surveillance_TaranisInSpaceLowMagmaShores_00 = Placche fessurate zatterano lungo rive incandescenti con un movimento lento e paziente. Non capisci se è geologia o la telecamera che sta sudando.
        #GEPscience_bd_surveillance_TaranisInSpaceLowScorchedLowlands_00 = I bassopiani sul lato illuminato tremolano come se stessero provando a diventare vapore. Il Controllo Missione chiede se il pianeta debba essere incandescente.
        #GEPscience_bd_surveillance_TaranisInSpaceLowMidlands_00 = Creste a lama proiettano ombre dure, ostili a lander e sentimenti. Le segni lo stesso: le mappe costano meno dei soccorsi.
        #GEPscience_bd_surveillance_TaranisInSpaceLowHighlands_00 = Colline pallide e fratturate si estendono come crosta cotta in forno. Qualcuno suggerisce "terreno color snack" e viene immediatamente silenziato in radio.
        #GEPscience_bd_surveillance_TaranisInSpaceLowDarkSideMidlands_00 = La notte eterna rende il contrasto calmo e i dettagli nitidi. L'unica cosa luminosa è il bordo rosso di controluce di Grannus.
        #GEPscience_bd_surveillance_TaranisInSpaceLowDarkSideHighlands_00 = Picchi neri stanno sotto la luce delle stelle come vetro rotto. La linea del terminatore sembra meno un'alba e più un'etichetta di pericolo.
        #GEPscience_bd_surveillance_TaranisInSpaceLowPoles_00 = Vicino ai poli, giorno e notte si stringono l'uno sull'altra. La "fascia che sembra sicura" è comunque attaccata a un pianeta molto poco sicuro.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani illuminati cuociono sotto un debole sole rosso e una foschia sottile che non nasconde nulla. Ogni cratere sembra giudicare la tua traiettoria.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowSunnyHighlands_00 = Colline illuminate brillano calde e secche, con ombre abbastanza affilate da tagliare in due un piano di atterraggio. Le archivi come "pericolo panoramico".
        #GEPscience_bd_surveillance_ToutatisInSpaceLowTransitionalLowlands_00 = Nella cintura del crepuscolo, le ombre si allungano per ere e la superficie sembra quasi negoziabile. La cerchi con un grosso punto interrogativo.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowTransitionalHighlands_00 = Le colline di transizione mostrano rossi cotti che sfumano in grigi freddi, come due mondi cuciti insieme. La cucitura è… inquietantemente ordinata.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowDarkSideLowlands_00 = I bacini del lato notturno raccolgono freddo e una foschia debole e ostinata vicino al suolo. La telecamera la chiama "atmosfera", molto piano.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowDarkSideHighlands_00 = Le colline del lato notturno sono quasi invisibili finché il controluce rosso non le aggancia. Sorvoli sagome e speri che i conti siano giusti.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowSoutheasternMountains_00 = Montagne frastagliate proiettano ombre seghettate lungo i pendii. Il team le soprannomina "Catena dei Denti" e smette di ridere in fretta.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowWesternMountains_00 = I picchi occidentali sembrano scorticati e affilati nonostante il quasi-vuoto. Qualcuno incolpa un "meteo misterioso" e viene silenziato di nuovo.
        #GEPscience_bd_surveillance_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne nella notte permanente si registrano appena, come contorni illuminati dalle stelle. La ricognizione somiglia molto a tirare a indovinare con un lungo ritardo.
        #GEPscience_bd_surveillance_NodensInSpaceLowSaltySeas_00 = Il mare lampeggia di un rame opaco sotto il sole rosso, spezzato da lenti vortici di salamoia più chiara. Il downlink arriva tardi, come se il pianeta si prendesse il suo tempo per farsi vedere.
        #GEPscience_bd_surveillance_NodensInSpaceLowSaltySeas_01 = Ampia acqua scura con striature pallide—correnti, schiuma, o la telecamera che litiga con la foschia. In ogni caso, da quassù sembra decisamente "bagnato".
        #GEPscience_bd_surveillance_NodensInSpaceLowFreshWater_00 = Le acque interne restano più scure e più calme, inghiottendo la luce debole invece di rifletterla. Segnali le rive come "interessanti" e "probabilmente non potabili senza modulistica".
        #GEPscience_bd_surveillance_NodensInSpaceLowFreshWater_01 = Sottili ombre di nubi scivolano sui laghi come mani lente sul vetro. Il lag delle comunicazioni trasforma il "monitoraggio in tempo reale" in "osservazione di storia recente".
        #GEPscience_bd_surveillance_NodensInSpaceLowShores_00 = Le coste disegnano curve pulite tra terra e acqua, con ombre lunghe e morbide nel crepuscolo rosso. Alcuni tratti sembrano abbastanza piatti da essere un sito di atterraggio.
        #GEPscience_bd_surveillance_NodensInSpaceLowShores_01 = Banchi di sabbia e insenature formano un merletto, mezzo nascosto dalla foschia. Marchi una larga lingua pallida come "forse avamposto", poi ricordi che esistono le maree.
        #GEPscience_bd_surveillance_NodensInSpaceLowTropicalLowlands_00 = I bassopiani sono ampie e dolcemente testurizzate, con nuvole sparse che rendono ogni ombra sospetta. Un tratto liscio viene etichettato "pista candidata", in attesa di "non essere in realtà una palude".
        #GEPscience_bd_surveillance_NodensInSpaceLowTropicalLowlands_01 = Pianure dai toni caldi scorrono sotto una luce debole, con cicatrici fluviali appena accennate come vecchi graffi. Se volessi costruire qualcosa qui, inizieresti trovando ciò che *non* si muove.
        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateLowlands_00 = Le pianure temperate mostrano confini netti tra suoli più scuri e piane più chiare, come se qualcuno avesse messo ordine nel terreno. Diverse aree sembrano comodamente in piano per un avamposto—comodamente, per Nodens.
        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateLowlands_01 = La luce è debole ma stabile, e il suolo si legge bene nei varchi della foschia. Scatti fotogrammi extra, perché "rilievo del sito" suona meglio di "tirare a indovinare".
        #GEPscience_bd_surveillance_NodensInSpaceLowTropicalMidlands_00 = Le pianure si increspano in basse creste e bacini poco profondi, proiettando lunghe ombre nel bagliore rosso. Qualunque cosa abbia inciso queste linee l'ha fatto con pazienza.
        #GEPscience_bd_surveillance_NodensInSpaceLowTropicalMidlands_01 = I varchi tra le nubi rivelano un terreno a macchie che sembra quasi familiare finché non noti che i colori sono tutti sbagliati. Zoomi e la telecamera ti ricorda cortesemente i limiti di risoluzione.
        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateMidlands_00 = Le pianure alternano rigonfiamenti ruvidi e panche più lisce, come terrazze naturali. Una panca sembra promettente per operazioni di superficie, ammesso che non siano solo "rocce che sembrano piatte".
        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateMidlands_01 = Una foschia sottile ammorbidisce la scena, ma le creste restano ben marcate. Il ritardo del segnale fa sembrare ogni nuova forma un "ritrovamento" che qualcun altro ha già avuto.
        #GEPscience_bd_surveillance_NodensInSpaceLowHighlands_00 = Le colline salgono in lastre fratturate, chiare sui bordi e scure nelle crepe. Il terreno sembra stabile, ma "stabile" può comunque voler dire "molto appuntito".
        #GEPscience_bd_surveillance_NodensInSpaceLowHighlands_01 = Vette e altopiani tagliano la foschia come isole in un oceano d'aria rosso. Un vasto altopiano guadagna un segno "avamposto?", seguito da un molto cauto "forse".
        #GEPscience_bd_surveillance_NodensInSpaceLowTundra_00 = La tundra si stende in grigi smorzati e rossi polverosi, con meno nubi e linee di vista più chiare. Ampie distese aperte sembrano invitanti—finché non ricordi quanto sei lontano da casa.
        #GEPscience_bd_surveillance_NodensInSpaceLowTundra_01 = Motivi sottili ondulano sul suolo, come linee di brina o segni di flusso essiccati. Proponi un sito di test d'atterraggio qui, soprattutto perché è l'opzione meno minacciosa alla vista.
        #GEPscience_bd_surveillance_NodensInSpaceLowIceCaps_00 = Le calotte riflettono un bagliore freddo e rosato, attraversato da fratture scure che sembrano scomodamente profonde. L'esposizione della telecamera finalmente sembra felice, il che ti rende sospettoso.
        #GEPscience_bd_surveillance_NodensInSpaceLowIceCaps_01 = Il ghiaccio brillante incontra il debole sole rosso e trasforma tutto il polo in un punto di riferimento luminoso. È bello nel senso "non provare a piantare un campo senza un piano".
        #GEPscience_bd_surveillance_BelisamaInSpaceLowFlats_00 = Ampie piane scorrono sotto l'obiettivo in un lento giorno rosso attenuato. Nodens resta sospeso nella stessa porzione di cielo, come se stesse tenendo il punteggio.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTropicalLowlands_00 = I bassopiani sembrano abbastanza lisci da cullarti nell'ottimismo—finché le ombre lunghe non rivelano ovunque sottili creste. Il ritardo fa sembrare ogni passaggio "in diretta" come déjà vu.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTemperateLowlands_00 = Tenui bande tonali suggeriscono regolite diversa o età diverse, ma nulla qui si legge come "semplice". Etichetti alcune macchie scure "forse interessanti, forse solo rumore di camera".
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure corrugate formano archi sinuosi, come se la superficie avesse provato a ripiegarsi con ordine e avesse fallito. Le immagini arrivano con una lieve dominante rossa che non somiglia mai davvero al giorno.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTemperateMidlands_00 = Terreno spezzato e bacini poco profondi disegnano un motivo ordinato che sembra ingegnerizzato—finché non zoomi e ricordi che la natura fa anche spigoli vivi. La luce riflessa da Nodens aggiunge un secondo "sole" fantasma.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowHighlands_00 = Le colline si alzano come incudini fredde, le creste catturano il più debole bagliore di Grannus. Anche dall'orbita, il paesaggio sembra… vigile.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowPoles_00 = Le regioni polari sfumano tra luce e ombra di lunga durata, come se giorno e notte non trovassero un accordo sul calendario. Il Controllo Missione chiede altri fotogrammi, la risposta arriva a passaggio finito.
        #GEPscience_bd_surveillance_SucellusInSpaceLowBasins_00 = I bacini giacciono come ciotole scavate, scuri e silenziosi sotto il sole rosso. Alcuni punti luccicano in modo strano e il team inizia subito a litigare tra "metallo" e "artefatti di compressione".
        #GEPscience_bd_surveillance_SucellusInSpaceLowLowlands_00 = I bassopiani mostrano pianure ampie, che sulla mappa sembrano persino navigabili. Nei frame grezzi, ogni zona "liscia" risulta invece testurizzata da piccoli, appuntiti guai.
        #GEPscience_bd_surveillance_SucellusInSpaceLowTropicalMidlands_00 = Creste di pianure corrono in catene spezzate, proiettando ombre troppo lunghe per un mondo così piccolo. La luce debole fa sembrare il terreno più lontano di quanto già sia.
        #GEPscience_bd_surveillance_SucellusInSpaceLowTemperateMidlands_00 = Sottili cambi di colore attraversano le pianure come macchie minerali. Le note dicono: "Possibile segnale di risorsa. Fiducia: media. Ansia: alta."
        #GEPscience_bd_surveillance_SucellusInSpaceLowHighlands_00 = Colline pallide catturano il minimo bagliore e sembrano quasi lucidate. Se questo mondo nano è davvero ricco, sta nascondendo la sua ricchezza sotto una superficie molto poco amichevole.
        #GEPscience_bd_surveillance_SucellusInSpaceLowPoles_00 = I poli sono spogli, con avvallamenti in ombra che si rifiutano di mostrare il fondo. Li etichetti "sconosciuti" e senti la distanza da Kerbin nelle ossa.
        #GEPscience_bd_surveillance_CaireenInSpaceLowLowlands_00 = I "bassopiani di Caireen sono solo punti in cui la roccia rientra e finge di essere un paesaggio. L'intera luna sembra catturata a metà capriola e invitata a comportarsi bene.
        #GEPscience_bd_surveillance_CaireenInSpaceLowMidlands_00 = Le pianure sono un caos di pendii e faccette, illuminato da un debole giorno rosso e da un forte senso di "non atterrare". La funzione migliore della telecamera è farti apprezzare la gravità stabile.
        #GEPscience_bd_surveillance_CaireenInSpaceLowHighlands_00 = Punte frastagliate si stagliano contro lo spazio, più asteroide che luna. Sucellus incombe lì vicino, abbastanza vicino da sembrare un soffitto.
        #GEPscience_bd_surveillance_CaireenInSpaceLowPoles_00 = Ai poli, l'illuminazione diventa un duro testa-o-croce tra abbaglio e nero. La ricognizione conclude: "Sì, è ancora una roccia catturata e irregolare. No, non è diventata più amichevole."
        #GEPscience_bd_surveillance_SironaInSpaceLowDarkTropicalBands_00 = Le bande scure si avvolgono sotto di te come fumo lento in una stanza illuminata di rosso. Il ricevitore insiste che questo è "ricognizione", non "fissare il meteo".
        #GEPscience_bd_surveillance_SironaInSpaceLowLightTropicalBands_00 = Le fasce più chiare brillano di un debole cremisi riflesso, ammorbidendo ogni ombra. Alcuni fotogrammi arrivano con tanto ritardo da contare come "la tempesta di ieri".
        #GEPscience_bd_surveillance_SironaInSpaceLowDarkTemperateBands_00 = Un'ampia corsia scura mostra increspature e gorghi che non corrispondono all'ultimo passaggio—o almeno, non all'ultimo passaggio che hai già ricevuto. Il ritardo delle comunicazioni fa sembrare l'atmosfera ancora più viva.
        #GEPscience_bd_surveillance_SironaInSpaceLowLightTemperateBands_00 = Le sommità delle nubi pallide sembrano ingannevolmente calme finché non noti le linee di shear. La stabilizzazione della camera si arrende e lo definisce "dinamico".
        #GEPscience_bd_surveillance_SironaInSpaceLowDarkPolarBands_00 = L'oscurità polare è spezzata da lievi sfarfallii luminosi che potrebbero essere aurore o rumore del sensore. In ogni caso, gli strumenti sembrano nervosi.
        #GEPscience_bd_surveillance_SironaInSpaceLowLightPolarBands_00 = Il polo brilla soffusamente, come brina sotto una lampada rossa fioca. L'alta atmosfera di Sirona si fa il suo meteo—tu devi solo sbattere le palpebre per primo.
        #GEPscience_bd_surveillance_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani tropicali si stendono in toni polverosi, tagliate da cicatrici che nella luce dura sembrano fresche. Sirona incombe lì vicino, ricordando a tutti che la "radiazione locale" è una caratteristica.
        #GEPscience_bd_surveillance_AirmedInSpaceLowTemperateLowlands_00 = Ampie piane e bacini poco profondi suggeriscono percorsi che un rover potrebbe anche sopravvivere. Le ombre lunghe sotto la luce di Grannus rendono sospetto ogni "tratto liscio".
        #GEPscience_bd_surveillance_AirmedInSpaceLowTropicalMidlands_00 = Le creste delle pianure formano catene spezzate che prendono il sole rosso da un lato e diventano nero inchiostro dall'altro. Gli artefatti di compressione sembrano quasi crateri extra.
        #GEPscience_bd_surveillance_AirmedInSpaceLowTemperateMidlands_00 = Le pianure mostrano un confine enigmatico tra due tonalità di superficie, come se la luna non sapesse scegliere una palette. Il Controllo Missione propone di dare un nome alle due metà, la Scienza propone di non affezionarsi.
        #GEPscience_bd_surveillance_AirmedInSpaceLowHighlands_00 = Le creste delle colline sono affilate e fittamente craterizzate, come se la luna avesse perso una discussione con i detriti. Anche dall'orbita il messaggio è: "atterra con cautela, se proprio".
        #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani scurite bevono la luce debole e non restituiscono quasi nulla. Le impostazioni "visione notturna" non sono divertite.
        #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedMidlands_00 = Il terreno scuro delle pianure fa sparire le linee di cresta finché l'angolo non è quello giusto. Nota di ricognizione: "fiducia nel sito d'atterraggio: bassa, mistero: alto".
        #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedHighlands_00 = Le colline scurite sembrano scorie raffreddate sotto un sole rosso, fratturate e poco ospitali. La telecamera registra una silhouette perfetta di Sirona sullo sfondo, giusto per fare la drammatica.
        #GEPscience_bd_surveillance_AirmedInSpaceLowPoles_00 = Ai poli, la luce diventa un duro testa-o-croce tra abbaglio e ombra. I fotogrammi migliori arrivano a passaggio finito, perché la distanza qui è un hobby.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalCraquelure_00 = La superficie è una rete di crepe e placche, come se il suolo si fosse raffreddato troppo in fretta e non l'avesse mai perdonata. Un'atmosfera sottile sfuma i bordi quel tanto che basta per essere inquietante.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateCraquelure_00 = I motivi di craquelure si estendono per chilometri in una geometria ordinata e ripetuta. Per un attimo sospetti ingegneria, poi ricordi che anche la natura ama mettersi in mostra.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani appaiono più lisce, con pendii dolci che potrebbero sostenere operazioni di superficie. La foschia trasforma l'orizzonte in un morbido gradiente rosso che sembra lontanissimo da casa.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateLowlands_00 = Ampie pianure scorrono sotto una luce fioca, spezzate da striature più scure che potrebbero essere depositi o solo ombre che si rifiutano di comportarsi. Il downlink arriva con un lieve odore di metano. (Non davvero.)
        #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalMidlands_00 = Le pianure si alzano in creste smorzate, con ombre allungate dal sole debole. Segni alcuni bacini riparati come "siti possibili", poi sottolinei "condizioni del suolo sconosciute".
        #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateMidlands_00 = Il contrasto del terreno si accentua man mano che l'aria si assottiglia con la quota, rivelando sottili stratificazioni. La camera continua ad auto-focheggiare la foschia come se stesse cercando di farci amicizia.
        #GEPscience_bd_surveillance_BorvoInSpaceLowHighlands_00 = Le colline emergono sopra la foschia, chiare e nitide contro un cielo illuminato di rosso. Per un attimo sembra quasi avvicinabile—poi entra in scena un campo di crateri.
        #GEPscience_bd_surveillance_BorvoInSpaceLowMajorCraters_00 = I crateri maggiori mordono la crosta con terrazze e ventagli di ejecta, tutto ammorbidito dal velo atmosferico. La storia degli impatti si legge come un lungo, lento avvertimento.
        #GEPscience_bd_surveillance_BorvoInSpaceLowPoles_00 = Le regioni polari svaniscono in una foschia pallida e un terreno a basso contrasto. Navigazione lo chiama "povero di dettagli", che è codice per "non fidarti della mappa".
        #GEPscience_bd_surveillance_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani di Damona sono grigie, polverose e fittamente craterizzate, senza alcun segno di qualcosa che ti voglia lì. Il sole rosso fa sembrare l'intero mondo sotto illuminazione d'emergenza.
        #GEPscience_bd_surveillance_DamonaInSpaceLowTemperateLowlands_00 = Bacini poco profondi e lievi ondulazioni passano sotto l'obiettivo con una somiglianza inquietante. È facile perdere la scala finché non scivola via un cratere grande quanto una città.
        #GEPscience_bd_surveillance_DamonaInSpaceLowTropicalMidlands_00 = Le creste delle pianure proiettano ombre dure che non cambiano molto tra i fotogrammi—perché i tuoi fotogrammi sono minuti indietro rispetto alla realtà. Qui il controllo remoto sembra ancora più remoto.
        #GEPscience_bd_surveillance_DamonaInSpaceLowTemperateMidlands_00 = Le pianure mostrano deboli striature e solchi che potrebbero essere flussi antichi o ejecta. Le note finiscono con: "In ogni caso, servono gambe d'atterraggio più robuste."
        #GEPscience_bd_surveillance_DamonaInSpaceLowHighlands_00 = Colline luminose formano placche spezzate, sbeccate e dall'aria gelida. Il bagliore lontano di Sirona disegna l'orizzonte come una tenue luce di contorno.
        #GEPscience_bd_surveillance_DamonaInSpaceLowImpactBasin_00 = Il bacino d'impatto domina la vista—pareti terrazzate, sollevamento centrale e detriti disposti come un diagramma forense. È il tipo di riferimento con cui puoi navigare anche con un lungo ritardo nelle comunicazioni.
        #GEPscience_bd_surveillance_DamonaInSpaceLowPoles_00 = I poli restano in un'ostinata alternanza di ombra e debole abbaglio, rivelando quel tanto di texture da risultare minacciosi. La ricognizione conclude: "Sì, è ancora lì. No, non sta diventando più amichevole."
        #GEPscience_bd_surveillance_EponaInSpaceLowTropicalLowlands_00 = Sotto la luce rossa e fioca di Grannus, i bassopiani tropicali sono comunque pallidi e freddi, con ampie distese smorzate da una foschia sottile. L'immagine sembra un inverno che ha dimenticato cosa significhi "estate".
        #GEPscience_bd_surveillance_EponaInSpaceLowTemperateLowlands_00 = Bacini lisci scorrono via in fotogrammi lenti e in ritardo, con ombre allungate da una luce debole. Segni qualche area come "forse in piano", poi ti ricordi che il ghiaccio sa mentire.
        #GEPscience_bd_surveillance_EponaInSpaceLowTropicalUplands_00 = Gli altopiani mostrano creste scolpite dal vento e sottili strisce tonali, come se l'atmosfera stesse carteggiando la superficie un granello alla volta. La camera continua a tentare di mettere a fuoco la foschia come se fosse lei la protagonista.
        #GEPscience_bd_surveillance_EponaInSpaceLowTemperateUplands_00 = Gli altopiani si spezzano in placche più ruvide con cuciture scure che potrebbero essere fratture o roccia affiorante. Nota di ricognizione: "texture interessanti, quantità di mistero poco confortevoli".
        #GEPscience_bd_surveillance_EponaInSpaceLowHighlands_00 = I versanti delle colline appaiono e scompaiono sotto veli sottili di nubi, rivelando un mondo grande, freddo e fin troppo silenzioso. Anche il ritardo del downlink sembra più lungo sopra queste cime vuote.
        #GEPscience_bd_surveillance_EponaInSpaceLowGrandPeaks_00 = Le Grandi Vette bucano la foschia e catturano un tenue bordo cremisi, tagliente contro un cielo scuro. Sembrano ottimi riferimenti e posti pessimi in cui avere un problema.
        #GEPscience_bd_surveillance_EponaInSpaceLowCraters_00 = I crateri punteggiano il ghiaccio come lividi, con ejecta più scura che macchia la crosta pallida. Alcuni bordi sembrano sospettosamente addolciti, come se Epona stesse ancora provando a guarire.
        #GEPscience_bd_surveillance_EponaInSpaceLowVolcanoes_00 = I vulcani mostrano sfiati più scuri e deboli striature simili a pennacchi che non corrispondono al gelo circostante. Archivi le immagini come "possibile calore rilevato" e "per favore tenersi a distanza".
        #GEPscience_bd_surveillance_EponaInSpaceLowPoles_00 = Verso i poli, la luce diventa un crepuscolo perpetuo e una foschia con sfumature di metano appiattisce l'orizzonte. Il terreno sembra calmo nello stesso modo in cui sembra calmo un congelatore.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTropicalLowlands_00 = I bassopiani di Rosmerta sono senz'aria e brutalmente nitidi, con ombre che sembrano dipinte. Epona incombe lì vicino, facendo sembrare questa piccola luna solitaria ancora più piccola.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTemperateLowlands_00 = Pianure apparentemente lisce si risolvono in detriti quando zoomi—ovviamente. I fotogrammi arrivano in ritardo, come se Rosmerta fosse riluttante a farsi notare.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTropicalMidlands_00 = Le creste delle pianure corrono in linee spezzate, proiettando lunghi tagli neri sotto il sole rosso. Il dosimetro brontola piano sullo sfondo.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTemperateMidlands_00 = Sottili chiazze di albedo punteggiano le pianure come farina versata su carbone. La ricognizione conclude: "senz'aria, fredda e non interessata ai visitatori".
        #GEPscience_bd_surveillance_RosmertaInSpaceLowHighlands_00 = Le colline sono frastagliate e molto craterizzate, con i bordi che catturano un lieve riflesso cremisi. Sarebbero un'ottima scenografia per un dépliant di avamposto che nessuno leggerà mai.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowPoles_00 = Il terreno polare sta metà in abbaglio e metà in un'ombra ostinata, senza atmosfera a smussare la divisione. La camera lo etichetta "alto contrasto", l'equipaggio lo etichetta "molto scortese".
        #GEPscience_bd_surveillance_RAB-58EInSpaceLowLowlands_00 = I "bassopiani" sono solo le parti più piatte di un piccolo grumo dall'aria catturata, illuminato in modo irregolare mentre ruota. Ogni passaggio sembra osservare un oggetto diverso, perché gli angoli non si ripetono mai nello stesso modo.
        #GEPscience_bd_surveillance_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali salgono in faccette taglienti e pozzi scuri, come una roccia assemblata con avanzi. Il segnale in ritardo rende il rotolamento più lento, ma non più amichevole.
        #GEPscience_bd_surveillance_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali mostrano cicatrici più chiare e cuciture più scure che potrebbero essere vecchie fratture o depositi esotici. Annoti: "origine sconosciuta", e per una volta il rapporto suona onesto.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTropicalLowlands_00 = I bassopiani di Cernunnos sono pallidi e immobili, una pianura ghiacciata sotto un sole che a malapena si decide a fare giorno. Il vuoto è impressionante, in modo lievemente inquietante.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTemperateLowlands_00 = Terreni a basso rilievo si estendono con deboli striature e bacini poco profondi, come un mondo rimasto senza energia a metà scultura. Il lungo ritardo nelle comunicazioni fa sembrare il "monitoraggio" archeologia.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure si increspano in creste gentili e cavità in ombra, con un contrasto duro senza alcuna atmosfera. La camera cattura qualche luccichio che potrebbe essere brina—o pensiero desiderante.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTemperateMidlands_00 = Le pianure mostrano toni stratificati che suggeriscono vecchi depositi, esposti da impatti e tempo. Le segni per un follow-up, ammesso che qui qualcosa possa essere "seguito" in fretta.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowHighlands_00 = Le colline emergono come porcellana scheggiata, luminose dove arriva la debole luce rossa e nere pece dove non arriva. È un paesaggio costruito interamente di "prudenza".
        #GEPscience_bd_surveillance_CernunnosInSpaceLowSouthPolarHills_00 = Le colline del polo sud proiettano ombre lunghe e lente che quasi non si muovono da un passaggio all'altro. Il sole è così fioco che inizi a misurare la luce come se fosse una risorsa consumabile.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowNorthPole_00 = Il polo nord è una distesa netta di brina e buio, senza segni di altro che geometria fredda. Non riesci a scrollarti di dosso l'impressione che Cernunnos non sia solo quassù—è solo silenzioso.

        // bd_TrappedRadiation
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceLow_00 = Il rivelatore va subito in saturazione, lo retrai in fretta e registri la forma di una cintura rovente che si aggrappa alle linee di campo di Grannus sotto quel bagliore rosso e fioco.
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceLow_01 = Le particelle intrappolate schizzano a livelli tali da far sembrare il cicalino d'allarme… solo. Anche sotto quella luce rossa smorzata, Grannus sembra ancora molto, molto sveglio.
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceHigh_00 = Le cinture si assottigliano con la quota, ma non scompaiono mai davvero. La risposta del Controllo Missione arriva tardi e dice: "Sì, è ancora radiazione."
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceHigh_01 = Anche quassù i contatori non smettono mai di gracchiare. I bordi della cintura increspano come una tempesta, e il pacchetto dati in ritardo arriva solo per dirti di smettere di fissarlo.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceLow_00 = La radiazione schizza a ogni passaggio sopra l'emisfero cotto, ma nulla resta intrappolato—Taranis ha a malapena un campo per trattenerla.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceLow_01 = Continui ad aspettarti una piccola cintura ordinata, ma le letture sono soprattutto una tempesta di particelle urlante e un forte desiderio di andartene. Taranis non offre riparo—solo velocità.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceHigh_00 = Più in alto il flusso si "smorza" un po', che è un modo elegante per dire "ancora male, solo meno emozionante". Lo strumento registra comunque, perché non sa sussultare.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceHigh_01 = Il grafico sembra più un "bollettino meteo" di particelle che una mappa di cinture: tutto scorre via e sparisce, lasciando solo una foschia sottile e ostinata.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceLow_00 = Compare una cintura sottile e sbilenca, più forte sul lato caldo, sembra che qualcuno abbia assemblato una magnetosfera con pezzi di ricambio.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceLow_01 = Una cintura debole e asimmetrica appare come se il sole rosso la stesse spingendo in giro. L'aria rarefatta sotto sembra limitarsi a guardarti mentre incassi il colpo.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceHigh_00 = La radiazione intrappolata sfuma in una foschia ampia, con sporadiche impennate che non corrispondono a nessuna teoria bella rotonda. Etichetti il file "probabilmente ok" e ricontrolli la schermatura.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceHigh_01 = Più in alto, la popolazione intrappolata si dirada in archi discontinui. Il Controllo Missione chiede più dati, la tua risposta arriva tardi e leggermente abbrustolita.
        #GEPscience_bd_TrappedRadiation_NodensInSpaceLow_00 = Compare una firma magnetosferica ordinata, quasi rassicurante—finché non ricordi quanto lontano debba viaggiare il segnale per tornare a casa. Le cinture sembrano stabili, come se Nodens stesse provando a tranquillizzarti.
        #GEPscience_bd_TrappedRadiation_NodensInSpaceHigh_00 = A questa quota i conteggi scendono verso il fondo, e il silenzio sembra insolito. Inizi quasi a rimpiangere il suono di una conferma in tempo reale.
        #GEPscience_bd_TrappedRadiation_BelisamaInSpaceLow_00 = Il pattern di radiazione è disomogeneo e stirato fuori forma, come se Nodens si prendesse silenziosamente il merito di gran parte della protezione. I numeri salgono e scendono come se la luna respirasse nell'ombra magnetica di qualcun altro.
        #GEPscience_bd_TrappedRadiation_BelisamaInSpaceHigh_00 = Quassù il contributo di Belisama diventa difficile da separare dall'influenza di Nodens. Lo strumento, con cortesia, riporta: "È complicato."
        #GEPscience_bd_TrappedRadiation_SucellusInSpaceLow_00 = Non si formano cinture forti, ma la dose resta comunque ostinatamente alta. Il rivelatore registra "intrappolata" tra virgolette e con un lungo beep accusatorio.
        #GEPscience_bd_TrappedRadiation_SucellusInSpaceHigh_00 = L'ambiente si uniforma in una pioggerellina costante di particelle energetiche. È quel tipo di calma che richiede comunque un grembiule di piombo.
        #GEPscience_bd_TrappedRadiation_CaireenInSpaceLow_00 = Le letture saltano a raffiche brevi, come una roccia catturata che prende schiaffi da campi invisibili che non ha mai chiesto. Per un attimo valuti di catturare i dati più in fretta di quanto catturino te.
        #GEPscience_bd_TrappedRadiation_CaireenInSpaceHigh_00 = Per lo più fondo… finché un picco improvviso non ti ricorda che "per lo più" non è la stessa cosa di "sicuro". La nota di bordo è sbavata dove hai stretto la penna troppo forte.
        #GEPscience_bd_TrappedRadiation_SironaInSpaceLow_00 = Il rivelatore si pente subito di essere stato esteso. Le cinture di Sirona sono dense, stratificate e frenetiche—come se qualcuno avesse trasformato il sole rosso e fioco in un acceleratore di particelle.
        #GEPscience_bd_TrappedRadiation_SironaInSpaceHigh_00 = Più in alto le cinture si diradano in archi ampi che continuano comunque a martellare i contatori. La mappa impiega un'eternità a trasmettersi, soprattutto perché è molto grande e molto allarmante.
        #GEPscience_bd_TrappedRadiation_AirmedInSpaceLow_00 = Airmed non ha un campo proprio, ma Sirona fornisce più che abbastanza radiazione "condivisa". Le letture salgono e scendono mentre la superficie malconcia e bicolore scorre sotto di te.
        #GEPscience_bd_TrappedRadiation_AirmedInSpaceHigh_00 = Sali cercando sicurezza e scopri la definizione di "relativa". Il fondo è ancora l'ambiente di cinture di Sirona, solo con meno momenti che fanno strillare lo strumento.
        #GEPscience_bd_TrappedRadiation_BorvoInSpaceLow_00 = Il campo di Borvo sembra raccogliere una modesta cintura sopra la pioggia costante di particelle di Sirona. L'alta atmosfera sfarfalla appena mentre i grafici cercano di decidere cosa stanno vedendo.
        #GEPscience_bd_TrappedRadiation_BorvoInSpaceHigh_00 = In quota, la popolazione intrappolata di Borvo si risolve in anelli ordinati, sorprendentemente ben educati per essere così lontano da casa. L'influenza di Sirona è ancora lì, incombente come un secondo dataset che non puoi cancellare.
        #GEPscience_bd_TrappedRadiation_DamonaInSpaceLow_00 = Non si forma nessuna cintura—solo un lavaggio aspro di particelle e qualche picco secco mentre passi sopra la cicatrice prominente di Damona. La piccola luna grigia non offre protezione e molta attitudine.
        #GEPscience_bd_TrappedRadiation_DamonaInSpaceHigh_00 = Fuori dal peggio, i conteggi scendono verso il "solo sgradevole", poi saltano senza preavviso nella coda lontana di Sirona. Il log annota un lungo ritardo nelle comunicazioni e un sospiro ancora più lungo.
        #GEPscience_bd_TrappedRadiation_EponaInSpaceLow_00 = Il rivelatore entra in un ritmo costante e inquieto—il debole campo di Epona raccoglie una cintura tenue, quanto basta per farti apprezzare il lungo ritardo di trasmissione.
        #GEPscience_bd_TrappedRadiation_EponaInSpaceHigh_00 = Più in alto, la "cintura" si assottiglia in una foschia ampia che deriva con il "meteo" di particelle della nana rossa. Non è intensa, ma è persistente.
        #GEPscience_bd_TrappedRadiation_RosmertaInSpaceLow_00 = Attorno a Rosmerta non si forma alcuna cintura intrappolata, le letture sono solo un lavaggio ambientale aspro che filtra dal vicinato di Epona. La luna non offre riparo né scuse.
        #GEPscience_bd_TrappedRadiation_RosmertaInSpaceHigh_00 = I conteggi calano con la quota, poi impennano quando attraversi un confine invisibile che non avevi pianificato. Lo etichetti "influenza di Epona" e fai finta che questo lo spieghi.
        #GEPscience_bd_TrappedRadiation_RAB-58EInSpaceLow_00 = Lo strumento non trova nulla da "intrappolare", solo brevi raffiche mentre il piccolo corpo rotola in correnti cariche. È come misurare una tempesta reggendo un cucchiaio.
        #GEPscience_bd_TrappedRadiation_RAB-58EInSpaceHigh_00 = Più lontano, l'ambiente si stabilizza in una pioggerellina sottile di particelle energetiche. Il grafico sembra calmo, il che è sospetto così lontano da casa.
        #GEPscience_bd_TrappedRadiation_CernunnosInSpaceLow_00 = Non compaiono cinture, Cernunnos sembra magneticamente quieto, e il rivelatore deve impegnarsi per trovare qualcosa che valga la pena tracciare. Il silenzio sembra più forte sotto il bagliore rosso e fioco.
        #GEPscience_bd_TrappedRadiation_CernunnosInSpaceHigh_00 = Dominano i livelli di fondo, con solo sporadici sfarfallii dal sistema più ampio. Il Controllo Missione chiede se è "sicuro", tu rispondi "più sicuro della maggior parte", ore dopo.

        // bd_UVscope
        #GEPscience_bd_UVscope_GrannusInSpace_00 = Le emissioni UV schizzano e danzano sul disco. Etichetti il pattern "glitter arrabbiato" per il bene del team divulgazione.
        #GEPscience_bd_UVscope_GrannusInSpace_01 = Riprendi un flare con dettagli squisiti e ti penti subito di ogni cavo non schermato sulla navicella.
        #GEPscience_bd_UVscope_GrannusInSpace_02 = La camera UV va in saturazione così forte da inventare, di fatto, un nuovo colore: "no."
        #GEPscience_bd_UVscope_GrannusInSpaceLow_00 = Il telescopio UV guarda oltre il bagliore rossastro di Grannus e trova linee sottili e nette nel buio tra le stelle. I dati impiegano un'eternità a gocciolare verso casa.
        #GEPscience_bd_UVscope_GrannusInSpaceHigh_00 = Da molto sopra il sole rosso e fioco, lo spettro mostra nodi caldi di luce ultravioletta dove ti aspettavi solo vuoto. Il Controllo Missione lo archivia sotto "poco rassicurante".
        #GEPscience_bd_UVscope_TaranisInSpaceLow_00 = Usi il lato notturno congelato di Taranis come ombra comoda e tiri fuori deboli assorbimenti UV dalla sottile roba tra i mondi.
        #GEPscience_bd_UVscope_TaranisInSpaceHigh_00 = A questa quota Taranis è solo una piccola moneta divisa tra bagliore e buio, eppure le linee UV insistono: là fuori c'è qualcosa di molto, molto caldo.
        #GEPscience_bd_UVscope_ToutatisInSpaceLow_00 = Un passaggio radente sul bordo di Toutatis lascia impronte UV sottili della sua aria tenue, suggerendo forti sbalzi di temperatura vicino alla fascia del crepuscolo.
        #GEPscience_bd_UVscope_ToutatisInSpaceHigh_00 = Con Toutatis che ruota sotto come un cartello d'avvertimento mezzo illuminato, il telescopio coglie un compagno caldo nascosto nel bagliore di una stella più fredda. È parecchio vuoto da condividere in un'orbita.
        #GEPscience_bd_UVscope_NodensInSpaceLow_00 = Il telescopio UV coglie l'alta foschia di Nodens che brilla in linee ostinate, come se l'aria si stesse impegnando moltissimo per farsi notare.
        #GEPscience_bd_UVscope_NodensInSpaceHigh_00 = Molto sopra Nodens, lo spettro diventa un codice a barre freddo di assorbimento interstellare e sorgenti calde lontane, il downlink arriva come un messaggio della settimana scorsa.
        #GEPscience_bd_UVscope_BelisamaInSpaceLow_00 = Usi il lato notturno di Belisama come ombra perfetta e tiri fuori deboli firme UV dallo spazio tra i mondi. Sembra comunque di fissare il cielo di qualcun altro.
        #GEPscience_bd_UVscope_BelisamaInSpaceHigh_00 = Dall'alta orbita, Belisama è un puntino scuro e il telescopio UV trova più "azione" nel plasma e nella polvere circostanti che sulla luna stessa. Sembra ingiusto.
        #GEPscience_bd_UVscope_SucellusInSpaceLow_00 = Le immagini UV evidenziano chiazze pallide e nette su Sucellus che non corrispondono a nulla nel visibile—brina fresca, minerali strani, o semplicemente l'universo di nuovo riservato.
        #GEPscience_bd_UVscope_SucellusInSpaceHigh_00 = Lo strumento aggancia bersagli lontani e registra linee UV nitide mentre Sucellus scorre sotto come un waypoint dimenticato sotto un sole rosso e fioco.
        #GEPscience_bd_UVscope_CaireenInSpaceLow_00 = Il telescopio UV osserva una stella di fondo sfiorare l'occultazione dietro la minuscola Caireen e lo spettro sobbalza per un velo di particelle sottile come un sussurro. Fai finta che sia normale.
        #GEPscience_bd_UVscope_CaireenInSpaceHigh_00 = Da molto lontano, Caireen è appena un puntino, ma il telescopio trova comunque compagni caldi e nodi ultravioletti nel campo profondo. Il vuoto intorno sembra molto intenzionale.
        #GEPscience_bd_UVscope_SironaInSpaceLow_00 = L'alta atmosfera di Sirona si accende in bande ultraviolette, tracciando tende aurorali feroci e chimica calda e arrabbiata in cui preferiresti non volare.
        #GEPscience_bd_UVscope_SironaInSpaceHigh_00 = Dall'alta orbita, il telescopio UV mappa un bagliore vasto e distorto attorno a Sirona—più magnetosfera che pianeta—mentre il pacchetto dati striscia verso casa sotto il sole rosso e fioco.
        #GEPscience_bd_UVscope_AirmedInSpaceLow_00 = La superficie bicolore di Airmed riflette UV a chiazze diseguali, come se qualcuno avesse dipinto la regolite con regole diverse e si fosse dimenticato di lasciare un'etichetta.
        #GEPscience_bd_UVscope_AirmedInSpaceHigh_00 = Con Airmed ridotta a un sassolino segnato di cicatrici, le linee UV di una stella di fondo sobbalzano durante l'occultazione—solo un sussurro di atomi sputterizzati aggrappati al vuoto.
        #GEPscience_bd_UVscope_BorvoInSpaceLow_00 = L'aria sottile di Borvo timbra lo spettro con firme di assorbimento fredde, le linee del metano ci sono, ma non si comportano proprio come promettevano i modelli.
        #GEPscience_bd_UVscope_BorvoInSpaceHigh_00 = Le scansioni al bordo mostrano un debole bagliore UV sopra il terminatore di Borvo, suggerendo foschia d'alta quota e aurore deboli in un cielo che non sembra mai familiare.
        #GEPscience_bd_UVscope_DamonaInSpaceLow_00 = La superficie gelida di Damona dà una curva di riflettanza UV "dura" con strani piccoli rigonfiamenti—minerali esotici, brina fresca, o l'universo che si rifiuta di semplificare.
        #GEPscience_bd_UVscope_DamonaInSpaceHigh_00 = Da lontano, Damona sparisce nel buio e il telescopio UV torna al lavoro in campo profondo, tirando fuori la firma di un compagno caldo da dietro il bagliore di una stella più fredda.
        #GEPscience_bd_UVscope_EponaInSpaceLow_00 = Una scansione al bordo di Epona mostra un debole airglow UV e alcune linee di assorbimento ostinate. Lo spettro dice "chimica alta e calda", mentre il downlink dice "attendere prego".
        #GEPscience_bd_UVscope_EponaInSpaceHigh_00 = Con Epona come schermo scuro, la luce stellare di fondo diventa un codice a barre UV nitido della sottile roba interstellare. Qualcosa di caldo sfarfalla nel bagliore dove non dovrebbe proprio.
        #GEPscience_bd_UVscope_RosmertaInSpaceLow_00 = La superficie di Rosmerta sembra banale nel visibile, ma l'UV disegna confini netti tra brine e granuli più scuri. Lo registri come "differenze di composizione" e ti senti molto lontano mentre lo fai.
        #GEPscience_bd_UVscope_RosmertaInSpaceHigh_00 = Da molto sopra Rosmerta, guardi una stella scivolare dietro di lei e cerchi eventuali "morsi" UV di una esosfera sottile come un sussurro. Se c'è qualcosa, è estremamente educata nel farsi vedere.
        #GEPscience_bd_UVscope_RAB-58EInSpaceLow_00 = La riflettanza UV su RAB-58E salta tra chiazze stranamente brillanti e stranamente opache, come se la regolite non fosse d'accordo su cosa sia fatta. Il telescopio ipotizza esposizione recente o minerali strani, tu proponi di non toccare.
        #GEPscience_bd_UVscope_RAB-58EInSpaceHigh_00 = Puntato verso l'esterno, le linee UV restano stabili finché compaiono brevi picchi—polvere carica, particelle vaganti, o l'universo che si schiarisce la gola. Il segnale arriva abbastanza tardi da essere una sorpresa due volte.
        #GEPscience_bd_UVscope_CernunnosInSpaceLow_00 = Sul terminatore di Cernunnos, il telescopio UV coglie un alone sottile di bagliore e assorbimento che suggerisce volatili freddi rimescolati da particelle energetiche. È una firma delicata in un cielo molto poco ospitale.
        #GEPscience_bd_UVscope_CernunnosInSpaceHigh_00 = L'alta orbita trasforma Cernunnos in un punto di riferimento fioco mentre lo strumento caccia sorgenti UV calde e compagni nascosti nella luce stellare lontana. Il vuoto tra le linee sembra più grande dello schermo.

        // bd_UVspec
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthPolarZone_00 = Lo spettro UV a questa latitudine è intrecciato di picchi di emissione nervosi, come se Grannus crepitasse silenziosamente ai bordi. I dati ci mettono un po' ad arrivare a casa e, stranamente, questo li fa sembrare più rumorosi.
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthSubpolarZone_00 = Una sottile foresta di righe ultraviolette sale e scende mentre segui il lembo, suggerendo strati turbolenti che di certo non avevi messo in valigia. Controllo Missione chiede di smetterla di chiamarli "spaghetti piccanti".
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthTemperateZone_00 = Lo strumento risolve ampie bande di assorbimento e poi litiga subito con sé stesso sulla linea di base. Salvi il file come "Grannus_is_red_okay" per una futura riconciliazione scientifica.
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthTropicZone_00 = L'emissione UV si intensifica a scatti che non corrispondono ai tuoi riferimenti temporali, come se Grannus seguisse un programma tutto suo. Aggiungi una nota: "possibili capricci di microbrillamenti".
        #GEPscience_bd_UVspec_GrannusInSpaceLowEquatorialZone_00 = La scansione equatoriale mostra un bagliore ultravioletta più forte del previsto sotto un sole rosso e fioco, e la cosa sembra ingiusta. Lo spettrometro insiste che ai fotoni non importa del tuo umore.
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthTropicZone_00 = Compare un set pulito di righe, poi si spalma in una foschia rumorosa mentre la sonda deriva attraverso interferenze. Da qualche parte molto lontano, un tecnico delle comunicazioni sospira così forte da finire nel registro.
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthTemperateZone_00 = Lo spettro UV ha caratteristiche nitide e sottili che sembrano quasi progettate, finché non ricordi che alla natura è concesso essere scortese. Ricontrolli la calibrazione e fai finta di non averne dubitato.
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthSubpolarZone_00 = La scansione del lembo mostra deboli frange ultraviolette che suggeriscono uno strato esterno complesso e inquieto. Per un attimo pensi di mandargli una cartolina con scritto "per favore, mantieni la calma".
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthPolarZone_00 = L'intensità ultravioletta cala e cresce seguendo uno schema che non ha senso, finché non smetti di pretendere che lo abbia. Grannus non fornisce spiegazioni, solo dati.
        #GEPscience_bd_UVspec_GrannusInSpaceHigh_00 = Da molto in alto, Grannus diventa una singola firma austera: ampia potenza ultravioletta con occasionali scatti sottili come aghi. Il lungo ritardo fa arrivare ogni scatto come una sorpresa tardiva e sgradita.
        #GEPscience_bd_UVspec_TaranisInSpaceLowMagmaSea_00 = Lo spettro UV rileva una tenue foschia di emissioni da superficie rovente, come se il lato diurno stesse cercando di evaporare nello spazio. Il rivelatore si attenua in automatico e ringrazi il te del passato per aver attivato la "modalità codardo".
        #GEPscience_bd_UVspec_TaranisInSpaceLowMagmaShores_00 = Sopra le coste incandescenti, lo spettrometro cattura righe intermittenti compatibili con minerali sputati e polvere arrabbiata. Etichetti la regione "non inalare", anche se nessuno può.
        #GEPscience_bd_UVspec_TaranisInSpaceLowScorchedLowlands_00 = L'UV riflesso è irregolare e duro, con strani accenni fluorescenti che vanno e vengono mentre il terreno scorre sotto di te. È come se le rocce stessero rispondendo a una domanda che non hai fatto.
        #GEPscience_bd_UVspec_TaranisInSpaceLowMidlands_00 = La scansione non trova un'atmosfera stabile, solo un sottile sussurro transitorio che varia con illuminazione e quota. Controllo Missione lo chiama esosfera, tu lo chiami "l'universo che si schiarisce la gola".
        #GEPscience_bd_UVspec_TaranisInSpaceLowHighlands_00 = Le alture mostrano una riflettanza più pulita e bordi spettrali più netti, come se la superficie fosse stata sabbiata dalle radiazioni per ere. Inizi a rimpiangere un vuoto noioso e prevedibile.
        #GEPscience_bd_UVspec_TaranisInSpaceLowDarkSideMidlands_00 = Sul lato freddo, la riflettanza UV crolla e lo spettro si fa silenzioso, quasi educato. Il silenzio pesa di più quassù, come se i dati cercassero di non svegliare nulla.
        #GEPscience_bd_UVspec_TaranisInSpaceLowDarkSideHighlands_00 = Un tenue bagliore ultravioletta appare lungo la linea dell'orizzonte, forse dovuto a particelle cariche che sfiorano il confine tra notte e giorno. Lo segni come "bello" e speri che gli scienziati ti perdonino.
        #GEPscience_bd_UVspec_TaranisInSpaceLowPoles_00 = I poli mostrano sottili spostamenti spettrali che suggeriscono residui intrappolati dal freddo che resistono nonostante tutto. Sotto un sole rosso, "stabile" significa comunque "a malapena".
        #GEPscience_bd_UVspec_TaranisInSpaceHigh_00 = Da un'orbita più alta, Taranis si riduce a un contrasto brutale: un emisfero luminoso e rovente e uno scuro e gelato, con una sottile cucitura in mezzo. Lo spettro UV sembra una decisione spaccata a metà.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowSunnyLowlands_00 = Lo spettro UV mostra un forte assorbimento dovuto all'atmosfera sottile, con ulteriore diffusione sopra le regioni più calde. Ti chiedi come qualcosa di così "quasi aria" riesca comunque a fare tanto la boss.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowSunnyHighlands_00 = Sopra i rilievi, le righe si fanno un po' più nette perché l'aria si assottiglia ancora, e la riflettanza della superficie si impone. È la cosa più vicina alla chiarezza che hai avuto da quando hai lasciato casa.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowTransitionalLowlands_00 = Vicino alla fascia del crepuscolo, lo spettrometro cattura un mix mobile di riflessione della superficie e tenue assorbimento atmosferico. Il pianeta non sa decidere se bruciare o gelare, quindi prova entrambe.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowTransitionalHighlands_00 = Le caratteristiche UV fluttuano con la quota e le ombre locali, come se il terminatore respirasse al rallentatore. Archivi i dati e poi li fissi più a lungo di quanto sia strettamente professionale.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideLowlands_00 = Il lato notturno restituisce una firma tenue e fredda, con occasionali accenni di gas sublimati che svaniscono tanto in fretta quanto compaiono. Lo strumento lo chiama "transitorio", tu lo chiami "se sbatti le palpebre, te lo perdi".
        #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideHighlands_00 = Una debole riflettanza UV e un sussurro di assorbimento suggeriscono un velo sottile di gas che ristagna nel freddo. Annoti che "atmosfera" è una parola molto generosa, qui.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowSoutheasternMountains_00 = Le montagne proiettano ombre lunghe e lo spettro alterna bordi netti della superficie e deboli bande atmosferiche mentre sorvoli le creste. Sembra di leggere il codice a barre di un pianeta.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowWesternMountains_00 = Compare un lieve aumento della foschia ultravioletta sottovento rispetto al lato diurno, segno di particelle spinte in giro da aria sottile e pressione solare. Controllo Missione chiede se è meteo, tu rispondi "più o meno".
        #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideMountains_00 = La scansione UV cattura un tenue bagliore spettrale lungo il lembo superiore, forse attività di particelle cariche che interagiscono con l'aria rarefatta. Lo registri con cura, poi apprezzi in silenzio la vista.
        #GEPscience_bd_UVspec_ToutatisInSpaceHigh_00 = Da molto in alto, la sottile atmosfera di Toutatis scrive una firma discreta sopra un pianeta di estremi. I numeri arrivano in ritardo e, in qualche modo, l'attesa fa sembrare il lato freddo ancora più lontano.
        #GEPscience_bd_UVspec_NodensInSpaceLowSaltySeas_00 = Lo spettro UV sopra i mari salati mostra profonde bande di assorbimento e un bordo di diffusione brillante sulla foschia. Sotto la luce rossa e fioca di Grannus, lo strumento integra più a lungo e torna comunque con "probabilmente acqua".
        #GEPscience_bd_UVspec_NodensInSpaceLowFreshWater_00 = Sopra le chiazze più scure di acqua dolce, la riflettanza UV cala mentre l'assorbimento atmosferico resta ostinatamente spesso. Qualcosa nell'aria è davvero bravo a divorare l'ultravioletto.
        #GEPscience_bd_UVspec_NodensInSpaceLowShores_00 = Il confine costiero disegna una linea di contrasto UV netta, come se qualcuno l'avesse tracciata con un evidenziatore che non puoi vedere. Una sottile foschia costiera aggiunge ulteriori ondulazioni allo spettro, che richiedono secoli per essere confermate attraverso il ritardo nelle comunicazioni.
        #GEPscience_bd_UVspec_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano una forte diffusione UV dovuta a nubi alte e un'ampia depressione di assorbimento che suggerisce un'alta atmosfera molto attiva. Controllo Missione chiede se è "tipo ozono", tu rispondi "è decisamente tipo".
        #GEPscience_bd_UVspec_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati restituiscono una firma UV più stabile, con meno picchi da nubi ma lo stesso morso atmosferico pesante. Il pianeta sembra calmo, ma lo spettro continua a sussurrare "chimica".
        #GEPscience_bd_UVspec_NodensInSpaceLowTropicalMidlands_00 = Le letture UV aumentano sopra le creste delle pianure tropicali, mentre l'aria si assottiglia leggermente e la riflettanza della superficie inizia a contare. La forma delle righe cambia a ogni passaggio, come se l'atmosfera si riordinasse quando non la guardi.
        #GEPscience_bd_UVspec_NodensInSpaceLowTemperateMidlands_00 = Qui lo spettrometro risolve un bordo di superficie più pulito, poi lo perde subito dentro un velo di foschia di passaggio. Nodens è generoso con i dati e avaro di certezze.
        #GEPscience_bd_UVspec_NodensInSpaceLowHighlands_00 = Le colline riflettono più UV del previsto per un'atmosfera così spessa, suggerendo rocce più chiare o colonne di foschia meno dense. Etichetti il file "buon segnale, ancora lontano da casa".
        #GEPscience_bd_UVspec_NodensInSpaceLowTundra_00 = Il ritorno UV della tundra è attenuato e freddo, con un lieve cambio di pendenza che potrebbe essere brina, polvere o "qualcos'altro". Il lungo ritardo fa sembrare personale ogni gobba ambigua.
        #GEPscience_bd_UVspec_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate brillano nell'ultravioletto, ma l'assorbimento in quota resta abbastanza forte da sfumare i bordi. Persino le chiazze più luminose appaiono smorzate sotto un sole rosso.
        #GEPscience_bd_UVspec_NodensInSpaceHigh_00 = Dall'orbita alta, Nodens è una singola, pesante firma atmosferica stesa sopra deboli accenni di superficie. Lo spettro arriva in ritardo e denso, come una cartolina che si è bagnata lungo la strada.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowFlats_00 = I terreni piatti di Belisama riflettono ultravioletto in modo piatto e ostinato: niente aria, niente scuse, solo roccia. Ogni tanto un debole tremolio compare sul lembo, probabilmente polvere che si eccita nei momenti più duri di Grannus.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTropicalLowlands_00 = L'etichetta "tropicale" sembra ottimista, ma l'albedo UV si scalda leggermente sul lato più luminoso. Nodens incombe lì vicino e lo spettrometro intercetta un tenue lavaggio UV aggiuntivo che non era nella checklist.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTemperateLowlands_00 = Bande di contrasto UV tracciano sottili cambi di composizione attraverso i bassopiani temperati, come se qualcuno avesse versato polveri diverse e non avesse mai ripulito. Il vuoto mantiene tutto onesto e un po' inquietante.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano bordi UV più netti, suggerendo materiale più fresco o meno alterato dall'ambiente spaziale. Le letture sono abbastanza pulite che Controllo Missione, per un attimo, si dimentica che stai lavorando sotto un sole rosso e fioco.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTemperateMidlands_00 = Un sottile insieme di caratteristiche spettrali appare e scompare con l'angolo di osservazione, compatibile con un terreno irregolare che proietta micro ombre nella mappa UV. È geologia, ma sembra che la luna stia ammiccando.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowHighlands_00 = Le colline restituiscono un bagliore UV più duro, con occasionali picchi dall'aspetto fluorescente provenienti da affioramenti brillanti. Valuti di dare un nome agli affioramenti, poi ricordi che non riesci nemmeno a pronunciare "Belisama" in modo coerente.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowPoles_00 = I poli sono più scuri in UV, con una lieve pendenza che suggerisce residui intrappolati dal freddo che preferiscono non farsi vedere. Lo strumento non è d'accordo sulla linea di base, che è il suo modo di mostrare rispetto.
        #GEPscience_bd_UVspec_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama è soprattutto una curva di riflettanza UV quieta e priva d'aria, con un persistente e tenue tremolio sul lembo. I dati sono puliti, il cielo no, e il ritardo la fa sembrare ancora più lontana.
        #GEPscience_bd_UVspec_SucellusInSpaceLowBasins_00 = I bacini mostrano materiale scuro in UV con bordi di assorbimento netti, come se qualcosa di metallico fosse stato macinato nella regolite. L'elevato rumore da radiazione impone più medie, e i risultati sembrano comunque un po' arrabbiati.
        #GEPscience_bd_UVspec_SucellusInSpaceLowLowlands_00 = I passaggi sui bassopiani rivelano una tenue componente di emissione ultravioletta che non coincide con una semplice riflessione. Potrebbero essere particelle sputterizzate, oppure Sucellus che fa teatro sotto Grannus.
        #GEPscience_bd_UVspec_SucellusInSpaceLowTropicalMidlands_00 = Lo spettro UV si fa più definito sopra le pianure tropicali, con piccole caratteristiche di riga compatibili con polvere ricca di minerali. Lo strumento registra un avviso: "segnale buono, sensazione inquietante".
        #GEPscience_bd_UVspec_SucellusInSpaceLowTemperateMidlands_00 = Sottili differenze di colore UV mappano strisce compositive che suggeriscono rimescolamento e rimodellamento di molto tempo fa. I pattern sembrano deliberati, finché non ricordi che anche le rocce amano essere strane.
        #GEPscience_bd_UVspec_SucellusInSpaceLowHighlands_00 = Le colline lampeggiano più luminose in UV, suggerendo fratture più fresche o depositi esposti con crosta meno alterata. Controllo Missione chiede "altri passaggi", il ritardo nelle comunicazioni risponde prima con il silenzio.
        #GEPscience_bd_UVspec_SucellusInSpaceLowPoles_00 = Le regioni polari mostrano un lieve aumento di luminosità e un cambio di pendenza che potrebbe indicare brina sottile o residui a grana fine. Sotto un sole rosso e fioco, perfino il "ghiaccio" deve fare gli straordinari.
        #GEPscience_bd_UVspec_SucellusInSpaceHigh_00 = Dall'orbita alta, Sucellus appare come una firma di riflettanza dura e metallica avvolta da una peluria di radiazione. Lo spettro è abbastanza nitido da tentare conclusioni, e abbastanza distante da punirle.
        #GEPscience_bd_UVspec_CaireenInSpaceLowLowlands_00 = I bassopiani di Caireen sono un mosaico di risposte UV, come un asteroide catturato che indossa vernice assortita male. Lo spettrometro continua a ricalibrarsi, come se non si fidasse di ciò che vede.
        #GEPscience_bd_UVspec_CaireenInSpaceLowMidlands_00 = Le scansioni UV sulle pianure mostrano deboli e transitori luccichii di emissione che seguono più l'angolo del sole che il terreno. La polvere che si carica in questo ambiente duro è il principale sospettato, e non collabora.
        #GEPscience_bd_UVspec_CaireenInSpaceLowHighlands_00 = Le colline restituiscono un bordo UV più netto, con occasionali gobbe simili a fluorescenza provenienti da punti brillanti. Le segni per un seguito, sapendo che il seguito arriverà dopo un altro lungo, solitario ritardo.
        #GEPscience_bd_UVspec_CaireenInSpaceLowPoles_00 = I poli sono deboli e stabili in UV, con un lieve cambio di pendenza che suggerisce brina fine o solo polvere più fine. Su una luna così piccola e così lontana, queste due opzioni sembrano fastidiosamente simili.
        #GEPscience_bd_UVspec_CaireenInSpaceHigh_00 = Dall'orbita alta, Caireen è a malapena più di un luccichio UV frastagliato, con un sacco di spazio nero tutto intorno. Il vuoto domina il dataset e, in qualche modo, conta comunque come scienza.
        #GEPscience_bd_UVspec_SironaInSpaceLowDarkTropicalBands_00 = Lo spettro UV sopra le bande tropicali scure mostra un assorbimento pesante con picchi di emissione luminosi e sottili come aghi. Il campo estremo di Sirona fa ciarlare il rivelatore come se stesse origliando dei fulmini.
        #GEPscience_bd_UVspec_SironaInSpaceLowLightTropicalBands_00 = Le nubi più chiare rimandano più UV nel sensore, ma il metano continua a strappare grossi pezzi della curva. Sotto il bagliore fioco di Grannus, il pianeta in qualche modo sembra ancora elettricamente "sveglio".
        #GEPscience_bd_UVspec_SironaInSpaceLowDarkTemperateBands_00 = Una firma ampia di foschia ultravioletta si posa sopra la bandeggiatura, come se l'alta atmosfera fosse impegnata a cucinare nuove sostanze chimiche. Le note del downlink arrivano tardi e sembrano comunque urgenti.
        #GEPscience_bd_UVspec_SironaInSpaceLowLightTemperateBands_00 = Le righe UV si affilano e si sfocano a ogni passaggio, suggerendo strati di nubi che scorrono uno sull'altro a velocità poco gentili. Etichetti il dataset "non calmo" e speri che sia abbastanza scientifico.
        #GEPscience_bd_UVspec_SironaInSpaceLowDarkPolarBands_00 = La regione delle bande polari scure si accende di emissione ultravioletta che somiglia in modo sospetto ad attività aurorale su scala enorme. Lo strumento chiede meno particelle eccitate, Sirona rifiuta.
        #GEPscience_bd_UVspec_SironaInSpaceLowLightPolarBands_00 = La luminosità UV aumenta lungo il lembo e poi crolla in un assorbimento profondo, come se stessi sfiorando il bordo di un guscio che brilla. Il sole rosso fa sembrare tutto come visto attraverso una spia d'allarme.
        #GEPscience_bd_UVspec_SironaInSpaceHigh_00 = Da molto in alto, Sirona diventa una firma atmosferica pulita con sporadici scatti UV che bucano la media. Il lungo ritardo nelle comunicazioni fa sembrare ogni scatto avvenuto una vita fa.
        #GEPscience_bd_UVspec_AirmedInSpaceLowTropicalLowlands_00 = Il ritorno UV è irregolare, come se metà del suolo si rifiutasse di riflettere con educazione. Senza una vera atmosfera che smussi tutto, ogni cicatrice compare in dettagli brutali.
        #GEPscience_bd_UVspec_AirmedInSpaceLowTemperateLowlands_00 = Lo spettro è quasi tutto luce solare riflessa, ma la linea di base ondeggia sotto le tempeste di radiazione di Sirona. Lo strumento lo chiama "rumore", tu lo chiami "il vicinato".
        #GEPscience_bd_UVspec_AirmedInSpaceLowTropicalMidlands_00 = Bordi UV netti suggeriscono materiale più fresco esposto da antichi impatti, poi svaniscono subito quando cambia l'angolo di osservazione. Airmed ti fa sudare ogni curva pulita.
        #GEPscience_bd_UVspec_AirmedInSpaceLowTemperateMidlands_00 = Un tenue bagliore ultravioletta transitorio corre lungo l'orizzonte, compatibile con polvere sputterizzata e particelle cariche. Controllo Missione chiede repliche, il ritardo risponde con il silenzio.
        #GEPscience_bd_UVspec_AirmedInSpaceLowHighlands_00 = Le colline riflettono un bagliore UV più duro, come se la superficie fosse stata sabbiata dalle radiazioni per ere. Lo spettrometro concorda, poi chiede se sei sicuro di averlo calibrato.
        #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedLowlands_00 = Il terreno dei bassopiani scuri divora l'ultravioletto e restituisce quasi nulla, lasciando uno spettro ostinatamente piatto. Sembra di scandire un vuoto che per caso è solido.
        #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedMidlands_00 = Un debole rigonfiamento fluorescente appare e scompare sopra il confine bicolore. Lo segni come "interessante" e ti penti subito di quanto quella parola sembri piccola, quassù.
        #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedHighlands_00 = La curva UV è debole e tremolante, non per colpa della superficie ma per l'ambiente di particelle che martella il sensore. Persino le rocce sembrano stanche.
        #GEPscience_bd_UVspec_AirmedInSpaceLowPoles_00 = I poli si schiariscono leggermente in UV, suggerendo brina fine o polvere che si aggrappa dove può. Sotto un sole rosso e fioco, "intrappolato dal freddo" suona più come "disperato".
        #GEPscience_bd_UVspec_AirmedInSpaceHigh_00 = Dall'orbita alta, Airmed è un minuscolo puntino bicolore con un sacco di spazio vuoto intorno. Lo spettro è più pulito quando smetti di aspettarti che sia confortevole.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalCraquelure_00 = Le bande di assorbimento UV si approfondiscono sopra la crettatura tropicale, suggerendo un'atmosfera ricca di foschia che ama inghiottire le lunghezze d'onda corte. La superficie sotto sembra voler scrostarsi per il freddo.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateCraquelure_00 = Lo spettrometro coglie sottili cambi di diffusione UV che seguono i pattern delle crepe, come se i gas si accumulassero e si diradassero lungo di esse. La "bassa pressione" di Borvo ha comunque molte opinioni.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalLowlands_00 = L'atmosfera scrive un assorbimento UV ampio e regolare sopra una riflettanza superficiale attenuata. Le firme del metano spiccano anche sotto la luce fioca di Grannus, con un'efficienza ingiusta.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateLowlands_00 = Compare una tenue spalla di foschia ultravioletta, compatibile con smog fotochimico che si accumula molto in alto. Salvi il grafico come "decisamente non è solo nebbia".
        #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalMidlands_00 = Sopra le pianure tropicali più elevate la superficie contribuisce di più alla curva UV, rendendo la pendenza più netta e rivelando indizi minerali. Il pianeta però nasconde ancora gran parte dei suoi segreti dietro un velo sottile e gelido.
        #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateMidlands_00 = Lo spettro UV si stabilizza in bande ripetibili, poi deriva mentre i venti spostano la foschia alta. Quasi senti l'atmosfera che rimescola le carte.
        #GEPscience_bd_UVspec_BorvoInSpaceLowHighlands_00 = Il ritorno UV si illumina leggermente, forse per colonne d'aria più pulite o materiale superficiale più chiaro. Per un attimo i dati sembrano vicini, poi il ritardo nelle comunicazioni ti ricorda che non lo sono.
        #GEPscience_bd_UVspec_BorvoInSpaceLowMajorCraters_00 = I crateri principali mostrano un pattern di albedo UV distintivo, come se il materiale scavato riflettesse in modo diverso rispetto alle pianure circostanti. L'atmosfera addolcisce il contrasto, come se stesse cercando di essere educata.
        #GEPscience_bd_UVspec_BorvoInSpaceLowPoles_00 = Le scansioni polari mostrano una pendenza UV spostata, che potrebbe indicare residui intrappolati dal freddo o una chimica della foschia alterata. Lo spettrometro lo etichetta "anomalia", che è praticamente la sua parola preferita.
        #GEPscience_bd_UVspec_BorvoInSpaceHigh_00 = Dall'orbita alta, la firma UV di Borvo è dominata da assorbimento diluito dall'azoto, con il metano ancora chiaramente presente. L'intero mondo si legge come un tranquillo esperimento di laboratorio condotto molto lontano da casa.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTropicalLowlands_00 = Lo spettro UV è netto e semplice: solo riflessione da suolo grigio e martoriato, con occasionali picchi dovuti a impatti di particelle cariche. Il silenzio di Damona viene interrotto solo dalle radiazioni.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTemperateLowlands_00 = Sottili bande di contrasto UV tracciano chiazze compositive attraverso i bassopiani temperati. Il rivelatore continua a integrare più a lungo, come se la distanza stessa stesse abbassando il segnale.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano bordi UV più netti, compatibili con regolite più fresca esposta dagli impatti. Ti chiedi quanto duri "fresco" nell'ambiente duro di Sirona.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTemperateMidlands_00 = Un tenue bagliore sul lembo appare e scompare durante il passaggio, probabilmente polvere o atomi sputterizzati eccitati per un attimo. È la cosa più vicina al meteo che Damona possiede.
        #GEPscience_bd_UVspec_DamonaInSpaceLowHighlands_00 = Le superfici delle colline riflettono una curva UV leggermente più brillante, suggerendo materiale diverso o meno annerimento spaziale. Controllo Missione chiede cosa significhi, tu rispondi con un nome file lunghissimo.
        #GEPscience_bd_UVspec_DamonaInSpaceLowImpactBasin_00 = Il grande bacino d'impatto si legge come un cambio di firma UV con un bordo ruvido e rumoroso: materiale scavato, pareti fratturate e ombreggiamento tutti insieme. La cicatrice racconta la sua storia senza usare parole.
        #GEPscience_bd_UVspec_DamonaInSpaceLowPoles_00 = I poli sono più deboli e più stabili in UV, con un piccolo cambio di pendenza che potrebbe essere brina fine o polvere più fine. Quassù, sono di fatto lo stesso problema.
        #GEPscience_bd_UVspec_DamonaInSpaceHigh_00 = Dall'orbita alta, Damona è un puntino butterato e una curva di riflettanza pulita e priva d'aria. Il vuoto attorno occupa quasi tutto il dataset e, in qualche modo, vale comunque.
        #GEPscience_bd_UVspec_EponaInSpaceLowTropicalLowlands_00 = Lo spettro UV mostra un ampio assorbimento atmosferico con un ostinato morso di metano, persino così lontano sotto la luce rossa e fioca di Grannus. I bassopiani tropicali riflettono quel tanto che basta per dimostrare che esiste una superficie sotto tutta quell'aria gelida.
        #GEPscience_bd_UVspec_EponaInSpaceLowTemperateLowlands_00 = Una curva UV più liscia qui suggerisce una foschia più spessa e meno caratteristiche nette della superficie che riescono a passare. Il rivelatore integra più a lungo e il ritardo nelle comunicazioni fa sembrare il pianeta ancora più freddo.
        #GEPscience_bd_UVspec_EponaInSpaceLowTropicalUplands_00 = Sopra i rilievi più elevati le bande atmosferiche si assottigliano leggermente e il bordo della superficie diventa più nitido. Qualunque cosa ci sia laggiù, ghiaccio, polvere o entrambi, continua a rifiutarsi di essere ovvia.
        #GEPscience_bd_UVspec_EponaInSpaceLowTemperateUplands_00 = La firma UV si stabilizza in bande di assorbimento ripetibili, poi tremola quando uno strato di foschia si sposta sotto. Controllo Missione lo chiama "interessante variabilità" dopo che i dati arrivano finalmente.
        #GEPscience_bd_UVspec_EponaInSpaceLowHighlands_00 = Le colline restituiscono una pendenza UV più luminosa, come se colonne d'aria più pulite lasciassero passare più riflessione. Per un attimo ti senti più vicino al suolo, finché i numeri non ti ricordano quanto lontano sia "vicino" quassù.
        #GEPscience_bd_UVspec_EponaInSpaceLowGrandPeaks_00 = I grandi picchi bucano la foschia quanto basta per mostrare bordi di riflettanza netti sotto la coperta atmosferica. Lo spettrometro registra "forte contrasto", che è il suo modo di sembrare impressionato.
        #GEPscience_bd_UVspec_EponaInSpaceLowCraters_00 = I bordi dei crateri lampeggiano con un'albedo UV diversa dai loro fondi, come se materiale più fresco spuntasse da vecchie cicatrici. L'atmosfera addolcisce tutto, come se Epona stesse cercando di tenere segreti.
        #GEPscience_bd_UVspec_EponaInSpaceLowVolcanoes_00 = La scansione UV rileva strani cambi locali di pendenza che potrebbero essere materiale più caldo o gas transitori. Lo etichetti "forse attivo" e aspetti un tempo scomodamente lungo prima che qualcuno ribatta.
        #GEPscience_bd_UVspec_EponaInSpaceLowPoles_00 = Le regioni polari si illuminano in UV, suggerendo brina più pulita o depositi a grana più fine. Anche qui, l'assorbimento del metano continua a rosicchiare le lunghezze d'onda corte come se gli appartenessero.
        #GEPscience_bd_UVspec_EponaInSpaceHigh_00 = Dall'orbita alta, Epona diventa soprattutto atmosfera: assorbimento dominato dall'azoto con una chiara firma del metano sovrapposta. La superficie è un debole ripensamento, come un ricordo che arriva in ritardo.
        #GEPscience_bd_UVspec_RosmertaInSpaceLowTropicalLowlands_00 = La curva UV di Rosmerta è pura riflessione nel vuoto, con un sacco di granulosità da radiazione nel segnale. I bassopiani tropicali appaiono consumati e quietamente risentiti per essere osservati.
        #GEPscience_bd_UVspec_RosmertaInSpaceLowTemperateLowlands_00 = Lo spettro resta piatto e privo d'aria, ma la linea di base trema sotto l'ambiente ad alta radiazione. Lo archivi come "rumore", anche se sembra più che la luna ti stia sibilando contro.
        #GEPscience_bd_UVspec_RosmertaInSpaceLowTropicalMidlands_00 = Sottili differenze UV mappano chiazze compositive attraverso le pianure tropicali. Ogni datapoint pulito richiede più tempo del dovuto, come se la distanza stessa aggiungesse barre d'errore.
        #GEPscience_bd_UVspec_RosmertaInSpaceLowTemperateMidlands_00 = Il ritorno UV si attenua leggermente con terreno più ruvido e ombreggiamento, dando allo spettro un aspetto a pezzi. Inizi a fidarti delle ombre più che dei numeri.
        #GEPscience_bd_UVspec_RosmertaInSpaceLowHighlands_00 = La riflettanza delle colline è più netta in UV, suggerendo materiale più pulito e meno annerito dallo spazio sulle creste esposte. Lo strumento è d'accordo, poi viene colpito da un altro impatto di particelle.
        #GEPscience_bd_UVspec_RosmertaInSpaceLowPoles_00 = I poli mostrano un tenue aumento di luminosità compatibile con depositi più brinati, ma il segnale è punteggiato di picchi da radiazione. È un posto molto silenzioso con interferenze molto rumorose.
        #GEPscience_bd_UVspec_RosmertaInSpaceHigh_00 = Dall'orbita alta, Rosmerta è un piccolo luccichio UV che affoga nello spazio vuoto e nel rumore del sensore. Il vuoto finisce per essere la misura più coerente.
        #GEPscience_bd_UVspec_RAB-58EInSpaceLowLowlands_00 = Lo spettro UV è ambiguo nel modo più scientifico: la superficie potrebbe essere roccia scura, ghiaccio sporco o entrambe. Il planetesimo non risponde e il ritardo nelle comunicazioni fa sì che nessuno interrompa il silenzio.
        #GEPscience_bd_UVspec_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali riflettono una pendenza UV leggermente più luminosa, suggerendo materiale più pulito o brina più fine. Sospetti subito stranezze da origine catturata e lo scrivi due volte.
        #GEPscience_bd_UVspec_RAB-58EInSpaceLowWesternHighlands_00 = Il terreno occidentale mostra un ritorno UV più ruvido e più scuro, come se l'alterazione spaziale l'avesse rosicchiato più a lungo. La differenza è piccola, ma quassù le piccole differenze sembrano enormi.
        #GEPscience_bd_UVspec_RAB-58EInSpaceHigh_00 = Dall'orbita alta, RAB-58E è quasi privo di segnale: solo un tremolio di riflettanza UV con tanto nero attorno. Salvi comunque il dataset, anche "minuscolo" conta.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowTropicalLowlands_00 = Il ritorno UV è luminoso e ghiacciato, con una linea di base pulita nel vuoto e interferenze atmosferiche minime. Sotto il sole rosso e fioco, il mondo nano riesce comunque a produrre un bagliore netto e gelido.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowTemperateLowlands_00 = Lo spettro resta stabile e privo d'aria, mostrando sottili spostamenti di colore UV che suggeriscono ghiacci misti e polvere. Si legge come un tranquillo inventario scritto molto lontano da casa.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowTropicalMidlands_00 = I passaggi sulle pianure tropicali rendono più netto il bordo di riflettanza UV, forse per esposizioni di ghiaccio più pulite sui terreni più elevati. I dati sono nitidi, il luogo è tutt'altro che familiare.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowTemperateMidlands_00 = Un tenue cambio di pendenza suggerisce dimensioni dei grani diverse o contaminanti nello strato superficiale. Lo annoti con cura, perché "forse" sta facendo molto lavoro quassù.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowHighlands_00 = Le colline producono un forte contrasto UV con micro ombreggiamento che rende la curva seghettata. È geologia resa come una lama di sega.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowSouthPolarHills_00 = La firma UV si illumina e si fa più liscia, compatibile con brina più fresca o depositi più puliti in terreni riparati. Perfino lo spettrometro sembra sollevato nel vedere qualcosa di poco complicato.
        #GEPscience_bd_UVspec_CernunnosInSpaceLowNorthPole_00 = Il polo nord è luminoso, freddo e sorprendentemente coerente in UV, come se fosse rimasto intatto per ere. L'unica cosa che cambia è quanto tempo impiega il risultato a tornare.
        #GEPscience_bd_UVspec_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos è un pallido puntino UV contro un enorme sfondo scuro. I numeri arrivano tardi e sommessi, come il mondo che descrivono.

        // bd_weather
        #GEPscience_bd_weather_GrannusInSpaceHigh_00 = Da così lontano, Grannus sembra calmo e ordinato... finché non rivedi i fotogrammi e noti che l'intero volto rosso sta strisciando.
        #GEPscience_bd_weather_GrannusInSpaceLowNorthPolarZone_00 = Un pennacchio pallido e filiforme pende sopra il polo, piegandosi e spezzandosi come se la stella stesse cercando di pettinarsi con il magnetismo.
        #GEPscience_bd_weather_GrannusInSpaceLowNorthSubpolarZone_00 = Scie luminose sfrecciano lungo il bordo della regione polare, Controllo Missione dice che la "mappa meteo" è arrivata con tre ore di ritardo, e sembra comunque impaziente.
        #GEPscience_bd_weather_GrannusInSpaceLowNorthTemperateZone_00 = Il pattern qui si taglia di lato tra un'orbita e l'altra, come se la superficie ruotasse con un'opinione diversa rispetto ai poli.
        #GEPscience_bd_weather_GrannusInSpaceLowNorthTropicZone_00 = Un groviglio di macchie scure trascina dietro di sé un alone di turbolenza più luminosa, lasciando una scia che puoi seguire come una tempesta in fiamme.
        #GEPscience_bd_weather_GrannusInSpaceLowEquatorialZone_00 = L'equatore è un nastro trasportatore di celle incandescenti: ognuna è "solo" convezione, e ognuna potrebbe inghiottire una navicella, se fosse un posto in cui si può cadere.
        #GEPscience_bd_weather_GrannusInSpaceLowSouthTropicZone_00 = Cogli un arco ad anello che si solleva dalla superficie e poi collassa di nuovo, sembra un brillamento che ha cambiato idea a metà.
        #GEPscience_bd_weather_GrannusInSpaceLowSouthTemperateZone_00 = La trama laggiù è maculata e irrequieta, come se la stella stesse sobbollendo e tu avessi appena abbassato il fuoco a "a malapena contenuto".
        #GEPscience_bd_weather_GrannusInSpaceLowSouthSubpolarZone_00 = Le nubi, se così si possono chiamare, si assottigliano in lunghe corsie che si aprono e si chiudono tra i fotogrammi come palpebre rosse che ammiccano.
        #GEPscience_bd_weather_GrannusInSpaceLowSouthPolarZone_00 = Una macchia scura e più pulita siede vicino al polo, circondata da un tenue bagliore, gli strumenti insistono che è "una regione quieta", cosa che non rassicura vicino a una stella.
        #GEPscience_bd_weather_ToutatisInSpaceHigh_00 = Il terminatore taglia il pianeta in due con precisione: giorno rosso e cotto da un lato, freddo nero d'inchiostro dall'altro e una sottile fascia di "forse meteo" che cerca di sopravvivere in mezzo.
        #GEPscience_bd_weather_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani del lato diurno tremolano di calore e scie di polvere, marchi alcuni pennacchi in rotazione e li perdi subito nel bagliore dell'orbita successiva.
        #GEPscience_bd_weather_ToutatisInSpaceLowSunnyHighlands_00 = Sopra i terreni più elevati, la foschia si assottiglia e si spezza in deboli bande, abbastanza nette da farti chiedere se il vento abbia imparato a tracciare linee.
        #GEPscience_bd_weather_ToutatisInSpaceLowTransitionalLowlands_00 = Lungo la fascia del crepuscolo, un nastro stretto di nubi si forma ed evapora mentre l'ombra avanza, è come guardare un'atmosfera che trattiene il respiro.
        #GEPscience_bd_weather_ToutatisInSpaceLowTransitionalHighlands_00 = Le alte regioni del terminatore generano chiazze sottili e velocissime che scivolano in discesa verso il buio prima che la tua camera finisca di impressionarsi.
        #GEPscience_bd_weather_ToutatisInSpaceLowDarkSideLowlands_00 = Nei bacini freddi, una foschia tenue ristagna e si espande in lente onde, la previsione recita "notte, con possibilità di altra notte".
        #GEPscience_bd_weather_ToutatisInSpaceLowDarkSideHighlands_00 = Gli altopiani del lato notturno restano per lo più sereni, ma a tratti veli di cristalli di ghiaccio scintillano debolmente quando il sole rosso sfiora la linea dell'orizzonte.
        #GEPscience_bd_weather_ToutatisInSpaceLowSoutheasternMountains_00 = Nubi sottili si impigliano sulle cime e si disfano sottovento, i pattern sembrano cuciti in posizione da venti costanti e invisibili.
        #GEPscience_bd_weather_ToutatisInSpaceLowWesternMountains_00 = La polvere tracima oltre le creste in ombre lunghe, disegnando il flusso d'aria con tale precisione che sospetti che Toutatis si stia mettendo in mostra per la camera.
        #GEPscience_bd_weather_ToutatisInSpaceLowDarkSideMountains_00 = Aria fredda scende dai pendii in deboli filamenti e le poche nubi che vedi sembrano fragili, come se potessero andare in frantumi se le fissassi troppo.
        #GEPscience_bd_weather_NodensInSpaceHigh_00 = Estesi strati di nubi, rotazione lenta e un'alba tinta di rosso che arriva molto prima dei dati.
        #GEPscience_bd_weather_NodensInSpaceHigh_01 = Il meteo del pianeta sembra confortantemente familiare, finché non ricordi che il canale "blu" è in gran parte una supposizione sotto questo sole rosso e fioco.
        #GEPscience_bd_weather_NodensInSpaceLowSaltySeas_00 = Foschia marina a chiazze sopra i mari salati, con groppi di burrasca lungo il bordo del giorno, ritardo comunicazioni: "richiedere più tardi".
        #GEPscience_bd_weather_NodensInSpaceLowSaltySeas_01 = Lunghe scie pallide cavalcano i venti sopra l'acqua, le tempeste si allineano come se seguissero regole che non abbiamo ancora tradotto.
        #GEPscience_bd_weather_NodensInSpaceLowFreshWater_00 = Bande di nubi da effetto lago sottovento ai grandi bacini di acqua dolce, visibilità: "solo dall'orbita".
        #GEPscience_bd_weather_NodensInSpaceLowFreshWater_01 = Una morbida fioritura di foschia si aggrappa alle coste, poi si stacca in file ordinate mentre il terminatore striscia oltre.
        #GEPscience_bd_weather_NodensInSpaceLowShores_00 = Brezze costiere nette e nubi improvvise e rapide, probabilità di perdere la costa: alta.
        #GEPscience_bd_weather_NodensInSpaceLowShores_01 = Il confine tra terra e mare è scarabocchiato da linee di nubi rapide e sottili, come se l'atmosfera non sapesse dove ancorarsi.
        #GEPscience_bd_weather_NodensInSpaceLowTropicalLowlands_00 = Convezione imponente, cumulonembi isolati e un sacco di entusiasmo nel moto verticale.
        #GEPscience_bd_weather_NodensInSpaceLowTropicalLowlands_01 = Incudini di nubi luminose si accendono e collassano in time-lapse, il sole rosso fa sembrare ogni tempesta leggermente surriscaldata.
        #GEPscience_bd_weather_NodensInSpaceLowTemperateLowlands_00 = Fronti organizzati in marcia verso est, attese bande alternate di cieli sereni e "oh no, altre nubi".
        #GEPscience_bd_weather_NodensInSpaceLowTemperateLowlands_01 = Un lungo fronte curvo attraversa i bassopiani trascinando dietro una coda grigia, come una cometa fatta di meteo.
        #GEPscience_bd_weather_NodensInSpaceLowTropicalMidlands_00 = Copertura nuvolosa spezzata con improvvisi addensamenti lungo le creste, turbolenza: "sì".
        #GEPscience_bd_weather_NodensInSpaceLowTropicalMidlands_01 = Piccole tempeste si formano in gruppi, poi si fondono in un unico sistema disordinato che rifiuta di combaciare con i modelli ordinati.
        #GEPscience_bd_weather_NodensInSpaceLowTemperateMidlands_00 = Venti costanti e strati di nubi sovrapposti, il raffreddamento notturno renderà tutto più tagliente.
        #GEPscience_bd_weather_NodensInSpaceLowTemperateMidlands_01 = Le sommità delle nubi si impilano in strisce e gradini, belli, ordinati e un po' inquietantemente precisi.
        #GEPscience_bd_weather_NodensInSpaceLowHighlands_00 = Nubi orografiche drappeggiate sui terreni alti, attese ombre drammatiche quando il sole rosso sfiora basso.
        #GEPscience_bd_weather_NodensInSpaceLowHighlands_01 = Nubi impigliate sulle cime e trascinate via in lunghi stendardi, che tracciano il flusso d'aria come se qualcuno avesse rovesciato gesso nel cielo.
        #GEPscience_bd_weather_NodensInSpaceLowTundra_00 = Neve sollevata dal vento e bassi soffitti di nubi ostinati, probabilità di "giornata serena": scoraggiata statisticamente.
        #GEPscience_bd_weather_NodensInSpaceLowTundra_01 = Un velo sottile avanza sulla tundra e si ispessisce al crepuscolo, quando il rapporto arriva, la tempesta si è già spostata altrove.
        #GEPscience_bd_weather_NodensInSpaceLowIceCaps_00 = Vortice polare stabile, con braccia di nubi a spirale che si serrano verso il centro.
        #GEPscience_bd_weather_NodensInSpaceLowIceCaps_01 = La calotta glaciale è circondata da bande di nubi in rotazione che sembrano un'impronta digitale gigante, Controllo Missione lo archivia come "non toccare".
        #GEPscience_bd_weather_SironaInSpaceHigh_00 = Dall'orbita alta, le bande di Sirona sono un livido attenuato di rossi e marroni e le ombre degli anelli le tagliano come un orologio senza lancette.
        #GEPscience_bd_weather_SironaInSpaceHigh_01 = La mappa meteo si aggiorna in lenti impulsi lontani, quando è a schermo, le tempeste hanno già riscritto la storia.
        #GEPscience_bd_weather_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure ribollono di turbolenza lenta, inghiottendo tempeste più piccole come se fosse il loro mestiere.
        #GEPscience_bd_weather_SironaInSpaceLowDarkTropicalBands_01 = Noti una catena di vortici in marcia lungo la banda, troppo regolarmente spaziati per sembrare casuali.
        #GEPscience_bd_weather_SironaInSpaceLowLightTropicalBands_00 = Sommità di nubi alte e luminose lampeggiano nelle bande chiare, il sole rosso le fa sembrare calde, ma i conti dicono altro.
        #GEPscience_bd_weather_SironaInSpaceLowLightTropicalBands_01 = Scie sottili e luminose vengono tagliate e si riformano tra un passaggio e l'altro, come se qualcuno continuasse a pettinare l'atmosfera nel verso sbagliato.
        #GEPscience_bd_weather_SironaInSpaceLowDarkTemperateBands_00 = Le zone temperate scure ospitano una vasta cella di tempesta con un occhio frastagliato che rifiuta di restare centrato.
        #GEPscience_bd_weather_SironaInSpaceLowDarkTemperateBands_01 = Aperture a chiazze si aprono e poi si richiudono, come se la banda respirasse, lentamente, pesantemente e non per te.
        #GEPscience_bd_weather_SironaInSpaceLowLightTemperateBands_00 = Un pattern ondoso nitido scorre sulle bande chiare, è quel tipo di ordine che mette in ansia gli ingegneri.
        #GEPscience_bd_weather_SironaInSpaceLowLightTemperateBands_01 = L'ombra degli anelli raffredda una striscia stretta e le nubi rispondono tracciando una linea netta proprio lungo di essa.
        #GEPscience_bd_weather_SironaInSpaceLowDarkPolarBands_00 = Vicino ai poli, le bande scure si attorcigliano in spirali strette, il bagliore aurorale intorno è decisamente non "solo decorazione".
        #GEPscience_bd_weather_SironaInSpaceLowDarkPolarBands_01 = Frammenti di tempesta orbitano la regione polare come detriti in uno scarico, solo che lo scarico è un pianeta e sta ronzando.
        #GEPscience_bd_weather_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare si velano in sottili strati ghiacciati che scintillano per un attimo quando l'angolo del sole è quello giusto.
        #GEPscience_bd_weather_SironaInSpaceLowLightPolarBands_01 = Una pallida calotta di nubi si espande e si contrae tra le orbite, come se il polo si stesse adattando in silenzio alla lunga notte.
        #GEPscience_bd_weather_BorvoInSpaceHigh_00 = Da quassù, la foschia di Borvo sembra uno schizzo tranquillo, finché il time-lapse non mostra l'intera atmosfera che scivola di lato sotto il sole rosso e fioco.
        #GEPscience_bd_weather_BorvoInSpaceLowTropicalCraquelure_00 = Foschia sottile serpeggia nella crettatura tropicale, ristagnando nelle fratture come se la superficie espirasse aria fredda tra le placche.
        #GEPscience_bd_weather_BorvoInSpaceLowTemperateCraquelure_00 = Un tappeto di nubi spezzato continua a riformarsi lungo le linee della crettatura, come se il meteo preferisse confini già incrinati.
        #GEPscience_bd_weather_BorvoInSpaceLowTropicalLowlands_00 = Ammassi di nubi luminosi e gonfi sbocciano sopra i bassopiani tropicali, poi si spalmano in scie prima che il downlink in ritardo finisca di disegnarli.
        #GEPscience_bd_weather_BorvoInSpaceLowTemperateLowlands_00 = Un fronte lungo e tenue striscia sui fondi dei bacini, sembra lento, ma supera comunque il tuo prossimo passaggio orbitale.
        #GEPscience_bd_weather_BorvoInSpaceLowTropicalMidlands_00 = Venti di media quota pettinano la foschia in bande ordinate che sembrano un po' troppo organizzate per stare comodi.
        #GEPscience_bd_weather_BorvoInSpaceLowTemperateMidlands_00 = Nubi a chiazze si raccolgono, si spezzano e si raccolgono di nuovo, come se l'atmosfera si stesse allenando per una tempesta che non vuole mettere in calendario.
        #GEPscience_bd_weather_BorvoInSpaceLowHighlands_00 = Nubi si impigliano sui terreni alti e scivolano via in stendardi fragili, le ombre sono così lunghe che quasi senti il gelo.
        #GEPscience_bd_weather_BorvoInSpaceLowMajorCraters_00 = I fondi dei grandi crateri intrappolano una foschia tenue e fredda che si muove con la linea giorno-notte, una marea fatta d'aria invece che d'acqua.
        #GEPscience_bd_weather_BorvoInSpaceLowPoles_00 = Una spirale stretta di nubi pallide circonda il polo, Controllo Missione la chiama "stabile", che non è la stessa cosa di "amichevole".
        #GEPscience_bd_weather_EponaInSpaceHigh_00 = Il meteo di Epona dipinge grandi pennellate quiete, poi il sole rosso intercetta il bordo di una tempesta e lo trasforma in una striscia di avvertimento.
        #GEPscience_bd_weather_EponaInSpaceLowTropicalLowlands_00 = Nubi torreggianti si alzano sopra i bassopiani tropicali più caldi, proiettando ombre più scure di quanto avrebbero diritto di essere.
        #GEPscience_bd_weather_EponaInSpaceLowTemperateLowlands_00 = Un cielo coperto stratificato avanza in fogli ordinati, del tipo che ti fa fidare delle previsioni e poi pentirtene.
        #GEPscience_bd_weather_EponaInSpaceLowTropicalUplands_00 = Brezze d'altopiano sfilacciano le sommità delle nubi in filamenti, come se qualcuno avesse provato a "spianare" il meteo con un rastrello.
        #GEPscience_bd_weather_EponaInSpaceLowTemperateUplands_00 = Una foschia sottile si aggrappa ai pendii e poi si stacca al crepuscolo, il terminatore è praticamente una macchina meteo in movimento.
        #GEPscience_bd_weather_EponaInSpaceLowHighlands_00 = Nubi orografiche drappeggiano le creste come coperte morbide, poi si strappano via in raffiche improvvise che i tuoi strumenti etichettano come "eccitanti".
        #GEPscience_bd_weather_EponaInSpaceLowGrandPeaks_00 = I grandi picchi più alti bucano lo strato di nubi e lasciano lunghe scie nette sottovento, montagne che fanno controllo qualità al cielo.
        #GEPscience_bd_weather_EponaInSpaceLowCraters_00 = Aria fredda ristagna nelle conche dei crateri, riempiendole di foschia pallida che defluisce e si ricarica mentre il ciclo giorno-notte procede a scatti.
        #GEPscience_bd_weather_EponaInSpaceLowVolcanoes_00 = Un sottile pennacchio si alza da un campo vulcanico e si espande in un velo alto, lo archivi sotto "meteo" perché nessuno vuole l'altra categoria.
        #GEPscience_bd_weather_EponaInSpaceLowPoles_00 = La calotta polare è bordata da bande di nubi in rotazione che si serrano e si allentano tra un passaggio e l'altro, come un respiro lento che non riesci a sincronizzare.

        // bd_XRayDiffract
        #GEPscience_bd_XRayDiffract_TaranisSrfLandedScorchedLowlands_00 = I picchi di diffrazione sembrano cotti dal calore e stanchi, come se i cristalli facessero piegamenti sotto un sole rosso da secoli.
        #GEPscience_bd_XRayDiffract_TaranisSrfLandedMidlands_00 = I grani cristallini mostrano segni di rapido raffreddamento e riscaldamento. Taranis sembra avere una rigida politica di "niente temperature confortevoli".
        #GEPscience_bd_XRayDiffract_TaranisSrfLandedHighlands_00 = La distanza reticolare è stirata in direzioni insolite, come se le rocce continuassero a prepararsi a un'alba che arriva di traverso.
        #GEPscience_bd_XRayDiffract_TaranisSrfLandedDarkSideMidlands_00 = Il pattern è nitido e pulito in modo fragile. Qualunque cosa si sia formata qui è gelata in fretta ed è rimasta così, lontano da qualunque calore amichevole.
        #GEPscience_bd_XRayDiffract_TaranisSrfLandedDarkSideHighlands_00 = Diverse fasi appaiono bloccate insieme come un pessimo compromesso tra fuoco e oscurità. La roccia si rifiuta di scegliere da che parte stare.
        #GEPscience_bd_XRayDiffract_TaranisSrfLandedPoles_00 = Il diffrattogramma suggerisce cristalli fratturati da shock e superfici scalfite dalle radiazioni. Persino i poli sembrano pericolosamente vicini a Grannus.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedSunnyLowlands_00 = Le righe di diffrazione sono sfumate dallo stress termico. Il lato illuminato sta cercando di trasformare ogni minerale in una pozzanghera.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedSunnyHighlands_00 = Dominano minerali da alta temperatura, con indizi di crosta cotta sotto. Il tuo strumento richiede crema solare.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedTransitionalLowlands_00 = Fasi miste compaiono in un equilibrio inquieto, come se il suolo non sapesse decidere se sobbollire o rabbrividire.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedTransitionalHighlands_00 = Il reticolo sembra piegato e ripiegato più volte, come se la roccia respirasse con la zona di comfort in movimento.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideLowlands_00 = I picchi sono nitidi e freddi, con segni di fratture bloccate dalla brina. Il campione sembra trattenere il respiro.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideHighlands_00 = Una firma fragile e a grana fine suggerisce fratturazione costante nel buio. I cristalli sono abbastanza affilati da tagliare il silenzio radio.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedSoutheasternMountains_00 = Diverse fasi da alta pressione compaiono dove non dovrebbero. Qualcosa qui è stato schiacciato con forza, molto prima che arrivassimo noi.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedWesternMountains_00 = Il pattern di diffrazione mostra ricristallizzazione a strati, come se le montagne fossero state ricostruite un ciclo termico alla volta.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideMountains_00 = Il reticolo è intatto ma in tensione, come se l'intera dorsale fosse un lungo ricordo di calore, congelato.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedShores_00 = Minerali idrati compaiono accanto a sali e sabbie. Il pianeta sta praticamente implorando piani a lungo termine e cartelline impermeabili.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedTropicalLowlands_00 = Il pattern suggerisce argille e roccia alterata. Qualcosa qui ha fatto chimica in silenzio mentre noi eravamo a minuti luce di distanza.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedTemperateLowlands_00 = Compare una miscela stabile di minerali comuni, con sottili prodotti di alterazione. Nodens sta facendo "normale" in un vicinato decisamente non normale.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedTropicalMidlands_00 = Le strutture cristalline suggeriscono cicli ripetuti di bagnato e secco. Controllo Missione chiede se le rocce stiano cercando di scriverci un messaggio.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedTemperateMidlands_00 = Il diffrattogramma è quasi noiosamente ordinato, poi noti fasi in traccia che implicano lunghi e lenti processi planetari.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedHighlands_00 = Grani grossolani e picchi puliti suggeriscono materiale di crosta antico. È il tipo di roccia su cui costruisci una base, se riesci a gestire il ritardo nelle comunicazioni.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedTundra_00 = Compaiono fasi di alterazione da clima freddo, bloccate al loro posto. Il campione scricchiola come se sapesse che l'inverno ha un calendario.
        #GEPscience_bd_XRayDiffract_NodensSrfLandedIceCaps_00 = Lo strumento rileva firme di ghiaccio d'acqua mescolate a detriti trasportati dal vento. Anche quassù sotto un sole rosso e fioco, la chimica resta indaffarata.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedFlats_00 = I picchi di diffrazione sono ordinati e uniformi, regolite fine e ben macinata che ha aspettato pazientemente sotto la luce rossa e fioca di Grannus.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTropicalLowlands_00 = Le firme cristalline suggeriscono ripetuto "rimescolamento" superficiale dovuto agli impatti. Belisama continua a essere rastrellata, e si vede.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTemperateLowlands_00 = Diverse fasi appaiono leggermente in tensione, come se i minerali avessero mantenuto la forma attraverso notti lunghissime e gelide.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTropicalMidlands_00 = Il pattern suggerisce grani misti, alcuni freschi e altri consumati dallo spazio, rimestati insieme sotto un cielo che non riesce mai a sembrare davvero familiare.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedTemperateMidlands_00 = Piccoli spostamenti dei picchi suggeriscono microfratture e lento scorrimento termico. Niente qui succede in fretta, a parte il ritardo nelle comunicazioni.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedHighlands_00 = Picchi forti e netti indicano roccia cristallina esposta con poca polvere in copertura, buona geologia, pessimo appoggio.
        #GEPscience_bd_XRayDiffract_BelisamaSrfLandedPoles_00 = La firma è nitida ma segnata: fini intrappolati dal freddo e grani incisi dalle radiazioni che si accumulano in silenzio da ere.
        #GEPscience_bd_XRayDiffract_SucellusSrfLandedBasins_00 = Le impronte di brecce d'impatto dominano la scansione. I cristalli sembrano saldati insieme da violenza antica e poi lasciati a raffreddare per sempre.
        #GEPscience_bd_XRayDiffract_SucellusSrfLandedLowlands_00 = Compare un mix granuloso di minerali scuri, con indizi di fasi ricche di metalli. Sucellus potrebbe persino ripagare il viaggio, prima o poi.
        #GEPscience_bd_XRayDiffract_SucellusSrfLandedTropicalMidlands_00 = La distanza reticolare sembra incoerente tra i grani, come se la superficie fosse stata leggermente "cotta" da radiazione e tempo.
        #GEPscience_bd_XRayDiffract_SucellusSrfLandedTemperateMidlands_00 = Diversi picchi deboli compaiono e svaniscono tra una scansione e l'altra. O il campione è complesso, o Sucellus sta giocando con i nostri strumenti.
        #GEPscience_bd_XRayDiffract_SucellusSrfLandedHighlands_00 = Il diffrattogramma suggerisce materiale di crosta più vecchio e più pulito, meno polvere, cristalli più ostinati e zero interesse a essere amichevole.
        #GEPscience_bd_XRayDiffract_SucellusSrfLandedPoles_00 = Grani irrigiditi dal freddo producono picchi affilati come rasoi, ma c'è un lieve fondo amorfo dovuto a continui graffi di particelle.
        #GEPscience_bd_XRayDiffract_CaireenSrfLandedLowlands_00 = La scansione mostra minerali semplici e primitivi con molti grani fratturati, classica energia da "roccia catturata".
        #GEPscience_bd_XRayDiffract_CaireenSrfLandedMidlands_00 = I picchi si allargano come se i cristalli fossero stati ripetutamente shockati e spaccati. Vivere nel vicinato di Sucellus non è rilassante.
        #GEPscience_bd_XRayDiffract_CaireenSrfLandedHighlands_00 = Frammenti più grossolani producono riflessioni più forti, suggerendo massi esposti tenuti insieme a malapena da gravità e ottimismo.
        #GEPscience_bd_XRayDiffract_CaireenSrfLandedPoles_00 = Il pattern è pulito e freddo e povero di polvere, come se i fini sciolti non riuscissero a depositarsi qui a lungo prima di essere sollevati nel vuoto.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedTropicalLowlands_00 = I picchi di diffrazione si dividono in due famiglie familiari: minerali tenaci e luminosi mescolati a grani più scuri e stressati da shock. Il problema "bicolore" di Airmed arriva fino in profondità.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedTemperateLowlands_00 = La scansione mostra regolite fine con molte microfratture, come se il terreno avesse sussultato in silenzio sotto un'alba rossa e fioca per ere.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedTropicalMidlands_00 = Compaiono diverse fasi ad alta deformazione dove ti aspetteresti cristalli più tranquilli. Qualunque cosa abbia colpito Airmed non credeva nelle presentazioni gentili.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedTemperateMidlands_00 = Un campione dall'aria banale produce un pattern scomodamente complesso. Controllo Missione lo adorerà... quando i risultati finiranno di strisciare fino a casa attraverso il ritardo nelle comunicazioni.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedHighlands_00 = Picchi netti e grani grossolani suggeriscono roccia madre esposta con copertura di polvere minima. La geologia è fiera, spigolosa e completamente disinteressata al comfort.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedDarkenedLowlands_00 = Dominano minerali scuri, con picchi ampi dovuti a facce cristalline scalfite dalle radiazioni. La superficie sembra sabbiata dallo spazio stesso.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedDarkenedMidlands_00 = Il diffrattogramma mostra fasi miste saldate insieme da shock ripetuti. Il lato scuro di Airmed ha avuto tempo di ricordare ogni impatto.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedDarkenedHighlands_00 = Riflessioni pulite si appoggiano su una tenue foschia amorfa, come se la roccia fosse solida ma la sua superficie venisse cancellata in silenzio grano dopo grano.
        #GEPscience_bd_XRayDiffract_AirmedSrfLandedPoles_00 = Grani irrigiditi dal freddo producono picchi nitidi, ma il rumore di fondo suggerisce danni da particelle implacabili. Perfino i poli qui sembrano troppo esposti.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedTropicalCraquelure_00 = Il pattern oscilla tra firme da roccia e da ghiaccio, con domini cristallini fratturati ovunque. La "crettatura" è, a quanto pare, uno stile di vita mineralogico.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedTemperateCraquelure_00 = Tessiture ripetute da gelo e frattura compaiono come picchi allargati e fasi miste. Il suolo non sa decidere se essere polvere, ghiaccio o entrambe le cose insieme.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedTropicalLowlands_00 = Diverse fasi dall'aspetto idratato compaiono accanto a silicati granulosi. Borvo sta facendo chimica in silenzio sotto un cielo che non riesce mai a sembrare familiare.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedTemperateLowlands_00 = Il diffrattogramma suggerisce grani fini lavorati dal vento e una componente volatile ostinata. Il tuo barattolo campioni si appanna, giusto per fare scena.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedTropicalMidlands_00 = La distanza reticolare cambia tra i grani, come se il materiale fosse stato flesso da stagioni lente e notti lunghe. L'orologio di Borvo gira in modo diverso sotto Grannus.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedTemperateMidlands_00 = Compare un mix di minerali sorprendentemente ordinato, poi picchi in traccia suggeriscono qualcosa di più strano nascosto nella massa. Lo strumento si rifiuta di aggiungere dettagli.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedHighlands_00 = Riflessioni forti e pulite indicano materiale più vecchio e meno alterato. È il tipo di crosta che ti fa chiedere com'era Borvo prima di imparare a tenere segreti.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedMajorCraters_00 = Fasi da shock e grani polverizzati dominano la scansione. Il materiale del cratere si legge come un rapporto d'incidente geologico con tutti i dettagli oscurati.
        #GEPscience_bd_XRayDiffract_BorvoSrfLandedPoles_00 = Volatili intrappolati dal freddo compaiono mescolati a fini abrasivi. I cristalli sembrano intatti, ma l'ambiente è tutt'altro che gentile.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTropicalLowlands_00 = I picchi di diffrazione sono semplici, radi e lividi, minerali di base con molti danni da shock. Damona tiene la sua storia breve e violenta.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTemperateLowlands_00 = Grani fini producono riflessioni ampie a causa di fratturazione e assestamento continui. La superficie sembra ancora in fase di recupero da vecchi errori.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTropicalMidlands_00 = Diverse fasi appaiono parzialmente amorfizzate, come se la struttura cristallina avesse mollato a metà. Perfino le rocce qui sembrano stanche.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTemperateMidlands_00 = La scansione suggerisce ejecta misti e regolite rielaborata, rimestati insieme durante notti lunghissime e silenziose sotto un sole rosso e fioco.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedHighlands_00 = Frammenti grossolani producono picchi netti, suggerendo materiale antico esposto. È solido, ostinato e accogliente esattamente quanto sembra.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedImpactBasin_00 = Compaiono firme da alta pressione dove non dovrebbero assolutamente esserci. Qualunque cosa abbia scavato questo bacino ha lasciato un'impronta mineralogica abbastanza grande da vedersi da casa, prima o poi.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedPoles_00 = Picchi nitidi e basso contenuto di polvere suggeriscono una perdita continua di fini nel vuoto. I poli sono puliti, freddi e fastidiosamente lontani.
        #GEPscience_bd_XRayDiffract_EponaSrfLanded_00 = I picchi a raggi X mostrano roccia intrecciata di ghiaccio con un accenno di volatili intrappolati. Il campione sembra aver aspettato a lungo un messaggio più caldo da casa.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTropicalLowlands_00 = Picchi ampi suggeriscono grani fini macinati dalla brina, mescolati a minerali più scuri. La luce diurna rossa e fioca di Epona non scioglie molto, ma è bravissima a spaccare le cose.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTemperateLowlands_00 = Il pattern mostra firme simili a clatrati accanto a silicati ordinari. Persino le pianure più banali sembrano nascondere un segreto freddo e pressurizzato.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTropicalUplands_00 = Fasi multiple si sovrappongono come nevicate a strati trasformate in pietra. La distanza reticolare cambia quel tanto che basta da farti ricontrollare la calibrazione... di nuovo... dopo il ritardo nelle comunicazioni.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTemperateUplands_00 = Riflessioni nette da cristalli più tenaci si appoggiano su una tenue foschia amorfa. La superficie è stata sabbiata in silenzio dalle radiazioni mentre il sole finge di dare una mano.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedHighlands_00 = Grani grossolani producono picchi forti e puliti, materiale di crosta antico con alterazione minima. È abbastanza robusto per costruirci sopra, se ti piace costruire al buio.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedGrandPeaks_00 = Compaiono fasi da alta pressione dove non dovrebbero su un mondo ghiacciato. O questi picchi sono stati schiacciati con forza, oppure l'interno di Epona sta ancora facendo qualcosa di interessante.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedCraters_00 = Picchi allargati da shock e grani polverizzati dominano la scansione. I crateri si leggono come una lunga e silenziosa discussione tra impatti e ghiaccio.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedVolcanoes_00 = Un ordinamento minerale inatteso mostra segni di riscaldamento e rapido ricongelamento. Se questo è materiale criovulcanico, è il tipo più freddo di "lava fresca" che rimpiangerai di aver toccato.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedPoles_00 = Picchi nitidi e gelidi e firme di bassa polvere suggeriscono una perdita continua di fini nel vuoto. Il suolo polare è pulito, fragile e del tutto disinteressato alle impronte.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLanded_00 = Il diffrattogramma è semplice, netto e poco amichevole, roccia priva d'aria con facce cristalline scalfite dalle radiazioni. Rosmerta tiene la sua mineralogia solitaria quanto la sua orbita.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTropicalLowlands_00 = La regolite fine produce picchi allargati a causa di continui microimpatti. I grani sembrano essere stati lentamente polverizzati sotto un sole rosso indifferente.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTemperateLowlands_00 = Un mix polveroso di minerali comuni mostra deboli caratteristiche da shock. La superficie è praticamente un allestimento museale, curato dal tempo e dalle tempeste di particelle.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTropicalMidlands_00 = Diversi picchi deboli suggeriscono fasi esotiche in traccia, poi svaniscono nel rumore. O il campione è insidioso, o Rosmerta ama gli scherzi a distanze di minuti luce.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTemperateMidlands_00 = La distanza reticolare è sorprendentemente coerente tra i grani, come se la roccia fosse stata immersa nel freddo da sempre. Il tuo riscaldatore si sente attaccato sul personale.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedHighlands_00 = Frammenti più grossolani producono riflessioni forti da materiale più vecchio e più pulito. Le colline sembrano scheggiate direttamente dal tempo profondo.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedPoles_00 = Fini intrappolati dal freddo producono picchi affilati come rasoi, ma la foschia di fondo suggerisce danni da radiazione costanti. Anche i luoghi tranquilli qui non sono davvero tranquilli.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLanded_00 = La scansione non sa decidersi: alcuni picchi urlano "roccia", altri sussurrano "ghiaccio". Per una cattura sospetta, è un modo molto in linea con il personaggio di evitare le domande.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedLowlands_00 = Riflessioni ampie e di bassa intensità suggeriscono grani poco compattati e scarso ordine cristallino. Qualunque cosa sia, ha sbattuto in giro nel sistema per molto tempo.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedEasternHighlands_00 = Picchi più netti indicano materiale più tenace e più cristallino, forse il "nucleo" di un corpo che non è nato qui. Controllo Missione aggiunge "da dove?" a una lista già lunghissima.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedWesternHighlands_00 = Fasi miste e reticoli in tensione implicano shock ripetuti e cicli termici. La roccia sembra aver viaggiato lontano e ricorda ogni chilometro.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLanded_00 = Firme ghiacciate si sovrappongono a un'impalcatura rocciosa scarna, con tracce che sembrano volatili antichi e congelati. Il mondo nano dà l'idea di uno sgabuzzino di stoccaggio del sistema esterno.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTropicalLowlands_00 = Brina fine e detriti producono un pattern a strati di picchi di ghiaccio e silicati. Sotto il bagliore fioco di Grannus, il suolo cambia lentamente, ma cambia.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTemperateLowlands_00 = Il diffrattogramma mostra picchi puliti del ghiaccio più un fondo minerale polveroso. È come mescolare neve e sabbia e poi togliere tutto il divertimento.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTropicalMidlands_00 = La scissione dei picchi suggerisce fasi multiple del ghiaccio e grani fratturati da stress. La superficie sembra scricchiolare a ogni lungo ciclo giorno notte tinto di rosso.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTemperateMidlands_00 = Compare una firma cristallina sorprendentemente ordinata, che suggerisce lenta ricottura nel gelo profondo. Il pianeta ha avuto tempo di organizzarsi, a differenza della nostra tabella di marcia.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedHighlands_00 = Frammenti grossolani producono riflessioni forti da materiale vecchio e meno rielaborato. Le colline sembrano esposte da prima che qualcuno pensasse di dar loro un nome.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedSouthPolarHills_00 = Grani irrigiditi dal freddo producono picchi nitidi, ma c'è una tenue strisciata amorfa dovuta a continui graffi di particelle. Le colline sono affilate in ogni senso.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedNorthPole_00 = La scansione mostra ghiaccio quasi puro da trappola fredda, con inclusioni di polvere in traccia. È intatto, inquietante e così lontano che i risultati arrivano a casa con un senso di nostalgia.

        // bd_XrayImaging
        #GEPscience_XrayImaging_GrannusInSpace_00 = Il rivelatore registra una variabilità rapida. Per un attimo sospetti un errore strumentale, poi ricordi che stai osservando una stella da vicino.
        #GEPscience_XrayImaging_GrannusInSpace_01 = Ottieni una curva di luce ai raggi X nitida e realizzi che, tecnicamente, stai facendo astrofisica del profondo spazio mentre orbiti attorno alla sorgente.
        #GEPscience_XrayImaging_GrannusInSpace_02 = La corona della stella è spettacolare ai raggi X. Decidi che "spettacolare" è anche una valutazione del rischio ragionevole.
        #GEPscience_XrayImaging_GrannusInSpaceLow_00 = Il rivelatore fatica a decidere se Grannus sia una stella o un'etichetta di avvertimento lampeggiante. Tra i picchi dei brillamenti, catturi sorgenti lontane che ribollono a milioni di gradi.
        #GEPscience_XrayImaging_GrannusInSpaceHigh_00 = Lontano dall'abbagliamento, il cielo smette finalmente di urlare. Registri una manciata di punti di raggi X duri e poi ricordi che il downlink arriverà dopo l'ora dello spuntino... su Kerbin.
        #GEPscience_XrayImaging_TaranisInSpaceLow_00 = L'imager a raggi X continua a rilevare scatti energetici ogni volta che punti verso il sole rosso e fioco. Controllo Missione chiede "un'altra esposizione" e tu la metti in coda dietro la prossima mezz'ora di ritardo del segnale.
        #GEPscience_XrayImaging_TaranisInSpaceHigh_00 = Da più in alto, Taranis è una brace luminosa incollata a una moneta nera. Lunghe integrazioni tirano fuori dal vuoto deboli sorgenti X, e a nessuna importa quale lato sia "giorno".
        #GEPscience_XrayImaging_ToutatisInSpaceLow_00 = Un'atmosfera sottile fa del suo meglio per esistere sotto di te mentre lo strumento la fissa oltre. I dati suggeriscono che là fuori qualcosa sta scaldando plasma a temperature assurde, e non è il riscaldatore del caffè.
        #GEPscience_XrayImaging_ToutatisInSpaceHigh_00 = Costruisci una mappa del cielo a raggi X mentre Toutatis fa ruotare fuoco, crepuscolo e oscurità sotto di te. Quando i risultati arrivano a casa, il telescopio ha già riempito lo storage di bersagli "bonus".
        #GEPscience_XrayImaging_NodensInSpaceLow_00 = Nodens riempie metà del cielo, quindi usi il suo lembo come un otturatore. Ogni occultazione scopre un altro gruppo di sorgenti X da milioni di gradi, poi ricordi che i log non arriveranno a casa per un po'.
        #GEPscience_XrayImaging_NodensInSpaceHigh_00 = Con Nodens ridotto a una moneta maculata e Grannus a una brace rossa e fioca, l'imager finalmente si rilassa. Lunghe esposizioni estraggono puntini di raggi X duri da un cielo che sembra troppo grande per appartenere a qualcuno.
        #GEPscience_XrayImaging_BelisamaInSpaceLow_00 = Il lato in ombra permanente è perfetto per i raggi X: niente abbagliamento, niente comfort, solo conteggi puliti. Guardi plasmi roventi brillare in lontananza mentre Belisama resta fredda e silenziosa sotto di te.
        #GEPscience_XrayImaging_BelisamaInSpaceHigh_00 = Da più in alto, Belisama e Nodens si scambiano lenti eclissi come un orologio. Ogni volta che la vista si libera, compare un altro debole oggetto a raggi X, in paziente attesa attraverso gli stessi lunghi ritardi che stai vivendo tu.
        #GEPscience_XrayImaging_SucellusInSpaceLow_00 = Sucellus è un'ancora scura a bassa gravità in un cielo altrimenti vuoto. Il rivelatore registra un fondo a raggi X scarso ma ostinato, come se l'universo sussurrasse attraverso la statica.
        #GEPscience_XrayImaging_SucellusInSpaceHigh_00 = Molto sopra Sucellus, il sole rosso è solo un'altra luce lontana e "su" perde significato. Metti insieme una mappa del cielo a raggi X che sembra inviata da molto lontano, perché lo è.
        #GEPscience_XrayImaging_CaireenInSpaceLow_00 = La minuscola Caireen sobbalza sotto la navicella, facendo strisciare le stelle se sbatti le palpebre. Accorci le esposizioni e catturi comunque qualche lampo X luminoso che non si cura dei tuoi problemi di puntamento.
        #GEPscience_XrayImaging_CaireenInSpaceHigh_00 = Da molto in alto, Caireen è a malapena un punto di riferimento e l'imager passa la maggior parte del tempo a fissare il nero. I bersagli migliori sono impossibilmente caldi e impossibilmente lontani e il downlink sembra altrettanto distante.
        #GEPscience_XrayImaging_SironaInSpaceLow_00 = Lasci che l'enorme lembo di Sirona blocchi il sole rosso e fioco e fissi il varco freddo che resta dietro. L'imager conta alcune sorgenti X nette che sembrano troppo calde per essere vicine.
        #GEPscience_XrayImaging_SironaInSpaceHigh_00 = Da molto in alto sopra il gigante gassoso, "su" è solo la direzione verso cui punta l'antenna. Lunghe esposizioni tirano fuori deboli raggi X duri dal nero e il ritardo del downlink fa sembrare le scoperte ancora più lontane.
        #GEPscience_XrayImaging_AirmedInSpaceLow_00 = L'orbita bassa ti dà un'ombra in rapido movimento in cui nasconderti mentre il telescopio lavora. Il cielo risponde con sottili lampi energetici, poi torna al silenzio, come se sapesse che qui nessuno può rispondere in fretta.
        #GEPscience_XrayImaging_AirmedInSpaceHigh_00 = Più in alto, la vista si stabilizza e lo strumento smette di litigare con i tuoi getti d'assetto. Una mappa a raggi X scarna si costruisce lentamente, un puntino da milioni di gradi alla volta, sotto la luce rossa e spenta di Grannus.
        #GEPscience_XrayImaging_BorvoInSpaceLow_00 = Borvo scorre sotto di te come un segno di riferimento scuro mentre l'imager osserva la vera azione sopra. I conteggi suggeriscono plasma lontano a temperature assurde, completamente disinteressato alla tua tabella di navigazione.
        #GEPscience_XrayImaging_BorvoInSpaceHigh_00 = Dall'orbita alta, Borvo è quasi un ripensamento e il cielo è l'intera missione. Registri un fondo a raggi X ostinato che sembra più vecchio del tuo collegamento di comunicazione.
        #GEPscience_XrayImaging_DamonaInSpaceLow_00 = Cronometri le esposizioni sulle tratte più lunghe di oscurità e fai finta che sia "routine". Eppure alcuni punti X luminosi bucano lo stesso, come se l'universo stesse testando i limiti del tuo rivelatore per divertimento.
        #GEPscience_XrayImaging_DamonaInSpaceHigh_00 = In alto, il telescopio ottiene finalmente il silenzio che vuole, niente abbagliamento, niente fretta, solo vuoto freddo e calore lontano. Quando Controllo Missione vede i dati, tu sei già passato a un altro pezzo di cielo sconosciuto.
        #GEPscience_XrayImaging_EponaInSpaceLow_00 = Usi il lembo scuro di Epona come parasole e lasci che l'imager fissi il freddo. Il rivelatore trova comunque puntini di caos da milioni di gradi, come se l'universo non sapesse stare fermo.
        #GEPscience_XrayImaging_EponaInSpaceHigh_00 = Molto sopra il mondo ghiacciato, Grannus è una brace rossa e fioca e il cielo sembra irragionevolmente grande. Lunghe integrazioni costruiscono una mappa sottile a raggi X che richiederà ancora più tempo per essere spiegata a casa.
        #GEPscience_XrayImaging_RosmertaInSpaceLow_00 = Rosmerta è piccola, silenziosa e bravissima a togliersi di mezzo. Ogni eclissi ti regala una vista pulita di deboli sorgenti X, e nessuna sembra interessata a essere visitata.
        #GEPscience_XrayImaging_RosmertaInSpaceHigh_00 = Da quassù, Rosmerta è un puntino solitario e la "notte" è solo quando l'antenna non è impegnata. Registri una manciata di punti di raggi X duri e ti chiedi se qualcuno sarà ancora sveglio quando i dati arriveranno.
        #GEPscience_XrayImaging_RAB-58EInSpaceLow_00 = Il piccolo planetesimo irregolare fa impazzire la tua soluzione di puntamento. Eppure l'imager cattura alcuni lampi X netti che sembrano provenire da gas impossibilmente caldo e molto lontano.
        #GEPscience_XrayImaging_RAB-58EInSpaceHigh_00 = Con RAB-58E a malapena un segno di riferimento, smetti di provare a "fotografare la luna" e ti limiti a rilevare il vuoto. Il fondo a raggi X arriva come statica lontana, con doppio ritardo, una volta per lo spazio e una volta per le comunicazioni.
        #GEPscience_XrayImaging_CernunnosInSpaceLow_00 = Cernunnos scivola sotto di te come un segnale di confine ghiacciato ai margini del sistema. Lo strumento trova sorgenti lontane ad alta energia che bruciano più calde di qualunque cosa vicina, facendo sembrare ancora più freddo il paesaggio locale.
        #GEPscience_XrayImaging_CernunnosInSpaceHigh_00 = Molto sopra Cernunnos, il sole rosso dà più atmosfera che luce. Metti insieme una striscia di cielo a raggi X di deboli punti duri, prove di calore estremo consegnate attraverso distanza estrema.

        // logIonTrap
        #GEPscience_logIonTrap_GrannusInSpaceLow_00 = La trappola ionica va in saturazione quasi subito, come se la nana rossa stesse cercando personalmente di firmare il flusso dati. Il "per favore, ripeti" di Controllo Missione arriva molto dopo che la trappola si è già raffreddata di nuovo.
        #GEPscience_logIonTrap_GrannusInSpaceHigh_00 = Anche quassù, il flusso di particelle arriva a raffiche e pause, come un bollettino meteo scritto in polvere carica. Gli intervalli quieti sono stranamente più inquietanti di quelli rumorosi.
        #GEPscience_logIonTrap_TaranisInSpaceLow_00 = Vicino a Taranis, la trappola cattura un mix duro di ioni veloci e frammenti più pesanti sputterizzati, come se il pianeta stesse evaporando lentamente nello spazio. Il rivelatore insiste che è "entro i limiti", ma lo dice di tutto.
        #GEPscience_logIonTrap_TaranisInSpaceHigh_00 = A questa quota il segnale si stabilizza in un flusso implacabile proveniente da Grannus, con picchi netti ogni volta che attraversi il confine giorno notte. Sembra di volare sul bordo di un forno e di un congelatore allo stesso tempo.
        #GEPscience_logIonTrap_ToutatisInSpaceLow_00 = La trappola rileva una ionosfera sottile e a chiazze che si accende vicino al terminatore e svanisce sul lato buio, come un bagliore riluttante. Etichetti il file "forse-atmosfera, maneggiare con cura" prima della prossima finestra di comunicazione.
        #GEPscience_logIonTrap_ToutatisInSpaceHigh_00 = Molto sopra Toutatis, le letture alternano calma e improvvise raffiche, suggerendo uno scudo magnetico debole spinto in giro dal vento stellare. Le particelle arrivano per prime, la spiegazione arriva diversi minuti dopo.
        #GEPscience_logIonTrap_NodensInSpaceLow_00 = La trappola ionica entra ed esce di continuo dal "meteo" magnetosferico di Nodens, con picchi ogni volta che il bagliore del lato notturno scorre sotto di te. Quando Controllo Missione chiede cosa significhi, i picchi si sono già spostati altrove.
        #GEPscience_logIonTrap_NodensInSpaceHigh_00 = Più lontano, la trappola legge un vento costante di particelle cariche sotto il sole rosso e fioco, con occasionali raffiche nette che sembrano capricci lontani. Il silenzio tra le raffiche è abbastanza lungo da farti notare quanto sei lontano da casa.
        #GEPscience_logIonTrap_BelisamaInSpaceLow_00 = Vicino a Belisama, la trappola cattura un sottile spruzzo di ioni e detriti carichi, come se la luna si stesse levigando lentamente nello spazio. Il segnale cala ogni volta che Nodens blocca il vento, un enorme e silenzioso "nessun dato" che dura più della tua finestra di comunicazione.
        #GEPscience_logIonTrap_BelisamaInSpaceHigh_00 = Molto sopra la coppia in rotazione sincrona, il flusso di particelle alterna spazio aperto e la lunga scia magnetica stirata di Nodens. La trappola lo registra diligentemente, mentre tutti fingono che un "ricevuto" in ritardo sia rassicurante.
        #GEPscience_logIonTrap_SucellusInSpaceLow_00 = La trappola ionica conta un mix granuloso di ioni lenti e picchi energetici, come se Sucellus stesse perdendo una coda tenue e invisibile. Il display lo etichetta "interessante" con lo stesso font calmo che usa per "surriscaldato".
        #GEPscience_logIonTrap_SucellusInSpaceHigh_00 = Più lontano, il flusso di particelle si leviga in un vento costante da sole rosso, con occasionali impulsi netti che non coincidono con alcun ciclo familiare. Inizi a segnare gli orari in "finestre di comunicazione" invece che in "minuti".
        #GEPscience_logIonTrap_CaireenInSpaceLow_00 = Vicino a Caireen, la trappola ionica cattura raffiche di ioni più pesanti che sembrano sospettosamente materiale superficiale scosso e incoraggiato elettricamente a staccarsi. Lo strumento insiste che sta solo misurando particelle, non giudicando la tua traiettoria.
        #GEPscience_logIonTrap_CaireenInSpaceHigh_00 = Sopra Caireen, il flusso sfarfalla mentre entri ed esci dalla scia magnetica del suo primario. Gli intervalli quieti sembrano troppo lunghi, ancor prima di ricordarti il tempo luce verso casa.
        #GEPscience_logIonTrap_SironaInSpaceLow_00 = La trappola passa dalla calma al caos mentre l'ambiente carico di Sirona afferra il vento solare e lo riorganizza in qualcosa di nuovo. I picchi si allineano ai passaggi tra le bande come se il pianeta fosse "striato" fino al plasma.
        #GEPscience_logIonTrap_SironaInSpaceHigh_00 = Molto sopra Sirona, il rivelatore registra onde ampie e lente di particelle, punteggiate da improvvise impennate sottili come aghi. Qualunque cosa stia guidando questo campo lo fa da lontano e senza chiedere permesso.
        #GEPscience_logIonTrap_AirmedInSpaceLow_00 = La trappola ionica viene travolta all'istante da un getto di particelle duro e senza schermatura, Airmed non ha campo magnetico e si vede. I conteggi raggiungono i picchi più forti sopra il terreno bicolore, come se la superficie fosse "dipinta" anche di carica oltre che di colore.
        #GEPscience_logIonTrap_AirmedInSpaceHigh_00 = Più in alto, le letture si assestano nell'influenza lontana di Sirona, punteggiate da improvvise raffiche dal sole rosso e fioco. Il pacchetto dati arriva a casa così tardi che la trappola ha già finito di allarmarsi per la cosa.
        #GEPscience_logIonTrap_BorvoInSpaceLow_00 = L'atmosfera sottile di Borvo e i suoi strati alti attivi alimentano la trappola con un mix di ioni di azoto e metano sorprendentemente ordinato. È la cosa più vicina al "meteo" che puoi misurare senza toccare mai l'aria.
        #GEPscience_logIonTrap_BorvoInSpaceHigh_00 = Sopra Borvo, il segnale passa dalla chimica ionosferica locale al rimescolamento più ampio della magnetosfera di Sirona. La trappola registra un impulso lungo e lento che sembra un messaggio, purtroppo non uno che puoi decifrare prima della prossima finestra di comunicazione.
        #GEPscience_logIonTrap_DamonaInSpaceLow_00 = Damona non offre alcun riparo magnetico, quindi la trappola ionica conta particelle come un secchio bucato conta l'acqua, in fretta, senza sosta e con un che di insultante. Sopra la grande cicatrice in superficie, compaiono ioni più pesanti come se la luna ricordasse ancora l'impatto.
        #GEPscience_logIonTrap_DamonaInSpaceHigh_00 = Più lontano, derivi attraverso un tratto quieto che si spezza all'improvviso in raffiche nette quando passa la scia di Sirona. Il ritardo verso casa fa sembrare il silenzio più lungo del dovuto, anche quando i numeri insistono che è tutto "nominale".
        #GEPscience_logIonTrap_EponaInSpaceLow_00 = La trappola ionica rileva un sottile e puntiglioso cocktail di ioni di azoto, con abbastanza metano da tenere svegli i chimici. I conteggi ondeggiano mentre il debole campo di Epona fa del suo meglio per sembrare sicuro di sé sotto il sole rosso e fioco.
        #GEPscience_logIonTrap_EponaInSpaceHigh_00 = Molto sopra Epona, il segnale si appiattisce nel vento stellare costante, poi singhiozza in lenti impulsi che non corrispondono a nessun ritmo familiare. Quando i dati arrivano a casa, la trappola è già passata al suo prossimo mistero.
        #GEPscience_logIonTrap_RosmertaInSpaceLow_00 = Sopra la solitaria Rosmerta, la trappola ionica cattura a tratti ioni più pesanti che sembrano materiale superficiale sabbiato in silenzio nello spazio. È difficile dire cosa sia più privo d'aria, la luna o il canale radio.
        #GEPscience_logIonTrap_RosmertaInSpaceHigh_00 = Più in alto, la trappola deriva nella scia lontana di Epona, quieta, poi improvvisamente rumorosa, come entrare dietro un muro e scoprire che è elettrificato. Segni il punto di transizione e aspetti una risposta che arriva molto dopo delle particelle.
        #GEPscience_logIonTrap_RAB-58EInSpaceLow_00 = Vicino a RAB-58E, la trappola ionica registra raffiche di ioni leggeri che vanno e vengono mentre sfiori il passaggio, come se il piccolo planetesimo non sapesse decidersi tra roccia e brina. Lo strumento lo archivia come "stranezze da cattura" e si rifiuta di aggiungere dettagli.
        #GEPscience_logIonTrap_RAB-58EInSpaceHigh_00 = Quassù domina il fondo, raggi cosmici, vento stellare tenue e occasionali picchi di detriti carichi dal nulla in particolare. Il vuoto tra i picchi sembra più lungo quando il sole rosso è solo una brace spenta alle tue spalle.
        #GEPscience_logIonTrap_CernunnosInSpaceLow_00 = La trappola ionica annusa un'esosfera estremamente riluttante: ioni deboli, più freddi del controllore d'assetto della sonda, con impennate sporadiche quando la luce solare sfiora il lembo. Cernunnos sarà anche piccolo, ma riesce comunque a essere complicato.
        #GEPscience_logIonTrap_CernunnosInSpaceHigh_00 = Molto sopra Cernunnos, la trappola conta per lo più l'universo invece del mondo, finché un'onda lenta e ampia non rotola attraverso come un sospiro magnetico lontano. Inizi a pensare in minuti luce invece che in metri.

        // logmmImpacts
        #GEPscience_logmmImpacts_GrannusInSpaceLow_00 = Il rivelatore registra uno staccato di impatti, alcuni granelli sembrano mezzo cotti dal bagliore rosso e lasciano comunque piccoli crateri ordinati. Controllo Missione lo scopre molto dopo che hai già applicato la prima toppa allo scafo.
        #GEPscience_logmmImpacts_GrannusInSpaceHigh_00 = Quassù gli impatti arrivano come tic solitari, come se qualcuno stesse verificando che la tua nave sia ancora lì. Il tasso cala, ma quei pochi colpi che arrivano sono scomodamente energetici.
        #GEPscience_logmmImpacts_TaranisInSpaceLow_00 = In orbita bassa su Taranis, il contatore impazzisce come se il pianeta stesse perdendo continuamente nuovi frammenti dalla sua brutale spaccatura tra giorno e notte. Ogni ping ricorda che "schermatura" è solo un altro modo per dire "massa extra".
        #GEPscience_logmmImpacts_TaranisInSpaceHigh_00 = In orbita più alta, gli impatti si diradano in una lenta e paziente pioggerellina, suggerendo che la maggior parte dei detriti resta vicino alla superficie. La lettura con ritardo lungo fa sembrare che l'universo stia segnalando i colpi a orario.
        #GEPscience_logmmImpacts_ToutatisInSpaceLow_00 = Vicino a Toutatis, il rivelatore cattura raffiche di minuscoli impatti che sembrano raggrupparsi vicino al confine caldo freddo, dove la superficie non sa decidere che forma vuole avere. Le cicatrici sembrano abbastanza fresche da farti pensare per un attimo di presentare un reclamo al pianeta.
        #GEPscience_logmmImpacts_ToutatisInSpaceHigh_00 = Molto sopra Toutatis, gli impatti sono rari ma drammatici, ognuno arriva come se avesse viaggiato fin dal sole rosso e fioco solo per infastidirti sul personale. Il "hai sentito?" in ritardo di Controllo Missione arriva dopo il ping successivo.
        #GEPscience_logmmImpacts_NodensInSpaceLow_00 = Il contatore d'impatto cinguetta a raffiche brevi mentre sfiori Nodens, qualunque cosa ci sia nella polvere di questo sistema è più scura e più tagliente di quanto ti aspettassi sotto il sole rosso. Il consiglio di Controllo Missione arriva diversi minuti dopo che hai già smesso di sussultare.
        #GEPscience_logmmImpacts_NodensInSpaceHigh_00 = Più in alto, gli impatti diventano tic rari e solitari, come se il vuoto stesse testando lo scafo alla ricerca di punti deboli. La telemetria con ritardo lungo fa sembrare che tu stia leggendo il bollettino meteo di ieri per le ammaccature di domani.
        #GEPscience_logmmImpacts_BelisamaInSpaceLow_00 = Vicino a Belisama il rivelatore registra un bombardamento costante, come se la luna in rotazione sincrona stesse rastrellando detriti e lanciando gli avanzi sulla tua traiettoria. Inizi a classificare gli impatti in "graffio", "botta" e "problema futuro".
        #GEPscience_logmmImpacts_BelisamaInSpaceHigh_00 = Più lontano, i colpi rallentano ma sembrano più cattivi, suggerendo che poche particelle hanno superato il viaggio, ma nessuna è educata. La luce rossa sui pannelli fa sembrare ogni nuovo segno come se fosse lì da sempre, finché il contatore non dimostra il contrario.
        #GEPscience_logmmImpacts_SucellusInSpaceLow_00 = Il sensore d'impatto vibra con regolarità, come se Sucellus si portasse dietro una sua nuvola personale di detriti. Sotto il sole rosso e fioco, ogni ping sembra più forte del dovuto e la rassicurazione di Controllo Missione arriva elegantemente tardi.
        #GEPscience_logmmImpacts_SucellusInSpaceHigh_00 = Più in alto, i colpi arrivano come tic solitari e ben distanziati, ancora veloci, ancora maleducati, solo meno sociali. I log suggeriscono che la maggior parte dei detriti resta vicino al pianeta nano, come se non avesse voglia di lasciare il quartiere.
        #GEPscience_logmmImpacts_CaireenInSpaceLow_00 = Vicino alla minuscola Caireen, il contatore schizza in brevi raffiche, come se stessi attraversando gli avanzi delle cattive decisioni di una roccia catturata. Inizi a fidarti del sensore più che dei tuoi occhi, almeno il sensore non può far finta di non averlo visto.
        #GEPscience_logmmImpacts_CaireenInSpaceHigh_00 = Più in alto sopra Caireen, gli impatti si diradano in occasionali colpetti secchi, suggerendo che l'influenza della piccola luna è modesta ma non nulla. La telemetria in ritardo fa sembrare di leggere rapporti d'impatto dell'orbita precedente.
        #GEPscience_logmmImpacts_SironaInSpaceLow_00 = Il rivelatore si fa frenetico vicino al sistema di anelli di Sirona, registrando un bombardamento costante di polvere rapida e brillante che trasforma "spazio" in "ghiaia sottilissima". Sotto il sole rosso, gli anelli sembrano calmi, finché il contatore non dimostra che non lo sono.
        #GEPscience_logmmImpacts_SironaInSpaceHigh_00 = Più lontano, il rumore degli anelli svanisce, ma rari impatti arrivano con una convinzione inquietante, come se un frammento fuggito dalle corsie degli anelli volesse testare la tua schermatura. Quando Controllo Missione chiede se va tutto bene, hai già archiviato le ammaccature come "previste".
        #GEPscience_logmmImpacts_AirmedInSpaceLow_00 = Il contatore d'impatto cinguetta come se cercasse di imitare i pattern di cicatrici di Airmed, un'ammaccatura alla volta. Sotto il sole rosso, i detriti sembrano innocui finché non iniziano a scrivere sullo scafo.
        #GEPscience_logmmImpacts_AirmedInSpaceHigh_00 = Più in alto, i colpi diventano rari colpetti secchi, più "messaggio ricevuto" che "rumore di fondo". Il log arriva a Controllo Missione dopo che hai già smesso di controllare i pannelli ogni minuto.
        #GEPscience_logmmImpacts_BorvoInSpaceLow_00 = In orbita bassa su Borvo, gli impatti arrivano a raffiche disordinate, come se la luna non sapesse decidere se è polverosa, ghiacciata o entrambe e stesse perdendo campioni di conseguenza. La tenue foschia sotto sembra calma, ma il rivelatore insiste che è una calma molto attiva.
        #GEPscience_logmmImpacts_BorvoInSpaceHigh_00 = In orbita più alta, il tasso scende a una paziente pioggerellina e quei pochi colpi suonano fastidiosamente costosi. Il downlink in ritardo fa sembrare di leggere le ammaccature di ieri come previsione per domani.
        #GEPscience_logmmImpacts_DamonaInSpaceLow_00 = Vicino a Damona, il rivelatore registra ping raggruppati che si allineano un po' troppo ordinatamente, come se stessi attraversando il contorno invisibile di un antico incidente. La grande cicatrice in superficie all'improvviso sembra meno "storica" e più "in corso".
        #GEPscience_logmmImpacts_DamonaInSpaceHigh_00 = Più lontano, gli impatti sono infrequenti ma decisi, suggerendo che solo i frammenti più ostinati arrivano così in alto. I segni sullo scafo illuminati di rosso sono sottili finché il contatore non conferma educatamente che sì, sono nuovi.
        #GEPscience_logmmImpacts_EponaInSpaceLow_00 = Il rivelatore vibra di frequenti piccoli colpi, come se Epona stesse volando dentro il proprio alone di detriti gelidi. Sotto il sole rosso e fioco, la superficie sembra quieta, finché il log degli impatti non dimostra che "quieto" è solo una condizione di luce.
        #GEPscience_logmmImpacts_EponaInSpaceHigh_00 = Più in alto, gli impatti si riducono a tic solitari che arrivano senza uno schema che tu riesca a capire. Quando Controllo Missione riceve il rapporto, hai già rinominato il dataset "Epona: continua a tirare sassi".
        #GEPscience_logmmImpacts_RosmertaInSpaceLow_00 = Vicino a Rosmerta, gli impatti arrivano a raffiche brevi, come se la luna venisse lentamente sabbiata e condividesse educatamente la sabbia. Il display sembra quasi personale, Rosmerta sarà anche solitaria, ma la polvere locale no.
        #GEPscience_logmmImpacts_RosmertaInSpaceHigh_00 = Più lontano, il contatore resta silenzioso per lunghi tratti e poi *ping*, un promemoria che lo spazio vuoto qui ha ancora i denti. Il downlink in ritardo fa sembrare che Controllo Missione stia reagendo a impatti di un'ora fa.
        #GEPscience_logmmImpacts_RAB-58EInSpaceLow_00 = Il sensore registra un mix disordinato di piccoli colpi, come se RAB-58E ti stesse trascinando attraverso una scia catturata di qualunque cosa orbitasse un tempo. La luce rossa fa sembrare ogni nuova scalfittura vecchia, finché il contatore non insiste che è fresca.
        #GEPscience_logmmImpacts_RAB-58EInSpaceHigh_00 = In orbita alta, gli impatti sono rari ma stranamente incoerenti, come se continuassi ad attraversare corsie invisibili di detriti. Inizi a cronometrare i ping rispetto al ritardo nelle comunicazioni solo per avere l'illusione che qualcuno controlli la situazione.
        #GEPscience_logmmImpacts_CernunnosInSpaceLow_00 = Il rivelatore registra colpi radi ma secchi, suggerendo che il sistema esterno preferisce meno particelle, ma più cattive. Ogni impatto suona più forte nel silenzio e il sole rosso sopra non fa nulla per rendere il posto meno lontano.
        #GEPscience_logmmImpacts_CernunnosInSpaceHigh_00 = Quassù, il contatore per lo più aspetta... e aspetta... e poi scatta una volta, con decisione. Il "hai sentito?" di Controllo Missione arriva dopo che hai già aggiunto "probabilmente" alla checklist di ispezione dello scafo.

        // === HabTech2 ===
        // MCE
        #GEPscience_MCE_GrannusInSpaceLow_00 = La suite MCE prova a eseguire un check-out normale, ma il feed HDTV è solo bagliore rosso e statica ottimista, mentre i box COTS iniziano in silenzio a rivalutare le proprie scelte di vita.
        #GEPscience_MCE_GrannusInSpaceHigh_00 = Con Grannus più piccolo ma ancora abbagliante, il KSS-IMAP ricompone una rispettabile mappa di luminosità e il GLIMS segnala "bagliori transitori" che sono per lo più colpi di radiazione arrivati molto prima di qualunque risposta da Controllo Missione.
        #GEPscience_MCE_TaranisInSpaceLow_00 = In orbita bassa su Taranis, il lato diurno sembra voler brillare attraverso l'alloggiamento della camera, mentre il lato notturno è un buco nero per le impostazioni di esposizione, i log dei test di robotica registrano "incertezza del lubrificante" e poi smettono di aggiungere dettagli.
        #GEPscience_MCE_TaranisInSpaceHigh_00 = Da più in alto, il KSS-IMAP traccia una linea pulita tra incandescenza e oscurità e la demo gonfiabile passa l'intero transito alternando irrigidimenti e rilassamenti, come se non sapesse decidere quale emisfero preferisce.
        #GEPscience_MCE_ToutatisInSpaceLow_00 = Il sistema HDTV cattura un lembo sottile e fosco e un contrasto superficiale duro, mentre il GLIMS insiste di aver visto un debole sfarfallio nell'alta atmosfera, tutti concordano di chiamarlo "interessante" finché la telemetria in ritardo non dica il contrario.
        #GEPscience_MCE_ToutatisInSpaceHigh_00 = Dall'orbita alta la mappa sembra ordinata, ma i log di radiazione della MCE continuano ad aggiungere piccoli asterischi a ogni nota "il COTS è sopravvissuto", come se Toutatis stesse valutando l'hardware con una matita piccolissima e severissima.
        #GEPscience_MCE_NodensInSpaceLow_00 = La suite MCE fissa l'aria densa e le nubi ostinate di Nodens, il KSS-IMAP disegna bande meteo mentre il GLIMS continua a "vedere sprites" che si rivelano essere il sensore HDTV che si lamenta dell'abbagliamento del sole rosso.
        #GEPscience_MCE_NodensInSpaceHigh_00 = Dall'orbita alta la mappatura finalmente sembra calma e globale, ma ogni pacchetto impiega un'eternità a tornare, quindi i box COTS finiscono gli auto-test molto prima che Controllo Missione finisca di leggere la prima pagina.
        #GEPscience_MCE_BelisamaInSpaceLow_00 = In orbita bassa su Belisama, la superficie passa da accecante a nera pece in pochi minuti, i filmati di test dell'HDTV sono drammatici e la demo di robotica impara che "in rotazione sincrona" significa comunque che il sole può sorprenderti.
        #GEPscience_MCE_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama e Nodens sembrano un'esposizione in coppia sotto una luce rossa e fioca, il KSS-IMAP mappa i contrasti con pulizia e il log di sopravvivenza nota che la "radiazione normale" qui sembra comunque personale.
        #GEPscience_MCE_SucellusInSpaceLow_00 = Vicino a Sucellus, tutto è nitido, freddo e molto silenzioso, il test della struttura gonfiabile resta gonfio, la camera resta a fuoco e il GLIMS non segnala nulla, quasi in modo sospetto.
        #GEPscience_MCE_SucellusInSpaceHigh_00 = Più in alto, il rilievo globale sembra ordinato finché il monitor di radiazione non inizia ad aggiungere cifre extra, l'hardware COTS continua a funzionare lo stesso, come se l'ostinazione fosse una strategia di schermatura valida.
        #GEPscience_MCE_CaireenInSpaceLow_00 = In orbita bassa attorno alla minuscola Caireen, la navicella continua a darsi piccoli colpetti in modalità "non schiantarti" mentre la camera HDTV prova a seguire un orizzonte irregolare, i colpi di radiazione fanno scintillare l'immagine come se volesse essere festosa.
        #GEPscience_MCE_CaireenInSpaceHigh_00 = Da molto lontano, Caireen è a malapena un bersaglio ed è soprattutto un problema di matematica, la suite MCE produce comunque un dataset completo, poi aspetta in silenzio il lungo "bravo" in ritardo da casa.
        #GEPscience_MCE_SironaInSpaceLow_00 = In orbita bassa su Sirona, il KSS-IMAP prova a trasformare bande di nubi imponenti in tessere ordinate, mentre il test HDTV continua a catturare il riflesso degli anelli e a lavare l'intero fotogramma in un bagliore rosso e fioco.
        #GEPscience_MCE_SironaInSpaceHigh_00 = Dall'orbita alta, la suite ottiene finalmente una mappa a disco intero, l'avionica COTS supera i controlli e poi resta in silenzio in attesa del lungo riconoscimento in ritardo da lontano.
        #GEPscience_MCE_AirmedInSpaceLow_00 = Vicino ad Airmed, la camera guarda oltre un orizzonte netto e continua a trovare Sirona che riempie metà del cielo, il REX-J registra una risposta costante degli attuatori mentre gli strumenti discutono se la "storia violenta" sia un parametro misurabile.
        #GEPscience_MCE_AirmedInSpaceHigh_00 = Da più in alto, il rilievo sembra ordinato finché il monitor ambientale non inizia a cospargere il dataset di piccoli errori, il rapporto li etichetta "meteo spaziale" e spera che nessuno chieda di che tipo.
        #GEPscience_MCE_BorvoInSpaceLow_00 = In orbita bassa su Borvo, il test HDTV mostra contrasti duri e ombre lunghe che non si comportano come a casa, la demo gonfiabile tiene la pressione, ma le letture termiche insistono che il freddo sta cercando di dimostrare qualcosa.
        #GEPscience_MCE_BorvoInSpaceHigh_00 = Dall'orbita alta, il KSS-IMAP delinea ampie strisce pallide e cuciture più scure, mentre il GLIMS non segnala nulla, solo il quieto ronzio dell'hardware che sopravvive sotto un sole rosso lontano.
        #GEPscience_MCE_DamonaInSpaceLow_00 = L'orizzonte irregolare di Damona scorre rapido, il REX-J compensa piccoli colpetti d'assetto mentre la camera allunga le esposizioni finché l'immagine non inizia a scintillare di colpi di radiazione.
        #GEPscience_MCE_DamonaInSpaceHigh_00 = Da molto lontano, Damona è soprattutto un puntino bersaglio e tanto vuoto, la suite MCE completa comunque la checklist, poi aspetta in silenzio la risposta che impiega un'eternità ad arrivare.
        #GEPscience_MCE_EponaInSpaceLow_00 = La suite MCE esegue il check-out del COTS mentre il KSS-IMAP traccia ampi vortici di nubi, il GLIMS segnala alcuni bagliori netti sul lato notturno e il test HDTV li registra come "decisamente qualcosa, probabilmente non un bug".
        #GEPscience_MCE_EponaInSpaceHigh_00 = Dall'orbita alta, la mappa a disco intero si ricompone sotto una luce rossa e fioca e il log di sopravvivenza nota che "grado commerciale" conta comunque come "grado spaziale" se strizzi gli occhi attraverso abbastanza rumore di radiazione.
        #GEPscience_MCE_RosmertaInSpaceLow_00 = In orbita bassa su Rosmerta, la superficie sembra fragile e ignorata, il SIMPLE resta gonfio ma scricchiola negli sbalzi termici e il REX-J si muove come se avesse paura di svegliare la luna.
        #GEPscience_MCE_RosmertaInSpaceHigh_00 = Da quassù Rosmerta diventa una piccola tacca fredda accanto a Epona, il KSS-IMAP riesce solo a abbozzare contrasti ampi e il ritardo della telemetria rende persino "tutti i sistemi nominali" un po' solitario.
        #GEPscience_MCE_RAB-58EInSpaceLow_00 = RAB-58E si rifiuta di essere un bersaglio ordinato, il suo orizzonte irregolare sfreccia mentre la camera HDTV sobbalza e la demo di robotica dimostra in silenzio che "restare puntati" è anche un test di sopravvivenza.
        #GEPscience_MCE_RAB-58EInSpaceHigh_00 = Molto sopra il planetesimo, gli strumenti MCE misurano soprattutto vuoto e colpi di fondo, il rapporto torna con un dataset ordinato e una lunga pausa dove dovrebbe esserci una spiegazione.
        #GEPscience_MCE_CernunnosInSpaceLow_00 = Vicino a Cernunnos, la scena è fatta di distese scure e giunture nette, il KSS-IMAP mappa una luminosità debole e irregolare mentre il GLIMS continua a registrare piccoli bagliori che potrebbero essere reali, oppure solo il sole rosso e le particelle cariche che complottano.
        #GEPscience_MCE_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos sembra un tranquillo avamposto di confine del sistema, la suite MCE finisce la checklist, poi aspetta attraverso il lungo ritardo nelle comunicazioni che qualcuno lontano concordi che è successo davvero.

        // SEDA
        #GEPscience_SEDA_GrannusInSpaceLow_00 = I contatori della SEDA vanno in saturazione a impulsi, ioni pesanti e neutroni schizzano come se Grannus stesse "respirando". Controllo Missione chiede di ripetere. La ripetizione sembra peggio.
        #GEPscience_SEDA_GrannusInSpaceHigh_00 = Con un po' di distanza, gli strumenti finalmente concordano su una baseline: un vento sottile e implacabile da nana rossa, cosparso di polvere e particelle energetiche. I dati arrivano tardi, ma arrivano.
        #GEPscience_SEDA_TaranisInSpaceLow_00 = I sensori al plasma urlano sul lato diurno e sussurrano sul lato notturno. Senza riparo magnetico, il test dell'elettronica diventa un lancio della moneta molto costoso.
        #GEPscience_SEDA_TaranisInSpaceHigh_00 = Sopra Taranis, la SEDA mappa un flusso di particelle duro che scava linee dritte nel vuoto. Il sole rosso sembra vicino, anche quando il pianeta appare piccolo.
        #GEPscience_SEDA_ToutatisInSpaceLow_00 = La suite fiuta un'esosfera sottile e irrequieta, frammenti carichi e granelli di polvere che viaggiano in archi lenti. Il vassoio dei materiali sviluppa una nuova "patina" che nessuno aveva ordinato.
        #GEPscience_SEDA_ToutatisInSpaceHigh_00 = Più lontano, il debole campo di Toutatis lascia solo una firma tenue nel flusso di particelle. È per lo più quieto, finché una raffica improvvisa non ti ricorda quanto deve viaggiare il segnale di ritorno.
        #GEPscience_SEDA_NodensInSpaceLow_00 = In orbita bassa su Nodens, la SEDA osserva l'alta atmosfera mordere i campioni di esposizione con ossigeno atomico, mentre le sonde al plasma tracciano una ionosfera indaffarata. Il sole rosso e fioco fa sembrare familiari i numeri, poi non più.
        #GEPscience_SEDA_NodensInSpaceHigh_00 = Più in alto, i conteggi di particelle si assestano in un ritmo protetto sotto l'ombrello magnetico di Nodens. È quasi rassicurante, finché un pacchetto in ritardo non ti ricorda quanto "casa" non sia qui.
        #GEPscience_SEDA_BelisamaInSpaceLow_00 = Sopra l'aria assente di Belisama, non c'è atmosfera ad addolcire nulla, solo ping di polvere e colpi di particelle cariche che fanno sembrare nervosa la scheda di test dell'elettronica. I sensori registrano tutto con quieta disapprovazione clinica.
        #GEPscience_SEDA_BelisamaInSpaceHigh_00 = In quota, la SEDA vede Belisama entrare e uscire dall'ombra meteo spaziale di Nodens. Le letture schermate lasciano il posto a impennate improvvise, come se la luna non sapesse decidere se vuole protezione.
        #GEPscience_SEDA_SucellusInSpaceLow_00 = Vicino a Sucellus, l'assenza di un vero campo magnetico trasforma lo spazio in un servizio di consegna diretto all'hardware per ioni pesanti e particelle energetiche. Il vassoio dei materiali guadagna una "finitura" che nessun opuscolo ha mai menzionato.
        #GEPscience_SEDA_SucellusInSpaceHigh_00 = Più lontano, la SEDA misura finalmente il flusso di particelle locale senza che il pianeta si metta di mezzo. La baseline è sottile, fredda e persistente, esattamente ciò che invia un sole rosso quando ha tutto il tempo dell'universo.
        #GEPscience_SEDA_CaireenInSpaceLow_00 = Il quartiere irregolare di Caireen è pieno di piccole sorprese: granelli di polvere, impennate di carica e impatti troppo piccoli per vederli ma abbastanza grandi da registrarli. Gli strumenti concordano su una cosa, questa non è un'orbita di parcheggio amichevole.
        #GEPscience_SEDA_CaireenInSpaceHigh_00 = Sopra Caireen, lunghi tratti di vuoto sono interrotti da brevi e netti burst di particelle e da detriti alla deriva. I dati arrivano tardi e il silenzio tra le trasmissioni sembra ancora più lungo.
        #GEPscience_SEDA_SironaInSpaceLow_00 = Le fasce di radiazione di Sirona accendono ogni sensore insieme, ioni pesanti, plasma e particelle ad alta energia arrivano in onde ordinate e terrificanti. Il contatore di polvere aggiunge un crepitio costante di detriti degli anelli per atmosfera.
        #GEPscience_SEDA_SironaInSpaceHigh_00 = Più in alto sopra Sirona, gli strumenti finalmente separano "fondo" da "panico". Il vento da sole rosso è ancora duro, ma il peggio della radiazione intrappolata svanisce in una minaccia lontana e ronzante.
        #GEPscience_SEDA_AirmedInSpaceLow_00 = Vicino ad Airmed, la SEDA conferma che la luna non ha aria per schermare nulla, l'ossigeno atomico resta quieto mentre radiazione e particelle energetiche fanno tutti i danni. La scheda di test dell'elettronica rivaluta in silenzio le proprie scelte di carriera.
        #GEPscience_SEDA_AirmedInSpaceHigh_00 = Da un'orbita più alta, Airmed sembra piccolo contro l'abbagliamento di Sirona e i sensori mappano un confine frastagliato dove la punizione della magnetosfera si attenua. I dati arrivano a filo, con lunghi ritardi, come se l'universo pensasse prima di parlare.
        #GEPscience_SEDA_BorvoInSpaceLow_00 = Sopra Borvo, le sonde al plasma abbozzano un'alta atmosfera attiva mentre i contatori di particelle registrano un ambiente più calmo e più stabile rispetto alle lune interne di Sirona. Tracce di metano compaiono come strane firme chimiche che fanno ricontrollare le etichette al team.
        #GEPscience_SEDA_BorvoInSpaceHigh_00 = Più lontano, le letture di Borvo si assestano in un profilo freddo e coerente, atmosfera sottile sotto, meteo spaziale sopra e abbastanza schermatura da rendere possibili test hardware di lunga durata. "Possibile" non è la stessa cosa di "confortevole".
        #GEPscience_SEDA_DamonaInSpaceLow_00 = Damona non offre protezione magnetica, quindi l'ambiente spaziale arriva senza filtri: colpi di ioni pesanti, impatti di radiazione e tocchi di polvere che lasciano piccole cicatrici sulle piastre di esposizione. Il sole rosso e fioco fa sembrare tutto lento e inevitabile.
        #GEPscience_SEDA_DamonaInSpaceHigh_00 = Sopra Damona, gli strumenti catturano lunghi tratti quieti punteggiati da nette raffiche di particelle che attraversano il sistema. Il silenzio tra le trasmissioni dura così a lungo che inizi a fidarti, finché l'impennata successiva non dimostra che non dovresti.
        #GEPscience_SEDA_EponaInSpaceLow_00 = Sfiorando l'alta aria sottile di Epona, la SEDA mappa uno strato di plasma vivace mentre il sensore dell'ossigeno atomico per lo più sonnecchia. Tracce di metano e un basso campo magnetico fanno sembrare il test dell'elettronica come se venisse giudicato da molto lontano.
        #GEPscience_SEDA_EponaInSpaceHigh_00 = Più in alto sopra Epona, la suite si assesta su una baseline fredda: rari tocchi di polvere, conteggi costanti di ioni pesanti e radiazione che arriva in ritmi lenti e implacabili sotto il sole rosso e fioco. Il downlink arriva tardi, come se il pianeta pensasse prima di rispondere.
        #GEPscience_SEDA_RosmertaInSpaceLow_00 = Rosmerta non ha aria e non ha scudo, quindi la SEDA registra meteo di particelle grezzo nel modo duro, ioni pesanti, neutroni e colpi energetici che lasciano la scheda di valutazione dei dispositivi leggermente offesa. Le piastre di esposizione iniziano a raccogliere una "finitura spaziale" non richiesta.
        #GEPscience_SEDA_RosmertaInSpaceHigh_00 = Da un'orbita più alta, l'ambiente di Rosmerta si assottiglia in lunghi tratti quieti punteggiati da picchi netti del vento da sole rosso. È abbastanza calmo da fidarsi, finché la raffica successiva non arriva con lo stesso ritardo del tuo rimpianto.
        #GEPscience_SEDA_RAB-58EInSpaceLow_00 = Vicino a RAB-58E, il contatore di polvere ticchetta come un metronomo nervoso mentre la radiazione resta ostinatamente alta per qualcosa di così piccolo. I sensori della SEDA concordano, questo planetesimo è soprattutto vuoto, detriti e cattivo carattere verso l'elettronica.
        #GEPscience_SEDA_RAB-58EInSpaceHigh_00 = Più lontano, gli strumenti separano il flusso di particelle dagli impatti casuali di polvere e registrano un profilo cupo e stabile. I campioni di materiale invecchiano comunque più in fretta del previsto, a quanto pare "ai margini del sistema" non è la stessa cosa di "gentile".
        #GEPscience_SEDA_CernunnosInSpaceLow_00 = In orbita bassa su Cernunnos, la SEDA trova un quartiere quieto e gelido: pochissimo plasma, quasi niente ossigeno atomico e granelli di polvere alla deriva come neve lenta. Poi una rara impennata di particelle energetiche ti ricorda che il sole rosso può arrivare anche fin qui.
        #GEPscience_SEDA_CernunnosInSpaceHigh_00 = Molto sopra Cernunnos, la suite registra un vuoto così stabile da sembrare progettato, finché particelle ad alta energia e ioni pesanti non salgono brevemente e poi calano di nuovo. Controllo Missione lo chiama "ottimi dati di baseline", che è il modo degli scienziati per dire "non è successo niente, ed è terribilmente utile".

        // === StationPartsExpansionRedux ===
        // sspxFishStudy
        #GEPscience_sspxFishStudy_GrannusFlyingHigh_00 = "In volo alto" sopra una stella sembra un errore di burocrazia diventato reale, i pesci si appiattiscono in un branco preoccupato mentre le luci della vasca tremolano di rosso e le comunicazioni restano indietro rispetto al tuo panico.
        #GEPscience_sspxFishStudy_GrannusInSpaceLow_00 = Le luci della vasca si accendono di un rosso poco salutare mentre Grannus riempie il finestrino, i pesci rispondono formando un comitato dall'aria molto preoccupata nell'angolo.
        #GEPscience_sspxFishStudy_GrannusInSpaceHigh_00 = Molto sopra il sole rosso e fioco, i pesci girano in lenti cerchi come se stessero ascoltando Controllo Missione, poi si ricordano che la risposta richiederà un po' di tempo.
        #GEPscience_sspxFishStudy_TaranisSrfLanded_00 = Fuori, il mondo non sa decidere tra rovente e congelato, dentro, i pesci votano all'unanimità per "né l'uno né l'altro" e riprendono a nuotare giri stressati.
        #GEPscience_sspxFishStudy_TaranisSrfSplashed_00 = Log di missione: siamo "ammarrati" in qualcosa che non è assolutamente compatibile con i pesci, i riscaldatori della vasca vanno in panico lo stesso e i pesci sembrano offesi dal paragone.
        #GEPscience_sspxFishStudy_TaranisInSpaceLow_00 = In orbita bassa su Taranis, la divisione netta tra luce bruciante e ombra senza fine fa sì che il ciclo giorno notte dei pesci rinunci del tutto.
        #GEPscience_sspxFishStudy_TaranisInSpaceHigh_00 = Dall'orbita alta, Taranis è una moneta spaccata tra fuoco e oscurità, i pesci si ammucchiano come se stessero cercando di ridurre il ritardo nelle comunicazioni.
        #GEPscience_sspxFishStudy_ToutatisSrfLanded_00 = L'alta gravità fa sembrare tutto più pesante, compreso l'atteggiamento dei pesci, smettono di galleggiare in modo teatrale e nuotano con colpi seri e deliberati.
        #GEPscience_sspxFishStudy_ToutatisFlyingHigh_00 = In alto sopra Toutatis, l'aria sottile e il lungo crepuscolo fanno sembrare l'habitat sospeso tra un turno e l'altro, i pesci girano intorno al lato della vasca dove sta l'antenna, come se stessero aspettando che Controllo Missione recuperi.
        #GEPscience_sspxFishStudy_ToutatisInSpaceLow_00 = Sfiorando Toutatis da bassa quota, la foschia sottile e la luce dura trasformano l'habitat in un crepuscolo lento e continuo, i pesci continuano a sfrecciare vicino all'antenna come se potesse accelerare il segnale.
        #GEPscience_sspxFishStudy_ToutatisInSpaceHigh_00 = Dall'orbita alta, Toutatis mostra insieme il volto arso e quello gelido, i pesci si stringono a metà vasca, come se cercassero di restare anche loro nella "zona confortevole".
        #GEPscience_sspxFishStudy_NodensSrfLanded_00 = Sotto il sole rosso e fioco, l'acqua vera là fuori sembra invitante e immensa, i pesci si premono contro il vetro come se stessero cercando di presentare una richiesta di trasferimento.
        #GEPscience_sspxFishStudy_NodensSrfSplashed_00 = Un "campione d'acqua locale" si rivela per lo più chimica sconosciuta, i pesci rispondono nuotando in tondo attorno alla presa del filtro e giudicando le tue scelte di carriera.
        #GEPscience_sspxFishStudy_NodensFlyingHigh_00 = In alto nell'aria di Nodens, ogni sobbalzo e oscillazione fa sciacquare la vasca come una macchina per onde al rallentatore, i pesci la affrontano con cupa professionalità.
        #GEPscience_sspxFishStudy_NodensInSpaceLow_00 = In orbita bassa, i mari del pianeta scintillano scuri mentre il ritardo radio si allunga, i pesci si radunano vicino all'antenna come se fissarla potesse far arrivare prima le risposte.
        #GEPscience_sspxFishStudy_NodensInSpaceHigh_00 = Molto sopra Nodens, la luce rossa del giorno non sembra mai del tutto "puntuale", i pesci derivano in una spirale assonnata che segue la lunga cadenza dei comandi lontani.
        #GEPscience_sspxFishStudy_BelisamaSrfLanded_00 = La superficie è silenziosa e spoglia, ma Nodens resta fisso sopra come un occhio che non sbatte mai, i pesci fanno finta di niente e si esercitano nell'ansia sincronizzata.
        #GEPscience_sspxFishStudy_BelisamaInSpaceLow_00 = In basso sopra Belisama, il lato bloccato sotto non cambia mai e l'abbagliamento del sole rosso sembra sbagliato, i pesci continuano a girare come se cercassero una "normalità" perduta.
        #GEPscience_sspxFishStudy_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama e Nodens sembrano incollati insieme nel vuoto, i pesci si stringono a metà vasca, conservando energia per la prossima istruzione in ritardo.
        #GEPscience_sspxFishStudy_SucellusSrfLanded_00 = La regolite fuori sembra metallica e assetata e l'habitat sembra un avamposto solitario, i pesci si attaccano al lato caldo della vasca e rifiutano di esplorare.
        #GEPscience_sspxFishStudy_SucellusInSpaceLow_00 = In orbita bassa su Sucellus, il terreno è fatto di ombre nette in luce rossa, i pesci nuotano in anelli stretti, come se l'oscurità là fuori potesse filtrare dentro.
        #GEPscience_sspxFishStudy_SucellusInSpaceHigh_00 = Molto sopra questo pianeta nano di frontiera, la stella è piccola e fioca e l'attesa delle risposte è più lunga dell'ora dello spuntino, i pesci diventano molto interessati all'auto-mangiatoia.
        #GEPscience_sspxFishStudy_CaireenSrfLanded_00 = L'atterraggio è gentile, la gravità è discutibile e il mondo fuori sembra assemblato con degli avanzi, i pesci dondolano lentamente, chiaramente poco impressionati dall'"atterraggio".
        #GEPscience_sspxFishStudy_CaireenInSpaceLow_00 = In orbita ravvicinata, Caireen a malapena mantiene una forma, solo un grumo che rotola nella notte illuminata di rosso, i pesci continuano a urtare le pareti della vasca come se stessero cercando il "giù".
        #GEPscience_sspxFishStudy_CaireenInSpaceHigh_00 = Da molto in alto, Caireen quasi si perde contro il buio e il ritardo nelle comunicazioni sembra personale, i pesci si ammucchiano come se stessero aspettando una tempesta che non arriva mai.
        #GEPscience_sspxFishStudy_SironaFlyingHigh_00 = In alto sopra le nubi a bande di Sirona, la vasca ondeggia a ogni lento colpo d'aria, i pesci rispondono formando un branco compatto e fulminando con lo sguardo l'antenna a lungo raggio.
        #GEPscience_sspxFishStudy_SironaInSpaceLow_00 = Le strisce vorticose di Sirona scorrono sotto di te nella luce rossa e fioca e il contatore di radiazione batte un ritmo costante, i pesci restano sul lato in ombra della vasca come se fosse più sicuro.
        #GEPscience_sspxFishStudy_SironaInSpaceHigh_00 = Molto sopra Sirona, tutto sembra lontano e quieto, Controllo Missione incluso, i pesci derivano in spirali pigre, apparentemente rassegnati al ritardo nelle comunicazioni.
        #GEPscience_sspxFishStudy_AirmedSrfLanded_00 = Il terreno malconcio e bicolore di Airmed sembra freddo e poco accogliente, ma Sirona incombe enorme nel cielo, i pesci si premono contro il vetro come se volessero guardare anche loro.
        #GEPscience_sspxFishStudy_AirmedInSpaceLow_00 = L'orbita bassa su Airmed rivela cicatrici e contrasti netti che non si addolciscono mai sotto il sole rosso, i pesci diventano insolitamente immobili, come se stessero aspettando il prossimo comando in ritardo.
        #GEPscience_sspxFishStudy_AirmedInSpaceHigh_00 = Molto sopra Airmed, la luna sembra un sasso scheggiato perso nel buio, i pesci continuano a girare intorno alla mangiatoia, forse decidendo che gli spuntini sono l'unica tabella di marcia affidabile quassù.
        #GEPscience_sspxFishStudy_BorvoSrfLanded_00 = Il terreno beige e bruno di Borvo potrebbe essere polvere, potrebbe essere ghiaccio, potrebbe essere tutt'altro, i pesci reagiscono ai sensori di chimica insolita nuotando molto educatamente lontano da loro.
        #GEPscience_sspxFishStudy_BorvoFlyingHigh_00 = In alta atmosfera su Borvo, l'habitat scricchiola e l'illuminazione non sembra mai davvero "giorno", i pesci nuotano in anelli stretti, adattandosi a un mondo in cui su e giù sono soprattutto suggerimenti.
        #GEPscience_sspxFishStudy_BorvoInSpaceLow_00 = In orbita bassa su Borvo, la foschia atmosferica sfuma la superficie in bande morbide sotto la luce rossa del sole, i pesci si radunano vicino all'uscita della pompa, apparentemente preferendo correnti prevedibili a orizzonti alieni.
        #GEPscience_sspxFishStudy_BorvoInSpaceHigh_00 = Dall'orbita alta, i colori smorzati di Borvo svaniscono nella notte circostante, i pesci derivano muso a coda come un minuscolo convoglio, mantenendo la formazione senza un motivo chiaro.
        #GEPscience_sspxFishStudy_DamonaSrfLanded_00 = Damona è grigia, butterata e intensamente poco impressionata dai visitatori, i pesci scendono sul fondo della vasca e fissano il paesaggio craterizzato con entusiasmo equivalente.
        #GEPscience_sspxFishStudy_DamonaInSpaceLow_00 = L'orbita bassa sopra la cicatrice evidente di Damona sembra girare attorno a un livido nel vuoto, i pesci continuano a urtare piano la parete della vasca, come per controllare che il "fuori" resti fuori.
        #GEPscience_sspxFishStudy_DamonaInSpaceHigh_00 = Molto sopra Damona, il sistema di Sirona sembra vasto e lontano e il ritardo nelle comunicazioni si assottiglia fino a tirare, i pesci si stringono a metà vasca, conservando energia per istruzioni che arrivano tardi.
        #GEPscience_sspxFishStudy_EponaSrfLanded_00 = L'habitat si posa sulla crosta ghiacciata di Epona sotto un sole rosso e fioco, i pesci si radunano vicino al riscaldatore, preferendo chiaramente "oceano caldo dentro" a "ghiaccio misterioso fuori".
        #GEPscience_sspxFishStudy_EponaFlyingHigh_00 = In alto nell'aria fredda di Epona, la vasca ondeggia dolcemente mentre i sensori di metano ticchettano, i pesci rispondono nuotando giri stretti ed efficienti, come se avessero un bilancio energetico severo.
        #GEPscience_sspxFishStudy_EponaInSpaceLow_00 = In orbita bassa su Epona, il ghiaccio sotto sembra continuo e infinito, i pesci continuano a sfrecciare vicino al pannello comunicazioni come se potessero accelerare il ping a lunga distanza.
        #GEPscience_sspxFishStudy_EponaInSpaceHigh_00 = Dall'orbita alta, Epona è una moneta scura nella luce rossa, i pesci derivano lentamente, apparentemente rassegnati a un ciclo giorno notte che qui non sembra mai in orario.
        #GEPscience_sspxFishStudy_RosmertaSrfLanded_00 = Rosmerta è solitaria, priva d'aria e lontana da qualunque posto confortevole, i pesci fissano il silenzio grigio e decidono che la parete della vasca è un ottimo posto per tenere una riunione.
        #GEPscience_sspxFishStudy_RosmertaInSpaceLow_00 = Sfiorando Rosmerta da bassa quota, il contatore di radiazione cinguetta in sottofondo, i pesci si raggruppano dietro la parte più spessa dell'habitat, per ragioni del tutto scientifiche.
        #GEPscience_sspxFishStudy_RosmertaInSpaceHigh_00 = Molto sopra Rosmerta, Epona domina il cielo come un riparo lontano, i pesci continuano a girare intorno alla mangiatoia, perché gli spuntini arrivano più affidabilmente delle risposte.
        #GEPscience_sspxFishStudy_RAB-58ESrfLanded_00 = Atterrare su questo strano corpo catturato sembra parcheggiare su un punto interrogativo, i pesci restano immobili per un attimo, poi riprendono a nuotare come per dire: "svegliateci quando avrete identificato la roccia".
        #GEPscience_sspxFishStudy_RAB-58EInSpaceLow_00 = In orbita bassa, RAB-58E rotola sotto di te senza un "lato giusto" evidente, i pesci continuano a riorientarsi a ogni lenta rotazione, con un'aria leggermente tradita dalla fisica.
        #GEPscience_sspxFishStudy_RAB-58EInSpaceHigh_00 = Dall'orbita alta, il planetesimo è poco più di un puntino nel buio illuminato di rosso, i pesci si stringono in un branco compatto, come se bersagli più piccoli fossero più difficili da notare per il vuoto.
        #GEPscience_sspxFishStudy_CernunnosSrfLanded_00 = Sul terreno ghiacciato di Cernunnos, l'orizzonte sembra troppo ampio e troppo silenzioso, i pesci restano vicini alle luci, rifiutandosi di ammettere che il "fuori" sia un posto reale.
        #GEPscience_sspxFishStudy_CernunnosInSpaceLow_00 = In orbita bassa su Cernunnos, scandagli il buio in cerca di eventuali corpi compagni, i pesci percorrono la vasca in lenti anelli, seguendo la ricerca cauta e metodica.
        #GEPscience_sspxFishStudy_CernunnosInSpaceHigh_00 = Molto sopra questo pianeta nano, il sistema sembra rado e lontano, i pesci derivano in formazione, aspettando pazientemente istruzioni che fanno il giro panoramico attraverso lo spazio.

        // sspxPlantGrowth
        #GEPscience_sspxPlantGrowth_GrannusFlyingHigh_00 = Le piante insistono a crescere "lontano" dall'abbagliamento rosso, ma non esiste un "lontano" che conti. Registri una nuova categoria: panico legato alla fotosintesi.
        #GEPscience_sspxPlantGrowth_GrannusInSpaceLow_00 = Sotto la luce rossa e fioca di Grannus, le foglie si scuriscono come se stessero cercando di nascondersi. I timestamp deragliano, perché il lungo ritardo del segnale fa sembrare "giorno" e "notte" pura burocrazia.
        #GEPscience_sspxPlantGrowth_GrannusInSpaceHigh_00 = Con Grannus come una piccola brace alle spalle, la crescita diventa lenta e deliberata. La serra sembra più silenziosa di quanto dovrebbe, e le piante paiono d'accordo.
        #GEPscience_sspxPlantGrowth_TaranisSrfLanded_00 = Le saracinesche dell'habitat si alternano come un metronomo, fingendo che fuori non sia rovente e luminoso da un lato e congelato dall'altro. Le piantine germogliano comunque, per puro dispetto e per una quantità adeguata di pasta nutritiva.
        #GEPscience_sspxPlantGrowth_TaranisSrfSplashed_00 = Interpreti "ammarrati" come "vicino alla roba luminosa e arrabbiata" e smetti di fare domande. Le piante rispondono accartocciando le foglie, come se potessero sentire il calore attraverso tre strati di isolamento.
        #GEPscience_sspxPlantGrowth_TaranisInSpaceLow_00 = Le piante si inclinano verso il più debole riflesso di luce, poi cambiano idea quando la nave ruota. Annoti che qui "su" e "verso il sole" non sono la stessa cosa.
        #GEPscience_sspxPlantGrowth_TaranisInSpaceHigh_00 = Con Taranis mezzo luminoso e mezzo nero sotto di te, le luci di crescita sembrano l'unica alba onesta. L'equipaggio discute su che ora sia e le piante si rifiutano di schierarsi.
        #GEPscience_sspxPlantGrowth_ToutatisSrfLanded_00 = Il termostato della serra lavora senza sosta mentre l'orizzonte di Toutatis sembra diviso tra fuoco e notte. Le piante si assestano su un ritmo lento, come se avessero accettato che l'alba è un problema di pianificazione.
        #GEPscience_sspxPlantGrowth_ToutatisFlyingHigh_00 = L'alta atmosfera non trasporta molto, ma trasporta abbastanza polvere da tingere la luce di un ostinato rosso ruggine. Le piante crescono compatte e prudenti, come se avessero letto la valutazione dei rischi di missione.
        #GEPscience_sspxPlantGrowth_ToutatisInSpaceLow_00 = Dall'orbita bassa, la linea del terminatore è una cucitura netta e l'angolo delle foglie continua a cambiare mentre la attraversi ancora e ancora. Registri che preferiscono la lampada, perché la lampada è prevedibile.
        #GEPscience_sspxPlantGrowth_ToutatisInSpaceHigh_00 = Molto sopra Toutatis, il mondo sotto sembra due pianeti diversi con lo stesso contratto d'affitto. Le piante continuano a crescere, ma il log nota che hai iniziato a parlare con loro durante i lunghi ritardi nelle comunicazioni.
        #GEPscience_sspxPlantGrowth_NodensSrfLanded_00 = Sotto un sole rosso e fioco, le piante fanno foglie ampie e scure, come se volessero catturare ogni ultimo fotone. I tecnici del supporto vitale lo chiamano "efficiente" e aumentano in silenzio i controlli dei filtri.
        #GEPscience_sspxPlantGrowth_NodensSrfSplashed_00 = Un po' d'acqua locale finisce nel circuito idroponico e prova subito a trasformarsi in compiti di chimica. I germogli sopravvivono, ma nelle note compare anche l'espressione "educatamente sospetti".
        #GEPscience_sspxPlantGrowth_NodensFlyingHigh_00 = L'alta atmosfera è sottile, fredda e tinta di un ostinato rosso ruggine. Le piante si inclinano verso la luce, poi si fermano, come se ricordassero quanto "sole" sia lontano quassù.
        #GEPscience_sspxPlantGrowth_NodensInSpaceLow_00 = L'alba in orbita arriva in fretta, ma il ritardo nelle comunicazioni fa arrivare i log in ritardo come una pianta assonnata. Le piantine mantengono un passo regolare, apparentemente poco impressionate dall'astronomia.
        #GEPscience_sspxPlantGrowth_NodensInSpaceHigh_00 = Da quassù Nodens sembra accogliente e distante allo stesso tempo. Le piante crescono lentamente e l'equipaggio inizia a chiamarle come parti dell'antenna.
        #GEPscience_sspxPlantGrowth_BelisamaSrfLanded_00 = Belisama mostra sempre la stessa faccia a Nodens, quindi la "vista" fuori è sempre lo stesso pianeta incombente e il cupo rosso. Le piante rinunciano ai ritmi circadiani e si affidano del tutto all'orario della lampada.
        #GEPscience_sspxPlantGrowth_BelisamaInSpaceLow_00 = L'orbita bassa sembra girare intorno a una roccia scura con un vicino gigantesco che ti guarda da sopra la spalla. Le piantine germogliano ordinate in file, come se l'ordine potesse accorciare la distanza.
        #GEPscience_sspxPlantGrowth_BelisamaInSpaceHigh_00 = La luna, il suo primario e il sole rosso si allineano in un orologio lento e inquietante. Le piante continuano a crescere, ma i rapporti di stato iniziano a suonare come cartoline.
        #GEPscience_sspxPlantGrowth_SucellusSrfLanded_00 = La regolite ha una scintilla metallica che sembra bella finché non finisce dappertutto. Le piante stanno bene, ma il filtro a vuoto della serra chiede il pensionamento.
        #GEPscience_sspxPlantGrowth_SucellusInSpaceLow_00 = Sucellus sotto è fatto di spigoli duri e ombre lunghe nella luce rossa. Le camere di crescita ronzano un po' più forte, compensando un mondo che non sembra caldo nemmeno quando è "giorno".
        #GEPscience_sspxPlantGrowth_SucellusInSpaceHigh_00 = Dall'orbita alta il pianeta nano è una moneta scura e il sole è una brace con un cattivo carattere. Le piante si affidano del tutto alla luce artificiale, che è rassicurante e un po' imbarazzante.
        #GEPscience_sspxPlantGrowth_CaireenSrfLanded_00 = La gravità è così bassa che il suolo vuole andarsene quanto te. Le piante germogliano comunque, ma va legato tutto, compreso il tuo ottimismo.
        #GEPscience_sspxPlantGrowth_CaireenInSpaceLow_00 = Caireen ruota in modo irregolare sotto di te come se stesse cercando di scrollarsi di dosso la missione. Alle piante non importa, ma l'equipaggio continua a controllare che il "giù" sia ancora un concetto valido.
        #GEPscience_sspxPlantGrowth_CaireenInSpaceHigh_00 = Quassù Caireen è quasi troppo piccolo per sembrare reale, un puntino accanto a un puntino, lontano da qualunque cielo familiare. Le piantine crescono lo stesso, dimostrando in silenzio che la determinazione non ha massa.
        #GEPscience_sspxPlantGrowth_SironaFlyingHigh_00 = Le piante non sanno cosa fare con tutta questa luce rossa e tutto quel cielo. Fanno foglie scure e prudenti mentre le bande di Sirona scorrono come un'etichetta di avvertimento al rallentatore.
        #GEPscience_sspxPlantGrowth_SironaInSpaceLow_00 = Sirona riempie metà del finestrino, ma la serra va avanti a lampade e pazienza. Il registro di crescita arriva con minuti di ritardo, come se dovesse fare anche lui un lungo viaggio.
        #GEPscience_sspxPlantGrowth_SironaInSpaceHigh_00 = Molto sopra il gigante gassoso, "giorno" è soprattutto quello che dice il timer. Le piante continuano a crescere lo stesso, come se fingere che il sole rosso sia normale lo rendesse vero.
        #GEPscience_sspxPlantGrowth_AirmedSrfLanded_00 = Il terreno cicatrizzato e bicolore di Airmed sembra aver fatto troppe risse. Le piante restano sotto schermatura e riescono comunque a germogliare, per pura ostinata professionalità.
        #GEPscience_sspxPlantGrowth_AirmedInSpaceLow_00 = Sirona incombe lì vicino, trasformando l'orbita in un promemoria infinito di dove ti trovi. Le piante seguono le luci di crescita senza lamentarsi, a differenza di Controllo Missione a casa.
        #GEPscience_sspxPlantGrowth_AirmedInSpaceHigh_00 = Airmed si riduce a un sassolino malconcio sotto di te e il sole rosso trasforma tutto in crepuscolo. Le piantine sembrano stranamente rassicuranti, come un minuscolo segnale verde che, per una volta, arriva in orario.
        #GEPscience_sspxPlantGrowth_BorvoSrfLanded_00 = L'aria è sottile e fredda, con abbastanza metano da far sentire giudicati i filtri della serra. Le piante rispondono facendo foglie cerose, come se avessero letto il rapporto sull'atmosfera.
        #GEPscience_sspxPlantGrowth_BorvoFlyingHigh_00 = In alto nel cielo pallido di Borvo, la condensa striscia sui portelli di osservazione e il sole rosso lo illumina appena. Le piante si inclinano verso le lampade e ignorano del tutto l'esterno: piante intelligenti.
        #GEPscience_sspxPlantGrowth_BorvoInSpaceLow_00 = I bruni e i beige di Borvo scorrono sotto, e il bagliore riflesso di Sirona continua a tentare di intrufolarsi nei sensori. Le piante mostrano una lieve "inclinazione" verso il finestrino, poi si ricordano che il finestrino è per lo più bugie.
        #GEPscience_sspxPlantGrowth_BorvoInSpaceHigh_00 = Quassù il sistema sembra predisposto per la comodità di qualcun altro, non per la tua. La curva di crescita resta stabile, anche quando gli aggiornamenti di stato fanno il giro panoramico per tornare a Grannus.
        #GEPscience_sspxPlantGrowth_DamonaSrfLanded_00 = Damona è grigia, butterata e abbastanza fredda da far sembrare nervosi i riscaldatori. Le piante sono fissate contro la bassa gravità e crescono lentamente, come se stessero risparmiando energia per il viaggio di ritorno.
        #GEPscience_sspxPlantGrowth_DamonaInSpaceLow_00 = L'orbita bassa è una giostra di ombre lunghe e di un sole che non sembra mai davvero "alto". Le piante seguono la loro tabella di marcia, e meno male, perché tutti gli altri hanno smesso di essere d'accordo sull'orario.
        #GEPscience_sspxPlantGrowth_DamonaInSpaceHigh_00 = Damona diventa una cicatrice lontana nel buio e la serra diventa l'unico colore vero in vista. Registri "crescita sana" e cerchi di non scrivere "solitaria, ma funzionale".
        #GEPscience_sspxPlantGrowth_EponaSrfLanded_00 = Il sole rosso è più un suggerimento che una fonte di luce, quindi le piante accettano l'orario della lampada senza lamentarsi. La brina striscia lungo le giunzioni dell'habitat mentre ti chiedi cosa stia scongelando molto sotto il ghiaccio.
        #GEPscience_sspxPlantGrowth_EponaFlyingHigh_00 = La foschia sottile sa vagamente di metano sui sensori e la luce esterna resta ostinatamente cremisi. Le piante rispondono ispessendo le foglie, come se si stessero preparando a un inverno lunghissimo.
        #GEPscience_sspxPlantGrowth_EponaInSpaceLow_00 = Il disco pallido e fioco di Epona pende sotto un sole ridotto a brace e il ritardo nelle comunicazioni fa arrivare ogni "aggiornamento del mattino" nel pomeriggio. Le piantine mantengono un passo costante, poco impressionate dalla distanza.
        #GEPscience_sspxPlantGrowth_EponaInSpaceHigh_00 = Dall'orbita alta, Epona sembra sigillata e quieta, ma la camera di crescita resta operosa. Registri "vitale con giorno notte artificiale" e aggiungi una nota: "giorno notte reale non incluso".
        #GEPscience_sspxPlantGrowth_RosmertaSrfLanded_00 = Rosmerta è fredda, priva d'aria e ignorata da tutto tranne che dai tuoi piedi d'atterraggio. Dentro la serra, i primi getti verdi sembrano quasi indecentemente rumorosi.
        #GEPscience_sspxPlantGrowth_RosmertaInSpaceLow_00 = Epona riempie la vista come una promessa congelata mentre Rosmerta rotola sotto in ombra dura. Le piante si orientano alle lampade e si rifiutano di riconoscere l'esterno: comportamento professionale.
        #GEPscience_sspxPlantGrowth_RosmertaInSpaceHigh_00 = Molto sopra la luna solitaria, il sole rosso trasforma l'intero sistema in geometria crepuscolare. Le foglie si scuriscono leggermente, poi si stabilizzano, come se decidessero: "così va bene".
        #GEPscience_sspxPlantGrowth_RAB-58ESrfLanded_00 = In gravità quasi zero, il sostituto del suolo prova a diventare una nuvola libera, quindi tutto finisce con cinghie e reti. Le piante germogliano comunque, apparentemente curiose di cosa sia davvero questo piccolo mondo catturato.
        #GEPscience_sspxPlantGrowth_RAB-58EInSpaceLow_00 = RAB-58E ruota sotto di te come un bullone allentato in una macchina immensa e la tua orbita sembra improvvisata. Le luci di crescita restano l'unica alba affidabile, e le piante sembrano sollevate dalla cosa.
        #GEPscience_sspxPlantGrowth_RAB-58EInSpaceHigh_00 = Dall'orbita alta, il regno di Epona sembra ampio e strano, con questo planetesimo che a malapena merita di essere un "giù". Le piantine crescono lentamente, come se stessero aspettando di capire dove appartengono davvero.
        #GEPscience_sspxPlantGrowth_CernunnosSrfLanded_00 = La superficie è ghiaccio antico e ombra lunga sotto un sole che non diventa mai davvero luminoso. La serra diventa una piccola, calda bugia e le piante la ricompensano con una crescita prudente e costante.
        #GEPscience_sspxPlantGrowth_CernunnosInSpaceLow_00 = L'orbita bassa trasforma Cernunnos in una moneta scura con un bordo di rosso tenue. Le piante seguono il loro timer mentre le risposte di Controllo Missione arrivano abbastanza tardi da sembrare di ieri.
        #GEPscience_sspxPlantGrowth_CernunnosInSpaceHigh_00 = Molto sopra il pianeta nano, il cielo è affollato di stelle che non si curano della tua tabella di marcia. Le piante continuano a crescere sotto le loro lampade, dimostrando in silenzio che "lontano" non è un inibitore della crescita.

        // sspxTelescopeObservation
        #GEPscience_sspxTelescopeObservation_GrannusFlyingHigh_00 = Provi a stabilizzare il telescopio mentre l'abbagliamento rosso sommerge ogni sensore. La stella non collabora con l'astronomia "d'alta quota".
        #GEPscience_sspxTelescopeObservation_GrannusInSpaceLow_00 = Con Grannus che riempie metà del cielo, lo usi come un enorme schermo di luce e vai a caccia di punti deboli che non si spostano quando sbatti le palpebre.
        #GEPscience_sspxTelescopeObservation_GrannusInSpaceHigh_00 = Più lontano, la brace rossa macchia ancora le ottiche, ma lo sfondo finalmente si fa abbastanza buio da contare le galassie tra un ping e l'altro delle comunicazioni.
        #GEPscience_sspxTelescopeObservation_GrannusInSpace_00 = Ti chiedi se puntare il telescopio direttamente su Grannus conti come osservazione di campo profondo.
        #GEPscience_sspxTelescopeObservation_GrannusInSpace_01 = Punti Grannus, che tecnicamente è una stella "lontana"... dal punto di vista di Kerbin. Non stai aiutando la sua tesi.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedMagmaShores_00 = Il calore increspa l'aria sopra la lava come un miraggio fatto male. Il telescopio produce stelle meravigliose e un odore sospetto dal dissipatore.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedScorchedLowlands_00 = Il terreno sembra ustionato e leggermente incandescente. La tua esposizione lunga diventa arte moderna non appena la montatura si scalda.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedMidlands_00 = Il treppiede poggia su una roccia che non si raffredda mai davvero. Registri un accurato rilevamento stellare e una nota meno accurata sulla crema solare.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedHighlands_00 = Sopra il peggio delle ondulazioni, il cielo si fa più nitido. Il sole rosso è ancora troppo vicino per stare comodi, quindi osservi in brevi scatti nervosi.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedDarkSideMidlands_00 = Niente atmosfera, niente scintillio, solo un cielo nero e freddo e schemi sconosciuti. I dati migliori arrivano molto prima che Controllo Missione possa reagire.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedDarkSideHighlands_00 = L'orizzonte è una silhouette frastagliata contro un tenue bagliore rosso lontano. Catturi un transito e ti chiedi subito quanto ci metteranno i risultati ad arrivare a casa.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedPoles_00 = Le ombre lunghe diventano un diaframma perfetto per il telescopio. Esegui una scansione silenziosa del cielo, ascoltando il ritardo radio che risponde a se stesso.
        #GEPscience_sspxTelescopeObservation_TaranisSrfSplashedMagmaSea_00 = Il telescopio è tecnicamente dispiegato sopra roccia liquida. L'immagine è stabile, lo strumento no, e decidi che questo conta come scienza.
        #GEPscience_sspxTelescopeObservation_TaranisSrfSplashedMagmaShores_00 = Metà della montatura è coperta da goccioline incandescenti. Ottieni un fotogramma nitido prima che i sensori di sicurezza impongano una pausa di raffreddamento.
        #GEPscience_sspxTelescopeObservation_TaranisInSpaceLow_00 = In orbita bassa, il lato diurno abbaglia la vista, quindi ti sposti sul lato notturno e lasci che il pianeta blocchi Grannus come un enorme otturatore.
        #GEPscience_sspxTelescopeObservation_TaranisInSpaceHigh_00 = Dall'orbita alta puoi guardare il terminatore strisciare mentre il telescopio fissa oltre. Il cielo sembra sbagliato in un modo che non riesci del tutto a calibrare.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSunnyLowlands_00 = La polvere del lato illuminato riflette una tinta rossa dura dentro il tubo. Riesci a ottenere un campo stellare pulito puntando lontano dal bagliore e trattenendo il respiro.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSunnyHighlands_00 = Dal terreno elevato, la foschia illuminata è più sottile e l'inseguimento è più regolare. Il sole rosso prova comunque a intrufolarsi in ogni esposizione.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedTransitionalLowlands_00 = La fascia crepuscolare ti dà abbastanza buio e abbastanza calore. Ti soffermi su costellazioni sconosciute e ti senti molto lontano.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedTransitionalHighlands_00 = Quassù il confine tra fuoco e ghiaccio è una linea sottile sull'orizzonte. Il telescopio lo adora, il ritardo nelle comunicazioni no.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideLowlands_00 = Le stelle non scintillano affatto, il che è inquietante. Il log annota un seeing eccellente e un crescente desiderio di una luce di cabina più intensa.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideHighlands_00 = Il cielo del lato in ombra è così nitido da sembrare artificiale. Catturi una nebulosa tenue e aspetti l'applauso in ritardo da casa.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSoutheasternMountains_00 = Creste e ombre tengono l'abbagliamento fuori dalle ottiche. Esegui una scansione accurata e fai finta che l'alba rossa non stia avanzando verso di te.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedWesternMountains_00 = La roccia sotto i piedi è fredda da un lato e tiepida dall'altro. La montatura protesta con scricchiolii e consegna comunque una mappa stellare decente.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideMountains_00 = Una montagna blocca il tenue bagliore rosso dell'orizzonte come una parete perfetta da osservatorio. I dati sono eccellenti, e anche il silenzio.
        #GEPscience_sspxTelescopeObservation_ToutatisFlyingHigh_00 = Saresti nell'alta atmosfera, il che significa soprattutto che sei sopra la polvere e che non stai ancora sentendo Controllo Missione.
        #GEPscience_sspxTelescopeObservation_ToutatisInSpaceLow_00 = Da vicino, usi Toutatis stesso per nascondere Grannus dietro il bordo e scandagli il cielo nella breve, quieta ombra.
        #GEPscience_sspxTelescopeObservation_ToutatisInSpaceHigh_00 = Più lontano, il pianeta è un piccolo disco diviso tra chiaro e scuro. Il telescopio fissa il vuoto tra le stelle, cercando di trovare qualcosa di nuovo.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedShores_00 = L'oceano getta luce rossa nel tubo del telescopio. Registri "orizzonte eccellente, abbagliamento mediocre" e asciughi comunque il sale dall'oculare.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTropicalLowlands_00 = L'aria calda e umida fa traballare le stelle come gelatina. Il telescopio insiste che l'universo non si sta davvero sciogliendo.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTemperateLowlands_00 = Il cielo sembra familiare solo finché non inizi a mapparlo. Ricontrolli le coordinate e ti ricordi che il ritardo nelle comunicazioni discuterà più tardi.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTropicalMidlands_00 = Sopra la foschia più densa, il telescopio risolve punti deboli che l'occhio nudo si perde. Il sole rosso prova comunque a intrufolarsi in ogni esposizione.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTemperateMidlands_00 = Esegui un rilevamento stellare accurato e ottieni un dataset pulito. Controllo Missione lo riceverà quando avrai già iniziato a preoccuparti del prossimo.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedHighlands_00 = Aria sottile, stelle taglienti e un lontano bagliore rosso all'orizzonte. Il telescopio finalmente sembra fare il suo lavoro invece di farsi un bagno.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTundra_00 = Il freddo stabilizza le ottiche e le tue mani. Il cielo è nitido, silenzioso e completamente sconosciuto in un modo che ti fa sussurrare comunque.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedIceCaps_00 = Il ghiaccio riflette un tenue crepuscolo rosso anche di "notte". Usi la tua ombra come parasole e fai finta che sia una procedura approvata.
        #GEPscience_sspxTelescopeObservation_NodensSrfSplashedSaltySeas_00 = Le operazioni del telescopio galleggiante vengono dichiarate "possibili" e "sconsigliabili". Le stelle sono stabili, la piattaforma no.
        #GEPscience_sspxTelescopeObservation_NodensSrfSplashedFreshWater_00 = Il telescopio segue onde dolci mentre insegui esposizioni lunghe. Annota che all'universo non importa della tua classe di impermeabilizzazione.
        #GEPscience_sspxTelescopeObservation_NodensSrfSplashedShores_00 = Metà terra, metà acqua, tutto abbagliamento. Ottieni un fotogramma magnifico e poi passi dieci minuti a pulire goccioline dal copriobiettivo.
        #GEPscience_sspxTelescopeObservation_NodensInSpaceLow_00 = Nodens blocca il sole rosso come un enorme otturatore. Nella breve ombra, il telescopio trova schemi deboli che non corrispondono a nessuna mappa "di casa".
        #GEPscience_sspxTelescopeObservation_NodensInSpaceHigh_00 = Molto lontano, Nodens è una moneta colorata sotto una brace fioca. Guardi oltre, in un campo stellare troppo silenzioso per quanta roba ci sia dentro.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedFlats_00 = Il terreno è immobile e il cielo no. Nodens resta appeso nello stesso punto per sempre, facendo sembrare che il telescopio venga osservato a sua volta.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTropicalLowlands_00 = Terreno caldo e cielo rosso fioco danno una luce strana. Scatti immagini di calibrazione e capisci che "normale" non è più un'impostazione.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTemperateLowlands_00 = Le stelle sono nitide, ma il tuo senso dell'orientamento no. Tracci una nuova griglia di riferimento e accetti che più tardi verrà discussa.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTropicalMidlands_00 = Imposti una lunga esposizione e Nodens si rifiuta di uscire dall'inquadratura. Il blocco mareale è ottimo per la stabilità e pessimo per la composizione.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTemperateMidlands_00 = Il telescopio segue bene mentre la radio resta ostinatamente muta. Il ritardo fa sembrare ogni scoperta come se fosse successa due volte.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedHighlands_00 = Dalle alture, il cielo diventa più scuro e il sole rosso sembra più lontano. Registri un rilevamento pulito e una nota: "Non fissare Nodens troppo a lungo".
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedPoles_00 = La luce radente trasforma tutto in un diaframma. Scandagli il cielo in archi lunghi e silenziosi e cerchi di non contare i secondi tra una risposta e l'altra.
        #GEPscience_sspxTelescopeObservation_BelisamaInSpaceLow_00 = Il bordo di Belisama blocca Grannus, lasciandoti un cono stretto di oscurità con cui lavorare. Il telescopio tira fuori bersagli deboli dal vuoto come se stessero aspettando.
        #GEPscience_sspxTelescopeObservation_BelisamaInSpaceHigh_00 = Nodens e Belisama stanno bloccati insieme sotto di te, partner immobili. Il resto del cielo scorre lentamente, come se persino le stelle stessero risparmiando carburante.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedBasins_00 = Le pareti del bacino tagliano il bagliore rosso dell'orizzonte in fette ordinate. Il telescopio adora il buio, i tuoi nervi no.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedLowlands_00 = La superficie sembra voler essere estratta, non ammirata. Punti comunque il telescopio in su: le risorse possono aspettare la luce delle stelle.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedTropicalMidlands_00 = L'etichetta "tropicale" sembra ottimista sotto un sole rosso e fioco. Il rilevamento del cielo torna pulito, freddo e molto lontano da casa.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedTemperateMidlands_00 = La montatura si assesta nel suolo polveroso e tiene. Registri una costellazione sconosciuta e ti chiedi come si chiami dall'altra parte del ritardo.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedHighlands_00 = Più in alto, il bagliore dell'orizzonte si assottiglia e le stelle si fanno più nitide. Catturi una tenue strisciata di luce e la etichetti "probabilmente non è una macchia, stavolta".
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedPoles_00 = Qui le ombre durano abbastanza da sembrare permanenti. Esegui esposizioni lunghe e ascolti la radio prendersi il suo tempo per ricordarsi che esisti.
        #GEPscience_sspxTelescopeObservation_SucellusInSpaceLow_00 = L'orbita ravvicinata ti dà ombre rapide e viste rapide. Il telescopio lavora tra un passaggio illuminato e l'altro, come se stesse facendo passare la scienza di nascosto oltre l'abbagliamento rosso.
        #GEPscience_sspxTelescopeObservation_SucellusInSpaceHigh_00 = Dall'alto, Sucellus è un piccolo disco scuro in un cielo affollato e sconosciuto. Il telescopio trova più bersagli di quanti nomi tu abbia.
        #GEPscience_sspxTelescopeObservation_CaireenSrfLandedLowlands_00 = Il telescopio è più grande dell'orizzonte. Lo punti in su e le stelle sembrano abbastanza taglienti da bucare il ritardo nelle comunicazioni.
        #GEPscience_sspxTelescopeObservation_CaireenSrfLandedMidlands_00 = Il cielo è nero, il sole rosso è un livido distante e Sucellus incombe lì vicino. Prendi misure e ti senti una nota a piè di pagina nel sistema di qualcun altro.
        #GEPscience_sspxTelescopeObservation_CaireenSrfLandedHighlands_00 = Una piccola cresta diventa un paraschermo perfetto. Catturi un campo stellare pulito e ti chiedi quanti messaggi serviranno per convincere qualcuno.
        #GEPscience_sspxTelescopeObservation_CaireenSrfLandedPoles_00 = La luce cambia a malapena e le tue ombre quasi non si muovono. Il telescopio segue bene mentre conti i secondi fino al prossimo "ricevuto" in ritardo.
        #GEPscience_sspxTelescopeObservation_CaireenInSpaceLow_00 = Caireen scompare nel nulla quasi subito. Il telescopio fissa lo spazio profondo e il segnale di ritorno sembra viaggiare nel tempo.
        #GEPscience_sspxTelescopeObservation_CaireenInSpaceHigh_00 = Da lontano, Caireen è quasi invisibile e sembra giusto così. Registri il cielo più silenzioso che tu abbia mai visto sotto il sole rosso più fioco che tu abbia mai cercato di non guardare.
        #GEPscience_sspxTelescopeObservation_SironaInSpaceLow_00 = Il bagliore a bande di Sirona cerca di lavare via la vista, quindi ti nascondi nella sua ombra e dai la caccia a stelle deboli che non appartengono a nessuna mappa familiare.
        #GEPscience_sspxTelescopeObservation_SironaInSpaceHigh_00 = Più lontano, il sole rosso tenue sembra più piccolo e il cielo sembra più grande. Registri un campo stellare pulito e una lunga attesa prima che qualcun altro lo veda.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTropicalLowlands_00 = Terreno caldo e cielo arrossato costringono il telescopio a lottare per il contrasto. Calibri due volte e finisci comunque per battezzare un nuovo "decisamente non una macchia".
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTemperateLowlands_00 = L'aria si stabilizza per un momento e le stelle scattano a fuoco. Catturi un rilievo ordinato, poi ti ricordi che il ritardo delle comunicazioni lo metterà in discussione più tardi.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTropicalMidlands_00 = Da un terreno più elevato, il bagliore dell'orizzonte si assottiglia e l'ottica si comporta bene. Le costellazioni sembrano comunque sbagliate, ma i dati sono giusti.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedTemperateMidlands_00 = Il telescopio traccia con precisione mentre la radio resta in silenzio. Archivi i risultati e hai la sensazione di averli spediti nel futuro.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedHighlands_00 = Aria sottile, stelle nitide e un sole rosso tenue che si rifiuta di essere ignorato. Costruisci un nuovo modello di puntamento perché quello vecchio sembra nostalgico.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedDarkenedLowlands_00 = Qui il cielo è più scuro, come se il mondo stesse cercando di nascondersi. Il telescopio ricompensa la discrezione con punti di luce netti e un silenzio inquieto.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedDarkenedMidlands_00 = Nelle lunghe pianure in ombra puoi fare esposizioni che a casa sarebbero impossibili. L'unica cosa che si sfoca è il tuo senso del tempo.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedDarkenedHighlands_00 = Alto, scuro e silenzioso, condizioni perfette per osservare e pessime per il morale. Le stelle sono affilate come rasoi, la tua calligrafia sul registro no.
        #GEPscience_sspxTelescopeObservation_AirmedSrfLandedPoles_00 = La luce rossa radente sfiora l'orizzonte per un'eternità. Usi il terreno come parasole e mappi il cielo mentre aspetti un "ricevuto" in ritardo.
        #GEPscience_sspxTelescopeObservation_AirmedInSpaceLow_00 = Il lembo di Airmed blocca il bagliore rosso come un otturatore in movimento. Nella breve oscurità, il telescopio trova bersagli deboli più in fretta di quanto tu riesca a etichettarli.
        #GEPscience_sspxTelescopeObservation_AirmedInSpaceHigh_00 = Dall'orbita alta, Airmed è un piccolo disco sotto una brace lontana. Guardi scorrere schemi stellari sconosciuti e ti senti molto lontano da qualsiasi lista di controllo.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTropicalCraquelure_00 = Il terreno crepato sembra troppo cotto. Il telescopio mostra un cielo calmo sopra di lui, e sembra uno scherzo.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTemperateCraquelure_00 = Le fratture fini scricchiolano sotto i piedi mentre allinei la montatura. Le stelle restano ferme mentre il ritardo radio rende ogni scoperta solitaria.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTropicalLowlands_00 = La foschia di calore trasforma le stelle luminose in piccole virgole. Accorci le esposizioni e riesci comunque a fare un rilievo che non sembra una calligrafia.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTemperateLowlands_00 = L'aria è più fresca e l'ottica si assesta. Registri un campo stellare pulito e ti chiedi come si chiami dall'altra parte del sistema.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTropicalMidlands_00 = Il terreno più alto ti regala cieli più scuri e meno scuse. Il telescopio tira fuori deboli aloni dal vuoto e fai finta che fossero bersagli pianificati.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedTemperateMidlands_00 = Il tracciatore ronza, il cielo resta immobile e le comunicazioni restano lente. Raccogli dati eccellenti e zero rassicurazioni immediate.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedHighlands_00 = Dalle colline, il sole rosso tenue resta basso e vigile. Fai lunghe esposizioni e ti sorprendi ad ascoltare una risposta che non può ancora arrivare.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedMajorCraters_00 = Le pareti dei crateri fanno da perfetto diaframma contro il bagliore dell'orizzonte. Il cielo è così nitido da sembrare artificiale, e al telescopio piace.
        #GEPscience_sspxTelescopeObservation_BorvoSrfLandedPoles_00 = Qui le ombre durano abbastanza da diventare punti di riferimento. Mappi le stelle in silenzio e segni il tempo da quanto a lungo il trasmettitore resta annoiato.
        #GEPscience_sspxTelescopeObservation_BorvoInSpaceLow_00 = Ti infili nella notte orbitale e lasci che Borvo blocchi il sole rosso tenue. Il telescopio trova punti deboli che rendono obsolete le tue vecchie carte stellari.
        #GEPscience_sspxTelescopeObservation_BorvoInSpaceHigh_00 = Da lontano, Borvo è una moneta scura con bordi luminosi. Fissi oltre, nel profondo, e aspetti che i risultati tornino a casa alla velocità di una conversazione.
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTropicalLowlands_00 = Il telescopio continua a cercare di compensare il bagliore rosso. Tu continui a convincerlo che sì, il cielo adesso è davvero così.
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTemperateLowlands_00 = Le stelle sono stabili, ma il mondo sembra trattenere il respiro. Registri una scansione pulita e una nota: "Il ritardo rende gli applausi in ritardo".
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTropicalMidlands_00 = Dalle pianure, il bagliore dell'orizzonte è più sottile e il cielo è più scuro. Il telescopio distingue strutture deboli e la tua sicurezza litiga con l'ignoto.
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedTemperateMidlands_00 = La montatura si assesta su terreno solido e l'inseguimento è perfetto. Registri un ammasso sconosciuto e ti manca subito un secondo parere rapido.
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedHighlands_00 = L'alta quota trasforma il sole rosso tenue in un fastidio lontano invece che in un problema costante. Fai lunghe esposizioni e senti la distanza del sistema in ogni secondo silenzioso.
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedImpactBasin_00 = Le pareti del bacino tagliano la luce parassita come una cupola osservatoria fatta di geologia. Il telescopio consegna campi stellari impeccabili e tu provi a non pensare alla scala del cratere.
        #GEPscience_sspxTelescopeObservation_DamonaSrfLandedPoles_00 = La luce cambia appena, ma le stelle sì. Le cartografi con pazienza, sapendo che la conferma arriverà dopo che ti sarai già spostato.
        #GEPscience_sspxTelescopeObservation_DamonaInSpaceLow_00 = L'ombra di Damona è breve e preziosa. Ci infili una rapida scansione del cielo più buio che riesci a trovare e la trasmetti dentro la lunga attesa.
        #GEPscience_sspxTelescopeObservation_DamonaInSpaceHigh_00 = Dall'orbita alta, Damona si riduce a un puntino sotto una brace rossa tenue. Il telescopio guarda verso l'esterno e tu ti senti come l'unica persona nell'universo che sta facendo burocrazia.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedTropicalLowlands_00 = I "tropici" sono un'etichetta di cortesia per del ghiaccio sotto un sole rosso e fioco. Il telescopio trova stelle nitide e un promemoria che il calore ormai è quasi teorico.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedTemperateLowlands_00 = L'orizzonte brilla di un rosso tenue, giusto quanto basta per infestare le lunghe esposizioni. Disegni una nuova mappa stellare e ti chiedi quanto ci metteranno a crederti.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedTropicalUplands_00 = L'alta quota fa da schermo migliore contro il bagliore rosso. Il cielo è nitido, silenzioso, e non segue nessuna costellazione che ti ricordi.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedTemperateUplands_00 = Il treppiede morde la crosta dura e resta fermo. Il telescopio consegna dati eccellenti, poi tu aspetti nel ritardo come se fosse parte dell'esperimento.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedHighlands_00 = Aria sottile e ottiche fredde rendono le immagini quasi troppo pulite. Catturi una tenue strisciata di luce e la etichetti "non una strisciata sull'obiettivo (probabilmente)."
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedGrandPeaks_00 = Dalle cime, Epona sembra una cupola d'osservatorio scura. Le stelle paiono a portata di mano, ma la radio risponde comunque da molto lontano.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedCraters_00 = Le pareti del cratere bloccano il debole bagliore rosso basso sull'orizzonte come un parasole già pronto. Fai lunghe esposizioni e ascolti il silenzio allungarsi tra un check-in e l'altro.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedVolcanoes_00 = La turbolenza termica mette in crisi le ottiche, suggerendo che Epona non è tutta ghiaccio, dentro. Registri il miglior cielo possibile tra un avviso termico e l'altro.
        #GEPscience_sspxTelescopeObservation_EponaSrfLandedPoles_00 = La luce cambia appena: sfuma dal rosso al rosso più scuro. Perfetto per l'astronomia, meno perfetto per ricordarsi cosa significhi "giorno."
        #GEPscience_sspxTelescopeObservation_EponaInSpaceLow_00 = Lasci che il bordo di Epona nasconda il sole rosso e rubi un cono stretto di buio. Il telescopio trova bersagli deboli più in fretta di quanto i tuoi messaggi riescano a partire.
        #GEPscience_sspxTelescopeObservation_EponaInSpaceHigh_00 = Da lontano, Epona è un disco freddo sotto una brace distante. Esplori un cielo quieto e senti il ritardo trasformare le scoperte in capsule del tempo.
        #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTropicalLowlands_00 = I "tropici" di Rosmerta sono freddi, senz'aria e solitari. Il telescopio adora il vuoto stabile, tu non ami quanto enorme sembri il cielo.
        #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTemperateLowlands_00 = Epona incombe lì vicino come un'enorme luce notturna, tingendo la superficie di un rosso spento. Punti lontano dal bagliore e mappi schemi stellari che non riconosci.
        #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTropicalMidlands_00 = Il suolo è polveroso e paziente, come se stesse aspettando visitatori da molto tempo. Il telescopio restituisce stelle taglienti e nessuna rassicurazione immediata.
        #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedTemperateMidlands_00 = Esegui un rilievo accurato mentre il ritardo radio risponde alle domande di ieri. Qui le stelle non scintillano, e in qualche modo è peggio.
        #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedHighlands_00 = Dalle alture, il bagliore di Epona è più facile da schivare. Catturi un campo pulito e realizzi che stai costruendo un "nord" tutto nuovo.
        #GEPscience_sspxTelescopeObservation_RosmertaSrfLandedPoles_00 = Le ombre si allungano per sempre lungo le creste verso il polo. Fai lunghe esposizioni e misuri il tempo da quanto lentamente il trasmettitore si annoia.
        #GEPscience_sspxTelescopeObservation_RosmertaInSpaceLow_00 = L'orbita bassa ti regala passaggi notturni brevi e preziosi. Usi Rosmerta come un otturatore mobile contro il sole rosso e strappi dati al buio.
        #GEPscience_sspxTelescopeObservation_RosmertaInSpaceHigh_00 = Da quassù, Rosmerta è un puntino grigio vicino alla vasta curva di Epona. Il telescopio guarda verso l'esterno e il sistema sembra fin troppo silenzioso.
        #GEPscience_sspxTelescopeObservation_RAB-58ESrfLandedLowlands_00 = La superficie potrebbe essere roccia, potrebbe essere ghiaccio, potrebbe essere entrambe le cose che fanno finta. Al telescopio non importa: lo spazio è stabile e il sole rosso è un filtro indesiderato.
        #GEPscience_sspxTelescopeObservation_RAB-58ESrfLandedEasternHighlands_00 = Dalle alture orientali provi a stabilizzare la montatura su un terreno irregolare. Il cielo resta perfettamente fermo mentre le ipotesi sulla tua "storia d'origine" si moltiplicano.
        #GEPscience_sspxTelescopeObservation_RAB-58ESrfLandedWesternHighlands_00 = Le creste occidentali bloccano quel tanto che basta il debole bagliore rosso sull'orizzonte per esposizioni profonde. Cartografi stelle in un posto che forse non appartiene nemmeno qui.
        #GEPscience_sspxTelescopeObservation_RAB-58EInSpaceLow_00 = Il planetesimo scompare rapidamente sotto di te, come se stesse cercando di scappare dalla propria orbita. Punti il telescopio nel profondo e spedisci i risultati in una lunga attesa.
        #GEPscience_sspxTelescopeObservation_RAB-58EInSpaceHigh_00 = Più lontano, RAB-58E è quasi invisibile contro il vuoto. Il telescopio trova più struttura nel cielo che nel corpo sotto di te.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedTropicalLowlands_00 = L'etichetta "tropicale" sembra uno scherzo in questo gelo buio. Il telescopio restituisce stelle nitide e un promemoria che il sole rosso non è generoso.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedTemperateLowlands_00 = Il bagliore dell'orizzonte è lieve, ma macchia ogni esposizione se glielo lasci fare. Regoli, ricalibri e accetti che qui la "notte" è una trattativa.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedTropicalMidlands_00 = Le pianure sono abbastanza quiete da sentire l'attrezzatura assestarsi. Il telescopio traccia alla perfezione mentre il ritardo radio ti fa sentire un rapporto non ancora archiviato.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedTemperateMidlands_00 = Ottiche fredde, terreno stabile e un cielo che rifiuta di sembrare "giusto." Annoti una nuova griglia di riferimento e speri che sopravviva al viaggio verso casa.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedHighlands_00 = Dalle alture, il cielo si scurisce e il sole rosso diventa un fastidio lontano. Catturi una tenue galassia e ti senti molto, molto piccolo.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedSouthPolarHills_00 = Le colline proiettano ombre lunghe, perfette come diaframmi. Fai lunghe esposizioni e conti i secondi tra gli "ricevuto" in ritardo.
        #GEPscience_sspxTelescopeObservation_CernunnosSrfLandedNorthPole_00 = Il polo è un osservatorio immobile e gelido, con una luce che cambia a malapena. Le stelle sono affilatissime, e anche il silenzio.
        #GEPscience_sspxTelescopeObservation_CernunnosInSpaceLow_00 = Sfiori Cernunnos e usi il suo lato notturno per nasconderti dal bagliore rosso. Il telescopio strappa bersagli deboli dal vuoto come se li stesse aspettando.
        #GEPscience_sspxTelescopeObservation_CernunnosInSpaceHigh_00 = Da lontano, Cernunnos è una moneta fioca in un buio più grande. Esplori lo spazio profondo e capisci che la tua scoperta non sarà "nuova" finché il ritardo non sarà d'accordo.

        // sspxVisualObservation
        #GEPscience_sspxVisualObservation_GrannusFlyingHigh_00 = La debole luce rossa riempie la cabina come una vecchia spia d'allarme, e l'orizzonte si rifiuta di restare "su" o "giù" abbastanza a lungo.
        #GEPscience_sspxVisualObservation_GrannusInSpaceLow_00 = Da vicino, Grannus è meno "alba" e più "brace infinita", controlli d'istinto la radio, anche se Kerbin è ben oltre una distanza a cui importi qualcosa.
        #GEPscience_sspxVisualObservation_GrannusInSpaceHigh_00 = Grannus si riduce a una moneta rossastra, e tutto il resto diventa nero, silenzioso e molto, molto paziente.
        #GEPscience_sspxVisualObservation_TaranisInSpaceLow_00 = Un lato brilla come se si stesse ricordando come diventare liquido, l'altro è un livido duro e senza luce, e non riesci a decidere quale sia peggio da fissare.
        #GEPscience_sspxVisualObservation_TaranisInSpaceHigh_00 = Da un'orbita alta, Taranis sembra una piccola lite fra fuoco e notte, risolta solo dal vuoto.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedMagmaShores_00 = La costa lavica è un'"onda" luminosa e lenta che non si infrange mai, lo annoti come "bella" e te ne penti subito per aver usato quella parola vicino alla roccia fusa.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedScorchedLowlands_00 = Il terreno è cotto in una semplicità tagliente, come se il pianeta stesse cercando di cancellare la propria superficie più in fretta di quanto tu riesca a guardarla.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedMidlands_00 = Il paesaggio sfuma dall'abbaglio all'ombra in pochi chilometri, come se il mondo non riuscisse a decidere se farsi vedere.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedHighlands_00 = Dall'alto hai una vista più lunga della frattura tra giorno incandescente e notte gelata, e nessuno dei due lati sembra interessato ai visitatori.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedDarkSideMidlands_00 = Qui il buio non è solo "assenza di luce", sembra che il pianeta lo stia accumulando di proposito.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedDarkSideHighlands_00 = Riesci quasi a convincerti che le stelle siano più luminose… finché non ricordi che sono le stesse stelle, e sei solo più solo sotto di loro.
        #GEPscience_sspxVisualObservation_TaranisSrfLandedPoles_00 = L'angolo basso del sole rende tutto tagliente e irreale, come se il mondo fosse un modellino che qualcuno si è dimenticato di finire.
        #GEPscience_sspxVisualObservation_TaranisSrfSplashedMagmaSea_00 = La superficie del mare di lava increspa pigra, brillando dall'interno, compili un "rapporto di ammaraggio" e decidi che quella formulazione è stata un errore.
        #GEPscience_sspxVisualObservation_TaranisSrfSplashedMagmaShores_00 = Il veicolo ondeggia accanto a una costa lavica che irradia calore come lo sportello di una fornace, tieni l'otturatore del finestrino quasi sempre chiuso, per principio.
        #GEPscience_sspxVisualObservation_ToutatisFlyingHigh_00 = La foschia sottile a malapena merita di chiamarsi cielo, ma basta a spalmare la luce rossa in una banda opaca che fa sembrare il mondo stanco.
        #GEPscience_sspxVisualObservation_ToutatisInSpaceLow_00 = L'emisfero luminoso e quello in ombra si incontrano in una cucitura netta, e il terminatore sembra l'unico posto che potrebbe perdonarti.
        #GEPscience_sspxVisualObservation_ToutatisInSpaceHigh_00 = Da lontano, Toutatis è una moneta bicolore con una faccia fredda e una faccia calda, che gira in silenzio in un'orbita molto distante.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedSunnyLowlands_00 = I bassopiani illuminati scintillano di foschia termica sopra roccia nuda, e la tua ombra appare innaturalmente nitida nell'aria sottile.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedSunnyHighlands_00 = Dalle colline illuminate, il paesaggio sembra bruciato e ripulito da ogni dettaglio, scrivi "privo di caratteristiche" e poi aggiungi "(aggressivamente)".
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedTransitionalLowlands_00 = Qui la luce si addolcisce e la temperatura smette di provare a vincere, ti sorprendi a pensare "sito base" e smetti subito.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedTransitionalHighlands_00 = La zona crepuscolare si stende in rossi e grigi smorzati, e per un attimo il pianeta quasi finge di essere ospitale.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedDarkSideLowlands_00 = Il lato in ombra sembra profondo e pesante, come se il terreno coltivasse il freddo come hobby personale.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedDarkSideHighlands_00 = Le stelle sopra le colline in ombra sembrano abbastanza vicine da toccare, ma il ritardo di comunicazione ti ricorda che non sono l'unica cosa lontana.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedSoutheasternMountains_00 = Le montagne sud-orientali proiettano ombre lunghe sui confini, scolpendo il paesaggio in luce e buio come un diagramma di sopravvivenza.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedWesternMountains_00 = Le montagne occidentali si stagliano come denti rotti contro il cielo rosso tenue, e per un attimo ti chiedi se il pianeta stia masticando il tuo coraggio.
        #GEPscience_sspxVisualObservation_ToutatisSrfLandedDarkSideMountains_00 = Le montagne in ombra sono silhouette su silhouette, registri la vista e ometti quanto silenziosa sembri dentro il casco.
        #GEPscience_sspxVisualObservation_NodensFlyingHigh_00 = L'aria densa trasforma la debole luce rossa in un bagliore smorzato, e il mondo sotto di te sembra quasi invitante... quasi.
        #GEPscience_sspxVisualObservation_NodensInSpaceLow_00 = Nodens riempie il finestrino di blu e verdi sotto un sole brace, e all'improvviso ricordi quanto sia davvero lungo il ritardo delle comunicazioni.
        #GEPscience_sspxVisualObservation_NodensInSpaceHigh_00 = Da così lontano, Nodens è una piccola promessa dall'aria calma in un cielo molto vuoto, e la cabina ti sembra ancora più piccola.
        #GEPscience_sspxVisualObservation_NodensSrfLandedShores_00 = La foschia costiera brilla di un rosso tenue all'alba, e ogni onda sembra infrangersi sulla costa di un altro pianeta.
        #GEPscience_sspxVisualObservation_NodensSrfLandedTropicalLowlands_00 = I bassopiani sembrano rigogliosi da dietro il vetro, ma la luce è sbagliata, come se il sole fingesse di essere più caldo di quanto sia.
        #GEPscience_sspxVisualObservation_NodensSrfLandedTemperateLowlands_00 = Un paesaggio ampio e silenzioso si stende sotto un sole cremisi opaco, e continui a cercare un movimento che non sai spiegare.
        #GEPscience_sspxVisualObservation_NodensSrfLandedTropicalMidlands_00 = Dalle pianure, lontane masse di nubi si accumulano come tempeste lente, e ti chiedi per quanti "giorni" dovrebbe sembrare un giorno qui.
        #GEPscience_sspxVisualObservation_NodensSrfLandedTemperateMidlands_00 = Il terreno si allontana in colori morbidi, ma nulla corrisponde alle mappe di casa, perché "casa" non è da nessuna parte qui vicino.
        #GEPscience_sspxVisualObservation_NodensSrfLandedHighlands_00 = Le colline ti danno un orizzonte più lungo e una sensazione di sicurezza più corta, come se il pianeta mettesse alla prova la tua fiducia in quota.
        #GEPscience_sspxVisualObservation_NodensSrfLandedTundra_00 = Il suolo è pallido e immobile, riflette la luce rossa come un cartello di avvertimento, e il silenzio fuori sembra abbastanza denso da misurare.
        #GEPscience_sspxVisualObservation_NodensSrfLandedIceCaps_00 = Il ghiaccio cattura il sole brace e lo rimanda come un bagliore freddo, facendo sembrare il mondo bello in un modo che pare immeritato.
        #GEPscience_sspxVisualObservation_NodensSrfSplashedSaltySeas_00 = La superficie del mare luccica scura sotto il sole rosso, e registri la vista mentre, in silenzio, controlli ogni guarnizione due volte.
        #GEPscience_sspxVisualObservation_NodensSrfSplashedFreshWater_00 = L'acqua sembra pulita e familiare finché il cielo non ti ricorda che non lo è, e non sai decidere se sentirti sollevato o inquieto.
        #GEPscience_sspxVisualObservation_NodensSrfSplashedShores_00 = Galleggi vicino alla costa guardando le onde illuminate di rosso entrare e uscire, e sembra che il pianeta respiri molto lentamente.
        #GEPscience_sspxVisualObservation_BelisamaInSpaceLow_00 = Belisama resta vicino a Nodens come se avesse paura di allontanarsi, e la danza bloccata tra i due è inquietantemente intima.
        #GEPscience_sspxVisualObservation_BelisamaInSpaceHigh_00 = Da un'orbita alta, vedi quanto Belisama si aggrappi a Nodens: due mondi che si fissano per sempre sotto un sole rosso stanco.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedFlats_00 = I terreni piatti sono lisci e silenziosi, e il cielo è dominato da Nodens, così enorme che sembra meno un panorama e più una supervisione.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedTropicalLowlands_00 = "Tropicale" è solo un'etichetta su una luna fredda, i bassopiani giacciono deboli e inerti, illuminati da un sole che non sembra mai davvero sveglio.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedTemperateLowlands_00 = I bassopiani si stendono verso un orizzonte che cambia poco, e ti chiedi com'è vivere dove l'elemento principale del cielo non si muove mai.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedTropicalMidlands_00 = Le pianure sembrano sospese tra roccia e cielo, con Nodens fisso al suo posto come se qualcuno lo avesse inchiodato lì come riferimento.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedTemperateMidlands_00 = Dorsali sottili proiettano ombre lunghe nella luce rossa, e il paesaggio sembra aspettare osservatori da moltissimo tempo.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedHighlands_00 = Dalle colline, la vista tidally-locked è inconfondibile: un volto per Nodens, un volto per l'oscurità, e zero spazio per compromessi.
        #GEPscience_sspxVisualObservation_BelisamaSrfLandedPoles_00 = Il sole basso trasforma ogni rilievo in una lama d'ombra, e l'immobilità sembra una regola, non un incidente.
        #GEPscience_sspxVisualObservation_SucellusInSpaceLow_00 = Sucellus sembra pesante per le sue dimensioni: scuro, denso e risoluto, come se accumulasse segreti negli spazi tra i crateri.
        #GEPscience_sspxVisualObservation_SucellusInSpaceHigh_00 = Da lontano, Sucellus è un puntino piccolo e ostinato in un sistema ancora più piccolo, e il sole rosso fa sembrare tutto sottodimensionato.
        #GEPscience_sspxVisualObservation_SucellusSrfLandedBasins_00 = I bacini sono profonde ciotole di ombra e abbaglio, e ti sorprendi a fissare come se il terreno potesse rivelare di cosa è fatto, se lo guardi abbastanza a lungo.
        #GEPscience_sspxVisualObservation_SucellusSrfLandedLowlands_00 = I bassopiani sembrano ruvidi e "da risorse", il tipo di terreno che fa parlare piano gli ingegneri e sorridere nervosamente i contabili.
        #GEPscience_sspxVisualObservation_SucellusSrfLandedTropicalMidlands_00 = Le pianure si susseguono in rossi spenti e grigi, e il pianeta sembra meno una destinazione e più una cava che non ha mai chiesto di esserlo.
        #GEPscience_sspxVisualObservation_SucellusSrfLandedTemperateMidlands_00 = La luce è debole, la roccia è più scura, e il tuo riflesso nel finestrino è la cosa più luminosa che si veda.
        #GEPscience_sspxVisualObservation_SucellusSrfLandedHighlands_00 = Dalle colline, l'orizzonte sembra scheggiato e metallico, e inizi a immaginare che suono farebbero i trapani in questo silenzio.
        #GEPscience_sspxVisualObservation_SucellusSrfLandedPoles_00 = I poli stanno sotto un bagliore sottile e freddo, e le ombre sembrano durare più del dovuto, come se il giorno si fosse dimenticato di arrivare.
        #GEPscience_sspxVisualObservation_CaireenInSpaceLow_00 = Caireen è minuscola e irregolare, un puntino adottato che orbita intorno a Sucellus come se stesse ancora decidendo se restare catturata.
        #GEPscience_sspxVisualObservation_CaireenInSpaceHigh_00 = Da un'orbita alta, Caireen quasi scompare, e ti rendi conto di quanto sarebbe facile perdere una luna quassù e non accorgersene mai.
        #GEPscience_sspxVisualObservation_CaireenSrfLandedLowlands_00 = I bassopiani sono un groviglio di rocce e spigoli, illuminati da un sole rosso che fa sembrare ogni superficie più vecchia di quanto probabilmente sia.
        #GEPscience_sspxVisualObservation_CaireenSrfLandedMidlands_00 = Dalle pianure, Sucellus domina il cielo come un'ancora scura, e senti molto chiaramente quanto "atterraggio" possa essere una cosa temporanea.
        #GEPscience_sspxVisualObservation_CaireenSrfLandedHighlands_00 = Le colline ti danno una vista ampia su nient'altro che pietra e spazio, e il vuoto sembra fissarti a sua volta.
        #GEPscience_sspxVisualObservation_CaireenSrfLandedPoles_00 = Il terreno polare è spoglio e tagliente, e la luce rossa trasforma le ombre in avvertimenti lunghi e silenziosi.
        #GEPscience_sspxVisualObservation_SironaFlyingHigh_00 = Le cime delle nubi scorrono come lividi lenti sotto il sole brace, ogni sguardo fuori sembra origliare un meteo troppo grande per importargli di te.
        #GEPscience_sspxVisualObservation_SironaInSpaceLow_00 = Le bande di Sirona si attorcigliano in rossi smorzati e ocra, e ti sorprendi ad aspettare una risposta dal Controllo Missione che non arriverà per un bel po'.
        #GEPscience_sspxVisualObservation_SironaInSpaceHigh_00 = Da un'orbita alta, gli anelli di Sirona sono un graffio pallido attorno a un gigante scuro: delicati, lontani e per nulla rassicuranti.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedTropicalLowlands_00 = Pianure dai toni caldi si stendono fino a un orizzonte basso, ma il giorno rosso fa sembrare ogni ombra appartenere al mondo di qualcun altro.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedTemperateLowlands_00 = I bassopiani sembrano abbastanza calmi da potercisi fermare, finché non ricordi il colore del cielo e il ritardo delle comunicazioni che trasforma "ciao" in un documento storico.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedTropicalMidlands_00 = Dalle pianure, il terreno sfuma in rossi polverosi e grigi, la vista è ampia e la solitudine ha spazio per espandersi.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedTemperateMidlands_00 = Il paesaggio smorzato sembra quasi familiare per un attimo—poi l'angolo del sole debole rende tutto leggermente inclinato rispetto alla realtà.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedHighlands_00 = Le colline ti regalano una vista più lunga e una pazienza più corta, l'orizzonte sembra netto, come ritagliato dal cielo.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedDarkenedLowlands_00 = Qui la luce è visibilmente più debole, come se il terreno la stesse accumulando, annoti "scarsa visibilità" e sottolinei "umore".
        #GEPscience_sspxVisualObservation_AirmedSrfLandedDarkenedMidlands_00 = Il debole bagliore rosso non raggiunge mai davvero le valli, e le ombre sembrano abbastanza profonde da nascondere interi piani di missione.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedDarkenedHighlands_00 = Anche dall'alto, le regioni oscurate restano ostinatamente spente, come se il paesaggio rifiutasse di farsi osservare sul serio.
        #GEPscience_sspxVisualObservation_AirmedSrfLandedPoles_00 = Il sole basso sfiora l'orizzonte per sempre, trasformando ogni cresta in una lunga linea nera e facendo sentire il tempo stranamente dilatato.
        #GEPscience_sspxVisualObservation_AirmedInSpaceLow_00 = Airmed pende sotto il sole rosso come un piccolo bersaglio silenzioso, vedi chiaramente i contrasti di superficie e ti senti comunque del tutto irraggiungibile.
        #GEPscience_sspxVisualObservation_AirmedInSpaceHigh_00 = Da lontano, Airmed è un minuscolo cerchio disciplinato in un enorme campo nero: facile da perdere, difficile da dimenticare.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedTropicalCraquelure_00 = Il suolo è spaccato in piastre serrate, come vernice secca su uno scafo antico, la luce rossa fa sembrare le fratture appena riaperte.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedTemperateCraquelure_00 = Ampi disegni di crosta dall'aria fragile si stendono in ogni direzione, e non riesci a scrollarti di dosso l'idea che la superficie stia fingendo di essere solida.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedTropicalLowlands_00 = I bassopiani brillano appena sotto il sole brace, e la tremolìo di calore fa ondeggiare il terreno lontano come una trasmissione difettosa.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedTemperateLowlands_00 = Distese piatte e lievi ondulazioni scorrono oltre il finestrino come onde lente di pietra, tutto immerso in un lavaggio rossastro e stanco.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedTropicalMidlands_00 = Dalle pianure, crepe e dorsali formano una mappa che nessuno ha disegnato di proposito, la archivi sotto "inutilmente interessante".
        #GEPscience_sspxVisualObservation_BorvoSrfLandedTemperateMidlands_00 = Le pianure sembrano ordinate finché non le fissi troppo a lungo—poi i pattern iniziano a sembrare allineati per ragioni che preferisci non indovinare.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedHighlands_00 = Le colline offrono una vista dominante su una superficie tesa e frammentata, come se la luna si tenesse insieme per pura testardaggine.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedMajorCraters_00 = Le pareti del cratere incorniciano il cielo come una ciotola di vuoto tinto di rosso, e il bordo opposto sembra impossibilmente lontano per qualcosa di così vicino.
        #GEPscience_sspxVisualObservation_BorvoSrfLandedPoles_00 = Ai poli la luce arriva bassa e fredda, la superficie spaccata proietta ombre lunghe che rendono la navigazione simile a decifrare un codice a barre.
        #GEPscience_sspxVisualObservation_BorvoFlyingHigh_00 = Attraverso una foschia sottile, le texture di Borvo sfumano in un patchwork macchiato, e il sole rosso trasforma la quota in una sorta di pressione silenziosa.
        #GEPscience_sspxVisualObservation_BorvoInSpaceLow_00 = Da un'orbita bassa, i pattern di craquelure sono inconfondibili: un intero mondo di fratture, che gira in silenzio sotto una stella brace.
        #GEPscience_sspxVisualObservation_BorvoInSpaceHigh_00 = Borvo si riduce a una piccola macchia pallida, e lo spazio attorno sembra troppo vuoto per essere casuale.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedTropicalLowlands_00 = I bassopiani hanno contorni morbidi nella debole luce rossa, come se il mondo stesse cercando di nascondere i dettagli al tuo blocchetto.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedTemperateLowlands_00 = Una pianura ampia e silenziosa si allunga davanti a te, scrivi "stabile" e poi fissi il cielo finché la parola non diventa discutibile.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedTropicalMidlands_00 = Dalle pianure, hai una vista lunga su dorsali e pendii smorzati, tutti sotto un sole che fa sembrare il giorno una sera.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedTemperateMidlands_00 = Il terreno ondeggia dolcemente, ma la palette è tutta sbagliata, come se qualcuno avesse abbassato la saturazione della realtà.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedHighlands_00 = Dalle colline, l'orizzonte sembra pulito e lontano, e il silenzio fuori pare avere massa.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedImpactBasin_00 = Il bacino è una cicatrice immensa con pareti che catturano la luce rossa in modo irregolare, è difficile non immaginare l'impatto che riecheggia ancora.
        #GEPscience_sspxVisualObservation_DamonaSrfLandedPoles_00 = La vista polare è spoglia e uniformemente illuminata, con ombre stirate sottili sul terreno come lunghi, scuri cavi di comunicazione.
        #GEPscience_sspxVisualObservation_DamonaInSpaceLow_00 = I contrasti della superficie di Damona sono nitidi in orbita bassa, ma il sole rosso debole lascia tutta la scena stranamente in penombra e remota.
        #GEPscience_sspxVisualObservation_DamonaInSpaceHigh_00 = Da un'orbita alta, Damona è un piccolo disco quieto: un altro avamposto di roccia in un sistema dove la distanza è la caratteristica principale.
        #GEPscience_sspxVisualObservation_EponaFlyingHigh_00 = Le nubi e i ghiacci sotto di te sono illuminati come un tardo crepuscolo, e continui ad aspettarti che il sole rosso si decida a rischiarare e a fare il suo lavoro.
        #GEPscience_sspxVisualObservation_EponaInSpaceLow_00 = Il volto ghiacciato di Epona sembra calmo da qui, ma i deboli indizi di attività ti fanno chiedere cosa si muova sotto tutto quel freddo.
        #GEPscience_sspxVisualObservation_EponaInSpaceHigh_00 = Da molto lontano, Epona è una moneta scura in un mare ancora più scuro, quasi senti la distanza nel fruscio radio.
        #GEPscience_sspxVisualObservation_EponaSrfLandedTropicalLowlands_00 = I "tropici" sono soprattutto ottimismo da cartografo: tutto è pallido, freddo e tinto di rosso come una spia di allarme perenne.
        #GEPscience_sspxVisualObservation_EponaSrfLandedTemperateLowlands_00 = Orizzonti lunghi e piatti rendono facile osservare il cielo e difficile ignorare quanta poca "calma" restituisca in calore.
        #GEPscience_sspxVisualObservation_EponaSrfLandedTropicalUplands_00 = Gli altopiani catturano più luce, ma è comunque del colore sbagliato, il paesaggio sembra refrigerato da secoli.
        #GEPscience_sspxVisualObservation_EponaSrfLandedTemperateUplands_00 = Fissi creste silenziose e provi a capire se il "giorno" stia davvero cambiando, o se tu lo stia solo sperando.
        #GEPscience_sspxVisualObservation_EponaSrfLandedHighlands_00 = Dalle colline, il mondo sembra sigillato: un coperchio di ghiaccio con giusto abbastanza crepe da incuriosirti.
        #GEPscience_sspxVisualObservation_EponaSrfLandedGrandPeaks_00 = Le grandi vette incidono il cielo smorto come denti spezzati, e le ombre sembrano abbastanza profonde da conservare interi inverni.
        #GEPscience_sspxVisualObservation_EponaSrfLandedCraters_00 = I bordi dei crateri trattengono il buio anche a mezzogiorno locale, lo registri come "eccellente per rimuginare".
        #GEPscience_sspxVisualObservation_EponaSrfLandedVolcanoes_00 = Sfiati scuri e pendii macchiati suggeriscono calore sotto, ma la superficie resta ostinatamente gelata, come se si vergognasse del proprio calore.
        #GEPscience_sspxVisualObservation_EponaSrfLandedPoles_00 = Il sole rosso sfiora l'orizzonte per sempre, trasformando il ghiaccio in uno specchio opaco che rifiuta di sembrare amichevole.
        #GEPscience_sspxVisualObservation_RosmertaInSpaceLow_00 = Rosmerta è piccola e dai bordi netti, come un pezzo scheggiato via da un mondo più grande e mai presentato come si deve.
        #GEPscience_sspxVisualObservation_RosmertaInSpaceHigh_00 = Da un'orbita alta, Rosmerta quasi scompare nel nero, è il tipo di posto che potresti "perdere" di proposito.
        #GEPscience_sspxVisualObservation_RosmertaSrfLandedTropicalLowlands_00 = I bassopiani sono freddi, grigi e assolutamente privi d'aria—qui "tropicale" vuol dire solo "non peggio dei poli".
        #GEPscience_sspxVisualObservation_RosmertaSrfLandedTemperateLowlands_00 = Texture fini e deboli dorsali compaiono solo quando la luce rossa colpisce nel modo giusto, come se la luna razionasse i dettagli.
        #GEPscience_sspxVisualObservation_RosmertaSrfLandedTropicalMidlands_00 = Le pianure sembrano consumate e pazienti, come se aspettassero di essere notate da un tempo lunghissimo.
        #GEPscience_sspxVisualObservation_RosmertaSrfLandedTemperateMidlands_00 = Continui a fissare l'orizzonte in cerca di un meteo che non può esistere, poi ti ricordi che stai in vuoto.
        #GEPscience_sspxVisualObservation_RosmertaSrfLandedHighlands_00 = Le colline offrono una vista ampia su roccia quieta e ombre lunghe, sembra che il paesaggio stia ascoltando.
        #GEPscience_sspxVisualObservation_RosmertaSrfLandedPoles_00 = Il terreno polare è spoglio e uniformemente illuminato, e il sole rosso smorto fa sembrare l'intero mondo in modalità risparmio energetico.
        #GEPscience_sspxVisualObservation_RAB-58EInSpaceLow_00 = Il piccolo corpo sembra un randagio catturato: piazzato in modo strano, dalla forma strana e del tutto disinteressato a spiegarsi.
        #GEPscience_sspxVisualObservation_RAB-58EInSpaceHigh_00 = Da molto lontano è a malapena un segno nel vuoto, ricontrolli il tracciamento solo per dimostrare che è davvero lì.
        #GEPscience_sspxVisualObservation_RAB-58ESrfLandedLowlands_00 = La superficie è angusta e frastagliata, e la luce smorta fa sembrare ogni roccia come se ne stesse nascondendo un'altra dietro.
        #GEPscience_sspxVisualObservation_RAB-58ESrfLandedEasternHighlands_00 = Dalle alture orientali, Epona sembra scomodamente vicina nel cielo per qualcosa che impiega così tanto a rispondere.
        #GEPscience_sspxVisualObservation_RAB-58ESrfLandedWesternHighlands_00 = Le alture occidentali sono tutte ombre e spigoli vivi, annoti la vista e cerchi di non immaginare di andare alla deriva con un salto distratto.
        #GEPscience_sspxVisualObservation_CernunnosInSpaceLow_00 = Cernunnos è un nano ghiacciato dall'aria solitaria: chiazze luminose di brina e cicatrici scure, tutto sotto un sole che si fa appena vedere.
        #GEPscience_sspxVisualObservation_CernunnosInSpaceHigh_00 = Da un'orbita alta è una piccola perla pallida su una vastissima corda di nulla, "remoto" sembra un eufemismo.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedTropicalLowlands_00 = I bassopiani sono congelati duri e illuminati di un rosso debole, se qualcosa qui è "tropicale", è la tua immaginazione.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedTemperateLowlands_00 = Pianure ampie si stendono senza movimento, senza foschia, senza pietà—solo vuoto pulito e luce lontana.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedTropicalMidlands_00 = Le pianure mostrano strati sottili e basse creste, come se il suolo stesse archiviando in silenzio i record di tempi ancora più freddi.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedTemperateMidlands_00 = Nel debole bagliore il terreno sembra quasi morbido, finché non ricordi che è tutto ghiaccio e pietra che fingono gentilezza.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedHighlands_00 = Dalle colline, l'orizzonte è brutalmente nitido, vedi per sempre, e questo significa soprattutto che vedi quanto sei solo.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedSouthPolarHills_00 = Le colline del polo sud proiettano ombre lunghe e sottili che si muovono a malapena—il tempo sembra stirato, come se il giorno avesse dimenticato come avanzare.
        #GEPscience_sspxVisualObservation_CernunnosSrfLandedNorthPole_00 = Al polo, il sole rosso resta basso e distante, trasformando il mondo in un diagramma silenzioso di freddo e vuoto.

        // === Tantares ===
        // tantares_infrared_light_camera
        #GEPscience_tantares_infrared_light_camera_GrannusFlyingLow_00 = La vista all'infrarosso è soprattutto "non guardare direttamente Grannus", ma individui comunque scie più calde che scorrono nella sottile foschia rossa.
        #GEPscience_tantares_infrared_light_camera_GrannusFlyingHigh_00 = Sopra il bagliore rossastro, la camera continua a tentare di misurare "caldo infinito". Lo archivi come "atteso, ma comunque allarmante".
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceHigh_00 = Anche da un'orbita alta, Grannus manda in saturazione il sensore, finisci per mappare invece le perdite di calore della navicella.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthPolarZone_00 = La zona polare sembra appena "meno impossibile" del resto. Ti prendi le vittorie che puoi, così lontano da casa.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthSubpolarZone_00 = Il gradiente termico qui tremola come una cosa viva. Il Centro di Controllo riceve i dati dopo, quando "dopo" arriva.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthTemperateZone_00 = L'immagine è un delicato equilibrio tra fare scienza e non incendiare la camera. Per ora, la scienza sta vincendo.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthTropicZone_00 = Le increspature di calore impastano l'immagine in bande di velluto rosso. Lo etichetti "tropici" e fingi fosse voluto.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowEquatorialZone_00 = L'equatore è puro bagliore e furia, l'unica cosa "fredda" è l'otturatore automatico che si chiude di scatto per autodifesa.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthTropicZone_00 = La camera risolve una trama sottile dentro il bagliore, come correnti fatte di luce. Ti senti piccolo, e poi lo registri.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthTemperateZone_00 = La mappa termica si assesta in strisce stabili. È stranamente rassicurante, in un senso da "stella gigante che prova a cucinarti".
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthSubpolarZone_00 = Catturi effimeri lembi più freddi che cavalcano la turbolenza. Spariscono prima che tu possa battere ciglio, ma il registratore li ha presi.
        #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthPolarZone_00 = Il polo lontano risulta nitido per un attimo, poi torna a saturare. Annoti: "brevemente collaborativo".
        #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedMagmaShores_00 = Il suolo è così caldo da far riconsiderare la carriera ai tuoi stivali, la riva brilla come un'etichetta di pericolo.
