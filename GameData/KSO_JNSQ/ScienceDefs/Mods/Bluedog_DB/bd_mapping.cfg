        HuygenInSpaceLowPolarHighlands* = #JNSQ_bd_mapping_HuygenInSpaceLowPolarHighlands_00 // The polar highlands show mottled bright blocks amid deep shadow, barely visible through the soup. You tag the region "rugged, hidden, interesting."
