        // mobileMaterialsLab
        #JNSQscience_mobileMaterialsLab_SunFlyingLow_00 = Il vano materiali si apre e diventa all'istante un forno a forma di vano materiali. Diversi campioni si "riclassificano" in elementi più semplici.
        #JNSQscience_mobileMaterialsLab_SunFlyingHigh_00 = Negli strati esterni più sottili, è la radiazione a fare gran parte del lavoro: i rivestimenti scoloriscono, le lamine si infragiliscono e il laboratorio consiglia con discrezione di non usare mai "cotto al sole" come caratteristica di progetto.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedPoles_00 = Apri il vano e ti godi per un attimo temperature che sono solo "terribili" invece che "catastrofiche". I campioni sembrano comunque già tostati.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedPoles_01 = I materiali tintinnano e si contraggono mentre si raffreddano all'ombra. Il Controllo Missione chiede se "non fondere" conti come una svolta.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedPolarIceCraters_00 = Una piastra campione raffreddata si appanna all'istante. Qualunque cosa si nasconda in quest'ombra sta facendo di tutto per restare solida.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedPolarIceCraters_01 = Minuscoli cristalli si formano su un contenitore, poi spariscono appena vedono la luce. Il laboratorio lo registra come "brina esistenzialmente instabile".
