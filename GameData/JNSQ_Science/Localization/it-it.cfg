        #JNSQscience_gravityScan_TyloInSpaceHighMidlands_00 = Le radiazioni crepitano nell'elettronica e la curva della gravità ondeggia comunque. Tylo e Jool vogliono entrambi la tua attenzione.
        #JNSQscience_gravityScan_TyloInSpaceHighLowlands_00 = I motivi dei bacini si confondono tra loro, eppure una regione continua a trascinare un po' l'orbita. La segnali per pianificare i passaggi futuri.
