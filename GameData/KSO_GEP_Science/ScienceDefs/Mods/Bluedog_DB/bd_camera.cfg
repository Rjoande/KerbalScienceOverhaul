		SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_camera_SucellusInSpaceLowTemperateMidlands_00 // You capture a long swath of terrain and notice faint radial patterns around old impacts. The camera gives you evidence; the interpretation will take a committee.
