        #CSS_evaReport_KerbinInSpaceHigh_14 = Fluttuando pacificamente in alto sopra le grandi montagne di Kerbin, ti senti soddisfatto della tua scelta di carriera.
        #CSS_evaReport_KerbinInSpaceHigh_15 = Siamo nello spazio! Beccati questa, Kraken! Chi ride adesso, eh???
        #CSS_evaReport_KerbinInSpaceHigh_16 = Il freddo dello spazio profondo è un forte contrasto con i ricordi pieni di calore delle tue giornate sulle coste di Kerbin.
        #CSS_evaReport_KerbinInSpaceHigh_17 = Fai una capriola e un backflip dal portello fino al fianco della nave. Ti piace QUESTO, CKS?
        #CSS_evaReport_KerbinInSpaceHigh_18 = Eccoti qui, ad attraversare il golfo tra le stelle. Proprio come gli antichi marinai che affrontarono il viaggio attraverso i mari.
        #CSS_evaReport_KerbinInSpaceHigh_19 = Wow, guarda che vista. Se solo riuscissimo a capire come portare gli snack in queste tute.
        #CSS_evaReport_KerbinInSpaceHigh_20 = Mentre fluttui sopra il terreno desolato nella tua tuta EVA, la mente vaga, come spesso accade, verso gli snack. Gnam, gnam, snack buonissimi!
        #CSS_evaReport_KerbinInSpaceHigh_21 = Ti chiedi perché ci sia così tanto ghiaccio accumulato attorno a ogni polo... d'altra parte, non ti viene in mente un posto migliore dove metterlo.
        #CSS_evaReport_KerbinInSpaceHigh_22 = La vista delle montagne sotto è molto più chiara quando non guardi attraverso il finestrino di un'astronave.
        #CSS_evaReport_KerbinInSpaceHigh_23 = Saluti vagamente in direzione di Kerbin. Ciao Tundra! Addio Tundra!
        #CSS_evaReport_MunSrfLanded_00 = Questo è un piccolo passo pe... *la situazione è nominale*.
        #CSS_evaReport_MunSrfLanded_01 = Questo è un piccolo passo per un kerbal, e una grande scorta di snack per quel Kerbal.
        #CSS_evaReport_MunSrfLanded_02 = Noti delle rocce strane in lontananza.
        #CSS_evaReport_MunSrfLanded_03 = Sei, in un modo molto peculiare, e le stelle oggi sembrano molto diverse.
        #CSS_evaReport_MunSrfLanded_04 = Un sassolino incrina la visiera. Inizi a mettere in discussione le EVA su una superficie senza atmosfera.
        #CSS_evaReport_MunSrfLandedMidlands_00 = Mentre scendi dal lander e pronunci il solito discorso drammatico, il Controllo Missione chiama, ti dice di tagliare le chiacchiere e di prendere l'importantissimo campione di superficie.
        #CSS_evaReport_MunSrfLandedMidlands_01 = Alzi lo sguardo e speri che gli scienziati dei razzi su Kerbin abbiano fatto i conti giusti.
        #CSS_evaReport_MunSrfLandedNorthernBasin_00 = "Ho lasciato le chiavi nel quadro?"
        #CSS_evaReport_MunSrfLandedEastCrater_00 = Senti una strana scossa. Quando ti giri, vedi un meteorite appena caduto proprio dove stavi camminando.
        #CSS_evaReport_MunSrfLandedNorthwestCrater_00 = Avresti dovuto portare la mazza da golf.
        #CSS_evaReport_MunSrfLandedSouthwestCrater_01 = Questa polvere entra dappertutto! Ora smettila di fissare e aiutami a pulire la visiera!
        #CSS_evaReport_MunSrfLandedFarsideCrater_00 = Ti chiedi come abbia fatto quella roccia a finire nella tua tuta spaziale.
        #CSS_evaReport_MunSrfLandedCanyons_00 = Noti un punto stretto del canyon e ti chiedi se potresti saltare dall'altra parte.
        #CSS_evaReport_MunSrfLandedCanyons_01 = Sollevi la mano davanti a Kerbin e usi il pollice per coprire il Sole. Dopo aver pensato per un attimo a “pale blue dots”, alla piccolezza dei Kerbal e alla filosofia, torni a chiederti quanto sarebbe bello fare un salto con rampa su quelle dune laggiù.
        #CSS_evaReport_MunSrfLandedPolarCrater_00 = Un po' annoiato, giochi a cucù con Kerbin oltre i bordi del cratere.
        #CSS_evaReport_MunSrfLandedPoles_00 = Canticchi "Non mi farai mai essere come te/sono il padrone della Luna."
        #CSS_evaReport_MunSrfLandedPoles_01 = Sei stupito da quanto sia misterioso il panorama lunare visto dal polo.
        #CSS_evaReport_MunSrfLandedPolarLowlands_00 = Confermi che Mun non è fatta di formaggio. Il Controllo Missione è tristissimo.
        #CSS_evaReport_MunSrfLandedHighlands_00 = A quanto pare, non c'è formaggio!
        #CSS_evaReport_MunSrfLandedHighlandCraters_00 = Non -sa- di latticini...
        #CSS_evaReport_MunSrfLandedMidlandCraters_00 = Sì, è proprio un cratere. L'hai annotato sulla checklist con una faccina sorridente. La scienza è divertente!
        #CSS_evaReport_MunSrfLandedEastFarsideCrater_00 = C'era qualcosa che volevi dire e, anche se hai passato tutto il viaggio a perfezionare la tua battuta, in qualche modo sei riuscito a dimenticarla.
        #CSS_evaReport_MunSrfLandedTwinCraters_00 = Vorresti tantissimo saltare di nuovo, ma l'ultima volta il Controllo Missione ti ha urlato contro.
        #CSS_evaReport_MunInSpaceLow_00 = "Chissà se sa di formaggio? Nah. Minmus però..."
        #CSS_evaReport_MunInSpaceLowMidlands_00 = Pur essendo relativamente piatte, le pianure sono comunque cosparse di detriti di ejecta da impatto, quindi scegliere un sito di atterraggio non è una cosa banale.
        #CSS_evaReport_MunInSpaceLowNorthernBasin_00 = Mentre studi il Northern Basin durante una EVA in orbita bassa, ti viene improvvisamente un impulso travolgente di fare pipì...
        #CSS_evaReport_MunInSpaceLowEastCrater_00 = Fissi Mun stupito da quanto velocemente ti muovi sulla superficie; forse uscire dalla capsula è stata una cattiva idea.
        #CSS_evaReport_MunInSpaceLowEastCrater_01 = È difficile capirlo da fuori dal cockpit, ma ti sembra di essere davvero basso. Non è che sei... nel cratere, vero?
        #CSS_evaReport_MunInSpaceLowEastCrater_02 = Fissi Mun stupito da quanto velocemente ti muovi sulla superficie; forse uscire dalla capsula è stata una cattiva idea.
        #CSS_evaReport_MunInSpaceLowNorthwestCrater_00 = Hmm... questo Northwest Crater non sembra rotondo come alcuni degli altri. Forse la lava si è raffreddata in modo irregolare. O qualcosa del genere.
        #CSS_evaReport_MunInSpaceLowSouthwestCrater_01 = Il Southwest Crater è davvero piuttosto rotondo. L'impatto deve aver colpito quasi perpendicolare alla superficie.
        #CSS_evaReport_MunInSpaceLowFarsideCrater_00 = Hmm non male. Però ti piacerebbe vedere il West Nearside Crater prima di decidere quale cratere sia il più bello di tutti.
        #CSS_evaReport_MunInSpaceLowCanyons_00 = Si vedono striature sulle pareti dei canyon.
        #CSS_evaReport_MunInSpaceLowCanyons_01 = I canyon sotto sembrano particolarmente divertenti da scalare. Peccato che tu stia andando a una velocità relativa così alta...
        #CSS_evaReport_MunInSpaceLowPolarCrater_00 = Vorresti aver assistito al devastante impatto che ha creato l'enorme cratere di Mun. Da una distanza di sicurezza, ovviamente.
        #CSS_evaReport_MunInSpaceLowPoles_00 = Uffa, i Poli del Mun non hanno aurore... Oh ehi, da qui puoi vedere quelle di Kerbin!
        #CSS_evaReport_MunInSpaceLowPolarLowlands_00 = Se fosse Kerbin, ormai vedresti lastre di ghiaccio. Pazienza: le EVA sono comunque divertenti.
        #CSS_evaReport_MunInSpaceLowHighlands_00 = Gli scienziati hanno spiegato che le colline munari sono probabilmente cumulati di plagioclasio. Non sei proprio sicuro di cosa significhi.
        #CSS_evaReport_MunInSpaceLowHighlands_01 = Le colline del Mun sono ok. Però vorresti comunque che ci fosse una specie di montagna munare!
        #CSS_evaReport_MunInSpaceLowHighlandCraters_00 = Dopo aver completato le attività assegnate, lasci andare la nave e fluttui liberamente sopra gli Highland Craters del Mun.
        #CSS_evaReport_MunInSpaceLowMidlandCraters_00 = Santo cielo ce ne sono un sacco... il che significa che ce n'è abbastanza per tutti quando inizieranno a dare i nomi alle cose!
        #CSS_evaReport_MunInSpaceLowEastFarsideCrater_00 = Non ti piace il nome "East Farside Crater". Speri davvero di atterrare laggiù così potranno chiamarlo con il tuo nome.
        #CSS_evaReport_MunInSpaceLowEastFarsideCrater_01 = Vorresti aver portato uno skateboard. Quelle pareti del cratere sarebbero un halfpipe incredibile.
        #CSS_evaReport_MunInSpaceLowTwinCraters_00 = Che cratere dalla forma strana. Sono due impatti diversi? O magari il risultato di un impattatore che ha colpito in obliquo rimbalzando sulla superficie.
        #CSS_evaReport_MunInSpaceHigh_00 = Ehi, quelli laggiù sono i Munar Canyons? Sono davvero impressionanti. Niente a che vedere con quelli di Kerbin, ovviamente.
        #CSS_evaReport_MunInSpaceHigh_01 = Sembra una roccia davvero grande.
        #CSS_evaReport_MunInSpaceHigh_02 = Non riesci a pensare ad altro che alle patate...
        #CSS_evaReport_MunInSpaceHigh_03 = Stai cercando di capire come descrivere questo momento alla gente a casa. Probabilmente non dovresti citare la parte in cui hai fatto pipì nella tuta.
        #CSS_evaReport_MunInSpaceHigh_04 = Puoi vedere la cresta del cratere sotto molto più chiaramente attraverso la sola visiera della tuta. Ma allora perché abbiamo portato un'astronave?
        #CSS_evaReport_MunInSpaceHigh_05 = Hai smesso di contare i crateri quando hai finito le dita per la nona volta.
        #CSS_evaReport_MunInSpaceHigh_06 = Guardi attraverso la non-così-vasta distesa tra te e Mun. Chi l'avrebbe detto che fosse così grande.
        #CSS_evaReport_MunInSpaceHigh_07 = Ahhhh. Nessuno può sentirti sganciarne uno quassù.
        #CSS_evaReport_MunInSpaceHigh_08 = Entrare nel lato oscuro del Mun e perdere contatto con il Controllo Missione ti fa capire quanto sei isolato dal resto della tua specie.
        #CSS_evaReport_MunInSpaceHigh_09 = Beh, eccola. Forse dovresti ripassare il tuo fantastico discorso storico prima di atterrare.
        #CSS_evaReport_MunInSpaceHigh_10 = Ti chiedi se qualcuno su Kerbin stia guardando Mun con un telescopio proprio adesso. Agiti la mano un paio di volte nel caso possano vederti.
        #CSS_evaReport_MunInSpaceHigh_11 = Il Controllo Missione insiste nel guidarti passo passo durante questa EVA. Come piccolo atto di ribellione, fai tutto a testa in giù. Non lo sapranno mai! Nemmeno tu riesci a capire se sei davvero a testa in giù o no.
        #CSS_evaReport_MunInSpaceHigh_12 = Mentre fai la tua EVA, ti prude sempre di più il naso. Lo starnuto che ne segue per poco non ti fa perdere il controllo.
        #CSS_evaReport_MunInSpaceHigh_13 = Ehi, sorprendentemente Mun sembra proprio quella del libro di scuola. Probabilmente il risultato finale di centinaia di anni di curiosità Kerbal. E telescopi. Telescopi davvero enormi.
        #CSS_evaReport_MunInSpaceHigh_14 = Senti un improvviso sibilo dalla tuta. Per fortuna si scopre che erano solo gli snack di ieri sera.
        #CSS_evaReport_MunInSpaceHigh_15 = Ti muovi all'esterno della tua nave, meravigliandoti di come un simile aggeggio sia riuscito a portarti fin qui.
        #CSS_evaReport_MunInSpaceHigh_16 = Ispezioni la nave dall'esterno, seguendo la checklist di manutenzione fornita dal Controllo Missione.
        #CSS_evaReport_MunInSpaceHigh_17 = Durante l'EVA controlli la nave per assicurarti di non aver perso troppi pezzi.
        #CSS_evaReport_MunInSpaceHigh_18 = Potresti abituarti a fare pipì in questa tuta. Forse dovresti indossarla sempre, come un pannolone da duro.
        #CSS_evaReport_MinmusSrfLanded_00 = Hai confermato che la superficie non sa di gelato alla menta.
        #CSS_evaReport_MinmusSrfLanded_01 = La sostanza polverosa in superficie si solleva a ogni passo; la scacci mentre ti colpisce la visiera.
        #CSS_evaReport_MinmusSrfLanded_02 = Ordini agli ingegneri di iniziare subito a costruire un "rover dannatamente veloce" per gareggiare sulle Flats.
        #CSS_evaReport_MinmusSrfLandedHighlands_00 = È difficile controllare i movimenti con questa bassa gravità.
        #CSS_evaReport_MinmusSrfLandedHighlands_01 = Il terreno sotto di te ha la consistenza perfetta per delle palle di neve. Purtroppo non trovi un bersaglio degno.
        #CSS_evaReport_MinmusSrfLandedMidlands_00 = Passi diversi minuti a pensare a come assaggiare il terreno senza togliere il casco della tuta, poi rinunci.
        #CSS_evaReport_MinmusSrfLandedLowlands_00 = Guardi verso le colline e ti chiedi ad alta voce se potresti saltarle. Il Controllo Missione ti consiglia di non provarci.
        #CSS_evaReport_MinmusSrfLandedFlats_00 = Per quanto riesci a capire con la bassa gravità, il terreno è solido sotto i piedi e non è scivoloso quanto ti aspettavi.
        #CSS_evaReport_MinmusSrfLandedGreatFlats_00 = Pensi che potresti trivellare qualche buca qui e giocare a golf... golf spaziale, ovviamente.
        #CSS_evaReport_MinmusSrfLandedGreaterFlats_00 = Uscendo dal veicolo pronunci le parole: "È un piccolo passo per i Kerbal, un grande balzo per il Kerbalkind."
        #CSS_evaReport_MinmusSrfLandedLesserFlats_00 = Sembra che lo scarico del motore abbia sciolto il ghiaccio sottostante.
        #CSS_evaReport_MinmusSrfLandedPoles_00 = Senti il pianeta ruotare sotto di te. All'improvviso ti senti un po' “verde” allo stomaco.
        #CSS_evaReport_MinmusSrfLandedSlopes_00 = Ti chiedi quanto lontano potresti scivolare giù per questa collina...
        #CSS_evaReport_MinmusSrfLandedSlopes_01 = Inizi ad arrangiare una slitta con dei pezzi di ricambio, ma vieni interrotto dagli ordini del Controllo Missione.
        #CSS_evaReport_MinmusSrfLandedSlopes_02 = Avresti giurato di aver visto un ragazzino e una tigre scendere in slitta su un toboga. Controlli l'O2... Ah! Solo ipossia.
        #CSS_evaReport_MinmusInSpaceLow_00 = Le ipnotiche flats color acquamarina quasi ti fanno dimenticare di tenere sempre una mano sulla maniglia della nave.
        #CSS_evaReport_MinmusInSpaceLowHighlands_00 = La superficie sembra una miscela di roccia e ghiaccio... ti chiedi se potrebbe essere sfruttata per estrarre carburante.
        #CSS_evaReport_MinmusInSpaceLowLowlands_00 = In questo momento hai una gran voglia di gelato alla menta.
        #CSS_evaReport_MinmusInSpaceLowFlats_00 = Questi laghi di ghiaccio sono così piatti e lisci che sospetti sarebbero un'ottima pista di accelerazione.
        #CSS_evaReport_MinmusInSpaceLowGreatFlats_00 = Se la nave spaziale si guasta, probabilmente potresti usare il jetpack per tornare in orbita.
        #CSS_evaReport_MinmusInSpaceLowGreaterFlats_00 = Devi fare qualcosa per la mancanza di snack qui.
        #CSS_evaReport_MinmusInSpaceLowLesserFlats_00 = La bassa gravità renderebbe difficile guidare in giro.
        #CSS_evaReport_MinmusInSpaceHigh_00 = Sembra così piccolo, eppure così delizioso.
        #CSS_evaReport_DunaSrfLanded_00 = Vedi rosso. TANTO rosso.
        #CSS_evaReport_DunaSrfLanded_01 = Qui l'aria è un po' rarefatta. Laggiù?
        #CSS_evaReport_DunaSrfLanded_02 = Sarebbe un buon posto per avere enormi vermi delle sabbie come animali domestici?
        #CSS_evaReport_DunaSrfLanded_03 = Una raffica di vento crea una piccola tempesta di polvere rossa; si vede male.
        #CSS_evaReport_DunaSrfLandedPoles_00 = Sembra che una brezza tesa ti tiri le caviglie. Sospetti che significhi che del gas stia sfuggendo dalle calotte polari, e questo ti rende un po' nervoso.
        #CSS_evaReport_DunaSrfLandedPoles_01 = Un improvviso sbuffo di gas ti fa fare un balzo indietro dal foro del geyser in cui stavi guardando.
        #CSS_evaReport_DunaSrfLandedMidlands_00 = Ho fame. Dov'è la mia pizza? Cosa intendi, c'è un addebito di 37.000 Fund per la consegna a domicilio su Duna? 300 giorni o è gratis!
        #CSS_evaReport_DunaSrfLandedMidlands_01 = Sembra noioso qui fuori. Abbassi e rialzi la visiera parasole come se potesse renderlo più interessante.
        #CSS_evaReport_DunaSrfLandedMidlands_02 = La bassa gravità di Duna si presterebbe bene a una partita di basket entusiasmante! Pensi di aggiungere un canestro al prossimo lander.
        #CSS_evaReport_DunaSrfLandedLowlands_00 = Ti senti un vero eroe mentre marci sul pianeta rosso, finché non realizzi che sei molto, molto lontano da casa.
        #CSS_evaReport_DunaSrfLandedLowlands_01 = La sabbia qui è troppo fine per fare un castello, quindi decidi di saltellare un po'. Il Controllo Missione ti ordina di tornare ai compiti—sei arrivato fin qui, perché non puoi avere qualche minuto di DIVERTIMENTO!?
        #CSS_evaReport_DunaSrfLandedCraters_00 = Hai dimostrato che i complottisti sugli alieni si sbagliano. Non c'è nessun uomo alto e rosa da nessuna parte.
        #CSS_evaReport_DunaSrfLandedCraters_01 = Da terra non riesci a vedere i bordi del cratere. Sei sicuro che questo sia davvero un cratere?
        #CSS_evaReport_DunaSrfLandedHighlands_00 = Non c'è vento. La lieve forza che ti sferza ovunque altrove qui manca in modo inquietante.
        #CSS_evaReport_DunaSrfLandedHighlands_01 = Colline, schmolline, quassù sono in cima al mondo! Posso vedere per sempre!
        #CSS_evaReport_DunaSrfLandedMidlandSea_00 = Guardi Ike sopra di te e ti ricorda Dres. È altrettanto noioso, tra l'altro.
        #CSS_evaReport_DunaSrfLandedMidlandSea_01 = Avanzi nella fine sabbia rossa, con polvere che scivola giù dagli stivali a ogni passo.
        #CSS_evaReport_DunaSrfLandedNorthernBasin_00 = Non riesci a vedere l'altro lato del bacino. Qualunque tipo di bacino sia, è enorme!
        #CSS_evaReport_DunaSrfLandedNorthernBasin_01 = La tuta ti tiene abbastanza caldo nel freddo, ma le dita dei piedi iniziano a essere un po' gelate.
        #CSS_evaReport_DunaSrfLandedSouthernBasin_00 = Il terreno è molliccio sotto i piedi, come se non sapesse decidersi se essere ghiaccio o roccia.
        #CSS_evaReport_DunaSrfLandedSouthernBasin_01 = Una folata di vento gelido soffia via dalla calotta, facendoti sentire per un attimo davvero molto freddo.
        #CSS_evaReport_DunaSrfLandedNorthernShelf_00 = Una raffica di vento ululante quasi ti butta giù mentre la sabbia ticchetta contro la piastra della visiera.
        #CSS_evaReport_DunaSrfLandedNorthernShelf_01 = Il vento, ancora più gelido del solito, morde le dita dei piedi. Da dove può arrivare?
        #CSS_evaReport_DunaSrfLandedNorthernShelf_02 = I granelli di sabbia che passano volando vorticano e si sfregano tra loro mentre un fronte di tempesta di polvere ancora più enorme incombe da nord. L'aria intorno a te crepita di elettricità statica che ti fa rizzare i capelli.
        #CSS_evaReport_DunaSrfLandedMidlandCanyon_00 = Da un lato vedi la parete rocciosa, dall'altro la vastità del Midland Sea.
        #CSS_evaReport_DunaSrfLandedMidlandCanyon_01 = Guardi in su verso le pareti, ma perdi l'equilibrio e cadi, finendo supino nella polvere.
        #CSS_evaReport_DunaSrfLandedEasternCanyon_00 = Vorresti salire su una roccia e fare una posa drammatica, ma non ne trovi una abbastanza grande nella foschia fitta.
        #CSS_evaReport_DunaSrfLandedEasternCanyon_01 = Polvere—è tutto ciò che vedi. Non osi allontanarti troppo dalla nave nel caso non riuscissi a ritrovarla.
        #CSS_evaReport_DunaSrfLandedWesternCanyon_00 = Guardi lungo un'estremità del canyon, poi lungo l'altra. È molto disorientante e ti dispiacerebbe perderti qui.
        #CSS_evaReport_DunaSrfLandedWesternCanyon_01 = Tiri fuori un binocolo e guardi la parete giusto in tempo per vedere un enorme masso staccarsi dal dirupo e schiantarsi sul fondo. Il suono non arriva fino a te.
        #CSS_evaReport_DunaSrfLandedPolarHighlands_00 = Da questo punto elevato puoi vedere le abbaglianti colline rosate che si estendono in lontananza.
        #CSS_evaReport_DunaSrfLandedPolarHighlands_01 = Ti volti verso la nave e vedi grandi quantità di vapore sibilare da sotto. Speri che non stia per sprofondare nel ghiaccio.
        #CSS_evaReport_DunaSrfLandedPolarCraters_00 = Metti piede sul ghiaccio e quasi scivoli subito. Alcune cose non cambiano mai col ghiaccio.
        #CSS_evaReport_DunaSrfLandedPolarCraters_01 = Per fortuna le tute hanno il controllo climatico. Cerchi di non pensare a quanto ti congeleresti senza.
        #CSS_evaReport_DunaFlyingLowPoles_00 = Vedi un lontano pennacchio di gas espellere un grosso pezzo di ghiaccio nell'aria rarefatta. Valuti di saltarci dentro per vedere quanto in alto riesci ad arrivare.
        #CSS_evaReport_DunaFlyingLowPoles_01 = Ovunque guardi, vedi bianco. Le pianure ondulate di ghiaccio si estendono verso l'orizzonte che curva ripidamente.
        #CSS_evaReport_DunaFlyingLowMidlands_00 = Per un attimo, ti sembra di intravedere in lontananza un piccolo oggetto lucido, con la parte superiore nera. Poi sparisce.
        #CSS_evaReport_DunaFlyingLowMidlands_01 = Quassù, la polvere sembra molto più sottile. Finché dal tuo punto di osservazione non vedi una tempesta di polvere arrivare dai bassopiani.
        #CSS_evaReport_DunaFlyingLowLowlands_00 = Le pianure prive di caratteristiche si estendono lontano. Qui fa troppo freddo perché ci siano miraggi.
        #CSS_evaReport_DunaFlyingLowLowlands_01 = Anche sollevato da terra, l'aria è stranamente calma. Fa comunque molto freddo, e questo ti strappa di dosso quella sensazione di inquietudine.
        #CSS_evaReport_DunaFlyingLowCraters_00 = Ok, da quassù riesci a vedere i bordi di questa vasta conca nel paesaggio. Ti senti piccolo.
        #CSS_evaReport_DunaFlyingLowCraters_01 = Anche quaggiù la sottile atmosfera duniana è troppo tenue per rallentarti molto.
        #CSS_evaReport_DunaFlyingLowHighlands_00 = Qui non c'è abbastanza atmosfera per rallentarti granché: dovrai usare i getti, a meno che tu non voglia piantare la faccia a terra.
        #CSS_evaReport_DunaFlyingLowHighlands_01 = La polvere sembra tingere la tua tuta e sei sicuro che al CKS sarai lo zimbello quando tornerai in rosa.
        #CSS_evaReport_DunaFlyingLowMidlandSea_00 = Granelli di sabbia sospesi nell'aria schizzano sulla visiera, creando un sibilo quasi ipnotico.
        #CSS_evaReport_DunaFlyingLowMidlandSea_01 = Pur muovendoti a una certa velocità nell'aria, non senti alcuna resistenza significativa al vento. L'atmosfera deve essere estremamente sottile.
        #CSS_evaReport_DunaFlyingLowNorthernBasin_00 = Il vento fa del suo meglio per sballottarti, ma riesci a restare stabile e a guardarti intorno da un punto leggermente più alto.
        #CSS_evaReport_DunaFlyingLowNorthernBasin_01 = Il vento che ti soffia intorno è freddo. Tipo, davvero freddo. Rimpiangi il calore del tuo sedile sulla nave.
        #CSS_evaReport_DunaFlyingLowSouthernBasin_00 = Ti distrai dagli effetti dell'aria gelida che ti sferza immaginandoti seduto nella sala pausa dell'Astronaut Complex con una tazza di koffee caldo e un biscotto.
        #CSS_evaReport_DunaFlyingLowSouthernBasin_01 = Quassù, a queste alte latitudini, fa ancora più freddo del solito, e il vento gelido del volo lo rende ancora peggiore. Speri che quei “svitati” dell'AC abbiano sistemato il riscaldatore della tuta prima della partenza.
        #CSS_evaReport_DunaFlyingLowNorthernShelf_00 = Fai fatica a mantenere la posizione in volo nel vento e valuti di legarti al veicolo.
        #CSS_evaReport_DunaFlyingLowNorthernShelf_01 = C'è un'inquietante calma nel meteo e, per qualche secondo, la polvere si dirada abbastanza da permetterti di meravigliarti dell'immensità del canyon.
        #CSS_evaReport_DunaFlyingLowMidlandCanyon_00 = Il sole splende, ma qui fa comunque freddo. Abbastanza da farti desiderare di aver portato del koffee caldo con te.
