        #JNSQscience_bd_poke_CelesSrfLandedPoles_00 = Granuli freddi e compattati si crepano sotto pressione, poi bloccano l'asta con ostinazione ghiacciata.
        #JNSQscience_bd_poke_TamSrfLandedLowlands_00 = La sonda entra facilmente e il lander scivola per lo "sforzo": il terreno è sciolto e fluttuante.
        #JNSQscience_bd_poke_TamSrfLandedMidlands_00 = Le macerie si spostano invece di compattarsi: ogni spinta riorganizza la superficie e i numeri oscillano.
        #JNSQscience_bd_poke_TamSrfLandedHighlands_00 = La punta trova frammenti taglienti sotto un sottile velo di polvere: i progressi arrivano in piccoli morsi croccanti.
        #JNSQscience_bd_poke_TamSrfLandedTwinCraters_00 = La superficie è rimescolata di fresco: inizia soffice, poi si incastra di colpo attorno all'asta.
        #JNSQscience_bd_poke_TamSrfLandedCraters_00 = Il materiale espulso sciolto crolla nel foro veloce quanto lo scavi: la sonda continua a "trovare" nuova profondità.
        #JNSQscience_bd_poke_TamSrfLandedPockmarks_00 = L'asta cade in piccoli vuoti e colpisce parti dure tra uno e l'altro: la traccia sembra elettricità statica.
        #JNSQscience_bd_poke_HamekSrfLandedLowlands_00 = Polvere rossastra si comprime in un tappo denso con una coesione sorprendente per qualcosa di così secco e freddo.
        #JNSQscience_bd_poke_HamekSrfLandedMidlands_00 = La superficie cede all'inizio, poi stringe l'asta con forza, come se fosse tenuta insieme da un legante sconosciuto.
        #JNSQscience_bd_poke_HamekSrfLandedHighlands_00 = Uno strato superiore crostoso si frattura nettamente, rivelando materiale compattato che resiste a una penetrazione più profonda.
        #JNSQscience_bd_poke_HamekSrfLandedPoles_00 = La sonda scricchiola attraverso granuli rigidi e si ferma corta contro terreno duro e congelato.
        #JNSQscience_bd_poke_NaraSrfLandedLowlands_00 = La sonda comprime uno strato scuro e fine in un tappo ostinato: qualunque cosa ci sia sotto è ancora più densa.
        #JNSQscience_bd_poke_NaraSrfLandedMidlands_00 = La superficie cede lentamente, come se fosse strizzata da ogni lato: la forza sale con regolarità.
        #JNSQscience_bd_poke_NaraSrfLandedHighlands_00 = Una crosta fragile si crepa, poi la punta morde materiale compattato che rifiuta un ingresso più profondo.
        #JNSQscience_bd_poke_NaraSrfLandedMountains_00 = C'è a malapena copertura sciolta prima che l'asta incontri terreno duro: la lettura va subito al picco.
        #JNSQscience_bd_poke_NaraSrfLandedPolarLowlands_00 = Granuli freddi scricchiolano e poi si bloccano assieme attorno alla sonda, come se stessero aspettando la pressione.
        #JNSQscience_bd_poke_NaraSrfLandedPoles_00 = La sonda avanza a malapena: la superficie è rigida, fredda e stranamente "viva" nella sua resistenza.
        #JNSQscience_bd_poke_NaraSrfLandedPolarHighlands_00 = Uno strato superiore vitreo si frattura nettamente, poi la punta si ferma contro qualcosa di duro come roccia e congelato.
        #JNSQscience_bd_poke_AmosSrfLandedLowlands_00 = Spingi la sonda dentro e il lander prova ad andarsene: il terreno è graniglia scura e sciolta, con poca presa.
        #JNSQscience_bd_poke_AmosSrfLandedMidlands_00 = L'asta affonda facilmente, ma le letture oscillano mentre la superficie si riorganizza nella bassa gravità.
        #JNSQscience_bd_poke_AmosSrfLandedHighlands_00 = Frammenti taglienti rotolano di lato invece di compattarsi: la penetrazione avanza a passi croccanti e irregolari.
        #JNSQscience_bd_poke_AmosSrfLandedMountains_00 = Un poke simbolico diventa una frana al rallentatore: il pendio si rifiuta di restare fermo per la scienza.
        #JNSQscience_bd_poke_AmosSrfLandedPoles_00 = Qui il materiale è più freddo e ben compattato: stringe l'asta e non la lascia andare senza uno strappo.
        #JNSQscience_bd_poke_EnonSrfLandedLowlands_00 = Polvere di ghiaccio chiara e farinosa crolla attorno alla sonda: la profondità aumenta in fretta prima che si compatti.
        #JNSQscience_bd_poke_EnonSrfLandedMidlands_00 = La superficie si comprime in una guaina cigolante attorno all'asta, producendo numeri ordinati e coerenti.
        #JNSQscience_bd_poke_EnonSrfLandedHighlands_00 = Una crosta sottile si spezza, poi la sonda raschia in graniglia ghiacciata e densa che resiste a ulteriori spinte.
        #JNSQscience_bd_poke_EnonSrfLandedPoles_00 = La sonda scricchiola in granuli rigidi e si ferma corta contro terreno duro e freddo appena sotto.
        #JNSQscience_bd_poke_PraxSrfLandedLowlands_00 = La sonda scivola nella regolite sciolta, poi si blocca quando la polvere si compatta in un collare denso.
        #JNSQscience_bd_poke_PraxSrfLandedMidlands_00 = La resistenza è stabile e noiosa, finché uno strato grossolano nascosto non trasforma la curva di forza in scalini.
        #JNSQscience_bd_poke_PraxSrfLandedHighlands_00 = La superficie è secca e cementata: la penetrazione è superficiale e l'asta vibra con la graniglia.
        #JNSQscience_bd_poke_PraxSrfLandedMountains_00 = Inizi appena e urti qualcosa di solido: la montagna registra il tuo tentativo come "carino".
        #JNSQscience_bd_poke_PraxSrfLandedPoles_00 = Il materiale, freddo e ben compattato, lotta per ogni millimetro: la sonda segnala alta resistenza e scarsa collaborazione.

        // bd_radarAltimeter
        #JNSQscience_bd_radarAltimeter_SunFlyingLow_00 = L'altimetro radar insiste che stai "volando", ma non c'è nulla su cui far rimbalzare un segnale. Restituisce un'altitudine molto utile: "SÌ".
        #JNSQscience_bd_radarAltimeter_SunFlyingHigh_00 = Continui ad aspettare un'eco di superficie. Lo strumento continua ad aspettare che la fisica abbia senso. Nessuno dei due è soddisfatto.
        #JNSQscience_bd_radarAltimeter_SunInSpaceLow_00 = Ogni ping sparisce tra bagliore e particelle cariche. Il display tende lentamente verso un numero che sembra giudicante.
        #JNSQscience_bd_radarAltimeter_MohoInSpaceLow_00 = Echi netti delineano dorsali frastagliate e bacini profondi. Il modello del terreno sembra scolpito con rabbia.
        #JNSQscience_bd_radarAltimeter_EveFlyingLow_00 = Il segnale combatte nella zuppa viola e torna ovattato. Sei quasi certo di aver misurato le nubi invece del suolo.
        #JNSQscience_bd_radarAltimeter_EveFlyingHigh_00 = I riflessi si spalmiano e tremolano sotto l'atmosfera spessa. L'altimetro giura che la superficie sia "da qualche parte laggiù".
        #JNSQscience_bd_radarAltimeter_EveInSpaceLow_00 = Le passate radar aprono linee pulite attraverso la copertura nuvolosa, rivelando cambi di quota drammatici che Eve stava chiaramente cercando di nascondere.
        #JNSQscience_bd_radarAltimeter_GillyInSpaceLow_00 = Un attimo sei "vicino", quello dopo sei "ancora vicino", ma a un altro masso. La mappa radar sembra una patata bitorzoluta con ambizioni.
        #JNSQscience_bd_radarAltimeter_KerbinFlyingLow_00 = L'altimetro dipinge il suolo con linee nette: il Controllo Missione chiede se sia "terreno" o "montagna in arrivo".
        #JNSQscience_bd_radarAltimeter_KerbinFlyingHigh_00 = Da quassù il radar vede i continenti come lievi gobbe e gli oceani come zone vuote: provi a non pensare a cosa viva nelle zone vuote.
        #JNSQscience_bd_radarAltimeter_KerbinInSpaceLow_00 = Le passate orbitali ricuciono una mappa altimetrica ordinata di Kerbin. I numeri fanno sembrare le montagne più alte di quanto si sentissero in addestramento.
        #JNSQscience_bd_radarAltimeter_MunInSpaceLow_00 = I ping radar tornano quasi subito dalla superficie grigia sottostante, delineando i bordi dei crateri come uno scarabocchio topografico.
        #JNSQscience_bd_radarAltimeter_MinmusInSpaceLow_00 = Le piane restituiscono un'eco liscia e brillante mentre i pendii risultano bitorzoluti: il computer suggerisce di puntare ai pezzi lisci, color menta.
        #JNSQscience_bd_radarAltimeter_DunaFlyingLow_00 = L'eco radar sobbalza nell'aria polverosa e tra dune in movimento. L'altimetro riporta con utile precisione: "più o meno suolo".
        #JNSQscience_bd_radarAltimeter_DunaFlyingHigh_00 = Da quassù la tenue atmosfera si comporta, e il radar disegna profili nitidi di canyon e altipiani. Il computer di volo chiede se vuoi "seguire il terreno".
        #JNSQscience_bd_radarAltimeter_DunaInSpaceLow_00 = Ogni passata ricuce una fascia altimetrica più pulita sulla superficie rugginosa, rivelando vecchie cicatrici e bassopiani sospettosamente lisci.
        #JNSQscience_bd_radarAltimeter_IkeInSpaceLow_00 = Echi forti rimbalzano su dorsali taglienti e pareti di cratere. Il modello del terreno inizia a sembrare dotato di denti.
        #JNSQscience_bd_radarAltimeter_EdnaInSpaceLow_00 = Il segnale di ritorno sembra in ritardo e tirchio, come se la superficie stesse risparmiando energia. La mappa torna fredda, aspra e molto antica.
        #JNSQscience_bd_radarAltimeter_DakInSpaceLow_00 = Su un corpo così piccolo i numeri cambiano più in fretta della tua sicurezza. L'altimetro continua a insistere che sei "quasi arrivato" ovunque, nello stesso momento.
        #JNSQscience_bd_radarAltimeter_DresInSpaceLow_00 = Il radar dipinge una mappa altimetrica ostinatamente insignificante. Anche nel vuoto, Dres riesce a suonare annoiato.
        #JNSQscience_bd_radarAltimeter_JoolFlyingLow_00 = Il radar prova ad agganciare una "superficie" e si accontenta di qualcosa "da nuvole". Il display sembra stranamente fiero di sé.
        #JNSQscience_bd_radarAltimeter_JoolFlyingHigh_00 = I ritorni si spalmiano in strati e turbolenza. Lo strumento inizia a fare medie, come se rendesse i numeri più reali.
        #JNSQscience_bd_radarAltimeter_JoolInSpaceLow_00 = Dall'orbita, ogni ping torna tardi e sfocato. Congratulazioni: potresti aver appena mappato la cima del meteo di Jool.
        #JNSQscience_bd_radarAltimeter_LaytheFlyingLow_00 = Echi nitidi scattano tra linee di costa e onde. L'altimetro distingue terra e mare più in fretta di te.
        #JNSQscience_bd_radarAltimeter_LaytheFlyingHigh_00 = Ampie scansioni appiattiscono l'oceano in una linea di base calma, con isole che spuntano come pericoli di navigazione dotati di nome.
        #JNSQscience_bd_radarAltimeter_LaytheInSpaceLow_00 = Fasce orbitali tracciano valli sommerse e dorsali affilate sotto le nubi. L'oceano sembra nascondere terreno extra.
        #JNSQscience_bd_radarAltimeter_VallInSpaceLow_00 = Ritorni forti seguono bordi di cratere e ampie piane di ghiaccio. Una zona risponde in modo strano, come se sotto il ghiaccio ci fosse un vuoto segreto.
        #JNSQscience_bd_radarAltimeter_TyloFlyingLow_00 = Lo strumento insiste che stai "volando", nonostante l'assenza d'aria. L'altitudine scende con spietata sincerità.
        #JNSQscience_bd_radarAltimeter_TyloFlyingHigh_00 = Ping a lunga distanza delineano pareti imponenti e bacini profondi. Tylo fa in modo che tu noti ogni spigolo.
        #JNSQscience_bd_radarAltimeter_TyloInSpaceLow_00 = Le passate ricuciono una mappa del rilievo intimidatoria: bordi alti, avvallamenti profondi e pochissimi pendii gentili.
        #JNSQscience_bd_radarAltimeter_BopInSpaceLow_00 = Il radar disegna una roccia bitorzoluta con pendii improvvisi ovunque. La tua orbita sembra discutere con il terreno.
        #JNSQscience_bd_radarAltimeter_PolInSpaceLow_00 = L'eco vaga su dorsali dall'aspetto morbido e avvallamenti che sembrano cedere. Il paesaggio pare cambiare tra un ping e l'altro, giusto per restare misterioso.
        #JNSQscience_bd_radarAltimeter_LindorFlyingLow_00 = L'altimetro continua a cercare il "suolo", ma Lindor offre solo strati di nubi senza fine. Alla fine riporta un'altitudine di "probabilmente".
        #JNSQscience_bd_radarAltimeter_LindorFlyingHigh_00 = Provi a fare una media dei ritorni per ottenere qualcosa di sensato. Lindor risponde cambiandoti il meteo sotto di te, per dispetto.
        #JNSQscience_bd_radarAltimeter_LindorInSpaceLow_00 = Dall'orbita il radar dipinge vortici e bande come se fossero terreno. Il Controllo Missione chiede dove pensi di atterrare sulla "Banda n. 3".
        #JNSQscience_bd_radarAltimeter_KrelInSpaceLow_00 = Gli echi tracciano dorsali chiare e strani motivi simili a vene. La mappa sembra che la luna stia cercando di ricordarsi come si fa a essere rotonda.
        #JNSQscience_bd_radarAltimeter_AdenInSpaceLow_00 = Le passate radar delineano una piccola roccia ostinata, con gobbe e bacini che non si accordano tra loro. Il modello altimetrico suggerisce che ci sia "qualcosa di diverso dentro", e il computer si rifiuta di spiegarsi.
        #JNSQscience_bd_radarAltimeter_HuygenFlyingLow_00 = La foschia densa disperde i ping: metà delle volte misuri nubi, l'altra metà misuri "da qualche parte sotto le nubi".
        #JNSQscience_bd_radarAltimeter_HuygenFlyingHigh_00 = I ritorni si spalmiano in strati sovrapposti, come se l'atmosfera avesse una propria altitudine. Il display continua a cambiare idea.
        #JNSQscience_bd_radarAltimeter_HuygenInSpaceLow_00 = Le fasce in orbita tagliano pulite la foschia ambrata, rivelando una superficie sorprendentemente strutturata sotto tutto quel teatro.
        #JNSQscience_bd_radarAltimeter_RigaFlyingLow_00 = Nell'aria sottile il segnale è nitido un secondo e assente quello dopo. L'altimetro insiste che questo conti come "volo", e tu gliela concedi.
        #JNSQscience_bd_radarAltimeter_RigaFlyingHigh_00 = Il radar disegna ampie linee di rilievo su un mondo che da lontano sembra quasi familiare. Da vicino, i numeri diventano meno rassicuranti.
        #JNSQscience_bd_radarAltimeter_RigaInSpaceLow_00 = Ritorni forti delineano ampi bacini e colline appuntite. La mappa sembra abbastanza solida da camminarci sopra, purché tu scelga un pendio che non ribatta.
        #JNSQscience_bd_radarAltimeter_TalosInSpaceLow_00 = Le letture di quota saltano attraverso confini di colore netti e cambi di terreno improvvisi. Il radar non sa spiegare i motivi, ma è chiaramente impressionato.
        #JNSQscience_bd_radarAltimeter_EelooFlyingLow_00 = L'aria appena accennata porta a malapena un ritorno, ma il radar traccia comunque salite e discese ghiacciate come un battito timido.
        #JNSQscience_bd_radarAltimeter_EelooFlyingHigh_00 = In quota gli echi tornano più puliti, tracciando ampi contorni chiari che somigliano in modo sospetto a cucchiaiate.
        #JNSQscience_bd_radarAltimeter_EelooInSpaceLow_00 = Le passate orbitali ricuciono una mappa del rilievo nitida: ogni dorsale sembra più affilata quando fa così freddo.
        #JNSQscience_bd_radarAltimeter_CelesInSpaceLow_00 = Il radar disegna un mondo grigio e silenzioso con linee pulite. Il computer segnala alcune forme "troppo tonde" e poi finge di non averlo fatto.
        #JNSQscience_bd_radarAltimeter_TamInSpaceLow_00 = Un ping dice "montagna", quello dopo dice "dirupo". Il modello del terreno finisce per sembrare assemblato durante la turbolenza.
        #JNSQscience_bd_radarAltimeter_HamekInSpaceLow_00 = Echi forti delineano alti ripidi e bassi profondi sotto quella strana colorazione. La mappa suggerisce che la superficie stia cercando di nascondere i propri motivi.
        #JNSQscience_bd_radarAltimeter_NaraFlyingLow_00 = L'aria densa e gelida fa tornare gli echi forti e rapidi. Per una volta, l'altimetro suona sicuro.
        #JNSQscience_bd_radarAltimeter_NaraFlyingHigh_00 = I ping a lunga distanza si spalmiano tra foschia e strati. Il display sostiene che la superficie sia "da qualche parte laggiù", come se aiutasse.
        #JNSQscience_bd_radarAltimeter_NaraInSpaceLow_00 = Le scansioni orbitali si fanno strada nell'atmosfera e tornano con una traccia altimetrica ostinata. Qualunque cosa ci sia sotto quelle nubi è molto reale, e molto lontana da casa.
        #JNSQscience_bd_radarAltimeter_AmosInSpaceLow_00 = L'eco rimbalza secca su una superficie scura e bitorzoluta. La tua altitudine cambia più della tua orbita, il che sembra scorretto.
        #JNSQscience_bd_radarAltimeter_EnonInSpaceLow_00 = I ritorni si fanno più brillanti sopra terreno dall'aspetto ghiacciato e sbiadiscono sopra avvallamenti più profondi. La mappa lascia intuire pendii dolci che nascondono sorprese taglienti.
        #JNSQscience_bd_radarAltimeter_PraxInSpaceLow_00 = Ogni passata ridisegna lo stesso profilo bitorzoluto con brutale onestà. L'altimetro dimostra una grande verità: "quasi in piano" è una bugia.

        // bd_rpws
        #JNSQscience_bd_rpws_MohoInSpaceLow_00 = Il ricevitore è inondato di cinguettii acuti e fischi "arrabbiati": Moho sta facendo il bagno nel meteo grezzo di Kerbol.
        #JNSQscience_bd_rpws_MohoInSpaceHigh_00 = Con un po' di distanza, il rumore si assesta in un sibilo costante: il plasma sottile attorno a Moho crepita ancora sul quadrante.
        #JNSQscience_bd_rpws_GillyInSpaceLow_00 = Ogni lenta capriola di Gilly strappa un'altra scarica di statica nell'antenna, come se la roccia stesse cercando di sintonizzarsi.
        #JNSQscience_bd_rpws_GillyInSpaceHigh_00 = Il ruggito lontano di Eve domina lo spettro: Gilly aggiunge solo qualche scoppiettio polveroso.
        #JNSQscience_bd_rpws_MunInSpaceHigh_00 = Lontano dalla superficie, le trasmissioni di Kerbin riecheggiano debolmente nel vuoto. Il Controllo Missione insiste che questo conti ancora come scienza.
        #JNSQscience_bd_rpws_MinmusInSpaceLow_00 = Il display mostra pacchetti d'onda gentili e irregolari: l'influenza di Kerbin è debole quassù, ma non è sparita.
        #JNSQscience_bd_rpws_MinmusInSpaceHigh_00 = Perlopiù silenzio, punteggiato da rari clic di particelle cariche. Il laboratorio ti chiede di "smetterla di regolare il volume".
        #JNSQscience_bd_rpws_DunaInSpaceHigh_00 = L'aria tenue sotto di te sfarfalla con un debole crepitio radio.
        #JNSQscience_bd_rpws_IkeInSpaceLow_00 = Arriva soprattutto il debole sibilo di Duna. Ike, invece, contribuisce con un silenzio ostinato.
        #JNSQscience_bd_rpws_IkeInSpaceHigh_00 = Più lontano, lo spettro si liscia nel semplice vento solare, con qualche ping solitario rimbalzato dalla tua stessa ferramenta.
        #JNSQscience_bd_rpws_EdnaInSpaceLow_00 = Lo spazio freddo attorno a Edna porta scoppiettii sporadici di polvere carica, come statica da un maglione invisibile.
        #JNSQscience_bd_rpws_EdnaInSpaceHigh_00 = Lunghi tratti di quiete sono interrotti da rari cinguettii secchi. Qualcosa quassù sta sfiorando l'antenna.
        #JNSQscience_bd_rpws_DakInSpaceLow_00 = Dak riflette i tuoi stessi toni, ma leggermente stonati. Il laboratorio insiste che sia "interessante" e non "prendere in giro".
        #JNSQscience_bd_rpws_DakInSpaceHigh_00 = La "patata" si riduce a un puntino, ma un segnale ostinato resiste, come se cercasse di attirare la tua attenzione.
        #JNSQscience_bd_rpws_DresInSpaceLow_00 = Un debole coro di onde di plasma circonda Dres. Per una roccia dimenticabile, è stranamente loquace sul quadrante.
        #JNSQscience_bd_rpws_DresInSpaceHigh_00 = A distanza, Dres svanisce nel sibilo di fondo dello spazio interplanetario.
        #JNSQscience_bd_rpws_LaytheInSpaceHigh_00 = Il ruggito lontano di Jool riempie la banda: Laythe aggiunge un leggero tremolio acquoso al rumore.
        #JNSQscience_bd_rpws_LaytheInSpaceLow_00 = Il ricevitore cattura un crepitio costante, dall'aria "bagnata". Il plasma intrappolato di Jool e l'atmosfera di Laythe chiaramente non vanno d'accordo.
        #JNSQscience_bd_rpws_VallInSpaceLow_00 = Lo spettro mostra fischi ordinati e ripetuti, come se qualcosa sotto il ghiaccio di Vall stesse facendo risuonare il plasma.
        #JNSQscience_bd_rpws_VallInSpaceHigh_00 = In quota, la firma di Vall svanisce e il sibilo di fondo di Jool prende possesso del ricevitore.
        #JNSQscience_bd_rpws_TyloInSpaceLow_00 = Ogni passaggio dietro Tylo taglia il segnale di netto, poi questo scatta indietro con una raffica di onde crepitanti.
        #JNSQscience_bd_rpws_TyloInSpaceHigh_00 = Tylo sembra quieta da qui: l'unico movimento è il lento, costante brontolio della magnetosfera di Jool.
        #JNSQscience_bd_rpws_BopInSpaceLow_00 = L'antenna rileva picchi nervosi che non si ripetono: o polvere carica, o il tuo cavo è di nuovo allentato.
        #JNSQscience_bd_rpws_BopInSpaceHigh_00 = Perlopiù statica e toni gioviani lontani: Bop aggiunge un inquietante vuoto nelle letture.
        #JNSQscience_bd_rpws_PolInSpaceLow_00 = Deboli cinguettii scorrono nel ricevitore, come se Pol stesse sfregando appena il plasma intrappolato di Jool.
        #JNSQscience_bd_rpws_PolInSpaceHigh_00 = Più lontano, Pol è quasi silenziosa: lo strumento registra un'ampia e anonima distesa di rumore radio del sistema.
        #JNSQscience_bd_rpws_LindorInSpaceLow_00 = Il ricevitore è travolto da un coro ruggente e ondeggiante. L'ambiente magnetico di Lindor è decisamente sveglio.
        #JNSQscience_bd_rpws_LindorInSpaceHigh_00 = Il rumore si leviga in un ronzio costante con fischi secchi occasionali, come aurore lontane che discutono con educazione.
        #JNSQscience_bd_rpws_KrelInSpaceLow_00 = Le rumorose tempeste radio di Lindor calano e risalgono mentre passa Krel, come se la luna stesse "strozzando" il segnale per un attimo.
        #JNSQscience_bd_rpws_KrelInSpaceHigh_00 = Si sente soprattutto il brontolio lontano di Lindor. Krel aggiunge un leggero frullo ripetuto e poi torna di nuovo al silenzio.
        #JNSQscience_bd_rpws_AdenInSpaceLow_00 = Lo spettro è perlopiù calmo finché improvvisi scoppiettii di polvere non schioccano sulla banda. Qualcosa attorno ad Aden è leggermente carico.
        #JNSQscience_bd_rpws_AdenInSpaceHigh_00 = Domina un sibilo ampio e sottile, interrotto da rari clic che gli ingegneri giurano non siano dell'antenna.
        #JNSQscience_bd_rpws_HuygenInSpaceLow_00 = Un crepitio frenetico riempie i canali, come statica atmosferica che prova a sintonizzare una radio che si rifiuta di collaborare.
        #JNSQscience_bd_rpws_HuygenInSpaceHigh_00 = Il crepitio svanisce in un mormorio basso. Qualunque cosa faccia quel rumore è giù nella foschia, fuori portata.
        #JNSQscience_bd_rpws_RigaInSpaceLow_00 = Deboli raffiche graffianti vanno e vengono, come se stessi sfiorando un involucro sottilissimo di graniglia carica.
        #JNSQscience_bd_rpws_RigaInSpaceHigh_00 = Riga quasi scompare dalle letture: il lontano fondo di Lindor domina tutto il quadrante.
        #JNSQscience_bd_rpws_TalosInSpaceLow_00 = Lungo, solitario silenzio, poi un debole ondeggiamento in ritardo dal sistema di Lindor arriva come una vecchia trasmissione.
        #JNSQscience_bd_rpws_TalosInSpaceHigh_00 = Quasi nulla, a parte il costante sibilo interplanetario. Talos è lontana, e si sente.
        #JNSQscience_bd_rpws_EelooInSpaceLow_00 = Da vicino, l'antenna sente piccoli scoppiettii di polvere di ghiaccio carica... poi, debolmente, un tono lontano di Kerbin si intrufola nel registro.
        #JNSQscience_bd_rpws_EelooInSpaceHigh_00 = Quasi nulla, a parte il costante sibilo dello spazio profondo. Lo strumento si entusiasma comunque e lo chiama "immacolato".
        #JNSQscience_bd_rpws_CelesInSpaceLow_00 = Sfiorando Celes, le tue stesse trasmissioni tornano deformate e in ritardo, come se la luna rifiutasse con garbo di rispondere direttamente.
        #JNSQscience_bd_rpws_CelesInSpaceHigh_00 = Da lontano, Celes è un tranquillo rigonfiamento nel livello di rumore. Gli unici segnali forti sono quelli che ti sei portato dietro.
        #JNSQscience_bd_rpws_TamInSpaceLow_00 = Il ricevitore si riempie di raffiche graffianti mentre graniglia carica tempestata l'antenna. Gli ingegneri consigliano "meno graniglia".
        #JNSQscience_bd_rpws_TamInSpaceHigh_00 = Tam svanisce in un debole frullo nello spettro, come un sassolino che prova a fischiare in una bufera.
        #JNSQscience_bd_rpws_HamekInSpaceLow_00 = Basso su Hamek, lo spettro mostra pacchetti d'onda lenti e irregolari: qualcosa sta rimescolando il plasma senza un motivo evidente.
        #JNSQscience_bd_rpws_HamekInSpaceHigh_00 = Il quadrante è perlopiù calmo, con rari clic secchi che sembrano passi lontani e indesiderati nel buio.
        #JNSQscience_bd_rpws_NaraInSpaceLow_00 = Il ricevitore si riempie di un sibilo ruggente e fischi puliti e ripetuti: l'alta atmosfera carica di Nara sta dando spettacolo.
        #JNSQscience_bd_rpws_NaraInSpaceHigh_00 = Più lontano, il caos si assesta in un ronzio costante, con lontane raffiche di tempesta che viaggiano sul fondo.
        #JNSQscience_bd_rpws_AmosInSpaceLow_00 = Domina il brontolio di fondo di Nara, ma piccoli tic secchi suggeriscono polvere carica che sfreccia attorno ad Amos.
        #JNSQscience_bd_rpws_AmosInSpaceHigh_00 = Amos svanisce quasi nel silenzio: nello spettro resta solo un debole eco ondeggiante del campo di Nara.
        #JNSQscience_bd_rpws_EnonInSpaceLow_00 = Piccoli scoppiettii tempestano la banda come "neve di statica". L'antenna insiste che la luna stia perdendo graniglia di ghiaccio elettrificata.
        #JNSQscience_bd_rpws_EnonInSpaceHigh_00 = Sibilo interplanetario pulito, più un lento e sottile battito che coincide con attività lontana attorno a Nara.
        #JNSQscience_bd_rpws_PraxInSpaceLow_00 = Un crepitio scarso e solitario segna il passaggio di Prax in plasma sottile, abbastanza quieto da sentire sospirare la tua elettronica.
        #JNSQscience_bd_rpws_PraxInSpaceHigh_00 = Domina lo spazio profondo: sibilo sottile, cinguettii rari e un promemoria appena percepibile che Nara è ancora là fuori.

        // bd_Scatterometer
        #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthPolarZone_00 = La deflessione fluttua in bande strette: il plasma polare sembra scorrere in correnti disciplinate.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthSubpolarZone_00 = Il segnale luccica di turbolenza irrequieta, come se Kerbol stesse cercando di scrollarsi di dosso una coperta di statica.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthTemperateZone_00 = I pattern di dispersione suggeriscono ampie celle ondulate: Kerbol sembra "bollire" al rallentatore.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthTropicZone_00 = Il display mostra increspature veloci che cavalcano onde più grandi: l'atmosfera qui non riesce a stare ferma.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowEquatorialZone_00 = I ritorni hanno picchi e si spalmiano lungo l'equatore: qualcosa laggiù sta filando il plasma in lunghe striature.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthTropicZone_00 = La mappa di dispersione rispecchia i tropici settentrionali, ma con più tremolii, come se Kerbol stesse battendo il piede.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthTemperateZone_00 = Un motivo screziato si risolve in enormi chiazze simili a convezione: i numeri sembrano appetitosi e allarmanti.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthSubpolarZone_00 = Lo strumento cattura strutture nette e fugaci, poi le perde nel bagliore: Kerbol rifiuta la ripetibilità.
        #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthPolarZone_00 = I ritorni polari si stabilizzano in striature ordinate: i dati sembrano quasi regolari, il che è sospetto vicino a una stella.
        #JNSQscience_bd_Scatterometer_SunInSpaceHigh_00 = A questa distanza la soluzione dei "venti di superficie" crolla nel rumore. Lo scatterometro riporta con garbo che Kerbol è ancora estremamente luminoso.
        #JNSQscience_bd_Scatterometer_SunInSpaceHigh_01 = Senza una superficie su cui rimbalzare, lo scatterometro sente soprattutto i propri pensieri, più alcuni ping secchi che suggeriscono polvere alla deriva.
        #JNSQscience_bd_Scatterometer_SunInSpaceHigh_02 = Il display si rifiuta di disegnare frecce del vento nel vuoto, ma registra micro-ecchi occasionali che indicano una sottile foschia interplanetaria, ruvida e granulosa.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowPoles_00 = La mappa di dispersione si avvolge in una spirale stretta: i venti polari di Eve sembrano voler trivellare un buco nelle nubi.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowLowlands_00 = I ritorni si spalmiano in bande ampie e pesanti: aria densa e terreno piatto rendono il campo di vento ostinatamente uniforme.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowMidlands_00 = La deflessione screziato si risolve in chiazze grandi quanto celle convettive: l'atmosfera sta bollendo, solo che non con educazione.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowMountains_00 = Dorsali nette proiettano lunghe ombre radar mentre i vettori del vento oscillano: le onde orografiche fanno acrobazie nella zuppa viola.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowShores_00 = Compare una linea di confine nitida dove la terra incontra il mare: lo strumento quasi ti disegna una freccina di brezza.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowPolarLakes_00 = I laghi risultano specchi lisci e scuri finché le raffiche non li increspano in sottili scarabocchi luminosi.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowPetrolLakes_00 = La superficie sembra stranamente smorzata, come se le onde si fossero dimenticate come si ondula: allo scatterometro non piace affatto.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofAkron_00 = Lunghi sequenze d'onda puliti suggeriscono un fetch costante, poi un fronte temporalesco strappa il motivo come carta.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofNessus_00 = Il campo di vento forma archi a cappio che rifiutano di ripetersi: etichetti l'area come "poco collaborativa".
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofTaniwha_00 = I ritorni pulsano in bande ritmiche, come se qualcosa sotto continuasse a rimescolare la superficie a intervalli regolari.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofGigan_00 = La rugosità schizza in striature frastagliate: o qui i mari sono furiosi, o le nubi stanno lanciando roba.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofRodan_00 = Linee di shear veloci tagliano la firma della superficie: l'atmosfera è chiaramente di fretta.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofGojira_00 = Un'ampia macchia luminosa suggerisce rimescolamento persistente: onde, spruzzi e un sacco di energia senza sfogo.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofGhidorah_00 = Tre correnti di vento distinte si incrociano e si intrecciano: perfino i vettori sembrano litigare.
        #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofBagorah_00 = La mappa di dispersione mostra increspature ordinate ai bordi e caos al centro: classico "sembra calmo finché non lo è".
        #JNSQscience_bd_Scatterometer_EveInSpaceLowKrakensWell_00 = Un disturbo circolare risuona negli echi, perfettamente centrato e profondamente inquietante. Il registro aggiunge: "No".
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowIceCaps_00 = Lo scatterometro riporta ritorni sospettosamente lisci: o il ghiaccio è vitreo, o sta nascondendo con garbo il vento.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowMountains_00 = Le dorsali montuose sminuzzano il vento in piccoli vortici ordinati: il grafico sembra una scodella di spaghetti.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowMidlands_00 = Il terreno misto rende la mappa del vento indecisa. Il Controllo Missione la chiama "interessante".
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowLowlands_00 = Ampi bassopiani danno vettori di vento puliti e costanti: perfetti per volare, terribili per i cappelli.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridLowlands_00 = Il terreno secco si accende di deflessioni nette: i fronti di raffica tracciano lunghe linee polverose.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridMidlands_00 = Una rugosità a chiazze suggerisce venti variabili e graniglia alla deriva. I filtri protestano a gran voce.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridHighlands_00 = Aria sottile e pendii taglienti rendono il campo di vento irregolare: lo strumento continua a ricalibrarsi per dispetto.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridMountains_00 = Il radar cattura forti firme di onde orografiche. Il vento fa acrobazie senza permesso.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowGreatLake_00 = La superficie del lago mostra increspature gentili e una brezza ordinata. Qualcuno nell'equipaggio dice: "giornata in barca?"
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowInlandWater_00 = Acque calme danno un ritorno di dispersione basso, finché un rovescio non ci scarabocchia sopra come un tratto di penna.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowKreenwichSea_00 = I venti costieri curvano in eleganti archi: etichetti una spirale "molto drammatica".
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowArcticSea_00 = Aria fredda scorre veloce su acqua scura: i picchi di rugosità suggeriscono creste bianche e dita intorpidite.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowForemansSea_00 = La mappa del vento mostra lunghe onde guidate dal fetch. Foreman approverebbe di sicuro quel "lavoro in linea retta".
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowTriangulusSea_00 = Tre corridoi di vento in competizione si incontrano qui: i vettori formano un triangolo, come per mettersi in mostra.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowNorthernSea_00 = Ampie bande di vento costante suggeriscono meteo affidabile, finché i bordi non si sfilacciano in tempeste.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowSub-ArcticSea_00 = La deflessione salta tra liscio e caotico in pochi minuti. Il mare non sa decidere se essere gelato o furioso.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowEasternSea_00 = Una corrente di vento dominante imposta sequenze d'onda coerenti: il display è soddisfacentemente ordinato.
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowWesternSea_00 = Linee di shear del vento incrociano l'acqua come graffi su un disco. La canzone è "sciuuush".
        #JNSQscience_bd_Scatterometer_KerbinInSpaceLowWelcomeBackIsland_00 = Isola piccola, grande scia: il vento le gira attorno e lascia una firma ordinata che sa di casa.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowIceCaps_00 = Lo scatterometro trova ritorni lisci e quieti, poi improvvise raffiche catabatiche che spazzano il ghiaccio come una scopa.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowMidlands_00 = Un mosaico di venti deboli e vortici erranti suggerisce che l'aria sottile venga facilmente bullizzata dal terreno.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowLowlands_00 = Ampi bacini producono vettori puliti e costanti, finché un fronte di polvere non ci scarabocchia sopra alle tue belle linee dritte.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowCraters_00 = I bordi dei crateri intrappolano diavoli di polvere rotanti: la deflessione sembra minuscoli mulinelli su un mare secco.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowRareCraters_00 = Le firme del vento qui sono stranamente asimmetriche, come se l'atmosfera continuasse a "cadere" dentro i buchi.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowVoronoiCraters_00 = I ritorni si spezzano in celle geometriche: il campo di vento sembra rispettare il motivo più della fisica.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowNotableCraters_00 = Forti gradienti dal bordo al fondo mostrano aria che defluisce lungo il pendio, trascinando graniglia come se avesse un posto importante dove andare.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowExoticCraters_00 = La mappa di dispersione sfarfalla con picchi netti e improvvise pause: questo terreno fa comportare il vento in modo sospetto.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowTrenches_00 = I venti si incanalano lungo le fosse in lunghe striature veloci: lo strumento disegna frecce che, per una volta, sono tutte d'accordo.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowNotablePlains_00 = Un segnale di rugosità ampio e uniforme implica un flusso persistente in superficie, condizioni perfette per una discussione planetaria sulla polvere.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowNotableMountains_00 = Bande di onde orografiche si vedono chiaramente, come se l'aria stesse suonando uno xilofono gigante sopra le dorsali.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowMountains_00 = Turbolenza sottovento intensa spalma la deflessione: il vento fa acrobazie in un quasi vuoto.
        #JNSQscience_bd_Scatterometer_DunaInSpaceLowVolcano_00 = Fioriture locali di rugosità fanno pensare a flussi caldi lungo i pendii e polvere rimescolata, nonostante il vulcano cerchi con impegno di sembrare dormiente.
        #JNSQscience_bd_Scatterometer_JoolInSpaceLowEquatorialBands_00 = Lo scatterometro dipinge correnti a getto lunghe e dritte come rasoi: l'equatore è praticamente un'autostrada del vento senza limiti di velocità.
        #JNSQscience_bd_Scatterometer_JoolInSpaceLowSubpolarBands_00 = Qui i vettori del vento si spezzano e si intrecciano, dove le bande ordinate cedono e la turbolenza inizia a scrivere il proprio meteo.
        #JNSQscience_bd_Scatterometer_JoolInSpaceLowNorthPole_00 = I ritorni spiraleggiano in un motivo di vortice stretto e gelido: perfino il caos di Jool ha un "centro di opinione" polare.
        #JNSQscience_bd_Scatterometer_JoolInSpaceLowSouthPole_00 = I venti del polo sud formano increspature concentriche e improvvise linee di shear, come se l'atmosfera stesse rimestando una pentola enorme.
        #JNSQscience_bd_Scatterometer_JoolInSpaceLowStormComplex_00 = La deflessione ha picchi e si spalma lungo il bordo della tempesta: lo strumento non riesce a decidere in che direzione il vento stia urlando per prima.
        #JNSQscience_bd_Scatterometer_JoolInSpaceLowExposedLowerDeck_00 = Un varco nella foschia superiore rivela strutture più ruvide sotto: lo shear del vento salta con abbastanza forza da far sembrare i grafici spaventati.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowShores_00 = I ritorni costieri mostrano brezze marine costanti che piegano attorno a ogni baia, come se il vento stesse facendo turismo.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowShallows_00 = Le basse acque si accendono di sottili increspature: il vento sembra pettinare la superficie in linee ordinate.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowInlandWater_00 = Le acque riparate risultano lisce e calme, finché una raffica non ci scarabocchia sopra e rovina la serenità.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowKrenwichSea_00 = Lunghi sequenze d'onda suggeriscono un fetch persistente: qui il mare ha tutto lo spazio che gli serve per comportarsi male.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowArcticSea_00 = Il flusso d'aria fredda increspa la superficie in bande nette: lo scatterometro segnala frequenti condizioni da creste bianche.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowJoolwardSea_00 = Ampie striature di shear tagliano i ritorni, come se l'atmosfera stesse tentando di superare l'orizzonte.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowPolwardSea_00 = Il campo di vento si piega verso i poli in bande curve: il grafico sembra tirato a nord da qualcuno.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowHighlands_00 = Turbolenza guidata dal terreno appare come deflessione screziata: l'aria non riesce a decidere da che parte sia il "sottovento".
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowMountains_00 = Forti firme di onde orografiche compaiono in strisce regolari: il vento sta suonando un enorme asse per lavare.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowIceCaps_00 = Dominano ritorni lisci del ghiaccio, poi improvvise raffiche di flusso rapido rastrellano i bordi delle calotte come carta vetrata invisibile.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowEnclosedFaults_00 = I bacini di faglie incanalano il vento in getti stretti: i vettori si allineano come se rispettassero il codice della strada.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowLowlands_00 = Ampi bassopiani producono vettori puliti e coerenti, ideali per le mappe, meno ideali per qualunque cosa cerchi di restare in piedi.
        #JNSQscience_bd_Scatterometer_LaytheInSpaceLowMidlands_00 = Rugosità a chiazze suggerisce celle convettive: il meteo di Laythe fa piani e li cambia a metà frase.
        #JNSQscience_bd_Scatterometer_TyloInSpaceLowPoles_00 = I ritorni polari sono nitidi e silenziosi: solo deboli striature suggeriscono che qualcosa si stia muovendo.
        #JNSQscience_bd_Scatterometer_TyloInSpaceLowMountains_00 = Linee di cresta frastagliate proiettano ombre radar nette: gli echi sfarfallano mentre il fascio sfiora pendii ripidi.
        #JNSQscience_bd_Scatterometer_TyloInSpaceLowHighlands_00 = Altopiani ruvidi tornano come una texture rumorosa: la mappa sembra graffiata con una chiave inglese.
        #JNSQscience_bd_Scatterometer_TyloInSpaceLowMidlands_00 = Il terreno misto si media in una firma di rugosità ostinatamente coerente: Tylo si rifiuta di essere "semplice".
        #JNSQscience_bd_Scatterometer_TyloInSpaceLowLowlands_00 = I bacini bassi risultano lisci e scuri, con sottili graffi lineari che potrebbero essere polvere che perde lentamente le discussioni.
        #JNSQscience_bd_Scatterometer_TyloInSpaceHigh_00 = Da quassù tutto si sfuma in bande ampie: Tylo diventa un severo campione di texture monocromatica.
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowTemperateBands_00 = Lunghe e pulite firme di getti dominano i ritorni delle bande: qualunque cosa sia Lindor, preferisce bande di vento ordinate.
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowExposedLowerDeck_00 = La deflessione salta in modo selvaggio mentre il fascio scruta il ponte inferiore: laggiù lo shear del vento fa calcoli indicibili.
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowSubpolarBands_00 = I vettori si torcono e si intrecciano dove le bande iniziano a disfarsi: l'atmosfera non sa scegliere tra "circolazione" e "litigio".
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowNorthPole_00 = Un motivo a spirale stretto si aggancia al polo: il vortice sembra abbastanza stabile da avere un proprio CAP.
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowSouthPole_00 = Il flusso polare sud forma anelli concentrici con nette linee di shear: è come se il pianeta si stesse rimestando in senso orario e non accettasse domande.
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowStormComplex_00 = I ritorni vanno in saturazione lungo i bordi delle tempeste: lo scatterometro segnala velocità del vento da riassumere con "non andarci".
        #JNSQscience_bd_Scatterometer_LindorInSpaceLowUpperStormDeck_00 = Il ponte superiore risulta più liscio del previsto, con striature veloci che scivolano sotto: calma sopra, caos subito sotto.
        #JNSQscience_bd_Scatterometer_LindorInSpaceHigh_00 = A questa quota la soluzione del vento si sfuma in tendenze ampie: le bande di Lindor si spalmiano in un unico grande "probabilmente veloce".
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowLowlands_00 = Lo scatterometro disegna lunghe e costanti striature di vento sopra i bassopiani: la foschia sarà anche spessa, ma il flusso d'aria non è timido.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowMidlands_00 = I ritorni si spezzano in chiazze screziate mentre cambia la rugosità del terreno: il campo di vento sembra cambiare idea di continuo.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowHighlands_00 = Firme più forti suggeriscono flusso più rapido sopra gli altopiani, con turbolenza che scende lungo i pendii come surf invisibile.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowMountains_00 = Ombre di cresta pulite e bande d'onda a strisce compaiono insieme: l'atmosfera sta facendo campana sul monte a tutta velocità.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPeaks_00 = Il fascio cattura picchi netti e intermittenti vicino alle vette: raffiche e rotori che appaiono e spariscono dall'area illuminata.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPolarLowlands_00 = Aria fredda e densa defluisce nei bacini polari: i vettori si allineano come se il vento avesse trovato una scorciatoia.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPolarHighlands_00 = I venti polari si tagliano in bande strette sopra gli altopiani: il grafico sembra pettinato con cura, e questo è inquietante.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPoles_00 = Un motivo a spirale compatto si ancora al polo: il vortice sembra abbastanza stabile da sbrigare burocrazia.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowShores_00 = Si forma un confine nitido lungo la costa: brezze curvano e si dividono mentre terra e liquido si scambiano calore in aria lenta e pesante.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceLowMethaneLakes_00 = La superficie dei laghi risulta stranamente "quieta" finché le raffiche non incidono increspature luminose, come se qualcuno avesse scarabocchiato sul vetro con il vento.
        #JNSQscience_bd_Scatterometer_HuygenInSpaceHigh_00 = Senza una superficie da interrogare, lo scatterometro registra soprattutto deboli micro-ecchi e il ping occasionale di polvere, poi finge che fosse questo il piano.
        #JNSQscience_bd_Scatterometer_RigaInSpaceLowLowlands_00 = Ampi ritorni lisci dominano i bassopiani: deboli striature di vento sembrano tentativi di cancellare il terreno con la sabbia.
        #JNSQscience_bd_Scatterometer_RigaInSpaceLowMidlands_00 = Il terreno misto produce una mappa di deflessione puntinata: l'aria sottile sembra rimescolare la polvere in piccoli giri indecisi.
        #JNSQscience_bd_Scatterometer_RigaInSpaceLowHighlands_00 = Altopiani più ruvidi fanno salire il segnale: strette bande erose suggeriscono un flusso vicino al suolo ostinato e persistente.
        #JNSQscience_bd_Scatterometer_RigaInSpaceLowMountains_00 = Ombre di cresta nette e bande d'onda a strisce compaiono insieme: qualunque vento esista qui è costretto a fare ginnastica.
        #JNSQscience_bd_Scatterometer_RigaInSpaceLowPoles_00 = I poli risultano lisci e freddi, con sottili motivi di drenaggio: lo strumento segnala dolci flussi catabatici e molto silenzio.
        #JNSQscience_bd_Scatterometer_RigaInSpaceHigh_00 = Dall'orbita alta, la "mappa del vento" di Riga crolla in tendenze ampie e texture di superficie: lo scatterometro ammette a malincuore che preferisce stare più vicino.
        #JNSQscience_bd_Scatterometer_EelooInSpaceLowPoles_00 = I ritorni polari sono puliti e brillanti, con deboli striature che suggeriscono un flusso superficiale lento e costante su brina molto ostinata.
        #JNSQscience_bd_Scatterometer_EelooInSpaceLowHighlands_00 = Texture più ruvide ed erose dal vento spezzano il segnale: il terreno alto sembra levigato da una pazienza invisibile.
        #JNSQscience_bd_Scatterometer_EelooInSpaceLowMidlands_00 = La deflessione si assesta in un motivo morbido e screziato: crosta a chiazze, accumuli gentili e movimento quanto basta per tenere oneste le mappe.
        #JNSQscience_bd_Scatterometer_EelooInSpaceLowLowlands_00 = I bassopiani risultano più lisci e scuri, come se i granuli fini si fossero raccolti qui e avessero concordato in silenzio di restare fermi.
        #JNSQscience_bd_Scatterometer_EelooInSpaceLowCanyon_00 = Bordi netti e ombre profonde incidono la scansione in strisce: qualunque cosa passi per vento laggiù si incanala come un sussurro con uno scopo.
        #JNSQscience_bd_Scatterometer_EelooInSpaceHigh_00 = Dall'orbita alta, lo scatterometro media tutto in ampie tendenze di luminosità: Eeloo diventa un unico campione di texture gelata, con carattere.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowLowlands_00 = Ritorni lisci dei bassopiani fanno sembrare la soluzione del vento quasi calma, finché deboli striature non rivelano aria lenta e pesante che scivola su suolo più freddo.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowMidlands_00 = La deflessione si spezza in chiazze screziate: il flusso vicino al suolo continua a riorganizzarsi come se avesse dimenticato il piano.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowHighlands_00 = Echi più forti e netti suggeriscono terreno eroso e venti più rapidi: quassù qualcosa sta carteggiando il mondo senza sosta.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowMountains_00 = Ombre di cresta e bande d'onda a strisce compaiono insieme: aria spessa viene forzata in una matematica elegante e violenta sopra le vette.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowPolarLowlands_00 = Aria polare densa defluisce nei bacini: i vettori si allineano in lunghi fiumi freddi che ignorano gli ostacoli.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowPolarHighlands_00 = bande strette di shear tracciano gli altopiani polari: il campo di vento sembra pettinato con cura e silenziosamente minaccioso.
        #JNSQscience_bd_Scatterometer_NaraInSpaceLowPoles_00 = Un motivo a spirale compatto si aggancia al polo: il vortice è così coerente da sembrare intenzionale.
        #JNSQscience_bd_Scatterometer_NaraInSpaceHigh_00 = Senza una superficie da interrogare, lo scatterometro registra solo deboli micro-ecchi e ping occasionali di polvere, lo spazio vuoto non è mai davvero vuoto.

        // bd_SIGINT
        #JNSQscience_bd_SIGINT_SunInSpaceHigh_00 = Lontano da Kerbol, lo spettro si assottiglia in toni portanti distanti e nella tua squadra che discute sul guadagno dell'antenna.
        #JNSQscience_bd_SIGINT_SunInSpaceLowNorthPolarZone_00 = La zona polare crepita di raffiche irrequiete: lo registri come "attività localizzata" e abbassi il volume.
        #JNSQscience_bd_SIGINT_SunInSpaceLowNorthSubpolarZone_00 = Il sibilo di fondo cresce fino a un ruggito costante, punteggiato da schiocchi secchi come commutazioni di relè invisibili.
        #JNSQscience_bd_SIGINT_SunInSpaceLowNorthTemperateZone_00 = La banda è rumorosa ma leggibile: deboli segnali fuori mondo fanno capolino tra i brontolii solari.
        #JNSQscience_bd_SIGINT_SunInSpaceLowNorthTropicZone_00 = Un'interferenza rapida e tremolante cavalca lo spettro, come se Kerbol stesse sintonizzando stazioni a caso.
        #JNSQscience_bd_SIGINT_SunInSpaceLowEquatorialZone_00 = La fascia equatoriale è un muro di rumore a banda larga: qualunque altra cosa deve urlare per farsi sentire.
        #JNSQscience_bd_SIGINT_SunInSpaceLowSouthTropicZone_00 = Il ricevitore cattura brevi finestre pulite tra una tempesta e l'altra, poi si richiudono senza preavviso.
        #JNSQscience_bd_SIGINT_SunInSpaceLowSouthTemperateZone_00 = Domina un sibilo uniforme, con picchi occasionali che somigliano sospettosamente a cartelli "non volare qui".
        #JNSQscience_bd_SIGINT_SunInSpaceLowSouthSubpolarZone_00 = Il fondo del segnale sale e scende in onde lunghe, come se Kerbol stesse respirando attraverso i tuoi filtri.
        #JNSQscience_bd_SIGINT_SunInSpaceLowSouthPolarZone_00 = Ai poli la statica morde forte: giureresti che l'antenna abbia appena sussultato.
        #JNSQscience_bd_SIGINT_MohoInSpaceHigh_00 = Da quota alta su Moho intercetti soprattutto rumore solare e qualche ping debole e imbarazzato dei tuoi stessi sistemi.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowPoles_00 = I poli non offrono trasmissioni. Solo sibilo solare intenso e un riflesso netto che si rifiuta di comportarsi.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowLowlands_00 = I bassopiani spalmano la banda in un ruggito opaco, come se il terreno stesse macinando il segnale fino a farlo polvere.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowPolarIceCraters_00 = Le cavità ghiacciate restituiscono echi puliti e sottili come aghi, che spariscono appena provi ad agganciarli.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowHighlands_00 = Le creste delle colline producono nitidi fantasmi multipath: ogni tono arriva con un gemello singhiozzante.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowMidlands_00 = Le pianure restituiscono riflessi stabili e noiosi, finché non compare un singolo picco e finge di non esserci.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowCraters_00 = I bordi dei crateri agiscono come piccoli piatti, focalizzando l'interferenza in brevi punti caldi nello spettro.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowExoticCraters_00 = Una dispersione strana trasforma il rumore in archi e bande che sembrano quasi un motivo. Quasi.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowRareCraters_00 = Un cinguettio stretto si ripete due volte, poi Kerbol lo sommerge come se non fosse mai successo.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowVoronoiCraters_00 = Il terreno a piastrelle spezza i riflessi in blocchi regolari: il risultato sembra "organizzato" per una roccia morta.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowNotableCraters_00 = I crateri notevoli dominano il ritorno così tanto che finisci per fare geologia per sbaglio.
        #JNSQscience_bd_SIGINT_MohoInSpaceLowPeaks_00 = Sopra i picchi, i riflessi si fanno clic duri e secchi che suonano come una risposta, anche se non può esserlo.
        #JNSQscience_bd_SIGINT_EveInSpaceHigh_00 = Dall'orbita alta, il vicinato di Eve è un sibilo forte e irrequieto, come se l'intero pianeta si stesse caricando per dire qualcosa.
        #JNSQscience_bd_SIGINT_EveInSpaceLowPoles_00 = Le scansioni polari sono piene di crepitii netti e toni alla deriva: i tuoi filtri continuano a chiedere un universo più silenzioso.
        #JNSQscience_bd_SIGINT_EveInSpaceLowLowlands_00 = L'aria densa sotto di te spalma le portanti lontane in ampie bande, come se i segnali affondassero prima di poter scappare.
        #JNSQscience_bd_SIGINT_EveInSpaceLowMidlands_00 = L'interferenza arriva in strati puliti: è quasi ordinata, finché all'improvviso non lo è più.
        #JNSQscience_bd_SIGINT_EveInSpaceLowHighlands_00 = I riflessi delle colline tornano nitidi e luminosi, con un debole tremolio ritmico che si rifiuta di farsi mediare.
        #JNSQscience_bd_SIGINT_EveInSpaceLowPeaks_00 = Sopra i picchi, brevi raffiche fanno impennare lo spettro come se qualcuno avesse premuto un microfono e poi ci avesse ripensato.
        #JNSQscience_bd_SIGINT_EveInSpaceLowExplodiumSea_00 = Il mare chimico solleva un ruggito costante a banda larga: non sai se sia fisica o atteggiamento.
        #JNSQscience_bd_SIGINT_EveInSpaceLowMountains_00 = Terreno frastagliato trasforma ogni trasmissione in un eco singhiozzante.
        #JNSQscience_bd_SIGINT_EveInSpaceLowShores_00 = I ritorni lungo la costa sfarfallano tra rumore di terra e rumore di mare: il ricevitore non sa decidere cosa stia ascoltando.
        #JNSQscience_bd_SIGINT_EveInSpaceLowPolarLakes_00 = I laghi polari aggiungono una patina fredda e pulita alla banda, poi la bucano con improvvisi schiocchi di statica.
        #JNSQscience_bd_SIGINT_EveInSpaceLowPetrolLakes_00 = Un sibilo basso e oleoso scorre sotto ogni cosa qui: sembra che il pianeta stia sussurrando attraverso una cannuccia.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofAkron_00 = Interferenza densa si impila in un motivo lento e ondulato che somiglia in modo sospetto a un faro ripetuto.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofNessus_00 = Lo spettro si impenna e cala in onde lunghe: i registri lo descrivono come "ondoso", il che non aiuta.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofTaniwha_00 = Catturi qualche tono pulito negli intervalli, poi il rumore li ricopre come acqua.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofGigan_00 = Domina una statica aspra e stridente: il monitor termico dell'antenna registra il suo disaccordo.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofRodan_00 = Brevi raffiche compaiono su più canali, come chiamate di soccorso sparse che non si ripetono mai.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofGojira_00 = Qui la banda è assurdamente rumorosa: perfino il tuo trasmettitore sembra timido.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofGhidorah_00 = Tre picchi distinti di interferenza danzano uno attorno all'altro: nessuno ammette che potrebbero essere collegati.
        #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofBagorah_00 = I riflessi arrivano in ritardo e raddoppiati: per un attimo giureresti che l'eco stia rispondendo.
        #JNSQscience_bd_SIGINT_EveInSpaceLowKrakensWell_00 = Tutto vicino al Pozzo si distorce. I segnali si piegano, fanno picchi e svaniscono come se venissero tirati verso il basso.
        #JNSQscience_bd_SIGINT_GillyInSpaceHigh_00 = Molto sopra Gilly, il ricevitore sente soprattutto chiacchiere lontane da altrove e l'inquietante suono di niente che succede.
        #JNSQscience_bd_SIGINT_GillyInSpaceLowLowlands_00 = La superficie bitorzoluta produce echi deboli e irregolari: è come origliare un mucchio di ghiaia.
        #JNSQscience_bd_SIGINT_GillyInSpaceLowMidlands_00 = Domina un sibilo morbido e costante, con blip occasionali che coincidono un po' troppo bene con i tuoi sistemi.
        #JNSQscience_bd_SIGINT_GillyInSpaceLowHighlands_00 = I ritorni delle colline sono netti e brevi. Riflessi minuscoli e fragili da una luna che a malapena conta come tale.
        #JNSQscience_bd_SIGINT_KerbinInSpaceHigh_00 = Dall'orbita alta, Kerbin suona come un'unica grande conversazione ronzante, con il CSK che taglia tutto come un urlo.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowIceCaps_00 = Il ricevitore crepita di chiamate di ricerca polare e statica d'aurora. Lo registri come "probabilmente normale".
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowHighlands_00 = Il traffico dei relay rimbalza sulle linee di cresta. A quanto pare anche le colline devono chiamare casa.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowMountains_00 = Raffiche di ripetitori d'alta quota si mescolano a un numero allarmante di upload "aggiornamento vetta".
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowShores_00 = Fari marittimi, radio da spiaggia e una pubblicità di snack sospettosamente rumorosa dominano la banda.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowMidlands_00 = Una fitta rete di comunicazioni quotidiane: bollettini sul traffico, telemetria agricola e qualcuno che litiga sui booster.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowLowlands_00 = Il crepitio a corto raggio si sovrappone in un ronzio caldo. Kerbin è rumorosa quando è a suo agio.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridLowlands_00 = Trasmissioni di test a lungo raggio echeggiano sulle piane aride. Qualcuno sta sicuramente calibrando qualcosa di costoso.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridMidlands_00 = Intercetti ripetute chiamate "poligono libero" e un conto alla rovescia radio che non arriva mai a zero.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridHighlands_00 = Aria sottile e limpida rende i segnali taglienti. Perlopiù stazioni meteo e avamposti molto annoiati.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridMountains_00 = Le antenne in cima alle montagne spazzano l'orizzonte. I motori dell'antenna fanno un tono soddisfacente nelle cuffie.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowGreatLake_00 = Barche, boe e una chiamata frenetica su "qualcosa di grosso sotto l'acqua". Probabilmente è solo un'ombra.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowInlandWater_00 = Superficie calma, spettro affollato: telemetria della pesca e un flusso interminabile di chiacchiere turistiche.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowKreenwichSea_00 = I ping di navigazione si allineano come un orologio: qualcuno sta usando il mare di Krenwich come gigantesco riferimento temporale.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowArcticSea_00 = Le rotte polari di navigazione sussurrano attraverso la statica. Noti più avvisi "ghiaccio in vista" del previsto.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowForemansSea_00 = Registri rumore di motori, radar meteo e un capitano che canta stonato in un microfono aperto.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowTriangulusSea_00 = Tre reti di fari si sovrappongono in un motivo ordinato che i tuoi analisti faranno finta fosse intenzionale.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowNorthernSea_00 = La costa settentrionale è viva di chiacchiere. Controllo porto, allerta tempeste e un sacco di tifo entusiasta.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowSub-ArcticSea_00 = I segnali svaniscono e tornano con bande d'aria fredda. Lo strumento insiste che non è colpa sua.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowEasternSea_00 = Un muro di comunicazioni da porti affollati. Quasi senti la burocrazia attraverso la radio.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowWesternSea_00 = Acque aperte, ricezione pulita. Catturi esercitazioni lontane e una previsione meteo molto compiaciuta.
        #JNSQscience_bd_SIGINT_KerbinInSpaceLowWelcomeBackIsland_00 = Squadre di recupero, radar di tracciamento e chiamate celebrative. A quanto pare qualcuno ha fatto atterrare qualcosa quasi intatto sull'Isola del Ritorno.
        #JNSQscience_bd_SIGINT_MunInSpaceHigh_00 = Sopra Mun, lo spettro è quasi tutto silenzio. Il tuo trasmettitore, all'improvviso, sembra scortese.
        #JNSQscience_bd_SIGINT_MunInSpaceLowPoles_00 = I riflessi polari trasformano il crepitio di Kerbin in un sussurro sottile e gelido.
        #JNSQscience_bd_SIGINT_MunInSpaceLowHighlands_00 = Le creste delle colline agiscono come antenne. Registri echi inattesi tra una raffica e l'altra.
        #JNSQscience_bd_SIGINT_MunInSpaceLowMidlands_00 = Le pianure restituiscono riflessi ordinati e prevedibili. Quasi deludentemente normali.
        #JNSQscience_bd_SIGINT_MunInSpaceLowLowlands_00 = I bacini bassi intrappolano il segnale: il livello di rumore sale come se il paesaggio stesse ascoltando a sua volta.
        #JNSQscience_bd_SIGINT_MunInSpaceLowPolarIceCraters_00 = I crateri polari ghiacciati rimandano ping netti e puliti, con un accenno di crepitio.
        #JNSQscience_bd_SIGINT_MunInSpaceLowExoticCraters_00 = Pareti crateriche strane sparpagliano la banda in frammenti scintillanti. Nulla corrisponde al modello.
        #JNSQscience_bd_SIGINT_MunInSpaceLowRareCraters_00 = Compaiono alcuni brevi cinguettii strutturati, poi svaniscono prima che tu possa accusare qualcuno.
        #JNSQscience_bd_SIGINT_MunInSpaceLowVoronoiCraters_00 = Il terreno a motivi fa sembrare lo spettro a griglia, come se il rumore fosse stato archiviato in celle.
        #JNSQscience_bd_SIGINT_MunInSpaceLowNotableCraters_00 = Forti riflessi dai crateri notevoli coprono tutto il resto. Li segni come "geologia rumorosa".
        #JNSQscience_bd_SIGINT_MunInSpaceLowMountains_00 = Le vette montuose rimandano un eco in ritardo che suona come una risposta, anche se non può esserlo.
        #JNSQscience_bd_SIGINT_MinmusInSpaceHigh_00 = Molto sopra Minmus, il ricevitore sente solo un lieve sibilo e alcune armoniche ostinate che si rifiutano di svanire.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowPoles_00 = Ai poli, Minmus riflette le trasmissioni di Kerbin con chiarezza pulita e lunghe latenze.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowLowlands_00 = Le piane spalmano i segnali in bande ampie e morbide, come radio attraverso la polvere.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowMidlands_00 = Le pianure tornano stabili.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowHighlands_00 = Nitidi echi multipath si impilano sopra le colline. Lo strumento insiste che è "entro specifica".
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowBasins_00 = I bacini concentrano segnali vaganti in brevi punti caldi, poi le lasciano scivolare via.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownBasins_00 = I bacini marroni aggiungono un sibilo caldo e un curioso ondeggiamento ritmico che non riesci a spiegare.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownLowlands_00 = Sopra i bassopiani marroni, i riflessi si approfondiscono. La statica sembra quasi soddisfatta.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownMidlands_00 = Toni ripetuti sfiorano il bordo della banda. Probabilmente interferenza, ma li segnali comunque.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownHighlands_00 = Le colline marroni disperdono il segnale in armoniche ordinate. Sembra troppo organizzato per essere terra.
        #JNSQscience_bd_SIGINT_MinmusInSpaceLowMountains_00 = I picchi di Minmus creano echi scintillanti che risuonano a lungo dopo che la sorgente è passata.
        #JNSQscience_bd_SIGINT_DunaInSpaceHigh_00 = Molto sopra Duna, il ricevitore sente soprattutto deboli chiacchiere lontane e il sibilo di polvere carica: il pianeta si tiene i suoi segreti.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowIceCaps_00 = Sopra le calotte di ghiaccio, la banda sale e scende con la statica delle tempeste, come se Duna stesse respirando attraverso un filtro.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowHighlands_00 = Le linee di cresta rimbalzano i segnali in doppi echi: ogni pacchetto arriva con un gemello polveroso.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowMidlands_00 = La scansione trova canali vuoti e una portante solitaria che non riesci a spiegare del tutto.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowLowlands_00 = I bacini bassi intrappolano l'interferenza: lo spettro sembra rimescolato con un cucchiaio.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowCraters_00 = I bordi dei crateri rimandano riflessi nitidi, come se il suolo stesse facendo pratica da relay.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowRareCraters_00 = Un picco stretto si ripete con un intervallo sospettosamente regolare, troppo ordinato per essere rumore, troppo piccolo per accusare qualcuno.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowVoronoiCraters_00 = Il terreno a motivi taglia il segnale in segmenti, come un messaggio affettato in piastrelle.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowNotableCraters_00 = Impatti notevoli dominano il ritorno: lo etichetti "geologia che fa SIGINT" e vai avanti.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowExoticCraters_00 = Una dispersione bizzarra trasforma la banda in archi scintillanti: l'analisi ti chiede di "rifarlo".
        #JNSQscience_bd_SIGINT_DunaInSpaceLowTrenches_00 = Nelle lunghe fosse, i segnali spariscono e tornano di colpo con bordi netti, come un interruttore messo alla prova.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowNotablePlains_00 = Un ronzio ampio e costante scorre sulle pianure: statica portata dal vento o infrastrutture molto silenziose.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowNotableMountains_00 = Un gruppo di picchi produce un ritmo multipath ripetuto che sembra inquietantemente intenzionale.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowMountains_00 = Le ombre delle montagne creano zone morte, poi arriva una raffica improvvisa, amplificata e in ritardo.
        #JNSQscience_bd_SIGINT_DunaInSpaceLowVolcano_00 = Il rumore termico schizza sopra il vulcano e il ricevitore va in saturazione: lo registri come "aggressivamente energetico".
        #JNSQscience_bd_SIGINT_IkeInSpaceHigh_00 = Molto sopra Ike non c'è quasi nulla da intercettare: solo i tuoi pacchetti e un sacco di silenzio.
        #JNSQscience_bd_SIGINT_IkeInSpaceLowPoles_00 = I poli riflettono deboli segnali con lunghi ritardi, trasformandole in sillabe lente e spettrali.
        #JNSQscience_bd_SIGINT_IkeInSpaceLowMountains_00 = Dorsali frastagliate rimandano echi secchi e staccati, come un faro maleducato.
        #JNSQscience_bd_SIGINT_IkeInSpaceLowMidlands_00 = Le pianure danno ritorni puliti e noiosi: lo strumento sembra sentirsi personalmente offeso.
        #JNSQscience_bd_SIGINT_IkeInSpaceLowLowlands_00 = I bassopiani spalmano tutto in un ruggito morbido, come se la regolite stesse masticando il segnale.
        #JNSQscience_bd_SIGINT_IkeInSpaceLowHighlands_00 = Sopra le colline, catturi un breve cinguettio che non corrisponde a nulla, poi silenzio assoluto.
        #JNSQscience_bd_SIGINT_EdnaInSpaceHigh_00 = Molto sopra Edna, il ricevitore sente soprattutto portanti lontane e lunghi vuoti in cui nulla si degna di rispondere.
        #JNSQscience_bd_SIGINT_EdnaInSpaceLowLowlands_00 = I bassopiani restituiscono solo echi deboli e spalmati.
        #JNSQscience_bd_SIGINT_EdnaInSpaceLowMidlands_00 = Alcuni riflessi deboli arrivano in ritardo e leggermente deformati: i registri lo descrivono come "radio, ma stanca".
        #JNSQscience_bd_SIGINT_EdnaInSpaceLowHighlands_00 = Sopra le colline, il segnale si affila in puliti fantasmi multipath che svaniscono in fretta quanto compaiono.
        #JNSQscience_bd_SIGINT_EdnaInSpaceLowPolarIceCraters_00 = I crateri di ghiaccio rimandano ping sottili come aghi e un crepitio fragile che suona come statica gelata.
        #JNSQscience_bd_SIGINT_EdnaInSpaceLowWhites_00 = Il terreno luminoso fa impennare per un attimo il livello di rumore, poi ricade nello stesso paziente silenzio.
        #JNSQscience_bd_SIGINT_DakInSpaceHigh_00 = Da quota alta su Dak, il miglior intercetto è il tuo trasmettitore che insiste che tutto è "nominale".
        #JNSQscience_bd_SIGINT_DakInSpaceLowLowlands_00 = Un tono sottile e costante corre sulla banda. Troppo debole per crederci, abbastanza coerente da registrarlo come "sospettosamente orecchiabile".
        #JNSQscience_bd_SIGINT_DakInSpaceLowMidlands_00 = La roccia a forma di patata disperde i segnali in un coro ondeggiante: la guida giura di non starci puntando contro.
        #JNSQscience_bd_SIGINT_DakInSpaceLowHighlands_00 = Brevi cinguettii spuntano al bordo dello spettro come un'esca, poi svaniscono appena provi ad agganciarli.
        #JNSQscience_bd_SIGINT_DresInSpaceHigh_00 = Sopra Dres, lo spettro è quasi perfettamente piatto: è impressionante quanto possa essere silenzioso un intero mondo.
        #JNSQscience_bd_SIGINT_DresInSpaceLowPoles_00 = I poli offrono canali puliti e vuoti e un sussurro di traffico lontano che non si risolve mai in nulla di utile.
        #JNSQscience_bd_SIGINT_DresInSpaceLowHighlands_00 = Le creste delle colline producono echi nitidi e privi di senso. Prova che il silenzio può avere texture.
        #JNSQscience_bd_SIGINT_DresInSpaceLowMidlands_00 = Le pianure restituiscono riflessi opachi e nient'altro: lo strumento sembra sentirsi personalmente insultato.
        #JNSQscience_bd_SIGINT_DresInSpaceLowLowlands_00 = I bacini bassi spalmano persino il sibilo di fondo in una sfocatura morbida, come se Dres stesse cercando di cancellare la banda.
        #JNSQscience_bd_SIGINT_DresInSpaceLowCanyon_00 = Il canyon rimanda echi in ritardo e impilati che sembrano un messaggio, finché non ricordi che le rocce non parlano.
        #JNSQscience_bd_SIGINT_JoolInSpaceHigh_00 = Dall'orbita alta, Jool è un ruggito lontano di rumore a banda larga, con occasionali toni puliti che svaniscono appena ti ci concentri.
        #JNSQscience_bd_SIGINT_JoolInSpaceLowEquatorialBands_00 = Le bande equatoriali pulsano di interferenza stratificata: ogni passata sembra una tempesta che litiga con una magnetosfera.
        #JNSQscience_bd_SIGINT_JoolInSpaceLowExposedLowerDeck_00 = Più in profondità sul "ponte inferiore", il ricevitore si riempie di crepitio aspro e portanti alla deriva che i tuoi filtri non riescono proprio a domare.
        #JNSQscience_bd_SIGINT_JoolInSpaceLowSubpolarBands_00 = Le regioni subpolari restituiscono un sibilo costante con raffiche sottili come aghi. Brevi, brillanti e fastidiosamente irripetibili.
        #JNSQscience_bd_SIGINT_JoolInSpaceLowNorthPole_00 = Vicino al polo nord, lo spettro ondeggia in lente onde, come se il pianeta trascinasse i segnali attraverso correnti invisibili.
        #JNSQscience_bd_SIGINT_JoolInSpaceLowSouthPole_00 = Il polo sud produce vuoti puliti seguiti da improvvisi schiocchi di statica: lo strumento lo chiama "normale", ma sembra offeso.
        #JNSQscience_bd_SIGINT_JoolInSpaceLowStormComplex_00 = Sopra il complesso di tempeste, la banda diventa un muro di rumore con brevi cinguettii strutturati che sembrano avvertimenti.
        #JNSQscience_bd_SIGINT_LaytheInSpaceHigh_00 = Molto sopra Laythe, deboli chiacchiere lontane si mescolano a un lieve sibilo d'oceano che non riesci a spiegare del tutto con la teoria delle antenne.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowShores_00 = Lungo le coste, i riflessi sfarfallano tra terra e mare: catturi raffiche che suonano come i tuoi fari che tornano indietro entusiaste.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowShallows_00 = Le acque basse spalmano i segnali in bande ampie e morbide, come una radio che cerca di nuotare.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowInlandWater_00 = Le acque interne restituiscono un livello di rumore calmo e stabile con ping luminosi occasionali. Probabilmente riflessi, probabilmente.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowKrenwichSea_00 = Il mare di Krenwich dà ritorni puliti e regolari come un orologio: la temporizzazione è così ordinata da renderti sospettoso dell'acqua.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowArcticSea_00 = Sopra il mare Artico, lo spettro crepita di statica fredda ed echi a lungo ritardo che arrivano come scuse lente.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowJoolwardSea_00 = Il mare verso Jool è rumoroso in modo direzionale, come se Jool ti stesse sopra la spalla e canticchiasse nel ricevitore.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowPolwardSea_00 = Il mare verso Pol produce toni alla deriva che scorrono sui canali: registri "multipath" e speri che sia vero.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowHighlands_00 = Le colline rimbalzano i segnali netti e luminosi, impilando echi puliti in un piccolo coro ordinato.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowMountains_00 = Le dorsali montuose spezzano le trasmissioni in frammenti balbettanti, come se il terreno stesse tentando di modificare i tuoi dati.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowIceCaps_00 = Le calotte di ghiaccio riflettono con chiarezza nitida e fragile: lo schiocco occasionale di statica suona come qualcosa che si rompe sotto i piedi.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowEnclosedFaults_00 = Sopra le faglie chiuse, la banda cala e schizza come un cavo lento, poi si stabilizza appena inizi a fidarti.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowLowlands_00 = I bassopiani aggiungono un ronzio caldo e denso a tutto, come se l'aria sotto trattenesse ogni trasmissione vagante.
        #JNSQscience_bd_SIGINT_LaytheInSpaceLowMidlands_00 = Le pianure danno ritorni noiosi e stabili, finché non compare un singolo cinguettio stretto e finge di non essere mai esistito.
        #JNSQscience_bd_SIGINT_VallInSpaceHigh_00 = Molto sopra Vall, il ricevitore sente soprattutto rumore di Jool e la tua elettronica che chiede schermatura.
        #JNSQscience_bd_SIGINT_VallInSpaceLowPoles_00 = Il ghiaccio polare restituisce echi nitidi: alcuni toni arrivano in ritardo, come se avessero preso una strada più lunga.
        #JNSQscience_bd_SIGINT_VallInSpaceLowHighlands_00 = Altopiani frastagliati spezzano ogni trasmissione in fantasmi scintillanti lungo la banda.
        #JNSQscience_bd_SIGINT_VallInSpaceLowMidlands_00 = Le pianure aggiungono un sibilo costante: non sai se sia interferenza o solo Vall che fa Vall.
        #JNSQscience_bd_SIGINT_VallInSpaceLowLowlands_00 = I bassopiani assorbono i segnali deboli finché il silenzio sembra sospettosamente completo.
        #JNSQscience_bd_SIGINT_VallInSpaceLowMountains_00 = Le dorsali montuose rimandano ping netti e staccati, come se il terreno rispondesse apposta.
        #JNSQscience_bd_SIGINT_TyloInSpaceHigh_00 = Dall'orbita alta, Tylo è silenzio avvolto nel ruggito di Jool, con un debole sussurro di tremolio atmosferico.
        #JNSQscience_bd_SIGINT_TyloInSpaceLowPoles_00 = Le passate polari danno canali puliti: l'aria sottile sotto aggiunge un ondeggiamento morbido e persistente.
        #JNSQscience_bd_SIGINT_TyloInSpaceLowMountains_00 = Le dorsali montuose producono clic multipath duri, come se il paesaggio ti stesse battendo le mani contro.
        #JNSQscience_bd_SIGINT_TyloInSpaceLowHighlands_00 = Le colline restituiscono forti riflessi e un picco stretto che si rifiuta di farsi mediare.
        #JNSQscience_bd_SIGINT_TyloInSpaceLowMidlands_00 = Le pianure sembrano noiose e leggibili, finché una raffica improvvisa non manda in saturazione il ricevitore per mezzo secondo.
        #JNSQscience_bd_SIGINT_TyloInSpaceLowLowlands_00 = I bacini intrappolano l'interferenza in un brontolio basso: perfino il tuo faro sembra lontano.
        #JNSQscience_bd_SIGINT_BopInSpaceHigh_00 = Molto sopra Bop, lo spettro è abbastanza vuoto da sentire l'antenna flettersi al sole.
        #JNSQscience_bd_SIGINT_BopInSpaceLowPoles_00 = I poli riflettono in modo irregolare: gli echi ondeggiano come se la luna non sapesse decidere dove si trova.
        #JNSQscience_bd_SIGINT_BopInSpaceLowMountains_00 = Sopra le "montagne", la banda si frattura in picchi frastagliati che corrispondono alla linea dell'orizzonte.
        #JNSQscience_bd_SIGINT_BopInSpaceLowLowlands_00 = I bassopiani spalmano tutto in un ruggito morbido, come se la roccia stesse masticando il segnale.
        #JNSQscience_bd_SIGINT_BopInSpaceLowMidlands_00 = Un debole cinguettio ripetuto compare due volte, poi si nasconde dietro la statica come se non fosse mai esistito.
        #JNSQscience_bd_SIGINT_BopInSpaceLowHighlands_00 = Le colline danno ritorni puliti e in ritardo, troppo nitidi per una piccola luna bitorzoluta.
        #JNSQscience_bd_SIGINT_PolInSpaceHigh_00 = Dall'orbita alta, Pol è quieta, con un sibilo polveroso che va e viene mentre derivi sopra di essa.
        #JNSQscience_bd_SIGINT_PolInSpaceLowPoles_00 = Il terreno polare rimanda riflessi luminosi e granulosi, come segnale in polvere nelle cuffie.
        #JNSQscience_bd_SIGINT_PolInSpaceLowLowlands_00 = I bassopiani fanno scivolare i riflessi sui canali, come se il suolo stesso stesse andando alla deriva.
        #JNSQscience_bd_SIGINT_PolInSpaceLowMidlands_00 = Le pianure aggiungono un lieve rintocco armonico: controlli l'antenna, poi dai la colpa alla luna.
        #JNSQscience_bd_SIGINT_PolInSpaceLowHighlands_00 = Le colline impilano echi in strati ordinati. Abbastanza organizzati da farti inquietare.
        #JNSQscience_bd_SIGINT_PolInSpaceLowMountains_00 = Le montagne rimandano ping secchi e lunghi ritardi, come un ripetitore lento e svogliato.
        #JNSQscience_bd_SIGINT_LindorInSpaceHigh_00 = In orbita alta, la magnetosfera di Lindor ronza costante: quasi tutto ciò che intercetti è il pianeta stesso.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowTemperateBands_00 = Le bande temperate spalmano le portanti deboli in lunghi ondeggiamenti pigri, come una radio stirata dal vento.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowExposedLowerDeck_00 = Sopra il ponte inferiore, il ricevitore va in sovraccarico con un crepitio aspro e toni alla deriva che si rifiutano di stabilizzarsi.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowSubpolarBands_00 = Gli archi subpolari sputano raffiche brevi e luminose. Statica aurorale che sembra quasi punteggiatura.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowNorthPole_00 = Vicino al polo nord, la banda risuona di lamenti simili a un coro: lo archivi sotto "magnetico" e fai finta che questo lo spieghi.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowSouthPole_00 = Il polo sud resta quieto, poi scatta con picchi puliti che svaniscono prima della seconda passata.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowStormComplex_00 = Sopra il complesso di tempeste, tutto diventa un ruggito a banda larga: se c'è un messaggio lì dentro, sta urlando.
        #JNSQscience_bd_SIGINT_LindorInSpaceLowUpperStormDeck_00 = Sopra lo strato superiore delle tempeste, intercetti i tuoi pacchetti che tornano con un lieve ritardo, come se l'atmosfera ti stesse mettendo alla prova.
        #JNSQscience_bd_SIGINT_KrelInSpaceHigh_00 = Molto sopra Krel, intercetti soprattutto il brontolio lontano di Lindor e un sacco di paziente silenzio.
        #JNSQscience_bd_SIGINT_KrelInSpaceLowLowlands_00 = I bassopiani pallidi rimandano echi sottili e in ritardo, come se la luna stesse tentando di ripetere qualcosa che non ha mai sentito.
        #JNSQscience_bd_SIGINT_KrelInSpaceLowMidlands_00 = Qui un sibilo costante scorre sulla banda. È abbastanza quieto da renderti sospettoso del tuo stesso equipaggiamento.
        #JNSQscience_bd_SIGINT_KrelInSpaceLowHighlands_00 = Fantasmi multipath netti si impilano sopra le colline, trasformando toni semplici in un coro nervoso.
        #JNSQscience_bd_SIGINT_KrelInSpaceLowPoles_00 = I poli scattano con un breve crepitio aurorale, poi ricadono nel silenzio come se non fosse successo nulla.
        #JNSQscience_bd_SIGINT_AdenInSpaceHigh_00 = Dall'orbita alta, Aden è una debole scia di riflessi sotto il rumore di fondo di Lindor: perlopiù canali vuoti e statica ostinata.
        #JNSQscience_bd_SIGINT_AdenInSpaceLowLowlands_00 = I bassopiani spalmano le portanti deboli in bande ampie, come se la superficie stesse macinando la radio fino a farla polvere.
        #JNSQscience_bd_SIGINT_AdenInSpaceLowMidlands_00 = Le pianure restituiscono echi puliti e noiosi, finché non compare un singolo picco stretto e finge di non esserci.
        #JNSQscience_bd_SIGINT_AdenInSpaceLowHighlands_00 = Sopra le colline, i riflessi arrivano nitidi e doppi: la seconda copia è sempre leggermente in ritardo.
        #JNSQscience_bd_SIGINT_AdenInSpaceLowMountains_00 = Le dorsali montuose spezzano le trasmissioni in frammenti balbettanti, come se il terreno stesse modificando i tuoi dati.
        #JNSQscience_bd_SIGINT_AdenInSpaceLowPoles_00 = Le passate polari producono un crepitio freddo e sottile e ping a lungo ritardo che suonano come chiamate senza risposta.
        #JNSQscience_bd_SIGINT_RigaInSpaceHigh_00 = In orbita alta su Riga, lo spettro sembra stranamente familiare: quieto, strutturato e abbastanza attivo da invogliare a troppa sicurezza.
        #JNSQscience_bd_SIGINT_RigaInSpaceLowLowlands_00 = I bassopiani danno riflessi forti e stabili, come un poligono di prova costruito per le antenne.
        #JNSQscience_bd_SIGINT_RigaInSpaceLowMidlands_00 = Una fitta rete di echi deboli riempie la banda: se strizzi abbastanza gli occhi sembra quasi traffico di routine.
        #JNSQscience_bd_SIGINT_RigaInSpaceLowHighlands_00 = Le colline impilano ritorni multipath puliti in strati ordinati, come se la superficie archviasse i segnali in cartelle.
        #JNSQscience_bd_SIGINT_RigaInSpaceLowMountains_00 = Le cime montuose rimandano clic duri e lunghi ritardi. Da ripetitore, ma nessuno lo ammette.
        #JNSQscience_bd_SIGINT_RigaInSpaceLowPoles_00 = I poli aprono vuoti silenziosi nel rumore, poi li bucano con improvvisi picchi che non si ripetono alla passata successiva.
        #JNSQscience_bd_SIGINT_TalosInSpaceHigh_00 = Molto sopra Talos, intercetti soprattutto il sibilo dello spazio profondo e il suono solitario del tuo trasmettitore che fa check in.
        #JNSQscience_bd_SIGINT_TalosInSpaceLowLowlands_00 = I bassopiani inghiottono i segnali deboli in un ruggito morbido, come se la regolite volesse tenere i segreti sotto.
        #JNSQscience_bd_SIGINT_TalosInSpaceLowMidlands_00 = Le pianure restituiscono riflessi opachi e lunghi tratti di quiete che fanno sembrare importante ogni minuscolo blip.
        #JNSQscience_bd_SIGINT_TalosInSpaceLowHighlands_00 = Sopra le colline, gli echi si affilano in fantasmi fragili che svaniscono appena provi ad agganciarli.
        #JNSQscience_bd_SIGINT_TalosInSpaceLowMountains_00 = Le dorsali montuose producono picchi frastagliati lungo la banda. Troppo netti per stare tranquilli, troppo incoerenti per dare la colpa a qualcosa.
        #JNSQscience_bd_SIGINT_TalosInSpaceLowPoles_00 = Il terreno polare aggiunge un crepitio freddo e intermittente: lo spettro suona come se stesse tremando.
        #JNSQscience_bd_SIGINT_HuygenInSpaceHigh_00 = Dall'orbita alta, Huygen è un sibilo morbido sotto il brontolio lontano di Lindor, con molti canali vuoti.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowLowlands_00 = I bassopiani inghiottono i segnali in una statica calda: perfino il tuo faro sembra ovattato attraverso la foschia.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowMidlands_00 = Le pianure danno riflessi costanti e un lieve tremolio ritmico che potrebbe essere vento, oppure qualcosa di peggio.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowHighlands_00 = Sopra le colline, gli echi multipath si impilano ordinati, come se il terreno archviasse le tue trasmissioni.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowMountains_00 = Le dorsali montuose spezzano le portanti in frammenti balbettanti: il ricevitore lo chiama "effetti del terreno" e va avanti.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowPeaks_00 = I picchi rimandano ping secchi e lunghi ritardi, come un ripetitore svogliato nascosto nella roccia.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari aggiungono un crepitio freddo e sottile. Il livello di rumore sale come se l'aria fosse carica.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowPoles_00 = Ai poli, schiocchi sporadici accendono lo spettro.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowPolarHighlands_00 = Le colline polari restituiscono echi puliti e fragili che risuonano un po' troppo a lungo.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowShores_00 = Lungo le coste, terra e liquido si scambiano posto nei dati: lo spettro sfarfalla come una stretta di mano fatta male.
        #JNSQscience_bd_SIGINT_HuygenInSpaceLowMethaneLakes_00 = Sopra i laghi di metano, la banda si appiattisce in un sibilo lucido con occasionali bagliori di segnale riflesso.
        #JNSQscience_bd_SIGINT_EelooInSpaceHigh_00 = Molto sopra Eeloo, lo spettro è quasi tutto sibilo dello spazio profondo e l'occasionale ping solitario della tua nave.
        #JNSQscience_bd_SIGINT_EelooInSpaceLowPoles_00 = Il ghiaccio polare riflette il crepitio distante come un eco sottile e lento.
        #JNSQscience_bd_SIGINT_EelooInSpaceLowHighlands_00 = Gli altopiani dividono le portanti deboli in copie fantasma nitide che svaniscono prima che tu riesca ad agganciarle.
        #JNSQscience_bd_SIGINT_EelooInSpaceLowMidlands_00 = I ritorni delle pianure sono puliti e vuoti. Il tuo ricevitore si sente sottoutilizzato.
        #JNSQscience_bd_SIGINT_EelooInSpaceLowLowlands_00 = I bacini bassi inghiottono i segnali finché il silenzio sembra un dato.
        #JNSQscience_bd_SIGINT_EelooInSpaceLowCanyon_00 = Sopra il canyon, gli echi arrivano in ritardo e deformati, come se avessero fatto un giro panoramico nel ghiaccio.
        #JNSQscience_bd_SIGINT_CelesInSpaceHigh_00 = Molto sopra Celes, senti soprattutto statica quieta e i tuoi sistemi che controllano se c'è qualcosa là fuori.
        #JNSQscience_bd_SIGINT_CelesInSpaceLowLowlands_00 = I bassopiani danno riflessi costanti e noiosi, finché compare un blip e finge di non esserci.
        #JNSQscience_bd_SIGINT_CelesInSpaceLowMidlands_00 = Le pianure trasformano portanti lontane in un lieve ondeggiamento, come se Celes non riuscisse a tenere una nota.
        #JNSQscience_bd_SIGINT_CelesInSpaceLowHighlands_00 = Le colline rimbalzano i segnali netti e doppi: la seconda copia è sempre in ritardo.
        #JNSQscience_bd_SIGINT_CelesInSpaceLowMountains_00 = Le dorsali montuose spezzano le trasmissioni in frammenti balbettanti, come una cattiva stazione di relay fatta di roccia.
        #JNSQscience_bd_SIGINT_CelesInSpaceLowPoles_00 = Ai poli, il livello di rumore cala, poi scatta con un breve crepitio freddo.
        #JNSQscience_bd_SIGINT_TamInSpaceHigh_00 = Dall'orbita alta, Tam è tutta riflessioni bitorzolute e canali vuoti. Perfetto per vedere schemi che non ci sono.
        #JNSQscience_bd_SIGINT_TamInSpaceLowLowlands_00 = I bassopiani spalmano tutto in un ruggito polveroso, come radio spinta attraverso ghiaia.
        #JNSQscience_bd_SIGINT_TamInSpaceLowMidlands_00 = Le pianure producono echi tremolanti che scivolano sui canali a ogni passata irregolare.
        #JNSQscience_bd_SIGINT_TamInSpaceLowHighlands_00 = Le colline rimandano picchi netti che combaciano con la linea dell'orizzonte frastagliata.
        #JNSQscience_bd_SIGINT_TamInSpaceLowTwinCraters_00 = I crateri gemelli restituiscono echi accoppiati. Due ping ogni volta.
        #JNSQscience_bd_SIGINT_TamInSpaceLowCraters_00 = I bordi dei crateri concentrano trasmissioni vaganti in brevi punti caldi lungo la banda.
        #JNSQscience_bd_SIGINT_TamInSpaceLowPockmarks_00 = Il terreno bucherellato disperde lo spettro in lentiggini: l'analisi scrive "termine tecnico: macchiettoso".
        #JNSQscience_bd_SIGINT_HamekInSpaceHigh_00 = Molto sopra Hamek, un debole ronzio costante scorre sulla statica: nessuno è d'accordo su da dove arrivi.
        #JNSQscience_bd_SIGINT_HamekInSpaceLowLowlands_00 = I bassopiani aggiungono rumore caldo e granuloso, come se la superficie stesse levigando il tuo segnale.
        #JNSQscience_bd_SIGINT_HamekInSpaceLowMidlands_00 = Le pianure restituiscono riflessi puliti e un'armonica strana che ti segue tra una passata e l'altra.
        #JNSQscience_bd_SIGINT_HamekInSpaceLowHighlands_00 = Le colline dividono le portanti in bande laterali luminose e ordinate. Troppo ordinato per un mondo morto.
        #JNSQscience_bd_SIGINT_HamekInSpaceLowPoles_00 = Le passate polari aprono vuoti silenziosi nel ruggito, poi li bucano con improvvisi picchi sottili come aghi.
        #JNSQscience_bd_SIGINT_NaraInSpaceHigh_00 = Molto sopra Nara, lo spettro è un sibilo planetario costante con abbastanza struttura da far discutere tutti.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowLowlands_00 = Sopra i bassopiani, l'aria densa spalma le portanti deboli in bande ampie e pigre.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowMidlands_00 = Le pianure restituiscono echi puliti e un singolo picco stretto che si rifiuta di ripetersi a comando.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowHighlands_00 = Le colline disperdono i segnali in fantasmi multipath nitidi, come se qualcuno avesse duplicato i tuoi dati con mezzo secondo di ritardo.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowMountains_00 = Le ombre delle montagne creano zone morte, poi arrivano improvvisi ritorni forti.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari aggiungono un crepitio fragile alla banda, come se l'aria fosse leggermente carica.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowPoles_00 = Ai poli, brevi raffiche luminose compaiono e scompaiono come punteggiatura in un registro altrimenti quieto.
        #JNSQscience_bd_SIGINT_NaraInSpaceLowPolarHighlands_00 = Le colline polari rimandano riflessi netti e puliti che sembrano quasi fari deliberati.
        #JNSQscience_bd_SIGINT_AmosInSpaceHigh_00 = Molto sopra Amos, c'è soprattutto sibilo dello spazio profondo e il tuo trasmettitore che controlla se serve ancora.
        #JNSQscience_bd_SIGINT_AmosInSpaceLowLowlands_00 = I bassopiani restituiscono echi deboli e irregolari, come origliare un mucchio di roccia in polvere.
        #JNSQscience_bd_SIGINT_AmosInSpaceLowMidlands_00 = Le pianure restano ostinatamente quiete finché compare un breve blip e se ne pente subito.
        #JNSQscience_bd_SIGINT_AmosInSpaceLowHighlands_00 = Sopra le colline, i riflessi multipath si impilano ordinati, troppo puliti per una luna così ostile.
        #JNSQscience_bd_SIGINT_AmosInSpaceLowMountains_00 = Le dorsali montuose spezzano le portanti in frammenti balbettanti, come se il terreno stesse "modificando" la tua scansione.
        #JNSQscience_bd_SIGINT_AmosInSpaceLowPoles_00 = Le passate polari aprono vuoti silenziosi nel livello di rumore, poi si richiudono con un crepitio sottile.
        #JNSQscience_bd_SIGINT_EnonInSpaceHigh_00 = Dall'orbita alta, Enon è quasi silenzioso. Solo un debole sussurro di traffico lontano che non si risolve mai in nulla di utile.
        #JNSQscience_bd_SIGINT_EnonInSpaceLowLowlands_00 = I bassopiani sfocano la banda in un ruggito morbido, come se la superficie stesse inghiottendo i segnali interi.
        #JNSQscience_bd_SIGINT_EnonInSpaceLowMidlands_00 = Le pianure restituiscono riflessi puliti e noiosi, finché un tono sospetto non passa alla deriva e scompare.
        #JNSQscience_bd_SIGINT_EnonInSpaceLowHighlands_00 = Le colline rimandano echi luminosi e fragili che risuonano un po' troppo a lungo.
        #JNSQscience_bd_SIGINT_EnonInSpaceLowPoles_00 = Ai poli, catturi ping sottili e in ritardo, come risposte lente da un suolo molto freddo.
        #JNSQscience_bd_SIGINT_PraxInSpaceHigh_00 = Molto sopra Prax, il ricevitore non sente quasi nulla. Condizioni perfette per immaginare schemi che non ci sono.
        #JNSQscience_bd_SIGINT_PraxInSpaceLowLowlands_00 = I bassopiani aggiungono un sibilo granuloso sotto tutto, come statica macinata fino a diventare polvere.
        #JNSQscience_bd_SIGINT_PraxInSpaceLowMidlands_00 = Le pianure producono echi tremolanti che scivolano sui canali a ogni passata.
        #JNSQscience_bd_SIGINT_PraxInSpaceLowHighlands_00 = Le colline rendono taglienti le portanti deboli in doppi netti: la seconda copia è sempre in ritardo.
        #JNSQscience_bd_SIGINT_PraxInSpaceLowMountains_00 = I picchi montuosi rimandano clic duri e lunghi ritardi, come un ripetitore svogliato fatto di roccia.
        #JNSQscience_bd_SIGINT_PraxInSpaceLowPoles_00 = Il terreno polare abbassa il livello di rumore, poi lo perfora con improvvisi picchi sottili come aghi.

        // bd_SiteSurvey
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedPoles_00 = Il terreno polare è più scuro e più craterizzato del previsto. Un'ombra sospetta sembra un buco in attesa di una gamba d'atterraggio.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedLowlands_00 = Un terreno più liscio e meno dorsali taglienti fanno sembrare questo un sito sensato. Il tremolio del calore rende difficile confermare cosa sia davvero "in piano".
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedPolarIceCraters_00 = Fondali di cratere luminosi e bordi bruschi suggeriscono un appoggio complicato. Il punto che sembra più sicuro è sempre più vicino al bordo di quanto dovrebbe.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedHighlands_00 = Dominano creste frastagliate e pendii spezzati. Il rilevamento consiglia un hobby più piatto.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedMidlands_00 = Una buona quantità di pianori tra piccoli rilievi. Non è perfetto, ma almeno non ti insulta attivamente.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedCraters_00 = Cratere su cratere su cratere. Un sacco di posti per atterrare, e ancora più posti per pentirsene.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedExoticCraters_00 = Il terreno sembra stranamente a motivi, come se avesse provato a organizzarsi e avesse mollato a metà. Avvicinati con cautela e con poco ottimismo.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedRareCraters_00 = Meno crateri significa più terreno continuo. Purtroppo è un terreno continuo che sta gentilmente cercando di buttarti giù.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedVoronoiCraters_00 = La superficie si divide in ordinate celle poligonali con bordi rialzati. Atterrare su un "vertice" è fortemente sconsigliato dagli ingegneri.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedNotableCraters_00 = Un grande cratere di riferimento rende la navigazione facile. Il campo di ejecta attorno rende l'atterraggio meno facile.
        #JNSQscience_bd_SiteSurvey_MohoSrfLandedPeaks_00 = Ottima visibilità e pessime opzioni di atterraggio. Il sito è "eccellente" se non intendi toccarlo.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedPoles_00 = Il terreno mostra chiazze pallide sotto una foschia spessa, con lunghe ombre che nascondono rilievi taglienti. "Piatto" a questa latitudine è una leggenda.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedLowlands_00 = Grandi pianure con lievi rialzi sembrano promettenti. L'atmosfera fa sembrare tutto più vicino di quanto sia, guai compresi.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedMidlands_00 = Terreno ondulato e affioramenti ruvidi sparsi suggeriscono siti utilizzabili con una mira accurata. Scegli un punto che non diventi una pozzanghera di fango.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedHighlands_00 = Pendii più ripidi e terreno spezzato rendono questo un sito impegnativo. La nebbia viola aggiunge un bel livello di incertezza.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedPeaks_00 = Vedute spettacolari e strapiombi ovunque. Il rilevamento nota che qui la gravità prende il proprio lavoro molto sul serio.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedMountains_00 = Crestoni affilati e campi di massi lasciano poco margine d'errore. Consigliato solo per missioni intitolate "Tanto andrà bene".
        #JNSQscience_bd_SiteSurvey_EveSrfLandedShores_00 = Pianori costieri offrono buon accesso e visibilità decente. Il confine tra "terra" e "non terra" sembra inquietantemente flessibile.
        #JNSQscience_bd_SiteSurvey_EveSrfLandedKrakensWell_00 = Il terreno sprofonda in strani gradini irregolari, come se qualcosa sotto stesse risistemando la mappa. Il sito è segnato "indagare più tardi".
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedExplodiumSea_00 = La superficie ha una lucentezza sgradevole e un gorgogliare pigro. Il rilevamento consiglia di campionarlo da una distanza di sicurezza.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedShores_00 = Acqua bassa con una pendenza dolce rende questa una zona d'ammaraggio pratica. Basta non lasciare che il veicolo derivi verso qualcosa di colorato.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedPolarLakes_00 = Acqua calma e poco increspata, con un'inquietante immobilità. Sembra sicuro finché non ti ricordi dove sei.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedPetrolLakes_00 = Un liquido scuro e viscido forma chiazze lisce che si attaccano a tutto. Le squadre di recupero presentano un reclamo in anticipo.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofAkron_00 = Lunghe mareggiate scorrono sotto il veicolo in onde lente e pesanti. Il galleggiamento sembra ok, il morale è discutibile.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofNessus_00 = Increspature si incrociano ad angoli strani, suggerendo correnti in competizione. Il veicolo scivola di lato anche quando giura di no.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofTaniwha_00 = Un'ampia distesa fosca con chiazze intermittenti di schiuma in superficie. Il sito è utilizzabile, ma nessuno vuole aprire un portello.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofGigan_00 = Acqua increspata e improvvise serie d'onda suggeriscono condizioni ventose. Il sito d'ammaraggio è "dinamico".
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofRodan_00 = Venti forti scavano strisce sulla superficie. Il rilevamento nota che restare dritti richiederà impegno attivo.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofGojira_00 = Acqua profonda con un sollevamento lento e potente. Il veicolo la regge, ma gli strumenti sembrano un po' offesi.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofGhidorah_00 = Tre bande di corrente distinte compaiono nel modello di deriva. Il sito è sicuro, ma continua a provare a far ruotare il veicolo.
        #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofBagorah_00 = Campi d'onda irregolari rendono la zona d'ammaraggio sconnessa. È sopravvivibile, solo poco dignitoso.
        #JNSQscience_bd_SiteSurvey_GillySrfLandedLowlands_00 = Il terreno è in lieve pendenza e sorprendentemente aperto. Il vero pericolo è rimbalzare via prima di finire la checklist.
        #JNSQscience_bd_SiteSurvey_GillySrfLandedMidlands_00 = Un mix di piccoli rilievi e rocce dall'aria instabile. Il sito sembra ok, finché ti ricordi che qui il suolo è facoltativo.
        #JNSQscience_bd_SiteSurvey_GillySrfLandedHighlands_00 = Pendii più ripidi e creste scomode rendono importante l'ancoraggio. Conclusione del rilevamento: porta arpioni, o almeno opinioni molto forti.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAdministration_00 = Rilevamento del sito completato: piatto, con moquette e saturo di moduli. Atterraggio consigliato solo dopo aver ottenuto il Permesso A-38.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAstronautComplex_00 = Il terreno sembra sicuro, ma è disseminato di "pericoli d'addestramento" e detriti di snack. Segnato come adatto a equipaggi con alta tolleranza alle capriole.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedBaikerbanur_00 = Il rilevamento segnala ottimi spazi aperti e una linea di vista eccezionale su supervisori sospetti. Atterraggio approvato in attesa dell'allineamento dei timbri.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedBaikerbanurLaunchpad_00 = La superficie è robusta, recintata e vietatissima a voce alta. Si consiglia il contatto esattamente dentro il riquadro dipinto in cui non ti è permesso stare.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedCrawlerway_00 = Lungo corridoio d'avvicinamento dritto, con una comoda texture di roccia frantumata. Ideale per gli atterraggi, purché non atterri sul crawler.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedFlagPole_00 = Libero, simbolico e sorvegliato. Zona d'atterraggio valutata "accettabile", ma solo se saluti i coni di sicurezza in finale.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedIslandAirfield_00 = Ampio, piatto e salmastro. Idoneità alta: contenuto di umidità nelle pratiche ancora più alto.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedKSC_00 = Il rilevamento generale indica che l'intero CSK è "nominale", tranne in tutti i posti che non dovresti rilevare. I dati vengono prontamente riclassificati come "fotografia per visitatori".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedLaunchPad_00 = Idoneità: eccellente. Pericoli: tutto il resto. Si consiglia l'atterraggio dopo che la piattaforma di lancio smette di sfiatare, sibilare e giudicarti.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedMissionControl_00 = Il rilevamento identifica un pavimento notevolmente stabile e un umore notevolmente instabile. Atterraggio possibile, ma il Controllo richiede comunque un conto alla rovescia.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&D_00 = Il sito sembra sicuro finché non noti che le etichette di avvertimento stanno anche conducendo esperimenti. Segnato "idoneo con condizioni" con occhiali obbligatori e silenzio.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DCentralBuilding_00 = Linee pulite, approcci chiari e una sospetta assenza di pezzi sparsi. Si consiglia l'atterraggio solo dopo che il comitato approva il concetto di atterrare.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DCornerLab_00 = Le immagini del rilevamento mostrano un punto d'atterraggio perfetto nascosto dietro una tenda con scritto "NON È UN PUNTO D'ATTERRAGGIO". Idoneità classificata.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DMainBuilding_00 = Spazioso, ordinato e pieno di sedie con rotelle che migreranno assolutamente nella tua zona d'atterraggio. Si consigliano cunei fermaruote per le sedie.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DObservatory_00 = Piattaforma piana con ottima vista del cielo e pessima tolleranza alle vibrazioni. Atterraggio consentito se prometti di non "fare rumore".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DSideLab_00 = Idoneità alta, a meno che la porta laterale non si apra e liberi un banco prova non programmato. Si consiglia l'atterraggio tra un annuncio di "solo un test veloce" e l'altro.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DSmallLab_00 = Il sito è tecnicamente sicuro, ma fisicamente troppo piccolo per qualunque cosa tu stia pensando. Si consiglia di far atterrare solo microsonde e micro-ego.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DTanks_00 = Grande, aperto e tempestato in modo aggressivo di "NO". Segnato come "ottimo terreno d'atterraggio" e "pessima scelta di carriera".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DWindTunnel_00 = Piazzale piatto con venti trasversali persistenti generati dall'edificio stesso. Si consiglia l'atterraggio solo quando la galleria del vento concorda che sei aerodinamico.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedRunway_00 = Striscia d'atterraggio perfettamente preparata, sorprendentemente adatta ad atterrare. Il personale pretende che tu tenga il "rilevamento del sito" lontano dalle luci di avvicinamento attive.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPH_00 = Pavimento ampio, pezzi sparsi e diversi velivoli che fingono di non essere d'intralcio. Si consiglia l'atterraggio dopo che gli ingegneri finiscono "solo un'ultima regolazione".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHMainBuilding_00 = Il rilevamento mostra un'ottima area libera finché una gru non inizia a muoversi senza motivo. Si consiglia l'atterraggio solo quando il capo gru guarda altrove.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHRoundTank_00 = Perimetro liscio e ottima curvatura per rotolare via dal bersaglio. Segnato "sicuro" se ti piacciono pendenze a sorpresa e isolamento.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHTanks_00 = Un sacco di spazio, minimo ingombro, massimo "non toccare quello". Si consiglia l'atterraggio con le mani bene in vista in ogni momento.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHWaterTower_00 = Il terreno è stabile, umido e direttamente sotto qualcosa che gocciola. Si consiglia l'atterraggio con ombrelli e una liberatoria firmata.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationDishEast_00 = Ghiaia libera e compattata e un'antenna rotante che continua a provare a tracciare la tua clipboard. Atterraggio approvato, ma l'antenna starà a guardare.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationDishNorth_00 = Il sito è stabile e quieto finché l'antenna non ruota, poi tutti danno la colpa a te. Si consiglia l'atterraggio durante le ore programmate di "non rotazione".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationDishSouth_00 = Piazzale piatto con ottima gestione dei cavi e scarsa tolleranza per la curiosità. Atterraggio adatto: domande non adatte.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationHub_00 = Il rilevamento al chiuso rivela un quadrato perfetto di pavimento con scritto "NON POSARE OGGETTI QUI". Naturalmente è il punto più sicuro.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVAB_00 = Vasto interno in piano, con pericoli dall'alto misurati in "tonnellate". Si consiglia l'atterraggio solo dopo aver confermato che la gru non sta facendo cose da gru.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABMainBuilding_00 = Il rilevamento trova spazio ideale, luce ideale e motivi ideali per cui non dovresti essere qui. Atterraggio approvato in attesa di "chi ti ha fatto entrare".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABPodMemorial_00 = L'area è serena, sgombra e assolutamente non una zona d'atterraggio. Si consiglia di osservare con rispetto da una distanza sicura e non d'atterraggio.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABRoundTank_00 = Lo spazio libero attorno al serbatoio è invitante e fortemente sconsigliato. Idoneità valutata "eccellente" e "per favore smettila".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABSouthComplex_00 = Il terreno è solido, rumoroso e pieno di scintille di saldatura che aggiungono una "atmosfera dinamica". Si consiglia l'atterraggio con aspettative ignifughe.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABTanks_00 = Il rilevamento indica un appoggio stabile e un'alta concentrazione di depositi "temporanei". Si consiglia l'atterraggio solo dopo che il temporaneo diventa da un'altra parte.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedWoomerang_00 = Il rilevamento segnala molto spazio e un vento che continua a riclassificare il "sopravento". Si consiglia l'atterraggio con margine extra e meno domande.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedIceCaps_00 = Il sito sembra in piano, ma l'abbagliamento e le creste nascoste suggeriscono che un "atterraggio" potrebbe trasformarsi in una "scivolata".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedHighlands_00 = Molto terreno ondulato con tanti tratti pianeggianti utilizzabili, purché tu eviti le invitanti piccole pendenze.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedMountains_00 = La vista è spettacolare: le opzioni di atterraggio no. Si consiglia "da un'altra parte", con meno rocce e più comprensione.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedShores_00 = Terreno solido vicino alla linea di costa, ideale per le operazioni di recupero, ammesso che la marea sia d'accordo con il programma.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedMidlands_00 = Ampio, aperto e piacevolmente noioso: eccellente per allestire un sito senza pentirsene immediatamente.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedLowlands_00 = Sembra piatto, ma il terreno appare morbido a chiazze. Porta gambe d'atterraggio larghe o un ingegnere molto comprensivo.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridLowlands_00 = Terreno duro e polveroso, con buona visibilità e pochi ostacoli. Aspettati graniglia in ogni cerniera che possiedi.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridMidlands_00 = Ampi altopiani interrotti da tagli poco profondi e canali asciutti: sicuro se non scegli un punto sul fondo di uno di essi.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridHighlands_00 = Il sito è stabile, ma è aspro e irregolare. Bene per la scienza, male per i "tocchi casuali".
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridMountains_00 = Rilievi netti e roccia instabile rendono questo un ottimo posto per esercitarsi con le procedure di interruzione.
        #JNSQscience_bd_SiteSurvey_KerbinSrfLandedWelcomeBackIsland_00 = Una piccola isola accogliente con spazio pianeggiante limitato. È ospitale finché non ti rendi conto che ti serve spazio per girarti.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedShores_00 = Condizioni di risacca bassa sembrano gestibili per ammaraggio e recupero, ammesso che le onde non si facciano venire idee.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedGreatLake_00 = Acqua calma e poca onda suggeriscono un sito di ammaraggio molto indulgente. Il Controllo Missione lo definisce "sospettosamente pacifico".
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedInlandWater_00 = Le acque più strette mostrano correnti evidenti. Si raccomanda un galleggiamento stabile, insieme a un piano per non finire tra i canneti.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedKreenwichSea_00 = Onde moderate e molto traffico in superficie: tieni d'occhio scie e barche curiose.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedArcticSea_00 = Acqua fredda con chiazze sparse simili a ghiaccio. Il sito è utilizzabile, ma le tue dita dei piedi presenteranno un reclamo formale.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedForemansSea_00 = Acque ampie e aperte con lunghe onde di rollio. Ottimo per testare la galleggiabilità: meno ottimo per tenere asciutti gli strumenti.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedTriangulusSea_00 = I pattern delle onde suggeriscono correnti che si intersecano e potrebbero spingere un mezzo di lato. "Stabile" potrebbe richiedere controllo attivo.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedNorthernSea_00 = L'onda corta guidata dal vento rende questa una zona di ammaraggio energica. Si consigliano più galleggianti e meno snack sparsi.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedSub-A rcticSea_00 =Acqua dall'aspetto fangoso e detriti galleggianti indicano condizioni al limite.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedEasternSea_00 = Abbagliamento intenso e sequenze d'onda irregolari complicano la valutazione visiva, ma lo stato del mare sembra entro limiti di sicurezza.
        #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedWesternSea_00 = Acque ampie e profonde con onde gestibili. Un candidato solido per operazioni ripetute e tramonti drammatici nel rapporto.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedPoles_00 = L'angolo basso del sole fa sembrare ogni dosso una scogliera. Stabilire "abbastanza piatto" richiede di strizzare gli occhi.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedHighlands_00 = Creste frastagliate e massi sparsi dominano la vista. Scenario eccellente, prospettive di contatto discutibili.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedMidlands_00 = Un mix sensato di terreno dolcemente ondulato e piccoli crateri. Finalmente, un sito che non sembra offeso dalle gambe d'atterraggio.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedLowlands_00 = Il terreno qui sembra più liscio, ma la polvere pare profonda e desiderosa di nascondere insidie appena sotto la superficie.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedPolarIceCraters_00 = Fondi luminosi e ombre nette suggeriscono terreno duro e freddo con bordi insidiosi. La "zona sicura" è più piccola di quanto sembri.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedExoticCraters_00 = Forme strane e bordi irregolari rendono quest'area difficile da valutare. Il rilevamento consiglia "interessante" invece di "affidabile".
        #JNSQscience_bd_SiteSurvey_MunSrfLandedRareCraters_00 = Pochi crateri, ma quelli presenti sono drammatici. Molto spazio, finché non ti accorgi che le pareti sono praticamente verticali.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedVoronoiCraters_00 = La superficie si spezza in ordinati pattern poligonali con confini rialzati. Ottimo per la navigazione: evita di atterrare sulle "linee".
        #JNSQscience_bd_SiteSurvey_MunSrfLandedNotableCraters_00 = Punti di riferimento ovunque per pianificare facilmente l'avvicinamento. Anche molti campi di ejecta pronti a sgranocchiare ruote.
        #JNSQscience_bd_SiteSurvey_MunSrfLandedMountains_00 = Il forte rilievo offre una buona linea di vista per le comunicazioni, ma il terreno è ripido e ostinatamente poco collaborativo.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedPoles_00 = Terreno pallido e incrostato con ombre lunghe rende difficile stimare le distanze. Il sito è stabile, i tuoi occhi no.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedLowlands_00 = Terreno ampio e in lieve pendenza sembra accogliente. L'unica preoccupazione è quanto appaia "polveroso" nelle ombre.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedMidlands_00 = Creste e pianori misti offrono molte opzioni. Scegli una zona che non sia segretamente inclinata e sei a posto.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedHighlands_00 = Dossi irregolari e bruschi cambi di pendenza richiedono pilotaggio accurato. Nota del rilevamento: "atterra, non rimbalzare".
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBasins_00 = Ampi fondi di bacino lisci sembrano ideali per le operazioni in superficie. È quasi sospetto quanto siano perfetti.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownBasins_00 = Il materiale più scuro dei bacini riduce l'abbagliamento e migliora il contrasto. Il terreno sembra amichevole, solo più cupo.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownLowlands_00 = Distese piatte con chiazze più scure facilitano la navigazione. Il rilevamento approva, con una nota su un suolo dall'aspetto morbido.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownMidlands_00 = Terreno ondulato con creste scure intermittenti. Molti siti utilizzabili se eviti gli affioramenti dall'aspetto croccante.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownHighlands_00 = Terreno elevato aspro con texture più scure e taglienti. Bene per la scienza, male per rilassarsi.
        #JNSQscience_bd_SiteSurvey_MinmusSrfLandedMountains_00 = Guglie alte e pendii ripidi lasciano pochi pianori sicuri. Consigliato solo se l'obiettivo della missione è "dramma".
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedIceCaps_00 = Terreno luminoso, crosta dura e bagliore traditore. I punti "piatti" sono perlopiù illusioni ottiche.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedHighlands_00 = Rilievi rocciosi e dorsali scolpite dal vento ovunque. Ottima visibilità, scarsa tolleranza agli errori.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedMidlands_00 = Terreno dolcemente ondulato con abbastanza spazi aperti da chiamarlo "atterrabile" senza ridere.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedLowlands_00 = Grandi pianure e tanta polvere. Sembra liscio finché non noti quante parti sono in realtà conche poco profonde.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedCraters_00 = Molti crateri tra cui scegliere—e altrettante pendenze del bordo pronte a trasformare un atterraggio in una scivolata.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedRareCraters_00 = Meno buchi significa avvicinamenti più lunghi e più dritti. Il suolo però sembra comunque desideroso di inghiottire i piedini.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedVoronoiCraters_00 = Dorsali poligonali ottime come linee di navigazione. Atterrare sulle "giunture" è fortemente sconsigliato.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedNotableCraters_00 = Punto di riferimento perfetto per il puntamento. L'ejecta intorno sembra voler sabbiare via le ruote.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedExoticCraters_00 = Forme strane e fondi irregolari rendono il sito difficile da valutare. "Interessante" non è la stessa cosa di "sicuro".
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedTrenches_00 = Pareti ripide e fondi in ombra. Il rilievo consiglia il bordo—preferibilmente la parte che non si sta sgretolando.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedNotablePlains_00 = Ampio, aperto e piacevolmente noioso. Un raro sito su Duna dove "in piano" potrebbe davvero significare in piano.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedNotableMountains_00 = Rilievo imponente e pendenze drammatiche. Puoi atterrare qui se il piano include rimpianto immediato.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedMountains_00 = Terreno frastagliato con pochi spiazzi. Segnato come "possibile" solo perché i Kerbal sono testardi.
        #JNSQscience_bd_SiteSurvey_DunaSrfLandedVolcano_00 = Roccia scura e ruvida con bruschi cambi di pendenza. Il sito sembra stabile, ma i carrelli potrebbero dissentire.
        #JNSQscience_bd_SiteSurvey_IkeSrfLandedPoles_00 = Ombre lunghe nascondono piccole creste che, a velocità d'atterraggio, sembrano enormi. Il miglior piazzale è quello che riesci davvero a vedere.
        #JNSQscience_bd_SiteSurvey_IkeSrfLandedMountains_00 = Terreno ripido e bloccoso, con troppi massi. Ottimo per i panorami, pessimo per restare in piedi.
        #JNSQscience_bd_SiteSurvey_IkeSrfLandedMidlands_00 = Un buon mix di spianate e lievi pendenze. Ricorda solo che la gravità di Ike rende il "rimbalzo" uno stile di vita.
        #JNSQscience_bd_SiteSurvey_IkeSrfLandedLowlands_00 = Terreno ampio e aperto che sembra invitante. La regolite pare abbastanza soffice da rendere le impronte un impegno a lungo termine.
        #JNSQscience_bd_SiteSurvey_IkeSrfLandedHighlands_00 = Dorsali spezzate e lastre irregolari. Gli spot d'atterraggio ci sono, ma si nascondono tra le cattive idee.
        #JNSQscience_bd_SiteSurvey_EdnaSrfLandedLowlands_00 = Le distese sembrano praticabili, ma la luce è così debole che ogni ombra sembra una trappola.
        #JNSQscience_bd_SiteSurvey_EdnaSrfLandedMidlands_00 = Terreno moderatamente fratturato, con abbastanza aperture per un touchdown sicuro—se ti fidi della percezione della profondità quassù.
        #JNSQscience_bd_SiteSurvey_EdnaSrfLandedHighlands_00 = Rilievi accidentati e blocchi sparsi lasciano pochi piazzali comodi. Il rilievo consiglia "più in basso".
        #JNSQscience_bd_SiteSurvey_EdnaSrfLandedPolarIceCraters_00 = Fondi craterici brillanti e bordi netti: appoggio duro e margini insidiosi. Non scivolare verso le ombre.
        #JNSQscience_bd_SiteSurvey_EdnaSrfLandedWhites_00 = Il terreno è abbagliante e ingannevolmente liscio. Ottimo finché il bagliore non ti costringe ad andare a intuito.
        #JNSQscience_bd_SiteSurvey_DakSrfLandedLowlands_00 = Un "piatto" ampio e grumoso: il massimo su un mondo a forma di patata. Tocca giù piano e non starnutire.
        #JNSQscience_bd_SiteSurvey_DakSrfLandedMidlands_00 = Placche irregolari e pendenze dolci offrono punti usabili—ammesso che tu abbia qualcosa per impedire al veicolo di andarsene in giro.
        #JNSQscience_bd_SiteSurvey_DakSrfLandedHighlands_00 = Creste strette e protuberanze scomode per avvicinamenti scenografici. Nota del rilievo: punti d'ancoraggio fortemente consigliati.
        #JNSQscience_bd_SiteSurvey_DresSrfLandedPoles_00 = Il sole basso trasforma piccole gobbe in grandi sorprese. Il piazzale più sicuro è quello con meno ombre.
        #JNSQscience_bd_SiteSurvey_DresSrfLandedHighlands_00 = Altipiani rocciosi e detriti craterici ovunque. Bene per la geologia, male per i piedini.
        #JNSQscience_bd_SiteSurvey_DresSrfLandedMidlands_00 = Terreno ampio e tranquillo, con pendenze tollerabili. Approvato per le operazioni e approvato per la noia.
        #JNSQscience_bd_SiteSurvey_DresSrfLandedLowlands_00 = Suolo più uniforme con polvere fine che sembra abbastanza profonda da nascondere rimpianti. Portare piedi larghi e pazienza.
        #JNSQscience_bd_SiteSurvey_DresSrfLandedCanyon_00 = Pareti ripide e fondi spezzati lasciano poco margine. Il rilievo consiglia il bordo, non il salto drammatico.
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedShores_00 = Terreno apparentemente solido con facile accesso all'acqua. Un sito sensato... finché le onde non provano ad "aiutare".
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedShallows_00 = Il terreno sfuma nell'acqua in modo graduale, ottimo per recupero e pessimo per schizzi a sorpresa.
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedHighlands_00 = Il terreno elevato offre avvicinamenti puliti e ottime linee di vista. Le rocce sembrano desiderose di mettere alla prova i tuoi piedi d'atterraggio.
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedMountains_00 = Rilievi spettacolari e pochissime zone pianeggianti indulgenti. Il sopralluogo consiglia "altrove, meglio se più in basso".
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedIceCaps_00 = Crosta chiara e dall'aspetto duro, con un bagliore cattivo. La chiazza più sicura non è mai quella che riesci a vedere bene.
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedEnclosedFaults_00 = Terreno fratturato con spigoli vivi e cali improvvisi. Segnato come "scientificamente entusiasmante, operativamente maleducato".
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedLowlands_00 = Grandi pianure con pendii gentili. Se il suolo resta compatto, qui è quasi un lusso.
        #JNSQscience_bd_SiteSurvey_LaytheSrfLandedMidlands_00 = Terreno ondulato con molte piazzole utilizzabili. Scegli il punto noioso e sarai più felice.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedShores_00 = Risacca bassa e gestibile: una zona di ammaraggio indulgente. Tieni solo il veicolo puntato lontano dalla costa.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedShallows_00 = Acqua calma e poco moto ondoso: ideale per operazioni ripetute... a patto di non scivolare contro qualcosa di appuntito.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedInlandWater_00 = Acque confinate con correnti visibili. Il sito è utilizzabile, ma continua a spostare il tuo "punto di atterraggio".
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedKrenwichSea_00 = mare aperto e mareggiate costanti. Buono per testare la galleggiabilità, discutibile per la stabilità degli snack.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedArcticSea_00 = Acqua fredda e irrequieta, con una sgradevole atmosfera da "bordo ghiaccio". Le squadre di recupero chiedono guanti più spessi.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedJoolwardSea_00 = Lunghe onde regolari suggeriscono venti persistenti. Il sito è sicuro, ma non è mai fermo.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedPolwardSea_00 = Superficie agitata e scie di onde che indicano meteo variabile. Gli ammaraggi qui saranno memorabili.
        #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedEnclosedFaults_00 = Piccoli bacini d'acqua stretti, circondati da terreno rotto. Facile ammarare, difficile restare fermi.
        #JNSQscience_bd_SiteSurvey_VallSrfLandedPoles_00 = Sole basso e ghiaccio brillante rendono sospetta ogni ombra. Conclusione: atterra dove riesci davvero a vedere il suolo.
        #JNSQscience_bd_SiteSurvey_VallSrfLandedHighlands_00 = Creste ghiacciate e rubble sparso. Ottima trazione... finché un pendio non ti ricorda che esiste.
        #JNSQscience_bd_SiteSurvey_VallSrfLandedMidlands_00 = Un equilibrio ragionevole tra zone pianeggianti e lievi ondulazioni. Finalmente un sito che non sembra personalmente ostile.
        #JNSQscience_bd_SiteSurvey_VallSrfLandedLowlands_00 = Pianure di ghiaccio dall'aspetto liscio con leggere ondulazioni. Probabilmente è sicuro, ed è proprio per questo che sembra sinistro.
        #JNSQscience_bd_SiteSurvey_VallSrfLandedMountains_00 = Terreno ripido e frastagliato con poche piazzole in piano. Approvato solo per missioni che amano le difficoltà inutili.
        #JNSQscience_bd_SiteSurvey_TyloSrfLandedPoles_00 = L'illuminazione netta trasforma piccoli dossi in grandi sorprese. Il sito va bene, se non ti fidi di nulla che non misuri due volte.
        #JNSQscience_bd_SiteSurvey_TyloSrfLandedMountains_00 = Pendii brutali e affioramenti a blocchi ovunque. Il sopralluogo consiglia un hobby più piatto, tipo la scienza in orbita.
        #JNSQscience_bd_SiteSurvey_TyloSrfLandedHighlands_00 = Terreno elevato con lastre rotte e massi. Buona visibilità, poco comfort, ottimo dolore alle ginocchia.
        #JNSQscience_bd_SiteSurvey_TyloSrfLandedMidlands_00 = Ampie distese con pendenze gestibili. Un raro sito di Tylo che risulta "atterrabile" senza sarcasmo.
        #JNSQscience_bd_SiteSurvey_TyloSrfLandedLowlands_00 = Grandi zone pianeggianti che sembrano invitanti finché non ricordi che la gravità di Tylo non concede seconde possibilità.
        #JNSQscience_bd_SiteSurvey_BopSrfLandedPoles_00 = Terreno bitorzoluto con angoli scomodi e ombre strane. Ancorarsi è meno un consiglio e più uno stile di vita.
        #JNSQscience_bd_SiteSurvey_BopSrfLandedMountains_00 = Creste affilate su un mondo minuscolo: avvicinamenti spettacolari. Il sopralluogo lo valuta "spettacolarmente non collaborativo".
        #JNSQscience_bd_SiteSurvey_BopSrfLandedLowlands_00 = Chiazze relativamente lisce tra grappoli di massi. Tocca giù con delicatezza, poi fingi di esserti fermato proprio lì di proposito.
        #JNSQscience_bd_SiteSurvey_BopSrfLandedMidlands_00 = Terreno irregolare con molte piccole pendenze pronte a sorprenderti. Il sito migliore è quello che non ti fa rotolare via.
        #JNSQscience_bd_SiteSurvey_BopSrfLandedHighlands_00 = Le alture offrono buona linea di vista, e un appoggio pessimo. Nota del sopralluogo: porta pazienza e autocontrollo.
        #JNSQscience_bd_SiteSurvey_PolSrfLandedPoles_00 = Terreno dall'aspetto morbido e increspato, con avvallamenti ingannevoli. Il sito è "sicuro" finché non rimbalzi.
        #JNSQscience_bd_SiteSurvey_PolSrfLandedLowlands_00 = Ampi contorni dolci e meno pericoli taglienti. Un buon candidato per operazioni in superficie e cauto ottimismo.
        #JNSQscience_bd_SiteSurvey_PolSrfLandedMidlands_00 = Creste ondulate e conche basse rendono difficile puntare il sito. Eppure ci sono molte piazzole utilizzabili in bella vista.
        #JNSQscience_bd_SiteSurvey_PolSrfLandedHighlands_00 = Rilievi sottili e terreno bitorzoluto con trame insolite. Il sopralluogo consiglia un avvicinamento lento e un contatto ancora più lento.
        #JNSQscience_bd_SiteSurvey_PolSrfLandedMountains_00 = Creste più ripide con bordi che sembrano friabili. Segnato "atterrabile" solo perché l'alternativa è am
        #JNSQscience_bd_SiteSurvey_KrelSrfLandedLowlands_00 = Bassopiani chiari con linee sorprendentemente nette. Le "vene" qui sembrano poco profonde, probabilmente è sicuro, probabilmente.
        #JNSQscience_bd_SiteSurvey_KrelSrfLandedMidlands_00 = Terreno ondulato tagliato da lievi striature, come se la superficie stesse cercando di raggrinzirsi. Scegli un punto tra una linea e l'altra.
        #JNSQscience_bd_SiteSurvey_KrelSrfLandedHighlands_00 = Dorsali e placche fratturate dominano la vista. Ottimo per il dramma, meno per le gambe di atterraggio.
        #JNSQscience_bd_SiteSurvey_KrelSrfLandedPoles_00 = Ombre lunghe nascondono rilievi taglienti e cavità profonde. Il sito è accettabile se ti fidi di ciò che non riesci a vedere.
        #JNSQscience_bd_SiteSurvey_AdenSrfLandedLowlands_00 = Pianure polverose e brune con ampi corridoi di avvicinamento. Il terreno sembra solido, ma il colore suggerisce che si attaccherà a tutto.
        #JNSQscience_bd_SiteSurvey_AdenSrfLandedMidlands_00 = Lievi rialzi e bacini poco profondi offrono molte opzioni. Scegli la zona più noiosa e considerala una vittoria.
        #JNSQscience_bd_SiteSurvey_AdenSrfLandedHighlands_00 = Terreno spezzato e massi sparsi interrompono bassopiani altrimenti decenti. Esistono buoni siti, tra gli ostacoli.
        #JNSQscience_bd_SiteSurvey_AdenSrfLandedMountains_00 = Pendii ripidi e speroni frastagliati lasciano poco margine d'errore. Consigliato solo a piloti molto sicuri di sé.
        #JNSQscience_bd_SiteSurvey_AdenSrfLandedPoles_00 = La scarsa illuminazione trasforma piccoli dossi in grandi sorprese. Il sopralluogo consiglia di atterrare dove le ombre si comportano.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedLowlands_00 = Pianure lisce e fosche che sembrano morbide e "riordinate" di recente. Abbastanza sicuro, ammesso che non sia un'enorme slavina.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedMidlands_00 = Lievi dorsali e canali poco profondi suggeriscono un lento flusso superficiale. Ci sono molte piazzole, ma controlla l'inclinazione due volte.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedHighlands_00 = Terreno più ruvido, con texture più netta, che emerge dalla foschia. Il sito è praticabile, solo meno indulgente.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedMountains_00 = Pendii scoscesi e bordi scolpiti dal vento rendono essenziale pianificare l'avvicinamento. Atterrare qui è una scelta, non un incidente.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPeaks_00 = Ottima linea di vista e pessimo parcheggio. Il sopralluogo lo etichetta "amico delle comunicazioni, nemico delle gambe".
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPolarLowlands_00 = Una crosta pallida con cavità irregolari e chiazze dall'aspetto fragile. Sembra stabile, finché non immagini che si crepi.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPoles_00 = Abbaglio accecante e profonde bande d'ombra. Il punto più sicuro è sempre quello che non riesci a confermare del tutto.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPolarHighlands_00 = Alture a creste con bruschi cambi di pendenza. Buona visibilità sopra la foschia, poca pietà al contatto.
        #JNSQscience_bd_SiteSurvey_HuygenSrfLandedShores_00 = Terreno dall'aspetto umido, con bordi disordinati e pendenze morbide. Va bene per atterrare, se non ti dispiace affondare un po'.
        #JNSQscience_bd_SiteSurvey_HuygenSrfSplashedShores_00 = Onde basse e delicate con una superficie sospettosamente calma. La galleggiabilità dovrebbe andare bene: la contaminazione sarà per sempre.
        #JNSQscience_bd_SiteSurvey_HuygenSrfSplashedMethaneLakes_00 = Liquido scuro e vitreo con lente increspature. Il sito è "ammissibile per un ammaraggio", ma nessuno vuole aprire il portello.
        #JNSQscience_bd_SiteSurvey_RigaSrfLandedLowlands_00 = Ampie pianure brune con forme stranamente familiari. Un ottimo candidato per operazioni di superficie e future foto "eravamo qui".
        #JNSQscience_bd_SiteSurvey_RigaSrfLandedMidlands_00 = Terreno ondulato con lunghi tratti percorribili. Molte piazzole sicure e spazio per guidare senza rimpianti immediati.
        #JNSQscience_bd_SiteSurvey_RigaSrfLandedHighlands_00 = Placche elevate interrotte da giunzioni rocciose. Atterra sulle placche, evita le giunzioni, fai finta che fosse il piano.
        #JNSQscience_bd_SiteSurvey_RigaSrfLandedMountains_00 = Pendii aspri e speroni bloccosi ovunque. Un sito da geologia, non da comfort.
        #JNSQscience_bd_SiteSurvey_RigaSrfLandedPoles_00 = Terreno dall'aria gelida, con contrasti duri e avvallamenti nascosti. Il sopralluogo consiglia prudenza extra e meno manovre eroiche.
        #JNSQscience_bd_SiteSurvey_TalosSrfLandedLowlands_00 = Bassopiani scuri e silenziosi con cicatrici d'impatto sparse. Sembra sicuro, e qui fuori sembra sempre un trucco.
        #JNSQscience_bd_SiteSurvey_TalosSrfLandedMidlands_00 = Terreno irregolare con vecchi bordi di cratere ammorbiditi dal tempo. Esistono buone scelte, se eviti i punti "quasi piatti" troppo invitanti.
        #JNSQscience_bd_SiteSurvey_TalosSrfLandedHighlands_00 = Dorsali frastagliate e placche spezzate raccontano una lunga storia di impatti e zero perdono. Tocca giù con delicatezza.
        #JNSQscience_bd_SiteSurvey_TalosSrfLandedMountains_00 = Rilievo ripido e spigoli netti rendono questo sito una sfida ingegneristica travestita da area di atterraggio.
        #JNSQscience_bd_SiteSurvey_TalosSrfLandedPoles_00 = Cavità in ombra e chiazze chiare e crostose si alternano rapidamente. Il sito è praticabile, purché tu ti fidi degli strumenti più che degli occhi.
        #JNSQscience_bd_SiteSurvey_EelooSrfLandedPoles_00 = Il sole basso trasforma ogni increspatura in una minaccia. Il punto che sembra più piatto è quello con meno ombra.
        #JNSQscience_bd_SiteSurvey_EelooSrfLandedHighlands_00 = Terreno duro e luminoso, con creste spezzate qua e là. Appoggio solido, ma pochi piazzali indulgenti.
        #JNSQscience_bd_SiteSurvey_EelooSrfLandedMidlands_00 = Campi di ghiaccio dolcemente ondulati, con fosse poco profonde. Sito sensato, a patto che "in piano" non sia solo riflesso.
        #JNSQscience_bd_SiteSurvey_EelooSrfLandedLowlands_00 = Ampie distese lisce che sembrano perfette per le operazioni. La spolverata di brina promette sorprese scivolose.
        #JNSQscience_bd_SiteSurvey_EelooSrfLandedCanyon_00 = Pareti ripide e curve secche sprofondano nell'ombra. Il sopralluogo consiglia di atterrare sul bordo, non dentro la scena madre.
        #JNSQscience_bd_SiteSurvey_CelesSrfLandedLowlands_00 = Ampie pianure tranquille dall'aspetto fragile. È atterrabile, ma la superficie sembra pronta a fessurarsi al primo atteggiamento sbagliato.
        #JNSQscience_bd_SiteSurvey_CelesSrfLandedMidlands_00 = Terreno ondulato con cicatrici poco profonde e blocchi sparsi. Molti siti praticabili, se eviti le zone ruvide.
        #JNSQscience_bd_SiteSurvey_CelesSrfLandedHighlands_00 = Altopiani rialzati spezzati da giunture frastagliate. Atterra sugli altopiani, non sulle giunture—se non ami le sorprese.
        #JNSQscience_bd_SiteSurvey_CelesSrfLandedMountains_00 = Pendii ripidi e affioramenti bloccosi ovunque. Il sopralluogo lo definisce "imponente" e sottolinea "spietato".
        #JNSQscience_bd_SiteSurvey_CelesSrfLandedPoles_00 = Contrasto duro e tasche d'ombra profonde rendono la lettura difficile. Fidati degli strumenti, non degli occhi.
        #JNSQscience_bd_SiteSurvey_TamSrfLandedLowlands_00 = "Pianure" bitorzolute su un mondo irregolare. Tocca giù con delicatezza, poi fai di tutto per restare giù.
        #JNSQscience_bd_SiteSurvey_TamSrfLandedMidlands_00 = Suolo irregolare con frequenti conche poco profonde. Il miglior sito è quello che non ti rotola via.
        #JNSQscience_bd_SiteSurvey_TamSrfLandedHighlands_00 = Creste affilate e texture ruvide dominano la vista. Il sopralluogo consiglia un avvicinamento basso e un ego più basso.
        #JNSQscience_bd_SiteSurvey_TamSrfLandedTwinCraters_00 = Due bacini sovrapposti rendono la navigazione facile e le pendenze inevitabili. Mira al fondo condiviso, non ai bordi.
        #JNSQscience_bd_SiteSurvey_TamSrfLandedCraters_00 = Crateri su crateri con molta pietraia. Piazzole sicure esistono, ma si nascondono tra le cattive idee.
        #JNSQscience_bd_SiteSurvey_TamSrfLandedPockmarks_00 = Innumerevoli fossette punteggiano la superficie come una spugna. Le gambe d'atterraggio trovano un buco prima che tu trovi "in piano".
        #JNSQscience_bd_SiteSurvey_HamekSrfLandedLowlands_00 = Piane scure dai colori strani, con increspature sottili. Sembra stabile, ed è proprio questo a far sospettare tutti.
        #JNSQscience_bd_SiteSurvey_HamekSrfLandedMidlands_00 = Terreno ondulato con trame a chiazze e lievi rotture di pendenza. Ottimo per operazioni di superficie, se scegli la zona noiosa.
        #JNSQscience_bd_SiteSurvey_HamekSrfLandedHighlands_00 = Creste spezzate e spigoli vivi emergono dal buio. Ottimo per la scienza, pessimo per il parcheggio.
        #JNSQscience_bd_SiteSurvey_HamekSrfLandedPoles_00 = Chiazze pallide e ombre lunghe si alternano in fretta. Il sopralluogo consiglia di atterrare dove le ombre non stanno tramando.
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedLowlands_00 = Le pianure sembrano lisce sotto l'aria densa e gelida. "Piatto" è credibile finché la brina non inizia a muoversi.
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedMidlands_00 = Dolci rilievi spezzano grandi piane nelle zone intermedie. Buon candidato operativo, se la tua attrezzatura apprezza la pressione.
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedHighlands_00 = In quota il terreno è più duro e più ruvido, con creste che bucano la foschia. Molto appoggio, pochi comfort.
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedMountains_00 = Pendii frastagliati e rilievo netto rendono rare le opzioni. Grandi viste: pessimo parcheggio.
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedPolarLowlands_00 = Le pianure polari sono pallide e dall'aspetto vetroso. Sembra in piano, ma la superficie urla "scivoloso".
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedPoles_00 = Riflessi accecanti e tasche d'ombra profonde si alternano rapidamente. In avvicinamento finale, fidati degli strumenti, non degli occhi.
        #JNSQscience_bd_SiteSurvey_NaraSrfLandedPolarHighlands_00 = Terreno polare rialzato a terrazze irregolari e creste. Abbastanza stabile, se non scegli una sommità.
        #JNSQscience_bd_SiteSurvey_AmosSrfLandedLowlands_00 = Una rara macchia gentile su Amos. Appoggia piano: questa luna ama trasformare "atterraggio" in "rimbalzo".
        #JNSQscience_bd_SiteSurvey_AmosSrfLandedMidlands_00 = Le zone intermedie sono bitorzolute e irregolari, come se la superficie non avesse deciso una forma. Ancorarsi è consigliato, con enfasi.
        #JNSQscience_bd_SiteSurvey_AmosSrfLandedHighlands_00 = Piastre spezzate e massi sparsi dominano le alture. I siti ci sono, tra le cattive idee.
        #JNSQscience_bd_SiteSurvey_AmosSrfLandedMountains_00 = Creste ripide e pendenze scomode lasciano poco margine. Il sopralluogo lo segna "possibile" e sottolinea "perché".
        #JNSQscience_bd_SiteSurvey_AmosSrfLandedPoles_00 = Ombre lunghe nascondono piccoli rilievi che diventano grandi sorprese alla velocità di touchdown. Scegli il punto che riesci davvero a vedere.
        #JNSQscience_bd_SiteSurvey_EnonSrfLandedLowlands_00 = Pianure luminose e ghiacciate con approcci ampi e liberi. Il riverbero è così intenso da far dubitare la percezione della profondità.
        #JNSQscience_bd_SiteSurvey_EnonSrfLandedMidlands_00 = Crepe leggere e creste sottili attraversano le zone intermedie. È atterrabile, se eviti le "cuciture" quasi piatte.
        #JNSQscience_bd_SiteSurvey_EnonSrfLandedHighlands_00 = Dorsali di ghiaccio rialzate e trama più ruvida suggeriscono appoggio più duro. Buona trazione, livellamento peggiore.
        #JNSQscience_bd_SiteSurvey_EnonSrfLandedPoles_00 = Il terreno polare in ombra sembra ingannevolmente liscio. La piazzola più sicura è quella che non sparisce nel buio.
        #JNSQscience_bd_SiteSurvey_PraxSrfLandedLowlands_00 = Le pianure sembrano calme e discretamente stabili. Ovviamente è proprio questo che rende tutti sospettosi.
        #JNSQscience_bd_SiteSurvey_PraxSrfLandedMidlands_00 = Terreno ondulato con fosse poco profonde offre molte opzioni. Scegli la zona noiosa e chiamala vittoria.
        #JNSQscience_bd_SiteSurvey_PraxSrfLandedHighlands_00 = Le alture sono fratturate e irregolari, con rotture di pendenza a spigolo vivo. Atterra sulle piastre, non sulle crepe.
        #JNSQscience_bd_SiteSurvey_PraxSrfLandedMountains_00 = Creste dure e pareti ripide trasformano la scelta del sito in una prova di resistenza. Il sopralluogo consiglia moderazione.
        #JNSQscience_bd_SiteSurvey_PraxSrfLandedPoles_00 = Terreno brinato e contrasto duro rendono difficile giudicare le pendenze. Gli strumenti dicono che è sicuro: sembrano nervosi.

        // bd_SoilMoisture
        #JNSQscience_bd_SoilMoisture_EdnaInSpaceLow_00 = Le microonde tornano con un messaggio chiarissimo: "Secco." L'eventuale acqua si nasconde più in profondità, congelata con ostinazione nella regolite scura.
        #JNSQscience_bd_SoilMoisture_EdnaInSpaceLow_01 = Il sensore segnala qualche puntino "umido", poi ricordi che lo strumento è più freddo del suolo e si sta brinando da solo. Edna resta poco impressionato.
        #JNSQscience_bd_SoilMoisture_DakInSpaceLow_00 = La lettura chiede dove sia il "suolo", poi si accontenta di misurare una sottile spolverata di graniglia. Contenuto d'umidità: praticamente nullo.
        #JNSQscience_bd_SoilMoisture_DakInSpaceLow_01 = Un paio di chiazze "bagnate" si rivelano rocce lucide che rimandano le microonde dritte verso di te. Dak resta una patata molto secca.
        #JNSQscience_bd_SoilMoisture_KrelInSpaceLow_00 = I ritorni in banda L sono quasi noiosamente piatti. Se Krel ha acqua, è sigillata in profondità e congelata dura.
        #JNSQscience_bd_SoilMoisture_KrelInSpaceLow_01 = Compare una tenue macchia "bagnata", poi svanisce quando correggi per l'angolo di osservazione. La pelle pallida di Krel è solo brava a ingannare gli strumenti.
        #JNSQscience_bd_SoilMoisture_AdenInSpaceLow_00 = La mappa dipinge Aden come uniformemente secco. È perlopiù polvere e roccia, senza alcun indizio di umidità vicino alla superficie.
        #JNSQscience_bd_SoilMoisture_AdenInSpaceLow_01 = Un pixel insiste che sia umido. Si allinea alla perfezione con una riflessione speculare e con la geometria della tua antenna. Falso allarme.
        #JNSQscience_bd_SoilMoisture_HuygenInSpaceLow_00 = La foschia densa rosicchia il segnale, ma i dati elaborati mostrano comunque ampie regioni dall'aspetto "umido". Le note del laboratorio aggiungono: "composizione incerta."
        #JNSQscience_bd_SoilMoisture_HuygenInSpaceLow_01 = L'algoritmo riporta con sicurezza "suolo umido". Il team di calibrazione riporta con sicurezza "non così in fretta." Archivi tutto sotto "portare un lander."
        #JNSQscience_bd_SoilMoisture_RigaInSpaceLow_00 = Alcune aree mostrano indizi dielettrici compatibili con brina superficiale o ghiaccio sepolto. Riga fa l'occhiolino all'idea di essere amichevole, poi ricorda di essere Riga.
        #JNSQscience_bd_SoilMoisture_RigaInSpaceLow_01 = La maggior parte dei ritorni indica regolite secca. I punti "umidi" più luminosi sono pianure lisce che fanno da specchi a microonde, non fango.
        #JNSQscience_bd_SoilMoisture_TalosInSpaceLow_00 = L'umidità resta piatta su tutte le vivide bande di colore di Talos. Qualunque cosa produca quelle tinte, non è acqua.
        #JNSQscience_bd_SoilMoisture_TalosInSpaceLow_01 = Letture leggermente più alte in equivalente d'acqua si concentrano nei crateri più freddi, suggerendo un velo sottile di brina ostinata più che un vero suolo umido.
        #JNSQscience_bd_SoilMoisture_CelesInSpaceLow_00 = I ritorni in banda L sono nitidi e ostinatamente secchi. L'eventuale acqua è bloccata in profondità, o non è davvero acqua.
        #JNSQscience_bd_SoilMoisture_CelesInSpaceLow_01 = Compaiono alcuni pixel "umidi" finché non consideri l'angolo di osservazione. La superficie di Celes è semplicemente molto brava a mentire alle microonde.
        #JNSQscience_bd_SoilMoisture_TamInSpaceLow_00 = Il segnale è rumoroso e discontinuo sul piccolo corpo bitorzoluto di Tam, ma la conclusione è coerente: non c'è umidità significativa vicino alla superficie.
        #JNSQscience_bd_SoilMoisture_TamInSpaceLow_01 = Diversi "punti umidi" si allineano con faccette lucide. Li registri come riflessi e ti chiedi se la forma da fibbia di cintura di Tam stia scombinando la geometria.
        #JNSQscience_bd_SoilMoisture_HamekInSpaceLow_00 = Gli indizi dielettrici risultano più alti del previsto per ghiaccio puro. Qualunque cosa renda Hamek così rosso, probabilmente è ciò che stai misurando, non fango.
        #JNSQscience_bd_SoilMoisture_HamekInSpaceLow_01 = Cerchi firme di brina superficiale e trovi solo tracce sottili e incoerenti. Se Hamek ha acqua, si nasconde sotto una patina davvero strana.
        #JNSQscience_bd_SoilMoisture_NaraInSpaceLow_00 = Lo strumento continua a insistere che il "terreno" sia molto bagnato, poi ricorda che Nara non ne ha davvero uno. Stai misurando soprattutto l'atmosfera profonda, non il suolo.
        #JNSQscience_bd_SoilMoisture_NaraInSpaceLow_01 = I ritorni in banda L oscillano con bande nuvolose e strati di pressione. Il modello di umidità alza le mani e archivia il risultato sotto "non regolite."
        #JNSQscience_bd_SoilMoisture_AmosInSpaceLow_00 = La mappa a microonde torna quasi uniformemente secca. L'eventuale acqua qui è intrappolata come ghiaccio ostinato, sepolta ben sotto una pelle polverosa.
        #JNSQscience_bd_SoilMoisture_AmosInSpaceLow_01 = Alcuni crateri in ombra risultano leggermente "umidi" nell'elaborazione. Li segni come probabili trappole di brina e annoti di fare un passaggio più ravvicinato.
        #JNSQscience_bd_SoilMoisture_EnonInSpaceLow_00 = Emissioni ampie e coerenti suggeriscono una superficie ghiacciata nascosta appena sotto un sottile strato di polvere. "Umidità del suolo" è praticamente "quanta parte del ghiaccio finge di essere terra."
        #JNSQscience_bd_SoilMoisture_EnonInSpaceLow_01 = Alcune regioni sembrano più secche del previsto, come se una coperta di graniglia isolante mascherasse il ghiaccio sottostante. La superficie di Enon gioca a nascondino con il tuo segnale.
        #JNSQscience_bd_SoilMoisture_PraxInSpaceLow_00 = I ritorni variano in chiazze marezzate, suggerendo un mix di ghiaccio pulito e detriti rocciosi. Le cicatrici d'impatto sembrano aver scavato da poco il materiale "più bagnato".
        #JNSQscience_bd_SoilMoisture_PraxInSpaceLow_01 = Il terreno più freddo mostra letture leggermente più alte in equivalente d'acqua. Se Prax ha qualcosa che assomigli all'umidità, è brina saldata negli strati superiori.

        // bd_soilScoop
        #JNSQscience_bd_soilScoop_MohoSrfLandedPoles_00 = La benna solleva polvere pallida che scintilla in modo sospetto. Alcuni granelli svaniscono in un minuscolo sbuffo, come se non fossero mai stati destinati a vedere la luce del giorno.
        #JNSQscience_bd_soilScoop_MohoSrfLandedLowlands_00 = La benna tira su fini scuri e cotti che si attaccano a tutto come toner tiepido. Il campione odora di "roccia tostata di recente".
        #JNSQscience_bd_soilScoop_MohoSrfLandedPolarIceCraters_00 = La benna rompe uno strato crostoso ed espone granuli brillanti che provano subito a fuggire sotto forma di vapore. Infili di corsa il campione nel contenitore prima che ci ripensi.
        #JNSQscience_bd_soilScoop_MohoSrfLandedHighlands_00 = La benna vibra sui ghiaioni taglienti e raccoglie frammenti spigolosi che sembrano desiderosi di lacerare un guanto. Il braccio registra un reclamo formale.
        #JNSQscience_bd_soilScoop_MohoSrfLandedMidlands_00 = Una trincea ordinata rivela regolite a strati con un lieve luccichio metallico. Il laboratorio la definisce "promettente", che non è mai una parola rilassante.
        #JNSQscience_bd_soilScoop_MohoSrfLandedCraters_00 = La benna porta su perline vetrose mescolate a pietra polverizzata. È come se qualcuno avesse macinato un impatto fino a farne un condimento fine e luccicante.
        #JNSQscience_bd_soilScoop_MohoSrfLandedExoticCraters_00 = La benna scopre cristalli dai colori strani che scintillano nella luce dura. Gli strumenti insistono che siano minerali ordinari, con un'aria decisamente poco convinta.
        #JNSQscience_bd_soilScoop_MohoSrfLandedRareCraters_00 = La benna urta qualcosa di denso e trascina su qualche puntino pesante. Improvvisamente tutti ricordano che adorano i "campionamenti di approfondimento dettagliati".
        #JNSQscience_bd_soilScoop_MohoSrfLandedVoronoiCraters_00 = Il campione si assesta in piccoli grumi che rispecchiano il terreno a motivi. È inquietante quanto in fretta la terra si organizzi da sola.
        #JNSQscience_bd_soilScoop_MohoSrfLandedNotableCraters_00 = La benna solleva un mix disordinato di ejecta: polvere, schegge e pezzi più scuri provenienti da sotto. Il cratere sembra orgoglioso della sua varietà.
        #JNSQscience_bd_soilScoop_MohoSrfLandedPeaks_00 = La benna trova solo una spolverata sottile prima di incontrare roccia ostinata. Le quote più alte di Moho sono quasi tutta roccia, con una guarnizione di graniglia.
        #JNSQscience_bd_soilScoop_GillySrfLandedLowlands_00 = La benna sfiora appena la superficie e metà del "campione" fluttua verso l'alto al rallentatore. Impari a raccogliere con delicatezza su un mondo che a malapena accetta la gravità.
        #JNSQscience_bd_soilScoop_GillySrfLandedMidlands_00 = La benna raccoglie polvere farinosa e piccoli ciottoli che tintinnano come se fossero senza peso. Il campione si prende tutto il tempo per assestarsi, come se si stesse godendo il panorama.
        #JNSQscience_bd_soilScoop_GillySrfLandedHighlands_00 = La benna stacca detriti grossolani da una crosta porosa. I pezzi sembrano assemblati con avanzi e poi dimenticati.
        #JNSQscience_bd_soilScoop_EveSrfLandedPoles_00 = La benna rompe una crosta viola e friabile ed espone sotto una graniglia fredda e pallida. Sembra quasi innocua, finché non inizia a fumare lo stesso.
        #JNSQscience_bd_soilScoop_EveSrfLandedLowlands_00 = La benna affonda con un sgradevole cianci e torna ricoperto di pesante fango viola. Si rifiuta di lasciare andare il campione.
        #JNSQscience_bd_soilScoop_EveSrfLandedMidlands_00 = Si apre una trincea ordinata, mostrando regolite a strati come una torta glassata che nessuno dovrebbe mangiare. Lo strato inferiore è preoccupantemente caldo.
        #JNSQscience_bd_soilScoop_EveSrfLandedHighlands_00 = La benna raschia su ghiaia tagliente e porta alla luce luccichii di minerali. Il pannello strumenti lo etichetta "interessante" con il tono più sospetto possibile.
        #JNSQscience_bd_soilScoop_EveSrfLandedPeaks_00 = La benna trova solo una spolverata sottile prima di urtare roccia ostinata. L'idea di "suolo" di Eve sembra essere soprattutto atteggiamento.
        #JNSQscience_bd_soilScoop_EveSrfLandedMountains_00 = Il braccio vibra come se stesse masticando pietra spezzata. Registri il campione come "spigoloso, viola e molto determinato".
        #JNSQscience_bd_soilScoop_EveSrfLandedShores_00 = La benna solleva una crosta di graniglia salata con sotto fango più scuro e umido. La linea di confine sembra spostarsi quando distogli lo sguardo.
        #JNSQscience_bd_soilScoop_EveSrfLandedKrakensWell_00 = La benna espone un terreno spugnoso che lentamente riempie di nuovo la buca alle sue spalle. Inizi a ritrarre il braccio prima che il pianeta si faccia venire qualche idea.
        #JNSQscience_bd_soilScoop_EveSrfSplashedExplodiumSea_00 = La benna si immerge e il liquido frizza subito, come se fosse offeso. Il contenitore dei campioni torna più caldo di quando è partito.
        #JNSQscience_bd_soilScoop_EveSrfSplashedShores_00 = La benna rimescola la risacca schiumosa e torna con salamoia viola e sabbia granulosa. La schiuma sfrigola piano, come se conoscesse il tuo nome.
        #JNSQscience_bd_soilScoop_EveSrfSplashedPolarLakes_00 = La benna trascina su un liquido freddo e pungente con cristalli fangosi che si formano sul metallo. Si sciolgono nell'istante in cui inizi a sperare.
        #JNSQscience_bd_soilScoop_EveSrfSplashedPetrolLakes_00 = Uno strato oleoso e vischioso ricopre tutto e si rifiuta di colare via. Il laboratorio chiede "un (1) campione in meno disgustoso", ma hai solo questo.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofAkron_00 = La benna tira su sedimento denso che si deposita troppo in fretta per essere normale. La superficie si richiude dietro di lui come se non fosse successo nulla.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofNessus_00 = La benna scompare nel liquido scuro e torna con limo fine che si raggruma in perfette palline. Non ti piace quanto sia ordinato.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofTaniwha_00 = La benna smuove l'acqua e una catena di bolle segue il braccio verso l'alto. Le bolle scoppiano con un ritmo che sembra quasi intenzionale.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofGigan_00 = La benna lotta con onde pesanti e torna con poltiglia granulosa. Il mezzo dondola abbastanza da farla sembrare una cosa personale.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofRodan_00 = La benna torna fumante, con graniglia minerale calda e un pungente sentore chimico. I sensori insistono che il liquido sia "stabile", e poi cambiano subito idea.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofGojira_00 = La benna tira su una fanghiglia densa e lenta che si allunga come caramella gommosa prima di staccarsi di colpo. Tutti fingono che quel suono non provenisse dall'oceano.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofGhidorah_00 = La benna si immerge e viene tirato di lato da correnti incrociate. Il campione mostra tre strati distinti che non vogliono mescolarsi.
        #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofBagorah_00 = La benna emerge ricoperto di melma scura e appiccicosa che quasi non gocciola. È meno un campione e più una scelta di vita permanente per il braccio.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedAdministration_00 = Raccogli con cura un "campione sotterraneo" da sotto la pianta nell'atrio. La receptionist chiede il badge del campione e delle scuse firmate.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedAstronautComplex_00 = La benna tira su un deposito a strati di lanuggine, briciole di snack e determinazione. L'equipaggio insiste che valga come "regolite" se è lì da abbastanza tempo.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedCrawlerway_00 = La benna scava e poi incontra subito roccia frantumata compattata da decenni di masse rotolanti. Un supervisore suggerisce di smettere di "scavare nell'agenda".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedFlagPole_00 = Provi a raccogliere accanto all'asta della bandiera e colpisci qualcosa di decisamente ingegnerizzato. La sicurezza spiega che le fondamenta sono "strategicamente non raccoglibili".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedLaunchPad_00 = Il primo strato è fuliggine, il secondo strato è fuliggine e anche il terzo strato è fuliggine. Il personale della piattaforma la chiama "contesto storico" e ti chiede di stare in un posto un po' meno esplosivo.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedMissionControl_00 = La benna trova polvere in un angolo che il controllo missione giura di aver pulito ieri. Il tuo campione viene subito etichettato "detriti non autorizzati" e messo sotto osservazione.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&D_00 = La benna scopre una bella sezione di terreno, poi un lucido "componente di prova". Spunta uno scienziato e ti chiede cortesemente di smettere di scoprire cose.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DCentralBuilding_00 = Il campione del pavimento contiene esattamente zero terra ed esattamente un'etichetta di avvertimento. Il tuo rapporto torna indietro con una nota: "La prossima volta prova a campionare fuori dalla realtà."
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DCornerLab_00 = Raccogli da un vassoio etichettato "NORMAL SOIL" e porti alla luce qualcosa che lampeggia. Le luci del laboratorio si spengono per "motivi di privacy".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DMainBuilding_00 = La benna solleva una stratigrafia perfetta di strati di polvere, ciascuno corrispondente a una scadenza diversa. Gli ingegneri litigano su quale strato sia "ricco di funzionalità".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DObservatory_00 = La benna trova graniglia fine e rugiada sotto il bordo della piattaforma. L'operatore chiede di mantenere lo scavo "astronomicamente silenzioso".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DSideLab_00 = Metti a nudo uno strato sorprendentemente uniforme... finché non si scopre che sono pellet rovesciati da un esperimento "totalmente non correlato". All'improvviso tutti si ricordano di un'altra riunione.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DSmallLab_00 = La benna produce una coppetta piena di granuli identici, sospettosamente identici. Uno scienziato timbra "CALIBRATED" e evita il contatto visivo.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DTanks_00 = Il terreno è compattato, macchiato e profondamente disinteressato a essere disturbato. La benna torna con un sentore di regolamenti e registri di carburante.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DWindTunnel_00 = Scavi una trincea ordinata, poi parte la galleria e trasferisce altrove l'intera collezione di campioni. Il risultato ufficiale è "sedimento altamente mobile".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedRunway_00 = Raccogli al bordo della pista e recuperi ghiaia, gomma e qualcosa che un tempo era una checklist. Il personale di terra ti chiede di smettere di campionare "infrastrutture attive".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedSPH_00 = La benna trova limature metalliche mescolate al terreno, in un bellissimo composito. Un ingegnere la chiama "terra alleggerita" e prova a brevettarla.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHMainBuilding_00 = Raccogli vicino alle porte e scopri un fresco accumulo di graniglia portata dal vento e di scartoffie. Il caposquadra chiede se la benna può anche rimuovere i "suggerimenti di progetto".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHRoundTank_00 = La benna scava nell'argine isolante e tira su soffici fibre misteriose. Un tecnico urla che stai "campionando il tipo sbagliato di atmosfera".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHTanks_00 = La benna mette a nudo strati alternati di polvere e scaglie di vernice rovesciata. Il personale sostiene che sia un "rivestimento protettivo", che non risponde a nessuna domanda tu abbia fatto.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHWaterTower_00 = Il terreno è umido, poi più umido, poi all'improvviso durissimo vicino alle fondamenta. La sicurezza consiglia di fermarti prima che la torre inizi ad "aiutare".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationDishEast_00 = La trincea del cucchiaio rivela ghiaia, guaine di cavi e un pezzo della fiducia di qualcuno. Il tecnico ti chiede di ricoprire di nuovo l'"integrità del segnale".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationDishNorth_00 = Metti a nudo uno strato pulito di terreno battuto, poi un condotto che decisamente non doveva essere visibile. La parabola continua comunque a tracciarti.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationDishSouth_00 = Il campione è opaco, compatto e mantenuto alla perfezione, proprio come il personale. Il tuo cucchiaio viene giudicato in silenzio e restituito.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationHub_00 = Al chiuso, la benna raccoglie soprattutto polvere e una vite molto importante. L'hub dichiara la vite "critica per la missione" e ti accompagna all'uscita.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedVAB_00 = La benna raschia polvere di cemento, scaglie di metallo e una piccola rondella con grandi ambizioni. Gli ingegneri insistono che la rondella fosse "sicuramente parte di qualcosa".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedVABMainBuilding_00 = Raccogli vicino a un muro e scopri un ordinato strato di graniglia depositato da innumerevoli passi frenetici. Spunta una clipboard a documentare il tuo "intervento sul pavimento".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedVABPodMemorial_00 = Prelevi un piccolo campione rispettoso dal bordo del sentiero e ti senti subito osservato dalla storia. La pala, per una volta, resta in silenzio.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedVABRoundTank_00 = La benna morde il terreno compattato e urta qualcosa che suona costoso. La sicurezza suggerisce di raccogliere "da qualche parte meno tonda e meno serbatoio".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedVABSouthComplex_00 = Il campione contiene granuli di scoria, graniglia e un lieve tepore che suggerisce che sei troppo vicino a una saldatura. La sicurezza ti fa cenno di allontanarti con un modulo intitolato "Terra calda".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedVABTanks_00 = Metti a nudo un deposito stratificato di polvere e tracce di pneumatici, come un registro geologico del panico. Il campione viene archiviato come "operazioni normali".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedKSC_00 = La benna trova un profilo di terreno perfettamente normale finché non scopre una guaina per cavi sepolta. La guaina viene subito promossa a "caratteristica del terreno" e le viene assegnata una guardia.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedIslandAirfield_00 = La benna porta su sabbia umida e graniglia salata che si raggruma in ostinate palline. Il campione odora di brezza marina e di manutenzione dell'hangar piuttosto discutibile.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedBaikerbanur_00 = La polvere secca filtra magnificamente attraverso la pala, poi uno strato di hardpan blocca tutto. Il personale locale annuisce soddisfatto e timbra il tuo contenitore campioni.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedBaikerbanurLaunchpad_00 = La benna scopre un sottile strato di polvere sopra la superficie della piattaforma. Ti informano che "scavare" richiede due badge e un osservatore.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedWoomerang_00 = Raccogli graniglia portata dal vento, poi il vento prova a riprendersela. Il campione finale è 60% suolo e 40% "trattenuto in fretta".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedIceCaps_00 = La benna scricchiola attraverso la neve incrostata ed espone il ghiaccio sottostante, azzurro e trasparente.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedHighlands_00 = Un sottile strato di suolo si stacca rivelando roccia compattata e terra più scura. Il Controllo Missione chiede se puoi "raccogliere un'intera collina" per confronto.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedMidlands_00 = La benna solleva una bella zolla di terra morbida e marrone dall'aria sospettosamente fertile. Qualcuno al CSK suggerisce subito di coltivarci snack.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedLowlands_00 = La benna affonda nel terreno umido e tira su fango che si attacca come se fosse il padrone di casa. Decidi di fermarti prima che inizi a strisciare.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedAridLowlands_00 = Una crosta fragile si spezza e una nuvola di polvere fine sfugge in modo drammatico. Sotto c'è argilla screpolata che sembra in attesa di lamentarsi.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedAridMidlands_00 = La benna espone sabbia a strati sopra un hardpan ostinato. Si forma un minuscolo vortice di polvere solo per mettersi in mostra, poi collassa.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedAridHighlands_00 = La benna raschia ghiaia granulosa e rivela sotto strane striature minerali colorate. Gli scienziati insistono che sia "assolutamente normale", sorridendo un po' troppo.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedAridMountains_00 = Il braccio del cucchiaio protesta quando urta pietre taglienti e roccia madre restia. Registri il terreno come "poco adatto alla raccolta".
        #JNSQscience_bd_soilScoop_KerbinSrfLandedWelcomeBackIsland_00 = La benna scopre un tratto di terreno sorprendentemente piatto e una chiave inglese smarrita. L'isola onora il suo nome restituendoti l'hardware.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedShores_00 = La benna sguazza nelle secche e torna con sabbia bagnata e una melma verde filamentosa. Le note del laboratorio la chiamano "organica", tu la chiami "schifosa".
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedGreatLake_00 = La benna rimescola limo scuro che intorbida subito l'acqua. Qualunque cosa vivesse laggiù presenta un reclamo formale sotto forma di bolle.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedInlandWater_00 = Una cucchiaiata di fango e minuscoli ciottoli scivola via dal braccio al rallentatore. Impari che "sotto la superficie" può essere comunque quasi tutta acqua.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedKreenwichSea_00 = La benna trascina su fanghiglia pesante e salata che odora di "scienza importante". 
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedArcticSea_00 = La benna rompe la fanghiglia e solleva salamoia ghiacciata che prova a congelarsi sul metallo. Per un attimo il braccio diventa un ghiacciolo costosissimo.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedForemansSea_00 = La benna torna con sedimento denso e una tenace cosina a forma di conchiglia. Si rifiuta di mollare, quindi la registri come "campione altamente attaccato".
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedTriangulusSea_00 = La benna porta su tre pietre stranamente simili e un po' di sabbia. La simmetria sembra un po' troppo intenzionale per stare tranquilli.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedNorthernSea_00 = Acqua fredda e sabbia grossolana rotolano giù dal cucchiaio in un mucchietto ordinato. Il Controllo Missione dice che il campione è "abbastanza a nord" e passa oltre.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedSub-ArcticSea_00 = La benna tira su un mix di fanghiglia, acqua e graniglia che non sa in che fase stare. Annoti: "comportamento del campione indeciso".
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedEasternSea_00 = La benna solleva sabbia fine e acqua limpida dall'aspetto quasi invitante. Ricontrolli il piano di missione per confermare che non sei, in effetti, in vacanza.
        #JNSQscience_bd_soilScoop_KerbinSrfSplashedWesternSea_00 = La benna scava in limo più scuro che macchia tutto ciò che tocca. Il mezzo rolla tra le onde come se l'oceano stesse ridendo.
        #JNSQscience_bd_soilScoop_MunSrfLandedPoles_00 = La benna raschia regolite polverosa con qualche granello luccicante che si rifiuta di sciogliersi, perché qui non c'è nulla che possa essere caldo.
        #JNSQscience_bd_soilScoop_MunSrfLandedHighlands_00 = La benna riporta roccia frantumata e granulosa che sembra sabbiata da secoli. Finisce ovunque, subito.
        #JNSQscience_bd_soilScoop_MunSrfLandedMidlands_00 = Si forma una trincea ordinata e poi crolla pigramente nella bassa gravità. Il campione è fine, grigio e stranamente appiccicoso.
        #JNSQscience_bd_soilScoop_MunSrfLandedLowlands_00 = La benna affonda più del previsto e solleva una polvere più scura e densa. Sembra che il terreno stia collezionando segreti.
        #JNSQscience_bd_soilScoop_MunSrfLandedPolarIceCraters_00 = La benna spacca una crosta tenace ed espone granelli che scintillano come brina intrappolata. Il contenitore si appanna senza nulla che possa appannarlo.
        #JNSQscience_bd_soilScoop_MunSrfLandedExoticCraters_00 = La benna scopre frammenti taglienti mescolati a polvere stranamente vetrosa. Le note del laboratorio includono la parola "esotico" due volte, sottolineata.
        #JNSQscience_bd_soilScoop_MunSrfLandedRareCraters_00 = La benna torna con regolite macchiettata e qualche ciottolo insolitamente pesante. Qualcuno suggerisce di controllare la benna per "cucchiaio extra".
        #JNSQscience_bd_soilScoop_MunSrfLandedVoronoiCraters_00 = La benna solleva polvere da un terreno a motivi come piastrelle crepate. Il campione si assesta da solo in piccoli grumi simili a esagoni.
        #JNSQscience_bd_soilScoop_MunSrfLandedNotableCraters_00 = La benna scava nel classico mix del fondo di un cratere: polvere, schegge e rimpianto. Il sacchetto campioni sembra offeso.
        #JNSQscience_bd_soilScoop_MunSrfLandedMountains_00 = Il braccio del cucchiaio vibra contro roccia ostinata e riesce a malapena a prendere un velo di graniglia. Mun rifiuta educatamente di farsi scavare.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedPoles_00 = La benna scheggia cristalli pallidi e croccanti che sembrano caramelle e non lo sono affatto. Il campione stride contro il metallo.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedLowlands_00 = La benna solleva uno strato soffice di polvere mentolata che fluttua verso l'alto prima di ricordarsi che la gravità esiste. Valuti di etichettarla "condimento".
        #JNSQscience_bd_soilScoop_MinmusSrfLandedMidlands_00 = La benna scopre un mix di polvere e piccole piastre cristalline. I pezzi scivolano in giro come se provassero a impilarsi con ordine.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedHighlands_00 = La benna raschia sedimento granuloso e senza vento e qualche scheggia affilata. Il campione sembra capace di tagliare un guanto in tre punti contemporaneamente.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedBasins_00 = La benna torna colmo di cristalli fini che scorrono come neve secca. Il contenitore si riempie più in fretta del previsto, come se il bacino stesse aiutando.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownBasins_00 = La benna torna con cristalli più scuri e macchiati mescolati a polvere marrone. Il laboratorio chiede se hai "raccolto per sbaglio un'ombra".
        #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownLowlands_00 = La benna tira su graniglia marrone dall'aria appiccicosa che si rifiuta di comportarsi come il resto di Minmus. Nessuno gradisce l'implicazione.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownMidlands_00 = La benna solleva polvere a strati, verdognola, poi marrone, poi di nuovo verdognola. Il campione sembra un manuale di geologia molto confuso.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownHighlands_00 = La benna raschia frammenti marroni e grossolani che sbattono nel contenitore. Il terreno qui dà l'idea di Minmus con gli stivali.
        #JNSQscience_bd_soilScoop_MinmusSrfLandedMountains_00 = La benna trova perlopiù crosta dura con solo una spolverata di cristalli sopra. Minmus tiene la sua terra migliore da qualche altra parte.
        #JNSQscience_bd_soilScoop_DunaSrfLandedIceCaps_00 = La benna spacca una crosta polverosa e scopre granuli pallidi che vorrebbero disperatamente essere ghiaccio. Il contenitore dei campioni diventa improvvisamente molto richiesto.
        #JNSQscience_bd_soilScoop_DunaSrfLandedHighlands_00 = La benna raschia graniglia secca, rosso ruggine, mescolata a sassolini appuntiti. Ogni cosa dice "il vento ci ha lavorato a lungo".
        #JNSQscience_bd_soilScoop_DunaSrfLandedMidlands_00 = Una trincea poco profonda rivela uno strato più scuro appena sotto la superficie. Il suolo sembra accumulare in silenzio calore che non ha.
        #JNSQscience_bd_soilScoop_DunaSrfLandedLowlands_00 = La benna affonda in polvere finissima che, nella bassa gravità, scorre come farina. Ora possiedi una piccola duna che segue il braccio ovunque.
        #JNSQscience_bd_soilScoop_DunaSrfLandedCraters_00 = La benna solleva un mix disordinato di polvere d'impatto e frammenti di roccia frantumata. I granelli scintillano come se fossero stati arroventati una volta e non l'avessero mai perdonata.
        #JNSQscience_bd_soilScoop_DunaSrfLandedRareCraters_00 = La benna tintinna contro ciottoli insolitamente densi nascosti nella polvere. Il laboratorio richiede subito "il resto dei ciottoli densi".
        #JNSQscience_bd_soilScoop_DunaSrfLandedVoronoiCraters_00 = Il campione si assesta in piccoli grumi dall'aspetto inquietantemente a motivi, come se ricordasse il terreno da cui proviene. Decidi di non chiedergli perché.
        #JNSQscience_bd_soilScoop_DunaSrfLandedNotableCraters_00 = La benna tira su ejecta a strati: puntini chiari, fini scuri e polvere color ruggine, tutto in un solo colpo. Il cratere sembra determinato a farsi ricordare.
        #JNSQscience_bd_soilScoop_DunaSrfLandedExoticCraters_00 = La benna scopre granelli dai colori strani che non corrispondono per nulla al suolo circostante. Gli strumenti lo definiscono "interessante" e poi tacciono.
        #JNSQscience_bd_soilScoop_DunaSrfLandedTrenches_00 = La benna mette a nudo una sezione pulita di polvere compattata e bande di ghiaia. Sembra che Duna tenga registri geologici molto ordinati.
        #JNSQscience_bd_soilScoop_DunaSrfLandedNotablePlains_00 = La benna preleva un campione perfetto e noioso di polvere molto uniforme. Il Controllo Missione sembra sollevato, il che in qualche modo lo rende sospetto.
        #JNSQscience_bd_soilScoop_DunaSrfLandedNotableMountains_00 = La benna stacca detriti granulosi da un pendio ripido e ostinato. Il campione include una roccia che sembra offesa sul personale.
        #JNSQscience_bd_soilScoop_DunaSrfLandedMountains_00 = La benna vibra sulla ghiaia grossolana e riesce a malapena a prendere un velo di suolo. Le quote alte di Duna sono quasi tutta roccia, con una guarnizione di polvere.
        #JNSQscience_bd_soilScoop_DunaSrfLandedVolcano_00 = La benna scava in materiale scuro e granuloso che sembra vecchia cenere e basalto spezzato. Il campione è abbastanza caldo da far ricontrollare i sensori.
        #JNSQscience_bd_soilScoop_IkeSrfLandedPoles_00 = La benna solleva polvere pallida che si attacca con ostinazione al metallo. È fredda, secca e piena di minuscoli granelli luccicanti che si rifiutano di spiegarsi.
        #JNSQscience_bd_soilScoop_IkeSrfLandedMountains_00 = La benna raschia schegge affilate e graniglia rocciosa da una superficie dura e irregolare. La registri come "poco adatta alla raccolta", con enfasi.
        #JNSQscience_bd_soilScoop_IkeSrfLandedMidlands_00 = La benna torna con regolite grigia fine e piccoli ciottoli che si assestano lentamente nella bassa gravità. Il campione sembra sfaldarsi in silenzio da secoli.
        #JNSQscience_bd_soilScoop_IkeSrfLandedLowlands_00 = La benna affonda in polvere più morbida e torna sovraccarico. Il contenitore si riempie di polvere che sbuffa come se fosse orgogliosa di essere stata raccolta.
        #JNSQscience_bd_soilScoop_IkeSrfLandedHighlands_00 = La benna stacca uno strato croccante di ghiaia sopra roccia compattata. Il sottosuolo sembra più duro, come se Ike si aspettasse che te la guadagni.
        #JNSQscience_bd_soilScoop_EdnaSrfLandedLowlands_00 = La benna solleva uno strato scuro e polveroso che scintilla appena nella luce. Sembra aver atteso a lungo di essere disturbato.
        #JNSQscience_bd_soilScoop_EdnaSrfLandedMidlands_00 = Una trincea poco profonda rivela graniglia compattata in strati ordinati, come se qualcuno l'avesse pressata apposta. Il campione si attacca al cucchiaio come se volesse un passaggio.
        #JNSQscience_bd_soilScoop_EdnaSrfLandedHighlands_00 = La benna raschia ghiaia croccante mescolata a ostinati granelli ghiacciati. Il braccio riporta "ottima abrasione" con un tono che suggerisce il contrario.
        #JNSQscience_bd_soilScoop_EdnaSrfLandedPolarIceCraters_00 = La benna spacca una crosta fragile ed espone ghiaccio duro e vetroso punteggiato di polvere nera. Il contenitore dei campioni diventa subito il posto preferito da tutti.
        #JNSQscience_bd_soilScoop_EdnaSrfLandedWhites_00 = La benna torna ricoperto di polvere chiara e gessosa che sembra dovrebbe essere dolce. Non è dolce, e gli strumenti sono offesi che tu l'abbia anche solo pensato.
        #JNSQscience_bd_soilScoop_DakSrfLandedLowlands_00 = La benna sfiora la superficie e quasi spinge di lato tutto il mezzo. Un soffio di polvere fine fluttua su pigramente, come se qui la gravità fosse opzionale.
        #JNSQscience_bd_soilScoop_DakSrfLandedMidlands_00 = La benna raccoglie detriti grandi come ciottoli che tintinnano come un barattolo di snack riluttanti. I pezzi sembrano "buccia di patata", che non è un termine scientifico ma sembra giusto.
        #JNSQscience_bd_soilScoop_DakSrfLandedHighlands_00 = La benna raschia roccia esposta e stacca qualche pezzo ostinato. Un frammento vibra appena al contatto e nessuno vuole indovinare perché.
        #JNSQscience_bd_soilScoop_DresSrfLandedPoles_00 = La benna solleva regolite pallida con granelli luccicanti che suggeriscono brina nascosta. Il campione è freddo, secco e discretamente compiaciuto.
        #JNSQscience_bd_soilScoop_DresSrfLandedHighlands_00 = La benna trascina su polvere grigia granulosa che sembra sabbiata dal nulla da secoli. Finisce ovunque, nonostante non ci sia un posto dove possa andare.
        #JNSQscience_bd_soilScoop_DresSrfLandedMidlands_00 = La benna rivela una fascia più scura sotto la superficie, come una macchia sepolta nella regolite. Il laboratorio chiede di "raccogliere più dello strato sospetto, per favore".
        #JNSQscience_bd_soilScoop_DresSrfLandedLowlands_00 = La benna affonda in polvere fine che crolla al rallentatore attorno alla trincea. Il campione scorre come farina e si comporta come se stesse tramando.
        #JNSQscience_bd_soilScoop_DresSrfLandedCanyon_00 = La benna espone una pila ordinata di strati compattati e frammenti spigolosi, come se le pareti del canyon fossero state macinate e archiviate con cura. Il campione sembra una lezione di geologia che puoi rovesciare.
        #JNSQscience_bd_soilScoop_LaytheSrfLandedShores_00 = La benna scosta sabbia bagnata e trova graniglia salata che si attacca a tutto. Il campione sembra pronto a diventare un nuovo tipo di corrosione.
        #JNSQscience_bd_soilScoop_LaytheSrfLandedShallows_00 = La benna scava in sedimenti saturi che ricadono nella buca al rallentatore. È meno "suolo" e più "morbidoso determinato".
        #JNSQscience_bd_soilScoop_LaytheSrfLandedLowlands_00 = La benna solleva fango scuro e compattato con minuscoli puntini simili a conchiglie mescolati dentro. Il laboratorio lo chiama "biologicamente suggestivo" e tu lo chiami "puzzolente".
