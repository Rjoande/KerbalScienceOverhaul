@EXPERIMENT_DEFINITION:HAS[#id[gravityScan]]
{
    %RESULTS
    {
        MunSrfLanded* = #CinematicPack_Munfall_gravityScan_MunSrfLanded_00 // The gravioli needle twitches in a slow, deliberate rhythm, like the Mun is breathing under your feet.
        MunSrfLanded* = #CinematicPack_Munfall_gravityScan_MunSrfLanded_01 // Local gravity says “solid rock,” then quietly changes its mind. Whatever is down there is very good at staying put.

        MunInSpaceLow* = #CinematicPack_Munfall_gravityScan_MunInSpaceLow_00 // At low orbit resolution, the Mun’s mass isn’t lumpy... it’s *arranged*. The map looks less like geology and more like engineering.
        MunInSpaceLow* = #CinematicPack_Munfall_gravityScan_MunInSpaceLow_01 // The readings trace vast, clean edges where no crater pattern should draw straight lines. Mission Control asks you to run the scan again. You already did.

        MunInSpaceHigh* = #CinematicPack_Munfall_gravityScan_MunInSpaceHigh_00 // From up here, the anomalies knit together into a single, coherent pattern. The Mun’s gravity feels… managed.
        MunInSpaceHigh* = #CinematicPack_Munfall_gravityScan_MunInSpaceHigh_01 // The gravioli detector reports a distribution too orderly to be accidental. It’s like something ancient left the “weights” in place and never came back.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[magnetometer]]
{
    %RESULTS
    {
        MunInSpaceLow* = #CinematicPack_Munfall_magnetometer_MunInSpaceLow_00 // The magnetometer catches faint, repeating spikes as you pass over the surface—like a buried circuit still ticking.
        MunInSpaceLow* = #CinematicPack_Munfall_magnetometer_MunInSpaceLow_01 // You expected noise and nothing. Instead, you get clean, narrow bands of signal that line up far too neatly with your ground track

        MunInSpaceHigh* = #CinematicPack_Munfall_magnetometer_MunInSpaceHigh_00 // From high orbit, the weak field resolves into a broad, organized pattern. The Mun shouldn’t have one, but it definitely has *something*.
        MunInSpaceHigh* = #CinematicPack_Munfall_magnetometer_MunInSpaceHigh_01 // The readings don’t fade with altitude the way random mineral patches would. Whatever is causing this is deep, coherent, and stubbornly consistent.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        MunInSpaceLow* = #CinematicPack_Munfall_evaReport_MunInSpaceLow_00 // The Mun fills the window like a quiet threat. Instruments are busy, the cabin is quiet, and nobody wants to be the first to say “that shouldn’t be doing that.”
        MunInSpaceLow* = #CinematicPack_Munfall_evaReport_MunInSpaceLow_01 // Your orbital timer drifts by a fraction, then corrects, then drifts again. For a moment you have the absurd impression the Mun is slowing down beneath you, like something is dragging on its path.

        MunInSpaceHigh* = #CinematicPack_Munfall_evaReport_MunInSpaceHigh_00 // From up here the surface looks calm, but the numbers don’t. The patterns in the data feel intentional in the way a machine is intentional.
        MunInSpaceHigh* = #CinematicPack_Munfall_evaReport_MunInSpaceHigh_01 // Navigation insists everything is nominal, yet you keep checking the relative motion. The Mun seems to hesitate in its orbit for a heartbeat… then continues, as if it noticed you watching.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_ALSEP_LRRR]]
{
    @RESULTS
    {
        MunSrfLanded* = #CinematicPack_Munfall_bd_ALSEP_LRRR_MunSrfLanded_00 // The return pulse is crisp and steady… then the timing comes back a hair short. For a moment, you can’t shake the impression the Mun is getting closer to Kerbin.
        MunSrfLanded* = #CinematicPack_Munfall_bd_ALSEP_LRRR_MunSrfLanded_01 // The reflector behaves like precision hardware bolted into bedrock. The range data shows tiny, systematic shifts that feel less like orbit and more like something adjusting its grip.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_drill]]
{
    %RESULTS
    {
        MunSrfLanded* = #CinematicPack_Munfall_bd_drill_MunSrfLanded_00 // The drill chews through regolith, then hits something that doesn’t feel like rock. The motor protests, and the bit comes back with dust… but no scrape marks.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS
    {
        MunInSpaceLow* = #CinematicPack_Munfall_bd_SIGINT_MunInSpaceLow_00 // The receiver locks onto a signal that shouldn’t exist: a tight, periodic chirp that repeats with orbital precision, then vanishes as if it noticed you listening.
    }
}