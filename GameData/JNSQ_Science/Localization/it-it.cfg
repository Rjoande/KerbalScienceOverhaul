        #JNSQscience_gravityScan_NaraSrfLandedPolarLowlands_00 = I bassopiani polari mostrano una trazione sbilanciata verso l'orizzonte polare. Lo strumento la etichetta "asimmetria" e si rifiuta di spiegare oltre.
        #JNSQscience_gravityScan_NaraSrfLandedPolarLowlands_01 = Una fascia superficiale di anomalia negativa circonda l'area come una cintura. Per un attimo ti chiedi se Nara stia ancora mescolando i detriti lontani per abitudine.
        #JNSQscience_gravityScan_NaraSrfLandedPoles_00 = Il campo gravitazionale ai poli è stranamente ordinato, poi all'improvviso non lo è più. Il grafico sembra come se qualcuno avesse provato a cancellarlo e avesse fallito.
        #JNSQscience_gravityScan_NaraSrfLandedPoles_00 = Il rilevatore scorre tra i numeri con una sicurezza inquietante. Ti ritrovi a chiederti se le "scarpette rosse" abbiano una classe di massa.
        #JNSQscience_gravityScan_NaraSrfLandedPolarHighlands_00 = Le colline polari sembrano una pila di strati densi, uno sopra l'altro. Ti fermi e ascolti un ghiaccio che scricchiola, ma non arriva nulla.
        #JNSQscience_gravityScan_NaraSrfLandedPolarHighlands_01 = Lo scanner suggerisce una struttura profonda e fredda sotto i piedi, pesante e silenziosa. Trasmetti i risultati e cerchi di non pensare al viaggio di ritorno.
        #JNSQscience_gravityScan_NaraInSpaceLowLowlands_00 = I passaggi in orbita bassa rivelano sottili "grumi" di massa sotto i bassopiani, distanziati in modo troppo regolare per essere casuale. Il team discute se sia geologia o "qualcos'altro".
        #JNSQscience_gravityScan_NaraInSpaceLowLowlands_01 = Il gravitometro dipinge un gradiente ordinato che sposta la tua traccia leggermente fuori piano. Il Controllo Missione la chiama "correzione minore" e ora sembra molto sveglio.
        #JNSQscience_gravityScan_NaraInSpaceLowMidlands_00 = Le pianure sembrano noiose dall'alto, ma la mappa gravitazionale continua a trovare struttura nascosta. Inizi a diffidare dei terreni che sembrano piatti.
        #JNSQscience_gravityScan_NaraInSpaceLowMidlands_01 = La tua orbita cavalca minuscole colline invisibili nel campo di gravità. Lo strumento lo chiama normale: tu lo chiami maleducato.
