        #JNSQscience_crewReport_HuygenFlyingLowMidlands_01 = Patchy clearings open for seconds at a time. You snap pictures and pretend that counts as certainty.
        #JNSQscience_crewReport_HuygenFlyingLowHighlands_00 = The highlands drift beneath like dark islands in a sea of fog.
