        #GEPscience_bd_ionElec_NodensFlyingHigh_00 = The ion sensor reports a busy, well-layered atmosphere—almost comforting—until the dim red sunlight makes the numbers feel slightly “wrong.”
        #GEPscience_bd_ionElec_NodensInSpaceLow_00 = Charged particles swirl above Nodens’ limb like a faint auroral halo. The best plots arrive after the comms delay, with extra confusion included.
        #GEPscience_bd_ionElec_NodensInSpaceHigh_00 = Far out, Nodens’ magnetosphere still tugs at the solar wind. The instrument insists the planet is “there” even when it looks like a colored dot.
