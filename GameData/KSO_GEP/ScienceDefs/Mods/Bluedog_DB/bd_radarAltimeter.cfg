        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_radarAltimeter_EponaInSpaceLowTropicalUplands_00 // The uplands resolve into rolling rises like frozen waves across the crust. The “sea” is probably ice, and the thought doesn’t help.
