        #CSS_Aebestach_mysteryGoo_Bop_01 = La melma sui declivi di Bop assume un motivo a strisce. Come se stesse fuggendo.
        #CSS_Aebestach_mysteryGoo_Bop_02 = La melma nella valle si raggomitola su se stessa. La capisci benissimo.
        //   Eeloo
        #CSS_Aebestach_mysteryGoo_Eeloo_01 = Fragipan di Eeloo. La melma si congela.
        #CSS_Aebestach_mysteryGoo_Eeloo_02 = Campo di Babbage di Eeloo. Melma ghiacciata.
        #CSS_Aebestach_mysteryGoo_Eeloo_03 = Ghiacciai australi di Eeloo. Melma da ghiacciaio.
        #CSS_Aebestach_mysteryGoo_Eeloo_04 = Ghiacciaio Mu di Eeloo. Melma nel fiume di ghiaccio.

        // --- mobileMaterialsLab ---
        //   Sun
