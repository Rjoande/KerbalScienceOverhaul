@EXPERIMENT_DEFINITION:HAS[#id[bd_solarWind]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_solarWind_GrannusInSpaceLow_00 // The detector counts particles so fast it looks like it’s trying to send a distress call. Grannus’ red glare makes “calibration” feel like a polite suggestion.
		GrannusInSpaceHigh* = #GEPscience_bd_solarWind_GrannusInSpaceHigh_00 // The solar wind is still fierce out here, but it arrives in steadier sheets. Mission Control’s replies come back late enough that the data has already formed its own opinions.

		TaranisInSpaceLow* = #GEPscience_bd_solarWind_TaranisInSpaceLow_00 // The wind is dense and sharp this close in, slamming straight through the local space like it owns the place. Your probe’s log labels one spike “OW” before returning to numbers.
		TaranisInSpaceHigh* = #GEPscience_bd_solarWind_TaranisInSpaceHigh_00 // Readings rise and fall with each fast sweep over Taranis, as if the planet is moving through a river of charged grit. The red sun never blinks, and neither does the counter.

		ToutatisInSpaceLow* = #GEPscience_bd_solarWind_ToutatisInSpaceLow_00 // The flow bends and jitters near Toutatis, hinting at a modest magnetic pushback. Every time it steadies, the spacecraft rotates and reminds you how far away “home” isn’t.
		ToutatisInSpaceHigh* = #GEPscience_bd_solarWind_ToutatisInSpaceHigh_00 // The wind looks calmer at this altitude, but it carries an unsettling consistency—like a long, quiet lecture from Grannus. You save the dataset and start missing radio static.

        NodensInSpaceLow* = #GEPscience_bd_solarWind_NodensInSpaceLow_00 // The particle stream kinks and curls as Nodens’ field and thick air try to argue with the wind. The counter keeps winning, but it sounds slightly less confident down here.
		NodensInSpaceHigh* = #GEPscience_bd_solarWind_NodensInSpaceHigh_00 // Above Nodens, the flow smooths into long, steady sheets under the dim red sun. By the time Mission Control replies, the wind has already changed its mind twice.

		BelisamaInSpaceLow* = #GEPscience_bd_solarWind_BelisamaInSpaceLow_00 // Readings flicker between calm and chaos as Belisama passes through Nodens’ wake. The instrument logs the pattern as “helpful,” which is not a word it usually uses.
		BelisamaInSpaceHigh* = #GEPscience_bd_solarWind_BelisamaInSpaceHigh_00 // Out of the worst of Nodens’ shielding, the wind hits cleanly and with a cold regularity. The locked world below never turns to look, and neither does the sun.

		SucellusInSpaceLow* = #GEPscience_bd_solarWind_SucellusInSpaceLow_00 // Near Sucellus there’s almost no protection—just a hard rain of charged particles and a lot of “maximum value” on the display. Someone suggests turning the sensitivity down; the wind ignores the suggestion.
		SucellusInSpaceHigh* = #GEPscience_bd_solarWind_SucellusInSpaceHigh_00 // The wind stays harsh even this far out, a steady push across a small, stubborn world. The data arrives home late and still feels like it has teeth.

		CaireenInSpaceLow* = #GEPscience_bd_solarWind_CaireenInSpaceLow_00 // Solar wind slams straight into tiny Caireen and the detector catches a spray of freshly knocked-off ions. It’s like the moon is shedding little pieces of itself to answer your question.
		CaireenInSpaceHigh* = #GEPscience_bd_solarWind_CaireenInSpaceHigh_00 // Farther out, the flow jitters with odd gaps and spikes from passing wakes and shadows. The counter ticks like distant Morse code, but there’s nobody nearby to be impressed.

        SironaInSpaceLow* = #GEPscience_bd_solarWind_SironaInSpaceLow_00 // The detector saturates, then tries again, then politely pretends it meant to do that. Sirona’s brutal magnetic environment twists the red sun’s particle stream into something that feels actively personal.
		SironaInSpaceHigh* = #GEPscience_bd_solarWind_SironaInSpaceHigh_00 // Farther out, the wind steadies into broad sheets, but the numbers still wobble with Sirona’s far-reaching field. The downlink arrives late, as if even the radio is tired of crossing this much empty.

		AirmedInSpaceLow* = #GEPscience_bd_solarWind_AirmedInSpaceLow_00 // Close to Airmed, the wind flickers between harsh exposure and Sirona-cast shelter. Spikes in the log suggest the surface is being sandblasted into a thin cloud of charged grit.
		AirmedInSpaceHigh* = #GEPscience_bd_solarWind_AirmedInSpaceHigh_00 // The instrument catches long, quiet stretches punctuated by sudden jolts—like passing through invisible wakes. You save the data and wonder how something so “empty” can be so busy.

		BorvoInSpaceLow* = #GEPscience_bd_solarWind_BorvoInSpaceLow_00 // The wind piles up and peels around Borvo, making a neat bow shock that the detector traces like a ruler line. Strange pickup ions hint that the thin air is donating molecules whether it wants to or not.
		BorvoInSpaceHigh* = #GEPscience_bd_solarWind_BorvoInSpaceHigh_00 // At altitude, the flow smooths out, but a faint, repeating ripple suggests Borvo is still dragging a tenuous interaction behind it. The red sun’s “breeze” is more of a long-distance shove.

		DamonaInSpaceLow* = #GEPscience_bd_solarWind_DamonaInSpaceLow_00 // Tiny Damona offers no protection—just a clean hit of charged particles and a brief spray of freshly liberated ions. The counter ticks calmly, which somehow makes it feel lonelier.
		DamonaInSpaceHigh* = #GEPscience_bd_solarWind_DamonaInSpaceHigh_00 // Out here the wind is thin, fast, and stubbornly consistent, as if the system has settled into a quiet routine. Mission Control’s reply arrives after the interesting part is already over.

        EponaInSpaceLow* = #GEPscience_bd_solarWind_EponaInSpaceLow_00 // The wind thickens into a scratchy hiss as it skims Epona’s upper reaches, peppering the detector with hard counts. The red sun feels close enough to be watching.
		EponaInSpaceHigh* = #GEPscience_bd_solarWind_EponaInSpaceHigh_00 // Up here it’s a steady, cold push of charged particles with occasional ripples like distant thunder. The downlink takes so long that the wind has already rearranged itself by the time anyone replies.

		RosmertaInSpaceLow* = #GEPscience_bd_solarWind_RosmertaInSpaceLow_00 // The flow stutters and bends in Rosmerta’s wake, as if the moon is dragging a thin veil of ions behind it. The instrument calls it “interesting” and then immediately fills the log with warnings.
		RosmertaInSpaceHigh* = #GEPscience_bd_solarWind_RosmertaInSpaceHigh_00 // The wind smooths out into long sheets, but every orbit adds a faint, repeating wobble to the numbers. It’s like listening to a far-off heartbeat through a very long radio delay.

		RAB-58EInSpaceLow* = #GEPscience_bd_solarWind_RAB-58EInSpaceLow_00 // Near this lumpy little world, the solar wind is all sharp edges—bursts, gaps, and a spray of freshly knocked-off particles. For a moment, space looks less empty and more… dusty.
		RAB-58EInSpaceHigh* = #GEPscience_bd_solarWind_RAB-58EInSpaceHigh_00 // The detector records calm, thin flow interrupted by brief jolts when you cross invisible shadows and wakes. The red sun’s “breeze” is patient, relentless, and not at all friendly.

		CernunnosInSpaceLow* = #GEPscience_bd_solarWind_CernunnosInSpaceLow_00 // The wind piles up, then snaps around Cernunnos like it’s wrapping a stubborn rock in an electric scarf. Your probe rotates, the counter spikes, and everything feels very far away.
		CernunnosInSpaceHigh* = #GEPscience_bd_solarWind_CernunnosInSpaceHigh_00 // Even this far out, the stream stays steady and mean, as if distance is just another number to it. Mission Control’s response arrives late and somehow sounds smaller than usual.
	}
}