@EXPERIMENT_DEFINITION:HAS[#id[magnetometer]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_magnetometer_SunInSpaceLow_00 // The magnetometer slams against the end of its scale and politely asks for a quieter star.
		SunInSpaceLow* = #JNSQscience_magnetometer_SunInSpaceLow_01 // Invisible lines of force writhe around the craft. You double-check that the boom is still attached.
		SunInSpaceHigh* = #JNSQscience_magnetometer_SunInSpaceHigh_00 // Far from planets, the instrument maps a broad interplanetary field that drifts and twists with time.
		SunInSpaceHigh* = #JNSQscience_magnetometer_SunInSpaceHigh_01 // The readings are mostly smooth background, with occasional ripples passing through like distant, silent weather.
        
        MohoInSpaceLow* = #JNSQscience_magnetometer_MohoInSpaceLow_00 // The magnetometer can’t find a strong planetary field, but it can’t stop noticing how angry space is this close to Kerbol.
		MohoInSpaceLow* = #JNSQscience_magnetometer_MohoInSpaceLow_01 // Brief, sharp anomalies hint at magnetized crust—then the background fluctuations drown them out again.
		MohoInSpaceLow* = #JNSQscience_magnetometer_MohoInSpaceLow_02 // Low over Moho, the magnetometer draws a patchy, threadlike pattern that lines up with sharp scarps and ridges. The signal is weak but coherent, consistent with small crustal blocks carrying remanent magnetization where young terrain has been exposed.
		MohoInSpaceLow* = #JNSQscience_magnetometer_MohoInSpaceLow_03 // Crossing a crisp crater floor, the field briefly spikes and then settles back to near-ambient. The best interpretation is a localized magnetic concentration in impact melt or freshly churned regolith, standing out against Moho’s otherwise quiet background.
		MohoInSpaceHigh* = #JNSQscience_magnetometer_MohoInSpaceHigh_00 // The interplanetary field here is jumpy and intense. The instrument logs faster changes than your notes can keep up with.
		MohoInSpaceHigh* = #JNSQscience_magnetometer_MohoInSpaceHigh_01 // Whatever faint field Moho has is buried under the constant shove and twist of Kerbol’s charged particle stream.

        EveInSpaceLow* = #JNSQscience_magnetometer_EveInSpaceLow_00 // No global field shows up, but the space around Eve crackles with induced currents and turbulence.
		EveInSpaceLow* = #JNSQscience_magnetometer_EveInSpaceLow_01 // The readings spike near the upper atmosphere, like the planet is improvising a shield out of sheer stubbornness.
		EveInSpaceHigh* = #JNSQscience_magnetometer_EveInSpaceHigh_00 // The background field shifts strangely as you approach. Eve seems to bend the flow without actually owning a magnetosphere.
		EveInSpaceHigh* = #JNSQscience_magnetometer_EveInSpaceHigh_01 // The sensor logs a long, distorted wake. Whatever hits Eve does not leave in the same shape.

		GillyInSpaceLow* = #JNSQscience_magnetometer_GillyInSpaceLow_00 // The magnetometer reports “nothing,” then “less than nothing,” then accuses your craft of being the source.
		GillyInSpaceLow* = #JNSQscience_magnetometer_GillyInSpaceLow_01 // Tiny, erratic blips appear and vanish. You suspect the instrument is mostly measuring your loose tools.
		GillyInSpaceHigh* = #JNSQscience_magnetometer_GillyInSpaceHigh_00 // The dominant signal isn’t Gilly at all. It’s Eve, looming nearby and making the data look important.
		GillyInSpaceHigh* = #JNSQscience_magnetometer_GillyInSpaceHigh_01 // You record a gentle gradient that points suspiciously toward the big purple planet, not the small potato rock.

        KerbinInSpaceLow* = #JNSQscience_magnetometer_KerbinInSpaceLow_00 // The magnetometer needle swings hard. Kerbin’s magnetic shield is definitely awake.
		KerbinInSpaceLow* = #JNSQscience_magnetometer_KerbinInSpaceLow_01 // Field lines loop around you like invisible spaghetti. You resist the urge to “stir” them with the boom.
		KerbinInSpaceHigh* = #JNSQscience_magnetometer_KerbinInSpaceHigh_00 // The readings drop off, but Kerbin’s magnetic influence still reaches out like a long, trailing tail.
		KerbinInSpaceHigh* = #JNSQscience_magnetometer_KerbinInSpaceHigh_01 // The data shows Kerbin’s shield being pushed and squashed by the constant stream of charged particles from Kerbol.

		MunInSpaceLow* = #JNSQscience_magnetometer_MunInSpaceLow_00 // There’s no proper global field, but the Mun has patchy “ghost magnets” stuck in its crust.
		MunInSpaceLow* = #JNSQscience_magnetometer_MunInSpaceLow_01 // The signal flickers over the surface like someone hid a box of magnets under the dust.
		MunInSpaceHigh* = #JNSQscience_magnetometer_MunInSpaceHigh_00 // Most of what you’re measuring now is just space… and a faint hint of Kerbin’s distant field.
		MunInSpaceHigh* = #JNSQscience_magnetometer_MunInSpaceHigh_01 // The Mun stays magnetically quiet, but the background hum shifts as you drift through Kerbin’s extended wake.

		MinmusInSpaceLow* = #JNSQscience_magnetometer_MinmusInSpaceLow_00 // The magnetometer reports “almost nothing,” which is still a very scientific number.
		MinmusInSpaceLow* = #JNSQscience_magnetometer_MinmusInSpaceLow_01 // Tiny blips appear, then vanish. The instrument suggests Minmus is about as magnetic as a snack wrapper.
		MinmusInSpaceHigh* = #JNSQscience_magnetometer_MinmusInSpaceHigh_00 // It’s so quiet the sensor starts picking up the spacecraft’s own electronics. You glare at the wiring.
		MinmusInSpaceHigh* = #JNSQscience_magnetometer_MinmusInSpaceHigh_01 // Occasional flickers suggest you’re grazing the edge of Kerbin’s magnetic tail… and then it’s gone again.

        DunaInSpaceLow* = #JNSQscience_magnetometer_DunaInSpaceLow_00 // The magnetometer barely twitches. Duna seems to have misplaced its global magnetic field.
		DunaInSpaceLow* = #JNSQscience_magnetometer_DunaInSpaceLow_01 // A few faint, localized spikes suggest some stubbornly magnetized rocks down below.
		DunaInSpaceHigh* = #JNSQscience_magnetometer_DunaInSpaceHigh_00 // The readings are mostly the quiet hiss of interplanetary space, with only a faint signature from Duna.
		DunaInSpaceHigh* = #JNSQscience_magnetometer_DunaInSpaceHigh_01 // You watch the background field drift and wobble as charged particles from Kerbol slide past.

		IkeInSpaceLow* = #JNSQscience_magnetometer_IkeInSpaceLow_00 // Ike looks magnetically dead, but not uniformly so. The needle jitters over a few crusty hotspots.
		IkeInSpaceLow* = #JNSQscience_magnetometer_IkeInSpaceLow_01 // The instrument insists there’s “something” down there. It’s not saying it’s useful, just that it’s something.
		IkeInSpaceHigh* = #JNSQscience_magnetometer_IkeInSpaceHigh_00 // The magnetometer starts picking up Duna’s neighborhood instead of Ike’s. Ike fades into the noise.
		IkeInSpaceHigh* = #JNSQscience_magnetometer_IkeInSpaceHigh_01 // The field looks stretched and messy, as if space itself is being dragged along behind Duna.

        EdnaInSpaceLow* = #JNSQscience_magnetometer_EdnaInSpaceLow_00 // The magnetometer reports a whole lot of “nope.” Edna has no global field to speak of.
		EdnaInSpaceLow* = #JNSQscience_magnetometer_EdnaInSpaceLow_01 // A few faint spikes come and go. The crust may have small, stubborn patches of magnetized rock.
		EdnaInSpaceHigh* = #JNSQscience_magnetometer_EdnaInSpaceHigh_00 // The signal fades into the background hiss of interplanetary space. Edna’s influence is practically nil out here.
		EdnaInSpaceHigh* = #JNSQscience_magnetometer_EdnaInSpaceHigh_01 // The instrument logs gentle, drifting changes as Kerbol’s charged particles tug the local field around.

		DakInSpaceLow* = #JNSQscience_magnetometer_DakInSpaceLow_00 // The needle doesn’t so much move as yawn. Dak appears magnetically dead, even at close range.
		DakInSpaceLow* = #JNSQscience_magnetometer_DakInSpaceLow_01 // Tiny, jittery blips suggest the “potato” has a few metallic bits, but nothing like a real magnetosphere.
		DakInSpaceHigh* = #JNSQscience_magnetometer_DakInSpaceHigh_00 // The dominant field isn’t Dak at all. You’re basically measuring space, plus whatever your craft is leaking.
		DakInSpaceHigh* = #JNSQscience_magnetometer_DakInSpaceHigh_01 // The readings stay flat until the boom picks up a brief wobble—then it’s gone, like Dak’s “siren” was just static.

		DresInSpaceLow* = #JNSQscience_magnetometer_DresInSpaceLow_00 // There’s no global field, but the sensor detects weak, localized anomalies over the surface.
		DresInSpaceLow* = #JNSQscience_magnetometer_DresInSpaceLow_01 // The magnetometer picks up a few crustal hotspots, as if Dres collected stray magnetism along with dust and loneliness.
		DresInSpaceHigh* = #JNSQscience_magnetometer_DresInSpaceHigh_00 // Dres quickly disappears into the background. The instrument settles into a steady interplanetary reading.
		DresInSpaceHigh* = #JNSQscience_magnetometer_DresInSpaceHigh_01 // The field lines look slightly stretched and uneven, shaped more by the space environment than by pale, quiet Dres itself.

        JoolInSpaceLow* = #JNSQscience_magnetometer_JoolInSpaceLow_00 // The magnetometer needle snaps hard and stays there. Jool is wrapped in a serious magnetic grip.
		JoolInSpaceLow* = #JNSQscience_magnetometer_JoolInSpaceLow_01 // The field surges and ripples as you pass through charged particle belts. The boom feels like it’s being “tugged” by invisible hands.
		JoolInSpaceHigh* = #JNSQscience_magnetometer_JoolInSpaceHigh_00 // Even out here, Jool’s field is still the loudest thing in the data. It reaches farther than you expected.
		JoolInSpaceHigh* = #JNSQscience_magnetometer_JoolInSpaceHigh_01 // The readings sketch a long magnetic wake trailing behind Jool, stretched out by the constant particle flow from Kerbol.

		LaytheInSpaceHigh* = #JNSQscience_magnetometer_LaytheInSpaceHigh_00 // Laythe’s magnetic signature is subtle, but Jool’s influence keeps intruding like a very large neighbor in a quiet room.

		VallInSpaceLow* = #JNSQscience_magnetometer_VallInSpaceLow_00 // The field is weak, but oddly structured. Something under Vall’s surface might be carrying currents for you.
		VallInSpaceLow* = #JNSQscience_magnetometer_VallInSpaceLow_01 // Small fluctuations sync up with your orbit, as if Vall is quietly responding to Jool’s magnetic pressure.
		VallInSpaceHigh* = #JNSQscience_magnetometer_VallInSpaceHigh_00 // Vall fades into the background, but the “background” is still Jool’s restless magnetosphere.
		VallInSpaceHigh* = #JNSQscience_magnetometer_VallInSpaceHigh_01 // The magnetometer records slow, sweeping changes that suggest you’re riding through broad, warped field lines.

		TyloInSpaceLow* = #JNSQscience_magnetometer_TyloInSpaceLow_00 // Tylo shows no global field, but the needle twitches over a few stubborn crustal anomalies.
		TyloInSpaceLow* = #JNSQscience_magnetometer_TyloInSpaceLow_01 // The dominant signal is Jool’s field draped around Tylo, bent and compressed as you skim past.
		TyloInSpaceHigh* = #JNSQscience_magnetometer_TyloInSpaceHigh_00 // Tylo’s contribution is minimal at this distance. The instrument mostly charts Jool’s sprawling magnetic domain.
		TyloInSpaceHigh* = #JNSQscience_magnetometer_TyloInSpaceHigh_01 // A smooth gradient in the readings hints at a magnetic “shadow” region downstream of Tylo.

		BopInSpaceLow* = #JNSQscience_magnetometer_BopInSpaceLow_00 // Bop barely registers magnetically. The sensor mostly complains about your spacecraft and then goes quiet again.
		BopInSpaceLow* = #JNSQscience_magnetometer_BopInSpaceLow_01 // A few jittery spikes suggest scattered metal-rich bits, but nothing even pretending to be a real field.
		BopInSpaceHigh* = #JNSQscience_magnetometer_BopInSpaceHigh_00 // At this altitude, Bop disappears into the noise. You end up mapping the outer reaches of Jool’s influence instead.
		BopInSpaceHigh* = #JNSQscience_magnetometer_BopInSpaceHigh_01 // The field here is thin and uneven, like the last wisps of a very big magnetic blanket.

		PolInSpaceLow* = #JNSQscience_magnetometer_PolInSpaceLow_00 // The magnetometer sees almost no coherent field, only small, fussy disturbances as you drift by.
		PolInSpaceLow* = #JNSQscience_magnetometer_PolInSpaceLow_01 // The readings wander unpredictably, as if Pol is magnetically indecisive and Jool won’t stop interfering.
		PolInSpaceHigh* = #JNSQscience_magnetometer_PolInSpaceHigh_00 // Pol’s signal is effectively gone. The instrument tracks faint, distant structure shaped by the wider space environment.
		PolInSpaceHigh* = #JNSQscience_magnetometer_PolInSpaceHigh_01 // The background field shifts in slow waves, hinting at far-off magnetic activity without pointing a clear finger at Pol.

        LindorInSpaceLow* = #JNSQscience_magnetometer_LindorInSpaceLow_00 // The magnetometer needle pegs and trembles. Lindor’s magnetic field is loud enough to feel through the boom.
		LindorInSpaceLow* = #JNSQscience_magnetometer_LindorInSpaceLow_01 // Field lines twist and bunch as you skim the upper layers. The instrument logs a storm you can’t see.
		LindorInSpaceHigh* = #JNSQscience_magnetometer_LindorInSpaceHigh_00 // The readings ease off, but Lindor’s influence still dominates the local background like an unseen, humming giant.
		LindorInSpaceHigh* = #JNSQscience_magnetometer_LindorInSpaceHigh_01 // The data sketches a broad magnetic wake trailing behind Lindor, stretched thin and restless.

		KrelInSpaceLow* = #JNSQscience_magnetometer_KrelInSpaceLow_00 // Krel shows no real global field, but the needle jitters over a few stubborn patches like old scars in the crust.
		KrelInSpaceLow* = #JNSQscience_magnetometer_KrelInSpaceLow_01 // Lindor’s field drapes across Krel and kinks around it, making the tiny moon look briefly important in the charts.
		KrelInSpaceHigh* = #JNSQscience_magnetometer_KrelInSpaceHigh_00 // Krel fades quickly; you mostly measure Lindor’s distant roar and the quiet between its surges.
		KrelInSpaceHigh* = #JNSQscience_magnetometer_KrelInSpaceHigh_01 // The magnetometer logs smooth gradients, then sudden wiggles—like you crossed invisible ripples in Lindor’s domain.

		AdenInSpaceLow* = #JNSQscience_magnetometer_AdenInSpaceLow_00 // The magnetometer finds no coherent field, only faint, inconsistent spikes that suggest scattered metal in the rock.
		AdenInSpaceLow* = #JNSQscience_magnetometer_AdenInSpaceLow_01 // The dominant signal is Lindor’s field bending around Aden, as if the moon is a pebble in a flowing river.
		AdenInSpaceHigh* = #JNSQscience_magnetometer_AdenInSpaceHigh_00 // From high above, Aden vanishes into the noise; the background field belongs to Lindor and the space it stirs up.
		AdenInSpaceHigh* = #JNSQscience_magnetometer_AdenInSpaceHigh_01 // The readings show gentle drift punctuated by abrupt twists, hinting at shifting charged particles nearby.

		HuygenInSpaceLow* = #JNSQscience_magnetometer_HuygenInSpaceLow_00 // The instrument records turbulence as you pass Huygen’s hazy envelope—currents and induced effects without a true magnetosphere.
		HuygenInSpaceLow* = #JNSQscience_magnetometer_HuygenInSpaceLow_01 // The needle flicks in short bursts, like the atmosphere is reluctantly conducting Lindor’s magnetic “weather.”
		HuygenInSpaceHigh* = #JNSQscience_magnetometer_HuygenInSpaceHigh_00 // Higher up, the signal smooths out into Lindor’s broad field, with slow, rolling changes like distant surf.
		HuygenInSpaceHigh* = #JNSQscience_magnetometer_HuygenInSpaceHigh_01 // The magnetometer maps a stretched pattern that suggests Huygen is sitting in a steady magnetic draft.

		RigaInSpaceLow* = #JNSQscience_magnetometer_RigaInSpaceLow_00 // Riga offers no global field, but localized anomalies pop up as you orbit—small hints of magnetized crust.
		RigaInSpaceLow* = #JNSQscience_magnetometer_RigaInSpaceLow_01 // Lindor’s field compresses and twists near Riga, making the charts look busier than the moon deserves.
		RigaInSpaceHigh* = #JNSQscience_magnetometer_RigaInSpaceHigh_00 // At altitude, Riga’s signature drops away and the data becomes a story about Lindor’s far-reaching influence.
		RigaInSpaceHigh* = #JNSQscience_magnetometer_RigaInSpaceHigh_01 // The background field shifts in long arcs, as if you’re tracing the edges of a much larger, invisible structure.

		TalosInSpaceLow* = #JNSQscience_magnetometer_TalosInSpaceLow_00 // Talos is magnetically quiet; the needle barely moves unless you pass over a rare, sharp crustal blip.
		TalosInSpaceLow* = #JNSQscience_magnetometer_TalosInSpaceLow_01 // The strongest effect is Lindor’s field sweeping past, draped thinly here and bending gently around the moon.
		TalosInSpaceHigh* = #JNSQscience_magnetometer_TalosInSpaceHigh_00 // Talos disappears into the background, leaving only a faint, wandering field shaped by Lindor and deep space.
		TalosInSpaceHigh* = #JNSQscience_magnetometer_TalosInSpaceHigh_01 // The magnetometer logs low, steady readings with occasional ripples—like distant disturbances passing through an empty room.

        EelooInSpaceLow* = #JNSQscience_magnetometer_EelooInSpaceLow_00 // The magnetometer stares back blankly. Eeloo isn't putting up a magnetic fight.
		EelooInSpaceLow* = #JNSQscience_magnetometer_EelooInSpaceLow_01 // A few tiny blips hint at frozen crust holding faint leftover magnetism—then it fades.
		EelooInSpaceHigh* = #JNSQscience_magnetometer_EelooInSpaceHigh_00 // Out here the interplanetary field is thin and steady, like it ran out of enthusiasm.
		EelooInSpaceHigh* = #JNSQscience_magnetometer_EelooInSpaceHigh_01 // Occasional slow ripples pass through the readings, drifting past your craft without a clear source.

		CelesInSpaceLow* = #JNSQscience_magnetometer_CelesInSpaceLow_00 // Celes contributes almost nothing; the strongest signal is your own reaction wheels.
		CelesInSpaceLow* = #JNSQscience_magnetometer_CelesInSpaceLow_01 // A weak gradient suggests you're still inside Eeloo's very faint magnetic "neighborhood," if you can call it that.
		CelesInSpaceHigh* = #JNSQscience_magnetometer_CelesInSpaceHigh_00 // The instrument mostly maps empty space, with a subtle bias toward Eeloo's direction.
		CelesInSpaceHigh* = #JNSQscience_magnetometer_CelesInSpaceHigh_01 // The field lines look smooth and stretched, as if whatever is out here is being gently combed.

		TamInSpaceLow* = #JNSQscience_magnetometer_TamInSpaceLow_00 // Tam is magnetically quiet, but the needle jitters whenever you pass over a lumpy ridge.
		TamInSpaceLow* = #JNSQscience_magnetometer_TamInSpaceLow_01 // The data looks like scattered metal grains embedded in rock—too small to organize into a real field.
		TamInSpaceHigh* = #JNSQscience_magnetometer_TamInSpaceHigh_00 // At this distance, Tam vanishes into the background. You log the interplanetary field instead.
		TamInSpaceHigh* = #JNSQscience_magnetometer_TamInSpaceHigh_01 // A faint wobble appears now and then, likely from drifting through Eeloo's wake rather than anything Tam does.

		HamekInSpaceLow* = #JNSQscience_magnetometer_HamekInSpaceLow_00 // No global field shows up. Hamek's space is eerily calm for such a dramatic-looking world.
		HamekInSpaceLow* = #JNSQscience_magnetometer_HamekInSpaceLow_01 // Short, sharp anomalies pop up and vanish, like magnetized patches hidden under the surface.
		HamekInSpaceHigh* = #JNSQscience_magnetometer_HamekInSpaceHigh_00 // Far above Hamek, the readings settle into a gentle, wandering background field.
		HamekInSpaceHigh* = #JNSQscience_magnetometer_HamekInSpaceHigh_01 // The magnetometer catches a slow twist in the field lines, then smooths out again as you drift onward.

        NaraInSpaceLow* = #JNSQscience_magnetometer_NaraInSpaceLow_00 // The magnetometer settles into a strong, steady field. Nara wears an invisible shield.
		NaraInSpaceLow* = #JNSQscience_magnetometer_NaraInSpaceLow_01 // The readings show a structured, looping pattern. Something deep inside Nara is doing real work.
		NaraInSpaceHigh* = #JNSQscience_magnetometer_NaraInSpaceHigh_00 // The field weakens with distance, stretching into a long, trailing wake behind Nara.
		NaraInSpaceHigh* = #JNSQscience_magnetometer_NaraInSpaceHigh_01 // Gentle waves ripple through the background readings, as if Nara’s magnetic boundary is breathing.

		AmosInSpaceLow* = #JNSQscience_magnetometer_AmosInSpaceLow_00 // Amos has no field of its own, but the magnetometer still chatters inside Nara’s magnetic domain.
		AmosInSpaceLow* = #JNSQscience_magnetometer_AmosInSpaceLow_01 // The needle only twitches when you pass close—Amos contributes little more than a small kink in Nara’s field lines.
		AmosInSpaceHigh* = #JNSQscience_magnetometer_AmosInSpaceHigh_00 // Amos disappears into the noise. The instrument mostly records whatever Nara and deep space are doing.
		AmosInSpaceHigh* = #JNSQscience_magnetometer_AmosInSpaceHigh_01 // The field here is thin and uneven, like you’re skimming the last frayed edge of Nara’s influence.

		EnonInSpaceLow* = #JNSQscience_magnetometer_EnonInSpaceLow_00 // No global field shows up, but the readings drift smoothly as if currents are being coaxed through cold material below.
		EnonInSpaceLow* = #JNSQscience_magnetometer_EnonInSpaceLow_01 // Enon itself is magnetically quiet; the strongest signal is Nara’s field draped across the moon’s orbit.
		EnonInSpaceHigh* = #JNSQscience_magnetometer_EnonInSpaceHigh_00 // The magnetometer logs a calm background with slow bends and twists, shaped more by Nara than by Enon.
		EnonInSpaceHigh* = #JNSQscience_magnetometer_EnonInSpaceHigh_01 // The data looks stretched and distant, like a faint echo of a much larger magnetic structure.

		PraxInSpaceLow* = #JNSQscience_magnetometer_PraxInSpaceLow_00 // Prax offers no real field. The magnetometer mostly maps Nara’s reach and calls it a day.
		PraxInSpaceLow* = #JNSQscience_magnetometer_PraxInSpaceLow_01 // A few jittery blips appear, then vanish—either tiny crustal scraps or your spacecraft being messy again.
		PraxInSpaceHigh* = #JNSQscience_magnetometer_PraxInSpaceHigh_00 // The readings flatten until the spacecraft becomes the most interesting magnetic object around.
		PraxInSpaceHigh* = #JNSQscience_magnetometer_PraxInSpaceHigh_01 // Far out on the fringe, the field lines look combed thin and tired, with only occasional ripples passing through.
    }
}