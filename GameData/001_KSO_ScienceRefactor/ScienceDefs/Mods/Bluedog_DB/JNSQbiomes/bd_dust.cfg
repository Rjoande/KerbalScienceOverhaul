@EXPERIMENT_DEFINITION:HAS[#id[bd_dust]]
{
	%RESULTS
	{
		KerbinFlyingLowMidlands* = #ScienceRefactor_bd_dust_KerbinFlyingLowGrasslands_00 // The density of the grains seems to be the same of pollen. Achoo..
		KerbinFlyingLowAridMidlands* = #ScienceRefactor_bd_dust_KerbinFlyingLowDeserts_00 // Lots of collisions, quite a dusty place.
		KerbinFlyingLowAridHighlands* = #ScienceRefactor_bd_dust_KerbinFlyingLowBadlands_00 // The same dust you can find on our bookshelves.
		
		MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_dust_MunInSpaceLowEastFarsideCrater_00 // Lower collision rate, but heavy impacts.
		MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_dust_MunInSpaceLowFarsideCrater_00 // Almost no collision, weak impacts.
		MunInSpaceLowNotableCraters* = #ScienceRefactor_bd_dust_MunInSpaceLowTwinCraters_00 // After every grain collision follows a collision with the same charge.
		MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_dust_MunInSpaceLowMidlandCraters_00 // Lower collision rate and weak impacts.
		
		MinmusInSpaceLowMountains* = #ScienceRefactor_bd_dust_MinmusInSpaceLowSlopes_00 // Low level dust.
		MinmusInSpaceLowBasins* = #ScienceRefactor_bd_dust_MinmusInSpaceLowGreatFlats_00 // Notably no sulphate particles are present in the dust sampled. Indicating a lack of anthropogenic pollution.
		MinmusInSpaceLowBasins* = #ScienceRefactor_bd_dust_MinmusInSpaceLowGreaterFlats_00 // Traces of dust from gypsum, quartz, NaCl (which may be sea salt or mineral halite), calcium rich particles, and calcium carbonates.
		MinmusInSpaceLowBasins* = #ScienceRefactor_bd_dust_MinmusInSpaceLowLesserFlats_00 // Moderate dust storm.
		MinmusInSpaceLowBasins* = #ScienceRefactor_bd_dust_MinmusInSpaceLowFlats_00 // Composition of particles with diameter greater than 1my.
    }
}