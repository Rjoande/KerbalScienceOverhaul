@EXPERIMENT_DEFINITION:HAS[#id[bd_atm]]
{
	@title = #ScienceRefactor_bd_atm_title // Solar Telescope Mount Observations
	!RESULTS{}
    %RESULTS
	{
		default = #ScienceRefactor_bd_atm_default_00 // Collected high resolution images of the Sun.
        InSpace* = #ScienceRefactor_bd_atm_default_01 // These photos almost suggest there's a... a hole in the corona of the Sun.
		InSpace* = #ScienceRefactor_bd_atm_default_02 // An enormous prominence stretches out of the Sun. Our home is but a speck compared to it.
		InSpace* = #ScienceRefactor_bd_atm_default_03 // Collected H-alpha measurements of the Sun's chromosphere during a solar flare.
		
        GillyInSpace* = #ScienceRefactor_bd_atm_GillyInSpace_00 // Monitoring the Sun for flare activity... seems like we're good, for now.
		MohoInSpace* = #ScienceRefactor_bd_atm_MohoInSpace_00 // Monitoring the Sun for flare activity. Even a small one directed at the spacecraft could be catastrophic if it catches us unaware, after all.
		SunInSpaceLow* = #ScienceRefactor_bd_atm_SunInSpaceLow_00 // Somehow you doubt that the Telescope Mount was designed to get this close...
		KerbinFlyingHigh* = #ScienceRefactor_bd_atm_KerbinFlyingHigh_00 // It seems that the Telescope Mount is in the atmosphere at the moment. Is it deorbiting early? Maybe that has to do with the sun?
		DunaInSpace* = #ScienceRefactor_bd_atm_DunaInSpace_00 // Monitoring the Sun for flare activity... seems like we're good, for now.
		JoolInSpace* = #ScienceRefactor_bd_atm_JoolInSpace_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool and its moons, revealing lovely details of swirling clouds on Jool.
		JoolInSpace* = #ScienceRefactor_bd_atm_JoolInSpace_01 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool's moons. Laythe seems to have a weather system not to dissimilar to that of Kerbin!
		JoolInSpace* = #ScienceRefactor_bd_atm_JoolInSpace_02 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool's moons. There seems to be a corona around Vall... wait, no, that's just water vapor plumes.
		JoolInSpace* = #ScienceRefactor_bd_atm_JoolInSpace_03 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool's moons. The telescope maps the craters of Tylo.
		LaytheInSpaceLow* = #ScienceRefactor_bd_atm_LaytheInSpaceLow_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool. Visual observations recover lovely pictures of the swirling cloud bands of the green planet.
		LaytheInSpaceHigh* = #ScienceRefactor_bd_atm_LaytheInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Laythe. Laythe's cloud patterns are observed. The atmospheric dynamics are quite similar to those on Kerbin.
		VallInSpace* = #ScienceRefactor_bd_atm_VallInSpace_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool. Visual observations recover lovely pictures of the swirling cloud bands of the green planet.
		TyloInSpace* = #ScienceRefactor_bd_atm_TyloInSpace_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool. Visual observations recover lovely pictures of the swirling cloud bands of the green planet.
		BopInSpace* = #ScienceRefactor_bd_atm_BopInSpace_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool. Visual observations recover lovely pictures of the swirling cloud bands of the green planet.
		PolInSpace* = #ScienceRefactor_bd_atm_PolInSpace_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Jool. Visual observations recover lovely pictures of the swirling cloud bands of the green planet.
		EelooInSpaceLow* = #ScienceRefactor_bd_atm_EelooInSpaceLow_00 // Solar photography is impractical at this distance. Unfortunately, the telescope is too close to Eeloo to get good pictures of the planet.
		EelooInSpaceHigh* = #ScienceRefactor_bd_atm_EelooInSpaceHigh_00 // Solar photography is impractical at this distance. With the filters removed, the telescope can be turned to study Eeloo. Detailed maps of Eeloo's terrain can be reconstructed.
	}
}