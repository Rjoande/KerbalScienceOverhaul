@EXPERIMENT_DEFINITION:HAS[#id[bd_surveillance]]
{
    @title = #ScienceRefactor_bd_surveillance_title // Orbital Surveillance Data
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_surveillance_default_00 // You take a picture of whatever the telescope is pointing at. Do you see anything suspicious?

        SunInSpaceHigh* = #ScienceRefactor_bd_surveillance_SunInSpaceHigh_00 // She is very bright and very beautiful. Kerbol, the star that keeps Kerbalkind alive...
        SunInSpaceLow* = #ScienceRefactor_bd_surveillance_SunInSpaceLow_00 // The light coming off Kerbol has made the image pure white! You're lucky you didn't damage the camera...

        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_00 // The grassland plains are the most 'alive' part of Kerbin. The cities, the lush green grass, the farmland, and the industry. This is home.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_01 // You really can see your house from up here! Oh, there's your annoying neighbor.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_02 // Observed farmland. Crop yields look up to 10 percent higher than last year.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_03 // Mapped some enemy roads. Should be useful if we ever go on an offensive.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_04 // Observing Kerbograd apartment buildings, doesn't seem to be any different than the ones in Filigrad and Yurigrad. In fact, they look exacty the same.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_05 // Observed military parade in Kerya. Weapons being developed are a concern, but their current capabilities don't seem to pose any real threat.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_06 // Found some stray kogs around Woomerang. Maybe they can be used as test subjects.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_07 // This part of the grasslands is exactly that. Grassy. There are some small farms here, seems like their crop was recently harvested.
        KerbinInSpaceLowShores* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowShores_00 // The shallow waters near the coast are teeming with sea life. You can see schools of different fish, some koral, and seaweed.
        KerbinInSpaceLowShores* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowShores_00 // You can see the water from the rivers merge into the sea. You can see the cloudy dark blobs on some of those rivers.
        KerbinInSpaceLowMountains* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowMountains_00 // Spotted what looks to be an observatory complex on a mountaintop. Its dome is closed for now.
        KerbinInSpaceLowMountains* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowMountains_01 // Found a group of climbers. They seem to be surveying the rocks. Grade: mostly harmless.
        KerbinInSpaceLowMountains* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowMountains_02 // Nothing of interest to national defense, just barren rock, but the fact that we can get to places where even the mountains look small is a testament to the accomplishments of society.
        KerbinInSpaceLowHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowHighlands_00 // The highlands. The nature, the farms, the rolling hills. You can see the plants growing.
        KerbinInSpaceLowHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowHighlands_01 // You can see the highland cities, and the tourism they are built on.
        KerbinInSpaceLowHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowHighlands_02 // Snapped photo of a kerman with a largish telescope, pointing directly at the satellite. Amateur astronomer, probably. But why is he still looking up after dawn?
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_00 // The desert looks hostile, but there are flourishing cities and settlements dotted across it, a reminder that anything can be done with enough will, time, and resources. The third, the desert has plenty.
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_01 // Found some nomads on kamels, resting by an oasis. Not a threat.
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_02 // Staring at what seems to be a mass of granular silicon dioxide. Are you sure you want to waste surveillance-grade film on this?
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_03 // Spotted enemy rocket test! Fortunately for us, it failed just under a minute after liftoff.
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_00 // The boats and ships crossing Kerbin's waters seem mostly benign.
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_01 // You can see the containers on the freighters, kerbs on ferries and the aircraft of a carrier.
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_02 // You spot a lone boat in the middle of the ocean. What is it doing?
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_03 // Snapped high-detail photos of the latest algae bloom. Its spread can be accurately determined from this image.
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_04 // All is calm this time, just a light breeze over the ocean and fish swimming underneath.
        KerbinInSpaceLowBadlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_00 // Photographed some rocks, a tree, and a mining town.
        KerbinInSpaceLowBadlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_01 // Captured images of oil wells among the rocks. May be important later.
        KerbinInSpaceLowBadlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_02 // Spotted an airbase, large. Site marked as 'important'.
        KerbinInSpaceLowBadlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_03 // This particularly treacherous, rocky view shows why this place is called "the Badlands". it really is bad.
        KerbinInSpaceLowTundra* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowTundra_00 // You photographed a silo. Probably nuclear ICBM. You've also captured some tracks left behind by lorries servicing the silo.
        KerbinInSpaceLowTundra* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowTundra_01 // Trees, a bear, and some snow. Normal tundra stuff.
        KerbinInSpaceLowTundra* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowTundra_02 // Just some rocks and a tent.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowIceCaps_00 // You get a very washed-out, fuzzy image from the bright white ice, so the high resolution image is utterly worthless here.
        KerbinInSpaceLowNorthernIceShelf* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_00 // Ice, ice, and more ice. And what's that? A 50-kerb Krussian outpost? Probably harmless. `
        KerbinInSpaceLowNorthernIceShelf* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_01 // Big glacier splitting off. Better put on some navigation warnings and inform the KOAA.
        KerbinInSpaceLowNorthernIceShelf* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_02 // You see some polar bears and seals. One seems to be eating the other.
        KerbinInSpaceLowSouthernIceShelf* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_00 // Captured sub-meter resolution image of... ice. And some flocks of birds. And their kuano. At least you know where the ice is cracking.
        KerbinInSpaceLowSouthernIceShelf* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_01 // Spotted the latest polar expedition. They seem to be all fine, but they got their snowcat stuck a few times.
        KerbinInSpaceLowSouthernIceShelf* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_02 // Big crack spotted and... ice falling! At least the penkuins are safe.
        KerbinInSpaceLow* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLow_00 // Collected very high-res images. You can discern cars, roads, rivers and even kerbholes from space!
        KerbinInSpaceLow* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLow_01 // Kerbin looks beautiful from up here. But we're not interested in that. we're here for spying - oh, sorry, scratch that - science!
        KerbinInSpaceLow* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLow_02 // Captured some interesting details on the planet's surface.

        MunInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_MunInSpaceLowMidlands_00 // The surface is littered with small impact craters. The flat areas here may have been formed by volcanic activity.
        MunInSpaceLowMidlandCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowMidlandCraters_00 // You wonder how big of an asteroid is needed to make craters this wide, before realizing there are far larger craters on the Mun.
        MunInSpaceLowHighlands* = #ScienceRefactor_bd_surveillance_MunInSpaceLowHighlands_00 // The highlands are lighter in appearence, but no sign of enemy bases here.
        MunInSpaceLowHighlandCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowHighlandCraters_00 // Some of these craters look to be far older than the ones in the Mun’s midlands.
        MunInSpaceLowCanyons* = #ScienceRefactor_bd_surveillance_MunInSpaceLowCanyons_00 // The steep walls of the canyons might make landing difficult. But it would be a good place to hide a base in.
        MunInSpaceLowNorthernBasin* = #ScienceRefactor_bd_surveillance_MunInSpaceLowNorthernBasin_00 // The basin was likely formed by volcanic activity.
        MunInSpaceLowEastCrater* = #ScienceRefactor_bd_surveillance_MunInSpaceLowEastCrater_00 // One of the most prominent landmarks on the Mun when viewed from the surface of Kerbin, Kerbals have spent millennia guessing what might have created it.
        MunInSpaceLowNorthwestCrater* = #ScienceRefactor_bd_surveillance_MunInSpaceLowNorthwestCrater_00 // Just another impact crater, located in the northwest.
        MunInSpaceLowSouthwestCrater* = #ScienceRefactor_bd_surveillance_MunInSpaceLowSouthwestCrater_00 // Just another impact crater, located in the southwest.
        MunInSpaceLowFarsideCrater* = #ScienceRefactor_bd_surveillance_MunInSpaceLowFarsideCrater_00 // You reflect on how you’re the first kerbal to see this part of the Mun.
        MunInSpaceLowTwinCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowTwinCraters_00 // Despite their similarity, these craters may have been created millions of years apart
        MunInSpaceLowEastFarsideCrater* = #ScienceRefactor_bd_surveillance_MunInSpaceLowEastFarsideCrater_00 // The crater is nicely framed by Kerbin rising over the horizon.
        MunInSpaceLowPolarCrater* = #ScienceRefactor_bd_surveillance_MunInSpaceLowPolarCrater_00 // Unlike the rest of the Mun’s craters, this one is far from the equator.
        MunInSpaceLowPoles* = #ScienceRefactor_bd_surveillance_MunInSpaceLowPoles_00 // Not much different from the rest of the mun, except that some parts of the polar region receive sunlight almost year round
        MunInSpaceLowPolarLowlands* = #ScienceRefactor_bd_surveillance_MunInSpaceLowPolarLowlands_00 // Lower areas near the poles might contain water ice where craters are kept in eternal darkness. Or not. Its not like you can see anything in them.
        MunInSpaceLow* = #ScienceRefactor_bd_surveillance_MunInSpaceLow_00 // Closer to the moon now, you see that craters have ravaged the surface. But does this image show any evidence of enemy mun bases?

        MinmusInSpaceLow* = #ScienceRefactor_bd_surveillance_MinmusInSpaceLow_00 // Minmus reveals varying terrain. High plateaus stretch for kilometres and the plains below them stretch even farther.
        MinmusInSpaceHigh* = #ScienceRefactor_bd_surveillance_MinmusInSpaceHigh_00 // From so far away, Minmus resembles a small scoop of mint ice cream...

        MohoInSpaceLow* = #ScienceRefactor_bd_surveillance_MohoInSpaceLow_00 // Craters become clear on Moho's surface. With immense detail, the craters have craters. This reminds you that you are too close for comfort...
        MohoInSpaceHigh* = #ScienceRefactor_bd_surveillance_MohoInSpaceHigh_00 // Moho floats far away, punished with craters. You can almost see the heat of the home star, Kerbol...

        EveInSpaceLow* = #ScienceRefactor_bd_surveillance_EveInSpaceLow_00 // Eve greets you with great delight as you swoop past, revealing how vast her Explodium Oceans are. You now want a grape popsicle...
        EveInSpaceHigh* = #ScienceRefactor_bd_surveillance_EveInSpaceHigh_00 // Eve shimmers with its purple hue down below you. Or was it up? You can't remember...

        GillyInSpaceLow* = #ScienceRefactor_bd_surveillance_GillyInSpaceLow_00 // Gilly, a beige captured asteroid reveals very extreme terrain. A blur in the photo shows its fast rotation.
        GillyInSpaceHigh* = #ScienceRefactor_bd_surveillance_GillyInSpaceHigh_00 // Gilly barely resembles a dot in the photo.

        DunaInSpaceLow* = #ScienceRefactor_bd_surveillance_DunaInSpaceLow_00 // Duna has a vide variety of terrain, ranging from deep chasms, to tall mountain ranges, and plains. Its ice caps are large and dominant of the poles.
        DunaInSpaceHigh* = #ScienceRefactor_bd_surveillance_DunaInSpaceHigh_00 // The pale orange dot resembles a ball or rust, or a red velvet cupcake...

        IkeInSpaceLow* = #ScienceRefactor_bd_surveillance_IkeInSpaceLow_00 // Ike shows its weathered terrain quite clearly. Mountain ranges dominate the surface while the plains come in dark, large patches.
        IkeInSpaceHigh* = #ScienceRefactor_bd_surveillance_IkeInSpaceHigh_00 // The rock we call Ike is massive. It appears to be quite dense from so far away. It also appears to have very rugged terrain, more so than your own moon.

        DresInSpaceLow* = #ScienceRefactor_bd_surveillance_DresInSpaceLow_00 // Closer to Dres now, you begin to collect evidence that she is not a planet, but she is a dwarf planet which once was a gargantuan rogue asteroid.
        DresInSpaceHigh* = #ScienceRefactor_bd_surveillance_DresInSpaceHigh_00 // Dres reminds you of the Mun. It holds quite uneven terrain with a grey hue.

        JoolInSpaceLow* = #ScienceRefactor_bd_surveillance_JoolInSpaceLow_00 // The green hue of Jool dominates the photo with great immensity.
        JoolInSpaceHigh* = #ScienceRefactor_bd_surveillance_JoolInSpaceHigh_00 // Jool's many moons are seen fantastically before her like a ballet of crumbs around that key lime cake you just devoured.

        LaytheInSpaceLow* = #ScienceRefactor_bd_surveillance_LaytheInSpaceLow_00 // Laythe has islands, water, and an atmosphere. You wouldn't be suprised if we found microkerbals here...
        LaytheInSpaceHigh* = #ScienceRefactor_bd_surveillance_LaytheInSpaceHigh_00 // From here, Laythe looks like a pale blue marble.

        VallInSpaceLow* = #ScienceRefactor_bd_surveillance_VallInSpaceLow_00 // Vall holds blue plains and lighter blue mountains ranges that snake around the planet's surface in every which way.
        VallInSpaceHigh* = #ScienceRefactor_bd_surveillance_VallInSpaceHigh_00 // Vall stands valiant, far away, as a pale blue dot.

        TyloInSpaceLow* = #ScienceRefactor_bd_surveillance_TyloInSpaceLow_00 // Tylo is humongous. It is a massive rock the size of Kerbin. The speckles turn out to be tens of thousands of craters. Tylo reveals a highly beaten surface like the Mun. The scientists in the lab infer that Tylo does indeed have trace amounts of cobalt.
        TyloInSpaceHigh* = #ScienceRefactor_bd_surveillance_TyloInSpaceHigh_00 // Tylo, from so far out, appears to be speckled. Why didn't we name it Spot?

        BopInSpaceLow* = #ScienceRefactor_bd_surveillance_BopInSpaceLow_00 // Bop appears to reveal a crater with a white rim, which perhaps, could be evidence of a young captured Bop in a young Joolian system.
        BopInSpaceHigh* = #ScienceRefactor_bd_surveillance_BopInSpaceHigh_00 // Bop seems to be a brown captured asteroid not unlike Gilly. Perhaps they are related?

        PolInSpaceLow* = #ScienceRefactor_bd_surveillance_PolInSpaceLow_00 // Pol seems unforgiving. Like her sister Bop, she seems to be a captured asteroid. The rough, jagged, and derranged terrain make you think twice about landing.
        PolInSpaceHigh* = #ScienceRefactor_bd_surveillance_PolInSpaceHigh_00 // Pol, the speck across the way, reminds you of a pollen grain.

        EelooInSpaceLow* = #ScienceRefactor_bd_surveillance_EelooInSpaceLow_00 // Eeloo shows its true self as you approach, revealing her ice canyons and chasms.
        EelooInSpaceHigh* = #ScienceRefactor_bd_surveillance_EelooInSpaceHigh_00 // Eeloo appears to be very icy. It's spent too long this far away from Kerbol.

        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowGrasslands_00 // The grassland plains are the most 'alive' part of Earth. The cities, the lush green grass, the farmland, and the industry. This is home.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowGrasslands_01 // You really can see your house from up here! Oh, there's your annoying neighbor.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowGrasslands_02 // Observed farmland. Crop yields look up to 10 percent higher than last year.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowGrasslands_03 // Mapped some enemy roads. Should be useful if we ever go on an offensive.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowGrasslands_04 // Found some stray kogs around Woomerang. Maybe they can be used as test subjects.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowGrasslands_05 // This part of the grasslands is exactly that. Grassy. There are some small farms here, seems like their crop was recently harvested.
        EarthInSpaceLowShores* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowShores_00 // The shallow waters near the coast are teeming with sea life. You can see schools of different fish, some koral, and seaweed.
        EarthInSpaceLowShores* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowShores_01 // You can see the water from the rivers merge into the sea. You can see the cloudy dark blobs on some of those rivers.
        EarthInSpaceLowMountains* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowMountains_00 // Spotted what looks to be an observatory complex on a mountaintop. Its dome is closed for now.
        EarthInSpaceLowMountains* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowMountains_01 // Found a group of climbers. They seem to be surveying the rocks. Grade: mostly harmless.
        EarthInSpaceLowMountains* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowMountains_02 // Nothing of interest to national defense, just barren rock, but the fact that we can get to places where even the mountains look small is a testament to the accomplishments of society.
        EarthInSpaceLowSavannah* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowSavannah_00 // The nature, the farms, the rolling hills. You can see the plants growing.
        EarthInSpaceLowForest* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowForest_00 // Snapped photo of a kerbal with a largish telescope, pointing directly at the satellite. Amateur astronomer, probably. But why is he still looking up after dawn?
        EarthInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowDesert_01 // The desert looks hostile, but there are flourishing cities and settlements dotted across it, a reminder that anything can be done with enough will, time, and resources. The third, the desert has plenty.
        EarthInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowDesert_02 // Found some nomads on kamels, resting by an oasis. Not a threat.
        EarthInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowDesert_03 // Staring at what seems to be a mass of granular silicon dioxide. Are you sure you want to waste surveillance-grade film on this?
        EarthInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowDesert_04 // Spotted enemy rocket test! Fortunately for us, it failed just under a minute after liftoff.
        EarthInSpaceLowWater* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowWater_00 // The boats and ships crossing Earth's waters seem mostly benign.
        EarthInSpaceLowWater* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowWater_01 // You can see the containers on the freighters, kerbals on ferries and the aircraft of a carrier.
        EarthInSpaceLowWater* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowWater_02 // You spot a lone boat in the middle of the ocean. What is it doing?
        EarthInSpaceLowWater* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowWater_03 // Snapped high-detail photos of the latest algae bloom. Its spread can be accurately determined from this image.
        EarthInSpaceLowWater* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowWater_04 // All is calm this time, just a light breeze over the ocean and fish swimming underneath.
        EarthInSpaceLowTundra* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowTundra_00 // You photographed a silo. Probably nuclear ICBM. You've also captured some tracks left behind by lorries servicing the silo.
        EarthInSpaceLowTundra* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowTundra_01 // Trees, a bear, and some snow. Normal tundra stuff.
        EarthInSpaceLowTundra* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowTundra_02 // Just some rocks and a tent.
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_00 // You get a very washed-out, fuzzy image from the bright white ice, so the high resolution image is utterly worthless here.
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_01 // Ice, ice, and more ice. And what's that? A 50-kerb Krussian outpost? Probably harmless. 
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_02 // Big glacier splitting off. Better put on some navigation warnings and inform the KOAA.
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_03 // You see some polar bears and seals. One seems to be eating the other.
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_04 // Captured sub-meter resolution image of... ice. And some flocks of birds. And their kuano. At least you know where the ice is cracking.
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_05 // Spotted the latest polar expedition. They seem to be all fine, but they got their snowcat stuck a few times.
        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_EarthInSpaceLowIceCaps_06 // Big crack spotted and... ice falling! At least the penguins are safe.
        EarthInSpaceLow* = #ScienceRefactor_bd_surveillance_EarthInSpaceLow_00 // Collected very high-res images. You can discern cars, roads, rivers and even potholes from space!
        EarthInSpaceLow* = #ScienceRefactor_bd_surveillance_EarthInSpaceLow_01 // Earth looks beautiful from up here. But we're not interested in that. we're here for spying - oh, sorry, scratch that - science!
        EarthInSpaceLow* = #ScienceRefactor_bd_surveillance_EarthInSpaceLow_02 // Captured some interesting details on the planet's surface.
        
        MoonInSpaceLow* = #ScienceRefactor_bd_surveillance_MoonInSpaceLow_00 // The gray, cratered surface in this image can make one philosophical about the uniqueness of their existence.
        MoonInSpaceLow* = #ScienceRefactor_bd_surveillance_MoonInSpaceLow_01 // You see some rocks. Or were those rovers? or bases? At this distance, it's hard to tell. But you can tell that they were big. can see anything in them.
        MoonInSpaceLow* = #ScienceRefactor_bd_surveillance_MoonInSpaceLow_02 // Closer to the Moon now, you see that craters have ravaged the surface. But does this image show any evidence of enemy Moon bases?
        MoonInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMidlands_00 // The possibly igneous small flats are peppered by small craters and rocks.
        MoonInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMidlands_01 // Light-colored ejecta from some craters is visible and not dark igneous rock, so we can now absolutely, definitively prove that even the smallest ones are impact craters.
        MoonInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMidlands_02 // There are plenty of rocks here, at least we think those are rocks. At  this distance it's hard to tell if they're natural of artificial, like a rover or something.
        MoonInSpaceLowHighlands* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowHighlands_00 // The highlands have a slightly lighter appearance, with the frequency of craters-in-craters suggesting that these may contain some of the oldest rock in the Earth system. Their overall shape is also reminiscent of the hills and mountains of Earth.
        MoonInSpaceLowMajorCraters* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMajorCraters_00 // The large craters, seemingly eroded by aeons of meteorite impacts and solar wind, have plenty of evidence to suggest their old age, and by extension the age of the rest of the region.
        MoonInSpaceLowMareFrigoris* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareFrigoris_00 // The darker volcanic plains, the mountains, hills, and valleys all remind you of Earth.
        MoonInSpaceLowMareNectaris* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareNectaris_00 // The darker volcanic plains, the mountains, hills, and valleys all remind you of Earth.
        MoonInSpaceLowMareCrisium* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareCrisium_00 // Observations of details in the visual scan may indicate that this basin was formed by lava welling up after a large asteroid impact.
        MoonInSpaceLowOceanusProcellarum* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowOceanusProcellarum_00 // Observations of details in the visual scan may indicate that this basin was formed by lava welling up after a large asteroid impact.
        MoonInSpaceLowMareOrientale* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareOrientale_00 // Observations of details in the visual scan may indicate that this mare was formed by lava welling up after a large asteroid impact.
        MoonInSpaceLowMareSerenitatis* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareSerenitatis_00 // Observations of details in the visual scan may indicate that this mare was formed by lava welling up after a large asteroid impact.
        MoonInSpaceLowMareTranquillitatis* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareTranquillitatis_00 // Observations show that this region appears to be quite... tranquil.
        MoonInSpaceLowMareImbrium* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareImbrium_00 // Despite its prominence when viewed from the surface of Kerbin, these relatively close-up observations confirm that this is in fact just a crater, nothing special. Early astronomers thought that this was a dried-up lake.
        MoonInSpaceLowMareFecunditatis* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowMareFecunditatis_00 // This crater seems eroded, almost like its walls unevenly crumbled after it was formed. Beware of potentially soft rock.
        MoonInSpaceLowAitkenBasin* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowAitkenBasin_00 // Despite never being seen from above is such detail before, it feels quite familiar. Earth looms just over the horizon, sitting there, a reminder of the Moon's tidal lock and the incoming far side, never seen by Kerbal eyes before.
        MoonInSpaceLowAitkenBasin* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowAitkenBasin_01 // This is a large crater, the largest on the Moon. Slight glimmers of light in the shadow of the crater rim may signify a deposit of water ice here! Otherwise, you can see rocks. We're sure none of those glimmers were missions on the Mun, neither ours nor the Krussians. 
        MoonInSpaceLowNorthPole* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowNorthPole_00 // The polar regions. Not bright and shiny as Earth's poles, which means that while these are quite boring, our cameras can reveal more detail in them than on Earth's poles. Some of the higher areas receive sunlight year-round, but they shadow the polar lowlands where in some places it is permanently dark. The temperature gradient on the surface would be interesting, but this is an optical device. Not an infrared one.
        MoonInSpaceLowSouthPole* = #ScienceRefactor_bd_surveillance_MoonInSpaceLowSouthPole_00 // The permanently shadowed craters may contain water ice, possibly in high enough concentration to be harvested in the future. The Sun is permanently on the horizon, and in the lower parts may have never been seen in the history of the Moon. Great hiding place.
            
        MarsInSpaceLow* = #ScienceRefactor_bd_surveillance_MarsInSpaceLow_00 // Mars has a vide variety of terrain, ranging from deep chasms, to tall mountain ranges, and plains. Its ice caps are small and slowly disappearing from the poles.
        MarsInSpaceHigh* = #ScienceRefactor_bd_surveillance_MarsInSpaceHigh_00 // The pale red dot resembles a ball or rust, or a red velvet cupcake...
        
        VenusInSpaceLow* = #ScienceRefactor_bd_surveillance_VenusInSpaceLow_00 // Venus greets you with great delight as you swoop past, with how bright and reflective its clouds are. Too bad you can't see very well beyond them with this camera.
        VenusInSpaceHigh* = #ScienceRefactor_bd_surveillance_VenusInSpaceHigh_00 // The Morning Star shimmers down below you. Or was it up? You can't remember...
