		NodensSrfSplashedSaltySeas* = #GEPscience_bd_camera_NodensSrfSplashedSaltySeas_00 // The camera records spray spots on the lens within seconds. You begin a scientific study titled “Why Didn’t We Pack Wipers?”
		NodensSrfSplashedSaltySeas* = #GEPscience_bd_camera_NodensSrfSplashedSaltySeas_01 // The sea looks almost friendly from this angle, which is exactly the problem. You keep the hatch closed and the camera running.
