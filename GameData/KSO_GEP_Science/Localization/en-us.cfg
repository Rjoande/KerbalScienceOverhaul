        #GEPscience_bd_SiteSurvey_EponaSrfLandedVolcanoes_00 = Dark vents and fractured ground suggest the planet still has opinions inside its frozen shell. The site is flagged for unmanned operations and very fast retreats.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedPoles_00 = The polar glare is faintly pink and thoroughly misleading, turning gentle slopes into optical pranks. You approve one conservative site and write: “anchors, beacons, patience.”

        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTropicalLowlands_00 = The name says “tropical,” the reality says “airless and sharp-edged.” The lowlands look smooth, but the radiation alarms keep insisting we don’t get comfortable.
