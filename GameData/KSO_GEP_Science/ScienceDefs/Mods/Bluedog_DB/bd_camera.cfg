		NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_camera_NodensInSpaceLowTemperateLowlands_00 // Low orbit imagery shows mottled terrain under a thick atmosphere that refuses to be transparent. You take more photos, because persistence is cheaper than guessing.
