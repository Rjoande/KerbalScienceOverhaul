        #CSS_Aebestach_evaReport_Dres_01 = Poli di Dres. Calotta di ghiaccio. Freddo.
        #CSS_Aebestach_evaReport_Dres_02 = Pianure di Dres. Passeggiata grigia.
        #CSS_Aebestach_evaReport_Dres_03 = Dorsali di Dres. Bordi affilati.
        #CSS_Aebestach_evaReport_Dres_04 = Colline di Dres. Grigio più alto.
        #CSS_Aebestach_evaReport_Dres_05 = Crateri da impatto di Dres. Storia di impatti.
        #CSS_Aebestach_evaReport_Dres_06 = Poli di Dres in orbita bassa. Pianeta nano in basso.
