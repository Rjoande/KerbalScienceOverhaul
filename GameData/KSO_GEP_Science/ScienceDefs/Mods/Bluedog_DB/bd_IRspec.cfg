@EXPERIMENT_DEFINITION:HAS[#id[bd_IRspec]]
{
    %RESULTS
    {
		GrannusInSpaceHigh* = #GEPscience_bd_IRspec_GrannusInSpaceHigh_00 // The spectrometer logs Grannus’ steady, dim-red warmth until a flare spikes the readout and the instrument politely suggests safe-mode.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowNorthPolarZone_00 // Infrared bands show cooler regions wrapped around the pole, with hotter strands braided through them like someone stirred the star with a spoon.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowNorthSubpolarZone_00 // The scan finds a mottled patchwork of warm and less-warm glow; you label it “not on fire yet” and transmit it into the long dark.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowNorthTemperateZone_00 // Thermal features drift and shear across the view faster than your confidence in the calibration constants.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowNorthTropicZone_00 // IR spectra hint at layered temperatures that don’t match any tidy model; Mission Control’s reply arrives after you’ve already worried about it twice.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowEquatorialZone_00 // The equatorial glow ripples with broad, shifting peaks—like a campfire the size of a system trying to pretend it’s calm.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowSouthTropicZone_00 // You catch a sudden warm plume in the data and instinctively check if it was your snacks. It was not your snacks.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowSouthTemperateZone_00 // The spectrometer maps subtle gradients that make “day” and “night” feel like meaningless words this far from home.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowSouthSubpolarZone_00 // A faint thermal asymmetry shows up across the limb; the scientists back home will argue about it by the time your packet arrives.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_IRspec_GrannusInSpaceLowSouthPolarZone_00 // The polar region reads strangely structured—cooler lanes beside hotter arcs—like the star is drawing diagrams you can’t quite decode.

        TaranisInSpaceHigh* = #GEPscience_bd_IRspec_TaranisInSpaceHigh_00 // From high above, Taranis is a two-tone IR target: one hemisphere blindingly hot, the other a cold void that makes your clock feel wrong.
        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_IRspec_TaranisInSpaceLowMagmaSea_00 // The spectrum is dominated by intense thermal emission; you note “liquid rock confirmed” and hope nobody asks for a sample.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_IRspec_TaranisInSpaceLowMagmaShores_00 // Along the glowing edge, the IR signature shifts abruptly from molten to crust—like the planet is trying to wear a thin hat.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_IRspec_TaranisInSpaceLowScorchedLowlands_00 // The scan flags fresh, heat-soaked surfaces with absorption features that suggest minerals cooked well past “done.”
        TaranisInSpaceLowMidlands* = #GEPscience_bd_IRspec_TaranisInSpaceLowMidlands_00 // Cooler islands in the data imply thicker crustal plates; you wonder how long they stay intact before the next baking cycle.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_IRspec_TaranisInSpaceLowHighlands_00 // The high terrain radiates less heat than expected, then spikes as it rotates into the relentless red sun—your plot looks like it’s gasping.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_IRspec_TaranisInSpaceLowDarkSideMidlands_00 // On the dark side, the spectrometer hunts for warmth and mostly finds none; even the instrument seems to hesitate before reporting.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_IRspec_TaranisInSpaceLowDarkSideHighlands_00 // Frozen ridges glow faintly in IR, just enough to prove they exist; it’s the quietest dataset you’ve ever recorded.
        TaranisInSpaceLowPoles* = #GEPscience_bd_IRspec_TaranisInSpaceLowPoles_00 // The polar scan shows extreme contrast with razor-thin transition zones; “dawn” here is more of a sharp line than a time of day.

        ToutatisInSpaceHigh* = #GEPscience_bd_IRspec_ToutatisInSpaceHigh_00 // High over Toutatis, the IR spectra pick up a thin atmospheric fingerprint layered over a hot/cold world that feels like it forgot how to rotate normally.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_IRspec_ToutatisInSpaceLowSunnyLowlands_00 // The sunlit lowlands blaze in infrared; the surface looks thermally soft, like it would happily melt your landing legs for you.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_IRspec_ToutatisInSpaceLowSunnyHighlands_00 // Elevated terrain runs slightly cooler, but not enough to be comforting; the absorption bands wobble as the air thins and thickens below.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_IRspec_ToutatisInSpaceLowTransitionalLowlands_00 // Near the comfort-zone boundary, IR data shows steep gradients and patchy retention—your best candidate for “not instantly terrible.”
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_IRspec_ToutatisInSpaceLowTransitionalHighlands_00 // The transition highlands display crisp spectral lines and fast-changing temperatures, as if the ground can’t decide which side it belongs to.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_IRspec_ToutatisInSpaceLowDarkSideLowlands_00 // On the dark side, the planet becomes a cold silhouette with only faint thermal leaks; you feel the distance to home in every quiet second.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_IRspec_ToutatisInSpaceLowDarkSideHighlands_00 // The high dark terrain reads colder still, with occasional warm spots that might be geology—or just your instrument begging for a radiator.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_IRspec_ToutatisInSpaceLowSoutheasternMountains_00 // The mountains show mixed mineral signatures and sharp thermal shadows; you tag the file “interesting, dangerous, pretty.”
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_IRspec_ToutatisInSpaceLowWesternMountains_00 // IR maps reveal long cool ridgelines beside sun-warmed faces; it’s the closest thing to a sunrise you’ve had in weeks of signal delay.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_IRspec_ToutatisInSpaceLowDarkSideMountains_00 // The dark mountains barely register, except for thin streaks of retained heat that make the landscape look like a ghost in your spectrogram.

        NodensInSpaceHigh* = #GEPscience_bd_IRspec_NodensInSpaceHigh_00 // From high orbit, Nodens reads as a cold world with thin warm seams; the data arrives home late enough to feel like a postcard from nowhere.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_IRspec_NodensInSpaceLowSaltySeas_00 // The IR spectrum over the salty seas shows sluggish heat release and strange absorption bands; you briefly suspect the ocean is “glowing back.”
        NodensInSpaceLowFreshWater* = #GEPscience_bd_IRspec_NodensInSpaceLowFreshWater_00 // Over the fresh water, the thermal signature is smoother and less briny; it still looks nothing like home under this dim red sun.
        NodensInSpaceLowShores* = #GEPscience_bd_IRspec_NodensInSpaceLowShores_00 // The shoreline pixels flicker between warm rock and cold water in neat bands, like the planet is graphing its own unease.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_NodensInSpaceLowTropicalLowlands_00 // The lowlands run warm and humid in the infrared, with spectral hints of weathering you can’t quite name from this far away.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_NodensInSpaceLowTemperateLowlands_00 // Temperate lowlands show steady, moderate emission—then a sudden spike that turns out to be your craft rolling into night, not a miracle.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_NodensInSpaceLowTropicalMidlands_00 // The midlands give crisp mineral features and a patchy heat map; the red sun makes every “afternoon” feel suspiciously short.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_NodensInSpaceLowTemperateMidlands_00 // IR bands suggest mixed terrain with uneven moisture retention; Mission Control asks for repeats, and you laugh at the light-speed delay.
        NodensInSpaceLowHighlands* = #GEPscience_bd_IRspec_NodensInSpaceLowHighlands_00 // Highlands radiate colder and cleaner, with sharper absorption lines that make the rock look very sure of itself.
        NodensInSpaceLowTundra* = #GEPscience_bd_IRspec_NodensInSpaceLowTundra_00 // The tundra barely registers warmth at all; the spectrometer reports “cold,” and you add “emotionally” in the notes.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_IRspec_NodensInSpaceLowIceCaps_00 // The ice caps reflect and emit in a way that screams “volatile ices,” but the spectral ratios are off just enough to keep you awake.

        BelisamaInSpaceHigh* = #GEPscience_bd_IRspec_BelisamaInSpaceHigh_00 // Belisama’s infrared glow is muted and distant, a quiet target under a dim red sun that makes your internal clock feel miscalibrated.
        BelisamaInSpaceLowFlats* = #GEPscience_bd_IRspec_BelisamaInSpaceLowFlats_00 // Over the flats, the spectrum shows broad mineral bands and fast thermal cycling; the surface seems to heat up just to cool down again out of spite.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_BelisamaInSpaceLowTropicalLowlands_00 // The tropical lowlands carry a warmer baseline with faint absorption features suggesting dusty, sun-baked chemistry you don’t have a label for yet.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_BelisamaInSpaceLowTemperateLowlands_00 // Temperate lowlands show smoother gradients and less extreme peaks; it’s the closest thing to “normal” you’ve measured out here, which is unsettling.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_BelisamaInSpaceLowTropicalMidlands_00 // The midlands’ IR signature hints at layered deposits—like someone stacked different worlds on top of each other and called it a day.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_BelisamaInSpaceLowTemperateMidlands_00 // Infrared mapping finds alternating warm ridges and cool basins; your antenna squints at home, waiting for permission you already know you need.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_IRspec_BelisamaInSpaceLowHighlands_00 // The highlands come back cold and spectrally sharp, with clean mineral fingerprints that make the terrain feel crisp, dry, and very far away.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_IRspec_BelisamaInSpaceLowPoles_00 // The poles sit near the noise floor, but subtle bands still betray exotic ices; “night” here is just a longer kind of silence.

        SucellusInSpaceHigh* = #GEPscience_bd_IRspec_SucellusInSpaceHigh_00 // From high above, Sucellus is mostly “cold rock” with a few stubborn infrared bumps that hint at metal-rich patches and a lot of radiation for something so small.
        SucellusInSpaceLowBasins* = #GEPscience_bd_IRspec_SucellusInSpaceLowBasins_00 // The basins hold onto the night like a secret; the spectrum suggests fine dust over harder material, with just enough odd absorption to make the lab techs squint.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_IRspec_SucellusInSpaceLowLowlands_00 // Lowlands show broad mineral bands and sharp temperature swings—sunlit when the dim red glow says so, frozen again before you can finish labeling the file.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_SucellusInSpaceLowTropicalMidlands_00 // “Tropical” feels like a joke out here, but the IR lines do shift—different grain sizes, different thermal inertia, same far-from-home quiet.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_SucellusInSpaceLowTemperateMidlands_00 // The spectrometer maps layered signatures that look like old flows or impacts; the reply from home arrives long after you’ve rechecked the calibration twice.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_IRspec_SucellusInSpaceLowHighlands_00 // Highlands come back spectrally crisp and colder, with cleaner mineral fingerprints that make the terrain look sternly unimpressed by your mission patch.
        SucellusInSpaceLowPoles* = #GEPscience_bd_IRspec_SucellusInSpaceLowPoles_00 // Near the poles, faint features suggest volatile frost mixed into darker substrate—cold enough that the instrument’s “warm-up” routine feels optimistic.

        CaireenInSpaceHigh* = #GEPscience_bd_IRspec_CaireenInSpaceHigh_00 // Caireen’s infrared signal is a tiny, stubborn flicker beside its parent; the spectrum reads like captured-asteroid geology with no atmosphere to hide the truth.
        CaireenInSpaceLowLowlands* = #GEPscience_bd_IRspec_CaireenInSpaceLowLowlands_00 // The lowlands swing between sun-baked and deep-freeze; IR bands point to dusty regolith with a few unusual absorptions that don’t match your “known rocks” folder.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_IRspec_CaireenInSpaceLowMidlands_00 // Midlands show slightly higher thermal inertia, as if the rubble is packed tighter here—either that or Caireen is quietly judging your resolution settings.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_IRspec_CaireenInSpaceLowHighlands_00 // The highlands run colder and sharper-lined, with mineral features that look fresh and exposed—like a surface that never got the memo about “weathering.”
        CaireenInSpaceLowPoles* = #GEPscience_bd_IRspec_CaireenInSpaceLowPoles_00 // Polar scans flirt with the noise floor, but a thin spectral wiggle suggests patchy frost; you mark it as “maybe ice, definitely distant.”

        SironaInSpaceHigh* = #GEPscience_bd_IRspec_SironaInSpaceHigh_00 // At high orbit, the spectrometer locks onto methane absorption and broad thermal emission—Sirona’s heat is real, even under a dim red sun that barely feels like “day.”
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_IRspec_SironaInSpaceLowDarkTropicalBands_00 // Dark tropical bands show deeper, warmer emission beneath thicker cloud decks; the data looks like a slow, heavy breathing from a planet-sized engine.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_IRspec_SironaInSpaceLowLightTropicalBands_00 // Light tropical bands reflect more and radiate less, with cleaner spectral features—bright, alien, and still not the kind of “sunny” you’re used to.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_IRspec_SironaInSpaceLowDarkTemperateBands_00 // In the dark temperate bands, IR lines broaden and shift as cloud tops churn; you briefly wonder if your spectrometer is getting motion sickness.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_IRspec_SironaInSpaceLowLightTemperateBands_00 // Light temperate bands read cooler and higher, with tighter methane features; you file it under “pretty, hostile, and very far away.”
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_IRspec_SironaInSpaceLowDarkPolarBands_00 // The dark polar bands carry extra heat signatures that don’t fit simple sunlight—auroral and magnetospheric energy, delivered with extreme enthusiasm.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_IRspec_SironaInSpaceLowLightPolarBands_00 // Light polar bands show colder tops but noisy edges, as charged particles pepper the upper atmosphere; the instrument logs it politely while you grip the handrail.

        AirmedInSpaceHigh* = #GEPscience_bd_IRspec_AirmedInSpaceHigh_00 // Airmed’s infrared signature flips between two distinct thermal “personalities,” while Sirona fills half the sky and the red sun barely counts as daylight.
        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowTropicalLowlands_00 // The lowlands radiate unevenly, as if the battered surface can’t decide whether it’s rock, dust, or old bruises.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowTemperateLowlands_00 // Temperature curves rise and fall too quickly for comfort; you log “fast cooling” and “long wait for confirmation.”
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowTropicalMidlands_00 // Infrared bands sharpen over the midlands, hinting at different grain sizes—like someone sprinkled a new layer on an old scar.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowTemperateMidlands_00 // The spectrometer catches subtle absorption features that don’t match your tidy charts; the red sun makes every assumption feel suspicious.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowHighlands_00 // Highlands come back colder and cleaner-lined, as if the peaks have been sandblasted by time and silence.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowDarkenedLowlands_00 // Over the darkened terrain, heat leaks out in thin streaks; the readout looks like a quiet confession from the night side.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowDarkenedMidlands_00 // The spectrum sits near the noise floor, but persistent bumps suggest exposed material that never quite warms up out here.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_IRspec_AirmedInSpaceLowDarkenedHighlands_00 // Cold, sharp mineral fingerprints dominate; even your instrument seems to whisper its results.
        AirmedInSpaceLowPoles* = #GEPscience_bd_IRspec_AirmedInSpaceLowPoles_00 // Polar scans show low temperatures and stubborn reflective features—possible frosts that only exist because the sun forgets to try.

        BorvoInSpaceHigh* = #GEPscience_bd_IRspec_BorvoInSpaceHigh_00 // From high orbit, Borvo glows with muted warmth under hazy absorption bands; the data feels like it’s traveling through air and through years.
        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_IRspec_BorvoInSpaceLowTropicalCraquelure_00 // The cracked regions show rapid thermal cycling and jagged spectral edges, like the ground shattered from trying to keep a schedule.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_IRspec_BorvoInSpaceLowTemperateCraquelure_00 // Cooler cracks hold onto their heat differently than the flats; you label it “stress patterns” and “maybe also stress in staff.”
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_BorvoInSpaceLowTropicalLowlands_00 // Broad infrared features hint at dusty coatings over something colder beneath—Borvo still won’t tell you if it’s rock or ice.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_BorvoInSpaceLowTemperateLowlands_00 // The lowlands radiate softly through atmospheric haze; your best-fit model is “complicated, with a side of more complicated.”
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_BorvoInSpaceLowTropicalMidlands_00 // Absorption bands deepen and widen, suggesting thicker air or more aerosol—either way, the spectrum looks like it’s wearing a blanket.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_BorvoInSpaceLowTemperateMidlands_00 // Thermal inertia climbs slightly here; Borvo’s surface acts like it’s holding secrets until the next packet reaches home.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_IRspec_BorvoInSpaceLowHighlands_00 // Highlands appear cooler with cleaner mineral lines poking through the haze, as if the thin upper air is doing you a small favor.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_IRspec_BorvoInSpaceLowMajorCraters_00 // Crater floors retain heat longer than the rims, producing tidy infrared rings—finally, something that behaves predictably.
        BorvoInSpaceLowPoles* = #GEPscience_bd_IRspec_BorvoInSpaceLowPoles_00 // Polar regions dim toward the instrument’s limits; faint signatures suggest cold deposits that don’t care about your definitions of “day.”

        DamonaInSpaceHigh* = #GEPscience_bd_IRspec_DamonaInSpaceHigh_00 // Damona reads as a small, gray radiator with one standout warm/cool asymmetry—an old violence written in infrared.
        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_DamonaInSpaceLowTropicalLowlands_00 // The lowlands show dusty, fast-cooling behavior; the spectrum is blunt and honest, like a barren world with nothing to hide.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_DamonaInSpaceLowTemperateLowlands_00 // Subtle absorption features shift with angle and shadow; you suspect regolith depth changes more than any atmosphere.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_DamonaInSpaceLowTropicalMidlands_00 // The midlands present mixed thermal inertia, as if rubble and bedrock are arguing over who gets to radiate.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_DamonaInSpaceLowTemperateMidlands_00 // Cooler midlands sharpen the mineral fingerprints; you can almost feel the emptiness between you and the lab back home.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_IRspec_DamonaInSpaceLowHighlands_00 // Highlands come back cold and crisp-lined, a pockmarked surface that seems permanently stuck in “after impact.”
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_IRspec_DamonaInSpaceLowImpactBasin_00 // The big basin holds heat in its sheltered interior, producing a strong, clean signal that practically shouts “yes, something happened here.”
        DamonaInSpaceLowPoles* = #GEPscience_bd_IRspec_DamonaInSpaceLowPoles_00 // Polar scans flirt with silence, but persistent bright/low-emission cues hint at patchy frosts surviving under the dim red sun.

        EponaInSpaceHigh* = #GEPscience_bd_IRspec_EponaInSpaceHigh_00 // Epona’s faint IR glow sits under a dim red sun; the spectrum teases methane traces and a suspiciously warm baseline that takes ages to report home.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_EponaInSpaceLowTropicalLowlands_00 // The tropical lowlands look like cold terrain wearing a warmer mask—broad IR bands suggest dusty ice over something that holds heat longer than it should.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_EponaInSpaceLowTemperateLowlands_00 // Temperate lowlands radiate gently and evenly; the thermal inertia hints at thick, insulating frost rather than bare rock.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_IRspec_EponaInSpaceLowTropicalUplands_00 // Uplands show sharper mineral fingerprints and faster cooling, as if the surface here is cleaner ice with less insulating fluff.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_IRspec_EponaInSpaceLowTemperateUplands_00 // The scan finds layered absorption features that fit mixed ices; you label the plot “complicated” and send it on its slow trip outward.
        EponaInSpaceLowHighlands* = #GEPscience_bd_IRspec_EponaInSpaceLowHighlands_00 // Highlands come back cold and crisp-lined, with less atmospheric haze in the signal—finally, a dataset that behaves for at least one orbit.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_IRspec_EponaInSpaceLowGrandPeaks_00 // Grand Peaks cast long thermal shadows; their sunlit faces spike in IR, then drop off so fast your timeline looks like it tripped.
        EponaInSpaceLowCraters* = #GEPscience_bd_IRspec_EponaInSpaceLowCraters_00 // Craters trap cold like a savings account; the spectrometer picks out darker floors and faint volatile signatures hiding from the weak daylight.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_IRspec_EponaInSpaceLowVolcanoes_00 // Over the volcanoes, the spectrum shows anomalous warmth and unusual bands; either there’s activity below, or your instrument just got excited.
        EponaInSpaceLowPoles* = #GEPscience_bd_IRspec_EponaInSpaceLowPoles_00 // Polar scans sit near the noise floor, but persistent absorption suggests exotic frosts that survive because “noon” here is mostly a suggestion.

        RosmertaInSpaceHigh* = #GEPscience_bd_IRspec_RosmertaInSpaceHigh_00 // Rosmerta reads as a tiny, airless IR target—mostly cold rock with radiation noise sprinkled in like uninvited confetti.
        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_RosmertaInSpaceLowTropicalLowlands_00 // The lowlands swing hard between dim-sun warmth and deep night; the spectrum points to fine regolith over darker material.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_RosmertaInSpaceLowTemperateLowlands_00 // Thermal mapping shows patchy heat retention that matches shallow dust pockets; the moon looks lonely even in the data.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_RosmertaInSpaceLowTropicalMidlands_00 // Midlands show cleaner absorption lines and slightly higher thermal inertia—denser ground, fewer fluffy bits to fake warmth.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_RosmertaInSpaceLowTemperateMidlands_00 // The IR signature is blunt and airless: rock, dust, and a cold that doesn’t care how far you traveled.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_IRspec_RosmertaInSpaceLowHighlands_00 // Highlands come back colder with sharper mineral bands, like freshly exposed rock that never learned the concept of weather.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_IRspec_RosmertaInSpaceLowPoles_00 // At the poles, faint spectral wiggles hint at tiny frost deposits tucked into permanent shade; you promise to argue about it later, when the signal gets home.

        RAB-58EInSpaceHigh* = #GEPscience_bd_IRspec_RAB-58EInSpaceHigh_00 // From high orbit, RAB-58E is barely more than a cold pixel; its IR spectrum refuses to reveal whether it’s rock, ice, or both at once.
        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_IRspec_RAB-58EInSpaceLowLowlands_00 // Lowlands show low thermal inertia and broad bands consistent with dusty frost; “captured snowball?” gets a cautious maybe.
        RAB-58EInSpaceLowEasternHighlands* = #GEPscience_bd_IRspec_RAB-58EInSpaceLowEasternHighlands_00 // Eastern highlands cool quickly and show sharper mineral features—more rock in the mix, less insulation, and zero patience for your theories.
        RAB-58EInSpaceLowWesternHighlands* = #GEPscience_bd_IRspec_RAB-58EInSpaceLowWesternHighlands_00 // Western highlands have a slightly different IR slope, as if the surface grains changed mid-story; the comms delay means nobody can interrupt your guesswork.

        CernunnosInSpaceHigh* = #GEPscience_bd_IRspec_CernunnosInSpaceHigh_00 // Cernunnos glows faintly in infrared, an icy dwarf world so far out that even your sense of “day” arrives late.
        CernunnosInSpaceLowTropicalLowlands* = #GEPscience_bd_IRspec_CernunnosInSpaceLowTropicalLowlands_00 // Tropical lowlands show darker ice and smoother thermal curves, suggesting thick volatile deposits that slowly leak heat into the long night.
        CernunnosInSpaceLowTemperateLowlands* = #GEPscience_bd_IRspec_CernunnosInSpaceLowTemperateLowlands_00 // Temperate lowlands display mixed absorption bands—water ice, darker inclusions, and a hint of something more volatile than you’d like to breathe.
        CernunnosInSpaceLowTropicalMidlands* = #GEPscience_bd_IRspec_CernunnosInSpaceLowTropicalMidlands_00 // Midlands map as higher thermal inertia, as if compacted ice or buried rock is closer to the surface than the lowlands’ fluff.
        CernunnosInSpaceLowTemperateMidlands* = #GEPscience_bd_IRspec_CernunnosInSpaceLowTemperateMidlands_00 // The spectrometer catches subtle band shifts across the midlands, making you wonder if Cernunnos has neighbors—or just a very messy history.
        CernunnosInSpaceLowHighlands* = #GEPscience_bd_IRspec_CernunnosInSpaceLowHighlands_00 // Highlands return crisp mineral lines through a colder baseline; the terrain looks ancient, hard, and thoroughly uninterested in visitors.
        CernunnosInSpaceLowSouthPolarHills* = #GEPscience_bd_IRspec_CernunnosInSpaceLowSouthPolarHills_00 // South polar hills show persistent cold traps and faint volatile signatures; the red sun skims so low it barely counts as lighting.
        CernunnosInSpaceLowNorthPole* = #GEPscience_bd_IRspec_CernunnosInSpaceLowNorthPole_00 // The north pole is a near-silent IR target with occasional bright frost cues—like the planet is blinking slowly to prove it’s still there.
	}
}