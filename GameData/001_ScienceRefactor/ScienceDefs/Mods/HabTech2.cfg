// StockScienceRefactor — Wildcardize Stock Science Results
// Converts deterministic stock RESULTS into variant-enabled pools (*).
// This unlocks result alternation and full compatibility with CSS and extension packs.
// `default` entries are preserved without wildcard, per KSP fallback rules.
// No new science text is added; this patch refactors stock behavior only.

@EXPERIMENT_DEFINITION:HAS[#id[AMS]]
{
	@title = #ScienceRefactor_AMS_title // Alpha Magnetic Spectrometer Experiment
	!RESULTS {}
	RESULTS
	{
		default = #ScienceRefactor_AMS_default_00 // The spectrometer records numerous charged particle events. 
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[MCE]]
{
	@title = #ScienceRefactor_MCE_title // Multi-mission Consolidated Experiment Package
	!RESULTS {}
	RESULTS
	{
		default = #ScienceRefactor_MCE_default_00 // A multitude of scientific and engineering experiments are conducted. 
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[SEDA]]
{
	@title = #ScienceRefactor_SEDA_title // Space Environment Data Acquisition Experiment
	!RESULTS {}
	RESULTS
	{
		default = #ScienceRefactor_SEDA_default_00 // The device records data about the space environment. 
	}
}