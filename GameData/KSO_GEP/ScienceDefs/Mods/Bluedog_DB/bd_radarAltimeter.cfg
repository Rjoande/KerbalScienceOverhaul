        BorvoFlyingLowTropicalLowlands* = #GEPscience_bd_radarAltimeter_BorvoFlyingLowTropicalLowlands_00 // Smooth lowlands give strong echoes and steady altitude in Borvo’s thick air. The steadiness feels like the moon is holding you down.
        BorvoFlyingLowTemperateLowlands* = #GEPscience_bd_radarAltimeter_BorvoFlyingLowTemperateLowlands_00 // The radar paints broad, flat plains with occasional ridges like buried waves. The red sun makes the horizon feel closer than it should.
        BorvoFlyingLowTropicalMidlands* = #GEPscience_bd_radarAltimeter_BorvoFlyingLowTropicalMidlands_00 // Rolling uplifts show up as slow, repeating rises. It looks like dunes on a world that can’t decide if it’s dust or ice.
