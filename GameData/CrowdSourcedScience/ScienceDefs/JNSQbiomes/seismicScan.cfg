@EXPERIMENT_DEFINITION:HAS[#id[seismicScan]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedPolarIceCraters* = #CSS_seismicScan_MohoSrfLandedNorthernSinkholeRidge_00 // The sensor picks up anomalous vibrations from deep within the planet. You wonder what could be down there.
        MohoSrfLandedPolarIceCraters* = #CSS_seismicScan_MohoSrfLandedNorthernSinkhole_00 // Despite the tremendous heat of the sun, thermal expansion isn't causing any noteworthy movement.
        MohoSrfLandedLowlands* = #CSS_seismicScan_MohoSrfLandedCentralLowlands_00 // The meter shows the maximum amount of force needed to jiggle Jebediah's love-handles for a fortnight.
        MohoSrfLandedCraters* = #CSS_seismicScan_MohoSrfLandedMinorCraters_00 // The shaking of the needle reminds you how cold the dark side of this planet gets.
        
        EveSrfLandedPetrolLakes* = #CSS_seismicScan_EveSrfLandedCraterLake_00 // The large circular lake causes seismic waves to reverberate and echo around the sea.
        EveSrfLandedMountains* = #CSS_seismicScan_EveSrfLandedOlympus_00 // Whatever seismic waves may be found lower down, up here they're very muffled by the great bulk of the mountain.
        EveSrfLandedMountains* = #CSS_seismicScan_EveSrfLandedOlympus_01 // A number of skittering rocks on the steep slopes produce a swarm of noisy signatures.
        EveSrfLandedShores* = #CSS_seismicScan_EveSrfLandedShallows_00 // Can you use the seismometer to detect sea monsters bumping around in the ocean?

        KerbinSrfLandedMidlands* = #CSS_seismicScan_KerbinSrfLandedGrasslands_00 // The seismometer registers the gentle jostling of the blades of grass against it. Other than that it doesn't seem to be reading anything.
        KerbinSrfLandedMidlands* = #CSS_seismicScan_KerbinSrfLandedGrasslands_01 // You wonder what it is about grass that keeps the earthquakes away.
        KerbinSrfLandedMidlands* = #CSS_seismicScan_KerbinSrfLandedGrasslands_02 // You jump up and down a few times, just so the seismometer will have something to show to Mission Control.
        KerbinSrfLandedAridMidlands* = #CSS_seismicScan_KerbinSrfLandedDeserts_00 // *singing* "I've been through the desert on a horse with no name, it feels good to be out of the rain". Oops! As you were singing you drop the accelerometer into one of the cracks in the dry ground, and can't reach it. Oh well, time to make something up for the scientists back at KSC again.
        KerbinSrfLandedAridMidlands* = #CSS_seismicScan_KerbinSrfLandedDeserts_01 // Seismic readings seem to indicate a large artificial structure directly underfoot. The lost tomb of an ancient Kerbal king perhaps?
        KerbinSrfLandedAridHighlands* = #CSS_seismicScan_KerbinSrfLandedBadlands_00 // The ground here rumbles with constant activity. Maybe this is why they call it the Badlands.
        KerbinSrfLandedAridHighlands* = #CSS_seismicScan_KerbinSrfLandedBadlands_01 // So here we are, the center of all earthquakes on the entire planet. Or so the scientists say, but who believes them anyway with their fancy 'hypotheses' and 'equations'.
        KerbinSrfLandedAridHighlands* = #CSS_seismicScan_KerbinSrfLandedBadlands_02 // You wonder if there used to be a 'Goodlands' here before the earthquakes.
        KerbinSrfLandedIceCaps* = #CSS_seismicScan_KerbinSrfLandedNorthernIceShelf_00 // The seismometer registers the rumbling, cracking sounds that you can hear coming from underfoot. You are amazed by the power that the ice holds.
        KerbinSrfLandedIceCaps* = #CSS_seismicScan_KerbinSrfLandedNorthernIceShelf_01 // Seismic readings indicate that the ice beneath is undergoing movement and stress on an enormous scale.
        KerbinSrfLandedIceCaps* = #CSS_seismicScan_KerbinSrfLandedSouthernIceShelf_00 // Given the fragile state of the ice, an earthquake would be particularly bad right about now.
        KerbinSrfLandedIceCaps* = #CSS_seismicScan_KerbinSrfLandedSouthernIceShelf_01 // A long line of tensional signatures near the edge of the ice shelf suggests a major calving event is about to take place.

        MunSrfLandedNotableCraters* = #CSS_seismicScan_MunSrfLandedEastCrater_00 // There's an odd signature coming from the crater to the west. You report it to Mission Control, hoping they'll be proud of you.
        MunSrfLandedNotableCraters* = #CSS_seismicScan_MunSrfLandedTwinCraters_00 // You hope that the geology here will concentrate any minute vibrations from deep within the Mun.
        MunSrfLandedRareCraters* = #CSS_seismicScan_MunSrfLandedNorthwestCrater_00 // The massive impact appears to have created a fault line.
        MunSrfLandedRareCraters* = #CSS_seismicScan_MunSrfLandedSouthwestCrater_00 // The quakes stop suddenly. You start to get alarmed, then realize you knocked the plug loose.
        MunSrfLandedExoticCraters* = #CSS_seismicScan_MunSrfLandedFarsideCrater_00 // The readings here are solid, but they might be better if we could do them in a canyon.
        MunSrfLandedExoticCraters* = #CSS_seismicScan_MunSrfLandedEastFarsideCrater_00 // You set the seismometer down and it promptly tumbles down the embankment to the bottom of the crater. At least it registered something!
        MunSrfLandedPolarIceCraters* = #CSS_seismicScan_MunSrfLandedPolarCrater_00 // The permanently shaded areas in the corners of the craters have slightly less seismic activity than the rest of the Mun.
        MunSrfLandedVoronoiCraters* = #CSS_seismicScan_MunSrfLandedHighlandCraters_00 // The ground appears to have many small fractures from the multiple impacts, causing slight distortions in readings.
        MunSrfLandedVoronoiCraters* = #CSS_seismicScan_MunSrfLandedMidlandCraters_00 // You carefully place the sensor down on the dusty surface and pat it on the top. 'Now there's a good little sensor.'
        
        MinmusSrfLandedBasins* = #CSS_seismicScan_MinmusSrfLandedFlats_00 // You detect somewhat violent shuddering somewhere on the opposite side of Minmus. It was likely caused by a small meteorite impact.
        MinmusSrfLandedBasins* = #CSS_seismicScan_MinmusSrfLandedGreatFlats_00 // You watch the data as it clearly shows that nothing interesting is happening at all.
        MinmusSrfLandedBasins* = #CSS_seismicScan_MinmusSrfLandedGreaterFlats_00 // The seismometer detects some minor quakes, and what sounds like bubbling. Perhaps these areas are resurfaced by occasional geological activity.
        MinmusSrfLandedBasins* = #CSS_seismicScan_MinmusSrfLandedGreaterFlats_01 // A large impact nearby sends shockwaves throughout the planet. This is a perfect opportunity to map the interior!
        MinmusSrfLandedBasins* = #CSS_seismicScan_MinmusSrfLandedLesserFlats_00 // The vibrations indicate there's some rock under all that ice.
        MinmusSrfLandedMountains* = #CSS_seismicScan_MinmusSrfLandedSlopes_00 // A boulder rolling down the neighboring slope interferes with your readings.
        MinmusSrfLandedMountains* = #CSS_seismicScan_MinmusSrfLandedSlopes_00 // There's a lot of static on the sensor feed. Are we sliding down the hill?

        DunaSrfLandedIceCaps* = #CSS_seismicScan_DunaSrfLandedPoles_00 // The seismic scan picks up some vibrations as gas vents from the ice cap underneath.
        DunaSrfLandedIceCaps* = #CSS_seismicScan_DunaSrfLandedPoles_01 // The scan detects some activity, probably associated with melting of the polar cap.
        DunaSrfLandedMidlands* = #CSS_seismicScan_DunaSrfLandedMidlandSea_00 // The libration of Ike overhead generates almost undetectable tremors from ground movement akin to tides.
        DunaSrfLandedMidlands* = #CSS_seismicScan_DunaSrfLandedMidlandSea_01 // The entire planet looks to have flatlined, or at least the seismograph has.
        DunaSrfLandedNotablePlains* = #CSS_seismicScan_DunaSrfLandedNorthernBasin_00 // Pings sent down into the bedrock are scattered and refracted in all directions, indicating the presence of extensive rock faulting and fracturing.
        DunaSrfLandedNotablePlains* = #CSS_seismicScan_DunaSrfLandedNorthernBasin_01 // There's no detectable activity here, which means no active tectonics in the area.
        DunaSrfLandedNotablePlains* = #CSS_seismicScan_DunaSrfLandedSouthernBasin_00 // Cracking and shifting ice in the basin creates some weak, shallow waves.
        DunaSrfLandedNotablePlains* = #CSS_seismicScan_DunaSrfLandedSouthernBasin_01 // The sparse seismic activity seems to peak during the day, as though the nearby ice melting is resposible for shockwaves.
        DunaSrfLandedNotableMountains* = #CSS_seismicScan_DunaSrfLandedNorthernShelf_00 // The wind rattles the seismometer so much it's impossible to get a reading. Apparently, this is a magnitude VI dunaquake, if such a thing exists.
        DunaSrfLandedNotableMountains* = #CSS_seismicScan_DunaSrfLandedNorthernShelf_01 // In amongst all the vibration noise, the meter picks up a tiny rumble from deep beneath the ground. Could this place be a relic of an ancient fault line?
        DunaSrfLandedNotableMountains* = #CSS_seismicScan_DunaSrfLandedPolarHighlands_00 // The scattering of seismic pings sent down suggests the presence of multiple ice layers and rock far below.
        DunaSrfLandedNotableMountains* = #CSS_seismicScan_DunaSrfLandedPolarHighlands_01 // Your scan records a few small tremors. Hopefully there are no Duna dinosaurs.
        DunaSrfLandedTrenches* = #CSS_seismicScan_DunaSrfLandedMidlandCanyon_00 // The ground is perfectly still here, save for some vanishingly faint pings from the other side of the planet.
        DunaSrfLandedTrenches* = #CSS_seismicScan_DunaSrfLandedMidlandCanyon_01 // Ike's libration overhead generates regular swarms of tiny movements in the crust.
        DunaSrfLandedTrenches* = #CSS_seismicScan_DunaSrfLandedEasternCanyon_00 // What's that? Did everyone feel that? The seismometer certainly did, and we appear to have landed in a rift valley zone.
        DunaSrfLandedTrenches* = #CSS_seismicScan_DunaSrfLandedEasternCanyon_01 // After a while, the sensor has detected no less than eleven small quakes. Duna is still active after all!
        DunaSrfLandedTrenches* = #CSS_seismicScan_DunaSrfLandedWesternCanyon_00 // Not a peep. Either Duna is dozing, or it really is seismially dead.
        DunaSrfLandedTrenches* = #CSS_seismicScan_DunaSrfLandedWesternCanyon_01 // Discouraged, you leave the sensor running for some time. When you return, the only vibrations are from your feet and the wind.
        DunaSrfLandedExoticCraters* = #CSS_seismicScan_DunaSrfLandedPolarCraters_00 // The detector picks up the vibrations of ice cracking and shifting beneath the ship. It's quite disconcerting.
        DunaSrfLandedExoticCraters* = #CSS_seismicScan_DunaSrfLandedPolarCraters_01 // Not much, apart from some ice noises. Either Duna is seismically dead or ice is a good shock absorber.

        IkeSrfLandedPoles* = #CSS_seismicScan_IkeSrfLandedPolarLowlands_00 // It's quiet. Too quiet. The seismic silence is unsettling.
        IkeSrfLandedPoles* = #CSS_seismicScan_IkeSrfLandedPolarLowlands_01 // Perhaps seismic waves don't reach these latitudes, since you aren't getting much at all.
        IkeSrfLandedPoles* = #CSS_seismicScan_IkeSrfLandedSouthPole_00 // The thick layers of loose rubble on the surface muffle and distort seismic waves, making it difficult to pick them up.
        IkeSrfLandedPoles* = #CSS_seismicScan_IkeSrfLandedSouthPole_01 // A few faint vibrations are detected, generated by impact events at lower latitudes. None come from the polar regions.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedEasternMountainRidge_00 // There is no sign of volcanic activity, but the surface is undergoing tidal stress from Duna's gravitational influence.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedEasternMountainRidge_01 // Was that a quake, or just a stone rolling slowly down the hill?
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedWesternMountainRidge_00 // The solid structure of the mountains makes here a stable and clear place to observe seismic waves from.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedWesternMountainRidge_01 // No movements associated with mountain-building. Ike must be long dead and these mountains must be ancient.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedSouthEasternMountainRange_00 // Did you feel that little jolt? Because the seismometer certainly did.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedSouthEasternMountainRange_01 // The amplified rumbles from deep inside the moon sound like the growling of a large animal.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedCentralMountainRange_00 // The quakes appear to be coming at regular intervals. A check of your star chart confirms they match the periapsis and apoapsis of the moon's orbit.
        IkeSrfLandedMountains* = #CSS_seismicScan_IkeSrfLandedCentralMountainRange_01 // As Duna gets bigger in the sky, so does the rate of seismic activity. You half expect to see a rock wave rolling towards you.

        DresSrfLandedCanyon* = #CSS_seismicScan_DresSrfLandedCanyons_00 // There's no internal movement. Aside from the impacts of meteors, the needle never moves.

        LaytheSrfLandedIceCaps* = #CSS_seismicScan_LaytheSrfLandedPoles_00 // Fluctuations within the planet's core are detected as signs of the tidal forces exerted by Jool.
        LaytheSrfLandedShores* = #CSS_seismicScan_LaytheSrfLandedDunes_00 // Seismic scan reports distant booms, both under the ocean and on the surface. They seem to be volcanoes.

        BopSrfLandedMountains* = #CSS_seismicScan_BopSrfLandedPeaks_00 // The small moon is resonating with an odd musical frequency. Hooking the sensor feed up to some speakers, you recognize it as a toccata.
        BopSrfLandedHighlands* = #CSS_seismicScan_BopSrfLandedRidges_00 // The planet gives off steady quakes which grow in intensity as Vall passes; as it leaves, they settle down again. This would be expected if the other moons did the same.
        BopSrfLandedMidlands* = #CSS_seismicScan_BopSrfLandedSlopes_00 // How can it be that Bop is this rock-steady for such a small moon?
        BopSrfLandedLowlands* = #CSS_seismicScan_BopSrfLandedValley_00 // Among all the shakes and jitters, you notice a continual pulsing pattern. It makes you feel uneasy.

        EelooSrfLandedCanyon* = #CSS_seismicScan_EelooSrfLandedIceCanyons_00 // The scans indicate that the ice below you is moving slightly.
    }
}