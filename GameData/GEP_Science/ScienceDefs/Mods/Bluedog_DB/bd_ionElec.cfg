@EXPERIMENT_DEFINITION:HAS[#id[bd_ionElec]]
{
    %RESULTS
    {
		GrannusFlyingHigh* = #GEPscience_bd_ionElec_GrannusFlyingHigh_00 // Ionization readings spike wildly; Grannus’ upper layers behave like an electrical storm with opinions about your antenna.
        GrannusInSpaceLow* = #GEPscience_bd_ionElec_GrannusInSpaceLow_00 // Charged particle flux near Grannus forces constant instrument resets. The static reaches Mission Control long after you’ve finished panicking.
        GrannusInSpaceHigh* = #GEPscience_bd_ionElec_GrannusInSpaceHigh_00 // Even from high orbit the sensor still tastes faint plasma in the wind. “Far away” under a dim red sun is apparently still very loud.

        TaranisInSpaceLow* = #GEPscience_bd_ionElec_TaranisInSpaceLow_00 // No atmosphere, but solar particles slam into the baked surface and rebound as a gritty, charged haze. The numbers are sharp enough to cut.
        TaranisInSpaceHigh* = #GEPscience_bd_ionElec_TaranisInSpaceHigh_00 // Readings split cleanly across the brutal day-night boundary: one side screams, the other side whispers, and neither side answers your calls.

        ToutatisFlyingHigh* = #GEPscience_bd_ionElec_ToutatisFlyingHigh_00 // The thin air crackles with charge over the twilight zone. Fine dust clings to everything like it signed a long-term lease.
        ToutatisInSpaceLow* = #GEPscience_bd_ionElec_ToutatisInSpaceLow_00 // A weak, lopsided ionosphere shows up, drifting with the moving line between fire and ice. It’s almost like the planet is breathing—badly.
        ToutatisInSpaceHigh* = #GEPscience_bd_ionElec_ToutatisInSpaceHigh_00 // Particle counts fall off, then spike without warning. Mission Control’s “helpful suggestion” arrives about a quarter-orbit late.

        NodensFlyingHigh* = #GEPscience_bd_ionElec_NodensFlyingHigh_00 // The ion sensor reports a busy, well-layered atmosphere—almost comforting—until the dim red sunlight makes the numbers feel slightly “wrong.”
        NodensInSpaceLow* = #GEPscience_bd_ionElec_NodensInSpaceLow_00 // Charged particles swirl above Nodens’ limb like a faint auroral halo. The best plots arrive after the comms delay, with extra confusion included.
        NodensInSpaceHigh* = #GEPscience_bd_ionElec_NodensInSpaceHigh_00 // Far out, Nodens’ magnetosphere still tugs at the solar wind. The instrument insists the planet is “there” even when it looks like a colored dot.

        BelisamaInSpaceLow* = #GEPscience_bd_ionElec_BelisamaInSpaceLow_00 // Belisama sheds a whisper-thin exosphere into Nodens’ plasma wake. The sensor catches brief spikes whenever you cross the invisible boundary lines.
        BelisamaInSpaceHigh* = #GEPscience_bd_ionElec_BelisamaInSpaceHigh_00 // Higher up, the readings smooth out—until Belisama slips behind Nodens and the particle flow abruptly goes quiet, like someone muted space.

        SucellusInSpaceLow* = #GEPscience_bd_ionElec_SucellusInSpaceLow_00 // With almost no shielding, Sucellus sits bare in the charged stream. The surface seems to charge and discharge in slow, prickly pulses.
        SucellusInSpaceHigh* = #GEPscience_bd_ionElec_SucellusInSpaceHigh_00 // The ion flux is steady, lonely, and relentless. Mission Control suggests “turn it off and on again” a few minutes too late.

        CaireenInSpaceLow* = #GEPscience_bd_ionElec_CaireenInSpaceLow_00 // The detector registers a chaotic mix of dust charge and sputtered fragments. It’s less “ionosphere” and more “tiny moon shedding static.”
        CaireenInSpaceHigh* = #GEPscience_bd_ionElec_CaireenInSpaceHigh_00 // Mostly silence, punctuated by sharp little bursts. You can practically hear the red sun tapping on the hull from very far away.

        SironaFlyingHigh* = #GEPscience_bd_ionElec_SironaFlyingHigh_00 // The ion sensor pegs instantly; charge layers, lightning, and crushing air all argue at once. The plots arrive later, still crackling with static.
        SironaInSpaceLow* = #GEPscience_bd_ionElec_SironaInSpaceLow_00 // Sirona’s extreme field turns nearby space into a humming cage of particles. The instrument starts counting faster than the comms can complain.
        SironaInSpaceHigh* = #GEPscience_bd_ionElec_SironaInSpaceHigh_00 // Even out here, the plasma flow bends and snaps in slow motion under the red sun. “High orbit” feels like standing near a distant power line.

        AirmedInSpaceLow* = #GEPscience_bd_ionElec_AirmedInSpaceLow_00 // Airmed has no air to ionize, but the surrounding particle storm doesn’t care. The sensor records sharp spikes that make the silence feel crowded.
        AirmedInSpaceHigh* = #GEPscience_bd_ionElec_AirmedInSpaceHigh_00 // Baseline stays low, then jumps when you cross invisible field lines. Mission Control’s “Did you try rebooting?” arrives after the spike is gone.

        BorvoFlyingHigh* = #GEPscience_bd_ionElec_BorvoFlyingHigh_00 // The thin nitrogen air shows faint, stubborn charge separation with a hint of methane mischief. The probe returns smelling like static and bad decisions.
        BorvoInSpaceLow* = #GEPscience_bd_ionElec_BorvoInSpaceLow_00 // A delicate ionosphere clings to Borvo like a fragile halo. The numbers look neat—until Sirona’s plasma wake ruffles the edges.
        BorvoInSpaceHigh* = #GEPscience_bd_ionElec_BorvoInSpaceHigh_00 // Particle counts fall off smoothly, then wobble as the moon drifts through Sirona’s influence. Space keeps changing the rules between check-ins.

        DamonaInSpaceLow* = #GEPscience_bd_ionElec_DamonaInSpaceLow_00 // Dust and fractured rock grains carry charge like they’re hoarding it. A tiny discharge snaps across a panel and everyone pretends it was “expected.”
        DamonaInSpaceHigh* = #GEPscience_bd_ionElec_DamonaInSpaceHigh_00 // Mostly quiet readings, with occasional prickly bursts from the giant’s distant magnetosphere. Out here, even the emptiness has weather.

        EponaFlyingHigh* = #GEPscience_bd_ionElec_EponaFlyingHigh_00 // The upper air carries a thin, stubborn charge that comes and goes with Epona’s long, dim-red daylight. Your radio confirms it by sounding mildly offended.
        EponaInSpaceLow* = #GEPscience_bd_ionElec_EponaInSpaceLow_00 // A weak magnetosphere drags the solar wind into slow curls around the planet. The plots look beautiful—once they finally arrive across the long comms delay.
        EponaInSpaceHigh* = #GEPscience_bd_ionElec_EponaInSpaceHigh_00 // Farther out, the particle counts thin to a lonely hiss with occasional sharp spikes. Space “weather” under a red sun still doesn’t respect your schedule.

        RosmertaInSpaceLow* = #GEPscience_bd_ionElec_RosmertaInSpaceLow_00 // With no air and no field of its own, Rosmerta just soaks up charged particles and spits some back out. The sensor calls it “surface charging”; you call it “don’t touch the ladder.”
        RosmertaInSpaceHigh* = #GEPscience_bd_ionElec_RosmertaInSpaceHigh_00 // Readings flatten out into a steady background until Epona’s influence sweeps past again. It’s like orbiting a quiet moon inside a much larger, unseen machine.

        RAB-58EInSpaceLow* = #GEPscience_bd_ionElec_RAB-58EInSpaceLow_00 // Ion counts jump in brief, jagged bursts as you skim past this little moonlet. Something out here is charging dust and rock like it’s trying to build a static sculpture.
        RAB-58EInSpaceHigh* = #GEPscience_bd_ionElec_RAB-58EInSpaceHigh_00 // Mostly empty… then a sudden spike as you cross an invisible boundary in Epona’s distant plasma environment. Mission Control’s “interesting!” arrives after you’ve already flinched.

        CernunnosInSpaceLow* = #GEPscience_bd_ionElec_CernunnosInSpaceLow_00 // Very faint ionization—just enough to prove the red sun still reaches this far. The emptiness feels measured, cataloged, and quietly unsettling.
        CernunnosInSpaceHigh* = #GEPscience_bd_ionElec_CernunnosInSpaceHigh_00 // Background particles drift by in slow, predictable trickles. “High orbit” around Cernunnos is less science and more listening to the universe breathe.
	}
}
