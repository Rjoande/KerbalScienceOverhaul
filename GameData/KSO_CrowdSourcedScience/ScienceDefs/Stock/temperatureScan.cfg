        DunaSrfLanded* = #CSS_temperatureScan_DunaSrfLanded_00 // Duna ain't the kind of place to raise your kids; in fact, it's cold as heck. And there's nobody there to raise them, if you did.
        DunaSrfLandedPoles* = #CSS_temperatureScan_DunaSrfLandedPoles_00 // The air is cold. The atmosphere must not support a strong greenhouse effect.
