        #JNSQscience_evaReport_TalosSrfLandedPoles_01 = Shadows stretch forever here; you take notes and try not to imagine what’s hiding in all that darkness.
        #JNSQscience_evaReport_TalosInSpaceLowLowlands_00 = You drift above the lowlands on your tether, watching featureless plains slide past like an unfinished blueprint.
        #JNSQscience_evaReport_TalosInSpaceLowLowlands_01 = From here the lowlands look smooth and harmless—until you remember you just walked on them.
