        #JNSQscience_barometerScan_TyloSrfLandedPoles_00 = La lettura della pressione è appena sopra "quasi tutto vuoto" e il freddo fa strisciare i numeri. L'aria polare di Tylo sembra aderire al suolo per pura ostinazione.
        #JNSQscience_barometerScan_TyloSrfLandedMountains_00 = Il barometro cala appena sali in montagna. Persino il sottile azoto di Tylo non ama i posti alti.
        #JNSQscience_barometerScan_TyloSrfLandedHighlands_00 = Il misuratore resta stabile su un valore basso, con piccoli sfarfallii quando la polvere picchietta il sensore. Questa "atmosfera" è soprattutto uno strato limite con ambizioni.
        #JNSQscience_barometerScan_TyloSrfLandedMidlands_00 = La pressione resta bassa e piatta, poi sussulta vicino ai bordi dei crateri quando il wind shear ci gira attorno. Il barometro lo chiama "meteo" tra virgolette.
        #JNSQscience_barometerScan_TyloSrfLandedLowlands_00 = La lancetta sale appena nella conca, come se l'aria si raccogliesse dove può. È ancora sottile, solo un po' meno sottile.
