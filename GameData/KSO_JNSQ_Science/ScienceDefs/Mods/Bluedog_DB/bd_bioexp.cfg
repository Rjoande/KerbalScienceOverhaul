@EXPERIMENT_DEFINITION:HAS[#id[bd_bioexp]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_bd_bioexp_SunFlyingLow_00 // Everything outside is a roaring blur of light and static. The amphibians curl up, then resume a slow, stubborn paddling rhythm anyway.
        SunFlyingHigh* = #JNSQscience_bd_bioexp_SunFlyingHigh_00 // The habitat window turns gold-white. The amphibians plaster themselves to the coolest panel and refuse to acknowledge the concept of “exercise.”
        SunInSpaceLow* = #JNSQscience_bd_bioexp_SunInSpaceLow_00 // Radiation counters chatter nonstop and the cooling system sounds offended. The amphibians cling to the shaded side like they’ve invented “sun safety.”
        SunInSpaceHigh* = #JNSQscience_bd_bioexp_SunInSpaceHigh_00 // In the quiet of interplanetary space, the amphibians drift contentedly. They keep making tiny swimming motions, as if space is just a very large pond.

        MohoSrfLandedPoles* = #JNSQscience_bd_bioexp_MohoSrfLandedPoles_00 // The amphibians press against the coldest wall panel and refuse to budge. The log calls it “behavioral thermoregulation.” The amphibians call it “survival.”
        MohoSrfLandedLowlands* = #JNSQscience_bd_bioexp_MohoSrfLandedLowlands_00 // The habitat vibrates with heat shimmer and ticking metal. The amphibians make one brave hop, then decide stillness is an excellent lifestyle choice.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_bioexp_MohoSrfLandedPolarIceCraters_00 // The instruments insist there’s a pocket of stubborn cold nearby. The amphibians immediately “discover” it and stage a tiny sit-in.
        MohoSrfLandedHighlands* = #JNSQscience_bd_bioexp_MohoSrfLandedHighlands_00 // The ground outside looks baked and cracked like an overcooked snack. The amphibians keep checking the seals, as if they’ve developed trust issues.
        MohoSrfLandedMidlands* = #JNSQscience_bd_bioexp_MohoSrfLandedMidlands_00 // Dust clings to everything despite the lack of air, as if it’s held a grudge since formation. The amphibians stare at it like it might try something.
        MohoSrfLandedCraters* = #JNSQscience_bd_bioexp_MohoSrfLandedCraters_00 // The crater walls throw harsh shadows across the lander. The amphibians migrate to the shade and act like they invented it.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_bioexp_MohoSrfLandedExoticCraters_00 // Strange dark patches make the sensors argue about what “normal rock” means. The amphibians respond by pretending the entire planet is normal and they are not worried at all.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_bioexp_MohoSrfLandedRareCraters_00 // Every reading comes back “unusual,” which is a very unhelpful word on a world like this. The amphibians tap the glass once, as if to say “please leave.”
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_bioexp_MohoSrfLandedVoronoiCraters_00 // The landscape looks neatly divided, like someone tried to organize impacts into tidy cells. The amphibians swim in place, unimpressed by geometry.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_bioexp_MohoSrfLandedNotableCraters_00 // Mission Control wants close observation; the amphibians want maximum distance. Both parties agree the outside view is “intense.”
        MohoSrfLandedPeaks* = #JNSQscience_bd_bioexp_MohoSrfLandedPeaks_00 // The lander creaks as it expands and contracts in the sun. The amphibians cling to the lowest corner and practice very careful breathing.
        MohoInSpaceLow* = #JNSQscience_bd_bioexp_MohoInSpaceLow_00 // Even in microgravity, the amphibians keep trying to “swim” away from the bright window. The habitat’s shaded side becomes prime real estate.
        MohoInSpaceHigh* = #JNSQscience_bd_bioexp_MohoInSpaceHigh_00 // With Moho a small, hard dot below, the heat load eases. The amphibians behave normal activity, which mostly involves looking suspiciously comfortable in the dark.

        EveSrfLandedPoles* = #JNSQscience_bd_bioexp_EveSrfLandedPoles_00 // The outside looks calm, but the pressure gauge insists it is not. The amphibians stick to the coolest panel and do slow, suspicious blinks.
        EveSrfLandedLowlands* = #JNSQscience_bd_bioexp_EveSrfLandedLowlands_00 // The air is so heavy the lander feels like it’s being hugged by the whole planet. The amphibians stop swimming motions and start “bracing.”
        EveSrfLandedMidlands* = #JNSQscience_bd_bioexp_EveSrfLandedMidlands_00 // Purple haze paints the habitat window like stained glass. The amphibians gather in a neat line and watch it like an aquarium exhibit.
        EveSrfLandedHighlands* = #JNSQscience_bd_bioexp_EveSrfLandedHighlands_00 // The numbers ease slightly, and so do the amphibians. One attempts a confident hop and immediately pretends it was planned.
        EveSrfLandedPeaks* = #JNSQscience_bd_bioexp_EveSrfLandedPeaks_00 // From up here, the horizon looks impossibly close and far at the same time. The amphibians bob in microgravity practice, as if preparing for emergencies.
        EveSrfLandedMountains* = #JNSQscience_bd_bioexp_EveSrfLandedMountains_00 // The winds rattle the hull with slow, powerful shoves. The amphibians press flat against the floor and adopt a “low profile strategy.”
        EveSrfLandedShores* = #JNSQscience_bd_bioexp_EveSrfLandedShores_00 // The surf outside moves like thick syrup under a violet sky. The amphibians tap the window, clearly asking for “not that.”
        EveSrfLandedKrakensWell* = #JNSQscience_bd_bioexp_EveSrfLandedKrakensWell_00 // The pressure readout goes from “high” to “personal.” The amphibians retreat into the corner and refuse to be experimental subjects.
        EveSrfSplashedExplodiumSea* = #JNSQscience_bd_bioexp_EveSrfSplashedExplodiumSea_00 // Something under the waves makes the sensors argue with each other. The amphibians stare at the bubbling surface and choose to remain indoors forever.
        EveSrfSplashedShores* = #JNSQscience_bd_bioexp_EveSrfSplashedShores_00 // Foam and spray slap the lander in slow-motion sheets. The amphibians paddle in place, offended that the outside water isn’t invited inside.
        EveSrfSplashedPolarLakes* = #JNSQscience_bd_bioexp_EveSrfSplashedPolarLakes_00 // The surface is smoother here, like a lid on a pot that still might boil. The amphibians relax until the thermometer reminds them where they are.
        EveSrfSplashedPetrolLakes* = #JNSQscience_bd_bioexp_EveSrfSplashedPetrolLakes_00 // The liquid outside shines with an oily sheen that never looks quite right. The amphibians make a face that the log categorizes as “strong preference.”
        EveSrfSplashedSeaofAkron* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofAkron_00 // Long, heavy swells roll past with the patience of geology. The amphibians time their paddling to the waves, accidentally becoming very scientific.
        EveSrfSplashedSeaofNessus* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofNessus_00 // Fog smears everything beyond a few meters into purple nothing. The amphibians keep turning around as if something is always behind them.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofTaniwha_00 // The buoyancy readings fluctuate like the ocean is making decisions. The amphibians respond by becoming extremely still and extremely judgmental.
        EveSrfSplashedSeaofGigan* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofGigan_00 // The depth scanner returns “yes” for a while, then stops being helpful. The amphibians drift upward, apparently sharing the concern.
        EveSrfSplashedSeaofRodan* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofRodan_00 // Gusts shove the capsule and the waves answer back louder. The amphibians grip their handholds and perform “high-wind training.”
        EveSrfSplashedSeaofGojira* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofGojira_00 // Every swell seems slightly too large for comfort. The amphibians keep trying to swim “uphill,” as if that will solve it.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofGhidorah_00 // Static pops across the antennae and the clouds flash far away. The amphibians flinch in perfect synchronization, then pretend they didn’t.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_bd_bioexp_EveSrfSplashedSeaofBagorah_00 // The surface is mirror-smooth and unsettlingly quiet. The amphibians circle slowly, as if waiting for the ocean to blink first.
        EveFlyingLow* = #JNSQscience_bd_bioexp_EveFlyingLow_00 // The dense air turns every motion into slow, controllable drifting. The amphibians paddle happily until the pressure sensor ruins the mood.
        EveFlyingHigh* = #JNSQscience_bd_bioexp_EveFlyingHigh_00 // Above the thickest haze, the light goes soft and strange. The amphibians float calmly, watching the purple world churn beneath them.
        EveInSpaceLow* = #JNSQscience_bd_bioexp_EveInSpaceLow_00 // Eve fills the window like a bruise-colored marble wrapped in storm. The amphibians drift toward the shaded side and practice very careful breathing.
        EveInSpaceHigh* = #JNSQscience_bd_bioexp_EveInSpaceHigh_00 // With Eve distant and small, the instruments finally calm down. The amphibians resume their tiny swimming routine, as if nothing unusual ever happened.

        GillySrfLandedLowlands* = #JNSQscience_bd_bioexp_GillySrfLandedLowlands_00 // The amphibians try a careful step and immediately drift into a slow-motion tumble. The log marks it as “locomotion in near-zero gravity.”
        GillySrfLandedMidlands* = #JNSQscience_bd_bioexp_GillySrfLandedMidlands_00 // Without water, they improvise. Tiny “swims” that turn into gentle hops across the habitat floor. Every landing takes an optimistic amount of time.
        GillySrfLandedHighlands* = #JNSQscience_bd_bioexp_GillySrfLandedHighlands_00 // A small slope turns one hop into a long glide. The amphibians cling to the nearest handle and refuse to demonstrate again for “repeatability.”
        GillyInSpaceLow* = #JNSQscience_bd_bioexp_GillyInSpaceLow_00 // Eve fills the view with purple glare and the radiation monitor won’t stop talking. The amphibians migrate to the shaded side and pretend the window isn’t there.
        GillyInSpaceHigh* = #JNSQscience_bd_bioexp_GillyInSpaceHigh_00 // With Gilly a lumpy speck below, the habitat finally feels calm. The amphibians resume routine paddling, as if space is just another kind of pond.

		KerbinSrfLandedAdministration* = #JNSQscience_bd_bioexp_KerbinSrfLandedAdministration_00 // The frogs are issued visitor badges and immediately use them to access the snack cabinet; Security files an incident report titled Unauthorized Hopping.
		KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_bioexp_KerbinSrfLandedAstronautComplex_00 // The subjects acclimate to the Astronaut Complex hot tub and refuse to leave; Medical declares this a successful habitat preference study.
		KerbinSrfLandedCrawlerway* = #JNSQscience_bd_bioexp_KerbinSrfLandedCrawlerway_00 // Vibration tests proceed until the crawler rolls by; everyone agrees the shaking was definitely part of the protocol.
		KerbinSrfLandedFlagPole* = #JNSQscience_bd_bioexp_KerbinSrfLandedFlagPole_00 // You attempt to weigh a frog using the flagpole rope; the Safety Officer informs you the flag is not calibrated equipment.
		KerbinSrfLandedLaunchPad* = #JNSQscience_bd_bioexp_KerbinSrfLandedLaunchPad_00 // A routine engine test triggers the experiment’s panic response; the frogs request hazard pay in snacks.
		KerbinSrfLandedMissionControl* = #JNSQscience_bd_bioexp_KerbinSrfLandedMissionControl_00 // Every croak is logged as a callout; Mission Control asks you to stop transmitting biological telemetry on the main loop.
		KerbinSrfLandedR&D* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&D_00 // You sign fourteen forms to observe a frog; the frog signs none and still outperforms the research team.
		KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DCentralBuilding_00 // The air conditioning creates a tiny climate zone; the frogs thrive while the scientists argue about which budget pays for it.
		KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DCornerLab_00 // You simulate microgravity with a swivel chair; it works until someone spins the wrong way and becomes the control group.
		KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DMainBuilding_00 // The frogs gather around the whiteboard and stare at the equations; peer review concludes they have strong opinions.
		KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DObservatory_00 // A telescope is repurposed to track frog migration patterns; the astronomers are not amused, but they do take notes.
		KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DSideLab_00 // The experiment is moved to avoid an inspection; the frogs follow the snack trail and relocate themselves back.
		KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DSmallLab_00 // The frogs fit comfortably; the scientists do not. This is filed under space utilization studies.
		KerbinSrfLandedR&DTanks* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DTanks_00 // The tanks are labeled NOT A HABITAT; the frogs disagree and move in anyway.
		KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_bioexp_KerbinSrfLandedR&DWindTunnel_00 // Wind tunnel tests confirm frogs are not aerodynamic; Engineering asks if you can make them more aerodynamic anyway.
		KerbinSrfLandedRunway* = #JNSQscience_bd_bioexp_KerbinSrfLandedRunway_00 // Air traffic control asks why the tower is tracking frogs as unknown craft; you request a new classification called small and determined.
		KerbinSrfLandedSPH* = #JNSQscience_bd_bioexp_KerbinSrfLandedSPH_00 // The frogs cling to a prototype wing and demonstrate unexpected lift; the design team immediately calls it biomimicry.
		KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_bioexp_KerbinSrfLandedSPHMainBuilding_00 // Someone suggests painting the frogs for visibility; the frogs veto the plan by escaping into the vents.
		KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_bioexp_KerbinSrfLandedSPHRoundTank_00 // The round tank has incredible acoustics; the croaks echo so well that Mission Control assumes it is a new alarm.
		KerbinSrfLandedSPHTanks* = #JNSQscience_bd_bioexp_KerbinSrfLandedSPHTanks_00 // The storage tanks form a perfect maze; the frogs solve it faster than the interns, which becomes an HR matter.
		KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_bioexp_KerbinSrfLandedSPHWaterTower_00 // The water tower is technically not part of the experiment area; the frogs are technically unimpressed.
		KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationDishEast_00 // The dish reports strange chirps; it turns out to be frogs responding to the weekly antenna sweep.
		KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationDishNorth_00 // You test behavioral response to radio noise; the frogs go silent whenever the chief scientist walks by.
		KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationDishSouth_00 // The experiment is briefly classified as communications; the frogs demand encryption and you offer a towel.
		KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationHub_00 // The staff insists amphibians require a clean room; you compromise by wiping the table with a napkin and calling it procedure.
		KerbinSrfLandedVAB* = #JNSQscience_bd_bioexp_KerbinSrfLandedVAB_00 // The frogs enjoy the echoing cavern until an engineer yells not near the staging area and everyone remembers rules exist.
		KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_bioexp_KerbinSrfLandedVABMainBuilding_00 // You use a crane hook as a microgravity rig; Safety reclassifies it as mostly gravity.
		KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_bioexp_KerbinSrfLandedVABPodMemorial_00 // The frogs sit solemnly by the memorial, then try to eat the plaque; respect is complicated.
		KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_bioexp_KerbinSrfLandedVABRoundTank_00 // The croaks produce standing waves; Acoustics claims discovery and the frogs claim royalties.
		KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_bioexp_KerbinSrfLandedVABSouthComplex_00 // Dust from old launches coats the samples; you label it historic residue to avoid additional paperwork.
		KerbinSrfLandedVABTanks* = #JNSQscience_bd_bioexp_KerbinSrfLandedVABTanks_00 // The tank farm is warm and humming; the frogs appear calm while the safety officer does not.
		KerbinSrfLandedKSC* = #JNSQscience_bd_bioexp_KerbinSrfLandedKSC_00 // You conduct field biology in the middle of the space center; the paperwork ends up heavier than the frogs.
		KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_bioexp_KerbinSrfLandedIslandAirfield_00 // The airfield is quiet until the frogs locate the emergency snack stash; research concludes snacks strongly influence migration.
		KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_bioexp_KerbinSrfLandedBaikerbanur_00 // The abandoned offices provide excellent cover; you spend the day studying frog camouflage against bureaucracy.
		KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_bioexp_KerbinSrfLandedBaikerbanurLaunchpad_00 // You are yelled at over the radio by someone who thinks you are at the other pad; the frogs pretend not to know you.

        KerbinSrfLandedIceCaps* = #JNSQscience_bd_bioexp_KerbinSrfLandedIceCaps_00 // The habitat turns into a tiny igloo; the amphibians enter a neat freeze-and-thaw cycle and the sensors insist this is perfectly acceptable behavior.
		KerbinSrfLandedHighlands* = #JNSQscience_bd_bioexp_KerbinSrfLandedHighlands_00 // In the crisp highland air, the critters refuse to hop unless the warmer corner is occupied by snacks.
		KerbinSrfLandedMountains* = #JNSQscience_bd_bioexp_KerbinSrfLandedMountains_00 // Thin air and sharp winds make the little animals press flat and wide, as if trying to become aerodynamically uninteresting.
		KerbinSrfLandedShores* = #JNSQscience_bd_bioexp_KerbinSrfLandedShores_00 // Sand gets everywhere and the amphibians invent a new, deeply offended type of croak.
		KerbinSrfLandedMidlands* = #JNSQscience_bd_bioexp_KerbinSrfLandedMidlands_00 // Everything is so normal that the main observation is how quickly the animals learn the exact feeding schedule.
		KerbinSrfLandedLowlands* = #JNSQscience_bd_bioexp_KerbinSrfLandedLowlands_00 // The humidity turns the habitat into a sauna; the amphibians look smug, like they ordered this climate.
		KerbinSrfLandedAridLowlands* = #JNSQscience_bd_bioexp_KerbinSrfLandedAridLowlands_00 // Most of the day they sit as motionless lumps, then a misting cycle starts and it becomes an emergency hopping situation.
		KerbinSrfLandedAridMidlands* = #JNSQscience_bd_bioexp_KerbinSrfLandedAridMidlands_00 // Dry air encourages dramatic skin-shedding; the report is labeled "not a new life form" for the third time.
		KerbinSrfLandedAridHighlands* = #JNSQscience_bd_bioexp_KerbinSrfLandedAridHighlands_00 // Cold nights and dry days push the animals into a strict hide-and-wait routine that looks suspiciously like a meeting.
		KerbinSrfLandedAridMountains* = #JNSQscience_bd_bioexp_KerbinSrfLandedAridMountains_00 // The habitat water recycler becomes the only oasis, complete with territorial croaks and aggressive staring.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_bioexp_KerbinSrfLandedWelcomeBackIsland_00 // The isolation makes the control group seem oddly lonely; they stare toward the horizon as if expecting a return capsule.
		KerbinSrfSplashedGreatLake* = #JNSQscience_bd_bioexp_KerbinSrfSplashedGreatLake_00 // Freshwater samples produce maximum enthusiasm; the amphibians attempt to colonize the sample jar.
		KerbinSrfSplashedInlandWater* = #JNSQscience_bd_bioexp_KerbinSrfSplashedInlandWater_00 // Low salt and lots of algae: the critters approve and leave tiny wet prints on every instrument.
		KerbinSrfSplashedKreenwichSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedKreenwichSea_00 // Gentle currents rock the enclosure, and the animals synchronize their croaks with the sloshing like a very small sea shanty.
		KerbinSrfSplashedArcticSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedArcticSea_00 // Cold spray beads into tiny ice pearls on the walls; the amphibians switch to efficient, silent mode and conserve every hop.
		KerbinSrfSplashedForemansSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedForemansSea_00 // The water chemistry is boringly stable until one amphibian discovers the bubble sensor and makes it everyone's problem.
		KerbinSrfSplashedTriangulusSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedTriangulusSea_00 // The swell arrives in neat sets; the critters brace, unbrace, and pretend it was their idea all along.
		KerbinSrfSplashedNorthernSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedNorthernSea_00 // A salty mist coats the sensors, and the amphibians keep trying to rinse themselves in the air like it owes them favors.
		KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedSub-ArcticSea_00 // Mixed temperatures cause constant fogging; the animals vanish into condensation and reappear somewhere inconvenient.
		KerbinSrfSplashedEasternSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedEasternSea_00 // The magnetically latched lid becomes a climbing wall; apparently sea travel is for hands, not feet.
		KerbinSrfSplashedWesternSea* = #JNSQscience_bd_bioexp_KerbinSrfSplashedWesternSea_00 // A steady swell makes the habitat feel like a hammock; the critters relax so completely they look scientifically inert.
		KerbinSrfSplashedShores* = #JNSQscience_bd_bioexp_KerbinSrfSplashedShores_00 // Half wet, half sand, and fully confusing; the amphibians cannot decide whether to swim or dig, so they do both at once.

        MunSrfLandedPoles* = #JNSQscience_bd_bioexp_MunSrfLandedPoles_00 // The habitat’s sunlamp becomes the only “day.” The critters gather under it in a tight, polite pile and refuse to acknowledge the darkness outside.
		MunSrfLandedPolarIceCraters* = #JNSQscience_bd_bioexp_MunSrfLandedPolarIceCraters_00 // Instruments detect faint traces of volatiles, and the enclosure walls fog up with a whisper of frost. The amphibians stare at it like it’s a new kind of window.
		MunSrfLandedHighlands* = #JNSQscience_bd_bioexp_MunSrfLandedHighlands_00 // Fine, bright dust clings to everything with static determination. The critters develop an accidental “powder camouflage” and seem extremely pleased with themselves.
		MunSrfLandedMidlands* = #JNSQscience_bd_bioexp_MunSrfLandedMidlands_00 // In low gravity, a single hop becomes a long, graceful arc. The report notes “sustained enthusiasm” and “inadequate braking.”
		MunSrfLandedLowlands* = #JNSQscience_bd_bioexp_MunSrfLandedLowlands_00 // The darker regolith warms the lander just enough to make the habitat cozy. The animals sprawl out and act like they personally terraformed the place.
		MunSrfLandedExoticCraters* = #JNSQscience_bd_bioexp_MunSrfLandedExoticCraters_00 // The sample return wheel brings in oddly tinted dust, and the chemical sensors run out of simple explanations. The critters respond by pressing their faces to the viewport and judging it.
		MunSrfLandedRareCraters* = #JNSQscience_bd_bioexp_MunSrfLandedRareCraters_00 // An unusually clean mineral signature comes back from the scoop. The amphibians immediately attempt to claim the “premium rock” as nesting material.
		MunSrfLandedVoronoiCraters* = #JNSQscience_bd_bioexp_MunSrfLandedVoronoiCraters_00 // Terrain scans show repeating patterns, and the enclosure’s motion tracker logs repeating hop patterns. Either it’s coincidence, or the critters have invented geometry.
		MunSrfLandedNotableCraters* = #JNSQscience_bd_bioexp_MunSrfLandedNotableCraters_00 // Tiny seismic ticks arrive from far away, stretched thin across the quiet ground. The animals pause mid-hop, then resume as if nothing happened—while the instruments keep listening.
		MunSrfLandedMountains* = #JNSQscience_bd_bioexp_MunSrfLandedMountains_00 // The lander creaks on an uneven slope, and every vibration becomes a slow-motion wobble inside. The critters brace themselves like seasoned mountaineers, despite never having climbed anything.

        MinmusSrfLandedPoles* = #JNSQscience_bd_bioexp_MinmusSrfLandedPoles_00 // The heaters cycle nonstop. The critters gather in a stubborn little knot and refuse to “explore” anything colder than the food tray.
		MinmusSrfLandedLowlands* = #JNSQscience_bd_bioexp_MinmusSrfLandedLowlands_00 // Low gravity turns every hop into a slow-motion performance. The habitat logs multiple “celebratory” leaps and zero successful landings.
		MinmusSrfLandedMidlands* = #JNSQscience_bd_bioexp_MinmusSrfLandedMidlands_00 // The animals pace the walls like they’re mapping territory. The map appears to be mostly “warm corner” and “less warm corner.”
		MinmusSrfLandedHighlands* = #JNSQscience_bd_bioexp_MinmusSrfLandedHighlands_00 // The enclosure creaks as the lander settles. The critters freeze, then resume hopping with the confidence of beings who did not read the risk assessment.
		MinmusSrfLandedBasins* = #JNSQscience_bd_bioexp_MinmusSrfLandedBasins_00 // A fine dust haze builds up in the filters. The critters press against the viewport and watch it swirl like a tiny weather system they can’t complain about.
		MinmusSrfLandedBrownBasins* = #JNSQscience_bd_bioexp_MinmusSrfLandedBrownBasins_00 // Darker grit tracks into the sample lock and alarms the chem sensors. The animals respond by trying to decorate themselves with it.
		MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_bioexp_MinmusSrfLandedBrownLowlands_00 // The habitat warms slightly over the darker ground. The critters sprawl out like they’ve discovered luxury, and morale rises accordingly.
		MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_bioexp_MinmusSrfLandedBrownMidlands_00 // The dust clings to everything with static dedication. The amphibians develop accidental “dust socks” and hop around as if this is fashionable.
		MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_bioexp_MinmusSrfLandedBrownHighlands_00 // The temperature swings make the humidity controller work overtime. The critters treat every mist cycle like the start of a festival.
		MinmusSrfLandedMountains* = #JNSQscience_bd_bioexp_MinmusSrfLandedMountains_00 // The lander sits at an awkward angle and the enclosure “down” feels optional. The animals learn to brace mid-hop and look offended at physics.
		MinmusInSpaceLow* = #JNSQscience_bd_bioexp_MinmusInSpaceLow_00 // In orbit, everything floats, including snacks. The critters master the art of slow pursuit and the report notes “unexpectedly strategic amphibians.”
		MinmusInSpaceHigh* = #JNSQscience_bd_bioexp_MinmusInSpaceHigh_00 // With Minmus shrinking behind, the habitat goes quiet except for fans and tiny movements. The animals drift under the lamp, as if waiting for a sunrise that will never arrive.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_bioexp_DunaSrfLandedIceCaps_00 // The habitat’s moisture trap starts frosting over; the critters form a tight heater-huddle and declare the rest of Duna optional.
