@EXPERIMENT_DEFINITION:HAS[#id[bd_gammaRay]]
{
    %RESULTS
    {
		GrannusInSpaceLow* = #GEPscience_bd_gammaRay_GrannusInSpaceLow_00 // The gamma counter maxes out and the computer starts counting in scientific notation. Grannus does not seem impressed.
        GrannusInSpaceHigh* = #GEPscience_bd_gammaRay_GrannusInSpaceHigh_00 // Even out here, Grannus paints the detectors with a steady hiss of high-energy light. You log it as “background” and feel very small.
        TaranisInSpaceLow* = #GEPscience_bd_gammaRay_TaranisInSpaceLow_00 // Over the incandescent day side, the spectrum is loud and clean—mostly rock, with stubborn spikes that don’t match the quick-reference chart. The note to R&D will arrive after the next long silence.
        TaranisInSpaceHigh* = #GEPscience_bd_gammaRay_TaranisInSpaceHigh_00 // From high orbit, the terminator draws a sharp line: hot crust shouting in gamma rays, cold hemisphere whispering almost nothing back. It makes mapping easy and sleep confusing.
        ToutatisInSpaceLow* = #GEPscience_bd_gammaRay_ToutatisInSpaceLow_00 // The twilight belt gives the best data: fewer flares in the background and a hint of migrated volatiles clinging to the cold side. Mission Control asks if that means “ice”; you answer “maybe” and wait.
        ToutatisInSpaceHigh* = #GEPscience_bd_gammaRay_ToutatisInSpaceHigh_00 // The global scan shows a patchwork of heavy-element signatures under a thin, unhelpful atmosphere. The red sun’s distant crackle keeps sneaking into the readings like an uninvited co-author.
        NodensInSpaceLow* = #GEPscience_bd_gammaRay_NodensInSpaceLow_00 // The gamma-ray map comes back with clean, planet-wide bands that almost look familiar—until you remember the sun is red and the “background” never quite sits still.
        NodensInSpaceHigh* = #GEPscience_bd_gammaRay_NodensInSpaceHigh_00 // From high orbit the readings settle into a patient, distant hiss. You file the dataset now and the questions later, when the next comm window finally opens.
        BelisamaInSpaceLow* = #GEPscience_bd_gammaRay_BelisamaInSpaceLow_00 // The locked face and the dark face don’t just look different—they *count* different. The spectrum flips between two worlds every half-orbit, and neither matches the training slides.
        BelisamaInSpaceHigh* = #GEPscience_bd_gammaRay_BelisamaInSpaceHigh_00 // At altitude, the moon’s signature is a thin set of peaks riding on an uneasy glow. Someone suggests “simple rock”; the instrument politely disagrees.
        SucellusInSpaceLow* = #GEPscience_bd_gammaRay_SucellusInSpaceLow_00 // The detector is busier here than it has any right to be. Between harsh background and sharp spikes, Sucellus reads like a treasure vault with the lights turned off.
        SucellusInSpaceHigh* = #GEPscience_bd_gammaRay_SucellusInSpaceHigh_00 // Even from far above, the spectrometer keeps catching hard gammas that don’t want to average out. Whatever Sucellus is made of, it’s not shy about telling the universe.
        CaireenInSpaceLow* = #GEPscience_bd_gammaRay_CaireenInSpaceLow_00 // The gamma counter clicks in bursts as the tiny moon tumbles through view, like it can’t decide what it’s made of. You tag the file “small body, big questions” and wait for the return ping.
        CaireenInSpaceHigh* = #GEPscience_bd_gammaRay_CaireenInSpaceHigh_00 // At distance, Caireen nearly disappears into the red-sun background—until a few stubborn lines stand out. Something dense is hiding in there, and it’s making sure you notice.
        SironaInSpaceLow* = #GEPscience_bd_gammaRay_SironaInSpaceLow_00 // The gamma detector never really “settles” here—Sirona’s furious belts keep sprinkling hard counts over the map. You tag the whole thing as “composition: yes” and back away from the console.
        SironaInSpaceHigh* = #GEPscience_bd_gammaRay_SironaInSpaceHigh_00 // From high orbit the planet becomes a smooth, ominous glow beneath the red sun. The spectrum is mostly quiet background with the occasional reminder that Sirona does not stop being dangerous just because you’re farther away.
        AirmedInSpaceLow* = #GEPscience_bd_gammaRay_AirmedInSpaceLow_00 // The scan picks out crisp, stubborn peaks from an airless surface that has clearly been “processed” by radiation for a very long time. The data looks ancient, sharp, and a little offended you’re reading it.
        AirmedInSpaceHigh* = #GEPscience_bd_gammaRay_AirmedInSpaceHigh_00 // At altitude, Airmed is a pale dot and the detector starts hearing more of the system than the moon. You integrate longer, wait through the comm delay, and still get a clean hint of heavy elements hiding under the dust.
        BorvoInSpaceLow* = #GEPscience_bd_gammaRay_BorvoInSpaceLow_00 // The gamma map suggests a rocky crust with odd patches that don’t match simple ice or simple stone. The thin atmosphere contributes just enough noise to be annoying, like a bad radio station you can’t quite tune out.
        BorvoInSpaceHigh* = #GEPscience_bd_gammaRay_BorvoInSpaceHigh_00 // From far above, Borvo’s signature averages into a tidy set of lines—too tidy. You suspect interesting chemistry is being smeared out by distance, and you make a note to come back lower if the mission budget survives the red-sun commute.
        DamonaInSpaceLow* = #GEPscience_bd_gammaRay_DamonaInSpaceLow_00 // The detector lights up over fresh-looking scars and dark plains, tracing ejecta like it’s been outlined for a textbook that hasn’t been written yet. The cold surface says nothing, but the gammas talk plenty.
        DamonaInSpaceHigh* = #GEPscience_bd_gammaRay_DamonaInSpaceHigh_00 // Damona nearly vanishes into the dim background until a few narrow peaks refuse to fade. Something dense is down there, quietly keeping its secrets while your signal crawls home one packet at a time.
        EponaInSpaceLow* = #GEPscience_bd_gammaRay_EponaInSpaceLow_00 // The gamma spectrum sketches out a rocky world with stubborn peaks that don’t match the “standard” library. Under Grannus’ dim red light, even the normal-looking data feels like it’s from somewhere else.
        EponaInSpaceHigh* = #GEPscience_bd_gammaRay_EponaInSpaceHigh_00 // From high orbit the readings smooth into a quiet glow with a few sharp lines poking through. You package the results and watch the transmit timer climb, one slow hop at a time.
        RosmertaInSpaceLow* = #GEPscience_bd_gammaRay_RosmertaInSpaceLow_00 // The surface signature comes back layered—old terrain and newer deposits arguing in separate energy bands. The map looks tidy, but the background hiss never lets you forget which system you’re in.
        RosmertaInSpaceHigh* = #GEPscience_bd_gammaRay_RosmertaInSpaceHigh_00 // At altitude, Rosmerta’s strongest lines fade into the red-sun noise floor until a handful refuse to disappear. You label them “interesting” and try not to think about how long “follow-up” will take.
        RAB-58EInSpaceLow* = #GEPscience_bd_gammaRay_RAB-58EInSpaceLow_00 // The detector clicks in short, uneven bursts as the irregular little moon drifts under the scanner. It reads like a pile of mismatched parts held together by gravity and bad decisions.
        RAB-58EInSpaceHigh* = #GEPscience_bd_gammaRay_RAB-58EInSpaceHigh_00 // From far out, RAB-58E almost vanishes into the system background—almost. A couple of dense-element peaks still blink through, like it’s waving from a very long distance.
        CernunnosInSpaceLow* = #GEPscience_bd_gammaRay_CernunnosInSpaceLow_00 // The gamma map outlines broad, ancient provinces with narrow seams of heavier stuff running between them. The spectrum feels calm and cold, but the red sun keeps adding a faint, uneasy crackle to every pass.
        CernunnosInSpaceHigh* = #GEPscience_bd_gammaRay_CernunnosInSpaceHigh_00 // At high orbit the dwarf world becomes a few reliable lines on a lot of emptiness. You record the silence between counts and realize it’s the first “quiet” you’ve had since leaving home.
	}
}
