        #GEPscience_tantares_ultraviolet_light_camera_AirmedInSpaceLowHighlands_00 = Le linee di cresta lampeggiano luminose in UV lungo cicatrici di crateri, sottolineando quanto duramente Airmed sia stata colpita nella sua lunga vita.
        #GEPscience_tantares_ultraviolet_light_camera_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani scuri sono quasi un vuoto in UV, spezzato da pochi puntini luminosi che sembrano polvere fosforescente rovesciata.
        #GEPscience_tantares_ultraviolet_light_camera_AirmedInSpaceLowDarkenedMidlands_00 = Un confine UV netto marca le pianure scure, la transizione è così pulita da sembrare dipinta, finché non cambia con l'angolo.
