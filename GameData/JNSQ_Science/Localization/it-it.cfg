        #JNSQscience_SEDA_MohoInSpaceHigh_01 = Più in alto, le letture si uniformano in condizioni dure e solari: ioni energetici, radiazione intensa e pochissimo perdono. La scheda di test registra alcuni single-event upset e poi finge che fosse tutto normale.
        #JNSQscience_SEDA_MohoInSpaceHigh_01 = I canali dei neutroni e degli ioni pesanti mostrano un flusso persistentemente elevato rispetto ai quartieri più tranquilli. I campioni di esposizione restano integri, ma sembrano aver rivalutato la propria scelta di carriera.
        #JNSQscience_SEDA_EveInSpaceLow_00 = Sfiorando l'alta atmosfera spessa di Eve, il SEDA vede strutture di plasma dense e particelle reattive che rosicchiano le piastre di esposizione. I campioni di superficie sarebbero gelosi di tutta questa chimica.
        #JNSQscience_SEDA_EveInSpaceLow_01 = I conteggi di particelle ad alta energia restano scomodamente vivaci senza un campo magnetico che le calmi. La valutazione dell'elettronica annota "stranezze intermittenti" e lo sottolinea due volte.
        #JNSQscience_SEDA_EveInSpaceHigh_00 = Più lontano, l'influenza di Eve sfuma in un ambiente spaziale ricco di radiazione con occasionali impennate. Il SEDA registra diligentemente ogni picco mentre tu fissi i log di errore come un falco.
        #JNSQscience_SEDA_EveInSpaceHigh_01 = I sensori catturano deboli firme di fuga atmosferica mescolate al fondo di particelle. Il rack dei materiali segnala erosione lieve e indignazione enorme.
        #JNSQscience_SEDA_GillyInSpaceLow_00 = Vicino a Gilly, il rivelatore di polvere si accende ogni volta che la micro-luna si mette in mezzo a qualcosa che si muove veloce. Le piastre di esposizione tornano con qualche "souvenir" microscopico.
        #JNSQscience_SEDA_GillyInSpaceLow_01 = Con quasi zero gravità e nessuna atmosfera, l'ambiente è soprattutto particelle grezze più qualunque detrito abbia voglia di passare di lì. La scheda elettronica supera il test, principalmente perché è troppo semplice per discutere.
        #JNSQscience_SEDA_GillyInSpaceHigh_00 = Molto sopra Gilly, il SEDA misura un baseline spaziale pulito con variazioni occasionali dovute all'attraversamento del sistema più ampio di Eve. I grafici sembrano calmi finché non fai zoom.
        #JNSQscience_SEDA_GillyInSpaceHigh_01 = Ioni pesanti e particelle energetiche forniscono uno stress test costante per l'hardware a lunga durata. I campioni di materiale restano invariati, il che è o una buona notizia o un preludio.
        #JNSQscience_SEDA_KerbinInSpaceLow_00 = Il SEDA segnala un flusso costante di ossigeno atomico e particelle cariche che rosicchiano i pannelli di esposizione. La scheda di test dell'elettronica suggerisce più schermatura e meno briciole di snack nei connettori.
        #JNSQscience_SEDA_KerbinInSpaceLow_01 = I sensori di plasma catturano deboli "respiri" dell'alta atmosfera di Kerbin, più un ping costante di polvere e detriti minuscoli. Il Controllo Missione lo archivia come "normale eccitazione operativa".
        #JNSQscience_SEDA_KerbinInSpaceHigh_00 = Vicino al bordo della zona di comfort magnetica di Kerbin, i contatori di particelle salgono e scendono in ampie onde. Inizi a sincronizzare i controlli sensibili con i tratti più quieti.
        #JNSQscience_SEDA_KerbinInSpaceHigh_01 = Qui i canali dei neutroni e degli ioni pesanti assomigliano molto di più allo spazio grezzo. Il rack dei materiali sembra a posto, ma il dosimetro pare personalmente offeso.
        #JNSQscience_SEDA_MunInSpaceLow_00 = Senza aria dietro cui nascondersi, il quartiere del Mun è vento solare puro e polvere da impatto. Le piastre testimone tornano con una rispettabile collezione di minuscoli colpi da "sabbiatura".
        #JNSQscience_SEDA_MunInSpaceLow_01 = Il pacchetto plasma mappa una scia netta mentre sfiori basso la superficie grigia. Il tracciato delle particelle sembra uno scarabocchio finché non realizzi che è estremamente ripetibile.
        #JNSQscience_SEDA_MunInSpaceHigh_00 = Molto sopra Mun, campi lontani e plasma in fluttuazione cambiano a volte la miscela ionica di colpo. La valutazione dell'elettronica lo registra come "interessante" e "fastidioso", in quest'ordine.
        #JNSQscience_SEDA_MunInSpaceHigh_01 = Le letture di radiazione sono per lo più calme, interrotte da brevi rovesci di particelle che fanno crepitare i contatori. Ricontrolli ogni connettore, giusto per sicurezza: magari l'universo sta giudicando il tuo cablaggio.
        #JNSQscience_SEDA_MinmusInSpaceLow_00 = I conteggi di polvere restano quasi a zero finché un piccolo lampo di superficie non manda un picco di breve durata nei sensori. I campioni di esposizione raccolgono un velo di graniglia pallida che sembra sospettosamente "al gusto snack".
        #JNSQscience_SEDA_MinmusInSpaceLow_01 = La densità del plasma è sottile, ma il SEDA è felice di registrare numeri che non siano solo "quasi niente". L'elettronica supera il test di noia a pieni voti.
        #JNSQscience_SEDA_MinmusInSpaceHigh_00 = Più lontano, l'ambiente di particelle oscilla tra letture influenzate da Kerbin e baseline di spazio profondo. Minmus sembra accontentarsi di esistere in silenzio mentre tu misuri tutto.
        #JNSQscience_SEDA_MinmusInSpaceHigh_01 = Impatti di ioni pesanti innescano un paio di singhiozzi single-event perfettamente registrati sulla scheda di test. Il vassoio materiali resta ostinatamente invariato, come se volesse sembrare professionale.
        #JNSQscience_SEDA_DunaInSpaceLow_00 = I contatori del SEDA iniziano a "scricchiolare" mentre sfiori il bordo polveroso dell'aria di Duna. I sensori di plasma insistono che la foschia rossa ha opinioni elettriche.
        #JNSQscience_SEDA_DunaInSpaceLow_01 = Una debole esosfera e tanta polvere fine producono un segnale pasticciato. Le piastre di esposizione tornano leggermente pepate, come se Duna avesse provato a "condire" la navicella.
        #JNSQscience_SEDA_DunaInSpaceHigh_00 = Più in alto, le letture scivolano verso radiazione dura e ioni energetici con meno distrazioni. La scheda di test dell'elettronica registra qualche singhiozzo single-event e poi finge che non sia successo nulla.
        #JNSQscience_SEDA_DunaInSpaceHigh_01 = Quassù Duna offre poca protezione da tempeste di particelle e radiazione di fondo. Il SEDA raccomanda "più schermatura" con un tono che fa capire che ha visto il tuo budget.
        #JNSQscience_SEDA_IkeInSpaceLow_00 = Il sensore di polvere registra una pioggerellina costante di granelli minuscoli vicino a Ike, probabilmente sollevati da impatti e sfortuna. I conteggi di neutroni saltano ogni volta che la superficie entra nel campo di vista.
        #JNSQscience_SEDA_IkeInSpaceLow_01 = Le tracce di ioni pesanti disegnano linee pulite sul rivelatore, e il rack dei materiali raccoglie micro-colpi. L'ambiente è quieto, ma è quel tipo di quieto che morde lo stesso.
        #JNSQscience_SEDA_IkeInSpaceHigh_00 = Più lontano da Ike, i dati si levigano in baseline di spazio profondo con picchi occasionali. Lo strumento li annota con calma mentre tu controlli la power bus tre volte.
        #JNSQscience_SEDA_IkeInSpaceHigh_01 = Il SEDA cattura deboli firme di particelle cariche in fluttuazione attraverso il sistema di Duna. I campioni di esposizione cambiano poco, il che in qualche modo sembra una sfida personale.
        #JNSQscience_SEDA_EdnaInSpaceLow_00 = Il SEDA conferma che i dintorni di Edna sono freddi, bui e sorprendentemente taglienti: particelle energetiche passano alla deriva come se fossero di casa. La scheda di test dell'elettronica raccomanda "meno esposizione a qualunque cosa".
        #JNSQscience_SEDA_EdnaInSpaceLow_01 = I conteggi di polvere restano bassi finché una debole fascia di detriti non decide che sei interessante. Le piastre di esposizione tornano con qualche micro-impatto e molta intimidazione silenziosa.
        #JNSQscience_SEDA_EdnaInSpaceHigh_00 = Lontano da Edna, i sensori si assestano su un baseline di spazio profondo: plasma sottile, radiazione persistente e lunghi tratti di "niente" che però si somma. Perfetto per stress-testare componenti che credevi robusti.
        #JNSQscience_SEDA_EdnaInSpaceHigh_01 = Le tracce di ioni pesanti compaiono come firme ordinate sul rivelatore. Il rack dei materiali cambia poco—finché non noti quanto rapidamente cambia il dosimetro.
        #JNSQscience_SEDA_DakInSpaceLow_00 = La "zona patata" di Dak è un posto disordinato: la polvere va a picchi ogni volta che qualcosa tocca la superficie, e i contatori si accendono come se avessi preso a calci un formicaio al rallentatore. Il SEDA lo etichetta "pericoli particolati in prossimità del corpo".
        #JNSQscience_SEDA_DakInSpaceLow_01 = Le letture del plasma formano una scia nervosa mentre sfiori la roccia bitorzoluta. La valutazione dell'elettronica registra qualche singhiozzo single-event e poi finge che stesse solo lampeggiando.
        #JNSQscience_SEDA_DakInSpaceHigh_00 = Più in alto, la polvere si calma e il pacchetto strumenti registra soprattutto spazio grezzo più qualche granello in fluttuazione. È abbastanza tranquillo da sentire ogni minuscolo colpo sullo scafo.
        #JNSQscience_SEDA_DakInSpaceHigh_01 = Radiazione e ioni pesanti forniscono un fondo costante ottimo per test di esposizione a lungo termine. I campioni restano stoici, come se avessero accettato la descrizione del lavoro.
        #JNSQscience_SEDA_DresInSpaceLow_00 = Vicino a Dres, il sensore di polvere del SEDA resta occupato con un filo costante di micrometeoroidi dai detriti circostanti. I pannelli di esposizione tornano leggermente butterati, come sabbiati dalla pazienza.
        #JNSQscience_SEDA_DresInSpaceLow_01 = Il pacchetto plasma segnala flussi sottili e vaganti che non si curano minimamente della tua orbita. I contatori di particelle a volte impennano, giusto per assicurarsi che tu stia prestando attenzione.
        #JNSQscience_SEDA_DresInSpaceHigh_00 = Lontano da Dres, l'ambiente si leviga in un profilo interplanetario pulito con un fondo di radiazione ostinato. La scheda di test dell'elettronica lo definisce "eccellente per scovare saldature deboli".
        #JNSQscience_SEDA_DresInSpaceHigh_01 = Gli eventi di ioni pesanti arrivano come minuscoli errori di burocrazia cosmica—rari, casuali e sempre nel momento peggiore. Il SEDA li registra con soddisfazione mentre tu ricontrolli la procedura di reboot.
        #JNSQscience_SEDA_JoolInSpaceLow_00 = I canali di particelle del SEDA saturano a raffiche mentre le fasce di radiazione intrappolata di Jool martellano i rivelatori. La valutazione dell'elettronica registra diverse "decisioni inaspettate" da parte di circuiti perfettamente innocenti.
        #JNSQscience_SEDA_JoolInSpaceLow_01 = I sensori di plasma mappano correnti rapide e intrecciate attorno al gigante verde. I pannelli di esposizione invecchiano visibilmente in minuti, il che è scientificamente utile ed emotivamente spiacevole.
        #JNSQscience_SEDA_JoolInSpaceHigh_00 = Più lontano, le letture si rilassano in un flusso più regolare di vento solare e particelle ad alta energia. Il SEDA è felice di vedere numeri che non urlano subito.
        #JNSQscience_SEDA_JoolInSpaceHigh_01 = I conteggi di ioni pesanti e neutroni restano più alti di quanto vorresti, ma almeno sono prevedibili. La scheda di test smette di riavviarsi da sola per pura ripicca.
        #JNSQscience_SEDA_LaytheInSpaceLow_00 = Ossigeno atomico e particelle cariche si alleano per "lucidare" i campioni di esposizione. Il SEDA raccomanda rivestimenti che non reagiscano come se venissero insultati sul personale.
        #JNSQscience_SEDA_LaytheInSpaceLow_01 = Le misure di plasma mostrano un'interazione intensa tra l'atmosfera di Laythe e il meteo spaziale di Jool. I contatori di particelle cinguettano come uccelli eccitati, solo che gli uccelli sono radiazione.
        #JNSQscience_SEDA_LaytheInSpaceHigh_00 = Più in alto sopra Laythe, l'ambiente assomiglia allo spazio del sistema di Jool con picchi occasionali. La valutazione dell'elettronica cattura un single-event upset pulito e lo etichetta "da manuale", mentre tu lo etichetti "ahia".
        #JNSQscience_SEDA_LaytheInSpaceHigh_01 = La polvere resta bassa, ma gli ioni energetici rimangono ostinatamente presenti. Il rack dei materiali segnala erosione lenta e ansia veloce.
        #JNSQscience_SEDA_VallInSpaceLow_00 = Il SEDA registra sputtering di particelle cariche mentre ioni energetici sfiorano la superficie di Vall e sollevano una sottile foschia di ioni e granelli. Le piastre di esposizione tornano con micro-cicatrici da "brina".
        #JNSQscience_SEDA_VallInSpaceLow_01 = I canali dei neutroni e degli ioni pesanti salgono ogni volta che la superficie è sotto di te. La scheda elettronica supera il test, ma solo dopo un momento drammatico di "si è appena resettata?".
        #JNSQscience_SEDA_VallInSpaceHigh_00 = Lontano da Vall, il plasma si assottiglia in un flusso di fondo uniforme con occasionali impennate nette. Il SEDA annota le impennate con una calma professionale che tu non condividi.
        #JNSQscience_SEDA_VallInSpaceHigh_01 = La radiazione resta uno stress test costante per materiali e componenti. I coupon dei campioni sembrano a posto: il dosimetro sembra compiaciuto.
        #JNSQscience_SEDA_TyloInSpaceLow_00 = Vicino a Tylo, gli impatti di polvere ticchettano sui sensori come grandine minuscola. I rivelatori di particelle restano occupati e i pannelli di esposizione accumulano una puntinatura irritantemente uniforme.
        #JNSQscience_SEDA_TyloInSpaceLow_01 = Il pacchetto plasma cattura una scia pulita mentre voli basso. La valutazione dell'elettronica registra rumore indotto e suggerisce di instradare i cavi "letteralmente ovunque altrove".
        #JNSQscience_SEDA_TyloInSpaceHigh_00 = Più in alto, il SEDA vede un baseline di particelle più pulito con meno picchi di polvere. Il canale degli ioni pesanti piazza comunque colpi occasionali che fanno lampeggiare la scheda di test come se stesse pensando.
        #JNSQscience_SEDA_TyloInSpaceHigh_01 = I dati di esposizione a lunga durata sono eccellenti per gli studi di invecchiamento dei componenti. L'espressione "eccellenti per" sta facendo un lavoro enorme qui.
        #JNSQscience_SEDA_BopInSpaceLow_00 = Vicino a Bop, il sensore di polvere impennna ogni volta che la superficie bitorzoluta viene "nudged" da qualcosa che si muove veloce. Le piastre di esposizione tornano con qualche piccola ammaccatura e molte domande.
        #JNSQscience_SEDA_BopInSpaceLow_01 = Le letture del plasma sono sottili e nervose, ma misurabili, soprattutto nella scia irregolare di Bop. Il SEDA insiste che questo conta come "struttura", anche se sembra uno scarabocchio.
        #JNSQscience_SEDA_BopInSpaceHigh_00 = Più lontano, i dati si levigano nel fondo del sistema di Jool con occasionali raffiche energetiche. La scheda di test dell'elettronica le registra educatamente e poi ricontrolla in silenzio la propria memoria.
        #JNSQscience_SEDA_BopInSpaceHigh_01 = Gli ioni pesanti forniscono uno stress test lento e costante per l'hardware. Il rack dei materiali resta invariato, e questo suona sospetto.
        #JNSQscience_SEDA_PolInSpaceLow_00 = L'ambiente di Pol è soprattutto particelle grezze più una debole foschia in fluttuazione di polvere finissima. Il SEDA la raccoglie diligentemente, come se stesse costruendo un giardino microscopico.
        #JNSQscience_SEDA_PolInSpaceLow_01 = La radiazione resta moderata finché un picco improvviso non fa crepitare tutti i contatori insieme. La valutazione dell'elettronica segna l'evento come "formativo per il carattere".
        #JNSQscience_SEDA_PolInSpaceHigh_00 = Molto sopra Pol, i sensori catturano un baseline pulito interrotto da brevi impennate di particelle dal sistema più ampio di Jool. I grafici sembrano calmi finché non fai zoom e inizi a sudare.
        #JNSQscience_SEDA_PolInSpaceHigh_01 = I campioni di esposizione mostrano erosione lenta da particelle energetiche e occasionali colpetti di micrometeoroidi. Il SEDA dichiara il dataset "pristino", che non è la stessa cosa di "sicuro".
        #JNSQscience_SEDA_LindorInSpaceLow_00 = Il SEDA segnala una "zuppa" magnetosferica molto attiva: particelle cariche arrivano a ondate, poi tornano a schiantarsi senza preavviso. La scheda di test dell'elettronica chiede in silenzio schermature più spesse.
        #JNSQscience_SEDA_LindorInSpaceLow_01 = I sensori di plasma tracciano correnti ampie attorno a Lindor, e i contatori ad alta energia crepitano come un contatore Geiger troppo entusiasta. Le piastre di esposizione invecchiano abbastanza in fretta da notarlo.
        #JNSQscience_SEDA_LindorInSpaceHigh_00 = Più lontano, il flusso di particelle si stabilizza in un baseline più pulito con occasionali picchi netti. I rivelatori sembrano sollevati di contare qualcosa che non sia "troppo".
        #JNSQscience_SEDA_LindorInSpaceHigh_01 = Le tracce di ioni pesanti compaiono come eventi ordinati e isolati invece che come rumore continuo. Il rack dei materiali pare invariato, ma il dosimetro sembra preso sul personale.
        #JNSQscience_SEDA_KrelInSpaceLow_00 = Vicino a Krel, il SEDA cattura scie sottili di plasma che si "agganciano" di colpo mentre la luna scivola nell'ambiente di Lindor. Gli impatti di polvere arrivano come piccoli colpetti impazienti.
        #JNSQscience_SEDA_KrelInSpaceLow_01 = I canali di particelle salgono e scendono in bande ritmiche, come se Krel orbitasse dentro un meteo invisibile. La valutazione dell'elettronica registra "stranezze intermittenti" e va avanti.
        #JNSQscience_SEDA_KrelInSpaceHigh_00 = Più lontano da Krel, le letture tornano verso il fondo del sistema di Lindor con meno picchi di polvere. I sensori di plasma continuano a insistere che riescono ancora a "vedere" il passaggio della luna.
        #JNSQscience_SEDA_KrelInSpaceHigh_01 = La radiazione resta abbastanza stabile da essere un buon test di stress a lunga durata. La scheda di test supera la prova, ma con autoverifiche sospettosamente frequenti.
        #JNSQscience_SEDA_AdenInSpaceLow_00 = In basso sopra Aden, il sensore di polvere registra brevi rovesci che sembrano granelli sollevati da impatti e poi dispersi in orbita. I coupon di esposizione tornano leggermente "pepati".
        #JNSQscience_SEDA_AdenInSpaceLow_01 = Il SEDA registra particelle energetiche che scorrono in impulsi irregolari, come se Aden entrasse e uscisse da fasce più dure. La scheda elettronica cattura un single-event upset pulito e finge di non averlo visto.
        #JNSQscience_SEDA_AdenInSpaceHigh_00 = Più in alto, il mix di particelle si leviga, lasciando un grafico dall'aria calma che però non arriva mai a "sicuro". Il rack dei materiali segnala erosione lenta e lezioni imparate in fretta.
        #JNSQscience_SEDA_AdenInSpaceHigh_01 = La densità di plasma cala, ma i canali ad alta energia restano ostinatamente attivi. Il SEDA etichetta il dataset "eccellente", che non è la stessa cosa di "piacevole".
        #JNSQscience_SEDA_HuygenInSpaceLow_00 = Vicino a Huygen, il SEDA misura un'interazione di plasma complessa attorno al mondo velato. I contatori impennano a raffiche, come se il sistema non sapesse decidere cosa fare.
        #JNSQscience_SEDA_HuygenInSpaceLow_01 = I pannelli di esposizione raccolgono un velo sottile e qualche cicatrice da particelle energetiche. La valutazione dell'elettronica raccomanda di sigillare qualunque cosa sembri avere una giunzione.
        #JNSQscience_SEDA_HuygenInSpaceHigh_00 = Più lontano, le letture si assestano sul fondo del sistema di Lindor con impennate occasionali. Le impennate arrivano sempre proprio quando smetti di guardare.
        #JNSQscience_SEDA_HuygenInSpaceHigh_01 = Gli ioni pesanti compaiono come tracce nette e isolate nella pila di rivelatori. Lo strumento le registra con calma precisione mentre tu ricontrolli la procedura di reboot.
        #JNSQscience_SEDA_RigaInSpaceLow_00 = Il SEDA registra traffico di particelle denso e vivace vicino a Riga, con firme di plasma che cambiano bruscamente nel giro di una sola orbita. I canali di radiazione salgono, poi salgono di nuovo.
        #JNSQscience_SEDA_RigaInSpaceLow_01 = Gli impatti di polvere ticchettano sui sensori come grandine minuscola, e la scheda di test dell'elettronica registra rumore in posti che dovrebbero essere silenziosi. Il rack dei materiali incassa con indifferenza professionale.
        #JNSQscience_SEDA_RigaInSpaceHigh_00 = Più in alto sopra Riga, la polvere diminuisce ma le particelle energetiche restano una presenza costante. I campioni di esposizione mostrano usura lenta e misurabile—esattamente ciò che speravi di non dover misurare.
        #JNSQscience_SEDA_RigaInSpaceHigh_01 = Le letture del plasma diventano più regolari, ma i picchi ad alta energia continuano a bucare i dati nei momenti peggiori. Il SEDA li chiama educatamente "eventi", non "problemi".
        #JNSQscience_SEDA_TalosInSpaceLow_00 = Vicino a Talos, l'ambiente spaziale sembra sottile e distante, finché una raffica improvvisa non accende tutti i contatori insieme. La valutazione dell'elettronica lo segna come "formativo per il carattere".
        #JNSQscience_SEDA_TalosInSpaceLow_01 = La polvere resta bassa, ma micro-impatti occasionali lasciano firme pulite sulle piastre. I sensori suggeriscono che Talos è quieto in quel modo che però tiene gli scontrini.
        #JNSQscience_SEDA_TalosInSpaceHigh_00 = Molto sopra Talos, il SEDA registra un baseline pulito con lunghi tratti di "niente" che però si sommano col tempo. Condizioni perfette per scovare i guasti lenti.
        #JNSQscience_SEDA_TalosInSpaceHigh_01 = I colpi di ioni pesanti arrivano raramente ma in modo decisivo, ribaltando un bit qua e là come punteggiatura cosmica. La scheda di test supera la prova, ma con una quantità sospetta di umiltà.
        #JNSQscience_SEDA_EelooInSpaceLow_00 = Il SEDA segnala un flusso di plasma sottile e sonnolento e una pioggerellina costante di particelle ad alta energia. I pannelli di esposizione restano integri, ma il dosimetro continua a salire in silenzio.
        #JNSQscience_SEDA_EelooInSpaceLow_01 = Senza alcun riparo magnetico, la radiazione cosmica scrive piccole tracce ordinate nei rivelatori. La scheda di test dell'elettronica supera la prova—lentamente, con cautela e con controlli d'errore extra.
        #JNSQscience_SEDA_EelooInSpaceHigh_00 = Molto sopra Eeloo, l'ambiente si leviga in un baseline di spazio profondo freddo, con colpi rari ma decisivi di ioni pesanti. I dati sono abbastanza puliti da mettere in ansia gli ingegneri.
        #JNSQscience_SEDA_EelooInSpaceHigh_01 = I conteggi di polvere restano quasi a zero per lunghi tratti, poi impennano per un singolo minuscolo impatto. Le piastre testimone tornano con qualche puntura perfetta, come se il vuoto avesse firmato il lavoro.
        #JNSQscience_SEDA_CelesInSpaceLow_00 = Vicino a Celes, il SEDA misura una scia di particelle netta che si "aggancia" a ogni orbita. I grafici del plasma sembrano eleganti, e nello spazio questa cosa è sospetta.
        #JNSQscience_SEDA_CelesInSpaceLow_01 = I livelli di radiazione restano "normali", eppure riescono comunque a ribaltare un bit di test nel momento peggiore. La valutazione dell'elettronica lo etichetta "atteso" e tu lo etichetti "maleducato".
        #JNSQscience_SEDA_CelesInSpaceHigh_01 = Più in alto, le letture si appiattiscono in radiazione di fondo costante e plasma raro. Il rack dei materiali segnala "cambiamento minimo", che è esattamente il motivo per cui questo è un buon test di esposizione.
        #JNSQscience_SEDA_CelesInSpaceHigh_00 = Gli eventi di ioni pesanti arrivano raramente, ma lasciano firme inequivocabili su tutta la pila di rivelatori. Il SEDA li registra come un contabile fiero di piccoli disastri.
        #JNSQscience_SEDA_TamInSpaceLow_01 = Il sensore di polvere del SEDA ticchetta di continuo, come se Tam fosse circondato da una nuvola personale di graniglia e cattive intenzioni. Le piastre di esposizione tornano leggermente sabbiate.
        #JNSQscience_SEDA_TamInSpaceLow_00 = I contatori di particelle mostrano picchi netti e nervosi mentre sfrecci vicino alla luna irregolare. La scheda di test dell'elettronica si riavvia una volta, poi finge che fosse solo stretching.
        #JNSQscience_SEDA_TamInSpaceHigh_01 = Più lontano, la polvere cala ma la radiazione resta un test di stress costante e paziente. I log a lunga durata sono eccellenti nel trovare i componenti a cui ti fidavi troppo.
        #JNSQscience_SEDA_TamInSpaceHigh_00 = La densità di plasma è bassa, eppure lo strumento cattura ancora una debole struttura nella scia di Tam. È quel tipo di "interessante" quieto che ti fa ricontrollare l'orbita.
        #JNSQscience_SEDA_HamekInSpaceLow_01 = Il SEDA registra un fondo di radiazione ostinato con occasionali impennate energetiche che arrivano senza preavviso. La valutazione dell'elettronica annota "anomalie intermittenti" e lo sottolinea due volte.
        #JNSQscience_SEDA_HamekInSpaceLow_00 = Gli impatti di polvere compaiono come colpetti isolati, seguiti da lunghi silenzi. Le piastre testimone tornano con qualche ammaccatura microscopica, come se Hamek avesse tirato sassolini alla navicella.
        #JNSQscience_SEDA_HamekInSpaceHigh_01 = Molto sopra Hamek, l'ambiente si assesta in misure di spazio profondo fredde e pulite. I dati sembrano calmi, ma il canale degli ioni pesanti si rifiuta di smettere di ricordarti dove sei.
        #JNSQscience_SEDA_HamekInSpaceHigh_00 = I campioni di esposizione cambiano lentamente—quasi con educazione—mentre i rivelatori continuano a contare particelle che non dormono mai. Il SEDA raccomanda "monitoraggio continuato", che in scienziatese vuol dire "non rilassarti".
        #JNSQscience_SEDA_NaraInSpaceLow_01 = Il SEDA assaggia l'alta ionosfera di Nara: strati sottili di plasma, particelle cariche alla fluttuazione e una foschia costante di idrogeno atomico che vuole mangiarsi i rivestimenti.
        #JNSQscience_SEDA_NaraInSpaceLow_01 = I sensori mappano correnti ampie e ordinate che suggeriscono un campo magnetico "normale" che fa il suo lavoro. La scheda di test dell'elettronica registra comunque qualche bit-flip scontroso.
        #JNSQscience_SEDA_NaraInSpaceHigh_00 = Più in alto, le letture si appiattiscono in un baseline più duro di vento solare e particelle ad alta energia. Il rack dei materiali comincia la sua lenta, paziente discussione persa con la radiazione.
        #JNSQscience_SEDA_NaraInSpaceHigh_01 = Il SEDA cattura colpi occasionali di ioni pesanti che arrivano come punteggiatura cosmica. La valutazione del dispositivo annota "single-event upsets" mentre tu annoti "single-event infarti".
        #JNSQscience_SEDA_AmosInSpaceLow_00 = Amos non ha atmosfera e non ha pietà: la polvere picchietta le piastre e l'ambiente di particelle di Nara fa il resto. I contatori crepitano come se volessero avvisarti personalmente.
        #JNSQscience_SEDA_AmosInSpaceLow_01 = Le letture del plasma formano una scia netta mentre passi basso sopra la luna scura. La scheda elettronica supera il test controllando ripetutamente se è ancora viva.
        #JNSQscience_SEDA_AmosInSpaceHigh_00 = Più lontano, la polvere si cheta, ma il fondo di radiazione resta ostinato. Il SEDA lo etichetta "ideale per esposizione di lunga durata", che è scienziatese per "per favore no".
        #JNSQscience_SEDA_AmosInSpaceHigh_01 = Il flusso di particelle sale e scende come se un meteo spaziale invisibile stesse passando a spazzate. Lo strumento lo registra con calma: tu programmi riavvii extra, per sicurezza.
        #JNSQscience_SEDA_EnonInSpaceLow_00 = Il SEDA rileva granelli di ghiaccio carichi e particelle sputterate che sfiorano la superficie pallida di Enon. I campioni di esposizione tornano con piccole cicatrici da "bruciatura di gelo".
        #JNSQscience_SEDA_EnonInSpaceLow_01 = I canali ad alta energia impennano ogni volta che Enon attraversa fasce più dure attorno a Nara. La scheda di test dell'elettronica registra un upset pulito, poi finge che fosse solo un battito di ciglia.
        #JNSQscience_SEDA_EnonInSpaceHigh_00 = Più in alto sopra Enon, il plasma si assottiglia in un flusso debole e costante con impennate occasionali. I rivelatori sembrano sollevati di contare qualcosa che non sia "silenzio freddo".
        #JNSQscience_SEDA_EnonInSpaceHigh_01 = Raggi cosmici e ioni pesanti lasciano tracce ordinate nella pila di sensori. Il rack dei materiali cambia a malapena: il dosimetro continua a salire come se ne andasse fiero.
        #JNSQscience_SEDA_PraxInSpaceLow_00 = Vicino a Prax, il sensore di polvere ticchetta a raffiche irregolari, come se la luna di frontiera fosse circondata da graniglia vagante e cattivo tempismo. Le piastre testimone tornano leggermente "pepate".
        #JNSQscience_SEDA_PraxInSpaceLow_01 = I contatori di particelle mostrano un fondo costante con picchi netti improvvisi che fanno fare alla scheda elettronica una rapida autoverifica. Il SEDA lo chiama "variabilità ambientale".
        #JNSQscience_SEDA_PraxInSpaceHigh_00 = Molto sopra Prax, i dati si levigano in baseline puliti di spazio profondo: plasma sottile, radiazione persistente e lunghi tratti di "niente" che però si sommano.
        #JNSQscience_SEDA_PraxInSpaceHigh_01 = I rari colpi di ioni pesanti arrivano con abbastanza sicurezza da ribaltare un bit e andarsene. La valutazione del dispositivo raccomanda schermature migliori con il tono di un istruttore deluso.

        // === StationPartsExpansionRedux ===
        // sspxFishStudy
        #JNSQscience_sspxFishStudy_SunFlyingHigh_00 = La vasca inizia a sembrare un bollitore. I pesci migrano nell'"angolo freddo" e fulminano il termostato con lo sguardo.
        #JNSQscience_sspxFishStudy_SunFlyingHigh_01 = Il dosimetro prende un colore entusiasmante. I pesci reagiscono comportandosi come se fosse colpa tua, sul personale.
