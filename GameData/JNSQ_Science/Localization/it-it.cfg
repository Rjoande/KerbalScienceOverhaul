        #JNSQscience_bd_multiSpec_EnonInSpaceLowPoles_00 = Le regioni polari si dividono in riflessi accecanti e profonde ombre gelide che non si scaldano mai del tutto. Le trappole fredde sembrano mettere da parte qualcosa per dopo.
        #JNSQscience_bd_multiSpec_PraxInSpaceHigh_00 = Da un'orbita alta, Prax sembra una biglia sbiadita con uno spettro che non sa decidersi tra roccia e ghiaccio. La risposta media è "entrambi", detta con sicurezza.
        #JNSQscience_bd_multiSpec_PraxInSpaceLowLowlands_00 = Le pianure mostrano una firma più morbida e più polverosa e maggiore inerzia termica del terreno circostante. La superficie sembra pronta a sollevarsi in una nuvola se si spaventa.
        #JNSQscience_bd_multiSpec_PraxInSpaceLowMidlands_00 = Il contrasto multibanda rivela ampi gradienti che non compaiono in alcun singolo canale. È come se ci fosse una seconda mappa nascosta sotto la prima.
        #JNSQscience_bd_multiSpec_PraxInSpaceLowHighlands_00 = Gli altipiani si illuminano nei canali a onda corta e mostrano depressioni di assorbimento più nette, suggerendo affioramenti più puliti. Ciò che ricopre le pianure qui non arriva con la stessa facilità.
        #JNSQscience_bd_multiSpec_PraxInSpaceLowMountains_00 = Il rilievo ripido produce ombre violente, ma l'infrarosso delinea comunque le creste con bordi termici nitidi. Le montagne sembrano denti rotti in falsi colori.
        #JNSQscience_bd_multiSpec_PraxInSpaceLowPoles_00 = Il terreno polare si raffredda in fretta e mantiene ombre profonde ad alto contrasto con chiazze luminose persistenti. I poli sembrano tranquilli, e non è mai rassicurante.

        // bd_orbitalScope
        #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthPolarZone_00 = Il telescopio prova a seguire la zona polare settentrionale del sole, ma l'abbagliamento continua a trasformare le foto in arte moderna.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthSubpolarZone_00 = La zona sub-polare settentrionale mostra una marezzatura fine quasi "in pattern", finché non si sposta e ti ricorda che è tutta decisamente viva.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthTemperateZone_00 = La zona temperata settentrionale presenta lunghe striature e nodi di luce: l'ottica segnala "troppo luminoso" con sorprendente emotività.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthTropicZone_00 = Archi brillanti e texture aggrovigliate nella zona tropicale settentrionale fanno lavorare lo stabilizzatore come se venisse pagato a correzione.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowEquatorialZone_00 = La zona equatoriale è un mare di dettagli in ebollizione: raccogli abbastanza dati da scaldare la stampante solo a pensarci.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthTropicZone_00 = La zona tropicale meridionale sfarfalla di strutture irrequiete, e ogni fotogramma sembra diverso prima ancora di finire il download.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthTemperateZone_00 = La zona temperata meridionale mostra bande ampie che non restano mai ferme, come se il sole stesse rimescolando da solo le sue strisce.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthSubpolarZone_00 = La zona sub-polare meridionale rivela sottili chiazze più scure: la squadra ci litiga sopra finché qualcuno non ricorda che è il sole.
        #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthPolarZone_00 = La zona polare meridionale è tutto contrasto duro e texture strana: aggiungi "non fissare" alle note di missione.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowPoles_00 = Una depressione pericolosamente profonda ai poli continua a comparire nelle immagini. Gli scienziati iniziano subito a proporre atterraggi "prudenti" lì.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowLowlands_00 = I bassopiani sembrano più lisci dall'orbita, ma il telescopio intercetta comunque innumerevoli piccoli impatti nascosti sotto una crosta cotta sottile.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowPolarIceCraters_00 = I crateri polari ghiacciati ospitano chiazze luminose appiccicate alle pareti in ombra: il telescopio le segnala come insolitamente riflettenti, e nessuno vuole dirne il motivo ad alta voce.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowHighlands_00 = Le colline sono un caos di dorsali e terrazze, come se la superficie avesse provato a raggrinzirsi per scappare dal sole e avesse finito il tempo.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowMidlands_00 = Le pianure formano ampi gradoni stanchi tra gli estremi, con striature sottili che suggeriscono un terreno sabbiato per ere.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowCraters_00 = Ci sono così tanti crateri sovrapposti che l'edge-detection inizia a disegnare cerchi sopra altri cerchi, giusto per farcela.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowExoticCraters_00 = Questi crateri esotici non assomigliano ai vicini: bordi strani, ombre sospette e pattern che fanno ai geologi gravare sullo zoom.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowRareCraters_00 = Alcuni crateri rari restano netti e puliti, come se si fossero formati ieri e avessero immediatamente rimpianto il quartiere.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowVoronoiCraters_00 = Il campo di crateri di Voronoi si spezza in un bizzarro mosaico cellulare, convincendo qualcuno che la fotocamera stia facendo compiti di geometria di nascosto.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowNotableCraters_00 = Un cratere tra i crateri notevoli spicca con un bordo nitido e un drammatico spruzzo di ejecta, praticamente implorando di diventare un riferimento di navigazione.
        #JNSQscience_bd_orbitalScope_MohoInSpaceLowPeaks_00 = I picchi più alti proiettano ombre sottili come aghi sulla distesa di macerie: il telescopio ottiene un contrasto fantastico e il pilota un'ansia fantastica.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowLowlands_00 = Il telescopio distingue ampie distese viola nei bassopiani, con pattern morbidi e in movimento: la superficie di Eve sembra ridipingersi di continuo.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowMidlands_00 = Le pianure mostrano lievi rilievi e conche poco profonde con lunghe strisce di vento, come se il terreno venisse pettinato da un pennello invisibile.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowMountains_00 = Le montagne sono dorsali scure e ripide che tagliano la foschia: le ombre sembrano abbastanza pesanti da avere gravità propria.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowShores_00 = La costa forma scallop e barre disordinate, come se i mari viola non riuscissero a decidere dove dovrebbe finire la terra.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowPolarLakes_00 = I laghi polari brillano tra croste più scure: li etichetti "interessanti" e "probabilmente non potabili".
        #JNSQscience_bd_orbitalScope_EveInSpaceLowPetrolLakes_00 = I laghi di petrolio assorbono luce come inchiostro versato: le impostazioni di esposizione protestano per tutto il passaggio.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofAkron_00 = Sul mare di Akron si vedono marezzature e striature deboli che sembrano correnti lente sotto una foschia spessa e testarda.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofNessus_00 = Il mare di Nessus riflette quanto basta per delineare bande simili a onde: il pattern si ripete un po' troppo ordinato per sentirsi tranquilli.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofTaniwha_00 = Il mare di Taniwha ha un bordo frastagliato di bassi fondali, suggerendo che il "mare" stia facendo geologia in proprio.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofGigan_00 = Sopra il mare di Gigan il telescopio cattura ampie strisce scure, come se qualcosa avesse trascinato un pennello sulla superficie.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofRodan_00 = Il mare di Rodan sembra insolitamente uniforme, finché lo zoom non rivela sottili strie parallele che lo attraversano.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofGojira_00 = Il mare di Gojira è un vuoto viola profondo con qualche flebile punto chiaro: la squadra discute se sia schiuma, ghiaccio o speranza.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofGhidorah_00 = La superficie del mare di Ghidorah mostra bande ramificate che sembrano flussi, anche se è difficile dire cosa significhi "flusso" qui.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofBagorah_00 = Il mare di Bagorah è incorniciato da nette rotture costiere: il telescopio lo registra come ottimo riferimento per cucire le mappe.
        #JNSQscience_bd_orbitalScope_EveInSpaceLowKrakensWell_00 = KrakensWell è una depressione scura inquietante: perfino dall'orbita sembra che al pianeta manchi un pezzo che si è "dimenticato" di riempire.
        #JNSQscience_bd_orbitalScope_GillyInSpaceLowLowlands_00 = I bassopiani sono un mosaico di piccoli massi e avvallamenti bassi, come se la gravità avesse chiesto gentilmente a tutto di restare fermo.
        #JNSQscience_bd_orbitalScope_GillyInSpaceLowMidlands_00 = Le pianure scorrono in ondulazioni grumose senza un pattern chiaro: il telescopio conclude che Gilly sia stata assemblata con gli avanzi.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowArcticSea_00 = Il telescopio risolve le lastre di ghiaccio fratturate sul mare artico, costringendo il software di elaborazione a fare gli straordinari.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridHighlands_00 = Crateri e dorsali secche nelle colline aride proiettano ombre nette, perfette per ottime misure stereoscopiche.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridLowlands_00 = Dune scolpite dal vento nei bassopiani aridi disegnano vortici e striature, come se qualcuno si esercitasse nella calligrafia con la sabbia.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridMidlands_00 = Le pianure aride mostrano vaste distese polverose con deboli canali che somigliano in modo sospetto a scorciatoie prosciugate.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridMountains_00 = Le montagne aride appaiono frastagliate e assetate: perfino le nuvole evitano di avvicinarsi troppo.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowEasternSea_00 = Il luccichio del sole sul mare orientale continua a bruciare le alte luci: il Controllo Missione lo definisce "artistico".
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowForemansSea_00 = Il mare di Foreman è punteggiato da piccole scie e pattern di onde, perfetti per calibrare il mosso.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowGreatLake_00 = Il Grande Lago sta lì come una bibita rovesciata sul continente, con curve costiere che puoi seguire fotogramma per fotogramma.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowHighlands_00 = A questa quota le colline sono una coperta stropicciata di rilievi e valli, e il telescopio scova nuove dorsali a ogni passaggio.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowIceCaps_00 = Le calotte ghiacciate riflettono così tanta luce che l'ottica implora un filtro più scuro.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowInlandWater_00 = Le acque interne brillano tra le forme del terreno, sembrando più specchi sparsi che un singolo corpo d'acqua.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowKreenwichSea_00 = La costa del mare di Krenwich traccia una linea di riferimento ordinata: la squadra di navigazione inizia subito a discutere su dove dovrebbe stare lo "zero".
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowLowlands_00 = I bassopiani sembrano lisci e affollati, con sottili nastri di terreno che potrebbero essere strade... o solo speranze.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowMidlands_00 = Le pianure sono un mosaico di pendii gentili che fa sembrare la lettura di quota stranamente personale.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowNorthernSea_00 = Le ombre delle nuvole corrono sul mare settentrionale e trasformano il tuo "semplice" passaggio fotografico in un esperimento di tempi.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowSub-ArcticSea_00 = Il mare sub-artico mostra ghiaccio spezzato che avanza su acqua più scura, come se il pianeta stesse scarabocchiando con due colori.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowTriangulusSea_00 = Il mare del Triangolo da quassù è sospettosamente geometrico: l'equipaggio cerca di trovare il terzo punto.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowWelcomeBackIsland_00 = L'Isola del Ritorno è un puntino di terra che continua a finire al centro degli scatti, come se sapesse che la fotocamera è accesa.
        #JNSQscience_bd_orbitalScope_KerbinInSpaceLowWesternSea_00 = Il mare occidentale scorre sotto il veicolo in un blu infinito, e il telescopio coglie alcune linee stranamente dritte che probabilmente sono solo onde.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowExoticCraters_00 = Il telescopio distingue forme di crateri strane nella regione dei crateri esotici: niente sembra aver colpito con un'angolazione ragionevole.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowLowlands_00 = I bassopiani del Mun sono più lisci e scuri, una pausa gradita dagli infiniti buchi... quasi.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowMountains_00 = Le montagne del Mun proiettano lunghe ombre seghettate che ti fanno apprezzare di osservare da quassù.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowNotableCraters_00 = I crateri notevoli spiccano con bordi luminosi ed ejecta disordinata: quasi senti gli impatti riecheggiare nei dati.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowPolarIceCraters_00 = Chiazze luminose nei crateri polari ghiacciati scintillano ai bordi delle ombre, stuzzicando gli scienziati con "forse" e "probabile".
        #JNSQscience_bd_orbitalScope_MunInSpaceLowPoles_00 = Ai poli il sole sfiora l'orizzonte, trasformando ogni rilievo in una silhouette drammatica.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowRareCraters_00 = I crateri rari appaiono isolati e nitidi, come se Mun avesse conservato i suoi migliori bozzi per le occasioni speciali.
        #JNSQscience_bd_orbitalScope_MunInSpaceLowVoronoiCraters_00 = La regione dei crateri di Voronoi forma uno strano pattern poligonale che fa controllare alla squadra di mappatura i righelli due volte.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBasins_00 = I bacini sembrano cucchiaiate poco profonde nella superficie, perfette per atterrare... se ti piace la noia.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownBasins_00 = I bacini marroni sono macchie più scure in un terreno altrimenti brillante, come se Minmus avesse rovesciato qualcosa e non avesse mai pulito.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownHighlands_00 = Le colline marroni sono più ruvide e scure, con creste che sembrano raschiate da un cucchiaio gigante.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownLowlands_00 = Nei bassopiani marroni la superficie diventa spenta e chiazzata, dando all'altimetro molte scuse da fare.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownMidlands_00 = Le pianure marroni mostrano lievi rialzi con strie più scure, come se qualcuno avesse trascinato un involucro di snack sulla vernice fresca.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowHighlands_00 = Le colline di Minmus sono grumose e irregolari, smentendo il mito che questa luna sia tutta pianure ed atterraggi facili.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowLowlands_00 = I bassopiani si incurvano in ampie depressioni che fanno iniziare ai pianificatori di atterraggio a cerchiare punti con entusiasmo.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowMidlands_00 = Dall'orbita le pianure sono una zona di transizione disordinata, né piatta né ripida, ma pronta a far inciampare un pilota distratto.
        #JNSQscience_bd_orbitalScope_MinmusInSpaceLowMountains_00 = Le montagne di Minmus si alzano in ripiani e creste improvvisi che sembrano costruiti con piatti impilati.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowIceCaps_00 = Le calotte ghiacciate abbagliano il telescopio: campi di brina stratificata suggeriscono spessi depositi di ghiaccio d'acqua e di anidride carbonica.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowHighlands_00 = Le colline sembrano ruvide e spazzate dal vento, con ombre di dune appiccicate a ogni cresta come fuliggine.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowMidlands_00 = Le pianure formano ampi gradoni polverosi, con leggere striature che suggeriscono venti stagionali persistenti.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowLowlands_00 = I bassopiani sono più lisci, con campi di dune raccolti nei bacini come se qualcuno avesse rovesciato il pianeta e non avesse mai pulito.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowRareCraters_00 = Alcuni crateri restano insolitamente nitidi, con orli solo leggermente spolverati rispetto alle solite cicatrici piene di sabbia.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowVoronoiCraters_00 = I crateri si raggruppano in un curioso motivo cellulare che fa mettere in discussione al software di mosaico le proprie scelte di vita.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowNotableCraters_00 = Un cratere spicca nettamente contro il rosso con orlo ed ejecta molto contrastati: viene segnalato come perfetto punto di riferimento per la navigazione.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowExoticCraters_00 = Questi crateri sembrano sbagliati—sovrapposizioni strane, macchie luminose e orli che non assomigliano al terreno circostante.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowTrenches_00 = Lunghe fosse tagliano la superficie: la geometria supporta una vecchia incisione da materiale in flusso, poi ampliata dall'erosione.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowNotablePlains_00 = Le pianure notevoli mostrano linee intrecciate appena visibili e depressioni poco profonde, come se il suolo stesse cercando di ricordarsi quando era bagnato.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowNotableMountains_00 = Le montagne notevoli innalzano picchi affilati sopra i campi di brina vicini: alcune creste ricordano mensole crollate e congelate in posizione.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowMountains_00 = Le montagne proiettano ombre a lama di coltello, e strisce di vento attraversano i pendii in bande ordinate.
        #JNSQscience_bd_orbitalScope_DunaInSpaceLowVolcano_00 = Un singolo vulcano si alza dalla polvere: texture più scure simili a colate suggeriscono che una volta trasudasse invece di esplodere.
        #JNSQscience_bd_orbitalScope_IkeInSpaceLowMidlands_00 = Le pianure sono un groviglio di basse creste e buche poco profonde, con pochissimi impatti recenti a spiegare il caos.
        #JNSQscience_bd_orbitalScope_IkeInSpaceLowPoles_00 = Vicino ai poli, le ombre lunghe nascondono metà del terreno: macchie luminose lampeggiano entrando e uscendo mentre cambia l'angolo di luce.
        #JNSQscience_bd_orbitalScope_IkeInSpaceLowMountains_00 = Le montagne sembrano denti rotti: scie di massi segnano dove i pendii stanno collassando silenziosamente.
        #JNSQscience_bd_orbitalScope_IkeInSpaceLowHighlands_00 = Le colline mostrano terreno a blocchi e scarpate nette, come se la crosta si fosse spaccata e non si fosse mai davvero assestata.
        #JNSQscience_bd_orbitalScope_EdnaInSpaceHigh_00 = Il telescopio scruta nel buio intorno a Edna: il piccolo mondo scivola tra i campi stellari come se stesse facendo pratica con i trucchi di sparizione.
        #JNSQscience_bd_orbitalScope_EdnaInSpaceLowLowlands_00 = Le immagini dei bassopiani mostrano bacini gentili e polverosi con striature deboli, come se una deriva lenta e paziente li stesse levigando da ere.
        #JNSQscience_bd_orbitalScope_EdnaInSpaceLowMidlands_00 = Le pianure sembrano irregolari e "scabbiose" di piccoli impatti: il mosaico si ricompone in una mappa di ostinata sopravvivenza.
        #JNSQscience_bd_orbitalScope_EdnaInSpaceLowHighlands_00 = Le colline proiettano ombre nette che fanno risaltare il rilievo—finalmente, un posto su Edna che non prova a nascondersi.
        #JNSQscience_bd_orbitalScope_EdnaInSpaceLowPolarIceCraters_00 = Macchie luminose aderiscono alle ombre dei crateri polari ghiacciati: il telescopio le segnala come insolitamente riflettenti e irritantemente sfuggenti.
        #JNSQscience_bd_orbitalScope_EdnaInSpaceLowWhites_00 = Le "macchie bianche" brillano contro il terreno più scuro, dipingendo la mappa di chiazze pallide che non combaciano con nessuna storia semplice.
        #JNSQscience_bd_orbitalScope_DakInSpaceHigh_00 = Dak è appena un puntino finché il telescopio non lo aggancia: all'improvviso sembra una patata bitorzoluta che ti sfida a sbattere le palpebre per primo.
        #JNSQscience_bd_orbitalScope_DakInSpaceLowLowlands_00 = I bassopiani sono ingombri di buche poco profonde e massi sparsi, come se la superficie fosse stata assemblata con pezzi di ricambio e una scrollata di spalle.
        #JNSQscience_bd_orbitalScope_DakInSpaceLowMidlands_00 = I fotogrammi delle pianure mostrano solchi lunghi e irregolari che fanno borbottare i navigatori su "manubri" e "non atterrare lì".
        #JNSQscience_bd_orbitalScope_DakInSpaceLowHighlands_00 = Le colline salgono in rigonfiamenti nodosi con bordi ripidi: le ombre sembrano provare a trascinare il terreno di nuovo verso il basso.
        #JNSQscience_bd_orbitalScope_DresInSpaceLowPoles_00 = I poli appaiono pallidi e silenziosi, con cambiamenti di texture sottili che fanno litigare il team mappe se siano depositi o solo trucchi di luce.
        #JNSQscience_bd_orbitalScope_DresInSpaceLowHighlands_00 = Gli scatti delle colline rivelano una superficie ruvida e a blocchi—più lastre rotte che colline gentili.
        #JNSQscience_bd_orbitalScope_DresInSpaceLowMidlands_00 = Le pianure formano ampi gradoni, come se Dres avesse provato a diventare un mondo a terrazze e poi si fosse dimenticato di finire.
        #JNSQscience_bd_orbitalScope_DresInSpaceLowLowlands_00 = Le immagini dei bassopiani mostrano pianure più lisce interrotte da vecchie cicatrici: è la cosa più vicina che Dres abbia a sembrare accogliente.
        #JNSQscience_bd_orbitalScope_DresInSpaceLowCanyon_00 = Il canyon taglia una lunga linea drammatica nella superficie pallida: per una volta le impostazioni di contrasto del telescopio si prendono una pausa.
        #JNSQscience_bd_orbitalScope_JoolInSpaceLowEquatorialBands_00 = Il telescopio risolve le bande equatoriali chiare e scure in turbolenze ondulate, come se qualcuno avesse mescolato l'atmosfera con un cucchiaio.
        #JNSQscience_bd_orbitalScope_JoolInSpaceLowExposedLowerDeck_00 = Uno squarcio nella foschia superiore rivela gli strati inferiori scoperti, più scuri: il team immagini li etichetta "inquietanti, ma con un contrasto eccellente".
        #JNSQscience_bd_orbitalScope_JoolInSpaceLowSubpolarBands_00 = Le bande sub-polari sembrano attorcigliate e sfilacciate, come se i venti si divertissero a intrecciare le nubi.
        #JNSQscience_bd_orbitalScope_JoolInSpaceLowNorthPole_00 = La regione del polo nord avvita spirali strette: seguirla è come cercare di fotografare un miscelatore di vernice in fuga.
        #JNSQscience_bd_orbitalScope_JoolInSpaceLowSouthPole_00 = Il polo sud mostra un motivo di vortici del tutto diverso, e questo avvia subito una discussione molto rumorosa nella sala scienza.
        #JNSQscience_bd_orbitalScope_JoolInSpaceLowStormComplex_00 = Le formazioni temporalesche hanno bordi netti e una struttura a strati: il telescopio continua a catturare nuovi filamenti tra un fotogramma e l'altro.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowShores_00 = Il telescopio traccia coste luminose e basse acque scure: sembra invitante finché non ti ricordi che è pur sempre Laythe.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowShallows_00 = Nelle basse acque i disegni del fondale si vedono in striature pallide, trasformando il tuo "passaggio fotografico" in una sessione di batimetria.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowInlandWater_00 = Le acque interne scintillano tra le creste come specchi sparsi, perfette per calibrare l'esposizione e rovinarla nello stesso istante.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowKrenwichSea_00 = Il mare di Krenwich mostra una sottile bandatura e scie leggere: il sistema di mosaico lo segna come "sorprendentemente collaborativo".
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowArcticSea_00 = Il mare artico è chiazzato di macchie luminose e bande scure, indizi di ghiaccio o schiuma che rifiuta di restare ferma.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowJoolwardSea_00 = Sopra il mare di Jool la luce cambia in fretta: il telescopio cattura una trama di superficie che sembra correnti lente sotto la foschia.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowPolwardSea_00 = Il mare di Pol appare più scuro e calmo, ma lo zoom rivela increspature fini che tengono onesto il tuo stabilizzatore.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowHighlands_00 = Le colline sembrano aspre e levigate dal vento, con ombre lunghe che fanno sembrare i siti di atterraggio coraggiosi e discutibili.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowMountains_00 = Creste montuose affilate proiettano ombre drammatiche: il telescopio ottiene un ottimo dettaglio del rilievo e il tuo pilota si agita.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowIceCaps_00 = Le calotte ghiacciate brillano abbastanza da far strizzare gli occhi alle ottiche: il team aggiunge "portare gli occhiali da sole" alla checklist.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowEnclosedFaults_00 = Le faglie racchiuse incidono cicatrici angolari nel terreno, come se la crosta avesse provato a spaccarsi in silenzio e avesse fallito.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowLowlands_00 = I bassopiani si stendono lisci e scuri, interrotti da striature deboli che suggeriscono venti persistenti e depositi in movimento.
        #JNSQscience_bd_orbitalScope_LaytheInSpaceLowMidlands_00 = Le pianure passano in gradini disordinati tra mare e altopiani, ideali per la mappatura e per confondere gli autopiloti.
        #JNSQscience_bd_orbitalScope_VallInSpaceLowPoles_00 = I poli di Vall brillano pallidi e lisci, con lievi cambi di trama che sembrano brina a strati e ghiaccio compattato.
        #JNSQscience_bd_orbitalScope_VallInSpaceLowHighlands_00 = Le colline sono bitorzolute e spezzate, e gettano ombre frastagliate che suggeriscono ghiaccio sotto stress e vecchie fratture.
        #JNSQscience_bd_orbitalScope_VallInSpaceLowMidlands_00 = I fotogrammi delle pianure mostrano ampie ondulazioni con buche sparse, come se la superficie continuasse ad assestarsi e poi facesse finta di niente.
        #JNSQscience_bd_orbitalScope_VallInSpaceLowLowlands_00 = I bassopiani sono più uniformi e più scuri, e raccolgono detriti in conche gentili come un cumulo di neve al rallentatore.
        #JNSQscience_bd_orbitalScope_VallInSpaceLowMountains_00 = Le montagne di Vall si alzano in creste improvvise: il telescopio cattura sommità nitide che sembrano troppo affilate per qualcosa fatto di ghiaccio.
        #JNSQscience_bd_orbitalScope_TyloInSpaceLowPoles_00 = I poli sono netti e pieni di crateri: ogni passaggio aggiunge un altro cerchio alla lista "non atterrare qui".
        #JNSQscience_bd_orbitalScope_TyloInSpaceLowMountains_00 = Le montagne di Tylo gettano ombre lunghe e brutali che fanno sembrare il terreno scolpito nella pietra.
        #JNSQscience_bd_orbitalScope_TyloInSpaceLowHighlands_00 = Le colline sono aspre, blocchettose e costantemente crivellate, come se la superficie non avesse mai avuto il tempo di guarire.
        #JNSQscience_bd_orbitalScope_TyloInSpaceLowMidlands_00 = Nelle pianure, crateri sovrapposti si fondono in una trama rumorosa che continua a ingannare i rilevatori di bordi.
        #JNSQscience_bd_orbitalScope_TyloInSpaceLowLowlands_00 = I bassopiani sono più piatti ma non gentili: il telescopio rivela piccoli impatti ovunque, pronti a prendere una gamba d'atterraggio.
        #JNSQscience_bd_orbitalScope_BopInSpaceLowPoles_00 = I poli sembrano come se qualcuno avesse stropicciato leggermente la superficie e poi si fosse dimenticato di distenderla.
        #JNSQscience_bd_orbitalScope_BopInSpaceLowMountains_00 = Le "montagne" di Bop sono gobbe ripide con ombre caotiche: il telescopio non riesce a decidere quale lato sia in alto.
        #JNSQscience_bd_orbitalScope_BopInSpaceLowLowlands_00 = Le immagini dei bassopiani mostrano conche basse e massi sparsi, come se la gravità facesse rispettare le regole solo a turno.
        #JNSQscience_bd_orbitalScope_BopInSpaceLowMidlands_00 = Le pianure sono crestate e irregolari, con solchi deboli che sembrano linee di stress in una roccia molto vecchia.
        #JNSQscience_bd_orbitalScope_BopInSpaceLowHighlands_00 = Il terreno delle colline è frastagliato e bitorzoluto: ogni livello di zoom rivela un altro gradino che ti sfida ad atterrare.
        #JNSQscience_bd_orbitalScope_PolInSpaceLowPoles_00 = I poli di Pol sono luminosi e polverosi, con una grana fine che fa sembrare l'intera luna leggermente infarinata.
        #JNSQscience_bd_orbitalScope_PolInSpaceLowLowlands_00 = I bassopiani si allargano in depressioni lisce punteggiate di piccoli buchi, come se la superficie si stesse dissolvendo al rallentatore.
        #JNSQscience_bd_orbitalScope_PolInSpaceLowMidlands_00 = Le riprese delle pianure mostrano creste dolci e chiazze: il telescopio lo registra come "geologia a spallucce".
        #JNSQscience_bd_orbitalScope_PolInSpaceLowHighlands_00 = Le colline si alzano in terrazze spezzate, con bordi friabili che sembrano sul punto di cedere al primo starnuto.
        #JNSQscience_bd_orbitalScope_PolInSpaceLowMountains_00 = Le montagne di Pol sono gobbe appuntite e creste sottili: le ombre le fanno sembrare più taglienti di quanto probabilmente siano.
        #JNSQscience_bd_orbitalScope_LindorInSpaceHigh_00 = Da lontano, Lindor è un gigante blu e gelido, con indizi di movimento ovunque tu guardi.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLow_00 = Il telescopio orbitale cattura strati di nubi sovrapposti: il pianeta sembra abbastanza profondo da inghiottire il tuo segnale.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowTemperateBands_00 = Le bande temperate increspano una turbolenza fine, come se l'atmosfera venisse rimescolata appena sotto la superficie.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowExposedLowerDeck_00 = Un varco più scuro tra le nubi espone gli strati inferiori scoperti: il cursore del contrasto del telescopio si arrende all'istante.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowSubpolarBands_00 = Le bande sub-polari si sfilacciano in striature aggrovigliate, come se i venti non riuscissero a mettersi d'accordo su quale sia il "giro".
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowNorthPole_00 = La regione del polo nord ruota in un vortice stretto, con un lieve bordo più luminoso che sembra sospettosamente un bagliore aurorale.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowSouthPole_00 = Il polo sud mostra un disegno di vortici completamente diverso: gli scienziati iniziano a discutere prima che il passaggio finisca.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowStormComplex_00 = Un complesso di tempeste sboccia con struttura a strati e filamenti in coda: sembra meteo con il dente avvelenato.
        #JNSQscience_bd_orbitalScope_LindorInSpaceLowUpperStormDeck_00 = Il livello superiore della tempesta è luminoso e ricco di trama, pieno di piccoli riccioli che compaiono e svaniscono tra un fotogramma e l'altro.
        #JNSQscience_bd_orbitalScope_KrelInSpaceHigh_00 = Krel resta vicino al suo primario come una perla pallida, sfidandoti a confonderlo con le stelle sullo sfondo.
        #JNSQscience_bd_orbitalScope_KrelInSpaceLow_00 = Le riprese ravvicinate rivelano una superficie sbiancata con cuciture scure e chiazze che sembrano lividi.
        #JNSQscience_bd_orbitalScope_KrelInSpaceLowLowlands_00 = I bassopiani sono più lisci e leggermente più scuri, e raccolgono detriti fini in ampi bacini quieti.
        #JNSQscience_bd_orbitalScope_KrelInSpaceLowMidlands_00 = Le pianure mostrano creste sottili e solchi poco profondi, come se la crosta avesse provato a raggrinzirsi senza davvero impegnarsi.
        #JNSQscience_bd_orbitalScope_KrelInSpaceLowHighlands_00 = Le colline sono ruvide e a blocchi, e proiettano ombre nette che rendono ogni pendio ostile.
        #JNSQscience_bd_orbitalScope_KrelInSpaceLowPoles_00 = Ai poli, ombre lunghe nascondono il terreno: piccoli riflessi chiari compaiono e scompaiono ai bordi del buio.
        #JNSQscience_bd_orbitalScope_AdenInSpaceHigh_00 = Aden è un piccolo puntino marrone finché il telescopio non aggancia e ammette che è un posto vero, con bozzi veri.
        #JNSQscience_bd_orbitalScope_AdenInSpaceLow_00 = La superficie si risolve in pianure scure e una spolverata più chiara, come se qualcuno avesse provato a ridipingere vecchi impatti.
        #JNSQscience_bd_orbitalScope_AdenInSpaceLowLowlands_00 = I fotogrammi dei bassopiani mostrano ampie depressioni poco profonde con fondi lisci che sembrano quasi atterrabili. Quasi.
        #JNSQscience_bd_orbitalScope_AdenInSpaceLowMidlands_00 = Le pianure sono una transizione disordinata di creste e fosse, perfetta per confondere sia le mappe sia i piloti.
        #JNSQscience_bd_orbitalScope_AdenInSpaceLowHighlands_00 = Le colline sono nodose e irregolari: le ombre le fanno sembrare un campo di onde congelate.
        #JNSQscience_bd_orbitalScope_AdenInSpaceLowMountains_00 = Le montagne si alzano in terrazze improvvise e creste frastagliate, chiaramente progettate da qualcuno che non ama le gambe di atterraggio.
        #JNSQscience_bd_orbitalScope_AdenInSpaceLowPoles_00 = I poli sembrano spazzati e severi, con bordi di crateri incisi in forte contrasto sotto una luce radente.
        #JNSQscience_bd_orbitalScope_HuygenInSpaceHigh_00 = Huygen brilla d'ambra attraverso una foschia spessa, come una lampada dietro una tenda che rifiuta di aprirsi.
        #JNSQscience_bd_orbitalScope_HuygenInSpaceLow_00 = Il telescopio lotta con la foschia, ma trova comunque strati di nubi e fugaci indizi di forme della superficie sottostante.
        #JNSQscience_bd_orbitalScope_HuygenInSpaceLowLowlands_00 = I bassopiani appaiono come macchie scure attenuate sotto lo smog, con confini morbidi che cambiano da un passaggio all'altro.
