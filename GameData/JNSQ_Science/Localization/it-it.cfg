        #JNSQscience_evaReport_KerbinSrfLandedLowlands_00 = I bassopiani sembrano più caldi e morbidi delle alture. Registri "piacevole" e ti ritrovi subito fango sulla tuta.
        #JNSQscience_evaReport_KerbinSrfLandedLowlands_01 = Nei bassopiani tutto sembra piatto finché non ci inciampi. Il terreno vince ancora.
        #JNSQscience_evaReport_KerbinSrfLandedAridLowlands_00 = I bassopiani aridi sono caldi, secchi e molto determinati a infilare polvere in ogni giunto della tua tuta.
        #JNSQscience_evaReport_KerbinSrfLandedAridLowlands_01 = Fai un'EVA nei bassopiani aridi. L'orizzonte tremola e il Controllo Missione chiede se sei sicuro di non essere in piedi su un fornello.
        #JNSQscience_evaReport_KerbinSrfLandedAridMountains_00 = Nelle montagne aride, ogni cresta sembra una scalata. Prendi nota di iniziare ad apprezzare le scalate.
        #JNSQscience_evaReport_KerbinSrfLandedAridMountains_01 = Le montagne aride hanno cime drammatiche e ghiaia drammatica. Stai aggiungendo "drammatico" al rapporto.
        #JNSQscience_evaReport_KerbinSrfLandedWelcomeBackIsland_00 = Metti piede sull'Isola del Ritorno. Le onde sembrano amichevoli, ma senti ogni telecamera del Controllo Missione puntata addosso.
        #JNSQscience_evaReport_KerbinSrfLandedWelcomeBackIsland_01 = L'Isola del Ritorno è piccola, solitaria e estremamente fiera della sua aria fresca. Inspiri a fondo, poi ti ricordi che sei in tuta.
        #JNSQscience_evaReport_KerbinSrfSplashedGreatLake_00 = Ammari nel Grande Lago. È quieto, nell'entroterra, e decisamente troppo tranquillo per una tuta come questa.
        #JNSQscience_evaReport_KerbinSrfSplashedGreatLake_01 = Nel Grande Lago, l'acqua è più calma dell'oceano. Questo ti fa solo notare ogni minuscola goccia in cerca di perdite.
        #JNSQscience_evaReport_KerbinSrfSplashedInlandWater_00 = Ammari nelle acque interne. È quieto, nell'entroterra, e decisamente troppo tranquillo per una tuta come questa.
