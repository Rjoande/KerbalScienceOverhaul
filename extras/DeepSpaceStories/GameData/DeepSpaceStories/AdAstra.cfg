@EXPERIMENT_DEFINITION:HAS[#id[magnetometer]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        LindorInSpaceHigh* = #DSS_AdAstra_magnetometer_LindorInSpaceHigh_00 // Lindor’s magnetic field should look clean from up here. Instead the readout keeps “breathing,” slow pulses with no obvious cause.
		LindorInSpaceHigh* = #DSS_AdAstra_magnetometer_LindorInSpaceHigh_01 // The field lines arc outward like they’re reaching for something that isn’t there. For a moment, the magnetometer insists something reaches back.
		LindorInSpaceHigh* = #DSS_AdAstra_magnetometer_LindorInSpaceHigh_02 // A faint, steady hum rides on the signal—too regular to be noise, too persistent to be weather. You mark it as “long-running” and feel uneasy.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_00 // The nav computer insists our trajectory is perfect. The window view keeps disagreeing in small, patient ways.
		LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_01 // Mission Control wants numbers and confidence. We send numbers and keep the confidence to ourselves.
		LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_02 // Every system reports nominal, so we keep running cross-checks. The checklist is starting to feel like a superstition.
		LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_03 // Mission control wants a status update. The systems want a status update. The crew wants to stop staring at the same drifting number.
		LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_04 // We run the checklist, then run it again. Everything is nominal, except the part where nominal keeps changing.
		LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_05 // The anomaly was supposed to be theoretical. Now it’s on the navball, and everyone is suddenly very polite to the autopilot.
		LindorInSpaceHigh* = #DSS_AdAstra_crewReport_LindorInSpaceHigh_06 // No impacts, no alarms, no drama... just a quiet feeling that we are approaching something that was never shut down.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_cosmicRay]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        LindorInSpace* = #DSS_AdAstra_bd_cosmicRay_LindorInSpace_00 // Cosmic ray counts spike, then fall away in neat steps, like someone is turning a dial you can’t see.
		LindorInSpace* = #DSS_AdAstra_bd_cosmicRay_LindorInSpace_01 // The detector logs a repeating pattern buried in the noise. It’s too slow for a storm, too patient for an accident.
		LindorInSpace* = #DSS_AdAstra_bd_cosmicRay_LindorInSpace_02 // Background radiation should be boring out here. Near Lindor it feels curated. Filtered, sampled, and sent back with a timestamp that doesn’t make sense.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_gammaRay]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        LindorInSpace* = #DSS_AdAstra_bd_gammaRay_LindorInSpace_00 // The gamma-ray counter ticks in clean little bursts, then pauses as if waiting for permission to continue. Whatever is out here is still running.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_rpws]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        LindorInSpace* = #DSS_AdAstra_bd_rpws_LindorInSpace_00 // The RPWS headset fills with a thin, steady tone that refuses to drift. Space isn’t supposed to hold a note.
		LindorInSpace* = #DSS_AdAstra_bd_rpws_LindorInSpace_01 // Bursts of crackling static arrive in perfectly timed intervals. You label it “plasma noise” and nobody believes you.
		LindorInSpace* = #DSS_AdAstra_bd_rpws_LindorInSpace_02 // The spectrogram draws clean bands where there should be chaos, like a transmitter left on low power for centuries.
    }
}