@EXPERIMENT_DEFINITION:HAS[#id[bd_multiSpec]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowNorthPolarZone_00 // The polar bands show stark ultraviolet glare and wispy structures that don’t match the equator’s patterns. The instrument insists the Sun has “weather.”
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowNorthSubpolarZone_00 // Multispectral composites reveal faint, rotating ripples in the emission signature. Someone labels it “spinny” and files it under dynamics.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowNorthTemperateZone_00 // The visible and infrared channels disagree on what “smooth” means here. The final image looks calm only because the exposure is terrified.
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowNorthTropicZone_00 // Several narrow-band lines flare up at once, like the Sun is answering a question you didn’t ask. The detector politely requests more shielding.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowEquatorialZone_00 // Bright bands and dark lanes resolve into a busy, boiling texture in false color. You stop calling it “a ball” and start calling it “a problem.”
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowSouthTropicZone_00 // The spectral map catches a sudden brightening that isn’t there on the previous pass. You annotate it as transient and “probably not personal.”
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowSouthTemperateZone_00 // The infrared channel shows broad, warmer patches that drift in and out of view. The Sun appears to be rearranging itself for fun.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowSouthSubpolarZone_00 // Shortwave bands reveal thin, filament-like features curling across the limb. The processed image resembles tangled noodles made of light.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_multiSpec_SunInSpaceLowSouthPolarZone_00 // Polar emission spikes in a way that makes the color scale give up. The report recommends “do not linger” in perfectly measured language.

		MohoInSpaceLowPoles* = #JNSQscience_bd_multiSpec_MohoInSpaceLowPoles_00 // In permanently shadowed pits, the spectrum hints at stubborn ice mixed with dark dust. Moho remains deeply committed to confusing expectations.
		MohoInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_MohoInSpaceLowLowlands_00 // The lowlands read darker and run hotter through the day, suggesting smoother, heat-soaking material. The thermal channel basically draws you a warning sign.
		MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_multiSpec_MohoInSpaceLowPolarIceCraters_00 // Multiband signatures separate bright frost from soot-dark regolith inside cold traps. The words “bring a drill” appear suspiciously often in the notes.
		MohoInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_MohoInSpaceLowHighlands_00 // Brighter returns and sharper absorption features point to metal-rich rock exposed across rugged terrain. The false-color composite looks like it was forged, not photographed.
		MohoInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_MohoInSpaceLowMidlands_00 // Subtle band shifts map out dusty veneers over harder substrate. It’s the same planet twice, with the second copy slightly more annoyed.
		MohoInSpaceLowCraters* = #JNSQscience_bd_multiSpec_MohoInSpaceLowCraters_00 // Fresh ejecta pops across multiple wavelengths, contrasting cleanly against older, baked ground. Impacts do a better job of excavation than any lander.
		MohoInSpaceLowExoticCraters* = #JNSQscience_bd_multiSpec_MohoInSpaceLowExoticCraters_00 // One set of craters shows odd absorption dips that don’t fit the surrounding geology. Either it’s rare chemistry or the planet is keeping souvenirs.
		MohoInSpaceLowRareCraters* = #JNSQscience_bd_multiSpec_MohoInSpaceLowRareCraters_00 // Weak but consistent spectral spikes suggest trace elements concentrated in the rims and rays. Your scanner is very pleased with itself.
		MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_multiSpec_MohoInSpaceLowVoronoiCraters_00 // The patterned crater field resolves into repeating cells in false color, with boundaries that stay put across passes. The surface looks organized in a way it shouldn’t.
		MohoInSpaceLowNotableCraters* = #JNSQscience_bd_multiSpec_MohoInSpaceLowNotableCraters_00 // Bright rays, dark floors, and mixed signatures make these craters stand out like they’re trying to get picked. Mission Control immediately starts naming landing sites.
		MohoInSpaceLowPeaks* = #JNSQscience_bd_multiSpec_MohoInSpaceLowPeaks_00 // Peak ridges saturate the bright bands while the shadows plunge into extreme cold in infrared. The temperature gradient alone counts as an obstacle.

        EveInSpaceLowPoles* = #JNSQscience_bd_multiSpec_EveInSpaceLowPoles_00 // The polar spectrum is bright, cold, and clean enough to make the calibration team relax for once. It still looks purple, somehow.
		EveInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_EveInSpaceLowLowlands_00 // The lowlands return a smooth, heat-soaking signature with faint compositional streaks. The planet appears to be slowly marinating itself.
		EveInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_EveInSpaceLowMidlands_00 // Multiband contrast teases out subtle bands of dust and rock that normal imaging smears together. Eve hides its details behind a thick coat of “same”.
		EveInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_EveInSpaceLowHighlands_00 // The highlands skew brighter in the shortwave channels and cooler in the shadows. The terrain looks sharp, steep, and very done with visitors.
		EveInSpaceLowPeaks* = #JNSQscience_bd_multiSpec_EveInSpaceLowPeaks_00 // Peak ridges saturate the visible bands while infrared shows rapid temperature drops along the spines. The map looks like a sawblade made of purple.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_multiSpec_EveInSpaceLowExplodiumSea_00 // The liquid surface reflects oddly across multiple bands, with absorption features that make the safety officer cough loudly. The ocean is officially labeled “not for swimming”.
		EveInSpaceLowMountains* = #JNSQscience_bd_multiSpec_EveInSpaceLowMountains_00 // Shadowing wrecks the auto-solver, but the final composite still outlines layered slopes with distinct fingerprints. The mountains appear to be made of “more mountain”.
		EveInSpaceLowShores* = #JNSQscience_bd_multiSpec_EveInSpaceLowShores_00 // A thin transition zone pops in false color where land chemistry meets the strange seas. The boundary looks crisp, like the planet drew it with a ruler.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_multiSpec_EveInSpaceLowPolarLakes_00 // The lakes show a colder, brighter signature than surrounding terrain, with a suspiciously uniform surface response. Either they’re calm, or they’re waiting.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_multiSpec_EveInSpaceLowPetrolLakes_00 // Strong, oily absorption bands dominate the readout and the thermal channel shows slow cooling after sunset. The instrument reports “slick” in three different ways.
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofAkron_00 // The spectrum shifts subtly across the basin, hinting at layers or currents below the surface. Mission Control asks if you can “zoom in until it makes sense”.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofNessus_00 // Multispectral imaging finds patchy reflectivity that comes and goes with viewing angle. The sea seems to dislike being measured directly.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofTaniwha_00 // The false-color composite highlights a mottled surface film with sharp edges. The readout looks like someone spilled paint and called it geology.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofGigan_00 // Thermal inertia here is higher than neighboring basins, suggesting a thicker or denser surface layer. The sea is doing its best impression of solid ground.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofRodan_00 // A faint haze signature rides over the basin in the shorter bands while the surface stays dark and glossy. It’s a two-layer problem and neither layer is friendly.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofGojira_00 // The basin returns deep absorption features and unusually consistent reflectance from orbit to orbit. Whatever this stuff is, it is confidently itself.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofGhidorah_00 // Three distinct spectral “zones” appear in one pass, then blur together in the next due to glare. The sea refuses to hold still for the camera.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_multiSpec_EveInSpaceLowSeaofBagorah_00 // Subtle color gradients trace broad patterns that look like slow circulation. You mark it as “active-looking” and everyone pretends that’s a technical term.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_multiSpec_EveInSpaceLowKrakensWell_00 // A localized anomaly spikes across several bands and the thermal map shows a stubborn warm spot at noon. The instrument logs it as “interesting” and you log it as “nope”.

		GillyInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_GillyInSpaceLowLowlands_00 // The lowlands read darker and warmer than the surrounding slopes, as if fine dust collects here and never leaves. Gilly appears to be slowly shedding itself into the corners.
		GillyInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_GillyInSpaceLowMidlands_00 // Slight shifts in reflectance reveal lumpy textures and mixed material patches. The composite looks like a snack that fell on the floor and got pressed back together.
		GillyInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_GillyInSpaceLowHighlands_00 // The highlands return brighter, rougher signatures with strong shadow contrast from the uneven terrain. The map is mostly cliffs, craters, and attitude problems.

        KerbinInSpaceLowMountains* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowMountains_00 // Sharp thermal contrasts trace the ridgelines. The false-color composite makes the peaks look like jagged teeth.
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowMidlands_00 // Subtle greens and browns form a tidy patchwork. The data looks boring until you realize it is incredibly useful.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowLowlands_00 // The low terrain shows damp, heat-holding signatures. The report includes an unexpected amount of mud-related terminology.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowAridLowlands_00 // Dry, iron-rich dust dominates the spectrum. You add a note: pack extra filters.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowAridMidlands_00 // Multiband imaging highlights pale channels and old flood scars. Someone at KSC insists they are snack trails.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowAridHighlands_00 // False color separates layered rock like a textbook diagram. You pretend you totally understand it on the first look.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowAridMountains_00 // Sunlit slopes saturate the visible bands while shadowed valleys go ice-cold in infrared. The terrain looks unfriendly and proud of it.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowGreatLake_00 // The lake surface returns a clean water signature until wind ripples start confusing the calibration. You average an entire orbit to get a stable map.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowInlandWater_00 // The spectral composite picks out patchy blooms and sediment swirls. Mission Control debates whether it is biology or noise.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowKreenwichSea_00 // Shallows turn bright cyan in the processed image. You almost hear seabirds over the comms.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowArcticSea_00 // Ice and open water separate cleanly across multiple bands. The infrared channel strongly recommends not splashing down here.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowForemansSea_00 // A broad thermal gradient hints at currents below. You mark it as interesting and slightly scary.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowTriangulusSea_00 // The sharp coastline makes a perfect calibration target. The image team celebrates like this was on purpose.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowNorthernSea_00 // High-latitude waters return a dim, cold signal. The UV band catches a faint haze over the waves.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowSub-ArcticSea_00 // Mixed ice and water produce a noisy spectrum. You spend the whole pass smoothing it into something usable.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowEasternSea_00 // Sun glint blinds one channel, but other bands still salvage a crisp composite. You label it a victory and move on.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowWesternSea_00 // Sediment plumes stand out vividly in false color. Something down there is stirring up the bottom.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_multiSpec_KerbinInSpaceLowWelcomeBackIsland_00 // A tiny speck resolves into a real island with distinct rock and vegetation signatures. You tag it as a perfect target for a celebratory flyover.

		MunInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_MunInSpaceLowHighlands_00 // False-color mapping separates ancient crust from younger deposits. Everything is still gray, just with better paperwork.
		MunInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_MunInSpaceLowMidlands_00 // The midlands show gentle spectral shifts that only become obvious after aggressive contrast stretching. Science is mostly aggressive contrast stretching.
		MunInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_MunInSpaceLowLowlands_00 // The lowlands hold heat longer through the night. Infrared draws the basins like bruises on the surface.
		MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_multiSpec_MunInSpaceLowPolarIceCraters_00 // Multispectral and thermal imaging suggests stubborn patches of water ice hiding in permanently shadowed craters. The words further investigation appear in bold.
		MunInSpaceLowExoticCraters* = #JNSQscience_bd_multiSpec_MunInSpaceLowExoticCraters_00 // Odd spectral spikes ring these craters. It is either unusual minerals or somebody lost a shiny part down there.
		MunInSpaceLowRareCraters* = #JNSQscience_bd_multiSpec_MunInSpaceLowRareCraters_00 // The ejecta blankets show distinct banding compared to surrounding terrain. You circle them and write worth a closer look.
		MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_multiSpec_MunInSpaceLowVoronoiCraters_00 // The crater field forms a strange cellular pattern in the composite. Subtle boundaries pop once the false-color layers are aligned.
		MunInSpaceLowNotableCraters* = #JNSQscience_bd_multiSpec_MunInSpaceLowNotableCraters_00 // Rays and contrasting floors jump out across multiple wavelengths. Picking landing targets suddenly feels unfairly easy.
		MunInSpaceLowMountains* = #JNSQscience_bd_multiSpec_MunInSpaceLowMountains_00 // Steep slopes cast hard shadows that confuse the automatic mapper. The thermal band still outlines cliffs that would eat landing legs for breakfast.

		MinmusInSpaceLowPoles* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowPoles_00 // The polar regions reflect like mirrors across several bands. A faint volatile signature appears, then disappears when you blink.
		MinmusInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowLowlands_00 // Slightly darker material collects in the low terrain. The composite suggests a thin dusting of imported debris.
		MinmusInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowMidlands_00 // At first it looks uniform, then the stretched image reveals a delicate fingerprint of tiny variations. You feel oddly accomplished.
		MinmusInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowHighlands_00 // The highlands brighten strongly in shortwave bands. Either the ice is cleaner here or it is just showing off.
		MinmusInSpaceLowBasins* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowBasins_00 // Basin floors show distinct absorption features compared to surrounding ground. False color paints the flats in tidy stripes.
		MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowBrownBasins_00 // These basins run warmer and darker than expected. You recheck the settings twice before believing it.
		MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowBrownLowlands_00 // The darker lowlands absorb more sunlight and stand out sharply in infrared. The map looks like cocoa spilled on mint.
		MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowBrownMidlands_00 // Patchy signatures appear and vanish from pass to pass due to glare. You flag the region for another, better-lit orbit.
		MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowBrownHighlands_00 // Even high ground carries the brown tint in multiple bands. The spectrum suggests a contaminant mixed into the surface ice.
		MinmusInSpaceLowMountains* = #JNSQscience_bd_multiSpec_MinmusInSpaceLowMountains_00 // Bright glare and deep shadow warp the readings, but the ridges still trace cleanly in the final composite. You keep the prettiest one for the report cover.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_multiSpec_DunaInSpaceLowIceCaps_00 // Multispectral analysis pegs the ice caps as bright, clean, and very cold. The albedo is practically shouting “frost”.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_DunaInSpaceLowMidlands_00 // The midlands come back as a nearly uniform rust signature with faint streaks of slightly different dust. You label it “subtle, but real”.
		DunaInSpaceLowCraters* = #JNSQscience_bd_multiSpec_DunaInSpaceLowCraters_00 // Fresh crater ejecta shows up as sharp color contrasts against the older surface. Apparently Duna keeps its best minerals in the blast zone.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_multiSpec_DunaInSpaceLowRareCraters_00 // One crater’s spectrum refuses to match its neighbors, like it was filled with different dirt on purpose. The team argues whether it’s chemistry or a calibration prank.
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_multiSpec_DunaInSpaceLowVoronoiCraters_00 // The crater field breaks into neat cells in the false-color composite, with boundaries that don’t care about your map grid. You save the image because it looks too organized.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_multiSpec_DunaInSpaceLowNotableCraters_00 // Bright rays and distinct floor materials make these craters pop across multiple bands. Landing-site scouts start circling them immediately.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_multiSpec_DunaInSpaceLowExoticCraters_00 // The data hints at cold-trapped volatiles and a suspiciously “icy” signature where sunlight barely visits. You double-check that the instrument isn’t still thinking about the poles.
		DunaInSpaceLowTrenches* = #JNSQscience_bd_multiSpec_DunaInSpaceLowTrenches_00 // Steep trench walls expose layered material with different spectral fingerprints, and the thermal channel shows cold seams that suggest buried ice. It looks like the planet got neatly sliced open.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_multiSpec_DunaInSpaceLowNotablePlains_00 // These plains have odd thermal inertia and pale spectral streaks that read like cemented dust or salty residues. The map quietly suggests something once moved here and left traces behind.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_multiSpec_DunaInSpaceLowNotableMountains_00 // The higher slopes show brighter signatures and colder shadows, with hints of volatiles clinging where dust can’t settle. The mountains appear to be hoarding the “interesting” pixels.
		DunaInSpaceLowMountains* = #JNSQscience_bd_multiSpec_DunaInSpaceLowMountains_00 // Sharp shadowing wrecks the automatic fit, but the final composite still outlines ridges like broken glass. The thermal gradient strongly recommends careful flying.
		DunaInSpaceLowVolcano* = #JNSQscience_bd_multiSpec_DunaInSpaceLowVolcano_00 // Darker bands cluster around the volcanic feature, and the infrared pass finds a stubborn warm anomaly at local noon. Either it’s basalt, or Duna is trying very hard to be dramatic.

		IkeInSpaceLowPoles* = #JNSQscience_bd_multiSpec_IkeInSpaceLowPoles_00 // The poles show patchy bright returns and colder-than-average infrared readings. If there’s frost here, it’s doing its best impression of “barely there”.
		IkeInSpaceLowMountains* = #JNSQscience_bd_multiSpec_IkeInSpaceLowMountains_00 // Across the mountain ranges, the spectrum brightens slightly as if the peaks are dusted with reflective grains. The false-color image makes the ridges look suspiciously clean.
		IkeInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_IkeInSpaceLowMidlands_00 // The midlands come back as a steady, dull signature with only small compositional shifts from pass to pass. Ike is very committed to being consistent.
		IkeInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_IkeInSpaceLowHighlands_00 // The highlands show a rougher, more weathered spectral mix than the smoother low terrain. Whatever’s up here has been exposed longer, and it shows in every channel.

        EdnaInSpaceHigh* = #JNSQscience_bd_multiSpec_EdnaInSpaceHigh_00 // From high orbit, Edna’s dim surface forces long exposures across every band. The composite still teases out a faint, repeating pattern of brightness dips that looks suspiciously like occultations.
		EdnaInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_EdnaInSpaceLowLowlands_00 // The lowlands skew darker and hold onto heat longer than nearby terrain. The spectrum suggests fine, dirty regolith that likes to pool wherever it can.
		EdnaInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_EdnaInSpaceLowMidlands_00 // Multiband contrast reveals broad swirls of slightly different material. The map looks like someone tried to erase old impacts and gave up halfway through.
		EdnaInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_EdnaInSpaceLowHighlands_00 // Brighter high ground shows sharper absorption features and harsher shadow edges. The false-color image makes the ridges look crisp, cold, and very unfriendly.
		EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_multiSpec_EdnaInSpaceLowPolarIceCraters_00 // Narrow-band returns spike in the cold traps, and infrared agrees they never warm up. The data strongly implies “something bright and volatile” hiding in the dark.
		EdnaInSpaceLowWhites* = #JNSQscience_bd_multiSpec_EdnaInSpaceLowWhites_00 // The “white” patches reflect strongly across multiple channels and run cooler at dusk than the surrounding ground. The spectrum reads like a thin, pale coating over darker rock.

		DakInSpaceHigh* = #JNSQscience_bd_multiSpec_DakInSpaceHigh_00 // From a distance, Dak is mostly a tumbling silhouette with a spectrum full of jitter. The instrument still manages to tag it as “rock, dust, and attitude.”
		DakInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_DakInSpaceLowLowlands_00 // Low areas show smoother, darker signatures consistent with dust ponds and loosely packed grains. The thermal channel suggests the fluff layer is deeper than it looks.
		DakInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_DakInSpaceLowMidlands_00 // The midlands return a mixed fingerprint, as if several different surface textures got kneaded together. The composite resembles a lumpy potato that someone tried to paint scientifically.
		DakInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_DakInSpaceLowHighlands_00 // High points come back brighter and rougher, with stronger mineral absorption dips. The map implies exposed, cleaner rock that hasn’t been dusted over yet.

		DresInSpaceLowPoles* = #JNSQscience_bd_multiSpec_DresInSpaceLowPoles_00 // The poles brighten in shortwave bands and cool rapidly in infrared. The spectrum hints at frost-prone patches clinging to places sunlight barely bothers with.
		DresInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_DresInSpaceLowHighlands_00 // The highlands show a paler, sharper signature than the smoother low terrain. False color separates tough, ancient crust from thin dust veneers.
		DresInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_DresInSpaceLowMidlands_00 // Subtle spectral gradients appear only after aggressive stretching and a lot of sighing. Dres may look bland, but it’s quietly different in all the right places.
		DresInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_DresInSpaceLowLowlands_00 // Lowlands read darker and slightly warmer through the day, suggesting finer material and better heat retention. The final composite draws the basins like soft stains on a pale world.

        JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_multiSpec_JoolInSpaceLowEquatorialBands_00 // Multispectral layers resolve the equatorial stripes into stacked decks of cloud tops and darker absorption bands. Jool looks like it is made of organized chaos.
		JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_multiSpec_JoolInSpaceLowExposedLowerDeck_00 // Deeper wavelengths finally pick up a murky “lower deck” through thinner cloud. The thermal channel suggests those depths are warmer and far less welcoming.
		JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_multiSpec_JoolInSpaceLowSubpolarBands_00 // The subpolar bands show strong shear: bright streaks twist past dark lanes in different channels. The image looks like the atmosphere is being kneaded.
		JoolInSpaceLowNorthPole* = #JNSQscience_bd_multiSpec_JoolInSpaceLowNorthPole_00 // UV bands light up a hazy crown near the pole while infrared paints a cold spiral underneath. You label it “pretty” and also “do not enter.”
		JoolInSpaceLowSouthPole* = #JNSQscience_bd_multiSpec_JoolInSpaceLowSouthPole_00 // The south polar region alternates between calm-looking swirls and sudden high-contrast knots across bands. Jool is clearly not done rearranging itself.
		JoolInSpaceLowStormComplex* = #JNSQscience_bd_multiSpec_JoolInSpaceLowStormComplex_00 // Narrowband filters catch a turbulent patch that changes shape between exposures. A brief, sharp spike appears in several channels and nobody agrees on why.

		LaytheInSpaceLowShores* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowShores_00 // The shoreline boundary draws a crisp chemical line in false color, complete with pale sediment fans. The water appears to be actively stealing land.
		LaytheInSpaceLowInlandWater* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowInlandWater_00 // The inland waters reflect cleanly in one band and go strangely blotchy in another. Either the lake surface is busy, or the scanner is being teased.
		LaytheInSpaceLowKrenwichSea* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowKrenwichSea_00 // Broad color gradients across the sea hint at currents or depth changes. The composite makes it look inviting until the absorption bands remind you it is still Laythe.
		LaytheInSpaceLowArcticSea* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowArcticSea_00 // Ice and open water separate sharply across multiple bands, with colder patches clinging to the edges. The map reads like a warning label in pastel.
		LaytheInSpaceLowJoolwardSea* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowJoolwardSea_00 // Warmer infrared returns and a thicker haze signature suggest this sea sits under a more energetic sky. The ocean is apparently on the “front” side of the system.
		LaytheInSpaceLowPolwardSea* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowPolwardSea_00 // The polward waters trend colder and darker, with bright flecks that behave like drifting ice. The data quietly recommends heated landing gear.
		LaytheInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowHighlands_00 // The highlands brighten in the shortwave channels and show sharper mineral features than the flats. Every ridge looks like it was sharpened specifically to puncture landers.
		LaytheInSpaceLowMountains* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowMountains_00 // Strong shadow contrast and rapid thermal changes outline steep relief in painful detail. The final composite looks like a toothy skyline made of statistics.
		LaytheInSpaceLowIceCaps* = #JNSQscience_bd_multiSpec_LaytheInSpaceLowIceCaps_00 // The caps are blindingly bright across several bands and stubbornly cold in infrared. Cracked textures suggest the ice is stressed, not sleepy.
