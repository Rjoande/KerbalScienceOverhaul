        DunaSrfLandedMidlandSea* = #CSS_gravityScan_DunaSrfLandedMidlandSea_01 // All the while the sensor is running, you find yourself hoping aloud that the sand stays out of it. The warranty was voided long ago, and gravimeters are expensive!
        DunaSrfLandedNorthernBasin* = #CSS_gravityScan_DunaSrfLandedNorthernBasin_00 // The detector doesn't pick up much out of the ordinary.
        DunaSrfLandedSouthernBasin* = #CSS_gravityScan_DunaSrfLandedSouthernBasin_01 // The ice cap in the south distorts the gravity here slightly, and the basin itself shows the signatures of volcanic activity.
