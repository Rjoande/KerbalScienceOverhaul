		#GEPscience_bd_solarWind_TaranisInSpaceHigh_00 = Readings rise and fall with each fast sweep over Taranis, as if the planet is moving through a river of charged grit. The red sun never blinks, and neither does the counter.
		#GEPscience_bd_solarWind_ToutatisInSpaceLow_00 = The flow bends and jitters near Toutatis, hinting at a modest magnetic pushback. Every time it steadies, the spacecraft rotates and reminds you how far away “home” isn’t.
