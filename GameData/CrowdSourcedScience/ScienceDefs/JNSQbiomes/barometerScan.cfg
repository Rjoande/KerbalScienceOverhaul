@EXPERIMENT_DEFINITION:HAS[#id[barometerScan]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        EveSrfLandedPetrolLakes* = #CSS_barometerScan_EveSrfLandedCraterLake_00 // You tap the glass of the barometer. Nope, it's not broken.
        EveSrfLandedMountains* = #CSS_barometerScan_EveSrfLandedOlympus_00 // So high above the lower reaches, the atmospheric pressure is less extreme. It's still very high, though.
        EveSrfLandedMountains* = #CSS_barometerScan_EveSrfLandedOlympus_01 // You tap the gauge on the barometer, and it goes down rather than up for once.
        EveSrfLandedShores* = #CSS_barometerScan_EveSrfLandedShallows_00 // The instrument shows you an extremely high pressure and then refuses to work anymore.
        EveSrfSplashedPetrolLakes* = #CSS_barometerScan_EveSrfSplashedCraterLake_00 // As you flick the detector on and watch the needle rise, so does your heart rate.
        EveSrfSplashedPolarLakes* = #CSS_barometerScan_EveSrfSplashedCraterLake_01 // Crater Lake? More like Crusher Lake.
        EveSrfSplashedShores* = #CSS_barometerScan_EveSrfSplashedShallows_00 // Sea level pressure on Eve is the same everywhere, it seems.
        EveSrfSplashedShores* = #CSS_barometerScan_EveSrfSplashedShallows_01 // You don't want to look at the barometer, so you distract yourself by looking out over the sea instead.
        
        KerbinSrfLandedMidlands* = #CSS_barometerScan_KerbinSrfLandedGrasslands_00 // A blade of grass gets caught in the outer casing of the sensor, and obstructs your view of the display. Oh well, we'll just make something up. They'll never know anyway.
        KerbinSrfLandedMidlands* = #CSS_barometerScan_KerbinSrfLandedGrasslands_01 // As you painstakingly jot down the data, you wonder why you couldn't just take it from the morning news weather report.
        KerbinSrfLandedMidlands* = #CSS_barometerScan_KerbinSrfLandedGrasslands_02 // Looks like a fine day today on Kerbin's plains.
        KerbinSrfLandedAridMidlands* = #CSS_barometerScan_KerbinSrfLandedDeserts_00 // Barometer reads very high. No rain in sight. In fact you wonder if it has EVER rained here.
        KerbinSrfLandedAridMidlands* = #CSS_barometerScan_KerbinSrfLandedDeserts_01 // It's not going to rain for a long time.
        KerbinSrfLandedAridMidlands* = #CSS_barometerScan_KerbinSrfLandedDeserts_02 // Readings here are the same as usual: high. Nothing else to report.
        KerbinSrfLandedAridHighlands* = #CSS_barometerScan_KerbinSrfLandedBadlands_00 // The sensor looks like it went to the bottom of the Mariana Trench.
        KerbinSrfLandedAridHighlands* = #CSS_barometerScan_KerbinSrfLandedBadlands_01 // You transmit the readings. Mission Control immediately calls you back and demands to know if you are still on Kerbin.
        KerbinSrfLandedAridHighlands* = #CSS_barometerScan_KerbinSrfLandedBadlands_02 // You think that the barometer is broken but you're too scared to go outside and fix it.
        KerbinSrfLandedIceCaps* = #CSS_barometerScan_KerbinSrfLandedNorthernIceShelf_00 // The air pressure data spells out "COLD". You concur with the computer.
        KerbinSrfLandedIceCaps* = #CSS_barometerScan_KerbinSrfLandedNorthernIceShelf_01 // Pressure is higher here on average, as per usual for polar regions.
        KerbinSrfLandedIceCaps* = #CSS_barometerScan_KerbinSrfLandedSouthernIceShelf_00 // Atmospheric pressure is the same as at sea level, even though you're no...wait a minute...
        KerbinSrfLandedIceCaps* = #CSS_barometerScan_KerbinSrfLandedSouthernIceShelf_01 // The labels on the barometer are covered with ice, and somebody forgot to install an equipment heater.
        KerbinSrfSplashed* = #CSS_barometerScan_KerbinSrfSplashedWater_00 // The barometer reading isn't very interesting so you look out the window and watch the waves instead.
        KerbinSrfSplashed* = #CSS_barometerScan_KerbinSrfSplashedWater_01 // Surprisingly all the water didn't short out the instrument, and you are able to get a good reading to send back to KSC.
        KerbinSrfSplashed* = #CSS_barometerScan_KerbinSrfSplashedWater_02 // You wish there was a setting on the barometer that warns you of sharks.
        KerbinSrfSplashedMidlands* = #CSS_barometerScan_KerbinSrfSplashedGrasslands_00 // A drifting stick bumps repeatedly aginst the sensor and causes the needle to move crazily.
        KerbinSrfSplashedAridMidlands* = #CSS_barometerScan_KerbinSrfSplashedDeserts_00 // Looks like there won't be rain for a long time. You wonder how this water got here.
        KerbinSrfSplashedAridHighlands* = #CSS_barometerScan_KerbinSrfSplashedBadlands_00 // The water really doesn't help the havoc the Badlands plays on the instrumentation.
        KerbinSrfSplashIceCaps* = #CSS_barometerScan_KerbinSrfSplashedNorthernIceShelf_00 // Waves of icy water washing over the sensor generate bursts of pressure.
        KerbinSrfSplashIceCaps* = #CSS_barometerScan_KerbinSrfSplashedSouthernIceShelf_00 // Looks like a severe polar storm will arrive later.
        
        DunaSrfLandedIceCaps* = #CSS_barometerScan_DunaSrfLandedPoles_00 // The atmosphere appears slightly denser here.
        DunaSrfLandedIceCaps* = #CSS_barometerScan_DunaSrfLandedPoles_01 // The atmosphere is slightly denser due to the gases escaping the ice beneath.
        DunaSrfLandedIceCaps* = #CSS_barometerScan_DunaSrfLandedPoles_02 // A blast of pressure from a nearby gas geyser is detected.
        DunaSrfLandedNotablePlains* = #CSS_barometerScan_DunaSrfLandedNorthernBasin_00 // The atmosphere is a bit denser here from the low altitude.
        DunaSrfLandedNotablePlains* = #CSS_barometerScan_DunaSrfLandedNorthernBasin_01 // Diurnal pressure variations are smaller than expected, possibly thanks to the canyon outlet to the south.
        DunaSrfLandedNotablePlains* = #CSS_barometerScan_DunaSrfLandedSouthernBasin_00 // The atmospheric pressure is largely average save for occasional gusts sweeping in off the ice.
        DunaSrfLandedNotablePlains* = #CSS_barometerScan_DunaSrfLandedSouthernBasin_01 // Atmospheric pressure here shows larger diurnal fluctuations than elsewhere due to its proximity to the ice cap.
        DunaSrfLandedNotableMountains* = #CSS_barometerScan_DunaSrfLandedNorthernShelf_00 // Low altitude makes the air a bit more dense here. Just a bit.
        DunaSrfLandedNotableMountains* = #CSS_barometerScan_DunaSrfLandedNorthernShelf_01 // Winds howling through the canyon from the north generate regular pressure spikes.
        DunaSrfLandedMidlandCanyon* = #CSS_barometerScan_DunaSrfLandedMidlandCanyon_00 // The altitude here is very low, so the atmosphere is pretty thick (for Duna).
        DunaSrfLandedMidlandCanyon* = #CSS_barometerScan_DunaSrfLandedMidlandCanyon_01 // Pressure here shows less diurnal variation than other places on Duna.
        DunaSrfLandedEasternCanyon* = #CSS_barometerScan_DunaSrfLandedEasternCanyon_00 // There's more air here, but even more dust. That's not good news for the barometer you've already cleaned out twice today.
        DunaSrfLandedEasternCanyon* = #CSS_barometerScan_DunaSrfLandedEasternCanyon_01 // Air pressure increases substantially at night here as the atmosphere cools and sinks.
        DunaSrfLandedWesternCanyon* = #CSS_barometerScan_DunaSrfLandedWesternCanyon_00 // There's a little bit more gas down here than some other places.
        DunaSrfLandedWesternCanyon* = #CSS_barometerScan_DunaSrfLandedWesternCanyon_01 // Wanting to have something to report, you tap the barometer and the needle rises slightly. Result!
        DunaSrfLandedNotableMountains* = #CSS_barometerScan_DunaSrfLandedPolarHighlands_00 // Evaporating ice from the polar cap raises the pressure by a tiny fraction.
        DunaSrfLandedNotableMountains* = #CSS_barometerScan_DunaSrfLandedPolarHighlands_01 // Ice subliming off the polar cap raises the pressure very slightly.
        DunaSrfLandedNotableMountains* = #CSS_barometerScan_DunaSrfLandedPolarHighlands_02 // Atmospheric pressure seems to experience measurable diurnal fluctuations.
        DunaSrfLandedExoticCraters* = #CSS_barometerScan_DunaSrfLandedPolarCraters_00 // The air here is pretty dense and pressure is higher thanks to the cold temperatures.
        DunaSrfLandedExoticCraters* = #CSS_barometerScan_DunaSrfLandedPolarCraters_01 // Pressure increases greatly as the temperature drops at nights and cold, dense air sinks into the depression.
        
        LaytheSrfLandedIceCaps* = #CSS_barometerScan_LaytheSrfLandedPoles_00 // The readings are almost the same as on a sunny beach back home. It makes you feel like going for a swim.
        LaytheSrfLandedHighlands* = #CSS_barometerScan_LaytheSrfLandedDunes_00 // For a couple of seconds you think the device is still displaying readings taken on Kerbin.
    }
}