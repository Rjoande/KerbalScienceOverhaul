        #JNSQscience_barometerScan_IkeInSpaceHigh_00 = Lontano sopra Ike, il barometro continua a leggere assolutamente niente. Archivi i dati lo stesso, perché il "niente" è tecnicamente un risultato.
        #JNSQscience_barometerScan_EdnaSrfLanded_00 = La lancetta del barometro scatta a zero e resta lì, misurando con orgoglio assolutamente niente.
        #JNSQscience_barometerScan_EdnaSrfLanded_01 = Dai un colpetto al misuratore. Continua a segnalare "vuoto" con sicurezza incrollabile.
        #JNSQscience_barometerScan_EdnaSrfLanded_02 = Il display legge 0.00 e si rifiuta educatamente di aggiungere cifre più emozionanti.
        #JNSQscience_barometerScan_EdnaSrfLanded_03 = Il barometro segnala "nessuna atmosfera" e poi smette di contribuire alla conversazione.
        #JNSQscience_barometerScan_EdnaInSpaceLow_00 = In orbita bassa il barometro legge vuoto, il che è corretto e profondamente poco utile.
        #JNSQscience_barometerScan_EdnaInSpaceLow_01 = La traccia di pressione è una linea perfettamente piatta. Il talento di Edna per il "niente" si estende sorprendentemente in alto.
