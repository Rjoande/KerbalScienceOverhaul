        #JNSQscience_temperatureScan_NaraSrfLandedPolarHighlands_00 = Le colline polari sono ancora più fredde, con variazioni brusche ogni volta che il vento cambia. L'atmosfera trasporta gelo come fosse merce.
        #JNSQscience_temperatureScan_NaraSrfLandedPolarHighlands_01 = Registri i dati e poi aggiungi una seconda nota: "Se partiamo, non fermarti finché non siamo a casa".
        #JNSQscience_temperatureScan_NaraFlyingLowLowlands_00 = A bassa quota sui bassopiani, l'aria è abbastanza densa da rubare calore attraverso lo scafo. La sonda la definisce "stabile".
        #JNSQscience_temperatureScan_NaraFlyingLowLowlands_01 = I gradienti di temperatura si smorzano nella miscela densa di idrogeno ed elio: tutto diventa uniformemente, aggressivamente freddo.
        #JNSQscience_temperatureScan_NaraFlyingLowMidlands_00 = Il termometro sale di un soffio, poi scende di nuovo attraversando strati di foschia. Il "meteo" di Nara è soprattutto freddo che si riorganizza.
        #JNSQscience_temperatureScan_NaraFlyingLowMidlands_01 = Il sensore mostra un lieve riscaldamento da turbolenza, subito annullato dall'entusiasmo dell'atmosfera nel raffreddare.
        #JNSQscience_temperatureScan_NaraFlyingLowHighlands_00 = Sopra le colline, la lettura oscilla mentre attraversi creste e correnti discendenti. L'aria si comporta come un fiume gelido.
        #JNSQscience_temperatureScan_NaraFlyingLowHighlands_01 = La sonda registra brevi picchi di calore da compressione, seguiti da tratti più lunghi di "no, ancora quasi zero".
        #JNSQscience_temperatureScan_NaraFlyingLowMountains_00 = Le onde orografiche trasformano la traccia in un dente di sega. Ogni scossone è una piccola lezione di termodinamica.
        #JNSQscience_temperatureScan_NaraFlyingLowMountains_01 = Guardi i numeri fluttuare e concludi: il modo più rapido per scaldarsi è smettere di essere qui.
        #JNSQscience_temperatureScan_NaraFlyingLowPolarLowlands_00 = L'aria bassa polare è fredda, pesante e piena di cristalli fini che raffreddano il sensore al contatto.
        #JNSQscience_temperatureScan_NaraFlyingLowPolarLowlands_01 = Il display mostra quasi zero, poi "ancora più quasi". Non sapevi che "quasi" avesse sottocategorie.
        #JNSQscience_temperatureScan_NaraFlyingLowPoles_00 = La temperatura a bassa quota sui poli è una lunga linea piatta di miseria. L'unica variabile è quanto in fretta riesci ad andartene.
        #JNSQscience_temperatureScan_NaraFlyingLowPoles_01 = Il sensore segnala condizioni stabili. Tu lo interpreti come: "costantemente ostili".
        #JNSQscience_temperatureScan_NaraFlyingLowPolarHighlands_00 = L'aria delle colline polari produce improvvisi crolli di temperatura in sacche riparate. La sonda le chiama "microclimi".
        #JNSQscience_temperatureScan_NaraFlyingLowPolarHighlands_01 = La traccia sembra voler disegnare un segnale di pericolo. Decidi che ci riesce.
        #JNSQscience_temperatureScan_NaraFlyingHigh_00 = In alto nell'atmosfera di Nara, i cambiamenti di temperatura sono sottili ma implacabili. Il sole sembra una diceria.
        #JNSQscience_temperatureScan_NaraFlyingHigh_01 = Il sensore conferma che "più in alto" non significa "più caldo" quassù. Annoti i dati e stringi le cinghie.
        #JNSQscience_temperatureScan_NaraInSpaceLow_00 = In orbita bassa, lo strumento oscilla tra luce e ombra come un metronomo. Nel bilancio, il freddo vince sempre.
        #JNSQscience_temperatureScan_NaraInSpaceLow_01 = Misuri il tenue calore della luce lontana di Kerbol, poi misuri l'immenso gelo immediato dello spazio. Lo spazio vince in fretta.
        #JNSQscience_temperatureScan_NaraInSpaceHigh_00 = Molto sopra Nara, la scansione sembra una lezione: il calore è raro e la distanza è costosa.
        #JNSQscience_temperatureScan_NaraInSpaceHigh_01 = La sonda si raffredda fino a numeri quieti mentre fissi un sole minuscolo e un problema enorme chiamato "rientro".
        #JNSQscience_temperatureScan_AmosSrfLanded_00 = Il termometro segnala "freddo" con una sicurezza tale da farti controllare due volte. Amos sembra deciso a restare scuro e gelido.
        #JNSQscience_temperatureScan_AmosInSpace_00 = In orbita, le letture oscillano bruscamente tra luce e ombra. Il sensore suggerisce che Amos si apprezza meglio da dentro una capsula ben riscaldata.
        #JNSQscience_temperatureScan_EnonSrfLanded_00 = La temperatura è abbastanza bassa da far sembrare giudicante il display dello strumento. La superficie chiara di Enon riflette luce, ma non calore.
        #JNSQscience_temperatureScan_EnonInSpace_00 = Lo spazio sopra Enon sembra ingannevolmente calmo finché i numeri crollano in ombra. Il riscaldatore della tuta si guadagna lo stipendio in silenzio.
        #JNSQscience_temperatureScan_PraxSrfLanded_00 = La scansione mostra un freddo duro e secco, con grandi oscillazioni a seconda di dove sei e di come ti giri. Prax vive di temperature "di margine".
        #JNSQscience_temperatureScan_PraxInSpace_00 = Più lontano, le letture ambientali sono perlopiù "vuoto", con picchi termici spettacolari quando la nave si gira verso la luce di Kerbol.

        // === Bluedog_DB ===
        // bd_ALSEP_LRRR
        #JNSQscience_bd_ALSEP_LRRR_MohoSrfLanded_00 = Spari un impulso al riflettore e te lo restituisce subito, nitido e pulito. I numeri sono eccellenti, il che è sospetto su un pianeta così vicino a Kerbol.
        #JNSQscience_bd_ALSEP_LRRR_EveSrfLanded_00 = Il fascio si fa strada nella zuppa viola e riesce comunque a ritrovare la via di casa. Il segnale di ritorno odora vagamente di eccessiva sicurezza.
        #JNSQscience_bd_ALSEP_LRRR_GillySrfLanded_00 = Quando il laser colpisce il riflettore, questo prova a rimbalzare via dalla superficie, quindi lo tieni fermo con un sasso. I dati di distanza sono così bassi che controlli due volte per assicurarti di non aver colpito per sbaglio il tuo stesso stivale.
        #JNSQscience_bd_ALSEP_LRRR_DunaSrfLanded_00 = L'aria sottile quasi non si cura del laser, ma la polvere sì. L'impulso di ritorno sembra aver fatto una deviazione dentro una sabbiatrice.
        #JNSQscience_bd_ALSEP_LRRR_IkeSrfLanded_00 = Il riflettore risponde prontamente, ma i numeri oscillano mentre Ike finge di essere una sfera.
        #JNSQscience_bd_ALSEP_LRRR_EdnaSrfLanded_00 = Spari l'impulso e hai il tempo di riconsiderare le tue scelte di vita prima che torni indietro.
        #JNSQscience_bd_ALSEP_LRRR_DakSrfLanded_00 = Il riflettore tenta di andarsene al primo ping, quindi lo ancora con picchetti e ostinazione.
        #JNSQscience_bd_ALSEP_LRRR_DresSrfLanded_00 = Il segnale torna pulito, nel silenzio.
        #JNSQscience_bd_ALSEP_LRRR_LaytheSrfLanded_00 = L'impulso compie il suo lungo viaggio attraverso il sistema di Jool e torna debole ma coerente. L'incertezza di temporizzazione è dominata da tutto ciò che c'è tra qui e casa, non dal riflettore.
        #JNSQscience_bd_ALSEP_LRRR_VallSrfLanded_00 = Il segnale di ritorno arriva pulito e stretto, come se il freddo aiutasse a mantenere la misura onesta. Anche piccoli spostamenti di posizione diventano evidenti a questa distanza.
        #JNSQscience_bd_ALSEP_LRRR_TyloSrfLanded_00 = Il riflettore resta immobile sotto la forte attrazione di Tylo, offrendo una base insolitamente stabile. La soluzione a lunga distanza si aggancia con una sicurezza che raramente si vede così lontano.
        #JNSQscience_bd_ALSEP_LRRR_BopSrfLanded_00 = Il tempo di andata e ritorno è coerente, ma l'adattamento continua a richiedere termini aggiuntivi per il moto irregolare di Bop. A questa distanza, le piccole oscillazioni smettono di essere piccole.
        #JNSQscience_bd_ALSEP_LRRR_PolSrfLanded_00 = L'impulso torna allungato e fioco, ma la trama è inconfondibile. I numeri sottolineano la scala: la misura è per lo più vuoto, contabilizzato con cura.
        #JNSQscience_bd_ALSEP_LRRR_KrelSrfLanded_00 = L'impulso di ritorno è stabile, ma la soluzione richiede correzioni continue per il moto stretto e rapido di Krel attorno al suo corpo primario. A questa distanza, l'orbita compare come una firma temporale, non come un diagramma.
        #JNSQscience_bd_ALSEP_LRRR_AdenSrfLanded_00 = Il riflettore restituisce un impulso pulito, eppure minuscole inclinazioni del supporto in superficie finiscono nei numeri su basi molto lunghe. Alla fine misuri la pazienza del terreno quasi quanto la distanza.
        #JNSQscience_bd_ALSEP_LRRR_HuygenSrfLanded_00 = La foschia densa rende ogni colpo un percorso leggermente diverso, allargando il ritorno un po' più di quanto vorresti. Con abbastanza ripetizioni, la distanza di fondo si risolve comunque con ostinata chiarezza.
        #JNSQscience_bd_ALSEP_LRRR_RigaSrfLanded_00 = Il segnale torna stretto e coerente, con solo un lieve tremolio dovuto all'aria quasi in vuoto. L'incertezza dominante è semplicemente quanta porzione di spazio vuoto stai chiedendo a un orologio di contare.
        #JNSQscience_bd_ALSEP_LRRR_TalosSrfLanded_00 = L'impulso impiega molto a tornare, e il ritardo sembra una cosa fisica da gestire. Quando l'adattamento converge finalmente, ricorda che la parte più difficile è restare sincronizzati con casa.
        #JNSQscience_bd_ALSEP_LRRR_EelooSrfLanded_00 = L'impulso di ritorno è debole, ma il picco temporale è inconfondibile. Quaggiù, gran parte della misura è solo contare il vuoto con precisione.
        #JNSQscience_bd_ALSEP_LRRR_CelesSrfLanded_00 = Il segnale torna con un profilo stretto e stabile, come se il freddo mantenesse oneste le ottiche. La soluzione di distanza converge lentamente, poi si blocca con una precisione silenziosa.
        #JNSQscience_bd_ALSEP_LRRR_TamSrfLanded_00 = Tenere allineato il riflettore è più difficile che sparare il laser: la debole attrazione di Tam rende importante ogni minimo spostamento. Una volta assestato, il tempo di andata e ritorno traccia una linea pulita attraverso una distanza enorme.
        #JNSQscience_bd_ALSEP_LRRR_HamekSrfLanded_00 = Il ritorno è fioco e allungato dalla geometria e dalla distanza enorme, ma colpi ripetuti si sommano in una risposta coerente. I numeri sembrano una mappa fatta di ritardi temporali.
        #JNSQscience_bd_ALSEP_LRRR_NaraSrfLanded_00 = Il fascio deve farsi strada in un'atmosfera densa e fredda prima ancora di iniziare il lungo conteggio verso casa. Il ritorno è allargato dalla rifrazione, ma la temporizzazione si risolve comunque in una base precisa e lontana.
        #JNSQscience_bd_ALSEP_LRRR_AmosSrfLanded_00 = Il riflettore risponde pulito, eppure la soluzione di distanza continua a captare un moto sottile dovuto allo stretto rapporto tra Amos e Nara. A questa distanza, anche piccoli tiri orbitali diventano misurabili nel tempo di andata e ritorno.
        #JNSQscience_bd_ALSEP_LRRR_EnonSrfLanded_00 = L'impulso di ritorno è netto e coerente sullo sfondo silenzioso. Con poco a disturbare il percorso, la sfida è semplicemente mantenere la sincronizzazione lungo un tratto di spazio molto lungo.
        #JNSQscience_bd_ALSEP_LRRR_PraxSrfLanded_00 = Il segnale torna debole ma ripetibile, e ogni colpo si somma alla stessa risposta lontana. La misura sembra meno "da qui a lì" e più una verifica accurata del vuoto.

        // bd_atm
        #JNSQscience_bd_atm_EveInSpaceLow_00 = Le nubi di Eve gettano un riverbero viola nelle ottiche: il monitoraggio dei flare funziona ancora, ma ogni "sole tranquillo" sembra tinto in modo sospetto.
        #JNSQscience_bd_atm_EveInSpaceHigh_00 = Da molto sopra Eve, il telescopio ha una vista più pulita, finché il bordo del pianeta non diventa un enorme scudo di luce viola.
        #JNSQscience_bd_atm_MunInSpaceLow_00 = In orbita bassa sopra Mun i sensori subiscono un bagliore costante dei crateri: la sorveglianza dei flare resta attiva, e anche il copripolvere.
        #JNSQscience_bd_atm_MunInSpaceHigh_00 = Più lontano, il sole resta stabile sul supporto: niente atmosfera, nessuna pietà e un bisogno davvero urgente di otturatori.
        #JNSQscience_bd_atm_MinmusInSpaceLow_00 = Minmus continua a riflettersi nelle letture: il monitor dei flare insiste che il sole va bene, è solo che da sotto arriva una luce "più intensa del solito".
        #JNSQscience_bd_atm_MinmusInSpaceHigh_00 = In alto sopra Minmus, lo strumento registra il sole con calma mentre la luna ghiacciata sotto riflette abbastanza luce da far strizzare gli occhi agli ingegneri.
        #JNSQscience_bd_atm_IkeInSpaceLow_00 = Il turno di sorveglianza del sole sopra Ike è per lo più "tenere pronti gli otturatori", mentre il bagliore rugginoso di Duna tenta di rovinare ogni esposizione.
        #JNSQscience_bd_atm_IkeInSpaceHigh_00 = Da molto sopra Ike, il sole sembra calmo e lontano: il telescopio usa la risoluzione extra per controllare le tempeste di Duna e la loro strana luminosità.
        #JNSQscience_bd_atm_EdnaInSpaceLow_00 = Vicino a Edna, il sole sembra piccolo e nitido: le ottiche apprezzano il buio, anche se tutto il resto continua a tentare di congelare fino a diventare solido.
        #JNSQscience_bd_atm_EdnaInSpaceHigh_00 = Da molto sopra Edna, il monitor dei flare registra lunghi tratti tranquilli, interrotti da brevi attenuazioni ordinate mentre qualcosa fluttua lungo la linea di vista.
        #JNSQscience_bd_atm_DakInSpaceLow_00 = La piccola gravità grumosa di Dak rende il puntamento "interessante": il sole continua a scivolare dietro i deflettori dello strumento come se giocasse a cucù.
        #JNSQscience_bd_atm_DakInSpaceHigh_00 = Con Dak ridotto a un minuscolo puntino sotto di te, l'inseguimento finalmente si stabilizza, lasciandoti da solo con un sole lontano e un cielo molto, molto vuoto.
        #JNSQscience_bd_atm_DresInSpaceLow_00 = Dres getta una pallida luce riflessa nei sensori: il telescopio insiste che il sole è stabile, ma i tuoi occhi non sono d'accordo.
        #JNSQscience_bd_atm_DresInSpaceHigh_00 = In alto sopra Dres, lo strumento registra un profilo solare tranquillo mentre lo sfondo resta inquietantemente pulito, quasi come se l'universo trattenesse il respiro.
        #JNSQscience_bd_atm_LindorInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, le ottiche indugiano sulle ampie bande di Lindor e sui deboli bagliori, cercando di capire se il pianeta è fatto di meteo o di segreti.
        #JNSQscience_bd_atm_LindorInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio diventa un rilevatore di sistema, tracciando le orbite delle lune e i sottili contrasti nelle fredde e imponenti cime nuvolose di Lindor.
        #JNSQscience_bd_atm_KrelInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, ingrandisci la superficie pallida e tirata di Krel: sottili crepe e creste disposte come se la luna venisse delicatamente strappata.
        #JNSQscience_bd_atm_KrelInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, Krel diventa una macchiolina luminosa contro la massa di Lindor, e lo strumento registra diligentemente ogni eclissi netta come fosse un battito cardiaco.
        #JNSQscience_bd_atm_AdenInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il terreno bruno di Aden si risolve in polvere, blocchi e cavità in ombra che sembrano scavate con impazienza.
        #JNSQscience_bd_atm_AdenInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, guardi Aden attraversare la luce riflessa di Lindor, con il suo intero mondo che alterna "fioco" e "molto fioco".
        #JNSQscience_bd_atm_HuygenInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio studia la foschia ambrata di Huygen, dove la luce solare svanisce in una morbida scia molto prima di raggiungere qualcosa di solido.
        #JNSQscience_bd_atm_HuygenInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il bagliore di Huygen è evidente anche da lontano: un guscio atmosferico che tiene la sua superficie educatamente fuori dalla conversazione.
        #JNSQscience_bd_atm_RigaInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, la grande faccia marrone di Riga riempie la vista: alcuni disegni sembrano stranamente familiari finché non ti ricordi che sei molto lontano da casa.
        #JNSQscience_bd_atm_RigaInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio compie accurati passaggi globali, ricomponendo una mappa di Riga che sembra un'imitazione deliberata, senza nessuna delle parti confortevoli.
        #JNSQscience_bd_atm_TalosInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, Talos mostra un rilievo netto e ombre lunghe: ogni bordo di cratere è fin troppo nitido, come se il mondo volesse restare illeggibile.
        #JNSQscience_bd_atm_TalosInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, Talos è un punto solitario vicino a Lindor, e lo strumento registra in silenzio quanto cielo vuoto ci sia tra ogni cosa importante.
        #JNSQscience_bd_atm_CelesInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il supporto diventa uno zoom molto costoso per il terreno spoglio di Eeloo e Celes.
        #JNSQscience_bd_atm_CelesInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, usi la piattaforma stabile per realizzare accurati mosaici del sistema di Eeloo contro un cielo inquietantemente nero.
        #JNSQscience_bd_atm_TamInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio segue la rotazione irregolare di Tam e cerca deboli detriti che potrebbero accompagnarlo.
        #JNSQscience_bd_atm_TamInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, Tam smette di essere un punto e diventa un problema con bordi, ombre e un numero sospetto di spigoli netti.
        #JNSQscience_bd_atm_HamekInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, le ottiche studiano lo strano rossore di Hamek e cercano qualunque cosa sottile o nebulosa che non dovrebbe esserci.
        #JNSQscience_bd_atm_HamekInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio "solare" cataloga in silenzio l'oscurità attorno a Hamek e quanto di essa sembri mancare.
        #JNSQscience_bd_atm_NaraInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, le ottiche studiano la foschia fredda e pesante di Nara e le deboli bande mobili che qui passano per "meteo".
        #JNSQscience_bd_atm_NaraInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio diventa uno scout di sistema, cronometrando eclissi lontane e osservando le nubi di Nara riorganizzarsi senza spiegazioni.
        #JNSQscience_bd_atm_AmosInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, mappi la superficie scura di Amos. Ogni ombra sembra più profonda del dovuto, e le zone luminose paiono casuali.
        #JNSQscience_bd_atm_AmosInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, Amos diventa un bersaglio di calibrazione: un piccolo disco ostinato contro un mare di cielo vuoto.
        #JNSQscience_bd_atm_EnonInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il ghiaccio brillante di Enon inonda i sensori: finisci per fotografare crepe, abbaglio e il confine in cui "bianco" smette di essere un numero utile.
        #JNSQscience_bd_atm_EnonInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, il telescopio esegue lunghe esposizioni attorno a Enon, sperando di catturare polvere tenue, detriti tenui o qualsiasi altra cosa che gli faccia compagnia.
        #JNSQscience_bd_atm_PraxInSpaceLow_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, le ottiche scandagliano creste e pianori di Prax, assemblando una mappa accurata di un mondo che sembra un ripensamento con spigoli affilati.
        #JNSQscience_bd_atm_PraxInSpaceHigh_00 = La fotografia solare è impraticabile a questa distanza. Con i filtri rimossi, usi Prax come puntatore per scandagliare lo spazio vicino in cerca di corpi vaganti, perché ogni grande sistema quaggiù sembra avere degli extra.

        // bd_bioexp
        #JNSQscience_bd_bioexp_SunFlyingLow_00 = Fuori è un ruggente sfocato di luce e scariche statiche. Gli anfibi si raggomitolano, poi riprendono comunque un lento e ostinato ritmo di nuoto.
        #JNSQscience_bd_bioexp_SunFlyingHigh_00 = Il finestrino dell'habitat diventa bianco dorato. Gli anfibi si appiccicano al pannello più fresco.
        #JNSQscience_bd_bioexp_SunInSpaceLow_00 = I contatori di radiazione gracchiano senza sosta e il sistema di raffreddamento sembra offeso. Gli anfibi si aggrappano al lato in ombra come se avessero inventato la "sicurezza solare".
        #JNSQscience_bd_bioexp_SunInSpaceHigh_00 = Nel silenzio dello spazio interplanetario, gli anfibi fluttuano soddisfatti. Continuano a nuotare in minuscoli movimenti, come se lo spazio fosse solo uno stagno molto grande.
        #JNSQscience_bd_bioexp_MohoSrfLandedPoles_00 = Gli anfibi si premono contro il pannello della parete più freddo e si rifiutano di muoversi. Il registro lo chiama "termoregolazione comportamentale". Gli anfibi lo chiamano "sopravvivenza".
        #JNSQscience_bd_bioexp_MohoSrfLandedLowlands_00 = L'habitat vibra per il calore e il metallo scricchiola. Gli anfibi fanno un coraggioso saltello, poi decidono che l'immobilità è un'ottima scelta di vita.
        #JNSQscience_bd_bioexp_MohoSrfLandedPolarIceCraters_00 = Gli strumenti insistono che nelle vicinanze ci sia una sacca di freddo ostinato. Gli anfibi la "scoprono" immediatamente e organizzano un minuscolo sit-in.
        #JNSQscience_bd_bioexp_MohoSrfLandedHighlands_00 = Fuori il terreno sembra cotto e spaccato come uno snack troppo tostato. Gli anfibi continuano a controllare le guarnizioni, come se avessero sviluppato problemi di fiducia.
        #JNSQscience_bd_bioexp_MohoSrfLandedMidlands_00 = La polvere si attacca a tutto nonostante l'assenza d'aria, come se portasse rancore fin dalla formazione. Gli anfibi la fissano come se potesse tentare qualcosa.
        #JNSQscience_bd_bioexp_MohoSrfLandedCraters_00 = Le pareti del cratere proiettano ombre dure sul lander. Gli anfibi migrano all'ombra e si comportano come se l'avessero inventata loro.
        #JNSQscience_bd_bioexp_MohoSrfLandedExoticCraters_00 = Strane chiazze scure fanno litigare i sensori su cosa significhi "roccia normale". Gli anfibi rispondono fingendo che l'intero pianeta sia normale e che loro non siano affatto preoccupati.
        #JNSQscience_bd_bioexp_MohoSrfLandedRareCraters_00 = Ogni lettura torna "insolita", che è una parola davvero poco utile su un mondo come questo. Gli anfibi danno un colpetto al vetro, come per dire "per favore andatevene".
        #JNSQscience_bd_bioexp_MohoSrfLandedVoronoiCraters_00 = Il paesaggio sembra diviso con ordine, come se qualcuno avesse cercato di organizzare gli impatti in celle ordinate. Gli anfibi nuotano sul posto, poco impressionati dalla geometria.
        #JNSQscience_bd_bioexp_MohoSrfLandedNotableCraters_00 = Il Controllo Missione vuole un'osservazione ravvicinata: gli anfibi vogliono la massima distanza. Entrambe le parti concordano che la vista esterna è "intensa".
        #JNSQscience_bd_bioexp_MohoSrfLandedPeaks_00 = Il lander scricchiola mentre si espande e si contrae al sole. Gli anfibi si aggrappano all'angolo più basso e praticano una respirazione molto cauta.
        #JNSQscience_bd_bioexp_MohoInSpaceLow_00 = Anche in microgravità, gli anfibi continuano a provare a "nuotare" lontano dal finestrino luminoso. Il lato in ombra dell'habitat diventa un immobile di pregio.
        #JNSQscience_bd_bioexp_MohoInSpaceHigh_00 = Con Moho ridotto a un piccolo punto duro sotto di te, il carico termico si attenua. Gli anfibi tornano a un'attività normale, che per lo più consiste nel sembrare sospettosamente a loro agio al buio.
        #JNSQscience_bd_bioexp_EveSrfLandedPoles_00 = Fuori sembra tutto calmo, ma il manometro insiste che non lo è. Gli anfibi restano sul pannello più fresco e fanno lenti battiti di palpebre diffidenti.
        #JNSQscience_bd_bioexp_EveSrfLandedLowlands_00 = L'aria è così pesante che il lander sembra abbracciato dall'intero pianeta. Gli anfibi smettono i movimenti di nuoto e iniziano a "fare forza".
        #JNSQscience_bd_bioexp_EveSrfLandedMidlands_00 = La foschia viola dipinge il finestrino dell'habitat come una vetrata. Gli anfibi si radunano in una fila ordinata e la osservano come fosse un acquario.
        #JNSQscience_bd_bioexp_EveSrfLandedHighlands_00 = I numeri si ammorbidiscono un po', e anche gli anfibi. Uno tenta un salto sicuro di sé e subito finge che fosse previsto.
        #JNSQscience_bd_bioexp_EveSrfLandedPeaks_00 = Da quassù, l'orizzonte sembra impossibilmente vicino e lontano allo stesso tempo. Gli anfibi oscillano in una prova di microgravità, come se si preparassero alle emergenze.
        #JNSQscience_bd_bioexp_EveSrfLandedMountains_00 = I venti scuotono lo scafo con spinte lente e potenti. Gli anfibi si appiattiscono sul pavimento e adottano una "strategia a basso profilo".
        #JNSQscience_bd_bioexp_EveSrfLandedShores_00 = La risacca fuori si muove come sciroppo denso sotto un cielo violaceo. Gli anfibi picchiettano sul finestrino, chiedendo chiaramente "non quello".
        #JNSQscience_bd_bioexp_EveSrfLandedKrakensWell_00 = La lettura di pressione passa da "alta" a "personale". Gli anfibi si ritirano nell'angolo e si rifiutano di fare da soggetti sperimentali.
        #JNSQscience_bd_bioexp_EveSrfSplashedExplodiumSea_00 = Qualcosa sotto le onde fa litigare i sensori tra loro. Gli anfibi fissano la superficie ribollente e scelgono di restare al chiuso per sempre.
        #JNSQscience_bd_bioexp_EveSrfSplashedShores_00 = Schiuma e spruzzi colpiscono il lander in lenzuoli al rallentatore. Gli anfibi nuotano sul posto, offesi perché l'acqua di fuori non è invitata dentro.
        #JNSQscience_bd_bioexp_EveSrfSplashedPolarLakes_00 = Qui la superficie è più liscia, come un coperchio su una pentola che potrebbe ancora bollire. Gli anfibi si rilassano finché il termometro non ricorda loro dove sono.
        #JNSQscience_bd_bioexp_EveSrfSplashedPetrolLakes_00 = Il liquido fuori luccica con una patina oleosa che non sembra mai del tutto giusta. Gli anfibi fanno una smorfia che il registro classifica come "forte preferenza".
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofAkron_00 = Lunge e pesanti onde di fondo passano con la pazienza della geologia. Gli anfibi sincronizzano il nuoto alle onde, diventando per caso molto scientifici.
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofNessus_00 = La nebbia impasta tutto oltre pochi metri in un nulla viola. Gli anfibi continuano a voltarsi come se ci fosse sempre qualcosa alle loro spalle.
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofTaniwha_00 = Le letture di galleggiabilità oscillano come se l'oceano stesse prendendo decisioni. Gli anfibi reagiscono diventando estremamente immobili e estremamente giudicanti.
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofGigan_00 = Lo scanner di profondità risponde "sì" per un po', poi smette di essere utile. Gli anfibi risalgono verso l'alto, a quanto pare condividendo la preoccupazione.
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofRodan_00 = Le raffiche spingono la capsula e le onde rispondono ancora più forte. Gli anfibi stringono le maniglie e svolgono "addestramento per vento forte".
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofGojira_00 = Ogni onda sembra appena troppo grande per stare comodi. Gli anfibi continuano a provare a nuotare "in salita", come se questo risolvesse il problema.
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofGhidorah_00 = Scariche statiche scoppiettano sulle antenne e le nubi lampeggiano lontano. Gli anfibi trasaliscono in perfetta sincronia, poi fingono di no.
        #JNSQscience_bd_bioexp_EveSrfSplashedSeaofBagorah_00 = La superficie è liscia come uno specchio e inquietantemente silenziosa. Gli anfibi girano in cerchio lentamente, come se aspettassero che l'oceano sbattesse le palpebre per primo.
        #JNSQscience_bd_bioexp_EveFlyingLow_00 = L'aria densa trasforma ogni movimento in un lento e controllabile fluttuare. Gli anfibi nuotano felici finché il sensore di pressione non rovina l'atmosfera.
        #JNSQscience_bd_bioexp_EveFlyingHigh_00 = Sopra la foschia più fitta, la luce diventa morbida e strana. Gli anfibi fluttuano calmi, osservando il mondo viola ribollire sotto di loro.
        #JNSQscience_bd_bioexp_EveInSpaceLow_00 = Eve riempie il finestrino come una biglia color livido avvolta dalla tempesta. Gli anfibi scivolano verso il lato in ombra e praticano una respirazione molto cauta.
        #JNSQscience_bd_bioexp_EveInSpaceHigh_00 = Con Eve lontana e piccola, gli strumenti finalmente si calmano. Gli anfibi riprendono la loro minuscola routine di nuoto, come se non fosse mai successo nulla di insolito.
        #JNSQscience_bd_bioexp_GillySrfLandedLowlands_00 = Gli anfibi provano a fare un passo con cautela e subito vanno alla deriva in una capriola al rallentatore. Il registro lo segna come "locomozione in gravità quasi nulla".
        #JNSQscience_bd_bioexp_GillySrfLandedMidlands_00 = Senza acqua, improvvisano. Piccole "nuotate" che diventano delicati saltelli sul pavimento dell'habitat. Ogni atterraggio richiede un tempo ottimistico.
        #JNSQscience_bd_bioexp_GillySrfLandedHighlands_00 = Una piccola pendenza trasforma un saltello in una lunga planata. Gli anfibi si aggrappano alla maniglia più vicina e si rifiutano di dimostrare di nuovo per la "ripetibilità".
        #JNSQscience_bd_bioexp_GillyInSpaceLow_00 = Eve riempie la vista di bagliore viola e il monitor delle radiazioni non smette di parlare. Gli anfibi migrano sul lato in ombra e fingono che il finestrino non esista.
        #JNSQscience_bd_bioexp_GillyInSpaceHigh_00 = Con Gilly come un puntino grumoso sotto di te, l'habitat finalmente sembra tranquillo. Gli anfibi riprendono il loro nuoto di routine, come se lo spazio fosse solo un altro tipo di stagno.
        #JNSQscience_bd_bioexp_KerbinSrfLandedAdministration_00 = Alle rane vengono assegnati badge da visitatore e le usano subito per accedere all'armadietto degli snack: la Sicurezza compila un rapporto intitolato Saltelli non autorizzati.
        #JNSQscience_bd_bioexp_KerbinSrfLandedAstronautComplex_00 = I soggetti si ambientano nella vasca idromassaggio del Complesso Astronauti e si rifiutano di andarsene: il reparto medico dichiara che si tratta di uno studio riuscito sulle preferenze dell'habitat.
        #JNSQscience_bd_bioexp_KerbinSrfLandedCrawlerway_00 = I test di vibrazione procedono finché non passa il crawler: tutti concordano che lo scuotimento faceva sicuramente parte del protocollo.
        #JNSQscience_bd_bioexp_KerbinSrfLandedFlagPole_00 = Provi a pesare una rana usando la corda dell'asta della bandiera: l'Ufficiale di Sicurezza ti informa che la bandiera non è strumentazione calibrata.
        #JNSQscience_bd_bioexp_KerbinSrfLandedLaunchPad_00 = Un test motore di routine attiva la risposta di panico dell'esperimento: le rane chiedono un'indennità di rischio pagata in snack.
        #JNSQscience_bd_bioexp_KerbinSrfLandedMissionControl_00 = Ogni gracidio viene registrato come una chiamata: il Controllo Missione ti chiede di smettere di trasmettere telemetria biologica sul canale principale.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&D_00 = Firmi quattordici moduli per osservare una rana: la rana non ne firma nessuno e supera comunque il team di ricerca.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DCentralBuilding_00 = L'aria condizionata crea una minuscola zona climatica: le rane prosperano mentre gli scienziati discutono su quale budget debba pagarla.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DCornerLab_00 = Simuli la microgravità con una sedia girevole: funziona finché qualcuno gira nel verso sbagliato e diventa il gruppo di controllo.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DMainBuilding_00 = Le rane si radunano attorno alla lavagna e fissano le equazioni: la revisione tra pari conclude che hanno opinioni forti.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DObservatory_00 = Un telescopio viene riconvertito per seguire i modelli di migrazione delle rane: gli astronomi non sono divertiti, però prendono appunti.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DSideLab_00 = L'esperimento viene spostato per evitare un'ispezione: le rane seguono la scia di snack e si trasferiscono da sole di nuovo indietro.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DSmallLab_00 = Le rane ci stanno comodamente: gli scienziati no. Questo finisce negli studi sull'utilizzo dello spazio.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DTanks_00 = I serbatoi sono etichettati NON È UN HABITAT: le rane non sono d'accordo e ci si trasferiscono comunque.
        #JNSQscience_bd_bioexp_KerbinSrfLandedR&DWindTunnel_00 = I test in galleria del vento confermano che le rane non sono aerodinamiche: l'Ingegneria chiede se puoi renderle aerodinamiche lo stesso.
        #JNSQscience_bd_bioexp_KerbinSrfLandedRunway_00 = Il controllo del traffico aereo chiede perché la torre sta tracciando rane come velivoli non identificati: richiedi una nuova classificazione chiamata piccolo e determinato.
        #JNSQscience_bd_bioexp_KerbinSrfLandedSPH_00 = Le rane si aggrappano a un'ala prototipo e dimostrano una portanza inaspettata: il team di progettazione la chiama subito biomimetica.
        #JNSQscience_bd_bioexp_KerbinSrfLandedSPHMainBuilding_00 = Qualcuno propone di dipingere le rane per renderle più visibili: le rane bocciano il piano scappando nelle condotte di aerazione.
        #JNSQscience_bd_bioexp_KerbinSrfLandedSPHRoundTank_00 = Il serbatoio rotondo ha un'acustica incredibile: i gracidi rimbombano così bene che il Controllo Missione presume sia un nuovo allarme.
        #JNSQscience_bd_bioexp_KerbinSrfLandedSPHTanks_00 = I serbatoi di stoccaggio formano un labirinto perfetto: le rane lo risolvono più in fretta degli stagisti, e la cosa diventa un problema per le Risorse Umane.
        #JNSQscience_bd_bioexp_KerbinSrfLandedSPHWaterTower_00 = La torre dell'acqua tecnicamente non fa parte dell'area sperimentale: le rane tecnicamente non sono impressionate.
        #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationDishEast_00 = L'antenna parabolica segnala strani cinguettii: si scopre che sono rane che rispondono alla scansione settimanale dell'antenna.
        #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationDishNorth_00 = Testi la risposta comportamentale al rumore radio: le rane tacciono ogni volta che passa il capo scienziato.
        #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationDishSouth_00 = L'esperimento viene brevemente classificato come comunicazioni: le rane pretendono la cifratura e tu offri un asciugamano.
        #JNSQscience_bd_bioexp_KerbinSrfLandedTrackingStationHub_00 = Il personale insiste che gli anfibi richiedano una fotocamera bianca: trovi un compromesso passando un tovagliolo sul tavolo e chiamandolo procedura.
        #JNSQscience_bd_bioexp_KerbinSrfLandedVAB_00 = Le rane si godono la caverna echeggiante finché un ingegnere urla "non vicino all'area di staging" e tutti si ricordano che esistono delle regole.
        #JNSQscience_bd_bioexp_KerbinSrfLandedVABMainBuilding_00 = Usi il gancio della gru come supporto per la microgravità: la Sicurezza lo riclassifica come gravità, per lo più.
        #JNSQscience_bd_bioexp_KerbinSrfLandedVABPodMemorial_00 = Le rane siedono solenni vicino al memoriale, poi provano a mangiare la targa: il rispetto è complicato.
        #JNSQscience_bd_bioexp_KerbinSrfLandedVABRoundTank_00 = I gracidi producono onde stazionarie: l'Acustica rivendica la scoperta e le rane rivendicano le royalties.
        #JNSQscience_bd_bioexp_KerbinSrfLandedVABSouthComplex_00 = La polvere dei vecchi lanci ricopre i campioni: la etichetti come residuo storico per evitare ulteriore burocrazia.
        #JNSQscience_bd_bioexp_KerbinSrfLandedVABTanks_00 = Il parco serbatoi è caldo e ronzante: le rane sembrano calme mentre l'ufficiale di sicurezza no.
        #JNSQscience_bd_bioexp_KerbinSrfLandedKSC_00 = Conduci biologia sul campo in mezzo al centro spaziale: la documentazione finisce per essere più pesante delle rane.
        #JNSQscience_bd_bioexp_KerbinSrfLandedIslandAirfield_00 = L'aeroporto è tranquillo finché le rane non trovano la scorta di snack d'emergenza: la ricerca conclude che gli snack influenzano fortemente la migrazione.
        #JNSQscience_bd_bioexp_KerbinSrfLandedBaikerbanur_00 = Gli uffici abbandonati offrono un'ottima copertura: passi la giornata a studiare il camuffamento delle rane contro la burocrazia.
        #JNSQscience_bd_bioexp_KerbinSrfLandedBaikerbanurLaunchpad_00 = Qualcuno ti sgrida via radio pensando che tu sia sull'altra rampa: le rane fingono di non conoscerti.
        #JNSQscience_bd_bioexp_KerbinSrfLandedIceCaps_00 = L'habitat diventa un minuscolo igloo: gli anfibi entrano in un ordinato ciclo di congelamento e scongelamento e i sensori insistono che questo sia un comportamento perfettamente accettabile.
        #JNSQscience_bd_bioexp_KerbinSrfLandedHighlands_00 = Nell'aria frizzante delle colline, le bestioline si rifiutano di saltellare se l'angolo più caldo non è occupato dagli snack.
        #JNSQscience_bd_bioexp_KerbinSrfLandedMountains_00 = Aria sottile e venti taglienti fanno appiattire e allargare i piccoli animali, come se cercassero di diventare aerodinamicamente poco interessanti.
        #JNSQscience_bd_bioexp_KerbinSrfLandedShores_00 = La sabbia finisce dappertutto e gli anfibi inventano un nuovo tipo di gracidio, profondamente offeso.
        #JNSQscience_bd_bioexp_KerbinSrfLandedMidlands_00 = Tutto è così normale che l'osservazione principale è quanto in fretta gli animali imparino l'orario esatto dei pasti.
        #JNSQscience_bd_bioexp_KerbinSrfLandedLowlands_00 = L'umidità trasforma l'habitat in una sauna: gli anfibi sembrano compiaciuti, come se avessero ordinato loro questo clima.
        #JNSQscience_bd_bioexp_KerbinSrfLandedAridLowlands_00 = Per gran parte della giornata restano immobili come grumi, poi parte un ciclo di nebulizzazione e diventa una situazione di saltelli d'emergenza.
        #JNSQscience_bd_bioexp_KerbinSrfLandedAridMidlands_00 = L'aria secca incoraggia una muta drammatica della pelle: il rapporto viene etichettato "non è una nuova forma di vita" per la terza volta.
        #JNSQscience_bd_bioexp_KerbinSrfLandedAridHighlands_00 = Notti fredde e giorni secchi spingono gli animali in una rigida routine di nascondersi e aspettare che somiglia in modo sospetto a una riunione.
        #JNSQscience_bd_bioexp_KerbinSrfLandedAridMountains_00 = Il riciclatore d'acqua dell'habitat diventa l'unica oasi, completa di gracidi territoriali e fissate aggressive.
        #JNSQscience_bd_bioexp_KerbinSrfLandedWelcomeBackIsland_00 = L'isolamento fa sembrare il gruppo di controllo stranamente solo: fissano l'orizzonte come se si aspettassero una capsula di ritorno.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedGreatLake_00 = I campioni d'acqua dolce producono entusiasmo massimo: gli anfibi tentano di colonizzare il barattolo dei campioni.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedInlandWater_00 = Poco sale e molta alga: le bestioline approvano e lasciano minuscole impronte bagnate su ogni strumento.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedKreenwichSea_00 = Correnti gentili cullano il contenitore e gli animali sincronizzano i gracidi con lo sciabordio, come una piccolissima canzone marinaresca.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedArcticSea_00 = Gli spruzzi freddi si raccolgono in minuscole perle di ghiaccio sulle pareti: gli anfibi passano a una modalità efficiente e silenziosa e risparmiano ogni saltello.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedForemansSea_00 = La chimica dell'acqua è noiosamente stabile finché un anfibio non scopre il sensore di bolle e lo trasforma nel problema di tutti.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedTriangulusSea_00 = L'onda arriva in serie ordinate: le bestioline si irrigidiscono, si rilassano e fingono che fosse stata un'idea loro fin dall'inizio.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedNorthernSea_00 = Una foschia salmastra ricopre i sensori e gli anfibi continuano a provare a sciacquarsi nell'aria come se le dovesse dei favori.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedSub-ArcticSea_00 = Temperature miste causano appannamenti continui: gli animali spariscono nella condensa e riappaiono da qualche parte di scomodo.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedEasternSea_00 = Il coperchio con chiusura magnetica diventa una parete da arrampicata: a quanto pare viaggiare per mare è cosa da mani, non da piedi.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedWesternSea_00 = Un'onda regolare fa sembrare l'habitat un'amaca: le bestioline si rilassano così tanto da sembrare scientificamente inerti.
        #JNSQscience_bd_bioexp_KerbinSrfSplashedShores_00 = Metà bagnato, metà sabbia e tutto confuso: gli anfibi non sanno decidere se nuotare o scavare, quindi fanno entrambe le cose insieme.
        #JNSQscience_bd_bioexp_MunSrfLandedPoles_00 = La lampada solare dell'habitat diventa l'unico "giorno". Le bestioline si raccolgono sotto di essa in un mucchietto compatto e educato e si rifiutano di riconoscere il buio fuori.
        #JNSQscience_bd_bioexp_MunSrfLandedPolarIceCraters_00 = Gli strumenti rilevano deboli tracce di volatili e le pareti del contenitore si appannano con un sussurro di brina. Gli anfibi lo fissano come se fosse un nuovo tipo di finestra.
        #JNSQscience_bd_bioexp_MunSrfLandedHighlands_00 = Polvere fine e brillante si attacca a tutto con ostinazione elettrostatica. Le bestioline sviluppano un "mimetismo a cipria" accidentale e sembrano estremamente soddisfatte di sé.
        #JNSQscience_bd_bioexp_MunSrfLandedMidlands_00 = In bassa gravità, un singolo salto diventa un arco lungo e aggraziato. Il rapporto annota "entusiasmo sostenuto" e "frenata inadeguata".
        #JNSQscience_bd_bioexp_MunSrfLandedLowlands_00 = La regolite più scura riscalda il lander quanto basta da rendere l'habitat accogliente. Gli animali si spaparanzano e si comportano come se avessero terraformato il posto di persona.
        #JNSQscience_bd_bioexp_MunSrfLandedExoticCraters_00 = La ruota di recupero campioni porta dentro polvere di una tonalità strana e i sensori chimici finiscono le spiegazioni semplici. Le bestioline rispondono premendo la faccia sul finestrino e giudicandola.
        #JNSQscience_bd_bioexp_MunSrfLandedRareCraters_00 = Dalla paletta torna una firma minerale insolitamente pulita. Gli anfibi provano subito a rivendicare la "roccia premium" come materiale per il nido.
        #JNSQscience_bd_bioexp_MunSrfLandedVoronoiCraters_00 = Le scansioni del terreno mostrano schemi ripetuti, e il tracciatore di movimento del contenitore registra schemi di salti ripetuti. O è una coincidenza, oppure le bestioline hanno inventato la geometria.
        #JNSQscience_bd_bioexp_MunSrfLandedNotableCraters_00 = Minuscoli tic sismici arrivano da lontano, stirati sottili sul terreno silenzioso. Gli animali si fermano a metà salto, poi riprendono come se nulla fosse, mentre gli strumenti continuano ad ascoltare.
        #JNSQscience_bd_bioexp_MunSrfLandedMountains_00 = Il lander scricchiola su un pendio irregolare e ogni vibrazione diventa un'oscillazione al rallentatore all'interno. Le bestioline si preparano come alpinisti navigati, pur non avendo mai scalato nulla.
        #JNSQscience_bd_bioexp_MinmusSrfLandedPoles_00 = I riscaldatori vanno a ciclo continuo. Le bestioline si raccolgono in un nodino ostinato e si rifiutano di "esplorare" qualsiasi cosa più fredda del vassoio del cibo.
        #JNSQscience_bd_bioexp_MinmusSrfLandedLowlands_00 = La bassa gravità trasforma ogni salto in uno spettacolo al rallentatore. L'habitat registra diversi balzi "celebrativi" e zero atterraggi riusciti.
        #JNSQscience_bd_bioexp_MinmusSrfLandedMidlands_00 = Gli animali percorrono le pareti come se stessero mappando il territorio. La mappa sembra essere soprattutto "angolo caldo" e "angolo meno caldo".
        #JNSQscience_bd_bioexp_MinmusSrfLandedHighlands_00 = Il contenitore scricchiola mentre il lander si assesta. Le bestioline si immobilizzano, poi riprendono a saltellare con la sicurezza di chi non ha letto la valutazione dei rischi.
        #JNSQscience_bd_bioexp_MinmusSrfLandedBasins_00 = Una sottile foschia di polvere si accumula nei filtri. Le bestioline si premono contro il finestrino e la guardano vorticare come un minuscolo sistema meteorologico di cui non possono lamentarsi.
        #JNSQscience_bd_bioexp_MinmusSrfLandedBrownBasins_00 = Graniglia più scura entra nella fotocamera campioni e fa scattare gli allarmi dei sensori chimici. Gli animali rispondono cercando di decorarsi con essa.
        #JNSQscience_bd_bioexp_MinmusSrfLandedBrownLowlands_00 = L'habitat si scalda leggermente sopra il terreno più scuro. Le bestioline si spaparanzano come se avessero scoperto il lusso e il morale sale di conseguenza.
        #JNSQscience_bd_bioexp_MinmusSrfLandedBrownMidlands_00 = La polvere si attacca a tutto con dedizione elettrostatica. Gli anfibi sviluppano per caso "calzini di polvere" e saltellano in giro come se fosse di moda.
        #JNSQscience_bd_bioexp_MinmusSrfLandedBrownHighlands_00 = Gli sbalzi di temperatura costringono il controllore di umidità a lavorare senza sosta. Le bestioline trattano ogni ciclo di nebulizzazione come l'inizio di una festa.
        #JNSQscience_bd_bioexp_MinmusSrfLandedMountains_00 = Il lander è fermo con un'inclinazione scomoda e il "basso" del contenitore sembra facoltativo. Gli animali imparano a irrigidirsi a metà salto e sembrano offesi dalla fisica.
        #JNSQscience_bd_bioexp_MinmusInSpaceLow_00 = In orbita tutto fluttua, inclusi gli snack. Le bestioline padroneggiano l'arte dell'inseguimento lento e il rapporto annota "anfibi insolitamente strategici".
        #JNSQscience_bd_bioexp_MinmusInSpaceHigh_00 = Con Minmus che si rimpicciolisce alle spalle, l'habitat si fa silenzioso tranne per le ventole e i minuscoli movimenti. Gli animali fluttuano sotto la lampada, come se aspettassero un'alba che non arriverà mai.
        #JNSQscience_bd_bioexp_DunaSrfLandedIceCaps_00 = Il rilevatore di umidità dell'habitat inizia a coprirsi di brina: le bestioline formano un serrato capannello vicino al riscaldatore e dichiarano facoltativo il resto di Duna.
        #JNSQscience_bd_bioexp_DunaSrfLandedHighlands_00 = Ogni ciclo di pressione fa scricchiolare il contenitore. Gli anfibi reagiscono appiattendosi e rifiutandosi di sprecare saltelli in "aria sottile".
        #JNSQscience_bd_bioexp_DunaSrfLandedMidlands_00 = La polvere rossa si attacca alle griglie di aspirazione. Le bestioline la guardano vorticare e tentano di "assaggiare" la scienza attraverso il finestrino.
        #JNSQscience_bd_bioexp_DunaSrfLandedLowlands_00 = Un terreno un po' più caldo rende l'habitat accogliente. Gli animali si spaparanzano come pionieri che hanno già rivendicato tutta la valle.
        #JNSQscience_bd_bioexp_DunaSrfLandedCraters_00 = Il lander è fermo in una conca di ombre ed echi. Ogni piccola vibrazione diventa un grande evento e le bestioline saltano per sorpresa all'unisono.
        #JNSQscience_bd_bioexp_DunaSrfLandedRareCraters_00 = Lo spettrometro segnala minerali insoliti nella paletta. Le bestioline provano subito ad adottare la "roccia speciale" come seduta comune.
        #JNSQscience_bd_bioexp_DunaSrfLandedVoronoiCraters_00 = Il terreno a pattern restituisce celle ordinate. Gli anfibi iniziano a saltellare in griglie ordinate, come se tentassero di archiviarsi per bene.
        #JNSQscience_bd_bioexp_DunaSrfLandedNotableCraters_00 = Deboli tremori lontani arrivano stirati sottili sulla regolite. Le bestioline si fermano a metà movimento, poi continuano, mentre gli strumenti restano in ascolto.
        #JNSQscience_bd_bioexp_DunaSrfLandedExoticCraters_00 = I sensori chimici litigano tra loro su tracce di volatili. Gli anfibi fissano la lettura, poco impressionati da qualunque cosa esotica.
        #JNSQscience_bd_bioexp_DunaSrfLandedTrenches_00 = L'orizzonte scompare dietro pareti ripide. Gli animali si impilano sotto la lampada e guardano fuori come se si aspettassero che la trincea sbattesse le palpebre.
        #JNSQscience_bd_bioexp_DunaSrfLandedNotablePlains_00 = Il vento fa sbattere la polvere contro lo scafo in onde regolari. Le bestioline si accovacciano basse e resistono a ogni raffica come coloni navigati.
        #JNSQscience_bd_bioexp_DunaSrfLandedNotableMountains_00 = Il lander flette su terreno irregolare e il contenitore si inclina quanto basta per essere scortese. Gli anfibi si preparano e fulminano la gravità con lo sguardo.
        #JNSQscience_bd_bioexp_DunaSrfLandedMountains_00 = Aria sottile, terreno freddo e cicli termici continui. Le bestioline risparmiano energia, poi la spendono tutta in un unico saltello eroico al rallentatore.
        #JNSQscience_bd_bioexp_DunaSrfLandedVolcano_00 = Il suolo è sospettosamente caldo e deboli tremori fanno ticchettare i sensori. Gli anfibi rivendicano subito l'angolo caldo e si rifiutano di condividerlo.
        #JNSQscience_bd_bioexp_DunaFlyingLow_00 = Una turbolenza polverosa batte contro le pareti dell'habitat. Le bestioline saltano a ogni impatto come se cercassero di aiutare il mezzo a restare in aria.
        #JNSQscience_bd_bioexp_DunaFlyingHigh_00 = Il controllore di pressione lavora senza sosta mentre il cielo si scurisce. Gli anfibi si aggrappano alla lampada e sembrano offesi da quanta poca aria ci sia da respirare.
        #JNSQscience_bd_bioexp_DunaInSpaceLow_00 = Gli snack scappano dal distributore e diventano un esercizio di inseguimento. Le bestioline dimostrano una pazienza notevole e zero senso dello "spazio personale".
        #JNSQscience_bd_bioexp_DunaInSpaceHigh_00 = Duna si rimpicciolisce fino a diventare una moneta color ruggine dietro il veicolo. L'habitat si fa silenzioso e gli animali si raccolgono sotto la luce come se aspettassero il ritorno di un'alba.
        #JNSQscience_bd_bioexp_IkeSrfLandedPoles_00 = I riscaldatori combattono una battaglia persa contro il terreno impregnato di freddo: le bestioline formano un compatto e sospettosamente efficiente "comitato del calore".
        #JNSQscience_bd_bioexp_IkeSrfLandedMountains_00 = Il lander flette su pendii irregolari e ogni scricchiolio diventa una lunga e lenta oscillazione dentro l'habitat. Gli anfibi si preparano come scalatori veterani.
        #JNSQscience_bd_bioexp_IkeSrfLandedMidlands_00 = Polvere grigia fine trova la strada in ogni guarnizione e angolo. Gli animali si ridisegnano addosso la decorazione e si offendono quando i filtri si lamentano.
        #JNSQscience_bd_bioexp_IkeSrfLandedLowlands_00 = La conca poco profonda trattiene un po' di calore extra dal sole. Le bestioline si spaparanzano come se avessero scoperto l'unico punto comodo della luna.
        #JNSQscience_bd_bioexp_IkeSrfLandedHighlands_00 = Con solo il vuoto fuori, il minuscolo ciclo di umidità del contenitore sembra meteo. Gli anfibi si radunano alla porta della nebulizzazione e pretendono più "clima".
        #JNSQscience_bd_bioexp_IkeInSpaceLow_00 = I contatori di radiazione ticchettano regolari mentre Ike rotola sotto. Le bestioline fluttuano sotto la lampada ed evitano il finestrino come se avessero capito cosa significa "non schermato".
        #JNSQscience_bd_bioexp_IkeInSpaceHigh_00 = Ike diventa un puntino pallido sopra il bagliore rosso di Duna. L'habitat si fa silenzioso e gli animali si rannicchiano come se aspettassero una magnetosfera che non arriva mai.
        #JNSQscience_bd_bioexp_EdnaSrfLandedLowlands_00 = La luce è debole e il terreno è più freddo del previsto: le bestioline si ritirano alla lampada e trattano l'"esterno" come una voce.
        #JNSQscience_bd_bioexp_EdnaSrfLandedMidlands_00 = L'habitat registra lunghi periodi immobili interrotti da singoli saltelli determinati, come se stessero cercando di dimostrare che Edna è, davvero, un posto.
        #JNSQscience_bd_bioexp_EdnaSrfLandedHighlands_00 = Ogni tic termico fa scricchiolare il contenitore: gli anfibi si appiattiscono e risparmiano energia con serietà professionale.
        #JNSQscience_bd_bioexp_EdnaSrfLandedPolarIceCraters_00 = Una debole brina sboccia sulla trappola per l'umidità. Le bestioline la guardano formarsi, poi premono la faccia sul finestrino come se fosse un nuovo cielo.
        #JNSQscience_bd_bioexp_EdnaSrfLandedWhites_00 = L'abbaglio della superficie pallida inonda i sensori. Gli animali strizzano gli occhi verso il finestrino e pretendono che la lampada venga alzata lo stesso.
        #JNSQscience_bd_bioexp_EdnaInSpaceLow_00 = Edna rotola sotto come una moneta scura. Le bestioline fluttuano sotto la lampada ed evitano il finestrino, come se sentissero quanto "casa" sia lontana.
        #JNSQscience_bd_bioexp_EdnaInSpaceHigh_00 = La cintura diventa una dispersione di puntini silenziosi. L'habitat si immobilizza quasi del tutto e perfino i gracidi sembrano cercare di non fare eco.
        #JNSQscience_bd_bioexp_DakSrfLandedLowlands_00 = Il lander si assesta con un leggero tonfo: le bestioline reagiscono cercando di "scavare" nel nulla assoluto e sembrando offese dal concetto di roccia.
        #JNSQscience_bd_bioexp_DakSrfLandedMidlands_00 = La microgravità trasforma ogni salto in una lenta capriola. Il rapporto annota diverse "orbite" riuscite del vassoio del cibo.
        #JNSQscience_bd_bioexp_DakSrfLandedHighlands_00 = Il contenitore si inclina su un terreno irregolare a patata e gli animali si preparano come se si fossero allenati per questo per tutta la vita.
        #JNSQscience_bd_bioexp_DakInSpaceLow_00 = Dak riempie il finestrino con una forma poco lusinghiera, ma in qualche modo affascinante. Le bestioline ci fluttuano verso, poi si ricordano che esiste la lampada e scelgono il comfort.
        #JNSQscience_bd_bioexp_DakInSpaceHigh_00 = Dak si rimpicciolisce a un puntino vicino a Edna. Gli animali si rannicchiano nell'angolo caldo, come se l'universo fosse troppo grande per saltellare da una parte all'altra.
        #JNSQscience_bd_bioexp_DresSrfLandedPoles_00 = Il terreno impregnato di freddo fa lavorare duramente i riscaldatori. Le bestioline formano una stretta "pila del calore" e si rifiutano di riconoscere l'orizzonte.
        #JNSQscience_bd_bioexp_DresSrfLandedHighlands_00 = Polvere pallida si attacca a ogni guarnizione e sensore. Gli anfibi si ridisegnano addosso con essa e si comportano come se fosse il giusto abbigliamento da campo.
        #JNSQscience_bd_bioexp_DresSrfLandedMidlands_00 = Tutto sembra insipido finché gli strumenti non iniziano a riempirsi di numeri utili. Le bestioline saltellano con calma, come se avessero sempre saputo che Dres aveva dei segreti.
        #JNSQscience_bd_bioexp_DresSrfLandedLowlands_00 = Una zona un po' più calda trasforma l'habitat in un immobile di pregio. Gli animali si spaparanzano come coloni che rivendicano l'intera fascia.
        #JNSQscience_bd_bioexp_DresSrfLandedCanyon_00 = Il lander è fermo in un lungo taglio in ombra: minuscole vibrazioni restano e tornano. Le bestioline fanno una pausa tra un salto e l'altro come se aspettassero che l'eco finisse.
        #JNSQscience_bd_bioexp_DresInSpaceLow_00 = Dres è ancora facile da perdere finché non è proprio lì. Le bestioline fluttuano sotto la lampada mentre l'equipaggio ricontrolla la navigazione come se fosse uno scherzo.
        #JNSQscience_bd_bioexp_DresInSpaceHigh_00 = Dres svanisce di nuovo nello sfondo dello spazio. L'habitat si fa silenzioso e gli animali si stringono insieme come se cercassero di diventare il loro stesso punto di riferimento.
        #JNSQscience_bd_bioexp_JoolFlyingLow_00 = Gli allarmi di pressione si lamentano senza sosta. Le bestioline si aggrappano alla superficie più calda e sembrano tradite sul personale da ogni raffica.
        #JNSQscience_bd_bioexp_JoolFlyingHigh_00 = Una luce verde filtra attraverso foschia infinita: la turbolenza culla l'habitat come una cattiva idea con un'ottima perseveranza.
        #JNSQscience_bd_bioexp_JoolInSpaceLow_00 = Le nubi sotto ribollono al rallentatore. Le bestioline fluttuano sotto la lampada, mentre il contatore di radiazione insiste per far parte dell'esperimento.
        #JNSQscience_bd_bioexp_JoolInSpaceHigh_00 = Jool diventa una biglia lucida di tempeste. L'habitat sembra minuscolo e gli animali sono d'accordo restando molto vicini tra loro.
        #JNSQscience_bd_bioexp_LaytheSrfLandedShores_00 = Aria umida e colori familiari fanno sembrare l'habitat "quasi casa". Le bestioline pretendono subito una pozza più grande.
        #JNSQscience_bd_bioexp_LaytheSrfLandedShallows_00 = Attraverso i filtri, tutto sa di sale e alghe. Gli animali si premono al finestrino e praticano entusiasti e inutili movimenti di nuoto.
        #JNSQscience_bd_bioexp_LaytheSrfLandedLowlands_00 = Calore e umidità mantengono alta l'attività: il rapporto annota adattamento rapido e rapide aspettative di snack.
        #JNSQscience_bd_bioexp_LaytheSrfLandedMidlands_00 = Condizioni miti producono comportamento calmo finché il primo suono d'onda non colpisce lo scafo: allora tutti saltano in solidarietà.
        #JNSQscience_bd_bioexp_LaytheSrfLandedHighlands_00 = Aria più fresca e umidità più sottile spingono le bestioline in ordinati capannelli vicino alla lampada, interrotti da occasionali giri di "esplorazione".
        #JNSQscience_bd_bioexp_LaytheSrfLandedMountains_00 = Correnti fredde e scricchiolii continui fanno sembrare l'habitat come se respirasse. Gli animali si immobilizzano, ascoltano, poi decidono che la lampada è più sicura.
        #JNSQscience_bd_bioexp_LaytheSrfLandedIceCaps_00 = La brina si forma sulla trappola per l'umidità quasi subito. Le bestioline la fissano come se avessero scoperto un nuovo tipo di meteo.
        #JNSQscience_bd_bioexp_LaytheSrfLandedEnclosedFaults_00 = Le letture di terreno caldo schizzano senza preavviso: gli anfibi rivendicano l'angolo caldo e lo difendono con gracidi estremamente giudicanti.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedShores_00 = L'habitat dondola dolcemente nella risacca. Le bestioline provano a seguire il ritmo e per caso inventano i saltelli sincronizzati.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedShallows_00 = La luce del sole lampeggia sull'acqua e acceca metà dei sensori. Gli animali usano l'abbaglio come copertura per il contrabbando di snack.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedInlandWater_00 = Bassa salinità e molte firme organiche rendono allegre le letture. Le bestioline si comportano come se stessero ispezionando immobili.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedKrenwichSea_00 = La chimica dell'acqua è stabile, le onde no. L'habitat diventa una minuscola nave con un equipaggio impaziente.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedArcticSea_00 = Gli spruzzi raffreddano lo scafo esterno e i riscaldatori lavorano senza sosta. Le bestioline rispondono con una modalità efficiente e silenziosa e con il massimo capannello.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedJoolwardSea_00 = Qui il cielo sembra più pesante, e anche l'onda. Gli animali si preparano a ogni rollio come marinai navigati che non hanno mai navigato.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedPolwardSea_00 = Correnti fredde fanno raccogliere la condensa in lente gocce. Le bestioline inseguono le goccioline come se cercassero di radunare l'acqua.
        #JNSQscience_bd_bioexp_LaytheSrfSplashedEnclosedFaults_00 = Risalite calde appannano il finestrino dall'esterno. Gli anfibi fissano l'acqua fumante e sembrano offesi dal fatto di non potersi sedere dentro.
        #JNSQscience_bd_bioexp_LaytheFlyingLow_00 = Raffiche di vento colpiscono le pareti dell'habitat. Le bestioline saltano a ogni impatto come se provassero a stabilizzare il velivolo con il solo entusiasmo.
        #JNSQscience_bd_bioexp_LaytheFlyingHigh_00 = L'aria si assottiglia e il cielo si scurisce: il controllore di pressione fa tutto il lavoro mentre gli animali si aggrappano alla lampada e fulminano l'altitudine con lo sguardo.
        #JNSQscience_bd_bioexp_LaytheInSpaceLow_00 = I mari di Laythe scintillano sotto in schemi sospettosamente familiari. Le bestioline fluttuano dietro agli snack evasi e l'equipaggio ricontrolla in silenzio le guarnizioni.
        #JNSQscience_bd_bioexp_LaytheInSpaceHigh_00 = Laythe si rimpicciolisce in una perlina luminosa vicino a Jool. L'habitat si fa silenzioso e perfino i gracidi sembrano risparmiare energia per il ritorno.
        #JNSQscience_bd_bioexp_VallSrfLandedPoles_00 = La superficie impregnata di freddo trasforma ogni ciclo di nebulizzazione in un problema di brina. Le bestioline si raccolgono sotto la lampada e si rifiutano di trattare con l'inverno.
        #JNSQscience_bd_bioexp_VallSrfLandedHighlands_00 = Ghiaccio blu e creste affilate circondano il lander. Gli anfibi si appiattiscono e risparmiano saltelli come se fossero una risorsa limitata.
        #JNSQscience_bd_bioexp_VallSrfLandedMidlands_00 = Tutto è abbastanza silenzioso da sentire le ventole dell'habitat come "meteo". Gli animali fanno una pausa tra i movimenti, come se ascoltassero qualcosa sotto il ghiaccio.
        #JNSQscience_bd_bioexp_VallSrfLandedLowlands_00 = Il contenitore si scalda leggermente sopra il terreno più liscio: le bestioline si spaparanzano e si comportano come se avessero scoperto la civiltà.
        #JNSQscience_bd_bioexp_VallSrfLandedMountains_00 = Il lander scricchiola su pendii irregolari e le vibrazioni restano. Gli anfibi si preparano e fissano il finestrino finché lo scuotimento non si ferma.
        #JNSQscience_bd_bioexp_VallInSpaceLow_00 = La superficie azzurra pallida di Vall scorre senza un suono. Le bestioline fluttuano sotto la lampada mentre gli strumenti continuano a insistere che laggiù c'è qualcosa.
        #JNSQscience_bd_bioexp_VallInSpaceHigh_00 = Vall diventa una moneta fredda nel buio. L'habitat sembra troppo luminoso e gli animali si stringono dove le ombre non arrivano.
        #JNSQscience_bd_bioexp_TyloSrfLandedPoles_00 = Terreno freddo e aria sottile fanno lavorare i riscaldatori più del previsto. Le bestioline formano una compatta "pila del calore" e la dichiarano scienza ottimale.
        #JNSQscience_bd_bioexp_TyloSrfLandedMountains_00 = Il contenitore si inclina leggermente su terreno ruvido. Gli anfibi imparano a irrigidirsi a metà salto e sembrano offesi dai pendii.
        #JNSQscience_bd_bioexp_TyloSrfLandedHighlands_00 = L'aria c'è ma non aiuta, e la polvere trova comunque i filtri. Le bestioline ispezionano le prese d'aria come se diffidassero del vento.
        #JNSQscience_bd_bioexp_TyloSrfLandedMidlands_00 = Le condizioni sono abbastanza stabili da incoraggiare l'esplorazione. Il rapporto annota ripetuti tentativi di "rivendicare" il distributore di snack come materiale per il nido.
        #JNSQscience_bd_bioexp_TyloSrfLandedLowlands_00 = Un po' di calore e riparo rendono l'habitat confortevole. Gli animali si rilassano così tanto che il tracciatore di movimento segnala "possibile ibernazione (falso)".
        #JNSQscience_bd_bioexp_TyloFlyingLow_00 = L'aria sottile di azoto martella lo scafo con turbolenza grintosa. Le bestioline saltano a ogni scossone come se avessero un ruolo attivo nell'aerodinamica.
        #JNSQscience_bd_bioexp_TyloFlyingHigh_00 = Il manometro tende verso "per lo più speranza". Gli anfibi si aggrappano alla lampada e si rifiutano di riconoscere il concetto di altitudine.
        #JNSQscience_bd_bioexp_TyloInSpaceLow_00 = La superficie pallida di Tylo sembra ingannevolmente calma dall'orbita. Le bestioline fluttuano in lenti cerchi e gli strumenti continuano a segnalare deboli e strane variazioni.
        #JNSQscience_bd_bioexp_TyloInSpaceHigh_00 = Tylo svanisce nell'ombra di Jool. L'habitat si fa silenzioso e gli animali si rannicchiano come se sentissero il sistema osservare.
        #JNSQscience_bd_bioexp_BopSrfLandedPoles_00 = Il terreno è grumoso, la luce è debole e l'habitat scricchiola in protesta. Le bestioline rispondono trasformando l'angolo caldo in un insediamento permanente.
        #JNSQscience_bd_bioexp_BopSrfLandedMountains_00 = Creste frastagliate incombono fuori come denti rotti. Gli anfibi si immobilizzano tra un salto e l'altro, poi continuano come se il coraggio fosse un'impostazione.
        #JNSQscience_bd_bioexp_BopSrfLandedLowlands_00 = La polvere si deposita in lenti e pigri turbinii. Gli animali provano a "scavare" nel pavimento e scoprono che la roccia non è negoziabile.
        #JNSQscience_bd_bioexp_BopSrfLandedMidlands_00 = Qui tutto sembra improvvisato, compresa la biologia. Il rapporto registra "calma inattesa" e "crescente organizzazione degli snack".
        #JNSQscience_bd_bioexp_BopSrfLandedHighlands_00 = Il lander è fermo su terreno irregolare e non smette di assestarsi. Le bestioline si preparano come se avessero capito che la luna sta ancora decidendo dove si trova.
        #JNSQscience_bd_bioexp_BopInSpaceLow_00 = Bop rotola sotto con una silhouette goffa e irregolare. Le bestioline fluttuano verso il finestrino, poi si ricordano che esiste la lampada e scelgono il comfort.
        #JNSQscience_bd_bioexp_BopInSpaceHigh_00 = Bop diventa un puntino fioco vicino a Jool. L'habitat sembra troppo luminoso e troppo rumoroso, quindi gli animali si immobilizzano del tutto.
        #JNSQscience_bd_bioexp_PolSrfLandedPoles_00 = La superficie sembra morbida finché la paletta non segnala il contrario. Le bestioline fissano la polvere come se avesse promesso loro qualcosa.
        #JNSQscience_bd_bioexp_PolSrfLandedLowlands_00 = Granelli fini si attaccano a ogni guarnizione con ostinazione elettrostatica. Gli anfibi si ridisegnano addosso e si comportano come se fosse equipaggiamento da campo adeguato.
        #JNSQscience_bd_bioexp_PolSrfLandedMidlands_00 = I filtri dell'habitat si riempiono di polvere pallida e le letture restano stranamente pulite. Gli animali saltellano con calma, come se Pol fosse perfettamente normale.
        #JNSQscience_bd_bioexp_PolSrfLandedHighlands_00 = Il lander si assesta con un leggero scricchiolio e il terreno sembra "cedere" un po'. Le bestioline fanno una pausa, poi rivendicano più in fretta l'angolo caldo.
        #JNSQscience_bd_bioexp_PolSrfLandedMountains_00 = Creste si alzano come onde congelate. Gli anfibi tentano un salto ambizioso, fluttuano troppo a lungo e atterrano con dignità offesa.
        #JNSQscience_bd_bioexp_PolInSpaceLow_00 = Il terreno luminoso di Pol scorre sotto come briciole sparse. Le bestioline fluttuano dietro a uno snack fluttuante e per caso completano un giro molto lento.
        #JNSQscience_bd_bioexp_PolInSpaceHigh_00 = Pol svanisce in lontananza finché non resta che un puntino pallido. L'habitat si fa silenzioso e gli animali si stringono insieme come un unico organismo cauto.
        #JNSQscience_bd_bioexp_LindorFlyingLow_00 = L'habitat sussulta a ogni sbalzo di pressione: le bestioline si appiattiscono e si aggrappano alla superficie più calda come se avessero opinioni sull'aerofrenata.
        #JNSQscience_bd_bioexp_LindorFlyingHigh_00 = La foschia trasforma i finestrini in una lanterna verde. Gli animali continuano a saltellare verso la luce come se spiegasse cosa stanno facendo le tempeste.
        #JNSQscience_bd_bioexp_LindorInSpaceLow_00 = La magnetosfera di Lindor fa crepitare gli strumenti. Le bestioline fluttuano sotto la lampada e in qualche modo sembrano compiaciute di essere meglio schermate del nucleo sonda.
        #JNSQscience_bd_bioexp_LindorInSpaceHigh_00 = Lindor si rimpicciolisce in un disco pallido e la nave si sente molto sola. Gli animali si raccolgono in un unico mucchio che fluttua lento e aspettano che torni il "basso".
        #JNSQscience_bd_bioexp_KrelSrfLandedLowlands_00 = Il terreno pallido riflette abbastanza luce da confondere i fotometri. Le bestioline rispondono saltellando in archi lunghi e cauti, come se stessero verificando che la luna non abbia trappole.
        #JNSQscience_bd_bioexp_KrelSrfLandedMidlands_00 = La polvere si solleva a sbuffi e si rifiuta di depositarsi in fretta. Gli animali la guardano fluttuare e provano ad acchiapparla, come se la noia fosse una variabile scientifica.
        #JNSQscience_bd_bioexp_KrelSrfLandedHighlands_00 = L'habitat scricchiola su terreno irregolare. Le bestioline si preparano, si rilassano e poi saltellano con sicurezza contro la stessa parete ancora una volta.
        #JNSQscience_bd_bioexp_KrelSrfLandedPoles_00 = Il freddo penetra in ogni cosa: la lampada diventa l'unico sole accettabile. Gli animali formano un capannello ordinato e rifiutano ulteriori esplorazioni.
        #JNSQscience_bd_bioexp_KrelInSpaceLow_00 = Krel rotola sotto in un netto bianco e nero. Le bestioline fluttuano dietro a uno snack sfuggito e per caso dimostrano un "rendezvous orbitale" attorno al distributore.
        #JNSQscience_bd_bioexp_KrelInSpaceHigh_00 = Krel diventa un puntino fioco vicino a Lindor. L'habitat si fa silenzioso e gli animali risparmiano saltelli come se li stessero tenendo per il viaggio di ritorno.
        #JNSQscience_bd_bioexp_AdenSrfLandedLowlands_00 = La regolite scura fa sembrare l'habitat più caldo di quanto dovrebbe. Le bestioline si spaparanzano come se avessero scoperto il lusso su un mondo molto poco amichevole.
        #JNSQscience_bd_bioexp_AdenSrfLandedMidlands_00 = Fuori c'è solo roccia e silenzio: dentro, gli animali inventano un programma complicato per decidere chi prende per primo l'angolo caldo.
        #JNSQscience_bd_bioexp_AdenSrfLandedHighlands_00 = Polvere fine ricopre le guarnizioni e i sensori si lamentano. Le bestioline si ridisegnano addosso con essa e sembrano estremamente qualificate per il campo.
        #JNSQscience_bd_bioexp_AdenSrfLandedMountains_00 = Il lander si assesta con un lento gemito su un pendio. Gli animali si preparano a metà salto e fulminano la gravità perché è incoerente.
        #JNSQscience_bd_bioexp_AdenSrfLandedPoles_00 = Il freddo trasforma ogni ciclo di nebulizzazione in un avviso di brina. Le bestioline guardano formarsi il ghiaccio e decidono che la lampada è più sicura della curiosità.
        #JNSQscience_bd_bioexp_AdenInSpaceLow_00 = Aden scorre sotto come una piccola biglia marrone con grandi ambizioni. Gli animali fluttuano verso il finestrino, poi si ricordano che esiste il calore e scelgono il comfort.
        #JNSQscience_bd_bioexp_AdenInSpaceHigh_00 = Aden svanisce nello sfondo vicino a Lindor. Le bestioline si stringono insieme come se cercassero di diventare il loro stesso sistema di supporto vitale.
        #JNSQscience_bd_bioexp_HuygenSrfLandedLowlands_00 = L'aria densa preme sullo scafo e il controllore di umidità lavora senza sosta. Le bestioline saltellano felici finché i sensori non lo etichettano come "ottimismo eccessivo".
        #JNSQscience_bd_bioexp_HuygenSrfLandedMidlands_00 = La foschia ambrata rende la luce morbida e strana. Gli animali continuano a fissare il finestrino come se si aspettassero che la nebbia si spiegasse da sola.
        #JNSQscience_bd_bioexp_HuygenSrfLandedHighlands_00 = Terreno più fresco e aria pesante fanno sembrare l'habitat un barattolo sigillato. Le bestioline rallentano e adottano una postura molto seria e molto appiccicosa.
        #JNSQscience_bd_bioexp_HuygenSrfLandedMountains_00 = Il vento colpisce il lander in onde irregolari. Gli animali saltano a ogni impatto come se il loro entusiasmo potesse stabilizzare il meteo.
        #JNSQscience_bd_bioexp_HuygenSrfLandedPeaks_00 = Luce solare tenue e atmosfera densa discutono su chi debba illuminare qualcosa. Le bestioline si stringono alla lampada e rifiutano di accettare le condizioni di illuminazione esterne.
        #JNSQscience_bd_bioexp_HuygenSrfLandedPolarLowlands_00 = Il freddo avanza, ma la pressione resta alta. Le bestioline si rannicchiano strette e sembrano offese dal fatto che "polare" sia un'impostazione.
        #JNSQscience_bd_bioexp_HuygenSrfLandedPoles_00 = La brina prova a formarsi ovunque l'habitat respiri. Gli animali trattano l'angolo caldo come un immobile di pregio e lo difendono con gracidi indignati.
        #JNSQscience_bd_bioexp_HuygenSrfLandedPolarHighlands_00 = Il ciclo termico fa ticchettare e scoppiettare il contenitore. Le bestioline si immobilizzano a ogni suono, poi riprendono a saltellare come se nulla fosse successo.
        #JNSQscience_bd_bioexp_HuygenSrfLandedShores_00 = Attraverso i filtri l'aria sa di chimica bagnata. Le bestioline fissano la risacca e praticano inutili movimenti di nuoto su pavimento asciutto.
        #JNSQscience_bd_bioexp_HuygenSrfSplashedShores_00 = L'habitat dondola dolcemente nelle secche. Gli animali sincronizzano i saltelli con il dondolio come se stessero cercando di navigare.
        #JNSQscience_bd_bioexp_HuygenSrfSplashedMethaneLakes_00 = Gli strumenti insistono che l'"acqua" non è acqua. Le bestioline danno un'occhiata alla condensa e decidono di restare dal lato caldo del vetro.
        #JNSQscience_bd_bioexp_HuygenFlyingLow_00 = Aria densa e turbolenta fa tremare ogni pannello. Gli animali si aggrappano al supporto della lampada e mostrano una forte preferenza per non essere un proiettile.
        #JNSQscience_bd_bioexp_HuygenFlyingHigh_00 = Il cielo si scurisce ma la pressione resta ostinata. Le bestioline fluttuano in lenti cerchi, poco impressionate dal fatto che volare conti ancora come "su".
        #JNSQscience_bd_bioexp_HuygenInSpaceLow_00 = Il globo ambrato di Huygen riempie il finestrino come un'etichetta di avvertimento. Gli animali fluttuano sotto la lampada e ignorano la vista con una negazione ormai allenata.
        #JNSQscience_bd_bioexp_HuygenInSpaceHigh_00 = Huygen si rimpicciolisce in una perlina fosca vicino a Lindor. L'habitat sembra troppo luminoso, quindi le bestioline si raccolgono nelle ombre e aspettano.
        #JNSQscience_bd_bioexp_RigaSrfLandedLowlands_00 = Il terreno sembra familiare in tutti i modi sbagliati. Le bestioline saltellano con sicurezza, come se Riga fosse solo Kerbin con i colori abbassati.
        #JNSQscience_bd_bioexp_RigaSrfLandedMidlands_00 = Una sottile esosfera conta appena come aria, ma i filtri sentono comunque il sapore della polvere. Gli animali ispezionano le prese d'aria come se sospettassero un meteo invisibile.
        #JNSQscience_bd_bioexp_RigaSrfLandedHighlands_00 = Il freddo fa scricchiolare il metallo dell'habitat in lenti tic. Le bestioline fanno una pausa a ogni suono, poi riprendono a saltellare con ostinata normalità.
        #JNSQscience_bd_bioexp_RigaSrfLandedMountains_00 = Il lander è fermo su pendii irregolari e continua ad assestarsi. Gli animali si preparano a metà salto come alpinisti esperti che non hanno mai scalato nulla.
        #JNSQscience_bd_bioexp_RigaSrfLandedPoles_00 = I riscaldatori lavorano duramente contro un orizzonte congelato. Le bestioline formano un compatto "comitato del calore" e si rifiutano di sciogliere il quorum.
        #JNSQscience_bd_bioexp_RigaFlyingLow_00 = L'aria è quasi inesistente, ma riesce comunque a scuotere il veicolo. Le bestioline rimbalzano a ogni vibrazione e sembrano offese dal fatto che il "volo" sia così scosso.
        #JNSQscience_bd_bioexp_RigaFlyingHigh_00 = Fili sottili e scariche statiche fanno sembrare la cabina come se sussurrasse. Gli animali restano vicini alla lampada come se fosse l'unica atmosfera affidabile.
        #JNSQscience_bd_bioexp_RigaInSpaceLow_00 = Riga scorre sotto con un aspetto sospettosamente pratico. Le bestioline inseguono uno snack fluttuante e per caso eseguono un giro perfetto al rallentatore.
        #JNSQscience_bd_bioexp_RigaInSpaceHigh_00 = Riga diventa un piccolo puntino marrone e la nave sembra un avamposto. Gli animali si rannicchiano insieme come se provassero la vita di lunga durata.
        #JNSQscience_bd_bioexp_TalosSrfLandedLowlands_00 = Il sole lontano scalda appena lo scafo. Le bestioline scelgono subito la lampada e trattano Talos come un posto che si visita solo attraverso il vetro.
        #JNSQscience_bd_bioexp_TalosSrfLandedMidlands_00 = La polvere fluttua in lenti sbuffi attorno al lander. Gli animali la guardano posarsi e sembrano delusi che non faccia nulla di interessante.
        #JNSQscience_bd_bioexp_TalosSrfLandedHighlands_00 = Fuori è tutta roccia tagliente e un freddo ancora più tagliente. Le bestioline risparmiano energia, poi la spendono tutta in un unico saltello eroico a bassa gravità.
        #JNSQscience_bd_bioexp_TalosSrfLandedMountains_00 = Il lander scricchiola su un pendio che sembra ingiusto. Gli animali si preparano e fulminano il pavimento con lo sguardo come se fosse responsabile.
        #JNSQscience_bd_bioexp_TalosSrfLandedPoles_00 = Il sistema di umidità dell'habitat si trasforma in un generatore di brina. Le bestioline fissano il ghiaccio e decidono che la scienza si fa meglio dall'angolo caldo.
        #JNSQscience_bd_bioexp_TalosInSpaceLow_00 = Talos rotola sotto come un pensiero silenzioso che qualcuno ha dimenticato di finire. Gli animali fluttuano sotto la lampada e perfino i loro gracidi sembrano cauti.
        #JNSQscience_bd_bioexp_TalosInSpaceHigh_00 = Talos svanisce nello spazio profondo e la cabina sembra molto lontana da tutto. Le bestioline si stringono insieme come se cercassero di farsi la loro gravità.
        #JNSQscience_bd_bioexp_EelooSrfLandedPoles_00 = I riscaldatori perdono la discussione subito. Gli anfibi formano un capannello stretto sotto la lampada e trattano la brina fuori come un affronto personale.
        #JNSQscience_bd_bioexp_EelooSrfLandedHighlands_00 = Il riverbero della superficie è così intenso che i sensori si attenuano da soli. Le bestioline saltellano al rallentatore, come se avessero paura di graffiare la "paletta del gelato".
        #JNSQscience_bd_bioexp_EelooSrfLandedMidlands_00 = Tutto è piatto, pallido e abbastanza silenzioso da sentire le ventole come "meteo". Gli anfibi si assestano in una routine cauta e smettono di sprecare saltelli.
        #JNSQscience_bd_bioexp_EelooSrfLandedLowlands_00 = Un terreno un po' più scuro fa sembrare il contenitore quasi accogliente. Le bestioline si spaparanzano come se avessero scoperto l'unico punto caldo del pianeta.
        #JNSQscience_bd_bioexp_EelooSrfLandedCanyon_00 = L'orizzonte sprofonda in ombra ed echi. Gli anfibi fanno una pausa tra i movimenti, come se aspettassero che il canyon rispondesse.
        #JNSQscience_bd_bioexp_EelooFlyingLow_00 = L'"aria" è soprattutto un'idea, ma riesce comunque a scuotere il veicolo. Le bestioline si aggrappano al supporto della lampada e sembrano offese dal fatto che volare sembri cadere.
        #JNSQscience_bd_bioexp_EelooFlyingHigh_00 = Gli strumenti litigano sul fatto che questo conti davvero come atmosfera. Gli anfibi fluttuano tranquilli, come se avessero accettato che qui il "su" sia facoltativo.
        #JNSQscience_bd_bioexp_EelooInSpaceLow_00 = Eeloo riempie il finestrino come una perlina bianca lucidata. Le bestioline fluttuano sotto la lampada e ignorano la vista, come se fosse meglio non riconoscere la distanza.
        #JNSQscience_bd_bioexp_EelooInSpaceHigh_00 = Eeloo si rimpicciolisce in un puntino luminoso e la cabina sembra molto lontana da tutto. Gli anfibi si raccolgono in un unico mucchio che fluttua lento e aspettano il calore.
        #JNSQscience_bd_bioexp_CelesSrfLandedLowlands_00 = La superficie sembra normale finché gli strumenti non iniziano a compilare rapporti con campi sospettosamente vuoti. Le bestioline saltellano attorno alla targhetta come se cercassero di leggere le censure.
        #JNSQscience_bd_bioexp_CelesSrfLandedMidlands_00 = Ogni scansione del campione restituisce numeri puliti e un silenzio scomodo. Gli anfibi fissano il finestrino, poi l'equipaggio, poi di nuovo il finestrino.
        #JNSQscience_bd_bioexp_CelesSrfLandedHighlands_00 = L'habitat ticchetta e scoppietta per il ciclo termico sul terreno esposto. Le bestioline si immobilizzano a ogni suono, poi riprendono come se avessero firmato anche loro un NDA.
        #JNSQscience_bd_bioexp_CelesSrfLandedMountains_00 = Il lander si assesta su pendii ruvidi e non smette di scricchiolare. Gli anfibi si preparano a metà salto e fulminano la gravità perché non collabora.
        #JNSQscience_bd_bioexp_CelesSrfLandedPoles_00 = Il freddo penetra in ogni cosa e trasforma ogni ciclo di nebulizzazione in un avviso di brina. Le bestioline formano un compatto "comitato del calore" e rifiutano ulteriori domande.
        #JNSQscience_bd_bioexp_CelesInSpaceLow_00 = Celes rotola sotto con un aspetto sterile e clinico. Gli strumenti registrano molto, spiegano poco e le bestioline si comportano come se fosse una procedura normale.
        #JNSQscience_bd_bioexp_CelesInSpaceHigh_00 = Celes diventa una moneta fioca vicino al suo corpo primario. L'habitat si fa silenzioso e perfino i gracidi sembrano cercare di non farsi sentire.
        #JNSQscience_bd_bioexp_TamSrfLandedLowlands_00 = Il terreno sembra assemblato con crateri di scorta. Le bestioline saltellano con cautela, come se la superficie stesse ancora assestandosi nella sua voce di catalogo.
        #JNSQscience_bd_bioexp_TamSrfLandedMidlands_00 = La polvere si solleva a sbuffi e resta in giro più a lungo del dovuto. Gli anfibi la guardano fluttuare e provano ad "acchiapparla" per ragioni che capiscono solo loro.
        #JNSQscience_bd_bioexp_TamSrfLandedHighlands_00 = Il terreno è affilato e la luce è debole. Le bestioline risparmiano energia, poi la spendono tutta in un unico saltello eroico a bassa gravità.
        #JNSQscience_bd_bioexp_TamSrfLandedTwinCraters_00 = Due cavità gemelle dominano la vista. Gli anfibi ne scelgono una come "migliore" e conducono di conseguenza tutte le operazioni di saltello.
        #JNSQscience_bd_bioexp_TamSrfLandedCraters_00 = Il lander è fermo in una conca di ombre e silenzio. Ogni piccola vibrazione diventa un grande evento e le bestioline saltano per sorpresa all'unisono.
        #JNSQscience_bd_bioexp_TamSrfLandedPockmarks_00 = La superficie è punteggiata di piccoli buchi, come se non riuscisse a tenersi addosso la propria polvere. Gli anfibi provano a pattugliare il disegno e finiscono per inventare un gioco.
        #JNSQscience_bd_bioexp_TamInSpaceLow_00 = Tam ruzzola sotto con una silhouette goffa che non sembra mai uguale due volte. Le bestioline fluttuano dietro a uno snack sfuggito e per caso dimostrano una "ricognizione orbitale".
        #JNSQscience_bd_bioexp_TamInSpaceHigh_00 = Tam torna a confondersi nel disordine della cintura come un oggetto che vuole essere dimenticato. Gli anfibi si rannicchiano sotto la lampada e restano molto immobili.
        #JNSQscience_bd_bioexp_HamekSrfLandedLowlands_00 = La polvere rossa macchia ogni giuntura appena la portella fa ciclo. Gli anfibi si ridisegnano addosso con essa e sembrano estremamente soddisfatti del nuovo schema cromatico.
        #JNSQscience_bd_bioexp_HamekSrfLandedMidlands_00 = Gli strumenti insistono che la chimica sia reale, anche se la tonalità sembra irragionevole. Le bestioline saltellano normalmente, come se "misterioso" fosse solo un'altra impostazione.
        #JNSQscience_bd_bioexp_HamekSrfLandedHighlands_00 = Luce tenue e freddo duro fanno sembrare l'habitat una piccola fortezza. Gli anfibi rivendicano l'angolo caldo e lo difendono con gracidi giudicanti.
        #JNSQscience_bd_bioexp_HamekSrfLandedPoles_00 = La brina prova a formarsi ovunque l'habitat respiri, ma fuori resta ostinatamente tinto. Le bestioline fissano il finestrino come se aspettassero che quel colore abbia senso.
        #JNSQscience_bd_bioexp_HamekInSpaceLow_00 = Hamek brilla sotto come una brace che non dovrebbe esistere quaggiù. Gli anfibi fluttuano sotto la lampada ed evitano il finestrino, come se il pianeta stesse fissando loro.
        #JNSQscience_bd_bioexp_HamekInSpaceHigh_00 = Hamek si rimpicciolisce in un puntino rosso scuro e la cabina sembra troppo luminosa. Le bestioline si raccolgono nelle ombre e aspettano che qualcosa cambi per primo.
        #JNSQscience_bd_bioexp_NaraSrfLandedLowlands_00 = L'aria fredda e pesante fa sembrare l'habitat avvolto in una coperta spessa. Le bestioline approvano e rivendicano subito l'angolo caldo come "territorio di bassopiano".
        #JNSQscience_bd_bioexp_NaraSrfLandedMidlands_00 = Il manometro resta ostinatamente alto mentre fuori sembra una foschia fioca senza fine. Gli anfibi saltellano con cautela, come se qui il suono potesse arrivare troppo lontano.
        #JNSQscience_bd_bioexp_NaraSrfLandedHighlands_00 = Il lander scricchiola mentre si raffredda e si contrae. Le bestioline si immobilizzano a ogni tic, poi riprendono con la sicurezza di chi non ha mai letto un termometro.
        #JNSQscience_bd_bioexp_NaraSrfLandedMountains_00 = Luce solare tenue e aria densa discutono su quale delle due conti davvero. Gli anfibi si stringono sotto la lampada e fulminano il finestrino come se stesse trattenendo il calore.
        #JNSQscience_bd_bioexp_NaraSrfLandedPolarLowlands_00 = La brina prova a formarsi ovunque l'habitat "respiri". Le bestioline trattano ogni ciclo di nebulizzazione come una sfida personale e vincono stringendosi ancora di più.
        #JNSQscience_bd_bioexp_NaraSrfLandedPoles_00 = Il freddo è immediato e assoluto. Gli animali formano un mucchietto ordinato sotto la lampada e si rifiutano di riconoscere che esista l'esplorazione.
        #JNSQscience_bd_bioexp_NaraSrfLandedPolarHighlands_00 = Ogni vibrazione echeggia nello scafo come se avesse spazio per viaggiare. Le bestioline diventano molto immobili, poi saltellano al rallentatore come se stessero testando la realtà.
        #JNSQscience_bd_bioexp_NaraFlyingLow_00 = L'aria densa martella lo scafo in onde pesanti e pigre. Le bestioline si aggrappano al supporto della lampada e sembrano offese dal fatto che "volare" includa così tanto scuotimento.
        #JNSQscience_bd_bioexp_NaraFlyingHigh_00 = Il cielo si scurisce, ma la pressione resta seria. Gli anfibi fluttuano e sbattono lentamente le palpebre, come se l'altitudine fosse solo un altro tipo di freddo.
        #JNSQscience_bd_bioexp_NaraInSpaceLow_00 = Il bordo di Nara coperto di foschia brilla debolmente sotto. Gli strumenti crepitano, le bestioline si rannicchiano e tutti fingono che sia scienza di routine.
        #JNSQscience_bd_bioexp_NaraInSpaceHigh_00 = Nara si rimpicciolisce in un disco fioco molto sotto. L'habitat sembra troppo luminoso, quindi gli animali si raccolgono nelle ombre e aspettano che torni il "basso".
        #JNSQscience_bd_bioexp_AmosSrfLandedLowlands_00 = Il terreno è scuro e poco accogliente, ma la lampada è affidabile. Le bestioline riorganizzano subito l'habitat in "caldo" e "non caldo".
        #JNSQscience_bd_bioexp_AmosSrfLandedMidlands_00 = La bassa gravità trasforma un saltello in una lenta decisione fluttuante. Il rapporto annota tempo in aria prolungato e zero rimpianti.
        #JNSQscience_bd_bioexp_AmosSrfLandedHighlands_00 = La polvere si attacca a ogni superficie con ostinazione elettrostatica. Gli anfibi si ridisegnano addosso e sembrano estremamente qualificate per il campo.
        #JNSQscience_bd_bioexp_AmosSrfLandedMountains_00 = Il lander si assesta su terreno irregolare con un lungo gemito metallico. Le bestioline si preparano a metà salto e fulminano il pavimento perché si muove.
        #JNSQscience_bd_bioexp_AmosSrfLandedPoles_00 = Il freddo penetra in fretta senza aria ad attenuarlo. Gli animali formano un compatto "comitato del calore" e si rifiutano di aggiornarsi.
        #JNSQscience_bd_bioexp_AmosInSpaceLow_00 = Amos rotola sotto come una roccia silenziosa e ostinata. Le bestioline fluttuano sotto la lampada mentre il contatore di radiazione insiste per farsi sentire.
        #JNSQscience_bd_bioexp_AmosInSpaceHigh_00 = Amos diventa un puntino vicino all'oscurità di Nara. L'habitat si immobilizza e perfino i gracidi sembrano risparmiare energia.
        #JNSQscience_bd_bioexp_EnonSrfLandedLowlands_00 = La superficie è pallida e abbastanza fredda da rendere nervosi i riscaldatori. Gli anfibi si rannicchiano e fissano il finestrino come se potesse iniziare a nevicare dentro.
        #JNSQscience_bd_bioexp_EnonSrfLandedMidlands_00 = L'abbaglio tipo ghiaccio inonda i sensori. Le bestioline strizzano gli occhi, poi saltellano comunque, come se la luminosità fosse un problema risolvibile.
        #JNSQscience_bd_bioexp_EnonSrfLandedHighlands_00 = L'habitat ticchetta per lo stress termico. Gli animali si fermano a ogni suono, poi riprendono con ostinata normalità.
        #JNSQscience_bd_bioexp_EnonSrfLandedPoles_00 = Il freddo è così totale da sembrare organizzato. Le bestioline restano sotto la lampada e trattano il movimento come uno spreco di calore.
        #JNSQscience_bd_bioexp_EnonInSpaceLow_00 = La superficie bianca di Enon scorre sotto con un'inquietante pulizia. Le bestioline fluttuano dietro a uno snack fluttuante come piccoli satelliti determinati.
        #JNSQscience_bd_bioexp_EnonInSpaceHigh_00 = Enon svanisce nel buio attorno a Nara. L'habitat sembra molto piccolo e gli animali sono d'accordo stringendosi in un unico mucchio che fluttua lento.
        #JNSQscience_bd_bioexp_PraxSrfLandedLowlands_00 = Il terreno sembra normale finché non ti ricordi dove sei. Le bestioline saltellano con sicurezza, come se la vita di frontiera fosse solo un'impostazione.
        #JNSQscience_bd_bioexp_PraxSrfLandedMidlands_00 = Polvere fine si infila nelle guarnizioni e i filtri si lamentano. Gli anfibi "aiutano" indossandola come una divisa.
        #JNSQscience_bd_bioexp_PraxSrfLandedHighlands_00 = Il lander scricchiola su terreno ruvido e non smette di assestarsi. Le bestioline si preparano a metà salto come esploratori esperti senza alcuna esperienza precedente.
        #JNSQscience_bd_bioexp_PraxSrfLandedMountains_00 = I pendii rendono negoziabile il senso di "basso" dell'habitat. Gli animali imparano a saltare, fluttuare e atterrare con dignità offesa.
        #JNSQscience_bd_bioexp_PraxSrfLandedPoles_00 = Metallo impregnato di freddo e nessuna aria a fare da cuscinetto. Le bestioline rivendicano subito l'angolo della lampada e lo difendono con un silenzio giudicante.
        #JNSQscience_bd_bioexp_PraxInSpaceLow_00 = Prax ruota sotto come un piccolo mondo avamposto in addestramento. Le bestioline fluttuano tranquille mentre gli strumenti continuano a chiedere più dati di quanti Prax sembri disposto a concedere.
        #JNSQscience_bd_bioexp_PraxInSpaceHigh_00 = Prax si rimpicciolisce in un puntino e la missione sembra più lontana da tutto. Gli animali si stringono insieme come se cercassero di farsi la loro atmosfera.

        // bd_camera
        #JNSQscience_bd_camera_SunFlyingLow_00 = La fotocamera scruta una foschia ribollente di luce e tremolio di calore. L'immagine si risolve in null'altro che abbaglio e un'icona di avvertimento.
        #JNSQscience_bd_camera_SunFlyingHigh_00 = Scatti una ripresa ampia degli strati superiori del sole. Filamenti sottili e fronti ondulati si spalmano sull'inquadratura mentre le ottiche faticano a star dietro.
        #JNSQscience_bd_camera_SunInSpaceLowNorthPolarZone_00 = La regione polare mostra vortici stretti di filamenti luminosi. La fotocamera insiste che questo sia "meteo normale".
        #JNSQscience_bd_camera_SunInSpaceLowNorthSubpolarZone_00 = Una catena di lentiggini più scure marcia attorno alla zona. Provi a mettere a fuoco: l'autofocus apre un reclamo.
        #JNSQscience_bd_camera_SunInSpaceLowNorthTemperateZone_00 = La superficie si risolve in una trama granulare e ribollente. Il controllo dell'esposizione ormai è soprattutto ottimismo.
        #JNSQscience_bd_camera_SunInSpaceLowNorthTropicZone_00 = Anelli luminosi si inarcano oltre l'orizzonte per un battito, poi il sensore cede e riempie tutto di bianco.
        #JNSQscience_bd_camera_SunInSpaceLowEquatorialZone_00 = Una fascia tremolante taglia l'inquadratura. Non capisci se siano rotazione, vibrazione o tutte e due che litigano.
        #JNSQscience_bd_camera_SunInSpaceLowSouthTropicZone_00 = Nodi scintillanti punteggiano la vista, poi la fotocamera ti suggerisce gentilmente di "considerare di puntare altrove".
        #JNSQscience_bd_camera_SunInSpaceLowSouthTemperateZone_00 = Catturi un momento di relativa calma, poi striature strisciano sull'immagine come se i pixel si stessero sciogliendo.
        #JNSQscience_bd_camera_SunInSpaceLowSouthSubpolarZone_00 = Le ombre del bordo rendono la superficie stratificata e profonda. Il Controllo Missione ti chiede di non dare nomi agli strati.
        #JNSQscience_bd_camera_SunInSpaceLowSouthPolarZone_00 = Il bagliore polare forma un anello ordinato nella foto. Il fotogramma successivo è tutto bianco e sa di costoso.
        #JNSQscience_bd_camera_MohoSrfLandedPoles_00 = Fotografi il terreno polare dal lander. Metà inquadratura è un'ombra tagliente, l'altra metà è puro abbaglio.
        #JNSQscience_bd_camera_MohoInSpaceLowPoles_00 = Da un'orbita bassa, i poli sembrano raschiati a pulito, con ombre che restano nette anche quando tutto il resto si lava via.
        #JNSQscience_bd_camera_MohoSrfLandedLowlands_00 = I bassipiani escono piatti e sovraesposti, come se il pianeta stesse cercando di cancellare i propri dettagli.
        #JNSQscience_bd_camera_MohoInSpaceLowLowlands_00 = La fotocamera mappa ampie conche pallide e sottili venature scure. La curva di contrasto è praticamente una scogliera.
        #JNSQscience_bd_camera_MohoSrfLandedPolarIceCraters_00 = Nell'ombra del cratere compaiono deboli scintillii dove nulla dovrebbe scintillare. Scatti immagini extra, per sicurezza.
        #JNSQscience_bd_camera_MohoInSpaceLowPolarIceCraters_00 = I fondi dei crateri restano ostinatamente scuri, ma alcuni pixel luccicano mentre passi sopra, come se la roccia nascondesse qualcosa di riflettente.
        #JNSQscience_bd_camera_MohoSrfLandedHighlands_00 = Gli altopiani sembrano cotti e friabili da vicino. Polvere fine si attacca all'alloggiamento dell'obiettivo come se volesse un passaggio verso casa.
        #JNSQscience_bd_camera_MohoInSpaceLowHighlands_00 = Creste e altipiani proiettano ombre lunghe e pulite. La superficie sembra incisa più che consumata.
        #JNSQscience_bd_camera_MohoSrfLandedMidlands_00 = Le terre di mezzo appaiono in foto come lastre fratturate senza fine. Ogni crepa sembra puntare verso il sole.
        #JNSQscience_bd_camera_MohoInSpaceLowMidlands_00 = Le terre di mezzo formano un disordinato patchwork di chiaro e scuro. Il tuo "semplice rilevamento" diventa un progetto a mosaico.
        #JNSQscience_bd_camera_MohoSrfLandedCraters_00 = La parete del cratere riempie l'inquadratura in una luce dura. La fotocamera non sa decidere se sia terreno o un flare solare.
        #JNSQscience_bd_camera_MohoInSpaceLowCraters_00 = Nelle immagini i crateri si accumulano su crateri, ogni bordo getta un'ombra sottile come un coltello. Di "piatto" ne resta appena.
        #JNSQscience_bd_camera_MohoSrfLandedExoticCraters_00 = Il materiale del cratere si fotografa con tonalità strane che non corrispondono al resto di Moho. La calibrazione dice che va tutto bene: i tuoi occhi non sono d'accordo.
        #JNSQscience_bd_camera_MohoInSpaceLowExoticCraters_00 = La fotocamera cattura sacche di colorazione insolita attorno a certi crateri, come se qualcosa di diverso fosse schizzato su da sotto.
        #JNSQscience_bd_camera_MohoSrfLandedRareCraters_00 = La trama di questo cratere sembra sbagliata in modo molto specifico. Scatti una serie accurata, poi smetti di guardarlo troppo da vicino.
        #JNSQscience_bd_camera_MohoInSpaceLowRareCraters_00 = Alcuni crateri spiccano per una geometria quasi troppo ordinata. Le immagini sembrano voler dimostrare qualcosa.
        #JNSQscience_bd_camera_MohoSrfLandedVoronoiCraters_00 = Da vicino, il terreno si spezza in celle ripetute come una glassa crepata. Lo schema sembra proseguire oltre i bordi dello scatto.
        #JNSQscience_bd_camera_MohoInSpaceLowVoronoiCraters_00 = Dall'orbita, i crateri si risolvono in una rete a piastrelle. L'algoritmo di compressione della fotocamera si arrende e salva tutto.
        #JNSQscience_bd_camera_MohoSrfLandedNotableCraters_00 = Inquadri il cratere "notevole" come richiesto. Il risultato è una cartolina perfetta di calore, polvere e rimpianto.
        #JNSQscience_bd_camera_MohoInSpaceLowNotableCraters_00 = Il Controllo Missione chiede un panorama. Fornisci una lunga e sudata occhiata al buco più fotogenico del pianeta.
        #JNSQscience_bd_camera_MohoSrfLandedPeaks_00 = Le cime ardono alla luce diretta del sole mentre le valli diventano nere come la pece. È la prima volta che vedi un paesaggio senza vie di mezzo.
        #JNSQscience_bd_camera_MohoInSpaceLowPeaks_00 = Dorsi e sommità catturano la luce come vetro rotto. La fotocamera continua ad attenuarsi come se venisse rimproverata.
        #JNSQscience_bd_camera_EveSrfLandedMountains_00 = Le montagne si alzano come isole scure in un cielo viola. Ogni ombra sembra più profonda del dovuto.
        #JNSQscience_bd_camera_EveSrfLandedShores_00 = La costa è un confine netto tra risacca viola e terra ancora più viola. La fotocamera continua a tentare di correggere i colori fino a farli diventare assurdi.
        #JNSQscience_bd_camera_EveSrfLandedKrakensWell_00 = Il terreno sprofonda in una cavità color livido. Il flash rifiuta di illuminare il fondo, come se stesse declinando con educazione.
        #JNSQscience_bd_camera_EveSrfSplashedExplodiumSea_00 = La superficie brilla con una patina viola oleosa. L'obiettivo si appanna all'istante, lasciando l'orizzonte come una sbavatura di colore e preoccupazione.
        #JNSQscience_bd_camera_EveSrfSplashedShores_00 = Un'inquadratura bassa della risacca cattura schiuma quasi luminosa. L'immagine successiva include un avviso su "umidità inattesa".
        #JNSQscience_bd_camera_EveSrfSplashedPolarLakes_00 = Il lago è scuro, immobile e fin troppo riflettente. Non capisci se stai vedendo nubi o qualcosa che osserva le nubi.
        #JNSQscience_bd_camera_EveSrfSplashedPetrolLakes_00 = Il liquido ha un aspetto vischioso e pesante che fa arrancare l'esposizione della fotocamera. L'aria odora come se volesse sciogliere il treppiede.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofAkron_00 = Increspature scorrono su una pianura viola fino alla foschia. Il colore è così uniforme che sembra messo in scena.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofNessus_00 = La linea dell'acqua sembra netta, poi ondeggia quando sbatti le palpebre. La foto esce comunque perfettamente stabile.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofTaniwha_00 = Le onde sferzano lo scafo con lenta sicurezza. La fotocamera cattura una superficie lucida che non sembra mai scintillare.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofGigan_00 = Il mare è un ampio foglio di viola con striature più scure sotto. Le etichetti come "correnti" e vai avanti in fretta.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofRodan_00 = La foschia trasforma l'orizzonte lontano in un gradiente morbido. Da vicino, bolle scoppiettano contro il paraluce come minuscoli allarmi.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofGojira_00 = La superficie sembra calma finché non cambia il vento. La foto cattura un disegno di increspature che non corrisponde alle raffiche.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofGhidorah_00 = Diverse serie d'onde si incrociano con angoli strani, come se discutessero su quale direzione sia avanti. La fotocamera registra fedelmente la disputa.
        #JNSQscience_bd_camera_EveSrfSplashedSeaofBagorah_00 = Il mare riflette il cielo viola così pulito da sembrare uno specchio. Ricontrolli di non stare galleggiando a testa in giù.
        #JNSQscience_bd_camera_EveInSpaceLowPoles_00 = Sopra i poli, la copertura nuvolosa si stringe in spire pallide. La superficie sotto è solo una voce negli spazi vuoti.
        #JNSQscience_bd_camera_EveInSpaceLowLowlands_00 = I bassipiani stanno sotto una coperta spessa di foschia viola. Schiarite occasionali suggeriscono distese piatte che non restano mai visibili a lungo.
        #JNSQscience_bd_camera_EveInSpaceLowMidlands_00 = Ombre di nubi spezzate strisciano sulle terre di mezzo. La fotocamera cattura un paesaggio che sembra più vicino di quanto sia.
        #JNSQscience_bd_camera_EveInSpaceLowHighlands_00 = Gli altopiani spingono contro la foschia, scuri e frastagliati. Per un momento, il terreno sembra protendersi verso l'orbiter.
        #JNSQscience_bd_camera_EveInSpaceLowPeaks_00 = Cime a forma di ago bucano strati di nubi più chiari. Lo scatto esce nitido, e in qualche modo questo lo peggiora.
        #JNSQscience_bd_camera_EveInSpaceLowExplodiumSea_00 = Il mare si intravede come una macchia viola profonda e lucida. La luce del sole vi guizza sopra come un'etichetta di avvertimento.
        #JNSQscience_bd_camera_EveInSpaceLowMountains_00 = Le montagne proiettano ombre che sopravvivono alla foschia. Il contrasto fa sembrare la catena irreale, come se fosse stata disegnata dopo.
        #JNSQscience_bd_camera_EveInSpaceLowShores_00 = Un confine sottile e serpeggiante segna dove la terra incontra il mare. La linea è così pulita che sospetti che il pianeta stia prendendo in giro la tua mappa.
        #JNSQscience_bd_camera_EveInSpaceLowPolarLakes_00 = I laghi polari appaiono come monete scure in nubi pallide. Scompaiono nella foschia e ricompaiono esattamente dove non te li aspettavi.
        #JNSQscience_bd_camera_EveInSpaceLowPetrolLakes_00 = I laghi sembrano più pesanti di quanto l'acqua dovrebbe sembrare dall'orbita. Il bilanciamento automatico del bianco si arrende e li chiama "viola".
        #JNSQscience_bd_camera_EveInSpaceLowSeaofAkron_00 = Il mare si distende come inchiostro rovesciato sotto le nubi. Non riesci a trovare una costa per più di un battito.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofNessus_00 = I varchi tra le nubi rivelano una liscia distesa viola sotto. Il riverbero sembra in ritardo, come se la luce ci stesse pensando prima.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofTaniwha_00 = Sottili bande nel mare si vedono attraverso la foschia leggera. Non si allineano ai venti, ma si allineano al tuo disagio.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofGigan_00 = Striature scure attraversano il mare in ampi archi. La fotocamera le etichetta come "caratteristiche" e si rifiuta di elaborare.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofRodan_00 = Il mare riflette le cime delle nubi verso di te, raddoppiate e distorte. Per un istante non distingui cosa sia sopra e cosa sia sotto.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofGojira_00 = Un'ampia macchia viola cambia tonalità mentre passi sopra. Sembra meno acqua e più una superficie che finge.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofGhidorah_00 = La foschia si assottiglia quanto basta per mostrare schemi d'onda che si incrociano. Sembrano organizzati, come un diagramma.
        #JNSQscience_bd_camera_EveInSpaceLowSeaofBagorah_00 = Il mare luccica debolmente attraverso lo smog viola. Il riflesso ti segue più a lungo del dovuto.
        #JNSQscience_bd_camera_EveInSpaceLowKrakensWell_00 = Una depressione scura sta sotto un vortice di nubi più sottili. La fotocamera trova subito il centro, come se sapesse già dove guardare.
        #JNSQscience_bd_camera_GillyInSpaceLowLowlands_00 = Fotografi i bassipiani dall'"orbita", che sembra sospettosamente una lenta caduta. Il terreno sembra ghiaia rovesciata tenuta insieme dall'ostinazione.
        #JNSQscience_bd_camera_GillyInSpaceLowMidlands_00 = Le terre di mezzo scorrono sotto di te in una pigra parallasse. Nelle foto, ogni masso proietta un'ombra abbastanza grande da diventare un punto di riferimento.
        #JNSQscience_bd_camera_GillyInSpaceLowHighlands_00 = Gli altopiani riempiono l'inquadratura di creste frastagliate e contrasto netto. La fotocamera cattura un orizzonte che curva così poco da sembrare più un'idea.
        #JNSQscience_bd_camera_KerbinSrfLandedMidlands_00 = Scatti una foto di dolci colline verdi cucite da fiumi e strade. Sembra abbastanza normale da farti venire nostalgia di casa.
        #JNSQscience_bd_camera_KerbinSrfLandedLowlands_00 = La fotocamera cattura terreno piatto e umido e una bassa nebbia che abbraccia l'orizzonte. L'obiettivo torna con un sottile strato di fango "locale".
        #JNSQscience_bd_camera_KerbinSrfLandedAridLowlands_00 = Una pianura polverosa si estende in marroni pallidi e verdi stanchi. L'autofocus continua ad agganciarsi al tremolio di calore.
        #JNSQscience_bd_camera_KerbinSrfLandedAridMidlands_00 = Brughiera e roccia spezzata creano un disegno maculato sotto una luce dura. La foto sembra in qualche modo croccante.
        #JNSQscience_bd_camera_KerbinSrfLandedAridHighlands_00 = Creste sbiancate dal sole proiettano ombre nette come se qualcuno avesse alzato troppo il contrasto. La foto esce come un poster geologico perfetto.
        #JNSQscience_bd_camera_KerbinSrfLandedAridMountains_00 = Cime frastagliate si alzano dalla foschia secca, ognuna che sfida il treppiede a ribaltarsi. La fotocamera registra un diavolo di polvere lontano come una sfocatura educata.
        #JNSQscience_bd_camera_KerbinSrfLandedWelcomeBackIsland_00 = Una piccola isola riempie l'inquadratura: tracce, segni di spruzzi e un paracadute sospettosamente familiare in lontananza. Etichetti lo scatto "casa, di nuovo".
        #JNSQscience_bd_camera_KerbinSrfSplashedShores_00 = Fotografi la risacca a livello dell'acqua. Metà immagine è schiuma e abbaglio, l'altra metà è un alloggiamento della fotocamera molto bagnato.
        #JNSQscience_bd_camera_KerbinSrfSplashedGreatLake_00 = Il lago è liscio e calmo, riflette le nubi come uno specchio. La tua scia rovina la simmetria per la scienza.
        #JNSQscience_bd_camera_KerbinSrfSplashedInlandWater_00 = Acqua torbida e canneti incorniciano uno scatto sorprendentemente tranquillo. Qualcosa urta lo scafo e la foto successiva viene scattata per sbaglio.
        #JNSQscience_bd_camera_KerbinSrfSplashedKreenwichSea_00 = Un orizzonte ordinato taglia l'inquadratura, come se il mare stesse cercando di sembrare ufficiale. La fotocamera insiste che l'acqua sia "molto blu" e va avanti.
        #JNSQscience_bd_camera_KerbinSrfSplashedArcticSea_00 = Catturi ghiaccio galleggiante e un cielo pallido nella stessa inquadratura. La brina avanza sull'obiettivo tra uno scatto e l'altro come se fosse casa sua.
        #JNSQscience_bd_camera_KerbinSrfSplashedForemansSea_00 = Acqua increspata punteggia l'obiettivo di spruzzi salati. La fotocamera continua a scattare più in fretta di quanto tu riesca a pulire.
        #JNSQscience_bd_camera_KerbinSrfSplashedTriangulusSea_00 = Le onde si incrociano con angoli ordinati, rendendo la superficie sospettosamente a pattern. Scatti una seconda foto nel caso il mare cambi idea.
        #JNSQscience_bd_camera_KerbinSrfSplashedNorthernSea_00 = L'acqua si stende sotto nubi basse e grigie. È una cartolina molto drammatica con pochissima allegria da cartolina.
        #JNSQscience_bd_camera_KerbinSrfSplashedSub-ArcticSea_00 = Fanghiglia e acqua scura si mescolano in striature vorticanti. La fotocamera cattura l'attimo prima che ti si intorpidiscano le dita.
        #JNSQscience_bd_camera_KerbinSrfSplashedEasternSea_00 = La luce del sole sfiora l'acqua e trasforma tutto in scintillio. L'esposimetro combatte con coraggio e perde.
        #JNSQscience_bd_camera_KerbinSrfSplashedWesternSea_00 = L'acqua risplende di riflessi lunghi e caldi. Ogni foto sembra una brochure finché un'onda non dà una botta al fianco del veicolo.
        #JNSQscience_bd_camera_KerbinInSpaceLowMidlands_00 = Una trapunta di verdi e grigi scorre sotto di te, spezzata da fiumi serpeggianti. La fotocamera fa sembrare Kerbin assemblato con cura.
        #JNSQscience_bd_camera_KerbinInSpaceLowLowlands_00 = I bassipiani sfumano in fasce di nebbia dove le ombre delle nubi fluttuano come lividi lenti. Zoomi e ti rendi conto di quanto "casa" sia fradicia d'acqua.
        #JNSQscience_bd_camera_KerbinInSpaceLowAridLowlands_00 = Pianure pallide e canali asciutti tracciano linee sottili sulla superficie. Anche dall'orbita, il terreno sembra assetato.
        #JNSQscience_bd_camera_KerbinInSpaceLowAridMidlands_00 = Altopiani beige a chiazze incontrano bordi più verdi in confini irregolari. Il contrasto sembra come se qualcuno avesse rovesciato sabbia su una mappa.
        #JNSQscience_bd_camera_KerbinInSpaceLowAridHighlands_00 = Creste aspre e chiare catturano il sole e proiettano ombre lunghe. L'immagine esce abbastanza nitida da farti fidare di nuovo del pianeta.
        #JNSQscience_bd_camera_KerbinInSpaceLowAridMountains_00 = Dorsi montuosi affilati tagliano un velo di nubi sottili, con polvere che velatura le valli. La fotocamera cattura un tipo di panorama che fa male ai tuoi piani di atterraggio.
        #JNSQscience_bd_camera_KerbinInSpaceLowGreatLake_00 = Un lago interno scuro sta lì come una macchia d'inchiostro versata con precisione. I riflessi delle nubi ci scorrono sopra mentre passi in alto.
        #JNSQscience_bd_camera_KerbinInSpaceLowInlandWater_00 = Stretti corsi d'acqua intrecciano terre più verdi, lampeggiando d'argento al sole. La fotocamera continua a inquadrarli come se stessero cercando di scrivere qualcosa.
        #JNSQscience_bd_camera_KerbinInSpaceLowKreenwichSea_00 = Linee di costa curvano pulite attorno a un mare ampio, ordinate abbastanza da sembrare un diagramma dimostrativo. Scatti una foto prima che le nubi possano rovinarla.
        #JNSQscience_bd_camera_KerbinInSpaceLowArcticSea_00 = Il mare vicino al polo è maculato di ghiaccio e acqua aperta in chiazze vorticanti. Il sensore della fotocamera sembra avere freddo solo a guardarlo.
        #JNSQscience_bd_camera_KerbinInSpaceLowForemansSea_00 = Creste bianche e ombre di nubi fanno sembrare il mare inquieto anche dall'orbita. La tua foto è soprattutto trama e slancio.
        #JNSQscience_bd_camera_KerbinInSpaceLowTriangulusSea_00 = Tre bande di nubi distinte convergono sopra il mare, creando una forma di freccia involontaria. La fotocamera la inquadra come se fosse intenzionale.
        #JNSQscience_bd_camera_KerbinInSpaceLowNorthernSea_00 = Una vasta distesa scura sta sotto una pesante copertura nuvolosa. La costa appare e scompare come se venisse montata in diretta.
        #JNSQscience_bd_camera_KerbinInSpaceLowSub-ArcticSea_00 = Correnti fredde tracciano deboli striature sotto nubi spezzate. La fotocamera cattura margini fangosi che sembrano il mare che si sfilaccia.
        #JNSQscience_bd_camera_KerbinInSpaceLowEasternSea_00 = La luce del mattino trasforma l'acqua in un nastro brillante lungo la costa. Il riflesso segue la tua orbita come se volesse un altro passaggio.
        #JNSQscience_bd_camera_KerbinInSpaceLowWesternSea_00 = La luce tarda addolcisce il mare in blu profondi e ombre lunghe. La fotocamera lo fa sembrare calmo, cosa che sai essere una bugia.
        #JNSQscience_bd_camera_KerbinInSpaceLowWelcomeBackIsland_00 = Un minuscolo puntino d'isola sta in una vasta inquadratura oceanica, con una linea sospettosamente dritta che lo attraversa. Zoomi e decidi di non aver visto nulla.
        #JNSQscience_bd_camera_MunSrfLandedHighlands_00 = Fotografi roccia fratturata degli altopiani. Ogni scheggia proietta un'ombra nitida, come se Mun fosse renderizzata in "nitidezza massima".
        #JNSQscience_bd_camera_MunSrfLandedLowlands_00 = I bassipiani escono come pianure lisce e polverose con pochissimi punti di riferimento. È la foto perfetta di "dove abbiamo parcheggiato?".
        #JNSQscience_bd_camera_MunSrfLandedPolarIceCraters_00 = Nell'ombra dei crateri polari, la fotocamera cattura deboli scintillii che non dovrebbero esserci in un posto senza aria e senza pietà.
        #JNSQscience_bd_camera_MunSrfLandedExoticCraters_00 = I pattern di ejecta sembrano stranamente striati e non combaciano. La tabella di calibrazione insiste che sia tutto dello stesso colore comunque.
        #JNSQscience_bd_camera_MunSrfLandedRareCraters_00 = Il bordo di questo cratere è insolitamente pulito e rotondo, come se fosse stato stampato sulla superficie invece di essere stato scavato da un'esplosione.
        #JNSQscience_bd_camera_MunSrfLandedVoronoiCraters_00 = Il terreno si spezza in piastrelle poligonali ripetute. L'algoritmo di compressione della fotocamera va in silenziosa modalità panico e salva tutto.
        #JNSQscience_bd_camera_MunSrfLandedNotableCraters_00 = Un cratere "notevole" riempie l'inquadratura esattamente come richiede la checklist. Il Controllo Missione lo richiede di nuovo "per scopi di navigazione".
        #JNSQscience_bd_camera_MunSrfLandedMountains_00 = Cime frastagliate e valli nere come la pece dominano lo scatto. Sul Mun non esiste una luce gentile, solo decisioni.
        #JNSQscience_bd_camera_MunInSpaceLowHighlands_00 = Da un'orbita bassa, gli altopiani sembrano stagnola accartocciata spolverata di grigio. Le ombre disegnano una mappa in rilievo che senti attraverso lo schermo.
        #JNSQscience_bd_camera_MunInSpaceLowLowlands_00 = Ampie conche lisce scorrono sotto di te come polvere versata. La foto fa sembrare l'atterraggio facile, ed è così che Mun ti frega.
        #JNSQscience_bd_camera_MunInSpaceLowPolarIceCraters_00 = I crateri polari mostrano fondi scuri con minuscole macchie chiare attorno ai bordi. Segni le coordinate e fingi che sia routine.
        #JNSQscience_bd_camera_MunInSpaceLowExoticCraters_00 = Alcuni campi di crateri spiccano per tonalità leggermente diverse, come se Mun si fosse riparata con la roccia sbagliata.
        #JNSQscience_bd_camera_MunInSpaceLowRareCraters_00 = A questa quota diversi crateri sono sospettosamente simmetrici. La fotocamera li inquadra come bersagli senza che nessuno glielo chieda.
        #JNSQscience_bd_camera_MunInSpaceLowVoronoiCraters_00 = La rete di poligoni si estende per chilometri in un pattern ordinato e innaturale. Sembra che la superficie sia stata piastrellata apposta.
        #JNSQscience_bd_camera_MunInSpaceLowNotableCraters_00 = L'ombra del cratere di riferimento forma dall'orbita una sagoma pulita e netta. Non indica nulla di utile, ma di certo è memorabile.
        #JNSQscience_bd_camera_MunInSpaceLowMountains_00 = Creste montuose proiettano ombre lunghe sulla regolite. La foto le fa sembrare più alte del tuo budget di carburante.
        #JNSQscience_bd_camera_MinmusSrfLandedMidlands_00 = Le "terre di mezzo" sembrano come se qualcuno avesse provato a lisciare la menta e avesse mollato a metà. La fotocamera cattura graffi, creste e un sacco di silenzioso vuoto.
        #JNSQscience_bd_camera_MinmusSrfLandedBasins_00 = Giù nella conca, la superficie è quasi offensivamente piatta. La foto la fa sembrare una colata congelata che ha deciso di diventare terreno.
        #JNSQscience_bd_camera_MinmusSrfLandedBrownBasins_00 = La conca qui ha una tinta sporca, come se la menta fosse rimasta fuori troppo a lungo. La fotocamera continua a insistere che sia lo stesso materiale comunque.
        #JNSQscience_bd_camera_MinmusSrfLandedBrownLowlands_00 = Il terreno basso è più scuro e più polveroso del previsto, come se la glassa abituale fosse stata raschiata via. Scatti diverse foto e fingi che sia normale.
        #JNSQscience_bd_camera_MinmusSrfLandedBrownMidlands_00 = Le terre di mezzo virano verso un marrone verde spento sotto la luce dura. L'immagine sembra "Minmus" che prova un travestimento.
        #JNSQscience_bd_camera_MinmusSrfLandedBrownHighlands_00 = Anche il terreno alto qui ha un tono smorzato e consumato. La fotocamera cattura ombre nitide che fanno sembrare voluto il cambio di colore.
        #JNSQscience_bd_camera_MinmusSrfLandedMountains_00 = Le montagne sono tutti angoli scomodi e lastre rotte, ammucchiate come palline cadute dal cono. La fotocamera le adora, il carrello d'atterraggio no.
        #JNSQscience_bd_camera_MinmusInSpaceLowPoles_00 = I poli mostrano chiazze luminose e ombre lunghe in forte contrasto. L'istogramma della fotocamera è praticamente una staccionata.
        #JNSQscience_bd_camera_MinmusInSpaceLowLowlands_00 = I bassipiani scorrono sotto di te come campi lisci e pallidi con quasi nessuna trama. È il tipo di panorama che ti fa perdere il senso della velocità.
        #JNSQscience_bd_camera_MinmusInSpaceLowMidlands_00 = Le terre di mezzo sembrano graffiate e irregolari, con creste basse che catturano la luce con angoli proprio sbagliati. La foto sembra più vicina di quanto dovrebbe.
        #JNSQscience_bd_camera_MinmusInSpaceLowHighlands_00 = Gli altopiani appaiono più ruvidi e più luminosi, spezzati in lastre affilate e crepe. Dall'orbita sembra che qualcuno abbia dato un morso alla superficie.
        #JNSQscience_bd_camera_MinmusInSpaceLowBasins_00 = Le conche sono ampie lastre piatte che corrono per chilometri con quasi nessun rilievo. La fotocamera produce una foto che è soprattutto "in piano".
        #JNSQscience_bd_camera_MinmusInSpaceLowBrownBasins_00 = Queste conche hanno una tonalità più scura che spicca anche da un'orbita bassa. Il contrasto le fa sembrare macchie sulla menta.
        #JNSQscience_bd_camera_MinmusInSpaceLowBrownLowlands_00 = Una zona di bassipiani più spenta e più marrone interrompe il solito terreno pallido. La fotocamera la segna come caratteristica: tu la segni come "interessante".
        #JNSQscience_bd_camera_MinmusInSpaceLowBrownMidlands_00 = Le terre di mezzo qui sbiadiscono verso una tonalità fangosa, come se un sottile strato di polvere si fosse depositato su tutto. La foto esce stranamente smorzata.
        #JNSQscience_bd_camera_MinmusInSpaceLowBrownHighlands_00 = Terreno alto più scuro forma isole rugose contro le pianure più chiare. Le ombre sono così nitide che sembrano disegnate.
        #JNSQscience_bd_camera_MinmusInSpaceLowMountains_00 = Le creste montuose proiettano ombre lunghe e frastagliate sulle pianure circostanti. Per un attimo, Minmus sembra meno un dessert e più un guaio.
        #JNSQscience_bd_camera_DunaSrfLandedIceCaps_00 = La fotocamera cattura ghiaccio pallido spolverato di rosso ai bordi. Il cielo è color salmone anche qui, come se il pianeta non riuscisse a farne a meno.
        #JNSQscience_bd_camera_DunaSrfLandedHighlands_00 = Creste frastagliate e roccia spazzata dal vento riempiono l'inquadratura. Polvere fine addolcisce ogni linea, come se il paesaggio venisse levigato in tempo reale.
        #JNSQscience_bd_camera_DunaSrfLandedMidlands_00 = Uno scatto ampio mostra terreno screpolato e pendii lievi che sfumano nella foschia. L'orizzonte sembra più vicino del dovuto.
        #JNSQscience_bd_camera_DunaSrfLandedLowlands_00 = I bassipiani si stendono piatti e vuoti, con increspature di polvere come onde congelate. Il "colore automatico" della fotocamera si arrende e lo chiama "rosso".
        #JNSQscience_bd_camera_DunaSrfLandedCraters_00 = La parete del cratere è stratificata con bande più scure e ghiaioni chiari. Le ombre restano nette, ma l'aria riesce comunque a sfocare la distanza.
        #JNSQscience_bd_camera_DunaSrfLandedRareCraters_00 = Il bordo di questo cratere è stranamente pulito e distinto dai vicini. Scatti foto extra, giusto per provare che non fosse un artefatto di compressione.
        #JNSQscience_bd_camera_DunaSrfLandedVoronoiCraters_00 = Crepe poligonali piastrellano il terreno in celle ripetute. Il pattern sembra progettato finché non ricordi che anche la natura sa essere scortese.
        #JNSQscience_bd_camera_DunaSrfLandedNotableCraters_00 = Il cratere "notevole" si inquadra alla perfezione, come se si fosse allenato. Il Controllo Missione richiede lo scatto di nuovo "a riferimento".
        #JNSQscience_bd_camera_DunaSrfLandedExoticCraters_00 = Qui gli ejecta appaiono in foto in tonalità strane che non corrispondono alla polvere circostante. La calibrazione dice "normale", i tuoi occhi dicono "no".
        #JNSQscience_bd_camera_DunaSrfLandedTrenches_00 = La trincea sprofonda in un taglio rosso e fioco. La fotocamera non sa decidere se esporre per il bordo o per qualunque cosa si nasconda sotto.
        #JNSQscience_bd_camera_DunaSrfLandedNotablePlains_00 = Da questa angolazione le pianure sembrano lisce e quasi accoglienti. Poi il vento aumenta e la foto diventa un filtro di sabbia.
        #JNSQscience_bd_camera_DunaSrfLandedNotableMountains_00 = Un profilo montuoso drammatico si staglia contro un cielo sottile e rosato. Le cime sembrano più vicine del tuo piano di salita.
        #JNSQscience_bd_camera_DunaSrfLandedMountains_00 = Dorsi di roccia e canaloni soffocati di polvere dominano lo scatto. La fotocamera continua a trovare granelli sull'obiettivo che un secondo fa non c'erano.
        #JNSQscience_bd_camera_DunaSrfLandedVolcano_00 = Pendii scuri e roccia spezzata suggeriscono antica violenza sotto un manto di polvere. L'area del condotto sembra troppo ordinata, come se fosse stata riassettata.
        #JNSQscience_bd_camera_DunaInSpaceLowIceCaps_00 = Da un'orbita bassa, il ghiaccio polare brilla nella foschia in chiazze pallide. Polvere rossa contorna i bordi come una macchia che non va via.
        #JNSQscience_bd_camera_DunaInSpaceLowHighlands_00 = Gli altopiani appaiono come terreno ruvido e luminoso con ombre lunghe. La foschia di polvere sfuma il dettaglio fine in qualcosa di quasi pittorico.
        #JNSQscience_bd_camera_DunaInSpaceLowMidlands_00 = Ampie transizioni di tonalità segnano le terre di mezzo sotto nubi sottili. La fotocamera fa sembrare il pianeta ingannevolmente calmo.
        #JNSQscience_bd_camera_DunaInSpaceLowLowlands_00 = I bassipiani formano lisce conche rosse con deboli striature di vento. La superficie sembra abbastanza morbida da lasciare impronte dall'orbita.
        #JNSQscience_bd_camera_DunaInSpaceLowCraters_00 = I crateri si sovrappongono come fossette nella polvere, i bordi catturano il sole. L'atmosfera spalma il lato lontano in una sfumatura rosa.
        #JNSQscience_bd_camera_DunaInSpaceLowRareCraters_00 = Alcuni crateri spiccano per bordi insolitamente netti e interni ordinati. La fotocamera li inquadra come se stessero cercando di farsi notare.
        #JNSQscience_bd_camera_DunaInSpaceLowVoronoiCraters_00 = La rete di poligoni appare come una sottile trama a piastrelle su aree vaste. Zoomi e la piastrellatura si rifiuta di finire.
        #JNSQscience_bd_camera_DunaInSpaceLowNotableCraters_00 = L'ombra del cratere di riferimento crea una sagoma audace anche attraverso la foschia. È il tipo di elemento con cui navighi... e di cui ti preoccupi dopo.
        #JNSQscience_bd_camera_DunaInSpaceLowExoticCraters_00 = Strane chiazze di colore circondano certi impatti, come se una roccia diversa fosse stata lanciata su e non si fosse più mescolata. La fotocamera lo registra con tranquilla sicurezza.
        #JNSQscience_bd_camera_DunaInSpaceLowTrenches_00 = Trincee incidono sottili linee scure sulla superficie, scomparendo sotto veli di polvere. I loro percorsi sembrano troppo dritti finché la successiva non piega.
        #JNSQscience_bd_camera_DunaInSpaceLowNotablePlains_00 = Le pianure si stendono come un foglio rosso liscio con striature spazzolate dal vento. Sembra un sito d'atterraggio finché non ricordi che è Duna.
        #JNSQscience_bd_camera_DunaInSpaceLowNotableMountains_00 = Un gruppo montuoso distinto si alza sul terreno circostante, proiettando ombre marcate. Le cime sembrano in attesa di impigliare un'orbita.
        #JNSQscience_bd_camera_DunaInSpaceLowMountains_00 = Catene montuose incidono la superficie in creste e conche. La fotocamera cattura pennacchi di polvere che fanno sembrare la mappa provvisoria.
        #JNSQscience_bd_camera_DunaInSpaceLowVolcano_00 = La regione vulcanica mostra pendii più scuri e trame radiali simili a colate. La foschia la fa sembrare antica, finché la luce non la colpisce nel modo giusto.
        #JNSQscience_bd_camera_IkeSrfLandedPoles_00 = La fotocamera inquadra una pianura polare pallida e polverosa sotto un sole sottile e freddo. Duna pende sopra come promemoria.
        #JNSQscience_bd_camera_IkeSrfLandedMountains_00 = Creste frastagliate tagliano l'immagine in una luce dura. Ogni roccia proietta un'ombra così netta da tagliare la carta.
        #JNSQscience_bd_camera_IkeSrfLandedMidlands_00 = Un campo di terreno screpolato e piccoli impatti riempie l'inquadratura. Sembra che la superficie si sia dimenticata di finire di formarsi.
        #JNSQscience_bd_camera_IkeSrfLandedLowlands_00 = I bassipiani appaiono in foto come conche più scure con polvere alla deriva. L'orizzonte sembra più vicino del dovuto.
        #JNSQscience_bd_camera_IkeSrfLandedHighlands_00 = Terreno alto luminoso e scrostato riflette la luce dritta nell'obiettivo. Il controllo dell'esposizione negozia per un po' di pietà.
        #JNSQscience_bd_camera_IkeInSpaceLowPoles_00 = Da un'orbita bassa, i poli sono chiazze pallide circondate da ombre lunghe. Il terreno sembra silenziosamente instabile.
        #JNSQscience_bd_camera_IkeInSpaceLowMountains_00 = Dorsi montuosi spiccano come denti scuri contro una regolite più chiara. Quasi senti i sobbalzi attraverso la foto.
        #JNSQscience_bd_camera_IkeInSpaceLowMidlands_00 = Le terre di mezzo si risolvono in grigi maculati e cicatrici sovrapposte. La navigazione diventa "scegli un cratere e impegnati".
        #JNSQscience_bd_camera_IkeInSpaceLowLowlands_00 = Ampie depressioni compaiono come macchie profonde e scure. Il contrasto le fa sembrare senza fondo.
        #JNSQscience_bd_camera_IkeInSpaceLowHighlands_00 = Gli altopiani brillano al sole con un rilievo netto. È un promemoria molto bello che atterrare qui è un brutto piano.
        #JNSQscience_bd_camera_EdnaSrfLandedLowlands_00 = La fotocamera cattura terreno scuro e appiattito con sparsi puntini chiari. Persino la polvere sembra stanca quaggiù.
        #JNSQscience_bd_camera_EdnaSrfLandedMidlands_00 = Terreno ondulato e spezzato si stende fino a un orizzonte fioco. La foto sembra scattata al crepuscolo, anche a mezzogiorno.
        #JNSQscience_bd_camera_EdnaSrfLandedHighlands_00 = Gli altopiani sono ruvidi e spigolosi, come ardesia fratturata. Le ombre ristagnano in crepe che non si schiariscono mai del tutto.
        #JNSQscience_bd_camera_EdnaSrfLandedPolarIceCraters_00 = Nell'ombra del cratere polare, deboli chiazze chiare restano attaccate al fondo. La fotocamera continua a decidere se sia ghiaccio o riverbero.
        #JNSQscience_bd_camera_EdnaSrfLandedWhites_00 = I "bianchi" escono sorprendentemente luminosi contro il terreno scuro. Il flare dell'obiettivo sembra imbarazzato di essere qui.
        #JNSQscience_bd_camera_EdnaInSpaceLowLowlands_00 = L'orbita bassa mostra ampie pianure scure con rari puntini luminosi. Il mondo sembra cercare di non farsi notare.
        #JNSQscience_bd_camera_EdnaInSpaceLowMidlands_00 = Le terre di mezzo formano un delicato patchwork di grigi. È difficile dire dove finisce una caratteristica e dove un'altra rinuncia.
        #JNSQscience_bd_camera_EdnaInSpaceLowHighlands_00 = Creste degli altopiani proiettano ombre lunghe e sottili su una superficie smorzata. Il rilievo si legge come un avvertimento silenzioso.
        #JNSQscience_bd_camera_EdnaInSpaceLowPolarIceCraters_00 = I crateri polari appaiono come pozzi scuri con bordi netti e occasionali luccichii chiari. Svaniscono dietro il bordo prima che tu possa sentirti sicuro.
        #JNSQscience_bd_camera_EdnaInSpaceLowWhites_00 = Regioni luminose spiccano come vernice versata sul carbone. La fotocamera le etichetta come "alta albedo" e si rifiuta di speculare.
        #JNSQscience_bd_camera_EdnaInSpaceHigh_00 = Da molto in alto, Edna è una moneta scura con spruzzi chiari che si rifiutano di mescolarsi. Il sole è solo un'altra stella e la fotocamera comincia a comportarsi come se le mancasse.
        #JNSQscience_bd_camera_DakSrfLandedLowlands_00 = La fotocamera fotografa una pianura grumosa di detriti e polvere. Sembra che il terreno stia insieme per accordo reciproco.
        #JNSQscience_bd_camera_DakSrfLandedMidlands_00 = Il terreno di quota media si alza in pieghe irregolari, come una superficie impastata che non è mai stata lisciata. Nell'immagine non ci sono linee dritte su cui riposare.
        #JNSQscience_bd_camera_DakSrfLandedHighlands_00 = Il terreno alto è una cresta frastagliata di massi impilati ad angoli impossibili. La fotocamera cattura il tipo di pendio che fa sospirare gli ingegneri.
        #JNSQscience_bd_camera_DakInSpaceLowLowlands_00 = Dall'"orbita", i bassipiani scorrono in lenta parallasse. L'intero corpo sembra un singolo masso sovradimensionato con aspirazioni.
        #JNSQscience_bd_camera_DakInSpaceLowMidlands_00 = Le terre di mezzo mostrano solchi poco profondi e trame graffiate, come se qualcosa lo stesse levigando con delicatezza da secoli.
        #JNSQscience_bd_camera_DakInSpaceLowHighlands_00 = Gli altopiani sporgono come spuntoni e creste affilate che proiettano ombre ridicole. Potresti navigare un masso alla volta.
        #JNSQscience_bd_camera_DakInSpaceHigh_00 = Dak è un puntino che ruota e continua a scivolare fuori dall'inquadratura. Riesci a ottenere un buon scatto che sembra esattamente "una roccia", solo molto lontana.
        #JNSQscience_bd_camera_DresSrfLandedCanyon_00 = Fotografi la parete del canyon che sprofonda in una lunga trincea pallida. L'ombra sul fondo sembra più fredda dello spazio.
        #JNSQscience_bd_camera_DresInSpaceLowPoles_00 = La regione polare appare slavata e fragile da un'orbita bassa. Le ombre restano nitide, come se la superficie detestasse la morbidezza.
        #JNSQscience_bd_camera_DresInSpaceLowHighlands_00 = Gli altopiani mostrano un rilievo netto in cento sottili grigi. La fotocamera fa sembrare "noioso" qualcosa di progettato con cura.
        #JNSQscience_bd_camera_DresInSpaceLowMidlands_00 = Le terre di mezzo scorrono come pendii dolci spezzati da innumerevoli piccoli crateri. È una lezione di perseveranza.
        #JNSQscience_bd_camera_DresInSpaceLowLowlands_00 = I bassipiani appaiono più lisci e più chiari, con cicatrici incise come vecchi appunti. Zoomi e trovi altri appunti.
        #JNSQscience_bd_camera_DresInSpaceLowCanyon_00 = Il canyon incide una linea scura sulla superficie pallida, troppo pulita per ignorarla. La fotocamera lo segue come se si aspettasse una battuta finale.
        #JNSQscience_bd_camera_JoolInSpaceLowEquatorialBands_00 = La fotocamera cattura luminose bande verdi che scorrono in strisce senza fine. L'intero pianeta sembra fatto di movimento.
        #JNSQscience_bd_camera_JoolInSpaceLowExposedLowerDeck_00 = Una breccia nella foschia superiore rivela uno "strato inferiore" più scuro sotto. Vorresti subito non aver guardato.
        #JNSQscience_bd_camera_JoolInSpaceLowSubpolarBands_00 = Qui le bande si attorcigliano in nodi e riccioli, come se l'atmosfera si stesse intrecciando. Tracciare le strutture diventa una discussione con lo shear.
        #JNSQscience_bd_camera_JoolInSpaceLowNorthPole_00 = Vicino al polo, le tempeste si impilano in spire strette attorno a un centro fioco. La fotocamera continua a centrarlo senza che nessuno glielo chieda.
        #JNSQscience_bd_camera_JoolInSpaceLowSouthPole_00 = Le nubi polari meridionali formano una ciotola rotante di verdi pallidi e ombre più scure. Sembra stabile nello stesso modo in cui è stabile un trapano.
        #JNSQscience_bd_camera_JoolInSpaceLowStormComplex_00 = Un enorme campo di tempeste riempie l'inquadratura con vortici stratificati e bordi luminosi. La foto sembra rumorosa anche senza suono.
        #JNSQscience_bd_camera_LaytheSrfLandedShallows_00 = L'acqua è così limpida che puoi fotografare il fondale attraverso le increspature. L'aspetto "tropicale" sarebbe rassicurante se le onde non fossero leggermente fuori sincrono.
        #JNSQscience_bd_camera_LaytheSrfLandedHighlands_00 = Creste scolpite dal vento attraversano il terreno alto come dune congelate. La fotocamera continua a trovare sabbia dove ti aspettavi roccia.
        #JNSQscience_bd_camera_LaytheSrfLandedMountains_00 = Cime frastagliate tagliano una foschia bassa con Jool che incombe sopra. La foto è bella in un modo che rende fragile il tuo piano di atterraggio.
        #JNSQscience_bd_camera_LaytheSrfLandedIceCaps_00 = Lastre di ghiaccio azzurro biancastro si estendono fino all'orizzonte, spezzate in una geometria dura. La fotocamera registra un debole bagliore del cielo che danza lungo i bordi.
        #JNSQscience_bd_camera_LaytheSrfLandedEnclosedFaults_00 = Il terreno si apre in lunghe trincee chiuse, con pareti nette e foschia raccolta sul fondo. Ogni foto sembra avere una profondità che non riesci a misurare.
        #JNSQscience_bd_camera_LaytheSrfLandedLowlands_00 = Terreno piatto e suolo dall'aria umida fanno sembrare la scena quasi casa. Poi il vento cambia e l'aria ti ricorda che non lo è.
        #JNSQscience_bd_camera_LaytheSrfLandedMidlands_00 = Terreno ondulato e affioramenti rocciosi sparsi appaiono in foto bene sotto nubi sottili. Il paesaggio sembra familiare finché non provi a dare un nome a ciò che manca.
        #JNSQscience_bd_camera_LaytheSrfSplashedShores_00 = Risacca e schiuma martellano l'alloggiamento della fotocamera con spruzzi pieni di entusiasmo. Metà immagini sono cartoline, l'altra metà sono goccioline d'acqua.
        #JNSQscience_bd_camera_LaytheSrfSplashedShallows_00 = Lo scafo fluttua sopra acqua bassa e luminosa con piccole onde gentili. La fotocamera cattura pattern che non combaciano del tutto con la brezza.
        #JNSQscience_bd_camera_LaytheSrfSplashedInlandWater_00 = Acque interne riparate restano innaturalmente immobili, riflettendo le nubi come uno specchio perfetto. La tua scia rovina la simmetria e migliora la scienza.
        #JNSQscience_bd_camera_LaytheSrfSplashedKrenwichSea_00 = Qui il mare è inquieto, con lunghi sequenze d'onda che si incrociano come se stessero negoziando. La stabilizzazione della fotocamera si arrende e lo chiama "dinamico".
        #JNSQscience_bd_camera_LaytheSrfSplashedArcticSea_00 = Acqua scura e ghiaccio fangoso condividono l'inquadratura in vortici disordinati. La brina avanza sull'obiettivo tra uno scatto e l'altro come se stesse rivendicando il posto.
        #JNSQscience_bd_camera_LaytheSrfSplashedJoolwardSea_00 = La luce verde di Jool macchia i riflessi sulle onde. L'oceano sembra normale finché non noti che il colore ti segue.
        #JNSQscience_bd_camera_LaytheSrfSplashedPolwardSea_00 = Acqua fredda e piatta si stende sotto una bassa foschia con sottile ghiaccio ai margini. L'orizzonte svanisce come se qualcuno lo avesse cancellato con delicatezza.
        #JNSQscience_bd_camera_LaytheSrfSplashedEnclosedFaults_00 = Galleggi in una stretta conca di faglia dove l'acqua lambisce pareti ripide. I clic dell'otturatore, con l'eco, sembrano più forti del dovuto.
        #JNSQscience_bd_camera_LaytheInSpaceLowShores_00 = Le coste disegnano archi puliti tra sabbia chiara e acqua blu profonda. La fotocamera lo fa sembrare facile da atterrare, cosa sospetta.
        #JNSQscience_bd_camera_LaytheInSpaceLowShallows_00 = Secche basse brillano più chiare del mare circostante, tracciando i bordi delle isole. I pattern sembrano curati, come se qualcuno avesse contornato la terra per te.
        #JNSQscience_bd_camera_LaytheInSpaceLowInlandWater_00 = Specchi d'acqua interni appaiono come chiazze scure e immobili dietro barriere di terra. Riflettono le cime delle nubi così nettamente da sembrare buchi.
        #JNSQscience_bd_camera_LaytheInSpaceLowKrenwichSea_00 = Un ampio mare domina l'inquadratura con bande che cambiano sotto nubi sottili. La trama delle onde sembra organizzata, come se avesse bande.
        #JNSQscience_bd_camera_LaytheInSpaceLowArcticSea_00 = Vicino alle acque fredde, il ghiaccio macchia la superficie in lastre spezzate. La fotocamera continua a inseguire il confine dove il mare si sfilaccia nel bianco.
        #JNSQscience_bd_camera_LaytheInSpaceLowJoolwardSea_00 = Il mare sul lato rivolto a Jool brilla con una lieve tonalità verde e un forte abbaglio. I riflessi seguono la tua orbita più a lungo del dovuto.
        #JNSQscience_bd_camera_LaytheInSpaceLowPolwardSea_00 = Verso il polo l'acqua tende a diventare più scura e più liscia, con striature di foschia sotto nubi spezzate. La costa appare, scompare e poi riappare spostata.
        #JNSQscience_bd_camera_LaytheInSpaceLowHighlands_00 = Il terreno alto mostra trame spazzate dal vento e ombre lunghe e nitide. Sembra dune che hanno deciso di diventare permanenti.
        #JNSQscience_bd_camera_LaytheInSpaceLowMountains_00 = Dorsi montuosi bucano la foschia e proiettano ombre nette sui pendii. La foto fa sembrare il rilievo più alto del tuo budget di carburante.
        #JNSQscience_bd_camera_LaytheInSpaceLowIceCaps_00 = Le calotte di ghiaccio brillano luminose contro il mare più scuro, spaccate in lastre e archi. I bordi sembrano scheggiati, come se il pianeta si stesse rosicchiando da solo.
        #JNSQscience_bd_camera_LaytheInSpaceLowEnclosedFaults_00 = Lunghe fratture chiuse cuciono margini di terra e mare in sottili linee scure. La fotocamera continua a inquadrarle come se fossero il punto.
        #JNSQscience_bd_camera_LaytheInSpaceLowLowlands_00 = I bassipiani si stendono come terreno liscio e smorzato con sparse cicatrici poco profonde. Dall'orbita sembra una pista di atterraggio che si è dimenticata di essere piatta.
        #JNSQscience_bd_camera_LaytheInSpaceLowMidlands_00 = Le terre di mezzo formano un patchwork maculato di pendii dolci e piccoli affioramenti. La vista rassicura finché non ricordi che la stai vedendo sotto il cielo di Jool.
        #JNSQscience_bd_camera_VallSrfLandedLowlands_00 = I bassipiani appaiono in foto come una pianura ghiacciata di vetro graffiato. Brina fine scintilla nell'ombra del lander.
        #JNSQscience_bd_camera_VallSrfLandedMountains_00 = Montagne di ghiaccio frastagliate affollano l'inquadratura con crepacci blu profondi. Le ombre sembrano più fredde dello spazio.
        #JNSQscience_bd_camera_VallInSpaceLowPoles_00 = Da un'orbita bassa, il ghiaccio polare mostra archi stretti e fratture pallide. La fotocamera continua a sovraesporre le venature più luminose.
        #JNSQscience_bd_camera_VallInSpaceLowHighlands_00 = Gli altopiani si risolvono in lastre ruvide e creste spezzate. Ogni crepa sembra tracciata con un righello.
        #JNSQscience_bd_camera_VallInSpaceLowMidlands_00 = Campi di ghiaccio maculati scorrono sotto l'obiettivo, cuciti da deboli fessure. La trama cambia più in fretta degli aggiornamenti della tua mappa.
        #JNSQscience_bd_camera_VallInSpaceLowLowlands_00 = Conche lisce riflettono la luce in ampie fasce, quasi come uno specchio. Non capisci se sia piatto o se stia solo fingendo.
        #JNSQscience_bd_camera_VallInSpaceLowMountains_00 = Catene montuose proiettano ombre lunghe e taglienti su ghiaccio brillante. Il rilievo sembra abbastanza drammatico da cambiare i tuoi piani di atterraggio.
        #JNSQscience_bd_camera_TyloSrfLandedPoles_00 = Una superficie pallida e polverosa si estende fino a un'ombra nera e dura. Il sole basso fa sembrare importante ogni sassolino.
        #JNSQscience_bd_camera_TyloSrfLandedMountains_00 = Le montagne si alzano in pendii brutali e roccia spezzata. La foto sembra pesante, come se la gravità fosse entrata nei pixel.
        #JNSQscience_bd_camera_TyloFlyingLow_00 = La fotocamera cattura roccia grigia che sfreccia troppo in fretta. "Volare" sembra burocrazia per una caduta controllata.
        #JNSQscience_bd_camera_TyloFlyingHigh_00 = Dall'alta quota, il volto craterizzato di Tylo sembra calmo e ordinato. La sottile foschia sul bordo è solo i tuoi strumenti che sudano.
        #JNSQscience_bd_camera_TyloInSpaceLowPoles_00 = Il terreno polare appare più luminoso e più graffiato, con bordi di crateri che catturano una luce dura. Le ombre sono nere come inchiostro e perfettamente nitide.
        #JNSQscience_bd_camera_TyloInSpaceLowMountains_00 = Creste e cime incidono linee scure sulla superficie. La fotocamera fa sembrare i pendii più ripidi di quanto abbiano diritto di essere.
        #JNSQscience_bd_camera_TyloInSpaceLowHighlands_00 = Gli altopiani sono zeppi di impatti e crateri. L'immagine diventa un catalogo di cerchi che non finirai mai di contare.
        #JNSQscience_bd_camera_TyloInSpaceLowMidlands_00 = Ampie terre di mezzo grigie scorrono con crateri sparsi come lentiggini. Sembra calmo finché non zoomi.
        #JNSQscience_bd_camera_TyloInSpaceLowLowlands_00 = I bassipiani formano conche più scure con tratti più lisci tra i crateri. La fotocamera li inquadra come zone d'atterraggio e ti sfida a provarci.
        #JNSQscience_bd_camera_BopSrfLandedMountains_00 = Fotografi un ammasso di rocce in equilibrio ad angoli strani. Non è chiaro quale roccia sia il "suolo" e quale sia solo di passaggio.
        #JNSQscience_bd_camera_BopSrfLandedLowlands_00 = I bassipiani sembrano detriti sciolti raccolti in una conca poco profonda. Il minimo tocco riorganizzerebbe tutta la scena.
        #JNSQscience_bd_camera_BopSrfLandedMidlands_00 = Le terre di mezzo inclinano via in pendii bitorzoluti e pozze poco profonde. Qui la linea dell'orizzonte sembra opzionale.
        #JNSQscience_bd_camera_BopSrfLandedHighlands_00 = Creste strette e nocche di roccia affilate affollano l'inquadratura. Le ombre fanno sembrare che il terreno abbia i denti.
        #JNSQscience_bd_camera_BopInSpaceLowPoles_00 = Il polo è una calotta graffiata di roccia maculata senza bordi puliti. La rotazione del corpo fa sfarfallare le ombre come una cattiva animazione.
        #JNSQscience_bd_camera_BopInSpaceLowMountains_00 = Punti alti bitorzoluti sporgono come dita che afferrano, ognuno con un'ombra sproporzionata. La fotocamera insiste che questa sia ancora "orbita bassa".
        #JNSQscience_bd_camera_BopInSpaceLowHighlands_00 = Creste degli altopiani corrono in dorsi spezzati sulla superficie. La trama sembra raggrinzita, come se la roccia si fosse raffreddata a metà pensiero.
        #JNSQscience_bd_camera_BopInSpaceLowMidlands_00 = Le terre di mezzo scorrono in pieghe irregolari e cavità poco profonde. La luce cambia così in fretta che l'autofocus continua a rinegoziare.
        #JNSQscience_bd_camera_BopInSpaceLowLowlands_00 = I bassipiani raccolgono detriti più scuri in sacche dall'aspetto morbido. Da quassù somiglia a ghiaia versata in ammaccature.
        #JNSQscience_bd_camera_PolSrfLandedMountains_00 = Le montagne sono guglie e spuntoni frastagliati che si alzano da terreno giallo verde. La fotocamera cattura cime che sembrano scolpite più che erose.
        #JNSQscience_bd_camera_PolInSpaceLowPoles_00 = La regione polare mostra chiazze pallide e strani buchi, come se la superficie fosse stata punzecchiata leggermente ovunque. Il colore resta ostinatamente giallo.
        #JNSQscience_bd_camera_PolInSpaceLowLowlands_00 = I bassipiani appaiono più lisci, con deboli striature che corrono tra avvallamenti poco profondi. Il terreno sembra essere scivolato lentamente in discesa e poi essersi fermato.
        #JNSQscience_bd_camera_PolInSpaceLowMidlands_00 = Le terre di mezzo formano un patchwork maculato di rialzi bitorzoluti e conche morbide. La fotocamera non sa decidere se sia roccia o polvere compattata.
        #JNSQscience_bd_camera_PolInSpaceLowHighlands_00 = Gli altopiani sembrano più ruvidi e più sconvolti, con ombre più nette e riflessi più brillanti. La superficie si legge come un foglio accartocciato.
        #JNSQscience_bd_camera_PolInSpaceLowMountains_00 = Spuntoni e guglie montuose proiettano ombre sottili e drammatiche sui pendii. L'intera regione sembra un piccolo skyline visto dall'orbita.
        #JNSQscience_bd_camera_LindorFlyingLow_00 = La vista diventa pareti di nubi illuminate di verde e shear violento. La fotocamera registra un solo fotogramma utilizzabile prima che tutto diventi "movimento".
        #JNSQscience_bd_camera_LindorFlyingHigh_00 = Ben al di sopra dello strato inferiore, bande pallide e vortici morbidi scorrono come una mappa vivente. L'esposizione continua a pulsare, come se la luce non riuscisse a decidersi.
        #JNSQscience_bd_camera_LindorInSpaceLowTemperateBands_00 = La fotocamera cattura bande lunghe e calme che increspano come onde lente. Una debole griglia di rumore del sensore si rifiuta di restare ferma.
        #JNSQscience_bd_camera_LindorInSpaceLowUpperStormDeck_00 = Nubi alte e luminose ribollono in riccioli stretti. L'esposimetro continua a scurire come se il pianeta si stesse avvicinando.
        #JNSQscience_bd_camera_LindorInSpaceLowStormComplex_00 = Una vasta tempesta riempie l'inquadratura di spirali stratificate e bordi netti. Il centro resta perfettamente inquadrato comunque tu sposti la fotocamera.
        #JNSQscience_bd_camera_LindorInSpaceLowExposedLowerDeck_00 = Una breccia nella foschia rivela uno strato più scuro sotto. La foto sembra più profonda del dovuto per qualcosa fatto di nubi.
        #JNSQscience_bd_camera_LindorInSpaceLowSubpolarBands_00 = Le bande si attorcigliano in nodi vicino alle regioni verso i poli. Tracciare una struttura è come cercare di seguire un pensiero che non hai pensato.
        #JNSQscience_bd_camera_LindorInSpaceLowNorthPole_00 = Il vortice polare forma un anello pallido attorno a un centro fioco. L'immagine successiva è identica, fino allo stesso granello di rumore.
        #JNSQscience_bd_camera_LindorInSpaceLowSouthPole_00 = Il polo sud mostra una ciotola rotante di foschia verdastra. I bordi sfumano, ma il centro resta inquietantemente nitido.
        #JNSQscience_bd_camera_LindorInSpaceHigh_00 = Lindor riempie la vista come un gigante verde pallido avvolto in lievi bande. Tra un fotogramma e l'altro la luminosità sfarfalla un poco, come se la fotocamera sbattesse le palpebre per prima.
        #JNSQscience_bd_camera_KrelSrfLandedLowlands_00 = Fotografi una pianura pallida e impolverata sotto un sole fioco e distante. Striature scure attraversano il suolo come "vene" congelate.
        #JNSQscience_bd_camera_KrelSrfLandedMidlands_00 = Le terre di mezzo escono come lastre spezzate e ghiaia fine. Ogni ombra è affilata come un rasoio, come se la luna fosse incisa invece che erosa.
        #JNSQscience_bd_camera_KrelSrfLandedHighlands_00 = Creste luminose riflettono l'abbaglio nell'obiettivo, tagliate da sottili venature scure. Il pattern sembra scomodamente organico per semplice roccia.
        #JNSQscience_bd_camera_KrelSrfLandedPoles_00 = Il terreno polare è leggermente più luminoso, come se accumulasse la poca luce che riceve. La fotocamera richiede una lunga esposizione e sembra comunque incerta.
        #JNSQscience_bd_camera_KrelInSpaceLowLowlands_00 = Da un'orbita bassa, i bassipiani di Krel sono chiazze pallide lisce con marezzature scure. La fotocamera continua a "trovare" le stesse striature ancora e ancora.
        #JNSQscience_bd_camera_KrelInSpaceLowMidlands_00 = Le terre di mezzo si risolvono in graffi e cicatrici basse sovrapposte. La superficie sembra disturbata di recente, ma non si muove nulla.
        #JNSQscience_bd_camera_KrelInSpaceLowHighlands_00 = I dorsi degli altopiani spiccano con un contrasto netto, quasi troppo nitido. Zoomi e le venature restano perfettamente allineate.
        #JNSQscience_bd_camera_KrelInSpaceLowPoles_00 = Il polo mostra una sottile calotta luminosa con ombre lunghe e pulite. La linea del terminatore sembra innaturalmente ordinata.
        #JNSQscience_bd_camera_KrelInSpaceHigh_00 = Krel resta sospesa nel bagliore di Lindor come un piccolo disco dai bordi netti con venature scure. La fotocamera lo registra con chiarezza, poi vuole subito tornare a puntare il pianeta.
        #JNSQscience_bd_camera_AdenSrfLandedLowlands_00 = La fotocamera cattura una distesa marrone e polverosa, disseminata di ciottoli come zavorra rovesciata. Il terreno sembra praticabile, e questo è un incoraggiamento pericoloso.
        #JNSQscience_bd_camera_AdenSrfLandedMidlands_00 = Lievi rialzi e conche poco profonde si estendono in una palette smorzata. La foto sembra un "primo rilevamento" in attesa di diventare un sito di atterraggio.
        #JNSQscience_bd_camera_AdenSrfLandedHighlands_00 = La roccia degli altopiani buca la polvere in chiazze più chiare. Il contrasto fa sembrare il terreno appena scoperto.
        #JNSQscience_bd_camera_AdenSrfLandedMountains_00 = Le montagne formano creste affilate e versanti ripidi che inghiottono la luce. La foto è abbastanza drammatica da rovinarti la sicurezza.
        #JNSQscience_bd_camera_AdenSrfLandedPoles_00 = I poli sono fiocchi, piatti e ostinatamente privi di dettagli a prima vista. Poi la fotocamera rileva deboli striature che sembrano vento, una volta.
        #JNSQscience_bd_camera_AdenInSpaceLowLowlands_00 = L'orbita bassa mostra ampie pianure marroni con rari puntini luminosi. Il mondo sembra un piccolo bersaglio che qualcuno ha intenzione di colpire.
        #JNSQscience_bd_camera_AdenInSpaceLowMidlands_00 = Le terre di mezzo scorrono in pieghe morbide e conche poco profonde. La fotocamera le inquadra come una mappa che dovresti conservare.
        #JNSQscience_bd_camera_AdenInSpaceLowHighlands_00 = Le regioni degli altopiani appaiono come isole più luminose in un mare di polvere più scuro. I bordi sembrano puliti, come se la polvere rispettasse i confini.
        #JNSQscience_bd_camera_AdenInSpaceLowMountains_00 = Creste montuose proiettano ombre lunghe che fanno sembrare il rilievo più alto di quanto sia. La foto trasforma "piccola luna" in "grosso problema".
        #JNSQscience_bd_camera_AdenInSpaceLowPoles_00 = I poli mostrano chiazze pallide con sottili venature scure che si irradiano verso l'esterno. Sembra una calotta crepata su una sfera consumata.
        #JNSQscience_bd_camera_AdenInSpaceHigh_00 = Aden sembra una perla impolverata in orbita attorno a una gigantesca lanterna. La foto lo fa sembrare pratico e abbordabile, ed è esattamente così che le piccole lune ti fregano.
        #JNSQscience_bd_camera_HuygenSrfLandedLowlands_00 = I bassipiani sembrano un terreno scuro dall'aria umida, sotto una pesante foschia arancione. La lente della fotocamera si copre di gocce di condensa quasi subito.
        #JNSQscience_bd_camera_HuygenSrfLandedMidlands_00 = Terreno ondulato svanisce nella nebbia a poca distanza. Ogni foto sembra scattata attraverso una maschera respiratoria calda.
        #JNSQscience_bd_camera_HuygenSrfLandedHighlands_00 = Terreno alto più roccioso spezza la superficie in lastre affilate e polvere morbida. L'obiettivo continua a raccogliere una pellicola sottile che non riesci a pulire.
        #JNSQscience_bd_camera_HuygenSrfLandedMountains_00 = Le montagne si alzano come sagome tozze contro un cielo spesso. L'orizzonte scompare e riappare tra uno scatto e l'altro come un segnale scadente.
        #JNSQscience_bd_camera_HuygenSrfLandedPeaks_00 = Una vetta emerge dalla linea della foschia quel tanto che basta per sembrare importante. La fotocamera cattura un alone attorno che gli strumenti chiamano "diffusione normale".
        #JNSQscience_bd_camera_HuygenSrfLandedPolarLowlands_00 = I bassipiani polari sembrano più lisci, più freddi e a chiazze stranamente riflettenti. La tua ombra ha bordi più morbidi del dovuto.
        #JNSQscience_bd_camera_HuygenSrfLandedPoles_00 = Il polo è una pianura pallida sotto un sole fioco filtrato da aria densa. La foto sembra silenziosa, come se anche qui il suono non arrivasse lontano.
        #JNSQscience_bd_camera_HuygenSrfLandedPolarHighlands_00 = Creste polari frastagliate tagliano un paesaggio slavato. La fotocamera fa sembrare il freddo più pesante della roccia.
        #JNSQscience_bd_camera_HuygenSrfLandedShores_00 = La costa è una linea netta tra terreno scuro e liquido ancora più scuro. L'aria odora di carburante che non ha mai imparato a bruciare.
        #JNSQscience_bd_camera_HuygenSrfSplashedShores_00 = Schiuma sulla linea dell'acqua si attacca allo scafo in lenti fogli appiccicosi. La fotocamera registra un riflesso perfetto finché un'onda non lo rovina.
        #JNSQscience_bd_camera_HuygenSrfSplashedMethaneLakes_00 = La superficie del lago è nera e vetrosa, inghiotte la luce invece di rifletterla. L'obiettivo si appanna, poi si schiarisce, poi si appanna di nuovo come se stesse pensando.
        #JNSQscience_bd_camera_HuygenFlyingLow_00 = Il volo basso ti dà un breve, nitido scorcio di terreno scuro prima che la foschia si richiuda. L'obiettivo si appanna, si schiarisce, poi si appanna come se stesse pensando.
        #JNSQscience_bd_camera_HuygenFlyingHigh_00 = Dall'alto, questo mondo è solo una sfera fioca sotto aria ambrata spessa. I dettagli della superficie compaiono a chiazze e svaniscono appena ti fidi.
        #JNSQscience_bd_camera_HuygenInSpaceLowLowlands_00 = Attraverso l'atmosfera spessa, i bassipiani appaiono come ampie macchie scure. Il dettaglio netto arriva solo in brevi finestre sospette.
        #JNSQscience_bd_camera_HuygenInSpaceLowMidlands_00 = Le terre di mezzo mostrano deboli creste sotto una coperta di foschia. La fotocamera continua ad aumentare la nitidezza del rumore come se fosse terreno.
        #JNSQscience_bd_camera_HuygenInSpaceLowHighlands_00 = Chiazze di altopiani emergono come isole più scure nella nebbia. I bordi sembrano troppo puliti per qualcosa di consumato.
        #JNSQscience_bd_camera_HuygenInSpaceLowMountains_00 = Dorsi montuosi proiettano ombre morbide che si allungano più del previsto. La sfocatura li fa sembrare più vicini di quanto siano.
        #JNSQscience_bd_camera_HuygenInSpaceLowPeaks_00 = Alcune cime bucano la foschia come minuscoli punti di contrasto. La fotocamera mantiene il fuoco su di loro con ostinata devozione.
        #JNSQscience_bd_camera_HuygenInSpaceLowPolarLowlands_00 = I bassipiani polari si schiariscono leggermente sotto l'angolo basso del sole. L'atmosfera trasforma la vista in un acquerello lento e sbavato.
        #JNSQscience_bd_camera_HuygenInSpaceLowPoles_00 = Il polo è una calotta pallida con bande di foschia alla deriva. La fotocamera etichetta le linee di confine, poi le perde, poi le ritrova.
        #JNSQscience_bd_camera_HuygenInSpaceLowPolarHighlands_00 = Gli altopiani polari mostrano una trama ruvida e spezzata sotto la sfocatura. Il rilievo si legge come una mappa disegnata sotto un lenzuolo bagnato.
        #JNSQscience_bd_camera_HuygenInSpaceLowShores_00 = Le coste appaiono come una debole cucitura tra terra e liquido, poi svaniscono nella foschia. Scatti tre foto e ottieni tre linee di costa diverse.
        #JNSQscience_bd_camera_HuygenInSpaceLowMethaneLakes_00 = I laghi di metano sono chiazze scure che inghiottono l'abbaglio anche dall'orbita. La fotocamera li etichetta "privi di dettagli" e si rifiuta comunque di distogliere lo sguardo.
        #JNSQscience_bd_camera_HuygenInSpaceHigh_00 = Huygen è una sfera morbida e ambrata con qualche macchia scura dove la foschia si assottiglia. La fotocamera non sa decidere se stia vedendo la superficie o solo un'atmosfera molto sicura di sé.
        #JNSQscience_bd_camera_RigaSrfLandedLowlands_00 = I bassipiani appaiono in foto come terra familiare, solo il colore e il silenzio la tradiscono. La fotocamera la fa sembrare quasi casa, quasi.
        #JNSQscience_bd_camera_RigaSrfLandedMidlands_00 = Terre di mezzo rocciose si stendono in pendii dolci con massi sparsi. L'immagine potrebbe essere una slide da addestramento se ritagliassi il cielo.
        #JNSQscience_bd_camera_RigaSrfLandedHighlands_00 = Terreno alto luminoso mostra roccia esposta e una trama più netta. La superficie sembra abbastanza solida da costruirci sopra, cosa che la fotocamera non approva.
        #JNSQscience_bd_camera_RigaSrfLandedMountains_00 = Montagne si alzano in creste pesanti e tozze con tagli scuri tra loro. Il terreno sembra voler strade, ma non lander.
        #JNSQscience_bd_camera_RigaSrfLandedPoles_00 = Il terreno polare è slavato e dall'aria fredda, con ombre che non diventano mai morbide. La fotocamera aumenta l'esposizione finché il rumore non diventa il suo meteo.
        #JNSQscience_bd_camera_RigaFlyingLow_00 = La fotocamera scatta un passaggio basso sopra terreno smorzato e roccia sparsa. Sembra quasi familiare finché le ombre non escono del colore sbagliato.
        #JNSQscience_bd_camera_RigaFlyingHigh_00 = Da alta quota, il paesaggio di Riga si appiattisce in forme ampie e pratiche. L'immagine sembra una carta di rilievo che finge di essere una fotografia.
        #JNSQscience_bd_camera_RigaInSpaceLowLowlands_00 = Da un'orbita bassa, i bassipiani formano ampie pianure uniformi con deboli striature. L'impianto sembra pianificato, finché non ricordi che non lo è.
        #JNSQscience_bd_camera_RigaInSpaceLowMidlands_00 = Le terre di mezzo mostrano un patchwork maculato che dice "terreno" nel modo più da manuale possibile. Questa familiarità sembra uno scherzo.
        #JNSQscience_bd_camera_RigaInSpaceLowHighlands_00 = Gli altopiani spiccano come blocchi più luminosi con rilievo nitido. La fotocamera cattura bordi puliti che ti fanno pensare a griglie.
        #JNSQscience_bd_camera_RigaInSpaceLowMountains_00 = Catene montuose incidono linee marcate sulla superficie, proiettando ombre lunghe. La foto le fa sembrare confini.
        #JNSQscience_bd_camera_RigaInSpaceLowPoles_00 = Il polo appare come una calotta pallida con una lieve bandeggiatura. I pattern sono abbastanza gentili da invitare a un secondo sguardo, e a un terzo.
        #JNSQscience_bd_camera_RigaInSpaceHigh_00 = Riga appare come un mondo solido e smorzato con accenni di terreno familiare. Da questa distanza sembra quasi "casa", finché non ricordi cosa sta orbitando.
        #JNSQscience_bd_camera_TalosSrfLandedLowlands_00 = I bassipiani escono scuri e polverosi sotto una luce sottile e lontana. La scena sembra più vecchia del dovuto, come se stesse aspettando.
        #JNSQscience_bd_camera_TalosSrfLandedMidlands_00 = Le terre di mezzo mostrano lastre crepate e depressioni poco profonde senza una storia evidente. La fotocamera cattura dettagli che sembrano con cura poco utili.
        #JNSQscience_bd_camera_TalosSrfLandedHighlands_00 = Creste degli altopiani riflettono debolmente contro ombre profonde, tutti angoli netti e contrasto duro. La foto sembra scolpita dal crepuscolo.
        #JNSQscience_bd_camera_TalosSrfLandedMountains_00 = Le montagne si alzano come sagome solitarie e frastagliate con canaloni neri tra loro. Il paesaggio sembra assorbire l'attenzione dell'obiettivo.
        #JNSQscience_bd_camera_TalosSrfLandedPoles_00 = Ai poli, la luce sfiora bassa e tutto diventa geometria di ombre. La fotocamera registra un bordo luminoso e un centro scuro che si rifiuta di spiegarsi.
        #JNSQscience_bd_camera_TalosInSpaceLowLowlands_00 = L'orbita bassa mostra pianure scure con deboli puntini chiari, come vetro sparso. Il filtro di denoise della fotocamera si arrende.
        #JNSQscience_bd_camera_TalosInSpaceLowMidlands_00 = Le terre di mezzo scorrono sotto in lenta parallasse, tutte graffi e cicatrici poco profonde. La superficie sembra maneggiata, non consumata.
        #JNSQscience_bd_camera_TalosInSpaceLowHighlands_00 = Gli altopiani formano dorsi affilati con ombre che restano perfettamente nere. Il rilievo sembra deliberato anche quando non può esserlo.
        #JNSQscience_bd_camera_TalosInSpaceLowMountains_00 = Nodi montuosi proiettano ombre lunghe e sottili sui pendii. La foto sembra un'etichetta di avvertimento stampata sulla roccia.
        #JNSQscience_bd_camera_TalosInSpaceLowPoles_00 = Il polo mostra chiazze pallide e un anello di ombre lunghe sul terminatore.
        #JNSQscience_bd_camera_TalosInSpaceHigh_00 = Talos è una scheggia scura con un bordo pallido sul terminatore. La fotocamera continua a centrarlo come se fosse importante, e non ti piace il perché.
        #JNSQscience_bd_camera_EelooSrfLandedCanyon_00 = Fotografi il bordo del canyon: crosta bianca, profondità in ombra blu e un salto che fa sembrare fragile l'orizzonte.
        #JNSQscience_bd_camera_EelooFlyingLow_00 = Un "volo" basso sfiora crosta brillante e ombre blu profonde. Il fuoco della fotocamera cerca di agganciare, come se il freddo potesse confondere il vetro.
        #JNSQscience_bd_camera_EelooFlyingHigh_00 = Da molto in alto, Eeloo è un disco bianco pulito con venature scure come punti di sutura. L'abbaglio è così duro che il vuoto, al confronto, sembra morbido.
        #JNSQscience_bd_camera_EelooInSpaceLowPoles_00 = I poli sembrano calotte bianche pulite con fratture sottilissime. Il controllo del riflesso della fotocamera si arrende subito.
        #JNSQscience_bd_camera_EelooInSpaceLowHighlands_00 = Gli altopiani si risolvono in creste luminose e ombre dure, come una paletta scolpita lasciata nel vuoto.
        #JNSQscience_bd_camera_EelooInSpaceLowMidlands_00 = Le terre di mezzo mostrano pianure di ghiaccio graffiato con deboli venature che corrono per chilometri. La mappa sembra cucita insieme.
        #JNSQscience_bd_camera_EelooInSpaceLowLowlands_00 = I bassipiani appaiono più lisci e leggermente più scuri, raccolgono sottili accumuli senza vento. "Piatto" sta facendo un sacco di lavoro qui.
        #JNSQscience_bd_camera_EelooInSpaceLowCanyon_00 = Il canyon si legge come un taglio scuro sulla superficie bianca. La fotocamera continua a centrarlo come se fosse il punto.
        #JNSQscience_bd_camera_CelesSrfLandedLowlands_00 = I bassipiani appaiono in foto come ghiaccio pallido e polveroso con schegge di roccia sparse. Sembra abbastanza silenzioso da essere sospetto.
        #JNSQscience_bd_camera_CelesSrfLandedMidlands_00 = Il terreno delle terre di mezzo si spezza in lastre crepate e pozze poco profonde. Il pattern sembra voler diventare una griglia.
        #JNSQscience_bd_camera_CelesSrfLandedHighlands_00 = Gli altopiani abbagliano nella luce fredda, con ombre nette in ogni piega. La fotocamera rende "spoglio" qualcosa di preciso.
        #JNSQscience_bd_camera_CelesSrfLandedMountains_00 = Creste montuose si alzano come denti spezzati sopra pendii luminosi. L'obiettivo trova più spigoli di quanti ne abbiano trovati le tue gambe d'atterraggio.
        #JNSQscience_bd_camera_CelesSrfLandedPoles_00 = Ai poli, il terreno è più luminoso e più liscio, come se fosse stato pulito con cura. Nient'altro qui sembra curato.
        #JNSQscience_bd_camera_CelesInSpaceLowLowlands_00 = Da un'orbita bassa, i bassipiani sono ampi fogli pallidi con una lieve marezzatura. La superficie sembra ritoccata, non erosa.
        #JNSQscience_bd_camera_CelesInSpaceLowMidlands_00 = Le terre di mezzo scorrono come grigi maculati con innumerevoli minuscole cicatrici. La fotocamera non riesce a trovare una zona "senza dettagli".
        #JNSQscience_bd_camera_CelesInSpaceLowHighlands_00 = Gli altopiani spiccano come blocchi luminosi con rilievo nitido. I bordi sembrano insolitamente ben disciplinati.
        #JNSQscience_bd_camera_CelesInSpaceLowMountains_00 = Le montagne proiettano ombre lunghe e scure che disegnano confini sul terreno. La foto sembra una mappa di avvertimento.
        #JNSQscience_bd_camera_CelesInSpaceLowPoles_00 = Il polo mostra una calotta pallida con una lieve bandeggiatura. Scatti una seconda foto e ottieni le stesse bande nello stesso punto.
        #JNSQscience_bd_camera_CelesInSpaceHigh_00 = Celes è una biglia luminosa e crepata accanto al suo genitore distante. L'abbaglio è abbastanza duro da far sembrare più caldo il vuoto, al confronto.
        #JNSQscience_bd_camera_TamSrfLandedLowlands_00 = La fotocamera cattura detriti sciolti e scuri raccolti in una conca poco profonda. Sembra che il terreno stia aspettando di riorganizzarsi.
        #JNSQscience_bd_camera_TamSrfLandedMidlands_00 = Le terre di mezzo sono pendii bitorzoluti di ghiaia e roccia fratturata. La linea dell'orizzonte sembra opzionale nel mirino.
        #JNSQscience_bd_camera_TamSrfLandedHighlands_00 = Affioramenti degli altopiani sporgono come spuntoni affilati e creste fragili. Ogni ombra è troppo grande per la roccia che la proietta.
        #JNSQscience_bd_camera_TamSrfLandedTwinCraters_00 = Inquadri i crateri gemelli: due conche ordinate affiancate, come se la superficie ti fissasse in stereo.
        #JNSQscience_bd_camera_TamSrfLandedCraters_00 = I bordi dei crateri franano nell'inquadratura come se l'impatto fosse di ieri. La fotocamera registra polvere che non ha mai avuto aria in cui depositarsi.
        #JNSQscience_bd_camera_TamSrfLandedPockmarks_00 = Il terreno è cosparso di minuscole fossette, troppe per contarle. La foto sembra che qualcuno abbia testato uno strumento qui.
        #JNSQscience_bd_camera_TamInSpaceLowLowlands_00 = In orbita bassa, i bassipiani sembrano graniglia scura versata nelle ammaccature. La stabilizzazione della fotocamera lavora più della tua orbita.
        #JNSQscience_bd_camera_TamInSpaceLowMidlands_00 = Le terre di mezzo passano sotto in lenta parallasse, tutte graffi e cavità poco profonde. È difficile capire in che direzione sia la "discesa".
        #JNSQscience_bd_camera_TamInSpaceLowHighlands_00 = Gli altopiani sporgono come nocche frastagliate con ombre ridicole. La navigazione diventa "scegli un masso e fidati".
        #JNSQscience_bd_camera_TamInSpaceLowTwinCraters_00 = I crateri gemelli sono inconfondibili dall'orbita, con dimensioni abbinate come una coppia deliberata. La fotocamera li inquadra come bersagli.
        #JNSQscience_bd_camera_TamInSpaceLowCraters_00 = Crateri sovrapposti coprono la superficie finché il concetto di "terreno originario" smette di avere senso.
        #JNSQscience_bd_camera_TamInSpaceLowPockmarks_00 = La regione punteggiata sembra una roccia sabbiata sotto una lente d'ingrandimento. Anche dall'orbita, sembra ruvida.
        #JNSQscience_bd_camera_TamInSpaceHigh_00 = Tam è un sassolino irregolare che ruota come se stesse cercando di scrollarsi l'obiettivo. La foto migliore che ottieni è quasi tutta ombra e l'idea di una luna.
        #JNSQscience_bd_camera_HamekSrfLandedLowlands_00 = I bassipiani appaiono in foto come ghiaccio macchiato di rosso e graniglia scura. Il tuo cervello continua a dirti che i colori sono sbagliati.
        #JNSQscience_bd_camera_HamekSrfLandedMidlands_00 = Le terre di mezzo mostrano un mix marmorizzato di brina pallida e chiazze rugginose. Il bilanciamento del bianco della fotocamera litiga con la realtà.
        #JNSQscience_bd_camera_HamekSrfLandedHighlands_00 = Le creste degli altopiani brillano di un debole rosso sui fianchi verso il sole, con ombre nere nelle fessure. Sembra caldo finché non ti ricordi che non lo è.
        #JNSQscience_bd_camera_HamekSrfLandedPoles_00 = Vicino al polo, il terreno diventa più pallido, come se il rosso venisse respinto. La linea di transizione è più netta del dovuto.
        #JNSQscience_bd_camera_HamekInSpaceLowLowlands_00 = Da un'orbita bassa, i bassipiani formano ampie pianure rossastre con venature più scure. La superficie sembra livida, non polverosa.
        #JNSQscience_bd_camera_HamekInSpaceLowMidlands_00 = Le terre di mezzo scorrono in chiazze rosse e bianche maculate che non si mescolano. Il pianeta si rifiuta di scegliere una palette.
        #JNSQscience_bd_camera_HamekInSpaceLowHighlands_00 = Gli altopiani spiccano come isole più luminose e più ruvide, con un rilievo d'ombra marcato. La tinta rossa resta attaccata anche dove non dovrebbe.
        #JNSQscience_bd_camera_HamekInSpaceLowPoles_00 = I poli appaiono come calotte pallide che sfumano nel terreno rosso, come se il mondo stesse cercando di nascondere la propria colorazione.
        #JNSQscience_bd_camera_HamekInSpaceHigh_00 = Hamek appare come una palla di neve livida di brina pallida e chiazze rugginose. Anche da un'orbita alta, il colore sembra non aver ancora finito di assestarsi.
        #JNSQscience_bd_camera_NaraSrfLandedLowlands_00 = I bassipiani svaniscono nella foschia pesante e fioca a poca distanza. La tua foto sembra scattata attraverso una maschera respiratoria calda.
        #JNSQscience_bd_camera_NaraSrfLandedMidlands_00 = Terreno ondulato e affioramenti scuri appaiono e scompaiono mentre l'aria densa si sposta. La fotocamera continua a "correggere" il colore in nuovi colori sbagliati.
        #JNSQscience_bd_camera_NaraSrfLandedHighlands_00 = Gli altopiani catturano una debole luce solare in chiazze pallide. Le ombre restano morbide e stranamente profonde, come se l'aria stesse mangiando il contrasto.
        #JNSQscience_bd_camera_NaraSrfLandedMountains_00 = Sagome montuose incombono oltre la linea della foschia, più grandi nel mirino che nel tuo casco. Scatti tre foto: la cresta si sposta tra una e l'altra.
        #JNSQscience_bd_camera_NaraSrfLandedPolarLowlands_00 = I bassipiani polari sembrano più lisci e più freddi, con un lieve lucore sul terreno riparato. L'obiettivo si appanna, si schiarisce, poi si appanna di nuovo come se stesse pensando.
        #JNSQscience_bd_camera_NaraSrfLandedPoles_00 = Il polo è una pianura pallida sotto un cielo fioco, senza alcun orizzonte nitido. La fotocamera insiste che la scena sia "a fuoco".
        #JNSQscience_bd_camera_NaraSrfLandedPolarHighlands_00 = Creste polari spezzate tagliano una luce slavata. La foto esce nitida solo dove lo volevi di meno.
        #JNSQscience_bd_camera_NaraInSpaceLowLowlands_00 = Da un'orbita bassa, i bassipiani appaiono come macchie scure sotto un velo spesso. I dettagli della superficie arrivano solo in brevi finestre sospette.
        #JNSQscience_bd_camera_NaraInSpaceLowMidlands_00 = Le terre di mezzo mostrano trame deboli che la foschia continua a cercare di cancellare. La nitidezza della fotocamera trasforma il rumore in "terreno".
        #JNSQscience_bd_camera_NaraInSpaceLowHighlands_00 = Gli altopiani emergono come isole più scure in una foschia più chiara. I bordi sembrano troppo puliti per qualcosa di consumato.
        #JNSQscience_bd_camera_NaraInSpaceLowMountains_00 = Dorsi montuosi proiettano ombre morbide e lunghe che si allungano più del previsto. La sfocatura li fa sembrare più vicini di quanto siano.
        #JNSQscience_bd_camera_NaraInSpaceLowPolarLowlands_00 = I bassipiani polari si schiariscono leggermente con angoli bassi del sole. L'atmosfera sbava la vista in un lento acquerello.
        #JNSQscience_bd_camera_NaraInSpaceLowPoles_00 = Il polo è una calotta pallida con bande di foschia alla deriva. Scatti due foto e ottieni due confini diversi.
        #JNSQscience_bd_camera_NaraInSpaceLowPolarHighlands_00 = Gli altopiani polari mostrano un rilievo ruvido sotto la sfocatura, come una mappa disegnata sotto un lenzuolo bagnato. La fotocamera si rifiuta di darti una risposta netta.
        #JNSQscience_bd_camera_NaraFlyingLow_00 = La fotocamera scruta attraverso aria spessa e cattura la superficie in brevi lampi limpidi. Ogni lampo sembra fin troppo ben sincronizzato.
        #JNSQscience_bd_camera_NaraFlyingHigh_00 = Sopra il peggio della foschia, il mondo sotto appare distante e smorzato, come una foto di una foto. Il cielo resta luminoso senza mai sembrare "limpido".
        #JNSQscience_bd_camera_NaraInSpaceHigh_00 = Da molto in alto, Nara è un disco fioco avvolto in una foschia ostinata. Il pianeta sembra calmo nello stesso modo in cui sembrano calme le porte chiuse a chiave.
        #JNSQscience_bd_camera_AmosSrfLandedLowlands_00 = I bassipiani sono scuri, granulosi e in leggera pendenza, senza clamore. La fotocamera fa sembrare ogni sassolino come se stesse negoziando con la gravità.
        #JNSQscience_bd_camera_AmosSrfLandedMidlands_00 = Il terreno delle terre di mezzo si spezza in lastre crepate e detriti sciolti. La foto sembra scattata su un cumulo che potrebbe decidere di crollare.
        #JNSQscience_bd_camera_AmosSrfLandedHighlands_00 = Terreno alto più luminoso mostra roccia esposta con ombre nette e gelide. La superficie sembra abbastanza fragile da spezzarsi se la fissi.
        #JNSQscience_bd_camera_AmosSrfLandedMountains_00 = Creste montuose si alzano in cataste frastagliate di massi. L'immagine è tutta spigoli, come se la luna non avesse mai imparato a essere liscia.
        #JNSQscience_bd_camera_AmosSrfLandedPoles_00 = Il polo è una calotta pallida e graffiata con ombre lunghe. La luce scorre così bassa che trasforma ogni rilievo in un punto di riferimento.
        #JNSQscience_bd_camera_AmosInSpaceLowLowlands_00 = L'orbita bassa mostra sacche scure dove i detriti sembrano accumularsi. Il terreno sembra versato nelle ammaccature.
        #JNSQscience_bd_camera_AmosInSpaceLowMidlands_00 = Le terre di mezzo scorrono in pieghe irregolari e pozze poco profonde. È difficile capire in che direzione sia la "discesa".
        #JNSQscience_bd_camera_AmosInSpaceLowHighlands_00 = Gli altopiani sporgono come nocche frastagliate con ombre sproporzionate. La navigazione diventa "scegli un masso e fidati".
        #JNSQscience_bd_camera_AmosInSpaceLowMountains_00 = Gruppi montuosi proiettano ombre sottili e drammatiche sulla superficie. La fotocamera li inquadra come avvertimenti con coordinate.
        #JNSQscience_bd_camera_AmosInSpaceLowPoles_00 = Il polo appare più luminoso, con graffi e una debole striatura. La linea di confine si rifiuta di sembrare naturale.
        #JNSQscience_bd_camera_AmosInSpaceHigh_00 = Da un'orbita alta, Amos è una piccola scheggia scura accanto alla massa di Nara avvolta di foschia. La foto sembra aver colto qualcosa che voleva restare inosservato.
        #JNSQscience_bd_camera_EnonSrfLandedLowlands_00 = I bassipiani sono terreno pallido e polveroso con graniglia scura sparsa. Le ombre delle tue impronte escono più nitide della tua sicurezza.
        #JNSQscience_bd_camera_EnonSrfLandedMidlands_00 = Le terre di mezzo appaiono in foto come accumuli senza vento e creste basse. La trama sembra scorrere lentamente senza muoversi.
        #JNSQscience_bd_camera_EnonSrfLandedHighlands_00 = Lastre e fratture degli altopiani riempiono l'inquadratura in un contrasto gelido. Le crepe continuano e continuano, come se seguissero una regola.
        #JNSQscience_bd_camera_EnonSrfLandedPoles_00 = Il polo è più luminoso e più liscio, con deboli bagliori nella lunga ombra. La fotocamera non sa decidere se sia ghiaccio o solo riflesso.
        #JNSQscience_bd_camera_EnonInSpaceLowLowlands_00 = Da un'orbita bassa, i bassipiani si leggono come superfici lisce e leggermente più scure. "Piatto" sembra convincente finché le ombre non dissentono.
        #JNSQscience_bd_camera_EnonInSpaceLowMidlands_00 = Le terre di mezzo mostrano campi maculati cuciti da sottili venature. Zoomare rivela solo altre venature.
        #JNSQscience_bd_camera_EnonInSpaceLowHighlands_00 = Gli altopiani spiccano come isole più ruvide e più luminose con rilievo nitido. I bordi sembrano stranamente ben disciplinati.
        #JNSQscience_bd_camera_EnonInSpaceLowPoles_00 = Il polo forma una calotta pallida con fratture sottilissime. Il controllo del riflesso della fotocamera perde subito la discussione.
        #JNSQscience_bd_camera_EnonInSpaceHigh_00 = Da molto lontano, Enon è un puntino freddo con una calotta brillante che cattura la luce. Sembra un segnaposto che qualcuno ha dimenticato di rimuovere.
        #JNSQscience_bd_camera_PraxSrfLandedLowlands_00 = I bassipiani appaiono in foto come terreno opaco e duro disseminato di frammenti affilati. La scena sembra progettata per consumare gli strumenti.
        #JNSQscience_bd_camera_PraxSrfLandedMidlands_00 = Il terreno delle terre di mezzo mostra conche poco profonde e rialzi bitorzoluti senza un pattern evidente. La fotocamera cattura dettagli che sembrano con cura poco utili.
        #JNSQscience_bd_camera_PraxSrfLandedHighlands_00 = Altopiani luminosi riflettono l'abbaglio nell'obiettivo, tagliati da sottili venature scure. La foto sembra un diagramma che non hai ancora imparato a leggere.
        #JNSQscience_bd_camera_PraxSrfLandedMountains_00 = Le montagne si alzano in creste ripide e spezzate che inghiottono la luce nelle fessure. La foto è abbastanza drammatica da rovinarti il piano di atterraggio due volte.
        #JNSQscience_bd_camera_PraxSrfLandedPoles_00 = Il polo è una pianura pallida e scorticata sotto luce radente. Le ombre disegnano una geometria troppo ordinata per essere casuale.
        #JNSQscience_bd_camera_PraxInSpaceLowLowlands_00 = L'orbita bassa mostra ampie conche più scure con tratti più lisci tra le cicatrici. La fotocamera continua a etichettarle come "sicure".
        #JNSQscience_bd_camera_PraxInSpaceLowMidlands_00 = Le terre di mezzo scorrono come terreno maculato con innumerevoli piccoli impatti. È un catalogo di "quasi, ma non proprio".
        #JNSQscience_bd_camera_PraxInSpaceLowHighlands_00 = Gli altopiani formano blocchi più luminosi con rilievo nitido e ombre lunghe. I bordi sembrano confini, anche quando non dovrebbero.
        #JNSQscience_bd_camera_PraxInSpaceLowMountains_00 = Catene montuose incidono linee marcate sulla superficie, proiettando ombre sottili come tratti d'inchiostro. La foto sembra una mappa con regole mancanti.
        #JNSQscience_bd_camera_PraxInSpaceLowPoles_00 = Il polo mostra una calotta pallida e una lieve bandeggiatura che si irradia verso l'esterno. Scatti una seconda immagine e ottieni le stesse bande nello stesso punto.
        #JNSQscience_bd_camera_PraxInSpaceHigh_00 = Da molto in alto, Prax è un piccolo mondo dai bordi netti nel nero profondo. La fotocamera lo cattura con chiarezza, come se stesse dimostrando qualcosa.

        // bd_cosmicRay
        #JNSQscience_bd_cosmicRay_SunFlyingLow_00 = Il rivelatore ticchetta come pioggia su un tetto di latta. Il Controllo Missione lo chiama "normale" e tu lo chiami "rumoroso".
        #JNSQscience_bd_cosmicRay_SunFlyingHigh_00 = Quassù i conteggi si appiattiscono in un ruggito costante, come se lo spazio stesso si stesse avvicinando.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthPolarZone_00 = Sopra la zona polare nord il flusso sale e resta alto: le linee di campo di Kerbol sembrano puntarti addosso.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthSubpolarZone_00 = Il contatore sferraglia per una breve tempesta, poi si assesta in un flusso brillante e costante.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthTemperateZone_00 = Le letture sono forti ma stabili, come se la stella stesse facendo la scientifica di proposito.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthTropicZone_00 = Un aumento ondulato segue la tua traccia: il rivelatore si sta chiaramente godendo il caldo.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowEquatorialZone_00 = I dati schizzano in raffiche ordinate, come se l'equatore stesse lanciando particelle contro la tua orbita.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthTropicZone_00 = I conteggi calano, poi risalgono di colpo. Kerbol non sa decidere se sei schermato o preso di mira.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthTemperateZone_00 = Un plateau pulito di impatti ad alta energia: lo strumento comincia a suonare sicuro di sé.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthSubpolarZone_00 = Il contatore crepita più in fretta mentre scivoli verso il polo, come se sapesse cosa sta arrivando.
        #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthPolarZone_00 = Una grandinata dura e persistente di particelle, abbastanza da farti ricontrollare ogni strato di schermatura.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedPoles_00 = Il tasso di conteggio si stabilizza nelle ombre lunghe, poi schizza su nel momento in cui rientri alla luce del sole.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedLowlands_00 = Il rivelatore crepita senza sosta: stare così vicino a Kerbol sembra essere dentro uno spruzzo di particelle.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedPolarIceCraters_00 = Sopra il terreno del cold trap gli impatti a bassa energia si diradano, ma quelli duri continuano a sfondare.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedHighlands_00 = La regolite rimanda una pioggia netta di secondarie, come se la superficie rispondesse a ogni raggio in arrivo.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedMidlands_00 = Un flusso alto e costante, semplice, brutale e molto difficile da ignorare.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedCraters_00 = Le pareti del cratere sembrano "fare eco" alla radiazione: i grafici si affollano appena guardi in basso.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedExoticCraters_00 = Lo spettro cambia in un modo che suggerisce che la parte "esotica" non sia solo il paesaggio.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedRareCraters_00 = Per un attimo i conteggi si calmano, come se l'universo si fosse dimenticato che Moho è qui.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedVoronoiCraters_00 = Il tasso sale e scende in un pattern ripetuto che quasi combacia con la strana geometria del suolo.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedNotableCraters_00 = Un picco netto arriva proprio a comando: o il cratere è notevole, oppure il cosmo si sta mettendo in mostra.
        #JNSQscience_bd_cosmicRay_MohoSrfLandedPeaks_00 = Lassù sulle cime lo strumento sembra proprio entusiasta: non c'è nulla tra te e la grandinata in arrivo.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowPoles_00 = Passando sopra i poli, il flusso tremola a bande. Il debole campo di Moho sta provando con tutte le forze a fare da scudo.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowLowlands_00 = L'orbita bassa raccoglie un forte flusso primario con un lieve rimbalzo dal terreno cotto dal sole.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowPolarIceCraters_00 = Sopra i cold trap, i conteggi delle secondarie calano leggermente, come se la superficie in ombra stesse inghiottendo gli avanzi.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowHighlands_00 = Un rumoroso spruzzo di secondarie accompagna la traccia: il terreno alto sembra "scintillare" di radiazione.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowMidlands_00 = I dati formano un plateau liscio e duro. L'ambiente ravvicinato di Moho non fa sottigliezze.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowCraters_00 = Attraversare i bordi dei crateri aggiunge picchi frastagliati, come se il terreno stesse rispedendo particelle lungo la tua rotta.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowExoticCraters_00 = Un breve indurimento dello spettro suggerisce materiale insolito, o fortuna insolita, sotto l'orbita.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowRareCraters_00 = Un tratto calmo d'orbita produce numeri insolitamente ordinati: tutti controllano subito i cavi di alimentazione.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowVoronoiCraters_00 = I conteggi oscillano con il terreno a celle qui sotto: il grafico comincia a sembrare sospettosamente organizzato.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowNotableCraters_00 = Un picco stretto, perfettamente sincronizzato con il passaggio. Lo etichetti "interessante" e fai finta che basti.
        #JNSQscience_bd_cosmicRay_MohoInSpaceLowPeaks_00 = Radente sopra le cime, il rivelatore registra uno spruzzo extra di secondarie, come se la superficie stesse allungandosi verso di te.
        #JNSQscience_bd_cosmicRay_EveSrfLandedPoles_00 = Il contatore ticchetta nella foschia fredda: il cielo di Eve continua a far piovere visitatori energetici.
        #JNSQscience_bd_cosmicRay_EveSrfLandedLowlands_00 = L'aria sopra è così densa da attutire tutto, tranne i raggi cosmici più rumorosi.
        #JNSQscience_bd_cosmicRay_EveSrfLandedMidlands_00 = Un tamburellare costante di impatti suggerisce che all'universo non importi del meteo viola.
        #JNSQscience_bd_cosmicRay_EveSrfLandedHighlands_00 = Con meno atmosfera sopra la testa, il rivelatore sferraglia più in fretta e sembra pure soddisfatto.
        #JNSQscience_bd_cosmicRay_EveSrfLandedPeaks_00 = Lassù sulle cime, la schermatura è solo un'idea: i conteggi salgono di conseguenza.
        #JNSQscience_bd_cosmicRay_EveSrfLandedMountains_00 = Le montagne non bloccano lo spazio. Ti danno solo una vista migliore.
        #JNSQscience_bd_cosmicRay_EveSrfLandedShores_00 = Aria di mare e nebbia densa vorticano attorno al sensore: i raggi cosmici ignorano entrambe e continuano a ticchettare.
        #JNSQscience_bd_cosmicRay_EveSrfLandedKrakensWell_00 = Vicino al Pozzo, i dati oscillano come se qualcuno avesse spinto il metro dell'universo.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedExplodiumSea_00 = Il rivelatore registra impatti energetici mentre il mare produce le sue bolle minacciose.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedShores_00 = Il liquido sferza lo scafo, le particelle sferzano il rivelatore: entrambe lasciano un pasticcio nei log.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedPolarLakes_00 = Liquido freddo, particelle calde. Eve insiste nel mescolare ingredienti incompatibili.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedPetrolLakes_00 = La superficie viscida riflette il cielo viola: i raggi attraversano l'immagine dritti e indisturbati.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofAkron_00 = I conteggi salgono e scendono con le onde, come se l'oceano stesse dondolando le statistiche.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofNessus_00 = Un tratto di liquido calmo dà dati calmi, finché un picco netto non ti ricorda dove sei.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofTaniwha_00 = Il contatore crepita costante: qualunque cosa si nasconda sotto, lo spazio si nasconde sopra.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofGigan_00 = Un breve sciame di secondarie suggerisce che liquido e aria stiano facendo squadra contro di te.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofRodan_00 = Lo spruzzo ricopre l'involucro: l'unica cosa che penetra più in profondità è la radiazione.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofGojira_00 = Lo strumento tiene il tempo alla perfezione mentre il mare prova a scuoterlo via.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofGhidorah_00 = Tre picchi distinti arrivano in rapida successione. Non gli dai un nome.
        #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofBagorah_00 = Il mare sembra morbido dall'orbita: da vicino, anche il fondo dei conteggi sembra tagliente.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowPoles_00 = Sopra i poli, il flusso aumenta: quassù Eve offre poca schermatura.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowLowlands_00 = Orbita bassa sopra i bassipiani: meno secondari sotto, tanti primari sopra.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowMidlands_00 = Il rivelatore registra un fondo alto e regolare, come volare dentro una tempesta silenziosa.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowHighlands_00 = I conteggi aumentano sopra gli altopiani, mentre l'aria più sottile lì sotto rimbalza meno protezione.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowPeaks_00 = Radente sulle cime, il contatore sferraglia con impatti netti e ad alta energia.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowExplodiumSea_00 = Sopra il mare di Explodium, lo spettro si ammorbidisce leggermente. Poi schizza su senza un buon motivo.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowMountains_00 = I passaggi sulle montagne aggiungono un rumoroso spruzzo di rimbalzi: le rocce possono essere rumorose nello spazio.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowShores_00 = Le coste scorrono sotto di te: i dati restano ostinatamente cosmici.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowPolarLakes_00 = Un lieve calo sopra i laghi suggerisce che il liquido aiuti, ma solo un poco.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowPetrolLakes_00 = I laghi di petrolio sembrano lucidi: le particelle non si accorgono di quel brillio.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofAkron_00 = Il ritmo del contatore cambia a metà passaggio, come se l'atmosfera sotto stesse respirando.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofNessus_00 = Un plateau pulito di conteggi ti rende sospettoso, quindi controlli i collegamenti due volte.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofTaniwha_00 = Un breve picco ti accompagna lungo la traccia: lo registri come "meteo spaziale" e vai avanti.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofGigan_00 = I dati schizzano vicino al terminatore: la foschia di Eve sembra brillare di secondarie.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofRodan_00 = Sopra Rodan, il rivelatore intercetta una grandinata netta di impatti, poi torna al suo ruggito costante.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofGojira_00 = I conteggi oscillano con i cambi di quota: Eve punisce la guida sciatta con radiazione extra.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofGhidorah_00 = Ricompare un picco a tre punte. Ti rifiuti di dargli un soprannome.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofBagorah_00 = Ticchettii lunghi e regolari riempiono l'audio della cabina, come se l'universo stesse bussando allo scafo.
        #JNSQscience_bd_cosmicRay_EveInSpaceLowKrakensWell_00 = Proprio sopra il Pozzo, il fondo cambia quanto basta da far stare tutti zitti.
        #JNSQscience_bd_cosmicRay_GillySrfLandedLowlands_00 = Anche nei bassipiani, il contatore crepita: la coda magnetica di Eve è un ombrello molto sottile.
        #JNSQscience_bd_cosmicRay_GillySrfLandedMidlands_00 = Una grandinata costante di particelle: questa roccia bitorzoluta non blocca nulla, tranne l'appoggio.
        #JNSQscience_bd_cosmicRay_GillySrfLandedHighlands_00 = Lassù sugli altopiani, il rivelatore ticchetta più in fretta, come se "quota" contasse su qualcosa di così piccolo.
        #JNSQscience_bd_cosmicRay_GillyInSpaceLowLowlands_00 = Radente sopra i bassipiani, intercetti un lieve spruzzo di secondarie dalla superficie.
        #JNSQscience_bd_cosmicRay_GillyInSpaceLowMidlands_00 = Il flusso resta alto e pulito: senza aria da incolpare, i numeri sembrano personali.
        #JNSQscience_bd_cosmicRay_GillyInSpaceLowHighlands_00 = Sopra gli altopiani, lo spettro si indurisce per un attimo, pietra e spazio che si scambiano colpi a distanza ravvicinata.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedAdministration_00 = Il rilevatore registra "attività di raggi cosmici" e "attività di graffette" con la stessa intensità. Solo una delle due ha un codice di autorizzazione.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedAstronautComplex_00 = La maggior parte delle particelle viene filtrata dall'atmosfera, a differenza di qualunque cosa stia succedendo nella lounge.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedBaikerbanur_00 = Letture a terra pulite, conteggi nitidi, e un campo decisamente intenso di "si metta lì, per favore." I tuoi raggi cosmici vengono processati più in fretta della tua burocrazia d'ingresso.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedBaikerbanurLaunchpad_00 = Il contatore ticchetta regolare finché un tecnico chiede cosa stia facendo vicino alla rampa. Continua a ticchettare, ma adesso in modo "nervoso."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedCrawlerway_00 = Le particelle secondarie arrivano come una pioggerellina costante, mentre il Crawlerway irradia pura determinazione. L'addetto alla sicurezza classifica il tuo rilevatore come "pericolo d'inciampo, cosmico."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedFlagPole_00 = Lo strumento rileva particelle energetiche dall'alto e sguardi severi da vicino. Annoti un forte campo direzionale puntato verso "si sposti."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedIslandAirfield_00 = I raggi cosmici filtrano nell'aria mentre la brezza salmastra ricopre tutto di "calibrazione marina." Il rilevatore è umido, ma scientificamente patriottico al riguardo.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedKSC_00 = Una scansione di base conferma che l'atmosfera di Kerbin blocca la maggior parte delle primarie, lasciando una rispettabile doccia di secondariee e una doccia irragionevole di regole.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedLaunchPad_00 = Il tasso di raggi cosmici è normale finché la rampa sfoga e qualcuno decide che il problema è il tuo strumento. I tuoi dati vengono archiviati sotto "non farlo qui."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedMissionControl_00 = Il rilevatore registra un conteggio perfettamente noioso, poi gli viene chiesto di smettere di "fare rumore." Il Controllo Missione dichiara prontamente tutti i raggi cosmici "fuori nominale."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&D_00 = Letture stabili, ma il fondo risulta misteriosamente "potenziato" vicino a una cassa marcata TEMPORANEO. Uno scienziato dice che è normale e richiude la cassa con più forza.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DCentralBuilding_00 = I conteggi dei raggi cosmici sono stabili e cortesemente atmosferici, come se fossero stati revisionati da un comitato. Il tuo rapporto torna indietro con una richiesta di "radiazione meno allarmante."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DCornerLab_00 = Il rilevatore vede un breve picco di qualcosa di molto energetico, poi la porta del laboratorio si chiude a chiave e il picco viene ufficialmente riclassificato come "polvere."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DMainBuilding_00 = Il contatore ticchetta tranquillo finché qualcuno non passa con un prototipo e il grafico sviluppa "picchi creativi." Ti dicono di smettere di stare vicino alle "scoperte."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DObservatory_00 = Lo strumento si gode una vista tranquilla del cielo e una leggera pioggia di secondariee. L'operatore chiede se i raggi cosmici si possono rilevare senza stare sulla piattaforma.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DSideLab_00 = I conteggi sembrano a posto finché parte un test nella stanza accanto e il tuo grafico "raggi cosmici" inizia a urlare. Tutti concordano che è cosmico, perché è il modulo più facile da compilare.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DSmallLab_00 = Il rilevatore registra un tasso stranamente costante, sospettosamente costante. Qualcuno ti offre un "adesivo di calibrazione" e un accordo di non divulgazione.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DTanks_00 = L'atmosfera fornisce la sua solita schermatura, mentre i serbatoi forniscono il loro solito "no." Il rilevatore continua a ticchettare, ma tu continui ad arretrare.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DWindTunnel_00 = I raggi cosmici restano cosmici, ma le ventole trasformano il tuo passaggio cavi in arte moderna. L'addetto alla sicurezza dichiara il tuo esperimento "aerodinamicamente non sicuro."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedRunway_00 = Il rilevatore conta particelle dall'alto mentre i jet producono particelle dal basso e burocrazia da ovunque. Il personale di terra chiede se puoi misurare i raggi cosmici in un posto un po' meno pista.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPH_00 = Il tasso di conteggio è normale, ma ogni superficie metallica aggiunge una deliziosa quantità di "urti sullo strumento." Gli ingegneri insistono che i picchi dei dati sono "caratteristiche strutturali."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHMainBuilding_00 = Le particelle secondarie si registrano tranquille finché si muove una gru e il tuo rilevatore scopre cosa significa vibrazione. Etichetti la nuova sorgente di rumore "meccanica pesante, orbita bassa."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHRoundTank_00 = I raggi cosmici sembrano ordinari, ma il terrapieno d'isolamento sembra molto interessato alla tua attrezzatura. Un tecnico ti ricorda che il "perimetro del serbatoio rotondo" non è un bioma parcheggio.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHTanks_00 = L'atmosfera filtra le primarie mentre il piazzale serbatoi filtra la curiosità non autorizzata. Il tuo rilevatore può continuare a funzionare finché smette di "sembrare investigativo."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHWaterTower_00 = I conteggi ticchettano regolari sotto una torre gocciolante che insiste nel collaudare la tua impermeabilizzazione. Il rilevatore sopravvive, poi presenta un reclamo per la scienza assistita dall'umidità.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationDishEast_00 = Una pulita doccia di secondariee scende mentre la parabola continua a fissare il tuo blocco appunti. Il tecnico chiede se i raggi cosmici hanno l'autorizzazione per stare qui.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationDishNorth_00 = Il rilevatore registra tassi costanti e un improvviso picco quando scatta un allarme per motivi non correlati. La parabola continua a tracciarti come se avessi causato lo spazio.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationDishSouth_00 = I raggi cosmici si comportano bene, l'attrezzatura si comporta bene, e lo staff si comporta come se tu fossi un bullone allentato. Registri ottima scienza e sospetto immediato.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationHub_00 = La schermatura indoor riduce un po' il conteggio, ma la burocrazia lo aumenta di molto. Il tuo "rapporto sui raggi cosmici" viene inoltrato a "conformità segnale" per qualche motivo.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedVAB_00 = Lo strumento rileva secondarie atmosferiche e una pioggerellina costante di polvere metallica. Gli ingegneri chiedono se puoi tararlo per contare solo particelle che migliorano la prontezza al lancio.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABMainBuilding_00 = Conteggi stabili finché si muove la gru, poi il grafico diventa un sismografo con ambizione. L'addetto alla sicurezza approva il risultato e disapprova la posizione.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABPodMemorial_00 = Il rilevatore registra in silenzio il gentile flusso a livello del suolo e, per una volta, nessuno interrompe. Lasci l'attrezzatura in funzione e la bocca chiusa.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABRoundTank_00 = Il tasso di conteggio è normale, ma la risposta della sicurezza è immediata. Il tuo strumento viene informato che "non è autorizzato a osservare l'ambiente cosmico del serbatoio."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABSouthComplex_00 = Le letture ticchettano sotto un soffitto di scintille e pressione di pianificazione. Qualcuno suggerisce di etichettare tutti i picchi come "atmosferici" per semplificare la burocrazia.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABTanks_00 = Le particelle secondarie arrivano puntuali: il tuo accesso no. Il rilevatore registra buona scienza mentre tu fai pratica di "stare in modo molto conforme."
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedWoomerang_00 = I raggi cosmici scendono educatamente mentre il vento tenta di trasferire tutta la tua postazione. Registri il flusso, le raffiche, e l'improvvisa comparsa di un cono di sicurezza.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedIceCaps_00 = I conteggi dei raggi cosmici aumentano con l'aurora: il rivelatore vibra sommessamente sotto il cielo di ghiaccio.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedHighlands_00 = Qui l'aria è più sottile: arrivano qualche colpo energetico in più di quanto il Controllo Missione avesse promesso.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedMountains_00 = Un picco netto coincide con l'attraversamento di una cresta: le rocce restano completamente indifferenti.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedShores_00 = La salsedine non è "cosmica", ma il rivelatore scatta come se lo fosse.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedMidlands_00 = Le letture sembrano "normali" finché non ricordi che "normale" include visitatori dallo spazio profondo.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedLowlands_00 = Aria densa quaggiù, snack densi a bordo. Il rivelatore resta educatamente impegnato.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridLowlands_00 = Cieli limpidi, terreno secco e un flusso leggermente più alto. Qui lo spazio ha una mira migliore.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridMidlands_00 = Il contatore ticchetta regolare come un metronomo. I deserti sono ottimi fondali per i raggi cosmici.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridHighlands_00 = Più quota, meno molecole d'aria, più sorprese ad alta energia.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridMountains_00 = Un breve burst suggerisce che le montagne stiano canalizzando qualcosa che non puoi vedere.
        #JNSQscience_bd_cosmicRay_KerbinSrfLandedWelcomeBackIsland_00 = Per un'isola con quel nome, il rivelatore continua a dire "benvenuto" a colpi di click.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashed_00 = L'impermeabilizzazione regge. Il rivelatore registra una pioggerellina costante di particelle e un'alluvione costante di schizzi.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedShores_00 = Acqua bassa ed elettronica bagnata: i dati sembrano chiedere un asciugamano.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedGreatLake_00 = Il grande lago smorza un po' i conteggi a bassa energia: quelli grossi passano comunque.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedInlandWater_00 = L'acqua abbassa il rumore di fondo, ma l'universo si rifiuta di stare zitto.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedKreenwichSea_00 = Le onde scuotono lo strumento: il flusso di particelle non si interessa minimamente del tuo mal di mare.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedArcticSea_00 = Acqua fredda, particelle calde. Uno scambio ingiusto, scientificamente confermato.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedForemansSea_00 = Il sole abbaglia sulla superficie: il rivelatore preferisce il tipo invisibile che arriva da molto più lontano.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedTriangulusSea_00 = Moto ondoso su tre direzioni, raggi cosmici su una direzione sola. La statistica vince comunque.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedNorthernSea_00 = I conteggi salgono lentamente mentre derivi verso nord: le linee di campo di Kerbin stanno facendo il loro lavoro.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedSub-ArcticSea_00 = Il contatore crepita, poi si calma. Come se stesse ascoltando l'oceano.
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedEasternSea_00 = Compare un lieve gradiente lungo la deriva: qualcuno lo archivia sotto "interessante".
        #JNSQscience_bd_cosmicRay_KerbinSrfSplashedWesternSea_00 = Le letture restano ostinatamente coerenti, a differenza dell'equipaggio.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowIceCaps_00 = Sopra i poli il rivelatore ticchetta più in fretta, come se lo spazio avesse trovato una scorciatoia.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowHighlands_00 = Un lieve aumento sopra gli altopiani: meno atmosfera sotto significa meno schermatura.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowMountains_00 = Le cime non fanno ombra ai raggi cosmici. Il rivelatore lo dimostra.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowShores_00 = La costa scorre sotto di te: il tasso non cambia, ma la vista sì.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowMidlands_00 = Sopra le pianure il flusso è abbastanza stabile da usarlo come riferimento di calibrazione.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowLowlands_00 = I bassopiani passano sotto: l'atmosfera fa il lavoro e tu ti prendi il merito.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowAridLowlands_00 = Sopra i bassopiani aridi, il rivelatore registra uno spettro un po' più "duro".
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowAridMidlands_00 = Terreno secco sotto, numeri asciutti sopra. Dati puliti, finalmente.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowAridHighlands_00 = Un piccolo picco suggerisce che non è solo l'aria in quota a diventare più rada.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowAridMountains_00 = Un burst sulla cintura montuosa arida: lo etichetti "forse geologia, forse fortuna".
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowGreatLake_00 = Sopra il grande lago, il conteggio cala di un soffio: l'acqua è una coperta discreta.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowInlandWater_00 = Un tratto di acque interne regala un tratto di dati altrettanto liscio.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowKreenwichSea_00 = I fronti di tempesta sotto non sterzano le particelle, ma sterzano la tua fiducia.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowArcticSea_00 = Mari polari più traiettorie polari: il rivelatore diventa loquace.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowForemansSea_00 = Tracce lunghe e regolari producono lunghe sequenze di click. Perfette in modo quasi irritante.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowTriangulusSea_00 = I conteggi oscillano con il periodo orbitale: fai finta che sia una "caratteristica".
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowNorthernSea_00 = Un aumento persistente coincide con la mappa della latitudine magnetica.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowSub-ArcticSea_00 = Una breve grandinata di colpi ad alta energia: la registri come "meteo spaziale".
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowEasternSea_00 = Il rivelatore nota una leggera asimmetria verso est: il campo di Kerbin non è perfettamente educato.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowWesternSea_00 = Il passaggio a ovest dà gli stessi numeri: l'universo rifiuta di scegliere una parte.
        #JNSQscience_bd_cosmicRay_KerbinInSpaceLowWelcomeBackIsland_00 = Un'isoletta minuscola, una doccia di raggi cosmici a grandezza naturale. Lo spazio non fa scala.
        #JNSQscience_bd_cosmicRay_MunSrfLandedPoles_00 = Il contatore ticchetta più in fretta sotto le ombre lunghe: ai poli la schermatura sembra scarsa.
        #JNSQscience_bd_cosmicRay_MunSrfLandedHighlands_00 = La regolite rimanda un lieve spruzzo di secondarie. Persino la polvere sembra avere un parere.
        #JNSQscience_bd_cosmicRay_MunSrfLandedMidlands_00 = Un fondo costante di impulsi, come se Mun stesse segnando i punti in silenzio.
        #JNSQscience_bd_cosmicRay_MunSrfLandedLowlands_00 = Qui passano meno eventi a bassa energia. Il bacino fa del suo meglio.
        #JNSQscience_bd_cosmicRay_MunSrfLandedPolarIceCraters_00 = Pareti fredde del cratere, particelle calde: i dati si rifiutano di combaciare con la scena.
        #JNSQscience_bd_cosmicRay_MunSrfLandedExoticCraters_00 = Un breve picco suggerisce che la parte "esotica" non è solo la forma.
        #JNSQscience_bd_cosmicRay_MunSrfLandedRareCraters_00 = Le letture restano stranamente coerenti, come se l'universo fosse educato per una volta.
        #JNSQscience_bd_cosmicRay_MunSrfLandedVoronoiCraters_00 = Terreno a macchie, conteggi a macchie: lo schema sembra quasi intenzionale.
        #JNSQscience_bd_cosmicRay_MunSrfLandedNotableCraters_00 = Indichi il cratere e il contatore risponde con un'esplosione teatrale.
        #JNSQscience_bd_cosmicRay_MunSrfLandedMountains_00 = Più in alto, schermatura più debole: i raggi cosmici hanno una visuale migliore.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowPoles_00 = Sopra i poli il tasso di conteggio sale e rimane alto, come se l'orbita avesse trovato una scorciatoia.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowHighlands_00 = Un lieve aumento sopra le colline. Meno roccia sotto significa meno "ombra."
        #JNSQscience_bd_cosmicRay_MunInSpaceLowMidlands_00 = Dati puliti e noiosi sopra le pianure. Li diffidi subito.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowLowlands_00 = Il flusso cala di un livello sopra i bassopiani: più terreno assorbe il rimbalzo delle secondarie.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowPolarIceCraters_00 = Un picco stretto si allinea con i crateri polari ghiacciati. Forse spruzzo di secondarie.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowExoticCraters_00 = Il rivelatore registra un burst proprio sopra i crateri esotici, poi torna silenzioso.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowRareCraters_00 = Una curva liscia nei conteggi suggerisce una zona calma dell'orbita. Rara davvero.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowVoronoiCraters_00 = I conteggi oscillano con le celle dei crateri: il grafico sembra aver imparato la geometria.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowNotableCraters_00 = Un passaggio rumoroso sopra i crateri notevoli: Mun si sta mettendo in mostra.
        #JNSQscience_bd_cosmicRay_MunInSpaceLowMountains_00 = Sopra le montagne il fondo aumenta: quota e regolite non si mettono d'accordo sulla schermatura.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedPoles_00 = Il contatore sobbalza ai poli: Minmus non offre buone maniere magnetiche, solo orizzonti verdi.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedLowlands_00 = I conteggi restano alti: persino i "bassopiani" sembrano spazio con un appoggio migliore.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedMidlands_00 = Una pioggerellina costante di impulsi. Inizi a tenere il tempo con i clic.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedHighlands_00 = Più in alto, flusso più alto: il rivelatore sembra impaziente di salire con te.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedBasins_00 = Le pareti del bacino rimandano secondari come se i raggi cosmici stessero giocando a ping-pong.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedBrownBasins_00 = Il suolo dei bacini marroni produce uno sciame diverso: il laboratorio lo chiama "composizione", tu lo chiami "umore."
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedBrownLowlands_00 = Regolite più scura, picchi più netti. Il rivelatore non vede i colori, ma quasi lo sembra.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedBrownMidlands_00 = I numeri oscillano mentre salti tra tonalità di terreno che fingono tutte di essere la stessa roccia.
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedBrownHighlands_00 = Lo spettro si indurisce quassù: l'universo invia particelle "premium".
        #JNSQscience_bd_cosmicRay_MinmusSrfLandedMountains_00 = Sulle montagne di Minmus, un passo sembra un'orbita... e il contatore è d'accordo.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowPoles_00 = Sopra i poli il tasso sale e resta alto: Minmus non prova nemmeno a schermarti.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowLowlands_00 = Orbita bassa sopra i bassopiani: colpi diretti sopra, lieve rimbalzo dal basso.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowMidlands_00 = Un flusso pulito e costante. L'unico rumore sei tu che provi a fare clic a tempo.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowHighlands_00 = Le colline aggiungono secondari extra: le rocce sanno farsi sentire quando lo spazio tace.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowBasins_00 = Un breve sciame si allinea con un bordo del bacino: la geometria si fa il suo meteo.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowBrownBasins_00 = Il mix di particelle cambia sopra i bacini marroni, quanto basta per iniziare una discussione a casa.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowBrownLowlands_00 = Sopra i bassopiani marroni il contatore ticchetta come un orologio nervoso.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowBrownMidlands_00 = Terreno regolare, curva regolare nei dati. Non ti fidi, ma lo registri.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowBrownHighlands_00 = Un burst più duro passa sopra le colline marroni: la superficie di Minmus non decide se schermare o farsi sentire.
        #JNSQscience_bd_cosmicRay_MinmusInSpaceLowMountains_00 = I passaggi sulle montagne producono rapidi aumenti: l'orbita sfiora abbastanza da sentire la regolite rispondere.
        #JNSQscience_bd_cosmicRay_DunaFlyingLow_00 = Il contatore fa clic con regolarità nell'aria polverosa: Duna filtra gli impulsi deboli e lascia passare quelli più taglienti.
        #JNSQscience_bd_cosmicRay_DunaFlyingHigh_00 = Sopra gran parte dell'atmosfera, il rivelatore si assesta in un sibilo luminoso e costante di particelle in arrivo.
        #JNSQscience_bd_cosmicRay_DunaInSpaceHigh_00 = Ben sopra Duna, i numeri si stabilizzano sul fondo dello spazio profondo, finché un picco improvviso ti ricorda che Duna è ancora "vicina".
        #JNSQscience_bd_cosmicRay_DunaSrfLandedIceCaps_00 = Il cielo sottile e il ghiaccio brillante offrono poco conforto: il rivelatore ticchetta nel bagliore gelido.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedHighlands_00 = Più in alto, schermatura più sottile. I raggi cosmici arrivano con meno scuse e più entusiasmo.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedMidlands_00 = Una pioggerellina costante di impulsi: l'unica cosa più densa dei dati è la polvere nelle giunture.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedLowlands_00 = I bassopiani sembrano riparati finché il contatore dimostra che "riparato" è un concetto relativo.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedCraters_00 = Le pareti del cratere non bloccano lo spazio: rimandano solo un piccolo scintillio di secondarie.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedRareCraters_00 = Lo spettro qui sembra stranamente ordinato, come se l'universo stesse cercando di comportarsi in modo professionale.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedVoronoiCraters_00 = I conteggi salgono e scendono con il terreno a motivo: il grafico inizia a sembrare stranamente geometrico.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedNotableCraters_00 = Un burst netto arriva puntuale proprio sopra l'elemento "notevole". Cerchi di non darci peso.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedExoticCraters_00 = Il rivelatore segnala un lieve spostamento nelle energie. Esotico, ma più da scartoffie che da avventura.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedTrenches_00 = Giù nella fossa, gli impulsi a bassa energia si diradano: quelli duri arrivano comunque come se fossero i padroni del posto.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedNotablePlains_00 = Terreno piatto, linee pulite nei dati, finché un picco casuale rovina la simmetria.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedNotableMountains_00 = Il contatore accelera come se la quota contasse più della parola "notevole".
        #JNSQscience_bd_cosmicRay_DunaSrfLandedMountains_00 = Le montagne offrono un panorama grandioso e assolutamente nessuna protezione dal cielo sopra di loro.
        #JNSQscience_bd_cosmicRay_DunaSrfLandedVolcano_00 = Un fruscio rumoroso di secondarie suggerisce che la roccia qui risponde ai raggi cosmici meglio di quanto li respinga.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowIceCaps_00 = Sopra le calotte ghiacciate il flusso sale leggermente, come se le rotte polari fossero una corsia preferenziale.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowHighlands_00 = Un lieve aumento sopra le colline: meno atmosfera sotto significa meno aiuto che non ti sei guadagnato.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowMidlands_00 = Conteggi regolari e stabili. Abbastanza puliti da calibrare, il che ti rende subito sospettoso.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowLowlands_00 = Lo spettro si ammorbidisce un poco sopra i bassopiani, poi torna alla sua solita luminosità ostinata.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowCraters_00 = Attraversare i bordi dei crateri aggiunge picchi frastagliati dal rimbalzo della superficie, come se il terreno stesse fischiando alla tua orbita.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowRareCraters_00 = I numeri si assestano su un altopiano insolitamente calmo: qualcuno controlla comunque il rivelatore due volte.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowVoronoiCraters_00 = Il tasso di conteggio oscilla in un motivo ripetuto che quasi combacia con le celle sotto.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowNotableCraters_00 = Un burst breve e concentrato compare sopra il cratere notevole, perfettamente sincronizzato per dare fastidio.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowExoticCraters_00 = Un breve indurimento dello spettro suggerisce materiale insolito, o una sfortuna insolitamente ostinata, sotto di te.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowTrenches_00 = Sopra le fosse, i conteggi delle secondarie calano: il terreno assorbe gli avanzi ma non l'evento principale.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowNotablePlains_00 = Lunghe sequenze di clic uniformi si stendono sopra le pianure: l'"aria sottile" di Duna contribuisce quasi a nulla.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowNotableMountains_00 = Un passaggio rumoroso sopra le montagne notevoli: l'orbita sfiora abbastanza da sentire la regolite rispondere.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowMountains_00 = Il fondo aumenta sopra la catena montuosa: quota e geometria della roccia fanno squadra per aggiungere crepitio.
        #JNSQscience_bd_cosmicRay_DunaInSpaceLowVolcano_00 = Il rivelatore registra un breve sciame sopra la regione vulcanica, poi torna alla sua grandine costante e indifferente.
        #JNSQscience_bd_cosmicRay_IkeSrfLandedPoles_00 = Il contatore fa un picco ogni volta che Duna resta bassa sull'orizzonte: Ike sembra prendere in prestito una magnetosfera.
        #JNSQscience_bd_cosmicRay_IkeSrfLandedMountains_00 = Le pareti scoscese rimandano uno spruzzo di secondarie: le montagne fanno da specchi rozzi per la radiazione.
        #JNSQscience_bd_cosmicRay_IkeSrfLandedMidlands_00 = Un tasso di clic alto e costante. Niente aria, niente schermatura, niente finzione che l'universo sia silenzioso.
        #JNSQscience_bd_cosmicRay_IkeSrfLandedLowlands_00 = Nei bacini gli impulsi più deboli si diradano, ma le particelle dure arrivano come se fossero i padroni del posto.
        #JNSQscience_bd_cosmicRay_IkeSrfLandedHighlands_00 = Lo spettro si indurisce leggermente: il terreno più alto e più chiaro sembra impaziente di disperdere tutto ciò che lo spazio gli lancia addosso.
        #JNSQscience_bd_cosmicRay_IkeInSpaceLowPoles_00 = Sopra i poli, i conteggi si raccolgono in bande sottili, come se linee di campo invisibili stessero disegnando sulla tua orbita.
        #JNSQscience_bd_cosmicRay_IkeInSpaceLowMountains_00 = Picchi frastagliati compaiono sopra le catene montuose. Un rimbalzo dalla superficie, amplificato dal terreno spigoloso.
        #JNSQscience_bd_cosmicRay_IkeInSpaceLowMidlands_00 = Fondo pulito e brillante. Ottimo per la calibrazione, pessimo per rilassarsi.
        #JNSQscience_bd_cosmicRay_IkeInSpaceLowLowlands_00 = Un piccolo calo suggerisce che il terreno più liscio rimanda meno secondari, non meno preoccupazioni.
        #JNSQscience_bd_cosmicRay_IkeInSpaceLowHighlands_00 = Il rivelatore intercetta qui un mix più duro: roccia diversa, dispersione diversa, stessa pioggia implacabile.
        #JNSQscience_bd_cosmicRay_EdnaSrfLandedLowlands_00 = Il rivelatore ticchetta nel freddo: quaggiù il "fondo" è praticamente meteo.
        #JNSQscience_bd_cosmicRay_EdnaSrfLandedMidlands_00 = Una grandinata costante di impulsi ad alta energia: il cielo sottile di Edna non offre esattamente nessun parere.
        #JNSQscience_bd_cosmicRay_EdnaSrfLandedHighlands_00 = Lo spettro si indurisce sulle alture: meno ombre, più visitatori in linea retta.
        #JNSQscience_bd_cosmicRay_EdnaSrfLandedPolarIceCraters_00 = Le trappole di freddo riducono un po' le secondarie, ma le primarie sfondano comunque come se nulla fosse.
        #JNSQscience_bd_cosmicRay_EdnaSrfLandedWhites_00 = Il terreno brillante rimanda un lieve spruzzo extra: il contatore sembra applaudire l'albedo.
        #JNSQscience_bd_cosmicRay_EdnaInSpaceLowLowlands_00 = Radendo l'orbita bassa, intercetti primari sopra e un lieve rimbalzo dal terreno scuro sotto.
        #JNSQscience_bd_cosmicRay_EdnaInSpaceLowMidlands_00 = Conteggi puliti e severi: spazio profondo con quel tanto di dispersione superficiale da tenere il grafico nervoso.
        #JNSQscience_bd_cosmicRay_EdnaInSpaceLowHighlands_00 = Un spruzzo frastagliato di secondarie scorre sopra le alture: la superficie risponde a colpi di clic.
        #JNSQscience_bd_cosmicRay_EdnaInSpaceLowPolarIceCraters_00 = Sopra i crateri polari il rumore a bassa energia cala: le tracce dure tengono il tempo alla perfezione.
        #JNSQscience_bd_cosmicRay_EdnaInSpaceLowWhites_00 = I conteggi salgono di un livello sopra i Whites, come se la superficie brillante ti rimandasse le particelle addosso.
        #JNSQscience_bd_cosmicRay_EdnaInSpaceHigh_00 = Ben sopra Edna il rivelatore si assesta in una pioggerellina sottile e antica. Abbastanza quieta da mettere a disagio.
        #JNSQscience_bd_cosmicRay_DakSrfLandedLowlands_00 = Il contatore crepita con regolarità: Dak è troppo piccolo per bloccare qualsiasi cosa, tranne la tua sicurezza.
        #JNSQscience_bd_cosmicRay_DakSrfLandedMidlands_00 = Un flusso pulito di impulsi. Niente aria, niente schermatura, solo l'universo che bussa sul tuo strumento.
        #JNSQscience_bd_cosmicRay_DakSrfLandedHighlands_00 = Sulle "alture" il tasso aumenta un poco: la quota è quasi un suggerimento, i raggi cosmici no.
        #JNSQscience_bd_cosmicRay_DakInSpaceLowLowlands_00 = In orbita bassa compare un lieve luccichio di secondarie dalla superficie, come se la patata stesse commentando i tuoi dati in silenzio.
        #JNSQscience_bd_cosmicRay_DakInSpaceLowMidlands_00 = Il flusso resta alto e ordinato: senza un posto dove nascondersi, ogni colpo sembra personale.
        #JNSQscience_bd_cosmicRay_DakInSpaceLowHighlands_00 = Un breve indurimento dello spettro sopra le alture: roccia diversa, dispersione diversa, stessa pioggia implacabile.
        #JNSQscience_bd_cosmicRay_DakInSpaceHigh_00 = Sopra Dak, il rivelatore sente soprattutto il fondo dello spazio profondo. Clic solitari in un silenzio enorme.
        #JNSQscience_bd_cosmicRay_DresSrfLandedPoles_00 = Terreno freddo, clic costanti: i raggi cosmici tengono compagnia a Dres meglio di qualsiasi altra cosa.
        #JNSQscience_bd_cosmicRay_DresSrfLandedHighlands_00 = Le alture esposte restituiscono impulsi nitidi ed energici. Il terreno offre panorami, non protezione.
        #JNSQscience_bd_cosmicRay_DresSrfLandedMidlands_00 = Un mix ordinato di particelle solari e di spazio profondo ticchetta come un metronomo nel vuoto.
        #JNSQscience_bd_cosmicRay_DresSrfLandedLowlands_00 = Le pareti del bacino eliminano gli eventi più morbidi: gli impatti ad alta energia quasi non notano la deviazione.
        #JNSQscience_bd_cosmicRay_DresSrfLandedCanyon_00 = Giù nel canyon, i conteggi a bassa energia crollano di colpo. I raggi duri ti trovano comunque senza chiedere permesso.
        #JNSQscience_bd_cosmicRay_DresInSpaceLowPoles_00 = Il fondo sembra regolare finché un singolo ione pesante non traccia una striscia luminosa nel rivelatore.
        #JNSQscience_bd_cosmicRay_DresInSpaceLowHighlands_00 = I conteggi delle secondarie aumentano sopra le alture: la superficie risponde quando il cosmo la tocca.
        #JNSQscience_bd_cosmicRay_DresInSpaceLowMidlands_00 = Una lunga sequenza di clic uniforme. Lo spazio profondo sembra più vicino di quanto qualsiasi mappa suggerisca.
        #JNSQscience_bd_cosmicRay_DresInSpaceLowLowlands_00 = Qui si registrano un po' meno secondari: i bassopiani assorbono di più, ma non assorbono abbastanza.
        #JNSQscience_bd_cosmicRay_DresInSpaceLowCanyon_00 = Attraversando il bordo del canyon, il tasso cambia bruscamente, come se il terreno avesse intagliato una tacca nella foschia di particelle.
        #JNSQscience_bd_cosmicRay_JoolFlyingLow_00 = Il contatore si fa più quieto mentre ti immergi nella foschia verde: l'ombrello magnetico di Jool sta facendo il suo dovere.
        #JNSQscience_bd_cosmicRay_JoolFlyingHigh_00 = In alto nell'alta atmosfera i raggi cosmici si diradano, sostituiti da un crepitio lieve e persistente di particelle intrappolate.
        #JNSQscience_bd_cosmicRay_JoolInSpaceLowEquatorialBands_00 = Sopra le bande equatoriali il rivelatore quasi non fa clic: gran parte dell'universo viene respinta alla porta.
        #JNSQscience_bd_cosmicRay_JoolInSpaceLowExposedLowerDeck_00 = Passando sopra l'"ordine inferiore" esposto, il tasso di conteggio oscilla come se le linee di campo si stessero piegando sotto di te.
        #JNSQscience_bd_cosmicRay_JoolInSpaceLowSubpolarBands_00 = I passaggi subpolari mostrano un breve aumento, poi un calo ripido, come se avessi sfiorato il bordo di una recinzione invisibile.
        #JNSQscience_bd_cosmicRay_JoolInSpaceLowNorthPole_00 = Vicino al polo nord, il rivelatore sente un sibilo sottile di raggi in arrivo che si infilano lungo percorsi aperti.
        #JNSQscience_bd_cosmicRay_JoolInSpaceLowSouthPole_00 = La traccia sopra il polo sud produce burst irregolari: qui la schermatura sembra un insieme di regole che cambiano.
        #JNSQscience_bd_cosmicRay_JoolInSpaceLowStormComplex_00 = Sopra il complesso di tempeste lo spettro cambia bruscamente, come se la magnetosfera venisse rimescolata dall'interno.
        #JNSQscience_bd_cosmicRay_LaytheFlyingLow_00 = Il contatore si fa più quieto nell'aria densa: Jool e Laythe insieme formano un ombrello sorprendentemente efficace.
        #JNSQscience_bd_cosmicRay_LaytheFlyingHigh_00 = Sopra la foschia, il rivelatore trova un sibilo sottile di particelle e un lieve crepitio di radiazione intrappolata.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedShores_00 = Sabbia bagnata e aria salmastra non fermano la roba dura, ma il tasso di clic resta stranamente basso per un "cielo aperto".
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedShallows_00 = Il rivelatore fa clic a ritmo costante mentre le acque basse scintillano: i raggi ignorano il panorama.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedHighlands_00 = Meno atmosfera sopra significa più conteggi, ma comunque meno di quanto ti aspetteresti così lontano.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedMountains_00 = Terreno alto, impulsi più taglienti: i dati sembrano arrivare lungo linee invisibili.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedIceCaps_00 = Il cielo polare dà un breve aumento, come se la schermatura avesse una cucitura vicino alla sommità.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedEnclosedFaults_00 = I picchi arrivano in brevi burst, come se le fratture stessero ascoltando la magnetosfera.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedLowlands_00 = L'aria più densa dà il tasso più basso. La cosa più simile a un "riparo" su Laythe.
        #JNSQscience_bd_cosmicRay_LaytheSrfLandedMidlands_00 = Un fondo calmo e ridotto: lo strumento sembra quasi annoiato per una volta.
        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedShores_00 = L'acqua smussa il rumore di fondo: i clic rimasti sono delle particelle grosse a cui non importa nulla.
        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedShallows_00 = Onde gentili, conteggi stabili. Lo spazio continua a battere sul rivelatore come un metronomo.
        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedInlandWater_00 = Il lago calma i dati: l'universo si rifiuta di calmarsi con lui.
        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedKrenwichSea_00 = Lo spettro cambia leggermente con il rollio del mare, come se la schermatura si muovesse sotto di te.
