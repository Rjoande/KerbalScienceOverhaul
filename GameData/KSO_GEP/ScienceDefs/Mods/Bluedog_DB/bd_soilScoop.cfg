@EXPERIMENT_DEFINITION:HAS[#id[bd_soilScoop]]
{
    %RESULTS
    {
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_soilScoop_TaranisSrfLandedScorchedLowlands_00 // The scoop peels back a flaky crust and reveals glassy grains that still look offended by the nearby red sun.
        TaranisSrfLandedMidlands* = #GEPscience_bd_soilScoop_TaranisSrfLandedMidlands_00 // The arm stirs up a fine, electrostatic powder that clings to everything like it wants to hitch a ride home.
        TaranisSrfLandedHighlands* = #GEPscience_bd_soilScoop_TaranisSrfLandedHighlands_00 // Beneath the brittle surface, the material is fractured and sharp, as if it’s been thermal-cycled for ages with no mercy.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_soilScoop_TaranisSrfLandedDarkSideMidlands_00 // The scoop cracks a frozen skin and releases a faint drift of sublimating grit; Mission Control replies after a long, uncomfortable pause.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_soilScoop_TaranisSrfLandedDarkSideHighlands_00 // What comes up is cold, dry, and ceramic-hard, with tiny bright flecks that vanish when they warm in the shadowless light.
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_soilScoop_TaranisSrfLandedMagmaShores_00 // The scoop nudges the shoreline crust and immediately regrets it—there’s a glow underneath that says “retract now.”
        TaranisSrfLandedPoles* = #GEPscience_bd_soilScoop_TaranisSrfLandedPoles_00 // A thin frost layer gives way to dark, scorched grains below, like this world can’t decide whether to freeze or burn.
        TaranisSrfSplashedMagmaSea* = #GEPscience_bd_soilScoop_TaranisSrfSplashedMagmaSea_00 // The scoop plunges in and the readouts saturate; it comes back wearing a glossy coat that snaps into a solid skin almost instantly.
        TaranisSrfSplashedMagmaShores* = #GEPscience_bd_soilScoop_TaranisSrfSplashedMagmaShores_00 // You stir the molten surface film and watch it fold into black, glassy sheets before the heat finds the arm again.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_soilScoop_ToutatisSrfLandedSunnyLowlands_00 // The exposed layer is baked into a crust of powdery rock, warm enough that the scoop motor sounds tired.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_soilScoop_ToutatisSrfLandedSunnyHighlands_00 // The arm scrapes sun-sintered grit that squeals like a bad hinge; the fresh cut shows darker material underneath.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_soilScoop_ToutatisSrfLandedTransitionalLowlands_00 // Just below the surface, fine dust gives way to compacted grains—an abrupt boundary between day-baked and night-chilled.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_soilScoop_ToutatisSrfLandedTransitionalHighlands_00 // The scoop uncovers thin, brittle plates that flake apart in layers, like this ground has been stressed in both directions forever.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_soilScoop_ToutatisSrfLandedDarkSideLowlands_00 // A pale frost crust collapses with a soft crunch, and a brief puff of trapped gas fogs the camera before drifting away.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_soilScoop_ToutatisSrfLandedDarkSideHighlands_00 // The arm lifts jagged, ice-cemented grit that sparkles faintly under the dim red light, then dulls as it warms.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_soilScoop_ToutatisSrfLandedSoutheasternMountains_00 // Mostly sharp rock fragments—your “soil” is just mountain trying to become sand, very slowly and very loudly.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_soilScoop_ToutatisSrfLandedWesternMountains_00 // The scoop finds sheltered pockets of finer regolith between hard ridges, as if the thin air only works part-time.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_soilScoop_ToutatisSrfLandedDarkSideMountains_00 // The surface breaks like frozen gravel, and the exposed material looks glued together by cold rather than chemistry.

        NodensSrfLandedShores* = #GEPscience_bd_soilScoop_NodensSrfLandedShores_00 // The scoop pulls up damp sand and rounded pebbles; under the dim red sun, even the wet grains look strangely unfamiliar.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_NodensSrfLandedTropicalLowlands_00 // The exposed soil is dark and clingy, with moisture that makes the instruments optimistic and the engineers suspicious.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_NodensSrfLandedTemperateLowlands_00 // The scoop reveals a tidy mix of fine grains and small mineral flecks—stable-looking ground on a very distant world.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_NodensSrfLandedTropicalMidlands_00 // A sticky, clay-like layer comes up in sheets, hinting at long-term weathering under a thick sky.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_NodensSrfLandedTemperateMidlands_00 // The subsurface is coarser and more gravelly than expected, as if storms sort the grains and never stop.
        NodensSrfLandedHighlands* = #GEPscience_bd_soilScoop_NodensSrfLandedHighlands_00 // The scoop uncovers sharp, dry grit with fewer fines; it’s the first material here that doesn’t try to smear itself onto the arm.
        NodensSrfLandedTundra* = #GEPscience_bd_soilScoop_NodensSrfLandedTundra_00 // A thin, firm crust breaks to reveal cold, wet grains beneath—permafrost that doesn’t care how long your transmission takes.
        NodensSrfLandedIceCaps* = #GEPscience_bd_soilScoop_NodensSrfLandedIceCaps_00 // The scoop bites into dusty ice layers; the exposed face shows stripes like a frozen logbook of seasons under a red sun.
        NodensSrfSplashedSaltySeas* = #GEPscience_bd_soilScoop_NodensSrfSplashedSaltySeas_00 // The arm dredges briny sediment that clumps immediately; whatever salts are in here, they are extremely proud of themselves.
        NodensSrfSplashedFreshWater* = #GEPscience_bd_soilScoop_NodensSrfSplashedFreshWater_00 // Fine silt swirls up in slow clouds, and the sensors flag complex chemistry that will take ages to argue about back home.
        NodensSrfSplashedShores* = #GEPscience_bd_soilScoop_NodensSrfSplashedShores_00 // You scoop wet sand right at the waterline and watch it slump back into place, like the shore is politely undoing your science.

        BelisamaSrfLandedFlats* = #GEPscience_bd_soilScoop_BelisamaSrfLandedFlats_00 // The scoop slides through a tight, wind-smoothed crust; the grains pack together like they’ve been pressed under red sunlight for ages.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_BelisamaSrfLandedTropicalLowlands_00 // The surface layer is darker and slightly tacky, as if the “warm belt” chemistry never quite finishes reacting before the next long comms delay.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_BelisamaSrfLandedTemperateLowlands_00 // The regolith is neatly sorted—fine dust on top, crunchy granules below—like the ground has a schedule and sticks to it.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_BelisamaSrfLandedTropicalMidlands_00 // You lift a scoop of gritty clumps that fall apart slowly in the thin light, shedding dust that tries very hard to become part of the spacecraft.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_BelisamaSrfLandedTemperateMidlands_00 // The scoop finds pale grains with occasional glassy flecks; the lab notes this is “normal,” then adds three question marks.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_soilScoop_BelisamaSrfLandedHighlands_00 // The arm scrapes over sharp fragments and exposed bedrock chips, as if the high ground is actively refusing to become soil.
        BelisamaSrfLandedPoles* = #GEPscience_bd_soilScoop_BelisamaSrfLandedPoles_00 // A brittle, cold crust cracks open to reveal darker grains beneath; the red sun makes the fresh cut look almost like it’s glowing.

        SucellusSrfLandedBasins* = #GEPscience_bd_soilScoop_SucellusSrfLandedBasins_00 // The scoop pulls up impact-brewed rubble—powder mixed with angular shards—like the basin is still chewing on old collisions.
        SucellusSrfLandedLowlands* = #GEPscience_bd_soilScoop_SucellusSrfLandedLowlands_00 // The sample is dense for “dirt,” with heavy specks that ping the container; someone back home starts arguing about metals immediately.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_SucellusSrfLandedTropicalMidlands_00 // The grains are unusually dry and static-happy, crawling up the scoop walls in slow motion under the dim red daylight.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_SucellusSrfLandedTemperateMidlands_00 // You uncover a layered mix of fines and grit, as if the surface has been gently sifted by processes nobody can name from this distance.
        SucellusSrfLandedHighlands* = #GEPscience_bd_soilScoop_SucellusSrfLandedHighlands_00 // The scoop brings up pale, crushed rock that smells like absolutely nothing—an oddly unsettling achievement.
        SucellusSrfLandedPoles* = #GEPscience_bd_soilScoop_SucellusSrfLandedPoles_00 // Cold-cemented granules come up in a single lump, then fracture into sparkling bits the moment they warm in the instrument bay.

        CaireenSrfLandedLowlands* = #GEPscience_bd_soilScoop_CaireenSrfLandedLowlands_00 // The scoop barely bites before the whole patch starts to float; you collect a “sample” and a brief lesson in low-gravity humility.
        CaireenSrfLandedMidlands* = #GEPscience_bd_soilScoop_CaireenSrfLandedMidlands_00 // Dust and pebblelets tumble together in the container, clicking softly like a tiny avalanche that will take hours to settle.
        CaireenSrfLandedHighlands* = #GEPscience_bd_soilScoop_CaireenSrfLandedHighlands_00 // The arm scrapes up fresh regolith from a steep slope; half of it drifts away before the camera can prove it existed.
        CaireenSrfLandedPoles* = #GEPscience_bd_soilScoop_CaireenSrfLandedPoles_00 // A thin frost glaze hides dark, asteroid-like grit underneath—captured, adopted, and still not quite belonging under this red sun.

        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedTropicalLowlands_00 // The scoop breaks a sun-baked crust and reveals pale grit underneath, as if Airmed is trying to repaint itself under the dim red light.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedTemperateLowlands_00 // Fine dust and sharp chips pour into the tray; the grains cling stubbornly, probably still angry about all that radiation.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedTropicalMidlands_00 // A thin crust gives way to layered regolith—bright on top, dark below—like the moon forgot where it put the color boundary.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedTemperateMidlands_00 // The arm scrapes up compacted rubble that looks impact-sorted, each fragment a tiny reminder that Airmed lives dangerously.
        AirmedSrfLandedHighlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedHighlands_00 // The scoop mostly collects jagged rocklets; on a world this battered, “soil” is just rock that hasn’t finished arguing with gravity yet.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedDarkenedLowlands_00 // The exposed subsurface is almost charcoal-black, swallowing the red sunlight until the camera insists its lens cap is on.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedDarkenedMidlands_00 // A black, powdery layer puffs up and settles painfully slowly; Mission Control’s reaction arrives long after the dust does.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_soilScoop_AirmedSrfLandedDarkenedHighlands_00 // Under the dark crust, the grains sparkle with glassy flecks—briefly pretty, then lost again in the long shadows.
        AirmedSrfLandedPoles* = #GEPscience_bd_soilScoop_AirmedSrfLandedPoles_00 // A brittle frosty skin fractures, revealing hard, dry grit beneath; even the “cold” parts here feel aggressively sun-sterilized.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_soilScoop_BorvoSrfLandedTropicalCraquelure_00 // The scoop lifts thin, cracked plates that snap apart like old paint; something volatile hisses away into the faint, hazy air.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_soilScoop_BorvoSrfLandedTemperateCraquelure_00 // The regolith breaks into polygon chunks and dusty seams, as if the ground has been flexing and refreezing for centuries.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_BorvoSrfLandedTropicalLowlands_00 // You uncover damp-looking grains that are not actually damp; the instruments argue whether this is dust, ice, or a secret third thing.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_BorvoSrfLandedTemperateLowlands_00 // The sample is a beige, compacted mix that clumps just enough to be suspicious in this thin methane-tinged atmosphere.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_BorvoSrfLandedTropicalMidlands_00 // The scoop exposes a darker layer beneath the surface crust; the smell sensors report “nothing,” which is somehow unsettling.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_BorvoSrfLandedTemperateMidlands_00 // Fine silt and gritty pellets tumble together, sorted like someone shook the moon in a jar and forgot to stop.
        BorvoSrfLandedHighlands* = #GEPscience_bd_soilScoop_BorvoSrfLandedHighlands_00 // The arm scrapes up pale, crunchy grains that sparkle faintly under the red sun, then dull as the haze drifts over the site.
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_soilScoop_BorvoSrfLandedMajorCraters_00 // Impact-breccia gravel comes up in sharp pieces, with softer fines packed between—Borvo’s craters keep their souvenirs close.
        BorvoSrfLandedPoles* = #GEPscience_bd_soilScoop_BorvoSrfLandedPoles_00 // The scoop bites into a cold, crusty layer that fractures cleanly; the exposed material looks fresher than it has any right to this far from home.

        DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_DamonaSrfLandedTropicalLowlands_00 // The scoop gathers gray powder and pebblelets that slide like dry snow; the red sun makes everything look older than the data says.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_DamonaSrfLandedTemperateLowlands_00 // A thin crust breaks to reveal darker grit below, as if the surface is trying to hide what the last big impact did.
        DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_DamonaSrfLandedTropicalMidlands_00 // The regolith is coarse and scratchy; the sample container receives it with the quiet resignation of long-distance science.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_DamonaSrfLandedTemperateMidlands_00 // You expose a compacted layer that holds together for a moment, then collapses into gravel the instant you stop looking at it.
        DamonaSrfLandedHighlands* = #GEPscience_bd_soilScoop_DamonaSrfLandedHighlands_00 // The scoop mostly collects angular fragments—fresh-looking chips on a moon that’s otherwise all old scars and silence.
        DamonaSrfLandedImpactBasin* = #GEPscience_bd_soilScoop_DamonaSrfLandedImpactBasin_00 // The arm digs into pulverized ejecta: mixed grains, fused flecks, and a texture that says “violent episode” without needing translation.
        DamonaSrfLandedPoles* = #GEPscience_bd_soilScoop_DamonaSrfLandedPoles_00 // A brittle, cold glaze cracks open; beneath it is dust as dark as space, waiting patiently for the next transmission window.

        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_EponaSrfLandedTropicalLowlands_00 // The scoop cracks a hard, pale crust; the grains beneath are darker and oddly compacted, as if “warm” means “less frozen” this far from home.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_EponaSrfLandedTemperateLowlands_00 // Fine powder drifts up lazily in the weak light, then settles with the patience of something that knows the next uplink is hours away.
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_soilScoop_EponaSrfLandedTropicalUplands_00 // Beneath a brittle top layer, the sample comes up in gritty clumps that look heat-cycled—freeze, creep, freeze again under a dim red sun.
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_soilScoop_EponaSrfLandedTemperateUplands_00 // The scoop brings back a mix of icy granules and sharp rocklets; it’s hard to tell what’s “soil” and what’s “frozen history.”
        EponaSrfLandedHighlands* = #GEPscience_bd_soilScoop_EponaSrfLandedHighlands_00 // The arm scrapes mostly angular fragments; whatever weathering happens here is slow, cold, and very, very thorough.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_soilScoop_EponaSrfLandedGrandPeaks_00 // A thin dust veneer hides stubborn, glassy grains—your “dig” is more of a polite request to the mountain.
        EponaSrfLandedCraters* = #GEPscience_bd_soilScoop_EponaSrfLandedCraters_00 // The scoop lifts impact-churned rubble with fused flecks; the crater floor feels like it’s still sorting itself out.
        EponaSrfLandedVolcanoes* = #GEPscience_bd_soilScoop_EponaSrfLandedVolcanoes_00 // The surface crust breaks to reveal warmer, darker grit; the sensors spike briefly, then Mission Control’s alarmed reply arrives long after you’ve retracted.
        EponaSrfLandedPoles* = #GEPscience_bd_soilScoop_EponaSrfLandedPoles_00 // A frost skin fractures cleanly, exposing layered ice-dust bands that read like seasons written in slow motion.

        RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_RosmertaSrfLandedTropicalLowlands_00 // The scoop gathers powder-fine regolith that behaves like smoke in low gravity, then remembers it’s supposed to be a solid.
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_RosmertaSrfLandedTemperateLowlands_00 // A shallow scrape reveals tightly packed grains, as if the ground has been gently pressed by time and vacuum.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_RosmertaSrfLandedTropicalMidlands_00 // The sample is a bland mix of dust and pebblelets—quiet, airless, and somehow still a little lonely.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_RosmertaSrfLandedTemperateMidlands_00 // The scoop exposes a darker underlayer that clings electrostatically to everything, including the camera’s dignity.
        RosmertaSrfLandedHighlands* = #GEPscience_bd_soilScoop_RosmertaSrfLandedHighlands_00 // Mostly sharp chips and coarse grit; Rosmerta’s high ground refuses to be anything softer than “pointy.”
        RosmertaSrfLandedPoles* = #GEPscience_bd_soilScoop_RosmertaSrfLandedPoles_00 // A thin frost glaze gives way to dry, gray grains beneath—cold enough to preserve secrets, but not kind enough to share them.

        RAB-58ESrfLandedLowlands* = #GEPscience_bd_soilScoop_RAB-58ESrfLandedLowlands_00 // The scoop lifts a confused mix of bright grains and dark crumbs; captured or not, this little moonlet has brought its own rules.
        RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_soilScoop_RAB-58ESrfLandedEasternHighlands_00 // The arm scrapes up crunchy, pale material that fractures like brittle ice-cement, then sheds dust that floats off in slow spirals.
        RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_soilScoop_RAB-58ESrfLandedWesternHighlands_00 // The sample looks rockier here—angular fragments with a faint sheen—like two different worlds tried to become one and stopped halfway.

        CernunnosSrfLandedTropicalLowlands* = #GEPscience_bd_soilScoop_CernunnosSrfLandedTropicalLowlands_00 // The scoop breaks a crust of compacted frost-dust; beneath it, darker grains absorb the red light like they’re saving it for later.
        CernunnosSrfLandedTemperateLowlands* = #GEPscience_bd_soilScoop_CernunnosSrfLandedTemperateLowlands_00 // Fine silt billows up and settles in stages, as if even the dust needs time to decide where it belongs.
        CernunnosSrfLandedTropicalMidlands* = #GEPscience_bd_soilScoop_CernunnosSrfLandedTropicalMidlands_00 // The exposed layer is granular and dry, with tiny sparkling flecks that vanish as soon as they warm inside the container.
        CernunnosSrfLandedTemperateMidlands* = #GEPscience_bd_soilScoop_CernunnosSrfLandedTemperateMidlands_00 // You uncover a laminated mix of pale and dark grains—quiet evidence of cycles that take longer than the communications delay.
        CernunnosSrfLandedHighlands* = #GEPscience_bd_soilScoop_CernunnosSrfLandedHighlands_00 // The scoop mostly retrieves angular rubble; the landscape here feels carved by cold fractures rather than any friendly kind of erosion.
        CernunnosSrfLandedSouthPolarHills* = #GEPscience_bd_soilScoop_CernunnosSrfLandedSouthPolarHills_00 // A windless drift of powder slides back into your trench, like the hill is politely undoing your science.
        CernunnosSrfLandedNorthPole* = #GEPscience_bd_soilScoop_CernunnosSrfLandedNorthPole_00 // The arm bites into hard, dusty ice layers; the fresh cut looks almost black in the dim red daylight, and nobody back home agrees on why.
    }
}