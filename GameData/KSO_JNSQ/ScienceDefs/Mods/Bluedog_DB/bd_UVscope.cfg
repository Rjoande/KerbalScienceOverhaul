@EXPERIMENT_DEFINITION:HAS[#id[bd_UVscope]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_bd_UVscope_SunInSpaceLow_00 // The UV scope tries to photograph distant targets, but Kerbol keeps photobombing the detector through every possible crack.
        SunInSpaceLow* = #JNSQscience_bd_UVscope_SunInSpaceLow_01 // With aggressive baffling and very short exposures, you still tease out UV line features from hot young stars far beyond the system.
        SunInSpaceHigh* = #JNSQscience_bd_UVscope_SunInSpaceHigh_00 // With the Sun safely off to the side, you take an absurdly long UV exposure of deep space. The darkness is not empty; it’s just shy.
        SunInSpaceHigh* = #JNSQscience_bd_UVscope_SunInSpaceHigh_01 // From interplanetary space, the UV sky finally goes quiet enough to stack long exposures and map faint ultraviolet background structure.
        SunInSpaceHigh* = #JNSQscience_bd_UVscope_SunInSpaceHigh_02 // A cool star’s spectrum shows an extra UV bump and sharp lines; something hot and compact is probably orbiting it.

        MohoInSpaceLow* = #JNSQscience_bd_UVscope_MohoInSpaceLow_00 // You use Moho as a convenient glare shield and take UV spectra during eclipse; interstellar gas leaves thin, telltale absorption notches.
        MohoInSpaceLow* = #JNSQscience_bd_UVscope_MohoInSpaceLow_01 // Even pointed away from Kerbol, the UV background is fierce here; calibration notes include the phrase “everything is crispy.”
        MohoInSpaceHigh* = #JNSQscience_bd_UVscope_MohoInSpaceHigh_00 // Long integrations reveal patchy UV extinction across a distant starfield, hinting at thin clouds of material between here and there.
        MohoInSpaceHigh* = #JNSQscience_bd_UVscope_MohoInSpaceHigh_01 // The scope resolves ultraviolet structure in a far-off galaxy’s bright regions, suggesting very hot, very young stellar populations.
        MohoInSpaceHigh* = #JNSQscience_bd_UVscope_MohoInSpaceHigh_02 // You use Moho’s orbit as a stable platform for UV astronomy. The images come back crisp, and slightly toasted.

        EveInSpaceLow* = #JNSQscience_bd_UVscope_EveInSpaceLow_00 // Eve’s bright clouds scatter enough stray UV to make the sky look “milky”; you compensate and still recover strong emission lines from a remote nebular patch.
        EveInSpaceLow* = #JNSQscience_bd_UVscope_EveInSpaceLow_01 // A target star’s UV spectrum is intermittently shaved down during an occultation; someone on the science team starts shouting about density and temperature profiles.
        EveInSpaceHigh* = #JNSQscience_bd_UVscope_EveInSpaceHigh_00 // From high orbit, long nightside passes let you survey distant galaxies in UV and flag oddly hot cores for follow-up.
        EveInSpaceHigh* = #JNSQscience_bd_UVscope_EveInSpaceHigh_01 // The spectrum of a calm-looking star shows a suspicious far-UV excess; a hidden hot companion is the best (and most dramatic) explanation.

        GillyInSpaceLow* = #JNSQscience_bd_UVscope_GillyInSpaceLow_00 // The low gravity makes gentle station-keeping easy; you stack exposures until faint UV filaments of interstellar material emerge from the noise.
        GillyInSpaceLow* = #JNSQscience_bd_UVscope_GillyInSpaceLow_01 // Using Eve’s shadow as a darkroom, you measure crisp ultraviolet line ratios that pin down gas temperature without even pretending it’s “just a pretty picture.”
        GillyInSpaceHigh* = #JNSQscience_bd_UVscope_GillyInSpaceHigh_00 // Away from local glare, the UV scope builds a wide-field atlas of hot stars and the thin stuff between them, one slow orbit at a time.
        GillyInSpaceHigh* = #JNSQscience_bd_UVscope_GillyInSpaceHigh_01 // A cool star’s spectrum keeps flickering in the ultraviolet; the data fit best if a small, very hot companion is whipping around it.
        GillyInSpaceHigh* = #JNSQscience_bd_UVscope_GillyInSpaceHigh_02 // From high over Gilly, you stop pretending this is about Gilly and start a UV deep-sky sweep. The little rock makes a great tripod.
        GillyInSpaceHigh* = #JNSQscience_bd_UVscope_GillyInSpaceHigh_03 // Long-exposure UV imaging picks up faint streaks from drifting dust and a lot of hot pixels from your own equipment. Space is noisy when you can’t blink.

        MunInSpaceLow* = #JNSQscience_bd_UVscope_MunInSpaceLow_00 // You try a deep UV exposure, but the Mun keeps flaring in the baffles like a pale flashlight with an attitude.
        MunInSpaceLow* = #JNSQscience_bd_UVscope_MunInSpaceLow_01 // Brief UV spectra of a hot star show sharp absorption notches; there’s thin stuff between here and there, even if it’s mostly “nothing.”
        MunInSpaceHigh* = #JNSQscience_bd_UVscope_MunInSpaceHigh_00 // Farther out, Kerbin’s glare falls away and the UV scope finally behaves like an observatory instead of a smoke detector.
        MunInSpaceHigh* = #JNSQscience_bd_UVscope_MunInSpaceHigh_01 // A quiet-looking star shows an unexpected ultraviolet excess; the data whisper “hidden hot companion” and shout “write a paper.”
        MunInSpaceHigh* = #JNSQscience_bd_UVscope_MunInSpaceHigh_02 // From high Munar orbit, you use the grey ball as a sunshade and let the UV telescope stare outward. The “empty” sky returns full of faint structure.

        MinmusInSpaceLow* = #JNSQscience_bd_UVscope_MinmusInSpaceLow_00 // Minmus looks faintly green below you; the UV scope politely refuses to comment and returns a clean spectrum anyway.
        MinmusInSpaceLow* = #JNSQscience_bd_UVscope_MinmusInSpaceLow_01 // During a long coast, you stack UV frames until faint filaments appear—delicate structures only visible in the energetic bands.
        MinmusInSpaceHigh* = #JNSQscience_bd_UVscope_MinmusInSpaceHigh_00 // With less stray light, you run a wide UV survey for hot stars and the thin material between them.
        MinmusInSpaceHigh* = #JNSQscience_bd_UVscope_MinmusInSpaceHigh_01 // A distant galaxy’s UV-bright regions stand out like fresh welds, hinting at very young, very hot stellar populations.
        MinmusInSpaceHigh* = #JNSQscience_bd_UVscope_MinmusInSpaceHigh_02 // High over Minmus, you run long UV exposures while the moon drifts lazily below. The stars come back violet and strangely busy.

        DunaInSpaceLow* = #JNSQscience_bd_UVscope_DunaInSpaceLow_00 // Duna’s warm hues don’t help your UV background, but the scope still teases out emission lines from a faraway energetic region.
        DunaInSpaceLow* = #JNSQscience_bd_UVscope_DunaInSpaceLow_01 // A target star’s UV lines wobble and brighten in a pattern that strongly suggests it isn’t alone.
        DunaInSpaceHigh* = #JNSQscience_bd_UVscope_DunaInSpaceHigh_00 // Long nightside passes let you build a proper ultraviolet deep field, far from the worst of local glare.
        DunaInSpaceHigh* = #JNSQscience_bd_UVscope_DunaInSpaceHigh_01 // Ratios between ultraviolet lines pin down gas temperature and density so neatly it feels like cheating.

        IkeInSpaceLow* = #JNSQscience_bd_UVscope_IkeInSpaceLow_00 // Ike looks suspiciously familiar below; you spend an entire orbit wondering if the universe is reusing assets.
        IkeInSpaceLow* = #JNSQscience_bd_UVscope_IkeInSpaceLow_01 // You catch a clean UV spectrum during an occultation; the resulting line shapes look like a textbook that finally likes you back.
        IkeInSpaceHigh* = #JNSQscience_bd_UVscope_IkeInSpaceHigh_00 // Away from Duna’s shine, the UV sky gets darker and your “distant objects” stop being “distant smudges.”
        IkeInSpaceHigh* = #JNSQscience_bd_UVscope_IkeInSpaceHigh_01 // A cool star’s spectrum contains a stubborn far-UV bump; the simplest explanation is a small, very hot companion.
        IkeInSpaceHigh* = #JNSQscience_bd_UVscope_IkeInSpaceHigh_02 // From high orbit, you use Ike as a stable platform for UV astronomy.

        EdnaInSpaceLow* = #JNSQscience_bd_UVscope_EdnaInSpaceLow_00 // Edna is dim and round and wonderfully unhelpful as a light source—perfect for ultraviolet astronomy.
        EdnaInSpaceLow* = #JNSQscience_bd_UVscope_EdnaInSpaceLow_01 // You time a distant star slipping behind Edna and back out; the UV dip is crisp enough to make occultation fans cheer.
        EdnaInSpaceHigh* = #JNSQscience_bd_UVscope_EdnaInSpaceHigh_00 // In the quiet above Edna, the UV scope maps faint background structure with long, patient integrations.
        EdnaInSpaceHigh* = #JNSQscience_bd_UVscope_EdnaInSpaceHigh_01 // Thin absorption lines pepper the spectrum of a bright target, outlining interstellar material you can’t see any other way.
        EdnaInSpaceHigh* = #JNSQscience_bd_UVscope_EdnaInSpaceHigh_02 // With Edna as a convenient light-blocker, the telescope sweeps the belt in ultraviolet. Tiny specks flash and vanish like nervous particles.

        DakInSpaceLow* = #JNSQscience_bd_UVscope_DakInSpaceLow_00 // Dak’s potato silhouette makes an excellent glare shield; you hide behind it and pretend this was the plan all along.
        DakInSpaceLow* = #JNSQscience_bd_UVscope_DakInSpaceLow_01 // The UV scope detects energetic features from a distant source and immediately asks for “more time” in the most demanding way possible.
        DakInSpaceHigh* = #JNSQscience_bd_UVscope_DakInSpaceHigh_00 // With nothing but cold black sky around, even the faintest UV structures start to separate from the noise.
        DakInSpaceHigh* = #JNSQscience_bd_UVscope_DakInSpaceHigh_01 // A star that looks ordinary in visible light turns dramatic in UV—strong evidence of a hot companion in close orbit.

        DresInSpaceLow* = #JNSQscience_bd_UVscope_DresInSpaceLow_00 // Dres offers a dark backdrop in the asteroid belt; the UV scope finally gets to do astronomy instead of damage control.
        DresInSpaceLow* = #JNSQscience_bd_UVscope_DresInSpaceLow_01 // You collect ultraviolet line spectra from multiple targets and infer temperatures that sound unreasonably hot, yet stubbornly consistent.
        DresInSpaceHigh* = #JNSQscience_bd_UVscope_DresInSpaceHigh_00 // High above lonely Dres, you stitch together a UV atlas of hot stars and the thin medium between them.
        DresInSpaceHigh* = #JNSQscience_bd_UVscope_DresInSpaceHigh_01 // A distant galaxy’s UV profile suggests rapid evolution: bright young regions now, quieter remnants later—time written in wavelengths.
        DresInSpaceHigh* = #JNSQscience_bd_UVscope_DresInSpaceHigh_02 // High over Dres, you use the dwarf planet as a stable platform for UV astronomy. The sky comes back busy, faint, and full of things nobody budgeted for.
        DresInSpaceHigh* = #JNSQscience_bd_UVscope_DresInSpaceHigh_03 // You run a UV survey while Dres slowly eclipses the starfield. The data is clean enough to make you suspicious of what you missed last time.

        JoolInSpaceLow* = #JNSQscience_bd_UVscope_JoolInSpaceLow_00 // The UV scope keeps trying to image distant targets, but Jool’s bright upper haze and constant auroral flicker keep sneaking into the frames.
        JoolInSpaceLow* = #JNSQscience_bd_UVscope_JoolInSpaceLow_01 // Between radiation hits and glare, you still pull out sharp UV absorption notches that map thin interstellar material along the line of sight.
        JoolInSpaceHigh* = #JNSQscience_bd_UVscope_JoolInSpaceHigh_00 // Far above Jool’s glow, long UV exposures finally behave; faint background structure starts to appear where there used to be only noise.
        JoolInSpaceHigh* = #JNSQscience_bd_UVscope_JoolInSpaceHigh_01 // A calm-looking star shows an unexpected far-UV bump—strong evidence of a hot companion hiding next to a cooler primary.

        LaytheInSpaceLow* = #JNSQscience_bd_UVscope_LaytheInSpaceLow_00 // Laythe’s bright clouds and ocean glints make the UV scope sulk, but it manages a usable spectrum when you point away from the glare.
        LaytheInSpaceLow* = #JNSQscience_bd_UVscope_LaytheInSpaceLow_01 // Ultraviolet line ratios from a distant emission source pin down gas temperature and density with unsettling confidence.
        LaytheInSpaceHigh* = #JNSQscience_bd_UVscope_LaytheInSpaceHigh_00 // From high orbit, you run a UV survey of distant galaxies; the brightest regions look violently young and energetic.
        LaytheInSpaceHigh* = #JNSQscience_bd_UVscope_LaytheInSpaceHigh_01 // A target’s UV signature rises and falls periodically, matching the idea of a small, very hot companion in a tight orbit.

        VallInSpaceLow* = #JNSQscience_bd_UVscope_VallInSpaceLow_00 // Vall is a perfect dark shield; you take UV images during an occultation and watch background starlight get “filtered” by nothing at all.
        VallInSpaceLow* = #JNSQscience_bd_UVscope_VallInSpaceLow_01 // The spectrum returns razor-thin absorption features—interstellar material so sparse it’s basically a rumor, but the scope heard it.
        VallInSpaceHigh* = #JNSQscience_bd_UVscope_VallInSpaceHigh_00 // High above Vall, the sky gets properly black and the UV scope starts resolving faint filaments between distant stars.
        VallInSpaceHigh* = #JNSQscience_bd_UVscope_VallInSpaceHigh_01 // A distant galaxy’s UV profile suggests bursts of hot, short-lived stars—evolution written in energetic wavelengths.
        VallInSpaceHigh* = #JNSQscience_bd_UVscope_VallInSpaceHigh_02 // High over Vall, you use the moon as a dark shield and stare outward in UV. The starfield comes back crowded with faint, nervous smudges.

        TyloInSpaceLow* = #JNSQscience_bd_UVscope_TyloInSpaceLow_00 // Tylo’s big, bright disk is excellent for blocking stray light; your best UV data comes from hiding behind it like a cowardly scientist.
        TyloInSpaceLow* = #JNSQscience_bd_UVscope_TyloInSpaceLow_01 // You catch a clean UV spectrum mid-occlusion and the line shapes neatly constrain temperature and density along the path.
        TyloInSpaceHigh* = #JNSQscience_bd_UVscope_TyloInSpaceHigh_00 // Away from Tylo’s reflected light, you stack UV frames until the background stops looking empty and starts looking structured.
        TyloInSpaceHigh* = #JNSQscience_bd_UVscope_TyloInSpaceHigh_01 // A cool star’s spectrum refuses to stay cool in UV; the extra energy points to a hot companion doing its best to stay unseen.
        TyloInSpaceHigh* = #JNSQscience_bd_UVscope_TyloInSpaceHigh_02 // From high orbit, Tylo becomes a steady platform for UV astronomy. The data is clean, the moon is massive, and you suddenly appreciate stable things.

        BopInSpaceLow* = #JNSQscience_bd_UVscope_BopInSpaceLow_00 // Bop’s lumpy horizon drifts through the field; it makes a surprisingly effective baffle for deep UV exposures.
        BopInSpaceLow* = #JNSQscience_bd_UVscope_BopInSpaceLow_01 // The UV scope finds emission lines from a distant energetic region and immediately demands more integration time, as usual.
        BopInSpaceHigh* = #JNSQscience_bd_UVscope_BopInSpaceHigh_00 // From high above Bop, you build a quiet UV atlas of hot stars and the thin stuff between them.
        BopInSpaceHigh* = #JNSQscience_bd_UVscope_BopInSpaceHigh_01 // Subtle UV dimming across a starfield hints at patchy interstellar clouds—tiny, cold shadows in a very hot band.
        BopInSpaceHigh* = #JNSQscience_bd_UVscope_BopInSpaceHigh_02 // High above Bop, you run long UV exposures while the moon tumbles below. The result is part survey, part accidental modern art.

        PolInSpaceLow* = #JNSQscience_bd_UVscope_PolInSpaceLow_00 // Pol’s odd shape keeps interrupting your tracking solution, but the UV scope still manages a crisp spectrum when it settles down.
        PolInSpaceLow* = #JNSQscience_bd_UVscope_PolInSpaceLow_01 // A target star shows periodic UV brightening; the simplest story is “binary system,” and the data keeps repeating it.
        PolInSpaceHigh* = #JNSQscience_bd_UVscope_PolInSpaceHigh_00 // High over Pol, the UV sky is calm enough to chase the faintest features without local reflections ruining everything.
        PolInSpaceHigh* = #JNSQscience_bd_UVscope_PolInSpaceHigh_01 // You identify a compact, hot source hiding beside a cooler star purely from the ultraviolet excess; the visible-light team looks offended.
        PolInSpaceHigh* = #JNSQscience_bd_UVscope_PolInSpaceHigh_02 // From high over Pol, you stare outward in ultraviolet and get a sky full of faint structure. Deep space is apparently not done being weird today.

        LindorInSpaceLow* = #JNSQscience_bd_UVscope_LindorInSpaceLow_00 // Lindor’s pale glow keeps sneaking into the optics; the UV scope insists it’s doing astronomy “despite the giant.”
        LindorInSpaceLow* = #JNSQscience_bd_UVscope_LindorInSpaceLow_01 // You still pull clean ultraviolet absorption notches from a hot star, sketching the thin interstellar medium like pencil marks on black paper.
        LindorInSpaceHigh* = #JNSQscience_bd_UVscope_LindorInSpaceHigh_00 // Far above Lindor, the background finally stays dark long enough for deep UV stacks to work properly.
        LindorInSpaceHigh* = #JNSQscience_bd_UVscope_LindorInSpaceHigh_01 // A cool-looking star shows a stubborn far-UV excess; the best explanation is a hidden hot companion trying very hard to be noticed.

        KrelInSpaceLow* = #JNSQscience_bd_UVscope_KrelInSpaceLow_00 // Krel’s close-in orbit makes Lindor a constant glare problem; you learn the true meaning of “baffling.”
        KrelInSpaceLow* = #JNSQscience_bd_UVscope_KrelInSpaceLow_01 // Between the stray light spikes, ultraviolet line ratios from a distant source pin down gas temperature and density with rude precision.
        KrelInSpaceHigh* = #JNSQscience_bd_UVscope_KrelInSpaceHigh_00 // Higher up, Krel becomes a handy little shield and the UV scope stops complaining for almost an entire minute.
        KrelInSpaceHigh* = #JNSQscience_bd_UVscope_KrelInSpaceHigh_01 // A distant galaxy’s UV-bright knots stand out sharply, hinting at short-lived, very hot stars driving its recent evolution.

        AdenInSpaceLow* = #JNSQscience_bd_UVscope_AdenInSpaceLow_00 // Aden’s brown disk drifts through the field like a smudge on the lens; thankfully, the smudge is predictable.
        AdenInSpaceLow* = #JNSQscience_bd_UVscope_AdenInSpaceLow_01 // You catch crisp UV absorption features that map sparse material between you and the target, proving “empty space” is never actually empty.
        AdenInSpaceHigh* = #JNSQscience_bd_UVscope_AdenInSpaceHigh_00 // From higher orbit, the UV scope settles into a patient survey of hot stars and faint background structure.
        AdenInSpaceHigh* = #JNSQscience_bd_UVscope_AdenInSpaceHigh_01 // A star that looks calm in visible light turns dramatic in UV; the spectrum strongly suggests a compact, hot companion in orbit.

        HuygenInSpaceLow* = #JNSQscience_bd_UVscope_HuygenInSpaceLow_00 // Huygen’s amber haze throws a faint ultraviolet glow into the optics, like someone left a nightlight on in the observatory.
        HuygenInSpaceLow* = #JNSQscience_bd_UVscope_HuygenInSpaceLow_01 // You time a long exposure during occultation and extract clean UV lines anyway, turning “glare” into “data” through stubbornness.
        HuygenInSpaceHigh* = #JNSQscience_bd_UVscope_HuygenInSpaceHigh_00 // Above the worst of the scattered light, the UV sky becomes usable and your targets stop looking like static.
        HuygenInSpaceHigh* = #JNSQscience_bd_UVscope_HuygenInSpaceHigh_01 // The ultraviolet spectrum of a distant object shows strong high-energy features that point to very hot, very young stars dominating the light.

        RigaInSpaceLow* = #JNSQscience_bd_UVscope_RigaInSpaceLow_00 // Riga’s size makes it excellent at blocking stray light; you hide behind it and call it “observational strategy.”
        RigaInSpaceLow* = #JNSQscience_bd_UVscope_RigaInSpaceLow_01 // Ultraviolet emission and absorption features line up into a tidy story: composition, density, and temperature—neatly labeled by physics itself.
        RigaInSpaceHigh* = #JNSQscience_bd_UVscope_RigaInSpaceHigh_00 // In higher orbit, you build a UV atlas of distant galaxies and mark suspiciously bright regions for later arguments.
        RigaInSpaceHigh* = #JNSQscience_bd_UVscope_RigaInSpaceHigh_01 // A periodic UV brightening in a target system fits best with a hot companion whipping around a cooler star, like it’s showing off.

        TalosInSpaceLow* = #JNSQscience_bd_UVscope_TalosInSpaceLow_00 // Talos offers very little reflected light and even less drama; the UV scope is delighted by the lack of “features.”
        TalosInSpaceLow* = #JNSQscience_bd_UVscope_TalosInSpaceLow_01 // Long integrations reveal faint ultraviolet filaments between stars—thin structure in the interstellar medium that visible light barely hints at.
        TalosInSpaceHigh* = #JNSQscience_bd_UVscope_TalosInSpaceHigh_00 // High above Talos, the background stays dark and steady, letting the UV scope chase the faintest signals without local interference.
        TalosInSpaceHigh* = #JNSQscience_bd_UVscope_TalosInSpaceHigh_01 // A cool star’s spectrum refuses to stay cool in ultraviolet; the extra UV points straight at a hidden hot companion and an awkward conversation.

        EelooInSpaceLow* = #JNSQscience_bd_UVscope_EelooInSpaceLow_00 // Eeloo turns the sky into a deep-freeze darkroom; faint UV absorption notches sketch the thin interstellar medium in front of your target.
        EelooInSpaceLow* = #JNSQscience_bd_UVscope_EelooInSpaceLow_01 // The UV scope stacks exposures until “empty” space develops structure—wispy ultraviolet filaments between distant stars.
        EelooInSpaceHigh* = #JNSQscience_bd_UVscope_EelooInSpaceHigh_00 // Far above Eeloo, the UV background is calm enough to run a proper deep field and pick out UV-bright knots in distant galaxies.
        EelooInSpaceHigh* = #JNSQscience_bd_UVscope_EelooInSpaceHigh_01 // A cool star’s spectrum shows a stubborn far-UV excess; the numbers strongly favor a hidden hot companion.
        EelooInSpaceHigh* = #JNSQscience_bd_UVscope_EelooInSpaceHigh_02 // You use Eeloo as a handy light blocker and stare into deep space. The results are crisp, quiet, and slightly unsettling.

        CelesInSpaceLow* = #JNSQscience_bd_UVscope_CelesInSpaceLow_00 // You hide the telescope behind Celes to dodge glare and pull clean UV line ratios that nail temperature and density along the sightline.
        CelesInSpaceLow* = #JNSQscience_bd_UVscope_CelesInSpaceLow_01 // Celes proves that being “almost a dwarf planet” is still good enough to be an excellent baffle for ultraviolet astronomy.
        CelesInSpaceHigh* = #JNSQscience_bd_UVscope_CelesInSpaceHigh_00 // From high orbit, long integrations reveal patchy UV dimming across a starfield—thin clouds of material you’d never notice in visible light.
        CelesInSpaceHigh* = #JNSQscience_bd_UVscope_CelesInSpaceHigh_01 // A distant galaxy’s UV profile suggests bursts of very hot, short-lived stars driving its recent evolution.
        CelesInSpaceHigh* = #JNSQscience_bd_UVscope_CelesInSpaceHigh_02 // From high orbit, Celes becomes a steady little platform for UV astronomy. The stars come back sharp enough to make you distrust your old data.

        TamInSpaceLow* = #JNSQscience_bd_UVscope_TamInSpaceLow_00 // Tam’s lumpy silhouette drifts through the field and accidentally becomes the best stray-light shield you’ve ever had.
        TamInSpaceLow* = #JNSQscience_bd_UVscope_TamInSpaceLow_01 // You collect a crisp UV spectrum and watch narrow absorption features line up like “notches” in the universe’s belt.
        TamInSpaceHigh* = #JNSQscience_bd_UVscope_TamInSpaceHigh_00 // High above Tam, the UV scope finally behaves and resolves faint ultraviolet background structure after enough patient stacking.
        TamInSpaceHigh* = #JNSQscience_bd_UVscope_TamInSpaceHigh_01 // A target system’s UV brightness pulses periodically; the simplest explanation is a hot companion orbiting a cooler star.
        TamInSpaceHigh* = #JNSQscience_bd_UVscope_TamInSpaceHigh_02 // You take long UV exposures while Tam drifts below like a badly-behaved pebble. The images are half science, half accidental art.

        HamekInSpaceLow* = #JNSQscience_bd_UVscope_HamekInSpaceLow_00 // Hamek’s odd coloring makes the visible cameras argue, but the UV scope just quietly returns excellent line spectra.
        HamekInSpaceLow* = #JNSQscience_bd_UVscope_HamekInSpaceLow_01 // Ultraviolet emission features from a distant energetic region let you back out composition and density without even touching the object.
        HamekInSpaceHigh* = #JNSQscience_bd_UVscope_HamekInSpaceHigh_00 // From high orbit, you survey UV-bright regions in distant galaxies and flag suspiciously hot cores for follow-up.
        HamekInSpaceHigh* = #JNSQscience_bd_UVscope_HamekInSpaceHigh_01 // The UV scope finds strong high-energy signatures where visible light looks calm—hot young stars leaving unmistakable fingerprints.
        HamekInSpaceHigh* = #JNSQscience_bd_UVscope_HamekInSpaceHigh_02 // High over Hamek, the UV sky stays dark and clean. Perfect conditions for staring into the void until it stares back.

        NaraInSpaceLow* = #JNSQscience_bd_UVscope_NaraInSpaceLow_00 // Nara’s presence is blamed for “stirring things up,” so you point the UV scope outward to hunt for hot companions in distant systems.
        NaraInSpaceLow* = #JNSQscience_bd_UVscope_NaraInSpaceLow_01 // Clean ultraviolet line ratios turn a faint target into a spreadsheet of temperatures, densities, and very confident scientists.
        NaraInSpaceHigh* = #JNSQscience_bd_UVscope_NaraInSpaceHigh_00 // From high orbit, you build a wide UV atlas and spot regions that suggest rapid stellar birth—and equally rapid burnout.
        NaraInSpaceHigh* = #JNSQscience_bd_UVscope_NaraInSpaceHigh_01 // A cool star refuses to stay cool in UV; the excess light fits best with a compact, hot companion in close orbit.

        AmosInSpaceLow* = #JNSQscience_bd_UVscope_AmosInSpaceLow_00 // Amos shares Nara’s shadows; the UV scope appreciates the darkness and pulls razor-thin absorption lines out of the background.
        AmosInSpaceLow* = #JNSQscience_bd_UVscope_AmosInSpaceLow_01 // You catch an occultation and the UV dip is so crisp it feels like the universe is turning pages for you.
        AmosInSpaceHigh* = #JNSQscience_bd_UVscope_AmosInSpaceHigh_00 // High above Amos, long exposures reveal faint UV filaments between stars—structure in the “nothing” that isn’t nothing.
        AmosInSpaceHigh* = #JNSQscience_bd_UVscope_AmosInSpaceHigh_01 // A target’s ultraviolet signature flickers in a repeating pattern; the best story is a hot companion doing laps around a cooler primary.
        AmosInSpaceHigh* = #JNSQscience_bd_UVscope_AmosInSpaceHigh_02 // With Amos as a tiny occulting disk, you run a UV starfield sweep. The background comes back crowded with faint smudges.

        EnonInSpaceLow* = #JNSQscience_bd_UVscope_EnonInSpaceLow_00 // Enon looks like “another ice moon” until the UV scope shows how much interstellar material sits between you and your target.
        EnonInSpaceLow* = #JNSQscience_bd_UVscope_EnonInSpaceLow_01 // A distant source’s ultraviolet lines lock into ratios that pin down gas temperature so neatly it feels unfair.
        EnonInSpaceHigh* = #JNSQscience_bd_UVscope_EnonInSpaceHigh_00 // From high orbit, you chart UV-bright star-forming patches in distant galaxies and watch evolution happen in energetic wavelengths.
        EnonInSpaceHigh* = #JNSQscience_bd_UVscope_EnonInSpaceHigh_01 // A visible-quiet star shows a strong far-UV bump; the data point straight at an unseen hot companion.
        EnonInSpaceHigh* = #JNSQscience_bd_UVscope_EnonInSpaceHigh_02 // You use Enon as a steady platform for ultraviolet astronomy. The stars come back crisp enough to make older data look embarrassed.

        PraxInSpaceLow* = #JNSQscience_bd_UVscope_PraxInSpaceLow_00 // Prax is a fringe world with fringe lighting—meaning almost none—so the UV scope finally gets to do its job properly.
        PraxInSpaceLow* = #JNSQscience_bd_UVscope_PraxInSpaceLow_01 // You stack UV frames until faint background structure appears, revealing subtle ultraviolet shading from sparse material along the way.
        PraxInSpaceHigh* = #JNSQscience_bd_UVscope_PraxInSpaceHigh_00 // High above Prax, the sky stays steady enough for deep UV surveys of hot stars and the thin medium between them.
        PraxInSpaceHigh* = #JNSQscience_bd_UVscope_PraxInSpaceHigh_01 // Periodic UV brightening in a target system matches the signature of a hot companion orbiting a cooler star, whether it admits it or not.
        PraxInSpaceHigh* = #JNSQscience_bd_UVscope_PraxInSpaceHigh_02 // High over Prax, you stare outward in UV and get a sky full of faint structure. Deep space is apparently not finished being complicated.
        PraxInSpaceHigh* = #JNSQscience_bd_UVscope_PraxInSpaceHigh_03 // Prax drifts below like a distant crumb while the UV spectrometer stacks long exposures. The noise floor drops, and the universe gets louder.
    }
}