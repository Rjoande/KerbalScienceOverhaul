    %RESULTS
    {
        EveInSpaceLow* = #CinematicPack_Expanse_bd_microwaveSpec_EveInSpaceLow_00 // The microwave spectrum shows a sharp patch of freshly scoured surface, too “clean” to be natural for long on Eve. Someone asks if you logged any unplanned “deliveries.”
        EveInSpaceLow* = #CinematicPack_Expanse_bd_microwaveSpec_EveInSpaceLow_01 // A narrow-band echo comes back stronger than it should, like a new field of debris is still tumbling through the soup below. You file it under “impact… or disposal.”
    }
