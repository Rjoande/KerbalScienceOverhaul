        #CSS_evaReport_EveSrfSplashedPoles_00 = You pour some water from a bottle in your pocket onto the surface, and it forms a steaming sheen on top.
        #CSS_evaReport_EveSrfSplashedExplodiumSea_00 = You realize swimming in a spacesuit is harder than you thought. You regret the decision of leaving the ship.
        #CSS_evaReport_EveSrfSplashedExplodiumSea_01 = The liquid is stripping the colour off your spacesuit alarmingly quickly.
        #CSS_evaReport_EveSrfSplashedLowlands_00 = The sea is hot. Very hot. You want to get out of it now.
        #CSS_evaReport_EveSrfSplashedImpactEjecta_00 = The crater walls curve out of sight around the ocean you find yourself floating in.
        #CSS_evaReport_EveSrfSplashedCraterLake_00 = You hope dearly that your suit has been properly sealed and corrosion-proofed.
        #CSS_evaReport_EveSrfSplashedCraterLake_01 = The extremely dense liquid is hard to get your hands and legs into to swim with.
        #CSS_evaReport_EveSrfSplashedWesternSea_00 = You have the idea to use your suit to dive with. You can only just get your head below the surface, and you can't see anything.
        #CSS_evaReport_EveSrfSplashedWesternSea_01 = The "water" is thick and soupy. It drips in large blobs off your hand.
        #CSS_evaReport_EveSrfSplashedEasternSea_00 = Whose idea was it to make these helmets so large? You can't even look down.
        #CSS_evaReport_EveSrfSplashedEasternSea_01 = You had a dream like this once. Unlike the dream, however, this isn't grape soda, and robot dolphins are not swimming in it.
        #CSS_evaReport_EveSrfSplashedShallows_00 = Mission Control assures you that there are definitely no monsters in the sea.
        #CSS_evaReport_EveSrfSplashedShallows_01 = You try and light the explodium on fire, forgetting you're currently swimming in it. Fortunately, there's no oxygen to allow it to ignite.
        #CSS_evaReport_EveFlyingLowPoles_00 = If this place is hell, you feel like an infernal Santa Klaus, flying through the hot polar air.
        #CSS_evaReport_EveFlyingLowPoles_01 = The temperatures are slightly less burning at these latitudes, and the rushing air makes it slightly cooler still.
        #CSS_evaReport_EveFlyingLowMidlands_00 = You wonder, supposing you let go, if the atmosphere is thick enough to allow you to fall gently to the ground like a feather.
        #CSS_evaReport_EveFlyingLowMidlands_01 = You'd say it looks boring, but in a place like Eve, nothing is ever boring.
        #CSS_evaReport_EveFlyingLowExplodiumSea_00 = You start to think that it's entirely possible to swim in this atmosphere as well as the oceans.
        #CSS_evaReport_EveFlyingLowExplodiumSea_01 = The dense not-water probably wouldn't break your fall if you needed it to. Hopefully you won't.
        #CSS_evaReport_EveFlyingLowLowlands_00 = The atmosphere is so thick you have a sneaking suspicion it may be made out of some kind of soup. Well, it wouldn't hurt to taste it... right?
        #CSS_evaReport_EveFlyingLowLowlands_01 = Flying in the thickest parts of the atmosphere is hard, with the very air opposing your progress.
        #CSS_evaReport_EveFlyingLowHighlands_00 = The purple behemoth dares you to slip.
        #CSS_evaReport_EveFlyingLowHighlands_01 = The mountains are the surface's way of spitting defiance in the face of the crushing atmosphere and gravity. Be more mountain.
        #CSS_evaReport_EveFlyingLowPeaks_00 = "I will not give up, I will not give in! I will land boots down, I will stand again."
        #CSS_evaReport_EveFlyingLowPeaks_01 = Spiky peaks rise from the surface, as if trying to snag you in midair.
        #CSS_evaReport_EveFlyingLowImpactEjecta_00 = "Nuts."
        #CSS_evaReport_EveFlyingLowImpactEjecta_01 = The miles of impact debris must only for a small part of the crater.
        #CSS_evaReport_EveFlyingLowCraterLake_00 = The thick atmosphere makes it difficult to move around. You swear that if not for the high gravity, you could hover a bit just by flapping your arms.
        #CSS_evaReport_EveFlyingLowCraterLake_01 = You wonder how far down the shimmering liquid filling the impact basin goes.
        #CSS_evaReport_EveFlyingLowWesternSea_00 = You're more concerned with the climate control warning light that just appeared.
        #CSS_evaReport_EveFlyingLowWesternSea_01 = You would rather not end up in the drink, thank you very much.
        #CSS_evaReport_EveFlyingLowOlympus_00 = You're not sure you needed to be flying for this. You could just have climbed a bit higher up the mountain.
        #CSS_evaReport_EveFlyingLowOlympus_01 = The view from the ground was amazing and this one's even better.
        #CSS_evaReport_EveFlyingLowEasternSea_00 = What's that floating down there? It better not be piece of the ship.
        #CSS_evaReport_EveFlyingLowEasternSea_01 = When you were sent to Eve, you didn't anticipate trying not to tumble through the air over a toxic ocean
        #CSS_evaReport_EveFlyingLowFoothills_00 = You feel like your helmet is dissolving. Oh wait... IT IS! Get me back in, now!
        #CSS_evaReport_EveFlyingLowFoothills_01 = The suit starts to feel awful warm. You crank the suit thermostat down another notch.
        #CSS_evaReport_EveFlyingLowShallows_00 = The set of tools you had clipped to your belt fall off and plummet out of sight.
        #CSS_evaReport_EveFlyingLowShallows_01 = You're not sure if you're near or far from the ocean surface. All the purple is playing havoc with your depth perception.
        #CSS_evaReport_EveFlyingHigh_00 = You deliberate whether you'd rather fall on the ground or into that nasty liquid.
        #CSS_evaReport_EveFlyingHigh_01 = Even all the way up here the atmosphere still buffets you around.
        #CSS_evaReport_EveFlyingHigh_02 = You know how dangerous Eve atmospheric entry is, and wish to lodge a formal objection to this highly dangerous course of action.
        #CSS_evaReport_EveInSpaceLowPoles_00 = "I left the stove on!"
        #CSS_evaReport_EveInSpaceLowPoles_01 = Nope. No ice at these poles. Just more purple water and dust.
        #CSS_evaReport_EveInSpaceLowMidlands_00 = If purple is the color of royalty, Eve is certainly regal!
        #CSS_evaReport_EveInSpaceLowMidlands_01 = Some of the rolling hills are large enough to be picked out from orbit.
        #CSS_evaReport_EveInSpaceLowExplodiumSea_00 = "Come on, cosmos! Do your worst!"
        #CSS_evaReport_EveInSpaceLowExplodiumSea_01 = You wonder if you could light the ocean on fire.
        #CSS_evaReport_EveInSpaceLowLowlands_00 = The Lowlands are the closest thing Eve has to some coastal plains.
        #CSS_evaReport_EveInSpaceLowLowlands_01 = Most low-altitude areas are on the east and western shores of the primary ocean.
        #CSS_evaReport_EveInSpaceLowHighlands_00 = You wonder if you will ever be returning home. Probably not.
        #CSS_evaReport_EveInSpaceLowHighlands_01 = Most of Eve's land surface is covered in these low hills.
        #CSS_evaReport_EveInSpaceLowPeaks_00 = These are some proper mountains. You feel proud of them.
        #CSS_evaReport_EveInSpaceLowPeaks_01 = Can we please not land on those big, spiky mountains?
        #CSS_evaReport_EveInSpaceLowImpactEjecta_00 = "It has been an honor."
        #CSS_evaReport_EveInSpaceLowImpactEjecta_01 = You trace the outlines of the craters' ejecta systems to take your mind off the landing.
        #CSS_evaReport_EveInSpaceLowCraterLake_00 = The Crater is double the size of Kerbin's biggest. Everything is bigger on Eve, even the cosmic gunshot scars.
        #CSS_evaReport_EveInSpaceLowCraterLake_01 = The rebound peak in the middle of the lake that fills the basin makes a prominent island in the centre.
        #CSS_evaReport_EveInSpaceLowWesternSea_00 = A thin, elongated, scraggly inland sea carving a slash through the landmass.
        #CSS_evaReport_EveInSpaceLowWesternSea_01 = It doesn't look very impressive, but no doubt it seems much bigger from downstairs.
        #CSS_evaReport_EveInSpaceLowOlympus_00 = The highest peaks on Eve. You're torn between thinking they would make a good landing site for their altitude, or bad for their spikiness.
        #CSS_evaReport_EveInSpaceLowOlympus_01 = You feel like a god, looking down on your domain from the heavens.
        #CSS_evaReport_EveInSpaceLowEasternSea_00 = If you squint, it looks like a stretched trilobite. That's just me, isn't it?
        #CSS_evaReport_EveInSpaceLowEasternSea_01 = The ocean sparkles and shines as light dapples off the water.
        #CSS_evaReport_EveInSpaceLowFoothills_00 = Lumpy land ahoy! Such pretender mountains.
        #CSS_evaReport_EveInSpaceLowFoothills_01 = A burst of noise over comms breaks your concentration and makes you forget the notes you were making.
        #CSS_evaReport_EveInSpaceLowShallows_00 = Those oceans look flammable. You'd like to see the explosion if you dropped a match in.
        #CSS_evaReport_EveInSpaceLowShallows_01 = Those shapes under the surface must be giant sea monsters. Mission Control gives their end of the radio a dope-slap.
        #CSS_evaReport_EveInSpaceHigh_00 = From this position you can clearly make out lakes and oceans of some kind on the surface below.
        #CSS_evaReport_EveInSpaceHigh_01 = Eve looks almost inviting from up here. You, however, know better than to listen to its siren call.
        #CSS_evaReport_EveInSpaceHigh_02 = A vivid green aurora blossoms over Eve's poles. Eve can be beautiful when it wants to be.
        #CSS_evaReport_GillySrfLandedMidlands_00 = You become concerned that the rock you threw away may loop all the way around Gilly and hit you in the back of your head.
