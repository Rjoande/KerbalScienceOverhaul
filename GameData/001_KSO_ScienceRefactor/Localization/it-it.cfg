        #ScienceRefactor_bd_XRayDiffract_BopSrfLandedValley_00 = L'analisi a raggi X di questo campione rivela alcuni composti di carbonio e azoto davvero curiosi. Servono ulteriori studi...
        #ScienceRefactor_bd_XRayDiffract_BopSrfLandedPeaks_00 = Alcuni luminosi silicati ricchi di alluminio sono mescolati ai più comuni minerali scuri di Bop. Vengono rilevate anche poche tracce di molecole organiche complesse, ma saranno sicuramente solo contaminanti provenienti da Kerbin...
        #ScienceRefactor_bd_XRayDiffract_PolSrfLanded_00 = La vivace colorazione di Pol è dovuta a diversi minerali interessanti presenti nella superficie, tra cui i composti di zolfo gesso e pirite, calcite, ossido di ferro e olivina.
        #ScienceRefactor_bd_XRayDiffract_PolSrfLandedHeights_00 = L'analisi dei campioni delle regioni montuose di Pol rivela la presenza di minerali di calcite verde e gialla, insieme a tracce di quarzo.
        #ScienceRefactor_bd_XRayDiffract_PolSrfLandedWastes_00 = L'analisi a raggi X di questo campione rivela la presenza del raro minerale di uranio carnotite, che conferisce alla superficie una brillante colorazione gialla.
        #ScienceRefactor_bd_XRayDiffract_PolSrfLandedDepressions_00 = In questo campione vengono scoperte diverse componenti interessanti, tra cui il minerale fosfatico verde azzurrastro apatite, il silicato ricco di sodio sodalite e i composti di zolfo gesso e pirite.
        #ScienceRefactor_bd_XRayDiffract_PolSrfLandedLowlands_00 = In questo campione vengono scoperte diverse componenti interessanti, tra cui il minerale fosfatico verde azzurrastro apatite, il silicato ricco di sodio sodalite e i composti di zolfo gesso e pirite.
        #ScienceRefactor_bd_XRayDiffract_PolSrfLandedMidlands_00 = L'analisi a raggi X di questo campione rivela la presenza del raro minerale di uranio carnotite, che conferisce alla superficie una brillante colorazione gialla.
        #ScienceRefactor_bd_XRayDiffract_PolSrfLandedHighlands_00 = L'analisi dei campioni delle regioni montuose di Pol rivela la presenza di minerali di calcite verde e gialla, insieme a tracce di quarzo.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLanded_00 = L'analisi della superficie di Eeloo mostra diversi minerali silicati attesi e poi, beh, chissà come qualcosa del genere possa ricoprire l'intero pianeta...
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedScarring_00 = Le cicatrici scure sparse sulla superficie di Eeloo sono composte solo da minerali silicati ricchi di alcali, niente di insolito o inatteso.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedCentralCrater_00 = L'analisi di questo cratere non mostra i segni tipici dei siti d'impatto, come fusione superficiale o la presenza di acqua o metalli pesanti insoliti.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedPromontories_00 = Solo uno strato sottilissimo della sostanza bianca e polverosa ricopre la tipica superficie brunastra di Eeloo. Questo strato dovrebbe essere riportato a casa per... un esame più approfondito.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedAncientDepressions_00 = I campioni di queste regioni basse di Eeloo non mostrano nulla di notevole. Sono per lo più minerali silicati comuni.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedLowlands_00 = Mmm... non può essere giusto. Qualcosa di... strano ricopre quasi tutta la superficie del pianeta. Deve esserci una spiegazione interessante...
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedGlaciers_00 = I campioni di queste regioni basse di Eeloo non mostrano nulla di notevole. Sono per lo più minerali silicati comuni.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedIceCanyons_00 = Le cicatrici scure sparse sulla superficie di Eeloo sono composte solo da minerali silicati ricchi di alcali, niente di insolito o inatteso.
        #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedCraters_00 = L'analisi di questo cratere non mostra i segni tipici dei siti d'impatto, come fusione superficiale o la presenza di acqua o metalli pesanti insoliti.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedStony_00 = L'analisi a raggi X di questo asteroide rivela soprattutto minerali silicati rocciosi, insieme a concentrazioni relativamente alte di olivina.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedStony_01 = Gli strati più esterni della superficie di questo asteroide sono principalmente silicati anidri, insieme ad alcuni composti organici. Gli strati più profondi contengono tracce di minerali idrati, il che suggerisce una maggiore concentrazione di acqua nel sottosuolo.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedStony_02 = Questo asteroide è composto da vari silicati ricchi di ferro e magnesio, che gli conferiscono una superficie relativamente chiara.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedStony_03 = L'analisi di questo asteroide rivela soprattutto silicati rocciosi, con poca presenza di minerali metallici o idrati in superficie.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedCarbonaceous_00 = Nell'analisi di questo asteroide viene rilevata un'abbondanza di polimeri organici volatili, insieme a tracce di magnetite e diversi minerali solfuri.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedCarbonaceous_01 = La miscela di acqua, molecole di carbonio, solfuri e ferro in questo asteroide suggerisce che sia carbonioso.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedCarbonaceous_02 = Questo asteroide roccioso presenta livelli insolitamente alti di diversi minerali ignei.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedComet_00 = Questa cometa è ricca del silicato di magnesio cristallino enstatite, insieme a diversi altri minerali fortemente ridotti. Si ritiene che questi minerali riflettano le condizioni del primo sistema solare.
        #ScienceRefactor_bd_XRayDiffract_Organic_00 = L'analisi a raggi X di questo asteroide rivela diversi minerali silicati idrati, oltre a vari composti organici.
        #ScienceRefactor_bd_XRayDiffract_Organic_01 = L'analisi rivela diversi minerali silicati simili all'argilla nella superficie di questo asteroide ricco d'acqua.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedMetallic_00 = Questo asteroide è composto quasi interamente da ferro e nichel metallici, insieme a vari altri metalli pesanti e tracce di alcune rocce ignee.
        #ScienceRefactor_bd_XRayDiffract_AsteroidSrfLandedMetallic_01 = La superficie di questo asteroide è composta principalmente da leghe di ferro e nichel, il che suggerisce che sia molto probabilmente metallico.

        // bd_XrayImaging
        #ScienceRefactor_bd_XrayImaging_default_00 = Scatti immagini ad alta risoluzione nella lunghezza d'onda dei raggi X, sperando di beccarci dentro qualche stella spettacolare.
        #ScienceRefactor_bd_XrayImaging_default_01 = Scatti una serie di immagini a raggi X. Purtroppo non sembra di riuscire a vedere attraverso tutto, come speravi.
        #ScienceRefactor_bd_XrayImaging_default_02 = Scatti immagini a raggi X di un oggetto lontano. Per quel che capisci è ancora solo un puntino luminoso.
        #ScienceRefactor_bd_XrayImaging_default_03 = Il dispositivo di imaging conferma che le stelle vicine emettono tutte raggi X, ognuna con una firma unica.
        #ScienceRefactor_bd_XrayImaging_default_04 = I dati a raggi X mostrano ciò che i sapientoni chiamano una stella oscura. Tu pensi che parlino dei cioccolatini natalizi a forma di stella.

        // logIonTrap
        #ScienceRefactor_logIonTrap_default_00 = Misuri le particelle cariche che attraversano la trappola.
        #ScienceRefactor_logIonTrap_KerbinInSpaceLow_00 = La quantità di particelle che attraversano la trappola è inferiore al previsto... forse qualcosa le sta bloccando?
        #ScienceRefactor_logIonTrap_KerbinInSpaceHigh_00 = Ora che la magnetosfera di Kerbin intralcia meno, possiamo raccogliere particelle molto più facilmente.
        #ScienceRefactor_logIonTrap_MohoInSpaceLow_00 = Il calore irradiato da Moho sballotta gli ioni avanti e indietro, eccitandoli ancora di più.
        #ScienceRefactor_logIonTrap_MohoInSpaceHigh_00 = Gli ioni sembrano parecchio eccitati, lì accanto a una palla rovente di gas e plasma.
        #ScienceRefactor_logIonTrap_EveInSpaceHigh_00 = Eve non sembra avere effetti significativi sugli ioni che entrano nella trappola.
        #ScienceRefactor_logIonTrap_EveInSpaceLow_00 = La magnetosfera di Eve è più piccola di quella di Kerbin. I dati mostrano che l'atmosfera viene strappata via, ma viene anche reintegrata da una feroce attività vulcanica.
        #ScienceRefactor_logIonTrap_GillyInSpaceHigh_00 = Gilly non sembra avere alcun effetto sugli ioni e sulle particelle cariche che entrano nella trappola.
        #ScienceRefactor_logIonTrap_GillyInSpaceLow_00 = Gilly non deve aver mai avuto una magnetosfera. Forse è troppo piccola.
        #ScienceRefactor_logIonTrap_MunInSpaceHigh_00 = Mun mostra deboli tracce di una magnetosfera.
        #ScienceRefactor_logIonTrap_MunInSpaceLow_00 = Mun ha decisamente una magnetosfera.
        #ScienceRefactor_logIonTrap_MinmusInSpaceHigh_00 = I dati della trappola ionica non sono conclusivi. Non si sa se Minmus abbia mai avuto una magnetosfera.
        #ScienceRefactor_logIonTrap_MinmusInSpaceLow_00 = Minmus mostra dati incoraggianti. Deve aver avuto una sottile magnetosfera durante la formazione del sistema.
        #ScienceRefactor_logIonTrap_DunaInSpaceHigh_00 = Il vento solare attraversa la trappola. Gli ioni sembrano eccitati di trovarsi vicino a un corpo così rosso.
        #ScienceRefactor_logIonTrap_DunaInSpaceLow_00 = Il plasma solare attraversa la trappola. A causa della magnetosfera minuscola, l'atmosfera di Duna viene maltrattata dal vento solare di Kerbol.
        #ScienceRefactor_logIonTrap_IkeInSpaceHigh_00 = Gli ioni intorno a Ike sono influenzati dall'atmosfera di Duna che viene spazzata via dai venti solari.
        #ScienceRefactor_logIonTrap_IkeInSpaceLow_00 = Gli ioni intorno a Ike sono influenzati dall'atmosfera di Duna che viene spazzata via dai venti solari.
        #ScienceRefactor_logIonTrap_DresInSpaceHigh_00 = I dati mostrano un lieve aumento nelle letture elettromagnetiche.
        #ScienceRefactor_logIonTrap_DresInSpaceLow_00 = Dres, in effetti, ha una magnetosfera significativa.
        #ScienceRefactor_logIonTrap_JoolInSpaceHigh_00 = La magnetosfera di Jool è forte anche fino a qui. Le letture mostrano che deve estendersi oltre l'orbita di Eeloo, il che porta a concludere che sia la più grande magnetosfera planetaria dell'intero sistema...
        #ScienceRefactor_logIonTrap_JoolInSpaceLow_00 = La magnetosfera di Jool è più forte che in qualsiasi altro posto, finora. L'elevata radioattività sta mandando in confusione le letture migliori!
        #ScienceRefactor_logIonTrap_LaytheInSpaceHigh_00 = Le letture mostrano una leggera magnetosfera.
        #ScienceRefactor_logIonTrap_LaytheInSpaceLow_00 = La somiglianza della magnetosfera di Laythe con quella di Kerbin ti fa venire in mente molte domande...
        #ScienceRefactor_logIonTrap_VallInSpaceHigh_00 = Queste letture non mostrano risultati incoraggianti...
        #ScienceRefactor_logIonTrap_VallInSpaceLow_00 = Ora puoi concludere che Vall potrebbe non aver mai avuto una magnetosfera...
        #ScienceRefactor_logIonTrap_TyloInSpaceHigh_00 = Le letture della trappola ionica mostrano buone prove di una magnetosfera forte intorno a Tylo.
        #ScienceRefactor_logIonTrap_TyloInSpaceLow_00 = I risultati indicano che Tylo ha davvero una magnetosfera forte e resistente.
        #ScienceRefactor_logIonTrap_BopInSpaceHigh_00 = Queste letture non mostrano risultati incoraggianti...
        #ScienceRefactor_logIonTrap_BopInSpaceLow_00 = Puoi concludere che Bop non ha mai avuto una magnetosfera. È solo un'altra prova da aggiungere all'ipotesi che Bop sia un asteroide catturato.
        #ScienceRefactor_logIonTrap_PolInSpaceHigh_00 = Queste letture non mostrano risultati incoraggianti...
        #ScienceRefactor_logIonTrap_PolInSpaceLow_00 = Il granello di polline che chiami Pol sembra proprio come sua sorella. Niente magnetosfera...
        #ScienceRefactor_logIonTrap_EelooInSpaceHigh_00 = Poco vento solare arriva fino a questa distanza del sistema. Queste letture non sono molto promettenti...
        #ScienceRefactor_logIonTrap_EelooInSpaceLow_00 = Le letture mostrano che Eeloo potrebbe avere una magnetosfera in tracce.

        // logmmImpacts
        #ScienceRefactor_logmmImpacts_default_00 = Tutto tranquillo. Sembra che non stia succedend... PING!
        #ScienceRefactor_logmmImpacts_default_01 = Forse c'è stato un impatto di recente, ma non stavi prestando attenzione.
        #ScienceRefactor_logmmImpacts_default_02 = Il buco accanto all'impattatore POTREBBE essere un risultato del test, ma sei troppo impegnato a fermare la decompressione esplosiva per scoprirlo.
        #ScienceRefactor_logmmImpacts_KerbinInSpaceLow_00 = IMPATTO... per fortuna sembra che sia ancora tutto in un pezzo. Pare che le navicelle possano sopravvivere agli impatti con i detriti, ma dobbiamo assicurarci che i nostri veicoli siano schermati.
        #ScienceRefactor_logmmImpacts_KerbinInSpaceLow_01 = Quando Mun ti colpisce in pieno occhio come una pizza gigante... quello è un impatto!
        #ScienceRefactor_logmmImpacts_KerbinInSpaceHigh_00 = Il rilevatore ha registrato meno impatti da quando siamo a un'orbita più alta.
        #ScienceRefactor_logmmImpacts_MunInSpaceLow_00 = Sembra che Mun avesse una luna più piccola in orbita. Oh. Non c'è più.
        #ScienceRefactor_logmmImpacts_MunInSpaceHigh_00 = Quei piccoli suoni di ping? Sì, era il tuo risultato scientifico che annunciava il suo arrivo.
        #ScienceRefactor_logmmImpacts_MinmusInSpaceLow_00 = In base agli impatti recenti, pensi che Minmus ti stia sfidando a una battaglia a palle di neve.
        #ScienceRefactor_logmmImpacts_MinmusInSpaceHigh_00 = Tutte queste particelline ti ricordano un po' le codette su un gelato...
        #ScienceRefactor_logmmImpacts_MohoInSpaceLow_00 = Kerbol deve aver fatto saltare via un pezzo di roccia da Moho.
        #ScienceRefactor_logmmImpacts_MohoInSpaceHigh_00 = Abbiamo scoperto un nuovo corpo in orbita attorno a Moho e lo chiamiamo Mohoteora... ehm... beh, è durato un istante.
        #ScienceRefactor_logmmImpacts_EveInSpaceLow_00 = Ehi! Sembra che il rilevatore sia appena passato attraverso uno sciame di meteoriti!
        #ScienceRefactor_logmmImpacts_EveInSpaceHigh_00 = Pianeti viola, nuvole viola, polvere viola... che diavolo mettono nel cibo?
        #ScienceRefactor_logmmImpacts_GillyInSpaceLow_00 = Quello potrebbe essere stato il fratellino ancora più piccolo di Gilly...
        #ScienceRefactor_logmmImpacts_GillyInSpaceHigh_00 = La roccia che ti ha appena colpito era più piccola o più grande di Gilly? Boh...
        #ScienceRefactor_logmmImpacts_DunaInSpaceLow_00 = Accidenti! Sembra che non ti aspettassi quell'impatto... o sì?
        #ScienceRefactor_logmmImpacts_DunaInSpaceHigh_00 = A quanto pare i dunaeroidi sono come qualsiasi altro meteoroide. Duri come la roccia e pronti a ucciderti a ogni occasione.
        #ScienceRefactor_logmmImpacts_IkeInSpaceLow_00 = Chiedi a Wehrner se quello fosse il famoso masso magico... o almeno un suo pezzo.
        #ScienceRefactor_logmmImpacts_IkeInSpaceHigh_00 = Ike c'è, ma Mike non lo vedo da nessuna parte. Cos'è quella macchia sul rilevatore?
        #ScienceRefactor_logmmImpacts_DresInSpaceLow_00 = Hai smesso di contare gli impatti poco dopo essere arrivato su Dres.
        #ScienceRefactor_logmmImpacts_DresInSpaceHigh_00 = Se Dres non sta cercando di ucciderti, perché ci sono 42 toppe sullo scafo e nessun colpo sul rilevatore?
        #ScienceRefactor_logmmImpacts_JoolInSpaceLow_00 = Sembra che le orbite di qualsiasi piccolo detrito siano decadute nel gigante gassoso molto tempo fa... PING!
        #ScienceRefactor_logmmImpacts_JoolInSpaceHigh_00 = A quanto pare, anche le particelle sono più grandi vicino a Jool...
        #ScienceRefactor_logmmImpacts_LaytheInSpaceLow_00 = Quell'impatto è sembrato decisamente... umido.
        #ScienceRefactor_logmmImpacts_LaytheInSpaceHigh_00 = Sembra che Laythe abbia ufficialmente starnutito sul tuo rilevatore. Complimenti, sei il primo a scoprire i moccioli spaziali!
        #ScienceRefactor_logmmImpacts_VallInSpaceLow_00 = Un altro impatto... e quindi?
        #ScienceRefactor_logmmImpacts_VallInSpaceHigh_00 = Nel settore 637-K le particelle sono fini e granulose, ma qui sono più grossolane. Credo che abbiamo trovato... terra!
        #ScienceRefactor_logmmImpacts_TyloInSpaceLow_00 = Il dispositivo misura un grande impatto, seguito da molti impatti più piccoli.
        #ScienceRefactor_logmmImpacts_TyloInSpaceHigh_00 = Quel rumore non era il risultato di un impatto, ma era causato direttamente dal cibo spaziale. KLANG! QUELLO sì che era un impatto!
        #ScienceRefactor_logmmImpacts_BopInSpaceLow_00 = Volo, qui Controllo Missione. No, in effetti non ti sei appena scontrato con Bop.
        #ScienceRefactor_logmmImpacts_BopInSpaceHigh_00 = Controllo Missione, qui Volo. Ci siamo appena scontrati con Bop?
        #ScienceRefactor_logmmImpacts_PolInSpaceLow_00 = A giudicare dall'impatto, potremmo aver colpito qualcosa di natura cristallina.
        #ScienceRefactor_logmmImpacts_PolInSpaceHigh_00 = Pol, dopo un controllo cortese e accurato, produce principi previsti sugli impatti.
        #ScienceRefactor_logmmImpacts_EelooInSpaceLow_00 = Anche quaggiù, a quanto pare le navicelle devono fare i conti con i detriti spaziali.
        #ScienceRefactor_logmmImpacts_EelooInSpaceHigh_00 = Siamo venuti, abbiamo visto, ci siamo presi altre pietre.
        #ScienceRefactor_logmmImpacts_AsteroidInSpaceLow_00 = Sembra che alcuni pezzi dell'asteroide si siano staccati a causa dell'attività intorno a lui...
        #ScienceRefactor_logmmImpacts_AsteroidInSpaceHigh_00 = ASPETTA! Nessuno aveva detto niente di rocce intorno alla roccia.
        #ScienceRefactor_logmmImpacts_AsteroidSrfLanded_00 = Il rilevatore emette ping furiosi mentre viene bersagliato dai detriti del nostro atterraggio.

        // === HabTech2 ===
