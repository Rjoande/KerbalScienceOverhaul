        #CSS_crewReport_KerbinFlyingLowMountains_03 = Mentre sfrecci accanto al fianco della montagna a una velocità sconsiderata, per poco non investi una capra di montagna molto sorpresa.
        #CSS_crewReport_KerbinFlyingLowDeserts_00 = Guardi fuori dal finestrino sperando di trovare una torta gustosa, finché non ti accorgi che qualcuno ha fatto un piccolo errore di ortografia nel piano di volo.
        #CSS_crewReport_KerbinFlyingLowDeserts_01 = Il calore che sale dalla sabbia fa tremolare e scintillare il deserto.
        #CSS_crewReport_KerbinFlyingLowDeserts_02 = Ti guardi intorno e non vedi acqua per miglia. Inizi a chiederti perché non ne hai portata di più.
        #CSS_crewReport_KerbinFlyingLowDeserts_03 = Ti chiedi se schiantarti qui creerebbe un cratere di vetro. Poi ti rendi conto di quanto sarebbe bello.
