        #CSS_Aebestach_mobileMaterialsLab_Bop_01 = Campione dai poli di Bop. Il materiale assume una tinta scura e inquietante. Speri che sia di origine minerale.
        #CSS_Aebestach_mobileMaterialsLab_Bop_02 = Materiale dai declivi. Si comporta in modo strano in bassa gravità. Come te, del resto.
