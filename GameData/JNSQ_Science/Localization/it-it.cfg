        #JNSQscience_bd_microwaveSpec_PolInSpaceLowMidlands_00 = Le pianure mostrano un motivo dielettrico a chiazze, accennando a composizione mista sparsa sul terreno.
        #JNSQscience_bd_microwaveSpec_PolInSpaceLowHighlands_00 = Gli altipiani diffondono forte ma in modo irregolare, guglie, creste e depositi bitorzoluti che discutono tutti insieme.
        #JNSQscience_bd_microwaveSpec_PolInSpaceLowMountains_00 = Le montagne producono echi caotici e appuntiti, qualunque cosa componga Pol adora gli spigoli vivi.
        #JNSQscience_bd_microwaveSpec_LindorInSpaceHigh_00 = Da un'orbita alta, il bagliore a microonde di Lindor appare uniforme e profondo, come un gigante che nasconde i segreti sotto una foschia spessa.
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowTemperateBands_00 = Le bande temperate restituiscono echi forti e costanti, cime di nubi dense con molta chimica "bagnata".
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowSubpolarBands_00 = Le bande subpolari risultano più granulose nei dati, come se qui il ponte di nubi fosse più ruvido e più turbolento.
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowNorthPole_00 = Il polo nord risulta più freddo e più tenue, con una firma di foschia superiore più sottile.
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowSouthPole_00 = Il polo sud sfarfalla con una diffusione irregolare, vortici, shear e pochissima collaborazione.
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowStormComplex_00 = Il complesso di tempeste si accende di riflessi caotici: lo strumento archivia il risultato sotto "aiuto".
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowUpperStormDeck_00 = Lo strato superiore delle tempeste diffonde ampiamente, come un coperchio spumoso sopra strati più profondi e più densi.
        #JNSQscience_bd_microwaveSpec_LindorInSpaceLowExposedLowerDeck_00 = I ritorni dello strato inferiore esposto si approfondiscono e si illuminano, accennando a nubi più spesse, forse acqua, forse cioccolato.
        #JNSQscience_bd_microwaveSpec_KrelInSpaceHigh_00 = Il debole eco a microonde di Krel suggerisce una superficie pallida e polverosa avvolta attorno a qualcosa di più denso e più strano.
        #JNSQscience_bd_microwaveSpec_KrelInSpaceLowLowlands_00 = Le pianure assorbono più del previsto, come se la polvere fine avesse riempito ogni crepa e cavità.
        #JNSQscience_bd_microwaveSpec_KrelInSpaceLowMidlands_00 = Le regioni intermedie mostrano un ritorno a chiazze, macerie miste e regolite compattata in macchie disordinate.
        #JNSQscience_bd_microwaveSpec_KrelInSpaceLowHighlands_00 = Gli altipiani diffondono in raffiche nette e appuntite, coerenti con roccia ruvida che spunta da una polvere sottile.
        #JNSQscience_bd_microwaveSpec_KrelInSpaceLowPoles_00 = I poli danno riflessi nitidi e luminosi, terreno freddo e depositi più puliti sono un bersaglio facile per le microonde.
        #JNSQscience_bd_microwaveSpec_AdenInSpaceHigh_00 = Da quassù Aden risulta una tranquilla biglia marrone, echi deboli, curve stabili e una forte sensazione di "vai a cercare altrove".
        #JNSQscience_bd_microwaveSpec_AdenInSpaceLowLowlands_00 = Le pianure tornano scure e uniformi, come se la polvere si fosse depositata e fosse stata pressata piatta col tempo.
        #JNSQscience_bd_microwaveSpec_AdenInSpaceLowMidlands_00 = Le pianure mostrano una trama a strati nel ritorno, sottili coltri sopra terreno più duro e più vecchio.
        #JNSQscience_bd_microwaveSpec_AdenInSpaceLowHighlands_00 = Gli altipiani diffondono forte e in modo irregolare, detriti a blocchi che fanno del loro meglio per essere misurabili.
        #JNSQscience_bd_microwaveSpec_AdenInSpaceLowMountains_00 = Le creste montuose sparano picchi sottili come aghi nei dati, i pendii trasformano il fascio in pura geometria.
        #JNSQscience_bd_microwaveSpec_AdenInSpaceLowPoles_00 = I ritorni polari si illuminano leggermente, accennando a materiale più freddo e più pulito nascosto in bacini in ombra.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceHigh_00 = La firma a microonde di Huygen è marcata anche da un'orbita alta, aria spessa, meteo attivo e una superficie che rifiuta di essere semplice.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowLowlands_00 = Le pianure sembrano umide nella lettura dielettrica, come se il suolo trattenesse volatili sotto quella foschia.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowMidlands_00 = I ritorni delle pianure cambiano dolcemente da una chiazza all'altra, suggerendo trame miste sotto una sottile coperta di depositi.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowHighlands_00 = Gli altipiani diffondono duro e granuloso, terreno ruvido e materiale esposto dominano il segnale.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowMountains_00 = Le montagne annodano la polarizzazione, lo strumento riporta "ripido" con impressionante sicurezza.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowPeaks_00 = Le cime producono picchi netti che mandano fuori scala, piccoli rilievi che urlano nello spazio.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowPolarLowlands_00 = Le pianure polari mostrano echi lisci e luminosi, come se la brina avesse pavimentato in silenzio le distese.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowPoles_00 = I poli brillano freddi e puliti, qualunque cosa si depositi qui resta riflettente e senza vergogna ghiacciata.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowPolarHighlands_00 = Gli altipiani polari alternano diffusione luminosa e scura, accennando a crosta fratturata e brina scolpita dal vento.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowShores_00 = Le coste disegnano una frangia luminosa dove bagnato incontra secco, il confine è più chiaro di qualunque mappa.
        #JNSQscience_bd_microwaveSpec_HuygenInSpaceLowMethaneLakes_00 = I laghi di metano restituiscono una firma scura e oleosa che fa sentire l'antenna leggermente a disagio.
        #JNSQscience_bd_microwaveSpec_RigaInSpaceHigh_00 = L'eco a microonde di Riga è stranamente familiare, un mondo solido con giusto abbastanza variazione da rendere ottimisti i pianificatori.
        #JNSQscience_bd_microwaveSpec_RigaInSpaceLowLowlands_00 = Le pianure risultano più uniformi e più scure, come se polvere fine si fosse depositata in una coperta compatta e atterrabile.
        #JNSQscience_bd_microwaveSpec_RigaInSpaceLowMidlands_00 = Le pianure mostrano ritorni ordinati e a strati, sottili depositi sopra terreno più denso con una piacevole assenza di sorprese.
        #JNSQscience_bd_microwaveSpec_RigaInSpaceLowHighlands_00 = Gli altipiani diffondono più forte, coerentemente con terreno più ruvido e affioramenti rocciosi più freschi.
        #JNSQscience_bd_microwaveSpec_RigaInSpaceLowMountains_00 = Le montagne lanciano picchi netti lungo la scansione, le creste sembrano fatte di "ahia".
        #JNSQscience_bd_microwaveSpec_RigaInSpaceLowPoles_00 = I ritorni polari si illuminano e si raffreddano, suggerendo depositi più puliti e trappole fredde che meritano una seconda occhiata.
        #JNSQscience_bd_microwaveSpec_TalosInSpaceHigh_00 = Talos è lontano, tenue e inutilmente bitorzoluto, l'eco a microonde dice "arido" in diversi dialetti.
        #JNSQscience_bd_microwaveSpec_TalosInSpaceLowLowlands_00 = Le pianure assorbono il fascio con ostinata coerenza, come polvere accumulata in profondità sopra terreno poroso.
        #JNSQscience_bd_microwaveSpec_TalosInSpaceLowMidlands_00 = Le pianure mostrano una diffusione debole e a chiazze, dimensioni di granelli miste e campi di macerie nascosti in bella vista.
        #JNSQscience_bd_microwaveSpec_TalosInSpaceLowHighlands_00 = Gli altipiani rispondono con riflessi netti intermittenti da blocchi esposti incastonati nella regolite sciolta.
        #JNSQscience_bd_microwaveSpec_TalosInSpaceLowMountains_00 = Le creste montuose si accendono di echi appuntiti, il terreno sembra composto per lo più di spigoli vivi e rimpianti.
        #JNSQscience_bd_microwaveSpec_TalosInSpaceLowPoles_00 = I poli restituiscono una firma leggermente più luminosa, accennando a materiale più freddo e più pulito nascosto in sacche in ombra.
        #JNSQscience_bd_microwaveSpec_EelooInSpaceLowPoles_00 = I poli brillano luminosi e freddi, la scansione suggerisce brina pulita con ben poca roba mescolata.
        #JNSQscience_bd_microwaveSpec_EelooInSpaceLowHighlands_00 = Gli altipiani diffondono in un motivo ruvido e croccante, come ghiaccio duro spolverato di schegge di roccia.
        #JNSQscience_bd_microwaveSpec_EelooInSpaceLowMidlands_00 = Le regioni intermedie restituiscono un'eco liscia e costante, fini granelli impaccati sopra qualcosa di più denso sotto.
        #JNSQscience_bd_microwaveSpec_EelooInSpaceLowLowlands_00 = Le pianure risultano più soffici e più scure alle microonde, come se depositi vaporosi si fossero raccolti qui per ere.
        #JNSQscience_bd_microwaveSpec_EelooInSpaceLowCanyon_00 = Il canyon sbava il ritorno in bordi luminosi e solchi scuri, pareti ripide costringono il fascio a fare ginnastica.
        #JNSQscience_bd_microwaveSpec_CelesInSpaceHigh_00 = Da un'orbita alta, Celes dà una firma silenziosa e pallida, per lo più terreno freddo con qualche ostinata chiazza luminosa.
        #JNSQscience_bd_microwaveSpec_CelesInSpaceLowLowlands_00 = Le pianure riflettono in modo uniforme, accennando a brina fine depositata su ampie distese.
        #JNSQscience_bd_microwaveSpec_CelesInSpaceLowMidlands_00 = Le regioni intermedie mostrano una trama a strati, come sottili coperte di materiali diversi impilate senza consenso.
        #JNSQscience_bd_microwaveSpec_CelesInSpaceLowHighlands_00 = Gli altipiani diffondono nettamente, terreno ruvido e blocchi esposti dominano l'eco.
        #JNSQscience_bd_microwaveSpec_CelesInSpaceLowMountains_00 = Le creste montuose fanno impennare la scansione con ritorni sottili come aghi, Celes è molto fiero dei propri spigoli vivi.
        #JNSQscience_bd_microwaveSpec_CelesInSpaceLowPoles_00 = I ritorni polari si illuminano e si raffreddano, suggerendo depositi più puliti nascosti in trappole fredde di lunga durata.
        #JNSQscience_bd_microwaveSpec_TamInSpaceHigh_00 = Il bagliore a microonde di Tam è debole e ostile, come un grumo lontano che si risente di essere misurato.
        #JNSQscience_bd_microwaveSpec_TamInSpaceLowLowlands_00 = Le pianure assorbono più di quanto riflettano, graniglia fine e terreno poroso si mangiano il segnale.
        #JNSQscience_bd_microwaveSpec_TamInSpaceLowMidlands_00 = Le pianure tornano a chiazze e rumorose, come se la superficie fosse un miscuglio di macerie di varie dimensioni.
        #JNSQscience_bd_microwaveSpec_TamInSpaceLowHighlands_00 = Gli altipiani rispondono con picchi luminosi intermittenti da blocchi esposti incastonati in pendii polverosi.
        #JNSQscience_bd_microwaveSpec_TamInSpaceLowTwinCraters_00 = I crateri gemelli disegnano due anelli uguali nei dati, come se la superficie stesse indicando se stessa.
        #JNSQscience_bd_microwaveSpec_TamInSpaceLowCraters_00 = I bordi dei crateri si accendono mentre gli interni si scuriscono, fini sciolti ed ejecta tagliente litigano su chi rifletta di più.
        #JNSQscience_bd_microwaveSpec_TamInSpaceLowPockmarks_00 = Le fossette producono un motivo pepato di minuscoli echi, suggerendo una superficie piena di buche poco profonde e detriti sciolti.
        #JNSQscience_bd_microwaveSpec_HamekInSpaceHigh_00 = Da un'orbita alta, Hamek risulta stranamente irregolare, fasce scure, chiazze luminose e nessuna spiegazione evidente.
        #JNSQscience_bd_microwaveSpec_HamekInSpaceLowLowlands_00 = Le pianure restituiscono una firma scura e pesante, come polvere macchiata compattata sopra terreno più freddo.
        #JNSQscience_bd_microwaveSpec_HamekInSpaceLowMidlands_00 = Le pianure mostrano un motivo dielettrico mutevole, come se più strati superficiali stessero lottando per controllare l'eco.
        #JNSQscience_bd_microwaveSpec_HamekInSpaceLowHighlands_00 = Gli altipiani diffondono aspramente e in modo irregolare, terreno ruvido e affioramenti a blocchi dominano la scansione.
        #JNSQscience_bd_microwaveSpec_HamekInSpaceLowPoles_00 = I poli si illuminano con riflessi nitidi e freddi, qualunque cosa si depositi qui resta abbastanza pulita da essere evidente.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceHigh_00 = Da un'orbita alta il bagliore a microonde di Nara è smorzato da aria spessa e fredda, la superficie affiora solo a grandi tratti.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowLowlands_00 = Le pianure restituiscono un'eco più scura e più uniforme, come se fini depositi si fossero raccolti e compattati piatti.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowMidlands_00 = Le pianure tornano a chiazze e irregolari, suggerendo trame miste nascoste sotto la foschia.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowHighlands_00 = Gli altipiani diffondono più forte, terreno ruvido e materiale esposto rendono il segnale "croccante".
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowMountains_00 = Le creste montuose fanno impennare la scansione come aghi, i pendii trasformano il fascio in pura geometria.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowPolarLowlands_00 = Le pianure polari brillano luminose e fredde, coerentemente con brina fresca depositata in ampi bacini.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowPoles_00 = I poli restituiscono riflessi nitidi e puliti, qualunque cosa si raccolga qui resta abbastanza fredda da restare evidente.
        #JNSQscience_bd_microwaveSpec_NaraInSpaceLowPolarHighlands_00 = Gli altipiani polari alternano diffusione luminosa e scura, accennando a crosta fratturata e brina spazzata dal vento.
        #JNSQscience_bd_microwaveSpec_AmosInSpaceHigh_00 = Amos si registra a malapena come qualcosa più di una macchia bitorzoluta, lo strumento insiste che siano comunque "dati eccellenti".
        #JNSQscience_bd_microwaveSpec_AmosInSpaceLowLowlands_00 = Le pianure assorbono più di quanto riflettano, come polvere vaporosa accumulata in profondità sopra terreno poroso.
        #JNSQscience_bd_microwaveSpec_AmosInSpaceLowMidlands_00 = Le pianure mostrano un patchwork rumoroso, dimensioni di granelli miste e campi di macerie che litigano nel ritorno.
        #JNSQscience_bd_microwaveSpec_AmosInSpaceLowHighlands_00 = Gli altipiani rispondono con echi netti intermittenti da blocchi esposti incastonati nella regolite sciolta.
        #JNSQscience_bd_microwaveSpec_AmosInSpaceLowMountains_00 = Le creste montuose rimandano riflessi appuntiti, a quanto pare il terreno migliore è quello più tagliente.
        #JNSQscience_bd_microwaveSpec_AmosInSpaceLowPoles_00 = I poli si illuminano leggermente, suggerendo materiale più freddo e più pulito nascosto in sacche d'ombra di lunga durata.
        #JNSQscience_bd_microwaveSpec_EnonInSpaceHigh_00 = Il disco luminoso di Enon risulta freddo e stabile, è il tipo di luna che sembra prodotta in fabbrica con "ghiaccio".
        #JNSQscience_bd_microwaveSpec_EnonInSpaceLowLowlands_00 = Le pianure restituiscono echi lisci e luminosi, pianure di ghiaccio piatte con solo una spolverata di graniglia.
        #JNSQscience_bd_microwaveSpec_EnonInSpaceLowMidlands_00 = Le pianure mostrano una lieve stratificazione nel segnale dielettrico, come depositi impilati un brivido alla volta.
        #JNSQscience_bd_microwaveSpec_EnonInSpaceLowHighlands_00 = Gli altipiani diffondono più duro e più granuloso, ghiaccio più ruvido e detriti di cratere dominano la mappa.
        #JNSQscience_bd_microwaveSpec_EnonInSpaceLowPoles_00 = I poli brillano con riflessi nitidi e puliti, coerenti con brina da trappola fredda non mescolata né impastata.
        #JNSQscience_bd_microwaveSpec_PraxInSpaceHigh_00 = Da un'orbita alta Prax risulta un grumo tenue e irregolare, giusto abbastanza struttura da farti pianificare un'altra passata.
        #JNSQscience_bd_microwaveSpec_PraxInSpaceLowLowlands_00 = Le pianure tornano più scure e più uniformi, come se la polvere fine si fosse depositata e fosse stata pressata in posizione.
        #JNSQscience_bd_microwaveSpec_PraxInSpaceLowMidlands_00 = Le pianure mostrano un ritorno a chiazze, accennando a composizione discontinua e sottili coltri sopra terreno più duro.
        #JNSQscience_bd_microwaveSpec_PraxInSpaceLowHighlands_00 = Gli altipiani diffondono forte e in modo irregolare, ejecta a blocchi e terreno ruvido rendono la scansione nervosa.
        #JNSQscience_bd_microwaveSpec_PraxInSpaceLowMountains_00 = Le montagne lanciano picchi netti lungo i dati, le creste sembrano fatte di "ahia".
        #JNSQscience_bd_microwaveSpec_PraxInSpaceLowPoles_00 = I ritorni polari si illuminano e si raffreddano, suggerendo depositi più brinati nascosti in bacini in ombra vicino all'asse.

        // bd_multiSpec
        #JNSQscience_bd_multiSpec_SunInSpaceLowNorthPolarZone_00 = Le bande polari mostrano un abbaglio ultravioletto netto e strutture filiformi che non corrispondono ai motivi dell'equatore. Lo strumento insiste che il sole abbia un "meteo".
        #JNSQscience_bd_multiSpec_SunInSpaceLowNorthSubpolarZone_00 = I compositi multispettrali rivelano deboli increspature rotanti nella firma di emissione. Qualcuno lo etichetta "girelloso" e lo archivia sotto dinamica.
        #JNSQscience_bd_multiSpec_SunInSpaceLowNorthTemperateZone_00 = I canali visibile e infrarosso non sono d'accordo su cosa significhi "uniforme" qui. L'immagine finale sembra calma solo perché l'esposizione è terrorizzata.
        #JNSQscience_bd_multiSpec_SunInSpaceLowNorthTropicZone_00 = Diverse linee a banda stretta si accendono tutte insieme, come se il sole stesse rispondendo a una domanda che non hai fatto. Il rivelatore chiede cortesemente più schermatura.
        #JNSQscience_bd_multiSpec_SunInSpaceLowEquatorialZone_00 = Bande luminose e bande scure si risolvono in una trama affollata e ribollente in falsi colori. Smetti di chiamarlo "una palla" e inizi a chiamarlo "un problema".
        #JNSQscience_bd_multiSpec_SunInSpaceLowSouthTropicZone_00 = La mappa spettrale coglie un improvviso aumento di luminosità che non c'era al passaggio precedente. Lo annoti come transitorio e "probabilmente non personale".
        #JNSQscience_bd_multiSpec_SunInSpaceLowSouthTemperateZone_00 = Il canale infrarosso mostra ampie chiazze più calde che entrano ed escono dal campo. Il sole sembra riorganizzarsi per divertimento.
        #JNSQscience_bd_multiSpec_SunInSpaceLowSouthSubpolarZone_00 = Le bande a onda corta rivelano sottili strutture filamentose che si arricciano lungo il lembo. L'immagine elaborata somiglia a noodles aggrovigliati fatti di luce.
        #JNSQscience_bd_multiSpec_SunInSpaceLowSouthPolarZone_00 = L'emissione polare ha picchi in un modo che fa arrendere la scala dei colori. Il rapporto raccomanda "non indugiare" con un linguaggio perfettamente misurato.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowPoles_00 = In pozze in ombra permanente, lo spettro accenna a ghiaccio ostinato mescolato a polvere scura. Moho resta profondamente impegnato a confondere le aspettative.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowLowlands_00 = Le pianure risultano più scure e si scaldano di più durante il giorno, suggerendo materiale più uniforme che assorbe calore. Il canale termico praticamente ti disegna un cartello di avvertimento.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowPolarIceCraters_00 = Le firme multibanda separano brina luminosa da regolite scura come fuliggine dentro le trappole fredde. Le parole "porta un trapano" compaiono con sospetta frequenza nelle note.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowHighlands_00 = Ritorni più luminosi e caratteristiche di assorbimento più nette indicano roccia ricca di metalli esposta su terreno accidentato. Il composito in falsi colori sembra forgiato, non fotografato.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowMidlands_00 = Sottili spostamenti di banda mappano veli di polvere su un substrato più duro. È lo stesso pianeta due volte, con la seconda copia leggermente più seccata.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowCraters_00 = L'ejecta fresca risalta su più lunghezze d'onda, in netto contrasto con il terreno più vecchio e cotto. Gli impatti fanno un lavoro di scavo migliore di qualsiasi lander.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowExoticCraters_00 = Un gruppo di crateri mostra strane depressioni di assorbimento che non si adattano alla geologia circostante. O è chimica rara, oppure il pianeta tiene souvenir.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowRareCraters_00 = Picchi spettrali deboli ma costanti suggeriscono elementi in tracce concentrati in bordi e raggi. Il tuo scanner è molto compiaciuto di sé.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowVoronoiCraters_00 = Il campo craterico a motivo si risolve in celle ripetute in falsi colori, con confini che restano fermi tra i passaggi. La superficie sembra organizzata in un modo che non dovrebbe.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowNotableCraters_00 = Raggi luminosi, fondi scuri e firme miste fanno risaltare questi crateri come se stessero cercando di farsi scegliere. Il Controllo Missione inizia subito a dare nomi ai siti di atterraggio.
        #JNSQscience_bd_multiSpec_MohoInSpaceLowPeaks_00 = Le creste delle cime saturano le bande luminose mentre le ombre precipitano in freddo estremo all'infrarosso. Il solo gradiente di temperatura vale come ostacolo.
        #JNSQscience_bd_multiSpec_EveInSpaceLowPoles_00 = Lo spettro polare è luminoso, freddo e abbastanza pulito da far rilassare per una volta il team di calibrazione. Eppure sembra ancora viola, in qualche modo.
        #JNSQscience_bd_multiSpec_EveInSpaceLowLowlands_00 = Le pianure restituiscono una firma uniforme che assorbe calore con deboli striature di composizione. Il pianeta sembra marinarsi lentamente da solo.
        #JNSQscience_bd_multiSpec_EveInSpaceLowMidlands_00 = Il contrasto multibanda fa emergere sottili fasce di polvere e roccia che l'imaging normale impasta insieme. Eve nasconde i dettagli dietro un spesso strato di "tutto uguale".
        #JNSQscience_bd_multiSpec_EveInSpaceLowHighlands_00 = Gli altipiani risultano più luminosi nei canali a onda corta e più freschi nelle ombre. Il terreno sembra tagliente, ripido e decisamente stufo dei visitatori.
        #JNSQscience_bd_multiSpec_EveInSpaceLowPeaks_00 = Le creste delle cime saturano le bande del visibile mentre l'infrarosso mostra rapidi cali di temperatura lungo i dorsali. La mappa sembra una lama dentata fatta di viola.
        #JNSQscience_bd_multiSpec_EveInSpaceLowExplodiumSea_00 = La superficie liquida riflette in modo strano su più bande, con caratteristiche di assorbimento che fanno tossire forte l'addetto alla sicurezza. L'oceano viene ufficialmente etichettato "non adatto al nuoto".
        #JNSQscience_bd_multiSpec_EveInSpaceLowMountains_00 = Le ombre mandano in crisi l'auto solver, ma il composito finale delinea comunque pendii a strati con impronte distinte. Le montagne sembrano fatte di "più montagna".
        #JNSQscience_bd_multiSpec_EveInSpaceLowShores_00 = Una sottile zona di transizione spicca in falsi colori dove la chimica della terra incontra i mari strani. Il confine è nitido, come se il pianeta l'avesse tracciato con un righello.
        #JNSQscience_bd_multiSpec_EveInSpaceLowPolarLakes_00 = I laghi mostrano una firma più fredda e più luminosa del terreno circostante, con una risposta superficiale sospettosamente uniforme. O sono calmi, oppure stanno aspettando.
