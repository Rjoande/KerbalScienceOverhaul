@EXPERIMENT_DEFINITION:HAS[#id[bd_magScan]]
{
    @title = #ScienceRefactor_bd_magScan_title // Magnetometer Scan
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_magScan_default_00 // An accurate reading of the local magnetic field is recorded.
        
	    InSpace* = #ScienceRefactor_bd_magScan_default_02 // Local variations in the magnetic field are detected.
        
        KerbinInSpaceLow* = #ScienceRefactor_bd_magScan_KerbinInSpaceLow_00 // Initial scans indicate a large magnetic field surrounding Kerbin, its intensity decreases with increasing altitude.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_magScan_KerbinInSpaceHigh_00 // Kerbin's magnetic field spans several planetary radii, protecting its atmosphere from the solar wind and cosmic radiation.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_magScan_KerbinInSpaceHigh_01 // Interactions with the solar wind significantly distort Kerbin's magnetic field, resulting in a compressed field on Kerbin's solar side, and a tapered tail on the opposite side.
		KerbinSrfLandedLaunchPad* = #ScienceRefactor_bd_magScan_KerbinSrfLandedLaunchPad_00 // The magnetometer is properly calibrated and records Kerbin's surface level magnetic field.
		KerbinSrfLanded* = #ScienceRefactor_bd_magScan_KerbinSrfLanded_00 // The magnetometer records an accurate reading of Kerbin's surface magnetic field.
		KerbinSrfLandedIceCaps* = #ScienceRefactor_bd_magScan_KerbinSrfLandedIceCaps_00 // The magnetic field lines near the pole are almost directly vertical relative to the surface, indicating that Kerbin's magnetic poles are closely aligned with its geographic poles.
		KerbinSrfLandedMountains* = #ScienceRefactor_bd_magScan_KerbinSrfLandedMountains_00 // A strong magnetic field suggests that you may have stumbled upon one of Kerbin's mythic "magnetic mountains".
		KerbinSrfLandedBadlands* = #ScienceRefactor_bd_magScan_KerbinSrfLandedBadlands_00 // Strong local magnetic fields are detected in this area, suggesting high concentrations of magnetically active elements.
		KerbinSrfLandedRunway* = #ScienceRefactor_bd_magScan_KerbinSrfLandedRunway_00 // For some reason the magnetic field lines are continuously changing directions; it's almost as if someone is running in circles around the runway with a giant magnet.
		KerbinSrfLandedFlagPole* = #ScienceRefactor_bd_magScan_KerbinSrfLandedFlagPole_00 // The magnetometer provides a decent approximation of this flag pole; all that's left is to climb to the top and hang a flag.
		KerbinSrfLandedTrackingStation* = #ScienceRefactor_bd_magScan_KerbinSrfLandedTrackingStation_00 // The enormous radio dishes block out Kerbin's natural magnetic field.
		KerbinSrfLandedVAB* = #ScienceRefactor_bd_magScan_KerbinSrfLandedVAB_00 // Wouldn't it make more sense to have taken readings from the VAB before launch?
		KerbinSrfLandedVABMainBuilding* = #ScienceRefactor_bd_magScan_KerbinSrfLandedVABMainBuilding_00 // Now is this really necessary?
		KerbinSrfLandedR&D* = #ScienceRefactor_bd_magScan_KerbinSrfLandedR&D_00 // Maybe someone else should be taking reading from the R&D center...
		KerbinSrfLandedR&DTanks* = #ScienceRefactor_bd_magScan_KerbinSrfLandedR&DTanks_00 // OK, really now, let's go somewhere interesting to take magnetometer readings...
		KerbinSrfLandedAdministration* = #ScienceRefactor_bd_magScan_KerbinSrfLandedAdministration_00 // Pointing this magnetometer at the Admin building might not make the bosses too happy.
		KerbinSrfLandedAstronautComplex* = #ScienceRefactor_bd_magScan_KerbinSrfLandedAstronautComplex_00 // Those astronauts sure are missing out on this grand adventure...
		KerbinSrfLandedSPH* = #ScienceRefactor_bd_magScan_KerbinSrfLandedSPH_00 // The tower controllers are not amused...
		KerbinSrfLandedSPHRoundTank* = #ScienceRefactor_bd_magScan_KerbinSrfLandedSPHRoundTank_00 // Nothing better to do?
		KerbinSrfLandedMissionControl* = #ScienceRefactor_bd_magScan_KerbinSrfLandedMissionControl_00 // Mission Control confirms that this is indeed a waste of time.

        MunInSpaceHigh* = #ScienceRefactor_bd_magScan_MunInSpaceHigh_00 // A weak magnetic field indicates that the Mun may once have contained a molten iron core.
        MunInSpaceLow* = #ScienceRefactor_bd_magScan_MunInSpaceLow_00 // Localized magnetic fields are detected over several regions of the Mun's surface.
        MunSrfLanded* = #ScienceRefactor_bd_magScan_MunSrfLanded_00 // A very faint magnetic field is detected on the Mun's surface.
		MunSrfLandedNorthernBasin* = #ScienceRefactor_bd_magScan_MunSrfLandedNorthernBasin_00 // A weak magnetic field is detected in this region. The absence of large craters nearby suggests that this crustal magnetization is left over from the Mun's once molten core.
		MunSrfLandedPolarCrater* = #ScienceRefactor_bd_magScan_MunSrfLandedPolarCrater_00 // Strong magnetic fields are detected in the base of the crater, likely arising from magnetically aligned ejecta from a large impactor.
		MunSrfLandedHighlandCraters* = #ScienceRefactor_bd_magScan_MunSrfLandedHighlandCraters_00 // A strong magnetic field is detected in the deeper regions of this crater.
		MunSrfLandedEastFarsideCrater* = #ScienceRefactor_bd_magScan_MunSrfLandedEastFarsideCrater_00 // An intense magnetic field is detected in this crater, possibly originating in material from the meteorite that impacted here.
		MunSrfLandedPoles* = #ScienceRefactor_bd_magScan_MunSrfLandedPoles_00 // Magnetic field strength remains at baseline levels for the Mun's surface, indicating that no further geodynamo activity occurs in the Mun's core.

        MinmusInSpace* = #ScienceRefactor_bd_magScan_MinmusInSpace_00 // Frozen ice cream doesn't emit a magnetic field dummy.
        MinmusSrfLanded* = #ScienceRefactor_bd_magScan_MinmusSrfLanded_00 // Closer study reveals that Minmus does indeed not generate a magnetic field.
		MinmusSrfLandedGreaterFlats* = #ScienceRefactor_bd_magScan_MinmusSrfLandedGreaterFlats_00 // Even Minmus' minty-looking frozen surface is magnetically dead.
		MinmusSrfLandedLesserFlats* = #ScienceRefactor_bd_magScan_MinmusSrfLandedLesserFlats_00 // The readout is flat, like the frozen surface.

        SunInSpaceLow* = #ScienceRefactor_bd_magScan_SunInSpaceLow_00 // Sensors overloading... oh dear, I think the boom is melting.
        SunInSpaceHigh* = #ScienceRefactor_bd_magScan_SunInSpaceHigh_00 // Kerbol's enormous magnetosphere extends well beyond the orbit Eeloo, affecting all of the planets in the solar system.

        MohoInSpace* = #ScienceRefactor_bd_magScan_MohoInSpace_00 // Scans indicate only a weak induced magnetic field, this is most likely caused by the stream of charged particles in the solar wind flowing around Moho.
        MohoSrfLanded* = #ScienceRefactor_bd_magScan_MohoSrfLanded_00 // Low surface level magnetic fields reflect Moho's lack of any internally generated magnetosphere.

        EveInSpaceLow* = #ScienceRefactor_bd_magScan_EveInSpaceLow_00 // Intense magnetic fields nearly overload the sensors.
        EveInSpaceHigh* = #ScienceRefactor_bd_magScan_EveInSpaceHigh_00 // A strong magnetic field ensures that Eve's atmosphere remains protected from Kerbol's radiation.
        EveSrfLanded* = #ScienceRefactor_bd_magScan_EveSrfLanded_00 // Surface level magnetism is slightly lower than that measured in orbit; Eve's strong ring current may be responsible for shielding the surface from some of its magnetic field.

        GillyInSpace* = #ScienceRefactor_bd_magScan_GillyInSpace_00 // Gilly appears to be nothing more than loosely held together rocks with no detectable magnetic field.
        GillySrfLanded* = #ScienceRefactor_bd_magScan_GillySrfLanded_00 // No magnetic field is detected on Gilly's surface.

        DunaInSpaceLow* = #ScienceRefactor_bd_magScan_DunaInSpaceLow_00 // Isolated patches of Duna's atmosphere appear to be protected by small magnetospheres.
        DunaInSpaceHigh* = #ScienceRefactor_bd_magScan_DunaInSpaceHigh_00 // A very weak magnetic field indicates that Duna's core solidified long ago, allowing its atmosphere to be largely stripped away and blasting the surface with intense solar radiation.
        DunaSrfLanded* = #ScienceRefactor_bd_magScan_DunaSrfLanded_00 // Surface level magnetic field lines suggest the presence of several small, but powerful magnetic anomalies.

        IkeInSpace* = #ScienceRefactor_bd_magScan_IkeInSpace_00 // Cold, dead, lifeless, no readings of interest here.
        IkeSrfLanded* = #ScienceRefactor_bd_magScan_IkeSrfLanded_00 // Ike appears as magnetically boring on the surface as it did from orbit.

        DresInSpace* = #ScienceRefactor_bd_magScan_DresInSpace_00 // Who comes to Dres?
        DresSrfLanded* = #ScienceRefactor_bd_magScan_DresSrfLanded_00 // Were you expecting something different on the surface?

        JoolInSpaceLow* = #ScienceRefactor_bd_magScan_JoolInSpaceLow_00 // Jool's strong magnetic field traps belts of powerful radiation; observe caution in low orbits. Conditions could prove hazardous for Kerbaled crafts.
        JoolInSpaceHigh* = #ScienceRefactor_bd_magScan_JoolInSpaceHigh_00 // Jool's enormous magnetosphere extends well beyond the orbit of all its moons in every direction.

        LaytheInSpace* = #ScienceRefactor_bd_magScan_LaytheInSpace_00 // Laythe generates its own magnetic field, indicating a molten core and an active geology. The field is strongly influenced by Jool's much larger magnetosphere.
        LaytheSrfLanded* = #ScienceRefactor_bd_magScan_LaytheSrfLanded_00 // A surface level magnetic field is detected on Laythe, with field lines indicating that the magnetic poles are located far away from the geographic poles.

        VallInSpaceHigh* = #ScienceRefactor_bd_magScan_VallInSpaceHigh_00 // Only Jool's magnetic field is detectable here, suggesting that Vall lacks any geodynamo activity.
        VallInSpaceLow* = #ScienceRefactor_bd_magScan_VallInSpaceLow_00 // A very weak magnetic field is detected in low orbit of Vall. This is perhaps due to Vall's mysteriously liquid, sub-surface oceans.
        VallSrfLanded* = #ScienceRefactor_bd_magScan_VallSrfLanded_00 // Weak surface level magnetic fields are detected, possibly caused by sub-surface water flow.

        TyloInSpace* = #ScienceRefactor_bd_magScan_TyloInSpace_00 // Tylo doesn't appear to generate its own magnetic field, but strongly distorts Jool's field, indicating a high concentration of dense, magnetic elements.
        TyloSrfLanded* = #ScienceRefactor_bd_magScan_TyloSrfLanded_00 // Strong surface level magnetic fields are detected, but little consistency in direction is observed.

        BopInSpaceHigh* = #ScienceRefactor_bd_magScan_BopInSpaceHigh_00 // Bop produces an intensely powerful magnetosphere; much further study is warranted...
        BopInSpaceLow* = #ScienceRefactor_bd_magScan_BopInSpaceLow_00 // Bop's magnetic field appears very uneven, localized primarily in the northern polar region; further study is warranted...
        BopSrfLanded* = #ScienceRefactor_bd_magScan_BopSrfLanded_00 // All magnetic field lines point north, indicating a small, but intensely powerful source of magnetism somewhere near the north pole.

        PolInSpace* = #ScienceRefactor_bd_magScan_PolInSpace_00 // Like a grain of pollen blowing in Jool's magnetic wind.
        PolSrfLanded* = #ScienceRefactor_bd_magScan_PolSrfLanded_00 // Only Jool's magnetic field is detectable on Pol's surface.

        EelooInSpace* = #ScienceRefactor_bd_magScan_EelooInSpace_00 // Eeloo appears cold and lifeless. Only Kerbol's weak magnetic field is detectable from here.
        EelooSrfLanded* = #ScienceRefactor_bd_magScan_EelooSrfLanded_00 // No significant magnetic field is detected on Eeloo's surface.

        AscensionInSpace* = #ScienceRefactor_bd_magScan_AscensionInSpace_00 // There is little to no detectable magnetic field beyond the background levels here.
        ErinInSpace* = #ScienceRefactor_bd_magScan_ErinInSpace_00 // Erin's ionosphere and a band of charged particles are likely responsible for the weak magnetic field detected here.
        InaccessableInSpace* = #ScienceRefactor_bd_magScan_InaccessableInSpace_00 // The rapid rotation of this planetoid creates a constantly shifting magnetic field.
        JokerInSpace* = #ScienceRefactor_bd_magScan_JokerInSpace_00 // A weak magnetic field is detected around Joker, likely induced by nearby Serious.
        PockInSpace* = #ScienceRefactor_bd_magScan_PockInSpace_00 // Nothing beyond Erin's magnetic field is detected here.
        RingleInSpace* = #ScienceRefactor_bd_magScan_RingleInSpace_00 // The moon itself doesn't appear to generate any magnetic field, but a weak signal is detected in close proximity to the ring system.
        SentarInSpace* = #ScienceRefactor_bd_magScan_SentarInSpace_00 // Sentar generates an intense magnetic field, likely trapping several bands of dangerous, charged particles in its ring system.
        SeriousInSpace* = #ScienceRefactor_bd_magScan_SeriousInSpace_00 // Serious generates a significant magnetic field that interacts with the remnants of Kerbol's much larger field.
        SkeltonInSpace* = #ScienceRefactor_bd_magScan_SkeltonInSpace_00 // Skelton's high inclination generates an interesting interaction with Sentar's strong magnetic field as it passes above and below it.
        ThudInSpace* = #ScienceRefactor_bd_magScan_ThudInSpace_00 // A fairly strong magnetic field is detected around Thud, suggesting the possibility of a dense, iron-rich core.
        SarnusInSpaceLow* = #ScienceRefactor_bd_magScan_SarnusInSpaceLow_00 // The magnetic field around Sarnus is distorted by the ring particles orbiting its equatorial belt.
        SarnusInSpaceHigh* = #ScienceRefactor_bd_magScan_SarnusInSpaceHigh_00 // Distortions in Sarnus' magnetosphere are detected around some if its moons, particularly Eeloo and Tekto, as they add plasma into the system.
        HaleInSpace* = #ScienceRefactor_bd_magScan_HaleInSpace_00 // This tiny moonlet produces little more than a blip in the larger magnetic field of Sarnus.
        HaleSrfLanded* = #ScienceRefactor_bd_magScan_HaleSrfLanded_00 // Magnetic field measurements from the surface of Hale differ little from those taken in orbit.
        OvokInSpace* = #ScienceRefactor_bd_magScan_OvokInSpace_00 // Ovok appears to generate no magnetic field of its own, but it strongly distorts Sarnus' field.
        OvokSrfLanded* = #ScienceRefactor_bd_magScan_OvokSrfLanded_00 // Magnetic field measurements at Ovok's surface level are minimal, indicating that it disrupts and redirects Sarnus' field while generating none of its own.
        SlateInSpaceHigh* = #ScienceRefactor_bd_magScan_SlateInSpaceHigh_00 // Slate distorts Sarnus' magnetic field but appears to generate none of its own.
        SlateInSpaceLow* = #ScienceRefactor_bd_magScan_SlateInSpaceLow_00 // Magnetic field disruptions in low Slate orbit appear similar to those generated by the ring current found in an atmospheric planet's ionosphere.
        SlateSrfLanded* = #ScienceRefactor_bd_magScan_SlateSrfLanded_00 // Magnetic elements in the soil are very consistently aligned along a North to South direction.
        TektoInSpaceHigh* = #ScienceRefactor_bd_magScan_TektoInSpaceHigh_00 // Tekto appears to have a strong induced magnetic field; it is generated as the moon passes through the plasma in Sarnus' quickly rotating magnetosphere.
        TektoInSpaceLow* = #ScienceRefactor_bd_magScan_TektoInSpaceLow_00 // Sarnus' magnetic field is distorted by Tekto, causing a drop in the field intensity in its wake.
        TektoSrfLanded* = #ScienceRefactor_bd_magScan_TektoSrfLanded_00 // The surface level magnetic field is extremely weak; Tekto's induced magnetic field largely shields the surface from Sarnus' larger field.
        UrlumInSpaceHigh* = #ScienceRefactor_bd_magScan_UrlumInSpaceHigh_00 // A strong magnetosphere is detected around Urlum, which appears to be tilted significantly away from the planet's axis of rotation.
        UrlumInSpaceLow* = #ScienceRefactor_bd_magScan_UrlumInSpaceLow_00 // Closer to the surface, Urlum's magnetosphere produces isolated regions with a very strong magnetic dipole moment.
        PriaxInSpace* = #ScienceRefactor_bd_magScan_PriaxInSpace_00 // The shared orbit of Priax and Polta creates a wake in Urlum's large magnetosphere.
        PriaxSrfLanded* = #ScienceRefactor_bd_magScan_PriaxSrfLanded_00 // Regions of Priax's surface exhibit detectable magnetic anomalies, probably a result of iron-rich asteroid impacts.
        PoltaInSpace* = #ScienceRefactor_bd_magScan_PoltaInSpace_00 // Only a slight disturbance in Urlum's magnetic field is detected in orbit around Polta
        PoltaSrfLanded* = #ScienceRefactor_bd_magScan_PoltaSrfLanded_00 // Surface level magnetic field readings on Polta don't seem to be affected by the tiny moon.
        WalInSpace* = #ScienceRefactor_bd_magScan_WalInSpace_00 // A weak magnetic field is detected in orbit around Wal, perhaps signaling some kind of ongoing internal heating.
        WalSrfLanded* = #ScienceRefactor_bd_magScan_WalSrfLanded_00 // Regions of the surface on Wal have strong magnetic field readings.
        TalInSpace* = #ScienceRefactor_bd_magScan_TalInSpace_00 // A very weak magnetic field is detected in orbit around the tiny sub-moon.
        TalSrfLanded* = #ScienceRefactor_bd_magScan_TalSrfLanded_00 // Metallic elements in Tal's surface are detected in magnetic field readings.
        NeidonInSpaceHigh* = #ScienceRefactor_bd_magScan_NeidonInSpaceHigh_00 // Neidon's magnetosphere appears to be offset from its center by a significant amount, suggesting that it may arise from convective currents somewhere in the planet's mantle layer.
        NeidonInSpaceLow* = #ScienceRefactor_bd_magScan_NeidonInSpaceLow_00 // Close reading from Neidon reveal a strong quadrupole magnetic moment; a significant departure from the dipole moment that dominates most planets' magnetospheres.
        MercuryInSpace* = #ScienceRefactor_bd_magScan_MercuryInSpace_00 // Scans indicate only a weak induced magnetic field, this is most likely caused by the stream of charged particles in the solar wind flowing around Mercury.
        MercurySrfLanded* = #ScienceRefactor_bd_magScan_MercurySrfLanded_00 // Low surface level magnetic fields reflect Mercury's lack of any internally generated magnetosphere.
        VenusInSpaceLow* = #ScienceRefactor_bd_magScan_VenusInSpaceLow_00 // A weak induced magnetic field is detected in low orbit around Venus.
        VenusInSpaceHigh* = #ScienceRefactor_bd_magScan_VenusInSpaceHigh_00 // Venus' upper atmosphere appears to be exposed to the solar wind, with only a weak induced magnetic field providing some protection.
        VenusSrfLanded* = #ScienceRefactor_bd_magScan_VenusSrfLanded_00 // Surface level magnetism is slightly lower than that measured in orbit; Venus' strong induced ring current may be responsible for shielding the surface from some of its magnetic field.
        MoonInSpaceLow* = #ScienceRefactor_bd_magScan_MoonInSpaceLow_00 // Localized magnetic fields are detected over several regions of the Moon's surface.
        MoonInSpaceHigh* = #ScienceRefactor_bd_magScan_MoonInSpaceHigh_00 // A weak magnetic field indicates that the Moon may once have contained a molten iron core.
        MoonSrfLanded* = #ScienceRefactor_bd_magScan_MoonSrfLanded_00 // A very faint magnetic field is detected on the Moon's surface.
        MarsInSpaceLow* = #ScienceRefactor_bd_magScan_MarsInSpaceLow_00 // Isolated patches of Mars' atmosphere appear to be protected by small magnetospheres.
        MarsInSpaceHigh* = #ScienceRefactor_bd_magScan_MarsInSpaceHigh_00 // A very weak magnetic field indicates that Mars' core solidified long ago, allowing its atmosphere to be largely stripped away and blasting the surface with intense solar radiation.
        MarsSrfLanded* = #ScienceRefactor_bd_magScan_MarsSrfLanded_00 // Surface level magnetic field lines suggest the presence of several small, but powerful magnetic anomalies.
        DeimosInSpaceLow* = #ScienceRefactor_bd_magScan_DeimosInSpaceLow_00 // Deimos appears to be nothing more than loosely held together rocks with no detectable magnetic field.
        DeimosSrfLanded* = #ScienceRefactor_bd_magScan_DeimosSrfLanded_00 // No magnetic field is detected on the surface of Deimos.
        PhobosInSpace* = #ScienceRefactor_bd_magScan_PhobosInSpace_00 // Magnetic field reading show what appears to be an intrinsic magnetosphere present around Phobos; a curious result given the moon's small size and likely origin as a captured asteroid.
        PhobosSrfLanded* = #ScienceRefactor_bd_magScan_PhobosSrfLanded_00 // A weak surface level, dipole magnetic field is detected on Phobos.
        JupiterInSpaceLow* = #ScienceRefactor_bd_magScan_JupiterInSpaceLow_00 // Jupiter's strong magnetic field traps belts of powerful radiation; observe caution in low orbits. Conditions could prove hazardous for manned crafts.
        JupiterInSpaceHigh* = #ScienceRefactor_bd_magScan_JupiterInSpaceHigh_00 // Jupiter's enormous magnetosphere extends well beyond the orbit of all its moons in every direction.
        IoInSpaceLow* = #ScienceRefactor_bd_magScan_IoInSpaceLow_00 // Io appears to generate no magnetic field of its own, implying that its intense geological activity is most likely due to tidal forces, not a molten core.
        IoInSpaceHigh* = #ScienceRefactor_bd_magScan_IoInSpaceHigh_00 // Strong interactions with Jupiter's magnetic field are detected as Io's thin atmosphere is stripped of charged particles.
        IoSrfLanded* = #ScienceRefactor_bd_magScan_IoSrfLanded_00 // Only a weak magnetic field is detected on the surface of Io.
        EuropaInSpaceLow* = #ScienceRefactor_bd_magScan_EuropaInSpaceLow_00 // A strong induced magnetic field is detected in low orbit around Europa; this could be generated through interactions of Jupiter's magnetosphere with a sub-surface ocean on Europa.
        EuropaInSpaceHigh* = #ScienceRefactor_bd_magScan_EuropaInSpaceHigh_00 // Europa generates distortions as it passes through Jupiter's magnetosphere.
        EuropaSrfLanded* = #ScienceRefactor_bd_magScan_EuropaSrfLanded_00 // A weak magnetic field is detected on the surface of Europa; this could be a result of sub-surface water flows.
        GanymedeInSpaceLow* = #ScienceRefactor_bd_magScan_GanymedeInSpaceLow_00 // Ganymede appears to generate its own magnetic field, which distorts Jupiter's larger field, indicating a high concentration of dense, magnetic elements.
        GanymedeInSpaceHigh* = #ScienceRefactor_bd_magScan_GanymedeInSpaceHigh_00 // A localized distortion in Jupiter's magnetic field is detected in high orbit of Ganymede.
        GanymedeSrfLanded* = #ScienceRefactor_bd_magScan_GanymedeSrfLanded_00 // Strong surface level magnetic fields are detected, indicating an internally generated magnetosphere.
        CallistoInSpace* = #ScienceRefactor_bd_magScan_CallistoInSpace_00 // Cold, dead, lifeless, no readings of interest here.
        CallistoSrfLanded* = #ScienceRefactor_bd_magScan_CallistoSrfLanded_00 // Callisto appears as magnetically boring on the surface as it did from orbit.
        SaturnInSpaceLow* = #ScienceRefactor_bd_magScan_SaturnInSpaceLow_00 // The magnetic field around Saturn is distorted by the ring particles orbiting its equatorial belt.
        SaturnInSpaceHigh* = #ScienceRefactor_bd_magScan_SaturnInSpaceHigh_00 // Distortions in Saturn's magnetosphere are detected around Titan as it adds plasma into the system.
        TitanInSpace* = #ScienceRefactor_bd_magScan_TitanInSpace_00 // Titan appears to have an induced magnetic field, generated by Saturn's much larger magnetosphere.
        TitanSrfLanded* = #ScienceRefactor_bd_magScan_TitanSrfLanded_00 // A very weak surface level magnetic field is detected; Titan's induced magnetosphere is likely protecting the surface from Saturn's stronger field.
        UranusInSpaceLow* = #ScienceRefactor_bd_magScan_UranusInSpaceLow_00 // Closer to the surface, Uranus' magnetosphere produces isolated regions with a very strong magnetic dipole moment.
        UranusInSpaceHigh* = #ScienceRefactor_bd_magScan_UranusInSpaceHigh_00 // A strong magnetosphere is detected around Uranus, which appears to be tilted significantly away from the planet's axis of rotation.
        TitaniaInSpace* = #ScienceRefactor_bd_magScan_TitaniaInSpace_00 // Unlike other certain other large moons of gas giants, Titania appears to lack a magnetic field.
        TitaniaSrfLanded* = #ScienceRefactor_bd_magScan_TitaniaSrfLanded_00 // It's conclusive. No magnetic field here.
        NeptuneInSpaceLow* = #ScienceRefactor_bd_magScan_NeptuneInSpaceLow_00 // Neptune's magnetic field is chaotic, fluctuating with its interaction with the solar wind.
        NeptuneInSpaceHigh* = #ScienceRefactor_bd_magScan_NeptuneInSpaceHigh_00 // Neptune's magnetic field appears to be quite strong, 27 times stronger than Earth's, in fact.
        TritonInSpaceHigh* = #ScienceRefactor_bd_magScan_TritonInSpaceHigh_00 // Suprisingly, a magnetic field can be detected aside from Neptune's. Triton has a magnetic field!
        TritonInSpaceLow* = #ScienceRefactor_bd_magScan_TritonInSpaceLow_00 // Triton's magnetic field seems to heavily interact with Neptune's magnetic field.
        TritonSrfLanded* = #ScienceRefactor_bd_magScan_TritonSrfLanded_00 // Triton's magnetic field is stronger than expected!
        PlutoInSpace* = #ScienceRefactor_bd_magScan_PlutoInSpace_00 // Pluto appears cold and lifeless. Only the sun's weak magnetic field is detectable from here.
        PlutoSrfLanded* = #ScienceRefactor_bd_magScan_PlutoSrfLanded_00 // No significant magnetic field is detected on Pluto's surface.
        CharonInSpace* = #ScienceRefactor_bd_magScan_CharonInSpace_00 // Yep. No magnetic field here either.
        CharonSrfLanded* = #ScienceRefactor_bd_magScan_CharonSrfLanded_00 // Still no magnetic field.
        AsteroidInSpaceLow* = #ScienceRefactor_bd_magScan_AsteroidInSpaceLow_00 // Only the background magnetic field is detected around this asteroid.
        AsteroidInSpaceLow* = #ScienceRefactor_bd_magScan_AsteroidInSpaceLow_01 // Faint magnetic signals are detected around this asteroid, suggesting that it could have a high metal content.
        AsteroidInSpaceLow* = #ScienceRefactor_bd_magScan_AsteroidInSpaceLow_02 // A weak magnetic field emanating from the asteroid perturbs the field from the surrounding magnetosphere.
        AsteroidSrfLanded* = #ScienceRefactor_bd_magScan_AsteroidSrfLanded_00 // A weak, but stable magnetic field is detected near the surface of this asteroid.
        AsteroidSrfLanded* = #ScienceRefactor_bd_magScan_AsteroidSrfLanded_01 // Localized fluctuations in this asteroid's magnetic field suggest a complex interior composition.
        AsteroidSrfLandedSType* = #ScienceRefactor_bd_magScan_AsteroidSrfLandedSType_00 // This asteroid generates no detectable magnetic field, indicating little to no presence of iron.
        AsteroidSrfLandedBType* = #ScienceRefactor_bd_magScan_AsteroidSrfLandedBType_00 // Some very faint, short-lived magnetic signals suggest the presence of some electrically conductive materials in this asteroid.
        AsteroidSrfLandedCType* = #ScienceRefactor_bd_magScan_AsteroidSrfLandedCType_00 // Only a very faint magnetic signal is detected from this asteroid, suggesting only low concentrations of iron and nickel.
        AsteroidSrfLandedEType* = #ScienceRefactor_bd_magScan_AsteroidSrfLandedEType_00 // A relatively strong magnetic field is detected from the surface of this asteroid, an indication that it is primarily metallic in composition.
        AsteroidSrfLandedMType* = #ScienceRefactor_bd_magScan_AsteroidSrfLandedMType_00 // This asteroid is generating a significant magnetic field, suggesting that it is a metallic, M-type object, rich in iron and nickel compounds.
    }
}