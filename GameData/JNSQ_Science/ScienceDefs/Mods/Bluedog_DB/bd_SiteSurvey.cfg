@EXPERIMENT_DEFINITION:HAS[#id[bd_SiteSurvey]]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedPoles_00 //The polar ground is darker and more pitted than expected. One suspicious shadow looks like a hole just waiting for a landing leg.
        MohoSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedLowlands_00 //Smoother terrain and fewer sharp ridges make this look like a sensible site. The heat shimmer makes “level” hard to confirm.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedPolarIceCraters_00 //Bright crater floors and abrupt edges suggest tricky footing. The safest-looking spot is always closer to the rim than it should be.
        MohoSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedHighlands_00 //Jagged ridgelines and broken slopes dominate the view. The survey recommends a flatter hobby.
        MohoSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedMidlands_00 //A decent spread of flats between small rises. It’s not perfect, but it’s not actively insulting either.
        MohoSrfLandedCraters* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedCraters_00 //Craters on craters on craters. Plenty of places to land, and even more places to regret it.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedExoticCraters_00 //The terrain looks oddly patterned, like it tried to organize itself and gave up halfway. Approach with caution and low optimism.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedRareCraters_00 //Fewer craters means more uninterrupted ground. Unfortunately, it’s uninterrupted ground that’s gently trying to throw you off.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedVoronoiCraters_00 //The surface breaks into neat polygon cells with ridged borders. Landing on a “corner” is strongly discouraged by the engineers.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedNotableCraters_00 //A big landmark crater makes navigation easy. The ejecta field around it makes landing less easy.
        MohoSrfLandedPeaks* = #JNSQscience_bd_SiteSurvey_MohoSrfLandedPeaks_00 //Great line-of-sight and terrible landing options. The site is “excellent” if you don’t intend to touch it.

        EveSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_EveSrfLandedPoles_00 //The ground shows pale patches under a thick haze, with long shadows hiding sharp relief. “Flat” is a rumor at this latitude.
        EveSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_EveSrfLandedLowlands_00 //Broad plains with subtle rises look promising. The atmosphere makes everything look closer than it is, including trouble.
        EveSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_EveSrfLandedMidlands_00 //Rolling terrain and scattered rough outcrops suggest workable sites with careful aiming. Pick a spot that won’t become a mud puddle.
        EveSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_EveSrfLandedHighlands_00 //Steeper slopes and broken ground make this a challenging site. The purple fog adds a nice layer of uncertainty.
        EveSrfLandedPeaks* = #JNSQscience_bd_SiteSurvey_EveSrfLandedPeaks_00 //Dramatic views and abrupt drop-offs everywhere. The survey notes that gravity here is very committed to its job.
        EveSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_EveSrfLandedMountains_00 //Sharp ridges and boulder fields leave little room for error. Recommended only for missions titled “We’ll Just Wing It”.
        EveSrfLandedShores* = #JNSQscience_bd_SiteSurvey_EveSrfLandedShores_00 //Coastal flats offer good access and decent visibility. The boundary between “ground” and “not ground” looks alarmingly flexible.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_SiteSurvey_EveSrfLandedKrakensWell_00 //The terrain dips in strange, irregular steps, as if something below is rearranging the map. The site is marked “investigate later”.
        EveSrfSplashedExplodiumSea* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedExplodiumSea_00 //The surface has an unpleasant sheen and lazy bubbling. The survey recommends sampling it from a safe distance.
        EveSrfSplashedShores* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedShores_00 //Shallow water with a gentle gradient makes this a practical splash zone. Just don’t let the craft drift into anything colorful.
        EveSrfSplashedPolarLakes* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedPolarLakes_00 //Calm water and low chop, with an eerie stillness. It looks safe until you remember where you are.
        EveSrfSplashedPetrolLakes* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedPetrolLakes_00 //Dark, slick-looking liquid forms smooth patches that cling to everything. Recovery crews file a complaint preemptively.
        EveSrfSplashedSeaofAkron* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofAkron_00 //Long swells roll under the craft in slow, heavy waves. Buoyancy seems fine; morale is questionable.
        EveSrfSplashedSeaofNessus* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofNessus_00 //Ripples cross at odd angles, hinting at competing currents. The craft drifts sideways even when it swears it isn’t.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofTaniwha_00 //A wide, hazy expanse with intermittent surface scum. The site is usable, but nobody wants to open a hatch.
        EveSrfSplashedSeaofGigan* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofGigan_00 //Choppy water and sudden wave trains suggest gusty conditions. The splash site is “dynamic”.
        EveSrfSplashedSeaofRodan* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofRodan_00 //Strong winds carve streaks across the surface. The survey notes that staying upright will require active effort.
        EveSrfSplashedSeaofGojira* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofGojira_00 //Deep water with slow, powerful heave. The craft rides it out, but instruments look slightly offended.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofGhidorah_00 //Three distinct current bands show up in the drift pattern. The site is safe, but it keeps trying to spin the craft around.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_bd_SiteSurvey_EveSrfSplashedSeaofBagorah_00 //Uneven wave fields make for a bumpy splashdown zone. It’s survivable, just not dignified.

        GillySrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_GillySrfLandedLowlands_00 //The terrain is gently sloped and surprisingly open. The real hazard is bouncing away before you finish the checklist.
        GillySrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_GillySrfLandedMidlands_00 //A mix of small rises and loose-looking rocks. The site seems fine, as long as you remember the ground is optional here.
        GillySrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_GillySrfLandedHighlands_00 //Steeper slopes and awkward ridges make anchoring important. The survey concludes: bring harpoons, or at least strong opinions.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAdministration_00 //Site survey complete: flat, carpeted, and saturated with forms. Recommend landing only after obtaining Permit A-38.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAstronautComplex_00 //Terrain appears safe, but strewn with “training hazards” and snack debris. Marking as suitable for crews with high tumble tolerance.
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedBaikerbanur_00 //Survey notes excellent open space and exceptional line-of-sight to suspicious supervisors. Landing approved pending stamp alignment.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedBaikerbanurLaunchpad_00 //Surface is robust, fenced, and very loudly restricted. Recommend touchdown exactly inside the painted box you’re not allowed to stand in.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedCrawlerway_00 //Long, straight approach corridor with convenient crushed-rock texture. Ideal for landings, provided you don’t land on the crawler.
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedFlagPole_00 //Clear, symbolic, and guarded. Landing zone rated “acceptable,” but only if you salute the safety cones on final approach.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedIslandAirfield_00 //Wide, flat, and salty. Suitability high; paperwork moisture content higher.
        KerbinSrfLandedKSC* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedKSC_00 //Broad survey indicates the entire complex is “nominal,” except for all the places you’re not supposed to survey. Data is promptly reclassified as “visitor photography.”
        KerbinSrfLandedLaunchPad* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedLaunchPad_00 //Suitability: excellent. Hazards: everything else. Recommend landing after the pad stops venting, hissing, and judging you.
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedMissionControl_00 //Survey identifies a remarkably stable floor and a remarkably unstable mood. Landing is possible, but Control requests a countdown anyway.
        KerbinSrfLandedR&D* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&D_00 //Site appears safe until you notice the warning labels are also conducting experiments. Marked “conditionally suitable” with mandatory goggles and silence.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DCentralBuilding_00 //Clean lines, clear approaches, and a suspicious lack of loose parts. Recommend landing only after the committee approves the concept of landing.
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DCornerLab_00 //Survey imagery reveals a perfect landing spot hidden behind a curtain labeled “NOT A LANDING SPOT.” Suitability classified.
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DMainBuilding_00 //Spacious, organized, and full of rolling chairs that will absolutely migrate into your landing zone. Recommend wheel chocks for the chairs.
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DObservatory_00 //Flat platform with excellent sky view and terrible tolerance for vibrations. Landing allowed if you promise not to “be loud.”
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DSideLab_00 //Suitability high, unless the side door opens and releases an unscheduled test rig. Recommend landing between “just a quick test” announcements.
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DSmallLab_00 //The site is technically safe, but physically too small for anything you’re thinking. Recommend landing only micro-probes and micro-egos.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DTanks_00 //Large, open, and aggressively posted with “NO.” Marked as “excellent landing terrain” and “terrible career choice.”
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedR&DWindTunnel_00 //Flat pad with persistent crosswinds generated by the building itself. Recommend landing only when the wind tunnel agrees you are aerodynamic.
        KerbinSrfLandedRunway* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedRunway_00 //Perfectly prepared landing strip, shockingly suitable for landing. Staff demands you keep your “site survey” off the active approach lights.
        KerbinSrfLandedSPH* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPH_00 //Wide floor, scattered parts, and several aircraft pretending not to be in the way. Recommend landing after the engineers finish “just one more tweak.”
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHMainBuilding_00 //Survey shows excellent clearance until a crane starts moving for no reason. Recommend landing only when the crane supervisor is looking elsewhere.
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHRoundTank_00 //Smooth perimeter and excellent curvature for rolling away from your target. Marked “safe” if you like surprise slopes and insulation.
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHTanks_00 //Plenty of space, minimal clutter, maximum “don’t touch that.” Recommend landing with hands visible at all times.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedSPHWaterTower_00 //Ground is stable, damp, and directly under something that drips. Recommend landing with umbrellas and a signed waiver.
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationDishEast_00 //Clear, compacted gravel and a rotating dish that keeps trying to track your clipboard. Landing approved, but the dish will be watching.
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationDishNorth_00 //Site is stable and quiet until the dish slews, then everyone blames you. Recommend landing during scheduled “not slewing” hours.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationDishSouth_00 //Flat pad with excellent cable management and poor tolerance for curiosity. Landing suitable; questions not suitable.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedTrackingStationHub_00 //Indoor site survey reveals a perfect square of floor labeled “DO NOT PLACE THINGS HERE.” Naturally, it’s the safest spot.
        KerbinSrfLandedVAB* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVAB_00 //Vast, level interior with overhead hazards measured in “tons.” Recommend landing only after confirming the crane is not doing crane things.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABMainBuilding_00 //Survey finds ideal clearance, ideal lighting, and ideal reasons you shouldn’t be here. Landing approved pending “who let you in.”
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABPodMemorial_00 //Area is serene, unobstructed, and absolutely not a landing zone. Recommend observing respectfully from a safe, non-landing distance.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABRoundTank_00 //Clear space around the tank is tempting and heavily discouraged. Suitability rated “excellent” and “please stop.”
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABSouthComplex_00 //Ground is solid, noisy, and full of welding sparks that add “dynamic atmosphere.” Recommend landing with fireproof expectations.
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedVABTanks_00 //Survey indicates stable footing and a high concentration of “temporary” storage. Recommend landing only after the temporary becomes somewhere else.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedWoomerang_00 //Site survey reports plenty of space and a wind that keeps reclassifying “upwind.” Recommend landing with extra margin and fewer questions.

        KerbinSrfLandedIceCaps* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedIceCaps_00 //The site looks level, but the glare and hidden ridges suggest a “landing” might turn into a “sliding”.
        KerbinSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedHighlands_00 //Plenty of rolling terrain with lots of usable flats, as long as you avoid the tempting little slopes.
        KerbinSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedMountains_00 //The view is spectacular; the landing options are not. Recommend “somewhere else” with fewer rocks and more forgiveness.
        KerbinSrfLandedShores* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedShores_00 //Firm ground near the waterline looks ideal for recovery operations, assuming the tide agrees with the schedule.
        KerbinSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedMidlands_00 //Wide open and pleasantly boring—excellent for setting up a site without immediately regretting it.
        KerbinSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedLowlands_00 //Looks flat, but the ground appears soft in patches. Bring wide landing legs or a very understanding engineer.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridLowlands_00 //Hard, dusty terrain with good visibility and few obstacles. Expect grit in every hinge you own.
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridMidlands_00 //Broad plateaus broken by shallow cuts and dry channels—safe if you don’t pick a spot at the bottom of one.
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridHighlands_00 //The site is stable, but it’s rugged and uneven. Good for science, bad for “casual touchdowns”.
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedAridMountains_00 //Sharp relief and loose rock make this a fine place to practice abort procedures.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_SiteSurvey_KerbinSrfLandedWelcomeBackIsland_00 //A cozy little island with limited flat space. It’s welcoming right up until you realize you need room to turn around.
        KerbinSrfSplashedShores* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedShores_00 //Shallow surf conditions look manageable for splashdown and retrieval, assuming the waves don’t get ideas.
        KerbinSrfSplashedGreatLake* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedGreatLake_00 //Calm water and low chop suggest a very forgiving splash site. Mission Control calls it “suspiciously peaceful”.
        KerbinSrfSplashedInlandWater* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedInlandWater_00 //Narrower waters show noticeable currents. A stable float is recommended, along with a plan for not drifting into reeds.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedKreenwichSea_00 //Moderate swells and plenty of surface traffic—keep an eye out for wakes and curious boats.
        KerbinSrfSplashedArcticSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedArcticSea_00 //Cold water with scattered ice-like patches. The site is usable, but your toes will file a formal complaint.
        KerbinSrfSplashedForemansSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedForemansSea_00 //Wide open water with long rolling waves. Great for testing buoyancy; less great for keeping instruments dry.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedTriangulusSea_00 //Wave patterns suggest intersecting currents that could push a craft sideways. “Stable” may require active control.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedNorthernSea_00 //Wind-driven chop makes this an energetic splash zone. Recommend extra flotation and fewer loose snacks.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedSub-ArcticSea_00 //Slushy-looking water and floating debris imply borderline conditions.
        KerbinSrfSplashedEasternSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedEasternSea_00 //Bright glare and uneven wave trains complicate visual assessment, but the water state appears within safe limits.
        KerbinSrfSplashedWesternSea* = #JNSQscience_bd_SiteSurvey_KerbinSrfSplashedWesternSea_00 //Broad, deep water with manageable swells. A solid candidate for repeat operations and dramatic sunsets in the report.

        MunSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_MunSrfLandedPoles_00 //The low sun angle makes every bump look like a cliff. Marking “flat enough” requires squinting.
        MunSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_MunSrfLandedHighlands_00 //Jagged ridges and scattered boulders dominate the view. Excellent scenery, questionable touchdown prospects.
        MunSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_MunSrfLandedMidlands_00 //A sensible mix of gently rolling ground and small craters. Finally, a site that doesn’t look offended by landing legs.
        MunSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_MunSrfLandedLowlands_00 //The terrain looks smoother here, but the dust seems deep and eager to hide hazards just under the surface.
        MunSrfLandedPolarIceCraters* = #JNSQscience_bd_SiteSurvey_MunSrfLandedPolarIceCraters_00 //Bright floors and sharp shadows suggest hard, cold ground with tricky edges. The “safe zone” is smaller than it looks.
        MunSrfLandedExoticCraters* = #JNSQscience_bd_SiteSurvey_MunSrfLandedExoticCraters_00 //Strange shapes and uneven rims make this area hard to judge. The site survey recommends “interesting” over “reliable”.
        MunSrfLandedRareCraters* = #JNSQscience_bd_SiteSurvey_MunSrfLandedRareCraters_00 //Few craters, but the ones present are dramatic. Plenty of room—until you realize the walls are basically vertical.
        MunSrfLandedVoronoiCraters* = #JNSQscience_bd_SiteSurvey_MunSrfLandedVoronoiCraters_00 //The surface breaks into neat polygon patterns with ridged boundaries. Great for navigation; avoid landing on the “lines”.
        MunSrfLandedNotableCraters* = #JNSQscience_bd_SiteSurvey_MunSrfLandedNotableCraters_00 //Distinct landmarks everywhere for easy approach planning. Also plenty of ejecta fields waiting to chew up wheels.
        MunSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_MunSrfLandedMountains_00 //High relief gives good line-of-sight for comms, but the ground is steep and stubbornly non-cooperative.

        MinmusSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedPoles_00 //Pale, crusty ground with long shadows makes distance hard to judge. The site is stable, your eyes are not.
        MinmusSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedLowlands_00 //Broad, gently sloped terrain looks welcoming. The only concern is how “powdery” it appears in the shadows.
        MinmusSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedMidlands_00 //Mixed ridges and flats offer plenty of options. Pick a patch that isn’t secretly tilted and you’re golden.
        MinmusSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedHighlands_00 //Uneven mounds and sharp breaks in slope suggest careful piloting. The survey notes: “land, don’t bounce”.
        MinmusSrfLandedBasins* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBasins_00 //Wide, smooth basin floors look ideal for surface ops. It’s almost suspicious how perfect they are.
        MinmusSrfLandedBrownBasins* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownBasins_00 //Darker basin material reduces glare and improves contrast. The terrain seems friendly, just moodier.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownLowlands_00 //Flat expanses with darker patches make for easy navigation. The site survey approves, with a note about soft-looking soil.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownMidlands_00 //Rolling terrain with intermittent dark ridges. Plenty of usable sites if you avoid the crunchy-looking outcrops.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedBrownHighlands_00 //Rugged high ground with darker, sharper textures. Good for science, bad for relaxing.
        MinmusSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_MinmusSrfLandedMountains_00 //Tall spires and steep slopes leave few safe pads. Recommended only if the mission objective is “drama”.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedIceCaps_00 //Bright ground, hard crust, and treacherous glare. The “flat” spots are mostly optical illusions.
        DunaSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedHighlands_00 //Rocky rises and wind-carved ridges everywhere. Good visibility, poor forgiveness.
        DunaSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedMidlands_00 //Gently rolling terrain with enough open patches to call it “landable” without laughing.
        DunaSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedLowlands_00 //Wide plains and lots of dust. Looks smooth until you notice how many parts are actually shallow bowls.
        DunaSrfLandedCraters* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedCraters_00 //Plenty of crater floors to choose from—also plenty of rim slopes waiting to turn a landing into a slide.
        DunaSrfLandedRareCraters* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedRareCraters_00 //Fewer holes means longer, straighter approaches. The ground still looks eager to swallow landing feet.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedVoronoiCraters_00 //Polygonal ridges make nice navigation lines. Landing on the “seams” is strongly discouraged.
        DunaSrfLandedNotableCraters* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedNotableCraters_00 //Great landmark for targeting. The surrounding ejecta looks like it wants to sandblast your wheels.
        DunaSrfLandedExoticCraters* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedExoticCraters_00 //Odd shapes and uneven floors make the site hard to judge. “Interesting” is not the same as “safe”.
        DunaSrfLandedTrenches* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedTrenches_00 //Steep walls and shadowed bottoms. The survey recommends the rim—preferably the part not crumbling.
        DunaSrfLandedNotablePlains* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedNotablePlains_00 //Big, open, and pleasantly boring. A rare Duna site where “level” might actually mean level.
        DunaSrfLandedNotableMountains* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedNotableMountains_00 //Impressive relief and dramatic slopes. You can land here if your plan includes immediate regret.
        DunaSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedMountains_00 //Jagged terrain with scarce flats. Marked as “possible” only because Kerbals are persistent.
        DunaSrfLandedVolcano* = #JNSQscience_bd_SiteSurvey_DunaSrfLandedVolcano_00 //Dark, rough rock with sharp breaks in slope. The site seems stable, but your landing legs may disagree.

        IkeSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_IkeSrfLandedPoles_00 //Long shadows hide small ridges that feel enormous at touchdown speed. The best pad is the one you can actually see.
        IkeSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_IkeSrfLandedMountains_00 //Steep, blocky terrain with too many boulders. Great for panoramas, bad for staying upright.
        IkeSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_IkeSrfLandedMidlands_00 //A decent mix of flats and gentle slopes. Just remember Ike’s gravity makes “bounce” a lifestyle.
        IkeSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_IkeSrfLandedLowlands_00 //Broad, open ground that looks inviting. The regolith appears loose enough to make footprints a long-term commitment.
        IkeSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_IkeSrfLandedHighlands_00 //Broken ridges and uneven plates. There are landing spots, but they’re hiding between the bad ideas.

        EdnaSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_EdnaSrfLandedLowlands_00 //The flats look workable, but the light is so weak that every shadow feels like a trap.
        EdnaSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_EdnaSrfLandedMidlands_00 //Gently broken terrain with enough open patches for a safe touchdown—if you trust your depth perception out here.
        EdnaSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_EdnaSrfLandedHighlands_00 //Craggy rises and scattered blocks leave few comfortable pads. The site survey recommends “somewhere lower”.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_bd_SiteSurvey_EdnaSrfLandedPolarIceCraters_00 //Bright crater floors and sharp rims suggest hard footing and tricky edges. Don’t drift toward the shadows.
        EdnaSrfLandedWhites* = #JNSQscience_bd_SiteSurvey_EdnaSrfLandedWhites_00 //The ground is blindingly pale and deceptively smooth. It’s a great landing site until the glare makes you guess.

        DakSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_DakSrfLandedLowlands_00 //A broad, lumpy “flat” that’s as good as it gets on a potato-shaped world. Touch down gently and don’t sneeze.
        DakSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_DakSrfLandedMidlands_00 //Uneven plates and shallow slopes offer usable spots—assuming you brought something to keep the craft from wandering off.
        DakSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_DakSrfLandedHighlands_00 //Narrow ridges and awkward bulges make for dramatic approaches. The survey notes: anchor points strongly encouraged.

        DresSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_DresSrfLandedPoles_00 //Low sun angles turn small bumps into big surprises. The safest-looking pad is the one with the fewest shadows.
        DresSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_DresSrfLandedHighlands_00 //Rocky uplands and crater rubble everywhere. Good for geology, bad for landing legs.
        DresSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_DresSrfLandedMidlands_00 //Wide, quiet terrain with tolerable slopes. The site is approved for operations and approved for boredom.
        DresSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_DresSrfLandedLowlands_00 //Smoother ground with fine dust that looks deep enough to hide regrets. Bring wide feet and patience.
        DresSrfLandedCanyon* = #JNSQscience_bd_SiteSurvey_DresSrfLandedCanyon_00 //Steep walls and broken floors leave little margin for error. The survey recommends the rim, not the dramatic drop.

        LaytheSrfLandedShores* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedShores_00 //Firm-looking ground with easy access to the water. A sensible site—until the waves try to “help”.
        LaytheSrfLandedShallows* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedShallows_00 //The terrain fades into water gradually, which is great for recovery and terrible for surprise splashes.
        LaytheSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedHighlands_00 //Elevated ground offers clear approaches and good sightlines. The rocks look eager to test your landing legs.
        LaytheSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedMountains_00 //Spectacular relief and very few forgiving flats. The site survey recommends “elsewhere, preferably lower”.
        LaytheSrfLandedIceCaps* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedIceCaps_00 //Bright, hard-looking crust with nasty glare. The safest patch is never the one you can see clearly.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedEnclosedFaults_00 //Fractured ground with sharp edges and sudden drops. Marked as “scientifically exciting, operationally rude”.
        LaytheSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedLowlands_00 //Broad plains with gentle slopes. If the soil stays solid, this is practically luxury.
        LaytheSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_LaytheSrfLandedMidlands_00 //Rolling terrain with plenty of workable pads. Pick the boring spot and you’ll be happiest.
        LaytheSrfSplashedShores* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedShores_00 //Shallow surf makes a forgiving splash zone. Just keep the craft pointed away from the beach.
        LaytheSrfSplashedShallows* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedShallows_00 //Calm water and low chop look ideal for repeated operations—assuming you don’t drift onto something pointy.
        LaytheSrfSplashedInlandWater* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedInlandWater_00 //Confined waters show visible currents. The site is usable, but it keeps trying to move your “landing site”.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedKrenwichSea_00 //Wide open water with steady swells. Good buoyancy testing, questionable snack stability.
        LaytheSrfSplashedArcticSea* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedArcticSea_00 //Cold, restless water with an unpleasant edge-of-ice vibe. Recovery crews request thicker gloves.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedJoolwardSea_00 //Long, rolling wave trains suggest persistent winds. The site is safe, but never still.
        LaytheSrfSplashedPolwardSea* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedPolwardSea_00 //Choppy surface and streaked wave patterns hint at shifting weather. Splashdowns here will be memorable.
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_bd_SiteSurvey_LaytheSrfSplashedEnclosedFaults_00 //Tight water pockets bordered by broken ground. Easy to splash, hard to stay put.

        VallSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_VallSrfLandedPoles_00 //Low sun and bright ice make every shadow suspicious. The survey concludes: land where you can actually see the ground.
        VallSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_VallSrfLandedHighlands_00 //Rough, icy ridges with scattered rubble. Great traction—until a slope reminds you it exists.
        VallSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_VallSrfLandedMidlands_00 //A reasonable balance of flats and gentle rises. Finally, a site that doesn’t feel personally hostile.
        VallSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_VallSrfLandedLowlands_00 //Smooth-looking ice plains with subtle undulations. It’s probably safe, which is exactly why it feels ominous.
        VallSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_VallSrfLandedMountains_00 //Steep, jagged terrain with scarce level pads. Approved only for missions that enjoy unnecessary difficulty.
        VallSrfLanded* = #JNSQscience_ValOnVall_05 // You rehearse the landing callouts carefully: “Vall. With two Ls.” Nobody listens.

        TyloSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_TyloSrfLandedPoles_00 //Stark lighting turns small bumps into big surprises. The site is fine if you don’t trust anything you can’t measure twice.
        TyloSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_TyloSrfLandedMountains_00 //Brutal slopes and blocky outcrops everywhere. The survey recommends a flatter hobby, like orbital science.
        TyloSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_TyloSrfLandedHighlands_00 //Elevated ground with broken plates and boulders. Good visibility, poor comfort, excellent knee pain.
        TyloSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_TyloSrfLandedMidlands_00 //Broad terrain with manageable slopes. A rare Tylo site that reads as “landable” without sarcasm.
        TyloSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_TyloSrfLandedLowlands_00 //Wide flats that look inviting right up until you remember Tylo’s gravity doesn’t do second chances.

        BopSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_BopSrfLandedPoles_00 //Lumpy ground with awkward angles and weird shadows. Anchoring is less a suggestion and more a lifestyle.
        BopSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_BopSrfLandedMountains_00 //Sharp ridges on a tiny world make for dramatic approaches. The site survey rates it “spectacularly uncooperative”.
        BopSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_BopSrfLandedLowlands_00 //Relatively smooth patches between boulder clusters. Touch down gently, then pretend you meant to stop exactly there.
        BopSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_BopSrfLandedMidlands_00 //Uneven terrain with plenty of small slopes to surprise you. The best site is the one that doesn’t roll you away.
        BopSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_BopSrfLandedHighlands_00 //High ground offers good line-of-sight, and terrible footing. The survey notes: bring patience and restraint.

        PolSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_PolSrfLandedPoles_00 //Soft-looking, rumpled terrain with deceptive dips. The site is “safe” as long as you don’t bounce.
        PolSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_PolSrfLandedLowlands_00 //Broad, gentle contours and fewer sharp hazards. A good candidate for surface ops and cautious optimism.
        PolSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_PolSrfLandedMidlands_00 //Wavy ridges and shallow bowls make targeting tricky. Still, there are plenty of workable flats hiding in plain sight.
        PolSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_PolSrfLandedHighlands_00 //Spindly rises and lumpy ground with odd textures. The survey recommends a slow approach and a slower touchdown.
        PolSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_PolSrfLandedMountains_00 //Steeper ridges with crumbly-looking edges. Marked “landable” only because the alternative is admitting defeat.

        KrelSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_KrelSrfLandedLowlands_00 //Pale flats with surprisingly clean lines. The “veins” look shallow here—probably safe, probably.
        KrelSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_KrelSrfLandedMidlands_00 //Rolling ground cut by faint striations, like the surface is trying to wrinkle itself. Choose a spot between the lines.
        KrelSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_KrelSrfLandedHighlands_00 //Ridges and fractured plates dominate the view. Great for drama, less great for landing legs.
        KrelSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_KrelSrfLandedPoles_00 //Long shadows hide sharp relief and deep pockets. The site is acceptable if you trust what you can’t see.

        AdenSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_AdenSrfLandedLowlands_00 //Dusty, brown plains with wide open approaches. The ground looks firm, but the color suggests it will cling to everything.
        AdenSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_AdenSrfLandedMidlands_00 //Gentle rises and shallow basins provide plenty of options. Pick the boring patch and call it a win.
        AdenSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_AdenSrfLandedHighlands_00 //Broken terrain and scattered boulders interrupt otherwise decent flats. Good sites exist, between the obstacles.
        AdenSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_AdenSrfLandedMountains_00 //Steep slopes and jagged outcrops leave little room for error. Recommended only for very confident pilots.
        AdenSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_AdenSrfLandedPoles_00 //Low lighting turns tiny bumps into large surprises. The survey advises landing where your shadows behave.

        HuygenSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedLowlands_00 //Smooth, hazy plains that look soft and recently “rearranged.” Safe enough, assuming it’s not a giant drift.
        HuygenSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedMidlands_00 //Subtle ridges and shallow channels suggest slow surface flow. Plenty of pads, but verify the tilt twice.
        HuygenSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedHighlands_00 //Rougher ground with sharper texture breaks through the haze. The site is workable, just less forgiving.
        HuygenSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedMountains_00 //Craggy slopes and wind-carved edges make approach planning essential. Landing here is a choice, not an accident.
        HuygenSrfLandedPeaks* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPeaks_00 //Excellent line-of-sight and terrible parking. The survey labels it “comms-friendly, legs-unfriendly.”
        HuygenSrfLandedPolarLowlands* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPolarLowlands_00 //A pale crust with irregular pits and brittle-looking patches. It seems stable until you imagine it cracking.
        HuygenSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPoles_00 //Blinding glare and deep shadow bands. The safest spot is always the one you can’t quite confirm.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedPolarHighlands_00 //Ridged high ground with sharp breaks in slope. Good visibility above the haze, bad mercy at touchdown.
        HuygenSrfLandedShores* = #JNSQscience_bd_SiteSurvey_HuygenSrfLandedShores_00 //Wet-looking ground with messy edges and soft gradients. Fine for landing—if you don’t mind sinking a little.
        HuygenSrfSplashedShores* = #JNSQscience_bd_SiteSurvey_HuygenSrfSplashedShores_00 //Shallow, gentle waves with a suspiciously calm surface. Buoyancy should be fine; contamination will be forever.
        HuygenSrfSplashedMethaneLakes* = #JNSQscience_bd_SiteSurvey_HuygenSrfSplashedMethaneLakes_00 //Dark, glassy liquid with slow ripples. The site is “splashable,” but nobody wants to open the hatch.

        RigaSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_RigaSrfLandedLowlands_00 //Broad, brown plains with oddly familiar shapes. A strong candidate for surface operations and future “we were here” photos.
        RigaSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_RigaSrfLandedMidlands_00 //Rolling terrain with long, navigable stretches. Plenty of safe pads, and room to drive without immediate regret.
        RigaSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_RigaSrfLandedHighlands_00 //Elevated plates broken by rocky seams. Land on the plates, avoid the seams, pretend it was the plan.
        RigaSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_RigaSrfLandedMountains_00 //Rugged slopes and blocky outcrops everywhere. A site for geology, not comfort.
        RigaSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_RigaSrfLandedPoles_00 //Cold-looking ground with harsh contrast and hidden dips. The survey recommends extra caution and fewer heroic maneuvers.

        TalosSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_TalosSrfLandedLowlands_00 //Dark, quiet flats with scattered impact scars. It looks safe, which out here feels like a trick.
        TalosSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_TalosSrfLandedMidlands_00 //Uneven ground with old crater rims softened by time. Good landing choices exist if you avoid the tempting “almost flat” spots.
        TalosSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_TalosSrfLandedHighlands_00 //Jagged ridges and broken plates suggest a long history of being hit and never forgiving it. Touch down gently.
        TalosSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_TalosSrfLandedMountains_00 //Steep relief and sharp edges make this an engineering challenge disguised as a landing site.
        TalosSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_TalosSrfLandedPoles_00 //Shadowed pockets and bright crusty patches alternate rapidly. The site is viable, provided you trust instruments over eyes.

        EelooSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_EelooSrfLandedPoles_00 //The low sun turns every ripple into a menace. The flattest-looking spot is the one with the least shadow.
        EelooSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_EelooSrfLandedHighlands_00 //Hard, bright ground with scattered broken ridges. Plenty of solid footing, but few forgiving pads.
        EelooSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_EelooSrfLandedMidlands_00 //Gently rolling ice fields with shallow pits. A sensible site, assuming “level” isn’t just glare.
        EelooSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_EelooSrfLandedLowlands_00 //Wide, smooth expanses that look perfect for operations. The dusting of frost suggests slippery surprises.
        EelooSrfLandedCanyon* = #JNSQscience_bd_SiteSurvey_EelooSrfLandedCanyon_00 //Steep walls and sharp turns plunge into shadow. The survey recommends landing on the rim, not in the drama.

        CelesSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_CelesSrfLandedLowlands_00 //Broad, quiet flats with a brittle look. It’s landable, but the surface feels like it could crack under attitude.
        CelesSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_CelesSrfLandedMidlands_00 //Rolling terrain with shallow scars and scattered blocks. Plenty of workable sites if you avoid the rough patches.
        CelesSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_CelesSrfLandedHighlands_00 //Elevated plates broken by jagged seams. Land on the plates, not the seams—unless you enjoy surprises.
        CelesSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_CelesSrfLandedMountains_00 //Steep slopes and blocky outcrops everywhere. The site survey labels it “impressive” and underlines “unforgiving”.
        CelesSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_CelesSrfLandedPoles_00 //Harsh contrast and deep shade pockets make this hard to read. Trust instruments, not eyeballs.

        TamSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_TamSrfLandedLowlands_00 //Lumpy “flats” on an irregular world. Touch down gently, then do everything possible to stay down.
        TamSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_TamSrfLandedMidlands_00 //Uneven ground with frequent shallow bowls. The best landing site is the one that doesn’t roll away.
        TamSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_TamSrfLandedHighlands_00 //Sharp ridges and rough textures dominate the view. The survey recommends a low approach and a lower ego.
        TamSrfLandedTwinCraters* = #JNSQscience_bd_SiteSurvey_TamSrfLandedTwinCraters_00 //Two overlapping basins make navigation easy and slopes everywhere. Aim for the shared floor, not the rims.
        TamSrfLandedCraters* = #JNSQscience_bd_SiteSurvey_TamSrfLandedCraters_00 //Crater-on-crater terrain with lots of rubble. Safe pads exist, but they’re hiding between bad ideas.
        TamSrfLandedPockmarks* = #JNSQscience_bd_SiteSurvey_TamSrfLandedPockmarks_00 //Countless tiny pits pepper the surface like a sponge. Landing legs may find a hole faster than you find “level”.

        HamekSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_HamekSrfLandedLowlands_00 //Dark, oddly colored flats with subtle ripples. It looks stable, which is exactly why it feels suspicious.
        HamekSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_HamekSrfLandedMidlands_00 //Rolling ground with patchy textures and gentle breaks in slope. A good candidate for surface ops if you pick the boring spot.
        HamekSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_HamekSrfLandedHighlands_00 //Broken ridges and sharp edges rise out of the gloom. Great for science, less great for parking.
        HamekSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_HamekSrfLandedPoles_00 //Pale patches and long shadows alternate rapidly. The survey recommends landing where the shadows aren’t plotting.

        NaraSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedLowlands_00 //The lowlands look smooth under the dense, freezing air. “Flat” is believable right up until the frost starts shifting.
        NaraSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedMidlands_00 //Gentle rises break up wide plains in the midlands. A solid candidate for operations, assuming your gear enjoys pressure.
        NaraSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedHighlands_00 //The highlands are firmer and rougher, with ridges that peek through the haze. Plenty of footing, fewer comforts.
        NaraSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedMountains_00 //Jagged slopes and sharp relief make landing options scarce. Great views; terrible parking.
        NaraSrfLandedPolarLowlands* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedPolarLowlands_00 //The polar lowlands are pale and glassy-looking. The site seems level, but the surface screams “slippery”.
        NaraSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedPoles_00 //Blinding glare and deep shadow pockets alternate rapidly. Trust instruments, not eyeballs, for final approach.
        NaraSrfLandedPolarHighlands* = #JNSQscience_bd_SiteSurvey_NaraSrfLandedPolarHighlands_00 //Raised polar terrain forms uneven terraces and ridges. Stable enough, if you don’t pick a crest.

        AmosSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_AmosSrfLandedLowlands_00 //A rare, gentle patch of ground on Amos. Touch down softly: this moon loves to turn “landing” into “bouncing”.
        AmosSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_AmosSrfLandedMidlands_00 //The midlands are lumpy and irregular, like the surface couldn’t decide on a shape. Anchoring is recommended, loudly.
        AmosSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_AmosSrfLandedHighlands_00 //Broken plates and scattered boulders dominate the highlands. There are landing sites, between the bad ideas.
        AmosSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_AmosSrfLandedMountains_00 //Steep ridges and awkward slopes leave little margin. The survey labels it “possible” and underlines “why”.
        AmosSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_AmosSrfLandedPoles_00 //Long shadows hide small ridges that become big surprises at touchdown speed. Choose the spot you can actually see.

        EnonSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_EnonSrfLandedLowlands_00 //Bright, icy plains offer wide open approaches. The glare is intense enough to make you question depth perception.
        EnonSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_EnonSrfLandedMidlands_00 //Shallow cracks and subtle ridges crisscross the midlands. It’s landable, if you avoid the “almost flat” seams.
        EnonSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_EnonSrfLandedHighlands_00 //Raised ice ridges and rougher texture suggest harder footing. Good traction, worse leveling.
        EnonSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_EnonSrfLandedPoles_00 //Shadowed polar ground looks deceptively smooth. The safest pad is the one that doesn’t vanish in darkness.

        PraxSrfLandedLowlands* = #JNSQscience_bd_SiteSurvey_PraxSrfLandedLowlands_00 //The lowlands look calm and quietly stable. Of course, that’s exactly what makes everyone suspicious.
        PraxSrfLandedMidlands* = #JNSQscience_bd_SiteSurvey_PraxSrfLandedMidlands_00 //Rolling terrain with shallow pits gives plenty of options. Pick the boring patch and call it a victory.
        PraxSrfLandedHighlands* = #JNSQscience_bd_SiteSurvey_PraxSrfLandedHighlands_00 //The highlands are fractured and uneven, with hard-edged breaks in slope. Land on the plates, not the cracks.
        PraxSrfLandedMountains* = #JNSQscience_bd_SiteSurvey_PraxSrfLandedMountains_00 //Rugged ridges and steep faces turn site selection into an endurance test. The survey recommends restraint.
        PraxSrfLandedPoles* = #JNSQscience_bd_SiteSurvey_PraxSrfLandedPoles_00 //Frosted ground and harsh contrast make judging slopes difficult. Instruments agree it’s safe; they sound nervous.
    }
}