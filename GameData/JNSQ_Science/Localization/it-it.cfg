        #JNSQscience_bd_orbitalScope_TamInSpaceLowCraters_00 = I crateri sovrapposti si impilano in una texture rumorosa: il software di imaging inizia a disegnare cerchi sopra altri cerchi per riuscire a reggere.
        #JNSQscience_bd_orbitalScope_TamInSpaceLowPockmarks_00 = Cavità punteggiano il terreno in grappoli fitti, come se Tam avesse preso una brutta dose di impatti e non si fosse mai ripreso.
