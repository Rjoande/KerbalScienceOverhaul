        #GEPscience_bd_SiteSurvey_SucellusSrfLandedTropicalMidlands_00 = These midlands are darker and slightly less cold, which is a suspicious kind of “nice” out here. You pick a site with good relay geometry and minimal time spent outside.
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedTemperateMidlands_00 = The ridges are orderly, almost engineered, until you zoom in and see they’re just erosion being dramatic. You mark a plateau for operations and a fallback for when the plateau isn’t real.
        #GEPscience_bd_SiteSurvey_SucellusSrfLandedHighlands_00 = The high ground gives you a wide view of a very empty world under a tired red sun. The images suggest solid footing, and the dosimeter suggests you keep moving anyway.
