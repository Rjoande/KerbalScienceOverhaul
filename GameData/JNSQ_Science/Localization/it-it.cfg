        #JNSQscience_bd_poke_RigaSrfLandedMountains_00 = Un poke simbolico, un secco "clink" e un promemoria: le montagne sono fatte di montagna.
        #JNSQscience_bd_poke_RigaSrfLandedPoles_00 = La regolite fredda è densa e ostinata: la sonda segnala alta resistenza e scarso entusiasmo.
        #JNSQscience_bd_poke_TalosSrfLandedLowlands_00 = La polvere colorata è profonda e sciolta: la sonda affonda più del dovuto prima di incontrare resistenza.
