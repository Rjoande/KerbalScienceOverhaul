        #JNSQscience_evaReport_DunaFlyingLowHighlands_00 = The air barely helps at all; you’re riding jets and stubbornness. The high ground rolls beneath you like a red wilderness waiting for its first flag.
        #JNSQscience_evaReport_DunaFlyingLowMidlands_00 = The midlands drift by in endless shades of burnt orange. You catch yourself picking spots for roads before you remember you’re still just a lone speck in the sky.
        #JNSQscience_evaReport_DunaFlyingLowLowlands_00 = The lowlands look flat enough to build a runway on, if you can keep the dust from eating everything. The frontier is wide open and completely unforgiving.
        #JNSQscience_evaReport_DunaFlyingLowCraters_00 = From up here the crater rims form dark rings in the sand, ancient scars you can’t ignore. You feel small, then stubborn, then small again.
        #JNSQscience_evaReport_DunaFlyingLowRareCraters_00 = A single crater breaks the monotony like a promise of shelter. You circle once and imagine a habitat tucked inside its walls, safe from the planet’s moods.
        #JNSQscience_evaReport_DunaFlyingLowVoronoiCraters_00 = The ground is pocked in a repeating pattern, like the planet is wearing armor. You get a brief, primal urge to leave before you decide it’s probably fine.
        #JNSQscience_evaReport_DunaFlyingLowNotableCraters_00 = The big crater below has layered walls and a shadowed floor that looks deeper than it should. You can almost hear future drills chewing into those exposed seams.
        #JNSQscience_evaReport_DunaFlyingLowExoticCraters_00 = An icy bowl gleams against the red like a wound that never healed. You mark it as “supplies” and try not to think about how cold it will feel up close.
        #JNSQscience_evaReport_DunaFlyingLowMountains_00 = Peaks slide past close enough to feel personal. Something in you wants to climb them all, just to prove this planet can’t keep its heights.
        #JNSQscience_evaReport_DunaFlyingLowVolcano_00 = Black rock breaks through the red dust like old bones. You drift over it in silence, feeling like you’re reading the planet’s oldest, harshest chapter.
        #JNSQscience_evaReport_DunaInSpaceLowRareCraters_00 = A single crater sits alone in the rust like a scar with no other wounds nearby. You mark it as a future landmark—the kind pioneers navigate by when everything else looks the same.
        #JNSQscience_evaReport_DunaInSpaceLowVoronoiCraters_00 = The surface is tiled with repeating pits, like the world grew scales and then forgot why. Your instincts whisper “ancient” while your mission clock insists “keep observing”.
        #JNSQscience_evaReport_DunaInSpaceLowNotableCraters_00 = The big crater’s rim throws a shadow that looks deep enough to swallow your sense of scale. You can almost see the layers from here, and you wonder what a colony could mine from that exposed history.
        #JNSQscience_evaReport_DunaInSpaceLowExoticCraters_00 = A bright, strange patch gleams inside the crater, refusing to be the right shade of red. You tag it as “unusual deposits” and feel that primal pull of resources—and the equal pull of caution.
        #JNSQscience_evaReport_DunaInSpaceLowMountains_00 = Jagged ranges roll beneath you like frozen waves of stone. Hanging here with nothing but a jetpack and the void, you feel the urge to climb anyway—just to prove you can.
        #JNSQscience_evaReport_DunaInSpaceLowVolcano_00 = Dark volcanic ground cuts through the rust like old burn marks that never healed. You hover over it and swear the planet still remembers fire, waiting for the next brave mistake to wake it.

