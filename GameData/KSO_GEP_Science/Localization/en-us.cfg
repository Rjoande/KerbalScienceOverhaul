        #GEPscience_bd_SiteSurvey_NodensSrfLandedTemperateLowlands_00 = Gentle hills and open flats show up clearly in the images, a rare kindness this far from home. The site is flagged “ideal,” with an asterisk about local weather moods.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTropicalMidlands_00 = The midlands are broken up by ridgelines that could hide anything from boulders to disappointment. You approve a site with good drainage and better line-of-sight.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTemperateMidlands_00 = Rolling terrain offers stable-looking platforms and sensible approaches. The survey suggests this region for long-term work—assuming the planet agrees with us.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedHighlands_00 = The highlands are rugged, but the rock looks solid and the horizons are wide. You mark a plateau for science, and a nearby slope for regret.
        #GEPscience_bd_SiteSurvey_NodensSrfLandedTundra_00 = Pale ground and long shadows make subtle dips look deep and deep dips look endless. The survey recommends bright markers, warm gloves, and very clear landing rules.
