        #JNSQscience_crewReport_HuygenFlyingLowMethaneLakes_00 = The lake below reflects almost nothing. It is like staring into a polished shadow.
        #JNSQscience_crewReport_HuygenFlyingLowMethaneLakes_01 = A faint sheen on the surface catches the light. You quietly move all ignition switches to 'no'.
        #JNSQscience_crewReport_HuygenFlyingHigh_00 = High above the thick air, the world becomes a smooth amber ball with a soft, glowing rim.
        #JNSQscience_crewReport_HuygenFlyingHigh_01 = The cabin is quiet except for occasional static. You suspect Huygen is trying to keep its secrets even from radio waves.
        #JNSQscience_crewReport_HuygenInSpaceLow_00 = From low orbit, Huygen looks like a sealed lantern: bright edge, dark center, and a haze you cannot see through.
        #JNSQscience_crewReport_HuygenInSpaceLow_01 = You watch cloud bands drift slowly. Everything here moves as if time is thicker too.
