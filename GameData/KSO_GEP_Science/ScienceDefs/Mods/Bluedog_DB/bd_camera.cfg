		SucellusInSpaceLowBasins* = #GEPscience_bd_camera_SucellusInSpaceLowBasins_00 // From low orbit, basins appear as dark bowls with lighter rims. You start tagging candidates for “interesting stuff” and “possible resources,” then remember you can’t carry any of it.
