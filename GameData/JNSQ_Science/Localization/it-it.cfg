        #JNSQscience_gravityScan_NaraInSpaceLowHighlands_01 = Il gravitometro suggerisce un sollevamento ampio sostenuto dal basso. Qualcuno al CSK sussurra "mantello", come fosse una storia di fantasmi.
        #JNSQscience_gravityScan_NaraInSpaceLowMountains_00 = Le montagne tirano la nave quanto basta da essere misurabili in tempo reale. Guardi la navball sussultare e decidi che gli snack possono aspettare.
