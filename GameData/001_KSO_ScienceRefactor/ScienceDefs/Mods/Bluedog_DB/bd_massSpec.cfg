@EXPERIMENT_DEFINITION:HAS[#id[bd_massSpec]]
{
    @title = #ScienceRefactor_bd_massSpec_title // Mass Spectrum Analysis
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_massSpec_default_00 // You analyze the composition of the atmosphere as it passes through the spectrometer.

        SrfLanded* = #ScienceRefactor_bd_massSpec_default_01 // Various elements such as nitrogen, carbon and oxygen are present in your readings along with other trace elements.
        SrfLanded* = #ScienceRefactor_bd_massSpec_default_02 // The slight variations in elemental levels here will require a longer term analysis but at least you got a basic reading.
        
        InSpace* = #ScienceRefactor_bd_massSpec_default_01 // Various elements such as nitrogen, carbon and oxygen are present in your readings along with other trace elements.
        InSpace* = #ScienceRefactor_bd_massSpec_default_02 // The slight variations in elemental levels here will require a longer term analysis but at least you got a basic reading.
        
        KerbinInSpaceLow* = #ScienceRefactor_bd_massSpec_KerbinInSpaceLow_00 // Strong lines of oxygen and nitrogen combine with trace readings of carbon dioxide, ozone, hydrogen and many others.
        KerbinSrfLandedLaunchPad* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedLaunchPad_00 // Heavy lines of oxygen, methane, complex hydrocarbons and numerous corrosive and poisonous substances from fuel leaks are present in this location.
        KerbinSrfLanded* = #ScienceRefactor_bd_massSpec_KerbinSrfLanded_00 // The oxygen and nitrogen that is ever present is joined by a strong carbon line.
        KerbinSrfLandedIceCaps* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedIceCaps_00 // Heavy levels of water are present in the readings. Not surprising since you're landed on a big chunk of water...
        KerbinSrfLandedMountains* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedMountains_00 // Metals of various types show up in trace quantities from the exposed mountainsides and raised rock from below the surface of the planet.
        KerbinSrfLandedBadlands* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedBadlands_00 // Some small levels of actual radioactive isotopes show up in minute quantities here. Could be worth more checking?
        KerbinSrfLandedRunway* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedRunway_00 // The heavy pollution of leaked jet fuel nearly clogs the intake sensor making reading here very difficult.
        KerbinSrfLandedFlagPole* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedFlagPole_00 // It's a flag pole. What kind of actual science do you think it's going to give you?
        KerbinSrfLandedTrackingStation* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedTrackingStation_00 // Look at the satellite dish!  It's made of metal but the spectrometer doesn't detect it...hmmm...kick it!
        KerbinSrfLandedVAB* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedVAB_00 // This large metal building houses the legendary Kraken. The spectrometer refuses to give any readings here out of fear.
        KerbinSrfLandedR&D* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedR&D_00 // Strong levels of methane and a lingering odor is detected from all the decaying BS2.
        KerbinSrfLandedAdministration* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedAdministration_00 // A complex form of BS known as Poly(TiCaLi)-BS2 is strongly detected near this location.
        KerbinSrfLandedAstronautComplex* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedAstronautComplex_00 // High levels of neon are present, but that could be the gigantic sign advertising Jeb's new nightclub inside the complex that could be throwing off the results.
        KerbinSrfLandedSPH* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedSPH_00 // The VAB is rumored to be the home of the Kraken but it summers at the SPH. The spectrometer doesn't work here either.
        KerbinSrfLandedMissionControl* = #ScienceRefactor_bd_massSpec_KerbinSrfLandedMissionControl_00 // Rumors abound that money is paid for results in this locaiton. You get the most precise readings of BS yet.

        MunInSpaceLow* = #ScienceRefactor_bd_massSpec_MunInSpaceLow_00 // Carbonate and silicate dust particles from the Mun's surface show as strong lines on the results from this altitude.
        MunSrfLanded* = #ScienceRefactor_bd_massSpec_MunSrfLanded_00 // Various hydroxides, oxides and nitrates are detectable behind the ever present signs of carbonate and silicate deposits.
        MunSrfLandedNorthernBasin* = #ScienceRefactor_bd_massSpec_MunSrfLandedNorthernBasin_00 // Ino- and sorosilicate detections appear stronger in the basin than without.
        MunSrfLandedPolarCrater* = #ScienceRefactor_bd_massSpec_MunSrfLandedPolarCrater_00 // High levels of irridium left over from the impact are detectable in all samples from this crater.
        MunSrfLandedHighlandCraters* = #ScienceRefactor_bd_massSpec_MunSrfLandedHighlandCraters_00 // Isotope readings combined with the spectroscopy show this region to be slightly younger than most others.
        MunSrfLandedEastFarsideCrater* = #ScienceRefactor_bd_massSpec_MunSrfLandedEastFarsideCrater_00 // Trace readings of water are detected in some of the darker regions of the large crater.
        MunSrfLandedPoles* = #ScienceRefactor_bd_massSpec_MunSrfLandedPoles_00 // While not overwhelming, water can be detected in the polar readings. Further study would be needed to determine if these are viable for colony support.

        MinmusInSpaceLow* = #ScienceRefactor_bd_massSpec_MinmusInSpaceLow_00 // Numerous hydrates and high levels of water can be easilyly detected at these altidudes.
        MinmusSrfLanded* = #ScienceRefactor_bd_massSpec_MinmusSrfLanded_00 // As has long been expected, high levels of frozen water, nitrogen and methane are present along with strong salt lines.
        MinmusSrfLandedGreaterFlats* = #ScienceRefactor_bd_massSpec_MinmusSrfLandedGreaterFlats_00 // Readings from here show that several different major salts make up the bulk of the salinization lines present in the spectroscopic readings.
        MinmusSrfLandedLesserFlats* = #ScienceRefactor_bd_massSpec_MinmusSrfLandedLesserFlats_00 // Strangely the salinity is not as strong here allowing more precise chemistry makeups to be identified from this location.

        SunInSpaceLow* = #ScienceRefactor_bd_massSpec_SunInSpaceLow_00 // The hydrogen and helium lines nearly overwhelm the detectors at this point which are already unstable due to high heat levels.

        MohoInSpaceLow* = #ScienceRefactor_bd_massSpec_MohoInSpaceLow_00 // It appears the detectors caught a whiff of iron vapor it's so hot here.
        MohoSrfLanded* = #ScienceRefactor_bd_massSpec_MohoSrfLanded_00 // Surface readings are littered with isotopes deposited by the sun but high levels of carbonates and silicates are present behind those results.

        EveInSpaceLow* = #ScienceRefactor_bd_massSpec_EveInSpaceLow_00 // VERY heavy levels of carbon dioxide are present along with signigicant complex hydrocarbons
        EveSrfLanded* = #ScienceRefactor_bd_massSpec_EveSrfLanded_00 // Once the carbon dioxide is filtered out of the readings, ethane along with other complex, possibly volatile hydrocarbons

        GillyInSpaceLow* = #ScienceRefactor_bd_massSpec_GillyInSpaceLow_00 // Carbon, oxygen and carbon dioxide are all present in the readings along with the expected signs of silicates and carbonates
        GillySrfLanded* = #ScienceRefactor_bd_massSpec_GillySrfLanded_00 // Once landed, the levels of carbon spike considerably higher helping to confirm the theory that Gilly's core is mostly carbon

        DunaInSpaceLow* = #ScienceRefactor_bd_massSpec_DunaInSpaceLow_00 // Low levels of carbon dioxide and traces of nitrogen and methane are detected by the detectors
        DunaSrfLanded* = #ScienceRefactor_bd_massSpec_DunaSrfLanded_00 // Atmospheric carbon dioxide is easily detectable from the surface and additional readings show several isotopes that were unexpected.

        IkeInSpaceLow* = #ScienceRefactor_bd_massSpec_IkeInSpaceLow_00 // Ike is so large and orbits so close to Duna the planet's carbon dioxide atmosphere litters the spectroscopic results with carbon and oxygen detections.
        IkeSrfLanded* = #ScienceRefactor_bd_massSpec_IkeSrfLanded_00 // Molecular carbon and oxygen are still heavily detected but surface results provide strong readings geologists will be able to use to determine Ike's chemical makeup.

        DresInSpaceLow* = #ScienceRefactor_bd_massSpec_DresInSpaceLow_00 // Spectroscopic results indicate a large presence of silicate and carbonate dust around the planet possibly coming from the local asteroid ring.
        DresSrfLanded* = #ScienceRefactor_bd_massSpec_DresSrfLanded_00 // Surface scans show Dres contains the presence of water ice throughout its crust and seem to indicate most cratering on the planet likely was the result of impacts from the local asteroid field.

        JoolInSpaceLow* = #ScienceRefactor_bd_massSpec_JoolInSpaceLow_00 // Strong detection lines of hydrogen and helium are present along with a number of H/He isotopes. A fair amount of ammonia was expected but was not found.
        LaytheInSpaceLow* = #ScienceRefactor_bd_massSpec_LaytheInSpaceLow_00 // Water, oxygen and various salts were expected. The presence of trace amounts of chlorine was not.
        LaytheSrfLanded* = #ScienceRefactor_bd_massSpec_LaytheSrfLanded_00 // Surface scans confirm the waters of Laythe to contain high levels of salinity. Atmospheric results also show ozone and trace amounts of chlorine making it completely unbreathable.
        VallInSpaceLow* = #ScienceRefactor_bd_massSpec_VallInSpaceLow_00 // Water and nitrogen are both showing up strongly in the scanners results from orbit.
        VallSrfLanded* = #ScienceRefactor_bd_massSpec_VallSrfLanded_00 // The chemical makeup of the water at the surface suggest there are likely liquid oceans beneath the frozen outer layers of the moon.
        TyloInSpaceLow* = #ScienceRefactor_bd_massSpec_TyloInSpaceLow_00 // Very small traces of water ice is present along with high levels of silicate and carbonate dust in samples from orbit.
        TyloSrfLanded* = #ScienceRefactor_bd_massSpec_TyloSrfLanded_00 // Tiny traces of water can be found along with high levels of various metals including nickel and cobalt.
        BopInSpaceLow* = #ScienceRefactor_bd_massSpec_BopInSpaceLow_00 // The gravity of Bop is so low the orbital region is polluted by hydrogen and helium from Jool.
        BopSrfLanded* = #ScienceRefactor_bd_massSpec_BopSrfLanded_00 // Surface scans reveal high concentrations of both carbon and iron oxide giving the moon its dark coloration.
        PolInSpaceLow* = #ScienceRefactor_bd_massSpec_PolInSpaceLow_00 // With its distance from Jool, sulfur and phosphor from the surface can be detected from orbit.
        PolSrfLanded* = #ScienceRefactor_bd_massSpec_PolSrfLanded_00 // High concentrations of sulfur and sulfuric compounds along with high levels of phosphates leave the formation theories of Pol in flux and unconfirmed.

        EelooInSpaceLow* = #ScienceRefactor_bd_massSpec_EelooInSpaceLow_00 // Scans indicate the presence of nitrogen and methane in concentrations high enough to represent a very tenuous atmosphere but not enough to affect apacecraft in a measurable way.
        EelooSrfLanded* = #ScienceRefactor_bd_massSpec_EelooSrfLanded_00 // Spectroscopic scans of the surface show high levels of water ice and frozen nitrogen and methane. They also indicate the surface is renewed or eroded in some way over time.

        AsteroidInSpaceLow* = #ScienceRefactor_bd_massSpec_AsteroidInSpaceLow_00 // Trace amounts of water along with silicate and carbonate compounds are found in most asteroids
        AsteroidSrfLanded* = #ScienceRefactor_bd_massSpec_AsteroidSrfLanded_00 // Scans confirm the presence of tiny amounts of water ice along with high concentrations of metals and minerals.
	}
}