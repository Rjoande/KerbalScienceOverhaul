@EXPERIMENT_DEFINITION:HAS[#id[barometerScan]]
{
    %RESULTS
    {
        Srf* = #CSS_barometerScan_default_00 // The instrument refuses to cooperate until you warn it about breaking the ideal gas laws.
        Srf* = #CSS_barometerScan_default_01 // You get thirsty and think about drinking from the barometer, but you can't tell if it's a water or mercury barometer and decide against it.
        Srf* = #CSS_barometerScan_default_02 // The pressure levels appear to be negative, until you slap the computer and the values return to normal.
        Srf* = #CSS_barometerScan_default_03 // Every time Mission Control asks you to transmit the readout, you feel like a weather forecaster.
        Srf* = #CSS_barometerScan_default_04 // The reading says "Hurricane". Tapping on the glass doesn't help.
        Srf* = #CSS_barometerScan_default_05 // As entertaining as it is to blow on the sensor and watch the needle move, Mission Control insists that's not what it's there for.
        Srf* = #CSS_barometerScan_default_06 // You wonder why the screen is blank. Then you realize you forgot to turn it on.
        
        Flying* = #CSS_barometerScan_default_00 // The instrument refuses to cooperate until you warn it about breaking the ideal gas laws.
        Flying* = #CSS_barometerScan_default_01 // You get thirsty and think about drinking from the barometer, but you can't tell if it's a water or mercury barometer and decide against it.
        Flying* = #CSS_barometerScan_default_02 // The pressure levels appear to be negative, until you slap the computer and the values return to normal.
        Flying* = #CSS_barometerScan_default_03 // Every time Mission Control asks you to transmit the readout, you feel like a weather forecaster.
        Flying* = #CSS_barometerScan_default_04 // The reading says "Hurricane". Tapping on the glass doesn't help.
        Flying* = #CSS_barometerScan_default_05 // As entertaining as it is to blow on the sensor and watch the needle move, Mission Control insists that's not what it's there for.
        Flying* = #CSS_barometerScan_default_06 // You wonder why the screen is blank. Then you realize you forgot to turn it on.

        InSpace* = #CSS_barometerScan_default_00 // The instrument refuses to cooperate until you warn it about breaking the ideal gas laws.
        InSpace* = #CSS_barometerScan_default_01 // You get thirsty and think about drinking from the barometer, but you can't tell if it's a water or mercury barometer and decide against it.
        InSpace* = #CSS_barometerScan_default_02 // The pressure levels appear to be negative, until you slap the computer and the values return to normal.
        InSpace* = #CSS_barometerScan_default_03 // Every time Mission Control asks you to transmit the readout, you feel like a weather forecaster.
        InSpace* = #CSS_barometerScan_default_04 // The reading says "Hurricane". Tapping on the glass doesn't help.
        InSpace* = #CSS_barometerScan_default_05 // As entertaining as it is to blow on the sensor and watch the needle move, Mission Control insists that's not what it's there for.
        InSpace* = #CSS_barometerScan_default_06 // You wonder why the screen is blank. Then you realize you forgot to turn it on.

        EveSrfLandedPoles* = #CSS_barometerScan_EveSrfLandedPoles_00 // It's buried the needle!
        EveSrfLandedPoles* = #CSS_barometerScan_EveSrfLandedPoles_01 // The barometer still gives pressure readings, but it may not do so for long.
        EveSrfLandedMidlands* = #CSS_barometerScan_EveSrfLandedMidlands_00 // As the data from the barometer comes in, you start to feel very unsure about sending any Kerbals there.
        EveSrfLandedMidlands* = #CSS_barometerScan_EveSrfLandedMidlands_01 // The manual for the barometer claims it is rated up to 40atm. You start to doubt the validity of that claim.
        EveSrfLandedExplodiumSea* = #CSS_barometerScan_EveSrfLandedExplodiumSea_00 // The pressure is crushing down here! You start to worry if you will ever get back up again.
        EveSrfLandedLowlands* = #CSS_barometerScan_EveSrfLandedLowlands_00 // You start laughing at the abnormally high reading as you realize you're going to be stuck here for a long time.
        EveSrfLandedLowlands* = #CSS_barometerScan_EveSrfLandedLowlands_01 // It's over 9000...m/s! Well, the Delta-V required to escape the atmosphere anyways.
        EveSrfLandedHighlands* = #CSS_barometerScan_EveSrfLandedHighlands_00 // The barometer rates the atmosphere "crushing".
        EveSrfLandedHighlands* = #CSS_barometerScan_EveSrfLandedHighlands_01 // I tell you what is high, and that's the atmospheric pressure. Some altitude this is.
        EveSrfLandedPeaks* = #CSS_barometerScan_EveSrfLandedPeaks_00 // The barometer doesn't seem to like it here.
        EveSrfLandedPeaks* = #CSS_barometerScan_EveSrfLandedPeaks_01 // Whatever you think of the place, the barometer works at least. That alone is a win.
        EveSrfLandedImpactEjecta* = #CSS_barometerScan_EveSrfLandedImpactEjecta_00 // Under pressure, pushing down on me, pushing down on you, pushing down on we.
        EveSrfLandedImpactEjecta* = #CSS_barometerScan_EveSrfLandedImpactEjecta_01 // You hear a hissing sound, like something is leaking.
        EveSrfLandedCraterLake* = #CSS_barometerScan_EveSrfLandedCraterLake_00 // You tap the glass of the barometer. Nope, it's not broken.
        EveSrfLandedWesternSea* = #CSS_barometerScan_EveSrfLandedWesternSea_00 // All this pressure will make it difficult to take off. At least the beach is nearby. A crushed, corrosive, burning hot beach.
        EveSrfLandedOlympus* = #CSS_barometerScan_EveSrfLandedOlympus_00 // So high above the lower reaches, the atmospheric pressure is less extreme. It's still very high, though.
        EveSrfLandedOlympus* = #CSS_barometerScan_EveSrfLandedOlympus_01 // You tap the gauge on the barometer, and it goes down rather than up for once.
        EveSrfLandedEasternSea* = #CSS_barometerScan_EveSrfLandedEasternSea_00 // The barometer is spitting out overflow errors.
        EveSrfLandedFoothills* = #CSS_barometerScan_EveSrfLandedFoothills_00 // Wow, that's high. Are you sure they didn't leave something leaning on the sensor?
        EveSrfLandedFoothills* = #CSS_barometerScan_EveSrfLandedFoothills_01 // You calculate the amount of Delta-V just to escape the atmosphere is greater than that it took to both escape Kerbin's and get here!
        EveSrfLandedShallows* = #CSS_barometerScan_EveSrfLandedShallows_00 // The instrument shows you an extremely high pressure and then refuses to work anymore.
        EveSrfSplashedPoles* = #CSS_barometerScan_EveSrfSplashedPoles_00 // Much to your disappointment, the theory of pressure being slightly lower at the poles has been disproven.
        EveSrfSplashedExplodiumSea* = #CSS_barometerScan_EveSrfSplashedExplodiumSea_00 // Atmosphere? Yes! Way too much of it, in fact.
        EveSrfSplashedExplodiumSea* = #CSS_barometerScan_EveSrfSplashedExplodiumSea_01 // The pressure is very high. You wonder how high would it be at the bottom of this deep purple sea.
        EveSrfSplashedLowlands* = #CSS_barometerScan_EveSrfSplashedLowlands_00 // The needle spins wildly before the device caves in and begins to fizz.
        EveSrfSplashedImpactEjecta* = #CSS_barometerScan_EveSrfSplashedImpactEjecta_00 // The pressure is standard for sea level, which means the liquid level in this crater must be in line with the global sea level.
        EveSrfSplashedCraterLake* = #CSS_barometerScan_EveSrfSplashedCraterLake_00 // As you flick the detector on and watch the needle rise, so does your heart rate.
        EveSrfSplashedCraterLake* = #CSS_barometerScan_EveSrfSplashedCraterLake_01 // Crater Lake? More like Crusher Lake.
        EveSrfSplashedWesternSea* = #CSS_barometerScan_EveSrfSplashedWesternSea_00 // Five atmospheres. What was that about five being a lucky number?
        EveSrfSplashedWesternSea* = #CSS_barometerScan_EveSrfSplashedWesternSea_01 // The device logs minute changes in pressure as the craft bobs up and down on the tiny waves.
        EveSrfSplashedEasternSea* = #CSS_barometerScan_EveSrfSplashedEasternSea_00 // Judging by how the craft is floating, the pressure would be immense under the surface as well.
        EveSrfSplashedEasternSea* = #CSS_barometerScan_EveSrfSplashedEasternSea_01 // You can't tell the exact pressure after the labels burned off. Not like you really need to know the minutiae, anyway.
        EveSrfSplashedShallows* = #CSS_barometerScan_EveSrfSplashedShallows_00 // Sea level pressure on Eve is the same everywhere, it seems.
        EveSrfSplashedShallows* = #CSS_barometerScan_EveSrfSplashedShallows_01 // You don't want to look at the barometer, so you distract yourself by looking out over the sea instead.
        EveFlyingLow* = #CSS_barometerScan_EveFlyingLow_00 // The barometer makes a strange "pinging" sound as its sides bend inwards.
        EveFlyingLow* = #CSS_barometerScan_EveFlyingLow_01 // The pressure is high and the atmosphere is thick. You begin to wonder if this is going to be a one-way mission.
        EveFlyingLow* = #CSS_barometerScan_EveFlyingLow_02 // The barometer would be broken if not for its ability to move the decimal really far to the right.
        EveFlyingLow* = #CSS_barometerScan_EveFlyingLow_03 // You secretly wish your friends and family the best as landing here may be the last landing you'll ever make.
        EveFlyingHigh* = #CSS_barometerScan_EveFlyingHigh_00 // The barometer is reading the same pressures as sea level on Kerbin. This would be fine, if not for how much of the sky is still below you.
        EveFlyingHigh* = #CSS_barometerScan_EveFlyingHigh_01 // High? You call this high? I tell you what is high, and that's the pressure!
        EveFlyingHigh* = #CSS_barometerScan_EveFlyingHigh_02 // You don't like where you're going, and the data from the barometer only makes you even more concerned.
        EveInSpaceLow* = #CSS_barometerScan_EveInSpaceLow_00 // A vacuum couldn't be more of a far cry from the conditions at the surface.
        EveInSpaceLow* = #CSS_barometerScan_EveInSpaceLow_01 // The readout from the barometer spells "DONT SEND ME DOWN THERE". You concur.
        EveInSpaceHigh* = #CSS_barometerScan_EveInSpaceHigh_00 // There's no air up here. Not even Eve's mighty atmosphere makes it this far into space.
        EveInSpaceHigh* = #CSS_barometerScan_EveInSpaceHigh_01 // Eve watches you malevolently as you feel the compulsion to measure the air pressure in space.

        GillySrfLandedMidlands* = #CSS_barometerScan_GillySrfLandedMidlands_00 // Nil. As though a tiny space potato would ever have an atmosphere.
        GillrSrfLandedMidlands* = #CSS_barometerScan_GillrSrfLandedMidlands_01 // The tiny gravity isn't even enough to make the needle settle on the bottom of the gauge.
        GillySrfLandedLowlands* = #CSS_barometerScan_GillySrfLandedLowlands_02 // There's some dust, but it hardly counts as an atmosphere.
        GillySrfLandedLowlands* = #CSS_barometerScan_GillySrfLandedLowlands_03 // You expected more, given how Gilly is so many times bigger than the piddly asteroids flying around.
        GillySrfLandedHighlands* = #CSS_barometerScan_GillySrfLandedHighlands_00 // You reach for your notepad to write a zero on, but accidentally bat it across the cabin.
        GillySrfLandedHighlands* = #CSS_barometerScan_GillySrfLandedHighlands_01 // Dust kicked up by the spacecraft just doesn't land, and settles in the barometer.
        GillyInSpaceLow* = #CSS_barometerScan_GillyInSpaceLow_00 // You're barely even an orbit, much less landed and surrounded by air.
        GillyInSpaceLow* = #CSS_barometerScan_GillyInSpaceLow_01 // You could swear tapping the barometer here would perturb your orbit enough to crash.
        GillyInSpaceHigh* = #CSS_barometerScan_GillyInSpaceHigh_00 // You're more preoccupied with making sure you don't accidentally break Gilly orbit.
        GillyInSpaceHigh* = #CSS_barometerScan_GillyInSpaceHigh_01 // A screw pings out of the barometer housing and drifts slowly down to the surface.

        KerbinSrfLandedKSC* = #CSS_barometerScan_KerbinSrfLandedKSC_00 // The Barometer pressure is dropping. According to the weather station that means higher chance of rain later.
        KerbinSrfLandedKSC* = #CSS_barometerScan_KerbinSrfLandedKSC_01 // There's a storm coming, and its not your typical Kerbstorm.
        KerbinSrfLandedAdministration* = #CSS_barometerScan_KerbinSrfLandedAdministration_00 // The pressure drops as Montimer grows older.
        KerbinSrfLandedAstronautComplex* = #CSS_barometerScan_KerbinSrfLandedAstronautComplex_00 // Since you are just checking the 'lowly barometer' the new recruits don't recognize you and walk right past.
        KerbinSrfLandedBaikerbanur* = #CSS_barometerScan_KerbinSrfLandedBaikerbanur_00 // When Baikerbanur was decommissioned, a weather station was set up here. You simply pull the logs from that instead.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_barometerScan_KerbinSrfLandedBaikerbanurLaunchpad_00 // Mission Control thinks you're still at KSC's launchpad and chews you out.
        KerbinSrfLandedCrawlerway* = #CSS_barometerScan_KerbinSrfLandedCrawlerway_00 // The reading is pretty low right now since the crawler is not actively driving over the instrument. NOT FOR LONG THOUGH!
        KerbinSrfLandedFlagPole* = #CSS_barometerScan_KerbinSrfLandedFlagPole_00 // You realize that the pressure drops the higher you climb the pole.
        KerbinSrfLandedLaunchPad* = #CSS_barometerScan_KerbinSrfLandedLaunchPad_00 // Mission Control checks the readings against the local weather report to calibrate the Barometer.
        KerbinSrfLandedLaunchPad* = #CSS_barometerScan_KerbinSrfLandedLaunchPad_01 // No signs of adverse weather incoming, we can launch at any time.
        KerbinSrfLandedMissionControl* = #CSS_barometerScan_KerbinSrfLandedMissionControl_00 // Mission control is glad to hear that the reading indicates favorable conditions for a launch. And for lunch too!
        KerbinSrfLandedR&D* = #CSS_barometerScan_KerbinSrfLandedR&D_00 // As you attempt to record your observation, one of the research scientists comes over to explain that a millibar is not where those little umbrellas that come in drinks come from.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_barometerScan_KerbinSrfLandedR&DCentralBuilding_00 // The folks at R&D disassemble your barometer before you have a chance to take a reading. What did you expect?
        KerbinSrfLandedR&DCornerLab* = #CSS_barometerScan_KerbinSrfLandedR&DCornerLab_00 // You hope to get a reading before your instrument is disassembled for parts by the staff here, by hiding in this corner.
        KerbinSrfLandedR&DMainBuilding* = #CSS_barometerScan_KerbinSrfLandedR&DMainBuilding_00 // You point at an imaginary flying purple elephant to distract the staff here from disassembling your instrument just long enough to get a reading.
        KerbinSrfLandedR&DObservatory* = #CSS_barometerScan_KerbinSrfLandedR&DObservatory_00 // How fitting to take your barometric pressure observation here. Must have been fate.
        KerbinSrfLandedR&DSideLab* = #CSS_barometerScan_KerbinSrfLandedR&DSideLab_00 // OK, how many labs are there here?? You're tired of barometric pressures, and just want some snacks.
        KerbinSrfLandedR&DSmallLab* = #CSS_barometerScan_KerbinSrfLandedR&DSmallLab_00 // The smallness of the lab constricts the atmosphere, causing a higher reading.
        KerbinSrfLandedR&DTanks* = #CSS_barometerScan_KerbinSrfLandedR&DTanks_00 // You get distracted listening to your voice echo in the tanks and forget to take a barometric reading.
        KerbinSrfLandedR&DWindTunnel* = #CSS_barometerScan_KerbinSrfLandedR&DWindTunnel_00 // The barometer blows away before you are able to record the results. Oh well, it was worth a try.
        KerbinSrfLandedRunway* = #CSS_barometerScan_KerbinSrfLandedRunway_00 // No storm fronts detected. Perfect day for a flight!
        KerbinSrfLandedSPH* = #CSS_barometerScan_KerbinSrfLandedSPH_00 // Another beautiful day at the SPH, and the barometer confirms it.
        KerbinSrfLandedSPHMainBuilding* = #CSS_barometerScan_KerbinSrfLandedSPHMainBuilding_00 // You eye the menacing clouds on the horizon as the barometer plummets. Maybe we should hold off on that launch after all.
        KerbinSrfLandedSPHRoundTank* = #CSS_barometerScan_KerbinSrfLandedSPHRoundTank_00 // The barometer detects a small leak. You consider informing Gus Kerman but refrain from it, realizing that he probably doesn't care.
        KerbinSrfLandedSPHTanks* = #CSS_barometerScan_KerbinSrfLandedSPHTanks_00 // The barometer detects a small leak. You consider informing Gus Kerman but refrain from it, realizing that he probably doesn't care.
        KerbinSrfLandedSPHWaterTower* = #CSS_barometerScan_KerbinSrfLandedSPHWaterTower_00 // The barometer defers to the gravity sensor on this one.
        KerbinSrfLandedTrackingStation* = #CSS_barometerScan_KerbinSrfLandedTrackingStation_00 // The staff at the tracking station are unimpressed with your lowly barometer since it can't predict space-storms.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_barometerScan_KerbinSrfLandedTrackingStationDishEast_00 // You place the barometer right in the center of the dish just to aggravate those annoying Kerbals at the tracking station.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_barometerScan_KerbinSrfLandedTrackingStationDishNorth_00 // You take a reading at the focal point of the dish, hoping that somehow it will focus the atmospheric pressure.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_barometerScan_KerbinSrfLandedTrackingStationDishSouth_00 // The mercury from the barometer leaks all over the dish as you take your reading. Oh well, you never liked the guys at the tracking station anyway.
        KerbinSrfLandedTrackingStationHub* = #CSS_barometerScan_KerbinSrfLandedTrackingStationHub_00 // Well, here you are, at the center of all those annoying, weaselly little....oh yeah barometer: seems normal.
        KerbinSrfLandedVAB* = #CSS_barometerScan_KerbinSrfLandedVAB_00 // You are surprised to find a normal reading here. Probably about the only thing that IS normal here.
        KerbinSrfLandedVABMainBuilding* = #CSS_barometerScan_KerbinSrfLandedVABMainBuilding_00 // I don't know about the atmosphere, but the people here are definitely under a lot of pressure.
        KerbinSrfLandedVABPodMemorial* = #CSS_barometerScan_KerbinSrfLandedVABPodMemorial_00 // Looking at the pod you consider how much more -and less- pressure it endured than your barometer could ever hope to.
        KerbinSrfLandedVABRoundTank* = #CSS_barometerScan_KerbinSrfLandedVABRoundTank_00 // The barometer detects a small leak. You consider informing Gus Kerman but refrain from it, realizing that he probably doesn't care.
        KerbinSrfLandedVABSouthComplex* = #CSS_barometerScan_KerbinSrfLandedVABSouthComplex_00 // The engineers inside are under pressure to get things done on time.
        KerbinSrfLandedVABTanks* = #CSS_barometerScan_KerbinSrfLandedVABTanks_00 // The barometer detects a small leak. You consider informing Gus Kerman but refrain from it, realizing that he probably doesn't care.
        KerbinSrfLandedIslandAirfield* = #CSS_barometerScan_KerbinSrfLandedIslandAirfield_00 // The runway on the island appears to be at a slightly higher altitude than The KSC Runway.
        KerbinSrfLandedWoomerang* = #CSS_barometerScan_KerbinSrfLandedWoomerang_00 // In the foothills of the mountains, air pressure is a bit lower at this pad.

        KerbinSrfLandedWater* = #CSS_barometerScan_KerbinSrfLandedWater_00 // Hopefully the folks back at KSC can use this barometer data to warn you of an incoming storm.
        KerbinSrfLandedWater* = #CSS_barometerScan_KerbinSrfLandedWater_01 // The barometer's analysis hints at unusually high humidity in the local atmosphere.
        KerbinSrfLandedGrasslands* = #CSS_barometerScan_KerbinSrfLandedGrasslands_00 // A blade of grass gets caught in the outer casing of the sensor, and obstructs your view of the display. Oh well, we'll just make something up. They'll never know anyway.
        KerbinSrfLandedGrasslands* = #CSS_barometerScan_KerbinSrfLandedGrasslands_01 // As you painstakingly jot down the data, you wonder why you couldn't just take it from the morning news weather report.
        KerbinSrfLandedGrasslands* = #CSS_barometerScan_KerbinSrfLandedGrasslands_02 // Looks like a fine day today on Kerbin's plains.
        KerbinSrfLandedHighlands* = #CSS_barometerScan_KerbinSrfLandedHighlands_00 // You make adjustments to the barometer to get an accurate reading at such a high altitude. Hopefully they appreciate your work back at KSC.
        KerbinSrfLandedHighlands* = #CSS_barometerScan_KerbinSrfLandedHighlands_01 // Barometer data indicates higher-than-normal humidity and precipitation. You guess that's just what happens when you're closer to the sky.
        KerbinSrfLandedHighlands* = #CSS_barometerScan_KerbinSrfLandedHighlands_02 // The barometer indicates an incoming storm! You feel sorry for anyone living in the valleys of the Highlands.
        KerbinSrfLandedShores* = #CSS_barometerScan_KerbinSrfLandedShores_00 // The barometric pressure here is high, but you are more interested in sneaking a glance at the bathing suits on the beach.
        KerbinSrfLandedShores* = #CSS_barometerScan_KerbinSrfLandedShores_01 // You send the barometer data back to KSC and reminisce about the good times you have had on these same beaches.
        KerbinSrfLandedShores* = #CSS_barometerScan_KerbinSrfLandedShores_02 // The barometer's dial moves left and right as you watch the surf batter the shores.
        KerbinSrfLandedMountains* = #CSS_barometerScan_KerbinSrfLandedMountains_00 // The barometer reads very low here. You aren't surprised, as the mountaintop nearly pierces the clouds.
        KerbinSrfLandedMountains* = #CSS_barometerScan_KerbinSrfLandedMountains_01 // You stand on your tiptoes and try to insert the barometer into a passing cloud. So close...
        KerbinSrfLandedMountains* = #CSS_barometerScan_KerbinSrfLandedMountains_02 // The air pressure is dropping precipitously. Much like that goat that just fell off the mountain.
        KerbinSrfLandedDeserts* = #CSS_barometerScan_KerbinSrfLandedDeserts_00 // Barometer reads very high. No rain in sight. In fact you wonder if it has EVER rained here.
        KerbinSrfLandedDeserts* = #CSS_barometerScan_KerbinSrfLandedDeserts_01 // It's not going to rain for a long time.
        KerbinSrfLandedDeserts* = #CSS_barometerScan_KerbinSrfLandedDeserts_02 // Readings here are the same as usual: high. Nothing else to report.
        KerbinSrfLandedBadlands* = #CSS_barometerScan_KerbinSrfLandedBadlands_00 // The sensor looks like it went to the bottom of the Mariana Trench.
        KerbinSrfLandedBadlands* = #CSS_barometerScan_KerbinSrfLandedBadlands_01 // You transmit the readings. Mission Control immediately calls you back and demands to know if you are still on Kerbin.
        KerbinSrfLandedBadlands* = #CSS_barometerScan_KerbinSrfLandedBadlands_02 // You think that the barometer is broken but you're too scared to go outside and fix it.
        KerbinSrfLandedTundra* = #CSS_barometerScan_KerbinSrfLandedTundra_00 // You don't think that this would be a nice place to live. The barometer concurs.
        KerbinSrfLandedTundra* = #CSS_barometerScan_KerbinSrfLandedTundra_01 // The barometer seems extremely high here. You can almost feel the pressure squeezing the ship.
        KerbinSrfLandedTundra* = #CSS_barometerScan_KerbinSrfLandedTundra_02 // The barometer suggests the area has a prevalence towards blizzards. Might not be a good idea to stay here much longer.
        KerbinSrfLandedIceCaps* = #CSS_barometerScan_KerbinSrfLandedIceCaps_00 // The barometer appears to be frozen, or at least extremely steady.
        KerbinSrfLandedIceCaps* = #CSS_barometerScan_KerbinSrfLandedIceCaps_01 // Atmospheric pressure is fairly high in the polar regions. Perhaps the scientists back at KSC can explain why.
        KerbinSrfLandedNorthernIceShelf* = #CSS_barometerScan_KerbinSrfLandedNorthernIceShelf_00 // The air pressure data spells out "COLD". You concur with the computer.
        KerbinSrfLandedNorthernIceShelf* = #CSS_barometerScan_KerbinSrfLandedNorthernIceShelf_01 // Pressure is higher here on average, as per usual for polar regions.
        KerbinSrfLandedSouthernIceShelf* = #CSS_barometerScan_KerbinSrfLandedSouthernIceShelf_00 // Atmospheric pressure is the same as at sea level, even though you're no...wait a minute...
        KerbinSrfLandedSouthernIceShelf* = #CSS_barometerScan_KerbinSrfLandedSouthernIceShelf_01 // The labels on the barometer are covered with ice, and somebody forgot to install an equipment heater.
        KerbinSrfSplashedWater* = #CSS_barometerScan_KerbinSrfSplashedWater_00 // The barometer reading isn't very interesting so you look out the window and watch the waves instead.
        KerbinSrfSplashedWater* = #CSS_barometerScan_KerbinSrfSplashedWater_01 // Surprisingly all the water didn't short out the instrument, and you are able to get a good reading to send back to KSC.
        KerbinSrfSplashedWater* = #CSS_barometerScan_KerbinSrfSplashedWater_02 // You wish there was a setting on the barometer that warns you of sharks.
        KerbinSrfSplashedGrasslands* = #CSS_barometerScan_KerbinSrfSplashedGrasslands_00 // A drifting stick bumps repeatedly aginst the sensor and causes the needle to move crazily.
        KerbinSrfSplashedShores* = #CSS_barometerScan_KerbinSrfSplashedShores_00 // Data from the barometer seems to indicate a storm within the next few hours. You wonder if you'll get to see a shipwreck. You hope it's not yours.
        KerbinSrfSplashedShores* = #CSS_barometerScan_KerbinSrfSplashedShores_01 // Drops of saltwater seem to have encrusted the barometer and you are unable to get an accurate reading. You make something up randomly, and send it back to KSC.
        KerbinSrfSplashedShores* = #CSS_barometerScan_KerbinSrfSplashedShores_02 // As you write down the air pressure data you are briefly reminded of your elementary science lessons about 'The Water Cycle'.
        KerbinSrfSplashedDeserts* = #CSS_barometerScan_KerbinSrfSplashedDeserts_00 // Looks like there won't be rain for a long time. You wonder how this water got here.
        KerbinSrfSplashedBadlands* = #CSS_barometerScan_KerbinSrfSplashedBadlands_00 // The water really doesn't help the havoc the Badlands plays on the instrumentation.
        KerbinSrfSplashedTundra* = #CSS_barometerScan_KerbinSrfSplashedTundra_00 // The cold water causes air to sink downwards, increasing the air pressure.
        KerbinSrfSplashedIceCaps* = #CSS_barometerScan_KerbinSrfSplashedIceCaps_00 // The dial is stuck. You're too busy freezing to care.
        KerbinSrfSplashedNorthernIceShelf* = #CSS_barometerScan_KerbinSrfSplashedNorthernIceShelf_00 // Waves of icy water washing over the sensor generate bursts of pressure.
        KerbinSrfSplashedSouthernIceShelf* = #CSS_barometerScan_KerbinSrfSplashedSouthernIceShelf_00 // Looks like a severe polar storm will arrive later.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_00 // The pressure is lower here than it was at ground level.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_01 // After several minutes of displaying nothing, the sensor briefly registers a value!
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_02 // One Hundred Million Pascals. That can't be right.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_03 // You remember that barometers are often used to forecast the weather. You examine the readings and decide that it might not be a good idea to be here in the next few hours.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_04 // The dial keeps spinning round and round. After consulting with Mission Control, you scribble a zero at the end of each of the measurements. The dial immediately points to the largest one.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_05 // Instead of sending Mission Control your barometer data, you just send them a copy of this morning's weather report.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_06 // Barometric pressure: 300 millibars. Or is that 3000? Whatever....look at the view down there.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_07 // Your blood pressure rises as you see just how close you are flying to the terrain below. The barometric pressure, in contrast, remains steady.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_08 // Despite the fact that you are flying low over the surface, the reading is no lower than usual.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_09 // *singing* "Under pressure. Ba da dum, ba da da dum, Ba da da dum, ba da da dum. Under pressure".
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_10 // The barometer shakes and shimmies so much in the atmosphere that you are unable to get an accurate reading.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_11 // Readings seem nominal. Snack time!
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_12 // The barometer seems to be questioning its own existence. Well, at least you agree on something.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_13 // You wonder what a desert storm would look like.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_14 // Air pressure is slightly higher here due to the heat.
        KerbinFlyingLow* = #CSS_barometerScan_KerbinFlyingLow_15 // Pressure readings are more or less in line with the rest of Kerbin. Much unlike the Highlands themselves.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_00 // There is still atmospheric pressure even this far from the surface.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_01 // Did the device malfunction, or is this not a 'true' vacuum?
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_02 // Glancing at the display, you shake your head and feel sorry for anyone who lives down there.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_03 // "The weather will remain pleasant," declares the barometer.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_04 // Is it snack time yet? It has to be snack time. No pressure readings till after snack time.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_05 // The air is too thin for the barometer to function. Much like how the air is too cold for a kerbal to function.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_06 // The barometer is covered in ice crystals at this altitude, and you are unable to get a good reading. Oh well, time for some snacks anyway.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_07 // Despite the fact that you are flying high over the surface, the reading is no higher than usual.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_08 // In the thin, wispy layers of the upper atmosphere a barometer reading is not particularly useful. You take the reading anyway and send it back to KSC.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_09 // The barometer data you transmit back to KSC barely qualifies as a proper reading.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_10 // Pressure is nominal. Nothing to see here folks. Move along.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_11 // The barometer here seems nominal. What's not nominal is the amount of snacks we haven't eaten yet. You radio KSC about this issue.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_12 // The display gives very little indication that you're flying over a desert.
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_13 // High over the terrain you take a barometric reading. Doesn't matter, as the instrument seems to read the same thing everywhere. Why did we bring this stupid instrument anyway?
        KerbinFlyingHigh* = #CSS_barometerScan_KerbinFlyingHigh_14 // High above the shore you scribble yet another note on the barometric pressure, thinking about all the Kerbals sunning themselves below.
        KerbinInSpaceLow* = #CSS_barometerScan_KerbinInSpaceLow_15 // You don't bother to look at the display. The fact that you're in space tells you all you need to know.
        KerbinInSpaceLow* = #CSS_barometerScan_KerbinInSpaceLow_16 // It reads -3. Huh, that's funny. Oh well, they can figure it out back at KSC.
        KerbinInSpaceLow* = #CSS_barometerScan_KerbinInSpaceLow_17 // At this altitude, a barometer scan is almost purely a formality.
        KerbinInSpaceLow* = #CSS_barometerScan_KerbinInSpaceLow_18 // You have discovered that there is no air in space.
        KerbinInSpaceHigh* = #CSS_barometerScan_KerbinInSpaceHigh_01 // Whatever vestiges of the atmosphere that might have lingered in low orbit are long gone.
        KerbinInSpaceHigh* = #CSS_barometerScan_KerbinInSpaceHigh_02 // Why are you wasting your time doing barometry in a vacuum when you could be doing something fun instead, like a spacewalk?
        KerbinInSpaceHigh* = #CSS_barometerScan_KerbinInSpaceHigh_03 // Aw hell, this is useless.
        KerbinInSpaceHigh* = #CSS_barometerScan_KerbinInSpaceHigh_04 // The needle is above zero. Tapping it, it climbs higher. You make a note to request the barometer be calibrated properly next time.

        DunaSrfLanded* = #CSS_barometerScan_DunaSrfLanded_00 // This data will help to determine the pressure gradient of Duna's atmosphere.
        DunaSrfLanded* = #CSS_barometerScan_DunaSrfLanded_01 // There isn't much atmosphere here. You consider lighting candles to create more.
        DunaSrfLandedPoles* = #CSS_barometerScan_DunaSrfLandedPoles_00 // The atmosphere appears slightly denser here.
        DunaSrfLandedPoles* = #CSS_barometerScan_DunaSrfLandedPoles_01 // The atmosphere is slightly denser due to the gases escaping the ice beneath.
        DunaSrfLandedPoles* = #CSS_barometerScan_DunaSrfLandedPoles_02 // A blast of pressure from a nearby gas geyser is detected.
        DunaSrfLandedMidlands* = #CSS_barometerScan_DunaSrfLandedMidlands_00 // There's air here, but not much of it.
        DunaSrfLandedMidlands* = #CSS_barometerScan_DunaSrfLandedMidlands_01 // The pressure here is average and seems to consist of mostly dust.
        DunaSrfLandedLowlands* = #CSS_barometerScan_DunaSrfLandedLowlands_00 // The pressure in this basin is a whole notch higher on the scale.
        DunaSrfLandedLowlands* = #CSS_barometerScan_DunaSrfLandedLowlands_01 // The pressure here is the highest you've recorded, but it's still as low as in the upper atmosphere back home.
        DunaSrfLandedLowlands* = #CSS_barometerScan_DunaSrfLandedLowlands_02 // The pressure is a little higher here on the valley floor.
        DunaSrfLandedCraters* = #CSS_barometerScan_DunaSrfLandedCraters_00 // The lower altitude of the craters results in slightly higher than average pressures.
        DunaSrfLandedCraters* = #CSS_barometerScan_DunaSrfLandedCraters_01 // There's just enough air here to fill a parachute, but don't even think about trying to breathe it.
        DunaSrfLandedHighlands* = #CSS_barometerScan_DunaSrfLandedHighlands_00 // The air here is so thin, you feel like you could reach up and touch space.
        DunaSrfLandedHighlands* = #CSS_barometerScan_DunaSrfLandedHighlands_01 // Duna's air is thin normally, and it's even thinner here on the mountaintops.
        DunaSrfLandedMidlandSea* = #CSS_barometerScan_DunaSrfLandedMidlandSea_00 // We just broke the Duna pressure record for this spot! Well, the record was "N/A" before now.
        DunaSrfLandedMidlandSea* = #CSS_barometerScan_DunaSrfLandedMidlandSea_01 // The unusually high pressure drops ever so slightly as a dust vortex passes over the craft.
        DunaSrfLandedNorthernBasin* = #CSS_barometerScan_DunaSrfLandedNorthernBasin_00 // The atmosphere is a bit denser here from the low altitude.
        DunaSrfLandedNorthernBasin* = #CSS_barometerScan_DunaSrfLandedNorthernBasin_01 // Diurnal pressure variations are smaller than expected, possibly thanks to the canyon outlet to the south.
        DunaSrfLandedSouthernBasin* = #CSS_barometerScan_DunaSrfLandedSouthernBasin_00 // The atmospheric pressure is largely average save for occasional gusts sweeping in off the ice.
        DunaSrfLandedSouthernBasin* = #CSS_barometerScan_DunaSrfLandedSouthernBasin_01 // Atmospheric pressure here shows larger diurnal fluctuations than elsewhere due to its proximity to the ice cap.
        DunaSrfLandedNorthernShelf* = #CSS_barometerScan_DunaSrfLandedNorthernShelf_00 // Low altitude makes the air a bit more dense here. Just a bit.
        DunaSrfLandedNorthernShelf* = #CSS_barometerScan_DunaSrfLandedNorthernShelf_01 // Winds howling through the canyon from the north generate regular pressure spikes.
        DunaSrfLandedMidlandCanyon* = #CSS_barometerScan_DunaSrfLandedMidlandCanyon_00 // The altitude here is very low, so the atmosphere is pretty thick (for Duna).
        DunaSrfLandedMidlandCanyon* = #CSS_barometerScan_DunaSrfLandedMidlandCanyon_01 // Pressure here shows less diurnal variation than other places on Duna.
        DunaSrfLandedEasternCanyon* = #CSS_barometerScan_DunaSrfLandedEasternCanyon_00 // There's more air here, but even more dust. That's not good news for the barometer you've already cleaned out twice today.
        DunaSrfLandedEasternCanyon* = #CSS_barometerScan_DunaSrfLandedEasternCanyon_01 // Air pressure increases substantially at night here as the atmosphere cools and sinks.
        DunaSrfLandedWesternCanyon* = #CSS_barometerScan_DunaSrfLandedWesternCanyon_00 // There's a little bit more gas down here than some other places.
        DunaSrfLandedWesternCanyon* = #CSS_barometerScan_DunaSrfLandedWesternCanyon_01 // Wanting to have something to report, you tap the barometer and the needle rises slightly. Result!
        DunaSrfLandedPolarHighlands* = #CSS_barometerScan_DunaSrfLandedPolarHighlands_00 // Evaporating ice from the polar cap raises the pressure by a tiny fraction.
        DunaSrfLandedPolarHighlands* = #CSS_barometerScan_DunaSrfLandedPolarHighlands_01 // Ice subliming off the polar cap raises the pressure very slightly.
        DunaSrfLandedPolarHighlands* = #CSS_barometerScan_DunaSrfLandedPolarHighlands_02 // Atmospheric pressure seems to experience measurable diurnal fluctuations.
        DunaSrfLandedPolarCraters* = #CSS_barometerScan_DunaSrfLandedPolarCraters_00 // The air here is pretty dense and pressure is higher thanks to the cold temperatures.
        DunaSrfLandedPolarCraters* = #CSS_barometerScan_DunaSrfLandedPolarCraters_01 // Pressure increases greatly as the temperature drops at nights and cold, dense air sinks into the depression.
        DunaFlyingLow* = #CSS_barometerScan_DunaFlyingLow_00 // This measurement will provide more information about the composition and pressure gradient of Duna's atmosphere.
        DunaFlyingLow* = #CSS_barometerScan_DunaFlyingLow_01 // The atmosphere seems to be quite thin here, but it's still preferable to the hard vacuum of space.
        DunaFlyingLow* = #CSS_barometerScan_DunaFlyingLow_02 // Not much pressure, and even less when flying at altitude.
        DunaFlyingHigh* = #CSS_barometerScan_DunaFlyingHigh_00 // Even the barometer isn't sure how to interpret the readings.
        DunaFlyingHigh* = #CSS_barometerScan_DunaFlyingHigh_01 // There's some gas up here, but not much. What little pressure there is remains far below.
        DunaFlyingHigh* = #CSS_barometerScan_DunaFlyingHigh_02 // Pressure reads: "Gasping for air". You add an addendum about more numbers and less wisecracking.
        DunaInSpaceLow* = #CSS_barometerScan_DunaInSpaceLow_00 // You're pretty sure this is a vacuum, but given how thin the atmosphere is you can't really be sure.
        DunaInSpaceLow* = #CSS_barometerScan_DunaInSpaceLow_01 // You're the one under pressure here, not the barometer. It quite clearly shows.
        DunaInSpaceHigh* = #CSS_barometerScan_DunaInSpaceHigh_00 // The surface all the way down there must surely have more atmosphere than up here.
        DunaInSpaceHigh* = #CSS_barometerScan_DunaInSpaceHigh_01 // There's probably a few atoms out there, but you can't detect them with a simple barometer.

        IkeInSpaceLow* = #CSS_barometerScan_IkeInSpaceLow_00 // There's no air in space, silly.
        IkeInSpaceLow* = #CSS_barometerScan_IkeInSpaceLow_01 // The atmosphere at Mission Control is tense. The atmosphere outside is nonexistent.
        IkeInSpaceHigh* = #CSS_barometerScan_IkeInSpaceHigh_00 // Duna's atmosphere is slightly fuzzy and puffy, but it doesn't extend all the way up to Ike.
        IkeInSpaceHigh* = #CSS_barometerScan_IkeInSpaceHigh_01 // There's no gas down there, and certainly none up here.

        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_00 // You notice the barometer has a crack in it shaped like a doughnut. There's also a reading about the pressure, but you've stopped caring.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_01 // The barometer's hand switched from "You sure we're in an atmosphere and not underwater?" to "Look, I wasn't built to record pressures in kbar". It suddenly dawns on you that you might have aerobraked a bit too deep.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_02 // The sensor starts breaking under pressure.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_03 // The immense pressure causes the sensor to implode.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_04 // Pressure increases quite rapidly, then stabilizes on "-65535". It occurs to you that the barometer may be broken.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_05 // The barometer reads lower than expected. Perhaps you are in the eye of a storm?
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_06 // The barometer lets out some steam and fails to give a proper reading of the immensely thick atmosphere.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_07 // The scanner only has time to say "I hate you!" before the voice module implodes.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_08 // The gas chamber just cracked. Any deeper and this whole craft might implode.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_09 // Jool seems to be under a lot of pressure right now.
        JoolFlyingLow* = #CSS_barometerScan_JoolFlyingLow_10 // The barometer is calling you an idiot.
        JoolFlyingHigh* = #CSS_barometerScan_JoolFlyingHigh_00 // Cracks start to appear as you enter deeper into the atmosphere.
        JoolFlyingHigh* = #CSS_barometerScan_JoolFlyingHigh_01 // The pressures start rising in comparison to the surrounding area. You take this as a good sign - Joolian storms are nothing to sneeze at.
        JoolFlyingHigh* = #CSS_barometerScan_JoolFlyingHigh_02 // A massive blast of wind shakes the spacecraft. Of course, you didn't exactly need a barometer to tell you this.
        JoolFlyingHigh* = #CSS_barometerScan_JoolFlyingHigh_03 // The atmosphere here is very dense. The glass components appear to be weakening. Let's blame the engineers if anything breaks!

        LaytheSrfLanded* = #CSS_barometerScan_LaytheSrfLanded_00 // Atmospheric pressure is lower than on Kerbin, but you don't think seasoned mountaineers would have any trouble adapting to it.
        LaytheSrfLandedPoles* = #CSS_barometerScan_LaytheSrfLandedPoles_00 // The readings are almost the same as on a sunny beach back home. It makes you feel like going for a swim.
        LaytheSrfLandedShores* = #CSS_barometerScan_LaytheSrfLandedShores_00 // Atmospheric pressure is a bit lower than on Kerbin. You are unsure if that makes it more fun or not.
        LaytheSrfLandedDunes* = #CSS_barometerScan_LaytheSrfLandedDunes_00 // For a couple of seconds you think the device is still displaying readings taken on Kerbin.
        LaytheSrfLandedCrescentBay* = #CSS_barometerScan_LaytheSrfLandedCrescentBay_00 // The barometer predicts rain.
        LaytheSrfLandedTheSagenSea* = #CSS_barometerScan_LaytheSrfLandedTheSagenSea_00 // The atmosphere here is unusually dense.
        LaytheSrfSplashed* = #CSS_barometerScan_LaytheSrfSplashed_00 // Atmospheric pressure at sea level is quite high, but still less than on Kerbin. Well, it's a moon, give it a break!
        LaytheSrfSplashedCrescentBay* = #CSS_barometerScan_LaytheSrfSplashedCrescentBay_00 // You contemplate dunking the scanner to see if it can measure depth, but Mission Control says that will void the warranty.
        LaytheSrfSplashedTheSagenSea* = #CSS_barometerScan_LaytheSrfSplashedTheSagenSea_00 // The pressure seems higher over the water.
        LaytheFlyingLow* = #CSS_barometerScan_LaytheFlyingLow_00 // The numbers are high... intriguingly high. Throw a bit more oxygen in this mix and you could live here.
        LaytheFlyingLow* = #CSS_barometerScan_LaytheFlyingLow_01 // It's thin, but it's there.
        LaytheFlyingLow* = #CSS_barometerScan_LaytheFlyingLow_02 // If this atmosphere had oxygen, you could take off your helmet and crack a window.
        LaytheFlyingHigh* = #CSS_barometerScan_LaytheFlyingHigh_00 // The air is thin and rarefied, but if you're getting readings this high up, there's a chance it gets dense enough for planes and parachutes closer to the surface.
    }
}