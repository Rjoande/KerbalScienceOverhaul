    %RESULTS
	{
        default = #ScienceRefactor_bd_bioexp_default_00 // Observations of the little critters suggest they are adapting to the microgravity environment surprisingly quickly.
        
        Srf* = #ScienceRefactor_bd_bioexp_default_01 // There is evidence that frogs have roamed Kerbin for more than 200 million years, at least as long as the Kerbals.
        Srf* = #ScienceRefactor_bd_bioexp_default_02 // The world's largest frog is the goliath frog of West Africa—it can grow to 15 inches and weigh up to 7 pounds. A goliath frog skeleton is featured in Frogs: A Chorus of Colors.
        Srf* = #ScienceRefactor_bd_bioexp_default_03 // One of the smallest is the Cuban tree toad, which grows to half an inch long.
        Srf* = #ScienceRefactor_bd_bioexp_default_04 // While the life spans of frogs in the wild are unknown, frogs in captivity have been known to live more than 20 years.
        Srf* = #ScienceRefactor_bd_bioexp_default_05 // There are over 6,000 species of frogs worldwide. Scientists continue to search for new ones.
        Srf* = #ScienceRefactor_bd_bioexp_default_06 // Toads are frogs. The word "toad" is usually used for frogs that have warty and dry skin, as well as shorter hind legs.
        Srf* = #ScienceRefactor_bd_bioexp_default_07 // Frogs have excellent night vision and are very sensitive to movement. The bulging eyes of most frogs allow them to see in front, to the sides, and partially behind them. When a frog swallows food, it pulls its eyes down into the roof of its mouth, to help push the food down its throat.
        Srf* = #ScienceRefactor_bd_bioexp_default_08 // Frogs were the first land animals with vocal cords. Male frogs have vocal sacs—pouches of skin that fill with air. These balloons resonate sounds like a megaphone, and some frog sounds can be heard from a mile away.
        Srf* = #ScienceRefactor_bd_bioexp_default_09 // Launched by their long legs, many frogs can leap more than 20 times their body length.
        Srf* = #ScienceRefactor_bd_bioexp_default_10 // The Costa Rican flying tree frog soars from branch to branch with the help of its feet. Webbing between the frog's fingers and toes extends out, helping the frog glide.
        Srf* = #ScienceRefactor_bd_bioexp_default_11 // To blend into the environment, the Budgett's frog is muddy brown in color, while the Vietnamese mossy frog has spotty skin and bumps to make them look like little clumps of moss or lichen.
        Srf* = #ScienceRefactor_bd_bioexp_default_12 // Many poisonous frogs, such as the golden poison frog and dyeing poison frog, are boldly colored to warn predators of their dangerous toxic skins. Some colorful frogs, such as the Fort Randolph robber frog, have developed the same coloring as a coexisting poisonous species. Although their skins are not toxic, these mimics may gain protection from predators by looking dangerous.
        Srf* = #ScienceRefactor_bd_bioexp_default_13 // The Australian water-holding frog is a desert dweller that can wait up to seven years for rain. It burrows underground and surrounds itself in a transparent cocoon made of its own shed skin.
        Srf* = #ScienceRefactor_bd_bioexp_default_14 // Almost all frogs fertilize the eggs outside of the female's body. The male holds the female around the waist in a mating hug called amplexus. He fertilizes the eggs as the female lays them. Amplexus can last hours or days. One pair of Andean toads stayed in amplexus for four months.
        Srf* = #ScienceRefactor_bd_bioexp_default_15 // The gastric brooding frog of Australia swallows her fertilized eggs. The tadpoles remain in her stomach for up to eight weeks, finally hopping out of her mouth as little frogs. During the brooding period, gastric secretions cease—otherwise she would digest her own offspring.
        Srf* = #ScienceRefactor_bd_bioexp_default_16 // Among Darwin frogs, it is the male who swallows and stores the developing tadpoles in his vocal sac until juvenile frogs emerge.
        Srf* = #ScienceRefactor_bd_bioexp_default_17 // Like all amphibians, frogs are cold-blooded, meaning their body temperatures change with the temperature of their surroundings. When temperatures drop, some frogs dig burrows underground or in the mud at the bottom of ponds. They hibernate in these burrows until spring, completely still and scarcely breathing.
        Srf* = #ScienceRefactor_bd_bioexp_default_18 // The wood frog can live north of the Arctic Circle, surviving for weeks with 65 percent of its body frozen. This frog uses glucose in its blood as a kind of antifreeze that concentrates in its vital organs, protecting them from damage while the rest of the body freezes solid.
        Srf* = #ScienceRefactor_bd_bioexp_default_19 // Frogs are freshwater creatures, although some frogs such as the Florida leopard frog are able to live in brackish or nearly completely salt waters.
        Srf* = #ScienceRefactor_bd_bioexp_default_20 // The marsupial frog keeps her eggs in a pouch like a kangaroo. When the eggs hatch into tadpoles, she opens the pouch with her toes and spills them into the water.
        Srf* = #ScienceRefactor_bd_bioexp_default_21 // Pipa pipa, the Suriname toad of South America (an enlarged model of a female with froglets is featured in the Museum's Hall of Reptiles and Amphibians), carries her young embedded in the skin of her back. After mating, the eggs sink gradually into the female's back, and a skin pad forms over the eggs. The developing juvenile frogs are visible inside their pockets for several days before hatching. They emerge over a period of days, thrusting their head and forelegs out first, then struggling free.

