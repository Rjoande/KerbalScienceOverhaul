        #JNSQscience_bd_cosmicRay_HuygenSrfLandedShores_00 = Vicino alla costa i numeri si fanno regolari, poi saltano, come se la superficie riflettesse più della sola luce.
        #JNSQscience_bd_cosmicRay_HuygenSrfSplashedShores_00 = Le onde sferzano lo scafo: i raggi cosmici sferzano il rivelatore. L'unica cosa che affonda è il tuo ottimismo.
        #JNSQscience_bd_cosmicRay_HuygenSrfSplashedMethaneLakes_00 = Il lago di metano calma il rumore a bassa energia: gli impulsi duri arrivano comunque come se fossero i padroni del posto.
        #JNSQscience_bd_cosmicRay_RigaFlyingLow_00 = La foschia sottile di azoto riduce gli impulsi più morbidi, ma le particelle dure crepitano comunque come se fossero padrone del cielo.
        #JNSQscience_bd_cosmicRay_RigaFlyingHigh_00 = Su nell'aria alta e rarefatta, il contatore risale verso il fondo dello spazio con lievi sfarfallii dalle fasce di Lindor.
        #JNSQscience_bd_cosmicRay_RigaSrfLandedLowlands_00 = I conteggi in superficie sono alti ma stabili: Riga sembra "familiare" solo finché la radiazione non ti ricorda dove sei.
        #JNSQscience_bd_cosmicRay_RigaSrfLandedMidlands_00 = Un ticchettio ordinato e implacabile: buoni dati per i pianificatori, pessime notizie per chi salta la schermatura.
        #JNSQscience_bd_cosmicRay_RigaSrfLandedHighlands_00 = Con meno aria sopra, il rivelatore fa clic più in fretta e sembra stranamente contento.
        #JNSQscience_bd_cosmicRay_RigaSrfLandedMountains_00 = Le creste portano picchi netti, come se le montagne ti rimandassero secondari dritto sulla rotta.
        #JNSQscience_bd_cosmicRay_RigaSrfLandedPoles_00 = Le letture polari oscillano in brevi burst: traiettorie aperte sembrano infilarsi lungo il bordo della protezione.
        #JNSQscience_bd_cosmicRay_RigaInSpaceLowLowlands_00 = In orbita bassa si vede un flusso luminoso di primarie e una lieve foschia di secondarie che sale dalla superficie.
        #JNSQscience_bd_cosmicRay_RigaInSpaceLowMidlands_00 = Il fondo resta pulito e severo, con una bandatura sottile che ricorda linee di campo lontane.
        #JNSQscience_bd_cosmicRay_RigaInSpaceLowHighlands_00 = I conteggi aumentano sopra le alture: meno atmosfera sotto significa meno schermatura accidentale.
        #JNSQscience_bd_cosmicRay_RigaInSpaceLowMountains_00 = Uno spruzzo frastagliato di secondarie segue la cintura montuosa: il terreno risponde a colpi di clic.
        #JNSQscience_bd_cosmicRay_RigaInSpaceLowPoles_00 = Sopra i poli, il flusso sale e sfarfalla, come se stessi sfiorando una cucitura invisibile nell'ombrello di Lindor.
        #JNSQscience_bd_cosmicRay_RigaInSpaceHigh_00 = Ben sopra Riga, il rivelatore torna al fondo dello spazio profondo con solo schiocchi occasionali dall'ambiente distante di Lindor.
        #JNSQscience_bd_cosmicRay_TalosSrfLandedLowlands_00 = Il contatore ticchetta nella quiete fredda: Talos è abbastanza lontano da rendere il "fondo" fin troppo personale.
        #JNSQscience_bd_cosmicRay_TalosSrfLandedMidlands_00 = Una grandinata costante di impulsi ad alta energia. Niente aria, niente campo, solo lo spazio lontano che fa quello che fa.
        #JNSQscience_bd_cosmicRay_TalosSrfLandedHighlands_00 = Lo spettro si indurisce sulle alture: qui la quota significa soprattutto meno ombre dietro cui nascondersi.
        #JNSQscience_bd_cosmicRay_TalosSrfLandedMountains_00 = Le pareti montuose rimandano uno spruzzo netto di secondarie: la roccia colorata è più rumorosa di quanto sembri.
        #JNSQscience_bd_cosmicRay_TalosSrfLandedPoles_00 = I passaggi polari portano brevi aumenti, come se i visitatori in linea retta preferissero la rotta più corta.
        #JNSQscience_bd_cosmicRay_TalosInSpaceLowLowlands_00 = In orbita bassa raccogli primari in modo pulito, con un lieve luccichio di rimbalzo dalla superficie.
        #JNSQscience_bd_cosmicRay_TalosInSpaceLowMidlands_00 = I dati formano un altopiano regolare e severo. Talos sembra spazio nudo con un po' di terreno attaccato.
        #JNSQscience_bd_cosmicRay_TalosInSpaceLowHighlands_00 = I conteggi delle secondarie aumentano sopra le alture: la superficie continua a rispondere a ogni colpetto in arrivo.
        #JNSQscience_bd_cosmicRay_TalosInSpaceLowMountains_00 = Picchi frastagliati si allineano con le montagne: terreno tagliente, grafici taglienti.
        #JNSQscience_bd_cosmicRay_TalosInSpaceLowPoles_00 = Un sottile aumento vicino ai poli suggerisce traiettorie aperte. Meno riparo così lontano dall'influenza del grande pianeta.
        #JNSQscience_bd_cosmicRay_TalosInSpaceHigh_00 = In alto sopra Talos, il rivelatore registra una pioggerellina quieta e antica, per lo più extrasolare, tutta implacabile.
        #JNSQscience_bd_cosmicRay_EelooSrfLandedPoles_00 = Il contatore ticchetta nel crepuscolo polare: quaggiù il "fondo" è l'evento principale.
        #JNSQscience_bd_cosmicRay_EelooSrfLandedHighlands_00 = Gli impulsi duri arrivano puliti, con un lieve spruzzo di secondarie dal terreno brillante.
        #JNSQscience_bd_cosmicRay_EelooSrfLandedMidlands_00 = Una grandinata costante e solitaria di particelle. Il silenzio di Eeloo non lascia al rivelatore nulla dietro cui nascondersi.
        #JNSQscience_bd_cosmicRay_EelooSrfLandedLowlands_00 = Il bacino elimina gli eventi più deboli, ma l'universo continua a mandare quelli forti lo stesso.
        #JNSQscience_bd_cosmicRay_EelooSrfLandedCanyon_00 = Giù nel canyon i conteggi a bassa energia calano: le tracce ad alta energia tagliano comunque dritte.
        #JNSQscience_bd_cosmicRay_EelooFlyingLow_00 = L'"atmosfera" smussa un po' gli impulsi più morbidi, ma il rivelatore fa clic come se fosse praticamente nello spazio.
        #JNSQscience_bd_cosmicRay_EelooFlyingHigh_00 = Su nella foschia sottile, il flusso si assesta sul fondo dello spazio profondo. Pulito, severo e molto difficile da ignorare.
        #JNSQscience_bd_cosmicRay_EelooInSpaceLowPoles_00 = I passaggi polari risultano un po' più caldi: traiettorie aperte sembrano trovarti più facilmente quassù.
        #JNSQscience_bd_cosmicRay_EelooInSpaceLowHighlands_00 = Un aumento netto delle secondarie segue l'altura sotto, come se la superficie stesse rispondendo.
        #JNSQscience_bd_cosmicRay_EelooInSpaceLowMidlands_00 = Il flusso è pulito e severo: statistiche di spazio profondo con sotto una cartolina ghiacciata.
        #JNSQscience_bd_cosmicRay_EelooInSpaceLowLowlands_00 = Sopra i bassopiani lo sciame di secondarie si ammorbidisce leggermente: le primarie tengono il tempo alla perfezione.
        #JNSQscience_bd_cosmicRay_EelooInSpaceLowCanyon_00 = Attraversando il bordo del canyon, il tasso cambia bruscamente, come se il terreno avesse intagliato una tacca nella foschia di particelle.
        #JNSQscience_bd_cosmicRay_CelesSrfLandedLowlands_00 = Il contatore tiene il tempo con regolarità: quaggiù il fondo galattico sembra meteo locale.
        #JNSQscience_bd_cosmicRay_CelesSrfLandedMidlands_00 = Senza alcun aiuto magnetico, il rivelatore registra un flusso pulito e severo di impulsi ad alta energia.
        #JNSQscience_bd_cosmicRay_CelesSrfLandedHighlands_00 = Lo spettro si indurisce sulle alture: meno ombre, più visitatori in linea retta.
        #JNSQscience_bd_cosmicRay_CelesSrfLandedMountains_00 = Le pareti montuose rimandano uno spruzzo netto di secondarie, come se la roccia rispondesse a ogni impatto.
        #JNSQscience_bd_cosmicRay_CelesSrfLandedPoles_00 = Nel freddo polare, i clic arrivano a burst irregolari. Abbastanza quieti da notarli tutti.
        #JNSQscience_bd_cosmicRay_CelesInSpaceLowLowlands_00 = In orbita bassa si vedono primari sopra e un lieve luccichio di rimbalzo dal terreno chiaro sotto.
        #JNSQscience_bd_cosmicRay_CelesInSpaceLowMidlands_00 = I dati formano un altopiano regolare e implacabile. Spazio profondo con una luna attaccata.
        #JNSQscience_bd_cosmicRay_CelesInSpaceLowHighlands_00 = Uno spruzzo frastagliato di secondarie accompagna le alture: la superficie è sorprendentemente loquace.
        #JNSQscience_bd_cosmicRay_CelesInSpaceLowMountains_00 = Sorvolando le montagne, picchi netti si allineano con le creste. Il terreno rende rumorose le statistiche.
        #JNSQscience_bd_cosmicRay_CelesInSpaceLowPoles_00 = I passaggi polari risultano un po' più "rumorosi", come se traiettorie aperte ti trovassero più facilmente qui.
        #JNSQscience_bd_cosmicRay_CelesInSpaceHigh_00 = Ben sopra Celes, il rivelatore sente soprattutto un'antica pioggerellina di spazio profondo. Quiet a, costante e per niente rassicurante.
        #JNSQscience_bd_cosmicRay_TamSrfLandedLowlands_00 = Il contatore crepita con regolarità: Tam è troppo piccolo e troppo privo d'aria per trattare con il cosmo.
        #JNSQscience_bd_cosmicRay_TamSrfLandedMidlands_00 = Un flusso pulito di impulsi energetici. Niente linee di campo, niente atmosfera, niente scuse.
        #JNSQscience_bd_cosmicRay_TamSrfLandedHighlands_00 = Il tasso risale lentamente sulle alture: qui la quota significa soprattutto meno posti dove nascondersi.
        #JNSQscience_bd_cosmicRay_TamSrfLandedTwinCraters_00 = I crateri gemelli rimandano una scintilla extra di secondarie, come due ciotole che rimbalzano la stessa grandine due volte.
        #JNSQscience_bd_cosmicRay_TamSrfLandedCraters_00 = Le pareti dei crateri non bloccano i raggi cosmici: rimandano solo un po' di statico nei registri.
        #JNSQscience_bd_cosmicRay_TamSrfLandedPockmarks_00 = Buche minuscole, picchi minuscoli: il microterreno fa sembrare il rivelatore come se stesse masticando ghiaia.
        #JNSQscience_bd_cosmicRay_TamInSpaceLowLowlands_00 = Radendo l'orbita bassa, intercetti primari puliti e un lieve rimbalzo rumoroso dalla superficie.
        #JNSQscience_bd_cosmicRay_TamInSpaceLowMidlands_00 = Il fondo resta alto e regolare: lo spazio profondo sembra scomodamente vicino.
        #JNSQscience_bd_cosmicRay_TamInSpaceLowHighlands_00 = Un breve indurimento dello spettro suggerisce roccia diversa, dispersione diversa, stessa pioggia implacabile.
        #JNSQscience_bd_cosmicRay_TamInSpaceLowTwinCraters_00 = Sopra i crateri gemelli, il grafico si fa frastagliato come se la superficie stesse "facendo eco" alle particelle in arrivo.
        #JNSQscience_bd_cosmicRay_TamInSpaceLowCraters_00 = Attraversare i bordi dei crateri aggiunge un picco netto, uno spruzzo di secondarie risale fino alla tua rotta.
        #JNSQscience_bd_cosmicRay_TamInSpaceLowPockmarks_00 = Il tasso di conteggio oscilla sopra i pockmark: il terreno è piccolo, ma la dispersione no.
        #JNSQscience_bd_cosmicRay_TamInSpaceHigh_00 = In alto sopra Tam, il rivelatore registra il fondo dello spazio profondo con occasionali rari colpi di ioni pesanti che sembrano stranamente personali.
        #JNSQscience_bd_cosmicRay_HamekSrfLandedLowlands_00 = Il contatore ticchetta nella polvere rossa: qualunque cosa abbia tinto questo mondo non si è preoccupata della schermatura dalle radiazioni.
        #JNSQscience_bd_cosmicRay_HamekSrfLandedMidlands_00 = Una grandinata costante di particelle ad alta energia. Hamek offre colore, non protezione.
        #JNSQscience_bd_cosmicRay_HamekSrfLandedHighlands_00 = Sulle alture, lo spettro si fa più netto: l'universo ha un colpo più pulito su di te.
        #JNSQscience_bd_cosmicRay_HamekSrfLandedPoles_00 = Il freddo polare non calma i dati: i clic restano nitidi e frequenti nel lungo crepuscolo.
        #JNSQscience_bd_cosmicRay_HamekInSpaceLowLowlands_00 = In orbita bassa si vedono primari luminosi e un lieve luccichio di secondarie che sale dalla superficie come statico secco.
        #JNSQscience_bd_cosmicRay_HamekInSpaceLowMidlands_00 = Il flusso si appiana in un altopiano severo. Spazio nudo con sotto una biglia cremisi.
        #JNSQscience_bd_cosmicRay_HamekInSpaceLowHighlands_00 = Uno spruzzo rumoroso di rimbalzi segue le alture: la superficie continua a rispondere.
        #JNSQscience_bd_cosmicRay_HamekInSpaceLowPoles_00 = I passaggi polari producono brevi aumenti, come se le traiettorie in linea retta preferissero la rotta più corta.
        #JNSQscience_bd_cosmicRay_HamekInSpaceHigh_00 = Ben sopra Hamek, il rivelatore si assesta in una pioggerellina sottile e antica, Per lo più galattica, tutta implacabile.
        #JNSQscience_bd_cosmicRay_NaraFlyingLow_00 = L'aria densa e fredda smorza la roba morbida, ma il rivelatore crepita comunque per colpi ostinati ad alta energia.
        #JNSQscience_bd_cosmicRay_NaraFlyingHigh_00 = Su nella foschia sottile, il tasso di conteggio sale e sfarfalla, come se stessi sfiorando il bordo di fasce invisibili.
        #JNSQscience_bd_cosmicRay_NaraInSpaceHigh_00 = Ben sopra Nara, il flusso si appiana sul fondo dello spazio profondo, con burst netti occasionali che sembrano fin troppo "locali".
        #JNSQscience_bd_cosmicRay_NaraSrfLandedLowlands_00 = Il contatore ticchetta con regolarità: qualunque cosa blocchi l'atmosfera di Nara, l'universo la rimpiazza con la parte che fa male.
        #JNSQscience_bd_cosmicRay_NaraSrfLandedMidlands_00 = Un ticchettio pulito e implacabile di particelle filtra nell'aria pesante come se non esistesse.
        #JNSQscience_bd_cosmicRay_NaraSrfLandedHighlands_00 = Meno strati sopra significa un mix più duro. La quota ti compra panorami e radiazione extra.
        #JNSQscience_bd_cosmicRay_NaraSrfLandedMountains_00 = Il rivelatore crepita più in fretta sulle creste: la schermatura di Nara sembra più sottile dove il cielo pare più vicino.
        #JNSQscience_bd_cosmicRay_NaraSrfLandedPolarLowlands_00 = Il tasso di conteggio sale nel freddo polare, come se le linee di campo stessero guidando i visitatori dritti dentro.
        #JNSQscience_bd_cosmicRay_NaraSrfLandedPoles_00 = Brevi scrosci irregolari arrivano a burst, come stare sotto un imbuto invisibile.
        #JNSQscience_bd_cosmicRay_NaraSrfLandedPolarHighlands_00 = Picchi netti tagliano il fondo: le alture polari prendono le particelle "premium".
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowLowlands_00 = In orbita bassa sopra i bassopiani si vedono primari regolari con una lieve bandatura, come se la magnetosfera stesse disegnando bande sotto di te.
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowMidlands_00 = Il flusso cala, poi sfarfalla, attraversando confini invisibili che non puoi vedere ma che puoi decisamente misurare.
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowHighlands_00 = Uno spettro un po' più duro accompagna il passaggio: meno atmosfera sotto significa meno schermatura accidentale.
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowMountains_00 = Il grafico si fa frastagliato sopra le montagne, come se il terreno ti rimandasse secondari dritto sulla rotta.
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowPolarLowlands_00 = La traccia polare risulta più "rumorosa", come se traiettorie aperte ti trovassero più facilmente vicino al bordo.
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowPoles_00 = Un fondo a burst irregolari suggerisce che le particelle vengano guidate lungo linee di campo come binari.
        #JNSQscience_bd_cosmicRay_NaraInSpaceLowPolarHighlands_00 = Picchi di conteggio si allineano con le alture polari: la superficie risponde con crepitio extra.
        #JNSQscience_bd_cosmicRay_AmosInSpaceHigh_00 = In alto sopra Amos, il rivelatore registra soprattutto la pioggerellina dello spazio profondo. Clic solitari senza scuse locali.
        #JNSQscience_bd_cosmicRay_AmosSrfLandedLowlands_00 = Senza aria e senza campo, il contatore fa clic come un metronomo impostato su "implacabile".
        #JNSQscience_bd_cosmicRay_AmosSrfLandedMidlands_00 = Una grandinata costante di impulsi. Amos non blocca nulla, tranne il tuo comfort.
        #JNSQscience_bd_cosmicRay_AmosSrfLandedHighlands_00 = Lo spettro si indurisce leggermente sulle alture: meno ombre, più visitatori in linea retta.
        #JNSQscience_bd_cosmicRay_AmosSrfLandedMountains_00 = Le pareti montuose rimandano uno spruzzo netto di secondarie, come se la roccia rispondesse a ogni impatto.
        #JNSQscience_bd_cosmicRay_AmosSrfLandedPoles_00 = Il fondo oscilla in brevi burst, come se l'influenza lontana di Nara filtrasse lungo i bordi.
        #JNSQscience_bd_cosmicRay_AmosInSpaceLowLowlands_00 = In orbita bassa si vedono primari luminosi e un lieve rimbalzo rumoroso dalla superficie sotto.
        #JNSQscience_bd_cosmicRay_AmosInSpaceLowMidlands_00 = Il flusso resta alto e pulito: senza atmosfera, ogni colpo sembra personale.
        #JNSQscience_bd_cosmicRay_AmosInSpaceLowHighlands_00 = Un breve indurimento del mix suggerisce dispersione diversa della roccia, non pietà diversa.
        #JNSQscience_bd_cosmicRay_AmosInSpaceLowMountains_00 = Picchi frastagliati si allineano con le montagne. Il terreno rende rumorose le statistiche.
        #JNSQscience_bd_cosmicRay_AmosInSpaceLowPoles_00 = I passaggi polari sfarfallano a burst irregolari, come se stessi sfiorando una cucitura invisibile nell'ambiente.
        #JNSQscience_bd_cosmicRay_EnonInSpaceHigh_00 = Ben sopra Enon, il rivelatore si assesta su un fondo sottile e antico, abbastanza quieto da notare ogni raro ione pesante.
        #JNSQscience_bd_cosmicRay_EnonSrfLandedLowlands_00 = Il contatore crepita con regolarità: Enon è senza aria, silenzioso e completamente trasparente allo spazio.
        #JNSQscience_bd_cosmicRay_EnonSrfLandedMidlands_00 = Un flusso pulito di impulsi energetici. Nessuna schermatura sopra, nessuna ambiguità nei numeri.
        #JNSQscience_bd_cosmicRay_EnonSrfLandedHighlands_00 = Il tasso risale lentamente sulle alture: qui "quota" significa soprattutto meno ombre dietro cui nascondersi.
        #JNSQscience_bd_cosmicRay_EnonSrfLandedPoles_00 = Brevi aumenti arrivano a burst, come se le particelle preferissero la rotta più diritta attraverso la calotta fredda.
        #JNSQscience_bd_cosmicRay_EnonInSpaceLowLowlands_00 = In orbita bassa le primarie si registrano puliti, con un lieve luccichio di secondarie che sale dal terreno brillante.
        #JNSQscience_bd_cosmicRay_EnonInSpaceLowMidlands_00 = Il fondo resta severo e costante: spazio profondo, più un po' di eco dalla superficie.
        #JNSQscience_bd_cosmicRay_EnonInSpaceLowHighlands_00 = I conteggi salgono di un livello sopra le alture: il terreno sotto disperde più di quanto scherm i.
        #JNSQscience_bd_cosmicRay_EnonInSpaceLowPoles_00 = La traccia polare risulta leggermente più "calda", come se traiettorie aperte ti trovassero più facilmente qui.
        #JNSQscience_bd_cosmicRay_PraxInSpaceHigh_00 = In alto sopra Prax, il rivelatore sente soprattutto il fondo dello spazio profondo: clic solitari in un silenzio enorme.
        #JNSQscience_bd_cosmicRay_PraxSrfLandedLowlands_00 = Il contatore ticchetta in una grandinata costante: Prax sembra fatto apposta per dimostrare "nessuna schermatura".
        #JNSQscience_bd_cosmicRay_PraxSrfLandedMidlands_00 = Conteggi puliti e implacabili. Lo spazio, così lontano, non si preoccupa della sottigliezza.
        #JNSQscience_bd_cosmicRay_PraxSrfLandedHighlands_00 = Lo spettro si indurisce sulle alture: meno ombre, visitatori più taglienti.
        #JNSQscience_bd_cosmicRay_PraxSrfLandedMountains_00 = Le montagne rimandano uno spruzzo netto di secondarie, come se la superficie stesse commentando i tuoi dati.
        #JNSQscience_bd_cosmicRay_PraxSrfLandedPoles_00 = Brevi burst irregolari compaiono vicino ai poli. Abbastanza quieti da far ascoltare tutti.
        #JNSQscience_bd_cosmicRay_PraxInSpaceLowLowlands_00 = In orbita bassa si vedono primari luminosi e un lieve luccichio di rimbalzo dalla superficie sotto.
        #JNSQscience_bd_cosmicRay_PraxInSpaceLowMidlands_00 = Il flusso si appiana in un altopiano severo. Spazio profondo con una luna attaccata.
        #JNSQscience_bd_cosmicRay_PraxInSpaceLowHighlands_00 = Uno spruzzo rumoroso di secondarie accompagna le alture: la superficie risponde a colpi di clic.
        #JNSQscience_bd_cosmicRay_PraxInSpaceLowMountains_00 = Picchi frastagliati si allineano con le linee di cresta. Il terreno rende rumorose le statistiche.
        #JNSQscience_bd_cosmicRay_PraxInSpaceLowPoles_00 = I passaggi polari risultano più "rumorosi", come se le traiettorie in linea retta preferissero la rotta più corta.

        // bd_drill
        #JNSQscience_bd_drill_MohoSrfLandedPoles_00 = Il trapano macina un terreno più fresco e ostinato. Il carotaggio risale come polvere friabile e frammenti taglienti che non restano compattati a lungo.
        #JNSQscience_bd_drill_MohoSrfLandedLowlands_00 = La punta affonda nella regolite arsa dal sole e torna ricoperta di una polvere fine e scura. Il contenitore del campione si scalda anche solo restando lì fermo.
        #JNSQscience_bd_drill_MohoSrfLandedPolarIceCraters_00 = All'ombra, il trapano incontra uno strato che sibila quando si scalda. Qualunque cosa sia, chiaramente preferiva essere lasciata in pace.
        #JNSQscience_bd_drill_MohoSrfLandedHighlands_00 = Il trapano sbatte su roccia densa e produce un carotaggio frastagliato. Gli scienziati annuiscono soddisfatti per quanto sembri ostile.
        #JNSQscience_bd_drill_MohoSrfLandedMidlands_00 = Una crosta sottile cede a strati più sciolti sotto. Il carotaggio mostra una pila ordinata di "polvere, polvere, altra polvere".
        #JNSQscience_bd_drill_MohoSrfLandedCraters_00 = Il trapano affronta detriti rimescolati da impatti e restituisce un pasticcio misto e vetroso. Gli strati sembrano mescolati con entusiasmo.
        #JNSQscience_bd_drill_MohoSrfLandedExoticCraters_00 = Nel carotaggio compaiono granuli dai colori strani che non corrispondono alla superficie. Il registro del trapano aggiunge: "Esotico confermato. Definire, per favore."
        #JNSQscience_bd_drill_MohoSrfLandedRareCraters_00 = Il tubo campione si riempie di frammenti grossolani e di qualche scheggia sorprendente che fa ping sui sensori. Qualcuno etichetta in silenzio la fiala "non fare merenda".
        #JNSQscience_bd_drill_MohoSrfLandedVoronoiCraters_00 = Il carotaggio si spezza in pezzi sospettosamente regolari mentre viene estratto. Controlli due volte che il trapano non abbia stampato un motivo per sbaglio.
        #JNSQscience_bd_drill_MohoSrfLandedNotableCraters_00 = Strato dopo strato di storia frantumata scivola fuori, ogni banda leggermente diversa. Il cratere sembra deciso a farsi ricordare.
        #JNSQscience_bd_drill_MohoSrfLandedPeaks_00 = Il trapano fatica a fare presa, poi alla fine strappa un piccolo tappo solido. Sembra di aver campionato la pazienza di una montagna.
        #JNSQscience_bd_drill_EveSrfLandedPoles_00 = Il trapano tira su materiale freddo e pesante che si attacca a tutto. Gli strumenti insistono che sia "suolo", ma si comporta come se ti stesse giudicando.
        #JNSQscience_bd_drill_EveSrfLandedLowlands_00 = La punta affonda con un terriccio umido e il carotaggio risale denso e appiccicoso. Ci vuole impegno perché il campione lasci il trapano.
        #JNSQscience_bd_drill_EveSrfLandedMidlands_00 = Il carotaggio mostra strati compattati con una lieve bandatura minerale. La pressione fa sembrare strutturale persino la terra.
        #JNSQscience_bd_drill_EveSrfLandedHighlands_00 = Il trapano restituisce materiale più secco e roccioso, con meno sorprese viscide. Tutti si rilassano finché il campione non inizia comunque a trasudare lentamente.
        #JNSQscience_bd_drill_EveSrfLandedPeaks_00 = Crosta sottile e friabile sopra roccia dura: finalmente qualcosa che si lascia trivellare sul serio. Il carotaggio esce comunque leggermente caldo.
        #JNSQscience_bd_drill_EveSrfLandedExplodiumSea_00 = Il trapano smuove un fango viscido e reattivo che ribolle nel contenitore. Il responsabile della sicurezza aggiunge parecchie nuove regole.
        #JNSQscience_bd_drill_EveSrfLandedMountains_00 = Il trapano affronta pietra dura venata di sali strani. Il carotaggio sembra stabile finché non incontra aria fresca e inizia a cambiare idea.
        #JNSQscience_bd_drill_EveSrfLandedShores_00 = Sabbia satura collassa nel foro e prova a tornare al mare. Il carotaggio recuperato è metà salamoia, metà graniglia, tutto ostinato.
        #JNSQscience_bd_drill_EveSrfLandedKrakensWell_00 = Il trapano incontra una sacca insolitamente calda e il carotaggio risale ribollente e teso. Sigilli il contenitore e fai finta che sia geologia normale.
        #JNSQscience_bd_drill_GillySrfLandedLowlands_00 = Il trapano cerca di spingersi via dalla superficie. Il "carotaggio" è per lo più ghiaia sciolta che fluttua verso il coperchio quando non guardi.
        #JNSQscience_bd_drill_GillySrfLandedMidlands_00 = La punta si impunta su roccia bitorzoluta e libera qualche frammento riluttante. Il campione è più "sassolini assortiti" che "storia a strati".
        #JNSQscience_bd_drill_GillySrfLandedHighlands_00 = Il trapano finalmente estrae un minuscolo tappo di roccia compattata, poi si sbriciola nella bassa gravità. Lo registri comunque con orgoglio come "carotaggio riuscito".
        #JNSQscience_bd_drill_KerbinSrfLandedAdministration_00 = Trivelli per "campioni del sottosuolo" e recuperi tre strati distinti di scartoffie, due timbri fossilizzati e un promemoria dal tono fermo sulle trivellazioni.
        #JNSQscience_bd_drill_KerbinSrfLandedAstronautComplex_00 = Il trapano affronta il terreno sotto il complesso e tira su un carotaggio pieno di snack smarriti, fibre di calzini e qualcosa che lo staff medico finge di non riconoscere.
        #JNSQscience_bd_drill_KerbinSrfLandedCrawlerway_00 = La punta colpisce il materiale compattato del crawlerway e tutta l'attrezzatura vibra come un conto alla rovescia di lancio: il responsabile della sicurezza insiste che questo non è un banco vibrazionale approvato.
        #JNSQscience_bd_drill_KerbinSrfLandedFlagPole_00 = Il carotaggio contiene bande alternate di cemento, scaglie di vernice e orgoglio cerimoniale: nessuno sa spiegare perché le "fondazioni della bandiera" abbiano sette strati di ristrutturazione.
        #JNSQscience_bd_drill_KerbinSrfLandedMissionControl_00 = Tranci un fascio di cavi interrati e il Controllo Missione dichiara subito un "evento di scavo inatteso": al trapano viene assegnato un numero di volo e messo a terra.
        #JNSQscience_bd_drill_KerbinSrfLandedR&D_00 = Il campione esce leggermente scintillante e con un tenue ronzio: R&S ti chiede di restituirlo e di smettere di "testare sul campo" il loro pavimento.
        #JNSQscience_bd_drill_KerbinSrfLandedR&DCentralBuilding_00 = Il trapano produce una colonna perfettamente stratificata di moduli e firme: la densità burocratica è fuori scala e in qualche modo sta ancora aumentando.
        #JNSQscience_bd_drill_KerbinSrfLandedR&DCornerLab_00 = Trivelli nell'angolo e colpisci una riserva di snack nascosta: il rapporto ufficiale la registra come "deposito sedimentario ricco di nutrienti".
        #JNSQscience_bd_drill_KerbinSrfLandedR&DMainBuilding_00 = Il trapano estrae un carotaggio che somiglia in modo sospetto a materiale da prototipo: gli scienziati annuiscono solenni e lo chiamano "eccellente collaborazione interdipartimentale".
        #JNSQscience_bd_drill_KerbinSrfLandedR&DObservatory_00 = La trivellazione scuote l'osservatorio quanto basta per rovinare una lunga esposizione: gli astronomi lo registrano come evento sismico e ti fulminano con lo sguardo quanto la scienza consente.
        #JNSQscience_bd_drill_KerbinSrfLandedR&DSideLab_00 = Il campione contiene limature di lega "decisamente-non-riservata": arriva una scorta cortese che suggerisce con cortesia di smettere di essere curioso.
        #JNSQscience_bd_drill_KerbinSrfLandedR&DSmallLab_00 = Non c'è spazio per un allestimento adeguato, quindi monti il trapano su una tavoletta portablocco: la tavoletta diventa il gruppo di controllo.
        #JNSQscience_bd_drill_KerbinSrfLandedR&DTanks_00 = Il carotaggio odora di vecchia perdita di monoprop e di pessime decisioni: il responsabile della sicurezza inventa al volo un nuovo briefing.
        #JNSQscience_bd_drill_KerbinSrfLandedR&DWindTunnel_00 = Trivelli nel pavimento della galleria del vento e il flusso d'aria fa fischiare l'attrezzatura come un allarme: gli ingegneri lo chiamano "dato utile" e si rifiutano di elaborare.
        #JNSQscience_bd_drill_KerbinSrfLandedRunway_00 = Trivelli dritto attraverso lo "strato superiore" della pista e ricevi subito una chiamata prioritaria che chiede perché la pista sia diventata un sistema di ventilazione.
        #JNSQscience_bd_drill_KerbinSrfLandedSPH_00 = Il trapano tira su un carotaggio pieno di rivetti e fissaggi dimenticati: la squadra dell'hangar esulta finché non lo etichetti come "prova".
        #JNSQscience_bd_drill_KerbinSrfLandedSPHMainBuilding_00 = Inizi a trivellare e attivi immediatamente l'impianto sprinkler: l'esperimento ora è ufficialmente "operazioni acquatiche".
        #JNSQscience_bd_drill_KerbinSrfLandedSPHRoundTank_00 = Il campione esce già lubrificato per qualche motivo: tutti concordano di non fare domande che richiedano nuova burocrazia.
        #JNSQscience_bd_drill_KerbinSrfLandedSPHTanks_00 = Il campione contiene uno strato denso di alette di estremità scartate: compare il responsabile del riciclo, visibilmente combattuto tra gioia e rabbia.
        #JNSQscience_bd_drill_KerbinSrfLandedSPHWaterTower_00 = Trivelli vicino alla torre dell'acqua e migliori accidentalmente la pressione: i Servizi ti ringraziano nel linguaggio freddo e distante dell'approvazione riluttante.
        #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationDishEast_00 = La calibrazione della parabola deraglia appena la punta affronta: la squadra di tracciamento dà la colpa al "rumore" e lo dice guardandoti dritto.
        #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationDishNorth_00 = La trivellazione produce una vibrazione perfettamente a tempo che la parabola interpreta come un segnale: qualcuno inizia a provare a decodificare il tuo carotaggio.
        #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationDishSouth_00 = La parabola aggancia per un attimo il motore del trapano come se fosse un veicolo spaziale: ti chiedono di presentare un piano di volo per l'attrezzatura.
        #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationHub_00 = Il carotaggio è per lo più fondi di caffè compattati e stress: viene registrato come strato critico di risorsa operativa.
        #JNSQscience_bd_drill_KerbinSrfLandedVAB_00 = Estrai un carotaggio che contiene frammenti di bulloni antichi, fuliggine bruciata e tre generazioni di incarti di snack: l'archeologia chiede una voce di budget.
        #JNSQscience_bd_drill_KerbinSrfLandedVABMainBuilding_00 = Il trapano colpisce qualcosa di cavo e impari molto sulla geometria interna dell'EAV e ancora di più sul vocabolario degli ingegneri.
        #JNSQscience_bd_drill_KerbinSrfLandedVABPodMemorial_00 = Trivellare è "assolutamente proibito", quindi prendi un campione "non invasivo" accanto: il memoriale resta dignitoso, tu no.
        #JNSQscience_bd_drill_KerbinSrfLandedVABRoundTank_00 = Il campione è quasi tutto strati di vernice e ottimismo: i pianificatori chiedono se l'ottimismo possa essere raffinato in carburante.
        #JNSQscience_bd_drill_KerbinSrfLandedVABSouthComplex_00 = Il carotaggio mostra una linea del tempo ordinata di depositi di fuliggine dei lanci passati: gli storici discutono su quale strato conti come "classico".
        #JNSQscience_bd_drill_KerbinSrfLandedVABTanks_00 = Il trapano libera un sentore sospetto di qualcosa di energetico: tutti evacuano e tu lo registri come "rilevati organici volatili".
        #JNSQscience_bd_drill_KerbinSrfLandedKSC_00 = Trivelli ovunque nel sito e il carotaggio esce metà suolo, metà procedure: la frazione procedurale è in qualche modo più pesante.
        #JNSQscience_bd_drill_KerbinSrfLandedIslandAirfield_00 = Il trapano tira su sabbia, graniglia di corallo e una vecchia chiave: la torre chiama subito via radio per chiedere se hai trovato la loro chiave.
        #JNSQscience_bd_drill_KerbinSrfLandedBaikerbanur_00 = Il campione contiene polvere, decalcomanie sbiadite e una checklist sorprendentemente fresca: la nostalgia è ufficialmente un contaminante misurabile.
        #JNSQscience_bd_drill_KerbinSrfLandedBaikerbanurLaunchpad_00 = Il trapano porta su scorie, cemento bruciato e "ghiaccio misterioso": lo etichetti come criogenici d'epoca per evitare domande di approfondimento.
        #JNSQscience_bd_drill_KerbinSrfLandedMidlands_00 = Il trapano affonda facilmente nel terreno ricco, ma il carotaggio risale come un miscuglio friabile di radici e terra. Le note di laboratorio dicono: "Per lo più snack futuri."
        #JNSQscience_bd_drill_KerbinSrfLandedLowlands_00 = Il trapano allaga il proprio foro con acqua di falda e il "carotaggio" estratto si comporta come un budino. Decidi di registrarlo come stato di transizione liquido-solido.
        #JNSQscience_bd_drill_KerbinSrfLandedAridLowlands_00 = Il trapano frantuma una crosta secca e inizia subito a carteggiarsi da solo con il campione. Gli ingegneri chiedono di smettere di chiamarlo "inaspettato".
        #JNSQscience_bd_drill_KerbinSrfLandedAridMidlands_00 = Finalmente trovi qualcosa di solido sotto le dune... poi collassa in sabbia ancora più fine. Il Controllo Missione lo archivia sotto "scoperte che sapevamo già".
        #JNSQscience_bd_drill_KerbinSrfLandedAridHighlands_00 = Il carotaggio risale in strati polverosi e colorati che macchiano le provette e i guanti. Lo etichetti "Arido, ma con carattere".
        #JNSQscience_bd_drill_KerbinSrfLandedAridMountains_00 = Il trapano sbatte su roccia arsa dal sole e restituisce un carotaggio che sembra personalmente offeso. Il team scientifico lo definisce "eccellente" e "decisamente abrasivo".
        #JNSQscience_bd_drill_KerbinSrfLandedWelcomeBackIsland_00 = Il trapano porta su un cilindro ordinato di sabbia... più un bullone misterioso. O la geologia qui è strana, o qualcuno è stato "riaccolto" parecchie volte.
        #JNSQscience_bd_drill_MunSrfLandedPoles_00 = Il trapano affronta polvere fredda e ostinata. Il campione risale aggrumato di statico e brina fine.
        #JNSQscience_bd_drill_MunSrfLandedHighlands_00 = Il carotaggio è regolite molto compatta e breccia tagliente.
        #JNSQscience_bd_drill_MunSrfLandedMidlands_00 = Un cilindro ordinato di polvere grigia scivola fuori dal manicotto. Cerca subito di tornare a essere una nuvola.
        #JNSQscience_bd_drill_MunSrfLandedLowlands_00 = Il trapano restituisce granuli più scuri e minuscole perle vetrose. Qui qualcosa si è fuso molto tempo fa e non l'ha mai dimenticato.
        #JNSQscience_bd_drill_MunSrfLandedPolarIceCraters_00 = Il foro espira una lieve foschia mentre il trapano scalda il terreno. Gli strumenti insistono che questo conti come "rilascio di volatili".
        #JNSQscience_bd_drill_MunSrfLandedExoticCraters_00 = Il carotaggio mostra strati mescolati che non si mettono d'accordo su un ordine. Lo etichetti "ejecta complicato" e vai avanti in fretta.
        #JNSQscience_bd_drill_MunSrfLandedRareCraters_00 = Il trapano tira su una colonna bitorzoluta di macerie e frammenti strani. Niente corrisponde allo "standard grigio" promesso.
        #JNSQscience_bd_drill_MunSrfLandedVoronoiCraters_00 = Il campione si spezza in blocchi stranamente regolari mentre viene estratto. Il motivo sembra pianificato, cosa inquietante per una roccia.
        #JNSQscience_bd_drill_MunSrfLandedNotableCraters_00 = Bande distinte di polvere e pietra frantumata si impilano come un libro di storia con pagine mancanti. Il trapano ha sottolineato tutte le parti confuse.
        #JNSQscience_bd_drill_MunSrfLandedMountains_00 = Il trapano crepita su roccia dura e restituisce un carotaggio frastagliato. È meno un campione e più un avvertimento.
        #JNSQscience_bd_drill_MinmusSrfLandedPoles_00 = Il trapano taglia una crosta friabile che scintilla alla luce. Il carotaggio sembra cresciuto, non depositato.
        #JNSQscience_bd_drill_MinmusSrfLandedLowlands_00 = La punta affonda con un crunch strano e morbido. Il materiale recuperato stride contro il contenitore come cristalli compressi.
        #JNSQscience_bd_drill_MinmusSrfLandedMidlands_00 = Uno strato pallido e polveroso cede a inclusioni più dure. Il registro del trapano annota "inaspettatamente strutturato".
        #JNSQscience_bd_drill_MinmusSrfLandedHighlands_00 = La crosta è abbastanza solida da far risuonare il trapano. Il campione risale in schegge pulite e polvere scintillante.
        #JNSQscience_bd_drill_MinmusSrfLandedBasins_00 = Il trapano tira su un carotaggio più liscio e denso, con meno vuoti. Qualunque cosa si sia depositata qui ha avuto tempo di depositarsi per bene.
        #JNSQscience_bd_drill_MinmusSrfLandedBrownBasins_00 = Il campione è più scuro e granulare, con impurità ovunque. Il trapano odora vagamente di "non ghiaccio".
        #JNSQscience_bd_drill_MinmusSrfLandedBrownLowlands_00 = Il carotaggio alterna cristallo pallido e graniglia bruna. Il confine è abbastanza netto da dare la colpa a qualcuno.
        #JNSQscience_bd_drill_MinmusSrfLandedBrownMidlands_00 = Il trapano restituisce materiale friabile che macchia il manicotto del campione. Gli scienziati discutono se sia chimica o carattere.
        #JNSQscience_bd_drill_MinmusSrfLandedBrownHighlands_00 = La punta raschia granuli abrasivi che rifiutano di compattarsi. Il carotaggio risale ruvido, come se volesse carteggiare il laboratorio.
        #JNSQscience_bd_drill_MinmusSrfLandedMountains_00 = Il trapano fatica, poi trionfa con un tappo cristallino solido. È la cosa più "simile a roccia" che tu abbia visto qui per tutto il giorno.
        #JNSQscience_bd_drill_DunaSrfLandedIceCaps_00 = Il trapano stride nella brina friabile e restituisce un carotaggio rosa di ghiaccio e polvere. Sublima quel tanto che basta da far sembrare colpevole la provetta.
        #JNSQscience_bd_drill_DunaSrfLandedHighlands_00 = La punta macina strati duri ripuliti dal vento e porta su roccia granulosa e ossidata. Il carotaggio è praticamente "polvere compressa con ambizione".
        #JNSQscience_bd_drill_DunaSrfLandedMidlands_00 = Un cilindro ordinato di regolite rossa fine scivola fuori, poi prova subito a tornare in aria. Il trapano sostiene che questo conti come "geologia altamente mobile".
        #JNSQscience_bd_drill_DunaSrfLandedLowlands_00 = Il foro collassa leggermente mentre estrai un mix più denso e più scuro. Gli strati suggeriscono che questo terreno si stia assestando da moltissimo tempo.
        #JNSQscience_bd_drill_DunaSrfLandedCraters_00 = Il carotaggio è una miscela caotica di perle fuse e pietra frantumata. Storia degli impatti, ora in comoda forma tubolare.
        #JNSQscience_bd_drill_DunaSrfLandedRareCraters_00 = Il trapano tira su frammenti insoliti e vetrosi che fanno ping sui sensori. Qualcuno lo etichetta "raro" e smette di chiedere cosa significhi.
        #JNSQscience_bd_drill_DunaSrfLandedVoronoiCraters_00 = Il campione si spezza in blocchi stranamente regolari mentre esce dal manicotto. Il motivo sembra accidentale, ma dà l'idea che ti stia guardando.
        #JNSQscience_bd_drill_DunaSrfLandedNotableCraters_00 = Ejecta stratificato si impila ordinato nel carotaggio, come se il cratere avesse tenuto le ricevute. Il team scientifico discute su quale strato sia la "parte buona".
        #JNSQscience_bd_drill_DunaSrfLandedExoticCraters_00 = Granuli brillanti e graniglia scura si alternano in bande nette. Il registro del trapano dice solo: "Esotico confermato. Per favore non leccare."
        #JNSQscience_bd_drill_DunaSrfLandedTrenches_00 = Il trapano trova sedimenti compattati con strati sottili e inclinati. Qualunque cosa abbia scavato questa fossa ha anche archiviato le prove con cura.
        #JNSQscience_bd_drill_DunaSrfLandedNotablePlains_00 = Il carotaggio è per lo più polvere uniforme con occasionali croste cementate. Le pianure sono coerenti... finché non smettono di esserlo.
        #JNSQscience_bd_drill_DunaSrfLandedNotableMountains_00 = La roccia dura lascia il posto a bande fratturate e vene minerali. Il trapano restituisce un carotaggio che sembra sotto stress da ere.
        #JNSQscience_bd_drill_DunaSrfLandedMountains_00 = La punta crepita su pietra ostinata e porta su un tappo frastagliato. La montagna sembra infastidita che tu ne abbia preso un pezzo.
        #JNSQscience_bd_drill_DunaSrfLandedVolcano_00 = Il trapano incontra materiale più caldo e più scuro, con vescicole e crosta friabile. Il campione odora di "di recente non un problema".
        #JNSQscience_bd_drill_IkeSrfLandedPoles_00 = Il trapano affronta regolite fredda e compatta e restituisce un carotaggio chiaro e polveroso. Tutto si appiccica a tutto, inclusa la tua pazienza.
        #JNSQscience_bd_drill_IkeSrfLandedMountains_00 = La punta sbatte su roccia dura ed estrae un tappo tagliente e fratturato. Il carotaggio sembra spezzato apposta.
        #JNSQscience_bd_drill_IkeSrfLandedMidlands_00 = Scivola fuori una colonna grigia uniforme con granuli fini e ciottoli occasionali. La luna sembra decisa a essere ostinatamente nella media.
        #JNSQscience_bd_drill_IkeSrfLandedLowlands_00 = Il trapano tira su macerie più scure e strati poco compattati. Il campione rifiuta di restare in un unico pezzo per molto.
        #JNSQscience_bd_drill_IkeSrfLandedHighlands_00 = Il carotaggio contiene materiale più duro e più cementato, con meno fini. Il trapano sembra soddisfatto di sé per una volta.
        #JNSQscience_bd_drill_EdnaSrfLandedLowlands_00 = Il trapano spinge attraverso una superficie polverosa fino a graniglia ghiacciata più dura. Il carotaggio scintilla appena, come se cercasse di sembrare innocente.
        #JNSQscience_bd_drill_EdnaSrfLandedMidlands_00 = Un mix stratificato di polvere scura e frammenti chiari e friabili risale pulito. Gli strumenti continuano a litigare se sia "roccia" o "roccia fredda".
        #JNSQscience_bd_drill_EdnaSrfLandedHighlands_00 = La punta macina materiale solido e antico e restituisce un carotaggio ostinato che resiste a spaccarsi. Qualunque cosa sia, si tiene insieme da molto tempo.
        #JNSQscience_bd_drill_EdnaSrfLandedPolarIceCraters_00 = Il trapano incontra strati ricchi di volatili che appannano il manicotto mentre si scaldano. La provetta diventa un minuscolo sistema meteo.
        #JNSQscience_bd_drill_EdnaSrfLandedWhites_00 = Scivola fuori un carotaggio chiaro e gessoso con granuli cristallini ovunque. Il laboratorio chiede più contenitori e meno domande.
        #JNSQscience_bd_drill_DakSrfLandedLowlands_00 = Il trapano prova a spingersi via dalla superficie mentre raccoglie detriti sciolti. Il "carotaggio" è per lo più ciottoli impilati con educazione.
        #JNSQscience_bd_drill_DakSrfLandedMidlands_00 = La punta si impunta su roccia bitorzoluta e libera un mix compattato di polvere e frammenti. Il campione sembra assemblato, non depositato.
        #JNSQscience_bd_drill_DakSrfLandedHighlands_00 = Una crosta sottile cede a materiale ostinato e a blocchi. Il trapano restituisce un piccolo tappo che in bassa gravità vuole subito sbriciolarsi.
        #JNSQscience_bd_drill_DresSrfLandedPoles_00 = Il trapano affonda in terreno freddo e polveroso e tira su polvere chiara con granuli ghiacciati. Il campione crepita piano mentre si scalda.
        #JNSQscience_bd_drill_DresSrfLandedHighlands_00 = La punta macina strati duri e secchi ed estrae un carotaggio granuloso. La roccia qui sembra abbastanza vecchia da voler fare reclamo.
        #JNSQscience_bd_drill_DresSrfLandedMidlands_00 = Emerge un cilindro ordinato di regolite fine e grigiastra con inclusioni sparse. Anche le parti noiose sono scientificamente preziose, a quanto pare.
        #JNSQscience_bd_drill_DresSrfLandedLowlands_00 = Il trapano restituisce sedimenti più scuri, compattati più del previsto. Gli strati suggeriscono accumulo lento e cambiamento ancora più lento.
        #JNSQscience_bd_drill_DresSrfLandedCanyon_00 = Il carotaggio mostra strati inclinati e detriti mescolati, come se le pareti del canyon perdessero segreti da ere. Lo etichetti "dramma strutturale".
        #JNSQscience_bd_drill_LaytheSrfLandedShores_00 = Il trapano tira su strati umidi e granulosi che provano con tutte le forze a tornare spiaggia. La provetta si appanna come se fosse orgogliosa di essere "quasi abitabile".
        #JNSQscience_bd_drill_LaytheSrfLandedShallows_00 = La punta affronta sabbia fradicia e incontra sotto una crosta ostinata di graniglia compattata. Il carotaggio risale a strisce di sale e granuli scuri finissimi.
        #JNSQscience_bd_drill_LaytheSrfLandedLowlands_00 = Il trapano affonda pulito nel terreno soffice, poi si lamenta quando il foro inizia a franare. Il carotaggio recuperato è fango compattato e sassolini, compressi con ordine dal tempo.
        #JNSQscience_bd_drill_LaytheSrfLandedMidlands_00 = Una crosta solida cede a strati più sciolti sotto, come se il pianeta avesse dimenticato di finire di asciugarsi. Il carotaggio mostra bande alternate di polvere e grumi granulosi.
        #JNSQscience_bd_drill_LaytheSrfLandedHighlands_00 = Il trapano raschia terreno roccioso con meno sorprese bagnate. Il carotaggio è denso, ricco di minerali e fastidiosamente fiero della propria stabilità.
        #JNSQscience_bd_drill_LaytheSrfLandedMountains_00 = La punta crepita su roccia dura e restituisce un tappo frastagliato con polvere punteggiata di ghiaccio. Gli ingegneri annotano che il trapano sembra "stanco".
        #JNSQscience_bd_drill_LaytheSrfLandedIceCaps_00 = Il trapano incide ghiaccio friabile che stride e crepa col proprio calore. Il campione risale in scaglie gelate con una sottile pellicola salmastra.
        #JNSQscience_bd_drill_LaytheSrfLandedEnclosedFaults_00 = Il trapano incontra strati fratturati che si spostano e si assestano mentre estrai il carotaggio. Il campione sembra assemblato dal terreno rotto di ieri.
        #JNSQscience_bd_drill_VallSrfLandedPoles_00 = Il trapano frantuma ghiaccio vetroso e restituisce un carotaggio chiaro e friabile che crepita mentre si scalda. La polvere si attacca a tutto con uno statico ostinato.
        #JNSQscience_bd_drill_VallSrfLandedLowlands_00 = Una crosta sottile cede a brina compattata e granuli fini. Il carotaggio è liscio e freddo, come se la superficie si fosse stirata in silenzio fino a diventare piatta.
        #JNSQscience_bd_drill_VallSrfLandedMidlands_00 = Il trapano tira su bande stratificate di ghiaccio e polvere con minuscole inclusioni scintillanti. Gli strumenti lo definiscono "uniforme", che in qualche modo suona come un avvertimento.
        #JNSQscience_bd_drill_VallSrfLandedHighlands_00 = La punta macina materiale più duro e più antico e restituisce un tappo rigido con fratture taglienti. La superficie di Vall sembra decisa a non farsi campionare con garbo.
        #JNSQscience_bd_drill_VallSrfLandedMountains_00 = Il trapano fatica a fare presa su duro ghiaccio-roccia frantumato. Il carotaggio esce a pezzi, come se la montagna si fosse rifiutata di collaborare fino in fondo.
        #JNSQscience_bd_drill_TyloSrfLandedPoles_00 = Il trapano affronta regolite densa che nel manicotto si compatta come cemento. Il carotaggio estratto è pesante, scuro e si rifiuta di sbriciolarsi.
        #JNSQscience_bd_drill_TyloSrfLandedLowlands_00 = Emerge un cilindro ordinato di polvere fine... poi capisci che è "fine" solo perché è stata macinata per ere. Il carotaggio sembra compresso dalla pura ostinazione.
        #JNSQscience_bd_drill_TyloSrfLandedMidlands_00 = La punta frantuma granuli misti e ghiaia e restituisce un carotaggio molto compatto con frammenti di roccia sparsi. I motori del trapano scaldano più di quanto vorresti.
        #JNSQscience_bd_drill_TyloSrfLandedHighlands_00 = Il trapano crepita su un substrato duro e alla fine estrae un tappo frastagliato. Il campione sembra abbastanza robusto da trivellare in risposta.
        #JNSQscience_bd_drill_TyloSrfLandedMountains_00 = La punta martella roccia che non crede di dover diventare un campione. Vinci un piccolo carotaggio fratturato e lo registri subito come una grande vittoria.
        #JNSQscience_bd_drill_BopSrfLandedPoles_00 = Il trapano prova a spingersi via dalla superficie mentre raccoglie graniglia bruna sciolta. Il "carotaggio" è per lo più ciottoli che si risistemano quando sbatti le palpebre.
        #JNSQscience_bd_drill_BopSrfLandedLowlands_00 = La punta affonda in un terreno da mucchio di macerie e porta su una breve pila di polvere e frammenti. Gli strati sembrano casuali, probabilmente lo sono.
        #JNSQscience_bd_drill_BopSrfLandedMidlands_00 = Una crosta sottile si spezza in zolle, poi torna polvere nel contenitore. Il registro del trapano recita: "Il materiale mostra estrema difficoltà a impegnarsi."
        #JNSQscience_bd_drill_BopSrfLandedHighlands_00 = Il trapano si impunta su roccia a blocchi e libera un frammento ostinato con rivestimento polveroso. È la cosa più solida che tu abbia visto qui, e non dice molto.
        #JNSQscience_bd_drill_BopSrfLandedMountains_00 = La punta sbatte su pietra frastagliata e restituisce un tappo fratturato che a malapena si qualifica come cilindrico. La montagna sembra offesa che tu l'abbia chiesto.
        #JNSQscience_bd_drill_PolSrfLandedPoles_00 = Il trapano incide materiale chiaro e poroso che si comprime mentre viene estratto. Il carotaggio sembra roccia-spugna piena di polvere fine.
        #JNSQscience_bd_drill_PolSrfLandedLowlands_00 = La punta affonda facilmente, poi il foro collassa lentamente dietro di lei. Il campione risale come granuli soffici con pagliuzze minerali che confondono i sensori.
        #JNSQscience_bd_drill_PolSrfLandedMidlands_00 = Il trapano restituisce un carotaggio stratificato di materiale friabile e noduli più duri. Note di laboratorio: "Stranamente promettente, ma per favore non iniziate ancora a piantare."
        #JNSQscience_bd_drill_PolSrfLandedHighlands_00 = Una crosta più dura resiste alla punta, poi si spezza in pezzi granulosi. Il carotaggio è più leggero di quanto dovrebbe, come se fosse pieno di minuscoli vuoti nascosti.
        #JNSQscience_bd_drill_PolSrfLandedMountains_00 = Il trapano macina roccia bitorzoluta e friabile ed estrae un tappo corto e ostinato. Si frattura in briciole brillanti che sembrano utili e vagamente sospette.
        #JNSQscience_bd_drill_KrelSrfLandedLowlands_00 = Il trapano tira su regolite chiara e polverosa attraversata da granuli più scuri. L'aspetto "venato" non è solo superficiale.
        #JNSQscience_bd_drill_KrelSrfLandedMidlands_00 = Un carotaggio compattato risale in strati netti, come se il terreno si stesse ordinando in silenzio da ere.
        #JNSQscience_bd_drill_KrelSrfLandedHighlands_00 = La punta crepita su roccia ostinata e restituisce un tappo frastagliato. Qualunque cosa tenga insieme queste alture non ama condividere.
        #JNSQscience_bd_drill_KrelSrfLandedPoles_00 = Il trapano affronta materiale più freddo che si aggruma in cristalli riluttanti. La provetta si appanna mentre il carotaggio si scalda.
        #JNSQscience_bd_drill_AdenSrfLandedLowlands_00 = Il trapano affonda nella graniglia bruna sciolta e restituisce un carotaggio di polvere friabile e ciottoli. È praticamente "roccia, già frantumata".
        #JNSQscience_bd_drill_AdenSrfLandedMidlands_00 = Il campione mostra una crosta sottile sopra macerie più dense. Aden sembra piccolo, ma impacchetta gli strati stretti.
        #JNSQscience_bd_drill_AdenSrfLandedHighlands_00 = La punta macina un substrato più duro e produce un carotaggio tagliente e abrasivo. Il trapano ne esce con aria vagamente offesa.
        #JNSQscience_bd_drill_AdenSrfLandedMountains_00 = La roccia dura lascia il posto a bande fratturate, poi torna roccia dura. La montagna rifiuta di farsi riassumere in un cilindro pulito.
        #JNSQscience_bd_drill_AdenSrfLandedPoles_00 = Il carotaggio risale più chiaro e leggermente aggrumato, come cemento freddo. Lo statico lo fa attaccare a tutto tranne che all'etichetta.
        #JNSQscience_bd_drill_HuygenSrfLandedLowlands_00 = Il trapano tira su suolo denso e scuro che si attacca al manicotto come se fosse vivo. Sigilli il contenitore prima che possa fare piani.
        #JNSQscience_bd_drill_HuygenSrfLandedMidlands_00 = Scivola fuori un carotaggio stratificato: graniglia secca alternata a bande dall'aspetto ceroso. Gli strumenti litigano se chiamarlo "sedimento" o "problema".
