		NodensInSpaceLowSaltySeas* = #GEPscience_bd_camera_NodensInSpaceLowSaltySeas_00 // From low orbit, the seas are dark stains under a dim red lamp. You start a mosaic and remember you’re assembling it an entire conversation behind schedule.
