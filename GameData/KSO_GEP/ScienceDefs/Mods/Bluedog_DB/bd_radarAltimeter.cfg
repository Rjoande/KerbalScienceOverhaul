        EponaFlyingHighVolcanoes* = #GEPscience_bd_radarAltimeter_EponaFlyingHighVolcanoes_00 // The terrain rises in sharp cones and broken ridges, like something pushed up and froze mid-motion. You try not to imagine it pushing again.
        EponaFlyingHighPoles* = #GEPscience_bd_radarAltimeter_EponaFlyingHighPoles_00 // The poles appear stable and high, with fewer sharp surprises than the mid-latitudes. “Fewer surprises” is the best comfort Grannus offers.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_radarAltimeter_EponaInSpaceLowTropicalLowlands_00 // From low orbit, the radar stitches the tropical lowlands into a wide, shallow basin. It looks like a world you could survey—if the radio didn’t take forever to answer.
