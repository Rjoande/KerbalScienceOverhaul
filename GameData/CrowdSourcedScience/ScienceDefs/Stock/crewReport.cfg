@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        Srf* = #CSS_crewReport_default_00 // You find a kettle in the supplies container and start to beg Mission Control the permission to stop what you are doing and have a cup of tea.
        Srf* = #CSS_crewReport_default_01 // The vastness of space is mind-boggling. It's crazy how many puddings could be stored with the advent of high-capacity dessert storage devices.
        Srf* = #CSS_crewReport_default_02 // "My leg is so itchy. And why does my suit smell like anchovies... Wait a minute... Are we recording?!"
        Srf* = #CSS_crewReport_default_03 // You look out the window and wonder where the nearest fast-food is.
        Srf* = #CSS_crewReport_default_04 // You didn't know there was a "Master Alarm"!
        Srf* = #CSS_crewReport_default_05 // The Master Alarm starts blinking. You kick the console and everything returns to normal.
        Srf* = #CSS_crewReport_default_06 // Mission Control denies your request to use the radio antenna to prank call the pizza place.
        Srf* = #CSS_crewReport_default_07 // Mission Control assures you (again!) that no, you cannot get any pizza delivered to you.
        Srf* = #CSS_crewReport_default_08 // "Space, the final frontier. To boldly go where no Kerbal has gone before."
        Srf* = #CSS_crewReport_default_09 // In a flash of inspiration you reach for your notebook... only to lose it in the heaps of snack wrappers.
        Srf* = #CSS_crewReport_default_10 // You pretend to write something down so Mission Control will stop yelling at you.
        Srf* = #CSS_crewReport_default_11 // You report to Mission Control that a crack has formed on the forward viewport following the last maneuver.
        Srf* = #CSS_crewReport_default_12 // You begin to doodle several rockets on the paper you found.
        Srf* = #CSS_crewReport_default_13 // You ponder the mysteries of the universe over your space snacks.
        Srf* = #CSS_crewReport_default_14 // You notice a hole in your spacesuit and hope it isn't serious.
        Srf* = #CSS_crewReport_default_15 // You realize these suits are rather cramped, and wish you had asked Mission Control about the location of the zipper.
        Srf* = #CSS_crewReport_default_16 // As you set your alarm clock, you request that Mission Control reads you a bedtime story.
        Srf* = #CSS_crewReport_default_17 // Your mind wanders as Mission Control drones on about "Dell Ta Vee" and what that has to do with space travel.
        Srf* = #CSS_crewReport_default_18 // You try to think of something useful to report. You write this instead.
        Srf* = #CSS_crewReport_default_19 // "... In T minus 2... 1... " *ding* "Mission Control: We have burritos."
        Srf* = #CSS_crewReport_default_20 // You take this opportunity to add a chapter to your ongoing "Harry Potman" fan-fiction. Both of your followers will no doubt be excited to see how it develops.
        Srf* = #CSS_crewReport_default_21 // Mission Control is concerned that the crew's new navigation plan is unsound. "Second star to the right and straight on till morning" is not a very specific vector.
        Srf* = #CSS_crewReport_default_22 // You detect television signals from Kerbin.
        Srf* = #CSS_crewReport_default_23 // A mysterious odor wafts from somewhere behind you in the capsule.
        Srf* = #CSS_crewReport_default_23 // Much to your dismay, a deep scan of the ship's systems indicate that there are no games installed on the flight computer.
        Srf* = #CSS_crewReport_default_25 // You wonder how a bathroom break is possible in this cramped spacesuit.
        Srf* = #CSS_crewReport_default_26 // Suddenly you say: "Everybody do the flop!"
        Srf* = #CSS_crewReport_default_27 // You wonder about what would happen if you were to put a marshmallow on a stick in front of the rocket exhaust.
        Srf* = #CSS_crewReport_default_28 // A device in the cabin has made a "thunking" noise. Mission Control believes this is "bad". The crew believes Mission Control is understating the issue.
        Srf* = #CSS_crewReport_default_29 // I think my spaceship knows which way to go.
        Srf* = #CSS_crewReport_default_30 // We seem to have misplaced our snacks.
        Srf* = #CSS_crewReport_default_31 // You take a picture of the pretty landscape. Only after do you realize that you forgot to take the lens cover off.
        Srf* = #CSS_crewReport_default_32 // You suddenly get the feeling you are being watched.
        Srf* = #CSS_crewReport_default_33 // dy/dx=lim┬(∆x→0)⁡[(f(x+∆x)-f(x))/∆x] Kethematics: Jebediah's Achilles' Heel.
        Srf* = #CSS_crewReport_default_34 // You think that perhaps growing a mustache would make you a better astronaut.
        Srf* = #CSS_crewReport_default_35 // With sudden alarm, you realize you left the porch light on.
        Srf* = #CSS_crewReport_default_36 // The crew requests a bedtime story before shift change.
        Srf* = #CSS_crewReport_default_37 // The equipment works as specified.
        Srf* = #CSS_crewReport_default_38 // You complain about the lack of entertainment systems on board.
        Srf* = #CSS_crewReport_default_39 // You send an emergency broadcast about the lack of an emergency broadcast system on this vessel.
        Srf* = #CSS_crewReport_default_40 // You record the lack of snacks in the log.
        Srf* = #CSS_crewReport_default_41 // You write a crew report in illegible handwriting.
        Srf* = #CSS_crewReport_default_42 // You report a long list of numbers read off of an important looking gauge.
        Srf* = #CSS_crewReport_default_43 // "Testing... Test... Testing... Is this thing on? Hey did you guys leave the mic on? I think it's on right now! Is this transmitting? Yup, definitely transmitting. Let's just go ahead and turn that off."
        Srf* = #CSS_crewReport_default_44 // Nothing of great importance has happened just now.
        Srf* = #CSS_crewReport_default_45 // You hear a loud thud on the hull of the spacecraft. You look intently at your gauges and readings and confirm there is no serious damage to the space craft.
        Srf* = #CSS_crewReport_default_46 // You report that you could use more fuel and space on the spacecraft. You begin to contemplate why they call it a spacecraft when there is hardly any space in here. It's more like a sardine can.
        Srf* = #CSS_crewReport_default_47 // You report on the situation. There's not much else to do.
        Srf* = #CSS_crewReport_default_48 // You are sick and tired of filling out these stupid crew reports.
        Srf* = #CSS_crewReport_default_49 // Yup, we're in a pod.
        Srf* = #CSS_crewReport_default_50 // There's something mystical about the emptiness of space.
        Srf* = #CSS_crewReport_default_51 // Hmm? Wha? Oh, the report!
        Srf* = #CSS_crewReport_default_52 // Hope we have enough fuel.
        Srf* = #CSS_crewReport_default_53 // Sure is tight in here.
        Srf* = #CSS_crewReport_default_54 // Mission Control asks your position. You tell them you're sitting down facing front, and ask why they'd want to know that.
        Srf* = #CSS_crewReport_default_55 // You realize that most of these reports are horrible.
        Srf* = #CSS_crewReport_default_56 // When you gotta go, you gotta go. Who forgot to bring toilet paper?
