@EXPERIMENT_DEFINITION:HAS[#id[bd_orbitalScope]]
{
	%RESULTS
	{
        MohoInSpaceLowPolarIceCraters* = #ScienceRefactor_bd_orbitalScope_MohoInSpaceLowNorthernSinkhole_00 // A lot of surface erosion is visible in this huge topographic depression.
        MohoInSpaceLowPoles* = #ScienceRefactor_bd_orbitalScope_MohoInSpaceLowNorthPole_00 // A very sharp and dangerously deep depression is detected. Scientists discuss a future mission there.

        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLowDeserts_00 // The sand is found to have very interesting designs painted by the wind, depositing beds of it on lower altitude areas.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLowGrasslands_00 // Many trees and plant life are found covering the lush grasslands.
        
		MinmusInSpaceLowLesserBasins* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowLesserFlats_00 // The topography here is far less exciting than on the midlands.
		MinmusInSpaceLowBasins* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowGreatFlats_00 // Big areas or incredibly boring topography!
		MinmusInSpaceLowBasins* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowGreaterFlats_00 // Massive areas or incredibly boring topography!

        DunaInSpaceLowNotableMountains* = #ScienceRefactor_bd_orbitalScope_DunaInSpaceLowPolarHighlands_00 // Very tall ice shelf rise above the ice caps.
        DunaInSpaceLowIceCaps* = #ScienceRefactor_bd_orbitalScope_DunaInSpaceLowPoles_00 // Very cold and slippery ice is found below.
        DunaInSpaceLowIceCaps* = #ScienceRefactor_bd_orbitalScope_DunaInSpaceLowPoles_01 // Massive amounts of water and carbon dioxide appear to be frozen on the Dunan poles.
        DunaInSpaceLowMidlands* = #ScienceRefactor_bd_orbitalScope_DunaInSpaceLowMidlandSea_00 // This very large depression looks to cover half the planet and appears to an ancient lake bed.
        
		DresInSpaceLowCanyon* = #ScienceRefactor_bd_orbitalScope_DresInSpaceLowCanyons_00 // The deep canyons have highly irregular edges and look difficult to navigate.

        EelooInSpaceLowCanyon* = #ScienceRefactor_bd_orbitalScope_EelooInSpaceLowIceCanyons_00 // These ice-covered canyons looks to be very deep at times. A few patches of the rocky surface are visible.
    }
}