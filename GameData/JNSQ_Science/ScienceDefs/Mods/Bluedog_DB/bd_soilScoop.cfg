@EXPERIMENT_DEFINITION:HAS[#id[bd_soilScoop]]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #JNSQscience_bd_soilScoop_MohoSrfLandedPoles_00 // The scoop lifts pale dust that sparkles suspiciously. A few grains vanish in a tiny puff, as if they were never meant to see daylight.
        MohoSrfLandedLowlands* = #JNSQscience_bd_soilScoop_MohoSrfLandedLowlands_00 // The scoop pulls up dark, baked fines that cling to everything like warm toner. The sample smells like “recently toasted rock.”
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_soilScoop_MohoSrfLandedPolarIceCraters_00 // The scoop breaks a crusty layer and exposes bright grains that immediately try to escape as vapor. You rush the sample into the container before it changes its mind.
        MohoSrfLandedHighlands* = #JNSQscience_bd_soilScoop_MohoSrfLandedHighlands_00 // The scoop chatters over sharp gravel and collects angular fragments that look eager to shred a glove. The arm logs a formal complaint.
        MohoSrfLandedMidlands* = #JNSQscience_bd_soilScoop_MohoSrfLandedMidlands_00 // A neat trench reveals layered regolith with a faint metallic sheen. The lab calls it “promising,” which is never a relaxing word.
        MohoSrfLandedCraters* = #JNSQscience_bd_soilScoop_MohoSrfLandedCraters_00 // The scoop brings up glassy beads mixed with pulverized stone. It’s like someone ground an impact into a fine, shiny seasoning.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_soilScoop_MohoSrfLandedExoticCraters_00 // The scoop uncovers oddly colored crystals that twinkle in the harsh light. The instruments insist they’re ordinary minerals while sounding very unsure.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_soilScoop_MohoSrfLandedRareCraters_00 // The scoop clinks on something dense and drags up a few heavy specks. Everyone suddenly remembers they like “detailed follow-up sampling.”
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_soilScoop_MohoSrfLandedVoronoiCraters_00 // The sample settles into tiny clumps that mirror the patterned ground. It’s unsettling how quickly the dirt organizes itself.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_soilScoop_MohoSrfLandedNotableCraters_00 // The scoop lifts a messy mix of ejecta—dust, shards, and darker chunks from below. The crater appears proud of its variety.
        MohoSrfLandedPeaks* = #JNSQscience_bd_soilScoop_MohoSrfLandedPeaks_00 // The scoop finds only a thin dusting before meeting stubborn rock. Moho’s highest ground is mostly rock with a garnish of grit.

        GillySrfLandedLowlands* = #JNSQscience_bd_soilScoop_GillySrfLandedLowlands_00 // The scoop barely taps the surface and half the “sample” drifts upward in slow motion. You learn to scoop gently on a world that barely agrees with gravity.
        GillySrfLandedMidlands* = #JNSQscience_bd_soilScoop_GillySrfLandedMidlands_00 // The scoop collects powdery dust and small pebbles that rattle like they’re weightless. The sample takes its time settling, as if enjoying the view.
        GillySrfLandedHighlands* = #JNSQscience_bd_soilScoop_GillySrfLandedHighlands_00 // The scoop pries loose chunky rubble from a porous crust. The pieces look like they were assembled from leftovers and then forgotten.

        EveSrfLandedPoles* = #JNSQscience_bd_soilScoop_EveSrfLandedPoles_00 // The scoop breaks a brittle violet crust and exposes cold, pale grit underneath. It looks almost harmless until it starts steaming anyway.
        EveSrfLandedLowlands* = #JNSQscience_bd_soilScoop_EveSrfLandedLowlands_00 // The scoop sinks in with an unpleasant squelch and comes back coated in heavy purple mud. It refuses to let go of the sample.
        EveSrfLandedMidlands* = #JNSQscience_bd_soilScoop_EveSrfLandedMidlands_00 // A neat trench opens up, showing layered regolith like a frosted cake nobody should eat. The bottom layer is worryingly warm.
        EveSrfLandedHighlands* = #JNSQscience_bd_soilScoop_EveSrfLandedHighlands_00 // The scoop scrapes over sharp gravel and uncovers shiny mineral flecks. The instrument panel labels it “interesting” in the most suspicious tone possible.
        EveSrfLandedPeaks* = #JNSQscience_bd_soilScoop_EveSrfLandedPeaks_00 // The scoop finds only a thin dusting before striking stubborn rock. Eve’s idea of “soil” appears to be mostly attitude.
        EveSrfLandedMountains* = #JNSQscience_bd_soilScoop_EveSrfLandedMountains_00 // The arm rattles like it’s chewing on broken stone. You log the sample as “angular, purple, and very determined.”
        EveSrfLandedShores* = #JNSQscience_bd_soilScoop_EveSrfLandedShores_00 // The scoop lifts a crust of salty grit with damp, darker sludge beneath. The boundary line looks like it moves when you look away.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_soilScoop_EveSrfLandedKrakensWell_00 // The scoop exposes spongy ground that slowly refills the hole behind it. You start retracting the arm before the planet gets any ideas.
        EveSrfSplashedExplodiumSea* = #JNSQscience_bd_soilScoop_EveSrfSplashedExplodiumSea_00 // The scoop dips in and the liquid immediately fizzes like it’s offended. The sample container comes back warmer than it left.
        EveSrfSplashedShores* = #JNSQscience_bd_soilScoop_EveSrfSplashedShores_00 // The scoop churns foamy surf and returns with purple brine and gritty sand. The foam hisses softly, like it knows your name.
        EveSrfSplashedPolarLakes* = #JNSQscience_bd_soilScoop_EveSrfSplashedPolarLakes_00 // The scoop drags up cold, stinging liquid with slushy crystals forming on the metal. They melt the moment you feel hopeful.
        EveSrfSplashedPetrolLakes* = #JNSQscience_bd_soilScoop_EveSrfSplashedPetrolLakes_00 // A slick, oily layer coats everything and refuses to drip off. The lab requests “one (1) less disgusting sample,” but you only have this one.
        EveSrfSplashedSeaofAkron* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofAkron_00 // The scoop hauls up dense sediment that settles too quickly to be normal. The surface closes behind it like nothing happened.
        EveSrfSplashedSeaofNessus* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofNessus_00 // The scoop disappears into dark liquid and returns with fine silt that clumps into perfect little pellets. You do not like how tidy it is.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofTaniwha_00 // The scoop stirs the water and a chain of bubbles follows the arm upward. The bubbles pop in a rhythm that feels almost intentional.
        EveSrfSplashedSeaofGigan* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofGigan_00 // The scoop fights heavy waves and comes back with gritty slurry. The craft rocks hard enough to make the sample feel personal.
        EveSrfSplashedSeaofRodan* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofRodan_00 // The scoop returns steaming, with warm mineral grit and a sharp, chemical tang. The sensors insist the liquid is “stable,” and then quickly reconsider.
        EveSrfSplashedSeaofGojira* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofGojira_00 // The scoop pulls up thick, slow-moving muck that stretches like taffy before snapping free. Everyone pretends that sound didn’t come from the ocean.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofGhidorah_00 // The scoop dips in and gets tugged sideways by crossing currents. The sample shows three distinct layers that do not want to mix.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_bd_soilScoop_EveSrfSplashedSeaofBagorah_00 // The scoop emerges coated in dark, sticky goo that barely drips. It’s less a sample and more a permanent lifestyle choice for the arm.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_soilScoop_KerbinSrfLandedAdministration_00 // You carefully scoop a “subsurface sample” from beneath the lobby plant. The receptionist requests the sample’s badge and a signed apology.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_soilScoop_KerbinSrfLandedAstronautComplex_00 // The scoop pulls up a layered deposit of lint, snack crumbs, and determination. The crew insists it counts as “regolith” if it’s been there long enough.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_soilScoop_KerbinSrfLandedCrawlerway_00 // The scoop digs in, then immediately meets crushed rock packed by decades of rolling mass. A supervisor suggests you stop “excavating the schedule.”
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_soilScoop_KerbinSrfLandedFlagPole_00 // You try to scoop beside the flagpole and hit something very engineered. Security explains the foundation is “strategically un-scoopable.”
        KerbinSrfLandedLaunchPad* = #JNSQscience_bd_soilScoop_KerbinSrfLandedLaunchPad_00 // The top layer is soot, the next layer is soot, and the third layer is also soot. The pad crew calls it “historical context” and asks you to stand somewhere less explody.
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_soilScoop_KerbinSrfLandedMissionControl_00 // The scoop finds dust in a corner that mission control swears was cleaned yesterday. Your sample is immediately labeled “unauthorized debris” and placed on a watchlist.
        KerbinSrfLandedR&D* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&D_00 // The scoop uncovers a tidy cross-section of soil, then a shiny “test component.” A scientist appears and politely asks you to stop discovering things.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DCentralBuilding_00 // The floor sample contains exactly zero dirt and exactly one warning label. Your report is returned with a note: “Try sampling outside reality next time.”
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DCornerLab_00 // You scoop into a tray marked “NORMAL SOIL” and expose something that blinks. The lab lights go out for “privacy reasons.”
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DMainBuilding_00 // The scoop lifts a perfect stratigraphy of dust layers, each one corresponding to a different deadline. Engineers argue over which layer is “feature-rich.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DObservatory_00 // The scoop finds fine grit and dew under the platform edge. The operator requests you keep your excavation “astronomically quiet.”
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DSideLab_00 // You expose an impressively uniform layer… until it turns out to be spilled pellets from a “totally unrelated” experiment. Everyone suddenly remembers another meeting.
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DSmallLab_00 // The scoop produces a sample cup full of identical granules, suspiciously identical. A scientist stamps it “CALIBRATED” and refuses eye contact.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DTanks_00 // The ground is compacted, stained, and deeply uninterested in being disturbed. The scoop returns smelling like regulations and fuel logs.
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DWindTunnel_00 // You scoop a neat trench, then the tunnel starts and relocates your entire sample collection. The official result is “highly mobile sediment.”
        KerbinSrfLandedRunway* = #JNSQscience_bd_soilScoop_KerbinSrfLandedRunway_00 // You scoop at the runway edge and recover gravel, rubber, and something that used to be a checklist. Ground crew asks you to stop sampling “active infrastructure.”
        KerbinSrfLandedSPH* = #JNSQscience_bd_soilScoop_KerbinSrfLandedSPH_00 // The scoop finds metal shavings mixed with dirt in a beautiful composite. An engineer calls it “weight-saving soil” and tries to patent it.
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHMainBuilding_00 // You scoop near the doors and uncover a fresh drift of windblown grit and paperwork. The foreman asks whether the scoop can also remove “design suggestions.”
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHRoundTank_00 // The scoop digs into the insulation berm and pulls up fluffy mystery fibers. A technician yells that you’re “sampling the wrong kind of atmosphere.”
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHTanks_00 // Your scoop exposes alternating layers of dust and spilled paint chips. The staff claims it’s a “protective coating,” which is not an answer to any question you asked.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_soilScoop_KerbinSrfLandedSPHWaterTower_00 // The soil is damp, then wetter, then suddenly very hard at the foundation. Safety recommends you stop before the tower starts “helping.”
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationDishEast_00 // The scoop trench reveals gravel, cable shielding, and a piece of someone’s confidence. The technician asks you to re-bury the “signal integrity.”
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationDishNorth_00 // You expose a clean layer of packed ground, then a conduit that definitely wasn’t supposed to be visible. The dish continues tracking you anyway.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationDishSouth_00 // The sample is dull, compact, and impeccably maintained—like the staff. Your scoop is judged silently and returned.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_soilScoop_KerbinSrfLandedTrackingStationHub_00 // Indoors, the scoop collects mostly dust and one very important screw. The hub declares the screw “mission-critical” and escorts you to the exit.
        KerbinSrfLandedVAB* = #JNSQscience_bd_soilScoop_KerbinSrfLandedVAB_00 // The scoop scrapes up concrete dust, metal flakes, and a tiny washer with big ambitions. The engineers insist the washer was “definitely part of something.”
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_soilScoop_KerbinSrfLandedVABMainBuilding_00 // You scoop near a wall and uncover a neat layer of grit deposited by countless frantic footsteps. A clipboard appears to document your “floor intervention.”
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_soilScoop_KerbinSrfLandedVABPodMemorial_00 // You take a small, respectful sample from the path edge and immediately feel watched by history. The scoop stays quiet, for once.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_soilScoop_KerbinSrfLandedVABRoundTank_00 // The scoop bites into compacted soil and hits something expensive-sounding. Security suggests you scoop “somewhere less round and less tank.”
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_soilScoop_KerbinSrfLandedVABSouthComplex_00 // The sample contains slag grains, grit, and a faint warmth that suggests you are too close to welding. Safety waves you away with a form titled “Hot Dirt.”
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_soilScoop_KerbinSrfLandedVABTanks_00 // You expose a layered deposit of dust and tire tracks like a geological record of panic. The sample is filed under “normal operations.”
        KerbinSrfLandedKSC* = #JNSQscience_bd_soilScoop_KerbinSrfLandedKSC_00 // The scoop finds a perfectly ordinary soil profile until it uncovers a buried cable sleeve. The sleeve is immediately promoted to “ground feature” and assigned a guard.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_soilScoop_KerbinSrfLandedIslandAirfield_00 // The scoop brings up damp sand and salty grit that clumps into stubborn little balls. The sample smells like sea breeze and questionable hangar maintenance.
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_soilScoop_KerbinSrfLandedBaikerbanur_00 // Dry dust sifts beautifully through the scoop, then a hardpan layer stops everything. Local staff nod approvingly and stamp your sample container.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_soilScoop_KerbinSrfLandedBaikerbanurLaunchpad_00 // The scoop uncovers a thin layer of dust over the pad surface. You are informed that “digging” requires two badges and a spotter.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_soilScoop_KerbinSrfLandedWoomerang_00 // You scoop up windblown grit, then the wind tries to scoop it back. The final sample is 60% soil and 40% “held down quickly.”

        KerbinSrfLandedIceCaps* = #JNSQscience_bd_soilScoop_KerbinSrfLandedIceCaps_00 // The scoop crunches through crusty snow and exposes clear blue ice underneath. The arm sounds offended by the temperature.
        KerbinSrfLandedHighlands* = #JNSQscience_bd_soilScoop_KerbinSrfLandedHighlands_00 // A thin layer of soil peels back to reveal compacted rock and darker dirt. Mission Control asks if you can “scoop a whole hill” for comparison.
        KerbinSrfLandedMidlands* = #JNSQscience_bd_soilScoop_KerbinSrfLandedMidlands_00 // The scoop lifts a tidy flap of soft, brown dirt that looks suspiciously fertile. Someone at KSC immediately suggests growing snacks in it.
        KerbinSrfLandedLowlands* = #JNSQscience_bd_soilScoop_KerbinSrfLandedLowlands_00 // The scoop bites into damp ground and brings up mud that clings like it owns the place. You decide to stop before it starts crawling.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_soilScoop_KerbinSrfLandedAridLowlands_00 // A brittle crust breaks apart and a puff of fine dust escapes dramatically. Underneath is cracked clay that looks like it’s been waiting to complain.
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_soilScoop_KerbinSrfLandedAridMidlands_00 // The scoop exposes layered sand over stubborn hardpan. A tiny dust whirl forms just to show off and then collapses.
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_soilScoop_KerbinSrfLandedAridHighlands_00 // The scoop scrapes off gritty gravel and reveals oddly colored mineral streaks below. The scientists insist this is “very normal” while grinning too hard.
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_soilScoop_KerbinSrfLandedAridMountains_00 // The scoop arm protests as it hits sharp stones and reluctant bedrock. You record the terrain as “not very scoop-friendly.”
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_soilScoop_KerbinSrfLandedWelcomeBackIsland_00 // The scoop uncovers a patch of surprisingly flat ground and a lost wrench. The island lives up to its name by returning your hardware.
        KerbinSrfSplashedShores* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedShores_00 // The scoop swishes through the shallows and returns with wet sand and stringy green gunk. The lab notes call it “organic,” you call it “icky.”
        KerbinSrfSplashedGreatLake* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedGreatLake_00 // The scoop stirs up dark silt that immediately clouds the water. Whatever was living down there files a formal complaint in bubbles.
        KerbinSrfSplashedInlandWater* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedInlandWater_00 // A scoopful of mud and tiny pebbles slides off the arm in slow motion. You learn that “subsurface” can still be mostly water.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedKreenwichSea_00 // The scoop drags up heavy, salty muck that smells like “important science.” 
        KerbinSrfSplashedArcticSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedArcticSea_00 // The scoop breaks through slush and lifts icy brine that tries to freeze to the metal. The arm briefly becomes a very expensive popsicle.
        KerbinSrfSplashedForemansSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedForemansSea_00 // The scoop returns with dense sediment and a stubborn little shell-shaped thing. It refuses to let go, so you log it as “highly attached sample.”
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedTriangulusSea_00 // The scoop brings up three oddly similar stones and some sand. The symmetry feels a little too intentional for comfort.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedNorthernSea_00 // Cold water and coarse sand tumble off the scoop in a neat pile. Mission Control says the sample is “north enough” and moves on.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedSub-ArcticSea_00 // The scoop hauls up a mix of slush, water, and grit that can’t decide what phase it wants to be. You note “indecisive sample behavior.”
        KerbinSrfSplashedEasternSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedEasternSea_00 // The scoop lifts fine sand and clear water that looks almost inviting. You double-check the mission plan to confirm you are not, in fact, on vacation.
        KerbinSrfSplashedWesternSea* = #JNSQscience_bd_soilScoop_KerbinSrfSplashedWesternSea_00 // The scoop digs into darker silt that stains everything it touches. The craft rocks in the waves like the ocean is laughing.

        MunSrfLandedPoles* = #JNSQscience_bd_soilScoop_MunSrfLandedPoles_00 // The scoop scrapes up dusty regolith with a few glittering grains that refuse to melt because there is nothing here to be warm.
        MunSrfLandedHighlands* = #JNSQscience_bd_soilScoop_MunSrfLandedHighlands_00 // The scoop brings back gritty, crushed rock that seems to have been sandblasted for ages. It gets everywhere immediately.
        MunSrfLandedMidlands* = #JNSQscience_bd_soilScoop_MunSrfLandedMidlands_00 // A neat trench forms and collapses lazily in low gravity. The sample is fine, gray, and oddly clingy.
        MunSrfLandedLowlands* = #JNSQscience_bd_soilScoop_MunSrfLandedLowlands_00 // The scoop sinks deeper than expected and lifts a darker, denser powder. It looks like the ground has been collecting secrets.
        MunSrfLandedPolarIceCraters* = #JNSQscience_bd_soilScoop_MunSrfLandedPolarIceCraters_00 // The scoop cracks a tough crust and exposes grains that sparkle like trapped frost. The container fogs up with nothing to fog it.
        MunSrfLandedExoticCraters* = #JNSQscience_bd_soilScoop_MunSrfLandedExoticCraters_00 // The scoop uncovers sharp fragments mixed with strangely glassy dust. The lab notes include the word “exotic” twice, underlined.
        MunSrfLandedRareCraters* = #JNSQscience_bd_soilScoop_MunSrfLandedRareCraters_00 // The scoop returns with speckled regolith and a few unusually heavy pebbles. Someone suggests checking the scoop for “extra scoop.”
        MunSrfLandedVoronoiCraters* = #JNSQscience_bd_soilScoop_MunSrfLandedVoronoiCraters_00 // The scoop lifts powder from ground patterned like cracked tiles. The sample settles into tiny hexagon-like clumps all by itself.
        MunSrfLandedNotableCraters* = #JNSQscience_bd_soilScoop_MunSrfLandedNotableCraters_00 // The scoop digs into a classic crater floor mix: dust, shards, and regret. The sample bag looks offended.
        MunSrfLandedMountains* = #JNSQscience_bd_soilScoop_MunSrfLandedMountains_00 // The scoop arm rattles against stubborn rock and manages only a thin layer of grit. The Mun politely declines to be excavated.

        MinmusSrfLandedPoles* = #JNSQscience_bd_soilScoop_MinmusSrfLandedPoles_00 // The scoop chips into pale, crunchy crystals that look like candy and absolutely are not. The sample squeaks against the metal.
        MinmusSrfLandedLowlands* = #JNSQscience_bd_soilScoop_MinmusSrfLandedLowlands_00 // The scoop lifts a fluffy layer of minty dust that drifts up before remembering gravity exists. You consider labeling it “seasoning.”
        MinmusSrfLandedMidlands* = #JNSQscience_bd_soilScoop_MinmusSrfLandedMidlands_00 // The scoop uncovers a mix of powder and small crystal plates. The pieces slide around like they’re trying to stack themselves neatly.
        MinmusSrfLandedHighlands* = #JNSQscience_bd_soilScoop_MinmusSrfLandedHighlands_00 // The scoop scrapes gritty, windless sediment and a few sharp shards. The sample looks like it could cut a glove in three places at once.
        MinmusSrfLandedBasins* = #JNSQscience_bd_soilScoop_MinmusSrfLandedBasins_00 // The scoop comes up packed with fine crystals that pour like dry snow. The container fills faster than expected, as if the basin is helping.
        MinmusSrfLandedBrownBasins* = #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownBasins_00 // The scoop returns with darker, stained crystals mixed with brown dust. The lab asks if you “accidentally scooped a shadow.”
        MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownLowlands_00 // The scoop pulls up sticky-looking brown grit that refuses to behave like the rest of Minmus. Nobody likes the implication.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownMidlands_00 // The scoop lifts layered dust—greenish, then brown, then green again. The sample reads like a very confused geology textbook.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_soilScoop_MinmusSrfLandedBrownHighlands_00 // The scoop scrapes up coarse brown fragments that clatter in the container. The terrain here feels like Minmus wearing boots.
        MinmusSrfLandedMountains* = #JNSQscience_bd_soilScoop_MinmusSrfLandedMountains_00 // The scoop finds mostly hard crust with only a sprinkle of crystals on top. Minmus keeps its best dirt somewhere else.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_soilScoop_DunaSrfLandedIceCaps_00 // The scoop cracks through a dusty crust and uncovers pale grains that want very badly to be ice. The sample container feels suddenly popular.
        DunaSrfLandedHighlands* = #JNSQscience_bd_soilScoop_DunaSrfLandedHighlands_00 // The scoop scrapes up dry, rust-red grit mixed with sharp little stones. Everything about it says “wind did this for a long time.”
        DunaSrfLandedMidlands* = #JNSQscience_bd_soilScoop_DunaSrfLandedMidlands_00 // A shallow trench reveals a darker layer just beneath the surface. The soil looks like it’s been quietly hoarding heat it doesn’t have.
        DunaSrfLandedLowlands* = #JNSQscience_bd_soilScoop_DunaSrfLandedLowlands_00 // The scoop sinks into fine powder that pours like flour in low gravity. You now own a small dune that follows the arm around.
        DunaSrfLandedCraters* = #JNSQscience_bd_soilScoop_DunaSrfLandedCraters_00 // The scoop lifts a messy mix of impact dust and crushed rock fragments. The grains sparkle as if they were flash-heated once and never forgave it.
        DunaSrfLandedRareCraters* = #JNSQscience_bd_soilScoop_DunaSrfLandedRareCraters_00 // The scoop clinks against unusually dense pebbles hiding in the dust. The lab immediately requests “the rest of the dense pebbles.”
