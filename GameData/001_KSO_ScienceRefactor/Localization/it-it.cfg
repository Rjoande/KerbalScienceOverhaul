        #ScienceRefactor_bd_multiSpec_DunaInSpaceLowLowlands_00 = I risultati dell'analisi multispettrale della composizione sono coerenti con quelli di antiche colate laviche, presumibilmente scese dai vulcani primordiali di Duna e raccoltesi nelle basse terre.
