        #CSS_crewReport_KerbinFlyingHigh_06 = *cantando* "Colorado Rocky Mountain high. I've seen it rainin' fire in the sky". Ah, il caro vecchio John Denver.
        #CSS_crewReport_KerbinFlyingHigh_07 = Provi una certa soddisfazione a essere più in alto degli Altipiani.
        #CSS_crewReport_KerbinFlyingHigh_08 = Quello laggiù è il deserto? Sembra terribilmente secco e sabbioso.
        #CSS_crewReport_KerbinFlyingHigh_09 = Accidenti, quel deserto è enorme. Socchiudi gli occhi e provi a contare le palme.
