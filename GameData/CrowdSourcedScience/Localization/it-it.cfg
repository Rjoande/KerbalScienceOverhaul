        // atmosphereAnalysis
        #CSS_atmosphereAnalysis_default_00 = Guardi i risultati e capisci che non hai la minima idea di cosa significhino questi numeri.
        #CSS_atmosphereAnalysis_default_01 = Sul fianco dello strumento è attaccato un biglietto: "Non misura la paura"
        #CSS_atmosphereAnalysis_default_02 = I sensori rilevano tracce del panino del tecnico che lo ha installato.
        #CSS_atmosphereAnalysis_default_03 = Vorresti fare un'analisi atmosferica, ma l'unica cosa che senti è l'odore del formaggio dello spuntino di ieri sera. Così premi qualche pulsante e speri che ne venga fuori qualcosa di utile, o di caseoso.
        #CSS_atmosphereAnalysis_default_04 = Aaron Kerman era famoso soprattutto per i suoi eroici sforzi finali nello scoprire che Mun non ha atmosfera. Ora usiamo invece questi sensori.
        #CSS_atmosphereAnalysis_default_05 = Sì. Funziona come da specifiche.
        #CSS_atmosphereAnalysis_EveSrfLandedPoles_00 = L'aria è abbastanza acida da cancellare alcune scritte sui sensori.
