@EXPERIMENT_DEFINITION:HAS[#id[bd_mapping]]
{
	%RESULTS
	{
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_mapping_KerbinInSpaceLowGrasslands_00 // The grasslands make up most of Kerbin’s surface, and where most Kerbals live. The surface is covered by farms and the occasional city.
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_mapping_KerbinInSpaceLowDesert_00 // The sands look flat compared to the rest of Kerbin’s terrain. There are some strange circles on the surface, which command tells you are farms.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_mapping_KerbinInSpaceLowBadlands_00 // The surface looks rocky and difficult to navigate. You confirm the badlands are in fact bad.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_mapping_KerbinInSpaceLowNorthernIceShelf_00 // Public Outreach tells the public you spotted the Gift Kracken, but you didn’t really.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_mapping_KerbinInSpaceLowSouthernIceShelf_00 // There isn’t much here but a flat sheet of ice.
        
        MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowMidlandCraters_00 // This area of the midlands has a high concentration of craters big, small, and everything in between. At least we now have a map of them all. 
        MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowHighlandCraters_00 // The large craters, seemingly eroded by aeons of meteorite impacts and solar wind, have plenty of evidence to suggest their old age, and by extension the age of the rest of the highlands.
        MunInSpaceLowNotableCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowEastCrater_00 // Despite its prominence when viewed from the surface of Kerbin, these relatively close-up observations confirm that this is in fact just a crater, nothing special. Early astronomers thought that this was a dried-up lake.
        MunInSpaceLowNotableCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowTwinCraters_00 // The two craters are remarkably similar despite potentially being millions of years apart in age. The short trench or canyon connecting them likely formed with the younger, larger one.
        MunInSpaceLowRareCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowNorthwestCrater_00 // This crater seems eroded, almost like its walls unevenly crumbled after it was formed. Beware of potentially soft rock.
        MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowFarsideCrater_00 // Never seen before from Kerbin, this crater looks somewhat younger than the other large craters, the ejecta being faint but still visible.
        MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowEastFarsideCrater_00 // Despite never being seen from above is such detail before, it feels quite familiar. Kerbin looms just over the horizon, sitting there, a reminder of the Mun's tidal lock and the incoming far side, never seen by kerbal eyes before.
        MunInSpaceLowPolarIceCraters* = #ScienceRefactor_bd_mapping_MunInSpaceLowPolarCrater_00 // This is a large crater, the largest on the Mun. Slight glimmers of light in the shadow of the crater rim may signify a deposit of water ice here! Otherwise, you can see rocks. We're sure none of those glimmers were missions on the Mun, neither ours nor the Kerviets'. 
        
        MinmusInSpaceLowBasins* = #ScienceRefactor_bd_mapping_MinmusInSpaceLowFlats_00 // The wide flats seem impossibly smooth, even up close. What are they? Craters filled with volcanic material, like the Mun's lowlands? Salt flats formed from lakes once kept warm by the heat of celestial formation? Or mint ice cream, left there for hungry kerbals?
        MinmusInSpaceLowBasins* = #ScienceRefactor_bd_mapping_MinmusInSpaceLowGreaterFlats_00 // The biggest flats on Minmus conjure up images of mint ice cream or shaved ice, with the shiny, icy surface glinting in the sunlight. You close the aperture before the bright light overwhelms the camera.
        MinmusInSpaceLowBasins* = #ScienceRefactor_bd_mapping_MinmusInSpaceLowGreatFlats_00 // These somewhat resemble the ice caps of Kerbin, either that or salt flats. The dessert theory seems to be less credible now, not that it was ever a serious consideration.
        MinmusInSpaceLowBasins* = #ScienceRefactor_bd_mapping_MinmusInSpaceLowLesserFlats_00 // These look like ice lakes shrouded in the mountains, reminding everyone of such things on Kerbin, and the fact that even this far away, you are still in the (gravitational) influence of home.
        MinmusInSpaceLowMountains* = #ScienceRefactor_bd_mapping_MinmusInSpaceLowSlopes_00 // The slopes are reminiscent of mountainsides on Kerbin, the perfect place to put an observatory. We can't spot any of those, though.
    }
}