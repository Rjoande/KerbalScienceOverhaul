@EXPERIMENT_DEFINITION:HAS[#id[logmmImpacts]]
{
	@title = #ScienceRefactor_logmmImpacts_title // Micrometeoroid Impact Data
	!RESULTS{}
    %RESULTS
	{
		default = #ScienceRefactor_logmmImpacts_default_00 // All's quiet. Looks like nothing's going t- PING!
        InSpace* = #ScienceRefactor_logmmImpacts_default_01 // There might have been an impact recently, but you weren't paying attention.
		InSpace* = #ScienceRefactor_logmmImpacts_default_02 // The hole beside the impactor COULD be a test result but you're too busy stopping explosive decompression to find out.

		KerbinInSpaceLow* = #ScienceRefactor_logmmImpacts_KerbinInSpaceLow_00 // IMPACT... looks like everything is still in one piece, thankfully. It seems that spacecraft can survive debris impacts, but we should make sure our vessels are shielded.
		KerbinInSpaceLow* = #ScienceRefactor_logmmImpacts_KerbinInSpaceLow_01 // When the mun hits your eye like a big pizza pie...that's an impact!
		KerbinInSpaceHigh* = #ScienceRefactor_logmmImpacts_KerbinInSpaceHigh_00 // The detector has logged fewer impacts since attaining a higher orbit.

		MunInSpaceLow* = #ScienceRefactor_logmmImpacts_MunInSpaceLow_00 // It appears the Mun had a smaller moon orbiting it - oh. It's gone.
		MunInSpaceHigh* = #ScienceRefactor_logmmImpacts_MunInSpaceHigh_00 // So those tiny pinging sounds?  Yeah, that was your science result announcing its arrival.

		MinmusInSpaceLow* = #ScienceRefactor_logmmImpacts_MinmusInSpaceLow_00 // Based on recent impacts, you believe Minmus is challenging you to a snowball fight.
		MinmusInSpaceHigh* = #ScienceRefactor_logmmImpacts_MinmusInSpaceHigh_00 // All these tiny paticles kind of reminds you of sprinkles on an ice cream cone...

		MohoInSpaceLow* = #ScienceRefactor_logmmImpacts_MohoInSpaceLow_00 // Kerbol must have blasted a piece of rock off Moho.
		MohoInSpaceHigh* = #ScienceRefactor_logmmImpacts_MohoInSpaceHigh_00 // We've discovered a new body orbiting Moho and we're calling it Mohoteor...uh...well, it was there for an instant.

		EveInSpaceLow* = #ScienceRefactor_logmmImpacts_EveInSpaceLow_00 // Whoa! Looks like the detector just passed through a meteor shower!
		EveInSpaceHigh* = #ScienceRefactor_logmmImpacts_EveInSpaceHigh_00 // Purple planets, purple clouds, purple dust...what the hell are they putting in the food?

		GillyInSpaceLow* = #ScienceRefactor_logmmImpacts_GillyInSpaceLow_00 // That might have been Gilly's even smaller brother...
		GillyInSpaceHigh* = #ScienceRefactor_logmmImpacts_GillyInSpaceHigh_00 // Was the rock that just hit you smaller or larger than Gilly?  Not sure...

		DunaInSpaceLow* = #ScienceRefactor_logmmImpacts_DunaInSpaceLow_00 // Yikes! It seems you weren't expecting that impact... or were you?
		DunaInSpaceHigh* = #ScienceRefactor_logmmImpacts_DunaInSpaceHigh_00 // It seems like dunaroids are just like any other meteroid. Hard as rock and out to kill you at every opportunity

		IkeInSpaceLow* = #ScienceRefactor_logmmImpacts_IkeInSpaceLow_00 // You ask Wehrner if that was the famous magic boulder... Or at least a piece of it.
		IkeInSpaceHigh* = #ScienceRefactor_logmmImpacts_IkeInSpaceHigh_00 // Well Ike is here but I don't see Mike anywhere. What's that splatter on the detector?

		DresInSpaceLow* = #ScienceRefactor_logmmImpacts_DresInSpaceLow_00 // You stopped counting the number of impacts soon after you arrived at Dres.
		DresInSpaceHigh* = #ScienceRefactor_logmmImpacts_DresInSpaceHigh_00 // If Dres isn't trying to kill you why are there 42 hull patches and no hits on the detector?

		JoolInSpaceLow* = #ScienceRefactor_logmmImpacts_JoolInSpaceLow_00 // It seems that the orbits of any small debris decayed into the gas giant long ago- PING!
		JoolInSpaceHigh* = #ScienceRefactor_logmmImpacts_JoolInSpaceHigh_00 // Apparently even the particles are bigger at Jool...

		LaytheInSpaceLow* = #ScienceRefactor_logmmImpacts_LaytheInSpaceLow_00 // That impact seemed decidedly... moist.
		LaytheInSpaceHigh* = #ScienceRefactor_logmmImpacts_LaytheInSpaceHigh_00 // It appears that Laythe has offcially sneezed on your detector. Congratulations on being to first to discover space boogers!

		VallInSpaceLow* = #ScienceRefactor_logmmImpacts_VallInSpaceLow_00 // Yet another impact... so what?
		VallInSpaceHigh* = #ScienceRefactor_logmmImpacts_VallInSpaceHigh_00 // In sector 637-K the particles are fine and grainy but here they are more coarse. I think we found...dirt!

		TyloInSpaceLow* = #ScienceRefactor_logmmImpacts_TyloInSpaceLow_00 // The device measures a large impact, followed by many smaller impacts.
		TyloInSpaceHigh* = #ScienceRefactor_logmmImpacts_TyloInSpaceHigh_00 // That sound was not the result of an impact but rather was directly caused by space food. KLANG!  THAT was in impact!

		BopInSpaceLow* = #ScienceRefactor_logmmImpacts_BopInSpaceLow_00 // Flight, Mission Control. You did not, in fact, just collide with Bop.
		BopInSpaceHigh* = #ScienceRefactor_logmmImpacts_BopInSpaceHigh_00 // Mission Control, Flight. Did we just collode with Bop?

		PolInSpaceLow* = #ScienceRefactor_logmmImpacts_PolInSpaceLow_00 // Judging from the impact, we may have impacted something crystalline in nature.
		PolInSpaceHigh* = #ScienceRefactor_logmmImpacts_PolInSpaceHigh_00 // Pol, polled politely, properly produced predicted principles of impacts.

		EelooInSpaceLow* = #ScienceRefactor_logmmImpacts_EelooInSpaceLow_00 // Even out here, it seems spacecraft have to deal with space debris.
		EelooInSpaceHigh* = #ScienceRefactor_logmmImpacts_EelooInSpaceHigh_00 // We came, we saw, we got hit by more rocks.

		AsteroidInSpaceLow* = #ScienceRefactor_logmmImpacts_AsteroidInSpaceLow_00 // Pieces of the asteroid seem to have broken off from the activity around it...
		AsteroidInSpaceHigh* = #ScienceRefactor_logmmImpacts_AsteroidInSpaceHigh_00 // WAIT!  No one said anything about rocks around the rock.
		AsteroidSrfLanded* = #ScienceRefactor_logmmImpacts_AsteroidSrfLanded_00 // The detector pings angrily as it is pelted from the debris of our landing.
	}
}