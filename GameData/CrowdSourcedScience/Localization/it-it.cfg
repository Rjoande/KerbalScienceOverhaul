        #CSS_crewReport_SunInSpaceLow_36 = Dici al controllo missione che no, il loro stupido piano di "andare al Sole di notte" non ha funzionato.
        #CSS_crewReport_SunInSpaceLow_37 = Tutti gli occhiali da sole che abbiamo portato non funzionano. Dovremmo chiedere un rimborso, se sopravviviamo.
        #CSS_crewReport_SunInSpaceHigh_00 = Fissi lo spazio. E a sinistra lo spazio. E a destra. Piano piano capisci che praticamente ovunque guardi c'è spazio.
        #CSS_crewReport_SunInSpaceHigh_01 = Sembra che l'equipaggio si sia dimenticato la crema solare.
        #CSS_crewReport_SunInSpaceHigh_02 = Il futuro è così brillante che devo mettere gli occhiali scuri. E anche il Sole.
        #CSS_crewReport_SunInSpaceHigh_03 = Controlli di nuovo le scorte di snack, sperando che bastino per tutta la missione.
        #CSS_crewReport_SunInSpaceHigh_04 = Ti senti estremamente perso e solo.
        #CSS_crewReport_SunInSpaceHigh_05 = Ti accorgi che il Sole non tramonterà tanto presto e vorresti aver installato delle tendine ai finestrini.
        #CSS_crewReport_SunInSpaceHigh_06 = Ti annoi, perché non sta succedendo nulla di interessante.
        #CSS_crewReport_SunInSpaceHigh_07 = Premi la faccia contro il finestrino e contempli le meraviglie dello spazio... finché il controllo missione non ti ricorda di scrivere un rapporto.
        #CSS_crewReport_SunInSpaceHigh_08 = Chiudi gli occhi. Sembra l'unico modo per far sparire il Sole.
        #CSS_crewReport_SunInSpaceHigh_09 = Guardi nel vuoto e non riesci a credere a quanto sia immensamente, enormemente, sconvolgentemente grande.
        #CSS_crewReport_SunInSpaceHigh_10 = Ti rendi conto di esserti dimenticato di mettere in valigia degli snack. Ti chiedi se sia troppo tardi per tornare indietro.
        #CSS_crewReport_SunInSpaceHigh_11 = Decidi che questo è un buon momento per fare un altro pisolino.
        #CSS_crewReport_SunInSpaceHigh_12 = Siamo arrivati? Eh? EH? SIAMO ARRIVATI?!?
        #CSS_crewReport_SunInSpaceHigh_13 = Vedi un oggetto brillante nel cielo... e ti chiedi... ho lasciato il fornello acceso?
        #CSS_crewReport_SunInSpaceHigh_14 = Non ti va molto di uscire.
        #CSS_crewReport_SunInSpaceHigh_15 = "Magari avessi portato quella crema abbronzante."
        #CSS_crewReport_SunInSpaceHigh_16 = Percepisci un piccolo lampo di luce bianca al limite della vista.
        #CSS_crewReport_SunInSpaceHigh_17 = Siamo arrivati?
        #CSS_crewReport_SunInSpaceHigh_18 = In realtà qui fuori è davvero noioso.
        #CSS_crewReport_SunInSpaceHigh_19 = È passato qualcosa davanti al finestrino della capsula, o era solo un'allucinazione dovuta alle radiazioni?
        #CSS_crewReport_SunInSpaceHigh_20 = Wow, che galassia bellissima! Aspetta... è una macchia sul vetro. Una splendida macchia.
        #CSS_crewReport_SunInSpaceHigh_21 = L'equipaggio contempla l'infinito potenziale cosmico del razzo... e il suo spazio vitale strettissimo.
        #CSS_crewReport_SunInSpaceHigh_22 = Lo spazio interplanetario, con niente da guardare se non le stelle, ti fa sentire solo.
        #CSS_crewReport_SunInSpaceHigh_23 = Non riesci a credere che lasciare il tuo hot dog fuori non lo abbia scaldato.
        #CSS_crewReport_MohoSrfLanded_00 = Marroncino rossastro o rossiccio marrone? È bello interrogarsi sulle grandi questioni.
        #CSS_crewReport_MohoSrfLandedNorthPole_00 = Rocce grigie e terra grigia. Che posto *fantastico*!
        #CSS_crewReport_MohoSrfLandedNorthernSinkholeRidge_00 = Guardi con stupore la dolina e ti chiedi come si sia formata. Decidi che probabilmente è stata solo una svista.
        #CSS_crewReport_MohoSrfLandedNorthernSinkhole_00 = Ti interroghi sul mistero di dove sia finita l'atmosfera di Moho. Sei contento che non ne abbia più, perché altrimenti tornare sarebbe davvero difficile.
        #CSS_crewReport_MohoSrfLandedMidlands_00 = Qui dentro si muore di caldo.
        #CSS_crewReport_MohoSrfLandedWesternLowlands_00 = Decidi che fare l'esploratore è dura.
        #CSS_crewReport_MohoSrfLandedCentralLowlands_00 = L'equipaggio valuta quali snack sarebbero più buoni se cotti.
        #CSS_crewReport_MohoSrfLandedHighlands_00 = Non eri così caldo da quel giorno di addestramento in cui la tuta prese fuoco. Ti preoccupi che succeda di nuovo.
        #CSS_crewReport_MohoSrfLandedMinorCraters_00 = Jeb vuole sapere se qui un rover riuscirebbe a fare un powerslide. Male.
        #CSS_crewReport_MohoSrfLandedSouthWesternLowlands_00 = Ti chiedi quanto minerale si potrebbe estrarre qui. Dici al controllo missione che i diritti di estrazione sono tuoi.
        #CSS_crewReport_MohoSrfLandedSouthEasternLowlands_00 = Qui su Moho ci si sente davvero soli.
        #CSS_crewReport_MohoSrfLandedCanyon_00 = Sembra che lo scudo termico stia fondendo. I kerbal stanno sudando e hanno caldo.
        #CSS_crewReport_MohoSrfLandedSouthPole_00 = Questo polo è molto meno interessante.
        #CSS_crewReport_MohoSrfLandedSouthPole_01 = Cerchi un grosso buco nel terreno. È il polo sbagliato?
        #CSS_crewReport_MohoInSpaceLow_00 = Osservi con ansia l'indicatore del carburante.
        #CSS_crewReport_MohoInSpaceLow_01 = Dopo alcune discussioni con il controllo missione, arrivi alla conclusione che Moho è un biscotto gigante.
        #CSS_crewReport_MohoInSpaceHigh_00 = Scopri che è possibile friggere un uovo sulla console vicino al finestrino. Lo annoti come possibile motivo economico per andare nello spazio.
        #CSS_crewReport_MohoInSpaceHigh_01 = Senti la struttura del veicolo scricchiolare e gemere per la dilatazione termica. Speri che chi l'ha progettato sapesse cosa stava facendo.
        #CSS_crewReport_MohoInSpaceHigh_02 = Moho è bellissimo. Scatti una foto, poi ti accorgi di essere senza batterie.
        #CSS_crewReport_EveSrfLandedPoles_00 = Forse contrabbandare qualche snack nel modulo di comando non è stata poi una cattiva idea.
        #CSS_crewReport_EveSrfLandedPoles_01 = I poli sembrano inospitali quanto il resto di questo pianeta a pressione da pentola.
        #CSS_crewReport_EveSrfLandedMidlands_00 = Hai la sensazione che atterrare qui sia stata una cattiva idea.
        #CSS_crewReport_EveSrfLandedMidlands_01 = "Voglio tornare a casa".
        #CSS_crewReport_EveSrfLandedExplodiumSea_00 = Coltivi ancora la speranza di aver messo abbastanza carburante.
        #CSS_crewReport_EveSrfLandedLowlands_00 = Il computer di bordo inizia a suonare da solo la melodia di Purple Rain.
        #CSS_crewReport_EveSrfLandedLowlands_01 = Dopo aver sentito gli scricchiolii della capsula, ti penti di aver visitato Eve.
        #CSS_crewReport_EveSrfLandedHighlands_00 = Siamo atterrati con successo su Eve! Tuttavia, l'equipaggio esprime dubbi sulla capacità del lander di ripartire.
        #CSS_crewReport_EveSrfLandedHighlands_01 = La viola zupposfera turbinante avvolge minacciosa il veicolo oltre i finestrini.
        #CSS_crewReport_EveSrfLandedPeaks_00 = La gravità ci schiaccia. Speriamo non includa anche giù dal fianco della montagna.
        #CSS_crewReport_EveSrfLandedPeaks_01 = Qui intorno non c'è nulla di pianeggiante e l'alta gravità rende faticoso muoversi nella cabina e ti fa scivolare di continuo dalla sedia.
        #CSS_crewReport_EveSrfLandedImpactEjecta_00 = L'equipaggio chiede al controllo missione se gli snack si possano trasformare in carburante.
        #CSS_crewReport_EveSrfLandedImpactEJecta_01 = Hai la sensazione che la nave sia sotto parecchia pressione.
        #CSS_crewReport_EveSrfLandedCraterLake_00 = Il mare viola luccica lì vicino, e sembra innocente a chi non ci sta dentro.
        #CSS_crewReport_EveSrfLandedWesternSea_00 = Non hai voglia di uscire, quindi fai uno spuntino.
        #CSS_crewReport_EveSrfLandedOlympus_00 = Fuori dal finestrino c'è un sacco di cielo. Persino il terreno qui su Eve mette soggezione.
        #CSS_crewReport_EveSrfLandedOlympus_01 = L'altimetro segna ancora un valore terribilmente alto. Sicuri di essere davvero atterrati?
        #CSS_crewReport_EveSrfLandedEasternSea_00 = Mare viola, cielo viola, suolo viola. Ti strofini gli occhi e cerchi invano qualcosa che non sia viola.
        #CSS_crewReport_EveSrfLandedFoothills_00 = Più li guardi, più i dolci colli viola iniziano a confondersi in una macchia indistinta.
        #CSS_crewReport_EveSrfLandedFoothills_01 = Anche Eve ha le montagne piccole. Naturalmente sono più grandi di quelle di Kerbin.
        #CSS_crewReport_EveSrfLandedShallows_00 = Le pianure costiere piatte offrono un punto ideale per atterrare, ma non per decollare.
        #CSS_crewReport_EveSrfSplashedPoles_00 = L'oceano è un po' troppo freddo...
        #CSS_crewReport_EveSrfSplashedExplodiumSea_00 = Explodium, dici? Possiamo trasformare questa roba in carburante per razzi?.....è solo un modo di dire? Uffa.
        #CSS_crewReport_EveSrfSplashedExplodiumSea_01 = Il controllo missione ti assicura che fuori c'è succo d'uva e puoi berlo senza rischi. Tu però inizi a essere scettico quando comincia a scrostare la vernice dalla nave.
        #CSS_crewReport_EveSrfSplashedLowlands_00 = Cortocircuito nel filo cinque!
        #CSS_crewReport_EveSrfSplashedImpactEjecta_00 = Senti un odore chimico. Sicuro che il portello sia chiuso bene?
        #CSS_crewReport_EveSrfSplashedCraterLake_00 = Vedi il liquido viola dell'oceano di Eve filtrare nella capsula. Ti viene il sospetto di essere nei guai grossi.
        #CSS_crewReport_EveSrfSplashedCraterLake_01 = Ti ricorda quella volta in cui hai visto un uomo restare intrappolato in una vasca di bibita all'uva. Purtroppo, questa volta non puoi berla per uscirne.
        #CSS_crewReport_EveSrfSplashedWesternSea_00 = Anche se la tuta dovrebbe essere ermetica, giureresti che la capsula odora leggermente di solvente per unghie.
        #CSS_crewReport_EveSrfSplashedWesternSea_01 = Una piccola onda sbatte contro il veicolo, facendoti perdere l'equilibrio con l'alta gravità e cadere di nuovo.
        #CSS_crewReport_EveSrfSplashedEasternSea_00 = Quando vedi l'oceano viola che ti circonda, inizi a chiederti come farai mai a tornare a casa.
        #CSS_crewReport_EveSrfSplashedEasternSea_01 = Questa roba probabilmente ha mille usi e potresti farci un sacco di soldi se solo capissi come portartela dietro.
        #CSS_crewReport_EveSrfSplashedShallows_00 = Qui stiamo rimbalzando un po' troppo.
        #CSS_crewReport_EveSrfSplashedShallows_01 = Sei abbastanza sicuro che questo non sia succo d'uva.
        #CSS_crewReport_EveFlyingLowPoles_00 = Il vento e l'equipaggio stanno urlando.
        #CSS_crewReport_EveFlyingLowPoles_01 = Inizi ad avere dei ripensamenti sull'atterraggio...
        #CSS_crewReport_EveFlyingLowMidlands_00 = Dicevano che l'equipaggio avrebbe avuto un aumento al ritorno, ma non ho mai sentito di nessuno che abbia avuto un aumento. Mai. Non veniamo nemmeno pagati!
        #CSS_crewReport_EveFlyingLowExplodiumSea_00 = Dopo aver guardato dal finestrino, informi il controllo missione che hai capito dove finisce tutta la bibita all'uva del frigo della sala pausa.
        #CSS_crewReport_EveFlyingLowExplodiumSea_01 = L'oceano è quasi piatto come uno specchio.
        #CSS_crewReport_EveFlyingLowLowlands_00 = Ti viene un'improvvisa voglia di succo d'uva.
        #CSS_crewReport_EveFlyingLowLowlands_01 = Volare in quest'aria densa è un processo lento.
        #CSS_crewReport_EveFlyingLowHighlands_00 = L'equipaggio si chiede se ci siano abbastanza snack.
        #CSS_crewReport_EveFlyingLowHighlands_01 = Piccole correnti d'aria diventano molto più potenti per via dell'alta densità atmosferica e il veicolo oscilla mentre vola.
        #CSS_crewReport_EveFlyingLowPeaks_00 = Montagne si alzano tutt'intorno, come lame che trafiggono il cielo pesante.
        #CSS_crewReport_EveFlyingLowPeaks_01 = Il sistema di comunicazione crepita per interferenze sconosciute.
        #CSS_crewReport_EveFlyingLowImpactEjecta_00 = L'attrezzatura è al limite. Dovremmo cavarcela, finché non facciamo movimenti improvvisi.
        #CSS_crewReport_EveFlyingLowImpactEjects_01 = Una goccia di vernice esterna fusa striscia lentamente su per il vetro del finestrino.
        #CSS_crewReport_EveFlyingLowCraterLake_00 = Il Lago del Cratere si estende per miglia fino all'orizzonte. Perché non lo chiamano Mare del Cratere?
        #CSS_crewReport_EveFlyingLowCraterLake_01 = Non ci sono mostri marini alieni laggiù, vero?
        #CSS_crewReport_EveFlyingLowWesternSea_00 = Il lago disgustoso luccica sotto l'atmosfera schiacciante.
        #CSS_crewReport_EveFlyingLowWesternSea_01 = Cerchi di non immaginare come sarebbe restare intrappolato in quel liquido.
        #CSS_crewReport_EveFlyingLowOlympus_00 = Per favore non provate ad atterrare qui. Non vogliamo finire come detriti su un fianco di montagna.
        #CSS_crewReport_EveFlyingLowOlympus_01 = La differenza tra altimetro al livello del mare e altimetro radar è spaventosamente grande.
        #CSS_crewReport_EveFlyingLowEasternSea_00 = La presenza di una raffica di vento lenta che attraversa il mare si tradisce con una chiazza di increspature.
        #CSS_crewReport_EveFlyingLowEasternSea_01 = Il vetro del finestrino della capsula è sgradevolmente caldo al tatto.
        #CSS_crewReport_EveFlyingLowFoothills_00 = Non riesci a vedere il bordo delle colline, nemmeno da qui.
        #CSS_crewReport_EveFlyingLowFoothills_01 = Il produttore ci ha offerto i soldi indietro se la capsula viene schiacciata, quindi almeno quello.
        #CSS_crewReport_EveFlyingLowShallows_00 = Potresti giurare di vedere sagome che si muovono sotto la superficie viola.
        #CSS_crewReport_EveFlyingLowShallows_01 = Mentre guardi il mare, il suo colore viola ti ricorda la tua bibita preferita.
        #CSS_crewReport_EveFlyingHigh_00 = Dopo varie prove puoi confermare che è davvero "molto viola".
        #CSS_crewReport_EveFlyingHigh_01 = Un filamento di plasma luminoso scorre via da un rivetto sporgente.
        #CSS_crewReport_EveFlyingHigh_02 = L'ingresso atmosferico qui è pericoloso. Pregare la divinità di tua scelta è consigliato per alleviare lo stress.
        #CSS_crewReport_EveFlyingHigh_03 = Ben al di sopra delle nubi tossiche e della pressione schiacciante, le cose non sembrano poi così male.
        #CSS_crewReport_EveInSpaceLow_00 = Che cosa profuma di viola?
        #CSS_crewReport_EveInSpaceLow_01 = Be', il viola è il tuo colore preferito. Magari ci sono fiori viola da portare a casa?
        #CSS_crewReport_EveInSpaceLow_02 = Questa sì che è una dedizione totale al viola.
        #CSS_crewReport_EveInSpaceLow_03 = Il mondo sembra incredibilmente tossico e inospitale.
        #CSS_crewReport_EveInSpaceHigh_00 = Ti pare di vedere Gilly, ma si rivela essere una nocciolina di scorta.
        #CSS_crewReport_EveInSpaceHigh_01 = Sul terminatore tra giorno e notte, il cielo di Eve brilla di un bellissimo verde.
        #CSS_crewReport_EveInSpaceHigh_02 = L'atmosfera scintilla come carburante per razzi.
        #CSS_crewReport_EveInSpaceHigh_03 = Da quassù Eve sembra bellissimo. Sospetti che sia un trucco per farti abbassare la guardia.
        #CSS_crewReport_GillySrfLandedMidlands_00 = Questo punto di atterraggio non è affatto pianeggiante, ma la gravità è così bassa che conta poco.
        #CSS_crewReport_GillySrfLandedMidlands_01 = Una lieve pendenza può sembrare verticale e viceversa. Da quaggiù Gilly ha geometrie davvero confuse.
        #CSS_crewReport_GillySrfLandedLowlands_02 = Valuti di correre lungo le pareti interne della capsula come un criceto sotto caffeina, per vedere se generi abbastanza forza da ribaltare il lander.
        #CSS_crewReport_GillySrfLandedLowlands_03 = Non avverti alcun cambiamento di gravità.
        #CSS_crewReport_GillySrfLandedHighlands_00 = Pensi di fare un'escursione, ma temi che il primo passo ti lanci dritto via dalla superficie.
        #CSS_crewReport_GillySrfLandedHighlands_01 = Senti un'impennata di gravità. Senza dire nulla al controllo missione, indossi i pantaloni marroni.
        #CSS_crewReport_GillyInSpaceLow_00 = "Non sapevo li facessero così piccoli."
        #CSS_crewReport_GillyInSpaceLow_01 = Ti chiedi se qui esista qualcosa con un rapporto spinta peso inferiore a uno.
        #CSS_crewReport_GillyInSpaceLow_02 = Che cos'è, una luna per formiche?
        #CSS_crewReport_GillyInSpaceLow_03 = Questo posto sembra un po' noioso. Inizi a calcolare cosa servirebbe per farla deorbitare su Eve, finché la calcolatrice non ti dà un errore NaN. Il controllo missione si rifiuta di fare i conti per te.
        #CSS_crewReport_GillyInSpaceLow_04 = Sembra piccola e per niente appetitosa.
        #CSS_crewReport_GillyInSpaceLow_05 = Guardi giù verso la superficie. È così vicina! Certo, non vuoi finire per litofrenare su quelle colline per sbaglio, ma a questa velocità forse non sarebbe così terribile.
        #CSS_crewReport_GillyInSpaceLow_06 = Pensi di poter sporgere il braccio e toccare la superficie.
        #CSS_crewReport_GillyInSpaceHigh_00 = In qualche modo il piede ti si è incastrato nei comandi. Chi è che ha masticato gomma?
        #CSS_crewReport_GillyInSpaceHigh_01 = Sì. È minuscola.
        #CSS_crewReport_GillyInSpaceHigh_02 = Col senno di poi, te la immaginavi più grande.
        #CSS_crewReport_GillyInSpaceHigh_03 = Sembra una patata. Inizi ad avere molta fame.
        #CSS_crewReport_GillyInSpaceHigh_04 = Una roccia così piccola deve avere pochissima gravità. La prossima volta porterai una mazza da golf.
        #CSS_crewReport_GillyInSpaceHigh_05 = Che carina! Nonostante l'aspetto da patata, Gilly è un minuscolo asteroide davvero adorabile.
        #CSS_crewReport_GillyInSpaceHigh_06 = Il colore e la forma molto irregolare di Gilly ti ricordano una patata. All'improvviso ti chiedi dove siano le patatine.
        #CSS_crewReport_KerbinSrfLandedKSC_00 = Guardi fuori dal finestrino e non riesci più a ricordare se sei già tornato da una missione o devi ancora partire.
        #CSS_crewReport_KerbinSrfLandedKSC_01 = Pensi che dovresti entrare nell'EAV e discutere se il razzo sia abbastanza buono.
        #CSS_crewReport_KerbinSrfLandedKSC_02 = Mentre sei seduto nella capsula, non puoi fare a meno di chiederti perché non sei ancora decollato.
        #CSS_crewReport_KerbinSrfLandedKSC_03 = Questo è il nostro centro spaziale. Siamo a casa.
        #CSS_crewReport_KerbinSrfLandedKSC_04 = Serviva davvero un razzo per arrivare fin qui?
        #CSS_crewReport_KerbinSrfLandedKSC_05 = Déjà vu!
        #CSS_crewReport_KerbinSrfLandedKSC_06 = Probabilmente dovresti arrampicarti sul VAB!
        #CSS_crewReport_KerbinSrfLandedKSC_07 = Ehm, ma siamo davvero andati da qualche parte? Questo posto è terribilmente familiare.
        #CSS_crewReport_KerbinSrfLandedAdministration_00 = Guardi Montimer che manda una pallina da golf nello stagno.
        #CSS_crewReport_KerbinSrfLandedAstronautComplex_00 = Sei solo felice che non siamo atterrati addosso a nessuna delle nuove reclute.
        #CSS_crewReport_KerbinSrfLandedBaikerbanur_00 = Questo vecchio spazioporto trascurato è davvero uno spettacolo triste al giorno d'oggi, un grave affronto alla sua orgogliosa storia.
        #CSS_crewReport_KerbinSrfLandedBaikerbanurLaunchpad_00 = Non puoi fare a meno di provare reverenza nel sederti dove sedevano i primi pionieri del volo spaziale kerbal, prima ancora che il CSK fosse righe su un foglio.
        #CSS_crewReport_KerbinSrfLandedCrawlerway_00 = Fingi di essere il guidatore del cingolato. Dopo pochi minuti capisci che preferiresti volare nello spazio.
        #CSS_crewReport_KerbinSrfLandedFlagPole_00 = Ti chiedi se questo sarà il posto della tua lapide.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_00 = Guardi in alto le stelle e inizi a contare. Ti rendi conto che dovresti decollare prima di addormentarti.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_01 = Ti penti di aver indossato una maglia rossa al lavoro oggi.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_02 = Non sei sicuro che questo sia il posto giusto in cui stare.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_03 = Aspetti con impazienza.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_04 = "Decolliamo? Se no, voglio biscotti."
        #CSS_crewReport_KerbinSrfLandedLaunchPad_05 = Ti fermi un momento a ripensare alla tua vita.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_06 = "Siamo arrivati?"
        #CSS_crewReport_KerbinSrfLandedLaunchPad_07 = Prendi la matita, ma ti distrai pensando allo spazio.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_08 = Questo posto sembra molto familiare.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_09 = "Accensione, ok. Indicatore carburante, ok. Paracadute, ok. Microonde, ok. Aspetta, microonde?"
        #CSS_crewReport_KerbinSrfLandedLaunchPad_10 = Biascichi una tua versione personale della preghiera di Shepard.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_11 = Ti innervosisci e provi a trovare il pulsante di lancio, così puoi andare nello spazio e basta.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_12 = La rampa di lancio... che terreno molto interessante abbiamo qui.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_13 = Ti chiedi perché hai sentito oltre 3 g quando il razzo è stato spostato sulla rampa.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_14 = Solo un avviso: per tutta la durata del volo avremo un superconduttore al massimo e puntato su di te. A dire il vero stiamo tirando la scienza a caso. Nel migliore dei casi ottieni dei superpoteri. Nel peggiore ti dedicano una commemorazione.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_15 = Non sembra che ci stiamo muovendo molto velocemente, in questo momento.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_16 = Siamo arrivati?
        #CSS_crewReport_KerbinSrfLandedLaunchPad_17 = "Aspetta! Fatemi uscire, ho cambiato idea!"
        #CSS_crewReport_KerbinSrfLandedLaunchPad_18 = Controlla l'accensione e che l'affetto di Von Kerman sia con te.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_19 = Ti chiedi da dove arrivi quella puzza tremenda. O c'è una grossa perdita di propellente, oppure Bob ha mangiato burritos a pranzo. Di nuovo.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_20 = Esamini le luci lampeggianti e fissi intensamente gli indicatori del carburante. Sembra che siamo pronti a partire.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_21 = Il controllo missione ti ricorda che scendere e spingere è spesso una tattica valida.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_22 = Tiri fuori di nascosto il panino di carne in scatola che hai contrabbandato a bordo e ne dai un morso. Alcune briciole cadono nei comandi, ma niente paura, dovrebbero tornare a galleggiare fuori appena saremo nello spazio.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_23 = Ti chiedi dove sia Gunther Wendt.
        #CSS_crewReport_KerbinSrfLandedLaunchPad_24 = Sfogliando la checklist pre lancio, apri una pagina che dice solo "I tuoi annunci potrebbero stare qui". Alla fine capisci che Montimer sta esagerando con la sua autorità, in senso letterale.
        #CSS_crewReport_KerbinSrfLandedMissionControl_00 = Rapporto missione: non siamo andati molto lontano. Non mi vedi che ti saluto?
        #CSS_crewReport_KerbinSrfLandedR&D_00 = La gente della R&S inizia a smontare la tua nave appena atterra.
        #CSS_crewReport_KerbinSrfLandedR&DCentralBuilding_00 = Presto, riaccendete i motori prima che la gente della R&S li smonti!
        #CSS_crewReport_KerbinSrfLandedR&DCornerLab_00 = I tecnici della R&S sono così concentrati che non ci hanno nemmeno visto atterrare.
        #CSS_crewReport_KerbinSrfLandedR&DMainBuilding_00 = Invieresti il rapporto, ma i tecnici della R&S hanno già smontato l'antenna di comunicazione.
        #CSS_crewReport_KerbinSrfLandedR&DObservatory_00 = Speri che la gente della R&S abbia visto quell'atterraggio. Da manuale, se posso dirlo io.
        #CSS_crewReport_KerbinSrfLandedR&DSideLab_00 = La gente della R&S resta a bocca aperta alla vista della tua nave, non avendone mai vista una completamente assemblata prima.
        #CSS_crewReport_KerbinSrfLandedR&DSmallLab_00 = Siamo atterrati SOPRA l'edificio, credo. Questo sì che è un atterraggio di precisione!
        #CSS_crewReport_KerbinSrfLandedR&DTanks_00 = Speri che lo scarico del razzo non incendi qualunque strana sostanza ci sia in quei serbatoi.
        #CSS_crewReport_KerbinSrfLandedR&DWindTunnel_00 = Dai fuoco al complesso cercando di contrastare il vento con i motori del razzo. Pazienza, è ora di merenda!
        #CSS_crewReport_KerbinSrfLandedRunway_00 = Pensi che dovresti pilotare il veicolo invece di scrivere registri noiosi.
        #CSS_crewReport_KerbinSrfLandedRunway_01 = Strappi un foglio dal taccuino e ci disegni sopra uno spazioplano.
        #CSS_crewReport_KerbinSrfLandedRunway_02 = Nonostante il nome, la pista non corre davvero.
        #CSS_crewReport_KerbinSrfLandedRunway_03 = Questa pista sembra correre per parecchio.
        #CSS_crewReport_KerbinSrfLandedRunway_04 = Da qui c'è una bella vista del controllo missione. Li vedi che ti salutano.
        #CSS_crewReport_KerbinSrfLandedRunway_05 = Bevi un sorso di bibita prima di accendere i motori. O era dopo?
        #CSS_crewReport_KerbinSrfLandedRunway_06 = Non sfrecciare vicino alla torre. Quello che paga il tuo stipendio è lì e non vuole rovesciarsi il caffè.
        #CSS_crewReport_KerbinSrfLandedRunway_07 = "Libero a destra. Libero a sinistra. Qui è tutto ok. Controllo a terra, rispondete. Passo."
        #CSS_crewReport_KerbinSrfLandedRunway_08 = Rapporto dalla pista. Meno male che non c'è molto traffico, perché non credo che abbiamo mai avuto l'autorizzazione per stare qui.
