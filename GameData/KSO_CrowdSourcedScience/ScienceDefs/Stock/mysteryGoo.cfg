        EveSrfLandedHighlands* = #CSS_mysteryGoo_EveSrfLandedHighlands_00 // The Goo sits calmly bubbling away, showing no signs of being affected by a magnetic field. Maybe Eve releases gas from its surface to replace the atmosphere stripped away by the solar wind.
