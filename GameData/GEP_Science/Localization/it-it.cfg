        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowBasins_00 = Dall'orbita bassa, i bacini mostrano pozze scure in UV bordate da archi di eiezione più luminosi, i disegni sembrano cicatrici che ricordano ancora l'impatto.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowLowlands_00 = Ampi bassopiani risultano come un campo UV attenuato con risalti punteggiati, suggerendo risorse su cui il Controllo Missione potrà litigare molto dopo l'arrivo del segnale.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowTropicalMidlands_00 = La camera individua lunghe bande UV deboli che non corrispondono alle mappe nel visibile, "non familiare" diventa una quantità misurabile.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowTemperateMidlands_00 = Sottili aloni UV circondano affioramenti sparsi, come se la roccia indossasse la radiazione come un sottile cappotto nella luce rossa e fioca.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowHighlands_00 = Creste delle colline brillano lungo i bordi in UV, mentre conche in ombra restano ostinatamente scure, il terreno sembra scolpito dal freddo e dal tempo.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowPoles_00 = I poli si accendono per un attimo in UV mentre passi, poi ricadono in una penombra senza dettagli, il ritardo radio aggiunge un secondo tipo di silenzio.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceHigh_00 = In alta quota, Sucellus diventa un disco calmo con una lieve marezzatura UV, un promemoria tranquillo che "vicino" non è una parola che si usa quassù.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedLowlands_00 = Da vicino, i bassopiani di Caireen assorbono l'UV come una spugna, tranne per pochi puntini luminosi che brillano come se si pentissero di essere stati catturati.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedMidlands_00 = Le pianure mostrano un duro contrasto UV lungo le rocce fratturate, Sucellus incombe nel cielo come un supervisore gigante e paziente.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedHighlands_00 = L'UV mette in risalto bordi netti, dall'aria fresca, che non dovrebbero sembrare affatto freschi, la piccola luna sembra tenere i suoi segreti nelle crepe.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedPoles_00 = Il suolo polare restituisce un sottile e freddo scintillio UV che svanisce a ogni minima ombra, lo registri e smetti di immaginare passi qui.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowLowlands_00 = Dall'orbita bassa, i bassopiani appaiono quasi neri in UV con puntini luminosi sparsi, è un mondo minuscolo con un silenzio molto rumoroso.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowMidlands_00 = Le pianure fluorescono in fili spezzati, come se qualcuno avesse trascinato un cavo luminoso tra i detriti e l'avesse lasciato lì.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowHighlands_00 = Le facce delle colline lampeggiano luminose in UV quando cambia l'angolo del sole, le immagini in ritardo fanno sembrare che la luna stia sbattendo le palpebre.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowPoles_00 = I poli mostrano deboli risalti UV senza un disegno chiaro, il team scientifico lo chiama "interessante" e tu senti "misterioso" attraverso lo statico.
        #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceHigh_00 = Da molto in alto, Caireen è un puntino accanto a Sucellus, e il segnale UV è soprattutto un promemoria di quanto lontano la tua camera sia disposta a sussurrare.
        #GEPscience_tantares_ultraviolet_light_camera_SironaFlyingLow_00 = Nell'atmosfera profonda, l'UV si diffonde in una foschia violacea che soffoca i dettagli fini, la camera passa gran parte del giro a dimostrare di vedere ancora qualcosa.
        #GEPscience_tantares_ultraviolet_light_camera_SironaFlyingHigh_00 = Più in alto, la vista UV si risolve in bordi di bande e deboli bagliori che scorrono sotto di te, le reazioni del Controllo Missione arrivano tardi, come applausi in un corridoio lungo.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure bevono l'UV, con occasionali nodi luminosi che accennano a meteo energetico nascosto sotto il sole rosso e fioco.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceLowLightTropicalBands_00 = Le bande tropicali chiare riflettono l'UV in ampi fogli, trasformando il pianeta in una biglia luminosa con un moto lento e inquietante.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceLowDarkTemperateBands_00 = Le bande temperate scure in UV mostrano confini netti e festonati, come se l'atmosfera avesse tracciato linee e si rifiutasse di cancellarle.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare fluorescono debolmente a chiazze, suggerendo foschie d'alta quota che fanno chimica per cui non hai portato un manuale.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceLowDarkPolarBands_00 = Verso i poli, la penombra UV si spezza in archi sfrangiati che vanno e vengono come aurore a metà formazione.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceLowLightPolarBands_00 = Le regioni polari brillano dolcemente in UV, una pallida corona che sembra delicata finché non ricordi che tipo di mondo può indossarla.
        #GEPscience_tantares_ultraviolet_light_camera_SironaInSpaceHigh_00 = Da lontano, il disco di Sirona mostra dolci gradienti UV e un bagliore attenuato, la sua orbita fedele attorno a Grannus sembra più una pattuglia vigile che una danza.
        #GEPscience_tantares_ultraviolet_light_camera_AirmedSrfLandedTropicalLowlands_00 = La camera UV mostra la metà chiara di Airmed spolverata di granelli luminosi che brillano solo sotto la debole luce rossa di Grannus.
