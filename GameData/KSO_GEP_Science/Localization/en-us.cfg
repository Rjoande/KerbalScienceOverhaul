        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateLowlands_00 = Brown-beige terrain could be dust, could be ice pretending to be dust, could be something worse. The survey recommends a cautious touchdown and a sample scoop that doesn’t ask questions.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalMidlands_00 = Layered rises and shallow valleys make line-of-sight to relays a constant negotiation. You approve a ridge-top site and add: “schedule extra time for signal to catch up.”
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateMidlands_00 = The midlands look firm and gently rolling, almost comforting—until the red lighting turns depth cues into guesses. The site gets a cautious green check mark and a very bold “VERIFY.”
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedHighlands_00 = From up here, Borvo’s thin air and long horizons feel enormous and quiet. The survey suggests a highland outpost for comms and science, with the reminder that “big views don’t equal flat ground.”
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedMajorCraters_00 = The crater floors are tempting, but the rims are steep and the shadows are deep enough to hide a small space program. You pick a sunlit shelf and avoid the rest like it’s paperwork.
        #GEPscience_bd_SiteSurvey_BorvoSrfLandedPoles_00 = The poles show smoother expanses broken by sharp, bright patches that don’t match any familiar frost. The site is approved for reconnaissance-first operations and “no heroic sprints.”

        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTropicalLowlands_00 = The lowlands are gray, pocked, and honest about being unfriendly. The imaging pass finds one flat pad-sized patch and immediately makes it the mission’s favorite.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTemperateLowlands_00 = Fine debris collects in shallow basins, making the terrain look softer than it likely is. You mark a touchdown point and note that comm delay turns “minor correction” into “major life choice.”
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTropicalMidlands_00 = Small ridges and craterlets create a lumpy landscape that feels unfinished. The survey recommends short hops, slow descents, and not trusting any shadow to be shallow.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedTemperateMidlands_00 = The midlands offer broad sightlines across a very empty world under dim red sun. You approve a site based on stability and the comforting lack of surprises—so far.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedHighlands_00 = The highlands are rough, fractured, and eager to test your landing gear. The site gets a “maybe” rating, upgraded to “no” if you enjoy standing upright.
        #GEPscience_bd_SiteSurvey_DamonaSrfLandedImpactBasin_00 = The basin’s scar dominates every frame, a reminder that this moon has history and it wasn’t gentle. You select a smooth interior stretch for sampling, with a note: “watch for ejecta blocks the size of regret.”
