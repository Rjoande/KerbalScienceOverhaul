@EXPERIMENT_DEFINITION:HAS[#id[gravityScan]]:NEEDS[!JNSQ]
{
    %RESULTS
    {
        SrfLanded* = #CSS_gravityScan_default_00 // You read the long list of complicated numbers and equations and wonder if you could re-purpose this machine to calculate your taxes.
        SrfLanded* = #CSS_gravityScan_default_01 // After reading the results, you think you finally understand the full gravity of the situation.
        SrfLanded* = #CSS_gravityScan_default_02 // You report your observations about this weighty situation.
        SrfLanded* = #CSS_gravityScan_default_03 // There are a lot of negative gravioli particles here. Wait...
        SrfLanded* = #CSS_gravityScan_default_04 // A positive gravioli particle approaches, but is tossed away at the last second.
        SrfLanded* = #CSS_gravityScan_default_05 // The scan indicates there is something pulling at the sensor.
        SrfLanded* = #CSS_gravityScan_default_06 // Sensors failed! But this data will help to improve them, so send them home immediately!
        SrfLanded* = #CSS_gravityScan_default_07 // Gravity Reversal occurred for one thirty-third of a second. Minor damage. Major fear.
        SrfLanded* = #CSS_gravityScan_default_08 // The sensor is, for some reason, reading 4096 significant figures.
        SrfLanded* = #CSS_gravityScan_default_09 // You have no idea what these numbers mean.
        SrfLanded* = #CSS_gravityScan_default_10 // Oh boy, more numbers!
        SrfLanded* = #CSS_gravityScan_default_666 // You notice the gravity scans have been saying 666 over and over again.

        InSpace* = #CSS_gravityScan_default_00 // You read the long list of complicated numbers and equations and wonder if you could re-purpose this machine to calculate your taxes.
        InSpace* = #CSS_gravityScan_default_01 // After reading the results, you think you finally understand the full gravity of the situation.
        InSpace* = #CSS_gravityScan_default_02 // You report your observations about this weighty situation.
        InSpace* = #CSS_gravityScan_default_03 // There are a lot of negative gravioli particles here. Wait...
        InSpace* = #CSS_gravityScan_default_04 // A positive gravioli particle approaches, but is tossed away at the last second.
        InSpace* = #CSS_gravityScan_default_05 // The scan indicates there is something pulling at the sensor.
        InSpace* = #CSS_gravityScan_default_06 // Sensors failed! But this data will help to improve them, so send them home immediately!
        InSpace* = #CSS_gravityScan_default_07 // Gravity Reversal occurred for one thirty-third of a second. Minor damage. Major fear.
        InSpace* = #CSS_gravityScan_default_08 // The sensor is, for some reason, reading 4096 significant figures.
        InSpace* = #CSS_gravityScan_default_09 // You have no idea what these numbers mean.
        InSpace* = #CSS_gravityScan_default_10 // Oh boy, more numbers!
        InSpace* = #CSS_gravityScan_default_666 // You notice the gravity scans have been saying 666 over and over again.

        SunInSpaceLow* = #CSS_gravityScan_SunInSpaceLow_00 // The gravitational pull is very high. Maybe that's why the planets don't fly away?
        SunInSpaceLow* = #CSS_gravityScan_SunInSpaceLow_01 // The manufacturer's manual for this instrument has classified readings in this range as "very unwise". There is a somewhat unhelpful footnote that the warranty does not cover melting.
        SunInSpaceLow* = #CSS_gravityScan_SunInSpaceLow_02 // The readings are so far off the scale that the dial loops back around to 1.
        SunInSpaceHigh* = #CSS_gravityScan_SunInSpaceHigh_00 // You look at the small measurement, and feel slightly relieved. Perhaps you won't be incinerated today.
        SunInSpaceHigh* = #CSS_gravityScan_SunInSpaceHigh_01 // You stare at the reading. And stare. And stare.
        SunInSpaceHigh* = #CSS_gravityScan_SunInSpaceHigh_02 // The sensor monitors the orbital dynamics of the planets.

        MohoSrfLanded* = #CSS_gravityScan_MohoSrfLanded_00 // Moho's gravity and density implies that a metal-rich core occupies at least 60% of the planet's mass, a figure twice as great as for Kerbin!
        MohoSrfLanded* = #CSS_gravityScan_MohoSrfLanded_01 // The gravitational pull of this planet is high for one of its size. The core must be extremely dense.
        MohoSrfLandedNorthPole* = #CSS_gravityScan_MohoSrfLandedNorthPole_00 // Detailed scans hint at hollow space in the interior of the planet.
        MohoSrfLandedMidlands* = #CSS_gravityScan_MohoSrfLandedMidlands_00 // The gravity beneath the instrument shifts almost imperceptibly.
        MohoSrfLandedWesternLowlands* = #CSS_gravityScan_MohoSrfLowlands_00 // The gravimeter confirms that the lowlands are large.
        MohoSrfLandedCentralLowlands* = #CSS_gravityScan_MohoSrfLowlands_00 // The gravimeter confirms that the lowlands are large.
        MohoSrfLandedHighlands* = #CSS_gravityScan_MohoSrfLandedHighlands_00 // The gravity is stable here.
        MohoSrfLandedMinorCraters* = #CSS_gravityScan_MohoSrfLandedMinorCraters_00 // The sensor is giving odd readings here.
        MohoSrfLandedSouthWesternLowlands* = #CSS_gravityScan_MohoSrfLowlands_00 // The gravimeter confirms that the lowlands are large.
        MohoSrfLandedSouthEasternLowlands* = #CSS_gravityScan_MohoSrfLowlands_00 // The gravimeter confirms that the lowlands are large.
        MohoSrfLandedCanyon* = #CSS_gravityScan_MohoSrfLandedCanyon_00 // The gravity is quite consistent here.
        MohoSrfLandedSouthPole* = #CSS_gravityScan_MohoSrfLandedSouthPole_00 // Detailed scans hint at hollow spaces in the interior of the planet.

        EveSrfLandedPoles* = #CSS_gravityScan_EveSrfLandedPoles_00 // The sensor's overload warning is on. It appears Eve's gravity is almost too much.
        EveSrfLandedPoles* = #CSS_gravityScan_EveSrfLandedPoles_01 // "Warranty void if exposed to more than 0g". Better not break it then.
        EveSrfLandedMidlands* = #CSS_gravityScan_EveSrfLandedMidlands_00 // Kerbals are short enough already in 1g, so you wonder how short a 1.7g heavyworlder would be.
        EveSrfLandedMidlands* = #CSS_gravityScan_EveSrfLandedMidlands_01 // The gravimeter mounting bracket bends alarmingly under the force.
        EveSrfLandedExplodiumSea* = #CSS_gravityScan_EveSrfLandedExplodiumSea_00 // You feel glad there are no tides. Just the presence of the liquid in that sea is bad enough, and that's without it chasing after you.
        EveSrfLandedLowlands* = #CSS_gravityScan_EveSrfLandedLowlands_00 // The gravity here makes you feel really fat, while at the same time, you look quite skinny.
        EveSrfLandedLowlands* = #CSS_gravityScan_EveSrfLandedLowlands_01 // Together with the thick atmosphere, this gravity will seriously hamper efforts to take off.
        EveSrfLandedHighlands* = #CSS_gravityScan_EveSrfLandedHighlands_00 // The gravity of Eve strongly supports your personal "Planet Core is a Black Hole" theory.
        EveSrfLandedHighlands* = #CSS_gravityScan_EveSrfLandedHighlands_01 // You knew it! You didn't put on weight, Eve put the weight on you!
        EveSrfLandedPeaks* = #CSS_gravityScan_EveSrfLandedPeaks_00 // Given the wealth of data to go on, the gravimeter finishes its scan in record time.
        EveSrfLandedPeaks* = #CSS_gravityScan_EveSrfLandedPeaks_01 // Comparison to the Eve average and expected values allows the determining of the mountains' missing mass anomaly.
        EveSrfLandedImpactEjecta* = #CSS_gravityScan_EveSrfLandedImpactEjecta_00 // The very high gravity of Eve means the meteorite that struck here must have done so with great speed.
        EveSrfLandedImpactEjecta* = #CSS_gravityScan_EveSrfLandedImpactEjecta_01 // You wait for the gravelly ejecta to stop shifting under the ship before measuring the gravity.
        EveSrfLandedCraterLake* = #CSS_gravityScan_EveSrfLandedCraterLake_00 // Holy gravioli, that's a lot of them!
        EveSrfLandedWesternSea* = #CSS_gravityScan_EveSrfLandedWesternSea_01 // Something about the gravity of the sea is seriously off, but you can't put your finger on it.
        EveSrfLandedOlympus* = #CSS_gravityScan_EveSrfLandedOlympus_00 // The free-air gravity anomaly is enormous. The roots on these mountains must be like a huge geological tree trunk.
        EveSrfLandedOlympus* = #CSS_gravityScan_EveSrfLandedOlympus_01 // The position from the top of the world gives detailed insight into Eve's crustal structure.
        EveSrfLandedEasternSea* = #CSS_gravityScan_EveSrfLandedEasternSea_00 // Just looking at the readout makes you feel heavier.
        EveSrfLandedFoothills* = #CSS_gravityScan_EveSrfLandedFoothills_00 // Nothing out of the Eve ordinary, aside from some pull from the nearby "adult" mountains.
        EveSrfLandedFoothills* = #CSS_gravityScan_EveSrfLandedFoothills_01 // The weight presses down on the gravimeter. You could swear it likes it.
        EveSrfLandedShallows* = #CSS_gravityScan_EveSrfLandedShallows_00 // So heavy... its weight level must be over 9000!
        EveInSpaceLowPoles* = #CSS_gravityScan_EveInSpaceLowPoles_00 // Gravity ticks up and down as you pass over the varied polar surface.
        EveInSpaceLowMidlands* = #CSS_gravityScan_EveInSpaceLowMidlands_00 // Graviolis swirl around as they go up and down, in and out of Eve.
        EveInSpaceLowMidlands* = #CSS_gravityScan_EveInSpaceLowMidlands_01 // Small nicks in gravity betray the presence of many buried, eroded and long forgotten craters from Eve's ancient past.
        EveInSpaceLowExplodiumSea* = #CSS_gravityScan_EveInSpaceLowExplodiumSea_00 // Sudden spikes and dips in gravity reveal prominent continental shelves deep under the surface of the seas.
        EveInSpaceLowExplodiumSea* = #CSS_gravityScan_EveInSpaceLowExplodiumSea_01 // Eve has no major moon, so the oceans do not experience tides.
        EveInSpaceLowLowlands* = #CSS_gravityScan_EveInSpaceLowLowlands_00 // Super gravity versus super atmosphere. What would win?
        EveInSpaceLowLowlands* = #CSS_gravityScan_EveInSpaceLowLowlands_01 // With the reading complete, you're one step closer to working out why the gravity is so darn high.
        EveInSpaceLowHighlands* = #CSS_gravityScan_EveInSpaceLowHighlands_00 // The high gravity will make even short falls hazardous. Kerbals should be careful here.
        EveInSpaceLowHighlands* = #CSS_gravityScan_EveInSpaceLowHighlands_01 // Now close to Eve, the equipment gets its first tastes of the punishing Eve gravity.
        EveInSpaceLowPeaks* = #CSS_gravityScan_EveInSpaceLowPeaks_00 // Gravimetric data from the peaks is analysed from multiple angles to generate a subsurface map of the mountains.
        EveInSpaceLowPeaks* = #CSS_gravityScan_EveInSpaceLowPeaks_01 // The numerous mountain peaks each have a distinct gravitational signature.
        EveInSpaceLowImpactEjecta* = #CSS_gravityScan_EveInSpaceLowImpactEjecta_00 // The lip of the craters provides a distinctive shape to the gravity line.
        EveInSpaceLowImpactEjecta* = #CSS_gravityScan_EveInSpaceLowImpactEjecta_01 // You hope the high gravity doesn't cause you to suffer the same fate as the impactor.
        EveInSpaceLowCraterLake* = #CSS_gravityScan_EveInSpaceLowCraterLake_00 // The normal gravimetric traces of an impact basin are faint and truncated. Something deep down must be removing them.
        EveInSpaceLowCraterLake* = #CSS_gravityScan_EveInSpaceLowCraterLake_01 // That's a big hole. The gravimeter concurs.
        EveInSpaceLowWesternSea* = #CSS_gravityScan_EveInSpaceLowWesternSea_00 // Unexpectedly, the Western Sea shows strong gravimetric signs associated with major continental rift basins.
        EveInSpaceLowOlympus* = #CSS_gravityScan_EveInSpaceLowOlympus_00 // The signals of the huge mountains dwarf all those around them.
        EveInSpaceLowOlympus* = #CSS_gravityScan_EveInSpaceLowOlympus_01 // The regional gravitational anomaly suggests the mountain roots extend down dozens of miles into Eve's mantle.
        EveInSpaceLowEasternSea* = #CSS_gravityScan_EveInSpaceLowEasternSea_00 // The floor of the basin seems to have very little underwater topography aside from a handful of islands.
        EveInSpaceLowFoothills* = #CSS_gravityScan_EveInSpaceLowFoothills_00 // The gravity looks uncomfortably high. You'd rather stay up here, thanks.
        EveInSpaceLowFoothills* = #CSS_gravityScan_EveInSpaceLowFoothills_01 // The proximity of large nearby peaks and craters makes it difficult to isolate the signatures of the individual landforms.
        EveInSpaceLowShallows* = #CSS_gravityScan_EveInSpaceLowShallows_00 // The shallower portions of the oceans don't have a lot going for them gravimetrically.
        EveInSpaceLowShallows* = #CSS_gravityScan_EveInSpaceLowShallows_01 // You hope the liquid down there is dense so you don't sink into it. Someone tells you buoyancy doesn't work like that.
        EveInSpaceHighPoles* = #CSS_gravityScan_EveInSpaceHighPoles_00 // The varied polar landscape outputs a highly interesting and colourful gravimetric map.
        EveInSpaceHighMidlands* = #CSS_gravityScan_EveInSpaceHighMidlands_00 // Zzzzz. Wake me up when something interesting comes up.
        EveInSpaceHighExplodiumSea* = #CSS_gravityScan_EveInSpaceHighExplodiumSea_00 // The sensor spikes every time you orbit over the ocean.
        EveInSpaceHighLowlands* = #CSS_gravityScan_EveInSpaceHighLowlands_00 // The transition between land and sea is softened at this high altitude.
        EveInSpaceHighHighlands* = #CSS_gravityScan_EveInSpaceHighHighlands_00 // You don't understand how Eve can keep its rotational axis straight with all this lopsided mass.
        EveInSpaceHighPeaks* = #CSS_gravityScan_EveInSpaceHighPeaks_00 // The sensor says it found something, and beeps insistently at you.
        EveInSpaceHighImpactEjecta* = #CSS_gravityScan_EveInSpaceHighImpactEjecta_00 // You dial up the sensitivity on the equipment to get a good scan of the crater.
        EveInSpaceHighCraterLake* = #CSS_gravityScan_EveInSpaceHighCraterLake_00 // The signature of the massive crater is muted more than it should be from high altitude.
        EveInSpaceHighWesternSea* = #CSS_gravityScan_EveInSpaceHighWesternSea_01 // Tantalising hints of a major positive gravitational anomaly start to appear.
        EveInSpaceHighOlympus* = #CSS_gravityScan_EveInSpaceHighOlympus_00 // Every needle swings to point at the huge rocky edifice on the distant surface.
        EveInSpaceHighEasternSea* = #CSS_gravityScan_EveInSpaceHighEasternSea_00 // The gravimeter stops working. KSC tells you to switch it off and on again.
        EveInSpaceHighFoothills* = #CSS_gravityScan_EveInSpaceHighFoothills_00 // A piece of ship hull drifts past the sensor and registers on the super-sensitive equipment. Fascinating!
        EveInSpaceHighShallows* = #CSS_gravityScan_EveInSpaceHighShallows_00 // You wonder if you could use the gravimeter to try and scan for creatures under the purple waves.

        GillySrfLandedMidlands* = #CSS_gravityScan_GillySrfLandedMidlands_00 // Peering very closely at the dial, you notice there's indeed some gravity here.
        GillySrfLandedMidlands* = #CSS_gravityScan_GillySrfLandedMidlands_01 // You have to tap the sensor a few times before it realizes that gravity is, in fact, present.
        GillySrfLandedLowlands* = #CSS_gravityScan_GillySrfLandedLowlands_00 // The needle on the gravity sensor seems to have moved about half a millimeter.
        GillySrfLandedLowlands* = #CSS_gravityScan_GillySrfLandedLowlands_01 // The instrument hardly recognizes the asteroid below.
        GillySrfLandedHighlands* = #CSS_gravityScan_GillySrfLandedHighlands_00 // With Gilly's low gravity, you now question why Jeb wanted to put Mainsails on the lander.
        GillySrfLandedHighlands* = #CSS_gravityScan_GillySrfLandedHighlands_01 // The gravioli detector reports that there is NO gravity on this dwarf asteroid... wait, there's like 0.01 gravity units here.
        GillyInSpaceLowMidlands* = #CSS_gravityScan_GillyInSpaceLowMidlands_00 // Are you sure the sensor's even working? The numbers are so small they don't register on the cheap LCD.
        GillyInSpaceLowMidlands* = #CSS_gravityScan_GillyInSpaceLowMidlands_01 // The gravimeter threatens to float away in the near-zero-g.
        GillyInSpaceLowLowlands* = #CSS_gravityScan_GillyInSpaceLowLowlands_00 // The display reads "Error HL3". Upon consultation with the manual, you discover that this means the sensor can't find any gravity to scan.
        GillyInSpaceLowLowlands* = #CSS_gravityScan_GillyInSpaceLowLowlands_01 // The sensor outputs a beautifully detailed gravity map - of Eve.
        GillyInSpaceLowHighlands* = #CSS_gravityScan_GillyInSpaceLowHighlands_00 // The gravity scanner can't decide which way is up.
        GillyInSpaceLowHighlands* = #CSS_gravityScan_GillyInSpaceLowHighlands_01 // The gravity scanner decides that the ship has more gravity than Gilly.
        GillyInSpaceHighMidlands* = #CSS_gravityScan_GillyInSpaceHighMidlands_00 // Hey, is this thing on?
        GillyInSpaceHighMidlands* = #CSS_gravityScan_GillyInSpaceHighMidlands_01 // The gravity is ridiculous. Playing ker-ball on Gilly might end up putting the ball in orbit.
        GillyInSpaceHighLowlands* = #CSS_gravityScan_GillyInSpaceHighLowlands_00 // You manage to get an accurate reading despite the overpowering pull from Eve.
        GillyInSpaceHighLowlands* = #CSS_gravityScan_GillyInSpaceHighLowlands_01 // The sensor thinks the most gravity is coming from behind you.
        GillyInSpaceHighHighlands* = #CSS_gravityScan_GillyInSpaceHighHighlands_00 // The readings are so low that the margin of error still touches zero.
        GillyInSpaceHighHighlands* = #CSS_gravityScan_GillyInSpaceHighHighlands_01 // If you squint at the data enough, you think you can see small variations in gravity from the lumpy peaks.

        KerbinSrfLandedKSC* = #CSS_gravityScan_KerbinSrfLandedKSC_00 // The scanner indicates that gravity does, in fact, exist.
        KerbinSrfLandedAdministration* = #CSS_gravityScan_KerbinSrfLandedAdministration_00 // The graviolis try to look professional. It's not really working.
        KerbinSrfLandedAstronautComplex* = #CSS_gravityScan_KerbinSrfLandedAstronautComplex_00 // The new recruits crowd around to check out your awesome sensor.
        KerbinSrfLandedBaikerbanur* = #CSS_gravityScan_KerbinSrfLandedBaikerbanur_00 // Ultra-local gravimetric analysis suggests the presence of a hangar-sized void under the surface.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_gravityScan_KerbinSrfLandedBaikerbanurLaunchpad_00 // You can't be bothered to go through the analysis process and pull up some records from when the pad was built long ago.
        KerbinSrfLandedCrawlerway* = #CSS_gravityScan_KerbinSrfLandedCrawlerway_00 // You measure the gravity slightly increasing as the crawler goes by.
        KerbinSrfLandedFlagPole* = #CSS_gravityScan_KerbinSrfLandedFlagPole_00 // Being on top of the pole you realize the gravity of the situation.
        KerbinSrfLandedLaunchPad* = #CSS_gravityScan_KerbinSrfLandedLaunchPad_00 // The sensor gets burned to a crisp from the rocket exhaust, and is useless now.
        KerbinSrfLandedMissionControl* = #CSS_gravityScan_KerbinSrfLandedMissionControl_00 // The operators here think that the universe revolves around them, but your gravity readings indicate otherwise.
        KerbinSrfLandedR&D* = #CSS_gravityScan_KerbinSrfLandedR&D_00 // The graviolis feel very much at home here, surrounded by kerbals that care about them.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_gravityScan_KerbinSrfLandedR&DCentralBuilding_00 // You feel like a rockstar with your gravioli detector here.
        KerbinSrfLandedR&DCornerLab* = #CSS_gravityScan_KerbinSrfLandedR&DCornerLab_00 // You don't really care about the gravioli experiment here. You just like how cool it makes you look to take readings.
        KerbinSrfLandedR&DMainBuilding* = #CSS_gravityScan_KerbinSrfLandedR&DMainBuilding_00 // You have to fight off hordes of R&D techs trying to disassemble your gravioli detector to see how it works.
        KerbinSrfLandedR&DObservatory* = #CSS_gravityScan_KerbinSrfLandedR&DObservatory_00 // This is the perfect spot to observe graviolis, and your measurement indicates: nominal. Now that was disappointing.
        KerbinSrfLandedR&DSideLab* = #CSS_gravityScan_KerbinSrfLandedR&DSideLab_00 // Confused as to which side this lab is on, the graviolis don't know whether to read positive or negative.
        KerbinSrfLandedR&DSmallLab* = #CSS_gravityScan_KerbinSrfLandedR&DSmallLab_00 // The graviolis feel cramped in here, and register a higher reading than normal.
        KerbinSrfLandedR&DTanks* = #CSS_gravityScan_KerbinSrfLandedR&DTanks_00 // The graviolis seem confused with all the tanks around. We should try this experiment somewhere else.
        KerbinSrfLandedR&DWindTunnel* = #CSS_gravityScan_KerbinSrfLandedR&DWindTunnel_00 // The instrument gets blown away and rolls down the tarmac before you can take an accurate reading.
        KerbinSrfLandedRunway* = #CSS_gravityScan_KerbinSrfLandedRunway_00 // You are too busy dodging taxiing planes to get an accurate reading.
        KerbinSrfLandedSPH* = #CSS_gravityScan_KerbinSrfLandedSPH_00 // The gravity here seems normal. Snack time!!
        KerbinSrfLandedSPHMainBuilding* = #CSS_gravityScan_KerbinSrfLandedSPHMainBuilding_00 // Despite the ongoing debate, the gravity here seems the same as at the VAB.
        KerbinSrfLandedSPHRoundTank* = #CSS_gravityScan_KerbinSrfLandedSPHRoundTank_00 // The graviolis seem too busy doing circles in the tank to pay attention to the task at hand.
        KerbinSrfLandedSPHTanks* = #CSS_gravityScan_KerbinSrfLandedSPHTanks_00 // The graviolis seem confused with all the tanks around. We should try this experiment somewhere else.
        KerbinSrfLandedSPHWaterTower* = #CSS_gravityScan_KerbinSrfLandedSPHWaterTower_00 // The gravity sensor defers to the barometer on this one.
        KerbinSrfLandedTrackingStation* = #CSS_gravityScan_KerbinSrfLandedTrackingStation_00 // The graviolis seem to be strangely attracted to the tracking station. You are disappointed in them.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_gravityScan_KerbinSrfLandedTrackingStationDishEast_00 // Graviolioliolioliolioliolioli. Sorry, the scanner seems to have gotten stuck with the interference from the dish.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_gravityScan_KerbinSrfLandedTrackingStationDishNorth_00 // The graviolis bounce back and forth between the dishes, completely disinterested in your measurement.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_gravityScan_KerbinSrfLandedTrackingStationDishSouth_00 // The graviolis bounce back and forth between the dishes, completely disinterested in your measurement.
        KerbinSrfLandedTrackingStationHub* = #CSS_gravityScan_KerbinSrfLandedTrackingStationHub_00 // The graviolis are drawn into the tracking station like a giant vacuum. You always thought this place sucked.
        KerbinSrfLandedVAB* = #CSS_gravityScan_KerbinSrfLandedVAB_00 // The graviolis stare in awe at the construction going on inside.
        KerbinSrfLandedVABMainBuilding* = #CSS_gravityScan_KerbinSrfLandedVABMainBuilding_00 // Despite the ongoing debate, the gravity here seems the same as at the SPH.
        KerbinSrfLandedVABPodMemorial* = #CSS_gravityScan_KerbinSrfLandedVABPodMemorial_00 // You take in the gravity of the situation. It is definitely more intense here.
        KerbinSrfLandedVABRoundTank* = #CSS_gravityScan_KerbinSrfLandedVABRoundTank_00 // The graviolis are having too much fun doing circles in the tank to pay attention to the task at hand.
        KerbinSrfLandedVABSouthComplex* = #CSS_gravityScan_KerbinSrfLandedVABSouthComplex_00 // Some of the graviolis sneak out to stow away on board the parts inside the building.
        KerbinSrfLandedVABTanks* = #CSS_gravityScan_KerbinSrfLandedVABTanks_00 // The graviolis seem confused with all the tanks around. We should try this experiment somewhere else.
        KerbinSrfLandedIslandAirfield* = #CSS_gravityScan_KerbinSrfLandedIslandAirfield_00 // The graviolis are laid back here, after they realise there's no flights around.
        KerbinSrfLandedWoomerang* = #CSS_gravityScan_KerbinSrfLandedWoomerang_00 // The gravimeter is so well calibrated you can follow the foundation piles far deeper into the ground than you expected them to run.
        KerbinInSpaceLowKSC* = #CSS_gravityScan_KerbinInSpaceLowKSC_00 // The graviolis appear happy to finally be escaping Kerbin's gravitational well.
        KerbinInSpaceHighKSC* = #CSS_gravityScan_KerbinInSpaceHighKSC_00 // The graviolis look concerned that they may not be able to interact much at this altitude.

        KerbinSrfLandedWater* = #CSS_gravityScan_KerbinSrfLandedWater_00 // The graviolis aren't too sure about this wet stuff, but they report that everything else seems in order.
        KerbinSrfLandedWater* = #CSS_gravityScan_KerbinSrfLandedWater_01 // The graviolis are soaking wet, but they report nominal gravity.
        KerbinSrfLandedGrasslands* = #CSS_gravityScan_KerbinSrfLandedGrasslands_00 // The graviolis seem strangely attracted to the grass. There aren't more of them, but they seem more content here.
        KerbinSrfLandedGrasslands* = #CSS_gravityScan_KerbinSrfLandedGrasslands_01 // The grass doesn't seem to be too bothered by gravity. Look at them, swaying in the wind and such.
        KerbinSrfLandedGrasslands* = #CSS_gravityScan_KerbinSrfLandedGrasslands_02 // Huh, the gravity here is exactly the same as at Jeb's house. Who'd have guessed.
        KerbinSrfLandedHighlands* = #CSS_gravityScan_KerbinSrfLandedHighlands_00 // The graviolis seem very weak here. Maybe it has something to to with the high altitude.
        KerbinSrfLandedHighlands* = #CSS_gravityScan_KerbinSrfLandedHighlands_01 // The graviolis react differently as you pass over certain hills and valleys.
        KerbinSrfLandedShores* = #CSS_gravityScan_KerbinSrfLandedShores_00 // The graviolis throw themselves a beach party. You're not invited.
        KerbinSrfLandedShores* = #CSS_gravityScan_KerbinSrfLandedShores_01 // You are distracted by all the swimsuit-clad Kerbals around you, but manage to take a reading of the local gravity and sign a few autographs as well.
        KerbinSrfLandedMountains* = #CSS_gravityScan_KerbinSrfLandedMountains_00 // On solid ground you are able to detect the faint anomalies in the gravitational field caused by the mountain you are standing on. The guys back at KSC will be excited!
        KerbinSrfLandedMountains* = #CSS_gravityScan_KerbinSrfLandedMountains_01 // You can tell that the gravity is still on by the fact that you're standing on a mountain instead of floating in outer space.
        KerbinSrfLandedDeserts* = #CSS_gravityScan_KerbinSrfLandedDeserts_00 // You look around at some dried bones scattered on the ground, and feel the tug of Kerbin's gravitational field pulling you to the earth. Or maybe that is just your imagination. Time for some snacks!
        KerbinSrfLandedDeserts* = #CSS_gravityScan_KerbinSrfLandedDeserts_01 // You splash juice over the gravity scanner. It was probably pretty thirsty.
        KerbinSrfLandedBadlands* = #CSS_gravityScan_KerbinSrfLandedBadlands_00 // The gravity here is just...gravity. The scientists said it would somehow be 'bad' gravity. Wish we were paid like them for being wrong, rather than exploding in a giant crashing fireball.
        KerbinSrfLandedBadlands* = #CSS_gravityScan_KerbinSrfLandedBadlands_01 // Yep, looks like the same gravity you find anywhere else on Kerbin. Seems that gravity isn't too impressed by the so-called 'Badlands'.
        KerbinSrfLandedBadlands* = #CSS_gravityScan_KerbinSrfLandedBadlands_02 // Gravity doesn't care that you're in the Badlands. Gravity knows how to treat everything right.
        KerbinSrfLandedTundra* = #CSS_gravityScan_KerbinSrfLandedTundra_00 // You wonder how much bigger the bears and wolves would be without this gravity. Thanks gravity!
        KerbinSrfLandedTundra* = #CSS_gravityScan_KerbinSrfLandedTundra_01 // The gravity here seems to be stunted, just like everything else in this bleak landscape.
