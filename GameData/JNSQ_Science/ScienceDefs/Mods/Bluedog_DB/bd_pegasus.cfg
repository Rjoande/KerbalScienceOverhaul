@EXPERIMENT_DEFINITION:HAS[#id[bd_pegasus]]
{
    %RESULTS
    {
        MohoInSpaceLow* = #JNSQscience_bd_pegasus_MohoInSpaceLow_00 // The counter rattles nonstop.
        MohoInSpaceLow* = #JNSQscience_bd_pegasus_MohoInSpaceLow_01 // Impact energies spike so often that Mission Control starts pricing "reinforced everything" in the next budget.
        MohoInSpaceHigh* = #JNSQscience_bd_pegasus_MohoInSpaceHigh_00 // The impacts thin out, but each ping still sounds fast, Moho's orbit makes tiny rocks mean.
        MohoInSpaceHigh* = #JNSQscience_bd_pegasus_MohoInSpaceHigh_01 // Most hits come from the sunward side; you add "do not open any windows" to the checklist.

        EveInSpaceLow* = #JNSQscience_bd_pegasus_EveInSpaceLow_00 // The thick purple soup below seems to eat the small stuff; the impact rate dips whenever you skim too close.
        EveInSpaceLow* = #JNSQscience_bd_pegasus_EveInSpaceLow_01 // A sudden burst of hits makes everyone quietly check the staging diagram.
        EveInSpaceHigh* = #JNSQscience_bd_pegasus_EveInSpaceHigh_00 // Steady pings roll in, like Eve is sweeping the neighborhood clean and tossing the leftovers around.
        EveInSpaceHigh* = #JNSQscience_bd_pegasus_EveInSpaceHigh_01 // Several impacts arrive at odd angles; the scientists argue whether the atmosphere is "flicking" dust into space.

        GillyInSpaceLow* = #JNSQscience_bd_pegasus_GillyInSpaceLow_00 // Almost no hits, until a gentle flurry suggests you just flew through Gilly's personal crumb cloud.
        GillyInSpaceLow* = #JNSQscience_bd_pegasus_GillyInSpaceLow_01 // The detector records slow, soft impacts. Congratulations, you've discovered "micro-boulders".
        GillyInSpaceHigh* = #JNSQscience_bd_pegasus_GillyInSpaceHigh_00 // Long stretches of silence punctuated by single taps; even micrometeoroids seem to miss Gilly.
        GillyInSpaceHigh* = #JNSQscience_bd_pegasus_GillyInSpaceHigh_01 // A small cluster of impacts follows a course correction. Someone notes "check for loose snacks" in the margins.

        DunaInSpaceLow* = #JNSQscience_bd_pegasus_DunaInSpaceLow_00 // The detector pings steadily. Duna’s thin air isn’t much of a shield, but it does seem to herd dust into odd lanes.
        DunaInSpaceLow* = #JNSQscience_bd_pegasus_DunaInSpaceLow_01 // A brief burst of impacts lines up with a ground track over bright terrain. Someone suggests “sand, but in orbit.”
        DunaInSpaceHigh* = #JNSQscience_bd_pegasus_DunaInSpaceHigh_00 // Impacts arrive in sparse, fast little clusters, like you’re skimming the edges of a long, invisible debris stream.
        DunaInSpaceHigh* = #JNSQscience_bd_pegasus_DunaInSpaceHigh_01 // The counter stays mostly calm until a single sharp hit makes the whole capsule suddenly feel very small.

        IkeInSpaceLow* = #JNSQscience_bd_pegasus_IkeInSpaceLow_00 // The readings jump whenever you pass over rough, broken ground. Ike appears to be gently shedding gravel into space.
        IkeInSpaceLow* = #JNSQscience_bd_pegasus_IkeInSpaceLow_01 // A string of soft, slow impacts suggests you’ve flown through a thin halo of crumbs that refuses to settle down.
        IkeInSpaceHigh* = #JNSQscience_bd_pegasus_IkeInSpaceHigh_00 // Impacts are rare out here, until you cross Ike’s orbital path and catch a few wanderers that missed the moon entirely.
        IkeInSpaceHigh* = #JNSQscience_bd_pegasus_IkeInSpaceHigh_01 // The instrument records long silence, then a tidy pattern of taps as if the moon is sweeping its own orbit.

        EdnaInSpaceLow* = #JNSQscience_bd_pegasus_EdnaInSpaceLow_00 // The micrometeoroid rate is higher than you’d like. The local belt feels less “lonely” when it’s trying to sandpaper your ship.
        EdnaInSpaceLow* = #JNSQscience_bd_pegasus_EdnaInSpaceLow_01 // Most impacts are tiny and frequent, more like flying through dark grit than open space.
        EdnaInSpaceHigh* = #JNSQscience_bd_pegasus_EdnaInSpaceHigh_00 // Fewer hits, but the ones you get are energetic. Whatever’s out here has had a long time to get up to speed.
        EdnaInSpaceHigh* = #JNSQscience_bd_pegasus_EdnaInSpaceHigh_01 // The detector registers occasional sharp pings from nowhere in particular. Space remains committed to being unhelpful.

        DakInSpaceLow* = #JNSQscience_bd_pegasus_DakInSpaceLow_00 // The instrument logs a flurry of gentle impacts. You may be orbiting a potato, but the potato is shedding flakes.
        DakInSpaceLow* = #JNSQscience_bd_pegasus_DakInSpaceLow_01 // Several impacts come in suspiciously slow. Either Dak has a dust halo, or someone spilled snacks near the sensor.
        DakInSpaceHigh* = #JNSQscience_bd_pegasus_DakInSpaceHigh_00 // Almost nothing, then a single clunk. Mission Control labels it “mysterious potato shrapnel” and moves on.
        DakInSpaceHigh* = #JNSQscience_bd_pegasus_DakInSpaceHigh_01 // The hits are sporadic and oddly timed, as if Dak is quietly tossing pebbles whenever you aren’t looking.

        DresInSpaceLow* = #JNSQscience_bd_pegasus_DresInSpaceLow_00 // The detector clicks more than expected for such a quiet-looking world. Dres may be hiding more than just its reputation.
        DresInSpaceLow* = #JNSQscience_bd_pegasus_DresInSpaceLow_01 // A narrow band of impacts repeats every orbit. You mark it as “possible debris lane” and underline it twice.
        DresInSpaceHigh* = #JNSQscience_bd_pegasus_DresInSpaceHigh_00 // Out here, the impacts come as solitary, impatient knocks, like the universe checking if you’re still paying attention.
        DresInSpaceHigh* = #JNSQscience_bd_pegasus_DresInSpaceHigh_01 // The count drops off sharply with altitude, but the occasional fast particle still reminds you why shields exist.

        JoolInSpaceLow* = #JNSQscience_bd_pegasus_JoolInSpaceLow_00 // The impact counter chatters and then abruptly goes quiet as the electronics reconsider their life choices near Jool.
        JoolInSpaceLow* = #JNSQscience_bd_pegasus_JoolInSpaceLow_01 // Impacts come in sharp, fast bursts, like you’re crossing invisible lanes of grit trapped in the giant’s grasp.
        JoolInSpaceHigh* = #JNSQscience_bd_pegasus_JoolInSpaceHigh_00 // The detector calms down at altitude, but the occasional hit arrives with enough enthusiasm to make everyone flinch.
        JoolInSpaceHigh* = #JNSQscience_bd_pegasus_JoolInSpaceHigh_01 // You log fewer impacts overall, apparently even micrometeoroids prefer not to linger out here for long.

        LaytheInSpaceLow* = #JNSQscience_bd_pegasus_LaytheInSpaceLow_00 // A steady sprinkle of tiny impacts suggests Laythe’s neighborhood is full of very enthusiastic dust.
        LaytheInSpaceLow* = #JNSQscience_bd_pegasus_LaytheInSpaceLow_01 // Several taps line up with a low pass; someone notes “aerobrake first, sandblast later.”
        LaytheInSpaceHigh* = #JNSQscience_bd_pegasus_LaytheInSpaceHigh_00 // The impact rate drops off, leaving only the occasional ping to keep you from getting comfortable.
        LaytheInSpaceHigh* = #JNSQscience_bd_pegasus_LaytheInSpaceHigh_01 // A few slow, soft hits feel more like drifting flakes than proper space rocks.

        VallInSpaceLow* = #JNSQscience_bd_pegasus_VallInSpaceLow_00 // The sensor records faint, rapid ticks, ice grains, dust, or some uninvited “snow” in orbit.
        VallInSpaceLow* = #JNSQscience_bd_pegasus_VallInSpaceLow_01 // Impacts arrive in clusters that repeat each orbit, like Vall is shedding crumbs along a well-worn track.
        VallInSpaceHigh* = #JNSQscience_bd_pegasus_VallInSpaceHigh_00 // Most of the time it’s quiet; when it isn’t, the impacts sound brittle, like tiny shards.
        VallInSpaceHigh* = #JNSQscience_bd_pegasus_VallInSpaceHigh_01 // The detector logs rare but energetic hits, cold doesn’t make space any gentler.

        TyloInSpaceLow* = #JNSQscience_bd_pegasus_TyloInSpaceLow_00 // Impacts are frequent and sharp, as if Tylo is flinging ejecta upward just to prove a point.
        TyloInSpaceLow* = #JNSQscience_bd_pegasus_TyloInSpaceLow_01 // A long streak of pings makes the crew double-check that the ship isn’t secretly falling apart.
        TyloInSpaceHigh* = #JNSQscience_bd_pegasus_TyloInSpaceHigh_00 // Higher up, the taps become infrequent, but each one seems to be moving very, very fast.
        TyloInSpaceHigh* = #JNSQscience_bd_pegasus_TyloInSpaceHigh_01 // The instrument shows neat, repeating gaps in the data, Tylo’s orbit feels “swept,” not safe.

        BopInSpaceLow* = #JNSQscience_bd_pegasus_BopInSpaceLow_00 // The detector alternates between silence and sudden rattles, like you’re drifting through Bop’s personal junk drawer.
        BopInSpaceLow* = #JNSQscience_bd_pegasus_BopInSpaceLow_01 // Several impacts register as unusually slow. You label them “floating gravel” and move on.
        BopInSpaceHigh* = #JNSQscience_bd_pegasus_BopInSpaceHigh_00 // Sparse impacts, odd angles, and no clear pattern, classic Bop.
        BopInSpaceHigh* = #JNSQscience_bd_pegasus_BopInSpaceHigh_01 // One lonely clunk breaks the monotony and reminds you that “empty space” is marketing.

        PolInSpaceLow* = #JNSQscience_bd_pegasus_PolInSpaceLow_00 // A fine, persistent patter suggests Pol is constantly leaking dust into the void.
        PolInSpaceLow* = #JNSQscience_bd_pegasus_PolInSpaceLow_01 // The impacts are so gentle they feel like static, until a denser patch makes the counter sing.
        PolInSpaceHigh* = #JNSQscience_bd_pegasus_PolInSpaceHigh_00 // The hit rate thins out, but the few particles that do arrive still find the sensor with irritating accuracy.
        PolInSpaceHigh* = #JNSQscience_bd_pegasus_PolInSpaceHigh_01 // You get long, peaceful stretches punctuated by tiny taps, like Pol is waving from far below with grains of fluff.

        LindorInSpaceLow* = #JNSQscience_bd_pegasus_LindorInSpaceLow_00 // The detector chatters in uneven bursts, as if Lindor’s invisible fields are herding dust into tidy little ambushes.
        LindorInSpaceLow* = #JNSQscience_bd_pegasus_LindorInSpaceLow_01 // Impacts arrive with surprising energy; you mark the data as “please don’t park here for long.”
        LindorInSpaceHigh* = #JNSQscience_bd_pegasus_LindorInSpaceHigh_00 // The hit rate drops, but the occasional ping still comes in hot, far out, nothing slows down.
        LindorInSpaceHigh* = #JNSQscience_bd_pegasus_LindorInSpaceHigh_01 // A faint, repeating pattern suggests a broad debris lane circling Lindor like a warning label.

        KrelInSpaceLow* = #JNSQscience_bd_pegasus_KrelInSpaceLow_00 // Sparse taps, then a sudden rattle, Krel’s orbit feels quiet right up until it isn’t.
        KrelInSpaceLow* = #JNSQscience_bd_pegasus_KrelInSpaceLow_01 // Several hits arrive from the same direction over and over, like you’re crossing a very old, very stubborn stream of grit.
        KrelInSpaceHigh* = #JNSQscience_bd_pegasus_KrelInSpaceHigh_00 // Long silence broken by single sharp knocks; the micrometeoroid environment here is mostly patience-testing.
        KrelInSpaceHigh* = #JNSQscience_bd_pegasus_KrelInSpaceHigh_01 // The detector logs a few fast particles with no warning whatsoever, which is apparently the theme.

        AdenInSpaceLow* = #JNSQscience_bd_pegasus_AdenInSpaceLow_00 // The counter ticks steadily, like Aden is surrounded by a thin halo of wandering crumbs.
        AdenInSpaceLow* = #JNSQscience_bd_pegasus_AdenInSpaceLow_01 // A brief spike in impacts matches a recent maneuver. Someone quietly circles “check for loose panels.”
        AdenInSpaceHigh* = #JNSQscience_bd_pegasus_AdenInSpaceHigh_00 // Out here, impacts are rare but emphatic, each one sounds like a reminder, not a measurement.
        AdenInSpaceHigh* = #JNSQscience_bd_pegasus_AdenInSpaceHigh_01 // The data suggests a broad, diffuse debris field; not dense enough to see, just dense enough to notice.

        HuygenInSpaceLow* = #JNSQscience_bd_pegasus_HuygenInSpaceLow_00 // The impact rate dips suspiciously low, Huygen’s thick air seems to swallow the smallest stuff before it reaches you.
        HuygenInSpaceLow* = #JNSQscience_bd_pegasus_HuygenInSpaceLow_01 // A soft patter turns into silence as you climb; whatever you were hitting down low wasn’t eager to follow.
        HuygenInSpaceHigh* = #JNSQscience_bd_pegasus_HuygenInSpaceHigh_00 // The detector returns to normal, logging crisp little pings from high-speed dust.
        HuygenInSpaceHigh* = #JNSQscience_bd_pegasus_HuygenInSpaceHigh_01 // Occasional clusters arrive in neat packets, like you’re intersecting the edge of a long, thin stream.

        RigaInSpaceLow* = #JNSQscience_bd_pegasus_RigaInSpaceLow_00 // A fine, constant tick suggests Riga’s neighborhood is full of tiny, persistent particles.
        RigaInSpaceLow* = #JNSQscience_bd_pegasus_RigaInSpaceLow_01 // Impacts come in gentle waves that repeat each orbit; you tag the band for future “don’t linger” planning.
        RigaInSpaceHigh* = #JNSQscience_bd_pegasus_RigaInSpaceHigh_00 // The counter relaxes, but the few hits you do get arrive fast and clean.
        RigaInSpaceHigh* = #JNSQscience_bd_pegasus_RigaInSpaceHigh_01 // A handful of impacts show oddly similar energies, hinting at a common source that’s been grinding itself down for ages.

        TalosInSpaceLow* = #JNSQscience_bd_pegasus_TalosInSpaceLow_00 // The detector alternates between nothing and sudden flurries, like Talos is dragging a ragged trail behind it.
        TalosInSpaceLow* = #JNSQscience_bd_pegasus_TalosInSpaceLow_01 // Several impacts register as slow and soft, more drifting grit than proper space rock.
        TalosInSpaceHigh* = #JNSQscience_bd_pegasus_TalosInSpaceHigh_00 // Mostly quiet, with occasional sharp pings that sound far too confident for such an empty place.
        TalosInSpaceHigh* = #JNSQscience_bd_pegasus_TalosInSpaceHigh_01 // A lonely hit lands dead-center on the sensor, as if the universe is still keeping score.

        EelooInSpaceLow* = #JNSQscience_bd_pegasus_EelooInSpaceLow_00 // The detector mostly sits in silence, then ticks in brief flurries, like you’re brushing through a thin veil of icy grit.
        EelooInSpaceLow* = #JNSQscience_bd_pegasus_EelooInSpaceLow_01 // A few impacts are sharp enough to make the crew glance at the hull, even though everything is “probably fine”.
        EelooInSpaceHigh* = #JNSQscience_bd_pegasus_EelooInSpaceHigh_00 // Fewer hits out here, but the ones that arrive come in fast, cold, old particles with nothing left to slow them down.
        EelooInSpaceHigh* = #JNSQscience_bd_pegasus_EelooInSpaceHigh_01 // The counter stays calm for ages, then delivers one crisp ping as if to prove it still works.

        CelesInSpaceLow* = #JNSQscience_bd_pegasus_CelesInSpaceLow_00 // A steady sprinkle of tiny impacts suggests Celes keeps a faint halo of dust close, like a moon-sized breadcrumb trail.
        CelesInSpaceLow* = #JNSQscience_bd_pegasus_CelesInSpaceLow_01 // The impacts sound oddly “soft” on the readout, fine particles, not proper rocks.
        CelesInSpaceHigh* = #JNSQscience_bd_pegasus_CelesInSpaceHigh_00 // The hit rate drops off quickly with altitude; whatever Celes is surrounded by prefers to stay near home.
        CelesInSpaceHigh* = #JNSQscience_bd_pegasus_CelesInSpaceHigh_01 // You log a few isolated pings and an overwhelming amount of empty space.

        TamInSpaceLow* = #JNSQscience_bd_pegasus_TamInSpaceLow_00 // The detector rattles in irregular bursts, like Tam is a loose pile that can’t stop shedding crumbs.
        TamInSpaceLow* = #JNSQscience_bd_pegasus_TamInSpaceLow_01 // Several hits come in slow and gentle, more drifting gravel than micrometeorites.
        TamInSpaceHigh* = #JNSQscience_bd_pegasus_TamInSpaceHigh_00 // Out here it’s quiet, then suddenly noisy, then quiet again, crossing Tam’s orbit feels like stepping over scattered debris.
        TamInSpaceHigh* = #JNSQscience_bd_pegasus_TamInSpaceHigh_01 // One emphatic clunk arrives without warning, and Mission Control politely asks if anything “fell off.”

        HamekInSpaceLow* = #JNSQscience_bd_pegasus_HamekInSpaceLow_00 // The counter ticks steadily, as if Hamek’s neighborhood is full of fine dust that refuses to settle anywhere.
        HamekInSpaceLow* = #JNSQscience_bd_pegasus_HamekInSpaceLow_01 // A repeating band of impacts shows up every orbit; you tag it as a “do not loiter” lane.
        HamekInSpaceHigh* = #JNSQscience_bd_pegasus_HamekInSpaceHigh_00 // The impacts become rare but energetic, when something hits out here, it really commits.
        HamekInSpaceHigh* = #JNSQscience_bd_pegasus_HamekInSpaceHigh_01 // Long stretches of nothing, then a neat little cluster of pings, like you clipped the edge of an invisible stream.

        NaraInSpaceLow* = #JNSQscience_bd_pegasus_NaraInSpaceLow_00 // The detector ticks like you’re flying through stirred-up ice grit. Nara’s gravity is clearly doing the stirring.
        NaraInSpaceLow* = #JNSQscience_bd_pegasus_NaraInSpaceLow_01 // A steady peppering of tiny impacts suggests a busy neighborhood, “empty” space here is mostly a suggestion.
        NaraInSpaceHigh* = #JNSQscience_bd_pegasus_NaraInSpaceHigh_00 // The count drops off, but each hit arrives fast, like old particles that have had a long time to get angry.
        NaraInSpaceHigh* = #JNSQscience_bd_pegasus_NaraInSpaceHigh_01 // Long quiet stretches break into brief bursts, as if you’re crossing the edges of invisible debris streams.

        AmosInSpaceLow* = #JNSQscience_bd_pegasus_AmosInSpaceLow_00 // A faint, persistent patter shows up near Amos, like the moon is dragging a thin ribbon of dust along its orbit.
        AmosInSpaceLow* = #JNSQscience_bd_pegasus_AmosInSpaceLow_01 // Several impacts register as unusually gentle. Congratulations, you’ve discovered “micromoon crumbs.”
        AmosInSpaceHigh* = #JNSQscience_bd_pegasus_AmosInSpaceHigh_00 // The taps become rare and tidy, as if most of the loose stuff prefers to stay close to Amos.
        AmosInSpaceHigh* = #JNSQscience_bd_pegasus_AmosInSpaceHigh_01 // One sharp ping interrupts the silence and reminds you that “nothing” still has mass.

        EnonInSpaceLow* = #JNSQscience_bd_pegasus_EnonInSpaceLow_00 // The sensor records brittle little hits that look suspiciously like ice grains on the readout.
        EnonInSpaceLow* = #JNSQscience_bd_pegasus_EnonInSpaceLow_01 // A repeating band of impacts lines up with your ground track. Enon seems to come with its own faint debris lane.
        EnonInSpaceHigh* = #JNSQscience_bd_pegasus_EnonInSpaceHigh_00 // Out here, the impacts thin to occasional single knocks, mostly system leftovers passing through.
        EnonInSpaceHigh* = #JNSQscience_bd_pegasus_EnonInSpaceHigh_01 // A few particles hit with surprising energy for such a quiet place. The Nara system does not waste speed.

        PraxInSpaceLow* = #JNSQscience_bd_pegasus_PraxInSpaceLow_00 // The detector rattles in short flurries, like Prax is followed by a loose halo of grit that can’t quite let go.
        PraxInSpaceLow* = #JNSQscience_bd_pegasus_PraxInSpaceLow_01 // Impacts arrive from odd angles with no pattern. “Frontier conditions” is apparently a scientific term.
        PraxInSpaceHigh* = #JNSQscience_bd_pegasus_PraxInSpaceHigh_00 // The environment looks almost empty until a small cluster of pings shows you clipped the edge of a wandering stream.
        PraxInSpaceHigh* = #JNSQscience_bd_pegasus_PraxInSpaceHigh_01 // Long silence, then a single emphatic hit, space still keeps receipts, even out here.
    }
}
