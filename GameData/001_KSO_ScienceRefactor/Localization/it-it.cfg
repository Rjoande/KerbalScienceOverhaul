        #ScienceRefactor_bd_magScan_KerbinSrfLandedLaunchPad_00 = Il magnetometro è correttamente calibrato e registra il campo magnetico di Kerbin al livello della superficie.
        #ScienceRefactor_bd_magScan_KerbinSrfLanded_00 = Il magnetometro registra una lettura accurata del campo magnetico superficiale di Kerbin.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedIceCaps_00 = Le linee del campo magnetico vicino al polo sono quasi direttamente verticali rispetto alla superficie, indicando che i poli magnetici di Kerbin sono strettamente allineati con quelli geografici.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedMountains_00 = Un campo magnetico intenso suggerisce che potresti essere incappato in una delle mitiche “montagne magnetiche” di Kerbin.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedBadlands_00 = In quest'area vengono rilevati forti campi magnetici locali, suggerendo elevate concentrazioni di elementi magneticamente attivi.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedRunway_00 = Per qualche motivo le linee del campo magnetico cambiano continuamente direzione; è quasi come se qualcuno stesse correndo in cerchio attorno alla pista con un gigantesco magnete.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedFlagPole_00 = Il magnetometro fornisce una discreta approssimazione di questo pennone; non resta che scalarlo e issare una bandiera.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedTrackingStation_00 = Le enormi antenne radio schermano il campo magnetico naturale di Kerbin.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedVAB_00 = Non avrebbe avuto più senso prendere le misure dal'EAV prima del lancio?
        #ScienceRefactor_bd_magScan_KerbinSrfLandedVABMainBuilding_00 = Ora, è davvero necessario?
        #ScienceRefactor_bd_magScan_KerbinSrfLandedR&D_00 = Forse qualcun altro dovrebbe occuparsi delle misurazioni al centro R&S…
        #ScienceRefactor_bd_magScan_KerbinSrfLandedR&DTanks_00 = Ok, davvero, andiamo in un posto interessante per prendere letture del magnetometro…
        #ScienceRefactor_bd_magScan_KerbinSrfLandedAdministration_00 = Puntare questo magnetometro verso l'edificio dell'Amministrazione potrebbe non rendere felici i capi.
        #ScienceRefactor_bd_magScan_KerbinSrfLandedAstronautComplex_00 = Quegli astronauti si stanno davvero perdendo questa grande avventura…
        #ScienceRefactor_bd_magScan_KerbinSrfLandedSPH_00 = I controllori della torre non sono per niente divertiti…
        #ScienceRefactor_bd_magScan_KerbinSrfLandedSPHRoundTank_00 = Non hai proprio niente di meglio da fare?
        #ScienceRefactor_bd_magScan_KerbinSrfLandedMissionControl_00 = Il Controllo Missione conferma che si tratta effettivamente di una perdita di tempo.
        #ScienceRefactor_bd_magScan_MunInSpaceHigh_00 = Un debole campo magnetico indica che il Mun potrebbe aver avuto in passato un nucleo di ferro fuso.
        #ScienceRefactor_bd_magScan_MunInSpaceLow_00 = Vengono rilevati campi magnetici localizzati sopra diverse regioni della superficie del Mun.
        #ScienceRefactor_bd_magScan_MunSrfLanded_00 = Sulla superficie del Mun viene rilevato un campo magnetico molto debole.
        #ScienceRefactor_bd_magScan_MunSrfLandedNorthernBasin_00 = In questa regione viene rilevato un debole campo magnetico. L'assenza di grandi crateri nelle vicinanze suggerisce che questa magnetizzazione crostale sia un residuo dell'antico nucleo fuso del Mun.
        #ScienceRefactor_bd_magScan_MunSrfLandedPolarCrater_00 = Alla base del cratere vengono rilevati forti campi magnetici, probabilmente dovuti a ejecta magneticamente allineati prodotti da un grande impattatore.
        #ScienceRefactor_bd_magScan_MunSrfLandedHighlandCraters_00 = Nelle regioni più profonde di questo cratere viene rilevato un forte campo magnetico.
        #ScienceRefactor_bd_magScan_MunSrfLandedEastFarsideCrater_00 = In questo cratere viene rilevato un campo magnetico intenso, forse originato dal materiale del meteorite che ha colpito l'area.
        #ScienceRefactor_bd_magScan_MunSrfLandedPoles_00 = L'intensità del campo magnetico rimane ai livelli di base per la superficie del Mun, indicando che nel suo nucleo non avviene più alcuna attività di geodinamo.
        #ScienceRefactor_bd_magScan_MinmusInSpace_00 = Il gelato congelato non emette un campo magnetico, sciocco.
        #ScienceRefactor_bd_magScan_MinmusSrfLanded_00 = Uno studio più approfondito rivela che Minmus non genera effettivamente alcun campo magnetico.
        #ScienceRefactor_bd_magScan_MinmusSrfLandedGreaterFlats_00 = Anche la superficie congelata dall'aspetto mentolato di Minmus è magneticamente morta.
        #ScienceRefactor_bd_magScan_MinmusSrfLandedLesserFlats_00 = La lettura è piatta, proprio come la superficie ghiacciata.
        #ScienceRefactor_bd_magScan_SunInSpaceLow_00 = I sensori sono in sovraccarico… oh cielo, credo che il braccio stia fondendo.
        #ScienceRefactor_bd_magScan_SunInSpaceHigh_00 = L'enorme magnetosfera di Kerbol si estende ben oltre l'orbita di Eeloo, influenzando tutti i pianeti del sistema solare.
        #ScienceRefactor_bd_magScan_MohoInSpace_00 = Le scansioni indicano solo un debole campo magnetico indotto, probabilmente causato dal flusso di particelle cariche del vento solare che scorre attorno a Moho.
        #ScienceRefactor_bd_magScan_MohoSrfLanded_00 = I bassi livelli di campo magnetico in superficie riflettono l'assenza di una magnetosfera generata internamente su Moho.
        #ScienceRefactor_bd_magScan_EveInSpaceLow_00 = Campi magnetici intensi mandano quasi in sovraccarico i sensori.
        #ScienceRefactor_bd_magScan_EveInSpaceHigh_00 = Un forte campo magnetico garantisce che l'atmosfera di Eve rimanga protetta dalla radiazione di Kerbol.
        #ScienceRefactor_bd_magScan_EveSrfLanded_00 = Il magnetismo in superficie è leggermente inferiore rispetto a quello misurato in orbita; la potente corrente ad anello di Eve potrebbe schermare parzialmente la superficie dal campo magnetico.
        #ScienceRefactor_bd_magScan_GillyInSpace_00 = Gilly sembra essere poco più di un ammasso di rocce tenute insieme alla meglio, senza alcun campo magnetico rilevabile.
        #ScienceRefactor_bd_magScan_GillySrfLanded_00 = Sulla superficie di Gilly non viene rilevato alcun campo magnetico.
        #ScienceRefactor_bd_magScan_DunaInSpaceLow_00 = Alcune zone isolate dell'atmosfera di Duna sembrano essere protette da piccole magnetosfere.
        #ScienceRefactor_bd_magScan_DunaInSpaceHigh_00 = Un campo magnetico estremamente debole indica che il nucleo di Duna si è solidificato molto tempo fa, permettendo alla sua atmosfera di essere in gran parte spazzata via e lasciando la superficie esposta a un'intensa radiazione solare.
        #ScienceRefactor_bd_magScan_DunaSrfLanded_00 = Le linee del campo magnetico in superficie suggeriscono la presenza di diverse piccole ma potenti anomalie magnetiche.
        #ScienceRefactor_bd_magScan_IkeInSpace_00 = Freddo, morto, privo di vita, nessuna lettura di interesse qui.
        #ScienceRefactor_bd_magScan_IkeSrfLanded_00 = Ike risulta magneticamente noioso in superficie tanto quanto lo era visto dall'orbita.
        #ScienceRefactor_bd_magScan_DresInSpace_00 = Chi viene mai su Dres?
        #ScienceRefactor_bd_magScan_DresSrfLanded_00 = Ti aspettavi forse qualcosa di diverso sulla superficie?
        #ScienceRefactor_bd_magScan_JoolInSpaceLow_00 = Il forte campo magnetico di Jool intrappola fasce di radiazione molto potenti; si raccomanda cautela nelle orbite basse. Le condizioni potrebbero rivelarsi pericolose per veicoli con equipaggio.
        #ScienceRefactor_bd_magScan_JoolInSpaceHigh_00 = L'enorme magnetosfera di Jool si estende ben oltre l'orbita di tutte le sue lune in ogni direzione.
        #ScienceRefactor_bd_magScan_LaytheInSpace_00 = Laythe genera un proprio campo magnetico, indicando un nucleo fuso e una geologia attiva. Il campo è fortemente influenzato dalla magnetosfera molto più grande di Jool.
        #ScienceRefactor_bd_magScan_LaytheSrfLanded_00 = Su Laythe viene rilevato un campo magnetico in superficie, con linee che indicano poli magnetici situati molto lontano da quelli geografici.
        #ScienceRefactor_bd_magScan_VallInSpaceHigh_00 = Qui è rilevabile solo il campo magnetico di Jool, suggerendo che Vall non possieda alcuna attività di geodinamo.
        #ScienceRefactor_bd_magScan_VallInSpaceLow_00 = In orbita bassa attorno a Vall viene rilevato un campo magnetico molto debole, forse dovuto ai misteriosi oceani liquidi sotto la superficie.
        #ScienceRefactor_bd_magScan_VallSrfLanded_00 = Vengono rilevati deboli campi magnetici in superficie, probabilmente causati dal flusso d'acqua sotterraneo.
        #ScienceRefactor_bd_magScan_TyloInSpace_00 = Tylo non sembra generare un proprio campo magnetico, ma distorce fortemente quello di Jool, indicando un'alta concentrazione di elementi densi e magnetici.
        #ScienceRefactor_bd_magScan_TyloSrfLanded_00 = Vengono rilevati forti campi magnetici in superficie, ma con scarsa coerenza nella direzione.
        #ScienceRefactor_bd_magScan_BopInSpaceHigh_00 = Bop produce una magnetosfera incredibilmente potente; sono necessari ulteriori studi approfonditi…
        #ScienceRefactor_bd_magScan_BopInSpaceLow_00 = Il campo magnetico di Bop appare molto irregolare, localizzato principalmente nella regione polare nord; sono necessari ulteriori studi…
        #ScienceRefactor_bd_magScan_BopSrfLanded_00 = Tutte le linee del campo magnetico puntano verso nord, indicando una piccola ma estremamente potente sorgente di magnetismo da qualche parte vicino al polo nord.
        #ScienceRefactor_bd_magScan_PolInSpace_00 = Come un granello di polline trasportato dal vento magnetico di Jool.
        #ScienceRefactor_bd_magScan_PolSrfLanded_00 = Sulla superficie di Pol è rilevabile solo il campo magnetico di Jool.
        #ScienceRefactor_bd_magScan_EelooInSpace_00 = Eeloo appare freddo e privo di vita. Da qui è rilevabile solo il debole campo magnetico di Kerbol.
        #ScienceRefactor_bd_magScan_EelooSrfLanded_00 = Sulla superficie di Eeloo non viene rilevato alcun campo magnetico significativo.
        #ScienceRefactor_bd_magScan_AsteroidInSpaceLow_00 = Attorno a questo asteroide viene rilevato solo il campo magnetico di fondo.
        #ScienceRefactor_bd_magScan_AsteroidInSpaceLow_01 = Vengono rilevati deboli segnali magnetici attorno a questo asteroide, suggerendo un elevato contenuto metallico.
        #ScienceRefactor_bd_magScan_AsteroidInSpaceLow_02 = Un debole campo magnetico emanato dall'asteroide perturba il campo della magnetosfera circostante.
        #ScienceRefactor_bd_magScan_AsteroidSrfLanded_00 = Nei pressi della superficie di questo asteroide viene rilevato un campo magnetico debole ma stabile.
        #ScienceRefactor_bd_magScan_AsteroidSrfLanded_01 = Fluttuazioni magnetiche localizzate suggeriscono una composizione interna complessa di questo asteroide.
        #ScienceRefactor_bd_magScan_AsteroidSrfLandedSType_00 = Questo asteroide non genera alcun campo magnetico rilevabile, indicando una presenza nulla o trascurabile di ferro.
        #ScienceRefactor_bd_magScan_AsteroidSrfLandedBType_00 = Alcuni segnali magnetici molto deboli e di breve durata suggeriscono la presenza di materiali elettricamente conduttivi in questo asteroide.
        #ScienceRefactor_bd_magScan_AsteroidSrfLandedCType_00 = Da questo asteroide viene rilevato solo un segnale magnetico estremamente debole, suggerendo basse concentrazioni di ferro e nichel.
        #ScienceRefactor_bd_magScan_AsteroidSrfLandedEType_00 = Dalla superficie di questo asteroide viene rilevato un campo magnetico relativamente forte, indicando una composizione prevalentemente metallica.
        #ScienceRefactor_bd_magScan_AsteroidSrfLandedMType_00 = Questo asteroide genera un campo magnetico significativo, suggerendo che si tratti di un oggetto metallico di tipo M, ricco di composti di ferro e nichel.

        // bd_mapping
        #ScienceRefactor_bd_mapping_default_00 = Scatti una foto di qualunque cosa il telescopio stia osservando. Noti qualcosa di sospetto?
        #ScienceRefactor_bd_mapping_SunInSpaceHigh_00 = È molto luminoso ed estremamente bello. Kerbol, la stella che mantiene in vita la civiltà kerbal…
        #ScienceRefactor_bd_mapping_SunInSpaceLow_00 = La luce proveniente da Kerbol ha reso l'immagine completamente bianca! Sei fortunato a non aver danneggiato la fotocamera…
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowGrasslands_00 = Le praterie coprono gran parte della superficie di Kerbin e sono il luogo in cui vive la maggior parte dei kerbal. La superficie è ricoperta di fattorie e qualche città.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowShores_00 = L'acqua vicino alle coste ha una tonalità di blu più chiara dove diventa meno profonda. Se potessi ingrandire di più forse riusciresti a scorgere qualche kerbal che si gode una giornata in spiaggia.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowMountains_00 = Le vette innevate erano una delle mete preferite dai kerbal più avventurosi. Almeno prima dell'invenzione dei viaggi spaziali.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowHighlands_00 = Le montagne sfumano in terreni più bassi con creste ramificate. Le colline sono striate mentre le valli tagliano diversi strati di roccia.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowDesert_00 = Le sabbie appaiono piatte rispetto al resto del terreno di Kerbin. Sulla superficie si notano strani cerchi che il comando ti assicura essere fattorie.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowWater_00 = La superficie dell'oceano è punteggiata dalle scie delle navi che attraversano le acque di Kerbin.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowBadlands_00 = La superficie appare rocciosa e difficile da attraversare. Confermi che le badlands sono effettivamente pessime.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowTundra_00 = Individui alcune basi militari krussiane nella neve. L'agenzia governativa che ti ha affidato l'incarico sarà soddisfatta.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowIceCaps_00 = La luce solare riflessa dalla neve sovraccarica la fotocamera.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowNorthernIceShelf_00 = Le Relazioni Pubbliche dicono al pubblico che hai avvistato il Gift Kracken, ma non è vero.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLowSouthernIceShelf_00 = Qui non c'è molto altro se non una vasta e piatta distesa di ghiaccio.
        #ScienceRefactor_bd_mapping_KerbinInSpaceLow_00 = Chi avrebbe mai pensato che l'agenzia spaziale stesse spiando tutti questi krussiani?
        #ScienceRefactor_bd_mapping_MunInSpaceLow_00 = La superficie grigia e craterizzata di questa immagine può rendere chiunque filosofico sull'unicità della propria esistenza.
        #ScienceRefactor_bd_mapping_MunInSpaceLow_01 = Le pianure vulcaniche più scure, le montagne, le colline e le valli ricordano tutte Kerbin. Si capisce perché gli astronomi dell'Era Proot pensassero che Mun fosse un altro mondo, con abitanti simili a noi.
        #ScienceRefactor_bd_mapping_MunInSpaceLow_02 = Vedi delle rocce. O forse erano rover? O basi? A questa distanza è difficile dirlo. Ma puoi dire che erano grandi. Non si vede nulla all'interno.
        #ScienceRefactor_bd_mapping_MunInSpaceLow_03 = Ora che sei più vicino alla luna, vedi che i crateri hanno devastato la superficie. Ma questa immagine mostra prove di basi mun nemiche?
        #ScienceRefactor_bd_mapping_MunInSpaceLowMidlands_00 = Le piccole pianure forse ignee sono costellate di piccoli crateri e rocce.
        #ScienceRefactor_bd_mapping_MunInSpaceLowMidlands_01 = Sono visibili ejecta chiari attorno ad alcuni crateri e non roccia ignea scura, quindi ora possiamo dimostrare in modo assoluto e definitivo che anche i più piccoli sono crateri da impatto.
        #ScienceRefactor_bd_mapping_MunInSpaceLowMidlands_02 = Qui ci sono molte rocce, o almeno pensiamo siano rocce. A questa distanza è difficile capire se siano naturali o artificiali, come un rover o qualcosa del genere.
        #ScienceRefactor_bd_mapping_MunInSpaceLowMidlandCraters_00 = Questa area delle midlands presenta un'alta concentrazione di crateri grandi, piccoli e di ogni dimensione intermedia. Almeno ora ne abbiamo una mappa completa.
        #ScienceRefactor_bd_mapping_MunInSpaceLowHighlands_00 = Le highlands hanno un aspetto leggermente più chiaro e la frequenza di crateri nei crateri suggerisce che possano contenere alcune delle rocce più antiche del sistema di Kerbin. La loro forma generale ricorda colline e montagne di Kerbin.
        #ScienceRefactor_bd_mapping_MunInSpaceLowHighlandCraters_00 = I grandi crateri, apparentemente erosi da eoni di impatti meteoritici e vento solare, mostrano molte prove della loro antica età e, per estensione, di quella del resto delle highlands.
        #ScienceRefactor_bd_mapping_MunInSpaceLowCanyons_00 = Questi grandi canyon, probabilmente formati dalla stessa forza degli impatti che hanno creato i grandi crateri a cui sono collegati, ricordano vagamente rover che si riversano in oceani o laghi. Nessuna prova di basi nemiche, purtroppo.
        #ScienceRefactor_bd_mapping_MunInSpaceLowNorthernBasin_00 = L'osservazione dei dettagli nella scansione visiva può indicare che questo bacino si sia formato quando la lava è risalita dopo l'impatto di un grande asteroide.
        #ScienceRefactor_bd_mapping_MunInSpaceLowEastCrater_00 = Nonostante la sua prominenza quando visto dalla superficie di Kerbin, queste osservazioni ravvicinate confermano che si tratta semplicemente di un cratere, niente di speciale. I primi astronomi pensavano fosse un lago prosciugato.
        #ScienceRefactor_bd_mapping_MunInSpaceLowNorthwestCrater_00 = Questo cratere appare eroso, come se le sue pareti si fossero sgretolate in modo irregolare dopo la formazione. Attenzione a possibili rocce friabili.
        #ScienceRefactor_bd_mapping_MunInSpaceLowSouthwestCrater_00 = Come l'East Crater, questo è un cratere da impatto del tutto ordinario. La superficie interna è occupata da rocce sparse e crateri più piccoli.
        #ScienceRefactor_bd_mapping_MunInSpaceLowFarsideCrater_00 = Mai visto prima da Kerbin, questo cratere sembra un po' più giovane degli altri grandi crateri, con ejecta ancora debolmente visibili.
        #ScienceRefactor_bd_mapping_MunInSpaceLowTwinCraters_00 = I due crateri sono sorprendentemente simili nonostante possano essere separati da milioni di anni di età. La breve trincea o canyon che li collega si è probabilmente formata con quello più giovane e più grande.
        #ScienceRefactor_bd_mapping_MunInSpaceLowEastFarsideCrater_00 = Pur non essendo mai stato visto prima dall'alto con tanto dettaglio, appare stranamente familiare. Kerbin incombe appena sopra l'orizzonte, lì a ricordare il blocco mareale del Mun e il lato lontano in arrivo, mai visto prima da occhi kerbal.
        #ScienceRefactor_bd_mapping_MunInSpaceLowPolarCrater_00 = Questo è un grande cratere, il più grande sul Mun. Deboli riflessi di luce nell'ombra del bordo del cratere potrebbero indicare la presenza di depositi di ghiaccio d'acqua! Per il resto si vedono solo rocce. Siamo certi che quei riflessi non fossero missioni sul Mun, né nostre né dei kervieti.
        #ScienceRefactor_bd_mapping_MunInSpaceLowPoles_00 = Le regioni polari. Non brillanti come i poli di Kerbin, il che significa che, pur essendo piuttosto noiose, le nostre fotocamere possono rivelare più dettagli qui che ai poli di Kerbin. Alcune aree elevate ricevono luce solare tutto l'anno, ma fanno ombra alle pianure polari dove in certi punti è buio permanente. Il gradiente di temperatura sarebbe interessante, ma questo è uno strumento ottico, non a infrarossi.
        #ScienceRefactor_bd_mapping_MunInSpaceLowPolarLowlands_00 = I crateri permanentemente in ombra potrebbero contenere ghiaccio d'acqua, forse in concentrazioni sufficienti per un futuro sfruttamento. Kerbol resta fisso sull'orizzonte e nelle parti più basse potrebbe non essere mai stato visto nella storia del Mun. Un ottimo nascondiglio.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowFlats_00 = Le vaste pianure sembrano incredibilmente lisce, anche da vicino. Cosa sono? Crateri riempiti di materiale vulcanico, come le lowlands del Mun? Distese saline formate da laghi un tempo mantenuti caldi dal calore della formazione celeste? O gelato alla menta lasciato lì per kerbal affamati?
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowGreaterFlats_00 = Le pianure più grandi di Minmus evocano immagini di gelato alla menta o ghiaccio tritato, con la superficie lucida e ghiacciata che scintilla alla luce del Sole. Chiudi il diaframma prima che la luce intensa sovraccarichi la fotocamera.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowHighlands_00 = Le highlands e le midlands circostanti sono chiaramente rocciose, ma di cosa è fatta la superficie scintillante blu verdognola? Sale? Minerali di ossido di rame? Ghiaccio azzurro? Non lo sapremo mai finché non guarderemo oltre il visibile, cosa che questo strumento purtroppo non può fare.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowHighlands_01 = La planarità degli altipiani delle highlands è notevole, soprattutto considerando che non si trovano al livello medio del “mare” di Minmus. Forse questa era la superficie originaria di Minmus, prima che si formassero le pianure inferiori?
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowGreatFlats_00 = Queste ricordano in parte le calotte polari di Kerbin, oppure distese saline. L'ipotesi del dessert ora sembra meno credibile, ammesso che lo sia mai stata seriamente.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowLesserFlats_00 = Sembrano laghi di ghiaccio incastonati tra le montagne, ricordando a tutti strutture simili su Kerbin e il fatto che, anche a questa distanza, sei ancora sotto l'influenza gravitazionale di casa.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowSlopes_00 = Le pendici ricordano i fianchi delle montagne di Kerbin, il luogo perfetto per costruire un osservatorio. Non ne individuiamo però alcuno.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLowLowlands_00 = Le lowlands ricordano le praterie di Kerbin, con piccole colline e una dolce salita verso le midlands. Sembrano un buon punto per stabilire una base a lungo termine se le pianure si rivelassero lastre di ghiaccio sopra oceani sotterranei. Le missioni future dovrebbero però fare attenzione ai massi.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLow_00 = Osservi in dettaglio le grandi pianure, il colore verde azzurro chiaro e l'aspetto quasi scintillante. Apparenti fratture sulla superficie potrebbero dare credito alla teoria che Minmus sia ricoperto di ghiaccio e che le pianure siano, o siano state, la superficie di oceani interni. L'origine del colore è ancora sconosciuta.
        #ScienceRefactor_bd_mapping_MinmusInSpaceLow_01 = Minmus rivela un terreno vario. Alti altipiani si estendono per chilometri e le pianure sottostanti si estendono ancora di più.
        #ScienceRefactor_bd_mapping_MinmusInSpaceHigh_00 = Da così lontano, Minmus assomiglia a una piccola pallina di gelato alla menta…
        #ScienceRefactor_bd_mapping_MohoInSpaceLow_00 = I crateri sulla superficie di Moho diventano ben visibili. Con un dettaglio enorme, i crateri hanno persino crateri. Questo ti ricorda che sei decisamente troppo vicino…
        #ScienceRefactor_bd_mapping_MohoInSpaceHigh_00 = Moho fluttua lontano, martoriato dai crateri. Quasi riesci a percepire il calore della stella madre, Kerbol…
        #ScienceRefactor_bd_mapping_EveInSpaceLow_00 = Eve ti accoglie con grande entusiasmo mentre le passi accanto, rivelando quanto siano vasti i suoi oceani di Explodium. Ora desideri un ghiacciolo all'uva…
        #ScienceRefactor_bd_mapping_EveInSpaceHigh_00 = Eve scintilla con la sua tonalità viola laggiù sotto di te. O era sopra? Non riesci a ricordarlo…
        #ScienceRefactor_bd_mapping_GillyInSpaceLow_00 = Gilly, un asteroide catturato di colore beige, rivela un terreno estremamente estremo. Una sfocatura nella foto mostra la sua rapida rotazione.
        #ScienceRefactor_bd_mapping_GillyInSpaceHigh_00 = Gilly a malapena assomiglia a un puntino nella foto.
        #ScienceRefactor_bd_mapping_DunaInSpaceLow_00 = Duna presenta una grande varietà di terreni, che vanno da profonde gole a imponenti catene montuose e pianure. Le sue calotte polari sono ampie e dominano i poli.
        #ScienceRefactor_bd_mapping_DunaInSpaceHigh_00 = Il pallido puntino arancione ricorda una palla di ruggine o un cupcake di velluto rosso…
        #ScienceRefactor_bd_mapping_IkeInSpaceLow_00 = Ike mostra chiaramente il suo terreno eroso. Le catene montuose dominano la superficie mentre le pianure appaiono come grandi chiazze scure.
        #ScienceRefactor_bd_mapping_IkeInSpaceHigh_00 = La roccia che chiamiamo Ike è imponente. Da così lontano appare piuttosto densa e con un terreno molto accidentato, più della tua luna.
        #ScienceRefactor_bd_mapping_DresInSpaceLow_00 = Ora che sei più vicino a Dres, inizi a raccogliere prove che non sia un pianeta, ma un pianeta nano che un tempo era un gigantesco asteroide errante.
        #ScienceRefactor_bd_mapping_DresInSpaceHigh_00 = Dres ti ricorda il Mun. Presenta un terreno piuttosto irregolare con una tonalità grigia.
        #ScienceRefactor_bd_mapping_JoolInSpaceLow_00 = La tonalità verde di Jool domina l'immagine con enorme imponenza.
        #ScienceRefactor_bd_mapping_JoolInSpaceHigh_00 = Le numerose lune di Jool si dispongono magnificamente davanti a lei come un balletto di briciole attorno a quella torta al lime che hai appena divorato.
        #ScienceRefactor_bd_mapping_LaytheInSpaceLow_00 = Laythe ha isole, acqua e un'atmosfera. Non saresti sorpreso di trovare microkerbal qui…
        #ScienceRefactor_bd_mapping_LaytheInSpaceHigh_00 = Da qui, Laythe sembra una pallida biglia azzurra.
        #ScienceRefactor_bd_mapping_VallInSpaceLow_00 = Vall presenta pianure blu e catene montuose di azzurro più chiaro che serpeggiano sulla superficie del corpo in ogni direzione.
        #ScienceRefactor_bd_mapping_VallInSpaceHigh_00 = Vall si erge fiero, lontano, come un pallido puntino azzurro.
        #ScienceRefactor_bd_mapping_TyloInSpaceLow_00 = Tylo è gigantesco. È una roccia massiccia grande quanto Kerbin. Le macchie si rivelano essere decine di migliaia di crateri. Tylo mostra una superficie duramente segnata come quella del Mun. Gli scienziati in laboratorio deducono che Tylo possieda effettivamente tracce di cobalto.
        #ScienceRefactor_bd_mapping_TyloInSpaceHigh_00 = Tylo, visto da così lontano, appare maculato. Perché non lo abbiamo chiamato Macchia?
        #ScienceRefactor_bd_mapping_BopInSpaceLow_00 = Bop sembra rivelare un cratere con un bordo bianco, che potrebbe forse essere la prova di una cattura recente in un giovane sistema di Jool.
        #ScienceRefactor_bd_mapping_BopInSpaceHigh_00 = Bop sembra essere un asteroide catturato di colore marrone, non dissimile da Gilly. Forse sono imparentati?
        #ScienceRefactor_bd_mapping_PolInSpaceLow_00 = Pol appare implacabile. Come la sorella Bop, sembra essere un asteroide catturato. Il terreno aspro, frastagliato e sconnesso fa riflettere due volte prima di tentare un atterraggio.
        #ScienceRefactor_bd_mapping_PolInSpaceHigh_00 = Pol, il puntino laggiù, ricorda un granello di polline.
        #ScienceRefactor_bd_mapping_EelooInSpaceLow_00 = Avvicinandoti, Eeloo mostra il suo vero volto, rivelando canyon e gole di ghiaccio.
        #ScienceRefactor_bd_mapping_EelooInSpaceHigh_00 = Eeloo appare estremamente ghiacciato. È rimasto troppo a lungo così lontano da Kerbol.

        // bd_massSpec
        #ScienceRefactor_bd_massSpec_default_00 = Analizzi la composizione dell'atmosfera mentre attraversa lo spettrometro.
        #ScienceRefactor_bd_massSpec_default_01 = Nelle letture sono presenti vari elementi come azoto, carbonio e ossigeno, insieme ad altri elementi in tracce.
        #ScienceRefactor_bd_massSpec_default_02 = Le lievi variazioni nei livelli elementari qui richiederanno un'analisi a più lungo termine, ma almeno hai ottenuto una lettura di base.
        #ScienceRefactor_bd_massSpec_KerbinInSpaceLow_00 = Forti linee di ossigeno e azoto si combinano con letture in traccia di anidride carbonica, ozono, idrogeno e molti altri.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedLaunchPad_00 = In questo punto sono presenti forti linee di ossigeno, metano, idrocarburi complessi e numerose sostanze corrosive e velenose provenienti da perdite di carburante.
        #ScienceRefactor_bd_massSpec_KerbinSrfLanded_00 = All'onnipresente ossigeno e azoto si aggiunge una marcata linea di carbonio.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedIceCaps_00 = Nelle letture sono presenti elevati livelli di acqua. Non sorprende, visto che sei atterrato su un enorme blocco d'acqua…
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedMountains_00 = Metalli di vario tipo compaiono in quantità di traccia, provenienti dai fianchi montuosi esposti e dalle rocce sollevate dagli strati inferiori del pianeta.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedBadlands_00 = In quantità minime compaiono anche piccoli livelli di veri isotopi radioattivi. Potrebbe valere la pena approfondire?
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedRunway_00 = Il pesante inquinamento dovuto a perdite di carburante per jet quasi ostruisce il sensore di aspirazione, rendendo le letture molto difficili.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedFlagPole_00 = È un pennone. Che tipo di vera scienza pensavi potesse offrirti?
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedTrackingStation_00 = Guarda l'antenna satellitare! È fatta di metallo ma lo spettrometro non la rileva… hmm… dagli un calcio!
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedVAB_00 = Questo grande edificio metallico ospita il leggendario Kraken. Lo spettrometro si rifiuta di fornire letture qui, per paura.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedR&D_00 = Vengono rilevati forti livelli di metano e un odore persistente proveniente da tutta la ClOH in decomposizione.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedAdministration_00 = Una complessa forma di ClOH, nota come ClOH-Poli(TiCa), viene rilevata in modo intenso nei pressi di questa area.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedAstronautComplex_00 = Sono presenti alti livelli di neon, ma potrebbero essere dovuti alla gigantesca insegna che pubblicizza il nuovo nightclub di Jeb all'interno del complesso, alterando i risultati.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedSPH_00 = Si dice che l'EAV sia la dimora del Kraken, ma che passi l'estate allo SPH. Anche qui lo spettrometro non funziona.
        #ScienceRefactor_bd_massSpec_KerbinSrfLandedMissionControl_00 = Abbondano le voci secondo cui qui i risultati vengano pagati profumatamente. Ottieni le letture di ClOH più precise di sempre.
        #ScienceRefactor_bd_massSpec_MunInSpaceLow_00 = Particelle di polvere carbonatica e silicatica dalla superficie del Mun appaiono come linee marcate nei risultati a questa altitudine.
        #ScienceRefactor_bd_massSpec_MunSrfLanded_00 = Vari idrossidi, ossidi e nitrati sono rilevabili dietro ai sempre presenti segnali di depositi carbonatici e silicatici.
        #ScienceRefactor_bd_massSpec_MunSrfLandedNorthernBasin_00 = Le rilevazioni di ino e sorosilicati risultano più intense nel bacino rispetto ad altre aree.
        #ScienceRefactor_bd_massSpec_MunSrfLandedPolarCrater_00 = Elevati livelli di iridio residuo dell'impatto sono rilevabili in tutti i campioni provenienti da questo cratere.
        #ScienceRefactor_bd_massSpec_MunSrfLandedHighlandCraters_00 = Le letture isotopiche, combinate con la spettroscopia, mostrano che questa regione è leggermente più giovane rispetto alla maggior parte delle altre.
        #ScienceRefactor_bd_massSpec_MunSrfLandedEastFarsideCrater_00 = In alcune delle regioni più scure del grande cratere vengono rilevate tracce di acqua.
        #ScienceRefactor_bd_massSpec_MunSrfLandedPoles_00 = Sebbene non in quantità schiaccianti, l'acqua è rilevabile nelle letture polari. Sarebbero necessari ulteriori studi per stabilire se queste risorse siano utilizzabili a supporto di una colonia.
        #ScienceRefactor_bd_massSpec_MinmusInSpaceLow_00 = A queste altitudini sono facilmente rilevabili numerosi idrati e alti livelli di acqua.
        #ScienceRefactor_bd_massSpec_MinmusSrfLanded_00 = Come previsto da tempo, sono presenti alti livelli di acqua congelata, azoto e metano, insieme a forti linee saline.
        #ScienceRefactor_bd_massSpec_MinmusSrfLandedGreaterFlats_00 = Le letture di quest'area mostrano che diversi sali principali costituiscono la maggior parte delle linee di salinità presenti nei dati spettroscopici.
        #ScienceRefactor_bd_massSpec_MinmusSrfLandedLesserFlats_00 = Curiosamente, qui la salinità è meno marcata, permettendo di identificare con maggiore precisione le composizioni chimiche in questa zona.
        #ScienceRefactor_bd_massSpec_SunInSpaceLow_00 = Le linee di idrogeno ed elio quasi sovrastano i rivelatori, già instabili a causa degli elevati livelli di calore.
        #ScienceRefactor_bd_massSpec_MohoInSpaceLow_00 = Sembra che i rivelatori abbiano intercettato un soffio di vapore di ferro: qui fa un caldo infernale.
        #ScienceRefactor_bd_massSpec_MohoSrfLanded_00 = Le letture di superficie sono costellate di isotopi depositati dal Sole, ma dietro questi risultati sono presenti alti livelli di carbonati e silicati.
        #ScienceRefactor_bd_massSpec_EveInSpaceLow_00 = Sono presenti livelli ESTREMAMENTE elevati di anidride carbonica, insieme a quantità significative di idrocarburi complessi.
        #ScienceRefactor_bd_massSpec_EveSrfLanded_00 = Una volta filtrata l'anidride carbonica dalle letture, compaiono etano e altri idrocarburi complessi, possibilmente volatili.
        #ScienceRefactor_bd_massSpec_GillyInSpaceLow_00 = Carbonio, ossigeno e anidride carbonica sono tutti presenti nelle letture, insieme ai prevedibili segnali di silicati e carbonati.
        #ScienceRefactor_bd_massSpec_GillySrfLanded_00 = Una volta atterrati, i livelli di carbonio aumentano notevolmente, contribuendo a confermare la teoria che il nucleo di Gilly sia composto in gran parte di carbonio.
        #ScienceRefactor_bd_massSpec_DunaInSpaceLow_00 = I rivelatori individuano bassi livelli di anidride carbonica e tracce di azoto e metano.
        #ScienceRefactor_bd_massSpec_DunaSrfLanded_00 = L'anidride carbonica atmosferica è facilmente rilevabile dalla superficie e ulteriori letture mostrano diversi isotopi inattesi.
        #ScienceRefactor_bd_massSpec_IkeInSpaceLow_00 = Ike è così grande e orbita così vicino a Duna che l'atmosfera di anidride carbonica del pianeta contamina i risultati spettroscopici con rilevazioni di carbonio e ossigeno.
        #ScienceRefactor_bd_massSpec_IkeSrfLanded_00 = Il carbonio molecolare e l'ossigeno sono ancora rilevati in grande quantità, ma le analisi di superficie forniscono dati solidi che i geologi potranno usare per determinare la composizione chimica di Ike.
        #ScienceRefactor_bd_massSpec_DresInSpaceLow_00 = I risultati spettroscopici indicano una grande presenza di polveri silicatiche e carbonatiche attorno al pianeta, probabilmente provenienti dall'anello di asteroidi locale.
        #ScienceRefactor_bd_massSpec_DresSrfLanded_00 = Le scansioni di superficie mostrano che Dres contiene ghiaccio d'acqua diffuso nella sua crosta e suggeriscono che la maggior parte dei crateri del pianeta sia probabilmente il risultato di impatti provenienti dal campo di asteroidi locale.
        #ScienceRefactor_bd_massSpec_JoolInSpaceLow_00 = Sono presenti forti linee di rilevazione di idrogeno ed elio, insieme a numerosi isotopi H/He. Era prevista una discreta quantità di ammoniaca, ma non è stata trovata.
        #ScienceRefactor_bd_massSpec_LaytheInSpaceLow_00 = Erano attesi acqua, ossigeno e vari sali. La presenza di tracce di cloro non lo era.
        #ScienceRefactor_bd_massSpec_LaytheSrfLanded_00 = Le scansioni di superficie confermano che le acque di Laythe hanno un'elevata salinità. I risultati atmosferici mostrano anche ozono e tracce di cloro, rendendo l'atmosfera completamente irrespirabile.
        #ScienceRefactor_bd_massSpec_VallInSpaceLow_00 = Acqua e azoto compaiono entrambi in modo marcato nei risultati degli scanner dall'orbita.
        #ScienceRefactor_bd_massSpec_VallSrfLanded_00 = La composizione chimica dell'acqua in superficie suggerisce la probabile presenza di oceani liquidi sotto gli strati esterni ghiacciati della luna.
        #ScienceRefactor_bd_massSpec_TyloInSpaceLow_00 = Sono presenti tracce molto ridotte di ghiaccio d'acqua, insieme ad alti livelli di polveri silicatiche e carbonatiche nei campioni orbitanti.
        #ScienceRefactor_bd_massSpec_TyloSrfLanded_00 = Si trovano minuscole tracce di acqua insieme ad alti livelli di vari metalli, tra cui nichel e cobalto.
        #ScienceRefactor_bd_massSpec_BopInSpaceLow_00 = La gravità di Bop è così bassa che la regione orbitale è contaminata da idrogeno ed elio provenienti da Jool.
        #ScienceRefactor_bd_massSpec_BopSrfLanded_00 = Le scansioni di superficie rivelano alte concentrazioni sia di carbonio sia di ossido di ferro, conferendo alla luna la sua colorazione scura.
        #ScienceRefactor_bd_massSpec_PolInSpaceLow_00 = Data la sua distanza da Jool, zolfo e fosforo provenienti dalla superficie sono rilevabili dall'orbita.
        #ScienceRefactor_bd_massSpec_PolSrfLanded_00 = Alte concentrazioni di zolfo e composti solforici, insieme a livelli elevati di fosfati, lasciano le teorie sulla formazione di Pol incerte e non confermate.
        #ScienceRefactor_bd_massSpec_EelooInSpaceLow_00 = Le scansioni indicano la presenza di azoto e metano in concentrazioni sufficientemente elevate da rappresentare un'atmosfera estremamente tenue, ma non abbastanza da influenzare una navicella in modo misurabile.
        #ScienceRefactor_bd_massSpec_EelooSrfLanded_00 = Le scansioni spettroscopiche della superficie mostrano alti livelli di ghiaccio d'acqua e di azoto e metano congelati. Indicano inoltre che la superficie viene rinnovata o erosa nel tempo.
        #ScienceRefactor_bd_massSpec_AsteroidInSpaceLow_00 = Tracce di acqua, insieme a composti silicatici e carbonatici, si trovano nella maggior parte degli asteroidi.
        #ScienceRefactor_bd_massSpec_AsteroidSrfLanded_00 = Le scansioni confermano la presenza di minuscole quantità di ghiaccio d'acqua, insieme ad alte concentrazioni di metalli e minerali.

        // bd_microwaveSpec
        #ScienceRefactor_bd_microwaveSpec_default_00 = Misuri la radiazione a microonde riflessa dal corpo sottostante.
