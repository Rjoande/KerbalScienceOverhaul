        #JNSQscience_seismicScan_AmosSrfLandedHighlands_00 = Ritorni rapidi e nitidi implicano affioramenti solidi vicino alla superficie, con solo una leggera spolverata sopra.
        #JNSQscience_seismicScan_AmosSrfLandedHighlands_01 = Compare un picco secco quando una roccia lì vicino si assesta, poi le colline tornano subito al silenzio.
        #JNSQscience_seismicScan_AmosSrfLandedMountains_00 = Una piccola frana traccia un picco drammatico sul grafico. La bassa gravità rende le frane di roccia teatrali.
        #JNSQscience_seismicScan_AmosSrfLandedMountains_01 = Qui le vibrazioni risuonano più a lungo, rimbalzando tra creste fratturate come in un labirinto di echi.
        #JNSQscience_seismicScan_AmosSrfLandedPoles_00 = Tic secchi punteggiano la registrazione mentre la crosta fredda si frattura in piccoli scatti.
        #JNSQscience_seismicScan_AmosSrfLandedPoles_01 = Un impatto lontano produce un ping pulito e una lunga coda vuota, lasciando intuire strati porosi sotto.
        #JNSQscience_seismicScan_EnonSrfLandedLowlands_00 = Il terreno risponde con onde lente e scricchiolanti, come ghiaccio spesso che si sposta sotto il proprio peso.
        #JNSQscience_seismicScan_EnonSrfLandedLowlands_01 = Gli impatti arrivano prima attutiti, poi risuonano puliti dagli strati più profondi e duri.
        #JNSQscience_seismicScan_EnonSrfLandedMidlands_00 = Echi stratificati tornano in gradini ordinati, come se Enon fosse fatto di fogli impilati di materiali diversi.
        #JNSQscience_seismicScan_EnonSrfLandedMidlands_01 = La linea di base resta quieta, interrotta da occasionali schiocchi nitidi di crepe termiche.
        #JNSQscience_seismicScan_EnonSrfLandedHighlands_00 = Riflessi forti tornano in fretta, suggerendo materiale compatto vicino alla superficie nonostante il freddo.
        #JNSQscience_seismicScan_EnonSrfLandedHighlands_01 = Un lieve tremolio corre lungo il tracciato, come una crosta sotto stress che fa piccoli aggiustamenti.
        #JNSQscience_seismicScan_EnonSrfLandedPoles_00 = Il sismometro disegna picchi secchi e fragili, le classiche firme di fratture da freddo intrappolato.
        #JNSQscience_seismicScan_EnonSrfLandedPoles_01 = Impatti lontani arrivano come lunghe risonanze sottili che indugiano, come se il terreno polare fosse un'eccellente fotocamera d'eco.
        #JNSQscience_seismicScan_PraxSrfLandedLowlands_00 = Il tracciato oscilla con un lento assestamento, come se i granelli fini stessero ancora cercando la casa più bassa possibile.
        #JNSQscience_seismicScan_PraxSrfLandedLowlands_01 = Un impatto lontano arriva come un tonfo sordo, subito inghiottito da depositi sciolti.
        #JNSQscience_seismicScan_PraxSrfLandedMidlands_00 = I ritorni tornano un po' sfumati, suggerendo materiale poroso che assorbe le parti più secche di ogni scossa.
        #JNSQscience_seismicScan_PraxSrfLandedMidlands_01 = Occasionali rimbalzi puliti da sotto lasciano intuire uno strato più duro sotto la coperta delle regioni centrali.
        #JNSQscience_seismicScan_PraxSrfLandedHighlands_00 = Gli impatti tornano come ping nitidi con code brevi. Le colline sembrano compatte e affidabili.
        #JNSQscience_seismicScan_PraxSrfLandedHighlands_01 = Un'eco secondaria in ritardo suggerisce una discontinuità sepolta in agguato sotto la superficie.
        #JNSQscience_seismicScan_PraxSrfLandedMountains_00 = L'ago sobbalza al minimo disturbo. I pendii di Prax sembrano desiderosi di riorganizzarsi.
        #JNSQscience_seismicScan_PraxSrfLandedMountains_01 = Echi lunghi e risonanti rimbalzano tra le creste, trasformando piccoli eventi in vibrazioni che restano a lungo.
        #JNSQscience_seismicScan_PraxSrfLandedPoles_00 = Le crepe da freddo tracciano schiocchi improvvisi nella registrazione, poi la quiete torna subito.
        #JNSQscience_seismicScan_PraxSrfLandedPoles_01 = Gli echi arrivano in più strati, lasciando intuire depositi impilati sotto un coperchio duro e congelato.

        // surfaceSample
        #JNSQscience_surfaceSample_MohoSrfLanded_00 = Il campione mostra un insolito assortimento di clasti: frammenti più affilati e densi raggruppati lungo una sottile traccia lineare, con polvere più fine adagiata lungo il pendio. Sembra che un recente scorrimento stia setacciando e rielaborando la regolite in silenzio.
        #JNSQscience_surfaceSample_MohoSrfLanded_01 = Granuli angolari dall'aspetto fresco giacciono sopra fini più antichi, scuriti dallo spazio, come se il terreno fosse stato leggermente "scosso" e azzerato. La distribuzione è coerente con microterremoti intermittenti che disturbano una zona di faglia superficiale.
        #JNSQscience_surfaceSample_MohoSrfLanded_02 = Diversi frammenti presentano sottili superfici di frattura chiare e un alone polveroso di materiale finemente frantumato. Lo etichetti "rinnovamento superficiale a bassa energia" e cerchi di non immaginare il pianeta che lo rifà mentre sei ancora qui sopra.
        #JNSQscience_surfaceSample_MohoSrfLandedExoticCraters_00 = Il campione include perline lucide e frammenti fusi. Qui qualcosa ha fuso la roccia e poi si è dimenticato di rimetterla a posto.
        #JNSQscience_surfaceSample_MohoSrfLandedExoticCraters_01 = Trovi puntini di colore strano tra la regolite che non corrispondono al terreno vicino. Il laboratorio chiede altro "glitter strano".
        #JNSQscience_surfaceSample_MohoSrfLandedRareCraters_00 = Questo campione contiene una quantità sorprendente di granuli densi dall'aspetto metallico. Mission Control chiede subito se vale qualcosa.
        #JNSQscience_surfaceSample_MohoSrfLandedRareCraters_01 = La scansione chimica va in picco su elementi in tracce che altrove sono rari. Etichetti il contenitore "raro" prima che qualcuno possa discutere.
        #JNSQscience_surfaceSample_MohoSrfLandedVoronoiCraters_00 = La regolite si spezza in briciole poligonali ordinate mentre la raccogli. Anche la terra di Moho ama la geometria.
        #JNSQscience_surfaceSample_MohoSrfLandedVoronoiCraters_01 = Il campione è un miscuglio di polvere fine e frammenti a lastra che si spaccano lungo linee dritte. I motivi sembrano inquietantemente organizzati.
        #JNSQscience_surfaceSample_MohoSrfLandedNotableCraters_00 = Raccogli ejecta stratificata: pezzi di fuso scuri, schegge chiare e tanta polvere che sembra completamente traumatizzata.
        #JNSQscience_surfaceSample_MohoSrfLandedNotableCraters_01 = Il campione è l'highlight reel di un cratere in un barattolo. Contiene materiale in profondità, più tutto ciò che è stato polverizzato durante l'uscita.
        #JNSQscience_surfaceSample_MohoSrfLandedPeaks_00 = Stacchi una scheggia frastagliata da roccia di base esposta. È densa, secca, e sembra non aver mai conosciuto misericordia.
        #JNSQscience_surfaceSample_MohoSrfLandedPeaks_01 = Il campione è quasi tutto frammenti taglienti con solo una traccia di polvere. Quassù, a Moho finisce il "suolo" e rimane solo il "bordo".
        #JNSQscience_surfaceSample_EveSrfLandedKrakensWell_00 = Il terreno qui è ricoperto da una crosta viola scivolosa. Il tuo campionatore torna caldo e con un lieve sibilo.
        #JNSQscience_surfaceSample_EveSrfLandedKrakensWell_01 = Il campione sembra normale finché non lo sigilli, poi inizia a frizzare. Mission Control suggerisce di metterlo in doppio sacchetto.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofAkron_00 = Il campione del mare di Akron fa sentire il contenitore più pesante di quanto dovrebbe. Il fluido sembra *gradire* la pressione.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofAkron_01 = Uno spruzzo macchia i tuoi guanti di un allegro viola. La macchia sembra permanente.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofNessus_00 = Sigilli un campione del mare di Nessus: si formano bolle e poi spariscono, come se il liquido stesse respirando.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofNessus_01 = Il misuratore di acidità si arrende subito e si resetta da solo. Lo etichetti "Nessus: no".
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofTaniwha_00 = Il campione del mare di Taniwha fa schiuma se agitato. Cerchi di non agitarlo più.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofTaniwha_01 = Il barattolo si scalda tra le mani, come se il liquido stesse reagendo all'essere contenuto.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofGigan_00 = Il mare di Gigan aderisce al campionatore in spessi veli. La tensione superficiale qui fa gli straordinari.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofGigan_01 = Il fluido viola tinge di rosa la sacca del campione. Non verrà via. Mai.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofRodan_00 = Un campione del mare di Rodan ondeggia come sciroppo e lascia leggere linee di corrosione dove tocca il metallo.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofRodan_01 = Noti un morso chimico pungente e poi ricordi che non dovresti poter sentire odori. Controlli le guarnizioni.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofGojira_00 = Il fluido del mare di Gojira è così denso che il contenitore sembra voler affondare attraverso le tue mani.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofGojira_01 = Mission Control consiglia "non berlo" prima ancora che tu lo chieda. Dici che non avevi intenzione di farlo.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofGhidorah_00 = Tre strumenti non sono affatto d'accordo sul campione del mare di Ghidorah. Lo archivi come "litigio in un barattolo".
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofGhidorah_01 = Il campione frizza, poi si calma, poi frizza di nuovo. Decidi che è meglio non prenderla sul personale.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofBagorah_00 = Il campione del mare di Bagorah sembra ingannevolmente liscio e riflettente. Da vicino, pullula di minuscole bolle.
        #JNSQscience_surfaceSample_EveSrfSplashedSeaofBagorah_01 = Un test rapido dice "non è acqua" con impressionante sicurezza. Lo riponi lontano da qualunque cosa importante. Compreso te.
        #JNSQscience_surfaceSample_KerbinSrfLandedLowlands_00 = La terra è umida, fine, e si compatta nel barattolo con ordine. È quasi come se *volesse* essere studiata.
        #JNSQscience_surfaceSample_KerbinSrfLandedLowlands_01 = Il campione contiene terreno soffice e pezzi di materiale vegetale. Il laboratorio ti chiede di smetterla di "assaggiarlo".
        #JNSQscience_surfaceSample_KerbinSrfLandedAridLowlands_00 = Perlopiù sabbia, con sopra una sottile crosta di minerali essiccati. Il vento ha fatto un lavoro molto accurato.
        #JNSQscience_surfaceSample_KerbinSrfLandedAridLowlands_01 = I granelli sono affilati e secchi, e provano subito a infiltrarsi in ogni guarnizione della tua tuta.
        #JNSQscience_surfaceSample_KerbinSrfLandedAridMountains_00 = Il campione è per lo più pietrisco frantumato, con abbastanza sabbia da essere fastidiosa.
        #JNSQscience_surfaceSample_KerbinSrfLandedAridMountains_01 = La graniglia spinta dal vento ha levigato tutto fino a renderlo liscio.
        #JNSQscience_surfaceSample_KerbinSrfLandedWelcomeBackIsland_00 = Raccogli sabbia vulcanica scura mescolata a frammenti di conchiglie.
        #JNSQscience_surfaceSample_KerbinSrfLandedWelcomeBackIsland_01 = Il campione contiene sale, sabbia e un misterioso pezzo di detrito con scritto "WELCOME BACK". Nessuno ammette di averlo messo lì.
        #JNSQscience_surfaceSample_KerbinSrfSplashedGreatLake_00 = Imbottigli acqua di lago con un morbido strato di limo. Il barattolo si appanna subito per pura umidità.
        #JNSQscience_surfaceSample_KerbinSrfSplashedGreatLake_01 = Il campione ha particelle in sospensione e una lieve tinta verde. Il laboratorio dice che è "probabilmente ok".
        #JNSQscience_surfaceSample_KerbinSrfSplashedInlandWater_00 = Il campione d'acqua arriva con fango fine e minuscoli frammenti di piante. Cerchi di non pensare a cos'altro ci sia dentro.
        #JNSQscience_surfaceSample_KerbinSrfSplashedInlandWater_01 = Recuperi un campione sorprendentemente limpido, poi smuovi il fondo e ti penti di tutto.
        #JNSQscience_surfaceSample_KerbinSrfSplashedKreenwichSea_00 = Raccogli acqua di mare e una spolverata di sabbia.
        #JNSQscience_surfaceSample_KerbinSrfSplashedKreenwichSea_01 = Il campione contiene acqua, schiuma e qualcosa che potrebbe essere alga. Mission Control consiglia i guanti.
        #JNSQscience_surfaceSample_KerbinSrfSplashedArcticSea_00 = L'acqua è gelida e piena di fini cristalli di ghiaccio.
        #JNSQscience_surfaceSample_KerbinSrfSplashedArcticSea_01 = Catturi acqua scura con una fanghiglia chiara in superficie. È bella in quel modo da "non farla cadere".
        #JNSQscience_surfaceSample_KerbinSrfSplashedForemansSea_00 = Imbottigli un campione con sedimento granuloso che si rifiuta di depositarsi.
        #JNSQscience_surfaceSample_KerbinSrfSplashedForemansSea_01 = L'acqua è leggermente torbida e sa di... ti fermi. La scienza richiede autocontrollo.
        #JNSQscience_surfaceSample_KerbinSrfSplashedTriangulusSea_00 = La schiuma superficiale si attacca al campionatore come se fosse pagata a strisciate. Ottieni comunque un campione pulito. Più o meno.
        #JNSQscience_surfaceSample_KerbinSrfSplashedTriangulusSea_01 = L'acqua contiene minuscoli granelli in sospensione e una traccia di sale. Il laboratorio lo definisce "ottimo potenziale da zuppa". Viene corretto.
        #JNSQscience_surfaceSample_KerbinSrfSplashedNorthernSea_00 = L'acqua è fredda e limpida, con frammenti di detrito organico alla deriva. È come se l'oceano stesse buttando rifiuti con educazione.
        #JNSQscience_surfaceSample_KerbinSrfSplashedNorthernSea_01 = Una pellicola sottile in superficie suggerisce attività biologica. L'equipaggio propone di darle un nome. Il laboratorio dice di no.
        #JNSQscience_surfaceSample_KerbinSrfSplashedSub-ArcticSea_00 = Il campione viene su con salamoia fredda e sedimento fine. Sciaborda come se stesse architettando qualcosa.
        #JNSQscience_surfaceSample_KerbinSrfSplashedSub-ArcticSea_01 = Raccogli acqua con una lieve foschia di particelle in sospensione. I sensori insistono che è "ricca di nutrienti".
        #JNSQscience_surfaceSample_KerbinSrfSplashedEasternSea_00 = Un campione di acqua di mare senza sorprese, completo di granelli di sabbia che hanno fatto l'autostop nel contenitore.
        #JNSQscience_surfaceSample_KerbinSrfSplashedEasternSea_01 = Il campione è salato e vivace di minuscoli puntini. Fingi di non notare che si muovono.
        #JNSQscience_surfaceSample_KerbinSrfSplashedWesternSea_00 = Raccogli acqua di mare con una tinta più scura del previsto. Il laboratorio chiede una seconda bottiglia "per ogni evenienza".
        #JNSQscience_surfaceSample_KerbinSrfSplashedWesternSea_01 = Il campione contiene acqua, sale e graniglia microscopica. Il tuo campionatore ora odora di oceano per sempre.
        #JNSQscience_surfaceSample_MunSrfLandedLowlands_00 = Il campione è regolite fine e scura che in bassa gravità si aggruma con riluttanza. È ordinata, secca e per nulla accogliente.
        #JNSQscience_surfaceSample_MunSrfLandedLowlands_01 = Raschi un sottile strato di polvere sopra terreno più duro. I granelli sono affilati e desiderosi di finire ovunque.
        #JNSQscience_surfaceSample_MunSrfLandedMountains_00 = La regolite è sottile e mescolata a schegge di roccia angolari. La gravità ha diviso il pendio in "su" e "giù".
        #JNSQscience_surfaceSample_MunSrfLandedMountains_01 = Metti in sacca una pietra ostinata dalla cresta. Riportarla indietro viene subito riclassificato come "problema del te futuro".
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownBasins_00 = Sotto la patina verde c'è uno strato più scuro, macchiato di marrone. Il tuo barattolo ora contiene "prove" per una delle fazioni del grande dibattito sul colore.
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownBasins_01 = La polvere del bacino è più scura e più pesante di quanto sembri. Gli strumenti insistono che non hai azzerato la bilancia (l'hai fatto).
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownLowlands_00 = Qui i bassopiani scambiano il gelo alla menta per graniglia marrone. Scricchiola ancora, ma ora scricchiola in modo sinistro.
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownLowlands_01 = La paletta tira su granelli scuriti mescolati a ostinati cristalli di ghiaccio. Il campione si rifiuta di sembrare "pulito".
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownMidlands_00 = Il campione è un miscuglio disordinato di brina verdognola e polvere marrone, come se due terreni avessero litigato e trovato un compromesso.
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownMidlands_01 = La stratificazione nel barattolo suggerisce che il terreno continui a cambiare idea. Il laboratorio lo etichetta "composizionalmente indeciso".
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownHighlands_00 = Il riverbero è attenuato quassù: la brina è punteggiata di polvere scura. Il campione sembra leggermente tostato.
        #JNSQscience_surfaceSample_MinmusSrfLandedBrownHighlands_01 = Raccogli ghiaccio granulare e regolite macchiata. Riflette meno luce e più domande.
        #JNSQscience_surfaceSample_DunaSrfLandedRareCraters_00 = La paletta tira su frammenti taglienti e perline vitree. Qualunque cosa abbia colpito qui ha fatto un disastro e si è dimenticata di ripulire.
        #JNSQscience_surfaceSample_DunaSrfLandedRareCraters_01 = Ejecta dall'aspetto fresco sta sopra la solita polvere rossa. La etichetti "rara" prima che il vento la ridipinga.
        #JNSQscience_surfaceSample_DunaSrfLandedVoronoiCraters_00 = La regolite viene su in granuli stranamente uniformi, come se fosse stata prima ordinata in motivi e poi depositata.
        #JNSQscience_surfaceSample_DunaSrfLandedVoronoiCraters_01 = Il campione contiene polvere, schegge angolari e sottili scaglie di crosta che si spezzano lungo linee ordinate.
        #JNSQscience_surfaceSample_DunaSrfLandedNotableCraters_00 = Il campione è un miscuglio di pezzi fusi e roccia frantumata. Il cratere ha gentilmente esposto le "pagine interne" del pianeta.
        #JNSQscience_surfaceSample_DunaSrfLandedNotableCraters_01 = Trovi materiale più scuro tra la polvere rossa, pieno di minuscole inclusioni. Il laboratorio ti chiede di smetterla di chiamarlo "miscela premium da cratere".
        #JNSQscience_surfaceSample_DunaSrfLandedExoticCraters_00 = Il suolo è striato di granelli chiari che spariscono se li scaldi troppo a lungo. Sigilli in fretta il barattolo e fai finta che fosse voluto.
        #JNSQscience_surfaceSample_DunaSrfLandedExoticCraters_01 = Graniglia brinata e regolite scura condividono il contenitore in strati inquieti. Il campione sembra non sapersi decidere se è roccia o ghiaccio.
        #JNSQscience_surfaceSample_DunaSrfLandedMountains_00 = Quassù la regolite è sottile, per lo più schegge di roccia taglienti con appena abbastanza polvere da infilarsi in ogni cucitura della tua tuta.
        #JNSQscience_surfaceSample_DunaSrfLandedMountains_01 = Raccogli un grumo ostinato di terreno granuloso che si rifiuta di comportarsi in bassa gravità. La montagna prova subito a far rotolare il resto a valle.
        #JNSQscience_surfaceSample_DunaSrfLandedVolcano_00 = Il terreno è più scuro e più ruvido della polvere circostante, pieno di piccoli buchi come se un tempo contenesse gas intrappolato. Ne raccogli un pezzo e sembra stranamente "recente".
        #JNSQscience_surfaceSample_DunaSrfLandedVolcano_01 = Il campione contiene frammenti fragili e vitrei mescolati a graniglia rossa. Il laboratorio annota "processi vulcanici", e Mission Control dice "non stuzzicare nulla che sembri attivo".
        #JNSQscience_surfaceSample_IkeSrfLandedMidlands_00 = Torna un semplice prelievo di regolite grigia. È la classica miscela da "giardinaggio di micrometeoriti".
        #JNSQscience_surfaceSample_IkeSrfLandedMidlands_01 = Il campione è polvere fine sopra terreno compattato, con minuscoli puntini vitrei da impatti continui. Ike è stato sabbiato con pazienza.
        #JNSQscience_surfaceSample_IkeSrfLandedLowlands_00 = Il campione dei bassopiani è polvere più profonda e soffice, che sbuffa al minimo tocco.
        #JNSQscience_surfaceSample_IkeSrfLandedLowlands_01 = Trovi granelli più scuri mescolati alla polvere grigia, come se materiale più antico si fosse raccolto qui. Il barattolo sembra più pesante del dovuto.
        #JNSQscience_surfaceSample_IkeSrfLandedHighlands_00 = Il campione è crosta chiara e fratturata dai bordi netti, come se fosse stata spezzata e non si fosse mai rimaneggiata.
        #JNSQscience_surfaceSample_IkeSrfLandedHighlands_01 = Raccogli un miscuglio di frammenti a piastra friabili e polvere granulosa che non corrisponde ai bassopiani. Il laboratorio lo etichetta "sollevato e sospetto".
        #JNSQscience_surfaceSample_EdnaSrfLandedLowlands_00 = Il campione è regolite scura e fine che, mentre la raccogli, fluisce come fumo. Si attacca subito alle pareti del contenitore.
        #JNSQscience_surfaceSample_EdnaSrfLandedLowlands_01 = Raccogli graniglia polverosa con minuscoli riflessi scintillanti. Il laboratorio annota che è "secca, antica e entusiasta dell'elettricità statica".
        #JNSQscience_surfaceSample_EdnaSrfLandedMidlands_00 = La paletta tira su polvere compattata sopra una crosta più dura. Si spezza in lastre secche e nette, come fango essiccato che non ha mai incontrato acqua.
        #JNSQscience_surfaceSample_EdnaSrfLandedMidlands_01 = Il campione è un miscuglio di polvere fine e granelli frastagliati. Ogni cosa dice "consumato nel modo duro".
        #JNSQscience_surfaceSample_EdnaSrfLandedHighlands_00 = Quassù il "suolo" è per lo più frammenti taglienti con una sottile spolverata di fini.
        #JNSQscience_surfaceSample_EdnaSrfLandedHighlands_01 = Stacchi un grumo ostinato di regolite ghiaiosa. In bassa gravità, metà prova a diventare un campione volante.
        #JNSQscience_surfaceSample_EdnaSrfLandedPolarIceCraters_00 = Sotto la polvere scura c'è brina chiara e croccante che svanisce mentre si scalda. Sigilli il barattolo in fretta e fai finta che fosse il piano.
        #JNSQscience_surfaceSample_EdnaSrfLandedPolarIceCraters_01 = Il campione contiene granuli di ghiaccio polveroso mescolati a regolite granulosa. Gli strumenti discutono se sia "ghiaccio" o "polvere volatile con dei sogni".
        #JNSQscience_surfaceSample_EdnaSrfLandedWhites_00 = Il materiale chiaro è polveroso e riflettente, lasciando una patina gessosa sugli attrezzi. Sembra pulito finché non noti che macchia tutto.
        #JNSQscience_surfaceSample_EdnaSrfLandedWhites_01 = Raccogli granelli chiari e friabili che scintillano duramente al sole. Il laboratorio lo etichetta come "probabili sali o brina" e "decisamente disordinato".
        #JNSQscience_surfaceSample_DakSrfLandedLowlands_00 = Raccogli polvere grigia sciolta che si comporta più come un'idea che come un solido. Il barattolo si riempie, poi la polvere prova a fluttuare fuori.
        #JNSQscience_surfaceSample_DakSrfLandedLowlands_01 = Il campione è fine e secco, con minuscoli sassolini mescolati come crostini. Qualcuno in radio lo chiama "condimento per patate".
        #JNSQscience_surfaceSample_DakSrfLandedMidlands_00 = La regolite è una miscela ruvida di polvere e macerie, come se Dak non sapesse scegliere tra "roccia" e "sabbia".
