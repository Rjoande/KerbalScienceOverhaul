@EXPERIMENT_DEFINITION:HAS[#id[gravityScan]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_gravityScan_SunInSpaceLowNorthPolarZone_00 // The Gravioli detector pegs high and twitches as if the star’s mass is flowing under you in long, fast rivers.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_gravityScan_SunInSpaceLowNorthSubpolarZone_00 // Strong gravity with a faint rhythmic wobble. Something below is sloshing around on a schedule it refuses to share.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_gravityScan_SunInSpaceLowNorthTemperateZone_00 // The pull is immense, but uneven—like you’re orbiting a place that can’t decide where it’s keeping its weight.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_gravityScan_SunInSpaceLowNorthTropicZone_00 // The readings surge and dip in quick bursts. The detector suggests the “ground” is busy rearranging itself.
        SunInSpaceLowEquatorialZone* = #JNSQscience_gravityScan_SunInSpaceLowEquatorialZone_00 // Gravity is brutally strong and oddly steady, as if the star spins this belt smooth through sheer stubbornness.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_gravityScan_SunInSpaceLowSouthTropicZone_00 // The instrument records a strong pull and frequent tiny lurches, as though convective currents are bumping the gravity field.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_gravityScan_SunInSpaceLowSouthTemperateZone_00 // You get the expected huge reading—plus a surprising amount of texture, like ripples in something that should be uniform.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_gravityScan_SunInSpaceLowSouthSubpolarZone_00 // The detector keeps finding small gradients that shouldn’t be there. The star politely ignores your expectations.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_gravityScan_SunInSpaceLowSouthPolarZone_00 // The gravity stays high, but the needle jitters with sharp spikes, like an invisible hand is tapping the sensor.
        SunInSpaceHighNorthPolarZone* = #JNSQscience_gravityScan_SunInSpaceHighNorthPolarZone_00 // Far out, the detector shows a gentle pull and a slow drift—interplanetary space is mostly quiet, except for the occasional distant tug.
        SunInSpaceHighNorthSubpolarZone* = #JNSQscience_gravityScan_SunInSpaceHighNorthSubpolarZone_00 // The Gravioli readout is low and smooth. You suspect the nearby planets are doing most of the “interesting” work now.
        SunInSpaceHighNorthTemperateZone* = #JNSQscience_gravityScan_SunInSpaceHighNorthTemperateZone_00 // The instrument reports a modest attraction and long, lazy variations, as if gravity is being negotiated over great distances.
        SunInSpaceHighNorthTropicZone* = #JNSQscience_gravityScan_SunInSpaceHighNorthTropicZone_00 // Readings hover near “small but present.” The detector notes faint perturbations consistent with passing through everyone’s sphere of influence.
        SunInSpaceHighEquatorialZone* = #JNSQscience_gravityScan_SunInSpaceHighEquatorialZone_00 // The pull is mild here, and the biggest changes come from the rest of the system arguing in the background.
        SunInSpaceHighSouthTropicZone* = #JNSQscience_gravityScan_SunInSpaceHighSouthTropicZone_00 // The sensor reports interplanetary calm, punctuated by tiny nudges that feel like planets clearing their throats.
        SunInSpaceHighSouthTemperateZone* = #JNSQscience_gravityScan_SunInSpaceHighSouthTemperateZone_00 // Gravity is low and predictable, which is comforting until you remember what “high space” around a star implies.
        SunInSpaceHighSouthSubpolarZone* = #JNSQscience_gravityScan_SunInSpaceHighSouthSubpolarZone_00 // The detector logs a weak field and a slow oscillation, as though you’re riding the edge of a very large, very polite tug-of-war.
        SunInSpaceHighSouthPolarZone* = #JNSQscience_gravityScan_SunInSpaceHighSouthPolarZone_00 // The reading is small and steady; the only drama comes from distant bodies taking turns pulling on the needle.

        MohoSrfLanded* = #JNSQscience_gravityScan_MohoSrfLanded_00 // A subtle gravity gradient tracks a nearby ridge-and-scarp lineament. The pattern suggests a dense, shallow block that’s still settling into a new stress state.
        MohoInSpaceLow* = #JNSQscience_gravityScan_MohoInSpaceLow_00 // Low-altitude passes reveal a chain of small positive anomalies that line up with fresh-looking scarps. Something dense has been pushed upward or uncovered along the fractures.
        MohoInSpaceLow* = #JNSQscience_gravityScan_MohoInSpaceLow_01 // The gravity map shows gentle “wrinkles” that correlate with ridges rather than craters. It looks like internal readjustment has left measurable mass offsets in the crust.
        MohoInSpaceLow* = #JNSQscience_gravityScan_MohoInSpaceLow_02 // A narrow negative anomaly sits beside a sharp scarp, as if material has dilated or been churned into fluffier regolith during recent slip.
        MohoInSpaceHigh* = #JNSQscience_gravityScan_MohoInSpaceHigh_00 // From high orbit, Moho’s field departs from smooth symmetry in broad lobes. The best fit is a slightly off-center dense interior that’s still relaxing as the planet cools.
        MohoInSpaceHigh* = #JNSQscience_gravityScan_MohoInSpaceHigh_01 // Long-arc tracking hints at low-degree variations aligned with major tectonic trends. The anomalies are weak, but they repeat consistently across multiple orbits.
        MohoInSpaceHigh* = #JNSQscience_gravityScan_MohoInSpaceHigh_02 // The global solution prefers a subtly changing gravity harmonics set. It’s not dramatic—just enough to suggest continuing contraction and slow redistribution of mass.
        MohoSrfLandedPoles* = #JNSQscience_gravityScan_MohoSrfLandedPoles_00 // The gravioli readout suggests the poles are hiding pockets of “missing mass” under the crust.
        MohoSrfLandedPoles* = #JNSQscience_gravityScan_MohoSrfLandedPoles_01 // Gravity here feels slightly wrong, like the planet forgot to finish filling in the corners.
        MohoSrfLandedLowlands* = #JNSQscience_gravityScan_MohoSrfLandedLowlands_00 // The detector perks up: these basins are heavy, deep, and eager to keep anything that falls in them.
        MohoSrfLandedLowlands* = #JNSQscience_gravityScan_MohoSrfLandedLowlands_01 // Local gravity runs a bit high for “just dust and rocks.” Something dense is squatting down there.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_gravityScan_MohoSrfLandedPolarIceCraters_00 // The numbers jump around as if the ground beneath you is full of hollow rings and buried ridges.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_gravityScan_MohoSrfLandedPolarIceCraters_01 // The gravioli signal dips, spikes, then dips again, like the crater walls are hiding secret compartments.
        MohoSrfLandedCraters* = #JNSQscience_gravityScan_MohoSrfLandedCraters_00 // The detector keeps finding small deficits. Craters really are just holes with paperwork.
        MohoSrfLandedCraters* = #JNSQscience_gravityScan_MohoSrfLandedCraters_01 // Gravity anomalies cluster around impacts, as if the surface is stitched together from broken pieces.
        MohoSrfLandedExoticCraters* = #JNSQscience_gravityScan_MohoSrfLandedExoticCraters_00 // The readout swings wider than expected. Either the crater is weird, or the detector is getting heat-drunk.
        MohoSrfLandedExoticCraters* = #JNSQscience_gravityScan_MohoSrfLandedExoticCraters_01 // Something about this impact site makes gravity look lopsided, like the ground was poured in crooked.
        MohoSrfLandedRareCraters* = #JNSQscience_gravityScan_MohoSrfLandedRareCraters_00 // A sharp anomaly suggests an unusually deep cavity, or an unusually dense plug—beneath the crater floor.
        MohoSrfLandedRareCraters* = #JNSQscience_gravityScan_MohoSrfLandedRareCraters_01 // The numbers imply this crater hit something different than “more Moho.” That’s promising. And unsettling.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_gravityScan_MohoSrfLandedVoronoiCraters_00 // The gravimeter draws a repeating pattern of highs and lows, as if the crust was stamped like a waffle.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_gravityScan_MohoSrfLandedVoronoiCraters_01 // Regular, cell-like gravity variations hint at fractured slabs packed together under the surface.
        MohoSrfLandedNotableCraters* = #JNSQscience_gravityScan_MohoSrfLandedNotableCraters_00 // This impact left a signature big enough to bully the rest of the readings into line.
        MohoSrfLandedNotableCraters* = #JNSQscience_gravityScan_MohoSrfLandedNotableCraters_01 // A broad gravity dip suggests the crater excavated a lighter layer, or left a cavernous bruise.
        MohoSrfLandedPeaks* = #JNSQscience_gravityScan_MohoSrfLandedPeaks_00 // The peaks tug harder than they should. Uplifted dense rock makes for very grabby mountains.
        MohoSrfLandedPeaks* = #JNSQscience_gravityScan_MohoSrfLandedPeaks_01 // Gravity jitters near the ridgelines, like the rock below is folded, stacked, and stressed.
        MohoInSpaceLowPoles* = #JNSQscience_gravityScan_MohoInSpaceLowPoles_00 // Low passes over the poles reveal patchy mass deficits, consistent with voids or unusually porous crust.
        MohoInSpaceLowPoles* = #JNSQscience_gravityScan_MohoInSpaceLowPoles_01 // The polar gravity field looks “moth-eaten” in places. Mission Control insists that is not a technical term.
        MohoInSpaceLowLowlands* = #JNSQscience_gravityScan_MohoInSpaceLowLowlands_00 // Each pass over the lowlands shows a persistent gravity high—those basins are loaded with dense material.
        MohoInSpaceLowLowlands* = #JNSQscience_gravityScan_MohoInSpaceLowLowlands_01 // The lowlands pull on the spacecraft like they’re trying to collect souvenirs from orbit.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_gravityScan_MohoInSpaceLowPolarIceCraters_00 // The crater ring region produces alternating spikes and dips, like buried structure arranged in bands.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_gravityScan_MohoInSpaceLowPolarIceCraters_01 // The gravioli map over these polar craters looks noisy, but the noise repeats. That’s the worrying part.
        MohoInSpaceLowHighlands* = #JNSQscience_gravityScan_MohoInSpaceLowHighlands_00 // Over the highlands, the field smooths out. Solid rock, solid data.
        MohoInSpaceLowHighlands* = #JNSQscience_gravityScan_MohoInSpaceLowHighlands_01 // The highlands give a crisp baseline signal. Useful for subtracting out Moho’s general weirdness.
        MohoInSpaceLowMidlands* = #JNSQscience_gravityScan_MohoInSpaceLowMidlands_00 // Subtle gradients suggest layered terrain below, neither as dense as the lows nor as uniform as the highs.
        MohoInSpaceLowMidlands* = #JNSQscience_gravityScan_MohoInSpaceLowMidlands_01 // The midlands show gentle ripples in the field, as if the crust is thickening and thinning in slow waves.
        MohoInSpaceLowCraters* = #JNSQscience_gravityScan_MohoInSpaceLowCraters_00 // Small, frequent anomalies mark the cratered terrain like fingerprints across the map.
        MohoInSpaceLowCraters* = #JNSQscience_gravityScan_MohoInSpaceLowCraters_01 // The detector reports “many little weirds.” The science team calls it “high spatial variability.”
        MohoInSpaceLowExoticCraters* = #JNSQscience_gravityScan_MohoInSpaceLowExoticCraters_00 // These craters stand out with stronger contrasts, implying unusual fill or unusually fractured bedrock.
        MohoInSpaceLowExoticCraters* = #JNSQscience_gravityScan_MohoInSpaceLowExoticCraters_01 // A few passes show odd asymmetry, as if the impact tossed dense stuff to one side.
        MohoInSpaceLowRareCraters* = #JNSQscience_gravityScan_MohoInSpaceLowRareCraters_00 // A distinct anomaly suggests an uncommon subsurface structure beneath this crater group.
        MohoInSpaceLowRareCraters* = #JNSQscience_gravityScan_MohoInSpaceLowRareCraters_01 // One crater produces a clean gravity signature that doesn’t match its shape. That means something is hidden.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_gravityScan_MohoInSpaceLowVoronoiCraters_00 // The field forms a tiled pattern here, regular enough to make the mapping computer suspicious.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_gravityScan_MohoInSpaceLowVoronoiCraters_01 // Repeating gravity cells imply the crust broke into plates and packed itself back together.
        MohoInSpaceLowNotableCraters* = #JNSQscience_gravityScan_MohoInSpaceLowNotableCraters_00 // The big crater’s gravity scar is visible even from this altitude, dominating the local field.
        MohoInSpaceLowNotableCraters* = #JNSQscience_gravityScan_MohoInSpaceLowNotableCraters_01 // Mapping shows a wide mass deficit consistent with deep excavation and lighter material beneath.
        MohoInSpaceLowPeaks* = #JNSQscience_gravityScan_MohoInSpaceLowPeaks_00 // Peaks register as tight gravity highs, suggesting dense uplift and steep subsurface roots.
        MohoInSpaceLowPeaks* = #JNSQscience_gravityScan_MohoInSpaceLowPeaks_01 // The field sharpens around mountains, indicating the peaks are not just tall. They’re heavy.
        MohoInSpaceHighPoles* = #JNSQscience_gravityScan_MohoInSpaceHighPoles_00 // From high orbit, the poles average out as slightly under-dense compared to the rest of Moho.
        MohoInSpaceHighPoles* = #JNSQscience_gravityScan_MohoInSpaceHighPoles_01 // The polar contribution to Moho’s gravity field is uneven, hinting at complex internal structure beneath the caps.
        MohoInSpaceHighLowlands* = #JNSQscience_gravityScan_MohoInSpaceHighLowlands_00 // Broad trends show the lowlands as the heaviest regions, tugging on the spacecraft even at this distance.
        MohoInSpaceHighLowlands* = #JNSQscience_gravityScan_MohoInSpaceHighLowlands_01 // Global mapping confirms: Moho’s basins are gravity wells on top of gravity wells.
        MohoInSpaceHighPolarIceCraters* = #JNSQscience_gravityScan_MohoInSpaceHighPolarIceCraters_00 // The polar crater region reads as a banded disturbance in the field, not strong, but persistent.
        MohoInSpaceHighPolarIceCraters* = #JNSQscience_gravityScan_MohoInSpaceHighPolarIceCraters_01 // Even smeared by altitude, this area keeps a recognizable “ringed” signature.
        MohoInSpaceHighHighlands* = #JNSQscience_gravityScan_MohoInSpaceHighHighlands_00 // The highlands provide a stable average field, useful for calibrating the rest of the survey.
        MohoInSpaceHighHighlands* = #JNSQscience_gravityScan_MohoInSpaceHighHighlands_01 // High orbit smooths the details, but the highlands still look pleasantly predictable.
        MohoInSpaceHighMidlands* = #JNSQscience_gravityScan_MohoInSpaceHighMidlands_00 // The midlands sit between extremes, contributing gentle gradients rather than sharp anomalies.
        MohoInSpaceHighMidlands* = #JNSQscience_gravityScan_MohoInSpaceHighMidlands_01 // A soft, rolling signature suggests thick crust with modest density variations.
        MohoInSpaceHighCraters* = #JNSQscience_gravityScan_MohoInSpaceHighCraters_00 // The crater fields blur into a general roughness in the gravity map, like sandpaper on the numbers.
        MohoInSpaceHighCraters* = #JNSQscience_gravityScan_MohoInSpaceHighCraters_01 // High orbit can’t resolve each impact, but it can confirm there are far too many of them.
        MohoInSpaceHighExoticCraters* = #JNSQscience_gravityScan_MohoInSpaceHighExoticCraters_00 // These craters still show up as outsized distortions, implying they are genuinely unusual, not just dramatic-looking.
        MohoInSpaceHighExoticCraters* = #JNSQscience_gravityScan_MohoInSpaceHighExoticCraters_01 // The survey highlights a few “problem spots” where the gravity field refuses to behave nicely.
        MohoInSpaceHighRareCraters* = #JNSQscience_gravityScan_MohoInSpaceHighRareCraters_00 // A small number of pronounced anomalies survive the averaging—rare craters, rare signals.
        MohoInSpaceHighRareCraters* = #JNSQscience_gravityScan_MohoInSpaceHighRareCraters_01 // The field shows a handful of distinct signatures inconsistent with ordinary impacts.
        MohoInSpaceHighVoronoiCraters* = #JNSQscience_gravityScan_MohoInSpaceHighVoronoiCraters_00 // The repeating pattern fades with altitude, but a faint geometric imprint remains.
        MohoInSpaceHighVoronoiCraters* = #JNSQscience_gravityScan_MohoInSpaceHighVoronoiCraters_01 // The gravity field carries a subtle, regular texture here, as if the crust has a hidden grid.
        MohoInSpaceHighNotableCraters* = #JNSQscience_gravityScan_MohoInSpaceHighNotableCraters_00 // The notable crater region leaves a broad imprint, suggesting large-scale structure below the surface.
        MohoInSpaceHighNotableCraters* = #JNSQscience_gravityScan_MohoInSpaceHighNotableCraters_01 // Even from far up, the field dips over the big impact, like a bruise you can’t unsee.
        MohoInSpaceHighPeaks* = #JNSQscience_gravityScan_MohoInSpaceHighPeaks_00 // Mountain regions average into mild gravity highs, consistent with dense roots under uplifted terrain.
        MohoInSpaceHighPeaks* = #JNSQscience_gravityScan_MohoInSpaceHighPeaks_01 // Peaks contribute a slightly stronger global pull, hinting that Moho’s crust is heavier than it looks.

        EveSrfLandedKrakensWell* = #JNSQscience_gravityScan_EveSrfLandedKrakensWell_00 // The gravimeter insists something massive is missing here. The numbers look like a hole with edges.
        EveSrfLandedKrakensWell* = #JNSQscience_gravityScan_EveSrfLandedKrakensWell_01 // Readings swirl around the rim as if gravity is circling a drain. You decide not to lean any closer.
        EveSrfLandedMountains* = #JNSQscience_gravityScan_EveSrfLandedMountains_00 // The gravioli count climbs steadily across the ridgelines. These mountains must have roots that go far deeper than they look.
        EveSrfLandedMountains* = #JNSQscience_gravityScan_EveSrfLandedMountains_01 // Every step makes the detector complain. Eve's mountains seem bolted to the mantle with an unreasonable amount of rock.
        EveSrfLandedShores* = #JNSQscience_gravityScan_EveSrfLandedShores_00 // The detector jitters between land and sea signatures. The shoreline is a tug-of-war between dense liquid and heavier stone.
        EveSrfLandedShores* = #JNSQscience_gravityScan_EveSrfLandedShores_01 // Gravioli pile up right at the waterline. Either tides move a lot of mass, or the beach is trying to sink.
        EveInSpaceLowKrakensWell* = #JNSQscience_gravityScan_EveInSpaceLowKrakensWell_00 // Low orbit over Krakens Well produces a sharp discontinuity, like the planet forgot to put mass in one spot.
        EveInSpaceLowKrakensWell* = #JNSQscience_gravityScan_EveInSpaceLowKrakensWell_01 // The gravimeter spikes at the rim and drops at the center. It looks like a gravity drain drawn with a ruler.
        EveInSpaceLowMountains* = #JNSQscience_gravityScan_EveInSpaceLowMountains_00 // The gravimeter lights up over the mountain belts. Their deep roots make the surrounding terrain look lightweight by comparison.
        EveInSpaceLowMountains* = #JNSQscience_gravityScan_EveInSpaceLowMountains_01 // From low orbit the ranges form long, linked anomalies, suggesting the highlands are stitched together beneath the crust.
        EveInSpaceLowPetrolLakes* = #JNSQscience_gravityScan_EveInSpaceLowPetrolLakes_00 // The lake basins appear heavier than their surroundings, hinting at dense fill or a thin crust under the surface.
        EveInSpaceLowPetrolLakes* = #JNSQscience_gravityScan_EveInSpaceLowPetrolLakes_01 // The detector sees a shallow ring and a dense center, like the basin is holding something weighty beneath the liquid.
        EveInSpaceLowPolarLakes* = #JNSQscience_gravityScan_EveInSpaceLowPolarLakes_00 // The polar lake basins show up as neat circular disturbances, but their centers look muted compared to a normal crater.
        EveInSpaceLowPolarLakes* = #JNSQscience_gravityScan_EveInSpaceLowPolarLakes_01 // Low orbit reveals a tidy ring anomaly around the lakes, as if the impact scars were patched from below.
        EveInSpaceLowSeaofAkron* = #JNSQscience_gravityScan_EveInSpaceLowSeaofAkron_00 // Low orbit shows strong linear anomalies under the Sea of Akron, consistent with a stretched, rifted basin.
        EveInSpaceLowSeaofAkron* = #JNSQscience_gravityScan_EveInSpaceLowSeaofAkron_01 // The field forms long stripes, like the crust below was pulled apart and left dense scars behind.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_gravityScan_EveInSpaceLowSeaofBagorah_00 // The Sea of Bagorah shows lumpy structure, as if buried ridges run under the basin in uneven bands.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_gravityScan_EveInSpaceLowSeaofBagorah_01 // Several small hotspots dot the scan, making the field look 'grainy' compared to other seas.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_gravityScan_EveInSpaceLowSeaofGhidorah_00 // The Sea of Ghidorah scan looks tangled, with multiple gradients meeting and twisting together.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_gravityScan_EveInSpaceLowSeaofGhidorah_01 // Low orbit reveals three distinct anomaly directions, like separate basins or rifts intersecting under the waves.
        EveInSpaceLowSeaofGigan* = #JNSQscience_gravityScan_EveInSpaceLowSeaofGigan_00 // The Sea of Gigan has a strong, bowl-shaped anomaly. The middle looks heavier, deeper, and more compressed.
        EveInSpaceLowSeaofGigan* = #JNSQscience_gravityScan_EveInSpaceLowSeaofGigan_01 // Steep gradients suggest a deep basin with dense material beneath, like the crust sagged and never recovered.
        EveInSpaceLowSeaofGojira* = #JNSQscience_gravityScan_EveInSpaceLowSeaofGojira_00 // A stubborn hotspot shows up in the Sea of Gojira scan, like a dense patch on the basin floor.
        EveInSpaceLowSeaofGojira* = #JNSQscience_gravityScan_EveInSpaceLowSeaofGojira_01 // The field has one sharp spike that does not match the surrounding smooth basin. You save that data twice.
        EveInSpaceLowSeaofNessus* = #JNSQscience_gravityScan_EveInSpaceLowSeaofNessus_00 // The Sea of Nessus reads smooth and broad, with only gentle variations across the basin floor.
        EveInSpaceLowSeaofNessus* = #JNSQscience_gravityScan_EveInSpaceLowSeaofNessus_01 // Small bumps dot the field like hidden islands or ridges, but nothing dominates the scan.
        EveInSpaceLowSeaofRodan* = #JNSQscience_gravityScan_EveInSpaceLowSeaofRodan_00 // The Sea of Rodan reads mostly uniform, with a clear shelf near the margins and a sharper drop toward the center.
        EveInSpaceLowSeaofRodan* = #JNSQscience_gravityScan_EveInSpaceLowSeaofRodan_01 // A few narrow spikes cut across the scan, hinting at ridges or trenches under the basin floor.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_gravityScan_EveInSpaceLowSeaofTaniwha_00 // The scan shows wandering hotspots over the Sea of Taniwha, as if mass is unevenly distributed under the waves.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_gravityScan_EveInSpaceLowSeaofTaniwha_01 // You record a repeating wobble in the field that tracks along the basin, like a buried feature running beneath the sea.
        EveInSpaceHighKrakensWell* = #JNSQscience_gravityScan_EveInSpaceHighKrakensWell_00 // From high orbit Krakens Well is still a dark notch in the field, too distinct to be a fluke.
        EveInSpaceHighKrakensWell* = #JNSQscience_gravityScan_EveInSpaceHighKrakensWell_01 // The detector keeps returning to the same odd signature as you pass overhead, as if the anomaly is pulling at the orbit itself.
        EveInSpaceHighMountains* = #JNSQscience_gravityScan_EveInSpaceHighMountains_00 // Even from high orbit the needles prefer the big mountain chains. Eve's topography has serious mass behind it.
        EveInSpaceHighMountains* = #JNSQscience_gravityScan_EveInSpaceHighMountains_01 // The mountains leave broad fingerprints in the field, as if the planet keeps its heaviest rocks on display.
        EveInSpaceHighPetrolLakes* = #JNSQscience_gravityScan_EveInSpaceHighPetrolLakes_00 // The petrol lakes barely register from this high up, but when they do the signatures are oddly sharp and compact.
        EveInSpaceHighPetrolLakes* = #JNSQscience_gravityScan_EveInSpaceHighPetrolLakes_01 // The gravimeter picks up brief spikes over the basins, then goes quiet again. Eve keeps its densest secrets small.
        EveInSpaceHighPolarLakes* = #JNSQscience_gravityScan_EveInSpaceHighPolarLakes_00 // From high orbit the lake signatures fade faster than expected, as though something is smoothing the gravity field at depth.
        EveInSpaceHighPolarLakes* = #JNSQscience_gravityScan_EveInSpaceHighPolarLakes_01 // You catch a faint, regular ripple over the polar basins, then lose it in the noise and pretend that was planned.
        EveInSpaceHighSeaofAkron* = #JNSQscience_gravityScan_EveInSpaceHighSeaofAkron_00 // Tantalising hints of a positive anomaly outline the Sea of Akron even from high altitude.
        EveInSpaceHighSeaofAkron* = #JNSQscience_gravityScan_EveInSpaceHighSeaofAkron_01 // The detector keeps drifting back toward the same stripey signature. It is hard to ignore, and harder to explain.
        EveInSpaceHighSeaofBagorah* = #JNSQscience_gravityScan_EveInSpaceHighSeaofBagorah_00 // At high altitude Bagorah becomes a patchy smear of small anomalies rather than one clean basin signature.
        EveInSpaceHighSeaofBagorah* = #JNSQscience_gravityScan_EveInSpaceHighSeaofBagorah_01 // You keep thinking the scan should average out. It does not, and that bothers the analysts.
        EveInSpaceHighSeaofGhidorah* = #JNSQscience_gravityScan_EveInSpaceHighSeaofGhidorah_00 // From high orbit you only catch a faint knot in the field, but it is consistently in the same place.
        EveInSpaceHighSeaofGhidorah* = #JNSQscience_gravityScan_EveInSpaceHighSeaofGhidorah_01 // The gravimeter cannot decide which way to swing, so it tries all of them. Mission Control calls that 'interesting'.
        EveInSpaceHighSeaofGigan* = #JNSQscience_gravityScan_EveInSpaceHighSeaofGigan_00 // Even from high orbit the Gigan basin pulls the needles inward, leaving a broad signature on the readout.
        EveInSpaceHighSeaofGigan* = #JNSQscience_gravityScan_EveInSpaceHighSeaofGigan_01 // The detector agrees this sea is big in every sense, especially the mass-concentration sense.
        EveInSpaceHighSeaofGojira* = #JNSQscience_gravityScan_EveInSpaceHighSeaofGojira_00 // High orbit reduces it to a faint blip, but the Sea of Gojira still refuses to look normal.
        EveInSpaceHighSeaofGojira* = #JNSQscience_gravityScan_EveInSpaceHighSeaofGojira_01 // The detector briefly misbehaves over this sea, then recovers. You log both events and pretend they are unrelated.
        EveInSpaceHighSeaofNessus* = #JNSQscience_gravityScan_EveInSpaceHighSeaofNessus_00 // From high orbit the Nessus basin blends into the haze, leaving only a faint, wide depression in the data.
        EveInSpaceHighSeaofNessus* = #JNSQscience_gravityScan_EveInSpaceHighSeaofNessus_01 // The gravimeter reports 'mostly normal' over a place that looks anything but. You do not trust that phrasing.
        EveInSpaceHighSeaofRodan* = #JNSQscience_gravityScan_EveInSpaceHighSeaofRodan_00 // From high orbit Rodan is a modest anomaly, more defined by its edges than its center.
        EveInSpaceHighSeaofRodan* = #JNSQscience_gravityScan_EveInSpaceHighSeaofRodan_01 // The gravimeter keeps giving you small, polite deviations. On Eve, even polite deviations feel suspicious.
        EveInSpaceHighSeaofTaniwha* = #JNSQscience_gravityScan_EveInSpaceHighSeaofTaniwha_00 // At high altitude the Taniwha region flickers between signal and noise, refusing to look stable.
        EveInSpaceHighSeaofTaniwha* = #JNSQscience_gravityScan_EveInSpaceHighSeaofTaniwha_01 // A faint pattern appears, vanishes, then appears again. You label it 'persistent enough to worry about'.
        EveInSpaceHighShores* = #JNSQscience_gravityScan_EveInSpaceHighShores_00 // At this altitude the shoreline is just a thin seam, but the detector still catches a faint wobble where land meets sea.
        
