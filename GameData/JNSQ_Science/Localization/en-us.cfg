        #JNSQscience_evaReport_TalosInSpaceLowHighlands_00 = The highlands look bruised and ancient from orbit, with scars that refuse to fade.
        #JNSQscience_evaReport_TalosInSpaceLowHighlands_01 = You spin slowly, taking in the highlands below and the emptiness above, and decide neither one is blinking first.
