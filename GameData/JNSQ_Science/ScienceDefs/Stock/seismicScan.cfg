@EXPERIMENT_DEFINITION:HAS[#id[seismicScan]]
{
    %RESULTS
    {
        MohoSrfLanded* = #JNSQscience_seismicScan_MohoSrfLanded_00 // The seismometer logs a faint, repeating tick that slowly drifts in frequency; the best match is episodic fault creep as Moho continues to cool and contract.
        MohoSrfLanded* = #JNSQscience_seismicScan_MohoSrfLanded_01 // A brief cluster of microquakes arrives, then the ground goes quiet again. The waveforms look like a young scarp settling and a thin layer of regolith being disturbed nearby.
        MohoSrfLandedPoles* = #JNSQscience_seismicScan_MohoSrfLandedPoles_00 // The trace jitters with tiny cracks as the surface cycles between blazing sun and bitter shadow.
        MohoSrfLandedPoles* = #JNSQscience_seismicScan_MohoSrfLandedPoles_01 // A long, slow ring suggests brittle crust over something denser. The poles feel like a thin shell.
        MohoSrfLandedHighlands* = #JNSQscience_seismicScan_MohoSrfLandedHighlands_00 // The seismometer is almost bored. The highlands answer impacts with crisp echoes and little else.
        MohoSrfLandedHighlands* = #JNSQscience_seismicScan_MohoSrfLandedHighlands_01 // Strong, fast returns hint at solid bedrock near the surface. It feels ancient and stubbornly still.
        MohoSrfLandedMidlands* = #JNSQscience_seismicScan_MohoSrfLandedMidlands_00 // Gentle tremors rise and fall with the sunlight, as thermal expansion works the crust like a slow wrench.
        MohoSrfLandedMidlands* = #JNSQscience_seismicScan_MohoSrfLandedMidlands_01 // The waveform repeats in a daily rhythm. Moho’s “weather” is heat.
        MohoSrfLandedExoticCraters* = #JNSQscience_seismicScan_MohoSrfLandedExoticCraters_00 // The signal comes back warped and layered, like the crater floor is full of fractures and odd deposits.
        MohoSrfLandedExoticCraters* = #JNSQscience_seismicScan_MohoSrfLandedExoticCraters_01 // Multiple reflections arrive out of order. You label it “complicated geology” and pretend that explains it.
        MohoSrfLandedRareCraters* = #JNSQscience_seismicScan_MohoSrfLandedRareCraters_00 // One sharp spike, then a long, pure ring. The crater walls act like a very serious bell.
        MohoSrfLandedRareCraters* = #JNSQscience_seismicScan_MohoSrfLandedRareCraters_01 // The return suggests a dense slab beneath the dust. Rare, but not quiet.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_seismicScan_MohoSrfLandedVoronoiCraters_00 // Overlapping echoes make the chart look like static. Too many cracks, too many paths.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_seismicScan_MohoSrfLandedVoronoiCraters_01 // The crust here is shattered into repeating cells, and the seismometer hears every boundary.
        MohoSrfLandedNotableCraters* = #JNSQscience_seismicScan_MohoSrfLandedNotableCraters_00 // Clean discontinuities show up in the waveform, as if the crater cut through several distinct layers.
        MohoSrfLandedNotableCraters* = #JNSQscience_seismicScan_MohoSrfLandedNotableCraters_01 // A delayed reflection hints at a buried interface under the floor. You circle it twice.
        MohoSrfLandedPeaks* = #JNSQscience_seismicScan_MohoSrfLandedPeaks_00 // A nearby pebble slide draws a dramatic spike. Peaks are noisy even when they’re “stable.”
        MohoSrfLandedPeaks* = #JNSQscience_seismicScan_MohoSrfLandedPeaks_01 // The baseline chatters with micro-fractures, as if the summit is constantly relieving stress.

        EveSrfLandedKrakensWell* = #JNSQscience_seismicScan_EveSrfLandedKrakensWell_00 // The sensor registers an unsettling, periodic throb that doesn’t match anything you’re doing. You stop moving anyway.
        EveSrfLandedKrakensWell* = #JNSQscience_seismicScan_EveSrfLandedKrakensWell_01 // The echoes come back distorted and late, as if the ground here is riddled with voids or strange layers.
        
        KerbinSrfLandedLowlands* = #JNSQscience_seismicScan_KerbinSrfLandedLowlands_00 // The ground here is a bit squishy. The readout shows slow slumps and tiny slides settling in.
        KerbinSrfLandedLowlands* = #JNSQscience_seismicScan_KerbinSrfLandedLowlands_01 // The sensor keeps catching low, watery vibrations. You pretend you’re not standing on a giant drumhead.
        KerbinSrfLandedAridLowlands* = #JNSQscience_seismicScan_KerbinSrfLandedAridLowlands_00 // The surface pops and ticks as it cools. The seismometer logs it like it’s riveting drama.
        KerbinSrfLandedAridLowlands* = #JNSQscience_seismicScan_KerbinSrfLandedAridLowlands_01 // Fine grains shift in little whispers. The only “quake” is the ground deciding it prefers somewhere else.
        KerbinSrfLandedAridMountains* = #JNSQscience_seismicScan_KerbinSrfLandedAridMountains_00 // The trace looks like scribbles from a nervous intern. Steep slopes make for fidgety ground.
        KerbinSrfLandedAridMountains* = #JNSQscience_seismicScan_KerbinSrfLandedAridMountains_01 // Long, ringing echoes suggest solid bedrock close by. Also: do not jump up and down here.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_seismicScan_KerbinSrfLandedWelcomeBackIsland_00 // The seismometer detects rhythmic thumps that suspiciously match your footsteps. Science demands you stop “helping.”
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_seismicScan_KerbinSrfLandedWelcomeBackIsland_01 // Waves and wind rattle the site in gentle pulses. The island feels small, but it sure makes a lot of noise.

        MunSrfLandedLowlands* = #JNSQscience_seismicScan_MunSrfLandedLowlands_00 // The regolith muffles everything. Impacts show up as soft bumps instead of sharp cracks.
        MunSrfLandedLowlands* = #JNSQscience_seismicScan_MunSrfLandedLowlands_01 // A few clean pings return quickly, hinting at firmer layers beneath the dust blanket.
        MunSrfLandedMountains* = #JNSQscience_seismicScan_MunSrfLandedMountains_00 // Very little natural activity, until a tiny slide happens and the needle jumps like it was insulted.
        MunSrfLandedMountains* = #JNSQscience_seismicScan_MunSrfLandedMountains_01 // Strong, fast returns imply solid structure. The mountains feel rigid, like they’re holding themselves up out of spite.
        
        MinmusSrfLandedPoles* = #JNSQscience_seismicScan_MinmusSrfLandedPoles_00 // The seismometer records sharp little pops as the ice contracts in the cold.
        MinmusSrfLandedPoles* = #JNSQscience_seismicScan_MinmusSrfLandedPoles_01 // A distant impact arrives as a thin, slow ring through the polar crust, and takes forever to fade.
        MinmusSrfLandedLowlands* = #JNSQscience_seismicScan_MinmusSrfLandedLowlands_00 // The trace shows a slow, lazy wobble. Everything here feels like it’s floating on powder.
        MinmusSrfLandedLowlands* = #JNSQscience_seismicScan_MinmusSrfLandedLowlands_01 // Tiny tremors come and go in a steady rhythm, as if Minmus is gently clearing its throat.
        MinmusSrfLandedMidlands* = #JNSQscience_seismicScan_MinmusSrfLandedMidlands_00 // Repeated echoes suggest a thin ice layer over harder rock. You try not to imagine drilling through it.
        MinmusSrfLandedMidlands* = #JNSQscience_seismicScan_MinmusSrfLandedMidlands_01 // The sensor catches a neat, clean bounce-back—this ground is surprisingly solid for something so green.
        MinmusSrfLandedBrownBasins* = #JNSQscience_seismicScan_MinmusSrfLandedBrownBasins_00 // The darker basin surface creaks as it warms and cools. The chart fills with tiny lightning-bolt jitters.
        MinmusSrfLandedBrownBasins* = #JNSQscience_seismicScan_MinmusSrfLandedBrownBasins_01 // Shockwaves travel a bit cleaner here, suggesting less fluffy ice and more stubborn material underneath.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_seismicScan_MinmusSrfLandedBrownLowlands_00 // The ground gives slightly underfoot; the seismometer agrees with a slow settling signal.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_seismicScan_MinmusSrfLandedBrownLowlands_01 // Weak tremors cluster near the darker patches, like the crust is adjusting to uneven heating.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_seismicScan_MinmusSrfLandedBrownMidlands_00 // The feed alternates between quiet and sudden crackles, as if the surface is flexing in layers.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_seismicScan_MinmusSrfLandedBrownMidlands_01 // A faint, repeating pulse hints at tidal stress working the crust, even out here.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_seismicScan_MinmusSrfLandedBrownHighlands_00 // Old lake beds rumble periodically, and the darker ridges answer with sharper snaps. Maybe there’s heating under all that ice.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_seismicScan_MinmusSrfLandedBrownHighlands_01 // Echoes return in several distinct layers, as if the highlands are stacked like frozen pancakes with rocky filling.
        
        DunaSrfLandedRareCraters* = #JNSQscience_seismicScan_DunaSrfLandedRareCraters_00 // The crater floor reflects a clean, strong signal, hinting at firmer layers exposed by impact.
        DunaSrfLandedRareCraters* = #JNSQscience_seismicScan_DunaSrfLandedRareCraters_01 // A lone spike rings out, then fades into a long decay. The bowl shape keeps the echo trapped.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_seismicScan_DunaSrfLandedVoronoiCraters_00 // Multiple small reflections overlap into a busy mess, like the ground is cracked into repeating plates.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_seismicScan_DunaSrfLandedVoronoiCraters_01 // The seismometer hears boundaries everywhere. Even tiny disturbances get chopped into echoes.
        DunaSrfLandedNotableCraters* = #JNSQscience_seismicScan_DunaSrfLandedNotableCraters_00 // Sharp transitions in the waveform suggest distinct layers under the dust, neatly stacked by old events.
        DunaSrfLandedNotableCraters* = #JNSQscience_seismicScan_DunaSrfLandedNotableCraters_01 // A delayed return hints at a buried discontinuity below the floor. You call it “structure” and nod.
        DunaSrfLandedExoticCraters* = #JNSQscience_seismicScan_DunaSrfLandedExoticCraters_00 // The detector goes quiet for a moment, as if the local material is absorbing everything.
        DunaSrfLandedExoticCraters* = #JNSQscience_seismicScan_DunaSrfLandedExoticCraters_01 // When a signal does return, it’s faint and smeared, suggesting ice or very loose deposits underfoot.
        DunaSrfLandedMountains* = #JNSQscience_seismicScan_DunaSrfLandedMountains_00 // A small slide somewhere nearby draws a proud spike. The mountains are never truly done settling.
        DunaSrfLandedMountains* = #JNSQscience_seismicScan_DunaSrfLandedMountains_01 // The baseline jitters faintly, suggesting micro-fractures as rock cools and contracts.
        DunaSrfLandedVolcano* = #JNSQscience_seismicScan_DunaSrfLandedVolcano_00 // The seismometer picks up low, rolling tremors that feel like deep movement trying not to be noticed.
        DunaSrfLandedVolcano* = #JNSQscience_seismicScan_DunaSrfLandedVolcano_01 // Occasional sharp jolts punctuate the hum, as if something below is cracking its way into place.

        IkeSrfLandedMidlands* = #JNSQscience_seismicScan_IkeSrfLandedMidlands_00 // The seismometer records a steady, low jitter, like the ground is always one pebble away from moving.
        IkeSrfLandedMidlands* = #JNSQscience_seismicScan_IkeSrfLandedMidlands_01 // Impacts produce crisp echoes with a short tail, suggesting compact regolith over hard rock.
        IkeSrfLandedLowlands* = #JNSQscience_seismicScan_IkeSrfLandedLowlands_00 // The waveform comes back slightly smeared, as if fine dust is soaking up the sharper vibrations.
        IkeSrfLandedLowlands* = #JNSQscience_seismicScan_IkeSrfLandedLowlands_01 // A few delayed returns suggest uneven layers below. The lowlands are deeper than they look.
        IkeSrfLandedHighlands* = #JNSQscience_seismicScan_IkeSrfLandedHighlands_00 // The trace is calm until a brief tremor ripples through, then the silence returns like nothing happened.
        IkeSrfLandedHighlands* = #JNSQscience_seismicScan_IkeSrfLandedHighlands_01 // Clean, layered reflections hint at stacked deposits. Ike may be simple, but it’s not boring.

        EdnaSrfLandedLowlands* = #JNSQscience_seismicScan_EdnaSrfLandedLowlands_00 // The needle barely twitches. Edna’s lowlands seem content to stay quiet and round.
        EdnaSrfLandedLowlands* = #JNSQscience_seismicScan_EdnaSrfLandedLowlands_01 // A distant impact arrives as a soft, slow wobble, like the whole world is sighing.
        EdnaSrfLandedMidlands* = #JNSQscience_seismicScan_EdnaSrfLandedMidlands_00 // The trace shows faint, periodic ticks as the surface cools and tightens in the dark.
        EdnaSrfLandedMidlands* = #JNSQscience_seismicScan_EdnaSrfLandedMidlands_01 // Echoes come back clean and quick. Whatever’s under this dust is stubbornly solid.
        EdnaSrfLandedHighlands* = #JNSQscience_seismicScan_EdnaSrfLandedHighlands_00 // A sharp spike appears when a nearby rock settles. Even “still” terrain keeps rearranging itself.
        EdnaSrfLandedHighlands* = #JNSQscience_seismicScan_EdnaSrfLandedHighlands_01 // Strong reflections suggest bedrock close to the surface. The highlands feel old and unbothered.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_seismicScan_EdnaSrfLandedPolarIceCraters_00 // Crisp snapping sounds fill the chart as cold-trap crust fractures in tiny bursts.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_seismicScan_EdnaSrfLandedPolarIceCraters_01 // Vibrations linger longer than expected, as if the crater walls are turning quakes into music.
        EdnaSrfLandedWhites* = #JNSQscience_seismicScan_EdnaSrfLandedWhites_00 // The surface rings brighter and cleaner here, with fewer muffled notes in the return.
        EdnaSrfLandedWhites* = #JNSQscience_seismicScan_EdnaSrfLandedWhites_01 // The instrument catches layered echoes, hinting at a thin bright deposit over darker, denser stuff.

        DakSrfLandedLowlands* = #JNSQscience_seismicScan_DakSrfLandedLowlands_00 // The seismometer records your footsteps as a major event.
        DakSrfLandedLowlands* = #JNSQscience_seismicScan_DakSrfLandedLowlands_01 // A gentle tap produces a surprisingly long rattle, like the whole potato is hollowly offended.
        DakSrfLandedMidlands* = #JNSQscience_seismicScan_DakSrfLandedMidlands_00 // The baseline jitters constantly, as if Dak is slowly settling into a new, equally awkward shape.
        DakSrfLandedMidlands* = #JNSQscience_seismicScan_DakSrfLandedMidlands_01 // Signals arrive scrambled and uneven. The interior seems like rubble held together by optimism.
        DakSrfLandedHighlands* = #JNSQscience_seismicScan_DakSrfLandedHighlands_00 // A tiny slide sends a dramatic spike across the chart.
        DakSrfLandedHighlands* = #JNSQscience_seismicScan_DakSrfLandedHighlands_01 // The echoes come back in short, sharp bursts, suggesting hard chunks embedded in loose debris.

        DresSrfLandedLowlands* = #JNSQscience_seismicScan_DresSrfLandedLowlands_00 // The readout is mostly flat, with a soft, dusty wobble when the ground slowly settles into itself.
        DresSrfLandedLowlands* = #JNSQscience_seismicScan_DresSrfLandedLowlands_01 // Distant impacts arrive as dull thumps, quickly swallowed by loose regolith over stubborn rock.
        DresSrfLandedMidlands* = #JNSQscience_seismicScan_DresSrfLandedMidlands_00 // You wait for anything, anything at all. The needle politely refuses to acknowledge your presence.
        DresSrfLandedMidlands* = #JNSQscience_seismicScan_DresSrfLandedMidlands_01 // A few faint ticks show up, probably thermal cracking. Dres remains committed to being unimpressed.
        
        LaytheSrfLandedShallows* = #JNSQscience_seismicScan_LaytheSrfLandedShallows_00 // The ground squelches with every tiny wave-slap. The seismometer logs it as a very wet sort of tectonics.
        LaytheSrfLandedShallows* = #JNSQscience_seismicScan_LaytheSrfLandedShallows_01 // Between the tide taps, deeper tremors roll through. Jool keeps reminding Laythe to keep stretching.
        LaytheSrfLandedHighlands* = #JNSQscience_seismicScan_LaytheSrfLandedHighlands_00 // Clean, sharp echoes suggest hard rock close to the surface, interrupted by distant booms from somewhere below the seas.
        LaytheSrfLandedHighlands* = #JNSQscience_seismicScan_LaytheSrfLandedHighlands_01 // The trace rises and falls in a steady rhythm. Tidal flexing up here feels like the planet is breathing.
        LaytheSrfLandedMountains* = #JNSQscience_seismicScan_LaytheSrfLandedMountains_00 // A single pebble tumble turns into a whole-page spike. Steep slopes make enthusiastic seismology.
        LaytheSrfLandedMountains* = #JNSQscience_seismicScan_LaytheSrfLandedMountains_01 // Vibrations ring for a long time, bouncing through the ridges. Laythe's mountains are basically tuning forks.
        LaytheSrfLandedIceCaps* = #JNSQscience_seismicScan_LaytheSrfLandedIceCaps_00 // The ice snaps in tiny bursts as it cools, each crack a crisp tick on the graph.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_seismicScan_LaytheSrfLandedEnclosedFaults_00 // You've parked on a maze of fractures. The seismometer immediately starts shouting in jagged lines.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_seismicScan_LaytheSrfLandedEnclosedFaults_01 // Short, repeating jolts march across the chart. Something is grinding down there, and it is not subtle.
        LaytheSrfLandedLowlands* = #JNSQscience_seismicScan_LaytheSrfLandedLowlands_00 // The surface settles in lazy slumps, and the instrument catches every little shift like gossip.
        LaytheSrfLandedLowlands* = #JNSQscience_seismicScan_LaytheSrfLandedLowlands_01 // Shallow vibrations smear out quickly here, suggesting soft deposits over firmer layers.
        LaytheSrfLandedMidlands* = #JNSQscience_seismicScan_LaytheSrfLandedMidlands_00 // Mostly calm—until a deep tremor arrives and the needle does a nervous dance.
        LaytheSrfLandedMidlands* = #JNSQscience_seismicScan_LaytheSrfLandedMidlands_01 // Layered returns hint at mixed ground: compacted material on top, something more fractured below.

        TyloSrfLandedPoles* = #JNSQscience_seismicScan_TyloSrfLandedPoles_00 // The baseline stays flat for ages, then a sharp snap appears as the cold surface cracks.
        TyloSrfLandedPoles* = #JNSQscience_seismicScan_TyloSrfLandedPoles_01 // A distant impact comes back as a clean ping with a short tail. Tylo's polar ground is hard and unforgiving.
        TyloSrfLandedMountains* = #JNSQscience_seismicScan_TyloSrfLandedMountains_00 // Rockfalls announce themselves with sudden spikes, then everything returns to stubborn silence.
        TyloSrfLandedMountains* = #JNSQscience_seismicScan_TyloSrfLandedMountains_01 // Strong, fast reflections suggest solid bedrock, with a few odd hollows that ring longer than they should.
        TyloSrfLandedMidlands* = #JNSQscience_seismicScan_TyloSrfLandedMidlands_00 // The seismometer detects long, slow waves that could be deep settling, or old cavities shifting under load.
        TyloSrfLandedMidlands* = #JNSQscience_seismicScan_TyloSrfLandedMidlands_01 // Almost nothing happens. Tylo seems determined to be geologically boring, and it's succeeding.
        TyloSrfLandedLowlands* = #JNSQscience_seismicScan_TyloSrfLandedLowlands_00 // Fine dust dulls the sharpest vibrations, turning impacts into soft thuds and short echoes.
        TyloSrfLandedLowlands* = #JNSQscience_seismicScan_TyloSrfLandedLowlands_01 // A faint periodic wobble suggests the crust still flexes a little under Jool's pull.

