@EXPERIMENT_DEFINITION:HAS[#id[bd_weather]]
{
    %RESULTS
    {
		GrannusInSpaceHigh* = #GEPscience_bd_weather_GrannusInSpaceHigh_00 // From this far out, Grannus looks calm and orderly—until you play the frames back and notice the whole red face is crawling.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_weather_GrannusInSpaceLowNorthPolarZone_00 // A pale, threadlike plume hangs over the pole, bending and snapping as if the star is trying to comb its own hair with magnetism.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_weather_GrannusInSpaceLowNorthSubpolarZone_00 // Bright streaks race along the edge of the polar region; Mission Control says the “weather map” arrived three hours late, and it still looks impatient.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_weather_GrannusInSpaceLowNorthTemperateZone_00 // The pattern here shears sideways between orbits, like the surface is rotating at a different opinion than the poles.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_weather_GrannusInSpaceLowNorthTropicZone_00 // A knot of dark spots drags a halo of brighter turbulence behind it, leaving a wake you can track like a storm on fire.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_weather_GrannusInSpaceLowEquatorialZone_00 // The equator is a conveyor belt of glowing cells—each one is “just” convection, and each one could swallow a spacecraft if it were a place you could fall into.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_weather_GrannusInSpaceLowSouthTropicZone_00 // You catch a looping arc rising off the surface and collapsing again; it looks like a flare that changed its mind halfway through.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_weather_GrannusInSpaceLowSouthTemperateZone_00 // The texture down there is mottled and restless, as if the star is simmering and you just turned the heat down to “barely contained.”
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_weather_GrannusInSpaceLowSouthSubpolarZone_00 // The clouds—if you can call them that—thin into long lanes that open and close between frames like blinking, red eyelids.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_weather_GrannusInSpaceLowSouthPolarZone_00 // A dark, cleaner patch sits near the pole, ringed by faint glow; the instruments insist it’s “a quiet region,” which is not reassuring around a star.

        ToutatisInSpaceHigh* = #GEPscience_bd_weather_ToutatisInSpaceHigh_00 // The terminator cuts the planet cleanly in half: baked red daylight on one side, ink-black cold on the other, and a thin band of “maybe weather” trying to survive between.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_weather_ToutatisInSpaceLowSunnyLowlands_00 // The dayside lowlands shimmer with heat and dusty streaks; you tag a few spinning plumes and immediately lose them in the next orbit’s glare.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_weather_ToutatisInSpaceLowSunnyHighlands_00 // Over the higher ground, the haze thins and breaks into faint bands—sharp enough to make you wonder if the wind has learned to draw lines.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_weather_ToutatisInSpaceLowTransitionalLowlands_00 // Along the twilight belt, a narrow ribbon of cloud forms and evaporates as the shadow creeps; it’s like watching an atmosphere hold its breath.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_weather_ToutatisInSpaceLowTransitionalHighlands_00 // The high terminator regions spawn wispy, fast-moving patches that slide downslope into darkness before your camera can finish being impressed.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_weather_ToutatisInSpaceLowDarkSideLowlands_00 // In the cold basins, a dim fog pools and spreads in slow waves; the forecast reads “night, with a chance of more night.”
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_weather_ToutatisInSpaceLowDarkSideHighlands_00 // The dark-side uplands stay mostly clear, but occasional ice-crystal veils glitter faintly when the red sun skims the horizon line.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_weather_ToutatisInSpaceLowSoutheasternMountains_00 // Thin clouds snag on the peaks and unravel into the lee; the patterns look like they were stitched in place by steady, invisible winds.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_weather_ToutatisInSpaceLowWesternMountains_00 // Dust spills over the ridges in long shadows, tracing the airflow so neatly you suspect Toutatis is showing off for the camera.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_weather_ToutatisInSpaceLowDarkSideMountains_00 // Cold air drains off the slopes in faint streamers, and the few clouds you see look brittle—like they might shatter if you stared too hard.

        NodensInSpaceHigh* = #GEPscience_bd_weather_NodensInSpaceHigh_00 // Widespread cloud decks, slow rotation, and a red-tinted sunrise that arrives long before the data does.
        NodensInSpaceHigh* = #GEPscience_bd_weather_NodensInSpaceHigh_01 // The planet’s weather looks comfortingly familiar—until you remember the “blue” channel is mostly guesswork under this dim red sun.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_weather_NodensInSpaceLowSaltySeas_00 // Patchy marine fog over the Salty Seas, building squalls along the edge of daylight; comm delay: “ask again later.”
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_weather_NodensInSpaceLowSaltySeas_01 // Long, pale streaks ride the winds above the water; the storms line up like they’re following rules we haven’t translated yet.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_weather_NodensInSpaceLowFreshWater_00 // Lake-effect cloud bands downwind of the big freshwater basins; visibility: “from orbit only.”
        NodensInSpaceLowFreshWater* = #GEPscience_bd_weather_NodensInSpaceLowFreshWater_01 // A soft bloom of haze clings to the shorelines, then peels away into tidy rows as the terminator crawls past.
        NodensInSpaceLowShores* = #GEPscience_bd_weather_NodensInSpaceLowShores_00 // Sharp shoreline breezes and quick pop-up clouds; probability of losing track of the coastline: high.
        NodensInSpaceLowShores* = #GEPscience_bd_weather_NodensInSpaceLowShores_01 // The boundary between land and sea is scribbled over by fast, thin cloud lines—like the atmosphere can’t decide where to anchor.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_weather_NodensInSpaceLowTropicalLowlands_00 // Towering convection, isolated thunderheads, and a lot of enthusiastic vertical motion.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_weather_NodensInSpaceLowTropicalLowlands_01 // Bright cloud anvils flare and collapse in time-lapse; the red sun makes every storm look slightly overheated.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_weather_NodensInSpaceLowTemperateLowlands_00 // Organized fronts marching eastward; expect alternating bands of clear skies and “oh no, more clouds.”
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_weather_NodensInSpaceLowTemperateLowlands_01 // A long curved front sweeps across the lowlands, dragging a gray tail behind it like a comet made of weather.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_weather_NodensInSpaceLowTropicalMidlands_00 // Broken cloud cover with sudden build-ups along ridgelines; turbulence: “yes.”
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_weather_NodensInSpaceLowTropicalMidlands_01 // Small storms form in clusters, then merge into a single messy system that refuses to match the neat models.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_weather_NodensInSpaceLowTemperateMidlands_00 // Steady winds and layered cloud sheets; night cooling will sharpen the edges of everything.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_weather_NodensInSpaceLowTemperateMidlands_01 // The cloud tops stack into stripes and steps—pretty, orderly, and a little unsettlingly precise.
        NodensInSpaceLowHighlands* = #GEPscience_bd_weather_NodensInSpaceLowHighlands_00 // Orographic clouds draped over the high ground; expect dramatic shadows when the red sun skims low.
        NodensInSpaceLowHighlands* = #GEPscience_bd_weather_NodensInSpaceLowHighlands_01 // Clouds snag on the peaks and stream away in long banners, tracing the airflow like someone spilled chalk across the sky.
        NodensInSpaceLowTundra* = #GEPscience_bd_weather_NodensInSpaceLowTundra_00 // Blowing snow and low, stubborn cloud ceilings; chances of “clear day”: statistically discouraged.
        NodensInSpaceLowTundra* = #GEPscience_bd_weather_NodensInSpaceLowTundra_01 // A thin veil creeps over the tundra and thickens at dusk; by the time the report arrives, the storm has already moved on.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_weather_NodensInSpaceLowIceCaps_00 // Polar vortex holding, with spiral cloud arms tightening toward the center.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_weather_NodensInSpaceLowIceCaps_01 // The ice cap is ringed by rotating cloud bands that look like a giant fingerprint—Mission Control files it under “do not touch.”

        SironaInSpaceHigh* = #GEPscience_bd_weather_SironaInSpaceHigh_00 // From high orbit, Sirona’s bands are a muted bruise of reds and browns, and the ring shadows cut across them like a clock with no hands.
        SironaInSpaceHigh* = #GEPscience_bd_weather_SironaInSpaceHigh_01 // The weather map updates in slow, distant pulses; by the time it’s on-screen, the storms have already rewritten the story.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_weather_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands boil with slow turbulence, swallowing smaller storms as if that’s their job.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_weather_SironaInSpaceLowDarkTropicalBands_01 // You spot a chain of vortices marching along the band—too evenly spaced to feel accidental.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_weather_SironaInSpaceLowLightTropicalBands_00 // Bright, high cloud tops flash in the light bands; the red sun makes them look warm, but the math says otherwise.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_weather_SironaInSpaceLowLightTropicalBands_01 // Thin, luminous streaks shear apart and reform between passes, like someone keeps combing the atmosphere the wrong way.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_weather_SironaInSpaceLowDarkTemperateBands_00 // The temperate dark zones host a broad storm cell with a ragged eye that refuses to stay centered.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_weather_SironaInSpaceLowDarkTemperateBands_01 // Patchy clearings open, then close again, as if the band is breathing—slowly, heavily, and not for you.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_weather_SironaInSpaceLowLightTemperateBands_00 // A crisp wave pattern rides the light bands; it’s the kind of neatness that makes engineers nervous.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_weather_SironaInSpaceLowLightTemperateBands_01 // The ring shadow cools a narrow strip, and the clouds respond by drawing a sharp line right along it.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_weather_SironaInSpaceLowDarkPolarBands_00 // Near the poles, the dark bands twist into tight spirals; the auroral glow around them is definitely not “just decoration.”
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_weather_SironaInSpaceLowDarkPolarBands_01 // Storm fragments orbit the polar region like debris in a drain—except the drain is a planet and it’s humming.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_weather_SironaInSpaceLowLightPolarBands_00 // The light polar bands haze over into fine, icy veils that glitter briefly when the sun angle is just right.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_weather_SironaInSpaceLowLightPolarBands_01 // A pale cap of cloud expands and contracts between orbits, as if the pole is quietly adjusting to the long night.

        BorvoInSpaceHigh* = #GEPscience_bd_weather_BorvoInSpaceHigh_00 // From up here, Borvo’s haze looks like a calm sketch—until the time-lapse shows the whole atmosphere sliding sideways under the dim red sun.
        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_weather_BorvoInSpaceLowTropicalCraquelure_00 // Thin fog threads through the cracked tropics, pooling in the fractures like the surface is exhaling cold air between plates.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_weather_BorvoInSpaceLowTemperateCraquelure_00 // A broken deck of clouds keeps reforming along the craquelure lines, as if the weather prefers pre-cracked boundaries.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_weather_BorvoInSpaceLowTropicalLowlands_00 // Bright, puffy cloud clusters bloom over the lowlands, then smear into streaks before the delayed downlink finishes drawing them.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_weather_BorvoInSpaceLowTemperateLowlands_00 // A long, faint front crawls across the basin floors; it looks slow, but it outruns your next orbital pass anyway.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_weather_BorvoInSpaceLowTropicalMidlands_00 // Mid-altitude winds comb the haze into neat bands that feel a little too organized for comfort.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_weather_BorvoInSpaceLowTemperateMidlands_00 // Patchy clouds gather, break apart, and gather again—like the atmosphere is practicing for a storm it won’t schedule.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_weather_BorvoInSpaceLowHighlands_00 // Clouds snag on the high ground and stream away in brittle banners; the shadows are so long you can almost hear the chill.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_weather_BorvoInSpaceLowMajorCraters_00 // The crater floors trap a dim, cold mist that sloshes with the day-night line, a tide made of air instead of water.
        BorvoInSpaceLowPoles* = #GEPscience_bd_weather_BorvoInSpaceLowPoles_00 // A tight spiral of pale cloud rings the pole; Mission Control calls it “stable,” which is not the same as “friendly.”

        EponaInSpaceHigh* = #GEPscience_bd_weather_EponaInSpaceHigh_00 // Epona’s weather paints broad, quiet strokes, and then the red sun catches a storm edge and turns it into a warning stripe.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_weather_EponaInSpaceLowTropicalLowlands_00 // Towering clouds punch up over the warmest lowlands, casting shadows that look darker than they have any right to be.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_weather_EponaInSpaceLowTemperateLowlands_00 // A layered overcast rolls in neat sheets, the kind that makes you trust the forecast—and then regret it.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_weather_EponaInSpaceLowTropicalUplands_00 // Upland breezes shred the cloud tops into streamers, like someone tried to “smooth” the weather with a rake.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_weather_EponaInSpaceLowTemperateUplands_00 // A thin haze clings to the slopes and then peels away at twilight; the terminator is basically a moving weather machine.
        EponaInSpaceLowHighlands* = #GEPscience_bd_weather_EponaInSpaceLowHighlands_00 // Orographic clouds drape the ridges in soft blankets, then tear loose in sudden gusts that your instruments label as “exciting.”
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_weather_EponaInSpaceLowGrandPeaks_00 // The tallest peaks punch through the cloud layer and leave long, sharp wakes downwind—mountains doing quality-control on the sky.
        EponaInSpaceLowCraters* = #GEPscience_bd_weather_EponaInSpaceLowCraters_00 // Cold air pools in the crater bowls, filling them with pale fog that drains and refills as the day-night cycle lurches along.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_weather_EponaInSpaceLowVolcanoes_00 // A thin plume rises from a volcanic field and spreads into a high veil; you file it under “weather” because nobody wants the other category.
        EponaInSpaceLowPoles* = #GEPscience_bd_weather_EponaInSpaceLowPoles_00 // The polar cap is rimmed with rotating cloud bands that tighten and relax between passes, like a slow breath you can’t quite time.
	}
}