        #GEPscience_tantares_infrared_light_camera_NodensFlyingHigh_00 = At altitude, Nodens glows in broad, gentle bands - almost homey, until you remember the light delay on the radio.
        #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowSaltySeas_00 = The salty seas hold heat in broad pools, traced by cooler lines where currents meet. It looks alive, but it's just physics. Probably.
        #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowFreshWater_00 = The lakes cool faster than the oceans, forming crisp, dark shapes. You can almost navigate by temperature alone.
        #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowShores_00 = Coastlines draw themselves in infrared: warm water, cool land, and a narrow, busy band of in-between.
