@EXPERIMENT_DEFINITION:HAS[#id[bd_oso]]
{
	@title = #ScienceRefactor_bd_oso_title // Orbital Sun Observations
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_oso_default_00 // Data from a variety of solar sensors is recorded to be sent back to Kerbin.
        InSpace* = #ScienceRefactor_bd_oso_default_01 // Readings confirm that Kerbol is, indeed, hot.

		KerbinInSpaceLow* = #ScienceRefactor_bd_oso_KerbinInSpaceLow_00 // Wow, it looks the experiment is safe from solar radiation!
		KerbinInSpaceHigh* = #ScienceRefactor_bd_oso_KerbinInSpaceHigh_00 // It seems that the more you go away from Kerbin, the less protected you are from Kerbol.

		MunInSpaceLow* = #ScienceRefactor_bd_oso_MunInSpaceLow_00 // We discovered something called "Solar wind", proving that not all winds are made by Gene Kerman. (In the back of Mission Control, you hear Gene saying "I told you so!")
		MunInSpaceHigh* = #ScienceRefactor_bd_oso_MunInSpaceHigh_00 // Apparently, a full Mun isn't caused by the Mun itself, but by Kerbol light bouncing off the Munar dust.

		MinmusInSpaceLow* = #ScienceRefactor_bd_oso_MinmusInSpaceLow_00 // It's confirmed. The heat of Kerbol doesnt make Minmus melt.
		MinmusInSpaceHigh* = #ScienceRefactor_bd_oso_MinmusInSpaceHigh_00 // We found that without an atmosphere, there is no way to get electrocuted. The people back in the VAB will be pleased with that one!

		MohoInSpaceLow* = #ScienceRefactor_bd_oso_MohoInSpaceLow_00 // A beautiful light is seen dancing around the planet's poles. It is mesmerizing.
		MohoInSpaceHigh* = #ScienceRefactor_bd_oso_MohoInSpaceHigh_00 // Moho's weak magnetic field provides little protection from the fierce solar wind.

		EveInSpaceLow* = #ScienceRefactor_bd_oso_EveInSpaceLow_00 // Eve's thick atmosphere is sucking up the heat of Kerbol like a sponge.
		EveInSpaceHigh* = #ScienceRefactor_bd_oso_EveInSpaceHigh_00 // Eve's thick atmosphere reflects light like a big purply mirror. It would look great in your bathroom.

		GillyInSpaceLow* = #ScienceRefactor_bd_oso_GillyInSpaceLow_00 // Gilly's rocky texture makes the detector think we're on the beach! Mission Control confirms: The detector isn't laying on the beach.
		GillyInSpaceHigh* = #ScienceRefactor_bd_oso_GillyInSpaceHigh_00 // Gilly is so small, Kerbol doesn't notice it. Votes go up to buy Kerbol some glasses.

		DunaInSpaceLow* = #ScienceRefactor_bd_oso_DunaInSpaceLow_00 // The larger distance between Duna to Kerbol makes it feel colder than Kerbin
		DunaInSpaceHigh* = #ScienceRefactor_bd_oso_DunaInSpaceHigh_00 // Kerbol heating up Duna dust can cause massive dust storms. Better be careful here...

		IkeInSpaceLow* = #ScienceRefactor_bd_oso_IkeInSpaceLow_00 // The dark spots on Ike are caused by shadows and soil coloration. Not by Kerbol immunity.
		IkeInSpaceHigh* = #ScienceRefactor_bd_oso_IkeInSpaceHigh_00 // Ike seems to be immune to Kerbol rays, being very dark in some places

		DresInSpaceLow* = #ScienceRefactor_bd_oso_DresInSpaceLow_00 // Solar winds are causing a stable electric cocoon to form in the craters of Dres. This could be useful in the future.
		DresInSpaceHigh* = #ScienceRefactor_bd_oso_DresInSpaceHigh_00 // Kerbol's rays seem to be bouncing on and off Dres. Further researching is required confirming Dres isn't made of rubber

		JoolInSpaceLow* = #ScienceRefactor_bd_oso_JoolInSpaceLow_00 // Jool's magnetic field seems to be working like a massive dynamo, reacting in ways we could have never guessed
		JoolInSpaceHigh* = #ScienceRefactor_bd_oso_JoolInSpaceHigh_00 // The huge strength of Jool's magnetic field is causing the systems to go hay-wire

		LaytheInSpaceLow* = #ScienceRefactor_bd_oso_LaytheInSpaceLow_00 // Temperatures are cold, even though we're enjoying Kerbol heating us up. Interesting.
		LaytheInSpaceHigh* = #ScienceRefactor_bd_oso_LaytheInSpaceHigh_00 // Mission Control is confused if they're looking at the Kerbin data, or if this is new data from another planet

		VallInSpaceLow* = #ScienceRefactor_bd_oso_VallInSpaceLow_00 // The Kerbol rays are having a frequency shift this close to Vall!
		VallInSpaceHigh* = #ScienceRefactor_bd_oso_VallInSpaceHigh_00 // The heating of Vall's surface by Kerbol causes cracks in the surface where fluid comes out. At Mission Control, the idea for a space waterpark gets tossed around.

		TyloInSpaceLow* = #ScienceRefactor_bd_oso_TyloInSpaceLow_00 // Heating of the surface by Kerbol has caused large differences in color. A bit like a burnt egg.
		TyloInSpaceHigh* = #ScienceRefactor_bd_oso_TyloInSpaceHigh_00 // The sensors say that "convection" is taking place. Mission Control doesn't really know what to do about that.

		BopInSpaceLow* = #ScienceRefactor_bd_oso_BopInSpaceLow_00 // Kerbol is charging our batteries over here as well!
		BopInSpaceHigh* = #ScienceRefactor_bd_oso_BopInSpaceHigh_00 // The surface of Bop is reacting with the rays of Kerbol!

		PolInSpaceLow* = #ScienceRefactor_bd_oso_PolInSpaceLow_00 //  Kerbol seems to have no influence on the surface of Pol, making the surface a result of purely volcanic activity
		PolInSpaceHigh* = #ScienceRefactor_bd_oso_PolInSpaceHigh_00 // The spikeyness of Pol's surface is scaring the sensor

		EelooInSpaceLow* = #ScienceRefactor_bd_oso_EelooInSpaceLow_00 // Kerbol is causing Eeloo's ice to melt. Some at KSC are suggesting a massive freezer to keep it safe.
		EelooInSpaceHigh* = #ScienceRefactor_bd_oso_EelooInSpaceHigh_00 // This far out of the Kerbol system, the influence of Kerbol is very faint.

		AsteroidInSpaceLow* = #ScienceRefactor_bd_oso_AsteroidInSpaceLow_00 // The dark side of the asteroid is freezing cold. We should've brought a heater.
		AsteroidInSpaceHigh* = #ScienceRefactor_bd_oso_AsteroidInSpaceHigh_00 // The side of the asteroid facing Kerbol is incredibly hot, being bombarded by Kerbol rays for millenia
		AsteroidSrfLanded* = #ScienceRefactor_bd_oso_AsteroidSrfLanded_00 // The detector is transmitting that it is "just chillin'". Mission Control is trying to decipher this message.
	}
}