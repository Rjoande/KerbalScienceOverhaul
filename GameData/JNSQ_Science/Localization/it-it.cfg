        // gravityScan
        #JNSQscience_gravityScan_SunInSpaceLowNorthPolarZone_00 = Il rilevatore di gravioli va a fondo scala e sussulta, come se la massa della stella scorresse sotto di te in lunghi fiumi rapidi.
        #JNSQscience_gravityScan_SunInSpaceLowNorthSubpolarZone_00 = Gravità intensa con un lieve ondeggiamento ritmico. Qualcosa sotto sta sloshingando secondo una tabella che si rifiuta di condividere.
        #JNSQscience_gravityScan_SunInSpaceLowNorthTemperateZone_00 = La trazione è immensa, ma irregolare, come se stessi orbitando attorno a un posto che non sa decidere dove tenere il proprio peso.
        #JNSQscience_gravityScan_SunInSpaceLowNorthTropicZone_00 = Le letture schizzano e calano in rapidi impulsi. Il rilevatore suggerisce che il "suolo" sia impegnato a riorganizzarsi.
        #JNSQscience_gravityScan_SunInSpaceLowEquatorialZone_00 = La gravità è brutalmente forte e stranamente stabile, come se la stella rendesse liscia questa fascia per pura testardaggine.
        #JNSQscience_gravityScan_SunInSpaceLowSouthTropicZone_00 = Lo strumento registra una trazione intensa e frequenti piccoli sobbalzi, come se correnti convettive stessero urtando il campo gravitazionale.
        #JNSQscience_gravityScan_SunInSpaceLowSouthTemperateZone_00 = Ottieni l'enorme valore previsto, più una quantità sorprendente di "trama", come increspature in qualcosa che dovrebbe essere uniforme.
        #JNSQscience_gravityScan_SunInSpaceLowSouthSubpolarZone_00 = Il rilevatore continua a trovare piccoli gradienti che non dovrebbero esserci. La stella ignora con garbo le tue aspettative.
        #JNSQscience_gravityScan_SunInSpaceLowSouthPolarZone_00 = La gravità resta alta, ma l'ago trema con picchi netti, come se una mano invisibile stesse toccando il sensore.
        #JNSQscience_gravityScan_SunInSpaceHighNorthPolarZone_00 = Da molto lontano, il rilevatore mostra una trazione gentile e una lenta deriva: lo spazio interplanetario è quasi tutto silenzio, a parte qualche richiamo distante.
        #JNSQscience_gravityScan_SunInSpaceHighNorthSubpolarZone_00 = La lettura dei gravioli è bassa e regolare. Sospetti che ora siano i pianeti vicini a fare la maggior parte del lavoro "interessante".
        #JNSQscience_gravityScan_SunInSpaceHighNorthTemperateZone_00 = Lo strumento segnala un'attrazione modesta e variazioni lunghe e pigre, come se la gravità venisse negoziata su distanze enormi.
        #JNSQscience_gravityScan_SunInSpaceHighNorthTropicZone_00 = Le letture restano su "piccola ma presente". Il rilevatore nota lievi perturbazioni compatibili con l'attraversare la sfera d'influenza di chiunque.
        #JNSQscience_gravityScan_SunInSpaceHighEquatorialZone_00 = Qui la trazione è lieve, e i cambiamenti maggiori arrivano dal resto del sistema che discute in sottofondo.
        #JNSQscience_gravityScan_SunInSpaceHighSouthTropicZone_00 = Il sensore segnala calma interplanetaria, interrotta da minuscole spinte che sembrano pianeti che si schiariscono la gola.
        #JNSQscience_gravityScan_SunInSpaceHighSouthTemperateZone_00 = La gravità è bassa e prevedibile, cosa confortante finché non ricordi cosa implica "spazio alto" attorno a una stella.
        #JNSQscience_gravityScan_SunInSpaceHighSouthSubpolarZone_00 = Il rilevatore registra un campo debole e una lenta oscillazione, come se stessi viaggiando sul bordo di un tiro alla fune enorme e molto educato.
        #JNSQscience_gravityScan_SunInSpaceHighSouthPolarZone_00 = La lettura è piccola e stabile: l'unico dramma arriva da corpi lontani che a turno tirano l'ago.
        #JNSQscience_gravityScan_MohoSrfLanded_00 = Un sottile gradiente gravitazionale segue un lineamento vicino di creste e scarpate. Lo schema suggerisce un blocco denso e poco profondo che sta ancora assestandosi in un nuovo stato di stress.
        #JNSQscience_gravityScan_MohoInSpaceLow_00 = I passaggi a bassa quota rivelano una catena di piccole anomalie positive allineate con scarpate dall'aspetto recente. Qualcosa di denso è stato spinto verso l'alto o messo a nudo lungo le fratture.
        #JNSQscience_gravityScan_MohoInSpaceLow_01 = La mappa gravitazionale mostra lievi "increspature" che correlano con le creste più che con i crateri. Sembra che un riassestamento interno abbia lasciato spostamenti di massa misurabili nella crosta.
        #JNSQscience_gravityScan_MohoInSpaceLow_02 = Una stretta anomalia negativa si trova accanto a una scarpata netta, come se il materiale si fosse dilatato o fosse stato rimescolato in una regolite più soffice durante uno scorrimento recente.
        #JNSQscience_gravityScan_MohoInSpaceHigh_00 = Dall'orbita alta, il campo di Moho si discosta dalla simmetria uniforme in ampi lobi. La soluzione migliore è un interno denso leggermente decentrato che si sta ancora rilassando mentre il pianeta si raffredda.
        #JNSQscience_gravityScan_MohoInSpaceHigh_01 = Il tracciamento su archi lunghi suggerisce variazioni di basso grado allineate con le principali tendenze tettoniche. Le anomalie sono deboli, ma si ripetono con costanza su più orbite.
        #JNSQscience_gravityScan_MohoInSpaceHigh_02 = La soluzione globale preferisce un insieme di armoniche gravitazionali che cambia in modo sottile. Non è nulla di drammatico, solo quanto basta per suggerire una contrazione continua e una lenta ridistribuzione della massa.
        #JNSQscience_gravityScan_MohoSrfLandedPoles_00 = La lettura dei gravioli suggerisce che i poli nascondano sacche di "massa mancante" sotto la crosta.
        #JNSQscience_gravityScan_MohoSrfLandedPoles_01 = Qui la gravità sembra leggermente sbagliata, come se il pianeta si fosse dimenticato di finire di riempire gli angoli.
        #JNSQscience_gravityScan_MohoSrfLandedLowlands_00 = Il rilevatore si rianima: questi bacini sono pesanti, profondi e ansiosi di trattenere qualsiasi cosa ci cada dentro.
        #JNSQscience_gravityScan_MohoSrfLandedLowlands_01 = La gravità locale è un po' alta per essere "solo polvere e rocce". Qualcosa di denso si è accovacciato laggiù.
        #JNSQscience_gravityScan_MohoSrfLandedPolarIceCraters_00 = I numeri saltano su e giù come se il terreno sotto di te fosse pieno di anelli cavi e creste sepolte.
        #JNSQscience_gravityScan_MohoSrfLandedPolarIceCraters_01 = Il segnale dei gravioli cala, schizza, poi cala di nuovo, come se le pareti del cratere nascondessero scomparti segreti.
        #JNSQscience_gravityScan_MohoSrfLandedCraters_00 = Il rilevatore continua a trovare piccoli deficit. I crateri sono davvero solo buchi con della burocrazia.
        #JNSQscience_gravityScan_MohoSrfLandedCraters_01 = Le anomalie gravitazionali si addensano attorno agli impatti, come se la superficie fosse cucita insieme con pezzi rotti.
        #JNSQscience_gravityScan_MohoSrfLandedExoticCraters_00 = La lettura oscilla più del previsto. O il cratere è strano, oppure il rilevatore è ubriaco di caldo.
        #JNSQscience_gravityScan_MohoSrfLandedExoticCraters_01 = Qualcosa in questo sito d'impatto fa sembrare la gravità sbilanciata, come se il terreno fosse stato colato storto.
        #JNSQscience_gravityScan_MohoSrfLandedRareCraters_00 = Un'anomalia netta suggerisce una cavità insolitamente profonda, o un tappo insolitamente denso, sotto il fondo del cratere.
        #JNSQscience_gravityScan_MohoSrfLandedRareCraters_01 = I numeri indicano che questo cratere ha colpito qualcosa di diverso da "altro Moho". È promettente. E inquietante.
        #JNSQscience_gravityScan_MohoSrfLandedVoronoiCraters_00 = Il gravitometro traccia uno schema ripetuto di massimi e minimi, come se la crosta fosse stata stampata come una cialda.
        #JNSQscience_gravityScan_MohoSrfLandedVoronoiCraters_01 = Variazioni gravitazionali regolari, a celle, suggeriscono lastre fratturate incastrate insieme sotto la superficie.
        #JNSQscience_gravityScan_MohoSrfLandedNotableCraters_00 = Questo impatto ha lasciato una firma abbastanza grande da mettere in riga il resto delle letture.
        #JNSQscience_gravityScan_MohoSrfLandedNotableCraters_01 = Un'ampia depressione gravitazionale suggerisce che il cratere abbia scavato uno strato più leggero, o abbia lasciato un livido cavernoso.
        #JNSQscience_gravityScan_MohoSrfLandedPeaks_00 = Le vette tirano più di quanto dovrebbero. La roccia densa sollevata produce montagne davvero molto "aggrappanti".
        #JNSQscience_gravityScan_MohoSrfLandedPeaks_01 = La gravità trema vicino alle creste, come se la roccia sotto fosse piegata, impilata e in tensione.
        #JNSQscience_gravityScan_MohoInSpaceLowPoles_00 = I passaggi bassi sopra i poli rivelano deficit di massa a chiazze, compatibili con vuoti o con una crosta insolitamente porosa.
        #JNSQscience_gravityScan_MohoInSpaceLowPoles_01 = Il campo gravitazionale polare sembra "rosicchiato dalle tarme" in certi punti. Il Controllo Missione insiste che non sia un termine tecnico.
        #JNSQscience_gravityScan_MohoInSpaceLowLowlands_00 = Ogni passaggio sopra le pianure basse mostra un massimo gravitazionale persistente: quei bacini sono carichi di materiale denso.
        #JNSQscience_gravityScan_MohoInSpaceLowLowlands_01 = Le pianure basse tirano la navicella come se cercassero di collezionare souvenir dall'orbita.
        #JNSQscience_gravityScan_MohoInSpaceLowPolarIceCraters_00 = La regione dell'anello di crateri produce picchi e cali alternati, come una struttura sepolta disposta a fasce.
        #JNSQscience_gravityScan_MohoInSpaceLowPolarIceCraters_01 = La mappa dei gravioli sopra questi crateri polari sembra rumorosa, ma il rumore si ripete. È questa la parte preoccupante.
        #JNSQscience_gravityScan_MohoInSpaceLowHighlands_00 = Sopra gli altopiani, il campo si fa più uniforme. Roccia solida, dati solidi.
        #JNSQscience_gravityScan_MohoInSpaceLowHighlands_01 = Gli altopiani danno un segnale di riferimento nitido. Utile per sottrarre la strana anomalia generale di Moho.
        #JNSQscience_gravityScan_MohoInSpaceLowMidlands_00 = Gradienti sottili suggeriscono un terreno stratificato sotto, né denso quanto le zone basse né uniforme quanto le zone alte.
        #JNSQscience_gravityScan_MohoInSpaceLowMidlands_01 = Le zone intermedie mostrano dolci ondulazioni nel campo, come se la crosta si ispessisse e si assottigliasse in lente onde.
        #JNSQscience_gravityScan_MohoInSpaceLowCraters_00 = Piccole anomalie frequenti segnano il terreno craterizzato come impronte digitali sulla mappa.
        #JNSQscience_gravityScan_MohoInSpaceLowCraters_01 = Il rilevatore segnala "tanti piccoli strani". Il team scientifico lo chiama "alta variabilità spaziale".
        #JNSQscience_gravityScan_MohoInSpaceLowExoticCraters_00 = Questi crateri spiccano con contrasti più forti, suggerendo un riempimento insolito o un basamento insolitamente fratturato.
        #JNSQscience_gravityScan_MohoInSpaceLowExoticCraters_01 = Alcuni passaggi mostrano una strana asimmetria, come se l'impatto avesse buttato materiale denso da un lato.
        #JNSQscience_gravityScan_MohoInSpaceLowRareCraters_00 = Un'anomalia distinta suggerisce una struttura sotterranea poco comune sotto questo gruppo di crateri.
        #JNSQscience_gravityScan_MohoInSpaceLowRareCraters_01 = Un cratere produce una firma gravitazionale pulita che non corrisponde alla sua forma. Significa che qualcosa è nascosto.
        #JNSQscience_gravityScan_MohoInSpaceLowVoronoiCraters_00 = Qui il campo forma un motivo a piastrelle, abbastanza regolare da rendere sospettoso il computer di mappatura.
        #JNSQscience_gravityScan_MohoInSpaceLowVoronoiCraters_01 = Celle gravitazionali ripetute implicano che la crosta si sia spezzata in placche e si sia poi ricompattata.
        #JNSQscience_gravityScan_MohoInSpaceLowNotableCraters_00 = La cicatrice gravitazionale del grande cratere è visibile anche da questa quota, e domina il campo locale.
        #JNSQscience_gravityScan_MohoInSpaceLowNotableCraters_01 = La mappatura mostra un ampio deficit di massa compatibile con uno scavo profondo e materiale più leggero sotto.
        #JNSQscience_gravityScan_MohoInSpaceLowPeaks_00 = Le vette risultano come massimi gravitazionali stretti, suggerendo sollevamento denso e radici sotterranee ripide.
        #JNSQscience_gravityScan_MohoInSpaceLowPeaks_01 = Il campo si fa più tagliente attorno alle montagne, indicando che le vette non sono solo alte. Sono pesanti.
        #JNSQscience_gravityScan_MohoInSpaceHighPoles_00 = Dall'orbita alta, i poli risultano in media leggermente meno densi rispetto al resto di Moho.
        #JNSQscience_gravityScan_MohoInSpaceHighPoles_01 = Il contributo polare al campo gravitazionale di Moho è irregolare, suggerendo una struttura interna complessa sotto le calotte.
        #JNSQscience_gravityScan_MohoInSpaceHighLowlands_00 = Le tendenze su larga scala mostrano le pianure basse come le regioni più pesanti, che tirano la navicella anche a questa distanza.
        #JNSQscience_gravityScan_MohoInSpaceHighLowlands_01 = La mappatura globale conferma: i bacini di Moho sono pozzi gravitazionali sopra pozzi gravitazionali.
        #JNSQscience_gravityScan_MohoInSpaceHighPolarIceCraters_00 = La regione dei crateri polari si legge come una perturbazione a fasce nel campo, non forte, ma persistente.
        #JNSQscience_gravityScan_MohoInSpaceHighPolarIceCraters_01 = Anche sfumata dall'altitudine, quest'area mantiene una firma "ad anelli" riconoscibile.
        #JNSQscience_gravityScan_MohoInSpaceHighHighlands_00 = Gli altopiani forniscono un campo medio stabile, utile per calibrare il resto del rilevamento.
        #JNSQscience_gravityScan_MohoInSpaceHighHighlands_01 = L'orbita alta smussa i dettagli, ma gli altopiani restano piacevolmente prevedibili.
        #JNSQscience_gravityScan_MohoInSpaceHighMidlands_00 = Le zone intermedie stanno tra gli estremi, contribuendo con gradienti dolci invece di anomalie nette.
        #JNSQscience_gravityScan_MohoInSpaceHighMidlands_01 = Una firma morbida e ondulata suggerisce una crosta spessa con modeste variazioni di densità.
        #JNSQscience_gravityScan_MohoInSpaceHighCraters_00 = I campi di crateri si sfumano in una ruvidità generale nella mappa gravitazionale, come carta vetrata sui numeri.
        #JNSQscience_gravityScan_MohoInSpaceHighCraters_01 = L'orbita alta non può risolvere ogni impatto, ma può confermare che ce ne sono decisamente troppi.
        #JNSQscience_gravityScan_MohoInSpaceHighExoticCraters_00 = Questi crateri si vedono ancora come distorsioni sproporzionate, il che implica che siano davvero insoliti, non solo scenografici.
        #JNSQscience_gravityScan_MohoInSpaceHighExoticCraters_01 = Il rilevamento evidenzia alcuni "punti critici" in cui il campo gravitazionale si rifiuta di comportarsi bene.
        #JNSQscience_gravityScan_MohoInSpaceHighRareCraters_00 = Un piccolo numero di anomalie marcate sopravvive alla media: crateri rari, segnali rari.
        #JNSQscience_gravityScan_MohoInSpaceHighRareCraters_01 = Il campo mostra una manciata di firme distinte non compatibili con impatti ordinari.
        #JNSQscience_gravityScan_MohoInSpaceHighVoronoiCraters_00 = Il motivo ripetuto svanisce con l'altitudine, ma resta una debole impronta geometrica.
        #JNSQscience_gravityScan_MohoInSpaceHighVoronoiCraters_01 = Qui il campo gravitazionale porta una sottile trama regolare, come se la crosta avesse una griglia nascosta.
        #JNSQscience_gravityScan_MohoInSpaceHighNotableCraters_00 = La regione del cratere notevole lascia un'impronta ampia, suggerendo una struttura su larga scala sotto la superficie.
        #JNSQscience_gravityScan_MohoInSpaceHighNotableCraters_01 = Anche da quassù, il campo cala sopra il grande impatto, come un livido che non riesci a non vedere.
        #JNSQscience_gravityScan_MohoInSpaceHighPeaks_00 = Le regioni montuose si mediano in lievi massimi gravitazionali, compatibili con radici dense sotto il terreno sollevato.
        #JNSQscience_gravityScan_MohoInSpaceHighPeaks_01 = Le vette contribuiscono a una trazione globale leggermente più forte, suggerendo che la crosta di Moho è più pesante di quanto sembri.
        #JNSQscience_gravityScan_EveSrfLandedKrakensWell_00 = Il gravitometro insiste che qui manchi qualcosa di enorme. I numeri sembrano un buco con dei bordi.
        #JNSQscience_gravityScan_EveSrfLandedKrakensWell_01 = Le letture vorticano attorno al bordo come se la gravità stesse girando intorno a uno scarico. Decidi di non sporgerti oltre.
        #JNSQscience_gravityScan_EveSrfLandedMountains_00 = Il conteggio dei gravioli sale costantemente lungo i crinali. Queste montagne devono avere radici che scendono molto più in profondità di quanto sembri.
        #JNSQscience_gravityScan_EveSrfLandedMountains_01 = Ogni passo fa protestare il rilevatore. Le montagne di Eve sembrano imbullonate al mantello con una quantità irragionevole di roccia.
        #JNSQscience_gravityScan_EveSrfLandedShores_00 = Il rilevatore trema tra le firme di terra e mare. La costa è un tiro alla fune tra un liquido denso e una pietra ancora più pesante.
        #JNSQscience_gravityScan_EveSrfLandedShores_01 = I gravioli si accumulano proprio alla linea d'acqua. O le maree spostano molta massa, o la spiaggia sta cercando di sprofondare.
        #JNSQscience_gravityScan_EveInSpaceLowKrakensWell_00 = L'orbita bassa sopra il Pozzo del Kraken produce una netta discontinuità, come se il pianeta si fosse dimenticato di mettere massa in un punto.
        #JNSQscience_gravityScan_EveInSpaceLowKrakensWell_01 = Il gravitometro ha un picco sul bordo e cala al centro. Sembra uno scarico gravitazionale tracciato con il righello.
        #JNSQscience_gravityScan_EveInSpaceLowMountains_00 = Il gravitometro si accende sopra le cinture montuose. Le loro radici profonde fanno sembrare il terreno circostante leggero per confronto.
        #JNSQscience_gravityScan_EveInSpaceLowMountains_01 = Dall'orbita bassa le catene formano anomalie lunghe e collegate, suggerendo che gli altopiani siano cuciti insieme sotto la crosta.
        #JNSQscience_gravityScan_EveInSpaceLowPetrolLakes_00 = I bacini lacustri appaiono più pesanti dei dintorni, suggerendo un riempimento denso o una crosta sottile sotto la superficie.
        #JNSQscience_gravityScan_EveInSpaceLowPetrolLakes_01 = Il rilevatore vede un anello superficiale e un centro denso, come se il bacino trattenesse qualcosa di pesante sotto il liquido.
        #JNSQscience_gravityScan_EveInSpaceLowPolarLakes_00 = I bacini dei laghi polari compaiono come disturbi circolari ordinati, ma i loro centri sembrano attenuati rispetto a un cratere normale.
        #JNSQscience_gravityScan_EveInSpaceLowPolarLakes_01 = L'orbita bassa rivela una pulita anomalia ad anello attorno ai laghi, come se le cicatrici d'impatto fossero state riparate dal basso.
