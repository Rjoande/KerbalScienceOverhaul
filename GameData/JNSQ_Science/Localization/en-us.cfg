        #JNSQscience_bd_soilScoop_KerbinSrfLandedAstronautComplex_00 = The scoop pulls up a layered deposit of lint, snack crumbs, and determination. The crew insists it counts as “regolith” if it’s been there long enough.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedCrawlerway_00 = The scoop digs in, then immediately meets crushed rock packed by decades of rolling mass. A supervisor suggests you stop “excavating the schedule.”
        #JNSQscience_bd_soilScoop_KerbinSrfLandedFlagPole_00 = You try to scoop beside the flagpole and hit something very engineered. Security explains the foundation is “strategically un-scoopable.”
        #JNSQscience_bd_soilScoop_KerbinSrfLandedLaunchPad_00 = The top layer is soot, the next layer is soot, and the third layer is also soot. The pad crew calls it “historical context” and asks you to stand somewhere less explody.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedMissionControl_00 = The scoop finds dust in a corner that mission control swears was cleaned yesterday. Your sample is immediately labeled “unauthorized debris” and placed on a watchlist.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&D_00 = The scoop uncovers a tidy cross-section of soil, then a shiny “test component.” A scientist appears and politely asks you to stop discovering things.
        #JNSQscience_bd_soilScoop_KerbinSrfLandedR&DCentralBuilding_00 = The floor sample contains exactly zero dirt and exactly one warning label. Your report is returned with a note: “Try sampling outside reality next time.”
