        #JNSQscience_bd_multiSpec_CelesInSpaceLowPoles_00 = Le regioni polari si raffreddano rapidamente e mostrano chiazze luminose che persistono tra i passaggi. Se c'è brina, si sta aggrappando per pura cattiveria.
        #JNSQscience_bd_multiSpec_TamInSpaceHigh_00 = Da un'orbita alta, lo spettro di Tam trema con la rotazione e il terreno ruvido. La risposta migliore è "roccia scura, roccia più scura e altra roccia scura".
