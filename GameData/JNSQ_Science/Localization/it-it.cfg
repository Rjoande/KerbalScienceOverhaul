        #JNSQscience_bd_multiSpec_CelesInSpaceLowHighlands_00 = Gli altipiani si illuminano nelle bande a onda corta e mostrano caratteristiche di assorbimento più chiare, come se fosse esposto materiale più pulito. Le creste sembrano aver resistito più a lungo.
