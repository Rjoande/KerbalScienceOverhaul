@EXPERIMENT_DEFINITION:HAS[#id[bd_ionElec]]
{
	@title = #ScienceRefactor_bd_ionElec_title // Ionization and Electrostatic Analysis
    !RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_ionElec_default_00 // You measure the electrical properties of the atmosphere, looking for ionized atoms and molecules.
        
        InSpace* = #ScienceRefactor_bd_ionElec_default_01 // The instrument searches from ionized particles in the atmosphere.
        InSpace* = #ScienceRefactor_bd_ionElec_default_02 // Ionization and electrostatic data is recorded.

        SunInSpace* = #ScienceRefactor_bd_ionElec_SunInSpace_00 // Kerbol's massive amounts of charged particle emissions are logged.
        SunFlyingHigh* = #ScienceRefactor_bd_ionElec_SunFlyingHigh_00 // This is what fried circuits look like.
        SunInSpaceLow* = #ScienceRefactor_bd_ionElec_SunInSpaceLow_00 // Very high levels of charged particles are detected near Kerbol.
        SunInSpaceLow* = #ScienceRefactor_bd_ionElec_SunInSpaceLow_01 // High levels of electromagnetic interference force the experiment to go into a safe-mode to prevent damage.
        SunInSpaceHigh* = #ScienceRefactor_bd_ionElec_SunInSpaceHigh_00 // Charged particles are detected, possibly carried in solar plasma by the solar winds.
        SunInSpaceHigh* = #ScienceRefactor_bd_ionElec_SunInSpaceHigh_01 // Particle data analysis suggests that Kerbol's emissions are necessary for atmospheric ionization.

        MohoInSpace* = #ScienceRefactor_bd_ionElec_MohoInSpace_00 // Charged particles measurements are recorded from around Moho.
        MohoInSpaceLow* = #ScienceRefactor_bd_ionElec_MohoInSpaceLow_00 // While no atmosphere ionization is detected, there are traces of charged particles being gusted away from the surface by solar winds.
        MohoInSpaceLow* = #ScienceRefactor_bd_ionElec_MohoInSpaceLow_01 // Data collected reveals a lack of the charged particles normally found in planets with an atmosphere.
        MohoInSpaceHigh* = #ScienceRefactor_bd_ionElec_MohoInSpaceHigh_00 // The only charged particles detected here seem to be originating from Kerbol instead.

        EveFlyingHigh* = #ScienceRefactor_bd_ionElec_EveFlyingHigh_00 // Sudden peaks in electrostatic readings suggest the possibility of lightning strikes in Eve.
        EveInSpace* = #ScienceRefactor_bd_ionElec_EveInSpace_00 // Charged particles measurements are recorded from around Eve.
        EveInSpaceLow* = #ScienceRefactor_bd_ionElec_EveInSpaceLow_00 // High particle energy flux is detected along Eve's magnetosheath, further suggesting a very strong magnetic field around the planet.
        EveInSpaceHigh* = #ScienceRefactor_bd_ionElec_EveInSpaceHigh_00 // Charged particles are detected and mapped along Eve's magnetotail.

        GillyInSpace* = #ScienceRefactor_bd_ionElec_GillyInSpace_00 // Particle ionization measurements are taken from around Gilly.
        GillyFlyingHigh* = #ScienceRefactor_bd_ionElec_GillyFlyingHigh_00 // Further analysis confirms the lack of atmosphere.
        GillyInSpaceLow* = #ScienceRefactor_bd_ionElec_GillyInSpaceLow_00 // No interaction with solar particles suggest a lack of atmosphere.
        GillyInspaceHigh* = #ScienceRefactor_bd_ionElec_GillyInspaceHigh_00 // Nothing interesting on the sensors.

        KerbinFlyingHigh* = #ScienceRefactor_bd_ionElec_KerbinFlyingHigh_00 // Ionized molecules in the upper atmosphere seem to reflect radio waves back to the surface.
        KerbinFlyingHigh* = #ScienceRefactor_bd_ionElec_KerbinFlyingHigh_01 // The sensor detects electrical storms below.
        KerbinInSpace* = #ScienceRefactor_bd_ionElec_KerbinInSpace_00 // Charged particle measurements are taken from around Kerbin.
        KerbinInSpaceLow* = #ScienceRefactor_bd_ionElec_KerbinInSpaceLow_00 // Ionized particles interact with the ionosphere to form bright auroras.
        KerbinInSpaceLow* = #ScienceRefactor_bd_ionElec_KerbinInSpaceLow_01 // Belts of some form of energy are detected well inside Kerbin's magnetosphere.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_ionElec_KerbinInSpaceHigh_00 // Ionization levels decrease farther away from the planet's magnetosheath.

        MunFlyingHigh* = #ScienceRefactor_bd_ionElec_MunFlyingHigh_00 // Zero data is good data, right?
        MunInSpace* = #ScienceRefactor_bd_ionElec_MunInSpace_00 // Charged particle readings are collected from around the Mun.
        MunInSpaceLow* = #ScienceRefactor_bd_ionElec_MunInSpaceLow_00 // Despite the lack of electrical activity, Mission Control notes that any future Mun rock samples collected be placed in anti-static bags.
        MunInSpaceHigh* = #ScienceRefactor_bd_ionElec_MunInSpaceHigh_00 // It appears that an atmosphere, which the Mun lacks, is required for stormy weather.

        MinmusFlyingHigh* = #ScienceRefactor_bd_ionElec_MinmusFlyingHigh_00 // No meaningful data. The interns rejoice about not having to comb through these results.
        MinmusInSpace* = #ScienceRefactor_bd_ionElec_MinmusInSpace_00 // Electrostatic data is collected from space above Minmus.
        MinmusInSpaceLow* = #ScienceRefactor_bd_ionElec_MinmusInSpaceLow_00 // Electrostatic analysis complete: Kiwi.
        MinmusInSpaceHigh* = #ScienceRefactor_bd_ionElec_MinmusInSpaceHigh_00 // With no atmosphere activity detected, Mission Control cancels all Minmus missions involving meteorologists.
        MinmusInSpaceHigh* = #ScienceRefactor_bd_ionElec_MinmusInSpaceHigh_01 // A very faint trail of charged particles appears to follow Minmus.

        DunaFlyingHigh* = #ScienceRefactor_bd_ionElec_DunaFlyingHigh_00 // Although weak, Duna's atmosphere is definitely capable of electrostatic interaction.
        DunaInSpace* = #ScienceRefactor_bd_ionElec_DunaInSpace_00 // Basic charged particle measurements are recorded from the Duna system.
        DunaInSpaceLow* = #ScienceRefactor_bd_ionElec_DunaInSpaceLow_00 // Measurements reveal aurora are generated as solar particles interact with certain areas of the lower atmosphere.
        DunaInSpaceHigh* = #ScienceRefactor_bd_ionElec_DunaInSpaceHigh_00 // Charged particles are faintly detected at low altitudes in the thin Dunan atmosphere.

        IkeFlyingHigh* = #ScienceRefactor_bd_ionElec_IkeFlyingHigh_00 // No atmospheric data to report, but a faint electrical signal is detected coming from the surface.
        IkeInSpace* = #ScienceRefactor_bd_ionElec_IkeInSpace_00 // The instrument records particle levels near Ike.
        IkeInSpaceLow* = #ScienceRefactor_bd_ionElec_IkeInSpaceLow_00 // Electrostatic results confirm a lack of atmosphere around Ike.
        IkeInSpaceHigh* = #ScienceRefactor_bd_ionElec_IkeInSpaceHigh_00 // Ike appears to have a fairly strong effect in solar particles traversing the Duna system.

        DresFlyingHigh* = #ScienceRefactor_bd_ionElec_DresFlyingHigh_00 // Electrostatic data is inconclusive. Mission Control notes something about recruiting astronaut electricians.
        DresInSpace* = #ScienceRefactor_bd_ionElec_DresInSpace_00 // Charged particle data is recorded around Dres.
        DresInSpaceLow* = #ScienceRefactor_bd_ionElec_DresInSpaceLow_00 // Charged particles from Kerbol seem to bombard the surface directly with inconclusive results.
        DresInSpaceHigh* = #ScienceRefactor_bd_ionElec_DresInSpaceHigh_00 // No data from high above Dres indicate a lack of an atmosphere.

        JoolFlyingHigh* = #ScienceRefactor_bd_ionElec_JoolFlyingHigh_00 // Deep in the atmosphere, liquid elements are shown to be electrically conductive, like metals.
        JoolInSpace* = #ScienceRefactor_bd_ionElec_JoolInSpace_00 // Charged particle data from the Jool system is recorded.
        JoolInSpaceLow* = #ScienceRefactor_bd_ionElec_JoolInSpaceLow_00 // Jool is believed also have auroras as ionized particles are also detected interacting with the upper atmosphere.
        JoolInSpaceLow* = #ScienceRefactor_bd_ionElec_JoolInSpaceLow_01 // Jool's cloud layers and belts have different electrostatic levels suggesting varied speeds and altitudes.
        JoolInSpaceHigh* = #ScienceRefactor_bd_ionElec_JoolInSpaceHigh_00 // Jool is recorded to have a large deflective effect on solar particles.
        JoolInSpaceHigh* = #ScienceRefactor_bd_ionElec_JoolInSpaceHigh_01 // The massive gas giant generates a lot of peculiar electrostatic results, providing months of paperwork for the lab techs.

        LaytheFlyingHigh* = #ScienceRefactor_bd_ionElec_LaytheFlyingHigh_00 // The upper atmosphere contains many particularly active charged ions.
        LaytheInSpace* = #ScienceRefactor_bd_ionElec_LaytheInSpace_00 // Electrostatic scan from above Laythe completed.
        LaytheInSpaceLow* = #ScienceRefactor_bd_ionElec_LaytheInSpaceLow_00 // Ionized particles detected. It is inconclusive whether they generate auroras.
        LaytheInSpaceHigh* = #ScienceRefactor_bd_ionElec_LaytheInSpaceHigh_00 // Charged particle interactions are detected. Laythe is confirmed to have a very active atmosphere.

        VallFlyingHigh* = #ScienceRefactor_bd_ionElec_VallFlyingHigh_00 // ELIX is not detecting any electrostatic interactions.
        VallInSpace* = #ScienceRefactor_bd_ionElec_VallInSpace_00 // ELIX scan complete. The interns rejoice!
        VallInSpaceLow* = #ScienceRefactor_bd_ionElec_VallInSpaceLow_00 // The scientists try different settings, finally announcing the lack of atmosphere.
        VallInSpaceHigh* = #ScienceRefactor_bd_ionElec_VallInSpaceHigh_00 // Initial scans are detecting charged particles but they could be from Jool.

        TyloFlyingHigh* = #ScienceRefactor_bd_ionElec_TyloFlyingHigh_00 // Very faint signals are detected while passing over a number of impact craters.
        TyloInSpace* = #ScienceRefactor_bd_ionElec_TyloInSpace_00 // ELIX data scan results received.
        TyloInSpaceLow* = #ScienceRefactor_bd_ionElec_TyloInSpaceLow_00 // Tylo also has no atmosphere for Kerbol plasma to interact with.
        TyloInSpaceHigh* = #ScienceRefactor_bd_ionElec_TyloInSpaceHigh_00 // It appears that Tylo has no atmosphere either.

        BopFlyingHigh* = #ScienceRefactor_bd_ionElec_BopFlyingHigh_00 // There are unexplained electrical anomalies coming from under the surface.
        BopInSpace* = #ScienceRefactor_bd_ionElec_BopInSpace_00 // Electrostatic data recorded. No atmosphere detected.
        BopInSpaceLow* = #ScienceRefactor_bd_ionElec_BopInSpaceLow_00 // ELIX detects irregular electrical pulses. Are those prime numbers?
        BopInSpaceHigh* = #ScienceRefactor_bd_ionElec_BopInSpaceHigh_00 // Initial sca- *static* dete...ed no *static* -mosphere.

        PolFlyingHigh* = #ScienceRefactor_bd_ionElec_PolFlyingHigh_00 // Faint signals detected above site P013-N.
        PolInSpace* = #ScienceRefactor_bd_ionElec_PolInSpace_00 // Data stream received. ELIX data from Pol has been recorded.
        PolInSpaceLow* = #ScienceRefactor_bd_ionElec_PolInSpaceLow_00 // No atmosphere detected around the moon.
        PolInSpaceHigh* = #ScienceRefactor_bd_ionElec_PolInSpaceHigh_00 // A couple of charged particle "belts" were detected, caused by Jool, but they faded as we approached Pol.

        EelooFlyingHigh* = #ScienceRefactor_bd_ionElec_EelooFlyingHigh_00 // ELIX was set to the highest sensitivity, but nothing was picked up.
        EelooInSpace* = #ScienceRefactor_bd_ionElec_EelooInSpace_00 // Electrostatic data is collected from space above Eeloo.
        EelooInSpaceLow* = #ScienceRefactor_bd_ionElec_EelooInSpaceLow_00 // Eeloo appears to be void of any electrostatic charge.
        EelooInSpaceLow* = #ScienceRefactor_bd_ionElec_EelooInSpaceLow_01 // Could solar wind be reacting with the spacecraft's expelled propellant?
        EelooInSpaceHigh* = #ScienceRefactor_bd_ionElec_EelooInSpaceHigh_00 // Very faint signals are picked up but do not appear to come from Eeloo.

        SarnusInSpace* = #ScienceRefactor_bd_ionElec_SarnusInSpace_00 // Electrostatic data from around Sarnus received.
        SarnusInSpaceLow* = #ScienceRefactor_bd_ionElec_SarnusInSpaceLow_00 // Very powerful lightning discharges detected below, measuring  several thousand times stronger than back home!
        SarnusInSpaceLow* = #ScienceRefactor_bd_ionElec_SarnusInSpaceLow_01 // Electrostatic measurements suggest the presence of a highly conductive metallic layer.
        SarnusInSpaceHigh* = #ScienceRefactor_bd_ionElec_SarnusInSpaceHigh_00 // Powerful electrical storms seem to be present in the atmosphere.
        SarnusInSpaceHigh* = #ScienceRefactor_bd_ionElec_SarnusInSpaceHigh_01 // Trapped particles are detected which seem to accumulate around the poles and should produce bright auroras.

        TektoFlyingHigh* = #ScienceRefactor_bd_ionElec_TektoFlyingHigh_00 // The instrument records evidence of a triboelectric effect on the surface, meaning that some of Tekto's sand can become statically charged.
        TektoInSpaceLow* = #ScienceRefactor_bd_ionElec_TektoInSpaceLow_00 // Detection of clumps of ionized particles could indicate the presence of auroras in the atmosphere.
        TektoInSpaceHigh* = #ScienceRefactor_bd_ionElec_TektoInSpaceHigh_00 // The instrument registers some activity which could be interactions caused by Sarnus' magnetosphere.

        SlateInSpaceHigh* = #ScienceRefactor_bd_ionElec_SlateInSpaceHigh_00 // Zero data is good data, right?
        SlateInSpaceHigh* = #ScienceRefactor_bd_ionElec_SlateInSpaceHigh_01 // Nothing interesting on the sensors.
        SlateInSpaceLow* = #ScienceRefactor_bd_ionElec_SlateInSpaceLow_00 // ELIX scan complete. The interns rejoice! Then are all dismissed for not finding any atmosphere.
        SlateInSpaceLow* = #ScienceRefactor_bd_ionElec_SlateInSpaceLow_01 // Electrostatic results confirm a lack of atmosphere.

        HaleInSpaceHigh* = #ScienceRefactor_bd_ionElec_HaleInSpaceHigh_00 // Zero data is good data, right?
        HaleInSpaceHigh* = #ScienceRefactor_bd_ionElec_HaleInSpaceHigh_01 // No data from high above Hale indicate a lack of an atmosphere.
        HaleInSpaceLow* = #ScienceRefactor_bd_ionElec_HaleInSpaceLow_00 // Electrostatic results confirm a lack of atmosphere.

        OvokInSpaceHigh* = #ScienceRefactor_bd_ionElec_OvokInSpaceHigh_00 // Nothing interesting on the sensors.
        OvokInSpaceLow* = #ScienceRefactor_bd_ionElec_OvokInSpaceLow_00 // The scientists try different settings, finally announcing the lack of atmosphere.

        UrlumInSpace* = #ScienceRefactor_bd_ionElec_UrlumInSpace_00 // Charged particle data from around Urlum is recoded.
        UrlumInSpaceLow* = #ScienceRefactor_bd_ionElec_UrlumInSpaceLow_00 // Charged particle data shows more activity towards the southern pole of Urlum's magnetic field.
        UrlumInSpaceLow* = #ScienceRefactor_bd_ionElec_UrlumInSpaceLow_01 // Urlum's cloud layers and belts have different electrostatic levels suggesting varied speeds and altitudes.
        UrlumInSpaceHigh* = #ScienceRefactor_bd_ionElec_UrlumInSpaceHigh_00 // The planets shows interesting interaction with solar plasma, including some localized activity.

        WalInSpaceHigh* = #ScienceRefactor_bd_ionElec_WalInSpaceHigh_00 // Instrument recordings confirm the lack of atmospheric ionization.
        WalInSpaceHigh* = #ScienceRefactor_bd_ionElec_WalInSpaceHigh_01 // Wal appears to have no atmosphere at all.
        WalInSpaceLow* = #ScienceRefactor_bd_ionElec_WalInSpaceLow_00 // Background readings could suggest some conductive, metallic, material is present on Wal's surface.

        TalInSpaceHigh* = #ScienceRefactor_bd_ionElec_TalInSpaceHigh_00 // The instruments does not detect any atmosphere around the moon.
        TalInSpaceLow* = #ScienceRefactor_bd_ionElec_TalInSpaceLow_00 // The instrument's data shows the possibility that there are very conductive metals on the moon.
        TalInSpace* = #ScienceRefactor_bd_ionElec_TalInSpace_00 // While there is no atmosphere detected, Tal has some interesting conductivity readings.

        PriaxInSpaceHigh* = #ScienceRefactor_bd_ionElec_PriaxInSpaceHigh_00 // The effects of Priax's orbit are detectable in Urlum's upper atmosphere.
        PriaxInSpaceLow* = #ScienceRefactor_bd_ionElec_PriaxInSpaceLow_00 // There may be some conductive metals inside Priax, or it could just be a spike measured coming from Urlum. Hard to tell.

        PoltaInSpaceHigh* = #ScienceRefactor_bd_ionElec_PoltaInSpaceHigh_00 // The instrument detects signs of some particles being ejected by the moon. Could it be a cryo-volcano?
        PoltaInSpaceLow* = #ScienceRefactor_bd_ionElec_PoltaInSpaceLow_00 // Polta appears to be void of electrostatic charge and atmosphere.

        NeidonInSpace* = #ScienceRefactor_bd_ionElec_NeidonInSpace_00 // Neidon has a very distinctive electrostatic signature, likely caused by the its unique atmospheric chemistry.
        NeidonInSpaceHigh* = #ScienceRefactor_bd_ionElec_NeidonInSpaceHigh_00 // Measurements reveal the presence of a strong electrostatic field in the atmosphere.
        NeidonInSpaceLow* = #ScienceRefactor_bd_ionElec_NeidonInSpaceLow_00 // The instrument's data signals the presence of electrically conductive liquids creating a magnetic dynamo via convective fluid motion.

        ThatmoInSpaceHigh* = #ScienceRefactor_bd_ionElec_ThatmoInSpaceHigh_00 // Thatmo is found to have some very faint activity on its upper atmosphere, but the processes at hand are unknown.
        ThatmoInSpaceLow* = #ScienceRefactor_bd_ionElec_ThatmoInSpaceLow_00 // The electrostatic experiment continues to detect some readings suggesting that there is electrostatic activity occurring with the sublimated Nitrogen spewing from Thatmo's geysers.
    }
}