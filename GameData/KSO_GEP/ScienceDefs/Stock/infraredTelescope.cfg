@EXPERIMENT_DEFINITION:HAS[#id[infraredTelescope]]
{
    %RESULTS
    {
        GrannusInSpaceHigh* = #GEPscience_farKerbol_00
        GrannusInSpaceHigh* = #GEPscience_farKerbol_01
        GrannusInSpaceHigh* = #GEPscience_farKerbol_02
        GrannusInSpaceHigh* = #GEPscience_farKerbol_03
        GrannusInSpaceHigh* = #GEPscience_farKerbol_04
        GrannusInSpaceHigh* = #GEPscience_farKerbol_05
        GrannusInSpaceHigh* = #GEPscience_farKerbol_06
        GrannusInSpaceHigh* = #GEPscience_farKerbol_IR_00 // Kerbol is a faint, distant point in the infrared. You stare at the pixel longer than the protocol requires, then pretend you were checking calibration.
		GrannusInSpaceHigh* = #GEPscience_infraredTelescope_GrannusInSpaceHigh_00 // The dim red sun keeps flooding the sensors, so you hide in a long eclipse and watch the colder, quieter sky drift by while Mission Control’s replies arrive late.
		GrannusInSpaceHigh* = #GEPscience_infraredTelescope_GrannusInSpaceHigh_01 // You map thermal structure across the star and discover a new scientific unit: “very.”
		GrannusInSpaceHigh* = #GEPscience_infraredTelescope_GrannusInSpaceHigh_02 // The data suggests “a nearby heat source.” You file a second report clarifying that the heat source is, in fact, the star you are orbiting.
		GrannusInSpaceHigh* = #GEPscience_infraredTelescope_GrannusInSpaceHigh_03 // The IR imager confirms Grannus is hot. This is less a discovery and more a strongly worded reminder.
		TaranisInSpaceHigh* = #GEPscience_infraredTelescope_TaranisInSpaceHigh_00 // You time observations to the planet’s shadow to cool the optics, then catch faint heat-signatures of faraway targets before the red glare finds you again.
		ToutatisInSpaceHigh* = #GEPscience_infraredTelescope_ToutatisInSpaceHigh_00 // Using the thin twilight as a reference, you subtract the baked and frozen halves from the background and discover the universe is full of cold things that still feel very far away.
        NodensInSpaceHigh* = #GEPscience_infraredTelescope_NodensInSpaceHigh_00 // You tuck the telescope behind Nodens’ dark limb to let it cool, then stare into an unfamiliar, cold sky while the red sun keeps trying to photobomb the detectors and Mission Control answers late.
		BelisamaInSpaceHigh* = #GEPscience_infraredTelescope_BelisamaInSpaceHigh_00 // Belisama and Nodens hang in the same places like they signed a contract, which makes pointing easy—until you realize the “stable” view is still under a dim red sun and every calibration ping has to travel a very long way.
		SucellusInSpaceHigh* = #GEPscience_infraredTelescope_SucellusInSpaceHigh_00 // Sucellus contributes almost nothing to the thermal background, which is somehow more unsettling than helpful; the universe looks colder out here, and your data packets feel like they take longer than physics should allow.
		CaireenInSpaceHigh* = #GEPscience_infraredTelescope_CaireenInSpaceHigh_00 // Tiny Caireen gives you quick, sharp eclipses for cooling the optics, and then it’s back to watching faint heat-signatures crawl across a sky that doesn’t resemble any star chart you grew up with.
        SironaInSpaceHigh* = #GEPscience_infraredTelescope_SironaInSpaceHigh_00 // Sirona’s rings glow with their own faint warmth, throwing tricky reflections into the optics; you use the planet’s shadow to cool down, then watch the unfamiliar cold sky slide past under the dim red sun.
		AirmedInSpaceHigh* = #GEPscience_infraredTelescope_AirmedInSpaceHigh_00 // With Airmed below as a steady dark reference, you subtract its weak thermal haze and pick out distant, colder targets—by the time Mission Control replies, the telescope has already moved on.
		BorvoInSpaceHigh* = #GEPscience_infraredTelescope_BorvoInSpaceHigh_00 // Borvo’s surface contributes just enough warmth to complicate the background, so you spend most of the pass doing math and waiting for the detectors to settle in a sky that still doesn’t feel like home.
		DamonaInSpaceHigh* = #GEPscience_infraredTelescope_DamonaInSpaceHigh_00 // Damona gives you quick eclipses for calibration and cooling, then it’s back to staring into a strange infrared universe while the red sun keeps trying to saturate everything at the worst possible moment.
        EponaInSpaceHigh* = #GEPscience_infraredTelescope_EponaInSpaceHigh_00 // You swing the telescope past Epona’s nightside and watch faint warmth leak from terrain that never seems to “cool right” under a dim red sun; the confirmation from home arrives after you’ve already taken the next set.
		RosmertaInSpaceHigh* = #GEPscience_infraredTelescope_RosmertaInSpaceHigh_00 // Rosmerta’s broad shadow makes a perfect cold soak for the optics, and the sky beyond looks unfamiliar and deep; your timing notes include “wait for reply… still waiting.”
		RAB-58EInSpaceHigh* = #GEPscience_infraredTelescope_RAB-58EInSpaceHigh_00 // The little irregular moon spins its hot and cold faces through the field of view like a bad calibration target, but once the detectors settle you catch distant heat-signatures that feel impossibly far from any comfortingly normal star.
		CernunnosInSpaceHigh* = #GEPscience_infraredTelescope_CernunnosInSpaceHigh_00 // Cernunnos contributes almost nothing to the infrared background, which should be good news; instead it makes the universe look colder and quieter, as if the red sun never really reaches out here.
    }
}