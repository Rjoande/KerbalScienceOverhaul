@EXPERIMENT_DEFINITION:HAS[#id[bd_weather]]
{
    %RESULTS
    {
        SunInSpaceHigh* = #JNSQscience_bd_weather_SunInSpaceHigh_00 // From this far out, the Sun’s outer glow ebbs and brightens in slow pulses; the “weather map” is just turbulence with confidence.
		SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_weather_SunInSpaceLowNorthPolarZone_00 // The polar region is laced with faint streamers and open-looking structures, as if the wind has found a shortcut off the surface.
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_weather_SunInSpaceLowNorthSubpolarZone_00 // Bright filaments twist and unwind along the band, tracing magnetic lanes that refuse to stay straight.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_weather_SunInSpaceLowNorthTemperateZone_00 // A mottled field of tiny bright cells boils in place; the atmosphere down there is never, ever at rest.
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_weather_SunInSpaceLowNorthTropicZone_00 // Looping arcs rise and fade along the tropic zone, like the Sun is practicing knots in glowing gas.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_weather_SunInSpaceLowEquatorialZone_00 // The equatorial belt looks busier and more sheared; bands slide past each other and pull the bright structures into long curls.
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_weather_SunInSpaceLowSouthTropicZone_00 // A chain of bright patches blooms and collapses in sequence, as if the surface is “forecasting” by flashing.
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_weather_SunInSpaceLowSouthTemperateZone_00 // Delicate ripples and streaks drift across the band; the flow patterns suggest strong winds in layers you can’t quite see.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_weather_SunInSpaceLowSouthSubpolarZone_00 // Faint plumes feather outward while darker gaps open between them, hinting at regions where the atmosphere is venting harder.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_weather_SunInSpaceLowSouthPolarZone_00 // The southern pole wears a thin, bright cap of wisps that stretch outward and then snap back into new shapes.

        EveInSpaceHigh* = #JNSQscience_bd_weather_EveInSpaceHigh_00 // From this height, Eve looks wrapped in endless violet cloud decks, with bright scars where storms have punched upward.
		EveInSpaceHigh* = #JNSQscience_bd_weather_EveInSpaceHigh_01 // A vast swirl dominates one hemisphere; the atmosphere seems to prefer “dramatic” as its default state.
		EveInSpaceLowPoles* = #JNSQscience_bd_weather_EveInSpaceLowPoles_00 // A pale polar haze rotates slowly, tracing a cold vortex that keeps its borders neat and unfriendly.
		EveInSpaceLowPoles* = #JNSQscience_bd_weather_EveInSpaceLowPoles_01 // Thin, bright cloud bands skim the pole like frost patterns, except they’re made of trouble.
		EveInSpaceLowLowlands* = #JNSQscience_bd_weather_EveInSpaceLowLowlands_00 // The lowlands simmer beneath a thick blanket of cloud; convection blooms in slow, heavy pulses.
		EveInSpaceLowLowlands* = #JNSQscience_bd_weather_EveInSpaceLowLowlands_01 // You spot clustered storm cells merging like they’re sharing a plan you’re not cleared to read.
		EveInSpaceLowMidlands* = #JNSQscience_bd_weather_EveInSpaceLowMidlands_00 // The midlands show broken cloud fields and sharp boundaries—fronts that look clean until you zoom in.
		EveInSpaceLowMidlands* = #JNSQscience_bd_weather_EveInSpaceLowMidlands_01 // Wispy gaps open and close in the haze like the planet is blinking at your camera.
		EveInSpaceLowHighlands* = #JNSQscience_bd_weather_EveInSpaceLowHighlands_00 // Over the highlands, clouds pile up along the slopes, stacked into layers that refuse to settle down.
		EveInSpaceLowHighlands* = #JNSQscience_bd_weather_EveInSpaceLowHighlands_01 // The terrain wrinkles the airflow into long wave patterns; the cloud tops look combed, then abruptly shredded.
		EveInSpaceLowPeaks* = #JNSQscience_bd_weather_EveInSpaceLowPeaks_00 // The peaks carve crisp wind shadows into the cloud deck, leaving clear “no-fly” signatures downwind.
		EveInSpaceLowPeaks* = #JNSQscience_bd_weather_EveInSpaceLowPeaks_01 // Thin streamers peel off the summits and unravel into turbulence, like ribbon caught in a fan.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_weather_EveInSpaceLowExplodiumSea_00 // Above the Explodium Sea, brighter cloud towers cluster as if the surface is feeding them extra energy.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_weather_EveInSpaceLowExplodiumSea_01 // A humid plume rises, spreads, and sparks off a ring of storms that keep circling back for more.
		EveInSpaceLowMountains* = #JNSQscience_bd_weather_EveInSpaceLowMountains_00 // Mountain ridges steer the weather into lanes—cloud streets marching in formation across the sky.
		EveInSpaceLowMountains* = #JNSQscience_bd_weather_EveInSpaceLowMountains_01 // The lee side boils with chaotic eddies; the atmosphere here is doing its best impression of shaken soup.
		EveInSpaceLowShores* = #JNSQscience_bd_weather_EveInSpaceLowShores_00 // A sharp coastal boundary shows up as a scalloped cloud edge pushing inland, then breaking into scattered squalls.
		EveInSpaceLowShores* = #JNSQscience_bd_weather_EveInSpaceLowShores_01 // The shoreline paints a bright line in the cloud field—sea breeze meets land heat and starts an argument.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_weather_EveInSpaceLowPolarLakes_00 // Over the polar lakes, low foglike haze clings stubbornly, only thinning where winds shear it apart.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_weather_EveInSpaceLowPolarLakes_01 // Small but persistent cloud puffs form in clusters, like the lakes are quietly exhaling into the cold air.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_weather_EveInSpaceLowPetrolLakes_00 // Dark lake surfaces sit under a thin veil of haze; localized clouds pop up, then flatten into smeared bands.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_weather_EveInSpaceLowPetrolLakes_01 // You catch a slick-looking boundary layer hugging the lakes, with wisps peeling off downwind.
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_weather_EveInSpaceLowSeaofAkron_00 // Long arcs of cloud curve over the Sea of Akron, outlining a broad circulation that’s gathering itself.
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_weather_EveInSpaceLowSeaofAkron_01 // The cloud tops dimple and brighten in repeating patterns—organized convection with ominous patience.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_weather_EveInSpaceLowSeaofNessus_00 // A thick overcast blankets the Sea of Nessus, with occasional bright breaks where towering cells punch through.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_weather_EveInSpaceLowSeaofNessus_01 // The storm field is so uniform it looks manufactured; the instruments insist it’s “natural,” reluctantly.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_weather_EveInSpaceLowSeaofTaniwha_00 // Narrow storm bands rake across the Sea of Taniwha, aligned like scratches from a giant claw.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_weather_EveInSpaceLowSeaofTaniwha_01 // A rotating cluster lingers offshore, wobbling in place as if deciding where to go cause problems next.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_weather_EveInSpaceLowSeaofGigan_00 // The Sea of Gigan hosts a sprawling swirl of cloud, its outer bands spiraling into the surrounding haze.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_weather_EveInSpaceLowSeaofGigan_01 // Lightning-like flashes flicker within the brightest towers; whatever’s happening down there is energetic.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_weather_EveInSpaceLowSeaofRodan_00 // Over the Sea of Rodan, fast-moving cloud shadows suggest strong winds tearing at multiple layers at once.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_weather_EveInSpaceLowSeaofRodan_01 // A clean front line advances across the sea, leaving a mottled, turbulent wake behind it.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_weather_EveInSpaceLowSeaofGojira_00 // A massive storm complex sprawls over the Sea of Gojira, with a dense core and ragged outer bands.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_weather_EveInSpaceLowSeaofGojira_01 // The cloud deck bulges upward in a wide dome—deep convection doing heavy lifting in heavy air.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_weather_EveInSpaceLowSeaofGhidorah_00 // Three distinct storm clusters over the Sea of Ghidorah begin to merge, forming a lopsided supercell chain.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_weather_EveInSpaceLowSeaofGhidorah_01 // The imagery shows layered flow crossing directions; the atmosphere is multitasking aggressively.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_weather_EveInSpaceLowSeaofBagorah_00 // The Sea of Bagorah looks deceptively calm, with smooth cloud sheets and only a few isolated towers.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_weather_EveInSpaceLowSeaofBagorah_01 // A broad haze curtain drifts over the water, thinning at the edges into delicate streamers.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_weather_EveInSpaceLowKrakensWell_00 // A persistent spiral sits over KrakensWell, tightly wound and far too stable to be comforting.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_weather_EveInSpaceLowKrakensWell_01 // The central eye clears briefly, then refills with cloud—like the storm noticed you watching and closed the blinds.

        KerbinInSpaceLowMidlands* = #JNSQscience_bd_weather_KerbinInSpaceLowMidlands_00 // Broad bands of fair-weather clouds drift over the midlands, keeping their secrets and their shade nicely organized.
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_weather_KerbinInSpaceLowMidlands_01 // Mostly calm, scattered puffs, with a high chance of Mission Control saying “that’s not a forecast, that’s poetry.”
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_weather_KerbinInSpaceLowMidlands_02 // The cloud tops look like soft brushstrokes; the data says “benign,” which is scientist for “finally, a break.”
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_weather_KerbinInSpaceLowLowlands_00 // Warm, humid air pools in the lowlands and spins up morning fog that tries very hard to look important.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_weather_KerbinInSpaceLowLowlands_01 // Low visibility at dawn, improving by snacktime; localized showers possible if someone laughs too hard.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_weather_KerbinInSpaceLowLowlands_02 // The weather patterns here are gentle but persistent, like a kerbal trying to open a stuck hatch.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridLowlands_00 // Thin veils of dust ride the wind over the arid lowlands, painting the atmosphere in “beige with attitude.”
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridLowlands_01 // Clear skies, gusty afternoons, and a nonzero probability of dust in places dust should not be.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridLowlands_02 // Heat-driven turbulence shows up clearly in the imagery, bubbling up like a pot that should have been watched.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridMidlands_00 // Dust devils sketch quick spirals across the arid midlands, then vanish as if they remembered they left the oven on.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridMidlands_01 // Sunny, very dry, with isolated whirlwinds migrating toward the nearest unsuspecting rover.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridMidlands_02 // The thermal plume structure is textbook-perfect—assuming the textbook was written by someone who likes chaos.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridHighlands_00 // Jagged ridges stir the airflow into choppy waves; clouds form, shred, and reform like indecisive paperwork.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridHighlands_01 // High winds along the rough terrain, scattered high cloud, and one very smug weather satellite.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_weather_KerbinInSpaceLowAridHighlands_02 // The images show sharp lee-side turbulence; your instruments politely request you do not fly here.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_weather_KerbinInSpaceLowAridMountains_00 // The arid mountains carve the sky into clear lanes and sudden cloud piles, as if the air is being herded.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_weather_KerbinInSpaceLowAridMountains_01 // Strong ridge winds, occasional lenticular clouds, and turbulence rated “spicy.”
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_weather_KerbinInSpaceLowAridMountains_02 // A tight wave train forms downwind of the peaks; the data looks like it’s trying to play accordion.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_weather_KerbinInSpaceLowGreatLake_00 // A crisp lake-breeze boundary is visible as a thin line of clouds marching inland with surprising discipline.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_weather_KerbinInSpaceLowGreatLake_01 // Afternoon cloud build-up near the shoreline, with a chance of “why is the lake making weather now?”
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_weather_KerbinInSpaceLowGreatLake_02 // Moisture plumes rise from the lake surface and feed tidy little showers that seem proud of themselves.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_weather_KerbinInSpaceLowInlandWater_00 // Patches of inland water leave humid fingerprints in the air—small, but unmistakable in the imagery.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_weather_KerbinInSpaceLowInlandWater_01 // Scattered cloudlets, light showers, and one instrument panel that keeps trying to call it “pool weather.”
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_weather_KerbinInSpaceLowInlandWater_02 // The atmosphere above these waters is busy but polite, trading heat and vapor without starting a full argument.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_weather_KerbinInSpaceLowKreenwichSea_00 // Along the Kreenwich Sea, long cloud streets line up with the winds like they’re in a parade.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_weather_KerbinInSpaceLowKreenwichSea_01 // Steady coastal breezes, broken cloud, and a 70% chance someone says “ahh, sea air” over comms.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_weather_KerbinInSpaceLowKreenwichSea_02 // A spiral-shaped system lurks offshore, not quite a storm yet—more like a storm thinking about it.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_weather_KerbinInSpaceLowArcticSea_00 // The Arctic Sea is wrapped in cold haze and thin cloud bands that creep along the ice edge.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_weather_KerbinInSpaceLowArcticSea_01 // Freezing fog, scattered snow squalls, and visibility limited to “yes, there is definitely sea down there.”
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_weather_KerbinInSpaceLowArcticSea_02 // Bright ice and dark water sharpen the fronts; the boundary looks like it was drawn with a ruler.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_weather_KerbinInSpaceLowForemansSea_00 // A broad front sweeps over Foremans Sea, dragging layered clouds like a blanket that refuses to stay folded.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_weather_KerbinInSpaceLowForemansSea_01 // Widespread overcast, embedded showers, and occasional dramatic lighting for free.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_weather_KerbinInSpaceLowForemansSea_02 // The storm structure is well-developed and symmetrical, which makes everyone nervous for no scientific reason at all.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_weather_KerbinInSpaceLowTriangulusSea_00 // Over Triangulus Sea, three distinct cloud bands converge into a messy knot that looks suspiciously intentional.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_weather_KerbinInSpaceLowTriangulusSea_01 // Variable winds, scattered storms, and geometry that will not be graded on a curve.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_weather_KerbinInSpaceLowTriangulusSea_02 // The imagery catches rotating cells forming and collapsing in sequence—like a rehearsal for a bigger show.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_weather_KerbinInSpaceLowNorthernSea_00 // The Northern Sea hosts long, curling cloud arcs that trace the prevailing winds with elegant confidence.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_weather_KerbinInSpaceLowNorthernSea_01 // Cool air, brisk seas, and a chance of spray so high it wants to apply for orbit.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_weather_KerbinInSpaceLowNorthernSea_02 // Subtle pressure gradients are visible in the cloud-top textures; it’s the atmosphere leaving notes in the margins.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_weather_KerbinInSpaceLowSub-ArcticSea_00 // The Sub-Arctic Sea alternates between clear patches and sudden walls of cloud, as if flipping pages too fast.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_weather_KerbinInSpaceLowSub-ArcticSea_01 // Cold drizzle near the boundary, fog banks on the move, and temperatures that refuse to pick a side.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_weather_KerbinInSpaceLowSub-ArcticSea_02 // A narrow storm track threads through the region, steering moisture like it has a destination in mind.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_weather_KerbinInSpaceLowEasternSea_00 // Over the Eastern Sea, a clean sea-breeze front pushes inland, leaving a bright scalloped cloud edge behind it.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_weather_KerbinInSpaceLowEasternSea_01 // Fair offshore, cloudier near the coast, with a small chance of “oops, we found a thunderstorm.”
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_weather_KerbinInSpaceLowEasternSea_02 // The cloud field shows organized convection—little towers rising and falling in neat rows like eager recruits.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_weather_KerbinInSpaceLowWesternSea_00 // The Western Sea is mottled with broken cloud and fast-moving shadows, suggesting lively winds below.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_weather_KerbinInSpaceLowWesternSea_01 // Breezy, partly cloudy, and an increasing chance of scattered squalls after the sun warms things up.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_weather_KerbinInSpaceLowWesternSea_02 // A thin line of storms forms offshore; it looks like the atmosphere drew a boundary and underlined it twice.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_weather_KerbinInSpaceLowWelcomeBackIsland_00 // WelcomeBack Island trails a persistent cloud plume downwind, like the island is waving hello with condensation.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_weather_KerbinInSpaceLowWelcomeBackIsland_01 // Localized showers over the island, clearing quickly, and a 100% chance you say “welcome back” at least once.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_weather_KerbinInSpaceLowWelcomeBackIsland_02 // The island’s wake creates a neat gap in the cloud deck; nature’s own “please insert lander here” arrow.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_weather_DunaInSpaceLowIceCaps_00 // Thin, pale clouds cling to the ice cap edge like they’re afraid of falling off the planet.
		DunaInSpaceLowIceCaps* = #JNSQscience_bd_weather_DunaInSpaceLowIceCaps_01 // Bright frost and darker ground draw a sharp front line; the winds seem to patrol it faithfully.
		DunaInSpaceLowHighlands* = #JNSQscience_bd_weather_DunaInSpaceLowHighlands_00 // The highlands kick the thin air into long, delicate wave patterns—pretty, but not reassuring for pilots.
		DunaInSpaceLowHighlands* = #JNSQscience_bd_weather_DunaInSpaceLowHighlands_01 // A faint dust veil streams downwind of the ridges, as if the terrain is gently sanding itself.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_weather_DunaInSpaceLowMidlands_00 // Local winds spin up dusty swirls that come and go with the sun, like a schedule nobody wrote down.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_weather_DunaInSpaceLowMidlands_01 // You catch a small dust storm trying to become a big dust storm, then remembering it has no atmosphere to work with.
		DunaInSpaceLowLowlands* = #JNSQscience_bd_weather_DunaInSpaceLowLowlands_00 // Haze pools in the lowlands, hugging the terrain as if gravity is doing extra work today.
		DunaInSpaceLowLowlands* = #JNSQscience_bd_weather_DunaInSpaceLowLowlands_01 // Dust sheets slide across the basin in slow motion, leaving faint streaks that look like they were drawn with chalk.
		DunaInSpaceLowCraters* = #JNSQscience_bd_weather_DunaInSpaceLowCraters_00 // The crater floors hold onto cold, wispy fog until sunlight pries it loose.
		DunaInSpaceLowCraters* = #JNSQscience_bd_weather_DunaInSpaceLowCraters_01 // Dust drifts collect in sheltered pockets, then spill out in little puffs when the wind changes its mind.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_weather_DunaInSpaceLowRareCraters_00 // These impacts stand out even from orbit—fresh patterns in the dust that steer the winds into odd curls.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_weather_DunaInSpaceLowRareCraters_01 // A thin cloud band forms along a rim, then breaks apart like it’s embarrassed to be called “weather.”
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_weather_DunaInSpaceLowVoronoiCraters_00 // The repeating crater field chops the airflow into a patchwork of tiny eddies and faint dust plumes.
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_weather_DunaInSpaceLowVoronoiCraters_01 // The surface texture makes the haze look pixelated; the meteorologists insist that is not a technical term.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_weather_DunaInSpaceLowNotableCraters_00 // A broad, ring-shaped haze sits over the rim like a halo made of very unromantic dust.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_weather_DunaInSpaceLowNotableCraters_01 // Shadows and dust contrast reveal a gentle circulation pattern trapped inside the basin.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_weather_DunaInSpaceLowExoticCraters_00 // Strange-toned deposits brighten the crater walls, and the winds paint them with thin, migrating dust ribbons.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_weather_DunaInSpaceLowExoticCraters_01 // You spot a fleeting streak of high, icy cloud—more of a hint than a promise.
		DunaInSpaceLowTrenches* = #JNSQscience_bd_weather_DunaInSpaceLowTrenches_00 // Winds funnel through the trenches, leaving long, narrow dust clouds that point like arrows across the surface.
		DunaInSpaceLowTrenches* = #JNSQscience_bd_weather_DunaInSpaceLowTrenches_01 // The channeling is so consistent you could navigate by it—assuming dust arrows are acceptable navigation aids.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_weather_DunaInSpaceLowNotablePlains_00 // Over the plains, the atmosphere looks calm until you notice the whole dust layer sliding sideways.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_weather_DunaInSpaceLowNotablePlains_01 // Subtle ripples in the haze trace steady winds that never seem to take a day off.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_weather_DunaInSpaceLowNotableMountains_00 // The mountains trail banner-like clouds of dust downwind, as if the peaks are trying to signal you.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_weather_DunaInSpaceLowNotableMountains_01 // A clean line of turbulence forms on the lee side; the data reads “do not attempt aerobatics.”
		DunaInSpaceLowMountains* = #JNSQscience_bd_weather_DunaInSpaceLowMountains_00 // Orographic waves ripple through the thin air, carving neat stripes into the dust layer.
		DunaInSpaceLowMountains* = #JNSQscience_bd_weather_DunaInSpaceLowMountains_01 // The peaks puncture the haze and leave sharp wind shadows—nature’s own terrain annotation.
		DunaInSpaceLowVolcano* = #JNSQscience_bd_weather_DunaInSpaceLowVolcano_00 // Warm ground nudges the air upward just enough to gather a stubborn haze column over the volcanic terrain.
		DunaInSpaceLowVolcano* = #JNSQscience_bd_weather_DunaInSpaceLowVolcano_01 // Dust plumes rise and shear off quickly, like the atmosphere is impatient with any vertical ambition.

        JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_weather_JoolInSpaceLowEquatorialBands_00 // The equatorial bands race past in stacked layers; the jet streams look like they’re trying to sand the clouds smooth.
		JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_weather_JoolInSpaceLowExposedLowerDeck_00 // A ragged break in the top deck reveals darker swirls below. The weather team argues whether that counts as “clear skies.”
		JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_weather_JoolInSpaceLowSubpolarBands_00 // The subpolar bands shear into neat curls and knots, like the atmosphere is braiding itself for fun.
		JoolInSpaceLowNorthPole* = #JNSQscience_bd_weather_JoolInSpaceLowNorthPole_00 // A tight polar whirl sits under a pale haze cap, calmly spinning as if it’s been doing this since forever.
		JoolInSpaceLowSouthPole* = #JNSQscience_bd_weather_JoolInSpaceLowSouthPole_00 // The south polar region is a maze of faint streaks and rotating cells—orderly at a glance, chaotic the moment you measure it.
		JoolInSpaceLowStormComplex* = #JNSQscience_bd_weather_JoolInSpaceLowStormComplex_00 // The storm complex dwarfs anything you’ve seen before; its outer bands could swallow entire continents and still have room to stretch.

        LaytheInSpaceLowShores* = #JNSQscience_bd_weather_LaytheInSpaceLowShores_00 // A bright, scalloped cloud edge marks the sea-breeze front pushing inland along the shores.
		LaytheInSpaceLowShores* = #JNSQscience_bd_weather_LaytheInSpaceLowShores_01 // Sun-warmed land kicks up afternoon convection; little towers form just inland, then smear downwind.
		LaytheInSpaceLowShallows* = #JNSQscience_bd_weather_LaytheInSpaceLowShallows_00 // Over the shallows, the water’s color shift matches a thin haze plume that feeds a line of puffy clouds.
		LaytheInSpaceLowShallows* = #JNSQscience_bd_weather_LaytheInSpaceLowShallows_01 // Patchy cloudlets pop up in the moist boundary layer, then flatten into streaks under steady winds.
