        #GEPscience_bd_ionElec_BelisamaInSpaceHigh_00 = Higher up, the readings smooth out—until Belisama slips behind Nodens and the particle flow abruptly goes quiet, like someone muted space.
        #GEPscience_bd_ionElec_SucellusInSpaceLow_00 = With almost no shielding, Sucellus sits bare in the charged stream. The surface seems to charge and discharge in slow, prickly pulses.
        #GEPscience_bd_ionElec_SucellusInSpaceHigh_00 = The ion flux is steady, lonely, and relentless. Mission Control suggests “turn it off and on again” a few minutes too late.
