        EdnaSrfLandedWhites* = #JNSQscience_sspxVisualObservation_EdnaSrfLandedWhites_00 // The surface turns strangely pale, like Edna accidentally wore a dusting of chalk and refused to explain it.

        DakInSpaceLow* = #JNSQscience_sspxVisualObservation_DakInSpaceLow_00 // Dak fills the window like a lumpy potato with an attitude; Edna lurks nearby like it’s keeping an eye on its snack.
        DakInSpaceHigh* = #JNSQscience_sspxVisualObservation_DakInSpaceHigh_00 // Dak becomes a barely-there dot, the kind of object you “observe” mostly by not blinking at the wrong time.
        DakSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_DakSrfLandedLowlands_00 // The ground is uneven in every direction, and the gravity feels like it’s taking frequent breaks.
        DakSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_DakSrfLandedMidlands_00 // You stare across knobby slopes and realize this whole body is basically one big “watch your step.”
        DakSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_DakSrfLandedHighlands_00 // From the highest bumps, Edna dominates the sky—proof that even a potato can have a big neighbor.

        JoolFlyingHigh* = #JNSQscience_sspxVisualObservation_JoolFlyingHigh_00 // The clouds rush past in endless green walls. You suddenly understand why pilots like having “ground” as an option.
        JoolFlyingHigh* = #JNSQscience_sspxVisualObservation_JoolFlyingHigh_00 // Looking out the window feels like staring into a living storm. The turbulence makes the view “interactive.”

        LaytheSrfLandedShores* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedShores_00 // Pale sand, gentle surf, and a suspiciously inviting coastline. You almost forget where you are.
        LaytheSrfLandedShores* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedShores_01 // The waves sound familiar, right up until the shadow of that massive green world slides across the beach.
        LaytheSrfLandedShallows* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedShallows_00 // Sandbars and knee-deep water stretch out like a natural runway that keeps trying to float away.
        LaytheSrfLandedShallows* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedShallows_01 // The tide creeps in and out with quiet confidence, as if it owns your landing legs now.
        LaytheSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedHighlands_00 // From higher ground, the ocean looks endless and the islands look like scattered crumbs.
        LaytheSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedHighlands_01 // The wind carries salt and distant spray, and your window keeps fogging up from you staring too long.
        LaytheSrfLandedMountains* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedMountains_00 // Dark ridgelines cut into the sky while the sea glitters far below like spilled fuel.
        LaytheSrfLandedMountains* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedMountains_01 // Up here the air feels sharper, and the view makes you very aware of how small your habitat is.
        LaytheSrfLandedIceCaps* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedIceCaps_00 // White ice and blue sky meet over a hard, bright horizon that makes your eyes squint on instinct.
        LaytheSrfLandedIceCaps* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedIceCaps_01 // The frozen surface looks calm, but the cold has the same attitude as the ocean: it wants your parts.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedEnclosedFaults_00 // The ground drops into steep cuts and shadowed cracks, like the island tried to split in half and gave up.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedEnclosedFaults_01 // You peer down into the fault and imagine it continuing forever, just out of sight and out of comfort.
        LaytheSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedLowlands_00 // Flat wet ground stretches toward the sea, a quiet place that still manages to feel alien.
        LaytheSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedLowlands_01 // Everything looks soft and easy until you notice how quickly the air turns distant details into haze.
        LaytheSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedMidlands_00 // Rolling terrain rises and falls in gentle humps, with the ocean always waiting at the edge of view.
        LaytheSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_LaytheSrfLandedMidlands_01 // The landscape looks almost like home, except for the constant reminder overhead that it is not.
        LaytheSrfSplashedShores* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShores_00 // The craft bobs in the surf while foam taps the hull like an impatient technician.
        LaytheSrfSplashedShores* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShores_01 // You float just offshore and watch the beach drift past, feeling oddly peaceful for being extremely elsewhere.
        LaytheSrfSplashedShallows* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShallows_00 // Clear water ripples over sand and stone, turning the bottom into a moving mosaic.
        LaytheSrfSplashedShallows* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShallows_01 // Every small wave rocks you gently, as if Laythe is trying to lull you into lowering your guard.
        LaytheSrfSplashedInlandWater* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedInlandWater_00 // The water is calmer here, reflecting the sky in a way that makes the world feel twice as big.
        LaytheSrfSplashedInlandWater* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedInlandWater_01 // You watch tiny ripples spread outward and realize you are the loudest thing on the entire lake.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedKrenwichSea_00 // Long swells roll under you in steady lines, and the horizon is a clean arc of blue and cloud.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedKrenwichSea_01 // The sea feels open and empty, until the green giant above reminds you what system you are in.
        LaytheSrfSplashedArcticSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedArcticSea_00 // Cold chop slaps the hull and the water looks darker, heavier, and less forgiving.
        LaytheSrfSplashedArcticSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedArcticSea_01 // Ice flecks drift by like slow confetti, celebrating your decision-making skills.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedJoolwardSea_00 // The waves glitter under a sky that seems brighter in the direction of the green giant.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedJoolwardSea_01 // You catch yourself staring up more than out, as if the planet overhead is part of the weather.
        LaytheSrfSplashedPolwardSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedPolwardSea_00 // The sea surface is restless here, broken into sharp little ridges by persistent wind.
        LaytheSrfSplashedPolwardSea* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedPolwardSea_01 // Distant clouds smear into pale bands, and the water below answers with darker, colder tones.
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedEnclosedFaults_00 // The water fills the cut like a narrow channel, turning steep walls into a mirror-lined corridor.
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_sspxVisualObservation_LaytheSrfSplashedEnclosedFaults_01 // The fault makes the sky feel thin and far away, as if you are floating inside a crack in the world.
        LaytheFlyingHigh* = #JNSQscience_sspxVisualObservation_LaytheFlyingHigh_00 // Sunlight flashes off endless water as island chains drift by beneath scattered cloud decks.
        LaytheFlyingHigh* = #JNSQscience_sspxVisualObservation_LaytheFlyingHigh_01 // The sky is a vivid blue here, and the green giant above makes it feel like you are flying under an enormous ceiling.

        VallSrfLandedPoles* = #JNSQscience_sspxVisualObservation_VallSrfLandedPoles_00 // The ice goes on forever, tinted blue and silent. Jool hangs above like an unblinking eye.
        VallSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_VallSrfLandedHighlands_00 // Jagged ridges and hard shadows make the landscape look cut from glassy stone.
        VallSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_VallSrfLandedMidlands_00 // The surface is a calm blue-gray emptiness that somehow feels like it is listening.
        VallSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_VallSrfLandedLowlands_00 // Smooth flats stretch out in every direction, daring you to believe this place is gentle.
        VallSrfLandedMountains* = #JNSQscience_sspxVisualObservation_VallSrfLandedMountains_00 // Dark peaks claw at the sky while the cold horizon curves away, sharp and unreal.
        VallInSpaceHigh* = #JNSQscience_ValOnVall_06 // In the end, it looks like we really will have to send Val to Vall.
        VallInSpaceHigh* = #JNSQscience_ValOnVall_07 // You wonder if “Vall” is just short for “Vallentina.”
        Vall* = #JNSQscience_ValOnVall_00 // Someone keeps saying “Val on Vall” over the radio, and now the whole crew can’t stop laughing.

        TyloFlyingHigh* = #JNSQscience_sspxVisualObservation_TyloFlyingHigh_00 // The view is all pale land and thin sky. You keep waiting for the “flying” part to stop being true.
