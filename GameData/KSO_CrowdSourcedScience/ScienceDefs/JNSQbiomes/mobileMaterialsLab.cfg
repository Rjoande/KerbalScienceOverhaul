@EXPERIMENT_DEFINITION:HAS[#id[mobileMaterialsLab]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedLowlands* = #CSS_mobileMaterialsLab_MohoSrfLandedCentralLowlands_00 // The racks holding the samples melt in a highly interesting fashion.
        MohoSrfLandedLowlands* = #CSS_mobileMaterialsLab_MohoSrfLandedSouthWesternLowlands_00 // The materails are currently embroiled in a civil war. You are unable to determine the cause.
        
        EveSrfLandedPetrolLakes* = #CSS_mobileMaterialsLab_EveSrfLandedCraterLake_00 // Most of the paints on the samples have dripped off or turned black.
        EveSrfLandedMountains* = #CSS_mobileMaterialsLab_EveSrfLandedOlympus_00 // Some of the samples of organic material remind you of the results from the time your parents forgot to set the oven timer.
        EveSrfLandedShores* = #CSS_mobileMaterialsLab_EveSrfLandedShallows_00 // You are extremely disappointed to find the ice cream you packed to relax by the beach with has melted and caught fire.
        EveSrfSplashedPetrolLakes* = #CSS_mobileMaterialsLab_EveSrfSplashedCraterLake_00 // The materials look happy as they quickly dissolve in the mix of chemicals that make up this sea.
        EveSrfSplashedShores* = #CSS_mobileMaterialsLab_EveSrfSplashedShallows_00 // Several materials that are quite close to the materials of your ship are readily attacked and destroyed by the fluid.

        KerbinSrfLandedMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_00 // The materials lab has grass-stains on it now from that landing. So much for returning it to the manufacturer for a refund when we are done.
        KerbinSrfLandedMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_01 // You crack open window as you write up the lab report and bask in the warm sunlight and soothing breeze.
        KerbinSrfLandedMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_02 // A blade of grass flies into the lab and lands right in your experiment, ruining the results. Oh well, we'll just make something up for the folks back at KSC.
        KerbinSrfLandedMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_03 // A butterfly flies into your experiment. You spend a distracting amount of time thinking up various non-lethal methods to get rid of it.
        KerbinSrfLandedAridMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedDeserts_00 // The desert dust appears to have contaminated the samples. You learn that deserts aren't a good place to bring expensive science equipment.
        KerbinSrfLandedAridMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedDeserts_01 // Watching the dust swirl among the samples, you realize that you're going to have to spend a lot of time cleaning them up for the next mission.
        KerbinSrfLandedAridMidlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedDeserts_02 // You take your juice pack and pour it all over the samples to prepare them for the dry, dusty ordeal they are about to face. Mission Control sighs and tells you to use a different set of samples.
        KerbinSrfLandedAridHighlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedBadlands_00 // You expose the samples to the badlands of Kerbin, but worry what it will do to them.
        KerbinSrfLandedAridHighlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedBadlands_01 // Turns out the Badlands is a bad place for a materials lab. Who knew?
        KerbinSrfLandedAridHighlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedBadlands_02 // Some of your samples are starting to give you attitude. You're pretty sure this a bad sign.
        KerbinSrfLandedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfLandedNorthernIceShelf_00 // The materials have congregated around the bay lamp for warmth. It must be pretty darn cold.
        KerbinSrfLandedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfLandedNorthernIceShelf_01 // The icy samples keep slipping away from being grabbed. Don't they want to come into the warmth?
        KerbinSrfLandedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfLandedSouthernIceShelf_00 // Your samples are huddling together for warmth in the frigid environment.
        KerbinSrfLandedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfLandedSouthernIceShelf_01 // The thin glaze of ice that has formed on the bay doors cracks and cascades off as they grind open.
        KerbinSrfSplashedMidlands* = #CSS_mobileMaterialsLab_KerbinSrfSplashedGrasslands_00 // As expected, most of the samples sink while others float out. You swear you saw a yellow rubber ducky among them.
        KerbinSrfSplashedAridMidlands* = #CSS_mobileMaterialsLab_KerbinSrfSplashedDeserts_00 // Several of the samples expand from soaking up water. The cactus looks particuarly pleased.
        KerbinSrfSplashedAridHighlands* = #CSS_mobileMaterialsLab_KerbinSrfSplashedBadlands_00 // A few samples have melted into the water, and will probably create new forms of Badlands life.
        KerbinSrfSplashedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfSplashedNorthernIceShelf_00 // You see a rubber duck float out of the Materials Bay, frozen in a block of ice.
        KerbinSrfSplashedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfSplashedSouthernIceShelf_00 // The cold water reacts slowly with even the volatile materials.
        
        MunSrfLandedLowlands* = #CSS_mobileMaterialsLab_MunSrfLandedNorthernBasin_00 // All the materials seem to be squished to the bottom of their containers. It takes you a while to complete your experiments.
        MunSrfLandedNotableCraters* = #CSS_mobileMaterialsLab_MunSrfLandedEastCrater_00 // Th materials promptly turn into a gooey mess from all the dust flying around at the surface.
        MunSrfLandedNotableCraters* = #CSS_mobileMaterialsLab_MunSrfLandedTwinCraters_00 // Perched between the two craters the materials seem to be divided equally in their containers. You note this in your report.
        MunSrfLandedRareCraters* = #CSS_mobileMaterialsLab_MunSrfLandedNorthwestCrater_00 // You keep hoping to see Carey Grant go running through the lab. No such luck.
        MunSrfLandedRareCraters* = #CSS_mobileMaterialsLab_MunSrfLandedSouthwestCrater_00 // The lab is cozy with the light reflecting off the crater outside. You pull out a box of snacks and get to work on it. Working on the labwork will come later.
        MunSrfLandedExoticCraters* = #CSS_mobileMaterialsLab_MunSrfLandedFarsideCrater_00 // Working in a lab in a crater on the moon makes you feel like a mad scientist. You note this in your report.
        MunSrfLandedExoticCraters* = #CSS_mobileMaterialsLab_MunSrfLandedEastFarsideCrater_00 // The materials promptly roll down the hill to the lowest part of the crater as soon as you open the canister. You guess that's why its a 'Mobile Materials' Lab.
        MunSrfLandedPolarIceCraters* = #CSS_mobileMaterialsLab_MunSrfLandedPolarCrater_00 // All the materials are polarized and sticking together. Is there ANYTHING that's not difficult in space?!
        MunSrfLandedPoles* = #CSS_mobileMaterialsLab_MunSrfLandedPolarLowlands_00 // You aren't quite sure of what to make of the lab results. Guess the scientists back on Kerbin can figure it out.
        MunSrfLandedVoronoiCraters* = #CSS_mobileMaterialsLab_MunSrfLandedHighlandCraters_00 // As you complete your lab reports you look forward to EVA-ing and running down the slope of the crater to see how fast you can get going.
        MunSrfLandedVoronoiCraters* = #CSS_mobileMaterialsLab_MunSrfLandedMidlandCraters_00 // You find it difficult to finish your report with everything at an angle. There were so many craters around it was impossible to find a level landing site.
        
        MinmusSrfLandedBasins* = #CSS_mobileMaterialsLab_MinmusSrfLandedFlats_00 // As you open the doors a sample dashes past to taste the surface.
        MinmusSrfLandedBasins* = #CSS_mobileMaterialsLab_MinmusSrfLandedGreatFlats_00 // The low temperature has frozen one of the liquid samples into a sort of iced cream. Was it green before?
        MinmusSrfLandedBasins* = #CSS_mobileMaterialsLab_MinmusSrfLandedGreaterFlats_00 // Some of the biological samples have not fared well. The metals, however, appear to be doing just fine.
        MinmusSrfLandedMountains* = #CSS_mobileMaterialsLab_MinmusSrfLandedSlopes_00 // Mission Control informs you that you have to put on safety goggles before doing any experiments. You fail to fit them on your helmet, and Mission Control reponds by telling you to immediately abort the mission.
        
        DunaSrfLandedIceCaps* = #CSS_mobileMaterialsLab_DunaSrfLandedPoles_00 // Nothing much happens to the samples when exposed to geyser gas. Whataver it is, it muct be pretty inert.
        DunaSrfLandedIceCaps* = #CSS_mobileMaterialsLab_DunaSrfLandedPoles_02 // You suddenly remember you left the bottle of whisky you smuggled on board disguised as a sample in the chamber. As you watch, ice encrusts the side of the bottle, but the alcohol stays liquid. Who knew liquor could be a science experiment?
        DunaSrfLandedMidlands* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandSea_00 // You put a small sample of subsurface sand into the chamber, and hear a series of tiny pops from the sodium as you heat it. Interesting.
        DunaSrfLandedMidlands* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandSea_01 // You lost a few of the test samples in transit, but that's not really an issue as they all just turn red anyway.
        DunaSrfLandedNotablePlains* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernBasin_00 // The coarse dust doesn't penetrate as far into everything as the standard insidious stuff you find on Duna.
        DunaSrfLandedNotablePlains* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernBasin_01 // You leave the samples to do their thing, and go fetch the snacks you warmed earlier.
        DunaSrfLandedNotablePlains* = #CSS_mobileMaterialsLab_DunaSrfLandedSouthernBasin_00 // The mixture of ice and dust cakes the samples. Nothing happens, apart from them going pink.
        DunaSrfLandedNotablePlains* = #CSS_mobileMaterialsLab_DunaSrfLandedSouthernBasin_01 // It's cold here. Suffice to say, all the samples freeze.
        DunaSrfLandedNotableMountains* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernShelf_00 // You open the doors, and the wind immediately sweeps every single sample out of the bay. Damn.
        DunaSrfLandedNotableMountains* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernShelf_01 // Run the experiment if you want, but the bay camera has been sandblasted to pieces and I am NOT going out there to look.
        DunaSrfLandedNotableMountains* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarHighlands_00 // Most of the samples crystallise and the white samples look even whiter. Maybe with a pink hue.
        DunaSrfLandedNotableMountains* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarHighlands_01 // You notice tiny beads of mercury condensing on the inside surface of the bay's striplight and hurriedly turn it back on to keep it warm.
        DunaSrfLandedTrenches* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandCanyon_00 // A sudden, unexpected gust of wind knocks several samples out of the chamber, but you're more concerned about the spacesuits turning pink.
        DunaSrfLandedTrenches* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandCanyon_01 // Sand piles up in drifts against the samples. It's pretty fine, so you bash the chamber and it all cascades out onto the ground.
        DunaSrfLandedTrenches* = #CSS_mobileMaterialsLab_DunaSrfLandedEasternCanyon_00 // The samples quickly disappear under a thick caking of dust. True to form, the observation computer attracts the most.
        DunaSrfLandedTrenches* = #CSS_mobileMaterialsLab_DunaSrfLandedEasternCanyon_01 // The doors grind open with the sort of crunching sound made by large quantities of dust in the servo mechanism.
        DunaSrfLandedTrenches* = #CSS_mobileMaterialsLab_DunaSrfLandedWesternCanyon_00 // You get the standard Duna reaction from most is the samples (i.e. going slightly red and cold). However, you put one of the lithium hydroxide CO2 scrubbers from the capsule into the bay as an afterthought, and watch it form a white, powdery coating.
        DunaSrfLandedTrenches* = #CSS_mobileMaterialsLab_DunaSrfLandedWesternCanyon_01 // The dust that blows into the bay appears to be from two sources, as it forms two different piles of fine and grainier sand.
        DunaSrfLandedExoticCraters* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarCraters_00 // Ice cascades off the sample bay doors as they open, and it's more interesting than what happens to the samples (they get cold, and that's it).
        DunaSrfLandedExoticCraters* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarCraters_01 // Following exposure, most of the liquid samples freeze while a few boil instead. The solid ones do very little.
        
        IkeSrfLandedPoles* = #CSS_mobileMaterialsLab_IkeSrfLandedPolarLowlands_00 // If you didn't know better, you would say the samples were afraid of the darkness. Do you know better?
        IkeSrfLandedPoles* = #CSS_mobileMaterialsLab_IkeSrfLandedPolarLowlands_01 // The onboard camera shows an alarm clock ringing in the bay. Joke's on you, R&D Department, nobody can hear it!
        IkeSrfLandedPoles* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthPole_00 // A small shower of grey dust falls gently to the ground as the sample bay doors open silently in the vacuum.
        IkeSrfLandedPoles* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthPole_01 // Some of the oxygen has leaked out of one of the containers. Closing the doors to preserve the pressure, you heat the Ikean dust in the bay until it ignites.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedEasternMountainRidge_00 // For want of a flat place to land around here, the materials slowly slide to the end of the bay.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedEasternMountainRidge_01 // Dust kicked up by the ship landing starts to cake the samples. This stuff seems pretty sticky and attracted to static.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedWesternMountainRidge_00 // One of the samples rolls out of the bay and bounces off down the mountainside. You don't fancy chasing after it.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedWesternMountainRidge_01 // No matter the landscape, that ubiquitous sticky dust is all over the samples very quickly.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthEasternMountainRange_00 // A nearby falling rock makes the samples shake in their containers. You hope your spot isn't next.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthEasternMountainRange_01 // Some of the once-liquid samples melt when exposed to the sunlight. It mustn't be too cold, then.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedCentralMountainRange_00 // You look at the red light in the bay, and then up at Duna. The resemblance is uncanny.
        IkeSrfLandedMountains* = #CSS_mobileMaterialsLab_IkeSrfLandedCentralMountainRange_01 // The samples don't do much aside from bob about in the low gravity.
        
        DresSrfLandedCanyon* = #CSS_mobileMaterialsLab_DresSrfLandedCanyons_00 // The samples seem to have no reaction to the surroundings, but while examining them you think you hear a faint screaming. Is it the samples, or you?
        
        LaytheSrfLandedIceCaps* = #CSS_mobileMaterialsLab_LaytheSrfLandedPoles_00 // Some of the samples seem to be frozen.
        LaytheSrfLandedIceCaps* = #CSS_mobileMaterialsLab_LaytheSrfLandedPoles_01 // Snow suddenly blows into some of the samples. You hope it doesn't effect the results.
        LaytheSrfLandedShores* = #CSS_mobileMaterialsLab_LaytheSrfLandedDunes_00 // You put a sand-like substance into the Mobile Materials lab. It hums and whirs for some time and then it beeps. The screen says "Sand".
        
        BopSrfLandedMountains* = #CSS_mobileMaterialsLab_BopSrfLandedPeaks_00 // You think you see a small tentacle, but the video flickers, and it's gone.
        BopSrfLandedHighlands* = #CSS_mobileMaterialsLab_BopSrfLandedRidges_00 // The materials appear to have set up a new facist government, and are attemping to invade a nearby fuel tank.
        
        EelooSrfLandedCanyon* = #CSS_mobileMaterialsLab_EelooSrfLandedIceCanyons_00 // A strange green crystal has grown. Maybe Mission Control will know what to do with it.
    }
}