        #JNSQscience_evaReport_KerbinSrfSplashedKreenwichSea_00 = Galleggiando nel mare di Kreenwich, ti rendi conto che "EVA" sta per "Attività Estremamente Vulnerabile" quando non puoi toccare nulla di solido.
        #JNSQscience_evaReport_KerbinSrfSplashedKreenwichSea_01 = Il mare di Kreenwich è calmo per esattamente tre secondi. Poi la tuta inizia a ondeggiare come una boa scientifica con dei sentimenti.
        #JNSQscience_evaReport_KerbinSrfSplashedArcticSea_00 = Il mare artico è così freddo che inizi a immaginare snack caldi. Registri "disagio termico" e remi più in fretta.
        #JNSQscience_evaReport_KerbinSrfSplashedArcticSea_01 = Nel mare artico, l'acqua sembra cercare di congelarti i pensieri. Decidi che pensare è facoltativo.
