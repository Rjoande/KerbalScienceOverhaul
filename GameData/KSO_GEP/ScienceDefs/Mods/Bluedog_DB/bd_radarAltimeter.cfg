        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_radarAltimeter_AirmedInSpaceLowTropicalLowlands_00 // The radar sketches low, smooth plains that look deceptively calm under Grannus’ red glow. The scars only show up when you zoom in.
