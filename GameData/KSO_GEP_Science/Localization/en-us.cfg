        // bd_hydrometer
        #GEPscience_bd_hydrometer_GrannusFlyingLow_00 = The hydrometer insists the “humidity” is effectively zero, then pauses to wonder what “humidity” even means in glowing red air. Data will reach home after a very patient wait.
        #GEPscience_bd_hydrometer_GrannusFlyingHigh_00 = Readings are steady, dry, and unsettlingly sterile. Under the dim red glare, you start to miss having a proper “sky” to blame for instrument noise.

        #GEPscience_bd_hydrometer_ToutatisSrfLandedSunnyLowlands_00 = The hydrometer reports “crispy.” Any condensables are either long gone or hiding somewhere cooler—probably on the other side of the planet and several hours of comm delay away.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedSunnyHighlands_00 = Thin air, hard light, and not a hint of water vapor. The sensor is so dry it practically squeaks when it logs the number.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedTransitionalLowlands_00 = Moisture spikes briefly as the terminator creeps past, then falls again like a curtain. Whatever is condensing out here, it doesn’t feel very homeworld-like.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedTransitionalHighlands_00 = The hydrometer catches faint, periodic pulses—like a planet-sized breath between fire and ice. Mission Control asks for repeats; the reply arrives after you’ve already taken three.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideLowlands_00 = The air is cold enough that “moisture” becomes a solid problem. The instrument flags condensables present, but mostly in the form of frost trying to claim the intake.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideHighlands_00 = Readings hover near “saturated” while your faceplate stays perfectly dry. Turns out alien humidity can be very rude and not actually be water.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedSoutheasternMountains_00 = Turbulent winds stir up layered air with just enough condensables to confuse the calibration. The graph looks like a seismogram drawn by a sleepy intern.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedWesternMountains_00 = Dry downslope gusts scrub the air clean. The hydrometer logs numbers so low you double-check you didn’t accidentally install a thermometer.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideMountains_00 = Ice crystals drift past the lamp like glitter under red light. The hydrometer calls it “very humid” and then immediately requests a de-icing cycle.
        #GEPscience_bd_hydrometer_ToutatisFlyingLow_00 = Flying through patchy haze, you map sharp humidity gradients that track the boundary between day and night. The planet feels stitched together, and the stitches are cold.
        #GEPscience_bd_hydrometer_ToutatisFlyingHigh_00 = Up here the air is thin and the moisture signal flattens into near-nothing. The red sun looks smaller than it should, and the long silence on the radio feels even bigger.

        #GEPscience_bd_hydrometer_NodensSrfLandedSaltySeas_00 = Humidity is high and the air tastes like minerals through the filters. The hydrometer is thrilled; the electronics bay is not.
        #GEPscience_bd_hydrometer_NodensSrfLandedFreshWater_00 = Water vapor readings climb fast and stay there, as if the planet is proudly showing off. You can almost hear waves—until you remember sound doesn’t travel through vacuum back home.
        #GEPscience_bd_hydrometer_NodensSrfLandedShores_00 = Moisture swings with every breeze off the waterline, fogging the intake and your mood in equal measure. The red sun makes the haze look bruised-purple.
        #GEPscience_bd_hydrometer_NodensSrfLandedTropicalLowlands_00 = The hydrometer pegs high and stays smug about it. Condensables are abundant enough that you start labeling everything “may become damp during storage.”
        #GEPscience_bd_hydrometer_NodensSrfLandedTemperateLowlands_00 = Moderate humidity, steady drift, and a slow dusk that doesn’t match your instincts. The data is comforting—until the comm delay reminds you where you are.
        #GEPscience_bd_hydrometer_NodensSrfLandedTropicalMidlands_00 = Afternoon convection pushes humidity up in pulses, like invisible elevators of wet air. The readout is lively, the sky is unfamiliar, and both are distracting.
        #GEPscience_bd_hydrometer_NodensSrfLandedTemperateMidlands_00 = Cool air holds less moisture, but it’s still plenty by the sensor’s standards. The hydrometer logs a calm curve while you watch a dim red sun set a little “wrong.”
        #GEPscience_bd_hydrometer_NodensSrfLandedHighlands_00 = Thinner, drier air with sharp nighttime drops that coax dew out of nowhere. The instrument warns of condensation; you warn Mission Control, who hears about it later.
        #GEPscience_bd_hydrometer_NodensSrfLandedTundra_00 = Low absolute moisture, but the sensor keeps catching near-ground frost events. It’s the kind of “humidity” that sneaks up as crystals, not droplets.
        #GEPscience_bd_hydrometer_NodensSrfLandedIceCaps_00 = The hydrometer reports high relative humidity and airborne ice crystals that clog the inlet like powdered glass. Everything feels pristine, quiet, and just a bit too far away.
        #GEPscience_bd_hydrometer_NodensSrfSplashed_00 = Submerged readings hit “100%” instantly, followed by an urgent protest from the casing seals. The recovery checklist is transmitted, received, and sighed at in slow motion.
        #GEPscience_bd_hydrometer_NodensFlyingLow_00 = You skim through thick air layers and map a damp, cloud-fed profile. The signal is strong enough to feel like company—until you look out at the strange light and remember it’s not.
        #GEPscience_bd_hydrometer_NodensFlyingHigh_00 = Upper-atmosphere humidity drops off sharply, leaving a clean, cold trace. The planet below looks inviting, but the long-distance loneliness stays in the cockpit.

        #GEPscience_bd_hydrometer_SironaFlyingLow_00 = The hydrometer logs “moisture” as trace condensables in a crushing hydrogen soup. Under Sirona’s dim red-lit clouds, the only thing that feels wet is your imagination.
        #GEPscience_bd_hydrometer_SironaFlyingHigh_00 = Up in the pale bands, the sensor sees thin hazes that condense and vanish with no warning. Mission Control asks what it means; you answer, and the reply drifts back much later.

        #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalCraquelure_00 = The hydrometer catches brief spikes as vapor seeps from the cracked ground, then drops back to dry. It feels like the surface is exhaling on a schedule you don’t understand.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateCraquelure_00 = Moisture readings wobble as cold fissures “breathe” trace condensables into the air. The graph looks busy, but the sky stays stubbornly unfamiliar.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalLowlands_00 = Humidity sits low but not zero—just enough to frost the intake if you wait through the long twilight. You add “de-ice” to the checklist and hope it arrives home eventually.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateLowlands_00 = The hydrometer reports a thin, steady background of condensables that aren’t behaving like water. The red sun makes the haze look bruised, which seems unhelpful but accurate.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalMidlands_00 = A light wind raises the reading in pulses, like invisible pockets of damp air sliding past. You start timing them, then remember your clock feels wrong out here.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateMidlands_00 = The sensor settles into a calm line—until a faint ground fog rolls through and everything jumps. The instrument calls it “interesting”; you call it “creepy.”
        #GEPscience_bd_hydrometer_BorvoSrfLandedHighlands_00 = The air is thinner and drier, and the hydrometer struggles to find anything to count. It finally logs “very little,” which is both data and a mood.
        #GEPscience_bd_hydrometer_BorvoSrfLandedMajorCraters_00 = Cold-trapped vapor pools in the crater shadows, spiking humidity right where the sun can’t reach. Your shadow is long, the light is red, and the radio is patient.
