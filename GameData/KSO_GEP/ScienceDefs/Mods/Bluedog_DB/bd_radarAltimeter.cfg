@EXPERIMENT_DEFINITION:HAS[#id[bd_radarAltimeter]]
{
    %RESULTS
    {
		GrannusFlyingLowNorthPolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthPolarZone_00 // The radar insists it has found a “surface” under the northern glow. Mission Control begins drafting a very long, very careful definition of “surface.”
        GrannusFlyingLowNorthSubpolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthSubpolarZone_00 // Echoes come back smeared and jittery, like the star is breathing between pulses. Your uplink lag makes the argument about “valid altitude” feel even longer.
        GrannusFlyingLowNorthTemperateZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthTemperateZone_00 // The return signal flickers in and out, tracing ripples in the glowing layers below. You label it “terrain” in the log and wait for the angry review.
        GrannusFlyingLowNorthTropicZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowNorthTropicZone_00 // Strong returns appear, then vanish, as if the target moved out of the way. Someone suggests the star is “ducking the radar,” and nobody laughs.
        GrannusFlyingLowEquatorialZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowEquatorialZone_00 // The altimeter charts a lumpy, rolling boundary that behaves like liquid but isn’t. The controversy is now officially measurable.
        GrannusFlyingLowSouthTropicZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthTropicZone_00 // The radar pings find abrupt “cliffs” of signal strength, then nothing at all. You double-check you’re not accidentally altimetrying the void.
        GrannusFlyingLowSouthTemperateZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthTemperateZone_00 // The instrument reports stable altitude for a full three seconds before giving up and screaming numbers. You consider that a personal best this far from home.
        GrannusFlyingLowSouthSubpolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthSubpolarZone_00 // The echo timing suggests shifting layers stacked on layers, none of which agree on where “down” is. The science team calls it exciting; you call it terrifying.
        GrannusFlyingLowSouthPolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingLowSouthPolarZone_00 // Returns arrive crisp and sharp, which is suspicious around a star. You add a note: “Either we found structure, or the radar is lying with confidence.”
        GrannusFlyingHighNorthPolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthPolarZone_00 // At higher altitude the signal steadies, sketching broad latitudinal bands beneath the red glare. It still feels wrong to call any of it “ground.”
        GrannusFlyingHighNorthSubpolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthSubpolarZone_00 // The radar paints gentle waves across the glowing strata below, like frozen dunes made of light. The data packet reaches home late, as usual.
        GrannusFlyingHighNorthTemperateZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthTemperateZone_00 // Echo strength rises and falls in slow cycles that don’t match your orbit. You mark “possible rotating features” and pretend you didn’t shiver.
        GrannusFlyingHighNorthTropicZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighNorthTropicZone_00 // A dark patch under the trackline produces a stronger, cleaner return. The debate shifts from “impossible” to “uncomfortable.”
        GrannusFlyingHighEquatorialZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighEquatorialZone_00 // The altimeter maps a broad, uneven belt that seems to drift sideways between passes. You realize “altitude” here may need a moving reference frame.
        GrannusFlyingHighSouthTropicZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthTropicZone_00 // Signal dropouts cluster in bands, as if something is swallowing the pulses. Few hours later, Mission Control suggests “instrument interference,” which is the polite term for “panic.”
        GrannusFlyingHighSouthTemperateZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthTemperateZone_00 // The readout stabilizes enough to build a crude elevation profile. The profile looks like it’s made of heat, not rock.
        GrannusFlyingHighSouthSubpolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthSubpolarZone_00 // The timing curve hints at layered boundaries, each reflecting a little differently. You wonder if the star has “weather” in the way mountains have weather.
        GrannusFlyingHighSouthPolarZone* = #GEPscience_bd_radarAltimeter_GrannusFlyingHighSouthPolarZone_00 // The altimeter draws a surprisingly consistent contour line. Someone back home will absolutely print it on a poster and call it a map.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthPolarZone_00 // From low space the radar finds a faint, shimmering return at the edge of the star’s glow. You quietly rename the file from “surface” to “best guess.”
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthSubpolarZone_00 // The echoes are weak but repeatable, outlining broad-height variations in the luminous layers. Repeatable is the only word that keeps the reviewers calm.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthTemperateZone_00 // A patchwork of stronger returns suggests uneven density below, like buried hills made of plasma. The numbers look scientific enough to start another argument.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowNorthTropicZone_00 // The radar locks onto a bright band and reports a “mean elevation.” Few hours later, Mission Control responds with a careful silence and a request for more data.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowEquatorialZone_00 // The instrument sketches a wide belt where the return path bends and wobbles. You note “refraction,” then remember you’re measuring a star.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthTropicZone_00 // A sudden spike in echo strength coincides with a darker-looking region. You log it as “feature,” because “thing” sounds unprofessional.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthTemperateZone_00 // The altitude trace is smooth until it isn’t, producing a sharp step like a cliff of light. The comm delay makes waiting for instructions feel extra long.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthSubpolarZone_00 // The return fades to nearly nothing, then resurges, as though the target is layered like fog. Your map now has “maybe” contours.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_radarAltimeter_GrannusInSpaceLowSouthPolarZone_00 // The radar paints a tidy outline of the polar band beneath the dim red glow of distant home. You mark the result: “controversial, but consistent.”

        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowMagmaSea_00 // The altimeter shows a broad, low basin with a surface so smooth it almost acts like a mirror. You file it under “do not attempt landing practice here.”
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowMagmaShores_00 // Sharp elevation breaks ring the hot basins like frozen waves, only glowing. The boundary between “shore” and “hazard” is extremely thin.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowScorchedLowlands_00 // Returns outline flat plains with occasional jagged ridges, all baked under relentless red light. The night side is only a few minutes of orbit away, and it feels like another world.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowMidlands_00 // Moderate relief appears in repeating swells, like the crust tried to buckle and stopped halfway. The data takes ages to reach home, but the terrain doesn’t seem to be going anywhere.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowHighlands_00 // The radar profile spikes into steep high ground with dramatic drop-offs. You wonder if the planet is trying to shake you off for getting this close.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowDarkSideMidlands_00 // The dark hemisphere produces cleaner echoes, as if the cold makes the surface more honest. Your instruments disagree, but your nerves agree.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowDarkSideHighlands_00 // Rugged peaks on the night side cast long radar “shadows” in the data. You can’t see them, but the altimeter makes them feel uncomfortably real.
        TaranisInSpaceLowPoles* = #GEPscience_bd_radarAltimeter_TaranisInSpaceLowPoles_00 // The poles show gentler slopes and broad, quiet expanses compared to the violent day-night boundary. You briefly enjoy the calm before remembering how far away “calm” is from home.

        ToutatisFlyingHighDarkSideHighlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighDarkSideHighlands_00 // The dark highlands produce clean peaks and deep basins in the profile. The map is beautiful in a way you can’t enjoy out here.
        ToutatisFlyingHighDarkSideLowlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighDarkSideLowlands_00 // On the night side, the return strength is steady and cold. You can’t tell if that’s comforting or just efficient.
        ToutatisFlyingHighDarkSideMountains* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighDarkSideMountains_00 // Night-side ridges show up as alternating spikes and voids. Your link delay makes the warning feel like it’s coming from another century.
        ToutatisFlyingHighSoutheasternMountains* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighSoutheasternMountains_00 // From high altitude, the southeastern mountains resolve into braided ridgelines. The thin atmosphere barely muffles the uneasy silence in the cabin.
        ToutatisFlyingHighSunnyHighlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighSunnyHighlands_00 // The altimeter outlines a plateau-and-scarp pattern under relentless light. Mission Control will see it minutes later and argue for hours.
        ToutatisFlyingHighSunnyLowlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighSunnyLowlands_00 // Higher up, the radar smooths the daylit plains into broad, bright contours. The sunward hemisphere still looks angry, even as data.
        ToutatisFlyingHighTransitionalHighlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighTransitionalHighlands_00 // The terminator highlands form a jagged boundary between heat and darkness. Radar says “mountain range,” your gut says “border wall.”
        ToutatisFlyingHighTransitionalLowlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighTransitionalLowlands_00 // Across the transition zone, elevation changes come in gentle waves. It’s the closest this world gets to “normal,” which is unsettling.
        ToutatisFlyingHighWesternMountains* = #GEPscience_bd_radarAltimeter_ToutatisFlyingHighWesternMountains_00 // The radar sketches long, rugged folds across the western ranges. You file it as “excellent terrain,” meaning “excellent at breaking landers.”
        ToutatisFlyingLowDarkSideHighlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowDarkSideHighlands_00 // Night-side high ground produces crisp spikes and sudden drop-offs. You wonder what else is hiding in the cold that radar can’t name.
        ToutatisFlyingLowDarkSideLowlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowDarkSideLowlands_00 // Over the dark plains, the radar paints the surface you can’t see at all. The numbers arrive faster than the stars would let you call home.
        ToutatisFlyingLowDarkSideMountains* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowDarkSideMountains_00 // The dark-side mountains carve deep gaps in the return signal. It feels like flying over a map someone forgot to finish drawing.
        ToutatisFlyingLowSoutheasternMountains* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowSoutheasternMountains_00 // The mountains return a messy spray of echoes, like a serrated knife edge. The log notes “rough terrain” and “do not skim.”
        ToutatisFlyingLowSunnyHighlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowSunnyHighlands_00 // The altimeter traces steep, sun-baked rises that throw long radar shadows. You briefly miss having trees to crash into instead.
        ToutatisFlyingLowSunnyLowlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowSunnyLowlands_00 // Low over the daylit flats, the radar return is sharp and hot—like the ground is trying to answer before you even ask.
        ToutatisFlyingLowTransitionalHighlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowTransitionalHighlands_00 // Ridges in the terminator zone pop up fast on the readout. The thin air gives no warning, so you trust the beeps more than your eyes.
        ToutatisFlyingLowTransitionalLowlands* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowTransitionalLowlands_00 // In the twilight belt, echoes settle into a reasonable profile for once. You tag it “comfort zone” and immediately distrust it.
        ToutatisFlyingLowWesternMountains* = #GEPscience_bd_radarAltimeter_ToutatisFlyingLowWesternMountains_00 // Altitude wobbles over the western peaks as the radar locks onto cliff faces. You keep one finger on the abort button and the other on the mute switch.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowDarkSideHighlands_00 // Night-side relief leaps out in stark contrast—peaks, pits, and nothing in between. The planet looks carved rather than worn.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowDarkSideLowlands_00 // Over the dark plains, the radar returns are steady and featureless. The emptiness feels bigger when the sun is behind you.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowDarkSideMountains_00 // The dark-side mountains cast long radar “shadows” in the elevation data. You can’t see them, but you can feel them.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowSoutheasternMountains_00 // The mountains resolve into steep steps and broken valleys along the ground track. Your map gains detail while your sense of scale slips away.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowSunnyHighlands_00 // The sun-facing highlands stand proud in the radar profile, all sharp edges and hard answers. At least rocks don’t ask why you’re here.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowSunnyLowlands_00 // Low orbit passes stitch the daylit lowlands into a bright elevation quilt. You send it home and imagine the reply arriving after your next birthday.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowTransitionalHighlands_00 // Terminator highlands mark a rugged seam between worlds. The altimeter treats it like geography; you treat it like a warning label.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowTransitionalLowlands_00 // The radar track across the twilight lowlands shows a surprisingly even grade. Someone will propose a landing site; you will sigh loudly.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_radarAltimeter_ToutatisInSpaceLowWesternMountains_00 // Radar swaths over the western ranges show folded terrain like crumpled metal. The dim red sun makes even the graphs look tired.

        NodensFlyingHighFreshWater* = #GEPscience_bd_radarAltimeter_NodensFlyingHighFreshWater_00 // Fresh-water basins appear as smooth depressions in the elevation map. The numbers look reassuringly Earth-like, which makes them suspicious.
        NodensFlyingHighHighlands* = #GEPscience_bd_radarAltimeter_NodensFlyingHighHighlands_00 // Highlands stand out as rugged islands of elevation above softer terrain. The peaks look like good radio relays, and bad landing sites.
        NodensFlyingHighIceCaps* = #GEPscience_bd_radarAltimeter_NodensFlyingHighIceCaps_00 // The polar caps draw smooth, high plateaus with sharp edges at their margins. You mark the cliffs and pretend you won’t ever need to land there.
        NodensFlyingHighSaltySeas* = #GEPscience_bd_radarAltimeter_NodensFlyingHighSaltySeas_00 // From high altitude, the seas smear into a broad, low datum with noisy edges. The planet’s scale hits you when the horizon refuses to end.
        NodensFlyingHighShores* = #GEPscience_bd_radarAltimeter_NodensFlyingHighShores_00 // Coastlines trace clean contour lines through the data, even where clouds hide everything else. Radar doesn’t care about scenery, only distance.
        NodensFlyingHighTemperateLowlands* = #GEPscience_bd_radarAltimeter_NodensFlyingHighTemperateLowlands_00 // Temperate lowlands show broad floodplains and subtle ridges in the profile. You wonder if any of it is alive, then focus on the altimeter again.
        NodensFlyingHighTemperateMidlands* = #GEPscience_bd_radarAltimeter_NodensFlyingHighTemperateMidlands_00 // Radar contours reveal branching valleys and stepped rises. It’s almost a map you could hike—if you weren’t light-years from a rescue plan.
        NodensFlyingHighTropicalLowlands* = #GEPscience_bd_radarAltimeter_NodensFlyingHighTropicalLowlands_00 // The tropical lowlands read as a wide, warm bowl with scattered rough patches. Mission Control will call them “anomalies” after the message arrives.
        NodensFlyingHighTropicalMidlands* = #GEPscience_bd_radarAltimeter_NodensFlyingHighTropicalMidlands_00 // The midlands resolve into rolling uplifts like slow-motion waves. The thick air keeps you flying, but it also keeps you feeling trapped.
        NodensFlyingHighTundra* = #GEPscience_bd_radarAltimeter_NodensFlyingHighTundra_00 // Tundra terrain shows mottled roughness, as if the ground is broken and refrozen. The altimeter keeps perfect time; your stomach doesn’t.
        NodensFlyingLowFreshWater* = #GEPscience_bd_radarAltimeter_NodensFlyingLowFreshWater_00 // The radar finds a smooth, consistent surface over fresh water, with little ripples in the timing. You briefly believe this world might forgive visitors.
        NodensFlyingLowHighlands* = #GEPscience_bd_radarAltimeter_NodensFlyingLowHighlands_00 // Highlands produce crisp peaks that punch through the cloud deck on the readout. Your eyes still see only gray and distance.
        NodensFlyingLowIceCaps* = #GEPscience_bd_radarAltimeter_NodensFlyingLowIceCaps_00 // Over the ice caps, the radar bounces back strongly and insists the surface is very flat. You hope the ice agrees with the definition of “surface.”
        NodensFlyingLowSaltySeas* = #GEPscience_bd_radarAltimeter_NodensFlyingLowSaltySeas_00 // Low over the salty seas, wave clutter makes the altimeter chatter. The ocean looks inviting until you remember how far “home” is.
        NodensFlyingLowShores* = #GEPscience_bd_radarAltimeter_NodensFlyingLowShores_00 // Shorelines show up as sharp steps between wet and dry returns. The instrument is certain; you are not.
        NodensFlyingLowTemperateLowlands* = #GEPscience_bd_radarAltimeter_NodensFlyingLowTemperateLowlands_00 // Over temperate plains, the altimeter draws gentle rises and shallow basins under a dim red sun. The terrain could be friendly—could be.
        NodensFlyingLowTemperateMidlands* = #GEPscience_bd_radarAltimeter_NodensFlyingLowTemperateMidlands_00 // The radar sketches layered terraces in the midlands, as if the land kept changing its mind. You label it “geology” and keep flying.
        NodensFlyingLowTropicalLowlands* = #GEPscience_bd_radarAltimeter_NodensFlyingLowTropicalLowlands_00 // Dense air and warm lowlands give strong echoes and steady altitude. Something about that steadiness feels like it’s watching back.
        NodensFlyingLowTropicalMidlands* = #GEPscience_bd_radarAltimeter_NodensFlyingLowTropicalMidlands_00 // Midland swells roll beneath you in the profile like slow waves of stone. The data link delay turns every update into a small act of patience.
        NodensFlyingLowTundra* = #GEPscience_bd_radarAltimeter_NodensFlyingLowTundra_00 // Cold tundra gives clean, bright returns, almost too tidy. You suspect the ground is frozen, not empty.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowFreshWater_00 // The radar maps inland waters as dark, flat patches among higher ground. You file the map and imagine what the surface smells like—then stop.
        NodensInSpaceLowHighlands* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowHighlands_00 // Highlands spike sharply in the profile, casting radar shadows behind steep slopes. You label them “spectacular” in the report, meaning “dangerous.”
        NodensInSpaceLowIceCaps* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowIceCaps_00 // Polar passes show smooth domes of ice with fractured edges and hidden drop-offs. The dim red sun glints off nothing you can actually see.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowSaltySeas_00 // Low-orbit sweeps turn the salty seas into a stable reference level with restless texture. The planet looks welcoming in grayscale, which is never the full story.
        NodensInSpaceLowShores* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowShores_00 // From space, the shore biomes become crisp contour boundaries between two worlds. It’s the cleanest line you’ve seen since leaving home.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowTemperateLowlands_00 // The altimeter stitches temperate lowlands into gentle, navigable gradients. You can almost picture roads, which is an unhelpful thought out here.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowTemperateMidlands_00 // The map reveals long drainage-like patterns etched into the midlands. If it’s water, it’s history—or it’s happening now.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowTropicalLowlands_00 // Tropical lowlands appear broad and low, with scattered rough signatures like old lava or young mountains. The data packet crawls home through the void.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowTropicalMidlands_00 // Midland belts show rhythmic rises and depressions, like the crust was kneaded. You trust the radar more than the windows.
        NodensInSpaceLowTundra* = #GEPscience_bd_radarAltimeter_NodensInSpaceLowTundra_00 // Tundra regions return bright, consistent echoes with fine roughness. The surface looks solid, but the silence says otherwise.

        BelisamaInSpaceLowFlats* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowFlats_00 // The radar draws broad, level plains that look almost deliberate. Under Grannus’ dim red light, “deliberate” is not a comforting word.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTropicalLowlands_00 // Lowlands come back as a smooth bowl with scattered rough patches. The echo timing is crisp; the long silence to Mission Control is not.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTemperateLowlands_00 // The altimeter stitches gentle rises into a usable map. You catch yourself planning a drive route, then remember there’s no rescue truck out here.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTropicalMidlands_00 // Rolling uplifts show up like frozen waves in the profile. For a moment the numbers feel familiar—then the red sun over the horizon ruins that feeling.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowTemperateMidlands_00 // The midlands resolve into terraces and shallow scarps, like the moon is slowly slipping in Nodens’ grip. Your orbit agrees; your nerves don’t.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowHighlands_00 // Highlands spike sharply, throwing wide radar shadows behind steep faces. It’s excellent data for landing-site rejection.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_radarAltimeter_BelisamaInSpaceLowPoles_00 // The poles read as high, clean plateaus with abrupt edges. You label the edges “interesting” so the report sounds less like “warning.”

        SucellusInSpaceLowBasins* = #GEPscience_bd_radarAltimeter_SucellusInSpaceLowBasins_00 // The radar finds deep basins that look like someone scooped the crust out with a spoon. The return packets crawl home through the void, but the holes are unmistakable.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_radarAltimeter_SucellusInSpaceLowLowlands_00 // Lowlands map as wide, low shelves with subtle ripples in elevation. The planet’s silence makes every clean measurement feel louder.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_radarAltimeter_SucellusInSpaceLowTropicalMidlands_00 // Midland belts show repeating rises and dips, like the ground was kneaded and left to cool. The radiation monitors tick along in the background, unimpressed.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_radarAltimeter_SucellusInSpaceLowTemperateMidlands_00 // The profile reveals stepped slopes and long, shallow valleys. You wonder what they’d look like in daylight—then remember “daylight” is a dim red suggestion here.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_radarAltimeter_SucellusInSpaceLowHighlands_00 // Rugged high ground returns as jagged peaks with abrupt drop-offs. The science team will call it “resource-bearing structure” after the data arrives; you call it “do not descend.”
        SucellusInSpaceLowPoles* = #GEPscience_bd_radarAltimeter_SucellusInSpaceLowPoles_00 // Polar passes show broad, stable elevations with fewer sharp surprises. Out here, “fewer surprises” counts as luxury.

        CaireenInSpaceLowLowlands* = #GEPscience_bd_radarAltimeter_CaireenInSpaceLowLowlands_00 // The altimeter struggles to decide where the “average surface” is on something this small. The solution is a map full of footnotes and a pilot full of doubt.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_radarAltimeter_CaireenInSpaceLowMidlands_00 // Mid-level terrain comes back as lumpy and irregular, like a captured rock that never learned to behave. The echoes are short; the distance to home is not.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_radarAltimeter_CaireenInSpaceLowHighlands_00 // High ground is all sharp edges and quick shadows in the return signal. You can almost feel the asteroid’s old attitude through the data.
        CaireenInSpaceLowPoles* = #GEPscience_bd_radarAltimeter_CaireenInSpaceLowPoles_00 // The poles show skewed, uneven contours that make “north” feel negotiable. You file the dataset and quietly avoid looking down for a while.

        SironaFlyingLowDarkTropicalBands* = #GEPscience_bd_radarAltimeter_SironaFlyingLowDarkTropicalBands_00 // The radar happily reports your altitude above a “surface” made of violently organized cloudtops. The science team insists this is fine, and definitely not controversial.
        SironaFlyingLowLightTropicalBands* = #GEPscience_bd_radarAltimeter_SironaFlyingLowLightTropicalBands_00 // Echoes come back strong and steady from the bright bands, as if Sirona is trying to pretend it has ground. You write “reference layer” and hope the argument stays on Kerbin.
        SironaFlyingLowDarkTemperateBands* = #GEPscience_bd_radarAltimeter_SironaFlyingLowDarkTemperateBands_00 // The return signal wobbles with the band’s turbulence, turning your altitude trace into modern art. The comm delay means the yelling will arrive later.
        SironaFlyingLowLightTemperateBands* = #GEPscience_bd_radarAltimeter_SironaFlyingLowLightTemperateBands_00 // The altimeter locks onto a smooth reflecting layer and calls it “level.” You briefly consider believing it, then remember you’re flying inside a gas giant.
        SironaFlyingLowDarkPolarBands* = #GEPscience_bd_radarAltimeter_SironaFlyingLowDarkPolarBands_00 // The radar pings vanish into the polar murk and come back late, like the atmosphere took a detour. The cabin feels very small under the dim red sun.
        SironaFlyingLowLightPolarBands* = #GEPscience_bd_radarAltimeter_SironaFlyingLowLightPolarBands_00 // Bright polar haze gives crisp echoes and a dangerously confident readout. Mission Control will love the numbers; reviewers will hate the premise.
