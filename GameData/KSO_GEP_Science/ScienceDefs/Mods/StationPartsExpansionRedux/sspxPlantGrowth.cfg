@EXPERIMENT_DEFINITION:HAS[#id[sspxPlantGrowth]]
{
    %RESULTS
    {
        GrannusFlyingHigh* = #GEPscience_sspxPlantGrowth_GrannusFlyingHigh_00 // The plants insist on growing “away” from the red glare, but there isn’t an “away” that counts. You log a new category: photosynthesis-related panic.
		GrannusInSpaceLow* = #GEPscience_sspxPlantGrowth_GrannusInSpaceLow_00 // Under Grannus’ dim red light, the leaves darken like they’re trying to hide. The time-stamps drift as the long signal delay makes “day” and “night” feel like paperwork.
		GrannusInSpaceHigh* = #GEPscience_sspxPlantGrowth_GrannusInSpaceHigh_00 // With Grannus a small ember behind you, growth becomes slow and deliberate. The greenhouse feels quieter than it should, and the plants seem to agree.

		TaranisSrfLanded* = #GEPscience_sspxPlantGrowth_TaranisSrfLanded_00 // The habitat’s shutters cycle like a metronome, pretending the world outside isn’t glowing hot on one side and frozen on the other. The seedlings sprout anyway, purely out of spite and adequate nutrient paste.
		TaranisSrfSplashed* = #GEPscience_sspxPlantGrowth_TaranisSrfSplashed_00 // You take “splashed” to mean “near the angry glowing stuff” and stop asking questions. The plants respond by curling their leaves, as if they can smell the heat through three layers of insulation.
		TaranisInSpaceLow* = #GEPscience_sspxPlantGrowth_TaranisInSpaceLow_00 // The plants lean toward the faintest reflected light, then change their minds when the ship rotates. You note that “up” and “sunward” are not the same thing here.
		TaranisInSpaceHigh* = #GEPscience_sspxPlantGrowth_TaranisInSpaceHigh_00 // With Taranis half-bright and half-black below, the growth lights feel like the only honest sunrise. The crew argues about what time it is and the plants refuse to take sides.

		ToutatisSrfLanded* = #GEPscience_sspxPlantGrowth_ToutatisSrfLanded_00 // The greenhouse thermostat works overtime while Toutatis’ horizon looks split between fire and night. The plants settle into a slow rhythm, like they’ve accepted that dawn is a scheduling problem.
		ToutatisFlyingHigh* = #GEPscience_sspxPlantGrowth_ToutatisFlyingHigh_00 // The thin upper air doesn’t carry much, but it carries enough dust to tint the light a stubborn rust-red. The plants grow compact and conservative, like they’ve read the mission risk assessment.
		ToutatisInSpaceLow* = #GEPscience_sspxPlantGrowth_ToutatisInSpaceLow_00 // From low orbit the terminator line is a sharp seam, and the plants’ leaf angles keep changing as you cross it again and again. You record that they prefer the lamp, because the lamp is predictable.
		ToutatisInSpaceHigh* = #GEPscience_sspxPlantGrowth_ToutatisInSpaceHigh_00 // High above Toutatis, the world below looks like two different planets sharing a lease. The plants keep growing, but the log notes you’ve started talking to them during the long comm delays.

        NodensSrfLanded* = #GEPscience_sspxPlantGrowth_NodensSrfLanded_00 // Under a dim red sun, the plants grow broad, dark leaves like they’re trying to catch every last photon. The life-support techs call it “efficient” and quietly increase the filter checks.
		NodensSrfSplashed* = #GEPscience_sspxPlantGrowth_NodensSrfSplashed_00 // A little local water goes into the hydroponics loop and immediately tries to become chemistry homework. The sprouts survive, but your notes now include the phrase “politely suspicious.”
		NodensFlyingHigh* = #GEPscience_sspxPlantGrowth_NodensFlyingHigh_00 // The upper air is thin, cold, and tinted a stubborn rust. The plants lean toward the light, then stop, as if remembering how far away “sun” actually is out here.
		NodensInSpaceLow* = #GEPscience_sspxPlantGrowth_NodensInSpaceLow_00 // Sunrise happens fast in orbit, but the comms delay makes the logs arrive late like a sleepy plant. The seedlings keep a steady pace, apparently unimpressed by astronomy.
		NodensInSpaceHigh* = #GEPscience_sspxPlantGrowth_NodensInSpaceHigh_00 // From up here Nodens looks welcoming and distant at the same time. The plants grow slowly, and the crew starts naming them after antenna parts.

		BelisamaSrfLanded* = #GEPscience_sspxPlantGrowth_BelisamaSrfLanded_00 // Belisama never stops showing the same face to Nodens, so the “view” outside is always the same looming planet and red gloom. The plants give up on circadian rhythms and commit fully to lamp time.
		BelisamaInSpaceLow* = #GEPscience_sspxPlantGrowth_BelisamaInSpaceLow_00 // Low orbit feels like circling a dark rock with a giant neighbor watching over your shoulder. The seedlings sprout neatly in rows, as if order might shorten the distance.
		BelisamaInSpaceHigh* = #GEPscience_sspxPlantGrowth_BelisamaInSpaceHigh_00 // The moon, its parent, and the red sun line up into a slow, uncanny clock. The plants keep growing, but your status reports start sounding like postcards.

		SucellusSrfLanded* = #GEPscience_sspxPlantGrowth_SucellusSrfLanded_00 // The regolith has a metallic sparkle that looks pretty until it gets everywhere. The plants are fine, but the greenhouse vacuum filter files for retirement.
		SucellusInSpaceLow* = #GEPscience_sspxPlantGrowth_SucellusInSpaceLow_00 // Sucellus below is all hard edges and long shadows in red light. The growth chambers hum a little louder, compensating for a world that doesn’t feel warm even when it’s “day.”
		SucellusInSpaceHigh* = #GEPscience_sspxPlantGrowth_SucellusInSpaceHigh_00 // From high orbit the dwarf world is a dark coin, and the sun is an ember with a bad attitude. The plants rely entirely on artificial daylight, which is comforting and slightly embarrassing.

		CaireenSrfLanded* = #GEPscience_sspxPlantGrowth_CaireenSrfLanded_00 // The gravity is so low the soil wants to leave as much as you do. The plants still sprout, but everything has to be strapped down, including your optimism.
		CaireenInSpaceLow* = #GEPscience_sspxPlantGrowth_CaireenInSpaceLow_00 // Caireen spins irregularly under you like it’s trying to shake off the mission. The plants don’t care, but the crew keeps checking that “down” is still a valid concept.
		CaireenInSpaceHigh* = #GEPscience_sspxPlantGrowth_CaireenInSpaceHigh_00 // Up here Caireen is almost too small to feel real, just a speck by a speck, far from any familiar sky. The seedlings grow anyway, quietly proving that determination is massless.

        SironaFlyingHigh* = #GEPscience_sspxPlantGrowth_SironaFlyingHigh_00 // The plants don’t know what to do with all this red light and all that sky. They grow dark, cautious leaves while Sirona’s bands slide past like a slow warning label.
		SironaInSpaceLow* = #GEPscience_sspxPlantGrowth_SironaInSpaceLow_00 // Sirona fills half the window, but the greenhouse runs on lamps and patience. The growth log arrives minutes late, like it also has a long way to travel.
		SironaInSpaceHigh* = #GEPscience_sspxPlantGrowth_SironaInSpaceHigh_00 // From high above the gas giant, “day” is mostly whatever the timer says it is. The plants keep growing anyway, as if pretending the red sun is normal makes it true.

		AirmedSrfLanded* = #GEPscience_sspxPlantGrowth_AirmedSrfLanded_00 // Airmed’s scarred, two-toned ground looks like it’s been in too many fights. The plants stay under shielding and still manage to sprout, purely out of stubborn professionalism.
		AirmedInSpaceLow* = #GEPscience_sspxPlantGrowth_AirmedInSpaceLow_00 // Sirona looms nearby, turning orbit into an endless reminder of where you are. The plants follow the grow-lights without complaint, unlike mission control back home.
		AirmedInSpaceHigh* = #GEPscience_sspxPlantGrowth_AirmedInSpaceHigh_00 // Airmed shrinks to a battered pebble beneath you, and the red sun turns everything into twilight. The seedlings look oddly comforting, like a tiny green signal that actually arrives on time.

		BorvoSrfLanded* = #GEPscience_sspxPlantGrowth_BorvoSrfLanded_00 // The air is thin and cold, with just enough methane to make the greenhouse filters feel judged. The plants respond by growing waxy leaves, as if they’ve read the atmosphere report.
		BorvoFlyingHigh* = #GEPscience_sspxPlantGrowth_BorvoFlyingHigh_00 // High in Borvo’s pale sky, condensation crawls across the viewing ports and the red sun barely brightens it. The plants lean toward the lamps and ignore the outside entirely—smart plants.
		BorvoInSpaceLow* = #GEPscience_sspxPlantGrowth_BorvoInSpaceLow_00 // Borvo’s browns and beiges drift below, and Sirona’s reflected glow keeps trying to photobomb the sensors. The plants show a faint “lean” toward the window, then remember the window is mostly lies.
		BorvoInSpaceHigh* = #GEPscience_sspxPlantGrowth_BorvoInSpaceHigh_00 // Up here the system looks arranged for someone else’s convenience, not yours. The growth curve stays steady, even when your status updates take the scenic route back to Grannus.

		DamonaSrfLanded* = #GEPscience_sspxPlantGrowth_DamonaSrfLanded_00 // Damona is gray, pockmarked, and cold enough to make the heaters sound nervous. The plants are strapped down against low gravity and grow slowly, like they’re saving energy for the trip home.
		DamonaInSpaceLow* = #GEPscience_sspxPlantGrowth_DamonaInSpaceLow_00 // Low orbit is a carousel of long shadows and a sun that never feels quite “up.” The plants keep their own schedule, which is good, because everyone else has stopped agreeing on the time.
		DamonaInSpaceHigh* = #GEPscience_sspxPlantGrowth_DamonaInSpaceHigh_00 // Damona becomes a distant scar in the dark, and the greenhouse becomes the only real color in sight. You record “healthy growth” and try not to write “lonely, but functional.”

        EponaSrfLanded* = #GEPscience_sspxPlantGrowth_EponaSrfLanded_00 // The red sun is more of a suggestion than a light source, so the plants accept lamp-time without complaint. Frost creeps along the habitat seams while you wonder what’s thawing far below the ice.
		EponaFlyingHigh* = #GEPscience_sspxPlantGrowth_EponaFlyingHigh_00 // The thin haze tastes faintly of methane on the sensors, and the outside light stays stubbornly crimson. The plants respond by thickening their leaves, as if bracing for a very long winter.
		EponaInSpaceLow* = #GEPscience_sspxPlantGrowth_EponaInSpaceLow_00 // Epona’s dim, pale disk hangs under an ember of a sun, and the comms lag makes every “morning update” arrive in the afternoon. The seedlings keep a steady pace, unimpressed by distance.
		EponaInSpaceHigh* = #GEPscience_sspxPlantGrowth_EponaInSpaceHigh_00 // From high orbit, Epona looks sealed shut and quiet, but the growth chamber stays busy. You log “viable under artificial day/night,” and add a note: “real day/night not included.”

		RosmertaSrfLanded* = #GEPscience_sspxPlantGrowth_RosmertaSrfLanded_00 // Rosmerta is cold, airless, and ignored by everything except your landing legs. Inside the greenhouse, the first green shoots feel almost indecently loud.
		RosmertaInSpaceLow* = #GEPscience_sspxPlantGrowth_RosmertaInSpaceLow_00 // Epona fills the view like a frozen promise while Rosmerta rolls beneath in hard shadow. The plants orient to the lamps and refuse to acknowledge the outside at all—professional behavior.
		RosmertaInSpaceHigh* = #GEPscience_sspxPlantGrowth_RosmertaInSpaceHigh_00 // High above the lonely moon, the red sun turns the whole system into twilight geometry. The leaves darken slightly, then stabilize, as if deciding “this will do.”

		RAB-58ESrfLanded* = #GEPscience_sspxPlantGrowth_RAB-58ESrfLanded_00 // In near-zero gravity, the soil substitute tries to become a free-ranging cloud, so everything gets straps and screens. The plants sprout anyway, apparently curious what this captured little world even is.
		RAB-58EInSpaceLow* = #GEPscience_sspxPlantGrowth_RAB-58EInSpaceLow_00 // RAB-58E spins below like a loose bolt in a vast machine, and your orbit feels improvised. The growth lights remain the only dependable sunrise, and the plants act relieved about that.
		RAB-58EInSpaceHigh* = #GEPscience_sspxPlantGrowth_RAB-58EInSpaceHigh_00 // From high above, Epona’s realm looks spacious and strange, with this moonlet barely qualifying as a “down.” The seedlings grow slowly, like they’re waiting to learn where they actually belong.

		CernunnosSrfLanded* = #GEPscience_sspxPlantGrowth_CernunnosSrfLanded_00 // The surface is ancient ice and long shadow under a sun that never gets properly bright. The greenhouse becomes a small, warm lie, and the plants reward it with cautious, steady growth.
		CernunnosInSpaceLow* = #GEPscience_sspxPlantGrowth_CernunnosInSpaceLow_00 // Low orbit turns Cernunnos into a dark coin edged with faint red. The plants keep to their timer as mission control replies arrive late enough to feel like they’re from yesterday.
		CernunnosInSpaceHigh* = #GEPscience_sspxPlantGrowth_CernunnosInSpaceHigh_00 // High above the dwarf planet, the sky is crowded with stars that don’t care about your schedule. The plants keep growing under their lamps, quietly proving that “far away” isn’t a growth inhibitor.
    }
}