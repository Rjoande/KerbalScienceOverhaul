@EXPERIMENT_DEFINITION:HAS[#id[bd_magScan]]
{
	%RESULTS
	{
        KerbinSrfLandedAridHighlands* = #ScienceRefactor_bd_magScan_KerbinSrfLandedBadlands_00 // Strong local magnetic fields are detected in this area, suggesting high concentrations of magnetically active elements.
		
        MunSrfLandedPolarIceCraters* = #ScienceRefactor_bd_magScan_MunSrfLandedPolarCrater_00 // Strong magnetic fields are detected in the base of the crater, likely arising from magnetically aligned ejecta from a large impactor.
		MunSrfLandedVoronoiCraters* = #ScienceRefactor_bd_magScan_MunSrfLandedHighlandCraters_00 // A strong magnetic field is detected in the deeper regions of this crater.
		MunSrfLandedEastExoticCraters* = #ScienceRefactor_bd_magScan_MunSrfLandedEastFarsideCrater_00 // An intense magnetic field is detected in this crater, possibly originating in material from the meteorite that impacted here.
		
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_magScan_MinmusSrfLandedGreaterFlats_00 // Even Minmus' minty-looking frozen surface is magnetically dead.
		MinmusSrfLandedBasins* = #ScienceRefactor_bd_magScan_MinmusSrfLandedLesserFlats_00 // The readout is flat, like the frozen surface.
    }
}