        // --- barometerScan ---
        //   Sun
        #CSS_Aebestach_barometerScan_Sun_01 = Misurare la pressione vicino a Sole? Lettura: sei finito. Strumento: fuso. Lezione: non usare il barometro vicino a una stella.
        //   Moho
        #CSS_Aebestach_barometerScan_Moho_01 = Zero. L'atmosfera di Moho è più rarefatta della tua vita sociale. Il barometro protesta.
        //   Kerbin
        #CSS_Aebestach_barometerScan_Kerbin_MiniBiomes_01 = Volo a bassa quota sul Centro Spaziale Kerbal. La pressione scende. O è il tuo stomaco?
        #CSS_Aebestach_barometerScan_Kerbin_MiniBiomes_02 = In alta quota sul Centro Spaziale Kerbal. Il barometro segna quasi spazio. Casa non è mai sembrata così piccola.
        //   Mun
        #CSS_Aebestach_barometerScan_Mun_01 = Vuoto. Vuoto assoluto. Portare un barometro su Mun è come portare un ombrello a una festa: inutile, ma innocuo.
        //   Minmus
        #CSS_Aebestach_barometerScan_Minmus_01 = Minmus non ha atmosfera. Il barometro segna zero. Pensi di usarlo come termometro. Non funziona neanche quello.
        //   Dres
        #CSS_Aebestach_barometerScan_Dres_01 = Pressione su Dres: nessuna. Atmosfera nanica di un pianeta nano. Il barometro piange.
        //   Jool
        #CSS_Aebestach_barometerScan_Jool_01 = Barometro nello spazio vicino a Jool. Segna zero. Ti senti comunque soddisfatto per aver provato.
        #CSS_Aebestach_barometerScan_Jool_02 = Ben al di sopra dell'atmosfera di Jool. Pressione: nulla. Il gigante verde brilla in basso. Nessun rimborso per le sonde schiacciate.
        //   Vall
        #CSS_Aebestach_barometerScan_Vall_01 = Vall è un mondo di ghiaccio senza atmosfera. Il barometro segna zero. Inizi a sentire la mancanza di Laythe.
        //   Tylo
        #CSS_Aebestach_barometerScan_Tylo_01 = Tylo non ha atmosfera. Barometro: zero. Sei in piedi sulla grande luna a chiederti perché ti sei portato questo strumento.
        //   Bop
        #CSS_Aebestach_barometerScan_Bop_01 = Lettura del barometro: zero. Bop non ha atmosfera. Hai fissato lo strumento per cinque minuti sperando che cambiasse. Non è cambiato.
        //   Pol
        #CSS_Aebestach_barometerScan_Pol_01 = L'"atmosfera" di Pol: nessuna. Barometro inutile su questo mondo roccioso e colorato. Almeno è leggero.
        //   Eeloo
        #CSS_Aebestach_barometerScan_Eeloo_01 = Vuoto criogenico di Eeloo. Pressione: zero. Il barometro si è gelato. Anche tu.

// --- gravityScan ---
        //   Minmus
        #CSS_Aebestach_gravityScan_Minmus_01 = Bassopiani di Minmus. Più debole.
        #CSS_Aebestach_gravityScan_Minmus_02 = Colline di Minmus in orbita bassa. Gravità del mondo di ghiaccio.
        #CSS_Aebestach_gravityScan_Minmus_03 = Pianure di Minmus in orbita bassa. Il pozzo gravitazionale del mondo di ghiaccio è poco profondo: anomalia di Bouguer quasi zero, distribuzione di massa uniforme. Fluttui in orbita meditando sulla densità delle caramelle alla menta.
        #CSS_Aebestach_gravityScan_Minmus_04 = Bassopiani di Minmus in orbita bassa. Pozzo gravitazionale poco profondo.
        #CSS_Aebestach_gravityScan_Minmus_05 = Terreni piatti di Minmus in orbita bassa. Gravità piatta.
        #CSS_Aebestach_gravityScan_Minmus_06 = Terreni più piatti di Minmus in orbita bassa. Ancora più piatta.
        #CSS_Aebestach_gravityScan_Minmus_07 = Terreni piattissimi di Minmus in orbita bassa. Piattissima.
        #CSS_Aebestach_gravityScan_Minmus_08 = Terreni abbastanza piatti di Minmus in orbita bassa. Abbastanza piatta.
        #CSS_Aebestach_gravityScan_Minmus_09 = Poli di Minmus in orbita bassa. Gravità al polo ghiacciato.
        #CSS_Aebestach_gravityScan_Minmus_10 = Colline di Minmus in orbita alta. Il mondo di ghiaccio da lontano.
        #CSS_Aebestach_gravityScan_Minmus_11 = Pianure di Minmus in orbita alta. Il mondo di ghiaccio da lontano: il segnale gravitazionale è così debole che lo strumento sospetta un guasto. Non è rotto; Minmus è semplicemente così leggera.
        #CSS_Aebestach_gravityScan_Minmus_12 = Bassopiani di Minmus in orbita alta. Curve di gravità piatte come i terreni piatti di Minmus. Keplero sarebbe soddisfatto dell'orbita; tu sei preoccupato per i dati.
        #CSS_Aebestach_gravityScan_Minmus_13 = Terreni piattissimi di Minmus in orbita alta. Più grandi, più piatti, gravità più debole. Fluttui al margine del sistema chiedendoti con che lentezza cadrebbe qui la mela di Newton.
        //   Dres
        #CSS_Aebestach_gravityScan_Dres_01 = Poli di Dres. Gravità fredda.
        #CSS_Aebestach_gravityScan_Dres_02 = Pianure di Dres. Gravità grigia.
        #CSS_Aebestach_gravityScan_Dres_03 = Bassopiani di Dres. Gravità piatta.
        #CSS_Aebestach_gravityScan_Dres_04 = Dorsali di Dres. Gravità delle dorsali.
        #CSS_Aebestach_gravityScan_Dres_05 = Crateri da impatto di Dres. Mascon?
        #CSS_Aebestach_gravityScan_Dres_06 = Piroclasti da impatto di Dres. Gravità tra i piroclasti.
        #CSS_Aebestach_gravityScan_Dres_07 = Orbita bassa di Dres. Gravità del pianeta nano in basso.
        #CSS_Aebestach_gravityScan_Dres_08 = Orbita alta di Dres. Gravità solitaria.
        //   Vall
        #CSS_Aebestach_gravityScan_Vall_01 = Scansione gravitazionale in orbita bassa. Cos'è sotto la crosta di ghiaccio di Vall? Annoti 666 e te ne vai.
        #CSS_Aebestach_gravityScan_Vall_02 = Gravità di Vall in orbita bassa. Distribuzione di massa sotto il ghiaccio.
        #CSS_Aebestach_gravityScan_Vall_03 = Biomi di Vall in orbita alta. Dati gravitazionali da lontano: lo spessore della crosta di ghiaccio non è uniforme, le sollecitazioni mareali sono distorte dall'attrazione di Jool. Annotato, poi lo sguardo verso Kerbin.
        //   Tylo
        #CSS_Aebestach_gravityScan_Tylo_01 = Biomi di Tylo in orbita bassa. Gravità della grande luna.
        #CSS_Aebestach_gravityScan_Tylo_02 = Biomi di Tylo in orbita alta. Il pozzo gravitazionale della grande luna si estende anche da lontano: mascon sulla mappa delle curve come brufoli. Scansione completata; ti bevi qualcosa.
        //   Bop
        #CSS_Aebestach_gravityScan_Bop_01 = Il campo gravitazionale sulle dorsali di Bop presenta strane ondulazioni. Come un respiro.
        #CSS_Aebestach_gravityScan_Bop_02 = Gradiente gravitazionale anomalo nella zona dei declivi. La colpa è di Jool. O di Bop.
        #CSS_Aebestach_gravityScan_Bop_03 = Orbita bassa sulle dorsali: lo scanner oscilla tra Jool e Bop. Lettura: inquietante.
        #CSS_Aebestach_gravityScan_Bop_04 = Orbita alta sulle dorsali. Letture sospettosamente calme. Sta facendo finta di dormire, Bop?
        #CSS_Aebestach_gravityScan_Bop_05 = Orbita alta sui poli. La gravità di Jool domina. Molto verde.
        #CSS_Aebestach_gravityScan_Bop_06 = Orbita alta sui declivi. Scansione gravitazionale completata. Tiri un sospiro di sollievo.
        #CSS_Aebestach_gravityScan_Bop_07 = Orbita alta sulla valle. Anomalia di massa da qualche parte. Decidi di non indagare.
        //   Pol
        #CSS_Aebestach_gravityScan_Pol_01 = Poli di Pol in orbita bassa. Gravità debole.
        #CSS_Aebestach_gravityScan_Pol_02 = Bassopiani di Pol in orbita bassa. Pozzo gravitazionale poco profondo.
        #CSS_Aebestach_gravityScan_Pol_03 = Orbita alta di Pol. Pol si fa appena sentire.
        //   Eeloo
        #CSS_Aebestach_gravityScan_Eeloo_01 = Poli di Eeloo. Gravità del ghiaccio.
        #CSS_Aebestach_gravityScan_Eeloo_02 = Ghiacciai boreali di Eeloo. Gravità del ghiacciaio.
        #CSS_Aebestach_gravityScan_Eeloo_03 = Bassopiani di Eeloo. Gravità piatta.
        #CSS_Aebestach_gravityScan_Eeloo_04 = Colline di Eeloo. Gravità collinare.
        #CSS_Aebestach_gravityScan_Eeloo_05 = Canyon ghiacciati di Eeloo. Gravità nel canyon.
        #CSS_Aebestach_gravityScan_Eeloo_06 = Crateri di Eeloo. Gravità nel cratere.
        #CSS_Aebestach_gravityScan_Eeloo_07 = Pianure di Eeloo. Gravità delle pianure.
        #CSS_Aebestach_gravityScan_Eeloo_08 = Fragipan di Eeloo. Gravità congelata.
        #CSS_Aebestach_gravityScan_Eeloo_09 = Campo di Babbage di Eeloo. Gravità glaciale.
        #CSS_Aebestach_gravityScan_Eeloo_10 = Ghiacciaio Mu di Eeloo. Gravità nel fiume di ghiaccio.
        #CSS_Aebestach_gravityScan_Eeloo_11 = Biomi di Eeloo in orbita bassa. Mondo di ghiaccio in basso.
        #CSS_Aebestach_gravityScan_Eeloo_12 = Biomi di Eeloo in orbita alta. Il mondo di ghiaccio da lontano.

        // --- atmosphereAnalysis ---
        //   Sun
        #CSS_Aebestach_atmosphereAnalysis_Sun_01 = Analisi dell'atmosfera vicino a Sole? Lettura: plasma. Temperatura: sei finito. Strumento: fuso. Lezione: Sole non è un'atmosfera, è l'inferno.
        //   Kerbin
        #CSS_Aebestach_atmosphereAnalysis_Kerbin_01 = Niente salsedine né spruzzi quassù. Solo la solita roba atmosferica... gassosa... insomma.

        // --- seismicScan ---
        //   Moho
        #CSS_Aebestach_seismicScan_MohoSrfLanded_01 = Polo nord di Moho. Geologicamente morto.
        #CSS_Aebestach_seismicScan_MohoSrfLanded_02 = Bassopiani occidentali di Moho. La crosta è stranamente silenziosa.
        #CSS_Aebestach_seismicScan_MohoSrfLanded_03 = Bassopiani sud-orientali di Moho. La crosta è silenziosa come una biblioteca: una biblioteca arrostita dal sole per miliardi di anni. La termodinamica dice che la dilatazione termica dovrebbe allargare le fratture, ma l'ago non si muove.
        #CSS_Aebestach_seismicScan_MohoSrfLanded_04 = Polo sud di Moho. Geologia di Moho: nessuna.
        //   Mun
        #CSS_Aebestach_seismicScan_MunSrfLanded_01 = Deboli terremoti lunari nei bassopiani. Mun sta sonnecchiando.
        #CSS_Aebestach_seismicScan_MunSrfLanded_02 = Sismometro sul lato oscuro. Le letture differiscono dal lato visibile. Hai trovato qualcosa.
        //   Minmus
        #CSS_Aebestach_seismicScan_MinmusSrfLanded_01 = Poli di Minmus. Terremoti di ghiaccio?
        //   Dres
        #CSS_Aebestach_seismicScan_DresSrfLanded_01 = Pianure di Dres. Sismologia da pianeta nano.
        #CSS_Aebestach_seismicScan_DresSrfLanded_02 = Dorsali di Dres. Vibrazioni delle dorsali.
        #CSS_Aebestach_seismicScan_DresSrfLanded_03 = Crateri da impatto di Dres. Scosse di assestamento da impatto?
        #CSS_Aebestach_seismicScan_DresSrfLanded_04 = Piroclasti da impatto di Dres. Sismologia tra i piroclasti.
        //   Vall
        #CSS_Aebestach_seismicScan_VallSrfLanded_01 = Poli di Vall. Terremoti di ghiaccio.
        #CSS_Aebestach_seismicScan_VallSrfLanded_02 = Bacini di Vall. Attività sotto la superficie?
        //   Tylo
        #CSS_Aebestach_seismicScan_TyloSrfLanded_01 = Pianure di Tylo. Sismologia di Tylo.
        #CSS_Aebestach_seismicScan_TyloSrfLanded_02 = Bassopiani di Tylo. Scosse nel bacino.
        #CSS_Aebestach_seismicScan_TyloSrfLanded_03 = Crateri di Tylo. Scosse di assestamento da impatto?
        //   Eeloo
        #CSS_Aebestach_seismicScan_EelooSrfLanded_01 = Fragipan di Eeloo. Crosta congelata.
        #CSS_Aebestach_seismicScan_EelooSrfLanded_02 = Campo di Babbage di Eeloo. Silenzio.
        #CSS_Aebestach_seismicScan_EelooSrfLanded_03 = Ghiacciai australi di Eeloo. Terremoti di ghiaccio?
        #CSS_Aebestach_seismicScan_EelooSrfLanded_04 = Ghiacciaio Mu di Eeloo. Sismologia del ghiacciaio.

// --- surfaceSample ---
        //   Dres
        #CSS_Aebestach_surfaceSample_DresSrfLanded_01 = Poli di Dres. Miscela di ghiaccio e roccia.
        #CSS_Aebestach_surfaceSample_DresSrfLanded_02 = Pianure di Dres. Regolite grigia.
        #CSS_Aebestach_surfaceSample_DresSrfLanded_03 = Bassopiani di Dres. Grigio fine.
        #CSS_Aebestach_surfaceSample_DresSrfLanded_04 = Dorsali di Dres. Campione roccioso.
        //   Vall
        #CSS_Aebestach_surfaceSample_VallSrfLanded_01 = Campioni dai bacini di Vall: ghiaccio d'acqua e silicati, tracce di possibili depositi di salamoia sotto la crosta di ghiaccio. Ghiaccio e roccia, ricetta stile Europa.
        //   Tylo
        #CSS_Aebestach_surfaceSample_TyloSrfLanded_01 = Campione dalle pianure di Tylo. Basalto grigio.
        #CSS_Aebestach_surfaceSample_TyloSrfLanded_02 = Campioni dai crateri di Tylo. Prodotti di fusione da impatto.
        //   Pol
        #CSS_Aebestach_surfaceSample_PolSrfLanded_01 = Campione polare di Pol. Miscela di ghiaccio e roccia.
        #CSS_Aebestach_surfaceSample_PolSrfLanded_02 = Roccia delle pianure di Pol. Composizione misteriosa.
        //   Eeloo
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_01 = Fragipan di Eeloo. Campione congelato.
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_02 = Campo di Babbage di Eeloo. Regolite ghiacciata.
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_03 = Ghiacciai australi di Eeloo. Ghiaccio da ghiacciaio.
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_04 = Ghiacciaio Mu di Eeloo. Campione dal fiume di ghiaccio.

        // --- asteroidSample ---
        //   Sun
        #CSS_Aebestach_asteroidSample_Sun_01 = Un asteroide vicino a Sole?! Sei pazzo? La composizione indica... beh, il campione è evaporato. Controllo missione: "Non farlo mai più."
        //   Moho
        #CSS_Aebestach_asteroidSample_Moho_01 = Un asteroide vicino a Moho! Roccia arrostita dal sole. La composizione mostra minerali refrattari: un sopravvissuto del sistema interno. Hai quasi bruciato i guanti.
        #CSS_Aebestach_asteroidSample_Moho_02 = Asteroide in orbita attorno a Moho. Caldo. Caldissimo. Il campione mostra metamorfismo termico. Inizi a sentire la mancanza delle estati su Kerbin.
        #CSS_Aebestach_asteroidSample_Moho_03 = Orbita esterna di Moho. Asteroide al confine dell'inferno. Almeno il campione non si congelerà.
        //   Eve
        #CSS_Aebestach_asteroidSample_Eve_01 = Un asteroide su Eve! Campionamento di rocce nell'inferno viola. La composizione mostra metamorfismo ad alta pressione: l'atmosfera di Eve schiaccia anche le rocce. E anche te.
        #CSS_Aebestach_asteroidSample_Eve_02 = Asteroide vicino all'orbita di Eve. Al confine della densa atmosfera. Campionamento difficile, ma campione unico: testimone del calore di Eve.
        #CSS_Aebestach_asteroidSample_Eve_03 = Orbita esterna di Eve. Asteroide al margine del pozzo gravitazionale del gigante gassoso. Almeno qui non serve la tuta... aspetta, sì.
        //   Gilly
        #CSS_Aebestach_asteroidSample_Gilly_01 = Un asteroide su Gilly? O una roccia su Gilly? In microgravità il confine si fa labile. Composizione: roccia. Missione compiuta.
        #CSS_Aebestach_asteroidSample_Gilly_02 = Vicino all'orbita di Gilly: asteroide e luna che danzano insieme. Durante il campionamento sei quasi scappato via per effetto gravitazionale. Emozionante.
        #CSS_Aebestach_asteroidSample_Gilly_03 = Orbita esterna di Gilly. Asteroide in attesa sotto l'influenza gravitazionale di Eve. Campione prezioso, come la tua pazienza.
        //   Kerbin
        #CSS_Aebestach_asteroidSample_Kerbin_01 = Campione di asteroide vicino a Kerbin! Nucleo di ferro-nichel, mantello di silicati: tipico di tipo C o S. Gli scienziati litigheranno. Pensi di incidere "chi prima arriva meglio alloggia".
        #CSS_Aebestach_asteroidSample_Kerbin_02 = Campionamento dopo ammaraggio? L'asteroide è caduto nell'oceano di Kerbin? La composizione è contaminata dall'acqua di mare, ma il materiale del nucleo è ancora analizzabile. Almeno non hai dovuto volare fin lassù.
        #CSS_Aebestach_asteroidSample_Kerbin_03 = Campionamento durante un sorvolo a bassa quota: come acchiappare farfalle con un retino, solo più costoso, più rischioso e più roccioso.
        #CSS_Aebestach_asteroidSample_Kerbin_04 = Campionamento ad alta quota. Asteroide in attesa al margine del pozzo gravitazionale di Kerbin. Campione recuperato: dimostrata la capacità di Kerbin di "catturare nello spazio".
        #CSS_Aebestach_asteroidSample_Kerbin_MiniBiomes_01 = Campione di asteroide al Centro Spaziale Kerbal. Roccia dalla fascia, consegnata a domicilio. Gli ingegneri vogliono sapere chi lascia gli asteroidi in giro.
        //   Mun
        #CSS_Aebestach_asteroidSample_Mun_01 = Un asteroide su Mun! Piroclasti da impatto o asteroide catturato. La composizione differisce dalla roccia di Mun: un messaggero dalla fascia. Gli hai dato un nome.
        #CSS_Aebestach_asteroidSample_Mun_02 = Campione di asteroide vicino all'orbita di Mun. La bassa gravità ha reso il campionamento... interessante. Almeno non è volato via.
        #CSS_Aebestach_asteroidSample_Mun_03 = Asteroide in orbita esterna di Mun. Il campione mostra lunga esposizione al vento solare. Alto valore scientifico, soddisfazione ancora maggiore per averlo finalmente preso.
        //   Minmus
        #CSS_Aebestach_asteroidSample_Minmus_01 = Un asteroide su Minmus! Visitatore roccioso sui terreni piatti di ghiaccio. La composizione mostra condrite carboniosa: primordiale del sistema solare primordiale. Molto più duro del formaggio di Minmus.
        #CSS_Aebestach_asteroidSample_Minmus_02 = Asteroide vicino all'orbita di Minmus. La bassa gravità rende il pozzo gravitazionale di questa patata poco profondo. Campionamento come giocare alle biglie.
        #CSS_Aebestach_asteroidSample_Minmus_03 = Orbita esterna di Minmus. Asteroide in attesa al margine del mondo di ghiaccio. Campione intatto, come il tuo umore.
        //   Duna
        #CSS_Aebestach_asteroidSample_Duna_01 = Un asteroide su Duna! Roccia ricoperta di polvere rossa. La composizione mostra ferro-nichel: un viaggiatore dalla fascia. Trovare il cugino lontano di Duna su Duna stessa.
        #CSS_Aebestach_asteroidSample_Duna_02 = Asteroide vicino all'orbita di Duna. Campionamento nella sottile atmosfera. Polveroso, ma campione intatto. Stile Duna.
        #CSS_Aebestach_asteroidSample_Duna_03 = Orbita esterna di Duna. Asteroide al margine del pianeta rosso. Il campione mostra cicli termici. Il saluto di Duna.
        //   Ike
        #CSS_Aebestach_asteroidSample_Ike_01 = Un asteroide su Ike! Roccia grigia su luna grigia. La composizione differisce dalla roccia di Ike: piroclasti di Duna o visitatore indipendente. Hai fatto delle foto.
        #CSS_Aebestach_asteroidSample_Ike_02 = Asteroide vicino all'orbita di Ike. La luna di Duna condivide lo spazio con l'asteroide. Campionamento tranquillo, come il tuo umore.
        #CSS_Aebestach_asteroidSample_Ike_03 = Orbita esterna di Ike. Asteroide al margine del sistema di Duna. Campione prezioso, come il tuo carburante.
        //   Dres
        #CSS_Aebestach_asteroidSample_Dres_01 = Un asteroide su Dres! Roccia nanica su pianeta nano. La composizione mostra carbonaceo: tipico del bordo della fascia. Dres finalmente ha compagnia.
        #CSS_Aebestach_asteroidSample_Dres_02 = Asteroide vicino all'orbita di Dres. Il dimenticato pianeta nano ha finalmente dei visitatori. Il campione mostra un'età antica: dall'epoca di formazione del sistema solare. Dres è commosso.
        #CSS_Aebestach_asteroidSample_Dres_03 = Orbita esterna di Dres. Asteroide al margine del solitario pianeta nano. Campione intatto, come la tua solitudine.
        //   Jool
        #CSS_Aebestach_asteroidSample_Jool_01 = Un asteroide vicino a Jool! Roccia catturata dal gigante gassoso. La composizione mostra ghiaccio: le radiazioni di Jool hanno alterato la superficie. Sei tornato vivo. Vale la pena festeggiare.
        //   Laythe
        #CSS_Aebestach_asteroidSample_Laythe_01 = Un asteroide su Laythe! Isola rocciosa su un mondo oceanico. La composizione potrebbe essere alterata dall'acqua di mare. Hai cercato conchiglie: nessuna.
        #CSS_Aebestach_asteroidSample_Laythe_02 = Asteroide vicino all'orbita di Laythe. Al confine dell'atmosfera di ossigeno. Durante il campionamento hai quasi sentito nostalgia di casa. Quasi.
        #CSS_Aebestach_asteroidSample_Laythe_03 = Orbita esterna di Laythe. Asteroide al margine della zona abitabile del sistema di Jool. Il campione mostra erosione da ghiaccio. Il saluto di Laythe.
        //   Vall
        #CSS_Aebestach_asteroidSample_Vall_01 = Un asteroide su Vall! Isola rocciosa su un mondo di ghiaccio. La composizione mostra materiale primordiale: dal sistema solare primigenio. Collisione di ghiaccio e pietra.
        #CSS_Aebestach_asteroidSample_Vall_02 = Asteroide vicino all'orbita di Vall. Pozzo gravitazionale della luna di ghiaccio. Hai quasi scivolato durante il campionamento. Il ghiaccio è scivoloso.
        #CSS_Aebestach_asteroidSample_Vall_03 = Orbita esterna di Vall. Asteroide al margine della fascia di ghiaccio del sistema di Jool. Campione intatto, come i tuoi guanti.
        //   Tylo
        #CSS_Aebestach_asteroidSample_Tylo_01 = Un asteroide su Tylo! Roccia sotto la forte gravità. La composizione mostra fusione da impatto: la storia degli impatti di Tylo è ricca. Riuscivi a malapena a sollevarlo.
        #CSS_Aebestach_asteroidSample_Tylo_02 = Asteroide vicino all'orbita di Tylo. Profondo pozzo gravitazionale della grande luna. Campiona con attenzione: non farti risucchiare.
        #CSS_Aebestach_asteroidSample_Tylo_03 = Orbita esterna di Tylo. Asteroide al margine della luna più grande del sistema di Jool. Campione prezioso, come il tuo carburante.
        //   Bop
        #CSS_Aebestach_asteroidSample_Bop_01 = Un asteroide su Bop! Roccia inquietante su patata inquietante. La composizione mostra... normale? Senti che ti sta guardando. Foto fatta, via di corsa.
        #CSS_Aebestach_asteroidSample_Bop_02 = Asteroide vicino all'orbita di Bop. La piccola luna inquietante di Jool. Durante il campionamento hai sentito suoni strani. Forse allucinazioni. Forse Bop.
        #CSS_Aebestach_asteroidSample_Bop_03 = Orbita esterna di Bop. Asteroide al margine del sistema di Jool. Campione normale, il tuo disagio no.
        //   Pol
        #CSS_Aebestach_asteroidSample_Pol_01 = Un asteroide su Pol! Roccia su un mondo colorato. La composizione sfida ogni classificazione, come Pol stessa. Ne hai messo da parte un po' per far venire il mal di testa agli scienziati.
        #CSS_Aebestach_asteroidSample_Pol_02 = Asteroide vicino all'orbita di Pol. Microgravità della piccola luna. Campionamento come giocare alle biglie. Hai vinto.
        #CSS_Aebestach_asteroidSample_Pol_03 = Orbita esterna di Pol. Asteroide al margine della luna più misteriosa del sistema di Jool. Campione misterioso, Pol anche.
        //   Eeloo
        #CSS_Aebestach_asteroidSample_Eeloo_01 = Un asteroide su Eeloo! Roccia al margine del sistema. La composizione mostra materiale primordiale: forse dalla nube di Oort. Il tuo respiro si congela, come il campione.
        #CSS_Aebestach_asteroidSample_Eeloo_02 = Asteroide vicino all'orbita di Eeloo. Campionamento a distanza estrema. Freddo, solitario, ma campione prezioso.
        #CSS_Aebestach_asteroidSample_Eeloo_03 = Orbita esterna di Eeloo. Asteroide al margine del margine. Il campione potrebbe essere un visitatore interstellare. Come te.
        //   default
        #CSS_Aebestach_asteroidSample_default_01 = Campioni un asteroide. Composizione: roccia. Molta roccia. Controllo missione: "Altamente prezioso."

// --- cometSample ---
        //   Sun
        #CSS_Aebestach_cometSample_short_Sun_01 = Una cometa a corto periodo vicino a Sole? Il campione è evaporato. La cometa è evaporata. Ci sei quasi mancato anche tu. Controllo missione: non farlo.
        //   Moho
        #CSS_Aebestach_cometSample_short_Moho_01 = Cometa a corto periodo vicino a Moho. Ghiaccio al margine del sistema interno. Il campione sublima rapidamente nel calore di Moho. L'hai afferrato. Per un pelo.
        //   Eve
        #CSS_Aebestach_cometSample_short_Eve_01 = Cometa a corto periodo vicino a Eve. Ghiaccio al margine dell'inferno viola. Il campione sublima rapidamente nel calore di Eve. Ne hai racimolato un pezzettino.
        //   Gilly
        #CSS_Aebestach_cometSample_short_Gilly_01 = Cometa a corto periodo vicino a Gilly. La piccola patata e la cometa danzano insieme. Il campione mostra ghiaccio sotto l'influenza di Eve. Caldo.
        //   Kerbin
        #CSS_Aebestach_cometSample_short_Kerbin_01 = Cometa a corto periodo vicino a Kerbin. Una cometa in visita al mondo natale. Il campione mostra ghiaccio d'acqua e sostanze organiche: gli ingredienti della vita. Senti un po' di nostalgia di casa.
        #CSS_Aebestach_cometSample_intermediate_Kerbin_MiniBiomes_01 = Campione di cometa a periodo intermedio al Centro Spaziale Kerbal. Miscela di ghiaccio e roccia dalla zona tra la fascia e il sistema interno. Qualcuno ha lasciato una cometa all'Edificio Assemblaggio Veicoli?
        #CSS_Aebestach_cometSample_interstellar_Kerbin_MiniBiomes_01 = Campione di cometa interstellare al Centro Spaziale Kerbal. Visitatrice da oltre il sistema. L'hai trovata nel parcheggio. Storico. Bizzarro.
        #CSS_Aebestach_cometSample_long_Kerbin_MiniBiomes_01 = Campione di cometa a lungo periodo al Centro Spaziale Kerbal. Visitatrice dalla nube di Oort. Ne hai raccolto un po' prima che partisse. Il team di Ricerca e Sviluppo è confuso ma entusiasta.
        #CSS_Aebestach_cometSample_short_Kerbin_MiniBiomes_01 = Campione di cometa a corto periodo al Centro Spaziale Kerbal. Ghiaccio e polvere dal sistema interno. Controllo missione chiede perché stai campionando comete sulla piattaforma di lancio.
        //   Mun
        #CSS_Aebestach_cometSample_short_Mun_01 = Cometa a corto periodo vicino a Mun. Una cometa in visita alla luna. Il campione mostra ghiaccio e polvere. Hai raccolto.
        //   Minmus
        #CSS_Aebestach_cometSample_short_Minmus_01 = Cometa a corto periodo vicino a Minmus. Ghiaccio del mondo ghiacciato e ghiaccio della cometa. Il campione mostra alta purezza: più puro del formaggio di Minmus. Scientificamente.
        //   Duna
        #CSS_Aebestach_cometSample_short_Duna_01 = Cometa a corto periodo vicino a Duna. La polvere rossa del pianeta si mescola al ghiaccio della cometa. Campione unico. Hai fatto delle foto.
        //   Ike
        #CSS_Aebestach_cometSample_short_Ike_01 = Cometa a corto periodo vicino a Ike. La luna di Duna condivide lo spazio con la cometa. Il campione mostra ghiaccio e polvere. Hai raccolto.
        //   Dres
        #CSS_Aebestach_cometSample_short_Dres_01 = Cometa a corto periodo vicino a Dres. Il pianeta nano ha finalmente delle comete in visita. Il campione mostra carbonaceo: dal sistema solare primigenio. Dres è commosso.
        //   Jool
        #CSS_Aebestach_cometSample_short_Jool_01 = Cometa a corto periodo vicino a Jool. La gravità del gigante gassoso cattura le comete. Il campione mostra ghiaccio alterato dalle radiazioni di Jool. Verde.
        //   Laythe
        #CSS_Aebestach_cometSample_short_Laythe_01 = Cometa a corto periodo vicino a Laythe. Pioggia di comete sul mondo oceanico. Il campione mostra ghiaccio e sali. Hai assaggiato: controllo missione ti ha fermato.
        //   Vall
        #CSS_Aebestach_cometSample_short_Vall_01 = Cometa a corto periodo vicino a Vall. Ghiaccio della luna e ghiaccio della cometa. Il campione mostra alta purezza. Hai raccolto. Freddo.
        //   Tylo
        #CSS_Aebestach_cometSample_short_Tylo_01 = Cometa a corto periodo vicino a Tylo. Una cometa in visita alla grande luna. Il campione mostra ghiaccio sotto la gravità di Tylo. Pesante.
        //   Bop
        #CSS_Aebestach_cometSample_short_Bop_01 = Cometa a corto periodo vicino a Bop. La gravità di Jool perturba le orbite delle comete. Il campione mostra ghiaccio e polvere. Finisci la foto e te ne vai in fretta: Bop sta guardando.
        //   Pol
        #CSS_Aebestach_cometSample_short_Pol_01 = Cometa a corto periodo vicino a Pol. Mondo colorato e ghiaccio di cometa. Il campione mostra aspetto chiazzato, come Pol stessa. Misterioso.
        //   Eeloo
        #CSS_Aebestach_cometSample_short_Eeloo_01 = Cometa a corto periodo vicino a Eeloo. Visitatrice ghiacciata al margine del sistema. Il campione mostra materiale primordiale: forse dalla fascia di Kuiper. Freddo.
        //   default
        #CSS_Aebestach_cometSample_intermediate_default_01 = Campione di cometa a periodo intermedio. Tra la fascia di Kuiper e il sistema interno. Miscela di ghiaccio e roccia. Hai raccolto.
        #CSS_Aebestach_cometSample_interstellar_default_01 = Campione di cometa interstellare. Visitatrice da oltre il sistema. Composizione anomala. Potresti essere il primo kerbal ad averla toccata. Storico.
        #CSS_Aebestach_cometSample_long_default_01 = Campione di cometa a lungo periodo. Visitatrice dalla nube di Oort. Ghiaccio, polvere, antichità. Tieni in mano una cartolina dal margine del sistema.
        #CSS_Aebestach_cometSample_short_default_01 = Campione di cometa a corto periodo. Ghiaccio, polvere, sostanze organiche. Annusi: nessun odore. Il vuoto non profuma.

// --- magnetometer ---
        //   Sun
        #CSS_Aebestach_magnetometer_Sun_01 = Il magnetometro sta quasi per piangere.
        #CSS_Aebestach_magnetometer_Sun_02 = Mappi il campo magnetico del Sole durante la lunga orbita della tua navicella. Un'orbita ancora più lunga permetterebbe di monitorarne le variazioni durante il ciclo solare... è ora di abbandonare qualcuno nello spazio!
        //   Moho
        #CSS_Aebestach_magnetometer_Moho_01 = Il magnetometro emette un bip di apparente frustrazione. Niente atmosfera significa niente belle aurore.
        #CSS_Aebestach_magnetometer_Moho_02 = La massa ricca di metalli surriscaldata di Moho produce una sorta di effetto dinamo. Il vento solare si piega e obbedisce, almeno un po'.
        //   Eve
        #CSS_Aebestach_magnetometer_Eve_01 = Il magnetometro sibila e crepita in modo inquietante mentre la densa atmosfera di Eve danza e guizza contro le particelle cariche in arrivo. Il team di comunicazione vuole pubblicarlo online con un titolo acchiappa-clic tipo "SUONI DAL PIANETA DEMONIO" per fare incetta di iscritti.
        #CSS_Aebestach_magnetometer_Eve_02 = Le letture del magnetometro qui sono fucsia. Aspetta, no. Fievoli. È questa la parola giusta.
        //   Gilly
        #CSS_Aebestach_magnetometer_Gilly_01 = Aha! I micrometeoroidi carichi elettrostaticamente e riscaldati dal sole che rimbalzano sulla superficie possono formare archi fino allo spazio grazie alla, sai, principale caratteristica interessante di Gilly. Stiamo rilevando segnature magnetiche mentre queste cariche accelerano nello spazio.
        #CSS_Aebestach_magnetometer_Gilly_02 = Nessuno a casa si aspettava che un sasso così piccolo avesse un campo magnetico enorme, bellissimo e complesso. Infatti non ce l'ha.
        //   Kerbin
        #CSS_Aebestach_magnetometer_Kerbin_01 = Ringrazi Kerbin per il suo campo magnetico protettivo, e poi ringrazi il magnetometro per la sua pazienza in una missione così ordinaria.
        #CSS_Aebestach_magnetometer_Kerbin_02 = Forse è meglio non stare troppo a lungo nelle fasce di radiazione di Kerbin. Il magnetometro si rattristerebbe.
        //   Mun
        #CSS_Aebestach_magnetometer_Mun_01 = Sulla superficie di Mun c'è almeno un po' di materiale ancora magnetizzato, rilevabile da questa distanza: probabilmente tracce del passato attivo della roccia.
        #CSS_Aebestach_magnetometer_Mun_02 = Ai confini più lontani del campo magnetico di Kerbin subentra un silenzio pietroso. O forse... è quel minimo rumore appena sopra il limite di rilevamento che filtra attraverso...?
        //   Minmus
        #CSS_Aebestach_magnetometer_Minmus_01 = Con un contrasto così netto tra materiali e texture superficiale tra i terreni piatti e le colline, il magnetometro riesce a distinguere come diffondono il vento solare. Potrebbe essere utile per la mappatura dei biomi, se non avessi già degli occhi.
        #CSS_Aebestach_magnetometer_Minmus_02 = Minmus potrebbe non avere un campo magnetico interno, ma la sua superficie accumula molta carica e un sottile alone di polvere produce una propria attività magnetica.
        //   Duna
        #CSS_Aebestach_magnetometer_Duna_01 = I depositi superficiali di magnetite proiettano ancora i loro campi magnetici residui! Qualcosa li deve aver polarizzati un tempo, quando il nucleo di Duna era attivo. Ora se solo avessimo qualche miliardo di testate nucleari per riscaldarlo di nuovo...
        #CSS_Aebestach_magnetometer_Duna_02 = L'attività magnetica nello spazio attorno a Duna è terribilmente fievole. Non è un buon segno se non ti piace essere bombardato dalle radiazioni.
        //   Ike
        #CSS_Aebestach_magnetometer_Ike_01 = Se strizzi abbastanza gli occhi, riesci a convincerti che non sia zero. Se strizzi abbastanza il cervello, riesci a convincerti che Ike forse aveva un nucleo magneticamente attivo in passato. Fare entrambe le cose troppo a lungo fa male.
        #CSS_Aebestach_magnetometer_Ike_02 = Aspetta, cos'era quello, qualcosa è passato davanti al... no, te lo sei immaginato. Tutto tranquillo sopra Ike.
        //   Dres
        #CSS_Aebestach_magnetometer_Dres_01 = Il vento solare si schianta contro la roccia morta come un tubo da giardino contro una pianta triste e appassita. Il team degli strumenti a casa sospira all'unisono.
        #CSS_Aebestach_magnetometer_Dres_02 = Niente. Zero. Nulla. Se Dres ha mai avuto un nucleo attivo, si è esaurito in fretta durante la formazione del sistema solare.
        //   Jool
        #CSS_Aebestach_magnetometer_Jool_01 = Il braccio dell'antenna potrebbe anche piegarsi sotto l'incredibile magnetismo presente qui. Non lo fa, perché non è fatto di materiali ferromagnetici, ma comunque.
        #CSS_Aebestach_magnetometer_Jool_02 = Anche da milioni di chilometri di distanza, la possente dinamo magnetica di Jool incombe su tutto. Il violento flusso di particelle cariche nelle sue fasce di radiazione è ugualmente intimidatorio.
        //   Laythe
        #CSS_Aebestach_magnetometer_Laythe_01 = Dopo qualche problema, lo strumento torna a funzionare e sforna allegramente una gran mole di informazioni sulla complessa dinamo del nucleo semi-attivo di Laythe. Hai sostituito la noia per il malfunzionamento con la noia per il team scientifico che non la smette più di cianciare.
        #CSS_Aebestach_magnetometer_Laythe_02 = Le letture di particelle cariche solari qui sono fortunatamente basse. Quelle di particelle cariche da Jool, invece...
        //   Vall
        #CSS_Aebestach_magnetometer_Vall_01 = Il magnetometro è un po' a corto di stimoli.
        #CSS_Aebestach_magnetometer_Vall_02 = Vall attraversa il campo magnetico di Jool, tranquilla e rassegnata. Il rapporto va scritto lo stesso.
        //   Tylo
        #CSS_Aebestach_magnetometer_Tylo_01 = Le letture qui sono comunque interessanti, anche se non particolarmente energetiche. L'enorme massa di Tylo non è proprio sufficiente a unificare gravità ed elettromagnetismo. Ci stiamo ancora lavorando.
        #CSS_Aebestach_magnetometer_Tylo_02 = Il campo magnetico di Jool si deforma all'avvicinarsi. L'enorme nucleo di Tylo, forse riscaldato per effetto mareale dal pianeta madre, produce un proprio magnetismo.
        //   Bop
        #CSS_Aebestach_magnetometer_Bop_01 = Mentre il resto degli strumenti impazzisce, il magnetometro rimane imperturbabile. È troppo nuovo? Troppo giovane e innocente per ricordare la catastrofe?
        #CSS_Aebestach_magnetometer_Bop_02 = Le letture del magnetometro qui sono nella norma. Beh. Ti aspettavi qualcosa di più drammatico.
        //   Pol
        #CSS_Aebestach_magnetometer_Pol_01 = I grani carichi dalla forma peculiare che si staccano dalla superficie di Pol interagiscono magnificamente con i campi magnetici di Jool e del Sole insieme. Be', magnificamente secondo il team degli strumenti a casa. Tu non ci vedi granché.
        #CSS_Aebestach_magnetometer_Pol_02 = Nessuna attività di dinamo magnetica nel nucleo, ovvia-mente.
        //   Eeloo
        #CSS_Aebestach_magnetometer_Eeloo_01 = Un sottile strato di gas ionizzato attorno a Eeloo disperde le particelle cariche in arrivo. Per qualsiasi scopo pratico, ovviamente, non è attraversabile in volo.
        #CSS_Aebestach_magnetometer_Eeloo_02 = Be', questo piccolo ghiacciolo non ha di certo un campo magnetico. Ma la distanza è promettente per studiare l'attività solare. L'eliopausa non può essere molto più lontana, vero? Sicuramente.
        //   default
        #CSS_Aebestach_magnetometer_default_01 = Il magnetometro opera in un ambiente sconosciuto. Lettura: sì? No? Forse il campo magnetico del Kraken. Annotato.

        // --- deployedGooObservation ---
        //   Moho
        #CSS_Aebestach_deployedGooObservation_MohoSrfLanded_01 = Sotto il calore estremo la melma mostra una notevole termostabilità, formando una crosta caramellata. Controllo missione avvisa: non mangiarla. Non è vero caramello.
        //   Eve
        #CSS_Aebestach_deployedGooObservation_EveSrfLanded_01 = L'atmosfera viola e la pressione schiacciante appiattiscono la melma come una frittella. Valore scientifico: convalida la reologia non-newtoniana in condizioni estreme. Bonus: la melma sembra infelice qui.
        //   Gilly
        #CSS_Aebestach_deployedGooObservation_GillySrfLanded_01 = In microgravità la melma si espande in una sfera soffice, come zucchero filato verde che fluttua nello spazio. Fisicamente prevedibile, ma continui ad avere voglia di darle un morso.
        //   Kerbin
        #CSS_Aebestach_deployedGooObservation_KerbinSrfLanded_01 = Il suolo di casa eccita insolitamente la melma: umidità, azoto, o forse nostalgia. I dati suggeriscono che la diversità microbica di Kerbin la faccia sentire "a casa".
        //   Mun
        #CSS_Aebestach_deployedGooObservation_MunSrfLanded_01 = La polvere lunare reagisce in modo interessante con la melma, formando grumi polverosi. Spiegabile teoricamente con l'adesione elettrostatica; preferisci credere che la melma stia facendo il cosplay della superficie lunare.
        //   Minmus
        #CSS_Aebestach_deployedGooObservation_MinmusSrfLanded_01 = La melma sui terreni piatti di Minmus assume una strana tinta verde menta. L'analisi mostra perclorati che si complessano con la melma: scientificamente plausibile, visivamente come una caramella posseduta.
        //   Duna
        #CSS_Aebestach_deployedGooObservation_DunaSrfLanded_01 = La polvere rossa ricopre rapidamente la melma, creando un mimetismo naturale. Conclusione: mimetizzazione in stile Marte riuscita. Significato scientifico: da definire.
        //   Ike
        #CSS_Aebestach_deployedGooObservation_IkeSrfLanded_01 = La melma risalta nettamente sulla superficie grigia di Ike, come una gelatina dimenticata. Letture di gravità nella norma. Lettura dell'umore della melma: solitaria.
        //   Dres
        #CSS_Aebestach_deployedGooObservation_DresSrfLanded_01 = La melma sul pianeta nano reagisce pigramente, come contagiata dalla "mancanza di presenza" di Dres. Almeno la curva dei dati è liscia: perché non è successo nulla.
        //   Laythe
        #CSS_Aebestach_deployedGooObservation_LaytheSrfLanded_01 = Atmosfera ossigenata! Si forma un film di ossido sulla melma, che vira dal verde al marrone. Biologicamente significativo, se la melma conta come forma di vita. Potrebbe star respirando.
        //   Vall
        #CSS_Aebestach_deployedGooObservation_VallSrfLanded_01 = Le temperature criogeniche congelano la melma in una sfera traslucida con struttura cristallina visibile. Bellissima, ma toccala e potrebbe frantumarsi. Non toccarla.
        //   Tylo
        #CSS_Aebestach_deployedGooObservation_TyloSrfLanded_01 = La forte gravità appiattisce la melma in un disco perfetto. Scoperta idrostatica inattesa: la melma può diventare così piatta, e ha un aspetto delizioso.
        //   Bop
        #CSS_Aebestach_deployedGooObservation_BopSrfLanded_01 = La melma su Bop assume una tinta verde scuro inquietante e pulsa debolmente. Dai la colpa alle radiazioni di Jool, ma sospetti che la verità sia più strana.
        //   Pol
        #CSS_Aebestach_deployedGooObservation_PolSrfLanded_01 = La superficie colorata di Pol "insegna" alla melma le sue sfumature locali, creando un effetto mimetico chiazzato. Mimetismo? Anomalia dei sensori? Rapporto: "sono necessari ulteriori studi".
        //   Eeloo
        #CSS_Aebestach_deployedGooObservation_EelooSrfLanded_01 = Il freddo estremo porta la melma in uno stato simile alla transizione vetrosa. Teoricamente conservabile per milioni di anni: se qualcuno volesse della melma congelata vecchia di un milione di anni.
        //   default
        #CSS_Aebestach_deployedGooObservation_default_01 = La melma dispiegata assume una morfologia sconcertante in condizioni sconosciute. Conclusione scientifica: la melma rimane sufficientemente misteriosa. Lo sapevamo già.

// --- deployedIONCollector ---
        //   Moho
        #CSS_Aebestach_deployedIONCollector_MohoSrfLanded_01 = Così vicino a Sole! La densità del vento solare è estrema; il collettore ha quasi saturato. Le particelle catturate mostrano un rapporto insolitamente alto di ioni pesanti: campione diretto della corona solare. Dati scottanti.
        //   Eve
        #CSS_Aebestach_deployedIONCollector_EveSrfLanded_01 = La ionosfera nell'atmosfera densa è insolitamente attiva. Le scariche ad alta pressione producono specie ioniche ricche. Conclusione: l'aria di Eve non si limita a schiacciarti, ti carica elettricamente anche.
        //   Gilly
        #CSS_Aebestach_deployedIONCollector_GillySrfLanded_01 = La carica della polvere è pronunciata in microgravità. Il collettore ha catturato abbondanti aerosol carichi, scientificamente definiti "plasma polveroso". Gilly fa arte elettrostatica di nascosto.
        //   Kerbin
        #CSS_Aebestach_deployedIONCollector_KerbinSrfLanded_01 = La ionosfera di Kerbin interagisce con il vento solare producendo un ricco flusso ionico. La fisica dietro le aurore: siamo solo di giorno, quindi niente spettacolo. I dati sono ugualmente belli.
        //   Mun
        #CSS_Aebestach_deployedIONCollector_MunSrfLanded_01 = La superficie priva di atmosfera di Mun è esposta direttamente al vento solare. Abbondanti ioni di idrogeno raccolti: materia prima per l'acqua di una futura base lunare! Valore scientifico: apre la strada all'ISRU.
        //   Minmus
        #CSS_Aebestach_deployedIONCollector_MinmusSrfLanded_01 = La tenue esosfera di Minmus contribuisce con ioni in traccia. Bassa concentrazione ma composizione interessante: OH⁻ dalla sublimazione del ghiaccio d'acqua. Anche le piccole lune hanno un'atmosfera, solo molto timida.
        //   Duna
        #CSS_Aebestach_deployedIONCollector_DunaSrfLanded_01 = Polvere ionizzata nella sottile atmosfera di Duna catturata con successo. Dati sui granelli di sabbia carichi durante le tempeste di polvere: un altro motivo per cui i futuri coloni avranno bisogno di indumenti antistatici.
        //   Ike
        #CSS_Aebestach_deployedIONCollector_IkeSrfLanded_01 = La coda magnetica di Duna si estende fino all'orbita di Ike; catturate particelle cariche intrappolate. Come sentire il "respiro" magnetico del pianeta. Romantico e ionizzato.
        //   Dres
        #CSS_Aebestach_deployedIONCollector_DresSrfLanded_01 = Il vento solare all'orbita del pianeta nano è relativamente incontaminato. Raccolto: valore di riferimento del mezzo interstellare. Dres contribuisce almeno con campioni "non contaminati". Presenza +1.
        //   Laythe
        #CSS_Aebestach_deployedIONCollector_LaytheSrfLanded_01 = L'atmosfera di ossigeno si ionizza sotto le radiazioni producendo ioni O₂⁺. Simile alla ionosfera di Kerbin: un'ulteriore prova dell'abitabilità di Laythe. L'ossigeno canta!
        //   Vall
        #CSS_Aebestach_deployedIONCollector_VallSrfLanded_01 = Le eruzioni criovulcaniche potrebbero rilasciare cristalli di ghiaccio carichi. Il collettore ha catturato rari complessi ghiaccio-ioni. Scienza in stile Europa, dati in stile Vall.
        //   Tylo
        #CSS_Aebestach_deployedIONCollector_TyloSrfLanded_01 = La grande luna priva di atmosfera è esposta alle fasce di radiazione di Jool. Le particelle catturate mostrano elettroni energetici anomalmente elevati: la superficie di Tylo potrebbe essere tra le più irradiate del sistema. Tieni la tuta addosso.
        //   Bop
        #CSS_Aebestach_deployedIONCollector_BopSrfLanded_01 = Le perturbazioni della magnetosfera di Jool creano strutture di plasma complesse all'orbita di Bop. Le letture sfidano ogni spiegazione semplice: scienza all'avanguardia o dispetti di Bop. Probabilmente entrambe le cose.
        //   Pol
        #CSS_Aebestach_deployedIONCollector_PolSrfLanded_01 = Il flusso ionico all'orbita di questa piccola luna è sorprendentemente basso. La superficie porosa assorbe le particelle cariche? L'ambiente plasmatico di Pol è misterioso quanto il suo aspetto.
        //   Eeloo
        #CSS_Aebestach_deployedIONCollector_EelooSrfLanded_01 = Il vento solare al margine del sistema si è ridotto a un sussurro. Raccolto: precursori del mezzo interstellare: prova che i kerbal hanno toccato il confine. Epicamente piccolo.
        //   default
        #CSS_Aebestach_deployedIONCollector_default_01 = Il collettore ionico opera in condizioni sconosciute. Le particelle catturate includono: protoni del vento solare, raggi cosmici, e quelli che sospetti siano scaglie cariche del Kraken.

        // --- deployedSeismicSensor ---
        //   Moho
        #CSS_Aebestach_deployedSeismicSensor_MohoSrfLanded_01 = Nonostante la vicinanza a Sole, il nucleo di Moho sembra morto da tempo. Letture stranamente calme: morte geologica o un vulcano che trattiene il respiro.
        //   Eve
        #CSS_Aebestach_deployedSeismicSensor_EveSrfLanded_01 = Le onde di pressione atmosferica erano state scambiate per scosse sismiche. Dopo la correzione dell'algoritmo: la crosta di Eve è piuttosto attiva, probabilmente per convezione interna. Anche l'inferno viola ha la sua geologia!
        //   Gilly
        #CSS_Aebestach_deployedSeismicSensor_GillySrfLanded_01 = Il segnale principale è Gilly che ondeggia nella sua orbita. Il gradiente gravitazionale fa tremare questa piccola patata come un budino: scientificamente si chiama "deformazione mareale".
        //   Kerbin
        #CSS_Aebestach_deployedSeismicSensor_KerbinSrfLanded_01 = Tettonica a placche, maree, attività kerbal: il fondo sismico di Kerbin è rassicurantemente ricco. Almeno il mondo natale è vivo.
        //   Mun
        #CSS_Aebestach_deployedSeismicSensor_MunSrfLanded_01 = Chiaramente registrati terremoti lunari da dilatazione termica. I dati supportano la teoria che "la Luna si stia lentamente allontanando": qualche centimetro all'anno. Nessuna fretta.
        //   Minmus
        #CSS_Aebestach_deployedSeismicSensor_MinmusSrfLanded_01 = I terremoti di Minmus sono così fievoli che lo strumento stava quasi per addormentarsi. Occasionali microterremoti potrebbero essere dovuti a stress termico, o a una mucca spaziale di passaggio che ci ha messo un piede sopra.
        //   Duna
        #CSS_Aebestach_deployedSeismicSensor_DunaSrfLanded_01 = Terremoti in stile Marte! I pattern di vibrazione superficiale differiscono radicalmente da Kerbin nella sottile atmosfera. Catturato accidentalmente l'infrasuono di una tempesta di polvere: come il russare del pianeta.
        //   Ike
        #CSS_Aebestach_deployedSeismicSensor_IkeSrfLanded_01 = Il blocco mareale con Duna accumula tensioni in Ike. Il sensore rileva regolari tremori fievoli: un "battito cardiaco lunare", romantico e scientifico.
        //   Dres
        #CSS_Aebestach_deployedSeismicSensor_DresSrfLanded_01 = Il registro sismico del pianeta nano è una linea piatta. Picchi occasionali da micrometeoroidi. Conclusione: Dres è dimenticato e geologicamente noioso.
        //   Laythe
        #CSS_Aebestach_deployedSeismicSensor_LaytheSrfLanded_01 = Il flusso dell'oceano sotto la superficie mette sotto pressione la crosta! Il sensore rileva pattern di tremori legati ai cicli mareali: ulteriore prova di acqua liquida. Europa, stiamo arrivando!
        //   Vall
        #CSS_Aebestach_deployedSeismicSensor_VallSrfLanded_01 = Attività criovulcanica! La crosta di ghiaccio di Vall ospita attività geologica: tremori periodici suggeriscono flusso di ghiaccio e magma. Caso di studio classico per i mondi ghiacciati.
        //   Tylo
        #CSS_Aebestach_deployedSeismicSensor_TyloSrfLanded_01 = La gravità di Tylo rende il sensore ipersensibile. Registrate perturbazioni gravitazionali delle altre lune di Jool: come ascoltare una sinfonia planetaria a frequenza ultraridotta.
        //   Bop
        #CSS_Aebestach_deployedSeismicSensor_BopSrfLanded_01 = Letture anomale. Non è un guasto: l'eccentricità orbitale di Bop causa violente oscillazioni dello stress mareale. O Bop sta cercando di dirti qualcosa. Non pensarci troppo.
        //   Pol
        #CSS_Aebestach_deployedSeismicSensor_PolSrfLanded_01 = I pattern di vibrazione di questa piccola luna sfidano ogni classificazione. Bassa gravità, forma irregolare, struttura porosa: la sismologia di Pol è un mistero. Come Pol stessa.
        //   Eeloo
        #CSS_Aebestach_deployedSeismicSensor_EelooSrfLanded_01 = Su questo lontano mondo di ghiaccio, l'attività sismica è quasi zero. Occasionali tremori dalla contrazione termica della crosta di ghiaccio. Abbastanza silenzioso da provare nostalgia di casa.
        //   default
        #CSS_Aebestach_deployedSeismicSensor_default_01 = Sismometro dispiegato. Le vibrazioni registrate provengono principalmente da: il tuo piede sul cavo, il vento, e una fonte sconosciuta che sospetti essere l'indigestione del Kraken.

        // --- deployedWeatherReport ---
        //   Eve
        #CSS_Aebestach_deployedWeatherReport_Eve_01 = Il barometro è esploso. Secondo tentativo con sensore industriale: oltre 90 atm, oltre 400°C, composizione CO2 e "sei finito". Abitabilità: zero.
        //   Kerbin
        #CSS_Aebestach_deployedWeatherReport_Kerbin_01 = Meteo classico simile alla Terra: nuvole, vento, pioggia occasionale. I dati corrispondono perfettamente alla stazione meteorologica del Centro Spaziale Kerbal. Almeno gli strumenti funzionano stavolta.
        //   Duna
        #CSS_Aebestach_deployedWeatherReport_Duna_01 = Sottile atmosfera di CO2, frequenti tempeste di polvere. Vento, concentrazione di polvere, visibilità odierni: tutti inadatti ai picnic. Ottimi per forgiare il carattere dei coloni.
        //   Laythe
        #CSS_Aebestach_deployedWeatherReport_Laythe_01 = Atmosfera di ossigeno! Temperature gradevoli! Nuvole, vento, forse pioggia: il bollettino meteorologico di Laythe ricorda quello di un cugino lontano di Kerbin. Abitabilità: allettante.
        //   default
        #CSS_Aebestach_deployedWeatherReport_default_01 = Dispiegamento di una stazione meteorologica dove non c'è atmosfera. Vento: zero. Umidità: zero. Qualità delle tue decisioni: in fase di valutazione.

// --- infraredTelescope ---
        //   Sun
        #CSS_Aebestach_infraredTelescope_Sun_01 = Telescopio IR vicino a Sole? L'hai visto. Tanto. Troppo. Strumento: fuso. Tu: ammaestrato.
        //   Moho
        #CSS_Aebestach_infraredTelescope_Moho_01 = L'inferno termico di Moho. Il telescopio IR ha quasi saturato. Vedel Sole che brucia. Ovviamente.
        //   Eve
        #CSS_Aebestach_infraredTelescope_Eve_01 = Eve brucia nell'IR. Atmosfera densa, alta temperatura: lo strumento urla. Anche tu.
        //   Gilly
        #CSS_Aebestach_infraredTelescope_Gilly_01 = Debole segnale termico di Gilly. La piccola patata irradia poco calore. La vedi a malapena. A malapena.
        //   Kerbin
        #CSS_Aebestach_infraredTelescope_Kerbin_01 = La firma termica di Kerbin. Oceani, continenti, isole di calore urbane: il mondo natale è bellissimo anche nell'IR. Senti un po' di nostalgia di casa.
        //   Mun
        #CSS_Aebestach_infraredTelescope_Mun_01 = Il ciclo termico di Mun. Enorme escursione termica giorno-notte. Vedi zone calde: forse terremoti lunari, forse allucinazioni.
        //   Minmus
        #CSS_Aebestach_infraredTelescope_Minmus_01 = Ghiaccio e calore di Minmus. L'IR rivela il flusso di calore sotto le calotte ghiacciate. Alto valore scientifico, visivamente come caramelle alla menta luminescenti.
        //   Duna
        #CSS_Aebestach_infraredTelescope_Duna_01 = La firma termica di Duna. Tempeste di polvere, ghiaccio polare: il pianeta rosso nell'IR. L'hai visto.
        //   Ike
        #CSS_Aebestach_infraredTelescope_Ike_01 = Il ciclo termico di Ike. La luna di Duna grigia nell'IR. Vedi zone calde: forse stress mareale.
        //   Jool
        #CSS_Aebestach_infraredTelescope_Jool_01 = La firma IR di Jool. La struttura termica del gigante gassoso. Vedi tempeste, vortici. Vedi il verde.
        //   Laythe
        #CSS_Aebestach_infraredTelescope_Laythe_01 = L'oceano termico di Laythe. Flusso di calore sotto la superficie, attività geotermica: segni di un mondo abitabile. Vedi la speranza.
        //   Vall
        #CSS_Aebestach_infraredTelescope_Vall_01 = Il calore sotto la superficie di Vall. L'IR penetra la crosta di ghiaccio, rivelando sorgenti di calore sotterranee. Scienza in stile Vall, dati in stile Vall.
        //   Tylo
        #CSS_Aebestach_infraredTelescope_Tylo_01 = La firma termica di Tylo. Superficie antica, flusso di calore fievole. Vedi la memoria termica dei bacini da impatto.
        //   Bop
        #CSS_Aebestach_infraredTelescope_Bop_01 = Termico di Bop... inquietante. Letture irregolari. Dai la colpa alle radiazioni di Jool. O a Bop.
        //   Pol
        #CSS_Aebestach_infraredTelescope_Pol_01 = Debole segnale termico di Pol. La superficie porosa irradia rapidamente. Vedi una mappa di calore chiazzata. Difficile da leggere, come Pol stessa.
        //   Eeloo
        #CSS_Aebestach_infraredTelescope_Eeloo_01 = Il termico criogenico di Eeloo. L'IR mostra quasi nessun calore. Vedi il cosmo ghiacciato. Freddo.
        //   default
        #CSS_Aebestach_infraredTelescope_default_01 = Il telescopio IR esplora una regione sconosciuta. Vedi calore... o forse no. Forse è un guasto allo strumento, forse sei tu.

// --- ROCScience ---
        //   ROC
        #CSS_Aebestach_ROCScience_BopGravelPile_01 = Un mucchio di ghiaia. Hai la sensazione che ti stia guardando.
        #CSS_Aebestach_ROCScience_BopGravelPile_02 = Il mucchio di ghiaia di Bop: piroclasti da impatto o prodotto di erosione. Le forme irregolari suggeriscono una deposizione peculiare in bassa gravità. Finisci la foto e te ne vai in fretta; qualcosa sembra osservarti.
        #CSS_Aebestach_ROCScience_DresCrater_01 = Un cratere. Probabilmente opera di un asteroide.
        #CSS_Aebestach_ROCScience_DresCrater_02 = Un cratere di Dres: cicatrici della storia dimenticata del pianeta nano. Il materiale sul fondo potrebbe esporre la crosta profonda. Conclusione: qualcosa si è ricordato di Dres, almeno tramite un impatto.
        #CSS_Aebestach_ROCScience_DresMeteorite_01 = Una roccia dal vuoto. I visitatori di Dres sono così rari che ogni meteorite è un ospite d'onore.
        #CSS_Aebestach_ROCScience_DresMeteorite_02 = Un meteorite su Dres: un esemplare raro al margine della fascia. Forse un messaggero del materiale della fascia. Ringrazi in silenzio questa roccia per aver percorso milioni di km per farti compagnia.
        #CSS_Aebestach_ROCScience_DunaBlueberries_01 = Trovi delle piccole sferette tondeggianti. Sanno di roccia. Perché sono roccia.
        #CSS_Aebestach_ROCScience_DunaBlueberries_02 = I "mirtilli marziani"! Concrezioni di ematite: la famosa scoperta di Opportunity su Marte. Anche Duna le ha: prova di acqua liquida in epoche remote. Valore scientifico: al massimo. Commestibilità: sempre roccia.
        #CSS_Aebestach_ROCScience_DunaDune_01 = Studi una struttura simile a una duna. Forse eolica, o sei così affamato da vedere del pane.
        #CSS_Aebestach_ROCScience_DunaDune_02 = Dune di Duna! Classico deposito eolico. L'analisi dei granuli rivela fino ossido di ferro: la fonte del rosso di Marte. La richiesta di fare snowboard sulle dune è stata rifiutata da controllo missione.
        #CSS_Aebestach_ROCScience_DunaEjectaOnIke_01 = Detriti da un altro mondo. Pionieri della migrazione interplanetaria?
        #CSS_Aebestach_ROCScience_DunaEjectaOnIke_02 = Piroclasti di Duna su Ike! Antichi impatti hanno lanciato materiale marziano nello spazio; alcuni sono atterrati sulla sua luna. Abbiamo trovato pezzi di Duna su Ike: un trionfo dell'archeologia interplanetaria!
        #CSS_Aebestach_ROCScience_DunaMeteorite_01 = Una roccia dal vuoto. Cerchi di stabilire se siano escrementi del Kraken.
        #CSS_Aebestach_ROCScience_DunaMeteorite_02 = Un meteorite! La composizione rivela un nucleo di ferro-nichel: un viaggiatore dalla fascia degli asteroidi o da oltre. Giace su Duna da forse milioni di anni, ad aspettare che tu passassi a salutare.
        #CSS_Aebestach_ROCScience_DunaStone_01 = Una roccia. Controllo missione chiede se stai scherzando.
        #CSS_Aebestach_ROCScience_DunaStone_02 = Classica roccia alterata dallo stile Marte. Superficie rosso ruggine per il rivestimento di ossido di ferro; l'interno è probabilmente basalto. Dettaglio atipico: le hai dato il nome "Signor Roccia".
        #CSS_Aebestach_ROCScience_EelooBerg_01 = Un iceberg! Su un pianeta nano!
        #CSS_Aebestach_ROCScience_EelooBerg_02 = L'iceberg di Eeloo (un cumulo di ghiaccio)! Erosione o compressione del ghiaccio superficiale. A questa orbita così lontana, tali strutture potrebbero esistere da miliardi di anni. La poesia ghiacciata di un mondo simile a Plutone.
        #CSS_Aebestach_ROCScience_EelooBrownBoulder_01 = Un masso marrone. Sembra cioccolata sul bianco.
        #CSS_Aebestach_ROCScience_EelooBrownBoulder_02 = Il masso marrone di Eeloo: miscela di ghiaccio e roccia macchiata da sostanze organiche (tolini)? L'equatore di Eeloo ha una tinta simile. Miliardi di anni di "cottura" solare hanno prodotto questi composti carboniosi complessi. Caramellizzazione cosmica.
        #CSS_Aebestach_ROCScience_EelooIceChunk_01 = Ghiaccio. Tanto ghiaccio. Molto freddo.
        #CSS_Aebestach_ROCScience_EelooIceChunk_02 = Un blocco di ghiaccio di Eeloo: archivio congelato al margine del sistema. Potrebbe contenere sostanze volatili primordiali. Guardi il tuo respiro congelare, pensando a casa 3 miliardi di km più in là. Almeno questo ghiaccio è solitario quanto te.
        #CSS_Aebestach_ROCScience_EveBasaltFormation_01 = Formazione basaltica. Dura eredità vulcanica.
        #CSS_Aebestach_ROCScience_EveBasaltFormation_02 = Basalto di Eve! Residuo di antichi flussi lavici. Notevolmente conservato in condizioni estreme: l'aria di Eve schiaccia e protegge insieme. Fotografi la sezione chiedendoti se il basalto di Kerbin invidi questo "trattamento sauna".
        #CSS_Aebestach_ROCScience_EvePancakeDome_01 = Una cupola piatta. Come se qualcuno avesse schiacciato un vulcano.
        #CSS_Aebestach_ROCScience_EvePancakeDome_02 = Una cupola a frittella! Struttura tipica della lava ad alta viscosità, presente anche su Venere. La geologia di Eve dimostra ancora una volta: l'universo si ripete. Questa cupola potrebbe probabilmente friggere un uovo.
        #CSS_Aebestach_ROCScience_EveVolcanicRock_01 = Roccia vulcanica. Viola. Si addice a Eve.
        #CSS_Aebestach_ROCScience_EveVolcanicRock_02 = Roccia vulcanica di Eve! Roccia effusiva sotto pressione schiacciante, con possibili minerali rari. La tinta viola da un composto ancora senza nome. Lo chiami "Viola Eve". Brevetto in attesa.
        #CSS_Aebestach_ROCScience_GillyRidgeline_01 = Una piccola dorsale. Agli standard di Gilly, è una catena montuosa.
        #CSS_Aebestach_ROCScience_GillyRidgeline_02 = La dorsale di Gilly! In microgravità, tale terreno potrebbe essere accumulo di piroclasti da impatto o residuo di una struttura antica. La bassa gravità rende tutti i processi geologici... pigri. La luna inclusa.
        #CSS_Aebestach_ROCScience_KerbinBaobabTree_01 = Studi un albero insolitamente alto. Un baobab? Su Kerbin?
        #CSS_Aebestach_ROCScience_KerbinBaobabTree_02 = Il baobab di Kerbin! Tronco che accumula acqua, longevità, commestibile: l'amico del sopravvissuto. L'analisi degli anelli mostra quante tempeste ha attraversato. Lo abbracci. Non obietta.
        #CSS_Aebestach_ROCScience_KerbinGiantQuartz_01 = Un enorme cristallo trasparente. Sospetti ci sia un tesoro sotto.
        #CSS_Aebestach_ROCScience_KerbinGiantQuartz_02 = Un cristallo di quarzo gigante! L'attività idrotermale lo ha nutrito in una geode per millenni. Otticamente puro: ideale per ottiche di precisione. O, sai, come fermacarte. Molto elegante.
        #CSS_Aebestach_ROCScience_LaytheBoulder_01 = Un masso. Forse levigato dalle onde.
        #CSS_Aebestach_ROCScience_LaytheBoulder_02 = Masso di Laythe: forse trasportato da onde o ghiacciai. L'alterazione sotto l'atmosfera di ossigeno ricorda Kerbin. In piedi sulla "riva", senti quasi nostalgia di casa.
        #CSS_Aebestach_ROCScience_LaytheGeyser_01 = Un geyser! Acqua! A questa distanza da Jool!
        #CSS_Aebestach_ROCScience_LaytheGeyser_02 = Il geyser di Laythe! Sfiatatoio geotermico di un oceano sotterraneo, riscaldamento mareale. Acqua liquida, calore, sostanze organiche: le condizioni per la vita convergono qui. Hai riempito una bottiglietta per assaggiare. Controllo missione ti ha fermato.
        #CSS_Aebestach_ROCScience_LaytheStone_01 = Una roccia comune. Preziosa su Laythe.
        #CSS_Aebestach_ROCScience_LaytheStone_02 = Campione di roccia di Laythe. Archivio geologico di un mondo oceanico: potrebbe contenere strati di sedimento o bioturbazione. Cerchi attentamente delle conchiglie. Nessuna ancora. La speranza resta.
        #CSS_Aebestach_ROCScience_MinmusGreenSandstone_01 = Roccia verde. Non è formaggio. Hai controllato.
        #CSS_Aebestach_ROCScience_MinmusGreenSandstone_02 = Arenaria verde di Minmus! I minerali di ferro in ambiente riducente producono la tinta. Suggerisce un'antica interazione tra ghiaccio e lava. Alto valore scientifico; valore come sostituto del formaggio di Minmus: zero.
        #CSS_Aebestach_ROCScience_MinmusOlivineFormation_01 = Olivina? Qui?
        #CSS_Aebestach_ROCScience_MinmusOlivineFormation_02 = Una formazione di olivina! Una finestra sul materiale del mantello, di solito proveniente da profondità. Trovarla su Minmus suggerisce una storia geologica più complessa. Verde come le caramelle alla menta, dura come... la roccia.
        #CSS_Aebestach_ROCScience_MohoStone_01 = Una roccia arrostita dal sole. Toccarla = bruciarsi.
        #CSS_Aebestach_ROCScience_MohoStone_02 = Roccia di Moho: materiale superficiale che ha subito cicli termici estremi. Potrebbe contenere rari minerali refrattari. Hai quasi bruciato i guanti per metterla nel sacchetto. Avventura in stile Mercurio, letteralmente.
        #CSS_Aebestach_ROCScience_MohoWrinkleRidge_01 = Rughe sulla superficie. Come un letto di fiume secco, ma di roccia.
        #CSS_Aebestach_ROCScience_MohoWrinkleRidge_02 = Una dorsale rugosa! Si forma quando il raffreddamento e la contrazione del pianeta comprimono la crosta. Comune sul vero Mercurio. Anche Moho le ha: prova che questa roccia ha avuto un passato attivo. Ora è solo rugosa.
        #CSS_Aebestach_ROCScience_MunCrater_01 = Un cratere. La caratteristica più comune di Mun, oltre ad altri... crateri.
        #CSS_Aebestach_ROCScience_MunCrater_02 = Un cratere fresco (geologicamente)! Il sistema di raggi non è ancora stato cancellato dai micrometeoroidi. I piroclasti sul bordo sono perfetti per analizzare la regolite lunare. Conferma anche Newton: le cose cadono in basso.
        #CSS_Aebestach_ROCScience_MunLargeCrater_01 = Un cratere molto grande. Abbastanza grande da volerci saltare dentro.
        #CSS_Aebestach_ROCScience_MunLargeCrater_02 = Un grande bacino da impatto! Tali strutture rivelano il bombardamento primordiale di Mun. Il riempimento di magma ha formato i mari. Sei in piedi su una ferita della storia, piccolo e meravigliato.
        #CSS_Aebestach_ROCScience_MunStone_01 = Roccia lunare. Armstrong sarebbe fiero... probabilmente.
        #CSS_Aebestach_ROCScience_MunStone_02 = Campione di roccia lunare! Ricco di plagioclasio e pirosseno: tipico basalto dei mari. Forse più vecchio di 3 miliardi di anni. L'hai firmata. Controllo missione ha sospirato.
        #CSS_Aebestach_ROCScience_PolYellowStones_01 = Rocce gialle. Pol è già colorata; il giallo è quasi sobrio.
        #CSS_Aebestach_ROCScience_PolYellowStones_02 = Le rocce gialle di Pol: alterazione da solfuri o ossidi di ferro? La mineralogia della superficie porosa a bassa densità rimane un enigma. Queste rocce sfidano ogni classificazione, come Pol stessa. Ne metti da parte un po' per far venire il mal di testa ai petrologi di Kerbin.
        #CSS_Aebestach_ROCScience_TyloCheckerboard_01 = Terreno a scacchiera. Tylo sta facendo il cosplay degli scacchi?
        #CSS_Aebestach_ROCScience_TyloCheckerboard_02 = Terreno a scacchiera! Motivo alternato chiaro/scuro da piroclasti da impatto: caratteristiche simili su Callisto e altri corpi. Tylo narra la sua storia di impatti, quadrato per quadrato.
        #CSS_Aebestach_ROCScience_TyloDarkBoulder_01 = Un masso scuro. Standard Tylo.
        #CSS_Aebestach_ROCScience_TyloDarkBoulder_02 = Masso scuro di Tylo: forse da antico vulcanismo o bacino da impatto. Il basso albedo suggerisce composizione mafica. Sotto la gravità di Tylo, questa roccia è davvero "ancorata a terra".
        #CSS_Aebestach_ROCScience_TyloLightStone_01 = Roccia chiara. Spicca nel grigiore di Tylo.
        #CSS_Aebestach_ROCScience_TyloLightStone_02 = Roccia chiara di Tylo: alto albedo, forse anortosite o fusione da impatto. Sulla superficie grigia di Tylo sembra la crema di un biscotto. Geologicamente parlando.
        #CSS_Aebestach_ROCScience_VallCryovolcano_01 = Un criovulcano! Ghiaccio, non fuoco.
        #CSS_Aebestach_ROCScience_VallCryovolcano_02 = Il criovulcano di Vall! Una miscela acqua-ammoniaca erutta dalle fratture della crosta di ghiaccio, solidificandosi in spettacolari torri di ghiaccio nel vuoto. Geologia in stile Europa da manuale. Sei in piedi accanto allo sfiatatoio con la sensazione di visitare l'"apparato respiratorio" della luna.
        #CSS_Aebestach_ROCScience_VallIceChunk_01 = Un grosso blocco di ghiaccio. Pensi di leccarla.
        #CSS_Aebestach_ROCScience_VallIceChunk_02 = Un blocco di ghiaccio di Vall! Notevolmente puro; potrebbe conservare tracce chimiche dell'antico oceano. L'analisi mostra cloruri e sostanze organiche in traccia: altri indizi per la vita sotto la superficie. Non leccarla; radiazioni.
        #CSS_Aebestach_ROCScience_VallStone_01 = Una roccia su un mondo di ghiaccio. Rara come un gioiello.
        #CSS_Aebestach_ROCScience_VallStone_02 = Roccia di Vall: materiale incontaminato esposto da sotto la crosta di ghiaccio. Forse dal mantello silicatico o da piroclasti da impatto. In un cosmo ghiacciato, una roccia è una cartolina dal "mondo interiore".
    }
}
