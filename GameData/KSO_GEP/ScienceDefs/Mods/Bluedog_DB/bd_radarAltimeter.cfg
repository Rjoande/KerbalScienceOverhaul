        SironaFlyingHighDarkTemperateBands* = #GEPscience_bd_radarAltimeter_SironaFlyingHighDarkTemperateBands_00 // The profile shows gentle slopes that drift between passes, as if the landscape can’t sit still. Out here, even the maps feel temporary.
