@EXPERIMENT_DEFINITION:HAS[#id[bd_Scatterometer]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthPolarZone_00 // Backscatter fluctuates in tight bands; the polar plasma seems to flow in disciplined streams.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthSubpolarZone_00 // The signal shimmers with restless turbulence, like the Sun is trying to shake off a blanket of static.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthTemperateZone_00 // Scatter patterns suggest broad, rolling cells; the Sun appears to be “boiling” in slow motion.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowNorthTropicZone_00 // The readout shows fast-moving ripples riding larger waves; the atmosphere here can’t sit still.
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowEquatorialZone_00 // Returns spike and smear along the equator; something down there is spinning the plasma into long streaks.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthTropicZone_00 // The scatter map mirrors the northern tropics, but with extra jitter—as if the Sun is tapping its foot.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthTemperateZone_00 // A mottled pattern resolves into huge convection-like patches; the numbers look tasty and alarming.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthSubpolarZone_00 // The instrument catches sharp, fleeting structures, then loses them to glare; the Sun refuses repeatability.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_Scatterometer_SunInSpaceLowSouthPolarZone_00 // Polar returns stabilize into neat striations; the data feels almost orderly, which is suspicious near a star.

        SunInSpaceHigh* = #JNSQscience_bd_Scatterometer_SunInSpaceHigh_00 // At this distance the “surface wind” solution collapses into noise. The scatterometer politely reports that the Sun is still extremely bright.
        SunInSpaceHigh* = #JNSQscience_bd_Scatterometer_SunInSpaceHigh_01 // With no surface to bounce off, the scatterometer mostly hears its own thoughts—plus a few sharp pings that suggest drifting dust.
        SunInSpaceHigh* = #JNSQscience_bd_Scatterometer_SunInSpaceHigh_02 // The readout refuses to draw wind arrows in empty space, but it does log occasional micro-echoes that hint at a thin, gritty interplanetary haze.

        EveInSpaceLowPoles* = #JNSQscience_bd_Scatterometer_EveInSpaceLowPoles_00 // The scatter map curls into a tight spiral; Eve’s polar winds seem to be trying to drill a hole in the clouds.
        EveInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_EveInSpaceLowLowlands_00 // The returns smear into broad, heavy bands—thick air and flat ground make the wind field look stubbornly uniform.
        EveInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_EveInSpaceLowMidlands_00 // Mottled backscatter resolves into convection-sized patches; the atmosphere is boiling, just not politely.
        EveInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_EveInSpaceLowMountains_00 // Sharp ridges throw long radar shadows while the wind vectors wobble—mountain waves are doing acrobatics in purple soup.
        EveInSpaceLowShores* = #JNSQscience_bd_Scatterometer_EveInSpaceLowShores_00 // A crisp boundary line appears where land meets sea; the instrument practically draws a little breeze arrow for you.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_Scatterometer_EveInSpaceLowPolarLakes_00 // The lakes read as smooth, dark mirrors until gusts wrinkle them into thin, bright scribbles.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_Scatterometer_EveInSpaceLowPetrolLakes_00 // The surface looks strangely damped, as if the waves forgot how to wave; the scatterometer does not like this at all.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofAkron_00 // Long, clean wave trains suggest a steady fetch—then a storm front rips the pattern apart like paper.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofNessus_00 // The wind field forms looping arcs that refuse to repeat; you label the area “uncooperative.”
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofTaniwha_00 // Returns pulse in rhythmic bands, like something below keeps stirring the surface at regular intervals.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofGigan_00 // Roughness spikes into jagged streaks; either the seas are angry here, or the clouds are throwing things.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofRodan_00 // Fast-moving shear lines cut across the surface signature; the atmosphere is clearly in a hurry.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofGojira_00 // A broad, bright patch suggests persistent churn—waves, spray, and a lot of energy with nowhere to go.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofGhidorah_00 // Three distinct wind streams intersect and braid together; even the vectors look like they’re arguing.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_Scatterometer_EveInSpaceLowSeaofBagorah_00 // The scatter map shows neat ripples at the edges and chaos in the center—classic “looks calm until it isn’t.”
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_Scatterometer_EveInSpaceLowKrakensWell_00 // A circular disturbance rings out in the echoes, perfectly centered and deeply unsettling. The log adds: “Nope.”

        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowIceCaps_00 // The scatterometer reports suspiciously smooth returns—either the ice is glassy, or it’s politely hiding the wind.
        KerbinInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowMountains_00 // Mountain ridges shred the wind into neat little vortices; the plot looks like a bowl of spaghetti.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowMidlands_00 // Mixed terrain makes the wind map look indecisive. Mission Control calls it “interesting.”
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowLowlands_00 // Broad lowlands give clean, steady wind vectors—perfect for flying, terrible for hats.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridLowlands_00 // Dry ground lights up with sharp backscatter; the gust fronts trace long, dusty lines.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridMidlands_00 // Patchy roughness suggests shifting winds and drifting grit. Your filters complain loudly.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridHighlands_00 // Thin air and sharp slopes make the wind field choppy; the instrument keeps recalibrating out of spite.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowAridMountains_00 // The radar catches strong mountain-wave signatures. The wind is doing aerobatics without permission.
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowGreatLake_00 // The lake surface shows gentle ripples and a tidy breeze. Someone on the crew says “boat day?”
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowInlandWater_00 // Calm water gives a low scatter return—until a squall scribbles across it like a pen stroke.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowKreenwichSea_00 // Coastal winds curve in elegant arcs; you label one spiral “very dramatic.”
        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowArcticSea_00 // Cold air flows fast over dark water; the roughness spikes suggest whitecaps and numb fingers.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowForemansSea_00 // The wind map shows long fetch-driven waves. Foreman would definitely approve of that “straight line work.”
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowTriangulusSea_00 // Three competing wind corridors meet here; the vectors form a triangle as if to show off.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowNorthernSea_00 // Broad bands of steady wind hint at reliable weather—until the edges start fraying into storms.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowSub-ArcticSea_00 // Backscatter jumps between smooth and chaotic in minutes. The sea can’t decide if it’s frozen or furious.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowEasternSea_00 // A prevailing wind stream sets up consistent wave trains; the readout looks satisfyingly tidy.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowWesternSea_00 // Wind shear lines crisscross the water like scratches on a record. The song is “whoooosh.”
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_Scatterometer_KerbinInSpaceLowWelcomeBackIsland_00 // Tiny island, big wake: the wind wraps around it and leaves a neat signature that feels like home.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowIceCaps_00 // The scatterometer finds slick, quiet returns—then sudden katabatic gusts that rake the ice like a broom.
        DunaInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowMidlands_00 // A patchwork of weak winds and wandering eddies suggests the thin air is easily bullied by terrain.
        DunaInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowLowlands_00 // Broad basins produce clean, steady vectors—until a dust front scribbles right over your nice straight lines.
        DunaInSpaceLowCraters* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowCraters_00 // Crater rims trap spinning dust devils; the backscatter looks like tiny whirlpools on a dry sea.
        DunaInSpaceLowRareCraters* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowRareCraters_00 // The wind signatures here are oddly asymmetric, as if the atmosphere keeps “falling” into the holes.
        DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowVoronoiCraters_00 // The returns break into geometric cells; the wind field seems to respect the pattern more than physics does.
        DunaInSpaceLowNotableCraters* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowNotableCraters_00 // Strong rim-to-floor gradients show air draining downslope, carrying grit like it has somewhere important to be.
        DunaInSpaceLowExoticCraters* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowExoticCraters_00 // The scatter map flickers with sharp spikes and sudden lulls—this terrain makes the wind act suspicious.
        DunaInSpaceLowTrenches* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowTrenches_00 // Winds channel along the trenches in long, fast streaks; the instrument draws arrows that all agree for once.
        DunaInSpaceLowNotablePlains* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowNotablePlains_00 // A wide, uniform roughness signal implies persistent surface flow—perfect conditions for a planet-wide dust argument.
        DunaInSpaceLowNotableMountains* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowNotableMountains_00 // Mountain-wave bands show up clearly, like the air is playing a giant xylophone over the ridges.
        DunaInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowMountains_00 // Strong lee turbulence smears the backscatter; the wind is doing aerobatics in a near-vacuum.
        DunaInSpaceLowVolcano* = #JNSQscience_bd_Scatterometer_DunaInSpaceLowVolcano_00 // Localized roughness blooms hint at warm slope flows and stirred-up dust, despite the volcano’s best attempt at looking dormant.

        JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_Scatterometer_JoolInSpaceLowEquatorialBands_00 // The scatterometer paints long, razor-straight jet streams; the equator is basically a wind highway with no speed limit.
        JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_Scatterometer_JoolInSpaceLowSubpolarBands_00 // Wind vectors kink and braid together here, where orderly bands give up and turbulence starts writing its own weather.
        JoolInSpaceLowNorthPole* = #JNSQscience_bd_Scatterometer_JoolInSpaceLowNorthPole_00 // Returns spiral into a tight, icy vortex pattern; even Jool’s chaos has a polar “center of opinion.”
        JoolInSpaceLowSouthPole* = #JNSQscience_bd_Scatterometer_JoolInSpaceLowSouthPole_00 // The south polar winds form concentric ripples and sudden shear lines, like the atmosphere is stirring a very large pot.
        JoolInSpaceLowStormComplex* = #JNSQscience_bd_Scatterometer_JoolInSpaceLowStormComplex_00 // Backscatter spikes and smears across the storm’s rim; the instrument can’t decide which way the wind is screaming first.
        JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_Scatterometer_JoolInSpaceLowExposedLowerDeck_00 // A gap in the upper haze reveals rougher structure below—wind shear jumps hard enough to make the plots look frightened.

        LaytheInSpaceLowShores* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowShores_00 // Coastal returns show steady sea breezes bending around every bay, like the wind is sightseeing.
        LaytheInSpaceLowShallows* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowShallows_00 // The shallow waters light up with fine ripples; the wind seems to comb the surface into tidy lines.
        LaytheInSpaceLowInlandWater* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowInlandWater_00 // Protected waters read smooth and calm—until a gust scribbles across them and ruins the serenity.
        LaytheInSpaceLowKrenwichSea* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowKrenwichSea_00 // Long wave trains suggest a persistent fetch; the sea here has all the room it needs to misbehave.
        LaytheInSpaceLowArcticSea* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowArcticSea_00 // Cold-air flow roughens the surface in sharp bands; the scatterometer flags frequent whitecap conditions.
        LaytheInSpaceLowJoolwardSea* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowJoolwardSea_00 // Broad shear streaks cut across the returns, as if the atmosphere is trying to outrun the horizon.
        LaytheInSpaceLowPolwardSea* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowPolwardSea_00 // The wind field bends poleward into curving lanes; the plot looks like someone tugged it north.
        LaytheInSpaceLowHighlands* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowHighlands_00 // Terrain-driven turbulence shows up as mottled backscatter; the air can’t decide which way is “downwind.”
        LaytheInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowMountains_00 // Strong mountain-wave signatures appear in regular stripes; the wind is playing a giant washboard.
        LaytheInSpaceLowIceCaps* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowIceCaps_00 // Smooth ice returns dominate—then sudden bursts of fast flow rake the cap edges like invisible sandpaper.
        LaytheInSpaceLowEnclosedFaults* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowEnclosedFaults_00 // The fault basins channel wind into narrow jets; the vectors line up like they’re obeying traffic laws.
        LaytheInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowLowlands_00 // Wide lowlands produce clean, consistent vectors—ideal for maps, less ideal for anything trying to stand upright.
        LaytheInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_LaytheInSpaceLowMidlands_00 // Patchy roughness hints at convective cells; Laythe’s weather is building plans and changing them mid-sentence.

        TyloInSpaceLowPoles* = #JNSQscience_bd_Scatterometer_TyloInSpaceLowPoles_00 // The polar returns are crisp and quiet; only faint streaks suggest anything is moving at all.
        TyloInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_TyloInSpaceLowMountains_00 // Jagged ridgelines throw sharp radar shadows; the echoes flicker as the beam skims steep slopes.
        TyloInSpaceLowHighlands* = #JNSQscience_bd_Scatterometer_TyloInSpaceLowHighlands_00 // Rough uplands come back as noisy texture; the map looks like it was scratched in with a wrench.
        TyloInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_TyloInSpaceLowMidlands_00 // Mixed terrain averages into a stubbornly consistent roughness signature—Tylo refuses to be “simple.”
        TyloInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_TyloInSpaceLowLowlands_00 // The low basins read smooth and dark, with thin linear scuffs that might be dust slowly losing arguments.
        TyloInSpaceHigh* = #JNSQscience_bd_Scatterometer_TyloInSpaceHigh_00 // From up here, everything blurs into broad bands; Tylo becomes one stern, monochrome texture sample.

        LindorInSpaceLowTemperateBands* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowTemperateBands_00 // Long, clean jet signatures dominate the band returns; whatever Lindor is made of, it prefers orderly wind lanes.
        LindorInSpaceLowExposedLowerDeck* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowExposedLowerDeck_00 // The backscatter jumps wildly as the beam peers into the lower deck; wind shear down there is doing unspeakable math.
        LindorInSpaceLowSubpolarBands* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowSubpolarBands_00 // Vectors twist and braid where bands start to break apart; the atmosphere can’t decide between “circulation” and “argument.”
        LindorInSpaceLowNorthPole* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowNorthPole_00 // A tight spiral pattern locks onto the pole; the vortex looks stable enough to have its own postal code.
        LindorInSpaceLowSouthPole* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowSouthPole_00 // The south polar flow forms concentric rings with sharp shear lines; it’s like the planet is stirring itself clockwise and not taking questions.
        LindorInSpaceLowStormComplex* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowStormComplex_00 // Returns saturate along the storm edges; the scatterometer flags wind speeds best described as “don’t go there.”
        LindorInSpaceLowUpperStormDeck* = #JNSQscience_bd_Scatterometer_LindorInSpaceLowUpperStormDeck_00 // The upper deck reads smoother than expected, with fast streaks slipping underneath; calm up top, chaos just below.
        LindorInSpaceHigh* = #JNSQscience_bd_Scatterometer_LindorInSpaceHigh_00 // At this altitude the wind solution blurs into broad trends; Lindor’s bands smear together into one big, distant “probably fast.”

        HuygenInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowLowlands_00 // The scatterometer draws long, steady wind streaks over the lowlands; the haze may be thick, but the airflow is not shy.
        HuygenInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowMidlands_00 // Returns break into mottled patches as terrain roughness changes; the wind field looks like it keeps changing its mind.
        HuygenInSpaceLowHighlands* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowHighlands_00 // Stronger signatures suggest faster flow over the highlands, with turbulence spilling downslope like invisible surf.
        HuygenInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowMountains_00 // Clean ridge shadows and striped wave bands appear together; the atmosphere is playing mountain-hopscotch at full speed.
        HuygenInSpaceLowPeaks* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPeaks_00 // The beam catches sharp, intermittent spikes near the peaks—gusts and rotors snapping in and out of the footprint.
        HuygenInSpaceLowPolarLowlands* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPolarLowlands_00 // Cold, dense air drains into the polar basins; the vectors line up as if the wind found a shortcut.
        HuygenInSpaceLowPolarHighlands* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPolarHighlands_00 // Polar winds shear into tight lanes over the uplands; the plot looks neatly combed, which is unsettling.
        HuygenInSpaceLowPoles* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowPoles_00 // A compact spiral pattern anchors on the pole; the vortex seems stable enough to file paperwork.
        HuygenInSpaceLowShores* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowShores_00 // A crisp boundary forms along the shoreline; breezes curve and split as land and liquid trade heat in slow, heavy air.
        HuygenInSpaceLowMethaneLakes* = #JNSQscience_bd_Scatterometer_HuygenInSpaceLowMethaneLakes_00 // The lake surface reads oddly “quiet” until gusts etch bright ripples across it—like someone scribbled on glass with wind.
        HuygenInSpaceHigh* = #JNSQscience_bd_Scatterometer_HuygenInSpaceHigh_00 // With no surface to interrogate, the scatterometer mostly records faint micro-echoes and the occasional dust ping, then pretends that was the plan.

        RigaInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_RigaInSpaceLowLowlands_00 // Broad, smooth returns dominate the lowlands; faint wind streaks look like someone tried to erase the ground with sand.
        RigaInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_RigaInSpaceLowMidlands_00 // Mixed terrain produces a speckled backscatter map; the thin air seems to shuffle dust around in indecisive little loops.
        RigaInSpaceLowHighlands* = #JNSQscience_bd_Scatterometer_RigaInSpaceLowHighlands_00 // Rougher uplands kick the signal upward; narrow scoured lanes hint at stubborn, persistent near-surface flow.
        RigaInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_RigaInSpaceLowMountains_00 // Sharp ridge shadows and striped wave bands show up together; whatever wind exists here is forced to do gymnastics.
        RigaInSpaceLowPoles* = #JNSQscience_bd_Scatterometer_RigaInSpaceLowPoles_00 // The poles read smooth and cold, with subtle drainage patterns; the instrument flags gentle katabatic flows and a lot of silence.
        RigaInSpaceHigh* = #JNSQscience_bd_Scatterometer_RigaInSpaceHigh_00 // From high orbit, Riga’s “wind map” collapses into broad trends and surface texture; the scatterometer reluctantly admits it prefers being closer.

        EelooInSpaceLowPoles* = #JNSQscience_bd_Scatterometer_EelooInSpaceLowPoles_00 // The polar returns are clean and bright, with faint streaks that suggest slow, steady surface flow across very stubborn frost.
        EelooInSpaceLowHighlands* = #JNSQscience_bd_Scatterometer_EelooInSpaceLowHighlands_00 // Rough, wind-scoured textures break up the signal; the high ground looks like it’s been sanded down by invisible patience.
        EelooInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_EelooInSpaceLowMidlands_00 // Backscatter settles into a soft, mottled pattern—patchy crust, gentle drifts, and just enough motion to keep the maps honest.
        EelooInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_EelooInSpaceLowLowlands_00 // The lowlands read smoother and darker, as if fine grains have pooled here and quietly agreed to stay put.
        EelooInSpaceLowCanyon* = #JNSQscience_bd_Scatterometer_EelooInSpaceLowCanyon_00 // Sharp edges and deep shadowing carve the scan into stripes; whatever passes for wind down there funnels through like a whisper with purpose.
        EelooInSpaceHigh* = #JNSQscience_bd_Scatterometer_EelooInSpaceHigh_00 // From high orbit, the scatterometer averages everything into broad brightness trends—Eeloo becomes a single, frosty texture sample with attitude.

        NaraInSpaceLowLowlands* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowLowlands_00 // Smooth lowland returns make the wind solution look almost calm—until faint streaks reveal slow, heavy air sliding over colder ground.
        NaraInSpaceLowMidlands* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowMidlands_00 // The backscatter breaks into mottled patches; the near-surface flow keeps reorganizing itself like it forgot the plan.
        NaraInSpaceLowHighlands* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowHighlands_00 // Stronger, sharper echoes suggest scoured terrain and faster winds; something up here is constantly sanding the world down.
        NaraInSpaceLowMountains* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowMountains_00 // Ridge shadows and striped wave bands appear together; thick air is being forced into elegant, violent math over the peaks.
        NaraInSpaceLowPolarLowlands* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowPolarLowlands_00 // Dense polar air drains into the basins; the vectors line up in long, cold rivers that don’t care about obstacles.
        NaraInSpaceLowPolarHighlands* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowPolarHighlands_00 // Tight shear lanes trace the polar uplands; the wind field looks neatly combed and quietly threatening.
        NaraInSpaceLowPoles* = #JNSQscience_bd_Scatterometer_NaraInSpaceLowPoles_00 // A compact spiral pattern locks onto the pole; the vortex is so consistent it feels intentional.
        NaraInSpaceHigh* = #JNSQscience_bd_Scatterometer_NaraInSpaceHigh_00 // With no surface to interrogate, the scatterometer logs only faint micro-echoes and occasional dust pings—empty space still isn’t truly empty.
    }
}