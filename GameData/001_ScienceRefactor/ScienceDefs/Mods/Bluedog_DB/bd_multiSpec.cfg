        EarthInSpaceLowIceCaps* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowIceCaps_00 // This instrument performs a thermal analysis to study the rate the polar ice caps are melting.
        EarthInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EarthInSpaceHigh_00 // Multispectral analysis of Earth's atmosphere is conducted to closely study climate change and its impact on weather systems.
        EarthInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EarthInSpaceHigh_01 // Infrared and thermal emissions are observed around populated areas. Perhaps this can aid in the search of biological activity on other planets.
        EarthInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EarthInSpaceHigh_02 // Certain wavelengths of light are able to be used to penetrate the cloud layers of Earth and brighten different ground features.
		MoonInSpace* = #ScienceRefactor_bd_multiSpec_MoonInSpace_00 // Multispectral images are taken of the Moon.
		MoonInSpaceLow* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLow_00 // Multispectral imaging reveals a great deal of insight on the compostion of the Lunar surface.
		MoonInSpaceLow* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLow_01 // Multispectral imagery shows the Lunar surface is split between an older, lighter, heavily cratered regions, and younger, darker, less cratered regions.
		MoonInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MoonInSpaceHigh_00 // Many regions of the Moon have a high albedo, while others exhibit lower albedo.
		MoonInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MoonInSpaceHigh_01 // Thermal imagery makes it much easier to identify different terrain features.
		MoonInSpaceLowMajorCraters* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMajorCraters_00 // Analysis shows that the crater walls seems to provide enough shade for temperatures to noticeably decrease there.
		MoonInSpaceLowAitkenBasin* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowAitkenBasin_00 // Multispectral analysis reveals ancient lava flows that once dominated Aitken Basin had a high titanium content, however less so than the other lava field regions on the Moon.
		MoonInSpaceLowMareOrientale* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareOrientale_00 // Multispectral analysis reveals ancient lava flows that once dominated Mare Orientale had a high titanium content.
		MoonInSpaceLowMareTranquillitatis* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareTranquillitatis_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like the Sea of Tranquility, leaving a darker and younger surface.
		MoonInSpaceLowMareNubium* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareNubium_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Nubium, leaving a darker and younger surface.
		MoonInSpaceLowMareImbrium* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareImbrium_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Imbrium, leaving a darker and younger surface.
		MoonInSpaceLowMareSerenitatis* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareSerenitatis_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Serenitatis, leaving a darker and younger surface.
		MoonInSpaceLowMareFecunditatis* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareFecunditatis_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Fecunditatis, leaving a darker and younger surface.
		MoonInSpaceLowMareNectaris* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareNectaris_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Nectaris, leaving a darker and younger surface.
		MoonInSpaceLowMareCrisium* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareCrisium_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Crisium, leaving a darker and younger surface.
		MoonInSpaceLowMareFrigoris* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowMareFrigoris_00 // Multispectral analysis reveals ancient seas of lava eventually collected in regions like Mare Frigoris, leaving a darker and younger surface.
		MoonInSpaceLowOceanusProcellarum* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowOceanusProcellarum_00 // Despite being known as 'The Ocean of Storms' multispectral analysis reveals no weather systems in this location. Curious...
		MoonInSpaceLowNorthPole* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowNorthPole_00 // Multispectral and thermal imaging reveal that the Lunar northern pole is cold enough to be able to maintain water ice in sparsely spread areas. Further investigation is needed!
		MoonInSpaceLowSouthPole* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLowSouthPole_00 // Multispectral and thermal imaging reveal these Lunar southern pole is cold enough to be able to maintain concentrated patches of water ice in shadowed craters. Further investigation is needed!

        MarsInSpace* = #ScienceRefactor_bd_multiSpec_MarsInSpace_00 // Multispectral imagery is taken of Mars.
        MarsInSpaceLow* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLow_00 // Geological features are imaged in varying spectral bands. Some regions appear to be younger, possibly from past volcanic activity, and other regions appear to be older and more heavily cratered.
        MarsInSpaceLow* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLow_01 // Thermal emissions show temperatures on Mars tend to fluctuate a lot.
        MarsInSpaceLowNorthIceCap* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowNorthIceCap_00 // Multispectral thermal emission analysis reveal that Mars is undergoing its own climate change cycle, and is currently transiting from an ice age to a interglacial period. As a result, its icecaps are receding.
        MarsInSpaceLowSouthIceCap* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowNorthIceCap_01 // Multispectral thermal emission analysis reveal that Mars is undergoing its own climate change cycle, and is currently transiting from an ice age to a interglacial period. As a result, its icecaps are receding.
        MarsInSpaceLowAreanCanyons* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowAreanCanyons_00 // Multispectral spectrometry analysis suggests traces of subsurface water ice underneath the canyon. Perhaps the melting of subterranean ice cause the surface to collapse forming the canyon?
        MarsInSpaceLowAmazonisPlanitia* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowAmazonisPlanitia_00 // Multispectral spectrometry suggests a higher than average concentration of subsurface water ice in this region.
        MarsInSpaceLowHellasBasin* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowHellasBasin_00 // While it is theorized Hellas Basin was once filled with liquid water, multispectral analysis shows little water ice, suggesting it is long gone. However, multispectral spectrometry does find a higher concentration of organic compounds and iron in this region.
        MarsInSpaceLowVallesMarineris* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowVallesMarineris_00 // While many scientists initially believed Valles Marineris was formed from flowing water (back when Mars had liquid water on its surface) like canyons on Earth, multispectral compositional analysis suggests that Valles Marineris was actually formed from turbulent lava flows from the Tharsis region.
        MarsInSpaceLowTharsisRise* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowTharsisRise_00 // Multispectral spectrometry finds higher concentrations of silicates and trace amounts of aluminum, magnesium, iron, and potassium. This suggests active volcanoes once dominated this Tharsis Montes.
        MarsInSpaceLowAreanMountains* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowAreanMountains_00 // Thermal emission analysis indicates the Arean Mountains have no active volcanoes. However, multispectral analysis reveals large amount of silicates in this region, indicating previous volcanic activity.
        MarsInSpaceLowElysiumMons* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowElysiumMons_00 // Thermal emission analysis indicates the Elysium Mons is no longer geologically active. However, multispectral analysis reveals large amount of silicates in this region, indicating previous volcanic activity.
        MarsInSpaceLowAlbaMons* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowAlbaMons_00 // Thermal emission analysis indicates the Alba Mons is no longer geologically active. However, multispectral analysis reveals large amount of silicates in this region, indicating previous volcanic activity.
        MarsInSpaceLowOlympusMons* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowOlympusMons_00 // Multispectral images are captured of Olympus Mons, the biggest known shield volcano in the solar system. While thermal emissions determine that Olympus Mons is definitively dead and geologically inactive, it is still an imposing feature on Mars' surface.
        MarsInSpaceLowArgyreBasin* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowArgyreBasin_00 // Multispectral imagery of southern Argyre Planitia reveals unequivocal evidence of historic water erosion!
        MarsInSpaceLowLowlands* = #ScienceRefactor_bd_multiSpec_MarsInSpaceLowLowlands_00 // Multispectral composition analysis reveals indications of higher concentrations of subterranean liquid water ice in the lower altitude regions of Mars.
        MarsInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MarsInSpaceHigh_00 // Multispectral scans reveal information about the surface and atmospheric composition of Mars.
        MarsInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MarsInSpaceHigh_01 // Despite its desert appearance, Mars is appears rather cold according to thermal emission analysis.

		PhobosInSpace* = #ScienceRefactor_bd_multiSpec_PhobosInSpace_00 // Multispectral data is collected around Phobos.
		PhobosInSpaceLow* = #ScienceRefactor_bd_multiSpec_PhobosInSpaceLow_00 // Images are captured in several wavelengths of ligth that show a brown, cratered surface.
		PhobosInSpaceLow* = #ScienceRefactor_bd_multiSpec_PhobosInSpaceLow_01 // A strange, impossibly long shadow is captured in one of the images taken of Phobos' surface. Surely it must be some sort of instrument error... right?
		PhobosInSpaceLowMajorCraters* = #ScienceRefactor_bd_multiSpec_PhobosInSpaceLowMajorCraters_00 // Multispectral imagery reveals that ejecta from the Stickney Crater impact was likely responsible for a large amount of the craters on Phobos' surface. 
		PhobosInSpaceLowStickneyCrater* = #ScienceRefactor_bd_multiSpec_PhobosInSpaceLowStickneyCrater_00 // Imagery shows a strange, tall monolith nearby Stickney Crater that casts a long and ominous shadow.
		PhobosInSpaceHigh* = #ScienceRefactor_bd_multiSpec_PhobosInSpaceHigh_00 // Albedo data shows that Phobos has a very low albedo, so low that it is in fact one of the least reflective known celestial bodies in the solar system.
		
		DeimosInSpace* = #ScienceRefactor_bd_multiSpec_DeimosInSpace_00 // Multispectral images are taken around Deimos.
		DeimosInSpaceHigh* = #ScienceRefactor_bd_multiSpec_DeimosInSpaceHigh_00 // Light data shows that Deimos is not very reflective, but still possesses a much higher Albedo than the other Martian moon, Phobos.
		DeimosInSpaceLow* = #ScienceRefactor_bd_multiSpec_DeimosInSpaceLow_00 // Multispectral images reveal a much more smooth surface than expected.

        VestaInSpace* = #ScienceRefactor_bd_multiSpec_VestaInSpace_00 // Multispectral images are captured of Vesta.
        VestaInSpaceLow* = #ScienceRefactor_bd_multiSpec_VestaInSpaceLow_00 // Images captured in several wavelengths reveal some interesting data about Vesta. A few larger craters are deep enough to expose Vesta's interior, revealing Vesta's interior is differentiated, a characteristic not associated with asteroids. This suggests Vesta may be a protoplanet. 
        VestaInSpaceLowRheasilvia* = #ScienceRefactor_bd_multiSpec_VestaInSpaceLowRheasilvia_00 // Wow! Multispectral images are captured of Rheasilvia, an incredible surface feature of Vesta. Depending on your definition of a mountain, this could be considered the tallest known mountain in the solar system. This feature appears to be created by a large impact.
        VestaInSpaceHigh* = #ScienceRefactor_bd_multiSpec_VestaInSpaceHigh_00 // Vesta appears to have a high albedo, which makes sense as it is one of the brightest objects in the asteroid belt.
        VestaInSpaceHigh* = #ScienceRefactor_bd_multiSpec_VestaInSpaceHigh_01 // Multispectral images reveal a strange, flattened spheroid.

        CeresInSpace* = #ScienceRefactor_bd_multiSpec_CeresInSpace_00 // Multispectral images are captured of Ceres.
        CeresInSpaceLow* = #ScienceRefactor_bd_multiSpec_CeresInSpaceLow_00 // Ceres' surface in general appears to have many commonalities with the Moon and Mercury.
        CeresInSpaceLow* = #ScienceRefactor_bd_multiSpec_CeresInSpaceLow_01 // It appears that Ceres' equator contains less craters than its poles, with thermal emission analysis suggesting many of these polar craters might harbor some water ice.
        CeresInSpaceLowHighestPoints* = #ScienceRefactor_bd_multiSpec_CeresInSpaceLowHighestPoints_00 // It seems many of Ceres' mountains might have been created from cryovolcanism. Thermal emission scans does suggest that Ceres might possess some geological activity (including active cryovolcanoes) but the data is too inconclusive to know for sure.
        CeresInSpaceLowWhiteSpots* = #ScienceRefactor_bd_multiSpec_CeresInSpaceLowWhiteSpots_00 // Strange, reflective white spots are seen in a few of Ceres' craters. Multispectral analysis suggests these faculae are not actually composed of water ice like initially thought, but actually magnesium sulfate, sodium carbonate, ammonium chloride, and ammonium bicarbonate salts. These salts were likely created when errupting briny water from Ceres' surface sublimated, leaving the salt deposits behind.
        CeresInSpaceHigh* = #ScienceRefactor_bd_multiSpec_CeresInSpaceHigh_00 // Multispectral spectrometry analysis reveals Ceres has a thin exosphere of water vapor. This was highly unexpected and perhaps this dwarf planet is more interesting than we thought it would be.
        CeresInSpaceHigh* = #ScienceRefactor_bd_multiSpec_CeresInSpaceHigh_01 // Ceres has a mostly consistent albedo, with a few spots of extremely high albedo. Perhaps they are water ice? Further investigation is recommended.

        JupiterInSpace* = #ScienceRefactor_bd_multiSpec_JupiterInSpace_00 // Multispectral images are captured of Jupiter.
        JupiterInSpace* = #ScienceRefactor_bd_multiSpec_JupiterInSpace_01 // Multispectral images reveal Jupiter's vivid and bright aurorae.
        JupiterInSpaceLow* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLow_00 // Multispectral scans are unable to penetrate very deeply beneath Jupiter's clouds. However, the scans reveal a lot about the characteristics of Jupiter's complex weather systems.
        JupiterInSpaceLow* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLow_01 // Multispectral images are captured of Jupiter's the beautiful and swirling vorticies in Jupiter's cloud structures.
        JupiterInSpaceLowNorthPolarBands* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLowNorthPolarBands_00 // Beautiful multispectral images are captured of Jupiter's colorful north pole.
        JupiterInSpaceLowSouthPolarBands* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLowSouthPolarBands_01 // Beautiful multispectral images are captured of Jupiter's colorful south pole.
        JupiterInSpaceLowEquatorialBands* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLowEquatorialBands_02 // Jupiter's equatorial bands seem to be composed of lighter, higher clouds. Multispectral images and spectrometry analysis reveals about a dozen zonal cloud bands composed of ammonia.
        JupiterInSpaceLowNorthTemperateBands* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLowNorthTemperateBands_00 // Jupiter's north temperate bands seem to be composed of darker, lower clouds. Multispectral images and spectrometry analysis reveals about cloud belts composed of ammonia, ammonium hydrosulfide, and water.
        JupiterInSpaceLowSouthTemperateBands* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLowSouthTemperateBands_01 // Jupiter's south temperate bands seem to be composed of darker, lower clouds. Multispectral images and spectrometry analysis reveals about cloud belts composed of ammonia, ammonium hydrosulfide, and water.
        JupiterInSpaceLowGreatRedSpot* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceLowGreatRedSpot_00 // Multispectral images are taken of the high-pressure, anticyclonic storm known as the 'Great Red Spot'. Multispectral composition analysis suggests it is largely composed of darker, lower clouds of hydrogen and helium. Despite its raging intensity, it appears to be slowly shrinking and becoming fainter.
        JupiterInSpaceHigh* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceHigh_00 // UV wavelength bands show Jupiter to be bright and colorful, while IR wavelength bands show Jupiter to be dark and fiery. Interesting!
        JupiterInSpaceHigh* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceHigh_01 // Jupiter's thick atmosphere seems to insulate Jupiter allowing it retain a great deal of heat according to thermal emission scans.
        JupiterInSpaceHigh* = #ScienceRefactor_bd_multiSpec_JupiterInSpaceHigh_02 // Thermal emission analysis shows that Jupiter emits a great deal more heat than it receives from Kerbol, suggesting some internal power source.
		
		IoInSpace* = #ScienceRefactor_bd_multiSpec_IoInSpace_00 // Images are taken of Io in a multitude of spectral bands.
		IoInSpaceLow* = #ScienceRefactor_bd_multiSpec_IoInSpaceLow_00 // Multispectral spectrometry analyusis reveals a surface of silicate rock and sulfur, with mountains capped by a frosty sulfur dioxide snow. This composition is unlike any of the Jovian moons, or in fact any other moon we know of.
		IoInSpaceLow* = #ScienceRefactor_bd_multiSpec_IoInSpaceLow_01 // Thermal emission analysis reveals small, localized, and intense hotspots dotted throughout the surface. This is no doubt and indicator of active volcanism.
		IoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_IoInSpaceHigh_00 // Images reveal regions of high albedo mixed with small darker features with lower reflectivity.
		IoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_IoInSpaceHigh_01 // Wow! Thermal emission analysis reveals a hot and angry body. Io seems to be heated by Jupiter's strong tidal forces and internal geological activity.

		EuropaInSpace* = #ScienceRefactor_bd_multiSpec_EuropaInSpace_00 // Multispectral imagery is taken of Europa.
		EuropaInSpaceLow* = #ScienceRefactor_bd_multiSpec_EuropaInSpaceLow_00 // Multispectral compositional analysis reveals a surface composed of silicate rock and water-ice.
		EuropaInSpaceLow* = #ScienceRefactor_bd_multiSpec_EuropaInSpaceLow_01 // Images taken in several wavelengths reveal a smooth surface with far less craters than expected. This indicates a young surface that some geological process refreshed it recently or is continuing to refresh it in the present.
		EuropaInSpaceLowLineaments* = #ScienceRefactor_bd_multiSpec_EuropaInSpaceLowLineaments_00 // Spectral data collected from Europa's lineaments puzzle scientists. While we expected tholins, it seems these brown regions might be radiation bombarded magnesium sulfate and sulfric acid salts, perhaps surfacing from a subterranean ocean!
		EuropaInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EuropaInSpaceHigh_00 // Albedo data reveals Eeloo is mostly composed of highly reflective ice with streaks of a less reflective, brown material.
		EuropaInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EuropaInSpaceHigh_01 // Multispectral spectrometry analysis reveals a thin exosphere of oxygen and water vapor. This is potentially being replenished by active cryovolcanism errupting from an underground ocean.

		GanymedeInSpace* = #ScienceRefactor_bd_multiSpec_GanymedeInSpace_00 // Multispectral imagery is taken of Ganymede.
		GanymedeInSpaceLow* = #ScienceRefactor_bd_multiSpec_GanymedeInSpaceLow_00 // High spatial resolution spectra images are taken of Ganymede, revealing a surface largely composed of water ice, clay, and organic compounds.
		GanymedeInSpaceLow* = #ScienceRefactor_bd_multiSpec_GanymedeInSpaceLow_01 // Ganymede's surface consists of varying albedo, with high-albedo water regions covered in water ice, and low-albedo regions being covered in clay and other materials.
		GanymedeInSpaceHigh* = #ScienceRefactor_bd_multiSpec_GanymedeInSpaceHigh_00 // Multispectral images reveal a incredibly large body. If this body was not in orbit of Jupiter, we would surely consider it a planet in its own right.
		GanymedeInSpaceHigh* = #ScienceRefactor_bd_multiSpec_GanymedeInSpaceHigh_01 // Despite our initial observations, spectral analysis suggests a very tenuous oxygen exosphere. It's likely the high levels of jovian radiation causes surface ice to be split into hydrogen and oxygen, forming this exosphere. 
	
		CallistoInSpace* = #ScienceRefactor_bd_multiSpec_CallistoInSpace_00 // Multispectral images are taken around Callisto.
		CallistoInSpaceLow* = #ScienceRefactor_bd_multiSpec_CallistoInSpaceLow_00 // Spectral analysis reveals Callisto's surface to be an almost 50-50 split of water ice and rocky materials. 
		CallistoInSpaceLow* = #ScienceRefactor_bd_multiSpec_CallistoInSpaceLow_01 // Callisto's surface is absolutely and utterly covered in surface craters. Callisto almost certainly has not undergone any active geological activity in some time, leaving it with an incredibly old surface!
		CallistoInSpaceLowValhallaCrater* = #ScienceRefactor_bd_multiSpec_CallistoInSpaceLowValhallaCrater_00 // Images are taken of Callisto's Valhalla Crater. This appears to be the largest multi-ringed crater we know of in the solar system. It is deep enough to reveal a glimpse under Callisto's surface material, and spectral analysis suggests Callisto's interior is not differentiated from its surface. This would mean Callisto is one of the largest bodies we know of with an undifferentiated interior.
		CallistoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_CallistoInSpaceHigh_00 // Light reflectivity and emission data reveal an incredibly curious body. This is definitely one of the surfaces with the most varied albedo we know of. Most of surface consists of an almost black, low-albedo material, riddled with spots of white, high-albedo material.
		CallistoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_CallistoInSpaceHigh_01 // False color images paint a beautiful, colorful picture of Callisto, almost reminding you Van Gogh's Starry Night.
	
        SaturnInSpace* = #ScienceRefactor_bd_multiSpec_SaturnInSpace_00 // Multispectral images are taken around Saturn.
        SaturnInSpaceLow* = #ScienceRefactor_bd_multiSpec_SaturnInSpaceLow_00 // Multispectral spectrometry analysis reveals an atmosphere composed of ammonia, water, helium, and ammonium hydrosulfide.
        SaturnInSpaceLow* = #ScienceRefactor_bd_multiSpec_SaturnInSpaceLow_01 // Thermal emission analysis reveals Saturn emits 2.5 times more heat than it recieves from the Sun.
        SaturnInSpaceLowNorthPoleStorms* = #ScienceRefactor_bd_multiSpec_SaturnInSpaceLowNorthPoleStorms_00 // Images reveal a beautiful and colorful persisting hexagonal wave pattern around the north polar vortex. Each side of the hexagon appears to be longer than Earth's diameter.
        SaturnInSpaceLowSouthPoleStorms* = #ScienceRefactor_bd_multiSpec_SaturnInSpaceLowSouthPoleStorms_01 // Images reveal a beautiful and colorful persisting hexagonal wave pattern around the south polar vortex. Each side of the hexagon appears to be longer than Earth's diameter. This structure appears to be smaller than Saturn's north polar vortex.
        SaturnInSpaceHigh* = #ScienceRefactor_bd_multiSpec_SaturnInSpaceHigh_00 // Multispectral images are taken of Saturn's mighty rings. Spectral analysis reveals they are largely composed of fragments of ice, rock, and dust.
        SaturnInSpaceHigh* = #ScienceRefactor_bd_multiSpec_SaturnInSpaceHigh_01 // Light data shows Saturn has an albedo lesser than Jupiter's.

		EnceladusInSpace* = #ScienceRefactor_bd_multiSpec_EnceladusInSpace_00 // Multispectral imagery is taken of Enceladus.
		EnceladusInSpaceLow* = #ScienceRefactor_bd_multiSpec_EnceladusInSpaceLow_00 // Multispectral images are used to create a beautiful false color image of Enceladus. The surface is largely white, purple, and yellow, with streaks of a bright blue crisscrossing across its surface. These colors correspond to the concentration of various compounds on Enceladus' surface.
		EnceladusInSpaceLow* = #ScienceRefactor_bd_multiSpec_EnceladusInSpaceLow_01 // There appears to be little craters in Enceladus' equatorial regions, indicating a young, fresh surface refreshed by geological activity.
		EnceladusInSpaceLowSouthernPolarRegion* = #ScienceRefactor_bd_multiSpec_EnceladusInSpaceLowSouthernPolarRegion_00 // Spectral images capture plumes of water errupting from Enceladus' southern polar region.
		EnceladusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EnceladusInSpaceHigh_00 // The fresh, clean ice coating Enceladus' surface makes it one of the most high albedo objects in the solar system.
		EnceladusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EnceladusInSpaceHigh_01 // Images revealing geysers of water vapor errupting from Enceladus' surface. Spectrometry analysis shows that its almost identitical to the composition of Saturn's E ring, suggesting that frozen water vapor that escaped from Enceladus supplies most of the material that makes up the E ring.

		TitanInSpace* = #ScienceRefactor_bd_multiSpec_TitanInSpace_00 // Multispectral images are taken around Titan.
		TitanInSpaceLow* = #ScienceRefactor_bd_multiSpec_TitanInSpaceLow_00 // Titan's thick atmosphere and cloud layers seem to reflect a significant amount of light, making it difficult for this instrument to learn much about Titan's surface.
		TitanInSpaceLow* = #ScienceRefactor_bd_multiSpec_TitanInSpaceLow_01 // At lower orbits, multispectral images can glimpse peaks of certain features of Titan's surface, but they are largely obscured by Titan's thick atmosphere.
		TitanInSpaceHigh* = #ScienceRefactor_bd_multiSpec_TitanInSpaceHigh_00 // Thermal emission analysis shows that Titan's extremely thick acts as an insulator, trapping a great deal of heat and keeping it warm.
		TitanInSpaceHigh* = #ScienceRefactor_bd_multiSpec_TitanInSpaceHigh_01 // Titan's thick, nitrogen-rich atmosphere is highly opaque, meaning little light from Titan's surface is able to reach this instrument.

        UranusInSpace* = #ScienceRefactor_bd_multiSpec_UranusInSpace_00 // Multispectral images are captured of Uranus.
        UranusInSpaceLow* = #ScienceRefactor_bd_multiSpec_UranusInSpaceLow_00 // In visible light, Uranus appears rather bland and featureless. However in the ultraviolet and infrared spectrums, Uranus appears to look much more interesting, and useful data is able to be learned about its weather systems. Uranus looks paticurally tasty in UV, making it appear to look almost like cotton candy.
        UranusInSpaceLow* = #ScienceRefactor_bd_multiSpec_UranusInSpaceLow_01 // Spectral analysis captures the composition of the ices in its atmosphere to be largely ammonia, water, ammonium hydrosulfide, and interestingly, methane hydrate.
        UranusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_UranusInSpaceHigh_00 // Multispectral images are captured of Uranus, revealing a smooth teal ball, reminding some of our scientists of a bowling ball.
        UranusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_UranusInSpaceHigh_01 // Spectral analysis shows Uranus' atmosphere is largely composed of hydrogen, helium, and methane, with tracees of hydrogen deuteride and hydrogen sulfide. 

        NeptuneInSpace* = #ScienceRefactor_bd_multiSpec_NeptuneInSpace_00 // Images are taken of Neptune in a multitude of spectral bands.
        NeptuneInSpaceLow* = #ScienceRefactor_bd_multiSpec_NeptuneInSpaceLow_00 // Multispectral images reveal a deep blue planet streaked with a small number of bright white clouds, with small spots of a darker blue indicating storms that expose Neptune's deeper, darker atmosphere.
        NeptuneInSpaceLow* = #ScienceRefactor_bd_multiSpec_NeptuneInSpaceLow_01 // Spectral data shows that small traces of methane are detected in Neptune's upper atmosphere, which scientists believe is responsible for Neptune's deep blue color.
        NeptuneInSpaceHigh* = #ScienceRefactor_bd_multiSpec_NeptuneInSpaceHigh_00 // Spectrometry analyses reveal an atmosphere composed largely of hydrogen and helium, with traces of hydrocarbons and possibly nitrogen.
        NeptuneInSpaceHigh* = #ScienceRefactor_bd_multiSpec_NeptuneInSpaceHigh_01 // Thermal emission analysis reveals Neptune is a little colder than expected.

		TritonInSpace* = #ScienceRefactor_bd_multiSpec_TritonInSpace_00 // Multispectral images are taken of Triton.
		TritonInSpaceLow* = #ScienceRefactor_bd_multiSpec_TritonInSpaceLow_00 // Multispectral data is used to create false color images, depicting Triton as a colorful and bright mix of pink, blue, yellow, and green.
		TritonInSpaceLow* = #ScienceRefactor_bd_multiSpec_TritonInSpaceLow_01 // Images show Triton to have a noticeably varied surface. Triton has an older region with ridges and streaks (which scientists call the 'cantaloupe', as it looks like the texture of a cantaloupe), younger regions with lakes of frozen nitrogen and dark spots indicating cryovolcanic ash, and a number of other interesting features. Triton seems to hide a lot more surprises than we initially expected.
		TritonInSpaceHigh* = #ScienceRefactor_bd_multiSpec_TritonInSpaceHigh_00 // Images taken of Triton reveal a MUCH more interesting and varied body than expected. Scientists suspect Triton is not a typical moon, but instead a dwarf planet that Neptune captured from the Kupier Belt with a thin nitrogen exosphere. If Triton was not orbitting Neptune, it would be the largest dwarf planet (modestly larger than Pluto) and possibly a planet in its own right.
		TritonInSpaceHigh* = #ScienceRefactor_bd_multiSpec_TritonInSpaceHigh_01 // Thermal emissions reveal warm, localized hot spots. Imaging analysis reveal a younger surface with few craters as well as some strange dark spots on the surface, corresponding with the localized hot spots. This information indicates active cryovolcanism. Interesting!

        PlutoInSpace* = #ScienceRefactor_bd_multiSpec_PlutoInSpace_00 // Multispectral images are taken around Pluto.
        PlutoInSpaceLow* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceLow_00 // Pluto's surface is a geological goldmine. Mountains, dunes, plains, frozen lakes, cryovolcanoes, and more are spotted in images. Some of our scientists say Pluto is the second most geologically complex body in the solar system, with Earth being the only body with a higher level of geological complexity.
        PlutoInSpaceLow* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceLow_01 // Imagery show penitentes in certain areas on Pluto's surface. These ice formations are incredibly rare in the solar system, previously believed to only occur on Earth.
        PlutoInSpaceLowSputnikPlanum* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceLowSputnikPlanum_00 // A high-albedo, smooth, and young region of nitrogen ice known as Sputnik Planitia is captured in multispectral images. If you zoom out a little bit, it almost looks like a heart.
        PlutoInSpaceLowCthulhuRegio* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceLowCthulhuRegio_00 // Multispectral images are taken of Cthulu Regio, a region covered in dark red tholins. Be careful not to wake the elder gods.
        PlutoInSpaceLowMontes* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceLowMontes_00 // Pluto's montes appear taller, sharp, and rugged, which suggests they are younger formations not yet erroded by time.
        PlutoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceHigh_00 // Wow! We expected a boring gray ball of ice but Pluto is super interesting! Its surface seems to be divided between high-albedo, brighter, younger, and smoother regions of nitrogen ice, and low-albedo, darker, older, and rugged regions of tholins.
        PlutoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_PlutoInSpaceHigh_01 // An extremely thin atmosphere is detected around Pluto, largely composed of nitrogen, methane, and carbon monoxide. This is likely being produced by the sublimation of ice and cryovolcanism.
		
		CharonInSpace* = #ScienceRefactor_bd_multiSpec_CharonInSpace_00 // Multispectral data is recorded from around Charon.
		CharonInSpaceLow* = #ScienceRefactor_bd_multiSpec_CharonInSpaceLow_00 // Craters, canyons, and other geological features are seen across Charon in multispectral images.
		CharonInSpaceLowRipleyCrater* = #ScienceRefactor_bd_multiSpec_CharonInSpaceLowRipleyCrater_00 // Multispectral imagery is captured of Ripley Crater. In space, no one can hear you scream.
		CharonInSpaceLowMordorMacula* = #ScienceRefactor_bd_multiSpec_CharonInSpaceLowMordorMacula_00 // Images are taken of Mordor Macula, the region that takes up most of Charon's north pole. Spectrometry analysis shows it to be largely composed of tholins.
		CharonInSpaceLowArgoChasma* = #ScienceRefactor_bd_multiSpec_CharonInSpaceLowArgoChasma_00 // Scientists are shocked when images come in from Argo Chasma. It is interesting to find such a impressive feature on an unassuming body. Images reveal that Argo Chasma is the deepest canyon ever found in the solar system to date.
		CharonInSpaceHigh* = #ScienceRefactor_bd_multiSpec_CharonInSpaceHigh_00 // Imagery reveals Charon to largely be a gray moon with a red north polar cap.
		CharonInSpaceHigh* = #ScienceRefactor_bd_multiSpec_CharonInSpaceHigh_01 // Pluto's large moon Charon is captured in multispectral imagery. Charon could be considered a dwarf planet in its own right, and its mass and size make the Pluto-Charon system more similar to a binary system than a planet-moon system.


        HalleyInSpace* = #ScienceRefactor_bd_multiSpec_HalleyInSpace_00 // Multispectral images are captured of Halley.
        HalleyInSpaceLow* = #ScienceRefactor_bd_multiSpec_HalleyInSpaceLow_00 // The dust particles whizzing around the comet almost look like snow in a blizzard.
        HalleyInSpaceHigh* = #ScienceRefactor_bd_multiSpec_HalleyInSpaceHigh_00 // Multispectral analysis is conducted on Halley's coma.

        ChuryumovGerasimenkoInSpace* = #ScienceRefactor_bd_multiSpec_ChuryumovGerasimenkoInSpace_00 // Multispectral images are captured of 67P/Churyumov-Gerasimenko.
        ChuryumovGerasimenkoInSpaceLow* = #ScienceRefactor_bd_multiSpec_ChuryumovGerasimenkoInSpaceLow_00 // Scientists can't tell if the which of the many streaks in the images are caused by dust particles or cosmic rays.
        ChuryumovGerasimenkoInSpaceLow* = #ScienceRefactor_bd_multiSpec_ChuryumovGerasimenkoInSpaceLow_01 // The dust particles whizzing around the comet almost look like snow in a blizzard.
        ChuryumovGerasimenkoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_ChuryumovGerasimenkoInSpaceHigh_00 // Multispectral images reveal a highly uneven surface with varying albedo. Tread carefully.
    }
}