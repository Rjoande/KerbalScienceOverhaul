        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedHighlands_00 = From the highlands, the horizon curves away into a dim red dusk that feels permanently late. The site is stable enough—if we remember that “flat” here means “flat-ish.”
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedSouthPolarHills_00 = Knobby hills and brittle-looking ground create a maze of small hazards. You approve a single approach corridor and advise against improvising when Mission Control is minutes behind reality.
        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedNorthPole_00 = The pole is bright, cold, and eerily quiet, like the world is holding its breath. You select a conservative landing pad and add: “leave markers, or become a marker.”

        // bd_SoilMoisture
        #GEPscience_bd_SoilMoiusture_GrannusInSpaceLow_00 = The moisture mapper mostly measures its own panic while Grannus floods the antenna with red-noise microwaves; Mission Control gets the “soil: none” packet after a long, lonely delay.
		#GEPscience_bd_SoilMoiusture_TaranisInSpaceLow_00 = L-band returns a tale of two hemispheres: the sunlit side screams “bone-dry,” while the dark side whispers a few cold, faint patches that might be hiding frost under the rubble.
		#GEPscience_bd_SoilMoiusture_ToutatisInSpaceLow_00 = The readout shows a parched world with a suspiciously damp-looking ribbon near the twilight boundary; either there’s buried ice… or the instrument is getting imaginative under this dim red sun.
        #GEPscience_bd_SoilMoiusture_NodensInSpaceLow_00 = L-band mapping lights up broad wet belts and bright seas, but the packets arrive so late under Grannus’s dim red sun that the “current conditions” are mostly “some time ago.”
		#GEPscience_bd_SoilMoiusture_BelisamaInSpaceLow_00 = The scan is nearly featureless until a thin, cold smear on the long-dark face hints at buried ice; the instrument labels it “moisture” and promptly rechecks its own sanity.
		#GEPscience_bd_SoilMoiusture_SucellusInSpaceLow_00 = Everything comes back as dust-dry except a few stubborn pixels in deep shadow; the delayed report reads like a checklist: “regolith, regolith, regolith… maybe ice, if you’re optimistic.”
		#GEPscience_bd_SoilMoiusture_CaireenInSpaceLow_00 = The mapper insists on “no moisture detected” right up until it crosses a strange hydrated patch; Mission Control debates whether it’s real or just Caireen echoing nonsense through a long, lonely link.
        #GEPscience_bd_SoilMoiusture_SironaInSpaceLow_00 = The soil-moisture radar spends several minutes looking for “ground,” then gives up and reports faint, shifting condensate bands in Sirona’s cloud tops—along with a reminder that there is, in fact, no soil.
		#GEPscience_bd_SoilMoiusture_AirmedInSpaceLow_00 = Airmed maps out as uniformly dry with a few stubborn “moist” pixels clinging to crater shadows; the delayed downlink calls them “possible buried volatiles,” which is the instrument’s polite way of saying “probably ice.”
		#GEPscience_bd_SoilMoiusture_BorvoInSpaceLow_00 = The scan flags patchy “wet” zones that don’t behave like water at all; under the dim red sun the mapper quietly re-labels them “exotic surface liquids” and waits for Mission Control to stop asking if it can be used to water plants.
		#GEPscience_bd_SoilMoiusture_DamonaInSpaceLow_00 = Everything reads as cold, empty, and dry until the radar grazes the terminator and catches a thin frost signature; the long-haul packets arrive tagged: “moisture detected (definition negotiable).”
        #GEPscience_bd_SoilMoiusture_EponaInSpaceLow_00 = The L-band map paints Epona with broad “damp” lowlands and stubbornly dry high ground; the delayed downlink makes it feel like you’re reading yesterday’s weather from half a system away.
		#GEPscience_bd_SoilMoiusture_RosmertaInSpaceLow_00 = Most of Rosmerta comes back as vacuum-dry, but a few cold fractures flash a faint moisture signature; the instrument labels it “possible buried ice” and then goes quiet for a very long transmit window.
		#GEPscience_bd_SoilMoiusture_RAB-58EInSpaceLow_00 = The scan is mostly noise and dust-reflections, until a small patch spikes “wet” for a moment; it might be an icy clump, or just RAB-58E reminding you how strange things look under a dim red sun.
		#GEPscience_bd_SoilMoiusture_CernunnosInSpaceLow_00 = Cernunnos reads as uniformly dry and bitterly cold, with a thin rim of “moisture” near permanent shadow; Mission Control writes it down as “frost-like volatiles” and pretends that’s reassuring.

