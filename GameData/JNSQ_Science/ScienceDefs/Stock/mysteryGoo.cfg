		EveSrfLandedKrakensWell* = #JNSQscience_mysteryGoo_EveSrfLandedKrakensWell_00 // The Goo forms a perfect ring and stares toward the Well. You both agree not to wave.
        EveSrfLandedKrakensWell* = #JNSQscience_mysteryGoo_EveSrfLandedKrakensWell_01 // Your radio crackles. The Goo crackles back. This is not in the manual.
        EveSrfSplashedPolarLakes* = #JNSQscience_mysteryGoo_EveSrfSplashedPolarLakes_00 // The Goo stretches toward the lake like it’s trying to shake hands with the purple liquid.
