        #JNSQscience_sspxFishStudy_TalosInSpaceHigh_01 = Scrivi che l'isolamento aumenta il comportamento di branco. I pesci scrivono che l'isolamento aumenta la voglia di mordere il tubo del mangime.
        #JNSQscience_sspxFishStudy_EelooSrfLanded_00 = Il riscaldatore della vasca scatta avanti e indietro per ore. I pesci gli si radunano intorno come se fosse un falò con regole.
        #JNSQscience_sspxFishStudy_EelooSrfLanded_01 = Fuori è tutto bianco e silenzioso. I pesci reagiscono inventando un nuovo sport: il non muoversi competitivo.
        #JNSQscience_sspxFishStudy_EelooFlyingHigh_00 = L'atmosfera è a malapena un'atmosfera, ma riesce comunque a raffreddare la cabina. I pesci scivolano verso il lato caldo e sembrano traditi.
        #JNSQscience_sspxFishStudy_EelooFlyingHigh_01 = Una foschia ghiacciata striscia oltre il finestrino. I pesci la seguono come se fosse un documentario su prede lentissime.
        #JNSQscience_sspxFishStudy_EelooInSpaceLow_00 = La superficie brillante di Eeloo scorre sotto, con bagliori e ombre che si scambiano di posto. I pesci inseguono le chiazze di luce che cambiano come se fosse ora di mangiare.
        #JNSQscience_sspxFishStudy_EelooInSpaceLow_01 = Il ronzio dell'habitat diventa la cosa più rumorosa per chilometri. I pesci fanno lenti giri e fingono di non sentirti prendere appunti.
        #JNSQscience_sspxFishStudy_EelooInSpaceHigh_00 = Eeloo si riduce a una pallida perla nel buio. I pesci si assestano in orbite calme ed efficienti, come se stessero risparmiando entusiasmo.
        #JNSQscience_sspxFishStudy_EelooInSpaceHigh_01 = Qui fuori, ogni bolla sembra importante. I pesci sobbalzano una volta, poi fanno finta che fosse un'esercitazione pianificata.
        #JNSQscience_sspxFishStudy_CelesSrfLanded_00 = La superficie sembra aver firmato un NDA con la luce del sole. I pesci guardano fuori e poi guardano te, come se avessi firmato anche tu qualcosa.
        #JNSQscience_sspxFishStudy_CelesSrfLanded_01 = Il riflesso della vasca nell'oblò è più luminoso del mondo là fuori. I pesci continuano a nuotare lo stesso, puramente per dispetto.
        #JNSQscience_sspxFishStudy_CelesInSpaceLow_00 = Celes scorre sotto come un ciottolo quieto e riservato. I pesci si allineano con la rotazione della stazione e lo chiamano "branco".
