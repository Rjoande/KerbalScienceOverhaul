@EXPERIMENT_DEFINITION:HAS[#id[bd_UVscope]]
{
    %RESULTS
    {
        GrannusInSpaceHigh* = #GEPscience_farKerbol_00
        GrannusInSpaceHigh* = #GEPscience_farKerbol_01
        GrannusInSpaceHigh* = #GEPscience_farKerbol_02
        GrannusInSpaceHigh* = #GEPscience_farKerbol_03
        GrannusInSpaceHigh* = #GEPscience_farKerbol_04
        GrannusInSpaceHigh* = #GEPscience_farKerbol_05
        GrannusInSpaceHigh* = #GEPscience_farKerbol_06
        GrannusInSpaceHigh* = #GEPscience_farKerbol_UV_00 // You detect a faint, distant UV flare. It’s comforting to know Kerbol is still doing Kerbol things without you.
        GrannusInSpace* = #GEPscience_bd_UVscope_GrannusInSpace_00 // UV emissions spike and dance across the disk. You label the pattern “angry glitter” for the benefit of the outreach team.
        GrannusInSpace* = #GEPscience_bd_UVscope_GrannusInSpace_01 // You capture a flare in exquisite detail and immediately regret every unshielded cable on the spacecraft.
        GrannusInSpace* = #GEPscience_bd_UVscope_GrannusInSpace_02 // The UV camera saturates so hard it effectively invents a new color: “nope.”
        GrannusInSpaceLow* = #GEPscience_bd_UVscope_GrannusInSpaceLow_00 // The UV scope stares past Grannus’ ruddy glare and finds thin, sharp lines in the dark between stars. The data takes ages to trickle home.
        GrannusInSpaceHigh* = #GEPscience_bd_UVscope_GrannusInSpaceHigh_00 // From far above the dim red sun, the spectrum shows hot knots of ultraviolet light where you expected empty space. Mission Control files it under “not comforting”.

        TaranisInSpaceLow* = #GEPscience_bd_UVscope_TaranisInSpaceLow_00 // You use Taranis’ frozen night side as a convenient shade and tease out faint ultraviolet absorption from the thin stuff between worlds.
        TaranisInSpaceHigh* = #GEPscience_bd_UVscope_TaranisInSpaceHigh_00 // At this altitude Taranis is just a tiny coin split between glow and darkness, yet the UV lines still insist something out there is very, very hot.

        ToutatisInSpaceLow* = #GEPscience_bd_UVscope_ToutatisInSpaceLow_00 // A grazing pass over Toutatis’ limb leaves subtle UV fingerprints from its thin air, hinting at steep temperature swings near the twilight band.
        ToutatisInSpaceHigh* = #GEPscience_bd_UVscope_ToutatisInSpaceHigh_00 // With Toutatis turning below like a half-lit warning sign, the scope catches a hidden hot companion riding in the glare of a cooler star. That’s a lot of empty space to share an orbit in.

        NodensInSpaceLow* = #GEPscience_bd_UVscope_NodensInSpaceLow_00 // The UV scope catches Nodens’ thin upper haze glowing in stubborn lines, as if the air is trying very hard to be noticed.
        NodensInSpaceHigh* = #GEPscience_bd_UVscope_NodensInSpaceHigh_00 // Far above Nodens, the spectrum turns into a cold barcode of interstellar absorption and distant hot sources; the downlink arrives like a message from last week.

        BelisamaInSpaceLow* = #GEPscience_bd_UVscope_BelisamaInSpaceLow_00 // You use Belisama’s night side as a perfect shade and tease faint ultraviolet signatures out of the space between worlds. It still feels like staring into someone else’s sky.
        BelisamaInSpaceHigh* = #GEPscience_bd_UVscope_BelisamaInSpaceHigh_00 // From high orbit, Belisama is a dark speck and the UV scope finds more action in the surrounding plasma and dust than on the moon itself. That seems unfair.

        SucellusInSpaceLow* = #GEPscience_bd_UVscope_SucellusInSpaceLow_00 // Ultraviolet images pick out sharp, pale patches on Sucellus that don’t match anything in visible light—fresh frost, strange minerals, or just the universe being secretive again.
        SucellusInSpaceHigh* = #GEPscience_bd_UVscope_SucellusInSpaceHigh_00 // The instrument locks onto distant targets and records crisp UV lines while Sucellus drifts below like a forgotten waypoint under a dim red sun.

        CaireenInSpaceLow* = #GEPscience_bd_UVscope_CaireenInSpaceLow_00 // The UV scope watches a background star skim behind tiny Caireen and the spectrum twitches with a whisper-thin veil of particles. You pretend that’s normal.
        CaireenInSpaceHigh* = #GEPscience_bd_UVscope_CaireenInSpaceHigh_00 // From far out, Caireen is barely a dot, but the scope still finds hot companions and ultraviolet knots in the deep field. The emptiness around them feels very deliberate.

        SironaInSpaceLow* = #GEPscience_bd_UVscope_SironaInSpaceLow_00 // Sirona’s upper atmosphere lights up in ultraviolet bands, tracing fierce auroral curtains and hot, angry chemistry you’d rather not fly through.
        SironaInSpaceHigh* = #GEPscience_bd_UVscope_SironaInSpaceHigh_00 // From high orbit, the UV scope maps a vast, distorted glow around Sirona—more magnetosphere than planet—while the data packet crawls home under the dim red sun.

        AirmedInSpaceLow* = #GEPscience_bd_UVscope_AirmedInSpaceLow_00 // Airmed’s two-toned surface reflects UV in mismatched patches, like someone painted the regolith with different rules and forgot to leave a label.
        AirmedInSpaceHigh* = #GEPscience_bd_UVscope_AirmedInSpaceHigh_00 // With Airmed reduced to a scarred pebble below, a background star’s UV lines twitch during occultation—just a whisper of sputtered atoms clinging to the void.

        BorvoInSpaceLow* = #GEPscience_bd_UVscope_BorvoInSpaceLow_00 // Borvo’s thin air stamps the spectrum with cold absorption features; the methane lines are there, but they don’t quite behave the way the models promised.
        BorvoInSpaceHigh* = #GEPscience_bd_UVscope_BorvoInSpaceHigh_00 // Limb scans show a faint ultraviolet glow above Borvo’s terminator, hinting at high-altitude haze and weak aurorae in a sky that never looks familiar.

        DamonaInSpaceLow* = #GEPscience_bd_UVscope_DamonaInSpaceLow_00 // Damona’s frigid surface gives a hard UV reflectance curve with odd little bumps—either exotic minerals, fresh frost, or the universe refusing to simplify.
        DamonaInSpaceHigh* = #GEPscience_bd_UVscope_DamonaInSpaceHigh_00 // From far out, Damona vanishes into darkness and the UV scope returns to deep-field work, pulling out a hot companion’s signature from behind a cooler star’s glare.

        EponaInSpaceLow* = #GEPscience_bd_UVscope_EponaInSpaceLow_00 // A limb-scan over Epona shows a faint ultraviolet airglow and a few stubborn absorption lines. The spectrum says “hot upper chemistry,” while the downlink says “please wait.”
        EponaInSpaceHigh* = #GEPscience_bd_UVscope_EponaInSpaceHigh_00 // With Epona as a dark screen, background starlight turns into a crisp UV barcode of thin interstellar stuff. Something hot flickers in the glare where it really shouldn’t.

        RosmertaInSpaceLow* = #GEPscience_bd_UVscope_RosmertaInSpaceLow_00 // Rosmerta’s surface looks plain in visible light, but UV imaging paints sharp boundaries between frosts and darker grains. You log it as “composition differences,” and feel very far away doing so.
        RosmertaInSpaceHigh* = #GEPscience_bd_UVscope_RosmertaInSpaceHigh_00 // From high above Rosmerta, you watch a star slip behind it and look for any ultraviolet bite marks from a whisper-thin exosphere. If anything is there, it’s being extremely polite about it.

        RAB-58EInSpaceLow* = #GEPscience_bd_UVscope_RAB-58EInSpaceLow_00 // Ultraviolet reflectance on RAB-58E jumps between oddly bright and oddly dull patches, like the regolith can’t agree what it’s made of. The scope suggests fresh exposure or strange minerals; you suggest not touching it.
        RAB-58EInSpaceHigh* = #GEPscience_bd_UVscope_RAB-58EInSpaceHigh_00 // Pointed outward, the UV lines stay steady until brief spikes appear—charged dust, stray particles, or the universe clearing its throat. The signal arrives late enough to be a surprise twice.

        CernunnosInSpaceLow* = #GEPscience_bd_UVscope_CernunnosInSpaceLow_00 // Over Cernunnos’ terminator, the UV scope catches a thin halo of glow and absorption that hints at cold volatiles being stirred by energetic particles. It’s a delicate signature in a very unwelcoming sky.
        CernunnosInSpaceHigh* = #GEPscience_bd_UVscope_CernunnosInSpaceHigh_00 // High orbit turns Cernunnos into a dim landmark while the instrument hunts hot ultraviolet sources and hidden companions in distant starlight. The emptiness between the lines feels bigger than the screen.
    }
}