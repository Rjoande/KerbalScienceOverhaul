		CelesInSpaceLow* = #JNSQscience_barometerScan_CelesInSpaceLow_00 // Low orbit, same result: none. Space continues to be very space-like.
		CelesInSpaceHigh* = #JNSQscience_barometerScan_CelesInSpaceHigh_00 // The display shows 0.00 and refuses to add more decimals. Even instruments have limits.

		TamSrfLandedLowlands* = #JNSQscience_barometerScan_TamSrfLandedLowlands_00 // The needle sits hard at zero and somehow looks nervous about it.
		TamSrfLandedMidlands* = #JNSQscience_barometerScan_TamSrfLandedMidlands_00 // The gauge rattles with every tiny vibration, but the reading remains stubbornly “no air.”
		TamSrfLandedHighlands* = #JNSQscience_barometerScan_TamSrfLandedHighlands_00 // Vacuum again. Tam can’t even manage a disappointing breeze.
		TamSrfLandedTwinCraters* = #JNSQscience_barometerScan_TamSrfLandedTwinCraters_00 // You check the shadowed basin for trapped air. The barometer checks back with a bored zero.
		TamSrfLandedCraters* = #JNSQscience_barometerScan_TamSrfLandedCraters_00 // With this many holes, the barometer gives up and reports the same nothing everywhere.
		TamSrfLandedPockmarks* = #JNSQscience_barometerScan_TamSrfLandedPockmarks_00 // Dust puffs cause fake spikes on the graph. You label them “not atmosphere, just attitude.”
		TamSrfLanded* = #JNSQscience_barometerScan_TamSrfLanded_00 // The barometer reports “vacuum” and refuses to elaborate. You briefly accuse Tam of stealing the atmosphere.
		TamInSpace* = #JNSQscience_barometerScan_TamInSpace_00 // Still zero. You rotate the craft, glare at the display, and confirm that space remains space.
		TamInSpaceLow* = #JNSQscience_barometerScan_TamInSpaceLow_00 // Low orbit: zero pressure. Mission Control congratulates you on confirming what “space” means.
		TamInSpaceHigh* = #JNSQscience_barometerScan_TamInSpaceHigh_00 // From high above, the barometer continues its heroic struggle against absolutely nothing.

		HamekSrfLandedLowlands* = #JNSQscience_barometerScan_HamekSrfLandedLowlands_00 // The barometer reads vacuum, while red dust tries very hard to become “something” in the intake.
		HamekSrfLandedMidlands* = #JNSQscience_barometerScan_HamekSrfLandedMidlands_00 // A brief jump appears as powder drifts past the sensor, then it settles back to clean zero.
		HamekSrfLandedHighlands* = #JNSQscience_barometerScan_HamekSrfLandedHighlands_00 // No air up here either—just cold, hard ground, and that unsettling color.
		HamekSrfLandedPoles* = #JNSQscience_barometerScan_HamekSrfLandedPoles_00 // The gauge stays pinned at zero. The only “pressure” is the polar glare on your visor.
		HamekSrfLanded* = #JNSQscience_barometerScan_HamekSrfLanded_00 // The sensor detects no air pressure whatsoever. The only “hiss” comes from your suit vents.
		HamekInSpace* = #JNSQscience_barometerScan_HamekInSpace_00 // The reading is indistinguishable from the surrounding void. You log it as “consistent, unhelpful.”
		HamekInSpaceLow* = #JNSQscience_barometerScan_HamekInSpaceLow_00 // The instrument confirms Hamek has no atmosphere, only mysteries and a lot of empty.
		HamekInSpaceHigh* = #JNSQscience_barometerScan_HamekInSpaceHigh_00 // Still vacuum. The barometer seems relieved you asked from farther away.

        NaraSrfLandedLowlands* = #JNSQscience_barometerScan_NaraSrfLandedLowlands_00 // The needle climbs and climbs until it looks smug. Nara’s air is not shy about being heavy.
        NaraSrfLandedLowlands* = #JNSQscience_barometerScan_NaraSrfLandedLowlands_01 // Pressure is high enough that you can almost hear it leaning on the hull. You write “ruby slippers: preferred.”
        NaraSrfLandedMidlands* = #JNSQscience_barometerScan_NaraSrfLandedMidlands_00 // The barometer settles at a brutally steady value. Nara’s atmosphere feels like a rule, not a weather pattern.
        NaraSrfLandedMidlands* = #JNSQscience_barometerScan_NaraSrfLandedMidlands_01 // The reading suggests you’re standing at the bottom of an invisible ocean. You resist the urge to look for fish.
        NaraSrfLandedHighlands* = #JNSQscience_barometerScan_NaraSrfLandedHighlands_00 // The pressure drops a little with altitude, but not nearly as much as you’d like. Nara refuses to “thin out.”
        NaraSrfLandedHighlands* = #JNSQscience_barometerScan_NaraSrfLandedHighlands_01 // You confirm the highlands are still under serious atmospheric weight. The planet is very committed to the concept.
        NaraSrfLandedMountains* = #JNSQscience_barometerScan_NaraSrfLandedMountains_00 // The barometer flickers as wind and terrain churn the air. Even “mountain air” is dense enough to argue.
        NaraSrfLandedMountains* = #JNSQscience_barometerScan_NaraSrfLandedMountains_01 // The pressure profile looks wrong for something this cold, then you remember Nara does not care what feels “right.”
        NaraSrfLandedPolarLowlands* = #JNSQscience_barometerScan_NaraSrfLandedPolarLowlands_00 // The polar lowlands read high pressure with extra noise, like the air is full of fine, biting grit.
        NaraSrfLandedPolarLowlands* = #JNSQscience_barometerScan_NaraSrfLandedPolarLowlands_01 // The needle quivers and then steadies at “still too much.” You log it as: “polar air, heavy and cranky.”
        NaraSrfLandedPoles* = #JNSQscience_barometerScan_NaraSrfLandedPoles_00 // The barometer reports an unwelcoming wall of pressure and dares you to complain.
        NaraSrfLandedPoles* = #JNSQscience_barometerScan_NaraSrfLandedPoles_01 // You tap the gauge. It does not move, as if to say: “No, that is correct.”
        NaraSrfLandedPolarHighlands* = #JNSQscience_barometerScan_NaraSrfLandedPolarHighlands_00 // Slightly lower pressure up here, but the atmosphere still presses down like it has a job to do.
        NaraSrfLandedPolarHighlands* = #JNSQscience_barometerScan_NaraSrfLandedPolarHighlands_01 // The reading confirms: even the polar heights come with a built-in hug from the sky. A very firm hug.
        NaraFlyingLow* = #JNSQscience_barometerScan_NaraFlyingLow_00 // At low altitude the pressure changes fast with every bump of turbulence. The barometer gets a workout and so do you.
        NaraFlyingLow* = #JNSQscience_barometerScan_NaraFlyingLow_01 // The needle swings but never goes anywhere comforting. “Flying” feels like swimming in cold, heavy air.
        NaraFlyingHigh* = #JNSQscience_barometerScan_NaraFlyingHigh_00 // The pressure is lower up here, but it’s still very much “atmosphere.” Nara’s sky has depth and it wants you to notice.
        NaraFlyingHigh* = #JNSQscience_barometerScan_NaraFlyingHigh_01 // The barometer claims this is “high.” You add a note: “High compared to what, exactly?”
        NaraInSpaceLow* = #JNSQscience_barometerScan_NaraInSpaceLow_00 // The pressure drops toward nothing as you climb above Nara’s grip. The readout finally looks peaceful.
        NaraInSpaceLow* = #JNSQscience_barometerScan_NaraInSpaceLow_01 // The needle sits near zero, and for once that’s good news. You wish the return plan was as simple as this number.
        NaraInSpaceHigh* = #JNSQscience_barometerScan_NaraInSpaceHigh_00 // The instrument agrees: there is no air out here, only distance. Lots and lots of distance.
        NaraInSpaceHigh* = #JNSQscience_barometerScan_NaraInSpaceHigh_01 // The barometer reads vacuum, and the cabin feels like the only small patch of “inside” left in the universe.

        AmosSrfLanded* = #JNSQscience_barometerScan_AmosSrfLanded_00 // The barometer needle stays pinned at zero.
        AmosInSpace* = #JNSQscience_barometerScan_AmosInSpace_00 // The readout remains a perfect vacuum. The instrument logs this as “consistent,” and you log it as “unfriendly.”

        EnonSrfLanded* = #JNSQscience_barometerScan_EnonSrfLanded_00 // The pressure is exactly nothing, despite all that bright ice looking so inviting.
        EnonInSpace* = #JNSQscience_barometerScan_EnonInSpace_00 // Still vacuum. You tap the gauge just to be sure, then remember tapping doesn’t create atmospheres.

        PraxSrfLanded* = #JNSQscience_barometerScan_PraxSrfLanded_00 // The barometer reports a proud, unwavering zero.
        PraxInSpace* = #JNSQscience_barometerScan_PraxInSpace_00 // Nothing but vacuum and a very bored pressure sensor. At least the result is easy to chart.
