        #JNSQscience_evaReport_EelooFlyingLowMidlands_00 = The midlands pass beneath in pale, quiet sheets. You report that it’s beautiful, and also unsettlingly empty.
        #JNSQscience_evaReport_EelooFlyingLowMidlands_01 = You can’t shake the feeling you’re “flying” through the world’s faintest breath, over snow that never learned to melt.
        #JNSQscience_evaReport_EelooFlyingLowLowlands_00 = The lowlands hold a slightly thicker ground-hugging haze. It feels like the planet is trying, politely, to have weather.
        #JNSQscience_evaReport_EelooFlyingLowLowlands_01 = You drift above broad, smooth frostfields. Your boots swing in slow motion, as if even gravity is being careful.
