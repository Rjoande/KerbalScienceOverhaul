        #GEPscience_bd_ionElec_BorvoFlyingHigh_00 = The thin nitrogen air shows faint, stubborn charge separation with a hint of methane mischief. The probe returns smelling like static and bad decisions.
        #GEPscience_bd_ionElec_BorvoInSpaceLow_00 = A delicate ionosphere clings to Borvo like a fragile halo. The numbers look neat—until Sirona’s plasma wake ruffles the edges.
        #GEPscience_bd_ionElec_BorvoInSpaceHigh_00 = Particle counts fall off smoothly, then wobble as the moon drifts through Sirona’s influence. Space keeps changing the rules between check-ins.
        #GEPscience_bd_ionElec_DamonaInSpaceLow_00 = Dust and fractured rock grains carry charge like they’re hoarding it. A tiny discharge snaps across a panel and everyone pretends it was “expected.”
        #GEPscience_bd_ionElec_DamonaInSpaceHigh_00 = Mostly quiet readings, with occasional prickly bursts from the giant’s distant magnetosphere. Out here, even the emptiness has weather.
        #GEPscience_bd_ionElec_EponaFlyingHigh_00 = The upper air carries a thin, stubborn charge that comes and goes with Epona’s long, dim-red daylight. Your radio confirms it by sounding mildly offended.
