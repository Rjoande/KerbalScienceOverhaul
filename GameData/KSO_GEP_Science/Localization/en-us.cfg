		#GEPscience_bd_solarWind_BelisamaInSpaceHigh_00 = Out of the worst of Nodens’ shielding, the wind hits cleanly and with a cold regularity. The locked world below never turns to look, and neither does the sun.
		#GEPscience_bd_solarWind_SucellusInSpaceLow_00 = Near Sucellus there’s almost no protection—just a hard rain of charged particles and a lot of “maximum value” on the display. Someone suggests turning the sensitivity down; the wind ignores the suggestion.
		#GEPscience_bd_solarWind_SucellusInSpaceHigh_00 = The wind stays harsh even this far out, a steady push across a small, stubborn world. The data arrives home late and still feels like it has teeth.
		#GEPscience_bd_solarWind_CaireenInSpaceLow_00 = Solar wind slams straight into tiny Caireen and the detector catches a spray of freshly knocked-off ions. It’s like the moon is shedding little pieces of itself to answer your question.
