        #JNSQscience_bd_cosmicRay_VallInSpaceLowMidlands_00 = Conteggi puliti e implacabili: l'orbita di Vall sembra spazio nudo con una cartolina blu sotto.
        #JNSQscience_bd_cosmicRay_VallInSpaceLowLowlands_00 = I conteggi degli eventi secondari calano sopra i bassopiani: terreno più liscio rimanda meno argomenti.
