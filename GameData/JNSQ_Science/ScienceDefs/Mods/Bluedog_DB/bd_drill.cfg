@EXPERIMENT_DEFINITION:HAS[#id[bd_drill]]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #JNSQscience_bd_drill_MohoSrfLandedPoles_00 // The drill grinds into cooler, stubborn ground. The core comes up as brittle dust and sharp fragments that don’t stay clumped for long.
        MohoSrfLandedLowlands* = #JNSQscience_bd_drill_MohoSrfLandedLowlands_00 // The bit sinks into sun-baked regolith and comes back coated in fine, dark powder. The sample container gets warm just sitting there.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_drill_MohoSrfLandedPolarIceCraters_00 // In the shade, the drill hits a layer that hisses when warmed. Whatever it is, it clearly preferred being left alone.
        MohoSrfLandedHighlands* = #JNSQscience_bd_drill_MohoSrfLandedHighlands_00 // The drill chatters against dense rock and produces a jagged core. The scientists nod approvingly at how unfriendly it looks.
        MohoSrfLandedMidlands* = #JNSQscience_bd_drill_MohoSrfLandedMidlands_00 // A thin crust gives way to looser layers beneath. The core shows a tidy stack of “dust, dust, more dust.”
        MohoSrfLandedCraters* = #JNSQscience_bd_drill_MohoSrfLandedCraters_00 // The drill bites into impact-churned debris and returns a mixed, glassy mess. The layers look like they were stirred with enthusiasm.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_drill_MohoSrfLandedExoticCraters_00 // The core includes oddly colored grains that don’t match the surface. The drill log adds: “Exotic confirmed. Please define.”
        MohoSrfLandedRareCraters* = #JNSQscience_bd_drill_MohoSrfLandedRareCraters_00 // The sample tube fills with chunky fragments and a few surprising flecks that ping the sensors. Someone quietly labels the vial “do not snack.”
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_drill_MohoSrfLandedVoronoiCraters_00 // The core breaks into suspiciously regular pieces as it’s extracted. You double-check that the drill didn’t accidentally print a pattern.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_drill_MohoSrfLandedNotableCraters_00 // Layer after layer of shattered history slides out, each band slightly different. The crater seems determined to be remembered.
        MohoSrfLandedPeaks* = #JNSQscience_bd_drill_MohoSrfLandedPeaks_00 // The drill struggles for purchase, then finally wins a small, solid plug. It feels like you just sampled a mountain’s patience.

        EveSrfLandedPoles* = #JNSQscience_bd_drill_EveSrfLandedPoles_00 // The drill pulls up cold, heavy material that clings to everything. The instruments insist it’s “soil,” but it behaves like it’s judging you.
        EveSrfLandedLowlands* = #JNSQscience_bd_drill_EveSrfLandedLowlands_00 // The bit sinks with a wet crunch and the core comes up dense and sticky. It takes effort to convince the sample to leave the drill.
        EveSrfLandedMidlands* = #JNSQscience_bd_drill_EveSrfLandedMidlands_00 // The core shows compacted layers with faint mineral banding. The pressure makes even dirt feel like it has structural integrity.
        EveSrfLandedHighlands* = #JNSQscience_bd_drill_EveSrfLandedHighlands_00 // The drill returns drier, rockier material with fewer gooey surprises. Everyone relaxes until the sample starts slowly oozing anyway.
        EveSrfLandedPeaks* = #JNSQscience_bd_drill_EveSrfLandedPeaks_00 // Thin, brittle crust over hard rock—finally something that drills like it means it. The core still comes out faintly warm.
        EveSrfLandedExplodiumSea* = #JNSQscience_bd_drill_EveSrfLandedExplodiumSea_00 // The drill stirs up a sludgy, reactive muck that bubbles in the container. The safety officer adds several new rules.
        EveSrfLandedMountains* = #JNSQscience_bd_drill_EveSrfLandedMountains_00 // The drill bites into tough stone laced with strange salts. The core looks stable right up until it meets fresh air and starts changing its mind.
        EveSrfLandedShores* = #JNSQscience_bd_drill_EveSrfLandedShores_00 // Saturated sand collapses into the borehole and tries to rejoin the sea. The recovered core is half brine, half grit, all stubborn.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_drill_EveSrfLandedKrakensWell_00 // The drill hits an oddly warm pocket and the core comes up bubbling and tense. You seal the container and pretend it’s normal geology.

        GillySrfLandedLowlands* = #JNSQscience_bd_drill_GillySrfLandedLowlands_00 // The drill tries to push itself off the surface. The “core” is mostly loose gravel that floats toward the lid when you’re not looking.
        GillySrfLandedMidlands* = #JNSQscience_bd_drill_GillySrfLandedMidlands_00 // The bit catches on lumpy stone and frees a few reluctant fragments. The sample is more “assorted pebbles” than “layered history.”
        GillySrfLandedHighlands* = #JNSQscience_bd_drill_GillySrfLandedHighlands_00 // The drill finally extracts a tiny plug of compacted rock, then it crumbles in low gravity. You still log it proudly as a “successful core.”

        KerbinSrfLandedAdministration* = #JNSQscience_bd_drill_KerbinSrfLandedAdministration_00 // You drill for “subsurface samples” and recover three distinct layers of paperwork, two fossilized stamps, and a firmly worded memo about drilling.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_drill_KerbinSrfLandedAstronautComplex_00 // The drill bites into the ground under the complex and pulls up a core full of lost snacks, sock fibers, and something the medical staff pretends not to recognize.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_drill_KerbinSrfLandedCrawlerway_00 // The bit hits compacted crawlerway material and the whole rig vibrates like a launch countdown; the Safety Officer insists this is not an approved shaker table.
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_drill_KerbinSrfLandedFlagPole_00 // The drill core contains alternating bands of concrete, paint chips, and ceremonial pride; nobody can explain why the “flag foundation” has seven refurbishment layers.
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_drill_KerbinSrfLandedMissionControl_00 // You clip a buried cable bundle and Mission Control immediately declares an “unexpected excavation event”; the drill is reassigned a flight number and grounded.
        KerbinSrfLandedR&D* = #JNSQscience_bd_drill_KerbinSrfLandedR&D_00 // The core sample comes out sparkling slightly and humming faintly; R&D asks you to return it and stop “field-testing” their floor.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_drill_KerbinSrfLandedR&DCentralBuilding_00 // Your drill produces a perfectly stratified column of forms and signatures; the bureaucratic density is off the charts and somehow still increasing.
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_drill_KerbinSrfLandedR&DCornerLab_00 // You drill in the corner and strike a hidden snack cache; the official report lists it as “nutrient-rich sedimentary deposit.”
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_drill_KerbinSrfLandedR&DMainBuilding_00 // The drill extracts a core that looks suspiciously like prototype material; the scientists nod solemnly and call this “excellent cross-department collaboration.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_drill_KerbinSrfLandedR&DObservatory_00 // The drilling shakes the observatory just enough to ruin a long exposure; astronomers log it as a seismic event and glare as hard as science allows.
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_drill_KerbinSrfLandedR&DSideLab_00 // The sample contains “definitely-not-classified” alloy shavings; a polite escort arrives and politely suggests you stop being curious.
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_drill_KerbinSrfLandedR&DSmallLab_00 // There isn’t enough room for proper setup, so you mount the drill on a clipboard; the clipboard becomes the control group.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_drill_KerbinSrfLandedR&DTanks_00 // The core smells like old monoprop spill and bad decisions; the Safety Officer invents a new safety briefing on the spot.
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_drill_KerbinSrfLandedR&DWindTunnel_00 // You drill into the wind tunnel floor and the airflow makes the rig whistle like an alarm; engineering calls it “useful data” and refuses to elaborate.
        KerbinSrfLandedRunway* = #JNSQscience_bd_drill_KerbinSrfLandedRunway_00 // You drill straight through the runway’s “top layer” and immediately receive a priority call asking why the runway has become a ventilation system.
        KerbinSrfLandedSPH* = #JNSQscience_bd_drill_KerbinSrfLandedSPH_00 // The drill pulls up a core full of rivets and forgotten fasteners; the hangar crew cheers until you label it “evidence.”
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_drill_KerbinSrfLandedSPHMainBuilding_00 // You start drilling and immediately trigger the sprinkler system; the experiment is now officially “aquatic operations.”
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_drill_KerbinSrfLandedSPHRoundTank_00 // The core comes out pre-lubricated for some reason; everyone agrees not to ask questions that require new paperwork.
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_drill_KerbinSrfLandedSPHTanks_00 // The drill sample contains a dense layer of discarded winglets; the recycling officer appears, visibly conflicted between joy and rage.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_drill_KerbinSrfLandedSPHWaterTower_00 // You drill near the water tower and accidentally improve water pressure; Facilities thanks you in the cold, distant language of reluctant approval.
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationDishEast_00 // The dish calibration drifts as soon as the drill bites; the tracking team blames “noise” and looks directly at you while saying it.
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationDishNorth_00 // Your drilling produces a perfectly timed vibration that the dish interprets as a signal; someone starts trying to decode your core sample.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationDishSouth_00 // The dish briefly locks onto the drill motor as if it’s a spacecraft; you are asked to file a flight plan for your equipment.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_drill_KerbinSrfLandedTrackingStationHub_00 // The core is mostly compacted coffee grounds and stress; this is recorded as a critical operational resource layer.
        KerbinSrfLandedVAB* = #JNSQscience_bd_drill_KerbinSrfLandedVAB_00 // You extract a core containing ancient bolt fragments, charred soot, and three generations of snack wrappers; archaeology asks for a budget line.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_drill_KerbinSrfLandedVABMainBuilding_00 // The drill hits something hollow and you learn a lot about the VAB’s internal geometry and even more about the engineer’s vocabulary.
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_drill_KerbinSrfLandedVABPodMemorial_00 // Drilling is “absolutely forbidden,” so you take a “non-invasive” sample next to it; the memorial remains dignified while you do not.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_drill_KerbinSrfLandedVABRoundTank_00 // The sample is mostly paint layers and optimism; mission planners demand to know if optimism can be refined into fuel.
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_drill_KerbinSrfLandedVABSouthComplex_00 // The drill core shows a neat timeline of soot deposits from past launches; historians argue over which layer counts as “classic.”
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_drill_KerbinSrfLandedVABTanks_00 // The drill releases a suspicious whiff of something energetic; everyone evacuates, and you log it as “volatile organics detected.”
        KerbinSrfLandedKSC* = #JNSQscience_bd_drill_KerbinSrfLandedKSC_00 // You drill anywhere on-site and the core comes out half soil, half procedures; the procedural fraction is somehow heavier.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_drill_KerbinSrfLandedIslandAirfield_00 // The drill pulls up sand, coral grit, and an old wrench; the tower immediately radios to ask if you found their wrench.
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_drill_KerbinSrfLandedBaikerbanur_00 // The core sample contains dust, faded decals, and a surprisingly fresh checklist; nostalgia is officially a measurable contaminant.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_drill_KerbinSrfLandedBaikerbanurLaunchpad_00 // The drill brings up slag, scorched concrete, and “mystery ice”; you label it legacy cryogenics to avoid follow-up questions.

        KerbinSrfLandedMidlands* = #JNSQscience_bd_drill_KerbinSrfLandedMidlands_00 // The drill sinks easily through rich soil, but the core comes up as a crumbly mix of roots and dirt. The lab notes read: "Mostly future snacks."
        KerbinSrfLandedLowlands* = #JNSQscience_bd_drill_KerbinSrfLandedLowlands_00 // The drill floods its own borehole with groundwater and the extracted “core” behaves like pudding. You decide to log it as a liquid-solid transitional state.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_drill_KerbinSrfLandedAridLowlands_00 // The drill chews through a dry crust and immediately starts sanding itself with the sample. The engineers request you stop calling this “unexpected.”
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_drill_KerbinSrfLandedAridMidlands_00 // You finally hit something firm under the dunes—then it collapses into even finer sand. Mission Control files it under “discoveries we already knew.”
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_drill_KerbinSrfLandedAridHighlands_00 // The core comes up in dusty, colorful layers that stain the sample tubes and your gloves. You label it “Arid, but with attitude.”
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_drill_KerbinSrfLandedAridMountains_00 // The drill rattles against sun-baked rock and returns a core that looks personally offended. The science team calls it “excellent” and “definitely abrasive.”
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_drill_KerbinSrfLandedWelcomeBackIsland_00 // The drill brings up a neat cylinder of sand... plus a mysterious bolt. Either the geology is odd here, or somebody’s been “welcomed back” a lot.

        MunSrfLandedPoles* = #JNSQscience_bd_drill_MunSrfLandedPoles_00 // The drill bites into cold, stubborn dust. The sample comes up clumped with static and fine frost.
        MunSrfLandedHighlands* = #JNSQscience_bd_drill_MunSrfLandedHighlands_00 // The core is tightly packed regolith and sharp breccia. The drill sounds like it’s chewing gravel on purpose.
        MunSrfLandedMidlands* = #JNSQscience_bd_drill_MunSrfLandedMidlands_00 // A neat cylinder of gray powder slides out of the sleeve. It immediately tries to become a cloud again.
        MunSrfLandedLowlands* = #JNSQscience_bd_drill_MunSrfLandedLowlands_00 // The drill returns darker grains and tiny glassy beads. Something here was melted long ago and never forgot.
        MunSrfLandedPolarIceCraters* = #JNSQscience_bd_drill_MunSrfLandedPolarIceCraters_00 // The borehole exhales a faint haze as the drill warms the ground. The instruments insist this counts as “volatile release.”
        MunSrfLandedExoticCraters* = #JNSQscience_bd_drill_MunSrfLandedExoticCraters_00 // The core shows mixed layers that don’t agree on an order. You label it “complicated ejecta” and move on quickly.
        MunSrfLandedRareCraters* = #JNSQscience_bd_drill_MunSrfLandedRareCraters_00 // The drill pulls up a lumpy column of rubble and odd fragments. None of it matches the “standard gray” you were promised.
        MunSrfLandedVoronoiCraters* = #JNSQscience_bd_drill_MunSrfLandedVoronoiCraters_00 // The sample breaks into strangely regular chunks as it’s extracted. The patterning looks planned, which is unsettling for a rock.
        MunSrfLandedNotableCraters* = #JNSQscience_bd_drill_MunSrfLandedNotableCraters_00 // Distinct bands of dust and shattered stone stack like a history book with missing pages. The drill has underlined all the confusing parts.
        MunSrfLandedMountains* = #JNSQscience_bd_drill_MunSrfLandedMountains_00 // The drill chatters against hard rock and returns a jagged core. It’s less a sample and more a warning.

        MinmusSrfLandedPoles* = #JNSQscience_bd_drill_MinmusSrfLandedPoles_00 // The drill cuts through brittle crust that sparkles in the light. The core looks like it was grown, not deposited.
        MinmusSrfLandedLowlands* = #JNSQscience_bd_drill_MinmusSrfLandedLowlands_00 // The bit sinks with an odd, soft crunch. The recovered material squeaks against the container like packed crystals.
        MinmusSrfLandedMidlands* = #JNSQscience_bd_drill_MinmusSrfLandedMidlands_00 // A pale, powdery layer gives way to harder inclusions. The drill log notes “unexpectedly structured.”
        MinmusSrfLandedHighlands* = #JNSQscience_bd_drill_MinmusSrfLandedHighlands_00 // The surface plate is firm enough to make the drill ring. The sample comes up as clean shards and glittering dust.
        MinmusSrfLandedBasins* = #JNSQscience_bd_drill_MinmusSrfLandedBasins_00 // The drill pulls a smoother, denser core with fewer voids. Whatever settled here had time to settle properly.
        MinmusSrfLandedBrownBasins* = #JNSQscience_bd_drill_MinmusSrfLandedBrownBasins_00 // The sample is darker and more granular, with impurities throughout. The drill smells faintly of “not ice.”
        MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_drill_MinmusSrfLandedBrownLowlands_00 // The core alternates between pale crystal and brown grit. The boundary is sharp enough to blame on somebody.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_drill_MinmusSrfLandedBrownMidlands_00 // The drill returns crumbly material that stains the sample sleeve. The scientists argue whether it’s chemistry or attitude.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_drill_MinmusSrfLandedBrownHighlands_00 // The bit scrapes through abrasive grains that refuse to compact. The core comes up rough, like it wants to sandpaper the lab.
        MinmusSrfLandedMountains* = #JNSQscience_bd_drill_MinmusSrfLandedMountains_00 // The drill struggles, then triumphs with a solid crystalline plug. It’s the most “rock-like” thing you’ve seen here all day.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_drill_DunaSrfLandedIceCaps_00 // The drill squeals through brittle frost and returns a pinkish ice-and-dust core. It sublimates just enough to make the sample tube look guilty.
        DunaSrfLandedHighlands* = #JNSQscience_bd_drill_DunaSrfLandedHighlands_00 // The bit grinds into hard, wind-scrubbed layers and brings up gritty, oxidized rock. The core is basically “compressed dust with ambition.”
        DunaSrfLandedMidlands* = #JNSQscience_bd_drill_DunaSrfLandedMidlands_00 // A tidy cylinder of fine red regolith slides out, then immediately tries to become airborne again. The drill claims this counts as “highly mobile geology.”
        DunaSrfLandedLowlands* = #JNSQscience_bd_drill_DunaSrfLandedLowlands_00 // The borehole collapses slightly as you extract a denser, darker mix. The layers suggest this ground has been settling for a very long time.
        DunaSrfLandedCraters* = #JNSQscience_bd_drill_DunaSrfLandedCraters_00 // The core is a chaotic blend of melted beads and shattered stone. Impact history, now in convenient tube form.
        DunaSrfLandedRareCraters* = #JNSQscience_bd_drill_DunaSrfLandedRareCraters_00 // The drill pulls up unusual, glassy fragments that ping the sensors. Somebody labels it “rare” and stops asking what it means.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_drill_DunaSrfLandedVoronoiCraters_00 // The sample breaks into oddly regular chunks as it exits the sleeve. The pattern looks accidental, but it feels like it’s watching you.
        DunaSrfLandedNotableCraters* = #JNSQscience_bd_drill_DunaSrfLandedNotableCraters_00 // Layered ejecta stacks neatly in the core, like the crater kept receipts. The science team argues over which layer is the “good part.”
        DunaSrfLandedExoticCraters* = #JNSQscience_bd_drill_DunaSrfLandedExoticCraters_00 // Bright grains and dark grit alternate in sharp bands. The drill log simply says: “Exotic confirmed. Please do not lick.”
        DunaSrfLandedTrenches* = #JNSQscience_bd_drill_DunaSrfLandedTrenches_00 // The drill finds compacted sediments with thin, tilted layers. Whatever carved this trench also did a thorough job filing the evidence.
        DunaSrfLandedNotablePlains* = #JNSQscience_bd_drill_DunaSrfLandedNotablePlains_00 // The core is mostly uniform dust with occasional cemented crusts. The plains are consistent—right up until they aren’t.
        DunaSrfLandedNotableMountains* = #JNSQscience_bd_drill_DunaSrfLandedNotableMountains_00 // Hard rock gives way to fractured bands and mineral seams. The drill returns a core that looks like it’s been under stress for ages.
        DunaSrfLandedMountains* = #JNSQscience_bd_drill_DunaSrfLandedMountains_00 // The bit chatters against stubborn stone and brings up a jagged plug. The mountain seems annoyed you took a piece of it.
        DunaSrfLandedVolcano* = #JNSQscience_bd_drill_DunaSrfLandedVolcano_00 // The drill hits warmer, darker material with vesicles and brittle crust. The sample smells like “recently not a problem.”

        IkeSrfLandedPoles* = #JNSQscience_bd_drill_IkeSrfLandedPoles_00 // The drill bites into cold, compact regolith and returns a pale, dusty core. Everything clings to everything, including your patience.
        IkeSrfLandedMountains* = #JNSQscience_bd_drill_IkeSrfLandedMountains_00 // The bit rattles against hard rock and extracts a sharp, fractured plug. The core looks like it was broken on purpose.
        IkeSrfLandedMidlands* = #JNSQscience_bd_drill_IkeSrfLandedMidlands_00 // A uniform gray column slides out with fine grains and occasional pebbles. The moon appears determined to be aggressively average.
        IkeSrfLandedLowlands* = #JNSQscience_bd_drill_IkeSrfLandedLowlands_00 // The drill pulls up darker rubble and loosely packed layers. The sample refuses to stay in a single piece for very long.
        IkeSrfLandedHighlands* = #JNSQscience_bd_drill_IkeSrfLandedHighlands_00 // The core contains tougher, more cemented material with fewer fines. The drill sounds pleased with itself for once.

        EdnaSrfLandedLowlands* = #JNSQscience_bd_drill_EdnaSrfLandedLowlands_00 // The drill presses through a powdery surface into harder icy grit. The core sparkles faintly, as if it’s trying to look innocent.
        EdnaSrfLandedMidlands* = #JNSQscience_bd_drill_EdnaSrfLandedMidlands_00 // A layered mix of dark dust and pale, brittle chunks comes up cleanly. The instruments keep arguing about whether it’s “rock” or “cold rock.”
        EdnaSrfLandedHighlands* = #JNSQscience_bd_drill_EdnaSrfLandedHighlands_00 // The bit grinds into firm, ancient material and returns a stubborn core that resists cracking. Whatever this is, it’s been holding together for a long time.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_bd_drill_EdnaSrfLandedPolarIceCraters_00 // The drill hits volatile-rich layers that fog the sleeve as they warm. The sample tube becomes a tiny weather system.
        EdnaSrfLandedWhites* = #JNSQscience_bd_drill_EdnaSrfLandedWhites_00 // A bright, chalky core slides out with crystalline grains throughout. The lab requests more containers and fewer questions.

        DakSrfLandedLowlands* = #JNSQscience_bd_drill_DakSrfLandedLowlands_00 // The drill tries to push itself off the surface while collecting loose rubble. The “core” is mostly pebbles politely stacked.
        DakSrfLandedMidlands* = #JNSQscience_bd_drill_DakSrfLandedMidlands_00 // The bit catches on lumpy stone and frees a compacted mix of dust and fragments. The sample looks like it was assembled, not deposited.
        DakSrfLandedHighlands* = #JNSQscience_bd_drill_DakSrfLandedHighlands_00 // A thin crust gives way to stubborn, blocky material. The drill returns a small plug that immediately wants to fall apart in low gravity.

        DresSrfLandedPoles* = #JNSQscience_bd_drill_DresSrfLandedPoles_00 // The drill sinks into cold, powdery ground and pulls up pale dust with icy grains. The sample crackles softly as it warms.
        DresSrfLandedHighlands* = #JNSQscience_bd_drill_DresSrfLandedHighlands_00 // The bit grinds into tough, dry layers and extracts a gritty core. The rock here feels old enough to file complaints.
        DresSrfLandedMidlands* = #JNSQscience_bd_drill_DresSrfLandedMidlands_00 // A neat cylinder of fine, grayish regolith emerges with scattered inclusions. The boring parts are still scientifically valuable, allegedly.
        DresSrfLandedLowlands* = #JNSQscience_bd_drill_DresSrfLandedLowlands_00 // The drill returns darker sediments packed more tightly than expected. The layers suggest slow accumulation and even slower change.
        DresSrfLandedCanyon* = #JNSQscience_bd_drill_DresSrfLandedCanyon_00 // The core shows tilted strata and mixed debris, as if the canyon walls have been shedding secrets for ages. You label it “structural drama.”

        LaytheSrfLandedShores* = #JNSQscience_bd_drill_LaytheSrfLandedShores_00 // The drill pulls up damp, gritty layers that try very hard to become beach again. The sample tube fogs as if it’s proud of being “habitable-ish.”
        LaytheSrfLandedShallows* = #JNSQscience_bd_drill_LaytheSrfLandedShallows_00 // The bit bites into waterlogged sand and hits a stubborn shell of compacted grit underneath. The core comes up striped with salt and fine dark grains.
        LaytheSrfLandedLowlands* = #JNSQscience_bd_drill_LaytheSrfLandedLowlands_00 // The drill sinks cleanly through soft ground, then complains when the borehole starts slumping in. The recovered core is packed mud and tiny stones, neatly compressed by time.
        LaytheSrfLandedMidlands* = #JNSQscience_bd_drill_LaytheSrfLandedMidlands_00 // A firm crust gives way to looser layers beneath, like the planet forgot to finish drying. The core shows alternating bands of dust and gritty clumps.
        LaytheSrfLandedHighlands* = #JNSQscience_bd_drill_LaytheSrfLandedHighlands_00 // The drill scrapes through rocky soil with fewer wet surprises. The core is dense, mineral-rich, and annoyingly proud of its stability.
        LaytheSrfLandedMountains* = #JNSQscience_bd_drill_LaytheSrfLandedMountains_00 // The bit chatters against hard rock and returns a jagged plug with ice-flecked dust. The engineers note the drill sounds “tired.”
        LaytheSrfLandedIceCaps* = #JNSQscience_bd_drill_LaytheSrfLandedIceCaps_00 // The drill carves brittle ice that squeaks and cracks under its own warmth. The sample comes up as frosty chips with a thin, briny film.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_bd_drill_LaytheSrfLandedEnclosedFaults_00 // The drill hits fractured layers that shift and settle as you extract the core. The sample looks like it was assembled from yesterday’s broken ground.

