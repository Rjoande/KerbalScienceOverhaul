        #GEPscience_bd_orbitalScope_ToutatisInSpaceLowDarkSideMountains_00 = The dark side mountains are silhouettes against star-lit nothing, with just enough definition to be ominous. Mission Control asks for a clearer map; you ask for a brighter universe.

        #GEPscience_bd_orbitalScope_NodensInSpaceHigh_00 = From high orbit, Nodens is a dim jewel under the red sun—too familiar in shape, too unfamiliar in tone. The map team queues the data behind three relay hops and a lot of sighing.
        #GEPscience_bd_orbitalScope_NodensInSpaceHigh_01 = The planet-wide mosaic preview loads slowly, line by line, like Nodens is being revealed on purpose. Someone notes “habitable-looking” and immediately adds “probably not for us.”
        #GEPscience_bd_orbitalScope_NodensInSpaceLowSaltySeas_00 = The salty seas reflect a dull copper sky, broken by long, wind-streaked patterns. The stitching software flags “moving texture,” which is a polite way of saying “waves.”
        #GEPscience_bd_orbitalScope_NodensInSpaceLowSaltySeas_01 = Sequential frames show broad currents curling like ink across the water. You schedule another pass and hope the comms delay doesn’t outlast the weather.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowFreshWater_00 = Freshwater basins appear darker and calmer than the open seas, with shorelines that don’t quite match last orbit’s images. Either the water moves, or the planet is messing with your landmarks.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowFreshWater_01 = The camera catches thin haze over the lakes that smears the contrast just enough to be annoying. You file it under “atmosphere present, patience required.”
        #GEPscience_bd_orbitalScope_NodensInSpaceLowShores_00 = The shores are a jagged boundary of foam-bright and soil-dark, constantly rearranged between passes. The mosaic is going to need fewer dreams and more control points.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowShores_01 = Sandbars and deltas show up as pale freckles that drift with every orbit. Cartography requests “one stable coastline,” and Nodens declines.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalLowlands_00 = The tropical lowlands are a patchwork of muted greens and browns under red sunlight, like a postcard printed with the wrong ink. You correct the color balance and it still looks alien.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalLowlands_01 = Long cloud shadows slide across the lowlands between frames, drawing temporary continents. Mission Control calls it “dynamic lighting”; you call it “ruined overlap.”
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateLowlands_00 = Temperate lowlands show broad plains cut by faint channels that only appear at certain sun angles. You plan a second pass because Nodens refuses to hold still for your map.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateLowlands_01 = The terrain looks comfortable right up until the haze makes the horizon vanish into red. The camera labels it “normal scattering”; your gut labels it “far from home.”
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalMidlands_00 = The tropical midlands resolve into rolling ridges and basins with sharper relief than expected. The mosaic preview looks like a place you could walk—until you remember the signal delay to ask permission.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTropicalMidlands_01 = Subtle tonal banding suggests different surface materials, or different kinds of regret. You increase exposure time and promise the lens you’ll stop pointing it at the sun.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateMidlands_00 = Temperate midlands provide clean, high-contrast frames when the clouds cooperate. For several glorious minutes, mapping feels almost like home—only redder and quieter.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTemperateMidlands_01 = Repeated passes show faint fog pooling in low spots, changing the scene just enough to break automated stitching. The computer demands “ground truth”; you are currently in space.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowHighlands_00 = The highlands throw long, razor-edged shadows that make every ridge look taller than it should be. You label the file “Do Not Land Here (Probably).”
        #GEPscience_bd_orbitalScope_NodensInSpaceLowHighlands_01 = Bright rock outcrops punctuate the darker slopes like warning lights. The camera’s stabilization works overtime while the planet calmly pretends it isn’t intimidating.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTundra_00 = The tundra sits under a thin, milky veil that softens everything into gray-red gradients. The mosaic resembles a bruise with topography.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowTundra_01 = Frost-dusted patches appear and vanish from orbit to orbit, as if the ground is breathing. You check the timestamp twice; the planet is simply fast at being strange.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowIceCaps_00 = The ice caps are bright enough to challenge the sensor even through the haze, with fracture lines like spiderwebs across the poles. The stitching software suggests sunglasses.
        #GEPscience_bd_orbitalScope_NodensInSpaceLowIceCaps_01 = Edges of the caps show scalloped margins that shift between passes, hinting at active winds or seasonal creep. You tag the series “keep watching” and “do not lick.”

        #GEPscience_bd_orbitalScope_BelisamaInSpaceHigh_00 = From high orbit, Belisama is a pale disk under a dim red sun, with Nodens hanging nearby like a silent supervisor. The full mosaic takes ages to downlink, one unsettling strip at a time.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowFlats_00 = The Flats give clean, repeatable frames—until you notice the same “clean” cracks never line up between passes. Your stitching software calls it “parallax,” and you call it “Belisama.”
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTropicalLowlands_00 = The tropical lowlands are dark and smooth in the red light, with faint streaks that look like someone dragged a brush across the surface. Control points are easy to pick, harder to trust.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTemperateLowlands_00 = In the temperate lowlands, subtle ridges emerge only at certain sun angles. You schedule another orbit and remember that “tomorrow” is a long word out here.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTropicalMidlands_00 = The tropical midlands show rolling, blocky terrain that makes a satisfying mosaic grid. Then the shadows shift and the grid becomes “interpretive.”
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowTemperateMidlands_00 = The temperate midlands look like they’ve been pressed flat and then wrinkled again. The map team asks what caused it; you send them more pictures and let them argue at leisure.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowHighlands_00 = The highlands throw razor shadows that make every ridge look landable right up until you zoom in. The camera resolves boulders; your confidence does not.
        #GEPscience_bd_orbitalScope_BelisamaInSpaceLowPoles_00 = The poles gleam with higher albedo patches that overexpose just enough to be annoying. You bracket the shots and still end up with “white” in three different flavors.

        #GEPscience_bd_orbitalScope_SucellusInSpaceHigh_00 = From high orbit, Sucellus looks like a cold, resource-rich rumor drifting under the red sun. The radiated noise in the frames is a reminder that even the camera is far from home.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowBasins_00 = The basins form broad bowls with sharp rims that stitch beautifully into a near-perfect map. Near-perfect, until the exposure gradient turns every basin into its own lighting experiment.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowLowlands_00 = Lowlands reveal faint banding and mottled tones that make geologists whisper “metal” like it’s a snack. You mark the anomalies and try not to imagine mining equipment this far out.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowTropicalMidlands_00 = The tropical midlands are a patchwork of textures that refuses to repeat from pass to pass. The mosaic team requests “one stable surface,” and Sucellus politely declines.
        #GEPscience_bd_orbitalScope_SucellusInSpaceLowTemperateMidlands_00 = Temperate midlands provide crisp edges and useful relief—finally, a map that looks like a map. Then the comms delay hits and it feels like you mapped it for ghosts.
