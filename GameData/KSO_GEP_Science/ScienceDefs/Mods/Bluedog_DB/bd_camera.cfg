		NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_camera_NodensInSpaceLowTropicalLowlands_00 // The lowlands show subtle color shifts that don’t match your calibration charts. Either the planet is strange, or you forgot to remove the lens cap again.
