        #GEPscience_bd_UVspec_BorvoInSpaceHigh_00 = From high orbit, Borvo’s UV signature is dominated by nitrogen-diluted absorption with methane still clearly present. The whole world reads like a quiet lab experiment conducted very far from home.

        #GEPscience_bd_UVspec_DamonaInSpaceLowTropicalLowlands_00 = The UV spectrum is stark and simple—just reflection off gray, battered ground—with occasional spikes from charged-particle hits. Damona’s silence is only interrupted by radiation.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTemperateLowlands_00 = Subtle UV contrast bands trace compositional patches across the lowlands. The detector keeps integrating longer, as if distance itself is lowering the signal.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTropicalMidlands_00 = The midlands show sharper UV edges, consistent with fresher regolith exposed by impacts. You wonder how long “fresh” lasts under Sirona’s harsh environment.
        #GEPscience_bd_UVspec_DamonaInSpaceLowTemperateMidlands_00 = A faint limb glow appears and vanishes during the pass, likely dust or sputtered atoms briefly excited. It’s the closest thing Damona has to weather.
        #GEPscience_bd_UVspec_DamonaInSpaceLowHighlands_00 = Highland surfaces reflect a slightly brighter UV curve, suggesting different material or less space-darkening. Mission Control asks what it means; you answer with a very long file name.
        #GEPscience_bd_UVspec_DamonaInSpaceLowImpactBasin_00 = The big basin reads as a UV signature change with a rough, noisy edge—excavated stuff, fractured walls, and shadowing all at once. The scar tells its story without using words.
