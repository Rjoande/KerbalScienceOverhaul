        #GEPscience_bd_orbitalScope_CaireenInSpaceLowLowlands_00 = The lowlands are smoother than expected, broken by scattered blocks that look newly delivered. You run the mosaic twice, just to be sure the “new” isn’t your compression artifacts.
        #GEPscience_bd_orbitalScope_CaireenInSpaceLowMidlands_00 = Midlands imaging produces a lumpy, uneven quilt of rock that the stitcher hates and the scientists love. Someone suggests it was captured; the terrain answers, “still adjusting.”
