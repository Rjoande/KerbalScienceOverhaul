        #JNSQscience_bd_hydrometer_EveSrfLandedKrakensWell_00 = L'umidità pulsa in lente onde, come se il terreno respirasse. Il Controllo Missione suggerisce di non dare un nome al motivo.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedAdministration_00 = L'idrometro segna 80% sudore di contabili, 20% vapore di caffè. Ti consegnano un modulo per certificare il modulo.
