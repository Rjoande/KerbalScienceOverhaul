        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DSmallLab_00 = L'umidità è fuori scala per una stanza così piccola. Ti informano che le scale sono classificate e forse anche in fiamme.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DTanks_00 = L'aria sa di metallo, mistero e rimpianto. L'idrometro chiede con educazione di non inalare di nuovo il campione.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedR&DWindTunnel_00 = La galleria asciuga il sensore all'istante, poi un test di sicurezza con acqua lo inzuppa di nuovo. La conclusione ufficiale è "varia".
        #JNSQscience_bd_hydrometer_KerbinSrfLandedRunway_00 = Il getto dei motori trasforma il grafico dell'umidità in arte moderna. La squadra di terra lo chiama "normale" e prende a calci una pozzanghera per sottolinearlo.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedSPH_00 = L'aria dell'hangar è umida di fatica e compromessi di progetto non detti. Dicono all'idrometro di smettere di giudicare i prototipi.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHMainBuilding_00 = L'umidità sale vicino ai grandi portoni mentre l'aria di mare si intrufola. La sicurezza ti chiede di presentare retroattivamente un permesso di apertura porta.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHRoundTank_00 = Le letture vicino al serbatoio tondo sono molto umide e molto "per favore non aprire". Decidi di fidarti dell'etichetta di avvertimento.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHTanks_00 = I pattern di condensa suggeriscono che i serbatoi stiano piangendo in silenzio. Un ingegnere lo nega e asciuga il sensore con una chiave inglese.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedSPHWaterTower_00 = L'idrometro segnala "sì, qui vicino c'è acqua". Questo viene archiviato come grande scoperta e piccolo rischio di spruzzi.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationDishEast_00 = L'umidità sembra normale finché non ti metti sotto l'antenna. Poi diventa "sospettosamente monitorata". Tu fai ciao lo stesso.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationDishNorth_00 = La squadra dell'antenna sospetta che il tuo idrometro stia origliando. Li rassicuri: ascolta solo l'umidità.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationDishSouth_00 = Mentre registri l'umidità, qualcuno con gli occhiali da sole registra te. Entrambi i dataset vengono subito censurati.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedTrackingStationHub_00 = Dentro l'hub, l'aria è secca, fredda e piena di silenzio importante. L'idrometro fa un bip, piano, e si ferma.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedVAB_00 = L'umidità aumenta con l'altitudine dentro questo edificio enorme, come se i razzi stessero sudando. Gli ingegneri insistono che sia "carattere".
        #JNSQscience_bd_hydrometer_KerbinSrfLandedVABMainBuilding_00 = L'umidità tocca il picco vicino a vernice fresca e panico fresco. L'addetto alla sicurezza timbra il tuo rapporto "NON APPROVATO" in triplice copia.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedVABPodMemorial_00 = L'aria è immobile e rispettosamente umida. L'idrometro abbassa il tono e registra un momento di silenzio, come da protocollo.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedVABRoundTank_00 = L'umidità è bassa, ma il sospetto è alto. Una guardia chiede perché il tuo sensore continui a puntare il serbatoio.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedVABSouthComplex_00 = I saldatori aggiungono vapore all'aria, una scintilla entusiasta alla volta. I tuoi dati finiscono nella cartella "cose che appannano gli occhiali".
        #JNSQscience_bd_hydrometer_KerbinSrfLandedVABTanks_00 = I serbatoi sembrano espirare aria calda e umida tra un test e l'altro. Lo annoti e ti dicono di smettere di antropomorfizzare l'hardware.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedKSC_00 = Una scansione ampia conferma un risultato scioccante: Kerbin ha aria e contiene umidità. Le Relazioni Pubbliche vogliono un poster.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedIslandAirfield_00 = La brezza marina umida fa scivolare ogni lettura verso il "salato". L'idrometro sviluppa subito un robusto accento costiero.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedBaikerbanur_00 = Aria secca, raffiche polverose e moduli con timbri extra. L'idrometro registra bassa umidità e alta pressione amministrativa.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedBaikerbanurLaunchpad_00 = Gli sfiati del refrigerante trasformano l'aria locale in nebbia istantanea e regole istantanee. Vieni scortato nella zona umidità approvata.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedWoomerang_00 = I venti frustano l'umidità in giro come se stesse cercando di schivare la burocrazia. L'idrometro gira, fa spallucce e registra "bersaglio mobile".
        #JNSQscience_bd_hydrometer_KerbinSrfSplashed_00 = L'idrometro va subito a fondo scala. L'involucro del sensore inizia ad appannarsi dall'esterno.
        #JNSQscience_bd_hydrometer_KerbinSrfSplashed_01 = Le letture dello scanner rivelano che sei NELL'ACQUA!!!!!!!!!
        #JNSQscience_bd_hydrometer_KerbinSrfLandedMidlands_00 = I livelli di umidità sono piacevolmente alti. La visiera è d'accordo e inizia ad appannarsi.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedLowlands_00 = Aria calda e pesante spinge la lancetta verso l'alto. Tutto sembra un po' molliccio.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedAridLowlands_00 = L'aria è secca, ma lo strumento trova comunque una traccia ostinata di umidità nascosta nella polvere.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedAridMidlands_00 = L'umidità resta così bassa che perfino i tuoi snack sembrano ancora più croccanti.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedAridHighlands_00 = Il vento arido strappa l'umidità dall'aria più in fretta di quanto tu possa dire "calibra".
        #JNSQscience_bd_hydrometer_KerbinSrfLandedAridMountains_00 = Aria sottile e secca e roccia cotta dal sole lasciano il sensore a implorare un sorso.
        #JNSQscience_bd_hydrometer_KerbinSrfLandedWelcomeBackIsland_00 = Le letture schizzano mentre spruzzi di mare e aria calda dell'isola si accaniscono sul povero sensore tutti insieme.
        #JNSQscience_bd_hydrometer_DunaSrfLandedIceCaps_00 = L'idrometro finalmente ha un sussulto verso l'alto. L'aspirazione si copre subito di brina per protesta.
        #JNSQscience_bd_hydrometer_DunaSrfLandedRareCraters_00 = L'aria in ombra del cratere trattiene una lieve e ostinata traccia di vapore. È la cosa più vicina all'"umido" che tu abbia visto qui.
        #JNSQscience_bd_hydrometer_DunaSrfLandedVoronoiCraters_00 = Le letture variano secondo un motivo ripetuto che segue il terreno. Il pianeta sembra essere ordinato per secchezza.
        #JNSQscience_bd_hydrometer_DunaSrfLandedNotableCraters_00 = La sacca d'aria più profonda registra un'umidità leggermente più alta, come se il cratere la stesse accumulando.
        #JNSQscience_bd_hydrometer_DunaSrfLandedExoticCraters_00 = Il sensore segnala un minuscolo picco, poi zero, poi di nuovo un minuscolo picco. Sospetti che il terreno rubi l'umidità tra un campione e l'altro.
        #JNSQscience_bd_hydrometer_DunaSrfLandedTrenches_00 = Laggiù nella trincea, l'aria più pesante indugia un po' più a lungo. L'idrometro lo definisce "marginalmente meno disperato".
        #JNSQscience_bd_hydrometer_DunaSrfLandedNotablePlains_00 = Venti polverosi spazzano pulita l'imboccatura. Le letture di umidità restano ostinatamente vicine al "niente del tutto".
        #JNSQscience_bd_hydrometer_DunaSrfLandedNotableMountains_00 = La lancetta cala con l'altitudine finché non diventa praticamente un elemento decorativo. Almeno la vista è asciutta.
        #JNSQscience_bd_hydrometer_DunaSrfLandedMountains_00 = L'idrometro prova a misurare l'umidità, poi sembra rinunciare e segnala "croccante".
        #JNSQscience_bd_hydrometer_DunaSrfLandedVolcano_00 = Gli sfiati caldi sbuffano una breve foschia misurabile. Lo strumento festeggia, poi si becca polvere in faccia.
        #JNSQscience_bd_hydrometer_LaytheSrfSplashed_00 = L'idrometro va subito in saturazione. La condensa si forma così in fretta che la lettura sembra sfocata.
        #JNSQscience_bd_hydrometer_LaytheSrfLandedShallows_00 = I livelli di umidità restano alti anche con gli stivali "tecnicamente" a terra. Il sensore continua a prendere spruzzi di mare nell'aspirazione.
        #JNSQscience_bd_hydrometer_LaytheSrfLandedHighlands_00 = L'aria più fresca abbassa un po' l'umidità, ma da quassù si sente ancora sentore di oceano.
        #JNSQscience_bd_hydrometer_LaytheSrfLandedMountains_00 = La lancetta cala con l'altitudine finché arriva la nebbia e gela sul bordo dell'aspirazione.
        #JNSQscience_bd_hydrometer_LaytheSrfLandedIceCaps_00 = L'aria fredda trattiene poco vapore... finché arriva una raffica e fa schizzare la lettura prima che tutto si ghiacci di nuovo.
        #JNSQscience_bd_hydrometer_LaytheSrfLandedEnclosedFaults_00 = Aria umida e intrappolata ristagna nelle fessure. L'idrometro segnala "habitat di nebbia persistente".
        #JNSQscience_bd_hydrometer_LaytheSrfLandedLowlands_00 = L'aria calda delle pianure spinge la lettura verso l'alto finché lo strumento chiede con educazione un asciugamano.
        #JNSQscience_bd_hydrometer_LaytheSrfLandedMidlands_00 = L'umidità resta su un livello medio e stabile. Condizioni perfette per far crescere... qualcosa... sull'attrezzatura.
        #JNSQscience_bd_hydrometer_TyloFlyingLow_00 = L'idrometro legge per lo più "niente", ma ogni tanto cattura deboli condensabili nella foschia sottile vicino alla superficie.
        #JNSQscience_bd_hydrometer_TyloFlyingHigh_00 = Ogni traccia svanisce con l'altitudine. Lo strumento restituisce uno zero netto e smette di impegnarsi così tanto.
        #JNSQscience_bd_hydrometer_TyloSrfLandedPoles_00 = Brevi picchi compaiono quando la brina sublima alla luce del sole. Il sensore lo chiama "meteo", con riluttanza.
        #JNSQscience_bd_hydrometer_TyloSrfLandedMountains_00 = Aria sottile e fredda e roccia nuda lasciano la lettura inchiodata vicino allo zero. Anche lo strumento sembra assetato.
        #JNSQscience_bd_hydrometer_TyloSrfLandedHighlands_00 = L'idrometro rileva quasi nulla nell'aria. Qualunque umidità qui è già un solido e ne va molto fiera.
        #JNSQscience_bd_hydrometer_TyloSrfLandedMidlands_00 = Le letture oscillano quando raffiche polverose colpiscono l'imboccatura. È difficile dire se Tylo sia secca o stia solo tirando polvere al sensore.
        #JNSQscience_bd_hydrometer_TyloSrfLandedLowlands_00 = Vicino al suolo, una traccia minuscola compare e scompare con gli sbalzi di temperatura, come se la superficie espirasse brina.
        #JNSQscience_bd_hydrometer_LindorFlyingHigh_00 = La foschia alta è sorprendentemente "secca". Il sensore registra comunque tracce di condensabili che passano tra le bande.
        #JNSQscience_bd_hydrometer_LindorFlyingLow_00 = Pressione e freddo sovraccaricano l'aspirazione: l'idrometro segnala una densa zuppa di condensabili e si rifiuta di indovinare se sia acqua o cioccolato.
        #JNSQscience_bd_hydrometer_HuygenFlyingHigh_00 = L'umidità cala bruscamente con l'altitudine, lasciando solo una sottile foschia ambrata e un'ostinata traccia di metano.
        #JNSQscience_bd_hydrometer_HuygenFlyingLow_00 = La lettura sale in fretta nell'aria densa. Qualunque cosa sia "umida" qui non è certo quella che fa arrugginire.
        #JNSQscience_bd_hydrometer_HuygenSrfSplashed_00 = L'idrometro va in saturazione all'istante. Conferma gentilmente che sei, in effetti, dentro un liquido.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedLowlands_00 = L'aria bassa e pesante mantiene il sensore costantemente alto. La foschia sembra abbastanza vicina da poterla masticare.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedMidlands_00 = L'umidità resta su un valore medio stabile, come se Huygen stesse razionando con cura il suo meteo.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedHighlands_00 = Aria più fresca e sottile abbassa la lettura, ma il metano indugia ancora ostinatamente vicino al suolo.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedMountains_00 = Vince l'altitudine: la lancetta scende, poi sfarfalla ogni volta che una raffica fredda scarica nuova condensa.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedPeaks_00 = Il sensore segna basso... finché un velo di foschia di passaggio lo fa schizzare per un attimo, come una nube che sfiora il casco.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedPolarLowlands_00 = L'aria è fredda e densa: l'idrometro rileva una lieve "umidità" da una lenta e costante sublimazione.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedPoles_00 = La lettura quasi non si muove finché la luce del sole colpisce la brina vicina, poi la lancetta salta in un breve sbuffo gelido.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedPolarHighlands_00 = L'aria polare sottile tiene bassi i numeri, ma lo strumento rileva comunque un occasionale filo ricco di metano.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedShores_00 = La foschia costiera spinge la misura più in alto. Il sensore si ritrova quasi subito pellicole appiccicose sull'imboccatura.
        #JNSQscience_bd_hydrometer_HuygenSrfLandedMethaneLakes_00 = L'idrometro va a fondo scala e ci resta. Non è sicuro di stare misurando "umidità" ormai, quanto "essere vicino a un lago".
        #JNSQscience_bd_hydrometer_RigaFlyingHigh_00 = L'idrometro non segnala praticamente niente. L'aria alta di Riga è più un'idea che un'atmosfera.
        #JNSQscience_bd_hydrometer_RigaFlyingLow_00 = Vicino alla superficie, la lancetta ha un sussulto appena sopra lo zero, come se fosse imbarazzata ad ammettere di aver trovato qualcosa.
        #JNSQscience_bd_hydrometer_RigaSrfLandedLowlands_00 = La lettura resta a terra con occasionali minuscole gobbe, probabilmente da brevi sublimazioni sul terreno illuminato dal sole.
        #JNSQscience_bd_hydrometer_RigaSrfLandedMidlands_00 = Secco, freddo e sottile: lo strumento registra una linea piatta e un sacco di rumore elettrico.
        #JNSQscience_bd_hydrometer_RigaSrfLandedHighlands_00 = Il terreno elevato spazza via le ultime tracce: l'idrometro dichiara l'aria "funzionalmente vuota".
        #JNSQscience_bd_hydrometer_RigaSrfLandedMountains_00 = Il sensore resta inchiodato a zero, ma l'aspirazione si copre comunque di brina: a quanto pare i solidi non hanno bisogno di permesso.
        #JNSQscience_bd_hydrometer_RigaSrfLandedPoles_00 = Un debole sbuffo ripetibile compare a ogni cambio di illuminazione. Riga sta respirando, solo molto piano.
        #JNSQscience_bd_hydrometer_EelooFlyingLow_00 = L'idrometro registra una traccia debole e capricciosa, per lo più da qualunque cosa tu abbia appena sollevato nell'aria.
        #JNSQscience_bd_hydrometer_EelooFlyingHigh_00 = La lettura resta inchiodata su "quasi niente". Lo strumento sembra offeso che tu l'abbia anche solo chiesto.
        #JNSQscience_bd_hydrometer_EelooSrfLanded_00 = Qualunque "umidità" qui sta facendo un ottimo lavoro nel restare solida.
        #JNSQscience_bd_hydrometer_EelooSrfLandedPoles_00 = Il sensore segnala valori così bassi da sembrare un giudizio personale.
        #JNSQscience_bd_hydrometer_EelooSrfLandedHighlands_00 = Aria sottile, ghiaccio duro e una lancetta che si rifiuta di salire.
        #JNSQscience_bd_hydrometer_EelooSrfLandedMidlands_00 = Un breve blip compare quando la luce del sole scalda la brina, poi svanisce di nuovo.
        #JNSQscience_bd_hydrometer_EelooSrfLandedLowlands_00 = La lettura sale leggermente nell'aria riparata, come se le pianure stessero accumulando le ultime poche molecole.
        #JNSQscience_bd_hydrometer_EelooSrfLandedCanyon_00 = Sollevi una foschia pallida e ghiacciata e l'idrometro finalmente sembra indaffarato per un momento.
        #JNSQscience_bd_hydrometer_NaraFlyingLow_00 = Il sensore va in saturazione sui "condensabili" e poi sembra non essere più sicuro di cosa significhi la parola "umidità".
        #JNSQscience_bd_hydrometer_NaraFlyingHigh_00 = Quassù la lettura crolla rapidamente: la foschia si assottiglia, ma non scompare mai del tutto.
        #JNSQscience_bd_hydrometer_NaraSrfLanded_00 = Lo strumento insiste che l'aria sia piena di qualcosa che vuole condensare. Non specifica cosa.
        #JNSQscience_bd_hydrometer_NaraSrfLandedLowlands_00 = L'aria densa delle pianure tiene la lancetta alta e stabile, come se l'atmosfera ristagnasse sul terreno.
        #JNSQscience_bd_hydrometer_NaraSrfLandedMidlands_00 = Le letture restano su una banda stabile, come se Nara stesse dosando con cura il suo meteo.
        #JNSQscience_bd_hydrometer_NaraSrfLandedHighlands_00 = Aria più fresca e sottile abbassa i numeri, ma il sensore cattura ancora tracce nebulose alla deriva.
        #JNSQscience_bd_hydrometer_NaraSrfLandedMountains_00 = L'idrometro sfarfalla a ogni raffica, poi si assesta su un ostinato "ancora non secco".
        #JNSQscience_bd_hydrometer_NaraSrfLandedPolarLowlands_00 = Aria fredda e pesante produce picchi periodici mentre la brina "respira" dalla superficie.
        #JNSQscience_bd_hydrometer_NaraSrfLandedPoles_00 = La condensa avviene così facilmente che l'aspirazione si copre di una sottile crosta. Lo strumento la chiama "raccolta campioni".
        #JNSQscience_bd_hydrometer_NaraSrfLandedPolarHighlands_00 = L'aria polare sottile mantiene bassa la lettura, finché un velo di foschia passa e la riporta subito su.

        // bd_ionElec
        #JNSQscience_bd_ionElec_EdnaInSpaceLow_00 = Il sensore trova una sottile foschia di polvere carica che aderisce al lato illuminato di Edna come elettricità statica su un maglione.
        #JNSQscience_bd_ionElec_EdnaInSpaceLow_01 = Gran parte della ionizzazione "atmosferica" sembra provenire dalla tua stessa astronave. Il Controllo Missione suggerisce di smetterla di strisciare i piedi.
        #JNSQscience_bd_ionElec_EdnaInSpaceHigh_00 = Solo un debole rivolo di ioni passa oltre lo strumento: Edna non sta facendo molto, a parte farsi sabbiare in silenzio dal vento solare.
        #JNSQscience_bd_ionElec_EdnaInSpaceHigh_01 = L'accumulo di carica è lento, costante e leggermente inquietante, come se Edna stesse aspettando pazientemente la prossima scintilla che non arriva mai.
        #JNSQscience_bd_ionElec_DakInSpaceLow_00 = La forma bitorzoluta di Dak crea sacche di carica che schizzano e crollano mentre passi sopra, come se la patata avesse opinioni molto forti sugli elettroni.
        #JNSQscience_bd_ionElec_DakInSpaceLow_01 = Vicino al terminatore compare un brusco scoppio di staticità. La polvere al sole e la polvere in ombra, a quanto pare, non si parlano.
        #JNSQscience_bd_ionElec_DakInSpaceHigh_00 = Quassù sono per lo più normali letture di vento solare, con Dak che a malapena si registra come qualcosa di più di un dosso per gli ioni.
        #JNSQscience_bd_ionElec_DakInSpaceHigh_01 = Blip periodici seguono la rotazione di Dak: minuscole e ostinate scariche da una roccia che si rifiuta di essere elettricamente noiosa.
        #JNSQscience_bd_ionElec_LindorFlyingHigh_00 = La foschia alta crepita di separazione di carica: la tua antenna inizia a comportarsi come un rilevatore di fulmini.
        #JNSQscience_bd_ionElec_LindorFlyingHigh_01 = Strati ionizzati vanno e vengono a bande, come se l'atmosfera avesse il suo schema di cablaggio a righe.
        #JNSQscience_bd_ionElec_LindorInSpaceLow_00 = Lo strumento si illumina di particelle intrappolate: il campo di Lindor sta riempiendo gli scaffali di ioni.
        #JNSQscience_bd_ionElec_LindorInSpaceLow_01 = Picchi netti si allineano con le tende luminose sotto: laggiù qualcuno sta alimentando una lampada ad arco davvero enorme.
        #JNSQscience_bd_ionElec_LindorInSpaceHigh_00 = Un ampio alone di plasma irrequieto circonda Lindor, deviando il vento solare come un corso d'acqua attorno a un masso.
        #JNSQscience_bd_ionElec_LindorInSpaceHigh_01 = Anche quassù, le letture oscillano a ritmo con la rotazione del pianeta: il suo magnetismo non conosce la sottigliezza.
        #JNSQscience_bd_ionElec_KrelInSpaceLow_00 = Niente atmosfera, niente ionosfera, solo polvere ostinatamente carica che salta tra terreno al sole e terreno in ombra.
        #JNSQscience_bd_ionElec_KrelInSpaceLow_01 = Il sensore coglie brevi schiocchi elettrici mentre passi sopra, come se Krel ti scaricasse addosso la sua staticità in silenzio.
        #JNSQscience_bd_ionElec_KrelInSpaceHigh_00 = Per lo più vento solare di fondo, con qualche debole blip che potrebbe essere polvere o la tua astronave che si lamenta.
        #JNSQscience_bd_ionElec_KrelInSpaceHigh_01 = Krel contribuisce quasi per niente alla zuppa di particelle. È impressionantemente inutile nel modo più scientifico possibile.
        #JNSQscience_bd_ionElec_AdenInSpaceLow_00 = Il rivelatore segnala una sottile strisciata di carica vicino alla superficie: laggiù dei granelli di polvere si stanno sfregando tra loro.
        #JNSQscience_bd_ionElec_AdenInSpaceLow_01 = Ogni passaggio sul terminatore porta un piccolo "schiocco" nei dati, come se il calare della notte azionasse un interruttore planetario.
        #JNSQscience_bd_ionElec_AdenInSpaceHigh_00 = Le letture si assestano su una tranquilla linea di base: Aden è troppo piccolo per trattenere granché, perfino gli elettroni.
        #JNSQscience_bd_ionElec_AdenInSpaceHigh_01 = I conteggi di particelle variano con i tuoi cambi d'assetto. Il Controllo Missione suggerisce di smetterla di "testare" il sensore girandoti.
        #JNSQscience_bd_ionElec_HuygenFlyingHigh_00 = La foschia trattiene la carica come una coperta: tutto ciò che dispieghi vuole aderire, aggrovigliarsi e fare scintille.
        #JNSQscience_bd_ionElec_HuygenFlyingHigh_01 = La ionizzazione raggiunge il massimo in uno strato alto e freddo, un soffitto invisibile dove le particelle si accumulano e si rifiutano di comportarsi bene.
        #JNSQscience_bd_ionElec_HuygenInSpaceLow_00 = Una densa ionosfera avvolge la luna: i numeri saltano come se stessi sfiorando il bordo di una nebbia carica.
        #JNSQscience_bd_ionElec_HuygenInSpaceLow_01 = Il lato notturno mostra strane correnti stabili: qualcosa nell'alta atmosfera sta gestendo lo spettacolo in silenzio.
        #JNSQscience_bd_ionElec_HuygenInSpaceHigh_00 = Una debole coda di particelle cariche si trascina dietro, pettinata via lentamente dal vento solare.
        #JNSQscience_bd_ionElec_HuygenInSpaceHigh_01 = I dati suggeriscono una chimica complessa in quota: meno ioni del previsto, ma molta più varietà.
        #JNSQscience_bd_ionElec_RigaFlyingHigh_00 = L'"atmosfera" quasi non esiste: il sensore registra soprattutto staticità di polvere e delusione.
        #JNSQscience_bd_ionElec_RigaFlyingHigh_01 = Un sottile velo di azoto produce uno strato ionico debole e disomogeneo che svanisce non appena cambiano le condizioni.
        #JNSQscience_bd_ionElec_RigaInSpaceLow_00 = Le particelle cariche vengono spazzate via rapidamente nello spazio, lasciando solo un bagliore fragile attorno al bordo.
        #JNSQscience_bd_ionElec_RigaInSpaceLow_01 = Passare sul lato illuminato produce minuscoli picchi: ioni dell'esosfera che vengono strappati e portati via.
        #JNSQscience_bd_ionElec_RigaInSpaceHigh_00 = A questa distanza Riga è quasi invisibile allo strumento: stai misurando più lo spazio che la luna.
        #JNSQscience_bd_ionElec_RigaInSpaceHigh_01 = Compaiono blip occasionali, ma non correlano con Riga: probabilmente è solo meteo di particelle locale.
        #JNSQscience_bd_ionElec_TalosInSpaceLow_00 = Senza aria da ionizzare, Talos si arrangia con regolite carica e bruschi potenziali di superficie.
        #JNSQscience_bd_ionElec_TalosInSpaceLow_01 = Lo strumento trova "punti caldi" locali di staticità: terreno colorato, personalità elettrica colorata.
        #JNSQscience_bd_ionElec_TalosInSpaceHigh_00 = I conteggi di particelle di fondo restano stabili: Talos si rifiuta di aggiungere altro, a parte un bersaglio su cui orbitare.
        #JNSQscience_bd_ionElec_TalosInSpaceHigh_01 = L'unico segnale chiaro è quello della tua stessa nave. Talos resta elettricamente poco impressionato.
        #JNSQscience_bd_ionElec_CelesInSpaceLow_00 = La luce del sole carica rapidamente la pallida superficie di Celes: il rilevatore osserva gli elettroni "bollire" via e andare alla deriva.
        #JNSQscience_bd_ionElec_CelesInSpaceLow_01 = Entrando in ombra, le letture si ribaltano e si assestano. Celes sembra "raffreddarsi" elettricamente tanto in fretta quanto si scalda.
        #JNSQscience_bd_ionElec_CelesInSpaceHigh_00 = Quassù è per lo più vento solare tranquillo, con una lieve oscillazione che suggerisce la minuscola scia di plasma di Celes.
        #JNSQscience_bd_ionElec_CelesInSpaceHigh_01 = Lo strumento conferma che Celes non ha una vera presa sugli ioni: solo una breve e cortese perturbazione del flusso di particelle.
        #JNSQscience_bd_ionElec_TamInSpaceLow_00 = Il sensore coglie picchi netti di staticità mentre sfiori la superficie roteante di Tam: i granelli di polvere fanno i loro minuscoli fulmini.
        #JNSQscience_bd_ionElec_TamInSpaceLow_01 = Sacche di carica locali compaiono e scompaiono con il terreno. Tam è elettricamente caotica nel modo più inutile possibile.
        #JNSQscience_bd_ionElec_TamInSpaceHigh_00 = I conteggi di particelle si appiattiscono finché Tam non ruota nel modo giusto, poi arriva un breve blip, come una scrollata di spalle di una roccia.
        #JNSQscience_bd_ionElec_TamInSpaceHigh_01 = Rilevi più "meteo spaziale" che "meteo di Tam", ma la luna riesce comunque ad aggiungere un po' di rumore al vuoto.
        #JNSQscience_bd_ionElec_HamekInSpaceLow_00 = Il rilevatore va a fondo scala per un ostinato accumulo di carica in superficie: la polvere di Hamek, dai colori strani, sembra ansiosa di rubare elettroni e tenerseli.
        #JNSQscience_bd_ionElec_HamekInSpaceLow_01 = Vicino al terminatore, le letture crepitano come una cattiva radio. Il terreno in ombra e quello al sole non sono d'accordo sulla tensione.
        #JNSQscience_bd_ionElec_HamekInSpaceHigh_00 = Una debole coda diffusa di ioni si trascina dietro Hamek, pettinata lentamente nello spazio interplanetario.
        #JNSQscience_bd_ionElec_HamekInSpaceHigh_01 = Il plasma di fondo sembra normale, finché picchi periodici suggeriscono granelli carichi che sfuggono dalla superficie di Hamek a piccoli spruzzi.
        #JNSQscience_bd_ionElec_NaraFlyingHigh_00 = La foschia alta trasporta carica in lenti e pesanti strati: le tue antenne iniziano a comportarsi come riluttanti parafulmini.
        #JNSQscience_bd_ionElec_NaraFlyingHigh_01 = La ionizzazione è debole ma persistente, come se l'atmosfera stesse ronzando piano tra sé e sé nel buio.
        #JNSQscience_bd_ionElec_NaraInSpaceLow_00 = Una vasta ionosfera avvolge Nara: anche la debole luce solare e i raggi cosmici non possono fare a meno di farla brillare elettricamente.
        #JNSQscience_bd_ionElec_NaraInSpaceLow_01 = Le letture aumentano sopra i poli: il campo di Nara sembra accumulare particelle cariche dove può.
        #JNSQscience_bd_ionElec_NaraInSpaceHigh_00 = Il vento solare quassù è sottile, ma Nara ci scava comunque una scia netta, come una nave che spinge nella nebbia.
        #JNSQscience_bd_ionElec_NaraInSpaceHigh_01 = Lunghe e lente oscillazioni nei dati suggeriscono una magnetosfera che si rifiuta di stare ferma.
        #JNSQscience_bd_ionElec_AmosInSpaceLow_00 = Senza aria da ionizzare, lo strumento si accontenta di polvere statica e carica di superficie mentre Amos rotola sotto di te.
        #JNSQscience_bd_ionElec_AmosInSpaceLow_01 = Brevi picchi si allineano con l'alba: a quanto pare la "mattina" è quando la regolite ricomincia a rubare elettroni.
        #JNSQscience_bd_ionElec_AmosInSpaceHigh_00 = Per lo più particelle di fondo, con blip occasionali che sembrano più l'influenza di Nara che quella di Amos.
        #JNSQscience_bd_ionElec_AmosInSpaceHigh_01 = Il sensore segnala una debole scia di plasma dietro Amos: quanto basta per dimostrare che esiste nel flusso.
        #JNSQscience_bd_ionElec_EnonInSpaceLow_00 = Il rilevatore coglie sacche di carica disomogenee vicino alla superficie, come se la polvere di Enon stesse giocando a non farsi prendere dagli elettroni.
        #JNSQscience_bd_ionElec_EnonInSpaceLow_01 = Entrando in ombra, le letture invertono polarità e si calmano. A quanto pare la notte è la "modalità statica sicura".
        #JNSQscience_bd_ionElec_EnonInSpaceHigh_00 = I conteggi di particelle si appiattiscono finché arriva un debole impulso, probabilmente una raffica di passaggio dall'ambiente di Nara.
        #JNSQscience_bd_ionElec_EnonInSpaceHigh_01 = A questa quota Enon disturba a malapena il flusso: è un ostacolo molto piccolo in un niente molto grande.
        #JNSQscience_bd_ionElec_PraxInSpaceLow_00 = L'accumulo di carica in superficie è abbastanza forte da registrarsi dall'orbita: la polvere di Prax si comporta come se fosse stata progettata per attaccarsi a tutto.
        #JNSQscience_bd_ionElec_PraxInSpaceLow_01 = La regione del terminatore crepita nei dati: il terreno al sole e quello in ombra sono in feroce disaccordo sulla tensione.
        #JNSQscience_bd_ionElec_PraxInSpaceHigh_00 = Lo strumento registra il meteo di particelle più di Prax, ma Prax lascia comunque una scia sottile e rilevabile.
        #JNSQscience_bd_ionElec_PraxInSpaceHigh_01 = Picchi occasionali suggeriscono granelli carichi che sfuggono in piccoli spruzzi, poi vengono spazzati via senza cerimonie.

        // bd_IRradiometer
        #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthPolarZone_00 = La zona polare sembra "più fredda" solo secondo gli standard di Kerbol: il radiometro chiede comunque una pausa.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthSubpolarZone_00 = Qui compare un ripido gradiente termico, come se la stella indossasse una discreta cintura di calore.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthTemperateZone_00 = Temperata, dice. Lo strumento chiaramente non sa cosa significhi.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthTropicZone_00 = La fascia tropicale brilla di più nell'infrarosso: il Controllo Missione abbassa piano il guadagno... di nuovo.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowEquatorialZone_00 = La zona equatoriale prova a spingere l'ago oltre il fine corsa. Il registro dati sa debolmente di panico.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthTropicZone_00 = Un'altra fascia calda, leggermente spostata: il radiometro la mappa come "sì, ancora estremamente sì".
        #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthTemperateZone_00 = Una striscia dall'aria più calma, finché non ricordi che il "valore base" è praticamente a un passo da una superficie fusa.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthSubpolarZone_00 = La luminosità infrarossa cala di colpo verso il polo: il gradiente sembra quasi ordinato, per una volta.
        #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthPolarZone_00 = La zona polare meridionale segna meno del previsto, ma "meno" qui resta un numero terribile.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLow_00 = Le mappe termiche mostrano strette strisce calde che seguono scarpate nette durante la mattina locale. L'anomalia è piccola ma ripetibile, coerente con materiale competente esposto che trattiene il calore in modo diverso rispetto alla regolite circostante.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLow_01 = Alcune intersezioni di fratture mostrano temperature sul lato notturno leggermente più elevate rispetto alle pianure adiacenti. L'interpretazione più semplice è una maggiore inerzia termica dovuta a blocchi appena smossi o a sottili veli di superficie rimaneggiata di recente.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLow_02 = Diversi fondi di crateri dall'aspetto giovane si raffreddano più lentamente dei versanti vicini, producendo un chiaro segnale di ritardo diurno. Il disegno suggerisce uno strato più denso e meno "soffice", forse fuso da impatto o compattato di recente da scuotimenti intermittenti.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowPoles_00 = I poli risultano ostinatamente freddi, si nascondono da Kerbol come se gli dovessero dei soldi.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowLowlands_00 = I bassopiani brillano ferocemente nell'infrarosso: la curva sembra dire "superficie: sì, ancora calda".
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowPolarIceCraters_00 = I fondi dei crateri profondi quasi non irradiano affatto, freddi abbastanza da accaparrarsi qualunque vapore sia mai finito lì dentro.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowHighlands_00 = Le colline frastagliate si accendono di caldo e poi crollano nel freddo a ogni ombra: la mappa è tutta spigoli e sbalzi d'umore.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowMidlands_00 = Le pianure si assestano su una firma di calore brutale e uniforme. Niente meteo, niente pietà, solo fisica.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowCraters_00 = I bordi dei crateri bruciano luminosi mentre gli interni diventano scuri: è come leggere un manuale di topografia termica.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowExoticCraters_00 = Questi crateri hanno chiazze calde stranamente coerenti, come se il suolo "ricordasse" di essere stato fuso.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowRareCraters_00 = La traccia termica qui sembra rumorosa e bitorzoluta, o il materiale è insolito, oppure Moho fa semplicemente Moho.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowVoronoiCraters_00 = Compare una rete geometrica di creste tiepide e avvallamenti freddi: il radiometro disegna schemi che nessuno aveva richiesto.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowNotableCraters_00 = Quelli "notevoli" spiccano nell'infrarosso come segnali di pericolo: pareti ripide, ombra profonda, contrasti estremi.
        #JNSQscience_bd_IRradiometer_MohoInSpaceLowPeaks_00 = I picchi irradiano duro alla luce e spariscono nel freddo appena si voltano altrove, roccia sottile, raffreddamento rapido, grande dramma.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowPoles_00 = I poli risultano la cosa più vicina che Eve abbia a un "freddo", un alone tenue sotto una foschia spessa.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowLowlands_00 = I bassopiani irradiano come un blocco motore scaldato: i numeri continuano a sostenere che sia normale.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowMidlands_00 = Le pianure mostrano un calore ampio e costante con gradienti morbidi, come se l'aria stesse stirando il pianeta.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowHighlands_00 = Le colline risultano leggermente più fresche, ma solo nel senso in cui una fornace ha angoli "meno caldi".
        #JNSQscience_bd_IRradiometer_EveInSpaceLowPeaks_00 = I picchi impennano e calano mentre ruotano nella luce, linee nette sfumate da un'atmosfera pesante.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowExplodiumSea_00 = Il mare Explodium sembra termicamente "sbagliato": lucido, uniforme e più brillante di quanto abbia diritto di essere.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowMountains_00 = Le catene montuose incidono deboli cuciture fresche nel calore, come pieghe in una coperta viola.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowShores_00 = Le coste si disegnano nell'infrarosso: terra calda, mari più uniformi e una striscia sottile dove tutto litiga.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowPolarLakes_00 = I laghi polari restano ovali scuri in un campo pallido, e custodiscono in silenzio le proprie regole di temperatura.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowPetrolLakes_00 = I laghi di petrolio brillano con una firma oleosa ad alta emissività: lo strumento registra "non assaggiare".
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofAkron_00 = Il mare di Akron restituisce un calore lento e marezzato, che suggerisce correnti nascoste sotto la foschia.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofNessus_00 = Il mare di Nessus risulta stranamente uniforme, come se qualcuno avesse lisciato la mappa termica con un pollice.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofTaniwha_00 = Il mare di Taniwha mostra lunghe strisce calde allineate con venti che non puoi vedere, ma che puoi decisamente sentire.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofGigan_00 = Il mare di Gigan irradia in ampie chiazze luminose, come se la superficie sobbollisse in cerchi pigri.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofRodan_00 = Il mare di Rodan sfarfalla tra caldo e più caldo: il radiometro smette di fingere sorpresa.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofGojira_00 = Il mare di Gojira risulta caldo, denso e profondo, con un'inerzia termica testarda come una personalità.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofGhidorah_00 = Il mare di Ghidorah mostra tre bande calde distinte che rifiutano di mediare in modo decente.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofBagorah_00 = Il mare di Bagorah è una scia brillante con vortici freschi ai bordi, come calore che prova a scappare.
        #JNSQscience_bd_IRradiometer_EveInSpaceLowKrakensWell_00 = Il Pozzo del Kraken è un nodo serrato di temperature in contrasto, un'etichetta di avvertimento all'infrarosso senza testo.
        #JNSQscience_bd_IRradiometer_GillyInSpaceLowLowlands_00 = I bassopiani risultano una macchia calda e irregolare: sembra che tutta la luna si scaldi in modo disomogeneo.
        #JNSQscience_bd_IRradiometer_GillyInSpaceLowMidlands_00 = Le pianure si raffreddano in fretta appena scivolano nell'ombra, come se la roccia ci provasse a malapena.
        #JNSQscience_bd_IRradiometer_GillyInSpaceLowHighlands_00 = Dorsali taglienti e fredde spiccano contro pendii più caldi: Gilly sembra una piega termica.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowIceCaps_00 = Il radiometro vede i poli come buio gelido, con minuscole lentiggini calde dove il ghiaccio si spezza.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowHighlands_00 = Le colline mostrano un mosaico di giorni caldi e notti fredde, come se il pianeta respirasse.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowMountains_00 = Dorsali fredde tagliano colline più tiepide: i picchi sembrano aver dimenticato come si fa l'estate.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowShores_00 = Un sottile nastro luminoso segna dove la terra si arroventa e l'acqua si raffredda: la costa si disegna col calore.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowMidlands_00 = Le pianure brillano in modo uniforme, interrotte da linee calde sospettosamente dritte che potrebbero essere strade.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowLowlands_00 = I bassopiani irradiano dolcemente: lo strumento insiste di poter "sentire" l'umidità. Non può.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridLowlands_00 = I bassopiani aridi divampano nell'infrarosso: quasi senti la sabbia sfrigolare dall'orbita.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridMidlands_00 = Il terreno secco si raffredda in fretta dopo il tramonto: il radiometro adora questi sbalzi teatrali.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridHighlands_00 = Caldo a mezzogiorno, freddo di notte, la tua traccia di temperatura sembra una lama seghettata.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridMountains_00 = Le ombre scavano canyon freschi tra pendii cotti dal sole: il contrasto è affilato come un rasoio.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowGreatLake_00 = Il Grande Lago trattiene calore come un'enorme batteria termica, attenuando gli estremi della giornata.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowInlandWater_00 = Le acque interne mostrano bordi caldi e centri freschi, suggerendo correnti... o pura supposizione.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowKreenwichSea_00 = Un lento vortice d'acqua più calda suggerisce schemi di circolazione su cui gli scienziati litigheranno comunque.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowArcticSea_00 = Il mare Artico è una macchia fredda e tenue, con leggere cuciture calde dove il ghiaccio cede.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowForemansSea_00 = Il mare di Foreman ha una texture termica marezzata: il radiometro lo registra come "zuppa grumosa".
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowTriangulusSea_00 = Il mare del Triangolo disegna confini termici netti, come se qualcuno l'avesse tracciato con un righello.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowNorthernSea_00 = Il mare Settentrionale mostra punti caldi sparsi> tempeste, correnti, o calibrazione distratta.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowSub-ArcticSea_00 = Il calore filtra in bande strette, come se l'oceano indossasse calzini a righe.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowEasternSea_00 = Lunghe strisce calde si allineano con i venti: i dati sembrano muoversi.
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowWesternSea_00 = Un ampio bacino fresco con un bordo caldo lungo le basse acque. Una classica firma da "dépliant da spiaggia".
        #JNSQscience_bd_IRradiometer_KerbinInSpaceLowWelcomeBackIsland_00 = L'Isola del Ritorno è un minuscolo punto caldo in mezzo a tanta acqua fredda. Il radiometro ti dà educatamente il bentornato.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowPoles_00 = Il radiometro fissa ombre lunghe: i poli sembrano un freezer con una lampada solare a intermittenza.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowHighlands_00 = Le colline illuminate dal sole impennano sul caldo, poi crollano nel freddo appena il terreno si volta altrove.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowMidlands_00 = Le pianure danno un bagliore termico costante, finché un bordo di cratere non lampeggia come un fornello.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowLowlands_00 = I bacini bassi trattengono calore un po' più a lungo: la curva suggerisce polvere fine che fa da isolante.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowPolarIceCraters_00 = Alcuni fondi di cratere quasi non si registrano. Freddi abbastanza da tenere segreti, e forse ghiaccio.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowExoticCraters_00 = I crateri "esotici" condividono strane impronte termiche, come se il suolo fosse stato colato invece che martellato.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowRareCraters_00 = Questi crateri si raffreddano in modo irregolare: la lettura diventa una sparpagliata di isole di calore bitorzolute.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowVoronoiCraters_00 = Il campo di crateri disegna un favo di geometrie infrarosse, però freddo.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowNotableCraters_00 = I crateri notevoli lanciano bordi caldo/freddo taglienti: la mappa sembra rifinita a coltello.
        #JNSQscience_bd_IRradiometer_MunInSpaceLowMountains_00 = Le montagne risultano spine fredde con pendii più caldi: l'altitudine è solo un altro modo per perdere calore.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowPoles_00 = I poli restano ostinatamente freddi: nemmeno il bagliore verde di Minmus può fingere il contrario.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowLowlands_00 = I bassopiani si scaldano e si raffreddano puntuali, come se volessero impressionare il radiometro.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowMidlands_00 = Le pianure mostrano calore a chiazze che suggerisce un terreno più ruvido di quanto l'occhio riesca a vedere.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowHighlands_00 = Le colline risultano più fresche e dai bordi più netti: le dorsali gettano ombre termiche come inchiostro.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBasins_00 = I bacini brillano in modo uniforme, come lisce distese mentolate pronte per prove di atterraggio.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownBasins_00 = I bacini marroni assorbono calore: lo strumento li registra come "inaspettatamente calducci".
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownLowlands_00 = I bassopiani più scuri trattengono il calore più a lungo, prova che la verniciatura conta, anche sulle lune.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownMidlands_00 = Le pianure marroni si raffreddano lentamente, e suggeriscono una crosta più densa o semplicemente una migliore abbronzatura.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownHighlands_00 = Le colline marroni alternano caldo e freddo a bande: la mappa sembra un codice a barre.
        #JNSQscience_bd_IRradiometer_MinmusInSpaceLowMountains_00 = Le montagne segnano picchi di freddo con fianchi più caldi: l'altitudine ruba calore e anche coraggio.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowIceCaps_00 = Le calotte di ghiaccio brillano di freddo e ostinazione, e si rifiutano di stare al gioco con la tinta calda del resto di Duna.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowHighlands_00 = Le colline mostrano passaggi netti dal caldo al freddo: con così poca aria, le ombre mordono forte.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowMidlands_00 = Un bagliore infrarosso ampio e costante suggerisce pianure polverose che assorbono la luce del giorno e la restituiscono con riluttanza.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowLowlands_00 = I bacini bassi trattengono calore un po' più a lungo: il radiometro disegna una dolce curva di "ristagno termico".
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowCraters_00 = I bordi bruciano luminosi al sole mentre i fondi dei crateri crollano nel freddo: il contrasto è quasi maleducato.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowRareCraters_00 = I crateri "rari" si raffreddano a chiazze bitorzolute, e suggeriscono materiali misti rimescolati dagli impatti.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowVoronoiCraters_00 = Compare una rete ordinata di creste tiepide e avvallamenti freddi: la geometria non è mai sembrata così gelida.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowNotableCraters_00 = I crateri notevoli lanciano bordi termici taglienti, come se fossero stati disegnati con una squadra e cattiveria.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowExoticCraters_00 = Questi crateri hanno strani punti caldi che persistono: il suolo si comporta come se ricordasse di essere stato fuso.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowTrenches_00 = Le trincee si nascondono in ombra fredda, con sottili labbra calde lungo i bordi: tagli profondi, gelo profondo.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowNotablePlains_00 = Le pianure risultano lisce e uniformi, come un grande dissipatore polveroso lasciato sotto Kerbol.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowNotableMountains_00 = Le montagne mostrano strisce calde alternate a cuciture fredde: pendii e ombre dicono tutto.
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowMountains_00 = I picchi si raffreddano in fretta, i pendii restano più caldi: il profilo sembra una lezione di "niente atmosfera, niente pietà".
        #JNSQscience_bd_IRradiometer_DunaInSpaceLowVolcano_00 = La regione del vulcano risulta sospettosamente calda per un pianeta freddo: il radiometro ricontrolla comunque.
        #JNSQscience_bd_IRradiometer_IkeInSpaceLowPoles_00 = I poli di Ike sembrano calotte scure e fredde, e solo sottili bordi al sole provano a darsi un tono.
        #JNSQscience_bd_IRradiometer_IkeInSpaceLowMountains_00 = Spine fredde e fianchi più caldi tracciano le catene montuose: le ombre fanno gran parte del lavoro.
        #JNSQscience_bd_IRradiometer_IkeInSpaceLowMidlands_00 = Le pianure danno una firma infrarossa piatta e pallida, irrilevante finché non noti quanto in fretta si capovolge al crepuscolo.
        #JNSQscience_bd_IRradiometer_IkeInSpaceLowLowlands_00 = Le zone basse trattengono calore un soffio più a lungo, come se la polvere fosse una coperta sottile sulla roccia.
        #JNSQscience_bd_IRradiometer_IkeInSpaceLowHighlands_00 = Le colline risultano più fredde e più dure: Ike sembra molto Mun all'infrarosso, e questo non è rassicurante.
        #JNSQscience_bd_IRradiometer_EdnaInSpaceHigh_00 = Da un'orbita alta, Edna è una brace tenue e costante: la mappa termica sembra calma finché il lungo lato notturno non svanisce.
        #JNSQscience_bd_IRradiometer_EdnaInSpaceLowLowlands_00 = I bassopiani trattengono calore un po' più a lungo, e suggeriscono brina fine e polvere che fanno da coperta isolante.
        #JNSQscience_bd_IRradiometer_EdnaInSpaceLowMidlands_00 = Le pianure mostrano un bagliore infrarosso basso e uniforme: freddo, quieto e ostinatamente coerente.
        #JNSQscience_bd_IRradiometer_EdnaInSpaceLowHighlands_00 = Le colline passano bruscamente dal tepore al sole al freddo in ombra: il contrasto disegna ogni dorsale col calore.
        #JNSQscience_bd_IRradiometer_EdnaInSpaceLowPolarIceCraters_00 = I fondi dei crateri polari quasi non si registrano: il radiometro li segna come "trappole fredde" e smette di fingere sorpresa.
        #JNSQscience_bd_IRradiometer_EdnaInSpaceLowWhites_00 = I luminosi "Whites" risultano stranamente freddi nell'infrarosso, come se riflettessero bene la luce ma rifiutassero di trattenere anche solo un po' di calore.
        #JNSQscience_bd_IRradiometer_DakInSpaceHigh_00 = Dak occupa a malapena un pixel, ma il radiometro coglie comunque un rapido tremolio caldo freddo mentre ruota come un sasso lanciato.
        #JNSQscience_bd_IRradiometer_DakInSpaceLowLowlands_00 = I bassopiani si scaldano in fretta e si raffreddano ancora più in fretta: la curva sembra pietra nuda senza pazienza per il calore.
        #JNSQscience_bd_IRradiometer_DakInSpaceLowMidlands_00 = Le pianure restituiscono una firma termica bitorzoluta, e suggeriscono macerie miste e una texture di superficie a chiazze.
        #JNSQscience_bd_IRradiometer_DakInSpaceLowHighlands_00 = Le colline al sole impennano luminose nell'infrarosso mentre le ombre vicine precipitano nel freddo: Dak si legge come un seghetto termico frastagliato.
        #JNSQscience_bd_IRradiometer_DresInSpaceHigh_00 = Da quassù, Dres è una piccola firma termica pallida con quasi nessun contrasto: solitaria, fredda e silenziosamente poco impressionata.
        #JNSQscience_bd_IRradiometer_DresInSpaceLow_00 = Il radiometro distingue deboli macchie termiche sulla superficie: perfino Dres riesce a sembrare stanco nell'infrarosso.
        #JNSQscience_bd_IRradiometer_DresInSpaceLowPoles_00 = I poli salgono a malapena sopra il "freddo": le chiazze in ombra sembrano conservare l'inverno da anni.
        #JNSQscience_bd_IRradiometer_DresInSpaceLowHighlands_00 = Le dorsali al sole impennano sul caldo, poi calano in fretta: polvere sottile su roccia ostinata porta a rapidi sbalzi d'umore.
        #JNSQscience_bd_IRradiometer_DresInSpaceLowMidlands_00 = Un bagliore ampio e uniforme suggerisce regolite fine che fa da spugna termica lenta e costante.
        #JNSQscience_bd_IRradiometer_DresInSpaceLowLowlands_00 = I bacini bassi trattengono calore un po' più a lungo, come se laggiù la polvere si fosse assestata in una coperta migliore.
        #JNSQscience_bd_IRradiometer_DresInSpaceLowCanyon_00 = Il canyon disegna bordi caldi affilati come rasoi e un fondo freddo: il radiometro quasi riesce a vedere le ombre.
        #JNSQscience_bd_IRradiometer_JoolInSpaceLowEquatorialBands_00 = La luminosità infrarossa sale e scende in ampie strisce: le fasce sembrano lenti nastri trasportatori roventi.
        #JNSQscience_bd_IRradiometer_JoolInSpaceLowExposedLowerDeck_00 = Qui, attraverso le nubi, si intravede uno strato più caldo, come se qualcuno avesse sollevato una coperta per un attimo.
        #JNSQscience_bd_IRradiometer_JoolInSpaceLowSubpolarBands_00 = Le fasce subpolari risultano più fredde e più sfumate, come se l'atmosfera si stesse mescolando fino a confondersi.
        #JNSQscience_bd_IRradiometer_JoolInSpaceLowNorthPole_00 = Il polo nord segna più freddo delle fasce circostanti, una tenue calotta di gelo vorticoso.
        #JNSQscience_bd_IRradiometer_JoolInSpaceLowSouthPole_00 = Il polo sud mostra un nucleo freddo con bordi più caldi, come un vortice fatto di temperatura.
        #JNSQscience_bd_IRradiometer_JoolInSpaceLowStormComplex_00 = Il complesso di tempeste brucia luminoso nell'infrarosso: laggiù sotto, qualcosa sta lavorando parecchio.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowShores_00 = Un sottile nastro caldo contorna le coste: terra e mare discutono educatamente col calore.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowShallows_00 = Le secche mostrano calore marezzato e strisce fresche, e suggeriscono correnti in un oceano davvero molto impegnato.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowInlandWater_00 = Le acque interne trattengono calore più a lungo del terreno circostante, come piccoli serbatoi termici.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowKrenwichSea_00 = Il mare di Krenwich restituisce gradienti lunghi e uniformi: tanta acqua, tanta inerzia.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowArcticSea_00 = Il mare Artico è una macchia fredda, con deboli cuciture calde dove il ghiaccio si assottiglia e cede.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowJoolwardSea_00 = Il mare di Jool risulta appena più caldo: il radiometro dà la colpa ai venti e si rifiuta di elaborare.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowPolwardSea_00 = Il mare di Pol si raffredda in fretta verso il margine della luce: la mappa è netta e impietosa.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowHighlands_00 = Le colline passano dal caldo al freddo con linee d'ombra taglienti: aria sottile significa decisioni rapide.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowMountains_00 = Le spine montuose restano fredde mentre i pendii al sole divampano luminosi: il profilo sembra una dentatura.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowIceCaps_00 = Le calotte di ghiaccio restano ostinatamente scure nell'infrarosso, una firma fredda che ignora il giorno.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowEnclosedFaults_00 = La rete di faglie mostra strane tracce calde nelle fessure, come se il suolo stesse lasciando uscire il calore di ieri.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowLowlands_00 = I bassopiani irradiano in modo uniforme, quel genere di monotonia termica che i piloti apprezzano in segreto.
        #JNSQscience_bd_IRradiometer_LaytheInSpaceLowMidlands_00 = Le pianure mostrano un lieve mosaico di riscaldamento: il radiometro lo definisce "piacevolmente complicato".
        #JNSQscience_bd_IRradiometer_VallInSpaceLowPoles_00 = I poli di Vall sono freddo profondo con ombre dai bordi affilati come rasoi, come se la superficie cercasse di nascondersi dal sole.
        #JNSQscience_bd_IRradiometer_VallInSpaceLowHighlands_00 = Le colline risultano luminose e poi svaniscono nel freddo: ghiaccio e roccia si alternano nel fare dramma.
        #JNSQscience_bd_IRradiometer_VallInSpaceLowMidlands_00 = Le pianure trattengono un tenue bagliore costante, inerzia termica in un mondo che detesta il calore.
        #JNSQscience_bd_IRradiometer_VallInSpaceLowLowlands_00 = I bacini bassi restano appena più caldi, come se la brina fine facesse da isolante.
        #JNSQscience_bd_IRradiometer_VallInSpaceLowMountains_00 = Le montagne disegnano cuciture fredde e nette su pendii più caldi: le ombre fanno gran parte della scienza.
        #JNSQscience_bd_IRradiometer_TyloInSpaceLowPoles_00 = I poli restano come scure calotte fredde, e solo sottili bordi al sole osano farsi registrare.
        #JNSQscience_bd_IRradiometer_TyloInSpaceLowMountains_00 = Creste fredde e fianchi più caldi dipingono una pulita mappa in rilievo nell'infrarosso: niente atmosfera, nessuna sfumatura.
        #JNSQscience_bd_IRradiometer_TyloInSpaceLowHighlands_00 = Le colline si raffreddano rapidamente dopo il tramonto: la curva crolla come se qualcuno avesse staccato la spina.
        #JNSQscience_bd_IRradiometer_TyloInSpaceLowMidlands_00 = Le pianure restituiscono una firma termica costante, interrotta solo dai bordi dei crateri che lampeggiano caldi.
        #JNSQscience_bd_IRradiometer_TyloInSpaceLowLowlands_00 = I bassopiani trattengono calore un po' più a lungo: la polvere si comporta come una coperta sottile su roccia pesante.
        #JNSQscience_bd_IRradiometer_BopInSpaceLowPoles_00 = I poli sono un caos di pozzi freddi e gobbe tiepide: Bop si rifiuta di fare una media decente.
        #JNSQscience_bd_IRradiometer_BopInSpaceLowMountains_00 = I picchi al sole impennano sul caldo mentre le scogliere vicine diventano gelide: la mappa sembra una discussione termica.
        #JNSQscience_bd_IRradiometer_BopInSpaceLowLowlands_00 = Le zone basse irradiano in modo irregolare, come se la superficie fosse un misto di polveri e grumi.
        #JNSQscience_bd_IRradiometer_BopInSpaceLowMidlands_00 = Le pianure mostrano strani puntini caldi che cambiano con l'angolo di osservazione: lo strumento insiste che sia reale.
        #JNSQscience_bd_IRradiometer_BopInSpaceLowHighlands_00 = Le colline scivolano in ombra profonda in fretta: la ruvidità di Bop si scrive da sola nell'infrarosso.
        #JNSQscience_bd_IRradiometer_PolInSpaceLowPoles_00 = I poli di Pol risultano freddi ma rumorosi, come se il terreno non riuscisse a decidere dove devono finire le ombre.
        #JNSQscience_bd_IRradiometer_PolInSpaceLowLowlands_00 = I bassopiani brillano dolcemente a chiazze: sembra meno geologia e più una pastella mescolata male.
        #JNSQscience_bd_IRradiometer_PolInSpaceLowMidlands_00 = Le pianure mostrano gradienti ampi e bitorzoluti, inerzia termica che lotta con una topografia frastagliata.
        #JNSQscience_bd_IRradiometer_PolInSpaceLowHighlands_00 = Le colline lampeggiano calde e poi crollano nel freddo in un istante: angoli netti fanno temperature nette.
        #JNSQscience_bd_IRradiometer_PolInSpaceLowMountains_00 = Le montagne formano aghi luminosi e vuoti scuri: il radiometro lo registra come "spigoloso, ma in calore".
        #JNSQscience_bd_IRradiometer_LindorInSpaceHigh_00 = Da un'orbita alta, Lindor è un bagliore freddo con deboli perdite di calore ai poli, dove il campo magnetico rimescola l'alta atmosfera.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowTemperateBands_00 = Il radiometro traccia strisce leggermente "più calde": le fasce temperate di Lindor sono comunque un freezer, solo più movimentato.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowExposedLowerDeck_00 = Uno sguardo agli strati inferiori mostra una luce più profonda e più calda. I numeri diventano scomodi in fretta.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowSubpolarBands_00 = Queste fasce sfumano verso il freddo e si impastano, come se la mappa termica fosse stata passata con un guanto.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowNorthPole_00 = Il polo è per lo più buio gelido, punteggiato da sottili archi caldi che somigliano fin troppo a riscaldamento aurorale.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowSouthPole_00 = Una tenue calotta fredda con brevi bagliori luminosi sul bordo: Lindor tiene l'entusiasmo ben sotto controllo.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowStormComplex_00 = Un nodo brucia più luminoso del resto: qualcosa in quella tempesta sta trascinando calore verso l'alto di proposito.
        #JNSQscience_bd_IRradiometer_LindorInSpaceLowUpperStormDeck_00 = Gli strati superiori risultano sottili e gelidi: la luminosità infrarossa crolla come un sasso.
        #JNSQscience_bd_IRradiometer_KrelInSpaceHigh_00 = Da un'orbita alta, Krel sembra gesso freddo con deboli "vene" di calore che si rifiutano di fare una media.
        #JNSQscience_bd_IRradiometer_KrelInSpaceLowLowlands_00 = I bassopiani si scaldano a chiazze, come se la superficie non riuscisse a decidere di cosa è fatta.
        #JNSQscience_bd_IRradiometer_KrelInSpaceLowMidlands_00 = Sottili strisce calde attraversano le pianure come impronte termiche lasciate nella polvere.
        #JNSQscience_bd_IRradiometer_KrelInSpaceLowHighlands_00 = Le colline divampano di caldo al sole e scendono di colpo nel freddo in ombra: niente atmosfera, niente pietà.
        #JNSQscience_bd_IRradiometer_KrelInSpaceLowPoles_00 = I poli risultano come profondi pozzi di freddo: perfino un breve sole scalfisce appena il gelo.
        #JNSQscience_bd_IRradiometer_AdenInSpaceHigh_00 = Il bagliore marmoreo bruno di Aden è costante e modesto. Facile da misurare, difficile da romanticizzare.
        #JNSQscience_bd_IRradiometer_AdenInSpaceLowLowlands_00 = I bassopiani scuri assorbono calore in fretta: il radiometro li osserva "sfrigolare" e raffreddarsi puntuali.
        #JNSQscience_bd_IRradiometer_AdenInSpaceLowMidlands_00 = Le pianure mostrano emissività a chiazze, come se qualcuno avesse mescolato ghiaia nella polvere fine.
        #JNSQscience_bd_IRradiometer_AdenInSpaceLowHighlands_00 = Le colline risultano più fresche, con linee d'ombra nette che disegnano il terreno col calore.
