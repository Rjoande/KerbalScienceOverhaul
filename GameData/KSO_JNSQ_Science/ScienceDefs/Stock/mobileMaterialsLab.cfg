        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedEnclosedFaults_00 // The bay’s trays clatter as the basin walls echo every wave and vibration. The samples settle into stripes that look suspiciously organized.
