@EXPERIMENT_DEFINITION:HAS[#id[bd_SoilMoisture]]
{
    @title = #ScienceRefactor_bd_SoilMoisture_title // Soil Moisture Scan
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_SoilMosture_default_00 // Radiation emitted in the microwave L-band gives a clear indication of the levels of water in the top layers of the surface.
        KerbinInSpaceLow* = #ScienceRefactor_bd_SoilMosture_KerbinInSpaceLow_00 // L-band microwave emissions indicate high levels of water content across most of Kerbin's surface.
        KerbinInSpaceLow* = #ScienceRefactor_bd_SoilMosture_KerbinInSpaceLow_00 // Measurements of Kerbin's oceans reveal areas of very high salinity in the warm, tropical waters.
        MunInSpaceLow* = #ScienceRefactor_bd_SoilMosture_MunInSpaceLow_00 // Significant water content is detected in several of the Mun's deeper craters and in its polar regions.
        MinmusInSpaceLow* = #ScienceRefactor_bd_SoilMosture_MinmusInSpaceLow_00 // Microwave emissions indicate that Minmus' frozen surface is at least partially made up of water.
        SunInSpaceLow* = #ScienceRefactor_bd_SoilMosture_SunInSpaceLow_00 // The microwave antennae appear to be melting, providing no usable data.
        MohoInSpaceLow* = #ScienceRefactor_bd_SoilMosture_MohoInSpaceLow_00 // Only the sun's background microwave radiation is detectable in orbit around Moho.
        EveInSpaceLow* = #ScienceRefactor_bd_SoilMosture_EveInSpaceLow_00 // Eve's oceans have very high salinity levels, likely arising from a number of different salt compounds.
        EveInSpaceLow* = #ScienceRefactor_bd_SoilMosture_EveInSpaceLow_00 // Eve's surface contains significant levels of soil moisture in its low lying areas.
        GillyInSpaceLow* = #ScienceRefactor_bd_SoilMosture_GillyInSpaceLow_00 // No detectable water emissions are found in orbit around Gilly.
        DunaInSpaceLow* = #ScienceRefactor_bd_SoilMosture_DunaInSpaceLow_00 // Trace levels of water are detected in much of Duna's upper surface; higher levels are recorded near the poles.
        IkeInSpaceLow* = #ScienceRefactor_bd_SoilMosture_IkeInSpaceLow_00 // Minor emissions of microwave radiation suggest that a few regions of Ike's surface contain water.
        DresInSpaceLow* = #ScienceRefactor_bd_SoilMosture_DresInSpaceLow_00 // Drier than Kerbin's deserts, in fact, there doesn't appear to be any signal coming from Dres, not even background levels.
        JoolInSpaceLow* = #ScienceRefactor_bd_SoilMosture_JoolInSpaceLow_00 // Jool's lack of a detectable surface suggests that the microwave emissions detected here arise from some other source.
        LaytheInSpaceLow* = #ScienceRefactor_bd_SoilMosture_LaytheInSpaceLow_00 // Surprisingly low levels of microwave emissions are detected coming from Laythe's surface, suggesting that its oceans have little water content.
        LaytheInSpaceLow* = #ScienceRefactor_bd_SoilMosture_LaytheInSpaceLow_00 // The low water content of Laythe's oceans prevents any meaningful salinity measurements from being made.
        VallInSpaceLow* = #ScienceRefactor_bd_SoilMosture_VallInSpaceLow_00 // Vall's outer surface appears to contain little but water, only its mountainous regions show lower concentrations.
        TyloInSpaceLow* = #ScienceRefactor_bd_SoilMosture_TyloInSpaceLow_00 // Microwave emissions from some of Tylo's impact craters suggest that surface has been pummeled by water-rich asteroids and comets.
        BopInSpaceLow* = #ScienceRefactor_bd_SoilMosture_BopInSpaceLow_00 // Few microwave signals are recorded over Bop's surface; there are some curiously strong L-band signals coming from Bop's northern polar region however, further study is warranted...
        PolInSpaceLow* = #ScienceRefactor_bd_SoilMosture_PolInSpaceLow_00 // Some nearly imperceptible microwave emissions suggest that Pol is largely devoid of any surface-level moisture content.
        EelooInSpaceLow* = #ScienceRefactor_bd_SoilMosture_EelooInSpaceLow_00 // No microwave signals are recorded over Eeloo's frosty white surface, suggesting that it is something other than water ice.

        SarnusInSpaceLow* = #ScienceRefactor_bd_SoilMosture_SarnusInSpaceLow_00 // Intense microwave signals are detected from Sarnus, likely originating from water in its atmosphere.
        HaleInSpaceLow* = #ScienceRefactor_bd_SoilMosture_HaleInSpaceLow_00 // Scans of the surface reveal it to be composed mostly of water ice.
        OvokInSpaceLow* = #ScienceRefactor_bd_SoilMosture_OvokInSpaceLow_00 // Emissions from the surface indicate that it is composed of little but water.
        SlateInSpaceLow* = #ScienceRefactor_bd_SoilMosture_SlateInSpaceLow_00 // Very high levels of sub-surface moisture content are detected during low orbit scans of Slate.
        TektoInSpaceLow* = #ScienceRefactor_bd_SoilMosture_TektoInSpaceLow_00 // Only low levels of microwave emissions are detected from Tekto's surface, and indication that its oceans and surface contain little water.
        UrlumInSpaceLow* = #ScienceRefactor_bd_SoilMosture_UrlumInSpaceLow_00 // Strong microwave emissions are detected coming from Urlum; a sign of high water concentrations.
        PoltaInSpaceLow* = #ScienceRefactor_bd_SoilMosture_PoltaInSpaceLow_00 // The surface of Polta appears to contain very high levels of water, most likely as dirty, sub-surface ice deposits.
        PriaxInSpaceLow* = #ScienceRefactor_bd_SoilMosture_PriaxInSpaceLow_00 // Priax appears to have a mostly dry surface; it is possibly some type of captured asteroid.
        WalInSpaceLow* = #ScienceRefactor_bd_SoilMosture_WalInSpaceLow_00 // Readings from the surface of Wal show significant levels of sub-surface water deposits.
        TalInSpaceLow* = #ScienceRefactor_bd_SoilMosture_TalInSpaceLow_00 // The surface of Tal contains significant levels of water.
        NeidonInSpaceLow* = #ScienceRefactor_bd_SoilMosture_NeidonInSpaceLow_00 // Microwave emissions are detected from what is believed to be Neidon's icy interior.
        ThatmoInSpaceLow* = #ScienceRefactor_bd_SoilMosture_ThatmoInSpaceLow_00 // Significant levels of water are detected in microwave scans of Thatmo.
        NisseeInSpaceLow* = #ScienceRefactor_bd_SoilMosture_NisseeInSpaceLow_00 // The chalky moon Nissee appears to be mostly dry based on microwave scanning.
        PlockInSpaceLow* = #ScienceRefactor_bd_SoilMosture_PlockInSpaceLow_00 // Strong microwave emissions hint at levels of sub-surface water on Plock.
        KarenInSpaceLow* = #ScienceRefactor_bd_SoilMosture_KarenInSpaceLow_00 // No significant microwave emissions are detected from orbit around Karen.
        MercuryInSpaceLow* = #ScienceRefactor_bd_SoilMosture_MercuryInSpaceLow_00 // Only the sun's background microwave radiation is detectable in orbit around Mercury.
        VenusInSpaceLow* = #ScienceRefactor_bd_SoilMosture_VenusInSpaceLow_00 // Venus' surface contains no detectable levels of soil moisture in its low lying areas.
        MoonInSpaceLow* = #ScienceRefactor_bd_SoilMosture_MoonInSpaceLow_00 // Significant water content is detected in several of the Moon's deeper craters and in its polar regions.
        MarsInSpaceLow* = #ScienceRefactor_bd_SoilMosture_MarsInSpaceLow_00 // Trace levels of water are detected in much of Mars' upper surface; higher levels are recorded near the poles.
        DeimosInSpaceLow* = #ScienceRefactor_bd_SoilMosture_DeimosInSpaceLow_00 // No detectable water emissions are found in orbit around Deimos.
        PhobosInSpaceLow* = #ScienceRefactor_bd_SoilMosture_PhobosInSpaceLow_00 // Minor emissions of microwave radiation suggest that a few regions of Phobos' surface contain water.
        JupiterInSpaceLow* = #ScienceRefactor_bd_SoilMosture_JupiterInSpaceLow_00 // Jupiter's lack of a detectable surface suggests that the microwave emissions detected here arise from some other source.
        IoInSpaceLow* = #ScienceRefactor_bd_SoilMosture_IoInSpaceLow_00 // Some nearly imperceptible microwave emissions suggest that Io is largely devoid of any surface-level moisture content.
        EuropaInSpaceLow* = #ScienceRefactor_bd_SoilMosture_EuropaInSpaceLow_00 // Europa's outer surface appears to contain little but water, with signs of very high salinity below the surface.
        GanymedeInSpaceLow* = #ScienceRefactor_bd_SoilMosture_GanymedeInSpaceLow_00 // Very high levels of sub-surface moisture content are detected during low orbit scans of Ganymede.
        CallistoInSpaceLow* = #ScienceRefactor_bd_SoilMosture_CallistoInSpaceLow_00 // Microwave emissions from some of Callisto's impact craters suggest that surface has been pummeled by water-rich asteroids and comets.
        SaturnInSpaceLow* = #ScienceRefactor_bd_SoilMosture_SaturnInSpaceLow_00 // Intense microwave signals are detected from Saturn, likely originating from water in its atmosphere.
        TitanInSpaceLow* = #ScienceRefactor_bd_SoilMosture_TitanInSpaceLow_00 // Only low levels of microwave emissions are detected from Titan's surface, and indication that its oceans and surface contain little water.
        UranusInSpaceLow* = #ScienceRefactor_bd_SoilMosture_UranusInSpaceLow_00 // Strong microwave emissions are detected coming from Uranus; a sign of high water concentrations.
        PlutoInSpaceLow* = #ScienceRefactor_bd_SoilMosture_PlutoInSpaceLow_00 // Scans of the surface reveal it to contain very high concentrations of water ice.
        
        AsteroidInSpaceLowStony* = #ScienceRefactor_bd_SoilMosture_AsteroidInSpaceLowStony_00 // Nothing is detected in microwave scans of this asteroid, indicating that no water is present.
        AsteroidInSpaceLowStony* = #ScienceRefactor_bd_SoilMosture_AsteroidInSpaceLowStony_01 // Microwave emissions from this asteroid suggest that it is completely devoid of any water.
        AsteroidInSpaceLowIcy-Organic* = #ScienceRefactor_bd_SoilMosture_Organic_00 // Significant levels of water are detected in microwave emissions coming from this asteroid.
        AsteroidInSpaceLowCarbonaceous* = #ScienceRefactor_bd_SoilMosture_AsteroidInSpaceLowCarbonaceous_00 // Trace levels of water are detected in the surface of this asteroid.
        AsteroidInSpaceLowComet* = #ScienceRefactor_bd_SoilMosture_AsteroidInSpaceLowComet_00 // High levels of water are deteced in scans of this comet's surface.
    }
}