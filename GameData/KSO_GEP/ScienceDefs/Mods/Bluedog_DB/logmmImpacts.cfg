@EXPERIMENT_DEFINITION:HAS[#id[logmmImpacts]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_logmmImpacts_GrannusInSpaceLow_00 // The detector logs a staccato of impacts; some grains seem half-cooked by the red glare and still leave tidy little pits. Mission Control hears about it long after you’ve already applied the first hull patch.
		GrannusInSpaceHigh* = #GEPscience_logmmImpacts_GrannusInSpaceHigh_00 // Out here the impacts arrive as lonely ticks, like someone testing if your ship is still there. The rate drops, but the few hits that land are uncomfortably energetic.
		TaranisInSpaceLow* = #GEPscience_logmmImpacts_TaranisInSpaceLow_00 // Low over Taranis, the counter spikes as if the planet is constantly shedding fresh fragments from its brutal day-night split. Each ping comes with a reminder that “shielding” is just another word for “extra mass.”
		TaranisInSpaceHigh* = #GEPscience_logmmImpacts_TaranisInSpaceHigh_00 // In higher orbit the impacts thin out into a slow, patient drizzle, implying most of the grit stays close to the surface. The long-delay readout makes it feel like the universe is reporting the hits on a schedule.
		ToutatisInSpaceLow* = #GEPscience_logmmImpacts_ToutatisInSpaceLow_00 // Close to Toutatis, the detector catches bursts of tiny impacts that seem to cluster near the hot-cold boundary, where the surface can’t decide what shape it wants to be. The scars look fresh enough that you briefly consider filing a complaint with the planet.
		ToutatisInSpaceHigh* = #GEPscience_logmmImpacts_ToutatisInSpaceHigh_00 // High above Toutatis, impacts are rare but dramatic—each one arrives like it traveled all the way from the dim red sun just to annoy you personally. Mission Control’s delayed “did you hear that?” comes in after the next ping.
        NodensInSpaceLow* = #GEPscience_logmmImpacts_NodensInSpaceLow_00 // The impact counter chatters in short bursts as you skim above Nodens; whatever’s in this system’s dust is darker and sharper than you expected under the red sun. Mission Control’s advice arrives several minutes after you’ve already stopped flinching.
		NodensInSpaceHigh* = #GEPscience_logmmImpacts_NodensInSpaceHigh_00 // Higher up, impacts become rare, solitary ticks—like the void is testing the hull for weak spots. The long-delay telemetry makes it feel like you’re reading yesterday’s weather report for tomorrow’s dents.
		BelisamaInSpaceLow* = #GEPscience_logmmImpacts_BelisamaInSpaceLow_00 // Close to Belisama the detector logs a steady peppering, as if the tidally-locked moon is sweeping up debris and flinging the leftovers into your path. You start ranking impacts by “scratch”, “ding”, and “future problem”.
		BelisamaInSpaceHigh* = #GEPscience_logmmImpacts_BelisamaInSpaceHigh_00 // Farther out, the hits slow down but sound nastier, suggesting fewer particles survived the trip but none of them are polite. The red sunlight on the panels makes every new mark look like it was there all along—until the counter proves otherwise.
        SucellusInSpaceLow* = #GEPscience_logmmImpacts_SucellusInSpaceLow_00 // The impact sensor rattles steadily, as if Sucellus is trailed by its own personal cloud of grit. Under the dim red sun, every ping feels louder than it should, and Mission Control’s reassurance arrives fashionably late.
		SucellusInSpaceHigh* = #GEPscience_logmmImpacts_SucellusInSpaceHigh_00 // Up high, the hits come in lonely, well-spaced ticks—still fast, still rude, just less social. The logs suggest most debris keeps close to the dwarf planet, like it’s reluctant to leave the neighborhood.
		CaireenInSpaceLow* = #GEPscience_logmmImpacts_CaireenInSpaceLow_00 // Near tiny Caireen, the counter spikes in brief bursts, like you’re passing through the leftovers of a captured rock’s bad decisions. You start trusting the sensor more than your eyes—at least the sensor can’t pretend it didn’t see that.
		CaireenInSpaceHigh* = #GEPscience_logmmImpacts_CaireenInSpaceHigh_00 // Higher above Caireen, impacts thin out into occasional sharp taps, implying the little moon’s influence is small but not zero. The delayed telemetry makes it feel like you’re reading impact reports from a previous orbit.
		SironaInSpaceLow* = #GEPscience_logmmImpacts_SironaInSpaceLow_00 // The detector goes busy near Sirona’s ring system, registering a constant peppering of fast, bright dust that turns “space” into “very thin gravel.” Under the red sun, the rings look calm—right up until the counter proves they are not.
		SironaInSpaceHigh* = #GEPscience_logmmImpacts_SironaInSpaceHigh_00 // Farther out, the ring noise fades, but rare impacts arrive with unsettling conviction, as if a stray fragment escaped the ring lanes just to test your shielding. By the time Mission Control asks if everything is okay, you’ve already filed the dents as “expected.”
        AirmedInSpaceLow* = #GEPscience_logmmImpacts_AirmedInSpaceLow_00 // The impact counter chatters like it’s trying to match Airmed’s scar patterns one dent at a time. Under the red sun, the debris looks harmless until it starts writing on the hull.
		AirmedInSpaceHigh* = #GEPscience_logmmImpacts_AirmedInSpaceHigh_00 // Higher up, the hits become rare, sharp taps—more “message received” than “background noise.” The log reaches Mission Control after you’ve already stopped checking the panels every minute.
		BorvoInSpaceLow* = #GEPscience_logmmImpacts_BorvoInSpaceLow_00 // Low over Borvo, impacts arrive in messy bursts, as if the moon can’t decide whether it’s dusty, icy, or both and is shedding samples accordingly. The faint haze below looks calm, but the detector insists it’s a very active calm.
		BorvoInSpaceHigh* = #GEPscience_logmmImpacts_BorvoInSpaceHigh_00 // In higher orbit, the rate drops to a patient drizzle, and the few strikes sound annoyingly expensive. The delayed downlink makes it feel like you’re reading yesterday’s dents as tomorrow’s forecast.
		DamonaInSpaceLow* = #GEPscience_logmmImpacts_DamonaInSpaceLow_00 // Near Damona, the detector records clustered pings that line up a little too neatly—like you’re crossing the invisible outline of an ancient accident. The big scar on the surface suddenly feels less “historic” and more “ongoing.”
		DamonaInSpaceHigh* = #GEPscience_logmmImpacts_DamonaInSpaceHigh_00 // Farther out, impacts are infrequent but emphatic, suggesting only the stubborn fragments make it this high. The red-lit hull marks are subtle until the counter politely confirms they are, in fact, new.
        EponaInSpaceLow* = #GEPscience_logmmImpacts_EponaInSpaceLow_00 // The detector rattles with frequent tiny hits, as if Epona is flying through its own halo of cold grit. Under the dim red sun, the surface looks quiet—until the impact log proves “quiet” is just a lighting condition.
		EponaInSpaceHigh* = #GEPscience_logmmImpacts_EponaInSpaceHigh_00 // Higher up the impacts thin to lonely ticks that arrive on no schedule you can understand. By the time Mission Control gets the report, you’ve already renamed the dataset “Epona: Still Throwing Rocks”.
		RosmertaInSpaceLow* = #GEPscience_logmmImpacts_RosmertaInSpaceLow_00 // Close to Rosmerta, impacts come in short bursts, like the moon is being slowly sandblasted and politely sharing the sand. The readout feels almost personal—Rosmerta may be lonely, but the local dust is not.
		RosmertaInSpaceHigh* = #GEPscience_logmmImpacts_RosmertaInSpaceHigh_00 // Farther out, the counter goes quiet for long stretches and then *ping*—a reminder that empty space here still has teeth. The delayed downlink makes it sound like Mission Control is reacting to impacts from an hour ago.
		RAB-58EInSpaceLow* = #GEPscience_logmmImpacts_RAB-58EInSpaceLow_00 // The sensor logs a messy mix of tiny strikes, as if RAB-58E is dragging you through a captured trail of whatever it used to orbit. The red sunlight makes every new scuff look old—until the counter insists it’s fresh.
		RAB-58EInSpaceHigh* = #GEPscience_logmmImpacts_RAB-58EInSpaceHigh_00 // In high orbit, impacts are rare but oddly inconsistent, like you keep crossing invisible lanes of debris. You start timing the pings against the comm delay just to feel like someone is in control of this.
		CernunnosInSpaceLow* = #GEPscience_logmmImpacts_CernunnosInSpaceLow_00 // The detector records sparse but sharp hits, suggesting the outer system favors fewer, meaner particles. Each impact sounds louder in the silence, and the red sun overhead does nothing to make the place feel less far away.
		CernunnosInSpaceHigh* = #GEPscience_logmmImpacts_CernunnosInSpaceHigh_00 // Up high, the counter mostly waits… and waits… and then clicks once, decisively. Mission Control’s “did you hear that?” arrives after you’ve already added “probably” to the hull inspection checklist.
    }
}