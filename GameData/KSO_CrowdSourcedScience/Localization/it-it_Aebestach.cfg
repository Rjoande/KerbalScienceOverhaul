        #CSS_Aebestach_mobileMaterialsLab_Moho_01 = Catena settentrionale di doline di Moho. I materiali si metamorfosano nel calore.
        #CSS_Aebestach_mobileMaterialsLab_Moho_02 = Bassopiani occidentali di Moho. Metamorfismo termico.
        #CSS_Aebestach_mobileMaterialsLab_Moho_03 = Polo sud di Moho. I materiali sono caldi quanto al polo nord.
        //   Kerbin
