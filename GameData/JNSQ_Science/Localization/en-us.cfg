        #JNSQscience_crewReport_EelooFlyingLowPoles_00 = You report that you are “flying” over the poles. The altitude agrees. Your instincts do not.
        #JNSQscience_crewReport_EelooFlyingLowHighlands_00 = The highlands slide by below, sharp and bright. The cabin feels like it’s hovering over a freezer with opinions.
        #JNSQscience_crewReport_EelooFlyingLowMidlands_00 = The midlands look calm from here—flat, pale, and determined to make you double-check the altimeter every ten seconds.
        #JNSQscience_crewReport_EelooFlyingLowLowlands_00 = Over the lowlands, the haze is just thick enough to smear the horizon. You try not to breathe too confidently.
        #JNSQscience_crewReport_EelooFlyingLowCanyon_00 = The canyon walls rush past beneath you, and the thin air does absolutely nothing to soften the view or your nerves.
