        #GEPscience_bd_camera_NodensSrfLandedTundra_00 = Il terreno è pallido e a chiazze, come se il mondo non sapesse decidere se congelare o no. L'autofocus della fotocamera continua a cercare, come se fosse nervoso anche lui.
