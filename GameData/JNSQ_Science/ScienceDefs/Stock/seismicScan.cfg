        KrelSrfLandedLowlands* = #JNSQscience_seismicScan_KrelSrfLandedLowlands_01 // Distant impacts arrive as thin, clean pings. Whatever is under the dust is hard and close.
        KrelSrfLandedMidlands* = #JNSQscience_seismicScan_KrelSrfLandedMidlands_00 // A faint, steady wobble suggests slow flexing. Lindor’s pull may be working the ground like a stress test.
        KrelSrfLandedMidlands* = #JNSQscience_seismicScan_KrelSrfLandedMidlands_01 // Echoes return in two distinct layers, as if a brittle skin sits atop something denser and less cooperative.
        KrelSrfLandedHighlands* = #JNSQscience_seismicScan_KrelSrfLandedHighlands_00 // A sharp spike appears, followed by a long ringing decay. The highlands act like a tuning fork.
        KrelSrfLandedHighlands* = #JNSQscience_seismicScan_KrelSrfLandedHighlands_01 // Micro-fractures pop in the cold, each one a crisp tick that makes the chart look nervous.
        KrelSrfLandedPoles* = #JNSQscience_seismicScan_KrelSrfLandedPoles_00 // The baseline is dead-flat until a sudden snap cracks across the record. Polar cold does not negotiate.
        KrelSrfLandedPoles* = #JNSQscience_seismicScan_KrelSrfLandedPoles_01 // Reflections come back fast and strong, hinting at solid ground with only a thin layer of loose stuff on top.

        AdenSrfLandedLowlands* = #JNSQscience_seismicScan_AdenSrfLandedLowlands_00 // The seismometer records slow, lazy settling, like fine grains are still finding a place to live.
