        #JNSQscience_sspxFishStudy_LaytheFlyingHigh_01 = Aria sottile e motori rumorosi: l'acqua della vasca sbatte. I pesci reagiscono inventando un nuovo sport: il drifting competitivo.
        #JNSQscience_sspxFishStudy_TyloFlyingHigh_00 = Fuori c'è una foschia pallida e un freddo pungente. I pesci rallentano e restano sospesi vicino al riscaldatore come se fosse un monumento sacro.
        #JNSQscience_sspxFishStudy_TyloFlyingHigh_01 = Il manometro a malapena si muove, ma la vasca sembra "silenziosa". I pesci adottano schemi di nuoto severi ed efficienti e ti giudicano per ogni battito di ciglia.
        #JNSQscience_sspxFishStudy_LindorFlyingHigh_00 = Fuori, le nubi scorrono in fasce calme e pigre. Dentro, i pesci fanno lo stesso, come se cercassero di mimetizzarsi.
        #JNSQscience_sspxFishStudy_LindorFlyingHigh_01 = Gli strumenti insistono che va tutto bene, poi cambiano subito idea. I pesci restano per nulla impressionati dal melodramma.
        #JNSQscience_sspxFishStudy_LindorInSpaceLow_00 = I deboli vortici di Lindor scorrono sotto di te come un gorgo lento. I pesci guardano il panorama e per un po' si dimenticano di fare i pesci.
        #JNSQscience_sspxFishStudy_LindorInSpaceLow_01 = Qualcuno suggerisce che il pianeta possa essere pieno di cioccolato. I pesci riprendono a seguire il cassetto degli snack con rinnovato interesse.
        #JNSQscience_sspxFishStudy_LindorInSpaceHigh_00 = Lindor si riduce a una biglia serena. I pesci si assestano in giri regolari, come se il viaggio a lunga distanza fosse solo un'altra corrente.
        #JNSQscience_sspxFishStudy_LindorInSpaceHigh_01 = Qui fuori l'habitat sembra piccolissimo. I pesci reagiscono occupando quanta più vasca possibile, fisicamente parlando.
        #JNSQscience_sspxFishStudy_KrelSrfLanded_00 = Il terreno pallido, visto dall'oblò, sembra stranamente venoso. I pesci continuano a girare intorno al filtro come se stessero studiando anche loro un campione.
        #JNSQscience_sspxFishStudy_KrelSrfLanded_01 = La bassa gravità fa durare ogni increspatura dell'acqua. I pesci imparano a "restare sospesi" e non smettono mai di mettersi in mostra.
        #JNSQscience_sspxFishStudy_KrelInSpaceLow_00 = Krel scorre sotto come un sassolino sbiancato, con Lindor che incombe lì vicino. I pesci si orientano verso l'ombra più grande nella finestra.
