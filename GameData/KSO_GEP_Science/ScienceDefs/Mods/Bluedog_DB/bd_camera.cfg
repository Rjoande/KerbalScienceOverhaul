		NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_camera_NodensInSpaceLowTropicalMidlands_00 // Ridges and slopes pop in low sun, throwing shadows longer than they have any right to. The camera captures the geometry; you question the clocks.
