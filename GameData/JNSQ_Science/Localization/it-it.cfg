        #JNSQscience_bd_XRayDiffract_LaytheSrfLandedEnclosedFaults_00 = Diversi picchi tornano spezzati e inclinati, come se i minerali "ricordassero" ancora di essere stati piegati, spaccati e rimescolati lungo una faglia.
        #JNSQscience_bd_XRayDiffract_LaytheSrfLandedLowlands_00 = Sedimenti fini producono picchi ampi e lisci: i bassopiani sembrano una coperta profonda di granuli ben mescolati e rielaborati dall'acqua.
