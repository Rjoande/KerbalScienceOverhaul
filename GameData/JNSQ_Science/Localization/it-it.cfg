        #JNSQscience_sspxFishStudy_HuygenSrfLanded_00 = Una foschia ambrata rende ogni ombra morbida e strana. I pesci scelgono un angolo e fanno finta di non vederti.
        #JNSQscience_sspxFishStudy_HuygenSrfLanded_01 = L'aria esterna sembra pesante anche attraverso il vetro. I pesci restano vicino all'aeratore come se fosse l'unica atmosfera affidabile.
