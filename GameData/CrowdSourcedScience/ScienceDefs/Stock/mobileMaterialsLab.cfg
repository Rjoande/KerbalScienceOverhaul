@EXPERIMENT_DEFINITION:HAS[#id[mobileMaterialsLab]]
{
    %RESULTS
    {
        Srf* = #CSS_mobileMaterialsLab_default_00 // Inside, you see what appears to be a small, glowing, yellow squid-like creature... fascinating.
        Srf* = #CSS_mobileMaterialsLab_default_01 // The materials react to the situation. Mission Control comments on your vagueness.
        Srf* = #CSS_mobileMaterialsLab_default_02 // The doors initially jam on some of the materials, but before any action can be taken, they sort themselves out.
        Srf* = #CSS_mobileMaterialsLab_default_03 // The materials bay is embarrassed by its exposure.
        Srf* = #CSS_mobileMaterialsLab_default_04 // You discover that one of the "materials" is actually a snack.
        Srf* = #CSS_mobileMaterialsLab_default_05 // One of engineers informs you that he accidentally equipped the lab with the ingredients for his birthday cake instead of proper science materials.
        Srf* = #CSS_mobileMaterialsLab_default_06 // You open the doors and examine the samples as they react.
        Srf* = #CSS_mobileMaterialsLab_default_07 // The samples don't react at all, and you examine them.
        Srf* = #CSS_mobileMaterialsLab_default_08 // At least this isn't more Goo.
        Srf* = #CSS_mobileMaterialsLab_default_09 // You observe no change.
        Srf* = #CSS_mobileMaterialsLab_default_10 // You observe a negligible amount of change.
        Srf* = #CSS_mobileMaterialsLab_default_11 // You observe a little bit of change.
        Srf* = #CSS_mobileMaterialsLab_default_12 // The change observes a little bit of you.
        Srf* = #CSS_mobileMaterialsLab_default_13 // Goodness! Doesn't anybody knock?

        Flying* = #CSS_mobileMaterialsLab_default_00 // Inside, you see what appears to be a small, glowing, yellow squid-like creature... fascinating.
        Flying* = #CSS_mobileMaterialsLab_default_01 // The materials react to the situation. Mission Control comments on your vagueness.
        Flying* = #CSS_mobileMaterialsLab_default_02 // The doors initially jam on some of the materials, but before any action can be taken, they sort themselves out.
        Flying* = #CSS_mobileMaterialsLab_default_03 // The materials bay is embarrassed by its exposure.
        Flying* = #CSS_mobileMaterialsLab_default_04 // You discover that one of the "materials" is actually a snack.
        Flying* = #CSS_mobileMaterialsLab_default_05 // One of engineers informs you that he accidentally equipped the lab with the ingredients for his birthday cake instead of proper science materials.
        Flying* = #CSS_mobileMaterialsLab_default_06 // You open the doors and examine the samples as they react.
        Flying* = #CSS_mobileMaterialsLab_default_07 // The samples don't react at all, and you examine them.
        Flying* = #CSS_mobileMaterialsLab_default_08 // At least this isn't more Goo.
        Flying* = #CSS_mobileMaterialsLab_default_09 // You observe no change.
        Flying* = #CSS_mobileMaterialsLab_default_10 // You observe a negligible amount of change.
        Flying* = #CSS_mobileMaterialsLab_default_11 // You observe a little bit of change.
        Flying* = #CSS_mobileMaterialsLab_default_12 // The change observes a little bit of you.
        Flying* = #CSS_mobileMaterialsLab_default_13 // Goodness! Doesn't anybody knock?

        InSpace* = #CSS_mobileMaterialsLab_default_00 // Inside, you see what appears to be a small, glowing, yellow squid-like creature... fascinating.
        InSpace* = #CSS_mobileMaterialsLab_default_01 // The materials react to the situation. Mission Control comments on your vagueness.
        InSpace* = #CSS_mobileMaterialsLab_default_02 // The doors initially jam on some of the materials, but before any action can be taken, they sort themselves out.
        InSpace* = #CSS_mobileMaterialsLab_default_03 // The materials bay is embarrassed by its exposure.
        InSpace* = #CSS_mobileMaterialsLab_default_04 // You discover that one of the "materials" is actually a snack.
        InSpace* = #CSS_mobileMaterialsLab_default_05 // One of engineers informs you that he accidentally equipped the lab with the ingredients for his birthday cake instead of proper science materials.
        InSpace* = #CSS_mobileMaterialsLab_default_06 // You open the doors and examine the samples as they react.
        InSpace* = #CSS_mobileMaterialsLab_default_07 // The samples don't react at all, and you examine them.
        InSpace* = #CSS_mobileMaterialsLab_default_08 // At least this isn't more Goo.
        InSpace* = #CSS_mobileMaterialsLab_default_09 // You observe no change.
        InSpace* = #CSS_mobileMaterialsLab_default_10 // You observe a negligible amount of change.
        InSpace* = #CSS_mobileMaterialsLab_default_11 // You observe a little bit of change.
        InSpace* = #CSS_mobileMaterialsLab_default_12 // The change observes a little bit of you.
        InSpace* = #CSS_mobileMaterialsLab_default_13 // Goodness! Doesn't anybody knock?

        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_00 // Everything is on fire.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_01 // The materials are turning crispy and golden. You start to feel hungry again.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_02 // The samples seem to have completely fried.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_03 // Things are starting to melt in here.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_04 // Some of the containers are so hot that their glass is melting.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_05 // Some of the samples appear to be dissolving. The remaining samples appear to be dissipating. It is hard to distinguish the two effects from one another.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_06 // The samples are cooking up nicely. Time to turn them over and add some salt.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_07 // Some of the pieces facing the sun are now covered with little glowing cracks.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_08 // Some of the material samples have started to glow from the intense radiation.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_09 // The samples appear to be sweating.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_10 // The red hot glow of the metallic samples rivals the blazing intensity of the sun.
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_11 // It says here "directly expose to sun for five minutes for a brilliant golden color."
        SunInSpaceLow* = #CSS_mobileMaterialsLab_SunInSpaceLow_12 // The materials in the lab very clearly want to be farther away from the sun.
        SunInSpaceHigh* = #CSS_mobileMaterialsLab_SunInSpaceHigh_00 // The rocks show little signs of change. Some phosphorous samples glow a bright blue color, indicating the high radiation of interplanetary space.
        SunInSpaceHigh* = #CSS_mobileMaterialsLab_SunInSpaceHigh_01 // The materials, now exposed directly to the sun, are decidedly uncomfortable.
        SunInSpaceHigh* = #CSS_mobileMaterialsLab_SunInSpaceHigh_02 // Something is starting to boil.

        MohoSrfLanded* = #CSS_mobileMaterialsLab_MohoSrfLanded_00 // You record trace amounts of evaporated samples.
        MohoSrfLandedCentralLowlands* = #CSS_mobileMaterialsLab_MohoSrfLandedCentralLowlands_00 // The racks holding the samples melt in a highly interesting fashion.
        MohoSrfLandedHighlands* = #CSS_mobileMaterialsLab_MohoSrfLandedHighlands_00 // The samples start sweating.
        MohoSrfLandedSouthWesternLowlands* = #CSS_mobileMaterialsLab_MohoSrfLandedSouthWesternLowlands_00 // The materails are currently embroiled in a civil war. You are unable to determine the cause.
        MohoSrfLandedCanyon* = #CSS_mobileMaterialsLab_MohoSrfLandedCanyon_00 // The samples have taken well to Moho and are now brown.
        MohoInSpaceLow* = #CSS_mobileMaterialsLab_MohoInSpaceLow_00 // Some of the samples suggest Moho has a weak magnetic field.
        MohoInSpaceHigh* = #CSS_mobileMaterialsLab_MohoInSpaceHigh_00 // The materials have been affected by the intense heat and many of the softer ones have melted entirely.

        EveSrfLandedPoles* = #CSS_mobileMaterialsLab_EveSrfLandedPoles_00 // It's still warm enough to make a lot of things rather soft or outright liquid.
        EveSrfLandedMidlands* = #CSS_mobileMaterialsLab_EveSrfLandedMidlands_00 // The gel samples begin to evaporate, making odd colored smoke. You suddenly wonder if this could be used to make colored exhaust.
        EveSrfLandedExplodiumSea* = #CSS_mobileMaterialsLab_EveSrfLandedExplodiumSea_00 // The materials that have not melted are one by one starting to catch fire. This probably has implications for space suit design.
        EveSrfLandedLowlands* = #CSS_mobileMaterialsLab_EveSrfLandedLowlands_00 // Some of the canisters are crushed like tin cans from the atmospheric pressure. You try not to imagine the ship meeting the same fate.
        EveSrfLandedHighlands* = #CSS_mobileMaterialsLab_EveSrfLandedHighlands_00 // The samples appear torn between their allegiance to green and their new environment of purple. They turn an indecisive shade of blue.
        EveSrfLandedPeaks* = #CSS_mobileMaterialsLab_EveSrfLandedPeaks_00 // Despite the roasting temperatures, it's not enough to set anything on fire given the lack of oxygen. Some materials char, though.
        EveSrfLandedImpactEjecta* = #CSS_mobileMaterialsLab_EveSrfLandedImpactEjecta_00 // Some of the monitoring equipment has suffered the same melty fate as the samples.
        EveSrfLandedCraterLake* = #CSS_mobileMaterialsLab_EveSrfLandedCraterLake_00 // Most of the paints on the samples have dripped off or turned black.
        EveSrfLandedWesternSea* = #CSS_mobileMaterialsLab_EveSrfLandedWesternSea_00 // A small amount of dust has covered the samples in even more purple shades.
        EveSrfLandedOlympus* = #CSS_mobileMaterialsLab_EveSrfLandedOlympus_00 // Some of the samples of organic material remind you of the results from the time your parents forgot to set the oven timer.
        EveSrfLandedEasternSea* = #CSS_mobileMaterialsLab_EveSrfLandedEasternSea_00 // The sluggish air movement is slow, but the thick air grants it enough force to blow a couple of samples alarmingly close to the edge.
        EveSrfLandedFoothills* = #CSS_mobileMaterialsLab_EveSrfLandedFoothills_00 // A bottle of water explodes from the steam pressure in the heat, blasting the sample bay with shards and superheated water.
        EveSrfLandedShallows* = #CSS_mobileMaterialsLab_EveSrfLandedShallows_00 // You are extremely disappointed to find the ice cream you packed to relax by the beach with has melted and caught fire.
        EveSrfSplashedPoles* = #CSS_mobileMaterialsLab_EveSrfSplashedPoles_00 // The oceans seem to be stripping the paint off of the lab's materials safety decals.
        EveSrfSplashedExplodiumSea* = #CSS_mobileMaterialsLab_EveSrfSplashedExplodiumSea_00 // The rubber duck you always keep in the bay as a good luck charm floats around, melting in the boiling liquid.
        EveSrfSplashedExplodiumSea* = #CSS_mobileMaterialsLab_EveSrfSplashedExplodiumSea_01 // The materials melt and/or explode. We may want to get out of here.
        EveSrfSplashedLowlands* = #CSS_mobileMaterialsLab_EveSrfSplashedLowlands_00 // The materials start to dissolve. The liquid here appears to be acidic.
        EveSrfSplashedImpactEjecta* = #CSS_mobileMaterialsLab_EveSrfSplashedImpactEjecta_00 // Several objects that should not be floating float out of the bay, bobbing in the toxic sea.
        EveSrfSplashedCraterLake* = #CSS_mobileMaterialsLab_EveSrfSplashedCraterLake_00 // The materials look happy as they quickly dissolve in the mix of chemicals that make up this sea.
        EveSrfSplashedWesternSea* = #CSS_mobileMaterialsLab_EveSrfSplashedWesternSea_00 // Some sparks from a shorting cable give you a miniature heart attack as they dance over the not-water, but nothing explodes.
        EveSrfSplashedEasternSea* = #CSS_mobileMaterialsLab_EveSrfSplashedEasternSea_00 // When the materials bay was opened, most of the samples fell out. Some of them floated, and others sank. Fascinating!
        EveSrfSplashedShallows* = #CSS_mobileMaterialsLab_EveSrfSplashedShallows_00 // Several materials that are quite close to the materials of your ship are readily attacked and destroyed by the fluid.
        EveFlyingLow* = #CSS_mobileMaterialsLab_EveFlyingLow_00 // The samples are torn out of the container by the pressure of the atmosphere. Perhaps Kerbtape wasn't enough.
        EveFlyingLow* = #CSS_mobileMaterialsLab_EveFlyingLow_01 // Dribbles of melting polymers trail out of the bay, borne aloft on the thick purple winds.
        EveFlyingLow* = #CSS_mobileMaterialsLab_EveFlyingLow_02 // Small amounts of airborne purple dust sticks to the rapidly softening materials, dyeing them purple.
        EveFlyingHigh* = #CSS_mobileMaterialsLab_EveFlyingHigh_00 // Ten out of ten samples agree: "The stuff below you is a liquid."
        EveFlyingHigh* = #CSS_mobileMaterialsLab_EveFlyingHigh_01 // Even though you are still high in the planet's atmosphere, the samples are beginning to decompose due to the heat and pressure.
        EveFlyingHigh* = #CSS_mobileMaterialsLab_EveFlyingHigh_02 // The samples are rattling around in the bay from heavy aerodynamic forces.
        EveInSpaceLow* = #CSS_mobileMaterialsLab_EveInSpaceLow_00 // All samples turn purple out of fear.
        EveInSpaceLow* = #CSS_mobileMaterialsLab_EveInSpaceLow_01 // You could swear the samples are turning purple already, and you're still in space.
        EveInSpaceLow* = #CSS_mobileMaterialsLab_EveInSpaceLow_02 // When you open the bay, there are no samples. You close the doors and reopen them, and they're all there again. Is Gilly playing magic tricks on you?
        EveInSpaceHigh* = #CSS_mobileMaterialsLab_EveInSpaceHigh_00 // The materials bay, after an apparent deliberation, produces a liquid. It's almost, but not quite, entirely unlike tea.
        EveInSpaceHigh* = #CSS_mobileMaterialsLab_EveInSpaceHigh_01 // The radioactivity has caused the blutonium samples to glow even more. Apart from that, everything is normal.
        EveInSpaceHigh* = #CSS_mobileMaterialsLab_EveInSpaceHigh_02 // Some of the material do not seem to have survived the journey from Kerbin in the hard vacuum environment.

        GillySrfLandedMidlands* = #CSS_mobileMaterialsLab_GillySrfLandedMidlands_00 // The loose samples take a very long time to roll to the lower end of the bay.
        GillySrfLandedLowlands* = #CSS_mobileMaterialsLab_GillySrfLandedLowlands_00 // Some of the samples float out of the materials bay.
        GillySrfLandedHighlands* = #CSS_mobileMaterialsLab_GillySrfLandedHighlands_00 // When disturbed, the objects take a long time to return to the floor in a new and interesting pattern. You wonder if you could sell the Materials Lab as a piece of modern art.
        GillyInSpaceLow* = #CSS_mobileMaterialsLab_GillyInSpaceLow_00 // It looks like someone's been trying to hide snacks in the Materials Lab.
        GillyInSpaceHigh* = #CSS_mobileMaterialsLab_GillyInSpaceHigh_00 // The samples behave in much the same way that they did while in deep space.

        KerbinSrfLandedKSC* = #CSS_mobileMaterialsLab_KerbinSrfLandedKSC_00 // The materials all seem to be posing, preparing for the scientists' examination.
        KerbinSrfLandedKSC* = #CSS_mobileMaterialsLab_KerbinSrfLandedKSC_01 // The samples look like pretty much everything else around here.
        KerbinSrfLandedAdministration* = #CSS_mobileMaterialsLab_KerbinSrfLandedAdministration_00 // The materials shine. You assume they want to look good when facing their bosses.
        KerbinSrfLandedAstronautComplex* = #CSS_mobileMaterialsLab_KerbinSrfLandedAstronautComplex_00 // The new recruits are fascinated to see what a materials lab looks like.
        KerbinSrfLandedCrawlerway* = #CSS_mobileMaterialsLab_KerbinSrfLandedCrawlerway_00 // The Materials Bay rolls off and gets stuck between the tracks.
        KerbinSrfLandedFlagPole* = #CSS_mobileMaterialsLab_KerbinSrfLandedFlagPole_00 // The materials seem unimpressed by your climbing skills.
        KerbinSrfLandedLaunchPad* = #CSS_mobileMaterialsLab_KerbinSrfLandedLaunchPad_00 // You think that this experiment is rather superfluous.
        KerbinSrfLandedLaunchPad* = #CSS_mobileMaterialsLab_KerbinSrfLandedLaunchPad_01 // The materials are neatly arranged, waiting for launch. You suppress the urge to shake the container.
        KerbinSrfLandedMissionControl* = #CSS_mobileMaterialsLab_KerbinSrfLandedMissionControl_00 // Mission control wonders why you have to do your experiment HERE.
        KerbinSrfLandedR&D* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&D_00 // You are humbled to perform your experiments here, at their birthplace.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DCentralBuilding_00 // You feel right at home here in the lab.
        KerbinSrfLandedR&DCornerLab* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DCornerLab_00 // The materials fail to indicate which corner you are in.
        KerbinSrfLandedR&DMainBuilding* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DMainBuilding_00 // The staff here spend so much time in the lab themselves that they are completely uninterested in your results.
        KerbinSrfLandedR&DObservatory* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DObservatory_00 // You observe the materials while the R&D staff observe you.
        KerbinSrfLandedR&DSideLab* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DSideLab_00 // The materials fail to indicate which side you are at.
        KerbinSrfLandedR&DSmallLab* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DSmallLab_00 // You are amused at the puny size of this lab compared to yours.
        KerbinSrfLandedR&DTanks* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DTanks_00 // Your lab blends in with the tanks here, so you can do your experiments incognito.
        KerbinSrfLandedR&DWindTunnel* = #CSS_mobileMaterialsLab_KerbinSrfLandedR&DWindTunnel_00 // Materials were "Ejected due to extreme baro-differential". Luckily you managed to hang on.
        KerbinSrfLandedRunway* = #CSS_mobileMaterialsLab_KerbinSrfLandedRunway_00 // The materials are all facing upwards. You hastily turn them sideways.
        KerbinSrfLandedSPH* = #CSS_mobileMaterialsLab_KerbinSrfLandedSPH_00 // The great view of the new planes distracts you from getting any meaningful lab work done.
        KerbinSrfLandedSPHMainBuilding* = #CSS_mobileMaterialsLab_KerbinSrfLandedSPHMainBuilding_00 // The engineers here eye your lab module with disdain.
        KerbinSrfLandedSPHRoundTank* = #CSS_mobileMaterialsLab_KerbinSrfLandedSPHRoundTank_00 // You consider how much the lab looks like a tank.
        KerbinSrfLandedSPHTanks* = #CSS_mobileMaterialsLab_KerbinSrfLandedSPHTanks_00 // Your lab blends in with the tanks here, so you can do your experiments incognito.
        KerbinSrfLandedSPHWaterTower* = #CSS_mobileMaterialsLab_KerbinSrfLandedSPHWaterTower_00 // A leak from the tower washes away your materials before you can experiment on them. Oh well, snack time!
        KerbinSrfLandedTrackingStation* = #CSS_mobileMaterialsLab_KerbinSrfLandedTrackingStation_00 // You take the leftover materials and throw them at the tracking station, hoping they stick to the side of the building.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_mobileMaterialsLab_KerbinSrfLandedTrackingStationDishEast_00 // You play loud rock music in the lab, saying you are testing materials, but really you're just trying to annoy the folks at the tracking station.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_mobileMaterialsLab_KerbinSrfLandedTrackingStationDishNorth_00 // You position the lab directly in front of the dish to see what effect it will have on the materials.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_mobileMaterialsLab_KerbinSrfLandedTrackingStationDishSouth_00 // The materials leak out and start corroding the tracking dish. You hope no-one else saw that.
        KerbinSrfLandedTrackingStationHub* = #CSS_mobileMaterialsLab_KerbinSrfLandedTrackingStationHub_00 // You make a show of performing your experiment here, so the tracking station staff can see what a small contribution they make to the program.
        KerbinSrfLandedVAB* = #CSS_mobileMaterialsLab_KerbinSrfLandedVAB_00 // A welding rod fell into your experiment mid-way. You don't know if this will effect the results, so you finish your report anyway.
        KerbinSrfLandedVABMainBuilding* = #CSS_mobileMaterialsLab_KerbinSrfLandedVABMainBuilding_00 // The general commotion around here vibrates the materials off the lab bench. You figure this qualifies as a result, and leave to have some snacks.
        KerbinSrfLandedVABPodMemorial* = #CSS_mobileMaterialsLab_KerbinSrfLandedVABPodMemorial_00 // You consider how similar the materials you are using are to the pod outside.
        KerbinSrfLandedVABRoundTank* = #CSS_mobileMaterialsLab_KerbinSrfLandedVABRoundTank_00 // You consider how much the lab looks like a tank.
        KerbinSrfLandedVABTanks* = #CSS_mobileMaterialsLab_KerbinSrfLandedVABTanks_00 // Your lab blends in with the tanks here, so you can do your experiments incognito.

        KerbinSrfLanded* = #CSS_mobileMaterialsLab_KerbinSrfLanded_00 // Why are we performing this experiment here? We could have just stayed at home and done it.
        KerbinSrfLandedWater* = #CSS_mobileMaterialsLab_KerbinSrfLandedWater_00 // You take care to limit your samples' exposure to the humid sea air. Some of them are rather susceptible to corrosion.
        KerbinSrfLandedWater* = #CSS_mobileMaterialsLab_KerbinSrfLandedWater_01 // The materials lab seems particularly damp. You pull out a mop and bucket to be safe as you finish your report.
        KerbinSrfLandedGrasslands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_00 // The materials lab has grass-stains on it now from that landing. So much for returning it to the manufacturer for a refund when we are done.
        KerbinSrfLandedGrasslands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_01 // You crack open window as you write up the lab report and bask in the warm sunlight and soothing breeze.
        KerbinSrfLandedGrasslands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_02 // A blade of grass flies into the lab and lands right in your experiment, ruining the results. Oh well, we'll just make something up for the folks back at KSC.
        KerbinSrfLandedGrasslands* = #CSS_mobileMaterialsLab_KerbinSrfLandedGrasslands_03 // A butterfly flies into your experiment. You spend a distracting amount of time thinking up various non-lethal methods to get rid of it.
        KerbinSrfLandedHighlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedHighlands_00 // Most of the materials in the lab have either boiled off or frozen at this altitude. You decide that it's not worth the effort to do research, and decide to have some snacks instead.
        KerbinSrfLandedHighlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedHighlands_01 // One of your samples gets loose and you have to go and chase it down as it rolls down the hill.
        KerbinSrfLandedShores* = #CSS_mobileMaterialsLab_KerbinSrfLandedShores_00 // You give the materials lab a wee beach umbrella.
        KerbinSrfLandedShores* = #CSS_mobileMaterialsLab_KerbinSrfLandedShores_01 // Why are you in the lab when you could be at the beach?
        KerbinSrfLandedShores* = #CSS_mobileMaterialsLab_KerbinSrfLandedShores_02 // The report seems to be the same as last time. You wish you could be hanging out on the shores right now.
        KerbinSrfLandedShores* = #CSS_mobileMaterialsLab_KerbinSrfLandedShores_03 // Your lab report contains thinly-veiled suggestions that the next set of experiments be done at the beach. For science, of course.
        KerbinSrfLandedMountains* = #CSS_mobileMaterialsLab_KerbinSrfLandedMountains_00 // The lab slowly rocks back and forth as you perform your experiments perched on top of a particularly craggy mountain.
        KerbinSrfLandedMountains* = #CSS_mobileMaterialsLab_KerbinSrfLandedMountains_00 // You're quite certain that lugging around an entire materials lab while on top of a mountain is as dangerous as it is unnecessary. But hey, you're just an astronaut.
        KerbinSrfLandedDeserts* = #CSS_mobileMaterialsLab_KerbinSrfLandedDeserts_00 // The desert dust appears to have contaminated the samples. You learn that deserts aren't a good place to bring expensive science equipment.
        KerbinSrfLandedDeserts* = #CSS_mobileMaterialsLab_KerbinSrfLandedDeserts_01 // Watching the dust swirl among the samples, you realize that you're going to have to spend a lot of time cleaning them up for the next mission.
        KerbinSrfLandedDeserts* = #CSS_mobileMaterialsLab_KerbinSrfLandedDeserts_02 // You take your juice pack and pour it all over the samples to prepare them for the dry, dusty ordeal they are about to face. Mission Control sighs and tells you to use a different set of samples.
        KerbinSrfLandedBadlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedBadlands_00 // You expose the samples to the badlands of Kerbin, but worry what it will do to them.
        KerbinSrfLandedBadlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedBadlands_01 // Turns out the Badlands is a bad place for a materials lab. Who knew?
        KerbinSrfLandedBadlands* = #CSS_mobileMaterialsLab_KerbinSrfLandedBadlands_02 // Some of your samples are starting to give you attitude. You're pretty sure this a bad sign.
        KerbinSrfLandedTundra* = #CSS_mobileMaterialsLab_KerbinSrfLandedTundra_00 // The samples inside your lab have devolved into a hunter-gatherer state as a response to the harsh conditions of the Tundra.
        KerbinSrfLandedTundra* = #CSS_mobileMaterialsLab_KerbinSrfLandedTundra_01 // The lab seems small and cramped here. You quickly finish your report and get some fresh air.
        KerbinSrfLandedTundra* = #CSS_mobileMaterialsLab_KerbinSrfLandedTundra_02 // As you open the materials bay, snow rapidly accumulates inside, making it difficult to perform your experiments.
        KerbinSrfLandedTundra* = #CSS_mobileMaterialsLab_KerbinSrfLandedTundra_03 // The materials seem to have shrunk in their containers, which makes completing your research difficult. Hey, we're getting hazard pay for this, right?
        KerbinSrfLandedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfLandedIceCaps_00 // The water sample has frozen solid and the goopy samples appear to be extra goopy.
        KerbinSrfLandedIceCaps* = #CSS_mobileMaterialsLab_KerbinSrfLandedIceCaps_01 // Some samples are very brittle, while others have made a fire to warm themselves.
        KerbinSrfLandedNorthernIceShelf* = #CSS_mobileMaterialsLab_KerbinSrfLandedNorthernIceShelf_00 // The materials have congregated around the bay lamp for warmth. It must be pretty darn cold.
        KerbinSrfLandedNorthernIceShelf* = #CSS_mobileMaterialsLab_KerbinSrfLandedNorthernIceShelf_01 // The icy samples keep slipping away from being grabbed. Don't they want to come into the warmth?
        KerbinSrfLandedSouthernIceShelf* = #CSS_mobileMaterialsLab_KerbinSrfLandedSouthernIceShelf_00 // Your samples are huddling together for warmth in the frigid environment.
        KerbinSrfLandedSouthernIceShelf* = #CSS_mobileMaterialsLab_KerbinSrfLandedSouthernIceShelf_01 // The thin glaze of ice that has formed on the bay doors cracks and cascades off as they grind open.
        KerbinSrfSplashedWater* = #CSS_mobileMaterialsLab_KerbinSrfSplashedWater_00 // You submerge the materials bay into the water and it comes back up with a decent haul of codfish.
        KerbinSrfSplashedWater* = #CSS_mobileMaterialsLab_KerbinSrfSplashedWater_01 // Everything has gotten really wet. One of the samples caught fire! Whoa!
        KerbinSrfSplashedWater* = #CSS_mobileMaterialsLab_KerbinSrfSplashedWater_02 // Exposing the power source of the lab to water has been enlightening.
        KerbinSrfSplashedWater* = #CSS_mobileMaterialsLab_KerbinSrfSplashedWater_03 // The materials inside the lab start to mix in with the water. You suspect that might not be very safe.
        KerbinSrfSplashedGrasslands* = #CSS_mobileMaterialsLab_KerbinSrfSplashedGrasslands_00 // As expected, most of the samples sink while others float out. You swear you saw a yellow rubber ducky among them.
        KerbinSrfSplashedShores* = #CSS_mobileMaterialsLab_KerbinSrfSplashedShores_00 // A dastardly seagull has made off with half the samples in the materials lab and left you a foul-smelling present. Damn you seagull, damn you.
        KerbinSrfSplashedShores* = #CSS_mobileMaterialsLab_KerbinSrfSplashedShores_01 // The materials seem to have been contaminated by bits of sand and seaweed, but you perform your experiments anyway.
        KerbinSrfSplashedShores* = #CSS_mobileMaterialsLab_KerbinSrfSplashedShores_02 // As you open the materials bay a seagull flies out and poops on your hand. It seems you can never escape the reach of the beach...
