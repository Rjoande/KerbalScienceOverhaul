        #CSS_seismicScan_LaytheSrfLanded_04 = Hai posato il veicolo proprio sopra una faglia! Lo trovi sia affascinante sia assolutamente terrificante.
        #CSS_seismicScan_LaytheSrfLanded_05 = Laythe mostra un'attività sismica molto importante. Non sai se il veicolo possa sopravvivere a uno tsunami, ma almeno questo mantiene temperata la luna.
        #CSS_seismicScan_LaytheSrfLanded_06 = Le letture fluttuano drasticamente insieme alle onde. Forse sarebbe meglio eseguire questo esperimento sulla terraferma.
