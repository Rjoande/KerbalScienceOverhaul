        #JNSQscience_bd_multiSpec_TyloInSpaceLowMountains_00 = L'imaging multispettrale separa roccia pulita da pendii impolverati, mentre l'infrarosso disegna scarpate termiche ripide. Le montagne sembrano sfidarti ad atterrare.
        #JNSQscience_bd_multiSpec_TyloInSpaceLowHighlands_00 = Gli altipiani mostrano un mix di firme malconcio, coerente con affioramenti antichi e continuo "giardinaggio" da micrometeoriti. La superficie di Tylo sembra perfettamente condita.
        #JNSQscience_bd_multiSpec_TyloInSpaceLowMidlands_00 = Le Midlands tornano come un'impronta stabile e spenta con giusto abbastanza variazione da essere irritante. Scrivi "uniforme" e poi lo cancelli.
        #JNSQscience_bd_multiSpec_TyloInSpaceLowLowlands_00 = Le zone basse tendono al più scuro e leggermente più caldo durante il giorno, suggerendo materiale più fine che si raccoglie nei bacini. La gravità può essere brutale, ma sa comunque come smistare la polvere.
        #JNSQscience_bd_multiSpec_BopInSpaceLowPoles_00 = I poli sono un caos di chiazze luminose e buche scure tra le bande, come se qualcuno avesse sparso ghiaia su una spugna. Bop resta fieramente poco collaborativo.
        #JNSQscience_bd_multiSpec_BopInSpaceLowMountains_00 = Creste ripide producono ombre selvagge e lo spettro cambia a ogni gobba del terreno. L'immagine in falsi colori sembra una mappa stropicciata di sé stessa.
        #JNSQscience_bd_multiSpec_BopInSpaceLowLowlands_00 = Le pianure mostrano firme più uniformi e più scure, coerenti con polvere che si raccoglie in sacche riparate. Finalmente un posto dove qualcosa resta fermo.
        #JNSQscience_bd_multiSpec_BopInSpaceLowMidlands_00 = Le Midlands mostrano chiazze irregolari che si rifiutano di correlare bene tra i canali. Lo scanner le chiama "materiali misti", che è un modo educato per dire "casino".
        #JNSQscience_bd_multiSpec_BopInSpaceLowHighlands_00 = Le zone d'altura si schiariscono leggermente e mostrano depressioni di assorbimento più nette, suggerendo affioramenti più puliti. La geologia migliore di Bop è apparentemente sui pendii meno comodi.
        #JNSQscience_bd_multiSpec_PolInSpaceLowPoles_00 = I poli tornano luminosi e stranamente strutturati su più bande, con trappole fredde che sembrano più profonde del dovuto. Pol sta facendo scorta di cose nel buio, in silenzio.
