        EveInSpaceLow* = #CinematicPack_Expanse_bd_GeigerCounter_EveInSpaceLow_00 // The counter ticks with professional enthusiasm. Mission Control recommends “standard quarantine posture” and refuses to define it.
        EveInSpaceLow* = #CinematicPack_Expanse_bd_GeigerCounter_EveInSpaceLow_01 // A brief spike trips an auto-flag labeled “PURPLE SOLUTION: NOMINAL.” You decide you were happier before you could read.
