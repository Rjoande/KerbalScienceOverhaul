        #GEPscience_bd_dust_BorvoFlyingLowTropicalLowlands_00 = Il rilevatore intercetta in abbondanza particelle della foschia di idrocarburi. Il cielo sembra estraneo anche quando, tecnicamente, è "aria".
        #GEPscience_bd_dust_BorvoFlyingLowTemperateLowlands_00 = La densità dei granuli è bassa ma persistente, abbastanza da velare ottiche e umore. Il sole rosso non aiuta nessuno dei due.
        #GEPscience_bd_dust_BorvoFlyingLowTropicalMidlands_00 = La turbolenza solleva graniglia di dimensioni miste che arriva a raffiche. Lo strumento vive diverse piccole tempeste di sabbia personali.
        #GEPscience_bd_dust_BorvoFlyingLowTemperateMidlands_00 = Gli impatti sono sorprendentemente uniformi, suggerendo uno strato di aerosol stabile. "Stabile" non è la stessa cosa di "sicuro".
        #GEPscience_bd_dust_BorvoFlyingLowHighlands_00 = Meno granuli, ma più veloci e più taglienti. L'aerodinamica sta lavorando, ma sembra scontenta.
        #GEPscience_bd_dust_BorvoFlyingLowMajorCraters_00 = Pennacchi di polvere restano sospesi sopra i bordi dei crateri come lividi nell'aria. Il contatore schizza in alto e poi continua a schizzare.
        #GEPscience_bd_dust_BorvoFlyingLowPoles_00 = L'aria fredda trattiene meno particelle finché una breve burrasca di graniglia di ghiaccio arriva e se ne va senza spiegazioni.
        #GEPscience_bd_dust_BorvoFlyingHigh_00 = Molto sopra la foschia, la polvere diventa un sussurro tenue e costante. Il pianeta sotto sembra calmo nella luce rossa, il che è sospetto.
        #GEPscience_bd_dust_BorvoInSpaceLowTropicalCraquelure_00 = In orbita bassa si registrano sottili pennacchi di fini ejecta sopra le regioni fessurate. La superficie sta ancora facendo briciole.
        #GEPscience_bd_dust_BorvoInSpaceLowTemperateCraquelure_00 = La polvere arriva in bande strette allineate con il terreno. Quasi vedi le fratture nel log degli impatti.
        #GEPscience_bd_dust_BorvoInSpaceLowTropicalLowlands_00 = Una traccia di fuga atmosferica compare come particelle finissime in cima alla colonna. Borvo sta perdendo qualcosa, con educazione.
        #GEPscience_bd_dust_BorvoInSpaceLowTemperateLowlands_00 = Il rilevatore vede ghiaccio misto a granuli scuri, suggerendo rielaborazione chimica nella foschia superiore prima che ricada.
        #GEPscience_bd_dust_BorvoInSpaceLowTropicalMidlands_00 = I tassi di impatto pulsano con la posizione in orbita, come se l'ambiente avesse maree. Te ne accorgi solo quando i dati in ritardo si accumulano.
        #GEPscience_bd_dust_BorvoInSpaceLowTemperateMidlands_00 = Un fondo di polvere stabile rende facile la mappatura e complica i sentimenti. Quassù "facile" è raro.
        #GEPscience_bd_dust_BorvoInSpaceLowHighlands_00 = Impatti grossolani occasionali suggeriscono cedimenti di versante che sollevano detriti per un attimo in orbita. Lo guardi accadere nel passato.
        #GEPscience_bd_dust_BorvoInSpaceLowMajorCraters_00 = Polvere aumentata sopra i crateri maggiori suggerisce giardinaggio da micrometeoroidi e nuovo sollevamento continuo. Il cratere non smette mai di lavorare.
        #GEPscience_bd_dust_BorvoInSpaceLowPoles_00 = I passaggi polari mostrano conteggi radi e granuli molto fini. Il silenzio sembra progettato.
        #GEPscience_bd_dust_BorvoInSpaceHigh_00 = Più lontano, i granuli diventano pochi e antichi. Ogni impatto sembra lo spazio profondo che ti dà un colpetto sulla spalla.
        #GEPscience_bd_dust_DamonaSrfLandedTropicalLowlands_00 = La polvere superficiale è scura, secca e ostinatamente carica di staticità. Si attacca come se sapesse che non puoi semplicemente tornare a casa.
        #GEPscience_bd_dust_DamonaSrfLandedTemperateLowlands_00 = Le dimensioni dei granuli tendono al fine e uniforme, vecchia regolite macinata per ere sotto un debole sole rosso che non l'ha mai scaldata.
        #GEPscience_bd_dust_DamonaSrfLandedTropicalMidlands_00 = Il rilevatore registra polvere lenta e fluttuante sollevata dall'elettrostatica. Qui la gravità è più un suggerimento.
        #GEPscience_bd_dust_DamonaSrfLandedTemperateMidlands_00 = Gli impatti arrivano per lo più da granuli minuscoli e taglienti. La luna sembra fatta di polvere di limatura e silenzio.
        #GEPscience_bd_dust_DamonaSrfLandedHighlands_00 = Dominano schegge più grossolane, probabilmente da fratture antiche. Lo strumento le colleziona come souvenir che nessuno ha chiesto.
        #GEPscience_bd_dust_DamonaSrfLandedImpactBasin_00 = La miscela di polvere include perline vetrose e fini più scure, classica rielaborazione da impatto in un luogo che sembra ricordare.
        #GEPscience_bd_dust_DamonaSrfLandedPoles_00 = Granuli chiari intrappolati dal freddo si mescolano a polvere nera in uno strato fragile. Luccicare resta un problema di manutenzione.
        #GEPscience_bd_dust_DamonaInSpaceLowTropicalLowlands_00 = Un tenue alone di detriti fini accompagna le orbite basse. Damona sta perdendo minuscoli promemoria della sua cattura.
        #GEPscience_bd_dust_DamonaInSpaceLowTemperateLowlands_00 = Gli impatti sono radi ma costanti, quanto basta per non farti dimenticare che sei ancora nel sistema di Grannus.
        #GEPscience_bd_dust_DamonaInSpaceLowTropicalMidlands_00 = La polvere arriva in raffiche irregolari coerenti con piccoli scivolamenti di pendio. La telemetria li segnala dopo che hai già completato due orbite.
        #GEPscience_bd_dust_DamonaInSpaceLowTemperateMidlands_00 = Il rilevatore vede granuli finissimi e molto carichi che indugiano sopra la superficie. Persino il vuoto qui ha le sue fissazioni.
        #GEPscience_bd_dust_DamonaInSpaceLowHighlands_00 = Impatti grossolani occasionali suggeriscono scheggiature recenti da stress termico. Il sole rosso è debole, ma continua a spaccare le cose.
        #GEPscience_bd_dust_DamonaInSpaceLowImpactBasin_00 = Conteggi aumentati sopra il bacino suggeriscono ejecta persistenti su traiettorie pigre. Il cratere continua a lanciare coriandoli che nessuno vuole.
        #GEPscience_bd_dust_DamonaInSpaceLowPoles_00 = I conteggi scendono quasi a zero, poi arrivano pochi impatti duri, come punteggiatura in una frase molto lunga.
        #GEPscience_bd_dust_DamonaInSpaceHigh_00 = In alto restano solo granuli vaganti. Il contatore ticchetta lentamente, e il silenzio fa il resto.
        #GEPscience_bd_dust_EponaSrfLandedTropicalLowlands_00 = Graniglia fine e umida si attacca al campionatore come se pensasse che la lascerai indietro. Sotto il debole sole rosso, "tropicale" sembra una voce.
        #GEPscience_bd_dust_EponaSrfLandedTemperateLowlands_00 = La polvere è insolitamente uniforme, come se fosse stata setacciata da ere di meteo quieto. La lettura arriva al Controllo Missione molto dopo che hai smesso di fissarla.
        #GEPscience_bd_dust_EponaSrfLandedTropicalUplands_00 = Una brezza leggera solleva un sottile velo di polvere che si rifiuta di depositarsi in fretta. Poca luce e ombre lunghe fanno sembrare il tempo fuori calibrazione.
        #GEPscience_bd_dust_EponaSrfLandedTemperateUplands_00 = I granuli mostrano cariche miste e una tendenza ostinata a strisciare sull'alloggiamento. Qui l'elettricità statica sta facendo gran parte dell'esplorazione.
        #GEPscience_bd_dust_EponaSrfLandedHighlands_00 = Particelle più grossolane e taglienti picchiettano l'involucro a ogni vibrazione. Il pianeta sta sabbiando la tua attrezzatura gratis, con cortesia.
        #GEPscience_bd_dust_EponaSrfLandedGrandPeaks_00 = I conteggi degli impatti schizzano in raffiche improvvise, suggerendo raffiche che incanalano graniglia nel terreno elevato. Battezzi il fenomeno "le cime fanno le cime".
        #GEPscience_bd_dust_EponaSrfLandedCraters_00 = La polvere include perline vetrose e fini più scure, i classici resti da impatto. Anche lontano da casa, i crateri continuano a fare coriandoli.
        #GEPscience_bd_dust_EponaSrfLandedVolcanoes_00 = Sfiati caldi sollevano particelle granulari che sul sensore risultano "fresche". L'idea di geologia attiva sotto un sole rosso è entusiasmante e lievemente allarmante.
        #GEPscience_bd_dust_EponaSrfLandedPoles_00 = Per lo più granuli di brina con una spolverata di polvere scura che divora la luce. È bello nel modo in cui rovina le ottiche.
        #GEPscience_bd_dust_EponaFlyingLowTropicalLowlands_00 = L'aria trasporta una foschia persistente di particelle fini che non decidono se essere polvere o aerosol. Lo strumento decide che sono "manutenzione".
        #GEPscience_bd_dust_EponaFlyingLowTemperateLowlands_00 = La densità di polvere sale e scende in lente onde, come meteo con una battuta in ritardo. Tu ricevi prima la battuta, poi i dati.
        #GEPscience_bd_dust_EponaFlyingLowTropicalUplands_00 = Granuli carichi derivano in sottili veli che attraversano la traiettoria di volo come tende invisibili. Lo archivi sotto "non volare attraverso le tende".
        #GEPscience_bd_dust_EponaFlyingLowTemperateUplands_00 = Il contatore ticchetta in modo costante per minuscoli impatti, suggerendo uno strato sospeso di lunga durata. Qui persino il cielo ha bagagli.
        #GEPscience_bd_dust_EponaFlyingLowHighlands_00 = Correnti ascensionali sollevano graniglia tagliente che fa tremare la presa d'aria come un barattolo di snack. Nessuno ha detto alla polvere che non dovrebbe essere croccante.
        #GEPscience_bd_dust_EponaFlyingLowGrandPeaks_00 = Gli impatti arrivano in raffiche ritmiche coerenti con turbolenza da onde orografiche. L'atmosfera suona i tamburi e i tuoi sensori fanno da pelli.
        #GEPscience_bd_dust_EponaFlyingLowCraters_00 = Il volo sopra i bordi dei crateri solleva brevi pennacchi densi di particelle. Il terreno continua a organizzare feste della polvere a cui non avevi dato l'RSVP.
        #GEPscience_bd_dust_EponaFlyingLowVolcanoes_00 = La firma della polvere si sposta verso granuli più pesanti e appena rielaborati. Laggiù qualcosa sta ancora "cuocendo", e sta insaporendo l'aria.
        #GEPscience_bd_dust_EponaFlyingLowPoles_00 = Nel complesso ci sono meno particelle, ma quelle presenti sono dure, ghiacciate e veloci. La "neve" polare trova comunque il modo di pungere.
        #GEPscience_bd_dust_EponaFlyingHigh_00 = Molto in alto, gli impatti diventano rari e rapidi, come tocchi lontani sullo scafo. Il sole rosso sembra più piccolo e il pianeta si sente più grande.
        #GEPscience_bd_dust_EponaInSpaceLowTropicalLowlands_00 = Un sottile alone di fini sollevate segue la traccia orbitale, suggerendo fuga persistente e ricaduta. Epona sta perdendo qualcosa nello spazio, in silenzio.
        #GEPscience_bd_dust_EponaInSpaceLowTemperateLowlands_00 = Il rilevatore mappa un fondo stabile di piccoli granuli, abbastanza regolare da essere rassicurante. Poi ti ricordi dove sei.
        #GEPscience_bd_dust_EponaInSpaceLowTropicalUplands_00 = La polvere compare in tende a chiazze che vanno e vengono tra un passaggio e l'altro. Fare previsioni con ritardo radio sembra archeologia.
        #GEPscience_bd_dust_EponaInSpaceLowTemperateUplands_00 = Le cariche dei granuli variano con l'ora locale, ma l'ora locale è difficile da fidare sotto questo debole sole rosso. I dati dissentono con educazione.
        #GEPscience_bd_dust_EponaInSpaceLowHighlands_00 = Impatti grossolani occasionali suggeriscono che fratture termiche e distacchi di versante continuino ad alimentare detriti verso l'alto. Il sole rosso è un martello lento.
        #GEPscience_bd_dust_EponaInSpaceLowGrandPeaks_00 = Stretti incrementi seguono il terreno più alto, indicando sollevamento localizzato o trasporto guidato da onde. Le cime si stanno rifacendo il meteo, di nuovo.
        #GEPscience_bd_dust_EponaInSpaceLowCraters_00 = I tassi di impatto aumentano sopra i crateri, coerenti con giardinaggio continuo da micrometeoroidi. Anche qui lo spazio continua a "diserbare" la superficie.
        #GEPscience_bd_dust_EponaInSpaceLowVolcanoes_00 = La miscela di polvere tende al "fresco" e al pesante sopra le regioni vulcaniche. Qualunque cosa stia succedendo laggiù, sta lasciando prove.
        #GEPscience_bd_dust_EponaInSpaceLowPoles_00 = Granuli fini e chiari persistono in un velo sottile sopra i poli. Il rilevatore consiglia "evita le cose luccicanti", poco utilmente.
        #GEPscience_bd_dust_EponaInSpaceHigh_00 = Molto più in alto restano solo pochi granuli vaganti, ciascuno antico e ostinato. Il contatore ticchetta come un minuscolo promemoria della distanza.
        #GEPscience_bd_dust_RosmertaSrfLandedTropicalLowlands_00 = La polvere è fredda, farinosa e stranamente appiccicosa in bassa gravità. Si comporta come se avesse aspettato a lungo dei visitatori.
        #GEPscience_bd_dust_RosmertaSrfLandedTemperateLowlands_00 = I granuli fini si depositano lentamente, come se persino cadere fosse facoltativo qui. Il silenzio tra un impatto e l'altro sembra più grande della luna.
        #GEPscience_bd_dust_RosmertaSrfLandedTropicalMidlands_00 = Per un po' gli eventi elettrostatici superano i veri impatti. Lo strumento viene giudicato da cariche invisibili.
        #GEPscience_bd_dust_RosmertaSrfLandedTemperateMidlands_00 = La regolite risulta fortemente rielaborata, classica abrasione da micrometeoroidi senza atmosfera a rendere la storia più morbida.
        #GEPscience_bd_dust_RosmertaSrfLandedHighlands_00 = Dominano schegge grossolane, probabilmente da vecchie fratture. Ogni colpetto sul rilevatore suona come qualcuno che lascia cadere minuscoli attrezzi in un hangar vuoto.
        #GEPscience_bd_dust_RosmertaSrfLandedPoles_00 = Granuli di brina si mescolano a fini scure in uno strato fragile. Sotto la debole luce del sole rosso, "luccichio" significa ancora "abrasione".
        #GEPscience_bd_dust_RosmertaInSpaceLowTropicalLowlands_00 = Un tenue alone di polvere irregolare segue la superficie, probabilmente per sollevamento elettrostatico. Rosmerta sta costruendo una sottile "atmosfera" per pura ostinazione.
        #GEPscience_bd_dust_RosmertaInSpaceLowTemperateLowlands_00 = Il rilevatore vede granuli rari ma costanti, quanto basta per velare strumenti e umore. Nella telemetria, casa sembra lontanissima.
        #GEPscience_bd_dust_RosmertaInSpaceLowTropicalMidlands_00 = Gli impatti arrivano in brevi grappoli coerenti con minuscoli scivolamenti di pendio. I dati raggiungono il Controllo Missione quando la frana sembra già storia.
        #GEPscience_bd_dust_RosmertaInSpaceLowTemperateMidlands_00 = Le dimensioni dei granuli tendono al fine e uniforme, segno di una superficie vecchia e ben "giardinata". Qui non c'è nulla di nuovo tranne te.
        #GEPscience_bd_dust_RosmertaInSpaceLowHighlands_00 = Impatti grossolani occasionali indicano scheggiature recenti da stress termico. Il sole rosso è debole, ma continua a spaccare le rocce.
        #GEPscience_bd_dust_RosmertaInSpaceLowPoles_00 = I conteggi scendono quasi a zero, poi arrivano pochi impatti duri come punteggiatura. È il silenzio che sta facendo quasi tutto il discorso.
        #GEPscience_bd_dust_RosmertaInSpaceHigh_00 = Molto in alto, gli impatti diventano rari e solitari. Ogni granello sembra un messaggio inviato senza aspettarsi risposta.
        #GEPscience_bd_dust_RAB-58ESrfLandedLowlands_00 = La polvere si solleva in lenti sbuffi fluttuanti che si rifiutano di ricadere in fretta. La gravità quasi nulla trasforma ogni impronta in una nube a lungo termine.
        #GEPscience_bd_dust_RAB-58ESrfLandedEasternHighlands_00 = Il sensore registra granuli affilati e angolosi che sembrano appena fratturati. Qualcosa sta ancora rompendo questo piccolo mondo, molto in silenzio.
        #GEPscience_bd_dust_RAB-58ESrfLandedWesternHighlands_00 = La staticità fa strisciare i granuli sull'alloggiamento prima che fluttuino via. Il sassolino non riesce a decidere se tenersi la sua polvere o condividerla.
        #GEPscience_bd_dust_RAB-58EInSpaceLowLowlands_00 = Un sottile spruzzo di detriti segue l'orbita come una coda riluttante. Il rilevatore suggerisce che questo oggetto sia assemblato solo alla buona.
        #GEPscience_bd_dust_RAB-58EInSpaceLowEasternHighlands_00 = Gli impatti arrivano in raffiche irregolari coerenti con micro-scivolamenti su pareti ripide. Tu vedi prima il dopo, poi ti arriva il rapporto.
        #GEPscience_bd_dust_RAB-58EInSpaceLowWesternHighlands_00 = La miscela di polvere si sposta verso granuli finissimi e molto carichi. Persino il vuoto qui ha le sue fissazioni con l'elettricità.
        #GEPscience_bd_dust_RAB-58EInSpaceHigh_00 = Una volta lasciata la sua debole attrazione, torni nello spazio profondo con solo granuli occasionali in compagnia. Il contatore ticchetta come un orologio lontano.
        #GEPscience_bd_dust_CernunnosSrfLandedTropicalLowlands_00 = Polvere scura e fine ricopre il suolo e beve la debole luce rossa. "Tropicale" sembra una scatola etichettata male in un magazzino freddo.
        #GEPscience_bd_dust_CernunnosSrfLandedTemperateLowlands_00 = La regolite è farinosa e antica, macinata da infiniti piccoli impatti. Il sensore la registra con l'entusiasmo di un archivio.
        #GEPscience_bd_dust_CernunnosSrfLandedTropicalMidlands_00 = I granuli di polvere si attaccano, si staccano, poi si riattaccano in cicli guidati dalla staticità. La luna sta allenando la pazienza sulla tua attrezzatura.
        #GEPscience_bd_dust_CernunnosSrfLandedTemperateMidlands_00 = Le dimensioni dei granuli sono strettamente raggruppate, indicando un lento e costante "giardinaggio" con pochissimo trasporto. Qui nulla si muove in fretta, nemmeno le notizie.
        #GEPscience_bd_dust_CernunnosSrfLandedHighlands_00 = Dominano schegge più grossolane che picchiettano l'involucro a ogni vibrazione. Il suono, nei dati, sembra più forte sotto un cielo poco familiare.
        #GEPscience_bd_dust_CernunnosSrfLandedSouthPolarHills_00 = Fini granuli di brina si mescolano a polvere scura in accumuli fragili. Le colline sembrano morbide, le particelle no.
        #GEPscience_bd_dust_CernunnosSrfLandedNorthPole_00 = Il rilevatore legge soprattutto granuli chiari e freddi con occasionali puntini scuri. È la cosa più vicina alla "neve", e vuole comunque graffiare tutto.
        #GEPscience_bd_dust_CernunnosInSpaceLowTropicalLowlands_00 = Un velo tenue di granuli fini indugia appena sopra la superficie, probabilmente per sollevamento elettrostatico. Cernunnos indossa la polvere come una sciarpa sottile.
        #GEPscience_bd_dust_CernunnosInSpaceLowTemperateLowlands_00 = I tassi di impatto sono bassi ma stabili, perfetti per mappare i pericoli durante passaggi lunghi e quieti. Il ritardo radio fa sembrare ogni passaggio più lungo.
        #GEPscience_bd_dust_CernunnosInSpaceLowTropicalMidlands_00 = La polvere compare in veli deboli e a chiazze che derivano senza un motore evidente. L'ambiente sembra organizzato solo dopo che impili i dati in ritardo.
        #GEPscience_bd_dust_CernunnosInSpaceLowTemperateMidlands_00 = Il rilevatore vede granuli finissimi che persistono più in alto del previsto. La spiegazione è probabilmente "staticità", che non è mai soddisfacente.
        #GEPscience_bd_dust_CernunnosInSpaceLowHighlands_00 = Impatti grossolani occasionali suggeriscono fratture termiche e piccoli crolli di roccia. Il debole sole rosso riesce comunque a fare leva e separare le cose.
        #GEPscience_bd_dust_CernunnosInSpaceLowSouthPolarHills_00 = I conteggi calano, poi schizzano brevemente mentre granuli fini scorrono sopra le colline. È come meteo, ma senza aria e senza avviso.
        #GEPscience_bd_dust_CernunnosInSpaceLowNorthPole_00 = I passaggi vicino al polo mostrano impatti radi e granuli estremamente fini. Il silenzio sembra progettato dalla distanza stessa.
        #GEPscience_bd_dust_CernunnosInSpaceHigh_00 = Molto più in alto, la polvere diventa scarsa e antica, ogni colpo un lento promemoria che stai operando lontano dal mondo di casa, nel lungo buio.

        // bd_gammaRay
        #GEPscience_bd_gammaRay_GrannusInSpaceLow_00 = Il contatore gamma va a fondo scala e il computer inizia a contare in notazione scientifica. Grannus non sembra impressionato.
        #GEPscience_bd_gammaRay_GrannusInSpaceHigh_00 = Anche quassù, Grannus "dipinge" i rivelatori con un sibilo costante di luce ad alta energia. Lo registri come "fondo" e ti senti molto piccolo.
        #GEPscience_bd_gammaRay_TaranisInSpaceLow_00 = Sopra il lato diurno incandescente, lo spettro è forte e pulito: soprattutto roccia, con picchi ostinati che non corrispondono alla tabella di consultazione rapida. La nota all'R&D arriverà dopo il prossimo lungo silenzio.
        #GEPscience_bd_gammaRay_TaranisInSpaceHigh_00 = Dall'orbita alta, il terminatore traccia una linea netta: la crosta calda urla in raggi gamma, l'emisfero freddo quasi non sussurra nulla in risposta. Rende la mappatura facile e il sonno confuso.
        #GEPscience_bd_gammaRay_ToutatisInSpaceLow_00 = La fascia del crepuscolo dà i dati migliori: meno flare nel fondo e un indizio di volatili migrati che si aggrappano al lato freddo. Il Controllo Missione chiede se significa "ghiaccio", tu rispondi "forse" e aspetti.
        #GEPscience_bd_gammaRay_ToutatisInSpaceHigh_00 = La scansione globale mostra un patchwork di firme di elementi pesanti sotto un'atmosfera sottile e poco utile. Il crepitio lontano del sole rosso continua a infiltrarsi nelle letture come un coautore non invitato.
        #GEPscience_bd_gammaRay_NodensInSpaceLow_00 = La mappa gamma torna con bande pulite su scala planetaria che sembrano quasi familiari, finché non ricordi che il sole è rosso e il "fondo" non sta mai davvero fermo.
        #GEPscience_bd_gammaRay_NodensInSpaceHigh_00 = Dall'orbita alta le letture si assestano in un sibilo paziente e distante. Archivi ora il dataset e le domande dopo, quando finalmente si apre la prossima finestra radio.
        #GEPscience_bd_gammaRay_BelisamaInSpaceLow_00 = Il lato in rotazione sincrona e il lato buio non si limitano a sembrare diversi: *contano* diverso. Lo spettro si ribalta tra due mondi a ogni mezza orbita e nessuno dei due corrisponde alle slide di addestramento.
        #GEPscience_bd_gammaRay_BelisamaInSpaceHigh_00 = In quota, la firma della luna è un insieme sottile di picchi che viaggia su un bagliore inquieto. Qualcuno propone "roccia semplice", lo strumento dissente con educazione.
        #GEPscience_bd_gammaRay_SucellusInSpaceLow_00 = Il rilevatore qui è più indaffarato di quanto avrebbe diritto di essere. Tra un fondo duro e picchi netti, Sucellus sembra un caveau di tesori con le luci spente.
        #GEPscience_bd_gammaRay_SucellusInSpaceHigh_00 = Anche da molto in alto, lo spettrometro continua a catturare gamma duri che non vogliono mediarsi. Qualunque cosa componga Sucellus, non è timida nel dirlo all'universo.
        #GEPscience_bd_gammaRay_CaireenInSpaceLow_00 = Il contatore gamma scatta a raffiche mentre la piccola luna ruota nel campo visivo, come se non riuscisse a decidersi di cosa sia fatta. Etichetti il file "piccolo corpo, grandi domande" e aspetti il ping di ritorno.
        #GEPscience_bd_gammaRay_CaireenInSpaceHigh_00 = Da lontano, Caireen quasi scompare nel fondo del sole rosso, finché poche linee ostinate non spiccano. Lì dentro si nasconde qualcosa di denso e ci tiene a farsi notare.
        #GEPscience_bd_gammaRay_SironaInSpaceLow_00 = Qui il rilevatore gamma non si "stabilizza" mai davvero: le furiose fasce di Sirona continuano a spargere conteggi duri sulla mappa. Etichetti tutto come "composizione: sì" e ti allontani dalla console.
        #GEPscience_bd_gammaRay_SironaInSpaceHigh_00 = Dall'orbita alta il pianeta diventa un bagliore uniforme e minaccioso sotto il sole rosso. Lo spettro è per lo più fondo quieto con il promemoria occasionale che Sirona non smette di essere pericolosa solo perché sei più lontano.
        #GEPscience_bd_gammaRay_AirmedInSpaceLow_00 = La scansione evidenzia picchi nitidi e ostinati da una superficie senza aria chiaramente "processata" dalla radiazione per un tempo lunghissimo. I dati sembrano antichi, taglienti e un po' offesi che tu li stia leggendo.
        #GEPscience_bd_gammaRay_AirmedInSpaceHigh_00 = In quota, Airmed è un puntino pallido e il rilevatore comincia a "sentire" più il sistema che la luna. Integri più a lungo, aspetti il ritardo radio e ottieni comunque un indizio pulito di elementi pesanti nascosti sotto la polvere.
        #GEPscience_bd_gammaRay_BorvoInSpaceLow_00 = La mappa gamma suggerisce una crosta rocciosa con chiazze strane che non corrispondono né a ghiaccio semplice né a pietra semplice. L'atmosfera sottile aggiunge giusto abbastanza rumore da essere fastidiosa, come una cattiva stazione radio che non riesci a sintonizzare del tutto.
        #GEPscience_bd_gammaRay_BorvoInSpaceHigh_00 = Da molto in alto, la firma di Borvo si media in un insieme ordinato di linee, troppo ordinato. Sospetti che una chimica interessante venga "spalmata" dalla distanza e prendi nota di tornare più basso, se il budget di missione sopravvive al pendolarismo sotto sole rosso.
        #GEPscience_bd_gammaRay_DamonaInSpaceLow_00 = Il rilevatore si accende sopra cicatrici dall'aspetto recente e pianure scure, tracciando ejecta come se fossero stati contornati per un libro di testo non ancora scritto. La superficie fredda non dice nulla, ma i gamma parlano parecchio.
        #GEPscience_bd_gammaRay_DamonaInSpaceHigh_00 = Damona quasi svanisce nel debole fondo finché pochi picchi stretti non si rifiutano di dissolversi. Qualcosa di denso è laggiù e conserva i suoi segreti in silenzio mentre il tuo segnale striscia verso casa, un pacchetto alla volta.
        #GEPscience_bd_gammaRay_EponaInSpaceLow_00 = Lo spettro gamma disegna un mondo roccioso con picchi ostinati che non corrispondono alla libreria "standard". Sotto la debole luce rossa di Grannus, anche i dati che sembrano normali paiono venire da altrove.
        #GEPscience_bd_gammaRay_EponaInSpaceHigh_00 = Dall'orbita alta le letture si smussano in un bagliore quieto con poche linee nette che bucano il fondo. Impacchetti i risultati e guardi il timer di trasmissione salire, un lento scatto alla volta.
        #GEPscience_bd_gammaRay_RosmertaInSpaceLow_00 = La firma della superficie torna stratificata: terreno antico e depositi più recenti che discutono in bande energetiche diverse. La mappa sembra ordinata, ma il sibilo di fondo non ti lascia mai dimenticare in che sistema ti trovi.
        #GEPscience_bd_gammaRay_RosmertaInSpaceHigh_00 = In quota, le linee più forti di Rosmerta svaniscono nel rumore di fondo del sole rosso finché una manciata non si rifiuta di sparire. Le etichetti "interessanti" e cerchi di non pensare a quanto tempo richiederà un "approfondimento".
        #GEPscience_bd_gammaRay_RAB-58EInSpaceLow_00 = Il rilevatore scatta in brevi raffiche irregolari mentre la piccola luna bizzarra scivola sotto lo scanner. Sembra un mucchio di pezzi che non combaciano, tenuti insieme dalla gravità e da cattive decisioni.
        #GEPscience_bd_gammaRay_RAB-58EInSpaceHigh_00 = Da lontano, RAB-58E quasi sparisce nel fondo del sistema, quasi. Un paio di picchi di elementi densi continuano a lampeggiare, come se stesse salutando da una distanza enorme.
        #GEPscience_bd_gammaRay_CernunnosInSpaceLow_00 = La mappa gamma delinea ampie province antiche con sottili cuciture di materiale più pesante che corrono tra loro. Lo spettro sembra calmo e freddo, ma il sole rosso continua ad aggiungere un lieve crepitio inquieto a ogni passaggio.
        #GEPscience_bd_gammaRay_CernunnosInSpaceHigh_00 = In orbita alta, il mondo nano diventa poche linee affidabili in mezzo a molto vuoto. Registri il silenzio tra i conteggi e realizzi che è il primo vero "quieto" che hai avuto da quando hai lasciato casa.

        // bd_GeigerCounter
        #GEPscience_bd_GeigerCounter_GrannusFlyingLow_00 = Il contatore va subito a fondo scala su "NOPE" mentre sfiori il tenue bagliore arrabbiato. Il pacchetto dati arriverà con un ritardo rassicurante.
        #GEPscience_bd_GeigerCounter_GrannusFlyingHigh_00 = I clic si assestano in un ritmo costante e inquietante. Sembra di ascoltare un falò gigantesco da molto, molto lontano.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceHigh_00 = Anche quassù, il rilevatore non diventa mai davvero silenzioso. La risposta del Controllo Missione arriva dopo che hai già smesso di fissare il sole rosso.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthPolarZone_00 = Le letture pulsano come se il polo stesse respirando particelle cariche. Il bagliore aurorale sembra sbagliato sotto un debole sole rosso.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthSubpolarZone_00 = Il contatore gracchia a brevi raffiche, come qualcuno che tamburella impaziente su una linea radio con lungo ritardo.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthTemperateZone_00 = La radiazione di fondo sale e scende seguendo una struttura invisibile. La etichetti "probabilmente roba magnetica" e ti senti molto scientifico.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthTropicZone_00 = Un picco netto attraversa lo strumento e poi svanisce. Ti chiedi cos'altro sia appena passato anche attraverso di te.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowEquatorialZone_00 = Il rilevatore scatta con irritante sicurezza mentre la stella riempie metà finestrino. Cerchi di non battere le palpebre troppo a lungo.
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthTropicZone_00 = Il tasso di conteggio ondeggia mentre la navicella scivola su tenui bande. La luce fa sembrare facoltativo il tuo senso di "giorno".
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthTemperateZone_00 = Un sibilo costante di particelle suggerisce che sei ancora fin troppo vicino. Archivi il rapporto come "funziona come previsto (terrificante)".
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthSubpolarZone_00 = Il ritmo del contatore inciampa, poi torna liscio. Da qualche parte, molto lontano, qualcuno ti chiederà di "ripetere l'esperimento".
        #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthPolarZone_00 = Le letture aumentano con la latitudine, come se il polo fosse un imbuto. Smetti di scherzare finché i bip non si calmano.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceHigh_00 = Il rilevatore ticchetta come un metronomo per cattive decisioni. Il sole sembra abbastanza vicino da litigarci.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowMagmaSea_00 = Sopra il mare luminoso, il tasso di conteggio aumenta abbastanza da farti controllare due volte la schermatura.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowMagmaShores_00 = Picchi di radiazione seguono la costa di lava come un'etichetta di avvertimento. Ti senti tu l'etichetta.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowScorchedLowlands_00 = Lo strumento crepita in modo costante sopra le pianure arse. La luce rossa fa sembrare tutto surriscaldato, compresi i tuoi pensieri.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowMidlands_00 = I clic sono fitti ma ordinati, come se Taranis stesse cercando di essere utile mentre ti è ostile.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowHighlands_00 = Il contatore va brevemente in saturazione mentre passi sopra creste chiare. Decidi che "terreno elevato" non è sempre un vantaggio.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowDarkSideMidlands_00 = Sul lato oscuro e gelato i numeri scendono, ma mai fino al conforto. Il silenzio sembra troppo intenzionale.
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowDarkSideHighlands_00 = Il rilevatore ticchetta piano sugli altopiani in ombra. Il tuo orologio interno rinuncia a chiamare tutto questo "notte".
        #GEPscience_bd_GeigerCounter_TaranisInSpaceLowPoles_00 = I poli risultano stranamente irregolari, come se il pianeta fosse a chiazze di pericoli invisibili. Ti annoti di portare più schermatura che snack. Quasi.
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedMagmaShores_00 = Il contatore Geiger scatta attraverso la tuta come pioggia su un tetto di lamiera. Il suolo brilla e tu fingi che sia normale.
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedScorchedLowlands_00 = Le letture sono estreme e incessanti, perfettamente in linea con il paesaggio incandescente. Smetti di chiederti perché questo pianeta non abbia turisti.
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedMidlands_00 = Lo strumento gracchia senza sosta mentre l'orizzonte tremola di calore. I consigli del Controllo Missione arrivano molto dopo che hai seguito i tuoi.
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedHighlands_00 = Quassù, il tasso di conteggio resta alto ma meno frenetico. È la cosa più vicina che Taranis offra a una "calma".
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedDarkSideMidlands_00 = Il lato oscuro è abbastanza freddo da sembrare sicuro, che è un trucco. Il contatore continua a ticchettare, ricordandoti dove sei davvero.
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedDarkSideHighlands_00 = I numeri risalgono lentamente sulle alture in ombra, come se la roccia covasse in silenzio un rancore contro la tua navicella.
        #GEPscience_bd_GeigerCounter_TaranisSrfLandedPoles_00 = I poli sono cupi e duri, senza un'alba utile a rimettere a posto i nervi. Il gracchiare costante del rilevatore diventa il tuo nuovo orologio.
        #GEPscience_bd_GeigerCounter_TaranisSrfSplashedMagmaSea_00 = Il contatore impazzisce mentre il contenitore campioni finge coraggiosamente di non sciogliersi. Registri il risultato come "lava molto energetica (e anche tutto il resto)".
        #GEPscience_bd_GeigerCounter_TaranisSrfSplashedMagmaShores_00 = Le letture saltano tra "male" e "peggio" mentre il moto ondoso di lava sguazza attorno. Per un attimo ti manca l'acqua normale.
        #GEPscience_bd_GeigerCounter_ToutatisFlyingLow_00 = Nell'aria sottile, il contatore scatta più in fretta di quanto tu riesca a contare. L'orizzonte sembra un confine tra due mondi diversi.
        #GEPscience_bd_GeigerCounter_ToutatisFlyingHigh_00 = Quassù, il rilevatore non tace comunque, ma almeno i bip hanno spazio per riecheggiare nel casco.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceHigh_00 = Molto sopra Toutatis, la radiazione scende a un livello "solo preoccupante". Il debole sole rosso fa sembrare il pianeta illuminato dall'interno.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowSunnyLowlands_00 = Sopra i bassopiani illuminati arsi, il tasso di conteggio sale come se la luce del sole desse i denti all'aria.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowSunnyHighlands_00 = Le colline illuminate respingono luce dura e particelle ancora più dure. Strizzi gli occhi sul display come se servisse.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowTransitionalLowlands_00 = I numeri oscillano nella fascia del crepuscolo, come se il pianeta non riuscisse a decidere cosa voglia farti.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowTransitionalHighlands_00 = I clic del rilevatore arrivano in grappoli irregolari lungo le creste del terminatore. Lo segni come "interessante" e ti senti piccolo.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowDarkSideLowlands_00 = Il lato oscuro sembra tranquillo finché il contatore non ti ricorda che non lo è. L'ombra fredda crepita ancora di rumore invisibile.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowDarkSideHighlands_00 = Le letture restano ostinatamente elevate sopra le colline in ombra. Toutatis non crede nei posti sicuri.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowSoutheasternMountains_00 = Il tasso di conteggio schizza mentre passi sopra un rilievo netto. Ti chiedi se siano alte le montagne sud-orientali o se lo sia il pericolo.
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowWesternMountains_00 = Il rilevatore gracchia senza sosta mentre catene frastagliate scorrono sotto di te. Nel rapporto includi la frase "non consigliato per picnic".
        #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowDarkSideMountains_00 = I clic sembrano più forti quando la vista è più buia. Ti rendi conto che stai usando i bip come compagnia.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedSunnyLowlands_00 = Il contatore scoppietta come popcorn in padella mentre il suolo cuoce sotto il sole rosso. Cerchi di stare nella tua ombra.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedSunnyHighlands_00 = Il vento è sottile, la luce è dura e il rilevatore è più rumoroso della tua sicurezza. Registri il sito come "panoramico, in modo pericoloso".
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedTransitionalLowlands_00 = Nella stretta fascia di comfort, i clic rallentano quanto basta da invitarti a rilassarti. Ti rifiuti di farti fregare due volte.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedTransitionalHighlands_00 = Le colline crepuscolari sembrano quasi vivibili finché il contatore non ti ricorda cosa significhi "quasi" quassù.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedDarkSideLowlands_00 = Le pianure fredde e buie smorzano tutto tranne il contatore Geiger. Tiene il tempo meglio del tuo cervello.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedDarkSideHighlands_00 = Il gracchiare costante del rilevatore ti segue sulla roccia in ombra. Cominci a commentare i tuoi passi per sentirti meno solo.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedSoutheasternMountains_00 = Il tasso di conteggio aumenta con la quota, o forse con quanto ti senti esposto. In ogni caso, decidi di non trattenerti.
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedWesternMountains_00 = Le montagne occidentali bloccano la vista del sole, non la radiazione. Lo annoti sulla checklist sotto "ingiusto".
        #GEPscience_bd_GeigerCounter_ToutatisSrfLandedDarkSideMountains_00 = Nelle catene completamente buie, il contatore diventa l'unico "bollettino meteo" che hai. Previsione: ancora ostile, con lunghi ritardi radio.
        #GEPscience_bd_GeigerCounter_NodensFlyingLow_00 = Il contatore scatta più in fretta nell'aria densa, poi si stabilizza come se avesse trovato un nuovo "normale". Il sole rosso fa sembrare "di giorno" un'idea facoltativa.
        #GEPscience_bd_GeigerCounter_NodensFlyingHigh_00 = Quassù, lo strumento smette di discutere e inizia a conteggiare in silenzio. Invi il pacchetto e cerchi di non pensare alla lunga attesa per un pollice alzato.
        #GEPscience_bd_GeigerCounter_NodensInSpaceHigh_00 = Il conteggio di fondo è calmo, ma mai silenzioso. La stella fioca fissa dal finestrino come se ti stesse osservando a sua volta.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedShores_00 = Il rilevatore gracchia sopra sabbia umida e spruzzi salmastri. I numeri sembrano abbastanza familiari da essere inquietanti così lontano da casa.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedTropicalLowlands_00 = Aria calda e luce aliena fanno sembrare il tasso di conteggio "sorridente". Ricordi allo strumento che non ha una bocca.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedTemperateLowlands_00 = Le letture restano comodamente a metà, come se Nodens cercasse di sembrare accogliente. Tu tieni comunque il casco addosso.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedTropicalMidlands_00 = Un ticchettio regolare accompagna il vento tra alberi o non alberi poco familiari. Lo registri come "biologicamente sospetto".
        #GEPscience_bd_GeigerCounter_NodensSrfLandedTemperateMidlands_00 = Il contatore resta stabile mentre le tue ombre hanno la lunghezza sbagliata sotto il sole rosso. La rassicurazione del Controllo Missione arriva, prima o poi.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedHighlands_00 = I numeri calano leggermente nell'aria più fresca e sottile, come se il pianeta ti stesse facendo un piccolo sconto. Non chiedi quale sia il prezzo intero.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedTundra_00 = I clic sono netti e regolari nel freddo. Il silenzio tra loro sembra più grande di quanto dovrebbe.
        #GEPscience_bd_GeigerCounter_NodensSrfLandedIceCaps_00 = Il rilevatore ticchetta con costanza sopra le calotte ghiacciate chiare che riflettono la debole luce solare come uno specchio opaco. All'improvviso ti manca il colore verde.
        #GEPscience_bd_GeigerCounter_NodensSrfSplashedSaltySeas_00 = Il contatore crepita mentre la sonda dondola nei mari salati scuri. Speri che sia "raggi cosmici" e non "qualcosa nel mare".
        #GEPscience_bd_GeigerCounter_NodensSrfSplashedFreshWater_00 = I clic rallentano un poco, poi riprendono come se nulla fosse successo. Persino il lago sembra lontano da qualunque cosa possa aiutarti.
        #GEPscience_bd_GeigerCounter_NodensSrfSplashedShores_00 = Schiuma bagnata lambisce lo scafo mentre il rilevatore continua a contare come un contabile in ansia. Etichetti il barattolo dei campioni "probabilmente innocuo (famose ultime parole)".
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowSaltySeas_00 = Sopra i mari salati scuri, il tasso di conteggio sale e scende in bande regolari. L'oceano sembra infinito sotto il debole bagliore rosso.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowFreshWater_00 = Il rilevatore ticchetta un po' più piano sopra le zone di acqua dolce, come se il pianeta stesse nascondendo i suoi spigoli. Tu resti poco convinto.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowShores_00 = Lungo le coste, le letture tremolano a ogni passaggio. Il confine tra terra e mare sembra "attivo" in modi che non puoi vedere.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowTropicalLowlands_00 = Il contatore gracchia in raffiche calde e ritmiche. Il tuo orologio interno non sa decidere se sia "mattina", "sera" o "solo rosso".
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowTemperateLowlands_00 = Un livello base tranquillo persiste sopra ampie pianure. È quel tipo di calma che ti fa sospettare cosa stia venendo mediato.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowTropicalMidlands_00 = Il rilevatore segnala picchi gentili sopra terreno ondulato. Ti immagini particelle invisibili che "surfano" nell'alta atmosfera.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowTemperateMidlands_00 = I clic arrivano in grappoli ordinati, quasi come punteggiatura. Non ti piace cosa potrebbe stare dicendo la frase.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowHighlands_00 = Sopra le zone elevate, il tasso si stabilizza e aumenta leggermente. Lo archivi sotto "effetti di quota (e lieve inquietudine)".
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowTundra_00 = Il contatore tiene il tempo sopra distese pallide dove la luce del sole sembra stanca. I dati sembrano più freddi dei numeri.
        #GEPscience_bd_GeigerCounter_NodensInSpaceLowIceCaps_00 = Sopra le calotte ghiacciate, le letture si appiattiscono in un plateau pulito. Vorresti che il collegamento radio fosse altrettanto stabile.
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceHigh_00 = Il rilevatore non diventa mai silenzioso intorno a questa luna, solo meno rumoroso. Nodens incombe enorme nel cielo, ricordandoti quale faccia non vedrai mai da qui.
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedFlats_00 = Il contatore ticchetta regolare sopra un suolo polveroso che non sembra essere stato mai sfiorato da qualcosa di caldo. La tua ombra è netta e il silenzio lo è ancora di più.
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTropicalLowlands_00 = "Tropicale" è, a quanto pare, una cospirazione dei nomi, il rilevatore scatta sotto una luce solare fredda e dura. Aggiungi una nota: "Portare un sole migliore la prossima volta."
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTemperateLowlands_00 = Le letture restano ostinatamente su una fascia intermedia, senza atmosfera a cui dare la colpa. Sospetti che stia parlando la roccia.
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTropicalMidlands_00 = Lo strumento trema a piccole raffiche, come se reagisse a stress nella crosta. Resti immobile, per sicurezza.
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTemperateMidlands_00 = Il tasso di conteggio è stabile e l'orizzonte non cambia mai. Un panorama in rotazione sincrona fa sembrare bloccato anche il tempo.
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedHighlands_00 = In alto, il rilevatore ticchetta più in fretta, come se la quota ti avvicinasse ai guai. Alzi lo sguardo e confermi: sì, lo spazio è ancora lì.
        #GEPscience_bd_GeigerCounter_BelisamaSrfLandedPoles_00 = I clic arrivano con ritmi lenti e pazienti vicino al polo. Ti rendi conto che li stai usando per misurare "quanto sei solo".
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowFlats_00 = Sopra i terreni piatti, il rilevatore traccia un pattern pulito e ripetibile. La luna sembra progettata dalla gravità e dall'ostinazione.
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTropicalLowlands_00 = Il tasso di conteggio sale un poco sopra i bassopiani tropicali esposti al sole. Qui "giorno" è solo "il lato che viene fissato".
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTemperateLowlands_00 = Le letture derivano senza atmosfera a smussare nulla. Decidi che Belisama è allergica al comfort.
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTropicalMidlands_00 = Lo strumento registra picchi netti e stretti sopra terreno increspato. Ti immagini polvere carica che saltella nel debole campo.
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTemperateMidlands_00 = Un sibilo costante di particelle segue la tua orbita come una coda. Ti chiedi se Nodens stia condividendo o se Belisama stia accumulando.
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowHighlands_00 = Sopra le colline, il rilevatore scatta come se stesse contando passi. Non ricordi di aver invitato qualcuno a bordo.
        #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowPoles_00 = I passaggi polari fanno sussultare il contatore in modo imprevedibile, poi si assesta. Lo archivi e accetti che la spiegazione arriverà dopo il prossimo lungo ritardo radio.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceHigh_00 = Il rilevatore quassù non si assesta mai nel silenzio, sceglie solo un nuovo livello base e ti sfida a chiamarlo "sicuro". Il sole rosso sembra piccolo, ma i numeri dissentono.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceLowBasins_00 = Sopra i bacini il tasso di conteggio sale in onde regolari, come meteo invisibile. Lo etichetti "radiazione, probabilmente" e ti senti solo un po' più tranquillo.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceLowLowlands_00 = I clic si infittiscono sopra i bassopiani, come se il suolo stesse perdendo cattive notizie in silenzio. Il ritardo radio ti dà tempo per preoccuparti in modo creativo.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceLowTropicalMidlands_00 = Il contatore gracchia a brevi raffiche sopra le pianure tropicali. "Tropicale" sembra significare "ancora più confuso" sotto un debole sole rosso.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceLowTemperateMidlands_00 = Un sibilo costante di particelle segue la tua orbita. Cominci a usare la sequenza dei bip come un orologio, perché gli occhi non possono fidarsi della luce.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceLowHighlands_00 = Le letture schizzano sopra le colline, poi calano come se nulla fosse successo. Non ti piacciono i pianeti che cambiano idea così in fretta.
        #GEPscience_bd_GeigerCounter_SucellusInSpaceLowPoles_00 = I passaggi polari fanno sussultare il rilevatore in modo imprevedibile, poi si appianano. Lo archivi come "effetti di campo" e cerchi di non immaginare cosa stia facendo il campo.
        #GEPscience_bd_GeigerCounter_SucellusSrfLandedBasins_00 = Il contatore ticchetta regolare sul fondo dei bacini, come se la roccia avesse conservato radiazione per dopo. Tu sei, sfortunatamente, "dopo".
        #GEPscience_bd_GeigerCounter_SucellusSrfLandedLowlands_00 = Lo strumento scatta con irritante sicurezza mentre l'orizzonte resta della stessa tonalità di rosso. Etichetti il sito "pericoloso in silenzio".
        #GEPscience_bd_GeigerCounter_SucellusSrfLandedTropicalMidlands_00 = I numeri salgono e scendono senza una causa evidente. Decidi che l'ipotesi più sicura è che Sucellus ti stia ridendo dietro.
        #GEPscience_bd_GeigerCounter_SucellusSrfLandedTemperateMidlands_00 = Un tasso di conteggio calmo e persistente suggerisce che non sei solo con i tuoi pensieri, sei solo con i tuoi pensieri molto lontano da casa.
        #GEPscience_bd_GeigerCounter_SucellusSrfLandedHighlands_00 = Il rilevatore gracchia più in fretta con la quota, come se ti fossi arrampicato più vicino alla sorgente. Per un attimo pensi di scavare verso il basso, poi ti ricordi della gravità.
        #GEPscience_bd_GeigerCounter_SucellusSrfLandedPoles_00 = I clic sono netti e regolari nella luce fredda dei poli. Senza indizi familiari di alba, i bip diventano il tuo nuovo "giorno/notte".
        #GEPscience_bd_GeigerCounter_CaireenInSpaceHigh_00 = La radiazione di fondo è abbastanza bassa da essere invitante, ma mai abbastanza da essere rassicurante. Il debole sole rosso fa sembrare la capsula una campana da immersione.
        #GEPscience_bd_GeigerCounter_CaireenInSpaceLowLowlands_00 = Il contatore sale e scende sopra i bassopiani in strette bande. È come se Caireen avesse strisce invisibili, ma non per il tuo rilevatore.
        #GEPscience_bd_GeigerCounter_CaireenInSpaceLowMidlands_00 = Un ticchettio regolare ti segue sopra le pianure. Inizi a contare a tua volta, poi smetti quando capisci che lo stai facendo per compagnia.
        #GEPscience_bd_GeigerCounter_CaireenInSpaceLowHighlands_00 = Il rilevatore schizza bruscamente sopra le colline. Controlli due volte la schermatura e una volta il finestrino, nel caso lo spazio stia "entrando".
        #GEPscience_bd_GeigerCounter_CaireenInSpaceLowPoles_00 = I passaggi polari fanno tremolare il tasso di conteggio come un rapporto nervoso. Il Controllo Missione farà domande, le risposte arriveranno dopo che tutti si saranno già preoccupati.
        #GEPscience_bd_GeigerCounter_CaireenSrfLandedLowlands_00 = Il contatore scatta piano su un suolo polveroso che sembra intatto da qualunque cosa calda. All'improvviso ti manca l'idea di "normale radiazione di fondo".
        #GEPscience_bd_GeigerCounter_CaireenSrfLandedMidlands_00 = Le letture restano ostinatamente sopra "quieto" ma sotto "panico". Chiami l'intervallo "Standard Caireen" e fingi che spieghi qualcosa.
        #GEPscience_bd_GeigerCounter_CaireenSrfLandedHighlands_00 = Sulle colline, il rilevatore sembra più impaziente. Scrivi "effetto quota" e tieni gli stivali ben piantati.
        #GEPscience_bd_GeigerCounter_CaireenSrfLandedPoles_00 = Il polo è cupo, freddo e fin troppo immobile. Il gracchiare costante del contatore Geiger diventa la cosa più rumorosa di tutta la luna.
        #GEPscience_bd_GeigerCounter_SironaFlyingLow_00 = Il contatore sferra una raffica di clic come se stesse facendo un provino per un allarme. Le nubi illuminate di rosso inghiottono l'orizzonte e i numeri suggeriscono con educazione di andarsene.
        #GEPscience_bd_GeigerCounter_SironaFlyingHigh_00 = Quassù i clic si attenuano, ma non si fermano mai. Il tenue bagliore sotto fa sembrare "su" e "giù" semplici ipotesi.
        #GEPscience_bd_GeigerCounter_SironaInSpaceHigh_00 = Anche molto lontano, l'ambiente di Sirona non lascia riposare il rilevatore. Trasmetti i dati e aspetti, nel lungo silenzio solitario, una risposta.
        #GEPscience_bd_GeigerCounter_SironaInSpaceLowDarkTropicalBands_00 = Il tasso di conteggio aumenta sopra le fasce tropicali scure come una marea di particelle cariche. Il rilevatore sembra indaffarato, tu ti senti piccolo.
        #GEPscience_bd_GeigerCounter_SironaInSpaceLowLightTropicalBands_00 = Sopra le fasce tropicali chiare i clic si assestano in un tamburellare costante. È quasi rassicurante, finché non ricordi cosa sta contando.
        #GEPscience_bd_GeigerCounter_SironaInSpaceLowDarkTemperateBands_00 = Il rilevatore schizza in grappoli irregolari, poi si calma mentre attraversi vortici più chiari. Le fasce di radiazione di Sirona sembrano... strutturate.
        #GEPscience_bd_GeigerCounter_SironaInSpaceLowLightTemperateBands_00 = Le letture restano alte e pulite, come se il pianeta ti stesse offrendo un grafico ordinato del pericolo. Apprezzi l'organizzazione, non il contenuto.
        #GEPscience_bd_GeigerCounter_SironaInSpaceLowDarkPolarBands_00 = Vicino ai poli, il contatore trema rapidamente come se le linee di campo stessero lottando. Smetti di scherzare finché i bip non rallentano.
        #GEPscience_bd_GeigerCounter_SironaInSpaceLowLightPolarBands_00 = Lo strumento scatta in raffiche secche e regolari sopra il bagliore polare. Lo segni "intenso", poi aggiungi "bellissimo", poi fissi un po' troppo a lungo.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceHigh_00 = Il conteggio di fondo resta ostinatamente elevato, come se qui lo spazio fosse più vicino. Invi i dati e ti alleni alla pazienza durante il lungo silenzio illuminato di rosso.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowTropicalLowlands_00 = Il rilevatore gracchia forte sopra i bassopiani tropicali più chiari, poi schizza di nuovo senza un motivo che tu riesca a vedere. "Estremo" è, a quanto pare, un'impostazione, non un'opinione.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowTemperateLowlands_00 = Il tasso di conteggio pulsa in bande regolari, come onde invisibili che scorrono sulla superficie. I tuoi occhi continuano a volerlo chiamare "giorno", ma la luce non collabora.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowTropicalMidlands_00 = Sopra pianure tropicali malconce i clic si raggruppano in piccoli cluster ansiosi. Lo etichetti "comportamento da luna senza schermatura" e ti senti molto lontano da casa.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowTemperateMidlands_00 = I numeri salgono mentre passi sopra terreno segnato. Ti chiedi se la superficie sia radioattiva o solo offesa che tu stia guardando.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowHighlands_00 = Il contatore sfiora brevemente la saturazione sopra le colline, poi si ritrae come se avesse cambiato idea. Non apprezzi gli sbalzi d'umore in fisica.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowDarkenedLowlands_00 = Terreno più scuro non significa letture più quiete, il rilevatore continua il suo gracchiare implacabile. Il debole sole rosso fa sembrare il contrasto un cartello di avvertimento.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowDarkenedMidlands_00 = Le cicatrici bicolori di Airmed scorrono sotto di te mentre lo strumento ticchetta come un orologio nervoso. L'"interessante!" del Controllo Missione arriva molto dopo.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowDarkenedHighlands_00 = Il tasso di conteggio aumenta bruscamente sopra le colline in ombra. Controlli la schermatura, poi fissi Sirona per sentirti meno solo.
        #GEPscience_bd_GeigerCounter_AirmedInSpaceLowPoles_00 = I passaggi polari fanno tremolare il rilevatore in modo imprevedibile, poi lo inchiodano a un brutto ritmo. Senza indizi familiari di alba, i bip diventano il tuo nuovo programma.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedTropicalLowlands_00 = Il contatore Geiger scatta come un minuscolo metronomo per cattive decisioni. Il sole rosso fa sembrare sbagliata la tua ombra, e i numeri concordano.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedTemperateLowlands_00 = Le letture restano alte e stabili sulla polvere chiara. Per un attimo ti manca la "normale radiazione di fondo", poi ti ricordi che qui quella parola non vale.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedTropicalMidlands_00 = Il contatore rattla più in fretta vicino a cicatrici dall'aspetto recente. Ti annoti di non toccare nulla che sembri essersi arrabbiato di recente.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedTemperateMidlands_00 = Un tasso di conteggio costante e duro suggerisce che Airmed non ha alcun interesse a essere accogliente. Archivi il rapporto e aspetti il ritardo radio con quieta rassegnazione.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedHighlands_00 = In quota, i clic del rilevatore diventano fin troppo entusiasti. Decidi che "terreno elevato" non significa automaticamente "terreno sicuro".
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedDarkenedLowlands_00 = Il suolo è più scuro, ma la radiazione no. Il gracchiare dello strumento è l'unico suono abbastanza forte da sembrare compagnia.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedDarkenedMidlands_00 = I numeri salgono e scendono senza un innesco evidente. Sospetti che la luna ti stia insegnando l'umiltà, un clic alla volta.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedDarkenedHighlands_00 = Il contatore si avvicina al rosso della sua scala e ci resta. Prelevi il campione in fretta, perché la luna non ti paga a ore.
        #GEPscience_bd_GeigerCounter_AirmedSrfLandedPoles_00 = Il polo è cupo e brutalmente immobile sotto il sole rosso. Il ticchettio costante del rilevatore diventa il tuo unico indicatore "giorno/notte".
        #GEPscience_bd_GeigerCounter_BorvoFlyingLow_00 = Nell'aria torbida il contatore clicca con regolarità, poi trema quando attraversi uno strato più denso. La foschia trasforma il sole rosso in una moneta opaca con pessime idee.
        #GEPscience_bd_GeigerCounter_BorvoFlyingHigh_00 = Quassù lo strumento si calma, ma non diventa mai silenzioso. Invi il pacchetto dati e te lo immagini mentre torna a casa alla velocità della burocrazia e della luce.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceHigh_00 = Per una volta la radiazione di fondo è quasi garbata. "Quasi" sembra comunque molto lontano da "confortevole", così sotto un debole sole rosso.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowTropicalCraquelure_00 = Il rilevatore oscilla sopra la crettatura tropicale, come se la superficie stesse perdendo meteo invisibile. Valuti di chiamare il pattern "fratture da stress, ma speziate".
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowTemperateCraquelure_00 = I clic arrivano in gruppi ordinati sopra la crettatura temperata. La luna sembra verniciata e poi spaccata per la scienza.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali bruno beige il tasso di conteggio sale appena, poi si stabilizza. Il "normale" di Borvo sembra sospettosamente ben educato.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowTemperateLowlands_00 = Il rilevatore riporta un livello base uniforme mentre la superficie si rifiuta di dirti se è polvere o ghiaccio. La etichetti "mistero: in corso".
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowTropicalMidlands_00 = Le letture oscillano dolcemente mentre passi sopra foschia stratificata. È difficile capire se le particelle vengano da Borvo, da Sirona o dall'universo che sta facendo lo scortese.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowTemperateMidlands_00 = Lo strumento ticchetta con una sicurezza costante, come se sapesse cosa sta facendo. Vorresti poter dire lo stesso del piano di missione.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowHighlands_00 = Un lieve aumento dei conteggi segue le colline, poi svanisce. Aggiungi una nota: "La topografia influenza la radiazione (e il morale)".
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowMajorCraters_00 = Sopra i crateri maggiori il rilevatore schizza bruscamente, poi cala mentre li superi. Ti chiedi cosa abbiano riportato in superficie gli impatti... e se qualcosa abbia risposto.
        #GEPscience_bd_GeigerCounter_BorvoInSpaceLowPoles_00 = Il contatore trema sopra i poli come se stesse lottando con le linee di campo. Il bagliore aurorale, se c'è, è attenuato in un lieve livido rosso.
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedTropicalCraquelure_00 = Il suolo è un mosaico di crepe sotto luce fioca e il contatore clicca con pazienza secca e costante. ResistI alla tentazione di calpestare le crepe "belle".
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedTemperateCraquelure_00 = Il ticchettio del rilevatore rimbomba dentro il casco mentre la superficie sembra vernice vecchia. Registri: "Borvo è congelato, polveroso o entrambe le cose".
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedTropicalLowlands_00 = L'aria è sottile e strana e il contatore Geiger resta tranquillamente indaffarato. "Radiazione normale" è ancora più strano quando tutto il resto è familiare solo per sbaglio.
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedTemperateLowlands_00 = I numeri restano stabili mentre orizzonti beige svaniscono nella foschia. Con il lungo ritardo radio, ti accorgi che stavi parlando con lo strumento.
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedTropicalMidlands_00 = Il tasso di conteggio aumenta leggermente, poi si assesta, come se Borvo stesse testando la tua reazione. Cerchi di non offrire reazioni divertenti.
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedTemperateMidlands_00 = Il rilevatore ticchetta in modo uniforme mentre aria dall'odore di metano scivola oltre le guarnizioni della tuta, nella tua immaginazione. Decidi di non immaginarlo più.
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedHighlands_00 = Quassù i clic arrivano un po' più rapidi e il vento sembra più sottile. Ti consola il fatto che la fisica sia almeno coerente nell'essere poco d'aiuto.
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedMajorCraters_00 = Il contatore gracchia più forte vicino alle pareti dei crateri maggiori, come se la roccia avesse opinioni. Annoti: "Borvo mantiene radioattiva la propria storia".
        #GEPscience_bd_GeigerCounter_BorvoSrfLandedPoles_00 = La luce polare è fioca, piatta e confusa sotto il sole rosso. Il ticchettio costante del rilevatore diventa l'unico ritmo affidabile che ti resta.
        #GEPscience_bd_GeigerCounter_DamonaInSpaceHigh_00 = Il rilevatore resta spiacevolmente indaffarato anche molto lontano. Damona sembra piccola, grigia e del tutto indifferente alla tua checklist di sicurezza.
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali il tasso di conteggio sale come una rampa regolare. Le cavità della luna proiettano ombre lunghe che non corrispondono a nessuna "normale" ora del giorno.
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowTemperateLowlands_00 = Il rilevatore clicca in cluster serrati, poi si rilassa, come se avessi attraversato un confine invisibile. Lo annoti e senti l'isolamento farsi più tagliente.
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowTropicalMidlands_00 = Le letture salgono e scendono con il terreno come un sistema di allarme silenzioso. Il debole sole rosso fa sembrare la superficie cenere vecchia.
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowTemperateMidlands_00 = Il gracchiare costante del contatore segue la tua orbita come una coda. Ti immagini i dati arrivare a casa molto dopo che avrai smesso di preoccuparti (improbabile).
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowHighlands_00 = Un picco netto ti colpisce mentre passi sopra le colline, poi svanisce. Non ti piacciono le sorprese che arrivano insieme alla radiazione.
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowImpactBasin_00 = Il rilevatore aumenta sopra il bacino d'impatto come se il cratere stesse ancora urlando particelle. Aggiungi una nota: "Passato violento: confermato dai bip".
        #GEPscience_bd_GeigerCounter_DamonaInSpaceLowPoles_00 = I passaggi polari fanno tremolare il tasso di conteggio come un rapporto nervoso. Senza un campo magnetico a dare una mano, Damona sembra esposta e anche tu.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedTropicalLowlands_00 = Il contatore Geiger clicca regolare sulla polvere grigia che sembra intatta da sempre. Ti manca l'idea di "fondo" qualunque cosa sia.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedTemperateLowlands_00 = Le letture sono abbastanza alte da infastidire e abbastanza costanti da inquietare. Aspetti il ritardo radio e ascolti il tuo respiro.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedTropicalMidlands_00 = Il rilevatore ticchetta più in fretta vicino a crateri raggruppati, come se la superficie stesse ancora tenendo il conto. Decidi di non partecipare.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedTemperateMidlands_00 = I numeri oscillano appena mentre il sole resta basso e rosso. La tua percezione del tempo deriva, lo strumento no.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedHighlands_00 = Sulle colline il contatore sembra più impaziente. Prendi le misure in fretta, perché Damona non sembra un posto dove trattenersi.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedImpactBasin_00 = Lo strumento gracchia forte dentro il bacino d'impatto, come se il suolo serbasse rancore. Registri i dati e, in silenzio, concordi.
        #GEPscience_bd_GeigerCounter_DamonaSrfLandedPoles_00 = Al polo fa un freddo quasi assoluto sotto un debole sole rosso, senza indizi rassicuranti di giorno e notte. Il ticchettio costante del rilevatore diventa la tua unica rassicurazione che qualcosa stia succedendo.
        #GEPscience_bd_GeigerCounter_EponaFlyingLow_00 = Il contatore clicca con regolarità nell'aria fredda e sottile, mentre il sole rosso si spalma nella foschia come una spia di avvertimento stanca.
        #GEPscience_bd_GeigerCounter_EponaFlyingHigh_00 = Quassù i bip si appiattiscono su un livello base uniforme. Sembra quasi calma, finché non ricordi quanto tempo impiega "quasi" ad arrivare al Controllo Missione.
        #GEPscience_bd_GeigerCounter_EponaInSpaceHigh_00 = Lo spazio dovrebbe essere silenzioso, ma il rilevatore si rifiuta di essere d'accordo. Trasmetti i numeri e fissi la debole stella rossa mentre la risposta striscia verso casa.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedTropicalLowlands_00 = "Tropicale" sembra ottimistico sotto un debole sole rosso. Il gracchiare costante del contatore suggerisce che il suolo non sia interessato all'ottimismo.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedTemperateLowlands_00 = I clic tengono un'andatura ostinata, a metà, attraverso i bassopiani gelati. La etichetti "quasi normale", poi cancelli subito "normale".
        #GEPscience_bd_GeigerCounter_EponaSrfLandedTropicalUplands_00 = Gli altopiani scricchiolano sotto gli scarponi e il contatore ticchetta come un promemoria paziente che la schermatura non è una scelta di stile di vita.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedTemperateUplands_00 = Le letture salgono leggermente con la quota. Decidi che Epona fa pagare un extra per il panorama.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedHighlands_00 = Il contatore si assesta su un ritmo indaffarato sulla roccia fredda. Il lungo ritardo radio dà ai bip tutto il tempo di diventare il tuo nuovo orologio.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedGrandPeaks_00 = Sui grandi picchi il rilevatore clicca più secco e più in fretta, come se aria sottile e cieli enormi avessero un bagaglio invisibile.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedCraters_00 = Il contatore schizza vicino alle pareti dei crateri, come se gli impatti avessero riportato alla luce qualcosa che vuole ancora attenzione. Tu non gliene dai.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedVolcanoes_00 = Le letture saltano sul terreno vulcanico, come se il calore sotto stesse muovendo più di semplice temperatura. Registri "quasi attivo" e fai un passo indietro.
        #GEPscience_bd_GeigerCounter_EponaSrfLandedPoles_00 = Sopra il ghiaccio polare, il rilevatore continua a ticchettare con una cadenza costante e solitaria. Il sole rosso non somiglia mai davvero a un "giorno".
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali il tasso di conteggio aumenta in ampie bande, come se la radiazione avesse un proprio sistema meteorologico.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowTemperateLowlands_00 = Il rilevatore traccia una curva uniforme sopra le pianure, rassicurantemente coerente in un ambiente che non lo è.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowTropicalUplands_00 = I clic arrivano in raffiche a gruppi sopra gli altopiani tropicali. Ti chiedi se la superficie sia stratificata, o solo irritabile.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowTemperateUplands_00 = I numeri oscillano dolcemente mentre passi sopra gli altopiani temperati. I tuoi occhi non trovano "mezzogiorno", ma lo strumento trova il pericolo.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowHighlands_00 = Un modesto picco segue le colline come un'ombra che non puoi vedere. Lo trasmetti e aspetti nel silenzio lento.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowGrandPeaks_00 = Il contatore balza bruscamente sopra i grandi picchi, poi si assesta come se nulla fosse successo. Non ti fidi di nulla che sappia farlo.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowCraters_00 = Sopra i crateri le letture svolazzano, come se il materiale esposto stesse urlando in particelle. Lo etichetti "esposizione recente" e ti senti a disagio.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowVolcanoes_00 = Il tasso del rilevatore sale un po' sopra i vulcani, suggerendo un cuore caldo sotto una pelle congelata. Speri in silenzio che resti sotto.
        #GEPscience_bd_GeigerCounter_EponaInSpaceLowPoles_00 = I passaggi polari si appiattiscono in un altopiano pulito di clic. È ordinato, ripetibile e profondamente ostile.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceHigh_00 = Il contatore non si rilassa mai davvero vicino a Rosmerta, il fondo è più duro di quanto dovrebbe. Epona incombe sopra come un riparo lontano che non puoi raggiungere in fretta.
        #GEPscience_bd_GeigerCounter_RosmertaSrfLandedTropicalLowlands_00 = Il rilevatore ticchetta svelto sulla polvere senza atmosfera. "Tropicale" qui è solo un nome che qualcuno ha smesso di difendere.
        #GEPscience_bd_GeigerCounter_RosmertaSrfLandedTemperateLowlands_00 = I clic sono costanti e forti nel silenzio del casco. Ti rendi conto che stai ascoltando la radiazione per compagnia.
        #GEPscience_bd_GeigerCounter_RosmertaSrfLandedTropicalMidlands_00 = Il tasso di conteggio sale di un gradino sul terreno più scuro, come se la roccia stesse trattenendo in silenzio segreti energetici.
        #GEPscience_bd_GeigerCounter_RosmertaSrfLandedTemperateMidlands_00 = Il ritmo del rilevatore è costante, come un metronomo dell'isolamento. Il ritardo radio rende in ritardo anche le battute.
        #GEPscience_bd_GeigerCounter_RosmertaSrfLandedHighlands_00 = In alto il contatore gracchia più in fretta e l'orizzonte resta brutalmente immobile. Archivi il rapporto come "desolato, ma indaffarato".
        #GEPscience_bd_GeigerCounter_RosmertaSrfLandedPoles_00 = Il polo è fioco, freddo e inutilmente quieto, tranne il contatore Geiger, che si rifiuta di smettere di parlare.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali il rilevatore clicca in cluster fitti che non corrispondono a nessuno schema che definiresti confortante.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceLowTemperateLowlands_00 = Le letture restano elevate senza un'atmosfera da incolpare. Rosmerta sembra esposta, e anche la tua navicella.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceLowTropicalMidlands_00 = Il tasso di conteggio sobbalza mentre entri nelle pianure tropicali, come se la luna imponesse confini invisibili.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceLowTemperateMidlands_00 = Un sibilo costante di particelle segue la tua orbita. Invi i dati e aspetti il lungo ritardo, illuminato di rosso.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceLowHighlands_00 = Un picco netto colpisce sopra le colline, poi svanisce. Non apprezzi le sorprese che arrivano sotto forma di bip.
        #GEPscience_bd_GeigerCounter_RosmertaInSpaceLowPoles_00 = I passaggi polari fanno tremolare il rilevatore in modo imprevedibile, poi si assesta su un brutto ritmo. Lo segni come "effetti di campo" e mantieni le distanze.
        #GEPscience_bd_GeigerCounter_RAB-58EInSpaceHigh_00 = Il rilevatore clicca in modo irregolare, come se la piccola luna non riuscisse a decidere di cosa sia fatta. Da qualche parte, molto lontano, qualcuno chiederà un secondo passaggio.
        #GEPscience_bd_GeigerCounter_RAB-58ESrfLandedLowlands_00 = Il contatore ticchetta sulla regolite friabile, che potrebbe essere roccia o brina che finge di essere roccia. Etichetti il campione "briciole misteriose".
        #GEPscience_bd_GeigerCounter_RAB-58ESrfLandedEasternHighlands_00 = Le letture salgono sulle colline orientali, poi restano stabili come una sfida. Accetti non fermandoti a lungo.
        #GEPscience_bd_GeigerCounter_RAB-58ESrfLandedWesternHighlands_00 = Qui il contatore gracchia più in fretta e il cielo è solo nero con un debole sole rosso. Improvvisamente capisci perché è stata "catturata".
        #GEPscience_bd_GeigerCounter_RAB-58EInSpaceLowLowlands_00 = Il tasso del rilevatore aumenta sopra i bassopiani con una rampa uniforme, come se stessi sorvolando una sorgente nascosta.
        #GEPscience_bd_GeigerCounter_RAB-58EInSpaceLowEasternHighlands_00 = Sopra le colline orientali il tasso di conteggio schizza in raffiche serrate. Sembra che la piccola luna stia perdendo particelle mentre ruota su se stessa.
        #GEPscience_bd_GeigerCounter_RAB-58EInSpaceLowWesternHighlands_00 = Le letture tremolano sul lato occidentale, poi si calmano senza spiegazioni. Trasmetti l'oscillazione e aspetti il lento "interessante".
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceHigh_00 = Per un corpo così lontano, il fondo è stranamente presente, qui lo spazio non sembra vuoto, solo distante. Il sole rosso è una luce piccola con una lunga portata.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedTropicalLowlands_00 = Il contatore ticchetta con regolarità su ghiaccio chiaro e polvere scura. "Tropicale" è chiaramente un problema di modulistica, non di clima.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedTemperateLowlands_00 = Le letture restano su un livello quieto ma non troppo. Ti ritrovi a rimpiangere l'idea di "caldo" più di quanto ti aspettassi.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedTropicalMidlands_00 = Il rilevatore clicca in ritmi pazienti mentre il paesaggio non fa assolutamente nulla. Inizi a misurare i pensieri tra un bip e l'altro.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedTemperateMidlands_00 = Un tasso di conteggio costante suggerisce che la superficie sia uniformemente fredda e uniformemente indifferente. Il ritardo radio è d'accordo.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedHighlands_00 = Il contatore diventa più indaffarato in quota, come se le colline fossero più vicine alle cattive maniere dello spazio. Non festeggi l'arrivo in cima.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedSouthPolarHills_00 = I bip si fanno più secchi tra le colline polari meridionali, dove le ombre si allungano troppo sotto il sole rosso. La tua idea di "giorno" si dimette in silenzio.
        #GEPscience_bd_GeigerCounter_CernunnosSrfLandedNorthPole_00 = Al polo nord, il gracchiare costante del rilevatore diventa la cosa più rumorosa dell'universo. Archivi il rapporto e ascolti il silenzio lo stesso.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowTropicalLowlands_00 = Sopra i bassopiani tropicali il rilevatore traccia bande lisce e ripetitive, come se la radiazione fosse mappata più ordinatamente del terreno.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowTemperateLowlands_00 = Il tasso di conteggio si appiattisce in un altopiano calmo, calmo nella forma, non nel significato.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowTropicalMidlands_00 = Le letture sobbalzano leggermente mentre entri nelle pianure tropicali. Ti immagini una famiglia di piccoli corpi lì vicino, tutti a contribuire in silenzio.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowTemperateMidlands_00 = Il rilevatore clicca in cluster ordinati che sembrano quasi organizzati. Sospetti che l'universo stia solo lavorando in modo efficiente, non gentile.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowHighlands_00 = Un breve picco segue le colline come una cresta invisibile. Lo trasmetti e aspetti nel lungo ritardo solitario.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowSouthPolarHills_00 = Il contatore trema sopra le colline polari meridionali, poi si stabilizza come se fosse soddisfatto. Tu non sei soddisfatto.
        #GEPscience_bd_GeigerCounter_CernunnosInSpaceLowNorthPole_00 = L'orbita polare fa tremolare il rilevatore in modo imprevedibile, poi lo inchioda a un livello base duro. Il sole rosso non ti dice mai davvero che ora è.

        // bd_hydrometer
        #GEPscience_bd_hydrometer_GrannusFlyingLow_00 = L'igrometro insiste che l'"umidità" è praticamente zero, poi si ferma a chiedersi cosa significhi davvero "umidità" nell'aria rossa e luminosa. I dati arriveranno a casa dopo un'attesa molto paziente.
        #GEPscience_bd_hydrometer_GrannusFlyingHigh_00 = Le letture sono stabili, secche e inquietantemente sterili. Sotto il debole bagliore rosso, inizi a sentire la mancanza di un vero "cielo" da incolpare per il rumore strumentale.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedSunnyLowlands_00 = L'igrometro riporta "croccante". Qualunque cosa possa condensare o è sparita da tempo o si nasconde da qualche parte più fresca, probabilmente dall'altra parte del pianeta e a diverse ore di ritardo radio.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedSunnyHighlands_00 = Aria sottile, luce dura e neanche un accenno di vapore acqueo. Il sensore è così secco che quasi scricchiola mentre registra il numero.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedTransitionalLowlands_00 = L'umidità ha un picco breve mentre il terminatore striscia oltre, poi ricade come una tenda. Qualunque cosa stia condensando qui fuori, non sembra proprio roba da mondo natale.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedTransitionalHighlands_00 = L'igrometro intercetta impulsi deboli e periodici, come un respiro grande quanto un pianeta tra fuoco e ghiaccio. Il Controllo Missione chiede ripetizioni, la risposta arriva dopo che ne hai già fatte tre.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideLowlands_00 = L'aria è così fredda che la "umidità" diventa un problema solido. Lo strumento segnala condensabili presenti, ma soprattutto sotto forma di brina che prova a prendersi l'aspirazione.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideHighlands_00 = Le letture restano vicino a "saturazione" mentre la visiera rimane perfettamente asciutta. A quanto pare l'umidità aliena può essere molto scortese e non essere affatto acqua.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedSoutheasternMountains_00 = Venti turbolenti mescolano strati d'aria con abbastanza condensabili da mandare in confusione la calibrazione. Il grafico sembra un sismogramma disegnato da uno stagista assonnato.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedWesternMountains_00 = Raffiche secche in discesa ripuliscono l'aria. L'igrometro registra numeri così bassi che ricontrolli di non aver installato per sbaglio un termometro.
        #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideMountains_00 = Cristalli di ghiaccio passano davanti alla lampada come brillantini sotto la luce rossa. L'igrometro lo chiama "molto umido" e subito dopo chiede un ciclo di sbrinamento.
        #GEPscience_bd_hydrometer_ToutatisFlyingLow_00 = Volando dentro foschia a chiazze, mappi gradienti di umidità netti che seguono il confine tra giorno e notte. Il pianeta sembra cucito insieme, e le cuciture sono fredde.
        #GEPscience_bd_hydrometer_ToutatisFlyingHigh_00 = Quassù l'aria è sottile e il segnale di umidità si appiattisce fino a quasi nulla. Il sole rosso sembra più piccolo di quanto dovrebbe, e il lungo silenzio alla radio sembra ancora più grande.
        #GEPscience_bd_hydrometer_NodensSrfLandedSaltySeas_00 = L'umidità è alta e l'aria sa di minerali attraverso i filtri. L'igrometro è entusiasta, il vano elettronica no.
        #GEPscience_bd_hydrometer_NodensSrfLandedFreshWater_00 = Le letture di vapore acqueo salgono in fretta e restano lì, come se il pianeta lo mostrasse con orgoglio. Quasi senti le onde, finché non ricordi che a casa il suono non attraversa il vuoto.
        #GEPscience_bd_hydrometer_NodensSrfLandedShores_00 = L'umidità oscilla a ogni brezza dalla linea d'acqua, appannando l'aspirazione e l'umore in egual misura. Il sole rosso fa sembrare la foschia di un viola livido.
        #GEPscience_bd_hydrometer_NodensSrfLandedTropicalLowlands_00 = L'igrometro va a fondo scala in alto e ci resta, con aria compiaciuta. I condensabili sono così abbondanti che inizi a etichettare tutto "può diventare umido durante lo stoccaggio".
        #GEPscience_bd_hydrometer_NodensSrfLandedTemperateLowlands_00 = Umidità moderata, deriva costante e un crepuscolo lento che non corrisponde al tuo istinto. I dati sono confortanti, finché il ritardo radio non ti ricorda dove sei.
        #GEPscience_bd_hydrometer_NodensSrfLandedTropicalMidlands_00 = La convezione pomeridiana spinge l'umidità in su a impulsi, come ascensori invisibili di aria bagnata. Il display è vivace, il cielo è estraneo e la cosa distrae.
        #GEPscience_bd_hydrometer_NodensSrfLandedTemperateMidlands_00 = L'aria più fresca trattiene meno umidità, ma è comunque molta secondo il sensore. L'igrometro registra una curva calma mentre guardi un debole sole rosso tramontare in modo un po' "sbagliato".
        #GEPscience_bd_hydrometer_NodensSrfLandedHighlands_00 = Aria più sottile e secca, con cali notturni netti che tirano fuori rugiada dal nulla. Lo strumento avverte di possibile condensa, tu avverti il Controllo Missione, che lo scoprirà più tardi.
        #GEPscience_bd_hydrometer_NodensSrfLandedTundra_00 = Poca umidità assoluta, ma il sensore continua a intercettare eventi di brina vicino al suolo. È quel tipo di "umidità" che arriva di soppiatto come cristalli, non come gocce.
        #GEPscience_bd_hydrometer_NodensSrfLandedIceCaps_00 = L'igrometro riporta alta umidità relativa e cristalli di ghiaccio in sospensione che intasano l'ingresso come vetro in polvere. Tutto sembra incontaminato, silenzioso e un po' troppo lontano.
        #GEPscience_bd_hydrometer_NodensSrfSplashed_00 = Le letture in immersione arrivano a "100%" all'istante, seguite da una protesta urgente delle tenute del rivestimento. La checklist di recupero viene trasmessa, ricevuta e sospirata in slow motion.
        #GEPscience_bd_hydrometer_NodensFlyingLow_00 = Sfiori strati di aria densa e mappi un profilo umido alimentato dalle nubi. Il segnale è abbastanza forte da sembrare compagnia, finché non guardi la luce strana fuori e ricordi che non lo è.
        #GEPscience_bd_hydrometer_NodensFlyingHigh_00 = L'umidità in alta atmosfera cala di colpo, lasciando una traccia pulita e fredda. Il pianeta sotto sembra invitante, ma la solitudine a lunga distanza resta in cabina.
        #GEPscience_bd_hydrometer_SironaFlyingLow_00 = L'igrometro registra "umidità" come condensabili in tracce in una zuppa di idrogeno soffocante. Sotto le nubi di Sirona, illuminate di un debole rosso, l'unica cosa che sembra bagnata è la tua immaginazione.
        #GEPscience_bd_hydrometer_SironaFlyingHigh_00 = Quassù, nelle bande più chiare, il sensore vede foschie sottili che condensano e svaniscono senza preavviso. Il Controllo Missione chiede cosa significhi, tu rispondi, e la replica torna molto più tardi.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalCraquelure_00 = L'igrometro intercetta brevi picchi mentre il vapore filtra dal suolo fessurato, poi torna al secco. Sembra che la superficie espiri secondo un ritmo che non capisci.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateCraquelure_00 = Le letture di umidità oscillano mentre fenditure fredde "respirano" condensabili in tracce nell'aria. Il grafico è frenetico, ma il cielo resta ostinatamente estraneo.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalLowlands_00 = L'umidità resta bassa ma non zero, giusto quanto basta per brinare l'aspirazione se aspetti durante il lungo crepuscolo. Aggiungi "sbrinare" alla checklist e speri che prima o poi arrivi a casa.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateLowlands_00 = L'igrometro segnala un fondo sottile e costante di condensabili che non si comportano come acqua. Il sole rosso fa sembrare la foschia livida, il che pare poco utile ma accurato.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalMidlands_00 = Una brezza leggera alza la lettura a impulsi, come tasche invisibili di aria umida che scorrono via. Inizi a cronometrarle, poi ricordi che qui fuori il tuo orologio sembra sbagliato.
        #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateMidlands_00 = Il sensore si assesta su una linea calma, finché una lieve nebbia al suolo passa e tutto sobbalza. Lo strumento la definisce "interessante", tu la definisci "inquietante".
        #GEPscience_bd_hydrometer_BorvoSrfLandedHighlands_00 = L'aria è più sottile e più secca, e l'igrometro fatica a trovare qualcosa da contare. Alla fine registra "pochissimo", che è sia un dato sia un umore.
        #GEPscience_bd_hydrometer_BorvoSrfLandedMajorCraters_00 = Vapore intrappolato dal freddo si accumula nelle ombre dei crateri, facendo schizzare l'umidità proprio dove il sole non arriva. La tua ombra è lunga, la luce è rossa e la radio è paziente.
        #GEPscience_bd_hydrometer_BorvoSrfLandedPoles_00 = L'igrometro segnala condizioni vicine alla saturazione che si trasformano subito in cristalli sul rivestimento. Hai scoperto un'"umidità" che morde invece di fare goccioline.
        #GEPscience_bd_hydrometer_BorvoFlyingLow_00 = Gli strati a bassa quota mostrano gradienti di umidità netti che non corrispondono al terreno sottostante. L'atmosfera sembra organizzata per il pianeta di qualcun altro.
        #GEPscience_bd_hydrometer_BorvoFlyingHigh_00 = In alto, il segnale di umidità si appiattisce in un sottile sussurro di condensabili. Il cielo si scurisce in fretta e il tuo istinto non ha diritto di voto.
        #GEPscience_bd_hydrometer_EponaSrfLandedTropicalLowlands_00 = L'igrometro rileva un vapore debole che sale e collassa seguendo lenti segnali giorno-notte alieni. È come se l'aria non sapesse decidere se essere un gas o un ricordo.
        #GEPscience_bd_hydrometer_EponaSrfLandedTemperateLowlands_00 = Una lettura bassa e costante suggerisce secchezza, finché una foschia di passaggio non spinge i numeri e poi sparisce di nuovo. Il sole rosso non scalda, osserva soltanto.
        #GEPscience_bd_hydrometer_EponaSrfLandedTropicalUplands_00 = Lo strumento registra condensabili intermittenti che risalgono il pendio, poi avverte comunque di brina sull'aspirazione. Inizi a sospettare che questo mondo ami gli scherzi pratici.
        #GEPscience_bd_hydrometer_EponaSrfLandedTemperateUplands_00 = L'umidità resta bassa ma persistente, come se qualcosa stesse sublimando appena fuori vista. Il tuo rapporto arriva a casa quando il momento è già passato.
        #GEPscience_bd_hydrometer_EponaSrfLandedHighlands_00 = L'aria è sottile e tagliente, e l'igrometro si impegna per numeri minuscoli. Il display è noioso, il silenzio tra un contatto e l'altro no.
        #GEPscience_bd_hydrometer_EponaSrfLandedGrandPeaks_00 = Vicino ai grandi picchi, l'umidità appare come micro-nebbie brevi e scintillanti che si formano e si sfaldano. Il sensore la chiama attività di condensabili, tu la chiami prova che il pianeta è sveglio.
        #GEPscience_bd_hydrometer_EponaSrfLandedCraters_00 = L'igrometro schizza in conche in ombra dove l'aria fredda si deposita e il vapore indugia. La etichetti "microclima locale" e fai finta che la cosa sia meno inquietante.
        #GEPscience_bd_hydrometer_EponaSrfLandedVolcanoes_00 = Sfiati caldi spingono improvvise impennate di umidità, seguite da cali rapidi mentre il vapore congela. Lo strumento adora i dati, il resto della nave preferisce la distanza.
        #GEPscience_bd_hydrometer_EponaSrfLandedPoles_00 = Il sensore segnala alta umidità relativa che diventa subito brina su tutto ciò che conta. Sotto un debole sole rosso, persino "bagnato" sembra solitario.
        #GEPscience_bd_hydrometer_EponaFlyingLow_00 = Strati di umidità si impilano e si tagliano, creando un profilo che non somiglia per nulla al meteo del mondo natale. L'igrometro è sicuro di sé, tu no.
        #GEPscience_bd_hydrometer_EponaFlyingHigh_00 = In quota, i condensabili si assottigliano fino a quasi zero e il cielo diventa duro e scuro. I numeri sono puliti, ma il ritardo radio fa sembrare la cabina molto lontana.

        // bd_ionElec
        #GEPscience_bd_ionElec_GrannusFlyingHigh_00 = Le letture di ionizzazione schizzano in modo incontrollato, gli strati superiori di Grannus si comportano come un temporale elettrico con opinioni sulla tua antenna.
        #GEPscience_bd_ionElec_GrannusInSpaceLow_00 = Il flusso di particelle cariche vicino a Grannus costringe a continui reset degli strumenti. La scarica statica arriva al Controllo Missione molto dopo che hai finito di andare nel panico.
        #GEPscience_bd_ionElec_GrannusInSpaceHigh_00 = Anche da un'orbita alta il sensore "assaggia" ancora un tenue plasma nel vento. "Lontano", sotto un debole sole rosso, a quanto pare è ancora molto rumoroso.
        #GEPscience_bd_ionElec_TaranisInSpaceLow_00 = Niente atmosfera, ma le particelle solari si schiantano sulla superficie arroventata e rimbalzano come una foschia carica e granulosa. I numeri sono così netti da tagliare.
        #GEPscience_bd_ionElec_TaranisInSpaceHigh_00 = Le letture si dividono nettamente lungo la brutale linea giorno notte: un lato urla, l'altro sussurra, e nessuno dei due risponde alle tue chiamate.
        #GEPscience_bd_ionElec_ToutatisFlyingHigh_00 = L'aria sottile crepita di carica sopra la zona del crepuscolo. La polvere fine si attacca a tutto come se avesse firmato un contratto a lungo termine.
        #GEPscience_bd_ionElec_ToutatisInSpaceLow_00 = Compare una ionosfera debole e sbilenca, che deriva insieme alla linea mobile tra fuoco e ghiaccio. È quasi come se il pianeta respirasse, ma male.
        #GEPscience_bd_ionElec_ToutatisInSpaceHigh_00 = Il conteggio delle particelle cala, poi schizza senza preavviso. Il "suggerimento utile" del Controllo Missione arriva con circa un quarto d'orbita di ritardo.
        #GEPscience_bd_ionElec_NodensFlyingHigh_00 = Il sensore ionico segnala un'atmosfera intensa e ben stratificata, quasi rassicurante, finché la debole luce rossa non fa sembrare i numeri un po' "sbagliati".
        #GEPscience_bd_ionElec_NodensInSpaceLow_00 = Particelle cariche vorticano sopra il bordo di Nodens come un tenue alone aurorale. I grafici migliori arrivano dopo il ritardo radio, con confusione extra inclusa.
        #GEPscience_bd_ionElec_NodensInSpaceHigh_00 = Più lontano, la magnetosfera di Nodens tira ancora il vento solare. Lo strumento insiste che il pianeta "c'è" anche quando sembra solo un puntino colorato.
        #GEPscience_bd_ionElec_BelisamaInSpaceLow_00 = Belisama rilascia un'esosfera sottilissima nel solco di plasma di Nodens. Il sensore cattura brevi picchi ogni volta che attraversi quelle linee di confine invisibili.
        #GEPscience_bd_ionElec_BelisamaInSpaceHigh_00 = Più in alto, le letture si uniformano, finché Belisama non scivola dietro Nodens e il flusso di particelle si zittisce di colpo, come se qualcuno avesse messo in muto lo spazio.
        #GEPscience_bd_ionElec_SucellusInSpaceLow_00 = Con pochissima schermatura, Sucellus resta esposto nella corrente carica. La superficie sembra caricarsi e scaricarsi in impulsi lenti e pungenti.
        #GEPscience_bd_ionElec_SucellusInSpaceHigh_00 = Il flusso di ioni è costante, solitario e implacabile. Il Controllo Missione suggerisce "spegnilo e riaccendilo" con qualche minuto di ritardo.
        #GEPscience_bd_ionElec_CaireenInSpaceLow_00 = Il rivelatore registra un miscuglio caotico di cariche sulla polvere e frammenti sputati via. È meno "ionosfera" e più "piccola luna che perde elettricità statica".
        #GEPscience_bd_ionElec_CaireenInSpaceHigh_00 = Quasi solo silenzio, interrotto da piccoli scoppi secchi. Riesci quasi a sentire il sole rosso che picchietta sullo scafo da molto lontano.
        #GEPscience_bd_ionElec_SironaFlyingHigh_00 = Il sensore ionico va subito a fondo scala, strati carichi, fulmini e aria schiacciante litigano tutti insieme. I grafici arrivano più tardi, e friggono ancora di statico.
        #GEPscience_bd_ionElec_SironaInSpaceLow_00 = Il campo estremo di Sirona trasforma lo spazio vicino in una gabbia ronzante di particelle. Lo strumento inizia a contare più in fretta di quanto le comunicazioni riescano a lamentarsi.
        #GEPscience_bd_ionElec_SironaInSpaceHigh_00 = Anche qui fuori, il flusso di plasma si piega e scatta al rallentatore sotto il sole rosso. "Orbita alta" sembra stare vicino a un elettrodotto lontano.
        #GEPscience_bd_ionElec_AirmedInSpaceLow_00 = Airmed non ha aria da ionizzare, ma la tempesta di particelle intorno non se ne cura. Il sensore registra picchi netti che fanno sembrare il silenzio affollato.
        #GEPscience_bd_ionElec_AirmedInSpaceHigh_00 = Il fondo resta basso, poi salta quando attraversi linee di campo invisibili. Il "Hai provato a riavviare?" del Controllo Missione arriva dopo che il picco è già sparito.
        #GEPscience_bd_ionElec_BorvoFlyingHigh_00 = L'aria sottile di azoto mostra una lieve e ostinata separazione di carica, con un accenno di malizia al metano. La sonda torna con l'odore di statico e cattive decisioni.
        #GEPscience_bd_ionElec_BorvoInSpaceLow_00 = Una ionosfera delicata si aggrappa a Borvo come un alone fragile. I numeri sembrano ordinati, finché la scia di plasma di Sirona non ne increspa i bordi.
        #GEPscience_bd_ionElec_BorvoInSpaceHigh_00 = Il conteggio delle particelle cala con regolarità, poi ondeggia mentre la luna scivola nell'influenza di Sirona. Lo spazio continua a cambiare le regole tra un controllo e l'altro.
        #GEPscience_bd_ionElec_DamonaInSpaceLow_00 = Polvere e granuli di roccia fratturata portano carica come se la stessero accumulando. Una piccola scarica scatta su un pannello e tutti fanno finta che fosse "previsto".
        #GEPscience_bd_ionElec_DamonaInSpaceHigh_00 = Letture per lo più tranquille, con occasionali picchi pungenti dalla magnetosfera lontana del gigante. Qui fuori, persino il vuoto ha il suo meteo.
        #GEPscience_bd_ionElec_EponaFlyingHigh_00 = L'alta atmosfera porta una carica sottile e ostinata che va e viene con il lungo giorno di Epona, sotto un rosso fioco. La radio lo conferma suonando moderatamente offesa.
        #GEPscience_bd_ionElec_EponaInSpaceLow_00 = Una magnetosfera debole trascina il vento solare in lenti riccioli attorno al pianeta. I grafici sono splendidi, una volta che arrivano davvero dopo il lungo ritardo radio.
        #GEPscience_bd_ionElec_EponaInSpaceHigh_00 = Più lontano, il conteggio delle particelle si assottiglia in un sibilo solitario con occasionali picchi netti. Il "meteo spaziale" sotto un sole rosso non rispetta comunque i tuoi orari.
        #GEPscience_bd_ionElec_RosmertaInSpaceLow_00 = Senza aria e senza un campo proprio, Rosmerta assorbe particelle cariche e ne sputa indietro qualcuna. Il sensore lo chiama "carica di superficie", tu lo chiami "non toccare la scaletta".
        #GEPscience_bd_ionElec_RosmertaInSpaceHigh_00 = Le letture si appiattiscono in un fondo stabile finché l'influenza di Epona non torna a spazzare via tutto. È come orbitare una luna quieta dentro una macchina molto più grande e invisibile.
        #GEPscience_bd_ionElec_RAB-58EInSpaceLow_00 = Il conteggio degli ioni schizza in brevi impulsi frastagliati mentre sfiori questo piccolo planetesimo. Qualcosa qui fuori sta caricando polvere e roccia come se volesse costruire una scultura di elettricità statica.
        #GEPscience_bd_ionElec_RAB-58EInSpaceHigh_00 = Per lo più vuoto... poi un picco improvviso mentre attraversi un confine invisibile nell'ambiente di plasma lontano di Epona. L'"interessante!" del Controllo Missione arriva dopo che hai già sobbalzato.
        #GEPscience_bd_ionElec_CernunnosInSpaceLow_00 = Ionizzazione appena percepibile, quanto basta per dimostrare che il sole rosso arriva ancora fin qui. Il vuoto sembra misurato, catalogato e silenziosamente inquietante.
        #GEPscience_bd_ionElec_CernunnosInSpaceHigh_00 = Particelle di fondo passano in rivoli lenti e prevedibili. "Orbita alta" intorno a Cernunnos è meno scienza e più ascoltare l'universo che respira.

        // bd_IRradiometer
        #GEPscience_bd_IRradiometer_GrannusInSpaceHigh_00 = Il radiometro IR fissa il debole bagliore rosso di Grannus. I numeri sembrano calmi, ma il ritardo delle comunicazioni fa sembrare ogni bip una conversazione a lunga distanza.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthPolarZone_00 = La zona polare settentrionale mostra un lieve calo infrarosso, come una calotta più fresca sulla stella. Il Controllo Missione suggerisce "prova a spegnerlo e riaccenderlo" e tu ricevi quel consiglio molto più tardi.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthSubpolarZone_00 = Le letture della zona sub-polare settentrionale suggeriscono deboli punti caldi alla deriva. Si muovono così lentamente che inizi a cronometrarli in pause snack.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthTemperateZone_00 = Il profilo infrarosso si uniforma qui, quasi noioso. "Quasi noioso" è il tipo migliore di emozionante a questa distanza da casa.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthTropicZone_00 = Nella zona tropicale settentrionale compare un lieve incremento di luminosità, poi svanisce come se Grannus avesse battuto le palpebre. Lo strumento insiste di non averle battute per primo.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowEquatorialZone_00 = Nella zona equatoriale i livelli IR salgono e scendono con un ritmo costante, come un riscaldatore stanco in ciclo. Ti chiedi se anche le stelle si stanchino.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthTropicZone_00 = La zona tropicale meridionale mostra una lieve asimmetria nell'emissione infrarossa. La segni come "probabilmente reale", perché discutere con una nana rossa non sembra saggio.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthTemperateZone_00 = L'emissione IR della zona temperata meridionale è coerente, con piccole increspature che potrebbero essere attività superficiale o solo la tua elettronica che cerca di sopravvivere al vicinato.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthSubpolarZone_00 = Il rilevatore intercetta un breve flare infrarosso e poi si stabilizza. Quando il Controllo Missione risponde, il flare è già un ricordo.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthPolarZone_00 = La zona polare meridionale sembra leggermente più fredda, poi improvvisamente no. Grannus rifiuta di restare fermo per grafici ordinati.
        #GEPscience_bd_IRradiometer_TaranisInSpaceHigh_00 = Da un'orbita alta, Taranis appare come un livido bicolore all'infrarosso: un lato che brilla, l'altro quasi morto di freddo. La linea giorno-notte è così netta che sembra un'etichetta di avvertimento.
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowMagmaSea_00 = Il mare di lava satura il radiometro con brevi picchi rabbiosi. Abbassi il guadagno e senti comunque il calore nei numeri.
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowMagmaShores_00 = La costa lavica sfarfalla tra roccia calda e roccia ancora più calda. Valuti per un attimo di rinominare il bioma "Ancora troppo caldo".
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowScorchedLowlands_00 = I bassopiani arsi irradiano calore accumulato molto oltre il punto in cui ti aspetteresti che una superficie si raffreddi. Sotto un debole sole rosso, Taranis trova comunque il modo di brillare.
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowMidlands_00 = Le pianure mostrano contrasti termici a chiazze, come ceramica crepata appena uscita da un forno. Quasi sembra di sentirla scricchiolare, ma lo spazio resta educatamente silenzioso.
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowHighlands_00 = Le creste delle colline si raffreddano più in fretta, producendo profili IR nitidi. È la cosa più vicina al "carino" che puoi misurare senza ammettere emozioni in un rapporto.
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowDarkSideMidlands_00 = Le pianure in ombra a malapena si distinguono sopra la temperatura dello strumento stesso. Il display suggerisce con garbo che stai misurando "freddo".
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowDarkSideHighlands_00 = Le colline in ombra sono così fredde che il radiometro inizia a mettere in dubbio le proprie scelte di vita. Lo rassicuri: almeno non è lui quello fuori.
        #GEPscience_bd_IRradiometer_TaranisInSpaceLowPoles_00 = Le regioni polari oscillano tra estremi a seconda dell'illuminazione locale. Il tuo ritmo circadiano chiede un modulo di reclamo ufficiale.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceHigh_00 = In alto sopra Toutatis, le mappe infrarosse rivelano un emisfero arroventato e uno in ombra, con una stretta cucitura temperata. Sembra un mondo che cerca di decidere cosa vuole essere.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani illuminati brillano caldi all'IR, segno di una forte ritenzione del calore sotto l'atmosfera sottile. La superficie sembra confortevole finché non ricordi cosa significa "illuminati" qui.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowSunnyHighlands_00 = Le colline illuminate mostrano striature più fredde, dove l'altitudine disperde il calore più in fretta. I disegni ricordano neve spazzata dal vento, solo che è tutto sbagliato e tutto caldo.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowTransitionalLowlands_00 = I bassopiani crepuscolari mostrano un gradiente termico delicato, come un compromesso a scala planetaria. Lo registri come "zona di comfort candidata", con molti asterischi.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowTransitionalHighlands_00 = Le colline crepuscolari sono macchiate di zone calde e fredde, indizio di terreno accidentato. Il radiometro traccia una linea pulita, il pianeta si rifiuta.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani in ombra emettono una tenue, costante firma di gelo. Il tuo riscaldatore entra in ciclo più spesso, come se volesse competere.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowDarkSideHighlands_00 = Le colline in ombra risultano come creste fredde e nette contro bacini ancora più freddi. L'oscurità non è vuota: è solo silenziosa a ogni lunghezza d'onda.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowSoutheasternMountains_00 = Le montagne sud-orientali mostrano ombre termiche drammatiche e pareti di roccia ancora calde. Il contrasto le fa sembrare più alte del dovuto, e questo non aiuta.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowWesternMountains_00 = Le montagne occidentali disperdono il calore in modo irregolare, producendo bande IR a strisce. Tu sospetti geologia complessa, il Controllo Missione sospetta che tu abbia lasciato il copriobiettivo.
        #GEPscience_bd_IRradiometer_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne in ombra quasi non brillano affatto, tranne per piccoli punti caldi che scompaiono al passaggio successivo. Li segni per un follow-up, sapendo che "follow-up" richiede tempo quassù.
        #GEPscience_bd_IRradiometer_NodensInSpaceHigh_00 = Il radiometro IR rileva Nodens come una tenue mappa termica in continuo mutamento sotto la debole luce rossa di Grannus. I dati arrivano con tanto ritardo che sembrano già storia.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowSaltySeas_00 = I mari salati irradiano calore in ampie bande uniformi, come se l'intero oceano fosse un enorme accumulatore termico. Le striature più luminose suggeriscono correnti che non puoi vedere, solo misurare.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowFreshWater_00 = Le regioni di acqua dolce si raffreddano più in fretta del terreno circostante, incidendo linee scure nella mappa infrarossa. Il contrasto è così netto che sembra voluto.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowShores_00 = Le coste si accendono come una cucitura termica frastagliata, dove terra e acqua litigano su chi debba tenersi il calore. Il radiometro vota "entrambi", poi registra il compromesso.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali brillano in modo stabile, con lenti impulsi che seguono il lungo e insolito ritmo giorno notte. Il tuo istinto dice "mezzogiorno", ma i numeri non sono d'accordo.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano gradienti delicati e un'ostinata ritenzione del calore. È stranamente rassicurante, finché il ritardo nelle comunicazioni non ti ricorda dove sei.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowTropicalMidlands_00 = Le pianure tropicali irradiano in modo irregolare, come se dorsali spezzate si facessero ombra a vicenda nell'infrarosso. Il terreno scrive la propria firma termica.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowTemperateMidlands_00 = Le pianure temperate producono un disegno IR chiazzato, che suggerisce materiali misti e umidità a macchie. Lo etichetti "geologia", perché "mistero" non è un'unità di misura.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowHighlands_00 = Le colline si raffreddano rapidamente dopo il tramonto, lasciando contorni nitidi e freddi contro bassopiani più caldi. La mappa sembra un progetto di cui qualcuno si è dimenticato di darti la legenda.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowTundra_00 = La tundra resta vicino al limite inferiore dello strumento, con qualche puntino caldo che sparisce al passaggio successivo. Pianifichi scansioni di controllo e accetti l'attesa.
        #GEPscience_bd_IRradiometer_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate appaiono come profonde ombre nell'infrarosso, inghiottendo calore con un'efficienza inquietante. Persino il radiometro sembra sussurrare qui.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama è una piccola moneta silenziosa di calore e ombra che gira in un cielo immenso e quieto. Il tono costante del radiometro sembra più forte del dovuto.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowFlats_00 = I terreni piatti mostrano un'emissione infrarossa ampia e uniforme, come una superficie levigata dal tempo. Minuscoli punti caldi suggeriscono asperità che la camera non riesce a risolvere del tutto.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali si illuminano sul lato rivolto al sole e svaniscono bruscamente verso il terminatore. Il salto termico è così netto che sembra tracciato con un righello.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTemperateLowlands_00 = I bassopiani temperati si raffreddano in un campo morbido e uniforme, interrotto da lievi striature che potrebbero essere piccole dorsali o strati sepolti. Annoti entrambe le cose e fai finta che chiarisca qualcosa.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure tropicali scintillano con bande alternate calde e fredde, come se il suolo fosse a strisce di materiali diversi. Il radiometro si rifiuta di indovinare quali siano "normali".
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTemperateMidlands_00 = Le pianure temperate si assestano in una tessitura termica stabile, appena disturbata dalle ombre. La stabilità è così rara qui fuori che ricontrolli la calibrazione.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowHighlands_00 = Le colline risultano fredde, delineando la topografia con un rilievo infrarosso pulito. I pixel più luminosi restano aggrappati a pareti rocciose illuminate dal sole, come se non volessero lasciarle.
        #GEPscience_bd_IRradiometer_BelisamaInSpaceLowPoles_00 = I poli restano vicino al "molto freddo", salvo brevi bordi più caldi quando la luce sfiora l'estremità. Il ritmo è così lento che inizi a misurare in finestre di comunicazione invece che in minuti.
        #GEPscience_bd_IRradiometer_SucellusInSpaceHigh_00 = Il radiometro IR dipinge Sucellus come una brace metallica fredda in un cielo enorme e silenzioso. La lettura in ritardo fa sembrare lontani persino i numeri "normali".
        #GEPscience_bd_IRradiometer_SucellusInSpaceLowBasins_00 = I bacini trattengono il calore più a lungo del terreno circostante, lasciando ampie macchie calde sulla mappa infrarossa. Il disegno suggerisce materiale pesante, oppure solo un mondo che rifiuta di raffreddarsi con educazione.
        #GEPscience_bd_IRradiometer_SucellusInSpaceLowLowlands_00 = I bassopiani brillano con gradienti uniformi, come un dissipatore avvolto attorno a un pianeta nano. Ti chiedi quanta di quella "calda" sia luce e quanta sia geologia ostinata.
        #GEPscience_bd_IRradiometer_SucellusInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano striature termiche nette dove i pendii scambiano luce per ombra. I riferimenti giorno notte sotto il sole rosso sembrano "storti", ma lo strumento è spietatamente coerente.
        #GEPscience_bd_IRradiometer_SucellusInSpaceLowTemperateMidlands_00 = Le pianure temperate appaiono chiazzate in IR, suggerendo roccia mista e strati sepolti. Il radiometro le definisce "interessanti", che è il massimo dell'emotività che conceda.
        #GEPscience_bd_IRradiometer_SucellusInSpaceLowHighlands_00 = Le colline si raffreddano in fretta, disegnando creste fredde e taglienti contro pianure più calde. Il terreno sembra una bozza per un piano minerario che non hai ancora avuto il coraggio di proporre.
        #GEPscience_bd_IRradiometer_SucellusInSpaceLowPoles_00 = I poli sono profonde ombre nell'infrarosso, con deboli bordi più caldi quando la luce li sfiora. Registri i tempi con cura, perché "più tardi" qui richiede parecchio tempo.
        #GEPscience_bd_IRradiometer_CaireenInSpaceHigh_00 = Caireen si distingue a malapena come un tremolio di calore e ombra, un sassolino catturato con ambizioni. Lo strumento continua a scandagliare comunque, perché "minuscolo" non significa "irrilevante".
        #GEPscience_bd_IRradiometer_CaireenInSpaceLowLowlands_00 = I bassopiani irradiano un freddo sottile e uniforme, come se la superficie fosse stata refrigerata per ere. Ogni tanto compaiono puntini caldi che spariscono prima che tu possa accusarli di essere interessanti.
        #GEPscience_bd_IRradiometer_CaireenInSpaceLowMidlands_00 = Le pianure mostrano un lieve rumore termico che potrebbe essere terreno accidentato o semplicemente un mondo minuscolo che ti prende in giro con la scala dei pixel. Aumenti la risoluzione e ti penti subito del volume dati.
        #GEPscience_bd_IRradiometer_CaireenInSpaceLowHighlands_00 = Le colline emergono come faccette fredde e nette, come pietra scheggiata che restituisce quasi nulla. I numeri ti fanno sentire più freddo, il che probabilmente è psicologico e quindi decisamente reale.
        #GEPscience_bd_IRradiometer_CaireenInSpaceLowPoles_00 = Le regioni polari scendono verso il limite inferiore dello strumento, flirtando con "sei sicuro che sia acceso?". La risposta arriva dopo il ritardo: sì, è acceso e sì, è davvero così freddo.
        #GEPscience_bd_IRradiometer_SironaInSpaceHigh_00 = Il bagliore infrarosso di Sirona scorre in ampie bande, caldo e inquietantemente stabile sotto la debole luce rossa. I campi magnetici fanno brontolare l'elettronica, ma i dati continuano ad arrivare… prima o poi.
        #GEPscience_bd_IRradiometer_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure irradiano firme più profonde e più calde, come se il calore risalisse da sotto. Lo annoti come "energia interna" e ti senti molto piccolo mentre lo scrivi.
        #GEPscience_bd_IRradiometer_SironaInSpaceLowLightTropicalBands_00 = Le bande tropicali chiare brillano di più nell'IR riflesso, mascherando quello che succede sotto. Lo strumento ti ricorda con educazione che "luminoso" non significa "sicuro".
        #GEPscience_bd_IRradiometer_SironaInSpaceLowDarkTemperateBands_00 = Le bande temperate scure mostrano punti caldi irregolari che si spostano tra un passaggio e l'altro. Provi a correlare con l'ora, poi ricordi che il tempo è relativo e il tuo sonno ha perso la discussione giorni fa.
        #GEPscience_bd_IRradiometer_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare appaiono più uniformi e più fredde, come uno strato calmo sopra la turbolenza. "Calmo" è una parola sospetta intorno a un gigante gassoso.
        #GEPscience_bd_IRradiometer_SironaInSpaceLowDarkPolarBands_00 = Le bande polari scure emettono un calore tenue e persistente che non torna con l'illuminazione. Il radiometro suggerisce circolazione, il tuo istinto suggerisce di allontanarti lentamente.
        #GEPscience_bd_IRradiometer_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare lampeggiano con sottili variazioni IR, come se foschie sottili catturassero e riemettessero calore. I pattern sono bellissimi, in un modo strettamente approvato dai dati.
        #GEPscience_bd_IRradiometer_AirmedInSpaceHigh_00 = Il radiometro IR trasforma Airmed in una moneta termica bicolore sotto la debole luce rossa di Grannus. I dati sono buoni, è la lunga pausa prima che "buoni" arrivi a sembrarti strana.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano un calore ampio e ostinato, come roccia martoriata che si rifiuta di raffreddarsi "in orario". La lettura indica temperature "basse", ma qui "basso" è relativo.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowTemperateLowlands_00 = I bassopiani temperati sfumano in toni più freddi con margini netti dove il terreno cambia all'improvviso. È una mappa di cicatrici, ma in infrarosso.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowTropicalMidlands_00 = Le pianure tropicali tremolano tra dorsali calde e avvallamenti freddi al variare dell'angolo di osservazione. Registri il pattern e fai finta che il ritardo lo renda meno inquietante.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowTemperateMidlands_00 = Le pianure temperate appaiono chiazzate, come se la superficie fosse cucita con materiali diversi. Al radiometro non importa perché: gli basta che sia così.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowHighlands_00 = Le colline si raffreddano in fretta e tracciano contorni scuri e nitidi sulla mappa IR. Lo strumento le chiama educatamente "strutture fredde", che è accurato e profondamente poco d'aiuto.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani oscurati irradiano meno, inghiottendo calore come un rivestimento opaco. Per un attimo ti chiedi cosa li abbia resi così, poi ricordi che non puoi interrogare le rocce.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowDarkenedMidlands_00 = Le pianure oscurate mostrano deboli puntini caldi che vanno e vengono tra i passaggi. Probabilmente è solo terreno irregolare… probabilmente.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowDarkenedHighlands_00 = Le colline oscurate sono quasi prive di dettagli in IR, fredde e silenziose. L'unica cosa vivace qui è il tono di autotest dello strumento.
        #GEPscience_bd_IRradiometer_AirmedInSpaceLowPoles_00 = I poli stanno vicino al fondo scala, con sottili bordi più caldi quando la luce li sfiora. Il tuo senso di "giorno" perde un'altra discussione contro la geometria.
        #GEPscience_bd_IRradiometer_BorvoInSpaceHigh_00 = Dall'orbita alta su Borvo, il radiometro IR coglie un debole bagliore atmosferico avvolto attorno a un mondo freddo. I numeri arrivano tardi, come se anche loro dovessero "pensare" alla distanza.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowTropicalCraquelure_00 = Le regioni di craquelure tropicale si spezzano in frammenti caldi e freddi nella mappa IR, come smalto crepato su una tazza grande quanto un pianeta. Resisti alla tentazione di scrivere "probabilmente fragile".
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowTemperateCraquelure_00 = La craquelure temperata mostra contrasti termici più profondi, suggerendo fratture e creste con diversa capacità di trattenere calore. Il disegno è abbastanza ordinato da mettere a disagio.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali irradiano in modo uniforme, con una lieve foschia IR che suggerisce che la sottile atmosfera di Borvo trattenga un po' di calore. "Un po'" è comunque più del vuoto.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowTemperateLowlands_00 = I bassopiani temperati si raffreddano in ampi campi regolari con gradienti gentili verso l'ombra. Il mondo sembra calmo, ma il ritardo nelle comunicazioni lo fa sentire lontano.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano calore a strisce lungo i pendii, dove luce e terreno negoziano al rallentatore. Nel rapporto scrivi "topografia", nel cervello scrivi "dilatazione del tempo (emotiva)".
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowTemperateMidlands_00 = Le pianure temperate sono punteggiate da sottili punti caldi che persistono tra i passaggi. Sospetti materiali misti, Mission Control sospetta che ti piaccia la suspense.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowHighlands_00 = Le colline appaiono come creste fredde con facce rivolte al sole un po' più tiepide. Lo strumento fa sembrare Borvo scolpito in argilla gelata e ostinazione.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowMajorCraters_00 = I crateri principali intrappolano e riemettono calore lungo le pareti interne, disegnando mezzalune luminose nell'infrarosso. I fondi restano freddi, come se avessero rinunciato.
        #GEPscience_bd_IRradiometer_BorvoInSpaceLowPoles_00 = Le letture polari scendono e si appiattiscono, con un debole bagliore atmosferico sopra il bordo. È abbastanza silenzioso che inizi a sentire i click del radiometro come "compagnia".
        #GEPscience_bd_IRradiometer_DamonaInSpaceHigh_00 = Damona appare come una piccola perforazione fredda nel buio, poco più di un sussurro all'infrarosso. Quaggiù, persino "rilevato" sembra un traguardo.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano un calore sottile e debole che svanisce rapidamente nell'ombra. Il terminatore sembra un interruttore che viene azionato—lentamente.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowTemperateLowlands_00 = I bassopiani temperati si assestano in un freddo uniforme con minuscole variazioni su cui non puoi fare a meno di zoomare. Non trovi nulla di conclusivo, e in qualche modo è anche peggio.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowTropicalMidlands_00 = Le pianure tropicali tracciano deboli bande termiche su terreno consumato, come se il suolo ricordasse dove "stava" la luce. Il radiometro ricorda solo ciò che vede adesso.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowTemperateMidlands_00 = Le pianure temperate sono perlopiù fredde, con occasionali pixel caldi che scompaiono al passaggio successivo. Li segnali, sapendo che "passaggio successivo" è un'attesa a sé.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowHighlands_00 = Le colline sono scure nell'infrarosso, taglienti e senza compromessi. La lettura suggerisce di smettere di aspettarti che "caldo" significhi qualcosa qui.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowImpactBasin_00 = Il bacino d'impatto mostra un calore sottile lungo le pareti fratturate, come roccia livida che trattiene energia. Il centro resta più freddo, come se il cratere fosse ancora offeso.
        #GEPscience_bd_IRradiometer_DamonaInSpaceLowPoles_00 = I poli scendono verso il limite inferiore dello strumento, quasi indistinguibili dallo spazio stesso. Il radiometro conferma che è ancora acceso, tu confermi di essere ancora molto lontano da casa.
        #GEPscience_bd_IRradiometer_EponaInSpaceHigh_00 = Il radiometro IR riduce Epona a un bagliore morbido sotto la debole luce rossa di Grannus. Le curve termiche sembrano plausibili, ma il ritardo rende "adesso" una teoria.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali trattengono un calore ostinato, come se l'atmosfera razionasse energia per la lunga notte. Il tuo istinto si aspetta "giorno", i numeri non sono d'accordo.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowTemperateLowlands_00 = I bassopiani temperati si raffreddano in gradienti regolari, con deboli bande che suggeriscono venti lenti che spostano il calore. Il radiometro lo chiama "circolazione", tu lo chiami "inquietante ma efficiente".
        #GEPscience_bd_IRradiometer_EponaInSpaceLowTropicalUplands_00 = Gli altopiani scaricano calore più in fretta, tracciando creste con un rilievo IR nitido. È una mappa dell'altitudine disegnata in temperatura, senza bisogno che la luce sia drammatica.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowTemperateUplands_00 = Gli altopiani temperati mostrano inerzia termica a chiazze, come un terreno misto che decide se essere roccia, ghiaccio o qualcosa nel mezzo. Lo strumento si rifiuta di indovinare, e anche tu.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowHighlands_00 = Le colline appaiono complessivamente più fredde, con facce al sole leggermente più tiepide che svaniscono subito nell'ombra. La transizione giorno/notte è lenta, ma il gelo è immediato.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowGrandPeaks_00 = Le grandi vette si delineano come spine gelide e taglienti, tranne dove catturano per un attimo il bagliore del sole rosso. Per un momento il terreno sembra vivo—poi la lettura torna a "nope".
        #GEPscience_bd_IRradiometer_EponaInSpaceLowCraters_00 = Le pareti dei crateri disegnano mezzalune luminose mentre i fondi restano scuri e freddi, accumulando ombra come fosse preziosa. Segni "possibili trappole fredde" e senti la distanza in ogni tasto premuto.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowVolcanoes_00 = I vulcani mandano il canale IR in picchi abbastanza forti da innervosire la routine di calibrazione. Se Epona ha un cuore caldo, non lo sta nascondendo.
        #GEPscience_bd_IRradiometer_EponaInSpaceLowPoles_00 = I poli scendono verso il fondo scala, con sottili bordi più caldi quando la luce sfiora l'orlo. Il "mattino" arriva come una curva gentile su un grafico, ore dopo che lo volevi.
        #GEPscience_bd_IRradiometer_RosmertaInSpaceHigh_00 = Rosmerta è una minuscola pietra gelida senza aria, con una firma termica debole e tantissimo silenzio. Il radiometro funziona, è l'universo che si prende tutto il tempo di rispondere.
        #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali si raffreddano rapidamente appena scivolano nell'ombra, lasciando un confine infrarosso netto. Senza atmosfera, Rosmerta non fa "graduale".
        #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTemperateLowlands_00 = I bassopiani temperati stanno vicino al "molto freddo", con un lieve tepore sui pendii illuminati. Il radiometro conferma: la luce solare è ancora una cosa, anche quaggiù.
        #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano pixel caldi e freddi a chiazze per via del terreno ruvido e degli angoli ripidi. Aspetti più il pacchetto dati di quanto la superficie resti calda.
        #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTemperateMidlands_00 = Le pianure temperate appaiono uniformemente gelide, spezzate solo da orli di crateri luminosi che catturano il sole rosso. È il tipo di desolazione più "bella".
        #GEPscience_bd_IRradiometer_RosmertaInSpaceLowHighlands_00 = Le colline risultano come creste fredde e nitide con minima ritenzione di calore. L'elettronica dello strumento è praticamente l'oggetto più caldo del vicinato.
        #GEPscience_bd_IRradiometer_RosmertaInSpaceLowPoles_00 = I poli sono ombre infrarosse profonde che cambiano a malapena tra un passaggio e l'altro. Il radiometro lo registra come "stabile", la tua tuta lo registra come "no grazie".
        #GEPscience_bd_IRradiometer_RAB-58EInSpaceHigh_00 = RAB-58E si vede a malapena: un puntino catturato con un sussurro termico e una lunga strada prima che sembri familiare. Persino il bip suona solo.
        #GEPscience_bd_IRradiometer_RAB-58EInSpaceLowLowlands_00 = I bassopiani mostrano un'emissione debole e uniforme che crolla istantaneamente al terminatore. Su un corpo così piccolo, la "notte" è un interruttore, non una fase.
        #GEPscience_bd_IRradiometer_RAB-58EInSpaceLowEasternHighlands_00 = Gli altopiani orientali dipingono faccette fredde e taglienti in IR, come vetro scheggiato che ha dimenticato come si fa a essere caldo. Zoomi, poi ricordi che i pixel non sono risposte.
        #GEPscience_bd_IRradiometer_RAB-58EInSpaceLowWesternHighlands_00 = Gli altopiani occidentali sembrano simili, ma con curve di raffreddamento leggermente diverse che suggeriscono materiali differenti. Lo etichetti "variazione di composizione" e speri basti.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceHigh_00 = Cernunnos brilla debolmente contro il nero, un piccolo mondo nano ghiacciato con giusto abbastanza infrarosso per provare che esiste. Il ritardo fa sembrare lo studio un ricordo.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano un calore sottile sul lato illuminato, poi precipitano nel buio al bordo. Il sole rosso concede calore con parsimonia, come se stesse conservando carburante.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowTemperateLowlands_00 = I bassopiani temperati si raffreddano in campi ampi e uniformi con minuscole increspature dovute al terreno. La mappa è calma, ma il vuoto intorno non lo è.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano ombre termiche a strisce lungo i pendii, facendo sembrare il rilievo esagerato. Il tuo senso di "mezzogiorno" compila un reclamo e viene ignorato.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowTemperateMidlands_00 = Le pianure temperate sono quasi uniformemente fredde, con occasionali orli tiepidi dove la luce sfiora i bordi dei crateri. Il radiometro lo chiama geometria, tu lo chiami addestramento alla pazienza.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowHighlands_00 = Le colline appaiono come spine e bacini freddi, una topografia IR pulita disegnata in negativo. Apprezzi la chiarezza, poi la diffidi subito.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowSouthPolarHills_00 = Le colline del polo sud restano in un gelo persistente, con brevi lampi tiepidi quando l'illuminazione cattura una cresta. Il calore non dura mai abbastanza da sembrare reale.
        #GEPscience_bd_IRradiometer_CernunnosInSpaceLowNorthPole_00 = Il polo nord è un profondo pozzo termico con variazioni minime tra i passaggi. Se qualcosa è intrappolato al freddo qui, sta facendo un ottimo lavoro a restare freddo.

        // bd_IRspec
        #GEPscience_bd_IRspec_GrannusInSpaceHigh_00 = Lo spettrometro registra il calore costante e rosso-fioco di Grannus, finché un flare fa impennare i valori e lo strumento suggerisce educatamente la modalità sicura.
        #GEPscience_bd_IRspec_GrannusInSpaceLowNorthPolarZone_00 = Le bande infrarosse mostrano regioni più fredde avvolte attorno al polo, con filamenti più caldi intrecciati come se qualcuno avesse mescolato la stella con un cucchiaio.
        #GEPscience_bd_IRspec_GrannusInSpaceLowNorthSubpolarZone_00 = La scansione trova un mosaico chiazzato di bagliore più caldo e meno caldo, lo etichetti "non ancora in fiamme" e lo trasmetti nel lungo buio.
        #GEPscience_bd_IRspec_GrannusInSpaceLowNorthTemperateZone_00 = Le strutture termiche scorrono e si tagliano nel campo visivo più in fretta della tua fiducia nelle costanti di calibrazione.
        #GEPscience_bd_IRspec_GrannusInSpaceLowNorthTropicZone_00 = Gli spettri IR suggeriscono temperature stratificate che non tornano con nessun modello ordinato, la risposta del Controllo Missione arriva dopo che ti sei già preoccupato due volte.
        #GEPscience_bd_IRspec_GrannusInSpaceLowEquatorialZone_00 = Il bagliore equatoriale increspa con picchi ampi e mobili—come un falò grande quanto un sistema che prova a fingere calma.
        #GEPscience_bd_IRspec_GrannusInSpaceLowSouthTropicZone_00 = Nei dati catturi un pennacchio caldo improvviso e, d'istinto, controlli se erano i tuoi snack. Non erano i tuoi snack.
        #GEPscience_bd_IRspec_GrannusInSpaceLowSouthTemperateZone_00 = Lo spettrometro mappa gradienti sottili che rendono "giorno" e "notte" parole senza significato, così lontano da casa.
        #GEPscience_bd_IRspec_GrannusInSpaceLowSouthSubpolarZone_00 = Compare una lieve asimmetria termica lungo il bordo, gli scienziati a casa ci litigheranno sopra quando il tuo pacchetto finalmente arriverà.
        #GEPscience_bd_IRspec_GrannusInSpaceLowSouthPolarZone_00 = La regione polare risulta stranamente strutturata—corsie più fredde accanto ad archi più caldi—come se la stella stesse disegnando schemi che non riesci a decifrare.
        #GEPscience_bd_IRspec_TaranisInSpaceHigh_00 = Da molto in alto, Taranis è un bersaglio IR bicolore: un emisfero accecantemente caldo, l'altro un vuoto freddo che manda fuori fase il tuo orologio.
        #GEPscience_bd_IRspec_TaranisInSpaceLowMagmaSea_00 = Lo spettro è dominato da un'intensa emissione termica, annoti "roccia liquida confermata" e speri che nessuno chieda un campione.
        #GEPscience_bd_IRspec_TaranisInSpaceLowMagmaShores_00 = Lungo il bordo incandescente, la firma IR cambia bruscamente da fuso a crosta—come se il pianeta provasse a indossare un cappello sottile.
        #GEPscience_bd_IRspec_TaranisInSpaceLowScorchedLowlands_00 = La scansione segnala superfici fresche e intrise di calore con caratteristiche di assorbimento che suggeriscono minerali cotti ben oltre il "punto di cottura".
        #GEPscience_bd_IRspec_TaranisInSpaceLowMidlands_00 = Isole più fresche nei dati implicano placche crostali più spesse, ti chiedi quanto restino integre prima del prossimo ciclo di "forno".
        #GEPscience_bd_IRspec_TaranisInSpaceLowHighlands_00 = Le colline irradiano meno calore del previsto, poi impennano quando ruotano sotto il sole rosso implacabile—il grafico sembra ansimare.
        #GEPscience_bd_IRspec_TaranisInSpaceLowDarkSideMidlands_00 = Sul lato oscuro, lo spettrometro cerca calore e trova quasi nulla, persino lo strumento sembra esitare prima di riportarlo.
        #GEPscience_bd_IRspec_TaranisInSpaceLowDarkSideHighlands_00 = Creste gelate brillano debolmente in IR, giusto quanto basta per provare che esistono, è il dataset più silenzioso che tu abbia mai registrato.
        #GEPscience_bd_IRspec_TaranisInSpaceLowPoles_00 = La scansione polare mostra un contrasto estremo con zone di transizione sottilissime, qui l'"alba" è più una linea netta che un momento della giornata.
        #GEPscience_bd_IRspec_ToutatisInSpaceHigh_00 = In alta orbita su Toutatis, gli spettri IR colgono l'impronta di una sottile atmosfera stratificata sopra un mondo caldo/freddo che sembra essersi dimenticato come ruotare "normalmente".
        #GEPscience_bd_IRspec_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani soleggiati bruciano nell'infrarosso, la superficie sembra termicamente morbida, come se volesse scioglierti le gambe d'atterraggio per cortesia.
        #GEPscience_bd_IRspec_ToutatisInSpaceLowSunnyHighlands_00 = Il terreno elevato è leggermente più fresco, ma non abbastanza da rassicurare, le bande di assorbimento vacillano mentre l'aria sotto si assottiglia e si ispessisce.
        #GEPscience_bd_IRspec_ToutatisInSpaceLowTransitionalLowlands_00 = Vicino al confine della zona "vivibile", i dati IR mostrano gradienti ripidi e ritenzione a chiazze—il tuo miglior candidato per "non istantaneamente terribile".
        #GEPscience_bd_IRspec_ToutatisInSpaceLowTransitionalHighlands_00 = Le colline di transizione mostrano righe spettrali nette e temperature che cambiano in fretta, come se il suolo non sapesse da che parte stare.
        #GEPscience_bd_IRspec_ToutatisInSpaceLowDarkSideLowlands_00 = Sul lato oscuro, il pianeta diventa una silhouette gelida con solo deboli perdite termiche, senti la distanza da casa in ogni secondo silenzioso.
        #GEPscience_bd_IRspec_ToutatisInSpaceLowDarkSideHighlands_00 = Le colline del lato oscuro risultano ancora più fredde, con occasionali punti caldi che potrebbero essere geologia—o solo lo strumento che implora un radiatore.
        #GEPscience_bd_IRspec_ToutatisInSpaceLowSoutheasternMountains_00 = Le montagne mostrano firme minerali miste e ombre termiche taglienti, etichetti il file "interessante, pericoloso, bello".
        #GEPscience_bd_IRspec_ToutatisInSpaceLowWesternMountains_00 = Le mappe IR rivelano lunghe creste fredde accanto a facce scaldate dal sole, è la cosa più simile a un'alba che tu abbia avuto in settimane di ritardo del segnale.
        #GEPscience_bd_IRspec_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne del lato oscuro a malapena si registrano, tranne sottili strisce di calore trattenuto che fanno sembrare il paesaggio un fantasma nel tuo spettrogramma.
        #GEPscience_bd_IRspec_NodensInSpaceHigh_00 = Da alta orbita, Nodens risulta un mondo freddo con sottili cuciture calde, i dati arrivano a casa così tardi da sembrare una cartolina dal nulla.
        #GEPscience_bd_IRspec_NodensInSpaceLowSaltySeas_00 = Lo spettro IR sopra i mari salati mostra un rilascio di calore pigro e strane bande di assorbimento, per un attimo sospetti che l'oceano stia "rimandando indietro" la luce.
        #GEPscience_bd_IRspec_NodensInSpaceLowFreshWater_00 = Sopra le acque dolci, la firma termica è più liscia e meno salmastra, sotto questo sole rosso e fioco non assomiglia comunque a nulla di casa.
        #GEPscience_bd_IRspec_NodensInSpaceLowShores_00 = I pixel della costa sfarfallano tra roccia calda e acqua fredda in bande ordinate, come se il pianeta stesse tracciando il grafico del proprio disagio.
        #GEPscience_bd_IRspec_NodensInSpaceLowTropicalLowlands_00 = I bassopiani risultano caldi e umidi all'infrarosso, con indizi spettrali di alterazione che da quassù non riesci ancora a chiamare per nome.
        #GEPscience_bd_IRspec_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano un'emissione stabile e moderata—poi un picco improvviso che si rivela essere la tua sonda che entra nella notte, non un miracolo.
        #GEPscience_bd_IRspec_NodensInSpaceLowTropicalMidlands_00 = Le regioni collinari restituiscono caratteristiche minerali nette e una mappa termica a chiazze, il sole rosso rende ogni "pomeriggio" sospettosamente breve.
        #GEPscience_bd_IRspec_NodensInSpaceLowTemperateMidlands_00 = Le bande IR suggeriscono terreno misto con ritenzione d'umidità irregolare, il Controllo Missione chiede repliche, e tu ridi del ritardo alla velocità della luce.
        #GEPscience_bd_IRspec_NodensInSpaceLowHighlands_00 = Gli altopiani irradiano più freddo e più pulito, con righe di assorbimento più affilate che fanno sembrare la roccia molto sicura di sé.
        #GEPscience_bd_IRspec_NodensInSpaceLowTundra_00 = La tundra quasi non registra calore, lo spettrometro riporta "freddo" e tu aggiungi "anche emotivamente" nelle note.
        #GEPscience_bd_IRspec_NodensInSpaceLowIceCaps_00 = Le calotte glaciali riflettono ed emettono in un modo che urla "ghiacci volatili", ma i rapporti spettrali sono abbastanza fuori norma da tenerti sveglio.
        #GEPscience_bd_IRspec_BelisamaInSpaceHigh_00 = Il bagliore infrarosso di Belisama è smorzato e distante, un bersaglio quieto sotto un sole rosso fioco che manda fuori taratura il tuo orologio interno.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowFlats_00 = Sopra le pianure, lo spettro mostra ampie bande minerali e un ciclo termico rapido, la superficie sembra scaldarsi solo per raffreddarsi di nuovo per dispetto.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mantengono una base più calda con deboli caratteristiche di assorbimento che suggeriscono chimica polverosa e "cotta" dal sole, ancora senza etichetta.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano gradienti più lisci e picchi meno estremi, è la cosa più vicina al "normale" che tu abbia misurato quassù, e questo è inquietante.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowTropicalMidlands_00 = La firma IR delle regioni collinari suggerisce depositi stratificati—come se qualcuno avesse impilato mondi diversi uno sull'altro e l'avesse chiamata giornata.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowTemperateMidlands_00 = La mappatura infrarossa trova creste calde alternate a bacini freddi, la tua antenna "strizza gli occhi" verso casa, in attesa di un permesso che sai già ti servirà.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowHighlands_00 = Gli altopiani tornano freddi e spettralmente affilati, con impronte minerali pulite che rendono il terreno secco, nitido e molto lontano.
        #GEPscience_bd_IRspec_BelisamaInSpaceLowPoles_00 = I poli stanno vicino al fondo scala del rumore, ma bande sottili tradiscono ghiacci esotici, qui la "notte" è solo un silenzio più lungo.
        #GEPscience_bd_IRspec_SucellusInSpaceHigh_00 = Da alta quota, Sucellus è perlopiù "roccia fredda" con qualche ostinato rigonfiamento infrarosso che suggerisce zone ricche di metalli e parecchia radiazione per qualcosa di così piccolo.
        #GEPscience_bd_IRspec_SucellusInSpaceLowBasins_00 = I bacini trattengono la notte come un segreto, lo spettro suggerisce polvere fine sopra materiale più duro, con abbastanza assorbimenti strani da far strizzare gli occhi ai tecnici di laboratorio.
        #GEPscience_bd_IRspec_SucellusInSpaceLowLowlands_00 = I bassopiani mostrano ampie bande minerali e sbalzi termici bruschi—illuminati quando il bagliore rosso fioco lo decide, poi di nuovo gelati prima che tu finisca di etichettare il file.
        #GEPscience_bd_IRspec_SucellusInSpaceLowTropicalMidlands_00 = "Tropicale" sembra una battuta quaggiù, ma le righe IR cambiano davvero—dimensioni dei grani diverse, inerzia termica diversa, la stessa quiete lontana da casa.
        #GEPscience_bd_IRspec_SucellusInSpaceLowTemperateMidlands_00 = Lo spettrometro mappa firme stratificate che sembrano vecchi flussi o impatti, la risposta da casa arriva molto dopo che hai ricontrollato la calibrazione due volte.
        #GEPscience_bd_IRspec_SucellusInSpaceLowHighlands_00 = Gli altopiani risultano spettralmente nitidi e più freddi, con impronte minerali più pulite che fanno sembrare il terreno severamente poco impressionato dalla tua patch di missione.
        #GEPscience_bd_IRspec_SucellusInSpaceLowPoles_00 = Vicino ai poli, deboli caratteristiche suggeriscono brina volatile mescolata a un substrato più scuro—così freddo che la routine di "riscaldamento" dello strumento sembra ottimista.
        #GEPscience_bd_IRspec_CaireenInSpaceHigh_00 = Il segnale infrarosso di Caireen è un minuscolo bagliore ostinato accanto al suo primario, lo spettro sembra geologia da asteroide catturato, senza atmosfera a nascondere la verità.
        #GEPscience_bd_IRspec_CaireenInSpaceLowLowlands_00 = I bassopiani oscillano tra "cotto dal sole" e gelo profondo, le bande IR indicano regolite polverosa con alcuni assorbimenti insoliti che non combaciano con la cartella "rocce note".
        #GEPscience_bd_IRspec_CaireenInSpaceLowMidlands_00 = Le regioni collinari mostrano un'inerzia termica leggermente maggiore, come se qui il detrito fosse più compattato—oppure Caireen sta giudicando in silenzio le tue impostazioni di risoluzione.
        #GEPscience_bd_IRspec_CaireenInSpaceLowHighlands_00 = Le colline risultano più fredde e con righe più nette, con caratteristiche minerali che sembrano fresche ed esposte—come una superficie che non ha mai ricevuto il memo sulla "meteorologia".
        #GEPscience_bd_IRspec_CaireenInSpaceLowPoles_00 = Le scansioni polari flirtano con il fondo scala del rumore, ma una lieve ondulazione spettrale suggerisce brina a chiazze, lo segni come "forse ghiaccio, sicuramente lontano".
        #GEPscience_bd_IRspec_SironaInSpaceHigh_00 = Da alta orbita, lo spettrometro si aggancia all'assorbimento del metano e a una vasta emissione termica: il calore di Sirona è reale, anche sotto un sole rosso e fioco che a malapena sembra "giorno".
        #GEPscience_bd_IRspec_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure mostrano un'emissione più profonda e calda sotto ponti di nubi più spessi, i dati sembrano un respiro lento e pesante di un motore grande quanto un pianeta.
        #GEPscience_bd_IRspec_SironaInSpaceLowLightTropicalBands_00 = Le bande tropicali chiare riflettono di più e irradiano di meno, con caratteristiche spettrali più pulite—luminose, aliene, e comunque non il tipo di "sole" a cui sei abituato.
        #GEPscience_bd_IRspec_SironaInSpaceLowDarkTemperateBands_00 = Nelle bande temperate scure, le righe IR si allargano e slittano mentre le cime delle nubi rimescolano, per un attimo ti chiedi se lo spettrometro stia soffrendo il mal d'orbita.
        #GEPscience_bd_IRspec_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare risultano più fredde e più alte, con firme del metano più strette, lo archivi sotto "bello, ostile e molto lontano".
        #GEPscience_bd_IRspec_SironaInSpaceLowDarkPolarBands_00 = Le bande polari scure portano firme di calore extra che non si spiegano col solo sole: energia aurorale e magnetosferica, consegnata con entusiasmo estremo.
        #GEPscience_bd_IRspec_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare mostrano sommità più fredde ma bordi rumorosi, mentre particelle cariche "pepano" l'alta atmosfera, lo strumento lo registra con educazione mentre tu stringi il corrimano.
        #GEPscience_bd_IRspec_AirmedInSpaceHigh_00 = La firma infrarossa di Airmed alterna due "personalità" termiche distinte, mentre Sirona riempie metà cielo e il sole rosso conta a malapena come luce diurna.
        #GEPscience_bd_IRspec_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani irradiano in modo irregolare, come se la superficie martoriata non sapesse decidere se essere roccia, polvere o vecchi lividi.
        #GEPscience_bd_IRspec_AirmedInSpaceLowTemperateLowlands_00 = Le curve di temperatura salgono e scendono troppo in fretta per stare tranquilli, annoti "raffreddamento rapido" e "lunga attesa di conferma".
        #GEPscience_bd_IRspec_AirmedInSpaceLowTropicalMidlands_00 = Sopra le regioni collinari le bande infrarosse si affinano, suggerendo granuli di dimensioni diverse—come se qualcuno avesse sparso uno strato nuovo su una vecchia cicatrice.
        #GEPscience_bd_IRspec_AirmedInSpaceLowTemperateMidlands_00 = Lo spettrometro cattura sottili caratteristiche di assorbimento che non combaciano con i tuoi grafici "in ordine", il sole rosso rende sospetta ogni ipotesi.
        #GEPscience_bd_IRspec_AirmedInSpaceLowHighlands_00 = Gli altopiani tornano più freddi e con profili più netti, come se le cime fossero state sabbiate dal tempo e dal silenzio.
        #GEPscience_bd_IRspec_AirmedInSpaceLowDarkenedLowlands_00 = Sopra il terreno scurito, il calore filtra in strisce sottili, il grafico sembra una confessione quieta dal lato notturno.
        #GEPscience_bd_IRspec_AirmedInSpaceLowDarkenedMidlands_00 = Lo spettro sta vicino al fondo scala del rumore, ma rigonfiamenti persistenti suggeriscono materiale esposto che qui non si scalda mai davvero.
        #GEPscience_bd_IRspec_AirmedInSpaceLowDarkenedHighlands_00 = Dominano impronte minerali fredde e affilate, persino lo strumento sembra sussurrare i risultati.
        #GEPscience_bd_IRspec_AirmedInSpaceLowPoles_00 = Le scansioni polari mostrano temperature basse e caratteristiche riflettenti ostinate—possibili brine che esistono solo perché il sole si dimentica di provarci.
        #GEPscience_bd_IRspec_BorvoInSpaceHigh_00 = Da alta orbita, Borvo brilla di un calore smorzato sotto bande d'assorbimento nebbiose, i dati sembrano viaggiare nell'aria e negli anni.
        #GEPscience_bd_IRspec_BorvoInSpaceLowTropicalCraquelure_00 = Le regioni fratturate mostrano cicli termici rapidi e bordi spettrali frastagliati, come se il suolo si fosse spezzato nel tentativo di rispettare un orario.
        #GEPscience_bd_IRspec_BorvoInSpaceLowTemperateCraquelure_00 = Le crepe più fredde trattengono il calore in modo diverso dalle pianure, lo etichetti "pattern di stress" e "forse anche stress del personale".
        #GEPscience_bd_IRspec_BorvoInSpaceLowTropicalLowlands_00 = Ampie caratteristiche infrarosse suggeriscono rivestimenti polverosi sopra qualcosa di più freddo sotto—Borvo continua a non dirti se è roccia o ghiaccio.
        #GEPscience_bd_IRspec_BorvoInSpaceLowTemperateLowlands_00 = I bassopiani irradiano dolcemente attraverso la foschia atmosferica, il tuo miglior modello è "complicato, con contorno di ancora più complicato".
        #GEPscience_bd_IRspec_BorvoInSpaceLowTropicalMidlands_00 = Le bande di assorbimento si approfondiscono e si allargano, suggerendo aria più spessa o più aerosol—in ogni caso, lo spettro sembra indossare una coperta.
        #GEPscience_bd_IRspec_BorvoInSpaceLowTemperateMidlands_00 = Qui l'inerzia termica sale leggermente, la superficie di Borvo sembra trattenere segreti finché il prossimo pacchetto non arriva a casa.
        #GEPscience_bd_IRspec_BorvoInSpaceLowHighlands_00 = Gli altopiani appaiono più freddi, con righe minerali più pulite che bucano la foschia, come se l'aria più sottile ti stesse facendo un piccolo favore.
        #GEPscience_bd_IRspec_BorvoInSpaceLowMajorCraters_00 = I fondi craterici trattengono calore più a lungo dei bordi, producendo anelli infrarossi ordinati—finalmente qualcosa che si comporta in modo prevedibile.
        #GEPscience_bd_IRspec_BorvoInSpaceLowPoles_00 = Le regioni polari si attenuano verso i limiti dello strumento, firme deboli suggeriscono depositi freddi che non si curano delle tue definizioni di "giorno".
        #GEPscience_bd_IRspec_DamonaInSpaceHigh_00 = Damona risulta un piccolo radiatore grigio con una notevole asimmetria caldo/freddo—una vecchia violenza scritta nell'infrarosso.
        #GEPscience_bd_IRspec_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani mostrano un comportamento polveroso e a raffreddamento rapido, lo spettro è diretto e onesto, come un mondo sterile senza nulla da nascondere.
        #GEPscience_bd_IRspec_DamonaInSpaceLowTemperateLowlands_00 = Sottili caratteristiche di assorbimento cambiano con angolo e ombra, sospetti variazioni di spessore della regolite più che qualunque atmosfera.
        #GEPscience_bd_IRspec_DamonaInSpaceLowTropicalMidlands_00 = Le regioni collinari mostrano inerzia termica mista, come se detrito e bedrock stessero litigando su chi ha diritto di irradiare.
        #GEPscience_bd_IRspec_DamonaInSpaceLowTemperateMidlands_00 = Le colline più fredde rendono più nette le impronte minerali, quasi senti il vuoto tra te e il laboratorio di casa.
        #GEPscience_bd_IRspec_DamonaInSpaceLowHighlands_00 = Gli altopiani tornano freddi e dai contorni crisp, una superficie craterizzata che sembra bloccata per sempre nel "dopo l'impatto".
        #GEPscience_bd_IRspec_DamonaInSpaceLowImpactBasin_00 = Il grande bacino trattiene calore nel suo interno riparato, producendo un segnale forte e pulito che praticamente grida "sì, qui è successo qualcosa".
        #GEPscience_bd_IRspec_DamonaInSpaceLowPoles_00 = Le scansioni polari flirtano col silenzio, ma indizi persistenti di alta riflettanza/bassa emissione suggeriscono brine a chiazze che sopravvivono sotto il sole rosso e fioco.
        #GEPscience_bd_IRspec_EponaInSpaceHigh_00 = Il debole bagliore IR di Epona sta sotto un sole rosso e fioco, lo spettro lascia intravedere tracce di metano e una linea di base sospettosamente calda che impiega un'eternità a farsi riportare a casa.
        #GEPscience_bd_IRspec_EponaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali sembrano terreno freddo con una maschera più calda—ampie bande IR suggeriscono ghiaccio polveroso sopra qualcosa che trattiene calore più a lungo del dovuto.
        #GEPscience_bd_IRspec_EponaInSpaceLowTemperateLowlands_00 = I bassopiani temperati irradiano in modo lieve e uniforme, l'inerzia termica fa pensare a una brina spessa e isolante più che a roccia nuda.
        #GEPscience_bd_IRspec_EponaInSpaceLowTropicalUplands_00 = Le alture mostrano impronte minerali più nette e un raffreddamento più rapido, come se qui la superficie fosse ghiaccio più "pulito", con meno lanugine isolante.
        #GEPscience_bd_IRspec_EponaInSpaceLowTemperateUplands_00 = La scansione trova caratteristiche di assorbimento stratificate compatibili con ghiacci misti, etichetti il grafico "complicato" e lo spedisci nel suo lento viaggio verso l'esterno.
        #GEPscience_bd_IRspec_EponaInSpaceLowHighlands_00 = Gli altopiani tornano freddi e dai contorni crisp, con meno foschia atmosferica nel segnale—finalmente un dataset che si comporta, almeno per un'orbita.
        #GEPscience_bd_IRspec_EponaInSpaceLowGrandPeaks_00 = Le Grandi Vette proiettano lunghe ombre termiche, i versanti illuminati impennano in IR e poi crollano così in fretta che la tua timeline sembra inciampare.
        #GEPscience_bd_IRspec_EponaInSpaceLowCraters_00 = I crateri accumulano freddo come un conto di risparmio, lo spettrometro distingue fondi più scuri e deboli firme volatili che si nascondono dalla luce diurna troppo debole.
        #GEPscience_bd_IRspec_EponaInSpaceLowVolcanoes_00 = Sopra i vulcani, lo spettro mostra calore anomalo e bande insolite, o c'è attività sotto, oppure lo strumento si è semplicemente entusiasmato.
        #GEPscience_bd_IRspec_EponaInSpaceLowPoles_00 = Le scansioni polari stanno vicino al fondo scala del rumore, ma un assorbimento persistente suggerisce brine esotiche che sopravvivono perché "mezzogiorno", qui, è soprattutto un'idea.
        #GEPscience_bd_IRspec_RosmertaInSpaceHigh_00 = Rosmerta è un bersaglio IR minuscolo e senza aria—per lo più roccia fredda, con rumore da radiazione spruzzato sopra come coriandoli non richiesti.
        #GEPscience_bd_IRspec_RosmertaInSpaceLowTropicalLowlands_00 = I bassopiani oscillano duramente tra il tenue calore del sole fioco e la notte profonda, lo spettro indica regolite fine sopra materiale più scuro.
        #GEPscience_bd_IRspec_RosmertaInSpaceLowTemperateLowlands_00 = La mappatura termica mostra ritenzione di calore a chiazze compatibile con piccole sacche di polvere, la luna sembra sola persino nei dati.
        #GEPscience_bd_IRspec_RosmertaInSpaceLowTropicalMidlands_00 = Le regioni collinari mostrano righe di assorbimento più pulite e un'inerzia termica leggermente maggiore—terreno più denso, meno "sofficezza" per fingere calore.
        #GEPscience_bd_IRspec_RosmertaInSpaceLowTemperateMidlands_00 = La firma IR è schietta e senza atmosfera: roccia, polvere e un freddo a cui non importa quanta strada hai fatto.
        #GEPscience_bd_IRspec_RosmertaInSpaceLowHighlands_00 = Gli altopiani tornano più freddi con bande minerali più affilate, come roccia appena esposta che non ha mai imparato il concetto di "meteo".
        #GEPscience_bd_IRspec_RosmertaInSpaceLowPoles_00 = Ai poli, piccole ondulazioni spettrali suggeriscono minuscoli depositi di brina nascosti in ombra permanente, prometti di discuterne più tardi, quando il segnale arriverà a casa.
        #GEPscience_bd_IRspec_RAB-58EInSpaceHigh_00 = Dall'orbita alta, RAB-58E è poco più di un pixel freddo, il suo spettro IR si rifiuta di rivelare se sia roccia, ghiaccio o entrambe le cose insieme.
        #GEPscience_bd_IRspec_RAB-58EInSpaceLowLowlands_00 = I bassopiani mostrano bassa inerzia termica e ampie bande compatibili con brina polverosa, "palla di neve catturata?" ottiene un cauto forse.
        #GEPscience_bd_IRspec_RAB-58EInSpaceLowEasternHighlands_00 = Gli altopiani orientali si raffreddano in fretta e mostrano caratteristiche minerali più nette—più roccia nel mix, meno isolamento, e zero pazienza per le tue teorie.
        #GEPscience_bd_IRspec_RAB-58EInSpaceLowWesternHighlands_00 = Gli altopiani occidentali hanno una pendenza IR leggermente diversa, come se i granuli di superficie cambiassero a metà storia, il ritardo nelle comunicazioni fa sì che nessuno possa interrompere le tue supposizioni.
        #GEPscience_bd_IRspec_CernunnosInSpaceHigh_00 = Cernunnos brilla debolmente nell'infrarosso, un mondo nano glaciale così lontano che persino la tua idea di "giorno" arriva in ritardo.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowTropicalLowlands_00 = I bassopiani tropicali mostrano ghiaccio più scuro e curve termiche più lisce, suggerendo spessi depositi volatili che rilasciano calore lentamente nella lunga notte.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano bande di assorbimento miste—ghiaccio d'acqua, inclusioni scure e un accenno a qualcosa di più volatile di quanto vorresti respirare.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowTropicalMidlands_00 = Le regioni collinari risultano a inerzia termica più alta, come se ghiaccio compattato o roccia sepolta fosse più vicino alla superficie rispetto alla "lanugine" dei bassopiani.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowTemperateMidlands_00 = Lo spettrometro cattura sottili spostamenti di banda sulle colline, facendoti chiedere se Cernunnos abbia vicini—o solo una storia molto disordinata.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowHighlands_00 = Gli altopiani restituiscono righe minerali crisp su una base più fredda, il terreno sembra antico, duro e profondamente disinteressato ai visitatori.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowSouthPolarHills_00 = Le colline del polo sud mostrano trappole fredde persistenti e deboli firme volatili, il sole rosso sfiora così basso che a malapena conta come illuminazione.
        #GEPscience_bd_IRspec_CernunnosInSpaceLowNorthPole_00 = Il polo nord è un bersaglio IR quasi silenzioso con occasionali indizi di brina brillante—come se il pianeta ammiccasse lentamente per dimostrare che è ancora lì.

        // bd_magScan
        #GEPscience_bd_magScan_GrannusInSpaceLow_00 = Il magnetometro rimpiange subito questa scelta di carriera. Il campo impennata e sussulta, come se Grannus stesse provando a firmare autografi nel plasma.
        #GEPscience_bd_magScan_GrannusInSpaceHigh_00 = Anche da qui le letture restano fastidiosamente forti. Il Controllo Missione chiede se lo strumento sia guasto, e la risposta impiega un po' ad arrivare.
        #GEPscience_bd_magScan_TaranisInSpaceLow_00 = La traccia resta quasi piatta, poi scatta con picchi netti ogni volta che il debole sole rosso starnutisce. Sembra di ascoltare il meteo spaziale con un lungo ritardo.
        #GEPscience_bd_magScan_TaranisInSpaceHigh_00 = Compare pochissimo campo intrinseco, solo un sibilo lieve e irrequieto dalle particelle della stella. "Notte" e "giorno" aiutano poco quando il pianeta ha dimenticato come ruotare per bene.
        #GEPscience_bd_magScan_TaranisSrfSplashed_00 = Il mare di lava è così conduttivo che il magnetometro rileva variazioni lente e gorgoglianti. Annoti che "ammarato" è una parola strana quando lo spruzzo è lava.
        #GEPscience_bd_magScan_TaranisSrfLandedMagmaShores_00 = Le letture saltano a ritmo con la costa lavica incandescente, come se la crosta venisse impastata dolcemente dal calore. La luce rossa del giorno fa sembrare il display più caldo di quanto sia.
        #GEPscience_bd_magScan_TaranisSrfLandedScorchedLowlands_00 = Un segnale debole e a chiazze suggerisce antica roccia magnetizzata, cotta quasi liscia. Purtroppo non riesce ancora a tenere la tua chiave inglese incollata al suolo.
        #GEPscience_bd_magScan_TaranisSrfLandedMidlands_00 = Qui il campo è praticamente nullo, con un testardo puntino che si rifiuta di spiegarsi. Per ora lo etichetti "Probabilmente Una Roccia".
        #GEPscience_bd_magScan_TaranisSrfLandedHighlands_00 = Tra le creste compaiono lievi variazioni di polarità, come se il pianeta avesse provato a essere magnetico una volta e poi si fosse stancato. Il silenzio è inquietante quando il sole non tramonta mai e non sorge mai.
        #GEPscience_bd_magScan_TaranisSrfLandedDarkSideMidlands_00 = Il lato in ombra restituisce una traccia più pulita, ma non è rassicurante. L'influenza della stella filtra ancora come impulsi lievi, come tamburi lontani attraverso il terreno.
        #GEPscience_bd_magScan_TaranisSrfLandedDarkSideHighlands_00 = Un terreno freddo e fragile produce un segnale stabile e minimo, con piccole anomalie localizzate. Inizi a rimpiangere il caos semplice del lato illuminato.
        #GEPscience_bd_magScan_TaranisSrfLandedPoles_00 = Le letture deragliano quel tanto che basta a suggerire correnti strane sotto la superficie. Il Controllo Missione propone "prova a ruotarlo", e tu fissi l'orizzonte che non si muove.
        #GEPscience_bd_magScan_ToutatisInSpaceLow_00 = Compare un campo debole e sbilanciato, più forte sopra l'emisfero arroventato. Il confine tra luce e buio appare netto perfino nei dati magnetici.
        #GEPscience_bd_magScan_ToutatisInSpaceHigh_00 = Il segnale sfuma verso il rumore di fondo, ma il sole rosso lo increspa ancora con qualche scarica di statica. Il ping di ritorno da casa sembra arrivare da una settimana diversa.
        #GEPscience_bd_magScan_ToutatisSrfLandedSunnyLowlands_00 = Terreno caldo e aria sottile fanno vagare leggermente le letture, come se correnti elettriche pigre scegliessero la strada panoramica. Ti chiedi se il pianeta si stia ricaricando in silenzio.
        #GEPscience_bd_magScan_ToutatisSrfLandedSunnyHighlands_00 = Le alture mostrano piccole anomalie coerenti che suggeriscono roccia ricca di ferro. È la cosa più vicina a una "caratteristica" che il magnetometro sia disposto ad ammettere.
        #GEPscience_bd_magScan_ToutatisSrfLandedTransitionalLowlands_00 = Proprio tra giorno e notte, la traccia diventa nervosa e indecisa. Il pianeta non sa decidere se vuole essere caldo, freddo o magnetico.
        #GEPscience_bd_magScan_ToutatisSrfLandedTransitionalHighlands_00 = Una stretta fascia di letture più forti suggerisce una crosta sotto stress lungo la zona del crepuscolo. La sfumatura sottile sembra più ingegneria che geologia.
        #GEPscience_bd_magScan_ToutatisSrfLandedDarkSideLowlands_00 = Il lato in ombra è più calmo, con un campo vicino allo zero così uniforme che controlli due volte l'interruttore di alimentazione. Il silenzio è reale, ed è questo il problema.
        #GEPscience_bd_magScan_ToutatisSrfLandedDarkSideHighlands_00 = Piccolissimi picchi compaiono mentre attraversi creste esposte, poi svaniscono di nuovo. È come se il pianeta nascondesse il suo metallo nel freddo.
        #GEPscience_bd_magScan_ToutatisSrfLandedSoutheasternMountains_00 = Le montagne sud-orientali conservano una firma tenue ma coerente, come se fossero state magnetizzate e poi congelate in posizione. La tua antenna punta verso casa per abitudine, non per fiducia.
        #GEPscience_bd_magScan_ToutatisSrfLandedWesternMountains_00 = Letture stranamente disallineate suggeriscono strati di roccia con storie magnetiche diverse. La luce rossa del giorno non sembra mai della tonalità giusta, nemmeno sullo schermo.
        #GEPscience_bd_magScan_ToutatisSrfLandedDarkSideMountains_00 = Le anomalie locali più forti finora compaiono nelle montagne in ombra, nette e brevissime. Segni il punto per dopo, dando per scontato che "dopo" esista ancora quaggiù.
        #GEPscience_bd_magScan_NodensInSpaceLow_00 = Il magnetometro traccia curve pulite e sicure, poi trasale quando la stella tossisce particelle cariche. Sotto un debole sole rosso, perfino "normale" suona insolito.
        #GEPscience_bd_magScan_NodensInSpaceHigh_00 = Più lontano, il campo si distende in un ampio involucro stabile. Il pacchetto dati impiega un'eternità ad arrivare a casa, come se la magnetosfera stessa aggiungesse latenza.
        #GEPscience_bd_magScan_NodensSrfSplashed_00 = L'acqua conduttiva tira le letture in lente e pesanti ondulazioni. È stranamente rassicurante ammarare... finché non ricordi quanto è lontana "casa".
        #GEPscience_bd_magScan_NodensSrfLandedSaltySeas_00 = I depositi di sale fanno sembrare il campo locale leggermente distorto, come se il pianeta indossasse trucco magnetico. Lo strumento insiste di non essere una bussola, ma prova comunque a puntare da qualche parte.
        #GEPscience_bd_magScan_NodensSrfLandedFreshWater_00 = La traccia si stabilizza su una base dolce con un fruscio minimo. Ti chiedi se quel silenzio sia il lago... o solo la lunga distanza tra te e il Controllo Missione.
        #GEPscience_bd_magScan_NodensSrfLandedShores_00 = Le letture oscillano avanti e indietro con la linea di marea, come se la costa "respirasse" elettricità. La luce rossa del giorno trasforma ogni spia in un avvertimento.
        #GEPscience_bd_magScan_NodensSrfLandedTropicalLowlands_00 = Un forte campo di fondo resta stabile, ma brevi picchi suggeriscono che i temporali sopra la testa stiano caricando l'aria. Il sole non sembra mai del colore giusto, nemmeno sul display.
        #GEPscience_bd_magScan_NodensSrfLandedTemperateLowlands_00 = Il campo è piacevolmente forte e irritantemente incoerente da collina a collina. Il team discute di geologia mentre i tempi di risposta si allungano in un silenzio imbarazzante.
        #GEPscience_bd_magScan_NodensSrfLandedTropicalMidlands_00 = Un lieve calo d'intensità con la quota fa sembrare la curva più "ordinata" del previsto. È comunque difficile rilassarsi quando l'unica stella è fioca e rossa.
        #GEPscience_bd_magScan_NodensSrfLandedTemperateMidlands_00 = Ondulazioni sottili e ripetute suggeriscono strati magnetizzati sepolti. Li etichetti "interessanti" perché "lievemente inquietanti" non è un termine tecnico approvato.
        #GEPscience_bd_magScan_NodensSrfLandedHighlands_00 = Anomalie locali compaiono vicino alla roccia esposta, nette e ostinate. Sembra che la crosta abbia conservato vecchi ricordi magnetici e si sia dimenticata di archiviarli.
        #GEPscience_bd_magScan_NodensSrfLandedTundra_00 = Il terreno freddo produce letture nitide e con poco rumore, quasi troppo ordinate. La linea pulita fa sembrare più rumoroso il vuoto intorno.
        #GEPscience_bd_magScan_NodensSrfLandedIceCaps_00 = Il campo resta stabile sopra le calotte ghiacciate, con occasionali minuscoli picchi da fasce ricche di polvere. Il Controllo Missione suggerisce "spostati di un metro", e tu ridi pensando al tempo di viaggio di quel consiglio.
        #GEPscience_bd_magScan_BelisamaInSpaceLow_00 = Il campo è debole di per sé, ma sussulta a ritmo con Nodens lì vicino, come una luna che prende in prestito il magnetismo. La rotazione sincrona rende lo schema stranamente fisso nel cielo.
        #GEPscience_bd_magScan_BelisamaInSpaceHigh_00 = Quasi tutto ciò che vedi è l'influenza di Nodens che sfuma in un fruscio di fondo. I numeri arrivano a casa così tardi che sembrano il log di missione di qualcun altro.
        #GEPscience_bd_magScan_BelisamaSrfLandedFlats_00 = La linea di base è bassa e ostinatamente piatta, interrotta solo da un rumore lieve e vagante. Nodens resta nello stesso punto sopra di te, promemoria costante che non sei in un sistema normale.
        #GEPscience_bd_magScan_BelisamaSrfLandedTropicalLowlands_00 = "Tropicali" è solo un nome qui, il magnetometro è d'accordo, restando freddo e silenzioso. Un segnale tenue e sbilanciato suggerisce induzione da Nodens più che qualcosa all'interno di Belisama.
        #GEPscience_bd_magScan_BelisamaSrfLandedTemperateLowlands_00 = La traccia ondeggia dolcemente, come se il suolo fosse un circuito elettrico pigro. Il sole rosso fa sembrare minaccioso anche il grafico più noioso.
        #GEPscience_bd_magScan_BelisamaSrfLandedTropicalMidlands_00 = Piccoli picchi ripetibili compaiono quando passi accanto a massi scuri. La teoria parla di inclusioni metalliche, la sensazione è "questo posto è pieno di sorprese".
        #GEPscience_bd_magScan_BelisamaSrfLandedTemperateMidlands_00 = Il campo scende quasi a zero tra anomalie sparse. Continui a controllare il connettore, perché "campo magnetico basso" suona fin troppo come "nessun dato".
        #GEPscience_bd_magScan_BelisamaSrfLandedHighlands_00 = Piccole firme nette si aggrappano alle creste come elettricità statica su un maglione. Il lungo ritardo nelle comunicazioni trasforma ogni "è vero?" in un gioco d'attesa.
        #GEPscience_bd_magScan_BelisamaSrfLandedPoles_00 = Le letture sono deboli ma stranamente coerenti, come se il freddo avesse preservato una tenue impronta. Le registri con cura, perché ripetere la misura quaggiù non è mai garantito.
        #GEPscience_bd_magScan_SucellusInSpaceLow_00 = Il magnetometro segnala un campo quasi nullo, poi trova picchi sparsi, come passando sopra rottami nascosti. Se questo nano è ricco di metalli, tiene i suoi segreti ben stretti.
        #GEPscience_bd_magScan_SucellusInSpaceHigh_00 = Quasi nulla si registra, a parte l'irrequieto rumore di particelle della stella. Il vuoto è così totale che i dati potrebbero venire da ovunque... finché non ricordi dove sei.
        #GEPscience_bd_magScan_SucellusSrfLandedBasins_00 = Anomalie ampie e poco profonde suggeriscono che vecchi impatti abbiano rimescolato materiale conduttivo in strati disordinati. Il sole rosso colora le pareti dei bacini come ruggine, e questo non aiuta il morale.
        #GEPscience_bd_magScan_SucellusSrfLandedLowlands_00 = Picchi piccoli ma frequenti suggeriscono granuli metallici nella regolite. Per un attimo immagini che le proposte di finanziamento si scrivano da sole, poi il timer del ritardo ti riporta alla realtà.
        #GEPscience_bd_magScan_SucellusSrfLandedTropicalMidlands_00 = Il campo resta vicino allo zero, eppure la curva continua a "impuntarsi" su affioramenti scuri. È come passare un magnete vicino a una cassetta degli attrezzi che non puoi vedere.
        #GEPscience_bd_magScan_SucellusSrfLandedTemperateMidlands_00 = Un segnale debole e a chiazze suggerisce frammenti di roccia magnetizzata mescolati a polvere fine. Lo strumento lo definisce "interessante", tu lo chiami "un altro motivo per tenere il casco allacciato".
        #GEPscience_bd_magScan_SucellusSrfLandedHighlands_00 = Le anomalie locali più forti compaiono sulle alture esposte, brevi e taglienti. Il pianeta forse non ha un campo, ma di certo ha delle idee.
        #GEPscience_bd_magScan_SucellusSrfLandedPoles_00 = La traccia è così quieta da sentire l'elettronica dello strumento, finché un improvviso puntino insiste che il polo stia nascondendo del metallo. Al Controllo Missione piacerà... prima o poi.
        #GEPscience_bd_magScan_CaireenInSpaceLow_00 = Il magnetometro non trova nulla che somigli a un campo globale, solo tremolii irregolari mentre sorvoli terreno bitorzoluto. Gli asteroidi catturati non arrivano con mappe magnetiche ordinate.
        #GEPscience_bd_magScan_CaireenInSpaceHigh_00 = Tutto si media verso quasi zero, con una debole statica dalla stella. La navicella sembra minuscola, e il canale di risposta sembra ancora più minuscolo.
        #GEPscience_bd_magScan_CaireenSrfLandedLowlands_00 = Qualche picco sparso suggerisce ciottoli magnetizzati incastonati tra le macerie. Segni il punto, perché "torneremo più tardi" è una promessa audace così lontano.
        #GEPscience_bd_magScan_CaireenSrfLandedMidlands_00 = Il segnale è quasi piatto, interrotto da colpetti netti quando rotoli vicino a rocce più scure. È come se la luna fosse fatta di avanzi con storie diverse.
        #GEPscience_bd_magScan_CaireenSrfLandedHighlands_00 = Il magnetometro intercetta firme brevi ma coerenti lungo creste fratturate. Per una luna così piccola, ha una "personalità" sorprendentemente complicata.
        #GEPscience_bd_magScan_CaireenSrfLandedPoles_00 = Silenzio quasi totale, poi un'anomalia testarda che non vuole sparire. Sotto il debole sole rosso, anche un singolo puntino sembra una scoperta.
        #GEPscience_bd_magScan_SironaInSpaceLow_00 = Il magnetometro satura così tanto da disegnare un rettangolo. Il campo magnetico di Sirona non è sottile, e nemmeno il lungo ritardo crepitante verso il Controllo Missione.
        #GEPscience_bd_magScan_SironaInSpaceHigh_00 = Più lontano, le letture si risolvono in una magnetosfera enorme e sbilanciata che lotta contro il vento della stella rossa. Anche le parti "quieta" sembrano rumorose quando sei così lontano da casa.
        #GEPscience_bd_magScan_AirmedInSpaceLow_00 = Il campo di Sirona domina tutto, e Airmed aggiunge solo lievi increspature nervose. È come cercare di sentire un sussurro accanto a un gigante gassoso molto determinato.
        #GEPscience_bd_magScan_AirmedInSpaceHigh_00 = Il segnale si assottiglia in un lieve gradiente e in un sacco di sibilo di particelle cariche. I dati arrivano a casa così tardi che i grafici sembrano cartoline.
        #GEPscience_bd_magScan_AirmedSrfLandedTropicalLowlands_00 = La traccia resta vicino allo zero, interrotta da minuscoli picchi dovuti a granuli metallici sparsi. Sotto il debole sole rosso, perfino il "nulla" sembra sospetto.
        #GEPscience_bd_magScan_AirmedSrfLandedTemperateLowlands_00 = Anomalie deboli e a chiazze suggeriscono vecchi detriti mescolati alla polvere. Le segni per un controllo successivo e ti ricordi subito quanto sia costoso un "controllo successivo" quaggiù.
        #GEPscience_bd_magScan_AirmedSrfLandedTropicalMidlands_00 = Il magnetometro trova un tenue segnale indotto che va e viene, come se il campo di Sirona stesse respirando sopra di te. Il suolo, invece, si rifiuta di prendersene il merito.
        #GEPscience_bd_magScan_AirmedSrfLandedTemperateMidlands_00 = Colpetti brevi e taglienti compaiono vicino a chiazze di terreno più scure. Lo strumento insiste che sia geologia, ma i tuoi nervi insistono che sia "qualcosa che osserva".
        #GEPscience_bd_magScan_AirmedSrfLandedHighlands_00 = Le creste esposte danno le letture più pulite: quasi solo silenzio, con pochi picchi ostinati e ripetibili. Airmed non ha un campo, ma nelle rocce ha delle idee.
        #GEPscience_bd_magScan_AirmedSrfLandedDarkenedLowlands_00 = La superficie più scura mostra micro-anomalie più frequenti, come se fosse spolverata di graniglia magnetizzabile. Il terreno a due toni sembra un'etichetta di avvertimento.
        #GEPscience_bd_magScan_AirmedSrfLandedDarkenedMidlands_00 = La linea di base resta piatta finché una dorsale produce una firma coerente, poi svanisce di nuovo. La archivi come "reale" e "inquietante" nello stesso momento.
        #GEPscience_bd_magScan_AirmedSrfLandedDarkenedHighlands_00 = Una sottile fascia di letture più forti segue la cresta, suggerendo materiale concentrato sulle alture. Il Controllo Missione chiede un secondo passaggio, la richiesta arriva quando te ne sei già andato.
        #GEPscience_bd_magScan_AirmedSrfLandedPoles_00 = Il terreno freddo fornisce dati con poco rumore, facendo sembrare il vuoto ancora più grande. Una piccola anomalia spicca come una luce solitaria nello spazio profondo.
        #GEPscience_bd_magScan_BorvoInSpaceLow_00 = La magnetosfera di Borvo si vede chiaramente, avvolta e tirata dal gigantesco campo vicino di Sirona. Il confine è caotico, come due tempeste invisibili che si scontrano.
        #GEPscience_bd_magScan_BorvoInSpaceHigh_00 = In quota le curve si smussano, e riesci a distinguere il campo di Borvo dal fondo più ampio. Il rumore di particelle del sole rosso aggiunge una statica costante e impaziente.
        #GEPscience_bd_magScan_BorvoSrfLandedTropicalCraquelure_00 = Il terreno crepato produce segnali nervosi e localizzati, come se la superficie fosse cablata in piccoli anelli. L'atmosfera sopra sembra sottile, ma il pianeta "risponde" comunque nei dati magnetici.
        #GEPscience_bd_magScan_BorvoSrfLandedTemperateCraquelure_00 = Il magnetometro trova picchi ripetuti lungo le fratture, abbastanza coerenti da mappare. Per un attimo pensi di chiamarle "faglie", poi ti ricordi che non sai nemmeno di cosa siano fatte.
        #GEPscience_bd_magScan_BorvoSrfLandedTropicalLowlands_00 = Un campo di fondo stabile sta sotto una lieve ondulazione, probabilmente dovuta a correnti indotte dall'alto. La foschia bruna del cielo fa sembrare ogni spia dello strumento troppo luminosa.
        #GEPscience_bd_magScan_BorvoSrfLandedTemperateLowlands_00 = Il segnale si rafforza leggermente, poi cala sopra chiazze di suolo più scuro. Sembra di camminare su un circuito elettrico molto vecchio e molto silenzioso.
        #GEPscience_bd_magScan_BorvoSrfLandedTropicalMidlands_00 = Sottili cambi di polarità suggeriscono strati di materiali con storie magnetiche diverse. Il ritardo verso casa trasforma ogni ipotesi in una lunga attesa solitaria.
        #GEPscience_bd_magScan_BorvoSrfLandedTemperateMidlands_00 = La traccia è abbastanza pulita e "normale" da mettere a disagio. Quaggiù, il normale è solo un altro tipo di estraneo.
        #GEPscience_bd_magScan_BorvoSrfLandedHighlands_00 = Le alture esposte mostrano anomalie nitide, abbastanza nette da triangolare. Le colline potrebbero nascondere roccia ricca di ferro... oppure godersi l'attenzione.
        #GEPscience_bd_magScan_BorvoSrfLandedMajorCraters_00 = Il fondo del cratere restituisce un'anomalia più ampia e sfumata, come se il materiale fuso da impatto avesse mescolato tutto in uno stufato magnetico. La etichetti "scientifica" e resisti alla tentazione di chiamarla "zuppa".
        #GEPscience_bd_magScan_BorvoSrfLandedPoles_00 = Il campo si stabilizza e il rumore cala, lasciando una linea calma quasi confortante. Poi compare un singolo picco, e il conforto evapora.
        #GEPscience_bd_magScan_DamonaInSpaceLow_00 = Damona non contribuisce quasi a nulla, fanno tutto il campo di Sirona e le particelle della stella. Il magnetometro registra "effetti indotti" e tu registri "inquietudine".
        #GEPscience_bd_magScan_DamonaInSpaceHigh_00 = Più lontano, il segnale svanisce in un sussurro sottile più una statica intermittente. È il tipo di dataset che ti fa ricontrollare ogni cavo due volte.
        #GEPscience_bd_magScan_DamonaSrfLandedTropicalLowlands_00 = Linea di base quasi a zero, con rari picchi sottili come aghi da frammenti sparsi. Il terreno sembra vecchio, quieto e fin troppo sincero al riguardo.
        #GEPscience_bd_magScan_DamonaSrfLandedTemperateLowlands_00 = Una debole anomalia deriva mentre avanzi, suggerendo detriti sepolti più che un vero campo. Il sole rosso resta appeso, fioco, offrendo luce ma nessuna rassicurazione.
        #GEPscience_bd_magScan_DamonaSrfLandedTropicalMidlands_00 = Il magnetometro cattura una firma di breve durata lungo una cresta, poi di nuovo nulla. Damona sembra razionare i suoi segreti.
        #GEPscience_bd_magScan_DamonaSrfLandedTemperateMidlands_00 = La traccia resta così piatta da sentire l'elettronica dello strumento nei dati. Il Controllo Missione suggerisce "aumenta la sensibilità", e sembra proprio di sfidare la sorte.
        #GEPscience_bd_magScan_DamonaSrfLandedHighlands_00 = La roccia esposta mostra picchi coerenti leggermente più forti, probabilmente resti magnetizzati di antichi impatti. I numeri sono taglienti, il paesaggio sembra ancora più tagliente.
        #GEPscience_bd_magScan_DamonaSrfLandedImpactBasin_00 = Il bacino produce l'anomalia più ampia della luna, sfumata e complessa, come se la violenza non si fosse mai del tutto raffreddata. Annoti che "caratteristica" è riduttivo.
        #GEPscience_bd_magScan_DamonaSrfLandedPoles_00 = Letture pulite e quiete con un puntino ostinato che si rifiuta di spiegarsi. Quaggiù, un solo puntino basta per sembrare una scoperta.
        #GEPscience_bd_magScan_EponaInSpaceLow_00 = Il magnetometro trova una magnetosfera sottile e stanca che fatica contro il vento di Grannus. Le letture arrivano in onde lente, come se perfino il campo si muovesse con un grande ritardo.
        #GEPscience_bd_magScan_EponaInSpaceHigh_00 = Quassù il segnale quasi si dissolve nel sibilo di particelle del debole sole rosso. Lo "scudo" di Epona è più che altro un suggerimento educato.
        #GEPscience_bd_magScan_EponaSrfLandedTropicalLowlands_00 = Un debole campo di fondo sta sotto i dati come un battito tenue sotto il ghiaccio. Ogni piccolo picco ti fa chiedere cosa si muova molto sotto la crosta.
        #GEPscience_bd_magScan_EponaSrfLandedTemperateLowlands_00 = La traccia deriva pigramente, poi scatta quando passano particelle cariche. Lo registri come "variazione" e cerchi di non chiamarlo "il cielo che ringhia".
        #GEPscience_bd_magScan_EponaSrfLandedTropicalUplands_00 = Il segnale cala con la quota e diventa più pulito, come se l'aria sottile fosse meno disposta a trasportare correnti vaganti. La luce rossa del giorno fa comunque sembrare lo schermo troppo caldo.
        #GEPscience_bd_magScan_EponaSrfLandedTemperateUplands_00 = Piccole anomalie ripetibili si aggrappano ad affioramenti più scuri. Il pianeta forse è quasi tutto gelato, ma non ha dimenticato i suoi metalli.
        #GEPscience_bd_magScan_EponaSrfLandedHighlands_00 = Il magnetometro intercetta picchi nitidi lungo creste esposte, poi torna a quasi nulla. Sembra di leggere cicatrici nella pietra.
        #GEPscience_bd_magScan_EponaSrfLandedGrandPeaks_00 = Le cime danno le firme locali più forti, abbastanza nette da mappare a mano. La vista è spettacolare, ma i numeri ti ricordano quanto sia sottile il tuo margine quaggiù.
        #GEPscience_bd_magScan_EponaSrfLandedCraters_00 = Anomalie ampie e sfumate suggeriscono che vecchi impatti abbiano mescolato materiale conduttivo in strati. I dati sembrano un libro di storia disordinato, con capitoli mancanti.
        #GEPscience_bd_magScan_EponaSrfLandedVolcanoes_00 = Correnti sepolte o roccia magnetizzata? Le letture saltano in impulsi lenti che ti fanno immaginare il calore al lavoro sotto il ghiaccio, in silenzio e senza tregua.
        #GEPscience_bd_magScan_EponaSrfLandedPoles_00 = Poco rumore, linea di base pulita, un puntino ostinato che si rifiuta di spiegarsi. In questa lontana luce rossa, anche un solo puntino sembra compagnia.
        #GEPscience_bd_magScan_RosmertaInSpaceLow_00 = Lo strumento non trova alcun vero campo, solo un brusio aspro di radiazione e un lieve tiro da Epona lì vicino. Rosmerta viaggia nel magnetismo di qualcun altro.
        #GEPscience_bd_magScan_RosmertaInSpaceHigh_00 = Quassù è quasi puro rumore di fondo, con picchi occasionali quando Grannus si innervosisce. Il vuoto sembra ordinato finché non ingrandisci.
        #GEPscience_bd_magScan_RosmertaSrfLandedTropicalLowlands_00 = Linea di base quasi a zero, poi minuscoli picchi sottili come aghi da frammenti sparsi nella polvere. La luna è quieta nei dati magnetici, ma rumorosa nella radiazione.
        #GEPscience_bd_magScan_RosmertaSrfLandedTemperateLowlands_00 = La traccia resta abbastanza piatta da sentire l'elettronica dello strumento nei dati. Resist i alla tentazione di dargli un colpetto "tanto per sicurezza".
        #GEPscience_bd_magScan_RosmertaSrfLandedTropicalMidlands_00 = Una lieve ondulazione indotta va e viene, come se la presenza di Epona filtrasse attraverso il suolo. Rosmerta non contribuisce con altro che silenzio.
        #GEPscience_bd_magScan_RosmertaSrfLandedTemperateMidlands_00 = Piccole anomalie si allineano lungo creste basse, poi svaniscono di nuovo. È come se il terreno nascondesse il metallo in piena vista.
        #GEPscience_bd_magScan_RosmertaSrfLandedHighlands_00 = La roccia esposta produce le firme più nette, brevi e coerenti. Le segni per dopo e ti ricordi quanto sia lontano "dopo" da qui.
        #GEPscience_bd_magScan_RosmertaSrfLandedPoles_00 = Immobilità fredda e senza aria rende i dati quasi troppo puliti. Il lungo ritardo nelle comunicazioni trasforma "interessante" in una parola solitaria.
        #GEPscience_bd_magScan_RAB-58EInSpaceLow_00 = Nessun campo intrinseco: solo statica nervosa da particelle cariche e un accenno dell'influenza di Epona. Il magnetometro lo chiama "ambientale", tu lo chiami "ostile".
        #GEPscience_bd_magScan_RAB-58EInSpaceHigh_00 = Il segnale svanisce fino a restare solo un sibilo di fondo. Perfino i dati sembrano poter andare alla deriva se smetti di guardarli.
        #GEPscience_bd_magScan_RAB-58ESrfLandedLowlands_00 = Linea piatta, blip improvviso, linea piatta di nuovo: come pestare chiodi invisibili. Qualunque cosa sia questo piccolo corpo, è cucito insieme con pezzi che non combaciano.
        #GEPscience_bd_magScan_RAB-58ESrfLandedEasternHighlands_00 = Alcune anomalie ostinate si aggrappano a massi più scuri, abbastanza coerenti da triangolare. Catturato o no, si è portato dietro il suo bagaglio magnetico.
        #GEPscience_bd_magScan_RAB-58ESrfLandedWesternHighlands_00 = Le letture restano quasi mute, poi schizzano nette vicino a roccia fratturata. Lo etichetti "inclusione metallica" perché "mistero" non è un'unità di misura.
        #GEPscience_bd_magScan_CernunnosInSpaceLow_00 = Il magnetometro non trova alcun campo globale, solo un silenzio morbido e poco radiativo e un lieve tremolio di particelle. Sembra di orbitare al bordo di un sistema che si è dimenticato di fare rumore.
        #GEPscience_bd_magScan_CernunnosInSpaceHigh_00 = Più lontano, tutto si media verso quasi nulla. Il debole sole rosso è una brace distante, e i dati arrivano a casa come un messaggio in bottiglia.
        #GEPscience_bd_magScan_CernunnosSrfLandedTropicalLowlands_00 = Linea di base quasi a zero con un rumore minimo e vagante: polvere e statica fanno gran parte del lavoro. Inizi ad apprezzare il "noioso" come caratteristica di sopravvivenza.
        #GEPscience_bd_magScan_CernunnosSrfLandedTemperateLowlands_00 = Piccoli picchi compaiono quando attraversi chiazze di terreno più scure. La superficie è ghiaccio, ma le impurità continuano a provare a raccontare una storia.
        #GEPscience_bd_magScan_CernunnosSrfLandedTropicalMidlands_00 = La traccia è abbastanza calma da notare schemi sottili, come granuli magnetizzati debolmente allineati molto tempo fa. Il cielo resta fioco, e l'orizzonte resta lontano.
        #GEPscience_bd_magScan_CernunnosSrfLandedTemperateMidlands_00 = Una lieve ondulazione suggerisce una debole induzione da particelle cariche di passaggio, non da qualcosa all'interno. Cernunnos è soprattutto un ricevitore silenzioso.
        #GEPscience_bd_magScan_CernunnosSrfLandedHighlands_00 = Anomalie nette compaiono lungo creste esposte, brevi e ripetibili. Per un piccolo mondo ghiacciato, nei dati ha spigoli sorprendentemente affilati.
        #GEPscience_bd_magScan_CernunnosSrfLandedSouthPolarHills_00 = Le colline fredde danno letture pulite e con poco rumore, con un puntino coerente che non puoi ignorare. Lo etichetti e ti chiedi se là fuori ci siano altri corpi in ascolto.
        #GEPscience_bd_magScan_CernunnosSrfLandedNorthPole_00 = Silenzio quasi perfetto, poi un singolo picco come un cenno dal terreno. Sotto il bagliore rosso di Grannus, sembra una risposta.

        // bd_mapping
        #GEPscience_bd_mapping_GrannusInSpaceLowNorthPolarZone_00 = La zona polare si risolve in una coperta irrequieta di celle convettive rosso scuro. Le impostazioni di esposizione litigano con la stella.
        #GEPscience_bd_mapping_GrannusInSpaceLowNorthSubpolarZone_00 = Le strutture sub-polari si sfumano e si riformano tra una linea di scansione e l'altra, come se Grannus si rifiutasse apposta di restare fermo per la mappa.
        #GEPscience_bd_mapping_GrannusInSpaceLowNorthTemperateZone_00 = Alle latitudini temperate compaiono lunghe bande di attività, deboli ma estese. La telemetria arriva in ritardo, la turbolenza no.
        #GEPscience_bd_mapping_GrannusInSpaceLowNorthTropicZone_00 = La zona tropicale si accende a chiazze irregolari, punteggiata da brevi brillamenti che costringono la camera a "sbattere le palpebre".
        #GEPscience_bd_mapping_GrannusInSpaceLowEquatorialZone_00 = L'equatore sembra un fiume lento di luce in ebollizione. Lo etichetti "terreno" perché il software pretende una parola.
        #GEPscience_bd_mapping_GrannusInSpaceLowSouthTropicZone_00 = I tropici meridionali mostrano un bagliore maculato e improvvisi punti caldi. Archivi una nota: "Non zoomare con la faccia."
        #GEPscience_bd_mapping_GrannusInSpaceLowSouthTemperateZone_00 = La fascia temperata meridionale ha una trama più sottile, come stoffa consumata. Anche dall'orbita sembra pesante.
        #GEPscience_bd_mapping_GrannusInSpaceLowSouthSubpolarZone_00 = L'oscuramento sub-polare fa sembrare le strutture più profonde di quanto siano. Il team di mappatura discute di ombre su qualcosa che non ha suolo.
        #GEPscience_bd_mapping_GrannusInSpaceLowSouthPolarZone_00 = Il polo sud sfarfalla con archi filamentosi vicino al bordo del disco. Il downlink balbetta, come se fosse intimidito.
        #GEPscience_bd_mapping_TaranisInSpaceLowMagmaSea_00 = Il mare di lava brilla di un arancione opaco sotto il sole rosso, con schemi convettivi come cicatrici. Quasi riesci a sentire il calore attraverso i dati.
