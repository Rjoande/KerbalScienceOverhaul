@EXPERIMENT_DEFINITION:HAS[#id[bd_poke]]
{
    %RESULTS
    {
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_poke_TaranisSrfLandedScorchedLowlands_00 // The shaft barely scratches the glassy, heat-baked crust before protesting. Under Grannus’ dim red glare, even “soil” feels like it’s trying to stay solid.
		TaranisSrfLandedMidlands* = #GEPscience_bd_poke_TaranisSrfLandedMidlands_00 // A brittle surface layer gives way to surprisingly fine grit, then abruptly stops again. The force curve looks like a heartbeat from a very angry rock.
		TaranisSrfLandedHighlands* = #GEPscience_bd_poke_TaranisSrfLandedHighlands_00 // The probe meets compacted, sintered regolith that acts more like ceramic than dust. By the time the data pings home, you’ve already heard the lonely *thunk*.
		TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_poke_TaranisSrfLandedDarkSideMidlands_00 // The tip sinks a few millimeters into cold powder and hits something unyielding beneath. The instrument creaks in the darkness like it misses sunlight.
		TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_poke_TaranisSrfLandedDarkSideHighlands_00 // The surface fractures with a sharp snap, then rebounds as if offended. The red sun is only a faint rim-light out here, but the ground still feels unforgiving.
		TaranisSrfLandedPoles* = #GEPscience_bd_poke_TaranisSrfLandedPoles_00 // A dusting of frost-like grains compresses easily, then the shaft stops dead on hard substrate. “Soft on top, mean underneath” seems to be a theme this far from home.

		ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_poke_ToutatisSrfLandedSunnyLowlands_00 // The baked ground resists immediately, as if it’s been kiln-fired for ages. The tip comes out warm enough to count as a snack heater.
		ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_poke_ToutatisSrfLandedSunnyHighlands_00 // The shaft barely penetrates before the force readout climbs sharply. Whatever this is, it’s been welded together by relentless sunlight.
		ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_poke_ToutatisSrfLandedTransitionalLowlands_00 // The surface yields in a cracked, flaky way, then firms up into something cohesive. Thermal cycling seems to have kneaded the soil like dough you shouldn’t eat.
		ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_poke_ToutatisSrfLandedTransitionalHighlands_00 // A layered crust gives a little, then locks up with a sudden stop. The data suggests alternating hardpan and rubble, as if the planet can’t pick a side.
		ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_poke_ToutatisSrfLandedDarkSideLowlands_00 // Cold dust accepts the probe politely—until it hits a buried slab. You log it as “powder over pavement,” and wait out the long uplink delay.
		ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_poke_ToutatisSrfLandedDarkSideHighlands_00 // The ground is brittle; it gives all at once with a sharp crack, then jams the shaft. Even the darkness feels tense here.
		ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_poke_ToutatisSrfLandedSoutheasternMountains_00 // Compacted scree fights back steadily, requiring far more force than expected. Your suit joints complain, but the numbers look very “build-a-base-able.”
		ToutatisSrfLandedWesternMountains* = #GEPscience_bd_poke_ToutatisSrfLandedWesternMountains_00 // The probe meets bouldery debris and refuses to go any deeper. You consider renaming the experiment to “bd_stareAtRock.”
		ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_poke_ToutatisSrfLandedDarkSideMountains_00 // Frozen shards and thin air make the impact feel oddly crisp and hollow. The shaft rings like a bell, and nobody hears it for several minutes.

		NodensSrfLandedShores* = #GEPscience_bd_poke_NodensSrfLandedShores_00 // Damp ground yields easily, with a satisfying, squelchy push. The thick air hisses around your boots while the ocean noise feels impossibly far from Kerbin.
		NodensSrfLandedTropicalLowlands* = #GEPscience_bd_poke_NodensSrfLandedTropicalLowlands_00 // The probe sinks deeper than planned into soft, cohesive soil. Mission Control asks if you “poked something alive,” but the reply arrives too late to sound confident.
		NodensSrfLandedTemperateLowlands* = #GEPscience_bd_poke_NodensSrfLandedTemperateLowlands_00 // Springy soil offers moderate resistance and holds together well on withdrawal. The readings look promising for future footings—once the supply ships finish their very long trip.
		NodensSrfLandedTropicalMidlands* = #GEPscience_bd_poke_NodensSrfLandedTropicalMidlands_00 // Firmer, clay-like material grips the shaft and releases it with a reluctant pop. You note excellent cohesion and extremely questionable cleanliness.
		NodensSrfLandedTemperateMidlands* = #GEPscience_bd_poke_NodensSrfLandedTemperateMidlands_00 // Pebbly layers make the force curve noisy and uneven. The analysis feels like it’s happening on another planet… because it is, under that red sun.
		NodensSrfLandedHighlands* = #GEPscience_bd_poke_NodensSrfLandedHighlands_00 // Hard-packed ground resists steadily, suggesting long-term compression or cementing. If this world is going to host anything, it won’t be on wobbly dirt.
		NodensSrfLandedTundra* = #GEPscience_bd_poke_NodensSrfLandedTundra_00 // A frozen crust fights the first push, then breaks through into softer material underneath. The instrument logs a clean two-layer profile and a very unclean joke.
		NodensSrfLandedIceCaps* = #GEPscience_bd_poke_NodensSrfLandedIceCaps_00 // The shaft slips through a granular top layer and stops firmly at solid ice. Under Grannus’ dim light, even the “snow” feels unfamiliar and slightly ominous.

        BelisamaSrfLandedFlats* = #GEPscience_bd_poke_BelisamaSrfLandedFlats_00 // The probe slides in smoothly, then meets a stubborn, compacted layer that refuses to budge. The force trace looks simple—until you remember how far the data has to travel.
		BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_poke_BelisamaSrfLandedTropicalLowlands_00 // The surface yields with a damp, cohesive grab that clings to the shaft on withdrawal. Whatever “soil” means here, it has opinions.
		BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_poke_BelisamaSrfLandedTemperateLowlands_00 // A thin crust cracks, then gives way to firm, workable material. Under the dim red sun, it’s comforting to find something that behaves predictably.
		BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_poke_BelisamaSrfLandedTropicalMidlands_00 // The probe sinks a little too easily, then stiffens as grains lock together around it. The instrument reports excellent cohesion and terrible manners.
		BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_poke_BelisamaSrfLandedTemperateMidlands_00 // Pebbly resistance comes in pulses, like the ground is layered in old deposits. The readout arrives with minutes of delay, but the *thunk* was immediate.
		BelisamaSrfLandedHighlands* = #GEPscience_bd_poke_BelisamaSrfLandedHighlands_00 // Hard-packed terrain fights back steadily, suggesting long compression or cementing. If anyone builds here, they’ll need drills, not optimism.
		BelisamaSrfLandedPoles* = #GEPscience_bd_poke_BelisamaSrfLandedPoles_00 // A brittle, cold top layer snaps cleanly and then the probe stops dead on something dense. The shadows feel longer this far from home.

		SucellusSrfLandedBasins* = #GEPscience_bd_poke_SucellusSrfLandedBasins_00 // Fine material accepts the probe, then abruptly jams as if you hit a buried slab. The curve screams “sediment over something older.”
		SucellusSrfLandedLowlands* = #GEPscience_bd_poke_SucellusSrfLandedLowlands_00 // Moderate resistance and a smooth push suggest well-sorted grains. The data packet finally pings home, right when you start missing the sound of radios.
		SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_poke_SucellusSrfLandedTropicalMidlands_00 // Sticky, cohesive ground grips the shaft and releases it with a reluctant pop. The sample smell is logged as “unhelpful.”
		SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_poke_SucellusSrfLandedTemperateMidlands_00 // A layered crust alternates between crunchy and firm, as if temperature swings have been baking and breaking it for ages. You label it “annoyingly interesting.”
		SucellusSrfLandedHighlands* = #GEPscience_bd_poke_SucellusSrfLandedHighlands_00 // The probe barely penetrates before the force climbs sharply into “nope.” Under Grannus’ red light, the high ground feels like it’s been welded together.
		SucellusSrfLandedPoles* = #GEPscience_bd_poke_SucellusSrfLandedPoles_00 // Granular frost compresses easily, then the tip hits solid substrate with a sharp stop. The instrument logs a two-layer profile and a three-layer shiver.

		CaireenSrfLandedLowlands* = #GEPscience_bd_poke_CaireenSrfLandedLowlands_00 // The probe pushes into compact grit with a steady, sandy resistance. The numbers are clean, the horizon is alien, and the uplink is painfully slow.
		CaireenSrfLandedMidlands* = #GEPscience_bd_poke_CaireenSrfLandedMidlands_00 // Coarse grains rattle the shaft and make the force signal noisy. It’s like poking a box of broken glass—politely.
		CaireenSrfLandedHighlands* = #GEPscience_bd_poke_CaireenSrfLandedHighlands_00 // The surface behaves like brittle stone dust fused into a crust. The tip scrapes, squeals, and reminds you this world does not do “soft landings.”
		CaireenSrfLandedPoles* = #GEPscience_bd_poke_CaireenSrfLandedPoles_00 // A cold, powdery veneer gives way instantly to hard, dense material beneath. The red sun barely warms the scene, but the ground is still unforgiving.

        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_poke_AirmedSrfLandedTropicalLowlands_00 // The probe bites into loose, pale grit, then stops on a tougher layer that feels heat-welded. The silence makes the force spikes feel louder.
		AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_poke_AirmedSrfLandedTemperateLowlands_00 // A thin crust flakes away and reveals compacted fines underneath. The readout is neat; the long wait for confirmation is not.
		AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_poke_AirmedSrfLandedTropicalMidlands_00 // Penetration is shallow and stubborn, like the surface has been sintered into ceramic. Under the dim red sun, “soil” is mostly attitude.
		AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_poke_AirmedSrfLandedTemperateMidlands_00 // The shaft crunches through grains, then abruptly jams on buried rubble. You log “high variance” and try not to imagine what made the rubble.
		AirmedSrfLandedHighlands* = #GEPscience_bd_poke_AirmedSrfLandedHighlands_00 // Hard-packed regolith resists steadily with very little give. Whatever sculpted Airmed, it left behind a surface that doesn’t forgive.
		AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_poke_AirmedSrfLandedDarkenedLowlands_00 // Cold, dark dust accepts the tip for a moment, then a dense slab stops it dead. The graph arrives later, but the *thunk* was immediate.
		AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_poke_AirmedSrfLandedDarkenedMidlands_00 // Brittle crust fractures with a sharp snap and then clamps the probe in place. You briefly consider calling this “anchoring research.”
		AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_poke_AirmedSrfLandedDarkenedHighlands_00 // The probe barely scratches the surface before the force climbs into the “nope” region. Even in shadow, the ground feels fused together.
		AirmedSrfLandedPoles* = #GEPscience_bd_poke_AirmedSrfLandedPoles_00 // Powdery frost-like grains compress easily, then transition to solid substrate almost instantly. Two layers, one red sun, and zero warmth.

		BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_poke_BorvoSrfLandedTropicalCraquelure_00 // The tip slips into cracked plates and finds soft fill between them. The resistance curve looks like a broken window—fitting.
		BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_poke_BorvoSrfLandedTemperateCraquelure_00 // Brittle, blocky crust gives way in steps, as if the ground is made of stacked shingles. The thin air carries a faint hiss around the instrument.
		BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_poke_BorvoSrfLandedTropicalLowlands_00 // The probe sinks deeper than expected into cohesive material that clings on withdrawal. Whatever Borvo is made of, it doesn’t like letting go.
		BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_poke_BorvoSrfLandedTemperateLowlands_00 // Moderate, steady resistance suggests well-sorted grains or finely broken ice. The atmosphere makes it feel almost normal—until you look up at the wrong sun.
		BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_poke_BorvoSrfLandedTropicalMidlands_00 // A stiff upper layer cracks, then yields to something denser and slightly springy. The numbers say “compressed,” the feeling says “mysterious.”
		BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_poke_BorvoSrfLandedTemperateMidlands_00 // Pebbly interference makes the force trace jittery and uneven. You label it “mixed rubble,” and the uplink takes its sweet time agreeing.
		BorvoSrfLandedHighlands* = #GEPscience_bd_poke_BorvoSrfLandedHighlands_00 // The probe meets hard, compacted ground and barely penetrates. If Borvo is hiding ice, it’s hiding it very confidently.
		BorvoSrfLandedMajorCraters* = #GEPscience_bd_poke_BorvoSrfLandedMajorCraters_00 // Loose ejecta swallows the tip, then abruptly locks on a buried chunk. The instrument reports high cohesion for something that looks like chaos.
		BorvoSrfLandedPoles* = #GEPscience_bd_poke_BorvoSrfLandedPoles_00 // Granular frost compacts smoothly, then transitions to a tough, icy layer beneath. You note “excellent bearing,” and “terrible toes.”

		DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_poke_DamonaSrfLandedTropicalLowlands_00 // The probe grinds into gray dust that behaves like powdered stone. Penetration is shallow, as if the surface has been packed tight for ages.
		DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_poke_DamonaSrfLandedTemperateLowlands_00 // A thin, brittle crust snaps and exposes finer material underneath. The data is clean; the landscape is not.
		DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_poke_DamonaSrfLandedTropicalMidlands_00 // Coarse grains rattle the shaft and make the force signal noisy. It’s like poking a bucket of gravel in perfect vacuum silence.
		DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_poke_DamonaSrfLandedTemperateMidlands_00 // The tip finds alternating soft pockets and hard stops, hinting at layered deposits. Whatever happened here, it didn’t happen gently.
		DamonaSrfLandedHighlands* = #GEPscience_bd_poke_DamonaSrfLandedHighlands_00 // The ground resists like fused regolith—more rock than soil. Under Grannus’ dim light, the high ground feels especially unforgiving.
		DamonaSrfLandedImpactBasin* = #GEPscience_bd_poke_DamonaSrfLandedImpactBasin_00 // Fine, loose basin fill takes the probe easily, then hits compacted debris deeper down. The profile reads like a scar with layers.
		DamonaSrfLandedPoles* = #GEPscience_bd_poke_DamonaSrfLandedPoles_00 // Cold, powdery veneer compresses instantly before the probe stops on dense substrate. The red sun offers little help, and the numbers confirm it.

        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_poke_EponaSrfLandedTropicalLowlands_00 // The probe sinks into a cold, compacted crust and stops on something tougher below. The force curve is tidy; the methane-tinged breeze is not.
		EponaSrfLandedTemperateLowlands* = #GEPscience_bd_poke_EponaSrfLandedTemperateLowlands_00 // A brittle surface layer cracks, then yields to dense, slightly springy material. Under Grannus’ dim red light, “soil” feels more like engineered packing.
		EponaSrfLandedTropicalUplands* = #GEPscience_bd_poke_EponaSrfLandedTropicalUplands_00 // Penetration is shallow and stubborn, as if the ground has been sintered in place. The readout arrives late, but the refusal was immediate.
		EponaSrfLandedTemperateUplands* = #GEPscience_bd_poke_EponaSrfLandedTemperateUplands_00 // Granular crust gives a few millimeters, then locks up hard. Whatever lies beneath Epona’s cold exterior, it has made the top layer serious.
		EponaSrfLandedHighlands* = #GEPscience_bd_poke_EponaSrfLandedHighlands_00 // The probe barely scratches the surface before the force climbs into “nope.” The thin warmth you hoped for is apparently scheduled for the interior only.
		EponaSrfLandedGrandPeaks* = #GEPscience_bd_poke_EponaSrfLandedGrandPeaks_00 // The tip rattles through sharp grit and jams on buried rubble. You note “excellent stability,” and “poor hospitality.”
		EponaSrfLandedCraters* = #GEPscience_bd_poke_EponaSrfLandedCraters_00 // Loose ejecta swallows the probe easily, then hits compacted debris with a sudden stop. The profile reads like a layered scar, sent home across a very long distance.
		EponaSrfLandedVolcanoes* = #GEPscience_bd_poke_EponaSrfLandedVolcanoes_00 // The surface is crusty and fragile on top, warmer and far denser just below. Epona might be frozen—but the poke suggests it’s pretending.
		EponaSrfLandedPoles* = #GEPscience_bd_poke_EponaSrfLandedPoles_00 // Powdery frost compresses instantly, then the probe halts on solid ice. The red sun offers little comfort, but the data is satisfyingly clear.

		RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_poke_RosmertaSrfLandedTropicalLowlands_00 // The probe pushes into dusty fines that cling electrostatically, then hits a hard, icy substrate. In vacuum silence, the instrument’s *tick* feels loud.
		RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_poke_RosmertaSrfLandedTemperateLowlands_00 // A thin crust fractures with a crisp snap and reveals compacted grains underneath. The force trace looks like it’s been frozen in place for ages.
		RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_poke_RosmertaSrfLandedTropicalMidlands_00 // The tip sinks a little, then binds as grains lock together around it. You log “high cohesion,” and “low patience,” while waiting on the uplink.
		RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_poke_RosmertaSrfLandedTemperateMidlands_00 // Pebbly interference makes the signal jitter like a nervous seismograph. Rosmerta’s surface seems to be half dust, half stubbornness.
		RosmertaSrfLandedHighlands* = #GEPscience_bd_poke_RosmertaSrfLandedHighlands_00 // Penetration is minimal—whatever this is, it’s been compacted into something rocklike. The horizon is empty enough to feel personal.
		RosmertaSrfLandedPoles* = #GEPscience_bd_poke_RosmertaSrfLandedPoles_00 // The probe slides through fragile frost and stops dead on dense ice. You add a note: “Do not attempt to dig your way home.”

		RAB-58ESrfLandedLowlands* = #GEPscience_bd_poke_RAB-58ESrfLandedLowlands_00 // The probe sinks farther than expected into fluffy material, then meets a hard core beneath. Captured rock or snowball? The answer appears to be “both, inconveniently.”
		RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_poke_RAB-58ESrfLandedEasternHighlands_00 // The tip scrapes, squeals, and barely penetrates. In this near-zero gravity, even a “poke” feels like a major construction project.
		RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_poke_RAB-58ESrfLandedWesternHighlands_00 // Brittle crust shatters in tiny flakes, then locks the probe against a solid layer. The dataset arrives as a neat packet from a very un-neat little moonlet.

		CernunnosSrfLandedTropicalLowlands* = #GEPscience_bd_poke_CernunnosSrfLandedTropicalLowlands_00 // The probe compresses cold, granular frost and stops on a dense icy layer beneath. The red sun is distant; the ice is not.
		CernunnosSrfLandedTemperateLowlands* = #GEPscience_bd_poke_CernunnosSrfLandedTemperateLowlands_00 // A dusty veneer yields easily, then the force climbs as the tip hits compacted, ancient material. The graph looks like a slow, patient refusal.
		CernunnosSrfLandedTropicalMidlands* = #GEPscience_bd_poke_CernunnosSrfLandedTropicalMidlands_00 // The surface cracks like thin ceramic and reveals a tougher substrate below. You can almost hear the long ages of cold in the way it breaks.
		CernunnosSrfLandedTemperateMidlands* = #GEPscience_bd_poke_CernunnosSrfLandedTemperateMidlands_00 // Pebbly grains rattle the shaft and produce a noisy signal, then abruptly jam it. The terrain reads like mixed rubble frozen in time.
		CernunnosSrfLandedHighlands* = #GEPscience_bd_poke_CernunnosSrfLandedHighlands_00 // Penetration is shallow and force rises sharply, suggesting sintered regolith over ice. Even a dwarf planet can be very firm about boundaries.
		CernunnosSrfLandedSouthPolarHills* = #GEPscience_bd_poke_CernunnosSrfLandedSouthPolarHills_00 // The probe bites into windworked frost and quickly hits dense, load-bearing ice. You mark it as “stable,” and “still unsettlingly far away.”
		CernunnosSrfLandedNorthPole* = #GEPscience_bd_poke_CernunnosSrfLandedNorthPole_00 // A powdery top layer compacts smoothly, then transitions to hard ice with a clean stop. The result pings home late, like a postcard from the edge of nowhere.
    }
}