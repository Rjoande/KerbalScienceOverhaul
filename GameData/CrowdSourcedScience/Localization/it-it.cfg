        #CSS_crewReport_KerbinFlyingLowNorthernIceShelf_01 = Ti sembra di vedere della terra all'orizzonte da questo punto di vista, ma il riverbero rende difficile distinguere.
        #CSS_crewReport_KerbinFlyingLowSouthernIceShelf_00 = Guardi giù e vedi una distesa di ghiaccio bianco splendente. Se la fissi troppo a lungo, ti lacrimano gli occhi.
        #CSS_crewReport_KerbinFlyingLowSouthernIceShelf_01 = La lastra di ghiaccio dall'alto è stranamente uniforme, con una totale assenza di grandi crepacci e fratture.
        #CSS_crewReport_KerbinFlyingHigh_00 = Da quassù, i calanchi non sembrano così male. Però non vuoi comunque schiantarti lì.
        #CSS_crewReport_KerbinFlyingHigh_01 = Qualunque cosa viva nei calanchi non può raggiungerti fin quassù. Speri.
