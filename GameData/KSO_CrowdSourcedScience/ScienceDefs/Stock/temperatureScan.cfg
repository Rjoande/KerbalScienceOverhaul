        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_15 // The temperature in munar orbit remains fairly constant until you enter the dark side.
        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_16 // The temperature rises and falls as you leave and enter the Mun's shadow.

        MinmusSrfLanded* = #CSS_temperatureScan_MinmusSrfLanded_00 // You secretly wish the temperature were hot enough to cause you to sweat. You packed extra ice cream for the occasion.
