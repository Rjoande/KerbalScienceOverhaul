        #JNSQscience_gravityScan_NaraSrfLandedMidlands_00 = Qui il campo gravitazionale è irritantemente uniforme, come se Nara nascondesse i suoi segreti apposta. Fissi lo strumento finché non si comporta.
        #JNSQscience_gravityScan_NaraSrfLandedMidlands_01 = Piccoli picchi compaiono ogni volta che ti avvicini a una cresta. Il rapporto lo descrive come "legato alla topografia", che per gli scienziati significa "già, colline".
        #JNSQscience_gravityScan_NaraSrfLandedHighlands_00 = Il rilevatore trova un'anomalia ampia e ostinata sotto le colline. Qualcuno a casa borbotta "modellazione del nucleo" e sembra entusiasta.
        #JNSQscience_gravityScan_NaraSrfLandedHighlands_01 = La gravità locale tira appena un po' più di quanto il terreno dovrebbe permettere. Ti chiedi cosa stia conservando Nara laggiù oltre alle cattive decisioni.
