@EXPERIMENT_DEFINITION:HAS[#id[bd_XRayDiffract]]
{
    @title = #ScienceRefactor_bd_XRayDiffract_title // X-Ray Diffraction Scan
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_XRayDiffract_default_00 // A detailed analysis of the surface composition is conducted at this location.
        SrfLanded* = #ScienceRefactor_bd_XRayDiffract_default_01 // Powder X-Ray diffraction of this surface sample reveals its exact mineral composition.

        KerbinSrfLanded* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLanded_00 // While possibly not the most effective use of this expensive, specialized diffractometer, this analysis does reveal a very detailed breakdown of the mineral composition of Kerbin's soil.
        KerbinSrfLandedLaunchPad* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedLaunchPad_00 // Diffraction analysis reveals mostly concrete, metal, and a strange mix of what appears to be congealed organic matter.
        KerbinSrfLandedRunway* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedRunway_00 // Analysis of the surface unsurprisingly reveals mostly concrete and the long hydrocarbon structures of asphalt.
        KerbinSrfLandedKSC* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedKSC_00 // A curious collection of well-structured iron compounds, silicates common to soil, and a number organic compounds in various states of decay are discovered in this sample.
        KerbinSrfLandedGrasslands* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedGrasslands_00 // Analysis of Kerbin's grasslands reveals only the expected mixture of various silicate minerals and several different types of organic compounds.
        KerbinSrfLandedTundra* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedTundra_00 // A complex mixture of silicate minerals, organic compounds, and water ice is detected in diffraction analysis of this sample.
        KerbinSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedMountains_00 // Samples from Kerbin's mountainous regions contain several igneous minerals, primarily granite with its various silicate components.
        KerbinSrfLandedBadlands* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedBadlands_00 // This sample is composed primarily of what seems to be various organic compounds, producing a very noisy x-ray diffraction pattern.
        KerbinSrfLandedDeserts* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedDeserts_00 // Kerbin's desert sands are composed almost entirely of fine-grain quartz crystals, producing several sharp rings in the x-ray diffraction pattern.
        KerbinSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedHighlands_00 // Kerbin highlands continue to exhibit a startling similarity to Kerbin lowlands.
        KerbinSrfLandedIceCaps* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedIceCaps_00 // Nothing but the sharp, water ice ring is detected in analysis of this sample.
        KerbinSrfLandedShores* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedShores_00 // The loose sandy soil appears to be mostly silicon dioxide and calcium carbonite crystals.
        KerbinSrfLandedWater* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedWater_00 // The sample appears to be almost entirely water, producing very little useable signal in x-ray diffraction analysis.
        KerbinSrfLandedTrackingStation* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedTrackingStation_00 // A detailed analysis of the tracking station's mineral composition reveals that you are indeed wasting your time...
        KerbinSrfLandedVAB* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedVAB_00 // This hardly seems like the best use of this expensive instrument.
        KerbinSrfLandedR&D* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedR&D_00 // Seriously? Get back to work.
        KerbinSrfLandedAdministration* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedAdministration_00 // Conducting a detailed analysis of this sample is difficult all of the shouting coming from KSC administrators.
        KerbinSrfLandedSPHTanks* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedSPHTanks_00 // After drilling through the surface the instrument is now coated with a fine mist of what appears to be simple hydrocarbons, well done...
        KerbinSrfLandedMissionControl* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedMissionControl_00 // Feeling better about yourself after wasting precious Kerbal funds and time?
        MunSrfLanded* = #ScienceRefactor_bd_XRayDiffract_MunSrfLanded_00 // A detailed x-ray diffraction analysis of the Mun's surface is conducted.
        MunSrfLandedCanyons* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedCanyons_00 // The igneous rock formations found in these deep canyons suggest they could be the remains of ancient Munar rift valleys, geologic formations from the Mun's early history.
        MunSrfLandedEastCrater* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedEastCrater_00 // A number of minerals laced with heavy metals are detected in the analysis of this sample; the asteroid that created this crater must have been rich in these metals.
        MunSrfLandedEastFarsideCrater* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedEastFarsideCrater_00 // A number of iridium compounds are detected in x-ray analysis of samples from this crater, most of which was likely deposited here by an asteroid impact.
        MunSrfLandedFarsideCrater* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedFarsideCrater_00 // The surface here is composed primarily of the iron-rich basaltic minerals expected in ancient craters such as this.
        MunSrfLandedHighlandCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedHighlandCraters_00 // This sample contains a variety of glassy breccia minerals, formed when the violent impact of an asteroid fuses multiple minerals together.
        MunSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedHighlands_00 // Analysis reveals that the bright Munar highlands are made up of aluminum- and calcium-rich feldspar crystals, mostly with very little iron and titanium content.
        MunSrfLandedMidlandCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedMidlandCraters_00 // The minerals in this crater show signs of the rapid melting associated with an asteroid or comet impact.
        MunSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedMidlands_00 // The Munar surface in these relatively low-elevation regions shows signs of ancient volcanic activity along with much higher concentrations of olivine and pyroxene, normally expected to be found only deep in the mantle layer.
        MunSrfLandedNorthernBasin* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedNorthernBasin_00 // This large basin shows signs of igneous rock formations that are likely the result of ancient lava flows. The high levels of olivine and pyroxene minerals suggest this could be due to volcanism rather than an asteroid impact.
        MunSrfLandedNorthwestCrater* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedNorthwestCrater_00 // The dark surface of this crater is composed of various iron- and magnesium-rich basaltic minerals along with relatively high concentrations of magnetite and olivine.
        MunSrfLandedPolarCrater* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPolarCrater_00 // Traces of nearly pure water ice are detected in analysis of this sample. The crater's high walls shelter this water from the sun, allowing it to persist.
        MunSrfLandedPolarLowlands* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPolarLowlands_00 // A number of hydrated silicates are discovered in this sample, a sure sign that relatively large amounts of water exist on the Munar surface.
        MunSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPoles_00 // Small, but discrete pellets of water ice are detected among the bright Anorthosite silicates common to the Munar regolith.
        MunSrfLandedSouthwestCrater* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedSouthwestCrater_00 // Several heavy metal compounds are discovered in x-ray analysis of this sample, a number of which are radioactive.
        MunSrfLandedTwinCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedTwinCraters_00 // Despite their name, the surface composition of these two craters suggest that they were created by two very different asteroid impacts. The larger crater appears to be much older, and with a much higher basaltic mineral content than the smaller.
        MinmusSrfLanded* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLanded_00 // A detailed x-ray diffraction analysis of Minmus' surface is conducted.
        MinmusSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedHighlands_00 // The relatively dark surface of Minmus' higher regions contains a number of basaltic minerals mixed in with the chlorite and calcite minerals found all over the moon.
        MinmusSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedMidlands_00 // The distinct green coloration of this sample is due mostly to the presence of chlorite minerals, primarily of the iron-rich Chamosite variety.
        MinmusSrfLandedLowLands* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedLowLands_00 // The bright white surface of Minmus' low-lying regions has high concentrations of calcium and aluminum-rich feldspar along with calcite minerals.
        MinmusSrfLandedSlopes* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedSlopes_00 // The steep slopes have a composition similar to the surrounding areas; this leads the curious observation that Minmus' surface geology is almost entirely dependent on elevation, as if successive layers of different materials have been added over time.
        MinmusSrfLandedFlats* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedFlats_00 // Hydrated calcium carbonite minerals, similar to loosely bound cement, are present in this flat region of Minmus' surface.
        MinmusSrfLandedGreatFlats* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedGreatFlats_00 // A mixture of calcite and its polymorphs aragonite and vaterite are detected in x-ray analysis of this sample, giving the surface its somewhat sparkly appearance.
        MinmusSrfLandedGreaterFlats* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedGreaterFlats_00 // The green coloration here is due to a mixture of some chlorite minerals and the igneous olivine silicates, a sign that these flats may be the remains of some type of ancient volcanic activity.
        MinmusSrfLandedLesserFlats* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedLesserFlats_00 // In addition to the calcite minerals common to Minmus' surface a small amount of quartz crystals are detected in x-ray analysis of this sample.
        MinmusSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedPoles_00 // Analysis of this polar sample reveals a number of hydrated silicate minerals, but little to no pure water ice.
        MohoSrfLanded* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLanded_00 // X-ray analysis of the surface of Moho reveals a number of low-iron basaltic minerals which appear to have been formed under extremely reducing conditions.
        MohoSrfLanded* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLanded_01 // Basaltic and other igneous minerals coat the surface of Moho; the planet must have a history of violent volcanic activity.
        MohoSrfLandedPolarCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedPolarCrater_00 // Moho's deep polar crater contains a number of basaltic minerals laced with various heavy metals.
        MohoSrfLandedCentralCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedCentralCrater_00 // The x-ray diffraction pattern generated by analysis of this sample reveals a high concentration of magnesium-rich basalt and a number of minerals generally found in the upper mantle layers, such as enstatite and kanoite.
        MohoSrfLandedDeepCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedDeepCrater_00 // Analysis of the composition of this crater reveals a number of minerals only formed under highly reducing conditions.
        MohoSrfLandedSouthernCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedSouthernCrater_00 // The basin of this enormous crater appears to have been filled in with ancient lava flows; this lava is magnesium-rich and most likely formed at very high temperatures with very low viscosity.
        MohoSrfLandedMidlandCraters* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedMidlandCraters_00 // Analysis of this sample found in one of Moho's mid-sized craters suggests that is the product of a relatively recent impact.
        MohoSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedMidlands_00 // The reduced iron and sulfur containing minerals in this sample resemble those found in rare enstatite asteroids.
        MohoSrfLandedHighlandCraters* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedHighlandCraters_00 // The surface of this shallow crater contains higher than expected levels of iron and other heavy metals; these elements were most likely seeded by the asteroid that impacted here.
        MohoSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedHighlands_00 // This terrain is composed primarily of plagioclase feldspar and extremely iron-poor basalt, giving Moho its brownish coloration.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedLowlands_00 // Moho's enormous southern polar plain is composed of igneous material rich in iron-poor basalt and the reduced sulfur mineral oldhamite.
        MohoSrfLandedNorthernSinkhole* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedNorthernSinkhole_00 // Moho's deep polar crater contains a number of basaltic minerals laced with various heavy metals.
        MohoSrfLandedCentralLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedCentralLowlands_00 // The x-ray diffraction pattern generated by analysis of this sample reveals a high concentration of magnesium-rich basalt and a number of minerals generally found in the upper mantle layers, such as enstatite and kanoite.
        MohoSrfLandedSouthEasternLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedSouthEasternLowlands_00 // The basin of this enormous crater appears to have been filled in with ancient lava flows; this lava is magnesium-rich and most likely formed at very high temperatures with very low viscosity.
        MohoSrfLandedMinorCraters* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedMinorCraters_00 // Analysis of this sample found in one of Moho's mid-sized craters suggests that is the product of a relatively recent impact.
        MohoSrfLandedSouthWesternLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedSouthWesternLowlands_00 // Analysis of the composition of this crater reveals a number of minerals only formed under highly reducing conditions.
        EveSrfLanded* = #ScienceRefactor_bd_XRayDiffract_EveSrfLanded_00 // X-ray analysis of the surface of Eve reveals the rare lithium silicates neptunite and sugilite, both of which give Eve its purple tint.
        EveSrfLandedPlains* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedPlains_00 // X-ray analysis of the surface of Eve reveals the rare lithium silicates neptunite and sugilite, both of which give Eve its purple tint.
        EveSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedMountains_00 // The darker mountaintop soil of Eve has relatively high levels of iron-rich basalt minerals, along with a number of lithium silicate compounds.
        EveSrfLandedIslands* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedIslands_00 // High levels of the lithium silicate mineral lepidolite are observed in this sample. Such a mineral can serve as an excellent source of several rare alkali metals.
        EveSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedPoles_00 // The x-ray diffraction pattern generated during analysis of this sample shows a number of sharp signals characteristic of large, well-ordered amethyst crystals.
        EveSrfLandedImpactSites* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedImpactSites_00 // Analysis of a sample from within one of Eve's impact craters reveals the incredibly rare mineral putnisite, known for its unique elemental makeup. The presence of such a highly hydrated mineral suggests that significant quantities of water exist near the surface.
        EveSrfLandedCraterLake* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedCraterLake_00 // This sample contains a number of silicates common to Eve's sample, but there are relatively high levels of heavy metal impurities, suggesting that the lake and its nearby terrain are quite toxic.
        EveSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedMidlands_00 // X-ray analysis of the surface of Eve reveals the rare lithium silicates neptunite and sugilite, both of which give Eve its purple tint.
        EveSrfLandedPeaks* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedPeaks_00 // The darker mountaintop soil of Eve has relatively high levels of iron-rich basalt minerals, along with a number of lithium silicate compounds.
        EveSrfLandedImpactEjecta* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedImpactEjecta_00 // Analysis of a sample from within one of Eve's impact craters reveals the incredibly rare mineral putnisite, known for its unique elemental makeup. The presence of such a highly hydrated mineral suggests that significant quantities of water exist near the surface.
        EveSrfLandedExplodiumSea* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedExplodiumSea_00 // This sample contains a number of silicates common to Eve's sample, but there are relatively high levels of heavy metal impurities, suggesting that the lake and its nearby terrain are quite toxic.
        EveSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedLowlands_00 // X-ray analysis of the surface of Eve reveals the rare lithium silicates neptunite and sugilite, both of which give Eve its purple tint.
        EveSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedHighlands_00 // The surface here is composed of a number of silicates along with some traces of amethyst crystals.
        GillySrfLanded* = #ScienceRefactor_bd_XRayDiffract_GillySrfLanded_00 // A number of common silicate minerals are detected in analysis of Gilly's surface. The lack of any igneous rocks attests to Gilly's complete lack of any internal heating processes and suggest that it may be a captured asteroid.
        GillySrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_GillySrfLandedHighlands_00 // Gilly's highland regions contain higher concentrations of the relatively bright, aluminum-rich plagioclase feldspar minerals, which make this area somewhat lighter than other areas of the surface.
        GillySrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_GillySrfLandedLowlands_00 // A number of alkali feldspar silicates are present in this sample; these minerals provide Gilly's low lying areas with their dark brown coloration.
        GillySrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_GillySrfLandedMidlands_00 // A number of common silicate minerals are detected in analysis of Gilly's surface. The lack of any igneous rocks attests to Gilly's complete lack of any internal heating processes and suggest that it may be a captured asteroid.
        DunaSrfLanded* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLanded_00 // A number of interesting trace minerals are detected in x-ray analysis of this sample, including hematite and goethite, iron oxide minerals known to form in the presence of water.
        DunaSrfLandedNorthPole* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedNorthPole_00 // Duna's North Pole consists mostly of pure water ice with a layer of frozen carbon dioxide on top.
        DunaSrfLandedSouthPole* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedSouthPole_00 // The southern polar region of Duna is covered by a thick layer of water ice and carbon dioxide ice, obscuring any analysis of the soil below.
        DunaSrfLandedKerinerValley* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedKerinerValley_00 // Very high concentrations of hydrated sulfur-rich minerals, primarily gypsum and kieserite, are found in analysis of the Keriner Valley surface, an indication of an ancient body of surface water in this area.
        DunaSrfLandedMaria* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedMaria_00 // X-ray analysis of the surface reveals the presence of various so-called secondary, or alteration minerals, those formed in the presence of water, suggesting that this may have been part of an ancient lake bed.
        DunaSrfLandedDepressions* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedDepressions_00 // The surface of this low-lying area is covered with various igneous rocks and contains high concentrations of olivine and high-calcium pyroxene, a sign that ancient lava flows covered this area.
        DunaSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedMountains_00 // Duna's highland areas are rich in basaltic minerals, a possible sign of volcanic origin.
        DunaSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedMidlands_00 // Initial analysis of Duna's surface reveals mostly basaltic rock along with several hydrated silicates, sulfates and a coating of iron oxide, giving the surface its rusty coloration.
        DunaSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedMidlands_01 // A number of interesting trace minerals are detected in x-ray analysis of this sample, including hematite and goethite, iron oxide minerals known to form in the presence of water.
        DunaSrfLandedVallesJebbedius* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedVallesJebbedius_00 // Analysis of this sample reveals relatively few hydrated minerals, it is composed primarily of basaltic rock; this is possibly an indication that this deep fissure was formed by an ancient rift valley, a sign of a more geologically active past for Duna.
        DunaSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedPoles_00 // The polar region of Duna is covered by a thick layer of water ice and carbon dioxide ice, obscuring any analysis of the soil below.
        DunaSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedLowlands_00 // Initial analysis of Duna's surface reveals mostly basaltic rock along with several hydrated silicates, sulfates and a coating of iron oxide, giving the surface its rusty coloration.
        DunaSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedHighlands_00 // Duna's highland areas are rich in basaltic minerals, a possible sign of volcanic origin.
        IkeSrfLanded* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLanded_00 // A detailed x-ray diffraction analysis is conducted on this sample of Ike's surface.
        IkeSrfLandedBadlands* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedBadlands_00 // A mix of common silicate minerals and basaltic rocks hint toward Ike's geologically active past.
        IkeSrfLandedPolarDepression* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedPolarDepression_00 // The aluminum-rich silicates present in this sample also contain a number of heavy metal impurities, possibly seeded here by an asteroid impact.
        IkeSrfLandedWesternMesa* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedWesternMesa_00 // The brighter terrain in this region is composed primarily of feldspar minerals, but also contains relatively high concentrations of pyroxene, normally found in deeper mantle layers.
        IkeSrfLandedPolarMesa* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedPolarMesa_00 // The x-ray diffraction pattern from this sample reveals several hydrated silicate minerals along with a few traces of pure water ice.
        IkeSrfLandedCentralDepressions* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedCentralDepressions_00 // The fused breccia materials and basalt in this sample suggest that this area is the result of an asteroid or comet impact. The lack of obvious crater walls suggest a recent history of internal heating and possible tectonic activity.
        IkeSrfLandedNorthernMesa* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedNorthernMesa_00 // The loosely packed surface in this area is made up primarily of finely ground feldspar minerals.
        IkeSrfLandedShatteredMesa* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedShatteredMesa_00 // X-ray analysis of this sample reveals very high concentrations of igneous basaltic minerals which are most likely the result of ancient lava flows in this area.
        IkeSrfLandedPolarLowlands* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedPolarLowlands_00 // The aluminum-rich silicates present in this sample also contain a number of heavy metal impurities, possibly seeded here by an asteroid impact.
        IkeSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedMidlands_00 // A mix of common silicate minerals and basaltic rocks hint toward Ike's geologically active past.
        IkeSrfLandedSouthPole* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedSouthPole_00 // The x-ray diffraction pattern from this sample reveals several hydrated silicate minerals along with a few traces of pure water ice.
        IkeSrfLandedWesternMountainRidge* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedWesternMountainRidge_00 // The brighter terrain in this region is composed primarily of feldspar minerals, but also contains relatively high concentrations of pyroxene, normally found in deeper mantle layers.
        IkeSrfLandedSouthEasternMountainRange* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedSouthEasternMountainRange_00 // X-ray analysis of this sample reveals very high concentrations of igneous basaltic minerals which are most likely the result of ancient lava flows in this area.
        IkeSrfLandedEasternMountainRidge* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedEasternMountainRidge_00 // The loosely packed surface in this area is made up primarily of finely ground feldspar minerals.
        DresSrfLanded* = #ScienceRefactor_bd_XRayDiffract_DresSrfLanded_00 // There are some rocks and stuff; it's kind of sandy and grey.
        DresSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedLowlands_00 // The dark surface here is made up of basaltic minerals and has a very high concentration of the olivine-rich, igneous rock, peridotite. These materials are a sure sign of ancient lava flows and a history of a geologically activity.
        DresSrfLandedPolarHighlands* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedPolarHighlands_00 // Several hydrated silicates are present in this sample; these are responsible for the relatively high albedo of this polar region.
        DresSrfLandedNortherBasin* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedNortherBasin_00 // Significant amounts of pure water ice are detected in x-ray analysis of the surface in this area.
        DresSrfLandedDresTrench* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedDresTrench_00 // The deep trench in Dres' southern hemisphere is composed of various igneous rocks and is likely the remains of an ancient rift valley.
        DresSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedPoles_00 // Several hydrated silicates are present in this sample; these are responsible for the relatively high albedo of this polar region.
        DresSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedHighlands_00 // Significant amounts of pure water ice are detected in x-ray analysis of the surface in this area.
        DresSrfLandedCanyons* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedCanyons_00 // These deep canyons in Dres' southern hemisphere are composed of various igneous rocks and are likely the remains of an ancient rift valley.
        JoolSrfLanded* = #ScienceRefactor_bd_XRayDiffract_JoolSrfLanded_00 // Jool is made out of... Kerbals!
        LaytheSrfLanded* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLanded_00 // The sandy surface of Laythe is composed primarily of quartz crystals along with traces of several interesting ammonium compounds.
        LaytheSrfLandedIslands* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedIslands_00 // Several interesting tholin compounds, simple organic molecules, are discovered in this sample from Laythe's islands.
        LaytheSrfLandedNorthPole* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedNorthPole_00 // A few traces of pure water ice are discovered during analysis of this sample from Laythe's North Pole.
        LaytheSrfLandedSouthPole* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedSouthPole_00 // The sandy soil here is mostly quartz crystal along with several silicates and igneous rocks.
        LaytheSrfLanderRingArchipelago* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLanderRingArchipelago_00 // Some basaltic minerals are present in this sample, an indication that some kind of volcanic or other geologic activity created these island chains.
        LaytheSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedPoles_00 // A few traces of pure water ice are discovered during analysis of this sample from Laythe's Poles.
        LaytheSrfLandedDunes* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedDunes_00 // Several interesting tholin compounds, simple organic molecules, are discovered in this sample from Laythe's islands.
        LaytheSrfLandedShores* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedShores_00 // Some basaltic minerals are present in this sample, an indication that some kind of volcanic or other geologic activity created these island chains.
        VallSrfLanded* = #ScienceRefactor_bd_XRayDiffract_VallSrfLanded_00 // X-ray analysis of samples from the surface of Vall reveal a number of hydrated copper-containing compounds, giving the surface its blue luster.
        VallSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_VallSrfLandedMountains_00 // Several interesting lead compounds are present in this sample, including the white crystal cerussite and the blue copper-rich mineral berryite.
        VallSrfLandedSinks* = #ScienceRefactor_bd_XRayDiffract_VallSrfLandedSinks_00 // Samples from Vall's low lying, flat regions contain the hydrated copper-rich minerals chalcanthite and azurite. These give the surface a distinct blue coloration.
        VallSrfLandedNorthPole* = #ScienceRefactor_bd_XRayDiffract_VallSrfLandedNorthPole_00 // X-ray analysis of samples from the surface of Vall reveal a number of hydrated copper-containing compounds, giving the surface its blue luster.
        VallSrfLandedSouthPole* = #ScienceRefactor_bd_XRayDiffract_VallSrfLandedSouthPole_00 // The surface of Vall's southern polar region has very high concentrations of water, both in relatively pure ice and in various hydrated minerals.
        VallSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_VallSrfLandedMidlands_00 // The x-ray diffraction analysis of this sample reveals its precise composition, including several bright minerals such as the aluminum-rich silicate kyanite and the precipitated crystals of calcium carbonite known as aragonite.
        VallSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_VallSrfLandedPoles_00 // The surface of Vall's polar region has very high concentrations of water, both in relatively pure ice and in various hydrated minerals.
