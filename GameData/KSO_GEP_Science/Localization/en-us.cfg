        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideLowlands_00 = The peaks are crisp and cold, with signs of frost-bound fractures. The sample feels like it’s holding its breath.
        #GEPscience_bd_XRayDiffract_ToutatisSrfLandedDarkSideHighlands_00 = A brittle, fine-grained signature suggests constant cracking in the dark. The crystals are sharp enough to cut radio silence.
