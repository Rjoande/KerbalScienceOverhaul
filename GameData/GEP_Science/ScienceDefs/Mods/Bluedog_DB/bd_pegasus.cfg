@EXPERIMENT_DEFINITION:HAS[#id[bd_pegasus]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_pegasus_GrannusInSpaceLow_00 // The impact counter barely ticks; whatever dust is here seems to burn up before it can knock.
        GrannusInSpaceLow* = #GEPscience_bd_pegasus_GrannusInSpaceLow_01 // A few sharp pings arrive out of nowhere. By the time Mission Control gets the graph, everyone has already argued about it.
        GrannusInSpaceHigh* = #GEPscience_bd_pegasus_GrannusInSpaceHigh_00 // Long stretches of nothing, then one lonely tap. The detector is starting to sound like it’s counting the distance.
        GrannusInSpaceHigh* = #GEPscience_bd_pegasus_GrannusInSpaceHigh_01 // The background rate is steady and small. Under Grannus’ dim red light, even debris feels hesitant.

        TaranisInSpaceLow* = #GEPscience_bd_pegasus_TaranisInSpaceLow_00 // Impacts come fast and energetic; the detector logs several “PLEASE STOP” events in a row.
        TaranisInSpaceLow* = #GEPscience_bd_pegasus_TaranisInSpaceLow_01 // A pass over the incandescent side coincides with a spike in tiny hits. The readout looks like it needs sunblock.
        TaranisInSpaceHigh* = #GEPscience_bd_pegasus_TaranisInSpaceHigh_00 // Even up here, the micrometeoroids are moving like they’re late for something. Every hit is a little hammer.
        TaranisInSpaceHigh* = #GEPscience_bd_pegasus_TaranisInSpaceHigh_01 // The counter calms down on the dark-side arc, then lights back up as the sun-baked hemisphere swings beneath you.

        ToutatisInSpaceLow* = #GEPscience_bd_pegasus_ToutatisInSpaceLow_00 // Low orbit is surprisingly calm; the thin atmosphere may be sweeping up the smallest bits before they reach you.
        ToutatisInSpaceLow* = #GEPscience_bd_pegasus_ToutatisInSpaceLow_01 // The detector clicks more near the twilight boundary, as if the debris prefers the line between fire and ice.
        ToutatisInSpaceHigh* = #GEPscience_bd_pegasus_ToutatisInSpaceHigh_00 // The impact rate rises in higher orbit; apparently Toutatis has its own little dust neighborhood.
        ToutatisInSpaceHigh* = #GEPscience_bd_pegasus_ToutatisInSpaceHigh_01 // A few big taps ring through the frame. You schedule a message to Mission Control for whenever the radio decides to arrive.

        NodensInSpaceLow* = #GEPscience_bd_pegasus_NodensInSpaceLow_00 // The impact counter stays politely quiet. Nodens’ thick air seems to be doing its job down below.
        NodensInSpaceLow* = #GEPscience_bd_pegasus_NodensInSpaceLow_01 // A few soft taps arrive with long pauses between them. The red-lit cloudtops look calm, but the data says “not empty.”
        NodensInSpaceHigh* = #GEPscience_bd_pegasus_NodensInSpaceHigh_00 // Up here the hits come a bit more often, like you’ve climbed out of Nodens’ protective blanket and into open space again.
        NodensInSpaceHigh* = #GEPscience_bd_pegasus_NodensInSpaceHigh_01 // The detector logs a lonely rhythm of impacts. By the time you downlink the chart, the argument about “natural” vs “leftover” has already cooled off.

        BelisamaInSpaceLow* = #GEPscience_bd_pegasus_BelisamaInSpaceLow_00 // Impacts come in clumps, then stop. Orbiting a tidally locked moon feels like running through invisible lanes of dust.
        BelisamaInSpaceLow* = #GEPscience_bd_pegasus_BelisamaInSpaceLow_01 // The counter spikes as Belisama’s leading edge plows ahead, then settles as if the moon is sweeping its own path clean.
        BelisamaInSpaceHigh* = #GEPscience_bd_pegasus_BelisamaInSpaceHigh_00 // The tap-tap pattern fades with altitude, but never quite vanishes. Something out here is keeping the neighborhood messy.
        BelisamaInSpaceHigh* = #GEPscience_bd_pegasus_BelisamaInSpaceHigh_01 // The detector registers a few sharp hits on the planet-facing side. It’s hard not to blame Nodens, even without evidence.

        SucellusInSpaceLow* = #GEPscience_bd_pegasus_SucellusInSpaceLow_00 // Impacts arrive hard and fast, like Sucellus has been collecting grit for ages and refuses to share it politely.
        SucellusInSpaceLow* = #GEPscience_bd_pegasus_SucellusInSpaceLow_01 // The instrument reports several high-energy strikes in quick succession. You file it under “reasons to check the hull more often.”
        SucellusInSpaceHigh* = #GEPscience_bd_pegasus_SucellusInSpaceHigh_00 // Long quiet stretches, then one violent ping. Whatever hits you out here has had a long time to build up speed.
        SucellusInSpaceHigh* = #GEPscience_bd_pegasus_SucellusInSpaceHigh_01 // The counter stays low, but each event looks energetic. Under the dim red sun, even dust feels a little hostile.

        CaireenInSpaceLow* = #GEPscience_bd_pegasus_CaireenInSpaceLow_00 // The impact sensor rattles like you flew through a gravelly sneeze. Caireen may be small, but it sheds big opinions.
        CaireenInSpaceLow* = #GEPscience_bd_pegasus_CaireenInSpaceLow_01 // A burst of hits lines up with Caireen’s orbit. The moon seems to be dragging a faint debris trail behind it.
        CaireenInSpaceHigh* = #GEPscience_bd_pegasus_CaireenInSpaceHigh_00 // Above the tight orbit, the impacts thin out but persist. The space around Caireen is not as empty as it looks.
        CaireenInSpaceHigh* = #GEPscience_bd_pegasus_CaireenInSpaceHigh_01 // The detector logs sporadic taps with no clear pattern. Mission Control suggests “keep recording” and “try not to think about it.”

        SironaInSpaceLow* = #GEPscience_bd_pegasus_SironaInSpaceLow_00 // The counter chatters as you skim ring-sourced grit; Sirona’s “decorations” are actively sanding your spacecraft.
        SironaInSpaceLow* = #GEPscience_bd_pegasus_SironaInSpaceLow_01 // The impact counter can’t decide what’s real: tiny pings mix with the crackle of Sirona’s violent magnetic environment.
        SironaInSpaceLow* = #GEPscience_bd_pegasus_SironaInSpaceLow_02 // A burst of hits arrives as you skim the radiation belts. You tag the log “maybe dust, maybe doom,” for later analysis.
        SironaInSpaceHigh* = #GEPscience_bd_pegasus_SironaInSpaceHigh_00 // Farther out, the impacts come in sparse clusters, like you’re crossing invisible lanes in Sirona’s vast system.
        SironaInSpaceHigh* = #GEPscience_bd_pegasus_SironaInSpaceHigh_01 // The detector records a lonely tap, then minutes of silence. Under the dim red sun, even debris feels like it’s whispering.

        AirmedInSpaceLow* = #GEPscience_bd_pegasus_AirmedInSpaceLow_00 // Low orbit around Airmed produces sharp, frequent ticks—either there’s a lot of grit, or the moon is still shedding its past.
        AirmedInSpaceLow* = #GEPscience_bd_pegasus_AirmedInSpaceLow_01 // The counter spikes as you pass over the terminator. The lighting is wrong, the timing is wrong, and the dust doesn’t seem to care.
        AirmedInSpaceHigh* = #GEPscience_bd_pegasus_AirmedInSpaceHigh_00 // Higher up, the impacts thin out, but each one is energetic—like you’ve given the micrometeoroids more room to accelerate.
        AirmedInSpaceHigh* = #GEPscience_bd_pegasus_AirmedInSpaceHigh_01 // You downlink the data and get an acknowledgment… eventually. The detector keeps listening while the radio takes the scenic route home.

        BorvoInSpaceLow* = #GEPscience_bd_pegasus_BorvoInSpaceLow_00 // The instrument stays quieter than expected. Borvo’s thin air below may be sweeping up the smallest bits before they reach you.
        BorvoInSpaceLow* = #GEPscience_bd_pegasus_BorvoInSpaceLow_01 // A few gentle taps punctuate the pass. The hazy world beneath looks calm, but the statistics insist it’s still a working neighborhood.
        BorvoInSpaceHigh* = #GEPscience_bd_pegasus_BorvoInSpaceHigh_00 // Impacts become more common at altitude, as if Borvo has a broad, faint halo of dust above its atmosphere.
        BorvoInSpaceHigh* = #GEPscience_bd_pegasus_BorvoInSpaceHigh_01 // The detector logs a neat series of hits, then nothing. It feels like you’ve crossed the edge of an invisible boundary and nobody told you.

        DamonaInSpaceLow* = #GEPscience_bd_pegasus_DamonaInSpaceLow_00 // Mostly silence, with the occasional solitary ping. Damona’s orbit feels abandoned, but not empty.
        DamonaInSpaceLow* = #GEPscience_bd_pegasus_DamonaInSpaceLow_01 // One solid hit rings through the frame. You check the panels, then remember Mission Control won’t see the note for a while anyway.
        DamonaInSpaceHigh* = #GEPscience_bd_pegasus_DamonaInSpaceHigh_00 // The counter barely moves. Out here, the biggest signal is how far you are from everything you recognize.
        DamonaInSpaceHigh* = #GEPscience_bd_pegasus_DamonaInSpaceHigh_01 // A single tap breaks a long stretch of nothingness. The detector dutifully records it, like it’s afraid to miss the only visitor for days.

        EponaInSpaceLow* = #GEPscience_bd_pegasus_EponaInSpaceLow_00 // The detector stays mostly quiet; Epona’s air below is probably sweeping up the smallest grit before it reaches orbit.
        EponaInSpaceLow* = #GEPscience_bd_pegasus_EponaInSpaceLow_01 // A few soft taps interrupt the silence. The dim red sun makes the cloudtops look calm, but “calm” isn’t “empty.”
        EponaInSpaceHigh* = #GEPscience_bd_pegasus_EponaInSpaceHigh_00 // Impacts become more frequent at altitude, like you’ve climbed out of Epona’s shelter and into the system’s dust.
        EponaInSpaceHigh* = #GEPscience_bd_pegasus_EponaInSpaceHigh_01 // The counter logs lonely pings spaced far apart. You schedule the downlink and try not to think about how long the reply will take.

        RosmertaInSpaceLow* = #GEPscience_bd_pegasus_RosmertaInSpaceLow_00 // A short burst of sharp hits suggests Rosmerta is shedding crumbs into its own orbit.
        RosmertaInSpaceLow* = #GEPscience_bd_pegasus_RosmertaInSpaceLow_01 // The impact pattern changes across the terminator. Under red light, it’s hard to tell where “night” ends and “problem” begins.
        RosmertaInSpaceHigh* = #GEPscience_bd_pegasus_RosmertaInSpaceHigh_00 // The hits thin out, but they never stop entirely. Something keeps feeding this little lane of debris.
        RosmertaInSpaceHigh* = #GEPscience_bd_pegasus_RosmertaInSpaceHigh_01 // The detector records a single hard tap after minutes of nothing. Rosmerta feels lonely in the viewports, not in the data.

        RAB-58EInSpaceLow* = #GEPscience_bd_pegasus_RAB-58EInSpaceLow_00 // The counter rattles in short clumps, as if this tiny moonlet drags a faint trail of grit behind it.
        RAB-58EInSpaceLow* = #GEPscience_bd_pegasus_RAB-58EInSpaceLow_01 // Several energetic impacts arrive back-to-back. You label the log “mystery rock is spicy” and move on.
        RAB-58EInSpaceHigh* = #GEPscience_bd_pegasus_RAB-58EInSpaceHigh_00 // Above the moonlet’s immediate vicinity, impacts become rare and unpredictable—like you’re skimming the edge of a dust halo.
        RAB-58EInSpaceHigh* = #GEPscience_bd_pegasus_RAB-58EInSpaceHigh_01 // The detector patiently listens through long silence. Mission Control will hear about it later. Much later.

        CernunnosInSpaceLow* = #GEPscience_bd_pegasus_CernunnosInSpaceLow_00 // The impact rate is low, but each hit rings sharply in the structure. Out here, there’s plenty of room to build up speed.
        CernunnosInSpaceLow* = #GEPscience_bd_pegasus_CernunnosInSpaceLow_01 // One clean ping breaks a long stretch of nothing. The emptiness feels deliberate, like the system is holding its breath.
        CernunnosInSpaceHigh* = #GEPscience_bd_pegasus_CernunnosInSpaceHigh_00 // Almost no impacts register. The strongest signal is how far the red sun and everything familiar have faded.
        CernunnosInSpaceHigh* = #GEPscience_bd_pegasus_CernunnosInSpaceHigh_01 // A single tap arrives like a visitor. You record it carefully, because there may not be another for a while.
    }
}
