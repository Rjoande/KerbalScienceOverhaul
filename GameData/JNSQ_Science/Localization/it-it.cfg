        #JNSQscience_sspxVisualObservation_KerbinSrfLandedIslandAirfield_00 = Osservi aria salmastra, asfalto umido e hangar che odorano di mare e scorciatoie. Il finestrino sviluppa subito un leggero strato di "scienza costiera".
