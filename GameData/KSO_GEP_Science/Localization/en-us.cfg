        #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedEasternHighlands_00 = The eastern highlands are jagged, with slopes that feel exaggerated when the lighting is this dim and the comm delay is this real. You mark one stable spur and call it “good enough for science.”
        #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedWesternHighlands_00 = The western side looks like it was assembled from leftover rocks and stubbornness. The site gets a cautious approval, with the note: “tether everything, including confidence.”

        #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTropicalLowlands_00 = The “tropical” tag feels like a joke told across interplanetary distances. The lowlands are cold, open, and deceptively flat under the red sun’s weak contrast.
