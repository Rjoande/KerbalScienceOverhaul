        #JNSQscience_evaReport_DunaSrfLandedRareCraters_00 = A lone crater breaks the endless rust flats. You walk the rim and start picking where the first comms mast should go.
        #JNSQscience_evaReport_DunaSrfLandedRareCraters_01 = The wind drops inside the crater like it forgot to follow you. For a moment it feels like a tiny frontier shelter carved into the planet.
        #JNSQscience_evaReport_DunaSrfLandedVoronoiCraters_00 = The ground is patterned with repeating pits like a stamped metal sheet. You try not to think about what could make a planet look “organized”.
