        #JNSQscience_barometerScan_DresSrfLanded_00 = Il barometro segnala con calma "nessuna atmosfera". Tu lo tocchi lo stesso, giusto per essere sicuro che il "niente" sia ancora lì.
        #JNSQscience_barometerScan_DresSrfLanded_01 = La pressione legge esattamente ciò che i tuoi polmoni speravano di non vedere: zero. Dres continua la sua fiera tradizione di non supportare la respirazione.
        #JNSQscience_barometerScan_DresInSpaceLow_00 = La lancetta non si degna nemmeno di provare a muoversi. Lo strumento registra un vuoto molto ufficiale.
