        #GEPscience_tantares_ultraviolet_light_camera_AirmedInSpaceLowTropicalLowlands_00 = Dall'orbita bassa, i bassopiani tropicali mostrano chiazze luminose in UV che non coincidono con le mappe nel visibile, come una seconda pelle.
