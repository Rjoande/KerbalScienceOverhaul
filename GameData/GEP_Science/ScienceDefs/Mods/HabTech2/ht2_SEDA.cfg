@EXPERIMENT_DEFINITION:HAS[#id[SEDA]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_SEDA_GrannusInSpaceLow_00 // SEDA’s counters saturate in pulses; heavy ions and neutrons spike as if Grannus is “breathing.” Mission Control asks for a rerun. The rerun looks worse.
        GrannusInSpaceHigh* = #GEPscience_SEDA_GrannusInSpaceHigh_00 // With a little distance, the instruments finally agree on a baseline: a thin, relentless red-dwarf wind peppered with dust and energetic particles. The data arrives late, but it arrives.

        TaranisInSpaceLow* = #GEPscience_SEDA_TaranisInSpaceLow_00 // The plasma sensors scream over the dayside and whisper over the nightside. With no magnetic shelter, the electronics test becomes a very expensive coin-flip.
        TaranisInSpaceHigh* = #GEPscience_SEDA_TaranisInSpaceHigh_00 // Above Taranis, SEDA maps a harsh particle stream carving straight lines through empty space. The red sun feels close, even when the planet looks small.

        ToutatisInSpaceLow* = #GEPscience_SEDA_ToutatisInSpaceLow_00 // The suite sniffs a thin, restless exosphere—charged fragments and dust grains riding in sluggish arcs. The materials tray develops a new “patina” that nobody ordered.
        ToutatisInSpaceHigh* = #GEPscience_SEDA_ToutatisInSpaceHigh_00 // Farther out, Toutatis’ weak field leaves only a faint signature in the particle flow. It’s mostly quiet—until a sudden burst reminds you how long the return signal has to travel.

        NodensInSpaceLow* = #GEPscience_SEDA_NodensInSpaceLow_00 // In low orbit over Nodens, SEDA watches the upper air chew at the exposure coupons with atomic oxygen while the plasma probes trace a busy ionosphere. The dim red sun makes the numbers look familiar—then not.
        NodensInSpaceHigh* = #GEPscience_SEDA_NodensInSpaceHigh_00 // Higher up, the particle counts settle into a guarded rhythm under Nodens’ magnetic umbrella. It’s almost comforting, right up until a delayed packet reminds you how far “home” isn’t.

        BelisamaInSpaceLow* = #GEPscience_SEDA_BelisamaInSpaceLow_00 // Over airless Belisama, there’s no atmosphere to soften anything—just dust pings and charged particle hits that leave the electronics test board looking nervous. The sensors log it all with quiet, clinical disapproval.
        BelisamaInSpaceHigh* = #GEPscience_SEDA_BelisamaInSpaceHigh_00 // At altitude, SEDA catches Belisama drifting in and out of Nodens’ space-weather shadow. Sheltered readings give way to sudden spikes, like the moon can’t decide whether it wants protection.

        SucellusInSpaceLow* = #GEPscience_SEDA_SucellusInSpaceLow_00 // Near Sucellus, the lack of a real magnetic field turns space into a direct-to-hardware delivery system for heavy ions and energetic particles. The materials tray gains a “finish” that no brochure ever mentioned.
        SucellusInSpaceHigh* = #GEPscience_SEDA_SucellusInSpaceHigh_00 // Farther out, SEDA finally measures the local particle flow without the planet getting in the way. The baseline is thin, cold, and persistent—exactly what a red sun sends when it has all the time in the universe.

        CaireenInSpaceLow* = #GEPscience_SEDA_CaireenInSpaceLow_00 // Caireen’s irregular neighborhood is full of tiny surprises: dust grains, charge surges, and impacts too small to see but big enough to register. The instruments agree on one thing—this is not a friendly parking orbit.
        CaireenInSpaceHigh* = #GEPscience_SEDA_CaireenInSpaceHigh_00 // Above Caireen, long stretches of emptiness are interrupted by brief, sharp particle bursts and drifting grit. The data arrives late, and the silence between transmissions feels even longer.

        SironaInSpaceLow* = #GEPscience_SEDA_SironaInSpaceLow_00 // Sirona’s radiation belts light up every sensor at once—heavy ions, plasma, and high-energy particles arrive in tidy, terrifying waves. The dust counter adds a steady rattle of ring grit for ambiance.
        SironaInSpaceHigh* = #GEPscience_SEDA_SironaInSpaceHigh_00 // Higher above Sirona, the instruments finally separate “background” from “panic.” The red-sun wind is still harsh, but the worst of the trapped radiation fades into a distant, humming threat.

        AirmedInSpaceLow* = #GEPscience_SEDA_AirmedInSpaceLow_00 // Near Airmed, SEDA confirms the moon has no air to shield anything; atomic oxygen stays quiet while radiation and energetic particles do all the damage. The electronics test board quietly reconsiders its career choices.
        AirmedInSpaceHigh* = #GEPscience_SEDA_AirmedInSpaceHigh_00 // From higher orbit, Airmed looks small against Sirona’s glare, and the sensors map a jagged boundary where the magnetosphere’s punishment eases. The data trickles in with long delays, like the universe is thinking before it speaks.

        BorvoInSpaceLow* = #GEPscience_SEDA_BorvoInSpaceLow_00 // Over Borvo, the plasma probes sketch an active upper atmosphere while the particle counters log a calmer, steadier environment than Sirona’s inner moons. Methane traces show up as odd chemistry signatures that make the team double-check the labels.
        BorvoInSpaceHigh* = #GEPscience_SEDA_BorvoInSpaceHigh_00 // Farther out, Borvo’s readings settle into a cold, consistent profile—thin atmosphere below, space weather above, and just enough shielding to make long-duration hardware tests feel possible. “Possible” is not the same as “comfortable.”

        DamonaInSpaceLow* = #GEPscience_SEDA_DamonaInSpaceLow_00 // Damona offers no magnetic protection, so the space environment arrives unfiltered: heavy-ion strikes, radiation hits, and dust taps that leave tiny scars on the exposure plates. The dim red sun makes it all feel slow and inevitable.
        DamonaInSpaceHigh* = #GEPscience_SEDA_DamonaInSpaceHigh_00 // Above Damona, the instruments catch long quiet stretches punctuated by sharp particle bursts sweeping through the system. The silence between transmissions lasts so long you start to trust it—right before the next spike proves you shouldn’t.

        EponaInSpaceLow* = #GEPscience_SEDA_EponaInSpaceLow_00 // Skimming Epona’s thin upper air, SEDA maps a lively plasma layer while the atomic-oxygen sensor mostly dozes off. Methane traces and a low magnetic field make the electronics test feel like it’s being judged from very far away.
        EponaInSpaceHigh* = #GEPscience_SEDA_EponaInSpaceHigh_00 // Higher above Epona, the suite settles into a cold baseline: sparse dust taps, steady heavy-ion counts, and radiation that comes in slow, relentless rhythms under the dim red sun. The downlink arrives late, like the planet is thinking before answering.

        RosmertaInSpaceLow* = #GEPscience_SEDA_RosmertaInSpaceLow_00 // Rosmerta has no air and no shield, so SEDA logs raw particle weather the hard way—heavy ions, neutrons, and energetic hits that leave the device-evaluation board slightly offended. The exposure plates start collecting an unrequested “space finish.”
        RosmertaInSpaceHigh* = #GEPscience_SEDA_RosmertaInSpaceHigh_00 // From higher orbit, Rosmerta’s environment thins into long quiet stretches punctuated by sharp spikes from the red-sun wind. It’s calm enough to trust—right up until the next burst arrives with the same delay as your regret.

        RAB-58EInSpaceLow* = #GEPscience_SEDA_RAB-58EInSpaceLow_00 // Close to RAB-58E, the dust counter ticks like a nervous metronome while radiation stays stubbornly high for something so small. SEDA’s sensors agree this moonlet is mostly vacuum, grit, and bad attitude toward electronics.
        RAB-58EInSpaceHigh* = #GEPscience_SEDA_RAB-58EInSpaceHigh_00 // Farther out, the instruments tease apart particle flow from stray dust impacts and log a bleak, stable profile. The materials coupons still age faster than planned—apparently “edge of the system” is not the same as “gentle.”

        CernunnosInSpaceLow* = #GEPscience_SEDA_CernunnosInSpaceLow_00 // In low orbit over Cernunnos, SEDA finds a quiet, freezing neighborhood: very little plasma, almost no atomic oxygen, and dust grains drifting like slow snow. Then a rare energetic-particle surge reminds you the red sun can still reach this far.
        CernunnosInSpaceHigh* = #GEPscience_SEDA_CernunnosInSpaceHigh_00 // High above Cernunnos, the suite records an emptiness so steady it feels engineered—until high-energy particles and heavy ions briefly climb and fade again. Mission Control calls it “excellent baseline data,” which is scientist for “nothing happened, and that’s terrifyingly useful.”
    }
}