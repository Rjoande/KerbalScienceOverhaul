        #ScienceRefactor_bd_solarWind_DunaInSpaceLow_00 = Tracciando la direzione del vento solare si scopre che almeno una parte viene deviata e raggiunge la bassa atmosfera.
        #ScienceRefactor_bd_solarWind_DunaInSpaceHigh_00 = Il vento solare misurato è abbastanza forte da spazzare via le particelle più leggere dagli strati superiori della superficie di Duna.
        #ScienceRefactor_bd_solarWind_DresInSpace_00 = Risultati registrati. Il vento solare colpisce direttamente la superficie di Dres.
        #ScienceRefactor_bd_solarWind_DresInSpaceLow_00 = Le misure della velocità del vento solare indicano che in realtà accelera man mano che si allontana da Kerbol.
        #ScienceRefactor_bd_solarWind_DresInSpaceHigh_00 = *fruscio*
        #ScienceRefactor_bd_solarWind_DresInSpaceHigh_01 = Le emissioni di Kerbol vengono ancora rilevate chiaramente attorno a Dres.
        #ScienceRefactor_bd_solarWind_JoolInSpace_00 = Le interferenze di Jool impediscono risultati conclusivi.
        #ScienceRefactor_bd_solarWind_JoolInSpaceLow_00 = Il vento solare non sembra influenzare gli strati più profondi della magnetosfera di Jool.
        #ScienceRefactor_bd_solarWind_JoolInSpaceHigh_00 = Vengono rilevati venti solari che interagiscono con l'alta magnetosfera di Jool.
        #ScienceRefactor_bd_solarWind_JoolInSpaceHigh_01 = Si scopre che Jool ha un forte effetto sulla direzione del vento solare.
        #ScienceRefactor_bd_solarWind_LaytheInSpace_00 = Su Laythe viene rilevata una magnetoguaina che devia il plasma del vento solare, influenzata anche dalla gravità di Jool.
        #ScienceRefactor_bd_solarWind_LaytheInSpaceLow_00 = Rilevata ionizzazione del plasma. Laythe deve avere un'ionosfera.
        #ScienceRefactor_bd_solarWind_LaytheInSpaceHigh_00 = Per via della vicinanza, Laythe interagisce con molte particelle solari deviate da Jool.
        #ScienceRefactor_bd_solarWind_VallInSpace_00 = Non c'è interazione con il plasma, il che suggerisce che Vall non abbia atmosfera.
        #ScienceRefactor_bd_solarWind_VallInSpaceLow_00 = Al CSK hanno girato la manopola su 11. Vento solare rilevato di nuovo.
        #ScienceRefactor_bd_solarWind_VallInSpaceHigh_00 = Nessun vento solare rilevato. Siamo usciti dal sistema di Kerbol?
        #ScienceRefactor_bd_solarWind_PolInSpace_00 = Analisi da Pol ricevuta.
        #ScienceRefactor_bd_solarWind_PolInSpaceLow_00 = L'analisi del vento solare rilevato qui suggerisce che sia stato deviato da Jool fino a questa zona.
        #ScienceRefactor_bd_solarWind_PolInSpaceHigh_00 = Il sistema rileva un aumento dell'attività del vento man mano che si avvicina a Pol.
        #ScienceRefactor_bd_solarWind_TyloInSpace_00 = I risultati fanno chiedere agli scienziati che fine abbia fatto l'atmosfera di Tylo.
        #ScienceRefactor_bd_solarWind_TyloInSpaceLow_00 = Nonostante la magnetoguaina di Tylo, non sembrano esserci interazioni con il vento solare né atmosfera.
        #ScienceRefactor_bd_solarWind_TyloInSpaceHigh_00 = Sembra che le particelle del vento solare vengano deviate dalla gravità di Tylo.
        #ScienceRefactor_bd_solarWind_BopInSpace_00 = I dati confermano che Jool ha una grande magnetosfera che influenza gli schemi del vento nelle sue vicinanze.
        #ScienceRefactor_bd_solarWind_BopInSpaceLow_00 = L'enorme gravità di Jool devia le particelle del vento solare dentro e attorno alla traiettoria di Bop.
        #ScienceRefactor_bd_solarWind_BopInSpaceHigh_00 = I venti solari rilevati a questa latitudine sopra Bop seguono schemi molto irregolari.
        #ScienceRefactor_bd_solarWind_EelooInSpace_00 = Vengono raccolti dati da Eeloo.
        #ScienceRefactor_bd_solarWind_EelooInSpaceLow_00 = Qui il vento solare sembra viaggiare al doppio della velocità rispetto a quando siamo vicini a Kerbin.
        #ScienceRefactor_bd_solarWind_EelooInSpaceHigh_00 = Quel poco di vento solare rilevabile sta viaggiando davvero veloce!

        // bd_surveillance
        #ScienceRefactor_bd_surveillance_default_00 = Scatti una foto di qualunque cosa stia inquadrando il telescopio. Vedi qualcosa di sospetto?
        #ScienceRefactor_bd_surveillance_SunInSpaceHigh_00 = È luminosa e bellissima. Kerbol, la stella che tiene in vita la civiltà kerbal...
        #ScienceRefactor_bd_surveillance_SunInSpaceLow_00 = La luce di Kerbol ha reso l'immagine completamente bianca! Meno male che non hai danneggiato la fotocamera...
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_00 = Le pianure della prateria sono la parte più viva di Kerbin. Le città, l'erba verde e rigogliosa, i campi coltivati e l'industria. Questa è casa.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_01 = Davvero da quassù riesci a vedere casa tua! Oh, e c'è anche quel vicino fastidioso.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_02 = Campi coltivati osservati. I raccolti sembrano fino al 10 percento più abbondanti rispetto all'anno scorso.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_03 = Mappate alcune strade nemiche. Potrebbe tornare utile se mai passassimo all'offensiva.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_04 = Osservati i palazzi di Kerbograd. Non sembrano diversi da quelli di Filigrad e Yurigrad. Anzi, sembrano proprio identici.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_05 = Osservata una parata militare a Kerya. Le armi in sviluppo sono motivo di preoccupazione, ma le capacità attuali non sembrano una vera minaccia.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_06 = Trovati alcuni kog randagi nei dintorni di Woomerang. Forse si possono usare come soggetti di prova.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_07 = Questa parte di prateria è esattamente quello che sembra: piena d'erba. Ci sono alcune piccole fattorie e pare che il raccolto sia stato appena mietuto.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowShores_00 = Le acque basse vicino alla costa pullulano di vita marina. Si vedono banchi di pesci diversi, del corallo e alghe.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowShores_00 = Si vede l'acqua dei fiumi mescolarsi con il mare. In alcuni fiumi si notano chiazze scure e torbide.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowMountains_00 = Avvistato quello che sembra un complesso osservatorio sulla cima di una montagna. La cupola per ora è chiusa.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowMountains_01 = Trovato un gruppo di scalatori. Sembra che stiano studiando le rocce. Valutazione: per lo più innocui.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowMountains_02 = Nulla di rilevante per la difesa nazionale, solo roccia spoglia. Però il fatto che possiamo arrivare dove persino le montagne sembrano piccole è la prova dei risultati della nostra società.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowHighlands_00 = Le colline. La natura, le fattorie, i pendii dolci. Si vedono le piante crescere.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowHighlands_01 = Si vedono le città collinari e il turismo su cui si reggono.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowHighlands_02 = Scattata la foto di un kerman con un telescopio piuttosto grande, puntato direttamente sul satellite. Probabilmente un astronomo dilettante. Ma perché continua a guardare in alto dopo l'alba?
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_00 = Il deserto sembra ostile, ma è punteggiato da città e insediamenti prosperi, un promemoria che con abbastanza volontà, tempo e risorse si può fare qualunque cosa. Del terzo, il deserto ne ha in abbondanza.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_01 = Trovati alcuni nomadi su cammelli, in sosta vicino a un'oasi. Nessuna minaccia.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_02 = Stai fissando quella che sembra una massa di biossido di silicio granulare. Sei sicuro di voler sprecare pellicola da sorveglianza per questo?
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_03 = Avvistato un test di razzo nemico! Per fortuna, è fallito a meno di un minuto dal decollo.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_00 = Le barche e le navi che attraversano le acque di Kerbin sembrano per lo più innocue.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_01 = Si vedono i container sui mercantili, kerbal sui traghetti e gli aerei di una portaerei.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_02 = Avvisti una barca solitaria in mezzo all'oceano. Che cosa sta facendo?
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_03 = Scattate foto ad alta definizione dell'ultima fioritura algale. Da questa immagine se ne può determinare con precisione l'estensione.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_04 = Questa volta è tutto tranquillo: una leggera brezza sull'oceano e pesci che nuotano sotto.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_00 = Fotografate alcune rocce, un albero e una città mineraria.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_01 = Acquisite immagini di pozzi petroliferi tra le rocce. Potrebbero essere importanti più avanti.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_02 = Avvistata una base aerea, grande. Sito segnato come "importante".
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_03 = Questa vista particolarmente insidiosa e rocciosa mostra bene perché questo posto si chiama "Badlands". È davvero un brutto posto.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowTundra_00 = Hai fotografato un silo. Probabile ICBM nucleare. Hai anche ripreso le tracce lasciate dai camion che riforniscono il silo.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowTundra_01 = Alberi, un orso e un po' di neve. Normale roba da tundra.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowTundra_02 = Solo alcune rocce e una tenda.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowIceCaps_00 = Dal ghiaccio bianco e luminoso ottieni un'immagine molto sbiadita e sfocata, quindi l'alta risoluzione qui è del tutto inutile.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_00 = Ghiaccio, ghiaccio e altro ghiaccio. E quello cos'è? Un avamposto krussiano da 50 kerbal? Probabilmente innocuo.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_01 = Un grande ghiacciaio si sta staccando. Meglio inserire avvisi di navigazione e informare la KOAA.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_02 = Vedi alcuni orsi polari e delle foche. Uno sembra stia mangiando l'altra.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_00 = Acquisita immagine a risoluzione sub metrica di... ghiaccio. E qualche stormo di uccelli. E il loro guano. Almeno sai dove il ghiaccio sta cedendo.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_01 = Avvistata l'ultima spedizione polare. Sembrano tutti in forma, anche se hanno bloccato il gatto delle nevi un paio di volte.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_02 = Avvistata una grande crepa e... ghiaccio che cade! Almeno i pinguini sono al sicuro.
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLow_00 = Raccolte immagini ad altissima risoluzione. Si distinguono auto, strade, fiumi e perfino buche kerb dallo spazio!
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLow_01 = Kerbin è bellissimo da quassù. Ma non siamo qui per quello. Siamo qui per spiare, oh, scusa, volevo dire, per fare scienza!
        #ScienceRefactor_bd_surveillance_KerbinInSpaceLow_02 = Catturati alcuni dettagli interessanti sulla superficie del pianeta.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowMidlands_00 = La superficie è costellata di piccoli crateri da impatto. Le aree più piatte potrebbero essersi formate grazie ad attività vulcanica.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowMidlandCraters_00 = Ti chiedi quanto debba essere grande un asteroide per creare crateri così ampi, poi realizzi che su Mun ce ne sono di molto più grandi.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowHighlands_00 = Le regioni collinari sono più chiare, ma qui non c'è alcun segno di basi nemiche.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowHighlandCraters_00 = Alcuni di questi crateri sembrano molto più antichi di quelli nelle pianure di Mun.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowCanyons_00 = Le pareti ripide dei canyon potrebbero rendere difficile l'atterraggio. Però sarebbe un ottimo posto per nascondere una base.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowNorthernBasin_00 = Questa conca probabilmente si è formata per attività vulcanica.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowEastCrater_00 = Uno dei punti più riconoscibili di Mun visto dalla superficie di Kerbin. Per millenni i kerbal hanno cercato di indovinare cosa lo abbia creato.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowNorthwestCrater_00 = Solo un altro cratere da impatto, nella zona nord ovest.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowSouthwestCrater_00 = Solo un altro cratere da impatto, nella zona sud ovest.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowFarsideCrater_00 = Rifletti sul fatto che sei il primo kerbal a vedere questa parte di Mun.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowTwinCraters_00 = Nonostante si somiglino, questi crateri potrebbero essersi formati a milioni di anni di distanza.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowEastFarsideCrater_00 = Il cratere è incorniciato alla perfezione da Kerbin che sorge oltre l'orizzonte.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowPolarCrater_00 = A differenza della maggior parte dei crateri di Mun, questo è lontano dall'equatore.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowPoles_00 = Non è molto diverso dal resto di Mun, a parte il fatto che alcune zone polari ricevono luce solare quasi tutto l'anno.
        #ScienceRefactor_bd_surveillance_MunInSpaceLowPolarLowlands_00 = Le zone più basse vicino ai poli potrebbero contenere ghiaccio d'acqua, dove alcuni crateri restano nel buio eterno. Oppure no. Tanto non è che ci si veda qualcosa là dentro.
        #ScienceRefactor_bd_surveillance_MunInSpaceLow_00 = Ora sei più vicino alla luna e vedi che i crateri hanno devastato la superficie. Ma questa immagine mostra qualche prova di basi munari nemiche?
        #ScienceRefactor_bd_surveillance_MinmusInSpaceLow_00 = Minmus rivela un terreno vario. Alte colline si estendono per chilometri e le pianure sotto di loro arrivano ancora più lontano.
        #ScienceRefactor_bd_surveillance_MinmusInSpaceHigh_00 = Da così lontano, Minmus assomiglia a una piccola pallina di gelato alla menta...
        #ScienceRefactor_bd_surveillance_MohoInSpaceLow_00 = I crateri sulla superficie di Moho diventano chiarissimi. Con un dettaglio enorme, i crateri hanno crateri. Questo ti ricorda che sei troppo vicino per stare tranquillo...
        #ScienceRefactor_bd_surveillance_MohoInSpaceHigh_00 = Moho galleggia lontano, punito dai crateri. Quasi riesci a vedere il calore della stella madre, Kerbol...
        #ScienceRefactor_bd_surveillance_EveInSpaceLow_00 = Eve ti accoglie con entusiasmo mentre sfrecci vicino, mostrando quanto siano vasti i suoi oceani di Explodium. Ora ti è venuta voglia di un ghiacciolo all'uva...
        #ScienceRefactor_bd_surveillance_EveInSpaceHigh_00 = Eve scintilla laggiù con la sua tonalità viola. O era lassù? Non te lo ricordi...
        #ScienceRefactor_bd_surveillance_GillyInSpaceLow_00 = Gilly, un asteroide beige catturato, mostra un terreno molto estremo. Una scia nella foto rivela la sua rapida rotazione.
        #ScienceRefactor_bd_surveillance_GillyInSpaceHigh_00 = Gilly nella foto è poco più di un puntino.
        #ScienceRefactor_bd_surveillance_DunaInSpaceLow_00 = Duna ha una grande varietà di territori, da profondi baratri a alte catene montuose e pianure. Le calotte polari sono grandi e dominano i poli.
        #ScienceRefactor_bd_surveillance_DunaInSpaceHigh_00 = Il puntino arancione pallido ricorda una palla di ruggine, o un cupcake di velluto rosso...
        #ScienceRefactor_bd_surveillance_IkeInSpaceLow_00 = Ike mostra con chiarezza il suo terreno consumato. Le catene montuose dominano la superficie, mentre le pianure appaiono come grandi chiazze scure.
        #ScienceRefactor_bd_surveillance_IkeInSpaceHigh_00 = La roccia che chiamiamo Ike è enorme. Da così lontano sembra piuttosto densa. E sembra avere un terreno molto accidentato, più della tua luna.
        #ScienceRefactor_bd_surveillance_DresInSpaceLow_00 = Ora sei più vicino a Dres e inizi a raccogliere indizi che non sia un pianeta, ma un pianeta nano che un tempo fu un gigantesco asteroide errante.
        #ScienceRefactor_bd_surveillance_DresInSpaceHigh_00 = Dres ti ricorda Mun. Ha un terreno piuttosto irregolare e una tonalità grigia.
        #ScienceRefactor_bd_surveillance_JoolInSpaceLow_00 = La tonalità verde di Jool domina la foto con un'enorme imponenza.
        #ScienceRefactor_bd_surveillance_JoolInSpaceHigh_00 = Le tante lune di Jool si vedono in modo spettacolare davanti a lei, come un balletto di briciole attorno a quella torta al lime che hai appena divorato.
        #ScienceRefactor_bd_surveillance_LaytheInSpaceLow_00 = Laythe ha isole, acqua e un'atmosfera. Non mi sorprenderebbe se qui trovassimo dei microkerbal...
        #ScienceRefactor_bd_surveillance_LaytheInSpaceHigh_00 = Da qui Laythe sembra una biglia azzurra pallida.
        #ScienceRefactor_bd_surveillance_VallInSpaceLow_00 = Vall mostra pianure azzurre e catene montuose di un azzurro più chiaro che serpeggiano sulla superficie in ogni direzione.
        #ScienceRefactor_bd_surveillance_VallInSpaceHigh_00 = Vall se ne sta lontana, come un puntino azzurro pallido.
        #ScienceRefactor_bd_surveillance_TyloInSpaceLow_00 = Tylo è enorme. Una roccia gigantesca grande quanto Kerbin. Le macchioline si rivelano decine di migliaia di crateri. Tylo mostra una superficie molto martoriata, come Mun. Gli scienziati in laboratorio deducono che Tylo abbia davvero tracce di cobalto.
        #ScienceRefactor_bd_surveillance_TyloInSpaceHigh_00 = Tylo, da così lontano, sembra pieno di macchioline. Perché non l'abbiamo chiamato Macchia?
        #ScienceRefactor_bd_surveillance_BopInSpaceLow_00 = Bop mostra un cratere con un bordo bianco che potrebbe essere la prova di un Bop catturato di recente in un giovane sistema di Jool.
        #ScienceRefactor_bd_surveillance_BopInSpaceHigh_00 = Bop sembra un asteroide catturato marrone, non troppo diverso da Gilly. Forse sono imparentati?
        #ScienceRefactor_bd_surveillance_PolInSpaceLow_00 = Pol non perdona. Come la sua sorella Bop, sembra un asteroide catturato. Il terreno ruvido, frastagliato e fuori di testa ti fa venire voglia di pensarci due volte prima di atterrare.
        #ScienceRefactor_bd_surveillance_PolInSpaceHigh_00 = Pol, quel puntino laggiù, ti ricorda un granello di polline.
        #ScienceRefactor_bd_surveillance_EelooInSpaceLow_00 = Eeloo mostra la sua vera natura mentre ti avvicini, rivelando i suoi canyon di ghiaccio e i suoi baratri.
        #ScienceRefactor_bd_surveillance_EelooInSpaceHigh_00 = Eeloo sembra molto ghiacciato. È rimasto troppo a lungo così lontano da Kerbol.

        // bd_TelescopeObservation
        #ScienceRefactor_bd_TelescopeObservation_default_00 = Inizi un rilevamento di oggetti del cielo profondo nel piano galattico. Molti ammassi aperti e nebulose aspettano solo di essere scoperti.
        #ScienceRefactor_bd_TelescopeObservation_SunInSpaceLow_00 = Osservi il Sole. È stata un'idea spettacolarmente pessima.
        #ScienceRefactor_bd_TelescopeObservation_SunInSpaceHigh_00 = Osservi il Sole. Solo quando senti l'allarme "anomalia di temperatura" ti ricordi che hai dimenticato di installare il filtro solare. Momento Icaro certificato.
        #ScienceRefactor_bd_TelescopeObservation_KerbinInSpaceLow_00 = Al di sopra dell'influenza della turbolenza atmosferica, il telescopio riesce a raggiungere risoluzioni elevate molto più costanti su un ampio campo rispetto a quanto sia possibile da terra. Finché non arrivano ordini dalla Società Astronomica Kerbal, ne approfitti per separare alcune stelle doppie che ti mancavano.
        #ScienceRefactor_bd_TelescopeObservation_KerbinInSpaceHigh_00 = Lontano da Kerbin, l'osservatorio può osservare una vasta porzione di cielo con poche interferenze. Inizi un rilevamento di galassie lontane.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedDesert_00 = Dentro l'atmosfera di Kerbin, la turbolenza fa ribollire e tremolare l'immagine, riducendo la risoluzione. Le riprese planetarie vanno fatte con esposizioni estremamente brevi e con elaborazione digitale per sommare le immagini.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedHighlands_00 = L'osservatorio è relativamente poco disturbato dalla foschia bassa e da parte degli effetti delle condizioni di seeing, consentendo una risoluzione più alta che al livello del mare. Tuttavia non è il posto migliore per riprese ad alta risoluzione, quindi ti dedichi soprattutto ad assemblare mosaici di grandi oggetti del cielo profondo.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedMountains_00 = Questo è un buon posto per un osservatorio remoto. Al di sopra dell'inquinamento luminoso e di gran parte della turbolenza atmosferica, il cielo si apre con dettagli nitidi e ad alta risoluzione, anche se nello spazio sarebbe meglio. Cerchi eventi di transito di esopianeti vicini con la fotocamera SLIPPIST.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedWater_00 = Spruzzi di mare e sabbia stanno entrando nello strumento. Sarà un incubo da mantenere. Provi comunque a fare qualche ripresa, ma tra nebbia, aria turbolenta e spruzzi, questa sessione è andata.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfSplashedWater_00 = Spruzzi di mare e sabbia stanno entrando nello strumento. Sarà un incubo da mantenere. Provi comunque a fare qualche ripresa, ma tra nebbia, aria turbolenta e spruzzi, questa sessione è andata.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedWater_00 = Spruzzi di mare e sabbia stanno entrando nello strumento. Sarà un incubo da mantenere. Provi comunque a fare qualche ripresa, ma tra nebbia, aria turbolenta e spruzzi, questa sessione è andata.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedKSC_00 = Qui al CSK l'inquinamento luminoso rende molto poco pratico osservare oggetti del cielo profondo. Per vedere davvero il cielo notturno devi andare in mezzo al nulla. Però questo sarebbe un ottimo posto per un'osservazione pubblica di Mun, magari Walt Kerman e il suo team di PR hanno qualche idea su come farla.
        #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLanded_00 = Dentro l'atmosfera di Kerbin, la turbolenza fa ribollire e tremolare l'immagine, riducendo la risoluzione. Le riprese planetarie vanno fatte con esposizioni estremamente brevi e con elaborazione digitale per sommare le immagini.
        #ScienceRefactor_bd_TelescopeObservation_MunInSpaceLow_00 = Se solo potessi rallentare, lo strumento sarebbe capace di immagini della superficie a risoluzione estremamente alta. Anzi, quasi non servirebbe mandare astronauti! Chi ha bisogno di astronauti quando ha gli astronomi, dopotutto.
        #ScienceRefactor_bd_TelescopeObservation_MunInSpaceHigh_00 = Puntare l'osservatorio verso la superficie lo trasformerebbe in un satellite di mappatura ad alta risoluzione, ma abbiamo portato solo sensori astronomici, quindi dovrai accontentarti di svelare i misteri del cosmo.
        #ScienceRefactor_bd_TelescopeObservation_MunSrfLanded_00 = Questo è un ottimo posto, vicino a casa, per un osservatorio di spazio profondo! Il cielo risalta davvero, di giorno e di notte.
        #ScienceRefactor_bd_TelescopeObservation_Minmus_InSpaceHigh_00 = Provi una foto a lunga esposizione per cercare di rilevare una chioma o una coda cometaria... ma se c'è, viene cancellata dall'incredibile riflettività della superficie di Minmus.
        #ScienceRefactor_bd_TelescopeObservation_MinmusSrfLanded_00 = Provi a misurare lo spettro di una stella luminosa, cercando linee di assorbimento aggiuntive e indizi di un'esosfera estesa o di un inviluppo cometario su Minmus. C'è una debolissima caratteristica di assorbimento che non riesci ad associare al database della stella.
        #ScienceRefactor_bd_TelescopeObservation_MohoSrfLanded_00 = Il tasso di rotazione di Moho è sorprendentemente lento, quindi nonostante il Sole incredibilmente luminoso di giorno, sono possibili esposizioni molto lunghe e ininterrotte. Un'applicazione utile di questo osservatorio sarebbe cercare asteroidi vicini a Kerbin.
        #ScienceRefactor_bd_TelescopeObservation_EveInSpaceLow_00 = Nota per me: buttare via i filtri rosso e verde, qui non servono.
        #ScienceRefactor_bd_TelescopeObservation_EveInSpaceHigh_00 = Punti il telescopio su Gilly. È sorprendente vedere dettagli sulla luna più piccola, di solito sembra solo un puntino debole!
        #ScienceRefactor_bd_TelescopeObservation_EveSrfLanded_00 = Questo è un posto davvero pessimo per un osservatorio: le nubi dense sono sempre presenti!
        #ScienceRefactor_bd_TelescopeObservation_GillySrfLanded_00 = Un posto strano e di nicchia per un osservatorio, ma offre molte opportunità utili per osservare Eve ad alta risoluzione. I sensori a infrarossi possono attraversare le nubi, e i filtri blu, viola e ultravioletti sono i più adatti per osservare le nubi e i modelli meteorologici stessi.
        #ScienceRefactor_bd_TelescopeObservation_IkeSrfLanded_00 = Speri di esserti ricordato di atterrare nell'emisfero rivolto verso Duna, così da poterlo osservare ad alta risoluzione. L'orbita stazionaria di Ike offre un eccellente punto di osservazione per vedere circa metà di Duna, e un pessimo punto di osservazione per vedere qualunque altra cosa.
        #ScienceRefactor_bd_TelescopeObservation_DunaSrfLanded_00 = Prepari il telescopio per puntare indietro verso il sistema di Kerbin. Anche ad alto ingrandimento, sembrano piccoli. E tu ti senti ancora più piccolo. La polvere nell'atmosfera impedisce di catturare dettagli deboli, ma le condizioni di seeing qui sono molto buone e, quando Jool è in opposizione, questo telescopio può superare strumenti simili basati su Kerbin nel distinguere le sue fasce nuvolose, che non appaiono più sfocate.
        #ScienceRefactor_bd_TelescopeObservation_DresInSpaceLow_00 = Dicevano di andare in mezzo al nulla per osservare il cielo profondo. Ma non credo intendessero così!
        #ScienceRefactor_bd_TelescopeObservation_DresInSpaceHigh_00 = Sembra esserci una grande quantità di scie stellari che disturbano le immagini a lunga esposizione vicino al piano equatoriale di Dres. Potrebbe esserci un disco di detriti qui?
        #ScienceRefactor_bd_TelescopeObservation_DresSrfLanded_00 = È come se nessuno sapesse mai che hai messo un telescopio qui.
        #ScienceRefactor_bd_TelescopeObservation_JoolInSpaceLow_00 = Da questo punto di osservazione, molti oggetti del sistema di Jool si vedono facilmente. Tylo, Vall, Bop, Pol e Kerbin... ehi, aspetta un attimo, non funziona così!
        #ScienceRefactor_bd_TelescopeObservation_JoolInSpaceHigh_00 = Chi l'avrebbe detto, pare che Jool non sia sempre sfocato visto al telescopio!
        #ScienceRefactor_bd_TelescopeObservation_JoolSrfLanded_00 = Questo luogo sarebbe un ottimo punto di osservazione per studiare le lune di Jool, se non fosse per le temperature roventi, le pressioni schiaccianti e i numerosi strati di nubi e foschia.
        #ScienceRefactor_bd_TelescopeObservation_LaytheInSpaceHigh_00 = Le immagini che ottieni dai sensori sono piene di rumore extra per qualche motivo. Chi ha bisogno di un contatore Geiger quando hai rapporti di rumore da incubo!
        #ScienceRefactor_bd_TelescopeObservation_LaytheSrfLanded_00 = È come Kerbin, ma senza inquinamento luminoso di cui preoccuparsi, almeno finché ignori Jool, che è molto più luminoso di Mun, e Tylo e Vall, che sono quasi luminosi quanto Mun... ehi, ci siamo ricordati di parcheggiare l'osservatorio sul lato opposto, lontano da Jool, vero?
        #ScienceRefactor_bd_TelescopeObservation_LaytheSrfSplashed_00 = Spruzzi di mare e sabbia stanno entrando nello strumento. Sarà un incubo da mantenere. Provi comunque a fare qualche acquisizione, ma tra nebbia, aria turbolenta e spruzzi, questa sessione è andata.
        #ScienceRefactor_bd_TelescopeObservation_VallSrfLanded_00 = A parte le radiazioni che rovinano il segnale, questo sarebbe un ottimo punto di osservazione per studiare gli altri mondi di questo sistema.
        #ScienceRefactor_bd_TelescopeObservation_TyloSrfLanded_00 = A parte le radiazioni che rovinano il segnale, questo sarebbe un ottimo punto di osservazione per studiare gli altri mondi di questo sistema.
        #ScienceRefactor_bd_TelescopeObservation_BopInSpaceHigh_00 = Orienti il telescopio verso Bop. Per qualche motivo il software non ti permette di mettere a fuoco la superficie in un punto. Mostra un messaggio "Pericolo", come quando provi a puntarlo verso il Sole.
        #ScienceRefactor_bd_TelescopeObservation_PolInSpaceLow_00 = Dall'orbita bassa sembra esserci un sacco di polvere carica elettricamente che si attacca al sensore come polline. Forse Pol non è il posto migliore per un osservatorio, anche se domina l'intero sistema di Jool.
        #ScienceRefactor_bd_TelescopeObservation_PolSrfLanded_00 = Tieni la polvere lontana dai sensori! Ne abbiamo già abbastanza di questo tipo di errore. Per lo meno, la polvere sugli specchi cambia poco, a parte ridurre leggermente contrasto e risoluzione. E probabilmente rovinerebbe di più gli specchi se provassimo a pulirli.
        #ScienceRefactor_bd_TelescopeObservation_EelooInSpaceHigh_00 = Ora QUESTO sì che è in mezzo al nulla! Da questa prospettiva, la magnitudine di molti oggetti trans jooliani deboli aumenta drasticamente in opposizione, permettendo una classificazione migliore e più accurata dei piccoli corpi ghiacciati che condividono lo spazio oltre Jool.
        #ScienceRefactor_bd_TelescopeObservation_EelooSrfLanded_00 = Eeloo è perfetto perché è molto facile raffreddare i sensori di cattura per ridurre il rumore. Ti vengono in mente piani per spalare materiale di superficie direttamente sul sensore, per migliorare il raffreddamento.

        // bd_TrappedRadiation
        #ScienceRefactor_bd_TrappedRadiation_default_00 = Raccogli dati sulle fasce intrappolate di ioni ed elettroni.
        #ScienceRefactor_bd_TrappedRadiation_default_01 = Analizzi il flusso di particelle cariche e le fasce in cui restano confinate.
        #ScienceRefactor_bd_TrappedRadiation_default_02 = Questo strumento cerca formazioni di fasce di radiazione.
        #ScienceRefactor_bd_TrappedRadiation_KerbinInSpaceLow_00 = Esegui misurazioni dettagliate della radiazione intrappolata nelle cinture di Van Kerman.
        #ScienceRefactor_bd_TrappedRadiation_KerbinInSpaceHigh_00 = La radiazione intrappolata intorno a Kerbin sembra scorrere principalmente lungo le linee del campo magnetico di Kerbin.
        #ScienceRefactor_bd_TrappedRadiation_MunInSpace_00 = Non vengono rilevate fasce di radiazione intrappolata intorno a Mun.
        #ScienceRefactor_bd_TrappedRadiation_MunInSpaceLow_00 = L'assenza di fasce di radiazione intorno a Mun indica che il suo debole campo magnetico non è abbastanza forte da deviare le particelle cariche e formare una fascia di radiazione.
        #ScienceRefactor_bd_TrappedRadiation_MunInSpaceHigh_00 = Anche se viene rilevata radiazione intorno a Mun, nulla sembra provenire da una fascia di radiazione.
        #ScienceRefactor_bd_TrappedRadiation_MinmusInSpace_00 = Non vengono rilevate fasce di radiazione intrappolata intorno a Minmus.
        #ScienceRefactor_bd_TrappedRadiation_MinmusInSpaceLow_00 = L'assenza di fasce di radiazione intorno a Minmus indica che il suo debole campo magnetico non è abbastanza forte da deviare le particelle cariche e formare una fascia di radiazione.
        #ScienceRefactor_bd_TrappedRadiation_MinmusInSpaceHigh_00 = Anche se viene rilevata radiazione intorno a Minmus, nulla sembra provenire da una fascia di radiazione.
        #ScienceRefactor_bd_TrappedRadiation_MohoInSpace_00 = Intorno a Moho si osservano pochissimi ioni ed elettroni intrappolati che non provengano da Kerbol.
        #ScienceRefactor_bd_TrappedRadiation_MohoInSpaceLow_00 = Anche a distanze ravvicinate, Moho non mostra alcuna fascia di radiazione degna di nota.
        #ScienceRefactor_bd_TrappedRadiation_MohoInSpaceHigh_00 = Quasi tutti gli ioni e gli elettroni rilevati provengono da Kerbol, non da una fascia di radiazione intrappolata intorno a Moho.
        #ScienceRefactor_bd_TrappedRadiation_EveinSpace_00 = Vengono rilevate fasce di radiazione più intense delle cinture di Van Kerman di Kerbin.
        #ScienceRefactor_bd_TrappedRadiation_EveInSpaceHigh_00 = Eve sembra avere più fasce di radiazione forti e concentriche.
        #ScienceRefactor_bd_TrappedRadiation_EveInSpaceLow_00 = Lo strumento rileva una grande quantità di elettroni e ioni guidati lungo le forti linee del campo magnetico di Eve.
        #ScienceRefactor_bd_TrappedRadiation_DunaInSpace_00 = Duna non sembra avere fasce di radiazione intrappolata significative.
        #ScienceRefactor_bd_TrappedRadiation_DunaInSpaceLow_00 = L'assenza di fasce rilevabili di ioni ed elettroni intrappolati suggerisce che il campo magnetico di Duna sia piuttosto debole.
        #ScienceRefactor_bd_TrappedRadiation_DunaInSpaceHigh_00 = Viene rilevata radiazione, ma non proviene da fasce di radiazione intrappolata.
        #ScienceRefactor_bd_TrappedRadiation_DresInSpace_00 = Lo strumento non vuole effettuare misurazioni, sembra non gradire di essere stato spedito su Dres.
        #ScienceRefactor_bd_TrappedRadiation_DresInSpaceLow_00 = Niente. Nada.
        #ScienceRefactor_bd_TrappedRadiation_JoolInSpace_00 = Intorno a Jool vengono rilevate fasce di radiazione estremamente intense!
        #ScienceRefactor_bd_TrappedRadiation_JoolInSpaceHigh_00 = Jool ha una fascia di radiazione intrappolata estremamente intensa, grazie al suo campo magnetico incredibilmente forte.
        #ScienceRefactor_bd_TrappedRadiation_JoolInSpaceLow_00 = Lo strumento viene investito da ioni ed elettroni intrappolati. Speriamo tu abbia portato schermature antiradiazioni, altrimenti la navicella rischia di finire arrosto!
        #ScienceRefactor_bd_TrappedRadiation_LaytheInSpace_00 = Vengono registrate fasce di radiazione intrappolata intorno a Laythe.
        #ScienceRefactor_bd_TrappedRadiation_LaytheInSpaceHigh_00 = Laythe sembra avere una propria fascia di radiazione, oltre a trovarsi dentro quella di Jool.
        #ScienceRefactor_bd_TrappedRadiation_LaytheInSpaceLow_00 = La radiazione dovuta alla fascia di ioni ed elettroni intrappolati di Laythe aumenta ulteriormente per via della radiazione generata dal fatto di trovarsi nella fascia di Jool.
        #ScienceRefactor_bd_TrappedRadiation_VallInSpace_00 = Vall non possiede alcuna fascia di radiazione, il che suggerisce che non abbia un campo magnetico.
        #ScienceRefactor_bd_TrappedRadiation_VallInSpaceLow_00 = L'unica radiazione intrappolata qui sembra provenire da Jool.
        #ScienceRefactor_bd_TrappedRadiation_VallInSpaceHigh_00 = Vall si trova proprio nel mezzo della fascia di radiazione di Jool ed è soggetta a un bombardamento costante di ioni ed elettroni carichi.
        #ScienceRefactor_bd_TrappedRadiation_TyloInSpace_00 = Tylo non possiede alcuna fascia di radiazione, il che suggerisce che non abbia un campo magnetico.
        #ScienceRefactor_bd_TrappedRadiation_TyloInSpaceLow_00 = Non vengono rilevati ioni ed elettroni intrappolati provenienti da Tylo.
        #ScienceRefactor_bd_TrappedRadiation_TyloInSpaceHigh_00 = Tylo sembra trovarsi appena oltre il bordo della fascia di radiazione di Jool.
        #ScienceRefactor_bd_TrappedRadiation_BopInSpace_00 = Pur non avendo fasce di radiazione intrappolata, Bop sembra presentare anomalie magnetiche di forte intensità. Interessante...
        #ScienceRefactor_bd_TrappedRadiation_PolInSpace_00 = Pol non possiede alcuna fascia di radiazione, il che suggerisce che non abbia un campo magnetico.
        #ScienceRefactor_bd_TrappedRadiation_PolInSpaceLow_00 = Non vengono rilevati ioni ed elettroni intrappolati provenienti da Pol.
        #ScienceRefactor_bd_TrappedRadiation_PolInSpaceHigh_00 = Pol è comodamente al di fuori della fascia di radiazione principale di Jool ed è quindi soggetta a meno particelle cariche provenienti dalle fasce di Jool rispetto alle altre lune di Jool.
        #ScienceRefactor_bd_TrappedRadiation_EelooInSpace_00 = Eeloo non sembra possedere alcuna fascia di radiazione intrappolata degna di nota.
        #ScienceRefactor_bd_TrappedRadiation_EelooInSpaceLow_00 = Anche più vicino a Eeloo, non vengono rilevate fasce di radiazione, il che suggerisce che Eeloo non abbia un campo magnetico.
        #ScienceRefactor_bd_TrappedRadiation_EelooInSpaceHigh_00 = Viene rilevata radiazione, ma non proviene da fasce di radiazione intrappolata.

        // bd_UVscope
        #ScienceRefactor_bd_UVscope_default_00 = Scatti immagini ad alta risoluzione nella lunghezza d'onda ultravioletta.
        #ScienceRefactor_bd_UVscope_default_01 = Scatti una serie di immagini nell'ultravioletto.
        #ScienceRefactor_bd_UVscope_default_02 = Scatti immagini nell'ultravioletto di un lontano corpo celeste.
        #ScienceRefactor_bd_UVscope_default_03 = Scatti immagini UV ad alta risoluzione di strutture lontane nello spazio, come stelle, nebulose e novae.
        #ScienceRefactor_bd_UVscope_default_04 = Le osservazioni nell'ultravioletto sembrano rivelare la scoperta di pulsar a lungo periodo. Affascinante!
        #ScienceRefactor_bd_UVscope_KerbinInSpaceLow_00 = Scatti l'immagine di un lontano oggetto del profondo cielo da un'orbita bassa su Kerbin. È bella e viola.
        #ScienceRefactor_bd_UVscope_KerbinInSpaceHigh_00 = Gli strati di nubi di Kerbin vengono mappati nell'ultravioletto, alla ricerca di schemi meteorologici.

