        #DSS_Solaris_bd_camera_LaytheFlyingLow_00 = Le riprese a bassa quota mostrano creste bianche che si allineano in file ordinate e ignorano il vento. Il moto sembra messo in scena, ma il mare non sta prendendo indicazioni.
        #DSS_Solaris_bd_camera_LaytheFlyingLow_01 = Registri gli spruzzi sulle creste. In riproduzione, le gocce fluttuano controvento per diversi fotogrammi, poi "si ricordano" della gravità e cadono.
        #DSS_Solaris_bd_camera_LaytheFlyingHigh_00 = Da alta quota, le ombre delle nubi scorrono sull'acqua nella direzione sbagliata. Le foto sono perfette, la scena no.
        #DSS_Solaris_bd_camera_LaytheFlyingHigh_01 = L'autofocus continua a scattare su una chiazza vuota d'oceano, come se fosse un punto di interesse. Non hai selezionato alcun bersaglio.
        #DSS_Solaris_bd_camera_LaytheInSpaceLow_00 = Le immagini orbitali mostrano il riflesso speculare che segue la tua traccia, restando centrato come uno spettatore educato.
        #DSS_Solaris_bd_camera_LaytheInSpaceLow_01 = Provi una lunga esposizione sul lato notturno. Il mare restituisce deboli striature regolari: troppo equidistanti per essere onde, troppo morbide per essere luci.
        #DSS_Solaris_bd_camera_NodensInSpaceHigh_00 = Le foto dell'intero disco sono rassicuranti finché non le sovrapponi. I dettagli di Nodens slittano di una frazione, come se il pianeta fosse leggermente fuori sincronia con se stesso.
        #DSS_Solaris_bd_camera_LaytheInSpaceHigh_01 = La fotocamera cattura un mondo blu, pulito e calmo. Poi gli artefatti di compressione formano un anello ordinato attorno agli oceani, come se la superficie si stesse delineando.
        #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_00 = Il ricevitore segnala un segnale pulito e stabile in portante su più bande. Non ha modulazione, non ha sorgente... e segue la tua orbita alla perfezione.
        #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_01 = Rilevi deboli echi delle tue stesse trasmissioni, ma la temporizzazione è sbagliata. Ogni risposta arriva con un soffio di ritardo, come se l'oceano pensasse prima di rispondere.
        #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_02 = Il traffico di fondo sembra normale finché non sottrai il livello di rumore. Ciò che resta è un impulso lento e deliberato che non corrisponde né alla rotazione né a beacon noti.
        #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_00 = Il ricevitore segnala un segnale pulito e stabile in portante su più bande. Non ha modulazione, non ha sorgente... e segue la tua orbita alla perfezione.
        #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_01 = Rilevi deboli echi delle tue stesse trasmissioni, ma la temporizzazione è sbagliata. Ogni risposta arriva con un soffio di ritardo, come se l'oceano pensasse prima di rispondere.
        #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_02 = Il traffico di fondo sembra normale finché non sottrai il livello di rumore. Ciò che resta è un impulso lento e deliberato che non corrisponde né alla rotazione né a beacon noti.
        #DSS_Solaris_bd_weather_LaytheInSpaceLow_00 = Le cime delle nubi si dispongono in archi ordinati che ignorano i jet stream. Il modello lo definisce "stabile", ma nulla sembra casuale.
        #DSS_Solaris_bd_weather_LaytheInSpaceLow_01 = Guardi una cella temporalesca dividersi in due, poi riunirsi lungo la stessa cucitura un minuto dopo. Il log del sensore riporta "comportamento convettivo tipico".
        #DSS_Solaris_bd_weather_LaytheInSpaceLow_02 = Una lunga e sottile fascia di nubi segue il terminatore come una linea tracciata, regolando la velocità per restare al suo posto. La previsione insiste che stia semplicemente "persistendo".
        #DSS_Solaris_bd_weather_LaytheInSpaceLow_00 = Le cime delle nubi si dispongono in archi ordinati che ignorano i jet stream. Il modello lo definisce "stabile", ma nulla sembra casuale.
        #DSS_Solaris_bd_weather_LaytheInSpaceLow_01 = Guardi una cella temporalesca dividersi in due, poi riunirsi lungo la stessa cucitura un minuto dopo. Il log del sensore riporta "comportamento convettivo tipico".
        #DSS_Solaris_bd_weather_LaytheInSpaceLow_02 = Una lunga e sottile fascia di nubi segue il terminatore come una linea tracciata, regolando la velocità per restare al suo posto. La previsione insiste che stia semplicemente "persistendo".
        #DSS_Solaris_MCE_LaytheInSpaceLow_00 = La suite integrata ricuce ogni sensore in un profilo orbitale ordinato. È tutto "entro i limiti", ma i canali fremono insieme ogni volta che torna la traccia rivolta verso l'oceano.
        #DSS_Solaris_MCE_LaytheInSpaceLow_01 = Esegui una scansione completa e il rapporto è pulito come da manuale. Poi noti che il "rumore" casuale si ripete a ogni orbita con la stessa spaziatura, come se il set di dati fosse stato educatamente provato.
        #DSS_Solaris_MCE_LaytheInSpaceLow_00 = La suite integrata ricuce ogni sensore in un profilo orbitale ordinato. È tutto "entro i limiti", ma i canali fremono insieme ogni volta che torna la traccia rivolta verso l'oceano.
        #DSS_Solaris_MCE_LaytheInSpaceLow_01 = Esegui una scansione completa e il rapporto è pulito come da manuale. Poi noti che il "rumore" casuale si ripete a ogni orbita con la stessa spaziatura, come se il set di dati fosse stato educatamente provato.

        // The Expanse
        #DSS_Expanse_crewReport_DresInSpaceLow_00 = Guardi giù verso Dres e pensi che sarebbe un ottimo deposito, una volta che qualcuno capisce come impedire che il "temporaneo" diventi "permanente".
        #DSS_Expanse_crewReport_DresInSpaceLow_01 = I thruster soffiano in brevi impulsi avari. La massa di reazione viene trattata come l'acqua: misurata, riciclata e oggetto di discussione.
        #DSS_Expanse_crewReport_DresInSpaceHigh_00 = Da quassù Dres è un puntino pallido con un lungo tragitto annesso. Le letture del supporto vitale sembrano la vista più importante.
        #DSS_Expanse_crewReport_DresInSpaceHigh_01 = Ti sorprendi a pianificare la prossima spedizione: filtri dell'aria, guarnizioni di ricambio e qualunque cosa possa essere riutilizzata due volte prima di rompersi.
        #DSS_Expanse_crewReport_DresSrfLanded_00 = La bassa gravità fa sembrare ogni passo come lavorare un turno su un trampolino. Consigli corrimani prima che qualcuno "accidentalmente" raggiunga l'orbita.
        #DSS_Expanse_crewReport_DresSrfLanded_01 = La cabina odora di isolante scaldato e aria riciclata. L'equipaggio discute se il primo vero habitat sia un modulo, una trincea o "continuiamo a vivere nel lander".
        #DSS_Expanse_evaReport_DresInSpaceLow_00 = Agganci un cavo di sicurezza per abitudine. Il verricello fa tic tac come un metronomo per "non scivolare, non sprecare".
        #DSS_Expanse_evaReport_DresInSpaceLow_01 = Ogni soffio dei getti della tuta sembra consumare l'aria di qualcuno. Decidi di muoverti come se avessi una tabella di marcia.
        #DSS_Expanse_evaReport_DresInSpaceHigh_00 = Dres è una roccia pallida circondata da tanto vuoto. Il vuoto sembra il vero terreno.
        #DSS_Expanse_evaReport_DresInSpaceHigh_01 = Controlli di nuovo l'O2, poi di nuovo. Quaggiù, la tuta è l'unica stazione su cui puoi contare.
        #DSS_Expanse_evaReport_DresSrfLanded_00 = Fai un saltello leggero e te ne penti subito. La bassa gravità è divertente finché non ricordi quanto è lontano "su".
        #DSS_Expanse_evaReport_DresSrfLanded_01 = La polvere si attacca a tutto come se possedesse il posto. Inizi a ragionare in termini di guarnizioni, filtri e di quanto possa durare il "temporaneo".
        #DSS_Expanse_bd_cosmicRay_DresInSpaceLow_00 = I conteggi dei raggi cosmici schizzano mentre sfiori Dres dall'alto. Nessun campo, nessuna aria, solo flusso grezzo. Qualcuno nota che quaggiù il "meteo" passa attraverso lo scafo.
        #DSS_Expanse_bd_cosmicRay_DresInSpaceHigh_00 = Il rilevatore ticchetta come un brutto metronomo nel nero profondo attorno a Dres. Archivi i numeri sotto "problemi di abitazione a lungo raggio" e cerchi di non pensare a cosa potrebbe significare "adattamento".
        #DSS_Expanse_bd_cosmicRay_DresSrfLanded_00 = In superficie, la regolite ti compra un po' di schermatura e la frequenza di conteggio finalmente si stabilizza. Inizi a buttare giù un piano: pareti più spesse, moduli interrati e un laboratorio di genetica che nessuno deve ammettere di aver voluto.
        #DSS_Expanse_mysteryGoo_EveInSpaceHigh_00 = Il Controllo Missione lo chiama "orbita sicura". L'equipaggio la chiama "distanza di quarantena". I contenitori sigillati restano ben fissati e la checklist ha più "NON APRIRE" che "osservare".
        #DSS_Expanse_mysteryGoo_EveInSpaceHigh_01 = La melma si tende in una pelle viola lucida e compatta e preme contro il contenitore come se volesse cadere più in fretta. Aggiungi una nota: "Se propongono lo smaltimento, fai finta di non aver sentito".
        #DSS_Expanse_surfaceSample_TyloSrfLanded_00 = Il campione è pallido, secco e ostinatamente ordinario. Lo registri comunque: conta se può essere trasformato in aria, acqua, schermatura o mattoni.
        #DSS_Expanse_surfaceSample_TyloSrfLanded_01 = Insacchetti la regolite come fosse inventario, non un tesoro. Le note si concentrano su temperature di lavorazione, contaminanti e su quanto habitat potrebbe comprare per tonnellata.
        #DSS_Expanse_surfaceSample_TyloSrfLanded_02 = Setacci la regolite e immagini fioriere al posto dei sacchetti campione. Se un po' di riscaldamento mareale o vulcanismo sepolto sta portando verso l'alto minerali in tracce, potrebbe fare la differenza tra "polvere" e "suolo".
        #DSS_Expanse_surfaceSample_TyloSrfLanded_03 = La chimica è avara, ma non senza speranza. Segnali il campione per analisi dei nutrienti, perché se si riesce a convincere questo materiale a far crescere qualcosa, Tylo passa da "avamposto" a "casa".
        #DSS_Expanse_surfaceSample_TyloSrfLanded_04 = Fai un controllo rapido dei nutrienti e ridi del risultato. Come suolo è inutile, ma come substrato sterile in un ciclo chiuso? Forse. Se puoi permetterti l'acqua.
        #DSS_Expanse_surfaceSample_TyloSrfLanded_05 = La regolite è tagliente, secca e chimicamente poco invitante. Annota che le colture non ci cresceranno dentro, ci cresceranno attorno, sotto lampade, nutrite da serbatoi, con la terra di Tylo che serve solo a tenere fermo tutto.
        #DSS_Expanse_bd_drill_TyloSrfLanded_00 = Il trapano morde la polvere fino a uno strato crostoso striato di sali. Più in profondità, il carotaggio risale con scaglie più scure che il laboratorio segnala come "organici interessanti" e "per favore tenere sigillato".
        #DSS_Expanse_bd_drill_TyloSrfLanded_01 = Dopo pochi centimetri, i detriti passano da graniglia pallida a grumi un po' umidi che odorano vagamente di filtri vecchi. Registri "sali + tracce di carbonio complesso" e consigli un contenitore dedicato per la prossima serie di campioni.
        #DSS_Expanse_bd_drill_TyloSrfLanded_02 = Il trapano mastica polvere farinosa, poi morde una crosta che risale con una tenue tinta gialla. L'analizzatore segnala fini ricchi di sali. Il terreno "sterile" di Tylo sta nascondendo una personalità chimica.
        #DSS_Expanse_bd_drill_TyloSrfLanded_03 = Il carotaggio ha strati: polvere grigia in cima, poi una fascia granulosa carica di composti del carbonio. Le note scivolano subito da "geologia" a "industria": leganti, materia prima di processo e cosa puoi costruire se riesci a scavare.
        #DSS_Expanse_bd_GeigerCounter_EveInSpaceLow_00 = Il contatore ticchetta con entusiasmo professionale. Il Controllo Missione raccomanda una "postura standard di quarantena" e si rifiuta di definirla.
        #DSS_Expanse_bd_GeigerCounter_EveInSpaceLow_01 = Un picco breve attiva un auto-flag etichettato "SOLUZIONE VIOLA: NOMINALE". Decidi che stavi meglio prima di saper leggere.
        #DSS_Expanse_bd_IRradiometer_EveInSpaceLow_00 = Una striscia nuova e rovente sboccia sulla mappa IR: troppo netta e troppo recente per essere meteo. Il Controllo Missione chiede se "hai visto cadere qualcosa", poi ti ricorda che Eve è il posto approvato dove i problemi devono diventare silenziosi.
        #DSS_Expanse_bd_microwaveSpec_EveInSpaceLow_00 = Lo spettro a microonde mostra una zona netta di superficie appena ripulita, troppo "pulita" per restare naturale a lungo su Eve. Qualcuno chiede se hai registrato "consegne" non pianificate.
        #DSS_Expanse_bd_microwaveSpec_EveInSpaceLow_01 = Un'eco a banda stretta torna più forte del dovuto, come se un nuovo campo di detriti stesse ancora rotolando nella zuppa sotto. Lo archivi sotto "impatto... o smaltimento".
        #DSS_Expanse_bd_SIGINT_EveInSpaceLow_00 = Il ricevitore si aggancia a uno schema di impulsi serrato che sembra quasi una stretta di mano, poi si dissolve nel fruscio. Il Controllo Missione suggerisce di "registrarlo e non interagire", come se fosse una cosa possibile con le onde radio.
        #DSS_Expanse_bd_SIGINT_EveInSpaceLow_01 = Una debole portante cavalca il fondo, ripetendosi a intervalli regolari, ma la sorgente è da qualche parte sotto il coperchio viola di Eve. Il campo note guadagna in silenzio una nuova spunta: "Possibile beacon di smaltimento".
        #DSS_Expanse_bd_SIGINT_DresInSpaceLow_00 = I ricevitori scandagliano ogni banda e trovano solo sibilo termico. Dres è silenzioso nel modo che fa iniziare ai pianificatori a disegnare schemi di infrastrutture.
        #DSS_Expanse_bd_SIGINT_DresInSpaceLow_01 = Nessun traffico, nessun beacon, nessun ping disperso, solo spettro vuoto. Etichetti il file "baseline intatta" e immagini quanto in fretta sparirà quando arriveranno i primi grandi operatori.
        #DSS_Expanse_bd_soilScoop_TyloSrfLanded_00 = Raccogli una manciata pesante e granulosa che si comporta più come roccia frantumata che come "suolo". Con la gravità di Tylo, perfino un sacchetto campioni sembra voler essere pagato agli straordinari.
        #DSS_Expanse_bd_soilScoop_TyloSrfLanded_01 = La paletta raschia polvere compattata e risale con granelli taglienti e qualche fine stranamente agglomerata. Annota che qualunque cosa cresca qui avrà bisogno di biologia importata e di molta ingegneria.
        #DSS_Expanse_bd_UVspec_EveInSpaceLow_00 = La lettura UV si accende sopra una ferita fresca: bordi brillanti, polvere calda e chimica che non ha ancora avuto tempo di diventare "color Eve". Il Controllo Missione chiede se hai registrato lampi nell'ultima orbita.
        #DSS_Expanse_bd_UVspec_EveInSpaceLow_01 = Una sottile ombra ultravioletta scivola sottovento come un nuovo pennacchio che si espande nella foschia alta. Lo spettro assomiglia in modo scomodo a "stadi esausti", ma nessuno usa quelle parole a verbale.

        // The Martian
        #DSS_Martian_crewReport_DunaSrfLanded_00 = L'habitat odora di elettronica calda e terra umida. Le cassette di patate sono parcheggiate il più vicino possibile all'RTG, per quanto il Controllo Missione ci lasci ammettere.
        #DSS_Martian_crewReport_DunaSrfLanded_01 = Abbiamo deviato il calore "di scarto" dell'RTG in un "setup di prova" con radiatore e ora la cabina è vivibile. Il manuale non lo copriva, ma il manuale non è qui.
        #DSS_Martian_crewReport_DunaSrfLanded_02 = La batteria del rover ora è la batteria della serra. Il rover non è entusiasta. Le patate, però, non hanno presentato reclami.
        #DSS_Martian_crewReport_DunaSrfLanded_03 = La polvere di Duna ha violato di nuovo la fotocamera di equilibrio. Abbiamo sigillato una perdita con un incarto di snack, un collare stringitubo e una quantità di sicurezza che non dovrebbe finire a verbale.
        #DSS_Martian_crewReport_DunaSrfLanded_04 = Qualcuno ha proposto di aprire la linea di carburante d'emergenza "solo un po'" per scaldarsi. L'idea è stata discussa, poi respinta con decisione come pessima.
        #DSS_Martian_crewReport_DunaSrfLanded_05 = Lo scrubber di CO2 ha iniziato a fare un rumore triste, così l'abbiamo picchiettato finché non si è comportato bene. Ufficialmente lo chiamiamo "manutenzione percussiva" e fingiamo che fosse previsto.
        #DSS_Martian_crewReport_DunaInSpaceHigh_00 = Siamo "in formazione" con Duna a parecchi chilometri al secondo. Qualcuno chiede se una falla nello scafo conti come manovra di rendezvous. La risposta è no, ma l'aria se ne va abbastanza in fretta da controbattere.
        #DSS_Martian_evaReport_DunaSrfLanded_00 = Dai un'occhiata alla sonda morta più vicina e inizi a fare mentalmente l'inventario dei pezzi. Quell'antenna potrebbe essere una pala. O un mestolo. O entrambe le cose.
        #DSS_Martian_evaReport_DunaSrfLanded_01 = Disponi delle pietre per lasciare un messaggio a chiunque passi sopra. Dice "CIAO" finché il vento, gentilmente, lo riordina in "C AO".
        #DSS_Martian_evaReport_DunaSrfLanded_02 = Il manuale della tuta vuole "compiti EVA programmati". Il pianeta vuole "improvvisa". Riutilizzi un pannello scartato come frangivento e fai finta che fosse il piano.
        #DSS_Martian_evaReport_DunaSrfLanded_03 = Costruisci un cartello di pietre che dice "MANDATE SNACK".
        #DSS_Martian_evaReport_DunaInSpaceLow_00 = Una microfalla nella tuta ti trasforma in un thruster in preda al panico. La chiami "modalità Iron-kerbal" e provi a sembrare come se lo avessi fatto apposta.
        #DSS_Martian_evaReport_DunaInSpaceLow_01 = Blocchi una toppa su una perdita della tuta e ti arriva comunque una lieve spinta. Congratulazioni: hai inventato un sistema di manovra alimentato dal rimpianto.
        #DSS_Martian_evaReport_DunaInSpaceLow_02 = L'aria che sfugge da una falla nella tuta ti dà quel tanto di delta-v da "aggiustare la traiettoria". Le regole lo chiamano incidente. Tu lo chiami accensione.
        #DSS_Martian_evaReport_DunaInSpaceLow_03 = Provi a stabilizzare la rotazione puntando una perdita della tuta dall'altra parte. Funziona per poco, finché la fisica non ricorda che hai la forma di una patata confusa.
        #DSS_Martian_bd_camera_DunaSrfLanded_00 = La fotocamera cattura un panorama di polvere rossa, hardware sparso e una coraggiosa fila di pietre che scrive "CIAO". Il vento prova a correggere il messaggio in qualcosa di meno ottimista.
        #DSS_Martian_bd_mapping_DunaInSpaceLow_00 = La bassa orbita trasforma Duna in una griglia di problemi che finalmente puoi misurare. La mappa si riempie di aree "forse pianeggianti" e aree "decisamente non pianeggianti".
        #DSS_Martian_bd_mapping_DunaInSpaceLow_01 = Segnali una serie di terreni dall'aspetto liscio come possibile rotta di traversata, poi ingrandisci e scopri che sono solo rocce più piccole.
        #DSS_Martian_bd_mapping_DunaInSpaceLow_02 = La scansione evidenzia una linea sospettosamente dritta che potrebbe essere una vecchia traccia di sonda, o un'ombra, o un pixel difettoso che si rifiuta di morire. La registri lo stesso: il te del futuro potrà discutere con il te del presente.
        #DSS_Martian_bd_orbitalScope_DunaInSpaceLow_00 = Il Controllo Missione ti chiede di "confermare se sono rimasti asset in superficie". Ingrandisci finché puoi identificare la forma esatta delle tue pessime decisioni.
        #DSS_Martian_bd_orbitalScope_DunaInSpaceLow_01 = Il telescopio orbitale individua un minuscolo luccichio che è o un attrezzo dimenticato, o un pannello scartato, o una roccia molto compiaciuta. Il Controllo Missione richiede altri tre passaggi "per sicurezza".
        #DSS_Martian_bd_SIGINT_DunaInSpaceLow_00 = Il ricevitore si aggancia a un ping debole e obsoleto di una sonda di superficie ufficialmente "dismessa". Ora sta trasmettendo in modo molto ufficioso qualcosa che suona come SOS.
        #DSS_Martian_bd_SIGINT_DunaInSpaceLow_01 = Una sonda morta inizia a trasmettere in piccoli impulsi ordinati, come se stesse cercando di ricordare come si parla. Il Controllo Missione chiede se puoi "solo ascoltare" senza affezionarti emotivamente.
        #DSS_Martian_bd_SIGINT_DunaInSpaceLow_02 = Triangoli il segnale su un vecchio sito di atterraggio. La sonda ripete un pacchetto di stato, poi passa a un tono di soccorso, come se si fosse finalmente accorta di essere sola.
        #DSS_Martian_bd_surveillance_DunaInSpaceLow_00 = Il passaggio di sorveglianza mostra un nuovo set di tracce che non era sulla mappa di ieri. O il vento ha imparato a guidare, o qualcuno sta facendo di nuovo "manutenzione" fuori programma.
        #DSS_Martian_bd_surveillance_DunaInSpaceLow_01 = Un piccolo gruppo di oggetti vicino all'habitat ha cambiato posizione di qualche metro. Il Controllo Missione li chiama "asset". Tu li chiami "cose che ci sono arrivate camminando".
        #DSS_Martian_bd_surveillance_DunaInSpaceLow_02 = Una zona di polvere appare appena ripulita, come se qualcosa fosse stato trascinato sopra con intenzione. Nessuno lo ammette via radio, ed è così che sai che è successo.
        #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_00 = Le foglie di patata restano ostinatamente verdi nonostante la polvere, il freddo e il fatto che metà del "suolo" sia improvvisato. Decidi che questo conta come una svolta scientifica.
        #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_01 = I tassi di crescita schizzano ogni volta che il circuito di calore dell'RTG si comporta bene e crollano quando non lo fa. Le piante stanno votando in modo chiarissimo sulle tue scelte di ingegneria.
        #DSS_Martian_sspxPlantGrowth_DunaSrfLanded_02 = Registri "aggiustamenti della soluzione nutritiva" e "taratura dell'umidità", che è il modo ufficiale per dire che stai tenendo vive delle patate con tubi riciclati e determinazione.

        // === Val-Vall Jokes ===
        #JNSQscience_ValVall_00 = Qualcuno continua a dire "Val su Vall" alla radio, e adesso tutto l'equipaggio non riesce a smettere di ridere.
        #JNSQscience_ValVall_01 = Ricontrolli il computer di navigazione. Il bersaglio è Vall. Il pilota scrive "Val" sulla checklist lo stesso.
        #JNSQscience_ValVall_02 = Il Controllo Missione chiede un rapporto di stato. Tu rispondi "Val è su Vall..." e senti subito delle risatine soffocate sul canale.
        #JNSQscience_ValVall_03 = Per sicurezza etichetti il contenitore dei campioni "VAL/L". In qualche modo peggiori la situazione.
        #JNSQscience_ValVall_04 = Il registro di volo corregge automaticamente "Vall" in "Val". Pensi di aprire una segnalazione bug, poi ricordi che sei tu quello con la penna in mano.
        #JNSQscience_ValVall_05 = Ripassi con cura le chiamate di atterraggio: "Vall. Con due L." Nessuno ascolta.
        #JNSQscience_ValVall_06 = Alla fine, pare proprio che dovremo mandare Val su Vall.
        #JNSQscience_ValVall_07 = Ti chiedi se "Vall" non sia solo l'abbreviazione di "Vallentina".
    }
}

// 16327 lines