        #GEPscience_tantares_ultraviolet_light_camera_BorvoFlyingLow_00 = Nell'aria bassa di Borvo, l'UV si diffonde in una nebbia violacea sporca, la camera vede più aerosol che paesaggio, e il Controllo lo vede dopo.
        #GEPscience_tantares_ultraviolet_light_camera_BorvoFlyingHigh_00 = Sopra gran parte della foschia, l'UV rivela nubi a bande e deboli bagliori che scorrono sotto il sole rosso, le tue reazioni sono sempre in ritardo di qualche secondo.
        #GEPscience_tantares_ultraviolet_light_camera_BorvoInSpaceLowTropicalCraquelure_00 = Dall'orbita, i campi della crettatura tropicale tracciano reti luminose in UV sulla superficie, come vernice secca su scala planetaria.
