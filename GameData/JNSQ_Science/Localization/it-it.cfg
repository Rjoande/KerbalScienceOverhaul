        #JNSQscience_bd_surveillance_LindorInSpaceLowTemperateBands_00 = Le bande temperate scorrono in strisce morbide: il contrasto è basso, ma il movimento no.
        #JNSQscience_bd_surveillance_LindorInSpaceLowExposedLowerDeck_00 = Strati inferiori scoperti più scuri sbucano in chiazze strappate, come se qualcuno avesse tirato indietro le tende per un secondo.
        #JNSQscience_bd_surveillance_LindorInSpaceLowSubpolarBands_00 = Le bande sub-polari si torcono in vortici intrecciati che fanno chiedere al software di tracciamento nuvole più semplici.
        #JNSQscience_bd_surveillance_LindorInSpaceLowNorthPole_00 = Vicino al polo nord, la foschia forma un lento vortice con vuoti che sembrano intenzionali, anche se non lo sono.
        #JNSQscience_bd_surveillance_LindorInSpaceLowSouthPole_00 = La calotta di nubi del polo sud sembra calma finché all'improvviso non lo è: registri tre dettagli del tipo "ora lo vedi" in un solo passaggio.
        #JNSQscience_bd_surveillance_LindorInSpaceLowStormComplex_00 = Le formazioni temporalesche sono un livido a strati di texture rotante: fissi abbastanza a lungo da dimenticare che sei tu a muoverti.
        #JNSQscience_bd_surveillance_LindorInSpaceLowUpperStormDeck_00 = Alte velature scorrono sopra bande più profonde, suggerendo più livelli di meteo che litigano sulla direzione.
        #JNSQscience_bd_surveillance_KrelInSpaceLowLowlands_00 = I bassopiani di Krel sono chiari e rigati, raccolgono detriti più scuri in tasche poco profonde come se volessero nascondere l'età.
        #JNSQscience_bd_surveillance_KrelInSpaceLowMidlands_00 = Le pianure mostrano deboli striature e sottili venature di tono: per un attimo ti chiedi se la luna stia arrossendo.
        #JNSQscience_bd_surveillance_KrelInSpaceLowHighlands_00 = Le colline si spezzano in creste aspre con ombre dure: ogni pendio sembra a una vibrazione dallo scivolare.
        #JNSQscience_bd_surveillance_KrelInSpaceLowPoles_00 = I poli si schiariscono leggermente, come se il terreno più freddo si stesse lucidando quando nessuno guarda.
        #JNSQscience_bd_surveillance_AdenInSpaceLowLowlands_00 = I bassopiani di Aden sono lisci, marroni e stranamente uniformi, un ottimo posto per atterrare, e quindi sospetto.
        #JNSQscience_bd_surveillance_AdenInSpaceLowMidlands_00 = Il terreno delle pianure diventa marezzato in texture a chiazze, come uno snack marmorizzato che non ti è permesso assaggiare.
        #JNSQscience_bd_surveillance_AdenInSpaceLowHighlands_00 = Le colline sono scheggiate e malridotte, con cicatrici sovrapposte che sembrano una storia scritta a colpi d'ammaccatura.
        #JNSQscience_bd_surveillance_AdenInSpaceLowMountains_00 = I rilievi montuosi proiettano ombre tozze: tutto l'orizzonte sembra un mucchio di sassi che prova a essere importante.
        #JNSQscience_bd_surveillance_AdenInSpaceLowPoles_00 = I poli mostrano polvere più chiara e contrasti più netti, un promemoria silenzioso che l'illuminazione cambia tutto.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowLowlands_00 = Attraverso la foschia ambrata, i bassopiani mostrano ampie strisciate scure che potrebbero essere dune, oppure il pianeta che fa l'occhiolino.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowMidlands_00 = Le creste delle pianure appaiono e scompaiono mentre la foschia si infittisce: passi più tempo a indovinare che a misurare.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowHighlands_00 = Le colline risaltano come terrazze chiare sopra la foschia, come isole in un'atmosfera che si è dimenticata di essere trasparente.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowMountains_00 = Dorsali montuose bucano aria più limpida: le ombre sembrano abbastanza nette da essere tracciate con un righello.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowPeaks_00 = Alcune cime si alzano come aghi scuri nel bagliore, sfidandoti a definire tutto questo "buona visibilità".
        #JNSQscience_bd_surveillance_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari mostrano distese lisce e luminose con deboli striature, come se qualcosa di freddo stesse scorrendo lentamente.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowPoles_00 = I poli brillano dolcemente sotto una sottile calotta di foschia: i sensori insistono che sia normale, mentre tu non sei d'accordo.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowPolarHighlands_00 = Le colline polari appaiono ruvide e erose dal vento, con bordi affilati addolciti solo dalla sfocatura dell'atmosfera.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowShores_00 = La linea di costa è una macchia disordinata tra terra e liquido: la fotocamera non riesce a decidere dove finisca l'una.
        #JNSQscience_bd_surveillance_HuygenInSpaceLowMethaneLakes_00 = I laghi di metano luccicano con riflessi oleosi e centri scuri, come se qualcuno avesse rovesciato carburante e lo avesse chiamato geografia.
        #JNSQscience_bd_surveillance_RigaInSpaceLowLowlands_00 = I bassopiani di Riga stanno in ampi bacini di regolite più scura, come se la luna stesse conservando con cura tutta la polvere.
        #JNSQscience_bd_surveillance_RigaInSpaceLowMidlands_00 = Le pianure mostrano lievi dorsali e deboli raggi, quel tipo di "piatto" che prova comunque a far inciampare un lander.
        #JNSQscience_bd_surveillance_RigaInSpaceLowHighlands_00 = Le colline sono aspre e affollate di vecchi impatti, ogni cratere sovrapposto con educazione al successivo.
        #JNSQscience_bd_surveillance_RigaInSpaceLowMountains_00 = Dorsali montuose proiettano ombre lunghe che fanno sembrare il terreno più affilato di quanto probabilmente sia... probabilmente.
        #JNSQscience_bd_surveillance_RigaInSpaceLowPoles_00 = I poli si schiariscono in una calotta pallida, come se la superficie indossasse un sottile strato di polvere fresca.
        #JNSQscience_bd_surveillance_TalosInSpaceLowLowlands_00 = I bassopiani di Talos sono scuri e quieti, con chiazze lisce che sembrano in attesa da molto tempo.
        #JNSQscience_bd_surveillance_TalosInSpaceLowMidlands_00 = Le pianure mostrano campi di massi sparsi e deboli lineazioni, come se il suolo avesse provato una volta a organizzarsi.
        #JNSQscience_bd_surveillance_TalosInSpaceLowHighlands_00 = Le colline sono terreno aspro e ad alto contrasto: la mappa si riempie in fretta, la tua sicurezza no.
        #JNSQscience_bd_surveillance_TalosInSpaceLowMountains_00 = Le montagne si alzano in blocchi spezzati, proiettando ombre drammatiche che urlano "niente atmosfera, niente pietà".
        #JNSQscience_bd_surveillance_TalosInSpaceLowPoles_00 = Ai poli, l'illuminazione si fa dura e l'albedo salta: ricontrolli che non sia brina che fa scherzi.
        #JNSQscience_bd_surveillance_EelooInSpaceLowPoles_00 = Il ghiaccio polare è accecantemente luminoso, interrotto solo da lievi graffi dove qualcosa è stato trascinato dal vento per secoli.
        #JNSQscience_bd_surveillance_EelooInSpaceLowHighlands_00 = Alte creste proiettano lunghe ombre blu sulla superficie bianca, facendo sembrare ogni pendio più affilato del tuo carrello d'atterraggio.
        #JNSQscience_bd_surveillance_EelooInSpaceLowMidlands_00 = Le pianure mostrano un patchwork di ghiaccio crepato e striature di polvere, come se il terreno stesse cercando di ricordare in che direzione scorreva.
        #JNSQscience_bd_surveillance_EelooInSpaceLowLowlands_00 = I bacini bassi raccolgono brina più scura e detriti, formando chiazze lisce che sembrano sospettosamente comode per atterrare.
        #JNSQscience_bd_surveillance_EelooInSpaceLowCanyon_00 = Un canyon taglia il ghiaccio come una cicatrice congelata: la sua ombra resta abbastanza scura da mettere a disagio la fotocamera.
        #JNSQscience_bd_surveillance_CelesInSpaceLowLowlands_00 = I bassopiani di Celes sono lisci e pallidi, con striature sottili che sembrano il segno di qualcuno che abbia provato a spazzare la superficie.
        #JNSQscience_bd_surveillance_CelesInSpaceLowMidlands_00 = Le pianure sono butterate e irregolari, piene di buche poco profonde che si confondono in una texture da "non fidarti di questo terreno".
        #JNSQscience_bd_surveillance_CelesInSpaceLowHighlands_00 = Le colline si alzano in placche spezzate e ombre dure, come se la crosta si fosse crepata una volta e avesse deciso che quella fosse la sua personalità.
        #JNSQscience_bd_surveillance_CelesInSpaceLowMountains_00 = Le "montagne" sono rilievi frastagliati che proiettano ombre drammatiche: il Controllo Missione evidenzia un dettaglio e poi lo etichetta "NDA".
        #JNSQscience_bd_surveillance_CelesInSpaceLowPoles_00 = I poli si schiariscono in una sottile calotta di polvere riflettente, come se il freddo stesso stesse lucidando il suolo a forza di sabbia.
        #JNSQscience_bd_surveillance_TamInSpaceLowLowlands_00 = I bassopiani sembrano macerie compattate con tasche scure di fini, una superficie bitorzoluta che finge stabilità.
        #JNSQscience_bd_surveillance_TamInSpaceLowMidlands_00 = Le pianure di Tam scorrono come un livido in rotazione, con chiazze marezzate che rendono difficile capire la scala e più facile pentirsene.
        #JNSQscience_bd_surveillance_TamInSpaceLowHighlands_00 = Le colline sono creste irte e contrasti netti, il tipo di posto che trasforma "atterraggio" in "rotolaggio".
        #JNSQscience_bd_surveillance_TamInSpaceLowTwinCraters_00 = Due crateri gemelli stanno affiancati come occhi: la simmetria sembra casuale, ma ti guarda lo stesso.
        #JNSQscience_bd_surveillance_TamInSpaceLowCraters_00 = I crateri si sovrappongono in ogni dimensione, trasformando l'intera luna in un catalogo di impatti e cattive tempistiche.
        #JNSQscience_bd_surveillance_TamInSpaceLowPockmarks_00 = La regione butterata è piena di minuscole fossette, come se la superficie fosse stata tempestata e non fosse mai guarita.
        #JNSQscience_bd_surveillance_HamekInSpaceLowLowlands_00 = I bassopiani rossastri si estendono in ampie pianure, spolverate di striature più scure che si trascinano via come pigmento rovesciato.
        #JNSQscience_bd_surveillance_HamekInSpaceLowMidlands_00 = Le pianure mostrano creste aggrovigliate e deboli lineazioni, come se il suolo fosse stato rimescolato con delicatezza e poi congelato a metà vortice.
        #JNSQscience_bd_surveillance_HamekInSpaceLowHighlands_00 = Le colline si alzano come terreno ruvido e a blocchi con ombre dure: ogni cresta sembra pronta a mordere una ruota del rover.
        #JNSQscience_bd_surveillance_HamekInSpaceLowPoles_00 = I poli sfumano verso una tonalità più chiara, con chiazze luminose che potrebbero essere brina, oppure solo il pianeta che si rifiuta di spiegarsi.
        #JNSQscience_bd_surveillance_NaraInSpaceLowLowlands_00 = I bassopiani scuri si intravedono attraverso la fredda foschia.
        #JNSQscience_bd_surveillance_NaraInSpaceLowMidlands_00 = Le pianure svaniscono e riappaiono sotto un velo spesso e pallido: segni le forme e fai finta che conti come certezza.
        #JNSQscience_bd_surveillance_NaraInSpaceLowHighlands_00 = Creste delle colline catturano la luce radente sopra la foschia, abbastanza nette da suggerire roccia sotto tutta quella pressione.
        #JNSQscience_bd_surveillance_NaraInSpaceLowMountains_00 = Dorsali montuose spuntano come nocche sotto un cielo pesante: le ombre sembrano più profonde del dovuto.
        #JNSQscience_bd_surveillance_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari mostrano lastre lisce e luminose interrotte da deboli striature, flussi lenti o solo foschia che fa scherzi.
        #JNSQscience_bd_surveillance_NaraInSpaceLowPoles_00 = Il polo luccica sotto una sottile calotta di nubi, con delicati motivi a vortice che si rifiutano di stare fermi.
        #JNSQscience_bd_surveillance_NaraInSpaceLowPolarHighlands_00 = Le colline polari appaiono erose e chiare, come se il freddo stesse sabbiando il paesaggio da secoli.
        #JNSQscience_bd_surveillance_AmosInSpaceLowLowlands_00 = I bassopiani di Amos sono una colata scura di regolite, raccolgono detriti in tasche poco profonde come se la gravità stesse accumulando briciole.
        #JNSQscience_bd_surveillance_AmosInSpaceLowMidlands_00 = Le pianure sono marezzate e livide, con striature che sembrano scivolamenti lenti e inevitabili.
        #JNSQscience_bd_surveillance_AmosInSpaceLowHighlands_00 = Le colline si spezzano in creste dure e ombre nette: l'intera luna sembra dire "nessun angolo sicuro".
        #JNSQscience_bd_surveillance_AmosInSpaceLowMountains_00 = I rilievi montuosi spuntano come denti spezzati, sfidandoti a scambiarli per siti di atterraggio.
        #JNSQscience_bd_surveillance_AmosInSpaceLowPoles_00 = I poli si schiariscono leggermente, una spolverata di materiale chiaro che fa sembrare il buio ancora più buio.
        #JNSQscience_bd_surveillance_EnonInSpaceLowLowlands_00 = I bassopiani di Enon brillano come neve compattata, con deboli giunture grigie che suggeriscono ghiaccio depositato a strati.
        #JNSQscience_bd_surveillance_EnonInSpaceLowMidlands_00 = Le pianure mostrano dorsali gentili e bande sottili, come se la superficie fosse stata piegata lentamente e poi congelata.
        #JNSQscience_bd_surveillance_EnonInSpaceLowHighlands_00 = Le colline proiettano lunghe ombre blu su un suolo luminoso: ogni pendio sembra nitido, freddo e implacabile.
        #JNSQscience_bd_surveillance_EnonInSpaceLowPoles_00 = Ai poli, il bagliore lascia spazio a sottili crepe e graffi, minuscole imperfezioni su un mondo altrimenti accecante.
        #JNSQscience_bd_surveillance_PraxInSpaceLowLowlands_00 = I bassopiani di Prax si adagiano in bacini scuri di fini, la cosa più vicina alla calma che questo mondo di confine possieda.
        #JNSQscience_bd_surveillance_PraxInSpaceLowMidlands_00 = Le pianure sono un mosaico di buche e creste, come se la superficie non sapesse decidere se sgretolarsi o resistere.
        #JNSQscience_bd_surveillance_PraxInSpaceLowHighlands_00 = Le colline si alzano in placche spezzate con contrasti netti: la mappa si riempie in fretta, la tua sicurezza no.
        #JNSQscience_bd_surveillance_PraxInSpaceLowMountains_00 = Blocchi montuosi si impilano con angoli strani, facendo sembrare l'orizzonte assemblato più che formato.
        #JNSQscience_bd_surveillance_PraxInSpaceLowPoles_00 = I poli mostrano una spolverata chiara e un'illuminazione più dura, trasformando ogni piccolo dosso in un punto di riferimento drammatico.

        // bd_TrappedRadiation
        #JNSQscience_bd_TrappedRadiation_SunInSpaceLow_00 = Il rivelatore si accende di particelle che corrono lungo le linee di campo contorte di Kerbol: sembrano più anelli che fasce.
        #JNSQscience_bd_TrappedRadiation_SunInSpaceLow_01 = Mappi alcune "bande" dense di carica intrappolata, poi la lettura va in saturazione e comincia a disegnare arte moderna.
        #JNSQscience_bd_TrappedRadiation_SunInSpaceHigh_00 = Qui fuori non ci sono fasce coerenti, solo una pioggerellina sottile di particelle energetiche e qualche capriccio occasionale di Kerbol.
        #JNSQscience_bd_TrappedRadiation_SunInSpaceHigh_01 = Il motivo si rifiuta di restare fermo: il Controllo Missione lo etichetta "fondo interplanetario" e ti dice di smetterla di chiamarlo fascia.
        #JNSQscience_bd_TrappedRadiation_IkeInSpaceLow_00 = Lo strumento cerca una fascia di Ike e trova soprattutto radiazione in orbita di Duna, con una debole "ombra" quando Ike blocca il flusso.
        #JNSQscience_bd_TrappedRadiation_IkeInSpaceLow_01 = Le letture schizzano in tasche irregolari, ma nulla resta intrappolato, è come provare a trattenere fumo con un setaccio.
        #JNSQscience_bd_TrappedRadiation_IkeInSpaceHigh_00 = In alto sopra Ike, i numeri sembrano indistinguibili dallo spazio libero vicino a Duna: tante particelle, nessuna struttura a fasce.
        #JNSQscience_bd_TrappedRadiation_IkeInSpaceHigh_01 = Qualunque magnetismo qui sembra preso in prestito e temporaneo: la "fascia" sparisce appena provi a disegnarla su una mappa.
        #JNSQscience_bd_TrappedRadiation_EdnaInSpaceLow_00 = Edna non offre alcuna gabbia magnetica, quindi il rivelatore registra solo radiazione di fondo e qualche breve guizzo.
        #JNSQscience_bd_TrappedRadiation_EdnaInSpaceLow_01 = Una tenue foschia di graniglia carica sfiora ogni tanto il sensore, ma non si organizza mai in qualcosa che tu possa chiamare fascia.
        #JNSQscience_bd_TrappedRadiation_EdnaInSpaceHigh_00 = Molto sopra Edna, la curva si appiattisce su una tranquilla linea di base: popolazioni intrappolate praticamente assenti.
        #JNSQscience_bd_TrappedRadiation_EdnaInSpaceHigh_01 = L'unica cosa "confinata" è la tua pazienza, mentre la lettura si ostina a non formare anelli.
        #JNSQscience_bd_TrappedRadiation_DakInSpaceLow_00 = Vicino a Dak, il rivelatore riporta "nessuna fascia rilevata" e poi aggiunge, inutilmente, "sempre una patata".
        #JNSQscience_bd_TrappedRadiation_DakInSpaceLow_01 = Compaiono un paio di piccoli picchi quando imbardi la navicella, a quanto pare sono la tua elettronica, non Dak.
        #JNSQscience_bd_TrappedRadiation_DakInSpaceHigh_00 = In orbita alta su Dak è tutto pulito e noioso: solo particelle di fondo, senza segni di intrappolamento.
        #JNSQscience_bd_TrappedRadiation_DakInSpaceHigh_01 = Provi a trovare nella patata un "canto di sirena" nei dati. Lo strumento insiste che ci siano solo silenzio e pioggerellina cosmica.
        #JNSQscience_bd_TrappedRadiation_LindorInSpaceLow_00 = Il rivelatore trova subito fasce dense di particelle intrappolate: Lindor indossa una tuta magnetica molto seria.
        #JNSQscience_bd_TrappedRadiation_LindorInSpaceLow_01 = Le letture della fascia interna salgono in fretta, poi si appiattiscono quando lo strumento raggiunge il suo limite di comfort e va in panico in silenzio.
        #JNSQscience_bd_TrappedRadiation_LindorInSpaceHigh_00 = Le fasce si assottigliano, ma la struttura resta: le linee di campo si estendono lontano nello spazio come una gigantesca rete invisibile.
        #JNSQscience_bd_TrappedRadiation_LindorInSpaceHigh_01 = Tracci il bordo esterno della magnetosfera, dove le particelle intrappolate lasciano spazio al flusso più duro dello spazio aperto.
        #JNSQscience_bd_TrappedRadiation_KrelInSpaceLow_00 = Krel non ha fasce proprie: i picchi che vedi coincidono con l'ambiente di Lindor, non con la luna.
        #JNSQscience_bd_TrappedRadiation_KrelInSpaceLow_01 = Le letture calano quando Krel blocca le particelle in arrivo, lasciando dietro di sé una piccola e ordinata "ombra di radiazione".
        #JNSQscience_bd_TrappedRadiation_KrelInSpaceHigh_00 = Più in alto, il motivo sembra attraversare un lontano foglio di fasce, luminoso poi quieto, ancora e ancora.
        #JNSQscience_bd_TrappedRadiation_KrelInSpaceHigh_01 = Il rivelatore insiste che la trappola sia altrove: Krel è solo lì a farsi trasportare.
        #JNSQscience_bd_TrappedRadiation_AdenInSpaceLow_00 = Vicino ad Aden non compare alcun intrappolamento locale, solo una pioggerellina costante che cambia mentre Lindor incombe da direzioni diverse.
        #JNSQscience_bd_TrappedRadiation_AdenInSpaceLow_01 = Provi a mappare una "fascia di Van Aden" e finisci invece per mappare l'orbita della navicella attraverso la zuppa di particelle di Lindor.
        #JNSQscience_bd_TrappedRadiation_AdenInSpaceHigh_00 = Il segnale si fa più uniforme con la quota, suggerendo che Aden stia soprattutto ai margini della magnetosfera di qualcun altro.
        #JNSQscience_bd_TrappedRadiation_AdenInSpaceHigh_01 = Alcuni impulsi energetici sfondano, poi svaniscono, come il bordo di una fascia che sfiora il sensore.
        #JNSQscience_bd_TrappedRadiation_HuygenInSpaceLow_00 = Le particelle piovono nell'alta atmosfera e spariscono dal conteggio: qualunque cosa sia intrappolata nelle vicinanze sta perdendo pezzi in fretta.
        #JNSQscience_bd_TrappedRadiation_HuygenInSpaceLow_01 = Il rivelatore vede particelle cariche, ma nessun confinamento stabile attorno a Huygen, più precipitazione che accumulo.
        #JNSQscience_bd_TrappedRadiation_HuygenInSpaceHigh_00 = Sopra la foschia, i dati sembrano trabocco di fasce da Lindor, con picchi netti occasionali dove il campo convoglia particelle.
        #JNSQscience_bd_TrappedRadiation_HuygenInSpaceHigh_01 = L'ambiente esterno è attivo, ma Huygen si rifiuta di comportarsi come un magnete.
        #JNSQscience_bd_TrappedRadiation_RigaInSpaceLow_00 = Riga non mostra alcuna firma di fasce proprie: la radiazione arriva in onde ampie che seguono l'influenza di Lindor.
        #JNSQscience_bd_TrappedRadiation_RigaInSpaceLow_01 = I numeri oscillano con l'orientamento, come se stessi sfiorando un campo irregolare invece di orbitare una popolazione intrappolata.
        #JNSQscience_bd_TrappedRadiation_RigaInSpaceHigh_00 = In quota, la struttura a fasce si indebolisce e si spezza, suggerendo che Riga stia vicino al margine della regione intrappolata.
        #JNSQscience_bd_TrappedRadiation_RigaInSpaceHigh_01 = Ciò che resta è per lo più fondo, con giusto abbastanza flusso organizzato da ricordarti che Lindor comanda ancora.
        #JNSQscience_bd_TrappedRadiation_TalosInSpaceLow_00 = Talos non ha fasce intrappolate di cui valga la pena parlare: il rivelatore registra soprattutto fondo tranquillo con rari picchi erranti.
        #JNSQscience_bd_TrappedRadiation_TalosInSpaceLow_01 = Se Lindor ha delle fasce fin quassù, sono troppo deboli o troppo lontane per restare coerenti attorno a Talos.
        #JNSQscience_bd_TrappedRadiation_TalosInSpaceHigh_00 = Le letture si assestano su una linea di base piatta: qualunque intrappolamento esista più vicino non arriva fin qui in modo affidabile.
        #JNSQscience_bd_TrappedRadiation_TalosInSpaceHigh_01 = Lo strumento archivia sotto "niente da intrappolare" e suggerisce di cercare emozioni da qualche altra parte.
        #JNSQscience_bd_TrappedRadiation_CelesInSpaceLow_00 = Il rivelatore cerca fasce di radiazione ordinate e non ne trova nessuna, solo il solito fondo e alcuni picchi ostinati.
        #JNSQscience_bd_TrappedRadiation_CelesInSpaceLow_01 = Qualunque carica stia vagando attorno a Celes si rifiuta di restare ferma: non c'è alcuna gabbia magnetica che tenga insieme una fascia.
        #JNSQscience_bd_TrappedRadiation_CelesInSpaceHigh_00 = Più in alto, le letture si addolciscono in una tranquilla linea di base. Celes non intrappola nulla, solo le tue aspettative.
        #JNSQscience_bd_TrappedRadiation_CelesInSpaceHigh_01 = Provi passaggi e angoli diversi, ma la "mappa delle fasce" resta vuota. Per impostazione predefinita vincono le particelle di fondo.
        #JNSQscience_bd_TrappedRadiation_TamInSpaceLow_00 = Attorno a Tam non compaiono fasce intrappolate. L'unica "cintura" qui è quella di Kuiper Kerman, e non è radioattiva.
        #JNSQscience_bd_TrappedRadiation_TamInSpaceLow_01 = Tam è troppo piccolo e troppo poco magnetico per radunare particelle: il rivelatore registra una sottile pioggerellina e passa oltre.
        #JNSQscience_bd_TrappedRadiation_TamInSpaceHigh_00 = Nello spazio alto, i conteggi sembrano vuoto aperto con un po' di atteggiamento: nessuna struttura, nessun confinamento, nessuna fascia.
        #JNSQscience_bd_TrappedRadiation_TamInSpaceHigh_01 = Ripeti la scansione solo per sicurezza. Tam resta indifferente e del tutto privo di fasce.
        #JNSQscience_bd_TrappedRadiation_HamekInSpaceLow_00 = Lo strumento non trova popolazioni intrappolate stabili attorno a Hamek: qualunque particella arrivi se ne va in fretta.
        #JNSQscience_bd_TrappedRadiation_HamekInSpaceLow_01 = Le letture oscillano leggermente mentre Hamek "danza", ma non si formano anelli o bande, solo fondo con qualche stranezza.
        #JNSQscience_bd_TrappedRadiation_HamekInSpaceHigh_00 = Molto sopra Hamek, i dati si appiattiscono su normali livelli di radiazione interplanetaria, senza alcun segno di intrappolamento.
        #JNSQscience_bd_TrappedRadiation_HamekInSpaceHigh_01 = Tracci comunque linee di fasce immaginarie sul grafico. Il Controllo Missione suggerisce di etichettarle "speranza" e "rimpianto".
        #JNSQscience_bd_TrappedRadiation_NaraInSpaceLow_00 = Il rivelatore trova una fascia ben organizzata di particelle intrappolate: il campo magnetico di Nara qui fuori sta lavorando sul serio.
        #JNSQscience_bd_TrappedRadiation_NaraInSpaceLow_01 = I conteggi della fascia interna salgono rapidamente, poi si assestano su un livello di radiazione da "non toccare niente".
        #JNSQscience_bd_TrappedRadiation_NaraInSpaceHigh_00 = La fascia esterna si sfilaccia in striature e tasche, come se la magnetosfera venisse tirata e stirata.
        #JNSQscience_bd_TrappedRadiation_NaraInSpaceHigh_01 = Tracci il confine irregolare della fascia, dove le particelle intrappolate lasciano spazio al flusso dello spazio aperto.
        #JNSQscience_bd_TrappedRadiation_AmosInSpaceLow_00 = Amos non ha fasce proprie: il motivo di radiazione coincide con l'ambiente di Nara, con una bella ombra quando Amos blocca il flusso.
        #JNSQscience_bd_TrappedRadiation_AmosInSpaceLow_01 = Il rivelatore continua a provare a "centrare" una fascia su Amos. I dati si rifiutano con garbo.
        #JNSQscience_bd_TrappedRadiation_AmosInSpaceHigh_00 = In alto sopra Amos, stai praticamente campionando lo stesso grande foglio di fasce più e più volte mentre l'orbita ti ci porta dentro.
        #JNSQscience_bd_TrappedRadiation_AmosInSpaceHigh_01 = Qualunque intrappolamento qui è chiaramente preso in prestito: Amos è solo una roccia scura che si ripara nella scia magnetica di Nara.
        #JNSQscience_bd_TrappedRadiation_EnonInSpaceLow_00 = Le particelle cariche precipitano verso la superficie di Enon e spariscono dal conteggio, come se la luna stesse assorbendo in silenzio la fascia.
        #JNSQscience_bd_TrappedRadiation_EnonInSpaceLow_01 = Il rivelatore vede un flusso forte nelle vicinanze, ma nulla che resti confinato a Enon: è tutta popolazione intrappolata di Nara.
        #JNSQscience_bd_TrappedRadiation_EnonInSpaceHigh_00 = Più fuori, il segnale si uniforma in un ampio bagliore strutturato, ancora abbastanza ordinato da chiamarlo fascia, solo più sottile.
        #JNSQscience_bd_TrappedRadiation_EnonInSpaceHigh_01 = Le fasce si indeboliscono con la quota, ma la loro forma persiste, tracciando linee invisibili che puntano di nuovo verso Nara.
        #JNSQscience_bd_TrappedRadiation_PraxInSpaceLow_00 = Le letture saltano tra "fascia" e "non fascia" con bordi netti: Prax sta sfiorando i margini della regione intrappolata di Nara.
        #JNSQscience_bd_TrappedRadiation_PraxInSpaceLow_01 = Il rivelatore disegna una mappa delle fasce sbilenca e poi ammette che sta soprattutto mappando la frangia irregolare della magnetosfera.
        #JNSQscience_bd_TrappedRadiation_PraxInSpaceHigh_00 = Molto sopra Prax, le particelle intrappolate diventano intermittenti: cogli brevi raffiche, poi lunghi tratti di tranquillo fondo.
        #JNSQscience_bd_TrappedRadiation_PraxInSpaceHigh_01 = I dati indicano questa quota come il punto in cui Nara smette di comandare e lo spazio torna a comportarsi come spazio.

        // bd_UVscope
        #JNSQscience_bd_UVscope_SunInSpaceLow_00 = Il telescopio UV prova a fotografare bersagli lontani, ma Kerbol continua a fare photobomb al rivelatore da ogni possibile fessura.
        #JNSQscience_bd_UVscope_SunInSpaceLow_01 = Anche con diaframmi aggressivi e tempi di esposizione molto brevi, riesci comunque a estrarre caratteristiche di righe UV da stelle calde e giovani ben oltre il sistema.
        #JNSQscience_bd_UVscope_SunInSpaceHigh_00 = Con il sole finalmente ben di lato, fai un'esposizione UV di spazio profondo assurda per quanto è lunga. Il buio non è vuoto, è solo timido.
        #JNSQscience_bd_UVscope_SunInSpaceHigh_01 = Dallo spazio interplanetario, il cielo UV diventa finalmente abbastanza quieto da sommare lunghe esposizioni e mappare deboli strutture del fondo ultravioletto.
        #JNSQscience_bd_UVscope_SunInSpaceHigh_02 = Lo spettro di una stella fredda mostra un rigonfiamento UV in più e righe nette: probabilmente le orbita attorno qualcosa di caldo e compatto.
        #JNSQscience_bd_UVscope_MohoInSpaceLow_00 = Usi Moho come comodo schermo contro l'abbagliamento e raccogli spettri UV durante l'eclissi: il gas interstellare lascia sottili intagli di assorbimento rivelatori.
        #JNSQscience_bd_UVscope_MohoInSpaceLow_01 = Anche puntando lontano da Kerbol, il fondo UV qui è feroce: le note di calibrazione includono la frase "tutto è croccante".
        #JNSQscience_bd_UVscope_MohoInSpaceHigh_00 = Integrazioni lunghe rivelano un'estinzione UV a chiazze su un lontano campo stellare, suggerendo sottili nubi di materiale tra qui e là.
        #JNSQscience_bd_UVscope_MohoInSpaceHigh_01 = Il telescopio risolve strutture nell'ultravioletto nelle regioni luminose di una galassia lontana, suggerendo popolazioni stellari molto calde e molto giovani.
        #JNSQscience_bd_UVscope_MohoInSpaceHigh_02 = Usi l'orbita di Moho come piattaforma stabile per l'astronomia UV. Le immagini tornano nitide e leggermente tostate.
        #JNSQscience_bd_UVscope_EveInSpaceLow_00 = Le nubi luminose di Eve diffondono abbastanza UV parassita da far sembrare il cielo "latteo": compensi e recuperi comunque forti righe di emissione da una remota macchia nebulare.
        #JNSQscience_bd_UVscope_EveInSpaceLow_01 = Lo spettro UV di una stella bersaglio viene a tratti smussato durante un'occultazione: qualcuno nel team scientifico inizia a urlare di profili di densità e temperatura.
        #JNSQscience_bd_UVscope_EveInSpaceHigh_00 = Dall'orbita alta, lunghi passaggi sul lato notturno ti permettono di osservare galassie lontane in UV e segnalare nuclei stranamente caldi per un seguito.
        #JNSQscience_bd_UVscope_EveInSpaceHigh_01 = Lo spettro di una stella dall'aria tranquilla mostra un sospetto eccesso nel lontano UV: un compagno caldo nascosto è la spiegazione migliore, e più drammatica.
        #JNSQscience_bd_UVscope_GillyInSpaceLow_00 = La bassa gravità rende facile un delicato mantenimento di posizione: sommi esposizioni finché sottili filamenti UV di materiale interstellare emergono dal rumore.
        #JNSQscience_bd_UVscope_GillyInSpaceLow_01 = Usando l'ombra di Eve come fotocamera oscura, misuri nitidi rapporti tra righe ultraviolette che fissano la temperatura del gas senza nemmeno fingere che sia "solo una bella immagine".
        #JNSQscience_bd_UVscope_GillyInSpaceHigh_00 = Lontano dall'abbagliamento locale, il telescopio UV costruisce un atlante a grande campo di stelle calde e della sottile roba tra loro, un'orbita lenta alla volta.
        #JNSQscience_bd_UVscope_GillyInSpaceHigh_01 = Lo spettro di una stella fredda continua a sfarfallare nell'ultravioletto: i dati tornano meglio se un piccolo compagno molto caldo le gira attorno a tutta velocità.
        #JNSQscience_bd_UVscope_GillyInSpaceHigh_02 = Dall'orbita alta sopra Gilly, smetti di far finta che sia una cosa su Gilly e inizi una scansione UV di cielo profondo. La roccetta è un ottimo treppiede.
        #JNSQscience_bd_UVscope_GillyInSpaceHigh_03 = L'imaging UV a lunga esposizione cattura deboli striature di polvere alla deriva e un sacco di pixel caldi del tuo stesso equipaggiamento. Lo spazio è rumoroso quando non puoi sbattere le palpebre.
        #JNSQscience_bd_UVscope_MunInSpaceLow_00 = Provi una lunga esposizione UV, ma Mun continua a flareggiare nei diaframmi come una torcia pallida con atteggiamento.
        #JNSQscience_bd_UVscope_MunInSpaceLow_01 = Brevi spettri UV di una stella calda mostrano nitidi intagli di assorbimento: c'è roba sottile tra qui e là, anche se è quasi tutto "niente".
        #JNSQscience_bd_UVscope_MunInSpaceHigh_00 = Più lontano, l'abbagliamento di Kerbin svanisce e il telescopio UV finalmente si comporta come un osservatorio invece che come un rilevatore di fumo.
        #JNSQscience_bd_UVscope_MunInSpaceHigh_01 = Una stella dall'aria tranquilla mostra un inatteso eccesso nell'ultravioletto: i dati sussurrano "compagno caldo nascosto" e urlano "scrivi un paper".
        #JNSQscience_bd_UVscope_MunInSpaceHigh_02 = Dall'orbita alta sul Mun, usi la palla grigia come parasole e lasci che il telescopio UV fissi verso l'esterno. Il cielo "vuoto" torna pieno di deboli strutture.
        #JNSQscience_bd_UVscope_MinmusInSpaceLow_00 = Minmus sembra debolmente verde sotto di te: il telescopio UV rifiuta cortesemente di commentare e restituisce comunque uno spettro pulito.
        #JNSQscience_bd_UVscope_MinmusInSpaceLow_01 = Durante una lunga fase di crociera, sommi fotogrammi UV finché compaiono sottili filamenti, strutture delicate visibili solo nelle bande energetiche.
        #JNSQscience_bd_UVscope_MinmusInSpaceHigh_00 = Con meno luce parassita, esegui un ampio survey UV di stelle calde e del sottile materiale tra loro.
        #JNSQscience_bd_UVscope_MinmusInSpaceHigh_01 = Le regioni UV luminose di una galassia lontana risaltano come saldature fresche, suggerendo popolazioni stellari molto giovani e molto calde.
        #JNSQscience_bd_UVscope_MinmusInSpaceHigh_02 = In orbita alta sopra Minmus, fai lunghe esposizioni UV mentre la luna scorre pigra sotto. Le stelle tornano violacee e stranamente affollate.
        #JNSQscience_bd_UVscope_DunaInSpaceLow_00 = Le tinte calde di Duna non aiutano il fondo UV, ma il telescopio riesce comunque a estrarre righe di emissione da una lontana regione energetica.
        #JNSQscience_bd_UVscope_DunaInSpaceLow_01 = Le righe UV di una stella bersaglio oscillano e si intensificano con un motivo che suggerisce fortemente che non sia sola.
        #JNSQscience_bd_UVscope_DunaInSpaceHigh_00 = Lunghi passaggi sul lato notturno ti permettono di costruire un vero campo profondo ultravioletto, lontano dal peggio dell'abbagliamento locale.
        #JNSQscience_bd_UVscope_DunaInSpaceHigh_01 = I rapporti tra righe ultraviolette fissano temperatura e densità del gas con una precisione tale che sembra barare.
        #JNSQscience_bd_UVscope_IkeInSpaceLow_00 = Ike sotto di te sembra sospettosamente familiare: passi un'intera orbita a chiederti se l'universo stia riciclando asset.
        #JNSQscience_bd_UVscope_IkeInSpaceLow_01 = Catturi uno spettro UV pulito durante un'occultazione: le forme delle righe sembrano un manuale che finalmente ti vuole bene.
        #JNSQscience_bd_UVscope_IkeInSpaceHigh_00 = Lontano dalla luce di Duna, il cielo UV si fa più scuro e i tuoi "oggetti lontani" smettono di essere "macchie lontane".
        #JNSQscience_bd_UVscope_IkeInSpaceHigh_01 = Lo spettro di una stella fredda contiene un ostinato rigonfiamento nel lontano UV: la spiegazione più semplice è un piccolo compagno molto caldo.
        #JNSQscience_bd_UVscope_IkeInSpaceHigh_02 = Dall'orbita alta, usi Ike come piattaforma stabile per l'astronomia UV.
        #JNSQscience_bd_UVscope_EdnaInSpaceLow_00 = Edna è fioca, rotonda e meravigliosamente inutile come fonte di luce, perfetta per l'astronomia nell'ultravioletto.
        #JNSQscience_bd_UVscope_EdnaInSpaceLow_01 = Cronometri una stella lontana mentre scivola dietro Edna e poi riemerge: il calo in UV è così netto da far esultare gli appassionati di occultazioni.
        #JNSQscience_bd_UVscope_EdnaInSpaceHigh_00 = Nella quiete sopra Edna, il telescopio UV mappa deboli strutture di fondo con integrazioni lunghe e pazienti.
        #JNSQscience_bd_UVscope_EdnaInSpaceHigh_01 = Sottili righe di assorbimento punteggiano lo spettro di un bersaglio luminoso, delineando materiale interstellare che non puoi vedere in nessun altro modo.
        #JNSQscience_bd_UVscope_EdnaInSpaceHigh_02 = Con Edna come comodo schermo contro la luce, il telescopio scandaglia la cintura in ultravioletto. Minuscoli puntini lampeggiano e svaniscono come particelle nervose.
        #JNSQscience_bd_UVscope_DakInSpaceLow_00 = La silhouette a patata di Dak è un ottimo schermo contro l'abbagliamento: ti ci nascondi dietro e fai finta che fosse il piano fin dall'inizio.
        #JNSQscience_bd_UVscope_DakInSpaceLow_01 = Il telescopio UV rileva caratteristiche energetiche da una sorgente lontana e chiede subito "più tempo" nel modo più esigente possibile.
        #JNSQscience_bd_UVscope_DakInSpaceHigh_00 = Con intorno solo cielo nero e freddo, anche le strutture UV più deboli iniziano a separarsi dal rumore.
        #JNSQscience_bd_UVscope_DakInSpaceHigh_01 = Una stella che sembra normale in luce visibile diventa drammatica in UV, forte indizio di un compagno caldo in orbita ravvicinata.
        #JNSQscience_bd_UVscope_DresInSpaceLow_00 = Dres offre uno sfondo scuro nella cintura di asteroidi: il telescopio UV finalmente può fare astronomia invece di contenere i danni.
        #JNSQscience_bd_UVscope_DresInSpaceLow_01 = Raccogli spettri di righe ultraviolette da più bersagli e ricavi temperature che sembrano assurde, ma restano ostinatamente coerenti.
        #JNSQscience_bd_UVscope_DresInSpaceHigh_00 = In orbita alta sopra la solitaria Dres, ricuci un atlante UV di stelle calde e del sottile mezzo tra loro.
        #JNSQscience_bd_UVscope_DresInSpaceHigh_01 = Il profilo UV di una galassia lontana suggerisce un'evoluzione rapida: regioni giovani e luminose ora, resti più quieti dopo, il tempo scritto nelle lunghezze d'onda.
        #JNSQscience_bd_UVscope_DresInSpaceHigh_02 = In orbita alta sopra Dres, usi il pianeta nano come piattaforma stabile per l'astronomia UV. Il cielo torna affollato, tenue e pieno di cose che nessuno aveva messo a budget.
        #JNSQscience_bd_UVscope_DresInSpaceHigh_03 = Esegui un survey UV mentre Dres eclissa lentamente il campo stellare. I dati sono abbastanza puliti da farti sospettare cosa ti sia perso l'ultima volta.
        #JNSQscience_bd_UVscope_JoolInSpaceLow_00 = Il telescopio UV continua a provare a riprendere bersagli lontani, ma la foschia superiore luminosa di Jool e il costante tremolio delle aurore continuano a infilarsi nei fotogrammi.
        #JNSQscience_bd_UVscope_JoolInSpaceLow_01 = Tra colpi di radiazione e abbagliamento, riesci comunque a tirare fuori netti intagli di assorbimento UV che mappano il sottile materiale interstellare lungo la linea di vista.
        #JNSQscience_bd_UVscope_JoolInSpaceHigh_00 = Molto sopra il bagliore di Jool, le lunghe esposizioni UV finalmente si comportano: deboli strutture di fondo iniziano a comparire dove prima c'era solo rumore.
        #JNSQscience_bd_UVscope_JoolInSpaceHigh_01 = Una stella dall'aria tranquilla mostra un inatteso rigonfiamento nel lontano UV, forte indizio di un compagno caldo nascosto accanto a una primaria più fredda.
        #JNSQscience_bd_UVscope_LaytheInSpaceLow_00 = Le nubi luminose e i bagliori oceanici di Laythe fanno imbronciare il telescopio UV, ma ottiene uno spettro utilizzabile quando punti lontano dall'abbagliamento.
        #JNSQscience_bd_UVscope_LaytheInSpaceLow_01 = I rapporti tra righe ultraviolette di una sorgente di emissione lontana fissano temperatura e densità del gas con una sicurezza inquietante.
        #JNSQscience_bd_UVscope_LaytheInSpaceHigh_00 = Dall'orbita alta, esegui un survey UV di galassie lontane: le regioni più luminose sembrano violentemente giovani ed energetiche.
        #JNSQscience_bd_UVscope_LaytheInSpaceHigh_01 = La firma UV di un bersaglio cresce e cala periodicamente, coerente con l'idea di un piccolo compagno molto caldo in un'orbita stretta.
        #JNSQscience_bd_UVscope_VallInSpaceLow_00 = Vall è un perfetto schermo scuro: scatti immagini UV durante un'occultazione e guardi la luce stellare di fondo venire "filtrata" dal nulla più totale.
        #JNSQscience_bd_UVscope_VallInSpaceLow_01 = Lo spettro restituisce caratteristiche di assorbimento sottilissime come rasoi, materiale interstellare così raro da essere quasi una diceria, ma il telescopio l'ha sentita.
        #JNSQscience_bd_UVscope_VallInSpaceHigh_00 = In alto sopra Vall, il cielo diventa davvero nero e il telescopio UV comincia a risolvere deboli filamenti tra stelle lontane.
        #JNSQscience_bd_UVscope_VallInSpaceHigh_01 = Il profilo UV di una galassia lontana suggerisce raffiche di stelle calde e di breve vita, evoluzione scritta in lunghezze d'onda energetiche.
        #JNSQscience_bd_UVscope_VallInSpaceHigh_02 = In orbita alta sopra Vall, usi la luna come schermo scuro e fissi verso l'esterno in UV. Il campo stellare torna affollato di macchie tenui e nervose.
        #JNSQscience_bd_UVscope_TyloInSpaceLow_00 = Il grande disco luminoso di Tylo è eccellente per bloccare la luce parassita: i tuoi dati UV migliori arrivano nascondendoti dietro di lui come uno scienziato codardo.
        #JNSQscience_bd_UVscope_TyloInSpaceLow_01 = Catturi uno spettro UV pulito a metà occultazione e le forme delle righe vincolano con precisione temperatura e densità lungo il percorso.
        #JNSQscience_bd_UVscope_TyloInSpaceHigh_00 = Lontano dalla luce riflessa di Tylo, sommi fotogrammi UV finché lo sfondo smette di sembrare vuoto e comincia a sembrare strutturato.
        #JNSQscience_bd_UVscope_TyloInSpaceHigh_01 = Lo spettro di una stella fredda si rifiuta di restare freddo in UV: l'energia extra indica un compagno caldo che fa del suo meglio per restare invisibile.
        #JNSQscience_bd_UVscope_TyloInSpaceHigh_02 = Dall'orbita alta, Tylo diventa una piattaforma stabile per l'astronomia UV. I dati sono puliti, la luna è massiccia e improvvisamente apprezzi le cose stabili.
        #JNSQscience_bd_UVscope_BopInSpaceLow_00 = L'orizzonte bitorzoluto di Bop oscilla nel campo visivo: diventa un diaframma sorprendentemente efficace per lunghe esposizioni UV profonde.
        #JNSQscience_bd_UVscope_BopInSpaceLow_01 = Il telescopio UV trova righe di emissione da una lontana regione energetica e chiede subito più tempo di integrazione, come al solito.
        #JNSQscience_bd_UVscope_BopInSpaceHigh_00 = Dall'orbita alta sopra Bop, costruisci un tranquillo atlante UV di stelle calde e della sottile roba tra loro.
        #JNSQscience_bd_UVscope_BopInSpaceHigh_01 = Un lieve affievolimento UV su un campo stellare suggerisce nubi interstellari a chiazze, minuscole ombre fredde in una banda molto calda.
        #JNSQscience_bd_UVscope_BopInSpaceHigh_02 = In orbita alta sopra Bop, fai lunghe esposizioni UV mentre la luna rotola sotto. Il risultato è in parte survey, in parte arte moderna accidentale.
        #JNSQscience_bd_UVscope_PolInSpaceLow_00 = La forma bizzarra di Pol continua a mandare in crisi la tua soluzione di tracciamento, ma il telescopio UV riesce comunque a ottenere uno spettro nitido quando finalmente si calma.
        #JNSQscience_bd_UVscope_PolInSpaceLow_01 = Una stella bersaglio mostra un periodico aumento di luminosità in UV: la storia più semplice è "sistema binario", e i dati continuano a ripeterla.
        #JNSQscience_bd_UVscope_PolInSpaceHigh_00 = In orbita alta sopra Pol, il cielo UV è abbastanza calmo da inseguire le caratteristiche più deboli senza che i riflessi locali rovinino tutto.
        #JNSQscience_bd_UVscope_PolInSpaceHigh_01 = Identifichi una sorgente compatta e calda nascosta accanto a una stella più fredda solo dall'eccesso ultravioletto: il team della luce visibile sembra offeso.
        #JNSQscience_bd_UVscope_PolInSpaceHigh_02 = Dall'orbita alta sopra Pol, fissi verso l'esterno in ultravioletto e ottieni un cielo pieno di deboli strutture. A quanto pare oggi lo spazio profondo non ha ancora finito di essere strano.
        #JNSQscience_bd_UVscope_LindorInSpaceLow_00 = Il pallido bagliore di Lindor continua a infiltrarsi nell'ottica: il telescopio UV insiste che sta facendo astronomia "nonostante il gigante".
        #JNSQscience_bd_UVscope_LindorInSpaceLow_01 = Riesci comunque a estrarre netti intagli di assorbimento UV da una stella calda, tratteggiando il sottile mezzo interstellare come segni di matita su carta nera.
        #JNSQscience_bd_UVscope_LindorInSpaceHigh_00 = Molto sopra Lindor, lo sfondo resta finalmente scuro abbastanza a lungo perché le somma di esposizioni UV profonde funzionino davvero.
        #JNSQscience_bd_UVscope_LindorInSpaceHigh_01 = Una stella dall'aria fredda mostra un ostinato eccesso nel lontano UV: la spiegazione migliore è un compagno caldo nascosto che sta facendo di tutto per farsi notare.
        #JNSQscience_bd_UVscope_KrelInSpaceLow_00 = L'orbita ravvicinata di Krel rende Lindor un problema costante di abbagliamento: impari il vero significato di "diaframmatura".
        #JNSQscience_bd_UVscope_KrelInSpaceLow_01 = Tra i picchi di luce parassita, i rapporti tra righe ultraviolette di una sorgente lontana fissano temperatura e densità del gas con una precisione sfrontata.
        #JNSQscience_bd_UVscope_KrelInSpaceHigh_00 = Più in alto, Krel diventa un comodo piccolo schermo e il telescopio UV smette di lamentarsi per quasi un intero minuto.
        #JNSQscience_bd_UVscope_KrelInSpaceHigh_01 = I nodi UV luminosi di una galassia lontana risaltano nettamente, suggerendo stelle di breve vita e molto calde che guidano la sua evoluzione recente.
        #JNSQscience_bd_UVscope_AdenInSpaceLow_00 = Il disco bruno di Aden fluttua nel campo come una macchia sulla lente: per fortuna, la macchia è prevedibile.
        #JNSQscience_bd_UVscope_AdenInSpaceLow_01 = Catturi nitide caratteristiche di assorbimento UV che mappano il materiale rarefatto tra te e il bersaglio, dimostrando che lo "spazio vuoto" non è mai davvero vuoto.
        #JNSQscience_bd_UVscope_AdenInSpaceHigh_00 = Da un'orbita più alta, il telescopio UV si assesta in un survey paziente di stelle calde e di deboli strutture di fondo.
        #JNSQscience_bd_UVscope_AdenInSpaceHigh_01 = Una stella che sembra tranquilla in luce visibile diventa drammatica in UV: lo spettro suggerisce con forza un compagno compatto e caldo in orbita.
        #JNSQscience_bd_UVscope_HuygenInSpaceLow_00 = La foschia ambrata di Huygen getta un debole bagliore ultravioletto nell'ottica, come se qualcuno avesse lasciato una lucina notturna accesa nell'osservatorio.
        #JNSQscience_bd_UVscope_HuygenInSpaceLow_01 = Cronometri una lunga esposizione durante l'occultazione ed estrai comunque righe UV pulite, trasformando "abbagliamento" in "dati" a forza di ostinazione.
        #JNSQscience_bd_UVscope_HuygenInSpaceHigh_00 = Sopra il peggio della luce diffusa, il cielo UV diventa utilizzabile e i bersagli smettono di sembrare statico.
        #JNSQscience_bd_UVscope_HuygenInSpaceHigh_01 = Lo spettro ultravioletto di un oggetto lontano mostra forti caratteristiche ad alta energia che indicano stelle molto calde e molto giovani dominare la luce.
        #JNSQscience_bd_UVscope_RigaInSpaceLow_00 = Le dimensioni di Riga lo rendono eccellente per bloccare la luce parassita: ti nascondi dietro e lo chiami "strategia osservativa".
        #JNSQscience_bd_UVscope_RigaInSpaceLow_01 = Caratteristiche UV di emissione e assorbimento si allineano in una storia ordinata: composizione, densità e temperatura, etichettate con precisione dalla fisica stessa.
        #JNSQscience_bd_UVscope_RigaInSpaceHigh_00 = In orbita più alta, costruisci un atlante UV di galassie lontane e segni regioni sospettosamente luminose per discussioni future.
        #JNSQscience_bd_UVscope_RigaInSpaceHigh_01 = Un aumento periodico della luminosità UV in un sistema bersaglio torna meglio con un compagno caldo che sfreccia attorno a una stella più fredda, come se si stesse mettendo in mostra.
        #JNSQscience_bd_UVscope_TalosInSpaceLow_00 = Talos offre pochissima luce riflessa e ancora meno dramma: il telescopio UV è entusiasta della mancanza di "caratteristiche".
        #JNSQscience_bd_UVscope_TalosInSpaceLow_01 = Lunghe integrazioni rivelano deboli filamenti ultravioletti tra le stelle, sottili strutture nel mezzo interstellare che la luce visibile appena suggerisce.
        #JNSQscience_bd_UVscope_TalosInSpaceHigh_00 = In orbita alta sopra Talos, lo sfondo resta scuro e stabile, permettendo al telescopio UV di inseguire i segnali più deboli senza interferenze locali.
        #JNSQscience_bd_UVscope_TalosInSpaceHigh_01 = Lo spettro di una stella fredda si rifiuta di restare freddo nell'ultravioletto: l'UV extra punta dritto a un compagno caldo nascosto e a una conversazione imbarazzante.
        #JNSQscience_bd_UVscope_EelooInSpaceLow_00 = Eeloo trasforma il cielo in una fotocamera oscura da congelatore: deboli intagli di assorbimento UV tratteggiano il sottile mezzo interstellare davanti al tuo bersaglio.
        #JNSQscience_bd_UVscope_EelooInSpaceLow_01 = Il telescopio UV somma esposizioni finché lo spazio "vuoto" sviluppa struttura, filamenti ultravioletti evanescenti tra stelle lontane.
        #JNSQscience_bd_UVscope_EelooInSpaceHigh_00 = Molto sopra Eeloo, il fondo UV è abbastanza calmo da fare un vero campo profondo e distinguere nodi UV luminosi in galassie lontane.
        #JNSQscience_bd_UVscope_EelooInSpaceHigh_01 = Lo spettro di una stella fredda mostra un ostinato eccesso nel lontano UV: i numeri favoriscono nettamente un compagno caldo nascosto.
        #JNSQscience_bd_UVscope_EelooInSpaceHigh_02 = Usi Eeloo come comodo schermo contro la luce e fissi nello spazio profondo. I risultati sono nitidi, quieti e leggermente inquietanti.
        #JNSQscience_bd_UVscope_CelesInSpaceLow_00 = Nascondi il telescopio dietro Celes per evitare l'abbagliamento e ricavi rapporti tra righe UV puliti che inchiodano temperatura e densità lungo la linea di vista.
        #JNSQscience_bd_UVscope_CelesInSpaceLow_01 = Celes dimostra che essere "quasi un pianeta nano" basta comunque per essere un eccellente diaframma per l'astronomia nell'ultravioletto.
        #JNSQscience_bd_UVscope_CelesInSpaceHigh_00 = Dall'orbita alta, lunghe integrazioni rivelano un affievolimento UV a chiazze su un campo stellare, sottili nubi di materiale che non noteresti mai in luce visibile.
        #JNSQscience_bd_UVscope_CelesInSpaceHigh_01 = Il profilo UV di una galassia lontana suggerisce raffiche di stelle molto calde e di breve vita che guidano la sua evoluzione recente.
        #JNSQscience_bd_UVscope_CelesInSpaceHigh_02 = Dall'orbita alta, Celes diventa una piccola piattaforma stabile per l'astronomia UV. Le stelle tornano abbastanza nitide da farti diffidare dei tuoi vecchi dati.
        #JNSQscience_bd_UVscope_TamInSpaceLow_00 = La silhouette bitorzoluta di Tam fluttua nel campo e per sbaglio diventa il miglior schermo contro la luce parassita che tu abbia mai avuto.
        #JNSQscience_bd_UVscope_TamInSpaceLow_01 = Raccogli uno spettro UV nitido e guardi strette caratteristiche di assorbimento allinearsi come "intagli" nella cintura dell'universo.
        #JNSQscience_bd_UVscope_TamInSpaceHigh_00 = In orbita alta sopra Tam, il telescopio UV finalmente si comporta e risolve deboli strutture di fondo nell'ultravioletto dopo abbastanza pazienti accumuli.
        #JNSQscience_bd_UVscope_TamInSpaceHigh_01 = La luminosità UV di un sistema bersaglio pulsa periodicamente: la spiegazione più semplice è un compagno caldo in orbita attorno a una stella più fredda.
        #JNSQscience_bd_UVscope_TamInSpaceHigh_02 = Fai lunghe esposizioni UV mentre Tam fluttua sotto come un sassolino indisciplinato. Le immagini sono metà scienza, metà arte accidentale.
        #JNSQscience_bd_UVscope_HamekInSpaceLow_00 = La colorazione bizzarra di Hamek fa litigare le camere nel visibile, ma il telescopio UV restituisce in silenzio ottimi spettri di righe.
        #JNSQscience_bd_UVscope_HamekInSpaceLow_01 = Caratteristiche di emissione nell'ultravioletto da una lontana regione energetica ti permettono di ricavare composizione e densità senza nemmeno toccare l'oggetto.
        #JNSQscience_bd_UVscope_HamekInSpaceHigh_00 = Dall'orbita alta, osservi regioni UV luminose in galassie lontane e segnali nuclei sospettosamente caldi per un seguito.
        #JNSQscience_bd_UVscope_HamekInSpaceHigh_01 = Il telescopio UV trova forti firme ad alta energia dove la luce visibile sembra calma, stelle giovani e calde che lasciano impronte inconfondibili.
        #JNSQscience_bd_UVscope_HamekInSpaceHigh_02 = In orbita alta sopra Hamek, il cielo UV resta scuro e pulito. Condizioni perfette per fissare il vuoto finché non ricambia lo sguardo.
        #JNSQscience_bd_UVscope_NaraInSpaceLow_00 = La presenza di Nara viene accusata di "rimescolare le cose", quindi punti il telescopio UV verso l'esterno per cercare compagni caldi in sistemi lontani.
        #JNSQscience_bd_UVscope_NaraInSpaceLow_01 = Rapporti tra righe ultraviolette puliti trasformano un bersaglio tenue in un foglio di calcolo di temperature, densità e scienziati molto sicuri di sé.
        #JNSQscience_bd_UVscope_NaraInSpaceHigh_00 = Dall'orbita alta, costruisci un ampio atlante UV e individui regioni che suggeriscono rapide nascite stellari e un burnout altrettanto rapido.
        #JNSQscience_bd_UVscope_NaraInSpaceHigh_01 = Una stella fredda si rifiuta di restare fredda in UV: l'eccesso di luce torna meglio con un compagno compatto e caldo in orbita ravvicinata.
        #JNSQscience_bd_UVscope_AmosInSpaceLow_00 = Amos condivide le ombre di Nara: il telescopio UV apprezza il buio e tira fuori dal fondo righe di assorbimento sottili come rasoi.
        #JNSQscience_bd_UVscope_AmosInSpaceLow_01 = Cogli un'occultazione e il calo in UV è così netto che sembra che l'universo ti stia girando le pagine.
        #JNSQscience_bd_UVscope_AmosInSpaceHigh_00 = In orbita alta sopra Amos, le lunghe esposizioni rivelano deboli filamenti UV tra le stelle, struttura nel "niente" che non è affatto niente.
        #JNSQscience_bd_UVscope_AmosInSpaceHigh_01 = La firma ultravioletta di un bersaglio sfarfalla con un motivo ripetuto: la storia migliore è un compagno caldo che fa giri attorno a una primaria più fredda.
        #JNSQscience_bd_UVscope_AmosInSpaceHigh_02 = Con Amos come piccolo disco occultante, esegui una scansione UV del campo stellare. Lo sfondo torna affollato di macchie tenui.
        #JNSQscience_bd_UVscope_EnonInSpaceLow_00 = Enon sembra "un'altra luna di ghiaccio" finché il telescopio UV non mostra quanto materiale interstellare ci sia tra te e il bersaglio.
        #JNSQscience_bd_UVscope_EnonInSpaceLow_01 = Le righe ultraviolette di una sorgente lontana si bloccano in rapporti che inchiodano la temperatura del gas con una precisione tale da sembrare sleale.
        #JNSQscience_bd_UVscope_EnonInSpaceHigh_00 = Dall'orbita alta, tracci chiazze di formazione stellare UV luminose in galassie lontane e osservi l'evoluzione in lunghezze d'onda energetiche.
        #JNSQscience_bd_UVscope_EnonInSpaceHigh_01 = Una stella tranquilla nel visibile mostra un forte rigonfiamento nel lontano UV: i dati puntano dritti a un compagno caldo invisibile.
        #JNSQscience_bd_UVscope_EnonInSpaceHigh_02 = Usi Enon come piattaforma stabile per l'astronomia nell'ultravioletto. Le stelle tornano abbastanza nitide da far arrossire i dati più vecchi.
        #JNSQscience_bd_UVscope_PraxInSpaceLow_00 = Prax è un mondo di confine con illuminazione di confine, cioè quasi nulla, quindi il telescopio UV finalmente può fare il suo lavoro come si deve.
        #JNSQscience_bd_UVscope_PraxInSpaceLow_01 = Sommi fotogrammi UV finché compaiono deboli strutture di fondo, rivelando sottili ombreggiature ultraviolette dovute a materiale rarefatto lungo il percorso.
        #JNSQscience_bd_UVscope_PraxInSpaceHigh_00 = In orbita alta sopra Prax, il cielo resta abbastanza stabile per survey UV profondi di stelle calde e del sottile mezzo tra loro.
        #JNSQscience_bd_UVscope_PraxInSpaceHigh_01 = Un aumento periodico della luminosità UV in un sistema bersaglio coincide con la firma di un compagno caldo in orbita attorno a una stella più fredda, che lo ammetta o no.
        #JNSQscience_bd_UVscope_PraxInSpaceHigh_02 = In orbita alta sopra Prax, fissi verso l'esterno in UV e ottieni un cielo pieno di deboli strutture. A quanto pare lo spazio profondo non ha ancora finito di essere complicato.
        #JNSQscience_bd_UVscope_PraxInSpaceHigh_03 = Prax fluttua in basso come una briciola lontana mentre lo spettrometro UV accumula lunghe esposizioni. Il rumore di fondo cala e l'universo diventa più rumoroso.

        // bd_UVspec
        #JNSQscience_bd_UVspec_SunInSpaceLow_00 = Il sensore UV va subito in saturazione, quindi sovrapponi i filtri finché il sole non sembra quasi educato. I dettagli rimasti sono tutt'altro.
        #JNSQscience_bd_UVspec_SunInSpaceLow_01 = Nell'ultravioletto, il sole è tutto spigoli netti e cicatrici luminose. Il Controllo Missione chiede se puoi, per favore, non farlo arrabbiare.
        #JNSQscience_bd_UVspec_SunInSpaceLowNorthPolarZone_00 = Lo spettro UV sopra la zona polare settentrionale è duro e appuntito, con archi luminosi che vanno e vengono tra una lettura e l'altra.
        #JNSQscience_bd_UVspec_SunInSpaceLowNorthSubpolarZone_00 = Sottili increspature UV suggeriscono strati turbolenti qui: lo strumento continua a cercare di "fare una media" del sole.
        #JNSQscience_bd_UVspec_SunInSpaceLowNorthTemperateZone_00 = Le righe UV si allargano leggermente, come se la luce venisse spalmata da plasma caldo e irrequieto.
        #JNSQscience_bd_UVspec_SunInSpaceLowNorthTropicZone_00 = Alcuni picchi di emissione impennano, poi svaniscono, come se qualcuno stesse azionando un interruttore cosmico.
        #JNSQscience_bd_UVspec_SunInSpaceLowEquatorialZone_00 = La zona equatoriale è uno spettacolo pirotecnico ai raggi UV: lo spettrometro registra diversi eventi "per favore, basta".
        #JNSQscience_bd_UVspec_SunInSpaceLowSouthTropicZone_00 = L'intensità UV sale e scende in lenti impulsi: è come ascoltare una stella che respira.
        #JNSQscience_bd_UVspec_SunInSpaceLowSouthTemperateZone_00 = Qui lo spettro sembra più pulito, ma è ancora troppo luminoso per qualsiasi polizza di garanzia sensata.
        #JNSQscience_bd_UVspec_SunInSpaceLowSouthSubpolarZone_00 = Le firme UV si spalmiano in una foschia luminosa: a questa distanza persino le ombre sembrano brillare.
        #JNSQscience_bd_UVspec_SunInSpaceLowSouthPolarZone_00 = La zona polare meridionale rimanda indietro picchi UV taglienti: i dati sembrano voler bucare la carta.
        #JNSQscience_bd_UVspec_SunInSpaceHigh_00 = La fotocamera rileva un tenue bagliore ultravioletto attraverso lo spazio interplanetario. Inizi a etichettare le chiazze come decisamente non commestibili.
        #JNSQscience_bd_UVspec_MohoInSpaceLow_00 = Le immagini ultraviolette mostrano la superficie di Moho come un mosaico di luminosità bruciata e oscurità ostinata. Persino le ombre sembrano stanche.
        #JNSQscience_bd_UVspec_MohoInSpaceLow_01 = Provi a individuare deboli riflessi UV nelle ombre più profonde dei crateri. I dati suggeriscono qualcosa di riflettente che si nasconde dal calore.
        #JNSQscience_bd_UVspec_MohoInSpaceLowPoles_00 = I riflessi UV vicino ai poli suggeriscono qualcosa di brillante nascosto nell'ombra perenne: di certo non è un'atmosfera.
        #JNSQscience_bd_UVspec_MohoInSpaceLowLowlands_00 = I bassopiani restituiscono uno spettro piatto e scuro ai raggi UV, come polvere cotta dal calore che ha rinunciato a essere interessante.
        #JNSQscience_bd_UVspec_MohoInSpaceLowPolarIceCraters_00 = I crateri polari ghiacciati mostrano un bordo nitido e brillante ai raggi UV, trappole fredde che nascondono depositi riflettenti nel buio.
        #JNSQscience_bd_UVspec_MohoInSpaceLowHighlands_00 = Le colline scintillano debolmente ai raggi UV, suggerendo materiale più fresco e meno "cotto" esposto sui pendii.
        #JNSQscience_bd_UVspec_MohoInSpaceLowMidlands_00 = Le letture sulle pianure sono stabili e spente: solo regolite, abbaglio e la quieta certezza dell'assenza d'aria.
        #JNSQscience_bd_UVspec_MohoInSpaceLowCraters_00 = Le pareti dei crateri mostrano una lucentezza UV a chiazze, come se il vetro da fusione d'impatto fosse ancora fiero di sé.
        #JNSQscience_bd_UVspec_MohoInSpaceLowExoticCraters_00 = I crateri esotici emettono strane bande di fluorescenza UV: le rocce sembrano risplendere di rimando, giusto per complicare le cose.
        #JNSQscience_bd_UVspec_MohoInSpaceLowRareCraters_00 = I crateri rari mostrano contrasti UV insolitamente netti, come se il loro ejecta fosse stato selezionato e sparso apposta.
        #JNSQscience_bd_UVspec_MohoInSpaceLowVoronoiCraters_00 = I campi geometrici di crateri di Voronoi formano un ordinato mosaico UV: lo spettrometro apprezza la simmetria.
        #JNSQscience_bd_UVspec_MohoInSpaceLowNotableCraters_00 = I crateri notevoli si delineano ai raggi UV con bordi luminosi e fondi più scuri, i segni di annotazione della natura.
        #JNSQscience_bd_UVspec_MohoInSpaceLowPeaks_00 = I picchi lampeggiano più brillanti ai raggi UV dove la polvere non riesce ad attaccarsi, lasciando esposta al sole la crosta nuda e riflettente.
        #JNSQscience_bd_UVspec_MohoInSpaceHigh_00 = Da alta quota sopra Moho, la fotocamera coglie una sottile foschia spettrale attorno al pianeta quando è in controluce. Tutti fingono di averlo previsto.
        #JNSQscience_bd_UVspec_EveInSpaceLow_00 = Le sommità delle nubi più alte divampano nell'ultravioletto, rivelando bande e vortici che non corrispondono a nulla di ciò che vedono le camere nel visibile. Eve custodisce segreti in piena vista.
        #JNSQscience_bd_UVspec_EveInSpaceLow_01 = Scure macchie UV fluttuano nello strato di nubi come inchiostro nell'acqua. I meteorologi iniziano a litigare immediatamente.
        #JNSQscience_bd_UVspec_EveInSpaceLowPoles_00 = Le scansioni UV mostrano strani "buchi" scuri nelle sommità delle nubi polari, come se laggiù qualcosa stesse bevendo la luce.
        #JNSQscience_bd_UVspec_EveInSpaceLowLowlands_00 = Un'ampia banda di assorbimento UV si ispessisce sopra i bassopiani: la foschia sta facendo gran parte della scienza al posto tuo.
        #JNSQscience_bd_UVspec_EveInSpaceLowMidlands_00 = Lo spettro sopra le pianure appare uniforme e implacabile: le nubi di Eve sono coerenti, se non altro.
        #JNSQscience_bd_UVspec_EveInSpaceLowHighlands_00 = Sottili variazioni nel bordo UV suggeriscono che la chimica delle nubi cambi con l'altitudine, o con qualunque cosa ci sia sotto.
        #JNSQscience_bd_UVspec_EveInSpaceLowPeaks_00 = Lucidi riflessi UV, brillanti e netti, tracciano il terreno elevato sotto le nubi: lo spettrometro giura di aver visto il suolo fare l'occhiolino.
        #JNSQscience_bd_UVspec_EveInSpaceLowExplodiumSea_00 = Un violento lampo UV balena sul mare Explodium: lo strumento lo registra come "scintillio reattivo" e chiede di voltarsi.
        #JNSQscience_bd_UVspec_EveInSpaceLowMountains_00 = Lunghe ombre UV a strisce increspano il tappeto di nubi: onde montane che disegnano linee su una tela viola.
        #JNSQscience_bd_UVspec_EveInSpaceLowShores_00 = Le bande di nubi costiere mostrano un confine UV nitido: la costa si annuncia con un bagliore fin troppo sicuro di sé.
        #JNSQscience_bd_UVspec_EveInSpaceLowPolarLakes_00 = I laghi polari risultano come pozze scure ai raggi UV con bordi luminosi, suggerendo una miscela di condensati diversa lungo i margini.
        #JNSQscience_bd_UVspec_EveInSpaceLowPetrolLakes_00 = Un forte assorbimento UV staziona sopra i laghi di petrolio: qualunque cosa ristagni lì è bravissima a tenere i segreti.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofAkron_00 = Il mare di Akron restituisce una lucentezza UV uniforme, come uno specchio che qualcuno ha dimenticato di pulire.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofNessus_00 = Una marezzatura UV danza sul mare di Nessus: le sommità delle nubi sembrano livide in modo molto scientifico.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofTaniwha_00 = Una linea UV sottile e tagliente attraversa il mare di Taniwha: o è chimica, o c'è qualcosa che lascia scie.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofGigan_00 = Il mare di Gigan produce un abbagliante punto caldo UV che si sposta tra un passaggio e l'altro, come se si rifiutasse di farsi mappare.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofRodan_00 = Turbolente striature UV sopra il mare di Rodan suggeriscono forti correnti ascensionali che sfondano lo strato di nubi dal basso.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofGojira_00 = Lo spettro s'impenna e crepita sopra il mare di Gojira: sembra che il pianeta stia sfidando il sensore a sbattere le palpebre.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofGhidorah_00 = Due picchi UV compaiono sopra il mare di Ghidorah, abbastanza simmetrici da rendere sospettosi gli ingegneri.
        #JNSQscience_bd_UVspec_EveInSpaceLowSeaofBagorah_00 = Un ampio alone UV aleggia sopra il mare di Bagorah, come un'etichetta di avvertimento permanente sull'atmosfera.
        #JNSQscience_bd_UVspec_EveInSpaceLowKrakensWell_00 = Sopra Kraken's Well, il ritorno UV si attorciglia in un vortice: i dati sembrano voler fuggire dalla clipboard.
        #JNSQscience_bd_UVspec_EveInSpaceHigh_00 = Da lontano, la luminosità UV di Eve cambia con angolo e stagione, come se stesse lampeggiando lentamente. La registri come inquietante ma utile.
        #JNSQscience_bd_UVspec_EveInSpaceHigh_01 = Un tenue alone ultravioletto circonda il pianeta nelle esposizioni lunghe. Qualcosa nell'alta atmosfera sta brillando, e non è per niente modesto.
        #JNSQscience_bd_UVspec_GillyInSpaceLow_00 = Gilly in UV non fa molto oltre a esistere in modo sbilenco, ma Eve lì vicino ruba completamente la scena. La tua "ricognizione della luna" diventa una "ricognizione dell'abbagliamento viola".
        #JNSQscience_bd_UVspec_GillyInSpaceLow_01 = La fotocamera scatta immagini UV ad alta risoluzione della superficie frastagliata di Gilly mentre cerchi di non starnutire la sonda fuori orbita. I risultati sono sorprendentemente nitidi.
        #JNSQscience_bd_UVspec_GillyInSpaceLowLowlands_00 = I bassopiani di Gilly riflettono gli UV in una debole sbavatura polverosa: soprattutto luce solare diffusa e regolite sciolta.
        #JNSQscience_bd_UVspec_GillyInSpaceLowMidlands_00 = Le pianure tremolano in UV mentre le ombre lampeggiano su creste irregolari: il terreno è bitorzoluto anche per gli standard di un asteroide.
        #JNSQscience_bd_UVspec_GillyInSpaceLowHighlands_00 = La riflettanza UV aumenta leggermente sopra le colline, suggerendo roccia più fresca dove la polvere non riesce a posarsi a lungo.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowIceCaps_00 = Il ritorno UV dalle calotte ghiacciate quasi acceca lo spettrometro: deboli righe aurorali scorrono sopra l'abbagliamento.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowHighlands_00 = L'assorbimento UV suggerisce aria più sottile e secca sopra le colline, con un segnale di superficie più debole.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowMountains_00 = Aria più pulita e ombre nette producono uno spettro nitido. Le rocce riflettono più UV del previsto.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowShores_00 = Un bordo UV brillante segna la risacca: lo spruzzo salato aggiunge una caratteristica di assorbimento nebulosa.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowMidlands_00 = Ricompare un'ampia firma UV "fogliare". Le piante sono sospettosamente brave in questo.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowLowlands_00 = I bassopiani sembrano più velati in UV. L'aria extra si mangia gran parte del segnale prima che possa rimbalzare indietro.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowAridLowlands_00 = Le sabbie aride divampano nell'ultravioletto. Lo strumento si lamenta di "lucentezza eccessiva".
        #JNSQscience_bd_UVspec_KerbinInSpaceLowAridMidlands_00 = I bacini aridi mostrano deboli bande di fluorescenza minerale. Qualcuno lo etichetta "terra luccicante, confermato".
        #JNSQscience_bd_UVspec_KerbinInSpaceLowAridHighlands_00 = Frastagliate righe UV suggeriscono minerali esposti nelle badlands, con pochissima attenuazione atmosferica.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowAridMountains_00 = La polvere sollevata dalle creste aride inclina l'intero spettro come un filtro granuloso.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowGreatLake_00 = Sopra il Grande Lago, il segnale UV crolla di colpo. L'acqua sta ingoiando avidamente i fotoni.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowInlandWater_00 = Lo spettro sopra le acque interne è uniforme e scuro: solo un sottile bordo atmosferico risalta chiaramente.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowKreenwichSea_00 = Strane striature UV attraversano il mare di Kreenwich, o sono fioriture, o barche, o un oceano molto artistico.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowArcticSea_00 = Una riflettanza UV a chiazze suggerisce ghiaccio sottile alla deriva. Lo spettrometro non sa decidere se sia mare o calotta.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowForemansSea_00 = Un tenue luccichio UV segue una fascia curva sull'acqua. La scienza insiste che sia "dinamica normale".
        #JNSQscience_bd_UVspec_KerbinInSpaceLowTriangulusSea_00 = Qui la mappa UV forma un triangolo quasi perfetto. Il Controllo Missione lo definisce a gran voce una coincidenza.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowNorthernSea_00 = L'aria alle alte latitudini aggiunge assorbimento extra. Lo spettro ritorna più freddo, più pulito e più silenzioso.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowSub-ArcticSea_00 = Il ritorno UV sfarfalla tra acqua libera e ghiaccio sottile, come se il mare non riuscisse a decidersi.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowEasternSea_00 = Un'ampia diffusione UV suggerisce spruzzi e foschia di nubi basse sospese oggi sopra il mare orientale.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowWesternSea_00 = Letture più calme sopra il mare occidentale: meno foschia, più assorbimento profondo da acqua più limpida.
        #JNSQscience_bd_UVspec_KerbinInSpaceLowWelcomeBackIsland_00 = Una minuscola isola spicca in UV come un faro: o la sabbia è molto riflettente, oppure qualcuno ha lasciato qualcosa acceso.
        #JNSQscience_bd_UVspec_MunInSpaceLow_00 = Nell'ultravioletto, i raggi dei crateri del Mun risaltano come linee di gesso su una lavagna. Qualcuno cerchia in silenzio quelli "dall'aspetto fresco".
        #JNSQscience_bd_UVspec_MunInSpaceLow_01 = Scansioni il terminatore in UV e scopri che le ombre non sono solo scure: sono diverse. I geologi iniziano a discutere con entusiasmo.
        #JNSQscience_bd_UVspec_MunInSpaceLowPoles_00 = Lo spettro UV s'impenna con un abbagliamento duro sulla regolite polare, e le ombre sembrano nero inchiostro.
        #JNSQscience_bd_UVspec_MunInSpaceLowHighlands_00 = Un contrasto UV più netto suggerisce polvere più fresca e meno alterata sulle colline.
        #JNSQscience_bd_UVspec_MunInSpaceLowMidlands_00 = Le pianure restituiscono uno spettro piatto e costante. Regolite da manuale senza sorprese, purtroppo.
        #JNSQscience_bd_UVspec_MunInSpaceLowLowlands_00 = Chiazze scure in UV suggeriscono grani più lisci e fini accumulati nei bassopiani come farina in una ciotola.
        #JNSQscience_bd_UVspec_MunInSpaceLowPolarIceCraters_00 = Un bordo UV brillante tradisce brina nascosta nei crateri polari ghiacciati: qualcuno sussurra "snack?"
        #JNSQscience_bd_UVspec_MunInSpaceLowExoticCraters_00 = Strane bande fluorescenti tremolano sopra i crateri esotici, come se le rocce risplendessero di rimando in silenzio.
        #JNSQscience_bd_UVspec_MunInSpaceLowRareCraters_00 = I crateri rari mostrano una lucentezza UV vitrea: la fusione d'impatto si è spruzzata e raffreddata in fretta.
        #JNSQscience_bd_UVspec_MunInSpaceLowVoronoiCraters_00 = I campi geometrici di crateri formano un ordinato mosaico UV. Lo spettrometro apprezza l'organizzazione.
        #JNSQscience_bd_UVspec_MunInSpaceLowNotableCraters_00 = Un nitido motivo ad anelli UV delinea i crateri notevoli, evidenziando l'ejecta come gesso sull'ardesia.
        #JNSQscience_bd_UVspec_MunInSpaceLowMountains_00 = Le alte cime lampeggiano più brillanti in UV, suggerendo materiale esposto e più pulito dove la polvere non riesce a posarsi.
        #JNSQscience_bd_UVspec_MunInSpaceHigh_00 = Il bagliore di Kerbin si infila nell'inquadratura come una morbida sbavatura UV. Fingi di averlo incluso apposta come bersaglio di calibrazione.
        #JNSQscience_bd_UVspec_MinmusInSpaceLow_00 = Le luminose distese di Minmus divampano in UV, mentre il terreno vicino resta ostinatamente fioco. Il contrasto è così netto che sembra dipinto.
        #JNSQscience_bd_UVspec_MinmusInSpaceLow_01 = L'imaging nell'ultravioletto fa sembrare la superficie mentolata meno amichevole e più... chimicamente giudicante. Il laboratorio chiede "solo un altro passaggio".
        #JNSQscience_bd_UVspec_MinmusInSpaceLowPoles_00 = I poli riflettono gli UV come caramelle glassate. Lo strumento chiede un guadagno più basso e un cucchiaio più grande.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowLowlands_00 = I bassopiani di Minmus tornano brillanti e lisci in UV, come se qualcuno li avesse lucidati per la fotocamera.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowMidlands_00 = Un sottile assorbimento UV suggerisce sali e polvere mescolati nelle pianure, mentolato ma non commestibile.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowHighlands_00 = Le colline appaiono leggermente più scure in UV, come se un sottile strato di graniglia più scura fosse risalito.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowBasins_00 = I bacini piatti rimandano una firma UV pulita con confini netti, perfetta per la mappatura.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownBasins_00 = Le chiazze dei bacini marroni assorbono più UV delle distese circostanti: qualcosa qui è meno... allegro.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownLowlands_00 = I bassopiani marroni mostrano un ritorno UV attenuato, suggerendo grani più scuri che si depositano nei punti più bassi.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownMidlands_00 = Le pianure marroni aggiungono un'ampia flessione UV senza dettagli, depositi polverosi con poca scintilla riflettente.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownHighlands_00 = Anche le colline marroni restano scure in UV: qualunque cosa le macchi sembra ostinatamente diffusa.
        #JNSQscience_bd_UVspec_MinmusInSpaceLowMountains_00 = Le creste montuose scintillano in UV dove la superficie è ripulita, lasciando esposta una crosta luminosa.
        #JNSQscience_bd_UVspec_MinmusInSpaceHigh_00 = La fotocamera coglie una debole diffusione UV dalla polvere attorno al veicolo, o è un vero effetto ambientale o sono briciole di snack. Lo registri comunque.
        #JNSQscience_bd_UVspec_DunaInSpaceLow_00 = L'alta atmosfera di Duna mostra delicate bande UV che le camere nel visibile non colgono affatto. Il team meteo dà a questi motivi nomi di snack.
        #JNSQscience_bd_UVspec_DunaInSpaceLow_01 = Scure chiazze UV attraversano il pianeta insieme alla polvere. Qualunque cosa stia assorbendo quella luce lo fa con grande sicurezza.
        #JNSQscience_bd_UVspec_DunaInSpaceLowIceCaps_00 = Lo spettro UV s'impenna sulla brillante brina polare, con il minimo accenno di foschia che sfiora il bordo della calotta.
        #JNSQscience_bd_UVspec_DunaInSpaceLowHighlands_00 = L'aria più pulita sopra le colline rende più nitido il ritorno UV: la polvere sembra appena graffiata e pronta a brillare.
        #JNSQscience_bd_UVspec_DunaInSpaceLowMidlands_00 = Un'ampia flessione UV polverosa grida "graniglia in sospensione" più forte di qualsiasi allarme strumentale.
        #JNSQscience_bd_UVspec_DunaInSpaceLowLowlands_00 = Nei bassopiani, l'atmosfera extra e la polvere si mangiano gli UV prima che possano rimbalzare indietro.
        #JNSQscience_bd_UVspec_DunaInSpaceLowCraters_00 = I bordi dei crateri lampeggiano più brillanti in UV rispetto ai fondi, come se gli impatti ti avessero comodamente ordinato la superficie.
        #JNSQscience_bd_UVspec_DunaInSpaceLowRareCraters_00 = I crateri rari mostrano una netta fasciatura di contrasto UV: c'è qualcosa nel loro ejecta che è stranamente riflettente.
        #JNSQscience_bd_UVspec_DunaInSpaceLowVoronoiCraters_00 = I campi di crateri a motivo formano una ordinata trapunta UV, con ogni cella leggermente diversa in riflettanza.
        #JNSQscience_bd_UVspec_DunaInSpaceLowNotableCraters_00 = I crateri notevoli si delineano in UV con anelli puliti e aloni disordinati di polvere espulsa.
        #JNSQscience_bd_UVspec_DunaInSpaceLowExoticCraters_00 = Una debole e strana firma di fluorescenza tremola sopra i crateri esotici, come se la roccia stesse rispondendo.
        #JNSQscience_bd_UVspec_DunaInSpaceLowTrenches_00 = Le trincee risultano scure in UV nei tagli più profondi, con bordi luminosi che suggeriscono frane di polvere e brina d'ombra.
        #JNSQscience_bd_UVspec_DunaInSpaceLowNotablePlains_00 = Le pianure restituiscono una firma UV uniforme, punteggiata da striature: scie di polvere scritte dal vento che si vedono dall'orbita.
        #JNSQscience_bd_UVspec_DunaInSpaceLowNotableMountains_00 = Sopra le montagne notevoli, l'UV si fa ad alto contrasto lungo le creste, dove l'aria si assottiglia e la polvere non può nascondersi.
        #JNSQscience_bd_UVspec_DunaInSpaceLowMountains_00 = Picchi e valli disegnano forti ombre UV: gli alti pendii sembrano più puliti, come se venissero sabbiati ogni giorno.
        #JNSQscience_bd_UVspec_DunaInSpaceLowVolcano_00 = La regione del vulcano mostra un insolito bordo UV, suggerendo materiale fresco (o un pennacchio che vuole davvero attirare l'attenzione).
        #JNSQscience_bd_UVspec_DunaInSpaceHigh_00 = Da lontano, la luminosità UV di Duna cambia con stagione e angolo come un lento impulso. Segni la curva e cerchi di non dargli un significato.
        #JNSQscience_bd_UVspec_DunaInSpaceHigh_01 = Le riprese UV a lunga esposizione rivelano un sottile alone lungo il bordo del pianeta. L'atmosfera è debole, ma si rifiuta di farsi ignorare.
        #JNSQscience_bd_UVspec_IkeInSpaceLow_00 = La superficie di Ike in UV sembra inquietantemente familiare, come Mun, ma con le luci abbassate. La cartella "perché sei così?" si allarga.
        #JNSQscience_bd_UVspec_IkeInSpaceLow_01 = Il bagliore ultravioletto di Duna invade il bordo dell'immagine, affogando Ike nel controluce. Ottieni una grande silhouette e una ricognizione mediocre.
        #JNSQscience_bd_UVspec_IkeInSpaceLowPoles_00 = I poli mostrano un brillante scintillio UV nelle ombre perenni: brina intrappolata dal freddo che gioca a nascondino.
        #JNSQscience_bd_UVspec_IkeInSpaceLowMountains_00 = Le montagne di Ike restituiscono un riflesso UV più netto dove la roccia nuda spunta dalla polvere come denti scoperti.
        #JNSQscience_bd_UVspec_IkeInSpaceLowMidlands_00 = Le pianure sono una noia UV piatta e costante: classica regolite senza aria e senza trucchi.
        #JNSQscience_bd_UVspec_IkeInSpaceLowLowlands_00 = I bassopiani tornano leggermente più scuri in UV, come se grani più fini si fossero accumulati lì e avessero ingoiato la lucentezza.
        #JNSQscience_bd_UVspec_IkeInSpaceLowHighlands_00 = Le colline riflettono gli UV un po' più intensamente, suggerendo polvere più ruvida e meno alterata e affioramenti più freschi.
        #JNSQscience_bd_UVspec_IkeInSpaceHigh_00 = Le immagini ultraviolette mostrano sottili striature di albedo su Ike che non combaciano con il terreno più evidente. O è chimica, o Ike sta semplicemente facendo Ike.
        #JNSQscience_bd_UVspec_EdnaInSpaceLow_00 = La fotocamera UV fissa la superficie color carbone di Edna e trova solo deboli riflessi a chiazze. Qualunque cosa stia riflettendo quella luce lo fa in silenzio.
        #JNSQscience_bd_UVspec_EdnaInSpaceLow_00 = L'imaging nell'ultravioletto fa sembrare le ombre di Edna più profonde del dovuto. Il team di analisi lo archivia sotto "probabilmente normale" senza suonare convinto.
        #JNSQscience_bd_UVspec_EdnaInSpaceLowLowlands_00 = I bassopiani di Edna tornano fiocchi e senza dettagli in UV, come polvere vecchia che ha dimenticato come si brilla.
        #JNSQscience_bd_UVspec_EdnaInSpaceLowMidlands_00 = Una lieve variazione di pendenza UV suggerisce grani mescolati nelle pianure: niente di drammatico, solo terra diversa in silenzio.
        #JNSQscience_bd_UVspec_EdnaInSpaceLowHighlands_00 = Le colline riflettono un po' più UV, come se la superficie fosse più ruvida e meno "assestata".
        #JNSQscience_bd_UVspec_EdnaInSpaceLowPolarIceCraters_00 = Netti bordi brillanti in UV tracciano i crateri polari ghiacciati: qualunque cosa si nasconda nelle ombre è molto riflettente.
        #JNSQscience_bd_UVspec_EdnaInSpaceLowWhites_00 = I Whites divampano in UV come polvere fresca: lo spettrometro ricontrolla di non stare guardando il proprio bersaglio di calibrazione.
        #JNSQscience_bd_UVspec_EdnaInSpaceHigh_00 = Cronometri una lunga esposizione UV mentre Edna scivola davanti alle stelle di sfondo. Il profilo di occultazione è nitido, e la solitudine è misurabile.
        #JNSQscience_bd_UVspec_EdnaInSpaceHigh_01 = Lo sfondo UV è silenzioso quaggiù: Edna è solo un puntino scuro con pochi pixel luminosi e ostinati.
        #JNSQscience_bd_UVspec_DakInSpaceLow_00 = La forma bitorzoluta "a patata" di Dak mostra netti riflessi UV mentre ruota. I picchi di luminosità sono così regolari che sembrano un occhiolino.
        #JNSQscience_bd_UVspec_DakInSpaceLow_01 = La fotocamera mappa la riflettanza UV di Dak e ottiene un motivo marezzato che si rifiuta di combaciare con le immagini nel visibile. Il Controllo Missione chiede se sta "cantando" di nuovo.
        #JNSQscience_bd_UVspec_DakInSpaceLowLowlands_00 = I bassopiani di Dak mostrano un ritorno UV spento, come la buccia di una patata al forno rimasta nello spazio troppo a lungo.
        #JNSQscience_bd_UVspec_DakInSpaceLowMidlands_00 = Un tremolio UV a chiazze sulle pianure fa sembrare Dak intento a segnalare qualcosa: probabilmente sono solo rocce maleducate.
        #JNSQscience_bd_UVspec_DakInSpaceLowHighlands_00 = Le colline rimandano una lucentezza UV leggermente più brillante, come se la "patata" avesse un lato croccante e un lato morbido.
        #JNSQscience_bd_UVspec_DakInSpaceHigh_00 = Da più lontano, Dak diventa una minuscola maschera in movimento per l'osservazione UV delle stelle. I risultati sono ottimi, nonostante l'"interferenza da patata".
        #JNSQscience_bd_UVspec_DakInSpaceHigh_01 = Le esposizioni UV lunghe catturano scintillii occasionali vicino all'orbita di Dak: polvere, detriti, o semplicemente le tue ottiche che protestano. Registri tutte e tre le possibilità.
        #JNSQscience_bd_UVspec_DakInSpaceHigh_02 = Lo spettrometro UV vede per lo più buio e statico finché Dak non entra in vista come una interruzione bitorzoluta.
        #JNSQscience_bd_UVspec_DresInSpaceLow_00 = Dres sembra pallido nella luce visibile, ma l'ultravioletto rivela striature e macchie come se qualcuno avesse cancellato la mappa e ne avesse disegnata un'altra. I geologi, all'improvviso, diventano molto svegli.
        #JNSQscience_bd_UVspec_DresInSpaceLow_01 = La fotocamera UV coglie sottili cambiamenti lungo il terminatore di Dres che non compaiono in altre bande. I pianificatori della colonizzazione lo etichettano "interessante" e iniziano a preparare fogli di calcolo.
        #JNSQscience_bd_UVspec_DresInSpaceLowPoles_00 = I poli mostrano un ritorno UV più pulito e brillante: la brina intrappolata dal freddo spiegherebbe la lucentezza extra.
        #JNSQscience_bd_UVspec_DresInSpaceLowHighlands_00 = Le colline di Dres appaiono pallide e stabili in UV, con sottili bande che suggeriscono grani e affioramenti diversi.
        #JNSQscience_bd_UVspec_DresInSpaceLowMidlands_00 = Le pianure restituiscono uno spettro ampio e piatto. La famosa piattezza di Dres, ora confermata nell'ultravioletto.
        #JNSQscience_bd_UVspec_DresInSpaceLowLowlands_00 = I bassopiani risultano leggermente più scuri in UV, suggerendo polvere più fine accumulata dove può coprire tutto in modo uniforme.
        #JNSQscience_bd_UVspec_DresInSpaceLowCanyon_00 = Il canyon incide una cicatrice scura in UV con bordi luminosi: contrasti così netti fanno venire ai pianificatori voglia di disegnare mappe sui tovaglioli.
        #JNSQscience_bd_UVspec_JoolInSpaceLow_00 = La fotocamera UV cattura archi luminosi che increspano il bordo di Jool. Qualcuno li etichetta "non toccare" e lo sottolinea due volte.
        #JNSQscience_bd_UVspec_JoolInSpaceLow_01 = L'imaging nell'ultravioletto rivela bande turbolente e improvvisi lampi in alto sulle sommità delle nubi. I sistemi di tempesta sembrano più arrabbiati quando non puoi vedere i bei colori.
        #JNSQscience_bd_UVspec_JoolInSpaceLowEquatorialBands_00 = Le bande equatoriali divampano in UV con un assorbimento a strati che sembra tende di foschia impilate.
        #JNSQscience_bd_UVspec_JoolInSpaceLowSubpolarBands_00 = Le firme UV delle bande sub-polari tornano striate e irregolari, come se gli strati superiori non riuscissero a stare fermi.
        #JNSQscience_bd_UVspec_JoolInSpaceLowStormComplex_00 = Le formazioni temporalesche sputano picchi UV taglienti: lo spettrometro le etichetta "energiche e maleducate".
        #JNSQscience_bd_UVspec_JoolInSpaceLowExposedLowerDeck_00 = Gli strati inferiori scoperti delle nubi appaiono fiocchi e pesanti in UV, ingoiando la luce come una spugna verde senza fondo.
        #JNSQscience_bd_UVspec_JoolInSpaceLowNorthPole_00 = Vicino al polo nord, deboli archi UV tremolano sul bordo: lassù qualcosa si sta eccitando.
        #JNSQscience_bd_UVspec_JoolInSpaceLowSouthPole_00 = Il polo sud mostra una tonalità UV diversa dal nord: persino Jool non riesce a impegnarsi nella simmetria.
        #JNSQscience_bd_UVspec_JoolInSpaceHigh_00 = Dall'orbita alta, il tenue bagliore UV di Jool si estende più del previsto. Il team radiazioni dice che è "informativo" con quel tono che significa "allarmante".
        #JNSQscience_bd_UVspec_JoolInSpaceHigh_01 = Le esposizioni UV lunghe mostrano un alone spettrale attorno al gigante, modellato da particelle e campi. Ti sembra di fotografare una trappola.
        #JNSQscience_bd_UVspec_LaytheInSpaceLow_00 = In UV, le sommità delle nubi di Laythe diventano striature e vortici che le camere nel visibile non colgono. Sembra quasi invitante, finché il bagliore di Jool non rovina l'inquadratura.
        #JNSQscience_bd_UVspec_LaytheInSpaceLow_01 = La fotocamera mappa chiazze ultraviolette su oceani e nubi, suggerendo chimica d'alta quota. L'atmosfera sta facendo cose per cui non ha presentato un piano di volo.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowShores_00 = Un sottile bordo brillante in UV traccia la costa: spruzzi marini e foschia leggera dipingono il litorale nell'ultravioletto.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowShallows_00 = Le basse acque restituiscono un riflesso UV più brillante e pulito, come se l'acqua stesse ostentando il suo fondale sabbioso.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowInlandWater_00 = Le acque interne risultano scure e uniformi in UV, con solo un debole bordo atmosferico attorno.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowKrenwichSea_00 = Sopra il mare di Krenwich, una marezzatura UV suggerisce bande di nubi in movimento e venti di superficie irrequieti.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowJoolwardSea_00 = Il mare di Jool brilla con un velo UV nebuloso: qui l'aria sembra più spessa e più riflettente.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowPolwardSea_00 = Il mare di Pol torna nitido in UV, come se l'aria più fredda stesse filtrando via il disordine.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowArcticSea_00 = Un contrasto UV a chiazze suggerisce ghiaccio sottile e nebbie fredde che si inseguono sulle acque artiche.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowIceCaps_00 = Le calotte ghiacciate colpiscono il rilevatore con abbagliamento UV: bianco brillante con un bordo di assorbimento sottile e netto.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowLowlands_00 = I bassopiani mostrano una flessione UV più ampia, suggerendo aria più densa e più foschia in sospensione vicino alla superficie.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowMidlands_00 = Gli spettri sulle pianure appaiono più stabili, con meno firme di foschia, quasi "confortevoli", per gli standard orbitali.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowHighlands_00 = Le colline restituiscono caratteristiche UV più nette: l'aria più sottile rende più facile distinguere il riflesso del suolo.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowMountains_00 = Le ombre delle montagne incidono audaci strisce UV nella scena: le cime sembrano pulite e dai bordi duri.
        #JNSQscience_bd_UVspec_LaytheInSpaceLowEnclosedFaults_00 = Le faglie racchiuse mostrano strani riflessi UV lungo le loro linee, come se il materiale esposto riflettesse in modo diverso.
        #JNSQscience_bd_UVspec_LaytheInSpaceHigh_00 = Da lontano, Laythe alterna UV brillante e attenuato a seconda di angolo e stagione. I pianificatori della colonizzazione lo chiamano "una buona notizia" senza specificare perché.
        #JNSQscience_bd_UVspec_LaytheInSpaceHigh_01 = Cogli un lieve tremolio UV sul lato notturno vicino ai poli. È bellissimo, e i monitor delle radiazioni rovinano subito l'atmosfera.
        #JNSQscience_bd_UVspec_VallInSpaceLow_00 = La superficie ghiacciata di Vall riflette gli UV in motivi netti e irregolari. Le striature luminose sembrano appena dipinte, e non è mai un pensiero rassicurante.
        #JNSQscience_bd_UVspec_VallInSpaceLow_01 = L'imaging nell'ultravioletto trova un delicato bagliore che aderisce al bordo di Vall nell'ombra. La teoria migliore è "sputtering", e la seconda migliore è "non chiedere".
        #JNSQscience_bd_UVspec_VallInSpaceLowPoles_00 = I poli di Vall brillano in UV con un abbagliamento freddo e vitreo: distese brinate con tagli d'ombra nero pece.
        #JNSQscience_bd_UVspec_VallInSpaceLowMountains_00 = Le montagne scintillano debolmente in UV dove i pendii sembrano appena ripuliti, lasciando esposta una crosta più brillante.
        #JNSQscience_bd_UVspec_VallInSpaceLowHighlands_00 = Gli spettri delle colline mostrano un sottile "morso" UV, suggerendo un oscuramento della superficie dovuto a una lunga esposizione.
        #JNSQscience_bd_UVspec_VallInSpaceLowMidlands_00 = Le pianure restituiscono una curva UV uniforme: ghiaccio e polvere tranquilli, che per una volta si comportano bene.
        #JNSQscience_bd_UVspec_VallInSpaceLowLowlands_00 = I bassopiani risultano leggermente più scuri in UV, come se grani fini si fossero accumulati lì e avessero attenuato la lucentezza.
        #JNSQscience_bd_UVspec_VallInSpaceHigh_00 = Vall scivola davanti alle stelle di sfondo e la curva di luce UV resta stranamente netta. Se esiste qualcosa che assomigli a un'atmosfera, si sta comportando in modo estremamente educato.
        #JNSQscience_bd_UVspec_TyloInSpaceLow_00 = Il volto pallido di Tylo diventa duro nell'ultravioletto, con sottili macchie che non corrispondono al terreno visibile. I geologi iniziano troppo in fretta a sostenere "decisamente non è polvere".
        #JNSQscience_bd_UVspec_TyloInSpaceLow_01 = Scansioni in UV i bordi dei crateri di Tylo e trovi margini luminosi che suggeriscono materiale vitreo o appena esposto. L'idea di "fresco" per Tylo è comunque più vecchia di tutti a bordo.
        #JNSQscience_bd_UVspec_TyloInSpaceLowPoles_00 = I poli di Tylo lampeggiano con un duro riflesso UV: la polvere lì presente è più sottile, oppure è stata rimescolata di recente.
