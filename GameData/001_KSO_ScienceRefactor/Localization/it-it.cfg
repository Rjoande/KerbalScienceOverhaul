        #ScienceRefactor_bd_multiSpec_JoolInSpaceLow_00 = Le scansioni multispettrali non riescono a penetrare molto in profondità sotto le nubi di Jool. Tuttavia, rivelano molto sulle caratteristiche dei suoi complessi sistemi meteorologici.
        #ScienceRefactor_bd_multiSpec_JoolInSpaceLow_00 = L'analisi multispettrale indica che gli strati nuvolosi più luminosi e più alti sono composti principalmente da metano e ammoniaca, mentre gli strati inferiori e più scuri sono composti da metano, idrogeno ed elio.
        #ScienceRefactor_bd_multiSpec_JoolInSpaceLow_01 = Vengono acquisite immagini multispettrali dei bellissimi vortici turbinanti nelle strutture nuvolose di Jool.
        #ScienceRefactor_bd_multiSpec_JoolInSpaceHigh_00 = Le bande UV mostrano Jool brillante e colorato, mentre le bande IR mostrano Jool scuro e infuocato. Interessante!
        #ScienceRefactor_bd_multiSpec_JoolInSpaceHigh_01 = Secondo le scansioni delle emissioni termiche, la spessa atmosfera di Jool sembra isolarlo, permettendogli di trattenere molto calore.
        #ScienceRefactor_bd_multiSpec_JoolInSpaceHigh_02 = L'analisi delle emissioni termiche mostra che Jool emette molto più calore di quanto ne riceva da Kerbol, suggerendo una qualche sorgente di energia interna.
        #ScienceRefactor_bd_multiSpec_LaytheInSpace_00 = Vengono acquisite immagini di Laythe in una moltitudine di bande spettrali.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLow_00 = Le analisi indicano che l'atmosfera è composta principalmente da azoto e ossigeno, con tracce di metano, etano e acetilene. La presenza di ossigeno è sorprendente: senza una fonte che lo reintegri, ce ne sarebbe molto meno. Questo indica che potrebbe esserci vita su Laythe, o quantomeno un processo geologico unico capace di rigenerare l'ossigeno.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLow_01 = La spettrometria multispettrale mostra che gli oceani di Laythe sono composti da acqua altamente salina con vari elementi in tracce.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowPoles_00 = La spettrometria multispettrale e l'analisi delle emissioni termiche suggeriscono che le regioni polari di Laythe non sono abbastanza fredde da mantenere calotte polari permanentemente ghiacciate.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowShallows_00 = Le regioni più basse di Laythe sembrano emettere più calore rispetto ad altre aree, indicando una possibile attività geologica in corso.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowCraterBay_00 = Crater Bay sembra emettere una quantità di calore nettamente superiore rispetto ad altre regioni. È estremamente probabile che sotto la superficie sia presente un'intensa attività geologica.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowCraterIsland_00 = Questa regione sembra emettere la maggior quantità di calore nell'area di Crater Bay. I nostri scienziati suggeriscono che Crater Bay non sia stata creata da un impatto meteoritico, ma da un grande vulcano, forse ancora attivo. Quest'isola potrebbe esserne la caldera.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowTheDegrasseSea_00 = Il Mare di Degrasse è sufficientemente poco profondo da permettere agli scanner multispettrali di effettuare misurazioni più dettagliate delle emissioni termiche del fondale marino di Laythe. Numerosi hotspot termici localizzati punteggiano il fondale, indicando la presenza di sorgenti idrotermali e fornendo ulteriori prove di un nucleo attivo e di vulcanismo.
        #ScienceRefactor_bd_multiSpec_LaytheInSpaceHigh_00 = Laythe emette più calore di quanto ne riceva, in modo simile a Jool. Questo è probabilmente dovuto alle forti forze mareali di Jool che riscaldano Laythe, ma esiste anche la possibilità che Laythe abbia un nucleo attivo.
