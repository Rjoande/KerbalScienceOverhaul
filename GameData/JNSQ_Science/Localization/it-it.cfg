        #JNSQscience_bd_orbitalScope_EnonInSpaceLowMidlands_00 = Le pianure mostrano dolci creste e avvallamenti poco profondi, come onde congelate che hanno dimenticato come muoversi.
        #JNSQscience_bd_orbitalScope_EnonInSpaceLowHighlands_00 = Le colline diventano frastagliate e nitide, con ombre taglienti che attraversano la superficie luminosa.
        #JNSQscience_bd_orbitalScope_EnonInSpaceLowPoles_00 = Ai poli, tutto diventa una geometria netta in bianco e nero: il programma di mosaico la definisce "troppo pulita per essere amichevole".
        #JNSQscience_bd_orbitalScope_PraxInSpaceHigh_00 = Prax sta al margine come se ci appartenesse: il telescopio avvia un mosaico prima che qualcuno possa dire "perché no".
        #JNSQscience_bd_orbitalScope_PraxInSpaceLowLowlands_00 = I bassopiani sono ampi e smorzati, interrotti da impatti sparsi che non scompaiono mai del tutto sullo sfondo.
        #JNSQscience_bd_orbitalScope_PraxInSpaceLowMidlands_00 = Le immagini delle pianure mostrano transizioni disordinate e bacini poco profondi: perfetti per i mosaici e pessimi per le certezze.
        #JNSQscience_bd_orbitalScope_PraxInSpaceLowHighlands_00 = Le colline sembrano lastre ruvide e creste impilate senza un piano, ma il telescopio adora le ombre.
        #JNSQscience_bd_orbitalScope_PraxInSpaceLowMountains_00 = Le dorsali montuose si innalzano bruscamente con ombre lunghe e sottili che fanno sembrare il terreno più tagliente di quanto probabilmente sia.
        #JNSQscience_bd_orbitalScope_PraxInSpaceLowPoles_00 = L'illuminazione polare trasforma ogni rilievo in una sagoma drammatica: il telescopio registra "perlopiù ombra, comunque utile".

        // bd_oso
        #JNSQscience_bd_oso_SunInSpaceLow_00 = I sensori rimpiangono subito questo incarico, ma registrano comunque furiosi picchi di radiazione e una raffica costante di particelle energetiche. Etichetti il dataset "Kerbol: Sì".
        #JNSQscience_bd_oso_SunInSpaceHigh_00 = Nello spazio interplanetario le letture si assestano su un baseline pulito: perlopiù luce solare stabile, polvere tenue e il singolo singhiozzo che fa raddrizzare Mission Control.
        #JNSQscience_bd_oso_EdnaInSpaceLow_00 = Le eclissi lente e pulite di Edna creano cali perfetti per calibrare i monitor solari. La luce qui sembra lontana, ma comanda ancora lei.
        #JNSQscience_bd_oso_EdnaInSpaceHigh_00 = Da alta quota su Edna, l'uscita di Kerbol appare attenuata e sorprendentemente stabile. Gli scienziati festeggiano la quiete: gli ingegneri festeggiano che non si stia sciogliendo niente.
        #JNSQscience_bd_oso_DakInSpaceLow_00 = Dak ruzzola sotto come una patata bitorzoluta, spezzettando la luce in rapidi lampi sui rivelatori. I sensori registrano "rumore d'ombra" e anche "rumore da patata".
        #JNSQscience_bd_oso_DakInSpaceHigh_00 = A questa distanza perfino i capricci di Kerbol arrivano come increspature educate nei dati. Mission Control lo chiama "buona scienza", tu lo chiami "finalmente una pausa".
        #JNSQscience_bd_oso_LindorInSpaceLow_00 = L'enorme presa magnetica di Lindor trasforma il tuo osservatorio "solare" in una macchina conta-particelle. Da qualche parte nel rumore, Kerbol sta ancora brillando… probabilmente.
        #JNSQscience_bd_oso_LindorInSpaceHigh_00 = Molto sopra Lindor, i sensori ottengono finalmente uno sguardo più pulito su Kerbol—ridotto a una lampada fredda e lontana. I dati sono silenziosi, precisi e un po' inquietanti.
        #JNSQscience_bd_oso_KrelInSpaceLow_00 = L'orbita stretta di Krel fa sì che Lindor accenda e spenga la luce come un otturatore gigantesco. Gli scienziati esultano: gli ingegneri si lamentano dello "spam di eclissi".
        #JNSQscience_bd_oso_KrelInSpaceHigh_00 = Da alta quota su Krel, il segnale solare è debole ma stabile—finché Lindor attraversa la visuale e i grafici crollano ordinatamente a zero, di nuovo.
        #JNSQscience_bd_oso_AdenInSpaceLow_00 = Aden riflette giusto abbastanza da confondere i sensori, che registrano il "bagliore di superficie" come "evento solare". Rinomini il file prima che qualcuno se ne accorga.
        #JNSQscience_bd_oso_AdenInSpaceHigh_00 = Quassù Lindor domina il cielo e Kerbol è una sorgente debole ma costante. L'osservatorio si assesta su letture lunghe e noiose—esattamente quello che volevano gli specialisti.
        #JNSQscience_bd_oso_HuygenInSpaceLow_00 = Il bagliore nebuloso di Huygen e il suo ambiente di particelle energetiche martellano gli strumenti con falsi allarmi. Mission Control chiede se il sole stia esplodendo: tu rispondi "non localmente".
        #JNSQscience_bd_oso_HuygenInSpaceHigh_00 = Sopra il velo ambrato di Huygen, i sensori seguono la tenue uscita di Kerbol con sorprendente chiarezza. Picchi occasionali suggeriscono che il sistema è ancora decisamente vivo—e non sempre amichevole.
        #JNSQscience_bd_oso_RigaInSpaceLow_00 = La superficie smorzata di Riga rimanda un luccichio debole e costante mentre i sensori arrancano in cerca di fotoni. Il rapporto recita: "Apporto solare rilevato. A malapena."
        #JNSQscience_bd_oso_RigaInSpaceHigh_00 = In alta orbita su Riga, l'osservatorio ottiene un baseline pulito: luce fioca, polvere rara e la confortante assenza di qualunque cosa stia tentando di cuocere l'hardware.
        #JNSQscience_bd_oso_TalosInSpaceLow_00 = Kerbol è così distante che i rivelatori iniziano a riportare valori "solari" in frazioni di una frazione. Gli strumenti chiedono—silenziosamente—un altro lavoro.
        #JNSQscience_bd_oso_TalosInSpaceHigh_00 = Nell'orbita alta di Talos, il sole diventa sfondo e lo sfondo diventa la storia. Registri un dataset impeccabile e gelido e cerchi di non pensare al viaggio di ritorno.
        #JNSQscience_bd_oso_CelesInSpaceLow_00 = Celes offre un baseline splendidamente freddo e silenzioso. I sensori registrano diligentemente luce fioca… e un inspiegabile timbro "NDA" che nessuno ricorda di aver aggiunto.
        #JNSQscience_bd_oso_CelesInSpaceHigh_00 = Molto sopra Celes, il sole è solo un riferimento debole e stabile. I dati sono così puliti da rendere sospettosi gli analisti.
        #JNSQscience_bd_oso_TamInSpaceLow_00 = La forma irregolare di Tam spezzetta la luce lontana in piccoli tremolii nervosi. L'osservatorio etichetta il pattern "KB 4089848" e chiude la pratica.
        #JNSQscience_bd_oso_TamInSpaceHigh_00 = In alta orbita su Tam, i rivelatori iniziano a contare i fotoni come fossero carico prezioso. Mission Control chiede se il sole sia ancora acceso: tecnicamente, sì.
        #JNSQscience_bd_oso_HamekInSpaceLow_00 = I sensori rilevano un'attenuazione sottile dove non dovrebbe esserci, come se la luce venisse "filtrata" dal colore stesso di Hamek. Gli scienziati aprono una nuova cartella: "Perché È Rosso".
        #JNSQscience_bd_oso_HamekInSpaceHigh_00 = Dall'orbita alta, Hamek sta sotto una debole e costante pioggerellina di luce. Gli strumenti riportano output normale—mentre tutti discutono su come qualcosa possa avere quel colore in primo luogo.
        #JNSQscience_bd_oso_NaraInSpaceLow_00 = La foschia di idrogeno freddo di Nara si illumina appena mentre il vento solare la rimescola. I sensori registrano un tenue tremolio aurorale e molti fotoni, pazientissimi.
        #JNSQscience_bd_oso_NaraInSpaceHigh_00 = Molto sopra Nara, Kerbol è un puntino ostinato. L'osservatorio registra un baseline solare pulito e debole e si chiede come faccia mai qualcosa, quassù, a scaldarsi.
        #JNSQscience_bd_oso_AmosInSpaceLow_00 = Amos non riflette quasi nulla, il che è perfetto—finché il contatore di particelle non inizia a ticchettare come se avesse litigato con il quartiere di Nara.
        #JNSQscience_bd_oso_AmosInSpaceHigh_00 = Lontano da Amos, il segnale solare è così sottile che la lettura tenta di arrotondare a "meh". Gli scienziati esultano lo stesso: gli strumenti lo vedono ancora.
        #JNSQscience_bd_oso_EnonInSpaceLow_00 = Il ghiaccio brillante di Enon rimanda un riflesso netto che per un attimo convince i sensori che il sole sia più vicino. Non lo è, ma i grafici sembrano molto sicuri di sé.
        #JNSQscience_bd_oso_EnonInSpaceHigh_00 = In orbita alta, il bagliore svanisce in un filo costante di luce. Gran parte del dataset è "baseline", con qualche impatto di polvere drammatico giusto per dare sapore.
        #JNSQscience_bd_oso_PraxInSpaceLow_00 = Prax resta ai margini e la luce arriva di conseguenza: debole, costante e facile da perdere se sbatti le palpebre. L'osservatorio la misura comunque, per dispetto.
        #JNSQscience_bd_oso_PraxInSpaceHigh_00 = In alta orbita su Prax, i dati sono puro vuoto attraversato da una firma solare. Mission Control lo chiama "ottima calibrazione" e nessuno obietta.

        // bd_pegasus
        #JNSQscience_bd_pegasus_MohoInSpaceLow_00 = Il contatore crepita senza sosta.
        #JNSQscience_bd_pegasus_MohoInSpaceLow_01 = Le energie d'impatto schizzano così spesso che il Controllo Missione inizia a mettere a preventivo "tutto rinforzato" nel prossimo bilancio.
        #JNSQscience_bd_pegasus_MohoInSpaceHigh_00 = Gli impatti diminuiscono, ma ogni ping sembra ancora velocissimo: l'orbita di Moho rende cattive le rocce minuscole.
        #JNSQscience_bd_pegasus_MohoInSpaceHigh_01 = La maggior parte dei colpi arriva dal lato rivolto al sole: aggiungi "non aprire nessun finestrino" alla lista di controllo.
        #JNSQscience_bd_pegasus_EveInSpaceLow_00 = La densa zuppa viola sotto di te sembra inghiottire le particelle più piccole: il tasso d'impatto cala ogni volta che passi troppo vicino.
        #JNSQscience_bd_pegasus_EveInSpaceLow_01 = Un improvviso scoppio di impatti fa sì che tutti controllino in silenzio lo schema di separazione.
        #JNSQscience_bd_pegasus_EveInSpaceHigh_00 = Arrivano ping regolari, come se Eve stesse spazzando pulito il vicinato e spargendo in giro gli avanzi.
        #JNSQscience_bd_pegasus_EveInSpaceHigh_01 = Diversi impatti arrivano con angoli strani: gli scienziati discutono se l'atmosfera stia "scagliando" polvere nello spazio.
        #JNSQscience_bd_pegasus_GillyInSpaceLow_00 = Quasi nessun colpo, finché una leggera raffica suggerisce che hai appena attraversato la nuvoletta personale di briciole di Gilly.
        #JNSQscience_bd_pegasus_GillyInSpaceLow_01 = Il rilevatore registra impatti lenti e morbidi. Congratulazioni, hai scoperto i "micro-macigni".
        #JNSQscience_bd_pegasus_GillyInSpaceHigh_00 = Lunghi tratti di silenzio interrotti da singoli tocchi: perfino i micrometeoroidi sembrano mancare Gilly.
        #JNSQscience_bd_pegasus_GillyInSpaceHigh_01 = Un piccolo gruppo di impatti segue una correzione di rotta. Qualcuno annota "controllare gli snack vaganti" a margine.
        #JNSQscience_bd_pegasus_DunaInSpaceLow_00 = Il rilevatore fa ping con regolarità. L'aria sottile di Duna non è un gran scudo, ma sembra proprio incanalare la polvere in bande insolite.
        #JNSQscience_bd_pegasus_DunaInSpaceLow_01 = Un breve scoppio di impatti coincide con una traccia al suolo sopra un terreno chiaro. Qualcuno suggerisce "sabbia, ma in orbita."
        #JNSQscience_bd_pegasus_DunaInSpaceHigh_00 = Gli impatti arrivano in piccoli gruppi radi e velocissimi, come se stessi sfiorando i bordi di un lungo flusso invisibile di detriti.
        #JNSQscience_bd_pegasus_DunaInSpaceHigh_01 = Il contatore resta perlopiù calmo finché un singolo colpo secco fa sentire all'improvviso minuscola tutta la capsula.
        #JNSQscience_bd_pegasus_IkeInSpaceLow_00 = Le letture saltano ogni volta che passi sopra terreno ruvido e fratturato. Ike sembra staccare delicatamente ghiaia nello spazio.
        #JNSQscience_bd_pegasus_IkeInSpaceLow_01 = Una serie di impatti lenti e morbidi suggerisce che hai volato attraverso un sottile alone di briciole che si rifiuta di depositarsi.
        #JNSQscience_bd_pegasus_IkeInSpaceHigh_00 = Qui gli impatti sono rari, finché non attraversi la traiettoria orbitale di Ike e intercetti qualche vagabondo che ha mancato del tutto la luna.
        #JNSQscience_bd_pegasus_IkeInSpaceHigh_01 = Lo strumento registra un lungo silenzio, poi un ordinato schema di tocchi, come se la luna stesse ripulendo la propria orbita.
        #JNSQscience_bd_pegasus_EdnaInSpaceLow_00 = Il tasso di micrometeoroidi è più alto di quanto vorresti. La cintura locale sembra meno "solitaria" quando sta cercando di carteggiare la tua nave.
        #JNSQscience_bd_pegasus_EdnaInSpaceLow_01 = La maggior parte degli impatti è minuscola e frequente, più come volare attraverso graniglia scura che nel vuoto.
        #JNSQscience_bd_pegasus_EdnaInSpaceHigh_00 = Meno colpi, ma quelli che arrivano sono energici. Qualunque cosa ci sia quassù ha avuto molto tempo per prendere velocità.
        #JNSQscience_bd_pegasus_EdnaInSpaceHigh_01 = Il rilevatore registra occasionali ping secchi provenienti da nessun punto in particolare. Lo spazio resta fermamente deciso a non essere d'aiuto.
        #JNSQscience_bd_pegasus_DakInSpaceLow_00 = Lo strumento registra una raffica di impatti gentili. Forse stai orbitando attorno a una patata, ma la patata sta perdendo scaglie.
        #JNSQscience_bd_pegasus_DakInSpaceLow_01 = Diversi impatti arrivano sospettosamente lenti. O Dak ha un alone di polvere, oppure qualcuno ha rovesciato degli snack vicino al sensore.
        #JNSQscience_bd_pegasus_DakInSpaceHigh_00 = Quasi nulla, poi un singolo tonfo. Il Controllo Missione lo etichetta come "schegge misteriose di patata" e va avanti.
        #JNSQscience_bd_pegasus_DakInSpaceHigh_01 = I colpi sono sporadici e con tempi strani, come se Dak lanciasse in silenzio sassolini ogni volta che non stai guardando.
        #JNSQscience_bd_pegasus_DresInSpaceLow_00 = Il rilevatore scatta più del previsto per un mondo dall'aria così tranquilla. Dres potrebbe nascondere più della sua sola reputazione.
        #JNSQscience_bd_pegasus_DresInSpaceLow_01 = Una stretta fascia di impatti si ripete a ogni orbita. La segni come "possibile corsia di detriti" e la sottolinei due volte.
        #JNSQscience_bd_pegasus_DresInSpaceHigh_00 = Quassù gli impatti arrivano come colpi solitari e impazienti, come se l'universo controllasse se stai ancora prestando attenzione.
        #JNSQscience_bd_pegasus_DresInSpaceHigh_01 = Il conteggio cala bruscamente con la quota, ma la particella veloce occasionale ti ricorda comunque perché esistono gli scudi.
        #JNSQscience_bd_pegasus_JoolInSpaceLow_00 = Il contatore degli impatti crepita e poi tace di colpo, come se l'elettronica stesse riconsiderando le proprie scelte di vita vicino a Jool.
        #JNSQscience_bd_pegasus_JoolInSpaceLow_01 = Gli impatti arrivano in raffiche secche e rapide, come se attraversassi bande invisibili di graniglia intrappolata nella presa del gigante.
        #JNSQscience_bd_pegasus_JoolInSpaceHigh_00 = Il rilevatore si calma in quota, ma il colpo occasionale arriva con abbastanza foga da far sobbalzare tutti.
        #JNSQscience_bd_pegasus_JoolInSpaceHigh_01 = Annota meno impatti in generale: a quanto pare perfino i micrometeoroidi preferiscono non restare quassù a lungo.
        #JNSQscience_bd_pegasus_LaytheInSpaceLow_00 = Una pioggerellina costante di piccoli impatti suggerisce che i dintorni di Laythe siano pieni di polvere fin troppo zelante.
        #JNSQscience_bd_pegasus_LaytheInSpaceLow_01 = Diversi tocchi coincidono con un passaggio a bassa quota: qualcuno annota "prima aerofrenata, poi sabbiatura."
        #JNSQscience_bd_pegasus_LaytheInSpaceHigh_00 = Il tasso d'impatto cala, lasciando solo qualche ping occasionale a impedirti di rilassarti.
        #JNSQscience_bd_pegasus_LaytheInSpaceHigh_01 = Qualche colpo lento e morbido sembra più fiocchi alla deriva che vere rocce spaziali.
        #JNSQscience_bd_pegasus_VallInSpaceLow_00 = Il sensore registra ticchettii deboli e rapidi: granelli di ghiaccio, polvere, o una "neve" indesiderata in orbita.
        #JNSQscience_bd_pegasus_VallInSpaceLow_01 = Gli impatti arrivano in gruppi che si ripetono a ogni orbita, come se Vall lasciasse briciole lungo una traiettoria ben battuta.
        #JNSQscience_bd_pegasus_VallInSpaceHigh_00 = Per la maggior parte del tempo è silenzio: quando non lo è, gli impatti suonano fragili, come minuscole schegge.
        #JNSQscience_bd_pegasus_VallInSpaceHigh_01 = Il rilevatore registra colpi rari ma energetici: il freddo non rende lo spazio più gentile.
        #JNSQscience_bd_pegasus_TyloInSpaceLow_00 = Gli impatti sono frequenti e secchi, come se Tylo lanciasse verso l'alto materiale espulso solo per dimostrare qualcosa.
        #JNSQscience_bd_pegasus_TyloInSpaceLow_01 = Una lunga serie di ping fa ricontrollare all'equipaggio che la nave non si stia disintegrando di nascosto.
        #JNSQscience_bd_pegasus_TyloInSpaceHigh_00 = Più in alto, i tocchi diventano rari, ma ognuno sembra muoversi molto, molto in fretta.
        #JNSQscience_bd_pegasus_TyloInSpaceHigh_01 = Lo strumento mostra puliti vuoti ripetuti nei dati: l'orbita di Tylo sembra "ripulita", non sicura.
        #JNSQscience_bd_pegasus_BopInSpaceLow_00 = Il rilevatore alterna silenzio e improvvisi crepitii, come se stessi fluttuando nel cassetto delle cianfrusaglie personale di Bop.
        #JNSQscience_bd_pegasus_BopInSpaceLow_01 = Diversi impatti risultano insolitamente lenti. Li etichetti come "ghiaia galleggiante" e vai avanti.
        #JNSQscience_bd_pegasus_BopInSpaceHigh_00 = Impatti radi, angoli strani e nessun schema chiaro: il solito Bop.
        #JNSQscience_bd_pegasus_BopInSpaceHigh_01 = Un tonfo solitario rompe la monotonia e ti ricorda che lo "spazio vuoto" è marketing.
        #JNSQscience_bd_pegasus_PolInSpaceLow_00 = Un lieve, persistente ticchettio suggerisce che Pol stia perdendo continuamente polvere nel vuoto.
        #JNSQscience_bd_pegasus_PolInSpaceLow_01 = Gli impatti sono così delicati che sembrano elettricità statica, finché una zona più densa fa cantare il contatore.
        #JNSQscience_bd_pegasus_PolInSpaceHigh_00 = Il tasso di colpi diminuisce, ma le poche particelle che arrivano trovano comunque il sensore con un'irritante precisione.
        #JNSQscience_bd_pegasus_PolInSpaceHigh_01 = Hai lunghi tratti tranquilli punteggiati da minuscoli tocchi, come se Pol salutasse da molto più in basso con granelli di lanugine.
        #JNSQscience_bd_pegasus_LindorInSpaceLow_00 = Il rilevatore crepita in raffiche irregolari, come se i campi invisibili di Lindor stessero radunando la polvere in piccoli agguati ordinati.
        #JNSQscience_bd_pegasus_LindorInSpaceLow_01 = Gli impatti arrivano con un'energia sorprendente: segni i dati come "per favore non sostare qui a lungo."
        #JNSQscience_bd_pegasus_LindorInSpaceHigh_00 = Il tasso di colpi diminuisce, ma il ping occasionale arriva ancora rovente: quassù lontano nulla rallenta.
        #JNSQscience_bd_pegasus_LindorInSpaceHigh_01 = Un debole schema ripetuto suggerisce un'ampia corsia di detriti che circonda Lindor come un'etichetta di avvertimento.
        #JNSQscience_bd_pegasus_KrelInSpaceLow_00 = Tappi radi, poi un improvviso crepitio: l'orbita di Krel sembra tranquilla finché non smette di esserlo.
        #JNSQscience_bd_pegasus_KrelInSpaceLow_01 = Diversi colpi arrivano dalla stessa direzione, ancora e ancora, come se stessi attraversando un flusso di graniglia molto antico e molto ostinato.
        #JNSQscience_bd_pegasus_KrelInSpaceHigh_00 = Lunghi silenzi spezzati da singoli colpi secchi: l'ambiente di micrometeoroidi qui serve soprattutto a mettere alla prova la pazienza.
        #JNSQscience_bd_pegasus_KrelInSpaceHigh_01 = Il rilevatore registra alcune particelle veloci senza alcun preavviso, che a quanto pare è il tema.
        #JNSQscience_bd_pegasus_AdenInSpaceLow_00 = Il contatore ticchetta con regolarità, come se Aden fosse circondato da un sottile alone di briciole vaganti.
        #JNSQscience_bd_pegasus_AdenInSpaceLow_01 = Un breve picco di impatti coincide con una manovra recente. Qualcuno cerchia in silenzio "controllare pannelli allentati."
        #JNSQscience_bd_pegasus_AdenInSpaceHigh_00 = Quassù gli impatti sono rari ma decisi: ognuno suona come un promemoria, non come una misura.
        #JNSQscience_bd_pegasus_AdenInSpaceHigh_01 = I dati suggeriscono un campo di detriti ampio e diffuso: non abbastanza denso da vederlo, ma abbastanza denso da notarlo.
        #JNSQscience_bd_pegasus_HuygenInSpaceLow_00 = Il tasso d'impatto scende a un livello sospettosamente basso: l'aria spessa di Huygen sembra inghiottire le particelle più piccole prima che ti raggiungano.
        #JNSQscience_bd_pegasus_HuygenInSpaceLow_01 = Un lieve ticchettio diventa silenzio mentre sali: qualunque cosa stessi colpendo più in basso non aveva voglia di seguirti.
        #JNSQscience_bd_pegasus_HuygenInSpaceHigh_00 = Il rilevatore torna alla normalità, registrando piccoli ping netti da polvere ad alta velocità.
        #JNSQscience_bd_pegasus_HuygenInSpaceHigh_01 = Gruppi occasionali arrivano in pacchetti ordinati, come se stessi intercettando il bordo di un lungo e sottile flusso.
        #JNSQscience_bd_pegasus_RigaInSpaceLow_00 = Un fine ticchettio costante suggerisce che i dintorni di Riga siano pieni di particelle minuscole e ostinate.
        #JNSQscience_bd_pegasus_RigaInSpaceLow_01 = Gli impatti arrivano in onde gentili che si ripetono a ogni orbita: contrassegni la fascia per futuri piani "non sostare".
        #JNSQscience_bd_pegasus_RigaInSpaceHigh_00 = Il contatore si rilassa, ma i pochi colpi che ricevi arrivano rapidi e puliti.
        #JNSQscience_bd_pegasus_RigaInSpaceHigh_01 = Una manciata di impatti mostra energie stranamente simili, suggerendo una fonte comune che si sta consumando da secoli.
        #JNSQscience_bd_pegasus_TalosInSpaceLow_00 = Il rilevatore alterna il nulla a improvvise raffiche, come se Talos si trascinasse dietro una scia sfilacciata.
        #JNSQscience_bd_pegasus_TalosInSpaceLow_01 = Diversi impatti risultano lenti e morbidi, più graniglia alla deriva che vera roccia spaziale.
        #JNSQscience_bd_pegasus_TalosInSpaceHigh_00 = Perlopiù silenzio, con ping secchi occasionali che suonano fin troppo sicuri per un posto così vuoto.
        #JNSQscience_bd_pegasus_TalosInSpaceHigh_01 = Un colpo solitario centra il sensore proprio al centro, come se l'universo stesse ancora tenendo il conto.
        #JNSQscience_bd_pegasus_EelooInSpaceLow_00 = Il rilevatore resta perlopiù in silenzio, poi ticchetta in brevi raffiche, come se stessi sfiorando un sottile velo di graniglia ghiacciata.
        #JNSQscience_bd_pegasus_EelooInSpaceLow_01 = Alcuni impatti sono abbastanza secchi da far guardare l'equipaggio verso lo scafo, anche se va "probabilmente tutto bene".
        #JNSQscience_bd_pegasus_EelooInSpaceHigh_00 = Meno colpi quassù, ma quelli che arrivano sono particelle veloci, fredde e antiche, senza nulla che le rallenti.
        #JNSQscience_bd_pegasus_EelooInSpaceHigh_01 = Il contatore resta calmo per un'eternità, poi emette un ping netto come per dimostrare che funziona ancora.
        #JNSQscience_bd_pegasus_CelesInSpaceLow_00 = Una pioggerellina costante di minuscoli impatti suggerisce che Celes mantenga vicino un debole alone di polvere, come una scia di briciole grande quanto una luna.
        #JNSQscience_bd_pegasus_CelesInSpaceLow_01 = Gli impatti risultano stranamente "morbidi" nelle letture: particelle fini, non vere rocce.
        #JNSQscience_bd_pegasus_CelesInSpaceHigh_00 = Il tasso di colpi cala rapidamente con la quota: qualunque cosa circondi Celes preferisce restare vicino a casa.
        #JNSQscience_bd_pegasus_CelesInSpaceHigh_01 = Registri alcuni ping isolati e un'enorme quantità di spazio vuoto.
        #JNSQscience_bd_pegasus_TamInSpaceLow_00 = Il rilevatore crepita in raffiche irregolari, come se Tam fosse un mucchio instabile che non smette di perdere briciole.
        #JNSQscience_bd_pegasus_TamInSpaceLow_01 = Diversi colpi arrivano lenti e gentili, più ghiaia alla deriva che micrometeoriti.
        #JNSQscience_bd_pegasus_TamInSpaceHigh_00 = Quassù è silenzio, poi all'improvviso rumore, poi di nuovo silenzio: attraversare l'orbita di Tam è come scavalcare detriti sparsi.
        #JNSQscience_bd_pegasus_TamInSpaceHigh_01 = Un tonfo deciso arriva senza preavviso, e il Controllo Missione chiede con garbo se sia "caduto qualcosa".
        #JNSQscience_bd_pegasus_HamekInSpaceLow_00 = Il contatore ticchetta con regolarità, come se i dintorni di Hamek fossero pieni di polvere fine che rifiuta di depositarsi da qualunque parte.
        #JNSQscience_bd_pegasus_HamekInSpaceLow_01 = Una fascia ripetuta di impatti compare a ogni orbita: la contrassegni come corsia "non sostare".
        #JNSQscience_bd_pegasus_HamekInSpaceHigh_00 = Gli impatti diventano rari ma energetici: quando qualcosa colpisce quassù, ci mette davvero impegno.
        #JNSQscience_bd_pegasus_HamekInSpaceHigh_01 = Lunghi tratti di nulla, poi un piccolo gruppo ordinato di ping, come se avessi sfiorato il bordo di un flusso invisibile.
        #JNSQscience_bd_pegasus_NaraInSpaceLow_00 = Il rilevatore ticchetta come se stessi volando attraverso graniglia di ghiaccio smossa. La gravità di Nara è chiaramente quella che la smuove.
        #JNSQscience_bd_pegasus_NaraInSpaceLow_01 = Una fitta pioggia di minuscoli impatti suggerisce un quartiere molto attivo: lo spazio "vuoto" qui è più che altro un'idea.
        #JNSQscience_bd_pegasus_NaraInSpaceHigh_00 = Il conteggio cala, ma ogni colpo arriva veloce, come particelle antiche che hanno avuto molto tempo per arrabbiarsi.
        #JNSQscience_bd_pegasus_NaraInSpaceHigh_01 = Lunghi tratti di quiete si spezzano in brevi raffiche, come se stessi attraversando i bordi di flussi invisibili di detriti.
        #JNSQscience_bd_pegasus_AmosInSpaceLow_00 = Un lieve, persistente ticchettio compare vicino ad Amos, come se la luna trascinasse lungo la sua orbita un sottile nastro di polvere.
        #JNSQscience_bd_pegasus_AmosInSpaceLow_01 = Diversi impatti risultano insolitamente delicati. Congratulazioni, hai scoperto le "micro briciole di luna".
        #JNSQscience_bd_pegasus_AmosInSpaceHigh_00 = I tocchi diventano rari e ordinati, come se la maggior parte del materiale libero preferisse restare vicino ad Amos.
        #JNSQscience_bd_pegasus_AmosInSpaceHigh_01 = Un ping secco interrompe il silenzio e ti ricorda che anche il "nulla" ha massa.
        #JNSQscience_bd_pegasus_EnonInSpaceLow_00 = Il sensore registra piccoli colpi fragili che nelle letture somigliano in modo sospetto a granelli di ghiaccio.
        #JNSQscience_bd_pegasus_EnonInSpaceLow_01 = Una fascia ripetuta di impatti coincide con la tua traccia al suolo. Enon sembra avere una propria debole corsia di detriti.
        #JNSQscience_bd_pegasus_EnonInSpaceHigh_00 = Quassù gli impatti si diradano in singoli colpi occasionali, perlopiù residui del sistema di passaggio.
        #JNSQscience_bd_pegasus_EnonInSpaceHigh_01 = Alcune particelle colpiscono con un'energia sorprendente per un posto così tranquillo. Il sistema di Nara non spreca velocità.
        #JNSQscience_bd_pegasus_PraxInSpaceLow_00 = Il rilevatore crepita in brevi raffiche, come se Prax fosse seguito da un alone instabile di graniglia che non riesce a staccarsi.
        #JNSQscience_bd_pegasus_PraxInSpaceLow_01 = Gli impatti arrivano da angoli strani senza alcuno schema. "Condizioni da frontiera" è a quanto pare un termine scientifico.
        #JNSQscience_bd_pegasus_PraxInSpaceHigh_00 = L'ambiente sembra quasi vuoto finché un piccolo gruppo di ping mostra che hai sfiorato il bordo di un flusso vagante.
        #JNSQscience_bd_pegasus_PraxInSpaceHigh_01 = Lungo silenzio, poi un singolo colpo deciso: lo spazio conserva ancora le ricevute, anche quassù.

        // bd_Photometer
        #JNSQscience_bd_Photometer_EdnaInSpaceLow_00 = Il fotometro fatica a distinguere Edna dal campo stellare finché alcune chiazze stranamente luminose scorrono nel campo visivo. Qualunque cosa ci sia laggiù, sta facendo del suo meglio per sembrare "niente".
        #JNSQscience_bd_Photometer_EdnaInSpaceHigh_00 = La luminosità integrata risulta "fioca, ma ostinatamente costante". Il Controllo Missione suggerisce che stai misurando il più tenace granellino dell'universo.
        #JNSQscience_bd_Photometer_DakInSpaceLow_00 = La curva di luce rimbalza ovunque mentre Dak ruota su sé stesso, alternando opacità polverosa e brevi lampi che attirano l'attenzione. Gli scienziati insistono che sia normale: gli ingegneri insistono di no.
        #JNSQscience_bd_Photometer_DakInSpaceHigh_00 = Dak si nota a malapena finché non ruota nel modo giusto e "ping" sul sensore, come se volesse farsi notare. Decidi che il "canto della sirena" è probabilmente solo geometria. Probabilmente.
        #JNSQscience_bd_Photometer_DresInSpaceLow_00 = Le letture di albedo mostrano una superficie pallida con striature più scure sparse, che non combaciano con il semplice modello "roccia noiosa". Contrassegni le zone più luminose per "futuro ottimismo da pannelli solari".
        #JNSQscience_bd_Photometer_DresInSpaceHigh_00 = La luminosità complessiva di Dres è più alta del previsto per qualcosa che si impegna così tanto a nascondersi in piena vista. Il team di colonizzazione inizia a litigare sui colori della vernice per il primo habitat.
        #JNSQscience_bd_Photometer_LindorInSpaceLow_00 = Il fotometro mappa bande luminose e alcuni vortici ostinatamente scuri sulla faccia di Lindor. Il Controllo Missione chiede se le macchie fioche siano "acqua", "cioccolato" o "errore dello strumento".
        #JNSQscience_bd_Photometer_LindorInSpaceHigh_00 = Da molto lontano Lindor sembra una calma moneta azzurrina, finché i numeri non dicono che non è affatto calma. Archivi il rapporto sotto "bugie educate raccontate dai pianeti lontani".
        #JNSQscience_bd_Photometer_KrelInSpaceLow_00 = Da vicino, la superficie chiara di Krel mostra sottili "vene" più scure che fanno saltare la luminosità a ogni rotazione. Qualcuno in fondo borbotta che la luna è di nuovo vanitosa.
        #JNSQscience_bd_Photometer_KrelInSpaceHigh_00 = Krel quasi scompare nell'abbagliamento e nella luce riflessa attorno al suo primario, ma una sottrazione accurata lascia un debole scintillio stabile. Gli scienziati esultano perché hanno misurato con successo "quasi niente".
        #JNSQscience_bd_Photometer_AdenInSpaceLow_00 = L'albedo complessiva di Aden è deprimente, ma alcune pagliuzze più chiare guizzano sul sensore come vernice scrostata. I "vecchi scienziati con l'afro" sarebbero entusiasti che tu l'abbia annotato.
        #JNSQscience_bd_Photometer_AdenInSpaceHigh_00 = A questa distanza Aden è solo un punto con un battito, piccoli sfarfallii regolari mentre ruota. È un metronomo fatto di marmo marrone.
        #JNSQscience_bd_Photometer_HuygenInSpaceLow_00 = La lucentezza ambrata e velata di Huygen ammorbidisce ogni transizione di luminosità, come se stessi misurando la luce attraverso vetro satinato. È chiaro che l'atmosfera sta facendo quasi tutto il discorso.
        #JNSQscience_bd_Photometer_HuygenInSpaceHigh_00 = Anche da molto lontano, Huygen resta stranamente caldo nei toni rispetto ai vicini. Il dibattito passa da "è ostile?" a "sta fingendo di non esserlo?"
        #JNSQscience_bd_Photometer_RigaInSpaceLow_00 = I livelli di luce di Riga mostrano un'ampia macchia dall'aspetto familiare che mette a disagio il team in modo nostalgico. Aggiungi una nota: "somiglianza con il pianeta natale non validata statisticamente".
        #JNSQscience_bd_Photometer_RigaInSpaceHigh_00 = Riga mantiene una luminosità stabile, brunastra, con solo lievi variazioni. Se c'è davvero della foschia, è abbastanza sottile da far litigare tutti sulla calibrazione.
        #JNSQscience_bd_Photometer_TalosInSpaceLow_00 = Le forti colorazioni di Talos si traducono in contrasti fotometrici netti che quasi mandano il sensore a fondo scala al picco di luminosità. Segnali le strisce ad alta albedo come "bersagli invitanti".
        #JNSQscience_bd_Photometer_TalosInSpaceHigh_00 = Talos produce ancora una curva di luce bicolore marcata dallo spazio alto, come se stesse pubblicizzando le sue qualità migliori. La raccomandazione conclusiva è semplicemente: "andateci e sceglietene una".
        #JNSQscience_bd_Photometer_CelesInSpaceLow_00 = Il fotometro rileva alcuni picchi luminosi insolitamente netti che non rientrano in "solo roccia". Quando chiedi ai team di ricerca, rispondono "NDA".
        #JNSQscience_bd_Photometer_CelesInSpaceHigh_00 = Da molto in alto, Celes sembra una luna perfettamente ordinaria e ostinatamente opaca. I numeri insistono che è ordinaria in modo fin troppo perfetto.
        #JNSQscience_bd_Photometer_TamInSpaceLow_00 = La curva di luce di Tam sobbalza selvaggiamente mentre il piccolo frammento irregolare gira capovolgendosi. Il miglior riassunto scientifico è: "ghiaia ostile, confermata".
        #JNSQscience_bd_Photometer_TamInSpaceHigh_00 = Da lontano, Tam è quasi assenza, luce riflessa appena sufficiente a tenere il sensore sicuro che sia ancora lì. Kuiper Kerman sarebbe fiero di quanto si impegna a nascondersi.
        #JNSQscience_bd_Photometer_HamekInSpaceLow_00 = Le letture tornano con una marcata dominante rossastra che fa litigare il team di calibrazione tra loro e con lo strumento. Qualunque cosa componga Hamek, è davvero determinata a essere di quel colore.
        #JNSQscience_bd_Photometer_HamekInSpaceHigh_00 = Anche da lontano, Hamek rifiuta di sembrare neutro: luminosità e tinta restano sbagliate nello stesso identico modo a ogni passaggio. La nota ufficiale dice: "spiegazione in sospeso: inquietudine in aumento".
        #JNSQscience_bd_Photometer_NaraInSpaceLow_00 = Il fotometro vede un mondo fioco avvolto in un alone tenue e sovradimensionato. Le letture suggeriscono un involucro spesso che diffonde la luce e fa del suo meglio per nascondere ciò che c'è sotto.
        #JNSQscience_bd_Photometer_NaraInSpaceHigh_00 = Anche da molto lontano, la luminosità di Nara si rifiuta di comportarsi come semplice roccia nuda. Il modello migliore include alte nubi riflettenti e molte domande senza risposta.
        #JNSQscience_bd_Photometer_AmosInSpaceLow_00 = Amos risulta "scuro, più scuro, scurissimo", con alcuni graffi luminosi e netti che guizzano mentre ruota. Li segni come ghiaccio esposto o il più piccolo riflettore dell'universo.
        #JNSQscience_bd_Photometer_AmosInSpaceHigh_00 = A distanza, Amos viene quasi inghiottito dallo sfondo. Il fotometro conferma che esiste, soprattutto dimostrando che riesce a malapena a vederlo.
        #JNSQscience_bd_Photometer_EnonInSpaceLow_00 = Il sensore si lamenta subito di essere abbagliato. La superficie di Enon è così brillante e pulita che il controllo di guadagno inizia a negoziare un'indennità di rischio.
        #JNSQscience_bd_Photometer_EnonInSpaceHigh_00 = Enon resta vistosamente visibile anche quassù, brillando come una lanterna fredda. La curva di luce è abbastanza stabile da rendere sospettosi gli scienziati.
        #JNSQscience_bd_Photometer_PraxInSpaceLow_00 = Prax mostra un mosaico di variazioni di luminosità moderate a ogni rotazione, come un cuscinetto a sfera graffiato che rotola sotto una lampada. Il "mondo di frontiera" ha molta trama per qualcosa così lontano.
        #JNSQscience_bd_Photometer_PraxInSpaceHigh_00 = Dallo spazio alto, Prax è un piccolo punto ostinato con uno sfarfallio ripetuto. Il fotometro lo archivia sotto "regolarmente irregolare", che a quanto pare è una categoria vera adesso.

        // bd_poke
        #JNSQscience_bd_poke_MohoSrfLandedPoles_00 = La superficie è fragile e granulosa: si spacca prima che la sonda incontri roccia tenace.
        #JNSQscience_bd_poke_MohoSrfLandedLowlands_00 = La polvere cotta si comprime in un tappo duro attorno all'asta quasi subito.
        #JNSQscience_bd_poke_MohoSrfLandedPolarIceCraters_00 = Uno strato chiaro e croccante cede, poi la punta urta qualcosa che sembra pietra congelata.
        #JNSQscience_bd_poke_MohoSrfLandedHighlands_00 = Il terreno è tagliente e fratturato: la sonda riesce solo a una penetrazione superficiale e graffiante.
        #JNSQscience_bd_poke_MohoSrfLandedMidlands_00 = La polvere fine cede con garbo, poi si compatta in un pacco denso, cotto dal calore.
        #JNSQscience_bd_poke_MohoSrfLandedCraters_00 = Il materiale espulso sciolto crolla attorno alla sonda: la profondità aumenta in fretta prima che la resistenza cresca.
        #JNSQscience_bd_poke_MohoSrfLandedExoticCraters_00 = La punta scivola su una macchia vitrea, poi cade in graniglia più morbida: il grafico sembra pieno di picchi.
        #JNSQscience_bd_poke_MohoSrfLandedRareCraters_00 = Detriti dall'aria recente sono soffici all'inizio, poi si compattano duri mentre continui a spingere.
        #JNSQscience_bd_poke_MohoSrfLandedVoronoiCraters_00 = La sonda alterna "facile" e "no" in chiazze ripetute sul terreno.
        #JNSQscience_bd_poke_MohoSrfLandedNotableCraters_00 = Una spessa coperta di macerie scricchiola forte e poi stringe l'asta come se fosse offesa.
        #JNSQscience_bd_poke_MohoSrfLandedPeaks_00 = Quassù c'è a malapena del suolo: la sonda dà solo un colpetto alla roccia e riporta "roccia".
        #JNSQscience_bd_poke_EveSrfLandedPoles_00 = La superficie è densa e leggermente appiccicosa: la sonda affonda lentamente, come se il terreno ci stesse pensando.
        #JNSQscience_bd_poke_EveSrfLandedLowlands_00 = Il suolo viola si schiaccia, poi si stringe attorno all'asta con inquietante entusiasmo.
        #JNSQscience_bd_poke_EveSrfLandedMidlands_00 = Inizia morbido, poi diventa ostinatamente compatto: la pressione quaggiù fa metà del lavoro per te.
        #JNSQscience_bd_poke_EveSrfLandedHighlands_00 = Il terreno è secco e compattato: la penetrazione è scarsa e la sonda cigola in protesta.
        #JNSQscience_bd_poke_EveSrfLandedPeaks_00 = Copertura sottile e granulosa su un substrato duro: la sonda va subito a fondo corsa e finge che fosse il piano.
        #JNSQscience_bd_poke_EveSrfLandedMountains_00 = La sonda incontra materiale fratturato sotto un sottile velo di polvere: le letture saltano a ogni strato croccante.
        #JNSQscience_bd_poke_EveSrfLandedShores_00 = Fango bagnato e pesante oppone poca resistenza all'inizio, poi si aggrappa all'asta come se volesse venire con te.
        #JNSQscience_bd_poke_EveSrfLandedKrakensWell_00 = La superficie cede giusto un poco... poi continua a cedere: la lettura di profondità diventa scomodamente ottimista.
        #JNSQscience_bd_poke_GillySrfLandedLowlands_00 = La sonda entra, e il lander prova ad allontanarsi alla deriva: il "suolo" è quasi solo polvere che fluttua.
        #JNSQscience_bd_poke_GillySrfLandedMidlands_00 = Basta una lieve pressione per far affondare l'asta, ma il terreno offre quasi zero resistenza coerente.
        #JNSQscience_bd_poke_GillySrfLandedHighlands_00 = Tocchi la superficie e sembra che tutto il fianco della collina voglia andarsene: il materiale è sciolto e poco disposto a restare fermo.
        #JNSQscience_bd_poke_KerbinSrfLandedAdministration_00 = Spingi il penetrometro nel tappeto finché non colpisce qualcosa di inflessibile: la politica. La receptionist ti porge un modulo di "Incidente di integrità del pavimento".
        #JNSQscience_bd_poke_KerbinSrfLandedAstronautComplex_00 = Il divano oppone poca resistenza finché non urti un leggendario strato di briciole. L'equipaggio insiste che sia "imbottitura strutturale".
        #JNSQscience_bd_poke_KerbinSrfLandedBaikerbanur_00 = Il terreno polveroso si compatta bene, poi si rifiuta di cedere, proprio come la coda della burocrazia locale. I tuoi appunti ricevono due timbri extra per "compattezza".
        #JNSQscience_bd_poke_KerbinSrfLandedBaikerbanurLaunchpad_00 = La superficie della rampa ride della tua sonda, così provi una crepa sul bordo. Un addetto alla sicurezza spiega che le "zone di poke approvate" sono chiaramente segnate (da qualche parte).
        #JNSQscience_bd_poke_KerbinSrfLandedCrawlerway_00 = La ghiaia cede, il catrame resiste e la sonda torna con un nuovo rivestimento. La squadra del cingolato lo chiama "normale scienza dell'adesione" e ti chiede di smetterla.
        #JNSQscience_bd_poke_KerbinSrfLandedFlagPole_00 = Il suolo è soffice finché non incontri le fondamenta. Una guardia ti informa con garbo che la bandiera è sostenuta da "durezza classificata".
        #JNSQscience_bd_poke_KerbinSrfLandedIslandAirfield_00 = L'asfalto è ostinato e il terreno accanto è fradicio e confuso. Il tuo grafico sembra aver avuto una lunga giornata vicino all'oceano.
        #JNSQscience_bd_poke_KerbinSrfLandedKSC_00 = Scegli un angolo di terreno innocente e trovi subito un condotto per cavi interrato. Gli ingegneri applaudono il tuo "eccellente metodo di rilevamento" e confiscano la sonda.
        #JNSQscience_bd_poke_KerbinSrfLandedLaunchPad_00 = Il cemento è duro come roccia finché un ciclo di sfiato nebulizza tutto e trasforma lo strato superiore in una pasta scivolosa. Registri un drammatico cambiamento di fase e una sirena d'avviso più rumorosa.
        #JNSQscience_bd_poke_KerbinSrfLandedMissionControl_00 = Il pavimento è troppo lucidato per essere punzecchiato senza autorizzazione, quindi provi invece una fioriera d'angolo. Il Controllo Missione dichiara il suolo "non operativo" e vuole comunque il rapporto.
        #JNSQscience_bd_poke_KerbinSrfLandedR&D_00 = Il campione resiste alla penetrazione in modi che suggeriscono sia stato progettato apposta. Uno scienziato nota che è "comportamento previsto" e chiude a chiave l'armadietto.
        #JNSQscience_bd_poke_KerbinSrfLandedR&DCentralBuilding_00 = La sonda intacca appena il pavimento immacolato prima che compaia un tirocinante allarmato con nastro, coni e moduli. Il risultato viene archiviato sotto "interazione non programmata con la superficie".
        #JNSQscience_bd_poke_KerbinSrfLandedR&DCornerLab_00 = Il materiale cede come schiuma, poi rimbalza come se fosse offeso. Qualcuno sussurra che hai scoperto il "composito anti-poke prototipo".
        #JNSQscience_bd_poke_KerbinSrfLandedR&DMainBuilding_00 = La sonda affonda liscia finché un banco prova lì vicino vibra e le letture diventano interpretative. Gli ingegneri suggeriscono di chiamarla "coesione dinamica".
        #JNSQscience_bd_poke_KerbinSrfLandedR&DObservatory_00 = Un sottile strato di polvere cede a una base di piattaforma molto ostinata. L'astronomo ti chiede di tenere la tua scienza "sotto le ottiche".
        #JNSQscience_bd_poke_KerbinSrfLandedR&DSideLab_00 = Affondi la sonda in un vassoio di "suolo del tutto normale" e urti una rete nascosta a esattamente 3 cm. Il tecnico sorride e dice: "Funzione di calibrazione".
        #JNSQscience_bd_poke_KerbinSrfLandedR&DSmallLab_00 = Il campione è sospettosamente uniforme e ferma la sonda a una profondità perfettamente ripetibile. Lo scienziato chiede come ti senti a firmare un accordo di riservatezza.
        #JNSQscience_bd_poke_KerbinSrfLandedR&DTanks_00 = Il terreno attorno ai serbatoi è compattato alla durezza "per favore non assestarti". La tua sonda rimbalza leggermente, come se lo sapesse.
        #JNSQscience_bd_poke_KerbinSrfLandedR&DWindTunnel_00 = La superficie cede, poi parte la galleria del vento e sabbia i tuoi appunti trasformandoli in nuova punteggiatura. La conclusione ufficiale è "variabile con il vento".
        #JNSQscience_bd_poke_KerbinSrfLandedRunway_00 = La pista è praticamente impunzecchiabile, il che è rassicurante per l'atterraggio. Il personale di terra ti chiede di tenere la sonda lontana da qualunque cosa abbia ruote o orari.
        #JNSQscience_bd_poke_KerbinSrfLandedSPH_00 = Il pavimento dell'hangar è robusto, ma i rivetti sparsi riservano sorprese croccanti. Registri "strato di detriti eterogeneo" e ottieni un cenno stanco da un ingegnere.
        #JNSQscience_bd_poke_KerbinSrfLandedSPHMainBuilding_00 = I giunti di dilatazione accettano la sonda con piacere, poi la bloccano di colpo con un bordo metallico. Un supervisore ti chiede di smettere di "testare i sentimenti dell'edificio".
        #JNSQscience_bd_poke_KerbinSrfLandedSPHRoundTank_00 = Punzecchi l'imbottitura attorno al serbatoio rotondo e cede con uno schiacciamento teatrale. Qualcuno urla: "È isolamento, non un bioma!"
        #JNSQscience_bd_poke_KerbinSrfLandedSPHTanks_00 = Il terreno è solido e ordinato, come se fosse stato compattato da anni di rotolamento di cose pesanti. La sonda torna con un lieve sentore di vernice e rimpianto.
        #JNSQscience_bd_poke_KerbinSrfLandedSPHWaterTower_00 = Il suolo è umido, poi all'improvviso durissimo dove iniziano le fondamenta. L'addetto alla sicurezza consiglia di punzecchiare "lontano dalla parte che gocciola".
        #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationDishEast_00 = La ghiaia scricchiola, poi un vassoio portacavi interrato ferma la sonda come un dito severo. Il tecnico sostiene che l'antenna richieda "organizzazione sotterranea premium".
        #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationDishNorth_00 = Ottieni dati puliti finché l'antenna non ruota e tutti ti guardano come se fossi stato tu. La sonda viene dichiarata "elettromagneticamente sospetta" e accompagnata fuori dalla piattaforma.
        #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationDishSouth_00 = La superficie è compattata, disciplinata e chiaramente mantenuta da qualcuno che detesta le sorprese. La tua sonda non ne trova nessuna, e in qualche modo sembra la sorpresa più grande.
        #JNSQscience_bd_poke_KerbinSrfLandedTrackingStationHub_00 = Il pavimento rifiuta del tutto la penetrazione, quindi provi invece una fessura polverosa in un angolo. Il centro registra la tua attività come "manutenzione" e addebita il conto a R&D.
        #JNSQscience_bd_poke_KerbinSrfLandedVAB_00 = Spingi la sonda nel cemento e incontri subito l'armatura a una profondità poco educata. L'EAV resta in piedi: la tua sonda sporge reclamo.
        #JNSQscience_bd_poke_KerbinSrfLandedVABMainBuilding_00 = La superficie è solida finché una gru lì vicino non brontola e le letture tremano per solidarietà. Gli ingegneri suggeriscono di chiamarla "pseudo-ammorbidimento vibrazionale".
        #JNSQscience_bd_poke_KerbinSrfLandedVABPodMemorial_00 = Esegui un unico poke rispettoso sul bordo del sentiero e ti fermi. Il risultato è "stabile, solenne e decisamente da non ripetere".
        #JNSQscience_bd_poke_KerbinSrfLandedVABRoundTank_00 = La sonda incontra terreno compattato e poi lo sguardo di una guardia. Il serbatoio viene dichiarato "non un bersaglio da poke", cosa che non avevi ancora scritto (ma avresti dovuto).
        #JNSQscience_bd_poke_KerbinSrfLandedVABSouthComplex_00 = Scoria e graniglia formano uno strato croccante sopra un terreno durissimo. I saldatori approvano il tuo "studio della texture" e chiedono di smettere di campionare vicino alle cose calde.
        #JNSQscience_bd_poke_KerbinSrfLandedVABTanks_00 = Il suolo è compattato dal traffico costante e dal panico occasionale. I tuoi dati mostrano alta coesione e una densità ancora maggiore di cartelli "per favore tenersi alla larga".
        #JNSQscience_bd_poke_KerbinSrfLandedWoomerang_00 = Il terreno è solido, poi una raffica ricolloca la tua attrezzatura e la tua sicurezza. Registri la profondità comunque, più o meno da qualunque punto tu finisca.
        #JNSQscience_bd_poke_KerbinSrfLandedLowlands_00 = I bassopiani sono morbidi e un po' umidi: la sonda affonda con piacere.
        #JNSQscience_bd_poke_KerbinSrfLandedMidlands_00 = Le pianure sono elastiche e solide, offrendo una rispettabile resistenza.
        #JNSQscience_bd_poke_KerbinSrfLandedAridLowlands_00 = I bassopiani aridi sono perlopiù graniglia sciolta: l'asta scivola dentro quasi senza sforzo.
        #JNSQscience_bd_poke_KerbinSrfLandedAridMidlands_00 = Le pianure aride hanno uno strato superiore crostoso che cede a materiale più morbido sotto.
        #JNSQscience_bd_poke_KerbinSrfLandedAridHighlands_00 = Le colline aride sono cotte e compattate: la penetrazione è superficiale e ostinata.
        #JNSQscience_bd_poke_KerbinSrfLandedAridMountains_00 = Le montagne aride sono rocciose e spietate: la sonda si ferma con un molto scientifico "clink".
        #JNSQscience_bd_poke_KerbinSrfLandedWelcomeBackIsland_00 = Il terreno qui è stranamente compattato, come se fosse stato pestato e appiattito da eroi di ritorno.
        #JNSQscience_bd_poke_MunSrfLandedPoles_00 = La regolite polare è fredda e ben compattata: incontri materiale solido prima del previsto.
        #JNSQscience_bd_poke_MunSrfLandedHighlands_00 = Le colline sono dure e fratturate: la sonda si rifiuta di entrare più di tanto.
        #JNSQscience_bd_poke_MunSrfLandedMidlands_00 = Le pianure sono uno strato fine e polveroso sopra un terreno compatto: le letture sono piacevolmente noiose.
        #JNSQscience_bd_poke_MunSrfLandedLowlands_00 = I bassopiani hanno polvere più profonda: la sonda affonda di più prima di trovare vera resistenza.
        #JNSQscience_bd_poke_MunSrfLandedPolarIceCraters_00 = Uno strato superiore fragile si sbriciola, poi la punta incontra qualcosa con cui non si negozia.
        #JNSQscience_bd_poke_MunSrfLandedExoticCraters_00 = La superficie alterna croccante e vitreo: i tuoi numeri sembrano confusi.
        #JNSQscience_bd_poke_MunSrfLandedRareCraters_00 = Il materiale è sciolto e rimescolato di fresco: si lascia punzecchiare come se non si fosse ancora assestato.
        #JNSQscience_bd_poke_MunSrfLandedVoronoiCraters_00 = Sembra di punzecchiare un pavimento a piastrelle fatto di polvere e roccia: la resistenza cambia in chiazze ordinate.
        #JNSQscience_bd_poke_MunSrfLandedNotableCraters_00 = Lo strato di materiale espulso è spesso e granuloso: cede all'inizio, poi stringe l'asta con ostinazione.
        #JNSQscience_bd_poke_MunSrfLandedMountains_00 = Inizi appena il test e urti qualcosa di solido: Mun non è impressionata dal tuo punzecchiare.
        #JNSQscience_bd_poke_MinmusSrfLandedPoles_00 = La crosta polare si crepa e scricchiola: sotto, il terreno diventa sorprendentemente rigido.
        #JNSQscience_bd_poke_MinmusSrfLandedLowlands_00 = I bassopiani sono soffici e profondi: la sonda affonda come se avesse trovato un nuovo hobby.
        #JNSQscience_bd_poke_MinmusSrfLandedMidlands_00 = Le pianure sono più compatte di quanto sembrino, con una resistenza leggermente appiccicosa.
        #JNSQscience_bd_poke_MinmusSrfLandedHighlands_00 = Le colline sono lisciate dal vento e robuste: la penetrazione è superficiale e pulita.
        #JNSQscience_bd_poke_MinmusSrfLandedBasins_00 = Il materiale dei bacini è estremamente morbido e fine: non trovi il "fondo" senza impegnarti di più.
        #JNSQscience_bd_poke_MinmusSrfLandedBrownBasins_00 = Il suolo più scuro dei bacini si compatta di più: resiste più del materiale chiaro lì vicino.
        #JNSQscience_bd_poke_MinmusSrfLandedBrownLowlands_00 = I bassopiani marroni si agglomerano e lottano contro la sonda: è come punzecchiare briciole di snack secche.
        #JNSQscience_bd_poke_MinmusSrfLandedBrownMidlands_00 = Le pianure marroni offrono una resistenza moderata con occasionali pezzi croccanti.
        #JNSQscience_bd_poke_MinmusSrfLandedBrownHighlands_00 = Le colline marroni sono incrostate e dure: la sonda protesta tramite vibrazioni.
        #JNSQscience_bd_poke_MinmusSrfLandedMountains_00 = I pendii montani hanno solo un sottile strato di polvere prima che la sonda urti qualcosa di solido.
        #JNSQscience_bd_poke_DunaSrfLandedIceCaps_00 = La sonda scricchiola attraverso una crosta fragile, poi urta qualcosa che sembra cemento congelato.
        #JNSQscience_bd_poke_DunaSrfLandedHighlands_00 = Il terreno delle colline è tagliente e compatto: l'indicazione di forza sale più in fretta del previsto.
        #JNSQscience_bd_poke_DunaSrfLandedMidlands_00 = La fine polvere rossa cede con garbo, poi si stringe attorno all'asta come se volesse tenerla.
        #JNSQscience_bd_poke_DunaSrfLandedLowlands_00 = I bassopiani inghiottono la sonda più di quanto sembrino: lo strato superficiale è spesso e sciolto.
        #JNSQscience_bd_poke_DunaSrfLandedCraters_00 = Il terreno alterna polvere e materiale espulso a pezzi: il profilo di resistenza sembra a grumi.
        #JNSQscience_bd_poke_DunaSrfLandedRareCraters_00 = Detriti dall'aria recente crollano attorno alla sonda: i numeri suggeriscono uno strato soffice e non assestato.
        #JNSQscience_bd_poke_DunaSrfLandedVoronoiCraters_00 = Punzecchiando il terreno a motivi ottieni letture ripetute "morbido duro morbido" in chiazze ordinate.
        #JNSQscience_bd_poke_DunaSrfLandedNotableCraters_00 = Una profonda coperta di macerie scricchiola forte, poi si blocca attorno all'asta con granuloso entusiasmo.
        #JNSQscience_bd_poke_DunaSrfLandedExoticCraters_00 = La punta raschia qualcosa di vitreo prima di scivolare in polvere più fine: il grafico sviluppa picchi.
        #JNSQscience_bd_poke_DunaSrfLandedTrenches_00 = Il fondo delle fosse è compattato e ostinato, come se tutto fosse scivolato qui e si fosse impaccato da solo.
        #JNSQscience_bd_poke_DunaSrfLandedNotablePlains_00 = Il terreno levigato dal vento resiste all'inizio, poi cede con una spinta pulita e uniforme.
        #JNSQscience_bd_poke_DunaSrfLandedNotableMountains_00 = La sonda incontra roccia fratturata sotto un sottile velo di polvere: la penetrazione è superficiale e a scatti.
        #JNSQscience_bd_poke_DunaSrfLandedMountains_00 = Inizi appena e colpisci materiale solido: le montagne si rifiutano di essere infastidite scientificamente.
        #JNSQscience_bd_poke_DunaSrfLandedVolcano_00 = La superficie è scura e fragile: si sbriciola, poi ferma di colpo la sonda come una piastra nascosta.
        #JNSQscience_bd_poke_IkeSrfLandedPoles_00 = La regolite polare è fredda e ben compattata: non lascia entrare la sonda senza lottare.
        #JNSQscience_bd_poke_IkeSrfLandedMountains_00 = Un sottile strato di polvere cede a un terreno duro e a blocchi: l'asta tocca quasi subito qualcosa di solido.
        #JNSQscience_bd_poke_IkeSrfLandedMidlands_00 = Polvere sopra, terreno compatto sotto: un poke ammirevolmente semplice con numeri più che rispettabili.
        #JNSQscience_bd_poke_IkeSrfLandedLowlands_00 = I bassopiani sono più profondi e più sciolti: la sonda affonda di più prima che la resistenza aumenti.
        #JNSQscience_bd_poke_IkeSrfLandedHighlands_00 = Le colline sembrano secche e cementate: la sonda macina dentro con una spinta riluttante e graffiante.
        #JNSQscience_bd_poke_EdnaSrfLandedLowlands_00 = La sonda incontra un sottile strato soffice prima che il terreno diventi ostinatamente compatto.
        #JNSQscience_bd_poke_EdnaSrfLandedMidlands_00 = La polvere si comprime in un tappo solido attorno all'asta: Edna preferisce la polvere già impaccata.
        #JNSQscience_bd_poke_EdnaSrfLandedHighlands_00 = La superficie è granulosa e fratturata: ottieni un poke superficiale e un sacco di risposta graffiante.
        #JNSQscience_bd_poke_EdnaSrfLandedPolarIceCraters_00 = Una crosta fragile scricchiola e cede, poi la punta urta qualcosa di freddo e duro come roccia.
        #JNSQscience_bd_poke_EdnaSrfLandedWhites_00 = Polvere chiara e fine si sposta facilmente, ma si irrigidisce presto in uno strato denso e cigolante.
        #JNSQscience_bd_poke_DakSrfLandedLowlands_00 = La sonda entra quasi senza forza, e il lander prova a ritrarsi dall'"impegno".
        #JNSQscience_bd_poke_DakSrfLandedMidlands_00 = Spingi, la superficie cede, e poi tutto fluttua: la coesione qui è più che altro un'idea.
        #JNSQscience_bd_poke_DakSrfLandedHighlands_00 = Macerie sciolte si spostano sotto la punta: le letture oscillano come se il mondo intero stesse facendo spallucce.
        #JNSQscience_bd_poke_DresSrfLandedPoles_00 = Il suolo è freddo e ben compattato: la sonda morde lentamente, come se stesse forando la pazienza.
        #JNSQscience_bd_poke_DresSrfLandedHighlands_00 = Un sottile velo di polvere nasconde terreno duro: la sonda va a fine corsa con un inutile "tonf".
        #JNSQscience_bd_poke_DresSrfLandedMidlands_00 = La polvere fine cede in modo uniforme, producendo una curva di resistenza meravigliosamente piatta e coerente.
        #JNSQscience_bd_poke_DresSrfLandedLowlands_00 = La sonda affonda in profondità nella regolite morbida prima che la forza inizi finalmente a salire.
        #JNSQscience_bd_poke_DresSrfLandedCanyon_00 = Materiale a strati crolla in piccoli scivolamenti: ogni spinta trova una nuova texture con cui discutere.
        #JNSQscience_bd_poke_LaytheSrfLandedShores_00 = La sonda affonda nella sabbia bagnata e risale con un rivestimento pesante e appiccicoso.
        #JNSQscience_bd_poke_LaytheSrfLandedShallows_00 = Il terreno saturo oppone poca resistenza finché non incontri uno strato compatto e granuloso sotto.
        #JNSQscience_bd_poke_LaytheSrfLandedLowlands_00 = Suolo morbido e umido si comprime facilmente: la curva di forza sale lentamente e con regolarità.
        #JNSQscience_bd_poke_LaytheSrfLandedMidlands_00 = La superficie è elastica all'inizio, poi si compatta come se fosse stata pressata da un meteo implacabile.
        #JNSQscience_bd_poke_LaytheSrfLandedHighlands_00 = Materiale secco e incrostato si oppone alla sonda: l'avanzamento arriva a passi riluttanti e croccanti.
        #JNSQscience_bd_poke_LaytheSrfLandedMountains_00 = C'è solo un sottile velo di materiale sciolto prima che la punta tocchi qualcosa di solido e implacabile.
        #JNSQscience_bd_poke_LaytheSrfLandedIceCaps_00 = Una crosta fragile si frattura nettamente, poi l'asta si ferma contro ghiaccio duro e freddo.
        #JNSQscience_bd_poke_LaytheSrfLandedEnclosedFaults_00 = La sonda trova fratture e vuoti: le letture saltano tra "niente" e "assolutamente no".
        #JNSQscience_bd_poke_VallSrfLandedPoles_00 = La sonda scricchiola in granuli congelati, poi incontra uno strato liscio che rifiuta ogni ulteriore trattativa.
        #JNSQscience_bd_poke_VallSrfLandedLowlands_00 = Brina polverosa crolla attorno all'asta: affonda in profondità prima che la resistenza inizi finalmente a salire.
        #JNSQscience_bd_poke_VallSrfLandedMidlands_00 = Una crosta compatta dà numeri coerenti e noiosi, finché uno strato fragile non si spezza e azzera la curva.
        #JNSQscience_bd_poke_VallSrfLandedHighlands_00 = La superficie è dura e vitrea: la sonda stridula appena mentre si fa strada raschiando.
        #JNSQscience_bd_poke_VallSrfLandedMountains_00 = Polvere sottile sopra un miscuglio fratturato di ghiaccio e roccia: la penetrazione è superficiale e la forza ha picchi irregolari.
        #JNSQscience_bd_poke_TyloSrfLandedPoles_00 = La regolite è ben compattata dalla gravità: la sonda avanza a malapena prima che la forza vada al massimo.
        #JNSQscience_bd_poke_TyloSrfLandedLowlands_00 = Polvere che sembra profonda diventa densa quasi subito: Tylo compatta tutto fino all'obbedienza.
        #JNSQscience_bd_poke_TyloSrfLandedMidlands_00 = La sonda affonda un poco, poi si blocca in materiale compatto e uniforme che sembra meccanicamente "assestato".
        #JNSQscience_bd_poke_TyloSrfLandedHighlands_00 = Detriti grossolani si spostano e si incastrano attorno all'asta: ogni spinta trova un nuovo arresto netto.
        #JNSQscience_bd_poke_TyloSrfLandedMountains_00 = Riesci a fare un poke simbolico prima di colpire terreno solido: la montagna non apprezza gli esperimenti.
        #JNSQscience_bd_poke_BopSrfLandedPoles_00 = La superficie si allontana dalla sonda: registri più "fluttuazione" che "penetrazione".
        #JNSQscience_bd_poke_BopSrfLandedLowlands_00 = Polvere sciolta si apre facilmente, poi scivola di nuovo dentro appena smetti di spingere.
        #JNSQscience_bd_poke_BopSrfLandedMidlands_00 = La sonda affonda con poca forza, ma le letture oscillano mentre tutta la zona si riorganizza.
        #JNSQscience_bd_poke_BopSrfLandedHighlands_00 = Frammenti ghiaiosi rotolano di lato invece di compattarsi: qui la coesione è opzionale.
        #JNSQscience_bd_poke_BopSrfLandedMountains_00 = Punzecchi il pendio e il pendio punzecchia te, provando ad andarsene in una frana al rallentatore.
        #JNSQscience_bd_poke_PolSrfLandedPoles_00 = Il materiale si sbriciola come schiuma secca: la sonda fa un buco che prova subito a diventare due buchi.
        #JNSQscience_bd_poke_PolSrfLandedLowlands_00 = L'asta entra con uno scricchiolio granuloso, come se il terreno fosse fatto di grumi fragili e porosi.
        #JNSQscience_bd_poke_PolSrfLandedMidlands_00 = La resistenza arriva a raffiche improvvise: gli strati alternano morbidezza da polvere e una rigidità insolita.
        #JNSQscience_bd_poke_PolSrfLandedHighlands_00 = Una crosta fragile si frattura in briciole taglienti: la traccia della forza sembra una catena montuosa frastagliata.
        #JNSQscience_bd_poke_PolSrfLandedMountains_00 = La sonda incontra macerie aghiformi che scattano e si spostano: la penetrazione è superficiale e imprevedibile.
        #JNSQscience_bd_poke_KrelSrfLandedLowlands_00 = La polvere chiara si comprime in un bel tappo ordinato attorno all'asta, come se ne andasse fiera.
        #JNSQscience_bd_poke_KrelSrfLandedMidlands_00 = La sonda macina la polvere fine, poi incontra uno strato denso che sembra stranamente "venato" e strutturato.
        #JNSQscience_bd_poke_KrelSrfLandedHighlands_00 = La superficie è fragile e graffiante: ottieni un poke superficiale e una curva di resistenza fin troppo sincera.
        #JNSQscience_bd_poke_KrelSrfLandedPoles_00 = La regolite, fredda e ben compattata, lotta per ogni millimetro: la sonda si ferma corta come se avesse urtato un segreto congelato.
        #JNSQscience_bd_poke_AdenSrfLandedLowlands_00 = Graniglia marrone sciolta cede facilmente, poi all'improvviso si compatta, come se aspettasse da tempo di dire "no".
        #JNSQscience_bd_poke_AdenSrfLandedMidlands_00 = L'asta affonda liscia all'inizio, poi il terreno la afferra con determinazione granulosa.
        #JNSQscience_bd_poke_AdenSrfLandedHighlands_00 = La superficie è dura e fratturata: la sonda vibra e sbatte mentre raschia dentro macerie ostinate.
        #JNSQscience_bd_poke_AdenSrfLandedMountains_00 = C'è a malapena del suolo prima che la punta tocchi roccia solida: Aden presenta un reclamo formale.
        #JNSQscience_bd_poke_AdenSrfLandedPoles_00 = Il materiale polare è freddo e ben compattato: la penetrazione è superficiale e la forza sale in fretta.
        #JNSQscience_bd_poke_HuygenSrfLandedLowlands_00 = Il terreno è morbido e leggermente appiccicoso: la sonda risale ricoperta di fango ostinato, fatto di foschia.
