@EXPERIMENT_DEFINITION:HAS[#id[bd_surveillance]]
{
    %RESULTS
    {
		GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowNorthPolarZone_00 // The camera tries to expose for “surface detail” and instead invents several new shades of red. Mission Control recommends not zooming further.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowNorthSubpolarZone_00 // Dark starspot knots drift through the glare like bruises on a furnace. The optics file a formal complaint.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowNorthTemperateZone_00 // The star’s mottled texture looks like boiling paint seen through heat haze. The downlink arrives late enough to be “historical footage.”
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowNorthTropicZone_00 // A thin band of turbulence snaps into focus, then blooms into white. You label it “interesting” and “do not stare.”
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowEquatorialZone_00 // The equator is a restless seam of shimmer and shadow. Your “reconnaissance” photo is mostly warning icons.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowSouthTropicZone_00 // A tiny flare scratches across the image and is gone before the transmission clears. Out here, even surprises have lag.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowSouthTemperateZone_00 // Convection cells line up like scales under a dim crimson glare. Half the team blames the star, half blames the sensor.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowSouthSubpolarZone_00 // Charged particle noise freckles the frame like sand on a lens. The report reads: “Hostile environment confirmed.”
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_surveillance_GrannusInSpaceLowSouthPolarZone_00 // You keep the shutters conservative and still get a beautiful red smear. The instrument logs it as “SUCCESS (ish).”

        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_surveillance_TaranisInSpaceLowMagmaSea_00 // The magma sea is so bright it looks like someone spilled daylight onto the night side. The image packet is flagged “HOT” by three different systems.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_surveillance_TaranisInSpaceLowMagmaShores_00 // Cracked plates raft along glowing shorelines in slow, patient motion. You can’t tell if it’s geology or the camera sweating.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_surveillance_TaranisInSpaceLowScorchedLowlands_00 // The sunward lowlands shimmer like they’re trying to become vapor. Mission Control asks if the planet is supposed to be incandescent.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_surveillance_TaranisInSpaceLowMidlands_00 // Razor ridges cast hard shadows that don’t look friendly to landers or feelings. You mark them anyway—maps are cheaper than rescues.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_surveillance_TaranisInSpaceLowHighlands_00 // Pale, fractured highlands spread like kiln-fired crust. Someone suggests “snack-colored terrain” and is immediately muted on comms.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_surveillance_TaranisInSpaceLowDarkSideMidlands_00 // Eternal night makes the contrast calm and the details sharp. The only bright thing is the red rim-light from Grannus.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_surveillance_TaranisInSpaceLowDarkSideHighlands_00 // Black peaks sit under starlight like broken glass. The terminator line looks less like dawn and more like a warning label.
        TaranisInSpaceLowPoles* = #GEPscience_bd_surveillance_TaranisInSpaceLowPoles_00 // Near the poles, day and night squeeze close together. The “safe-looking band” is still attached to a very unsafe planet.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_surveillance_ToutatisInSpaceLowSunnyLowlands_00 // The sunny lowlands bake under a dim red sun and a thin haze that can’t hide anything. Every crater looks like it’s judging your trajectory.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_surveillance_ToutatisInSpaceLowSunnyHighlands_00 // Sunlit highlands glow warm and dry, with shadows sharp enough to cut a landing plan in half. You file them under “scenic hazard.”
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_surveillance_ToutatisInSpaceLowTransitionalLowlands_00 // In the twilight belt, shadows stretch for ages and the surface looks almost negotiable. You circle it with a big question mark.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_surveillance_ToutatisInSpaceLowTransitionalHighlands_00 // The transition highlands show baked reds fading into cold grays, like two worlds stitched together. The seam is… unsettlingly neat.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_surveillance_ToutatisInSpaceLowDarkSideLowlands_00 // Night-side basins collect cold and a faint, stubborn haze near the ground. The camera calls it “atmosphere,” very quietly.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_surveillance_ToutatisInSpaceLowDarkSideHighlands_00 // Dark-side highlands are nearly invisible until the red edge-light catches them. You fly over silhouettes and hope the math is right.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_surveillance_ToutatisInSpaceLowSoutheasternMountains_00 // Jagged mountains throw serrated shadows across the slopes. The team nicknames them the “Tooth Range” and stops laughing fast.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_surveillance_ToutatisInSpaceLowWesternMountains_00 // The western peaks look scoured and sharp despite the near-vacuum. Someone blames “mysterious weather” and gets more muting.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_surveillance_ToutatisInSpaceLowDarkSideMountains_00 // Mountains in permanent night barely register except as star-lit outlines. Reconnaissance feels a lot like guesswork at long delay.

        NodensInSpaceLowSaltySeas* = #GEPscience_bd_surveillance_NodensInSpaceLowSaltySeas_00 // The sea flashes dull copper under the red sun, broken by slow swirls of lighter brine. The downlink arrives late, like the planet is taking its time to be seen.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_surveillance_NodensInSpaceLowSaltySeas_01 // Broad, dark water with pale streaks—maybe currents, maybe foam, maybe the camera arguing with haze. Either way, it’s definitely wet-looking from up here.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_surveillance_NodensInSpaceLowFreshWater_00 // Inland waters sit darker and calmer, swallowing the weak sunlight instead of reflecting it. You flag the shorelines as “interesting” and “probably not drinkable without paperwork.”
        NodensInSpaceLowFreshWater* = #GEPscience_bd_surveillance_NodensInSpaceLowFreshWater_01 // Thin cloud shadows skate across the lakes like slow hands over glass. Comms lag turns “real-time monitoring” into “recent history watching.”
        NodensInSpaceLowShores* = #GEPscience_bd_surveillance_NodensInSpaceLowShores_00 // The coasts draw clean curves between land and water, with long, soft shadows in the red dusk. A few stretches look flat enough to be a landing site.
        NodensInSpaceLowShores* = #GEPscience_bd_surveillance_NodensInSpaceLowShores_01 // Sandbars and inlets form a lacework pattern, half-hidden by haze. You mark a wide, pale strand as “outpost maybe,” then remember tides exist.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTropicalLowlands_00 // The lowlands are broad and gently textured, with scattered cloud cover that makes every shadow look suspicious. A smooth patch gets tagged “candidate runway,” pending “not actually swamp.”
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTropicalLowlands_01 // Warm-toned plains roll on under dim light, with faint river scars like old scratches. If you wanted to build something here, you’d start by finding what’s *not* moving.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTemperateLowlands_00 // Temperate plains show crisp boundaries between darker soils and lighter flats, like someone organized the terrain. Several areas look comfortably level for an outpost—comfortably, for Nodens.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTemperateLowlands_01 // The sunlight is weak but steady, and the ground reads clearly through gaps in haze. You take extra frames, because “site survey” sounds better than “guessing.”
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTropicalMidlands_00 // The midlands wrinkle into low ridges and shallow basins, casting long shadows in the red glare. Whatever carved these lines did it patiently.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTropicalMidlands_01 // Cloud gaps reveal patchy terrain that looks almost familiar until you notice the colors are all wrong. You zoom in and the camera politely reminds you about resolution limits.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTemperateMidlands_00 // The midlands alternate between rough uplifts and smoother benches, like natural terraces. One bench looks promising for surface ops, assuming it’s not just “flat-looking rocks.”
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_NodensInSpaceLowTemperateMidlands_01 // A thin haze softens the scene, but ridgelines still stand out sharply. The delay on the signal makes every new feature feel like a discovery someone else already had.
        NodensInSpaceLowHighlands* = #GEPscience_bd_surveillance_NodensInSpaceLowHighlands_00 // Highlands rise in fractured slabs, bright on the edges and dark in the cracks. The terrain looks stable, but “stable” can still mean “very pointy.”
        NodensInSpaceLowHighlands* = #GEPscience_bd_surveillance_NodensInSpaceLowHighlands_01 // Peaks and plateaus cut through the haze like islands in a red ocean of air. A broad plateau earns an “outpost?” marker, followed by a very cautious “maybe.”
        NodensInSpaceLowTundra* = #GEPscience_bd_surveillance_NodensInSpaceLowTundra_00 // The tundra spreads in muted grays and dusty reds, with fewer clouds and clearer sightlines. Wide open flats look inviting—right up until you remember you’re very far from home.
        NodensInSpaceLowTundra* = #GEPscience_bd_surveillance_NodensInSpaceLowTundra_01 // Subtle patterns ripple across the ground, like frost lines or dried flow marks. You suggest a landing test site here, mostly because it’s the least visually threatening option.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_surveillance_NodensInSpaceLowIceCaps_00 // The icecaps reflect a cold, pinkish sheen, crisscrossed by dark fractures that look uncomfortably deep. The camera exposure finally feels happy, which makes you suspicious.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_surveillance_NodensInSpaceLowIceCaps_01 // Bright ice meets the dim red sun and turns the whole pole into a glowing landmark. It’s beautiful in the “do not attempt to set up camp without a plan” way.

        BelisamaInSpaceLowFlats* = #GEPscience_bd_surveillance_BelisamaInSpaceLowFlats_00 // Broad flats slide beneath the lens in slow, dim-red daylight. Nodens hangs in the same patch of sky, like it’s keeping score.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_BelisamaInSpaceLowTropicalLowlands_00 // The lowlands look smooth enough to lull you into optimism—until long shadows reveal subtle ridges everywhere. The time delay makes every “live” pass feel like déjà vu.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_BelisamaInSpaceLowTemperateLowlands_00 // Faint tonal bands suggest different regolith or age, but nothing here reads as simple. You tag a few dark patches as “possibly interesting, possibly just camera noise.”
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_BelisamaInSpaceLowTropicalMidlands_00 // Wrinkled midlands form looping arcs, as if the surface tried to fold itself neatly and failed. The images arrive with a gentle red cast that never quite feels like daylight.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_BelisamaInSpaceLowTemperateMidlands_00 // Broken terrain and shallow basins make a tidy pattern that looks engineered—until you zoom in and remember nature also makes sharp edges. Nodens’ reflected light adds a ghostly second “sun.”
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_surveillance_BelisamaInSpaceLowHighlands_00 // Highlands stand up like cold anvils, their crests catching the weakest glow from Grannus. Even from orbit, the landscape feels… watchful.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_surveillance_BelisamaInSpaceLowPoles_00 // The polar regions blur between light and long-lived shadow, as if day and night can’t agree on the schedule. Mission Control asks for more frames; the reply arrives after the pass is over.

        SucellusInSpaceLowBasins* = #GEPscience_bd_surveillance_SucellusInSpaceLowBasins_00 // Basins lie like scooped-out bowls, dark and quiet under the red sun. A few spots glint oddly, and the team immediately starts arguing about “metal” versus “compression artifacts.”
        SucellusInSpaceLowLowlands* = #GEPscience_bd_surveillance_SucellusInSpaceLowLowlands_00 // The lowlands show wide, navigable-looking plains—at least on the map. In the raw frames, every “smooth” area turns out to be textured with small, sharp trouble.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_SucellusInSpaceLowTropicalMidlands_00 // Midland ridges run in broken chains, casting shadows that seem too long for such a small world. The dim light makes the terrain feel farther away than it already is.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_SucellusInSpaceLowTemperateMidlands_00 // Subtle color shifts trace through the midlands like mineral stains. The notes read: “Potential resource signal. Confidence: medium. Anxiety: high.”
        SucellusInSpaceLowHighlands* = #GEPscience_bd_surveillance_SucellusInSpaceLowHighlands_00 // Pale highlands catch the faintest glare and look almost polished. If this dwarf world really is rich, it’s hiding its wealth under a very unfriendly surface.
        SucellusInSpaceLowPoles* = #GEPscience_bd_surveillance_SucellusInSpaceLowPoles_00 // The poles are stark, with shadowed hollows that refuse to show their bottoms. You label them “unknown” and feel the distance to Kerbin in your bones.

        CaireenInSpaceLowLowlands* = #GEPscience_bd_surveillance_CaireenInSpaceLowLowlands_00 // Caireen’s “lowlands” are just places where the rock dips inward and pretends to be a landscape. The whole moon looks like it was captured mid-tumble and told to behave.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_surveillance_CaireenInSpaceLowMidlands_00 // The midlands are a mess of slopes and facets, lit by weak red daylight and a strong sense of “do not land.” The camera’s best feature is making you appreciate stable gravity.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_surveillance_CaireenInSpaceLowHighlands_00 // Jagged high points silhouette against space, more asteroid than moon. Sucellus looms nearby, close enough to feel like a ceiling.
        CaireenInSpaceLowPoles* = #GEPscience_bd_surveillance_CaireenInSpaceLowPoles_00 // At the poles, the lighting turns into a harsh coin-flip of glare and black. Reconnaissance concludes: “Yes, it’s still an irregular captured rock. No, it hasn’t gotten friendlier.”

        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_surveillance_SironaInSpaceLowDarkTropicalBands_00 // Dark bands coil beneath you like slow smoke in a red-lit room. The receiver insists this is “reconnaissance,” not “staring into weather.”
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_surveillance_SironaInSpaceLowLightTropicalBands_00 // The lighter belts shine with faint reflected crimson, softening every shadow. A few frames arrive late enough to count as “yesterday’s storm.”
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_surveillance_SironaInSpaceLowDarkTemperateBands_00 // A broad dark lane shows ripples and eddies that don’t match last pass—at least, not the last pass you’ve received yet. Comms delay makes the atmosphere feel even more alive.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_surveillance_SironaInSpaceLowLightTemperateBands_00 // Pale cloud tops look deceptively calm until you notice the shear lines. The camera’s stabilization gives up and calls it “dynamic.”
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_surveillance_SironaInSpaceLowDarkPolarBands_00 // The polar darkness is broken by subtle bright flickers that may be aurora or sensor noise. Either way, the instruments sound nervous.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_surveillance_SironaInSpaceLowLightPolarBands_00 // The pole glows softly, like frost lit by a dim red lamp. Sirona’s upper air makes its own weather—your job is just to blink first.

        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowTropicalLowlands_00 // The tropical lowlands spread out in dusty tones, cut by scars that look fresh in the harsh lighting. Sirona hangs nearby, reminding everyone that “local radiation” is a feature.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowTemperateLowlands_00 // Broad flats and shallow basins suggest routes that a rover might survive. The long shadows under Grannus’ light make every “smooth patch” feel suspicious.
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowTropicalMidlands_00 // Midland ridges form broken chains that catch the red sun on one side and go ink-black on the other. The image compression artifacts look almost like extra craters.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowTemperateMidlands_00 // The midlands show a puzzling boundary between two surface tones, as if the moon couldn’t decide on a color scheme. Mission Control suggests naming the halves; Science suggests not getting attached.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowHighlands_00 // Highland crests are sharp and heavily peppered, like the moon lost an argument with debris. Even from orbit, it reads as “land carefully, if at all.”
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedLowlands_00 // The darkened lowlands drink in the weak daylight and give almost nothing back. Your “night-vision” settings are not amused.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedMidlands_00 // Dark midland terrain makes ridge lines vanish until the angle is just right. Reconnaissance note: “landing site confidence: low; mystery: high.”
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedHighlands_00 // The dark highlands look like cooled slag under a red sun, fractured and unwelcoming. The camera records a perfect silhouette of Sirona in the background, just to be dramatic.
        AirmedInSpaceLowPoles* = #GEPscience_bd_surveillance_AirmedInSpaceLowPoles_00 // At the poles, lighting turns into a harsh coin flip of glare and shadow. The best frames arrive after the pass ends, because distance is a hobby out here.

        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalCraquelure_00 // The surface is a web of cracks and plates, like the ground cooled too fast and never forgave it. A thin atmosphere blurs the edges just enough to be unsettling.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateCraquelure_00 // Craquelure patterns stretch for kilometers in neat, repeating geometry. You briefly suspect engineering, then remember nature also enjoys showing off.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalLowlands_00 // Lowlands appear smoother, with gentle slopes that might support surface operations. The haze turns the horizon into a soft red gradient that feels very far from home.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateLowlands_00 // Broad plains roll by under dim light, broken by darker streaks that could be deposits or just shadows that refuse to behave. The downlink arrives smelling faintly of methane. (Not really.)
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalMidlands_00 // The midlands rise in subdued ridges, their shadows stretched long by the weak sun. You mark a few sheltered basins as “possible sites,” then underline “unknown ground conditions.”
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateMidlands_00 // Terrain contrast sharpens as the air thins with altitude, revealing subtle layering. The camera keeps auto-focusing on haze like it’s trying to make friends.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_surveillance_BorvoInSpaceLowHighlands_00 // Highlands stand above the murk, bright and crisp against the red-lit sky. For a moment, it looks almost approachable—then a crater field rolls into view.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_surveillance_BorvoInSpaceLowMajorCraters_00 // Major craters bite into the crust with terraces and ejecta fans, all softened by atmospheric veil. The impact history reads like a long, slow warning.
        BorvoInSpaceLowPoles* = #GEPscience_bd_surveillance_BorvoInSpaceLowPoles_00 // Polar regions fade into pale fog and low-contrast terrain. Navigation calls it “feature-poor,” which is code for “don’t trust the map.”

        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_DamonaInSpaceLowTropicalLowlands_00 // Damona’s lowlands are gray, dusty, and heavily pitted, with no sign of anything that wants you there. The red sun makes the whole world look like it’s under emergency lighting.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_DamonaInSpaceLowTemperateLowlands_00 // Shallow basins and gentle rises pass beneath the lens with an alarming sameness. It’s easy to lose scale until a crater the size of a city drifts by.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_DamonaInSpaceLowTropicalMidlands_00 // Midland ridges cast hard shadows that don’t move much between frames—because your frames are minutes behind reality. Remote operations feel extra remote here.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_DamonaInSpaceLowTemperateMidlands_00 // The midlands show faint streaks and scours that might be ancient flows or ejecta. The notes end with: “Either way, bring stronger landing legs.”
        DamonaInSpaceLowHighlands* = #GEPscience_bd_surveillance_DamonaInSpaceLowHighlands_00 // Bright highlands form broken plates, chipped and cold-looking. Sirona’s distant glow outlines the horizon like a dim rim light.
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_surveillance_DamonaInSpaceLowImpactBasin_00 // The impact basin dominates the view—terraced walls, central upheaval, and debris laid out like a forensic diagram. It’s the kind of landmark you can navigate by even with a long comms delay.
        DamonaInSpaceLowPoles* = #GEPscience_bd_surveillance_DamonaInSpaceLowPoles_00 // The poles sit in stubborn shadow and weak glare, revealing just enough texture to be ominous. Reconnaissance concludes: “Yes, it’s still there. No, it’s not getting friendlier.”

        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_EponaInSpaceLowTropicalLowlands_00 // Under Grannus’ dim red light, the “tropical” lowlands are still pale and cold, with broad flats softened by a thin haze. The image looks like winter that forgot what “summer” means.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_EponaInSpaceLowTemperateLowlands_00 // Smooth basins drift past in slow, delayed frames, their shadows stretched long by weak sunlight. You tag a few patches as “maybe level,” then remember the ice can lie.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_surveillance_EponaInSpaceLowTropicalUplands_00 // Uplands show wind-sculpted ridges and subtle tonal stripes, as if the atmosphere is sanding the surface one grain at a time. The camera keeps trying to focus on the haze like it’s the main event.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_surveillance_EponaInSpaceLowTemperateUplands_00 // The uplands break into rougher plates with dark seams that might be fractures or exposed rock. Reconnaissance note: “interesting textures, uncomfortable amounts of mystery.”
        EponaInSpaceLowHighlands* = #GEPscience_bd_surveillance_EponaInSpaceLowHighlands_00 // Highland slopes fade in and out beneath thin cloud veils, revealing a world that’s big, cold, and far too quiet. Even the downlink delay feels longer over the empty peaks.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_surveillance_EponaInSpaceLowGrandPeaks_00 // Grand peaks punch through the haze and catch a faint crimson rim-light, sharp against a dark sky. They look like excellent landmarks and terrible places to have a problem.
        EponaInSpaceLowCraters* = #GEPscience_bd_surveillance_EponaInSpaceLowCraters_00 // Craters dot the ice like bruises, with darker ejecta staining the pale crust. A few rims look suspiciously softened, as if Epona is still trying to heal.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_surveillance_EponaInSpaceLowVolcanoes_00 // The “volcanoes” show darker vents and faint plume-like smears that don’t match the surrounding frost. You file the frames as “possible warmth detected” and “please keep your distance.”
        EponaInSpaceLowPoles* = #GEPscience_bd_surveillance_EponaInSpaceLowPoles_00 // Near the poles, the light turns into a perpetual dusk, and methane-tinted haze flattens the horizon. The terrain looks calm in the way a freezer looks calm.

        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_RosmertaInSpaceLowTropicalLowlands_00 // Rosmerta’s lowlands are airless and brutally crisp, with shadows that look painted on. Epona hangs nearby, making this lonely little moon feel even smaller.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_surveillance_RosmertaInSpaceLowTemperateLowlands_00 // Smooth-looking plains resolve into rubble when you zoom in, because of course they do. The frames arrive late, as if Rosmerta itself is reluctant to be noticed.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_surveillance_RosmertaInSpaceLowTropicalMidlands_00 // Midland ridges run in broken lines, casting long black slashes under the red sun. The radiation monitor complains quietly in the background.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_surveillance_RosmertaInSpaceLowTemperateMidlands_00 // Subtle albedo patches speckle the midlands like spilled flour on charcoal. Reconnaissance concludes: “airless, cold, and not interested in visitors.”
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_surveillance_RosmertaInSpaceLowHighlands_00 // The highlands are jagged and heavily cratered, their edges catching a faint crimson glint. They’d make great scenery for an outpost brochure nobody will ever read.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_surveillance_RosmertaInSpaceLowPoles_00 // Polar terrain sits half in glare, half in stubborn shadow, with no atmosphere to soften the divide. The camera labels it “high contrast”; the crew labels it “highly rude.”

        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_surveillance_RAB-58EInSpaceLowLowlands_00 // The “lowlands” are just the flatter parts of a small, captured-looking lump, lit unevenly as it turns. Every pass feels like watching a different object because the angles never repeat the same way.
        RAB-58EInSpaceLowEasternHighlands* = #GEPscience_bd_surveillance_RAB-58EInSpaceLowEasternHighlands_00 // The eastern highlands rise into sharp facets and dark pits, like a rock assembled from leftovers. The delayed signal makes the tumble feel slower, but not friendlier.
        RAB-58EInSpaceLowWesternHighlands* = #GEPscience_bd_surveillance_RAB-58EInSpaceLowWesternHighlands_00 // Western high ground shows brighter scars and darker seams that could be old fractures or exotic deposits. You note: “origin unknown,” and for once the report sounds honest.

        CernunnosInSpaceLowTropicalLowlands* = #GEPscience_bd_surveillance_CernunnosInSpaceLowTropicalLowlands_00 // Cernunnos’ lowlands are pale and still, an icy plain under a sun that barely commits to daylight. The emptiness is impressive, in a slightly unsettling way.
