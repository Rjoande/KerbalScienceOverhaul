@EXPERIMENT_DEFINITION:HAS[#id[bd_solarWind]]
{
    @title = #ScienceRefactor_bd_solarWind_title // Solar Wind Measurement
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_solarWind_default_00 // You measure the strength and direction of solar wind particles.
        InSpace* = #ScienceRefactor_bd_solarWind_default_01 // Kerbol's solar wind is measured at this altitude.
	    InSpace* = #ScienceRefactor_bd_solarWind_default_02 // The computers log solar wind data.

        SunInSpace* = #ScienceRefactor_bd_solarWind_SunInSpace_00 // Solar wind spiral outward from Kerbol, possibly along its magnetic force lines.
        SunInSpace* = #ScienceRefactor_bd_solarWind_SunInSpace_01 // Oscillating measurements are logged before the instrument goes to safe-mode.
        SunInSpaceLow* = #ScienceRefactor_bd_solarWind_SunInSpaceLow_00 // Very strong solar wind jetties are detected emanating from coronal holes.
        SunInSpaceLow* = #ScienceRefactor_bd_solarWind_SunInSpaceLow_01 // Solar wind measurement show wind speeds lower here than from near Kerbin.
        SunInSpaceHigh* = #ScienceRefactor_bd_solarWind_SunInSpaceHigh_00 // Solar wind measurements are recorded.
        SunInSpaceHigh* = #ScienceRefactor_bd_solarWind_SunInSpaceHigh_01 // Solar Wind data is logged while the KSC scientists fiercely debate whether it should be called solar wind speed or solar wind velocity.

        MohoInSpace* = #ScienceRefactor_bd_solarWind_MohoInSpace_00 // Solar winds steadily bombard Moho's exposed surface.
        MohoInSpaceLow* = #ScienceRefactor_bd_solarWind_MohoInSpaceLow_00 // Despite lower speeds, the solar wind has a strong effect on Moho.
        MohoInSpaceHigh* = #ScienceRefactor_bd_solarWind_MohoInSpaceHigh_00 // There is a significant amount of irregular solar wind activity near Moho.

        EveInSpace* = #ScienceRefactor_bd_solarWind_EveInSpace_00 // Eve definitely has a strong effect on solar wind direction.
        EveInSpaceLow* = #ScienceRefactor_bd_solarWind_EveInSpaceLow_00 // Despite erratic behavior, Eve appears to deflect a good portion of the solar wind.
        EveInSpaceHigh* = #ScienceRefactor_bd_solarWind_EveInSpaceHigh_00 // The solar wind direction becomes more erratic closer to Kerbol.

		GillyInSpace* = #ScienceRefactor_bd_solarWind_GillyInSpace_00 // Deflected and direct solar wind emissions clearly reach the surface of Gilly.
		GillyInSpaceLow* = #ScienceRefactor_bd_solarWind_GillyInSpaceLow_00 // Gilly is found to be hit by solar winds deflected by Eve.
		GillyInSpaceHigh* = #ScienceRefactor_bd_solarWind_GillyInSpaceHigh_00 // Gilly measurements provide no conclusive data at this altitude.

        KerbinInSpace* = #ScienceRefactor_bd_solarWind_KerbinInSpace_00 // Solar wind speed and strength is recorded from around Kerbin.
        KerbinInSpaceLow* = #ScienceRefactor_bd_solarWind_KerbinInSpaceLow_00 // Kerbol's solar wind emissions are definitely interacting with Kerbin's atmosphere.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_solarWind_KerbinInSpaceHigh_00 // Wind speed is recorded for comparison with other planets.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_solarWind_KerbinInSpaceHigh_01 // Solar Wind is somehow deflected by Kerbin. Scientists suggest comparing it with Magnetometer results.

		MunInSpace* = #ScienceRefactor_bd_solarWind_MunInSpace_00 // Solar wind levels are logged around the Mun.
		MunInSpaceLow* = #ScienceRefactor_bd_solarWind_MunInSpaceLow_00 // There does not appear to be any wind deflection, so the Mun is hit by solar wind directly.
		MunInSpaceHigh* = #ScienceRefactor_bd_solarWind_MunInSpaceHigh_00 // Surface particles appear to be blasted into space.

		MinmusInSpace* = #ScienceRefactor_bd_solarWind_MinmusInSpace_00 // The instrument takes measurements from around Minmus.
		MinmusInSpaceLow* = #ScienceRefactor_bd_solarWind_MinmusInSpaceLow_00 // Solar wind detection reveals the Minmus is also hit directly.
		MinmusInSpaceHigh* = #ScienceRefactor_bd_solarWind_MinmusInSpaceHigh_00 // Solar wind analysis complete: Lime.

        DunaInSpace* = #ScienceRefactor_bd_solarWind_DunaInSpace_00 // The Instrument takes reading from around Duna.
        DunaInSpaceLow* = #ScienceRefactor_bd_solarWind_DunaInSpaceLow_00 // Tracking solar wind direction revealed that at least some seems to deflect and reach the lower atmosphere.
        DunaInSpaceHigh* = #ScienceRefactor_bd_solarWind_DunaInSpaceHigh_00 // The measured solar wind is strong enough to blast away the lighter particles at the top of Duna's surface.

        DresInSpace* = #ScienceRefactor_bd_solarWind_DresInSpace_00 // Results recorded. Solar wind blasts Dres' surface directly.
        DresInSpaceLow* = #ScienceRefactor_bd_solarWind_DresInSpaceLow_00 // Solar wind speed measurements indicate that the wind is actually accelerating as it gets farther from Kerbol.
        DresInSpaceHigh* = #ScienceRefactor_bd_solarWind_DresInSpaceHigh_00 // *static*
        DresInSpaceHigh* = #ScienceRefactor_bd_solarWind_DresInSpaceHigh_01 // Kerbol emissions are still clearly detected around Dres.

        JoolInSpace* = #ScienceRefactor_bd_solarWind_JoolInSpace_00 // Interference from Jool prevents conclusive results.
        JoolInSpaceLow* = #ScienceRefactor_bd_solarWind_JoolInSpaceLow_00 // Solar wind does not appear to affect the deeper layer of Jool's magnetosphere.
        JoolInSpaceHigh* = #ScienceRefactor_bd_solarWind_JoolInSpaceHigh_00 // Solar winds are detected interacting with Jool's upper magnetosphere.
        JoolInSpaceHigh* = #ScienceRefactor_bd_solarWind_JoolInSpaceHigh_01 // Jool is found to have a strong effect on solar wind direction.

		LaytheInSpace* = #ScienceRefactor_bd_solarWind_LaytheInSpace_00 // Laythe is detected to have a magnetosheath deflecting solar wind plasma, also affected by Jool's gravity.
		LaytheInSpaceLow* = #ScienceRefactor_bd_solarWind_LaytheInSpaceLow_00 // Plasma ionization detected, Laythe must contain an ionosphere.
		LaytheInSpaceHigh* = #ScienceRefactor_bd_solarWind_LaytheInSpaceHigh_00 // Due to its proximity, Laythe interacts with a lot of solar particles deflected by Jool.

		VallInSpace* = #ScienceRefactor_bd_solarWind_VallInSpace_00 // There is no plasma interaction, suggesting no atmosphere around Vall.
		VallInSpaceLow* = #ScienceRefactor_bd_solarWind_VallInSpaceLow_00 // KSC turned the knob to 11. Solar wind detected again.
		VallInSpaceHigh* = #ScienceRefactor_bd_solarWind_VallInSpaceHigh_00 // No solar wind detected. Have we left the Kerbol system?

		PolInSpace* = #ScienceRefactor_bd_solarWind_PolInSpace_00 // Analysis from Pol received.
		PolInSpaceLow* = #ScienceRefactor_bd_solarWind_PolInSpaceLow_00 // Analysis of the solar wind detected here suggests it was deflected here by Jool.
		PolInSpaceHigh* = #ScienceRefactor_bd_solarWind_PolInSpaceHigh_00 // The system is detecting increased wind activity as it approaches Pol.

		TyloInSpace* = #ScienceRefactor_bd_solarWind_TyloInSpace_00 // Results make the scientists ponder what happened to Tylo's atmosphere.
		TyloInSpaceLow* = #ScienceRefactor_bd_solarWind_TyloInSpaceLow_00 // Despite Tylo's magnetosheath, there appears to be no solar wind interactions or atmosphere.
		TyloInSpaceHigh* = #ScienceRefactor_bd_solarWind_TyloInSpaceHigh_00 // It appears that solar wind particles are deflected by Tylo's gravity.

		BopInSpace* = #ScienceRefactor_bd_solarWind_BopInSpace_00 // Data confirms that Jool has a large magnetosphere that influences wind patterns around it.
		BopInSpaceLow* = #ScienceRefactor_bd_solarWind_BopInSpaceLow_00 // Jool's massive gravity deflects solar wind particles into and around Bop's path.
		BopInSpaceHigh* = #ScienceRefactor_bd_solarWind_BopInSpaceHigh_00 // The solar winds detected at this latitude above Bop follows very irregular patterns.

        EelooInSpace* = #ScienceRefactor_bd_solarWind_EelooInSpace_00 // Data is collected from Eeloo.
        EelooInSpaceLow* = #ScienceRefactor_bd_solarWind_EelooInSpaceLow_00 // The solar wind appears to travel twice as fast here than when near Kerbin.
        EelooInSpaceHigh* = #ScienceRefactor_bd_solarWind_EelooInSpaceHigh_00 // What little solar wind is detectable is traveling really fast!

        SarnusInSpaceLow* = #ScienceRefactor_bd_solarWind_SarnusInSpaceLow_00 // Solar wind measurements confirm that Sarnus is largely shielded from solar particles
        SarnusInSpaceHigh* = #ScienceRefactor_bd_solarWind_SarnusInSpaceHigh_00 // Solar particles are deflected and disturbed, likely by the planet's powerful magnetic field
        SarnusInSpaceHigh* = #ScienceRefactor_bd_solarWind_SarnusInSpaceHigh_01 // Solar winds are detected to be interacting with Sarnus' outer magnetoshpere

		TektoInSpace* = #ScienceRefactor_bd_solarWind_TektoInSpace_00 // Tekto is fairly well shielded from Solar particles by its parent planet
		TektoInSpace* = #ScienceRefactor_bd_solarWind_TektoInSpace_01 // Detected particles appear to be deflected by Sarnus' magnetic field

		SlateInSpaceHigh* = #ScienceRefactor_bd_solarWind_SlateInSpaceHigh_00 // Results make the scientists ponder what happened to Slate's atmosphere
		SlateInSpaceHigh* = #ScienceRefactor_bd_solarWind_SlateInSpaceHigh_01 // Kerbol's emissions are still clearly detected this far out
		SlateInSpaceLow* = #ScienceRefactor_bd_solarWind_SlateInSpaceLow_00 // Surface particles appear to be blasted into space

		HaleInSpace* = #ScienceRefactor_bd_solarWind_HaleInSpace_00 // Interference from Sarnus' rings prevents conclusive results
		HaleInSpaceLow* = #ScienceRefactor_bd_solarWind_HaleInSpaceLow_00 // The moon is deeply shielded by the gas giant's powerful magnetosphere

		OvokInSpace* = #ScienceRefactor_bd_solarWind_OvokInSpace_00 // Data is collected near Ovok
		OvokInSpace* = #ScienceRefactor_bd_solarWind_OvokInSpace_01 // The solar wind appears to travel twice as fast here than when near Kerbin

        UrlumInSpaceLow* = #ScienceRefactor_bd_solarWind_UrlumInSpaceLow_00 // Urlum's magnetosphere is powerful enough to shield the planet from much of the solar plasma
        UrlumInSpaceHigh* = #ScienceRefactor_bd_solarWind_UrlumInSpaceHigh_00 // Solar particles are definitely being deflected by the planet's magnetic field
        UrlumInSpaceHigh* = #ScienceRefactor_bd_solarWind_UrlumInSpaceHigh_01 // The measured deflections of solar plasma seem to indicate a twisting rotation along Urlum's magnetotail

		WalInSpaceHigh* = #ScienceRefactor_bd_solarWind_WalInSpaceHigh_00 // Urlum is measured to provide some shielding from solar wind
		WalInSpaceLow* = #ScienceRefactor_bd_solarWind_WalInSpaceLow_00 // Solar wind analysis complete: Banana

        TalInSpace* = #ScienceRefactor_bd_solarWind_TalInSpace_00 // Solar wind analysis complete: Tapioca
        TalInSpace* = #ScienceRefactor_bd_solarWind_TalInSpace_01 // Even at this distance, the instrument can still feel the effects of Kerbol's solar particle emissions

		PriaxInSpace* = #ScienceRefactor_bd_solarWind_PriaxInSpace_00 // Measurements provided a clearer picture of Urlum's magnetosphere but do not show any significant interaction with the small moon
		PriaxInSpaceLow* = #ScienceRefactor_bd_solarWind_PriaxInSpaceLow_00 // Despite Urlum's magnetic protection, Priax appears to be exposed to some solar wind weathering

		PoltaInSpace* = #ScienceRefactor_bd_solarWind_PoltaInSpace_00 // Despite Urlum's magnetic protection, Polta appears to be exposed to some solar wind weathering
		PoltaInSpace* = #ScienceRefactor_bd_solarWind_PoltaInSpace_01 // The solar wind appears to travel twice as fast here than when near Kerbin

        NeidonInSpaceLow* = #ScienceRefactor_bd_solarWind_NeidonInSpaceLow_00 // Neidon's complex magnetic field has interesting effects on incoming solar wind, although it is still well deflected
        NeidonInSpaceHigh* = #ScienceRefactor_bd_solarWind_NeidonInSpaceHigh_00 // Solar winds are detected interacting with Neidon's upper magnetosphere

		ThatmoInSpaceHigh* = #ScienceRefactor_bd_solarWind_ThatmoInSpaceHigh_00 // The measured solar wind appears to be eroding a tiny percentage of Thatmo's upper atmosphere
		ThatmoInSpaceLow* = #ScienceRefactor_bd_solarWind_ThatmoInSpaceLow_00 // Thatmo's reverse orbit carves an intersting path through the solar wind active inside Neidon's magnetosphere
    }
}