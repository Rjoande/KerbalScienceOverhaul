        #CSS_atmosphereAnalysis_EveFlyingHighShallows_00 = Un lato positivo del fatto che l'atmosfera di Eve sia così densa è che l'analizzatore ha molto materiale su cui lavorare, anche quassù. Non dobbiamo per forza scendere giù per sapere quanto sia terribile.
