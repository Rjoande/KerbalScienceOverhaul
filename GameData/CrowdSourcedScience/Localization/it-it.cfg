        #CSS_crewReport_KerbinFlyingHigh_18 = Cos'è quell'ombra enorme? È... un kraken?
        #CSS_crewReport_KerbinInSpaceLow_00 = Ti sei ricordato di portare le medicine per l'agorafobia?
        #CSS_crewReport_KerbinInSpaceLow_01 = Fluttui nell'aria, mangiando patatine che levitano.
        #CSS_crewReport_KerbinInSpaceLow_02 = In modo inquietante, un lato della nave è davvero caldo. L'altro no, quindi dovrebbe andare bene.
        #CSS_crewReport_KerbinInSpaceLow_03 = Fissi fuori dal finestrino, assorto nei pensieri e intento a riflettere sulla risposta alla domanda fondamentale, quando vieni bruscamente interrotto dal controllo missione.
        #CSS_crewReport_KerbinInSpaceLow_04 = Rimani a bocca aperta davanti a dadi e bulloni senza peso che danzano per la cabina. Per un attimo ti chiedi quali parti del veicolo tenessero insieme prima.
        #CSS_crewReport_KerbinInSpaceLow_05 = Sei nello spazio e non sei morto. L'equipaggio e il controllo missione concordano che sia davvero un bel passo avanti.
        #CSS_crewReport_KerbinInSpaceLow_06 = Con tuo grande disappunto, Scott Kerman si mette alla radio e inizia a istruire l'equipaggio sulle corrette procedure per il bagno. Di nuovo.
        #CSS_crewReport_KerbinInSpaceLow_07 = Provi a fare un numero di giocoleria, ma le palline schizzano in varie direzioni per la microgravità. Speri che non abbiano colpito pulsanti importanti, questa volta.
        #CSS_crewReport_KerbinInSpaceLow_08 = GUARDA! Un'altra stella! Ehi... ecco un'altra! Wow, lo spazio è fantastico.
        #CSS_crewReport_KerbinInSpaceLow_09 = Dopo test rigorosi, l'equipaggio ha stabilito che la microgravità aumenta il divertimento delle palline rimbalzanti del 200%.
        #CSS_crewReport_KerbinInSpaceLow_10 = "Ecco perché servono tute sofisticate, eh?"
        #CSS_crewReport_KerbinInSpaceLow_11 = Anche dallo spazio, le vaste distese d'erba sembrano di un verde acceso. Ti senti orgoglioso di venire da un posto così bello.
        #CSS_crewReport_KerbinInSpaceLow_12 = Ti stupisci di quanto sia perfettamente curato il prato della civiltà kerbal.
        #CSS_crewReport_KerbinInSpaceLow_13 = Non sono andati nello spazio, non hanno assaltato una spiaggia e non hanno riportato oro! No, signore, noi sì! Siamo io e te contro il mondo, figliolo!
        #CSS_crewReport_KerbinInSpaceLow_14 = Qui è il Maggiore Kerman al controllo missione, mi sento molto immobile. E credo che la mia astronave sappia dove andare.
        #CSS_crewReport_KerbinInSpaceLow_15 = È ora di uscire dalla capsula... giusto?
        #CSS_crewReport_KerbinInSpaceLow_16 = Siamo arrivati?
        #CSS_crewReport_KerbinInSpaceLow_17 = Avremmo dovuto sistemare il GPS prima del decollo, così avremmo saputo in quale bioma siamo. Pazienza, il carburante per razzi costa.
        #CSS_crewReport_KerbinInSpaceLow_18 = A questa quota ti rendi conto che sorvolerai i calanchi diverse volte all'ora. Ti preoccupa più di quanto dovrebbe.
        #CSS_crewReport_KerbinInSpaceLow_19 = Ehi, sembra il mio mappamondo!
        #CSS_crewReport_KerbinInSpaceLow_20 = "Ehi, da qui riesco a vedere l'ego di Jeb!"
        #CSS_crewReport_KerbinInSpaceLow_21 = "VERSO L'INFINITO, E OLTRE!"
        #CSS_crewReport_KerbinInSpaceLow_22 = Sì, siamo nello spazio, ma scommetti che se lasciassimo giù il carrello d'atterraggio toccherebbe quella cima.
        #CSS_crewReport_KerbinInSpaceLow_23 = Ti senti stordito, incapace di smettere di girare la testa. Se mai costruirete una capsula più grande, una rete di corde all'interno potrebbe aiutare.
        #CSS_crewReport_KerbinInSpaceLow_24 = Il pianeta Kerbin è blu e non c'è niente che io possa fare.
        #CSS_crewReport_KerbinInSpaceLow_25 = Ripensi agli eventi significativi che ti hanno portato fin qui, ricordando con calore il momento in cui decidesti di diventare astronauta. È stato proprio stamattina.
        #CSS_crewReport_KerbinInSpaceLow_26 = Stai chiacchierando col controllo missione quando il canale radio viene interrotto da un tizio di nome Maggiore Tom che dice freneticamente che qualcosa è andato storto. Gli dici di prendere una pillola proteica e mettersi il casco.
        #CSS_crewReport_KerbinInSpaceLow_27 = Ammazzi il tempo chiacchierando con un operatore radio qualunque.
        #CSS_crewReport_KerbinInSpaceLow_28 = La console di comando dice: "Benvenuto nello spazio. Buon soggiorno."
        #CSS_crewReport_KerbinInSpaceLow_29 = L'equipaggio legge libri per passare il tempo.
        #CSS_crewReport_KerbinInSpaceLow_30 = Ancora un pochino e ci siamo!
        #CSS_crewReport_KerbinInSpaceLow_31 = Lanciatevi!
        #CSS_crewReport_KerbinInSpaceLow_32 = Non lanciatevi!
        #CSS_crewReport_KerbinInSpaceLow_33 = Abbiamo abbastanza carburante per arrivare nello spazio vero?
        #CSS_crewReport_KerbinInSpaceLow_34 = Se ruotiamo il veicolo, potremmo finire per aerofrenare...
        #CSS_crewReport_KerbinInSpaceLow_35 = Mentre guardi giù il tuo pianeta natale, sei pieno di meraviglia e anche stupito di essere arrivato fin qui senza esplodere.
        #CSS_crewReport_KerbinInSpaceLow_36 = Eccoti qui, seduto in una lattina, ben al di sopra del mondo.
        #CSS_crewReport_KerbinInSpaceLow_37 = "Wiiiiiiiiiiiiiiii!"
        #CSS_crewReport_KerbinInSpaceLow_38 = "Spazio? SPAZIO! SPAAAZIO!"
        #CSS_crewReport_KerbinInSpaceLow_39 = Non ti stanchi mai della vista dallo spazio, anche sorvolando questa parte del pianeta.
        #CSS_crewReport_KerbinInSpaceLow_40 = Pensi che il CSK possa essere da qualche parte sotto le nuvole.
        #CSS_crewReport_KerbinInSpaceLow_41 = Se fossi tu a creare Kerbin, non avresti sprecato così tanto spazio in un deserto vuoto. Potevano almeno metterci una piscina o qualcosa.
        #CSS_crewReport_KerbinInSpaceLow_42 = Guardi con stupore le aurore e ti chiedi se siano imparentate con gli arcobaleni.
        #CSS_crewReport_KerbinInSpaceLow_43 = Contempli le vaste distese di ghiaccio sotto di te, chiedendoti se qualche kerbal ci sia mai stato.
        #CSS_crewReport_KerbinInSpaceLow_44 = Scruti le montagne sotto di te, chiedendoti se laggiù ci sia qualcuno che ti stia guardando.
        #CSS_crewReport_KerbinInSpaceLow_45 = Dici al controllo missione che alcune di quelle montagne sembrano perfette per un osservatorio.
        #CSS_crewReport_KerbinInSpaceLow_46 = La spiaggia sembra invitante perfino dallo spazio. Peccato che ci siamo dimenticati di portare i cocktail.
        #CSS_crewReport_KerbinInSpaceLow_47 = Prepari il costume da bagno, nel caso il controllo missione voglia farti atterrare lì.
        #CSS_crewReport_KerbinInSpaceLow_48 = Da questa altezza vedi chiaramente dove il ghiaccio duro incontra la roccia ostile e poi la neve fredda. Non è un posto molto piacevole in cui vivere.
        #CSS_crewReport_KerbinInSpaceLow_49 = Da questa distanza le piante già minuscole che crescono sulla tundra laggiù sono così piccole che le vedi a malapena.
        #CSS_crewReport_KerbinInSpaceHigh_00 = Ti prende quasi un attacco di panico quando gli strumenti ti avvisano che sei direttamente sopra i calanchi. Poi ridi ricordandoti che sei a oltre un quarto di milione di chilometri di distanza.
        #CSS_crewReport_KerbinInSpaceHigh_01 = Hai sentimenti contrastanti all'idea di essere così lontano da Kerbin. Da un lato sei parecchio lontano da casa, ma dall'altro sei parecchio lontano dai calanchi.
        #CSS_crewReport_KerbinInSpaceHigh_02 = Quasi di nuovo al CSK. Solo un'atmosfera e qualche migliaio di chilometri tra noi.
        #CSS_crewReport_KerbinInSpaceHigh_03 = Da quassù, il deserto e gli oceani sembrano un'unica spiaggia gigantesca! Le spiagge sono divertenti!
        #CSS_crewReport_KerbinInSpaceHigh_04 = L'equipaggio del veicolo e alcuni del controllo missione stanno giocando a scacchi via radio.
        #CSS_crewReport_KerbinInSpaceHigh_05 = Guardi fuori dal finestrino e ti rendi conto di aver dimenticato le chiavi a casa.
        #CSS_crewReport_KerbinInSpaceHigh_06 = Riesci a vedere i calanchi dall'orbita. Bleah.
        #CSS_crewReport_KerbinInSpaceHigh_07 = "Registro: il pianeta alieno sembra stranamente simile al nostro. Ah già..."
        #CSS_crewReport_KerbinInSpaceHigh_08 = Ti stupisci del fatto che Kerbin sia per lo più verde.
        #CSS_crewReport_KerbinInSpaceHigh_09 = Scatta l'agorafobia...
        #CSS_crewReport_KerbinInSpaceHigh_10 = Sei davvero alto come un aquilone, uomo razzo. Forse anche di più.
        #CSS_crewReport_KerbinInSpaceHigh_11 = Direzione stelle.
        #CSS_crewReport_KerbinInSpaceHigh_12 = Pensi a tutte le belle volte passate sulle coste laggiù. Comunque, non è da un po' che non facciamo uno spuntino??
        #CSS_crewReport_KerbinInSpaceHigh_13 = Dallo spazio, tutto sembra una spiaggia gigante! Soprattutto le spiagge vere!
        #CSS_crewReport_KerbinInSpaceHigh_14 = Osservi gli Altipiani dall'orbita, stupendoti di quanto siano minuscoli.
        #CSS_crewReport_KerbinInSpaceHigh_15 = Ti prende la nostalgia pensando che a questa quota le montagne di Kerbin siano la parte del pianeta più vicina a te. Poi fai uno spuntino e va tutto meglio.
        #CSS_crewReport_KerbinInSpaceHigh_16 = Ti chiedi se riuscirai a tornare a casa sano e salvo.
        #CSS_crewReport_KerbinInSpaceHigh_17 = Conti le bufere di neve che passano sopra la tundra laggiù e all'improvviso sei felice di non doverci stare.
        #CSS_crewReport_KerbinInSpaceHigh_18 = Quella laggiù è la tundra? Sei così lontano dal pianeta che puoi solo tirare a indovinare. Quindi lo fai e lo riferisci come fatto certo al CSK.
        #CSS_crewReport_KerbinInSpaceHigh_19 = Per un attimo contempli il tuo ombelico mentre guardi il pianeta scorrere sotto di te.
        #CSS_crewReport_KerbinInSpaceHigh_20 = Anche se il pianeta è davvero molto rotondo, ti chiedi se la sua rotondità non sia stata un po' esagerata.
        #CSS_crewReport_KerbinInSpaceHigh_21 = Il regolo calcolatore si rompe e inizi a cercare quello di riserva, finché non ti ricordi che tanto non sai usare un regolo calcolatore.
        #CSS_crewReport_KerbinInSpaceHigh_22 = Giureresti di aver visto una cabina di polizia blu lampeggiare in un'orbita retrograda.
        #CSS_crewReport_KerbinInSpaceHigh_23 = Attiviamo il motore a curvatura... aspetta, non abbiamo un motore a curvatura?
        #CSS_crewReport_KerbinInSpaceHigh_24 = Da quassù tutto sembra così piccolo.
        #CSS_crewReport_KerbinInSpaceHigh_25 = CSK, spero sappiate dove sono, perché ho rovesciato il caffè sulla mappa di rotta.
        #CSS_crewReport_KerbinInSpaceHigh_26 = Oh, quell'aurora è splendida! Chissà com'è vista da terra.
        #CSS_crewReport_KerbinInSpaceHigh_27 = Hai una gran voglia di uscire e fare due passi, ma non c'è niente su cui camminare.
        #CSS_crewReport_KerbinInSpaceHigh_28 = Fai un'osservazione, ma la mancanza di gravità impedisce alla penna di funzionare. Forse avresti dovuto portare una matita.
        #CSS_crewReport_KerbinInSpaceHigh_29 = La superficie di Kerbin è la riva dell'oceano cosmico. Di recente ci sei entrato un pochino, forse fino alle caviglie, e l'acqua sembra invitante.
        #CSS_crewReport_KerbinInSpaceHigh_30 = "Rapporto dell'equipaggio. Qui è tutto nella norma."
        #CSS_crewReport_KerbinInSpaceHigh_31 = Il pianeta sembra rotondo! Non è piatto come pensavamo!
        #CSS_crewReport_KerbinInSpaceHigh_32 = Ti sforzi di vedere dettagli sulla superficie sotto di te, ma riesci solo a distinguere i grandi tratti dei biomi.
        #CSS_crewReport_KerbinInSpaceHigh_33 = Speri che quando tornerai atterrerai nelle praterie.
        #CSS_crewReport_KerbinInSpaceHigh_34 = A questa quota riesci a malapena a distinguere i crinali delle montagne di Kerbin, ma ti godi la vista con qualche snack.
        #CSS_crewReport_KerbinInSpaceHigh_35 = Da questa distanza le catene montuose di Kerbin si confondono in un'unica macchia.
        #CSS_crewReport_KerbinInSpaceHigh_36 = Guardi giù l'immenso oceano sotto di te e ti chiedi quanti bicchieri servirebbero per svuotare tutta quell'acqua.
        #CSS_crewReport_KerbinInSpaceHigh_37 = Da qui Kerbin sembra una biglia blu liscia. Non sei mai stato bravo a quel gioco.
        #CSS_crewReport_KerbinInSpaceHigh_38 = Mentre guardi scorrere i grandi mari blu di Kerbin, ti chiedi cosa si nasconda negli abissi.
        #CSS_crewReport_KerbinInSpaceHigh_39 = Accidenti, quell'oceano è davvero enorme. Sei contento di non doverlo attraversare a vela.
        #CSS_crewReport_KerbinInSpaceHigh_40 = Mentre osservi gli oceani di Kerbin dalle profondità dello spazio esterno, chiedi al CSK se esistano pirati spaziali. Il CSK ti assicura che le navi pirata hanno vele invece di razzi e quindi non possono entrare in orbita.
        #CSS_crewReport_KerbinInSpaceHigh_41 = Non vedi alcuna vegetazione laggiù e non riesci a decidere se sia perché sei troppo lontano o perché qui non cresce nulla.
        #CSS_crewReport_KerbinInSpaceHigh_42 = Si chiamano ancora Altipiani se sei a oltre un quarto di milione di metri sopra?
        #CSS_crewReport_MunSrfLanded_00 = Rimani a bocca aperta davanti all'aspetto martoriato del Mun.
        #CSS_crewReport_MunSrfLandedMidlands_00 = Ahh, le pianure. L'unico posto piatto su questa roccia che non è fatta di formaggio.
        #CSS_crewReport_MunSrfLandedNorthernBasin_00 = Un altro posto dove ottenere l'obiettivo "Primo snack mai mangiato qui nella storia dei kerbal". Mettiamoci all'opera!
        #CSS_crewReport_MunSrfLandedEastCrater_00 = Un piccolo passo per un kerbal, un'enorme fattura per tutti i kerbal.
        #CSS_crewReport_MunSrfLandedNorthwestCrater_00 = Questo sarebbe un posto fantastico per girare un film. "North by Northwest Crater".
        #CSS_crewReport_MunSrfLandedSouthwestCrater_00 = Questo sarebbe un posto perfetto per il primo festival musicale munare. "South by Southwest Crater".
        #CSS_crewReport_MunSrfLandedFarsideCrater_00 = Cavolo, la luce qui sembra proprio strana. Quasi come se fossi su un set o qualcosa del genere.
        #CSS_crewReport_MunSrfLandedCanyons_00 = Vedere il canyon scuro ti fa chiedere quali meraviglie si nascondano laggiù.
        #CSS_crewReport_MunSrfLandedPolarCrater_00 = Là fuori sembra stranamente pericoloso. Il controllo missione insiste che sia sicuro, ma non credi che lo sappiano davvero.
        #CSS_crewReport_MunSrfLandedPoles_00 = L'equipaggio non riesce a smettere di iperventilare.
        #CSS_crewReport_MunSrfLandedPolarLowlands_00 = Indossi gli occhiali da aviatore polarizzati. Ora puoi essere alla moda E anche perfettamente in tema.
        #CSS_crewReport_MunSrfLandedHighlands_00 = Osservi il panorama che si apre davanti a te mentre sgranocchi qualche snack.
        #CSS_crewReport_MunSrfLandedHighlandCraters_00 = Colto da un'improvvisa voglia di dire qualcosa di spiritoso, quasi vai di traverso con lo snack.
        #CSS_crewReport_MunSrfLandedMidlandCraters_00 = Rifletti sulle probabilità di essere atterrato proprio in questo cratere. Ah già, l'abbiamo scelto dai dati di una missione di prescan. C'era una missione di prescan, vero?!
        #CSS_crewReport_MunSrfLandedEastFarsideCrater_00 = Inizi a esprimere dubbi sul fatto che l'atterraggio sia una messa in scena elaborata, ma le comunicazioni vengono interrotte da una strana voce che ti dice di stare zitto.
        #CSS_crewReport_MunSrfLandedTwinCraters_00 = I crateri gemelli ti ricordano altre cose gemelle. Ma non entriamo nei dettagli.
        #CSS_crewReport_MunInSpaceLow_00 = ResistI alla tentazione di scendere ancora e "infilare l'ago".
        #CSS_crewReport_MunInSpaceLow_01 = Dai un'occhiata fuori dal finestrino alla superficie... Wow! Chi ha messo montagne così alte su una roccia così piccola?!
        #CSS_crewReport_MunInSpaceLow_02 = La nave subisce una piccola depressurizzazione, ma prontezza di riflessi e un sacco di gomma da masticare riescono a risolvere il problema prima che sfugga di mano.
        #CSS_crewReport_MunInSpaceLow_03 = Guardando la superficie del Mun, ti viene improvvisamente voglia di mangiare formaggio.
        #CSS_crewReport_MunInSpaceLow_04 = "Rapporto dell'equipaggio. Siamo attualmente vicino al Mun. A quanto pare è molto più grande di quanto pensassimo."
        #CSS_crewReport_MunInSpaceLow_05 = Perfetto, siamo arrivati fin qui! E adesso, come si atterra?
        #CSS_crewReport_MunInSpaceLow_06 = Non c'era un'opera scritta su questa cosa?
        #CSS_crewReport_MunInSpaceLow_07 = Non sai se i bordi dei crateri siano un buon sito d'atterraggio. Probabilmente no, ma di certo sarebbero... interessanti.
        #CSS_crewReport_MunInSpaceLow_08 = Ah, l'"East Crater". Sì, ora che sei vicino si capisce benissimo qual è. Di certo non hai guardato la mappa.
        #CSS_crewReport_MunInSpaceLow_09 = UN ALTRO cratere?! Ma questo posto non ha NIENTE di piatto??
        #CSS_crewReport_MunInSpaceLow_10 = Ti chiedi se il tuo rapporto riuscirà a tornare su Kerbin da qui, dopotutto sei sul lato nascosto del Mun.
        #CSS_crewReport_MunInSpaceLow_11 = Riferisci al controllo missione che non hai trovato alcuna prova della vecchia storia secondo cui una mucca sarebbe saltata sopra Mun.
        #CSS_crewReport_MunInSpaceLow_12 = Cerchi di decidere quale zona sarebbe il miglior punto d'atterraggio. Poi compili una lista di riserva di posti che sarebbero un buon punto per un atterraggio di fortuna.
        #CSS_crewReport_MunInSpaceLow_13 = Quei crateri degli altipiani si credono tanto migliori degli altri crateri. Be', da quassù non sembrano poi così speciali!
        #CSS_crewReport_MunInSpaceLow_14 = Inizio rapporto equipaggio. Ho fame. Mangerò snack. Fine rapporto equipaggio.
        #CSS_crewReport_MunInSpaceLow_15 = Senza atmosfera, meteo o forte attività sismica, i crateri del Mun sono conservati in modo sorprendente. Ti assicuri di scattare molte foto e di annotarlo nel rapporto.
        #CSS_crewReport_MunInSpaceLow_16 = Ti ricordi di aver visto un documentario su una delle principali teorie sulla formazione del Mun. È difficile credere che la superficie sterile laggiù fosse un tempo un vero mare di fuoco.
        #CSS_crewReport_MunInSpaceLow_17 = Oltre ai crateri piuttosto rotondi, sembrano esserci anche aree dalla forma molto più irregolare. Gli scienziati le chiamano "bacini".
        #CSS_crewReport_MunInSpaceLow_18 = Riferisci che di notte la nave fa rumori inquietanti e non riesci a dormire. Il controllo missione consiglia di lasciare la luce notturna accesa.
        #CSS_crewReport_MunInSpaceLow_19 = Ringrazi il controllo missione per averti aiutato ad arrivare fin qui.
        #CSS_crewReport_MunInSpaceLow_20 = Le Basse Terre Polari del Mun non sembrano così diverse dal resto del Mun.
        #CSS_crewReport_MunInSpaceLow_21 = L'equipaggio è incredibilmente colpito dall'ingegneria di questa astronave. Ammira in particolare il bar degli snack incassato e climatizzato.
        #CSS_crewReport_MunInSpaceLow_22 = Niente da segnalare, controllo missione! A parte il fatto che stiamo volando sopra Mun, ma questo lo sapete già.
        #CSS_crewReport_MunInSpaceLow_23 = Quei Crateri Gemelli non sembrano poi così simili. Forse sono gemelli eterozigoti.
        #CSS_crewReport_MunInSpaceHigh_00 = Da quassù, i canyon sembrano cicatrici sul volto del Mun. Il che è appropriato, considerando quante ere su ere ha resistito.
        #CSS_crewReport_MunInSpaceHigh_01 = Sei molto fiero di te per essere arrivato fin qui!
        #CSS_crewReport_MunInSpaceHigh_02 = Vedi una grande sfera di formaggio ammuffito... Ah no, aspetta, è solo Mun.
        #CSS_crewReport_MunInSpaceHigh_03 = Che tipo di formazione geologica È QUELLA?
        #CSS_crewReport_MunInSpaceHigh_04 = Ehi, quello somiglia un po' all'arco di McKerbal's.
        #CSS_crewReport_MunInSpaceHigh_05 = Ti volti a guardare Kerbin. Sembra piuttosto piccolo.
        #CSS_crewReport_MunInSpaceHigh_06 = Sembra che Mun sia un'unica grande roccia senza atmosfera.
        #CSS_crewReport_MunInSpaceHigh_07 = Quei crateri... da cosa saranno stati causati?
        #CSS_crewReport_MunInSpaceHigh_08 = "Eccomi qui, fluttuando in una lattina, ben al di sopra del Mun."
        #CSS_crewReport_MunInSpaceHigh_09 = Ti chiedi se quei crateri siano stati causati dagli impatti dei lanci prima di te. Il controllo missione ride nervosamente e ti invita a non pensarci.
        #CSS_crewReport_MunInSpaceHigh_10 = Abbozzi una mappa della superficie munare con l'intenzione di portarla a casa, incorniciarla e appenderla al muro. E siccome hai tempo, ne fai anche qualche copia autografata da vendere su kBay.
        #CSS_crewReport_MunInSpaceHigh_11 = Fissi il cratere sotto di te mentre briciole dello snack che stai mangiando ti cadono dalla bocca.
        #CSS_crewReport_MunInSpaceHigh_12 = Accidenti, Mun sembra proprio malridotta. Guarda quanti buchi.
        #CSS_crewReport_MunInSpaceHigh_13 = Il cratere sotto di te ti fa pensare agli snack. Del resto, tutto ti fa pensare agli snack.
        #CSS_crewReport_MunInSpaceHigh_14 = Chiedi al controllo missione una storia della buonanotte.
        #CSS_crewReport_MunInSpaceHigh_15 = Mmh. Mun assomiglia un po' a una pallina da golf gigante. Tieni d'occhio con ansia l'eventuale arrivo di una mazza da golf gigante.
        #CSS_crewReport_MunInSpaceHigh_16 = Fissando la superficie piena di crateri del Mun, all'improvviso sei grato per la spessa atmosfera di Kerbin.
        #CSS_crewReport_MunInSpaceHigh_17 = Ah, Mun è così piccola e carin... santo cielo, sta diventando grande molto in fretta.
        #CSS_crewReport_MunInSpaceHigh_18 = Tutti i sistemi nella norma. La nave è a posto, quindi sei a posto anche tu.
        #CSS_crewReport_MunInSpaceHigh_19 = Guardare la superficie punteggiata del Mun farsi sempre più grande mentre ti avvicini sempre di più è una vista che custodirai per sempre.
        #CSS_crewReport_MunInSpaceHigh_20 = Provi a immaginare l'enorme energia cinetica liberata quando qualunque cosa abbia creato quei crateri giganti ha impattato. Dev'essere stato uno spettacolo.
        #CSS_crewReport_MunInSpaceHigh_21 = Tu e il controllo missione state giocando a Battaglia Navale via radio. Maledizione! Addio incrociatore.
        #CSS_crewReport_MunInSpaceHigh_22 = Tiri fuori il blocco da disegno e fai un disegno della superficie munare. Poi ci metti una faccina sorridente così sembra felice di vederti!
        #CSS_crewReport_MunInSpaceHigh_23 = Mentre ti avvicini al Mun, ti prendi il tempo di ripassare diversi piani di emergenza, per ogni evenienza.
        #CSS_crewReport_MunInSpaceHigh_24 = Ti prendi il tempo di studiare gli schemi della tua astronave. Ne sei molto colpito e un po' preoccupato da quanti tagli agli angoli siano stati fatti durante progettazione e costruzione.
        #CSS_crewReport_MunInSpaceHigh_25 = I Crateri Gemelli ti ricordano una cellula che si divide.
        #CSS_crewReport_MinmusSrfLanded_00 = Provi a saltare in aria e fare uno spostamento laterale nello stesso momento. Ora, se solo avessi una pistola ad acqua...
        #CSS_crewReport_MinmusSrfLandedHighlands_00 = Da qui la curvatura di Minmus si vede chiaramente.
        #CSS_crewReport_MinmusSrfLandedMidlands_00 = La bassa gravità e il terreno interessante visibile dal finestrino ti invitano a uscire.
        #CSS_crewReport_MinmusSrfLandedLowlands_00 = Ti chiedi perché sei ancora seduto in capsula quando fuori c'è così tanto da fare.
        #CSS_crewReport_MinmusSrfLandedFlats_00 = Guardi Kerbin e sembra più piccolo che mai. Pensi di riuscire a distinguere anche Mun.
        #CSS_crewReport_MinmusSrfLandedGreatFlats_00 = Prendi nota del fatto che atterrare su una superficie perfettamente piatta è un po' noioso.
        #CSS_crewReport_MinmusSrfLandedGreaterFlats_00 = Il terreno qui è completamente piatto. È davvero noioso.
        #CSS_crewReport_MinmusSrfLandedLesserFlats_00 = "Potrei stare in un guscio di noce e sentirmi re di uno spazio infinito."
        #CSS_crewReport_MinmusSrfLandedPoles_00 = Be', da qui non sembra diverso da come appariva da lontano.
        #CSS_crewReport_MinmusSrfLandedSlopes_00 = Non cadere, non cadere, non cadere...
        #CSS_crewReport_MinmusSrfLandedSlopes_01 = Ti è del tutto incomprensibile perché tu abbia deciso di atterrare qui invece che sulla superficie perfettamente piatta del lago ghiacciato laggiù.
        #CSS_crewReport_MinmusInSpaceLow_00 = Ti chiedi se sia possibile fare EVA fino alla superficie e tornare indietro.
        #CSS_crewReport_MinmusInSpaceLow_01 = Ti chiedi se atterrare in cima a una montagna consumi meno carburante. Però sarebbe più difficile.
        #CSS_crewReport_MinmusInSpaceLow_02 = Scendere laggiù col jetpack sarebbe probabilmente divertente. Però dubiti di riuscire a risalire.
        #CSS_crewReport_MinmusInSpaceLow_03 = Ti chiedi se Minmus sappia di menta e se potresti fare fortuna vendendo minuscoli pianeti commestibili.
        #CSS_crewReport_MinmusInSpaceLow_04 = Guardi la superficie di Minmus scintillare sotto di te e ti chiedi se la lingua ti si incollerebbe al suolo dopo una bella leccata.
        #CSS_crewReport_MinmusInSpaceLow_05 = Eccoci qui. La gigantesca menta nello spazio.
        #CSS_crewReport_MinmusInSpaceLow_06 = Guardi fuori dal finestrino e all'improvviso ti viene nostalgia di casa.
        #CSS_crewReport_MinmusInSpaceLow_07 = Torniamo indietro, ho visto una roccia interessante laggiù.
        #CSS_crewReport_MinmusInSpaceLow_08 = So che non c'è atmosfera, ma sembra comunque che puzzi, come formaggio troppo stagionato.
        #CSS_crewReport_MinmusInSpaceHigh_00 = Prendi nota del fatto che la radio non trasmette quando è impostata su OFF.
        #CSS_crewReport_MinmusInSpaceHigh_01 = Kerbin sembra piccolo. Mun sembra piccola. Persino il Sole sembra piccolo. Giri il binocolo nel verso giusto.
        #CSS_crewReport_MinmusInSpaceHigh_02 = Per favore, fa' che sia un mare di sorbetto al lime.
        #CSS_crewReport_MinmusInSpaceHigh_03 = Be', dal vivo è decisamente molto più piccolo.
        #CSS_crewReport_MinmusInSpaceHigh_04 = La luna minore di Kerbin non è impressionante quanto l'altra. Però sembra molto più gustosa.
        #CSS_crewReport_MinmusInSpaceHigh_05 = A questa distanza, Kerbin è poco più di un pallido puntino azzurro che fluttua nell'immensa oscurità dello spazio.
        #CSS_crewReport_MinmusInSpaceHigh_06 = Mh, quanta polvere potresti sollevare se saltassi in uno di quei laghi da quassù?
        #CSS_crewReport_DunaSrfLanded_00 = Fuori c'è parecchia polvere.
        #CSS_crewReport_DunaSrfLandedPoles_00 = Perché siamo atterrati qui, di nuovo? Non c'è niente, solo ghiaccio in ogni direzione.
        #CSS_crewReport_DunaSrfLandedPoles_01 = Una ragnatela di cristalli di ghiaccio si allarga sul finestrino della capsula mentre si raffredda.
        #CSS_crewReport_DunaSrfLandedMidlands_00 = Piccoli cumuli di fine polvere rossa si depositano sui finestrini a causa dell'atmosfera sottile.
        #CSS_crewReport_DunaSrfLandedMidlands_01 = Guardi attraverso il vetro ispessito e vedi piccole colline fino all'orizzonte.
        #CSS_crewReport_DunaSrfLandedLowlands_00 = Un tempo si pensava che le macchie scure sulla superficie di Duna fossero vegetazione che cresceva vicino ai poli con il cambio di stagione. Ora si sa che la colorazione scura è in realtà causata da tempeste di polvere stagionali.
        #CSS_crewReport_DunaSrfLandedLowlands_01 = Un gigantesco diavolo di polvere serpeggia in lontananza sulla pianura, sollevando una scia di polvere fine.
        #CSS_crewReport_DunaSrfLandedCraters_00 = La superficie di Duna sembra coperta di dune. Noti che il pianeta è stato chiamato proprio bene.
        #CSS_crewReport_DunaSrfLandedCraters_01 = Guardi fuori e vedi il fondo del cratere pieno di sabbia scolpita in motivi dalle correnti di vento.
        #CSS_crewReport_DunaSrfLandedHighlands_00 = "È estremamente rosso, passo."
        #CSS_crewReport_DunaSrfLandedHighlands_01 = Vedo con il mio occhietto qualcosa che inizia per "c".. sì, è "collina".
        #CSS_crewReport_DunaSrfLandedHighlands_02 = Scrivi "rosso", "pieno di massi" e "polveroso" nel registro.
        #CSS_crewReport_DunaSrfLandedMidlandSea_00 = I venti leggeri sulla pianura depositano una sottile patina di polvere sul finestrino, rendendo il mondo ancora più rosso.
        #CSS_crewReport_DunaSrfLandedMidlandSea_01 = "Buuuon giorno signore e signorikerb, le previsioni per oggi danno massime di un frizzante meno 5 gradi con rischio di tempesta di polvere tra medio e alto. Se uscite, copritevi bene e portate sempre un respiratore. Qui è Jeb, per KSWN."
        #CSS_crewReport_DunaSrfLandedNorthernBasin_00 = Il paesaggio rosso fuori dal finestrino non sembra per niente invitante. Devi proprio uscire là fuori?
        #CSS_crewReport_DunaSrfLandedNorthernBasin_01 = La sabbia inizia ad accumularsi sul bordo del finestrino. Esatto, sabbia! Per una volta non è polvere!
        #CSS_crewReport_DunaSrfLandedSouthernBasin_00 = Il ghiaccio sta lentamente avanzando sull'antico campo di lava. Speri che non avanzi anche su di te.
        #CSS_crewReport_DunaSrfLandedSouthernBasin_01 = Un lato del bacino è quasi tutto ghiaccio, l'altro quasi tutto roccia. Controlli la mappa per vedere da che parte sei atterrato.
        #CSS_crewReport_DunaSrfLandedNorthernShelf_00 = Strizzi gli occhi nella polvere. Quelle in lontananza sono montagne? ...Non sono montagne, sono pareti di canyon!
        #CSS_crewReport_DunaSrfLandedNorthernShelf_01 = Ora che il veicolo è fermo, la sabbia rossa di Duna inizia ad accumularsi sul finestrino. Provi a picchiettare il vetro per farla cadere, finché ci pensa una raffica di vento.
        #CSS_crewReport_DunaSrfLandedMidlandCanyon_00 = Le pareti del canyon qui sembrano... sinuose. Strano.
        #CSS_crewReport_DunaSrfLandedMidlandCanyon_01 = Da quaggiù la gola sembra minacciosa, come dovrebbe essere qualsiasi canyon che si rispetti.
        #CSS_crewReport_DunaSrfLandedEasternCanyon_00 = Il canyon è così enorme e polveroso che non vedi l'altra parete. Ti fa sentire particolarmente piccolo. Va bene, Duna, ho capito!
        #CSS_crewReport_DunaSrfLandedEasternCanyon_01 = Qui sotto l'aria è densa di polvere e la foschia riduce la visibilità a un paio di centinaia di metri circa.
        #CSS_crewReport_DunaSrfLandedWesternCanyon_00 = Questo canyon sembra piuttosto stretto e relativamente libero dalla polvere, così riesci a vedere bene le pareti.
        #CSS_crewReport_DunaSrfLandedWesternCanyon_01 = Ti immagini il canyon come il solco di un gigantesco disco in vinile rosso. E se l'avessero fatto alieni appassionati di musica?
        #CSS_crewReport_DunaSrfLandedPolarHighlands_00 = Guardi fuori e vedi una rete di gallerie che corre sotto il ghiaccio fino a un buco vicino, e cerchi di non pensare a cosa implichi per quel ghiaccio.
        #CSS_crewReport_DunaSrfLandedPoalrHighlands_01 = Il veicolo scivola e sobbalza per un attimo sul ghiaccio prima di fermarsi. Ci vuole un po' prima che tu lasci le maniglie.
        #CSS_crewReport_DunaSrfLandedPolarCraters_00 = Guardi l'immensa conca ghiacciata nel paesaggio e speri davvero che le tute EVA siano climatizzate.
        #CSS_crewReport_DunaSrfLandedPolarCraters_01 = Il radiatore della cabina scatta, scacciando il freddo che si infiltra nel veicolo.
        #CSS_crewReport_DunaFlyingLow_00 = Duna ti piace molto. Ti ricorda dei pancake al cioccolato.
        #CSS_crewReport_DunaFlyingLowPoles_00 = Una manciata di minuscoli cristalli di ghiaccio scorre oltre il finestrino come particelle di polvere.
        #CSS_crewReport_DunaFlyingLowPoles_01 = Il finestrino della capsula è freddo al tatto. Meglio sperare che ci siano dei guanti nel cassetto.
        #CSS_crewReport_DunaFlyingLowMidlands_00 = Le basse colline rosse iniziano a confondersi tra loro in lontananza. Ti strofini gli occhi.
        #CSS_crewReport_DunaFlyingLowMidlands_01 = Il pianeta è molto rosso, e questo ti ricorda il pollo rosso che hai lasciato nel frigo del complesso astronauti. Speri davvero che sia ancora lì quando tornerai, perché TU stai tornando. Vero, controllo missione?
        #CSS_crewReport_DunaFlyingLowLowlands_00 = Le pianure sotto di te sono attraversate da linee di sabbia smossa, come una pavimentazione folle fatta di sabbia.
        #CSS_crewReport_DunaFlyingLowLowlands_01 = Osservi il pianeta e capisci che non avrai problemi a mantenere la visione notturna.
        #CSS_crewReport_DunaFlyingLowCraters_00 = Tremi sulla poltrona. I tuoi pensieri vanno al calore luminoso del rientro nell'atmosfera di Kerbin e inizi a sentire la mancanza della famiglia.
        #CSS_crewReport_DunaFlyingLowCraters_01 = Vedi le pareti del cratere stagliarsi in lontananza in modo imponente. Qualunque cosa l'abbia creato deve essere stato un colpo davvero grosso.
        #CSS_crewReport_DunaFlyingLowHighlands_00 = Ti sembra di vedere un volto. Forse è un gioco di luci... No, no... è proprio un volto.
        #CSS_crewReport_DunaFlyingLowHighlands_01 = Se dalla superficie hai già una visuale abbastanza buona, perché salire anche solo un po' più in alto?
        #CSS_crewReport_DunaFlyingLowMidlandSea_00 = Noti una colonna di polvere che svetta in lontananza. Chissà cos'è.
        #CSS_crewReport_DunaFlyingLowMidlandSea_01 = Una gigantesca tempesta di polvere sta puntando sul tuo punto d'atterraggio. Forse è meglio non passarci troppo tempo.
        #CSS_crewReport_DunaFlyingLowNorthernBasin_00 = L'odore degli snack che hai messo a scaldare prima comincia a farti venire fame nel momento peggiore.
        #CSS_crewReport_DunaFlyingLowNorthernBasin_01 = Con la bassa gravità di Duna, le cose volano più lontano. Lo sai perché una turbolenza ti ha appena tirato uno stivale in faccia.
        #CSS_crewReport_DunaFlyingLowSouthernBasin_00 = Una raffica improvvisa di vento gelido quasi spinge la nave fuori rotta. Sono i rischi di volare vicino alle zone ghiacciate.
        #CSS_crewReport_DunaFlyingLowSouthernBasin_01 = Vorresti fare un tonneau, finché non ti ricordi che il CSK sta monitorando da vicino tutta la telemetria e preferisci tenerti il lavoro quando tornerai.
        #CSS_crewReport_DunaFlyingLowNorthernShelf_00 = L'enorme cicatrice scavata nella superficie si estende fino all'orizzonte rossastro e velato.
        #CSS_crewReport_DunaFlyingLowNorthernShelf_01 = Una potente raffica scuote violentemente la capsula e uno snack dimenticato da tempo cade dall'armadietto superiore.
        #CSS_crewReport_DunaFlyingLowMidlandCanyon_00 = Qui servirà una bella mano per atterrare. Cerchi di individuare un punto che non sia troppo in pendenza.
        #CSS_crewReport_DunaFlyingLowMidlandCanyon_01 = Da qui non riesci a vedere molto altro, perché il canyon curva fuori dal tuo campo visivo.
        #CSS_crewReport_DunaFlyingLowEasternCanyon_00 = C'è così tanta polvere che vedi a malapena il suolo. Stai volando alla cieca, con solo l'altimetro a dirti quanto è vicino il terreno.
        #CSS_crewReport_DunaFlyingLowEasternCanyon_01 = Le nuvole di polvere ribollono oltre il finestrino, come se l'aria stessa fosse viva di sabbia.
        #CSS_crewReport_DunaFlyingLowWesternCanyon_00 = Guardi in basso e speri di non atterrare su una delle pareti ripide. Sarebbe... problematico.
        #CSS_crewReport_DunaFlyingLowWesternCanyon_01 = Il canyon si perde verso l'orizzonte velato in entrambe le direzioni. Ti sembra di aver detto qualcosa di simile prima.
        #CSS_crewReport_DunaFlyingLowPolarHighlands_00 = Le colline ghiacciate si estendono in ogni direzione sotto di te. Il riverbero del ghiaccio rende difficile guardare in basso.
        #CSS_crewReport_DunaFlyingLowPolarHighlands_01 = Trovi una pagina del manuale di sicurezza su come gestire gli attacchi degli orsi polari spaziali. Purtroppo dice solo "scappa".
        #CSS_crewReport_DunaFlyingLowPolarCraters_00 = All'orizzonte vedi solo ghiaccio rosato, anche se senza la foschia di polvere delle latitudini più basse.
        #CSS_crewReport_DunaFlyingLowPolarCraters_01 = Frughi nel vano portaoggetti in cerca di un paio di occhiali da sole contro il riverbero del ghiaccio, che è forte anche con il debole sole di Duna.
        #CSS_crewReport_DunaFlyingHigh_00 = Sulla superficie del pianeta sembra esserci qualcosa che ricorda un volto, ma è solo un gioco di luci e ombre.
        #CSS_crewReport_DunaFlyingHigh_01 = Il lieve fischio dell'aria sottile intorno alla capsula è quasi rilassante.
        #CSS_crewReport_DunaFlyingHigh_02 = Guardi fuori cercando di scorgere la versione di Duna della "sottile linea blu", ma non se ne vede alcuna.
        #CSS_crewReport_DunaInSpaceLow_00 = Si può kerbalformare?
        #CSS_crewReport_DunaInSpaceLow_01 = Duna. La piccola gemella fallita di Kerbin. Il pensiero di ciò che avrebbe potuto essere ti rattrista.
        #CSS_crewReport_DunaInSpaceLow_02 = Mentre orbiti intorno al pianeta, intercetti quello che sembra un segnale TV da Kerbin. È così distorto che non riesci a capirci nulla.
        #CSS_crewReport_DunaInSpaceHigh_00 = L'equipaggio è preoccupato che il pianeta sia "troppo rosso". Il controllo missione non crede sia un buon motivo per tornare a casa.
        #CSS_crewReport_DunaInSpaceHigh_01 = Speriamo che ovunque tu sia sia fuori dalla morsa delle grinfie gravitazionali di Ike.
        #CSS_crewReport_DunaInSpaceHigh_02 = È un pomodoro gigante?
        #CSS_crewReport_IkeSrfLandedPolarLowlands_00 = Be', eccoci nella grande conca nera, la grande conca nera...
        #CSS_crewReport_IkeSrfLandedPolarLowlands_01 = Le alte pareti della depressione polare proiettano lunghe ombre sul terreno già scuro là fuori.
        #CSS_crewReport_IkeSrfLandedMidlands_00 = Chiedi al Controllo Missione cosa ci fai qui.
        #CSS_crewReport_IkeSrfLandedMidlands_01 = Non sei più così sicuro che Ike ti piaccia.
        #CSS_crewReport_IkeSrfLandedEasternMountainRidge_00 = Ogni luna ha due lati, e hai la sensazione di essere atterrato su quello giusto.
        #CSS_crewReport_IkeSrfLandedEasternMountainRidge_01 = Anche da qui, Duna spunta ancora oltre l'orizzonte a tenerti d'occhio.
        #CSS_crewReport_IkeSrfLandedWesternMountainRidge_00 = Quel pezzo di terreno sembra instabile. Forse i bassopiani sarebbero stati un posto più sicuro per atterrare.
        #CSS_crewReport_IkeSrfLandedWesternMountainRidge_01 = Non vedi l'ora di uscire dalla capsula e fare qualche salto sulla montagna.
        #CSS_crewReport_IkeSrfLandedLowlands_00 = Vedi una sfocatura verde fuori e speri che non sia il kraken.
        #CSS_crewReport_IkeSrfLandedLowlands_01 = Il terreno è scuro e il cielo è scuro. Siamo davvero atterrati?
        #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_00 = Altre montagne grigie. Che entusiasmo.
        #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_01 = Queste montagne sono enormi. Guardi fuori e le vedi salire fino alle stelle intorno a te.
        #CSS_crewReport_IkeSrfLandedSouthPole_00 = Appoggi il piede su una zona liscia e quasi scivoli. Ringrazi la bassa gravità di Ike.
        #CSS_crewReport_IkeSrfLandedSouthPole_01 = Ormai inizi a pensare che il grigio della superficie ti abbia scolorito la vista. Speri di non diventare grigio anche tu.
        #CSS_crewReport_IkeSrfLandedCentralMountainRange_00 = Potresti restare qui per sempre, guardando attraverso il vetro ispessito le tempeste di polvere scorrere lontano sulla superficie di Duna.
        #CSS_crewReport_IkeSrfLandedCentralMountainRange_01 = Allunghi il collo contro il finestrino cercando di intravedere Duna.
        #CSS_crewReport_IkeInSpaceLow_00 = Ike sembra scuro e minaccioso. Possiamo andare su Duna invece?
        #CSS_crewReport_IkeInSpaceLow_01 = Alcune di quelle montagne arrivano davvero molto in alto. Controlli bene l'altimetro.
        #CSS_crewReport_IkeInSpaceHigh_00 = Chiedi al Controllo Missione se anche a loro piace Ike.
        #CSS_crewReport_IkeInSpaceHigh_01 = C'è Ike, dietro il vetro spesso del finestrino della capsula. Non sei sicuro che ti piaccia.
        #CSS_crewReport_DresSrfLanded_00 = Avevi ragione... sembra davvero una gigantesca patata.
        #CSS_crewReport_DresSrfLandedHighlands_00 = È esattamente grigio e ghiacciato come previsto. Neanche un po' meno grigio, neanche un po' più ghiaccio.
        #CSS_crewReport_DresSrfLandedImpactEjecta_00 = Vedi segni di bruciatura e ti torna in mente casa, al CSK.
        #CSS_crewReport_DresSrfLandedCanyons_00 = Ti crogioli nella consapevolezza di essere atterrato con successo sul Mun. Aspetta.
        #CSS_crewReport_DresInSpaceLow_00 = Laggiù è molto grigio e ghiacciato. Il team dell'EAV userà la cosa per chiedere gambe d'atterraggio più resistenti al grigio.
        #CSS_crewReport_DresInSpaceLow_01 = Sembra troppo piccolo per essere un pianeta.
        #CSS_crewReport_DresInSpaceLow_02 = Vedi detriti di quello che sembra un impatto...
        #CSS_crewReport_DresInSpaceHigh_00 = Vedi quello che sembra segni di bruciatura e all'improvviso ti dispiace per Dres.
        #CSS_crewReport_DresInSpaceHigh_01 = Notando un grande taglio sulla superficie di Dres, ti chiedi se nel kit di pronto soccorso ci sia un cerotto abbastanza grande.
        #CSS_crewReport_DresInSpaceHigh_02 = Guardando il pianeta ruotare sotto di te, ti manca casa.
        #CSS_crewReport_JoolFlyingLow_00 = Senti il verde tutt'intorno a te. È fantastico.
        #CSS_crewReport_JoolFlyingLow_01 = Sembra una situazione in cui Jebediah si troverebbe a suo agio, solo con più SRB ed esplosioni.
        #CSS_crewReport_JoolFlyingLow_02 = Guardando in alto tra le tempestose nubi verdi, ti viene in mente che forse volare così in basso nell'atmosfera di Jool non è stata una grande idea.
        #CSS_crewReport_JoolFlyingLow_03 = Il veicolo trema e sembra molto instabile.
        #CSS_crewReport_JoolFlyingLow_04 = Ti rendi conto che non sei una sonda.
        #CSS_crewReport_JoolFlyingLow_05 = Il tuo aerofrenaggio si è trasformato in un atterraggio aero. Era parte del piano?
        #CSS_crewReport_JoolFlyingLow_06 = Il Controllo Missione chiede un rapporto, ma tu riesci solo a immaginare una gigantesca esplosione d'addio.
        #CSS_crewReport_JoolFlyingLow_07 = Forse ti sei cacciato in un bel pasticcio.
        #CSS_crewReport_JoolFlyingLow_08 = Atterrare su Jool, eh? Perché no?
        #CSS_crewReport_JoolFlyingLow_09 = Ancora nessun segno di una superficie. Forse se scendessi ancora?
        #CSS_crewReport_JoolFlyingHigh_00 = Mentre osservi dal finestrino ti spaventi perché Jool sembra ricambiarti lo sguardo. Dopo un attimo capisci che era il tuo viso riflesso nel vetro e commenti che le urla erano "solo chiacchiere radio".
        #CSS_crewReport_JoolFlyingHigh_01 = Mentre il veicolo attraversa le dense nubi verdi, rallenta drasticamente. Basta non restare bloccati.
        #CSS_crewReport_JoolFlyingHigh_02 = È più che inquietante vedere nubi in ogni direzione.
        #CSS_crewReport_JoolFlyingHigh_03 = Vedi un enorme fulmine nelle nubi lontane. Chiedi nervosamente al Controllo Missione se la nave è omologata per una scarica del genere.
        #CSS_crewReport_JoolFlyingHigh_04 = Il pianeta davanti a te non ricorda nulla quanto una gigantesca pallina da tennis. Forse ha del pelo che si può raccogliere per costruire un ascensore spaziale?
        #CSS_crewReport_JoolFlyingHigh_05 = Guardi fuori dal finestrino e resti a bocca aperta per il panorama.
        #CSS_crewReport_JoolFlyingHigh_06 = Ti chiedi se arriverai vivo alla prossima ora.
        #CSS_crewReport_JoolFlyingHigh_07 = Speri che l'aerofrenaggio non diventi un atterraggio aero.
        #CSS_crewReport_JoolInSpaceLow_00 = Ti chiedi se qui il succo d'arancia sia verde.
        #CSS_crewReport_JoolInSpaceLow_01 = Il verde dell'atmosfera ti ricorda l'erba soffice di Kerbin. Più o meno.
        #CSS_crewReport_JoolInSpaceLow_02 = Prendi nota di quanto sia enorme Jool e cerchi di non pensare a quanto ti faccia sentire piccolo.
        #CSS_crewReport_JoolInSpaceLow_03 = L'enorme dimensione delle fasce di Van Allen sta strappando elettroni dallo scafo. Eviti con cura le pareti, per non prenderti la madre di tutte le scariche elettrostatiche.
        #CSS_crewReport_JoolInSpaceLow_04 = Forse riusciresti a prendere un campione di idrogeno metallico prima dell'inevitabile crunch?
        #CSS_crewReport_JoolInSpaceLow_05 = L'orbita verde sta diventando davvero grande, adesso.
        #CSS_crewReport_JoolInSpaceLow_06 = Mentre guardi il grande pianeta verde, ti sembra di vedere un movimento delle nubi molto, molto più in basso.
        #CSS_crewReport_JoolInSpaceHigh_00 = Vedi tre lune grandi e due piccole. Vuoi atterrare su tutte.
        #CSS_crewReport_JoolInSpaceHigh_01 = Diario di bordo: "Siamo rimasti senza snack."
        #CSS_crewReport_JoolInSpaceHigh_02 = Siamo molto lontani da casa.
        #CSS_crewReport_JoolInSpaceHigh_03 = Guardando oltre il finestrino, vedi un disco grigio sfrecciare via. Inizi a pensare di non essere solo.
        #CSS_crewReport_JoolInSpaceHigh_04 = Riflettendo sulla tonalità del pianeta, ti ricordi che il verde è il colore preferito dai geni.
        #CSS_crewReport_JoolInSpaceHigh_05 = Pensi alle fasce di radiazione di Jool e ti chiedi se sei ancora vivo.
        #CSS_crewReport_JoolInSpaceHigh_06 = Sorprendentemente, qui la radiazione è solo 1,5 MR l'ora. Oh aspetta, quella M è maiuscola...
        #CSS_crewReport_JoolInSpaceHigh_07 = Non sono 3 roentgen. Sono 1.500.000 roentgen.
        #CSS_crewReport_LaytheSrfLanded_00 = Ti manca la famiglia. Inizi a scrivere una cartolina.
        #CSS_crewReport_LaytheSrfLandedPoles_00 = Un giorno avremo una base permanente qui. Un giorno.
        #CSS_crewReport_LaytheSrfLandedShores_00 = Sembra proprio che in questo momento siamo ben piantati a terra.
        #CSS_crewReport_LaytheSrfLandedDunes_00 = Ti chiedi se potresti semplicemente sederti in spiaggia, rilassarti e bere una margarita.
        #CSS_crewReport_LaytheSrfLandedCrescentBay_00 = Dopo aver saputo che l'aria è respirabile, apri il casco, solo per scoprire che respirabile non vuol dire inodore o gradevole.
        #CSS_crewReport_LaytheSrfLandedTheSagenSea_00 = Guardando fuori dal finestrino, vedi qualcosa che brilla sotto di te. Decidi che sia meglio raggiungere la riva il prima possibile.
        #CSS_crewReport_LaytheSrfSplashed_00 = Guardando la mappa di Laythe per capire quale isola sia la più vicina, capisci che sarebbe una nuotata lunghissima, anche solo per sperare in un salvataggio.
        #CSS_crewReport_LaytheSrfSplashedCrescentBay_00 = Ti rendi conto all'improvviso di aver dimenticato l'asciugamano.
        #CSS_crewReport_LaytheSrfSplashedTheSagenSea_00 = Vorresti aver portato una barca.
        #CSS_crewReport_LaytheSrfSplashedTheSagenSea_00 = Ti è sembrato di vedere qualcosa muoversi nell'acqua. Forse uscire dalla capsula non è una buona idea.
        #CSS_crewReport_LaytheFlyingLow_00 = Sicuri di non essere su Kerbin?
        #CSS_crewReport_LaytheFlyingLowPoles_00 = Ti eri messo a fantasticare di essere il capitano della Corazzata Spaziale Spirito di Kerbin, finché un segnale acustico non ti ha svegliato.
        #CSS_crewReport_LaytheFlyingLowShores_00 = L'oceano sembra invitante. Ti rendi conto di aver dimenticato il costume. Pazienza, il Controllo Missione non avrebbe mai approvato.
        #CSS_crewReport_LaytheFlyingLowDunes_00 = L'equipaggio discute animatamente sul modo giusto di pronunciare Laythe.
        #CSS_crewReport_LaytheFlyingLowCrescentBay_00 = Sembra che a questa quota l'atmosfera blocchi gran parte delle radiazioni di Jool. Speri che l'abbronzatura non ne risenta.
        #CSS_crewReport_LaytheFlyingLowTheSagenSea_00 = Guardi la luna sotto di te e ti prende la nostalgia di casa.
        #CSS_crewReport_LaytheFlyingHigh_00 = Qui i valori di radiazione alfa e beta sono bassi, ma restano elevati quelli di raggi X e gamma.
        #CSS_crewReport_LaytheInSpaceLow_00 = Gli strumenti di radiazione mostrano risultati strani. Forse Laythe ha un campo magnetico che interagisce con quello di Jool.
        #CSS_crewReport_LaytheInSpaceLow_01 = Inizi a pensare a quanto sia una fortuna che l'espansione Fasce di Radiazione per la vita reale non sia ancora uscita.
        #CSS_crewReport_LaytheInSpaceHigh_00 = Qui la radiazione dev'essere intensa. Ti fa piacere che la cabina di pilotaggio sia ben schermata.
        #CSS_crewReport_LaytheInSpaceHigh_01 = Mentre osservi Laythe, inizi a chiederti se Kerbin sia l'unico pianeta a ospitare vita.
        #CSS_crewReport_LaytheInSpaceHigh_02 = Mentre l'equipaggio guarda Laythe, gli torna in mente casa e l'enorme distanza percorsa.
        #CSS_crewReport_LaytheInSpaceHigh_03 = Sai che quel liquido blu non può essere acqua. Questa luna è fuori dalla zona abitabile.
        #CSS_crewReport_VallSrfLanded_00 = Scosse fanno tremare attrezzi e oggetti non fissati ogni pochi minuti.
        #CSS_crewReport_VallSrfLandedMidlands_00 = Prendi nota che Vall è "fredda, desolata... solitaria". Il Controllo Missione ti dice di smetterla di fare il melodrammatico.
        #CSS_crewReport_VallSrfLandedHighlands_00 = Non vedi l'ora di uscire. Sembra bellissima!
        #CSS_crewReport_VallSrfLandedLowlands_00 = Tutto nella nave ha sobbalzato, quella sì che è stata una bella scossa.
        #CSS_crewReport_VallInSpaceLow_00 = Fissando fuori dal finestrino, ti rendi conto di quanto sia blu la luna.
        #CSS_crewReport_VallInSpaceLow_01 = La superficie sembra spaccata da eoni di attività geologica.
        #CSS_crewReport_VallInSpaceLow_02 = Mentre guardi, senti qualcosa muoversi dentro di te. Ti annoti di cuocere il cibo con più attenzione la prossima volta.
        #CSS_crewReport_VallInSpaceHigh_00 = Mentre prendi appunti, noti che Vall entra nel foro della tua tavoletta.
        #CSS_crewReport_VallInSpaceHigh_01 = Saresti pronto a giurare di aver visto una formazione nera vicino al polo sud, ma l'hai persa prima di poter prendere il binocolo.
        #CSS_crewReport_VallInSpaceHigh_02 = La luna è un bellissimo mosaico di blu e bianco.
        #CSS_crewReport_VallInSpaceHigh_03 = Ti chiedi perché l'inclinazione di questa luna sia esattamente uguale a quella di Vall.
        #CSS_crewReport_TyloSrfLanded_00 = Ti senti sorprendentemente leggero.
        #CSS_crewReport_TyloSrfLandedHighlands_00 = La gravità è piuttosto forte e ti ricorda casa.
        #CSS_crewReport_TyloSrfLandedLowlands_00 = Non riesci a fare pochi metri senza diventare amico del suolo con la faccia. È leggermente irritante.
        #CSS_crewReport_TyloSrfLandedMara_00 = Ti congratuli con te stesso per essere arrivato fin qui senza troppo freno lito. Poi inizi a calcolare il tuo delta V per vedere se riesci a tornare a casa.
        #CSS_crewReport_TyloInSpaceLow_00 = Ti chiedi perché, nonostante le dimensioni, Tylo non abbia un'atmosfera.
        #CSS_crewReport_TyloInSpaceLow_01 = L'equipaggio si chiede perché mai debba atterrare su questo sasso deprimente.
        #CSS_crewReport_TyloInSpaceHigh_00 = Quest'orbita era voluta o il Controllo Missione ti sta nascondendo qualcosa?
        #CSS_crewReport_TyloInSpaceHigh_01 = È come Kerbin, ma senza le cose belle come atmosfera, oceani o placche tettoniche. Quindi no, non è affatto come Kerbin.
        #CSS_crewReport_BopSrfLanded_00 = Le gambe d'atterraggio affondano nella superficie con un rumore molle e viscido.
        #CSS_crewReport_BopSrfLandedPeaks_00 = Da qui vedo Kerbin. Magari avessi un telescopio...
        #CSS_crewReport_BopSrfLandedPeaks_01 = Il Controllo Missione ti dice che il panorama incredibile che vedi è solo un'illusione ottica. Tu fai comunque qualche foto.
        #CSS_crewReport_BopSrfLandedRidges_00 = Senti uno strano rumore alla radio, probabilmente causato dalle radiazioni del pianeta principale.
        #CSS_crewReport_BopSrfLandedPoles_00 = Non sai perché, ma questo posto ti mette addosso una strana inquietudine.
        #CSS_crewReport_BopSrfLandedSlopes_00 = Da qui Bop non ispira alcuna fiducia.
        #CSS_crewReport_BopSrfLandedValley_00 = Senti odore di calamaro. Il pilota deve star mangiando sushi. Cos'altro potrebbe essere?
        #CSS_crewReport_BopInSpaceLow_00 = Ti chiedi se Twist e Pull siano da queste parti.
        #CSS_crewReport_BopInSpaceLow_01 = Fissi fuori dal finestrino e vedi solo un terreno ruvido e frastagliato, poco piacevole alla vista.
        #CSS_crewReport_BopInSpaceLow_02 = Bop sembra insignificante. Troppo insignificante. Di sicuro nasconde qualche oscuro segreto...
        #CSS_crewReport_BopInSpaceLow_03 = Quella montagna è abbastanza alta da poterti colpire. Speri di stare atterrando.
        #CSS_crewReport_BopInSpaceLow_04 = L'ultima volta che siamo andati su Gilly non siamo tornati... oh? Questo è Bop?
        #CSS_crewReport_BopInSpaceHigh_00 = Questo sasso sembra del tutto insignificante. Hai una strana inquietudine, probabilmente perché sei senza snack gustosi da sei mesi.
        #CSS_crewReport_BopInSpaceHigh_01 = L'asteroide catturato sembra una grossa patata marrone. Non puoi fare a meno di chiederti se cambiare inclinazione valesse davvero la fatica.
        #CSS_crewReport_BopInSpaceHigh_02 = Bloccato in un'orbita eccentrica e inclinata, questo sasso non offre nulla da guardare. Una completa perdita di tempo.
        #CSS_crewReport_BopInSpaceHigh_03 = Da questa quota Bop somiglia incredibilmente a una patata.
        #CSS_crewReport_BopInSpaceHigh_04 = Il Controllo Missione ti informa che no, quella fuori dal finestrino non è una patata.
        #CSS_crewReport_BopInSpaceHigh_05 = Ti rendi conto che quella montagna è incredibilmente alta.
        #CSS_crewReport_PolSrfLanded_00 = L'equipaggio è ridotto a starnutire senza sosta.
        #CSS_crewReport_PolSrfLandedPoles_00 = Ti viene da ridere pensando di essere atterrato sul polo di Pol. Il Controllo Missione non è divertito.
        #CSS_crewReport_PolSrfLandedLowlands_00 = Sei felice che l'atterraggio sia finito.
        #CSS_crewReport_PolSrfLandedHighlands_00 = Ti chiedi se puoi riportare a casa un po' di pol per il tuo giardino su Kerbin.
        #CSS_crewReport_PolInSpaceLow_00 = A quanto pare Pol esiste davvero, e non è solo un granello di polline sulla lente del telescopio di Galileo Kerman. Chi l'avrebbe detto?
        #CSS_crewReport_PolInSpaceLow_01 = Solo guardare la superficie ti fa starnutire.
        #CSS_crewReport_PolInSpaceHigh_00 = Pulisci il finestrino per essere sicuro che quel puntino che vedi non sia un granello di polline.
        #CSS_crewReport_EelooSrfLanded_00 = Ti chiedi se la nave che ti ha portato fin qui sia davvero all'altezza. Sei proprio sicuro di poter tornare?
        #CSS_crewReport_EelooSrfLanded_01 = Inciampi e cadi su un sassolino minuscolo e inizi a perdere sensibilità nelle braccia. Terrorizzato dalle temperature sotto zero, guardi in basso e capisci che ci stavi sdraiato sopra.
        #CSS_crewReport_EelooSrfLanded_02 = Hai freddo.
        #CSS_crewReport_EelooSrfLanded_03 = Hai molto freddo.
        #CSS_crewReport_EelooSrfLanded_04 = Ti senti molto caldo. Il medico ti diagnostica un'ipotermia estrema. Poi capisci che il medico te lo sei immaginato.
        #CSS_crewReport_EelooSrfLandedPoles_00 = Guardi fuori dai finestrini e vedi ghiaccio. Tanto, tantissimo ghiaccio. E qualche roccia qua e là. Rocce ghiacciate.
        #CSS_crewReport_EelooSrfLandedNorthernGlaciers_00 = Da così lontano la radio va un po' a tratti. Senti il fruscio coprire le prossime istruzioni. Pazienza, tanto non saranno state importanti.
        #CSS_crewReport_EelooSrfLandedLowlands_00 = Comunichi che Eeloo è "lontano e solitario". Il Controllo Missione non gradisce e pretende più informazioni.
        #CSS_crewReport_EelooSrfLandedHighlands_00 = Prendi appunti su quanto Eeloo sia spoglio e solitario. Poi provi a calcolare quanto tempo impiegherà il segnale ad andare e tornare da Kerbin.
        #CSS_crewReport_EelooSrfLandedIceCanyons_00 = Sembra che tu abbia finito tutti gli snack. Inizi a piangere in silenzio in un angolo.
        #CSS_crewReport_EelooSrfLandedIceCanyons_01 = Qui fa freddo.
        #CSS_crewReport_EelooSrfLandedCraters_00 = Guardi fuori dalla capsula e non riesci a trovare Kerbin. In che guaio ti ha cacciato stavolta il Controllo Missione?
        #CSS_crewReport_EelooSrfLandedMidlands_00 = Ti chiedi cosa ci sia sotto il ghiaccio...
        #CSS_crewReport_EelooInSpaceLow_00 = Noti che la capsula non è dotata di riscaldamento centralizzato, e il Controllo Missione ti informa che è perché dovevi andare su Moho. La cosa non ti rassicura affatto.
        #CSS_crewReport_EelooInSpaceLow_01 = Per un attimo non ricordi bene quale stella sia il tuo sole.
        #CSS_crewReport_EelooInSpaceLow_02 = Ho la sensazione che potremmo andare ovunque. Andiamo. Tipo adesso. Davvero, ovunque.
        #CSS_crewReport_EelooInSpaceLow_03 = L'equipaggio guarda la sfera di ghiaccio gelata di Eeloo e, per un momento, resta senza parole. Pochi Kerbal sono arrivati così lontano da casa, e a tutti diventa chiaro il coraggio, la determinazione e la spinta che li hanno portati fin qui. I pensieri si fanno profondi e umili, perché in pochi sono sostenuti da tantissimi.
        #CSS_crewReport_EelooInSpaceLow_04 = La superficie liscia di Eeloo ti ricorda le calotte di ghiaccio di casa. Dopo aver pensato a quanto sei lontano, vai a dormire.
        #CSS_crewReport_EelooInSpaceLow_05 = Inizi a pentirti di non aver portato il sacchetto extra di snack.
        #CSS_crewReport_EelooInSpaceHigh_00 = Visto quanto è strana l'orbita di Eeloo, inizi a chiederti se esista un pianeta oltre. Pensi che un buon nome potrebbe essere "Pianeta Y".
        #CSS_crewReport_EelooInSpaceHigh_01 = Guardi fuori dal finestrino e noti strisce e macchie beige sulla superficie. Ti chiedi subito se sia impasto per biscotti.
        #CSS_crewReport_EelooInSpaceHigh_02 = Ti ricorda una palla di neve. È già inverno?
        #CSS_crewReport_EelooInSpaceHigh_03 = Sembra un enorme cubetto di ghiaccio sferico.
        #CSS_crewReport_EelooInSpaceHigh_04 = Questo sì che è un pianeta gelido. Inizi a immaginare epiche battaglie a palle di neve in microgravità.
        #CSS_crewReport_EelooInSpaceHigh_05 = Eeloo sembra bianchissimo, forse qualcuno l'ha coperto con un lenzuolo gigante.
        #CSS_crewReport_EelooInSpaceHigh_06 = Mentre fissi la superficie spaccata e senza vita, ti si forma in mente una domanda: "Ne valeva davvero la pena?"

        // evaReport
        #CSS_evaReport_default_00 = L'impossibilità di grattarti il mento sta rendendo quasi impossibile concentrarti sull'EVA.
        #CSS_evaReport_default_01 = Si prova più o meno come dentro la nave, solo decisamente più “all'aperto”.
        #CSS_evaReport_default_02 = Non puoi fare a meno di chiederti dove hai lasciato le chiavi.
        #CSS_evaReport_default_03 = Noti una clamorosa mancanza di un buco-snack nella tuta.
        #CSS_evaReport_default_04 = Accendi e spegni ripetutamente le luci del casco.
        #CSS_evaReport_default_05 = Le stelle oggi sembrano molto diverse.
        #CSS_evaReport_default_06 = Scopri qualche spicciolo e lo infili subito in tasca prima che qualcuno se ne accorga.
        #CSS_evaReport_default_07 = "Cosa non dovevo fare? Vabbè… probabilmente non era importante."
        #CSS_evaReport_default_08 = Ti chiedi cosa succederebbe se ti togliessi qui il casco, poi ti ricordi che ti hanno detto esplicitamente di non farlo.
        #CSS_evaReport_default_09 = Questa tuta è davvero scomodissima. Possiamo rientrare?
        #CSS_evaReport_default_10 = Ti chiedi perché la tua tuta non sia arancione.
        #CSS_evaReport_default_11 = Prendi nota di ciò che ti circonda.
        #CSS_evaReport_default_12 = Esamini la situazione.
        #CSS_evaReport_default_13 = Ti brontola lo stomaco.
        #CSS_evaReport_default_14 = La prossima volta dovresti portare degli snack.
        #CSS_evaReport_default_15 = Questa tuta EVA mi fa sembrare grasso?
        #CSS_evaReport_default_16 = Hai gli stivali ai piedi sbagliati.
        #CSS_evaReport_default_17 = Ti immagini che sia così che ci si sente a essere l'omino Michelin.
        #CSS_evaReport_default_18 = Ti guardi intorno e non vedi nulla di importante.
        #CSS_evaReport_default_19 = Nello spazio nessuno può sentirti lamentarti di quanto sia scomoda la tuta.
        #CSS_evaReport_SunInSpaceLow_00 = Tiri fuori dalla tasca della tuta una roccia grigia e decidi che tornerai tra un anno per vedere se assomiglia a Moho.
        #CSS_evaReport_SunInSpaceLow_01 = Pensi che stia diventando un po' caldo… speri ti facciano rientrare presto.
        #CSS_evaReport_SunInSpaceLow_02 = Le tue ali di cera iniziano a sciogliersi.
        #CSS_evaReport_SunInSpaceLow_03 = Speri davvero che a casa abbiano reso questa tuta resistente alle radiazioni.
        #CSS_evaReport_SunInSpaceLow_04 = Ti penti all'improvviso di non aver portato la crema solare SPF-10000.
        #CSS_evaReport_SunInSpaceLow_05 = Pensi che degli occhiali da sole sarebbero stati una buona idea.
        #CSS_evaReport_SunInSpaceLow_06 = Pensi che la tua nuova abbronzatura impressionerà tutti al Centro Spaziale.
        #CSS_evaReport_SunInSpaceLow_07 = Senti un lieve odore di bruciato provenire dalla tuta.
        #CSS_evaReport_SunInSpaceLow_08 = Fissando Kerbol, resisti alla tentazione di toglierti il casco per tostare marshmallow.
        #CSS_evaReport_SunInSpaceLow_09 = Il termometro è esploso dentro la cabina. Non è un buon segno.
        #CSS_evaReport_SunInSpaceLow_10 = È un caldo secco.
        #CSS_evaReport_SunInSpaceLow_11 = Vorresti davvero aver portato dei marshmallow. Scommetti che da qui potresti farti degli s'more.
        #CSS_evaReport_SunInSpaceLow_12 = Non vedi l'ora di raccontare agli amici di essere passato vicino al Sole con addosso solo la tuta.
        #CSS_evaReport_SunInSpaceLow_13 = Meno male che hai portato la crema solare 4000+.
        #CSS_evaReport_SunInSpaceLow_14 = La tuta sembra un po' calda.
        #CSS_evaReport_SunInSpaceLow_15 = Fuori dalla nave si percepisce davvero la potenza del Sole. Vedi un lampo in superficie e una lingua di plasma che schizza via.
        #CSS_evaReport_SunInSpaceLow_16 = Ti chiedi se le radiazioni di Kerbol ti stiano danneggiando in qualche modo.
        #CSS_evaReport_SunInSpaceLow_17 = La tuta sta iniziando a scaldarsi sul serio. Forse è meglio rientrare nella nave.
        #CSS_evaReport_SunInSpaceLow_18 = Sono solo io, o qui dentro fa caldo?
        #CSS_evaReport_SunInSpaceLow_19 = Inizi a sudare copiosamente e ti chiedi perché tu sia uscito dalla capsula in primo luogo.
        #CSS_evaReport_SunInSpaceLow_20 = Hai la sensazione che ti sarebbe servita una crema solare più potente.
        #CSS_evaReport_SunInSpaceLow_21 = Si sente un po' caldo.
        #CSS_evaReport_SunInSpaceLow_22 = Un'enorme sfera luminosa di plasma, tenuta insieme dalla propria gravità! Questa sembra essere in fase di fusione termonucleare di idrogeno in elio nel suo nucleo.
        #CSS_evaReport_SunInSpaceLow_23 = Kerbol è più grande di quanto tu l'abbia mai visto da Kerbin. Avresti voluto portare gli occhiali da sole.
        #CSS_evaReport_SunInSpaceLow_24 = Ti senti davvero bollente e non sopporti questo calore insopportabile.
        #CSS_evaReport_SunInSpaceLow_25 = Fai una pessima battuta con il Controllo Missione sull'atterrare sul Sole di notte.
        #CSS_evaReport_SunInSpaceLow_26 = Visto che i pannelli solari producono più energia, alzi al massimo l'aria condizionata.
        #CSS_evaReport_SunInSpaceLow_27 = Ti rendi conto che non è proprio dove vorresti essere in questo momento.
        #CSS_evaReport_SunInSpaceLow_28 = A quanto pare il carburante del jetpack non ama essere esposto a queste temperature.
        #CSS_evaReport_SunInSpaceLow_29 = Ti rendi conto che andrebbe molto male se ti allontanassi dalla nave.
        #CSS_evaReport_SunInSpaceLow_30 = Il contatore Geiger è al massimo a 3,6 roentgen.
        #CSS_evaReport_SunInSpaceHigh_00 = Mentre fissi il vuoto, l'unica cosa che ti viene in mente è la storia del Kraken spaziale. Vuoi davvero rientrare.
        #CSS_evaReport_SunInSpaceHigh_01 = Guardi la maestosa palla di fuoco che è Kerbol, e ti accorgi di esserti accecato temporaneamente.
        #CSS_evaReport_SunInSpaceHigh_02 = Ti allarma all'improvviso quanto lo spazio sia vuoto. Solo tu, il Sole e… la tua nave. Il Controllo Missione chiede perché il battito sia schizzato.
        #CSS_evaReport_SunInSpaceHigh_03 = Guardando verso Kerbol ti ricordi che hai dimenticato gli occhiali da sole e Jeb ha l'unico paio.
        #CSS_evaReport_SunInSpaceHigh_04 = Ti chiedi se quell'odore di bruciato sia reale o solo immaginazione.
        #CSS_evaReport_SunInSpaceHigh_05 = Finalmente un po' di pace e silenzio!
        #CSS_evaReport_SunInSpaceHigh_06 = Provi a diventare il primo Kerbal a completare un cruciverba nello spazio, ma la matita fluttua via prima ancora di iniziare.
        #CSS_evaReport_SunInSpaceHigh_07 = "Sono stupido o sono solo sottosopra?"
        #CSS_evaReport_SunInSpaceHigh_08 = È vuoto. Va avanti per sempre, e… oh mio Kerb, è pieno di stelle!
        #CSS_evaReport_SunInSpaceHigh_09 = Decidi di fare una gara di sguardi con Kerbol. Perdi.
        #CSS_evaReport_SunInSpaceHigh_10 = Il Sole sembra… giallo?
        #CSS_evaReport_SunInSpaceHigh_11 = Dopo aver passato del tempo in orbita stellare, chiedi di essere dichiarato un nuovo pianeta. Il Controllo Missione promette di pensarci.
        #CSS_evaReport_SunInSpaceHigh_12 = Guardandoti intorno noti un sacco di cose luccicanti. Una di queste luccica DAVVERO tanto.
        #CSS_evaReport_SunInSpaceHigh_13 = Avrebbero dovuto mandare un poeta. È così bello.
        #CSS_evaReport_SunInSpaceHigh_14 = Guardi l'universo e ti chiedi se sei solo, se Kerbin sia una culla di vita in un universo altrimenti sterile. Il Controllo Missione ti dice di pensare meno.
        #CSS_evaReport_SunInSpaceHigh_15 = Sarebbe stato meglio se fosse stato verde.
        #CSS_evaReport_SunInSpaceHigh_16 = Cerchi in ogni direzione, ma nessun Kraken in vista.
        #CSS_evaReport_SunInSpaceHigh_17 = All'improvviso senti un ringhio profondo. È il Kraken spaziale?
        #CSS_evaReport_SunInSpaceHigh_18 = Fissando il vuoto, rifletti sul tuo posto nell'universo.
        #CSS_evaReport_MohoSrfLanded_00 = Almeno a casa avrai una bella abbronzatura.
        #CSS_evaReport_MohoSrfLandedNorthPole_00 = I sistemi termici della tuta protestano mentre ti muovi sotto la luce abbagliante. Qui fuori fa davvero caldo.
        #CSS_evaReport_MohoSrfLandedNorthernSinkholeRidge_00 = Quindi… c'è qualcosa di interessante qui intorno?
        #CSS_evaReport_MohoSrfLandedNorthernSinkhole_00 = Che caldo, wow.
        #CSS_evaReport_MohoSrfLandedMidlands_00 = Ti rendi conto di aver dimenticato gli occhiali da sole.
        #CSS_evaReport_MohoSrfLandedWesternLowlands_00 = Inciampi su una piccola roccia. Per fortuna la gravità è abbastanza bassa da non farti male.
        #CSS_evaReport_MohoSrfLandedCentralLowlands_00 = Tiri un sospiro di sollievo nel vedere che le tute spaziali hanno un SPF di un milione.
        #CSS_evaReport_MohoSrfLandedHighlands_00 = Valuti l'idea di prendere il sole per gli scatti pubblicitari al tuo ritorno.
        #CSS_evaReport_MohoSrfLandedMinorCraters_00 = Qui da qualche parte c'è un buco.
        #CSS_evaReport_MohoSrfLandedMinorCraters_01 = Guarda! C'è acqua su Moho! Oh, aspetta… è solo sudore finito sulla visiera.
        #CSS_evaReport_MohoSrfLandedSouthWesternLowlands_00 = Gene era scettico, ma sei contento di aver portato un ombrello.
        #CSS_evaReport_MohoSrfLandedSouthEasternLowlands_00 = All'improvviso desideri davvero un gelato. Chiedi al Controllo Missione la finestra di trasferimento più rapida per Minmus.
        #CSS_evaReport_MohoSrfLandedCanyon_00 = Senti il refrigerante scorrere nei tubi della tuta alla massima velocità possibile e decidi che ti piacerebbe molto rientrare.
        #CSS_evaReport_MohoSrfLandedSouthPole_00 = Speri di trovare il punto esatto del Polo Sud. Poi potrai piantare una bandiera. Ma il Controllo Missione potrebbe avere altri piani…
        #CSS_evaReport_MohoInSpaceLow_00 = Riesci davvero a sentire le radiazioni.
        #CSS_evaReport_MohoInSpaceLowNorthPole_00 = Tiri fuori una barretta energetica, poi ti rendi conto che non puoi farla passare dal casco. Ti accontenti spalmandola sulla visiera.
        #CSS_evaReport_MohoInSpaceLowNorthernSinkholeRidge_00 = La cresta sembra le labbra di una bocca enorme.
        #CSS_evaReport_MohoInSpaceLowNorthernSinkhole_00 = Quello laggiù è un buco profondo e oscuro. Hai sentito leggende sul Kraken e ti chiedi se questo sia il suo covo.
        #CSS_evaReport_MohoInSpaceLowMidlands_00 = È davvero luminoso qui vicino a Kerbol. Ti chiedi se i Kerbal potrebbero costruire delle Sfere di Dyson.
        #CSS_evaReport_MohoInSpaceLowWesternLowlands_00 = Ti senti disidratato, ma la tuta dice che va tutto bene.
        #CSS_evaReport_MohoInSpaceLowCentralLowlands_00 = Gli scienziati a casa vogliono sapere se qui potrebbe esistere la vita. Decidi che avrebbero dovuto venire loro.
        #CSS_evaReport_MohoInSpaceLowHighlands_00 = Disegni una casa nella polvere. Sei abbastanza sicuro che il razzo la coprirà al decollo, però.
        #CSS_evaReport_MohoInSpaceLowHighlands_01 = Speri di essere abbastanza in alto da non colpire nessuna montagna.
        #CSS_evaReport_MohoInSpaceLowMinorCraters_00 = Ci sono molti asteroidi in giro? Qualsiasi asteroide abbia fatto quei crateri potrebbe fare un bel numero su un Kerbal.
        #CSS_evaReport_MohoInSpaceLowSouthWesternLowlands_00 = Sembra che la nave sia coperta di polline. No, aspetta, è solo polvere.
        #CSS_evaReport_MohoInSpaceLowCanyon_00 = Puoi quasi sentire le radiazioni.
        #CSS_evaReport_MohoInSpaceLowSouthPole_00 = Qui di certo sei al sicuro dal Kraken.
        #CSS_evaReport_MohoInSpaceHigh_00 = Uscire dall'ombra è come entrare in una fornace.
        #CSS_evaReport_EveSrfLandedPoles_00 = Perché quegli “cervelloni” di R&S non inventano già una tuta con servomotori che aiutino i movimenti?
        #CSS_evaReport_EveSrfLandedPoles_01 = Poli, schmoli: questo è proprio un forno planetario.
        #CSS_evaReport_EveSrfLandedMidlands_00 = Avresti dovuto fare più esercizio su Kerbin.
        #CSS_evaReport_EveSrfLandedMidlands_01 = "Benvenuto all'inferno, il tempo qui è fantastico. Accomodati, prenditi una birra fredda….."
        #CSS_evaReport_EveSrfLandedExplodiumSea_00 = Decidi di fare una breve passeggiata, ma ci ripensi dopo i primi passi.
        #CSS_evaReport_EveSrfLandedLowlands_00 = Ti chiedi quale idiota abbia messo pesi di piombo nella tua tuta.
        #CSS_evaReport_EveSrfLandedLowlands_01 = Il lancio di un sassolino suggerisce che l'atmosfera è DAVVERO, DAVVERO densa.
        #CSS_evaReport_EveSrfLandedHighlands_00 = Ti sembra di aver messo su un po' di peso.
