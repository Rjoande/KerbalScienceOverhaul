        #GEPscience_MCE_NodensInSpaceLow_00 = The MCE suite stares down at Nodens’ thick air and stubborn clouds; ISS-IMAP draws weather bands while GLIMS keeps “seeing sprites” that turn out to be the HDTV sensor complaining about the red sun’s glare.
