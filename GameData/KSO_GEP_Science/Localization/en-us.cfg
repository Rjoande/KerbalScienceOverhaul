        #GEPscience_bd_surveillance_NodensInSpaceLowTropicalMidlands_00 = The midlands wrinkle into low ridges and shallow basins, casting long shadows in the red glare. Whatever carved these lines did it patiently.
        #GEPscience_bd_surveillance_NodensInSpaceLowTropicalMidlands_01 = Cloud gaps reveal patchy terrain that looks almost familiar until you notice the colors are all wrong. You zoom in and the camera politely reminds you about resolution limits.
        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateMidlands_00 = The midlands alternate between rough uplifts and smoother benches, like natural terraces. One bench looks promising for surface ops, assuming it’s not just “flat-looking rocks.”
        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateMidlands_01 = A thin haze softens the scene, but ridgelines still stand out sharply. The delay on the signal makes every new feature feel like a discovery someone else already had.
        #GEPscience_bd_surveillance_NodensInSpaceLowHighlands_00 = Highlands rise in fractured slabs, bright on the edges and dark in the cracks. The terrain looks stable, but “stable” can still mean “very pointy.”
        #GEPscience_bd_surveillance_NodensInSpaceLowHighlands_01 = Peaks and plateaus cut through the haze like islands in a red ocean of air. A broad plateau earns an “outpost?” marker, followed by a very cautious “maybe.”
        #GEPscience_bd_surveillance_NodensInSpaceLowTundra_00 = The tundra spreads in muted grays and dusty reds, with fewer clouds and clearer sightlines. Wide open flats look inviting—right up until you remember you’re very far from home.
        #GEPscience_bd_surveillance_NodensInSpaceLowTundra_01 = Subtle patterns ripple across the ground, like frost lines or dried flow marks. You suggest a landing test site here, mostly because it’s the least visually threatening option.
        #GEPscience_bd_surveillance_NodensInSpaceLowIceCaps_00 = The icecaps reflect a cold, pinkish sheen, crisscrossed by dark fractures that look uncomfortably deep. The camera exposure finally feels happy, which makes you suspicious.
        #GEPscience_bd_surveillance_NodensInSpaceLowIceCaps_01 = Bright ice meets the dim red sun and turns the whole pole into a glowing landmark. It’s beautiful in the “do not attempt to set up camp without a plan” way.

        #GEPscience_bd_surveillance_BelisamaInSpaceLowFlats_00 = Broad flats slide beneath the lens in slow, dim-red daylight. Nodens hangs in the same patch of sky, like it’s keeping score.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTropicalLowlands_00 = The lowlands look smooth enough to lull you into optimism—until long shadows reveal subtle ridges everywhere. The time delay makes every “live” pass feel like déjà vu.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTemperateLowlands_00 = Faint tonal bands suggest different regolith or age, but nothing here reads as simple. You tag a few dark patches as “possibly interesting, possibly just camera noise.”
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTropicalMidlands_00 = Wrinkled midlands form looping arcs, as if the surface tried to fold itself neatly and failed. The images arrive with a gentle red cast that never quite feels like daylight.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowTemperateMidlands_00 = Broken terrain and shallow basins make a tidy pattern that looks engineered—until you zoom in and remember nature also makes sharp edges. Nodens’ reflected light adds a ghostly second “sun.”
        #GEPscience_bd_surveillance_BelisamaInSpaceLowHighlands_00 = Highlands stand up like cold anvils, their crests catching the weakest glow from Grannus. Even from orbit, the landscape feels… watchful.
        #GEPscience_bd_surveillance_BelisamaInSpaceLowPoles_00 = The polar regions blur between light and long-lived shadow, as if day and night can’t agree on the schedule. Mission Control asks for more frames; the reply arrives after the pass is over.

        #GEPscience_bd_surveillance_SucellusInSpaceLowBasins_00 = Basins lie like scooped-out bowls, dark and quiet under the red sun. A few spots glint oddly, and the team immediately starts arguing about “metal” versus “compression artifacts.”
        #GEPscience_bd_surveillance_SucellusInSpaceLowLowlands_00 = The lowlands show wide, navigable-looking plains—at least on the map. In the raw frames, every “smooth” area turns out to be textured with small, sharp trouble.
        #GEPscience_bd_surveillance_SucellusInSpaceLowTropicalMidlands_00 = Midland ridges run in broken chains, casting shadows that seem too long for such a small world. The dim light makes the terrain feel farther away than it already is.
        #GEPscience_bd_surveillance_SucellusInSpaceLowTemperateMidlands_00 = Subtle color shifts trace through the midlands like mineral stains. The notes read: “Potential resource signal. Confidence: medium. Anxiety: high.”
        #GEPscience_bd_surveillance_SucellusInSpaceLowHighlands_00 = Pale highlands catch the faintest glare and look almost polished. If this dwarf world really is rich, it’s hiding its wealth under a very unfriendly surface.
        #GEPscience_bd_surveillance_SucellusInSpaceLowPoles_00 = The poles are stark, with shadowed hollows that refuse to show their bottoms. You label them “unknown” and feel the distance to Kerbin in your bones.

        #GEPscience_bd_surveillance_CaireenInSpaceLowLowlands_00 = Caireen’s “lowlands” are just places where the rock dips inward and pretends to be a landscape. The whole moon looks like it was captured mid-tumble and told to behave.
        #GEPscience_bd_surveillance_CaireenInSpaceLowMidlands_00 = The midlands are a mess of slopes and facets, lit by weak red daylight and a strong sense of “do not land.” The camera’s best feature is making you appreciate stable gravity.
        #GEPscience_bd_surveillance_CaireenInSpaceLowHighlands_00 = Jagged high points silhouette against space, more asteroid than moon. Sucellus looms nearby, close enough to feel like a ceiling.
        #GEPscience_bd_surveillance_CaireenInSpaceLowPoles_00 = At the poles, the lighting turns into a harsh coin-flip of glare and black. Reconnaissance concludes: “Yes, it’s still an irregular captured rock. No, it hasn’t gotten friendlier.”

        #GEPscience_bd_surveillance_SironaInSpaceLowDarkTropicalBands_00 = Dark bands coil beneath you like slow smoke in a red-lit room. The receiver insists this is “reconnaissance,” not “staring into weather.”
        #GEPscience_bd_surveillance_SironaInSpaceLowLightTropicalBands_00 = The lighter belts shine with faint reflected crimson, softening every shadow. A few frames arrive late enough to count as “yesterday’s storm.”
        #GEPscience_bd_surveillance_SironaInSpaceLowDarkTemperateBands_00 = A broad dark lane shows ripples and eddies that don’t match last pass—at least, not the last pass you’ve received yet. Comms delay makes the atmosphere feel even more alive.
        #GEPscience_bd_surveillance_SironaInSpaceLowLightTemperateBands_00 = Pale cloud tops look deceptively calm until you notice the shear lines. The camera’s stabilization gives up and calls it “dynamic.”
        #GEPscience_bd_surveillance_SironaInSpaceLowDarkPolarBands_00 = The polar darkness is broken by subtle bright flickers that may be aurora or sensor noise. Either way, the instruments sound nervous.
        #GEPscience_bd_surveillance_SironaInSpaceLowLightPolarBands_00 = The pole glows softly, like frost lit by a dim red lamp. Sirona’s upper air makes its own weather—your job is just to blink first.

        #GEPscience_bd_surveillance_AirmedInSpaceLowTropicalLowlands_00 = The tropical lowlands spread out in dusty tones, cut by scars that look fresh in the harsh lighting. Sirona hangs nearby, reminding everyone that “local radiation” is a feature.
        #GEPscience_bd_surveillance_AirmedInSpaceLowTemperateLowlands_00 = Broad flats and shallow basins suggest routes that a rover might survive. The long shadows under Grannus’ light make every “smooth patch” feel suspicious.
        #GEPscience_bd_surveillance_AirmedInSpaceLowTropicalMidlands_00 = Midland ridges form broken chains that catch the red sun on one side and go ink-black on the other. The image compression artifacts look almost like extra craters.
        #GEPscience_bd_surveillance_AirmedInSpaceLowTemperateMidlands_00 = The midlands show a puzzling boundary between two surface tones, as if the moon couldn’t decide on a color scheme. Mission Control suggests naming the halves; Science suggests not getting attached.
        #GEPscience_bd_surveillance_AirmedInSpaceLowHighlands_00 = Highland crests are sharp and heavily peppered, like the moon lost an argument with debris. Even from orbit, it reads as “land carefully, if at all.”
        #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedLowlands_00 = The darkened lowlands drink in the weak daylight and give almost nothing back. Your “night-vision” settings are not amused.
        #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedMidlands_00 = Dark midland terrain makes ridge lines vanish until the angle is just right. Reconnaissance note: “landing site confidence: low; mystery: high.”
        #GEPscience_bd_surveillance_AirmedInSpaceLowDarkenedHighlands_00 = The dark highlands look like cooled slag under a red sun, fractured and unwelcoming. The camera records a perfect silhouette of Sirona in the background, just to be dramatic.
        #GEPscience_bd_surveillance_AirmedInSpaceLowPoles_00 = At the poles, lighting turns into a harsh coin flip of glare and shadow. The best frames arrive after the pass ends, because distance is a hobby out here.

        #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalCraquelure_00 = The surface is a web of cracks and plates, like the ground cooled too fast and never forgave it. A thin atmosphere blurs the edges just enough to be unsettling.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateCraquelure_00 = Craquelure patterns stretch for kilometers in neat, repeating geometry. You briefly suspect engineering, then remember nature also enjoys showing off.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalLowlands_00 = Lowlands appear smoother, with gentle slopes that might support surface operations. The haze turns the horizon into a soft red gradient that feels very far from home.
        #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateLowlands_00 = Broad plains roll by under dim light, broken by darker streaks that could be deposits or just shadows that refuse to behave. The downlink arrives smelling faintly of methane. (Not really.)
        #GEPscience_bd_surveillance_BorvoInSpaceLowTropicalMidlands_00 = The midlands rise in subdued ridges, their shadows stretched long by the weak sun. You mark a few sheltered basins as “possible sites,” then underline “unknown ground conditions.”
        #GEPscience_bd_surveillance_BorvoInSpaceLowTemperateMidlands_00 = Terrain contrast sharpens as the air thins with altitude, revealing subtle layering. The camera keeps auto-focusing on haze like it’s trying to make friends.
        #GEPscience_bd_surveillance_BorvoInSpaceLowHighlands_00 = Highlands stand above the murk, bright and crisp against the red-lit sky. For a moment, it looks almost approachable—then a crater field rolls into view.
        #GEPscience_bd_surveillance_BorvoInSpaceLowMajorCraters_00 = Major craters bite into the crust with terraces and ejecta fans, all softened by atmospheric veil. The impact history reads like a long, slow warning.
        #GEPscience_bd_surveillance_BorvoInSpaceLowPoles_00 = Polar regions fade into pale fog and low-contrast terrain. Navigation calls it “feature-poor,” which is code for “don’t trust the map.”

        #GEPscience_bd_surveillance_DamonaInSpaceLowTropicalLowlands_00 = Damona’s lowlands are gray, dusty, and heavily pitted, with no sign of anything that wants you there. The red sun makes the whole world look like it’s under emergency lighting.
        #GEPscience_bd_surveillance_DamonaInSpaceLowTemperateLowlands_00 = Shallow basins and gentle rises pass beneath the lens with an alarming sameness. It’s easy to lose scale until a crater the size of a city drifts by.
        #GEPscience_bd_surveillance_DamonaInSpaceLowTropicalMidlands_00 = Midland ridges cast hard shadows that don’t move much between frames—because your frames are minutes behind reality. Remote operations feel extra remote here.
        #GEPscience_bd_surveillance_DamonaInSpaceLowTemperateMidlands_00 = The midlands show faint streaks and scours that might be ancient flows or ejecta. The notes end with: “Either way, bring stronger landing legs.”
        #GEPscience_bd_surveillance_DamonaInSpaceLowHighlands_00 = Bright highlands form broken plates, chipped and cold-looking. Sirona’s distant glow outlines the horizon like a dim rim light.
        #GEPscience_bd_surveillance_DamonaInSpaceLowImpactBasin_00 = The impact basin dominates the view—terraced walls, central upheaval, and debris laid out like a forensic diagram. It’s the kind of landmark you can navigate by even with a long comms delay.
        #GEPscience_bd_surveillance_DamonaInSpaceLowPoles_00 = The poles sit in stubborn shadow and weak glare, revealing just enough texture to be ominous. Reconnaissance concludes: “Yes, it’s still there. No, it’s not getting friendlier.”

        #GEPscience_bd_surveillance_EponaInSpaceLowTropicalLowlands_00 = Under Grannus’ dim red light, the “tropical” lowlands are still pale and cold, with broad flats softened by a thin haze. The image looks like winter that forgot what “summer” means.
        #GEPscience_bd_surveillance_EponaInSpaceLowTemperateLowlands_00 = Smooth basins drift past in slow, delayed frames, their shadows stretched long by weak sunlight. You tag a few patches as “maybe level,” then remember the ice can lie.
        #GEPscience_bd_surveillance_EponaInSpaceLowTropicalUplands_00 = Uplands show wind-sculpted ridges and subtle tonal stripes, as if the atmosphere is sanding the surface one grain at a time. The camera keeps trying to focus on the haze like it’s the main event.
        #GEPscience_bd_surveillance_EponaInSpaceLowTemperateUplands_00 = The uplands break into rougher plates with dark seams that might be fractures or exposed rock. Reconnaissance note: “interesting textures, uncomfortable amounts of mystery.”
        #GEPscience_bd_surveillance_EponaInSpaceLowHighlands_00 = Highland slopes fade in and out beneath thin cloud veils, revealing a world that’s big, cold, and far too quiet. Even the downlink delay feels longer over the empty peaks.
        #GEPscience_bd_surveillance_EponaInSpaceLowGrandPeaks_00 = Grand peaks punch through the haze and catch a faint crimson rim-light, sharp against a dark sky. They look like excellent landmarks and terrible places to have a problem.
        #GEPscience_bd_surveillance_EponaInSpaceLowCraters_00 = Craters dot the ice like bruises, with darker ejecta staining the pale crust. A few rims look suspiciously softened, as if Epona is still trying to heal.
        #GEPscience_bd_surveillance_EponaInSpaceLowVolcanoes_00 = The “volcanoes” show darker vents and faint plume-like smears that don’t match the surrounding frost. You file the frames as “possible warmth detected” and “please keep your distance.”
        #GEPscience_bd_surveillance_EponaInSpaceLowPoles_00 = Near the poles, the light turns into a perpetual dusk, and methane-tinted haze flattens the horizon. The terrain looks calm in the way a freezer looks calm.

        #GEPscience_bd_surveillance_RosmertaInSpaceLowTropicalLowlands_00 = Rosmerta’s lowlands are airless and brutally crisp, with shadows that look painted on. Epona hangs nearby, making this lonely little moon feel even smaller.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTemperateLowlands_00 = Smooth-looking plains resolve into rubble when you zoom in, because of course they do. The frames arrive late, as if Rosmerta itself is reluctant to be noticed.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTropicalMidlands_00 = Midland ridges run in broken lines, casting long black slashes under the red sun. The radiation monitor complains quietly in the background.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowTemperateMidlands_00 = Subtle albedo patches speckle the midlands like spilled flour on charcoal. Reconnaissance concludes: “airless, cold, and not interested in visitors.”
        #GEPscience_bd_surveillance_RosmertaInSpaceLowHighlands_00 = The highlands are jagged and heavily cratered, their edges catching a faint crimson glint. They’d make great scenery for an outpost brochure nobody will ever read.
        #GEPscience_bd_surveillance_RosmertaInSpaceLowPoles_00 = Polar terrain sits half in glare, half in stubborn shadow, with no atmosphere to soften the divide. The camera labels it “high contrast”; the crew labels it “highly rude.”

        #GEPscience_bd_surveillance_RAB-58EInSpaceLowLowlands_00 = The “lowlands” are just the flatter parts of a small, captured-looking lump, lit unevenly as it turns. Every pass feels like watching a different object because the angles never repeat the same way.
        #GEPscience_bd_surveillance_RAB-58EInSpaceLowEasternHighlands_00 = The eastern highlands rise into sharp facets and dark pits, like a rock assembled from leftovers. The delayed signal makes the tumble feel slower, but not friendlier.
        #GEPscience_bd_surveillance_RAB-58EInSpaceLowWesternHighlands_00 = Western high ground shows brighter scars and darker seams that could be old fractures or exotic deposits. You note: “origin unknown,” and for once the report sounds honest.

        #GEPscience_bd_surveillance_CernunnosInSpaceLowTropicalLowlands_00 = Cernunnos’ lowlands are pale and still, an icy plain under a sun that barely commits to daylight. The emptiness is impressive, in a slightly unsettling way.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTemperateLowlands_00 = Low relief terrain stretches on with faint streaks and shallow basins, like a world that ran out of energy mid-sculpt. The long comm delay makes “monitoring” feel like archaeology.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTropicalMidlands_00 = Midlands wrinkle into gentle ridges and shadowed hollows, their contrast harsh without any atmosphere. The camera catches a few glints that might be frost—or wishful thinking.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowTemperateMidlands_00 = The midlands show layered tones that hint at old deposits, exposed by impacts and time. You mark them for follow-up, assuming anything out here can be “followed up” quickly.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowHighlands_00 = Highlands stand up like chipped porcelain, bright where the weak red light hits and pitch-black where it doesn’t. It’s a landscape built entirely from “careful.”
        #GEPscience_bd_surveillance_CernunnosInSpaceLowSouthPolarHills_00 = South polar hills cast long, slow shadows that barely move from pass to pass. The sun is so dim you start timing daylight like it’s a consumable resource.
        #GEPscience_bd_surveillance_CernunnosInSpaceLowNorthPole_00 = The north pole is a stark patch of frost and darkness, with no sign of anything but cold geometry. You can’t shake the feeling that Cernunnos is not alone out here—just quiet.

        // bd_TrappedRadiation
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceLow_00 = The detector saturates instantly; you hastily retract it and log the shape of a blistering belt clinging to Grannus' field lines under that dim red glare.
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceLow_01 = The trapped particle counts spike hard enough to make the warning beeper sound lonely. Even under the dim red glare, Grannus still feels very, very awake.
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceHigh_00 = The belts thin out with altitude, but they never really go away. Mission Control’s reply arrives late and says, “Yep, that’s still radiation.”
        #GEPscience_bd_TrappedRadiation_GrannusInSpaceHigh_01 = Even out here the counters never stop chattering. The belt edges ripple like a storm, and the delayed data packet arrives just to tell you to stop staring at it.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceLow_00 = Radiation spikes with every pass over the baked hemisphere, but nothing stays trapped—Taranis barely has a field to hold it.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceLow_01 = You keep expecting a neat little belt, but the readings are mostly a screaming particle storm and a strong desire to leave. Taranis offers no shelter—just speed.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceHigh_00 = The flux smooths out a bit higher up, which is a fancy way of saying “still bad, just less exciting.” The instrument logs it anyway, because it can’t flinch.
        #GEPscience_bd_TrappedRadiation_TaranisInSpaceHigh_01 = The chart looks more like a particle “weather report” than a belt map: everything sweeps past and is gone, leaving only a thin, stubborn haze.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceLow_00 = A thin, lopsided belt shows up, strongest over the hot side; it feels like someone assembled a magnetosphere from spare parts.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceLow_01 = A weak, lopsided belt shows up like it’s being pushed around by the red sun. The thin air below looks like it’s just watching you take the hit.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceHigh_00 = The trapped radiation fades into a broad haze, with occasional bursts that don’t match any nice round theory. You label the file “probably fine” and double-check the shielding.
        #GEPscience_bd_TrappedRadiation_ToutatisInSpaceHigh_01 = Higher up, the trapped population thins into patchy arcs. Mission Control asks for more data; your reply arrives late and slightly fried.
        #GEPscience_bd_TrappedRadiation_NodensInSpaceLow_00 = A tidy magnetospheric signature appears, almost comforting—until you remember how far the signal has to travel to get home. The belts look stable, like Nodens is trying to be reassuring.
        #GEPscience_bd_TrappedRadiation_NodensInSpaceHigh_00 = At this altitude the counts drop toward background, and the quiet feels unfamiliar. You start missing the sound of real-time confirmation.
        #GEPscience_bd_TrappedRadiation_BelisamaInSpaceLow_00 = The radiation pattern is patchy and tugged out of shape, like Nodens is quietly taking credit for most of the protection. The numbers rise and fall as if the moon is breathing in someone else’s magnetic shadow.
        #GEPscience_bd_TrappedRadiation_BelisamaInSpaceHigh_00 = Up here, Belisama’s own contribution gets hard to separate from Nodens’ influence. The instrument politely reports, “It’s complicated.”
        #GEPscience_bd_TrappedRadiation_SucellusInSpaceLow_00 = No strong belts form, but the dose rate stays stubbornly high anyway. The detector logs “trapped” with quotation marks and a long, accusatory beep.
        #GEPscience_bd_TrappedRadiation_SucellusInSpaceHigh_00 = The environment evens out into a steady drizzle of energetic particles. It’s the kind of calm that still requires a lead apron.
        #GEPscience_bd_TrappedRadiation_CaireenInSpaceLow_00 = The readings jump in short bursts, like a captured rock getting swatted by invisible fields it never asked for. You briefly consider capturing the data faster than it captures you.
        #GEPscience_bd_TrappedRadiation_CaireenInSpaceHigh_00 = Mostly background… until a sudden spike reminds you that “mostly” is not the same as “safe.” The logbook entry is smudged where you gripped the pen too hard.
        #GEPscience_bd_TrappedRadiation_SironaInSpaceLow_00 = The detector immediately regrets being extended. Sirona’s belts are dense, layered, and busy—like someone turned the dim red sun into a particle accelerator.
        #GEPscience_bd_TrappedRadiation_SironaInSpaceHigh_00 = Higher up the belts thin into broad arcs that still hammer the counters. The map takes ages to transmit, mostly because it’s very large and very alarming.
        #GEPscience_bd_TrappedRadiation_AirmedInSpaceLow_00 = Airmed has no field of its own, but Sirona provides more than enough “shared” radiation. The readings spike and dip as the battered, two-toned surface rolls beneath you.
        #GEPscience_bd_TrappedRadiation_AirmedInSpaceHigh_00 = You climb for safety and discover the definition of “relative.” The background is still Sirona’s belt environment, just with fewer moments that make the instrument squeal.
        #GEPscience_bd_TrappedRadiation_BorvoInSpaceLow_00 = Borvo’s own field seems to gather a modest belt on top of Sirona’s constant particle rain. The upper atmosphere flickers faintly as your graphs try to decide what they’re seeing.
        #GEPscience_bd_TrappedRadiation_BorvoInSpaceHigh_00 = At altitude, Borvo’s trapped population resolves into tidy loops, surprisingly well-behaved for this far from home. Sirona’s influence is still there, looming like a second dataset you can’t delete.
        #GEPscience_bd_TrappedRadiation_DamonaInSpaceLow_00 = No belt forms—just a harsh wash of particles and a few sharp spikes as you pass over Damona’s prominent scar. The gray little moon offers zero protection and plenty of attitude.
        #GEPscience_bd_TrappedRadiation_DamonaInSpaceHigh_00 = Outside the worst of it, counts drift toward “merely unpleasant,” then jump without warning in Sirona’s distant tail. The log notes a long communications delay and an even longer sigh.
        #GEPscience_bd_TrappedRadiation_EponaInSpaceLow_00 = The detector clicks into a steady, uneasy rhythm—Epona’s weak field gathers a faint belt, just enough to make you grateful for the long transmission delay.
        #GEPscience_bd_TrappedRadiation_EponaInSpaceHigh_00 = Higher up, the “belt” thins into a broad haze that drifts with the red dwarf’s particle weather. It’s not intense, but it is persistent.
        #GEPscience_bd_TrappedRadiation_RosmertaInSpaceLow_00 = No trapped belt forms around Rosmerta; the readings are just a harsh ambient wash leaking through Epona’s neighborhood. The moon provides no shelter and no apologies.
        #GEPscience_bd_TrappedRadiation_RosmertaInSpaceHigh_00 = The counts fall with altitude, then spike when you cross an invisible boundary you didn’t plan for. You label it “Epona influence” and pretend that explains it.
        #GEPscience_bd_TrappedRadiation_RAB-58EInSpaceLow_00 = The instrument finds nothing to “trap,” only brief bursts as the little body tumbles through charged streams. It’s like measuring a storm by holding up a spoon.
        #GEPscience_bd_TrappedRadiation_RAB-58EInSpaceHigh_00 = Farther out, the environment steadies into a thin drizzle of energetic particles. The graph looks calm, which is suspicious this far from home.
        #GEPscience_bd_TrappedRadiation_CernunnosInSpaceLow_00 = No belts appear; Cernunnos seems magnetically quiet, and the detector has to work to find anything worth plotting. The silence feels louder under the dim red sun.
        #GEPscience_bd_TrappedRadiation_CernunnosInSpaceHigh_00 = Background levels dominate, with only occasional flickers from the wider system. Mission Control asks if it’s “safe”; you send back, “safer than most,” hours later.

        // bd_UVscope
        #GEPscience_bd_UVscope_GrannusInSpace_00 = UV emissions spike and dance across the disk. You label the pattern “angry glitter” for the benefit of the outreach team.
        #GEPscience_bd_UVscope_GrannusInSpace_01 = You capture a flare in exquisite detail and immediately regret every unshielded cable on the spacecraft.
        #GEPscience_bd_UVscope_GrannusInSpace_02 = The UV camera saturates so hard it effectively invents a new color: “nope.”
        #GEPscience_bd_UVscope_GrannusInSpaceLow_00 = The UV scope stares past Grannus’ ruddy glare and finds thin, sharp lines in the dark between stars. The data takes ages to trickle home.
        #GEPscience_bd_UVscope_GrannusInSpaceHigh_00 = From far above the dim red sun, the spectrum shows hot knots of ultraviolet light where you expected empty space. Mission Control files it under “not comforting”.
        #GEPscience_bd_UVscope_TaranisInSpaceLow_00 = You use Taranis’ frozen night side as a convenient shade and tease out faint ultraviolet absorption from the thin stuff between worlds.
        #GEPscience_bd_UVscope_TaranisInSpaceHigh_00 = At this altitude Taranis is just a tiny coin split between glow and darkness, yet the UV lines still insist something out there is very, very hot.
        #GEPscience_bd_UVscope_ToutatisInSpaceLow_00 = A grazing pass over Toutatis’ limb leaves subtle UV fingerprints from its thin air, hinting at steep temperature swings near the twilight band.
        #GEPscience_bd_UVscope_ToutatisInSpaceHigh_00 = With Toutatis turning below like a half-lit warning sign, the scope catches a hidden hot companion riding in the glare of a cooler star. That’s a lot of empty space to share an orbit in.
        #GEPscience_bd_UVscope_NodensInSpaceLow_00 = The UV scope catches Nodens’ thin upper haze glowing in stubborn lines, as if the air is trying very hard to be noticed.
        #GEPscience_bd_UVscope_NodensInSpaceHigh_00 = Far above Nodens, the spectrum turns into a cold barcode of interstellar absorption and distant hot sources; the downlink arrives like a message from last week.
        #GEPscience_bd_UVscope_BelisamaInSpaceLow_00 = You use Belisama’s night side as a perfect shade and tease faint ultraviolet signatures out of the space between worlds. It still feels like staring into someone else’s sky.
        #GEPscience_bd_UVscope_BelisamaInSpaceHigh_00 = From high orbit, Belisama is a dark speck and the UV scope finds more action in the surrounding plasma and dust than on the moon itself. That seems unfair.
        #GEPscience_bd_UVscope_SucellusInSpaceLow_00 = Ultraviolet images pick out sharp, pale patches on Sucellus that don’t match anything in visible light—fresh frost, strange minerals, or just the universe being secretive again.
        #GEPscience_bd_UVscope_SucellusInSpaceHigh_00 = The instrument locks onto distant targets and records crisp UV lines while Sucellus drifts below like a forgotten waypoint under a dim red sun.
        #GEPscience_bd_UVscope_CaireenInSpaceLow_00 = The UV scope watches a background star skim behind tiny Caireen and the spectrum twitches with a whisper-thin veil of particles. You pretend that’s normal.
        #GEPscience_bd_UVscope_CaireenInSpaceHigh_00 = From far out, Caireen is barely a dot, but the scope still finds hot companions and ultraviolet knots in the deep field. The emptiness around them feels very deliberate.
        #GEPscience_bd_UVscope_SironaInSpaceLow_00 = Sirona’s upper atmosphere lights up in ultraviolet bands, tracing fierce auroral curtains and hot, angry chemistry you’d rather not fly through.
        #GEPscience_bd_UVscope_SironaInSpaceHigh_00 = From high orbit, the UV scope maps a vast, distorted glow around Sirona—more magnetosphere than planet—while the data packet crawls home under the dim red sun.
        #GEPscience_bd_UVscope_AirmedInSpaceLow_00 = Airmed’s two-toned surface reflects UV in mismatched patches, like someone painted the regolith with different rules and forgot to leave a label.
        #GEPscience_bd_UVscope_AirmedInSpaceHigh_00 = With Airmed reduced to a scarred pebble below, a background star’s UV lines twitch during occultation—just a whisper of sputtered atoms clinging to the void.
        #GEPscience_bd_UVscope_BorvoInSpaceLow_00 = Borvo’s thin air stamps the spectrum with cold absorption features; the methane lines are there, but they don’t quite behave the way the models promised.
        #GEPscience_bd_UVscope_BorvoInSpaceHigh_00 = Limb scans show a faint ultraviolet glow above Borvo’s terminator, hinting at high-altitude haze and weak aurorae in a sky that never looks familiar.
        #GEPscience_bd_UVscope_DamonaInSpaceLow_00 = Damona’s frigid surface gives a hard UV reflectance curve with odd little bumps—either exotic minerals, fresh frost, or the universe refusing to simplify.
        #GEPscience_bd_UVscope_DamonaInSpaceHigh_00 = From far out, Damona vanishes into darkness and the UV scope returns to deep-field work, pulling out a hot companion’s signature from behind a cooler star’s glare.
        #GEPscience_bd_UVscope_EponaInSpaceLow_00 = A limb-scan over Epona shows a faint ultraviolet airglow and a few stubborn absorption lines. The spectrum says “hot upper chemistry,” while the downlink says “please wait.”
        #GEPscience_bd_UVscope_EponaInSpaceHigh_00 = With Epona as a dark screen, background starlight turns into a crisp UV barcode of thin interstellar stuff. Something hot flickers in the glare where it really shouldn’t.
        #GEPscience_bd_UVscope_RosmertaInSpaceLow_00 = Rosmerta’s surface looks plain in visible light, but UV imaging paints sharp boundaries between frosts and darker grains. You log it as “composition differences,” and feel very far away doing so.
        #GEPscience_bd_UVscope_RosmertaInSpaceHigh_00 = From high above Rosmerta, you watch a star slip behind it and look for any ultraviolet bite marks from a whisper-thin exosphere. If anything is there, it’s being extremely polite about it.
        #GEPscience_bd_UVscope_RAB-58EInSpaceLow_00 = Ultraviolet reflectance on RAB-58E jumps between oddly bright and oddly dull patches, like the regolith can’t agree what it’s made of. The scope suggests fresh exposure or strange minerals; you suggest not touching it.
        #GEPscience_bd_UVscope_RAB-58EInSpaceHigh_00 = Pointed outward, the UV lines stay steady until brief spikes appear—charged dust, stray particles, or the universe clearing its throat. The signal arrives late enough to be a surprise twice.
        #GEPscience_bd_UVscope_CernunnosInSpaceLow_00 = Over Cernunnos’ terminator, the UV scope catches a thin halo of glow and absorption that hints at cold volatiles being stirred by energetic particles. It’s a delicate signature in a very unwelcoming sky.
        #GEPscience_bd_UVscope_CernunnosInSpaceHigh_00 = High orbit turns Cernunnos into a dim landmark while the instrument hunts hot ultraviolet sources and hidden companions in distant starlight. The emptiness between the lines feels bigger than the screen.

        // bd_UVspec
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthPolarZone_00 = The UV spectrum from this latitude is laced with jittery emission spikes, like the star is quietly crackling at the edges. The data takes a while to get home, and somehow that makes it feel louder.
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthSubpolarZone_00 = A thin forest of ultraviolet lines rises and falls as you track the limb, hinting at turbulent layers you definitely did not pack for. Mission Control requests you stop calling them “spicy noodles.”
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthTemperateZone_00 = The instrument resolves broad absorption bands and then immediately argues with itself about the baseline. You save the file as “Grannus_is_red_okay” for later scientific reconciliation.
        #GEPscience_bd_UVspec_GrannusInSpaceLowNorthTropicZone_00 = UV emission brightens in bursts that don’t match your timing marks, as if Grannus is running its own schedule. You add a note: “possible flarelet tantrums.”
        #GEPscience_bd_UVspec_GrannusInSpaceLowEquatorialZone_00 = The equatorial scan shows a stronger ultraviolet glow than expected under a dim red sun, which feels unfair. The spectrometer insists the photons don’t care about your mood.
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthTropicZone_00 = A clean set of lines appears, then smears into a noisy haze as the spacecraft drifts through interference. Somewhere far away, a comms tech sighs loudly enough to be heard in the log.
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthTemperateZone_00 = The UV spectrum has sharp, narrow features that look almost engineered until you remember nature is allowed to be rude. You re-check the calibration and pretend you didn’t doubt it.
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthSubpolarZone_00 = The limb scan shows faint ultraviolet fringes that suggest a complex, restless outer layer. You briefly consider sending it a postcard that says “please remain calm.”
        #GEPscience_bd_UVspec_GrannusInSpaceLowSouthPolarZone_00 = Ultraviolet intensity drops and surges in a pattern that makes no sense until you stop expecting it to. The star does not provide explanations, only data.
        #GEPscience_bd_UVspec_GrannusInSpaceHigh_00 = From high above, Grannus becomes a single, austere signature: broad ultraviolet power with occasional needle-thin outbursts. The long delay makes each burst arrive like a late, unwelcome surprise.

        #GEPscience_bd_UVspec_TaranisInSpaceLowMagmaSea_00 = The UV spectrum picks up a faint haze of hot-surface emissions, like the day side is trying to evaporate itself into space. The detector auto-dims and you thank past-you for enabling “coward mode.”
        #GEPscience_bd_UVspec_TaranisInSpaceLowMagmaShores_00 = Over the glowing coastlines, the spectrometer catches intermittent lines consistent with sputtered minerals and angry dust. You label the region “do not inhale” even though nobody can.
        #GEPscience_bd_UVspec_TaranisInSpaceLowScorchedLowlands_00 = Reflected UV is patchy and harsh, with odd fluorescent hints that come and go as the terrain rolls beneath you. It’s like the rocks are answering a question you didn’t ask.
        #GEPscience_bd_UVspec_TaranisInSpaceLowMidlands_00 = The scan finds no stable atmosphere, just a thin, transient whisper that varies with lighting and altitude. Mission Control calls it an exosphere; you call it “the universe clearing its throat.”
        #GEPscience_bd_UVspec_TaranisInSpaceLowHighlands_00 = The high ground shows cleaner reflectance and sharper spectral edges, as if the surface has been sandblasted by radiation for ages. You start missing boring, predictable vacuum.
        #GEPscience_bd_UVspec_TaranisInSpaceLowDarkSideMidlands_00 = On the cold side, UV reflectance plummets and the spectrum goes quiet, almost polite. The silence feels heavier out here, like the data is trying not to wake anything up.
        #GEPscience_bd_UVspec_TaranisInSpaceLowDarkSideHighlands_00 = A faint ultraviolet glow appears along the horizon line, possibly from charged particles skimming the boundary between night and day. You mark it as “pretty” and hope the scientists forgive you.
        #GEPscience_bd_UVspec_TaranisInSpaceLowPoles_00 = The poles show subtle spectral shifts that suggest cold-trapped residues hanging on despite everything. Under a red sun, “stable” still means “barely.”
        #GEPscience_bd_UVspec_TaranisInSpaceHigh_00 = From higher orbit, Taranis reduces to a brutal contrast: a bright, scorching hemisphere and a dark, frozen one with a thin seam between. The UV spectrum looks like a split decision.

        #GEPscience_bd_UVspec_ToutatisInSpaceLowSunnyLowlands_00 = The UV spectrum shows strong absorption from the thin atmosphere, with extra scattering over the hottest regions. You wonder how something so “almost-air” can still be so bossy.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowSunnyHighlands_00 = Over elevated terrain, the lines sharpen slightly as the air thins even more, and the surface reflectance asserts itself. It’s the closest thing to clarity you’ve had since leaving home.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowTransitionalLowlands_00 = Near the twilight band, the spectrometer catches a shifting mix of surface reflection and tenuous atmospheric absorption. The planet can’t decide whether it’s burning or freezing, so it tries both.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowTransitionalHighlands_00 = UV features fluctuate with altitude and local shadowing, as if the terminator is breathing in slow motion. You file the data and then stare at it longer than is strictly professional.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideLowlands_00 = The dark side returns a dim, cold signature with occasional hints of sublimated gases that vanish as quickly as they appear. The instrument calls it “transient”; you call it “blink and you miss it.”
        #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideHighlands_00 = Weak UV reflectance and a whisper of absorption suggest a thin veil of gases pooling in the cold. You note that “atmosphere” is a very generous word here.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowSoutheasternMountains_00 = The mountains throw long shadows, and the spectrum alternates between sharp surface edges and faint atmospheric bands as you pass over ridgelines. It feels like reading a barcode for a planet.
        #GEPscience_bd_UVspec_ToutatisInSpaceLowWesternMountains_00 = A slight increase in ultraviolet haze appears downwind of the day side, hinting at particles being nudged around by thin air and solar pressure. Mission Control asks if it’s weather; you answer “sort of.”
        #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideMountains_00 = The UV scan catches a faint, ghostly glow along the upper limb, possibly charged-particle activity interacting with the tenuous air. You log it carefully, then quietly appreciate the view.
        #GEPscience_bd_UVspec_ToutatisInSpaceHigh_00 = From high above, Toutatis’ thin atmosphere writes a subtle signature over a planet of extremes. The numbers arrive late, and somehow the delay makes the cold side feel even farther away.

        #GEPscience_bd_UVspec_NodensInSpaceLowSaltySeas_00 = The UV spectrum above the salty seas shows deep absorption bands and a bright scatter edge off the haze layer. Under Grannus’ dim red light, the instrument integrates longer and still comes back with “probably water.”
        #GEPscience_bd_UVspec_NodensInSpaceLowFreshWater_00 = Over the darker freshwater patches, the UV reflectance drops while atmospheric absorption stays stubbornly thick. Something in the air is very good at eating ultraviolet.
        #GEPscience_bd_UVspec_NodensInSpaceLowShores_00 = The shoreline boundary draws a crisp UV contrast line, like someone traced it with a highlighter you can’t see. Thin coastal haze adds extra wiggles to the spectrum that take ages to confirm through the comm delay.
        #GEPscience_bd_UVspec_NodensInSpaceLowTropicalLowlands_00 = The tropics show strong UV scattering from high clouds and a broad absorption dip that suggests a busy upper atmosphere. Mission Control asks if it’s “ozone-ish”; you respond “it’s definitely -ish.”
        #GEPscience_bd_UVspec_NodensInSpaceLowTemperateLowlands_00 = Temperate lowlands return a steadier UV signature, with fewer cloud spikes but the same heavy atmospheric bite. The planet looks calm, but the spectrum keeps whispering “chemistry.”
        #GEPscience_bd_UVspec_NodensInSpaceLowTropicalMidlands_00 = UV readings brighten over midland ridges as the air thins slightly and surface reflectance starts to matter. The line shapes shift with every pass, like the atmosphere is rearranging itself when you’re not looking.
        #GEPscience_bd_UVspec_NodensInSpaceLowTemperateMidlands_00 = The spectrometer resolves a cleaner surface edge here, then immediately loses it to a passing veil of haze. Nodens is generous with data and stingy with certainty.
        #GEPscience_bd_UVspec_NodensInSpaceLowHighlands_00 = Highland terrain reflects more UV than expected for such a thick atmosphere, hinting at lighter rock or thinner haze columns. You tag the file “good signal, still far from home.”
        #GEPscience_bd_UVspec_NodensInSpaceLowTundra_00 = The tundra’s UV return is muted and cold, with a subtle slope change that could be frost, dust, or “something else.” The long delay makes every ambiguous bump feel personal.
        #GEPscience_bd_UVspec_NodensInSpaceLowIceCaps_00 = The ice caps flare bright in ultraviolet, but the absorption overhead stays strong enough to blur the edges. Even the brightest patches look subdued under a red sun.
        #GEPscience_bd_UVspec_NodensInSpaceHigh_00 = From high orbit, Nodens is a single, heavy atmospheric signature draped over faint surface hints. The spectrum arrives late and thick, like a postcard that got damp on the way.

        #GEPscience_bd_UVspec_BelisamaInSpaceLowFlats_00 = Belisama’s flats reflect ultraviolet in a flat, stubborn way: no air, no excuses, just rock. Now and then a faint glow flickers at the limb, likely dust getting excited by Grannus’ harsher moments.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTropicalLowlands_00 = The “tropical” label feels optimistic, but the UV albedo does warm slightly on the brighter face. Nodens looms nearby, and the spectrometer catches a faint extra UV wash that wasn’t on the checklist.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTemperateLowlands_00 = UV contrast bands trace subtle compositional changes across the lowlands, like someone spilled different powders and never cleaned up. The vacuum keeps everything honest and a little eerie.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTropicalMidlands_00 = The midlands show sharper UV edges, suggesting fresher material or less space-weathering. The readings are clean enough that Mission Control briefly forgets you’re operating under a dim red sun.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowTemperateMidlands_00 = A thin set of spectral features appears and disappears with viewing angle, consistent with rough terrain throwing micro-shadows into the UV map. It’s geology, but it feels like the moon is blinking.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowHighlands_00 = Highlands return a harsher UV glare with occasional fluorescent-looking spikes from bright outcrops. You consider naming the outcrops, then remember you can’t even pronounce “Belisama” consistently.
        #GEPscience_bd_UVspec_BelisamaInSpaceLowPoles_00 = The poles are darker in UV, with a slight slope hinting at cold-trapped residues that don’t want to be seen. The instrument disagrees on the baseline, which is its way of showing respect.
        #GEPscience_bd_UVspec_BelisamaInSpaceHigh_00 = From high orbit, Belisama is mostly a quiet, airless UV reflectance curve with a persistent, faint limb shimmer. The data’s clean, the sky is not, and the delay makes it feel farther still.

        #GEPscience_bd_UVspec_SucellusInSpaceLowBasins_00 = The basins show UV-dark material with sharp absorption edges, as if something metallic has been ground into the regolith. High radiation noise forces extra averaging, and the results still look a little angry.
        #GEPscience_bd_UVspec_SucellusInSpaceLowLowlands_00 = Lowland passes reveal a faint ultraviolet emission component that doesn’t match simple reflection. It could be sputtered particles, or Sucellus just being dramatic under Grannus.
        #GEPscience_bd_UVspec_SucellusInSpaceLowTropicalMidlands_00 = The UV spectrum sharpens over midlands, with small line features consistent with mineral-rich dust. The instrument logs a warning: “signal good, vibes unsettling.”
        #GEPscience_bd_UVspec_SucellusInSpaceLowTemperateMidlands_00 = Subtle UV color differences map out compositional stripes that suggest mixing and resurfacing long ago. The patterns feel deliberate until you remember rocks also enjoy being weird.
        #GEPscience_bd_UVspec_SucellusInSpaceLowHighlands_00 = Highlands flash brighter in UV, hinting at fresher fractures or exposed deposits with less weathered crust. Mission Control asks for “more passes”; the comm delay answers first with silence.
        #GEPscience_bd_UVspec_SucellusInSpaceLowPoles_00 = Polar regions show a slight brightening and a change in slope that could indicate thin frost or fine-grained residue. Under a dim red sun, even “ice” has to work overtime.
        #GEPscience_bd_UVspec_SucellusInSpaceHigh_00 = From high orbit, Sucellus reads as a hard, metallic reflectance signature wrapped in radiation fuzz. The spectrum is crisp enough to tempt conclusions, and distant enough to punish them.

        #GEPscience_bd_UVspec_CaireenInSpaceLowLowlands_00 = Caireen’s lowlands are a patchwork of UV responses, like a captured asteroid wearing mismatched paint. The spectrometer keeps recalibrating, as if it doesn’t trust what it’s seeing.
        #GEPscience_bd_UVspec_CaireenInSpaceLowMidlands_00 = UV scans across the midlands show faint, transient emission glints that track with sun angle more than terrain. Dust charging in the harsh environment is the leading suspect, and it is not cooperative.
        #GEPscience_bd_UVspec_CaireenInSpaceLowHighlands_00 = The highlands return a sharper UV edge with occasional fluorescence-like bumps from bright spots. You mark them for follow-up, knowing follow-up will arrive after another long, lonely delay.
