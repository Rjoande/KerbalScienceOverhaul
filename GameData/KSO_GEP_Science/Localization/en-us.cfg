        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedBasins_00 = The basin walls cut the red horizon glow into neat slices. The telescope loves the darkness; your nerves do not.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedLowlands_00 = The surface looks like it wants to be mined, not admired. You point the telescope up anyway—resources can wait for starlight.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedTropicalMidlands_00 = The “tropical” label feels optimistic under a dim red sun. The sky survey comes back clean, cold, and very far from home.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedTemperateMidlands_00 = The mount settles into gritty soil and holds steady. You record an unfamiliar constellation and wonder what it’s called on the other side of the delay.
        #GEPscience_sspxTelescopeObservation_SucellusSrfLandedHighlands_00 = Higher up, the horizon glow thins and the stars sharpen. You catch a faint smear of light and label it “probably not a smudge this time.”
