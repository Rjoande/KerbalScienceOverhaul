        #GEPscience_tantares_ultraviolet_light_camera_AirmedSrfLandedHighlands_00 = Facce di frattura fresche bruciano luminose in UV contro pendii più scuri, le colline martoriate sembrano più affilate quanto più sei lontano da casa.
        #GEPscience_tantares_ultraviolet_light_camera_AirmedSrfLandedDarkenedLowlands_00 = I bassopiani scuri bevono l'UV quasi del tutto, lasciando solo puntini occasionali che brillano come braci intrappolate.
        #GEPscience_tantares_ultraviolet_light_camera_AirmedSrfLandedDarkenedMidlands_00 = In UV, il terreno bicolore diventa inconfondibile: questa regione resta ostinatamente fioca, come se si rifiutasse di riflettere qualunque cosa.
