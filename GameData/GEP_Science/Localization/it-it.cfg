        #GEPscience_bd_camera_ToutatisFlyingLow_01 = Le immagini a bassa quota mostrano la superficie sfrecciare sotto una luce strana e piatta. Ti rendi conto che la parte più lunga del volo è aspettare che tornino le tue stesse foto.
