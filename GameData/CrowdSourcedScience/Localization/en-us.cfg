        #CSS_evaReport_GillySrfLandedLowlands_04 = We could really use some anchors here.
        #CSS_evaReport_GillySrfLandedHighlands_00 = If only the launchpad had been here instead of KSC, this whole space thing would've been so much easier. You make a note to berate the administrators back home over their poor choice.
