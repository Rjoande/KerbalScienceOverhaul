        #JNSQscience_gravityScan_LaytheInSpaceLowKrenwichSea_00 = Il rilevatore capta lente oscillazioni sopra l'acqua aperta, come se l'intero mare stesse partecipando a una danza di marea.
        #JNSQscience_gravityScan_LaytheInSpaceLowArcticSea_00 = Il campo gravitazionale sopra le acque artiche sembra sottilmente "bitorzoluto", suggerendo ghiaccio e sacche più dense sotto la superficie.
        #JNSQscience_gravityScan_LaytheInSpaceLowJoolwardSea_00 = I gravioli segnalano un lieve rigonfiamento verso Jool, e per un attimo ti chiedi se l'oceano abbia una direzione preferita.
        #JNSQscience_gravityScan_LaytheInSpaceLowPolwardSea_00 = La scansione mostra deboli asimmetrie che diventano più forti verso latitudini maggiori, come se le regioni polari fossero leggermente fuori equilibrio.
        #JNSQscience_gravityScan_LaytheInSpaceLowHighlands_00 = Le colline spiccano come un mosaico di piccole anomalie, suggerendo una crosta spessa con densità irregolare.
        #JNSQscience_gravityScan_LaytheInSpaceLowMountains_00 = Forti anomalie positive corrono lungo le catene montuose, come se le vette avessero radici profonde e pesanti che le sostengono.
        #JNSQscience_gravityScan_LaytheInSpaceLowIceCaps_00 = Le calotte ghiacciate sembrano stranamente "troppo uniformi" nella mappa gravitazionale, finché alcuni picchi netti non tradiscono strutture sepolte.
        #JNSQscience_gravityScan_LaytheInSpaceLowEnclosedFaults_00 = Le regioni fratturate incidono linee frastagliate nel campo gravitazionale, corrispondenti alle crepe come se fossero state tracciate con il righello.
        #JNSQscience_gravityScan_LaytheInSpaceLowLowlands_00 = I bassopiani mostrano gradienti ampi e dolci, come se qui la superficie fosse più leggera e la roba pesante fosse sprofondata altrove.
        #JNSQscience_gravityScan_LaytheInSpaceLowMidlands_00 = Le pianure risultano un mix bilanciato, finché il rilevatore non trova increspature ripetute che suggeriscono stress in viaggio attraverso la crosta.
        #JNSQscience_gravityScan_LaytheInSpaceHighShores_00 = A questa quota la costa si confonde in un campo mediato, ma il rilevatore suggerisce ancora una crosta più pesante sul lato verso terra.
        #JNSQscience_gravityScan_LaytheInSpaceHighShallows_00 = Le basse acque svaniscono sullo sfondo, lasciando solo un debole bordo dove terra e oceano si scambiano massa avanti e indietro.
        #JNSQscience_gravityScan_LaytheInSpaceHighInlandWater_00 = Le acque interne compaiono come firme morbide e ampie, come conche lisce premute nel campo gravitazionale.
