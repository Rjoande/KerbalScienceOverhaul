		MinmusInSpaceLowBasins* = #JNSQscience_bd_IRspec_MinmusInSpaceLowBasins_00 // Basin floors stay uniformly cold: the IR signature is so flat it feels intentional.
		MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownBasins_00 // Brown basins absorb more sunlight and glow warmer, as if someone spilled cocoa.
		MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownLowlands_00 // Brown lowlands show stronger mid-IR bands: Mission Control writes down "maybe minerals, maybe snacks".
		MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownMidlands_00 // Brown midlands have patchy hot spots that shift with sun angle, like mirrors that forgot they are rocks.
		MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownHighlands_00 // Brown highlands read warmer than the green highlands: less reflective, more honest.
		MinmusInSpaceLowMountains* = #JNSQscience_bd_IRspec_MinmusInSpaceLowMountains_00 // Mountain ridges alternate hot and cold with every bump: the spectrum looks like a barcode of cliffs.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_IRspec_DunaInSpaceLowIceCaps_00 // IR bands show clean water-ice under a dusty veil; the caps stay sharply cold even at noon.
		DunaInSpaceLowHighlands* = #JNSQscience_bd_IRspec_DunaInSpaceLowHighlands_00 // Cool ridges and warmer basins draw a thin-air thermal map, with stubborn frost hiding in shade.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_IRspec_DunaInSpaceLowMidlands_00 // The spectrum smears into dusty gradients; there’s more fine grit than solid rock up here.
		DunaInSpaceLowLowlands* = #JNSQscience_bd_IRspec_DunaInSpaceLowLowlands_00 // The lowlands cling to warmth longer; compacted sand and buried stones are likely.
		DunaInSpaceLowCraters* = #JNSQscience_bd_IRspec_DunaInSpaceLowCraters_00 // Hot rims, cold floors—each crater reads like a textbook on insulation and shadow.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_IRspec_DunaInSpaceLowRareCraters_00 // A few pits show odd absorption lines; different minerals, or something freshly exposed.
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_IRspec_DunaInSpaceLowVoronoiCraters_00 // Polygon fields alternate warm and cold cells like a cracked ceramic plate.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_IRspec_DunaInSpaceLowNotableCraters_00 // One prominent crater stays thermally dramatic: glowing wall, frozen shadow, no compromise.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_IRspec_DunaInSpaceLowExoticCraters_00 // Unfamiliar bands pop up in the scan; Mission Control labels them “interesting” and saves twice.
		DunaInSpaceLowTrenches* = #JNSQscience_bd_IRspec_DunaInSpaceLowTrenches_00 // Trenches stay colder than expected, hinting at steep walls and loose dust that never sees the sun.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_IRspec_DunaInSpaceLowNotablePlains_00 // Broad, even warmth suggests a thin crust over powder—flat, fragile, and very dusty.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_IRspec_DunaInSpaceLowNotableMountains_00 // Sunlit slopes flare hot; faint ice signatures cling to sheltered ledges like they’re cheating.
		DunaInSpaceLowMountains* = #JNSQscience_bd_IRspec_DunaInSpaceLowMountains_00 // Sharp thermal contrast across jagged peaks suggests bare rock punching through the red blanket.
