        DunaFlyingLowVolcano* = #JNSQscience_atmosphereAnalysis_DunaFlyingLowVolcano_00 // Warm dark rock below kicks dust upward in faint columns; the analyser catches short, sharp spikes of very fine grit.
        DunaFlyingHighIceCaps* = #JNSQscience_atmosphereAnalysis_DunaFlyingHighIceCaps_00 // High above the poles the analyser detects only a thin whisper of CO2 and a faint sparkle of high-altitude ice grains.
