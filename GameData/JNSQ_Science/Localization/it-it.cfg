        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedJoolwardSea_00 = Puntando verso Jool, il tasso cala e sfarfalla, come se il gigante proiettasse un'ombra invisibile.
        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedPolwardSea_00 = Un spruzzo rumoroso di impulsi accompagna la deriva verso i poli: l'"ombrello" perde vicino al bordo.
        #JNSQscience_bd_cosmicRay_LaytheSrfSplashedEnclosedFaults_00 = Pozze salmastre e terreno fratturato aggiungono eventi secondari nervosi a un fondo altrimenti quieto.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowShores_00 = Sopra le coste, il rivelatore registra un flusso basso con burst occasionali che si allineano con la latitudine magnetica.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowShallows_00 = Mari bassi sotto, radiazione sottile sopra: il conteggio resta smorzato ma non arriva mai a zero.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowInlandWater_00 = Passando sopra le acque interne, lo sciame di secondarie si indebolisce. le primarie arrivano comunque puntuali.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowKrenwichSea_00 = Il contatore oscilla a bande, come se linee di campo venissero tracciate sulla tua orbita.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowArcticSea_00 = Vicino al mare artico, il rivelatore diventa più loquace: i percorsi aperti lasciano infilare più particelle.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowJoolwardSea_00 = I passaggi verso Jool mostrano un calo improvviso, poi un rapido recupero, come attraversare un confine invisibile.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowPolwardSea_00 = La traccia verso i poli produce burst irregolari: qui la schermatura sembra un insieme di regole che cambia.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowHighlands_00 = Sopra le alture, lo spettro si indurisce leggermente: meno atmosfera significa meno aiuto dal basso.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowMountains_00 = Uno spruzzo frastagliato di secondarie compare sopra le catene montuose: la superficie risponde a colpi di clic.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowIceCaps_00 = Le calotte polari coincidono con un breve picco: la magnetosfera sembra più sottile dove la luce è più dura.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowEnclosedFaults_00 = Proprio sopra le zone di faglia, il fondo cambia quanto basta da far rileggere il grafico a tutti.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowLowlands_00 = Passaggio regolare, dati regolari, rassicuranti finché non ti ricordi che "regolare" può comunque essere letale.
        #JNSQscience_bd_cosmicRay_LaytheInSpaceLowMidlands_00 = Un flusso ridotto e costante: l'orbita di Laythe sembra più sicura di quanto abbia diritto di essere.
        #JNSQscience_bd_cosmicRay_VallSrfLandedPoles_00 = Il contatore ticchetta come un orologio nervoso nel freddo senza fine: Vall non crede nella schermatura.
