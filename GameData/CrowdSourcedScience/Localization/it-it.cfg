        #CSS_crewReport_KerbinSrfLandedSPH_00 = Speri che riescano ancora a far uscire gli aerei, visto che siamo atterrati così vicino allo SPH.
        #CSS_crewReport_KerbinSrfLandedSPHMainBuilding_00 = Uff, è andata vicina, per poco non colpivamo lo SPH!
        #CSS_crewReport_KerbinSrfLandedSPHRoundTank_00 = Noti che la tua nave assomiglia stranamente ai serbatoi laggiù.
        #CSS_crewReport_KerbinSrfLandedSPHTanks_00 = Ti senti piccolo nella tua navetta, circondato da tutti questi enormi serbatoi.
        #CSS_crewReport_KerbinSrfLandedSPHWaterTower_00 = Valuti di saltare fuori dal veicolo e arrampicarti sulla torre dell'acqua.
        #CSS_crewReport_KerbinSrfLandedTrackingStation_00 = Speri proprio che riescano a tracciarti da qui.
        #CSS_crewReport_KerbinSrfLandedTrackingStationDishEast_00 = Fai rumori forti nel microfono delle comunicazioni, chiedendoti se così vicino alla parabola si creerà un effetto Larsen.
        #CSS_crewReport_KerbinSrfLandedTrackingStationDishNorth_00 = Quindi, qual era il senso di questo volo, di nuovo?
        #CSS_crewReport_KerbinSrfLandedTrackingStationDishSouth_00 = Fino alla parabola sud della stazione. Ora sì che stiamo esplorando l'universo, un piccolo passo alla volta.
        #CSS_crewReport_KerbinSrfLandedTrackingStationHub_00 = Guarda mamma, senza mani!
        #CSS_crewReport_KerbinSrfLandedVAB_00 = Sembra ci siano un sacco di strane forme di vita verdi che costruiscono qualcosa qui. Ah già, siamo ancora al VAB.
        #CSS_crewReport_KerbinSrfLandedVABMainBuilding_00 = Wow, che viaggio breve!
        #CSS_crewReport_KerbinSrfLandedVABPodMemorial_00 = Beccati questa, memoriale! Questa è una VERA nave!
        #CSS_crewReport_KerbinSrfLandedVABRoundTank_00 = Avremmo proprio dovuto atterrare DENTRO al serbatoio.
        #CSS_crewReport_KerbinSrfLandedVABSouthComplex_00 = Non sei davvero sicuro di cosa succeda in questo edificio. D'altra parte, vale per la maggior parte delle strutture del CSK.
        #CSS_crewReport_KerbinSrfLandedVABTanks_00 = Bella pilotata. Siamo tornati al CSK in un pezzo, o quasi.
        #CSS_crewReport_KerbinSrfLandedIslandAirfield_00 = La torre di controllo che cade a pezzi sembra pronta a crollare e schiacciare te e la nave da un momento all'altro.
        #CSS_crewReport_KerbinSrfLandedWoomerang_00 = Benvenuti a Woomerang. È tutto qui? Ti aspettavi di più.
        #CSS_crewReport_KerbinFlyingLowKSC_00 = Uuuh! Ce la stiamo facendo! Spazio, cavolo!!
        #CSS_crewReport_KerbinFlyingHighKSC_00 = Guardi fuori dal finestrino e pensi di riuscire a distinguere il CSK laggiù.
        #CSS_crewReport_KerbinSrfLandedWater_00 = Il nostro veicolo galleggia? Forse avremo modo di scoprirlo.
        #CSS_crewReport_KerbinSrfLandedGrasslands_00 = Non vedi l'ora di aprire il portello e sentire il fresco profumo di terra ed erba. Ah già, dobbiamo indossare queste stupide tute spaziali anche su Kerbin. Di chi è stata questa brillante idea?
        #CSS_crewReport_KerbinSrfLandedGrasslands_01 = L'equipaggio è nel mezzo di una discussione sul fatto che l'erba sia davvero più verde dall'altra parte.
        #CSS_crewReport_KerbinSrfLandedHighlands_00 = CSK, siamo atterrati. Credo. L'altimetro indica ancora troppo in alto perché siamo a terra, ma la velocità è zero. Quindi è così. Forse.
        #CSS_crewReport_KerbinSrfLandedHighlands_01 = Atterraggio negli Altipiani, uuuh! Tirate fuori kilt e cornamuse per festeggiare!
        #CSS_crewReport_KerbinSrfLandedShores_00 = Vorresti organizzare una festa in spiaggia, ma il controllo missione ti ordina di concentrarti sulla missione.
        #CSS_crewReport_KerbinSrfLandedShores_01 = La costa sembra invitante mentre guardi le onde arrivare a riva.
        #CSS_crewReport_KerbinSrfLandedShores_02 = Sulla costa sembra esserci vicino un liquido blu.
        #CSS_crewReport_KerbinSrfLandedMountains_00 = Ti senti il re del mondo in piedi su questa montagna. O almeno il re della montagna.
        #CSS_crewReport_KerbinSrfLandedMountains_01 = Mentre il veicolo si assesta pericolosamente vicino a uno strapiombo, rifletti sulla necessità di mettere dei ramponi su ogni futuro carrello d'atterraggio.
        #CSS_crewReport_KerbinSrfLandedDeserts_00 = Immagini quanto farebbe caldo se la capsula non avesse l'aria condizionata accesa.
