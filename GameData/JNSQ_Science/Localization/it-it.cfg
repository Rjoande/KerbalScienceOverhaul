        #JNSQscience_tantares_radiometer_scan_DunaInSpaceLow_01 = Una tenue firma atmosferica si appoggia sopra le letture della superficie, come se Duna stesse provando a fingere di avere "meteo" senza impegnarsi.
        #JNSQscience_tantares_radiometer_scan_DunaInSpaceHigh_00 = Da alta orbita, il bilancio termico di Duna sembra quello di un contabile severo: poco calore immagazzinato, molta perdita radiata e nessun campo magnetico con cui discuterne.
        #JNSQscience_tantares_radiometer_scan_DunaInSpaceHigh_01 = Le bande globali mostrano riflettanza polverosa sul lato diurno e un crollo termico netto nel buio, con anomalie occasionali che potrebbero essere tempeste—o ditate sulla lente.
        #JNSQscience_tantares_radiometer_scan_IkeInSpaceLow_00 = La superficie di Ike passa da bagliore al sole a ombra gelida così in fretta che lo strumento sospetta per un attimo di stare orbitando un Mun davvero scontroso.
        #JNSQscience_tantares_radiometer_scan_IkeInSpaceLow_01 = La radiometria in orbita bassa evidenzia il terreno ruvido tramite la sua inerzia termica discontinua—i fondi dei crateri si raffreddano diversamente dai bordi, come se fossero fatti di scelte peggiori.
        #JNSQscience_tantares_radiometer_scan_IkeInSpaceHigh_01 = Da lontano, Ike è un piccolo dissipatore pale e senz'aria: freddo, coerente e per nulla impressionato dai tuoi tentativi di "alzare il segnale".
        #JNSQscience_tantares_radiometer_scan_IkeInSpaceHigh_01 = Il radiometro conferma la storia semplice di Ike—niente atmosfera, niente calore da trattenere—solo una curva termica ordinata che fa sorridere gli ingegneri.
        #JNSQscience_tantares_radiometer_scan_EdnaInSpaceLow_00 = Edna a malapena emette: quasi tutto ciò che vedi è una sottile linea di calore riluttante, là dove la luce riesce finalmente a raggiungere la superficie.
        #JNSQscience_tantares_radiometer_scan_EdnaInSpaceLow_01 = Il radiometro continua a tentare di sottrarre il "fondo", ma Edna è così debole che il fondo inizia a presentare reclamo.
        #JNSQscience_tantares_radiometer_scan_EdnaInSpaceHigh_00 = Da alta orbita, la firma termica di Edna è un sussurro contro il vuoto, e la tua navicella diventa l'oggetto più "rumoroso" dell'intero dataset.
        #JNSQscience_tantares_radiometer_scan_EdnaInSpaceHigh_01 = La scansione diventa un esercizio di pazienza: lunghe medie gelide con solo un lieve bias sul lato diurno a dimostrare che laggiù c'è un mondo.
        #JNSQscience_tantares_radiometer_scan_DakInSpaceLow_00 = Dak è così piccolo che il radiometro passa metà del passaggio a misurare il vuoto e l'altra metà a discutere se "patata" sia un'unità.
        #JNSQscience_tantares_radiometer_scan_DakInSpaceLow_01 = Bersaglio minuscolo, sensibilità enorme all'assetto: ogni oscillazione trasforma la curva termica in danza interpretativa.
        #JNSQscience_tantares_radiometer_scan_DakInSpaceHigh_00 = Da lontano, il segnale di Dak va e viene come un faro timido: confermi che esiste soprattutto guardando il rumore diventare un po' meno casuale.
        #JNSQscience_tantares_radiometer_scan_DakInSpaceHigh_01 = Il radiometro riporta una firma termica tenue e bitorzoluta, esattamente quella che ti aspetteresti da una roccia che rotola con deliri di grandezza.
        #JNSQscience_tantares_radiometer_scan_DresInSpaceLow_00 = Dres risulta brillante nelle bande riflesse ma resta ostinatamente freddo in emissione, come se volesse sembrare impressionante senza fare alcuna fatica.
        #JNSQscience_tantares_radiometer_scan_DresInSpaceLow_01 = I passaggi in orbita bassa mostrano un contrasto giorno/notte netto e abbastanza disomogeneità da suggerire che Dres stia nascondendo più di quanto la sua reputazione implichi.
        #JNSQscience_tantares_radiometer_scan_DresInSpaceHigh_00 = Da alta orbita, Dres si riduce a una curva termica pulita e solitaria—semplice, stabile e leggermente giudicante.
        #JNSQscience_tantares_radiometer_scan_DresInSpaceHigh_01 = Il radiometro conferma un mondo pallido che disperde calore rapidamente: i dati sono così ordinati che sembrano quasi sospetti.
        #JNSQscience_tantares_radiometer_scan_JoolInSpaceLow_00 = Il radiometro schizza le fasce di Jool come alternanza di sommità nuvolose calde e fredde, come se qualcuno avesse rovesciato vernice su un termostato.
        #JNSQscience_tantares_radiometer_scan_JoolInSpaceLow_01 = Alcuni "hot spot" luminosi attraversano la scansione: al controllo missione discutono se siano tempeste o Jool che ti fulmina con lo sguardo.
        #JNSQscience_tantares_radiometer_scan_JoolInSpaceHigh_00 = Da alta orbita, il bagliore termico di Jool si leviga in ampie cinture e zone, con i poli che sfumano in una foschia più fredda.
        #JNSQscience_tantares_radiometer_scan_JoolInSpaceHigh_01 = Lo strumento riporta un bersaglio enorme e brillante con gradienti sottili—la maggior parte del dramma avviene dentro le nubi, dove non puoi vederlo.
        #JNSQscience_tantares_radiometer_scan_LaytheInSpaceLow_00 = Il radiometro trova mari caldi sotto coltri nuvolose più fresche, facendo sembrare Laythe accogliente finché non ricordi che è pur sempre Laythe.
        #JNSQscience_tantares_radiometer_scan_LaytheInSpaceLow_01 = Le regioni costiere si impastano con la firma atmosferica: la scansione insiste che l'oceano è reale e che le nuvole stanno facendo del loro meglio per nasconderlo.
        #JNSQscience_tantares_radiometer_scan_LaytheInSpaceHigh_00 = Le letture globali mostrano un mondo oceanico che immagazzina bene il calore, con i pattern meteorologici che scolpiscono strisce più fredde sul lato diurno.
        #JNSQscience_tantares_radiometer_scan_LaytheInSpaceHigh_01 = Il lato notturno è meno estremo del previsto: atmosfera e acqua continuano a rifiutarsi di raffreddarsi secondo programma.
        #JNSQscience_tantares_radiometer_scan_VallInSpaceLow_00 = I dati di Vall sono una lezione pulita di assenza d'aria: brillante al sole, brutalmente freddo in ombra e orgoglioso del contrasto.
        #JNSQscience_tantares_radiometer_scan_VallInSpaceLow_01 = Il radiometro distingue bordi di crateri che si raffreddano più in fretta dei loro fondi, come se il terreno stesse provando pause drammatiche.
        #JNSQscience_tantares_radiometer_scan_VallInSpaceHigh_00 = Da alta orbita, Vall si riduce a una curva pallida e fredda con un terminatore affilatissimo.
        #JNSQscience_tantares_radiometer_scan_VallInSpaceHigh_01 = La scansione è così stabile che inizi a usarla per verificare se a "derivare" sia la tua navicella, non la luna.
        #JNSQscience_tantares_radiometer_scan_TyloInSpaceLow_00 = Tylo oscilla tra cotto-al-sole e gelo profondo senza atmosfera che smorzi la transizione: fisica pura e senza compromessi.
        #JNSQscience_tantares_radiometer_scan_TyloInSpaceLow_01 = I passaggi bassi rivelano un'inerzia termica disomogenea tra pianure e altipiani, suggerendo che il regolite non sia un'unica pessima idea uniforme.
        #JNSQscience_tantares_radiometer_scan_TyloInSpaceHigh_00 = Da alta orbita, la firma termica di Tylo sembra semplice e severa: calore dentro, calore fuori, niente scuse.
        #JNSQscience_tantares_radiometer_scan_TyloInSpaceHigh_01 = Il radiometro traccia una divisione giorno/notte così netta da farti chiedere perché non tutti i mondi possano essere così collaborativi.
        #JNSQscience_tantares_radiometer_scan_BopInSpaceLow_00 = Bop è abbastanza piccolo da farsi perdere tra un campione e l'altro: il grafico sembra giocare a nascondino.
        #JNSQscience_tantares_radiometer_scan_BopInSpaceLow_01 = Il segnale sobbalza a ogni micro-correzione d'assetto, producendo una curva termica che si può descrivere solo come "bitorzoluta".
        #JNSQscience_tantares_radiometer_scan_BopInSpaceHigh_00 = Da lontano, il calore di Bop è a malapena una macchia contro il vuoto, e la tua navicella diventa la sorgente termica più sonora.
        #JNSQscience_tantares_radiometer_scan_BopInSpaceHigh_01 = I dati confermano una roccia minuscola e fredda con grande personalità e pochissima massa termica da mostrare.
        #JNSQscience_tantares_radiometer_scan_PolInSpaceLow_00 = La scansione di Pol alterna un bersaglio tenue e il vuoto: il radiometro chiede cortesemente se sei sicuro di puntare nel verso giusto.
        #JNSQscience_tantares_radiometer_scan_PolInSpaceLow_01 = Piccoli cambiamenti sulla superficie suggeriscono riflettività non uniforme, come se Pol indossasse calzini spaiati.
        #JNSQscience_tantares_radiometer_scan_PolInSpaceHigh_00 = Da alta orbita, Pol è un sussurro di segnale. Più "confidenza statistica" che "misura".
        #JNSQscience_tantares_radiometer_scan_PolInSpaceHigh_01 = Il radiometro restituisce un promemoria ordinato: i corpi piccoli si raffreddano in fretta e gli strumenti si irritano quando devono misurare quasi nulla.
        #JNSQscience_tantares_radiometer_scan_LindorInSpaceLow_00 = La radiometria in orbita bassa traccia le deboli e calme bande di Lindor come dolci gradienti di temperatura sotto un'enorme foschia fredda.
        #JNSQscience_tantares_radiometer_scan_LindorInSpaceLow_01 = La scansione cattura sottili strisce "più calde" che fluttuano con i vortici, suggerendo che dentro Lindor succeda più di quanto fuori lasci vedere.
        #JNSQscience_tantares_radiometer_scan_LindorInSpaceHigh_00 = Da alta orbita, Lindor diventa una biglia termica levigata: fredda nel complesso, con ampie fasce che rifiutano di essere perfettamente uniformi.
        #JNSQscience_tantares_radiometer_scan_LindorInSpaceHigh_01 = Il calore emesso dal pianeta resta stranamente stabile per qualcosa così lontano, e lo strumento inizia a sospettare calore interno.
        #JNSQscience_tantares_radiometer_scan_KrelInSpaceLow_00 = Krel passa in fretta dall'abbaglio del lato illuminato al gelo dell'ombra profonda, come se stesse cercando di correre attraverso un giorno che non vuole.
        #JNSQscience_tantares_radiometer_scan_KrelInSpaceLow_01 = I passaggi ravvicinati mostrano un riscaldamento a chiazze che potrebbe essere la tessitura della superficie—oppure Krel che scricchiola piano dalla sua orbita stretta.
        #JNSQscience_tantares_radiometer_scan_KrelInSpaceHigh_00 = Da alta orbita, Krel è perlopiù una curva termica pulita e priva d'aria, con un terminatore molto affilato.
        #JNSQscience_tantares_radiometer_scan_KrelInSpaceHigh_01 = Il radiometro ripete "piccolo, pallido, freddo" con tale costanza che sembra la luna stia posando per i dati.
        #JNSQscience_tantares_radiometer_scan_AdenInSpaceLow_00 = La scansione in orbita bassa di Aden mostra un forte contrasto giorno/notte e un riscaldamento irregolare, come se la roccia non fosse d'accordo su come raffreddarsi.
        #JNSQscience_tantares_radiometer_scan_AdenInSpaceLow_01 = Alcune macchie ostinatamente più calde ricompaiono a ogni passaggio: o lì la superficie è diversa, oppure le viscere di Aden stanno combinando qualcosa.
        #JNSQscience_tantares_radiometer_scan_AdenInSpaceHigh_00 = Da alta orbita, Aden si riduce a una storia semplice di calore dentro/calore fuori, senza atmosfera a complicare la trama.
        #JNSQscience_tantares_radiometer_scan_AdenInSpaceHigh_01 = La curva è ordinata e fredda, ma l'emissione del lato diurno è appena abbastanza "rumorosa" da suggerire una superficie ruvida e variabile.
        #JNSQscience_tantares_radiometer_scan_HuygenInSpaceLow_00 = Il radiometro vede una foschia fredda e brillante sopra e un calore smorzato sotto: l'atmosfera continua a "aiutare" nascondendo la superficie.
        #JNSQscience_tantares_radiometer_scan_HuygenInSpaceLow_01 = Le bande termiche si spostano con il ponte di nubi e lo strumento deve faticare per decidere cosa sia meteo e cosa sia suolo.
        #JNSQscience_tantares_radiometer_scan_HuygenInSpaceHigh_00 = Da alta orbita, Huygen brilla dolcemente attraverso il suo velo ambrato, con l'atmosfera che contribuisce con una firma forte e persistente.
        #JNSQscience_tantares_radiometer_scan_HuygenInSpaceHigh_01 = Le letture globali suggeriscono un mondo freddo che però trattiene il calore meglio di una luna senza aria, grazie a tutto quel gas denso e velato.
        #JNSQscience_tantares_radiometer_scan_RigaInSpaceLow_00 = La radiometria in orbita bassa rivela un comportamento quasi privo d'aria, ma con un lieve effetto di smorzamento—il gas sottile di Riga è giusto abbastanza per dare fastidio.
        #JNSQscience_tantares_radiometer_scan_RigaInSpaceLow_01 = Alcune regioni si raffreddano come roccia nuda, altre restano appena più tiepide: la scansione è stranamente "familiare", e a nessuno piace.
        #JNSQscience_tantares_radiometer_scan_RigaInSpaceHigh_00 = Da alta orbita, Riga sembra una grande luna fredda con sottili differenze emisferiche che non si mediano in modo pulito come previsto.
        #JNSQscience_tantares_radiometer_scan_RigaInSpaceHigh_01 = Il radiometro nota un contributo atmosferico minuscolo sovrapposto al segnale, come se Riga insistesse a essere complicata per principio.
        #JNSQscience_tantares_radiometer_scan_TalosInSpaceLow_00 = Talos mostra un contrasto termico netto: le chiazze chiare si scaldano in fretta e quelle scure restano indietro—il colore diventa temperatura.
        #JNSQscience_tantares_radiometer_scan_TalosInSpaceLow_01 = La scansione è una coperta bitorzoluta di punti caldi e freddi, e lo strumento chiede cortesemente se Talos sia verniciata o semplicemente strana.
        #JNSQscience_tantares_radiometer_scan_TalosInSpaceHigh_00 = Da alta orbita, Talos si assesta in un profilo nitido e privo d'aria, ma la sua riflettività irregolare lascia comunque un lieve ondeggiamento nelle medie.
        #JNSQscience_tantares_radiometer_scan_TalosInSpaceHigh_01 = I dati dicono "freddo, lontano e ostinatamente non uniforme", che è un modo molto Talos di presentarsi.
        #JNSQscience_tantares_radiometer_scan_NaraInSpaceLow_00 = Il radiometro fissa la foschia fredda di Nara e trova soprattutto "molto freddo", più alcune strisce calde ostinate che non dovrebbero esserci.
        #JNSQscience_tantares_radiometer_scan_NaraInSpaceLow_01 = Le temperature delle cime nuvolose tornano come un surgelatore: qualcosa sotto sembra perdere quel tanto di calore da far innervosire i conti.
        #JNSQscience_tantares_radiometer_scan_NaraInSpaceHigh_00 = Da alta orbita, Nara è una presenza fioca e "pesante": lieve bagliore, enorme influenza e un'atmosfera che impasta tutto in gradienti lisci.
        #JNSQscience_tantares_radiometer_scan_NaraInSpaceHigh_01 = Gran parte del segnale è fondo e calore della navicella, finché Nara entra in campo e domina comunque il grafico, in silenzio.
        #JNSQscience_tantares_radiometer_scan_AmosInSpaceLow_00 = Amos passa dal lampeggio al sole al nulla in ombra così in fretta che il radiometro pensa tu stia testando l'interruttore on/off.
        #JNSQscience_tantares_radiometer_scan_AmosInSpaceLow_01 = La superficie più scura della luna si scalda un filo più del previsto, poi scarica tutto nello spazio come se si vergognasse di averne.
        #JNSQscience_tantares_radiometer_scan_AmosInSpaceHigh_00 = Da alta orbita, Amos è una piccola macchia termica che appare e scompare tra un campione e l'altro, lasciandoti ad "averaggiare" anche le sensazioni.
        #JNSQscience_tantares_radiometer_scan_AmosInSpaceHigh_01 = La scansione è perlopiù "vuoto freddo", con un rigonfiamento periodico che conferma che Amos esiste e non è impressionato.
        #JNSQscience_tantares_radiometer_scan_EnonInSpaceLow_00 = La superficie brillante di Enon riflette benissimo ma non emette quasi nulla: è come misurare una lampada fatta di ghiaccio.
        #JNSQscience_tantares_radiometer_scan_EnonInSpaceLow_01 = La radiometria in orbita bassa mostra una lieve disomogeneità: alcune aree trattengono calore un attimo in più, come se la superficie non fosse tutta lo stesso tipo di congelato.
        #JNSQscience_tantares_radiometer_scan_EnonInSpaceHigh_00 = Da alta orbita, Enon si riduce a una curva pulita e fredda con una divisione giorno/notte affilata come un rasoio.
        #JNSQscience_tantares_radiometer_scan_EnonInSpaceHigh_01 = La nota migliore del radiometro è "grande per essere una luna, comunque gelida", seguita da diversi zeri sottolineati.
        #JNSQscience_tantares_radiometer_scan_PraxInSpaceLow_00 = Prax risulta una coperta bitorzoluta di "un po' meno freddo" e "molto freddo", suggerendo una superficie mista e zero pazienza per la luce.
        #JNSQscience_tantares_radiometer_scan_PraxInSpaceLow_01 = Il lato diurno mostra alcune chiazze più scure che assorbono un extra di calore, poi lo perdono subito come se non fosse mai successo.
        #JNSQscience_tantares_radiometer_scan_PraxInSpaceHigh_00 = Da alta orbita, Prax è una firma da mondo di confine: bersaglio piccolo, vuoto enorme e tanta mediazione accurata.
        #JNSQscience_tantares_radiometer_scan_PraxInSpaceHigh_01 = La scansione restituisce un profilo termico ordinato e privo d'aria, giusto abbastanza irregolare da tenere svegli i cartografi.

        // tantares_sp_xray_spectrometer
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthPolarZone_00 = Lo spettrometro registra intensi e irrequieti impulsi di raggi X sopra la zona polare settentrionale, come fili magnetici che si spezzano e si riannodano di continuo.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthPolarZone_01 = Lo spettro polare è luminoso e pieno di picchi, con conteggi che aumentano senza preavviso. Lo strumento lo etichetta come "energetico".
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthSubpolarZone_00 = L'intensità dei raggi X sale e scende in onde lente, come se il sole respirasse calore attraverso bande invisibili.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthSubpolarZone_01 = Nella scansione si risolve una fitta foresta di righe: la lettura suggerisce plasma rovente che fa cose complicate con piena intenzione.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTemperateZone_00 = Lo spettro si stabilizza in un bagliore ampio con occasionali picchi sottili come aghi. Anche la "calma" qui è rumorosa.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTemperateZone_01 = I conteggi di fondo crescono finché il rivelatore chiede una pausa. Il Controllo Missione risponde: "Vuol dire che sta funzionando".
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTropicZone_00 = Lo spettrometro intercetta frequenti micro-impulsi, piccoli lampi rapidi che, messi insieme, fanno una giornata davvero rumorosa.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowNorthTropicZone_01 = L'intensità delle righe cambia rapidamente lungo la traccia, suggerendo regioni attive che scorrono sotto la tua orbita.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowEquatorialZone_00 = La zona equatoriale divampa di raggi X continui e brillamenti intermittenti che saturano il grafico in modo piacevolmente appagante.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowEquatorialZone_01 = Lo spettro sembra un manuale che ha preso fuoco. Il rivelatore resta professionalmente impressionato.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTropicZone_00 = L'emissione di raggi X sfarfalla in chiazze raggruppate, come se il sole stesse scarabocchiando calore lungo questa latitudine.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTropicZone_01 = Alcune righe si intensificano drasticamente, poi svaniscono prima che qualcuno possa vantarsi di averle previste.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTemperateZone_00 = La scansione si addolcisce in un continuo ampio con picchi di breve durata, come scintille sputate da una mola.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthTemperateZone_01 = Lo strumento registra "andamento stabile", immediatamente seguito da "andamento non più stabile".
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthSubpolarZone_00 = I conteggi aumentano mentre passi sopra una chiazza luminosa, poi calano in un bagliore più quieto. Il sole rifiuta di essere uniforme.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthSubpolarZone_01 = Lo spettro mostra firme di plasma rovente con variazioni appena sufficienti ad accendere una discussione a terra.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthPolarZone_00 = La zona polare meridionale restituisce caratteristiche intense e nette che si ripetono a ogni passaggio, come se il sole seguisse un calendario che solo lui sa leggere.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceLowSouthPolarZone_01 = I raggi X schizzano in esplosioni improvvise: il rivelatore le segnala e poi ti chiede con cortesia di smetterla di puntare il sole.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceHigh_00 = Dall'orbita alta sopra Kerbol, lo spettro diventa una media abbagliante, punteggiata da rari e enormi picchi che fanno impallidire tutto il resto.
        #JNSQscience_tantares_xray_spectrometer_SunInSpaceHigh_01 = Il rivelatore passa la maggior parte del tempo a contare "tutti i raggi X", poi produce un grafico che somiglia in modo sospetto a un'etichetta di avvertimento.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPoles_00 = La scansione mostra una fluorescenza nitida dalla pallida regolite, con un tenue sussurro di volatili vicino al livello di rumore.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPoles_01 = Le righe minerali pulite risaltano con decisione: i poli sembrano chimicamente ordinati rispetto al resto della crosta arsa di Moho.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowLowlands_00 = Le pianure più scure attenuano le righe leggere e rafforzano quelle più pesanti, come se i bassopiani avessero un appetito più metallico.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowLowlands_01 = La fluorescenza a raggi X si mappa in ampie chiazze, suggerendo polvere spessa e cotta sopra un basamento roccioso ostinato.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPolarIceCraters_00 = Bordi luminosi e fondi in ombra dividono lo spettro in due: roccia all'esterno, quieti indizi di freddo all'interno.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowPolarIceCraters_01 = Il rivelatore coglie una firma attenuata dagli interni dei crateri, come se qualcosa di riflettente si nascondesse sotto la polvere.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowHighlands_00 = Le colline tirano fuori forti righe dei silicati con minima sfocatura. Meno polvere, roccia più sincera.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowHighlands_01 = I rapporti cambiano lungo le dorsali, come se strati diversi fossero stati scorticati e lasciati esposti all'ispezione.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowMidlands_00 = Un livello di base stabile si spezza in sottili onde composizionali, suggerendo materiale superficiale rimescolato a fondo.
        #JNSQscience_tantares_xray_spectrometer_MohoInSpaceLowMidlands_01 = Lo spettro si ripete con piccole variazioni, come se gli impatti avessero mescolato tutto quel tanto che basta per essere fastidiosi.
