@EXPERIMENT_DEFINITION:HAS[#id[bd_IRradiometer]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthPolarZone_00 // The polar zone looks “cooler” only by Kerbol standards; the radiometer still begs for a break.
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthSubpolarZone_00 // A steep thermal gradient shows up here, like the star is wearing a subtle heat belt.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthTemperateZone_00 // Temperate, it says. The instrument clearly doesn’t understand the word.
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowNorthTropicZone_00 // The tropic band flares brighter in infrared; Mission Control quietly lowers the gain… again.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowEquatorialZone_00 // The equatorial zone tries to pin the needle past the stop. The data log smells faintly of panic.
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthTropicZone_00 // Another hot band, slightly offset; the radiometer maps it as “yes, still extremely yes.”
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthTemperateZone_00 // A calmer-looking strip, until you remember the “baseline” is molten-surface-adjacent.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthSubpolarZone_00 // Infrared brightness drops off sharply toward the pole; the gradient looks almost tidy for once.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_IRradiometer_SunInSpaceLowSouthPolarZone_00 // The south polar zone reads lower than expected, but “lower” here is still a terrible number.
        
        MohoInSpaceLow* = #JNSQscience_bd_IRradiometer_MohoInSpaceLow_00 // Thermal maps show narrow warm ribbons that track crisp scarps during local morning. The anomaly is small but repeatable, consistent with exposed competent material retaining heat differently than the surrounding regolith.
		MohoInSpaceLow* = #JNSQscience_bd_IRradiometer_MohoInSpaceLow_01 // A few fracture intersections exhibit slightly elevated night-side temperatures compared to adjacent plains. The simplest fit is higher thermal inertia from freshly disturbed blocks or thin veneers of recently reworked surface.
		MohoInSpaceLow* = #JNSQscience_bd_IRradiometer_MohoInSpaceLow_02 // Several young-looking crater floors cool more slowly than nearby slopes, producing a clear diurnal lag signature. The pattern suggests a denser, less “fluffy” layer—possibly impact-melted or recently compacted by intermittent shaking.
		MohoInSpaceLowPoles* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowPoles_00 // The poles read as stubborn cold spots, hiding from Kerbol like they owe it money.
		MohoInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowLowlands_00 // The lowlands glow fiercely in infrared; the curve looks like “surface: yes, still hot.”
		MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowPolarIceCraters_00 // Deep crater floors barely radiate at all, cold enough to hoard whatever vapors ever wandered in.
		MohoInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowHighlands_00 // Jagged highlands flash hot then drop cold with every shadow; the map is all sharp edges and mood swings.
		MohoInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowMidlands_00 // The midlands settle into a brutal, even heat signature. No weather, no mercy, just physics.
		MohoInSpaceLowCraters* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowCraters_00 // Crater rims burn bright while interiors go dark; it’s like reading a thermal topography textbook.
		MohoInSpaceLowExoticCraters* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowExoticCraters_00 // These craters have oddly consistent hot patches, as if the ground “remembers” being melted.
		MohoInSpaceLowRareCraters* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowRareCraters_00 // The thermal trace looks noisy and lumpy here, either unusual material, or Moho just being Moho.
		MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowVoronoiCraters_00 // A geometric web of warm ridges and cold hollows appears; the radiometer draws patterns where none were requested.
		MohoInSpaceLowNotableCraters* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowNotableCraters_00 // The “notable” ones stand out in infrared like warning signs: steep walls, deep shade, extreme contrasts.
		MohoInSpaceLowPeaks* = #JNSQscience_bd_IRradiometer_MohoInSpaceLowPeaks_00 // The peaks radiate hard in sunlight and vanish into cold as soon as they turn away—thin rock, fast cooling, big drama.

        EveInSpaceLowPoles* = #JNSQscience_bd_IRradiometer_EveInSpaceLowPoles_00 // The poles come back as the closest thing Eve has to “cool,” a dim halo under thick haze.
		EveInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_EveInSpaceLowLowlands_00 // The lowlands radiate like a warmed engine block; the numbers keep insisting this is normal.
		EveInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_EveInSpaceLowMidlands_00 // The midlands show broad, steady heat with soft gradients, as if the air is ironing the planet flat.
		EveInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_EveInSpaceLowHighlands_00 // The highlands read slightly cooler, but only in the way a furnace has “less hot” corners.
		EveInSpaceLowPeaks* = #JNSQscience_bd_IRradiometer_EveInSpaceLowPeaks_00 // The peaks spike and dip as they rotate through sunlight, sharp lines blurred by a heavy atmosphere.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_IRradiometer_EveInSpaceLowExplodiumSea_00 // The Explodium Sea looks thermally “wrong” — glossy, uniform, and brighter than it has any right to be.
		EveInSpaceLowMountains* = #JNSQscience_bd_IRradiometer_EveInSpaceLowMountains_00 // Mountain ranges carve faint cool seams through the heat, like wrinkles in a purple blanket.
		EveInSpaceLowShores* = #JNSQscience_bd_IRradiometer_EveInSpaceLowShores_00 // Coasts draw themselves in infrared: warm land, smoother seas, and a thin band where everything argues.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_IRradiometer_EveInSpaceLowPolarLakes_00 // The polar lakes sit as dark ovals in a pale field, quietly hoarding their own temperature rules.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_IRradiometer_EveInSpaceLowPetrolLakes_00 // The petrol lakes shine with a slick, high-emissivity signature; the instrument logs “do not taste.”
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofAkron_00 // Sea of Akron returns a slow, mottled warmth, hinting at currents hidden beneath the haze.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofNessus_00 // Sea of Nessus comes back oddly even, like someone smoothed the heat map with a thumb.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofTaniwha_00 // Sea of Taniwha shows long warm streaks aligned with winds you can’t see but can definitely feel.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofGigan_00 // Sea of Gigan radiates in broad bright patches, as if the surface is simmering in lazy circles.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofRodan_00 // Sea of Rodan flickers between warm and warmer; the radiometer stops pretending to be surprised.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofGojira_00 // Sea of Gojira reads hot, dense, and deep—thermal inertia like a stubborn personality.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofGhidorah_00 // Sea of Ghidorah shows three distinct warm bands that refuse to average out nicely.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_IRradiometer_EveInSpaceLowSeaofBagorah_00 // Sea of Bagorah is a bright smear with cool eddies at the edges, like heat trying to escape.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_IRradiometer_EveInSpaceLowKrakensWell_00 // Kraken’s Well is a tight knot of contrasting temperatures, an infrared warning label with no text.

        GillyInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_GillyInSpaceLowLowlands_00 // The lowlands come back as a blotchy warm smear; the whole moon seems to heat up unevenly.
		GillyInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_GillyInSpaceLowMidlands_00 // The midlands cool off in a hurry the moment they slip into shadow, like the rock is barely trying.
		GillyInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_GillyInSpaceLowHighlands_00 // Sharp, cold ridges stand out against warmer slopes; Gilly looks like a thermal crumple.

        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowIceCaps_00 // The radiometer sees the poles as cold darkness, with tiny warm freckles where the ice breaks.
		KerbinInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowHighlands_00 // The highlands show a patchwork of warm days and cold nights, like the planet is breathing.
		KerbinInSpaceLowMountains* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowMountains_00 // Cold ridgelines cut through warmer foothills; the peaks look like they forgot how to be summer.
		KerbinInSpaceLowShores* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowShores_00 // A thin bright ribbon marks where land bakes and water cools; the coastline draws itself in heat.
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowMidlands_00 // The midlands glow evenly, interrupted by suspiciously straight hot lines that might be roads.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowLowlands_00 // The lowlands radiate gently; the instrument insists it can “feel” the humidity. It cannot.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridLowlands_00 // The arid lowlands blaze in infrared; you can almost hear the sand sizzling from orbit.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridMidlands_00 // Dry terrain cools off fast after sunset; the radiometer loves the dramatic swings.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridHighlands_00 // Hot at noon, cold at night—your temperature trace looks like a saw blade.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowAridMountains_00 // Shadows carve cool canyons between sun-baked slopes; the contrast is razor sharp.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowGreatLake_00 // The Great Lake holds heat like a giant thermal battery, smoothing out the day’s extremes.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowInlandWater_00 // Inland waters show warm edges and cool centers, hinting at currents… or guesswork.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowKreenwichSea_00 // A slow swirl of warmer water suggests circulation patterns the scientists will argue about anyway.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowArcticSea_00 // The Arctic Sea is a dim cold smear with faint warm seams where the ice gives up.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowForemansSea_00 // Foremans Sea has a mottled thermal texture; the radiometer logs it as “lumpy soup.”
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowTriangulusSea_00 // Triangulus Sea draws sharp thermal boundaries, as if someone outlined it with a ruler.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowNorthernSea_00 // The Northern Sea shows scattered warm spots> storms, currents, or careless calibration.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowSub-ArcticSea_00 // Heat leaks through in narrow bands, like the ocean is wearing striped socks.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowEasternSea_00 // Long warm streaks line up with the winds; the data looks like it’s moving.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowWesternSea_00 // A broad cool basin with a warm fringe along the shallows. Classic “beach brochure” signature.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_IRradiometer_KerbinInSpaceLowWelcomeBackIsland_00 // WelcomeBackIsland is a tiny warm dot in a lot of cold water. The radiometer politely welcomes you back.

        MunInSpaceLowPoles* = #JNSQscience_bd_IRradiometer_MunInSpaceLowPoles_00 // The radiometer stares into long shadows; the poles read like a freezer with a sunlamp on a timer.
		MunInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_MunInSpaceLowHighlands_00 // Sunlit highlands spike hot, then crash cold the moment the ground turns away.
		MunInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_MunInSpaceLowMidlands_00 // The midlands give a steady thermal glow, until a crater rim flashes like a stovetop.
		MunInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_MunInSpaceLowLowlands_00 // Low basins hold heat a little longer; the curve suggests fine dust acting like insulation.
		MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_IRradiometer_MunInSpaceLowPolarIceCraters_00 // Some crater floors barely register at all. Cold enough to keep secrets, and maybe ice.
		MunInSpaceLowExoticCraters* = #JNSQscience_bd_IRradiometer_MunInSpaceLowExoticCraters_00 // The “exotic” craters share strange thermal fingerprints, like the ground was poured instead of pounded.
		MunInSpaceLowRareCraters* = #JNSQscience_bd_IRradiometer_MunInSpaceLowRareCraters_00 // These craters cool unevenly; the readout turns into a scatter of lumpy heat islands.
		MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_IRradiometer_MunInSpaceLowVoronoiCraters_00 // The crater field draws a honeycomb in infrared geometry, but make it cold.
		MunInSpaceLowNotableCraters* = #JNSQscience_bd_IRradiometer_MunInSpaceLowNotableCraters_00 // The notable craters throw sharp hot/cold edges; the map looks like it was cut with a knife.
		MunInSpaceLowMountains* = #JNSQscience_bd_IRradiometer_MunInSpaceLowMountains_00 // The mountains read as cold spines with warmer slopes; elevation is just another way to lose heat.

        MinmusInSpaceLowPoles* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowPoles_00 // The poles stay stubbornly cold; even Minmus’ green glow can’t pretend otherwise.
		MinmusInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowLowlands_00 // The lowlands heat up and cool down on schedule, like they’re trying to impress the radiometer.
		MinmusInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowMidlands_00 // The midlands show patchy warmth that suggests rougher ground than the eye can see.
		MinmusInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowHighlands_00 // The highlands read cooler and sharper-edged; ridges cast thermal shadows like ink.
		MinmusInSpaceLowBasins* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBasins_00 // The basins glow evenly, like smooth minty flats laid out for landing practice.
		MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownBasins_00 // The brown basins soak up heat; the instrument logs them as “unexpectedly toasty.”
		MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownLowlands_00 // Darker lowlands hold warmth longer, proof that paint jobs matter, even on moons.
		MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownMidlands_00 // The brown midlands cool slowly, hinting at denser crust or simply better sunbathing.
		MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowBrownHighlands_00 // The brown highlands alternate hot and cold in bands; the map looks like a barcode.
		MinmusInSpaceLowMountains* = #JNSQscience_bd_IRradiometer_MinmusInSpaceLowMountains_00 // The mountains spike cold with warmer flanks; elevation steals heat and courage alike.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowIceCaps_00 // The ice caps glow cold and stubborn, refusing to play along with the rest of Duna’s warm tint.
		DunaInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowHighlands_00 // The highlands show crisp hot-to-cold transitions; with so little air, shadows bite hard.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowMidlands_00 // A broad, steady infrared glow suggests dusty plains that soak up daylight and give it back grudgingly.
		DunaInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowLowlands_00 // Low basins hold heat a little longer; the radiometer draws a gentle “thermal ponding” curve.
		DunaInSpaceLowCraters* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowCraters_00 // Rims burn bright in sunlight while crater floors drop cold; the contrast is almost rude.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowRareCraters_00 // The “rare” craters cool in lumpy patches, hinting at mixed materials churned by impacts.
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowVoronoiCraters_00 // A neat web of warm ridges and cold hollows appears; geometry never looked so chilly.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowNotableCraters_00 // The notable craters throw sharp thermal edges, as if they were drawn with a straightedge and spite.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowExoticCraters_00 // These craters have odd hot spots that linger; the ground behaves like it remembers being melted.
		DunaInSpaceLowTrenches* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowTrenches_00 // The trenches hide in cold shadow with thin warm lips along the edges—deep cuts, deep chill.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowNotablePlains_00 // The plains read smooth and uniform, like a big dusty heat sink set out under Kerbol.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowNotableMountains_00 // The mountains show alternating hot stripes and cold seams; slopes and shadow do all the talking.
		DunaInSpaceLowMountains* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowMountains_00 // Peaks cool fast, slopes stay warmer; the profile looks like a lesson in “no atmosphere, no mercy.”
		DunaInSpaceLowVolcano* = #JNSQscience_bd_IRradiometer_DunaInSpaceLowVolcano_00 // The volcano region runs suspiciously warm for a cold planet; the radiometer double-checks itself anyway.

		IkeInSpaceLowPoles* = #JNSQscience_bd_IRradiometer_IkeInSpaceLowPoles_00 // Ike’s poles sit as dark cold caps, with only thin sunlit edges trying to look brave.
		IkeInSpaceLowMountains* = #JNSQscience_bd_IRradiometer_IkeInSpaceLowMountains_00 // Cold spines and warmer flanks trace the mountain chains; the shadows are doing most of the work.
		IkeInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_IkeInSpaceLowMidlands_00 // The midlands give a flat, pale infrared signature—unremarkable, until you notice how fast it flips at dusk.
		IkeInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_IkeInSpaceLowLowlands_00 // Low areas hold warmth a touch longer, as if dust is acting like a thin blanket over rock.
		IkeInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_IkeInSpaceLowHighlands_00 // The highlands read cooler and harsher; Ike looks a lot like the Mun in infrared, and that’s unsettling.

        DresInSpaceHigh* = #JNSQscience_bd_IRradiometer_DresInSpaceHigh_00 // From up here, Dres is a pale little heat signature with almost no contrast—lonely, cold, and quietly unimpressed.
		DresInSpaceLow* = #JNSQscience_bd_IRradiometer_DresInSpaceLow_00 // The radiometer picks out faint thermal blotches across the surface; even Dres manages to look tired in infrared.
		DresInSpaceLowPoles* = #JNSQscience_bd_IRradiometer_DresInSpaceLowPoles_00 // The poles barely climb above “cold”; shadowed patches look like they’ve been saving winter for years.
		DresInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_DresInSpaceLowHighlands_00 // Sunlit ridges spike warm, then drop off fast—thin dust over stubborn rock makes for quick mood swings.
		DresInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_DresInSpaceLowMidlands_00 // A broad, even glow suggests fine regolith acting like a slow, steady heat sponge.
		DresInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_DresInSpaceLowLowlands_00 // Low basins hold warmth a little longer, as if the dust has settled into a better blanket down there.
		DresInSpaceLowCanyon* = #JNSQscience_bd_IRradiometer_DresInSpaceLowCanyon_00 // The canyon draws razor-sharp hot rims and a cold floor; the radiometer can practically see the shadows.

        EdnaInSpaceHigh* = #JNSQscience_bd_IRradiometer_EdnaInSpaceHigh_00 // From high orbit, Edna is a dim, steady ember; the thermal map looks calm until the long night side drops away.
		EdnaInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_EdnaInSpaceLowLowlands_00 // The lowlands hold onto warmth a little longer, suggesting fine frost and dust acting like an insulating blanket.
		EdnaInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_EdnaInSpaceLowMidlands_00 // The midlands show a smooth, low infrared glow—cold, quiet, and stubbornly consistent.
		EdnaInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_EdnaInSpaceLowHighlands_00 // The highlands flip sharply between sunlit warmth and shadowed cold; the contrast draws every ridge in heat.
		EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_IRradiometer_EdnaInSpaceLowPolarIceCraters_00 // Polar crater floors barely register; the radiometer marks them as “cold traps” and stops pretending to be surprised.
		EdnaInSpaceLowWhites* = #JNSQscience_bd_IRradiometer_EdnaInSpaceLowWhites_00 // The bright “Whites” read oddly cold in infrared, as if they reflect sunlight well but refuse to keep any of it.

		DakInSpaceHigh* = #JNSQscience_bd_IRradiometer_DakInSpaceHigh_00 // Dak barely fills a pixel, but the radiometer still catches rapid hot-cold flicker as it spins like a tossed rock.
		DakInSpaceLowLowlands* = #JNSQscience_bd_IRradiometer_DakInSpaceLowLowlands_00 // The lowlands warm quickly and cool faster; the curve looks like bare stone with no patience for heat.
		DakInSpaceLowMidlands* = #JNSQscience_bd_IRradiometer_DakInSpaceLowMidlands_00 // The midlands return a lumpy thermal signature, hinting at mixed rubble and patchy surface texture.
		DakInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_DakInSpaceLowHighlands_00 // Sunlit highlands spike bright in infrared while nearby shadows plunge cold; Dak reads like a jagged thermal sawtooth.

        JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_IRradiometer_JoolInSpaceLowEquatorialBands_00 // Infrared brightness rises and falls in broad stripes; the bands look like slow, hot conveyor belts.
		JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_IRradiometer_JoolInSpaceLowExposedLowerDeck_00 // A warmer layer shows through the clouds here, like someone pulled back a blanket for a second.
		JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_IRradiometer_JoolInSpaceLowSubpolarBands_00 // The subpolar bands run cooler and fuzzier, as if the atmosphere is mixing itself into confusion.
		JoolInSpaceLowNorthPole* = #JNSQscience_bd_IRradiometer_JoolInSpaceLowNorthPole_00 // The north pole reads colder than the surrounding bands, a dim cap of swirling chill.
		JoolInSpaceLowSouthPole* = #JNSQscience_bd_IRradiometer_JoolInSpaceLowSouthPole_00 // The south pole shows a cold core with warmer edges, like a whirlpool made of temperature.
		JoolInSpaceLowStormComplex* = #JNSQscience_bd_IRradiometer_JoolInSpaceLowStormComplex_00 // The storm complex burns bright in infrared; something down there is doing a lot of work.

		LaytheInSpaceLowShores* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowShores_00 // A thin warm ribbon outlines the coasts; land and sea argue politely in heat.
		LaytheInSpaceLowShallows* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowShallows_00 // The shallows show mottled warmth and cool streaks, hinting at currents in a very busy ocean.
		LaytheInSpaceLowInlandWater* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowInlandWater_00 // Inland waters hold heat longer than the surrounding terrain, like little thermal reservoirs.
		LaytheInSpaceLowKrenwichSea* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowKrenwichSea_00 // The Krenwich Sea returns long, smooth gradients—big water, big inertia.
		LaytheInSpaceLowArcticSea* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowArcticSea_00 // The Arctic Sea is a cold smear with faint warm seams where ice thins and gives up.
		LaytheInSpaceLowJoolwardSea* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowJoolwardSea_00 // The Joolward Sea reads subtly warmer; the radiometer blames winds and refuses to elaborate.
		LaytheInSpaceLowPolwardSea* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowPolwardSea_00 // The Polward Sea cools fast toward the edge of daylight; the map looks crisp and unforgiving.
		LaytheInSpaceLowHighlands* = #JNSQscience_bd_IRradiometer_LaytheInSpaceLowHighlands_00 // Highlands flip from warm to cold with sharp shadow lines; thin air means fast decisions.
