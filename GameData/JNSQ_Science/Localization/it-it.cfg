        #JNSQscience_evaReport_KerbinFlyingLowAridLowlands_00 = Sopra i bassopiani aridi, aria calda e polvere sferzano la tua tuta. Registri "sobbalzi termici" e "sabbia ovunque".
        #JNSQscience_evaReport_KerbinFlyingLowAridLowlands_01 = Sopra i bassopiani aridi, l'aria è calda e granulosa. Ti chiedi se la garanzia della tuta copra il 'deserto'.
        #JNSQscience_evaReport_KerbinFlyingLowAridMountains_00 = Poco sopra le montagne aride, le cime sembrano scomodamente vicine. Valuti di chiedere scusa al paracadute.
        #JNSQscience_evaReport_KerbinFlyingLowAridMountains_01 = Nelle montagne aride, le correnti ascensionali sono maleducate e le rocce sono più affilate del tuo senso dell'orientamento.
        #JNSQscience_evaReport_KerbinFlyingLowAridMountains_02 = Le montagne aride sono troppo vicine per stare comodi mentre sei in EVA. Registri "raffiche, creste e pessime scelte di vita".
        #JNSQscience_evaReport_KerbinFlyingLowGreatLake_00 = Volando basso sopra il Grande Lago, vedi acqua liscia bordata da terra. Sembra un sito d'atterraggio perfetto. È una trappola.
        #JNSQscience_evaReport_KerbinFlyingLowGreatLake_01 = Da quassù il Grande Lago è uno specchio nell'entroterra. Lo usi per controllare se il casco sia ancora attaccato.
        #JNSQscience_evaReport_KerbinFlyingLowInlandWater_00 = Osservi i venti disegnare mappe provvisorie sull'acqua sotto di te, mentre cerchi di non diventarne parte.
        #JNSQscience_evaReport_KerbinFlyingLowInlandWater_01 = Da quassù le acque interne sono uno specchio nell'entroterra. Lo usi per controllare se il casco sia ancora attaccato.
        #JNSQscience_evaReport_KerbinFlyingLowKreenwichSea_00 = Volando basso sopra il mare di Krenwich, la superficie lancia luce solare sulla visiera. Lo definisci 'bellissimo' e inizi subito a strizzare gli occhi.
        #JNSQscience_evaReport_KerbinFlyingLowKreenwichSea_01 = Il mare di Krenwich getta foschia salmastra nel flusso d'aria. Registri visibilità ridotta e maggiore appiccicosità sulla tuta.
        #JNSQscience_evaReport_KerbinFlyingLowArcticSea_00 = Un'EVA in volo basso sopra il mare artico è una lezione di aria fredda e spruzzi ancora più freddi. Riferisci visibilità nitida e mani intorpidite.
        #JNSQscience_evaReport_KerbinFlyingLowArcticSea_01 = Noti chiazze di ghiaccio e raffiche taglienti. Il riscaldatore della tuta si guadagna una stella nel registro di missione.
        #JNSQscience_evaReport_KerbinFlyingLowForemansSea_00 = Scrivi che l'oceano sotto sembra invitante, finché non ti ricordi che sei all'esterno del mezzo.
        #JNSQscience_evaReport_KerbinFlyingLowForemansSea_01 = Sfiori dall'alto il mare di Foreman. Gli spruzzi sembrano rinfrescanti finché non ti ricordi che stanno colpendo il tuo supporto vitale.
        #JNSQscience_evaReport_KerbinFlyingLowTriangulusSea_00 = Sopra il mare del Triangolo, l'aria sobbalza come se non riuscisse a stare ferma. Registri raffiche variabili e schemi increspati sotto.
        #JNSQscience_evaReport_KerbinFlyingLowTriangulusSea_01 = Provi a fare un rapporto EVA con calma e il vento risponde con punteggiatura. Tanta punteggiatura.
        #JNSQscience_evaReport_KerbinFlyingLowNorthernSea_00 = Un'EVA in volo basso sopra il mare settentrionale porta venti frizzanti e lunghe ondulate. Registri spruzzi costanti nel flusso verso le prese d'aria.
        #JNSQscience_evaReport_KerbinFlyingLowNorthernSea_01 = Il rapporto annota aria marittima fredda e un forte desiderio di salire più in alto, preferibilmente dentro la cabina.
        #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_00 = Sopra il mare sub-artico, noti chiazze pallide e onde dall'aria gelida. La tua tuta insiste che la temperatura sia 'nope'.
        #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_01 = Sfiorando il mare sub-artico, ti chiedi come possa l'acqua sembrare così fredda vista dall'alto. Poi senti il vento e ti ricordi.
        #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_02 = Sopra il mare sub-artico il vento è tagliente e gli spruzzi lo sono di più. Riferisci "turbolenza fredda, foschia salata".
        #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_03 = Registri variazioni di visibilità mentre passano bande di foschia. Il mezzo trema come se fosse d'accordo con te.
        #JNSQscience_evaReport_KerbinFlyingLowEasternSea_00 = Il mare orientale giace sotto una foschia sottile. Riferisci aria umida, aerosol salini e scossoni occasionali sopra l'acqua.
        #JNSQscience_evaReport_KerbinFlyingLowEasternSea_01 = Guardi la tua ombra sfiorare le onde mentre annoti i dati. Le onde sembrano poco impressionate.
        #JNSQscience_evaReport_KerbinFlyingLowWesternSea_00 = Un'EVA in volo basso sopra il mare occidentale è ipnotica finché non arriva una raffica. Registri "ondulate costanti, sobbalzi improvvisi".
        #JNSQscience_evaReport_KerbinFlyingLowWesternSea_01 = Registri foschia salmastra e mari ondosi sotto. L'esterno di un mezzo è un pessimo posto per fare turismo.
        #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_00 = Girando attorno all'Isola del Ritorno, conti i bordi sabbiosi e un solo buon punto d'atterraggio.
        #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_01 = Volando basso sopra l'Isola del Ritorno, saluti la spiaggia. Lei non saluta.
        #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_02 = Un'EVA in volo basso sopra l'Isola del Ritorno ha un'aria stranamente familiare. Annota il traffico radio e l'sentore di "razzi recenti".
        #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_03 = Scrivi che il terreno sembra casa, poi lo cancelli e lo sostituisci con "familiarità scientificamente significativa".
        #JNSQscience_evaReport_KerbinInSpaceLowAridLowlands_00 = I bassopiani aridi brillano pallidi e polverosi sotto di te. Riferisci alta riflettività e un forte desiderio di acqua.
        #JNSQscience_evaReport_KerbinInSpaceLowAridLowlands_01 = Noti che i deserti dall'orbita sembrano pacifici, cosa che è chiaramente l'atmosfera che mente per loro conto.
        #JNSQscience_evaReport_KerbinInSpaceLowAridMountains_00 = Le montagne aride proiettano ombre lunghe e nette. Riferisci notevoli variazioni di quota e notevole meraviglia.
        #JNSQscience_evaReport_KerbinInSpaceLowAridMountains_01 = Fai un'EVA sopra le montagne aride e guardi le linee di cresta scorrere sotto di te come lente onde di roccia.
        #JNSQscience_evaReport_KerbinInSpaceLowGreatLake_00 = Il Grande Lago appare come una macchia luminosa e calma in mezzo alla terra. Registri una firma costiera pulita e un invitante tono blu.
        #JNSQscience_evaReport_KerbinInSpaceLowGreatLake_01 = Noti che anche un solo lago può sembrare enorme dall'orbita. La prospettiva è un potente strumento scientifico.
        #JNSQscience_evaReport_KerbinInSpaceLowInlandWater_00 = Le acque interne luccicano tra le nubi. Riferisci riflessi speculari e un promemoria che Kerbin, da qualche parte, è per lo più liquida.
        #JNSQscience_evaReport_KerbinInSpaceLowInlandWater_01 = Guardi la luce solare lampeggiare sulle acque interne sotto di te e lo registri come "inaspettatamente lucido, ripetutamente."
        #JNSQscience_evaReport_KerbinInSpaceLowKreenwichSea_00 = Il mare di Krenwich domina la vista con blu profondo e nubi sparse. Registri "vastità oceanica confermata".
        #JNSQscience_evaReport_KerbinInSpaceLowKreenwichSea_01 = Ti chiedi quante storie stia nascondendo il mare di Krenwich. Il rapporto resta ufficialmente non impegnativo.
        #JNSQscience_evaReport_KerbinInSpaceLowArcticSea_00 = Sopra il mare artico, ghiaccio chiaro e bande di nubi fredde spiccano con chiarezza. Registri albedo alto e brividi notevoli.
        #JNSQscience_evaReport_KerbinInSpaceLowArcticSea_01 = Fluttui in orbita bassa e guardi i disegni di ghiaccio del mare artico scorrere come specchi lenti e spezzati.
        #JNSQscience_evaReport_KerbinInSpaceLowForemansSea_00 = Il mare di Foreman appare più scuro e più caldo, con striature di nubi più spesse. Registri umidità e meteo attivo sotto.
        #JNSQscience_evaReport_KerbinInSpaceLowForemansSea_01 = Riferisci variazioni di colore dell'oceano sopra il mare di Foreman e, per un attimo, ti manca l'idea di stare su qualcosa di solido.
        #JNSQscience_evaReport_KerbinInSpaceLowTriangulusSea_00 = Il mare del Triangolo sta sotto vortici di nubi in movimento. Registri strutture meteo turbolente e grande sicurezza nel nome triangolare.
        #JNSQscience_evaReport_KerbinInSpaceLowTriangulusSea_01 = Fai un'EVA sopra il mare del Triangolo e noti che da qui le onde sono invisibili, ma le tempeste no.
        #JNSQscience_evaReport_KerbinInSpaceLowNorthernSea_00 = Il mare settentrionale appare freddo e pieno di bande di nubi. Registri schemi meteo frizzanti e molta acqua aperta.
        #JNSQscience_evaReport_KerbinInSpaceLowNorthernSea_01 = Riferisci che il mare settentrionale sembra sempre di fretta. Le nubi sono d'accordo e continuano a muoversi.
        #JNSQscience_evaReport_KerbinInSpaceLowSub-ArcticSea_00 = Il mare sub-artico mostra un mix di acqua scura e ghiaccio sottile. Registri schemi di transizione e striature di nubi gelide.
        #JNSQscience_evaReport_KerbinInSpaceLowSub-ArcticSea_01 = Fluttui sopra il mare sub-artico e apprezzi che le regioni fredde siano più facili da ammirare da molto, molto lontano.
        #JNSQscience_evaReport_KerbinInSpaceLowEasternSea_00 = Il mare orientale giace sotto una foschia persistente. Registri umidità diffusa e un aspetto morbido e velato dall'orbita.
        #JNSQscience_evaReport_KerbinInSpaceLowEasternSea_01 = Registri lunghe strisce di copertura nuvolosa sopra il mare orientale e sospetti che stia nascondendo le onde apposta.
        #JNSQscience_evaReport_KerbinInSpaceLowWesternSea_00 = Il mare occidentale si distende sotto di te in un blu profondo. Registri acqua aperta a perdita d'occhio e ampi archi di nubi.
        #JNSQscience_evaReport_KerbinInSpaceLowWesternSea_01 = Fai un'EVA sopra il mare occidentale e decidi che "oceano infinito" è accurato e poco utile, quindi lo scrivi lo stesso.
        #JNSQscience_evaReport_KerbinInSpaceLowWelcomeBackIsland_00 = Da un'orbita bassa, l'Isola del Ritorno è un piccolo segno di punteggiatura luminoso nel mare. La saluti comunque.
        #JNSQscience_evaReport_KerbinInSpaceLowWelcomeBackIsland_01 = L'Isola del Ritorno è facile da individuare quando sai dove guardare. Registri "punti di riferimento familiari" e fai finta che sia oggettivo.
        #JNSQscience_evaReport_KerbinInSpaceLowWelcomeBackIsland_02 = Fluttui sopra l'Isola del Ritorno e la segni sulla mappa con un grande cerchio. Il Controllo Missione chiede se sia scientifico. Tu dici di sì.
        #JNSQscience_evaReport_MunSrfLandedLowlands_00 = I bassopiani sono più piatti di quanto ti aspettassi. Ogni impronta sembra un autografo permanente nella polvere grigia.
        #JNSQscience_evaReport_MunSrfLandedLowlands_01 = Tenti un saltello elegante attraverso la pianura. Mun risponde lasciandoti cadere lentamente e con estrema cortesia.
        #JNSQscience_evaReport_MunInSpaceLowLowlands_00 = Da quassù i bassopiani sembrano fuliggine versata tra creste più luminose. Li etichetti "facili da navigare" e speri che diventi vero.
        #JNSQscience_evaReport_MunInSpaceLowLowlands_01 = Provi a indicare dei punti di riferimento, ma è tutto un cratere. Ti accontenti di "la parte più liscia" e fai finta che aiuti.
        #JNSQscience_evaReport_MunSrfLandedExoticCraters_00 = Ti chiedi come quella roccia sia finita dentro la tua tuta. Dai la colpa al cratere, perché il cratere non può presentare reclami.
        #JNSQscience_evaReport_MunInSpaceLowRareCraters_00 = Questo cratere è stranamente ordinato e rotondo. Suggerisci un impatto quasi perfetto e speri che quelli dei calcoli restino impressionati.
        #JNSQscience_evaReport_MunInSpaceLowRareCraters_01 = C'è qualcosa nel bordo che sembra irregolare. Metti per iscritto una teoria molto scientifica: "Mun l'ha fatto apposta".
        #JNSQscience_evaReport_MunSrfLandedNotableCraters_00 = Due cicatrici sovrapposte nel terreno ti fanno chiedere cosa abbia colpito qui, e se fosse indeciso.
        #JNSQscience_evaReport_MunSrfLandedMountains_00 = Le montagne si alzano come denti frastagliati contro il cielo nero. Riferisci "ottima arrampicata", poi smetti subito di arrampicare.
        #JNSQscience_evaReport_MunSrfLandedMountains_01 = Ogni passo fa scivolare sassolini a valle al rallentatore. Decidi di restare immobile e chiamarla "scienza osservazionale".
        #JNSQscience_evaReport_MunInSpaceLowMountains_00 = Le creste proiettano ombre affilate come lame sui pendii. Le descrivi come "drammatiche" e "probabilmente intenzionate a farci inciampare".
        #JNSQscience_evaReport_MunInSpaceLowMountains_01 = Dall'orbita le montagne sembrano un foglio di stagnola grigia accartocciato. Raccomandi di atterrare da qualche parte più piatta, nell'interesse del "morale dell'equipaggio".
        #JNSQscience_evaReport_MinmusSrfLandedBrownBasins_00 = Il suolo qui ha una macchia più scura, come se qualcuno avesse versato qualcosa su Minmus. Eviti con cura di trascinarla dentro la cabina.
        #JNSQscience_evaReport_MinmusSrfLandedBrownBasins_01 = Il "marrone" nel bacino fa sembrare il posto meno un dessert e più un'etichetta di avvertimento. Prendi appunti lo stesso.
        #JNSQscience_evaReport_MinmusSrfLandedBrownLowlands_00 = Il terreno basso è più scuro e la polvere si attacca ostinatamente agli stivali. Valuti di chiamarla "polvere da stivali" e rivendicare la scoperta.
        #JNSQscience_evaReport_MinmusSrfLandedBrownLowlands_01 = La superficie scricchiola piano sotto i piedi, poi si assesta come se fosse imbarazzata. La tua tuta EVA ora ha un elegante profilo grigio marrone.
        #JNSQscience_evaReport_MinmusSrfLandedBrownMidlands_00 = Le pianure scorrono in dolci creste che cercano di farti inciampare a velocità da bassa gravità. Dichiari vittoria sul terreno dopo non essere caduto.
        #JNSQscience_evaReport_MinmusSrfLandedBrownMidlands_01 = Qui sul terreno c'è uno strano disegno chiazzato. Sospetti che Minmus stia provando la mimetica, ma male.
        #JNSQscience_evaReport_MinmusSrfLandedBrownHighlands_00 = Quassù, il terreno più scuro rende le ombre ancora più nette. Ti sembra di camminare su un palcoscenico illuminato male.
        #JNSQscience_evaReport_MinmusSrfLandedBrownHighlands_01 = Le colline sono più accidentate e la polvere è più sottile, ma trova comunque il modo di entrare in ogni giuntura. Ne saluti la dedizione.
        #JNSQscience_evaReport_MinmusInSpaceLowPoles_00 = I poli brillano intensamente sotto di te, quasi troppo per fissarli a lungo. Regoli la visiera e cerchi di non derivare mentre resti a bocca aperta.
        #JNSQscience_evaReport_MinmusInSpaceLowPoles_01 = Le ombre si allungano in linee lunghe e drammatiche sul terreno polare. Ti chiedi se Minmus stia cercando di sembrare misteriosa.
        #JNSQscience_evaReport_MinmusInSpaceLowMidlands_00 = Da quassù, le pianure sembrano glassa raggrinzita con qualche crepa. Confermi che il tuo jetpack sia ancora attaccato.
        #JNSQscience_evaReport_MinmusInSpaceLowMidlands_01 = La superficie sotto è un patchwork di creste e zone lisce. Il cervello insiste che sia la mappa di qualcosa di importante, ma non dice di cosa.
        #JNSQscience_evaReport_MinmusInSpaceLowBasins_00 = I bacini sotto sembrano enormi ciotole scavate nella superficie color menta. Per un attimo ti chiedi quanti snack ci starebbero dentro.
        #JNSQscience_evaReport_MinmusInSpaceLowBasins_01 = Ampie depressioni scorrono sotto di te, lisce e stranamente invitanti. Ti ricordi che "invitante" non è una misura scientifica.
        #JNSQscience_evaReport_MinmusInSpaceLowBrownLowlands_00 = I bassopiani sono più scuri e più maculati del previsto, spezzando il solito aspetto color menta. Ti senti un po' meno affamato.
        #JNSQscience_evaReport_MinmusInSpaceLowBrownLowlands_01 = Striature polverose e sbavature attraversano il terreno basso. Sospetti che Minmus stia scivolando in giro quando nessuno guarda.
        #JNSQscience_evaReport_MinmusInSpaceLowBrownMidlands_00 = Le pianure hanno dall'alto un tono smorzato e polveroso, come se il colore fosse stato abbassato. Ti chiedi se sia normale o solo Minmus che fa Minmus.
        #JNSQscience_evaReport_MinmusInSpaceLowBrownMidlands_01 = Guardi creste più scure scorrere sotto la nave e provi a trovare schemi. Il massimo che ottieni è "bitorzoluto".
        #JNSQscience_evaReport_MinmusInSpaceLowBrownHighlands_00 = Il terreno alto appare più duro e più scuro in alcuni punti, con linee nette tra luce e ombra. Sembra determinato a sembrare aspro.
        #JNSQscience_evaReport_MinmusInSpaceLowBrownHighlands_01 = Dall'orbita, le colline marroni ricordano una crosta troppo cotta su un mondo altrimenti piacevole. Aggiungi "non mangiare" al rapporto.
        #JNSQscience_evaReport_MinmusInSpaceLowMountains_00 = Le creste montuose sembrano allungarsi per afferrare la tua nave. Mantieni una distanza rispettosa e una presa ben salda.
        #JNSQscience_evaReport_MinmusInSpaceLowMountains_01 = Terreno frastagliato scorre sotto di te al rallentatore. Decidi che Minmus è più bella quando non può pungerti.
        #JNSQscience_evaReport_DunaSrfLandedRareCraters_00 = Un cratere solitario spezza le infinite pianure color ruggine. Percorri il bordo e inizi a scegliere dove dovrebbe andare il primo traliccio radio.
        #JNSQscience_evaReport_DunaSrfLandedRareCraters_01 = Dentro al cratere il vento cala, come se si fosse dimenticato di seguirti. Per un attimo sembra un piccolo rifugio di frontiera scavato nel pianeta.
        #JNSQscience_evaReport_DunaSrfLandedVoronoiCraters_00 = Il suolo è segnato da cavità ripetute come una lamiera stampata. Cerchi di non pensare a cosa possa rendere un pianeta così "organizzato".
        #JNSQscience_evaReport_DunaSrfLandedVoronoiCraters_01 = Ogni passo finisce su un altro bordo identico. Registri il terreno come "ottimo per le griglie" e "pessimo per dormire".
        #JNSQscience_evaReport_DunaSrfLandedNotableCraters_00 = Le pareti del cratere mostrano strati come una torta a fette di polvere rossa e roccia più scura. Prendi appunti e anche un prudente passo indietro.
        #JNSQscience_evaReport_DunaSrfLandedNotableCraters_01 = Urli e senti la voce tornare sottile e in ritardo. È un posto grande e vuoto... perfetto per la scienza, inquietante per i pionieri.
        #JNSQscience_evaReport_DunaSrfLandedExoticCraters_00 = Qui il fondo del cratere è più chiaro, come se il pianeta nascondesse qualcosa di freddo sotto la ruggine. La visiera si appanna per un secondo e tu diventi molto vigile.
        #JNSQscience_evaReport_DunaSrfLandedExoticCraters_01 = Ti inginocchi per raccogliere un campione e stride come graniglia ghiacciata. Lo segni come "risorse" e "rischio di scivolata".
        #JNSQscience_evaReport_DunaSrfLandedMountains_00 = Il pendio ti ruba l'aderenza e l'aria sottile ti ruba la pazienza. Vai avanti lo stesso, perché a questo servono i rapporti di frontiera.
        #JNSQscience_evaReport_DunaSrfLandedMountains_01 = Roccia scura spunta dalla polvere rossa come ossa. Ne raccogli un pezzo e immagini future trivelle che mordono dritto nella montagna.
        #JNSQscience_evaReport_DunaSrfLandedVolcano_00 = Il terreno diventa scuro e fratturato, come se il pianeta ricordasse un'epoca più calda. Batti sulla roccia e lei risponde con un suono vuoto e antico.
        #JNSQscience_evaReport_DunaSrfLandedVolcano_01 = La polvere rossa si aggrappa alla pietra nera in chiazze ostinate. Lo segni come possibile sito base: appoggio solido, buona copertura e un aspetto drammatico in foto.
        #JNSQscience_evaReport_DunaFlyingLowHighlands_00 = L'aria aiuta a malapena: ti reggi su getti e testardaggine. Le colline scorrono sotto di te come una natura selvaggia rossa in attesa della prima bandiera.
        #JNSQscience_evaReport_DunaFlyingLowMidlands_00 = Le pianure scorrono in infinite sfumature di arancione bruciato. Ti sorprendi a scegliere punti per strade, poi ricordi che sei ancora solo un puntino nel cielo.
        #JNSQscience_evaReport_DunaFlyingLowLowlands_00 = I bassopiani sembrano abbastanza piatti da costruirci una pista, se riesci a impedire alla polvere di divorare tutto. La frontiera è spalancata e del tutto spietata.
        #JNSQscience_evaReport_DunaFlyingLowCraters_00 = Da quassù i bordi dei crateri formano anelli scuri nella sabbia, cicatrici antiche impossibili da ignorare. Ti senti piccolo, poi ostinato, poi di nuovo piccolo.
        #JNSQscience_evaReport_DunaFlyingLowRareCraters_00 = Un cratere solitario spezza la monotonia come una promessa di riparo. Giri una volta e immagini un habitat nascosto dentro le pareti, al sicuro dagli umori del pianeta.
        #JNSQscience_evaReport_DunaFlyingLowVoronoiCraters_00 = Il terreno è costellato da un motivo ripetuto, come se il pianeta indossasse un'armatura. Ti viene un impulso primordiale di andartene, poi decidi che probabilmente va tutto bene.
        #JNSQscience_evaReport_DunaFlyingLowNotableCraters_00 = Il grande cratere sotto ha pareti stratificate e un fondo in ombra che sembra più profondo del dovuto. Quasi senti future trivelle masticare quelle giunture esposte.
        #JNSQscience_evaReport_DunaFlyingLowExoticCraters_00 = Una conca ghiacciata luccica contro il rosso come una ferita mai guarita. La segni come "scorte" e cerchi di non pensare a quanto sarà fredda da vicino.
        #JNSQscience_evaReport_DunaFlyingLowMountains_00 = Le cime scorrono così vicine da sembrare una cosa personale. Qualcosa in te vuole scalarle tutte, solo per dimostrare che questo pianeta non può tenersi le sue altezze.
        #JNSQscience_evaReport_DunaFlyingLowVolcano_00 = Roccia nera affiora dalla polvere rossa come ossa antiche. Ci passi sopra in silenzio, come se stessi leggendo il capitolo più vecchio e più duro del pianeta.
        #JNSQscience_evaReport_DunaInSpaceLowRareCraters_00 = Un cratere solitario sta nella ruggine come una cicatrice senza altre ferite vicine. Lo segni come futuro punto di riferimento, quello con cui i pionieri si orientano quando tutto il resto sembra uguale.
        #JNSQscience_evaReport_DunaInSpaceLowVoronoiCraters_00 = La superficie è pavimentata di cavità ripetute, come se al mondo fossero cresciute delle scaglie e poi avesse dimenticato perché. L'istinto sussurra "antico", mentre l'orologio di missione insiste "continua a osservare".
        #JNSQscience_evaReport_DunaInSpaceLowNotableCraters_00 = Il bordo del grande cratere proietta un'ombra abbastanza profonda da inghiottire il senso della scala. Da qui quasi distingui gli strati e ti chiedi cosa potrebbe estrarre una colonia da quella storia esposta.
        #JNSQscience_evaReport_DunaInSpaceLowExoticCraters_00 = Una chiazza luminosa e strana brilla dentro il cratere, rifiutandosi di essere della giusta tonalità di rosso. La etichetti come "depositi insoliti" e senti quel richiamo primordiale delle risorse, e l'altrettanto forte richiamo della prudenza.
        #JNSQscience_evaReport_DunaInSpaceLowMountains_00 = Catene frastagliate scorrono sotto di te come onde di roccia congelate. Qui fuori, con solo un jetpack e il vuoto, ti viene comunque voglia di scalarle, solo per dimostrare che puoi.
        #JNSQscience_evaReport_DunaInSpaceLowVolcano_00 = Terreno vulcanico scuro taglia la ruggine come vecchie bruciature mai guarite. Ci resti sospeso sopra e giureresti che il pianeta ricordi ancora il fuoco, in attesa del prossimo coraggioso errore che lo svegli.
        #JNSQscience_evaReport_IkeSrfLandedLowlands_00 = La polvere qui è così fine che prova ad attaccarsi alla tuta per pura determinazione. Lasci impronte nette che sembrano permanenti.
        #JNSQscience_evaReport_IkeSrfLandedLowlands_01 = Il terreno è abbastanza piatto da sembrare sospetto. Annota che "piatto" su Ike include comunque un sacco di rocce in agguato per le caviglie.
        #JNSQscience_evaReport_IkeSrfLandedMidlands_00 = Da qui la superficie alterna pendii dolci e improvvisi bordi craterici. Consigli di descriverla come "abbastanza sicura" solo a persone che non ti piacciono.
        #JNSQscience_evaReport_IkeSrfLandedMidlands_01 = Salti oltre una cresta e quasi scivoli in un campo di massi. Il rapporto è soprattutto un promemoria a smettere di festeggiare prima di atterrare.
        #JNSQscience_evaReport_IkeSrfLandedHighlands_00 = La vista è ampia: crateri, dorsali e Duna che incombe sopra come un gigantesco promemoria rosso. Ti prendi un momento per goderti il vuoto drammatico.
        #JNSQscience_evaReport_IkeSrfLandedHighlands_01 = Il terreno è ruvido e luminoso nella luce dura, con ombre abbastanza profonde da inghiottire un rover. Decidi di restare dal lato al sole.
        #JNSQscience_evaReport_IkeInSpaceLowLowlands_00 = Fluttuando fuori dal mezzo, guardi i bassopiani scorrere sotto di te come un livido polveroso. Ti chiedi se il suolo stia giudicando la tua orbita.
        #JNSQscience_evaReport_IkeInSpaceLowLowlands_01 = I dettagli della superficie sfrecciano più veloci di quanto il cervello riesca a etichettarli. Ci provi lo stesso e finisci con un sacco di appunti che dicono solo "cratere".
        #JNSQscience_evaReport_IkeInSpaceLowMidlands_00 = Le pianure da quassù sembrano ingannevolmente calme, finché la luce non prende una dorsale frastagliata. Aggiungi "non fidarti" alla mappa.
        #JNSQscience_evaReport_IkeInSpaceLowMidlands_01 = Ti indichi dei punti di riferimento per esercitarti nell'orientamento, poi ti rendi conto che tutto è un punto di riferimento. Il sistema organizzativo di Ike sembra essere "più buchi".
        #JNSQscience_evaReport_IkeInSpaceLowHighlands_00 = Le colline sono un labirinto di bordi luminosi e ombre nere. Riferisci che il contrasto è così netto da tagliare la fiducia.
        #JNSQscience_evaReport_IkeInSpaceLowHighlands_01 = Scivoli lungo la scala e fissi il terreno spezzato. È come guardare in un enorme vassoio di ghiaia che qualcuno ha scosso troppo forte.
        #JNSQscience_evaReport_IkeInSpaceHigh_00 = Da così lontano, Ike è un puntino scuro che scorta Duna attorno al sole. Saluti lo stesso, nel caso ricambi.
        #JNSQscience_evaReport_IkeInSpaceHigh_01 = Molto sopra la luna, tutto sembra piccolo tranne il vuoto. Archivi il rapporto come "spazioso, silenzioso e lievemente offensivo".
        #JNSQscience_evaReport_EdnaSrfLandedLowlands_00 = Scendi sui bassopiani e l'oscurità sembra abbastanza vicina da far inciampare.
        #JNSQscience_evaReport_EdnaSrfLandedLowlands_01 = Gli stivali scricchiolano piano: Edna risponde non facendo assolutamente nulla, con grande sicurezza.
        #JNSQscience_evaReport_EdnaSrfLandedMidlands_00 = Le pianure sembrano assemblate con rocce avanzate e una rigida politica del "niente calore".
        #JNSQscience_evaReport_EdnaSrfLandedMidlands_01 = Saluti l'orizzonte. L'orizzonte non saluta.
        #JNSQscience_evaReport_EdnaSrfLandedHighlands_00 = Quassù il terreno diventa più tagliente, come se Edna volesse essere più drammatica senza motivo.
        #JNSQscience_evaReport_EdnaSrfLandedHighlands_01 = Annota che le "colline" sono solo "bassopiani" con più occasioni di cadere con stile.
        #JNSQscience_evaReport_EdnaSrfLandedPolarIceCraters_00 = Le ombre dei crateri di ghiaccio polari inghiottono il fascio della tua lampada frontale come se non fosse mai stato tuo.
        #JNSQscience_evaReport_EdnaSrfLandedPolarIceCraters_01 = Il ghiaccio sembra antico e offeso. La tuta insiste perché tu smetta di fissarlo.
        #JNSQscience_evaReport_EdnaSrfLandedWhites_00 = Le chiazze chiare abbagliano attraverso la visiera, la cosa più luminosa su un mondo che preferisce il buio.
        #JNSQscience_evaReport_EdnaSrfLandedWhites_01 = Raccogli un po' del materiale biancastro e decidi che è brina oppure l'idea di Edna di decorazione.
        #JNSQscience_evaReport_EdnaInSpaceLowLowlands_00 = In EVA sopra i bassopiani, non riesci a capire dove finisca Edna e dove inizi il vuoto.
        #JNSQscience_evaReport_EdnaInSpaceLowLowlands_01 = I bassopiani scorrono sotto di te come una mappa scura con tutte le etichette cancellate.
        #JNSQscience_evaReport_EdnaInSpaceLowMidlands_00 = Da un'orbita bassa, le pianure sembrano rughe ruvide e gelide su un ciottolo grande quanto un pianeta.
        #JNSQscience_evaReport_EdnaInSpaceLowMidlands_01 = Provi a individuare punti di riferimento: Edna continua a spostare le ombre mentre passi.
        #JNSQscience_evaReport_EdnaInSpaceLowHighlands_00 = Le colline proiettano ombre lunghe e taglienti che rendono la superficie ancora meno accogliente.
        #JNSQscience_evaReport_EdnaInSpaceLowHighlands_01 = Riferisci "terreno frastagliato" e aggiungi che sembra frastagliato di proposito.
        #JNSQscience_evaReport_EdnaInSpaceLowPolarIceCraters_00 = La regione polare lampeggia chiara, poi sprofonda in pozzi neri che sembrano più profondi del dovuto.
        #JNSQscience_evaReport_EdnaInSpaceLowPolarIceCraters_01 = Scivoli sopra i crateri ghiacciati e capisci all'improvviso perché i caschi siano completamente sigillati.
        #JNSQscience_evaReport_EdnaInSpaceLowWhites_00 = I bianchi luminosi sotto sembrano gesso rovesciato su una lavagna che qualcuno si rifiuta di pulire.
        #JNSQscience_evaReport_EdnaInSpaceLowWhites_01 = Guardi le chiazze chiare scorrere e ti chiedi se Edna stia cercando di segnalare, ma male.
        #JNSQscience_evaReport_EdnaInSpaceHigh_00 = Da molto in alto, Edna è un puntino timido che sembra esercitarsi a sparire quando sbatti le palpebre.
        #JNSQscience_evaReport_EdnaInSpaceHigh_01 = Registri che Edna è scura, solitaria e sospettosamente brava a sembrare "niente di importante".
        #JNSQscience_evaReport_DakSrfLandedLowlands_00 = Scendi dalla scala con un salto e quasi manchi il suolo. Dak sembra più un suggerimento con consistenza rocciosa.
        #JNSQscience_evaReport_DakSrfLandedLowlands_01 = I bassopiani sono un campo confuso di detriti e ombre. Gli stivali non fanno rumore, ma giureresti che Dak stia ascoltando.
        #JNSQscience_evaReport_DakSrfLandedMidlands_00 = Ogni passo diventa un balzo al rallentatore. Cerchi di sembrare sicuro mentre la traiettoria sembra uno scarabocchio.
        #JNSQscience_evaReport_DakSrfLandedMidlands_01 = Le pianure sono fatte di spigoli vivi e polvere che deriva. La radio sibila piano, come se provasse a canticchiare.
        #JNSQscience_evaReport_DakSrfLandedHighlands_00 = Da quassù il cielo è quasi solo stelle e il terreno è quasi solo "non scivolare". Ti aggrappi all'idea dell'aderenza.
        #JNSQscience_evaReport_DakSrfLandedHighlands_01 = Le colline hanno un richiamo strano che non è gravità. Ricontrolli il cavo e ti dici che sono solo nervi.
        #JNSQscience_evaReport_DakInSpaceLowLowlands_00 = Fluttuando fuori dalla nave, guardi i bassopiani strisciare sotto di te. Orbitare così vicino attorno a una patata sembra barare.
        #JNSQscience_evaReport_DakInSpaceLowLowlands_01 = Dak ruota pigramente sotto i tuoi stivali. Il terreno scorre in silenzio, quasi invitandoti a scendere e seguirlo.
        #JNSQscience_evaReport_DakInSpaceLowMidlands_00 = Scivoli lungo lo scafo e guardi in basso le rupi delle pianure. È difficile capire dove finisca "su" e dove inizi "Dak".
        #JNSQscience_evaReport_DakInSpaceLowMidlands_01 = Le pianure passano sotto come un labirinto che ruota. Ti sorprendi a fissarlo troppo a lungo, come se potesse sussurrare istruzioni.
        #JNSQscience_evaReport_DakInSpaceLowHighlands_00 = Le colline sembrano abbastanza vicine da poterle prendere a calci. Decidi di non verificare la teoria.
        #JNSQscience_evaReport_DakInSpaceLowHighlands_01 = A questa quota, le colline sono dorsali scure contro uno spazio ancora più scuro. Senti un richiamo ad andare più giù e lo ignori con decisione.
        #JNSQscience_evaReport_DakInSpaceHigh_00 = Quassù Dak è un puntino minuscolo con una presenza enorme. Registri che il suo "canto di sirena" è probabilmente solo immaginazione.
        #JNSQscience_evaReport_DakInSpaceHigh_01 = Dak si vede appena, eppure ti senti stranamente osservato. Termini l'EVA prima che vinca la curiosità.
        #JNSQscience_evaReport_DresSrfLandedPoles_00 = Il sole resta basso e ogni sassolino proietta un'ombra drammatica. Salti sul posto e il silenzio salta con te.
        #JNSQscience_evaReport_DresSrfLandedPoles_01 = Gli stivali stridono sulla polvere soffice che sembra intatta da sempre. Lasci un'impronta e ti senti subito giudicato dalla storia.
        #JNSQscience_evaReport_DresSrfLandedHighlands_00 = Il terreno è fatto di creste taglienti e rocce ostinate, come se Dres cercasse di sembrare impegnato. Le tue ginocchia presentano un reclamo al Controllo Missione.
        #JNSQscience_evaReport_DresSrfLandedHighlands_01 = Da quassù vedi quanto questo mondo sia davvero pallido e solitario. Saluti lo stesso, nel caso qualcuno stia guardando dal nulla.
        #JNSQscience_evaReport_DresSrfLandedMidlands_00 = Le pianure si stendono in ogni direzione con pochissimo entusiasmo. Fai un passo lungo e fluttuante e lo chiami "lavoro sul campo".
        #JNSQscience_evaReport_DresSrfLandedMidlands_01 = La polvere sbuffa attorno agli stivali e si prende tutto il tempo per posarsi. Narri l'azione nel rapporto, perché il paesaggio non lo farà.
        #JNSQscience_evaReport_DresInSpaceLowPoles_00 = Scivoli sopra il polo di Dres, guardando la luce svanire in ombre lunghe e nette. La superficie sembra trattenere il respiro.
        #JNSQscience_evaReport_DresInSpaceLowPoles_01 = Da quassù il terreno polare è fatto di contrasti duri e silenzio. La visiera si appanna un po' mentre cerchi di sembrare impressionato.
        #JNSQscience_evaReport_DresInSpaceLowHighlands_00 = Fluttui sopra le colline e vedi creste interminabili e cime malconce. È come se il pianeta avesse provato a incresparsi per risultare rilevante.
        #JNSQscience_evaReport_DresInSpaceLowHighlands_01 = Il terreno alto appare ruvido, fratturato e ostinatamente antico. Prendi appunti mentre ruoti piano come un satellite confuso.
        #JNSQscience_evaReport_DresInSpaceLowMidlands_00 = Le pianure scorrono in una parata costante di grigio. Il Controllo Missione chiede cosa vedi: rispondi: "Altro grigio, ma diverso".
        #JNSQscience_evaReport_DresInSpaceLowMidlands_01 = Orbiti sopra un terreno che non sa decidere se essere interessante. Il rapporto contiene diversi sinonimi di "polveroso".
        #JNSQscience_evaReport_DresInSpaceLowLowlands_00 = Dall'orbita i bassopiani sembrano più lisci, come se qualcuno avesse provato a spazzare i crateri in mucchi ordinati. Non ci è riuscito.
        #JNSQscience_evaReport_DresInSpaceLowLowlands_01 = In EVA riesci a seguire deboli bacini e vecchie cicatrici sotto la polvere. Per un attimo ti chiedi se Dres stia cercando di sfuggire all'attenzione.
        #JNSQscience_evaReport_DresInSpaceLowCanyon_00 = Il canyon taglia la superficie come un graffio su un casco ben consumato. Anche dall'orbita sembra irragionevolmente profondo.
        #JNSQscience_evaReport_DresInSpaceLowCanyon_01 = Scivoli sopra il canyon e ti viene la sensazione inquietante che stia ricambiando lo sguardo. Tiri il cavo due volte, giusto per essere sicuro che ci sia ancora.
        #JNSQscience_evaReport_JoolFlyingLowEquatorialBands_00 = La tuta si pente subito di questa decisione. Il vento ti sbatte attraverso un confine invisibile e le bande si scambiano di posto sotto i tuoi stivali.
        #JNSQscience_evaReport_JoolFlyingLowEquatorialBands_01 = La turbolenza arriva a strisce: calma, poi violenta, poi di nuovo calma. Stai iniziando a capire perché queste bande restino così nettamente separate.
        #JNSQscience_evaReport_JoolInSpaceLowEquatorialBands_00 = Da un'orbita bassa, le bande equatoriali sembrano nastri trasportatori veloci avvolti attorno al pianeta. Quasi vedi dove iniziano le linee di taglio.
        #JNSQscience_evaReport_JoolInSpaceLowEquatorialBands_01 = Le bande scorrono l'una rispetto all'altra a velocità diverse e ti rendi conto che il "meteo" può essere una macchina grande quanto un emisfero.
        #JNSQscience_evaReport_JoolFlyingLowSubpolarBands_00 = Qui l'aria si muove in onde ampie e pesanti invece che con colpi secchi. Fluttui tra strati di nubi che sembrano scambiarsi di posto molto lentamente.
        #JNSQscience_evaReport_JoolFlyingLowSubpolarBands_01 = La tuta indica gas più freddo e pressione più alta e lo senti in ogni guarnizione. La circolazione del pianeta sta facendo un lavoro enorme e silenzioso.
        #JNSQscience_evaReport_JoolInSpaceLowSubpolarBands_00 = In orbita sopra le bande subpolari, le texture delle nubi si allungano in ampie curve che suggeriscono enormi celle di circolazione.
        #JNSQscience_evaReport_JoolInSpaceLowSubpolarBands_01 = Qui il confine tra le bande è più morbido, ma si estende per centinaia di chilometri. Annota che anche il "subdolo" può essere gigantesco.
        #JNSQscience_evaReport_JoolFlyingLowExposedLowerDeck_00 = La foschia si assottiglia e la vista sprofonda in strati più scuri sotto. Gli allarmi di pressione della tuta diventano molto entusiasti, molto in fretta.
        #JNSQscience_evaReport_JoolFlyingLowExposedLowerDeck_01 = Con meno nubi alte a fare da filtro, l'aria sembra più densa e più cattiva. Tieni il jetpack puntato "su" per puro istinto.
        #JNSQscience_evaReport_JoolInSpaceLowExposedLowerDeck_00 = Da un'orbita bassa, questa regione sembra come se qualcuno avesse sollevato uno strato di nubi e si fosse dimenticato di rimetterlo a posto. Si vedono schemi di circolazione più scuri.
        #JNSQscience_evaReport_JoolInSpaceLowExposedLowerDeck_01 = I bordi dell'"apertura" si spostano e si arricciano, suggerendo che i livelli inferiori stiano sempre cercando di richiudere il varco.
        #JNSQscience_evaReport_JoolFlyingLowNorthPole_00 = Tutto gira. Le nubi spiralano sotto di te come uno scarico che si è dimenticato di non avere un fondo.
        #JNSQscience_evaReport_JoolFlyingLowNorthPole_01 = Il movimento è fluido finché una raffica improvvisa non prova a farti ruotare a capofitto. Presenti un secondo reclamo, più forte.
        #JNSQscience_evaReport_JoolInSpaceLowNorthPole_00 = Dall'orbita il vortice polare è un ricciolo perfetto, una tempesta con la pazienza di un pianeta. Lo guardi ruotare e ti sembra di essere ricambiato.
        #JNSQscience_evaReport_JoolInSpaceLowNorthPole_01 = Sottili nubi alte tracciano cerchi stretti attorno al polo, segnando i confini del vortice come vernice di avvertimento.
        #JNSQscience_evaReport_JoolFlyingLowSouthPole_00 = La spirale meridionale è più stretta e più aggressiva e il vento cambia direzione più in fretta di quanto il tuo jetpack riesca a protestare.
        #JNSQscience_evaReport_JoolFlyingLowSouthPole_01 = La visibilità arriva in tende di nubi che ruotano. Tieni una mano sulla scala e l'altra sulla dignità.
        #JNSQscience_evaReport_JoolInSpaceLowSouthPole_00 = Dall'orbita, la circolazione del polo sud sembra una treccia avvolta, che si stringe e si allenta di continuo.
        #JNSQscience_evaReport_JoolInSpaceLowSouthPole_01 = Striature luminose in alta quota avvolgono il vortice come una fasciatura. Sospetti che il pianeta non stia guarendo.
        #JNSQscience_evaReport_JoolFlyingLowStormComplex_00 = Le torri della tempesta ti circondano e le correnti ascensionali provano a promuoverti nella stratosfera senza pratiche.
        #JNSQscience_evaReport_JoolFlyingLowStormComplex_01 = Scorgi lampi nelle profondità delle nubi e decidi di smettere di essere l'oggetto conduttivo più alto della zona.
        #JNSQscience_evaReport_JoolInSpaceLowStormComplex_00 = Da un'orbita bassa, il complesso di tempeste è un livido enorme nel manto nuvoloso, con torri luminose e nuclei scuri.
        #JNSQscience_evaReport_JoolInSpaceLowStormComplex_01 = I bordi della tempesta increspano e si ripiegano mentre nuove celle salgono e quelle vecchie collassano. Annota che sta crescendo in tutte le direzioni sbagliate.
        #JNSQscience_evaReport_LaytheSrfLandedShallows_00 = Metti piede su un banco di sabbia umido e ti penti subito di non avere stivali più alti. L'acqua prova continuamente a riprendersi le tue impronte.
        #JNSQscience_evaReport_LaytheSrfLandedShallows_01 = Il mare lambisce il bordo della terra come se chiedesse educatamente di entrare. Decidi di tenere breve il tuo tempo "all'aperto".
        #JNSQscience_evaReport_LaytheSrfLandedHighlands_00 = Il vento quassù è tagliente ed entusiasta. Registri la vista, poi ti aggrappi a qualcosa che sembri affidabile.
        #JNSQscience_evaReport_LaytheSrfLandedHighlands_01 = Da questa altezza la costa sembra calma e invitante, cosa sospetta. Annota la quota e la tua improvvisa gratitudine per i corrimani.
        #JNSQscience_evaReport_LaytheSrfLandedMountains_00 = Il terreno è roccia, pendenza e angoli poco collaborativi. Registri che lo scenario è stupendo e che la scelta d'atterraggio è stata audace.
        #JNSQscience_evaReport_LaytheSrfLandedMountains_01 = L'aria sembra sottile nei sistemi della tuta e ogni passo su pietra nuda suona forte. Scatti una foto ed eviti di guardare in basso.
        #JNSQscience_evaReport_LaytheSrfLandedIceCaps_00 = Tutto è accecantemente luminoso e dolorosamente freddo. Riferisci che il ghiaccio è solido, il vento no, e che le dita dei piedi hanno presentato un reclamo.
        #JNSQscience_evaReport_LaytheSrfLandedIceCaps_01 = Il terreno gelato scricchiola sotto gli stivali in modo molto ufficiale. Annota la temperatura e ti chiedi come facciano i mari vicini a restare liquidi.
        #JNSQscience_evaReport_LaytheSrfLandedEnclosedFaults_00 = Il terreno è spaccato in profonde crepe che inghiottono le ombre. Registri le fratture e tieni i salti rigorosamente teorici.
        #JNSQscience_evaReport_LaytheSrfLandedEnclosedFaults_01 = L'aria nelle spaccature sembra umida e ferma, come se il pianeta trattenesse il respiro. Decidi di non verificare cosa ci sia in fondo.
        #JNSQscience_evaReport_LaytheSrfLandedLowlands_00 = Nebbia calda si attacca alla visiera e trasforma l'orizzonte in una macchia. Riferisci "alta umidità" e "bassa fiducia nel terreno".
        #JNSQscience_evaReport_LaytheSrfLandedLowlands_01 = Il suolo sembra abbastanza morbido da mangiare le gambe d'atterraggio a colazione. Fai un passo cauto e pianifichi subito una ritirata altrettanto cauta.
        #JNSQscience_evaReport_LaytheSrfLandedMidlands_00 = Terreno ondulato si estende in ogni direzione senza una chiara direzione "migliore". Registri il paesaggio e scegli comunque il percorso che sembra più piatto.
        #JNSQscience_evaReport_LaytheSrfLandedMidlands_01 = Per una volta l'aria è calma, e questo ti fa notare quanto siano rumorose le pompe della tuta. Riferisci condizioni stabili e lieve inquietudine.
        #JNSQscience_evaReport_LaytheSrfSplashedShores_00 = Galleggi vicino alla costa, abbastanza vicino da sentire sentore di terra e abbastanza lontano da sentirti insultato da essa. Registri un'osservazione: "L'acqua è ancora bagnata".
        #JNSQscience_evaReport_LaytheSrfSplashedShores_01 = Le onde continuano a spingerti verso la spiaggia e poi a tirarti di nuovo al largo. Registri il movimento e aggiungi "barca" alla lista della spesa.
        #JNSQscience_evaReport_LaytheSrfSplashedShallows_00 = Riesci quasi a stare in piedi, e questo rende l'acqua ancora più determinata a farti inciampare. Registri la profondità come "livello caviglia a orgoglio".
        #JNSQscience_evaReport_LaytheSrfSplashedShallows_01 = Il fondo è visibile e spiacevolmente irregolare. Riferisci chiarezza eccellente e appoggio pessimo.
        #JNSQscience_evaReport_LaytheSrfSplashedInlandWater_00 = Qui l'acqua è più calma, riparata dai mari aperti. Prendi appunti cercando di non derivare verso qualcosa di imbarazzante.
        #JNSQscience_evaReport_LaytheSrfSplashedInlandWater_01 = Le increspature si allargano in anelli ordinati a ogni tuo movimento. Riferisci bassa onda e alta umidità della tuta.
        #JNSQscience_evaReport_LaytheSrfSplashedKrenwichSea_00 = L'acqua aperta si muove in lunghe ondulate che fanno litigare lo stomaco con il casco. Registri lo stato del mare e rimetti in discussione ogni scelta di vita.
        #JNSQscience_evaReport_LaytheSrfSplashedKrenwichSea_01 = Le onde sferzano la tuta con una forza sorprendente per una luna così bella. Riferisci venti forti e un urgente desiderio di riva.
        #JNSQscience_evaReport_LaytheSrfSplashedArcticSea_00 = L'acqua è così fredda che la senti attraverso la tuta, cosa che sembra ingiusta. Registri la temperatura e tieni tutti i riscaldatori al massimo.
        #JNSQscience_evaReport_LaytheSrfSplashedArcticSea_01 = Una fanghiglia sottile fluttua accanto a te come se fosse di casa. Riferisci presenza di ghiaccio e rifiuti di identificarlo più da vicino.
        #JNSQscience_evaReport_LaytheSrfSplashedJoolwardSea_00 = Il gigante verde domina il cielo e tinge le onde di un colore strano. Registri il riflesso e cerchi di non ricambiare lo sguardo.
        #JNSQscience_evaReport_LaytheSrfSplashedJoolwardSea_01 = Gli spruzzi ricoprono la visiera mentre Jool resta sospeso sopra come un pubblico. Riferisci mare mosso e un'inattesa paura da palcoscenico.
        #JNSQscience_evaReport_LaytheSrfSplashedPolwardSea_00 = Qui l'aria morde di più e il moto ondoso sembra più cattivo. Registri condizioni polari e tieni corto il cavo di sicurezza.
        #JNSQscience_evaReport_LaytheSrfSplashedPolwardSea_01 = L'orizzonte è una sfocatura di acqua grigia e terra pallida sotto una foschia bassa. Riferisci visibilità ridotta e brontolii aumentati.
        #JNSQscience_evaReport_LaytheSrfSplashedEnclosedFaults_00 = Sembra che tu sia ammarato dentro un bacino fratturato con pareti ripide tutt'attorno. Riferisci "opzioni di uscita limitate" e "molti echi".
        #JNSQscience_evaReport_LaytheSrfSplashedEnclosedFaults_01 = L'acqua lambisce la roccia frastagliata come se stesse allargando lentamente le crepe. Registri erosione attiva e resti ben lontano dai bordi.
        #JNSQscience_evaReport_LaytheFlyingLowShallows_00 = Restare fuori nell'aria umida fa sentire la tua tuta come una vela costosissima. Riferisci acqua limpida sotto e vento poco collaborativo sopra.
        #JNSQscience_evaReport_LaytheFlyingLowShallows_01 = La luce solare lampeggia sulle secche in lastre luminose, rendendo difficile stimare le distanze. Registri condizioni di abbagliamento e tieni una presa salda.
        #JNSQscience_evaReport_LaytheFlyingLowInlandWater_00 = Il lago sotto è uno specchio tra forme di terreno più scure. Riferisci aria più calma e la sensazione inquietante di volare sopra "un posto piacevole".
        #JNSQscience_evaReport_LaytheFlyingLowInlandWater_01 = L'aria umida fa goccioline sulla tuta e prova ad appannarti la visiera. Registri condensa e decidi che l'interno era sottovalutato.
        #JNSQscience_evaReport_LaytheFlyingLowKrenwichSea_00 = Le onde sotto marciano in lunghe linee mentre il vento prova a staccarti dalla scala. Riferisci flusso d'aria costante e comfort pessimo.
        #JNSQscience_evaReport_LaytheFlyingLowKrenwichSea_01 = La salsedine resta sospesa vicino alla superficie e rende tutto velato. Registri perdita di visibilità e non assaggi niente.
        #JNSQscience_evaReport_LaytheFlyingLowArcticSea_00 = L'aria diventa più fredda e più pesante e il gelo sembra infiltrarsi nei pensieri. Riferisci turbolenza polare e un urgente desiderio di snack caldi.
        #JNSQscience_evaReport_LaytheFlyingLowArcticSea_01 = Foschia bassa impasta il confine tra mare e cielo. Registri dipendenza dagli strumenti e tieni gli stivali puntati verso l'interno.
        #JNSQscience_evaReport_LaytheFlyingLowJoolwardSea_00 = Il cielo ha una lieve tinta verde e Jool ne riempie una quantità davvero irragionevole. Riferisci la vista e fai finta che non stia osservando.
        #JNSQscience_evaReport_LaytheFlyingLowJoolwardSea_01 = Strati d'aria tremolano sopra l'acqua aperta, facendo ondeggiare l'orizzonte. Registri taglio del vento e stringi ogni cinghia a portata di mano.
        #JNSQscience_evaReport_LaytheFlyingLowPolwardSea_00 = Raffiche ti colpiscono come se avessero opinioni personali sulla missione. Riferisci aria turbolenta e un nuovo rispetto per le cinture.
        #JNSQscience_evaReport_LaytheFlyingLowPolwardSea_01 = Il mare sotto è scuro e increspato, in linea con l'umore del meteo. Registri venti forti e tieni il casco ben sigillato.
        #JNSQscience_evaReport_LaytheFlyingLowHighlands_00 = Aria in risalita dal terreno alto ti sballotta con una sicurezza maleducata. Riferisci forti correnti ascensionali e terreno ostinato.
        #JNSQscience_evaReport_LaytheFlyingLowHighlands_01 = La terra sale verso di te con lentezza drammatica. Registri il cambio di quota ed eviti di scoprire quanto possa diventare drammatica.
        #JNSQscience_evaReport_LaytheFlyingLowMountains_00 = La portanza di cresta diventa correnti discendenti senza preavviso, solo per restare interessante. Riferisci flusso turbolento e rifiuti di goderti il panorama.
        #JNSQscience_evaReport_LaytheFlyingLowMountains_01 = Le cime sfrecciano sotto i tuoi piedi, abbastanza taglienti da sembrare offese. Registri la topografia e tieni entrambe le mani su qualcosa di solido.
        #JNSQscience_evaReport_LaytheFlyingLowIceCaps_00 = Il ghiaccio luminoso sotto di te trasforma il mondo in una macchia abbagliante. Riferisci problemi di visibilità e un forte desiderio di visiere oscurate.
        #JNSQscience_evaReport_LaytheFlyingLowIceCaps_01 = Sacche d'aria fredda compaiono dal nulla e strattonano il mezzo. Registri l'instabilità e riduci al minimo i movimenti.
        #JNSQscience_evaReport_LaytheFlyingLowEnclosedFaults_00 = Crepe scure tagliano il paesaggio come se qualcuno avesse scarabocchiato sul terreno. Riferisci navigazione difficile e prospettive d'atterraggio per nulla invitanti.
        #JNSQscience_evaReport_LaytheFlyingLowEnclosedFaults_01 = Il flusso d'aria sopra il terreno spezzato produce sobbalzi improvvisi e spinte laterali. Registri turbolenza caotica e ti tieni più stretto.
        #JNSQscience_evaReport_LaytheFlyingLowLowlands_00 = La foschia resta attaccata al suolo e fa sembrare la quota un semplice suggerimento. Riferisci scarsa visibilità e ottime ragioni per restare più in alto.
        #JNSQscience_evaReport_LaytheFlyingLowLowlands_01 = Aria calda e umida preme contro la tuta e prova ad appannare tutto. Registri condizioni appiccicose e rivaluti le attività all'esterno.
        #JNSQscience_evaReport_LaytheFlyingLowMidlands_00 = Il terreno sotto alterna dolci rialzi e bacini poco profondi, senza decidersi per una forma. Riferisci aria stabile con sorprese occasionali.
        #JNSQscience_evaReport_LaytheFlyingLowMidlands_01 = Chiazze di nubi sottili scorrono accanto al casco mentre il suolo scorre come una mappa. Registri condizioni discrete e lieve capogiro.
        #JNSQscience_evaReport_LaytheInSpaceLowShallows_00 = Dall'orbita, le secche delineano le coste in bande chiare come se qualcuno le avesse tracciate con cura. Riferisci acqua limpida e un improvviso impulso ad andare "solo un po' più giù".
        #JNSQscience_evaReport_LaytheInSpaceLowShallows_01 = Il sole luccica sulle zone basse in lampi netti che fanno sembrare il mare metallico. Registri variazioni di albedo e sbatti le palpebre spesso.
        #JNSQscience_evaReport_LaytheInSpaceLowInlandWater_00 = Le acque interne appaiono calme e scure, ben incorniciate dalla terra. Riferisci bacini distinti e una scena sospettosamente invitante.
        #JNSQscience_evaReport_LaytheInSpaceLowInlandWater_01 = Sottili nubi scorrono sui laghi come pennellate pigre. Registri copertura parziale e cerchi di non fantasticare sul nuoto.
        #JNSQscience_evaReport_LaytheInSpaceLowKrenwichSea_00 = Il mare aperto sotto mostra lunghi motivi d'onda che si estendono per chilometri. Riferisci venti forti e un oceano che si rifiuta di stare fermo.
        #JNSQscience_evaReport_LaytheInSpaceLowKrenwichSea_01 = La luce solare corre sull'acqua in chiazze mobili. Registri rugosità della superficie e decidi che è una buona giornata per restare in orbita.
        #JNSQscience_evaReport_LaytheInSpaceLowArcticSea_00 = Vicino alle acque più fredde, foschia e striature chiare si accumulano al bordo del ghiaccio. Riferisci un confine netto e un pianeta dall'aspetto gelidissimo.
        #JNSQscience_evaReport_LaytheInSpaceLowArcticSea_01 = L'aria polare sembra più carica di nubi e bruma, ammorbidendo tutto in gradienti. Registri contrasto ridotto e maggiore apprezzamento per i riscaldatori.
        #JNSQscience_evaReport_LaytheInSpaceLowJoolwardSea_00 = Il bagliore di Jool colora l'atmosfera e il mare sottostante, come se l'intera luna fosse sotto una lampada verde. Riferisci illuminazione insolita e ti rifiuti di definirla "carina".
        #JNSQscience_evaReport_LaytheInSpaceLowJoolwardSea_01 = L'oceano riflette Jool in chiazze spezzate e tremolanti attraverso la sottile copertura nuvolosa. Registri i riflessi e cerchi di non sentirti piccolo.
        #JNSQscience_evaReport_LaytheInSpaceLowPolwardSea_00 = Il mare si scurisce verso i poli e le bande meteo impastano i dettagli della superficie. Riferisci condizioni più dure e un'atmosfera molto attiva.
        #JNSQscience_evaReport_LaytheInSpaceLowPolwardSea_01 = Riesci a vedere la trama dell'acqua guidata dal vento anche da qui. Registri schemi di superficie e stringi il cavo per istinto.
        #JNSQscience_evaReport_LaytheInSpaceLowHighlands_00 = Le creste delle colline proiettano ombre lunghe che rendono il terreno più tagliente di quanto probabilmente sia. Riferisci forte rilievo e un luogo eccellente per non cadere.
        #JNSQscience_evaReport_LaytheInSpaceLowHighlands_01 = Sottili nubi si impigliano sul terreno più alto e si allungano in filamenti. Registri indicatori di flusso d'aria e lasci la fotocamera accesa.
        #JNSQscience_evaReport_LaytheInSpaceLowMountains_00 = Le montagne perforano il paesaggio in linee frastagliate quasi troppo drammatiche per essere naturali. Riferisci topografia estrema e un forte "no".
        #JNSQscience_evaReport_LaytheInSpaceLowMountains_01 = Le ombre si raccolgono nelle valli mentre le cime prendono il sole. Registri il contrasto e immagini cosa farebbe quella vista a una traiettoria d'atterraggio.
        #JNSQscience_evaReport_LaytheInSpaceLowIceCaps_00 = Le calotte polari brillano così tanto da far sembrare il resto della luna fioco. Riferisci alta riflettività e ti chiedi come faccia qualcosa a sopravvivere laggiù.
        #JNSQscience_evaReport_LaytheInSpaceLowIceCaps_01 = Ampie distese di ghiaccio chiaro stanno sotto sottili nubi come un coperchio sui poli. Registri la copertura e ti senti gelare solo a guardarle.
        #JNSQscience_evaReport_LaytheInSpaceLowEnclosedFaults_00 = Fratture scure si incrociano sulla superficie, alcune abbastanza larghe da notarsi anche attraverso la foschia. Riferisci fessurazione estesa e possibile stress mareale.
        #JNSQscience_evaReport_LaytheInSpaceLowEnclosedFaults_01 = Le regioni fratturate formano linee nette che ignorano il terreno circostante. Registri la geometria e decidi di tenere gli stivali ben lontani.
        #JNSQscience_evaReport_LaytheInSpaceLowLowlands_00 = I bassopiani appaiono morbidi e sfumati sotto una coperta di foschia. Riferisci umidità elevata e un terreno che nasconde i propri dettagli.
        #JNSQscience_evaReport_LaytheInSpaceLowLowlands_01 = Ombre di nubi scorrono su distese piatte, facendo sembrare che il suolo si muova. Registri attività atmosferica e resisti alla tentazione di dare nomi alle forme.
        #JNSQscience_evaReport_LaytheInSpaceLowMidlands_00 = Le pianure mostrano un mosaico di texture gentili tra gli estremi di ghiaccio e mare. Riferisci rilievo moderato e variabilità diffusa.
        #JNSQscience_evaReport_LaytheInSpaceLowMidlands_01 = Leggere bande di nubi scorrono sul terreno senza coprirlo del tutto. Registri visibilità parziale e un momento di calma in un sistema per nulla calmo.
        #JNSQscience_evaReport_VallSrfLandedMountains_00 = La cresta sotto i tuoi stivali è una scalinata congelata: ogni scricchiolio sembra viaggiare per chilometri.
        #JNSQscience_evaReport_VallInSpaceLowPoles_00 = Il ghiaccio polare abbaglia come uno specchio di segnalazione. Strizzi gli occhi eroicamente alla scienza.
        #JNSQscience_evaReport_VallInSpaceLowMidlands_00 = Le pianure sembrano cucite da pallide linee di frattura, come se Vall stesse cercando di richiudersi a zip.
        #JNSQscience_evaReport_VallInSpaceLowLowlands_00 = I bassopiani sono più scuri e più lisci, come se lì fosse scivolato qualcosa e poi, preso dal panico, si fosse congelato.
        #JNSQscience_evaReport_VallInSpaceLowMountains_00 = Le dorsali montuose proiettano ombre sottili come lame. Valuti per un attimo di salire un po' più in alto in segno di rispetto.
        #JNSQscience_evaReport_TyloSrfLandedPoles_00 = Il terreno è pallido e dolorosamente silenzioso. Una lieve foschia fredda resta attaccata all'orizzonte come se avesse dimenticato come andarsene.
        #JNSQscience_evaReport_TyloSrfLandedMountains_00 = Le cime incombono sopra di te in creste affilate e polverose. Fai un passo e ti sembra di poter saltellare nei guai per sbaglio.
        #JNSQscience_evaReport_TyloSrfLandedHighlands_00 = Alture spezzate si estendono in ogni direzione, tra roccia scalfita e polvere fine. Le tue impronte sembrano permanenti.
        #JNSQscience_evaReport_TyloSrfLandedMidlands_00 = I crateri si sovrappongono come se qualcuno continuasse a lasciare lo stesso problema nello stesso posto. Il contatore di radiazioni della tuta sembra impaziente.
        #JNSQscience_evaReport_TyloSrfLandedLowlands_00 = I bassopiani sono più lisci, più scuri e stranamente invitanti. Dai comunque un calcio alla polvere, giusto per dimostrare che è ancora ostile.
        #JNSQscience_evaReport_TyloFlyingLowPoles_00 = Il tuo jetpack smuove un sussurro d'aria che si arrende subito. Sotto, le calotte chiare scorrono come una pagina bianca.
        #JNSQscience_evaReport_TyloFlyingLowMountains_00 = L'aria sottile conta a malapena come aria, ma le montagne ti salgono addosso lo stesso. Decidi di fidarti un po' meno del jetpack.
        #JNSQscience_evaReport_TyloFlyingLowHighlands_00 = Scivoli in una traccia fredda di atmosfera mentre la polvere resta pigramente dietro i tuoi stivali. Il "vento" di Tylo sembra quasi teorico.
        #JNSQscience_evaReport_TyloFlyingLowMidlands_00 = I crateri sotto formano una mappa di ombre bitorzoluta. La tuta rileva un accenno di azoto e un sacco di "tieni il casco".
        #JNSQscience_evaReport_TyloFlyingLowLowlands_00 = Sopra i bacini, la foschia sembra appena più spessa, finché non controlli i numeri. Tylo resta poco impressionato dal tuo ottimismo.
        #JNSQscience_evaReport_TyloInSpaceLowPoles_00 = Da appena sopra, il terreno polare brilla piatto e senza dettagli finché un bordo craterico non prende la luce. È un tipo di desolazione molto ordinato.
        #JNSQscience_evaReport_TyloInSpaceLowMountains_00 = La catena montuosa taglia ombre lunghe e dure sulla superficie. Quasi senti il freddo attraverso il guanto.
        #JNSQscience_evaReport_TyloInSpaceLowHighlands_00 = Le texture delle alture sfumano in vortici polverosi e cicatrici sparse. L'orizzonte è troppo nitido per sentirsi tranquilli.
        #JNSQscience_evaReport_TyloInSpaceLowMidlands_00 = Le pianure sono una fitta trapunta di impatti, cucita da deboli raggi di ejecta. Ti chiedi cosa abbia fatto Tylo per meritarselo.
        #JNSQscience_evaReport_TyloInSpaceLowLowlands_00 = Ampi bacini bassi raccolgono oscurità e polvere, con bordi come ciotole poco profonde. Da qui sembra più calmo, cosa sospetta.
        #JNSQscience_evaReport_TyloFlyingHigh_00 = Gli ultimi indizi di atmosfera si assottigliano fino a nulla, ma il tuo jetpack insiste nel fare rumore. Tylo non dà spiegazioni.
        #JNSQscience_evaReport_TyloInSpaceHigh_00 = Tylo si riduce a una moneta pallida sotto di te mentre Jool incombe lì vicino. Il cielo sembra affollato, come se fosse pieno di discussioni invisibili.
        #JNSQscience_evaReport_BopInSpaceLowPoles_00 = Sopra i poli, Bop sembra cercare di nascondersi sotto una macchia più scura di nulla. La luce del casco è ridicola.
        #JNSQscience_evaReport_BopInSpaceLowLowlands_00 = I bassopiani sotto sono lisci e vuoti, come se Bop avesse provato a cancellare la propria superficie e poi avesse rinunciato a metà.
        #JNSQscience_evaReport_BopInSpaceLowMidlands_00 = Da un'orbita bassa le pianure sono curve dolci e contorni morbidi. La statica radio le fa sembrare tutt'altro che dolci.
        #JNSQscience_evaReport_BopInSpaceLowHighlands_00 = Le colline proiettano ombre che si allungano verso di te in orbita bassa. Decidi di rientrare in fretta nella navicella.
        #JNSQscience_evaReport_PolSrfLandedLowlands_00 = Tocchi una "roccia" con lo stivale. Risponde sbriciolandosi in briciole taglienti e luccicanti che provano con tutte le forze a diventare parte della tua tuta.
        #JNSQscience_evaReport_PolSrfLandedHighlands_00 = L'orizzonte è tutto punte e creste. Annota che "quota alta" su Pol è per lo più un suggerimento della geologia frastagliata.
        #JNSQscience_evaReport_PolSrfLandedMidlands_00 = La luce del casco trasforma la polvere in un campo di minuscoli scintillii. Decidi che Pol è bellissima oppure sta attivamente cercando di farti venire mal di testa.
        #JNSQscience_evaReport_PolSrfLandedMountains_00 = Fai un passo cauto e scivoli più lontano del previsto. Le montagne di Pol sembrano meno una scalata e più una trattativa educata con la gravità.
        #JNSQscience_evaReport_PolSrfLandedMountains_01 = Il terreno precipita in pendii ripidi e spezzati. Riferisci che il terreno è "puntuto", "friabile" e "molto fiero di esserlo".
        #JNSQscience_evaReport_PolInSpaceLow_00 = Da quassù, Pol sembra una briciola grumosa di caramella giallastra. Sei lievemente preoccupato che provi ad attaccarsi alla nave.
        #JNSQscience_evaReport_PolInSpaceLowPoles_00 = La regione polare sembra come se qualcuno avesse spolverato la cima della luna con polvere più chiara. Ti chiedi se piantare una bandiera conti come aggiungere un "polo" a Pol.
        #JNSQscience_evaReport_PolInSpaceLowPoles_01 = La superficie sotto è chiazzata e irregolare, come un modellino a metà. Annota che perfino i "tratti piatti" si rifiutano di restare piatti.
        #JNSQscience_evaReport_PolInSpaceLowLowlands_00 = Dall'orbita i bassopiani sembrano più lisci, finché le ombre non svelano spigoli ovunque. Correggi "liscio" in "meno aggressivamente frastagliato".
        #JNSQscience_evaReport_PolInSpaceLowLowlands_01 = Guardi la tua ombra sfiorare la superficie e ti accorgi che continua a impigliarsi su minuscole creste. La luna sembra assemblata con avanzi.
        #JNSQscience_evaReport_PolInSpaceLowMidlands_00 = La luce solare lampeggia sulla superficie in minuscoli scintillii. Riferisci alta probabilità di "glitter spaziale" e una probabilità ancora maggiore che finisca ovunque.
        #JNSQscience_evaReport_PolInSpaceLowMidlands_01 = Il terreno sotto sembra punteggiato, come se qualcuno avesse sparso briciole su una base più scura. Prendi nota di smettere di pensare agli snack.
        #JNSQscience_evaReport_PolInSpaceLowHighlands_00 = Le colline proiettano ombre lunghe e nette che rendono il paesaggio ancora più puntuto di quanto già sia. Decidi che Pol è determinato a essere difficile con qualunque illuminazione.
        #JNSQscience_evaReport_PolInSpaceLowMountains_00 = Le montagne da questa quota sembrano denti storti. Prometti in silenzio di tenere la nave ben sopra le parti mordaci.
        #JNSQscience_evaReport_PolInSpaceLowMountains_01 = Dorsali in ombra strisciano sulla superficie mentre passi sopra. Annota che la "catena montuosa" di Pol sembra una catena di cattive idee.
        #JNSQscience_evaReport_PolInSpaceHigh_00 = Starnutisci dentro il casco e ti penti subito di ogni scelta di vita che ti ha portato fin qui.
        #JNSQscience_evaReport_LindorFlyingHigh_00 = Le bande di nubi blu di Lindor scorrono sotto di te in strisce infinite. Cerchi di non pensare troppo a cosa significhi "giù" qui.
        #JNSQscience_evaReport_LindorFlyingHigh_01 = Una forte raffica ti strappa di lato e lo stomaco ti crolla comunque. Il Controllo Missione lo chiama "preziosi dati sul vento" e non "terrificante".
        #JNSQscience_evaReport_LindorInSpaceLowTemperateBands_00 = Da un'orbita bassa, le bande temperate sembrano calme e disposte con ordine, cosa che sembra sospetta.
        #JNSQscience_evaReport_LindorInSpaceLowTemperateBands_01 = Guardi le strisce scorrere sotto di te mentre i magnetometri ticchettano piano sullo sfondo.
        #JNSQscience_evaReport_LindorInSpaceLowSubpolarBands_00 = Le bande sub-polari appaiono smorzate e fredde, con foschia raccolta come lividi sotto le nubi.
        #JNSQscience_evaReport_LindorInSpaceLowSubpolarBands_01 = La tuta rileva qui un ambiente di particelle un po' più ostile, come se il polo stesse lasciando filtrare guai verso l'esterno.
        #JNSQscience_evaReport_LindorInSpaceLowNorthPole_00 = Vicino al polo ondulano tende di debole luminescenza e la radio aggiunge un ulteriore strato di statica per creare atmosfera.
        #JNSQscience_evaReport_LindorInSpaceLowNorthPole_01 = La vista è bella in quel modo che dice "non toccare". Tieni le mani sui corrimani.
        #JNSQscience_evaReport_LindorInSpaceLowSouthPole_00 = Il polo sud è avvolto da luce fioca e rumore morbido, come se il pianeta sussurrasse nella cuffia.
        #JNSQscience_evaReport_LindorInSpaceLowSouthPole_01 = Derivi sopra il bagliore e cerchi di non pensare a quanto sia profonda l'atmosfera.
        #JNSQscience_evaReport_LindorInSpaceLowStormComplex_00 = Il complesso di tempeste ribolle sotto come una macchina viva, riorganizzandosi mentre lo osservi.
        #JNSQscience_evaReport_LindorInSpaceLowStormComplex_01 = Prendi appunti su struttura e movimento, poi aggiungi una nota personale: "restare quassù".
        #JNSQscience_evaReport_LindorInSpaceLowUpperStormDeck_00 = Il livello superiore sembra liscio dall'orbita, ma i motivi tradiscono un moto rapido sotto.
        #JNSQscience_evaReport_LindorInSpaceLowUpperStormDeck_01 = Quasi riesci a seguire i venti a occhio. Il pianeta sta gentilmente facendo sfoggio di sé.
        #JNSQscience_evaReport_LindorInSpaceLowExposedLowerDeck_00 = Una finestra più scura sugli strati inferiori fa sembrare il pianeta più profondo di quanto abbia diritto di essere.
        #JNSQscience_evaReport_LindorInSpaceLowExposedLowerDeck_01 = Fissi la frattura e immagini la pressione sotto. La tua immaginazione presenta un reclamo.
        #JNSQscience_evaReport_LindorInSpaceHigh_00 = Lindor si riduce a un gioiello a strisce con una tinta glaciale e il silenzio torna a un livello gestibile.
        #JNSQscience_evaReport_LindorInSpaceHigh_01 = Molto più in alto, il bagliore del pianeta è solo un accenno. Ti senti molto lontano da casa e stranamente sollevato.
        #JNSQscience_evaReport_KrelSrfLandedLowlands_00 = Le distese chiare sembrano spolverate di zucchero a velo, se lo zucchero potesse essere così poco amichevole.
        #JNSQscience_evaReport_KrelSrfLandedLowlands_00 = Ogni impronta resta nitida nella graniglia gelida. Krel conserva ottimi registri dei tuoi errori.
        #JNSQscience_evaReport_KrelSrfLandedMidlands_01 = Solchi scuri attraversano il terreno come grinze in vecchia vernice. Cerchi di non ricambiare lo sguardo.
        #JNSQscience_evaReport_KrelSrfLandedMidlands_00 = Il terreno è fatto di bande e giunture, come se qualcuno avesse cucito la luna in fretta.
        #JNSQscience_evaReport_KrelSrfLandedHighlands_00 = Il terreno alto è frastagliato e stranamente ruvido, come onde congelate di pietra.
        #JNSQscience_evaReport_KrelSrfLandedHighlands_01 = Salti una volta e te ne penti subito. La bassa gravità fa sembrare il coraggio senza sforzo.
        #JNSQscience_evaReport_KrelSrfLandedPoles_00 = La luce sfiora appena l'orizzonte, trasformando ogni cresta in una lunga ombra sospetta.
        #JNSQscience_evaReport_KrelSrfLandedPoles_01 = La visiera si appanna, poi si schiarisce e rivela altro freddo vuoto. Krel è coerente, almeno.
        #JNSQscience_evaReport_KrelInSpaceLowLowlands_00 = Da qui i bassopiani sembrano lisci finché non noti le deboli "vene" che li attraversano.
        #JNSQscience_evaReport_KrelInSpaceLowLowlands_01 = Le distese formano chiazze ordinate attorno a vecchie cicatrici. Ti chiedi con cosa si sia scontrato Krel per avere quell'atteggiamento.
        #JNSQscience_evaReport_KrelInSpaceLowMidlands_00 = Le pianure sono un reticolo disordinato di creste e avvallamenti, come se qualcuno avesse trascinato un pettine nella roccia.
        #JNSQscience_evaReport_KrelInSpaceLowMidlands_01 = Tracci linee sul finestrino e fai finta di aver scoperto un grande schema. Anche il Controllo Missione fa finta.
        #JNSQscience_evaReport_KrelInSpaceLowHighlands_00 = Le colline proiettano ombre nette che fanno sembrare Krel scolpito più che formato.
        #JNSQscience_evaReport_KrelInSpaceLowHighlands_01 = Da vicino, scogliere e terrazze sembrano impossibilmente ripide. Decidi di ammirarle da una distanza di sicurezza.
        #JNSQscience_evaReport_KrelInSpaceLowPoles_00 = Le regioni polari sfumano in un contrasto duro, brina luminosa accanto a spaccature nere come la pece.
        #JNSQscience_evaReport_KrelInSpaceLowPoles_01 = Il terminatore striscia sui poli come una palpebra che si chiude. Ti senti cortesemente poco gradito.
        #JNSQscience_evaReport_KrelInSpaceHigh_00 = Krel diventa una scheggia chiara incollata al fianco di Lindor. Controlli due volte per assicurarti che sia ancora lì.
        #JNSQscience_evaReport_KrelInSpaceHigh_01 = Da così lontano, la strana texture della luna svanisce in un semplice puntino. Sta chiaramente nascondendo qualcosa.
        #JNSQscience_evaReport_AdenSrfLandedLowlands_00 = Ti lasci cadere con un salto nei bassopiani e sopravvaluti subito quanta trazione possa offrire la "polvere".
        #JNSQscience_evaReport_AdenSrfLandedLowlands_01 = Il terreno è piatto, marrone e silenzioso. I tuoi stivali sono ufficialmente la cosa più rumorosa di Aden.
        #JNSQscience_evaReport_AdenSrfLandedMidlands_00 = Le pianure si stendono in morbidi dossi, come se la luna cercasse di sembrare impegnata senza fare alcuna fatica.
        #JNSQscience_evaReport_AdenSrfLandedMidlands_01 = Provi una posa eroica per la fotocamera, poi traballi perché bassa gravità e dignità non vanno d'accordo.
        #JNSQscience_evaReport_AdenSrfLandedHighlands_00 = Le colline sono tutte creste spezzate e ombre nette. Decidi di ammirarle da una distanza di sicurezza: "proprio qui".
        #JNSQscience_evaReport_AdenSrfLandedHighlands_01 = Il riscaldatore della tuta si guadagna una menzione formale mentre il freddo si insinua in ogni pausa.
        #JNSQscience_evaReport_AdenSrfLandedMountains_00 = Le montagne sembrano abbastanza ripide da rientrare in un errore procedurale. Provi un appoggio e te ne penti subito.
        #JNSQscience_evaReport_AdenSrfLandedMountains_01 = Ogni passo manda sassolini alla deriva, come se stessero cercando di scappare dalla missione.
        #JNSQscience_evaReport_AdenSrfLandedPoles_00 = Il suolo polare scintilla appena in alcuni punti, come se il freddo lucidasse la polvere quando nessuno guarda.
        #JNSQscience_evaReport_AdenSrfLandedPoles_01 = Fissi una macchia d'ombra e hai la netta sensazione che Aden ci stia nascondendo degli snack. Non è così.
        #JNSQscience_evaReport_AdenInSpaceLowLowlands_00 = Fluttuando sopra i bassopiani, guardi la tua ombra sfrecciare sulle distese marroni e ti senti stranamente competitivo.
        #JNSQscience_evaReport_AdenInSpaceLowLowlands_01 = Ti aggrappi alla scala e fai un rapido colpetto di prova al casco. Ancora niente aria. Ancora freddo. Scienza!
        #JNSQscience_evaReport_AdenInSpaceLowMidlands_00 = Dall'alto delle pianure, il terreno sembra come un foglio spiegazzato che qualcuno si è dimenticato di rispianare.
        #JNSQscience_evaReport_AdenInSpaceLowMidlands_01 = Provi a fissare dei punti di riferimento, ma tutto è dello stesso colore "biscotto vecchio".
        #JNSQscience_evaReport_AdenInSpaceLowHighlands_00 = Le colline scorrono sotto in bande frastagliate. Annoti le ombre drammatiche e la totale assenza di un posto comodo dove sedersi.
        #JNSQscience_evaReport_AdenInSpaceLowHighlands_01 = La tuta fluttua un po' troppo liberamente e ti ricordi che "lasciare la presa" non è un piano di navigazione valido.
        #JNSQscience_evaReport_AdenInSpaceLowMountains_00 = Sopra le montagne, l'orizzonte sale e scende in denti aguzzi. Tieni una mano sulla nave, nel caso lo spazio si faccia venire delle idee.
        #JNSQscience_evaReport_AdenInSpaceLowMountains_01 = Registri un rapporto EVA, poi ne registri subito un secondo su quanto sia difficile scrivere mentre galleggi.
        #JNSQscience_evaReport_AdenInSpaceLowPoles_00 = La regione polare da qui sembra ancora più fredda, il che è notevole perché "più freddo del vuoto" non dovrebbe essere possibile.
        #JNSQscience_evaReport_AdenInSpaceLowPoles_01 = Guardi le ombre allungarsi sul polo e decidi che l'oscurità sta vincendo.
        #JNSQscience_evaReport_AdenInSpaceHigh_00 = Da molto in alto, Aden si riduce a una perlina marrone mentre Lindor domina il cielo come se fosse casa sua.
        #JNSQscience_evaReport_AdenInSpaceHigh_01 = Ruoti lentamente nel vuoto e archivi un rapporto che è quasi tutto "silenzio", con una nota a piè di pagina: "molto, molto silenzio".
        #JNSQscience_evaReport_HuygenSrfLanded_00 = Fai un passo cauto: le terre svaniscono nella foschia arancione. La tuta segnala alta pressione all'esterno e tu le credi.
        #JNSQscience_evaReport_HuygenSrfLanded_01 = Il terreno sembra solido sotto i piedi, ma una distesa piatta e scura si allunga sotto un cielo dimesso. Registri: visibilità scarsa, atmosfera ostinata, morale accettabile.
        #JNSQscience_evaReport_HuygenSrfLandedLowlands_00 = Il terreno cede un po' sotto gli stivali, poi fa finta con ostinazione di non averlo fatto.
        #JNSQscience_evaReport_HuygenSrfLandedLowlands_01 = Una foschia fredda e densa si appiccica alla tuta come se pagasse l'affitto.
        #JNSQscience_evaReport_HuygenSrfLandedMidlands_00 = Vedi il paesaggio ondulare... finché svanisce in una parete ambrata senza dettagli.
        #JNSQscience_evaReport_HuygenSrfLandedMidlands_01 = Le luci del casco illuminano nebbia, poi altra nebbia, e infine il concetto stesso di nebbia.
        #JNSQscience_evaReport_HuygenSrfLandedHighlands_00 = Il vento sembra lento ma forte, come se l'aria stesse riflettendo con cura su come farti cadere.
        #JNSQscience_evaReport_HuygenSrfLandedHighlands_01 = Lontane creste scure appaiono e scompaiono mentre la foschia si sposta. Nel rapporto scrivi "quasi solo creste".
        #JNSQscience_evaReport_HuygenSrfLandedMountains_00 = La bassa gravità incoraggia pose eroiche. L'alta pressione le rimette subito al loro posto.
        #JNSQscience_evaReport_HuygenSrfLandedMountains_01 = Salti, derivi e atterri come una piuma. La montagna risponde con una raffica e un cigolio delle guarnizioni della tuta.
        #JNSQscience_evaReport_HuygenSrfLandedPeaks_00 = Quassù la foschia si dirada giusto abbastanza da mostrare quanta foschia ci sia ancora.
        #JNSQscience_evaReport_HuygenSrfLandedPeaks_01 = Il cielo è oro smorzato e l'orizzonte sembra abbastanza vicino da poterlo toccare. Decidi di non provarci.
        #JNSQscience_evaReport_HuygenSrfLandedPolarLowlands_00 = Il terreno è scuro e fragile, con un motivo che ricorda vernice screpolata lasciata al freddo.
        #JNSQscience_evaReport_HuygenSrfLandedPolarLowlands_01 = La brina si raccoglie quasi subito sugli attacchi della tuta. La registri come "condensa entusiasta".
        #JNSQscience_evaReport_HuygenSrfLandedPoles_00 = Qui tutto è attutito: persino i tuoi passi sembrano indossare i guanti.
        #JNSQscience_evaReport_HuygenSrfLandedPoles_01 = La bussola fa una proposta convinta, poi si ricorda che non c'è campo magnetico e rinuncia.
        #JNSQscience_evaReport_HuygenSrfLandedPolarHighlands_00 = Il pendio sale in un bagliore dimesso, come se il sole cercasse di non disturbare nessuno.
        #JNSQscience_evaReport_HuygenSrfLandedPolarHighlands_01 = Roccia scavata dal vento e sporcizia gelata competono per il titolo di "meno accogliente".
        #JNSQscience_evaReport_HuygenSrfLandedShores_00 = La costa è lucida e nera, come se il pianeta avesse rovesciato qualcosa e non l'avesse mai pulita.
        #JNSQscience_evaReport_HuygenSrfLandedShores_01 = Piccole increspature lambiscono il bordo della terra. I sensori della tuta ti chiedono cortesemente di smettere di fissare e fare un passo indietro.
        #JNSQscience_evaReport_HuygenSrfSplashed_00 = Galleggi con lo zaino che ti tiene appena in verticale: un lago nero e lucido inghiotte i riflessi. Imposti ogni interruttore su "niente scintille".
        #JNSQscience_evaReport_HuygenSrfSplashed_01 = La superficie del liquido increspa come olio che si muove piano. Il liquido fa perle sugli stivali e scappa via come se sapesse che porti guai.
        #JNSQscience_evaReport_HuygenSrfSplashedShores_00 = Galleggi più di quanto dovresti, ondeggiando in un liquido freddo che si rifiuta di comportarsi come acqua.
        #JNSQscience_evaReport_HuygenSrfSplashedShores_01 = La tuta resta sigillata, ma il suono del lento sciabordio è inquietantemente forte nel casco.
        #JNSQscience_evaReport_HuygenSrfSplashedMethaneLakes_00 = Sei in un lago di metano. Registri questo fatto più volte, giusto per essere sicuro che sia reale.
        #JNSQscience_evaReport_HuygenSrfSplashedMethaneLakes_01 = La superficie è scura e liscia, interrotta da bolle pigre. Tieni i pensieri molto lontani dalle "scintille".
        #JNSQscience_evaReport_HuygenFlyingLow_00 = Volare qui sembra nuotare nello sciroppo. La radio crepita: il silenzio fuori non se ne cura, e il tuo jetpack corregge troppo come se ne fosse fiero.
        #JNSQscience_evaReport_HuygenFlyingLow_01 = Provi un salto in EVA e l'aria densa ti afferra. Creste ghiacciate spuntano tra le nubi basse come denti scuri, quindi navighi a strumenti e ottimismo.
        #JNSQscience_evaReport_HuygenFlyingLowLowlands_00 = Aggrappato alla scala, guardi i bassopiani sfocarsi sotto una densa zuppa ambrata.
        #JNSQscience_evaReport_HuygenFlyingLowLowlands_01 = L'aria ti colpisce con pugni lenti. Registri "vento: determinato".
        #JNSQscience_evaReport_HuygenFlyingLowMidlands_00 = Il suolo appare in brevi scorci sfocati tra tende di foschia che scorrono.
        #JNSQscience_evaReport_HuygenFlyingLowMidlands_01 = La turbolenza ti spinge come un gigante annoiato che dia un colpetto al casco.
        #JNSQscience_evaReport_HuygenFlyingLowHighlands_00 = Colline scure emergono dalla nebbia, poi vi sprofondano di nuovo come timidi mostri marini.
        #JNSQscience_evaReport_HuygenFlyingLowHighlands_01 = Quasi credi di vedere dei dettagli laggiù, finché la foschia non ride e non si riorganizza.
        #JNSQscience_evaReport_HuygenFlyingLowMountains_00 = Correnti ascensionali sopra le montagne ti sollevano con delicatezza, come se il pianeta stesse cercando di inspirarti.
        #JNSQscience_evaReport_HuygenFlyingLowMountains_01 = L'aria è abbastanza densa da sentirla attraverso i guanti. Scrivi "non togliere i guanti" per sicurezza.
        #JNSQscience_evaReport_HuygenFlyingLowPeaks_00 = Vette bucano la foschia, facendo del loro meglio per raggiungere aria più pulita.
        #JNSQscience_evaReport_HuygenFlyingLowPeaks_01 = La vista è roccia frastagliata, cielo ambrato e un sacco di "forse" nel mezzo.
        #JNSQscience_evaReport_HuygenFlyingLowPolarLowlands_00 = Le distese polari sotto sono striate di chiazze scure e crosta chiara, come inchiostro versato sulla neve.
        #JNSQscience_evaReport_HuygenFlyingLowPolarLowlands_01 = La tuta scricchiola piano mentre pressione e freddo discutono su chi debba essere più scomodo.
        #JNSQscience_evaReport_HuygenFlyingLowPoles_00 = Il polo è un bersaglio fioco sotto un cielo pesante. Sembra di volare dentro un dipinto smorzato.
        #JNSQscience_evaReport_HuygenFlyingLowPoles_01 = La statica crepita nelle comunicazioni come se l'atmosfera stesse masticando il segnale.
        #JNSQscience_evaReport_HuygenFlyingLowPolarHighlands_00 = Le colline polari sembrano nette ai bordi e morbide ovunque altrove, grazie alla foschia onnipresente.
        #JNSQscience_evaReport_HuygenFlyingLowPolarHighlands_01 = Ti aggrappi più forte mentre una lenta raffica ti rotola di lato. Nel rapporto compare la parola "wheee" poi viene barrata.
        #JNSQscience_evaReport_HuygenFlyingLowShores_00 = La costa sotto disegna una linea scura e ondeggiante dove terra e mare strano negoziano.
        #JNSQscience_evaReport_HuygenFlyingLowShores_01 = Guardi le onde inseguire la riva con passo tranquillo. Qui perfino l'acqua si prende il suo tempo.
        #JNSQscience_evaReport_HuygenFlyingLowMethaneLakes_00 = La superficie del lago non riflette quasi nulla: è come fissare un'ombra lucidata.
        #JNSQscience_evaReport_HuygenFlyingLowMethaneLakes_01 = Un lieve velo luccica, poi scompare. Decidi che il lago sta facendo il drammatico di proposito.
        #JNSQscience_evaReport_HuygenFlyingHigh_00 = Quassù la foschia brilla d'ambra e la visiera resta quasi pulita. La quota maggiore ti dà una vista appena migliore, per poco. Lo chiami "progresso".
        #JNSQscience_evaReport_HuygenFlyingHigh_01 = Il vento cambia idea ogni pochi secondi. Il vento raschia le alture con una spinta costante. Scrivi: l'atmosfera ha strati, ciascuno con opinioni.
        #JNSQscience_evaReport_HuygenInSpaceLow_00 = Derivi sopra il terminatore e osservi il bagliore del bordo. Terreno scuro si stende sotto un cielo dimesso. Registri: bello, frustrante, scientificamente utile.
        #JNSQscience_evaReport_HuygenInSpaceLowLowlands_00 = Da un'orbita bassa, i bassopiani sono una macchia scura sotto un bordo atmosferico luminoso.
        #JNSQscience_evaReport_HuygenInSpaceLowLowlands_01 = Provi a distinguere dei dettagli, ma la foschia trasforma tutto in un dipinto impressionista.
        #JNSQscience_evaReport_HuygenInSpaceLowMidlands_00 = Le pianure formano gradienti morbidi che svaniscono nella velatura ambrata che avvolge il pianeta.
        #JNSQscience_evaReport_HuygenInSpaceLowMidlands_01 = Registri le linee di confine con sicurezza, poi le guardi sparire sotto foschia alla deriva.
        #JNSQscience_evaReport_HuygenInSpaceLowHighlands_00 = Le colline appaiono come chiazze più scure, come lividi sotto pelle traslucida.
        #JNSQscience_evaReport_HuygenInSpaceLowHighlands_01 = L'atmosfera diffonde la luce in un bagliore morbido che rende il terreno irreale.
        #JNSQscience_evaReport_HuygenInSpaceLowMountains_00 = Catene montuose emergono come ombre frastagliate che la foschia cerca con tutte le forze di cancellare.
        #JNSQscience_evaReport_HuygenInSpaceLowMountains_01 = Registri le cime dalle loro sagome, perché il pianeta si rifiuta di offrire chiarezza della superficie.
        #JNSQscience_evaReport_HuygenInSpaceLowPeaks_00 = Le vette sono minuscoli punti scuri che vincono a fatica contro la foschia.
        #JNSQscience_evaReport_HuygenInSpaceLowPeaks_01 = Ti chiedi come qualcosa di così alto possa sembrare ancora così timido dall'orbita.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari sono chiazzati di zone chiare che potrebbero essere brina, oppure l'atmosfera che mente di nuovo.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarLowlands_01 = Il bagliore del bordo vicino al polo è luminoso e spesso, come se l'aria si fosse accumulata lì.
        #JNSQscience_evaReport_HuygenInSpaceLowPoles_00 = Il polo è un bersaglio smorzato sotto una cupola di luce ambrata.
        #JNSQscience_evaReport_HuygenInSpaceLowPoles_01 = Noti la mancanza di contrasti netti e sospetti che l'atmosfera stia lisciando tutto di proposito.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarHighlands_00 = Le colline polari proiettano ombre deboli che sembrano sbavate ai bordi.
        #JNSQscience_evaReport_HuygenInSpaceLowPolarHighlands_01 = Segui le creste per un momento, poi bande di foschia scivolano sopra e chiudono gentilmente l'osservazione.
        #JNSQscience_evaReport_HuygenInSpaceLowShores_00 = Le coste sono un sottile contorno scuro dove la terra incontra mari poco familiari.
        #JNSQscience_evaReport_HuygenInSpaceLowShores_01 = Quasi riesci a vedere le onde. Di sicuro vedi l'atmosfera fare del suo meglio per nasconderle.
        #JNSQscience_evaReport_HuygenInSpaceLowMethaneLakes_00 = I laghi di metano sono pozze scure perfette, che assorbono la luce come se la stessero accumulando.
        #JNSQscience_evaReport_HuygenInSpaceLowMethaneLakes_01 = Registri i laghi come "presenti" e resisti alla tentazione di aggiungere "in modo minaccioso".
        #JNSQscience_evaReport_HuygenInSpaceHigh_00 = Da un'orbita alta, Huygen è un piccolo mondo ambrato con un bordo luminoso e una superficie riservata.
        #JNSQscience_evaReport_HuygenInSpaceHigh_01 = Il pianeta sembra sigillato sotto la sua atmosfera spessa. Scrivi che ti senti osservato, poi cancelli la frase.
        #JNSQscience_evaReport_HuygenInSpaceHigh_02 = Da molto in alto, Huygen è una biglia ambrata avvolta in un velo spesso. Fai un cenno lo stesso: non lo ricambia.
        #JNSQscience_evaReport_HuygenInSpaceHigh_03 = Ricontrolli il cavo e fissi un mondo che si rifiuta di mostrare la superficie. Il team scientifico lo chiama "interessante".
        #JNSQscience_evaReport_RigaSrfLandedLowlands_00 = I bassopiani sembrano come Kerbin se avessero dimenticato di dipingerlo. I tuoi stivali scricchiolano nella polvere che si rifiuta di restare a terra.
        #JNSQscience_evaReport_RigaSrfLandedLowlands_01 = Fai un passo con sicurezza e te ne penti subito della parola "sicurezza". La bassa gravità trasforma il camminare in danza interpretativa.
        #JNSQscience_evaReport_RigaSrfLandedMidlands_00 = Le pianure si estendono all'infinito, discrete e ostinatamente familiari. Continui ad aspettarti che compaia l'erba e chieda scusa.
        #JNSQscience_evaReport_RigaSrfLandedMidlands_01 = Dai un calcio a un sassolino. Descrive un arco e se ne va come se stesse chiedendo la cittadinanza orbitale.
        #JNSQscience_evaReport_RigaSrfLandedHighlands_00 = Le colline sono taglienti e fredde, con ombre che sembrano più profonde del dovuto. La tua tuta sembra l'unica cosa calda dell'universo.
        #JNSQscience_evaReport_RigaSrfLandedHighlands_01 = Ti fermi ad ammirare la vista e appanni subito la visiera con un respiro entusiasta. Il Controllo Missione lo chiama "dati".
        #JNSQscience_evaReport_RigaSrfLandedMountains_00 = Le montagne incombono vicine, frastagliate e ostinate. Ricontrolli l'appoggio e quando salti derivi comunque un po'.
        #JNSQscience_evaReport_RigaSrfLandedMountains_01 = Ogni passo suona forte nel casco e silenzioso ovunque altrove. L'aria sottile è quasi solo decorativa.
        #JNSQscience_evaReport_RigaSrfLandedPoles_00 = Granelli gelati scintillano ai poli, troppo luminosi contro il cielo scuro. Provi a spazzarne via un po' e si attaccano come elettricità statica.
        #JNSQscience_evaReport_RigaSrfLandedPoles_01 = Ti sembra di dover rabbrividire, ma la tuta gestisce quella parte. Il cervello fa il resto comunque.
        #JNSQscience_evaReport_RigaFlyingLowLowlands_00 = Sfrecci appena sopra le distese, "volando" in una foschia che a malapena conta come atmosfera. Il suolo scorre come un nastro trasportatore molto freddo.
        #JNSQscience_evaReport_RigaFlyingLowLowlands_01 = L'aria ti strattona in modi minuscoli e poco utili. Lo zaino fa tutto il lavoro vero e pretende straordinari.
        #JNSQscience_evaReport_RigaFlyingLowMidlands_00 = Le pianure salgono e scendono sotto di te mentre fai finta che sia volo controllato. La tuta si rifiuta cortesemente di essere d'accordo.
        #JNSQscience_evaReport_RigaFlyingLowMidlands_01 = Sfiori creste che dall'alto sembrano morbide e da vicino crudeli. Decidi di restare sopra.
        #JNSQscience_evaReport_RigaFlyingLowHighlands_00 = Aria sottile e terreno spezzato rendono l'"aerodinamica" piena di sobbalzi. Traballi, ti stabilizzi e lo chiami manovra riuscita.
        #JNSQscience_evaReport_RigaFlyingLowHighlands_01 = La foschia cattura la luce in deboli bande mentre passi. Per un attimo sembra quasi meteo.
        #JNSQscience_evaReport_RigaFlyingLowMountains_00 = Passi accanto a dorsali rocciose e cerchi di non pensare a quanta poca aria ci sia per rallentarti. La gravità sembra molto interessata a partecipare.
        #JNSQscience_evaReport_RigaFlyingLowMountains_01 = Le cime sfrecciano sotto gli stivali. Archivi un rapporto definendolo "esaltante" per non ammettere "terrificante".
        #JNSQscience_evaReport_RigaFlyingLowPoles_00 = Sopra i poli, tutto diventa più luminoso e più duro in un colpo solo. Persino la foschia minuscola sembra fragile.
        #JNSQscience_evaReport_RigaFlyingLowPoles_01 = Granelli ghiacciati si sollevano e vorticano al rallentatore quando passi basso. Li guardi fluttuare come se non fossero sicuri di dove sia "giù".
        #JNSQscience_evaReport_RigaFlyingHighLowlands_00 = In alto, gli ultimi fili d'aria sfiorano la tuta e poi rinunciano. I bassopiani sotto sfumano in forme ampie e silenziose.
        #JNSQscience_evaReport_RigaFlyingHighLowlands_01 = Quasi ti dimentichi di essere ancora in atmosfera, finché gli strumenti non insistono che lo sei, tecnicamente.
        #JNSQscience_evaReport_RigaFlyingHighMidlands_00 = Le pianure si appiattiscono in bande gentili mentre sali. Lindor incombe enorme nel cielo, supervisionando il tuo "volo".
        #JNSQscience_evaReport_RigaFlyingHighMidlands_01 = I getti della tuta sibilano piano, l'unico suono che conti. Tutto il resto è silenzio freddo e rallentatore.
        #JNSQscience_evaReport_RigaFlyingHighHighlands_00 = Da alta quota, le colline sembrano pietra frantumata disposta con cura. La foschia è così sottile che sembra una diceria.
        #JNSQscience_evaReport_RigaFlyingHighHighlands_01 = Derivi, correggi e derivi di nuovo. L'aerodinamica ti fa un breve cenno di spalle e se ne va.
        #JNSQscience_evaReport_RigaFlyingHighMountains_00 = La catena montuosa diventa una linea frastagliata sotto di te. Tieni i movimenti piccoli: qui gli errori grandi viaggiano lontano.
        #JNSQscience_evaReport_RigaFlyingHighMountains_01 = La tua ombra non è solo a terra, è sulla tua sicurezza. Lo registri come "consapevolezza situazionale".
        #JNSQscience_evaReport_RigaFlyingHighPoles_00 = Le calotte polari scintillano sotto una luce solare distante. L'aria quassù è quasi nulla e riesce comunque a essere fredda.
        #JNSQscience_evaReport_RigaFlyingHighPoles_01 = Guardi il polo scorrere sotto di te e ti chiedi come possa qualcosa essere così luminoso e così vuoto allo stesso tempo.
        #JNSQscience_evaReport_RigaInSpaceLowLowlands_00 = Fluttui sopra i bassopiani e puoi vedere ogni piccola cicatrice e zona liscia senza il vetro del cockpit. La foschia di Riga ne traccia un contorno tenue.
        #JNSQscience_evaReport_RigaInSpaceLowLowlands_01 = Sotto, le distese sembrano calme e facili. Sai che è una bugia perché hai provato a camminarci.
        #JNSQscience_evaReport_RigaInSpaceLowMidlands_00 = Le pianure si stendono sotto di te in pieghe gentili. Sembra quasi accogliente, cosa sospetta per un posto così freddo.
        #JNSQscience_evaReport_RigaInSpaceLowMidlands_01 = Lindor riempie lo sfondo come un gigante guardiano. Fai un cenno lo stesso, per sicurezza.
        #JNSQscience_evaReport_RigaInSpaceLowHighlands_00 = Da qui le colline sono un labirinto di ombre e luce tagliente. Derivi e ti senti molto piccolo e molto assunto.
        #JNSQscience_evaReport_RigaInSpaceLowHighlands_01 = Paragoni il terreno a Kerbin ad alta voce e vieni corretto subito da tre scienziati diversi.
        #JNSQscience_evaReport_RigaInSpaceLowMountains_00 = Le vette sembrano ancora più cattive senza la nave tra te e loro. Tieni una mano sul corrimano e fai finta che aiuti.
        #JNSQscience_evaReport_RigaInSpaceLowMountains_01 = I getti della tuta soffiano piano mentre ti sposti lungo lo scafo. Le montagne sotto sembrano allungarsi verso di te.
        #JNSQscience_evaReport_RigaInSpaceLowPoles_00 = I poli brillano come zucchero sparso contro roccia scura. La foschia sottile crea un tenue alone sul bordo.
        #JNSQscience_evaReport_RigaInSpaceLowPoles_01 = Noti piccole striature luminose e decidi che sono "depositi interessanti". Suona meglio di "glitter misterioso".
        #JNSQscience_evaReport_RigaInSpaceHigh_00 = Da molto in alto, Riga è una biglia marrone-grigia con un bordo di foschia sottile come un sussurro. Lindor sta lì vicino come se possedesse la vista.
        #JNSQscience_evaReport_RigaInSpaceHigh_01 = L'intera luna sembra quietamente familiare e completamente inospitale. Registri il paradosso e poi la fissi ancora un po'.
        #JNSQscience_evaReport_TalosSrfLandedLowlands_00 = I tuoi stivali affondano a malapena prima che la polvere decida che vuole seguirti fino a casa.
        #JNSQscience_evaReport_TalosSrfLandedLowlands_01 = I bassopiani sono così piatti che per un attimo sospetti che la visiera sia bloccata su "modalità mappa".
        #JNSQscience_evaReport_TalosSrfLandedMidlands_00 = Ogni passo solleva un soffio lento e pigro che resta lì, come se aspettasse un applauso.
        #JNSQscience_evaReport_TalosSrfLandedMidlands_01 = Le pianure sembrano screpolate e stanche, come se Talos trattenesse il respiro da secoli.
        #JNSQscience_evaReport_TalosSrfLandedHighlands_00 = Qui il terreno è più tagliente, più scuro e molto più interessato alla finitura della tua tuta di quanto lo sia tu.
        #JNSQscience_evaReport_TalosSrfLandedHighlands_01 = Salti una volta e resti in sospensione un po' troppo a lungo, improvvisamente molto consapevole di quanto lontano possa sembrare "giù".
        #JNSQscience_evaReport_TalosSrfLandedMountains_00 = La bassa gravità rende facile arrampicarsi, finché non ti ricordi che poi devi anche scendere.
        #JNSQscience_evaReport_TalosSrfLandedMountains_01 = Le cime incombono su di te in perfetto silenzio, come se aspettassero di vedere se farai un errore.
        #JNSQscience_evaReport_TalosSrfLandedPoles_00 = Il terreno polare scintilla appena, come se la polvere si stesse lucidando per noia.
        #JNSQscience_evaReport_TalosSrfLandedPoles_01 = Qui le ombre si allungano all'infinito: prendi appunti e cerchi di non immaginare cosa si nasconda in tutta quell'oscurità.
        #JNSQscience_evaReport_TalosInSpaceLowLowlands_00 = Derivi sopra i bassopiani al tuo cavo, guardando distese senza dettagli scorrere come un progetto incompiuto.
        #JNSQscience_evaReport_TalosInSpaceLowLowlands_01 = Da qui i bassopiani sembrano lisci e innocui, finché non ti ricordi che ci hai appena camminato.
        #JNSQscience_evaReport_TalosInSpaceLowMidlands_00 = Le pianure tracciano linee sottili e rughe sulla superficie, come se Talos stesse cercando di scarabocchiare un avvertimento.
        #JNSQscience_evaReport_TalosInSpaceLowMidlands_01 = Indichi creste e fratture sotto di te mentre la tuta ti ricorda gentilmente che lo spazio non è un pavimento.
        #JNSQscience_evaReport_TalosInSpaceLowHighlands_00 = Le colline dall'orbita sembrano livide e antiche, con cicatrici che si rifiutano di sbiadire.
        #JNSQscience_evaReport_TalosInSpaceLowHighlands_01 = Ruoti lentamente, osservando le colline sotto e il vuoto sopra, e decidi che nessuno dei due sbatterà le palpebre per primo.
        #JNSQscience_evaReport_TalosInSpaceLowMountains_00 = Montagne frastagliate passano sotto come denti: istintivamente tiri su le gambe, cosa che non aiuta assolutamente a nulla.
        #JNSQscience_evaReport_TalosInSpaceLowMountains_01 = Registri le catene montuose sotto e ti chiedi come qualcosa di così immobile possa sembrare così ostile.
        #JNSQscience_evaReport_TalosInSpaceLowPoles_00 = I poli sono uno studio di luce dura e ombra ancora più profonda: il confine tra le due sembra sottile come un rasoio.
        #JNSQscience_evaReport_TalosInSpaceLowPoles_01 = Fluttui sopra le regioni polari e ti senti molto piccolo in un modo che i valori della tuta non riescono a quantificare.
        #JNSQscience_evaReport_TalosInSpaceHigh_00 = Da molto in alto, Talos si riduce a un piccolo disco ostinato che riesce comunque a pesarti in testa.
        #JNSQscience_evaReport_TalosInSpaceHigh_01 = Concludi il rapporto EVA mentre fissi Talos molto sotto di te, chiedendoti se "casa" possa essere una direzione.
        #JNSQscience_evaReport_EelooFlyingLowPoles_00 = Derivi sopra il ghiaccio polare, con le luci del casco che rimbalzano su un bianco accecante che rende difficile dimostrare dov'è "su".
        #JNSQscience_evaReport_EelooFlyingLowPoles_01 = L'aria è un sussurro sottile e gelido. La tua tuta sfiata brina che prova subito a diventare parte del paesaggio.
        #JNSQscience_evaReport_EelooFlyingLowHighlands_00 = Le colline sembrano denti congelati. La foschia sottile non fa nulla per ammorbidire la vista o il freddo.
        #JNSQscience_evaReport_EelooFlyingLowHighlands_01 = Gli scarichi del jetpack ti fanno scivolare sopra creste scintillanti. Laggiù tutto sembra abbastanza tagliente da tagliare una cronologia.
        #JNSQscience_evaReport_EelooFlyingLowMidlands_00 = Le pianure passano sotto in lastre pallide e silenziose. Registri che è bello, e anche inquietantemente vuoto.
        #JNSQscience_evaReport_EelooFlyingLowMidlands_01 = Non riesci a scrollarti di dosso la sensazione di "volare" nel respiro più debole del mondo, sopra neve che non ha mai imparato a sciogliersi.
        #JNSQscience_evaReport_EelooFlyingLowLowlands_00 = I bassopiani trattengono una foschia un po' più spessa, che resta bassa sul terreno. Sembra che il pianeta stia cercando, con educazione, di avere del meteo.
        #JNSQscience_evaReport_EelooFlyingLowLowlands_01 = Derivi sopra ampi campi di brina lisci. I tuoi stivali oscillano al rallentatore, come se anche la gravità fosse prudente.
        #JNSQscience_evaReport_EelooFlyingLowCanyon_00 = Il canyon si spalanca sotto di te, scuro e profondo. Il jetpack risponde con un tonfo sordo che ti torna attraverso la tuta.
        #JNSQscience_evaReport_EelooFlyingLowCanyon_01 = Lungo le pareti del canyon, filamenti di foschia fredda si aggrappano e vorticano. È la cosa più vicina al vento che tu abbia incontrato quassù.
        #JNSQscience_evaReport_EelooFlyingHigh_00 = Agiti le braccia e ti dichiari ufficialmente "in volo" nella quasi non atmosfera di Eeloo.
        #JNSQscience_evaReport_EelooFlyingHigh_01 = L'aria è così sottile che sembra lo spazio con una giacca leggera. I riscaldatori della tuta non sono d'accordo con la scelta di stile.
        #JNSQscience_evaReport_CelesSrfLandedLowlands_00 = I bassopiani sono piatti, fragili e dolorosamente silenziosi. I tuoi stivali creano l'unico "meteo" qui.
        #JNSQscience_evaReport_CelesSrfLandedMidlands_00 = Il terreno è una coperta disordinata di placche chiare e cuciture scure. Procedi con cautela tra le cuciture.
        #JNSQscience_evaReport_CelesSrfLandedHighlands_00 = Dalle colline, l'orizzonte sembra netto e vicino. Per un attimo pensi di salutarlo.
        #JNSQscience_evaReport_CelesSrfLandedMountains_00 = Le montagne proiettano ombre lunghe e sottili che sembrano seguirti. Decidi di non sfidarle in gara.
        #JNSQscience_evaReport_CelesSrfLandedPoles_00 = Il bagliore polare è così intenso da sembrare rumoroso. Cerchi sulla tuta un'impostazione "attenua".
        #JNSQscience_evaReport_CelesInSpaceLowLowlands_00 = Da poco sopra i bassopiani, la superficie sembra segnata e polverosa, come se il tempo l'avesse levigata con la carta vetrata.
        #JNSQscience_evaReport_CelesInSpaceLowMidlands_00 = Le pianure scorrono sotto di te al rallentatore, tra crepe e macchie. Anche da quassù sembrano fragili.
        #JNSQscience_evaReport_CelesInSpaceLowHighlands_00 = Dorsali frastagliate passano sotto di te come onde congelate. Tieni il cavo ancora più vicino.
        #JNSQscience_evaReport_CelesInSpaceLowMountains_00 = I picchi si protendono verso di te come se volessero afferrarti gli stivali. Gli ricordi che sei solo di passaggio.
        #JNSQscience_evaReport_CelesInSpaceLowPoles_00 = I poli brillano come ghiaccio lucidato sotto un sole lontano. Socchiudi gli occhi e annoti "molto luccicante".
        #JNSQscience_evaReport_CelesInSpaceHigh_00 = Celes si riduce a un puntino pallido dai bordi netti. Sembra comunque che ti osservi mentre te ne vai.
        #JNSQscience_evaReport_TamSrfLandedLowlands_00 = I bassopiani sono bitorzoluti in un modo che sembra personale. Salti una volta e te ne penti subito.
        #JNSQscience_evaReport_TamSrfLandedMidlands_00 = Ogni passo solleva granelli che non si posano mai davvero. Tam sembra deciso a restare disordinato per sempre.
        #JNSQscience_evaReport_TamSrfLandedHighlands_00 = Le colline sono ripide, frastagliate e senza scuse. Scatti foto per dimostrare che ci sei sopravvissuto.
        #JNSQscience_evaReport_TamSrfLandedTwinCraters_00 = Due crateri gemelli incombono ai lati come occhi giganteschi. Ti piazzi in mezzo e ti senti giudicato.
        #JNSQscience_evaReport_TamSrfLandedCraters_00 = Crateri su crateri finché perdi il conto. Inizi a chiamarli come gli snack per restare concentrato.
        #JNSQscience_evaReport_TamSrfLandedPockmarks_00 = Minuscole cavità punteggiano la superficie come danni da grandine su una roccia molto vecchia. Cerchi di non aggiungerne una nuova.
        #JNSQscience_evaReport_TamInSpaceLowLowlands_00 = Radente sui bassopiani, Tam sembra una valigia di terreno chiusa male. Nulla combacia.
        #JNSQscience_evaReport_TamInSpaceLowMidlands_00 = Le pianure strisciano sotto di te in una lenta rotazione. Giureresti che tutta la luna stia cercando di rotolare via.
        #JNSQscience_evaReport_TamInSpaceLowHighlands_00 = Dall'orbita bassa, le colline sembrano denti spezzati. Tieni il casco ben fissato.
        #JNSQscience_evaReport_TamInSpaceLowTwinCraters_00 = I crateri gemelli sono due cerchi neri perfetti in un mondo imperfetto. Derivi sopra di loro e ti senti minuscolo.
        #JNSQscience_evaReport_TamInSpaceLowCraters_00 = Le ombre si accumulano in ogni ammaccatura e conca. È come se Tam stesse conservando buio per dopo.
        #JNSQscience_evaReport_TamInSpaceLowPockmarks_00 = Da quassù le cavità si confondono in un disegno lentigginoso. Ti chiedi chi abbia "testato" la superficie con tanta scrupolosità.
        #JNSQscience_evaReport_TamInSpaceHigh_00 = Da molto in alto, Tam è solo un sassolino segnato nel nero. Riesce comunque a sembrare cattivo.
        #JNSQscience_evaReport_HamekSrfLandedLowlands_00 = I tuoi stivali si sollevano coperti da una polvere rossa ostinata. Qualunque cosa componga Hamek, sembra voler venire con te.
        #JNSQscience_evaReport_HamekSrfLandedMidlands_00 = Le pianure oscillano tra crosta chiara e macchie rugginose. Segnali il colore come "scientificamente confuso".
        #JNSQscience_evaReport_HamekSrfLandedHighlands_00 = Le colline sembrano dure e antiche sotto i piedi. Picchietti una dorsale e decidi che non è di buon umore.
        #JNSQscience_evaReport_HamekSrfLandedPoles_00 = I poli sono più luminosi e puliti, come se qui il pianeta avesse provato a ripulirsi. Non ha funzionato del tutto.
        #JNSQscience_evaReport_HamekInSpaceLowLowlands_00 = I bassopiani si spalmano in ampie chiazze rosse sotto di te. Controlli comunque la tuta per eventuali perdite di vernice.
        #JNSQscience_evaReport_HamekInSpaceLowMidlands_00 = Dall'orbita bassa, le pianure sembrano due mondi mescolati e lasciati senza mescolare. Prendi appunti e ti allontani.
        #JNSQscience_evaReport_HamekInSpaceLowHighlands_00 = Le colline mostrano spigoli netti e toni più scuri. Sembrano abbastanza robuste da sopravvivere alle tue opinioni.
        #JNSQscience_evaReport_HamekInSpaceLowPoles_00 = I poli brillano chiari contro il corpo rosso, come punteggiatura ghiacciata. Lo annoti come "accenti freddi".
        #JNSQscience_evaReport_HamekInSpaceHigh_00 = Hamek sta sotto come una moneta rossa nello spazio profondo. Sembra sbagliato in un modo che pare importante.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_00 = Il terreno sembra confezionato sottovuoto dal freddo e dal tempo. I tuoi stivali fanno un suono che quasi riesci a sentire attraverso la tuta.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_01 = L'aria è abbastanza densa da opporsi, ma troppo fredda per essere amichevole. Fai un respiro e ti ricordi che non puoi.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_02 = L'orizzonte è un lungo, piatto promemoria di quanto sei lontano da qualunque piano di soccorso. Saluti lo stesso, per sicurezza.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_03 = Provi a sollevare un po' di polvere per la telecamera, ma si affloscia e si posa. Anche la terra qui sembra stanca.
        #JNSQscience_evaReport_NaraSrfLandedMidlands_00 = Il terreno ondula come onde congelate sotto un cielo pesante. All'improvviso apprezzi quanto fosse piacevole "noioso".
        #JNSQscience_evaReport_NaraSrfLandedMidlands_01 = I giunti della tuta scricchiolano come se stessero presentando un reclamo. Lo annoti come "normale, probabilmente".
        #JNSQscience_evaReport_NaraSrfLandedMidlands_02 = L'aria densa fa sembrare tutto più vicino di quanto sia, cosa davvero scortese. Segni una cresta lontana come "non camminarci fino".
        #JNSQscience_evaReport_NaraSrfLandedMidlands_03 = Ti senti osservato da niente in particolare. È un tipo di inquietudine molto efficiente.
        #JNSQscience_evaReport_NaraSrfLandedHighlands_00 = Qui in alto il vento ha i denti, anche con tutta questa pressione. Trova ogni fessura che speravi fosse ermetica.
        #JNSQscience_evaReport_NaraSrfLandedHighlands_01 = Il terreno che scintilla nella lampada non è tanto bello quanto appuntito. Decidi di non cadere.
        #JNSQscience_evaReport_NaraSrfLandedHighlands_02 = Il cielo ha un aspetto spento e slavato, come se il sistema si fosse dimenticato di caricare le texture luminose. Annota: "Ancora terrificante".
        #JNSQscience_evaReport_NaraSrfLandedHighlands_03 = Ogni passo sembra storico, e anche una pessima idea. Registri entrambe le sensazioni per l'archivio.
        #JNSQscience_evaReport_NaraSrfLandedMountains_00 = Le cime incombono come se reggessero l'intero cielo. Non ti fidi, ma rispetti lo sforzo.
        #JNSQscience_evaReport_NaraSrfLandedMountains_01 = Non riesci a capire se l'aria stia cercando di attutirti o di soffocarti. La tuta vota "soffocarti".
        #JNSQscience_evaReport_NaraSrfLandedMountains_02 = Da qui i bassopiani sembrano infiniti e il viaggio di ritorno sembra teorico. Scatti una foto lo stesso.
        #JNSQscience_evaReport_NaraSrfLandedMountains_03 = La visiera si appanna per un attimo e vai nel panico, poi capisci che sei solo tu a essere drammatico. Lo annoti anche questo.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_00 = Il freddo è così intenso da sembrare organizzato. Sospetti che abbia un calendario.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_01 = Il terreno ha una crosta liscia che ti sfida a romperla. Rifiuti e trascini i piedi con educazione.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_02 = Le tue impronte non sembrano impronte, sembrano prove. Ti affretti a farne qualcuna in più.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_03 = Il vento trascina brina fine sulla superficie come fumo che ha dimenticato come si sale. È ipnotico e allarmante.
        #JNSQscience_evaReport_NaraSrfLandedPoles_00 = La bussola si comporta bene, il cielo no. Guardi deboli tende di luce e ti senti molto piccolo dentro una tuta molto costosa.
        #JNSQscience_evaReport_NaraSrfLandedPoles_01 = Le note ufficiali di missione dicono "portare scarpine rosse". Controlli gli stivali due volte e decidi di tenere i piedi uniti, per sicurezza.
        #JNSQscience_evaReport_NaraSrfLandedPoles_02 = Il freddo qui non è solo basso, è compiaciuto. Scrivi "freddo compiaciuto ai poli" nel registro.
        #JNSQscience_evaReport_NaraSrfLandedPoles_03 = Alzi il braccio per indicare qualcosa e la tuta resiste, come se temesse che ti vengano idee. Ha ragione.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_00 = Le creste polari alte tagliano il vento in fette nette e affilate. Vorresti chiedere un'indennità di rischio retroattiva.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_01 = La superficie scricchiola sotto i piedi, poi lentamente torna al suo posto. Anche il terreno vuole dimenticare che sei stato qui.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_02 = Guardi un mondo congelato che non si cura delle bandiere. Ne pianti una lo stesso, perché è quello che fai.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_03 = Il ritardo radio rende ogni frase come un messaggio in bottiglia. Continui a parlare perché non vinca il silenzio.
        #JNSQscience_evaReport_NaraFlyingLowLowlands_00 = Ti aggrappi alla scaletta mentre l'aria densa rimbomba passando come un oceano arrabbiato. Riporti: "EVA: ventoso in modo davvero convinto".
        #JNSQscience_evaReport_NaraFlyingLowLowlands_01 = Il freddo fa sembrare la tuta come se si stesse restringendo attorno a te. Cerchi di non immaginare cosa stia facendo al velivolo.
        #JNSQscience_evaReport_NaraFlyingLowLowlands_02 = Il terreno sotto scorre lento, come se Nara fosse riluttante a mostrarti qualcosa troppo in fretta. Sei d'accordo con il ritmo.
        #JNSQscience_evaReport_NaraFlyingLowLowlands_03 = Scariche di staticità crepitano sulla visiera e assapori la paura attraverso l'auricolare. Annota "possibile attività elettrica".
        #JNSQscience_evaReport_NaraFlyingLowMidlands_00 = L'atmosfera densa ti tira le braccia come se volesse trattenerti. Decidi di essere molto aerodinamico e molto immobile.
        #JNSQscience_evaReport_NaraFlyingLowMidlands_01 = Il cielo è pallido e pesante, e il tuo respiro è rumoroso nel casco. Fingi che sia sicurezza.
        #JNSQscience_evaReport_NaraFlyingLowMidlands_02 = Guardi in basso e capisci che un "saltino breve" su Nara significa comunque essere molto lontano dal lander. Ti tieni più forte.
        #JNSQscience_evaReport_NaraFlyingLowMidlands_03 = Il ghiaccio si forma sui raccordi esposti in pochi secondi. Aggiungi "non leccare nulla" alla lista di controllo EVA.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_00 = L'aria è turbolenta sopra le creste e rimbalzi come una bandiera in tempesta. Ti ricordi che non sei, in effetti, una bandiera.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_01 = Il freddo morde i guanti attraverso i riscaldatori della tuta. Lo fissi con rabbia, non serve ma sembra scientifico.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_02 = Le montagne sotto sembrano aspettare gli errori. Riporti nessun errore. Nessuno, proprio.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_03 = I ping radio arrivano in ritardo, come se il Controllo Missione chiamasse da un'altra vita. Rispondi lo stesso.
        #JNSQscience_evaReport_NaraFlyingLowMountains_00 = Restare fuori da un velivolo in volo sopra le montagne di Nara sembra un'impresa audace e un errore di burocrazia. Registri entrambe le cose.
        #JNSQscience_evaReport_NaraFlyingLowMountains_01 = Il vento prova a staccarti dalla scaletta con una sicurezza professionale. Tu rifiuti con una testardaggine da dilettante.
        #JNSQscience_evaReport_NaraFlyingLowMountains_02 = Le cime sfrecciano sotto di te come onde congelate, e per un attimo ti dimentichi dov'è "su". Decidi di non dirlo.
        #JNSQscience_evaReport_NaraFlyingLowMountains_03 = Il velivolo trema nell'aria densa e tu diventi intimamente familiare con ogni appiglio. Ne battezzi uno "Speranza".
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_00 = L'aria bassa polare è densa, fredda e piena di cristalli fini che ticchettano sulla visiera. Sembra un piccolo applauso per decisioni sbagliate.
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_01 = Riesci a vedere la tua ombra nella foschia e sembra preoccupata quanto te. Le fai un cenno per il morale.
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_02 = La superficie sotto è liscia in un modo che suggerisce non sia mai stata disturbata. Ti scusi per il sorvolo.
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_03 = Il freddo rende il mondo monocromatico, e gli strumenti fanno lo stesso con il tuo umore. Tieni il rapporto breve.
        #JNSQscience_evaReport_NaraFlyingLowPoles_00 = Il cielo vicino al polo sfarfalla appena e l'elettronica della tuta si lamenta in coro. Gli dici che non stanno aiutando.
        #JNSQscience_evaReport_NaraFlyingLowPoles_01 = L'atmosfera preme, la temperatura schiaccia e la tua presa stringe di più. Annota "tripla pressione".
        #JNSQscience_evaReport_NaraFlyingLowPoles_02 = Non capisci se quello strano bagliore sia un'aurora o solo la tua visiera che sta facendo qualcosa di nuovo. Chiedi con garbo che smetta.
        #JNSQscience_evaReport_NaraFlyingLowPoles_03 = Ogni risposta alle comunicazioni torna in ritardo, come se dovesse attraversare prima il freddo. Inizi a parlare più lentamente, per rispetto.
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_00 = Il vento sopra le creste polari ti colpisce in raffiche che sembrano misurate e cattive. Riporti "ostilità altamente ottimizzata".
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_01 = Cristalli di ghiaccio sfrecciano come stelle lente e, per un secondo, ti dimentichi di essere in atmosfera. Poi la scaletta vibra e te lo ricordi.
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_02 = Il terreno sprofonda sotto pendii frastagliati e senti nello stomaco la dimensione del pianeta. Tieni entrambe le mani sul velivolo.
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_03 = Il riscaldatore della tuta lavora senza sosta e perde comunque la discussione. Consigli "più riscaldamento" come scienza futura.
        #JNSQscience_evaReport_NaraFlyingHigh_00 = Quassù il cielo è quasi nero e il sole è solo un promemoria tagliente che il calore esiste da qualche altra parte. Ti senti molto lontano da quel posto.
        #JNSQscience_evaReport_NaraFlyingHigh_01 = L'aria si dirada, ma non ti lascia mai davvero andare. Nara sembra deciso a tenerti una mano sulla spalla.
        #JNSQscience_evaReport_NaraFlyingHigh_02 = La curvatura del pianeta è visibile sotto di te, enorme e silenziosa. Ti rendi conto di quanto ci vorrebbe a cadere e decidi di non farlo.
        #JNSQscience_evaReport_NaraFlyingHigh_03 = Dici una frase completa e aspetti la risposta, contando i secondi come se fossero una risorsa. Lo sono.
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_00 = Dall'orbita inferiore i bassopiani sembrano un foglio ghiacciato tirato a coprire segreti. Noti che non c'è nulla che assomigli a una zona di atterraggio facile.
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_01 = La foschia dell'atmosfera si aggrappa alla superficie, spessa persino da qui. La registri come "ostinata".
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_02 = La luce del sole è debole e radente, e le ombre durano per sempre. Non ti piace quanto bene questo si adatti all'umore della missione.
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_03 = Saluti la traccia del lander e ti chiedi se sia ancora lì. A questa distanza, "ancora lì" sembra un lusso.
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_00 = Le pianure mostrano lunghe creste e fasce appena accennate, come se il pianeta stesse cercando di ricordarsi come si fa a essere attivo. Consigli di fissare più a lungo.
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_01 = Provi a individuare il tuo sito di atterraggio e capisci quanto sia facile perdere qualunque cosa su un mondo così grande. Compreso te stesso.
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_02 = L'atmosfera sfuma i dettagli in una minaccia morbida. Annota: "alta pressione, bassa visibilità, alta preoccupazione".
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_03 = Il ritardo radio fa sembrare l'orbita ancora più silenziosa di quanto sia. Riporti "silenzio in aumento".
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_00 = Le colline proiettano ombre nette attraverso la foschia, come denti dietro un vetro smerigliato. Decidi di non usare la parola "denti" nel rapporto ufficiale.
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_01 = Il terreno sembra abbastanza aspro da mettere alla prova gambe di atterraggio e sicurezza in egual misura. Suggerisci di portare ricambi per entrambe.
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_02 = Guardi la luce del sole strisciare sulle creste con un'andatura ostinata. Qui fuori il tempo sembra più pesante della gravità.
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_03 = Il pianeta riempie il finestrino, e Kerbin riempie i tuoi pensieri. Quest'ultima parte la lasci fuori dal registratore.
        #JNSQscience_evaReport_NaraInSpaceLowMountains_00 = Le montagne si alzano come onde congelate che cercano di fuggire dall'atmosfera. Ammetti che sono impressionanti, e poi rabbrividisci.
        #JNSQscience_evaReport_NaraInSpaceLowMountains_01 = Persino dall'orbita, le cime sembrano ostili all'atterraggio e amiche dello schianto. Le evidenzi come "pericoli fotogenici".
        #JNSQscience_evaReport_NaraInSpaceLowMountains_02 = L'aria è abbastanza spessa da addolcire i contorni di tutto, tranne la sensazione di distanza. Quella resta nitida.
        #JNSQscience_evaReport_NaraInSpaceLowMountains_03 = Conti i minuti fino alla prossima finestra di comunicazione come se fosse ossigeno. Hai ossigeno. Eppure sembra ossigeno.
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari sono una ciotola pallida di freddo con un coperchio di foschia. Riesci quasi a sentire la pressione attraverso il finestrino.
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_01 = Il riflesso del sole è debole e le ombre sono forti. Etichetti la regione "ottima per nascondersi, pessima per vivere".
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_02 = Vedi striature che potrebbero essere brina spinta dal vento. Ti ricordi di essere stato là fuori e decidi che l'orbita va benissimo.
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_03 = Il paesaggio sembra intatto, come un'esposizione museale intitolata "Vietato entrare". Tu sei entrato lo stesso.
        #JNSQscience_evaReport_NaraInSpaceLowPoles_00 = Il polo ha deboli luccichii che rendono felici gli strumenti e nervoso l'equipaggio. Riporti "scientificamente incoraggiante, emotivamente no".
        #JNSQscience_evaReport_NaraInSpaceLowPoles_01 = La foschia sopra il polo ha una lucentezza strana, come se l'atmosfera trattenesse il respiro. Ti ritrovi a fare lo stesso.
        #JNSQscience_evaReport_NaraInSpaceLowPoles_02 = La regione polare sembra ingannevolmente liscia finché le ombre non rivelano un rilievo netto. Nara è bravo con le sorprese.
        #JNSQscience_evaReport_NaraInSpaceLowPoles_03 = Provi a individuare le tue impronte dall'orbita e ridi di te stesso. La risata riecheggia nella cabina più a lungo del dovuto.
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_00 = Le colline polari sembrano vetro frantumato sotto una luce fioca. Consigli di non pattinarci.
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_01 = Da questa quota, le creste sembrano ordinate, quasi a motivo. Non ti piace quanto sembri intenzionale.
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_02 = Il sole è lontano, il pianeta è enorme e tu sei una piccola macchina in un grande oceano nero. Archivi il pensiero sotto "impressioni EVA".
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_03 = Le ombre sul terreno polare alto sono così lunghe da sembrare permanenti. Suggerisci lampade migliori e più coraggio.
        #JNSQscience_evaReport_NaraInSpaceHigh_00 = Dall'orbita alta, Nara sembra meno una destinazione e più una decisione che non puoi annullare. Fissi finché la cabina non sembra più piccola.
        #JNSQscience_evaReport_NaraInSpaceHigh_01 = Il sole è un punto luminoso che non scalda affatto il tuo casco. Registri: "Confermato: la distanza è reale".
        #JNSQscience_evaReport_NaraInSpaceHigh_02 = La sezione "scarpette rosse" del manuale è ancora poco utile. Controlli il vuoto sotto di te, e confermi che non se ne vede nessuna.
        #JNSQscience_evaReport_NaraInSpaceHigh_03 = La foschia del pianeta da qui è un anello sottile, un promemoria che anche il vuoto può avere peso. Tieni il cavo di sicurezza agganciato due volte.
        #JNSQscience_evaReport_AmosSrfLandedLowlands_00 = Il terreno è abbastanza scuro da far sentire timida la luce del casco. Gli stivali lasciano graffi chiari che sembrano sospettosamente delle prove.
        #JNSQscience_evaReport_AmosSrfLandedMidlands_00 = Ogni passo solleva una polvere sottile, fumosa, che si rifiuta di posarsi in fretta. Amos sembra deciso a tenere i suoi segreti in sospensione.
        #JNSQscience_evaReport_AmosSrfLandedHighlands_00 = Le creste sono affilate e le ombre lo sono ancora di più. Continui a guardarti alle spalle, nel caso il terreno stia guardando te.
        #JNSQscience_evaReport_AmosSrfLandedMountains_00 = La bassa gravità trasforma ogni saltello in un piccolo giro di vittoria. Il panorama è grandioso, cupo e del tutto disinteressato alle tue emozioni.
        #JNSQscience_evaReport_AmosSrfLandedPoles_00 = La luce qui sembra sbagliata, come se fosse arrivata tardi e stesse cercando di recuperare. Batti i piedi per ricordare all'universo che nella tuta sei ancora caldo.
        #JNSQscience_evaReport_AmosInSpaceLowLowlands_00 = Fluttuando sopra i bassopiani, la superficie sembra inchiostro versato con graffi appena visibili. Ti chiedi se Amos sia in realtà una lavagna gigantesca.
        #JNSQscience_evaReport_AmosInSpaceLowMidlands_00 = Da qui le pianure mostrano fasce sottili e segni d'usura, come se qualcuno avesse provato a lucidare la luna con carta vetrata. Scrivi "carattere abrasivo" nel rapporto.
        #JNSQscience_evaReport_AmosInSpaceLowHighlands_00 = Le colline scorrono sotto di te in contrasti durissimi. La radio della tuta crepita e tu fai finta che sia solo staticità.
        #JNSQscience_evaReport_AmosInSpaceLowMountains_00 = Le montagne proiettano ombre lunghe e drammatiche che ti fanno sentire minuscolo. Le saluti lo stesso, perché il coraggio è soprattutto teatro.
        #JNSQscience_evaReport_AmosInSpaceLowPoles_00 = Sopra i poli, Amos appare più liscio e ancora più scuro, come se stesse svanendo nello spazio di proposito. Stringi la presa sul corrimano e lo chiami "raccolta dati".
        #JNSQscience_evaReport_AmosInSpaceHigh_00 = Amos si riduce a un sassolino color carbone contro il cielo nero, e Nara domina tutto. All'improvviso apprezzi quanto sia utile che le astronavi abbiano delle pareti.
        #JNSQscience_evaReport_EnonSrfLandedLowlands_00 = Il suolo è così luminoso da farti strizzare gli occhi dietro la visiera. Scricchiola sotto i piedi come zucchero congelato, e subito vorresti assaggiarlo (non lo fai).
        #JNSQscience_evaReport_EnonSrfLandedMidlands_00 = La superficie è un mosaico di crosta dura e granelli sciolti che scintillano alla luce. Scatti una foto e sembra comunque solo "bianco".
        #JNSQscience_evaReport_EnonSrfLandedHighlands_00 = Le colline sono come stare su un oceano ghiacciato che ha dimenticato come muoversi. Il silenzio è così totale da sembrare un altro strato di ghiaccio.
        #JNSQscience_evaReport_EnonSrfLandedPoles_00 = Il terreno polare è dolorosamente intatto, rotto solo dalle tue impronte goffe. Ti scusi con il paesaggio a voce alta, nel dubbio.
        #JNSQscience_evaReport_EnonInSpaceLowLowlands_00 = Con un breve salto sopra Enon, i bassopiani si stendono come una pagina bianca. Ti rendi conto che tu sei la prima macchia.
        #JNSQscience_evaReport_EnonInSpaceLowMidlands_00 = Le pianure mostrano texture appena accennate e cicatrici poco profonde sotto l'abbaglio. Le "caratteristiche" di Enon sono discrete, ma ti stanno decisamente giudicando.
        #JNSQscience_evaReport_EnonInSpaceLowHighlands_00 = Le colline brillano come ghiaccio scolpito sotto una lampada. Ruoti lentamente per non fissare troppo a lungo quel bianco infinito.
        #JNSQscience_evaReport_EnonInSpaceLowPoles_00 = Sopra i poli, la luminosità scende in lunghe ombre blu. Il display della temperatura della tuta diventa la tua lettura preferita.
        #JNSQscience_evaReport_EnonInSpaceHigh_00 = Enon diventa una moneta pallida nel vuoto, quasi troppo pulita per essere vera. Molto più sotto, Nara sembra l'unica cosa con una personalità.
        #JNSQscience_evaReport_PraxSrfLandedLowlands_00 = Le pianure sono vuote in un modo che ti fa sentire un intruso. Pianti gli stivali con cura, come se la polvere potesse protestare.
        #JNSQscience_evaReport_PraxSrfLandedMidlands_00 = Le pianure sono ruvide e irregolari, piene di piccole creste che ti agganciano le punte a metà saltello. Lo registri come "eccellente per forgiare il carattere".
        #JNSQscience_evaReport_PraxSrfLandedHighlands_00 = Le colline si estendono come un cantiere incompiuto. Prax sembra assemblato con pezzi di scorta, ma regge insieme in modo sorprendente.
        #JNSQscience_evaReport_PraxSrfLandedMountains_00 = Su nelle montagne, ogni salto rischia di trasformarsi in un volo accidentale. Decidi di tenere almeno una mano vicina al terreno in ogni momento.
        #JNSQscience_evaReport_PraxSrfLandedPoles_00 = I poli sembrano il bordo di una mappa molto fredda. Guardi fuori e capisci perché lo chiamano un mondo di confine.
        #JNSQscience_evaReport_PraxInSpaceLowLowlands_00 = In sospensione sopra i bassopiani, Prax sembra solitario e poco decorato. Valuti di disegnare una faccina nella polvere, poi ti ricordi "scienza".
        #JNSQscience_evaReport_PraxInSpaceLowMidlands_00 = Da appena sopra le pianure, la superficie mostra fasce consumate e piccole fratture nella crosta. Sembra che Prax ne abbia passate parecchie e non abbia mai scritto a casa.
        #JNSQscience_evaReport_PraxInSpaceLowHighlands_00 = Le colline scorrono sotto di te come onde di pietra consumata. Ti viene un impulso strano di seguire ogni linea, anche se la tuta è fortemente contraria.
        #JNSQscience_evaReport_PraxInSpaceLowMountains_00 = Sopra le montagne, il terreno diventa frastagliato e drammatico, come se cercasse di sembrare importante accanto a Nara. Ci riesce un po'.
        #JNSQscience_evaReport_PraxInSpaceLowPoles_00 = Sopra i poli, le ombre si fanno più profonde e l'orizzonte sembra più lontano del dovuto. Annota che ti serve una parola migliore di "remoto".
