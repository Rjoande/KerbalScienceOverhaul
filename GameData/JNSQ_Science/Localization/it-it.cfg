        #JNSQscience_bd_multiSpec_TamInSpaceLowTwinCraters_00 = I crateri gemelli mostrano impronte di ejecta a contrasto, come se due impatti diversi avessero scavato in due strati diversi. Il composito sembra un esperimento controllato che nessuno ha controllato.
