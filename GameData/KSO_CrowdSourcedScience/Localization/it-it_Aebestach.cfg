        //   Dres
        #CSS_Aebestach_mysteryGoo_Dres_01 = La melma trema: risposta viscoelastica al freddo, o paura istintiva di questo solitario pianeta nano? Il rapporto riporta "replica in sospeso".
        #CSS_Aebestach_mysteryGoo_Dres_02 = Poli di Dres. La melma si congela.
        #CSS_Aebestach_mysteryGoo_Dres_03 = Pianure di Dres. Melma grigia.
        #CSS_Aebestach_mysteryGoo_Dres_04 = Bassopiani di Dres. Melma piatta.
        #CSS_Aebestach_mysteryGoo_Dres_05 = Colline di Dres. Melma collinare.
        #CSS_Aebestach_mysteryGoo_Dres_06 = Piroclasti da impatto di Dres. Melma tra i piroclasti.
        #CSS_Aebestach_mysteryGoo_Dres_07 = Orbita bassa di Dres. Melma in orbita attorno al pianeta nano.
        //   Vall
        #CSS_Aebestach_mysteryGoo_Vall_01 = Melma nel bioma di Vall: una strana sfumatura bianco-azzurra nel freddo di questo mondo di ghiaccio, forse nucleazione di cristalli di ghiaccio o diffusione della luce. Melma da mondo ghiacciato, mistero scientifico.
        //   Tylo
