        #JNSQscience_mobileMaterialsLab_MohoSrfLandedCraters_00 = La polvere fine scivola nelle cerniere e diventa all'istante un nuovo composto abrasivo. Il vano ora macina con sicurezza.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedCraters_01 = I detriti d'impatto nei vassoi mostrano fratture da shock e granuli fusi. Il laboratorio lo chiama "geologia prefrantumata, leggermente tostata".
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedExoticCraters_00 = Un campione torna con una lucentezza vetrosa, come se il cratere avesse provato a glassarlo. Il pacchetto sensori insiste che non sia vernice.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedExoticCraters_01 = Il ciclo termico fa arricciare e torcere le strisce di test in motivi strani. Giureresti che il cratere lo faccia apposta.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedRareCraters_00 = Schegge dall'aspetto fresco mostrano rotture pulite e spigoli affilati. Il laboratorio è felice di trovare qualcosa che Moho non abbia ancora trasformato in scorbutica usura.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedRareCraters_01 = I vassoi rilevano tracce di volatili intrappolati tra le macerie, come se il cratere avesse imbottigliato un segreto per un attimo prima che il calore lo rubasse.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedVoronoiCraters_00 = I campioni si spaccano lungo linee ordinate, in linea con la strana tassellatura del terreno. Persino i materiali preferiscono cedere con geometria.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedVoronoiCraters_01 = Il riscaldamento ripetuto lascia un nido d'ape di microfratture nelle ceramiche. Il laboratorio registra "stress a pattern" e va in silenzioso panico.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedNotableCraters_00 = Il vano segnala una spessa coltre di detriti fusi e poi raffreddati di colpo. Il cratere sembra orgoglioso della sua capacità di riorganizzare la materia con violenza.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedNotableCraters_01 = Diversi materiali raccolgono una fine polvere metallica che si attacca a tutto. Ora hai "scienza luccicante" in ogni compartimento.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedPeaks_00 = Schegge di roccia densa fanno ricontrollare i sensori di massa. Il laboratorio conclude che queste cime hanno "radici" di tutto rispetto.
        #JNSQscience_mobileMaterialsLab_MohoSrfLandedPeaks_01 = I vassoi vibrano per la continua oscillazione di temperatura tra sole e ombra. L'esperimento sta soprattutto scoprendo cosa sopravvive su un fornello gigante.
        #JNSQscience_mobileMaterialsLab_EveSrfLandedKrakensWell_00 = I materiali restano sotto una strana foschia statica. Gli adesivi si staccano lentamente, come se avessero paura del palcoscenico.
        #JNSQscience_mobileMaterialsLab_EveSrfLandedKrakensWell_01 = Alcuni campioni sviluppano crepe sottilissime che non corrispondono ai registri di temperatura o pressione. Le etichetti "poco utili".
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedShores_00 = Alcuni campioni galleggiano con sicurezza per un attimo, poi si inzuppano e affondano come sassi. Eve ama le sorprese.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedPolarLakes_00 = Il lago più freddo rallenta le reazioni, ma non di molto. Qui la corrosione è semplicemente più paziente.
