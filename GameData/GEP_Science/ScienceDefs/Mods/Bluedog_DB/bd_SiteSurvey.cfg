@EXPERIMENT_DEFINITION:HAS[#id[bd_SiteSurvey]]
{
    %RESULTS
    {
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedMagmaShores_00 // The shoreline glows like a warning label under Grannus’ dim red light. Mission Control suggests we label this site “Maybe Later.”
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedScorchedLowlands_00 // The ground looks flat enough, but the heat shimmer turns every boulder into a mirage. You mark the “safe” zone with a very large question mark.
        TaranisSrfLandedMidlands* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedMidlands_00 // Ridges and troughs crisscross the area like a cracked heat shield. The survey recommends a landing leg upgrade and a faster upload window.
        TaranisSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedHighlands_00 // Jagged slopes throw long shadows that make distance judging a guessing game. The site gets a high score for “interesting,” and a low score for “upright.”
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedDarkSideMidlands_00 // In the permanent night, the terrain is calm, still, and suspiciously unhelpful to cameras. The notes read: “Bring more lights. And patience.”
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedDarkSideHighlands_00 // The mountains are just silhouettes against a faint red horizon, like teeth in the dark. You flag several “perfectly shaped” landing spots that are probably cliffs.
        TaranisSrfLandedPoles* = #GEPscience_bd_SiteSurvey_TaranisSrfLandedPoles_00 // Frosty flats meet sharp ridges with no warning, and the light never quite behaves. The survey concludes: “Choose a site by instrument, not by mood.”
        TaranisSrfSplashedMagmaSea* = #GEPscience_bd_SiteSurvey_TaranisSrfSplashedMagmaSea_00 // The “splash zone” is a glowing liquid problem that tries to eat your confidence. The site is approved only for unmanned enthusiasm.
        TaranisSrfSplashedMagmaShores* = #GEPscience_bd_SiteSurvey_TaranisSrfSplashedMagmaShores_00 // Your camera catches bubbling edges and collapsing crust like slow-motion fireworks. The survey suggests operations from a respectful distance, preferably another biome.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedSunnyLowlands_00 // The sunward lowlands look smooth until you notice the ripples are actually sharp ridges. You tag the area as “landable if you enjoy surprises.”
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedSunnyHighlands_00 // Bright glare washes out details and makes the slopes look friendlier than they are. The recommendation: land elsewhere, then hike in with sunglasses.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedTransitionalLowlands_00 // Here the shadows finally behave, and the ground looks honestly flat for once. The survey stamps it “promising,” which is as close as it gets to praise.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedTransitionalHighlands_00 // A patchwork of rock and dust forms neat terraces, like the planet tried organizing itself. The site is suitable, assuming your comms window agrees.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedDarkSideLowlands_00 // Cold darkness turns every dip into a pit and every bump into a mystery. The survey notes: “If you can’t see it, you can’t trip over it… probably.”
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedDarkSideHighlands_00 // The highlands rise into black sky with faint red twilight on the peaks. You mark the best site by radar overlay and a strong sense of humility.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedSoutheasternMountains_00 // Knife-edge ridges cut across the terrain like someone crumpled the crust. The camera finds one flat patch and immediately loses it in shadow.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedWesternMountains_00 // Broad shoulders of rock offer occasional plateaus between steep drops. The site survey recommends a plateau, and a backup plateau, and a backup to the backup.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_SiteSurvey_ToutatisSrfLandedDarkSideMountains_00 // The mountains are tall, cold, and unreasonably dramatic under Grannus’ red glow. The safe zones are small, and the comm delay makes them feel smaller.

        NodensSrfLandedShores* = #GEPscience_bd_SiteSurvey_NodensSrfLandedShores_00 // The coastline looks inviting in a familiar way, until the wave patterns don’t match your instincts. The site is rated excellent for bases, and excellent for second thoughts.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_NodensSrfLandedTropicalLowlands_00 // Dense haze and bright ground cover make the terrain hard to read from a distance. The survey recommends landing on the clearest patch and pretending it was planned.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_NodensSrfLandedTemperateLowlands_00 // Gentle hills and open flats show up clearly in the images, a rare kindness this far from home. The site is flagged “ideal,” with an asterisk about local weather moods.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_NodensSrfLandedTropicalMidlands_00 // The midlands are broken up by ridgelines that could hide anything from boulders to disappointment. You approve a site with good drainage and better line-of-sight.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_NodensSrfLandedTemperateMidlands_00 // Rolling terrain offers stable-looking platforms and sensible approaches. The survey suggests this region for long-term work—assuming the planet agrees with us.
        NodensSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_NodensSrfLandedHighlands_00 // The highlands are rugged, but the rock looks solid and the horizons are wide. You mark a plateau for science, and a nearby slope for regret.
        NodensSrfLandedTundra* = #GEPscience_bd_SiteSurvey_NodensSrfLandedTundra_00 // Pale ground and long shadows make subtle dips look deep and deep dips look endless. The survey recommends bright markers, warm gloves, and very clear landing rules.
        NodensSrfLandedIceCaps* = #GEPscience_bd_SiteSurvey_NodensSrfLandedIceCaps_00 // The ice reflects Grannus’ red light into a weird pink glare that tricks the cameras. The site is usable, but only if you like your navigation with extra doubt.
        NodensSrfSplashedSaltySeas* = #GEPscience_bd_SiteSurvey_NodensSrfSplashedSaltySeas_00 // The surface looks calm, but the chop patterns suggest strong winds just out of frame. The survey marks it as a good splashdown area, and a bad place to drop tools.
        NodensSrfSplashedFreshWater* = #GEPscience_bd_SiteSurvey_NodensSrfSplashedFreshWater_00 // The water is dark and glassy, broken by small ripples that don’t behave like home. The site is approved for sampling—fast sampling, before something changes its mind.
        NodensSrfSplashedShores* = #GEPscience_bd_SiteSurvey_NodensSrfSplashedShores_00 // Shallows and sandbars show up clearly, which is comforting and also suspicious. The survey recommends anchoring farther out and walking in like you meant to.

        BelisamaSrfLandedFlats* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedFlats_00 // The flats look deceptively smooth in the viewfinder, with Nodens hanging motionless over the same horizon. You mark several “excellent” pads and note the comm delay makes second-guessing mandatory.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTropicalLowlands_00 // Darker ground here soaks up what little warmth the red sun offers, but it also hides shallow ruts. The site is rated “workable,” assuming we stop calling anything “tropical.”
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTemperateLowlands_00 // A broad, pale plain stretches out like a blank checklist waiting to fail. The images come back clean, which is almost more unsettling than the hazards.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTropicalMidlands_00 // Rolling rises break line-of-sight every few hundred meters, perfect for surprises and awkward relay angles. You flag a ridge-top outpost site and add “bring bigger antenna” in bold.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTemperateMidlands_00 // The terrain looks stable, but the shadows never move the way your instincts expect under this dim red light. You annotate the safest route with “trust the instruments, not your eyes.”
        BelisamaSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedHighlands_00 // Sharp slopes and long, fixed horizons make distance hard to judge—everything looks closer and steeper at once. The survey recommends landing lower and climbing only if we feel heroic later.
        BelisamaSrfLandedPoles* = #GEPscience_bd_SiteSurvey_BelisamaSrfLandedPoles_00 // The poleward ground is cracked and glittering, like it can’t decide whether to be dust or ice. You approve a site with good visibility and a warning: “do not drop anything small.”

        SucellusSrfLandedBasins* = #GEPscience_bd_SiteSurvey_SucellusSrfLandedBasins_00 // The basin floor is flat enough for a base, but the radiation readouts are not interested in your comfort. You tag the site “excellent geology, limit loitering.”
        SucellusSrfLandedLowlands* = #GEPscience_bd_SiteSurvey_SucellusSrfLandedLowlands_00 // Fine regolith drifts into low spots and softens every edge in the camera, hiding what could be rocks or holes. The survey notes a safe corridor—and a strong desire for tread upgrades.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_SucellusSrfLandedTropicalMidlands_00 // These midlands are darker and slightly less cold, which is a suspicious kind of “nice” out here. You pick a site with good relay geometry and minimal time spent outside.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_SucellusSrfLandedTemperateMidlands_00 // The ridges are orderly, almost engineered, until you zoom in and see they’re just erosion being dramatic. You mark a plateau for operations and a fallback for when the plateau isn’t real.
        SucellusSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_SucellusSrfLandedHighlands_00 // The high ground gives you a wide view of a very empty world under a tired red sun. The images suggest solid footing, and the dosimeter suggests you keep moving anyway.
        SucellusSrfLandedPoles* = #GEPscience_bd_SiteSurvey_SucellusSrfLandedPoles_00 // The polar terrain reflects just enough light to confuse exposure settings and crew confidence. You approve a site based on radar shadows and write: “no hero poses during transmission windows.”

        CaireenSrfLandedLowlands* = #GEPscience_bd_SiteSurvey_CaireenSrfLandedLowlands_00 // The lowlands are a jumble of gravel and slabs, like a captured asteroid still trying to look casual. You identify one flat patch large enough for a lander, and two more for emergencies.
        CaireenSrfLandedMidlands* = #GEPscience_bd_SiteSurvey_CaireenSrfLandedMidlands_00 // The midlands roll in gentle waves that would be pretty if the comm delay didn’t make every correction feel late. You map a hop-by-hop route and label it “please don’t trip.”
        CaireenSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_CaireenSrfLandedHighlands_00 // From the highlands, Sucellus fills the sky like a silent supervisor, and the horizon drops away fast in low gravity. The survey recommends short EVAs and very firm tether policies.
        CaireenSrfLandedPoles* = #GEPscience_bd_SiteSurvey_CaireenSrfLandedPoles_00 // The poles are bright, brittle-looking, and dusted with something that refuses to behave like snow. You approve a site for sampling with the note: “touch lightly, leave quickly.”

        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedTropicalLowlands_00 // Targeted frames show a smooth-looking plain that turns out to be a quilt of scars under Grannus’ dim red light. The site is “acceptable,” with the usual warning about comm delays making panic unproductive.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedTemperateLowlands_00 // The camera picks out subtle ripples and shallow trenches that the eye keeps missing in the two-toned glare. You mark a landing ellipse and write: “trust instruments, not vibes.”
        AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedTropicalMidlands_00 // Ridges throw long shadows that refuse to match your intuition this far from home. The survey recommends approaching from the sunward side and keeping the antenna pointed like it’s your job.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedTemperateMidlands_00 // The midlands look stable until you zoom in and notice the “flat” bits are just smaller bumps. You approve one patch anyway, because sometimes you have to pick a place and stop staring.
        AirmedSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedHighlands_00 // The high ground offers spectacular views of Sirona hanging overhead, and equally spectacular ways to tip a lander. The site gets high marks for science and low marks for dignity.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedDarkenedLowlands_00 // In the darker terrain, everything blends into the same unhelpful shade of “maybe.” The imaging pass finds one reliable plateau and about twelve optical illusions.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedDarkenedMidlands_00 // This zone looks like it was scraped, cracked, and then left to cool without permission. You flag it for short visits only—mostly because you’d like to leave while the radios still agree.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedDarkenedHighlands_00 // Jagged silhouettes cut into the red twilight, and the shadows make slopes look friendly right up until the last pixel. The recommendation is simple: land lower and climb later.
        AirmedSrfLandedPoles* = #GEPscience_bd_SiteSurvey_AirmedSrfLandedPoles_00 // The polar ground glitters faintly and spikes the hazard map with tiny, sharp features. You approve a site for a quick stop, with a note about keeping exposure time short and schedules shorter.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalCraquelure_00 // The surface is split into a mosaic of plates like dried mud, except it’s cold and under a tired red sun. The survey labels it “structurally interesting” and “landing-leg hostile.”
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateCraquelure_00 // High-resolution shots reveal cracks that form neat polygons all the way to the horizon. You pick a plate big enough for the lander and politely ignore what might be underneath.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalLowlands_00 // Haze softens the view, but the imaging still catches broad flats between low ridges. The site is rated good, assuming the atmosphere doesn’t decide to demonstrate weather during the landing.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateLowlands_00 // Brown-beige terrain could be dust, could be ice pretending to be dust, could be something worse. The survey recommends a cautious touchdown and a sample scoop that doesn’t ask questions.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalMidlands_00 // Layered rises and shallow valleys make line-of-sight to relays a constant negotiation. You approve a ridge-top site and add: “schedule extra time for signal to catch up.”
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedTemperateMidlands_00 // The midlands look firm and gently rolling, almost comforting—until the red lighting turns depth cues into guesses. The site gets a cautious green check mark and a very bold “VERIFY.”
        BorvoSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedHighlands_00 // From up here, Borvo’s thin air and long horizons feel enormous and quiet. The survey suggests a highland outpost for comms and science, with the reminder that “big views don’t equal flat ground.”
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedMajorCraters_00 // The crater floors are tempting, but the rims are steep and the shadows are deep enough to hide a small space program. You pick a sunlit shelf and avoid the rest like it’s paperwork.
        BorvoSrfLandedPoles* = #GEPscience_bd_SiteSurvey_BorvoSrfLandedPoles_00 // The poles show smoother expanses broken by sharp, bright patches that don’t match any familiar frost. The site is approved for reconnaissance-first operations and “no heroic sprints.”

        DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedTropicalLowlands_00 // The lowlands are gray, pocked, and honest about being unfriendly. The imaging pass finds one flat pad-sized patch and immediately makes it the mission’s favorite.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedTemperateLowlands_00 // Fine debris collects in shallow basins, making the terrain look softer than it likely is. You mark a touchdown point and note that comm delay turns “minor correction” into “major life choice.”
        DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedTropicalMidlands_00 // Small ridges and craterlets create a lumpy landscape that feels unfinished. The survey recommends short hops, slow descents, and not trusting any shadow to be shallow.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedTemperateMidlands_00 // The midlands offer broad sightlines across a very empty world under dim red sun. You approve a site based on stability and the comforting lack of surprises—so far.
        DamonaSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedHighlands_00 // The highlands are rough, fractured, and eager to test your landing gear. The site gets a “maybe” rating, upgraded to “no” if you enjoy standing upright.
        DamonaSrfLandedImpactBasin* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedImpactBasin_00 // The basin’s scar dominates every frame, a reminder that this moon has history and it wasn’t gentle. You select a smooth interior stretch for sampling, with a note: “watch for ejecta blocks the size of regret.”
        DamonaSrfLandedPoles* = #GEPscience_bd_SiteSurvey_DamonaSrfLandedPoles_00 // Polar lighting turns the surface into a grayscale puzzle with missing pieces. The survey approves one conservative site and recommends leaving before the sky and radios drift out of sync again.

         EponaSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_EponaSrfLandedTropicalLowlands_00 // The “tropical” label does not survive first contact with the dim red daylight. The lowlands look flat and glassy, but the haze makes every shadow feel like a depth trap.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_EponaSrfLandedTemperateLowlands_00 // Broad plains stretch under a tired red sun, with faint methane haze softening the horizon. The site is workable—provided we land by instruments, not by eyeballing.
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_SiteSurvey_EponaSrfLandedTropicalUplands_00 // The uplands break into ridges and shallow troughs that play tricks with the weak light. You flag a few stable shelves and add a note: “comm delay makes last-second heroics illegal.”
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_SiteSurvey_EponaSrfLandedTemperateUplands_00 // The terrain looks firm, but the texture reads like crust over something that used to move. The survey recommends a conservative touchdown and minimal wandering.
        EponaSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_EponaSrfLandedHighlands_00 // From the highlands, everything looks frozen and ancient—until the thermal readouts whisper otherwise. You pick a plateau with clear relay lines and promise not to ask what’s under the ice.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_SiteSurvey_EponaSrfLandedGrandPeaks_00 // Needle-like peaks cast long, unhelpful shadows that never match your instincts this far from home. The “best” landing spot is the one that exists on radar and not just in your imagination.
        EponaSrfLandedCraters* = #GEPscience_bd_SiteSurvey_EponaSrfLandedCraters_00 // Crater floors are tempting, but the rims are steep and the lighting turns bowls into pits of uncertainty. You select a sunward shelf and label the rest “scenic hazard.”
        EponaSrfLandedVolcanoes* = #GEPscience_bd_SiteSurvey_EponaSrfLandedVolcanoes_00 // Dark vents and fractured ground suggest the planet still has opinions inside its frozen shell. The site is flagged for unmanned operations and very fast retreats.
        EponaSrfLandedPoles* = #GEPscience_bd_SiteSurvey_EponaSrfLandedPoles_00 // The polar glare is faintly pink and thoroughly misleading, turning gentle slopes into optical pranks. You approve one conservative site and write: “anchors, beacons, patience.”

        RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTropicalLowlands_00 // The name says “tropical,” the reality says “airless and sharp-edged.” The lowlands look smooth, but the radiation alarms keep insisting we don’t get comfortable.
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTemperateLowlands_00 // Flat expanses alternate with scattered blocks that could ruin a landing leg in silence. You mark a clean patch and schedule a short stay—because the sky offers no mercy here.
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTropicalMidlands_00 // The midlands are a messy mix of small ridges and shallow basins, all rendered in dim red twilight. The survey suggests hopping in, grabbing data, and leaving before doubt catches up.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTemperateMidlands_00 // A few broad terraces offer stable geometry and good line-of-sight to relays—if the rotation cooperates. You approve a terrace and add: “do not chase the sun, it won’t help.”
        RosmertaSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_RosmertaSrfLandedHighlands_00 // The high ground provides a wide view of emptiness and a stronger dose of “why are we here.” The site is viable, but only for crews who enjoy cold silence and long uplinks.
        RosmertaSrfLandedPoles* = #GEPscience_bd_SiteSurvey_RosmertaSrfLandedPoles_00 // Polar shadows are deep enough to hide entire boulders until the last second. You pick a bright, radar-confirmed pad and recommend extra lights for morale more than visibility.

        RAB-58ESrfLandedLowlands* = #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedLowlands_00 // In near-zero gravity, the lowlands look like a gentle landing—until you notice the surface is mostly loose debris. The survey recommends a slow descent and a firm promise not to sneeze.
        RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedEasternHighlands_00 // The eastern highlands are jagged, with slopes that feel exaggerated when the lighting is this dim and the comm delay is this real. You mark one stable spur and call it “good enough for science.”
        RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_SiteSurvey_RAB-58ESrfLandedWesternHighlands_00 // The western side looks like it was assembled from leftover rocks and stubbornness. The site gets a cautious approval, with the note: “tether everything, including confidence.”

        CernunnosSrfLandedTropicalLowlands* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTropicalLowlands_00 // The “tropical” tag feels like a joke told across interplanetary distances. The lowlands are cold, open, and deceptively flat under the red sun’s weak contrast.
        CernunnosSrfLandedTemperateLowlands* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTemperateLowlands_00 // Wide plains offer clean landing geometry and a strong sense of isolation. You approve a base site and note that the day-night cues here are more suggestion than schedule.
        CernunnosSrfLandedTropicalMidlands* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTropicalMidlands_00 // The midlands roll gently, but the shadows stretch long and refuse to explain their depths. The survey recommends radar-first navigation and no dramatic sprints during upload windows.
        CernunnosSrfLandedTemperateMidlands* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedTemperateMidlands_00 // A patchwork of low ridges and shallow basins gives good shelter but poor antenna angles. You pick a ridge-top pad and accept that “perfect” isn’t in this system.
        CernunnosSrfLandedHighlands* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedHighlands_00 // From the highlands, the horizon curves away into a dim red dusk that feels permanently late. The site is stable enough—if we remember that “flat” here means “flat-ish.”
        CernunnosSrfLandedSouthPolarHills* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedSouthPolarHills_00 // Knobby hills and brittle-looking ground create a maze of small hazards. You approve a single approach corridor and advise against improvising when Mission Control is minutes behind reality.
        CernunnosSrfLandedNorthPole* = #GEPscience_bd_SiteSurvey_CernunnosSrfLandedNorthPole_00 // The pole is bright, cold, and eerily quiet, like the world is holding its breath. You select a conservative landing pad and add: “leave markers, or become a marker.”
    }
}