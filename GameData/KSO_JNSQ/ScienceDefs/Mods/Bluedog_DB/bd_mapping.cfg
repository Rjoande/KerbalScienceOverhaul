        KrelInSpaceLowMidlands* = #JNSQ_bd_mapping_KrelInSpaceLowMidlands_00 // The midlands show long ridges and shallow bowls, as if the crust tried to wrinkle and then froze mid-thought. You trace the fault lines like roads.
