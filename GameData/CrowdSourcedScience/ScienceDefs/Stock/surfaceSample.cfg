        EelooSrfLanded* = #CSS_surfaceSample_EelooSrfLanded_05 // The ground appears to be made up of many frozen things, including rocks, dirt, frost, water, and various metal ores.
        EelooSrfLanded* = #CSS_surfaceSample_EelooSrfLanded_06 // You pick up a handful of extremely fine-grained icy material. It sublimates from the warmth of your spacesuit glove, drifting away as a short-lived wisp of vapors before refreezing and falling back to the surface.
