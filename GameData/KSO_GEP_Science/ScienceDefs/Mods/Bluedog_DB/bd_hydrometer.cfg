@EXPERIMENT_DEFINITION:HAS[#id[bd_hydrometer]]
{
    %RESULTS
    {
		GrannusFlyingLow* = #GEPscience_bd_hydrometer_GrannusFlyingLow_00 // The hydrometer insists the “humidity” is effectively zero, then pauses to wonder what “humidity” even means in glowing red air. Data will reach home after a very patient wait.
        GrannusFlyingHigh* = #GEPscience_bd_hydrometer_GrannusFlyingHigh_00 // Readings are steady, dry, and unsettlingly sterile. Under the dim red glare, you start to miss having a proper “sky” to blame for instrument noise.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_hydrometer_ToutatisSrfLandedSunnyLowlands_00 // The hydrometer reports “crispy.” Any condensables are either long gone or hiding somewhere cooler—probably on the other side of the planet and several hours of comm delay away.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_hydrometer_ToutatisSrfLandedSunnyHighlands_00 // Thin air, hard light, and not a hint of water vapor. The sensor is so dry it practically squeaks when it logs the number.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_hydrometer_ToutatisSrfLandedTransitionalLowlands_00 // Moisture spikes briefly as the terminator creeps past, then falls again like a curtain. Whatever is condensing out here, it doesn’t feel very homeworld-like.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_hydrometer_ToutatisSrfLandedTransitionalHighlands_00 // The hydrometer catches faint, periodic pulses—like a planet-sized breath between fire and ice. Mission Control asks for repeats; the reply arrives after you’ve already taken three.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideLowlands_00 // The air is cold enough that “moisture” becomes a solid problem. The instrument flags condensables present, but mostly in the form of frost trying to claim the intake.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideHighlands_00 // Readings hover near “saturated” while your faceplate stays perfectly dry. Turns out alien humidity can be very rude and not actually be water.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_hydrometer_ToutatisSrfLandedSoutheasternMountains_00 // Turbulent winds stir up layered air with just enough condensables to confuse the calibration. The graph looks like a seismogram drawn by a sleepy intern.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_hydrometer_ToutatisSrfLandedWesternMountains_00 // Dry downslope gusts scrub the air clean. The hydrometer logs numbers so low you double-check you didn’t accidentally install a thermometer.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_hydrometer_ToutatisSrfLandedDarkSideMountains_00 // Ice crystals drift past the lamp like glitter under red light. The hydrometer calls it “very humid” and then immediately requests a de-icing cycle.
        ToutatisFlyingLow* = #GEPscience_bd_hydrometer_ToutatisFlyingLow_00 // Flying through patchy haze, you map sharp humidity gradients that track the boundary between day and night. The planet feels stitched together, and the stitches are cold.
        ToutatisFlyingHigh* = #GEPscience_bd_hydrometer_ToutatisFlyingHigh_00 // Up here the air is thin and the moisture signal flattens into near-nothing. The red sun looks smaller than it should, and the long silence on the radio feels even bigger.

        NodensSrfLandedSaltySeas* = #GEPscience_bd_hydrometer_NodensSrfLandedSaltySeas_00 // Humidity is high and the air tastes like minerals through the filters. The hydrometer is thrilled; the electronics bay is not.
        NodensSrfLandedFreshWater* = #GEPscience_bd_hydrometer_NodensSrfLandedFreshWater_00 // Water vapor readings climb fast and stay there, as if the planet is proudly showing off. You can almost hear waves—until you remember sound doesn’t travel through vacuum back home.
        NodensSrfLandedShores* = #GEPscience_bd_hydrometer_NodensSrfLandedShores_00 // Moisture swings with every breeze off the waterline, fogging the intake and your mood in equal measure. The red sun makes the haze look bruised-purple.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_hydrometer_NodensSrfLandedTropicalLowlands_00 // The hydrometer pegs high and stays smug about it. Condensables are abundant enough that you start labeling everything “may become damp during storage.”
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_hydrometer_NodensSrfLandedTemperateLowlands_00 // Moderate humidity, steady drift, and a slow dusk that doesn’t match your instincts. The data is comforting—until the comm delay reminds you where you are.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_hydrometer_NodensSrfLandedTropicalMidlands_00 // Afternoon convection pushes humidity up in pulses, like invisible elevators of wet air. The readout is lively, the sky is unfamiliar, and both are distracting.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_hydrometer_NodensSrfLandedTemperateMidlands_00 // Cool air holds less moisture, but it’s still plenty by the sensor’s standards. The hydrometer logs a calm curve while you watch a dim red sun set a little “wrong.”
        NodensSrfLandedHighlands* = #GEPscience_bd_hydrometer_NodensSrfLandedHighlands_00 // Thinner, drier air with sharp nighttime drops that coax dew out of nowhere. The instrument warns of condensation; you warn Mission Control, who hears about it later.
        NodensSrfLandedTundra* = #GEPscience_bd_hydrometer_NodensSrfLandedTundra_00 // Low absolute moisture, but the sensor keeps catching near-ground frost events. It’s the kind of “humidity” that sneaks up as crystals, not droplets.
        NodensSrfLandedIceCaps* = #GEPscience_bd_hydrometer_NodensSrfLandedIceCaps_00 // The hydrometer reports high relative humidity and airborne ice crystals that clog the inlet like powdered glass. Everything feels pristine, quiet, and just a bit too far away.
        NodensSrfSplashed* = #GEPscience_bd_hydrometer_NodensSrfSplashed_00 // Submerged readings hit “100%” instantly, followed by an urgent protest from the casing seals. The recovery checklist is transmitted, received, and sighed at in slow motion.
        NodensFlyingLow* = #GEPscience_bd_hydrometer_NodensFlyingLow_00 // You skim through thick air layers and map a damp, cloud-fed profile. The signal is strong enough to feel like company—until you look out at the strange light and remember it’s not.
        NodensFlyingHigh* = #GEPscience_bd_hydrometer_NodensFlyingHigh_00 // Upper-atmosphere humidity drops off sharply, leaving a clean, cold trace. The planet below looks inviting, but the long-distance loneliness stays in the cockpit.

        SironaFlyingLow* = #GEPscience_bd_hydrometer_SironaFlyingLow_00 // The hydrometer logs “moisture” as trace condensables in a crushing hydrogen soup. Under Sirona’s dim red-lit clouds, the only thing that feels wet is your imagination.
        SironaFlyingHigh* = #GEPscience_bd_hydrometer_SironaFlyingHigh_00 // Up in the pale bands, the sensor sees thin hazes that condense and vanish with no warning. Mission Control asks what it means; you answer, and the reply drifts back much later.

        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalCraquelure_00 // The hydrometer catches brief spikes as vapor seeps from the cracked ground, then drops back to dry. It feels like the surface is exhaling on a schedule you don’t understand.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateCraquelure_00 // Moisture readings wobble as cold fissures “breathe” trace condensables into the air. The graph looks busy, but the sky stays stubbornly unfamiliar.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalLowlands_00 // Humidity sits low but not zero—just enough to frost the intake if you wait through the long twilight. You add “de-ice” to the checklist and hope it arrives home eventually.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateLowlands_00 // The hydrometer reports a thin, steady background of condensables that aren’t behaving like water. The red sun makes the haze look bruised, which seems unhelpful but accurate.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_hydrometer_BorvoSrfLandedTropicalMidlands_00 // A light wind raises the reading in pulses, like invisible pockets of damp air sliding past. You start timing them, then remember your clock feels wrong out here.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_hydrometer_BorvoSrfLandedTemperateMidlands_00 // The sensor settles into a calm line—until a faint ground fog rolls through and everything jumps. The instrument calls it “interesting”; you call it “creepy.”
        BorvoSrfLandedHighlands* = #GEPscience_bd_hydrometer_BorvoSrfLandedHighlands_00 // The air is thinner and drier, and the hydrometer struggles to find anything to count. It finally logs “very little,” which is both data and a mood.
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_hydrometer_BorvoSrfLandedMajorCraters_00 // Cold-trapped vapor pools in the crater shadows, spiking humidity right where the sun can’t reach. Your shadow is long, the light is red, and the radio is patient.
        BorvoSrfLandedPoles* = #GEPscience_bd_hydrometer_BorvoSrfLandedPoles_00 // The hydrometer flags near-saturation conditions that immediately turn into crystals on the housing. You’ve discovered “humidity” that bites instead of beads.
        BorvoFlyingLow* = #GEPscience_bd_hydrometer_BorvoFlyingLow_00 // Low-altitude layers show sharp humidity gradients that don’t match the terrain below. The atmosphere seems arranged for someone else’s planet.
        BorvoFlyingHigh* = #GEPscience_bd_hydrometer_BorvoFlyingHigh_00 // Up high, the moisture signal flattens into a thin whisper of condensables. The sky darkens fast, and your instincts don’t get a vote.

        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_hydrometer_EponaSrfLandedTropicalLowlands_00 // The hydrometer detects faint vapor that rises and collapses with the slow, alien day-night cues. It’s like the air can’t decide whether to be a gas or a memory.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_hydrometer_EponaSrfLandedTemperateLowlands_00 // A steady, low reading suggests dryness—until a passing mist nudges the numbers and vanishes again. The red sun doesn’t warm, it only watches.
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_hydrometer_EponaSrfLandedTropicalUplands_00 // The instrument logs intermittent condensables drifting upslope, then warns of intake icing anyway. You begin to suspect this world enjoys practical jokes.
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_hydrometer_EponaSrfLandedTemperateUplands_00 // Humidity stays low but persistent, as if something is sublimating just out of sight. Your report reaches home after the moment has already passed.
        EponaSrfLandedHighlands* = #GEPscience_bd_hydrometer_EponaSrfLandedHighlands_00 // The air is thin and sharp, and the hydrometer works hard for tiny numbers. The readout is boring; the silence between check-ins is not.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_hydrometer_EponaSrfLandedGrandPeaks_00 // Near the peaks, moisture appears as brief, glittering micro-fogs that form and break apart. The sensor calls it condensable activity; you call it proof the planet is awake.
        EponaSrfLandedCraters* = #GEPscience_bd_hydrometer_EponaSrfLandedCraters_00 // The hydrometer spikes in shadowed bowls where cold air settles and vapor lingers. You label it a “local microclimate” and pretend that makes it less unsettling.
        EponaSrfLandedVolcanoes* = #GEPscience_bd_hydrometer_EponaSrfLandedVolcanoes_00 // Warm vents drive sudden humidity surges, followed by rapid drops as the vapor freezes out. The instrument loves the data; the rest of the craft prefers distance.
        EponaSrfLandedPoles* = #GEPscience_bd_hydrometer_EponaSrfLandedPoles_00 // The sensor reports high relative humidity that immediately becomes frost on everything important. Under a dim red sun, even “wet” feels lonely.
        EponaFlyingLow* = #GEPscience_bd_hydrometer_EponaFlyingLow_00 // Moisture layers stack and shear, making a profile that looks nothing like homeworld weather. The hydrometer is confident; you are not.
        EponaFlyingHigh* = #GEPscience_bd_hydrometer_EponaFlyingHigh_00 // At altitude, condensables thin to near-zero and the sky turns hard and dark. The numbers are clean, but the comm delay makes the cockpit feel very far away.
	}
}