        #CSS_seismicScan_KerbinSrfLandedMountains_01 = Invi i tuoi dati sismici al CKS e lanci uno sguardo nervoso alla montagna sotto di te. Ti diranno loro se lì sotto c'era un vulcano attivo, vero?
        #CSS_seismicScan_KerbinSrfLandedMountains_02 = Qui non c'è molta attività oltre a qualche frana occasionale. I titanici processi che hanno costruito queste grandi cittadelle di roccia devono essersi fermati eoni fa.
        #CSS_seismicScan_KerbinSrfLandedDeserts_00 = *cantando* "Sono andato nel deserto su un cavallo senza nome, è bello stare fuori dalla pioggia". Ops! Mentre cantavi fai cadere l'accelerometro in una delle crepe del terreno secco, e non riesci a raggiungerlo. Oh be', è ora di inventare qualcosa per gli scienziati al CKS, di nuovo.
        #CSS_seismicScan_KerbinSrfLandedDeserts_01 = Le letture sismiche sembrano indicare una grande struttura artificiale direttamente sotto i tuoi piedi. Forse la tomba perduta di un antico re kerbal?
        #CSS_seismicScan_KerbinSrfLandedBadlands_00 = Il terreno qui rimbomba di attività costante. Forse è per questo che le chiamano Badlands.
        #CSS_seismicScan_KerbinSrfLandedBadlands_01 = E così eccoci qui, il centro di tutti i terremoti dell'intero pianeta. O almeno così dicono gli scienziati, ma chi li crede con le loro eleganti "ipotesi" e "equazioni".
        #CSS_seismicScan_KerbinSrfLandedBadlands_02 = Ti chiedi se prima dei terremoti qui ci fossero delle "Goodlands".
        #CSS_seismicScan_KerbinSrfLandedTundra_00 = Il sismometro è abbastanza sensibile da rilevare i lievi tremori causati dalle enormi calotte di ghiaccio vicine che sfregano contro la roccia.
        #CSS_seismicScan_KerbinSrfLandedTundra_01 = Il sismometro trema al pensiero di essere lasciato qui.
        #CSS_seismicScan_KerbinSrfLandedTundra_02 = Sembra esserci una normale attività sismica sotto gli strati di terra.
        #CSS_seismicScan_KerbinSrfLandedIceCaps_00 = Il sismometro registra il lontano impatto al suolo di una valanga. Ti guardi attorno nervosamente.
        #CSS_seismicScan_KerbinSrfLandedIceCaps_01 = Uno dei ghiacciai vicini sembra muoversi piuttosto in fretta, a giudicare da tutto il rumore sismico che produce.
        #CSS_seismicScan_KerbinSrfLandedNorthernIceShelf_00 = Il sismometro registra i suoni di rombo e crepitio che senti provenire da sotto i piedi. Rimani stupito dalla potenza racchiusa nel ghiaccio.
        #CSS_seismicScan_KerbinSrfLandedNorthernIceShelf_01 = Le letture sismiche indicano che il ghiaccio sotto di te sta subendo movimento e stress su una scala enorme.
        #CSS_seismicScan_KerbinSrfLandedSouthernIceShelf_00 = Vista la fragilità del ghiaccio, un terremoto sarebbe particolarmente disastroso proprio adesso.
        #CSS_seismicScan_KerbinSrfLandedSouthernIceShelf_01 = Una lunga serie di segnali di trazione vicino al bordo della piattaforma di ghiaccio suggerisce che sta per verificarsi un grande evento di distacco.
        #CSS_seismicScan_MunSrfLanded_00 = Ha appena rilevato un impatto da qualche parte sul Mun.
        #CSS_seismicScan_MunSrfLanded_01 = Niente di cui preoccuparsi. Davvero!
        #CSS_seismicScan_MunSrfLandedMidlands_00 = Mun sembra geologicamente morta. Tutto ciò che riesci a rilevare sono i lievi tremori generati dagli impatti di meteoriti.
        #CSS_seismicScan_MunSrfLandedNorthernBasin_00 = Il sensore sembra intasato da tutta la polvere munare. Rinunci e ti fai uno spuntino.
        #CSS_seismicScan_MunSrfLandedEastCrater_00 = C'è uno strano segnale proveniente dal cratere a ovest. Lo riferisci al Controllo Missione, sperando che siano fieri di te.
        #CSS_seismicScan_MunSrfLandedNorthwestCrater_00 = Il gigantesco impatto sembra aver creato una faglia.
        #CSS_seismicScan_MunSrfLandedSouthwestCrater_00 = I terremoti si fermano all'improvviso. Inizi ad allarmarti, poi ti rendi conto che hai staccato la spina.
        #CSS_seismicScan_MunSrfLandedFarsideCrater_00 = Le letture qui sono coerenti, ma potrebbero essere migliori se potessimo farle in un canyon.
        #CSS_seismicScan_MunSrfLandedCanyons_00 = Le letture indicano una frana enorme nelle vicinanze.
        #CSS_seismicScan_MunSrfLandedCanyons_01 = Qui i periodici mun-moti sembrano chiari e facili da leggere. Il team scientifico vorrà vedere questi numeri.
        #CSS_seismicScan_MunSrfLandedPolarCrater_00 = Le aree permanentemente in ombra negli angoli dei crateri hanno un'attività sismica leggermente minore rispetto al resto del Mun.
        #CSS_seismicScan_MunSrfLandedPoles_00 = Ti chiedi quanto tempo impiegherebbe un impatto al polo sud per essere registrato al polo nord.
        #CSS_seismicScan_MunSrfLandedPolarLowlands_00 = Le scansioni indicano una lunga serie di terremoti in arrivo! Oh, aspetta, la tua mano ha sfiorato il sensore. Falso allarme.
        #CSS_seismicScan_MunSrfLandedHighlands_00 = Lo strumento registra una piccola anomalia. Non sei sicuro se sia stato un vero evento sismico o solo un falso positivo dovuto al tuo trascinare i piedi.
        #CSS_seismicScan_MunSrfLandedHighlandCraters_00 = Il terreno sembra avere molte piccole fratture dovute ai molteplici impatti, causando lievi distorsioni nelle letture.
