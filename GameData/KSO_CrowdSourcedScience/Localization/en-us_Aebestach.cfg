        #CSS_Aebestach_atmosphereAnalysis_Sun_01 = Analyzing atmosphere near the Sun? Reading: plasma. Temperature: you're done. Instrument: melted. Lesson: Sun isn't atmosphere, it's hell.
        //   Kerbin
        #CSS_Aebestach_atmosphereAnalysis_Kerbin_01 = No salt an spray up here. Just the normal atmosphere-y....gassy....stuff.

        // --- seismicScan ---
        //   Moho
        #CSS_Aebestach_seismicScan_MohoSrfLanded_01 = Moho north pole. Geologically dead.
        #CSS_Aebestach_seismicScan_MohoSrfLanded_02 = Moho western lowlands. Crust eerily quiet.
        #CSS_Aebestach_seismicScan_MohoSrfLanded_03 = Moho SE lowlands. Crust quiet as a library—if the library had been baked by the Sun for billions of years. Thermodynamics says thermal expansion should widen fractures, but the needle doesn't budge.
        #CSS_Aebestach_seismicScan_MohoSrfLanded_04 = Moho south pole. Moho geology: none.
        //   Mun
        #CSS_Aebestach_seismicScan_MunSrfLanded_01 = Lowlands faint moonquakes. Mun is napping.
        #CSS_Aebestach_seismicScan_MunSrfLanded_02 = Farside seismometer. Readings differ from nearside. You found something.
        //   Minmus
        #CSS_Aebestach_seismicScan_MinmusSrfLanded_01 = Minmus poles. Ice quakes?
        //   Dres
        #CSS_Aebestach_seismicScan_DresSrfLanded_01 = Dres midlands. Dwarf seismology.
        #CSS_Aebestach_seismicScan_DresSrfLanded_02 = Dres ridges. Ridge vibrations.
        #CSS_Aebestach_seismicScan_DresSrfLanded_03 = Dres impact craters. Impact aftershocks?
        #CSS_Aebestach_seismicScan_DresSrfLanded_04 = Dres impact ejecta. Ejecta seismology.
        //   Vall
        #CSS_Aebestach_seismicScan_VallSrfLanded_01 = Vall poles. Ice quakes.
        #CSS_Aebestach_seismicScan_VallSrfLanded_02 = Vall basins. Subsurface activity?
        //   Tylo
        #CSS_Aebestach_seismicScan_TyloSrfLanded_01 = Tylo midlands. Tylo seismology.
        #CSS_Aebestach_seismicScan_TyloSrfLanded_02 = Tylo lowlands. Basin quakes.
        #CSS_Aebestach_seismicScan_TyloSrfLanded_03 = Tylo craters. Impact aftershocks?
        //   Eeloo
        #CSS_Aebestach_seismicScan_EelooSrfLanded_01 = Eeloo Fragipan. Frozen crust.
        #CSS_Aebestach_seismicScan_EelooSrfLanded_02 = Eeloo Babbage Patch. Quiet.
        #CSS_Aebestach_seismicScan_EelooSrfLanded_03 = Eeloo southern glaciers. Ice quakes?
        #CSS_Aebestach_seismicScan_EelooSrfLanded_04 = Eeloo Mu Glacier. Glacier seismology.

        // --- surfaceSample ---
        //   Dres
        #CSS_Aebestach_surfaceSample_DresSrfLanded_01 = Dres poles. Ice-rock mix.
        #CSS_Aebestach_surfaceSample_DresSrfLanded_02 = Dres midlands. Grey regolith.
        #CSS_Aebestach_surfaceSample_DresSrfLanded_03 = Dres lowlands. Fine grey.
        #CSS_Aebestach_surfaceSample_DresSrfLanded_04 = Dres ridges. Rocky sample.
        //   Vall
        #CSS_Aebestach_surfaceSample_VallSrfLanded_01 = Vall basin samples—water ice and silicate mix, traces of possible brine deposits under the ice shell. Ice and rock, Europa-style recipe.
        //   Tylo
        #CSS_Aebestach_surfaceSample_TyloSrfLanded_01 = Tylo midlands sample. Grey basalt.
        #CSS_Aebestach_surfaceSample_TyloSrfLanded_02 = Tylo crater samples. Impact melt products.
        //   Pol
        #CSS_Aebestach_surfaceSample_PolSrfLanded_01 = Pol polar sample. Ice-rock mix.
        #CSS_Aebestach_surfaceSample_PolSrfLanded_02 = Pol midlands rock. Mysterious composition.
        //   Eeloo
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_01 = Eeloo Fragipan. Frozen sample.
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_02 = Eeloo Babbage Patch. Icy regolith.
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_03 = Eeloo southern glaciers. Glacier ice.
        #CSS_Aebestach_surfaceSample_EelooSrfLanded_04 = Eeloo Mu Glacier. Ice river sample.

        // --- asteroidSample ---
        //   Sun
        #CSS_Aebestach_asteroidSample_Sun_01 = Asteroid near the Sun?! Are you insane? Composition shows... well, sample evaporated. Mission Control: "Don't do that again."
        //   Moho
        #CSS_Aebestach_asteroidSample_Moho_01 = Asteroid near Moho! Sun-baked rock. Composition shows refractory minerals—inner system survivor. You nearly roasted your gloves.
        #CSS_Aebestach_asteroidSample_Moho_02 = Asteroid in Moho orbit. Hot. Very hot. Sample shows thermal metamorphism. You start missing Kerbin summers.
        #CSS_Aebestach_asteroidSample_Moho_03 = Far Moho orbit. Asteroid at the inferno's edge. At least the sample won't freeze.
        //   Eve
        #CSS_Aebestach_asteroidSample_Eve_01 = Asteroid on Eve! Sampling rock in purple hell. Composition shows high-pressure metamorphism—Eve's air flattens rocks too. And you.
        #CSS_Aebestach_asteroidSample_Eve_02 = Asteroid near Eve orbit. At the dense atmosphere's edge. Sampling difficult, but sample unique—witness to Eve's heat.
        #CSS_Aebestach_asteroidSample_Eve_03 = Far Eve orbit. Asteroid at the gas giant's gravity well edge. At least no suit needed here... wait, yes.
        //   Gilly
        #CSS_Aebestach_asteroidSample_Gilly_01 = Asteroid on Gilly? Or rock on Gilly? In microgravity the line blurs. Composition: rock. Mission accomplished.
        #CSS_Aebestach_asteroidSample_Gilly_02 = Near Gilly orbit—asteroid and moon dancing together. You almost got gravity-assisted away during sampling. Thrilling.
        #CSS_Aebestach_asteroidSample_Gilly_03 = Far Gilly orbit. Asteroid lingering under Eve's gravitational influence. Sample precious, your patience too.
        //   Kerbin
        #CSS_Aebestach_asteroidSample_Kerbin_01 = Asteroid sample near Kerbin! Nickel-iron core, silicate mantle—typical C-type or S-type. Scientists will fight over it. You consider carving "first come first served."
        #CSS_Aebestach_asteroidSample_Kerbin_02 = Splashdown sampling? Asteroid fell into Kerbin's ocean? Composition contaminated by seawater, but core material still analyzable. At least you didn't have to fly up.
        #CSS_Aebestach_asteroidSample_Kerbin_03 = Low-altitude flyby sampling—like catching butterflies with a net, only pricier, riskier, and rockier.
        #CSS_Aebestach_asteroidSample_Kerbin_04 = High-altitude sampling. Asteroid lingering at Kerbin's gravity well edge. You retrieved the sample, proving Kerbin's "space catcher" capability.
        #CSS_Aebestach_asteroidSample_Kerbin_MiniBiomes_01 = Asteroid sample at KSC. Rock from the belt, delivered to your doorstep. The engineers want to know who's been leaving asteroids around.
        //   Mun
        #CSS_Aebestach_asteroidSample_Mun_01 = Asteroid on Mun! Impact ejecta or captured asteroid. Composition differs from Mun rock—messenger from the belt. You named it.
        #CSS_Aebestach_asteroidSample_Mun_02 = Asteroid sample near Mun orbit. Low gravity made sampling... interesting. At least it didn't float away.
        #CSS_Aebestach_asteroidSample_Mun_03 = Asteroid in far Mun orbit. Sample shows long solar wind exposure. High science value, higher "finally caught it" satisfaction.
        //   Minmus
        #CSS_Aebestach_asteroidSample_Minmus_01 = Asteroid on Minmus! Rocky visitor on the ice flats. Composition shows carbonaceous chondrites—primordial from early solar system. Much harder than Minmus cheese.
        #CSS_Aebestach_asteroidSample_Minmus_02 = Asteroid near Minmus orbit. Low gravity makes this potato's gravity well shallow. Sampling like playing marbles.
        #CSS_Aebestach_asteroidSample_Minmus_03 = Far Minmus orbit. Asteroid lingering at the ice world's edge. Sample pristine, your mood too.
        //   Duna
        #CSS_Aebestach_asteroidSample_Duna_01 = Asteroid on Duna! Red dust-coated rock. Composition shows nickel-iron—traveler from the belt. Finding Duna's distant cousin on Duna.
        #CSS_Aebestach_asteroidSample_Duna_02 = Asteroid near Duna orbit. Sampling in thin atmosphere. Dusty, but sample pristine. Duna style.
        #CSS_Aebestach_asteroidSample_Duna_03 = Far Duna orbit. Asteroid at the red planet's edge. Sample shows thermal cycling. Duna's greeting.
        //   Ike
        #CSS_Aebestach_asteroidSample_Ike_01 = Asteroid on Ike! Grey rock on grey moon. Composition differs from Ike rock—Duna ejecta or independent visitor. You took photos.
        #CSS_Aebestach_asteroidSample_Ike_02 = Asteroid near Ike orbit. Duna's moon shares space with asteroid. Sampling smooth, your mood too.
        #CSS_Aebestach_asteroidSample_Ike_03 = Far Ike orbit. Asteroid at Duna system's edge. Sample precious, your fuel too.
        //   Dres
        #CSS_Aebestach_asteroidSample_Dres_01 = Asteroid on Dres! Dwarf rock on dwarf planet. Composition shows carbonaceous—typical of belt edge. Dres finally has company.
        #CSS_Aebestach_asteroidSample_Dres_02 = Asteroid near Dres orbit. The forgotten dwarf planet finally has visitors. Sample shows ancient—from early solar system formation. Dres is moved.
        #CSS_Aebestach_asteroidSample_Dres_03 = Far Dres orbit. Asteroid at the lonely dwarf's edge. Sample pristine, your loneliness too.
        //   Jool
        #CSS_Aebestach_asteroidSample_Jool_01 = Asteroid near Jool! Rock captured by gas giant. Composition shows ice—Jool's radiation altered the surface. You made it back alive. Worth celebrating.
        //   Laythe
        #CSS_Aebestach_asteroidSample_Laythe_01 = Asteroid on Laythe! Rocky island on ocean world. Composition may be altered by seawater. You checked for shells—none.
        #CSS_Aebestach_asteroidSample_Laythe_02 = Asteroid near Laythe orbit. At oxygen atmosphere's edge. You almost felt homesick during sampling. Almost.
        #CSS_Aebestach_asteroidSample_Laythe_03 = Far Laythe orbit. Asteroid at Jool system's habitable zone edge. Sample shows ice erosion. Laythe's greeting.
        //   Vall
        #CSS_Aebestach_asteroidSample_Vall_01 = Asteroid on Vall! Rocky island on ice world. Composition shows primordial—from early solar system. Ice and stone collision.
        #CSS_Aebestach_asteroidSample_Vall_02 = Asteroid near Vall orbit. Ice moon's gravity well. You almost slipped during sampling. Ice is slippery.
        #CSS_Aebestach_asteroidSample_Vall_03 = Far Vall orbit. Asteroid at Jool system's ice belt edge. Sample pristine, your gloves too.
        //   Tylo
        #CSS_Aebestach_asteroidSample_Tylo_01 = Asteroid on Tylo! Rock under strong gravity. Composition shows impact melt—Tylo's impact history is rich. You could barely lift it.
        #CSS_Aebestach_asteroidSample_Tylo_02 = Asteroid near Tylo orbit. Giant moon's deep gravity well. Sample carefully—don't get pulled in.
        #CSS_Aebestach_asteroidSample_Tylo_03 = Far Tylo orbit. Asteroid at Jool system's largest moon's edge. Sample precious, your fuel too.
        //   Bop
        #CSS_Aebestach_asteroidSample_Bop_01 = Asteroid on Bop! Creepy rock on creepy potato. Composition shows... normal? You feel it watching. Photo done, leaving quickly.
        #CSS_Aebestach_asteroidSample_Bop_02 = Asteroid near Bop orbit. Jool's creepy little moon. You heard odd sounds during sampling. Maybe hallucination. Maybe Bop.
        #CSS_Aebestach_asteroidSample_Bop_03 = Far Bop orbit. Asteroid at Jool system's edge. Sample normal, your unease isn't.
        //   Pol
        #CSS_Aebestach_asteroidSample_Pol_01 = Asteroid on Pol! Rock on colorful world. Composition defies classification—like Pol itself. You bagged some for scientists to headache over.
        #CSS_Aebestach_asteroidSample_Pol_02 = Asteroid near Pol orbit. Tiny moon's micro-gravity. Sampling like marbles. You won.
        #CSS_Aebestach_asteroidSample_Pol_03 = Far Pol orbit. Asteroid at Jool system's most mysterious moon's edge. Sample mysterious, Pol too.
        //   Eeloo
        #CSS_Aebestach_asteroidSample_Eeloo_01 = Asteroid on Eeloo! Rock at the system's edge. Composition shows primordial—possibly from Oort cloud. Your breath freezes, sample too.
        #CSS_Aebestach_asteroidSample_Eeloo_02 = Asteroid near Eeloo orbit. Sampling at extreme distance. Cold, lonely, but sample precious.
        #CSS_Aebestach_asteroidSample_Eeloo_03 = Far Eeloo orbit. Asteroid at the edge of the edge. Sample may be interstellar visitor. You too.
        //   default
        #CSS_Aebestach_asteroidSample_default_01 = You sample an asteroid. Composition: rock. Lots of rock. Mission Control says "highly valuable."

        // --- cometSample ---
        //   Sun
        #CSS_Aebestach_cometSample_short_Sun_01 = Short-period comet near the Sun? Sample evaporated. Comet evaporated. You almost evaporated. Mission Control: don't.
        //   Moho
        #CSS_Aebestach_cometSample_short_Moho_01 = Short-period comet near Moho. Ice at inner system's edge. Sample sublimates rapidly in Moho's heat. You grabbed it. Barely.
        //   Eve
        #CSS_Aebestach_cometSample_short_Eve_01 = Short-period comet near Eve. Ice at purple hell's edge. Sample sublimates rapidly in Eve's heat. You grabbed a tiny bit.
        //   Gilly
        #CSS_Aebestach_cometSample_short_Gilly_01 = Short-period comet near Gilly. Tiny potato and comet dancing together. Sample shows ice—under Eve's influence. Hot.
        //   Kerbin
        #CSS_Aebestach_cometSample_short_Kerbin_01 = Short-period comet near Kerbin. Homeworld's comet visitor. Sample shows water ice, organics—life's ingredients. You feel a bit homesick.
        #CSS_Aebestach_cometSample_intermediate_Kerbin_MiniBiomes_01 = Intermediate comet sample at KSC. Ice-rock mix from between the belt and inner system. Someone left a comet at the VAB?
        #CSS_Aebestach_cometSample_interstellar_Kerbin_MiniBiomes_01 = Interstellar comet sample at KSC. Visitor from beyond the system. You found it in the parking lot. Historic. Bizarre.
        #CSS_Aebestach_cometSample_long_Kerbin_MiniBiomes_01 = Long-period comet sample at KSC. Visitor from the Oort cloud. You bagged some before it left. The R&D team is confused but delighted.
        #CSS_Aebestach_cometSample_short_Kerbin_MiniBiomes_01 = Short-period comet sample at KSC. Ice and dust from the inner system. Mission Control asks why you're sampling comets on the launchpad.
        //   Mun
        #CSS_Aebestach_cometSample_short_Mun_01 = Short-period comet near Mun. Moon's comet visitor. Sample shows ice and dust. You collected.
        //   Minmus
        #CSS_Aebestach_cometSample_short_Minmus_01 = Short-period comet near Minmus. Ice world and comet ice. Sample shows high purity—purer than Minmus cheese. Scientifically.
        //   Duna
        #CSS_Aebestach_cometSample_short_Duna_01 = Short-period comet near Duna. Red planet's dust mixed with comet ice. Sample unique. You took photos.
        //   Ike
        #CSS_Aebestach_cometSample_short_Ike_01 = Short-period comet near Ike. Duna's moon shares space with comet. Sample shows ice and dust. You collected.
        //   Dres
        #CSS_Aebestach_cometSample_short_Dres_01 = Short-period comet near Dres. Dwarf planet finally has comet visitors. Sample shows carbonaceous—from early solar system. Dres is moved.
        //   Jool
        #CSS_Aebestach_cometSample_short_Jool_01 = Short-period comet near Jool. Gas giant's gravity captures comets. Sample shows ice—altered by Jool radiation. Green.
        //   Laythe
        #CSS_Aebestach_cometSample_short_Laythe_01 = Short-period comet near Laythe. Ocean world's comet rain. Sample shows ice and salt. You tasted—Mission Control stopped you.
        //   Vall
        #CSS_Aebestach_cometSample_short_Vall_01 = Short-period comet near Vall. Ice moon and comet ice. Sample shows high purity. You collected. Cold.
        //   Tylo
        #CSS_Aebestach_cometSample_short_Tylo_01 = Short-period comet near Tylo. Giant moon's comet visitor. Sample shows ice—under Tylo's gravity. Heavy.
        //   Bop
        #CSS_Aebestach_cometSample_short_Bop_01 = Short-period comet near Bop. Jool's gravity perturbs comet orbits. Sample shows ice and dust. You finish the photo and leave quickly; Bop is watching.
        //   Pol
        #CSS_Aebestach_cometSample_short_Pol_01 = Short-period comet near Pol. Colorful world and comet ice. Sample shows mottled—like Pol itself. Mysterious.
        //   Eeloo
        #CSS_Aebestach_cometSample_short_Eeloo_01 = Short-period comet near Eeloo. Icy visitor at system's edge. Sample shows primordial—possibly from Kuiper belt. Cold.
        //   default
        #CSS_Aebestach_cometSample_intermediate_default_01 = Intermediate-period comet sample. Between Kuiper belt and inner system. Ice-rock mix. You collected.
        #CSS_Aebestach_cometSample_interstellar_default_01 = Interstellar comet sample. Visitor from beyond the system. Anomalous composition. You may be the first Kerbal to touch it. Historic.
        #CSS_Aebestach_cometSample_long_default_01 = Long-period comet sample. Visitor from Oort cloud. Ice, dust, ancient. You hold a postcard from the system's edge.
        #CSS_Aebestach_cometSample_short_default_01 = Short-period comet sample. Ice, dust, organics. You sniff—no smell. No smell in vacuum.

        // --- magnetometer ---
        //   Sun
        #CSS_Aebestach_magnetometer_Sun_01 = The magnetometer is about to cry.
        #CSS_Aebestach_magnetometer_Sun_02 = You map the Sun's magnetic field as your spacecraft performs its months-long orbital sweep. An even longer flight could monitor its change over the solar cycle... time to strand someone in space!
        //   Moho
        #CSS_Aebestach_magnetometer_Moho_01 = The magnetometer beeps in apparent frustration. No atmosphere means no cool aurorae.
        #CSS_Aebestach_magnetometer_Moho_02 = Moho's heated-up metal-rich mass is producing some sort of dynamo effect. The solar wind buckles and obeys, at least a little.
        //   Eve
        #CSS_Aebestach_magnetometer_Eve_01 = The magnetometer hisses and crackles creepily as Eve's dense atmosphere dances and sputters against charged particles streaming in. The PR team wants to post it online with a clickbait title like 'SOUNDS FROM THE DEMON PLANET' to rake in more subscribers.
        #CSS_Aebestach_magnetometer_Eve_02 = Magnetometer readings here are fuschia. Wait, no. Faint. That's the word.
        //   Gilly
        #CSS_Aebestach_magnetometer_Gilly_01 = Aha! Statically-charged, solar-heated micrometeorites pinging off the surface can arc all the way into space thanks to, you know, Gilly's main interesting feature. We're picking up magnetic signatures as these charges accelerate through space.
        #CSS_Aebestach_magnetometer_Gilly_02 = Nobody back home was expecting a little rock to have a huge, beautiful, complex magnetic field. Indeed, it does not.
        //   Kerbin
        #CSS_Aebestach_magnetometer_Kerbin_01 = You thank Kerbin for its protective magnetic field, and then thank the magnetometer for being patient with you on such a mundane mission.
        #CSS_Aebestach_magnetometer_Kerbin_02 = It may be best not to stay in Kerbin's radiation belts for too long. The magnetometer will get sad.
        //   Mun
        #CSS_Aebestach_magnetometer_Mun_01 = There's at least a tiny bit of still-magnetized material on the Mun's surface which is detectable at this range - signs of the rock's once-active past, likely.
        #CSS_Aebestach_magnetometer_Mun_02 = The farthest reaches of Kerbin's magnetic field give way to stony silence. Or... is that a little bit of noise above the detection limit leaking through...?
        //   Minmus
        #CSS_Aebestach_magnetometer_Minmus_01 = With such a stark contrast between the material and surface texture over the flats and hills, the magnetometer can tell the difference in how they scatter the solar wind. This might be useful for biome mapping if you had not already brought eyeballs.
        #CSS_Aebestach_magnetometer_Minmus_02 = Minmus might not have an internal magnetic field, but its surface accumulates lots of charge and a thin dust cocoon produces its own magnetic activity.
        //   Duna
        #CSS_Aebestach_magnetometer_Duna_01 = The surface deposits of magnetite here still project their own residual magnetic fields! Something must have gotten them polarized once, when Duna's core was alive. Now if only we had a few billion nukes to warm it up again...
        #CSS_Aebestach_magnetometer_Duna_02 = Magnetic activity in space around Duna is awfully faint. Not a great sign if you don't enjoy getting blasted by radiation.
        //   Ike
        #CSS_Aebestach_magnetometer_Ike_01 = If you squint a bunch, you can convince yourself it's not zero. If you squint your brain a bunch, you can convince yourself Ike maybe had its own magnetically active core once. Doing either for too long hurts.
        #CSS_Aebestach_magnetometer_Ike_02 = Wait, what was that, something flashed by the - no, you made that up. All quiet over Ike.
        //   Dres
        #CSS_Aebestach_magnetometer_Dres_01 = The solar wind splatters against the dead rock like a hose against a sad, wilted plant. The instrument team back home collectively sighs.
        #CSS_Aebestach_magnetometer_Dres_02 = Nil. Jack. Zip. If Dres had an active core once, it petered out awfully quick in solar system formation.
        //   Jool
        #CSS_Aebestach_magnetometer_Jool_01 = The boom arm might as well be bending with the incredible amount of magnetism here. It isn't, because it's not made of ferromagnetic materials, but still.
        #CSS_Aebestach_magnetometer_Jool_02 = Even from millions of kilometers out, Jool's fearsome magnetic dynamo looms over everything. The harsh spray of charged particles in its radiation belts is equally intimidating.
        //   Laythe
        #CSS_Aebestach_magnetometer_Laythe_01 = After a bit of trouble, the instrument starts working again and cheerily spits out lots of information on Laythe's complex semi-active core dynamo. You have exchanged boredom at it not working for boredom at the science team babbling on and on.
        #CSS_Aebestach_magnetometer_Laythe_02 = Solar charged-particle readings here are fortunately low. Joolian charged-particle readings, on the other hand...
        //   Vall
        #CSS_Aebestach_magnetometer_Vall_01 = The magnetometer is a little short of enrichment.
        #CSS_Aebestach_magnetometer_Vall_02 = Vall sweeps through Jool's magnetic field, tranquil and complacent. Still, the report must be written.
        //   Tylo
        #CSS_Aebestach_magnetometer_Tylo_01 = The readouts here are still interesting, if not tremendously high-energy. Tylo's huge mass is not exactly enough to unify gravity and electromagnetism. Still working on it.
        #CSS_Aebestach_magnetometer_Tylo_02 = Jool's magnetic field buckles as you approach. Tylo's huge core, perhaps tidally warmed by its parent, is producing its own magnetism.
        //   Bop
        #CSS_Aebestach_magnetometer_Bop_01 = Even as the rest of the instruments go haywire, the magnetometer is unaffected. Is it too new? Too young and innocent to remember the calamity?
        #CSS_Aebestach_magnetometer_Bop_02 = Magnetometer readings are nominal here. Huh. You'd expected something more dramatic.
        //   Pol
        #CSS_Aebestach_magnetometer_Pol_01 = The uniquely-shaped charged grains flaking off Pol's surface are interacting beautifully with the magnetic fields of Jool and the Sun together. Well, beautifully according to the instrument team back home. You can't see much.
        #CSS_Aebestach_magnetometer_Pol_02 = There's no core magnetic dynamo activity here, of core-se.
        //   Eeloo
        #CSS_Aebestach_magnetometer_Eeloo_01 = A thin sheath of ionized gas around Eeloo is scattering charged particles as they come in. For any relevant purposes, of course, it's not flyable.
        #CSS_Aebestach_magnetometer_Eeloo_02 = Well, this icy little guy sure does not have a magnetic field. But the distance is promising for studying solar activity. The heliopause can't be too much farther out, can it? Surely?
        //   default
        #CSS_Aebestach_magnetometer_default_01 = Magnetometer runs in unknown environment. Reading: yes? No? Maybe Kraken's magnetic field. You noted it.

        // --- deployedGooObservation ---
        //   Moho
        #CSS_Aebestach_deployedGooObservation_MohoSrfLanded_01 = Under extreme heat the Goo displays remarkable thermostability, forming a caramelized crust. Mission Control advises: don't eat it. It's not real caramel.
        //   Eve
        #CSS_Aebestach_deployedGooObservation_EveSrfLanded_01 = Purple atmosphere and crushing pressure flatten the Goo into a pancake. Scientific value: validates non-Newtonian rheology under extreme conditions. Bonus: the Goo seems unhappy here.
        //   Gilly
        #CSS_Aebestach_deployedGooObservation_GillySrfLanded_01 = In microgravity the Goo expands into a fluffy sphere—like green cotton candy floating in space. Physically expected, but you keep wanting to take a bite.
        //   Kerbin
        #CSS_Aebestach_deployedGooObservation_KerbinSrfLanded_01 = The homeland soil makes the Goo unusually excited—humidity, nitrogen, or perhaps homesickness. Data suggests Kerbin's microbial diversity makes the Goo feel "at home."
        //   Mun
        #CSS_Aebestach_deployedGooObservation_MunSrfLanded_01 = Lunar dust reacts interestingly with the Goo, forming dusty clumps. Theoretically explainable by electrostatic adhesion; you prefer to believe the Goo is cosplaying the lunar surface.
        //   Minmus
        #CSS_Aebestach_deployedGooObservation_MinmusSrfLanded_01 = The Goo on Minmus flats takes on an eerie mint-green hue. Analysis shows perchlorates complexing with the Goo—scientifically sound, visually like possessed candy.
        //   Duna
        #CSS_Aebestach_deployedGooObservation_DunaSrfLanded_01 = Red dust quickly coats the Goo, forming natural camouflage. Conclusion: successful Mars-style disguise achieved. Scientific significance: TBD.
        //   Ike
        #CSS_Aebestach_deployedGooObservation_IkeSrfLanded_01 = The Goo stands out starkly on Ike's grey surface, like a forgotten jelly. Gravity readings nominal. Goo mood reading: lonely.
        //   Dres
        #CSS_Aebestach_deployedGooObservation_DresSrfLanded_01 = The Goo on the dwarf planet reacts sluggishly, as if infected by Dres's "lack of presence." At least the data curve is smooth—because nothing happened.
        //   Laythe
        #CSS_Aebestach_deployedGooObservation_LaytheSrfLanded_01 = Oxygenated atmosphere! An oxide film forms on the Goo, color shifting from green to brown. Biologically significant—if the Goo counts as life. It might be breathing.
        //   Vall
        #CSS_Aebestach_deployedGooObservation_VallSrfLanded_01 = Cryogenic temperatures freeze the Goo into a translucent sphere with visible crystal structure. Beautiful, but touch it and it might shatter. Don't touch.
        //   Tylo
        #CSS_Aebestach_deployedGooObservation_TyloSrfLanded_01 = Strong gravity flattens the Goo into a perfect disc. Unexpected hydrostatics finding: the Goo can get this flat, and it looks delicious.
        //   Bop
        #CSS_Aebestach_deployedGooObservation_BopSrfLanded_01 = The Goo on Bop takes on an ominous dark green and pulses faintly. You blame Jool's radiation, but suspect the truth is weirder.
        //   Pol
        #CSS_Aebestach_deployedGooObservation_PolSrfLanded_01 = Pol's colorful surface "teaches" the Goo local hues, creating a mottled camouflage effect. Mimicry? Sensor glitch? Report: "further study required."
        //   Eeloo
        #CSS_Aebestach_deployedGooObservation_EelooSrfLanded_01 = Extreme cold puts the Goo into a glass-transition-like state. Theoretically preservable for millions of years—if anyone wants million-year-old frozen Goo.
        //   default
        #CSS_Aebestach_deployedGooObservation_default_01 = The deployed Goo assumes a perplexing morphology in unknown conditions. Scientific conclusion: the Goo remains sufficiently mysterious. We knew that.

        // --- deployedIONCollector ---
        //   Moho
        #CSS_Aebestach_deployedIONCollector_MohoSrfLanded_01 = So close to the Sun! Solar wind density is extreme; the collector nearly overloaded. Captured particles show unusually high heavy ion ratio—direct coronal sample. Hot data.
        //   Eve
        #CSS_Aebestach_deployedIONCollector_EveSrfLanded_01 = The ionosphere in dense atmosphere is unusually active. Discharge under high pressure produces rich ion species. Conclusion: Eve's air doesn't just crush you, it charges you too.
        //   Gilly
        #CSS_Aebestach_deployedIONCollector_GillySrfLanded_01 = Dust charging is pronounced in microgravity. Collector captured abundant charged aerosols—"dusty plasma" scientifically. Gilly does electrostatic art on the sly.
        //   Kerbin
        #CSS_Aebestach_deployedIONCollector_KerbinSrfLanded_01 = Earth's ionosphere interacting with solar wind produces rich ion flux. The physics behind auroras—we're just in daylight, so no show. Data still beautiful.
        //   Mun
        #CSS_Aebestach_deployedIONCollector_MunSrfLanded_01 = The airless Moon's surface is directly exposed to solar wind. Abundant hydrogen ions collected—future lunar base water feedstock! Scientific value: paving ISRU.
        //   Minmus
        #CSS_Aebestach_deployedIONCollector_MinmusSrfLanded_01 = Minmus's tenuous exosphere contributes trace ions. Low concentration but interesting composition—OH⁻ from water ice sublimation. Small moons have atmosphere too, just shy.
        //   Duna
        #CSS_Aebestach_deployedIONCollector_DunaSrfLanded_01 = Ionized dust in thin Mars atmosphere successfully captured. Charged sand grain data during dust storms—another reason future colonists need anti-static gear.
        //   Ike
        #CSS_Aebestach_deployedIONCollector_IkeSrfLanded_01 = Duna's magnetotail extends to Ike's orbit; trapped charged particles captured. Like hearing the planet's magnetic "breathing." Romantic and ion-filled.
        //   Dres
        #CSS_Aebestach_deployedIONCollector_DresSrfLanded_01 = Solar wind at dwarf planet orbit is relatively pristine. Collected: interstellar medium baseline—Dres at least contributes "uncontaminated" samples. Presence +1.
        //   Laythe
        #CSS_Aebestach_deployedIONCollector_LaytheSrfLanded_01 = Oxygen atmosphere ionizes under radiation, producing O₂⁺ ions. Similar to Kerbin's ionosphere—more evidence for Laythe habitability. Oxygen is singing!
        //   Vall
        #CSS_Aebestach_deployedIONCollector_VallSrfLanded_01 = Cryovolcanic eruptions may release charged ice crystals. Collector caught rare ice-ion complexes. Europa-style science, Vall-style data.
        //   Tylo
        #CSS_Aebestach_deployedIONCollector_TyloSrfLanded_01 = Airless giant moon exposed to Jool's radiation belts. Captured particles show anomalously high energetic electrons—Tylo's surface may be among the system's most irradiated. Keep the suit on.
        //   Bop
        #CSS_Aebestach_deployedIONCollector_BopSrfLanded_01 = Jool's magnetosphere disturbances create complex plasma structures at Bop's orbit. Readings defy easy explanation—cutting-edge science or Bop mischief. Possibly both.
        //   Pol
        #CSS_Aebestach_deployedIONCollector_PolSrfLanded_01 = Ion flux at this tiny moon's orbit is surprisingly low. Porous surface absorbing charged particles? Pol's plasma environment is as mysterious as its looks.
        //   Eeloo
        #CSS_Aebestach_deployedIONCollector_EelooSrfLanded_01 = Solar wind at the system's edge has thinned to a whisper. Collected: interstellar medium precursors—evidence of Kerbalkind touching the boundary. Epically small.
        //   default
        #CSS_Aebestach_deployedIONCollector_default_01 = The ion collector runs in unknown conditions. Captured particles include: solar wind protons, cosmic rays, and what you suspect are charged Kraken scales.

        // --- deployedSeismicSensor ---
        //   Moho
        #CSS_Aebestach_deployedSeismicSensor_MohoSrfLanded_01 = Despite proximity to the Sun, Moho's core seems long dead. Readings eerily calm—either geologic death or a volcano holding its breath.
        //   Eve
        #CSS_Aebestach_deployedSeismicSensor_EveSrfLanded_01 = Atmospheric pressure waves were misread as quakes. After algorithm correction: Eve's crust is quite active, possibly from internal convection. Purple hell has geology too!
        //   Gilly
        #CSS_Aebestach_deployedSeismicSensor_GillySrfLanded_01 = The main signal is Gilly wobbling in its orbit. Gravity gradient makes this tiny potato jiggle like jelly—scientifically: "tidal deformation."
        //   Kerbin
        #CSS_Aebestach_deployedSeismicSensor_KerbinSrfLanded_01 = Plate tectonics, tides, human activity—Kerbin's seismic background is reassuringly rich. At least the homeworld is alive.
        //   Mun
        #CSS_Aebestach_deployedSeismicSensor_MunSrfLanded_01 = Moonquakes from thermal expansion clearly recorded. Data supports the "Moon is slowly drifting away" theory—a few cm per year. No rush.
        //   Minmus
        #CSS_Aebestach_deployedSeismicSensor_MinmusSrfLanded_01 = Minmus quakes are so faint the instrument nearly fell asleep. Occasional microtremors may be thermal stress—or a passing space cow stepping on it.
        //   Duna
        #CSS_Aebestach_deployedSeismicSensor_DunaSrfLanded_01 = Mars-style quakes! Surface vibration patterns differ radically from Kerbin in thin atmosphere. Dust storm infrasound accidentally captured—like the planet snoring.
        //   Ike
        #CSS_Aebestach_deployedSeismicSensor_IkeSrfLanded_01 = Tidal locking to Duna builds stress in Ike. The sensor catches regular faint tremors—a "lunar heartbeat," romantic and scientific.
        //   Dres
        #CSS_Aebestach_deployedSeismicSensor_DresSrfLanded_01 = The dwarf planet's seismic record is a flat line. Occasional spikes from micrometeorites. Conclusion: Dres is forgotten and geologically boring.
        //   Laythe
        #CSS_Aebestach_deployedSeismicSensor_LaytheSrfLanded_01 = Subsurface ocean flow stresses the crust! Sensor detects tremor patterns tied to tidal cycles—more evidence for liquid water. Europa, we're coming!
        //   Vall
        #CSS_Aebestach_deployedSeismicSensor_VallSrfLanded_01 = Cryovolcanic activity! Vall's icy shell hosts geologic activity; periodic tremors hint at ice-magma flow. Textbook case for icy worlds.
        //   Tylo
        #CSS_Aebestach_deployedSeismicSensor_TyloSrfLanded_01 = Tylo's gravity makes the sensor hypersensitive. Gravitational perturbations from other Joolian moons recorded—like hearing a planetary symphony at ultra-low frequency.
        //   Bop
        #CSS_Aebestach_deployedSeismicSensor_BopSrfLanded_01 = Anomalous readings. Not a malfunction—Bop's orbital eccentricity causes violent tidal stress swings. Or Bop is trying to tell you something. Don't overthink it.
        //   Pol
        #CSS_Aebestach_deployedSeismicSensor_PolSrfLanded_01 = This tiny moon's vibration patterns defy classification. Low gravity, irregular shape, porous structure—Pol's seismology is a mystery. Like Pol itself.
        //   Eeloo
        #CSS_Aebestach_deployedSeismicSensor_EelooSrfLanded_01 = On this distant ice world, seismic activity is nearly zero. Occasional tremors from thermal contraction of the ice shell. Quiet enough to feel homesick.
        //   default
        #CSS_Aebestach_deployedSeismicSensor_default_01 = Seismometer deployed. Recorded vibrations mainly from: you stepping on the cable, wind, and an unknown source you suspect is Kraken indigestion.

        // --- deployedWeatherReport ---
        //   Eve
        #CSS_Aebestach_deployedWeatherReport_Eve_01 = The barometer exploded. Second attempt with industrial-grade sensor: 90+ atm, 400+°C, composition CO2 and "you're done." Habitability: zero.
        //   Kerbin
        #CSS_Aebestach_deployedWeatherReport_Kerbin_01 = Classic Earth-like weather—clouds, wind, occasional rain. Data matches KSC weather station perfectly. At least the instruments work this time.
        //   Duna
        #CSS_Aebestach_deployedWeatherReport_Duna_01 = Thin CO2 atmosphere, frequent dust storms. Today's wind, dust concentration, visibility—all unsuitable for picnics. Good for building colonist resilience.
        //   Laythe
        #CSS_Aebestach_deployedWeatherReport_Laythe_01 = Oxygen atmosphere! Pleasant temps! Clouds, wind, possibly rain—Laythe's weather report reads like Kerbin's distant cousin. Habitability: tantalizing.
        //   default
        #CSS_Aebestach_deployedWeatherReport_default_01 = Deploying a weather station where there's no atmosphere. Wind: zero. Humidity: zero. Your decision quality: under review.

        // --- infraredTelescope ---
        //   Sun
        #CSS_Aebestach_infraredTelescope_Sun_01 = IR telescope at the Sun? You saw it. A lot. Too much. Instrument: melted. You: learned.
        //   Moho
        #CSS_Aebestach_infraredTelescope_Moho_01 = Moho's thermal hell. IR telescope nearly overloaded. You see the Sun burning. Obviously.
        //   Eve
        #CSS_Aebestach_infraredTelescope_Eve_01 = Eve burns in IR. Dense atmosphere, high temp—instrument screaming. You too.
        //   Gilly
        #CSS_Aebestach_infraredTelescope_Gilly_01 = Gilly's faint thermal signal. Tiny potato has little heat. You barely see it. Barely.
        //   Kerbin
        #CSS_Aebestach_infraredTelescope_Kerbin_01 = Kerbin's thermal signature. Oceans, continents, urban heat islands—homeworld beautiful in IR too. You feel a bit homesick.
        //   Mun
        #CSS_Aebestach_infraredTelescope_Mun_01 = Mun's thermal cycle. Huge day-night temperature swing. You see hot spots—maybe moonquakes or your hallucination.
        //   Minmus
        #CSS_Aebestach_infraredTelescope_Minmus_01 = Minmus ice and heat. IR reveals heat flow under ice caps. High science value, visually like glowing mint candy.
        //   Duna
        #CSS_Aebestach_infraredTelescope_Duna_01 = Duna's thermal signature. Dust storms, polar ice—red planet in IR. You saw it.
        //   Ike
        #CSS_Aebestach_infraredTelescope_Ike_01 = Ike's thermal cycle. Duna's moon grey in IR. You see hot spots—maybe tidal stress.
        //   Jool
        #CSS_Aebestach_infraredTelescope_Jool_01 = Jool's IR signature. Gas giant's thermal structure. You see storms, vortices. You see green.
        //   Laythe
        #CSS_Aebestach_infraredTelescope_Laythe_01 = Laythe's thermal ocean. Subsurface heat flow, geothermal—habitable world signs. You see hope.
        //   Vall
        #CSS_Aebestach_infraredTelescope_Vall_01 = Vall's subsurface heat. IR penetrates ice shell, reveals underground heat sources. Vall-style science, Vall-style data.
        //   Tylo
        #CSS_Aebestach_infraredTelescope_Tylo_01 = Tylo's thermal signature. Ancient surface, faint heat flow. You see impact basins' thermal memory.
        //   Bop
        #CSS_Aebestach_infraredTelescope_Bop_01 = Bop thermal... creepy. Irregular readings. You blame Jool's radiation. Or Bop.
        //   Pol
        #CSS_Aebestach_infraredTelescope_Pol_01 = Pol's faint thermal signal. Porous surface radiates fast. You see mottled heat map. Hard to read like Pol itself.
        //   Eeloo
        #CSS_Aebestach_infraredTelescope_Eeloo_01 = Eeloo's cryogenic thermal. IR shows almost no heat. You see the icy cosmos. Cold.
        //   default
        #CSS_Aebestach_infraredTelescope_default_01 = Infrared telescope scans unknown region. You see heat... or don't. Maybe instrument fault, maybe you.

        // --- ROCScience ---
        //   ROC
        #CSS_Aebestach_ROCScience_BopGravelPile_01 = A pile of gravel. You feel it watching you.
        #CSS_Aebestach_ROCScience_BopGravelPile_02 = Bop's gravel pile—impact ejecta or erosion product. Irregular shapes suggest unique deposition in low gravity. You finish the photo and leave quickly; something feels like it's watching.
        #CSS_Aebestach_ROCScience_DresCrater_01 = A crater. Probably an asteroid's handiwork.
        #CSS_Aebestach_ROCScience_DresCrater_02 = A Dres crater—scars from the dwarf planet's forgotten history. Floor material may expose deep crust. Conclusion: something at least remembered Dres, via impact.
        #CSS_Aebestach_ROCScience_DresMeteorite_01 = A rock from the void. Visitors to Dres are so rare, every meteorite is an honored guest.
        #CSS_Aebestach_ROCScience_DresMeteorite_02 = A meteorite on Dres—a rare specimen at the belt's edge. Messenger of belt material perhaps. You silently thank this rock for crossing millions of km to keep you company.
        #CSS_Aebestach_ROCScience_DunaBlueberries_01 = You find round little spherules. Taste like rock. Because they are rock.
        #CSS_Aebestach_ROCScience_DunaBlueberries_02 = "Martian blueberries"! Hematite concretions—Opportunity's famous find on real Mars. Duna has them too—proof of ancient liquid water. Science value: maxed. Edibility: still rock.
        #CSS_Aebestach_ROCScience_DunaDune_01 = You study a dune-like structure. Possibly aeolian, or you're so hungry you're seeing bread.
        #CSS_Aebestach_ROCScience_DunaDune_02 = Duna dunes! Classic aeolian deposit. Grain analysis reveals fine iron oxide—the source of Mars red. Sandboarding request denied by Mission Control.
        #CSS_Aebestach_ROCScience_DunaEjectaOnIke_01 = Debris from another world. Pioneers of interstellar migration?
        #CSS_Aebestach_ROCScience_DunaEjectaOnIke_02 = Duna ejecta on Ike! Ancient impacts launched Martian material into space; some landed on its moon. We've found pieces of Duna on Ike—a triumph of interplanetary archaeology!
        #CSS_Aebestach_ROCScience_DunaMeteorite_01 = A rock from the void. You try to determine if it's Kraken droppings.
        #CSS_Aebestach_ROCScience_DunaMeteorite_02 = Meteorite! Composition reveals nickel-iron core—a traveler from the asteroid belt or beyond. It's lain on Duna for maybe millions of years, waiting for you to say hi.
        #CSS_Aebestach_ROCScience_DunaStone_01 = A rock. Mission Control asks if you're kidding.
        #CSS_Aebestach_ROCScience_DunaStone_02 = Classic Mars-weathered rock. Rust-red surface from iron oxide coating; interior likely basalt. Atypical: you named it "Mr. Stone."
        #CSS_Aebestach_ROCScience_EelooBerg_01 = Iceberg! On a dwarf planet!
        #CSS_Aebestach_ROCScience_EelooBerg_02 = Eeloo's ice berg (ice mound)! Erosion or compression of surface ice. At this distant orbit, such structures may have existed billions of years. The icy poetry of a Pluto-like world.
        #CSS_Aebestach_ROCScience_EelooBrownBoulder_01 = Brown boulder. Looks like chocolate against the white.
        #CSS_Aebestach_ROCScience_EelooBrownBoulder_02 = Eeloo brown boulder—ice-rock mix stained by organics (tholins)? Eeloo equator has similar hue. Billions of years of solar "cooking" produced these complex carbon compounds. Cosmic caramelization.
        #CSS_Aebestach_ROCScience_EelooIceChunk_01 = Ice. Lots of ice. Very cold.
        #CSS_Aebestach_ROCScience_EelooIceChunk_02 = Eeloo ice chunk—frozen archive at the system's edge. May hold primordial volatiles. You watch your breath freeze, thinking of home 3 billion km away. At least this ice is as lonely as you.
        #CSS_Aebestach_ROCScience_EveBasaltFormation_01 = Basalt formation. Hard volcanic legacy.
        #CSS_Aebestach_ROCScience_EveBasaltFormation_02 = Eve basalt! Remnant of ancient lava flows. Remarkably preserved under extreme conditions—Eve's air both crushes and protects. You photograph the section, wondering if Kerbin basalt envies this "sauna treatment."
        #CSS_Aebestach_ROCScience_EvePancakeDome_01 = A flat dome. Like someone squashed a volcano.
        #CSS_Aebestach_ROCScience_EvePancakeDome_02 = Pancake dome! Typical structure from high-viscosity lava; found on Venus too. Eve's geology proves again: the universe repeats itself. This dome could probably fry an egg.
        #CSS_Aebestach_ROCScience_EveVolcanicRock_01 = Volcanic rock. Purple. Fits Eve.
        #CSS_Aebestach_ROCScience_EveVolcanicRock_02 = Eve volcanic rock! Extrusive rock under crushing pressure, possibly rare minerals. Purple hue from some as-yet-unnamed compound. You name it "Eve Purple." Patent pending.
        #CSS_Aebestach_ROCScience_GillyRidgeline_01 = A tiny ridge. By Gilly standards, that's a mountain range.
        #CSS_Aebestach_ROCScience_GillyRidgeline_02 = Gilly's ridgeline! In microgravity, such terrain may be impact ejecta accumulation or remnant of ancient structure. Low gravity makes all geologic processes... lazy. The moon included.
        #CSS_Aebestach_ROCScience_KerbinBaobabTree_01 = You study an unusually tall tree. Baobab? On Kerbin?
        #CSS_Aebestach_ROCScience_KerbinBaobabTree_02 = Kerbin's baobab! Water-storing trunk, longevity, edible—a survivalist's friend. Ring analysis shows how many storms it's weathered. You hug it. It doesn't object.
        #CSS_Aebestach_ROCScience_KerbinGiantQuartz_01 = A huge transparent crystal. You suspect treasure beneath.
        #CSS_Aebestach_ROCScience_KerbinGiantQuartz_02 = Giant quartz crystal! Hydrothermal activity nurtured it in a geode for millennia. Optically pure—good for precision optics. Or, you know, a paperweight. A very fancy one.
        #CSS_Aebestach_ROCScience_LaytheBoulder_01 = A boulder. Possibly wave-smoothed.
        #CSS_Aebestach_ROCScience_LaytheBoulder_02 = Laythe boulder—possibly wave- or glacier-transported. Weathering under oxygen atmosphere resembles Kerbin. Standing by the "shore," you almost feel homesick.
        #CSS_Aebestach_ROCScience_LaytheGeyser_01 = A geyser! Water! At Jool-moon distance!
        #CSS_Aebestach_ROCScience_LaytheGeyser_02 = Laythe's geyser! Geothermal vent of a subsurface ocean—tidal heating. Liquid water, heat, organics... conditions for life converge here. You caught a bottle to taste. Mission Control stopped you.
        #CSS_Aebestach_ROCScience_LaytheStone_01 = An ordinary rock. Precious on Laythe.
        #CSS_Aebestach_ROCScience_LaytheStone_02 = Laythe rock sample. Geological archive of an ocean world—may contain sediment layers or bioturbation. You check carefully for shells. None yet. Hope remains.
        #CSS_Aebestach_ROCScience_MinmusGreenSandstone_01 = Green rock. Not cheese. You checked.
        #CSS_Aebestach_ROCScience_MinmusGreenSandstone_02 = Minmus green sandstone! Iron minerals in reducing environment produce the hue. Hints at ancient ice-lava interaction. High science value; Minmus cheese substitute value: zero.
        #CSS_Aebestach_ROCScience_MinmusOlivineFormation_01 = Olivine? Here?
        #CSS_Aebestach_ROCScience_MinmusOlivineFormation_02 = Olivine formation! A window to mantle material, usually from depth. Finding it on Minmus suggests a more complex geologic history. Green as mint candy, hard as... rock.
        #CSS_Aebestach_ROCScience_MohoStone_01 = A rock baked by the Sun. Touch = burn.
        #CSS_Aebestach_ROCScience_MohoStone_02 = Moho rock—surface material that's endured extreme thermal cycling. May contain rare refractory minerals. You nearly roasted your gloves bagging it. Mercury-style adventure, literally.
        #CSS_Aebestach_ROCScience_MohoWrinkleRidge_01 = Wrinkles on the surface. Like a dried riverbed, but rock.
        #CSS_Aebestach_ROCScience_MohoWrinkleRidge_02 = Wrinkle ridge! Formed when planetary cooling and contraction squeezes the crust. Common on real Mercury. Moho has them too—proof this rock had an active past. Now it's just wrinkly.
        #CSS_Aebestach_ROCScience_MunCrater_01 = A crater. The Moon's most common feature, besides... more craters.
        #CSS_Aebestach_ROCScience_MunCrater_02 = A fresh (geologically) crater! Ray system not yet erased by micrometeorites. Ejecta at the rim are perfect for analyzing lunar regolith. Also confirms Newton—things fall down.
        #CSS_Aebestach_ROCScience_MunLargeCrater_01 = A very big crater. Big enough to want to jump in.
        #CSS_Aebestach_ROCScience_MunLargeCrater_02 = A large impact basin! Such structures reveal the Moon's early bombardment. Magma fill formed the maria. You stand on a wound of history, feeling small and awed.
        #CSS_Aebestach_ROCScience_MunStone_01 = Lunar rock. Armstrong would be proud... probably.
        #CSS_Aebestach_ROCScience_MunStone_02 = Lunar rock sample! Rich in plagioclase and pyroxene—typical mare basalt. Possibly over 3 billion years old. You signed it. Mission Control sighed.
        #CSS_Aebestach_ROCScience_PolYellowStones_01 = Yellow rocks. Pol is already colorful; yellow is understated.
        #CSS_Aebestach_ROCScience_PolYellowStones_02 = Pol's yellow rocks—sulfide or iron oxide weathering? Mineralogy of porous low-density surface remains a puzzle. These rocks defy classification like Pol itself. You bag some for Kerbin's petrologists to headache over.
        #CSS_Aebestach_ROCScience_TyloCheckerboard_01 = Checkerboard terrain. Is Tylo cosplaying chess?
        #CSS_Aebestach_ROCScience_TyloCheckerboard_02 = Checkerboard terrain! Alternating bright/dark pattern from impact ejecta—similar features on Callisto and others. Tylo narrates its impact history, square by square.
        #CSS_Aebestach_ROCScience_TyloDarkBoulder_01 = Dark boulder. Tylo standard.
        #CSS_Aebestach_ROCScience_TyloDarkBoulder_02 = Tylo dark boulder—possibly from ancient volcanism or impact basin. Low albedo suggests mafic composition. Under Tylo's gravity, this rock is truly "grounded."
        #CSS_Aebestach_ROCScience_TyloLightStone_01 = Light-colored rock. Stands out in Tylo's gloom.
        #CSS_Aebestach_ROCScience_TyloLightStone_02 = Tylo light rock—high albedo, possibly anorthosite or impact melt. On grey Tylo surface it's like a cream cookie filling. Geologically speaking.
        #CSS_Aebestach_ROCScience_VallCryovolcano_01 = Cryovolcano! Ice, not fire.
        #CSS_Aebestach_ROCScience_VallCryovolcano_02 = Vall's cryovolcano! Water-ammonia mix erupts from ice shell fractures, freezing into spectacular ice towers in vacuum. Textbook Europa-style geology. You stand by the vent, feeling you're touring the moon's "respiratory organ."
        #CSS_Aebestach_ROCScience_VallIceChunk_01 = A big chunk of ice. You consider licking it.
        #CSS_Aebestach_ROCScience_VallIceChunk_02 = Vall ice chunk! Remarkably pure; may preserve chemical traces of ancient ocean. Analysis shows trace chlorides and organics—more clues for subsurface life. Don't lick; radiation.
        #CSS_Aebestach_ROCScience_VallStone_01 = Rock on an ice world. Rare as gems.
        #CSS_Aebestach_ROCScience_VallStone_02 = Vall rock—pristine material exposed from beneath the ice shell. Possibly from silicate mantle or impact ejecta. In an icy cosmos, a rock is a postcard from the "inner world."
    }
}
