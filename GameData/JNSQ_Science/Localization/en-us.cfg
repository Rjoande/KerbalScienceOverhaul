        #JNSQscience_crewReport_NaraInSpaceHigh_00 = Kerbol is just another bright point now. You verify the return plan for the fifth time and quietly look for the section labeled “ruby slippers.”
        #JNSQscience_crewReport_NaraInSpaceHigh_01 = The inner system is a faint, crowded glitter smear. You feel proud, and then you remember you still have to go back.
        #JNSQscience_crewReport_NaraInSpaceHigh_02 = The capsule is a tiny warm bubble in a lot of nothing. Even the checklists sound more serious this far out.
        #JNSQscience_crewReport_NaraInSpaceLow_00 = Nara swells beneath you: a pale, heavy sky over a world that looks like it has forgotten what “warm” means.
        #JNSQscience_crewReport_NaraInSpaceLow_01 = Low orbit feels uncomfortably close, like the planet is watching you line up a landing and judging your math.
        #JNSQscience_crewReport_NaraInSpaceLow_02 = Thin sunlight glances off bright frost fields and dark ridges. You mark a landing zone and underline the word “escape.”
        #JNSQscience_crewReport_NaraFlyingHigh_00 = You’re still in “atmosphere,” somehow. The air is cold, dense, and full of quiet hiss like a giant leak you can’t fix.
        #JNSQscience_crewReport_NaraFlyingHigh_01 = High above the surface, the clouds glow faintly with weak sunlight. It’s beautiful in a way that suggests danger.
        #JNSQscience_crewReport_NaraFlyingHigh_02 = The cabin creaks as you ride the upper winds. You write: “Return vehicle should not be optional.”
        #JNSQscience_crewReport_NaraSrfLandedLowlands_00 = The ground crunches like old sugar under the landing legs. The pressure outside makes the hull complain in slow groans.
        #JNSQscience_crewReport_NaraSrfLandedLowlands_01 = Frost creeps over the window edges while you watch. You decide not to say the word “trapped” out loud.
        #JNSQscience_crewReport_NaraSrfLandedLowlands_02 = The manual mentioned ruby slippers. You check the locker. You have boots, snacks, and regret.
        #JNSQscience_crewReport_NaraSrfLandedMidlands_00 = Rolling, dim ridges stretch into haze. The air is thick enough that the horizon looks tired.
        #JNSQscience_crewReport_NaraSrfLandedMidlands_01 = Sound carries oddly through the dense cold. Every bolt ping makes the craft feel less like a machine and more like a patient.
        #JNSQscience_crewReport_NaraSrfLandedMidlands_02 = You plant a flag and it stands stiff as a board. You immediately start thinking about how to un-plant yourself.
        #JNSQscience_crewReport_NaraSrfLandedHighlands_00 = You’re higher up, but the pressure still leans on everything. Nara doesn’t do “thin air,” it does “heavy silence.”
        #JNSQscience_crewReport_NaraSrfLandedHighlands_01 = Wind scours frost into little drifts around the landing gear. It looks tidy, like the planet is cleaning up after you.
        #JNSQscience_crewReport_NaraSrfLandedHighlands_02 = You write an inspirational note about achievement, then add: “Achievement is not the same as survival.”
        #JNSQscience_crewReport_NaraSrfLandedMountains_00 = Jagged peaks cut the pale sky like broken teeth. You keep your hands on the controls a few seconds longer than necessary.
        #JNSQscience_crewReport_NaraSrfLandedMountains_01 = Normal gravity means no heroic hopping—just careful, deliberate steps and the constant thought of falling.
        #JNSQscience_crewReport_NaraSrfLandedMountains_02 = The ascent plan suddenly feels like a fairy tale. You begin to understand why the slippers were specified.
        #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_00 = Flat, bright fields stretch forever, interrupted by dark seams where the surface looks stressed.
        #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_01 = The window fogs and freezes in delicate patterns. You scrape a little clear and immediately wish you hadn’t.
        #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_02 = You try to picture Kerbin’s green. The image feels like something you read in a book a long time ago.
        #JNSQscience_crewReport_NaraSrfLandedPoles_00 = The sun barely grazes the horizon, if it shows up at all. This place has mastered the art of not caring.
        #JNSQscience_crewReport_NaraSrfLandedPoles_01 = Fine crystals tap at the hull like sand, only quieter and somehow meaner.
        #JNSQscience_crewReport_NaraSrfLandedPoles_02 = You file a report that begins with “We made it.” You pause a long time before writing the next sentence.
        #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_00 = The wind up here finds every gap and every weakness. The ship shudders like it wants to leave without you.
        #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_01 = Radio delay makes Mission Control feel like a rumor. You start reading checklists out loud for company.
        #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_02 = You stomp your boots for warmth and wonder if ruby slippers come with thermal lining.
        #JNSQscience_crewReport_NaraFlyingLowLowlands_00 = The air is so thick you feel like you could paddle through it. Lift is easy; control is not.
        #JNSQscience_crewReport_NaraFlyingLowLowlands_01 = Cold turbulence bumps the craft in slow, heavy punches. You log that Nara’s weather is patient and persistent.
        #JNSQscience_crewReport_NaraFlyingLowLowlands_02 = Frost crystals stream past the window like glitter. You do not open any vents, no matter how curious you feel.
        #JNSQscience_crewReport_NaraFlyingLowMidlands_00 = The hills slide under you in muted waves. You keep expecting the ground to reach up and grab the landing gear.
        #JNSQscience_crewReport_NaraFlyingLowMidlands_01 = The instruments hiss with static as you pass through charged haze layers. You write: “Atmosphere fights back.”
        #JNSQscience_crewReport_NaraFlyingLowMidlands_02 = Valleys fill with milky fog that hides depth and distance. You fly by numbers and sheer stubbornness.
        #JNSQscience_crewReport_NaraFlyingLowHighlands_00 = Engines work harder as the terrain rises, but the air refuses to thin politely. It just stays heavy and cold.
        #JNSQscience_crewReport_NaraFlyingLowHighlands_01 = Updrafts shove the craft sideways without warning. You grip the controls and promise to never complain about Kerbin again.
        #JNSQscience_crewReport_NaraFlyingLowHighlands_02 = You note that mistakes here are not punished quickly. They are punished thoroughly.
        #JNSQscience_crewReport_NaraFlyingLowMountains_00 = Mountain waves toss the craft like a toy, only slower and with more expensive consequences.
        #JNSQscience_crewReport_NaraFlyingLowMountains_01 = Clouds scrape the peaks and make the ridgelines disappear and reappear. You decide you dislike surprises.
        #JNSQscience_crewReport_NaraFlyingLowMountains_02 = The ground looks close, then closer, then suddenly very interested in you. You climb away and exhale.
        #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_00 = Visibility drops to a bright blur. The world becomes instruments, guesses, and a lot of faith in engineering.
        #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_01 = Frost devils spin across the flats, lifting glittering crystals into the air. They look pretty right up until they hit the intake.
        #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_02 = The craft crackles with tiny static pops. You add “grounding strap” to the list of things you wish you had.
        #JNSQscience_crewReport_NaraFlyingLowPoles_00 = A polar vortex grabs the craft and tries to spin you into a new career as debris.
        #JNSQscience_crewReport_NaraFlyingLowPoles_01 = Kerbol is a dull smear through cloud and haze. You navigate by numbers and hope the numbers are honest.
        #JNSQscience_crewReport_NaraFlyingLowPoles_02 = For a second you imagine just flying home. Then you remember space is in the way.
        #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_00 = Supercooled haze builds rime on anything exposed. The ship starts growing its own little teeth.
        #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_01 = Altitude changes feel wrong in this dense air. You trust radar and stop trusting feelings.
        #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_02 = You write a calm, professional note about atmospheric sampling, then add a second line: “Still want my slippers.”

        #JNSQscience_crewReport_AmosSrfLandedLowlands_00 = The ground is so dark your headlamp feels underqualified. The crew agrees it’s “very scientific.”
        #JNSQscience_crewReport_AmosSrfLandedMidlands_00 = The surface crunches like ancient freezer burn under the landing gear. You write that down, because you can.
        #JNSQscience_crewReport_AmosSrfLandedHighlands_00 = From up here, the landscape looks like it’s been carefully dusted with soot. You begin to suspect Amos enjoys being hard to read.
        #JNSQscience_crewReport_AmosSrfLandedMountains_00 = Every step turns into a slow-motion hop that lasts just long enough to regret it. The crew calls it “low-g conditioning.”
