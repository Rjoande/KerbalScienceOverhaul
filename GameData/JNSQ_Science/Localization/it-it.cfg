        #JNSQscience_bd_multiSpec_HuygenInSpaceLowMountains_00 = Le ombre delle montagne bucano il bagliore atmosferico, producendo bordi termici nitidi. Lo scanner riesce a ottenere una mappa pulita delle creste e si comporta come se ne fosse molto fiero.
        #JNSQscience_bd_multiSpec_HuygenInSpaceLowPeaks_00 = I crinali delle cime saturano una banda e scompaiono in un'altra per via di abbagliamento e foschia. Il composito finale sembra come se qualcuno avesse disegnato montagne con un pennarello sbavato.
        #JNSQscience_bd_multiSpec_HuygenInSpaceLowPolarLowlands_00 = Le pianure polari mostrano un comportamento termico più uniforme e deboli chiazze luminose che persistono tra i passaggi. Se qui si raccolgono volatili, lo fanno in silenzio.
        #JNSQscience_bd_multiSpec_HuygenInSpaceLowPoles_00 = Le regioni polari restituiscono firme più fredde con motivi ostinatamente coerenti, nonostante la foschia. Il Controllo Missione scrive "bersaglio stabile" e poi lo sottolinea due volte.
        #JNSQscience_bd_multiSpec_HuygenInSpaceLowPolarHighlands_00 = Gli altipiani polari mostrano caratteristiche di assorbimento più nette delle distese vicine, accennando a affioramenti più puliti sopra la torbidità. I dati sembrano una scogliera che emerge dalla nebbia.
