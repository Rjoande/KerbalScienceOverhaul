        #ScienceRefactor_bd_multiSpec_DunaInSpaceLowEasternCanyon_00 = L'analisi della composizione superficiale basata su emissioni e riflessioni luminose indica che il Canyon Orientale di Duna penetra sotto il regolite tipico, esponendo un bedrock più antico.
        #ScienceRefactor_bd_multiSpec_DunaInSpaceLowMidlandSea_00 = Anche se si teorizza che questa regione fosse un tempo piena d'acqua liquida, l'analisi multispettrale mostra poco ghiaccio d'acqua, suggerendo che sia scomparso da tempo.
