@EXPERIMENT_DEFINITION:HAS[#id[logIonTrap]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_logIonTrap_SunInSpaceLow_00 // The ion trap saturates almost instantly. The ions are far too excited this close to the Sun.
        SunInSpaceHigh* = #JNSQscience_logIonTrap_SunInSpaceHigh_00 // In interplanetary space, the ion stream arrives in steady sheets with occasional gusty spikes that don’t match anything local.

        EdnaInSpaceLow* = #JNSQscience_logIonTrap_EdnaInSpaceLow_00 // A faint wake of sputtered ions trails Edna, but the trap mostly collects the same sparse solar wind as everywhere else out here.
        EdnaInSpaceHigh* = #JNSQscience_logIonTrap_EdnaInSpaceHigh_00 // The counts stay low and steady. Edna contributes little more than a small shadow in an otherwise quiet particle stream.

        DakInSpaceLow* = #JNSQscience_logIonTrap_DakInSpaceLow_00 // A close pass over Dak kicks up a brief spray of charged dust and then the ions go right back to drifting aimlessly.
        DakInSpaceHigh* = #JNSQscience_logIonTrap_DakInSpaceHigh_00 // The readings are mostly background particles.

        LindorInSpaceLow* = #JNSQscience_logIonTrap_LindorInSpaceLow_00 // The ion trap fills with cold, slow ions. Lindor’s invisible shield is doing serious work.
        LindorInSpaceHigh* = #JNSQscience_logIonTrap_LindorInSpaceHigh_00 // Even far out, the detector still ticks with trapped particles. Lindor’s reach is unfair.

        KrelInSpaceLow* = #JNSQscience_logIonTrap_KrelInSpaceLow_00 // Over Krel, the trap catches a thin spray of sputtered salts mixed into Lindor’s roaming plasma.
        KrelInSpaceHigh* = #JNSQscience_logIonTrap_KrelInSpaceHigh_00 // Away from Krel, the readings smooth into a steady current that still whispers “parent planet nearby.”

        AdenInSpaceLow* = #JNSQscience_logIonTrap_AdenInSpaceLow_00 // A brief burst of charged dust pings the sensors; Aden sheds more particles than it has any right to.
        AdenInSpaceHigh* = #JNSQscience_logIonTrap_AdenInSpaceHigh_00 // The trap mostly counts background ions, with occasional spikes when you cross a plasma sheet.

        HuygenInSpaceLow* = #JNSQscience_logIonTrap_HuygenInSpaceLow_00 // The upper haze leaks a messy cocktail of ions; the trap logs it as “highly enthusiastic chemistry.”
        HuygenInSpaceHigh* = #JNSQscience_logIonTrap_HuygenInSpaceHigh_00 // Above the glow, the stream turns orderly again. Lindor’s field lines are clearly in charge.

        RigaInSpaceLow* = #JNSQscience_logIonTrap_RigaInSpaceLow_00 // Riga stirs the plasma like a paddle in soup. The ion trap records swirling bursts and sharp edges.
        RigaInSpaceHigh* = #JNSQscience_logIonTrap_RigaInSpaceHigh_00 // The count rate rises and falls in a slow rhythm, as if Riga is sweeping through bands of trapped particles.

        TalosInSpaceLow* = #JNSQscience_logIonTrap_TalosInSpaceLow_00 // Talos contributes a timid puff of ions, then goes back to pretending it isn’t there.
        TalosInSpaceHigh* = #JNSQscience_logIonTrap_TalosInSpaceHigh_00 // Nearly nothing changes for minutes at a time. The ion trap begins to appreciate silence.

        CelesInSpaceLow* = #JNSQscience_logIonTrap_CelesInSpaceLow_00 // The ion trap catches a faint wisp of ions that feels more like Eeloo’s thin breath than anything Celes can muster.
        CelesInSpaceHigh* = #JNSQscience_logIonTrap_CelesInSpaceHigh_00 // Out here the solar wind is a miser. The detector logs a slow drizzle of charged particles and a lot of nothing.

        TamInSpaceLow* = #JNSQscience_logIonTrap_TamInSpaceLow_00 // A brief burst of charged grit pings the sensors as Tam’s surface gets sandblasted into ions.
        TamInSpaceHigh* = #JNSQscience_logIonTrap_TamInSpaceHigh_00 // The readings flatten into steady background counts, occasionally punctuated by a wandering plasma gust.

        HamekInSpaceLow* = #JNSQscience_logIonTrap_HamekInSpaceLow_00 // The trap collects an odd mix of ions near Hamek. The spectra don’t quite match the usual ice-and-dust expectations.
        HamekInSpaceHigh* = #JNSQscience_logIonTrap_HamekInSpaceHigh_00 // Particle counts drop so low you start suspecting the universe is simply running out of spare ions.

        NaraInSpaceLow* = #JNSQscience_logIonTrap_NaraInSpaceLow_00 // The trap fills with light ions and jittery bursts. Nara’s upper atmosphere and magnetosphere are having a loud conversation.
        NaraInSpaceHigh* = #JNSQscience_logIonTrap_NaraInSpaceHigh_00 // Out in deep space the counts settle down, but a faint, persistent drift suggests Nara is still influencing the flow from afar.

        AmosInSpaceLow* = #JNSQscience_logIonTrap_AmosInSpaceLow_00 // A thin spray of charged dust flicks the detector as Amos skims through Nara’s plasma like a pebble through mist.
        AmosInSpaceHigh* = #JNSQscience_logIonTrap_AmosInSpaceHigh_00 // Mostly background ions, with brief spikes whenever you wander into a stray filament from Nara’s domain.

        EnonInSpaceLow* = #JNSQscience_logIonTrap_EnonInSpaceLow_00 // The ion trap catches cold, water-group ions knocked loose from Enon’s icy surface—like a snowball quietly evaporating into space.
        EnonInSpaceHigh* = #JNSQscience_logIonTrap_EnonInSpaceHigh_00 // The stream thins to a sparse drizzle. Enon’s contribution fades until it’s just another quiet shadow.

        PraxInSpaceLow* = #JNSQscience_logIonTrap_PraxInSpaceLow_00 // The trap records erratic pings of charged grit, as if Prax is shedding tiny particles into the dark one by one.
        PraxInSpaceHigh* = #JNSQscience_logIonTrap_PraxInSpaceHigh_00 // The readings flatten into steady emptiness.
    }
}