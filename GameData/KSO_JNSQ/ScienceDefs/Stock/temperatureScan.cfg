        SunFlyingLowNorthTropicZone* = #JNSQscience_temperatureScan_SunFlyingLowNorthTropicZone_00 // The display can’t decide whether to show a number or a warning symbol. It alternates rapidly.
        SunFlyingLowEquatorialZone* = #JNSQscience_temperatureScan_SunFlyingLowEquatorialZone_00 // The thermometer reaches its limit and just shows a melting icon where the temperature should be.
