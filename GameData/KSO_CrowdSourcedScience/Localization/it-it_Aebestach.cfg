        #CSS_Aebestach_temperatureScan_Eeloo_01 = Fragipan di Eeloo. Freddo. Freddo da Eeloo.
        #CSS_Aebestach_temperatureScan_Eeloo_02 = Campo di Babbage di Eeloo. Temperature glaciali.
        #CSS_Aebestach_temperatureScan_Eeloo_03 = Ghiacciai australi di Eeloo. Freddo da ghiacciaio.
        #CSS_Aebestach_temperatureScan_Eeloo_04 = Ghiacciaio Mu di Eeloo. Temperature nel fiume di ghiaccio.
