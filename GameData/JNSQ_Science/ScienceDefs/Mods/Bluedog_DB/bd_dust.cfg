@EXPERIMENT_DEFINITION:HAS[#id[bd_dust]]
{
    %RESULTS
    {
        SunFlyingLowNorthPolarZone* = #JNSQscience_bd_dust_SunFlyingLowNorthPolarZone_00 // The collector registers charged specks that drift in tidy arcs, like the air is drawing with static.
        SunFlyingLowNorthSubpolarZone* = #JNSQscience_bd_dust_SunFlyingLowNorthSubpolarZone_00 // Grain impacts come in short, sparky bursts. The housing smells faintly of “hot metal.”
        SunFlyingLowNorthTemperateZone* = #JNSQscience_bd_dust_SunFlyingLowNorthTemperateZone_00 // Fine particulates arrive with a steady electrical crackle. The filter looks lightly toasted.
        SunFlyingLowNorthTropicZone* = #JNSQscience_bd_dust_SunFlyingLowNorthTropicZone_00 // The inlet gets peppered by fast, bright grains that refuse to sit still in the tray.
        SunFlyingLowEquatorialZone* = #JNSQscience_bd_dust_SunFlyingLowEquatorialZone_00 // Particle density climbs and the charges get loud. The sampler logs “abrasive plasma glitter.”
        SunFlyingLowSouthTropicZone* = #JNSQscience_bd_dust_SunFlyingLowSouthTropicZone_00 // A thin haze of energetic dust hits in rhythmic pulses, as if the atmosphere is breathing sparks.
        SunFlyingLowSouthTemperateZone* = #JNSQscience_bd_dust_SunFlyingLowSouthTemperateZone_00 // Impacts are fewer, but sharper. Whatever makes it here arrives determined.
        SunFlyingLowSouthSubpolarZone* = #JNSQscience_bd_dust_SunFlyingLowSouthSubpolarZone_00 // The grains carry uneven charges and jittery trajectories. The data looks mildly annoyed.
        SunFlyingLowSouthPolarZone* = #JNSQscience_bd_dust_SunFlyingLowSouthPolarZone_00 // Cold-looking, pale specks drift in, then flash as they charge up. The tray crackles quietly.
        SunFlyingHigh* = #JNSQscience_bd_dust_SunFlyingHigh_00 // The detector finds only rare, fast grains and a lot of empty readout. The few hits it gets are very enthusiastic.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_dust_SunInSpaceLowNorthPolarZone_00 // Sparse dust streaks pass by with strong charge signatures, as if they’re riding invisible lanes.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_dust_SunInSpaceLowNorthSubpolarZone_00 // The sampler catches a faint stream of fine grains that pop the counter like tiny sparks.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_dust_SunInSpaceLowNorthTemperateZone_00 // Low, steady impact ticks suggest a thin halo of particulates drifting just above the upper atmosphere.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_dust_SunInSpaceLowNorthTropicZone_00 // The particle spectrum shows bright, energetic grains that don’t stay neutral for long.
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_dust_SunInSpaceLowEquatorialZone_00 // Impact rates rise in clumps, like dust is being herded into bands before it escapes.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_dust_SunInSpaceLowSouthTropicZone_00 // A diffuse veil of charged specks drifts past.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_dust_SunInSpaceLowSouthTemperateZone_00 // The sensor records intermittent bursts of fast grains, then long quiet gaps.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_dust_SunInSpaceLowSouthSubpolarZone_00 // Dust hits arrive in paired pulses with similar charge.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_dust_SunInSpaceLowSouthPolarZone_00 // The counter barely ticks, until it suddenly doesn’t stop. Something up here likes polar routes.
        SunInSpaceHigh* = #JNSQscience_bd_dust_SunInSpaceHigh_00 // Interplanetary space is mostly emptiness, with occasional micrometeoroid dust pinging the sensor like distant, lonely gravel.

        MohoInSpaceHigh* = #JNSQscience_bd_dust_MohoInSpaceHigh_00 // The counter spikes with fast micrometeoroids and sun-baked dust. Everything up here feels sharp and impatient.
        MohoSrfLandedPoles* = #JNSQscience_bd_dust_MohoSrfLandedPoles_00 // The collector finds pale, powdery grains that look heat-bleached, until they hit the tray and act like hot sand.
        MohoSrfLandedLowlands* = #JNSQscience_bd_dust_MohoSrfLandedLowlands_00 // Dark, heavy grit slides in like it’s been melted, crushed, and melted again.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_dust_MohoSrfLandedPolarIceCraters_00 // Shadowed pits cough up dusty frost grains that sublimate the moment you look too closely.
        MohoSrfLandedHighlands* = #JNSQscience_bd_dust_MohoSrfLandedHighlands_00 // Coarse regolith chips rattle into the intake, sounding like tiny ceramic tiles.
        MohoSrfLandedMidlands* = #JNSQscience_bd_dust_MohoSrfLandedMidlands_00 // Fine, uniform dust settles instantly, as if the ground has been pre-sifted by heat.
        MohoSrfLandedCraters* = #JNSQscience_bd_dust_MohoSrfLandedCraters_00 // Impact glass flecks and jagged grit arrive together. The analyzer labels it “freshly offended.”
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_dust_MohoSrfLandedExoticCraters_00 // Oddly reflective grains tumble in, flashing bright even in the shadow of the housing.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_dust_MohoSrfLandedRareCraters_00 // A messy mix of sizes shows up, suggesting newer ejecta that hasn’t been cooked smooth yet.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_dust_MohoSrfLandedVoronoiCraters_00 // The dust comes in strangely consistent textures, like the surface got “patterned” before it broke apart.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_dust_MohoSrfLandedNotableCraters_00 // The sampler fills with chaotic ejecta powder that refuses to pack evenly, no matter how you tap it.
        MohoSrfLandedPeaks* = #JNSQscience_bd_dust_MohoSrfLandedPeaks_00 // Sharp, angular grains ping the inlet with extra enthusiasm. High ground, high attitude.
        MohoInSpaceLowPoles* = #JNSQscience_bd_dust_MohoInSpaceLowPoles_00 // Dust hits are sparse over the poles, but each grain arrives electrically cranky and very, very fast.
        MohoInSpaceLowLowlands* = #JNSQscience_bd_dust_MohoInSpaceLowLowlands_00 // A thin haze of fine particles drifts past, like the lowlands are quietly shedding into near-space.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_dust_MohoInSpaceLowPolarIceCraters_00 // Tiny volatile-rich grains appear in brief bursts, then vanish as if they remembered the temperature.
        MohoInSpaceLowHighlands* = #JNSQscience_bd_dust_MohoInSpaceLowHighlands_00 // Occasional sharp impacts suggest tougher grains making the climb and keeping their edges.
        MohoInSpaceLowMidlands* = #JNSQscience_bd_dust_MohoInSpaceLowMidlands_00 // The detector records a steady trickle of fine hits. Quiet, persistent, and annoyingly abrasive.
        MohoInSpaceLowCraters* = #JNSQscience_bd_dust_MohoInSpaceLowCraters_00 // Impact signatures come in noisy clusters, like someone is still throwing gravel upward.
        MohoInSpaceLowExoticCraters* = #JNSQscience_bd_dust_MohoInSpaceLowExoticCraters_00 // Reflective flecks drift through in short streaks. The optics complain about “sparkly debris.”
        MohoInSpaceLowRareCraters* = #JNSQscience_bd_dust_MohoInSpaceLowRareCraters_00 // A few heavier grains punch the housing, implying fresher, chunkier dust escaping briefly.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_dust_MohoInSpaceLowVoronoiCraters_00 // Repeating micro-bursts show up again. The analyzer calls it “organized dust” and gets quiet.
        MohoInSpaceLowNotableCraters* = #JNSQscience_bd_dust_MohoInSpaceLowNotableCraters_00 // Mixed particles arrive with irregular timing. Classic crater ejecta behavior, just in slow motion.
        MohoInSpaceLowPeaks* = #JNSQscience_bd_dust_MohoInSpaceLowPeaks_00 // Very few grains reach this track, but the ones that do arrive like tiny bullets.

        EveSrfLandedPoles* = #JNSQscience_bd_dust_EveSrfLandedPoles_00 // Pale, brittle dust clings in tiny flakes, as if the cold is trying to keep Eve’s haze on the ground.
        EveSrfLandedLowlands* = #JNSQscience_bd_dust_EveSrfLandedLowlands_00 // The sample is heavy, fine grit with a faintly sticky feel. The filter takes on a purple stain.
        EveSrfLandedMidlands* = #JNSQscience_bd_dust_EveSrfLandedMidlands_00 // A uniform blanket of powder packs tight in the tray. It behaves like it’s been ground very, very thoroughly.
        EveSrfLandedHighlands* = #JNSQscience_bd_dust_EveSrfLandedHighlands_00 // Sharper grains show up with scuffed surfaces, like they’ve been tumbled by thick air and bad intentions.
        EveSrfLandedPeaks* = #JNSQscience_bd_dust_EveSrfLandedPeaks_00 // The collector fills with harsh, angular grit. Even on a peak, Eve finds a way to sandblast things.
        EveSrfLandedMountains* = #JNSQscience_bd_dust_EveSrfLandedMountains_00 // Coarse, dark particles rattle in and immediately start abrading the intake. The instrument logs “ongoing regret.”
        EveSrfLandedShores* = #JNSQscience_bd_dust_EveSrfLandedShores_00 // Sand and crusty residue arrive together. The sample smells like “ocean,” if oceans could glare at you.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_dust_EveSrfLandedKrakensWell_00 // The dust comes in warm, swirling pulses, mixed with darker specks that suggest something below is still busy.
        EveSrfSplashed* = #JNSQscience_bd_dust_EveSrfSplashed_00 // The sensor is immediately coated in purple-tinted spray and suspended grit. It requests a towel and a safer planet.
        EveFlyingLowPoles* = #JNSQscience_bd_dust_EveFlyingLowPoles_00 // Thin, glittery grains drift past in slow motion. The air looks calm, but the inlet still keeps getting dusted.
        EveFlyingLowLowlands* = #JNSQscience_bd_dust_EveFlyingLowLowlands_00 // Particle counts jump high: dense haze, fine grains, and sticky aerosols all at once. Filters begin to sulk.
        EveFlyingLowMidlands* = #JNSQscience_bd_dust_EveFlyingLowMidlands_00 // A steady rain of micro-particles taps the housing. The sound is soft; the data is not.
        EveFlyingLowHighlands* = #JNSQscience_bd_dust_EveFlyingLowHighlands_00 // Turbulence lofts gritty bursts into the sampler. The density spikes every time the terrain gets interesting.
        EveFlyingLowPeaks* = #JNSQscience_bd_dust_EveFlyingLowPeaks_00 // Fewer particles overall, but they hit harder and sharper. The grains up here have ambition.
        EveFlyingLowExplodiumSea* = #JNSQscience_bd_dust_EveFlyingLowExplodiumSea_00 // The intake catches foamy droplets and bright specks that behave uncomfortably “active” in the airflow.
        EveFlyingLowMountains* = #JNSQscience_bd_dust_EveFlyingLowMountains_00 // Gusts carry abrasive grit in waves. The wear sensor updates its résumé.
        EveFlyingLowShores* = #JNSQscience_bd_dust_EveFlyingLowShores_00 // A messy blend of sand, spray, and airborne crust drifts in. The spectrum reads like “beach, but threatening.”
        EveFlyingLowPolarLakes* = #JNSQscience_bd_dust_EveFlyingLowPolarLakes_00 // Fine mist dominates, drying into tiny crystals on the optics. Visibility is optional; residue is not.
        EveFlyingLowPetrolLakes* = #JNSQscience_bd_dust_EveFlyingLowPetrolLakes_00 // The sampler collects oily aerosols that cling to everything. Dust sticks to the film like it’s trying to hide.
        EveFlyingLowSeaofAkron* = #JNSQscience_bd_dust_EveFlyingLowSeaofAkron_00 // Dense haze with salt-like grains in suspension. The instrument counts impacts faster than it can complain.
        EveFlyingLowSeaofNessus* = #JNSQscience_bd_dust_EveFlyingLowSeaofNessus_00 // The aerosol signature is thick and uniform, like a blanket. Something crunchy keeps riding along anyway.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_bd_dust_EveFlyingLowSeaofTaniwha_00 // Particle density pulses with shifting winds. The air is “alive” with drifting grit.
        EveFlyingLowSeaofGigan* = #JNSQscience_bd_dust_EveFlyingLowSeaofGigan_00 // Larger droplets smack the inlet, followed by fine dust that rides their wake. The tray looks spotted.
        EveFlyingLowSeaofRodan* = #JNSQscience_bd_dust_EveFlyingLowSeaofRodan_00 // The sample alternates between wet aerosol and dry grit, as if the atmosphere can’t commit to a phase.
        EveFlyingLowSeaofGojira* = #JNSQscience_bd_dust_EveFlyingLowSeaofGojira_00 // The collector records heavy, frequent impacts.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_bd_dust_EveFlyingLowSeaofGhidorah_00 // Three distinct particle populations show up at once: mist, fine dust, and sharp grit. None are polite.
        EveFlyingLowSeaofBagorah* = #JNSQscience_bd_dust_EveFlyingLowSeaofBagorah_00 // The haze carries dark specks that don’t match the surrounding air. The log notes “imported trouble.”
        EveFlyingLowKrakensWell* = #JNSQscience_bd_dust_EveFlyingLowKrakensWell_00 // Updrafts feed the sampler with warm, spiraling dust streams. The pattern looks almost deliberate.
        EveInSpaceLowPoles* = #JNSQscience_bd_dust_EveInSpaceLowPoles_00 // Thin wisps of high-altitude grains register over the poles. Eve’s haze leaves fingerprints even up here.
        EveInSpaceLowLowlands* = #JNSQscience_bd_dust_EveInSpaceLowLowlands_00 // A broad, faint particulate smear follows the orbit track. The planet is still trying to reach you.
        EveInSpaceLowMidlands* = #JNSQscience_bd_dust_EveInSpaceLowMidlands_00 // Low-energy impacts tick the counter steadily. The dust seems content to just… drift and judge.
        EveInSpaceLowHighlands* = #JNSQscience_bd_dust_EveInSpaceLowHighlands_00 // Occasional sharp spikes suggest tougher grains making the climb. They arrive like tiny purple bullets.
        EveInSpaceLowPeaks* = #JNSQscience_bd_dust_EveInSpaceLowPeaks_00 // Sparse particle hits, but the charge readings look lively. Whatever these grains are, they carry a mood.
        EveInSpaceLowExplodiumSea* = #JNSQscience_bd_dust_EveInSpaceLowExplodiumSea_00 // The detector catches reflective micro-droplets and bright specks. The signature looks unsettlingly “fresh.”
        EveInSpaceLowMountains* = #JNSQscience_bd_dust_EveInSpaceLowMountains_00 // A few energetic grains ping the housing, then silence. Eve’s exosphere does not waste anything.
        EveInSpaceLowShores* = #JNSQscience_bd_dust_EveInSpaceLowShores_00 // A faint band of salt-like particles traces the coastline below. The data draws a surprisingly neat curve.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_dust_EveInSpaceLowPolarLakes_00 // Tiny icy-looking aerosols appear as brief glittery bursts. They vanish before you can feel satisfied.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_dust_EveInSpaceLowPetrolLakes_00 // The spectrum shows stubborn, film-like particulates that refuse to disperse. Even in near-space, it clings.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_dust_EveInSpaceLowSeaofAkron_00 // A thin haze of micro-droplets drifts upward in weak plumes. The sampler logs “purple mist, persistent.”
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_dust_EveInSpaceLowSeaofNessus_00 // Particle density is slightly elevated, with a smooth distribution. It feels like flying over a slow leak.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_dust_EveInSpaceLowSeaofTaniwha_00 // Dust counts rise and fall in bands, like the atmosphere is breathing. The instrument is not reassured.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_dust_EveInSpaceLowSeaofGigan_00 // Impacts come in clustered bursts, suggesting patchy aerosol escape. The pattern repeats too neatly.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_dust_EveInSpaceLowSeaofRodan_00 // Fine grains and micro-droplets share the tray. The sample looks like “space dust” tried to become soup.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_dust_EveInSpaceLowSeaofGojira_00 // The sensor records heavier, faster impacts than expected. Something down there is throwing grit upward.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_dust_EveInSpaceLowSeaofGhidorah_00 // Multiple particle signatures overlap into a noisy spectrum. The analyzer labels it “complicated” and stops arguing.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_dust_EveInSpaceLowSeaofBagorah_00 // Dark, nonuniform grains drift through in short streaks. The tracker notes “localized source, unclear.”
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_dust_EveInSpaceLowKrakensWell_00 // A faint corkscrew of particulate matter appears in the readings, then fades. You pretend you didn’t notice.
        EveInSpaceHigh* = #JNSQscience_bd_dust_EveInSpaceHigh_00 // Mostly quiet background dust out here, with a faint purple-tinted population that insists on following you anyway.

        GillyInSpaceHigh* = #JNSQscience_bd_dust_GillyInSpaceHigh_00 // The sensor mostly finds emptiness, plus a few grains that seem like they could have been knocked loose by a sneeze.
        GillySrfLandedLowlands* = #JNSQscience_bd_dust_GillySrfLandedLowlands_00 // The dust is fluffy and reluctant to settle. You could probably scoop it with a gentle suggestion.
        GillySrfLandedMidlands* = #JNSQscience_bd_dust_GillySrfLandedMidlands_00 // Fine grains drift into the collector and then hover, as if they forgot gravity exists here.
        GillySrfLandedHighlands* = #JNSQscience_bd_dust_GillySrfLandedHighlands_00 // Chunkier grit arrives in slow, polite impacts. Even the rocks seem to tiptoe.
        GillyInSpaceLowLowlands* = #JNSQscience_bd_dust_GillyInSpaceLowLowlands_00 // Particle hits come and go in lazy puffs, like dust clouds are taking scenic routes around the rock.
        GillyInSpaceLowMidlands* = #JNSQscience_bd_dust_GillyInSpaceLowMidlands_00 // The detector catches a thin, drifting veil of grains that looks one shove away from becoming a ring.
        GillyInSpaceLowHighlands* = #JNSQscience_bd_dust_GillyInSpaceLowHighlands_00 // A few energetic specks ping the housing, then drift off as if they’re done with the whole idea.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_dust_KerbinSrfLandedAdministration_00 // The dust collector reports a rich mixture of paper fibers and carpet grit. The front desk asks if your particulate has the proper authorization stamp.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_dust_KerbinSrfLandedAstronautComplex_00 // Samples include snack crumbs, gym chalk, and something that might be “training residue.” The detector requests a shower and a waiver.
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_dust_KerbinSrfLandedBaikerbanur_00 // Fine, dry dust drifts in perfect little dunes around every doorway. The local clerk insists the only approved analysis is “yes, it is dusty.”
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_dust_KerbinSrfLandedBaikerbanurLaunchpad_00 // The instrument fills with pad grit, exhaust soot, and rule-compliant silence. A safety officer approves the data and disapproves your location.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_dust_KerbinSrfLandedCrawlerway_00 // Crushed rock dust pings the sensor like tiny footnotes to heavy machinery. You are asked to stop “sampling the road” and start sampling “somewhere not in the way.”
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_dust_KerbinSrfLandedFlagPole_00 // The detector records a noble swirl of dust, then a sudden drop when you’re told to stand back from the foundation. Evidently even dirt has a perimeter here.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_dust_KerbinSrfLandedIslandAirfield_00 // Salty sand and windblown grit turn the collector into a tiny beach. The reading is accurate, but now everything you own is “coastal.”
        KerbinSrfLandedKSC* = #JNSQscience_bd_dust_KerbinSrfLandedKSC_00 // A general scan finds concrete dust, launch soot, and traces of hurried footsteps. The official conclusion is “normal operations,” which is KSC for “do not investigate.”
        KerbinSrfLandedLaunchPad* = #JNSQscience_bd_dust_KerbinSrfLandedLaunchPad_00 // Particulates arrive in waves: soot, grit, then a dramatic cloud of “please step away from the vent.” Your sample bag is labeled “historic.”
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_dust_KerbinSrfLandedMissionControl_00 // The detector picks up fine electronics dust and perfectly aged snack salt. Mission Control reclassifies it as “operational particulate” and files it somewhere you can’t reach.
        KerbinSrfLandedR&D* = #JNSQscience_bd_dust_KerbinSrfLandedR&D_00 // Dust composition includes metal fines, ceramic powder, and one suspiciously glittery “prototype.” A scientist asks you to stop collecting their budget.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_dust_KerbinSrfLandedR&DCentralBuilding_00 // Air filtration makes the dust count almost too clean to believe. Your instrument later reveals a spike of “approval stamp residue” near the paperwork chute.
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_dust_KerbinSrfLandedR&DCornerLab_00 // The collector detects dust that clumps into perfect spheres, then tries to roll away. The lab door locks itself and someone says, “That’s not dust, that’s a feature.”
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_dust_KerbinSrfLandedR&DMainBuilding_00 // Layered dust signatures correlate with deadlines and coffee consumption. Engineers argue whether this makes it “predictable sediment” or “management.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_dust_KerbinSrfLandedR&DObservatory_00 // Fine roof grit and morning dew produce delicate, clingy dust. The astronomer requests you keep your “particulate excitement” below the optics.
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_dust_KerbinSrfLandedR&DSideLab_00 // The detector registers a steady haze of printer powder and “quick test” debris. A technician offers you a broom and calls it “field support equipment.”
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_dust_KerbinSrfLandedR&DSmallLab_00 // The dust is unnervingly uniform, like it was poured from a bag labeled DUST. You are handed a nondisclosure form and a very clean rag.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_dust_KerbinSrfLandedR&DTanks_00 // Samples contain compacted yard dust plus a faint aroma of “don’t touch that.” The tank crew recommends you analyze the air from behind the fence.
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_dust_KerbinSrfLandedR&DWindTunnel_00 // Particles behave nicely until the fans start, then the dust achieves flight certification. Your graph is annotated with “aerodynamic redistribution event.”
        KerbinSrfLandedRunway* = #JNSQscience_bd_dust_KerbinSrfLandedRunway_00 // The collector fills with rubber fines, paint flakes, and the ghost of tire smoke. Ground crew asks if your science can also remove skid marks.
        KerbinSrfLandedSPH* = #JNSQscience_bd_dust_KerbinSrfLandedSPH_00 // Aluminum shavings and primer dust dominate the sample, with a bonus of “mysterious bolt glitter.” An engineer asks if you can sort it back into usable parts.
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_dust_KerbinSrfLandedSPHMainBuilding_00 // Dust levels spike every time the big doors open, like the hangar is inhaling. You are told to keep the sensor away from “freshly improved” airframes.
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_dust_KerbinSrfLandedSPHRoundTank_00 // The collector captures fluffy insulation fibers that refuse to stay in the cup. A technician insists you are studying “the wrong kind of atmosphere.”
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_dust_KerbinSrfLandedSPHTanks_00 // Paint dust and rust powder create a spectrum of “official colors” and “unofficial aging.” Your report is accepted, then immediately used as a cleaning checklist.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_dust_KerbinSrfLandedSPHWaterTower_00 // Damp grit clumps into tiny mud meteors and sticks to everything. Safety declares this “slip-adjacent science” and adds more cones.
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationDishEast_00 // Gravel dust and cable-tray grit produce clean, steady counts—until the dish slews and everyone decides you did it. The dust remains innocent.
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationDishNorth_00 // The detector logs fine dust plus a suspicious amount of “indoors-only” lint. The dish keeps tracking you anyway, possibly for calibration.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationDishSouth_00 // The sample is neat, compact, and disciplined, like the staff. The dust count is low; the side-eye count is high.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationHub_00 // Indoor dust includes floor polish flakes and ancient snack salt from the consoles. The hub claims your sample is “mission-critical debris” and confiscates it.
        KerbinSrfLandedVAB* = #JNSQscience_bd_dust_KerbinSrfLandedVAB_00 // Concrete powder and metal dust drift down from impossible heights like industrial snowfall. The instrument suggests wearing a hardhat and a bigger respect for gravity.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_dust_KerbinSrfLandedVABMainBuilding_00 // The collector captures a constant rain of tiny particles shaken loose by cranes and ambition. The safety officer stamps your report “KNOWN CONDITION.”
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_dust_KerbinSrfLandedVABPodMemorial_00 // You collect a quiet, minimal dust sample and immediately feel like you should whisper. Even the detector clicks more respectfully here.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_dust_KerbinSrfLandedVABRoundTank_00 // The dust count is low, but each particle seems expensive. Security requests you stop “forensically inspecting” the tank’s surroundings.
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_dust_KerbinSrfLandedVABSouthComplex_00 // Welding grit and soot add a spicy edge to the particulate mix. You are handed a form titled “Hot Dust Handling Procedures.”
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_dust_KerbinSrfLandedVABTanks_00 // Yard dust arrives in layers: traffic, storage, panic, repeat. Your sample bag is labeled “normal,” which is somehow the most alarming result.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_dust_KerbinSrfLandedWoomerang_00 // Windblown dust repeatedly relocates itself mid-measurement. Your final report includes three different sample sites and one missing clipboard.

        KerbinSrfLandedIceCaps* = #JNSQscience_bd_dust_KerbinSrfLandedIceCaps_00 // The collector fills with icy grit and wind-packed snow dust. It complains the whole time.
        KerbinSrfLandedHighlands* = #JNSQscience_bd_dust_KerbinSrfLandedHighlands_00 // Mostly mineral fines with a thin seasoning of organic fluff. The filter turns a respectable tan.
        KerbinSrfLandedMountains* = #JNSQscience_bd_dust_KerbinSrfLandedMountains_00 // Sharp, angular grains. Great for science; terrible for anything with moving parts.
        KerbinSrfLandedShores* = #JNSQscience_bd_dust_KerbinSrfLandedShores_00 // Sand grains and salt crust fragments jam the inlet. The instrument smells faintly like beach.
