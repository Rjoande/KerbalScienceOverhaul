@EXPERIMENT_DEFINITION:HAS[#id[evaScience]]
{
    %RESULTS
    {
		GrannusInSpaceLow* = #GEPscience_evaScience_GrannusInSpaceLow_00 // You performed the EVA experiment while Grannus filled half the sky with a dull red glare and Mission Control answered several minutes later.
        GrannusInSpaceHigh* = #GEPscience_evaScience_GrannusInSpaceHigh_00 // You completed the EVA experiment in Grannus' high space, where the red sun felt more like a warning light than a sunrise.

        TaranisSrfLanded* = #GEPscience_evaScience_TaranisSrfLanded_00 // You carried out the EVA experiment on Taranis and immediately learned that “shade” was just another word for “still too hot” under a dim red sun.
        TaranisInSpaceLow* = #GEPscience_evaScience_TaranisInSpaceLow_00 // You ran the EVA experiment in low orbit over Taranis, watching its glowing day-side and frozen night-side swap places with unsettling speed.
        TaranisInSpaceHigh* = #GEPscience_evaScience_TaranisInSpaceHigh_00 // You executed the EVA experiment in high space over Taranis and the silence between check-ins made the whole system feel uncomfortably empty.

        ToutatisSrfLanded* = #GEPscience_evaScience_ToutatisSrfLanded_00 // You performed the EVA experiment on Toutatis and discovered the thin air was just thick enough to carry dust into everything you owned.
        ToutatisInSpaceLow* = #GEPscience_evaScience_ToutatisInSpaceLow_00 // You completed the EVA experiment in low orbit of Toutatis, jotting notes by the dim red sun while waiting out the long, scratchy reply from home.
        ToutatisInSpaceHigh* = #GEPscience_evaScience_ToutatisInSpaceHigh_00 // You conducted the EVA experiment high above Toutatis, where the twilight band looked inviting until the comm delay reminded you how far away you really were.

        NodensSrfLanded* = #GEPscience_evaScience_NodensSrfLanded_00 // You run the EVA experiment on Nodens. The dim red sun makes the horizon look permanently “late evening,” and the comm reply takes long enough to feel like a separate mission.
        NodensInSpaceLow* = #GEPscience_evaScience_NodensInSpaceLow_00 // You do the EVA experiment in low orbit of Nodens. The red sun glints off the suit, and Mission Control’s delayed “Copy” arrives like it was mailed.
        NodensInSpaceHigh* = #GEPscience_evaScience_NodensInSpaceHigh_00 // You complete the EVA experiment in Nodens’ high space. The planet is small, the sun is dim, and the distance feels measurable in heartbeats between transmissions.

        BelisamaSrfLanded* = #GEPscience_evaScience_BelisamaSrfLanded_00 // You run the EVA experiment on Belisama. The ground seems eager to keep your footprints forever, since no wind is in any hurry to erase them.
        BelisamaInSpaceLow* = #GEPscience_evaScience_BelisamaInSpaceLow_00 // You perform the EVA experiment in low orbit of Belisama. Nodens looms nearby like a silent companion, and your comm delay reminds you neither of you is home.
        BelisamaInSpaceHigh* = #GEPscience_evaScience_BelisamaInSpaceHigh_00 // You conduct the EVA experiment high above Belisama. The moon’s shadow line is razor sharp in red light, and the darkness looks deeper than it should.

        SucellusSrfLanded* = #GEPscience_evaScience_SucellusSrfLanded_00 // You carry out the EVA experiment on Sucellus. Every motion is a little too floaty, and the dim red sun makes even your own shadow feel unfamiliar.
        SucellusInSpaceLow* = #GEPscience_evaScience_SucellusInSpaceLow_00 // You perform the EVA experiment in low orbit over Sucellus. The surface below looks resource-rich or just misleadingly shiny—your instruments refuse to gossip.
        SucellusInSpaceHigh* = #GEPscience_evaScience_SucellusInSpaceHigh_00 // You run the EVA experiment in Sucellus’ high space. The world turns slowly beneath you, and the long wait for guidance makes you appreciate checklists more than ever.

        CaireenSrfLanded* = #GEPscience_evaScience_CaireenSrfLanded_00 // You do the EVA experiment on tiny Caireen. The horizon is close, the gravity is indecisive, and the red sun makes the whole place feel like a half-remembered dream.
        CaireenInSpaceLow* = #GEPscience_evaScience_CaireenInSpaceLow_00 // You perform the EVA experiment in low orbit of Caireen. One gentle push sends you drifting, and the delayed comms make you careful about every “oops.”
        CaireenInSpaceHigh* = #GEPscience_evaScience_CaireenInSpaceHigh_00 // You complete the EVA experiment high above Caireen. It’s barely a speck, but it still manages to make you feel very, very far away.

        SironaInSpaceLow* = #GEPscience_evaScience_SironaInSpaceLow_00 // You complete the EVA experiment in low orbit of Sirona. Its immense, roiling disk reflects a tired red light, and Mission Control answers like they’re speaking from another century.
        SironaInSpaceHigh* = #GEPscience_evaScience_SironaInSpaceHigh_00 // You conduct the EVA experiment in Sirona’s high space. The planet becomes a muted marble and the silence between transmissions feels longer than the eclipse line.

        AirmedSrfLanded* = #GEPscience_evaScience_AirmedSrfLanded_00 // You perform the EVA experiment on Airmed. The ground is cold, the shadows are the wrong color under the red sun, and you catch yourself listening for sounds that never arrive.
        AirmedInSpaceLow* = #GEPscience_evaScience_AirmedInSpaceLow_00 // You run the EVA experiment in low orbit over Airmed. The surface below looks crisp and unfamiliar, and the delayed “Copy” turns simple observations into time capsules.
        AirmedInSpaceHigh* = #GEPscience_evaScience_AirmedInSpaceHigh_00 // You complete the EVA experiment high above Airmed. With Sirona hanging nearby, you feel very small and very far from any place that would call this “normal operations.”

        BorvoSrfLanded* = #GEPscience_evaScience_BorvoSrfLanded_00 // You conduct the EVA experiment on Borvo. The air is thin but present, just enough to carry a faint haze that makes the red sunlight feel filtered through old glass.
        BorvoInSpaceLow* = #GEPscience_evaScience_BorvoInSpaceLow_00 // You complete the EVA experiment in low orbit of Borvo. The terminator line is sharp, the surface is quietly strange, and the comm delay makes jokes land several minutes late.
        BorvoInSpaceHigh* = #GEPscience_evaScience_BorvoInSpaceHigh_00 // You conduct the EVA experiment in Borvo’s high space. The moon shrinks to a dot, and the red sun turns your suit into a drifting warning label.

        DamonaSrfLanded* = #GEPscience_evaScience_DamonaSrfLanded_00 // You perform the EVA experiment on Damona. The landscape is stark, the red sun is unhelpful, and your footsteps sound louder than they should in the helmet.
        DamonaInSpaceLow* = #GEPscience_evaScience_DamonaInSpaceLow_00 // You run the EVA experiment in low orbit over Damona. The surface looks like it was built from missing parts, and the long wait for guidance makes you appreciate “Proceed as planned.”
        DamonaInSpaceHigh* = #GEPscience_evaScience_DamonaInSpaceHigh_00 // You complete the EVA experiment high above Damona. The moon is barely there, but the distance is very real—measured in the time it takes for home to answer back.

        EponaSrfLanded* = #GEPscience_evaScience_EponaSrfLanded_00 // You performed the EVA experiment on Epona, and the dim red sun turned the cool, wet air into a permanent dusk while the comm reply arrived late.
        EponaInSpaceLow* = #GEPscience_evaScience_EponaInSpaceLow_00 // You ran the EVA experiment in low orbit of Epona, watching unfamiliar weather patterns roll by like slow thoughts under red light.
        EponaInSpaceHigh* = #GEPscience_evaScience_EponaInSpaceHigh_00 // You completed the EVA experiment in Epona’s high space, where the planet shrank and the long radio delay made your checklist feel strangely final.

        RosmertaSrfLanded* = #GEPscience_evaScience_RosmertaSrfLanded_00 // You carried out the EVA experiment on Rosmerta, and the radiation counter chattered softly as Epona hung overhead like a distant lamp.
        RosmertaInSpaceLow* = #GEPscience_evaScience_RosmertaInSpaceLow_00 // You performed the EVA experiment in low orbit of Rosmerta, where every crater edge looked razor-sharp in the red sun’s tired glow.
        RosmertaInSpaceHigh* = #GEPscience_evaScience_RosmertaInSpaceHigh_00 // You executed the EVA experiment in Rosmerta’s high space, and the silence between transmissions lasted long enough to be its own measurement.

        RAB-58ESrfLanded* = #GEPscience_evaScience_RAB-58E_SrfLanded_00 // You did the EVA experiment on RAB-58E, and the near-zero gravity made even careful steps feel like a plan to accidentally escape.
        RAB-58EInSpaceLow* = #GEPscience_evaScience_RAB-58E_InSpaceLow_00 // You ran the EVA experiment in low orbit of RAB-58E, drifting past a moonlet that barely qualified as a destination and still felt far from home.
        RAB-58EInSpaceHigh* = #GEPscience_evaScience_RAB-58E_InSpaceHigh_00 // You completed the EVA experiment in high space over RAB-58E, and the suit’s warning pings sounded louder under the long, delayed “Copy.”

        CernunnosSrfLanded* = #GEPscience_evaScience_CernunnosSrfLanded_00 // You performed the EVA experiment on Cernunnos, and the dim red sun cast a weak shadow that seemed unsure it belonged here either.
        CernunnosInSpaceLow* = #GEPscience_evaScience_CernunnosInSpaceLow_00 // You conducted the EVA experiment in low orbit of Cernunnos, watching its cold surface slide by while home responded minutes later.
        CernunnosInSpaceHigh* = #GEPscience_evaScience_CernunnosInSpaceHigh_00 // You carried out the EVA experiment in Cernunnos’ high space, where the system felt empty enough that even your breathing sounded like a broadcast.
    }
}