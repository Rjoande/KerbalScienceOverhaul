        #GEPscience_bd_camera_BorvoSrfLandedHighlands_00 = Le alture sembrano taglienti e asciutte, ma l'aria dice il contrario. Scatti una panoramica e la foschia lontana fa sembrare tutto ancora più distante da qualunque posto.
        #GEPscience_bd_camera_BorvoSrfLandedMajorCraters_00 = Vicino a un cratere maggiore, il bordo sembra un muro costruito dagli impatti. Scatti per la scala e la perdi immediatamente.
