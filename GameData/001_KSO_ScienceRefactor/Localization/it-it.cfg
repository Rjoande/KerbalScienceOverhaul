        #ScienceRefactor_USlaserAltimeter_VallInSpace_00 = Siamo in alto sopra Vall!
        #ScienceRefactor_USlaserAltimeter_TyloInSpace_00 = Siamo in alto sopra Tylo!
        #ScienceRefactor_USlaserAltimeter_BopInSpace_00 = Siamo in alto sopra Bop!
        #ScienceRefactor_USlaserAltimeter_LaytheInSpace_00 = Siamo in alto sopra Laythe!
