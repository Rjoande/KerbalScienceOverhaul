        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedFlats_00 = The flats look deceptively smooth in the viewfinder, with Nodens hanging motionless over the same horizon. You mark several “excellent” pads and note the comm delay makes second-guessing mandatory.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTropicalLowlands_00 = Darker ground here soaks up what little warmth the red sun offers, but it also hides shallow ruts. The site is rated “workable,” assuming we stop calling anything “tropical.”
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTemperateLowlands_00 = A broad, pale plain stretches out like a blank checklist waiting to fail. The images come back clean, which is almost more unsettling than the hazards.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTropicalMidlands_00 = Rolling rises break line-of-sight every few hundred meters, perfect for surprises and awkward relay angles. You flag a ridge-top outpost site and add “bring bigger antenna” in bold.
        #GEPscience_bd_SiteSurvey_BelisamaSrfLandedTemperateMidlands_00 = The terrain looks stable, but the shadows never move the way your instincts expect under this dim red light. You annotate the safest route with “trust the instruments, not your eyes.”
