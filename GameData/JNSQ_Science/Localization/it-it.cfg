        #JNSQscience_gravityScan_DakInSpaceHighLowlands_00 = Da quassù, la gravità di Dak si smussa in una debole trazione ostinata. La luna riesce comunque a piegare i numeri attorno a sé.
        #JNSQscience_gravityScan_DakInSpaceHighLowlands_01 = Le letture ad alta quota mostrano che i bassopiani contribuiscono poco al campo complessivo, tranne per una persistente oscillazione che non dovrebbe esserci.
        #JNSQscience_gravityScan_DakInSpaceHighMidlands_00 = Le pianure risultano come una sottile irregolarità in una firma gravitazionale altrimenti debole. Dak insiste nel voler essere complicato.
        #JNSQscience_gravityScan_DakInSpaceHighMidlands_01 = La scansione suggerisce che Dak sia irregolare fino in fondo, non solo in superficie. Archivi i risultati sotto "corpo piccolo, grande personalità".
        #JNSQscience_gravityScan_DakInSpaceHighHighlands_00 = Anche a questa distanza, le alture lasciano una debole impronta nella mappa della gravità. Le creste sono piccole, ma decisamente scortesi.
        #JNSQscience_gravityScan_DakInSpaceHighHighlands_01 = Lo strumento rileva una lieve asimmetria allineata con le alture. Il campo di Dak è debole, ma si rifiuta di essere semplice.
        #JNSQscience_gravityScan_DresSrfLandedPoles_00 = Il rilevatore di gravioli si assesta un po' più in basso del previsto.
        #JNSQscience_gravityScan_DresSrfLandedPoles_01 = Fai una calibrazione e ottieni due volte la stessa risposta: qui c'è meno trazione di quanta dovrebbe essercene.
        #JNSQscience_gravityScan_DresSrfLandedMidlands_00 = Le letture sono stabili e cortesemente prive di eventi. Per una volta, il pianeta non sta cercando di sorprendere la matematica.
        #JNSQscience_gravityScan_DresSrfLandedMidlands_01 = Qui la gravità sembra "normale" in un modo che rende nervoso il Controllo Missione. Confermi: sì, può essere noioso apposta.
        #JNSQscience_gravityScan_DresSrfLandedLowlands_00 = Il rilevatore mostra un lieve aumento, come se i bassopiani avessero un po' di peso extra nascosto sotto la polvere.
        #JNSQscience_gravityScan_DresSrfLandedLowlands_01 = Ogni pochi metri l'ago dà un colpetto e poi si rilassa di nuovo. Qualcosa di denso laggiù sotto si sta tranquillamente facendo casa.
        #JNSQscience_gravityScan_DresInSpaceLowPoles_00 = La lettura dei gravioli trema in piccoli anelli stretti. Qualcosa sotto i poli è più leggero di quanto sembri.
        #JNSQscience_gravityScan_DresInSpaceLowPoles_01 = Il rilevatore insiste che le regioni polari siano "stranamente vuote". Ricontrolli di stare ancora orbitando un vero planetoide.
        #JNSQscience_gravityScan_DresInSpaceLowHighlands_00 = La gravità ha picchi e cali mentre le alture scorrono sotto di te. La crosta laggiù sembra fare del suo meglio per imitare una patata bitorzoluta.
        #JNSQscience_gravityScan_DresInSpaceLowHighlands_01 = Le letture suggeriscono nodi densi sotto le vette e cavità tra di esse. Dres è irregolare, dentro e fuori.
        #JNSQscience_gravityScan_DresInSpaceLowMidlands_00 = Il segnale si fa più uniforme sopra le pianure, come se il pianeta stesse finalmente collaborando. È quasi rilassante.
        #JNSQscience_gravityScan_DresInSpaceLowMidlands_01 = Il rilevatore di gravioli segnala una trazione costante con solo piccole ondulazioni. Inizi a sospettare che le pianure siano la "modalità normale" di Dres.
        #JNSQscience_gravityScan_DresInSpaceLowLowlands_00 = I bassopiani danno una trazione leggermente più forte del previsto. O qui la polvere è più pesante, o sotto si nasconde qualcosa di denso.
        #JNSQscience_gravityScan_DresInSpaceLowLowlands_01 = L'ago si inclina appena mentre passi sopra, suggerendo massa sepolta. Dres forse è insipido, ma custodisce segreti.
        #JNSQscience_gravityScan_DresInSpaceLowCanyon_00 = La lettura scatta avanti e indietro mentre attraversi la traccia del canyon. Il rilevatore sembra offeso dal cambiamento improvviso.
        #JNSQscience_gravityScan_DresInSpaceLowCanyon_01 = Un gradiente gravitazionale netto si allinea con il canyon sotto. Qualunque cosa lo abbia scavato ha lasciato una strana impronta nelle viscere del pianeta.
        #JNSQscience_gravityScan_DresInSpaceHighPoles_00 = Dall'orbita alta l'anomalia polare è ancora lì, solo smussata ai bordi. Dres è sottile, ma si rifiuta di essere ignorato.
        #JNSQscience_gravityScan_DresInSpaceHighPoles_01 = Il rilevatore mostra una debole depressione persistente sopra i poli. È come se al pianeta mancasse un minuscolo pezzetto di sé.
        #JNSQscience_gravityScan_DresInSpaceHighHighlands_00 = A questa quota la bitorzolosità delle alture si media, ma il livello di base resta irregolare. Dres non si bilancia mai del tutto.
        #JNSQscience_gravityScan_DresInSpaceHighHighlands_01 = Ampie increspature gravitazionali scorrono sullo schermo mentre le alture ruotano sotto. L'intero mondo sembra leggermente decentrato.
        #JNSQscience_gravityScan_DresInSpaceHighMidlands_00 = Da quassù le pianure risultano quasi senza dettagli. Etichetti il grafico "perlopiù gravità, come previsto".
        #JNSQscience_gravityScan_DresInSpaceHighMidlands_01 = La scansione a lungo raggio mostra lievi variazioni e molto silenzio. Dres è molto bravo a restare in sordina.
        #JNSQscience_gravityScan_DresInSpaceHighLowlands_00 = I bassopiani risultano come un rigonfiamento ampio e poco profondo nel campo. La massa del pianeta sembra raccogliersi qui.
        #JNSQscience_gravityScan_DresInSpaceHighLowlands_01 = Anche a questa distanza, i bassopiani tirano un po' più forte dei dintorni. Laggiù qualcosa ha peso e sicurezza.
        #JNSQscience_gravityScan_DresInSpaceHighCanyon_00 = La firma del canyon diventa una linea sottile e storta nei dati. È ancora distinta, come una cicatrice che non smetti di ripercorrere.
        #JNSQscience_gravityScan_DresInSpaceHighCanyon_01 = Il rilevatore riesce ancora a "vedere" l'effetto del canyon da lontano. Qualunque cosa sia successa lì, ha lasciato uno squilibrio duraturo.
        #JNSQscience_gravityScan_JoolInSpaceLowEquatorialBands_00 = Il gravitometro rileva un lieve ondeggiamento ritmico mentre le bande in rapido movimento rimescolano la massa sotto di te.
        #JNSQscience_gravityScan_JoolInSpaceLowEquatorialBands_01 = Le letture si affinano in un motivo ripetuto che corrisponde alle fasce sottostanti. Il "meteo" di Jool ha peso.
        #JNSQscience_gravityScan_JoolInSpaceHighEquatorialBands_00 = A questa quota gli effetti delle bande si confondono nel rigonfiamento complessivo di Jool, ma la scansione suggerisce comunque una rotazione sbilanciata.
        #JNSQscience_gravityScan_JoolInSpaceHighEquatorialBands_01 = Il segnale è dominato dall'oblateness, con piccole increspature che si allineano con le bande del getto equatoriale.
        #JNSQscience_gravityScan_JoolInSpaceLowSubpolarBands_00 = Ampie celle di circolazione fanno derivare lentamente la traccia gravitazionale, come se il pianeta respirasse in cicli lunghi e pesanti.
        #JNSQscience_gravityScan_JoolInSpaceLowSubpolarBands_01 = Qui la scansione mostra gradienti più uniformi: gli spostamenti di massa sono ampi e stabili invece che nettamente a strisce.
        #JNSQscience_gravityScan_JoolInSpaceHighSubpolarBands_00 = Il gravitometro vede soprattutto la forma globale del pianeta, ma una lieve asimmetria suggerisce che i flussi verso i poli stiano accumulando qualcosa.
        #JNSQscience_gravityScan_JoolInSpaceHighSubpolarBands_01 = Sottili cambiamenti nella curva del campo suggeriscono che le bande "tranquille" stiano spostando silenziosamente molta massa.
        #JNSQscience_gravityScan_JoolInSpaceLowNorthPole_00 = La circolazione polare produce un'anomalia persistente proprio dove le nubi a spirale si rifiutano di smettere di ruotare.
        #JNSQscience_gravityScan_JoolInSpaceLowNorthPole_01 = La traccia si stringe in uno scarto stabile, come se un vortice ancorasse densità extra sotto il polo visibile.
        #JNSQscience_gravityScan_JoolInSpaceHighNorthPole_00 = La scansione evidenzia la forma schiacciata di Jool più chiaramente sopra il polo, con una piccola trazione residua che non vuole mediarsi.
        #JNSQscience_gravityScan_JoolInSpaceHighNorthPole_01 = Anche dall'orbita alta qui il campo non è perfettamente simmetrico: qualcosa sotto la calotta polare è ostinatamente sbilanciato.
        #JNSQscience_gravityScan_JoolInSpaceLowSouthPole_00 = Le letture della gravità sfarfallano in una lenta rotazione, seguendo la spirale meridionale più stretta come se trascinasse massa in cerchio.
        #JNSQscience_gravityScan_JoolInSpaceLowSouthPole_01 = L'anomalia è più netta del previsto: qualunque cosa stia rimescolando sotto il polo sud è compatta e persistente.
        #JNSQscience_gravityScan_JoolInSpaceHighSouthPole_00 = Il gravitometro risolve una firma polare ordinata: schiacciamento globale più un persistente "twist" nei residui.
        #JNSQscience_gravityScan_JoolInSpaceHighSouthPole_01 = In orbita alta sopra il polo sud, la scansione rileva ancora un piccolo scarto fisso, come se il polo fosse leggermente "più pesante" del dovuto.
        #JNSQscience_gravityScan_JoolInSpaceLowStormComplex_00 = Il complesso tempestoso risulta come una zona rumorosa nel campo, piena di minuscoli picchi mentre colonne dense salgono e sprofondano.
        #JNSQscience_gravityScan_JoolInSpaceLowStormComplex_01 = Il gravitometro per un attimo "aggancia" un'anomalia, poi la perde di nuovo mentre la tempesta si riorganizza.
        #JNSQscience_gravityScan_JoolInSpaceHighStormComplex_00 = Da quassù l'influenza della tempesta è debole, ma lascia un luccichio irrequieto nel grafico della gravità residua.
        #JNSQscience_gravityScan_JoolInSpaceHighStormComplex_01 = A questa quota la scansione non può mappare la tempesta in modo pulito: può solo confermare che il caos sotto non è privo di peso.
        #JNSQscience_gravityScan_JoolInSpaceLowExposedLowerDeck_00 = Il gravitometro nota una trazione più forte del solito, come se questa regione esponesse strati più densi più vicini alla linea di vista del sensore.
        #JNSQscience_gravityScan_JoolInSpaceLowExposedLowerDeck_01 = I residui saltano lungo i bordi dell'apertura, suggerendo che la bassa atmosfera spessa si stia accumulando e scivolando sotto il varco.
        #JNSQscience_gravityScan_JoolInSpaceHighExposedLowerDeck_00 = Qui la forma del campo sembra leggermente più "ripida", suggerendo che i livelli inferiori siano impilati in modo diverso sotto la foschia che si assottiglia.
        #JNSQscience_gravityScan_JoolInSpaceHighExposedLowerDeck_01 = In orbita alta c'è perlopiù una sottile differenza di curvatura, ma la scansione insiste che gli strati inferiori siano disposti in modo insolito sotto questa regione.
        #JNSQscience_gravityScan_LaytheSrfLandedShallows_00 = Il rilevatore di gravioli trema con un ritmo costante, come se la costa stesse respirando con le maree.
        #JNSQscience_gravityScan_LaytheSrfLandedHighlands_00 = Qui la gravità è calma e coerente, con piccoli rigonfiamenti che suggeriscono che le colline abbiano un sottosuolo molto complicato.
        #JNSQscience_gravityScan_LaytheSrfLandedMountains_00 = Le letture oscillano selvaggiamente sopra i crinali, come se le montagne fossero ancorate a qualcosa di più pesante di quanto sembrino.
        #JNSQscience_gravityScan_LaytheSrfLandedIceCaps_00 = Il rilevatore segnala una lieve discrepanza tra "ghiaccio" e "ciò che c'è sotto il ghiaccio". La etichetti come "interessante" e ti allontani.
        #JNSQscience_gravityScan_LaytheSrfLandedEnclosedFaults_00 = Picchi e cali arrivano in rapida successione, come se la crosta fosse spaccata e continuamente tirata in nuove forme.
