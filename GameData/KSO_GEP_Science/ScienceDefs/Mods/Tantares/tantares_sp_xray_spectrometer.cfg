@EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_xray_spectrometer]]
{
    %RESULTS
    {
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthPolarZone_00 // The spectrum is all hot spikes and angry noise; the detector politely requests a less “star-shaped” target. Polar activity makes the calibration drift like it’s trying to escape.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthSubpolarZone_00 // X-ray lines surge and fade in bands, like Grannus is breathing through the instrument. The readout arrives at mission control long after everyone has finished arguing about it.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthTemperateZone_00 // The signal steadies just long enough to log a few heavier-element traces before another flare erases your confidence. Someone writes “maybe not a rock” in the margin.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthTropicZone_00 // The spectrometer catches brief, sharp bursts that look like the star is flicking the instrument with static. You keep the shutters half-closed and hope that counts as bravery.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowEquatorialZone_00 // The equatorial band is bright, smooth, and completely uninterested in your nice clean baselines. The spectrum looks like a barcode made by someone holding the pen on a trampoline.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthTropicZone_00 // A warm wash of emission fills the channels, then collapses into a jagged storm of peaks. The onboard computer labels it “normal” and you feel judged.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthTemperateZone_00 // The returns suggest a calmer region until a sudden spike forces the instrument into safe mode. You log the event as “unexpected sunlight, in space.”
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthSubpolarZone_00 // The spectrometer maps subtle changes across the banding, but the delay makes it feel like you’re studying history instead of weather. Grannus remains proudly uncooperative.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthPolarZone_00 // Polar readings climb hard enough to warm the detector housing. You now understand why the safety checklist has three separate lines for “do not stare.”
        GrannusInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceHigh_00 // From high orbit, Grannus is mostly overwhelming X-ray brightness with occasional hints that heavier stuff exists somewhere in the chaos. The final report concludes: “Star confirmed.”

        TaranisInSpaceLowMagmaSea* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowMagmaSea_00 // Over the Magma Sea the fluorescence peaks jump like they’re trying to climb out of the graph. The detector celebrates “finding shiny metals” until mission control reminds you it’s just a spectrum.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowScorchedLowlands_00 // The sun-baked lowlands throw back a strong, clean signal—silicates and metals lit up under Grannus like a warning sign. The instrument stays busy; you stay nervous.
        TaranisInSpaceLowMidlands* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowMidlands_00 // The midlands look compositionally mixed, as if the surface can’t decide whether it wants to be basalt or something lighter. Mapping passes go fast here, like Taranis is rushing you along.
        TaranisInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowHighlands_00 // Highlands returns lean toward lighter crustal signatures with fewer heavy peaks than the hotter plains. You mark it as “interesting” and immediately run out of time over the terminator.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowDarkSideMidlands_00 // On the dark side the spectrometer mostly records weak, noisy returns and a lot of instrument self-doubt. The planet’s night is so deep you can practically hear the data packets shiver.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowDarkSideHighlands_00 // Shadowed highlands give barely enough signal to suggest rock is present, which is reassuring in a very minimal way. You double-check the lid is closed and call it a successful scan.
        TaranisInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowPoles_00 // Polar passes show patchy chemistry, like thermal stress has been sorting minerals into bands. The map is ugly, but it’s the honest kind of ugly.
        TaranisInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceHigh_00 // From high orbit, Taranis averages into two different worlds: a bright, scorched face and a dim, quiet one with little to give back. The global spectrum screams “close to the star” without using words.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowSunnyLowlands_00 // Sunny lowlands fluoresce strongly, with iron and silicate features standing out despite the thin, CO₂-heavy haze nibbling at the signal. The day side is so loud the instrument keeps asking if you meant to point at Grannus.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowSunnyHighlands_00 // The sunlit highlands trend lighter in the spectrum, with fewer heavy peaks than the lowlands. You start drawing a composition boundary and then remember you’re doing this with time delay and guesswork.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowTransitionalLowlands_00 // The transition zone looks like a blended spectrum—some hot-side signatures, some dark-side quiet. It’s the chemical equivalent of standing in the doorway and not committing.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowTransitionalHighlands_00 // Transitional highlands show subtle shifts from pass to pass, as if the surface layers change with every thermal cycle. Mission control suggests “more orbits,” as if you have infinite patience.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowDarkSideLowlands_00 // Dark-side lowlands return a weak fluorescence signal buried under background noise and instrument grumbling. You log “low illumination” and feel the loneliness of doing science in the dark.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowDarkSideHighlands_00 // Shadowed highlands barely fluoresce through the thin atmosphere, leaving mostly broad hints and uncertainty. The spectrometer produces a beautiful plot of almost nothing.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowSoutheasternMountains_00 // Mountain spectra show sharper heavy-element features than the surrounding terrain, suggesting denser material or exposed layers. Someone immediately asks if this means “ore,” and you pretend not to hear them.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowWesternMountains_00 // The western ranges give a mottled signature—possible impact-mixed crust with pockets of stronger metal lines. The map looks like it was assembled from delayed postcards.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowDarkSideMountains_00 // Dark-side mountains give intermittent peaks when the geometry is just right, then fall back into silence. You feel oddly proud of every photon that makes it into the detector.
        ToutatisInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceHigh_00 // High orbit averages Toutatis into a stark hemispheric contrast: bright, active chemistry on the baked side and muted returns from the frozen night. The final global fit includes a note: “Atmosphere present; signal slightly chewed.”

        NodensInSpaceLowSaltySeas* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowSaltySeas_00 // The seas fluoresce in faint, salty whispers under Grannus’s red glare; the atmosphere steals half the photons and all of your confidence.
        NodensInSpaceLowFreshWater* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowFreshWater_00 // A softer signature comes up over the inland water, as if the planet is trying to look welcoming from very far away. The data arrives late, but still feels oddly alive.
        NodensInSpaceLowShores* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowShores_00 // The shoreline spectrum flips rapidly between wet and dry chemistry as you cross the boundary. Mission control calls it “interesting”; the instrument calls it “busy.”
        NodensInSpaceLowTropicalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTropicalLowlands_00 // Warm lowlands throw back stronger metal lines than expected, like the crust is sunbaked just below the clouds. You wonder what “tropical” means under a dim red sun.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTemperateLowlands_00 // The signal steadies into a practical mix of silicates and iron—almost familiar, until a strange peak reminds you this isn’t home. The comms delay makes it feel like reading a postcard.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTropicalMidlands_00 // Mid-altitude terrain shows layered composition, as if weather and time have been sorting the surface for you. The spectrometer logs it dutifully while you stare at the red-lit limb.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTemperateMidlands_00 // The spectrum suggests a patchwork crust with pockets of heavier material. You try to name the patterns, then remember you’ve never seen a planet like this before.
        NodensInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowHighlands_00 // Highlands returns skew toward lighter signatures, with occasional sharp lines that hint at exposed, stubborn rock. It feels like Nodens is letting you peek behind the clouds—briefly.
        NodensInSpaceLowTundra* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTundra_00 // Cold regions give a muted fluorescence, as if the surface is holding its breath. The instrument compensates; you add “quiet but not empty” to the notes.
        NodensInSpaceLowIceCaps* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowIceCaps_00 // The caps reflect a thin, brittle signal with just enough mineral lines to prove there’s ground beneath the ice. Under Grannus, even the bright parts look subdued.
        NodensInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceHigh_00 // From high orbit, Nodens averages into a calm global spectrum with small, stubborn anomalies that refuse to smooth out. The planet looks habitable on paper—mysterious in practice.

        BelisamaInSpaceLowFlats* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowFlats_00 // The flats fluoresce cleanly in vacuum, sharp peaks with no atmospheric smearing to hide behind. The tidally locked night nearby makes the brightness feel almost intrusive.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTropicalLowlands_00 // Lowland signatures come back dense and metallic in places, like old impacts churned the crust and left the heavy bits closer to the top. You file it under “future drill arguments.”
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTemperateLowlands_00 // A steadier basalt-like pattern dominates here, practical and unromantic. The red sunlight still makes the whole world look like it’s lit by a warning lamp.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTropicalMidlands_00 // The midlands show mixed mineral lines, as if Belisama can’t decide what it wants to be made of. The data packet arrives late enough to feel pre-recorded.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTemperateMidlands_00 // Subtle shifts in the spectrum track across the midlands, suggesting surface sorting by relentless thermal cycling. You can almost hear the rock creak.
        BelisamaInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowHighlands_00 // Highlands peaks sharpen and brighten—exposed, unweathered material with nowhere to hide in the airless cold. Nodens hangs huge in the sky like an audience.
        BelisamaInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowPoles_00 // Polar readings are patchy, with odd spikes that appear and vanish as lighting geometry changes. The instrument insists it’s real; you believe it, reluctantly.
        BelisamaInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceHigh_00 // From high orbit, Belisama is a small, hard spectrum—crisp lines, stark contrasts, and a sense of being very far from anywhere comforting. Even the silence feels measured.

        SucellusInSpaceLowBasins* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowBasins_00 // Over the basins, the spectrum sharpens into heavy-element peaks that look almost too eager to be real. Under Grannus’ dim red light, “resource rich” feels less like a promise and more like a dare.
        SucellusInSpaceLowLowlands* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowLowlands_00 // Lowlands return a steadier mix of silicates and metals, like the surface has been ground and sorted for ages. The map comes in on a long delay, as if Sucellus is telling you yesterday’s secrets.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowTropicalMidlands_00 // The midlands show mottled chemistry—patches of brighter metal lines stitched into darker rock. Someone circles the anomalies and writes “captured? collided? haunted?” before remembering this is a spectrometer.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowTemperateMidlands_00 // Peaks drift subtly from pass to pass, suggesting layers with different compositions peeking through thin regolith. The instrument calls it “variation”; mission control calls it “more orbits, please.”
        SucellusInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowHighlands_00 // Highland signatures skew lighter, with occasional crisp spikes from exposed, stubborn material. The airless cold keeps the lines clean, but the radiation warnings keep the crew quieter than usual.
        SucellusInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowPoles_00 // Polar readings jump with illumination angle, flashing brief, sharp features before fading back into noise. It feels like the dwarf planet is turning a reflective corner away from your scan.
        SucellusInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceHigh_00 // From high orbit, Sucellus averages into a dense, metal-leaning spectrum with just enough oddities to prevent confidence. The conclusion arrives first; the comforting explanation never does.

        CaireenInSpaceLowLowlands* = #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowLowlands_00 // The tiny moon’s lowlands fluoresce weakly but cleanly, a thin signature with a few stubborn metal lines. It reads like a captured rock that’s been trying very hard to look like it belongs.
        CaireenInSpaceLowMidlands* = #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowMidlands_00 // Midlands returns are patchy, as if different fragments were welded together and never properly mixed. The spectrum feels assembled—appropriate for something that might not have formed here at all.
        CaireenInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowHighlands_00 // Highland peaks sharpen into brighter heavy-element hints, suggesting fresher exposures or denser chunks near the surface. You celebrate “finding shiny bits” until the next packet arrives and complicates everything.
        CaireenInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowPoles_00 // Polar scans mostly report silence with occasional narrow spikes when geometry cooperates. Even the photons seem reluctant this far out under Grannus.
        CaireenInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceHigh_00 // High orbit reduces Caireen to a faint, asteroidal fingerprint with a few metallic accents. The best science is confirming it exists—and that it’s still not telling you where it came from.

        SironaInSpaceLowDarkTropicalBands* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands give a noisy, atmospheric X-ray glow with no sign of anything “surface-like” to fluoresce. The magnetosphere adds extra excitement the instrument did not request.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowLightTropicalBands_00 // In the light bands, the spectrum brightens with scattered solar-driven emission and a few puzzling lines that refuse to stay put. You annotate: “gas can sparkle, apparently.”
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowDarkTemperateBands_00 // Temperate dark bands show broad features smeared by depth and pressure, like the signal is being chewed on the way out. The readout is half physics, half weather, all far-from-home.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowLightTemperateBands_00 // The lighter temperate bands return stronger counts, then spike abruptly as charged particles rattle the detector. Mission control suggests “shielding”; Sirona suggests “good luck.”
        SironaInSpaceLowDarkPolarBands* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowDarkPolarBands_00 // Polar dark bands light up with auroral X-rays and particle-driven noise, a spectrum that feels more like radiation telemetry than composition. You quietly close the detector door and pretend that helps.
        SironaInSpaceLowLightPolarBands* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowLightPolarBands_00 // The light polar bands flare in bursts that match the planet’s violent magnetic mood swings. Under the dim red sun, the poles still manage to look bright—and slightly ominous.
        SironaInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceHigh_00 // From high orbit, Sirona becomes a global haze of atmospheric emission wrapped in extreme magnetospheric interference. The official summary: “spectacular.” The unofficial summary: “please transmit slower.”

        AirmedInSpaceLowTropicalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTropicalLowlands_00 // The lowlands fluoresce with a hard, metallic edge; Airmed’s battered crust doesn’t bother pretending it’s gentle. The spectrum reaches home long after the flare warnings do.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTemperateLowlands_00 // Peaks cluster into an uneasy mix of silicates and heavier traces, like someone shook the moon and the dense bits settled here. The red sunlight makes the baseline look perpetually “wrong.”
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTropicalMidlands_00 // The midlands read like layered scars—clean lines, then sudden odd spikes that vanish on the next pass. Mission control calls for repeats; Airmed answers with radiation noise.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTemperateMidlands_00 // The fluorescence is steady enough to map, until the detector’s counters start climbing for reasons unrelated to geology. You note: “composition likely accurate; mood less so.”
        AirmedInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowHighlands_00 // Highland returns are crisp and sparse, exposed material with nowhere to hide in airless cold. The instrument likes it; the crew prefers the safety shutters.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowDarkenedLowlands_00 // Over the darkened terrain the spectrum shifts as if the surface chemistry changed its mind mid-orbit. You begin to understand the “two-toned” problem in very unfriendly wavelengths.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowDarkenedMidlands_00 // The detector catches narrow peaks riding on a rough background, like the moon is whispering through static. The delay makes it feel like you’re listening to an old recording of a fresh scar.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowDarkenedHighlands_00 // Dark highlands give sharp lines that don’t match the brighter side’s pattern, and that’s the polite version of what the data says. Someone writes “impact mixing?” and underlines it three times.
        AirmedInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowPoles_00 // Polar passes flicker between clean fluorescence and abrupt counter spikes, as if the environment itself is throwing pebbles at your sensor. The map looks stitched together from cautious glances.
        AirmedInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceHigh_00 // From high orbit, Airmed averages into a hard, airless fingerprint with a persistent “something happened here” aftertaste. Sirona fills the sky, and the spectrum still feels lonely.

        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTropicalCraquelure_00 // The cracked terrain returns broad, muted peaks—atmospheric absorption takes a bite out of every nice feature. Methane and distance make even good data arrive with a foggy accent.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTemperateCraquelure_00 // Craquelure signatures vary from plate to plate, like the surface was stress-tested and sorted by chemistry. The instrument flags “heterogeneous,” and you quietly agree.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTropicalLowlands_00 // Lowlands fluoresce stronger than expected through the thin air, hinting at denser material under a dusty-beige veil. The spectrum looks promising; the comms delay makes it feel like a rumor.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTemperateLowlands_00 // The returns settle into a practical mix of silicates with stubborn metal lines that refuse to smooth out. You suspect ice and rock are both involved, and neither is being forthcoming.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTropicalMidlands_00 // Midlands peaks drift subtly as geometry changes, suggesting layering or patchy coverage beneath the haze. You schedule another pass and pretend that solves the mystery.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTemperateMidlands_00 // A cooler band yields cleaner features, but the atmosphere still smears the finest details like a careful smudge. The planet-sized moon remains determined to be “something unimagined.”
        BorvoInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowHighlands_00 // Highland spectra brighten in lighter signatures with fewer heavy peaks, as if the higher ground is a different story entirely. The detector logs it; you wonder what the weather is doing to the pages.
        BorvoInSpaceLowMajorCraters* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowMajorCraters_00 // Over major craters the lines sharpen and intensify, exposed material punching through the surface’s bland disguise. Someone asks about “resources,” and the scientist in you sighs audibly.
        BorvoInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowPoles_00 // Polar scans show patchy fluorescence that comes and goes with haze and angle, like the air is editing your measurements. The summary reads: “data good, confidence pending.”
        BorvoInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceHigh_00 // From high orbit, Borvo becomes a softened global spectrum—big, atmospheric, and stubbornly ambiguous. Under the dim red sun, even a whole world can look like a question mark.

        DamonaInSpaceLowTropicalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTropicalLowlands_00 // The lowlands fluoresce faintly but cleanly in vacuum, a thin signature with a few heavy hints tucked inside. The cold makes the lines sharp; the radiation makes the counters jumpy.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTemperateLowlands_00 // A steady basalt-like pattern dominates, then a stray spike reminds you Damona has a violent history and no intention of being tidy. You mark it as “repeat when less irradiated.”
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTropicalMidlands_00 // The midlands read like churned regolith over older rock, mixed signatures that don’t quite blend. By the time the spectrum arrives, you’ve already changed your hypothesis twice.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTemperateMidlands_00 // Subtle shifts suggest different layers peeking through a thin surface blanket, as if the moon is slowly turning itself inside-out. The red sunlight makes every plot feel slightly ominous.
        DamonaInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowHighlands_00 // Highlands show crisp, sparse peaks—exposed, pockmarked material with nowhere to hide and no air to soften it. The detector is delighted; the crew is not.
        DamonaInSpaceLowImpactBasin* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowImpactBasin_00 // The basin lights up with sharper, heavier-element features, a chemical bruise that still hasn’t faded. You stare at the peaks and feel the distance more than the science.
        DamonaInSpaceLowPoles* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowPoles_00 // Polar passes are quiet, almost polite, until a burst of background counts interrupts the peace. Damona’s “barren orb” routine has a few sharp edges left.
        DamonaInSpaceHigh* = #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceHigh_00 // From high orbit, Damona is a small, stark fingerprint: airless, cold, and unhelpfully intriguing. The final plot arrives late and still manages to feel immediate.

        EponaInSpaceLowTropicalLowlands* = #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTropicalLowlands_00 // The spectrum comes back softened by Epona’s cold air, but the lowlands still flash iron and silicate lines when the dim red sun hits just right. Half the signal is “surface,” the other half is “atmosphere being helpful in its own way.”
        EponaInSpaceLowTemperateLowlands* = #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTemperateLowlands_00 // A steadier, weaker fluorescence suggests broad, icy plains with mineral grit mixed in. The mapping pass feels like reading a faint signature through a frosted window.
        EponaInSpaceLowTropicalUplands* = #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTropicalUplands_00 // Uplands show sharper peaks than the lowlands, as if cleaner material is peeking through thinner frost. Mission control celebrates “finding shiny metals” after a long delay, like it’s still news.
        EponaInSpaceLowTemperateUplands* = #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTemperateUplands_00 // The returns shift subtly across the uplands, hinting at layering beneath the surface glaze. Your plots look confident until you remember the sun here is red, distant, and not at all predictable.
        EponaInSpaceLowHighlands* = #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowHighlands_00 // Highlands fluorescence is patchy and subdued, consistent with a cold, hard crust that doesn’t want to glow for anyone. The atmosphere trims the faintest lines like it’s editing your report.
