        #JNSQscience_MCE_EveInSpaceLow_00 = GLIMS catches bright, fleeting flashes above Eve’s cloud tops; HDTV tests dynamic range until the whites bloom and Mission Control argues about exposure.
        #JNSQscience_MCE_EveInSpaceLow_01 = KSS-IMAP produces a global map of swirling systems; the COTS electronics endure constant humidity readings they can’t actually feel.
        #JNSQscience_MCE_EveInSpaceHigh_00 = From high orbit, KSS-IMAP stitches together a full atmospheric survey; the results are “complete,” “terrifying,” and “very purple.”
        #JNSQscience_MCE_EveInSpaceHigh_01 = GLIMS watches the night side for transient light; the suite logs repeated events and labels them “interesting” to avoid using the word “ominous.”
        #JNSQscience_MCE_GillyInSpaceLow_00 = Station-keeping around Gilly is half the mission; REX-J performs tiny corrections that feel heroic, and HDTV struggles to keep the lumpy horizon in frame.
        #JNSQscience_MCE_GillyInSpaceLow_01 = The suite records gentle dust impacts and extreme temperature swings; SIMPLE remains inflated, mostly because there’s hardly any gravity to argue with it.
        #JNSQscience_MCE_GillyInSpaceHigh_00 = High above Gilly, MCE spends more time looking for the target than looking at it; KSS-IMAP files an atmospheric map consisting entirely of “none.”
        #JNSQscience_MCE_GillyInSpaceHigh_01 = Long-duration COTS survivability testing yields the best kind of data: boring, consistent, and only slightly alarming when the radiation counters spike.
