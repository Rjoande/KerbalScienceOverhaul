        DunaSrfLandedMountains* = #JNSQscience_mysteryGoo_DunaSrfLandedMountains_00 // The Goo keeps shifting until it finds a perfectly level puddle, stubbornly refusing to acknowledge the slope you’re standing on.
        DunaSrfLandedMountains* = #JNSQscience_mysteryGoo_DunaSrfLandedMountains_01 // The Goo creeps into a tall, wobbly column and then collapses with great drama. Low gravity makes it look intentional.
        DunaSrfLandedVolcano* = #JNSQscience_mysteryGoo_DunaSrfLandedVolcano_00 // The Goo briefly forms bubbles, then snaps back into a calm blob as if it never did anything at all.
        DunaSrfLandedVolcano* = #JNSQscience_mysteryGoo_DunaSrfLandedVolcano_01 // The Goo turns a darker red-brown and clings to the container like warm tar. It seems uncomfortably at home here.

		IkeSrfLandedLowlands* = #JNSQscience_mysteryGoo_IkeSrfLandedLowlands_00 // The Goo slowly turns the same color as the dust, as if it’s trying to blend in and avoid being picked up again.
		IkeSrfLandedLowlands* = #JNSQscience_mysteryGoo_IkeSrfLandedLowlands_01 // The Goo develops a gritty skin and makes tiny “crater” dimples whenever you tap the container.
		IkeSrfLandedMidlands* = #JNSQscience_mysteryGoo_IkeSrfLandedMidlands_00 // The Goo forms lumpy ridges, then relaxes back into a blob like it forgot why it was trying so hard.
		IkeSrfLandedMidlands* = #JNSQscience_mysteryGoo_IkeSrfLandedMidlands_01 // The Goo slides to one side of the container and stays there, apparently deciding that “downhill” is a lifestyle.
		IkeSrfLandedHighlands* = #JNSQscience_mysteryGoo_IkeSrfLandedHighlands_00 // The Goo stiffens in the harsh light and cracks along the top like it’s trying to become a respectable rock.
		IkeSrfLandedHighlands* = #JNSQscience_mysteryGoo_IkeSrfLandedHighlands_01 // The Goo becomes unusually reflective, then abruptly dull again, as if it’s embarrassed you noticed.
		IkeInSpaceLow* = #JNSQscience_mysteryGoo_IkeInSpaceLow_00 // The Goo flattens against the container wall and wobbles in time with the craft’s slightest vibrations, like it’s listening to the orbit.
		IkeInSpaceLow* = #JNSQscience_mysteryGoo_IkeInSpaceLow_01 // The Goo repeatedly forms tiny bubbles that pop without warning, leaving it looking smugly unchanged.
		IkeInSpaceHigh* = #JNSQscience_mysteryGoo_IkeInSpaceHigh_00 // The Goo settles into a slow, graceful drift, then abruptly snaps into a cube when you glance away.
