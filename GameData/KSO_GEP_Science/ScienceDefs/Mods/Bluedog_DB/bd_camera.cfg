		NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_camera_NodensInSpaceLowTemperateMidlands_00 // The midlands look like a rough quilt of textures through haze. You schedule another pass and remember schedules are optimistic at this distance.
		NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_camera_NodensInSpaceLowTemperateMidlands_01 // The camera catches a fleeting clear patch between clouds, then the planet closes the curtain again. You save the frame like it’s contraband.
		NodensInSpaceLowHighlands* = #GEPscience_bd_camera_NodensInSpaceLowHighlands_00 // The highlands stand out as dark ridges with bright edges where the light skims them. It’s a harsh beauty that photographs better than it feels.
