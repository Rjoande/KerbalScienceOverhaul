        #ScienceRefactor_bd_multiSpec_IkeInSpaceLowLowlands_00 = I dati sulla composizione superficiale suggeriscono che l'elevata presenza di silicati e tracce di metalli costituisca ulteriore evidenza di un antico vulcanismo.
