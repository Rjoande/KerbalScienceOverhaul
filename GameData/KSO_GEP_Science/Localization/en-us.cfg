        #GEPscience_bd_UVspec_DamonaInSpaceHigh_00 = From high orbit, Damona is a pockmarked dot and a clean, airless reflectance curve. The emptiness around it takes up most of the dataset, and somehow that still counts.

        #GEPscience_bd_UVspec_EponaInSpaceLowTropicalLowlands_00 = The UV spectrum shows broad atmospheric absorption with a stubborn methane bite, even this far under Grannus’ dim red light. The lowlands reflect just enough to prove there’s a surface under all that cold air.
        #GEPscience_bd_UVspec_EponaInSpaceLowTemperateLowlands_00 = A smoother UV curve here suggests thicker haze and fewer sharp surface features making it through. The detector integrates longer, and the comm delay makes the planet feel even colder.
