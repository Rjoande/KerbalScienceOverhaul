        DunaSrfLandedMidlandSea* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandSea_01 // You lost a few of the test samples in transit, but that's not really an issue as they all just turn red anyway.
        DunaSrfLandedNorthernBasin* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernBasin_00 // The coarse dust doesn't penetrate as far into everything as the standard insidious stuff you find on Duna.
        DunaSrfLandedNorthernBasin* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernBasin_01 // You leave the samples to do their thing, and go fetch the snacks you warmed earlier.
        DunaSrfLandedSouthernBasin* = #CSS_mobileMaterialsLab_DunaSrfLandedSouthernBasin_00 // The mixture of ice and dust cakes the samples. Nothing happens, apart from them going pink.
        DunaSrfLandedSouthernBasin* = #CSS_mobileMaterialsLab_DunaSrfLandedSouthernBasin_01 // It's cold here. Suffice to say, all the samples freeze.
        DunaSrfLandedNorthernShelf* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernShelf_00 // You open the doors, and the wind immediately sweeps every single sample out of the bay. Damn.
        DunaSrfLandedNorthernShelf* = #CSS_mobileMaterialsLab_DunaSrfLandedNorthernShelf_01 // Run the experiment if you want, but the bay camera has been sandblasted to pieces and I am NOT going out there to look.
        DunaSrfLandedMidlandCanyon* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandCanyon_00 // A sudden, unexpected gust of wind knocks several samples out of the chamber, but you're more concerned about the spacesuits turning pink.
        DunaSrfLandedMidlandCanyon* = #CSS_mobileMaterialsLab_DunaSrfLandedMidlandCanyon_01 // Sand piles up in drifts against the samples. It's pretty fine, so you bash the chamber and it all cascades out onto the ground.
        DunaSrfLandedEasternCanyon* = #CSS_mobileMaterialsLab_DunaSrfLandedEasternCanyon_00 // The samples quickly disappear under a thick caking of dust. True to form, the observation computer attracts the most.
        DunaSrfLandedEasternCanyon* = #CSS_mobileMaterialsLab_DunaSrfLandedEasternCanyon_01 // The doors grind open with the sort of crunching sound made by large quantities of dust in the servo mechanism.
        DunaSrfLandedWesternCanyon* = #CSS_mobileMaterialsLab_DunaSrfLandedWesternCanyon_00 // You get the standard Duna reaction from most is the samples (i.e. going slightly red and cold). However, you put one of the lithium hydroxide CO2 scrubbers from the capsule into the bay as an afterthought, and watch it form a white, powdery coating.
        DunaSrfLandedWesternCanyon* = #CSS_mobileMaterialsLab_DunaSrfLandedWesternCanyon_01 // The dust that blows into the bay appears to be from two sources, as it forms two different piles of fine and grainier sand.
        DunaSrfLandedPolarHighlands* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarHighlands_00 // Most of the samples crystallise and the white samples look even whiter. Maybe with a pink hue.
        DunaSrfLandedPolarHighlands* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarHighlands_01 // You notice tiny beads of mercury condensing on the inside surface of the bay's striplight and hurriedly turn it back on to keep it warm.
        DunaSrfLandedPolarCraters* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarCraters_00 // Ice cascades off the sample bay doors as they open, and it's more interesting than what happens to the samples (they get cold, and that's it).
        DunaSrfLandedPolarCraters* = #CSS_mobileMaterialsLab_DunaSrfLandedPolarCraters_01 // Following exposure, most of the liquid samples freeze while a few boil instead. The solid ones do very little.
        DunaFlyingLow* = #CSS_mobileMaterialsLab_DunaFlyingLow_00 // The atmosphere whips most of the samples of the bay immediately. Seems you underestimated it.
        DunaFlyingLow* = #CSS_mobileMaterialsLab_DunaFlyingLow_01 // There's a fizzling sound as the dust shorts something out in the bay mechanism. It comes back online after a few shakes and presses.
        DunaFlyingHigh* = #CSS_mobileMaterialsLab_DunaFlyingHigh_00 // Some of the lighter samples still shift around in the rushing high-altitude air.
        DunaFlyingHigh* = #CSS_mobileMaterialsLab_DunaFlyingHigh_01 // The upper atmosphere is too rarefied and thin to react with anything other than pushing stuff about.
        DunaInSpaceLow* = #CSS_mobileMaterialsLab_DunaInSpaceLow_00 // A thruster jolt must have disturbed one of the samples, since it's currently all over the wall.
        DunaInSpaceLow* = #CSS_mobileMaterialsLab_DunaInSpaceLow_01 // The samples haven't done much in space, but what they do on the surface must be very interesting.
        DunaInSpaceHigh* = #CSS_mobileMaterialsLab_DunaInSpaceHigh_00 // The radiation on the journey here has bleached some of the samples, and polymers have turned brittle.
        DunaInSpaceHigh* = #CSS_mobileMaterialsLab_DunaInSpaceHigh_01 // Normal spacey stuff has happened to the samples. Yes, that's what we call it.

        IkeSrfLandedPolarLowlands* = #CSS_mobileMaterialsLab_IkeSrfLandedPolarLowlands_00 // If you didn't know better, you would say the samples were afraid of the darkness. Do you know better?
        IkeSrfLandedPolarLowlands* = #CSS_mobileMaterialsLab_IkeSrfLandedPolarLowlands_01 // The onboard camera shows an alarm clock ringing in the bay. Joke's on you, R&D Department, nobody can hear it!
        IkeSrfLandedMidlands* = #CSS_mobileMaterialsLab_IkeSrfLandedMidlands_00 // The grey rock and dust makes the samples look grey as well.
        IkeSrfLandedMidlands* = #CSS_mobileMaterialsLab_IkeSrfLandedMidlands_01 // Grey dust trickles out of the crevices in the sample bay door as it opens.
        IkeSrfLandedEasternMountainRidge* = #CSS_mobileMaterialsLab_IkeSrfLandedEasternMountainRidge_00 // For want of a flat place to land around here, the materials slowly slide to the end of the bay.
        IkeSrfLandedEasternMountainRidge* = #CSS_mobileMaterialsLab_IkeSrfLandedEasternMountainRidge_01 // Dust kicked up by the ship landing starts to cake the samples. This stuff seems pretty sticky and attracted to static.
        IkeSrfLandedWesternMountainRidge* = #CSS_mobileMaterialsLab_IkeSrfLandedWesternMountainRidge_00 // One of the samples rolls out of the bay and bounces off down the mountainside. You don't fancy chasing after it.
        IkeSrfLandedWesternMountainRidge* = #CSS_mobileMaterialsLab_IkeSrfLandedWesternMountainRidge_01 // No matter the landscape, that ubiquitous sticky dust is all over the samples very quickly.
        IkeSrfLandedLowlands* = #CSS_mobileMaterialsLab_IkeSrfLandedLowlands_00 // Dust here settles vertically, rather than on any surface around.
        IkeSrfLandedLowlands* = #CSS_mobileMaterialsLab_IkeSrfLandedLowlands_01 // You forgot to depressurise the bay before opening it, and a mix of gas and samples go flying in an arc to the ground.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthEasternMountainRange_00 // A nearby falling rock makes the samples shake in their containers. You hope your spot isn't next.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthEasternMountainRange_01 // Some of the once-liquid samples melt when exposed to the sunlight. It mustn't be too cold, then.
        IkeSrfLandedSouthPole* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthPole_00 // A small shower of grey dust falls gently to the ground as the sample bay doors open silently in the vacuum.
        IkeSrfLandedSouthPole* = #CSS_mobileMaterialsLab_IkeSrfLandedSouthPole_01 // Some of the oxygen has leaked out of one of the containers. Closing the doors to preserve the pressure, you heat the Ikean dust in the bay until it ignites.
        IkeSrfLandedCentralMountainRange* = #CSS_mobileMaterialsLab_IkeSrfLandedCentralMountainRange_00 // You look at the red light in the bay, and then up at Duna. The resemblance is uncanny.
        IkeSrfLandedCentralMountainRange* = #CSS_mobileMaterialsLab_IkeSrfLandedCentralMountainRange_01 // The samples don't do much aside from bob about in the low gravity.
        IkeInSpaceLow* = #CSS_mobileMaterialsLab_IkeInSpaceLow_00 // The samples cluster on the Ike-facing side. They must like Ike too.
        IkeInSpaceLow* = #CSS_mobileMaterialsLab_IkeInSpaceLow_01 // You open and shut the doors to make the materials do something. All you succeed in doing is knocking some out.
        IkeInSpaceHigh* = #CSS_mobileMaterialsLab_IkeInSpaceHigh_00 // Note to installing technicians: this is a science experiment, not a fancy groceries holder. Please leave your karrots somewhere else.
        IkeInSpaceHigh* = #CSS_mobileMaterialsLab_IkeInSpaceHigh_01 // One of the samples has drifted out of its container. You grab it with the remote arm to put it back in, and it crumbles to dust. Oh well.

        DresSrfLanded* = #CSS_mobileMaterialsLab_DresSrfLanded_00 // The samples are quiet. Too quiet.
        DresSrfLandedRidges* = #CSS_mobileMaterialsLab_DresSrfLandedRidges_00 // The samples appear to have set up a anarchist governmeant. You are not sure how you can tell.
        DresSrfLandedCanyons* = #CSS_mobileMaterialsLab_DresSrfLandedCanyons_00 // The samples seem to have no reaction to the surroundings, but while examining them you think you hear a faint screaming. Is it the samples, or you?
        DresInSpaceLow* = #CSS_mobileMaterialsLab_DresInSpaceLow_00 // Something must have hit the lab and mixed up all the samples. Probably a micro-meteor or some swamp gas. You had nothing to do with it.
        DresInSpaceHigh* = #CSS_mobileMaterialsLab_DresInSpaceHigh_00 // The objects are still floating around and making a mess, though some of them have grouped together and occasionally you see a spark between them.

        JoolFlyingLow* = #CSS_mobileMaterialsLab_JoolFlyingLow_00 // The samples are running around in circles.
        JoolFlyingLow* = #CSS_mobileMaterialsLab_JoolFlyingLow_01 // One of the samples is panicking.
        JoolFlyingLow* = #CSS_mobileMaterialsLab_JoolFlyingLow_02 // The pressure of the Jool's atmosphere is so high that a few of the samples have begun fusing together.
        JoolFlyingHigh* = #CSS_mobileMaterialsLab_JoolFlyingHigh_00 // Jool's immense gravity is pulling the materials towards one side of the container.
        JoolInSpaceLow* = #CSS_mobileMaterialsLab_JoolInSpaceLow_00 // Pressured by Jool's gravity, the samples have begun a revouloution. Who they are revoulting against is undeterminable.
        JoolInSpaceHigh* = #CSS_mobileMaterialsLab_JoolInSpaceHigh_00 // We came, we saw, we did science. And we're still here.

        LaytheSrfLanded* = #CSS_mobileMaterialsLab_LaytheSrfLanded_00 // Some of the samples spill and soak into the soil. You silently pray that the samples are sterile.
        LaytheSrfLandedPoles* = #CSS_mobileMaterialsLab_LaytheSrfLandedPoles_00 // Some of the samples seem to be frozen.
        LaytheSrfLandedPoles* = #CSS_mobileMaterialsLab_LaytheSrfLandedPoles_01 // Snow suddenly blows into some of the samples. You hope it doesn't effect the results.
        LaytheSrflandedShores* = #CSS_mobileMaterialsLab_LaytheSrflandedShores_00 // The Mobile Materials Lab hums and whirs as it processes the sand you shoveled into it.
        LaytheSrfLandedShores* = #CSS_mobileMaterialsLab_LaytheSrfLandedShores_01 // One of the samples vaporized.
        LaytheSrfLandedDunes* = #CSS_mobileMaterialsLab_LaytheSrfLandedDunes_00 // You put a sand-like substance into the Mobile Materials lab. It hums and whirs for some time and then it beeps. The screen says "Sand".
        LaytheSrfSplashed* = #CSS_mobileMaterialsLab_LaytheSrfSplashed_00 // Certain samples react explosively with Laythe's oceans. Or perhaps the sensor is reacting explosively? It's hard to tell.
        LaytheSrfSplashedTheSagenSea* = #CSS_mobileMaterialsLab_LaytheSrfSplashedTheSagenSea_00 // It is starting to rust.
        LaytheSrfSplashedTheSagenSea* = #CSS_mobileMaterialsLab_LaytheSrfSplashedTheSagenSea_01 // Despite the temperature one of the samples is starting to glow hot as it touches the water.
        LaytheFlyingLow* = #CSS_mobileMaterialsLab_LaytheFlyingLow_00 // The materials suddenly gather by the window, looking at the surface below.
        LaytheFlyingLow* = #CSS_mobileMaterialsLab_LaytheFlyingLow_01 // They look the same as they were on Kerbin.

        VallSrfLanded* = #CSS_mobileMaterialsLab_VallSrfLanded_00 // You hear a knocking coming from the inside of the materials bay, but good judgment keeps you from investigating further.
        VallSrfLandedHighlands* = #CSS_mobileMaterialsLab_VallSrfLandedHighlands_00 // You accidentally drop some ice from the lab onto the surface. You wonder if there is a way to tell the difference between Kerbin's ice and Vall's ice.

        TyloSrfLanded* = #CSS_mobileMaterialsLab_TyloSrfLanded_00 // It seems as if the samples have put on some weight.
        TyloSrfLandedHighlands* = #CSS_mobileMaterialsLab_TyloSrfLandedHighlands_00 // The samples look very similar to peanut butter. Then you realize this isn't a sample canister and someone got peanut butter all over your materials!
        TyloSrfLandedMara* = #CSS_mobileMaterialsLab_TyloSrfLandedMara_00 // The samples appear to have started a corporate oligarchy. You're not sure how, but the container is now full of mines and factories.
        TyloInSpaceHigh* = #CSS_mobileMaterialsLab_TyloInSpaceHigh_00 // The metal is metallic, the wood is wooden, the glass is glassy. If Tylo is going change any of this you will have to get closer.

        BopSrfLanded* = #CSS_mobileMaterialsLab_BopSrfLanded_00 // The materials are getting a little freaked out, which in turn freaks you out. Bop is truly an evil place.
        BopSrfLandedPeaks* = #CSS_mobileMaterialsLab_BopSrfLandedPeaks_00 // You think you see a small tentacle, but the video flickers, and it's gone.
        BopSrfLandedRidges* = #CSS_mobileMaterialsLab_BopSrfLandedRidges_00 // The materials appear to have set up a new facist government, and are attemping to invade a nearby fuel tank.
        BopInSpaceLow* = #CSS_mobileMaterialsLab_BopInSpaceLow_00 // You open the doors and notice something small and green. The scientists said they lost a radioactive squid the other day. You hope this won't affect your journey home.

        PolSrfLanded* = #CSS_mobileMaterialsLab_PolSrfLanded_00 // You hear a sneeze in the bay.
        PolSrfLandedLowlands* = #CSS_mobileMaterialsLab_PolSrfLandedLowlands_00 // Small pieces of Pol cover the samples.
        PolSrfLandedHighlands* = #CSS_mobileMaterialsLab_PolSrfLandedHighlands_00 // Some of the samples have shriveled up.
        PolSrfLandedMidlands* = #CSS_mobileMaterialsLab_PolSrfLandedMidlands_00 // The materails appear to have set up a monarchist govarnment, are are building a very small palace.

        EelooSrfLanded* = #CSS_mobileMaterialsLab_EelooSrfLanded_00 // A liquid canister spills onto the ground and flash freezes in place. Not very informative, but very pretty.
        EelooSrfLandedNorthernGlaciers* = #CSS_mobileMaterialsLab_EelooSrfLandedNorthernGlaciers_00 // You look away, and some of the materials shape into a dog.
        EelooSrfLandedLowlands* = #CSS_mobileMaterialsLab_EelooSrfLandedLowlands_00 // All of the materials have frozen solid, except for one which has mysteriously caught fire.
        EelooSrfLandedHighlands* = #CSS_mobileMaterialsLab_EelooSrfLandedHighlands_00 // You illuminate one of the samples, and it follows the light. You play with it for a little while.
        EelooSrfLandedIceCanyons* = #CSS_mobileMaterialsLab_EelooSrfLandedIceCanyons_00 // A strange green crystal has grown. Maybe Mission Control will know what to do with it.
        EelooSrfLandedCraters* = #CSS_mobileMaterialsLab_EelooSrfLandedCraters_00 // One of the samples goes mad and jumps out of the materials bay. He was always the weird one anyway.
        EelooSrfLandedMidlands* = #CSS_mobileMaterialsLab_EelooSrfLandedMidlands_00 // Most of the materials are frozen solid.
        EelooInSpaceLow* = #CSS_mobileMaterialsLab_EelooInSpaceLow_00 // You used the science lab to assemble a miniature model of the science lab. There was a lot of downtime while waiting to get to Eeloo.
        EelooInSpaceHigh* = #CSS_mobileMaterialsLab_EelooInSpaceHigh_00 // The samples have stopped moving. You aren't sure if this is because of the cold or the time it took to get here.
    }
}