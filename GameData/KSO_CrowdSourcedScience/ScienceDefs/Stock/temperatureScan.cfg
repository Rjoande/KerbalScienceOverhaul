        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_03 // It appears to be noticeably closer on the dark side of the Mun. Nothing you aren't prepared for though.
        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_04 // You quickly write down your results in the knowledge that thermometers don't often respond well to lithobraking maneuvers.
        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_05 // Well that was quite expected. You consider throwing the thermometer into the microwave just to shake things up.
