@EXPERIMENT_DEFINITION:HAS[#id[logIonTrap]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_logIonTrap_GrannusInSpaceLow_00 // The ion trap saturates almost immediately, as if the red dwarf is personally trying to sign the data stream. Mission Control’s “please repeat” arrives long after the trap has cooled down again.
        GrannusInSpaceHigh* = #GEPscience_logIonTrap_GrannusInSpaceHigh_00 // Even out here, the particle flux comes in gusts and lulls, like a weather report written in charged dust. The quiet intervals are somehow more unsettling than the noisy ones.
        TaranisInSpaceLow* = #GEPscience_logIonTrap_TaranisInSpaceLow_00 // Close to Taranis, the trap catches a harsh mix of fast ions and heavier sputtered bits, as if the planet is slowly evaporating into space. The detector insists this is “within limits,” but it says that about everything.
        TaranisInSpaceHigh* = #GEPscience_logIonTrap_TaranisInSpaceHigh_00 // At this altitude the signal steadies into a relentless stream from Grannus, with sharp spikes whenever you cross the day-night boundary. It feels like flying through the edge of a furnace and a freezer at the same time.
        ToutatisInSpaceLow* = #GEPscience_logIonTrap_ToutatisInSpaceLow_00 // The trap detects a thin, patchy ionosphere that lights up near the terminator and fades over the dark side, like a reluctant glow. You label the file “maybe-atmosphere, please handle gently” before the next comm window.
        ToutatisInSpaceHigh* = #GEPscience_logIonTrap_ToutatisInSpaceHigh_00 // High above Toutatis, the readings alternate between calm and sudden bursts, suggesting a weak magnetic shield being pushed around by the stellar wind. The particles arrive first; the explanation arrives several minutes later.
        NodensInSpaceLow* = #GEPscience_logIonTrap_NodensInSpaceLow_00 // The ion trap keeps dipping in and out of Nodens’s magnetospheric “weather,” spiking whenever the planet’s dark-side glow rolls beneath you. By the time Mission Control asks what that means, the peaks have already moved on.
        NodensInSpaceHigh* = #GEPscience_logIonTrap_NodensInSpaceHigh_00 // Farther out, the trap reads a steady wind of charged particles under the dim red sun, with occasional sharp bursts that feel like distant tantrums. The quiet between bursts is long enough to notice how far from home you are.
        BelisamaInSpaceLow* = #GEPscience_logIonTrap_BelisamaInSpaceLow_00 // Near Belisama, the trap catches a thin spray of ions and charged grit, as if the moon is slowly sanding itself into space. The signal drops whenever Nodens blocks the wind—an enormous, silent “no data” that lasts longer than your comm window.
        BelisamaInSpaceHigh* = #GEPscience_logIonTrap_BelisamaInSpaceHigh_00 // High above the locked pair, the particle stream alternates between open space and Nodens’s stretched-out magnetic wake. The trap logs it dutifully, while everyone pretends the laggy “copy that” is reassuring.
        SucellusInSpaceLow* = #GEPscience_logIonTrap_SucellusInSpaceLow_00 // The ion trap counts a gritty mix of slow ions and energetic spikes, as if Sucellus is shedding a faint, invisible tail. The readout labels it “interesting” in the same calm font it uses for “overheated.”
        SucellusInSpaceHigh* = #GEPscience_logIonTrap_SucellusInSpaceHigh_00 // Farther out, the particle flux smooths into a steady red-sun wind with occasional sharp pulses that don’t match any familiar cycle. You start tagging timestamps by “comm window” instead of “minutes.”
        CaireenInSpaceLow* = #GEPscience_logIonTrap_CaireenInSpaceLow_00 // Close to Caireen, the ion trap catches bursts of heavier ions that look suspiciously like surface material kicked loose and electrically encouraged. The instrument insists it’s only measuring particles, not judging your trajectory.
        CaireenInSpaceHigh* = #GEPscience_logIonTrap_CaireenInSpaceHigh_00 // Above Caireen, the stream flickers as you drift in and out of its parent’s magnetic wake. The quiet intervals feel too long, even before you remember the light-time to home.
        SironaInSpaceLow* = #GEPscience_logIonTrap_SironaInSpaceLow_00 // The trap goes from calm to chaotic as Sirona’s charged environment grabs the solar wind and rearranges it into something new. The spikes line up with band crossings like the planet is “striped” all the way down to the plasma.
        SironaInSpaceHigh* = #GEPscience_logIonTrap_SironaInSpaceHigh_00 // High above Sirona, the detector registers broad, slow waves of particles punctuated by sudden, needle-like surges. Whatever is steering this field is doing it far away and without asking permission.
        AirmedInSpaceLow* = #GEPscience_logIonTrap_AirmedInSpaceLow_00 // The ion trap is instantly overwhelmed by a harsh, unshielded particle spray—Airmed has no magnetic field and it shows. The counts spike hardest over the two-toned terrain, like the surface is “painted” in charge as well as color.
        AirmedInSpaceHigh* = #GEPscience_logIonTrap_AirmedInSpaceHigh_00 // Higher up, the readings settle into Sirona’s distant influence, punctuated by sudden gusts from the dim red sun. The data packet reaches home so late that the trap has already finished being alarmed about it.
        BorvoInSpaceLow* = #GEPscience_logIonTrap_BorvoInSpaceLow_00 // Borvo’s thin atmosphere and active upper layers feed the trap a mix of nitrogen and methane ions that look surprisingly organized. It’s the closest thing to “weather” you can measure without ever touching the air.
        BorvoInSpaceHigh* = #GEPscience_logIonTrap_BorvoInSpaceHigh_00 // Above Borvo, the signal shifts from local ionospheric chemistry to the broader churn of Sirona’s magnetosphere. The trap logs a long, slow pulse that feels like a message—unfortunately, not one you can decode before the next comm window.
        DamonaInSpaceLow* = #GEPscience_logIonTrap_DamonaInSpaceLow_00 // Damona offers no magnetic shelter at all, so the ion trap counts particles like a leaky bucket counts water: fast, constant, and a bit insulting. Over the big scar on its surface, heavier ions appear as if the moon is still remembering the impact.
        DamonaInSpaceHigh* = #GEPscience_logIonTrap_DamonaInSpaceHigh_00 // Farther out, you drift through a quiet patch that suddenly breaks into sharp bursts when Sirona’s wake sweeps past. The delay to home makes the silence feel longer than it should, even when the numbers insist everything is “nominal.”
        EponaInSpaceLow* = #GEPscience_logIonTrap_EponaInSpaceLow_00 // The ion trap picks up a thin, fussy cocktail of nitrogen ions with just enough methane to keep the chemists awake. The counts wobble as Epona’s weak field tries its best to look confident under the dim red sun.
        EponaInSpaceHigh* = #GEPscience_logIonTrap_EponaInSpaceHigh_00 // Far above Epona, the signal flattens into the steady stellar wind—then hiccups in slow pulses that don’t match any familiar rhythm. By the time the data reaches home, the trap has already moved on to its next mystery.
        RosmertaInSpaceLow* = #GEPscience_logIonTrap_RosmertaInSpaceLow_00 // Over lonely Rosmerta, the ion trap catches occasional heavier ions that look like surface material being quietly sandblasted into space. It’s hard to tell what’s more airless: the moon or the comm channel.
        RosmertaInSpaceHigh* = #GEPscience_logIonTrap_RosmertaInSpaceHigh_00 // Higher out, the trap drifts through Epona’s distant wake—quiet, then abruptly noisy, like stepping behind a wall and finding it electrified. You mark the transition point and wait for a reply that arrives much later than the particles did.
        RAB-58EInSpaceLow* = #GEPscience_logIonTrap_RAB-58EInSpaceLow_00 // Near RAB-58E, the ion trap registers bursts of light ions that come and go as you skim past, as if the little moonlet can’t decide whether it’s rock or frost. The instrument files it under “captured weirdness” and refuses to elaborate.
        RAB-58EInSpaceHigh* = #GEPscience_logIonTrap_RAB-58EInSpaceHigh_00 // Out here the background dominates—cosmic rays, thin stellar wind, and occasional grit-charged spikes from nowhere in particular. The emptiness between spikes feels longer when the red sun is just a dull ember behind you.
        CernunnosInSpaceLow* = #GEPscience_logIonTrap_CernunnosInSpaceLow_00 // The ion trap sniffs an extremely reluctant exosphere: faint ions, colder than the probe’s attitude controller, with sporadic surges when sunlight grazes the limb. Cernunnos may be small, but it still manages to be complicated.
        CernunnosInSpaceHigh* = #GEPscience_logIonTrap_CernunnosInSpaceHigh_00 // High above Cernunnos, the trap mostly counts the universe instead of the world—until a slow, broad wave rolls through like a distant magnetic sigh. You start thinking in light-minutes instead of meters.
    }
}