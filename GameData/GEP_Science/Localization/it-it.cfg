Localization
{
    it-it
    {
        // === STOCK ===
        // evaScience
        #GEPscience_evaScience_GrannusInSpaceLow_00 = Hai eseguito l'esperimento EVA mentre Grannus riempiva metà cielo con un bagliore rosso spento, e Controllo Missione ha risposto diversi minuti dopo.
        #GEPscience_evaScience_GrannusInSpaceHigh_00 = Hai completato l'esperimento EVA nello spazio alto di Grannus, dove il sole rosso sembrava più una spia di allarme che un'alba.
        #GEPscience_evaScience_TaranisSrfLanded_00 = Hai eseguito l'esperimento EVA su Taranis e hai capito subito che "ombra" era solo un altro modo per dire "sempre troppo caldo" sotto un sole rosso fioco.
        #GEPscience_evaScience_TaranisInSpaceLow_00 = Hai eseguito l'esperimento EVA in orbita bassa sopra Taranis, osservando il lato diurno incandescente e quello notturno gelido scambiarsi posto con una velocità inquietante.
        #GEPscience_evaScience_TaranisInSpaceHigh_00 = Hai eseguito l'esperimento EVA nello spazio alto sopra Taranis, e il silenzio tra un check-in e l'altro ha reso l'intero sistema fastidiosamente vuoto.
        #GEPscience_evaScience_ToutatisSrfLanded_00 = Hai eseguito l'esperimento EVA su Toutatis e hai scoperto che l'aria sottile era giusto abbastanza densa da portare polvere dentro ogni cosa che possiedi.
        #GEPscience_evaScience_ToutatisInSpaceLow_00 = Hai completato l'esperimento EVA in orbita bassa di Toutatis, prendendo appunti alla luce fioca del sole rosso mentre aspettavi la risposta lunga e graffiante da casa.
        #GEPscience_evaScience_ToutatisInSpaceHigh_00 = Hai eseguito l'esperimento EVA molto sopra Toutatis, dove la fascia del crepuscolo sembrava invitante finché il ritardo nelle comunicazioni non ti ha ricordato quanto eri davvero lontano.
        #GEPscience_evaScience_NodensSrfLanded_00 = Esegui l'esperimento EVA su Nodens. Il sole rosso fioco fa sembrare l'orizzonte un "tardo pomeriggio" permanente, e la risposta via radio richiede così tanto da sembrare una missione a parte.
        #GEPscience_evaScience_NodensInSpaceLow_00 = Esegui l'esperimento EVA in orbita bassa di Nodens. Il sole rosso luccica sulla tuta, e il "Ricevuto" in ritardo da Controllo Missione arriva come se fosse stato spedito per posta.
        #GEPscience_evaScience_NodensInSpaceHigh_00 = Completi l'esperimento EVA nello spazio alto di Nodens. Il pianeta è piccolo, il sole è fioco, e la distanza sembra misurabile nei battiti tra una trasmissione e l'altra.
        #GEPscience_evaScience_BelisamaSrfLanded_00 = Esegui l'esperimento EVA su Belisama. Il suolo sembra deciso a conservare per sempre le tue impronte, visto che nessun vento ha fretta di cancellarle.
        #GEPscience_evaScience_BelisamaInSpaceLow_00 = Esegui l'esperimento EVA in orbita bassa di Belisama. Nodens incombe vicino come un compagno silenzioso, e il ritardo nelle comunicazioni ti ricorda che nessuno dei due è a casa.
        #GEPscience_evaScience_BelisamaInSpaceHigh_00 = Esegui l'esperimento EVA molto sopra Belisama. La linea d'ombra della luna è affilata come un rasoio nella luce rossa, e il buio sembra più profondo di quanto dovrebbe.
        #GEPscience_evaScience_SucellusSrfLanded_00 = Esegui l'esperimento EVA su Sucellus. Ogni movimento è un po' troppo fluttuante, e il sole rosso fioco fa sembrare estranea perfino la tua ombra.
        #GEPscience_evaScience_SucellusInSpaceLow_00 = Esegui l'esperimento EVA in orbita bassa sopra Sucellus. La superficie sotto sembra ricca di risorse o solo ingannevolmente lucida, i tuoi strumenti si rifiutano di spettegolare.
        #GEPscience_evaScience_SucellusInSpaceHigh_00 = Esegui l'esperimento EVA nello spazio alto di Sucellus. Il mondo ruota lentamente sotto di te, e la lunga attesa di indicazioni ti fa apprezzare le checklist più che mai.
        #GEPscience_evaScience_CaireenSrfLanded_00 = Esegui l'esperimento EVA sul minuscolo Caireen. L'orizzonte è vicino, la gravità è indecisa, e il sole rosso fa sembrare tutto un sogno mezzo dimenticato.
        #GEPscience_evaScience_CaireenInSpaceLow_00 = Esegui l'esperimento EVA in orbita bassa di Caireen. Una spinta gentile ti manda alla deriva, e le comunicazioni in ritardo ti rendono prudente con ogni "ops".
        #GEPscience_evaScience_CaireenInSpaceHigh_00 = Completi l'esperimento EVA molto sopra Caireen. È poco più di un puntino, eppure riesce lo stesso a farti sentire molto, molto lontano.
        #GEPscience_evaScience_SironaInSpaceLow_00 = Completi l'esperimento EVA in orbita bassa di Sirona. Il suo immenso disco ribollente riflette una luce rossa stanca, e Controllo Missione risponde come se parlasse da un altro secolo.
        #GEPscience_evaScience_SironaInSpaceHigh_00 = Esegui l'esperimento EVA nello spazio alto di Sirona. Il pianeta diventa una biglia smorzata e il silenzio tra le trasmissioni sembra più lungo della linea d'eclissi.
        #GEPscience_evaScience_AirmedSrfLanded_00 = Esegui l'esperimento EVA su Airmed. Il suolo è freddo, le ombre hanno il colore sbagliato sotto il sole rosso, e ti sorprendi ad ascoltare suoni che non arrivano mai.
        #GEPscience_evaScience_AirmedInSpaceLow_00 = Esegui l'esperimento EVA in orbita bassa sopra Airmed. La superficie sotto sembra nitida e sconosciuta, e il "Ricevuto" in ritardo trasforma semplici osservazioni in capsule del tempo.
        #GEPscience_evaScience_AirmedInSpaceHigh_00 = Completi l'esperimento EVA molto sopra Airmed. Con Sirona sospeso lì vicino, ti senti molto piccolo e molto lontano da qualunque posto che chiamerebbe tutto questo "operazioni normali".
        #GEPscience_evaScience_BorvoSrfLanded_00 = Esegui l'esperimento EVA su Borvo. L'aria è sottile ma presente, quanto basta per portare una foschia tenue che fa sembrare la luce rossa filtrata attraverso un vetro vecchio.
        #GEPscience_evaScience_BorvoInSpaceLow_00 = Completi l'esperimento EVA in orbita bassa di Borvo. La linea del terminatore è netta, la superficie è stranamente quieta, e il ritardo nelle comunicazioni fa arrivare le battute con diversi minuti di ritardo.
        #GEPscience_evaScience_BorvoInSpaceHigh_00 = Esegui l'esperimento EVA nello spazio alto di Borvo. La luna si riduce a un puntino, e il sole rosso trasforma la tua tuta in un cartello di avvertimento alla deriva.
        #GEPscience_evaScience_DamonaSrfLanded_00 = Esegui l'esperimento EVA su Damona. Il paesaggio è spoglio, il sole rosso non aiuta, e i tuoi passi nel casco sembrano più forti del dovuto.
        #GEPscience_evaScience_DamonaInSpaceLow_00 = Esegui l'esperimento EVA in orbita bassa sopra Damona. La superficie sembra costruita con pezzi mancanti, e la lunga attesa di indicazioni ti fa apprezzare "Procedere come previsto".
        #GEPscience_evaScience_DamonaInSpaceHigh_00 = Completi l'esperimento EVA molto sopra Damona. La luna quasi non si vede, ma la distanza è fin troppo reale, misurata nel tempo che serve perché casa risponda.
        #GEPscience_evaScience_EponaSrfLanded_00 = Hai eseguito l'esperimento EVA su Epona, e il sole rosso fioco ha trasformato l'aria fresca e umida in un crepuscolo permanente mentre la risposta via radio arrivava in ritardo.
        #GEPscience_evaScience_EponaInSpaceLow_00 = Hai eseguito l'esperimento EVA in orbita bassa di Epona, guardando scorrere schemi meteorologici sconosciuti come pensieri lenti sotto la luce rossa.
        #GEPscience_evaScience_EponaInSpaceHigh_00 = Hai completato l'esperimento EVA nello spazio alto di Epona, dove il pianeta rimpiccioliva e il lungo ritardo radio rendeva la tua checklist stranamente definitiva.
        #GEPscience_evaScience_RosmertaSrfLanded_00 = Hai eseguito l'esperimento EVA su Rosmerta, e il contatore di radiazioni borbottava piano mentre Epona restava sospeso in alto come una lampada lontana.
        #GEPscience_evaScience_RosmertaInSpaceLow_00 = Hai eseguito l'esperimento EVA in orbita bassa di Rosmerta, dove ogni bordo di cratere sembrava affilato come un rasoio nel bagliore stanco del sole rosso.
        #GEPscience_evaScience_RosmertaInSpaceHigh_00 = Hai eseguito l'esperimento EVA nello spazio alto di Rosmerta, e il silenzio tra le trasmissioni è durato abbastanza da diventare una misura a sé.
        #GEPscience_evaScience_RAB-58E_SrfLanded_00 = Hai eseguito l'esperimento EVA su RAB-58E, e la gravità quasi zero ha fatto sembrare persino i passi più cauti un piano per scappare per sbaglio.
        #GEPscience_evaScience_RAB-58E_InSpaceLow_00 = Hai eseguito l'esperimento EVA in orbita bassa di RAB-58E, scivolando oltre un piccolo satellite che a malapena meritava di chiamarsi destinazione e che sembrava comunque lontano da casa.
        #GEPscience_evaScience_RAB-58E_InSpaceHigh_00 = Hai completato l'esperimento EVA nello spazio alto sopra RAB-58E, e i ping di avviso della tuta sembravano più forti sotto il lungo "Ricevuto" in ritardo.
        #GEPscience_evaScience_CernunnosSrfLanded_00 = Hai eseguito l'esperimento EVA su Cernunnos, e il sole rosso fioco proiettava un'ombra debole che sembrava incerta se appartenesse anche lei a questo posto.
        #GEPscience_evaScience_CernunnosInSpaceLow_00 = Hai eseguito l'esperimento EVA in orbita bassa di Cernunnos, guardando la sua superficie fredda scorrere sotto di te mentre casa rispondeva minuti dopo.
        #GEPscience_evaScience_CernunnosInSpaceHigh_00 = Hai eseguito l'esperimento EVA nello spazio alto di Cernunnos, dove il sistema sembrava così vuoto che perfino il tuo respiro suonava come una trasmissione.

        // infraredTelescope
        #GEPscience_infraredTelescope_GrannusInSpaceHigh_00 = Il sole rosso fioco continua a saturare i sensori, quindi ti nascondi in una lunga eclissi e osservi scorrere un cielo più freddo e silenzioso, mentre le risposte di Controllo Missione arrivano in ritardo.
        #GEPscience_infraredTelescope_GrannusInSpaceHigh_01 = Mappi la struttura termica attraverso la stella e scopri una nuova unità scientifica: "molto".
        #GEPscience_infraredTelescope_GrannusInSpaceHigh_02 = I dati suggeriscono "una sorgente di calore nelle vicinanze". Depositi un secondo rapporto per chiarire che la sorgente di calore è, in effetti, la stella che stai orbitando.
        #GEPscience_infraredTelescope_GrannusInSpaceHigh_03 = L'imager IR conferma che Grannus è caldo. Più che una scoperta, è un promemoria piuttosto perentorio.
        #GEPscience_infraredTelescope_TaranisInSpaceHigh_00 = Cronometri le osservazioni sfruttando l'ombra del pianeta per raffreddare l'ottica, poi intercetti deboli segnali termici di bersagli lontani prima che il bagliore rosso ti trovi di nuovo.
        #GEPscience_infraredTelescope_ToutatisInSpaceHigh_00 = Usando il tenue crepuscolo come riferimento, sottrai dal fondo le metà arroventata e congelata e scopri che l'universo è pieno di cose fredde che sembrano comunque molto lontane.
        #GEPscience_infraredTelescope_NodensInSpaceHigh_00 = Ripari il telescopio dietro il bordo scuro di Nodens per lasciarlo raffreddare, poi fissi un cielo freddo e sconosciuto mentre il sole rosso continua a infilarsi nei rilevatori e Controllo Missione risponde in ritardo.
        #GEPscience_infraredTelescope_BelisamaInSpaceHigh_00 = Belisama e Nodens restano negli stessi punti come se avessero firmato un contratto, il che rende facile puntare, poi ti ricordi che anche la vista "stabile" è sotto un sole rosso fioco e ogni ping di calibrazione deve viaggiare per una distanza enorme.
        #GEPscience_infraredTelescope_SucellusInSpaceHigh_00 = Sucellus non contribuisce quasi per niente al fondo termico, e questo è più inquietante che utile, l'universo qui sembra più freddo, e i tuoi pacchetti dati sembrano metterci più di quanto la fisica dovrebbe permettere.
        #GEPscience_infraredTelescope_CaireenInSpaceHigh_00 = Il minuscolo Caireen ti regala eclissi rapide e nette per raffreddare l'ottica, poi si torna a guardare deboli segnali termici strisciare su un cielo che non assomiglia a nessuna mappa stellare con cui sei cresciuto.
        #GEPscience_infraredTelescope_SironaInSpaceHigh_00 = Gli anelli di Sirona brillano di un loro tenue calore, creando riflessi insidiosi nell'ottica, usi l'ombra del pianeta per raffreddarti, poi guardi scorrere un cielo freddo e sconosciuto sotto il sole rosso fioco.
        #GEPscience_infraredTelescope_AirmedInSpaceHigh_00 = Con Airmed sotto come riferimento scuro e stabile, sottrai la sua debole foschia termica e distingui bersagli lontani e più freddi, quando Controllo Missione risponde, il telescopio è già passato oltre.
        #GEPscience_infraredTelescope_BorvoInSpaceHigh_00 = La superficie di Borvo contribuisce con quel tanto di calore da complicare il fondo, quindi passi gran parte del passaggio a fare calcoli e ad aspettare che i rilevatori si stabilizzino in un cielo che ancora non sembra casa.
        #GEPscience_infraredTelescope_DamonaInSpaceHigh_00 = Damona ti offre eclissi rapide per calibrazione e raffreddamento, poi si torna a fissare un universo infrarosso insolito mentre il sole rosso continua a tentare di saturare tutto nel momento peggiore.
        #GEPscience_infraredTelescope_EponaInSpaceHigh_00 = Fai passare il telescopio sul lato notturno di Epona e osservi un tenue calore filtrare da terreni che non sembrano mai "raffreddarsi come si deve" sotto un sole rosso fioco, la conferma da casa arriva dopo che hai già acquisito la serie successiva.
        #GEPscience_infraredTelescope_RosmertaInSpaceHigh_00 = L'ampia ombra di Rosmerta è un perfetto raffreddamento prolungato per l'ottica, e il cielo oltre sembra sconosciuto e profondo, nelle note di timing hai scritto: "attendere risposta... ancora in attesa".
        #GEPscience_infraredTelescope_RAB-58EInSpaceHigh_00 = La piccola luna irregolare fa ruotare nel campo visivo le sue facce calda e fredda come un pessimo bersaglio di calibrazione, ma quando i rilevatori si stabilizzano intercetti segnali termici lontani che sembrano impossibilmente distanti da qualunque stella confortantemente normale.
        #GEPscience_infraredTelescope_CernunnosInSpaceHigh_00 = Cernunnos non contribuisce quasi per niente al fondo infrarosso, che dovrebbe essere una buona notizia, invece fa sembrare l'universo più freddo e più silenzioso, come se il sole rosso non arrivasse davvero fin qui.

        // magnetometer
        #GEPscience_magnetometer_GrannusInSpaceLow_00 = L'ago va a fondo scala, poi si mette a danzare: il campo di Grannus si attorciglia attorno al veicolo come una tempesta invisibile. Controllo Missione chiede una nuova lettura, rispondi che sentirai quella richiesta tra qualche minuto.
        #GEPscience_magnetometer_GrannusInSpaceHigh_00 = Anche quassù il magnetometro continua a ronzare di attività, la portata magnetica di Grannus è più ampia della tua zona di comfort. La traccia sembra qualcuno abbia rovesciato spaghetti sul registratore.
        #GEPscience_magnetometer_TaranisInSpaceLow_00 = Vicino a Taranis, lo strumento segnala quasi nulla, solo un sibilo nervoso di rumore di fondo. Ogni tanto un picco netto dice che Grannus sta comunque agitando lo spazio attorno.
        #GEPscience_magnetometer_TaranisInSpaceHigh_00 = Più lontano, il "segnale" di Taranis svanisce nel campo irrequieto di Grannus. Quando i dati arrivano a casa, ti sei già dimenticato cosa volevi dimostrare.
        #GEPscience_magnetometer_ToutatisInSpaceLow_00 = Toutatis mostra un campo modesto e sbilanciato che cambia mentre passi dall'emisfero arroventato al lato oscuro. Il team discute se sia un vero dinamo o la crosta che trattiene vecchio magnetismo.
        #GEPscience_magnetometer_ToutatisInSpaceHigh_00 = In orbita alta il campo si regolarizza e si allunga in una lunga coda che punta lontano da Grannus. Sembra di misurare il vento, non il mondo.
        #GEPscience_magnetometer_NodensInSpaceLow_00 = Il magnetometro aggancia un segnale deciso, grande quanto un pianeta: Nodens ha un campo vero, non solo ottimismo. Sotto il bagliore rosso fioco di Grannus, la lettura sembra ancora appartenere a una stella molto più amichevole.
        #GEPscience_magnetometer_NodensInSpaceHigh_00 = Molto sopra Nodens, le linee di campo si allungano in una lunga coda sfrangiata che punta lontano da Grannus. I dati arrivano tardi, come ogni risposta quassù: accurati, ma mai puntuali.
        #GEPscience_magnetometer_BelisamaInSpaceLow_00 = Il "campo" di Belisama è soprattutto Nodens che sovrasta tutto, l'ago ondeggia a ogni passaggio nell'influenza del pianeta madre. Etichetti il grafico "Luna: presente, magnetismo: discutibile".
        #GEPscience_magnetometer_BelisamaInSpaceHigh_00 = Più in alto, il magnetometro si assesta su un segnale sottile e debole che viene chiaramente da altrove. Belisama non genera molto: prende in prestito quello che Nodens e Grannus sono disposti a concedere.
        #GEPscience_magnetometer_SucellusInSpaceLow_00 = Lo strumento continua a insistere che qui c'è quasi nulla, e il contatore di radiazioni è rumorosamente in disaccordo. Sucellus offre poca protezione magnetica, solo una roccia fredda e il meteo a lunga distanza di Grannus.
        #GEPscience_magnetometer_SucellusInSpaceHigh_00 = Quassù la "lettura di Sucellus" sfuma nel rumore di fondo e prende il sopravvento lo spazio attorno. Il magnetometro mappa un campo irrequieto guidato dalla stella che rende l'intero sistema instabile.
        #GEPscience_magnetometer_CaireenInSpaceLow_00 = Il magnetometro misura soprattutto gli umori della navicella finché alcuni picchi netti non lo interrompono. Caireen è un'anomalia catturata, abbastanza piccola da ignorare eppure ancora una complicazione sotto questo sole rosso.
        #GEPscience_magnetometer_CaireenInSpaceHigh_00 = In quota, Caireen scompare del tutto dalla storia magnetica. Ciò che resta è una debole attrazione distante e molto spazio vuoto tra la sonda e la prossima conversazione.
        #GEPscience_magnetometer_SironaInSpaceLow_00 = L'ago del magnetometro schizza di lato e resta lì: il campo di Sirona è una bestia vera, grande quanto un pianeta. Il segnale sobbalza in impulsi ritmici, come se gli anelli crepitassero di polvere carica.
        #GEPscience_magnetometer_SironaInSpaceHigh_00 = Molto sopra Sirona, le linee di campo si allungano in una lunga coda disordinata che punta lontano da Grannus. I dati arrivano a casa in ritardo, ma la forma è chiara: questo gigante domina lo spazio attorno.
        #GEPscience_magnetometer_AirmedInSpaceLow_00 = Vicino ad Airmed, le letture alternano "luna" e "Sirona" ogni pochi secondi. Sospetti che Airmed non stia generando un campo, quanto piuttosto indossando quello di Sirona come un cappotto troppo grande.
        #GEPscience_magnetometer_AirmedInSpaceHigh_00 = Più in alto, la firma di Airmed si assottiglia fino a quasi sparire e prende il sopravvento il fondo. Qui è soprattutto la magnetosfera di Sirona, con Grannus che agita piano i margini.
        #GEPscience_magnetometer_BorvoInSpaceLow_00 = Lo strumento segnala un segnale debole e a chiazze che cambia con quota e assetto: o Borvo ha crosta magnetizzata, oppure la navicella sta di nuovo captando granelli degli anelli attaccati allo scafo. Lo registri come "interessante" e "fastidioso".
        #GEPscience_magnetometer_BorvoInSpaceHigh_00 = A distanza, Borvo scompare nel campo di Sirona e nell'irrequietezza generale di questo sistema. Il magnetometro diventa una banderuola a lungo raggio per tempeste spaziali invisibili.
        #GEPscience_magnetometer_DamonaInSpaceLow_00 = La lettura locale di Damona è sottile finché un picco netto non la attraversa, come passare accanto a un magnete a barra sepolto grande quanto un continente. Controllo Missione chiede ripetizioni, rispondi che le ripetizioni richiederanno un po' di tempo quassù.
        #GEPscience_magnetometer_DamonaInSpaceHigh_00 = Dall'orbita alta, l'effetto di Damona svanisce e la traccia si appiana nell'influenza ampia di Sirona. La luna è una piccola interruzione in una storia magnetica molto grande e molto lontana.
        #GEPscience_magnetometer_EponaInSpaceLow_00 = Il magnetometro trova un campo debole e stabile che non dovrebbe esserci: o Epona ha un nucleo assopito, oppure l'ambiente della nana rossa sta "aiutando" in modi inquietanti. L'ago trema come se avesse freddo.
        #GEPscience_magnetometer_EponaInSpaceHigh_00 = Più lontano, il segnale di Epona si assottiglia in una curva appena percettibile e lo strumento inizia a descrivere il sistema stesso. Il vuoto tra i pacchetti di dati sembra più ampio dell'orbita.
        #GEPscience_magnetometer_RosmertaInSpaceLow_00 = La lettura resta ostinatamente vicino allo zero mentre Rosmerta scorre sotto, indifferente e privo d'aria. Ogni tanto la traccia fa un salto, più come l'influenza di Epona che sfiora che per qualcosa che Rosmerta stia facendo.
        #GEPscience_magnetometer_RosmertaInSpaceHigh_00 = In quota, Rosmerta scompare del tutto dalla storia magnetica. Rimangono solo spazio silenzioso, un sole rosso fioco e un sensore in attesa di qualcosa che valga la pena misurare.
        #GEPscience_magnetometer_RAB-58EInSpaceLow_00 = Il magnetometro misura soprattutto la navicella finché una breve oscillazione non suggerisce che qualche roccia magnetizzata stia viaggiando con questa anomalia catturata. Etichetti il file "probabilmente nulla" e lo conservi comunque.
        #GEPscience_magnetometer_RAB-58EInSpaceHigh_00 = Dall'orbita alta, RAB-58E è troppo piccolo per lasciare un'impronta magnetica. Lo strumento diventa un ascoltatore a lungo raggio di disturbi lontani che arrivano molto dopo che sono accaduti.
        #GEPscience_magnetometer_CernunnosInSpaceLow_00 = Cernunnos offre quasi un silenzio perfetto: niente campo, niente schermatura, solo un nano ghiacciato e lo spazio nudo attorno. Per una volta, "nulla" è un dato di calibrazione estremamente utile.
        #GEPscience_magnetometer_CernunnosInSpaceHigh_00 = Molto sopra Cernunnos, la traccia è liscia e inquieta, come se il sistema trattenesse il fiato. Il meteo invisibile del sole rosso è l'unica cosa che resta da mappare quassù.

        // === Bluedog_DB ===
        // bd_ALSEP_LRRR
        #GEPscience_bd_ALSEP_LRRR_TaranisSrfLanded_00 = Il riflettore è tecnicamente puntato verso Nodens, ma la maggior parte dei fotoni sembra più interessata a venire arrostita all'istante. Qualcuno però fa comunque il viaggio di andata e ritorno.
        #GEPscience_bd_ALSEP_LRRR_ToutatisSrfLanded_00 = La foschia sottile e calda trasforma il raggio in una linea tipo matita un po' tremolante, ma il ritorno da Nodens finisce comunque dritto sul rilevatore. Qualcuno scrive "abbastanza buono per la scienza" sull'involucro.
        #GEPscience_bd_ALSEP_LRRR_NodensSrfLanded_00 = Spari un laser verso Nodens e aspetti. E aspetti. Controllo Missione inizia a prendere ordinazioni di snack prima che tornino i primi fotoni.
        #GEPscience_bd_ALSEP_LRRR_BelisamaSrfLanded_00 = Con Belisama e Nodens bloccati faccia a faccia, il riflettore ha il problema del "bersaglio in movimento" più facile della storia. Il ping di ritorno è così nitido da sembrare compiaciuto.
        #GEPscience_bd_ALSEP_LRRR_SucellusSrfLanded_00 = Rimbalzi un laser su Nodens e indietro, giusto per dimostrare che questo corpo bitorzoluto, quasi pianeta, è esattamente dove la matematica dice che sia. Sucellus sembra offendersi.
        #GEPscience_bd_ALSEP_LRRR_CaireenSrfLanded_00 = Il segnale di ritorno sobbalza perché il lander continua a fare minuscoli spostamenti drammatici nella gravità debole. Il laser non apprezza la performance art.
        #GEPscience_bd_ALSEP_LRRR_AirmedSrfLanded_00 = Terreno segnato, fratture strane e un ritorno da Nodens perfettamente noioso e perfettamente affidabile. La scienza festeggia l'unica cosa qui che non sia complicata.
        #GEPscience_bd_ALSEP_LRRR_BorvoSrfLanded_00 = Se c'è qualcosa nascosto sotto tutto quel ghiaccio, non può comunque impedirti di misurare la distanza fino a Nodens. Il riflettore continua a lampeggiare come se sapesse un segreto.
        #GEPscience_bd_ALSEP_LRRR_DamonaSrfLanded_00 = Il ping da Nodens richiede così tanto che l'equipaggio rilegge la checklist due volte e inventa una terza pausa snack. Alla fine i fotoni tornano, senza la minima vergogna.
        #GEPscience_bd_ALSEP_LRRR_EponaSrfLanded_00 = La foschia di metano prova ad ammorbidire il raggio, ma la riflessione di Nodens finisce comunque sul rilevatore con una precisione soddisfacente. Nel log scrivi "per lo più otticamente adeguato".
        #GEPscience_bd_ALSEP_LRRR_RosmertaSrfLanded_00 = Invi un laser verso Nodens e ti torna una sequenza di impulsi nitida e regolare. Rosmerta sarà anche solitaria, ma il riflettore no.
        #GEPscience_bd_ALSEP_LRRR_RAB-58ESrfLanded_00 = In gravità quasi zero, fissare il riflettore con i bulloni sembra una trattativa con il concetto di "giù". Una volta che resta al suo posto, Nodens risponde puntuale.
        #GEPscience_bd_ALSEP_LRRR_CernunnosSrfLanded_00 = Quassù Nodens è solo un riferimento lontano e il ritorno è debole, ma coincide con la previsione. Un puntino di luce molto piccolo crea una base di misura enorme.

        // bd_atm
        #GEPscience_bd_atm_GrannusInSpaceLow_00 = Il supporto insiste che è stato costruito per lavori "solari", poi ammette in silenzio che questa nana rossa è un altro tipo di solare. Avvii una sorveglianza dei brillamenti e intitoli il file: "NON DISTOGLIERE LO SGUARDO".
        #GEPscience_bd_atm_GrannusInSpaceHigh_00 = Da così lontano, Grannus è una brace fioca con un sacco di vuoto attorno. Il registro dei brillamenti resta per lo più tranquillo, e in qualche modo questo rende il silenzio più rumoroso.
        #GEPscience_bd_atm_TaranisInSpaceLow_00 = Grannus resta basso e rosso, e il supporto richiede esposizioni più lunghe di quanto chiunque trovi rassicurante. Registri l'attività dei brillamenti e programmi il rapporto per quando il segnale finalmente striscerà fino a casa.
        #GEPscience_bd_atm_TaranisInSpaceHigh_00 = Con Taranis sotto e una stella rubino davanti, è difficile capire che aspetto dovrebbe avere "mezzogiorno" ormai. Gli strumenti la chiamano stabile, tu la chiami "stabile, ma inquietante".
        #GEPscience_bd_atm_ToutatisInSpaceLow_00 = Il supporto osserva Grannus tremolare sopra l'abbagliante lato diurno di Toutatis. Discuti con gli strumenti se quello fosse un brillamento o solo il pianeta che tenta di cuocere l'ottica.
        #GEPscience_bd_atm_ToutatisInSpaceHigh_00 = A questa quota, Grannus è un rubino opaco in mezzo a tanto nero. Avvii una lunga sorveglianza dei brillamenti e capisci che Controllo Missione riceverà il riassunto più o meno un'ora di nanna dopo.
        #GEPscience_bd_atm_NodensInSpaceLow_00 = Il supporto del telescopio si aggancia a Grannus. La stella sembra più una brace che un riflettore, quindi aumenti l'esposizione e annoti che qualsiasi allarme di brillamento arriverà a casa molto dopo del brillamento stesso.
        #GEPscience_bd_atm_NodensInSpaceHigh_00 = Da quassù, la foschia del bordo spesso di Nodens brilla debolmente nella luce rossa di Grannus. Il supporto segnala "condizioni tranquille", e questo è stranamente meno confortante così lontano da cieli familiari.
        #GEPscience_bd_atm_BelisamaInSpaceLow_00 = Il supporto sbircia oltre il chiarore di Nodens verso il piccolo sole rosso che domina questo sistema. Registri un debole brillamento e ti chiedi quante ore dopo Controllo Missione saprà che l'hai notato.
        #GEPscience_bd_atm_BelisamaInSpaceHigh_00 = Grannus sembra abbastanza lontano da essere decorativo, finché i sensori non ti ricordano che fa ancora i capricci. Continui a osservare lo stesso: quassù, il preavviso è la cosa più vicina al conforto.
        #GEPscience_bd_atm_SucellusInSpaceLow_00 = Il supporto del telescopio fissa Grannus e segnala "bassa attività di brillamenti". Aggiungi una nota: "Bassa attività di brillamenti è pur sempre attività di brillamenti, e siamo molto, molto lontani".
        #GEPscience_bd_atm_SucellusInSpaceHigh_00 = Dall'orbita alta, Sucellus è solo un grumo scuro sotto un sole rosso brace. Esposizioni più lunghe fanno emergere una debole struttura nella corona e tanto spazio vuoto su cui riflettere.
        #GEPscience_bd_atm_CaireenInSpaceLow_00 = Caireen è così piccolo che il supporto passa più tempo a restare fermo che a osservare. Quando finalmente si aggancia a Grannus, il registro dei brillamenti si riempie di "forse" e "ricontrollare più tardi".
        #GEPscience_bd_atm_CaireenInSpaceHigh_00 = Il supporto usa Grannus come bersaglio di calibrazione perché è l'unica cosa che qui sembri stabile. Il pacchetto dati è in coda per la trasmissione, la conferma arriverà dopo il prossimo giro di snack di tutti.
        #GEPscience_bd_atm_SironaInSpaceLow_00 = L'ambiente ostile di Sirona fa lamentare i sensori in diversi modi nuovi. Tra rumore e abbagliamento, il supporto riesce comunque a seguire Grannus e segnala un breve evento di brillamento come "non il nostro preferito".
        #GEPscience_bd_atm_SironaInSpaceHigh_00 = Molto sopra Sirona, il sole rosso disegna lievi riflessi sulle cime delle nubi. Il supporto del telescopio registra un intervallo tranquillo e ti rendi conto che "tranquillo" significa "non è ancora successo niente".
        #GEPscience_bd_atm_AirmedInSpaceLow_00 = Il supporto si aggancia a Grannus mentre la superficie malconcia di Airmed ruota sotto di te. L'indicatore dei brillamenti resta silenzioso, e tu controlli comunque gli avvisi di radiazione per abitudine.
        #GEPscience_bd_atm_AirmedInSpaceHigh_00 = Da molto sopra le strane cicatrici bicolori di Airmed, Grannus sembra una brace lontana. Registri una lunga esposizione e marchi i dati "vale l'attesa del downlink".
        #GEPscience_bd_atm_BorvoInSpaceLow_00 = La foschia sottile di Borvo prova a dare alla vista una lieve tinta, ma il supporto resta stabile su Grannus. Gli strumenti si lamentano di "segnale basso", che è corretto e poco utile.
        #GEPscience_bd_atm_BorvoInSpaceHigh_00 = Il supporto osserva un sole rosso fioco sopra una luna che non sa decidere se sia roccia o ghiaccio. Registri un lieve sfarfallio e ti chiedi quante pause snack separino Controllo Missione dal sentirne parlare.
        #GEPscience_bd_atm_DamonaInSpaceLow_00 = Il supporto del telescopio segue Grannus mentre la grande cicatrice di Damona scorre sotto di te. Nessun grande brillamento, solo un bagliore costante e vigile che fa sembrare il silenzio qualcosa di scientifico.
        #GEPscience_bd_atm_DamonaInSpaceHigh_00 = Damona si riduce a un puntino grigio e Grannus diventa l'unico "meteo" che valga la pena monitorare. Archivi il registro dei brillamenti come "per lo più calmo" e aggiungi "per ora".
        #GEPscience_bd_atm_EponaInSpaceLow_00 = Il supporto del telescopio cerca di calibrare per un sole rosso, fioco e ancora autoritario. Le letture dicono "stabile", e tu annoti "stabile, ma strano" a margine lo stesso.
        #GEPscience_bd_atm_EponaInSpaceHigh_00 = Epona ruota sotto con una linea giorno notte più morbida di quanto dovrebbe. Il supporto registra un piccolo evento di brillamento e tu lo etichetti "PER FAVORE INOLTRARE AL MONDO DI CASA, PRIMA O POI".
        #GEPscience_bd_atm_RosmertaInSpaceLow_00 = Il supporto segue Grannus attraverso la foschia del bordo di Rosmerta, la luce rossa fa sembrare ogni brillamento un lento braciere. Programmi esposizioni più lunghe e cerchi di non pensare a quanto "più tardi" continui a diventare più tardi quassù.
        #GEPscience_bd_atm_RosmertaInSpaceHigh_00 = Da molto sopra Rosmerta, Grannus è una brace solitaria in mezzo a tanto nero. Il registro dei brillamenti resta calmo, e annoti che "calmo" non è la stessa cosa di "sicuro", solo più silenzioso.
        #GEPscience_bd_atm_RAB-58EInSpaceLow_00 = Tenere un aggancio stabile vicino a RAB-58E richiede più impegno dell'osservazione vera e propria. Quando il supporto finalmente si assesta su Grannus, i dati arrivano deboli e ostinati, come se il sole cercasse di tenere dei segreti.
        #GEPscience_bd_atm_RAB-58EInSpaceHigh_00 = Quassù, RAB-58E è un'ombra bitorzoluta e Grannus è un puntino rosso fioco con carattere. Il supporto segnala un breve sfarfallio, tu etichetti il pacchetto "importante" e accetti che la risposta arriverà tra diversi giri di snack.
        #GEPscience_bd_atm_CernunnosInSpaceLow_00 = L'orizzonte scuro di Cernunnos fa sembrare ancora più innaturale il bagliore rosso di Grannus. Il supporto del telescopio registra una lieve attività di brillamenti e tu scrivi "lieve" con una calligrafia molto attenta.
        #GEPscience_bd_atm_CernunnosInSpaceHigh_00 = A questa quota, Cernunnos sembra piccolo e il sole rosso sembra più piccolo, eppure dirige comunque tutto lo spettacolo. Il supporto sorveglia eventuali improvvisi aumenti di luminosità e tu sorvegli il supporto, nel caso gli venissero idee.

        // bd_bioexp
        #GEPscience_bd_bioexp_GrannusFlyingLow_00 = All'interno dell'habitat schermato termicamente, le rane fluttuano in lenti giri confusi mentre i finestrini brillano di un rosso stanco.
        #GEPscience_bd_bioexp_GrannusFlyingLow_01 = Controllo Missione chiede un rapporto di stato, quando arriva la risposta, le rane hanno deciso che "su" è solo un suggerimento.
        #GEPscience_bd_bioexp_GrannusFlyingHigh_00 = La luce rossa fioca non cambia mai davvero, così le rane iniziano a gracidare seguendo un orario che capiscono solo loro.
        #GEPscience_bd_bioexp_GrannusFlyingHigh_01 = Le tacche della radiazione salgono, gli allarmi di temperatura salgono, e le rane restano professionalmente impassibili.
        #GEPscience_bd_bioexp_GrannusInSpaceLow_00 = In orbita bassa la stella riempie metà vista, le rane si schiacciano contro la parete della vasca come se cercassero di nascondersi dietro.
        #GEPscience_bd_bioexp_GrannusInSpaceLow_01 = La microgravità è facile da studiare quando i soggetti continuano a fare perfette, minuscole capriole.
        #GEPscience_bd_bioexp_GrannusInSpaceHigh_00 = Quassù la stella è più piccola e il silenzio più grande, le rane diventano molto quiete, e anche tu.
        #GEPscience_bd_bioexp_GrannusInSpaceHigh_01 = I dati suggeriscono che le risposte allo stress correlano fortemente con il ritardo nelle comunicazioni e debolmente con il tuo canto.
        #GEPscience_bd_bioexp_TaranisSrfLandedMagmaShores_00 = Le rane si aggrappano al lato in ombra della vasca mentre fuori il mondo tremola come una fornace al bordo del finestrino.
        #GEPscience_bd_bioexp_TaranisSrfLandedMagmaShores_00 = Il controllo dell'umidità lavora a pieno ritmo, le rane continuano a provare a "scavare" in qualunque cosa sembri più fresca dell'aria.
        #GEPscience_bd_bioexp_TaranisSrfLandedScorchedLowlands_00 = Le rane scuriscono la pelle sotto il bagliore rosso, come se cercassero di diventare un bersaglio più piccolo.
        #GEPscience_bd_bioexp_TaranisSrfLandedScorchedLowlands_01 = Ogni salto in bassa gravità è un atto di fede, per fortuna il pavimento dell'habitat ha pareti molto indulgenti.
        #GEPscience_bd_bioexp_TaranisSrfLandedMidlands_00 = Le rane si assestano in una routine cauta: mangiare, fluttuare, fissare il timer, ripetere.
        #GEPscience_bd_bioexp_TaranisSrfLandedMidlands_01 = Reagiscono più al brusco calo di luce al tramonto locale che a qualunque sollecitazione scientifica.
        #GEPscience_bd_bioexp_TaranisSrfLandedHighlands_00 = Anche sigillato, il gradiente di temperatura attraverso l'habitat si sente, le rane scelgono l'angolo "meno terribile" e lo dichiarano casa.
        #GEPscience_bd_bioexp_TaranisSrfLandedHighlands_01 = Le osservazioni mostrano cicli di attività ridotti, forse per i segnali giorno notte insoliti sotto un sole rosso.
        #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideMidlands_00 = Sul lato in ombra, l'unica luce diurna è il bagliore degli strumenti, le rane seguono la tua lampada frontale come se fosse l'intero cielo.
        #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideMidlands_01 = Con fuori solo roccia nera e rosso lontano, il ciclo di sonno delle rane diventa soprattutto sonnellini e giudizio.
        #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideHighlands_00 = Le rane restano basse e immobili, come se le ombre lunghe là fuori potessero entrare.
        #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideHighlands_01 = Gli sbalzi termici improvvisi fanno ciclare rapidamente il riscaldatore della vasca, le rane rispondono rifiutandosi di muoversi, a meno di una tangente in snack.
        #GEPscience_bd_bioexp_TaranisSrfLandedPoles_00 = Il riscaldatore dell'habitat tiene le rane a loro agio, ma la vista dal finestrino sembra aver dimenticato cosa significhi "mattina".
        #GEPscience_bd_bioexp_TaranisSrfLandedPoles_01 = I dati mostrano un aumento del comportamento di accalcamento, lo registri come "lavoro di squadra" per rendere il rapporto più gradevole.
        #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaSea_00 = Le rane insistono per restare nella vasca e presentano una lamentela formale sulla tua definizione di "mare".
        #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaSea_01 = I test di galleggiamento sono rimandati a tempo indeterminato, le rane sono contente della microgravità invece di qualunque cosa ci sia là fuori.
        #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaShores_00 = Tra onde luminose e cielo rosso, le rane non sanno in quale direzione allarmarsi.
        #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaShores_01 = I filtri del supporto vitale rilevano tracce strane, le rane reagiscono tentando di arrampicarsi in coro sulle pareti della vasca.
        #GEPscience_bd_bioexp_TaranisInSpaceLow_00 = L'orbita bassa passa alternando giorno rovente e notte profonda, le rane iniziano a reagire alle eclissi come a spaventi improvvisi.
        #GEPscience_bd_bioexp_TaranisInSpaceLow_01 = Le tue note dicono "comportamento anfibio in microgravità stabile" e poi, in scrittura più piccola, "per lo più".
        #GEPscience_bd_bioexp_TaranisInSpaceHigh_00 = L'orbita alta sembra una deriva sopra un cartello di avvertimento, le rane diventano più quiete ogni volta che il contatore di radiazioni gracchia.
        #GEPscience_bd_bioexp_TaranisInSpaceHigh_01 = Il lungo ritardo nelle comunicazioni rende perfino i check-in di routine simili a cartoline, le rane non firmano le loro.
        #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyLowlands_00 = L'aria sottile là fuori non attenua affatto la luce, le rane strizzano gli occhi nel bagliore rosso come se le avesse offese sul personale.
        #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyLowlands_01 = L'attività aumenta quando abbassi le luci della cabina, suggerendo che le rane preferiscano condizioni del tipo "non fissare una fornace".
        #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyHighlands_00 = In quota, l'habitat scricchiola piano mentre si stabilizza, le rane si fermano, ascoltano, poi riprendono a fluttuare come se non fosse successo nulla.
        #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyHighlands_01 = I loro movimenti diventano più deliberati, probabilmente in risposta a una gravità maggiore e a un orizzonte davvero poco collaborativo.
        #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalLowlands_00 = Qui l'illuminazione cambia in modo sottile mentre il pianeta ruota, le rane continuano ad adattarsi, senza convincersi mai del tutto che sia giorno.
        #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalLowlands_01 = I marcatori di stress calano quando fuori si vedono sia ombra sia bagliore rosso, come se il compromesso sembrasse più sicuro.
        #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalHighlands_00 = Le rane scelgono il lato della vasca rivolto verso il cielo più fioco e si rifiutano di spiegare la loro metodologia.
        #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalHighlands_01 = Raffiche periodiche fanno vibrare il lander, le rane rispondono gonfiando la gola in una minuscola dimostrazione di coraggio.
        #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideLowlands_00 = Sul lato oscuro, l'unica "alba" è un tenue bordo rosso, le rane smettono di gracidare e iniziano a fissare.
        #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideLowlands_01 = Il registro dell'esperimento annota un aumento dell'immobilità, il tuo registro personale annota un aumento dell'immaginazione.
        #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideHighlands_00 = Finestrini freddi e atmosfera sottile fanno sembrare l'habitat una scatoletta ben isolata, le rane si accalcano lo stesso.
        #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideHighlands_01 = Quando accendi le luci esterne, le rane provano subito a trattarle come una nuova luna.
        #GEPscience_bd_bioexp_ToutatisSrfLandedSoutheasternMountains_00 = Il terreno là fuori è così frastagliato da sembrare tagliente, le rane restano al sicuro, tonde e imperturbabili.
        #GEPscience_bd_bioexp_ToutatisSrfLandedSoutheasternMountains_01 = Le osservazioni mostrano meno salti e arrampicate più caute, come se perfino loro rispettassero i pendii.
        #GEPscience_bd_bioexp_ToutatisSrfLandedWesternMountains_00 = Il sole rosso resta basso e persistente in questa regione, allungando le ombre finché sembrano elementi del paesaggio.
        #GEPscience_bd_bioexp_ToutatisSrfLandedWesternMountains_01 = L'orario di alimentazione delle rane deriva seguendo i segnali di luce, Controllo Missione suggerisce di etichettarlo come "comportamento adattivo".
        #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideMountains_00 = Fuori c'è roccia nera contro cielo nero, le rane reagiscono diventando invece molto interessate alla tua checklist.
        #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideMountains_01 = Vibrazioni lievi da attrezzature in assestamento innescano un coro di minuscoli gracidi che riecheggiano in modo strano nella cabina.
        #GEPscience_bd_bioexp_ToutatisFlyingLow_00 = Nell'aria più bassa, la turbolenza picchietta la capsula come dita impazienti, le rane fluttuano, poi derivano, poi fanno finta che sia normale.
        #GEPscience_bd_bioexp_ToutatisFlyingLow_01 = Ogni volta che il cielo rosso si illumina, le rane si stringono alla parete della vasca, come a prepararsi a un'alba in ritardo.
        #GEPscience_bd_bioexp_ToutatisFlyingHigh_00 = Quassù l'atmosfera è appena una voce, le rane la gestiscono meglio delle tue antenne.
        #GEPscience_bd_bioexp_ToutatisFlyingHigh_01 = Lenti rollii del veicolo fanno ruotare dolcemente le rane, ottimi dati e leggermente nauseanti per l'osservatore.
        #GEPscience_bd_bioexp_ToutatisInSpaceLow_00 = L'orbita bassa mostra confini giorno notte netti, le rane reagiscono a ogni attraversamento del terminatore con battiti di palpebre sincronizzati.
        #GEPscience_bd_bioexp_ToutatisInSpaceLow_01 = La postura in microgravità si stabilizza dopo poche orbite, mentre il tuo senso del tempo resta bloccato a casa.
        #GEPscience_bd_bioexp_ToutatisInSpaceHigh_00 = L'orbita alta sembra osservare un mondo dall'altra parte di una stanza silenziosa, le rane diventano meno attive man mano che cresce il ritardo radio.
        #GEPscience_bd_bioexp_ToutatisInSpaceHigh_01 = I dati suggeriscono che le rane riescono a dormire quasi su qualunque cosa, inclusi i tuoi tentativi di incoraggiamento.
        #GEPscience_bd_bioexp_NodensSrfLandedShores_00 = L'aria della costa è pesante e tinta di rosso, le rane osservano le onde e decidono che restare nella vasca è un'ottima scelta di vita.
        #GEPscience_bd_bioexp_NodensSrfLandedShores_01 = I filtri registrano "aerosol salino presente". Le rane registrano "non impressionate", soprattutto fissandoti.
        #GEPscience_bd_bioexp_NodensSrfLandedTropicalLowlands_00 = Aria calda e umida e una luce diurna cremisi sconosciuta rendono le rane attive... finché non capiscono che la "notte" non sembra diversa.
        #GEPscience_bd_bioexp_NodensSrfLandedTropicalLowlands_01 = Il deumidificatore dell'habitat lavora a pieno ritmo, le rane trattano la condensa come un nuovo sport.
        #GEPscience_bd_bioexp_NodensSrfLandedTemperateLowlands_00 = Fuori sembra sempre tardo pomeriggio sotto una lampada rossa, le rane si adattano non facendo niente e giudicando in silenzio.
        #GEPscience_bd_bioexp_NodensSrfLandedTemperateLowlands_01 = I cicli di attività slittano un po' ogni giorno, Controllo Missione suggerisce che sia "adattamento", non "confusione".
        #GEPscience_bd_bioexp_NodensSrfLandedTropicalMidlands_00 = La pressione resta alta e il cielo resta strano, le rane continuano a gracidare verso il finestrino come se potesse rispondere.
        #GEPscience_bd_bioexp_NodensSrfLandedTropicalMidlands_01 = Un fronte temporalesco lontano fa sfarfallare le luci della cabina, le rane danno per scontato che tu l'abbia pianificato.
        #GEPscience_bd_bioexp_NodensSrfLandedTemperateMidlands_00 = L'aria sembra stabile, ma il lungo ritardo nelle comunicazioni rende i controlli di routine come inviare messaggi nel buio.
        #GEPscience_bd_bioexp_NodensSrfLandedTemperateMidlands_01 = Le rane mangiano secondo programma, poi fissano il timer come se le avesse tradite sul personale.
        #GEPscience_bd_bioexp_NodensSrfLandedHighlands_00 = Aria più fresca e pressione più bassa fanno ciclare i riscaldatori della vasca, le rane scelgono l'angolo più caldo e lo difendono con diplomazia.
        #GEPscience_bd_bioexp_NodensSrfLandedHighlands_01 = Fuori, il sole rosso resta basso e ostinato, dentro, le rane perfezionano lenti "salti in bassa gravità" contro il vetro.
        #GEPscience_bd_bioexp_NodensSrfLandedTundra_00 = Il gelo risale lungo i pannelli esterni, le rane rispondono formando un minuscolo mucchietto e chiamandolo "ricerca".
        #GEPscience_bd_bioexp_NodensSrfLandedTundra_01 = L'habitat è accogliente, il mondo no, i marcatori di stress salgono quando il vento scuote il lander e poi si rifiuta di smettere.
