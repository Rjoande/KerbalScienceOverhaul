@EXPERIMENT_DEFINITION:HAS[#id[bd_microwaveSpec]]
{
    %RESULTS
    {
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_00 // The crew keeps asking where you put the “popcorn” experiment. You explain, again, that this microwave is for astronomy.
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_01 // The instrument manual explicitly says “DO NOT HEAT FOOD.” Someone has underlined it and added “COWARD.”
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_02 // You detect strong emissions at the expected frequencies. Mission Control asks if that means dinner is ready.
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_03 // You spend an hour eliminating interference before realizing someone is actually trying to warm a snack near the antenna.
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_04 // The data looks great until a sharp spike appears at “lunchtime.” You file it under “operator error.”
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_05 // The experiment is called microwave spectroscopy. The crew insists that means it should at least make tea.
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_06 // You announce a successful calibration. The engineer asks if “calibration” is the setting for frozen meals or for soup.
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_07 // You rotate the dish for a cleaner signal. Someone rotates the plate in the galley and claims they’re “helping with the science.”
        InSpaceLow* = #JNSQscience_bd_microwaveSpec_default_OvenGag_08 // You confirm the instrument is working. The disappointment in the room is immediate and unanimous: still no hot pizza.

        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthPolarZone_00 // The polar zone returns a steady, blindingly bright signature. You briefly consider adding an “OFF” button.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthSubpolarZone_00 // Subpolar readings flutter with fine-grained noise, like the Sun is quietly crackling to itself.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthTemperateZone_00 // The temperate band shows a smooth baseline with occasional sharp bursts that do not wish to be graphed.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthTropicZone_00 // The tropic zone produces strong, rhythmic spikes. The instrument insists it’s “totally normal.”
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowEquatorialZone_00 // The equatorial belt is loud and busy, with broad features that look like the Sun is stirring its own surface.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthTropicZone_00 // Southern tropics echo the northern pattern, but with different timing—like two halves arguing politely.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthTemperateZone_00 // Temperate readings settle down into a clean curve until a sudden flare scribbles across the data.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthSubpolarZone_00 // Subpolar returns wobble between calm and chaos, as if the Sun can’t decide what mood it’s in.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthPolarZone_00 // The south pole band stays intensely bright and unnervingly consistent. Mission Control requests you stop staring at it.

        MohoInSpaceLowPoles* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowPoles_00 // The poles reflect a crisp, cold signature that hints at brighter material hiding in the darkest pockets.
        MohoInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowLowlands_00 // The lowlands come back dark and dense in microwaves—baked ground packed tight by relentless heat.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowPolarIceCraters_00 // Polar Ice Craters spike brightly, suggesting something unusually reflective tucked under the shadowed rims.
        MohoInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowHighlands_00 // Highlands scatter strongly and unevenly; the surface looks rough enough to sandpaper an antenna.
        MohoInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowMidlands_00 // Midlands returns show layered texture, as if dust is draped thinly over harder, hotter rock.
        MohoInSpaceLowCraters* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowCraters_00 // Crater rims draw bright rings in the map; fresh ejecta is loud, proud, and pointy.
        MohoInSpaceLowExoticCraters* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowExoticCraters_00 // Exotic Craters give odd dielectric ratios—either glassy melt, or Moho is playing tricks again.
        MohoInSpaceLowRareCraters* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowRareCraters_00 // Rare Craters punch out sharp echoes from blocky debris fields that refuse to look “settled.”
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowVoronoiCraters_00 // The Voronoi pattern repeats perfectly in the microwave data, like the planet is showing off its geometry.
        MohoInSpaceLowNotableCraters* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowNotableCraters_00 // Notable Craters each produce a distinct fingerprint, as if Moho keeps a curated collection of dents.
        MohoInSpaceLowPeaks* = #JNSQscience_bd_microwaveSpec_MohoInSpaceLowPeaks_00 // The peaks throw needle-like reflections that clip the scale. The instrument files a complaint about mountains.

        EveInSpaceLowPoles* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowPoles_00 // The microwaves cut through the haze and find bright, cold caps that look oddly smooth.
        EveInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowLowlands_00 // The lowlands soak up the signal like a damp sponge; the dielectric numbers climb.
        EveInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowMidlands_00 // Mixed terrain gives a mottled response, like someone spilled different powders and called it geology.
        EveInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowHighlands_00 // Highlands scatter hard and sharp; the surface is rough, rocky, and proud of it.
        EveInSpaceLowPeaks* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowPeaks_00 // Peaks ping the detector with crisp spikes—tiny mountains yelling “I’m up here!”
        EveInSpaceLowExplodiumSea* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowExplodiumSea_00 // The sea reflects like liquid… then absorbs like trouble. Mission Control suggests “no sampling.”
        EveInSpaceLowMountains* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowMountains_00 // Slopes twist polarization until the math gives up and simply outputs “steep.”
        EveInSpaceLowShores* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowShores_00 // Shorelines draw bright fringes where wet meets dry; the border is clearer than any map.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowPolarLakes_00 // The polar lakes show smooth, bright patches beneath the clouds, like polished mirrors with cold edges.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowPetrolLakes_00 // Petrol lakes return a darker, oilier signature; the instrument smells it, somehow.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofAkron_00 // The Sea of Akron shows layered returns, as if different liquids are refusing to mix on principle.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofNessus_00 // Nessus gives a rolling, noisy reflection; whatever is down there has waves and attitude.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofTaniwha_00 // Taniwha’s surface looks thick; the backscatter suggests a syrupy film over deeper liquid.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofGigan_00 // Gigan’s returns are bright and steady, like a calm pool daring you to believe it’s safe.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofRodan_00 // Rodan shows streaky, wind-driven roughness; the sea is being sandblasted by the sky.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofGojira_00 // Gojira’s signature is oddly warm in microwaves, hinting at slow churn beneath the surface.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofGhidorah_00 // Ghidorah splits the beam into strange polarizations, like three different surfaces at once.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowSeaofBagorah_00 // Bagorah’s echo comes back late and smeared—either it’s deep, or it’s mocking the rangefinder.
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_microwaveSpec_EveInSpaceLowKrakensWell_00 // Over Kraken’s Well the return drops into a dark hole, then spikes at the rim. You pretend not to notice.

        GillyInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_GillyInSpaceLowLowlands_00 // The microwaves mostly miss; the lowlands are so porous the signal falls in and doesn’t come back.
        GillyInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_GillyInSpaceLowMidlands_00 // A weak, dusty return suggests loose rubble over emptier rubble. Scientific conclusion: “crumbly.”
        GillyInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_GillyInSpaceLowHighlands_00 // Highlands give occasional sharp pings from exposed boulders, like teeth in a floating dirtball.

        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowIceCaps_00 // The returns spike over the Ice Caps; it is basically a frozen microwave mirror.
        KerbinInSpaceLowMountains* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowMountains_00 // Backscatter jitters wildly over the Mountains. Pointy terrain is apparently very measurable.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowMidlands_00 // The Midlands show patchy brightness changes that track damp ground and drying ground in a tidy pattern.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowLowlands_00 // The Lowlands come back suspiciously “wet” in the microwave band. The planet looks like a sponge.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowAridLowlands_00 // The Arid Lowlands give a crisp, dry signature with very little hint of moisture.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowAridMidlands_00 // Arid Midlands returns are steady and dull—dry grains and dust with only occasional rocky spikes.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowAridHighlands_00 // The Arid Highlands look rockier and drier than expected; the signal hints at exposed bedrock and dusty hollows.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowAridMountains_00 // Over the Arid Mountains the instrument stops pretending it understands slopes and just reports “chaos.”
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowGreatLake_00 // A smooth, bright patch marks the Great Lake until wind roughens it and the signal scatters into ripples.
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowInlandWater_00 // Inland Water shows clean, stable reflections—until the shoreline adds a messy fringe of mixed returns.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowKreenwichSea_00 // The Kreenwich Sea shows strong polarization shifts, suggesting briny water and lively surface chop.
        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowArcticSea_00 // The Arctic Sea alternates bright and dark bands, as if open water and thin ice are taking turns.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowForemansSea_00 // Foremans Sea returns jump with wave roughness; the instrument can practically “feel” the wind from orbit.
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowTriangulusSea_00 // Triangulus Sea draws a sharp boundary in the data—coastlines are surprisingly loud in microwaves.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowNorthernSea_00 // The Northern Sea reads cold and restless, with scattered patches that look like floating ice and foam.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowSub-ArcticSea_00 // Sub-Arctic Sea shows mixed returns: damp air, cold water, and suspiciously reflective flecks of ice.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowEasternSea_00 // Eastern Sea brightness varies with weather; apparently the ocean refuses to sit still for science.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowWesternSea_00 // Western Sea reflections smear into a broad haze—either heavy swells, or someone fingerprinted the antenna.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_microwaveSpec_KerbinInSpaceLowWelcomeBackIsland_00 // Welcome Back Island stands out as a dry “blip” in a sea of wet signal. Someone labels it on the map in permanent marker.

        MunInSpaceLowPoles* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowPoles_00 // The poles return a clean, cold signature with very little noise—just dust, chill, and stubborn silence.
        MunInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowHighlands_00 // Highland terrain scatters the beam into a rough, grainy pattern consistent with chunky regolith.
        MunInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowMidlands_00 // The Midlands read as fine powder over denser layers, with subtle changes along the mare-like patches.
        MunInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowLowlands_00 // Lowlands show smoother returns, as if impacts have been ground down and packed tight over time.
        MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowPolarIceCraters_00 // Polar Ice Craters show an unusually bright subsurface response, hinting at something more reflective than dust.
        MunInSpaceLowExoticCraters* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowExoticCraters_00 // Exotic Craters give odd dielectric readings—possibly glassy melt, possibly just the Mun being dramatic.
        MunInSpaceLowRareCraters* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowRareCraters_00 // Rare Craters scatter strongly, suggesting blocky ejecta and boulder fields hiding in the shadows.
        MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowVoronoiCraters_00 // Voronoi Craters repeat their pattern even in microwaves. Geometry is apparently universal.
        MunInSpaceLowNotableCraters* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowNotableCraters_00 // Notable Craters each have a distinct “fingerprint” in the return, as if they are competing for attention.
        MunInSpaceLowMountains* = #JNSQscience_bd_microwaveSpec_MunInSpaceLowMountains_00 // Mountain ridges twist the polarization response. The Mun is doing advanced math with rocks again.

        MinmusInSpaceLowPoles* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowPoles_00 // The poles shine brightly in microwaves, consistent with frosty surfaces and very low heat.
        MinmusInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowLowlands_00 // Lowlands show strong, consistent reflection—icy ground with only small pockets of dusty contamination.
        MinmusInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowMidlands_00 // Midlands returns vary gently, as if thin layers of different salts are stacked like a science sandwich.
        MinmusInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowHighlands_00 // Highlands scatter more than expected; the surface looks rougher and less uniform up there.
        MinmusInSpaceLowBasins* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowBasins_00 // Basins come back smooth and bright, like polished ice flats that were never informed about traction.
        MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowBrownBasins_00 // Brown Basins absorb more and reflect less; whatever stained them still shows up from orbit.
        MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowBrownLowlands_00 // Brown Lowlands read drier and darker than their neighbors, with a dustier, less icy signature.
        MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowBrownMidlands_00 // Brown Midlands show mixed returns—icy base, dusty top, and a strong urge to confuse analysts.
        MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowBrownHighlands_00 // Brown Highlands scatter weakly and unevenly, hinting at gritty slopes over harder frozen ground.
        MinmusInSpaceLowMountains* = #JNSQscience_bd_microwaveSpec_MinmusInSpaceLowMountains_00 // The mountains return a noisy, spiky scatter pattern. The instrument reports the official unit of “crunch.”

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowIceCaps_00 // The ice caps flash back bright, cold echoes—something reflective is hiding just under that rusty frosting.
        DunaInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowHighlands_00 // The highlands scatter the beam into a gritty roar; sharp rocks under thin dust, as advertised.
        DunaInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowMidlands_00 // The midlands show layered returns, like dust draped over harder ground in neat, repeatable sheets.
        DunaInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowLowlands_00 // The lowlands come back smoother and darker—fine powder packed tight by ages of quiet impacts.
        DunaInSpaceLowCraters* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowCraters_00 // Craters punch bright rings into the map; ejecta blankets have a very loud microwave opinion.
        DunaInSpaceLowRareCraters* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowRareCraters_00 // Rare craters spike the signal with blocky echoes, as if someone spilled boulders and left.
        DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowVoronoiCraters_00 // The voronoi pattern repeats so cleanly the instrument requests a second pass “to prove it’s real.”
        DunaInSpaceLowNotableCraters* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowNotableCraters_00 // Each notable crater has its own dielectric fingerprint, like the planet keeps a catalog of dents.
        DunaInSpaceLowExoticCraters* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowExoticCraters_00 // Exotic craters read strangely glassy—microwaves skim, bounce, and come back confused.
        DunaInSpaceLowTrenches* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowTrenches_00 // The trenches swallow the beam and return a cold, smeared echo, hinting at steep walls and shadowed fines.
        DunaInSpaceLowNotablePlains* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowNotablePlains_00 // The plains look deceptively uniform until the data reveals subtle patches of harder, denser material underneath.
        DunaInSpaceLowNotableMountains* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowNotableMountains_00 // Notable mountains throw sharp, needle-like reflections; the slopes are basically microwave knives.
        DunaInSpaceLowMountains* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowMountains_00 // Mountain terrain twists polarization into knots; the math outputs “steep” with great confidence.
        DunaInSpaceLowVolcano* = #JNSQscience_bd_microwaveSpec_DunaInSpaceLowVolcano_00 // The volcano region runs warmer in the microwave map, as if the planet remembers being alive down there.

        IkeInSpaceLowPoles* = #JNSQscience_bd_microwaveSpec_IkeInSpaceLowPoles_00 // The poles return a clean, bright chill—fine dust over something slightly more reflective than the rest.
        IkeInSpaceLowMountains* = #JNSQscience_bd_microwaveSpec_IkeInSpaceLowMountains_00 // Jagged ridges kick back strong scatter; Ike’s mountains are just rubble with ambition.
        IkeInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_IkeInSpaceLowMidlands_00 // The midlands give a soft, dusty response, like the surface is padded for gentle landings and harsh reality.
        IkeInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_IkeInSpaceLowLowlands_00 // Lowlands read smoother and more compact, as if gravity has been slowly ironing the regolith flat.
        IkeInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_IkeInSpaceLowHighlands_00 // Highlands alternate between dull dust and boulder spikes, a patchwork of “crumbly” and “ow.”

        EdnaInSpaceHigh* = #JNSQscience_bd_microwaveSpec_EdnaInSpaceHigh_00 // From up here Edna is mostly “dark rock.” The instrument averages longer and still gets a cold, faint echo.
        EdnaInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_EdnaInSpaceLowLowlands_00 // The lowlands drink microwaves like ink. Whatever the surface is, it is not interested in reflecting.
        EdnaInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_EdnaInSpaceLowMidlands_00 // The midlands return a mottled pattern, like mixed rubble sprinkled with brighter grains.
        EdnaInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_EdnaInSpaceLowHighlands_00 // Highlands scatter sharply in spiky bursts—blocky terrain and rough regolith doing their best to be loud.
        EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_microwaveSpec_EdnaInSpaceLowPolarIceCraters_00 // Shadowed polar craters flash back bright and clean. Something under that dust is suspiciously reflective.
        EdnaInSpaceLowWhites* = #JNSQscience_bd_microwaveSpec_EdnaInSpaceLowWhites_00 // The “Whites” show broad bright patches with a crisp dielectric signature—frosty deposits or pale salts, pick your favorite.

        DakInSpaceHigh* = #JNSQscience_bd_microwaveSpec_DakInSpaceHigh_00 // Even from high orbit, Dak looks like a lumpy snack. The data is mostly “potato,” with occasional crunchy spikes.
        DakInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_DakInSpaceLowLowlands_00 // Lowlands come back smoother and darker, as if loose dust has settled into every convenient dent.
        DakInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_DakInSpaceLowMidlands_00 // Midlands show a patchwork of weak and strong returns—like the surface can’t decide if it’s dust, rock, or both.
        DakInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_DakInSpaceLowHighlands_00 // Highlands ping with sharp echoes from exposed boulders. The potato has teeth.

        DresInSpaceLowPoles* = #JNSQscience_bd_microwaveSpec_DresInSpaceLowPoles_00 // The poles return a bright, cold signature that stands out from the rest of Dres’ pale, quiet surface.
        DresInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_DresInSpaceLowHighlands_00 // Highlands scatter strongly and unevenly—rough ground with chunky regolith and plenty of sharp edges.
        DresInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_DresInSpaceLowMidlands_00 // Midlands produce layered returns, hinting at fine dust draped over denser material in thin sheets.
        DresInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_DresInSpaceLowLowlands_00 // Lowlands look smoother and more compact, with a darker microwave response like tightly packed powder.
        DresInSpaceLowCanyon* = #JNSQscience_bd_microwaveSpec_DresInSpaceLowCanyon_00 // The canyon distorts the return into smeared echoes and bright rims—steep walls and shadowed fines playing with the beam.

        JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_microwaveSpec_JoolInSpaceLowEquatorialBands_00 // The equatorial bands bounce back strong, smooth echoes—thick cloud tops with lots of “wet” chemistry.
        JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_microwaveSpec_JoolInSpaceLowSubpolarBands_00 // The subpolar bands look grainier in the return, as if the cloud deck is breaking into rougher layers.
        JoolInSpaceLowNorthPole* = #JNSQscience_bd_microwaveSpec_JoolInSpaceLowNorthPole_00 // The north pole reads cold and comparatively dim, with a signature that suggests thinner, drier upper haze.
        JoolInSpaceLowSouthPole* = #JNSQscience_bd_microwaveSpec_JoolInSpaceLowSouthPole_00 // The south pole scatters the beam unevenly—cold air, turbulent clouds, and no interest in behaving.
        JoolInSpaceLowStormComplex* = #JNSQscience_bd_microwaveSpec_JoolInSpaceLowStormComplex_00 // The storm complex lights up with chaotic reflections; the instrument can practically hear the turbulence.
        JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_microwaveSpec_JoolInSpaceLowExposedLowerDeck_00 // Over the exposed lower deck the return deepens and brightens, hinting at denser clouds underneath.

        LaytheInSpaceLowShores* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowShores_00 // The shoreline draws a sharp microwave fringe where wet meets dry, making a better map than the map.
        LaytheInSpaceLowShallows* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowShallows_00 // Shallows show mottled brightness—sandbars, stirred sediment, and water thin enough to argue with land.
        LaytheInSpaceLowInlandWater* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowInlandWater_00 // Inland water returns are smooth and stable, until wind roughens them into noisy scatter.
        LaytheInSpaceLowKrenwichSea* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowKrenwichSea_00 // Krenwich Sea reads salty and lively, with polarization shifts that track changing wave chop.
        LaytheInSpaceLowArcticSea* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowArcticSea_00 // The Arctic Sea alternates bright and dark patches, like thin ice and open water taking turns.
        LaytheInSpaceLowJoolwardSea* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowJoolwardSea_00 // Joolward Sea shows strong roughness signatures—big swells and weather that never sits still.
        LaytheInSpaceLowPolwardSea* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowPolwardSea_00 // Polward Sea looks colder and smoother, with bright spots that suggest drifting ice or slush sheets.
        LaytheInSpaceLowLowlands* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowLowlands_00 // Lowlands come back “wet” in the dielectric data—damp ground or buried ice close to the surface.
        LaytheInSpaceLowMidlands* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowMidlands_00 // Midlands show layered returns, like thin dry crust over a more conductive, wetter substrate.
        LaytheInSpaceLowHighlands* = #JNSQscience_bd_microwaveSpec_LaytheInSpaceLowHighlands_00 // Highlands scatter sharply and irregularly, suggesting rough rock with only patchy frost.
