@EXPERIMENT_DEFINITION:HAS[#id[bd_ionElec]]
{
    %RESULTS
    {
        EdnaInSpaceLow* = #JNSQscience_bd_ionElec_EdnaInSpaceLow_00 // The sensor finds a thin haze of charged dust clinging to Edna’s sunlit side like static on a sweater.
		EdnaInSpaceLow* = #JNSQscience_bd_ionElec_EdnaInSpaceLow_01 // Most of the “atmospheric” ionization seems to be coming from your own spacecraft. Mission Control suggests you stop shuffling your feet.
		EdnaInSpaceHigh* = #JNSQscience_bd_ionElec_EdnaInSpaceHigh_00 // Only a faint trickle of ions drifts past the instrument; Edna isn’t doing much besides quietly getting sandblasted by the solar wind.
		EdnaInSpaceHigh* = #JNSQscience_bd_ionElec_EdnaInSpaceHigh_01 // The charge buildup is slow, steady, and slightly unsettling—like Edna is patiently waiting for the next spark that never comes.

		DakInSpaceLow* = #JNSQscience_bd_ionElec_DakInSpaceLow_00 // Dak’s lumpy shape makes charge pockets that spike and drop as you pass overhead, as if the potato has strong opinions about electrons.
		DakInSpaceLow* = #JNSQscience_bd_ionElec_DakInSpaceLow_01 // A sharp burst of static appears near the terminator. Sunlit dust and shadowed dust are apparently not on speaking terms.
		DakInSpaceHigh* = #JNSQscience_bd_ionElec_DakInSpaceHigh_00 // Up here it’s mostly plain solar wind readings, with Dak barely registering as anything more than a speed bump for ions.
		DakInSpaceHigh* = #JNSQscience_bd_ionElec_DakInSpaceHigh_01 // Periodic blips match Dak’s rotation—tiny, stubborn discharges from a rock that refuses to be electrically boring.

        LindorFlyingHigh* = #JNSQscience_bd_ionElec_LindorFlyingHigh_00 // The upper haze crackles with charge separation; your antenna starts acting like a lightning detector.
		LindorFlyingHigh* = #JNSQscience_bd_ionElec_LindorFlyingHigh_01 // Ionized layers come and go in bands, as if the atmosphere has its own striped wiring diagram.
		LindorInSpaceLow* = #JNSQscience_bd_ionElec_LindorInSpaceLow_00 // The instrument lights up with trapped particles; Lindor’s field is stocking the shelves with ions.
		LindorInSpaceLow* = #JNSQscience_bd_ionElec_LindorInSpaceLow_01 // Sharp spikes line up with the bright curtains below—someone down there is running a very large arc lamp.
		LindorInSpaceHigh* = #JNSQscience_bd_ionElec_LindorInSpaceHigh_00 // A broad, restless plasma halo surrounds Lindor, bending the solar wind like a stream around a boulder.
		LindorInSpaceHigh* = #JNSQscience_bd_ionElec_LindorInSpaceHigh_01 // Even out here, the readings wobble in rhythm with the planet’s rotation—its magnetism doesn’t do subtle.

		KrelInSpaceLow* = #JNSQscience_bd_ionElec_KrelInSpaceLow_00 // No atmosphere, no ionosphere—just stubbornly charged dust hopping between sunlit and shadowed ground.
		KrelInSpaceLow* = #JNSQscience_bd_ionElec_KrelInSpaceLow_01 // The sensor catches brief electric pops as you pass overhead, like Krel is quietly discharging static at you.
		KrelInSpaceHigh* = #JNSQscience_bd_ionElec_KrelInSpaceHigh_00 // Mostly background solar wind, with a few faint blips that could be dust or your own spacecraft complaining.
		KrelInSpaceHigh* = #JNSQscience_bd_ionElec_KrelInSpaceHigh_01 // Krel contributes almost nothing to the particle soup. It’s impressively unhelpful in the most scientific way.

		AdenInSpaceLow* = #JNSQscience_bd_ionElec_AdenInSpaceLow_00 // The detector reports a thin smear of charge near the surface—dust grains are rubbing together somewhere down there.
		AdenInSpaceLow* = #JNSQscience_bd_ionElec_AdenInSpaceLow_01 // Each pass over the terminator brings a little “snap” in the data, as if nightfall flips a planetary light switch.
		AdenInSpaceHigh* = #JNSQscience_bd_ionElec_AdenInSpaceHigh_00 // The readings settle into a quiet baseline; Aden is too small to hold on to much of anything, even electrons.
		AdenInSpaceHigh* = #JNSQscience_bd_ionElec_AdenInSpaceHigh_01 // Particle counts drift with your attitude changes. Mission Control suggests you stop “testing” the sensor by turning.

		HuygenFlyingHigh* = #JNSQscience_bd_ionElec_HuygenFlyingHigh_00 // The haze holds charge like a blanket; everything you deploy wants to cling, tangle, and spark.
		HuygenFlyingHigh* = #JNSQscience_bd_ionElec_HuygenFlyingHigh_01 // Ionization peaks in a high, cold layer—an invisible ceiling where particles pile up and refuse to behave.
		HuygenInSpaceLow* = #JNSQscience_bd_ionElec_HuygenInSpaceLow_00 // A dense ionosphere wraps the moon; the numbers jump as if you’re skimming the edge of a charged fog.
		HuygenInSpaceLow* = #JNSQscience_bd_ionElec_HuygenInSpaceLow_01 // The nightside shows strange, steady currents—something in the upper atmosphere is quietly running the show.
		HuygenInSpaceHigh* = #JNSQscience_bd_ionElec_HuygenInSpaceHigh_00 // A faint tail of charged particles trails behind, slowly combed away by the solar wind.
		HuygenInSpaceHigh* = #JNSQscience_bd_ionElec_HuygenInSpaceHigh_01 // The data hints at complex chemistry aloft: fewer ions than expected, but far more variety.

		RigaFlyingHigh* = #JNSQscience_bd_ionElec_RigaFlyingHigh_00 // The “atmosphere” is barely there; the sensor mostly records dust static and disappointment.
		RigaFlyingHigh* = #JNSQscience_bd_ionElec_RigaFlyingHigh_01 // A thin nitrogen veil produces a weak, patchy ion layer that fades the moment conditions change.
		RigaInSpaceLow* = #JNSQscience_bd_ionElec_RigaInSpaceLow_00 // The charged particles are quickly swept off into space, leaving only a fragile glow around the limb.
		RigaInSpaceLow* = #JNSQscience_bd_ionElec_RigaInSpaceLow_01 // Passing over the sunlit side produces tiny spikes—exosphere ions getting kicked loose and carried away.
		RigaInSpaceHigh* = #JNSQscience_bd_ionElec_RigaInSpaceHigh_00 // Riga is almost invisible to the instrument at this distance; you’re measuring space more than moon.
		RigaInSpaceHigh* = #JNSQscience_bd_ionElec_RigaInSpaceHigh_01 // Occasional blips appear, but they don’t correlate with Riga—likely just the local particle weather.

		TalosInSpaceLow* = #JNSQscience_bd_ionElec_TalosInSpaceLow_00 // With no air to ionize, Talos makes do with charged regolith and abrupt surface potentials.
		TalosInSpaceLow* = #JNSQscience_bd_ionElec_TalosInSpaceLow_01 // The instrument finds localized “hot spots” of static—colorful ground, colorful electrical personality.
		TalosInSpaceHigh* = #JNSQscience_bd_ionElec_TalosInSpaceHigh_00 // Background particle counts stay steady; Talos refuses to add anything except a target to orbit.
		TalosInSpaceHigh* = #JNSQscience_bd_ionElec_TalosInSpaceHigh_01 // The only clear signal is the one from your own craft. Talos remains electrically unimpressed.

        CelesInSpaceLow* = #JNSQscience_bd_ionElec_CelesInSpaceLow_00 // Sunlight charges Celes’ pale surface quickly; the detector watches electrons boil off and drift away.
		CelesInSpaceLow* = #JNSQscience_bd_ionElec_CelesInSpaceLow_01 // Passing into shadow, the readings flip and settle. Celes seems to “cool down” electrically as fast as it warms.
		CelesInSpaceHigh* = #JNSQscience_bd_ionElec_CelesInSpaceHigh_00 // It’s mostly quiet solar wind out here, with a faint wobble that hints at Celes’ tiny plasma wake.
		CelesInSpaceHigh* = #JNSQscience_bd_ionElec_CelesInSpaceHigh_01 // The instrument confirms Celes has no real grip on ions—just a brief, polite disturbance in the particle flow.

		TamInSpaceLow* = #JNSQscience_bd_ionElec_TamInSpaceLow_00 // The sensor catches sharp static spikes as you skim past Tam’s tumbling surface—dust grains are doing their own tiny lightning.
		TamInSpaceLow* = #JNSQscience_bd_ionElec_TamInSpaceLow_01 // Local charge pockets appear and vanish with terrain. Tam is electrically chaotic in the most unhelpful way.
		TamInSpaceHigh* = #JNSQscience_bd_ionElec_TamInSpaceHigh_00 // The particle counts smooth out until Tam rotates just right, then you get a brief blip like a shrug from a rock.
		TamInSpaceHigh* = #JNSQscience_bd_ionElec_TamInSpaceHigh_01 // You detect more “space weather” than “Tam weather,” but the moon still manages to add a little noise to the void.

		HamekInSpaceLow* = #JNSQscience_bd_ionElec_HamekInSpaceLow_00 // The detector pegs with stubborn surface charging; Hamek’s oddly colored dust seems eager to steal electrons and keep them.
		HamekInSpaceLow* = #JNSQscience_bd_ionElec_HamekInSpaceLow_01 // Near the terminator, the readings chatter like a bad radio. Shadowed ground and sunlit ground do not agree on voltage.
		HamekInSpaceHigh* = #JNSQscience_bd_ionElec_HamekInSpaceHigh_00 // A faint, diffuse tail of ions trails behind Hamek, slowly combed away into interplanetary space.
		HamekInSpaceHigh* = #JNSQscience_bd_ionElec_HamekInSpaceHigh_01 // The background plasma looks normal—until periodic spikes suggest charged grains escaping from Hamek’s surface in tiny bursts.

        NaraFlyingHigh* = #JNSQscience_bd_ionElec_NaraFlyingHigh_00 // The upper haze carries charge in slow, heavy sheets; your antennas start acting like reluctant lightning rods.
		NaraFlyingHigh* = #JNSQscience_bd_ionElec_NaraFlyingHigh_01 // Ionization is faint but persistent, like the atmosphere is quietly humming to itself in the dark.
		NaraInSpaceLow* = #JNSQscience_bd_ionElec_NaraInSpaceLow_00 // A broad ionosphere wraps Nara; even weak sunlight and cosmic rays can’t help but make it glow electrically.
		NaraInSpaceLow* = #JNSQscience_bd_ionElec_NaraInSpaceLow_01 // The readings surge over the poles—Nara’s field seems to be hoarding charged particles where it can.
		NaraInSpaceHigh* = #JNSQscience_bd_ionElec_NaraInSpaceHigh_00 // The solar wind out here is thin, but Nara still carves a clear wake in it, like a ship pushing through fog.
		NaraInSpaceHigh* = #JNSQscience_bd_ionElec_NaraInSpaceHigh_01 // Long, slow oscillations in the data hint at a magnetosphere that refuses to sit still.

		AmosInSpaceLow* = #JNSQscience_bd_ionElec_AmosInSpaceLow_00 // With no air to ionize, the instrument settles for static dust and surface charging as Amos rolls beneath you.
		AmosInSpaceLow* = #JNSQscience_bd_ionElec_AmosInSpaceLow_01 // Brief spikes line up with sunrise—apparently “morning” is when the regolith starts stealing electrons again.
		AmosInSpaceHigh* = #JNSQscience_bd_ionElec_AmosInSpaceHigh_00 // Mostly background particles, with occasional blips that feel more like Nara’s influence than Amos’.
		AmosInSpaceHigh* = #JNSQscience_bd_ionElec_AmosInSpaceHigh_01 // The sensor reports a faint plasma wake behind Amos—just enough to prove it exists in the stream.

		EnonInSpaceLow* = #JNSQscience_bd_ionElec_EnonInSpaceLow_00 // The detector catches patchy charge pockets near the surface, as if Enon’s dust is playing keep-away with electrons.
		EnonInSpaceLow* = #JNSQscience_bd_ionElec_EnonInSpaceLow_01 // Passing into shadow, the readings flip polarity and calm down. Nighttime is apparently “static-safe mode.”
		EnonInSpaceHigh* = #JNSQscience_bd_ionElec_EnonInSpaceHigh_00 // Particle counts smooth out until a weak pulse arrives—likely a passing gust from Nara’s environment.
		EnonInSpaceHigh* = #JNSQscience_bd_ionElec_EnonInSpaceHigh_01 // Enon barely disturbs the flow at this altitude; it’s a very small obstacle in a very big nothing.
		PraxInSpaceLow* = #JNSQscience_bd_ionElec_PraxInSpaceLow_00 // Surface charging is strong enough to register from orbit; Prax’s dust behaves like it was designed to cling to everything.
		PraxInSpaceLow* = #JNSQscience_bd_ionElec_PraxInSpaceLow_01 // The terminator region crackles in the data—sunlit ground and shadowed ground disagree violently about voltage.
		PraxInSpaceHigh* = #JNSQscience_bd_ionElec_PraxInSpaceHigh_00 // The instrument records the particle weather more than Prax, but Prax still leaves a thin, detectable wake.
		PraxInSpaceHigh* = #JNSQscience_bd_ionElec_PraxInSpaceHigh_01 // Occasional spikes suggest charged grains escaping in tiny bursts, then being swept away without ceremony.
    }
}