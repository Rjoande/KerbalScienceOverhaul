@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS
    {
		GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthPolarZone_00 // Grannus fills the band with a harsh polar hiss that comes and goes like a slow-breathing beast. At this distance, “quiet” is just a different kind of noise.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthSubpolarZone_00 // The receiver catches crackling bursts that look almost patterned, until they smear into red-sun static again. You label it “probably natural” and still save three backups.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthTemperateZone_00 // A broad, low rumble dominates the spectrum, with tiny ripples riding on top like nervous handwriting. Mission Control will see it after the light-time says they can.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowNorthTropicZone_00 // Brief spikes punch through the background, as if something below keeps trying to clear its throat. The instrument politely declines to explain what it means.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowEquatorialZone_00 // The equatorial region is loud in a steady, grinding way, like a transmitter that never learned how to turn off. You begin to miss ordinary silence.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthTropicZone_00 // A faint, repeating chirp appears for a few seconds, then vanishes behind the stellar roar. You mark the timestamp and hope the clock is right.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthTemperateZone_00 // The spectrum looks “busy” without being “useful,” which is apparently a valid scientific outcome. At least it keeps you company.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthSubpolarZone_00 // There’s a wavering tone that drifts up and down like it’s searching for a channel. You check your own antenna twice, just in case.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_SIGINT_GrannusInSpaceLowSouthPolarZone_00 // The polar band is a cold whistle buried inside hot noise, somehow making both feel worse. You swear the static sounds judgmental out here.
        GrannusInSpaceHigh* = #GEPscience_bd_SIGINT_GrannusInSpaceHigh_00 // From high orbit the star’s emissions flatten into a steady wash, and the universe beyond peeks through in faint speckles. The only “message” is how far from home you are.

        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_SIGINT_TaranisInSpaceLowMagmaSea_00 // Over the Magma Sea, the receiver saturates with sharp pops and broadband crackle, like the planet is frying the air it doesn’t have. You log it as “energetic” and keep your fingers off the hot keys.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_SIGINT_TaranisInSpaceLowMagmaShores_00 // The shoreline region produces intermittent bursts that mimic a beacon for half a heartbeat, then collapse into noise. You briefly consider answering, then remember this is passive surveillance.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_SIGINT_TaranisInSpaceLowScorchedLowlands_00 // A wash of static rises and falls in sync with your pass, as if the scorched ground is reflecting Grannus back at you. It’s like listening to a shout echo off an oven wall.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_SIGINT_TaranisInSpaceLowMidlands_00 // The midlands are mostly silent except for tiny, needle-thin spikes that refuse to repeat on schedule. Whatever makes them is either very shy or very fast.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_SIGINT_TaranisInSpaceLowHighlands_00 // The highlands scatter signals into messy multipath smears, turning clean tones into fuzzy ghosts. You wonder how anything could coordinate a transmission in a place that can’t decide if it’s molten or frozen.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_SIGINT_TaranisInSpaceLowDarkSideMidlands_00 // On the dark side, the spectrum drops into an uneasy hush broken only by your own spacecraft’s leakage. The emptiness feels louder than the noise ever did.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_SIGINT_TaranisInSpaceLowDarkSideHighlands_00 // A faint, slow pulse shows up right at the edge of detectability, then fades as you pass on. You can’t tell if it’s geology, plasma, or your imagination filling the gap.
        TaranisInSpaceLowPoles* = #GEPscience_bd_SIGINT_TaranisInSpaceLowPoles_00 // The poles whisper with thin, drifting tones, like charged particles singing through invisible strings. You file it under “beautiful” and hope the auditors accept that category.
        TaranisInSpaceHigh* = #GEPscience_bd_SIGINT_TaranisInSpaceHigh_00 // From high orbit, Taranis offers almost nothing but distant background and the red sun’s constant roar. The best reception you get is the reminder that help is many minutes away.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowSunnyLowlands_00 // The sunny lowlands throw back a busy, jittery spectrum, as if the thin air can’t hold still long enough to be quiet. Several spikes look “interesting” until they turn out to be your own electronics complaining.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowSunnyHighlands_00 // Over the sunlit highlands, signals fragment into overlapping echoes that smear across frequencies. It’s like the mountains are trying to talk over each other with no idea what they’re saying.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowTransitionalLowlands_00 // Near the twilight lowlands, a clean carrier tone appears, fades, then returns slightly shifted. You spend a full minute arguing with yourself before labeling it “reflection artifact.”
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowTransitionalHighlands_00 // The terminator highlands produce brief, crisp bursts that line up with local time like a clock with missing teeth. You note the pattern and feel a small, unreasonable chill.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowDarkSideLowlands_00 // The dark-side lowlands are quiet enough that you can see the universe’s background structure in the noise floor. It’s calming, until you remember how far that noise has traveled.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowDarkSideHighlands_00 // A low, warbling tone rides the silence, bending as your orbit shifts, like a distant station just out of tune. You check again: still no station.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowSoutheasternMountains_00 // The mountains kick back a bursty, uneven spectrum that looks like something trying to transmit through a bad antenna. You can’t decide whether to be excited or offended.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowWesternMountains_00 // A cluster of narrowband spikes appears only while the western peaks are in view, then disappears cleanly. The effect is repeatable, which is both reassuring and unsettling.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_SIGINT_ToutatisInSpaceLowDarkSideMountains_00 // The dark-side mountains produce faint, delayed echoes of strong signals elsewhere, like radio afterimages. Out here, even reflections feel like company.
        ToutatisInSpaceHigh* = #GEPscience_bd_SIGINT_ToutatisInSpaceHigh_00 // From high orbit, Toutatis becomes a small, half-lit disk and the spectrum smooths into long-distance quiet. The only truly strong signal is the one you send home, arriving long after you’ve stopped listening.

        NodensInSpaceHigh* = #GEPscience_bd_SIGINT_NodensInSpaceHigh_00 // From high over Nodens, the receiver drinks in a steady wash of ionospheric noise under the dim red sun. The long light-time makes even “real-time listening” feel like archaeology.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_SIGINT_NodensInSpaceLowSaltySeas_00 // Over the Salty Seas, sharp crackles spike the band like distant storms arguing with the ocean. You tag the strongest bursts for playback once the signal finally crawls home.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_SIGINT_NodensInSpaceLowFreshWater_00 // The Fresh Water regions sound oddly “clean,” with a lower noise floor and fewer wild pops. It’s still not quiet—just polite about being loud.
        NodensInSpaceLowShores* = #GEPscience_bd_SIGINT_NodensInSpaceLowShores_00 // Along the shores, reflections smear faint carriers into ghostly doubles. For a moment it looks like a transmission, until physics reminds you it’s just being dramatic.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_NodensInSpaceLowTropicalLowlands_00 // The tropical lowlands produce a warm, busy hiss that rises and falls with your pass. If there’s a pattern in it, it’s taking its time explaining.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_NodensInSpaceLowTemperateLowlands_00 // The temperate lowlands return a calmer spectrum with occasional needle-thin spikes. The spikes never repeat when you’re watching, which feels personal.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_NodensInSpaceLowTropicalMidlands_00 // Above the tropical midlands, broadband static blooms as if the air itself is humming. You wonder what it’s like to stand under a sky lit by a red sun and hear none of this.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_NodensInSpaceLowTemperateMidlands_00 // The receiver catches intermittent bursts that line up with terrain changes, then drift away. You file it under “ionosphere doing ionosphere things.”
        NodensInSpaceLowHighlands* = #GEPscience_bd_SIGINT_NodensInSpaceLowHighlands_00 // The highlands scatter signals into messy multipath echoes. Everything sounds like it’s arriving late—appropriate, given where you are.
        NodensInSpaceLowTundra* = #GEPscience_bd_SIGINT_NodensInSpaceLowTundra_00 // Over the tundra, the band thins to a cold whisper with rare, crisp ticks. Each tick feels like a tiny knock on a very distant door.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_SIGINT_NodensInSpaceLowIceCaps_00 // The ice caps reflect strong background into bright, smooth arcs across the spectrum. It’s beautiful in a sterile way, like a postcard that takes hours to arrive.

        BelisamaInSpaceHigh* = #GEPscience_bd_SIGINT_BelisamaInSpaceHigh_00 // From high above Belisama, Nodens dominates the background like a loud neighbor you can’t avoid. Mutual tidal lock means the “same face” keeps returning the same suspicious peaks.
        BelisamaInSpaceLowFlats* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowFlats_00 // Over the flats, a narrowband tone appears, splits into echoes, then recombines as you move. You blame geometry, but still double-check the antenna like a nervous kerbal.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowTropicalLowlands_00 // The tropical lowlands give back a jittery hiss, as if charged dust is trying to tune a radio by shaking it. It never quite finds a station.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowTemperateLowlands_00 // The temperate lowlands produce clean reflections and dirty conclusions. Half the “signals” are just Nodens shouting and Belisama politely echoing.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowTropicalMidlands_00 // A short burst repeats while the same locked hemisphere stays in view. It’s probably just a persistent reflection hotspot, but “probably” feels smaller under a red sun.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowTemperateMidlands_00 // The midlands smear everything into soft, overlapping hums. It sounds like the moon is mumbling secrets it doesn’t actually have.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowHighlands_00 // The highlands create crisp, delayed afterimages of strong carriers. Even passive listening feels like eavesdropping on a conversation between rocks.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_SIGINT_BelisamaInSpaceLowPoles_00 // Near the poles, thin drifting tones wander across the band like lost whistles. You mark the timestamps, knowing the answer—if any—arrives much later.

        SucellusInSpaceHigh* = #GEPscience_bd_SIGINT_SucellusInSpaceHigh_00 // High over Sucellus, cosmic noise and radiation hiss crowd the spectrum until “quiet” becomes theoretical. The red sun’s roar sits underneath everything like an impatient engine.
        SucellusInSpaceLowBasins* = #GEPscience_bd_SIGINT_SucellusInSpaceLowBasins_00 // Over the basins, bursts pop up in clusters, then vanish completely. You can’t tell if it’s the surface, the plasma, or the universe being unhelpful on purpose.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_SIGINT_SucellusInSpaceLowLowlands_00 // The lowlands return a gritty broadband hiss with occasional sharp spikes. The spikes look important right up until they refuse to repeat.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_SucellusInSpaceLowTropicalMidlands_00 // Above the tropical midlands, the receiver rides a rolling noise floor like a boat on bad water. You briefly miss simple, boring static.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_SucellusInSpaceLowTemperateMidlands_00 // The temperate midlands produce faint, steady tones that drift with your orbit. You annotate: “not a transmitter—just a moon with opinions.”
        SucellusInSpaceLowHighlands* = #GEPscience_bd_SIGINT_SucellusInSpaceLowHighlands_00 // The highlands reflect strong signals into clean, delayed echoes that arrive like late replies. Out here, even reflections feel like company.
        SucellusInSpaceLowPoles* = #GEPscience_bd_SIGINT_SucellusInSpaceLowPoles_00 // Over the poles, the band fills with thin whistles and harsh crackle, as if charged particles are rubbing balloons in the dark. It’s scientifically fascinating and emotionally unflattering.

        CaireenInSpaceHigh* = #GEPscience_bd_SIGINT_CaireenInSpaceHigh_00 // From high above tiny Caireen, there’s barely a whisper of its own—mostly borrowed noise from Sucellus and the distant red sun. You label the strongest features “environmental,” because “lonely” isn’t a unit.
        CaireenInSpaceLowLowlands* = #GEPscience_bd_SIGINT_CaireenInSpaceLowLowlands_00 // The lowlands show faint, delayed echoes of stronger carriers nearby. It’s like listening to a conversation through a wall made of gravel.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_SIGINT_CaireenInSpaceLowMidlands_00 // Over the midlands, a brief chirp appears right at the edge of detectability, then slips away. You stare at the plot until it feels rude.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_SIGINT_CaireenInSpaceLowHighlands_00 // The highlands scatter everything into tiny, flickering spikes that look almost intentional. Almost.
        CaireenInSpaceLowPoles* = #GEPscience_bd_SIGINT_CaireenInSpaceLowPoles_00 // Near the poles, the spectrum thins to a brittle hush with occasional needle ticks. You log them carefully—out here, even small signals earn respect.

        SironaInSpaceHigh* = #GEPscience_bd_SIGINT_SironaInSpaceHigh_00 // From high above Sirona, the spectrum is a broad, steady roar with faint structure hiding underneath. Under a dim red sun, even “quiet listening” feels like leaning into a very long-distance wind.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_SIGINT_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands produce jittery broadband hiss that rises and falls with your pass. It’s as if Sirona is muttering in a low voice and daring you to find words in it.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_SIGINT_SironaInSpaceLowLightTropicalBands_00 // Over the light tropical bands, the noise floor smooths out into a warmer, cleaner wash. A few crisp spikes poke through, then vanish before you can feel confident about them.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_SIGINT_SironaInSpaceLowDarkTemperateBands_00 // The dark temperate bands scatter faint carriers into overlapping ghosts. You tag them anyway—out here, even “probably natural” takes a long trip back home.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_SIGINT_SironaInSpaceLowLightTemperateBands_00 // The light temperate bands reflect the background into neat arcs across the plot. It’s almost orderly, which somehow makes it feel less friendly.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_SIGINT_SironaInSpaceLowDarkPolarBands_00 // Near the dark polar bands, thin whistles drift across the band like lost beacons. The instrument insists it’s physics; your instincts insist it’s staring back.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_SIGINT_SironaInSpaceLowLightPolarBands_00 // The light polar bands give brief, bright crackles that snap on and off with geometry. You check your own antenna twice, just to be sure the planet isn’t “answering.”

        AirmedInSpaceHigh* = #GEPscience_bd_SIGINT_AirmedInSpaceHigh_00 // From high over Airmed, Sirona’s presence bleeds into every channel like a nearby floodlight. The moon’s own contribution is faint, delayed, and stubbornly hard to separate at this distance.
        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowTropicalLowlands_00 // Over the tropical lowlands, scattered spikes appear in little clusters and then dissolve into static. It feels like the battered surface is reflecting someone else’s signal with a cracked mirror.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowTemperateLowlands_00 // The temperate lowlands are mostly a low, gritty hiss with occasional needle-thin ticks. Each tick is logged like it might matter hours later when it finally reaches home.
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowTropicalMidlands_00 // The tropical midlands smear everything into multipath fuzz that refuses to stay put. You write “terrain effects” and pretend that explanation is comforting.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowTemperateMidlands_00 // Above the temperate midlands, a clean tone tries to form and then splits into echoes. For a moment it looks intentional—then the geometry changes and the “message” evaporates.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowHighlands_00 // The highlands return crisp, delayed afterimages of stronger carriers nearby. Even passive listening feels like eavesdropping on Sirona through a wall of scars.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowDarkenedLowlands_00 // Over the darkened lowlands, the band drops into an uneasy hush broken by brief, sharp pops. The silence between pops is the part that feels the most “far away.”
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowDarkenedMidlands_00 // The darkened midlands show faint, repeating ripples that never quite line up twice. You begin to understand why “two-toned” also describes the data.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_SIGINT_AirmedInSpaceLowDarkenedHighlands_00 // The darkened highlands produce flickering spikes right at the edge of detectability. You stare at the plot long enough that it starts to feel rude.
        AirmedInSpaceLowPoles* = #GEPscience_bd_SIGINT_AirmedInSpaceLowPoles_00 // Near the poles, thin whistles wander across the spectrum like they’re looking for a station. Out under the red sun, “lost” starts to sound like a measurement.

        BorvoInSpaceHigh* = #GEPscience_bd_SIGINT_BorvoInSpaceHigh_00 // From high orbit, Borvo’s atmosphere turns the background into a soft, restless murmur. It’s hard to tell what’s coming from the moon and what’s just the universe being noisy on purpose.
        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_SIGINT_BorvoInSpaceLowTropicalCraquelure_00 // Over the tropical craquelure, the receiver picks up a staccato crackle that arrives in bursts. The pattern looks almost like speech until you remember rocks can be surprisingly chatty in the wrong ways.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_SIGINT_BorvoInSpaceLowTemperateCraquelure_00 // The temperate craquelure produces jittery, uneven noise with occasional clean gaps that feel too neat. You label them “windows” and immediately regret naming anything out here.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_BorvoInSpaceLowTropicalLowlands_00 // The tropical lowlands give a warm, busy hiss with a few narrowband spikes riding on top. Whatever Borvo is made of, it’s very good at keeping its secrets.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_BorvoInSpaceLowTemperateLowlands_00 // Over the temperate lowlands, the spectrum smooths out into a steady wash, then dips unexpectedly. The dips repeat just enough times to make you suspicious.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_BorvoInSpaceLowTropicalMidlands_00 // The tropical midlands scatter signals into fuzzy doubles and triples. It’s like listening to one voice in a room full of echoes.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_BorvoInSpaceLowTemperateMidlands_00 // The temperate midlands show faint tones that drift with your orbit and never settle. You note the drift and wonder if Borvo can’t decide whether it’s dusty or icy either.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_SIGINT_BorvoInSpaceLowHighlands_00 // The highlands punch sharp pops through the noise floor, brief and bright. They feel like punctuation marks in a sentence no one will translate for days.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_SIGINT_BorvoInSpaceLowMajorCraters_00 // Over the major craters, clean reflections create crisp, delayed repeats of strong carriers. The repeats arrive like late replies from a place that never promised to talk back.
        BorvoInSpaceLowPoles* = #GEPscience_bd_SIGINT_BorvoInSpaceLowPoles_00 // Near the poles, thin whistles and weak crackle weave together into a fragile chorus. The data is cold, distant, and oddly beautiful in a “please don’t get stranded here” way.

        DamonaInSpaceHigh* = #GEPscience_bd_SIGINT_DamonaInSpaceHigh_00 // From high above Damona, the receiver mostly hears borrowed noise and far-off background. The moon itself contributes little more than a faint, stubborn quiet that makes the long comm delay feel longer.
        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_DamonaInSpaceLowTropicalLowlands_00 // The tropical lowlands are quiet enough that tiny ticks stand out like knocks on an empty hull. Each one is logged carefully, because out here “small” is still worth sending home.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_DamonaInSpaceLowTemperateLowlands_00 // Over the temperate lowlands, a low hiss rises and falls with your pass as if the surface is breathing dust. You keep listening anyway—there aren’t many companions under a red sun.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_DamonaInSpaceLowTropicalMidlands_00 // The tropical midlands produce brief, crisp spikes that vanish as soon as you feel confident. You begin to suspect Damona enjoys practical jokes.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_DamonaInSpaceLowTemperateMidlands_00 // The temperate midlands smear faint carriers into soft, overlapping ghosts. It’s like the moon is replaying an old transmission that never existed.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_SIGINT_DamonaInSpaceLowHighlands_00 // The highlands return delayed afterimages of stronger signals nearby, clean and repeatable. Repeatable is reassuring—until you remember how long it takes to confirm anything from here.
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_SIGINT_DamonaInSpaceLowImpactBasin_00 // Over the impact basin, a broad crackle blooms across the band and then collapses into hush. The feature is prominent, like the scar that caused it, and just as unwilling to explain itself.
        DamonaInSpaceLowPoles* = #GEPscience_bd_SIGINT_DamonaInSpaceLowPoles_00 // Near the poles, the spectrum thins to a brittle silence with a few wandering whistles. You file the data and try not to think about how far away “home” sounds from this quiet.

        EponaInSpaceHigh* = #GEPscience_bd_SIGINT_EponaInSpaceHigh_00 // From high above Epona, the receiver mostly hears the dim red sun and deep-space hiss. Any reply from the planet arrives as subtle ripples that will take a long time to argue about back home.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_EponaInSpaceLowTropicalLowlands_00 // Over Epona’s tropical lowlands, the band fills with a soft, restless murmur, like wind in an atmosphere that barely remembers warmth. A few narrow spikes appear, then dissolve before you can feel clever.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_EponaInSpaceLowTemperateLowlands_00 // The temperate lowlands are quieter, letting faint, delayed echoes of stronger sources peek through. It feels like eavesdropping on Epona’s weather from very far away.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_SIGINT_EponaInSpaceLowTropicalUplands_00 // The uplands scatter everything into fuzzy doubles and triples, turning clean tones into ghost signals. You label them “reflections” and still save them under “suspicious.”
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_SIGINT_EponaInSpaceLowTemperateUplands_00 // A thin carrier-like line holds steady for several seconds, then drifts off as your geometry changes. The instrument insists it’s physics; your gut insists it’s Epona being coy.
        EponaInSpaceLowHighlands* = #GEPscience_bd_SIGINT_EponaInSpaceLowHighlands_00 // The highlands punch brief crackles through the noise floor, sharp as static on a cold headset. Under the red sun, even natural noise feels like it has intention.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_SIGINT_EponaInSpaceLowGrandPeaks_00 // Over the grand peaks, multipath echoes arrive like late answers to unasked questions. “Passive listening” suddenly feels very active.
        EponaInSpaceLowCraters* = #GEPscience_bd_SIGINT_EponaInSpaceLowCraters_00 // The cratered regions reflect strong background into crisp, delayed repeats. It’s the closest thing to a conversation you get out here, and it’s all just mirrors.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_SIGINT_EponaInSpaceLowVolcanoes_00 // A broad burst blooms across the spectrum and collapses again, as if something warm below briefly coughed into the sky. You mark the timestamp and wish the comm delay were shorter.
        EponaInSpaceLowPoles* = #GEPscience_bd_SIGINT_EponaInSpaceLowPoles_00 // Near the poles, thin whistles wander across the band like lost beacons. You log them carefully—out here, “maybe” takes hours to become “confirmed.”

        RosmertaInSpaceHigh* = #GEPscience_bd_SIGINT_RosmertaInSpaceHigh_00 // From high orbit, Rosmerta is mostly silence wrapped in borrowed noise from nearby space. The emptiness is so complete it feels like the radio is judging you.
        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_SIGINT_RosmertaInSpaceLowTropicalLowlands_00 // Over the tropical lowlands, the receiver catches faint ticks at the edge of detectability. Each tick feels like a polite reminder that “lonely” is not a data type.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_SIGINT_RosmertaInSpaceLowTemperateLowlands_00 // The temperate lowlands show a clean, low noise floor with occasional needle-thin spikes. The spikes never repeat while you’re watching, which seems unfair.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_SIGINT_RosmertaInSpaceLowTropicalMidlands_00 // The midlands smear distant carriers into soft afterimages that lag behind your motion. Even reflections take their time under a dim red sun.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_SIGINT_RosmertaInSpaceLowTemperateMidlands_00 // A brief, wavering tone appears, then fades into hush. You replay it twice and decide you definitely heard something—scientifically.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_SIGINT_RosmertaInSpaceLowHighlands_00 // The highlands produce crisp, delayed echoes of stronger sources, like Rosmerta is trying to participate without having anything to say. It’s oddly considerate.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_SIGINT_RosmertaInSpaceLowPoles_00 // Near the poles, the spectrum thins to a brittle quiet with rare, sharp pops. The silence between them is the part that feels the most “far from home.”

        RAB-58EInSpaceHigh* = #GEPscience_bd_SIGINT_RAB-58EInSpaceHigh_00 // From high above tiny RAB-58E, there’s almost nothing but background and the red sun’s steady roar. It’s hard to tell if the moonlet is quiet or simply too small to complain.
        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_SIGINT_RAB-58EInSpaceLowLowlands_00 // The lowlands return faint, jittery static that comes and goes with your pass. It feels less like a signal and more like the rock itself is unsure what it is.
