@EXPERIMENT_DEFINITION:HAS[#id[bd_surveillance]]
{
	%RESULTS
	{
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_00 // The grassland plains are the most 'alive' part of Kerbin. The cities, the lush green grass, the farmland, and the industry. This is home.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_01 // You really can see your house from up here! Oh, there's your annoying neighbor.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_02 // Observed farmland. Crop yields look up to 10 percent higher than last year.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_03 // Mapped some enemy roads. Should be useful if we ever go on an offensive.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_04 // Observing Kerbograd apartment buildings, doesn't seem to be any different than the ones in Filigrad and Yurigrad. In fact, they look exacty the same.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_05 // Observed military parade in Kerya. Weapons being developed are a concern, but their current capabilities don't seem to pose any real threat.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_06 // Found some stray kogs around Woomerang. Maybe they can be used as test subjects.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowGrasslands_07 // This part of the grasslands is exactly that. Grassy. There are some small farms here, seems like their crop was recently harvested.
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_00 // The desert looks hostile, but there are flourishing cities and settlements dotted across it, a reminder that anything can be done with enough will, time, and resources. The third, the desert has plenty.
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_01 // Found some nomads on kamels, resting by an oasis. Not a threat.
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_02 // Staring at what seems to be a mass of granular silicon dioxide. Are you sure you want to waste surveillance-grade film on this?
        KerbinInSpaceLowDesert* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowDesert_03 // Spotted enemy rocket test! Fortunately for us, it failed just under a minute after liftoff.
        KerbinInSpaceLowEasternSea* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_00 // The boats and ships crossing Kerbin's waters seem mostly benign.
        KerbinInSpaceLowWesternSea* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_01 // You can see the containers on the freighters, kerbs on ferries and the aircraft of a carrier.
        KerbinInSpaceLowForemansSea* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_02 // You spot a lone boat in the middle of the ocean. What is it doing?
        KerbinInSpaceLowTriangulusSea* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_03 // Snapped high-detail photos of the latest algae bloom. Its spread can be accurately determined from this image.
        KerbinInSpaceLowNorthernSea* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowWater_04 // All is calm this time, just a light breeze over the ocean and fish swimming underneath.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_00 // Photographed some rocks, a tree, and a mining town.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_01 // Captured images of oil wells among the rocks. May be important later.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_02 // Spotted an airbase, large. Site marked as 'important'.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowBadlands_03 // This particularly treacherous, rocky view shows why this place is called "the Badlands". it really is bad.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_00 // Ice, ice, and more ice. And what's that? A 50-kerb Krussian outpost? Probably harmless. `
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_01 // Big glacier splitting off. Better put on some navigation warnings and inform the KOAA.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowNorthernIceShelf_02 // You see some polar bears and seals. One seems to be eating the other.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_00 // Captured sub-meter resolution image of... ice. And some flocks of birds. And their kuano. At least you know where the ice is cracking.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_01 // Spotted the latest polar expedition. They seem to be all fine, but they got their snowcat stuck a few times.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_surveillance_KerbinInSpaceLowSouthernIceShelf_02 // Big crack spotted and... ice falling! At least the penkuins are safe.
        
        MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowMidlandCraters_00 // You wonder how big of an asteroid is needed to make craters this wide, before realizing there are far larger craters on the Mun.
        MunInSpaceLowVoronoiCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowHighlandCraters_00 // Some of these craters look to be far older than the ones in the Mun’s midlands.
        MunInSpaceLowNotableCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowEastCrater_00 // One of the most prominent landmarks on the Mun when viewed from the surface of Kerbin, Kerbals have spent millennia guessing what might have created it.
        MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowFarsideCrater_00 // You reflect on how you’re the first kerbal to see this part of the Mun.
        MunInSpaceLowExoticCraters* = #ScienceRefactor_bd_surveillance_MunInSpaceLowEastFarsideCrater_00 // The crater is nicely framed by Kerbin rising over the horizon.
    }
}