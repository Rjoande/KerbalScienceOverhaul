@EXPERIMENT_DEFINITION:HAS[#id[bd_gammaRay]]
{
	@title = #ScienceRefactor_bd_gammaRay_title // Gamma Ray Spectrometry
    !RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_gammaRay_default_00 // You measure Gamma ray emissions.
        InSpace* = #ScienceRefactor_bd_gammaRay_default_01 // You scan for the distinctive Gamma ray spectrum of Hydrogen
	    InSpace* = #ScienceRefactor_bd_gammaRay_default_02 // The Spectrometer begins scanning for element deposits
        
        SunInSpace* = #ScienceRefactor_bd_gammaRay_SunInSpace_00 // Sensors confirm: Kerbol emits Gamma radiation.
        SunInSpaceLow* = #ScienceRefactor_bd_gammaRay_SunInSpaceLow_00 // Coronal ejections are accompanied by a sharp increase of Gamma rays.
        SunInSpaceLow* = #ScienceRefactor_bd_gammaRay_SunInSpaceLow_01 // A massive Gamma ray spike is detected, possibly from a solar flare.
        SunInSpaceHigh* = #ScienceRefactor_bd_gammaRay_SunInSpaceHigh_00 // Kerbol's Gamma Radiation is detectable even at long distances.
        SunInSpaceHigh* = #ScienceRefactor_bd_gammaRay_SunInSpaceHigh_01 // The instrument logs the Gamma Ray levels at this altitude.

        MohoInSpace* = #ScienceRefactor_bd_gammaRay_MohoInSpace_00 // Measurements of Gamma Ray levels near Moho complete!
        MohoInSpaceLow* = #ScienceRefactor_bd_gammaRay_MohoInSpaceLow_00 // Iron deposits are detected on the surface of Moho.
        MohoInSpaceLow* = #ScienceRefactor_bd_gammaRay_MohoInSpaceLow_01 // Detailed scans reveal frozen water in the shadow of craters near the poles.
        MohoInSpaceHigh* = #ScienceRefactor_bd_gammaRay_MohoInSpaceHigh_00 // Trace amounts of frozen water are detected at the poles.
        MohoInSpaceHigh* = #ScienceRefactor_bd_gammaRay_MohoInSpaceHigh_01 // The GRS measures radiation levels. The lab techs will have to figure out if they are from Moho or Kerbol.

        EveInSpace* = #ScienceRefactor_bd_gammaRay_EveInSpace_00 // Gamma Ray levels around Eve are recorded.
        EveInSpaceLow* = #ScienceRefactor_bd_gammaRay_EveInSpaceLow_00 // Gamma emissions from the lakes below suggest they contain some form of volatile liquid.
        EveInSpaceLow* = #ScienceRefactor_bd_gammaRay_EveInSpaceLow_01 // If Eve ever had large quantities of water, they must have boiled away long ago.
        EveInSpaceHigh* = #ScienceRefactor_bd_gammaRay_EveInSpaceHigh_00 // Different cloud layers are detected to absorb and reflect varying quantities of the Gamma Rays emitted by Kerbol.
        EveInSpaceHigh* = #ScienceRefactor_bd_gammaRay_EveInSpaceHigh_01 // Some traces of naturally radioactive elements are detected somewhere in the cloud layers.

        GillyInSpace* = #ScienceRefactor_bd_gammaRay_GillyInSpace_00 // The GRS measures Gilly's exposure to Gamma Rays.
        GillyInSpaceLow* = #ScienceRefactor_bd_gammaRay_GillyInSpaceLow_00 // Traces of iron and silicates are detected on the surface.
        GillyInSpaceHigh* = #ScienceRefactor_bd_gammaRay_GillyInSpaceHigh_00 // Gilly's Gamma Ray levels are similar to those detected around asteroids.

        KerbinInSpace* = #ScienceRefactor_bd_gammaRay_KerbinInSpace_00 // Gamma Ray spectrum measurements are taken from around Kerbin.
        KerbinInSpaceLow* = #ScienceRefactor_bd_gammaRay_KerbinInSpaceLow_00 // Kerbin's atmosphere is confirmed to shield the surface from a lot of Gamma radiation.
        KerbinInSpaceLow* = #ScienceRefactor_bd_gammaRay_KerbinInSpaceLow_01 // Kerbin's oceans, lakes and rivers are detected.
        KerbinInSpaceLow* = #ScienceRefactor_bd_gammaRay_KerbinInSpaceLow_02 // This advanced instrument was not really needed to confirm that Kerbin has large quantities of water, was it?
        KerbinInSpaceHigh* = #ScienceRefactor_bd_gammaRay_KerbinInSpaceHigh_00 // Gamma ray mapping of Kerbin's surface is difficult due to the protection provided by the atmosphere.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_gammaRay_KerbinInSpaceHigh_01 // The Gamma Ray levels are noted to build a template of conditions necessary for life.

        MunInSpace* = #ScienceRefactor_bd_gammaRay_MunInSpace_00 // The spectrometer measures Gamma levels on the surface of the Mun.
        MunInSpaceLow* = #ScienceRefactor_bd_gammaRay_MunInSpaceLow_00 // Traces of Iron are detected on the surface.
        MunInSpaceLow* = #ScienceRefactor_bd_gammaRay_MunInSpaceLow_01 // Hydrogen levels consistent with the presence of water are detected around the poles.
        MunInSpaceHigh* = #ScienceRefactor_bd_gammaRay_MunInSpaceHigh_00 // Compared to Kerbin, surface measurements are easier to take due to the lack of an atmosphere.

        MinmusInSpace* = #ScienceRefactor_bd_gammaRay_MinmusInSpace_00 // GRS measurements of Minmus are noted.
        MinmusInSpaceLow* = #ScienceRefactor_bd_gammaRay_MinmusInSpaceLow_00 // Minmus' lack of an atmosphere also makes it easier to map the surface.
        MinmusInSpaceLow* = #ScienceRefactor_bd_gammaRay_MinmusInSpaceLow_01 // Minmus appears to also have water-related Hydrogen concentrations around its poles.
        MinmusInSpaceHigh* = #ScienceRefactor_bd_gammaRay_MinmusInSpaceHigh_00 // Gamma Ray Spectrometry analysis complete: Pistachio.

        DunaInSpace* = #ScienceRefactor_bd_gammaRay_DunaInSpace_00 // Gamma Radiation levels are recorded near Duna.
        DunaInSpaceLow* = #ScienceRefactor_bd_gammaRay_DunaInSpaceLow_00 // Water molecules are detected trapped at the poles in the form of ice.
        DunaInSpaceLow* = #ScienceRefactor_bd_gammaRay_DunaInSpaceLow_01 // Silicon levels are significantly lower around old volcanic mountains.
        DunaInSpaceLow* = #ScienceRefactor_bd_gammaRay_DunaInSpaceLow_02 // Remnants of Chlorine are picked up around the Lowlands, suggesting ancient lakes now long gone.
        DunaInSpaceLow* = #ScienceRefactor_bd_gammaRay_DunaInSpaceLow_03 // Silicon deposits are discovered on the surface of Duna.
        DunaInSpaceHigh* = #ScienceRefactor_bd_gammaRay_DunaInSpaceHigh_00 // Large quantities of Iron Oxide are detected all over Duna.
        DunaInSpaceHigh* = #ScienceRefactor_bd_gammaRay_DunaInSpaceHigh_01 // GRS data allows the mapping of several elements on the surface.

        IkeInSpace* = #ScienceRefactor_bd_gammaRay_IkeInSpace_00 // GRS data is recorded from Ike.
        IkeInSpaceLow* = #ScienceRefactor_bd_gammaRay_IkeInSpaceLow_00 // Traces of Silicon are detected on the surface.
        IkeInSpaceHigh* = #ScienceRefactor_bd_gammaRay_IkeInSpaceHigh_00 // The trend of detecting water ice around polar regions continue.

        DresInSpace* = #ScienceRefactor_bd_gammaRay_DresInSpace_00 // The system records Gamma Ray spectrometry data from the surface of Dres.
        DresInSpaceLow* = #ScienceRefactor_bd_gammaRay_DresInSpaceLow_00 // Dres appears to have a similar composition to that of the Mun.
        DresInSpaceLow* = #ScienceRefactor_bd_gammaRay_DresInSpaceLow_01 // Traces of Irons and Silicon are found on the surface.
        DresInSpaceHigh* = #ScienceRefactor_bd_gammaRay_DresInSpaceHigh_00 // Gamma Ray analysis results do little to lower the distrust of the scientific community.

        JoolInSpace* = #ScienceRefactor_bd_gammaRay_JoolInSpace_00 // It takes a while due to its size, but GRS data results from Jool are recorded.
        JoolInSpaceLow* = #ScienceRefactor_bd_gammaRay_JoolInSpaceLow_00 // There is definitely a good amount of radioactive material in Jool's atmosphere.
        JoolInSpaceLow* = #ScienceRefactor_bd_gammaRay_JoolInSpaceLow_01 // GRS measurements show some sort of interaction between strong Kerbol emissions and Jool's upper atmosphere.
        JoolInSpaceHigh* = #ScienceRefactor_bd_gammaRay_JoolInSpaceHigh_00 // Jool appears to reflect or emit a good amount of Gamma Rays.
        JoolInSpaceHigh* = #ScienceRefactor_bd_gammaRay_JoolInSpaceHigh_02 // Jool appears to have large quantities of Hydrogen on its atmosphere.

        LaytheInSpace* = #ScienceRefactor_bd_gammaRay_LaytheInSpace_00 // GRS data is collected from around Laythe.
        LaytheInSpaceLow* = #ScienceRefactor_bd_gammaRay_LaytheInSpaceLow_00 // Laythe contains large amounts of water and chlorine.
        LaytheInSpaceLow* = #ScienceRefactor_bd_gammaRay_LaytheInSpaceLow_01 // Chlorine levels could indicate the presence of salt in the air and water.
        LaytheInSpaceHigh* = #ScienceRefactor_bd_gammaRay_LaytheInSpaceHigh_00 // A good amount of water-based hydrogen is discovered on the surface.
        LaytheInSpaceHigh* = #ScienceRefactor_bd_gammaRay_LaytheInSpaceHigh_01 // Data collected here reflects conditions very similar to Kerbin.

        VallInSpace* = #ScienceRefactor_bd_gammaRay_VallInSpace_00 // GRS data is collected from around Vall.
        VallInSpaceLow* = #ScienceRefactor_bd_gammaRay_VallInSpaceLow_00 // Hydrogen readings originate from cryovolcanic activity on the surface.
        VallInSpaceHigh* = #ScienceRefactor_bd_gammaRay_VallInSpaceHigh_00 // Vall contains hydrogen in the air and on land.

        TyloInSpace* = #ScienceRefactor_bd_gammaRay_TyloInSpace_00 // Tylo's Gamma Ray spectra is collected.
        TyloInSpaceLow* = #ScienceRefactor_bd_gammaRay_TyloInSpaceLow_00 // There does not appear to be any water detected. The surface is rather rocky.
        TyloInSpaceHigh* = #ScienceRefactor_bd_gammaRay_TyloInSpaceHigh_00 // Scan show scattered resource deposits near crater impacts.

        PolInSpace* = #ScienceRefactor_bd_gammaRay_PolInSpace_00 // GRS data received from the moon Pol.
        PolInSpaceLow* = #ScienceRefactor_bd_gammaRay_PolInSpaceLow_00 // Wildly varied elevations make scanning difficult, but there does not appear to be any water present.
        PolInSpaceHigh* = #ScienceRefactor_bd_gammaRay_PolInSpaceHigh_00 // Stand-by for results, there's a smudge in the computer monitors.

        BopInSpace* = #ScienceRefactor_bd_gammaRay_BopInSpace_00 // The Gamma Ray Spectrometer scans Bop.
        BopInSpaceLow* = #ScienceRefactor_bd_gammaRay_BopInSpaceLow_00 // Readings show the surface is composed of carbon and iron.
        BopInSpaceHigh* = #ScienceRefactor_bd_gammaRay_BopInSpaceHigh_00 // GRS scans indicate Bop contains carbon, iron and...

        EelooInSpace* = #ScienceRefactor_bd_gammaRay_EelooInSpace_00 // Eeloo's Gamma Ray emissions are measured.
        EelooInSpaceLow* = #ScienceRefactor_bd_gammaRay_EelooInSpaceLow_00 // Large amounts of Silicon elements are detected.
        EelooInSpaceLow* = #ScienceRefactor_bd_gammaRay_EelooInSpaceLow_01 // Faint background gamma radiation is found to be from our parent star, Kerbol.
        EelooInSpaceHigh* = #ScienceRefactor_bd_gammaRay_EelooInSpaceHigh_00 // Eeloo seems to be covered in a lot of ice.
        EelooInSpaceHigh* = #ScienceRefactor_bd_gammaRay_EelooInSpaceHigh_01 // The Spectrometer is briefly blinded by what could only have been a high-energy Gamma Ray Burst.

        SarnusInSpace* = #ScienceRefactor_bd_gammaRay_SarnusInSpace_00 // The instrument logs gamma ray emissions from around the gas giant
        SarnusInSpaceLow* = #ScienceRefactor_bd_gammaRay_SarnusInSpaceLow_00 // Readings hint at the presence of water, likely as ice, in the lower layers of the atmosphere
        SarnusInSpaceLow* = #ScienceRefactor_bd_gammaRay_SarnusInSpaceLow_01 // Measurements are used to fine-tune models of the amounts of hydrogen in Sarnus. It suggests that the giant is less dense than water!
        SarnusInSpaceHigh* = #ScienceRefactor_bd_gammaRay_SarnusInSpaceHigh_00 // Sarnus appears to be made up of large quantities of hydrogen

		TektoInSpace* = #ScienceRefactor_bd_gammaRay_TektoInSpace_00 // An excellent range of gamma ray measurements are recorded around Tekto
		TektoInSpaceLow* = #ScienceRefactor_bd_gammaRay_TektoInSpaceLow_00 // Analysis concluded that the detected hydrogen is not from water but other hydrogen-rich molecules
		TektoInSpaceLow* = #ScienceRefactor_bd_gammaRay_TektoInSpaceLow_01 // Simple hydrocarbons are confirmed to be the source of the detected hydrogen and appear to be mostly concentrated on the surface
		TektoInSpaceLow* = #ScienceRefactor_bd_gammaRay_TektoInSpaceLow_02 // Emissions of simple hydrocarbons, likely ethane, are detected from the surface
		TektoInSpaceLow* = #ScienceRefactor_bd_gammaRay_TektoInSpaceLow_03 // Surface level emissions of alkane hydrocarbons are recorded. Levels seem to indicate the presence of ethane
		TektoInSpaceHigh* = #ScienceRefactor_bd_gammaRay_TektoInSpaceHigh_00 // Results show that promising levels of hydrogen have been detected
		TektoInSpaceHigh* = #ScienceRefactor_bd_gammaRay_TektoInSpaceHigh_01 // Emissions indicate the presence of hydrogen on Tekto

		SlateInSpace* = #ScienceRefactor_bd_gammaRay_SlateInSpace_00 // The GRS is not detecting any presence of Hydrogen
		SlateInSpace* = #ScienceRefactor_bd_gammaRay_SlateInSpace_01 // There are no signs of any sort of water above or beneath the surface

		HaleInSpace* = #ScienceRefactor_bd_gammaRay_HaleInSpace_00 // Hydrogen levels are consistent with the presence of water ice
		HaleInSpace* = #ScienceRefactor_bd_gammaRay_HaleInSpace_01 // Compositional analysis indicates a large percentage of the moon is made of water ice
		HaleInSpaceHigh* = #ScienceRefactor_bd_gammaRay_HaleInSpaceHigh_00 // GRS measurements indicate that the moon has a very similar composition as that of the rings

		OvokInSpace* = #ScienceRefactor_bd_gammaRay_OvokInSpace_00 // Hydrogen levels are consistent with the presence of water ice
		OvokInSpace* = #ScienceRefactor_bd_gammaRay_OvokInSpace_01 // Compositional analysis indicates a large percentage of the moon is made of water ice
		OvokInSpaceHigh* = #ScienceRefactor_bd_gammaRay_OvokInSpaceHigh_00 // GRS measurements indicate that the moon has a very similar composition as that of the

        UrlumInSpace* = #ScienceRefactor_bd_gammaRay_UrlumInSpace_00 // The instrument logs gamma ray emissions from around the gas giant
        UrlumInSpaceHigh* = #ScienceRefactor_bd_gammaRay_UrlumInSpaceHigh_00 // Gamma Ray emissions are consistent with a large presence of hydrogen in the gas giant's atmosphere and clouds
        UrlumInSpaceLow* = #ScienceRefactor_bd_gammaRay_UrlumInSpaceLow_00 // Readings reveal Urlum to be made up of mostly hydrogen

		WalInSpaceLow* = #ScienceRefactor_bd_gammaRay_WalInSpaceLow_00 // Traces of Irons and Silicon are found on the surface
		WalInSpaceHigh* = #ScienceRefactor_bd_gammaRay_WalInSpaceHigh_00 // The instrument detects only small pockets of icy hydrogen, which could be frozen water trapped inside deep craters

        TalInSpaceLow* = #ScienceRefactor_bd_gammaRay_TalInSpaceLow_00 // GRS data is consistent with high ice quantities
        TalInSpaceHigh* = #ScienceRefactor_bd_gammaRay_TalInSpaceHigh_00 // The instrument detects a lot of ice and metal

		PriaxInSpaceHigh* = #ScienceRefactor_bd_gammaRay_PriaxInSpaceHigh_00 // Initial gamma ray measurements do not show any water or hydrogen-based molecules present
		PriaxInSpaceLow* = #ScienceRefactor_bd_gammaRay_PriaxInSpaceLow_00 // Further investigation still do not produce any definitive signs of water ice

		PoltaInSpaceHigh* = #ScienceRefactor_bd_gammaRay_PoltaInSpaceHigh_00 // The GRS is detecting hydrogen emissions indicating the presence of water in different states of matter
		PoltaInSpaceLow* = #ScienceRefactor_bd_gammaRay_PoltaInSpaceLow_00 // The spectrometer is detecting fluctuations hinting at a liquid ocean beneath the surface!
		PoltaInSpace* = #ScienceRefactor_bd_gammaRay_PoltaInSpace_00 // Water is detected as ice and potentially as a salty liquid

        NeidonInSpace* = #ScienceRefactor_bd_gammaRay_NeidonInSpace_00 // An excellent range of gamma ray measurements are recorded from the gas giant, NeidonInSpace
        NeidonInSpaceHigh* = #ScienceRefactor_bd_gammaRay_NeidonInSpaceHigh_00 // The instrument detects varying atomic signatures suggesting the presence of Hydrogen and Methane
        NeidonInSpaceLow* = #ScienceRefactor_bd_gammaRay_NeidonInSpaceLow_00 // Neidon has a composition of roughly 80% Hydrogen, along with other hydrocarbons and water

		ThatmoInSpaceHigh* = #ScienceRefactor_bd_gammaRay_ThatmoInSpaceHigh_00 // The instrument is not registering any significant presence of Hydrogen-based molecules
		ThatmoInSpaceLow* = #ScienceRefactor_bd_gammaRay_ThatmoInSpaceLow_00 // Closer measurements detect just a minuscule amount of methane and other hydrocarbons near the surface
	}
}