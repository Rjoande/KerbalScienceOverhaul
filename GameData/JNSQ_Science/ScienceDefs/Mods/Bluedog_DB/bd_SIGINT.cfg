@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS
    {
        SunInSpaceHigh* = #JNSQscience_bd_SIGINT_SunInSpaceHigh_00 // Far from the Sun, the spectrum thins to distant carrier tones and your own crew arguing about antenna gain.
		SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowNorthPolarZone_00 // The polar zone crackles with restless bursts; you log it as “localized activity” and lower the volume.
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowNorthSubpolarZone_00 // Background hiss builds into a steady roar, punctuated by sharp pops like invisible relays switching.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowNorthTemperateZone_00 // The band is noisy but readable; weak offworld signals peek through between solar grumbles.
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowNorthTropicZone_00 // Rapid fluttering interference rides the spectrum, as if the Sun is tuning stations at random.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowEquatorialZone_00 // The equatorial belt is a wall of broadband noise; anything else has to shout to be heard.
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowSouthTropicZone_00 // The receiver catches brief, clean windows between storms, then slams shut again without warning.
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowSouthTemperateZone_00 // A smooth hiss dominates, with occasional spikes that look suspiciously like “don’t fly here” signs.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowSouthSubpolarZone_00 // The signal floor rises and falls in long waves, like the Sun is breathing through your filters.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_SIGINT_SunInSpaceLowSouthPolarZone_00 // Static bites hard at the poles; you swear the antenna just flinched.

		MohoInSpaceHigh* = #JNSQscience_bd_SIGINT_MohoInSpaceHigh_00 // From high over Moho, you mostly intercept solar noise and a few faint, embarrassed pings from your own systems.
		MohoInSpaceLowPoles* = #JNSQscience_bd_SIGINT_MohoInSpaceLowPoles_00 // The poles offer no transmissions. Just bright solar hiss and a sharp reflection that refuses to behave.
		MohoInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_MohoInSpaceLowLowlands_00 // Lowlands smear the band into a dull roar, as if the terrain is grinding the signal into dust.
		MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_SIGINT_MohoInSpaceLowPolarIceCraters_00 // The icy pits kick back clean, needle-thin echoes that vanish the moment you try to lock on.
		MohoInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_MohoInSpaceLowHighlands_00 // Highland ridges produce crisp multipath ghosts; every tone arrives with a stuttering twin.
		MohoInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_MohoInSpaceLowMidlands_00 // The midlands return steady, boring reflections, until a single spike shows up and pretends it wasn’t there.
		MohoInSpaceLowCraters* = #JNSQscience_bd_SIGINT_MohoInSpaceLowCraters_00 // Crater rims act like little dishes, focusing interference into brief hot spots across the spectrum.
		MohoInSpaceLowExoticCraters* = #JNSQscience_bd_SIGINT_MohoInSpaceLowExoticCraters_00 // Strange scattering turns the noise into arcs and bands that look almost patterned. Almost.
		MohoInSpaceLowRareCraters* = #JNSQscience_bd_SIGINT_MohoInSpaceLowRareCraters_00 // A narrow chirp repeats twice, then the Sun drowns it like it never happened.
		MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_SIGINT_MohoInSpaceLowVoronoiCraters_00 // The tiled terrain chops reflections into regular chunks; the result looks “organized” for a dead rock.
		MohoInSpaceLowNotableCraters* = #JNSQscience_bd_SIGINT_MohoInSpaceLowNotableCraters_00 // Big craters dominate the return so completely you end up doing geology by accident.
		MohoInSpaceLowPeaks* = #JNSQscience_bd_SIGINT_MohoInSpaceLowPeaks_00 // Over the peaks, reflections sharpen into hard clicks that sound like a reply, even though it can’t be.

        EveInSpaceHigh* = #JNSQscience_bd_SIGINT_EveInSpaceHigh_00 // From high orbit, Eve’s neighborhood is a loud, restless hiss, like the whole planet is charging up to say something.
		EveInSpaceLowPoles* = #JNSQscience_bd_SIGINT_EveInSpaceLowPoles_00 // Polar scans are full of sharp crackle and drifting tones; your filters keep asking for a quieter universe.
		EveInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_EveInSpaceLowLowlands_00 // The thick air below smears distant carriers into wide bands, as if signals are sinking before they can escape.
		EveInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_EveInSpaceLowMidlands_00 // Interference rolls in clean layers; it’s almost orderly, right up until it suddenly isn’t.
		EveInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_EveInSpaceLowHighlands_00 // Highland reflections come back crisp and bright, with a faint rhythmic flutter that refuses to average out.
		EveInSpaceLowPeaks* = #JNSQscience_bd_SIGINT_EveInSpaceLowPeaks_00 // Over the peaks, brief bursts spike the spectrum like someone is keying a mic and thinking better of it.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_SIGINT_EveInSpaceLowExplodiumSea_00 // The chemical sea kicks up a constant broadband roar; you can’t tell if it’s physics or attitude.
		EveInSpaceLowMountains* = #JNSQscience_bd_SIGINT_EveInSpaceLowMountains_00 // Jagged terrain turns every transmission into a stuttering echo.
		EveInSpaceLowShores* = #JNSQscience_bd_SIGINT_EveInSpaceLowShores_00 // Shoreline returns flicker between land and sea noise; the receiver can’t decide what it’s listening to.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_SIGINT_EveInSpaceLowPolarLakes_00 // The polar lakes add a cold, clean sheen to the band—then puncture it with sudden static snaps.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_SIGINT_EveInSpaceLowPetrolLakes_00 // A low, oily hiss rides under everything here; it sounds like the planet is whispering through a straw.
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofAkron_00 // Dense interference stacks into a slow, rolling pattern that looks suspiciously like a repeating beacon.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofNessus_00 // The spectrum surges and dips in long waves; the logs describe it as “wavelike,” which is not helpful.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofTaniwha_00 // You catch a few clean tones in the gaps, then the noise closes over them like water.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofGigan_00 // A harsh, grinding static dominates; the antenna heat monitor registers its disagreement.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofRodan_00 // Short bursts pop up across multiple channels, like scattered distress calls that never repeat.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofGojira_00 // The band is absurdly loud here; even your own transmitter sounds shy.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofGhidorah_00 // Three distinct interference peaks dance around each other; nobody admits they might be related.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_SIGINT_EveInSpaceLowSeaofBagorah_00 // Reflections arrive delayed and doubled; for a moment, you swear the echo is answering.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_SIGINT_EveInSpaceLowKrakensWell_00 // Everything near the Well distorts. Signals bend, spike, and vanish like they’re being tugged downward.

		GillyInSpaceHigh* = #JNSQscience_bd_SIGINT_GillyInSpaceHigh_00 // Far above Gilly, the receiver mostly hears distant chatter from elsewhere and the uncomfortable sound of nothing happening.
		GillyInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_GillyInSpaceLowLowlands_00 // The lumpy surface produces faint, uneven echoes; it’s like trying to eavesdrop on a pile of gravel.
		GillyInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_GillyInSpaceLowMidlands_00 // A soft, steady hiss dominates, with occasional blips that match your own systems a little too well.
		GillyInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_GillyInSpaceLowHighlands_00 // High ground returns come back sharp and brief. Tiny, brittle reflections from a moon that barely counts as one.

        KerbinInSpaceHigh* = #JNSQscience_bd_SIGINT_KerbinInSpaceHigh_00 // From high orbit, Kerbin sounds like one big buzzing conversation, with KSC cutting through like a shout.
		KerbinInSpaceLowIceCaps* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowIceCaps_00 // The receiver crackles with polar research calls and aurora-static. You log it as “probably normal.”
		KerbinInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowHighlands_00 // Relay traffic bounces off the ridgelines. Apparently even hills need to phone home.
		KerbinInSpaceLowMountains* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowMountains_00 // Bursts from high-altitude repeaters mix with an alarming number of “summit update” uploads.
		KerbinInSpaceLowShores* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowShores_00 // Maritime beacons, beach radio, and a suspiciously loud snack advertisement dominate the band.
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowMidlands_00 // A dense web of everyday comms: traffic reports, farm telemetry, and someone arguing about boosters.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowLowlands_00 // Short-range chatter overlaps into a warm hum. Kerbin is loud when it’s comfortable.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridLowlands_00 // Long-range test transmissions echo across the dry flats. Someone is definitely calibrating something expensive.
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridMidlands_00 // You pick up repeated “range clear” calls and a radio countdown that never reaches zero.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridHighlands_00 // Thin, clear air makes the signals sharp. Mostly weather stations and very bored outposts.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowAridMountains_00 // Mountain-top dishes sweep the horizon. The dish motors make a satisfying tone in your headphones.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowGreatLake_00 // Boats, buoys, and a frantic call about “something big under the water”. Probably just a shadow.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowInlandWater_00 // Calm surface, busy spectrum: fisheries telemetry and an endless stream of tourist chatter.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowKreenwichSea_00 // Navigation pings line up like clockwork; someone is using the sea as a giant timing reference.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowArcticSea_00 // Polar shipping routes whisper through the static. You note more “ice ahead” warnings than expected.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowForemansSea_00 // You record engine noise, weather radar, and one captain singing off-key into an open mic.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowTriangulusSea_00 // Three beacon networks overlap into a neat pattern your analysts will pretend was intentional.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowNorthernSea_00 // The northern coast is alive with chatter. Harbor control, storm alerts, and a lot of excited cheering.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowSub-ArcticSea_00 // Signals fade in and out with bands of cold air. The instrument insists it’s not its fault.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowEasternSea_00 // A wall of communications from busy ports. You can almost hear the bureaucracy through the radio.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowWesternSea_00 // Wide-open water, clean reception. You catch distant drills and a very smug weather forecast.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_SIGINT_KerbinInSpaceLowWelcomeBackIsland_00 // Recovery teams, tracking radars, and celebratory calls. Apparently someone landed something mostly intact.

        MunInSpaceHigh* = #JNSQscience_bd_SIGINT_MunInSpaceHigh_00 // Above the Mun, the spectrum is mostly silence. Your own transmitter suddenly feels impolite.
		MunInSpaceLowPoles* = #JNSQscience_bd_SIGINT_MunInSpaceLowPoles_00 // Polar reflections turn Kerbin's chatter into a thin, icy whisper.
		MunInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_MunInSpaceLowHighlands_00 // Highland ridges act like antennas. You log unexpected echoes between each burst.
		MunInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_MunInSpaceLowMidlands_00 // The midlands return tidy, predictable reflections. Almost disappointingly normal.
		MunInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_MunInSpaceLowLowlands_00 // Low basins trap the signal; the noise floor rises like the landscape is listening back.
		MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_SIGINT_MunInSpaceLowPolarIceCraters_00 // Ice-lined craters ping back with sharp, clean returns and a hint of crackle.
		MunInSpaceLowExoticCraters* = #JNSQscience_bd_SIGINT_MunInSpaceLowExoticCraters_00 // Strange crater walls scatter the band into glittering fragments. None of it matches the model.
		MunInSpaceLowRareCraters* = #JNSQscience_bd_SIGINT_MunInSpaceLowRareCraters_00 // A few brief, structured chirps appear, then vanish before you can accuse anyone.
		MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_SIGINT_MunInSpaceLowVoronoiCraters_00 // The patterned ground makes the spectrum look gridded, as if noise was filed into cells.
		MunInSpaceLowNotableCraters* = #JNSQscience_bd_SIGINT_MunInSpaceLowNotableCraters_00 // Strong reflections from the big craters drown out everything else. You mark them as "loud geology."
		MunInSpaceLowMountains* = #JNSQscience_bd_SIGINT_MunInSpaceLowMountains_00 // Mountain peaks throw back a delayed echo that sounds like a reply, even though it can't be.

		MinmusInSpaceHigh* = #JNSQscience_bd_SIGINT_MinmusInSpaceHigh_00 // High above Minmus, the receiver hears only gentle hiss and a few stubborn harmonics that refuse to decay.
		MinmusInSpaceLowPoles* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowPoles_00 // At the poles, Minmus reflects Kerbin's broadcasts with minty-clean clarity and long delays.
		MinmusInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowLowlands_00 // The flats smear signals into wide, soft bands, like radio through dust.
		MinmusInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowMidlands_00 // The midlands come back steady.
		MinmusInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowHighlands_00 // Crisp multipath echoes stack up over the highlands. The instrument insists it's "within spec."
		MinmusInSpaceLowBasins* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowBasins_00 // Basins focus stray transmissions into brief hot spots, then let them drift away.
		MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownBasins_00 // The darker basins add a warm hiss and an odd rhythmic wobble you can't quite explain.
		MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownLowlands_00 // Over brown lowlands, reflections deepen. The static sounds almost satisfied.
		MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownMidlands_00 // Repeating tones skim the edge of the band. Probably interference, but you flag it anyway.
		MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowBrownHighlands_00 // Brown highlands scatter the signal into neat harmonics. It feels too organized for dirt.
		MinmusInSpaceLowMountains* = #JNSQscience_bd_SIGINT_MinmusInSpaceLowMountains_00 // Minmus's peaks create sparkling echoes that ring out long after the source has passed.

        DunaInSpaceHigh* = #JNSQscience_bd_SIGINT_DunaInSpaceHigh_00 // High above Duna, the receiver mostly hears faint offworld chatter and the hiss of charged dust; the planet keeps its secrets.

		DunaInSpaceLowIceCaps* = #JNSQscience_bd_SIGINT_DunaInSpaceLowIceCaps_00 // Over the ice caps, the band rises and falls with storm static, like Duna is breathing through a filter.
		DunaInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_DunaInSpaceLowHighlands_00 // Ridge lines bounce signals into double-echoes; every packet arrives with a dusty twin.
		DunaInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_DunaInSpaceLowMidlands_00 // The scan finds empty channels and one lonely carrier you can’t quite explain.
		DunaInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_DunaInSpaceLowLowlands_00 // Low basins trap interference; the spectrum looks like it’s been stirred with a spoon.
		DunaInSpaceLowCraters* = #JNSQscience_bd_SIGINT_DunaInSpaceLowCraters_00 // Crater rims send back crisp reflections, as if the ground is practicing relay work.
		DunaInSpaceLowRareCraters* = #JNSQscience_bd_SIGINT_DunaInSpaceLowRareCraters_00 // A narrow spike repeats on a suspiciously neat interval, too tidy for noise, too small to accuse.
		DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_SIGINT_DunaInSpaceLowVoronoiCraters_00 // The patterned terrain chops the signal into segments, like a message cut into tiles.
		DunaInSpaceLowNotableCraters* = #JNSQscience_bd_SIGINT_DunaInSpaceLowNotableCraters_00 // Big impacts dominate the return; you label it “geology doing SIGINT” and move on.
		DunaInSpaceLowExoticCraters* = #JNSQscience_bd_SIGINT_DunaInSpaceLowExoticCraters_00 // Weird scattering turns the band into glittering arcs; analysis asks you to “do that again.”
		DunaInSpaceLowTrenches* = #JNSQscience_bd_SIGINT_DunaInSpaceLowTrenches_00 // In the long trenches, signals vanish and snap back with hard edges, like a switch being tested.
		DunaInSpaceLowNotablePlains* = #JNSQscience_bd_SIGINT_DunaInSpaceLowNotablePlains_00 // A broad, steady hum rides the plains, either wind-born static or very quiet infrastructure.
		DunaInSpaceLowNotableMountains* = #JNSQscience_bd_SIGINT_DunaInSpaceLowNotableMountains_00 // A cluster of peaks produces a repeating multipath rhythm that feels uncomfortably intentional.
		DunaInSpaceLowMountains* = #JNSQscience_bd_SIGINT_DunaInSpaceLowMountains_00 // Mountain shadows make dead zones, then a sudden burst arrives amplified and late.
		DunaInSpaceLowVolcano* = #JNSQscience_bd_SIGINT_DunaInSpaceLowVolcano_00 // Thermal noise surges over the volcano and the receiver saturates; you log it as “aggressively energetic.”

		IkeInSpaceHigh* = #JNSQscience_bd_SIGINT_IkeInSpaceHigh_00 // Far above Ike, there’s almost nothing to intercept: just your own packets and a lot of silence.
		IkeInSpaceLowPoles* = #JNSQscience_bd_SIGINT_IkeInSpaceLowPoles_00 // The poles reflect faint transmissions with long delays, turning them into slow, ghostly syllables.
		IkeInSpaceLowMountains* = #JNSQscience_bd_SIGINT_IkeInSpaceLowMountains_00 // Jagged ridges throw back sharp, staccato echoes, like a beacon with bad manners.
		IkeInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_IkeInSpaceLowMidlands_00 // The midlands give clean, boring returns; the instrument seems personally offended.
		IkeInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_IkeInSpaceLowLowlands_00 // Lowlands smear everything into a soft roar, as if the regolith is chewing on the signal.
		IkeInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_IkeInSpaceLowHighlands_00 // Over the highlands, you catch a brief chirp that matches nothing, then absolute quiet.

        EdnaInSpaceHigh* = #JNSQscience_bd_SIGINT_EdnaInSpaceHigh_00 // High above Edna, the receiver mostly hears distant carriers and long, empty pauses where nothing bothers to reply.
		EdnaInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_EdnaInSpaceLowLowlands_00 // The lowlands return only faint, smeared echoes.
		EdnaInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_EdnaInSpaceLowMidlands_00 // A few weak reflections arrive late and slightly warped; the logs describe it as “radio, but tired.”
		EdnaInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_EdnaInSpaceLowHighlands_00 // Over the highlands, the signal sharpens into clean multipath ghosts that fade as quickly as they appear.
		EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_SIGINT_EdnaInSpaceLowPolarIceCraters_00 // The ice craters kick back needle-thin pings and a brittle crackle that sounds like frozen static.
		EdnaInSpaceLowWhites* = #JNSQscience_bd_SIGINT_EdnaInSpaceLowWhites_00 // The bright terrain flares the noise floor for a moment, then drops back into the same patient silence.

		DakInSpaceHigh* = #JNSQscience_bd_SIGINT_DakInSpaceHigh_00 // From high over Dak, your best intercept is your own transmitter insisting everything is “nominal.”
		DakInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_DakInSpaceLowLowlands_00 // A thin, steady tone rides the band. Soft enough to doubt, consistent enough to log as “suspiciously catchy.”
		DakInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_DakInSpaceLowMidlands_00 // The potato-shaped rock scatters signals into a wobbling chorus; guidance swears it isn’t steering toward it.
		DakInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_DakInSpaceLowHighlands_00 // Brief chirps pop up at the edge of the spectrum like a lure, then vanish the instant you try to lock on.

		DresInSpaceHigh* = #JNSQscience_bd_SIGINT_DresInSpaceHigh_00 // Above Dres, the spectrum is almost perfectly flat; it’s impressive how quiet a whole world can be.
		DresInSpaceLowPoles* = #JNSQscience_bd_SIGINT_DresInSpaceLowPoles_00 // The poles offer clean, empty channels and a whisper of far-off traffic that never quite resolves into anything useful.
		DresInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_DresInSpaceLowHighlands_00 // Highland ridges produce crisp, meaningless echoes. Proof that silence can have texture.
		DresInSpaceLowMidlands* = #JNSQscience_bd_SIGINT_DresInSpaceLowMidlands_00 // The midlands return dull reflections and nothing else; the instrument seems personally insulted.
		DresInSpaceLowLowlands* = #JNSQscience_bd_SIGINT_DresInSpaceLowLowlands_00 // Low basins smear even the background hiss into a soft blur, as if Dres is trying to erase the band.
		DresInSpaceLowCanyon* = #JNSQscience_bd_SIGINT_DresInSpaceLowCanyon_00 // The canyon throws back delayed, stacked echoes that look like a message until you remember rocks can’t talk.

        JoolInSpaceHigh* = #JNSQscience_bd_SIGINT_JoolInSpaceHigh_00 // From high orbit, Jool is a distant roar of broadband noise, with occasional clean tones that vanish when you focus on them.
		JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_SIGINT_JoolInSpaceLowEquatorialBands_00 // The equatorial bands pulse with layered interference; every sweep looks like a storm arguing with a magnetosphere.
		JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_SIGINT_JoolInSpaceLowExposedLowerDeck_00 // Deeper over the “lower deck,” the receiver loads up with harsh crackle and drifting carriers that your filters can’t quite tame.
		JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_SIGINT_JoolInSpaceLowSubpolarBands_00 // Subpolar regions return a steady hiss with sharp, needle-like bursts. Short, bright, and annoyingly unrepeatable.
		JoolInSpaceLowNorthPole* = #JNSQscience_bd_SIGINT_JoolInSpaceLowNorthPole_00 // Near the north pole, the spectrum warbles in slow waves, like the planet is dragging signals through invisible currents.
		JoolInSpaceLowSouthPole* = #JNSQscience_bd_SIGINT_JoolInSpaceLowSouthPole_00 // The south pole produces clean gaps followed by sudden static snaps; the instrument calls it “normal,” but it sounds offended.
		JoolInSpaceLowStormComplex* = #JNSQscience_bd_SIGINT_JoolInSpaceLowStormComplex_00 // Over the storm complex, the band becomes a wall of noise with brief structured chirps that look like warnings.

		LaytheInSpaceHigh* = #JNSQscience_bd_SIGINT_LaytheInSpaceHigh_00 // High above Laythe, faint offworld chatter mixes with a gentle ocean-hiss you can’t quite explain with antenna theory.
		LaytheInSpaceLowShores* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowShores_00 // Along the shores, reflections flicker between land and sea; you catch bursts that sound like your own beacons coming back excited.
		LaytheInSpaceLowShallows* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowShallows_00 // The shallows smear signals into soft, wide bands, like radio trying to swim.
		LaytheInSpaceLowInlandWater* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowInlandWater_00 // Inland water returns a calm, steady noise floor with occasional bright pings. Probably reflections, probably.
		LaytheInSpaceLowKrenwichSea* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowKrenwichSea_00 // The Krenwich Sea gives clean, clocklike returns; the timing is so tidy it makes you suspicious of the water.
		LaytheInSpaceLowArcticSea* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowArcticSea_00 // Over the Arctic Sea, the spectrum crackles with cold static and long-delay echoes that arrive like slow apologies.
		LaytheInSpaceLowJoolwardSea* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowJoolwardSea_00 // The Joolward Sea is noisy in a directional way, like Jool is leaning over your shoulder and humming into the receiver.
		LaytheInSpaceLowPolwardSea* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowPolwardSea_00 // The Polward Sea produces drifting tones that slide across channels; you log “multipath” and hope that’s true.
		LaytheInSpaceLowHighlands* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowHighlands_00 // Highlands bounce signals back sharp and bright, stacking clean echoes into a neat little chorus.
		LaytheInSpaceLowMountains* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowMountains_00 // Mountain ridges chop transmissions into stuttering fragments, as if the terrain is trying to edit your data.
		LaytheInSpaceLowIceCaps* = #JNSQscience_bd_SIGINT_LaytheInSpaceLowIceCaps_00 // The ice caps reflect with crisp, brittle clarity; the occasional snap of static sounds like something cracking underfoot.
