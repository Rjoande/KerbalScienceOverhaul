// StockScienceRefactor — Wildcardize Stock Science Results
// Converts deterministic stock RESULTS into variant-enabled pools (*).
// This unlocks result alternation and full compatibility with CSS and extension packs.
// `default` entries are preserved without wildcard, per KSP fallback rules.
// No new science text is added; this patch refactors stock behavior only.

@EXPERIMENT_DEFINITION:HAS[#id[tantares_radiometer_scan]]
{
	@title = #ScienceRefactor_tantares_radiometer_scan_title // Radiometer Scan
	!RESULTS {}
	RESULTS
	{
		default = #ScienceRefactor_tantares_radiometer_scan_default_00 // Recorded electromagnetic spectrum scan results.
	}
}

