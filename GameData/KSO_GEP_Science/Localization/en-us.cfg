        #GEPscience_bd_orbitalScope_AirmedInSpaceLowTemperateMidlands_00 = The temperate midlands are a mottled quilt of materials that looks different every orbit as haze comes and goes. Your mosaic tool calls it “variable transparency,” which sounds nicer than “annoying.”
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowHighlands_00 = Highlands throw hard-edged shadows that make the terrain look sharper than it probably is. The camera loves it; the landing planners do not.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedLowlands_00 = In the darkened lowlands, noise and low contrast compete for ownership of the image. You enhance gently, because “inventing continents” is frowned upon.
        #GEPscience_bd_orbitalScope_AirmedInSpaceLowDarkenedMidlands_00 = Darkened midlands show just enough texture to be unsettling—lumps, ridges, and voids that refuse neat classification. You label features by coordinates and let future you worry about names.
