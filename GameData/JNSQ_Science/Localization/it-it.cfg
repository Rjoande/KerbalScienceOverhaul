        #JNSQscience_barometerScan_DresInSpaceHigh_01 = Il sensore non rileva aria, né foschia, né scuse. Valuti di aggiungere una nota: "funziona come progettato, purtroppo".
        #JNSQscience_barometerScan_LaytheSrfLandedShallows_00 = Il barometro oscilla vicino a valori da livello del mare, poi tentenna quando un'onda schizza sull'involucro. Fa scienza e si bagna.
        #JNSQscience_barometerScan_LaytheSrfLandedShallows_01 = La pressione è stabile, la foschia salata no. Il sensore segnala per un attimo "pioggia", poi si ricorda che è solo spruzzo d'oceano.
        #JNSQscience_barometerScan_LaytheSrfLandedHighlands_00 = La lancetta sta più in basso di quanto vorresti, ma non abbastanza da farti andare nel panico. I "componenti respirabili" di Laythe quassù arrivano a prezzo scontato.
        #JNSQscience_barometerScan_LaytheSrfLandedHighlands_01 = Per un momento la lettura sembra quasi familiare... poi ti ricordi che l'aria di Kerbin non arriva con un gigantesco cartello verde di avvertimento nel cielo.
        #JNSQscience_barometerScan_LaytheSrfLandedMountains_00 = La pressione scende abbastanza da far lavorare di più le ventole della tuta. Il barometro la etichetta "sottile" con un tono che sembra personale.
        #JNSQscience_barometerScan_LaytheSrfLandedMountains_01 = Una raffica fa oscillare la lettura e la lancetta ci mette un po' a riprendersi. Le montagne sembrano ventilare l'intera luna.
        #JNSQscience_barometerScan_LaytheSrfLandedIceCaps_00 = Il barometro legge più alto di quanto suggerirebbe la quota, come se l'aria fredda si stesse accumulando e si rifiutasse di andarsene. I guanti approvano: le dita dei piedi no.
        #JNSQscience_barometerScan_LaytheSrfLandedIceCaps_01 = La pressione qui è sorprendentemente stabile, con piccoli impulsi che seguono il vento. Il sensore si copre di brina lo stesso, giusto per fare scena.
        #JNSQscience_barometerScan_LaytheSrfLandedEnclosedFaults_00 = La lettura cambia in modo evidente tra pendii al sole e crepe in ombra. Laythe sta di nuovo immagazzinando il meteo nel terreno.
        #JNSQscience_barometerScan_LaytheSrfLandedEnclosedFaults_01 = La pressione sale e scende a piccoli gradini mentre l'aria drena attraverso le fratture. Il barometro lo chiama "circolazione locale" e tu lo chiami "inquietante".
        #JNSQscience_barometerScan_LaytheSrfLandedLowlands_00 = Il barometro sta comodamente alto mentre l'aria sembra un asciugamano umido. La pressione va bene: i filtri no.
        #JNSQscience_barometerScan_LaytheSrfLandedLowlands_01 = Le letture salgono con ogni folata calda, poi tornano di colpo quando passa aria più fredda. i bassopiani sono praticamente un frullatore del meteo.
        #JNSQscience_barometerScan_LaytheSrfLandedMidlands_00 = La pressione è moderata e stabile, come se Laythe stesse cercando di sembrare ragionevole. Non ti fidi.
        #JNSQscience_barometerScan_LaytheSrfLandedMidlands_01 = Il sensore registra dolci oscillazioni che suggeriscono ampie celle d'aria lente. La lancetta sembra calma, cosa sospetta.
        #JNSQscience_barometerScan_LaytheSrfSplashedShores_00 = In riva la pressione rimbalza a ogni onda e a ogni spruzzo. Il barometro sta imparando a fare surf.
        #JNSQscience_barometerScan_LaytheSrfSplashedShores_01 = La pressione al livello del mare è decente, ma gli spruzzi continuano a intasare l'aspirazione. Lo strumento richiede un asciugamano e un oceano più tranquillo.
        #JNSQscience_barometerScan_LaytheSrfSplashedShallows_00 = Il barometro legge stabile, poi va a picco mentre il veicolo beccheggia e il sensore si prende una facciata di goccioline. Lo archivia come "interferenza marina".
        #JNSQscience_barometerScan_LaytheSrfSplashedShallows_01 = La pressione è quasi costante, ma la lancetta sussulta a tempo con il moto ondoso. A quanto pare l'oceano ora fa parte dell'esperimento.
        #JNSQscience_barometerScan_LaytheSrfSplashedInlandWater_00 = La lettura è calma e coerente, come se questo bacino fosse riparato dagli sbalzi più grossi di Laythe. Il Controllo Missione dice comunque di non immergere lo strumento.
        #JNSQscience_barometerScan_LaytheSrfSplashedInlandWater_01 = La pressione è abbastanza stabile da essere noiosa, finché una brezza attraversa l'acqua e la sposta appena. Il barometro finge che fosse emozionante.
        #JNSQscience_barometerScan_LaytheSrfSplashedKrenwichSea_00 = La pressione sembra un po' più alta sopra l'acqua aperta, come se il mare indossasse una coperta d'aria più pesante.
        #JNSQscience_barometerScan_LaytheSrfSplashedKrenwichSea_01 = La lancetta sta alta e stabile mentre le onde cercano di scuoterla via. L'oceano non può cambiare la pressione, quindi cambia il tuo atteggiamento.
        #JNSQscience_barometerScan_LaytheSrfSplashedArcticSea_00 = L'aria fredda si addensa vicino alla superficie, spingendo la pressione un po' più in alto. Il barometro è felice: tutto il resto è freddo.
