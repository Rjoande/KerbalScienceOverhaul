        #JNSQscience_bd_XRayDiffract_TyloSrfLandedPoles_00 = La scansione è per lo più di duri minerali silicatati con deboli tracce di volatili che resistono dove la luce del sole non arriva: Tylo tiene ben nascosta la sua roba "morbida".
        #JNSQscience_bd_XRayDiffract_TyloSrfLandedMountains_00 = Picchi netti da roccia densa e cristallina mostrano deformazione di reticella ovunque: queste montagne sembrano essere state schiacciate al loro posto e non essersi mai rilassate.
        #JNSQscience_bd_XRayDiffract_TyloSrfLandedLowlands_00 = Il diffrattogramma è dominato da firme di polvere ultra fine: i bassopiani sembrano regolite polverizzata e compattata senza sosta.
