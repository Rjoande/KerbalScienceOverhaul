		CaireenSrfLandedLowlands* = #GEPscience_bd_camera_CaireenSrfLandedLowlands_00 // Caireen’s lowlands photograph as dusty flats with scattered stones, like a workshop floor nobody swept. You add “captured asteroid vibes confirmed.”
		CaireenSrfLandedLowlands* = #GEPscience_bd_camera_CaireenSrfLandedLowlands_01 // You take a close shot and the regolith looks coarse and stubborn. The camera dutifully records it, and you dutifully pretend you’re not impressed.
