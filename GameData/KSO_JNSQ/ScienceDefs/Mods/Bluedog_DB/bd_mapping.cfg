        KrelInSpaceLowPoles* = #JNSQ_bd_mapping_KrelInSpaceLowPoles_00 // At the poles, shadows swallow whole craters while a faint rim-glow hints at frost. The map comes back labeled "cold, colder, hole."

        AdenInSpaceLowLowlands* = #JNSQ_bd_mapping_AdenInSpaceLowLowlands_00 // Aden's lowlands are dark, smooth-ish basins between brighter scars. Every "flat" patch hides a thousand tiny dents.
