        #ScienceRefactor_bd_UVspec_KerbinInSpaceHigh_01 = I composti organici di Kerbin assorbono una grande quantità di radiazione UV.
        #ScienceRefactor_bd_UVspec_MunInSpace_00 = Viene registrato lo spettro UV di Mun.
        #ScienceRefactor_bd_UVspec_MunInSpaceLow_00 = L'analisi della posizione e della distribuzione del ghiaccio d'acqua suggerisce che sia stato depositato da impatti di asteroidi o comete.
        #ScienceRefactor_bd_UVspec_MunInSpaceLow_01 = I livelli di riflettività all'interno di crateri profondi corrispondono a quelli noti per il ghiaccio d'acqua.
        #ScienceRefactor_bd_UVspec_MunInSpaceHigh_00 = L'analisi della superficie di alcuni crateri rivela raggi che si diramano dai loro centri, causati da pennacchi di materiale espulso dopo l'impatto.
        #ScienceRefactor_bd_UVspec_MinmusInSpace_00 = Vengono registrate letture di spettrometria UV da Minmus.
