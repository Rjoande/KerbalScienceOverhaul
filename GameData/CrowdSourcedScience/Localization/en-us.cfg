        #CSS_evaReport_GillySrfLandedMidlands_03 = If that was 'one small step', you don't want to imagine how big a 'giant leap' would be in this gravity.
        #CSS_evaReport_GillySrfLandedMidlands_04 = You balance yourself on your pinky finger and start doing push-ups, only to find yourself slowly floating away.
