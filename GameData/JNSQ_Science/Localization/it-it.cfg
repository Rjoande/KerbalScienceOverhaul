        #JNSQscience_bd_orbitalScope_HuygenInSpaceLowPeaks_00 = I picchi catturano la luce per primi e per ultimi, producendo piccoli bagliori netti che risultano stranamente rassicuranti.
        #JNSQscience_bd_orbitalScope_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari svaniscono in veli pallidi: la foschia si infittisce finché l'immagine sembra cancellata apposta.
        #JNSQscience_bd_orbitalScope_HuygenInSpaceLowPoles_00 = I poli mostrano una debole struttura vorticosa nell'alta atmosfera, una spirale lenta disegnata nell'ambra.
