        #JNSQscience_gravityScan_EelooSrfLandedMidlands_00 = Le letture delle pianure sono stabili e piatte, ed è proprio questo che rende gli scienziati sospettosi.
        #JNSQscience_gravityScan_EelooSrfLandedMidlands_01 = Il rilevatore di gravioli segnala "perlopiù ghiaccio" con occasionali zone più pesanti, come se qualcuno avesse rovesciato ghiaia nella neve.
        #JNSQscience_gravityScan_EelooSrfLandedLowlands_00 = Una piccola depressione di gravità suggerisce un ampio bacino polveroso. Congratulazioni, hai trovato la zona di atterraggio più soffice di Eeloo.
        #JNSQscience_gravityScan_EelooSrfLandedLowlands_01 = Manca massa rispetto al terreno. O i bassopiani sono porosi, oppure qualcosa di cavo sta giocando a nascondino.
        #JNSQscience_gravityScan_EelooSrfLandedCanyon_00 = Vicino al bordo del canyon, l'ago oscilla come una bussola in panico. Il salto ha un bel caratterino.
        #JNSQscience_gravityScan_EelooSrfLandedCanyon_01 = La scansione mostra cambiamenti di densità stratificati lungo il fondo del canyon, come se il mondo fosse stato tagliato e non si fosse mai guarito del tutto.
        #JNSQscience_gravityScan_EelooInSpaceLowPoles_00 = In orbita bassa sopra i poli compare un'anomalia debole ma coerente: i depositi polari sono più spessi di quanto suggerissero le mappe.
        #JNSQscience_gravityScan_EelooInSpaceLowPoles_01 = Il rilevatore di gravioli coglie una sottile asimmetria sulla calotta, come se Eeloo portasse il cappello storto.
        #JNSQscience_gravityScan_EelooInSpaceLowHighlands_00 = Il passaggio sopra le colline produce massimi di gravità nitidi: le montagne non sono solo alte, sono pesanti.
        #JNSQscience_gravityScan_EelooInSpaceLowHighlands_01 = Le sessioni di mappatura suggeriscono dorsali sepolte di materiale più denso, ben nascoste sotto la brina riflettente.
        #JNSQscience_gravityScan_EelooInSpaceLowMidlands_00 = Le pianure si confondono nella lettura, ma piccoli rialzi compaiono negli stessi punti a ogni passaggio.
        #JNSQscience_gravityScan_EelooInSpaceLowMidlands_01 = La tua traccia orbitale disegna una dolce trapunta di gravità: piccole variazioni, grandi indizi, molto caffè al Controllo Missione.
        #JNSQscience_gravityScan_EelooInSpaceLowLowlands_00 = Sopra i bassopiani il segnale si ammorbidisce, come se la superficie fosse fatta di neve compattata e pensieri ottimisti.
        #JNSQscience_gravityScan_EelooInSpaceLowLowlands_01 = Il rilevatore nota ampie e poco profonde depressioni compatibili con un riempimento... qualcosa accumula brina qui da secoli, in silenzio.
        #JNSQscience_gravityScan_EelooInSpaceLowCanyon_00 = Ogni attraversamento del canyon fa impennare il rilevatore di gravioli, poi lo senti quasi sospirare. Spigoli netti, numeri netti.
        #JNSQscience_gravityScan_EelooInSpaceLowCanyon_01 = Un motivo ripetuto suggerisce che le pareti del canyon espongano strati più densi delle pianure. Le viscere di Eeloo stanno facendo capolino.
        #JNSQscience_gravityScan_EelooInSpaceHighPoles_00 = Dall'orbita alta, l'anomalia polare è appena un sussurro, ma non se ne va. I sussurri persistenti sono quelli che fanno paura.
