        LindorInSpaceLowTemperateBands* = #JNSQ_bd_mapping_LindorInSpaceLowTemperateBands_00 // The mapper catches broad, creamy bands wrapped around Lindor like calm brushstrokes. Someone asks again if it's water or chocolate.
        LindorInSpaceLowExposedLowerDeck* = #JNSQ_bd_mapping_LindorInSpaceLowExposedLowerDeck_00 // A darker break in the clouds reveals a lower layer sliding the wrong way. The image is gorgeous, and slightly unsettling.
