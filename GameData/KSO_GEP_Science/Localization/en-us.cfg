        #GEPscience_sspxTelescopeObservation_ToutatisInSpaceHigh_00 = From farther out, the planet is a small disk split between bright and dark. The telescope stares into the gap between stars, trying to find something new.

        #GEPscience_sspxTelescopeObservation_NodensSrfLandedShores_00 = The ocean throws red light into the telescope tube. You log “excellent horizon, mediocre glare” and wipe salt off the eyepiece anyway.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTropicalLowlands_00 = Warm, wet air makes the stars wobble like jelly. The telescope insists the universe is not actually melting.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTemperateLowlands_00 = The sky looks familiar only until you start mapping it. You double-check the coordinates and remember the comm delay will argue later.
        #GEPscience_sspxTelescopeObservation_NodensSrfLandedTropicalMidlands_00 = Above the thickest haze, the telescope resolves faint points that the naked eye misses. The red sun still tries to sneak into every exposure.
