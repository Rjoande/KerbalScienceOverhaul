@EXPERIMENT_DEFINITION:HAS[#id[bd_TrappedRadiation]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_bd_TrappedRadiation_SunInSpaceLow_00 // The detector lights up with particles racing along Kerbol’s twisted field lines; it looks more like loops than belts.
        SunInSpaceLow* = #JNSQscience_bd_TrappedRadiation_SunInSpaceLow_01 // You map a few dense “lanes” of trapped charge, then the readout saturates and starts drawing modern art.
        SunInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_SunInSpaceHigh_00 // No coherent belts out here—just a thin drizzle of energetic particles and the occasional tantrum from Kerbol.
        SunInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_SunInSpaceHigh_01 // The pattern refuses to stay put; Mission Control labels it “interplanetary background” and tells you to stop calling it a belt.

        IkeInSpaceLow* = #JNSQscience_bd_TrappedRadiation_IkeInSpaceLow_00 // The instrument hunts for an Ike belt and finds mostly Duna-orbit radiation, with a faint “shadow” when Ike blocks the flow.
        IkeInSpaceLow* = #JNSQscience_bd_TrappedRadiation_IkeInSpaceLow_01 // Readings spike in patchy pockets, but nothing stays trapped—it’s like trying to hold smoke with a sieve.
        IkeInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_IkeInSpaceHigh_00 // High over Ike, the numbers look indistinguishable from free space near Duna: plenty of particles, no belt structure.
        IkeInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_IkeInSpaceHigh_01 // Any magnetism here seems borrowed and temporary; the “belt” disappears the moment you try to draw it on a map.

        EdnaInSpaceLow* = #JNSQscience_bd_TrappedRadiation_EdnaInSpaceLow_00 // Edna offers no magnetic cage, so the detector records only background radiation and a few brief blips.
        EdnaInSpaceLow* = #JNSQscience_bd_TrappedRadiation_EdnaInSpaceLow_01 // A faint haze of charged grit brushes the sensor now and then, but it never organizes into anything you could call a belt.
        EdnaInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_EdnaInSpaceHigh_00 // Far above Edna, the curve flattens into a quiet baseline; trapped populations are effectively absent.
        EdnaInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_EdnaInSpaceHigh_01 // The only thing “confined” is your patience as the readout stubbornly refuses to form rings.

        DakInSpaceLow* = #JNSQscience_bd_TrappedRadiation_DakInSpaceLow_00 // Close to Dak, the detector reports “no belts detected” and then adds, unhelpfully, “still a potato.”
        DakInSpaceLow* = #JNSQscience_bd_TrappedRadiation_DakInSpaceLow_01 // A couple of tiny spikes appear when you yaw the craft—turns out it’s your own electronics, not Dak.
        DakInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_DakInSpaceHigh_00 // High Dak orbit is clean and boring: background particles only, with no sign of trapping.
        DakInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_DakInSpaceHigh_01 // You try to find the potato’s “siren’s call” in the data. The instrument insists it’s just silence and cosmic drizzle.

        LindorInSpaceLow* = #JNSQscience_bd_TrappedRadiation_LindorInSpaceLow_00 // The detector immediately finds dense belts of trapped particles; Lindor is wearing a very serious magnetic suit.
        LindorInSpaceLow* = #JNSQscience_bd_TrappedRadiation_LindorInSpaceLow_01 // Inner-belt readings climb fast, then flatten as the instrument hits its comfort limit and quietly panics.
        LindorInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_LindorInSpaceHigh_00 // The belts thin out, but the structure remains; field lines stretch far into space like a giant invisible net.
        LindorInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_LindorInSpaceHigh_01 // You trace the outer edge of the magnetosphere where trapped particles give way to the harsher flow of open space.

        KrelInSpaceLow* = #JNSQscience_bd_TrappedRadiation_KrelInSpaceLow_00 // Krel has no belts of its own; the spikes you see line up with Lindor's environment, not the moon.
        KrelInSpaceLow* = #JNSQscience_bd_TrappedRadiation_KrelInSpaceLow_01 // Readings dip when Krel blocks the incoming particles, leaving a neat little "radiation shadow" behind it.
        KrelInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_KrelInSpaceHigh_00 // Higher up, the pattern looks like passing through a distant belt sheet, bright then quiet, over and over.
        KrelInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_KrelInSpaceHigh_01 // The detector insists the trap is elsewhere; Krel is just along for the ride.

        AdenInSpaceLow* = #JNSQscience_bd_TrappedRadiation_AdenInSpaceLow_00 // No local trapping shows up near Aden, only a steady drizzle that changes as Lindor looms in different directions.
        AdenInSpaceLow* = #JNSQscience_bd_TrappedRadiation_AdenInSpaceLow_01 // You try to map an "Aden belt" and end up mapping the spacecraft's orbit through Lindor's particle soup instead.
        AdenInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_AdenInSpaceHigh_00 // The signal smooths out with altitude, suggesting Aden is mostly in the outskirts of someone else's magnetosphere.
        AdenInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_AdenInSpaceHigh_01 // A few energetic bursts punch through, then fade, like the edge of a belt brushing past.

        HuygenInSpaceLow* = #JNSQscience_bd_TrappedRadiation_HuygenInSpaceLow_00 // Particles rain into the upper atmosphere and vanish from the counts; whatever is trapped nearby is leaking fast.
        HuygenInSpaceLow* = #JNSQscience_bd_TrappedRadiation_HuygenInSpaceLow_01 // The detector sees charged particles, but no stable confinement around Huygen - more like precipitation than storage.
        HuygenInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_HuygenInSpaceHigh_00 // Above the haze, the data looks like belt spillover from Lindor, with occasional sharp peaks where the field funnels particles.
        HuygenInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_HuygenInSpaceHigh_01 // The outer environment is active, but Huygen itself refuses to act like a magnet.

        RigaInSpaceLow* = #JNSQscience_bd_TrappedRadiation_RigaInSpaceLow_00 // Riga shows no signature of its own belts; the radiation comes in broad waves that match Lindor's influence.
        RigaInSpaceLow* = #JNSQscience_bd_TrappedRadiation_RigaInSpaceLow_01 // The numbers wobble with orientation, as if you're skimming an uneven field rather than orbiting a trapped population.
        RigaInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_RigaInSpaceHigh_00 // At altitude, the belt structure weakens and breaks up, hinting that Riga sits near the fringe of the trapped region.
        RigaInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_RigaInSpaceHigh_01 // What remains is mostly background, with just enough organized flux to remind you Lindor is still in charge.

        TalosInSpaceLow* = #JNSQscience_bd_TrappedRadiation_TalosInSpaceLow_00 // Talos has no trapped belts to speak of; the detector mostly records quiet background with rare, wandering spikes.
        TalosInSpaceLow* = #JNSQscience_bd_TrappedRadiation_TalosInSpaceLow_01 // If Lindor has belts out here, they're too faint or too far away to hold together around Talos.
        TalosInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_TalosInSpaceHigh_00 // The readings settle into a flat baseline; whatever trapping exists closer in does not reliably reach this far.
        TalosInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_TalosInSpaceHigh_01 // The instrument files this under "nothing to trap" and suggests you look for excitement somewhere else.

        CelesInSpaceLow* = #JNSQscience_bd_TrappedRadiation_CelesInSpaceLow_00 // The detector searches for tidy radiation belts and finds none—just the usual background and a few stubborn spikes.
        CelesInSpaceLow* = #JNSQscience_bd_TrappedRadiation_CelesInSpaceLow_01 // Whatever charge is drifting around Celes refuses to stay put; there’s no magnetic cage to hold a belt together.
        CelesInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_CelesInSpaceHigh_00 // Higher up, the readings smooth into a quiet baseline. Celes isn’t trapping anything—only your expectations.
        CelesInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_CelesInSpaceHigh_01 // You try different passes and angles, but the “belt map” stays blank. Background particles win by default.

        TamInSpaceLow* = #JNSQscience_bd_TrappedRadiation_TamInSpaceLow_00 // No trapped belts show up around Tam. The only “belt” here is Kuiper Kerman’s, and it’s not radioactive.
        TamInSpaceLow* = #JNSQscience_bd_TrappedRadiation_TamInSpaceLow_01 // Tam is too small and too unmagnetic to corral particles; the detector records a thin drizzle and moves on.
        TamInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_TamInSpaceHigh_00 // In high space, the counts look like open vacuum with a bit of attitude—no structure, no confinement, no belts.
        TamInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_TamInSpaceHigh_01 // You run the scan again just to be sure. Tam remains unimpressed and thoroughly beltless.

        HamekInSpaceLow* = #JNSQscience_bd_TrappedRadiation_HamekInSpaceLow_00 // The instrument finds no stable trapped populations around Hamek; whatever particles arrive quickly wander off.
        HamekInSpaceLow* = #JNSQscience_bd_TrappedRadiation_HamekInSpaceLow_01 // Readings wobble slightly as Hamek “dances,” but nothing forms rings or bands—just background with quirks.
        HamekInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_HamekInSpaceHigh_00 // Far above Hamek, the data flattens into ordinary interplanetary radiation levels with no sign of trapping.
        HamekInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_HamekInSpaceHigh_01 // You trace imaginary belt lines in the plot anyway. Mission Control suggests you label them “hope” and “regret.”

        NaraInSpaceLow* = #JNSQscience_bd_TrappedRadiation_NaraInSpaceLow_00 // The detector finds a well-organized belt of trapped particles; Nara’s magnetic field is doing real work out here.
        NaraInSpaceLow* = #JNSQscience_bd_TrappedRadiation_NaraInSpaceLow_01 // Inner-belt counts climb rapidly, then settle into a steady “don’t-touch-anything” level of radiation.
        NaraInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_NaraInSpaceHigh_00 // The outer belt frays into streaks and pockets, as if the magnetosphere is being tugged and stretched.
        NaraInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_NaraInSpaceHigh_01 // You chart the belt’s ragged boundary where trapped particles give way to the open-space flux.

        AmosInSpaceLow* = #JNSQscience_bd_TrappedRadiation_AmosInSpaceLow_00 // Amos has no belts of its own; the radiation pattern matches Nara’s environment, with a neat shadow when Amos blocks the flow.
        AmosInSpaceLow* = #JNSQscience_bd_TrappedRadiation_AmosInSpaceLow_01 // The detector keeps trying to “center” a belt on Amos. The data politely refuses.
        AmosInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_AmosInSpaceHigh_00 // High over Amos, you’re basically sampling the same broad belt sheet again and again as the orbit carries you through it.
        AmosInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_AmosInSpaceHigh_01 // Any trapping here is clearly borrowed—Amos is just a dark rock taking cover in Nara’s magnetic wake.

        EnonInSpaceLow* = #JNSQscience_bd_TrappedRadiation_EnonInSpaceLow_00 // Charged particles plunge toward Enon’s surface and vanish from the counts, like the moon is quietly soaking up the belt.
        EnonInSpaceLow* = #JNSQscience_bd_TrappedRadiation_EnonInSpaceLow_01 // The detector sees strong flux nearby, but nothing that stays confined to Enon; it’s all Nara’s trapped population.
        EnonInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_EnonInSpaceHigh_00 // Farther out, the signal smooths into a wide, structured glow—still organized enough to call it a belt, just thinner.
        EnonInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_EnonInSpaceHigh_01 // The belts weaken with altitude, but their shape persists, tracing invisible lines that point back to Nara.

        PraxInSpaceLow* = #JNSQscience_bd_TrappedRadiation_PraxInSpaceLow_00 // Readings jump between “belt” and “not-belt” with sharp edges; Prax is skimming the outskirts of Nara’s trapped region.
        PraxInSpaceLow* = #JNSQscience_bd_TrappedRadiation_PraxInSpaceLow_01 // The detector draws a lopsided belt map and then admits it’s mostly mapping the magnetosphere’s ragged fringe.
        PraxInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_PraxInSpaceHigh_00 // High above Prax, trapped particles become intermittent; you catch brief bursts, then long stretches of quiet background.
        PraxInSpaceHigh* = #JNSQscience_bd_TrappedRadiation_PraxInSpaceHigh_01 // The data marks this altitude as the place where Nara stops being in charge and space starts acting like space again.
    }
}