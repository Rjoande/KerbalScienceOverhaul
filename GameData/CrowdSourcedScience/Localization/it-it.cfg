        #CSS_crewReport_KerbinSrfLandedDeserts_03 = L'equipaggio si lamenta del caldo.
        #CSS_crewReport_KerbinSrfLandedBadlands_00 = Inizi a sentirti molto nervoso per tutte le cattiverie che hai detto sui calanchi.
        #CSS_crewReport_KerbinSrfLandedBadlands_01 = Sei diventato un kerbonauta apposta per stare lontano dai calanchi. E ora eccoti qui. Complimenti.
        #CSS_crewReport_KerbinSrfLandedBadlands_02 = Provi a divertirti. Fallisci.
        #CSS_crewReport_KerbinSrfLandedTundra_00 = Mentre tremi anche dentro una capsula riscaldata, fai fatica a credere che i tuoi antenati vivessero in condizioni simili.
        #CSS_crewReport_KerbinSrfLandedTundra_01 = Guardi fuori dal finestrino lo stentato crescere delle piante e ti chiedi se sia da qui che venne il primo kerbal.
