        AdenSrfLandedMidlands* = #JNSQscience_seismicScan_AdenSrfLandedMidlands_01 // A clean, quick echo suggests compact ground. Aden is small, but it’s not soft.
        AdenSrfLandedHighlands* = #JNSQscience_seismicScan_AdenSrfLandedHighlands_00 // A brief cluster of tiny spikes appears—somewhere nearby, a rock just changed its mind about staying put.
        AdenSrfLandedHighlands* = #JNSQscience_seismicScan_AdenSrfLandedHighlands_01 // The returns look layered and tidy, like the highlands are stacked in thin, cold sheets.
        AdenSrfLandedMountains* = #JNSQscience_seismicScan_AdenSrfLandedMountains_00 // The needle jumps dramatically at the slightest disturbance. Mountains on low gravity are touchy.
        AdenSrfLandedMountains* = #JNSQscience_seismicScan_AdenSrfLandedMountains_01 // Long, ringing echoes bounce through the ridges.
        AdenSrfLandedPoles* = #JNSQscience_seismicScan_AdenSrfLandedPoles_00 // Sharp ticks pepper the trace as the surface contracts and cracks in the cold.
        AdenSrfLandedPoles* = #JNSQscience_seismicScan_AdenSrfLandedPoles_01 // The signal travels cleanly here, suggesting less fluff and more solid material near the surface.

        HuygenSrfLandedLowlands* = #JNSQscience_seismicScan_HuygenSrfLandedLowlands_00 // The ground transmits slow, rolling vibrations, as if thick deposits are gently shifting under their own weight.
        HuygenSrfLandedLowlands* = #JNSQscience_seismicScan_HuygenSrfLandedLowlands_01 // Wind noise hums through the lander, but deeper echoes still return in steady, layered pulses.
        HuygenSrfLandedMidlands* = #JNSQscience_seismicScan_HuygenSrfLandedMidlands_00 // The trace alternates between quiet and soft jitter, like the crust is flexing in slow, patient cycles.
        HuygenSrfLandedMidlands* = #JNSQscience_seismicScan_HuygenSrfLandedMidlands_01 // Reflections arrive slightly smeared, suggesting porous material that soaks up sharp shocks.
        HuygenSrfLandedHighlands* = #JNSQscience_seismicScan_HuygenSrfLandedHighlands_00 // The seismometer records crisp returns with short tails. The high ground feels compact and reliable.
        HuygenSrfLandedHighlands* = #JNSQscience_seismicScan_HuygenSrfLandedHighlands_01 // Occasional deep thumps roll through, spaced too regularly to be random. Something is stressing the interior.
        HuygenSrfLandedMountains* = #JNSQscience_seismicScan_HuygenSrfLandedMountains_00 // A small slide somewhere nearby writes a proud spike across the chart. Steep terrain can’t stay still.
        HuygenSrfLandedMountains* = #JNSQscience_seismicScan_HuygenSrfLandedMountains_01 // Vibrations ring longer than expected, bouncing between fractured ridges like a maze of echoes.
        HuygenSrfLandedPeaks* = #JNSQscience_seismicScan_HuygenSrfLandedPeaks_00 // The baseline chatters with tiny snaps, as if the summit is constantly relieving stress.
        HuygenSrfLandedPeaks* = #JNSQscience_seismicScan_HuygenSrfLandedPeaks_01 // Strong, fast reflections suggest bedrock close by. The peaks feel like they’re holding up the sky out of spite.

        HuygenSrfLandedPolarLowlands* = #JNSQscience_seismicScan_HuygenSrfLandedPolarLowlands_00 // The trace shows slow settling punctuated by sharp pops as cold crust fractures and reseats itself.
        HuygenSrfLandedPolarLowlands* = #JNSQscience_seismicScan_HuygenSrfLandedPolarLowlands_01 // A distant impact arrives as a long, thin ring that takes forever to fade in the dense, cold ground.
        HuygenSrfLandedPoles* = #JNSQscience_seismicScan_HuygenSrfLandedPoles_00 // The seismometer draws neat, brittle spikes—classic “something just cracked” signatures in the extreme cold.
        HuygenSrfLandedPoles* = #JNSQscience_seismicScan_HuygenSrfLandedPoles_01 // Echoes return in multiple layers, hinting at stacked deposits under a hard, frozen lid.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_seismicScan_HuygenSrfLandedPolarHighlands_00 // Clean pings come back quickly, but with odd secondary echoes that suggest buried fractures.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_seismicScan_HuygenSrfLandedPolarHighlands_01 // The ground stays quiet until it suddenly isn’t—one sharp snap, then calm again, like a warning.
        HuygenSrfLandedShores* = #JNSQscience_seismicScan_HuygenSrfLandedShores_00 // Gentle, rhythmic pulses match the surf. The shoreline taps on the seismometer like it owns the place.
        HuygenSrfLandedShores* = #JNSQscience_seismicScan_HuygenSrfLandedShores_01 // Between wave-signatures, a deeper rumble rolls through. You mark it as “not waves” and stop listening for a moment.
