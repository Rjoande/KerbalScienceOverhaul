        KerbinSrfLandedBaikerbanur* = #CSS_mysteryGoo_KerbinSrfLandedBaikerbanur_00 // The Goo turns its nose up at the place.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_mysteryGoo_KerbinSrfLandedBaikerbanurLaunchpad_00 // The Goo asks to be launched from a proper launchpad.
        KerbinSrfLandedCrawlerway* = #CSS_mysteryGoo_KerbinSrfLandedCrawlerway_00 // The Goo stands its ground.
        KerbinSrfLandedFlagPole* = #CSS_mysteryGoo_KerbinSrfLandedFlagPole_00 // The Goo looks up the pole in Awe.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_00 // The Goo doesn't seem to be doing much right now.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_01 // The Goo doesn't seem to be doing much right now. Maybe you should poke it with a stick.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_02 // The Goo seems very excited for what's about to happen.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_03 // The Goo is now a little nervous.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_04 // The Goo wants to go somewhere
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_05 // The Goo appears to be wondering what the next few minutes are going to entail.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_06 // The Goo appears to have braced itself for high g-forces.
        KerbinSrfLandedLaunchPad* = #CSS_mysteryGoo_KerbinSrfLandedLaunchPad_07 // Don't worry, The Goo won't do anything right now. It'll just sit there.
        KerbinSrfLandedMissionControl* = #CSS_mysteryGoo_KerbinSrfLandedMissionControl_00 // The Goo seems enamored with all the flashing lights on the control panels.
        KerbinSrfLandedR&D* = #CSS_mysteryGoo_KerbinSrfLandedR&D_00 // The Goo looks forward to researching the researchers.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_mysteryGoo_KerbinSrfLandedR&DCentralBuilding_00 // The Goo looks around inquisitively at all the eyes peering down at it.
