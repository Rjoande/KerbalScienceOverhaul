		MunInSpaceLowFarsideCrater* = #ScienceRefactor_bd_orbitalScope_MunInSpaceLowFarsideCrater_00 // The dark side of the Mun also has large crater impacts!
		MunInSpaceLowMidlands* = #ScienceRefactor_bd_orbitalScope_MunInSpaceLowMidlands_00 // Very uneven terrain is visible, sometimes eroded to a smooth dune.
		MunInSpaceLowHighlands* = #ScienceRefactor_bd_orbitalScope_MunInSpaceLowHighlands_00 // The Mun's highlands are fairly high above the lowlands. Climbing looks really difficult!
		MunInSpaceLowCanyons* = #ScienceRefactor_bd_orbitalScope_MunInSpaceLowCanyons_00 // Crater impacts and surface erosion looks to have created some interesting canyons on the surface.
		MunInSpaceLow* = #ScienceRefactor_bd_orbitalScope_MunInSpaceLow_00 // Up close, more crater features are visible. Some have very high walls, suggesting a very powerful impact.
		MunInSpaceLow* = #ScienceRefactor_bd_orbitalScope_MunInSpaceLow_01 // There is a lot of interesting rocks and dust visible on the surface.

		MinmusInSpace* = #ScienceRefactor_bd_orbitalScope_MinmusInSpace_00 // The surface is very green, giving rise to speculation about it's correlation with Kerbal DNA.
		MinmusInSpaceLow* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLow_00 // Most of the surface is fairly flat which is easy for landings.
		MinmusInSpaceLow* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLow_01 // The surface appears to be covered in a crystal-like, tasty material.
		MinmusInSpaceLowPoles* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowPoles_00 // The poles have very tall, flat mesa-like structures.
		MinmusInSpaceLowLesserFlats* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowLesserFlats_00 // The topography here is far less exciting than on the midlands.
		MinmusInSpaceLowGreatFlats* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowGreatFlats_00 // Big areas or incredibly boring topography!
		MinmusInSpaceLowGreaterFlats* = #ScienceRefactor_bd_orbitalScope_MinmusInSpaceLowGreaterFlats_00 // Massive areas or incredibly boring topography!

        DunaInSpace* = #ScienceRefactor_bd_orbitalScope_DunaInSpace_00 // Duna's surface is visible with a very reddish-orange, rusty hue.
