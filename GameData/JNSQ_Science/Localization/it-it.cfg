        #JNSQscience_sspxVisualObservation_KerbinSrfLandedAdministration_00 = Attraverso il finestrino osservi un raro ecosistema di pile di carta nel loro habitat naturale. Un impiegato ti chiede di smettere di fissare i moduli riservati.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedAstronautComplex_00 = Nel panorama ci sono attrezzature di addestramento, involucri di snack e un mucchio di asciugamani sospettosamente eroico. L'equipaggio sostiene che sia "realismo da campo".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedCrawlerway_00 = La pista del trasportatore si stende come un cartello perfettamente dritto che dice "non mettere piede qui". Qualcuno radiochiede perché il tuo finestrino stia bighellonando.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedFlagPole_00 = Guardi la bandiera sventolare maestosamente mentre la sicurezza guarda te sventolare in modo sospetto. L'osservazione è valutata "patriottica, in attesa di approvazione".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedLaunchPad_00 = Fuori è tutto sfiati, cavi e dramma. Il team della piattaforma chiede che tu osservi da una distanza più sicura, tipo un altro continente.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedMissionControl_00 = Noti più schermi che mostrano la tua esatta posizione e postura. Il direttore di volo chiede se il finestrino può smettere di essere "telemetria non essenziale".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&D_00 = La vista è un caos di prototipi, etichette di avvertimento e scienziati che si muovono come se tu potessi fare domande. Il finestrino si appanna per autodifesa.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DCentralBuilding_00 = La scena fuori è così ordinata da sembrare pre-approvata. Il tuo rapporto torna con una nota: "Osservare entro i margini standard".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DCornerLab_00 = Noti una tenda, un armadietto chiuso a chiave e un cartello "niente da vedere qui". Il cartello è, ironicamente, la cosa più interessante che vedi.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DMainBuilding_00 = Osservi schemi di camminata frenetica compatibili con una scadenza in avvicinamento dall'orbita. Gli ingegneri chiedono di etichettarlo come "attività nominale".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DObservatory_00 = Osservi il cielo, l'orizzonte e un tecnico che sorveglia con cortesia l'area "niente vibrazioni". Sbatti le palpebre con la massima delicatezza possibile.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DSideLab_00 = Il finestrino incornicia una porta sul retro che si apre solo quando distogli lo sguardo. Le tue note includono "probabile esperimento timido".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DSmallLab_00 = La vista è quasi tutta muro e una sola presa d'aria che sussurra segreti. Uno scienziato chiede perché tu stia "campionando visivamente" la ventilazione.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DTanks_00 = Fuori vedi serbatoi, recinzioni e altre recinzioni, disposte a formare la scritta "assolutamente no". Il finestrino è autorizzato solo alla "visione passiva".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DWindTunnel_00 = Il panorama sembra calmo finché non partono le ventole, poi tutto diventa di traverso ad alta velocità. Qualcuno suggerisce di osservare con meno oggetti in giro.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedRunway_00 = Osservi una pista così piatta che sembra esserne fiera. Il personale di terra ti chiede di smettere di osservare proprio dove i piloti mirano.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPH_00 = La vista dell'hangar degli spazioplani include aerei a metà e opinioni al completo. Un ingegnere fissa il tuo finestrino come se stesse facendo peer review.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHMainBuilding_00 = Guardi le gru scorrere in alto con la sicurezza della burocrazia. Al tuo finestrino viene chiesto di presentare un piano di sollevamento.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHRoundTank_00 = Il serbatoio rotondo sembra più rotondo del previsto, forse di proposito. Un tecnico ti ricorda che l'isolamento non è un'attrazione turistica.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHTanks_00 = File di serbatoi stanno lì in silenzio, sfidandoti a indicarli. Tu indichi comunque: la sicurezza indica te.
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHWaterTower_00 = Osservi una torre dell'acqua che gocciola con la pazienza dei budget di manutenzione. L'addetto alla sicurezza aggiunge: "vietato guardare in su senza elmetto".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedTrackingStationDishEast_00 = La parabola segue il cielo con grazia, poi per un attimo segue te con giudizio. Registri: "acquisizione osservatore inattesa".
        #JNSQscience_sspxVisualObservation_KerbinSrfLandedTrackingStationDishNorth_00 = La parabola ruota con teatralità, come a sottolineare la tua mancanza di autorizzazione. Al tuo finestrino viene consigliato di smettere di far sentire l'antenna osservata.
