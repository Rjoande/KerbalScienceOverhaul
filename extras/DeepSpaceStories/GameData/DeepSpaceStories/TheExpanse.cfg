{
    %RESULTS
    {
        TyloSrfLanded* = #CinematicPack_Expanse_bd_soilScoop_TyloSrfLanded_00 // You scoop up a heavy, gritty handful that behaves more like crushed rock than “soil.” Under Tylo gravity, even a sample bag feels like it wants overtime pay.
        TyloSrfLanded* = #CinematicPack_Expanse_bd_soilScoop_TyloSrfLanded_01 // The scoop scrapes over compacted dust and comes up with sharp grains and a few oddly clumped fines. You note that anything grown here will need imported biology, and a lot of engineering.
    }
