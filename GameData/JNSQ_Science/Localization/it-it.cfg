        #JNSQscience_sspxFishStudy_EnonSrfLanded_00 = Il paesaggio sembra fatto di scuse fredde. I pesci si ammassano intorno al riscaldatore e ti fulminano con lo sguardo per averli portati fin qui.
        #JNSQscience_sspxFishStudy_EnonSrfLanded_01 = Fuori è tutto pallido e immobile. I pesci reagiscono diventando pallidi e immobili, ma solo fino all'ora del pasto.
        #JNSQscience_sspxFishStudy_EnonInSpaceLow_00 = Enon scorre sotto l'habitat come una moneta luminosa e silenziosa. I pesci inseguono la luce che cambia al finestrino come se fosse cibo.
