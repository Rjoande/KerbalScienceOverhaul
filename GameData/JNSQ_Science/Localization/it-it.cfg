        #JNSQscience_bd_cosmicRay_LindorInSpaceLowStormComplex_00 = Lo spettro cambia a metà passaggio, seguendo la posizione della tempesta come se la magnetosfera venisse rimescolata dall'interno.
        #JNSQscience_bd_cosmicRay_LindorInSpaceLowUpperStormDeck_00 = Un fondo duro e nervoso suggerisce il bordo di una fascia: abbastanza vicino da misurarlo, non abbastanza vicino da apprezzarlo.
        #JNSQscience_bd_cosmicRay_KrelSrfLandedLowlands_00 = Il contatore crepita con regolarità: la polvere chiara di Krel non fa nulla, se non rimandarti indietro qualche particella.
