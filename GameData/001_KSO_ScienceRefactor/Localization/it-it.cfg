        #ScienceRefactor_bd_UVspec_DunaInSpaceLow_01 = I dati atmosferici suggeriscono un'atmosfera sottile composta soprattutto da anidride carbonica.
        #ScienceRefactor_bd_UVspec_DunaInSpaceLow_02 = Vengono rilevate aurore di Duna in alcune aree intorno al pianeta.
        #ScienceRefactor_bd_UVspec_DunaInSpaceHigh_00 = L'atmosfera di Duna sembra evaporare lievemente nella scia dietro al pianeta.
        #ScienceRefactor_bd_UVspec_IkeInSpace_00 = Deboli riflessi intorno ai poli potrebbero suggerire la presenza di ghiaccio.
