        EveInSpaceLow* = #CinematicPack_Expanse_bd_UVspec_EveInSpaceLow_01 // A thin ultraviolet shadow drifts downrange like a new plume spreading into the upper haze. The spectrum looks uncomfortably similar to “spent stages,” but nobody uses those words on the record.
