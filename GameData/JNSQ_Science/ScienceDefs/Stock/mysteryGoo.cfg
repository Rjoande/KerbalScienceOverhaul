@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_mysteryGoo_SunFlyingLow_00 // The goo forms a frantic skin of bubbles and tries to crawl behind its own container. The temperature readout politely refuses to cooperate.
    	SunFlyingHigh* = #JNSQscience_mysteryGoo_SunFlyingHigh_00 // The goo goes glassy and still, then flashes with tiny internal sparks whenever the ship shudders. You write down “stimulated by sunlight” and underline it three times.

		MohoSrfLandedPoles* = #JNSQscience_mysteryGoo_MohoSrfLandedPoles_00 // The Goo pulls away from the sunlit side of its container and presses itself into a thin, shivery sheet.
		MohoSrfLandedPoles* = #JNSQscience_mysteryGoo_MohoSrfLandedPoles_01 // The Goo alternates between stiff and sloshy as the light shifts. It seems deeply offended by thermodynamics.
		MohoSrfLandedPolarIceCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedPolarIceCraters_00 // The Goo frosts over on the shadow side and boils on the sun side. It can’t decide whether to freeze or flee.
		MohoSrfLandedPolarIceCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedPolarIceCraters_01 // The Goo grows tiny crystal spikes, then slumps back down when a stray beam of light touches it.
		MohoSrfLandedHighlands* = #JNSQscience_mysteryGoo_MohoSrfLandedHighlands_00 // The Goo clings to one wall of the container and slowly “leans” downhill, like it’s tired of altitude.
		MohoSrfLandedHighlands* = #JNSQscience_mysteryGoo_MohoSrfLandedHighlands_01 // The Goo forms little ridges and folds, then collapses them with a sighing wobble.
		MohoSrfLandedMidlands* = #JNSQscience_mysteryGoo_MohoSrfLandedMidlands_00 // The Goo darkens and becomes sluggish, as if it’s been simmering for a very long time.
		MohoSrfLandedMidlands* = #JNSQscience_mysteryGoo_MohoSrfLandedMidlands_01 // The Goo develops a dusty skin that cracks when it moves. It immediately pretends it didn’t do that.
		MohoSrfLandedExoticCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedExoticCraters_00 // The Goo arranges itself into sharp angles for a moment, as if it’s trying to mimic the terrain’s geometry.
		MohoSrfLandedExoticCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedExoticCraters_01 // The Goo cycles through colors you don’t remember approving for the palette, then settles on “worrying.”
		MohoSrfLandedRareCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedRareCraters_00 // The Goo becomes unusually calm and clear, like it’s paying close attention to something underfoot.
		MohoSrfLandedRareCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedRareCraters_01 // The Goo gathers into a tight, glossy lump and refuses to spread out. It seems to be “thinking.”
		MohoSrfLandedVoronoiCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedVoronoiCraters_00 // The Goo splits into little cells that press against each other, then recombines when you get a camera out.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedVoronoiCraters_01 // The Goo traces a faint honeycomb pattern along the container walls and vibrates with satisfaction.
		MohoSrfLandedNotableCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedNotableCraters_00 // The Goo surges up the sides of the container and then drops with a heavy slosh, as if startled by the view.
		MohoSrfLandedNotableCraters* = #JNSQscience_mysteryGoo_MohoSrfLandedNotableCraters_01 // The Goo briefly forms a miniature crater inside the canister, complete with a tiny “rim,” then smooths it away.
		MohoSrfLandedPeaks* = #JNSQscience_mysteryGoo_MohoSrfLandedPeaks_00 // The Goo stretches upward in a thin column, wobbles dramatically, and then collapses like a failed flagpole.
