@EXPERIMENT_DEFINITION:HAS[#id[bd_gammaRay]]
{
    %RESULTS
    {
        MohoInSpaceLow* = #JNSQscience_bd_gammaRay_MohoInSpaceLow_00 // The gamma-ray spectrum shows a narrow belt of distinct elemental ratios tracing a crisp scarp line. The anomaly is consistent with relatively fresh material exposed by recent slip rather than space-weathered surface fines.
		MohoInSpaceLow* = #JNSQscience_bd_gammaRay_MohoInSpaceLow_01 // Several young-looking crater floors return a cleaner, higher-contrast signature than their surroundings. The data suggest impact-mixed units where disturbed regolith has not yet homogenized back into the older surface layer.
		MohoInSpaceLow* = #JNSQscience_bd_gammaRay_MohoInSpaceLow_02 // A patchwork of small hotspots appears along ridges and fracture intersections, repeating on multiple passes. The simplest explanation is localized resurfacing—thin veneers of sorted regolith revealing slightly different underlying chemistry.

		EdnaInSpaceLow* = #JNSQscience_bd_gammaRay_EdnaInSpaceLow_00 // Low-orbit passes pick out bright hydrogen signatures around the polar ice craters; the rest is stubbornly dark and dry.
		EdnaInSpaceLow* = #JNSQscience_bd_gammaRay_EdnaInSpaceLow_01 // Gamma lines suggest carbon-rich dust laced with a few metallic hotspots—like someone salted the regolith with ore.

		EdnaInSpaceHigh* = #JNSQscience_bd_gammaRay_EdnaInSpaceHigh_00 // From high orbit the spectrum averages out: a cold, carbon-heavy world with just enough hydrogen to keep the polar whites honest.
		EdnaInSpaceHigh* = #JNSQscience_bd_gammaRay_EdnaInSpaceHigh_01 // Background bursts keep photobombing the scan; Edna seems content to hide its chemistry behind noise and shadow.

		DakInSpaceLow* = #JNSQscience_bd_gammaRay_DakInSpaceLow_00 // Dak’s lumpy “potato” shape makes the counts wobble, but the spectrum comes back rock-and-metal with patches of hydrated minerals.
		DakInSpaceLow* = #JNSQscience_bd_gammaRay_DakInSpaceLow_01 // A handful of boulders glow with potassium and thorium lines; the rest is quiet, like a very stubborn pebble.

		DakInSpaceHigh* = #JNSQscience_bd_gammaRay_DakInSpaceHigh_00 // At this distance the gamma map is basically one pixel: mostly silicates, some iron, no surprises. Still potato.
		DakInSpaceHigh* = #JNSQscience_bd_gammaRay_DakInSpaceHigh_01 // Even in high orbit, the signal flickers as Dak spins; the detector logs a siren-song of repeating peaks.

        LindorInSpace* = #JNSQscience_bd_gammaRay_LindorInSpace_00 // The spectrum is mostly hydrogen and helium, with a faint methane fingerprint hiding in the noise.
		LindorInSpace* = #JNSQscience_bd_gammaRay_LindorInSpace_01 // Radiation spikes keep trying to steal the show; the readout suggests Lindor has opinions about “quiet” measurements.

		LindorInSpaceLow* = #JNSQscience_bd_gammaRay_LindorInSpaceLow_00 // Low over the cloudtops, the counts surge and dip with the bands below. Chemistry by weather.
		LindorInSpaceLow* = #JNSQscience_bd_gammaRay_LindorInSpaceLow_01 // The detector flirts with saturation near the bright belts; you log “interesting” and then add three more exclamation points.

		LindorInSpaceHigh* = #JNSQscience_bd_gammaRay_LindorInSpaceHigh_00 // From high orbit, Lindor smooths into a cold, light-gas giant with a stubborn methane trace.
		LindorInSpaceHigh* = #JNSQscience_bd_gammaRay_LindorInSpaceHigh_01 // Most of what you see is background, until Lindor’s radiation belts punch through like a signature.

		KrelInSpace* = #JNSQscience_bd_gammaRay_KrelInSpace_00 // Krel reads as ice-heavy with a rocky backbone; hydrogen peaks suggest a lot of frozen something-or-other.
		KrelInSpace* = #JNSQscience_bd_gammaRay_KrelInSpace_01 // A few hotspots hint at exposed rock or fresher material, like Krel has been lightly sandblasted.

		KrelInSpaceLow* = #JNSQscience_bd_gammaRay_KrelInSpaceLow_00 // Close in, the ice signal sharpens and the map turns patchy. Clean plains broken by darker, dirtier scars.
		KrelInSpaceLow* = #JNSQscience_bd_gammaRay_KrelInSpaceLow_01 // Lindor’s environment keeps peppering the detector; you can almost feel Krel being “weathered” without weather.

		KrelInSpaceHigh* = #JNSQscience_bd_gammaRay_KrelInSpaceHigh_00 // At altitude, Krel averages into “ice with a side of silicate,” served cold.
		KrelInSpaceHigh* = #JNSQscience_bd_gammaRay_KrelInSpaceHigh_01 // The peaks repeat with Krel’s rotation, neatly confirming it really is as pale as it looks.

		AdenInSpace* = #JNSQscience_bd_gammaRay_AdenInSpace_00 // Aden’s overall spectrum leans rocky and carbon-dark, like someone swapped the ice for dust.
		AdenInSpace* = #JNSQscience_bd_gammaRay_AdenInSpace_01 // Trace hydrogen shows up in just enough places to make you suspicious of buried frost.

		AdenInSpaceLow* = #JNSQscience_bd_gammaRay_AdenInSpaceLow_00 // Low passes reveal scattered thorium/potassium lines. Tiny “hot” spots in a very cold world.
		AdenInSpaceLow* = #JNSQscience_bd_gammaRay_AdenInSpaceLow_01 // The map shows darker patches with different chemistry, suggesting Aden is not one uniform marble after all.

		AdenInSpaceHigh* = #JNSQscience_bd_gammaRay_AdenInSpaceHigh_00 // From high orbit, Aden is mostly quiet: rock, carbon, and a stubborn lack of drama.
		AdenInSpaceHigh* = #JNSQscience_bd_gammaRay_AdenInSpaceHigh_01 // The signal is clean enough that the team starts arguing over the calibration instead of the geology.

		HuygenInSpace* = #JNSQscience_bd_gammaRay_HuygenInSpace_00 // The atmosphere eats most of the surface signal; what remains looks like nitrogen with a methane seasoning.
		HuygenInSpace* = #JNSQscience_bd_gammaRay_HuygenInSpace_01 // Gamma flashes from high-energy hits in the haze make the planet look like it’s quietly sparkling.

		HuygenInSpaceLow* = #JNSQscience_bd_gammaRay_HuygenInSpaceLow_00 // Down in low orbit, the detector fights the smog; the spectrum is dominated by atmospheric interactions, not ground truth.
		HuygenInSpaceLow* = #JNSQscience_bd_gammaRay_HuygenInSpaceLow_01 // Methane-related lines come and go with the thickest haze. Chemistry by fogbank.

		HuygenInSpaceHigh* = #JNSQscience_bd_gammaRay_HuygenInSpaceHigh_00 // From high orbit, Huygen becomes a smooth, hazy signature with only broad hints of what’s underneath.
		HuygenInSpaceHigh* = #JNSQscience_bd_gammaRay_HuygenInSpaceHigh_01 // You catch a repeating pattern that might be surface… or it might be your instrument pleading for clearer air.

		RigaInSpace* = #JNSQscience_bd_gammaRay_RigaInSpace_00 // Riga shows a clean nitrogen signature with just enough other lines to suggest dusting from micrometeors.
		RigaInSpace* = #JNSQscience_bd_gammaRay_RigaInSpace_01 // The overall composition looks rock-and-ice under a thin veil, like a world wearing a very light mask.

		RigaInSpaceLow* = #JNSQscience_bd_gammaRay_RigaInSpaceLow_00 // Low orbit finally pulls out surface chemistry: silicates with patches that read slightly more icy than expected.
		RigaInSpaceLow* = #JNSQscience_bd_gammaRay_RigaInSpaceLow_01 // A few areas spike in radioactive elements; the map labels them “interesting,” which is science for “go there.”

		RigaInSpaceHigh* = #JNSQscience_bd_gammaRay_RigaInSpaceHigh_00 // At distance, Riga averages into a tidy profile: mostly rock, some ice, minimal atmosphere clutter.
		RigaInSpaceHigh* = #JNSQscience_bd_gammaRay_RigaInSpaceHigh_01 // The peaks line up cleanly from pass to pass, as if Riga is trying very hard to be cooperative.

		TalosInSpace* = #JNSQscience_bd_gammaRay_TalosInSpace_00 // Talos looks like mixed ice and rock, with a chemistry that doesn’t quite match its neighbors.
		TalosInSpace* = #JNSQscience_bd_gammaRay_TalosInSpace_01 // The spectrum is oddly subdued: either Talos is bland, or it’s hiding its good stuff under a tired surface.

		TalosInSpaceLow* = #JNSQscience_bd_gammaRay_TalosInSpaceLow_00 // Close passes reveal patchy hydrogen and darker rocky zones, like Talos was built from leftovers and then polished.
		TalosInSpaceLow* = #JNSQscience_bd_gammaRay_TalosInSpaceLow_01 // A few fresh-looking spots pop with distinct peaks, suggesting recent exposure… or very persistent impacts.

		TalosInSpaceHigh* = #JNSQscience_bd_gammaRay_TalosInSpaceHigh_00 // From high orbit, Talos blends into a cold, two-tone signature: ice-rich overall, rockier in the details.
		TalosInSpaceHigh* = #JNSQscience_bd_gammaRay_TalosInSpaceHigh_01 // The detector logs a steady, repeating set of peaks. No surprises, just a long-distance confirmation that Talos is real.

        CelesInSpaceLow* = #JNSQscience_bd_gammaRay_CelesInSpaceLow_00 // Low-orbit sweeps light up the poles with strong hydrogen lines; the cold traps are doing their job.
		CelesInSpaceLow* = #JNSQscience_bd_gammaRay_CelesInSpaceLow_01 // The surface reads as clean ice over rock, with a few oddly “spicy” patches rich in potassium and thorium.

		CelesInSpaceHigh* = #JNSQscience_bd_gammaRay_CelesInSpaceHigh_00 // From high orbit, Celes averages into “ice first, silicates second,” with just enough hydrogen to keep everyone optimistic.
		CelesInSpaceHigh* = #JNSQscience_bd_gammaRay_CelesInSpaceHigh_01 // A few repeating hotspots refuse to explain themselves; the science team starts using the term “classified” as a unit of measurement.

		TamInSpaceLow* = #JNSQscience_bd_gammaRay_TamInSpaceLow_00 // The counts jitter as Tam tumbles beneath you; the detector confirms it is, in fact, made of “lumpy.”
		TamInSpaceLow* = #JNSQscience_bd_gammaRay_TamInSpaceLow_01 // Fresh-looking crater rims show sharper peaks than the dark flats, like Tam keeps getting resurfaced one impact at a time.

		TamInSpaceHigh* = #JNSQscience_bd_gammaRay_TamInSpaceHigh_00 // At altitude the spectrum smooths out into dry rock with scattered metal signatures. An asteroid that forgot to leave.
		TamInSpaceHigh* = #JNSQscience_bd_gammaRay_TamInSpaceHigh_01 // The strongest lines repeat with Tam’s rotation, neatly proving it has just enough order to be annoying.

		HamekInSpaceLow* = #JNSQscience_bd_gammaRay_HamekInSpaceLow_00 // Low passes find heavy-element peaks that don’t match the “pretty red” exterior; the color is not doing the chemistry any favors.
		HamekInSpaceLow* = #JNSQscience_bd_gammaRay_HamekInSpaceLow_01 // Several regions spike in potassium/thorium lines, as if Hamek’s surface has been dusted with something it didn’t earn.

		HamekInSpaceHigh* = #JNSQscience_bd_gammaRay_HamekInSpaceHigh_00 // From high orbit, Hamek’s spectrum stays stubbornly odd—rocky overall, with broad peaks that hint at an unusual mix.
		HamekInSpaceHigh* = #JNSQscience_bd_gammaRay_HamekInSpaceHigh_01 // The detector logs a clean, steady signal; whatever makes Hamek strange is baked in, not a passing effect.

        NaraInSpaceLow* = #JNSQscience_bd_gammaRay_NaraInSpaceLow_00 // Low over Nara’s clouds, most of the gamma counts are the atmosphere arguing with incoming radiation; you tease out a few stubborn surface peaks anyway.
		NaraInSpaceLow* = #JNSQscience_bd_gammaRay_NaraInSpaceLow_01 // The scan hints at rockier “islands” beneath the haze, with broad potassium/thorium lines that don’t match a purely fluffy world.

		NaraInSpaceHigh* = #JNSQscience_bd_gammaRay_NaraInSpaceHigh_00 // From high orbit, Nara averages into a smooth, faint spectrum. Too much atmosphere, too little certainty, and just enough signal to be unsettling.
		NaraInSpaceHigh* = #JNSQscience_bd_gammaRay_NaraInSpaceHigh_01 // The detector logs repeating bursts as Nara turns; the team debates whether it’s composition… or the planet politely refusing to be summarized.

		AmosInSpaceLow* = #JNSQscience_bd_gammaRay_AmosInSpaceLow_00 // Close passes show Amos is mostly quiet rock with scattered hydrogen peaks—patchy frost hiding in shadows and cracks.
		AmosInSpaceLow* = #JNSQscience_bd_gammaRay_AmosInSpaceLow_01 // A few tiny hotspots spike with heavy-element lines; for such a plain-looking moon, Amos keeps secrets in small places.

		AmosInSpaceHigh* = #JNSQscience_bd_gammaRay_AmosInSpaceHigh_00 // At altitude, Amos becomes a simple signature: dry silicates, a trace of metal, and a thin whisper of volatiles.
		AmosInSpaceHigh* = #JNSQscience_bd_gammaRay_AmosInSpaceHigh_01 // The clean spectrum makes it look boring, until you remember that “clean” just means you haven’t looked closely enough yet.

		EnonInSpaceLow* = #JNSQscience_bd_gammaRay_EnonInSpaceLow_00 // Low orbit lights up Enon with strong hydrogen and oxygen lines; it’s an ice world that’s not shy about being ice.
		EnonInSpaceLow* = #JNSQscience_bd_gammaRay_EnonInSpaceLow_01 // Darker patches read “dirtier,” with extra peaks suggesting mixed, in rock and impact, delivered grit.

		EnonInSpaceHigh* = #JNSQscience_bd_gammaRay_EnonInSpaceHigh_00 // From high orbit, Enon smooths into bright, cold chemistry—ice first, everything else second.
		EnonInSpaceHigh* = #JNSQscience_bd_gammaRay_EnonInSpaceHigh_01 // The spectrum stays steady and pale, like Enon is trying to convince you it’s simple while the map says otherwise.

		PraxInSpaceLow* = #JNSQscience_bd_gammaRay_PraxInSpaceLow_00 // Close passes show Prax as a rough blend of rock and ice; hydrogen peaks cluster around scarred terrain and fresh-looking edges.
		PraxInSpaceLow* = #JNSQscience_bd_gammaRay_PraxInSpaceLow_01 // Several regions pop with potassium/thorium lines, as if Prax has been collecting “interesting” dust for a very long time.

		PraxInSpaceHigh* = #JNSQscience_bd_gammaRay_PraxInSpaceHigh_00 // At distance, Prax averages into a frontier mixture: not quite icy enough to be gentle, not quite rocky enough to be straightforward.
		PraxInSpaceHigh* = #JNSQscience_bd_gammaRay_PraxInSpaceHigh_01 // The repeating peaks are reassuringly consistent, until you realize consistency just means Prax has been like this the whole time.
    }
}
