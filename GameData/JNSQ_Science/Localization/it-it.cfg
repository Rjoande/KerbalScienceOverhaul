        #JNSQscience_gravityScan_TalosInSpaceHighMountains_00 = Anche da qui, le montagne contribuiscono con una trazione sbilanciata: inizi a sospettare che Talos sia volutamente un po' fuori forma.
        #JNSQscience_gravityScan_TalosInSpaceHighPoles_00 = La scansione suggerisce un minuscolo bias polare e un debole stiramento mareale verso Lindor. Talos viene tirato, e lascia numeri dietro di sé.
        #JNSQscience_gravityScan_EelooSrfLandedPoles_00 = Il rilevatore di gravioli trema: questo ghiaccio polare sembra più leggero di quanto appaia, come se fosse pieno di minuscoli vuoti.
        #JNSQscience_gravityScan_EelooSrfLandedPoles_01 = Le letture suggeriscono un nucleo denso nascosto sotto una soffice calotta di brina: i numeri non corrispondono alle cartoline.
        #JNSQscience_gravityScan_EelooSrfLandedHighlands_00 = Nelle colline la gravità aumenta un poco. O il terreno è più denso qui, oppure i tuoi stivali stanno diventando più pesanti.
