        TyloSrfLandedGagarinCrater* = #CSS_Aebestach_crewReport_Tylo_04 // Tylo's three great craters. Tycho, Galileo, Grissom, Gagarin salute you.
        TyloSrfLandedGrissomCrater* = #CSS_Aebestach_crewReport_Tylo_03 // Tylo major craters. Bigger scars.
        TyloSrfLandedGrissomCrater* = #CSS_Aebestach_crewReport_Tylo_04 // Tylo's three great craters. Tycho, Galileo, Grissom, Gagarin salute you.
        TyloSrfLandedGalileioCrater* = #CSS_Aebestach_crewReport_Tylo_03 // Tylo major craters. Bigger scars.
        TyloSrfLandedGalileioCrater* = #CSS_Aebestach_crewReport_Tylo_04 // Tylo's three great craters. Tycho, Galileo, Grissom, Gagarin salute you.
    }
