        #JNSQscience_gravityScan_MinmusInSpaceLowBasins_01 = Il rilevatore traccia curve uniformi sopra queste ampie conche. È la mappa più ordinata di tutta la missione.
        #JNSQscience_gravityScan_MinmusInSpaceLowBrownBasins_00 = I fondi dei bacini più scuri mostrano un'influenza leggermente più forte rispetto al terreno vicino. Laggiù qualcosa si prende sul serio.
