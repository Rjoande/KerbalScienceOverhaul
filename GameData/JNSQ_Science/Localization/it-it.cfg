        #JNSQscience_sspxFishStudy_DakSrfLanded_00 = La bassa gravità del veicolo trasforma l'ora del pasto in una caccia tridimensionale. I pesci stanno vincendo.
        #JNSQscience_sspxFishStudy_DakSrfLanded_01 = Metti in sicurezza l'acquario per le "vibrazioni da mondo patata". I pesci lo interpretano come una nuova attrazione.
        #JNSQscience_sspxFishStudy_DakInSpaceLow_00 = Le correnti della vasca formano strani anelli mentre Dak ruota sotto. I pesci lo trattano come uno sport.
