        #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideLowlands_00 = Sopra il lato oscuro, i bassopiani sembrano lisci e freddi, definiti solo da un bordo di luce. L'immagine sembra mancare apposta di qualcosa di essenziale.
        #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideLowlands_01 = La fotocamera rileva minuscoli puntini luminosi che potrebbero essere brina o polvere vetrosa. Invi il dettaglio e aspetti nel lungo silenzio che qualcun altro lo interpreti.
