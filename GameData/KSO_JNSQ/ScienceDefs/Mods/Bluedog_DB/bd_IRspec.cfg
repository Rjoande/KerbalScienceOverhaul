		MunInSpaceLowExoticCraters* = #JNSQscience_bd_IRspec_MunInSpaceLowExoticCraters_00 // These craters show mismatched bands: either the rock is different or the Mun is being difficult.
		MunInSpaceLowRareCraters* = #JNSQscience_bd_IRspec_MunInSpaceLowRareCraters_00 // The pits stay cooler than their neighbors: the sensor flags them as unusually insulating.
