        #JNSQscience_sspxFishStudy_TamInSpaceHigh_00 = Tam svanisce in un granello e la cabina sembra più piccola. I pesci aumentano il loro "spazio personale" reclamando l'intera vasca.
        #JNSQscience_sspxFishStudy_TamInSpaceHigh_01 = Registri "attività ridotta nello spazio profondo". I pesci registrano "pazienza ridotta con l'osservatore".
        #JNSQscience_sspxFishStudy_HamekSrfLanded_00 = Il colore della superficie fa sembrare normale, per confronto, l'acqua della vasca. I pesci fissano fuori come se il pianeta lo stesse facendo apposta.
        #JNSQscience_sspxFishStudy_HamekSrfLanded_01 = Polvere e ombre giocano brutti scherzi con la luce. I pesci inseguono riflessi fantasma, poi sembrano imbarazzati quando te ne accorgi.
        #JNSQscience_sspxFishStudy_HamekInSpaceLow_00 = Le strane tonalità di Hamek scorrono sotto di te come vernice rovesciata. I pesci seguono il panorama e per un intero minuto si dimenticano di essere drammatici.
        #JNSQscience_sspxFishStudy_HamekInSpaceLow_01 = Le piccole vibrazioni dell'habitat creano dolci onde stazionarie nella vasca. I pesci le trattano come un tappeto mobile gratuito.
        #JNSQscience_sspxFishStudy_HamekInSpaceHigh_00 = Da quassù, Hamek diventa una macchiolina rossa in un oceano di nero. I pesci rallentano e sembrano irritati con aria pensierosa.
        #JNSQscience_sspxFishStudy_HamekInSpaceHigh_01 = Le luci della vasca scattano in "modalità notte". I pesci passano subito alla "modalità mistero" e si rifiutano di spiegarsi.
        #JNSQscience_sspxFishStudy_NaraSrfLanded_00 = Fuori, la foschia gelida di Nara preme contro l'habitat. Dentro, i pesci restano nell'angolo più caldo come se fosse un parco nazionale.
