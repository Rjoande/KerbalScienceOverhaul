        #ScienceRefactor_bd_UVspec_GillyInSpaceHigh_00 = Non viene rilevata alcuna atmosfera intorno a questa piccola luna.
        #ScienceRefactor_bd_UVspec_KerbinInSpaceLow_00 = L'atmosfera di Kerbin assorbe una grande quantità di radiazione UV.
        #ScienceRefactor_bd_UVspec_KerbinInSpaceLow_01 = L'indice UV è alto. Il Controllo Missione annulla il picnic di oggi.
