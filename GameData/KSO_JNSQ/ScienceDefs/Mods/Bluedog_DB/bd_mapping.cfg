        HuygenInSpaceLowLowlands* = #JNSQ_bd_mapping_HuygenInSpaceLowLowlands_00 // Through Huygen's amber haze, the lowlands show up as broad, dark smudges. This is what "mapping" looks like when the atmosphere refuses to cooperate.
