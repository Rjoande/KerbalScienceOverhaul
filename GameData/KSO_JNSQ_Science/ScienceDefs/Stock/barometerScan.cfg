@EXPERIMENT_DEFINITION:HAS[#id[barometerScan]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_barometerScan_SunFlyingLow_00 // The barometer hovers near “very low” and jitters wildly. The casing is too hot to interpret the data with confidence.
        SunFlyingHigh* = #JNSQscience_barometerScan_SunFlyingHigh_00 // The pressure is barely distinguishable from vacuum. The barometer suggests you are “probably in space,” which feels accurate.
        SunInSpaceLow* = #JNSQscience_barometerScan_SunInSpaceLow_00 // The instrument reads 0.00 kPa, with brief spikes when energetic particles smack the sensor.
        SunInSpaceHigh* = #JNSQscience_barometerScan_SunInSpaceHigh_00 // The barometer reads 0.00 kPa. Interplanetary space is impressively consistent in its lack of pressure.

        Moho* = #JNSQscience_barometerScan_Moho_00 // The barometer reads zero with enviable confidence, as if proud to contribute absolutely nothing.
        Moho* = #JNSQscience_barometerScan_Moho_01 // The instrument logs “0.00” so many times it starts auto-completing the entry.
        MohoSrfLanded* = #JNSQscience_barometerScan_MohoSrfLanded_00 // You recalibrate twice. The instrument insists it is working; the world just isn’t cooperating.
        MohoSrfLanded* = #JNSQscience_barometerScan_MohoSrfLanded_01 // The barometer detects a brief spike when dust hits the sensor, then returns to “vacuum” like nothing happened.
        MohoSrfLanded* = #JNSQscience_barometerScan_MohoSrfLanded_00 // The barometer records zero, with tiny bumps that correlate suspiciously well with you moving the craft.
        MohoSrfLandedCraters* = #JNSQscience_barometerScan_MohoSrfLandedCraters_00 // The crater floor is airless and silent. The only pressure here is the schedule.
        MohoInSpace* = #JNSQscience_barometerScan_MohoInSpace_00 // The barometer reads zero and, for once, you can’t argue with it.
        MohoInSpace* = #JNSQscience_barometerScan_MohoInSpace_01 // Pressure remains indistinguishable from vacuum. Space continues to be space.
        MohoInSpaceHigh* = #JNSQscience_barometerScan_MohoInSpaceHigh_00 // High above Moho, the barometer reports the same atmospheric conditions as everywhere else out here: none.
        MohoInSpaceHigh* = #JNSQscience_barometerScan_MohoInSpaceHigh_01 // You confirm that the universe is still a vacuum. The instrument seems satisfied with this important discovery.

        EveSrfLandedShores* = #JNSQscience_barometerScan_EveSrfLandedShores_00 // The barometer reports sea-level pressure with a straight face.
        EveSrfLandedKrakensWell* = #JNSQscience_barometerScan_EveSrfLandedKrakensWell_00 // Near the rim, the needle wobbles in tiny steps that don’t match your altitude. You log it and back away.
        EveSrfLandedKrakensWell* = #JNSQscience_barometerScan_EveSrfLandedKrakensWell_01 // The barometer makes a faint “ping” as its casing flexes. The Well makes everything feel a little too quiet.
        EveSrfSplashedSeaofAkron* = #JNSQscience_barometerScan_EveSrfSplashedSeaofAkron_00 // The barometer logs minute pressure changes as the craft bobs on slow swells. The baseline stays terrifying.
        EveSrfSplashedSeaofAkron* = #JNSQscience_barometerScan_EveSrfSplashedSeaofAkron_01 // You wonder what the pressure is under the surface. The barometer makes an unhappy noise and refuses to help.
        EveSrfSplashedSeaofNessus* = #JNSQscience_barometerScan_EveSrfSplashedSeaofNessus_00 // The scale ends before the needle does. You consider this a design flaw.
        EveSrfSplashedSeaofNessus* = #JNSQscience_barometerScan_EveSrfSplashedSeaofNessus_01 // Every swell makes the reading flicker, like the sea is tapping the gauge for emphasis.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_barometerScan_EveSrfSplashedSeaofTaniwha_00 // The needle pulses in a repeating rhythm. You decide the sea is “breathing” and immediately regret the thought.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_barometerScan_EveSrfSplashedSeaofTaniwha_01 // The barometer keeps insisting the pressure is fine, as long as “fine” means “don’t open anything”.
        EveSrfSplashedSeaofGigan* = #JNSQscience_barometerScan_EveSrfSplashedSeaofGigan_00 // The readout shifts slowly with the heavy swells, as if even the pressure is moving in syrup.
        EveSrfSplashedSeaofGigan* = #JNSQscience_barometerScan_EveSrfSplashedSeaofGigan_01 // Dense sea, dense sky, dense numbers. The barometer is having the time of its life. You are not.
        EveSrfSplashedSeaofRodan* = #JNSQscience_barometerScan_EveSrfSplashedSeaofRodan_00 // Wind-driven chop makes the needle chatter constantly. The average is still “crushing”.
        EveSrfSplashedSeaofRodan* = #JNSQscience_barometerScan_EveSrfSplashedSeaofRodan_01 // The barometer’s casing pops softly as it flexes. You tell yourself that means it’s working.
        EveSrfSplashedSeaofGojira* = #JNSQscience_barometerScan_EveSrfSplashedSeaofGojira_00 // The needle pegs, unpegs, then pegs again. You interpret this as a very scientific “Eve”.
        EveSrfSplashedSeaofGojira* = #JNSQscience_barometerScan_EveSrfSplashedSeaofGojira_01 // The hull creaks, the needle twitches, and the sea keeps pretending it’s not involved.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_barometerScan_EveSrfSplashedSeaofGhidorah_00 // Three wave patterns cross at once, and the barometer records three different little wobbles. It looks confused.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_barometerScan_EveSrfSplashedSeaofGhidorah_01 // The needle draws a messy knot of motion. You name the data file “NO THANKS”
        EveSrfSplashedSeaofBagorah* = #JNSQscience_barometerScan_EveSrfSplashedSeaofBagorah_00 // Sticky spray coats everything, including the instrument window. The pressure reading remains perfectly smug.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_barometerScan_EveSrfSplashedSeaofBagorah_01 // The barometer reports sea-level pressure. *Eve* sea-level pressure.

        KerbinSrfLandedLowlands* = #JNSQscience_barometerScan_KerbinSrfLandedLowlands_00 // The needle barely moves in the lowlands. Either the air is stable, or the barometer is bored.
        KerbinSrfLandedLowlands* = #JNSQscience_barometerScan_KerbinSrfLandedLowlands_01 // Pressure is steady and reassuring down here. You decide this counts as an emotional reading, too.
        KerbinSrfLandedAridLowlands* = #JNSQscience_barometerScan_KerbinSrfLandedAridLowlands_00 // Hot, dry air presses down like a warm blanket. The barometer looks thirsty.
        KerbinSrfLandedAridLowlands* = #JNSQscience_barometerScan_KerbinSrfLandedAridLowlands_01 // No clouds, no rain, just a stubbornly steady pressure reading and an impressive amount of dust.
        KerbinSrfLandedAridMountains* = #JNSQscience_barometerScan_KerbinSrfLandedAridMountains_00 // Thin, parched air up here; the barometer gives a smaller number and a larger sigh.
        KerbinSrfLandedAridMountains* = #JNSQscience_barometerScan_KerbinSrfLandedAridMountains_01 // Your notes say “arid mountains: still Kerbin.” Mission Control sounds relieved.
        KerbinSrfLandedGreatLake* = #JNSQscience_barometerScan_KerbinSrfLandedGreatLake_00 // A cool breeze off the great lake nudges the needle. Humidity is trying its best.
        KerbinSrfLandedGreatLake* = #JNSQscience_barometerScan_KerbinSrfLandedGreatLake_01 // The barometer hints at weather later. You start scouting for shelter and snacks.
        KerbinSrfLandedInlandWater* = #JNSQscience_barometerScan_KerbinSrfLandedInlandWater_00 // The instrument detects damp inland air. Your visor does too.
        KerbinSrfLandedInlandWater* = #JNSQscience_barometerScan_KerbinSrfLandedInlandWater_01 // You take the reading, then watch the ripples and pretend they’re part of the data.
        KerbinSrfLandedKreenwichSea* = #JNSQscience_barometerScan_KerbinSrfLandedKreenwichSea_00 // Sea air is thick with salt and confidence. Pressure is high and steady.
        KerbinSrfLandedKreenwichSea* = #JNSQscience_barometerScan_KerbinSrfLandedKreenwichSea_01 // The needle sways with the gusts; you blame the sea breeze, not your handwriting.
        KerbinSrfLandedArcticSea* = #JNSQscience_barometerScan_KerbinSrfLandedArcticSea_00 // Cold sea air makes the barometer sluggish. You warm it with your hands. Science!
        KerbinSrfLandedArcticSea* = #JNSQscience_barometerScan_KerbinSrfLandedArcticSea_01 // Pressure is stable; your fingers aren’t. You transmit the reading anyway.
        KerbinSrfLandedForemansSea* = #JNSQscience_barometerScan_KerbinSrfLandedForemansSea_00 // A steady marine breeze gives the needle a gentle wiggle. It’s strangely soothing.
        KerbinSrfLandedForemansSea* = #JNSQscience_barometerScan_KerbinSrfLandedForemansSea_01 // You log the pressure and immediately begin arguing whether this counts as beach time.
        KerbinSrfLandedTriangulusSea* = #JNSQscience_barometerScan_KerbinSrfLandedTriangulusSea_00 // The air feels heavy with moisture. The barometer agrees loudly.
        KerbinSrfLandedTriangulusSea* = #JNSQscience_barometerScan_KerbinSrfLandedTriangulusSea_01 // Pressure is nominal, the horizon is huge, and your attention span is not.
        KerbinSrfLandedNorthernSea* = #JNSQscience_barometerScan_KerbinSrfLandedNorthernSea_00 // The barometer hints at weather rolling in from the north. You double-check the sky, just in case.
        KerbinSrfLandedNorthernSea* = #JNSQscience_barometerScan_KerbinSrfLandedNorthernSea_01 // A cool dampness clings to the instrument. You decide it counts as calibration.
        KerbinSrfLandedSub-ArcticSea* = #JNSQscience_barometerScan_KerbinSrfLandedSub-ArcticSea_00 // The air is cold, damp, and determined to freeze the needle in place.
        KerbinSrfLandedSub-ArcticSea* = #JNSQscience_barometerScan_KerbinSrfLandedSub-ArcticSea_01 // You take a reading before the barometer becomes a decorative ice sculpture.
        KerbinSrfLandedEasternSea* = #JNSQscience_barometerScan_KerbinSrfLandedEasternSea_00 // A brisk sea breeze pushes the needle back and forth like a metronome.
        KerbinSrfLandedEasternSea* = #JNSQscience_barometerScan_KerbinSrfLandedEasternSea_01 // Pressure looks normal; you write it down and then stare at the waves a little too long.
        KerbinSrfLandedWesternSea* = #JNSQscience_barometerScan_KerbinSrfLandedWesternSea_00 // The barometer registers thick, wet air. Your suit vents complain immediately.
        KerbinSrfLandedWesternSea* = #JNSQscience_barometerScan_KerbinSrfLandedWesternSea_01 // You scribble “west sea: humid.” The rest of the page turns into wave doodles.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_barometerScan_KerbinSrfLandedWelcomeBackIsland_00 // The barometer reads perfectly normal, as if this island exists just to welcome returning missions.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_barometerScan_KerbinSrfLandedWelcomeBackIsland_01 // You swear the wind carries the smell of warmed heatshields and celebration snacks. Pressure is steady.
        KerbinSrfSplashedGreatLake* = #JNSQscience_barometerScan_KerbinSrfSplashedGreatLake_00 // Freshwater sloshes against the capsule and the barometer somehow keeps working. Miraculous.
        KerbinSrfSplashedGreatLake* = #JNSQscience_barometerScan_KerbinSrfSplashedGreatLake_01 // The needle twitches with each wavelet. You announce “lake weather: wet” and transmit proudly.
        KerbinSrfSplashedInlandWater* = #JNSQscience_barometerScan_KerbinSrfSplashedInlandWater_00 // You get a clean reading, then immediately worry about dropping the barometer into the water it’s already in.
        KerbinSrfSplashedInlandWater* = #JNSQscience_barometerScan_KerbinSrfSplashedInlandWater_01 // The air above the water is humid enough to fog the display. You wipe it and call that science.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_barometerScan_KerbinSrfSplashedKreenwichSea_00 // Salt spray crusts on the casing while you take the reading. The barometer tastes the ocean and disapproves.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_barometerScan_KerbinSrfSplashedKreenwichSea_01 // The sea rolls gently; the needle rolls gently; you try not to roll gently.
        KerbinSrfSplashedArcticSea* = #JNSQscience_barometerScan_KerbinSrfSplashedArcticSea_00 // Cold spray forms tiny ice beads on the instrument. The needle moves like it’s thinking about hibernating.
        KerbinSrfSplashedArcticSea* = #JNSQscience_barometerScan_KerbinSrfSplashedArcticSea_01 // You take the pressure reading and add a footnote: also, brrr.
        KerbinSrfSplashedForemansSea* = #JNSQscience_barometerScan_KerbinSrfSplashedForemansSea_00 // The barometer reports “storm maybe.” You report “please no” back to KSC.
        KerbinSrfSplashedForemansSea* = #JNSQscience_barometerScan_KerbinSrfSplashedForemansSea_01 // You stare at the waves and forget to write the number. You write a different number. Close enough.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_barometerScan_KerbinSrfSplashedTriangulusSea_00 // The capsule bobs, the needle bobs, and you decide the whole system is consistent.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_barometerScan_KerbinSrfSplashedTriangulusSea_01 // You wish the barometer had a setting for sea-sickness warning.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_barometerScan_KerbinSrfSplashedNorthernSea_00 // A chill wind ripples the water and the barometer needle at the same time.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_barometerScan_KerbinSrfSplashedNorthernSea_01 // You send the reading, then ask if “north sea” also means “north snacks.” No response.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_barometerScan_KerbinSrfSplashedSub-ArcticSea_00 // The dial is starting to frost over. You take the reading before it becomes modern art.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_barometerScan_KerbinSrfSplashedSub-ArcticSea_01 // You wonder if the barometer is supposed to shiver. You decide it is.
        KerbinSrfSplashedEasternSea* = #JNSQscience_barometerScan_KerbinSrfSplashedEasternSea_00 // A steady breeze keeps the spray off the sensor long enough for a usable reading.
        KerbinSrfSplashedEasternSea* = #JNSQscience_barometerScan_KerbinSrfSplashedEasternSea_01 // The barometer survives the splashing. You consider naming it Tough Little Needle.
        KerbinSrfSplashedWesternSea* = #JNSQscience_barometerScan_KerbinSrfSplashedWesternSea_00 // The air is wet, salty, and busy trying to short out everything. The barometer stubbornly disagrees.
        KerbinSrfSplashedWesternSea* = #JNSQscience_barometerScan_KerbinSrfSplashedWesternSea_01 // You record the pressure, then catch yourself watching the wake like it’s a science graph.

        Mun* = #JNSQscience_barometerScan_Mun_00 // You check for leaks, then remember you’re standing in open space and laugh a little too loudly.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_00 // The barometer needle sits at zero and refuses to budge, no matter how sternly you stare at it.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_01 // You tap the gauge. It continues reporting “vacuum” with remarkable confidence.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_02 // The instrument reports no pressure at all. The Mun seems proud of this accomplishment.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_03 // The barometer reports nothing but emptiness. You record the result as “consistent with everywhere else.”
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_04 // You briefly consider inflating the sensor line with suit air. Mission Control says “absolutely not.”
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_05 // The reading is a solid, dependable zero. It’s almost comforting.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_06 // The gauge confirms the Mun has no atmosphere.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_07 // A tiny spike appears, then vanishes. You decide it was dust hitting the sensor and not the Mun exhaling.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_08 // You note that the “air” is exceptionally still today. This seems technically accurate.
        MunSrfLanded* = #JNSQscience_barometerScan_MunSrfLanded_09 // You log “no detectable pressure” and add a doodle of a very empty graph.
        MunSrfLandedPolarIceCraters* = #JNSQscience_barometerScan_MunSrfLandedPolarIceCraters_00 // The barometer reads a perfect vacuum over the shadowed ice. Cold doesn’t count as pressure, apparently.
        MunSrfLandedNotableCraters* = #JNSQscience_barometerScan_MunSrfLandedNotableCraters_00 // You try measuring “crater-to-crater airflow.” The instrument reports “none,” as expected.
        MunSrfLandedMountains* = #JNSQscience_barometerScan_MunSrfLandedMountains_00 // The barometer reads vacuum, regardless of altitude. The Mun does not do “thinner air,” only “no air.”
        MunSrfLandedMountains* = #JNSQscience_barometerScan_MunSrfLandedMountains_01 // You point the sensor upslope, then downslope. The reading remains the same, as if mocking your effort.
        MunInSpace* = #JNSQscience_barometerScan_MunInSpace_00 // The barometer confirms that space contains no helpful amount of air.
        MunInSpace* = #JNSQscience_barometerScan_MunInSpace_01 // You record the pressure as “still zero,” then wonder why you expected anything else.
        MunInSpaceHigh* = #JNSQscience_barometerScan_MunInSpaceHigh_00 // The barometer reads vacuum at high altitude. The result is unsurprising, but the instrument seems pleased to contribute.
        MunInSpaceHigh* = #JNSQscience_barometerScan_MunInSpaceHigh_01 // Far above the Mun, the gauge continues reporting “nothing.” You file the data anyway, because science loves consistency.

        Minmus* = #JNSQscience_barometerScan_Minmus_00 // The instrument reads “no atmosphere detected” with the calm certainty of a device stating the obvious.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_00 // The barometer reports a pressure of “nothing,” with impressive confidence.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_01 // The instrument suggests “extremely thin atmosphere.” You suggest “no.”
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_02 // Pressure remains indistinguishable from space. Minmus continues its long tradition of not having air.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_03 // The barometer’s readout is so low it feels like a personal insult.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_04 // The pressure reading is flat, steady, and boringly zero.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_05 // Pressure: vacuum. The only thing pushing back is grit in the buttons.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_06 // The readout remains near-perfect zero, regardless of how many times you recalibrate it.
        MinmusSrfLanded* = #JNSQscience_barometerScan_MinmusSrfLanded_07 // The instrument confirms that Minmus is still not secretly breathable. Mission Control sounds relieved.
        MinmusSrfLandedLowlands* = #JNSQscience_barometerScan_MinmusSrfLandedLowlands_00 // The needle stays pinned at zero. The lowlands appear to be as airless as they look.
        MinmusSrfLandedBasins* = #JNSQscience_barometerScan_MinmusSrfLandedBasins_00 // The basin is a perfect bowl for holding… vacuum. The barometer agrees.
        MinmusSrfLandedBasins* = #JNSQscience_barometerScan_MinmusSrfLandedBasins_01 // You half-expect pressure to pool in the low spot. It does not.
        MinmusSrfLandedBrownBasins* = #JNSQscience_barometerScan_MinmusSrfLandedBrownBasins_00 // The gauge stays at zero. If there’s any gas here, it’s doing an excellent job of hiding.
        MinmusInSpace* = #JNSQscience_barometerScan_MinmusInSpace_00 // The barometer confirms that space is, in fact, space. The reading is satisfyingly meaningless.
        MinmusInSpace* = #JNSQscience_barometerScan_MinmusInSpace_01 // The pressure sensor reports zero and then keeps reporting zero. You admire its consistency.
        MinmusInSpaceHigh* = #JNSQscience_barometerScan_MinmusInSpaceHigh_00 // At this altitude, the barometer is mostly decorative. It still insists the pressure is vacuum.

        DunaSrfLandedIceCaps* = #JNSQscience_barometerScan_DunaSrfLandedIceCaps_00 // The needle sits a hair higher than expected. Subliming polar ice is quietly puffing extra gas into the local air.
        DunaSrfLandedIceCaps* = #JNSQscience_barometerScan_DunaSrfLandedIceCaps_01 // A sudden pressure bump hits the sensor, then fades. Something under the frost just “exhaled” and pretended it didn’t.
        DunaSrfLandedRareCraters* = #JNSQscience_barometerScan_DunaSrfLandedRareCraters_00 // Down in the crater’s low ground, the pressure climbs by a tiny but measurable amount. Duna rewards you with the thinnest possible “thicker air”.
        DunaSrfLandedRareCraters* = #JNSQscience_barometerScan_DunaSrfLandedRareCraters_01 // The reading suggests you could almost inflate a parachute here. It also suggests you still shouldn’t try breathing.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_barometerScan_DunaSrfLandedVoronoiCraters_00 // The pressure wobbles in small, regular pulses as dust skitters over the pitted terrain. The barometer logs it; you glare at the ground pattern.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_barometerScan_DunaSrfLandedVoronoiCraters_01 // A shallow basin effect nudges the pressure upward, then stops. Even Duna’s “extra air” feels like it’s on a strict budget.
        DunaSrfLandedNotableCraters* = #JNSQscience_barometerScan_DunaSrfLandedNotableCraters_00 // The crater acts like a bowl, trapping slightly denser air near the floor. The sensor finally has something to measure besides “almost nothing”.
        DunaSrfLandedNotableCraters* = #JNSQscience_barometerScan_DunaSrfLandedNotableCraters_01 // A faint gust rolls around the rim and the barometer twitches. It’s the closest thing to weather you can call “confident”.
        DunaSrfLandedExoticCraters* = #JNSQscience_barometerScan_DunaSrfLandedExoticCraters_00 // Cold air sinks into the crater and the pressure rises more than you’d expect on Duna. The instrument seems pleased with the extra digits.
        DunaSrfLandedExoticCraters* = #JNSQscience_barometerScan_DunaSrfLandedExoticCraters_01 // As the temperature drops, the pressure climbs, then eases back again. The crater is running a slow daily breathing cycle.
        DunaSrfLandedTrenches* = #JNSQscience_barometerScan_DunaSrfLandedTrenches_00 // The trench floor sits low enough that the atmosphere feels almost substantial (by Duna standards). The pressure curve finally looks like a curve.
        DunaSrfLandedTrenches* = #JNSQscience_barometerScan_DunaSrfLandedTrenches_01 // Winds howling along the cut generate sharp little spikes on the readout. The trench turns thin air into noisy air.
        DunaSrfLandedMountains* = #JNSQscience_barometerScan_DunaSrfLandedMountains_00 // The reading drops off with altitude until the barometer is mostly measuring its own optimism. Thin air gets thinner.
        DunaSrfLandedMountains* = #JNSQscience_barometerScan_DunaSrfLandedMountains_01 // A brief lull steadies the pressure trace into a straight line. You record the data and also the silence.
        DunaSrfLandedVolcano* = #JNSQscience_barometerScan_DunaSrfLandedVolcano_00 // The pressure sits close to average, but warm ground stirs little updrafts that make the needle tremble. The planet won’t sit still for a clean baseline.
        DunaSrfLandedVolcano* = #JNSQscience_barometerScan_DunaSrfLandedVolcano_01 // Fine gritty dust repeatedly taps the intake and the reading flickers. The barometer insists it’s a “transient event”; you call it “Duna”.

        IkeSrfLanded* = #JNSQscience_barometerScan_IkeSrfLanded_00 // The barometer reports a proud, unwavering “zero,” briefly spiking only when you kick up dust right in front of the intake.
		IkeSrfLanded* = #JNSQscience_barometerScan_IkeSrfLanded_01 // You run the pressure scan twice, then a third time for luck. Ike still insists there is absolutely nothing to breathe here.
		IkeSrfLanded* = #JNSQscience_barometerScan_IkeSrfLanded_00 // The reading stays nailed to zero, but the display flickers as if even the instrument finds the result a little too honest.
		IkeInSpaceLow* = #JNSQscience_barometerScan_IkeInSpaceLow_00 // The pressure reading is indistinguishable from perfect vacuum until a puff of maneuvering gas convinces it, briefly, that you’ve invented an atmosphere.
		IkeInSpaceHigh* = #JNSQscience_barometerScan_IkeInSpaceHigh_00 // Far above Ike, the barometer still reads nothing at all. You file the data anyway, because “nothing” is technically a result.

        EdnaSrfLanded* = #JNSQscience_barometerScan_EdnaSrfLanded_00 // The barometer needle snaps to zero and stays there, proudly measuring absolutely nothing.
        EdnaSrfLanded* = #JNSQscience_barometerScan_EdnaSrfLanded_01 // You tap the gauge. It continues to report “vacuum” with unwavering confidence.
        EdnaSrfLanded* = #JNSQscience_barometerScan_EdnaSrfLanded_02 // The display reads 0.00 and politely refuses to add any more exciting digits.
        EdnaSrfLanded* = #JNSQscience_barometerScan_EdnaSrfLanded_03 // The barometer reports “no atmosphere” and then stops contributing to the conversation.
        EdnaInSpaceLow* = #JNSQscience_barometerScan_EdnaInSpaceLow_00 // In low orbit the barometer reads vacuum, which is both correct and deeply unhelpful.
        EdnaInSpaceLow* = #JNSQscience_barometerScan_EdnaInSpaceLow_01 // The pressure trace is a perfectly flat line. Edna’s talent for “nothing” extends surprisingly far upward.
        EdnaInSpaceHigh* = #JNSQscience_barometerScan_EdnaInSpaceHigh_00 // The instrument measures the surrounding space and reports the startling news that it is, in fact, space.
        EdnaInSpaceHigh* = #JNSQscience_barometerScan_EdnaInSpaceHigh_01 // Pressure is still zero. You consider filing this as “consistent with expectations” and taking a nap.

        DakSrfLanded* = #JNSQscience_barometerScan_DakSrfLanded_00 // The barometer confidently reports “zero,” then pauses as if waiting for applause.
        DakSrfLanded* = #JNSQscience_barometerScan_DakSrfLanded_01 // The instrument reads vacuum with remarkable consistency. You begin to suspect it’s the most stable thing on this moon.
        DakSrfLandedHighlands* = #JNSQscience_barometerScan_DakSrfLandedHighlands_00 // The barometer shows no pressure at all, just cold silence and bad decisions. You double-check that “highlands” doesn’t mean “higher pressure.” It doesn’t.
        DakInSpaceLow* = #JNSQscience_barometerScan_DakInSpaceLow_00 // The barometer reports what you already knew: space is still space. At least it’s thorough.
