        KerbinFlying* = #ScienceRefactor_bd_bioexp_KerbinFlying_00 // A flying frog (also called a gliding frog) is a frog that has the ability to achieve gliding flight. That is, it can descend at an angle of less than 45° relative to the horizontal. Other (non-flying) arboreal frogs can also descend, but only at angles greater than 45°, which is referred to as parachuting.

