        #GEPscience_bd_IRradiometer_GrannusInSpaceHigh_00 = The IR radiometer stares into the dim red glow of Grannus. The numbers look calm, but the comms delay makes every beep feel like a long-distance conversation.
        #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthPolarZone_00 = The northern polar band shows a faint infrared dip, like a cooler cap on the star. Mission Control suggests “try turning it off and on again” and you receive that advice much later.
