        #GEPscience_bd_camera_NodensSrfLandedFreshWater_00 = La superficie riflette il cielo come metallo lucidato, solo che ondeggia quando la fissi. La fotocamera insiste che l'esposizione sia corretta, tu non ne sei convinto.
