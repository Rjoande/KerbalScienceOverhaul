        #JNSQscience_bd_cosmicRay_VallSrfLandedMountains_00 = In alto, il rivelatore crepita più in fretta: la quota su una luna senza aria è solo onestà.
        #JNSQscience_bd_cosmicRay_VallInSpaceLowPoles_00 = I passaggi polari portano un breve aumento, come se l'universo avesse trovato una corsia aperta sopra il ghiaccio.
