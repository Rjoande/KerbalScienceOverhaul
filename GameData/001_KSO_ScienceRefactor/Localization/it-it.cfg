        #ScienceRefactor_tantares_sp_xray_spectrometer_default_00 = Spettro a raggi X analizzato.
        #ScienceRefactor_tantares_sp_gamma_ray_spectrometer_default_00 = Spettro a raggi gamma analizzato.

        // == UniversalStorage2 ==
