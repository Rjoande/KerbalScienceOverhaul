        #GEPscience_bd_XRayDiffract_BorvoSrfLandedPoles_00 = Cold-trapped volatiles show up mixed with abrasive fines. The crystals look pristine, but the environment is anything but gentle.

        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTropicalLowlands_00 = The diffraction peaks are simple, sparse, and bruised—basic minerals with plenty of shock damage. Damona keeps its story short and violent.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTemperateLowlands_00 = Fine grains produce broad reflections from constant cracking and settling. The surface feels like it’s still recovering from old mistakes.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTropicalMidlands_00 = Several phases appear partially amorphized, like the crystal structure gave up halfway. Even the rocks seem tired out here.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedTemperateMidlands_00 = The scan suggests mixed ejecta and reworked regolith, stirred together over very long, very quiet nights beneath a dim red sun.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedHighlands_00 = Coarse fragments yield sharp peaks, hinting at exposed, ancient material. It’s solid, stubborn, and exactly as welcoming as it sounds.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedImpactBasin_00 = High-pressure signatures appear where they absolutely should not be. Whatever carved this basin left a mineral fingerprint big enough to see from home—eventually.
        #GEPscience_bd_XRayDiffract_DamonaSrfLandedPoles_00 = Crisp peaks and low dust content suggest ongoing loss of fines to the void. The poles are clean, cold, and unhelpfully far away.

        #GEPscience_bd_XRayDiffract_EponaSrfLanded_00 = X-ray peaks show ice-laced rock with a hint of trapped volatiles. The sample looks like it’s been waiting a very long time for a warmer message from home.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTropicalLowlands_00 = Broad peaks suggest fine, frost-ground grains mixed with darker minerals. Epona’s dim red daylight doesn’t melt much, but it does a great job of cracking things.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTemperateLowlands_00 = The pattern shows clathrate-like signatures alongside ordinary silicates. Even the boring plains seem to be hiding a cold, pressurized secret.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTropicalUplands_00 = Multiple phases overlap like layered snowfall turned to stone. The lattice spacing shifts just enough to make you double-check your calibration… again… after the comm delay.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedTemperateUplands_00 = Sharp reflections from tougher crystals sit on a faint amorphous haze. The surface has been quietly sandblasted by radiation while the sun pretends it’s helping.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedHighlands_00 = Coarse grains give strong, clean peaks—ancient crustal material with minimal weathering. It’s sturdy enough to build on, assuming you like building in the dark.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedGrandPeaks_00 = High-pressure phases appear where they shouldn’t on an icy world. Either these peaks were squeezed hard, or Epona’s interior is still doing something interesting.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedCraters_00 = Shock-broadened peaks and powdered grains dominate the scan. The craters read like a long, quiet argument between impacts and ice.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedVolcanoes_00 = Unexpected mineral ordering shows signs of heating and rapid re-freezing. If this is cryovolcanic material, it’s the coldest kind of ‘fresh lava’ you’ll ever regret touching.
        #GEPscience_bd_XRayDiffract_EponaSrfLandedPoles_00 = Crisp, cold peaks and low dust signatures suggest continual loss of fines to the void. The polar ground is clean, brittle, and entirely uninterested in footprints.

        #GEPscience_bd_XRayDiffract_RosmertaSrfLanded_00 = The diffractogram is simple, sharp, and unfriendly—airless rock with radiation-scuffed crystal faces. Rosmerta keeps its mineralogy as lonely as its orbit.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTropicalLowlands_00 = Fine regolith produces broadened peaks from constant micro-impacts. The grains look like they’ve been slowly pulverized under an indifferent red sun.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTemperateLowlands_00 = A dusty mix of common minerals shows faint shock features. The surface is basically a museum exhibit, curated by time and particle storms.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTropicalMidlands_00 = Several weak peaks hint at exotic trace phases—then vanish in noise. Either the sample is tricky, or Rosmerta enjoys practical jokes at light-minute distances.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedTemperateMidlands_00 = The lattice spacing is remarkably consistent across grains, as if the rock has been cold-soaked forever. Your heater feels personally attacked.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedHighlands_00 = Coarser fragments yield strong reflections from older, cleaner material. The highlands look like they’ve been chipped straight out of deep time.
        #GEPscience_bd_XRayDiffract_RosmertaSrfLandedPoles_00 = Cold-trapped fines give razor-sharp peaks, but the background haze suggests constant radiation damage. Even the quiet places aren’t truly quiet out here.

        #GEPscience_bd_XRayDiffract_RAB-58ESrfLanded_00 = The scan can’t decide: some peaks scream ‘rock’, others whisper ‘ice’. For a suspected capture, that’s a very on-brand way to dodge questions.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedLowlands_00 = Broad, low-intensity reflections suggest loosely packed grains and poor crystal order. Whatever this is, it’s been rattled around the system for a long time.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedEasternHighlands_00 = Sharper peaks indicate tougher, more crystalline material—possibly the ‘core’ of a body that didn’t start life here. Mission Control adds ‘where from?’ to a very long list.
        #GEPscience_bd_XRayDiffract_RAB-58ESrfLandedWesternHighlands_00 = Mixed phases and strained lattices imply repeated shocks and thermal cycling. The rock looks like it has traveled far, and it remembers every kilometer.

        #GEPscience_bd_XRayDiffract_CernunnosSrfLanded_00 = Icy signatures overlay a sparse rocky framework, with traces that look like ancient, frozen volatiles. The dwarf world feels like a storage closet for the outer system.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTropicalLowlands_00 = Fine frost and grit produce a layered pattern of ice and silicate peaks. Under Grannus’s dim glow, the ground changes slowly—but it does change.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTemperateLowlands_00 = The diffractogram shows clean ice peaks plus a dusty mineral background. It’s like someone mixed snow with sand and then removed all the fun.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTropicalMidlands_00 = Peak splitting suggests multiple ice phases and stress-fractured grains. The surface seems to creak with every long, red-tinted day-night cycle.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedTemperateMidlands_00 = A surprisingly ordered crystal signature appears, hinting at slow annealing in deep cold. The planet has had time to organize itself—unlike our schedule.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedHighlands_00 = Coarse fragments give strong reflections from old, less-processed material. The highlands look like they’ve been exposed since before anyone thought to name them.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedSouthPolarHills_00 = Cold-stiffened grains give crisp peaks, but there’s a faint amorphous smear from relentless particle scuffing. The hills are sharp in every sense.
        #GEPscience_bd_XRayDiffract_CernunnosSrfLandedNorthPole_00 = The scan shows nearly pure cold-trap ice with trace dust inclusions. It’s pristine, eerie, and so far away the results arrive home feeling nostalgic.

        // bd_XrayImaging
        #GEPscience_XrayImaging_GrannusInSpace_00 = The detector records rapid variability. You briefly suspect instrument error, then remember you are observing a star from up close.
        #GEPscience_XrayImaging_GrannusInSpace_01 = You obtain a crisp X-ray light curve and realize you are, technically, doing deep-space astrophysics while orbiting the source.
        #GEPscience_XrayImaging_GrannusInSpace_02 = The star’s corona is spectacular in X-rays. You decide “spectacular” is also a reasonable risk assessment.
        #GEPscience_XrayImaging_GrannusInSpaceLow_00 = The detector struggles to decide whether Grannus is a star or a flashing warning label. Between flare spikes, you catch distant sources boiling at millions of degrees.
        #GEPscience_XrayImaging_GrannusInSpaceHigh_00 = Far from the glare, the sky finally stops shouting. You log a handful of hard X-ray points and then remember the downlink will arrive after snack time… on Kerbin.
        #GEPscience_XrayImaging_TaranisInSpaceLow_00 = The X-ray imager keeps picking up energetic bursts whenever you face the dim red sun. Mission Control asks for “one more exposure” and you queue it behind the next half-hour of signal delay.
        #GEPscience_XrayImaging_TaranisInSpaceHigh_00 = From higher up, Taranis is a bright ember glued to a black coin. Long integrations pull faint X-ray sources out of the void, and none of them care which side is “day.”
        #GEPscience_XrayImaging_ToutatisInSpaceLow_00 = A thin atmosphere tries its best to exist below you while the instrument stares past it. The data suggests something out there is heating plasma to absurd temperatures, and it isn’t your coffee heater.
        #GEPscience_XrayImaging_ToutatisInSpaceHigh_00 = You build an X-ray sky map while Toutatis spins fire, twilight, and darkness under you. By the time the results reach home, the telescope has already filled the storage with “bonus” targets.
        #GEPscience_XrayImaging_NodensInSpaceLow_00 = Nodens fills half the sky, so you use its limb like a shutter. Each occultation peels back another set of million-degree X-ray sources—then you remember the logs won’t reach home for a while.
        #GEPscience_XrayImaging_NodensInSpaceHigh_00 = With Nodens reduced to a mottled coin and Grannus a dim red ember, the imager finally relaxes. Long exposures tease out hard X-ray pinpricks from a sky that feels too big to belong to anyone.
        #GEPscience_XrayImaging_BelisamaInSpaceLow_00 = The permanently shadowed side is perfect for X-ray work: no glare, no comfort, just clean counts. You watch hot plasmas flare in the distance while Belisama stays cold and silent beneath you.
        #GEPscience_XrayImaging_BelisamaInSpaceHigh_00 = From higher up, Belisama and Nodens trade slow eclipses like clockwork. Every time the view clears, another faint X-ray object appears—patiently waiting through the same long delays you are.
        #GEPscience_XrayImaging_SucellusInSpaceLow_00 = Sucellus is a dark, low-gravity anchor in an otherwise empty sky. The detector records a sparse but stubborn X-ray background, as if the universe is whispering through static.
        #GEPscience_XrayImaging_SucellusInSpaceHigh_00 = High above Sucellus, the red sun is just another distant light and “up” loses meaning. You assemble an X-ray sky map that looks like it was sent from very far away—because it was.
        #GEPscience_XrayImaging_CaireenInSpaceLow_00 = Tiny Caireen jitters under the spacecraft, making the stars smear if you blink. You shorten exposures and still catch a few bright X-ray flashes that don’t care about your pointing problems.
        #GEPscience_XrayImaging_CaireenInSpaceHigh_00 = From far above, Caireen is barely a reference point and the imager spends most of its time staring into the black. The best targets are impossibly hot and impossibly distant, and the downlink feels just as far.
        #GEPscience_XrayImaging_SironaInSpaceLow_00 = You let Sirona’s vast limb block the dim red sun and stare into the cold gap it leaves behind. The imager counts a few sharp X-ray sources that look far too hot to be nearby.
        #GEPscience_XrayImaging_SironaInSpaceHigh_00 = From high above the gas giant, “up” is just whichever way the antenna points. Long exposures pull faint hard X-rays out of the black, and the downlink delay makes the discoveries feel even farther away.
        #GEPscience_XrayImaging_AirmedInSpaceLow_00 = Low orbit gives you a fast-moving shadow to hide in while the telescope works. The sky answers with thin, energetic flashes—then goes quiet again, like it knows nobody can respond quickly out here.
        #GEPscience_XrayImaging_AirmedInSpaceHigh_00 = Higher up, the view steadies and the instrument stops arguing with your attitude jets. A sparse X-ray map builds slowly, one million-degree dot at a time, under Grannus’ dull red light.
        #GEPscience_XrayImaging_BorvoInSpaceLow_00 = Borvo slides beneath you like a dark reference mark while the imager watches the real action overhead. The counts suggest distant plasma at absurd temperatures, completely uninterested in your navigation schedule.
        #GEPscience_XrayImaging_BorvoInSpaceHigh_00 = From high orbit, Borvo is almost an afterthought and the sky is the entire mission. You log a stubborn X-ray background that feels older than your communications link.
        #GEPscience_XrayImaging_DamonaInSpaceLow_00 = You time exposures to the longest stretches of darkness and pretend it’s “routine.” A few bright X-ray points punch through anyway, as if the universe is testing your detector limits for fun.
        #GEPscience_XrayImaging_DamonaInSpaceHigh_00 = Up high, the telescope finally gets the quiet it wants—no glare, no hurry, just cold vacuum and distant heat. By the time Mission Control sees the data, you’ve already moved on to the next patch of unfamiliar sky.
        #GEPscience_XrayImaging_EponaInSpaceLow_00 = You use Epona’s dark limb as a sunshade and let the imager stare into the cold. The detector still finds pinpricks of million-degree chaos, as if the universe can’t sit still.
        #GEPscience_XrayImaging_EponaInSpaceHigh_00 = High above the frozen world, Grannus is a dim red ember and the sky feels unreasonably large. Long integrations build a thin X-ray map that will take even longer to explain back home.
        #GEPscience_XrayImaging_RosmertaInSpaceLow_00 = Rosmerta is small, quiet, and very good at getting out of the way. Each eclipse gives you a clean look at faint X-ray sources, and none of them seem interested in being visited.
        #GEPscience_XrayImaging_RosmertaInSpaceHigh_00 = From up here, Rosmerta is a lonely speck and “night” is just when the antenna isn’t busy. You log a handful of hard X-ray points and wonder if anyone will still be awake when the data arrives.
        #GEPscience_XrayImaging_RAB-58EInSpaceLow_00 = The irregular little moonlet keeps your pointing solution guessing. Even so, the imager catches a few sharp X-ray flashes that look like they’re coming from impossibly hot gas very far away.
        #GEPscience_XrayImaging_RAB-58EInSpaceHigh_00 = With RAB-58E barely a reference mark, you stop trying to “take pictures of the moon” and just survey the void. The X-ray background comes in like distant static, delayed twice—once by space, once by comms.
        #GEPscience_XrayImaging_CernunnosInSpaceLow_00 = Cernunnos drifts below like an icy boundary marker at the edge of the system. The instrument finds distant high-energy sources that burn hotter than anything nearby, making your local scenery feel even colder.
        #GEPscience_XrayImaging_CernunnosInSpaceHigh_00 = Far above Cernunnos, the red sun provides more mood than light. You assemble an X-ray sky strip of faint, hard points—evidence of extreme heat, delivered across extreme distance.

        // logIonTrap
        #GEPscience_logIonTrap_GrannusInSpaceLow_00 = The ion trap saturates almost immediately, as if the red dwarf is personally trying to sign the data stream. Mission Control’s “please repeat” arrives long after the trap has cooled down again.
        #GEPscience_logIonTrap_GrannusInSpaceHigh_00 = Even out here, the particle flux comes in gusts and lulls, like a weather report written in charged dust. The quiet intervals are somehow more unsettling than the noisy ones.
        #GEPscience_logIonTrap_TaranisInSpaceLow_00 = Close to Taranis, the trap catches a harsh mix of fast ions and heavier sputtered bits, as if the planet is slowly evaporating into space. The detector insists this is “within limits,” but it says that about everything.
        #GEPscience_logIonTrap_TaranisInSpaceHigh_00 = At this altitude the signal steadies into a relentless stream from Grannus, with sharp spikes whenever you cross the day-night boundary. It feels like flying through the edge of a furnace and a freezer at the same time.
        #GEPscience_logIonTrap_ToutatisInSpaceLow_00 = The trap detects a thin, patchy ionosphere that lights up near the terminator and fades over the dark side, like a reluctant glow. You label the file “maybe-atmosphere, please handle gently” before the next comm window.
        #GEPscience_logIonTrap_ToutatisInSpaceHigh_00 = High above Toutatis, the readings alternate between calm and sudden bursts, suggesting a weak magnetic shield being pushed around by the stellar wind. The particles arrive first; the explanation arrives several minutes later.
        #GEPscience_logIonTrap_NodensInSpaceLow_00 = The ion trap keeps dipping in and out of Nodens’s magnetospheric “weather,” spiking whenever the planet’s dark-side glow rolls beneath you. By the time Mission Control asks what that means, the peaks have already moved on.
        #GEPscience_logIonTrap_NodensInSpaceHigh_00 = Farther out, the trap reads a steady wind of charged particles under the dim red sun, with occasional sharp bursts that feel like distant tantrums. The quiet between bursts is long enough to notice how far from home you are.
        #GEPscience_logIonTrap_BelisamaInSpaceLow_00 = Near Belisama, the trap catches a thin spray of ions and charged grit, as if the moon is slowly sanding itself into space. The signal drops whenever Nodens blocks the wind—an enormous, silent “no data” that lasts longer than your comm window.
        #GEPscience_logIonTrap_BelisamaInSpaceHigh_00 = High above the locked pair, the particle stream alternates between open space and Nodens’s stretched-out magnetic wake. The trap logs it dutifully, while everyone pretends the laggy “copy that” is reassuring.
        #GEPscience_logIonTrap_SucellusInSpaceLow_00 = The ion trap counts a gritty mix of slow ions and energetic spikes, as if Sucellus is shedding a faint, invisible tail. The readout labels it “interesting” in the same calm font it uses for “overheated.”
        #GEPscience_logIonTrap_SucellusInSpaceHigh_00 = Farther out, the particle flux smooths into a steady red-sun wind with occasional sharp pulses that don’t match any familiar cycle. You start tagging timestamps by “comm window” instead of “minutes.”
        #GEPscience_logIonTrap_CaireenInSpaceLow_00 = Close to Caireen, the ion trap catches bursts of heavier ions that look suspiciously like surface material kicked loose and electrically encouraged. The instrument insists it’s only measuring particles, not judging your trajectory.
        #GEPscience_logIonTrap_CaireenInSpaceHigh_00 = Above Caireen, the stream flickers as you drift in and out of its parent’s magnetic wake. The quiet intervals feel too long, even before you remember the light-time to home.
        #GEPscience_logIonTrap_SironaInSpaceLow_00 = The trap goes from calm to chaotic as Sirona’s charged environment grabs the solar wind and rearranges it into something new. The spikes line up with band crossings like the planet is “striped” all the way down to the plasma.
        #GEPscience_logIonTrap_SironaInSpaceHigh_00 = High above Sirona, the detector registers broad, slow waves of particles punctuated by sudden, needle-like surges. Whatever is steering this field is doing it far away and without asking permission.
        #GEPscience_logIonTrap_AirmedInSpaceLow_00 = The ion trap is instantly overwhelmed by a harsh, unshielded particle spray—Airmed has no magnetic field and it shows. The counts spike hardest over the two-toned terrain, like the surface is “painted” in charge as well as color.
        #GEPscience_logIonTrap_AirmedInSpaceHigh_00 = Higher up, the readings settle into Sirona’s distant influence, punctuated by sudden gusts from the dim red sun. The data packet reaches home so late that the trap has already finished being alarmed about it.
        #GEPscience_logIonTrap_BorvoInSpaceLow_00 = Borvo’s thin atmosphere and active upper layers feed the trap a mix of nitrogen and methane ions that look surprisingly organized. It’s the closest thing to “weather” you can measure without ever touching the air.
        #GEPscience_logIonTrap_BorvoInSpaceHigh_00 = Above Borvo, the signal shifts from local ionospheric chemistry to the broader churn of Sirona’s magnetosphere. The trap logs a long, slow pulse that feels like a message—unfortunately, not one you can decode before the next comm window.
        #GEPscience_logIonTrap_DamonaInSpaceLow_00 = Damona offers no magnetic shelter at all, so the ion trap counts particles like a leaky bucket counts water: fast, constant, and a bit insulting. Over the big scar on its surface, heavier ions appear as if the moon is still remembering the impact.
        #GEPscience_logIonTrap_DamonaInSpaceHigh_00 = Farther out, you drift through a quiet patch that suddenly breaks into sharp bursts when Sirona’s wake sweeps past. The delay to home makes the silence feel longer than it should, even when the numbers insist everything is “nominal.”
        #GEPscience_logIonTrap_EponaInSpaceLow_00 = The ion trap picks up a thin, fussy cocktail of nitrogen ions with just enough methane to keep the chemists awake. The counts wobble as Epona’s weak field tries its best to look confident under the dim red sun.
        #GEPscience_logIonTrap_EponaInSpaceHigh_00 = Far above Epona, the signal flattens into the steady stellar wind—then hiccups in slow pulses that don’t match any familiar rhythm. By the time the data reaches home, the trap has already moved on to its next mystery.
        #GEPscience_logIonTrap_RosmertaInSpaceLow_00 = Over lonely Rosmerta, the ion trap catches occasional heavier ions that look like surface material being quietly sandblasted into space. It’s hard to tell what’s more airless: the moon or the comm channel.
        #GEPscience_logIonTrap_RosmertaInSpaceHigh_00 = Higher out, the trap drifts through Epona’s distant wake—quiet, then abruptly noisy, like stepping behind a wall and finding it electrified. You mark the transition point and wait for a reply that arrives much later than the particles did.
        #GEPscience_logIonTrap_RAB-58EInSpaceLow_00 = Near RAB-58E, the ion trap registers bursts of light ions that come and go as you skim past, as if the little moonlet can’t decide whether it’s rock or frost. The instrument files it under “captured weirdness” and refuses to elaborate.
        #GEPscience_logIonTrap_RAB-58EInSpaceHigh_00 = Out here the background dominates—cosmic rays, thin stellar wind, and occasional grit-charged spikes from nowhere in particular. The emptiness between spikes feels longer when the red sun is just a dull ember behind you.
        #GEPscience_logIonTrap_CernunnosInSpaceLow_00 = The ion trap sniffs an extremely reluctant exosphere: faint ions, colder than the probe’s attitude controller, with sporadic surges when sunlight grazes the limb. Cernunnos may be small, but it still manages to be complicated.
        #GEPscience_logIonTrap_CernunnosInSpaceHigh_00 = High above Cernunnos, the trap mostly counts the universe instead of the world—until a slow, broad wave rolls through like a distant magnetic sigh. You start thinking in light-minutes instead of meters.

        // logmmImpacts
        #GEPscience_logmmImpacts_GrannusInSpaceLow_00 = The detector logs a staccato of impacts; some grains seem half-cooked by the red glare and still leave tidy little pits. Mission Control hears about it long after you’ve already applied the first hull patch.
		#GEPscience_logmmImpacts_GrannusInSpaceHigh_00 = Out here the impacts arrive as lonely ticks, like someone testing if your ship is still there. The rate drops, but the few hits that land are uncomfortably energetic.
		#GEPscience_logmmImpacts_TaranisInSpaceLow_00 = Low over Taranis, the counter spikes as if the planet is constantly shedding fresh fragments from its brutal day-night split. Each ping comes with a reminder that “shielding” is just another word for “extra mass.”
		#GEPscience_logmmImpacts_TaranisInSpaceHigh_00 = In higher orbit the impacts thin out into a slow, patient drizzle, implying most of the grit stays close to the surface. The long-delay readout makes it feel like the universe is reporting the hits on a schedule.
		#GEPscience_logmmImpacts_ToutatisInSpaceLow_00 = Close to Toutatis, the detector catches bursts of tiny impacts that seem to cluster near the hot-cold boundary, where the surface can’t decide what shape it wants to be. The scars look fresh enough that you briefly consider filing a complaint with the planet.
		#GEPscience_logmmImpacts_ToutatisInSpaceHigh_00 = High above Toutatis, impacts are rare but dramatic—each one arrives like it traveled all the way from the dim red sun just to annoy you personally. Mission Control’s delayed “did you hear that?” comes in after the next ping.
        #GEPscience_logmmImpacts_NodensInSpaceLow_00 = The impact counter chatters in short bursts as you skim above Nodens; whatever’s in this system’s dust is darker and sharper than you expected under the red sun. Mission Control’s advice arrives several minutes after you’ve already stopped flinching.
		#GEPscience_logmmImpacts_NodensInSpaceHigh_00 = Higher up, impacts become rare, solitary ticks—like the void is testing the hull for weak spots. The long-delay telemetry makes it feel like you’re reading yesterday’s weather report for tomorrow’s dents.
		#GEPscience_logmmImpacts_BelisamaInSpaceLow_00 = Close to Belisama the detector logs a steady peppering, as if the tidally-locked moon is sweeping up debris and flinging the leftovers into your path. You start ranking impacts by “scratch”, “ding”, and “future problem”.
		#GEPscience_logmmImpacts_BelisamaInSpaceHigh_00 = Farther out, the hits slow down but sound nastier, suggesting fewer particles survived the trip but none of them are polite. The red sunlight on the panels makes every new mark look like it was there all along—until the counter proves otherwise.
        #GEPscience_logmmImpacts_SucellusInSpaceLow_00 = The impact sensor rattles steadily, as if Sucellus is trailed by its own personal cloud of grit. Under the dim red sun, every ping feels louder than it should, and Mission Control’s reassurance arrives fashionably late.
		#GEPscience_logmmImpacts_SucellusInSpaceHigh_00 = Up high, the hits come in lonely, well-spaced ticks—still fast, still rude, just less social. The logs suggest most debris keeps close to the dwarf planet, like it’s reluctant to leave the neighborhood.
		#GEPscience_logmmImpacts_CaireenInSpaceLow_00 = Near tiny Caireen, the counter spikes in brief bursts, like you’re passing through the leftovers of a captured rock’s bad decisions. You start trusting the sensor more than your eyes—at least the sensor can’t pretend it didn’t see that.
		#GEPscience_logmmImpacts_CaireenInSpaceHigh_00 = Higher above Caireen, impacts thin out into occasional sharp taps, implying the little moon’s influence is small but not zero. The delayed telemetry makes it feel like you’re reading impact reports from a previous orbit.
		#GEPscience_logmmImpacts_SironaInSpaceLow_00 = The detector goes busy near Sirona’s ring system, registering a constant peppering of fast, bright dust that turns “space” into “very thin gravel.” Under the red sun, the rings look calm—right up until the counter proves they are not.
		#GEPscience_logmmImpacts_SironaInSpaceHigh_00 = Farther out, the ring noise fades, but rare impacts arrive with unsettling conviction, as if a stray fragment escaped the ring lanes just to test your shielding. By the time Mission Control asks if everything is okay, you’ve already filed the dents as “expected.”
        #GEPscience_logmmImpacts_AirmedInSpaceLow_00 = The impact counter chatters like it’s trying to match Airmed’s scar patterns one dent at a time. Under the red sun, the debris looks harmless until it starts writing on the hull.
		#GEPscience_logmmImpacts_AirmedInSpaceHigh_00 = Higher up, the hits become rare, sharp taps—more “message received” than “background noise.” The log reaches Mission Control after you’ve already stopped checking the panels every minute.
		#GEPscience_logmmImpacts_BorvoInSpaceLow_00 = Low over Borvo, impacts arrive in messy bursts, as if the moon can’t decide whether it’s dusty, icy, or both and is shedding samples accordingly. The faint haze below looks calm, but the detector insists it’s a very active calm.
		#GEPscience_logmmImpacts_BorvoInSpaceHigh_00 = In higher orbit, the rate drops to a patient drizzle, and the few strikes sound annoyingly expensive. The delayed downlink makes it feel like you’re reading yesterday’s dents as tomorrow’s forecast.
		#GEPscience_logmmImpacts_DamonaInSpaceLow_00 = Near Damona, the detector records clustered pings that line up a little too neatly—like you’re crossing the invisible outline of an ancient accident. The big scar on the surface suddenly feels less “historic” and more “ongoing.”
		#GEPscience_logmmImpacts_DamonaInSpaceHigh_00 = Farther out, impacts are infrequent but emphatic, suggesting only the stubborn fragments make it this high. The red-lit hull marks are subtle until the counter politely confirms they are, in fact, new.
        #GEPscience_logmmImpacts_EponaInSpaceLow_00 = The detector rattles with frequent tiny hits, as if Epona is flying through its own halo of cold grit. Under the dim red sun, the surface looks quiet—until the impact log proves “quiet” is just a lighting condition.
