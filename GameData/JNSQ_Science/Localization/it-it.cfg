        #JNSQscience_gravityScan_DunaInSpaceHighNotableCraters_00 = Il cratere lascia intravedere un'anomalia attraverso il rumore, ma da quassù non riesci a fissarla. Sembra che il pianeta ti stia sfidando a scendere più in basso.
        #JNSQscience_gravityScan_DunaSrfLandedExoticCraters_00 = I depositi chiari ingannano gli occhi, ma al gravitometro il colore non importa. I numeri suggeriscono materiale più leggero raccolto nel cratere, come se il pianeta avesse nascosto il vuoto sotto una brinata.
        #JNSQscience_gravityScan_DunaInSpaceLowExoticCraters_00 = Il segnale è troppo grande per dare la colpa solo al ghiaccio superficiale: la depressione deve tagliare in profondità nella roccia, dove manca la vera massa.
