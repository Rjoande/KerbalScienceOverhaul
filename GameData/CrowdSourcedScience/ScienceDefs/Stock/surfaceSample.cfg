@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]
{
    %RESULTS
    {
        Srf* = #CSS_surfaceSample_default_00 // You pick up a large rock with great ease. Those hours in the gym have really paid off!
        Srf* = #CSS_surfaceSample_default_01 // You notice some small pebbles falling into a casing full of sensitive computer equipment and hope they don't get damaged from rattling around inside.
        Srf* = #CSS_surfaceSample_default_02 // The sample reveals complex artificial polymers often used in reinforced fabrics and plastics. Mission Control asks you to point the other end of the sampler at the ground.
        Srf* = #CSS_surfaceSample_default_03 // After kicking the ground a lot of times, you successfully create a small crater. You quickly fill it in before Mission Control yells at you.
        Srf* = #CSS_surfaceSample_default_04 // You take a surface sample, put it in a bucket, and turn it upside down to make a tiny castle.
        Srf* = #CSS_surfaceSample_default_05 // This will make a great gift for little Werner von Kerman Jr.!
        Srf* = #CSS_surfaceSample_default_06 // Get this to the lab, stat!
        Srf* = #CSS_surfaceSample_default_07 // You pick up a steak, then realize you are just hungry, and that it was a simple rock.
        Srf* = #CSS_surfaceSample_default_08 // You pick up a steak, and - Wait, it's a real steak! You will eat it when you get back in the capsule.
        Srf* = #CSS_surfaceSample_default_09 // You begin to dig at the surface, and discover something odd looking.
        Srf* = #CSS_surfaceSample_default_10 // You break off a piece of the ground. It tastes like dirt!
        Srf* = #CSS_surfaceSample_default_11 // After kicking the ground several times, you are convinced it is solid and should be taken home to investigate.

        MohoSrfLanded* = #CSS_surfaceSample_MohoSrfLanded_00 // Yup, its a chunk of Moho.
        MohoSrfLanded* = #CSS_surfaceSample_MohoSrfLanded_01 // Despite your belief you realize that Moho is in fact not a giant cookie. You hope you brought some medication.
        MohoSrfLandedNorthPole* = #CSS_surfaceSample_MohoSrfLandedNorthPole_00 // The ground is made up of old lava flows, suggesting periods of intense volcanic activity.
        MohoSrfLandedNorthernSinkholeRidge* = #CSS_surfaceSample_MohoSrfLandedNorthernSinkholeRidge_00 // The sample shows signs of sodium, potassium and hydroxide. These are great resources for life support.
        MohoSrfLandedNorthernSinkhole* = #CSS_surfaceSample_MohoSrfLandedNorthernSinkhole_00 // Ahah! You spot a familiar-looking rock a couple of meters away from you. It reminds you of the snack pack you've just eaten.
        MohoSrfLandedMidlands* = #CSS_surfaceSample_MohoSrfLandedMidlands_00 // Rocks lying around seem to be ejecta from volcanic eruptions.
        MohoSrfLandedWesternLowlands* = #CSS_surfaceSample_MohoSrfLandedWesternLowlands_00 // You perform an analysis of the local soil composition.
        MohoSrfLandedCentralLowlands* = #CSS_surfaceSample_MohoSrfLandedCentralLowlands_00 // The sample shows signs of scorch marks and intense heat, but you already knew that.
        MohoSrfLandedHighlands* = #CSS_surfaceSample_MohoSrfLandedHighlands_00 // The sample is very brittle and is covered with micro-cracks. It suggests that a super-heated atmosphere may have once existed here.
        MohoSrfLandedMinorCraters* = #CSS_surfaceSample_MohoSrfLandedMinorCraters_00 // Rocks all look the same to you. Wishing you had taken that geology course back on Kerbin, you try to break some stones by hitting them hard against each other. They seem to be very sturdy and don't break at all.
        MohoSrfLandedSouthWesternLowlands* = #CSS_surfaceSample_MohoSrfLandedSouthWesternLowlands_00 // The sample reveals complex artificial polymers, often used in reinforced fabrics and plastics.
        MohoSrfLandedSouthEasternLowlands* = #CSS_surfaceSample_MohoSrfLandedSouthEasternLowlands_00 // Get this to the lab, stat!
        MohoSrfLandedCanyon* = #CSS_surfaceSample_MohoSrfLandedCanyon_00 // The sample shows signs of past volcanic activity.
        MohoSrfLandedSouthPole* = #CSS_surfaceSample_MohoSrfLandedSouthPole_00 // This will make a great gift for little Werner Von Kerman Jr.!

        EveSrfLandedPoles* = #CSS_surfaceSample_EveSrfLandedPoles_00 // What could have possibly turned this soil purple?
        EveSrfLandedPoles* = #CSS_surfaceSample_EveSrfLandedPoles_01 // The sample seems compliant, at least for now. You decide to keep it away from the power cabinet just in case.
        EveSrfLandedMidlands* = #CSS_surfaceSample_EveSrfLandedMidlands_00 // You accidentally drop the sample. Its fall seems cushioned by the atmosphere.
        EveSrfLandedMidlands* = #CSS_surfaceSample_EveSrfLandedMidlands_01 // What could have possibly turned this soil purple?
        EveSrfLandedExplodiumSea* = #CSS_surfaceSample_EveSrfLandedExplodiumSea_00 // Oooooo. Purple!
        EveSrfLandedLowlands* = #CSS_surfaceSample_EveSrfLandedLowlands_00 // You reflect that returning this 1 kilogram rock to Kerbin will require well over a ton of rocket fuel. Is it worth it? Sure! It's purple!
        EveSrfLandedLowlands* = #CSS_surfaceSample_EveSrfLandedLowlands_01 // The soil seems to be significantly heavier here.
        EveSrfLandedHighlands* = #CSS_surfaceSample_EveSrfLandedHighlands_00 // It appears that the upper layers of the surface are by far the most purple. Perhaps whatever causes this color falls as precipitation.
        EveSrfLandedHighlands* = #CSS_surfaceSample_EveSrfLandedHighlands_01 // You analyze the sample that turns out to be an amethyst.
        EveSrfLandedPeaks* = #CSS_surfaceSample_EveSrfLandedPeaks_00 // The highlands regolith is loose and gravelly, and some stones are stained more purple than others.
        EveSrfLandedPeaks* = #CSS_surfaceSample_EveSrfLandedPeaks_01 // You pick up a basaltic rock. It seems to be eroded by wind and not by liquid.
        EveSrfLandedImpactEjecta* = #CSS_surfaceSample_EveSrfLandedImpactEjecta_00 // The surface sample reveals a lot of interesting chemical compounds. They suggest that much of the body that hit Eve burned up before reaching the planet's surface.
        EveSrfLandedImpactEjecta* = #CSS_surfaceSample_EveSrfLandedImpactEjecta_01 // You pick up a rock. It feels slightly molten and has an eroded look to it.
        EveSrfLandedCraterLake* = #CSS_surfaceSample_EveSrfLandedCraterLake_00 // You try to analyze the sample as thoroughly as possible, since it probably isn't going back.
        EveSrfLandedWesternSea* = #CSS_surfaceSample_EveSrfLandedWesternSea_00 // Bringing this home will be an extraordinary challenge.
        EveSrfLandedOlympus* = #CSS_surfaceSample_EveSrfLandedOlympus_00 // The rock you pick off the ground seems to possess unnatural power.
        EveSrfLandedOlympus* = #CSS_surfaceSample_EveSrfLandedOlympus_01 // The stone feels very warm in your hands as you turn it over and examine it.
        EveSrfLandedEasternSea* = #CSS_surfaceSample_EveSrfLandedEasternSea_00 // You've come all this way for THIS?
        EveSrfLandedFoothills* = #CSS_surfaceSample_EveSrfLandedFoothills_00 // This sample glows in the dark. You think that you should use the lead-lined sample box.
        EveSrfLandedFoothills* = #CSS_surfaceSample_EveSrfLandedFoothills_01 // You try to pick up a rock the size of a bouncy-ball, but it seems to weigh more than 5 Kerbals.
        EveSrfLandedShallows* = #CSS_surfaceSample_EveSrfLandedShallows_00 // The sample seems to be contaminated with explodium, since it acts like an eraser.
        EveSrfSplashedPoles* = #CSS_surfaceSample_EveSrfSplashedPoles_00 // Whatever substance the liquid is looks very, very dangerous.
        EveSrfSplashedExplodiumSea* = #CSS_surfaceSample_EveSrfSplashedExplodiumSea_00 // You hope the sample canister can survive the pressure of Eve's atmosphere before you take it back home.
        EveSrfSplashedExplodiumSea* = #CSS_surfaceSample_EveSrfSplashedExplodiumSea_01 // The surface sample just says "Something evil".
        EveSrfSplashedExplodiumSea* = #CSS_surfaceSample_EveSrfSplashedExplodiumSea_02 // The pH of this liquid is "Out of measurement range".
        EveSrfSplashedLowlands* = #CSS_surfaceSample_EveSrfSplashedLowlands_00 // This purplish liquid sample looks like your favorite soft drink. You are tempted to drink it.
        EveSrfSplashedImpactEjecta* = #CSS_surfaceSample_EveSrfSplashedImpactEjecta_00 // You try tasting your sample, and find that it is indeed not grape soda or anything that should come within a mile of any living thing.
        EveSrfSplashedCraterLake* = #CSS_surfaceSample_EveSrfSplashedCraterLake_00 // This liquid looks an awful lot like mercury now that you've collected it in a bottle. You hope your suit is as waterproof as the manual promised.
        EveSrfSplashedCraterLake* = #CSS_surfaceSample_EveSrfSplashedCraterLake_01 // You find traces of liquid blutonium.
        EveSrfSplashedWesternSea* = #CSS_surfaceSample_EveSrfSplashedWesternSea_00 // Johnny was a chemist's son, but Johnny is no more; What Johnny thought was H2O, was H2SO4.
        EveSrfSplashedWesternSea* = #CSS_surfaceSample_EveSrfSplashedWesternSea_01 // Further analysis will determine if this liquid is indeed grape-flavored, as you hope it is.
        EveSrfSplashedEasternSea* = #CSS_surfaceSample_EveSrfSplashedEasternSea_00 // You take a sample, and conclude that it is denser than Kerbin's core.
        EveSrfSplashedEasternSea* = #CSS_surfaceSample_EveSrfSplashedEasternSea_01 // The purple water dyes the suit pink.
        EveSrfSplashedExplodiumSea* = #CSS_surfaceSample_EveSrfSplashedExplodiumSea_00 // This isn't water, it is sulfur dioxide.
        EveSrfSplashedShallows* = #CSS_surfaceSample_EveSrfSplashedShallows_00 // The dense liquid is difficult to push the sample container into thanks to buoyancy.
        EveSrfSplashedShallows* = #CSS_surfaceSample_EveSrfSplashedShallows_01 // The toxic mixture known as explodium should be toxic to all life, but you can't shake the feeling something is watching you under the surface.

        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_00 // You grab a large boulder, at least twice your size, only to realize that it won't fit in the ship. You casually toss it off to the side and pick a more reasonable sample.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_01 // You accidentally toss the sample into the air and it sails off into space, so you grab another one.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_02 // This sample may contain the secrets of the formation of the Solar System! Or it might just be a bit of dirt and rocks...
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_03 // Taking a surface sample in low gravity is kinda tricky. As you dig the shovel in, the reaction force sends you flying upwards.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_04 // Unfortunately, the surface is composed of loose rock of various sizes. It looks like you'll have to wait a while longer for that baked potato.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_05 // Carborundum - clear evidence that Gilly was once subjected to a whole lot of "boom boom".
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_06 // Your Geiger counter clicks too many times to warrant keeping this.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_07 // You do a little show and tell with a huge boulder to Mission Control before they tell you to grab an actual sample.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_08 // You pick up a rock. It looks so dull that you throw it away in irritation. It soars into the skies, disappearing at the horizon. You wonder if it made an orbit until it hits you in the head from behind.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_09 // You pick up a rock, but you're so strong that the rock flies into space.
        GillySrfLanded* = #CSS_surfaceSample_GillySrfLanded_10 // As you lift the rock, the dust underneath it reaches escape velocity.
        GillySrfLandedMidlands* = #CSS_surfaceSample_GillySrfLandedMidlands_00 // You could almost fit this 'moon' into the container.
        GillySrfLandedMidlands* = #CSS_surfaceSample_GillySrfLandedMidlands_01 // The analyzer reports that there's carborundum found in the sample. With this we can upgrade our telescopes.
        GillySrfLandedLowlands* = #CSS_surfaceSample_GillySrfLandedLowlands_00 // You have a hard time picking up some dust samples as it flies out of your scoop and into the sky.
        GillySrfLandedHighlands* = #CSS_surfaceSample_GillySrfLandedHighlands_00 // You've found great amounts of carbon, but where are the diamonds?
        GillySrfLandedHighlands* = #CSS_surfaceSample_GillySrfLandedHighlands_01 // The chondrules in the regolith remind you of white chocolate chip brownies.

        KerbinSrfLandedKSC* = #CSS_surfaceSample_KerbinSrfLandedKSC_00 // You're sure this area is pretty well studied, but you did find a nickle.
        KerbinSrfLandedKSC* = #CSS_surfaceSample_KerbinSrfLandedKSC_01 // This substance is what makes the scientists yell at us when we go into the labs without cleaning our boots first.
        KerbinSrfLandedKSC* = #CSS_surfaceSample_KerbinSrfLandedKSC_02 // Dirt, dust, and burnt flecks of steel make up the sample.
        KerbinSrfLandedKSC* = #CSS_surfaceSample_KerbinSrfLandedKSC_03 // Looks like dirt. And rocks. And more dirt. Why are you out here again?
        KerbinSrfLandedKSC* = #CSS_surfaceSample_KerbinSrfLandedKSC_04 // Your metal detector beeps and whizzes a bit. After careful digging, you find part of the engine from Jeb's pickup truck. How it got there you don't know, but you do know why Jeb's truck isn't in the parking lot today.
        KerbinSrfLandedKSC* = #CSS_surfaceSample_KerbinSrfLandedKSC_05 // You see small metal scraps from the latest rocket explosion scattered around the ground.
        KerbinSrfLandedAdministration* = #CSS_surfaceSample_KerbinSrfLandedAdministration_00 // Your contract prohibits you from taking a sample here.
        KerbinSrfLandedAstronautComplex* = #CSS_surfaceSample_KerbinSrfLandedAstronautComplex_00 // The toilet seems to be the cleanest room in the complex.
        KerbinSrfLandedBaikerbanur* = #CSS_surfaceSample_KerbinSrfLandedBaikerbanur_00 // Shards of rusting metal are scattered all around the complex. Good to see they still blew up nicely back then.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_surfaceSample_KerbinSrfLandedBaikerbanurLaunchpad_00 // You prise up a piece of the disintegrating concrete as a souvenir.
        KerbinSrfLandedCrawlerway* = #CSS_surfaceSample_KerbinSrfLandedCrawlerway_00 // The surface seems compressed by the immense weight of the crawler passing by.
        KerbinSrfLandedFlagPole* = #CSS_surfaceSample_KerbinSrfLandedFlagPole_00 // Realizing that this is a place of remembrance you refrain from taking a sample.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_00 // The surface is charred and coated with burnt rocket propellant. There are also trace amounts of a conspicuous green substance.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_01 // Is that an engine bell?
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_02 // You attempt to pry off a sample, but Mission Control yells at you.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_03 // Don't we already know what this is made out of?
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_04 // You pull off a loose bit of the grated metallic substance. As you stuff it in the sample bag, a couple engineers eye you angrily.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_05 // The grated area is metallic, and the concrete is very... concrete-like. The staff advise you not to remove any section of the well-engineered launchpad, because it is expensive.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_06 // Unable to sample the concrete, you pick up a quarter instead.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_07 // You find a small puddle of rocket fuel where the last rocket was. Oops...
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_08 // You attempt to dig up a sample before you realizing that you are trying to dig up concrete with a shovel. You play it cool and hope no one notices.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_09 // You find the remains of an engine.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_10 // Your shovel hits the ground and... nothing. SCIENCE!
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_11 // You pick up a small screw that seems to have fallen out of your rocket. You hope it's not important.
        KerbinSrfLandedLaunchPad* = #CSS_surfaceSample_KerbinSrfLandedLaunchPad_12 // Don’t we already know what's under here?
        KerbinSrfLandedMissionControl* = #CSS_surfaceSample_KerbinSrfLandedMissionControl_00 // Despite prior assumptions, the ground here is not made of solid gold.
        KerbinSrfLandedR&D* = #CSS_surfaceSample_KerbinSrfLandedR&D_00 // The R&D techs whisk away your sample before you can even perform an analysis on it.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_surfaceSample_KerbinSrfLandedR&DCentralBuilding_00 // The soil here appears to be electrically charged from all the shuffling back and forth that the R&D personnel do.
        KerbinSrfLandedR&DCornerLab* = #CSS_surfaceSample_KerbinSrfLandedR&DCornerLab_00 // You find high concentrations of caffeine in the soil here.
        KerbinSrfLandedR&DMainBuilding* = #CSS_surfaceSample_KerbinSrfLandedR&DMainBuilding_00 // The R&D personnel closely scrutinize your technique as you take the sample.
        KerbinSrfLandedR&DObservatory* = #CSS_surfaceSample_KerbinSrfLandedR&DObservatory_00 // Everyone is too busy looking at other things to notice you taking a sample.
        KerbinSrfLandedR&DSideLab* = #CSS_surfaceSample_KerbinSrfLandedR&DSideLab_00 // Even here in a side lab there are elevated levels of caffeine in the sample from all the spilled cups of coffee.
        KerbinSrfLandedR&DSmallLab* = #CSS_surfaceSample_KerbinSrfLandedR&DSmallLab_00 // You take a small sample here, as a larger one would surely not go unnoticed.
        KerbinSrfLandedR&DTanks* = #CSS_surfaceSample_KerbinSrfLandedR&DTanks_00 // You find traces of a whole host of chemicals in the soil. Probably from the tanks.
        KerbinSrfLandedR&DWindTunnel* = #CSS_surfaceSample_KerbinSrfLandedR&DWindTunnel_00 // You take 5 samples, all of which blow away before you can secure them. Time to go have some snacks instead.
        KerbinSrfLandedRunway* = #CSS_surfaceSample_KerbinSrfLandedRunway_00 // You bend down to "gather samples," but decide to make some chalk drawings instead.
        KerbinSrfLandedRunway* = #CSS_surfaceSample_KerbinSrfLandedRunway_01 // Getting a sample here will be tricky. Hey look, a penny!
        KerbinSrfLandedRunway* = #CSS_surfaceSample_KerbinSrfLandedRunway_02 // The sample is composed of some sort of gray rock, with one half of it nearly perfectly smooth.
        KerbinSrfLandedRunway* = #CSS_surfaceSample_KerbinSrfLandedRunway_03 // Mission Control would like to remind you that, while we appreciate your efforts towards research, we already have a good understanding of the makeup of our runway.
        KerbinSrfLandedRunway* = #CSS_surfaceSample_KerbinSrfLandedRunway_04 // The surface appears to be very hard, like concrete. It might actually be concrete. Could be a very good surface to land on.
        KerbinSrfLandedRunway* = #CSS_surfaceSample_KerbinSrfLandedRunway_05 // After examining the asphalt, you conclude that it would be a great place to cook an egg.
        KerbinSrfLandedSPH* = #CSS_surfaceSample_KerbinSrfLandedSPH_00 // You find traces of jet fuel in the sample.
        KerbinSrfLandedSPHMainBuilding* = #CSS_surfaceSample_KerbinSrfLandedSPHMainBuilding_00 // You find paint chips and welding slag in the sample.
        KerbinSrfLandedSPHRoundTank* = #CSS_surfaceSample_KerbinSrfLandedSPHRoundTank_00 // You find traces of whatever chemical used to be kept in this tank.
        KerbinSrfLandedSPHTanks* = #CSS_surfaceSample_KerbinSrfLandedSPHTanks_00 // You find traces of a whole host of chemicals in the soil. Probably from the tanks.
        KerbinSrfLandedSPHWaterTower* = #CSS_surfaceSample_KerbinSrfLandedSPHWaterTower_00 // The soil here is more moist than usual.
        KerbinSrfLandedTrackingStation* = #CSS_surfaceSample_KerbinSrfLandedTrackingStation_00 // The soil here is completely uninteresting.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_surfaceSample_KerbinSrfLandedTrackingStationDishEast_00 // Yep, nothing to report about this sample. As expected.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_surfaceSample_KerbinSrfLandedTrackingStationDishNorth_00 // You contemplate whether it is even worth taking this sample.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_surfaceSample_KerbinSrfLandedTrackingStationDishSouth_00 // You step in dog poop while taking the sample. Lucky you.
        KerbinSrfLandedTrackingStationHub* = #CSS_surfaceSample_KerbinSrfLandedTrackingStationHub_00 // This whole area is entirely uninteresting. As expected, the surface sample from here is as well.
        KerbinSrfLandedVAB* = #CSS_surfaceSample_KerbinSrfLandedVAB_00 // The sample is 80% rocket fuel and 20% dirt. Good thing there is no EPA here.
        KerbinSrfLandedVABMainBuilding* = #CSS_surfaceSample_KerbinSrfLandedVABMainBuilding_00 // The soil sample is so volatile you are able to light it with a match.
        KerbinSrfLandedVABPodMemorial* = #CSS_surfaceSample_KerbinSrfLandedVABPodMemorial_00 // The soil here is dark and rich. Fertile, even.
        KerbinSrfLandedVABRoundTank* = #CSS_surfaceSample_KerbinSrfLandedVABRoundTank_00 // You find traces of whatever chemical used to be kept in this tank.
        KerbinSrfLandedVABSouthComplex* = #CSS_surfaceSample_KerbinSrfLandedVABSouthComplex_00 // There's a stray engine part sticking up out of the ground. Wonder what that was supposed to be fitted to.
        KerbinSrfLandedVABTanks* = #CSS_surfaceSample_KerbinSrfLandedVABTanks_00 // You find traces of a whole host of chemicals in the soil. Probably from the tanks.
        KerbinSrfLandedIslandAirfield* = #CSS_surfaceSample_KerbinSrfLandedIslandAirfield_00 // It's stony dirt, compacted by the aircraft wheels of yesteryear.
        KerbinSrfLandedWoomerang* = #CSS_surfaceSample_KerbinSrfLandedWoomerang_00 // Looks like normal launchpad deposits of ash, fuel residue and rocket shrapnel.

        KerbinSrfLandedWater* = #CSS_surfaceSample_KerbinSrfLandedWater_00 // You seem to have captured a small crustacean. Mission Control is less than impressed.
        KerbinSrfLandedWater* = #CSS_surfaceSample_KerbinSrfLandedWater_01 // The land surface near the water contains high amounts of water, salt and seaweed.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_00 // You wonder why you put on a two-million-dollar spacesuit and got into a multi-billion dollar rocket just to pick up some dirt.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_01 // Yep. Looks like dirt.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_02 // Beautiful green grass.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_03 // Yep. Still dirt.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_04 // This is some quality grass.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_05 // I didn't sign up for this.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_06 // An incredibly long, furry, purple creature slithers bizarrely out of the grass. You rub your eyes and when you look again there is nothing in sight.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_07 // I got a jar o' dirt! I got a jar o' dirt!
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_08 // You pick at the dirt and discover a worm under the grass. You promptly name him Kelbin and attempt to hug him but end up squishing him in your arms. You feel bad so you open up a container and gently place him inside.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_09 // You notice that someone may have planted onions here once.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_10 // Years of training has brought kerbalkind here, to find this handful of soil! You hope you won't be fired for that.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_11 // The substance contains a remarkable amount of organic material. Excited, you inform Mission Control of this fact, but they seem less than thrilled.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_12 // You pick a likely-looking plant to put in a pot and be your companion as you journey across the stars.
        KerbinSrfLandedGrasslands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_13 // You try to taste the ground, but realize that that would be silly. You kiss it instead, happy to be here alive, for once.
        KerbinSrfLandedHighlands* = #CSS_surfaceSample_KerbinSrfLandedHighlands_00 // Dirt, grass, and some small rocks. You suspect this isn't going to be much of a ground breaking discovery.
        KerbinSrfLandedHighlands* = #CSS_surfaceSample_KerbinSrfLandedHighlands_01 // You discover dried out straw, lichens, and moss.
        KerbinSrfLandedHighlands* = #CSS_surfaceSample_KerbinSrfLandedHighlands_02 // You find a tiny fleck of a shiny yellow material among the rocks. It seems that there is gold in these hills.
        KerbinSrfLandedHighlands* = #CSS_surfaceSample_KerbinSrfLandedHighlands_03 // The rocks here are far more interesting than the ones you find elsewhere. You pick up a few to add to your rock collection.
        KerbinSrfLandedShores* = #CSS_surfaceSample_KerbinSrfLandedShores_00 // You pick up a small creature with far too many legs. Mission control denies your request to keep it as a pet.
        KerbinSrfLandedShores* = #CSS_surfaceSample_KerbinSrfLandedShores_01 // You take a sample of the soil. It's very muddy and sandy. There might be a body of water nearby.
        KerbinSrfLandedShores* = #CSS_surfaceSample_KerbinSrfLandedShores_02 // You scoop up some watery sand and decide the best use for it is to build a sand castle.
        KerbinSrfLandedShores* = #CSS_surfaceSample_KerbinSrfLandedShores_03 // Hey look, a wristwatch! Finders, keepers!
        KerbinSrfLandedShores* = #CSS_surfaceSample_KerbinSrfLandedShores_04 // You build a sand castle, then take a sample of it. It's sand.
        KerbinSrfLandedShores* = #CSS_surfaceSample_KerbinSrfLandedShores_05 // You pick up a particularly nice-looking seashell and add it to your personal collection. The not-so-nice ones you send to Mission Control.
        KerbinSrfLandedMountains* = #CSS_surfaceSample_KerbinSrfLandedMountains_00 // The rock sample you pry from the mountainside seems prouder than all your other rock samples. As if it knows that it was part of something unimaginably greater.
        KerbinSrfLandedMountains* = #CSS_surfaceSample_KerbinSrfLandedMountains_01 // Here the surface is mostly barren... snow, dirt and rocks. You're very confident that if you looked under the snow, you'd find more dirt and rocks.
        KerbinSrfLandedMountains* = #CSS_surfaceSample_KerbinSrfLandedMountains_02 // The air is thin, the climate is frigid, and the ground is impenetrable.
        KerbinSrfLandedDeserts* = #CSS_surfaceSample_KerbinSrfLandedDeserts_00 // Lots of sand and rocks here. You're thankful that you're in a climate-controlled suit, because it sure looks hot out there.
        KerbinSrfLandedDeserts* = #CSS_surfaceSample_KerbinSrfLandedDeserts_01 // Sand, sand, and more sand. A rock adds some badly needed variety to the landscape.
        KerbinSrfLandedDeserts* = #CSS_surfaceSample_KerbinSrfLandedDeserts_02 // You saw a blue box on the horizon, but it was just an illusion. Also, you picked up a stone.
        KerbinSrfLandedDeserts* = #CSS_surfaceSample_KerbinSrfLandedDeserts_03 // You remember your wilderness survival training... wait, do you need that training in space? What are you doing here in the desert? Someone is going to answer for this.
        KerbinSrfLandedDeserts* = #CSS_surfaceSample_KerbinSrfLandedDeserts_04 // The sand is dry and loose and it looks like it's going to take some effort to clean your gear afterwards.
        KerbinSrfLandedDeserts* = #CSS_surfaceSample_KerbinSrfLandedDeserts_05 // You build a sand castle to establish your dominance over the desert and demand that all nearby sand creatures swear fealty.
        KerbinSrfLandedBadlands* = #CSS_surfaceSample_KerbinSrfLandedBadlands_00 // The grass here is definitely not as green as it is in other places, but the knowledge that you've been at a place called the Badlands makes you feel cool.
        KerbinSrfLandedBadlands* = #CSS_surfaceSample_KerbinSrfLandedBadlands_01 // Rock, coal, and dead plant matter make up the sample.
        KerbinSrfLandedBadlands* = #CSS_surfaceSample_KerbinSrfLandedBadlands_02 // Your surface sample tries to bite you.
        KerbinSrfLandedTundra* = #CSS_surfaceSample_KerbinSrfLandedTundra_00 // You scoop up some snow. Half goes in the bag while the other half flies towards Bob's head at a respectable velocity.
        KerbinSrfLandedTundra* = #CSS_surfaceSample_KerbinSrfLandedTundra_01 // The ground here seems to be completely frozen. It was very hard to scoop up this sample.
        KerbinSrfLandedTundra* = #CSS_surfaceSample_KerbinSrfLandedTundra_02 // You remind yourself to take a surface sample before relieving yourself.
        KerbinSrfLandedTundra* = #CSS_surfaceSample_KerbinSrfLandedTundra_03 // The ground here is partially frozen and tufts of moose hair cover the matted grass.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedIceCaps_00 // It's ice and snow, what a surprise!
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedIceCaps_01 // This ice is not very solid, the ice caps are melting. 
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedIceCaps_02 // As you analyse the sample, you see a massive chunk of ice break off. You want to leave.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedIceCaps_03 // You are amazed at how much microscopic life is contained within the piece of frozen water currently in your hands.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedIceCaps_04 // This ice is not very solid, indicating that the ice caps are melting. 
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedIceCaps_05 // As you analyse the sample, you see a massive chunk of ice break off in the distance. You want to leave.
        KerbinSrfLandedNorthernIceShelf* = #CSS_surfaceSample_KerbinSrfLandedNorthernIceShelf_00 // You pick up a piece of ice and lick it. It tastes cold and vaguely salty.
        KerbinSrfLandedNorthernIceShelf* = #CSS_surfaceSample_KerbinSrfLandedNorthernIceShelf_01 // You take a sample of the ice. Its texture is brittle with watery attributes. Is this what happens when water gets too cold?
        KerbinSrfLandedNorthernIceShelf* = #CSS_surfaceSample_KerbinSrfLandedNorthernIceShelf_02 // You got a sample but feared to dig any deeper because of the cracking sounds. You try to not think back on how you landed here.
        KerbinSrfLandedSouthernIceShelf* = #CSS_surfaceSample_KerbinSrfLandedSouthernIceShelf_00 // Even the top layer of ice is hard and glassy, and digging out a chunk takes a lot of effort.
        KerbinSrfLandedSouthernIceShelf* = #CSS_surfaceSample_KerbinSrfLandedSouthernIceShelf_01 // The material appears to lower the surface temperature of whatever it comes in contact with.
        KerbinSrfLandedSouthernIceShelf* = #CSS_surfaceSample_KerbinSrfLandedSouthernIceShelf_02 // As you drill for a sample, you remember hearing from one of the scientists that the ice is very fragile this year, and then try to forget about it.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_00 // You scoop up a sample of the surface. It's a very humid sample, you hope the equipment has been properly waterproofed.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_01 // There seems to be a lot of a liquid substance. Surely this will be a huge advancement in science as we know it.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_02 // This material seems to take on the shape of what looks like a Kerbin container. More study is needed.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_03 // You make sure to include some plankton in your sample for the folks back at KSC.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_04 // Curious - something essential to life that isn't green, isn't explosive, and doesn't start with "K".
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_05 // You put the water into your pocket. It oozes and scroogles around for a bit. It gets in your nethers. Oops.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_06 // You find your pick and shovel rather ineffective here.
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_07 // "Di-hydrogen monoxide, sodium chloride... wait, did you just send us a sample of salt water?"
        KerbinSrfSplashedWater* = #CSS_surfaceSample_KerbinSrfSplashedWater_08 // You somehow managed to catch a fish. Unfortunately, it doesn't fit in your pocket.
        KerbinSrfSplashedGrasslands* = #CSS_surfaceSample_KerbinSrfSplashedGrasslands_00 // At least this bottle of murky water will be useful for a water quality analysis.
        KerbinSrfSplashedShores* = #CSS_surfaceSample_KerbinSrfSplashedShores_00 // You've taken a sample of the water. There are bits of vegetation in it, which strongly suggests there is land nearby.
        KerbinSrfSplashedShores* = #CSS_surfaceSample_KerbinSrfSplashedShores_01 // The water has a lot of sand in it, likely related to the nearby beach.
        KerbinSrfSplashedShores* = #CSS_surfaceSample_KerbinSrfSplashedShores_02 // The sharks are circling. You pointedly try to ignore this as you collect some water for quality analysis.
        KerbinSrfSplashedShores* = #CSS_surfaceSample_KerbinSrfSplashedShores_03 // "Di-hydrogen monoxide, sodium chloride... wait, did you just send us a sample of salt water?"
        KerbinSrfSplashedDeserts* = #CSS_surfaceSample_KerbinSrfSplashedDeserts_00 // It looks like your normal gritty water. But this is no ordinary gritty water. It's desert water, and it's worth its weight in....well, water really.
        KerbinSrfSplashedDeserts* = #CSS_surfaceSample_KerbinSrfSplashedDeserts_01 // A brief chemical analysis of the water reveals high amounts of minerals associated with ancient fossil groundwater, presumably rained during wetter times aeons ago.
        KerbinSrfSplashedBadlands* = #CSS_surfaceSample_KerbinSrfSplashedBadlands_00 // The water will have cooled by the time it gets back, but it's still full of silt and dust.
        KerbinSrfSplashedTundra* = #CSS_surfaceSample_KerbinSrfSplashedTundra_00 // Looks like normal water to you, perhaps with a faint peaty tinge.
        KerbinSrfSplashedIceCaps* = #CSS_surfaceSample_KerbinSrfSplashedIceCaps_00 // The water might be freezing, but it's still teeming with microscopic life.
        KerbinSrfSplashedNorthernIceShelf* = #CSS_surfaceSample_KerbinSrfSplashedNorthernIceShelf_00 // The water is salty and contains particles of ice.
        KerbinSrfSplashedSouthernIceShelf* = #CSS_surfaceSample_KerbinSrfSplashedSouthernIceShelf_00 // There's a large chunk of ice in it, so you have to grind it up before it fits in the tube with the water.

        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_00 // Done and dusted.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_01 // You take a sample and confirm that the Mun is not made of cheese.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_02 // Wensleydale? Stilton? It isn't like any cheese you've tasted. You wonder if its actually cheese at all.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_03 // You suddenly realize why the physical examination screened for breathing problems.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_04 // Oddly enough, the sample smells similar to Swiss cheese. One wonders if it's edible.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_05 // The dust seems to be ionized due to long-term exposure to sunlight without an atmosphere to filter it. It sticks to your suit.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_06 // Unfortunately, it's not cheese. You double-check it, but it still isn't.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_07 // You note the sample's lack of cheese.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_08 // The surface appears to be a fine dust with a grayish tone. Seems too flaky to make snowballs with.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_09 // Finally, something that isn't dirt: a rock!
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_10 // So, breccias are actually kind of boring.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_11 // Through extensive and professional testing, you find out that, contrary to popular belief, the Mun is not made of cheese. Also, you immediately regret your testing.
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_12 // This rock has tiny craters on it. Neat!
        MunSrfLanded* = #CSS_surfaceSample_MunSrfLanded_13 // The lead scientists back at KSP go against your idea to grill your sample between two pieces of bread.
        MunSrfLandedMidlands* = #CSS_surfaceSample_MunSrfLandedMidlands_00 // The ground appears to be made of very small, sharp, abrasive pieces of gray rock. It would probably be best if you didn't rub your space suit against the stuff.
        MunSrfLandedMidlands* = #CSS_surfaceSample_MunSrfLandedMidlands_01 // Very... rocky.
        MunSrfLandedMidlands* = #CSS_surfaceSample_MunSrfLandedMidlands_02 // The darker midlands surface appears to be made up of basaltic rocks.
        MunSrfLandedMidlands* = #CSS_surfaceSample_MunSrfLandedMidlands_03 // The sample contains odd glass spherules of various colors. They're quite pretty!
        MunSrfLandedNorthernBasin* = #CSS_surfaceSample_MunSrfLandedNorthernBasin_00 // The sample contains evidence of a weak, localized magnetic field.
        MunSrfLandedNorthernBasin* = #CSS_surfaceSample_MunSrfLandedNorthernBasin_01 // The surface here consists of multiple types of rock. Some appear almost crystalline.
        MunSrfLandedEastCrater* = #CSS_surfaceSample_MunSrfLandedEastCrater_00 // The sample contains a combination of breccia and melted materials.
        MunSrfLandedEastCrater* = #CSS_surfaceSample_MunSrfLandedEastCrater_01 // There are high concentrations of metals in this crater.
        MunSrfLandedNorthwestCrater* = #CSS_surfaceSample_MunSrfLandedNorthwestCrater_00 // The ground materials appear to be a combination of basaltic rocks and breccia.
        MunSrfLandedNorthwestCrater* = #CSS_surfaceSample_MunSrfLandedNorthwestCrater_01 // Deeper samples seems to contain more fragmented and shattered formations of rock.
        MunSrfLandedSouthwestCrater* = #CSS_surfaceSample_MunSrfLandedSouthwestCrater_00 // The sample appears to be radioactive.
        MunSrfLandedSouthwestCrater* = #CSS_surfaceSample_MunSrfLandedSouthwestCrater_01 // There appears to be layers of completely different materials here. It's possible this site has had multiple impacts.
        MunSrfLandedFarsideCrater* = #CSS_surfaceSample_MunSrfLandedFarsideCrater_00 // Tiny flecks of purple flesh dot the mineral deposits here. The texture of the crater looks quite puckered. Is this evidence that this was once the home of the legendary Kraken?
        MunSrfLandedFarsideCrater* = #CSS_surfaceSample_MunSrfLandedFarsideCrater_01 // Samples from this location appear to be similar in makeup to the powdery surface of the Mun.
        MunSrfLandedCanyons* = #CSS_surfaceSample_MunSrfLandedCanyons_00 // Samples in this location are striated. It's possible that the surface has fractured here.
        MunSrfLandedPolarCrater* = #CSS_surfaceSample_MunSrfLandedPolarCrater_00 // To your surprise, you find a large lump of ice lodged in the center of the crater. Upon further analysis you find that it doesn't taste particularly well, and is too chunky for the snow-cone machine.
        MunSrfLandedPolarCrater* = #CSS_surfaceSample_MunSrfLandedPolarCrater_01 // Samples from this location seem to show intense shock patterns.
        MunSrfLandedPolarCrater* = #CSS_surfaceSample_MunSrfLandedPolarCrater_02 // You examine the sample you've collected, and throw it into the container for further testing.
        MunSrfLandedPolarCrater* = #CSS_surfaceSample_MunSrfLandedPolarCrater_03 // It appears that some of the samples are magnetic and show a faint alignment.
        MunSrfLandedPoles* = #CSS_surfaceSample_MunSrfLandedPoles_00 // You wonder if this would make a nice snack.
        MunSrfLandedPoles* = #CSS_surfaceSample_MunSrfLandedPoles_01 // It's a cold piece of soil. As cold as ice. Wait.
        MunSrfLandedPoles* = #CSS_surfaceSample_MunSrfLandedPoles_02 // You examine the rocks you have collected. Upon further investigation, you realize that there is a strange weight to one of them, it does not feel like it has the same weight as the other rocks you've collected and seems hollow. You promptly place it into a sample container.
        MunSrfLandedPoles* = #CSS_surfaceSample_MunSrfLandedPoles_03 // The samples here show lower concentrations of ejecta. There appears to be some liquids in the soil that have frozen permanently.
        MunSrfLandedPolarLowlands* = #CSS_surfaceSample_MunSrfLandedPolarLowlands_00 // The sample seems to contain frozen liquids... we should send them back to Kerbin for further analysis.
        MunSrfLandedHighlands* = #CSS_surfaceSample_MunSrfLandedHighlands_00 // You take a small rock and your nine iron, place the rock on a T, and knock it into low orbit.
        MunSrfLandedHighlands* = #CSS_surfaceSample_MunSrfLandedHighlands_01 // The Mun dust here is light and thin... It's very poor sandcastle-building material. That doesn't stop you from making one.
        MunSrfLandedHighlands* = #CSS_surfaceSample_MunSrfLandedHighlands_02 // The sample appears to be comprised of a large number of materials that have layered over time.
        MunSrfLandedHighlands* = #CSS_surfaceSample_MunSrfLandedHighlands_03 // The sample has low amounts of basaltic rock. This might account for the changes in coloration we've seen.
        MunSrfLandedHighlandCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_00 // Seems muddy, in a waterless kind of way. You find it appropriate to remove your shoes before boarding the ship again, no thought given to the problems of removing space attire while still outside.
        MunSrfLandedHighlandCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_01 // The crater seems to contain materials from lower layers of the surface.
        MunSrfLandedHighlandCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_02 // These samples appear to be quite old compared to others we've taken.
        MunSrfLandedHighlandCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_03 // You sample the dark surface of the crater. This should help determine what type of object hit here.
        MunSrfLandedHighlandCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_04 // This crater seems to filled with useful materials in high concentration. What luck!
        MunSrfLandedMidlandCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_00 // The patterning of this surface sample is particularly interesting.
        MunSrfLandedMidlandCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_01 // As you sample the crater you can't help but feel bad for the Mun. It's been beaten up pretty bad by these impacts.
        MunSrfLandedMidlandCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_02 // You dig around in the surface of the crater, looking for something neat.
        MunSrfLandedMidlandCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_03 // You find a really cool looking rock and decide to keep it. Then, you throw a less cool looking rock into the sample container.
        MunSrfLandedEastFarsideCrater* = #CSS_surfaceSample_MunSrfLandedEastFarsideCrater_00 // This crater must have had a really nasty impact, the samples are heavier than normal.
        MunSrfLandedEastFarsideCrater* = #CSS_surfaceSample_MunSrfLandedEastFarsideCrater_01 // You're glad that the Mun's gravity is so low. Digging is backbreaking work!
        MunSrfLandedTwinCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_00 // Definitely not Cheddar. Winchester? No. Dorset Blue Vinney? Nah.
        MunSrfLandedTwinCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_01 // This area has a particularly high concentration of rare elements. Nice!
        MunSrfLandedTwinCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_02 // Continual samples of this area confirm it is rich in useful materials.
        MunSrfLandedTwinCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_03 // You dig around for a nice sample of the crater, carefully selecting some of everything.

        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_00 // As you gather up some Minmus material, you label it as "Definitely not ice".
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_01 // You scoop a sample up to be analyzed back home, then smear some over your gloves to sniff when you get back in the capsule. You bet it'll smell minty and delicious.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_02 // You taste the sample, and find that it does not taste like mint at all. You wonder where the medicine cabinet went.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_03 // You are disappointed to discover that the sample does not taste like ice cream, but instead tastes more like frozen yogurt.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_04 // Mission Control tentatively asks you how it tastes.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_05 // After excavating the surface, you find a hidden ice layer. The ice appears to have a slightly greenish tinge to it. Upon further examination, you find it to have the perfect consistency for snow-cones, yet the taste leaves much to be desired.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_06 // You try to taste the sample but your helmet gets in the way.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_07 // The white mountains have a snow-like surface. The frozen lakes seem to be made of the same substance, but much smoother.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_08 // Must... not... taste...
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_09 // Glad of your geology classes, you search for rocks to analyze. Finding none, you curse bitterly.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_10 // Surface samples confirm that it is not made out of mint, even though it looks and tastes like it.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_11 // You ask Mission Control if the substance could be marketed as some sort of air freshener. They consider your request.
        MinmusSrfLanded* = #CSS_surfaceSample_MinmusSrfLanded_12 // The surface seems to consist of tiny crystal-like grains.
        MinmusSrfLandedHighlands* = #CSS_surfaceSample_MinmusSrfLandedHighlands_00 // Ice up here has a very high reflectivity, which must significantly contribute to the high albedo of Minmus.
        MinmusSrfLandedMidlands* = #CSS_surfaceSample_MinmusSrfLandedMidlands_00 // You realize that the ground here looks more like cookie dough then the mint ice cream on the flat lands. Your mouth starts to water.
        MinmusSrfLandedMidlands* = #CSS_surfaceSample_MinmusSrfLandedMidlands_01 // The sample you've taken indicates that the surface is made from different types of snow and ice intricately intermixed with each other.
        MinmusSrfLandedLowlands* = #CSS_surfaceSample_MinmusSrfLandedLowlands_00 // You take a handful of snow, ice, and dirt and put it into your sample bag. You hope the science team on Kerbin will figure out what it is and why it's not suitable for Kerbal consumption.
        MinmusSrfLandedFlats* = #CSS_surfaceSample_MinmusSrfLandedFlats_00 // You want to get your helmet off and taste the sample. instead, you pull yourself together and continue with the mission.
        MinmusSrfLandedFlats* = #CSS_surfaceSample_MinmusSrfLandedFlats_01 // The surface is perfectly flat and smooth. You have to use your shovel to dig out some ice.
        MinmusSrfLandedFlats* = #CSS_surfaceSample_MinmusSrfLandedFlats_02 // The ground appears to be made of small, cyan crystals. It doesn't look like it would be enjoyable walking barefoot here.
        MinmusSrfLandedGreatFlats* = #CSS_surfaceSample_MinmusSrfLandedGreatFlats_00 // It's just ice, with occasional snowflakes here and there.
        MinmusSrfLandedGreaterFlats* = #CSS_surfaceSample_MinmusSrfLandedGreaterFlats_00 // The sample consists of multiple layers of very reflective greenish ice. You wonder what compound gives it such a nice colour.
        MinmusSrfLandedLesserFlats* = #CSS_surfaceSample_MinmusSrfLandedLesserFlats_00 // The sample contains several distinct types of ice frozen to form a complex, multi-layered pattern.
        MinmusSrfLandedPoles* = #CSS_surfaceSample_MinmusSrfLandedPoles_00 // You see that The Goo has formed itself into a ice cream cone, You note how yummy it looks.
        MinmusSrfLandedPoles* = #CSS_surfaceSample_MinmusSrfLandedPoles_01 // The surface here looks even tastier than everywhere else.
        MinmusSrfLandedPoles* = #CSS_surfaceSample_MinmusSrfLandedPoles_02 // It has the consistency of a snowball, and is likely to be just as good at being thrown into other Kerbals' faces.
        MinmusSrfLandedSlopes* = #CSS_surfaceSample_MinmusSrfLandedSlopes_00 // It's snow, ice, some loose dirt, and a couple of pebbles, frozen together in a strangely complicated way.

        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_00 // Different colored rocks are probably made of different stuff. You should grab as many as you can.
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_01 // This red dust could be iron oxide, or possibly paprika.
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_02 // Nope. Not barbecue flavored.
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_02 // Yup. Dust. Are you surprised?
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_04 // This sand works well for drawing pictures on your space suit.
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_05 // You make a note: "Bring laser next time."
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_06 // Too bad it's only red spice. It would have been much better to go to Eve.
        DunaSrfLanded* = #CSS_surfaceSample_DunaSrfLanded_07 // It looks like some sort of spice.
        DunaSrfLandedPoles* = #CSS_surfaceSample_DunaSrfLandedPoles_00 // The outer icy crust appears to be made of an unusually dense ice. It gives off wisps of white vapour when held against your warm suit.
        DunaSrfLandedPoles* = #CSS_surfaceSample_DunaSrfLandedPoles_01 // The ice is a mixture of dry ice and water ice. And those pesky percholorates are all over it.
        DunaSrfLandedPoles* = #CSS_surfaceSample_DunaSrfLandedPoles_02 // On closer inspection, the ice from under the crust appears to have a jumbled hexa-cubic crystal structure rather than the standard tesselating hexagons found on Kerbin.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlands_00 // The exact chemical composition of the surface will no doubt be of interest to the scientists back home.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlands_01 // The winds that girdle the planet have mixed the local grains with dust from all over the surface.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlands_02 // It appears this soil could be used for snack production, possibly after several centuries of Kerbal-forming.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlands_03 // The soil sample contains percholorates. Time to find a different planet.
        DunaSrfLandedLowlands* = #CSS_surfaceSample_DunaSrfLandedLowlands_00 // If there is evidence of ancient water here, you ain't finding it. Maybe it's buried too deep.
        DunaSrfLandedLowlands* = #CSS_surfaceSample_DunaSrfLandedLowlands_01 // Digging down a couple of feet, you hit a rocky surface worn smooth by aeons of erosion by the wind.
        DunaSrfLandedLowlands* = #CSS_surfaceSample_DunaSrfLandedLowlands_02 // It's very thin and fine. You imagine a rover could easily become stuck in this if it had small wheels.
        DunaSrfLandedCraters* = #CSS_surfaceSample_DunaSrfLandedCraters_00 // The surface here is much more solid, darker and less crumbly that other areas on Duna, indicating different localised geology.
        DunaSrfLandedCraters* = #CSS_surfaceSample_DunaSrfLandedCraters_01 // The minerals you manage to chip off the rocks on the crater floor display oddly deformed crystal structures, as though subjected to intense heat and pressure.
        DunaSrfLandedCraters* = #CSS_surfaceSample_DunaSrfLandedCraters_02 // You pick around, searching for a piece of the ancient meteorite that hit here. Instead, you find a piece of your ship hull that you can't quite seem to find where it came from.
        DunaSrfLandedHighlands* = #CSS_surfaceSample_DunaSrfLandedHighlands_00 // You pick up some loose stones that look to have been part of a landslide.
        DunaSrfLandedHighlands* = #CSS_surfaceSample_DunaSrfLandedHighlands_01 // The loose mountain rock you've picked up seems to contain a lot of iron (III) oxide. As such, it's not tasty, nor particularly healthy.
        DunaSrfLandedHighlands* = #CSS_surfaceSample_DunaSrfLandedHighlands_02 // You chip away at the hard basalt with your rock hammer and eventually get a good sample.
        DunaSrfLandedHighlands* = #CSS_surfaceSample_DunaSrfLandedHighlands_03 // The regolith is toxic with high levels of perchlorate compounds.
        DunaSrfLandedMidlandSea* = #CSS_surfaceSample_DunaSrfLandedMidlandSea_00 // You dig a little and find a perfectly preserved series of ripple marks from presumably billions of years ago.
        DunaSrfLandedMidlandSea* = #CSS_surfaceSample_DunaSrfLandedMidlandSea_01 // The darker ground here is much more compacted than the windblown sediments of elsewhere on Duna, as if laid down and cemented by water.
        DunaSrfLandedMidlandSea* = #CSS_surfaceSample_DunaSrfLandedMidlandSea_02 // You start to dig with trepidation at the possibility of finding water before you realise you left your sample container on the ship and have to anticlimatically go and fetch it.
        DunaSrfLandedNorthernBasin* = #CSS_surfaceSample_DunaSrfLandedNorthernBasin_00 // The dust grains here are very large, and feel very rough as you scoop them into a container.
        DunaSrfLandedNorthernBasin* = #CSS_surfaceSample_DunaSrfLandedNorthernBasin_01 // The tough igneous rocks here hamper your attempts to drill a sample. It would be much easier if you had a machine to help.
        DunaSrfLandedNorthernBasin* = #CSS_surfaceSample_DunaSrfLandedNorthernBasin_02 // The local rocks look like breccia and basalt, and contain evidence of significant shocking and fracturing.
        DunaSrfLandedSouthernBasin* = #CSS_surfaceSample_DunaSrfLandedSouthernBasin_00 // There's a lot of frozen water in this basin, hidden under a thin layer of dust.
        DunaSrfLandedSouthernBasin* = #CSS_surfaceSample_DunaSrfLandedSouthernBasin_01 // There's a lighter section among the basalt. It looks a bit like limestone. You consider it important and put some of it into your sample container.
        DunaSrfLandedSouthernBasin* = #CSS_surfaceSample_DunaSrfLandedSouthernBasin_02 // Nearby rocks look consistent with flood basalts on Kerbin, suggesting this area was once a giant volcano.
        DunaSrfLandedNorthernShelf* = #CSS_surfaceSample_DunaSrfLandedNorthernShelf_00 // You don't even have to scoop around for a sample, just hold up a container and it blows right in and collects at the back.
        DunaSrfLandedNorthernShelf* = #CSS_surfaceSample_DunaSrfLandedNorthernShelf_01 // The sand here is much finer from being blown around, and looks to contain traces of tiny polar ice crystals.
        DunaSrfLandedNorthernShelf* = #CSS_surfaceSample_DunaSrfLandedNorthernShelf_02 // There appears to be traces of water in amongst the fine soil and shifting sand.
        DunaSrfLandedMidlandCanyon* = #CSS_surfaceSample_DunaSrfLandedMidlandCanyon_00 // The dust here contains traces of ice crystals, the concentrations of which increase with depth. You also find a random, perfectly rounded pebble amongst the sand.
        DunaSrfLandedMidlandCanyon* = #CSS_surfaceSample_DunaSrfLandedMidlandCanyon_01 // After an effort to dig a hole, you hit bedrock. It seems to be worn smooth, as if by water rather than dust.
        DunaSrfLandedMidlandCanyon* = #CSS_surfaceSample_DunaSrfLandedMidlandCanyon_02 // The small rock you pick up seems a variety of alluvial congomerate. You wonder if there was ever a river here.
        DunaSrfLandedEasternCanyon* = #CSS_surfaceSample_DunaSrfLandedEasternCanyon_00 // The surface is mainly deep drifts of dust, so thick and fine that you can't dig deep enough to find solid ground. Dust will have to suffice.
        DunaSrfLandedEasternCanyon* = #CSS_surfaceSample_DunaSrfLandedEasternCanyon_01 // You find a rare rock outcrop protruding from the dust, which is mostly basaltic and shows signs of extensive faulting.
        DunaSrfLandedEasternCanyon* = #CSS_surfaceSample_DunaSrfLandedEasternCanyon_02 // You wonder if you need to take a sample considering there is so much dust on you that you could be considered a sample on your own right.
        DunaSrfLandedWesternCanyon* = #CSS_surfaceSample_DunaSrfLandedWesternCanyon_00 // The dust here appears to be comprised of rock from multiple regions, as suggested by its varying degrees of fineness.
        DunaSrfLandedWesternCanyon* = #CSS_surfaceSample_DunaSrfLandedWesternCanyon_01 // Lots of dust, but after some digging down you still can't find any bedrock.
        DunaSrfLandedWesternCanyon* = #CSS_surfaceSample_DunaSrfLandedWesternCanyon_02 // You find a nice metal ruler in the sand! You're ready to proclaim the discovery of an alien civilization, but then you find that the one in your suit is missing.
        DunaSrfLandedPolarHighlands* = #CSS_surfaceSample_DunaSrfLandedPolarHighlands_00 // The soil here is like tundra; dirt mixed with ice crystals, with a thin layer of fresh white frost on top.
        DunaSrfLandedPolarHighlands* = #CSS_surfaceSample_DunaSrfLandedPolarHighlands_01 // Breaking through the thin crust, you find layers of dirt mixed with ice, laid down in countless cycles of thawing and freezing.
        DunaSrfLandedPolarCraters* = #CSS_surfaceSample_DunaSrfLandedPolarCraters_00 // You put a sample of the crustal ice in a tube and put it in your pocket. You take it out again shortly afterwards to see a tubeful of vapour bfore the lid pops off in your face.
        DunaSrfLandedPolarCraters* = #CSS_surfaceSample_DunaSrfLandedPolarCraters_01 // Collecting a sample of the less dense ice under the crust, you sneak a taste. It's ice all right, if a little off-colour and gritty.

