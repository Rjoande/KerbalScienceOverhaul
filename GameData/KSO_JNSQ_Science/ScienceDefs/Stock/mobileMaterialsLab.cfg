        LaytheSrfSplashedJoolwardSea* = #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedJoolwardSea_00 // The readouts show subtle oscillations in the fluid measurements, as if the sea itself is being gently stretched toward Jool.
