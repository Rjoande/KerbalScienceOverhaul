@EXPERIMENT_DEFINITION:HAS[#id[bd_IRradiometer]]
{
    %RESULTS
    {
		GrannusInSpaceHigh* = #GEPscience_bd_IRradiometer_GrannusInSpaceHigh_00 // The IR radiometer stares into the dim red glow of Grannus. The numbers look calm, but the comms delay makes every beep feel like a long-distance conversation.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthPolarZone_00 // The northern polar band shows a faint infrared dip, like a cooler cap on the star. Mission Control suggests “try turning it off and on again” and you receive that advice much later.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthSubpolarZone_00 // Subpolar readings hint at weak, drifting hot spots. They move so slowly you start timing them by snack breaks.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthTemperateZone_00 // The infrared profile smooths out here, almost boring. “Almost boring” is the best kind of exciting this far from home.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowNorthTropicZone_00 // A slight brightening appears in the tropic band, then fades as if Grannus blinked. The instrument insists it did not blink first.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowEquatorialZone_00 // Equatorial IR levels climb and fall in a steady rhythm, like a tired heater cycling. You wonder if stars get weary too.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthTropicZone_00 // The southern tropics show a mild asymmetry in infrared output. You mark it as “probably real,” since arguing with a red dwarf feels unwise.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthTemperateZone_00 // Temperate-band IR emission is consistent, with tiny ripples that could be surface activity or just your electronics coping with the neighborhood.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthSubpolarZone_00 // The detector catches a brief infrared flare and then settles. By the time Mission Control replies, the flare is already a memory.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_IRradiometer_GrannusInSpaceLowSouthPolarZone_00 // The southern polar band looks slightly cooler, then suddenly not. Grannus refuses to hold still for neat graphs.

        TaranisInSpaceHigh* = #GEPscience_bd_IRradiometer_TaranisInSpaceHigh_00 // From high orbit, Taranis looks like a two-tone bruise in infrared: one side glowing, one side nearly dead-cold. The day/night line is so sharp it feels like a warning label.
        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowMagmaSea_00 // The Magma Sea saturates the radiometer in short, angry spikes. You dial down the gain and still feel the heat through the numbers.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowMagmaShores_00 // The Magma Shores flicker between hot rock and hotter rock. You briefly consider renaming the biome “Still Too Hot.”
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowScorchedLowlands_00 // Scorched Lowlands radiate stored heat long after you’d expect a surface to cool. Under a dim red sun, Taranis still finds a way to glow back.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowMidlands_00 // The midlands show patchy thermal contrasts, like cracked pottery fresh from a kiln. You can almost hear it creak, but space remains politely silent.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowHighlands_00 // Highland ridges cool faster, producing crisp IR outlines. It’s the closest thing to “pretty” you can measure without admitting feelings in a report.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowDarkSideMidlands_00 // The dark-side midlands barely register above the instrument’s own temperature. The readout politely suggests you are measuring “cold.”
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowDarkSideHighlands_00 // Dark-side highlands are so cold the radiometer starts questioning its life choices. You reassure it that at least it isn’t the one outside.
        TaranisInSpaceLowPoles* = #GEPscience_bd_IRradiometer_TaranisInSpaceLowPoles_00 // Polar regions swing between extremes depending on local illumination. Your circadian rhythm requests a formal complaint form.

        ToutatisInSpaceHigh* = #GEPscience_bd_IRradiometer_ToutatisInSpaceHigh_00 // High over Toutatis, infrared maps reveal a baked hemisphere and a shadowed one, with a narrow temperate seam. It looks like a world trying to decide what it wants to be.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowSunnyLowlands_00 // Sunny lowlands glow warmly in IR, suggesting thick heat retention under the thin air. The surface looks comfortable until you remember what “sunny” means here.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowSunnyHighlands_00 // Sunny highlands show cooler streaks where elevation sheds heat faster. The patterns resemble windblown snow, except it’s all wrong and all hot.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowTransitionalLowlands_00 // Transitional lowlands display a gentle thermal gradient, like a planet-sized compromise. You log it as “candidate comfort zone,” with many asterisks.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowTransitionalHighlands_00 // Transitional highlands are mottled with warm and cool patches, hinting at rugged terrain. The radiometer draws a neat line; the planet refuses to.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowDarkSideLowlands_00 // Dark-side lowlands emit a faint, steady chill signature. Your heater cycles more often, as if trying to compete.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowDarkSideHighlands_00 // Dark-side highlands read as sharp, cold ridges against even colder basins. The darkness isn’t empty—it’s just quiet on every wavelength.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowSoutheasternMountains_00 // The southeastern mountains show dramatic thermal shadows and lingering hot rock faces. The contrast makes them look taller than they should, which is unsettling.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowWesternMountains_00 // Western mountains shed heat unevenly, producing stripe-like IR bands. You suspect complex geology; Mission Control suspects you left a lens cap on.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_IRradiometer_ToutatisInSpaceLowDarkSideMountains_00 // Dark-side mountains barely glow at all, except for tiny warm spots that vanish on the next pass. You mark them for follow-up, knowing “follow-up” takes a while out here.

        NodensInSpaceHigh* = #GEPscience_bd_IRradiometer_NodensInSpaceHigh_00 // The IR radiometer surveys Nodens as a faint, shifting heat-map under Grannus’ dim red light. The data arrives so late it already feels like history.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_IRradiometer_NodensInSpaceLowSaltySeas_00 // The Salty Seas radiate warmth in broad, smooth bands, as if the whole ocean is one big heat sink. The brightest streaks suggest currents you can’t see—only measure.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_IRradiometer_NodensInSpaceLowFreshWater_00 // Freshwater regions cool faster than the surrounding terrain, carving dark lines into the infrared map. The contrast is sharp enough to look intentional.
        NodensInSpaceLowShores* = #GEPscience_bd_IRradiometer_NodensInSpaceLowShores_00 // Shorelines light up as a jagged thermal seam where land and water argue about who gets to keep the heat. The radiometer votes “both,” then logs the compromise.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_NodensInSpaceLowTropicalLowlands_00 // Tropical lowlands glow steadily, with slow pulses that match the long, unfamiliar day-night rhythm. Your instincts say “noon,” but the numbers disagree.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_NodensInSpaceLowTemperateLowlands_00 // Temperate lowlands show gentle gradients and stubborn heat retention. It’s oddly comforting—right up until the comms delay reminds you where you are.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_NodensInSpaceLowTropicalMidlands_00 // Tropical midlands radiate unevenly, as if broken ridges are shading each other in infrared. The terrain writes its own thermal signature.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_NodensInSpaceLowTemperateMidlands_00 // Temperate midlands produce a mottled IR pattern, hinting at mixed materials and patchy moisture. You label it “geology,” because “mystery” isn’t a unit.
        NodensInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_NodensInSpaceLowHighlands_00 // Highlands cool quickly after sunset, leaving crisp, cold outlines against warmer lowlands. The map looks like a blueprint someone forgot to explain.
        NodensInSpaceLowTundra* = #GEPscience_bd_IRradiometer_NodensInSpaceLowTundra_00 // The tundra sits near the instrument’s lower range, with occasional warm specks that vanish by the next pass. You schedule follow-up scans and accept the waiting.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_IRradiometer_NodensInSpaceLowIceCaps_00 // The ice caps appear as deep infrared shadows, swallowing warmth with alarming efficiency. Even the radiometer seems to whisper here.

        BelisamaInSpaceHigh* = #GEPscience_bd_IRradiometer_BelisamaInSpaceHigh_00 // From high orbit, Belisama is a small, quiet coin of heat and shadow circling far from anything familiar. The radiometer’s steady tone feels louder than it should.
        BelisamaInSpaceLowFlats* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowFlats_00 // The flats show broad, uniform infrared emission, like a surface sanded smooth by time. Tiny hot spots hint at roughness the camera can’t quite resolve.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTropicalLowlands_00 // Tropical lowlands brighten along the sunward side and fade abruptly into the terminator. The thermal cliff is so sharp it looks like someone drew it with a ruler.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTemperateLowlands_00 // Temperate lowlands cool into a soft, even field, broken by faint streaks that could be shallow ridges or buried layers. You note both and pretend that helps.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTropicalMidlands_00 // Tropical midlands flicker with alternating warm and cool bands, as if the ground is striped in different materials. The radiometer refuses to guess which ones are “normal.”
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowTemperateMidlands_00 // Temperate midlands settle into a stable thermal texture, only slightly disturbed by shadows. Stability is suspiciously rare out here, so you double-check the calibration.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowHighlands_00 // Highlands run cold, outlining the topography in clean infrared relief. The brightest pixels cling to sunlit rock faces like they’re reluctant to let go.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_IRradiometer_BelisamaInSpaceLowPoles_00 // The poles hover near “very cold,” except for brief warm rims when sunlight grazes the edge. The timing is so slow you start measuring in comm windows instead of minutes.

        SucellusInSpaceHigh* = #GEPscience_bd_IRradiometer_SucellusInSpaceHigh_00 // The IR radiometer paints Sucellus as a cold, metallic ember in a very big, very quiet sky. The delayed readout makes even “normal” numbers feel far away.
        SucellusInSpaceLowBasins* = #GEPscience_bd_IRradiometer_SucellusInSpaceLowBasins_00 // Basin floors hold onto heat longer than the surrounding terrain, leaving broad warm smudges in the infrared map. The pattern suggests heavy material, or just a world that refuses to cool politely.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_IRradiometer_SucellusInSpaceLowLowlands_00 // The lowlands glow in smooth gradients, like a heat-sink wrapped around a dwarf planet. You wonder how much of that warmth is sunlight and how much is stubborn geology.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_SucellusInSpaceLowTropicalMidlands_00 // Tropical midlands show crisp thermal striping where slopes trade sunlight for shadow. The day-night cues under the red sun feel “off,” but the instrument is ruthlessly consistent.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_SucellusInSpaceLowTemperateMidlands_00 // Temperate midlands look mottled in IR, hinting at mixed rock and buried layers. The radiometer calls it “interesting,” which is as emotional as it gets.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_SucellusInSpaceLowHighlands_00 // Highlands cool fast, sketching sharp cold ridges against warmer plains. The terrain reads like a blueprint for a mining plan you haven’t been brave enough to propose.
        SucellusInSpaceLowPoles* = #GEPscience_bd_IRradiometer_SucellusInSpaceLowPoles_00 // The poles are deep infrared shadows with faint warm rims when sunlight grazes them. You log the timing carefully, since “later” takes a long time out here.

        CaireenInSpaceHigh* = #GEPscience_bd_IRradiometer_CaireenInSpaceHigh_00 // Caireen barely registers as more than a flicker of heat and shadow, a captured pebble with ambitions. The instrument keeps scanning anyway, because “tiny” is not the same as “unimportant.”
        CaireenInSpaceLowLowlands* = #GEPscience_bd_IRradiometer_CaireenInSpaceLowLowlands_00 // Lowlands radiate a thin, even chill, as if the surface has been refrigerated for ages. Occasional warm specks appear and vanish before you can accuse them of being interesting.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_IRradiometer_CaireenInSpaceLowMidlands_00 // The midlands show gentle thermal noise that might be rough terrain or just a very small world messing with your pixel scale. You increase resolution and immediately regret the data volume.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_CaireenInSpaceLowHighlands_00 // Highlands come through as sharp cold facets, like chipped stone reflecting almost nothing back. The numbers make you feel colder, which is probably psychological and therefore definitely real.
        CaireenInSpaceLowPoles* = #GEPscience_bd_IRradiometer_CaireenInSpaceLowPoles_00 // Polar regions dip toward the instrument’s lower range, flirting with “are you sure it’s on?” The answer arrives after the comm delay: yes, it’s on, and yes, it’s still that cold.

        SironaInSpaceHigh* = #GEPscience_bd_IRradiometer_SironaInSpaceHigh_00 // Sirona’s infrared glow rolls in broad bands, warm and ominously steady beneath the dim red sun. The magnetics make the electronics grumble, but the data keeps coming—eventually.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_IRradiometer_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands radiate deeper, warmer signatures, as if heat is welling up from below. You label it “internal energy,” and feel very small doing so.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_IRradiometer_SironaInSpaceLowLightTropicalBands_00 // Light tropical bands shine brighter in reflected IR, masking whatever is happening underneath. The instrument politely reminds you that “bright” does not mean “safe.”
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_IRradiometer_SironaInSpaceLowDarkTemperateBands_00 // Dark temperate bands show uneven hotspots that drift between passes. You try to correlate them with time, then remember time is relative and your sleep schedule lost the argument days ago.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_IRradiometer_SironaInSpaceLowLightTemperateBands_00 // Light temperate bands look smoother and cooler, like a calmer layer riding above turbulence. “Calm” is a suspicious word around a gas giant.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_IRradiometer_SironaInSpaceLowDarkPolarBands_00 // Dark polar bands emit a faint, persistent warmth that doesn’t match the lighting. The radiometer suggests circulation; your instincts suggest backing away slowly.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_IRradiometer_SironaInSpaceLowLightPolarBands_00 // Light polar bands flash with subtle IR variations, as if thin hazes are catching and re-radiating heat. The patterns are beautiful in a strictly data-approved way.

        AirmedInSpaceHigh* = #GEPscience_bd_IRradiometer_AirmedInSpaceHigh_00 // The IR radiometer turns Airmed into a two-toned heat coin under Grannus’ dim red glow. The data is fine; it’s the long pause before “fine” arrives that feels strange.
        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowTropicalLowlands_00 // Tropical lowlands show a broad, stubborn warmth, like battered rock that refuses to cool on schedule. The readout suggests “low” temperatures, but out here “low” is relative.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowTemperateLowlands_00 // Temperate lowlands fade into cooler shades with sharp edges where terrain changes suddenly. It’s a scar map, but in infrared.
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowTropicalMidlands_00 // Tropical midlands flicker between warm ridges and cold hollows as the viewing angle shifts. You note the pattern and pretend the delay makes it less eerie.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowTemperateMidlands_00 // Temperate midlands look mottled, as if the surface is stitched from different materials. The radiometer doesn’t care why—only that it is.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowHighlands_00 // Highlands cool fast and draw crisp, dark outlines across the IR map. The instrument politely calls them “cold features,” which is accurate and deeply unhelpful.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowDarkenedLowlands_00 // Darkened lowlands radiate less, swallowing heat like a matte coating. You briefly wonder what made them that way, then remember you can’t ask rocks questions.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowDarkenedMidlands_00 // Darkened midlands show faint warm specks that come and go between passes. It’s probably just rough terrain—probably.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowDarkenedHighlands_00 // Darkened highlands are almost featureless in IR, cold and quiet. The only lively thing here is your instrument’s self-test tone.
        AirmedInSpaceLowPoles* = #GEPscience_bd_IRradiometer_AirmedInSpaceLowPoles_00 // The poles sit near the bottom of the scale, with thin warm rims when sunlight grazes them. Your sense of “day” loses another argument to geometry.

        BorvoInSpaceHigh* = #GEPscience_bd_IRradiometer_BorvoInSpaceHigh_00 // From high over Borvo, the IR radiometer catches a faint atmospheric glow wrapped around a cold world. The numbers arrive late, as if they had to think about the distance too.
        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowTropicalCraquelure_00 // Tropical craquelure regions break into warm-and-cool shards in the IR map, like cracked glaze on a planet-sized mug. You resist the urge to label it “probably brittle.”
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowTemperateCraquelure_00 // Temperate craquelure shows deeper thermal contrast, suggesting fractures and ridges with different heat retention. The pattern is neat enough to be unsettling.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowTropicalLowlands_00 // Tropical lowlands radiate smoothly, with a soft haze of IR that hints at Borvo’s thin air doing a little heat-holding. “A little” is still more than vacuum.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowTemperateLowlands_00 // Temperate lowlands cool into broad, even fields with gentle gradients toward shadow. The world looks calm, but the comm delay keeps it feeling distant.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowTropicalMidlands_00 // Tropical midlands show striped warmth along slopes, where sunlight and terrain negotiate in slow motion. Your report notes “topography,” your brain notes “time dilation (emotional).”
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowTemperateMidlands_00 // Temperate midlands are speckled with subtle hotspots that persist across passes. You suspect mixed materials; Mission Control suspects you like suspense.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowHighlands_00 // Highlands come through as cold ridges with slightly warmer sunward faces. The instrument makes Borvo look carved out of chilled clay and stubbornness.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowMajorCraters_00 // Major craters trap and re-radiate heat along their inner walls, drawing bright crescents in infrared. The crater floors stay cold, like they’ve given up.
        BorvoInSpaceLowPoles* = #GEPscience_bd_IRradiometer_BorvoInSpaceLowPoles_00 // Polar readings dip and flatten, with faint atmospheric glow above the edge. It’s quiet enough that you start hearing the radiometer’s clicks as “company.”

        DamonaInSpaceHigh* = #GEPscience_bd_IRradiometer_DamonaInSpaceHigh_00 // Damona appears as a small, cold puncture in the darkness, barely more than an IR whisper. Out here, even “detected” feels like an accomplishment.
        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowTropicalLowlands_00 // Tropical lowlands show a thin, weak warmth that fades quickly into shadow. The terminator looks like a switch being flipped—slowly.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowTemperateLowlands_00 // Temperate lowlands settle into an even chill with tiny variations you can’t help but zoom in on. You find nothing conclusive, and somehow that’s worse.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowTropicalMidlands_00 // Tropical midlands draw faint thermal bands across worn terrain, as if the ground remembers where sunlight used to be. The radiometer only remembers what it sees now.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowTemperateMidlands_00 // Temperate midlands are mostly cold, with occasional warm pixels that vanish by next pass. You flag them, knowing “next pass” is its own kind of waiting.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowHighlands_00 // Highlands are dark in infrared, sharp-edged and uncompromising. The readout suggests you stop expecting “warm” to mean anything here.
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowImpactBasin_00 // The impact basin shows a subtle warmth along fractured walls, like bruised rock holding onto heat. The center stays colder, as if the crater is still offended.
        DamonaInSpaceLowPoles* = #GEPscience_bd_IRradiometer_DamonaInSpaceLowPoles_00 // The poles drop toward the instrument’s lower limit, nearly indistinguishable from space itself. The radiometer confirms it is still on; you confirm you are still far from home.

        EponaInSpaceHigh* = #GEPscience_bd_IRradiometer_EponaInSpaceHigh_00 // The IR radiometer reduces Epona to a soft glow under Grannus’ dim red light. The thermal curves look plausible, but the comm delay makes “now” feel theoretical.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_EponaInSpaceLowTropicalLowlands_00 // The tropical lowlands hold a stubborn warmth, as if the atmosphere is rationing heat for the long night. Your instincts expect “daytime”; the numbers disagree.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_EponaInSpaceLowTemperateLowlands_00 // Temperate lowlands cool into smooth gradients, with faint banding that suggests slow winds moving heat around. The radiometer calls it “circulation”; you call it “creepy but efficient.”
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_IRradiometer_EponaInSpaceLowTropicalUplands_00 // The uplands shed heat faster, tracing ridges in crisp infrared relief. It’s a map of altitude drawn in temperature, with no need for sunlight to be dramatic.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_IRradiometer_EponaInSpaceLowTemperateUplands_00 // Temperate uplands show patchy thermal inertia, like mixed ground deciding whether it’s rock, ice, or something in between. The instrument refuses to guess, and so do you.
        EponaInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_EponaInSpaceLowHighlands_00 // Highlands appear colder overall, with warm sunward faces that fade quickly into shadow. The day/night transition is slow, but the chill is immediate.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_IRradiometer_EponaInSpaceLowGrandPeaks_00 // The grand peaks outline themselves as razor-cold spines, except where they catch a brief red-sun glow. For a moment the terrain looks alive—then the readout returns to “nope.”
        EponaInSpaceLowCraters* = #GEPscience_bd_IRradiometer_EponaInSpaceLowCraters_00 // Crater walls draw bright crescents while their floors stay dark and cold, hoarding shadow like it’s valuable. You mark “possible cold traps” and feel the distance in every keystroke.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_IRradiometer_EponaInSpaceLowVolcanoes_00 // The volcanoes spike the IR channel hard enough to make the calibration routine nervous. If Epona has a warm heart, it’s not being subtle about it.
        EponaInSpaceLowPoles* = #GEPscience_bd_IRradiometer_EponaInSpaceLowPoles_00 // The poles drop toward the instrument’s lower range, with thin warm rims when light grazes the edge. “Morning” arrives as a gentle curve on a graph, hours after you wanted it.

        RosmertaInSpaceHigh* = #GEPscience_bd_IRradiometer_RosmertaInSpaceHigh_00 // Rosmerta is a tiny, airless chill-stone with a faint thermal signature and a lot of silence. The radiometer works; the universe simply takes its time answering.
        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTropicalLowlands_00 // Tropical lowlands cool rapidly once they slip into shadow, leaving a sharp infrared boundary. Without an atmosphere, Rosmerta doesn’t do “gradual.”
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTemperateLowlands_00 // Temperate lowlands sit near “very cold” with slight warmth on sunlit slopes. The radiometer confirms: sunlight is still a thing, even this far out.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTropicalMidlands_00 // Tropical midlands show mottled hot-and-cold pixels from rough terrain and steep angles. You spend longer waiting for the packet than the surface spends staying warm.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_IRradiometer_RosmertaInSpaceLowTemperateMidlands_00 // Temperate midlands look uniformly chilled, broken only by bright crater rims catching the red sun. It’s the prettiest kind of bleak.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_IRradiometer_RosmertaInSpaceLowHighlands_00 // Highlands read as crisp, cold ridges with minimal heat retention. The instrument’s own electronics are basically the warmest object in the neighborhood.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_IRradiometer_RosmertaInSpaceLowPoles_00 // The poles are deep infrared shadows that barely change between passes. The radiometer logs it as “stable”; your suit logs it as “no thanks.”

        RAB-58EInSpaceHigh* = #GEPscience_bd_IRradiometer_RAB-58EInSpaceHigh_00 // RAB-58E barely registers: a captured speck with a thermal whisper and a long way to go before it feels familiar. Even the beep sounds lonely.
        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_IRradiometer_RAB-58EInSpaceLowLowlands_00 // The lowlands show weak, even emission that drops off instantly at the terminator. On a body this small, “night” is a switch, not a phase.
