// StockScienceRefactor — Wildcardize Stock Science Results
// Converts deterministic stock RESULTS into variant-enabled pools (*).
// This unlocks result alternation and full compatibility with CSS and extension packs.
// `default` entries are preserved without wildcard, per KSP fallback rules.
// No new science text is added; this patch refactors stock behavior only.

@EXPERIMENT_DEFINITION:HAS[#id[USmapCam]]
{
	@title = #ScienceRefactor_USmapCam_title // Wide Field Visual Camera Observation
	
    !RESULTS {}
	%RESULTS
	{
		default = #autoLOC_US_ScienceResult_002 //You must be in space to use the camera!

		Space* = #autoLOC_US_SceinceResult_003 //Space is vast and mysterious.
		SpaceLow* = #autoLOC_US_SceinceResult_004 //The camera captures a detailed view of the planet's terrain.
		SpaceHigh* = #autoLOC_US_SceinceResult_005 //The camera captures a view of the planet's terrain.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[USlaserAltimeter]]
{
	@title = #ScienceRefactor_USlaserAltimeter_title // Laser Altimeter
	
    !RESULTS {}
	%RESULTS
