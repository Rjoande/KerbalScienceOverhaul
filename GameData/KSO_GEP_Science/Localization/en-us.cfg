        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedHighlands_00 = From high ground, the sky goes darker and the red sun feels farther away. You log a clean survey and a note: “Do not look down at Nodens too long.”
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedPoles_00 = Low-angle light turns everything into a baffle. You sweep the sky in long, quiet arcs and try not to count seconds between replies.
        #GEPscience_sspxTelescopeObservation_BelisamaInSpaceLow_00 = Belisama’s limb blocks Grannus, leaving a narrow cone of darkness to work with. The telescope pulls faint targets out of the void like they were waiting.
