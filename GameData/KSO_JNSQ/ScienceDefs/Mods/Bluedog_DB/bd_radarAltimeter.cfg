@EXPERIMENT_DEFINITION:HAS[#id[bd_radarAltimeter]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_bd_radarAltimeter_SunFlyingLow_00 // The radar altimeter insists it’s “flying,” but there’s nowhere to bounce a signal. It returns a helpful altitude of “YES.”
		SunFlyingHigh* = #JNSQscience_bd_radarAltimeter_SunFlyingHigh_00 // You keep waiting for a surface echo. The instrument keeps waiting for physics to make sense. Neither of you are satisfied.
		SunInSpaceLow* = #JNSQscience_bd_radarAltimeter_SunInSpaceLow_00 // Every ping disappears into glare and charged particles. The readout slowly drifts toward a number that feels judgmental.

		MohoInSpaceLow* = #JNSQscience_bd_radarAltimeter_MohoInSpaceLow_00 // Sharp echoes sketch jagged ridges and deep basins. The terrain model looks like it was carved with anger.

		EveFlyingLow* = #JNSQscience_bd_radarAltimeter_EveFlyingLow_00 // The signal fights through purple soup and comes back muffled. You’re pretty sure you just measured the clouds instead of the ground.
		EveFlyingHigh* = #JNSQscience_bd_radarAltimeter_EveFlyingHigh_00 // Reflections smear and wobble under the thick atmosphere. The altimeter swears the surface is “somewhere down there.”
		EveInSpaceLow* = #JNSQscience_bd_radarAltimeter_EveInSpaceLow_00 // Radar passes peel back the cloud cover in clean lines, revealing dramatic elevation changes that Eve was clearly trying to hide.

		GillyInSpaceLow* = #JNSQscience_bd_radarAltimeter_GillyInSpaceLow_00 // One moment you’re “close,” the next you’re “also close,” but to a different boulder. The radar map looks like a lumpy potato with ambitions.

        KerbinFlyingLow* = #JNSQscience_bd_radarAltimeter_KerbinFlyingLow_00 // The altimeter paints the ground in sharp lines; Mission Control asks if that’s “terrain” or “incoming mountain.”
		KerbinFlyingHigh* = #JNSQscience_bd_radarAltimeter_KerbinFlyingHigh_00 // From up here the radar sees continents as gentle bumps and the oceans as blank spots; you try not to think about what lives in the blank spots.
		KerbinInSpaceLow* = #JNSQscience_bd_radarAltimeter_KerbinInSpaceLow_00 // Orbital passes stitch together a tidy elevation map of Kerbin. The numbers make the mountains look taller than they felt in training.

        MunInSpaceLow* = #JNSQscience_bd_radarAltimeter_MunInSpaceLow_00 // Radar pings come back almost instantly from the gray surface below, outlining crater rims like a topographic doodle.
		MinmusInSpaceLow* = #JNSQscience_bd_radarAltimeter_MinmusInSpaceLow_00 // The flats return a smooth, bright echo while the slopes look lumpy; the computer suggests aiming for the minty smooth bits.

        DunaFlyingLow* = #JNSQscience_bd_radarAltimeter_DunaFlyingLow_00 // The radar echo jitters through dusty air and shifting dunes. The altimeter helpfully reports “approximately ground-ish.”
		DunaFlyingHigh* = #JNSQscience_bd_radarAltimeter_DunaFlyingHigh_00 // From up here the thin atmosphere behaves, and the radar draws crisp profiles of canyons and mesas. The flight computer asks if you want to “follow terrain.”
		DunaInSpaceLow* = #JNSQscience_bd_radarAltimeter_DunaInSpaceLow_00 // Each pass stitches a cleaner elevation swath across the rusty surface, revealing old scars and suspiciously smooth lowlands.

		IkeInSpaceLow* = #JNSQscience_bd_radarAltimeter_IkeInSpaceLow_00 // Strong echoes bounce off sharp ridges and crater walls. The terrain model starts to look like it has teeth.

		EdnaInSpaceLow* = #JNSQscience_bd_radarAltimeter_EdnaInSpaceLow_00 // The return signal feels delayed and miserly, as if the surface is conserving energy. The map comes back cold, rugged, and very old.

		DakInSpaceLow* = #JNSQscience_bd_radarAltimeter_DakInSpaceLow_00 // On a body this small, the numbers change faster than your confidence. The altimeter keeps insisting you’re “almost there” to everywhere at once.

		DresInSpaceLow* = #JNSQscience_bd_radarAltimeter_DresInSpaceLow_00 // The radar paints a stubbornly unremarkable elevation map. Even in vacuum, Dres manages to sound bored.

        JoolFlyingLow* = #JNSQscience_bd_radarAltimeter_JoolFlyingLow_00 // The radar tries to lock onto a “surface” and settles for “cloud-ish.” The readout feels oddly proud of itself.
		JoolFlyingHigh* = #JNSQscience_bd_radarAltimeter_JoolFlyingHigh_00 // Returns smear into layers and turbulence. The instrument starts averaging numbers, as if that makes them more real.
		JoolInSpaceLow* = #JNSQscience_bd_radarAltimeter_JoolInSpaceLow_00 // From orbit, every ping comes back late and fuzzy. Congratulations: you may have just mapped the top of Jool’s weather.

		LaytheFlyingLow* = #JNSQscience_bd_radarAltimeter_LaytheFlyingLow_00 // Crisp echoes snap between shorelines and waves. The altimeter can tell land from sea faster than you can.
		LaytheFlyingHigh* = #JNSQscience_bd_radarAltimeter_LaytheFlyingHigh_00 // Broad sweeps flatten the ocean into a calm baseline, with islands poking up like navigation hazards with names.
		LaytheInSpaceLow* = #JNSQscience_bd_radarAltimeter_LaytheInSpaceLow_00 // Orbital swaths sketch drowned valleys and sharp ridges beneath the clouds. The ocean looks like it’s hiding extra terrain.

		VallInSpaceLow* = #JNSQscience_bd_radarAltimeter_VallInSpaceLow_00 // Strong returns trace crater rims and wide ice plains. One patch echoes strangely, like the ice has a secret gap underneath.

		TyloFlyingLow* = #JNSQscience_bd_radarAltimeter_TyloFlyingLow_00 // The instrument insists you’re “flying,” despite the lack of air. The altitude ticks down with ruthless honesty.
		TyloFlyingHigh* = #JNSQscience_bd_radarAltimeter_TyloFlyingHigh_00 // Long-range pings outline towering walls and deep basins. Tylo makes sure you’re aware of every sharp edge.
		TyloInSpaceLow* = #JNSQscience_bd_radarAltimeter_TyloInSpaceLow_00 // Passes stitch together an intimidating relief map—high rims, deep hollows, and very few gentle slopes.

		BopInSpaceLow* = #JNSQscience_bd_radarAltimeter_BopInSpaceLow_00 // The radar draws a lumpy rock with sudden slopes everywhere. Your orbit feels like it’s arguing with the terrain.

		PolInSpaceLow* = #JNSQscience_bd_radarAltimeter_PolInSpaceLow_00 // The echo wanders over soft-looking ridges and sagging hollows. The landscape seems to shift between pings, just to stay mysterious.

        LindorFlyingLow* = #JNSQscience_bd_radarAltimeter_LindorFlyingLow_00 // The altimeter keeps searching for “ground,” but Lindor just offers endless cloud layers. It finally reports an altitude of “probably.”
		LindorFlyingHigh* = #JNSQscience_bd_radarAltimeter_LindorFlyingHigh_00 // You try to average the returns into something sensible. Lindor responds by changing the weather under you out of spite.
		LindorInSpaceLow* = #JNSQscience_bd_radarAltimeter_LindorInSpaceLow_00 // From orbit, the radar paints swirls and bands like they’re terrain. Mission Control asks where you plan to land on “Band #3.”

		KrelInSpaceLow* = #JNSQscience_bd_radarAltimeter_KrelInSpaceLow_00 // The echoes trace pale ridges and odd, vein-like patterns. The map looks like the moon is trying to remember how to be round.

		AdenInSpaceLow* = #JNSQscience_bd_radarAltimeter_AdenInSpaceLow_00 // Radar passes sketch a small, stubborn rock with mismatched bumps and basins. The elevation model suggests there’s “something different inside,” and the computer refuses to elaborate.

		HuygenFlyingLow* = #JNSQscience_bd_radarAltimeter_HuygenFlyingLow_00 // The thick haze scatters your pings; half the time you measure clouds, the other half you measure “somewhere below the clouds.”
		HuygenFlyingHigh* = #JNSQscience_bd_radarAltimeter_HuygenFlyingHigh_00 // Returns smear into stacked layers, like the atmosphere has altitude of its own. The readout keeps changing its mind.
		HuygenInSpaceLow* = #JNSQscience_bd_radarAltimeter_HuygenInSpaceLow_00 // Orbiting swaths cut clean through the amber murk, revealing a surprisingly structured surface beneath all that drama.

		RigaFlyingLow* = #JNSQscience_bd_radarAltimeter_RigaFlyingLow_00 // In the thin air the signal is crisp one second and absent the next. The altimeter insists this counts as “flying,” and you let it have that.
		RigaFlyingHigh* = #JNSQscience_bd_radarAltimeter_RigaFlyingHigh_00 // The radar draws broad relief lines over a world that feels almost familiar from a distance. Up close, the numbers get less comforting.
		RigaInSpaceLow* = #JNSQscience_bd_radarAltimeter_RigaInSpaceLow_00 // Strong returns outline wide basins and sharp highlands. The map looks solid enough to walk on—provided you pick a slope that won’t argue back.

		TalosInSpaceLow* = #JNSQscience_bd_radarAltimeter_TalosInSpaceLow_00 // Elevation readings jump across stark color boundaries and abrupt terrain changes. The radar can’t explain the patterns, but it’s clearly impressed.

        EelooFlyingLow* = #JNSQscience_bd_radarAltimeter_EelooFlyingLow_00 // The whisper-thin air barely carries a return, but the radar still sketches icy rises and dips like a timid heartbeat.
		EelooFlyingHigh* = #JNSQscience_bd_radarAltimeter_EelooFlyingHigh_00 // At altitude the echoes come back cleaner, tracing broad, pale contours that look suspiciously like scoops.
		EelooInSpaceLow* = #JNSQscience_bd_radarAltimeter_EelooInSpaceLow_00 // Orbital passes stitch together a crisp relief map; every ridge looks sharper when it’s this cold.

		CelesInSpaceLow* = #JNSQscience_bd_radarAltimeter_CelesInSpaceLow_00 // The radar draws a quiet, gray world in clean lines. The computer flags a few “too-round” features and then pretends it didn’t.
		TamInSpaceLow* = #JNSQscience_bd_radarAltimeter_TamInSpaceLow_00 // One ping says “mountain,” the next says “cliff.” The terrain model ends up looking like it was assembled during turbulence.

		HamekInSpaceLow* = #JNSQscience_bd_radarAltimeter_HamekInSpaceLow_00 // Strong echoes outline steep highs and deep lows beneath that odd coloring. The map suggests the surface is trying to hide its reasons.

        NaraFlyingLow* = #JNSQscience_bd_radarAltimeter_NaraFlyingLow_00 // The dense, frigid air makes the echoes come back loud and fast. For once, the altimeter sounds confident.
		NaraFlyingHigh* = #JNSQscience_bd_radarAltimeter_NaraFlyingHigh_00 // Long-range pings smear through haze and layers. The readout claims the surface is “down there somewhere,” like that helps.
		NaraInSpaceLow* = #JNSQscience_bd_radarAltimeter_NaraInSpaceLow_00 // Orbital sweeps fight their way through the atmosphere and return with a stubborn elevation trace. Whatever’s under those clouds is very real, and very far from home.

		AmosInSpaceLow* = #JNSQscience_bd_radarAltimeter_AmosInSpaceLow_00 // The echo snaps back off a dark, knobby surface. Your altitude changes more than your orbit does, which feels unfair.
		EnonInSpaceLow* = #JNSQscience_bd_radarAltimeter_EnonInSpaceLow_00 // Returns brighten over icy-looking terrain and fade over deeper hollows. The map hints at gentle slopes hiding sharp surprises.
		PraxInSpaceLow* = #JNSQscience_bd_radarAltimeter_PraxInSpaceLow_00 // Every pass redraws the same lumpy outline with brutal honesty. The altimeter proves a great truth: “almost level” is a lie.
    }
}