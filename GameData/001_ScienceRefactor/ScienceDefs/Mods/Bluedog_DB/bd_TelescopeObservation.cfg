@EXPERIMENT_DEFINITION:HAS[#id[bd_TelescopeObservation]]
{
    @title = #ScienceRefactor_bd_TelescopeObservation_title // Telescope Observation
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_TelescopeObservation_default_00 // You begin a survey of deep-sky-objects in the galactic plane. Many open clusters and nebulae are waiting to be found.
        SunInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_SunInSpaceLow_00 // You observe the sun. This was a spectacularly bad idea.
        SunInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_SunInSpaceHigh_00 // You observe the sun. Only after you hear the "temperature anomaly" alarm do you remember you forgot to install the solar filter. This is a real certified Icarus moment.
        KerbinInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_KerbinInSpaceLow_00 // Above the influence of atmospheric turbulence, the telescope is capable of reaching much more consistently high resolutions at a wide field of view than possible from the ground. Until you get orders from the Kerbal Astronomical Society, you use the time to split a few double stars which you hadn't got yet.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_KerbinInSpaceHigh_00 // Far from Kerbin, the observatory is capable of observing a vast portion of the sky with little interference. You begin a survey of distant galaxies.
        KerbinSrfLandedDesert* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedDesert_00 // From within Kerbin's atmosphere, the atmospheric turbulence causes the image to boil and shimmer, leading to a lower resolution. Planetary imaging must be done with extreme-short exposures and with digital processing to stack the image.
        KerbinSrfLandedHighlands* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedHighlands_00 // The observatory is relatively unhindered by low-level fog and some of the effects of atmospheric seeing conditions, allowing a higher resolution than at sea level. Still though, it's not the best place for imaging at high resolution, so you mostly concern yourself with assembling mosaics of larger deep-sky-objects.
        KerbinSrfLandedMountains* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedMountains_00 // This is a good place for a remote observatory. Above the effects of light pollution and atmospheric turbulence, the sky opens up in sharp, high resolution detail--though space would be better. You search for nearby exoplanetary transit events with the SLIPPIST-camera.
        KerbinSrfLandedWater* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedWater_00 // Sea spray and sand is getting into the instrument. That's going to be a maintenance nightmare. You attempt to do some imaging, but between the fog, the turbulent air, and the sea spray, this observing session's a wash.
        KerbinSrfSplashedWater* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfSplashedWater_00 // Sea spray and sand is getting into the instrument. That's going to be a maintenance nightmare. You attempt to do some imaging, but between the fog, the turbulent air, and the sea spray, this observing session's a wash.
        KerbinSrfLandedWater* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedWater_00 // Sea spray and sand is getting into the instrument. That's going to be a maintenance nightmare. You attempt to do some imaging, but between the fog, the turbulent air, and the sea spray, this observing session's a wash.
        KerbinSrfLandedKSC* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLandedKSC_00 // Light pollution here at the KSC makes observing deep-sky-objects very impractical. You really need to get out to the middle of nowhere if you wanna see the night sky. Still though, this is a great place for a public Munwatch, maybe Walt Kerman and his P.R. team have an idea about how to do that.
        KerbinSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_KerbinSrfLanded_00 //  From within Kerbin's atmosphere, the atmospheric turbulence causes the image to boil and shimmer, leading to a lower resolution. Planetary imaging must be done with extreme-short exposures and with digital processing to stack the image.
        MunInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_MunInSpaceLow_00 // If you could just slow down, the instrument would be capable of extreme high resolution surface images. In fact, you'd almost not need to send down astronauts! Who needs astronauts when you have astronomers, after all.
        MunInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_MunInSpaceHigh_00 // Pointing the observatory down towards the surface would make for a high-resolution mapping satellite, but we only packed astronomical sensors, so you'll have to settle for unraveling the mysteries of the cosmos.
        MunSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_MunSrfLanded_00 // This is a great place for a close-to-home deep space observatory! The skies really pop, day and night.
        Minmus_InSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_Minmus_InSpaceHigh_00 // You attempt a long-exposure photo to try and detect a coma or cometary tail... if there is one, it's being washed out by Minmus' incredibly reflective surface.
        MinmusSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_MinmusSrfLanded_00 // You attempt to measure the spectrum of a bright star, looking for any additional absorption lines, searching for hints of an extended exosphere or cometary envelope on Minmus. There seems to be a very faint absorption feature which you can't match to the star's database.
        MohoSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_MohoSrfLanded_00 // Moho's rotation rate is remarkably slow, so despite the incredibly bright sun during the day, very long uninterrupted exposures are possible. One useful application of this observatory would be to search for Near-Kerbin asteroids.
        EveInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_EveInSpaceLow_00 // Note to self: throw away red and green filters, they don't work here.
        EveInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_EveInSpaceHigh_00 // You point the telescope at Gilly. It's quite startling to see details on the smallest moon--it normally looks like a faint dot!
        EveSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_EveSrfLanded_00 // This is a pretty terrible place for an observatory - the thick clouds are always present!
        GillySrfLanded* = #ScienceRefactor_bd_TelescopeObservation_GillySrfLanded_00 // A strange, niche location for an observatory, however one which provides many useful opportunities to observe Eve at high resolution. Infrared sensors are capable of piercing the clouds, and blue, violet, and ultra-violet filters are best suited for observing the clouds and weather patterns themselves.
        IkeSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_IkeSrfLanded_00 // You hope you remembered to land on the Duna-facing hemisphere so you can observe it at high resolution. Ike's stationary orbit provides an excellent viewing post for looking at roughly half of Duna, and a terrible viewing post for looking at anything else.
        DunaSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_DunaSrfLanded_00 // You set up the telescope to point back towards the Kerbin system. Even at high power, they're small. You feel smaller. Dust in the atmosphere prevents the acquisition of faint detail, but the seeing conditions here are very good, and when Jool is at opposition this telescope can beat similar Kerbin-based instruments in seeing its cloud bands, which no longer appear fuzzy.
        DresInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_DresInSpaceLow_00 // They said to get out in the middle of nowhere to do deep-sky-viewing. But I don't think they meant it like that!
        DresInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_DresInSpaceHigh_00 // There seems to be a large amount of star-trails interfering with long-exposure images near Dres' equatorial plane... could there be a debris disk here?
        DresSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_DresSrfLanded_00 // It's like no-one will ever know you put a telescope here. 
        JoolInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_JoolInSpaceLow_00 // From this vantage point, many of the objects in the Jool system are easily seen. Tylo, Vall, Bop, Pol, and Kerbin... hey wait a minute, that's not how this works!
        JoolInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_JoolInSpaceHigh_00 // What do you know, it turns out Jool isn't always fuzzy through a telescope!
        JoolSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_JoolSrfLanded_00 // This location would make a great observing post for studying the Joolian moons, were it not for the scorching temperatures, the crushing pressures, and the many layers of clouds and haze. 
        LaytheInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_LaytheInSpaceHigh_00 // The images you get off the sensors are full of extra noise for some reason. Who needs a geiger counter when you have horrifying signal to noise ratios!
        LaytheSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_LaytheSrfLanded_00 // This is like Kerbin, but no light pollution to speak of, well at least as long as you ignore Jool, which is much brighter than the Mun, and Tylo and Vall, which are almost as bright as the Mun... hey we did remember to park the observatory on the far side away from Jool, right?
        LaytheSrfSplashed* = #ScienceRefactor_bd_TelescopeObservation_LaytheSrfSplashed_00 // Sea spray and sand are getting into the instrument. That's going to be a maintenance nightmare. You attempt to do some imaging, but between the fog, the turbulent air, and the sea spray, this observing session's a wash.
        VallSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_VallSrfLanded_00 // Aside from the radiation messing up the signal, this would make a great observing post for studying the other worlds of this system.
        TyloSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_TyloSrfLanded_00 // Aside from the radiation messing up the signal, this would make a great observing post for studying the other worlds of this system.
        BopInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_BopInSpaceHigh_00 // You slew the telescope around to face Bop. For some reason the software won't let you focus in on the surface in one place. It gives a "Danger" message like if you try to point it at the Sun.
        PolInSpaceLow* = #ScienceRefactor_bd_TelescopeObservation_PolInSpaceLow_00 // From low orbit there seems to be a load of statically charged dust particles clinging to the sensor like pollen. Perhaps Pol isn't the best place to put an observatory, even though it does look down on the entire Jool system.
        PolSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_PolSrfLanded_00 // Keep the dust off the sensors! We've had enough of this kind of error in the past. At least dust on the mirrors makes little difference aside from reducing the contrast and resolution slightly. It'd probably just damage the mirrors more if we tried to wipe them clean.
        EelooInSpaceHigh* = #ScienceRefactor_bd_TelescopeObservation_EelooInSpaceHigh_00 // Now THIS is the middle of nowhere! From this perspective, the magnitude of many faint trans-joolean-objects is increased dramatically during opposition, allowing for a better and more accurate categorization of the small icy objects sharing the space beyond Jool.
        EelooSrfLanded* = #ScienceRefactor_bd_TelescopeObservation_EelooSrfLanded_00 // Eeloo is great because it's very easy to cool the imaging sensors to reduce noise. You contemplate plans to shovel the surface material directly onto the sensor to improve cooling.
	}
}