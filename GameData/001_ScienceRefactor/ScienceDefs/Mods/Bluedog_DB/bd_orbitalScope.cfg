        KerbinInSpaceLowDeserts* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLowDeserts_00 // The sand is found to have very interesting designs painted by the wind, depositing beds of it on lower altitude areas.
        KerbinInSpaceLowMountains* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLowMountains_00 // Kerbin's mountain ridges are very tall. Clearly visible from space.
        KerbinInSpaceLowShores* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLowShores_00 // The Kerbin coast is washed by the oceans and broken up by erosion and the occasional tourist.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLowGrasslands_00 // Many trees and plant life are found covering the lush grasslands.
        KerbinInSpaceLow* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLow_00 // KSC gathers images to forecast weather for the nest launch.
        KerbinInSpaceLow* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceLow_01 // Cloud pattern are photographed and sent to the weather office.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_orbitalScope_KerbinInSpaceHigh_00 // Blue sunlight scattering gives the atmosphere a blue-ish hue.

		MunInSpace* = #ScienceRefactor_bd_orbitalScope_MunInSpace_00 // The Mun is peppered with craters all over its surface.
		MunInSpace* = #ScienceRefactor_bd_orbitalScope_MunInSpace_01 // The Mun has very cratered and interesting topography.
