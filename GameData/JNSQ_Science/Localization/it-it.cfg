        #JNSQscience_bd_multiSpec_AdenInSpaceLowMountains_00 = Ombre nette e pendii ripidi creano bordi rumorosi su diverse bande, ma le creste restano ben tracciate all'infrarosso. Il terreno sembra progettato per impigliare le gambe di atterraggio.
        #JNSQscience_bd_multiSpec_AdenInSpaceLowPoles_00 = Le regioni polari mostrano chiazze più fredde e leggermente più luminose che potrebbero essere brina o solo polvere particolarmente riflettente. In ogni caso è la cosa più vicina alla varietà che Aden offra.
        #JNSQscience_bd_multiSpec_HuygenInSpaceHigh_00 = Da un'orbita alta, la foschia ambrata di Huygen domina ogni canale e trasforma la superficie in una voce. Lo strumento insiste che laggiù ci siano dettagli, da qualche parte.
        #JNSQscience_bd_multiSpec_HuygenInSpaceLowLowlands_00 = Attraverso la foschia, le pianure si risolvono in distese smorzate che trattengono calore con lievi variazioni di composizione. L'atmosfera fa sembrare tutto osservato attraverso sciroppo.
        #JNSQscience_bd_multiSpec_HuygenInSpaceLowMidlands_00 = La sovrapposizione multispettrale fa emergere ampie striature che non corrispondono a semplici motivi di polvere. La mappa suggerisce un movimento lento, o una lenta confusione.
