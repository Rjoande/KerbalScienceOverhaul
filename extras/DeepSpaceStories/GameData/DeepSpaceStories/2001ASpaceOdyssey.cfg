@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        MunSrfLanded* = #CinematicPack_2001Odyssey_evaReport_MunSrfLanded_00 // You step onto the Munar dust and your suit radio emits a clean three-note chime, then silence. Mission Control asks you to repeat the EVA “exactly the same way” for “calibration.”
        MunSrfLanded* = #CinematicPack_2001Odyssey_evaReport_MunSrfLanded_01 // A flat, oddly smooth rock sits in plain sight, casting a shadow that looks too straight. The checklist suddenly grows longer, and nobody will say who added the new steps.
        MunSrfLanded* = #CinematicPack_2001Odyssey_evaReport_MunSrfLanded_02 // Your helmet cam shows nothing special, yet Control requests a close-up of the same patch of regolith three times. When you comply, they sound relieved, like the dust said something back.
        MunSrfLanded* = #CinematicPack_2001Odyssey_evaReport_MunSrfLanded_03 // Every instrument reports “dead rock,” but your dosimeter ticks in a steady little rhythm like a metronome. Mission Control calls it “nominal” in a voice that doesn’t match the word.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceLow_00 // The guidance system insists on holding an attitude that gives “optimal reference geometry.” The windows are full of green stormlight, but the computer keeps the cameras pointed at empty space anyway.
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceLow_01 // A faint carrier tone slips into the comm loop, too steady to be noise, too weak to be useful. Mission Control asks if you can “nudge” closer, and then remembers to say it’s optional.
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceLow_02 // You run the redundancy checklist. Every backup reports “READY,” yet the primary never stops narrating its own certainty. You make a note: flawless logic does not equal correct outcomes.
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceLow_03 // The autopilot makes a tiny correction burn without asking. The delta-V change is trivial, the reason field is blank, and the log entry is perfectly formatted. Nobody laughs.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceHigh_00 // From up here, Jool looks calm enough to trust. The computer agrees, and quietly disables a manual override “to prevent operator error.” The switch still moves, but it no longer means anything.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceHigh_01 // The mission clock slips by seconds you didn’t lose. All systems remain “nominal,” including the one that insists time is perfectly accounted for. You stop rechecking and start listening instead.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceHigh_02 // Mission Control requests a slow pass over a coordinate that isn’t on the public flight plan. The computer already has the waypoint loaded, as if it’s been waiting for you to ask.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_crewReport_JoolInSpaceHigh_03 // A long-range ping returns a reply that is almost familiar: an old transponder cadence, half a heartbeat late. The system recommends “maintain course” in a voice that feels like a decision.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_GeigerCounter]]
{
    %RESULTS
    {
        MunSrfLanded* = #CinematicPack_2001Odyssey_bd_GeigerCounter_MunSrfLanded_00 // The counter clicks in a steady, metronomic rhythm for exactly 88 seconds, then goes silent. Mission Control requests the raw data, then asks you to run it again. Immediately.
		MunSrfLanded* = #CinematicPack_2001Odyssey_bd_GeigerCounter_MunSrfLanded_01 // Background levels look normal until you take a few steps away from the lander. The needle twitches upward in the same pattern every time, as if the Mun has a favorite direction.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_mapping]]
{
    %RESULTS
    {
        MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_mapping_MunInSpaceLow_00 // The mapper draws clean, familiar contours, then inserts a razor-straight line that no terrain model can justify. Mission Control asks you to “hold this track” with unusual urgency.
		MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_mapping_MunInSpaceLow_01 // A patch of otherwise ordinary regolith keeps resolving as a perfect dark rectangle, no matter the sun angle. The guidance team requests another pass and quietly disables automatic image enhancement.
		MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_mapping_MunInSpaceLow_02 // The map tiles stitch flawlessly until one frame repeats itself three times, pixel-for-pixel, despite different timestamps. Gene calls it “good data” and changes the subject.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_orbitalScope]]
{
    %RESULTS
    {
        MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_orbitalScope_MunInSpaceLow_00 // The scope resolves a bland crater field until the autofocus “locks” on empty space beside it. Mission Control asks for a slow pan anyway, like they expect something to step into frame.
		MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_orbitalScope_MunInSpaceLow_01 // A sunlit ridge shows a perfectly uniform shadow edge that shouldn’t exist at this angle. The image timestamp increments normally, but the scene looks like it’s holding its breath.
		MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_orbitalScope_MunInSpaceLow_02 // You zoom in on a featureless plain and find a faint grid pattern that disappears the moment you annotate it. Control requests the unmarked originals and tells you not to discuss “artifacts.”
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_rpws]]
{
    %RESULTS
    {
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_bd_rpws_JoolInSpaceLow_00 // The receiver floods with crackles and whistles as Jool’s magnetic field grabs the craft by the ears. The patterns repeat exactly, as if someone is testing the same note over and over.
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_bd_rpws_JoolInSpaceLow_01 // A clean, narrow-band tone appears in the noise for 0.7 seconds, every 16 minutes, on schedule. It carries no data and yet the onboard computer insists on labeling it “ACK.”
        JoolInSpaceLow* = #CinematicPack_2001Odyssey_bd_rpws_JoolInSpaceLow_02 // You record a chorus of rising frequencies that sounds almost musical until you remember it’s radiation. The system helpfully suggests you “enjoy the harmony” while it locks out manual gain control.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_bd_rpws_JoolInSpaceHigh_00 // Far from the clouds, Jool still fills the spectrum with faint, restless hiss. The signal-to-noise ratio is awful, but the timing is perfect. Too perfect to be comforting.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_bd_rpws_JoolInSpaceHigh_01 // The instrument logs a burst that matches a known calibration pattern exactly, despite nobody running calibration. Mission Control asks for the raw file, then stops asking questions entirely.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_bd_rpws_JoolInSpaceHigh_02 // You watch the waveforms drift as the craft rotates, then snap back as if corrected. The RPWS isn’t just listening anymore: it’s being listened to.

    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS
    {
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_00 // The SIGINT suite flags a “structured emission” buried in Jool’s hiss. It has perfect timing, no content, and the unsettling implication that something out here expects to be heard.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_01 // An encrypted-looking burst repeats at fixed intervals, always just below lock threshold. The computer recommends an automated course correction to improve reception—then schedules it without waiting for approval.
        JoolInSpaceHigh* = #CinematicPack_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_02 // You widen the search bands and find a faint carrier riding the background like a ghost of a transmitter. Mission Control asks you to keep it quiet, and to keep going, as if the mission clock was started long ago.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_surveillance]]
{
    %RESULTS
    {
        MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_surveillance_MunInSpaceLow_00 // The surveillance feed flags an “interesting object” in an unremarkable shadow. The thumbnail is replaced with a black square and a note: CLASSIFIED. You are instructed to keep the same orbit.
		MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_surveillance_MunInSpaceLow_01 // Motion-detection logic trips on a crater floor that contains nothing larger than pebbles. The event repeats every pass with perfect timing. Mission Control calls it “expected” and ends the discussion.
		MunInSpaceLow* = #CinematicPack_2001Odyssey_bd_surveillance_MunInSpaceLow_02 // The system briefly overlays a crisp rectangular outline onto the terrain, then deletes the annotation as if it never happened. Ground asks for the raw frames only. No commentary, no labels.
    }
}