		TyloInSpaceLowMidlands* = #JNSQscience_bd_multiSpec_TyloInSpaceLowMidlands_00 // The midlands come back as a stable, dull fingerprint with just enough variation to be annoying. You write “uniform” and then cross it out.
		TyloInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_TyloInSpaceLowLowlands_00 // Low areas skew darker and slightly warmer through the day, suggesting finer material collecting in basins. Gravity may be brutal, but it still knows how to sort dust.

		BopInSpaceLowPoles* = #JNSQscience_bd_multiSpec_BopInSpaceLowPoles_00 // The poles are a jumble of bright flecks and dark pits across the bands, like someone sprinkled gravel on a sponge. Bop remains proudly unhelpful.
