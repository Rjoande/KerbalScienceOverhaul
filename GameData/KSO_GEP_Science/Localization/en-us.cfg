        #GEPscience_bd_surveillance_NodensInSpaceLowTemperateLowlands_00 = Temperate plains show crisp boundaries between darker soils and lighter flats, like someone organized the terrain. Several areas look comfortably level for an outpost—comfortably, for Nodens.
