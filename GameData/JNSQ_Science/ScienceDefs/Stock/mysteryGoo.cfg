		MunSrfLandedMountains* = #JNSQscience_mysteryGoo_MunSrfLandedMountains_00 // The Goo stretches upward into a spiky little peak, then slumps over. It appears to have learned everything it needed to know about mountains.
        MunSrfLandedMountains* = #JNSQscience_mysteryGoo_MunSrfLandedMountains_01 // The Goo slowly creeps downhill inside the container, as if trying to follow the slope outside. You log it as “motivated,” but not “successful.”

		MinmusSrfLandedPoles* = #JNSQscience_mysteryGoo_MinmusSrfLandedPoles_00 // The Goo arranges itself into neat little flakes, as if trying to be “polar” about the whole situation.
        MinmusSrfLandedLowlands* = #JNSQscience_mysteryGoo_MinmusSrfLandedLowlands_00 // The Goo presses against the container like it’s trying to get closer to the ground. You decide not to help.
        MinmusSrfLandedMidlands* = #JNSQscience_mysteryGoo_MinmusSrfLandedMidlands_00 // The Goo shivers, then settles into a sulky lump. It looks like it wants a bite but also wants to complain first.
        MinmusSrfLandedHighlands* = #JNSQscience_mysteryGoo_MinmusSrfLandedHighlands_00 // The Goo stretches into a thin sheet and makes a tiny, wobbly topographic map. It marks several spots with angry little dents.
        MinmusSrfLandedBrownBasins* = #JNSQscience_mysteryGoo_MinmusSrfLandedBrownBasins_00 // The Goo takes on a darker tint and tries to blend in. It fails, but looks proud anyway.
