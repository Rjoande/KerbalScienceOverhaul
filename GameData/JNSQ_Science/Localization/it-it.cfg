Localization
{
    it-it
    {
        // atmosphereAnalysis
        #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthPolarZone_00 = L'analizzatore segnala per lo più idrogeno ionizzato, con un contorno di elio. Segnala anche che la "brezza polare" sta cercando di scollare il sensore.
        #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthSubpolarZone_00 = L'idrogeno domina la lettura, l'elio segue a ruota e il resto della tavola periodica sporge denuncia di scomparsa.
        #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthTemperateZone_00 = Lo spettro è così pulito da risultare sospetto: idrogeno, elio e un bel po' di "questa non è aria normale".
        #JNSQscience_atmosphereAnalysis_SunFlyingLowNorthTropicZone_00 = L'aspiratore rileva plasma di idrogeno ed elio. La schermatura termica rileva rimorso.
        #JNSQscience_atmosphereAnalysis_SunFlyingLowEquatorialZone_00 = Denso, caldo e molto carico: idrogeno ed elio con abbastanza ionizzazione da far crepitare lo strumento in modo udibile.
        #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthTropicZone_00 = La composizione sembra stabile, idrogeno con una modesta frazione di elio, mentre la turbolenza fa danzare le letture come se stessero cercando di scappare.
        #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthTemperateZone_00 = L'analizzatore continua a provare a etichettare il campione come "atmosfera", poi lo cancella e scrive "zuppa energetica".
        #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthSubpolarZone_00 = Ancora idrogeno ed elio, ma con picchi di particelle più netti. Qualcosa laggiù sta lanciando capricci verso il cielo.
        #JNSQscience_atmosphereAnalysis_SunFlyingLowSouthPolarZone_00 = I flussi polari riempiono l'aspiratore di ioni veloci. Lo strumento conferma la miscela: idrogeno, elio e panico.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthPolarZone_00 = Quassù l'"aria" si assottiglia fino a sussurri di idrogeno ed elio, ma le particelle cariche arrivano ancora in sciami entusiasti.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthSubpolarZone_00 = Il campione è quasi puro idrogeno ed elio, così rarefatto che l'analizzatore deve fare una media per "un po'".
        #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthTemperateZone_00 = Idrogeno ed elio restano il titolo in prima pagina. La nota a piè pagina è un flusso costante di particelle ionizzate in fuga verso l'esterno.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighNorthTropicZone_00 = I gas sono radi ma energetici: l'analizzatore registra idrogeno ed elio e diverse pagine di bip di avvertimento.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighEquatorialZone_00 = Gli strati esterni risultano idrogeno ed elio con una marcata firma di deflusso. Potresti stare cavalcando la brezza più arrabbiata del mondo.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthTropicZone_00 = Lo strumento conferma idrogeno ed elio, poi annota con discrezione che il campione se ne sta andando più in fretta di te.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthTemperateZone_00 = Lo spettro è dominato dall'idrogeno con l'elio di supporto. La densità è bassa, ma la radiazione no.
        #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthSubpolarZone_00 = Tracce di idrogeno ed elio sfilano in scie: l'analizzatore suggerisce di chiamarlo "vento" invece di "meteo".
        #JNSQscience_atmosphereAnalysis_SunFlyingHighSouthPolarZone_00 = Le regioni polari mostrano la stessa miscela idrogeno ed elio, ma con impatti di particelle più duri che fanno sembrare il sensore sabbiato dalla luce.
        #JNSQscience_atmosphereAnalysis_EveSrfLanded_00 = L'analizzatore segnala per lo più anidride carbonica con un pizzico di azoto. Segnala anche "NON INALARE" in grassetto.
        #JNSQscience_atmosphereAnalysis_EveSrfLanded_01 = Le pompe faticano contro l'aria densa. I filtri tornano tinti di viola e leggermente offesi.
        #JNSQscience_atmosphereAnalysis_EveSrfLanded_02 = Compaiono composti in tracce che sembrano desiderosi di corrodere qualcosa di importante. Speri che "importante" non sia tu.
        #JNSQscience_atmosphereAnalysis_EveSrfLanded_03 = La lettura è stabile, densa e calda. L'atmosfera di Eve non è per nulla discreta su nessuno di questi punti.
        #JNSQscience_atmosphereAnalysis_EveFlyingLow_00 = I campioni a bassa quota contengono molti aerosol e goccioline. I problemi di visibilità ora hanno una firma chimica.
        #JNSQscience_atmosphereAnalysis_EveFlyingLow_01 = L'aspiratore raccoglie quasi subito una patina appiccicosa. L'analizzatore suggerisce "pulizia" e "preghiere".
        #JNSQscience_atmosphereAnalysis_EveFlyingLow_02 = La composizione resta ricca di CO2, ma i gas in tracce aumentano a picchi in sacche, come meteo invisibile.
        #JNSQscience_atmosphereAnalysis_EveFlyingLow_03 = Il campionatore registra aria calda e pesante, con abbastanza chimica reattiva da tenere il laboratorio occupato per anni.
        #JNSQscience_atmosphereAnalysis_EveFlyingHigh_00 = In alto l'aria si assottiglia, ma la foschia persiste. L'analizzatore trova particelle fini che si rifiutano di depositarsi.
        #JNSQscience_atmosphereAnalysis_EveFlyingHigh_01 = I sottoprodotti trasformati dal sole aumentano con la quota. Lo spettro sembra che qualcuno abbia scarabocchiato ai margini.
        #JNSQscience_atmosphereAnalysis_EveFlyingHigh_02 = Il conteggio delle goccioline cala, ma non fino a zero. Le nubi di Eve sono determinate a seguirti.
        #JNSQscience_atmosphereAnalysis_EveFlyingHigh_03 = L'alta atmosfera è ancora per lo più CO2 e azoto, solo più fredda e più cattiva.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedHighlands_00 = L'altitudine aiuta solo un po': l'aria è ancora densa, con polvere extra per dare consistenza.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedHighlands_01 = L'analizzatore segnala meno vapori pesanti, ma più graniglia abrasiva. La tua tuta è d'accordo.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedKrakensWell_00 = Il conteggio degli ioni salta vicino al bordo e lo spettro diventa rumoroso. Sulla carta, l'aria sembra "sbagliata".
        #JNSQscience_atmosphereAnalysis_EveSrfLandedKrakensWell_01 = L'analizzatore continua a ricalibrarsi, come se l'atmosfera stesse nascondendo qualcosa nel Pozzo.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedLowlands_00 = L'aspiratore fatica: l'aria de i bassopiani è spessa, calda e chimicamente molto attiva.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedLowlands_01 = I filtri catturano aerosol oleosi che non erano decisamente nel dépliant della missione.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedMidlands_00 = Qui le letture si stabilizzano: aria densa e calda con una firma dei vapori complicata.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedMidlands_01 = Ricompare una lieve nota dolce, da solvente. Il team scientifico ci litigherà per settimane.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedPeaks_00 = Quassù lo spettro mostra più sottoprodotti fotochimici trasportati dai venti.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedPeaks_01 = L'aria ti stuzzica essendo più rarefatta, ma resta ben lontana dall'essere respirabile.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedPoles_00 = L'analizzatore trova strati freddi e una foschia viola ostinata. Niente fa pensare che si possa respirare.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedPoles_01 = Minuscoli cristalli ticchettano sull'aspiratore mentre la composizione resta implacabilmente ostile.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedShores_00 = La salsedine ricopre l'aspiratore: l'analizzatore segnala subito goccioline corrosive.
        #JNSQscience_atmosphereAnalysis_EveSrfLandedShores_01 = L'umidità schizza in alto e lo strumento annota uno strato ricco di umidità che aderisce alla costa.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowExplodiumSea_00 = Bassi sul Mar di Explodium, le firme dei vapori aumentano bruscamente e si rifiutano di farsi ignorare.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowExplodiumSea_01 = Microgoccioline tempestano l'ingresso: l'analizzatore urla 'corrosivo'.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowHighlands_00 = Sopra gli altopiani l'aria si asciuga leggermente: la polvere domina l'aspiratore.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowHighlands_01 = L'analizzatore trova meno goccioline umide ma più graniglia tagliente.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowKrakensWell_00 = Volando basso sopra il Pozzo, il conteggio degli ioni va a picchi e il campionatore trema senza motivo.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowKrakensWell_01 = Compare una riga stretta e sconosciuta nello spettro: il Controllo Missione ti chiede di ignorarla.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowLowlands_00 = L'aria densa de i bassopiani mette in crisi le pompe: la composizione è stabile ma opprimente.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowLowlands_01 = Una foschia appiccicosa carica i filtri finché lo strumento inizia a lamentarsi.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowMidlands_00 = L'aria delle regioni intermedie trasporta polvere e goccioline: la lettura oscilla con la turbolenza.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowMidlands_01 = Una sottile foschia viola persiste anche qui, assaggiando i filtri a ogni campione.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowMountains_00 = La turbolenza scuote l'aspiratore: la composizione cambia a ogni sobbalzo di quota.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowMountains_01 = Filamenti di nube sfregano lo scafo e lasciano condense concentrate sul campionatore.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowPeaks_00 = Sfiorando le cime, i venti rapidi producono picchi netti nella lettura dei gas in tracce.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowPeaks_01 = La chimica rielaborata dal sole è più forte quassù: le tracce reattive saltano fuori dallo spettro.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowPetrolLakes_00 = Sopra i Laghi di Petrolio, le bande organiche dominano lo spettro in un coro oleoso.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowPetrolLakes_01 = L'analizzatore segnala volatili dall'aspetto infiammabile e raccomanda di non innescare scintille.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowPolarLakes_00 = Sopra i Laghi Polari, uno strato più fresco si posa sul liquido come un coperchio.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowPolarLakes_01 = Vapori localizzati salgono in colonne strette e compaiono come picchi ordinati.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofAkron_00 = Il mare di Akron espira una netta firma da solvente nell'aria bassa.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofAkron_01 = Goccioline viola si attaccano alla testa del campionatore e allargano ogni riga spettrale.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofBagorah_00 = La foschia di Bagorah è appiccicosa: i filtri si saturano in fretta e, anche attraverso gli scrubber, odora di solventi.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofBagorah_01 = L'analizzatore rileva organici pesanti e tracce di acidi. Scrivi 'non inalare' due volte.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGhidorah_00 = L'aria di Ghidorah mostra tre strati in competizione: lo spettro sembra intrecciato.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGhidorah_01 = I rapporti alternano ogni pochi secondi, come se attraversassi confini invisibili.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGigan_00 = L'aria di Gigan è carica di goccioline in sospensione: calano sia la visibilità sia l'ottimismo.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGigan_01 = Il campione mostra aerosol densi e sali in tracce: lo strumento ansima con educazione.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGojira_00 = I campioni di Gojira contengono goccioline di nebbia fitta: le bande chimiche si impastano tra loro.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofGojira_01 = L'aspiratore torna ricoperta di pellicola viola. Indica ancora 'pericoloso'.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofNessus_00 = L'aria di Nessus è umida e velata: le goccioline restano a lungo anche dopo aver lasciato i filamenti di nube.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofNessus_01 = L'analizzatore segnala una miscela liscia e uniforme, come se il mare fosse ben rimescolato.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofRodan_00 = I venti di Rodan spingono spruzzi pieni di graniglia: le particelle martellano l'ingresso come grandine.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofRodan_01 = L'analizzatore segnala un alto carico di particolato e una foschia stranamente 'tagliente'.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofTaniwha_00 = Taniwha produce picchi irregolari: la pressione d'aspiratore oscilla come se fosse nervosa.
        #JNSQscience_atmosphereAnalysis_EveFlyingLowSeaofTaniwha_01 = L'analizzatore riscontra una turbolenza. Tu riscontri un nome troppo lusinghiero.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighExplodiumSea_00 = Sopra il Mar di Explodium, anche i campioni in quota conservano una netta impronta dei vapori.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighExplodiumSea_01 = La foschia alta trasporta goccioline fini dal basso: scintillano sul vetro del sensore.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighHighlands_00 = Le correnti ascensionali degli altopiani spingono la polvere in alto: aerosol granulosi compaiono anche in quota.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighHighlands_01 = Qui lo spettro sembra più secco, con meno goccioline grandi e più particolato fine.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighKrakensWell_00 = In alto sopra il Pozzo, i picchi di ionizzazione si attenuano ma non scompaiono mai del tutto.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighKrakensWell_01 = L'analizzatore continua a trovare la stessa stretta riga anomala alla stessa longitudine.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighLowlands_00 = Da molto sopra i bassopiani, le composizioni locali svaniscono in una firma globale di foschia.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighLowlands_01 = Un debole rigonfiamento suggerisce vapori che risalgono dal basso, poi scompare nel rumore.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighMidlands_00 = I venti d'alta quota spalmanno le differenze locali: la lettura diventa monotona e costante.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighMidlands_01 = L'analizzatore mappa foschie stratificate impilate come pancake.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighMountains_00 = La convezione montana solleva le condense: l'analizzatore intercetta un pennacchio concentrato.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighMountains_01 = Aria sottile, venti forti e una spolverata continua di foschia viola sull'aspiratore.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPeaks_00 = A questa quota dominano le tracce rielaborate dagli UV: l'analizzatore sembra entusiasta.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPeaks_01 = Il manto di nubi sotto sembra un oceano viola e l'aria sopra resta poco amichevole.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPetrolLakes_00 = In alto sopra i Laghi di Petrolio, le bande organiche persistono più di quanto dovrebbero.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPetrolLakes_01 = I prodotti fotochimici formano un velo sottile che si trascina sottovento.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPolarLakes_00 = In alto sopra i Laghi Polari, un pennacchio fresco spicca contro lo sfondo più caldo.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPolarLakes_01 = Condense localizzate risalgono nella foschia e lasciano firme ordinate.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPoles_00 = L'aria polare in quota è sottile e fredda: l'analizzatore assaggia soprattutto particelle della foschia alta.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighPoles_01 = I gas in tracce sembrano più puliti qui, finché un tappeto di nubi viola scivola sotto.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofAkron_00 = Akron aggiunge una stretta firma di vapore che sopravvive fino all'aria alta.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofAkron_01 = Campioni una foschia sottile e reattiva che si esaurisce in fretta alla luce del sole.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofBagorah_00 = Bagorah contribuisce con aerosol pesanti che restano nella foschia alta molto dopo il tuo passaggio.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofBagorah_01 = L'analizzatore segnala composti a catena lunga e suggerisce di lavare lo strumento.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGhidorah_00 = L'aria alta di Ghidorah è stratificata in tre livelli: l'analizzatore traccia tre bande pulite.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGhidorah_01 = I rapporti oscillano con la quota, come se campionassi tre cieli diversi.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGigan_00 = Gigan spinge aerosol pesanti verso l'alto: il campione in quota è insolitamente torbido.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGigan_01 = Le dimensioni delle goccioline tendono a crescere: l'analizzatore lo chiama 'condensazione aggressiva'.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGojira_00 = La foschia di Gojira è spessa e riflettente: lo spettro è impastato dalle goccioline.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofGojira_01 = Si forma una pellicola persistente sull'aspiratore: la raschi via e fai finta che vada tutto bene.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofNessus_00 = Dall'alto Nessus resta uniforme: foschia liscia e pochissime sorprese nel campione.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofNessus_01 = L'analizzatore segnala una composizione stabile con un'alta frazione di goccioline.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofRodan_00 = L'aria alta di Rodan trasporta polvere sospinta dal vento: il campione è granuloso anche qui.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofRodan_01 = L'analizzatore vede strati secchi impilati sopra quelli umidi, come meteo con carattere.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofTaniwha_00 = Anche quassù, Taniwha dà picchi intermittenti, come se l'atmosfera avesse il singhiozzo.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighSeaofTaniwha_01 = Lo strumento registra un'onda ripetuta nella composizione e si rifiuta di spiegarla.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighShores_00 = Pennacchi costieri risalgono fino al manto di nubi: particelle simili a sale si registrano debolmente.
        #JNSQscience_atmosphereAnalysis_EveFlyingHighShores_01 = L'analizzatore rileva uno strato ricco di umidità che persiste sopra la linea di costa.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedLowlands_00 = L'umidità è alta e il sensore continua ad appannarsi. L'aria è densa del profumo di piante calde.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedLowlands_01 = L'analizzatore definisce l'atmosfera "nominale" ma anche "appiccicosa". Decidi che entrambe le cose possono essere vere.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedLowlands_02 = Rileva nebbia di fiume, sentore di terra e solo un accenno di briciole di snack nel vento. Casa, confermato.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridLowlands_00 = Aria per lo più secca con molta polvere fine. L'aspiratore inizia a tossire come un vecchio motore.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridLowlands_01 = Sali e silicati in tracce dominano il campione: dai un colpetto all'involucro e ne esce una piccola duna.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridLowlands_02 = Polvere e aria calda e rarefatta dominano il campione. L'unica umidità è il sudore nel tuo casco.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridMountains_00 = L'ossigeno è più basso e i venti sono più forti. Bisogna tenere fermo l'analizzatore perché non diventi un aliante.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridMountains_01 = Il campione sembra pulito finché non vedi la graniglia abrasiva attaccata a ogni superficie. Aria di montagna, ora con sabbia extra.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedAridMountains_02 = L'analizzatore conferma ossigeno e azoto nelle proporzioni previste, ma con un contenuto d'acqua molto basso a questa altitudine.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_00 = Aria marina salata mescolata a un lieve sentore di propellente bruciato. L'analizzatore la chiama "contaminazione celebrativa".
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_01 = Carburanti in tracce, spruzzi di mare e qualcosa che potrebbe essere briciole di snack. Quest'isola ti dà davvero il bentornato.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_02 = L'analizzatore segnala azoto, ossigeno, argon... e un lieve sentore di scarico a reazione. Tu lo chiami "infrastruttura".
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_03 = Il campione contiene spruzzi salini, residui di ablativo bruciato e una quantità allarmante di applausi.
        #JNSQscience_atmosphereAnalysis_KerbinSrfLandedWelcomeBackIsland_04 = Tracce di scarico dei razzi restano nella brezza. Le squadre di recupero sono sicuramente nei paraggi.
        #JNSQscience_atmosphereAnalysis_KerbinFlyingLowLowlands_00 = Il campionatore aspira aria pesante e umida. La condensa si forma nella fotocamera più in fretta di quanto tu riesca a pulire il vetro.
        #JNSQscience_atmosphereAnalysis_KerbinFlyingLowLowlands_01 = L'analizzatore segnala uno spesso strato di vapore acqueo e composti organici. Quasi senti le zanzare fare il tifo.
        #JNSQscience_atmosphereAnalysis_KerbinFlyingHighLowlands_00 = Quassù l'umidità cala, ma l'analizzatore individua ancora un pennacchio di umidità che sale dai bassopiani caldi.
        #JNSQscience_atmosphereAnalysis_KerbinFlyingHighLowlands_01 = La miscela è calma e uniforme, con foschia quanto basta per ricordarti che laggiù il suolo sta ancora evaporando.
        #JNSQscience_atmosphereAnalysis_KerbinFlyingLowAridLowlands_00 = I granelli di polvere colpiscono l'aspiratore come minuscoli proiettili. L'analizzatore segnala "alto contenuto di particolato" e "scelte di vita discutibili".
        #JNSQscience_atmosphereAnalysis_KerbinFlyingLowAridLowlands_01 = L'aria è calda, sottile e piena di sabbia. Il sensore ha bisogno di un bagno e forse anche di scuse.
