@EXPERIMENT_DEFINITION:HAS[#id[bd_Scatterometer]]
{
    %RESULTS
    {
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthPolarZone_00 // The return signal flickers like it’s trying to measure “wind” inside a glowing soup. Mission Control suggests we write down “very fast” and never say the units out loud.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthSubpolarZone_00 // Scatter patterns smear into long streaks as the star’s surface churns beneath you. The data arrives late, as if the packets were also being blown sideways.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthTemperateZone_00 // The instrument insists it’s seeing layered flow bands, then reboots to make sure it’s not dreaming. You agree with the reboot and keep recording anyway.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthTropicZone_00 // Reflections pulse in slow waves, like the “weather” is bubbling up from below and popping at the top. You briefly miss clouds that only rain.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowEquatorialZone_00 // The equatorial returns show the sharpest shear, with bright and dark ribbons sliding past each other. You label it “high-speed atmosphere,” because “star” won’t fit in the report form.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthTropicZone_00 // The backscatter spikes in irregular bursts, then settles into a steady hiss. Whatever is “down there” is busy, and it doesn’t care that you’re watching.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthTemperateZone_00 // The scatterometer detects broad circulation bands that drift during the time it takes to transmit the last reading. It’s like measuring wind with yesterday’s thermometer.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthSubpolarZone_00 // The signal gets noisy and gritty, as if the star is sanding its own surface. You consider adding a “do not touch” sticker to the data.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthPolarZone_00 // Returns near the pole are oddly structured, with tight spirals that refuse to average out. The red light outside makes the whole thing feel like a warning label.
        GrannusInSpaceHigh* = #GEPscience_bd_Scatterometer_GrannusInSpaceHigh_00 // From high over Grannus, the scatterometer can only summarize: “everything is moving, everywhere, all at once.” The long delay makes it feel like you’re listening to a distant furnace through a tin can.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSunnyLowlands_00 // The sunny lowlands throw back strong, steady echoes—hot ground, thin air, and winds that behave like they’re late for an appointment. The numbers look real, which is somehow suspicious this far from home.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSunnyHighlands_00 // Over the sunlit high terrain, the scatter signal wobbles as heated air spills downslope in ragged waves. You can practically hear the planet sizzling through the antenna.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowTransitionalLowlands_00 // The terminator lowlands show sharp gradients: calm pockets next to sudden gust lanes. It’s the kind of “breeze” that would steal your checklist and your hat.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowTransitionalHighlands_00 // The transition-zone highlands produce messy backscatter, like two climates arguing over who owns the mountain. The instrument politely reports “variable” and refuses to pick a side.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideLowlands_00 // On the dark side, returns quiet down into faint, slow-moving flows hugging the ground. The atmosphere is so thin it feels like the wind is whispering to itself.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideHighlands_00 // The dark highlands show intermittent surges, as cold air slides and pools in invisible channels. You mark the spot for future pilots who enjoy surprises.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSoutheasternMountains_00 // Mountain echoes show strong directional scatter, suggesting persistent downslope jets. The data packet arrives with a delay long enough to make you double-check which side is “down” today.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowWesternMountains_00 // The western ranges return broken bands of turbulence, as if the thin air is shredding on the ridgelines. You jot down: “mountains still doing mountain things.”
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideMountains_00 // Dark-side mountain returns are sparse but sharp—cold flows, sudden gusts, then silence. It’s the kind of weather that makes you talk to your radio just to hear something.
        ToutatisInSpaceHigh* = #GEPscience_bd_Scatterometer_ToutatisInSpaceHigh_00 // From high orbit, Toutatis looks split between a roaring bright hemisphere and a quiet dark one, with the boundary always restless. The scatterometer’s global map reads like a warning about living on the edge.

        NodensInSpaceLowSaltySeas* = #GEPscience_bd_Scatterometer_NodensInSpaceLowSaltySeas_00 // The sea surface kicks back a lively, noisy return—whitecaps, gusts, and a lot of “yes, there is definitely weather here.” The red sunlight makes the wave fields look like moving rust.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_Scatterometer_NodensInSpaceLowFreshWater_00 // The reflections are smoother and more coherent than the salty basins, with wind streaks that line up like careful handwriting. Someone suggests Nodens is “almost comfortable,” and the comm delay lets that statement hang awkwardly.
        NodensInSpaceLowShores* = #GEPscience_bd_Scatterometer_NodensInSpaceLowShores_00 // Land and water fight over the signal in a jagged border of mixed scatter. The instrument calls it “complex terrain,” which is polite for “stop flying over the confusing bit.”
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_Scatterometer_NodensInSpaceLowTropicalLowlands_00 // Strong, steady backscatter implies persistent low-level winds and warm convection. It’s the first time “tropical” has ever sounded slightly threatening in a mission log.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_Scatterometer_NodensInSpaceLowTemperateLowlands_00 // Broad wind bands drift slowly, as if the atmosphere is taking its time deciding on a direction. The data arrives late enough that you feel like you’re forecasting yesterday.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_Scatterometer_NodensInSpaceLowTropicalMidlands_00 // The return signal pulses with rising thermals and shifting gust fronts spilling off higher ground. You mark it as “breezy,” then add a note: “breezy, but far away.”
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_Scatterometer_NodensInSpaceLowTemperateMidlands_00 // Scatter patterns show alternating calm pockets and rough corridors, suggesting terrain-channeled flow. The planet is teaching you its wind map one delayed packet at a time.
        NodensInSpaceLowHighlands* = #GEPscience_bd_Scatterometer_NodensInSpaceLowHighlands_00 // The backscatter drops and spikes in quick succession—thin air, strong shear, and turbulence along ridges. The instrument survives, but the plots look like they’re nervous.
        NodensInSpaceLowTundra* = #GEPscience_bd_Scatterometer_NodensInSpaceLowTundra_00 // Low sun angles and cold surfaces produce crisp returns with subtle wind signatures hugging the ground. The atmosphere feels present, but careful—like it’s trying not to wake something.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_Scatterometer_NodensInSpaceLowIceCaps_00 // The signal comes back bright and clean, with katabatic flows sliding off the ice in steady streams. You briefly envy the simplicity of frozen weather.
        NodensInSpaceHigh* = #GEPscience_bd_Scatterometer_NodensInSpaceHigh_00 // From high above Nodens, the scatterometer sketches a global pattern of circulation and storm tracks. It’s strangely reassuring to see a whole planet behaving like a planet—under a sun that isn’t yours.

        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkTropicalBands_00 // The dark bands return a strong, mottled signal—dense haze and violent shear moving in disciplined lanes. Mission Control calls it “beautiful,” several minutes after you’ve started worrying.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_Scatterometer_SironaInSpaceLowLightTropicalBands_00 // The light bands scatter more evenly, suggesting higher, smoother cloud decks riding fast winds. The atmosphere looks calm only because it’s moving too quickly to argue.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkTemperateBands_00 // Backscatter flickers in wave trains, like the clouds are being folded and refolded by enormous jet streams. You wonder how many kilometers “near-surface” means on a gas giant, then stop wondering.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_Scatterometer_SironaInSpaceLowLightTemperateBands_00 // The returns smear into long streaks aligned with the flow—persistent winds with fewer breaks. The data packet arrives like a postcard from a storm that never ends.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkPolarBands_00 // Polar echoes show tight spirals and sudden bursts, hinting at vortices that don’t like being averaged. The red glow outside makes every swirl look like a warning sign.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_Scatterometer_SironaInSpaceLowLightPolarBands_00 // The light polar regions give clean, high-contrast scatter, with wind direction snapping between stable lanes and chaotic eddies. You label it “predictable-ish” and immediately regret it.
        SironaInSpaceHigh* = #GEPscience_bd_Scatterometer_SironaInSpaceHigh_00 // From high orbit, Sirona resolves into a banded machine of winds and waves, marching under dim red light. The scatterometer’s global map feels less like weather and more like machinery.

        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalCraquelure_00 // The cracked plains return a busy, speckled signal—gusts keep finding new edges to trip over. The atmosphere is thin enough to be sneaky, but it still moves with purpose under the dim red light.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateCraquelure_00 // Wind streaks line up along the fractures like someone tried to comb the surface and gave up halfway through. The data arrives late, as if the comms also had to cross the cracks.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalLowlands_00 // Lowland echoes suggest persistent near-surface flow, with occasional bursts that look like fast-moving haze fronts. Mission Control asks for “a weather report,” and you send back “yes.”
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateLowlands_00 // The scatterometer sees broad, steady winds that don’t care about your local daylight schedule. Down here, “morning” is mostly a rumor.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalMidlands_00 // The return pattern shifts in bands, hinting at terrain-guided jets sliding around the midlands. You annotate the plot with “wind tunnels, but the planet-sized kind.”
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateMidlands_00 // Patches of calm alternate with rough corridors, like the atmosphere is picking favorites. The red sun keeps everything looking slightly incorrect, including the numbers.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowHighlands_00 // Over the highlands the signal jitters—turbulence, shear, and abrupt lulls behind ridges. The instrument survives, but the graph looks startled.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowMajorCraters_00 // Crater basins show sheltered pockets and sudden spillover gusts at the rims. It’s the classic “nice in the bowl, terrible at the edge” problem.
        BorvoInSpaceLowPoles* = #GEPscience_bd_Scatterometer_BorvoInSpaceLowPoles_00 // Polar returns are bright and clean, with steady downslope flows that behave like cold air on a mission. The atmosphere keeps its methane quiet and its winds louder than expected.
        BorvoInSpaceHigh* = #GEPscience_bd_Scatterometer_BorvoInSpaceHigh_00 // From high orbit, Borvo’s winds sketch a thin, persistent circulation—subtle but planet-spanning. The long delay makes it feel like you’re watching yesterday’s weather through a keyhole.

        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_Scatterometer_EponaInSpaceLowTropicalLowlands_00 // The lowlands throw back smooth, coherent echoes, with wind streaks that drift slowly across the cold surface. Even here, far from home, the air insists on being counted.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_Scatterometer_EponaInSpaceLowTemperateLowlands_00 // Surface winds look steady but oddly layered, like different “floors” of the atmosphere are sliding past each other. You file it under “polite turbulence.”
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_Scatterometer_EponaInSpaceLowTropicalUplands_00 // Upland returns show stronger shear and intermittent gust lanes, as if cold air is being poured downhill in invisible sheets. The red sun makes every boundary look like a bruise.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_Scatterometer_EponaInSpaceLowTemperateUplands_00 // The scatterometer catches wave-like patterns marching over the uplands—gravity waves, or the planet sighing, or both. Mission Control’s reply arrives several minutes after your joke does.
        EponaInSpaceLowHighlands* = #GEPscience_bd_Scatterometer_EponaInSpaceLowHighlands_00 // Above the highlands, the signal flickers with turbulence along the ridgelines and calmer pockets in the lee. The atmosphere is thin on patience and thick on surprises.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_Scatterometer_EponaInSpaceLowGrandPeaks_00 // The peaks generate sharp, directional scatter—strong jets and violent eddies where the flow is forced to choose a side. You recommend future landers choose neither.
        EponaInSpaceLowCraters* = #GEPscience_bd_Scatterometer_EponaInSpaceLowCraters_00 // Crater interiors look deceptively calm, then spike with rim-crossing gusts that spill in like they own the place. “Sheltered” is clearly a temporary condition.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_Scatterometer_EponaInSpaceLowVolcanoes_00 // The returns brighten and smear near the volcanic regions, suggesting warm plumes punching into cold air and stirring messy winds. The planet may be frozen, but something underneath is definitely not.
        EponaInSpaceLowPoles* = #GEPscience_bd_Scatterometer_EponaInSpaceLowPoles_00 // Polar echoes are crisp, with persistent katabatic flows sliding toward the low ground. The day/night cues are faint out here, but the cold knows exactly what time it is.
        EponaInSpaceHigh* = #GEPscience_bd_Scatterometer_EponaInSpaceHigh_00 // From high orbit, Epona’s circulation looks slow, deliberate, and stubbornly global—driven by weak sunlight and stronger secrets. The map reads like weather written for a world that expects no visitors.
    }
}