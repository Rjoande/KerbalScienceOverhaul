@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        SrfLanded* = #CSS_evaReport_default_00 // The inability to scratch your chin is making concentrating on the EVA nearly impossible.
        SrfLanded* = #CSS_evaReport_default_01 // It feels very much like it did back inside the ship, yet succinctly more outdoorsy.
        SrfLanded* = #CSS_evaReport_default_02 // You can't help but wonder where you left the keys.
        SrfLanded* = #CSS_evaReport_default_03 // You realize a glaring lack of a snack-hole in your suit.
        SrfLanded* = #CSS_evaReport_default_04 // You repeatedly turn your helmet lights on and off.
        SrfLanded* = #CSS_evaReport_default_05 // The stars look very different today.
        SrfLanded* = #CSS_evaReport_default_06 // You discover some change, and quickly stuff it in your pocket before anyone else notices.
        SrfLanded* = #CSS_evaReport_default_07 // "What wasn't I supposed to do? Oh well... it probably wasn't important."
        SrfLanded* = #CSS_evaReport_default_08 // You wonder what would happen if you removed your helmet here, before remembering being specifically told not to do that.
        SrfLanded* = #CSS_evaReport_default_09 // This suit is really uncomfortable. Can we go back inside?
        SrfLanded* = #CSS_evaReport_default_10 // You wonder why your suit isn't orange.
        SrfLanded* = #CSS_evaReport_default_11 // You take note on your surroundings.
        SrfLanded* = #CSS_evaReport_default_12 // You examine the situation.
        SrfLanded* = #CSS_evaReport_default_13 // Your stomach growls.
        SrfLanded* = #CSS_evaReport_default_14 // Next time you should take snacks.
        SrfLanded* = #CSS_evaReport_default_15 // Does this EVA suit make me look fat?
        SrfLanded* = #CSS_evaReport_default_16 // Your boots are on the wrong feet.
        SrfLanded* = #CSS_evaReport_default_17 // You imagine this is what its like to be the Michelin Man.
        SrfLanded* = #CSS_evaReport_default_18 // You look around and see nothing of importance.
        SrfLanded* = #CSS_evaReport_default_19 // In space, no one can hear you complain about how uncomfortable your suit is.
        
        InSpace* = #CSS_evaReport_default_00 // The inability to scratch your chin is making concentrating on the EVA nearly impossible.
        InSpace* = #CSS_evaReport_default_01 // It feels very much like it did back inside the ship, yet succinctly more outdoorsy.
        InSpace* = #CSS_evaReport_default_02 // You can't help but wonder where you left the keys.
        InSpace* = #CSS_evaReport_default_03 // You realize a glaring lack of a snack-hole in your suit.
        InSpace* = #CSS_evaReport_default_04 // You repeatedly turn your helmet lights on and off.
        InSpace* = #CSS_evaReport_default_05 // The stars look very different today.
        InSpace* = #CSS_evaReport_default_06 // You discover some change, and quickly stuff it in your pocket before anyone else notices.
        InSpace* = #CSS_evaReport_default_07 // "What wasn't I supposed to do? Oh well... it probably wasn't important."
        InSpace* = #CSS_evaReport_default_08 // You wonder what would happen if you removed your helmet here, before remembering being specifically told not to do that.
        InSpace* = #CSS_evaReport_default_09 // This suit is really uncomfortable. Can we go back inside?
        InSpace* = #CSS_evaReport_default_10 // You wonder why your suit isn't orange.
        InSpace* = #CSS_evaReport_default_11 // You take note on your surroundings.
        InSpace* = #CSS_evaReport_default_12 // You examine the situation.
        InSpace* = #CSS_evaReport_default_13 // Your stomach growls.
        InSpace* = #CSS_evaReport_default_14 // Next time you should take snacks.
        InSpace* = #CSS_evaReport_default_15 // Does this EVA suit make me look fat?
        InSpace* = #CSS_evaReport_default_16 // Your boots are on the wrong feet.
        InSpace* = #CSS_evaReport_default_17 // You imagine this is what its like to be the Michelin Man.
        InSpace* = #CSS_evaReport_default_18 // You look around and see nothing of importance.
        InSpace* = #CSS_evaReport_default_19 // In space, no one can hear you complain about how uncomfortable your suit is.

        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_00 // You release a gray rock from your spacesuit pocket and make a resolution to come back in a year to find out if it looks like Moho.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_01 // You think its becoming sort of hot... You hope you will be allowed back inside soon.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_02 // Your wax wings begin to melt.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_03 // You sincerely hope that the guys back home made this suit hardened against radiation.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_04 // You suddenly regret not bringing your SPF-10000 sun cream with you.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_05 // You think sunglasses would have been a good idea.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_06 // You think your new tan will impress everyone back in the Space Center.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_07 // You smell a faint burning coming from your spacesuit.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_08 // As you stare at Kerbol, you manage to resist the urge to take off your helmet to have some toasted marshmallows.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_09 // Your thermometer blew up inside the cabin. That can't be a good sign.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_10 // It's a dry heat.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_11 // You really wish you'd brought marshmallows. You bet you could make S'mores from here.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_12 // You can't wait to tell your friends about flying near the Sun with nothing but your spacesuit on.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_13 // Good thing you brought your 4000+ sunscreen.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_14 // The suit feels a bit warm.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_15 // Outside the ship, you can really see the power of the sun. As you watch, you see a flash on the surface and a tongue of plasma shoots off.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_16 // You wonder if the radiation from Kerbol is harming you in any way.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_17 // Your spacesuit is starting to heat up now. Maybe it's a good idea to get back to your spacecraft.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_18 // Is it just me, or is it hot in here?
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_19 // You are starting to sweat profusely and wonder why you had left the capsule in the first place.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_20 // You feel as if you should have brought a stronger sunscreen.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_21 // It feels a bit warm.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_22 // A massive, luminous sphere of plasma held together by its own gravity! This one appears to be undergoing thermonuclear fusion of hydrogen into helium in its core.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_23 // Kerbol is bigger then you have ever could have seen it on Kerbin. You wish you'd brought your sunglasses.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_24 // You're feeling really hot and can't stand the unbearable heat.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_25 // You crack a bad joke about landing on the sun at night to Mission Control.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_26 // Since the solar panels produce more energy, you crank up the air conditioner.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_27 // You realize that this is not where you want to be right now.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_28 // Turns out jet-pack fuel does not like being exposed to this kind of temperature.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_29 // You realize things would go pretty badly if you strayed away from the vessel.
        SunInSpaceLow* = #CSS_evaReport_SunInSpaceLow_30 // Your geiger counter is maxed out at 3.6 Roentgen.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_00 // All you can remember while glaring at the empty void is the tale of the Space Kraken. You really want to return to the ship.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_01 // You gaze down at the majestic fireball that is Kerbol, only to realize that you have temporarily blinded yourself.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_02 // You're suddenly alarmed at how empty space is. Just you, the sun, and... your ship. Mission Control questions why your heartbeat just spiked.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_03 // As you look toward Kerbol, you realize you forgot your sunglasses and Jeb has the only pair anyways.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_04 // You wonder if that burning smell is real or just your imagination.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_05 // Finally some peace and quiet!
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_06 // You attempt to become the first Kerbal to finish a crossword puzzle in space, but your pencil floats away before you can even start.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_07 // "Am I stupid or just upside-down?"
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_08 // It's empty. It goes on forever, and... Oh my gosh, it's full of stars!
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_09 // You decide to have a staring contest with Kerbol. You lose.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_10 // The sun appears... Yellow?
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_11 // Having spent time in stellar orbit, you request that you be declared a new planet. Mission Control promises to think about it.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_12 // Looking around, you notice lots of sparkly things. One of them is REALLY sparkly.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_13 // They should have sent a poet. It's so beautiful.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_14 // You look out into the universe and wonder if you're alone, if Kerbin is a cradle of life in an otherwise sterile universe. Mission Control tells you to stop thinking so much.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_15 // It would have been better if it was green.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_16 // You search in every direction, but there is no Kraken to be seen.
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_17 // Suddenly you hear a deep growling. Is that the space Kraken?
        SunInSpaceHigh* = #CSS_evaReport_SunInSpaceHigh_18 // Staring into the void, you ponder your place in the universe.

        MohoSrfLanded* = #CSS_evaReport_MohoSrfLanded_00 // At least you will have a nice tan when you get home.
        MohoSrfLandedNorthPole* = #CSS_evaReport_MohoSrfLandedNorthPole_00 // The thermal systems of your suit protest as you move around in the bright sunlight. It's really hot out here.
        MohoSrfLandedNorthernSinkholeRidge* = #CSS_evaReport_MohoSrfLandedNorthernSinkholeRidge_00 // So... Anything interesting around here?
        MohoSrfLandedNorthernSinkhole* = #CSS_evaReport_MohoSrfLandedNorthernSinkhole_00 // Such heat, wow.
        MohoSrfLandedMidlands* = #CSS_evaReport_MohoSrfLandedMidlands_00 // You realize you forgot to bring your sunglasses.
        MohoSrfLandedWesternLowlands* = #CSS_evaReport_MohoSrfLandedWesternLowlands_00 // You trip over a small rock. Fortunately the gravity is low enough that you aren't hurt.
        MohoSrfLandedCentralLowlands* = #CSS_evaReport_MohoSrfLandedCentralLowlands_00 // You are relieved to see that spacesuits have an SPF of one million.
        MohoSrfLandedHighlands* = #CSS_evaReport_MohoSrfLandedHighlands_00 // You contemplate sun bathing for your return publicity shots.
        MohoSrfLandedMinorCraters* = #CSS_evaReport_MohoSrfLandedMinorCraters_00 // There's a hole around here somewhere.
        MohoSrfLandedMinorCraters* = #CSS_evaReport_MohoSrfLandedMinorCraters_01 // Look! There's water on Moho! Oh, wait... that's just sweat that got on your visor.
        MohoSrfLandedSouthWesternLowlands* = #CSS_evaReport_MohoSrfLandedSouthWesternLowlands_00 // Gene was skeptical, but you're glad you brought an umbrella.
        MohoSrfLandedSouthEasternLowlands* = #CSS_evaReport_MohoSrfLandedSouthEasternLowlands_00 // Suddenly, you really want some ice cream. You ask mission control for the fastest transfer window to Minmus.
        MohoSrfLandedCanyon* = #CSS_evaReport_MohoSrfLandedCanyon_00 // You can hear the coolant rushing through the tubes in your suit as fast as it can, and decide that you'd really like to go back inside.
        MohoSrfLandedSouthPole* = #CSS_evaReport_MohoSrfLandedSouthPole_00 // You hope to find the exact point of the south pole. Then you can plant a flag. But mission control might have other plans....
        MohoInSpaceLow* = #CSS_evaReport_MohoInSpaceLow_00 // You can actually feel the radiation.
        MohoInSpaceLowNorthPole* = #CSS_evaReport_MohoInSpaceLowNorthPole_00 // You pull out a energy bar, before realizing that you can't get it through your helmet. You compromise by smearing it on the visor.
        MohoInSpaceLowNorthernSinkholeRidge* = #CSS_evaReport_MohoInSpaceLowNorthernSinkholeRidge_00 // The ridge looks like the lips of an enormous mouth.
        MohoInSpaceLowNorthernSinkhole* = #CSS_evaReport_MohoInSpaceLowNorthernSinkhole_00 // That's a deep, dark hole down there. You've heard legends of a Kraken, and wonder if this is its den.
        MohoInSpaceLowMidlands* = #CSS_evaReport_MohoInSpaceLowMidlands_00 // It's really bright this close to Kerbol. You wonder if Dyson Spheres could be made by Kerbalkind.
        MohoInSpaceLowWesternLowlands* = #CSS_evaReport_MohoInSpaceLowWesternLowlands_00 // You feel dehydrated, but your suit says you're fine.
        MohoInSpaceLowCentralLowlands* = #CSS_evaReport_MohoInSpaceLowCentralLowlands_00 // The scientists back home want to know if life could exist here. You decide that they should've come instead.
        MohoInSpaceLowHighlands* = #CSS_evaReport_MohoInSpaceLowHighlands_00 // You draw a house in the dust. You're pretty sure the rocket will cover it up during launch, though.
        MohoInSpaceLowHighlands* = #CSS_evaReport_MohoInSpaceLowHighlands_01 // You hope you're high enough that you don't hit any mountains.
        MohoInSpaceLowMinorCraters* = #CSS_evaReport_MohoInSpaceLowMinorCraters_00 // Are there many asteroids around? Any asteroid that made those craters could do a real number on a Kerbal.
        MohoInSpaceLowSouthWesternLowlands* = #CSS_evaReport_MohoInSpaceLowSouthWesternLowlands_00 // It looks like the ship is covered in pollen. No, wait, it's just dust.
        MohoInSpaceLowCanyon* = #CSS_evaReport_MohoInSpaceLowCanyon_00 // You can almost feel the radiation.
        MohoInSpaceLowSouthPole* = #CSS_evaReport_MohoInSpaceLowSouthPole_00 // Surely you're safe from the Kraken here.
        MohoInSpaceHigh* = #CSS_evaReport_MohoInSpaceHigh_00 // Stepping out of the shadow is like walking into a furnace.

        EveSrfLandedPoles* = #CSS_evaReport_EveSrfLandedPoles_00 // Why can't the R&D eggheads invent a suit with movement-assisting servomotors already?
        EveSrfLandedPoles* = #CSS_evaReport_EveSrfLandedPoles_01 // Poles, schmoles, this the planetary oven all right.
        EveSrfLandedMidlands* = #CSS_evaReport_EveSrfLandedMidlands_00 // You should have done more exercise back on Kerbin.
        EveSrfLandedMidlands* = #CSS_evaReport_EveSrfLandedMidlands_01 // "Welcome to hell, weather's great here. Pull up a chair, have a cold beer....."
        EveSrfLandedExplodiumSea* = #CSS_evaReport_EveSrfLandedExplodiumSea_00 // You decide to take a short walk, but think better of it after the first few steps.
        EveSrfLandedLowlands* = #CSS_evaReport_EveSrfLandedLowlands_00 // You wonder what jerk put lead weights in your suit.
        EveSrfLandedLowlands* = #CSS_evaReport_EveSrfLandedLowlands_01 // The toss of a pebble suggests that the atmosphere is REALLY, REALLY thick.
        EveSrfLandedHighlands* = #CSS_evaReport_EveSrfLandedHighlands_00 // You feel like you may have put on some weight.
        EveSrfLandedHighlands* = #CSS_evaReport_EveSrfLandedHighlands_01 // "Should I take the left foot or the right foot?" The decision weighs heavy on your shoulders - literally.
        EveSrfLandedPeaks* = #CSS_evaReport_EveSrfLandedPeaks_00 // "Help! I've fallen and I can't get up!"
        EveSrfLandedPeaks* = #CSS_evaReport_EveSrfLandedPeaks_01 // The steep, gravelly ground makes walking up the slope torturously slow as you slide back constantly.
        EveSrfLandedImpactEjecta* = #CSS_evaReport_EveSrfLandedImpactEjecta_00 // The extreme pressure is making it hard to move. Thankfully, you can still wiggle your toes.
        EveSrfLandedImpactEjecta* = #CSS_evaReport_EveSrfLandedImpactEjecta_01 // You step on a loose stone and fall hard on your face. That hurts here!
        EveSrfLandedCraterLake* = #CSS_evaReport_EveSrfLandedCraterLake_00 // That water nearby would be looking quite inviting were it not for the fact that it is almost certainly not water or healthy for you.
        EveSrfLandedWesternSea* = #CSS_evaReport_EveSrfLandedWesternSea_00 // Everything about this place makes you want to get back into the capsule and lie down.
        EveSrfLandedOlympus* = #CSS_evaReport_EveSrfLandedOlympus_00 // If I have seen further, it is by standing on the shoulders of giants! Or gods.
        EveSrfLandedOlympus* = #CSS_evaReport_EveSrfLandedOlympus_01 // *Huff* Must.... *huff* reach.... *huff* top.... *huff*
        EveSrfLandedEasternSea* = #CSS_evaReport_EveSrfLandedEasternSea_00 // The liquid in the seas has contaminated the soil around here. You know this because your boot has been bleached of colour.
        EveSrfLandedFoothills* = #CSS_evaReport_EveSrfLandedFoothills_00 // This planet was certainly not made with kerbals in mind, and vice versa.
        EveSrfLandedFoothills* = #CSS_evaReport_EveSrfLandedFoothills_01 // You push some dirt into a small pile with your feet. There, a foothill on a foothill!
        EveSrfLandedShallows* = #CSS_evaReport_EveSrfLandedShallows_00 // You've come all this way to Eve's coast, only for your bucket and spade to melt and dissolve instantly.
        EveSrfSplashedPoles* = #CSS_evaReport_EveSrfSplashedPoles_00 // You pour some water from a bottle in your pocket onto the surface, and it forms a steaming sheen on top.
        EveSrfSplashedExplodiumSea* = #CSS_evaReport_EveSrfSplashedExplodiumSea_00 // You realize swimming in a spacesuit is harder than you thought. You regret the decision of leaving the ship.
        EveSrfSplashedExplodiumSea* = #CSS_evaReport_EveSrfSplashedExplodiumSea_01 // The liquid is stripping the colour off your spacesuit alarmingly quickly.
        EveSrfSplashedLowlands* = #CSS_evaReport_EveSrfSplashedLowlands_00 // The sea is hot. Very hot. You want to get out of it now.
        EveSrfSplashedImpactEjecta* = #CSS_evaReport_EveSrfSplashedImpactEjecta_00 // The crater walls curve out of sight around the ocean you find yourself floating in.
        EveSrfSplashedCraterLake* = #CSS_evaReport_EveSrfSplashedCraterLake_00 // You hope dearly that your suit has been properly sealed and corrosion-proofed.
        EveSrfSplashedCraterLake* = #CSS_evaReport_EveSrfSplashedCraterLake_01 // The extremely dense liquid is hard to get your hands and legs into to swim with.
        EveSrfSplashedWesternSea* = #CSS_evaReport_EveSrfSplashedWesternSea_00 // You have the idea to use your suit to dive with. You can only just get your head below the surface, and you can't see anything.
        EveSrfSplashedWesternSea* = #CSS_evaReport_EveSrfSplashedWesternSea_01 // The "water" is thick and soupy. It drips in large blobs off your hand.
        EveSrfSplashedEasternSea* = #CSS_evaReport_EveSrfSplashedEasternSea_00 // Whose idea was it to make these helmets so large? You can't even look down.
        EveSrfSplashedEasternSea* = #CSS_evaReport_EveSrfSplashedEasternSea_01 // You had a dream like this once. Unlike the dream, however, this isn't grape soda, and robot dolphins are not swimming in it.
        EveSrfSplashedShallows* = #CSS_evaReport_EveSrfSplashedShallows_00 // Mission Control assures you that there are definitely no monsters in the sea.
        EveSrfSplashedShallows* = #CSS_evaReport_EveSrfSplashedShallows_01 // You try and light the explodium on fire, forgetting you're currently swimming in it. Fortunately, there's no oxygen to allow it to ignite.
        EveFlyingLowPoles* = #CSS_evaReport_EveFlyingLowPoles_00 // If this place is hell, you feel like an infernal Santa Klaus, flying through the hot polar air.
        EveFlyingLowPoles* = #CSS_evaReport_EveFlyingLowPoles_01 // The temperatures are slightly less burning at these latitudes, and the rushing air makes it slightly cooler still.
        EveFlyingLowMidlands* = #CSS_evaReport_EveFlyingLowMidlands_00 // You wonder, supposing you let go, if the atmosphere is thick enough to allow you to fall gently to the ground like a feather.
        EveFlyingLowMidlands* = #CSS_evaReport_EveFlyingLowMidlands_01 // You'd say it looks boring, but in a place like Eve, nothing is ever boring.
        EveFlyingLowExplodiumSea* = #CSS_evaReport_EveFlyingLowExplodiumSea_00 // You start to think that it's entirely possible to swim in this atmosphere as well as the oceans.
        EveFlyingLowExplodiumSea* = #CSS_evaReport_EveFlyingLowExplodiumSea_01 // The dense not-water probably wouldn't break your fall if you needed it to. Hopefully you won't.
        EveFlyingLowLowlands* = #CSS_evaReport_EveFlyingLowLowlands_00 // The atmosphere is so thick you have a sneaking suspicion it may be made out of some kind of soup. Well, it wouldn't hurt to taste it... right?
        EveFlyingLowLowlands* = #CSS_evaReport_EveFlyingLowLowlands_01 // Flying in the thickest parts of the atmosphere is hard, with the very air opposing your progress.
        EveFlyingLowHighlands* = #CSS_evaReport_EveFlyingLowHighlands_00 // The purple behemoth dares you to slip.
        EveFlyingLowHighlands* = #CSS_evaReport_EveFlyingLowHighlands_01 // The mountains are the surface's way of spitting defiance in the face of the crushing atmosphere and gravity. Be more mountain.
        EveFlyingLowPeaks* = #CSS_evaReport_EveFlyingLowPeaks_00 // "I will not give up, I will not give in! I will land boots down, I will stand again."
        EveFlyingLowPeaks* = #CSS_evaReport_EveFlyingLowPeaks_01 // Spiky peaks rise from the surface, as if trying to snag you in midair.
        EveFlyingLowImpactEjecta* = #CSS_evaReport_EveFlyingLowImpactEjecta_00 // "Nuts."
        EveFlyingLowImpactEjecta* = #CSS_evaReport_EveFlyingLowImpactEjecta_01 // The miles of impact debris must only for a small part of the crater.
        EveFlyingLowCraterLake* = #CSS_evaReport_EveFlyingLowCraterLake_00 // The thick atmosphere makes it difficult to move around. You swear that if not for the high gravity, you could hover a bit just by flapping your arms.
        EveFlyingLowCraterLake* = #CSS_evaReport_EveFlyingLowCraterLake_01 // You wonder how far down the shimmering liquid filling the impact basin goes.
        EveFlyingLowWesternSea* = #CSS_evaReport_EveFlyingLowWesternSea_00 // You're more concerned with the climate control warning light that just appeared.
        EveFlyingLowWesternSea* = #CSS_evaReport_EveFlyingLowWesternSea_01 // You would rather not end up in the drink, thank you very much.
        EveFlyingLowOlympus* = #CSS_evaReport_EveFlyingLowOlympus_00 // You're not sure you needed to be flying for this. You could just have climbed a bit higher up the mountain.
        EveFlyingLowOlympus* = #CSS_evaReport_EveFlyingLowOlympus_01 // The view from the ground was amazing and this one's even better.
        EveFlyingLowEasternSea* = #CSS_evaReport_EveFlyingLowEasternSea_00 // What's that floating down there? It better not be piece of the ship.
        EveFlyingLowEasternSea* = #CSS_evaReport_EveFlyingLowEasternSea_01 // When you were sent to Eve, you didn't anticipate trying not to tumble through the air over a toxic ocean
        EveFlyingLowFoothills* = #CSS_evaReport_EveFlyingLowFoothills_00 // You feel like your helmet is dissolving. Oh wait... IT IS! Get me back in, now!
        EveFlyingLowFoothills* = #CSS_evaReport_EveFlyingLowFoothills_01 // The suit starts to feel awful warm. You crank the suit thermostat down another notch.
        EveFlyingLowShallows* = #CSS_evaReport_EveFlyingLowShallows_00 // The set of tools you had clipped to your belt fall off and plummet out of sight.
        EveFlyingLowShallows* = #CSS_evaReport_EveFlyingLowShallows_01 // You're not sure if you're near or far from the ocean surface. All the purple is playing havoc with your depth perception.
        EveFlyingHigh* = #CSS_evaReport_EveFlyingHigh_00 // You deliberate whether you'd rather fall on the ground or into that nasty liquid.
        EveFlyingHigh* = #CSS_evaReport_EveFlyingHigh_01 // Even all the way up here the atmosphere still buffets you around.
        EveFlyingHigh* = #CSS_evaReport_EveFlyingHigh_02 // You know how dangerous Eve atmospheric entry is, and wish to lodge a formal objection to this highly dangerous course of action.
        EveInSpaceLowPoles* = #CSS_evaReport_EveInSpaceLowPoles_00 // "I left the stove on!"
        EveInSpaceLowPoles* = #CSS_evaReport_EveInSpaceLowPoles_01 // Nope. No ice at these poles. Just more purple water and dust.
        EveInSpaceLowMidlands* = #CSS_evaReport_EveInSpaceLowMidlands_00 // If purple is the color of royalty, Eve is certainly regal!
        EveInSpaceLowMidlands* = #CSS_evaReport_EveInSpaceLowMidlands_01 // Some of the rolling hills are large enough to be picked out from orbit.
        EveInSpaceLowExplodiumSea* = #CSS_evaReport_EveInSpaceLowExplodiumSea_00 // "Come on, cosmos! Do your worst!"
        EveInSpaceLowExplodiumSea* = #CSS_evaReport_EveInSpaceLowExplodiumSea_01 // You wonder if you could light the ocean on fire.
        EveInSpaceLowLowlands* = #CSS_evaReport_EveInSpaceLowLowlands_00 // The Lowlands are the closest thing Eve has to some coastal plains.
        EveInSpaceLowLowlands* = #CSS_evaReport_EveInSpaceLowLowlands_01 // Most low-altitude areas are on the east and western shores of the primary ocean.
        EveInSpaceLowHighlands* = #CSS_evaReport_EveInSpaceLowHighlands_00 // You wonder if you will ever be returning home. Probably not.
        EveInSpaceLowHighlands* = #CSS_evaReport_EveInSpaceLowHighlands_01 // Most of Eve's land surface is covered in these low hills.
        EveInSpaceLowPeaks* = #CSS_evaReport_EveInSpaceLowPeaks_00 // These are some proper mountains. You feel proud of them.
        EveInSpaceLowPeaks* = #CSS_evaReport_EveInSpaceLowPeaks_01 // Can we please not land on those big, spiky mountains?
        EveInSpaceLowImpactEjecta* = #CSS_evaReport_EveInSpaceLowImpactEjecta_00 // "It has been an honor."
        EveInSpaceLowImpactEjecta* = #CSS_evaReport_EveInSpaceLowImpactEjecta_01 // You trace the outlines of the craters' ejecta systems to take your mind off the landing.
        EveInSpaceLowCraterLake* = #CSS_evaReport_EveInSpaceLowCraterLake_00 // The Crater is double the size of Kerbin's biggest. Everything is bigger on Eve, even the cosmic gunshot scars.
        EveInSpaceLowCraterLake* = #CSS_evaReport_EveInSpaceLowCraterLake_01 // The rebound peak in the middle of the lake that fills the basin makes a prominent island in the centre.
        EveInSpaceLowWesternSea* = #CSS_evaReport_EveInSpaceLowWesternSea_00 // A thin, elongated, scraggly inland sea carving a slash through the landmass.
        EveInSpaceLowWesternSea* = #CSS_evaReport_EveInSpaceLowWesternSea_01 // It doesn't look very impressive, but no doubt it seems much bigger from downstairs.
        EveInSpaceLowOlympus* = #CSS_evaReport_EveInSpaceLowOlympus_00 // The highest peaks on Eve. You're torn between thinking they would make a good landing site for their altitude, or bad for their spikiness.
        EveInSpaceLowOlympus* = #CSS_evaReport_EveInSpaceLowOlympus_01 // You feel like a god, looking down on your domain from the heavens.
        EveInSpaceLowEasternSea* = #CSS_evaReport_EveInSpaceLowEasternSea_00 // If you squint, it looks like a stretched trilobite. That's just me, isn't it?
        EveInSpaceLowEasternSea* = #CSS_evaReport_EveInSpaceLowEasternSea_01 // The ocean sparkles and shines as light dapples off the water.
        EveInSpaceLowFoothills* = #CSS_evaReport_EveInSpaceLowFoothills_00 // Lumpy land ahoy! Such pretender mountains.
        EveInSpaceLowFoothills* = #CSS_evaReport_EveInSpaceLowFoothills_01 // A burst of noise over comms breaks your concentration and makes you forget the notes you were making.
        EveInSpaceLowShallows* = #CSS_evaReport_EveInSpaceLowShallows_00 // Those oceans look flammable. You'd like to see the explosion if you dropped a match in.
        EveInSpaceLowShallows* = #CSS_evaReport_EveInSpaceLowShallows_01 // Those shapes under the surface must be giant sea monsters. Mission Control gives their end of the radio a dope-slap.
        EveInSpaceHigh* = #CSS_evaReport_EveInSpaceHigh_00 // From this position you can clearly make out lakes and oceans of some kind on the surface below.
        EveInSpaceHigh* = #CSS_evaReport_EveInSpaceHigh_01 // Eve looks almost inviting from up here. You, however, know better than to listen to its siren call.
        EveInSpaceHigh* = #CSS_evaReport_EveInSpaceHigh_02 // A vivid green aurora blossoms over Eve's poles. Eve can be beautiful when it wants to be.

        GillySrfLandedMidlands* = #CSS_evaReport_GillySrfLandedMidlands_00 // You become concerned that the rock you threw away may loop all the way around Gilly and hit you in the back of your head.
        GillySrfLandedMidlands* = #CSS_evaReport_GillySrfLandedMidlands_01 // You try to walk, but instead go several meters into the air. It takes minutes before you float back down.
        GillySrfLandedMidlands* = #CSS_evaReport_GillySrfLandedMidlands_02 // The seemingly conflictory orientations of things confuse you, and you fall over in very slow motion.
        GillySrfLandedMidlands* = #CSS_evaReport_GillySrfLandedMidlands_03 // If that was 'one small step', you don't want to imagine how big a 'giant leap' would be in this gravity.
        GillySrfLandedMidlands* = #CSS_evaReport_GillySrfLandedMidlands_04 // You balance yourself on your pinky finger and start doing push-ups, only to find yourself slowly floating away.
        GillySrfLandedLowlands* = #CSS_evaReport_GillySrfLandedLowlands_01 // Walk very slowly... Oh no! You tripped.
        GillySrfLandedLowlands* = #CSS_evaReport_GillySrfLandedLowlands_02 // It takes a while to get used to the idea of kilometer-long jumps.
        GillySrfLandedLowlands* = #CSS_evaReport_GillySrfLandedLowlands_03 // Using your RCS systems for balance, you manage to walk along the surface using only two fingers.
        GillySrfLandedLowlands* = #CSS_evaReport_GillySrfLandedLowlands_04 // We could really use some anchors here.
        GillySrfLandedHighlands* = #CSS_evaReport_GillySrfLandedHighlands_00 // If only the launchpad had been here instead of KSC, this whole space thing would've been so much easier. You make a note to berate the administrators back home over their poor choice.
        GillySrfLandedHighlands* = #CSS_evaReport_GillySrfLandedHighlands_01 // One small step for Kerbal, one giant leap for WHAAAAA!
        GillySrfLandedHighlands* = #CSS_evaReport_GillySrfLandedHighlands_02 // That rock you threw is still going...
        GillySrfLandedHighlands* = #CSS_evaReport_GillySrfLandedHighlands_03 // You make a mental note of how light you feel and then deduce that it may be best to keep both feet on the surface.
        GillySrfLandedHighlands* = #CSS_evaReport_GillySrfLandedHighlands_04 // You probably shouldn't jump. You might not come back down.
        GillyInSpaceLowMidlands* = #CSS_evaReport_GillyInSpaceLowMidlands_00 // No gravity? No problem!
        GillyInSpaceLowMidlands* = #CSS_evaReport_GillyInSpaceLowMidlands_01 // It's easy to fly away from things, but just as easy to jet back over.
        GillyInSpaceLowMidlands* = #CSS_evaReport_GillyInSpaceLowMidlands_02 // You ask Mission Control if you could pleeeeease be allowed to jetpack between the surface and orbit?
        GillyInSpaceLowLowlands* = #CSS_evaReport_GillyInSpaceLowLowlands_00 // You think you can jet-pack into orbit ten times over.
        GillyInSpaceLowHighlands* = #CSS_evaReport_GillyInSpaceLowHighlands_00 // You wonder how awesome it would be to make a jump with a rover from the hills here.
        GillyInSpaceLowHighlands* = #CSS_evaReport_GillyInSpaceLowHighlands_01 // You try to touch a passing peak. Mission Control tells you to go back into your capsule and raise your damn orbit.
        GillyInSpaceHigh* = #CSS_evaReport_GillyInSpaceHigh_00 // Looking down, you see the two moons of Eve. As you are about to record the new satellite, you realize that one of the two is, in fact, a speck of dust.
        GillyInSpaceHigh* = #CSS_evaReport_GillyInSpaceHigh_01 // "Wait... there's a planet below me? Does it even have gravity?"
        GillyInSpaceHigh* = #CSS_evaReport_GillyInSpaceHigh_02 // The terrain grades in colour between tan and light brown.

        KerbinSrfLandedKSC* = #CSS_evaReport_KerbinSrfLandedKSC_00 // Truly a very tiny step for Kerbalkind.
        KerbinSrfLandedKSC* = #CSS_evaReport_KerbinSrfLandedKSC_01 // You wonder if you can get back in a t-shirt and shorts.
        KerbinSrfLandedKSC* = #CSS_evaReport_KerbinSrfLandedKSC_02 // You wave at mission control, they tell you to get back to work.
        KerbinSrfLandedKSC* = #CSS_evaReport_KerbinSrfLandedKSC_03 // Mission Control would like to remind you that while the suit is not, in fact, designed for jogging around on Kerbin, there are several more appropriate suits inside.
        KerbinSrfLandedKSC* = #CSS_evaReport_KerbinSrfLandedKSC_04 // The surface here is made of concrete. Very interesting...
        KerbinSrfLandedKSC* = #CSS_evaReport_KerbinSrfLandedKSC_05 // If a spacesuit was really necessary to get here, I will eat my helmet!
        KerbinSrfLandedAdministration* = #CSS_evaReport_KerbinSrfLandedAdministration_00 // KSC tour stop number 1 of 31: Welcome to Administration.
        KerbinSrfLandedAdministration* = #CSS_evaReport_KerbinSrfLandedAdministration_01 // You wonder what the briefing will be about.
        KerbinSrfLandedAstronautComplex* = #CSS_evaReport_KerbinSrfLandedAstronautComplex_00 // KSC tour stop number 2 of 31: Welcome to the Astronaut Complex.
        KerbinSrfLandedBaikerbanur* = #CSS_evaReport_KerbinSrfLandedBaikerbanur_00 // As you walk, you jot down the things that need restoration work. You run out of space on the notepad.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_evaReport_KerbinSrfLandedBaikerbanurLaunchpad_00 // You wonder how they ever got to space with technology so much older and more primitive than your already questionable set.
        KerbinSrfLandedCrawlerway* = #CSS_evaReport_KerbinSrfLandedCrawlerway_00 // KSC tour stop number 3 of 31: Welcome to the Crawlerway.
        KerbinSrfLandedCrawlerway* = #CSS_evaReport_KerbinSrfLandedCrawlerway_01 // You wonder if you can re-purpose the Crawlerway and the Launchpad as a horizontal launcher with a ramp. What could go wrong?
        KerbinSrfLandedCrawlerway* = #CSS_evaReport_KerbinSrfLandedCrawlerway_02 // You imagine being the driver of the crawler. It must be the second best job on Kerbin.
        KerbinSrfLandedFlagPole* = #CSS_evaReport_KerbinSrfLandedFlagPole_00 // KSC tour stop number 4 of 31: Welcome to the Flag Pole.
        KerbinSrfLandedFlagPole* = #CSS_evaReport_KerbinSrfLandedFlagPole_01 // You stumble as you try to get to the base of the pole.
        KerbinSrfLandedFlagPole* = #CSS_evaReport_KerbinSrfLandedFlagPole_02 // You put on a red cap and try to make a handstand on the poles top.
        KerbinSrfLandedLaunchPad* = #CSS_evaReport_KerbinSrfLandedLaunchPad_00 // KSC tour stop number 5 of 31: Welcome to the Launch Pad.
        KerbinSrfLandedLaunchPad* = #CSS_evaReport_KerbinSrfLandedLaunchPad_01 // You love the smell of rocket fuel in the morning.
        KerbinSrfLandedLaunchPad* = #CSS_evaReport_KerbinSrfLandedLaunchPad_02 // You suspect that you'd better move if you don't want to be fried during a rocket launch.
        KerbinSrfLandedLaunchPad* = #CSS_evaReport_KerbinSrfLandedLaunchPad_03 // You are eager to keep things up and running.
        KerbinSrfLandedLaunchPad* = #CSS_evaReport_KerbinSrfLandedLaunchPad_04 // You feel compelled to stare at the sky.
        KerbinSrfLandedLaunchPad* = #CSS_evaReport_KerbinSrfLandedLaunchPad_05 // We don't seem to have gone very far... yet.
        KerbinSrfLandedMissionControl* = #CSS_evaReport_KerbinSrfLandedMissionControl_00 // KSC tour stop number 6 of 31: Welcome to Mission Control.
        KerbinSrfLandedMissionControl* = #CSS_evaReport_KerbinSrfLandedMissionControl_01 // You hear Gene Kerman barking "FAILURE is NOT an OPTION!"
        KerbinSrfLandedMissionControl* = #CSS_evaReport_KerbinSrfLandedMissionControl_02 // You join Walt Kerman in cleaning up the Visitors Lounge for the next launch.
        KerbinSrfLandedMissionControl* = #CSS_evaReport_KerbinSrfLandedMissionControl_03 // You join Walt Kerman in cleaning up the Visitors Lounge from the latest launch mishap.
        KerbinSrfLandedR&D* = #CSS_evaReport_KerbinSrfLandedR&D_00 // KSC tour stop number 23 of 31: Welcome to R&D.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_evaReport_KerbinSrfLandedR&DCentralBuilding_00 // KSC tour stop number 24 of 31: Welcome to the R&D Central Building.
        KerbinSrfLandedR&DCornerLab* = #CSS_evaReport_KerbinSrfLandedR&DCornerLab_00 // KSC tour stop number 25 of 31: Welcome to the R&D Corner Lab.
        KerbinSrfLandedR&DMainBuilding* = #CSS_evaReport_KerbinSrfLandedR&DMainBuilding_00 // KSC tour stop number 26 of 31: Welcome to the R&D Main Building.
        KerbinSrfLandedR&DObservatory* = #CSS_evaReport_KerbinSrfLandedR&DObservatory_00 // KSC tour stop number 27 of 31: Welcome to the R&D Observatory.
        KerbinSrfLandedR&DSideLab* = #CSS_evaReport_KerbinSrfLandedR&DSideLab_00 // KSC tour stop number 28 of 31: Welcome to the R&D Side Lab.
        KerbinSrfLandedR&DSmallLab* = #CSS_evaReport_KerbinSrfLandedR&DSmallLab_00 // KSC tour stop number 29 of 31: Welcome to the R&D Small Lab.
        KerbinSrfLandedR&DTanks* = #CSS_evaReport_KerbinSrfLandedR&DTanks_00 // KSC tour stop number 30 of 31: Welcome to the R&D Tanks.
        KerbinSrfLandedR&DWindTunnel* = #CSS_evaReport_KerbinSrfLandedR&DWindTunnel_00 // KSC tour stop number 31 of 31: Welcome to the R&D Wind Tunnel. You made it to the last stop! Congratulations!
        KerbinSrfLandedRunway* = #CSS_evaReport_KerbinSrfLandedRunway_00 // Ah, the smell of asphalt.
        KerbinSrfLandedRunway* = #CSS_evaReport_KerbinSrfLandedRunway_01 // KSC tour stop number 7 of 31: Welcome to the Runway.
        KerbinSrfLandedSPH* = #CSS_evaReport_KerbinSrfLandedSPH_00 // KSC tour stop number 8 of 31: Welcome to the SPH.
        KerbinSrfLandedSPHMainBuilding* = #CSS_evaReport_KerbinSrfLandedSPHMainBuilding_00 // KSC tour stop number 9 of 31: Welcome to the SPH Main Building.
        KerbinSrfLandedSPHRoundTank* = #CSS_evaReport_KerbinSrfLandedSPHRoundTank_00 // KSC tour stop number 10 of 31: Welcome to the SPH Round Tank.
        KerbinSrfLandedSPHTanks* = #CSS_evaReport_KerbinSrfLandedSPHTanks_00 // KSC tour stop number 11 of 31: Welcome to the SPH Tanks.
        KerbinSrfLandedSPHWaterTower* = #CSS_evaReport_KerbinSrfLandedSPHWaterTower_00 // KSC tour stop number 12 of 31: Welcome to the SPH Water Tower.
        KerbinSrfLandedTrackingStation* = #CSS_evaReport_KerbinSrfLandedTrackingStation_00 // KSC tour stop number 13 of 31: Welcome to the Tracking Station.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_evaReport_KerbinSrfLandedTrackingStationDishEast_00 // KSC tour stop number 14 of 31: Welcome to the Tracking Stations East Dish.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_evaReport_KerbinSrfLandedTrackingStationDishNorth_00 // KSC tour stop number 15 of 31: Welcome to the Tracking Stations North Dish.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_evaReport_KerbinSrfLandedTrackingStationDishSouth_00 // KSC tour stop number 16 of 31: Welcome to the Tracking Stations South Dish.
        KerbinSrfLandedTrackingStationHub* = #CSS_evaReport_KerbinSrfLandedTrackingStationHub_00 // KSC tour stop number 17 of 31: Welcome to the Tracking Station Hub.
        KerbinSrfLandedVAB* = #CSS_evaReport_KerbinSrfLandedVAB_00 // KSC tour stop number 18 of 31: Welcome to the VAB. Somehow I think we have been here before.
        KerbinSrfLandedVABMainBuilding* = #CSS_evaReport_KerbinSrfLandedVABMainBuilding_00 // KSC tour stop number 19 of 31: Welcome to the VAB Main Building.
        KerbinSrfLandedVABPodMemorial* = #CSS_evaReport_KerbinSrfLandedVABPodMemorial_00 // KSC tour stop number 20 of 31: Welcome to the VAB Pod Memorial.
        KerbinSrfLandedVABRoundTank* = #CSS_evaReport_KerbinSrfLandedVABRoundTank_00 // KSC tour stop number 21 of 31: Welcome to the VAB Round Tank.
        KerbinSrfLandedVABSouthComplex* = #CSS_evaReport_KerbinSrfLandedVABSouthComplex_00 // You scratch at the layer of dust that has built up on the building, added to by every failed launch's smoke cloud.
        KerbinSrfLandedVABTanks* = #CSS_evaReport_KerbinSrfLandedVABTanks_00 // KSC tour stop number 22 of 31: Welcome to the VAB Tanks.
        KerbinSrfLandedIslandAirfield* = #CSS_evaReport_KerbinSrfLandedIslandAirfield_00 // The surface is uneven and full of concrete chunks. You watch your step, lest you bite the dust.
        KerbinSrfLandedWoomerang* = #CSS_evaReport_KerbinSrfLandedWoomerang_00 // You wander around the steel frame, and see all there is to see.
        KerbinFlyingLowKSC* = #CSS_evaReport_KerbinFlyingLowKSC_00 // You are really just showboating for the guys at KSC, but isn't that what huge rockets are for??
        KerbinFlyingHighKSC* = #CSS_evaReport_KerbinFlyingHighKSC_00 // You wonder if the guys back at KSC can see you out the window, and not just on their comms display. You wave just in case.

        KerbinSrfLanded* = #CSS_evaReport_KerbinSrfLanded_00 // Finally. Time to stretch your legs!
        KerbinSrfLanded* = #CSS_evaReport_KerbinSrfLanded_01 // I wish I had brought pants.
        KerbinSrfLanded* = #CSS_evaReport_KerbinSrfLanded_02 // It seems we are on our home planet.
        KerbinSrfLandedWater* = #CSS_evaReport_KerbinSrfLandedWater_00 // You think you see a shark swimming in the water nearby. Wait, no, that's just a landing leg.
        KerbinSrfLandedWater* = #CSS_evaReport_KerbinSrfLandedWater_01 // You consider taking your helmet off to smell the fresh ocean breeze, but the frantic yelling over the comms from KSC convinces you otherwise.
        KerbinSrfLandedWater* = #CSS_evaReport_KerbinSrfLandedWater_02 // You wonder if a shark can bite through your spacesuit. You try it yourself and fail. You hope that shark teeth aren't any sharper than yours.
        KerbinSrfLandedGrasslands* = #CSS_evaReport_KerbinSrfLandedGrasslands_00 // As you go trudging through the grass you hope you don't step on a cow-patty. The spaceship will stink for the rest of the trip.
        KerbinSrfLandedGrasslands* = #CSS_evaReport_KerbinSrfLandedGrasslands_01 // You free your potted plant and hope it does well in the wild.
        KerbinSrfLandedGrasslands* = #CSS_evaReport_KerbinSrfLandedGrasslands_02 // You want to take your helmet off, and breathe the sweet air of your home planet.
        KerbinSrfLandedHighlands* = #CSS_evaReport_KerbinSrfLandedHighlands_00 // You catch yourself as you nearly step into a 100 meter crevasse and slide down a massive glacier. No wonder they call this the Highlands.
        KerbinSrfLandedHighlands* = #CSS_evaReport_KerbinSrfLandedHighlands_01 // The hills are steep and the weather is miserable. No wonder people from the Highlands are always so cranky.
        KerbinSrfLandedShores* = #CSS_evaReport_KerbinSrfLandedShores_00 // You take some sand from the desert and compare it with beach sand. They're actually fairly different!
        KerbinSrfLandedShores* = #CSS_evaReport_KerbinSrfLandedShores_01 // A Girlbal approaches you with a problem. It seems she has too many seashells. You try to tell her that she should sell seashells on the sea shore but find it difficult to finish your sentence.
        KerbinSrfLandedShores* = #CSS_evaReport_KerbinSrfLandedShores_02 // The wet consistency of beach sand makes excellent building material and you immediately set about building a small shrine to your glory.
        KerbinSrfLandedMountains* = #CSS_evaReport_KerbinSrfLandedMountains_00 // You slowly inch your way away from the spacecraft, just to tell KSC you did, hoping that you don't get blown off the mountaintop by the winds.
        KerbinSrfLandedMountains* = #CSS_evaReport_KerbinSrfLandedMountains_01 // A little bit closer and you'll either be the first Kerbal on Mt. Keverest or a green stain on the side of the mountain.
        KerbinSrfLandedMountains* = #CSS_evaReport_KerbinSrfLandedMountains_02 // You look around at the mountains around you, taking everything in. You suddenly think to yourself, "What am I still doing here, space is up there, and it's so close!"
        KerbinSrfLandedDeserts* = #CSS_evaReport_KerbinSrfLandedDeserts_00 // It is so hot here that your feet are burning even through the spacesuit.
        KerbinSrfLandedDeserts* = #CSS_evaReport_KerbinSrfLandedDeserts_01 // You pour your juice onto a small cactus. You decide to call it Mr. Prick and hope it grows up to be a beautiful palm tree. That's how it works, right?
        KerbinSrfLandedBadlands* = #CSS_evaReport_KerbinSrfLandedBadlands_00 // Your thoughts turn to running back to the capsule and hiding from whatever might live in the Badlands.
        KerbinSrfLandedBadlands* = #CSS_evaReport_KerbinSrfLandedBadlands_01 // You place some snacks on a makeshift altar. You hope that your offering pleases the denizens of the Badlands.
        KerbinSrfLandedBadlands* = #CSS_evaReport_KerbinSrfLandedBadlands_02 // Badlands, Shmadlands. It takes more than a bad name to scare this kerbonaut!
        KerbinSrfLandedTundra* = #CSS_evaReport_KerbinSrfLandedTundra_00 // You wander around sort of hoping you could find a moose to ride on.
        KerbinSrfLandedTundra* = #CSS_evaReport_KerbinSrfLandedTundra_01 // You wander around the stunted trees noting that you are FINALLY taller than something.
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedIceCaps_00 // The ice crystals spider across the visor of your spacesuit. You hope that the suit was made with more care than the parts that went into your rocket.
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedIceCaps_01 // You eagerly place a magnet on the ground. Nothing observable happens and you walk away disappointed.
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedIceCaps_02 // You remembered an old tale of explorers who froze to death here and hope you don't end up the same way.
        KerbinSrfLandedNorthernIceShelf* = #CSS_evaReport_KerbinSrfLandedNorthernIceShelf_00 // Light from the ship and sky gleams off the shining white ground.
        KerbinSrfLandedNorthernIceShelf* = #CSS_evaReport_KerbinSrfLandedNorthernIceShelf_01 // The ground is white. The sky is white. Even the notepad paper is white.
        KerbinSrfLandedSouthernIceShelf* = #CSS_evaReport_KerbinSrfLandedSouthernIceShelf_00 // You're so close to the pole you could swear the compass needle changes orientation with every step.
        KerbinSrfLandedSouthernIceShelf* = #CSS_evaReport_KerbinSrfLandedSouthernIceShelf_01 // The ice here isn't snow, and what little loose stuff there is is no good for making snowballs.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_00 // Jeb... is that you biting my leg?
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_01 // Hey look, water!
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_02 // This is not the same thing as the blue stuff above us.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_03 // This suit was obviously not intended for scuba diving.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_04 // You see a fish swimming in front of your helmet and you start asking yourself: "What would happen if my suit wasn't waterproof?"
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_05 // Another water landing. You feel fortunate that the EVA suits double as emergency flotation devices.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_06 // You feel very floaty...
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_07 // Good thing these spacesuits act like flotation devices.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_08 // It's like training in the pool.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_09 // As the water rushes to your face, you begin to thrash and wail and gasp, and then remember your suit is airtight.
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_10 // What are those creatures circling below?
        KerbinSrfSplashed* = #CSS_evaReport_KerbinSrfSplashed_11 // Now I really wish I knew how to swim!
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_00 // You hope they made this spacesuit waterproof as well as space-proof.
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_01 // You calculate the number of snacks you should bring to be able to swim to KSP.
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_02 // Oh look a fishy! Then you remember what happened to your last goldfish and decide to let this one go.
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_03 // You have trouble swimming because your helmet is more buoyant than the rest of your spacesuit.
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_04 // Is that a shark over there?
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_05 // Something nibbles on your foot.
        KerbinSrfSplashedWater* = #CSS_evaReport_KerbinSrfSplashedWater_06 // Help! Help! Where's a lifeguard when you need them?
        KerbinSrfSplashedGrasslands* = #CSS_evaReport_KerbinSrfSplashedGrasslands_00 // You peer down into the murky water. What could be lurking down there?
        KerbinSrfSplashedShores* = #CSS_evaReport_KerbinSrfSplashedShores_00 // You look at the inviting waves and realize that you forgot your swimsuit!
        KerbinSrfSplashedShores* = #CSS_evaReport_KerbinSrfSplashedShores_01 // Ew! Something just touched your foot. Oh wait, it's just seaweed.
        KerbinSrfSplashedDeserts* = #CSS_evaReport_KerbinSrfSplashedDeserts_00 // It's not a mirage! There's actally water under you for once!
        KerbinSrfSplashedBadlands* = #CSS_evaReport_KerbinSrfSplashedBadlands_00 // You can feel the heat of the water through your suit. You don't really want to swim for much longer.
        KerbinSrfSplashedTundra* = #CSS_evaReport_KerbinSrfSplashedTundra_00 // The cold from the water starts to seep into your suit. It's not pleasant.
        KerbinSrfSplashedIceCaps* = #CSS_evaReport_KerbinSrfSplashedIceCaps_00 // The freezing cold of the water seeps right into your bones almost immediately.
        KerbinSrfSplashedNorthernIceShelf* = #CSS_evaReport_KerbinSrfSplashedNorthernIceShelf_00 // You keep watch for the nearby icebergs to make sure none of them run you over as you swim.
        KerbinSrfSplashedSouthernIceShelf* = #CSS_evaReport_KerbinSrfSplashedSouthernIceShelf_00 // An iridescent sheen of ice forms on your helmet visor as water splashes freeze.
        KerbinFlyingLow* = #CSS_evaReport_KerbinFlyingLow_00 // I'm free! Free falling.
        KerbinFlyingLow* = #CSS_evaReport_KerbinFlyingLow_01 // Get back in! Quick!
        KerbinFlyingLow* = #CSS_evaReport_KerbinFlyingLow_02 // This isn't that high up after all...
        KerbinFlyingLow* = #CSS_evaReport_KerbinFlyingLow_03 // I wonder if I can buzz the tower while hanging off the side of the cockpit...
        KerbinFlyingLowWater* = #CSS_evaReport_KerbinFlyingLowWater_00 // You hope that sharks can't jump this high.
        KerbinFlyingLowWater* = #CSS_evaReport_KerbinFlyingLowWater_01 // You are so close to the waves that you can almost touch them. KSC recommends against this, though.
        KerbinFlyingLowWater* = #CSS_evaReport_KerbinFlyingLowWater_02 // You wonder if you can skip yourself like a rock if you end up falling off.
        KerbinFlyingLowGrasslands* = #CSS_evaReport_KerbinFlyingLowGrasslands_00 // Mission Control assures you, "don't panic."
        KerbinFlyingLowGrasslands* = #CSS_evaReport_KerbinFlyingLowGrasslands_01 // Oh dear.
        KerbinFlyingLowGrasslands* = #CSS_evaReport_KerbinFlyingLowGrasslands_02 // "Why did I go outside? I really want to get back into the capsule!"
        KerbinFlyingLowGrasslands* = #CSS_evaReport_KerbinFlyingLowGrasslands_03 // You suddenly realize that your space suit doesn't include a parachute.
        KerbinFlyingLowHighlands* = #CSS_evaReport_KerbinFlyingLowHighlands_00 // Yep, those are the Highlands. Can I go back in now?
        KerbinFlyingLowHighlands* = #CSS_evaReport_KerbinFlyingLowHighlands_01 // You are afraid that your helmet will hit the peak of one of the mountains as you fly by. Who thought an EVA was a good idea here, anyway?
        KerbinFlyingLowHighlands* = #CSS_evaReport_KerbinFlyingLowHighlands_02 // You're pretty sure you can reach out and grab a surface sample from the top of one of these hills.
        KerbinFlyingLowShores* = #CSS_evaReport_KerbinFlyingLowShores_00 // You hang on to the craft one-handed as you use your other hand to fight off a particularly persistent seagull.
        KerbinFlyingLowShores* = #CSS_evaReport_KerbinFlyingLowShores_01 // You wave at all the Kerbals on the beach below. Surely this will make the news reports.
        KerbinFlyingLowShores* = #CSS_evaReport_KerbinFlyingLowShores_02 // Flying this close to the ground is definitely not over-rated!
        KerbinFlyingLowMountains* = #CSS_evaReport_KerbinFlyingLowMountains_00 // Uhhhh...It's cold, windy, and we're really close to a mountain. Why are we doing this EVA again?
        KerbinFlyingLowMountains* = #CSS_evaReport_KerbinFlyingLowMountains_01 // It could be worse. You could be doing this over an active volcano.
        KerbinFlyingLowMountains* = #CSS_evaReport_KerbinFlyingLowMountains_02 // The ground is looking awful close. Did you pack a parachute?
        KerbinFlyingLowDeserts* = #CSS_evaReport_KerbinFlyingLowDeserts_00 // You can see the cactus and scrub brush clearly from here. Too clearly for comfort.
        KerbinFlyingLowDeserts* = #CSS_evaReport_KerbinFlyingLowDeserts_01 // The air is dusty and dry. Each breath leaves you wanting.
        KerbinFlyingLowBadlands* = #CSS_evaReport_KerbinFlyingLowBadlands_00 // Mission Control assures you reckless displays of bravery are well-received in the Badlands.
        KerbinFlyingLowBadlands* = #CSS_evaReport_KerbinFlyingLowBadlands_01 // As you hang on for dear life, you start to question your career choice.
        KerbinFlyingLowBadlands* = #CSS_evaReport_KerbinFlyingLowBadlands_02 // Are you really sure now is a good time?
        KerbinFlyingLowTundra* = #CSS_evaReport_KerbinFlyingLowTundra_00 // Dude, seriously. You know what happens when we try to EVA here. It never ends well.
        KerbinFlyingLowTundra* = #CSS_evaReport_KerbinFlyingLowTundra_01 // Those snowdrifts look soft enough to catch you safely. You still don't want to try though.
        KerbinFlyingLowTundra* = #CSS_evaReport_KerbinFlyingLowTundra_02 // Your spacesuit keeps you warm even as the brutal winds of the Tundra buffet you outside your craft.
        KerbinFlyingLowIceCaps* = #CSS_evaReport_KerbinFlyingLowIceCaps_00 // You know there is a joke some where in here about an ice hole, but you can't think of it. Must be snack time!
        KerbinFlyingLowIceCaps* = #CSS_evaReport_KerbinFlyingLowIceCaps_01 // If you fall, would you break through the ice? Probably best not to try.
        KerbinFlyingLowNorthernIceShelf* = #CSS_evaReport_KerbinFlyingLowNorthernIceShelf_00 // Even from this vantage point you can't see anything over the horizon.
        KerbinFlyingLowNorthernIceShelf* = #CSS_evaReport_KerbinFlyingLowNorthernIceShelf_01 // The solid white, flat surface makes it difficult to judge altitude. Don't think about the prospect you could be dangerously low.
        KerbinFlyingLowSouthernIceShelf* = #CSS_evaReport_KerbinFlyingLowSouthernIceShelf_00 // The rushing air somehow makes it even colder. Can we get back in now?
        KerbinFlyingLowSouthernIceShelf* = #CSS_evaReport_KerbinFlyingLowSouthernIceShelf_01 // Looking down at the flat ice you can't tell how fast you're moving, or even if you're moving at all. It's unnerving.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_00 // You might be OK for a few minutes.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_01 // The clouds look so pretty from up here.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_02 // Did you remember to pack a parachute?
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_03 // Can I go back in now? Please?
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_04 // Uh, why did we think this EVA was a good idea, again?
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_05 // More like EXTREME Vehicular Activity, am I right?
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_06 // You imagine yourself as an intrepid explorer, daring to push back the boundaries of the unknown...then you look out the window and see your mother. (Sigh) Hi mom.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_07 // The wind blowing through the vast hills and valleys of grass reminds you of waves on the surface of the ocean.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_08 // Great swaths of brown and tan stretch out before you. You wonder how anything can live in such a dry environment. Including you as you hurtle through the atmosphere.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_09 // You begin to have an appreciation for the saying 'as right as rain'.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_10 // You hold on for dear life as you hurtle through the atmosphere above some of Kerbin's highest mountains. Too much adrenaline.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_11 // Why? Just why? Of all the places to do an EVA why did we have to choose here?
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_12 // Nothing but ice as far as the eye can see...you really want to go back in now.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_13 // Is it just you or do those mountaintops seem...sharp? You want to go back inside now.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_14 // You are now too high to worry about seagulls and can devote all your to attention to hanging on for dear life.
        KerbinFlyingHigh* = #CSS_evaReport_KerbinFlyingHigh_15 // Kinda cold and windy out here. Not at all like being on the surface at the shores. You wish you hadn't smeared sunscreen all over your EVA suit now.
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_00 // You've successfully played hide and seek with Mission Control. Crap.
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_01 // Oh my gosh, oh my gosh, oh my gosh! I'M IN SPACE!
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_02 // "Why isn't there any noise? Is something wrong with my spacesuit?"
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_03 // WHEEEEEEE!
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_04 // Mom calls, wondering where you are and when you'll be home for dinner.
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_05 // You wonder why you left your hot dog at Mission Control.
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_06 // I wonder how the lights turn on and off?
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_07 // You think you see a something moving on the Mun's surface. You are officially terrified.
        KerbinInSpaceLow* = #CSS_evaReport_KerbinInSpaceLow_08 // This never gets old. It kinda makes you want to... break into song.
        KerbinInSpaceLowWater* = #CSS_evaReport_KerbinInSpaceLowWater_00 // You are reminded of the myriad sailors who have been adrift in the ocean below. And here you are, the first one adrift in space.
        KerbinInSpaceLowWater* = #CSS_evaReport_KerbinInSpaceLowWater_01 // Why are krakens such a popular topic back at KSC? Don't they live down there in the water?
        KerbinInSpaceLowWater* = #CSS_evaReport_KerbinInSpaceLowWater_02 // Planet Kerbin is blue, and there's nothing you can do.
        KerbinInSpaceLowGrasslands* = #CSS_evaReport_KerbinInSpaceLowGrasslands_00 // The hills and valleys of the grasslands seem even closer looking through a spacesuit visor. You begin to long for home. And snacks. Need more snacks.
        KerbinInSpaceLowGrasslands* = #CSS_evaReport_KerbinInSpaceLowGrasslands_01 // If you squint really hard you can see some of the scattered debris from your discarded booster stages.
        KerbinInSpaceLowGrasslands* = #CSS_evaReport_KerbinInSpaceLowGrasslands_02 // It's so big. You wonder if you can see your house from here. Probably not.
        KerbinInSpaceLowHighlands* = #CSS_evaReport_KerbinInSpaceLowHighlands_00 // Yup, that's a mountain down there. What's of greater concern is the mountain of snacks that need to be eaten *nom, nom, nom*.
        KerbinInSpaceLowHighlands* = #CSS_evaReport_KerbinInSpaceLowHighlands_01 // The Highlands are baby mountains. You wonder if you'll ever get to see them grow up.
        KerbinInSpaceLowHighlands* = #CSS_evaReport_KerbinInSpaceLowHighlands_02 // You realize you forgot to eat lunch, and hunt in the cupboards for a snack.
        KerbinInSpaceLowShores* = #CSS_evaReport_KerbinInSpaceLowShores_00 // You chuckle at the idea that you are blocking someone's sunlight as they try to tan themselves on the beach below.
        KerbinInSpaceLowShores* = #CSS_evaReport_KerbinInSpaceLowShores_01 // You are mesmerized by the glint of the sunshine off the waves below as you stare through the thin visor of your helmet.
        KerbinInSpaceLowMountains* = #CSS_evaReport_KerbinInSpaceLowMountains_00 // You feel like you are in a dream just floating above the mountains below. Hey, you ARE floating above the mountains below!
        KerbinInSpaceLowMountains* = #CSS_evaReport_KerbinInSpaceLowMountains_01 // As you float outside your craft, you decide to count mountaintops to help pass the time.
        KerbinInSpaceLowMountains* = #CSS_evaReport_KerbinInSpaceLowMountains_02 // The craggy mountains below look even closer now that there is no spaceship between you and them.
        KerbinInSpaceLowDeserts* = #CSS_evaReport_KerbinInSpaceLowDeserts_00 // You look down and contemplate the desert below. Then you contemplate having a snack when you return to the ship, because really, snacks are far more interesting than a dusty desert.
        KerbinInSpaceLowDeserts* = #CSS_evaReport_KerbinInSpaceLowDeserts_01 // Just looking down is making you thirsty.
        KerbinInSpaceLowDeserts* = #CSS_evaReport_KerbinInSpaceLowDeserts_02 // You contemplate the serene beauty of Kerbin's deserts, and long for solid ground.
        KerbinInSpaceLowBadlands* = #CSS_evaReport_KerbinInSpaceLowBadlands_00 // The badlands don't look so bad from up here. YOU HEAR THAT BADLANDS?! YOU DON'T SCARE US!!.....we're not going down there, are we?
        KerbinInSpaceLowBadlands* = #CSS_evaReport_KerbinInSpaceLowBadlands_01 // As you sigh in relief at the distance separating you from the Badlands, you find yourself thankful that there's no such thing as Badspace.
        KerbinInSpaceLowBadlands* = #CSS_evaReport_KerbinInSpaceLowBadlands_02 // Somehow you get the feeling that something down there is watching you.
        KerbinInSpaceLowTundra* = #CSS_evaReport_KerbinInSpaceLowTundra_00 // Even with only a thin spacesuit and small amount of space separating you from the landscape below the plant life still looks tiny and stunted.
        KerbinInSpaceLowTundra* = #CSS_evaReport_KerbinInSpaceLowTundra_01 // You marvel at how many plants can look so small as you consider letting go of the ship to float freely through space.
        KerbinInSpaceLowTundra* = #CSS_evaReport_KerbinInSpaceLowTundra_02 // Oh look it's the Tundra! It looks cold and inhospitable even from up here.
        KerbinInSpaceLowIceCaps* = #CSS_evaReport_KerbinInSpaceLowIceCaps_00 // You make some notes about different shades of white. You conclude that the spectrum ranges from white to extremely white.
        KerbinInSpaceLowIceCaps* = #CSS_evaReport_KerbinInSpaceLowIceCaps_01 // Your try to touch an aurora but it remains fiendishly out of reach.
        KerbinInSpaceLowNorthernIceShelf* = #CSS_evaReport_KerbinInSpaceLowNorthernIceShelf_00 // It looks flat, white and boring from up here.
        KerbinInSpaceLowNorthernIceShelf* = #CSS_evaReport_KerbinInSpaceLowNorthernIceShelf_01 // You squint, and struggle to tell where the land ends and sea ice begins.
        KerbinInSpaceLowSouthernIceShelf* = #CSS_evaReport_KerbinInSpaceLowSouthernIceShelf_00 // The ice caps gleam brilliantly in the sun. They have a splendent beauty from space, but you know how bad they are on the ground.
        KerbinInSpaceLowSouthernIceShelf* = #CSS_evaReport_KerbinInSpaceLowSouthernIceShelf_02 // The great ice platform below traces an outline through the sea that could easily be mistaken for a true continent.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_00 // Pssht. Badlands. Whatever. Next they're gonna say Eeloo is a giant snowball and Laythe is populated by another race of Kerbals.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_01 // "If you're hearing this, it means you're taking a long time on this spacewalk. The lab boys say that might be a fear reaction."
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_02 // The lone Kerbal loves it out here.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_03 // It crosses your mind that a thin layer of Mylar and glass is the only thing separating you from nothing.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_04 // Staring down at tiny Kerbin, it strikes you as a planet that looks mostly harmless.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_05 // I can see my house from here!
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_06 // You look down over the frosty peaks of the planet below, and contemplate the meaning of life. And the integrity of your spacesuit.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_07 // The Highlands must be so jealous of you right now.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_08 // You wonder why so much ice is built up around each pole...then again, you can't really think of a better place for it.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_09 // All of Kerbin stretches out before you. You wonder what is happening far away on the rolling hills below.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_10 // As you conduct your EVA you use the Grasslands of Kerbin as a visual reference point to keep from getting confused.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_11 // If you squint really hard and press your thumb against the glass, you can almost pretend that the Badlands don't exist!
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_12 // As you gaze at the beautiful blue ball that is your home-world, you wonder who screwed up and made the Badlands.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_13 // Memories of Kerbin's deserts keep you warm as you work in the cold depths of outer space.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_14 // As you float peacefully high above the great mountains of Kerbin, you feel content in your choice of careers.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_15 // We're in space! Take that Kraken! Who's laughing now, huh???
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_16 // The coldness of outer space is a sharp contrast to the warmth-filled memories of your time on Kerbin's shores.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_17 // You do a somersault and a back-flip from the hatch onto the side of the ship. How do you like THAT KSC?
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_18 // Here you are, crossing the gulf between the stars. Much like the ancient sailors who braved the journey across the seas.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_19 // Wow, look at that view. Now if only we could figure out how to pack snacks in these suits.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_20 // As you float above the bleak terrain in your EVA suit your mind wanders, as it often does, to snacks. Yummy, yummy snacks!
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_21 // You wonder why so much ice is built up around each pole...then again, you can't really think of a better place for it.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_22 // The view of the mountains below is much clearer when you're not looking through the window of a spaceship.
        KerbinInSpaceHigh* = #CSS_evaReport_KerbinInSpaceHigh_23 // You wave in the general direction of Kerbin. Hi Tundra! Bye Tundra!

        MunSrfLanded* = #CSS_evaReport_MunSrfLanded_00 // That's one small step fo- the situation is nominal.
        MunSrfLanded* = #CSS_evaReport_MunSrfLanded_01 // That's one small step for a Kerbal, and one big cupboard of snacks for said Kerbal.
        MunSrfLanded* = #CSS_evaReport_MunSrfLanded_02 // You notice some weird rocks in the distance.
        MunSrfLanded* = #CSS_evaReport_MunSrfLanded_03 // You're in a most peculiar way, and the stars look very different today.
        MunSrfLanded* = #CSS_evaReport_MunSrfLanded_04 // A small rock cracks your visor. You begin to question EVA on a surface with no atmosphere.
        MunSrfLandedMidlands* = #CSS_evaReport_MunSrfLandedMidlands_00 // As you step off your lander, saying the usual dramatic speech, Mission Control calls up, tells you to cut the chatter and to take the all-important surface sample.
        MunSrfLandedMidlands* = #CSS_evaReport_MunSrfLandedMidlands_01 // You look up and hope that the rocket scientists back on Kerbin did their math correctly.
        MunSrfLandedNorthernBasin* = #CSS_evaReport_MunSrfLandedNorthernBasin_00 // "Did I leave the keys in the ignition?"
        MunSrfLandedEastCrater* = #CSS_evaReport_MunSrfLandedEastCrater_00 // You feel a peculiar quake. When you look behind you, there is a fresh meteor impacted where you were just walking.
        MunSrfLandedNorthwestCrater* = #CSS_evaReport_MunSrfLandedNorthwestCrater_00 // You should have brought your golf club.
        MunSrfLandedSouthwestCrater* = #CSS_evaReport_MunSrfLandedSouthwestCrater_01 // That dust is getting into everything! Now stop staring and help me clean my visor!
        MunSrfLandedFarsideCrater* = #CSS_evaReport_MunSrfLandedFarsideCrater_00 // You wonder how that rock got into your spacesuit.
        MunSrfLandedCanyons* = #CSS_evaReport_MunSrfLandedCanyons_00 // You spot a narrow part of the canyon, and wonder if you could make the jump across.
        MunSrfLandedCanyons* = #CSS_evaReport_MunSrfLandedCanyons_01 // You hold your hand up against Kerbin, and use your thumb to blot out the sun. After thinking briefly about pale blue dots, the puniness of kerbalkind, and philosophy, you go back to wondering how sweet it would be to ramp off those dunes back there.
        MunSrfLandedPolarCrater* = #CSS_evaReport_MunSrfLandedPolarCrater_00 // Feeling slightly bored, you play peek-a-boo with Kerbin over the crater edges.
        MunSrfLandedPoles* = #CSS_evaReport_MunSrfLandedPoles_00 // You hum "You never make me be like you/I'm master of the moon."
        MunSrfLandedPoles* = #CSS_evaReport_MunSrfLandedPoles_01 // You are amazed at how mystifying the moon scenery looks like from the pole.
        MunSrfLandedPolarLowlands* = #CSS_evaReport_MunSrfLandedPolarLowlands_00 // You confirm that the Mun is not made out of cheese. Mission Control is very sad.
        MunSrfLandedHighlands* = #CSS_evaReport_MunSrfLandedHighlands_00 // As it turns out, there's no cheese!
        MunSrfLandedHighlandCraters* = #CSS_evaReport_MunSrfLandedHighlandCraters_00 // It doesn't -taste- like it's made of dairy...
        MunSrfLandedMidlandCraters* = #CSS_evaReport_MunSrfLandedMidlandCraters_00 // Yep, it's a crater all right. You've noted this down on your checklist with a smiley face. Science is fun!
        MunSrfLandedEastFarsideCrater* = #CSS_evaReport_MunSrfLandedEastFarsideCrater_00 // There was something you were going to say, and even though you spent the entire trip over here perfecting your delivery, you've somehow managed to forget it.
        MunSrfLandedTwinCraters* = #CSS_evaReport_MunSrfLandedTwinCraters_00 // You really want to jump again, but last time Mission Control yelled at you.
        MunInSpaceLow* = #CSS_evaReport_MunInSpaceLow_00 // "I wonder if it tastes like cheese? Nah. Minmus though..."
        MunInSpaceLowMidlands* = #CSS_evaReport_MunInSpaceLowMidlands_00 // Despite being relatively flat, the Midlands is still littered with debris from impact ejecta, making choosing a landing site a non-trivial matter.
        MunInSpaceLowNorthernBasin* = #CSS_evaReport_MunInSpaceLowNorthernBasin_00 // As you study the Northern Basin from low-orbit EVA you suddenly feel the an overwhelming urge to pee...
        MunInSpaceLowEastCrater* = #CSS_evaReport_MunInSpaceLowEastCrater_00 // You stare at the Mun amazed at how fast you are moving over the surface; maybe going out of the capsule was a bad decision.
        MunInSpaceLowEastCrater* = #CSS_evaReport_MunInSpaceLowEastCrater_01 // It's hard to tell from outside the cockpit, but you think that you might be really low. You're not... in the crater, are you?
        MunInSpaceLowEastCrater* = #CSS_evaReport_MunInSpaceLowEastCrater_02 // You Stare at the Mun amazed at how fast you are moving over the surface; maybe going out of the capsule was a bad decision.
        MunInSpaceLowNorthwestCrater* = #CSS_evaReport_MunInSpaceLowNorthwestCrater_00 // Hmm... this Northwest Crater doesn't appear to be as round as some of the other ones. Perhaps the lava cooled unevenly. Or something.
        MunInSpaceLowSouthwestCrater* = #CSS_evaReport_MunInSpaceLowSouthwestCrater_01 // The Southwest Crater is really rather round. The impact must have hit almost perpendicular to the surface.
        MunInSpaceLowFarsideCrater* = #CSS_evaReport_MunInSpaceLowFarsideCrater_00 // Hmm not bad. Still, you'd like to see the West Nearside Crater before making the final decision on which crater is the fairest of them all.
        MunInSpaceLowCanyons* = #CSS_evaReport_MunInSpaceLowCanyons_00 // There are visible striations in the walls of the canyons.
        MunInSpaceLowCanyons* = #CSS_evaReport_MunInSpaceLowCanyons_01 // The canyons below look particularly fun to climb. If only you weren't moving t such a high relative velocity...
        MunInSpaceLowPolarCrater* = #CSS_evaReport_MunInSpaceLowPolarCrater_00 // You wish you could've witnessed the devastating impact that created the Mun's vast Polar Crater. From a safe distance of course.
        MunInSpaceLowPoles* = #CSS_evaReport_MunInSpaceLowPoles_00 // Aw, the Mun's Poles don't have auroras... Oh hey, you can see Kerbin's from here!
        MunInSpaceLowPolarLowlands* = #CSS_evaReport_MunInSpaceLowPolarLowlands_00 // If this was Kerbin, you'd be seeing ice sheets by now. Oh well, EVAs are still fun.
        MunInSpaceLowHighlands* = #CSS_evaReport_MunInSpaceLowHighlands_00 // The scientists have explained that the munar highlands are likely plagioclase cumulates. You're not quite sure what that means.
        MunInSpaceLowHighlands* = #CSS_evaReport_MunInSpaceLowHighlands_01 // The Mun's Highlands look alright. But you still wish there was some kind of munar mountain!
        MunInSpaceLowHighlandCraters* = #CSS_evaReport_MunInSpaceLowHighlandCraters_00 // After you complete your allotted activities, you let go of the ship and float freely over the Mun's Highland Craters.
        MunInSpaceLowMidlandCraters* = #CSS_evaReport_MunInSpaceLowMidlandCraters_00 // Holy crap there's a lot of them... which means there's plenty to go around when they start naming things after people!
        MunInSpaceLowEastFarsideCrater* = #CSS_evaReport_MunInSpaceLowEastFarsideCrater_00 // You're not a fan of the name "East Farside Crater". You really hope you land down there so they can name it after you instead.
        MunInSpaceLowEastFarsideCrater* = #CSS_evaReport_MunInSpaceLowEastFarsideCrater_01 // You wish you brought a skateboard. Those crater walls would make an awesome halfpipe.
        MunInSpaceLowTwinCraters* = #CSS_evaReport_MunInSpaceLowTwinCraters_00 // What an oddly-shaped crater. Are they two different impacts? Or perhaps the result of an impactor hitting at an angle and skipping across the surface.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_00 // Say are those the Munar Canyons down below? They sure are impressive. Nothing like Kerbin's of course.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_01 // It looks like a really big rock.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_02 // All you can think about is potatoes...
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_03 // You're trying to decide how to describe this moment to the folks back home. You probably shouldn't mention the part where you peed inside your suit.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_04 // You can see the ridge of the crater below much more clearly through just the visor of your spacesuit. Why did we bring a spaceship anyway?
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_05 // You gave up counting the craters when you ran out of fingers for the ninth time.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_06 // You stare through the not-so-vast expanse between you and the Mun. Who knew it was this big.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_07 // Ahhhh. No one can hear you rip one loose way out here.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_08 // Entering the dark side of the Mun and losing contact with Mission Control makes you realize just how isolated you are from the rest of your kind.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_09 // Well there she is. You should probably rehearse your awesome, historic speech before you land.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_10 // You wonder if there's someone back on Kerbin watching the Mun through a telescope right now. You wave a few times in case they can see you.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_11 // Mission Control insists on guiding you step-by-step through this spacewalk. As a small act of rebellion, you do everything upside-down. They'll never know! Even you can't tell if you're really upside-down or not.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_12 // As you carry out your EVA you feel your nose get progressively itchier. The resulting sneeze almost spins you out of control.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_13 // Huh the Mun looks surprisingly like the one in your high school textbook. Probably the end result of hundreds of years of Kerbal curiosity. And telescopes. Really big telescopes.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_14 // You hear a sudden hissing from your space suit. Thankfully, it turns out it was just the snacks from last night.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_15 // You roam around the outside of your craft, marvelling at how such a contraption managed to get you this far.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_16 // You inspect your craft from the outside, going through the maintenance checklist provided by Mission Control.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_17 // As you carry out your EVA, you look over your spacecraft to make sure you're not missing too many pieces.
        MunInSpaceHigh* = #CSS_evaReport_MunInSpaceHigh_18 // You could get used to peeing in this suit. Perhaps you should wear it all the time like a badass diaper.

        MinmusSrfLanded* = #CSS_evaReport_MinmusSrfLanded_00 // You have confirmed that the surface does not taste like mint ice cream.
        MinmusSrfLanded* = #CSS_evaReport_MinmusSrfLanded_01 // The powdery substance on the surface gets kicked up with every step, you swat at it as it pelts your visor.
        MinmusSrfLanded* = #CSS_evaReport_MinmusSrfLanded_02 // You order the engineers to start building a "wicked fast rover" to race on the Flats at once.
        MinmusSrfLandedHighlands* = #CSS_evaReport_MinmusSrfLandedHighlands_00 // It is hard to control your movements in the low gravity.
        MinmusSrfLandedHighlands* = #CSS_evaReport_MinmusSrfLandedHighlands_01 // The ground beneath you has the perfect consistency for snowballs. Sadly, you cannot find a worthy target.
        MinmusSrfLandedMidlands* = #CSS_evaReport_MinmusSrfLandedMidlands_00 // You spend several minutes contemplating how to taste the ground without removing your space suit's helmet before giving up.
        MinmusSrfLandedLowlands* = #CSS_evaReport_MinmusSrfLandedLowlands_00 // You look up at the highlands and wonder out loud whether you could jump over them. Mission Control advises you not to try.
        MinmusSrfLandedFlats* = #CSS_evaReport_MinmusSrfLandedFlats_00 // As far as you can tell in the low gravity, the ground is firm underfoot, and not as slippery as you had expected.
        MinmusSrfLandedGreatFlats* = #CSS_evaReport_MinmusSrfLandedGreatFlats_00 // You think you could drill some holes here and play golf... space golf, of course.
        MinmusSrfLandedGreaterFlats* = #CSS_evaReport_MinmusSrfLandedGreaterFlats_00 // As you exit your craft, you utter the words; "It's one small step for Kerbals, one giant leap for Kerbalkind."
        MinmusSrfLandedLesserFlats* = #CSS_evaReport_MinmusSrfLandedLesserFlats_00 // Engine's exhaust seems to have melted the ice underneath.
        MinmusSrfLandedPoles* = #CSS_evaReport_MinmusSrfLandedPoles_00 // You can feel the planet spinning beneath you. Suddenly, you feel a little green around the gills.
        MinmusSrfLandedSlopes* = #CSS_evaReport_MinmusSrfLandedSlopes_00 // You wonder how far you could slide down this hill...
        MinmusSrfLandedSlopes* = #CSS_evaReport_MinmusSrfLandedSlopes_01 // You start to jury-rig a sled from spare parts, only to be interrupted by orders from Mission Control.
        MinmusSrfLandedSlopes* = #CSS_evaReport_MinmusSrfLandedSlopes_02 // You could have sworn you saw a little boy and a tiger sledding down the hill in a toboggan. You check your O2 supply... Ah! Just hypoxia.
        MinmusInSpaceLow* = #CSS_evaReport_MinmusInSpaceLow_00 // The mesmerizing aquamarine flats almost make you forget to keep one hand on the ship's handle at all times.
        MinmusInSpaceLowHighlands* = #CSS_evaReport_MinmusInSpaceLowHighlands_00 // The surface seems to be a mixture of rock and ice... you wonder if it could be mined for fuel.
        MinmusInSpaceLowLowlands* = #CSS_evaReport_MinmusInSpaceLowLowlands_00 // You are craving mint ice cream right about now.
        MinmusInSpaceLowFlats* = #CSS_evaReport_MinmusInSpaceLowFlats_00 // These ice lakes are so flat and smooth, you suspect they would make an excellent drag strip.
        MinmusInSpaceLowGreatFlats* = #CSS_evaReport_MinmusInSpaceLowGreatFlats_00 // If the spaceship fails, you could probably use the jetpack to get back into orbit.
        MinmusInSpaceLowGreaterFlats* = #CSS_evaReport_MinmusInSpaceLowGreaterFlats_00 // You need to do something about the lack of snacks here.
        MinmusInSpaceLowLesserFlats* = #CSS_evaReport_MinmusInSpaceLowLesserFlats_00 // The low gravity would make driving around difficult.
        MinmusInSpaceHigh* = #CSS_evaReport_MinmusInSpaceHigh_00 // It looks so small, and yet so delicious.

        DunaSrfLanded* = #CSS_evaReport_DunaSrfLanded_00 // You see red. A LOT of red.
        DunaSrfLanded* = #CSS_evaReport_DunaSrfLanded_01 // The air is a little thin up here. Down here?
        DunaSrfLanded* = #CSS_evaReport_DunaSrfLanded_02 // Would this be a good place to have giant sand worms for pets?
        DunaSrfLanded* = #CSS_evaReport_DunaSrfLanded_03 // A gust of wind creates a small red dust storm, it's hard to see.
        DunaSrfLandedPoles* = #CSS_evaReport_DunaSrfLandedPoles_00 // It feels as though a stiff breeze is tugging at your ankles. You suspect that this means gas is escaping from the ice caps, and this makes you slightly nervous.
        DunaSrfLandedPoles* = #CSS_evaReport_DunaSrfLandedPoles_01 // A sudden puff of gas makes you jump back from the geyser hole you were peering into.
        DunaSrfLandedMidlands* = #CSS_evaReport_DunaSrfLandedMidlands_00 // I'm hungry. Where's my pizza? What do you mean, you have a 37,000-Fund charge for Duna doorstep delivery? 300 days or it's free!
        DunaSrfLandedMidlands* = #CSS_evaReport_DunaSrfLandedMidlands_01 // It looks boring out here. You flip your sun visor down and up again as if it might make it more interesting.
        DunaSrfLandedMidlands* = #CSS_evaReport_DunaSrfLandedMidlands_02 // Duna's low gravity would lend itself well to an exciting game of basketball! You consider adding a hoop to your next lander design.
        DunaSrfLandedLowlands* = #CSS_evaReport_DunaSrfLandedLowlands_00 // You feel like a true hero as you march across the red planet, until you realize you're a long, long way from home.
        DunaSrfLandedLowlands* = #CSS_evaReport_DunaSrfLandedLowlands_01 // The sand here is much too fine to make a sandcastle with so you decide to bound around for a bit. Mission Control orders you back to your tasks-you've come all this way, why can't you just have a few minutes of FUN!?
        DunaSrfLandedCraters* = #CSS_evaReport_DunaSrfLandedCraters_00 // You've proven the alien conspiracy theorists wrong. There are no tall, pink men anywhere to be seen.
        DunaSrfLandedCraters* = #CSS_evaReport_DunaSrfLandedCraters_01 // You can't see the edges of the crater from the ground. Are you sure this is even a crater?
        DunaSrfLandedHighlands* = #CSS_evaReport_DunaSrfLandedHighlands_00 // There's no wind. The slight force that buffets you around everywhere else is unnervingly absent.
        DunaSrfLandedHighlands* = #CSS_evaReport_DunaSrfLandedHighlands_01 // Hills, schmills, I'm on top of the world up here! I can see forever!
        DunaSrfLandedMidlandSea* = #CSS_evaReport_DunaSrfLandedMidlandSea_00 // You look up at Ike overhead, and it reminds you of Dres. It's just as dull, too.
        DunaSrfLandedMidlandSea* = #CSS_evaReport_DunaSrfLandedMidlandSea_01 // You trudge on through the fine red sand, dust cascading off your boots with every step.
        DunaSrfLandedNorthernBasin* = #CSS_evaReport_DunaSrfLandedNorthernBasin_00 // You can't see the other side of the basin. Whatever sort of basin it is, it's massive!
        DunaSrfLandedNorthernBasin* = #CSS_evaReport_DunaSrfLandedNorthernBasin_01 // Your suit does a pretty good job of keeping you warm in the cold, but your toes are getting a bit chilly.
        DunaSrfLandedSouthernBasin* = #CSS_evaReport_DunaSrfLandedSouthernBasin_00 // The ground is slushy underfoot, as though it can't make its mind up over whether it wants to be ice or rock.
        DunaSrfLandedSouthernBasin* = #CSS_evaReport_DunaSrfLandedSouthernBasin_01 // A squall of freezing wind blows off the ice cap, briefly making you very cold indeed.
        DunaSrfLandedNorthernShelf* = #CSS_evaReport_DunaSrfLandedNorthernShelf_00 // A blast of howling wind almost blows you off your feet as sand clatters against your visor plate.
        DunaSrfLandedNorthernShelf* = #CSS_evaReport_DunaSrfLandedNorthernShelf_01 // The even-more-freezing-than-usual wind bites into your toes. Where could it possibly be coming from?
        DunaSrfLandedNorthernShelf* = #CSS_evaReport_DunaSrfLandedNorthernShelf_02 // The sand grains flying past swirl and rub against each other as an even more huge dust storm front bears down on you from the north. The air around you crackles with static electricity that makes your hair stand up.
        DunaSrfLandedMidlandCanyon* = #CSS_evaReport_DunaSrfLandedMidlandCanyon_00 // On one side you can see rock face, on the other you can see the vast expanse of the Midland Sea.
        DunaSrfLandedMidlandCanyon* = #CSS_evaReport_DunaSrfLandedMidlandCanyon_01 // You look up at the walls, but lose your balance and tip over, landing on your back in the dust.
        DunaSrfLandedEasternCanyon* = #CSS_evaReport_DunaSrfLandedEasternCanyon_00 // You want to stand on a rock and strike a dramatic pose, but you can't find a big enough one in the thick haze.
        DunaSrfLandedEasternCanyon* = #CSS_evaReport_DunaSrfLandedEasternCanyon_01 // Dust-that's all you can see. You daren't wander too far from the ship in case you can't find it again.
        DunaSrfLandedWesternCanyon* = #CSS_evaReport_DunaSrfLandedWesternCanyon_00 // You look down one end of the canyon, and then look down the other end. It's very disorienting, and you'd hate to get lost here.
        DunaSrfLandedWesternCanyon* = #CSS_evaReport_DunaSrfLandedWesternCanyon_01 // You pull out a pair of binoculars and look at the wall just in time to see a huge boulder fall from the precipice and crash to the canyon floor. The sound doesn't make it to your position.
        DunaSrfLandedPolarHighlands* = #CSS_evaReport_DunaSrfLandedPolarHighlands_00 // From this elevated vantage point you can see the dazzling pinkish hills stretching into the distance.
        DunaSrfLandedPolarHighlands* = #CSS_evaReport_DunaSrfLandedPolarHighlands_01 // You look back at your ship and see large amounts of vapour hissing from under it. You hope it isn't about to sink into the ice.
        DunaSrfLandedPolarCraters* = #CSS_evaReport_DunaSrfLandedPolarCraters_00 // You step onto the ice and immediately almost slip over. Some things never change about ice.
        DunaSrfLandedPolarCraters* = #CSS_evaReport_DunaSrfLandedPolarCraters_01 // Thankfully, the suits have climate control. You try and stop yourself thinking about you freezing your ass off without it.
        DunaFlyingLowPoles* = #CSS_evaReport_DunaFlyingLowPoles_00 // You see a far-off gas plume eject a large chunk of ice into the thin air. You consider jumping into one to see how high you can get.
        DunaFlyingLowPoles* = #CSS_evaReport_DunaFlyingLowPoles_01 // Everywhere you look, you see white. The undulating icy plains stretch toward the steeply curving horizon.
        DunaFlyingLowMidlands* = #CSS_evaReport_DunaFlyingLowMidlands_00 // For a moment, you think you catch a glimpse of a small, shiny, black-topped object in the distance. Then it's gone.
        DunaFlyingLowMidlands* = #CSS_evaReport_DunaFlyingLowMidlands_01 // Up here, the dust seems a lot thinner. Until you see a dust storm rolling in off the lowlands from your vantage point.
        DunaFlyingLowLowlands* = #CSS_evaReport_DunaFlyingLowLowlands_00 // The featureless plains stretch off into the distance. It's too cold here for any mirages.
        DunaFlyingLowLowlands* = #CSS_evaReport_DunaFlyingLowLowlands_01 // Even off the ground, the air is strangely calm. It's still really cold though, and that snaps you out of your feeling of unease.
        DunaFlyingLowCraters* = #CSS_evaReport_DunaFlyingLowCraters_00 // OK, from up here you can see the edges of this vast bowl in the landscape. You feel small.
        DunaFlyingLowCraters* = #CSS_evaReport_DunaFlyingLowCraters_01 // Even down here the thin Dunaian atmosphere is too tenuous to slow you down much.
        DunaFlyingLowHighlands* = #CSS_evaReport_DunaFlyingLowHighlands_00 // There's not enough atmosphere to slow you down much up here, you'll have to use your jets unless you like faceplanting.
        DunaFlyingLowHighlands* = #CSS_evaReport_DunaFlyingLowHighlands_01 // The dust seems to be dyeing your suit and you're sure you'll be the laughing stock of the whole KSC when you return in pink.
        DunaFlyingLowMidlandSea* = #CSS_evaReport_DunaFlyingLowMidlandSea_00 // Airborne sand grains skitter off your visor glass, creating an almost hypnotic hissing noise.
        DunaFlyingLowMidlandSea* = #CSS_evaReport_DunaFlyingLowMidlandSea_01 // Despite moving at some speed through the air, you don't feel any kind of substantial wind resistance. The atmosphere must be extremely thin.
        DunaFlyingLowNorthernBasin* = #CSS_evaReport_DunaFlyingLowNorthernBasin_00 // The wind tries its best to buffet you around, but you manage to stay steady and get a look around from a slightly higher vantage point.
        DunaFlyingLowNorthernBasin* = #CSS_evaReport_DunaFlyingLowNorthernBasin_01 // The wind blowing around you is cold. Like, really cold. You long for the warmth of your seat on the ship.
        DunaFlyingLowSouthernBasin* = #CSS_evaReport_DunaFlyingLowSouthernBasin_00 // You distract yourself from the effects of the rushing cold air by imagining sitting back in the Astronaut Complex breakroom with a cup of warm koffee and a biscuit.
        DunaFlyingLowSouthernBasin* = #CSS_evaReport_DunaFlyingLowSouthernBasin_01 // It's even colder than usual up here at these high latitudes, and the wind chill from flying makes it even colder. You hope the airheads at the AC fixed your suit heater before you left.
        DunaFlyingLowNorthernShelf* = #CSS_evaReport_DunaFlyingLowNorthernShelf_00 // You struggle to maintain your aerial position in the winds and consider tying yourself to the craft.
        DunaFlyingLowNorthernShelf* = #CSS_evaReport_DunaFlyingLowNorthernShelf_01 // There is an eerie lull in the weather, and for a few seconds the dust clears enough for you to marvel at the canyon's vast scale.
        DunaFlyingLowMidlandCanyon* = #CSS_evaReport_DunaFlyingLowMidlandCanyon_00 // The sun is shining, but it's still cold here. Cold enough to make you wish you had brought some hot koffee with you.
        DunaFlyingLowMidlandCanyon* = #CSS_evaReport_DunaFlyingLowMidlandCanyon_01 // You're in the air but thanks to the looming walls, you don't feel like you're getting any higher or lower.
        DunaFlyingLowEasternCanyon* = #CSS_evaReport_DunaFlyingLowEasternCanyon_00 // The dust is still thick, but does thin out a little when off the surface. Still can't see much, though.
        DunaFlyingLowEasternCanyon* = #CSS_evaReport_DunaFlyingLowEasternCanyon_01 // You look down, and try to make out patterns in the swirling dust. That's a... swirly thing. That's another swirly thing.
        DunaFlyingLowWesternCanyon* = #CSS_evaReport_DunaFlyingLowWesternCanyon_00 // From up here you can see both walls. Quite the narrow canyon indeed; perfect for some high-speed hovering-craft racing!
        DunaFlyingLowWesternCanyon* = #CSS_evaReport_DunaFlyingLowWesternCanyon_01 // The straightness of the walls you can see makes your eyes start to water.
        DunaFlyingLowPolarHighlands* = #CSS_evaReport_DunaFlyingLowPolarHighlands_00 // It looks much the same from up here as it does down there. Hilly and white.
        DunaFlyingLowPolarHighlands* = #CSS_evaReport_DunaFlyingLowPolarHighlands_01 // The peaks are covered in ice, but as far as you can tell there are no glaciers to be found.
        DunaFlyingLowPolarCraters* = #CSS_evaReport_DunaFlyingLowPolarCraters_00 // From the air, you can clearly see the shape of the icy depression. Quite a large hole indeed.
        DunaFlyingLowPolarCraters* = #CSS_evaReport_DunaFlyingLowPolarCraters_01 // The hope you had of being able to have a snowball fight fade as you see it's all ice down there.
        DunaFlyingHigh* = #CSS_evaReport_DunaFlyingHigh_00 // Luckily the Dunaian atmosphere is very thin. Otherwise you and your craft would get separated very quickly pulling a stunt like this.
        DunaFlyingHigh* = #CSS_evaReport_DunaFlyingHigh_01 // Even though the drag force is very low, you feel like you should really get back in.
        DunaFlyingHigh* = #CSS_evaReport_DunaFlyingHigh_01 // The atmosphere is thin at best at the surface, and all the way up here you barely feel any aero forces or drag.
        DunaInSpaceLowPoles* = #CSS_evaReport_DunaInSpaceLowPoles_00 // The curving edge of the planet shows just a hint of red surrounding a sea of white ice below you. It's beautiful!
        DunaInSpaceLowPoles* = #CSS_evaReport_DunaInSpaceLowPoles_01 // The mountain chains are just visible as a series of wiggly lines stretching over the sea of white.
        DunaInSpaceLowMidlands* = #CSS_evaReport_DunaInSpaceLowMidlands_00 // You mentally trace the lines of the ancient valleys in the landscape. Former rivers, maybe?
        DunaInSpaceLowMidlands* = #CSS_evaReport_DunaInSpaceLowMidlands_01 // The squiggly patterns in the land below are so mesmerising it takes a snappy comment from Mission Control to bring you back.
        DunaInSpaceLowLowlands* = #CSS_evaReport_DunaInSpaceLowLowlands_00 // It looks boring down there. Even the Midlands might be a more interesting place to land.
        DunaInSpaceLowLowlands* = #CSS_evaReport_DunaInSpaceLowLowlands_01 // A dust storm front moves lazily across the flatlands, obscuring the surface behind it.
        DunaInSpaceLowCraters* = #CSS_evaReport_DunaInSpaceLowCraters_00 // Even from here you can see the outline of the craters. You feel glad Kerbin only has one of these great holes.
        DunaInSpaceLowCraters* = #CSS_evaReport_DunaInSpaceLowCraters_01 // You try to get a good look, but a glint of sunlight off the ice caps has you attempting to rub your eyes through your visor.
        DunaInSpaceLowHighlands* = #CSS_evaReport_DunaInSpaceLowHighlands_00 // Them's some big mountains. You wonder if there's gold in them there hills too.
        DunaInSpaceLowHighlands* = #CSS_evaReport_DunaInSpaceLowHighlands_01 // It's difficult to tell where the Highlands end and the Midlands begin. All of Duna looks the same after a while.
        DunaInSpaceLowMidlandSea* = #CSS_evaReport_DunaInSpaceLowMidlandSea_00 // You look down, and try to imagine the Midland Sea when it was still full of water. It's hard, given the state of the place now.
        DunaInSpaceLowMidlandSea* = #CSS_evaReport_DunaInSpaceLowMidlandSea_01 // The surface in the depression looks darker and the edges are clearly visible, especially in the great semicircular scar in the north.
        DunaInSpaceLowNorthernBasin* = #CSS_evaReport_DunaInSpaceLowNorthernBasin_00 // From here, you can see the basin, with the huge rebound peak in the centre giving it away as a crater. It's enormous!
        DunaInSpaceLowNorthernBasin* = #CSS_evaReport_DunaInSpaceLowNorthernBasin_01 // The huge basin below looks like a doughnut, to compliment the koffee stain canyon to the east.
        DunaInSpaceLowSouthernBasin* = #CSS_evaReport_DunaInSpaceLowSouthernBasin_00 // It's easy to track the edges of the basin on the land, but where it disappears under the ice it's hard to make them out.
        DunaInSpaceLowSouthernBasin* = #CSS_evaReport_DunaInSpaceLowSouthernBasin_01 // The depression is just about visible running under the ice as a darkened patch of lower elevation
        DunaInSpaceLowNorthernShelf* = #CSS_evaReport_DunaInSpaceLowNorthernShelf_00 // That's a big scar. Duna must have been in a serious fight at some point.
        DunaInSpaceLowNorthernShelf* = #CSS_evaReport_DunaInSpaceLowNorthernShelf_01 // The waves of airborne sand blowing through the canyon below form beautiful patterns over the surface.
        DunaInSpaceLowMidlandCanyon* = #CSS_evaReport_DunaInSpaceLowMidlandCanyon_00 // You trace the outline of the canyon in front of you. It reminds you of a koffee stain.
        DunaInSpaceLowMidlandCanyon* = #CSS_evaReport_DunaInSpaceLowMidlandCanyon_01 // It looks like someone had their koffee cup on the surface or tried to saw through the crust. Either way, it's impressive.
        DunaInSpaceLowEasternCanyon* = #CSS_evaReport_DunaInSpaceLowEasternCanyon_00 // This canyon is by far the biggest of Duna's great scars, slicing through plains and hills alike.
        DunaInSpaceLowEasternCanyon* = #CSS_evaReport_DunaInSpaceLowEasternCanyon_01 // If you tilt your head sideways, you could swear the canyon looks like a crooked smiley face. What do you mean, 'you're seeing things'?
        DunaInSpaceLowWesternCanyon* = #CSS_evaReport_DunaInSpaceLowWesternCanyon_00 // The great scar in the landscape below links two of the biggest basins on Duna like some kind of great cutting.
        DunaInSpaceLowWesternCanyon* = #CSS_evaReport_DunaInSpaceLowWesternCanyon_01 // Zooming in, you see half a crater on the edge of the canyon. Was it made by half a meteorite, or has the rest fallen into the canyon as it widened?
        DunaInSpaceLowPolarHighlands* = #CSS_evaReport_DunaInSpaceLowPolarHighlands_00 // The icy hills glint in the sunlight far below you. You wonder if there are any UFOs buried down there.
        DunaInSpaceLowPolarCraters* = #CSS_evaReport_DunaInSpaceLowPolarCraters_00 // It's white, and it looks cold down there. If you're going down there, you should probably go and search for some warm gloves.
        DunaInSpaceLowPolarCraters* = #CSS_evaReport_DunaInSpaceLowPolarCraters_01 // The crater appears as a dark dot set against the slightly pinkish whiteness of the polar ice cap.
        DunaInSpaceHigh* = #CSS_evaReport_DunaInSpaceHigh_00 // No matter which way you look, that big, red eye is always reflected in the corner of your visor.
        DunaInSpaceHigh* = #CSS_evaReport_DunaInSpaceHigh_01 // You stare at the planet far beneath you, trying to work out which place would be the most suitable to narrowly avoid exploding on.
        DunaInSpaceHigh* = #CSS_evaReport_DunaInSpaceHigh_02 // Duna's colours encompass white, red, orange and brown. Definitely needs more blue and green.

        IkeSrfLandedPolarLowlands* = #CSS_evaReport_IkeSrfLandedPolarLowlands_00 // You skip along, each step leaving a small cloud of black, carboniferous dust.
        IkeSrfLandedPolarLowlands* = #CSS_evaReport_IkeSrfLandedPolarLowlands_01 // You look around and marvel at the massive scale of this bowl in the landscape.
        IkeSrfLandedMidlands* = #CSS_evaReport_IkeSrfLandedMidlands_00 // You really want to leave some footsteps, but the low gravity means making a deep imprint isn't easy.
        IkeSrfLandedMidlands* = #CSS_evaReport_IkeSrfLandedMidlands_01 // Everything is grey. You're not sure if it really is grey or if you're slowly losing your colour vision.
        IkeSrfLandedEasternMountainRidge* = #CSS_evaReport_IkeSrfLandedEasternMountainRidge_00 // These mountains stretch right from the north pole to the south. Perfect for a long-distance Ike hike.
        IkeSrfLandedEasternMountainRidge* = #CSS_evaReport_IkeSrfLandedEasternMountainRidge_01 // The soil clings to your boots, and you lift up big clumps of it attached to your sole with every step.
        IkeSrfLandedWesternMountainRidge* = #CSS_evaReport_IkeSrfLandedWesternMountainRidge_00 // From your vantage point, all you can see is massive massifs as far as the horion goes.
        IkeSrfLandedWesternMountainRidge* = #CSS_evaReport_IkeSrfLandedWesternMountainRidge_01 // You feel on top of the world. Or at least as far as Ike can count as a "world".
        IkeSrfLandedLowlands* = #CSS_evaReport_IkeSrfLandedLowlands_00 // You think you're looking at the ground, but you're looking at the sky instead and trip over a stone.
        IkeSrfLandedLowlands* = #CSS_evaReport_IkeSrfLandedLowlands_01 // The regolith here is looser, and even in the low gravity you leave sizeable footprints.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_evaReport_IkeSrfLandedSouthEasternMountainRange_00 // This grey dust sticks to everything, and soon you're caked in it head to toe.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_evaReport_IkeSrfLandedSouthEasternMountainRange_01 // You contemplate climbing one of the mountains when you realise it would be much easier in the low gravity.
        IkeSrfLandedSouthPole* = #CSS_evaReport_IkeSrfLandedSouthPole_00 // The low sun angle at these latitudes illuminates the minute quantities of dust around Ike.
        IkeSrfLandedSouthPole* = #CSS_evaReport_IkeSrfLandedSouthPole_01 // You stop to shake the clumps of dust off your boot. This stuff really sticks!
        IkeSrfLandedCentralMountainRange* = #CSS_evaReport_IkeSrfLandedCentralMountainRange_00 // It seems like a hike would be nice. What might you see from the other side of this moon? Pack plenty of air!
        IkeSrfLandedCentralMountainRange* = #CSS_evaReport_IkeSrfLandedCentralMountainRange_01 // Duna hangs in the sky overhead. You think back to the Mun landings, then realise looking at it has made you lose your balance.
        IkeInSpaceLowPolarLowlands* = #CSS_evaReport_IkeInSpaceLowPolarLowlands_00 // You squint into some binoculars placed on your suit visor and watch the shadows move across the surface of the depression.
        IkeInSpaceLowMidlands* = #CSS_evaReport_IkeInSpaceLowMidlands_00 // Description: "It's the grey bit between the lighter grey bit and the black bit". Hopefully that's enough.
        IkeInSpaceLowEasternMountainRidge* = #CSS_evaReport_IkeInSpaceLowEasternMountainRidge_00 // From space, you can see just how far the mountains extend. Crazy stuff.
        IkeInSpaceLowWesternMountainRidge* = #CSS_evaReport_IkeInSpaceLowWesternMountainRidge_01 // You almost feel as though you can reach out and touch the huge line of mountains below.
        IkeInSpaceLowWesternMountainRidge* = #CSS_evaReport_IkeInSpaceLowWesternMountainRidge_02 // You christen one of the mountains you can see "Kerman Massif". Mission Control doesn't seem to like it much.
        IkeInSpaceLowLowlands* = #CSS_evaReport_IkeInSpaceLowLowlands_00 // You look down, and see a big, barren, black bowl bordered by bluffs.
        IkeInSpaceLowSouthEasternMountainRange* = #CSS_evaReport_IkeInSpaceLowSouthEasternMountainRange_00 // The mountains are grey and crinkled from space, as though Ike needs some skin cream.
        IkeInSpaceLowSouthPole* = #CSS_evaReport_IkeInSpaceLowSouthPole_00 // You long to build a snowman (dustman?) out of the huge amounts of clumpy dust down below.
        IkeInSpaceLowSouthPole* = #CSS_evaReport_IkeInSpaceLowSouthPole_01 // Craters far below cast long shadows over their basin floors.
        IkeInSpaceLowCentralMountainRange* = #CSS_evaReport_IkeInSpaceLowCentralMountainRange_00 // While admiring the landscape, you notice that Duna is not moving or rotating. This could mean that Ike is tidally locked, or it could mean that you forgot your glasses.
        IkeInSpaceLowCentralMountainRange* = #CSS_evaReport_IkeInSpaceLowCentralMountainRange_01 // That red ball is always on the edge of your vision, reminding you that you'd much rather be down there than up here.
        IkeInSpaceHigh* = #CSS_evaReport_IkeInSpaceHigh_00 // Gazing at Duna, you wonder whether life could... "BZZT, THIS IS MISSION CONTROL, SITUATION NOMINAL, OVER."
        IkeInSpaceHigh* = #CSS_evaReport_IkeInSpaceHigh_01 // Ike is the iris to Duna's red eye. Huh. Never thought of that one before.
        IkeInSpaceHigh* = #CSS_evaReport_IkeInSpaceHigh_02 // Magnificent desolation indeed. Even Ike's greyscale surface looks nicer from up here.
        IkeInSpaceHigh* = #CSS_evaReport_IkeInSpaceHigh_03 // It's hard to tell if Ike is moving across the face of Duna, or if it's just your orbit. Probably the latter.
        IkeInSpaceHigh* = #CSS_evaReport_IkeInSpaceHigh_04 // Ike is no lump of rock. Ike is pretty. You like Ike.

        DresSrfLanded* = #CSS_evaReport_DresSrfLanded_00 // You feel like a few smaller rocks should be visible in the distance. However, when you look up, you spot nothing of the sort.
        DresSrfLandedLowlands* = #CSS_evaReport_DresSrfLandedLowlands_00 // This is a very low land.
        DresSrfLandedImpactEjecta* = #CSS_evaReport_DresSrfLandedImpactEjecta_00 // "It appears that an asteroid has hit very hard here. Where could all of them be coming from?"
        DresSrfLandedCanyons* = #CSS_evaReport_DresSrfLandedCanyons_00 // For a planet of this size and gravity, there are an awful lot of craters.
        DresInSpaceLowImpactEjecta* = #CSS_evaReport_DresInSpaceLowImpactEjecta_00 // For a minute you think that the burn marks below are the ones of your ship...
        DresInSpaceHigh* = #CSS_evaReport_DresInSpaceHigh_00 // It's an airless rock floating through space, all alone and lonely. Sniff.
        DresInSpaceHigh* = #CSS_evaReport_DresInSpaceHigh_01 // "If I don't get back in soon, there will be green splotches down there..."

        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_00 // I think I just heard something crack in my helmet. Can I go home?
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_01 // You are advised to get back into the capsule, fast.
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_02 // I should have taken a green space suit for camouflage.
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_03 // You feel a sudden urge to see what would happen if you landed on a gas giant.
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_04 // HOW DID I LET YOU GUYS TALK ME INTO THIS!?
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_05 // You realize that diving into a gas giant never sounded like a good idea.
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_06 // Kerbin, I think we have a problem. I do, anyways...
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_07 // As you wing-walk amongst the green clouds, you suddenly wonder how you will get home now.
        JoolFlyingLow* = #CSS_evaReport_JoolFlyingLow_08 // Your life flashes before your eyes. You realize it's best you leave Jool as soon as possible.
        JoolFlyingHigh* = #CSS_evaReport_JoolFlyingHigh_00 // You feel your skin burn as you leave the vessel. It would be a good idea to get back on board!
        JoolFlyingHigh* = #CSS_evaReport_JoolFlyingHigh_01 // You find that the outside pressures are equal with your suit's interior pressure. Removing your helmet would still be a rather poor idea.
        JoolFlyingHigh* = #CSS_evaReport_JoolFlyingHigh_02 // Feeling insignificant near the towering mass of the gas giant, you are inclined to think that size matters after all.
        JoolFlyingHigh* = #CSS_evaReport_JoolFlyingHigh_03 // You want to get back in as soon as possible.
        JoolInSpaceLow* = #CSS_evaReport_JoolInSpaceLow_00 // All you can see is a rather large green gas giant.
        JoolInSpaceLow* = #CSS_evaReport_JoolInSpaceLow_01 // You see Jool sparkling below you like an endless ocean of green.
        JoolInSpaceLow* = #CSS_evaReport_JoolInSpaceLow_02 // Your thoughts are interrupted by the incessant beeping of the radiation alarm, so you turn it off and enjoy the peace and quiet.
        JoolInSpaceLow* = #CSS_evaReport_JoolInSpaceLow_03 // You look around and think you just saw Kerbin.
        JoolInSpaceHigh* = #CSS_evaReport_JoolInSpaceHigh_00 // You look at the green planet's many moons and feel that somewhere, something incredible is waiting to be tasted.
        JoolInSpaceHigh* = #CSS_evaReport_JoolInSpaceHigh_01 // "So many stars!"
        JoolInSpaceHigh* = #CSS_evaReport_JoolInSpaceHigh_02 // You feel happy that the biggest planet is green.
        JoolInSpaceHigh* = #CSS_evaReport_JoolInSpaceHigh_03 // Gazing down at Jool, you wonder where the ground is.

        LaytheSrfLanded* = #CSS_evaReport_LaytheSrfLanded_00 // You feel a slight tremor. Perhaps you should have landed on that OTHER island.
        LaytheSrfLanded* = #CSS_evaReport_LaytheSrfLanded_01 // You try to open your helmet's protective glass ever so slightly. The air is rough, humid and thin. You gasp for oxygen but there is not much to be found. Maybe Kerbals with more high-altitude experience would do just fine.
        LaytheSrfLanded* = #CSS_evaReport_LaytheSrfLanded_02 // You do a series of breathing exercises and open your helmet to try Laythian air. It feels fine but gives you a strong sense of intoxication. You decide it's because of lower oxygen content.
        LaytheSrfLanded* = #CSS_evaReport_LaytheSrfLanded_03 // After determining that the air is, if only just, breathable, you ponder whether turbojet engines would be able to run here.
        LaytheSrfLanded* = #CSS_evaReport_LaytheSrfLanded_04 // You wonder for a moment whether it would be safe or not to open the seal on your helmet. After a moment of consideration, you decide to play it safe and leave the helmet on.
        LaytheSrfLandedPoles* = #CSS_evaReport_LaytheSrfLandedPoles_00 // Can I take off my spacesuit?
        LaytheSrfLandedShores* = #CSS_evaReport_LaytheSrfLandedShores_00 // Looking beyond the horizon, you conclude that this is a perfect place to set up a base for.
        LaytheSrfLandedShores* = #CSS_evaReport_LaytheSrfLandedShores_01 // You are glad to see the solid ground, but it seems that after such a long journey you almost forgot how to walk.
        LaytheSrfLandedShores* = #CSS_evaReport_LaytheSrfLandedShores_02 // This would make a great beach resort!
        LaytheSrfLandedDunes* = #CSS_evaReport_LaytheSrfLandedDunes_00 // You wonder if you could swim to the next island from here.
        LaytheSrfLandedCrescentBay* = #CSS_evaReport_LaytheSrfLandedCrescentBay_00 // You feel drunk because of the thin air. Mission Control asks you to put your helmet back on.
        LaytheSrfLandedTheSagenSea* = #CSS_evaReport_LaytheSrfLandedTheSagenSea_00 // There might be good diving on this planet. Unfortunately, Mission Control did not pack any flippers.
        LaytheSrfSplashed* = #CSS_evaReport_LaytheSrfSplashed_00 // You wonder if you could swim to the nearest island.
        LaytheSrfSplashed* = #CSS_evaReport_LaytheSrfSplashed_01 // You realize that this is the first bath you have had since leaving Kerbin.
        LaytheSrfSplashed* = #CSS_evaReport_LaytheSrfSplashed_02 // You start thinking of how cool it would be to have motorboats here. You then proceed to make motorboat sounds.
        LaytheSrfSplashed* = #CSS_evaReport_LaytheSrfSplashed_03 // You attempt to drink some water. Then you remember the co-worker who died after ordering some "H2O too".
        LaytheSrfSplashed* = #CSS_evaReport_LaytheSrfSplashed_04 // You tread water. Perhaps you should have chosen a drier landing spot.
        LaytheSrfSplashed* = #CSS_evaReport_LaytheSrfSplashed_05 // Swimming is really hard in these suits you know.
        LaytheSrfSplashedCrescentBay* = #CSS_evaReport_LaytheSrfSplashedCrescentBay_00 // The low land to water ratio and sedate water cycle of Laythe combine to give its oceans low salinity. You're forced to constantly swim to keep afloat.
        LaytheSrfSplashedTheSagenSea* = #CSS_evaReport_LaytheSrfSplashedTheSagenSea_00 // You begin to wish you'd brought a boat.
        LaytheSrfSplashedTheSagenSea* = #CSS_evaReport_LaytheSrfSplashedTheSagenSea_01 // You wonder what lies beneath this liquid, is this water?
        LaytheFlyingLow* = #CSS_evaReport_LaytheFlyingLow_00 // Now I really wish I had brought that parachute.
        LaytheFlyingLowPoles* = #CSS_evaReport_LaytheFlyingLowPoles_00 // You realize that you forgot to bring sunscreen.
        LaytheFlyingLowShores* = #CSS_evaReport_LaytheFlyingLowShores_00 // You are sorely tempted to remove your helmet.
        LaytheFlyingLowDunes* = #CSS_evaReport_LaytheFlyingLowDunes_00 // You feel comfortable, back at Kerbin after such a long sleep. Wait a minute...
        LaytheFlyingLowCrescentBay* = #CSS_evaReport_LaytheFlyingLowCrescentBay_00 // You find that changes in your environment oddly turn your thoughts rapidly from desserts towards life insurances.
        LaytheFlyingLowTheSagenSea* = #CSS_evaReport_LaytheFlyingLowTheSagenSea_00 // It is much colder here than the scan from orbit suggested.
        LaytheFlyingHigh* = #CSS_evaReport_LaytheFlyingHigh_00 // As you repair one of the heat shielding tiles that fell off, you are reminded of your first return through Kerbin's' atmosphere.
        LaytheInSpaceLow* = #CSS_evaReport_LaytheInSpaceLow_00 // As you gaze down upon the flowing waters of Laythe, you discover that you need a toilet.
        LaytheInSpaceLowPoles* = #CSS_evaReport_LaytheInSpaceLowPoles_00 // You search the sky, hoping to see Jool.
        LaytheInSpaceLowShores* = #CSS_evaReport_LaytheInSpaceLowShores_00 // The air looks tolerable and the water looks very inviting. A beautiful place to be!
        LaytheInSpaceLowDunes* = #CSS_evaReport_LaytheInSpaceLowDunes_00 // Your Geiger Counter is emitting a continuous hum. Time to flee.
        LaytheInSpaceLowCrescentBay* = #CSS_evaReport_LaytheInSpaceLowCrescentBay_00 // Gazing around the landscape, you feel very homesick.
        LaytheInSpaceLowTheSagenSea* = #CSS_evaReport_LaytheInSpaceLowTheSagenSea_00 // As much as you'd like to find life, the only green wiggling creature here is in a spacesuit.
        LaytheInSpaceHigh* = #CSS_evaReport_LaytheInSpaceHigh_00 // You almost feel like you are floating above Kerbin.

        VallSrfLanded* = #CSS_evaReport_VallSrfLanded_00 // The ground rumbles ominously beneath you before you realize that you're just hungry.
        VallSrfLanded* = #CSS_evaReport_VallSrfLanded_01 // Ice crystals look very shiny.
        VallSrfLanded* = #CSS_evaReport_VallSrfLanded_02 // You wish you'd brought your ice skates.
        VallSrfLanded* = #CSS_evaReport_VallSrfLanded_03 // Ice melts down and evaporates from the friction of your space boots. You concentrate very hard on keeping your balance.
        VallSrfLandedPoles* = #CSS_evaReport_VallSrfLandedPoles_00 // The rocks are of a bluish-green color... Pretty!
        VallSrfLandedMidlands* = #CSS_evaReport_VallSrfLandedMidlands_00 // The surface shivers as the deeper crust buckles and fractures. You want badly to get back inside the ship now.
        VallSrfLandedHighlands* = #CSS_evaReport_VallSrfLandedHighlands_00 // The ground beneath you suddenly lurches, and you hear the sound, carried up through your feet, of immense ice plates scraping against each other.
        VallSrfLandedLowlands* = #CSS_evaReport_VallSrfLandedLowlands_00 // Well, the ice is... thick. You wonder if there's a frozen waterfall somewhere.
        VallInSpaceLow* = #CSS_evaReport_VallInSpaceLow_00 // You look at all the valleys and wonder what made them that way.
        VallInSpaceLowHighlands* = #CSS_evaReport_VallInSpaceLowHighlands_00 // Closer investigation of the planet makes you think of Minmus. You are once again hungry for mint dessert.
        VallInSpaceHigh* = #CSS_evaReport_VallInSpaceHigh_00 // You see a sparkling stream of crystals blast into the sky in the distance.

        TyloSrfLanded* = #CSS_evaReport_TyloSrfLanded_00 // They say the gravity of Tylo adds five pounds.
        TyloSrfLandedMidlands* = #CSS_evaReport_TyloSrfLandedMidlands_00 // If surface composition is of any indication, there is a distinct possibility of finding underground lakes and caverns somewhere around.
        TyloSrfLandedHighlands* = #CSS_evaReport_TyloSrfLandedHighlands_00 // Is it me, or did my spacesuit just get really heavy?
        TyloSrfLandedLowlands* = #CSS_evaReport_TyloSrfLandedLowlands_00 // You try jumping... It isn't very effective
        TyloSrfLandedMara* = #CSS_evaReport_TyloSrfLandedMara_00 // Terrain looks like a mix of rocks, ice and dirt. You wonder at the lack of atmosphere.
        TyloInSpaceLow* = #CSS_evaReport_TyloInSpaceLow_00 // You swear you just found Tylo's missing atmosphere! It's just too bad it floated away before you could grab it.

        BopSrfLanded* = #CSS_evaReport_BopSrfLanded_00 // You feel uneasy. This place is dark and inhospitable.
        BopSrfLanded* = #CSS_evaReport_BopSrfLanded_01 // You feel that something is wrong. Even more so than when you were in your spacecraft. You feel like there's something behind you, but when you turn around, nothing is there.
        BopSrfLandedPeaks* = #CSS_evaReport_BopSrfLandedPeaks_00 // The low gravity is counterbalanced by a strong attraction to Jool. It is very green.
        BopSrfLandedPeaks* = #CSS_evaReport_BopSrfLandedPeaks_01 // Mission Control tells you not to take off your helmet.
        BopSrfLandedRidges* = #CSS_evaReport_BopSrfLandedRidges_00 // You note that it seems boring here, and wish you'd been allowed to bring the beach ball you wanted to.
        BopSrfLandedPoles* = #CSS_evaReport_BopSrfLandedPoles_00 // There's something ominous lurking here... you just know it.
        BopSrfLandedSlopes* = #CSS_evaReport_BopSrfLandedSlopes_00 // The air feels murky and ominous. A second later, you remember there is no air on Bop, so it's probably just your suit being out of order.
        BopSrfLandedValley* = #CSS_evaReport_BopSrfLandedValley_00 // You look around at the tops of the round lumps around you and think you see a small flash in the distance. You put down "weird" in the mission report.
        BopInSpaceLowPeaks* = #CSS_evaReport_BopInSpaceLowPeaks_00 // I wish that we were not here.
        BopInSpaceLowPeaks* = #CSS_evaReport_BopInSpaceLowPeaks_01 // I can see the ship from up here!
        BopInSpaceHigh* = #CSS_evaReport_BopInSpaceHigh_00 // The moon strikingly resembles a potato.
        BopInSpaceHigh* = #CSS_evaReport_BopInSpaceHigh_01 // Mission Control tells you that Bop is that little brown thing. You had gone on EVA to move it away from the ship.
        BopInSpaceHigh* = #CSS_evaReport_BopInSpaceHigh_02 // Bop looks disturbingly like Gilly. You hope you will be able to make it home this time.

        PolSrfLanded* = #CSS_evaReport_PolSrfLanded_00 // You worry that you'll never come back down if you jump.
        PolSrfLanded* = #CSS_evaReport_PolSrfLanded_01 // This place might be very weird, but it's not as bad as it could be.
        PolSrfLandedPoles* = #CSS_evaReport_PolSrfLandedPoles_00 // You make a little sandcastle, then try to blow over. Wait, there's no atmosphere.
        PolSrfLandedPoles* = #CSS_evaReport_PolSrfLandedPoles_01 // You chuckle when you realize that if you plant a flag, there'll be a pole on Pol's pole.
        PolSrfLandedLowlands* = #CSS_evaReport_PolSrfLandedLowlands_00 // Every edge looks dangerously sharp. You step carefully, trying not to shatter anything.
        PolSrfLandedHighlands* = #CSS_evaReport_PolSrfLandedHighlands_00 // Looking at all the jagged rocks, you feel very thankful about not landing on them.
        PolSrfLandedMidlands* = #CSS_evaReport_PolSrfLandedMidlands_00 // The rocks, the sand, and space itself seem to be filled with glitter. It gives you a headache.
        PolInSpaceLow* = #CSS_evaReport_PolInSpaceLow_00 // While outside the capsule, it is easier to see that Pol's surface is incredibly uneven. It also has an uncanny resemblance to a grain of pollen.
        PolInSpaceLowHighlands* = #CSS_evaReport_PolInSpaceLowHighlands_00 // Mission Control tells you to immediately begin saving water. You ask why, but your suit anttena breaks off in the wind. Wait, hold on...
        PolInSpaceHigh* = #CSS_evaReport_PolInSpaceHigh_00 // You resist a sneeze.

        EelooSrfLanded* = #CSS_evaReport_EelooSrfLanded_00 // As you think about the distance and time it took to get you here, a sudden shiver runs down your spine.
        EelooSrfLanded* = #CSS_evaReport_EelooSrfLanded_01 // You feel like Eeloo has been alone for a long time. You contemplate staying a little while longer.
        EelooSrfLanded* = #CSS_evaReport_EelooSrfLanded_02 // It is very cold. You realize that you probably should have brought a sweater.
        EelooSrfLanded* = #CSS_evaReport_EelooSrfLanded_03 // You want to build a snow-Kerbal. Sadly, Eeloo is made of ice, not snow.
        EelooSrfLanded* = #CSS_evaReport_EelooSrfLanded_04 // You wonder what would come of an ice-carving competition held here.
        EelooSrfLanded* = #CSS_evaReport_EelooSrfLanded_05 // You suddenly realize that there's no way you'll be able to walk home from here.
        EelooSrfLandedPoles* = #CSS_evaReport_EelooSrfLandedPoles_00 // Even though the suit is well insulated, you can feel the cold seeping into your feet.
        EelooSrfLandedNorthernGlaciers* = #CSS_evaReport_EelooSrfLandedNorthernGlaciers_00 // You get the feeling you left your oven on back home.
        EelooSrfLandedLowlands* = #CSS_evaReport_EelooSrfLandedLowlands_00 // You lie down and make a snow Kerbal.
        EelooSrfLandedHighlands* = #CSS_evaReport_EelooSrfLandedHighlands_00 // You're standing on a giant dirty snowball.
        EelooSrfLandedIceCanyons* = #CSS_evaReport_EelooSrfLandedIceCanyons_00 // You step off the capsule to the crackling of ice under your boots. Your eyes adjust to the faint light. From way out here, Kerbol is just another star. You reflect upon the several year journey it took to get here.
        EelooSrfLandedCraters* = #CSS_evaReport_EelooSrfLandedCraters_00 // You look at the Sun, and feel very, very lonely...
        EelooSrfLandedMidlands* = #CSS_evaReport_EelooSrfLandedMidlands_00 // You pat the ground. Hopefully you cheered up the planet a little.
        EelooInSpaceLow* = #CSS_evaReport_EelooInSpaceLow_00 // It's cold this far from the sun. How long until you're warm again?
        EelooInSpaceLowPoles* = #CSS_evaReport_EelooInSpaceLowPoles_00 // Even through the padding of your spacesuit, there's a distinct chill out here.
        EelooInSpaceLowNorthernGlaciers* = #CSS_evaReport_EelooInSpaceLowNorthernGlaciers_00 // You wonder what made you believe all the cheery people that assured you time and again that you were coming back.
        EelooInSpaceLowLowlands* = #CSS_evaReport_EelooInSpaceLowLowlands_00 // The sun looks so distant now, compared to home...
        EelooInSpaceLowHighlands* = #CSS_evaReport_EelooInSpaceLowHighlands_00 // As you look at the ground, you think a snowball fight might be fun.
        EelooInSpaceLowIceCanyons* = #CSS_evaReport_EelooInSpaceLowIceCanyons_00 // You discover it is very cold. You ask Mission Control if you can get back into your ship now.
        EelooInSpaceLowCraters* = #CSS_evaReport_EelooInSpaceLowCraters_00 // You start a pun about saying "Eeloo," but then Mission Control comes back from the bathroom.
        EelooInSpaceLowMidlands* = #CSS_evaReport_EelooInSpaceLowMidlands_00 // Even with spacesuit protecting you from the cold of space you feel yourself freezing... and lonely.
        EelooInSpaceHigh* = #CSS_evaReport_EelooInSpaceHigh_00 // It looks cold and lonely. You feel a sudden outburst of sympathy.
    }
}