@EXPERIMENT_DEFINITION:HAS[#id[bd_rpws]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_rpws_GrannusInSpaceLow_00 // The receiver is awash in low, growling radio noise from Grannus, like a distant engine you can't turn off.
        GrannusInSpaceLow* = #GEPscience_bd_rpws_GrannusInSpaceLow_01 // Plasma wave bursts arrive in uneven clumps; Mission Control confirms the clumps are real, not a comms dropout.
        GrannusInSpaceHigh* = #GEPscience_bd_rpws_GrannusInSpaceHigh_00 // Farther out, the background thins to a steady hiss punctuated by sharp clicks from sporadic activity on the red sun.
        GrannusInSpaceHigh* = #GEPscience_bd_rpws_GrannusInSpaceHigh_01 // The instrument logs slow ripples in the charged particle stream; by the time the plot reaches home, it's already old news.

        TaranisInSpaceLow* = #GEPscience_bd_rpws_TaranisInSpaceLow_00 // In low orbit, the spacecraft crackles with surface-charging events; the RPWS writes "static" in a surprisingly angry font.
        TaranisInSpaceLow* = #GEPscience_bd_rpws_TaranisInSpaceLow_01 // Taranis offers no magnetic shelter—every plasma wave from Grannus hits the sensors directly, and your nerves second.
        TaranisInSpaceHigh* = #GEPscience_bd_rpws_TaranisInSpaceHigh_00 // Higher up, wave activity still spikes whenever the sunlit side swings into view, as if the world itself is ringing.
        TaranisInSpaceHigh* = #GEPscience_bd_rpws_TaranisInSpaceHigh_01 // The data suggest sputtered ions trailing away from Taranis; someone proposes calling it a "tail" and is immediately corrected.

        ToutatisInSpaceLow* = #GEPscience_bd_rpws_ToutatisInSpaceLow_00 // Low orbit catches faint, patchy ionospheric tones over the hot hemisphere; the cold side goes almost silent.
        ToutatisInSpaceLow* = #GEPscience_bd_rpws_ToutatisInSpaceLow_01 // The thin air and low field make for messy, intermittent wave reflections—like trying to listen through a crinkled snack wrapper.
        ToutatisInSpaceHigh* = #GEPscience_bd_rpws_ToutatisInSpaceHigh_00 // From high orbit, the strongest signals cluster near the day-night boundary, where the atmosphere can't decide what it wants to be.
        ToutatisInSpaceHigh* = #GEPscience_bd_rpws_ToutatisInSpaceHigh_01 // Long, slow plasma oscillations ride along Grannus' wind; the graphs look calm until you notice the radiation warnings.

        NodensInSpaceLow* = #GEPscience_bd_rpws_NodensInSpaceLow_00 // Nodens’ thick air and “normal” field make a busy ionosphere; the RPWS hears pops and crackles that don’t match any onboard equipment.
        NodensInSpaceLow* = #GEPscience_bd_rpws_NodensInSpaceLow_01 // The red sun’s wind stirs up wave trains that ride along Nodens’ magnetic lines like plucked strings… very far from home.
        NodensInSpaceHigh* = #GEPscience_bd_rpws_NodensInSpaceHigh_00 // Higher up, Nodens casts a long, quiet shadow in the plasma flow, then suddenly the hiss returns as you cross into open space.
        NodensInSpaceHigh* = #GEPscience_bd_rpws_NodensInSpaceHigh_01 // A faint, repeating tone shows up in the spectrum—by the time it’s confirmed on Kerbin, Nodens has already rotated away.

        BelisamaInSpaceLow* = #GEPscience_bd_rpws_BelisamaInSpaceLow_00 // Belisama has little of its own shielding; most of what you record is Nodens’ magnetosphere sloshing around a tidally locked moon.
        BelisamaInSpaceLow* = #GEPscience_bd_rpws_BelisamaInSpaceLow_01 // The waves sharpen and distort near the day-night boundary, as if the surface itself is charging and discharging in slow motion.
        BelisamaInSpaceHigh* = #GEPscience_bd_rpws_BelisamaInSpaceHigh_00 // Leaving the strongest influence of Nodens, the signal thins to a thin whistle and distant rumble from Grannus’ particle stream.
        BelisamaInSpaceHigh* = #GEPscience_bd_rpws_BelisamaInSpaceHigh_01 // The antenna catches brief, metallic pings—likely charged dust, or a reminder to stop touching the hull without gloves.

        SucellusInSpaceLow* = #GEPscience_bd_rpws_SucellusInSpaceLow_00 // With a near-zero magnetic field, Sucellus takes the red sun’s plasma directly; the readout looks like a storm with no clouds.
        SucellusInSpaceLow* = #GEPscience_bd_rpws_SucellusInSpaceLow_01 // The RPWS detects surface-sputtered ions forming a patchy, fleeting exosphere—there and gone before the next comms window.
        SucellusInSpaceHigh* = #GEPscience_bd_rpws_SucellusInSpaceHigh_00 // Farther out, Sucellus leaves only a faint wake in the flow; the loudest signals are the ones from Grannus you can’t escape.
        SucellusInSpaceHigh* = #GEPscience_bd_rpws_SucellusInSpaceHigh_01 // A slow oscillation repeats like a heartbeat, but the “patient” is a dwarf planet and the doctor is several light-minutes late.

        CaireenInSpaceLow* = #GEPscience_bd_rpws_CaireenInSpaceLow_00 // Tiny Caireen has no field and no air, but it still disturbs the plasma—an irregular little knot in Sucellus’ shadow.
        CaireenInSpaceLow* = #GEPscience_bd_rpws_CaireenInSpaceLow_01 // The spectrum flickers as the spacecraft passes over jagged terrain; even the waves seem uncertain of what they’re bouncing off.
        CaireenInSpaceHigh* = #GEPscience_bd_rpws_CaireenInSpaceHigh_00 // High above Caireen, most activity belongs to Sucellus and the red sun; Caireen’s contribution is a barely-there wobble.
        CaireenInSpaceHigh* = #GEPscience_bd_rpws_CaireenInSpaceHigh_01 // The RPWS logs a brief, clean band of silence… until the next packet of data arrives and reminds you how far away “quiet” really is.

        SironaInSpaceLow* = #GEPscience_bd_rpws_SironaInSpaceLow_00 // Sirona’s magnetosphere roars in the receiver—layered hisses and warbling tones that make the panels feel inadequate.
        SironaInSpaceLow* = #GEPscience_bd_rpws_SironaInSpaceLow_01 // Strong bursts line up with auroral regions; by the time the confirmation arrives, Sirona has already turned its lights elsewhere.
        SironaInSpaceHigh* = #GEPscience_bd_rpws_SironaInSpaceHigh_00 // Farther out, the spectrum smooths into a heavy background growl from Grannus’ wind, with Sirona’s “signature” riding on top.
        SironaInSpaceHigh* = #GEPscience_bd_rpws_SironaInSpaceHigh_01 // You record a long, slow oscillation like a distant siren—very pretty, very unsettling, and very much not home.

        AirmedInSpaceLow* = #GEPscience_bd_rpws_AirmedInSpaceLow_00 // Airmed has no field to hide behind; the RPWS hears raw plasma noise slamming into the spacecraft like invisible sandblasting.
        AirmedInSpaceLow* = #GEPscience_bd_rpws_AirmedInSpaceLow_01 // Sharp pops appear whenever sunlight hits the surface below—charging events that feel like the moon is quietly snapping at you.
        AirmedInSpaceHigh* = #GEPscience_bd_rpws_AirmedInSpaceHigh_00 // Higher up, Airmed fades into the static, leaving only a small notch in the noise where the moon blocks the flow.
        AirmedInSpaceHigh* = #GEPscience_bd_rpws_AirmedInSpaceHigh_01 // The quietest moments still aren’t quiet; they’re just “far away” quiet, delayed and thinned by the long link home.

        BorvoInSpaceLow* = #GEPscience_bd_rpws_BorvoInSpaceLow_00 // Borvo’s thin air and modest field make a busy ionosphere; the RPWS picks up whistlers that bend like they’re taking the scenic route.
        BorvoInSpaceLow* = #GEPscience_bd_rpws_BorvoInSpaceLow_01 // Occasional broadband bursts suggest distant lightning or charged dust—either way, the antenna insists it heard something.
        BorvoInSpaceHigh* = #GEPscience_bd_rpws_BorvoInSpaceHigh_00 // Above Borvo, Sirona’s influence returns as a steady chorus; Borvo adds faint harmonics that drift with the terminator.
        BorvoInSpaceHigh* = #GEPscience_bd_rpws_BorvoInSpaceHigh_01 // The plots show wave packets arriving in clusters—easy to mistake for comm dropouts until you remember the physics doesn’t care.

        DamonaInSpaceLow* = #GEPscience_bd_rpws_DamonaInSpaceLow_00 // Damona is cold, airless, and unshielded; the RPWS records a harsh, brittle static like the plasma is scraping the hull.
        DamonaInSpaceLow* = #GEPscience_bd_rpws_DamonaInSpaceLow_01 // A brief, clean band of silence appears over the night side—then vanishes as the red sun’s wind finds you again.
        DamonaInSpaceHigh* = #GEPscience_bd_rpws_DamonaInSpaceHigh_00 // From high orbit, Damona is mostly a quiet obstruction in the flow; the loudest signals belong to Sirona and Grannus.
        DamonaInSpaceHigh* = #GEPscience_bd_rpws_DamonaInSpaceHigh_01 // The receiver catches faint pings that could be charged dust or your imagination filling in the gaps between delayed packets.

        EponaInSpaceLow* = #GEPscience_bd_rpws_EponaInSpaceLow_00 // Epona’s thin magnetic shielding lets the red sun’s plasma write noisy squiggles all over the spectrum.
        EponaInSpaceLow* = #GEPscience_bd_rpws_EponaInSpaceLow_01 // The nitrogen-rich air below murmurs with faint, uneven whistlers; the methane traces make the receiver smell “interesting” (it can’t smell).
        EponaInSpaceHigh* = #GEPscience_bd_rpws_EponaInSpaceHigh_00 // Higher up, Epona’s influence fades and the background hiss of the system takes over—steady, distant, and not comforting.
        EponaInSpaceHigh* = #GEPscience_bd_rpws_EponaInSpaceHigh_01 // Slow wave trains drift past like tired tides; by the time you report them, the planet has already moved on.

        RosmertaInSpaceLow* = #GEPscience_bd_rpws_RosmertaInSpaceLow_00 // Rosmerta itself is quiet and airless, but Epona’s nearby plasma environment keeps the antenna busy with warped echoes.
        RosmertaInSpaceLow* = #GEPscience_bd_rpws_RosmertaInSpaceLow_01 // Crossing the moon’s shadow, the signal drops to near-silence… then snaps back with a sharp crackle as sunlight returns.
        RosmertaInSpaceHigh* = #GEPscience_bd_rpws_RosmertaInSpaceHigh_00 // From higher orbit, Rosmerta is just a small notch in the flow—briefly blocking the charged wind and then gone.
        RosmertaInSpaceHigh* = #GEPscience_bd_rpws_RosmertaInSpaceHigh_01 // The recorder catches distant bursts from the red sun and a faint, delayed reply from Epona’s ionosphere, like a call-and-echo across empty space.

        RAB-58EInSpaceLow* = #GEPscience_bd_rpws_RAB-58EInSpaceLow_00 // The RPWS hears mostly pops and ticks—charged dust and surface-sputtered ions announcing every close pass.
        RAB-58EInSpaceLow* = #GEPscience_bd_rpws_RAB-58EInSpaceLow_01 // Its odd orbit drags you through changing plasma conditions; the plot looks like it can’t decide what “normal” means out here.
        RAB-58EInSpaceHigh* = #GEPscience_bd_rpws_RAB-58EInSpaceHigh_00 // Farther out, the little moonlet leaves only a subtle wobble in the spectrum, easily lost in the system-wide static.
        RAB-58EInSpaceHigh* = #GEPscience_bd_rpws_RAB-58EInSpaceHigh_01 // A few clean tones appear and vanish; Mission Control asks if it’s interference, and you answer several minutes later.

        CernunnosInSpaceLow* = #GEPscience_bd_rpws_CernunnosInSpaceLow_00 // Cernunnos offers no atmosphere and no field—just raw, cold exposure to the red sun’s particle stream.
        CernunnosInSpaceLow* = #GEPscience_bd_rpws_CernunnosInSpaceLow_01 // The instrument detects a faint halo of sputtered material, thin enough that it feels impolite to call it an “exosphere.”
        CernunnosInSpaceHigh* = #GEPscience_bd_rpws_CernunnosInSpaceHigh_00 // High above Cernunnos, “quiet” is just the steady hiss of distant plasma and the occasional sharp ping of charged dust.
        CernunnosInSpaceHigh* = #GEPscience_bd_rpws_CernunnosInSpaceHigh_01 // The receiver logs sparse, slow oscillations with long pauses between them—an unsettling rhythm for a lonely edge-of-system world.
    }
}