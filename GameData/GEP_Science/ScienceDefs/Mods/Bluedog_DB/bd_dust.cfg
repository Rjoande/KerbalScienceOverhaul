@EXPERIMENT_DEFINITION:HAS[#id[bd_dust]]
{
    %RESULTS
    {
        GrannusFlyingLowNorthPolarZone* = #GEPscience_bd_dust_GrannusFlyingLowNorthPolarZone_00 // Dust impacts spike whenever the polar field lines brighten, as if the star is sandblasting the sensor on purpose.
        GrannusFlyingLowNorthSubpolarZone* = #GEPscience_bd_dust_GrannusFlyingLowNorthSubpolarZone_00 // The detector records jagged “grit storms” that come and go with no warning. Mission Control receives the alert several hours after you stop worrying about it.
        GrannusFlyingLowNorthTemperateZone* = #GEPscience_bd_dust_GrannusFlyingLowNorthTemperateZone_00 // Grain sizes skew larger here, and the counts pulse in a slow rhythm that makes the day/night cycle feel like a suggestion, not a rule.
        GrannusFlyingLowNorthTropicZone* = #GEPscience_bd_dust_GrannusFlyingLowNorthTropicZone_00 // Charged dust clumps into little streams that trace invisible magnetic lanes under the dim red glare.
        GrannusFlyingLowEquatorialZone* = #GEPscience_bd_dust_GrannusFlyingLowEquatorialZone_00 // The equatorial environment is so busy that the instrument gives up on poetry and just prints numbers. Lots of numbers.
        GrannusFlyingLowSouthTropicZone* = #GEPscience_bd_dust_GrannusFlyingLowSouthTropicZone_00 // Dust density drops, then snaps back higher in sudden bursts, like the star is breathing in your direction.
        GrannusFlyingLowSouthTemperateZone* = #GEPscience_bd_dust_GrannusFlyingLowSouthTemperateZone_00 // The sensor sees a finer, more uniform grit here, consistent with long-lived dust riding stable plasma flows far from any “normal” sky.
        GrannusFlyingLowSouthSubpolarZone* = #GEPscience_bd_dust_GrannusFlyingLowSouthSubpolarZone_00 // Impacts arrive in tight clusters, suggesting the dust is being shepherded by strong fields rather than drifting freely.
        GrannusFlyingLowSouthPolarZone* = #GEPscience_bd_dust_GrannusFlyingLowSouthPolarZone_00 // A brief lull is followed by a sharp shower of hard grains; you label it “polar surprise” and hope R&D has a better name.
        GrannusFlyingHigh* = #GEPscience_bd_dust_GrannusFlyingHigh_00 // At this altitude the dust counts thin out, but every grain hits like it traveled a very long way to meet you.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_dust_GrannusInSpaceLowNorthPolarZone_00 // Low orbit over the polar zone shows dense, fast dust streams aligned with magnetic arcs. The comms delay makes it feel like you’re reading yesterday’s weather from a star.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_dust_GrannusInSpaceLowNorthSubpolarZone_00 // Dust density varies by orders of magnitude over a single pass, implying confinement in narrow structures rather than a smooth cloud.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_dust_GrannusInSpaceLowNorthTemperateZone_00 // Grains appear unusually refractory; anything fragile would have quit this job long before you arrived.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_dust_GrannusInSpaceLowNorthTropicZone_00 // A persistent band of fine dust hugs this latitude, turning the star’s glow into a faint, gritty halo on the monitors.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_dust_GrannusInSpaceLowEquatorialZone_00 // The instrument reports constant micrometeoroid “static.” You suspect the universe is trying to tune you out.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_dust_GrannusInSpaceLowSouthTropicZone_00 // Dust grains show a broad size distribution, as if multiple sources are mixing far from home and nobody bothered to label the bins.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_dust_GrannusInSpaceLowSouthTemperateZone_00 // Counts are steady enough to map, which is both comforting and unsettling this close to something that can’t be landed on.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_dust_GrannusInSpaceLowSouthSubpolarZone_00 // A narrow enhancement suggests dust is trapped in a long-lived ring-like filament. You file it under “hazard” and “pretty.”
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_dust_GrannusInSpaceLowSouthPolarZone_00 // The detector catches brief, intense bursts of dust consistent with polar outflow events; the data arrives at KSC after the event feels like a memory.
        GrannusInSpaceHigh* = #GEPscience_bd_dust_GrannusInSpaceHigh_00 // Farther out, dust becomes sparse and ancient. The few grains you catch feel like messages from very far away, delivered without return address.

        TaranisSrfLandedMagmaShores* = #GEPscience_bd_dust_TaranisSrfLandedMagmaShores_00 // Ashy grains cling to everything as if electrostatic attraction is the planet’s favorite hobby. The sensor suggests “do not inhale,” even though there is nothing to inhale with.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_dust_TaranisSrfLandedScorchedLowlands_00 // Dust grains here are fused into tiny glassy beads, likely flash-heated and re-frozen on the sunbaked side.
        TaranisSrfLandedMidlands* = #GEPscience_bd_dust_TaranisSrfLandedMidlands_00 // The regolith is so dry and sharp it registers as a steady drizzle of micro-impacts whenever you so much as wobble the lander.
        TaranisSrfLandedHighlands* = #GEPscience_bd_dust_TaranisSrfLandedHighlands_00 // A thin layer of fine powder coats the high terrain, with grain sizes suggesting slow grinding under extreme thermal cycling.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_dust_TaranisSrfLandedDarkSideMidlands_00 // In the cold darkness, the dust becomes brittle and fluffy; the instrument reads it like powdered sugar, minus the joy.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_dust_TaranisSrfLandedDarkSideHighlands_00 // Low dust mobility is implied by tight grain-size clustering, as if everything that can move already slid downhill long ago.
        TaranisSrfLandedPoles* = #GEPscience_bd_dust_TaranisSrfLandedPoles_00 // Polar dust shows mixed populations, hinting at transport across the terminator where “day” and “night” take turns being terrifying.
        TaranisSrfSplashed* = #GEPscience_bd_dust_TaranisSrfSplashed_00 // The sensor records hot, heavy particulates lofting above the magma before falling back like glitter with bad intentions.
        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_dust_TaranisInSpaceLowMagmaSea_00 // Over the magma sea, dust density peaks and grains look freshly processed. You can almost hear the surface sizzling through the data.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_dust_TaranisInSpaceLowMagmaShores_00 // A bright boundary of enhanced dust follows the shores, suggesting strong local charging and rapid lofting near the hot-cold interface.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_dust_TaranisInSpaceLowScorchedLowlands_00 // The dust signature is dominated by larger, denser grains, consistent with sintered material from the incandescent hemisphere.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_dust_TaranisInSpaceLowMidlands_00 // Fine dust forms patchy clouds that drift toward the terminator. The patterns look like weather, but without the comfort of air.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_dust_TaranisInSpaceLowHighlands_00 // Grain counts drop with altitude over the highlands, implying the surface is holding onto its dust with stubborn, vacuum-tight grip.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_dust_TaranisInSpaceLowDarkSideMidlands_00 // The dark side shows fewer grains overall, but the ones detected are extremely fine, as if larger particles froze in place and never left.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_dust_TaranisInSpaceLowDarkSideHighlands_00 // Dust appears intermittently in thin sheets, suggesting slow electrostatic lofting in weak sunlight reflected off distant space.
        TaranisInSpaceLowPoles* = #GEPscience_bd_dust_TaranisInSpaceLowPoles_00 // Polar passes reveal alternating dusty and clean swaths aligned with local terrain. Navigation calls them “interesting,” which is never a good sign.
        TaranisInSpaceHigh* = #GEPscience_bd_dust_TaranisInSpaceHigh_00 // From high orbit the dust environment averages out into a thin, uneven veil. The planet below still looks split between fire and forever-night.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_dust_ToutatisSrfLandedSunnyLowlands_00 // The baked ground sheds dry dust that skitters in tiny hops whenever static builds. The red sun makes the whole scene feel like a different planet’s problem.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_dust_ToutatisSrfLandedSunnyHighlands_00 // Coarser grains dominate up high, suggesting the fines either blew away long ago or are hiding in every seal you own.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_dust_ToutatisSrfLandedTransitionalLowlands_00 // Dust here comes in mixed sizes and charges, as if the planet can’t decide whether to be hot, cold, or merely inconvenient.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_dust_ToutatisSrfLandedTransitionalHighlands_00 // The sensor detects a stable “background” dust population, hinting at a narrow comfort band where particles can move without instantly frying or freezing.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_dust_ToutatisSrfLandedDarkSideLowlands_00 // On the cold side, dust impacts nearly vanish, but fine grains cling stubbornly to the instrument like they’re afraid to let go.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_dust_ToutatisSrfLandedDarkSideHighlands_00 // Grain signatures suggest fragile, frost-fractured dust that crumbles under the slightest vibration. You try not to vibrate.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_dust_ToutatisSrfLandedSoutheasternMountains_00 // Mountain dust shows sharp, angular grains consistent with fresh mechanical breakdown, possibly from rapid temperature swings near the terminator.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_dust_ToutatisSrfLandedWesternMountains_00 // The detector picks up periodic puffs of dust, as if distant downslope slides are happening on a schedule nobody told you about.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_dust_ToutatisSrfLandedDarkSideMountains_00 // Even in darkness, the dust is electrically lively; the instrument logs charge events that make your hair stand up inside your helmet.
        ToutatisFlyingLowSunnyLowlands* = #GEPscience_bd_dust_ToutatisFlyingLowSunnyLowlands_00 // Near the surface, the thin air still manages to carry dust in streaky curtains. It’s like weather, but quieter and more judgmental.
        ToutatisFlyingLowSunnyHighlands* = #GEPscience_bd_dust_ToutatisFlyingLowSunnyHighlands_00 // Dust density drops with altitude, but grains are faster and meaner. Aerodynamics were not invited to this party.
        ToutatisFlyingLowTransitionalLowlands* = #GEPscience_bd_dust_ToutatisFlyingLowTransitionalLowlands_00 // The sensor sees rolling fronts of fine dust drifting along the boundary between day and night, like the planet is sweeping its floors.
        ToutatisFlyingLowTransitionalHighlands* = #GEPscience_bd_dust_ToutatisFlyingLowTransitionalHighlands_00 // Dust grains cluster into transient bands, implying local winds exist just long enough to be annoying.
        ToutatisFlyingLowDarkSideLowlands* = #GEPscience_bd_dust_ToutatisFlyingLowDarkSideLowlands_00 // The cold-side air carries very little dust, until a sudden gust delivers a brief, gritty squall and then pretends it didn’t happen.
        ToutatisFlyingLowDarkSideHighlands* = #GEPscience_bd_dust_ToutatisFlyingLowDarkSideHighlands_00 // Fine grains float longer than expected, suggesting weak lift and strong electrostatics teaming up against your filters.
        ToutatisFlyingLowSoutheasternMountains* = #GEPscience_bd_dust_ToutatisFlyingLowSoutheasternMountains_00 // Updraft-like signatures appear in the data as dust is lifted along mountain faces. The term “updraft” feels optimistic this far from home.
        ToutatisFlyingLowWesternMountains* = #GEPscience_bd_dust_ToutatisFlyingLowWesternMountains_00 // Dust impacts arrive in rhythmic bursts, consistent with turbulent flow spilling off ridgelines into the lee.
        ToutatisFlyingLowDarkSideMountains* = #GEPscience_bd_dust_ToutatisFlyingLowDarkSideMountains_00 // The detector logs sparse but highly charged grains, as if the dark mountains are quietly hoarding static for later.
        ToutatisFlyingHigh* = #GEPscience_bd_dust_ToutatisFlyingHigh_00 // High in the thin atmosphere, dust becomes a faint haze of tiny grains. The red sun looks dimmer, but the loneliness doesn’t.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_dust_ToutatisInSpaceLowSunnyLowlands_00 // Low orbit over the bright side shows a persistent dust halo, with particles lofted higher than mission planners would have liked.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_dust_ToutatisInSpaceLowSunnyHighlands_00 // Grain counts are lower here, but the size distribution shifts toward heavier particles, hinting at local sources and short travel times.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_dust_ToutatisInSpaceLowTransitionalLowlands_00 // The terminator region produces the strangest dust: mixed charge states and clumping behavior that looks almost cooperative.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_dust_ToutatisInSpaceLowTransitionalHighlands_00 // Dust density varies with terrain, enabling a rough “dust map” that doubles as a hazard map for anything with moving parts.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_dust_ToutatisInSpaceLowDarkSideLowlands_00 // The dark side is quieter, with fewer impacts and finer grains, like dust that has had a long time to settle and think.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_dust_ToutatisInSpaceLowDarkSideHighlands_00 // Occasional spikes suggest small avalanches or slow electrostatic lofting events in the cold. The data arrives home late, as always.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_dust_ToutatisInSpaceLowSoutheasternMountains_00 // Over rugged terrain, dust appears in narrow plumes that fade quickly, implying localized, short-lived release mechanisms.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_dust_ToutatisInSpaceLowWesternMountains_00 // The detector sees a train of dust enhancements trailing the mountains, consistent with winds below shaping the upper dust environment.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_dust_ToutatisInSpaceLowDarkSideMountains_00 // Fine grains form a tenuous, patchy cloud above the dark mountains, held up more by charge than by any respectable atmosphere.
        ToutatisInSpaceHigh* = #GEPscience_bd_dust_ToutatisInSpaceHigh_00 // From high orbit, the dust field thins into a faint ring-like smear around the planet. It’s beautiful in a “please don’t scratch the solar panels” way.

        NodensSrfLandedShores* = #GEPscience_bd_dust_NodensSrfLandedShores_00 // The sensor fills with damp grit and salt crystals. Under the dim red sun it looks almost familiar—until the numbers arrive late and disagree.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_dust_NodensSrfLandedTropicalLowlands_00 // The thick air keeps fine particles aloft like it’s proud of them. Some grains look suspiciously organic, which is an exciting thought to receive across a long comms delay.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_dust_NodensSrfLandedTemperateLowlands_00 // A steady background of mineral dust is mixed with fibrous specks that refuse to identify themselves. Mission Control suggests “don’t lick the instrument.”
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_dust_NodensSrfLandedTropicalMidlands_00 // Sudden spikes hint at dust devils, even in this heavy air. The shadows move slowly enough to make “day” feel negotiable.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_dust_NodensSrfLandedTemperateMidlands_00 // The grain sizes are rounder than expected, like they’ve been weathered for ages under an alien sky that never got the memo about home.
        NodensSrfLandedHighlands* = #GEPscience_bd_dust_NodensSrfLandedHighlands_00 // Coarse, sharp grains ping the casing whenever the wind picks up. The instrument is effectively being sanded into a new shape.
        NodensSrfLandedTundra* = #GEPscience_bd_dust_NodensSrfLandedTundra_00 // The dust here is darker and colder, with brittle ice flecks mixed in. It crunches in the data like frozen pepper.
        NodensSrfLandedIceCaps* = #GEPscience_bd_dust_NodensSrfLandedIceCaps_00 // Mostly tiny ice crystals with an unsettling sprinkle of dark fines. It looks like snow if you squint and ignore everything you know.
        NodensSrfSplashed* = #GEPscience_bd_dust_NodensSrfSplashed_00 // The “dust” is mostly suspended microgrit and spray-born crystals. The counter refuses to decide whether this is geology or just very aggressive water.
        NodensFlyingLowSaltySeas* = #GEPscience_bd_dust_NodensFlyingLowSaltySeas_00 // Salt aerosols pepper the intake and masquerade as dust impacts. The red sun turns the waves into a dark, unfamiliar mirror.
        NodensFlyingLowFreshWater* = #GEPscience_bd_dust_NodensFlyingLowFreshWater_00 // A fine mist carries light particles that set off the bio-flag. The confirmation arrives long after you’ve already started worrying.
        NodensFlyingLowShores* = #GEPscience_bd_dust_NodensFlyingLowShores_00 // Wind-driven sand and salt strike in noisy bursts. It’s a beach day, but only the instrument gets to complain.
        NodensFlyingLowTropicalLowlands* = #GEPscience_bd_dust_NodensFlyingLowTropicalLowlands_00 // The air is thick with pollen-like grains that the detector can’t quite classify. The crew reports a strong urge to sneeze anyway.
        NodensFlyingLowTemperateLowlands* = #GEPscience_bd_dust_NodensFlyingLowTemperateLowlands_00 // Dust density rises near settled terrain, with a hint of exhaust byproducts. Congratulations, you brought your own haze across interstellar distance.
        NodensFlyingLowTropicalMidlands* = #GEPscience_bd_dust_NodensFlyingLowTropicalMidlands_00 // The data shows swirling bands of charged particles. Whatever passes for “weather” here is doing it on purpose.
        NodensFlyingLowTemperateMidlands* = #GEPscience_bd_dust_NodensFlyingLowTemperateMidlands_00 // The dust background is steady and almost comforting. Then you remember you’re reading it under a dim red sun, very far from comfort.
        NodensFlyingLowHighlands* = #GEPscience_bd_dust_NodensFlyingLowHighlands_00 // Updrafts loft sharp mineral grains that ping the sensor like tiny bullets. The sky feels bigger when it’s trying to abrade you.
        NodensFlyingLowTundra* = #GEPscience_bd_dust_NodensFlyingLowTundra_00 // Fewer particles overall, but the ones present are hard and icy. They hit the detector with a cold determination.
        NodensFlyingLowIceCaps* = #GEPscience_bd_dust_NodensFlyingLowIceCaps_00 // Minute ice needles drift at low altitude and light up the counter. The instrument insists it’s “dust,” which is technically correct and emotionally unhelpful.
        NodensFlyingHigh* = #GEPscience_bd_dust_NodensFlyingHigh_00 // Above the thick haze, impacts become rare and fast. The planet below looks peaceful in red light, which is suspicious.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_dust_NodensInSpaceLowSaltySeas_00 // Over the dark seas the dust count dips, replaced by faint, charged salt grains leaking upward. The ocean still manages to reach space, a little.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_dust_NodensInSpaceLowFreshWater_00 // A whisper of very light particles suggests lofted organics or aerosols escaping high altitude. The readout feels like a postcard from a place you can’t call back quickly.
        NodensInSpaceLowShores* = #GEPscience_bd_dust_NodensInSpaceLowShores_00 // Shores produce broad dust enhancements from wind-blown grit. The boundary between land and water is also a boundary between “clean optics” and “not.”
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_dust_NodensInSpaceLowTropicalLowlands_00 // Fine dust forms a persistent haze in low orbit, tinted dull red by the star. It’s pretty in the way hazards often are.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_dust_NodensInSpaceLowTemperateLowlands_00 // The impacts include soot-like grains likely formed by atmospheric chemistry. Even here, the air is leaving fingerprints.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_dust_NodensInSpaceLowTropicalMidlands_00 // Dust density varies with storm patterns you only see after the fact. Forecasting with comms delay feels like archaeology.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_dust_NodensInSpaceLowTemperateMidlands_00 // A stable, uniform dust background makes mapping easy. That’s comforting right up until you realize “uniform” can still be “a lot.”
        NodensInSpaceLowHighlands* = #GEPscience_bd_dust_NodensInSpaceLowHighlands_00 // Bursts of coarse particles suggest occasional strong uplift or fresh impacts. The instrument politely logs each one as if it isn’t being sandblasted.
        NodensInSpaceLowTundra* = #GEPscience_bd_dust_NodensInSpaceLowTundra_00 // The dust mix shifts toward ice and dark fines, hinting at seasonal transport. The sun’s dim red glow makes the cold feel louder.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_dust_NodensInSpaceLowIceCaps_00 // Predominantly microcrystalline ice hits the sensor and vanishes almost immediately. Even the dust here refuses to stay.
        NodensInSpaceHigh* = #GEPscience_bd_dust_NodensInSpaceHigh_00 // Far above, the environment thins to sparse, ancient grains. Each impact feels like a message that took a very long time to arrive.

        BelisamaSrfLandedFlats* = #GEPscience_bd_dust_BelisamaSrfLandedFlats_00 // The flats are coated in powder that clings like it’s afraid of drifting away. Nodens hangs in the sky, and the comms delay makes it feel even farther.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_dust_BelisamaSrfLandedTropicalLowlands_00 // Fine regolith grains lift with the slightest disturbance and then take their time coming down. Low gravity turns “dust cloud” into “long-term relationship.”
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_dust_BelisamaSrfLandedTemperateLowlands_00 // The dust is uniformly churned, classic micrometeoroid gardening. The red sun provides just enough light to see how much of it is on everything.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_dust_BelisamaSrfLandedTropicalMidlands_00 // Electrostatic effects nudge grains into thin sheets that crawl across the sensor housing. Physics is doing interpretive dance again.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_dust_BelisamaSrfLandedTemperateMidlands_00 // Some particles show chemistry that doesn’t match local rock, hinting at shared debris with Nodens. Even dust can be tide-locked.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_dust_BelisamaSrfLandedHighlands_00 // Sharp, fresh grains tick against the casing with every vibration. The instrument sounds like it’s being gently scolded by gravel.
        BelisamaSrfLandedPoles* = #GEPscience_bd_dust_BelisamaSrfLandedPoles_00 // Ultra-fine dust dominates, with occasional bright frost-like grains. In this dim light, “sparkly” still reads as “danger to optics.”
        BelisamaInSpaceLowFlats* = #GEPscience_bd_dust_BelisamaInSpaceLowFlats_00 // Over the smooth flats, the dust signature is calm and low. It’s the closest thing to silence you get out here.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_dust_BelisamaInSpaceLowTropicalLowlands_00 // A subtle enhancement suggests Belisama is skimming through tenuous material tied to Nodens. The two-body system shares more than scenery.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_dust_BelisamaInSpaceLowTemperateLowlands_00 // Grains carry mixed charge states that shift with orbital position. The same face always points homeward, but the plasma doesn’t care.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_dust_BelisamaInSpaceLowTropicalMidlands_00 // Impact rates pulse faintly, like the environment is breathing with the orbit. You only notice once the delayed telemetry catches up.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_dust_BelisamaInSpaceLowTemperateMidlands_00 // The spectrum favors old, rounded grains from endless micro-impacts. Time does most of the grinding when you’re this far away.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_dust_BelisamaInSpaceLowHighlands_00 // Occasional bursts imply small slope failures lofting debris briefly into orbit. You watch the event happen in the past.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_dust_BelisamaInSpaceLowPoles_00 // A thin, persistent veil of fine grains is easy to miss and hard to avoid. The detector recommends “stop being in orbit,” unhelpfully.
        BelisamaInSpaceHigh* = #GEPscience_bd_dust_BelisamaInSpaceHigh_00 // Far out, Belisama becomes a speck and the dust becomes the main character. The red sun doesn’t brighten; it just reminds you where you aren’t.

        SucellusSrfLandedBasins* = #GEPscience_bd_dust_SucellusSrfLandedBasins_00 // Dust has pooled in the basins like dark flour, heavy and metallic. The sensor logs high-density grains with a distinctly “resource brochure” vibe.
        SucellusSrfLandedLowlands* = #GEPscience_bd_dust_SucellusSrfLandedLowlands_00 // The regolith is gritty and oddly reluctant to bounce, as if magnetism is keeping it honest. Every impact sounds like a tiny tool drop in the data.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_dust_SucellusSrfLandedTropicalMidlands_00 // Fine particles cling to everything in slow-motion sheets. The dim red sun offers no warmth, only better contrast for the grime.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_dust_SucellusSrfLandedTemperateMidlands_00 // Grain sizes suggest constant micrometeoroid rain—frontier “weather” with no forecast and no mercy.
        SucellusSrfLandedHighlands* = #GEPscience_bd_dust_SucellusSrfLandedHighlands_00 // Coarse shards dominate, likely from ancient impacts and thermal cracking. The instrument collects them like souvenirs nobody asked for.
        SucellusSrfLandedPoles* = #GEPscience_bd_dust_SucellusSrfLandedPoles_00 // Bright frost grains mix with black dust, producing a peppered, brittle layer. It looks festive until it abrades a seal.
        SucellusInSpaceLowBasins* = #GEPscience_bd_dust_SucellusInSpaceLowBasins_00 // A faint belt of debris aligns with major basins, consistent with long-lived ejecta on lazy trajectories. Even small worlds can keep a mess.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_dust_SucellusInSpaceLowLowlands_00 // Dust counts run higher than expected, as if the asteroid neighborhood is constantly shedding. The detector calls it “background,” which is not reassuring.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_dust_SucellusInSpaceLowTropicalMidlands_00 // Charged grains show mild clumping behavior that makes engineers stare quietly. Nobody likes dust that organizes.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_dust_SucellusInSpaceLowTemperateMidlands_00 // A stable haze of metallic fines produces clean, repeatable impacts. The data feels like distant industry under a dim red sky.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_dust_SucellusInSpaceLowHighlands_00 // Short bursts of coarse grains suggest occasional rockfalls or micrometeoroid spalls. Hazard logs grow while the comms delay stays smug.
        SucellusInSpaceLowPoles* = #GEPscience_bd_dust_SucellusInSpaceLowPoles_00 // Very fine, cold-trapped grains hint at hidden volatiles. The frontier still has pockets of surprises.
        SucellusInSpaceHigh* = #GEPscience_bd_dust_SucellusInSpaceHigh_00 // High above, impacts thin to a few ancient grains shared with nearby debris fields. The emptiness outnumbers the data, comfortably.

        CaireenSrfLandedLowlands* = #GEPscience_bd_dust_CaireenSrfLandedLowlands_00 // The dust is so loose you can’t tell if you landed or simply convinced it to stay nearby. The sensor logs “yes, dust” with impressive confidence.
        CaireenSrfLandedMidlands* = #GEPscience_bd_dust_CaireenSrfLandedMidlands_00 // Angular grains and static events outnumber true impacts. This feels less like geology and more like being judged by powdered rock.
