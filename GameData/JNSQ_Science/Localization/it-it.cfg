        #JNSQscience_bd_orbitalScope_RigaInSpaceLow_00 = Il telescopio orbitale abbozza grandi regioni con un contrasto sottile, come se Riga stesse nascondendo i dettagli sotto un velo sottile d'aria.
        #JNSQscience_bd_orbitalScope_RigaInSpaceLowLowlands_00 = I bassopiani si estendono in ampie pianure con tessitura gentile, interrotte da impatti sparsi che non hanno ricevuto il promemoria sulla "liscezza".
        #JNSQscience_bd_orbitalScope_RigaInSpaceLowMidlands_00 = Le pianure formano gradini ondulati tra le regioni, con striature deboli che suggeriscono una deriva superficiale lenta e persistente.
