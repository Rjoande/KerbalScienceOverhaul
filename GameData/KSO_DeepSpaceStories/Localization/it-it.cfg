Localization
{
    it-it
    {
        // === DEEP SPACE STORIES === 
        // 2001: A Space Odyssey
        #DSS_2001Odyssey_evaReport_MunSrfLanded_00 = Metti piede sulla polvere di Mun e la radio della tuta emette un limpido trillo di tre note, poi silenzio. Il Controllo Missione ti chiede di ripetere l'EVA "esattamente allo stesso modo" per la "calibrazione".
        #DSS_2001Odyssey_evaReport_MunSrfLanded_01 = Una roccia piatta, stranamente liscia, sta in bella vista e proietta un'ombra troppo dritta. La checklist si allunga all'improvviso e nessuno dice chi abbia aggiunto i nuovi passaggi.
        #DSS_2001Odyssey_evaReport_MunSrfLanded_02 = La telecamera del casco non mostra nulla di speciale, eppure il Controllo chiede un primo piano dello stesso punto di regolite per tre volte. Quando lo fai, sembrano sollevati, come se la polvere avesse risposto.
        #DSS_2001Odyssey_evaReport_MunSrfLanded_03 = Ogni strumento segnala "roccia morta", ma il dosimetro fa tic tac con un piccolo ritmo costante, come un metronomo. Il Controllo Missione lo definisce "nominale" con una voce che non corrisponde alla parola.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_00 = Il sistema di guida insiste nel mantenere un assetto che garantisce "geometria di riferimento ottimale". I finestrini sono pieni di luce verde di tempesta, ma il computer tiene comunque le camere puntate sul vuoto.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_01 = Un tenue tono portante si infila nel circuito delle comunicazioni: troppo stabile per essere rumore, troppo debole per essere utile. Il Controllo Missione chiede se puoi "avvicinarti di un pelo", poi si ricorda di dire che è facoltativo.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_02 = Esegui la checklist di ridondanza. Ogni backup segnala "PRONTO", eppure il primario non smette mai di raccontare la propria certezza. Prendi nota: una logica impeccabile non equivale a risultati corretti.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_03 = Il pilota automatico fa una minuscola accensione di correzione senza chiedere. La variazione di delta-V è trascurabile, il campo motivazione è vuoto e la voce di log è formattata alla perfezione. Nessuno ride.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_00 = Da quassù, Jool sembra abbastanza calmo da potersi fidare. Il computer è d'accordo e disattiva in silenzio un override manuale "per prevenire l'errore dell'operatore". L'interruttore si muove ancora, ma non significa più nulla.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_01 = Il cronometro di missione scivola avanti di secondi che non hai perso. Tutti i sistemi restano "nominali", incluso quello che insiste che il tempo sia contabilizzato alla perfezione. Smetti di ricontrollare e inizi ad ascoltare.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_02 = Il Controllo Missione richiede un passaggio lento su una coordinata che non è nel piano di volo pubblico. Il computer ha già il waypoint caricato, come se stesse aspettando che lo chiedessi.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_03 = Un ping a lunga distanza torna con una risposta quasi familiare: una vecchia cadenza di transponder, in ritardo di mezzo battito. Il sistema raccomanda "mantenere la rotta" con una voce che sembra una decisione.
        #DSS_2001Odyssey_bd_GeigerCounter_MunSrfLanded_00 = Il contatore scatta con un ritmo costante e metronomico per esattamente 88 secondi, poi tace. Il Controllo Missione chiede i dati grezzi, poi ti chiede di rifarlo. Subito.
        #DSS_2001Odyssey_bd_GeigerCounter_MunSrfLanded_01 = I livelli di fondo sembrano normali finché non fai qualche passo lontano dal lander. L'ago sale di un pelo sempre con lo stesso schema, come se Mun avesse una direzione preferita.
        #DSS_2001Odyssey_bd_mapping_MunInSpaceLow_00 = Il mappatore traccia curve pulite e familiari, poi inserisce una linea dritta come un rasoio che nessun modello del terreno può giustificare. Il Controllo Missione ti chiede di "mantenere questa traccia" con un'urgenza insolita.
        #DSS_2001Odyssey_bd_mapping_MunInSpaceLow_01 = Un'area di regolite per il resto ordinaria continua a risolversi come un rettangolo scuro perfetto, qualunque sia l'angolo del sole. Il team di guida richiede un altro passaggio e disattiva in silenzio il miglioramento automatico delle immagini.
        #DSS_2001Odyssey_bd_mapping_MunInSpaceLow_02 = Le tessere della mappa si uniscono senza difetti finché un fotogramma si ripete tre volte, pixel per pixel, nonostante timestamp diversi. Gene lo definisce "buoni dati" e cambia argomento.
        #DSS_2001Odyssey_bd_orbitalScope_MunInSpaceLow_00 = Il telescopio risolve un anonimo campo di crateri finché l'autofocus non "si blocca" sul vuoto accanto. Il Controllo Missione chiede comunque una panoramica lenta, come se si aspettassero che qualcosa entri nell'inquadratura.
        #DSS_2001Odyssey_bd_orbitalScope_MunInSpaceLow_01 = Una cresta illuminata dal sole mostra un bordo d'ombra perfettamente uniforme che non dovrebbe esistere con questa angolazione. Il timestamp dell'immagine avanza normalmente, ma la scena sembra trattenere il respiro.
        #DSS_2001Odyssey_bd_orbitalScope_MunInSpaceLow_02 = Ingrandisci una pianura senza caratteristiche e trovi un debole motivo a griglia che scompare appena lo annoti. Il Controllo richiede gli originali senza segni e ti dice di non discutere di "artefatti".
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceLow_00 = Il ricevitore si riempie di crepitii e fischi mentre il campo magnetico di Jool afferra la navicella per le orecchie. Gli schemi si ripetono identici, come se qualcuno stesse provando la stessa nota ancora e ancora.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceLow_01 = Un tono pulito, a banda stretta, compare nel rumore per 0,7 secondi, ogni 16 minuti, puntuale. Non porta dati eppure il computer di bordo insiste nel etichettarlo "ACK".
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceLow_02 = Registri un coro di frequenze in salita che sembra quasi musicale, finché non ricordi che è radiazione. Il sistema ti suggerisce gentilmente di "goderti l'armonia" mentre blocca il controllo manuale del guadagno.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceHigh_00 = Lontano dalle nubi, Jool riempie ancora lo spettro con un lieve sibilo irrequieto. Il rapporto segnale rumore è pessimo, ma la temporizzazione è perfetta. Troppo perfetta per essere rassicurante.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceHigh_01 = Lo strumento registra un impulso che corrisponde esattamente a un noto schema di calibrazione, anche se nessuno sta calibrando. Il Controllo Missione chiede il file grezzo, poi smette del tutto di fare domande.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceHigh_02 = Guardi le forme d'onda scorrere mentre la navicella ruota, poi tornare di colpo come se fossero corrette. L'RPWS non sta più solo ascoltando: lo stanno ascoltando.
        #DSS_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_00 = Il suite SIGINT segnala un'"emissione strutturata" sepolta nel sibilo di Jool. Ha una temporizzazione perfetta, nessun contenuto e l'inquietante implicazione che qualcosa quaggiù si aspetti di essere udito.
        #DSS_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_01 = Un impulso dall'aspetto cifrato si ripete a intervalli fissi, sempre appena sotto la soglia di aggancio. Il computer raccomanda una correzione di rotta automatica per migliorare la ricezione, poi la pianifica senza attendere approvazione.
        #DSS_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_02 = Allarghi le bande di ricerca e trovi un tenue portante che cavalca il fondo come il fantasma di un trasmettitore. Il Controllo Missione ti chiede di mantenere il riserbo e di continuare, come se il cronometro della missione fosse partito molto tempo fa.
        #DSS_2001Odyssey_bd_surveillance_MunInSpaceLow_00 = Il feed di sorveglianza segnala un'"oggetto interessante" in un'ombra irrilevante. La miniatura viene sostituita da un quadrato nero e da una nota: RISERVATO. Ti viene ordinato di mantenere la stessa orbita.
        #DSS_2001Odyssey_bd_surveillance_MunInSpaceLow_01 = La logica di rilevamento movimento scatta su un fondo craterico che non contiene nulla più grande di ciottoli. L'evento si ripete a ogni passaggio con una temporizzazione perfetta. Il Controllo Missione lo definisce "atteso" e chiude la discussione.
        #DSS_2001Odyssey_bd_surveillance_MunInSpaceLow_02 = Il sistema sovrappone per un attimo un contorno rettangolare nitido sul terreno, poi cancella l'annotazione come se non fosse mai esistita. Da Terra chiedono solo i fotogrammi grezzi. Nessun commento, nessuna etichetta.

        // Ad Astra
        #DSS_AdAstra_magnetometer_LindorInSpaceHigh_00 = Il campo magnetico di Lindor dovrebbe apparire pulito da quassù. Invece la lettura sembra "respirare", lenti impulsi senza una causa evidente.
        #DSS_AdAstra_magnetometer_LindorInSpaceHigh_01 = Le linee di campo si incurvano verso l'esterno come se cercassero qualcosa che non c'è. Per un istante, il magnetometro insiste che qualcosa risponde.
        #DSS_AdAstra_magnetometer_LindorInSpaceHigh_02 = Un lieve ronzio costante accompagna il segnale, troppo regolare per essere rumore, troppo persistente per essere meteo. Lo segni come "di lunga durata" e ti senti a disagio.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_00 = Il computer di navigazione insiste che la nostra traiettoria è perfetta. La vista dal finestrino continua a dissentire, in piccoli modi pazienti.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_01 = Il Controllo Missione vuole numeri e sicurezza. Inviamo i numeri e teniamo la sicurezza per noi.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_02 = Ogni sistema risulta nominale, quindi continuiamo con le verifiche incrociate. La checklist inizia a sembrare una superstizione.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_03 = Il Controllo Missione vuole un aggiornamento di stato. I sistemi vogliono un aggiornamento di stato. L'equipaggio vuole smettere di fissare lo stesso numero che fluttua lentamente.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_04 = Eseguiamo la checklist, poi la eseguiamo di nuovo. È tutto nominale, tranne il fatto che il nominale continua a cambiare.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_05 = L'anomalia doveva essere solo teorica. Ora è sulla navball e all'improvviso tutti sono molto cortesi con il pilota automatico.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_06 = Nessun impatto, nessun allarme, nessun dramma... solo la sensazione quieta che ci stiamo avvicinando a qualcosa che non è mai stato spento.
        #DSS_AdAstra_bd_cosmicRay_LindorInSpace_00 = I conteggi dei raggi cosmici schizzano in alto, poi calano a scalini ordinati, come se qualcuno stesse girando una manopola che non puoi vedere.
        #DSS_AdAstra_bd_cosmicRay_LindorInSpace_01 = Il rilevatore registra uno schema ripetuto sepolto nel rumore. È troppo lento per una tempesta, troppo paziente per un incidente.
        #DSS_AdAstra_bd_cosmicRay_LindorInSpace_02 = La radiazione di fondo dovrebbe essere noiosa quaggiù. Vicino a Lindor sembra curata: filtrata, campionata e rimandata indietro con un timestamp che non ha senso.
        #DSS_AdAstra_bd_gammaRay_LindorInSpace_00 = Il contatore di raggi gamma scatta in piccoli impulsi puliti, poi si ferma come se aspettasse il permesso di continuare. Qualunque cosa ci sia quaggiù, sta ancora funzionando.
        #DSS_AdAstra_bd_rpws_LindorInSpace_00 = Le cuffie dell'RPWS si riempiono di un tono sottile e costante che rifiuta di spostarsi. Lo spazio non dovrebbe tenere una nota.
        #DSS_AdAstra_bd_rpws_LindorInSpace_01 = Raffiche di crepitii statici arrivano a intervalli perfettamente regolari. Lo etichetti "rumore di plasma" e nessuno ti crede.
        #DSS_AdAstra_bd_rpws_LindorInSpace_02 = Lo spettrogramma disegna bande pulite dove dovrebbe esserci caos, come un trasmettitore lasciato a bassa potenza per secoli.

        // Apollo
        #DSS_Apollo_crewReport_MunSrfLanded_00 = Atterraggio confermato. Motore spento. Checklist completata. Segniamo il momento come "nominale" così nessuno si agita troppo.
        #DSS_Apollo_crewReport_MunSrfLanded_01 = Leggi la checklist breve due volte, poi un'altra ancora per scaramanzia. Fuori è silenzio. Dentro ci si dà da fare fingendo che non sia un momento storico.
        #DSS_Apollo_crewReport_MunSrfLanded_02 = "Rapporto equipaggio: luce di contatto. Stabile. Sistemi verdi." Le parole sembrano molto più piccole dell'orizzonte.
        #DSS_Apollo_crewReport_MunSrfLanded_03 = Dai una lunga occhiata dal finestrino e aggiungi, con estrema calma, "Sembra che siamo su Mun." Il Controllo Missione lo sottolinea tre volte.
        #DSS_Apollo_crewReport_MunInSpaceHigh_00 = Kerbin, qui abbiamo un problema...
        #DSS_Apollo_bd_camera_MunSrfLanded_00 = Fotografia di superficie avviata. Esposizione impostata per alto contrasto. La regolite riesce comunque a sembrare ogni sfumatura di grigio, tutte insieme.
        #DSS_Apollo_bd_camera_MunSrfLanded_01 = Scatti un panorama accurato per il registro di missione. L'orizzonte è nitido, le ombre sono taglienti e nessuno pronuncia la parola "storico" alla radio.
        #DSS_Apollo_bd_camera_MunSrfLanded_02 = Un primo piano di un'impronta di stivale viene archiviato come "documentazione dell'interazione con la superficie". Il Controllo Missione ne richiede tre copie e un fotogramma.

        // Europa Report
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = Tutto sembra calmo dal finestrino, finché la piana di ghiaccio non increspa come un respiro lento. Lo registri come "illusione ottica" e ti senti meglio per esattamente tre secondi.
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = Gli strumenti di cabina segnalano "nominale" su tutta la linea. Poi il sismometro aggiunge un secondo battito che non corrisponde al tuo.
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = Una lieve luminescenza blu scorre lungo una fessura là fuori, perfettamente in sincronia con il fruscio nelle comunicazioni. Smetti di guardare e fingi che aiuti.
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = Registri con cura la temperatura e firmi. Più tardi noti che il numero è stato sovrascritto con la tua stessa grafia.
        #DSS_EuropaReport_seismicScan_VallSrfLanded_00 = Il sismometro segnala un fondo lieve e costante. Ore dopo ti accorgi che il "rumore" si ripete in impulsi perfettamente cadenzati, come se qualcosa sotto stesse mettendo alla prova il ghiaccio.
        #DSS_EuropaReport_bd_camera_VallSrfLanded_00 = Le foto sembrano del tutto ordinarie... finché non scorri indietro e noti che una cucitura scura si è spostata tra un fotogramma e l'altro. Non ricordi di aver scattato così tante foto "extra".
        #DSS_EuropaReport_bd_camera_VallSrfLanded_00 = Riprendi un ampio panorama per il registro. Più tardi, unendo le immagini, emerge una tenue curva sotto la superficie: troppo liscia per essere una crepa, troppo grande per essere un caso.
        #DSS_EuropaReport_bd_drill_VallSrfLanded_00 = Il trapano morde il ghiaccio blu con un ronzio pulito e rassicurante. Minuti dopo la punta scende di una frazione di troppo, come se avesse trovato uno strato più morbido che non dovrebbe esistere.
        #DSS_EuropaReport_bd_drill_VallSrfLanded_00 = Schegge di ghiaccio schizzano e lampeggiano come vetro sotto i fari. Quando il vassoio campioni si scalda, compare una lieve foschia, sparita quando decidi di registrarla.
        #DSS_EuropaReport_bd_gammaRay_VallInSpaceLow_00 = Lo spettro gamma indica ghiaccio e roccia puliti, finché al secondo passaggio non compare una sottile riga in più, come se avesse aspettato che ti rilassassi.
        #DSS_EuropaReport_bd_gammaRay_VallInSpaceLow_00 = Il fondo di Jool dovrebbe essere prevedibile qui, ma gli intervalli "silenziosi" del rilevatore sono stranamente rumorosi. Il Controllo Missione li segna per revisione, poi smette di parlarne.
        #DSS_EuropaReport_bd_GeigerCounter_VallSrfLanded_00 = Il contatore borbotta un po', poi si assesta su un ticchettio rassicurante e basso. Quando rivedi il log, la parte "assestata" è uno schema ripetuto che inizia prima ancora che tu abbia dispiegato il rilevatore.
        #DSS_EuropaReport_bd_GeigerCounter_VallSrfLanded_00 = I livelli di radiazione sono più alti di quanto vorresti, ma ancora plausibili. La parte strana sono i cali netti: brevi, regolari e troppo puliti per essere rumore casuale.
        #DSS_EuropaReport_bd_GeigerCounter_VallSrfLanded_00 = Schermi lo strumento con una cassetta degli attrezzi e la lettura cambia a malapena. Ore dopo ti accorgi che i picchi si allineano agli stessi scarti di timestamp a ogni prova, come se Vall stesse tenendo il tempo.
        #DSS_EuropaReport_bd_IRspec_VallInSpaceLow_00 = Lo spettro IR torna come ghiaccio ordinato e prevedibile. Al terzo passaggio compare una debole firma in banda calda esattamente dove ieri c'era il "rumore strumentale".
        #DSS_EuropaReport_bd_IRspec_VallInSpaceLow_00 = La scansione colora la superficie di blu e neri puliti, finché un sottile filamento di calore si disegna a spirale lungo una frattura e poi svanisce, come se si fosse accorto di essere osservato.
        #DSS_EuropaReport_bd_magScan_VallSrfLanded_00 = La scansione magnetica su Vall dovrebbe essere piatta. Invece l'ago dà un singolo colpo secco, come se qualcosa sotto il ghiaccio si fosse schiarito la gola.
        #DSS_EuropaReport_bd_magScan_VallSrfLanded_00 = Ruoti il sensore, ricalibri e riprovi. Il segnale torna comunque: breve, direzionale e ripetuto a intervalli che sembrano inquietantemente intenzionali.
        #DSS_EuropaReport_bd_microwaveSpec_VallInSpaceLow_00 = Lo spettro a microonde è per lo più ghiaccio anonimo e senza tratti... finché compare un picco stretto, svanisce e poi riappare all'orbita successiva sulla stessa identica traccia al suolo.
        #DSS_EuropaReport_bd_microwaveSpec_VallInSpaceLow_01 = Ti aspetti bande termiche uniformi. Invece lo strumento registra lievi increspature a spaziatura regolare, come se qualcosa sotto il ghiaccio "rispondesse" alla tua scansione e poi facesse finta di niente.
        #DSS_EuropaReport_bd_poke_VallSrfLanded_00 = Dai un colpetto prudente al ghiaccio. La superficie è durissima, ma la vibrazione che risale lungo l'attrezzo sembra... in ritardo, come un'eco da troppo in profondità.
        #DSS_EuropaReport_bd_poke_VallSrfLanded_01 = La punta della sonda affonda di pochi millimetri e si ferma. Un attimo dopo, un lieve tremore si propaga verso l'esterno in un anello perfetto... troppo ordinato per essere colpa delle tue mani tremanti.
        #DSS_EuropaReport_bd_UVspec_VallInSpaceLow_00 = La scansione nel lontano UV indica ghiaccio pulito e opaco... finché una sottile banda di fluorescenza si accende sopra una rete di fratture, poi svanisce mentre l'orbita ti porta via.
        #DSS_EuropaReport_bd_UVspec_VallInSpaceLow_01 = La calibrazione è perfetta. Riguardando, le righe di assorbimento si sono spostate di un soffio tra un passaggio e l'altro, come se la superficie si fosse modificata quando non la guardavi.
        #DSS_EuropaReport_tantares_infrared_light_camera_VallSrfLanded_00 = L'immagine a infrarossi è un foglio perfetto di freddo, finché non sovrapponi i fotogrammi e trovi una debole macchia calda che scivola di lato sotto il ghiaccio, troppo liscia per essere vento.
        #DSS_EuropaReport_tantares_infrared_light_camera_VallSrfLanded_01 = Fai una lunga esposizione per catturare "niente che succede". Più tardi, il timelapse mostra sottili linee di calore che strisciano lungo una crepa con uno schema che si ripete come un segnale lento.
        #DSS_EuropaReport_tantares_ultraviolet_light_camera_VallSrfLanded_00 = In luce visibile è solo ghiaccio piatto e pallido. In UV, sottili linee di frattura brillano con un tenue motivo a merletto che noti solo confrontando il primo e l'ultimo fotogramma.
        #DSS_EuropaReport_tantares_ultraviolet_light_camera_VallSrfLanded_01 = La fotocamera UV restituisce immagini nitide e noiose, finché un passaggio ritardato non evidenzia un alone morbido attorno al tuo sito di perforazione. Controlli i timestamp e capisci che l'alone era iniziato prima del tuo arrivo.

        // Mars One
        #DSS_MarsOne_crewReport_DunaInSpaceHigh_00 = Log pubblico: fase di crociera riuscita. Il pianeta rosso è in vista e la fiducia resta alta in tutti gli elementi della missione.
        #DSS_MarsOne_crewReport_DunaInSpaceHigh_01 = Nota privata: i dépliant promettevano margini. La console promette bip. Facciamo silenziosamente il tifo per i bip.
        #DSS_MarsOne_crewReport_DunaInSpaceLow_00 = Log pubblico: orbita di Duna raggiunta. Le operazioni di superficie procedono secondo i piani. Il team è entusiasta di iniziare la prossima fase.
        #DSS_MarsOne_crewReport_DunaInSpaceLow_01 = Nota privata: continuiamo a dire "secondo i piani" perché suona come se un piano esistesse. Il carburante per l'atterraggio dice il contrario.
        #DSS_MarsOne_crewReport_DunaSrfLanded_00 = Log pubblico: atterraggio confermato. I sistemi dell'habitat sono stabili e l'equipaggio sta stabilendo una routine sostenibile in superficie.
        #DSS_MarsOne_crewReport_DunaSrfLanded_01 = Nota privata: è tutto rosso, inclusi i filtri. Possiamo farlo funzionare, a patto che i pezzi di ricambio non si facciano venire idee.
        #DSS_MarsOne_evaReport_DunaSrfLanded_00 = Log pubblico: prima EVA su Duna completata. La stabilità del terreno è buona e la mobilità dell'equipaggio rientra nei limiti previsti.
        #DSS_MarsOne_evaReport_DunaSrfLanded_01 = Nota privata: la tuta funziona. La polvere lavora di più. È già in posti che non sapevamo esistessero.
        #DSS_MarsOne_evaReport_DunaSrfLanded_02 = Log pubblico: l'ispezione esterna dell'habitat mostra prestazioni nominali. L'ambiente è gestibile con procedure adeguate.
        #DSS_MarsOne_evaReport_DunaSrfLanded_03 = Nota privata: tra le "procedure adeguate" al momento c'è spazzolare sabbia arancione da tutto, incluso il nostro ottimismo.
        #DSS_MarsOne_evaReport_DunaSrfLanded_04 = Log pubblico: verifica comunicazioni riuscita. Le condizioni visive sono chiare e il paesaggio offre eccellenti opportunità di ricognizione.
        #DSS_MarsOne_evaReport_DunaSrfLanded_05 = Nota privata: l'orizzonte è bellissimo, in quel modo da "senza passaggio di ritorno". Gli abbiamo fatto ciao lo stesso.
        #DSS_MarsOne_evaReport_DunaSrfLanded_06 = Log pubblico: dispiegamento delle attrezzature in corso senza intoppi. I piani sulle risorse restano in linea con la tabella di marcia.
        #DSS_MarsOne_evaReport_DunaSrfLanded_07 = Nota privata: la checklist dice "dispiegare". L'hardware dice "forse più tardi". Stiamo negoziando con garbo usando una chiave inglese.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_00 = Log pubblico: test di esposizione biologica avviato. I campioni restano sigillati, stabili e pienamente entro i parametri previsti.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_01 = Nota privata: i "parametri previsti" li ha scritti qualcuno che dava per scontato di avere ricambi. Noi non abbiamo ricambi.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_02 = Log pubblico: fotocamera di crescita dispiegata con successo. Il controllo ambientale sembra adeguato per la finestra di osservazione pianificata.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_03 = Nota privata: la fotocamera è una promessa minuscola e costosa. Ora siamo noi a dover tenere in vita la promessa.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_04 = Log pubblico: il mezzo nutritivo e i campioni di controllo si comportano normalmente. Nessuna contaminazione rilevata al momento.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_05 = Nota privata: se qualcosa contamina qualcosa, il comunicato stampa lo chiamerà "adattamento inatteso".
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_06 = Log pubblico: vassoio di esposizione aperto brevemente. Interazione con la polvere di superficie registrata per successiva revisione in laboratorio.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_07 = Nota privata: la polvere di Duna ha trovato il vassoio all'istante, come se avesse un abbonamento. Probabilmente è già nelle etichette dei campioni.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_08 = Log pubblico: le letture del biomonitor restano nominali. L'esperimento continua a convalidare le proiezioni di sostenibilità della missione.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_09 = Nota privata: le proiezioni danno per scontato che "rifornimento" sia una parola vera e non una favola della buonanotte.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_10 = Log pubblico: test di fattibilità a lungo termine in corso. I risultati iniziali suggeriscono che una biologia controllata può operare in condizioni locali.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_11 = Nota privata: biologia controllata, sì. Logistica controllata, no. Stiamo facendo un esperimento dentro un esperimento.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_00 = Set immagini ufficiale: "Primi passi". Inquadratura eccellente, ombre drammatiche e il sito di atterraggio appare esattamente come pubblicizzato.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_01 = Didascalia privata: l'obiettivo continua ad appannarsi per il nostro respiro. Non è nella bozza del dépliant.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_02 = Set immagini ufficiale: ricognizione esterna dell'habitat completata. Tutti i pannelli sembrano ben fissati e le operazioni procedono secondo la tabella di marcia.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_03 = Didascalia privata: la fotocamera non riprende la parte in cui teniamo fermo un pannello mentre qualcuno dice "solo un altro scatto".
        #DSS_MarsOne_bd_camera_DunaSrfLanded_04 = Set immagini ufficiale: panorama unito con successo. Il terreno appare adatto all'espansione e alle future attività di superficie.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_05 = Didascalia privata: nel panorama si è unita anche la nostra pila di pezzi di ricambio. L'abbiamo tagliata fuori per ragioni di morale.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_06 = Set immagini ufficiale: siti di campionamento documentati. Schemi di polvere e tessitura del suolo catturati per analisi successive.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_07 = Didascalia privata: gli schemi di polvere sono "ovunque". La fotocamera adesso ha i suoi schemi di polvere.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_08 = Set immagini ufficiale: sessione di ritratti dell'equipaggio completata. Tutti appaiono sicuri e pronti per la missione che li attende.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_09 = Didascalia privata: abbiamo provato facce sicure finché gli altoparlanti della tuta non hanno più captato i sospiri.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_10 = Set immagini ufficiale: sequenza al tramonto registrata. Un simbolo appropriato di un nuovo, audace capitolo dell'esplorazione.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_11 = Didascalia privata: è bellissimo. Ci ricorda anche che il calendario continua a muoversi anche quando il piano di rientro no.
        #DSS_MarsOne_bd_cosmicRay_DunaInSpaceLow_00 = Log pubblico: i conteggi dei raggi cosmici rientrano nelle tolleranze di missione. Le prestazioni della schermatura sono considerate adeguate per continuare le operazioni.
        #DSS_MarsOne_bd_cosmicRay_DunaInSpaceLow_01 = Nota privata: "adeguate" è una parola rassicurante. Il rilevatore non è d'accordo, in modo molto energetico.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_00 = Log pubblico: ricognizione della radiazione di superficie completata. Le letture restano stabili nell'area immediata dell'habitat.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_01 = Nota privata: il suolo aiuta un po'. Il cielo compensa la differenza. Stiamo iniziando ad apprezzare pareti spesse.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_00 = Log pubblico: test di esposizione a lunga durata avviato. I dati affineranno le proiezioni per una permanenza estesa.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_01 = Nota privata: le proiezioni erano ottimistiche. Le particelle non sono interessate al nostro ottimismo.
        #DSS_MarsOne_bd_drill_DunaSrfLanded_00 = Il trapano morde la regolite crostosa, poi all'improvviso vibra come se avesse trovato qualcosa di più duro. I detriti risalgono più scuri e freddi al tatto, forse il ghiaccio che tutti promettevano.
        #DSS_MarsOne_bd_drill_DunaSrfLanded_01 = Vai più in profondità, aspettandoti ghiaccio pulito. Invece trovi una brina ostinata e polverosa che si attacca a tutto e si scioglie in una pasta inutile. "Acqua confermata" è tecnicamente vero, se strizzi gli occhi.
        #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_00 = L'idrometro insiste che qui sotto c'è idrogeno. Il Controllo Missione lo chiama "ghiaccio confermato". L'equipaggio lo chiama "forse, prima o poi, se riusciamo a raggiungerlo".
        #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_01 = Mappi una debole firma di umidità che su un grafico è splendida. Nella realtà è uno strato sottile e avaro, come se il pianeta lo avesse razionato.
        #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_02 = Le letture schizzano vicino a una zona di suolo più fredda. I numeri fanno sperare, ma i margini sono minuscoli, esattamente come il piano di missione.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Log pubblico: ciclo di germinazione avviato. I conteggi iniziali dei germogli corrispondono alle proiezioni e indicano un forte potenziale per una coltivazione sostenuta in superficie.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Nota privata: i germogli sembrano coraggiosi. Anche noi. Entrambi stiamo seguendo una tabella scritta da persone che non sono qui.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Log pubblico: umidità e livelli di luce della fotocamera di crescita restano entro bande nominali. Lo sviluppo delle foglie procede senza anomalie rilevanti.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Nota privata: "nominale" significa che il riscaldatore fa click in modo sinistro solo a volte. Ci siamo alternati a fissarlo finché non si è comportato bene.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Log pubblico: prova di ammendamento della regolite in corso. Le letture preliminari suggeriscono un assorbimento di nutrienti praticabile in condizioni controllate.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Nota privata: il suolo è soprattutto "polvere" e "rimpianto". Stiamo insegnando alle piante a ignorare entrambi.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Log pubblico: test di efficienza d'uso dell'acqua mostra un recupero migliore nel sistema a ciclo chiuso. La pianificazione delle risorse resta valida.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Nota privata: il ciclo è chiuso perché deve esserlo. Ogni goccia ha un compito e metà dei compiti sono legati al panico.

        // Munfall
        #DSS_Munfall_gravityScan_MunSrfLanded_00 = L'ago dei gravioli sobbalza con un ritmo lento e deliberato, come se Mun respirasse sotto i tuoi piedi.
        #DSS_Munfall_gravityScan_MunSrfLanded_01 = La gravità locale dice "roccia solida", poi cambia idea in silenzio. Qualunque cosa ci sia laggiù è molto brava a restare al suo posto.
        #DSS_Munfall_gravityScan_MunInSpaceLow_00 = Alla risoluzione di una bassa orbita, la massa di Mun non è irregolare... è *disposta*. La mappa sembra meno geologia e più ingegneria.
        #DSS_Munfall_gravityScan_MunInSpaceLow_01 = Le letture tracciano bordi enormi e netti dove nessun pattern di crateri dovrebbe disegnare linee rette. Il Controllo Missione ti chiede di rifare la scansione. L'hai già fatto.
        #DSS_Munfall_gravityScan_MunInSpaceHigh_00 = Da quassù, le anomalie si ricuciono in un unico schema coerente. La gravità di Mun sembra... gestita.
        #DSS_Munfall_gravityScan_MunInSpaceHigh_01 = Il rilevatore di gravioli segnala una distribuzione troppo ordinata per essere casuale. È come se qualcosa di antico avesse lasciato i "pesi" al loro posto e non fosse mai tornato.
        #DSS_Munfall_magnetometer_MunInSpaceLow_00 = Il magnetometro cattura deboli picchi ripetuti mentre passi sopra la superficie, come un circuito sepolto che fa ancora tic tac.
        #DSS_Munfall_magnetometer_MunInSpaceLow_01 = Ti aspettavi rumore e nulla. Invece ottieni bande pulite e strette di segnale, fin troppo allineate con la tua traccia al suolo
        #DSS_Munfall_magnetometer_MunInSpaceHigh_00 = Dall'orbita alta, il campo debole si risolve in un ampio schema organizzato. Mun non dovrebbe averne uno, ma ha decisamente *qualcosa*.
        #DSS_Munfall_magnetometer_MunInSpaceHigh_01 = Le letture non svaniscono con l'altitudine come farebbero chiazze minerali casuali. Qualunque cosa lo causi è profonda, coerente e ostinatamente costante.
        #DSS_Munfall_evaReport_MunInSpaceLow_00 = Mun riempie il finestrino come una minaccia silenziosa. Gli strumenti lavorano, la cabina tace e nessuno vuole essere il primo a dire "non dovrebbe fare quella cosa".
        #DSS_Munfall_evaReport_MunInSpaceLow_01 = Il timer orbitale slitta di una frazione, poi corregge, poi slitta di nuovo. Per un momento hai l'assurda impressione che Mun stia rallentando sotto di te, come se qualcosa stesse trascinando la sua traiettoria.
        #DSS_Munfall_evaReport_MunInSpaceHigh_00 = Da quassù la superficie sembra calma, ma i numeri no. Gli schemi nei dati sembrano intenzionali, nel modo in cui è intenzionale una macchina.
        #DSS_Munfall_evaReport_MunInSpaceHigh_01 = La navigazione insiste che è tutto nominale, eppure continui a controllare il moto relativo. Mun sembra esitare in orbita per un battito... poi continua, come se si fosse accorto che lo stavi guardando.
        #DSS_Munfall_bd_ALSEP_LRRR_MunSrfLanded_00 = L'impulso di ritorno è nitido e stabile... poi il tempo rientra di un soffio più corto. Per un attimo non riesci a scrollarti di dosso l'impressione che Mun si stia avvicinando a Kerbin.
        #DSS_Munfall_bd_ALSEP_LRRR_MunSrfLanded_01 = Il riflettore si comporta come hardware di precisione imbullonato nella roccia madre. I dati di distanza mostrano minuscoli scarti sistematici che sembrano meno un'orbita e più qualcosa che aggiusta la presa.
        #DSS_Munfall_bd_drill_MunSrfLanded_00 = Il trapano mastica la regolite, poi urta qualcosa che non sembra roccia. Il motore protesta e la punta torna con polvere... ma senza segni di abrasione.
        #DSS_Munfall_bd_SIGINT_MunInSpaceLow_00 = Il ricevitore si aggancia a un segnale che non dovrebbe esistere: un trillo stretto e periodico che si ripete con precisione orbitale, poi svanisce come se si fosse accorto che lo stavi ascoltando.

        // Project Hail Mary
        #DSS_PHM_bd_oso_KerbinInSpaceLow_00 = L'immagine solare contiene alcuni minuscoli puntini neri che vanno alla deriva sulla fotosfera di Kerbol. La checklist di pulizia ora include "pulire la lente, poi farsi prendere dal panico in silenzio."
        #DSS_PHM_bd_oso_KerbinInSpaceLow_01 = I puntini persistono dopo ricalibrazione, rimessa a fuoco e un colpetto deciso da parte di Bill. O sono reali, oppure lo strumento ha sviluppato una polvere molto testarda.
        #DSS_PHM_bd_oso_KerbinInSpaceLow_02 = Diversi puntini attraversano regioni più luminose senza brillare. Per particelle ordinarie, è un comportamento scortese.
        #DSS_PHM_bd_oso_KerbinInSpaceLow_03 = Le macchioline scure sembrano assorbire la luce anziché rifletterla. Il Controllo Missione chiede se Kerbol dovrebbe avere briciole.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_00 = Le immagini a lunga esposizione mostrano più puntini di quanti ne avesse registrati il primo passaggio. Il telescopio non è diventato più sporco, il che è meno rassicurante del previsto.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_01 = I puntini si radunano dove Kerbol è più luminoso, come minuscoli turisti in cerca di spuntini senza alcun rispetto per le norme di sicurezza stellare.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_02 = La fotometria mostra piccoli morsi mancanti nell'emissione solare. Nessuno scrive "morsi" nel rapporto, ma tutti lo pensano molto forte.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_03 = Lo sciame scuro è più denso di prima, e Kerbol è frazionalmente più debole esattamente nel modo sbagliato. Gene richiede una seconda copia dei dati e una tazza di caffè molto più grande.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_00 = Il segnale infrarosso include una forte emissione incompatibile con il normale plasma solare.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_01 = Sacche di calore localizzate attraversano l'immagine senza seguire il flusso del plasma. Il Controllo Missione le archivia sotto "puntini caldi in movimento" finché qualcuno non inventa una categoria meno preoccupante.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_02 = Diversi puntini scuri divampano brillantemente nell'infrarosso dopo aver attraversato la fotosfera. Sembrano mangiare luce e ruttare calore, cosa che al momento non è nel manuale.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_03 = Il rilevatore registra minuscoli oggetti che accumulano e rilasciano energia a impulsi. La loro densità energetica è decisamente troppo alta per il carburante chimico, e Bob è diventato molto silenzioso.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_00 = Il tracciamento infrarosso mostra i punti caldi muoversi indipendentemente dalla rotazione della superficie di Kerbol. È entusiasmante, purché l'entusiasmo includa un po' di terrore.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_01 = Lo spettro termico suggerisce compatte concentrazioni di energia di ordini di grandezza superiori ai propellenti noti. Wernher chiede se "noti" sia negoziabile.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_02 = L'emissione infrarossa dello sciame aumenta dopo l'esposizione diretta alla luce stellare, poi cala in impulsi ordinati. Sembra meno riscaldamento e più una ricarica.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_03 = La lettura implica un ciclo energetico sfruttabile, se qualcuno riesce a raccogliere i puntini...
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_00 = Diverse stelle distanti mostrano la stessa lenta deriva infrarossa e lo stesso schema di attenuazione. Il telescopio le etichetta come "probabilmente non a posto", cosa insolitamente emotiva per un telescopio.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_01 = Le osservazioni a lunga esposizione confermano che alcune stelle stanno svanendo in modo molto familiare. Bob sottolinea "familiare" tre volte e poi smette di sorridere.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_02 = Altre stelle restano stabili per tutto il periodo di osservazione, luminose e ostinatamente normali. Il Controllo Missione ora è molto interessato a capire perché siano così inutilmente sane.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_03 = Le stelle che si attenuano condividono una sottile firma infrarossa in eccesso, come se qualcosa stesse convertendo la luce rubata in calore di scarto. Quella frase fa venire a tutti voglia di uno snack.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_04 = Alcuni sistemi stellari vicini non mostrano alcun calo misurabile. O sono naturalmente resistenti, oppure qualcuno là fuori sta facendo un lavoro molto migliore del nostro.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_05 = I bersagli stabili non corrispondono a quelli instabili per temperatura, età o colore. Il meccanismo ignoto non ha avuto la cortesia di seguire una singola semplice regola.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_06 = La mappa del rilevamento ora ha due categorie: stelle che diventano più deboli, e stelle da investigare immediatamente prima che inizino a diventare più deboli anche loro.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_07 = Direttiva di missione aggiornata: dare priorità ai sistemi stabili per osservazioni successive. Gene aggiunge che questo non è panico, è "guardare strategicamente."
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP00 = Il telescopio rileva una firma infrarossa simile agli astrofagi attorno a Grannus, ma la luminosità della stella rimane ostinatamente costante. Bob controlla il grafico capovolto, poi lo rimette discretamente nel verso giusto.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP01 = Grannus mostra le stesse macchioline spettrali calde viste vicino a Kerbol, eppure la sua emissione non sta calando. Questo non dovrebbe essere possibile, che è una frase molto entusiasmante a meno che tu non sia nei paraggi.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP02 = Osservazioni ripetute suggeriscono che la popolazione di astrofagi attorno a Grannus sia stabile invece di moltiplicarsi fino a trasformarsi in un buffet stellare. Al Controllo Missione non piacciono i misteri che sanno contare.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP03 = L'eccesso infrarosso persiste, ma Grannus non si attenua in modo misurabile durante la finestra di osservazione. O qualcosa mantiene lo sciame in equilibrio, oppure il telescopio ha imparato il sarcasmo.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP04 = Lo sciame di astrofagi attorno a Grannus sembra alimentarsi senza crescere, che non è il modo in cui dovrebbe comportarsi qualcosa con accesso a uno spuntino grande come una stella. Gene marca il sistema come "importante" e lo sottolinea finché la matita si spezza.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP05 = La curva di attenuazione di Kerbol e la luce stabile di Grannus non concordano, nonostante entrambe mostrino firme di astrofagi. La differenza potrebbe essere un indizio, oppure è solo l'universo ad essere inutilmente teatrale.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP06 = Grannus sembra ospitare astrofagi senza perdere luminosità. Wernher chiede se le stelle possano avere sistemi immunitari, poi finge subito di aver posto una domanda più sensata.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP07 = Le letture stabili di Grannus vengono promosse da "anomalia" a "possibile soluzione". Il telescopio continua a fissare, il che è positivo, perché tutti gli altri sbattono troppo le palpebre.
        #DSS_PHM_bd_IRspec_EveInSpace_00 = Gli spettri infrarossi rivelano un tenue filamento luminoso che collega Kerbol a Eve. È troppo dritto, troppo stabile e decisamente troppo compiaciuto per essere vento solare casuale.
        #DSS_PHM_bd_IRspec_EveInSpace_01 = Il filamento mantiene una firma spettrale coerente lungo tutta la sua lunghezza. Il Controllo Missione festeggia brevemente i dati puliti, prima di rendersi conto che i dati puliti possono comunque essere terrificanti.
        #DSS_PHM_bd_IRspec_EveInSpace_02 = Il moto delle particelle all'interno della banda luminosa mostra una direzione chiara verso Eve. Bob nota che "scorrere in salita nello spazio" di solito non è nell'elenco dei fenomeni naturali.
        #DSS_PHM_bd_IRspec_EveInSpace_03 = La linea di Petrova-Kerman si risolve in un percorso coerente anziché in un pennacchio diffuso. Gene chiede che tutti smettano di chiamarla "la scia luminosa dello spuntino" nei rapporti ufficiali.
        #DSS_PHM_bd_dust_EveInSpace_00 = Il contatore di polvere registra un flusso denso di astrofagi che si muovono lungo la linea di Petrova-Kerman.
        #DSS_PHM_bd_dust_EveInSpace_01 = I conteggi salgono e scendono a impulsi, come se grumi di particelle viaggiassero in onde organizzate. Assomiglia a un'autostrada, tranne che i veicoli mangiano luce stellare e non usano le frecce.
        #DSS_PHM_bd_dust_EveInSpace_02 = Il rilevatore mappa un corridoio particellare stabile anziché una nube diffusa. Qualunque cosa stia accadendo qui, sta spostando materiale su larga scala e con imbarazzante efficienza.
        #DSS_PHM_bd_dust_EveInSpace_03 = Le misurazioni di flusso suggeriscono molti più astrofagi nella linea che nello spazio circostante. Le regioni vuote ai lati ora sembrano meno vuote e più simili a corsie d'emergenza.
        #DSS_PHM_bd_dust_EveInSpace_04 = Il flusso mantiene la sua direzione anche mentre polvere e plasma locali vanno alla deriva altrove. Le particelle naturali vagano, mentre queste sembrano fare da pendolari.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_00 = L'analizzatore rileva una concentrazione particellare insolita nell'atmosfera superiore di Eve, molto al di sopra della zuppa viola più densa sottostante. Le particelle sembrano preferire l'anidride carbonica: una preferenza strana, ma non la più strana di oggi.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_01 = Il campionamento mostra particelle simili agli astrofagi che si raggruppano dove la frazione di CO2 è più alta. Il Controllo Missione chiede se questo conti come chimica, biologia o una minuscola raccomandazione gastronomica.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_02 = Il particolato non si muove come aerosol ordinario, ma corregge rotta con movimenti coordinati attraverso l'atmosfera superiore. Bob scrive "comportamento da sciame?" e poi aggiunge tre punti interrogativi per sicurezza.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_03 = La miscela atmosferica potrebbe agire da attrattore o catalizzatore per le particelle di astrofagi. Questo ne spiegherebbe la concentrazione, e spiegherebbe anche perché nessuno vuole aprire il finestrino.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_04 = Le tracce spettrali suggeriscono che le particelle interagiscano debolmente con l'anidride carbonica di Eve prima di riemettere calore. L'analizzatore definisce la cosa "non standard", che nel linguaggio degli strumenti significa indietreggiare lentamente.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_05 = L'atmosfera superiore contiene sottili bande di flusso particellare coordinato, tutte che scivolano con una preferenza per l'aria ricca di CO2. Eve sarebbe già abbastanza inospitale di suo senza dover adescare il cielo.
        #DSS_PHM_bd_IRspec_SironaInSpace_00 = Il filamento infrarosso da Grannus converge nettamente su Sirona. Sembra meno un pianeta e più una destinazione, il che fa detestare a tutti la parola "destinazione."
        #DSS_PHM_bd_IRspec_SironaInSpace_01 = Il tracciamento spettrale conferma che la linea di Petrova-Kerman da Grannus termina nell'orbita di Sirona. La linea non vaga, non si sfuma e non si comporta come qualcosa che stia cercando di essere naturale.
        #DSS_PHM_bd_IRspec_SironaInSpace_02 = La firma energetica resta coerente lungo il filamento da Grannus, poi si dissipa bruscamente vicino a Sirona. Decidi di scansionare di nuovo, come se la ripetizione potesse renderla meno netta.
        #DSS_PHM_bd_IRspec_SironaInSpace_03 = L'intensità infrarossa cala in una regione ristretta attorno a Sirona, suggerendo che lì le particelle in arrivo stiano rilasciando o perdendo energia accumulata. Marchi il punto finale con un cerchio, poi con un cerchio più grande, poi con un cerchio molto preoccupato.
        #DSS_PHM_bd_IRspec_SironaInSpace_04 = Il filamento da Grannus si restringe avvicinandosi a Sirona, mantenendo la propria identità spettrale fino all'ultimo segmento misurabile. Lo spazio dovrebbe essere ampio, ma questo si comporta come un impianto idraulico.
        #DSS_PHM_bd_IRspec_SironaInSpace_05 = Sirona si trova esattamente dove la struttura della linea di Petrova-Kerman collassa in rumore termico diffuso. Lo chiami "punto finale confermato", e ti penti immediatamente di confermare le cose.
        #DSS_PHM_bd_dust_SironaInSpace_00 = Il contatore di polvere rileva particelle di astrofagi che si muovono sia verso Sirona sia lontano da Sirona, lungo la linea di Petrova-Kerman.
        #DSS_PHM_bd_dust_SironaInSpace_01 = I conteggi delle particelle in entrata e in uscita sono quasi uguali durante la finestra di osservazione. Il flusso netto è circa zero, il che è in qualche modo rassicurante.
        #DSS_PHM_bd_dust_SironaInSpace_02 = Il flusso attorno a Sirona non prevale in una direzione, ma semmai si alterna attorno a essa. Lo chiami equilibrio dinamico, perché "andirivieni cosmico organizzato" suonava meno professionale.
        #DSS_PHM_bd_dust_SironaInSpace_03 = Le velocità delle particelle differiscono in base alla direzione, ma il flusso totale si annulla entro l'incertezza strumentale. Dai un colpetto al display e pensi che di solito la natura ha bisogno di un motivo per essere così ordinata.
        #DSS_PHM_bd_dust_SironaInSpace_04 = La linea resta densa, attiva e strutturata pur non mostrando alcun trasporto netto. Assomiglia a uno svincolo autostradale dove ogni veicolo è fatto di cattive notizie e luce solare accumulata.
        #DSS_PHM_bd_dust_SironaInSpace_05 = Gli impatti di astrofagi arrivano in onde accoppiate, una in entrata e una in uscita, mantenendo stabile la concentrazione locale. Qualcosa qui sta bilanciando il sistema.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_00 = L'analizzatore rileva microrganismi viventi sospesi nell'atmosfera superiore, raggruppati ovunque le particelle di astrofagi siano più concentrate. Qualcosa qui sta mangiando i mangiastelle, che è la migliore brutta notizia che qualcuno abbia sentito oggi.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_01 = Il campionamento microscopico rivela agenti biologici attivi che interagiscono direttamente con gli astrofagi. Proponi il nome "Sironameba", poi ti rifiuti di lasciare che qualcuno lo metta ai voti.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_02 = Gli organismi sembrano nutrirsi di astrofagi o legarsi a essi in una relazione ecologica strettamente accoppiata. Che si tratti di predazione o simbiosi, gli astrofagi non sembrano avere la meglio.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_03 = I conteggi delle particelle calano bruscamente nelle masse d'aria ricche di sironamebe. L'atmosfera superiore potrebbe comportarsi meno come una trappola e più come un minuscolo buffet.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_04 = La modellazione della popolazione suggerisce che i microrganismi limitino la crescita degli astrofagi prima che diventi esponenziale. Il Controllo Missione esulta brevemente, poi ricorda che il Sistema di Kerbol non ne ha ancora nessuno.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_05 = Il campione atmosferico contiene un possibile meccanismo di controllo biologico per gli astrofagi! Gene lo marca come soluzione candidata per salvare Kerbol, lo sottolinea due volte e dice a tutti di non festeggiare mentre festeggia platealmente.
        
        // Solaris
        #DSS_Solaris_crewReport_LaytheFlyingLow_00 = Le onde sotto avanzano in file ordinate che ignorano il vento. Gli strumenti sono calmi, l'equipaggio no.
        #DSS_Solaris_crewReport_LaytheFlyingLow_01 = Inclini per seguire le creste bianche, ma loro restano indietro di un battito rispetto al velivolo. Il Controllo Missione suggerisce "meno poesia, più prua".
        #DSS_Solaris_crewReport_LaytheFlyingLow_02 = Gli spruzzi lampeggiano come specchi, ma il tuo riflesso al loro interno gira il casco con un attimo di ritardo. Lo registri come "illusione ottica (probabile)".
        #DSS_Solaris_crewReport_LaytheFlyingHigh_00 = Dalle nubi, Laythe sembra il simulatore di addestramento impostato su "Kerbin". Poi le celle di tempesta lampeggiano con uno schema che non è meteo.
        #DSS_Solaris_crewReport_LaytheFlyingHigh_01 = La luce del sole sul mare crea un luccichio perfetto che segue la nave anche quando ti giri. La fotocamera insiste che non c'è nulla che non va.
        #DSS_Solaris_crewReport_LaytheFlyingHigh_02 = L'ombra del velivolo scivola sull'oceano e sembra esitare ai bordi. Controlli l'orologio, poi fai finta di niente.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_00 = L'orbita sembra confortevole finché non noti che la linea giorno-notte è troppo pulita, come se qualcuno l'avesse tracciata con un righello.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_01 = Il mare riflette Jool come una macchia verde, poi la macchia si rimette a posto di colpo, come se si fosse ricordata di comportarsi bene. Non lo menzioni via radio.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_02 = I sistemi segnalano "nominale". L'equipaggio segnala "osservati da un grande corpo d'acqua". Entrambi finiscono archiviati sotto "nominale".
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_00 = Laythe è una perlina azzurra pallida, quasi amichevole. Resta centrata nel finestrino fin troppo facilmente mentre derivi.
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_01 = Il luccichio dell'oceano pulsa lentamente. Non con la rotazione, ma con qualcosa che sembra attenzione. Il Controllo Missione chiede numeri, tu gli dai silenzio.
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_02 = Inizi a paragonare Laythe a casa per tenere alto il morale, poi ti fermi. Le somiglianze sono facili: le differenze sembrano deliberate.
        #DSS_Solaris_crewReport_LaytheFlyingLow_00 = Le onde sotto avanzano in file ordinate che ignorano il vento. Gli strumenti sono calmi, l'equipaggio no.
        #DSS_Solaris_crewReport_LaytheFlyingLow_01 = Inclini per seguire le creste bianche, ma loro restano indietro di un battito rispetto al velivolo. Il Controllo Missione suggerisce "meno poesia, più prua".
        #DSS_Solaris_crewReport_LaytheFlyingLow_02 = Gli spruzzi lampeggiano come specchi, ma il tuo riflesso al loro interno gira il casco con un attimo di ritardo. Lo registri come "illusione ottica (probabile)".
        #DSS_Solaris_crewReport_NodensFlyingHigh_00 = Dalle nubi, Nodens sembra il simulatore di addestramento impostato su "Kerbin". Poi le celle di tempesta lampeggiano con uno schema che non è meteo.
        #DSS_Solaris_crewReport_LaytheFlyingHigh_01 = La luce del sole sul mare crea un luccichio perfetto che segue la nave anche quando ti giri. La fotocamera insiste che non c'è nulla che non va.
        #DSS_Solaris_crewReport_LaytheFlyingHigh_02 = L'ombra del velivolo scivola sull'oceano e sembra esitare ai bordi. Controlli l'orologio, poi fai finta di niente.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_00 = L'orbita sembra confortevole finché non noti che la linea giorno-notte è troppo pulita, come se qualcuno l'avesse tracciata con un righello.
        #DSS_Solaris_crewReport_NodensInSpaceLow_01 = Il mare riflette Grannus come una macchia rossa, poi la macchia si rimette a posto di colpo, come se si fosse ricordata di comportarsi bene. Non lo menzioni via radio.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_02 = I sistemi segnalano "nominale". L'equipaggio segnala "osservati da un grande corpo d'acqua". Entrambi finiscono archiviati sotto "nominale".
        #DSS_Solaris_crewReport_NodensInSpaceHigh_00 = Nodens è una perlina azzurra pallida, quasi amichevole. Resta centrata nel finestrino fin troppo facilmente mentre derivi.
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_01 = Il luccichio dell'oceano pulsa lentamente. Non con la rotazione, ma con qualcosa che sembra attenzione. Il Controllo Missione chiede numeri, tu gli dai silenzio.
        #DSS_Solaris_crewReport_NodensInSpaceHigh_02 = Inizi a paragonare Nodens a casa per tenere alto il morale, poi ti fermi. Le somiglianze sono facili: le differenze sembrano deliberate.
        #DSS_Solaris_evaReport_LaytheSrfLanded_00 = Metti piede sul terreno di Laythe e senti subito come se l'avessi già fatto. La tuta registra "nominale", mentre l'oceano ti fissa.
        #DSS_Solaris_evaReport_LaytheSrfLanded_01 = La visiera cattura un riflesso nitido in una pozzanghera poco profonda. Copia i tuoi movimenti con un piccolo ritardo, come se aspettasse approvazione.
        #DSS_Solaris_evaReport_LaytheSrfLanded_02 = Il vento dice una cosa, le onde ne fanno un'altra. Pianti comunque una bandiera, poi noti che il moto ondoso tiene il tempo con le pompe della tua tuta.
        #DSS_Solaris_evaReport_NodensSrfLanded_00 = Metti piede sul terreno di Nodens e senti subito come se l'avessi già fatto. La tuta registra "nominale", mentre l'oceano ti fissa.
        #DSS_Solaris_evaReport_LaytheSrfLanded_01 = La visiera cattura un riflesso nitido in una pozzanghera poco profonda. Copia i tuoi movimenti con un piccolo ritardo, come se aspettasse approvazione.
        #DSS_Solaris_evaReport_LaytheSrfLanded_02 = Il vento dice una cosa, le onde ne fanno un'altra. Pianti comunque una bandiera, poi noti che il moto ondoso tiene il tempo con le pompe della tua tuta.
        #DSS_Solaris_bd_camera_LaytheSrfLanded_00 = Scatti un panorama accurato della linea di costa. Nell'anteprima, il riflesso dell'oceano mostra qualcosa alle tue spalle che di certo non c'è.
        #DSS_Solaris_bd_camera_LaytheSrfLanded_01 = Ogni foto sembra normale finché non confronti i timestamp. La fotocamera insiste che hai premuto l'otturatore un attimo più tardi di quanto ricordi.
        #DSS_Solaris_bd_camera_LaytheSrfSplashed_00 = Uno scatto di superficie delle onde torna incredibilmente nitido. Più nitido di quanto la visiera possa vedere. Sembra che sia l'acqua a mettere a fuoco.
        #DSS_Solaris_bd_camera_LaytheSrfSplashed_01 = L'obiettivo cattura un luccichio brillante che non si muove con l'angolo del sole. Segue la fotocamera come se cercasse di restare nell'inquadratura.
        #DSS_Solaris_bd_camera_LaytheFlyingLow_00 = Le riprese a bassa quota mostrano creste bianche che si allineano in file ordinate e ignorano il vento. Il moto sembra messo in scena, ma il mare non sta prendendo indicazioni.
        #DSS_Solaris_bd_camera_LaytheFlyingLow_01 = Registri gli spruzzi sulle creste. In riproduzione, le gocce fluttuano controvento per diversi fotogrammi, poi "si ricordano" della gravità e cadono.
        #DSS_Solaris_bd_camera_LaytheFlyingHigh_00 = Da alta quota, le ombre delle nubi scorrono sull'acqua nella direzione sbagliata. Le foto sono perfette, la scena no.
        #DSS_Solaris_bd_camera_LaytheFlyingHigh_01 = L'autofocus continua a scattare su una chiazza vuota d'oceano, come se fosse un punto di interesse. Non hai selezionato alcun bersaglio.
        #DSS_Solaris_bd_camera_LaytheInSpaceLow_00 = Le immagini orbitali mostrano il riflesso speculare che segue la tua traccia, restando centrato come uno spettatore educato.
        #DSS_Solaris_bd_camera_LaytheInSpaceLow_01 = Provi una lunga esposizione sul lato notturno. Il mare restituisce deboli striature regolari: troppo equidistanti per essere onde, troppo morbide per essere luci.
        #DSS_Solaris_bd_camera_LaytheInSpaceHigh_00 = Le foto dell'intero disco sono rassicuranti finché non le sovrapponi. I dettagli di Laythe slittano di una frazione, come se il pianeta fosse leggermente fuori sincronia con se stesso.
        #DSS_Solaris_bd_camera_LaytheInSpaceHigh_01 = La fotocamera cattura un mondo blu, pulito e calmo. Poi gli artefatti di compressione formano un anello ordinato attorno agli oceani, come se la superficie si stesse delineando.
        #DSS_Solaris_bd_camera_LaytheSrfLanded_00 = Scatti un panorama accurato della linea di costa. Nell'anteprima, il riflesso dell'oceano mostra qualcosa alle tue spalle che di certo non c'è.
        #DSS_Solaris_bd_camera_LaytheSrfLanded_01 = Ogni foto sembra normale finché non confronti i timestamp. La fotocamera insiste che hai premuto l'otturatore un attimo più tardi di quanto ricordi.
        #DSS_Solaris_bd_camera_LaytheSrfSplashed_00 = Uno scatto di superficie delle onde torna incredibilmente nitido. Più nitido di quanto la visiera possa vedere. Sembra che sia l'acqua a mettere a fuoco.
