@EXPERIMENT_DEFINITION:HAS[#id[bd_SoilMoisture]]
{
    %RESULTS
    {
        EdnaInSpaceLow* = #JNSQscience_bd_SoilMoisture_EdnaInSpaceLow_00 // The microwaves come back with a very clear message: “Dry.” Any water is hiding deeper down, stubbornly frozen into the dark regolith.
        EdnaInSpaceLow* = #JNSQscience_bd_SoilMoisture_EdnaInSpaceLow_01 // The sensor reports a few “damp” speckles, then you remember the instrument is colder than the soil and is frosting itself. Edna remains unimpressed.

        DakInSpaceLow* = #JNSQscience_bd_SoilMoisture_DakInSpaceLow_00 // The readout asks where the “soil” is, then settles for measuring a thin dusting of grit. Moisture content: basically none.
        DakInSpaceLow* = #JNSQscience_bd_SoilMoisture_DakInSpaceLow_01 // A couple of “wet” patches turn out to be shiny rocks bouncing microwaves straight back at you. Dak is still a very dry potato.

        KrelInSpaceLow* = #JNSQscience_bd_SoilMoisture_KrelInSpaceLow_00 // The L-band returns are almost boringly flat. If Krel has water, it’s sealed away deep and frozen solid.
        KrelInSpaceLow* = #JNSQscience_bd_SoilMoisture_KrelInSpaceLow_01 // A faint “wet” patch appears, then vanishes when you correct for viewing angle. Krel’s pale skin is just good at fooling instruments.

        AdenInSpaceLow* = #JNSQscience_bd_SoilMoisture_AdenInSpaceLow_00 // The map paints Aden as uniformly dry. It’s mostly dust and rock, with no hint of near-surface moisture.
        AdenInSpaceLow* = #JNSQscience_bd_SoilMoisture_AdenInSpaceLow_01 // One pixel insists it’s damp. It lines up perfectly with a specular reflection and your antenna geometry. False alarm.

        HuygenInSpaceLow* = #JNSQscience_bd_SoilMoisture_HuygenInSpaceLow_00 // The thick haze chews on the signal, but the processed data still shows broad “wet-looking” regions. The lab notes add: “composition uncertain.”
        HuygenInSpaceLow* = #JNSQscience_bd_SoilMoisture_HuygenInSpaceLow_01 // The algorithm confidently reports “moist soil.” The calibration team confidently reports “not so fast.” You file it under “bring a lander.”

        RigaInSpaceLow* = #JNSQscience_bd_SoilMoisture_RigaInSpaceLow_00 // A few areas show dielectric hints consistent with shallow frost or buried ice. Riga flirts with being friendly, then remembers it’s Riga.
        RigaInSpaceLow* = #JNSQscience_bd_SoilMoisture_RigaInSpaceLow_01 // Most returns read as dry regolith. The brightest “wet” spots are smooth plains acting like microwave mirrors, not mud.

        TalosInSpaceLow* = #JNSQscience_bd_SoilMoisture_TalosInSpaceLow_00 // Moisture stays flatlined across Talos’ vivid color bands. Whatever makes those hues, it isn’t water.
        TalosInSpaceLow* = #JNSQscience_bd_SoilMoisture_TalosInSpaceLow_01 // Slightly higher water-equivalent readings cluster in the coldest craters, suggesting a thin veneer of stubborn frost rather than true damp soil.

        CelesInSpaceLow* = #JNSQscience_bd_SoilMoisture_CelesInSpaceLow_00 // The L-band returns are crisp and stubbornly dry. Any water is either locked up deep, or not actually water at all.
        CelesInSpaceLow* = #JNSQscience_bd_SoilMoisture_CelesInSpaceLow_01 // A few “moist” pixels appear until you account for the viewing angle. Celes’ surface is just very good at lying to microwaves.

        TamInSpaceLow* = #JNSQscience_bd_SoilMoisture_TamInSpaceLow_00 // The signal is noisy and patchy over Tam’s lumpy little body, but the conclusion is consistent: there’s no meaningful near-surface moisture.
        TamInSpaceLow* = #JNSQscience_bd_SoilMoisture_TamInSpaceLow_01 // Several “wet spots” line up with shiny facets. You log them as reflections and wonder if Tam’s belt-buckle shape is messing with the geometry.

        HamekInSpaceLow* = #JNSQscience_bd_SoilMoisture_HamekInSpaceLow_00 // The dielectric hints come back higher than expected for pure ice. Whatever makes Hamek so red, it’s probably what you’re measuring—not mud.
        HamekInSpaceLow* = #JNSQscience_bd_SoilMoisture_HamekInSpaceLow_01 // You search for shallow frost signatures and find only thin, inconsistent traces. If Hamek has water, it’s hiding beneath a very strange veneer.

        NaraInSpaceLow* = #JNSQscience_bd_SoilMoisture_NaraInSpaceLow_00 // The instrument keeps insisting the “ground” is very wet, then remembers Nara doesn’t really have one. You’re mostly measuring deep atmosphere, not soil.
        NaraInSpaceLow* = #JNSQscience_bd_SoilMoisture_NaraInSpaceLow_01 // L-band returns fluctuate with cloud bands and pressure layers. The moisture model throws up its hands and files the result under “not regolith.”

        AmosInSpaceLow* = #JNSQscience_bd_SoilMoisture_AmosInSpaceLow_00 // The microwave map comes back almost uniformly dry. Any water here is locked up as stubborn ice, buried well below a powdery skin.
        AmosInSpaceLow* = #JNSQscience_bd_SoilMoisture_AmosInSpaceLow_01 // A few shadowed craters read slightly “damp” in the processing. You tag them as probable frost traps and make a note for a closer pass.

        EnonInSpaceLow* = #JNSQscience_bd_SoilMoisture_EnonInSpaceLow_00 // Broad, consistent emissions suggest an icy surface hiding just under a thin layer of dust. “Soil moisture” is basically “how much ice is pretending to be dirt.”
        EnonInSpaceLow* = #JNSQscience_bd_SoilMoisture_EnonInSpaceLow_01 // Some regions look drier than expected, as if a blanket of insulating grit is masking the ice below. Enon’s surface is playing keep-away with your signal.

        PraxInSpaceLow* = #JNSQscience_bd_SoilMoisture_PraxInSpaceLow_00 // Returns vary in mottled patches, hinting at a mix of clean ice and rocky debris. Impact scars look like they’ve freshly excavated the “wettest” material.
        PraxInSpaceLow* = #JNSQscience_bd_SoilMoisture_PraxInSpaceLow_01 // The coldest terrain shows slightly higher water-equivalent readings. If Prax has anything resembling moisture, it’s frost welded into the top layers.
    }
}