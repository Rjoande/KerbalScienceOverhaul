        #JNSQscience_gravityScan_RigaInSpaceHighPoles_00 = In orbita alta i poli risultano quasi uniformi, con solo un debole scarto che suggerisce "qualcosa di diverso" e nulla di più specifico.
        #JNSQscience_gravityScan_TalosSrfLandedLowlands_00 = I gravioli derivano in un motivo ordinato e noioso, poi sussultano leggermente, come se i bassopiani stessero nascondendo qualche pesante segreto.
        #JNSQscience_gravityScan_TalosSrfLandedMidlands_00 = Qui la gravità ondeggia quanto basta per suggerire che le pianure siano fratturate e impacchettate in modo irregolare, come un mix di snack che non si è mai assestato bene.
        #JNSQscience_gravityScan_TalosSrfLandedHighlands_00 = Il rilevatore segnala una trazione stabile e più forte: le colline sembrano costruite con materiale più denso delle distese sottostanti.
        #JNSQscience_gravityScan_TalosSrfLandedMountains_00 = Le letture hanno picchi e cali mentre ti muovi: o queste montagne sono incredibilmente solide, oppure Talos sta giocando con la tua matematica.
        #JNSQscience_gravityScan_TalosSrfLandedPoles_00 = I gravioli continuano a correggersi, suggerendo un curioso equilibrio di massa ai poli. Qui c'è qualcosa di più pesante di quanto il paesaggio ammetta.
        #JNSQscience_gravityScan_TalosInSpaceLowLowlands_00 = In orbita bassa sui bassopiani, la scansione mostra anomalie lievi e ampie. Abbastanza sottili da essere fastidiose, abbastanza utili da essere scienza.
