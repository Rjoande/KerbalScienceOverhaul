        #JNSQscience_bd_multiSpec_TalosInSpaceLowMidlands_00 = Le Midlands mostrano chiazze irregolari che si allineano male tra i canali, implicando dimensioni di granelli miste o tutto mischiato. Talos si rifiuta di essere catalogato con ordine.
