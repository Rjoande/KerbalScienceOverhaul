@EXPERIMENT_DEFINITION:HAS[#id[bd_pegasus]]
{
	@title = #ScienceRefactor_bd_pegasus_title // Advanced Micrometeoroid Impact Detector Data
	!RESULTS{}
    %RESULTS
	{
		default = #ScienceRefactor_bd_pegasus_default_00 // The instrument records impacts to estimate the density of micrometeorites at specific altitudes.
		InSpace* = #ScienceRefactor_bd_pegasus_default_01 // You register several small micrometeorite collisions in a span of minutes. Perhaps you passed through some sort of debris field. 
		InSpace* = #ScienceRefactor_bd_pegasus_default_01 // Woah! That last micrometeorite nearly punched through the detector! Perhaps we need thicker panels on future spacecraft.

		SunInSpace* = #ScienceRefactor_bd_pegasus_SunInSpace_00 // Micrometeorite impacts are detected in higher quantities in solar orbit than in the orbits of planets, yet less impacts are detected than expected.
		SunInSpaceLow* = #ScienceRefactor_bd_pegasus_SunInSpaceLow_00 // At such a close distance from the Sun, there are very little impacts detected. 

		KerbinInSpace* = #ScienceRefactor_bd_pegasus_KerbinInSpace_00 // The instrument records impacts to estimate the density of micrometeorites at specific altitudes around Kerbin.
		KerbinInSpaceLow* = #ScienceRefactor_bd_pegasus_KerbinInSpaceLow_00 // At lower orbits, micrometeorite impacts appear to be much more frequent.
		KerbinInSpaceLow* = #ScienceRefactor_bd_pegasus_KerbinInSpaceLow_01 // Woah! That last micrometeorite nearly punched through the detector! Perhaps we need thicker panels on future spacecraft.
		KerbinInSpaceHigh* = #ScienceRefactor_bd_pegasus_KerbinInSpaceHigh_00 // The detector seems to detect less micrometeorite impacts than expected in higher orbits.

		MunInSpace* = #ScienceRefactor_bd_pegasus_MunInSpace_00 // The instrument records impacts to estimate the density of micrometeorites at specific altitudes around the Mun. 
		MunInSpaceLow* = #ScienceRefactor_bd_pegasus_MunInSpaceLow_00 // Very little micrometeorite impacts are detected in low Munar orbit.
		MunInSpaceHigh* = #ScienceRefactor_bd_pegasus_MunInSpaceHigh_00 // So far there seems to be less micrometeorite impacts around the Mun than around Kerbin.

		MinmusInSpace* = #ScienceRefactor_bd_pegasus_MinmusInSpace_00 // The instrument records impacts to estimate the density of micrometeorites at specific altitudes around Minmus. 
		MinmusInSpaceLow* = #ScienceRefactor_bd_pegasus_MinmusInSpaceLow_00 // The loose dust cloud around Minmus seems to generate a lot of micrometeorite impacts. Use caution.
		MinmusInSpaceHigh* = #ScienceRefactor_bd_pegasus_MinmusInSpaceHigh_00 // There already seems too be a lot more micrometeorite impacts than expected in Minmus orbit.

        EarthInSpace* = #ScienceRefactor_bd_pegasus_EarthInSpace_00 // The instrument records impacts to estimate the density of micrometeorites at specific altitudes around Earth.
		EarthInSpaceLow* = #ScienceRefactor_bd_pegasus_EarthInSpaceLow_00 // At lower orbits, micrometeorite impacts appear to be much more frequent.
		EarthInSpaceLow* = #ScienceRefactor_bd_pegasus_EarthInSpaceLow_01 // Woah! That last micrometeorite nearly punched through the detector! Perhaps we need thicker panels on future spacecraft.
		EarthInSpaceHigh* = #ScienceRefactor_bd_pegasus_EarthInSpaceHigh_00 // The detector seems to detect less micrometeorite impacts than expected in higher orbits.

		MoonInSpace* = #ScienceRefactor_bd_pegasus_MoonInSpace_00 // The instrument records impacts to estimate the density of micrometeorites at specific altitudes around the Moon.
		MoonInSpaceLow* = #ScienceRefactor_bd_pegasus_MoonInSpaceLow_00 // Very little micrometeorite impacts are detected in low Lunar orbit.
		MoonInSpaceHigh* = #ScienceRefactor_bd_pegasus_MoonInSpaceHigh_00 // So far there seems to be less micrometeorite impacts around the Moon than around Earth.
	}
}