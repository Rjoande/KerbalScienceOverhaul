@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
    %RESULTS
    {
		GrannusFlyingLow* = #GEPscience_bd_camera_GrannusFlyingLow_00 // The viewfinder fills with a dim red glare and your exposure settings immediately surrender. You label the photo “definitely a star” and hope the downlink survives the heat.
		GrannusFlyingLow* = #GEPscience_bd_camera_GrannusFlyingLow_01 // The camera captures boiling patterns in the crimson haze, then politely refuses to keep the shutter open. The first compressed frame arrives at Mission Control long after you’ve stopped blinking.
		GrannusFlyingHigh* = #GEPscience_bd_camera_GrannusFlyingHigh_00 // The red sun hangs below you like a smoldering workshop light, but the camera finally finds a setting that isn’t “white-hot.” The color balance is still arguing with itself.
		GrannusFlyingHigh* = #GEPscience_bd_camera_GrannusFlyingHigh_01 // You take a panorama of the vast ruddy glow and realize there’s no horizon to anchor your eyes. Even the timestamp feels lonely out here.
		GrannusInSpaceHigh* = #GEPscience_bd_camera_GrannusInSpaceHigh_00 // From this distance the red sun looks calm, like it’s pretending not to be dangerous. The file transfer takes so long you start naming the pixels.
		GrannusInSpaceHigh* = #GEPscience_bd_camera_GrannusInSpaceHigh_01 // The camera catches a dark, empty sky around an ember-bright disc. The silence in the image is almost louder than the radio.
		GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthPolarZone_00 // The lens picks up faint streaks and mottled brightness near the pole, like the star is combing its own light. You add a note: “Do not stare at photos for comfort.”
		GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthPolarZone_01 // A crisp polar shot reveals subtle texture in the red glow that refuses to sit still. The downlinked frame arrives with a reminder that “time zones” don’t help you here.
		GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthSubpolarZone_00 // The subpolar view shows a gentle gradient from deep maroon to angry orange. Your camera insists it’s art; your report insists it’s data.
		GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthSubpolarZone_01 // You capture a thin wavering edge where the brightness changes abruptly, then it’s gone. The delay means Mission Control reacts to your “wow” a few hours late.
		GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthTemperateZone_00 // The image shows a restless, granular-looking sheen under the red light. You pretend you meant to photograph “dynamic features” all along.
		GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthTemperateZone_01 // A series of frames suggests the surface patterns drift between shots. You try to make a timelapse, but the upload window is shorter than your patience.
		GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthTropicZone_00 // The tropic zone looks like ripples frozen mid-motion, tinted the color of old warning lights. You feel very far away from anything that would call this “sunny.”
		GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_camera_GrannusInSpaceLowNorthTropicZone_01 // You take two identical shots and they come back looking different anyway. The star seems to be moving the scenery just to prove it can.
		GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_camera_GrannusInSpaceLowEquatorialZone_00 // The equatorial band appears brighter and more turbulent, as if the red sun is stretching itself. The camera’s auto-focus quietly gives up and lets you decide what’s “sharp.”
		GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_camera_GrannusInSpaceLowEquatorialZone_01 // A long exposure turns the red glow into a smooth sheet with faint darker veins. You wonder if the star has weather, then remember you’re asking that while floating.
		GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthTropicZone_00 // The southern tropics show a soft, rolling texture that makes your brain search for familiar clouds. You stop it before it invents familiar.
		GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthTropicZone_01 // The camera captures a delicate brightness gradient that looks like a slow breath. It’s unsettling how something so huge can look quiet.
		GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthTemperateZone_00 // The red light here is dimmer, but it still overwhelms half your sensor. You file the result as “successfully not blind.”
		GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthTemperateZone_01 // Subtle banding shows up after processing, like the star left fingerprints on the image. Mission Control asks for calibration frames; you ask for a faster antenna.
		GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthSubpolarZone_00 // The subpolar region looks smoother at first glance, until you zoom in and see it crawling with tiny variations. The radio delay makes it feel like you’re sending postcards across an ocean.
		GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthSubpolarZone_01 // You capture the red limb fading into black space and suddenly miss having a normal “up.” The camera doesn’t miss anything; it just keeps clicking.
		GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthPolarZone_00 // The south pole shot comes back with a stark contrast between deep red and absolute black. It’s hard to believe there’s a whole universe outside this ember.
		GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_camera_GrannusInSpaceLowSouthPolarZone_01 // Fine structure appears near the pole like faint brush strokes in glowing paint. You double-check the lens for dust and find only your own unease.

		TaranisSrfLandedMagmaShores* = #GEPscience_bd_camera_TaranisSrfLandedMagmaShores_00 // The shoreline glows like a warning label you can stand on. You take a photo and immediately regret how warm your camera feels.
		TaranisSrfLandedMagmaShores* = #GEPscience_bd_camera_TaranisSrfLandedMagmaShores_01 // The red sun’s dim light still makes the magma look brighter than it should be. The image comes out crisp, right before the lens hood starts to smell funny.
		TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_camera_TaranisSrfLandedScorchedLowlands_00 // The baked ground looks dark and glassy, like it tried to melt and changed its mind. Your shadow is sharp, but it points in a direction that doesn’t feel like “day.”
		TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_camera_TaranisSrfLandedScorchedLowlands_01 // The camera catches heat shimmer over scorched flats even without air to carry it. The photo feels too still for a place this extreme.
		TaranisSrfLandedMidlands* = #GEPscience_bd_camera_TaranisSrfLandedMidlands_00 // The midlands are a patchwork of cracked rock and long, harsh shadows. You annotate the photo with “bring more delta-v and fewer feelings.”
		TaranisSrfLandedMidlands* = #GEPscience_bd_camera_TaranisSrfLandedMidlands_01 // Without clouds or haze, every ridge looks close enough to touch. You zoom in and remember how far “help” actually is.
		TaranisSrfLandedHighlands* = #GEPscience_bd_camera_TaranisSrfLandedHighlands_00 // High ground gives a view of a brutal horizon split between blazing and black. The camera’s meter can’t decide which half of the world you’re on.
		TaranisSrfLandedHighlands* = #GEPscience_bd_camera_TaranisSrfLandedHighlands_01 // You photograph jagged peaks that look heat-burned on one face and frostbitten on the other. The result makes your helmet lights feel unnecessary.
		TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_camera_TaranisSrfLandedDarkSideMidlands_00 // The dark side midlands photograph as a landscape of ink and silver, lit by a distant red ember. You add a note: “Night has weight here.”
		TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_camera_TaranisSrfLandedDarkSideMidlands_01 // The camera picks up faint sparkle on the ground where cold has polished the rock. The downlink takes long enough that the photo feels like it’s from a different mission.
		TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_camera_TaranisSrfLandedDarkSideHighlands_00 // The dark highlands rise like frozen waves, with no color except what your lamps invent. You take two shots to prove it’s real.
		TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_camera_TaranisSrfLandedDarkSideHighlands_01 // The horizon is sharp enough to cut your thoughts. The camera captures it perfectly, then politely asks for a warmer environment it will never get.
		TaranisSrfLandedPoles* = #GEPscience_bd_camera_TaranisSrfLandedPoles_00 // At the poles, the light arrives at a strange angle and never looks trustworthy. Your photo log starts using words like “sideways noon.”
		TaranisSrfLandedPoles* = #GEPscience_bd_camera_TaranisSrfLandedPoles_01 // The terrain is stark and pale under red-tinted glare, with shadows that stretch forever. You feel like the planet is trying to hide its scale from you.
		TaranisSrfSplashedMagmaSea* = #GEPscience_bd_camera_TaranisSrfSplashedMagmaSea_00 // You take a picture while “splashed” and immediately reconsider your definition of “liquid.” The frame is beautiful in a terrifying, equipment-melting way.
		TaranisSrfSplashedMagmaSea* = #GEPscience_bd_camera_TaranisSrfSplashedMagmaSea_01 // The magma’s surface looks slow and thick, reflecting the dim red sun like dull metal. The camera records a bright smear where the heat tries to erase your settings.
		TaranisSrfSplashedMagmaShores* = #GEPscience_bd_camera_TaranisSrfSplashedMagmaShores_00 // The camera captures the moment the shoreline crust cracks and glows underneath. You label it “shoreline dynamics” and do not mention the panic.
		TaranisSrfSplashedMagmaShores* = #GEPscience_bd_camera_TaranisSrfSplashedMagmaShores_01 // Bright orange veins crawl through dark rock at the waterline-that-isn’t-water. The transmission arrives late, but the alarmed reply arrives even later.
		TaranisInSpaceHigh* = #GEPscience_bd_camera_TaranisInSpaceHigh_00 // From high orbit, Taranis is a small, violent coin split into fire and darkness. The terminator line looks sharper than your future.
		TaranisInSpaceHigh* = #GEPscience_bd_camera_TaranisInSpaceHigh_01 // The dim red sun makes the bright side look like it’s lit by an old furnace. You wait through the long delay to hear Mission Control say, “Take more pictures.”
		TaranisInSpaceLowMagmaSea* = #GEPscience_bd_camera_TaranisInSpaceLowMagmaSea_00 // Low-orbit images show the magma sea as a glowing patch that refuses to behave like an ocean. You zoom in and watch the brightness chew at the sensor.
		TaranisInSpaceLowMagmaSea* = #GEPscience_bd_camera_TaranisInSpaceLowMagmaSea_01 // The camera catches slow-moving patterns on the molten surface, like a planet trying to stir itself. The file compresses poorly, as if even the data is overheated.
		TaranisInSpaceLowMagmaShores* = #GEPscience_bd_camera_TaranisInSpaceLowMagmaShores_00 // The shore forms jagged black margins around orange glow, like burnt paper around a flame. You take a mosaic and realize you’re mapping a place no one can casually visit.
		TaranisInSpaceLowMagmaShores* = #GEPscience_bd_camera_TaranisInSpaceLowMagmaShores_01 // The boundary between solid and molten looks freshly drawn every orbit. Your report mentions “active resurfacing” and “very bad swimming.”
		TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_camera_TaranisInSpaceLowScorchedLowlands_00 // The scorched lowlands look like dark glass with faint cracks that catch the red light. With no haze, the scene feels too close and too far at once.
		TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_camera_TaranisInSpaceLowScorchedLowlands_01 // You capture long shadows that don’t seem to move the way your instincts expect. You start using landmarks instead of “morning” and “evening.”
		TaranisInSpaceLowMidlands* = #GEPscience_bd_camera_TaranisInSpaceLowMidlands_00 // The midlands show rough textures and sharp ridges, highlighted by the low, ruddy sun angle. You take extra shots because the lighting makes everything look suspicious.
		TaranisInSpaceLowMidlands* = #GEPscience_bd_camera_TaranisInSpaceLowMidlands_01 // A zoomed frame reveals tiny craterlets everywhere, as if the planet’s been sandblasted by space itself. You wonder how long it took to get like this, then remember the red sun is impatient.
		TaranisInSpaceLowHighlands* = #GEPscience_bd_camera_TaranisInSpaceLowHighlands_00 // The highlands cast knife-edge shadows across a surface that looks half-baked, half-frozen. The camera’s contrast slider becomes your best friend.
		TaranisInSpaceLowHighlands* = #GEPscience_bd_camera_TaranisInSpaceLowHighlands_01 // You photograph peaks that glow faintly on the sunward faces and vanish on the darkward sides. It’s the clearest “two worlds” picture you’ve ever taken.
		TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_camera_TaranisInSpaceLowDarkSideMidlands_00 // Over the dark side, the planet looks like carved charcoal with a thin red rim of light. You feel like you’re photographing the absence of sunlight.
		TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_camera_TaranisInSpaceLowDarkSideMidlands_01 // The camera picks up faint reflective patches that could be frost or glassy rock. Mission Control asks what it is; you answer several hours later with “still thinking.”
		TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_camera_TaranisInSpaceLowDarkSideHighlands_00 // Dark highlands rise into the red-lit edge like teeth. You take the shot quickly, because you don’t like staring at it.
		TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_camera_TaranisInSpaceLowDarkSideHighlands_01 // The image is so high-contrast it looks edited, but it’s just reality under a dim red sun. You attach the raw file to prove it.
		TaranisInSpaceLowPoles* = #GEPscience_bd_camera_TaranisInSpaceLowPoles_00 // Polar passes show long, skewed shadows that make the terrain look stretched. Your navigation notes start including “don’t trust your eyes.”
		TaranisInSpaceLowPoles* = #GEPscience_bd_camera_TaranisInSpaceLowPoles_01 // The poles appear oddly calm compared to the incandescent regions, but still harsh and airless. The photo feels like a postcard from the edge of a furnace.

		ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_camera_ToutatisSrfLandedSunnyLowlands_00 // The sunny lowlands are bright, dry, and slightly blurred by heat shimmer in a nearly-there atmosphere. You take a photo and immediately miss having normal daylight.
		ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_camera_ToutatisSrfLandedSunnyLowlands_01 // The ground looks baked and dusty, with a red sun hanging too low for comfort. Your camera log notes: “Shadows are doing strange math.”
		ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_camera_ToutatisSrfLandedSunnyHighlands_00 // The sunlit highlands show sharp ridges and glare off pale rock. The camera’s exposure swings wildly, like it’s nervous too.
		ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_camera_ToutatisSrfLandedSunnyHighlands_01 // You capture a sweeping view where every surface looks scoured and thirsty. The radio delay makes the place feel even farther away than it looks.
		ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_camera_ToutatisSrfLandedTransitionalLowlands_00 // In the transition zone, the light turns soft and uncertain, like the planet can’t decide which side it belongs to. The photo looks almost comfortable, which makes you suspicious.
		ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_camera_ToutatisSrfLandedTransitionalLowlands_01 // The terrain here shows both melt-darkened patches and frost-pale streaks. Your caption reads: “Where extremes negotiate.”
		ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_camera_ToutatisSrfLandedTransitionalHighlands_00 // The transitional highlands photograph as a ridge line caught between furnace light and deep shade. You take extra frames because your eyes don’t trust the gradient.
		ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_camera_ToutatisSrfLandedTransitionalHighlands_01 // The camera catches subtle haze near the horizon—barely an atmosphere, but enough to tease you. It feels like the planet is offering “almost.”
		ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_camera_ToutatisSrfLandedDarkSideLowlands_00 // The dark side lowlands are cold, dark, and lit only by a weak red glow from far away. Your photo looks like a cave, except the ceiling is space.
		ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_camera_ToutatisSrfLandedDarkSideLowlands_01 // The ground sparkles faintly as if dust has frozen into tiny mirrors. You send the image and wait through the long silence for someone else to say “wow.”
		ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_camera_ToutatisSrfLandedDarkSideHighlands_00 // The dark highlands rise into dim light like frozen dunes of rock. The camera captures detail your eyes miss, which is both helpful and unsettling.
		ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_camera_ToutatisSrfLandedDarkSideHighlands_01 // You photograph a jagged skyline against black space and realize there’s no comforting “night sky” here. Just distance.
		ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_camera_ToutatisSrfLandedSoutheasternMountains_00 // The southeastern mountains cast shadows so long they look like geography, not lighting. The photo makes you feel like the day is leaning sideways.
		ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_camera_ToutatisSrfLandedSoutheasternMountains_01 // Peaks show scorched faces toward the red sun and pale, cold backs toward darkness. The camera records the contrast without judgment.
		ToutatisSrfLandedWesternMountains* = #GEPscience_bd_camera_ToutatisSrfLandedWesternMountains_00 // The western mountains look worn and sharp, with a thin haze that can’t decide if it’s real. You take the shot and note the horizon looks “too clean.”
		ToutatisSrfLandedWesternMountains* = #GEPscience_bd_camera_ToutatisSrfLandedWesternMountains_01 // A panorama shows stacked ridges fading into faint red twilight. The transmission time makes it feel like you’re mailing photos across interstellar space.
		ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_camera_ToutatisSrfLandedDarkSideMountains_00 // The dark side mountains appear as black silhouettes with faint rim light, like the planet is outlined in ember. You keep the exposure low so the darkness stays honest.
		ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_camera_ToutatisSrfLandedDarkSideMountains_01 // The camera catches tiny reflective specks on slopes—maybe frost, maybe glassy rock. You name the file “ColdShinyThing_01” and move on.
		ToutatisFlyingLow* = #GEPscience_bd_camera_ToutatisFlyingLow_00 // Flying here feels like skimming a planet that forgot to install air. The camera records dust streaks and a dim red horizon that never looks familiar.
		ToutatisFlyingLow* = #GEPscience_bd_camera_ToutatisFlyingLow_01 // Low-altitude images show the surface rushing past under odd, flat lighting. You realize the longest part of the flight is waiting for your own photos to come back.
		ToutatisFlyingHigh* = #GEPscience_bd_camera_ToutatisFlyingHigh_00 // High flight reveals a thin haze line that looks more like a rumor than an atmosphere. The camera takes clear shots, but your sense of “up here” feels wrong.
		ToutatisFlyingHigh* = #GEPscience_bd_camera_ToutatisFlyingHigh_01 // The red sun paints everything in dull copper as you climb. You take a wide shot and quietly note how alone the sky looks.
		ToutatisInSpaceHigh* = #GEPscience_bd_camera_ToutatisInSpaceHigh_00 // From high orbit, Toutatis is a stark half-lit globe—one side baked, the other swallowed by dark. The picture feels like a warning sign in planetary form.
		ToutatisInSpaceHigh* = #GEPscience_bd_camera_ToutatisInSpaceHigh_01 // The thin air is invisible at this distance, but the split between heat and cold is not. You transmit the image and wait for the delayed confirmation that it arrived.
		ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_camera_ToutatisInSpaceLowSunnyLowlands_00 // Low orbit shows the sunny lowlands as a bright, dry expanse with harsh contrast. The camera’s histogram looks like it’s trying to escape.
		ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_camera_ToutatisInSpaceLowSunnyLowlands_01 // The sunward flats shimmer with heat and glare even under the dim red sun. You take multiple frames because the light changes faster than your confidence.
		ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_camera_ToutatisInSpaceLowSunnyHighlands_00 // The sunny highlands stand out as bright ridges and sharp shadows, like a relief map under a red lamp. The detail is excellent and slightly unnerving.
		ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_camera_ToutatisInSpaceLowSunnyHighlands_01 // A close pass reveals scoured slopes and pale rock faces reflecting ember light. You label it “high albedo” and avoid calling it “pretty.”
		ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_camera_ToutatisInSpaceLowTransitionalLowlands_00 // The transition lowlands look mottled, as if the surface can’t choose between burning and freezing. Your camera captures subtle color shifts that make the place feel complicated.
		ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_camera_ToutatisInSpaceLowTransitionalLowlands_01 // You photograph a broad band of “maybe livable if you ignore everything else.” The delay makes the idea feel even less practical.
		ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_camera_ToutatisInSpaceLowTransitionalHighlands_00 // Transitional highlands show layered ridges fading from bright to dark across a short distance. It’s the clearest picture yet of how abrupt this world’s balance is.
		ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_camera_ToutatisInSpaceLowTransitionalHighlands_01 // The camera catches faint haze pooling in low areas—barely-there air behaving like it remembers physics. You take a second shot to prove it’s not lens fog.
		ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideLowlands_00 // Over the dark side, the lowlands look smooth and cold, with only rim light to define them. The image feels like it’s missing something essential on purpose.
		ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideLowlands_01 // The camera picks up tiny bright flecks that could be frost or glassy dust. You send the close-up and wait through the long quiet for someone else to interpret it.
		ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideHighlands_00 // Dark highlands appear as jagged shadows with sharp edges, like the planet was carved out of night. Your camera does fine; your instincts do not.
		ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideHighlands_01 // A low pass shows crisp terrain detail with no atmospheric softening at all. The lack of blur makes the distance feel even harsher.
		ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_camera_ToutatisInSpaceLowSoutheasternMountains_00 // The southeastern mountains show dramatic relief and long shadows that look permanent. You take the shot and note that “local time” is not a helpful concept here.
		ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_camera_ToutatisInSpaceLowSoutheasternMountains_01 // Peaks and valleys alternate between ember-lit ridges and deep black cuts. The camera records it cleanly, like it’s used to lonely places.
		ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_camera_ToutatisInSpaceLowWesternMountains_00 // The western range looks fractured and stark, with faint haze that barely outlines the horizon. Your photo feels like a survey of a world still deciding what it is.
		ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_camera_ToutatisInSpaceLowWesternMountains_01 // The camera captures ridges fading into dim red twilight, then the signal fades into waiting. You write “communications delay” again, because it keeps being true.
		ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideMountains_00 // Dark side mountains form sharp silhouettes against space, rim-lit by distant red. The photo looks like a cautionary diagram for “don’t get lost.”
		ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_camera_ToutatisInSpaceLowDarkSideMountains_01 // A close-up shows slopes dusted with faintly reflective grains. You resist naming it “sparkle snow” and call it “highly reflective particulates.”

		NodensSrfLandedSaltySeas* = #GEPscience_bd_camera_NodensSrfLandedSaltySeas_00 // The camera captures a dark, wind-ruffled sea under a dim red sun. The waves look normal enough until you realize “normal” is arriving hours late by radio.
		NodensSrfLandedSaltySeas* = #GEPscience_bd_camera_NodensSrfLandedSaltySeas_01 // The horizon is a smeared line of haze and copper light. You label the photo “Definitely Water” and let Mission Control argue about it later.
		NodensSrfLandedFreshWater* = #GEPscience_bd_camera_NodensSrfLandedFreshWater_00 // The surface reflects the sky like polished metal, except it wiggles when you stare at it. The camera insists the exposure is correct; you’re not convinced.
		NodensSrfLandedFreshWater* = #GEPscience_bd_camera_NodensSrfLandedFreshWater_01 // You take a long shot across the lake and catch faint ripples marching in from nowhere. Either there’s weather, or the planet is trying to blink.
		NodensSrfLandedShores* = #GEPscience_bd_camera_NodensSrfLandedShores_00 // The shoreline looks inviting in the viewfinder, which is suspicious. You take extra pictures just in case the “nice” part is a trap.
		NodensSrfLandedShores* = #GEPscience_bd_camera_NodensSrfLandedShores_01 // Wet sand, red-tinted foam, and a sky that refuses to look familiar. The camera records it faithfully; your brain keeps trying to autocorrect it.
		NodensSrfLandedTropicalLowlands* = #GEPscience_bd_camera_NodensSrfLandedTropicalLowlands_00 // The lowlands are saturated with color that shouldn’t exist under a red sun, yet there it is. You take three more shots to make sure the lens isn’t lying.
		NodensSrfLandedTropicalLowlands* = #GEPscience_bd_camera_NodensSrfLandedTropicalLowlands_01 // Everything looks soft-edged in the thick air, like the planet is wrapped in a blanket. You note “reduced contrast” and “increased eeriness.”
		NodensSrfLandedTemperateLowlands* = #GEPscience_bd_camera_NodensSrfLandedTemperateLowlands_00 // The camera picks out layered clouds and a broad, flat landscape. Without a proper day/night cue, you add a sticky note: “Time is a suggestion here.”
		NodensSrfLandedTemperateLowlands* = #GEPscience_bd_camera_NodensSrfLandedTemperateLowlands_01 // A practical panorama for mapping, with an impractical feeling that someone turned the saturation knob to “alien.” The histogram looks fine; you don’t.
		NodensSrfLandedTropicalMidlands* = #GEPscience_bd_camera_NodensSrfLandedTropicalMidlands_00 // From the midlands, the distant lowlands fade into rusty haze. The shot comes back with a lot of “maybe” and not much “certain.”
		NodensSrfLandedTropicalMidlands* = #GEPscience_bd_camera_NodensSrfLandedTropicalMidlands_01 // The terrain breaks into ridges and shallow basins, all lit like late evening that never ends. You file it under “perpetual dusk problems.”
		NodensSrfLandedTemperateMidlands* = #GEPscience_bd_camera_NodensSrfLandedTemperateMidlands_00 // You photograph a long slope and discover the shadows are far too long for your intuition. The sun is dim, but it still means business.
