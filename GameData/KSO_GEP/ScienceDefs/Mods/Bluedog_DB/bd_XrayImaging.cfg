@EXPERIMENT_DEFINITION:HAS[#id[bd_XrayImaging]]
{
    %RESULTS
    {
        GrannusInSpaceHigh* = #GEPscience_farKerbol_Xray_00 // The spectrum matches a familiar star. The homesickness is an unmodeled systematic error.
        GrannusInSpaceHigh* = #GEPscience_farKerbol_Xray_01 // Kerbol’s X-rays barely register at this range. You save the dataset anyway, like a keepsake.
        GrannusInSpaceLow* = #GEPscience_XrayImaging_GrannusInSpace_00 // The detector records rapid variability. You briefly suspect instrument error, then remember you are observing a star from up close.
        GrannusInSpace* = #GEPscience_XrayImaging_GrannusInSpace_01 // You obtain a crisp X-ray light curve and realize you are, technically, doing deep-space astrophysics while orbiting the source.
        GrannusInSpace* = #GEPscience_XrayImaging_GrannusInSpace_02 // The star’s corona is spectacular in X-rays. You decide “spectacular” is also a reasonable risk assessment.
        GrannusInSpaceLow* = #GEPscience_XrayImaging_GrannusInSpaceLow_00 // The detector struggles to decide whether Grannus is a star or a flashing warning label. Between flare spikes, you catch distant sources boiling at millions of degrees.
        GrannusInSpaceHigh* = #GEPscience_XrayImaging_GrannusInSpaceHigh_00 // Far from the glare, the sky finally stops shouting. You log a handful of hard X-ray points and then remember the downlink will arrive after snack time… on Kerbin.

        TaranisInSpaceLow* = #GEPscience_XrayImaging_TaranisInSpaceLow_00 // The X-ray imager keeps picking up energetic bursts whenever you face the dim red sun. Mission Control asks for “one more exposure” and you queue it behind the next half-hour of signal delay.
        TaranisInSpaceHigh* = #GEPscience_XrayImaging_TaranisInSpaceHigh_00 // From higher up, Taranis is a bright ember glued to a black coin. Long integrations pull faint X-ray sources out of the void, and none of them care which side is “day.”

        ToutatisInSpaceLow* = #GEPscience_XrayImaging_ToutatisInSpaceLow_00 // A thin atmosphere tries its best to exist below you while the instrument stares past it. The data suggests something out there is heating plasma to absurd temperatures, and it isn’t your coffee heater.
        ToutatisInSpaceHigh* = #GEPscience_XrayImaging_ToutatisInSpaceHigh_00 // You build an X-ray sky map while Toutatis spins fire, twilight, and darkness under you. By the time the results reach home, the telescope has already filled the storage with “bonus” targets.

        NodensInSpaceLow* = #GEPscience_XrayImaging_NodensInSpaceLow_00 // Nodens fills half the sky, so you use its limb like a shutter. Each occultation peels back another set of million-degree X-ray sources—then you remember the logs won’t reach home for a while.
        NodensInSpaceHigh* = #GEPscience_XrayImaging_NodensInSpaceHigh_00 // With Nodens reduced to a mottled coin and Grannus a dim red ember, the imager finally relaxes. Long exposures tease out hard X-ray pinpricks from a sky that feels too big to belong to anyone.

        BelisamaInSpaceLow* = #GEPscience_XrayImaging_BelisamaInSpaceLow_00 // The permanently shadowed side is perfect for X-ray work: no glare, no comfort, just clean counts. You watch hot plasmas flare in the distance while Belisama stays cold and silent beneath you.
        BelisamaInSpaceHigh* = #GEPscience_XrayImaging_BelisamaInSpaceHigh_00 // From higher up, Belisama and Nodens trade slow eclipses like clockwork. Every time the view clears, another faint X-ray object appears—patiently waiting through the same long delays you are.

        SucellusInSpaceLow* = #GEPscience_XrayImaging_SucellusInSpaceLow_00 // Sucellus is a dark, low-gravity anchor in an otherwise empty sky. The detector records a sparse but stubborn X-ray background, as if the universe is whispering through static.
        SucellusInSpaceHigh* = #GEPscience_XrayImaging_SucellusInSpaceHigh_00 // High above Sucellus, the red sun is just another distant light and “up” loses meaning. You assemble an X-ray sky map that looks like it was sent from very far away—because it was.

        CaireenInSpaceLow* = #GEPscience_XrayImaging_CaireenInSpaceLow_00 // Tiny Caireen jitters under the spacecraft, making the stars smear if you blink. You shorten exposures and still catch a few bright X-ray flashes that don’t care about your pointing problems.
        CaireenInSpaceHigh* = #GEPscience_XrayImaging_CaireenInSpaceHigh_00 // From far above, Caireen is barely a reference point and the imager spends most of its time staring into the black. The best targets are impossibly hot and impossibly distant, and the downlink feels just as far.

        SironaInSpaceLow* = #GEPscience_XrayImaging_SironaInSpaceLow_00 // You let Sirona’s vast limb block the dim red sun and stare into the cold gap it leaves behind. The imager counts a few sharp X-ray sources that look far too hot to be nearby.
        SironaInSpaceHigh* = #GEPscience_XrayImaging_SironaInSpaceHigh_00 // From high above the gas giant, “up” is just whichever way the antenna points. Long exposures pull faint hard X-rays out of the black, and the downlink delay makes the discoveries feel even farther away.

        AirmedInSpaceLow* = #GEPscience_XrayImaging_AirmedInSpaceLow_00 // Low orbit gives you a fast-moving shadow to hide in while the telescope works. The sky answers with thin, energetic flashes—then goes quiet again, like it knows nobody can respond quickly out here.
        AirmedInSpaceHigh* = #GEPscience_XrayImaging_AirmedInSpaceHigh_00 // Higher up, the view steadies and the instrument stops arguing with your attitude jets. A sparse X-ray map builds slowly, one million-degree dot at a time, under Grannus’ dull red light.

        BorvoInSpaceLow* = #GEPscience_XrayImaging_BorvoInSpaceLow_00 // Borvo slides beneath you like a dark reference mark while the imager watches the real action overhead. The counts suggest distant plasma at absurd temperatures, completely uninterested in your navigation schedule.
        BorvoInSpaceHigh* = #GEPscience_XrayImaging_BorvoInSpaceHigh_00 // From high orbit, Borvo is almost an afterthought and the sky is the entire mission. You log a stubborn X-ray background that feels older than your communications link.

        DamonaInSpaceLow* = #GEPscience_XrayImaging_DamonaInSpaceLow_00 // You time exposures to the longest stretches of darkness and pretend it’s “routine.” A few bright X-ray points punch through anyway, as if the universe is testing your detector limits for fun.
        DamonaInSpaceHigh* = #GEPscience_XrayImaging_DamonaInSpaceHigh_00 // Up high, the telescope finally gets the quiet it wants—no glare, no hurry, just cold vacuum and distant heat. By the time Mission Control sees the data, you’ve already moved on to the next patch of unfamiliar sky.

        EponaInSpaceLow* = #GEPscience_XrayImaging_EponaInSpaceLow_00 // You use Epona’s dark limb as a sunshade and let the imager stare into the cold. The detector still finds pinpricks of million-degree chaos, as if the universe can’t sit still.
        EponaInSpaceHigh* = #GEPscience_XrayImaging_EponaInSpaceHigh_00 // High above the frozen world, Grannus is a dim red ember and the sky feels unreasonably large. Long integrations build a thin X-ray map that will take even longer to explain back home.

        RosmertaInSpaceLow* = #GEPscience_XrayImaging_RosmertaInSpaceLow_00 // Rosmerta is small, quiet, and very good at getting out of the way. Each eclipse gives you a clean look at faint X-ray sources, and none of them seem interested in being visited.
        RosmertaInSpaceHigh* = #GEPscience_XrayImaging_RosmertaInSpaceHigh_00 // From up here, Rosmerta is a lonely speck and “night” is just when the antenna isn’t busy. You log a handful of hard X-ray points and wonder if anyone will still be awake when the data arrives.

        RAB-58EInSpaceLow* = #GEPscience_XrayImaging_RAB-58EInSpaceLow_00 // The irregular little moonlet keeps your pointing solution guessing. Even so, the imager catches a few sharp X-ray flashes that look like they’re coming from impossibly hot gas very far away.
        RAB-58EInSpaceHigh* = #GEPscience_XrayImaging_RAB-58EInSpaceHigh_00 // With RAB-58E barely a reference mark, you stop trying to “take pictures of the moon” and just survey the void. The X-ray background comes in like distant static, delayed twice—once by space, once by comms.

        CernunnosInSpaceLow* = #GEPscience_XrayImaging_CernunnosInSpaceLow_00 // Cernunnos drifts below like an icy boundary marker at the edge of the system. The instrument finds distant high-energy sources that burn hotter than anything nearby, making your local scenery feel even colder.
        CernunnosInSpaceHigh* = #GEPscience_XrayImaging_CernunnosInSpaceHigh_00 // Far above Cernunnos, the red sun provides more mood than light. You assemble an X-ray sky strip of faint, hard points—evidence of extreme heat, delivered across extreme distance.
    }
}