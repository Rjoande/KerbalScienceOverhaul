        #CSS_Aebestach_ROCScience_DunaBlueberries_02 = 「Duna 蓝莓」！赤铁矿结核，机遇号在 Duna 上的著名发现。证明古代液态水的存在。科学价值：爆表。口感：依然是石头。
        #CSS_Aebestach_ROCScience_DunaDune_01 = 你研究了某种沙丘状结构。可能是风成的，也可能是你饿到把沙丘看成了面包。
        #CSS_Aebestach_ROCScience_DunaDune_02 = Duna 的沙丘！风成沉积的经典案例。颗粒分析显示细粒氧化铁——Duna 红的成因。顺便，在沙丘上滑沙的请求被任务控制中心拒绝。
        #CSS_Aebestach_ROCScience_DunaEjectaOnIke_01 = 这些碎屑来自别的星球。星际移民的前辈？
        #CSS_Aebestach_ROCScience_DunaEjectaOnIke_02 = Duna 的溅射物落在 Ike 上！远古撞击把 Duna 的物质抛射到太空，部分降落在其卫星上。我们在 Ike 上发现了 Duna 的碎片——行星际考古学的胜利！
        #CSS_Aebestach_ROCScience_DunaMeteorite_01 = 一块来自天外的石头。你试图判断它是不是 Kraken 的便便。
        #CSS_Aebestach_ROCScience_DunaMeteorite_02 = 陨石！成分分析揭示镍铁核心——来自小行星带或更远的旅行者。它在 Duna 表面躺了可能几百万年，终于等到你来打招呼。
        #CSS_Aebestach_ROCScience_DunaStone_01 = 一块石头。任务控制中心问你是不是在开玩笑。
        #CSS_Aebestach_ROCScience_DunaStone_02 = 典型 Duna 风化岩石。表面红褐色来自氧化铁涂层，内部可能是玄武岩。不典型的是：你给这块石头起了名字。叫「石头先生」。
        #CSS_Aebestach_ROCScience_EelooBerg_01 = 冰山！在矮行星上！
        #CSS_Aebestach_ROCScience_EelooBerg_02 = Eeloo 的冰山（冰丘）！地表冰体的侵蚀或挤压形成。在极远的轨道上，这样的结构存在了可能数十亿年。Eeloo 式世界的冰冷诗歌。
        #CSS_Aebestach_ROCScience_EelooBrownBoulder_01 = 褐色的石头。在雪白背景下像块巧克力。
        #CSS_Aebestach_ROCScience_EelooBrownBoulder_02 = Eeloo 的褐色巨石——有机化合物（托林）沾染的冰岩混合物？Eeloo 赤道也有类似色调。太阳辐射亿万年的「烹饪」产生了这些复杂的碳化合物。宇宙级焦糖化。
        #CSS_Aebestach_ROCScience_EelooIceChunk_01 = 冰。很多冰。非常冷。
        #CSS_Aebestach_ROCScience_EelooIceChunk_02 = Eeloo 的冰碎块——太阳系边缘的冰冻档案。可能含有原始的挥发性物质。你呵气成霜，思考三十亿公里外的家。至少这块冰跟你一样孤独。
        #CSS_Aebestach_ROCScience_EveBasaltFormation_01 = 玄武岩构造。硬邦邦的火山遗产。
        #CSS_Aebestach_ROCScience_EveBasaltFormation_02 = Eve 玄武岩！古代熔岩流的残留。在极端条件下保存完好——Eve 的大气既压迫又保护。你拍下剖面图，思考 Kerbin 的玄武岩会不会羡慕这里的「桑拿养护」。
        #CSS_Aebestach_ROCScience_EvePancakeDome_01 = 扁平的圆顶。像有人把火山压扁了。
        #CSS_Aebestach_ROCScience_EvePancakeDome_02 = 薄饼穹丘！高粘度熔岩形成的典型结构，Eve 上也有发现。Eve 的地质学再次证明：宇宙喜欢重复自己。这穹丘大概能煎蛋。
        #CSS_Aebestach_ROCScience_EveVolcanicRock_01 = 火山岩。紫色的。跟 Eve 很配。
        #CSS_Aebestach_ROCScience_EveVolcanicRock_02 = Eve 火山岩！高压大气下的喷出岩，可能含有稀有矿物。紫色色调来自某种还没命名的化合物。你命名为「Eve 紫」，专利待申请。
        #CSS_Aebestach_ROCScience_GillyRidgeline_01 = 一座小小的山脊。以 Gilly 的标准来说算山脉了。
        #CSS_Aebestach_ROCScience_GillyRidgeline_02 = Gilly 的山脊线！在微重力下，这种地形可能是撞击溅射物堆积或古老结构的残迹。低重力让一切地质过程都变得……懒散。包括这颗卫星本身。
        #CSS_Aebestach_ROCScience_KerbinBaobabTree_01 = 你研究了一棵异常高大的树。猴面包树？在 Kerbin 上？
        #CSS_Aebestach_ROCScience_KerbinBaobabTree_02 = Kerbin 的猴面包树！储水树干、长寿、可食用——生存专家的好朋友。年轮分析显示它熬过了多少次风暴。你抱了抱它，它没有反对。
        #CSS_Aebestach_ROCScience_KerbinGiantQuartz_01 = 一块巨大的透明石头。你怀疑底下埋着宝藏。
        #CSS_Aebestach_ROCScience_KerbinGiantQuartz_02 = 巨型石英晶体！热液活动在晶洞中孕育了数千年。光学纯度极高——可做精密光学元件。或者，你知道的，当镇纸。非常豪华的镇纸。
        #CSS_Aebestach_ROCScience_LaytheBoulder_01 = 一块巨石。可能被潮水打磨过。
        #CSS_Aebestach_ROCScience_LaytheBoulder_02 = Laythe 的巨石——可能经海浪或冰川搬运。含氧大气下的风化模式与 Kerbin 相似。站在海边（如果那是海），你几乎想家了。
        #CSS_Aebestach_ROCScience_LaytheGeyser_01 = 间歇泉！水！在 Jool 卫星级别的轨道上！
        #CSS_Aebestach_ROCScience_LaytheGeyser_02 = Laythe 的间歇泉！冰下海洋的地热出口——潮汐加热驱动。液态水、热量、有机分子……生命所需的条件汇聚于此。你接了一瓶，想尝尝咸不咸。任务控制中心阻止了你。
        #CSS_Aebestach_ROCScience_LaytheStone_01 = 普通的石头。在 Laythe 上显得格外珍贵。
        #CSS_Aebestach_ROCScience_LaytheStone_02 = Laythe 的石头样本。海洋世界的地质档案——可能包含沉积层或生物扰动痕迹。你仔细检查有没有小贝壳。没找到，但希望还在。
        #CSS_Aebestach_ROCScience_MinmusGreenSandstone_01 = 绿色的石头。不是奶酪，你检查过了。
        #CSS_Aebestach_ROCScience_MinmusGreenSandstone_02 = Minmus 绿砂岩！含铁矿物在还原环境下呈现的色调。暗示冰与熔岩的古老相互作用。科学价值高，作为 Minmus 奶酪替代品的价值：零。
        #CSS_Aebestach_ROCScience_MinmusOlivineFormation_01 = 橄榄石？在这种地方？
        #CSS_Aebestach_ROCScience_MinmusOlivineFormation_02 = 橄榄石 formation！地幔物质的窗口，通常来自深部。在 Minmus 上发现说明其地质史比预期的复杂。翠绿如薄荷糖，坚硬如……石头。
        #CSS_Aebestach_ROCScience_MohoStone_01 = 一块被太阳烤过的石头。摸一下会烫伤。
        #CSS_Aebestach_ROCScience_MohoStone_02 = Moho 的岩石——经历过极端热循环的表面物质。可能含有罕见的耐火矿物。你把它装袋时差点烤坏手套。Moho 式探险，名副其实。
        #CSS_Aebestach_ROCScience_MohoWrinkleRidge_01 = 地表上的褶皱。像干涸河床，但是是石头。
        #CSS_Aebestach_ROCScience_MohoWrinkleRidge_02 = 皱纹岭！行星冷却收缩挤压地壳形成的特征。Moho 上很常见——证明这颗小行星有过活跃的过去。现在它只是条皱纹了。
        #CSS_Aebestach_ROCScience_MunCrater_01 = 一个陨石坑。Mun 表面最常见的地貌，除了……更多陨石坑。
        #CSS_Aebestach_ROCScience_MunCrater_02 = 新鲜的（地质学意义上）陨石坑！辐射纹尚未被微陨石抹平。坑缘的溅射物是分析 Mun 表层结构的绝佳样本。顺便验证了牛顿定律——东西会往下掉。
        #CSS_Aebestach_ROCScience_MunLargeCrater_01 = 一个很大的坑。大得你都想跳进去。
        #CSS_Aebestach_ROCScience_MunLargeCrater_02 = 大型撞击盆地！这类结构揭示了 Mun 早期遭受的猛烈轰炸。坑底的岩浆填充形成了 maria。你站在历史的创口上，感到既渺小又敬畏。
        #CSS_Aebestach_ROCScience_MunStone_01 = Mun 表面岩石。阿姆斯特朗会为你骄傲……大概。
        #CSS_Aebestach_ROCScience_MunStone_02 = Mun 岩石样本！富含斜长石和辉石——典型的 mare 玄武岩。年龄可能超过三十亿年。你在上面签了名，任务控制中心叹了口气。
        #CSS_Aebestach_ROCScience_PolYellowStones_01 = 黄色的石头。Pol 本来就五彩缤纷，黄色算低调的。
        #CSS_Aebestach_ROCScience_PolYellowStones_02 = Pol 的黄色岩石——硫化物或氧化铁的风化产物？多孔低密度表面的矿物学仍是谜。这些石头像 Pol 本身一样难以归类。你收集了一袋，准备让 Kerbin 的石头学家头疼。
        #CSS_Aebestach_ROCScience_TyloCheckerboard_01 = 棋盘状地表。Tylo 在cosplay国际象棋？
        #CSS_Aebestach_ROCScience_TyloCheckerboard_02 = 棋盘地形！撞击溅射物覆盖的交替亮暗 pattern——Jool 系中 Tylo 等天体也有类似特征。Tylo 在向我们展示它的撞击史，一格一格地讲。
        #CSS_Aebestach_ROCScience_TyloDarkBoulder_01 = 深色的巨石。Tylo 的标配。
        #CSS_Aebestach_ROCScience_TyloDarkBoulder_02 = Tylo 的深色巨石——可能来自古老的火山活动或撞击盆地。低反照率暗示富含铁镁质。在 Tylo 的强重力下，这块石头真的「脚踏实地」。
        #CSS_Aebestach_ROCScience_TyloLightStone_01 = 浅色的石头。在 Tylo 的黑暗中很显眼。
        #CSS_Aebestach_ROCScience_TyloLightStone_02 = Tylo 的浅色岩石——高反照率，可能是斜长岩或撞击熔融产物。在灰色的 Tylo 表面像一块奶油夹心饼干。地质学意义上的。
        #CSS_Aebestach_ROCScience_VallCryovolcano_01 = 冰火山！不是火，是冰。
        #CSS_Aebestach_ROCScience_VallCryovolcano_02 = Vall 的冰火山！液态水-氨混合物从冰壳裂缝喷出，在真空里冻结成壮观的冰塔。Vall 式地质学的教科书现场。你站在喷口边，感觉在参观星球的「呼吸器官」。
        #CSS_Aebestach_ROCScience_VallIceChunk_01 = 一大块冰。你考虑要不要舔一下。
        #CSS_Aebestach_ROCScience_VallIceChunk_02 = Vall 的冰碎块！纯净度极高，可能保留了古老海洋的化学印记。分析显示微量氯化物和有机物——地下海存在生命的又一线索。别舔，有辐射。
        #CSS_Aebestach_ROCScience_VallStone_01 = 冰世界上的石头。像宝石一样稀少。
        #CSS_Aebestach_ROCScience_VallStone_02 = Vall 的岩石——从冰壳下暴露出来的原始物质。可能来自硅酸盐地幔或撞击溅射。在冰的宇宙里，一块石头是来自「内部世界」的明信片。
    }
}
