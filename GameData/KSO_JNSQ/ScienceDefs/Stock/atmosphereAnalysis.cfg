        LaytheFlyingLowInlandWater* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowInlandWater_00 // The air here is humid but calmer, with fewer harsh aerosols than the open sea. The analyzer logs steady oxygen and steady condensation.
