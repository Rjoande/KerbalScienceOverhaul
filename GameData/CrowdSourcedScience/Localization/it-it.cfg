        #CSS_seismicScan_IkeSrfLandedSouthPole_01 = Vengono rilevate alcune deboli vibrazioni generate da eventi d'impatto a latitudini più basse. Nessuna proviene dalle regioni polari.
        #CSS_seismicScan_IkeSrfLandedCentralMountainRange_00 = I terremoti sembrano arrivare a intervalli regolari. Un controllo della tua mappa stellare conferma che corrispondono al periapside e all'apoapside dell'orbita della luna.
        #CSS_seismicScan_IkeSrfLandedCentralMountainRange_01 = Man mano che Duna diventa più grande nel cielo, aumenta anche il tasso di attività sismica. Ti aspetti quasi di vedere un'onda di roccia rotolare verso di te.
        #CSS_seismicScan_DresSrfLanded_00 = I sensori sismici mostrano che questo pianeta nano ha poca attività geologica. Ti chiedi se far detonare un serbatoio di carburante potrebbe in qualche modo rimediare alla situazione.
        #CSS_seismicScan_DresSrfLandedPoles_00 = C'è una debole vibrazione pulsante, come un battito cardiaco. Ma non è un battito cardiaco, perché sarebbe folle.
