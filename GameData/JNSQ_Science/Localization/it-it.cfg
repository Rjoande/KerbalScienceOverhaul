        #JNSQscience_bd_magScan_CelesSrfLandedHighlands_00 = Minuscoli picchi restano attaccati alla roccia esposta, e suggeriscono minerali sparsi che trattengono magnetismo per pura ostinazione.
        #JNSQscience_bd_magScan_CelesSrfLandedMountains_00 = In alto, lo strumento coglie brevi anomalie nette, piccole sacche di materiale magnetizzato che fanno capolino dalla superficie.
        #JNSQscience_bd_magScan_CelesSrfLandedPoles_00 = Le letture si indeboliscono e scintillano in lenti impulsi, come se brina polare e particelle cariche stessero collaborando in silenzio.
        #JNSQscience_bd_magScan_TamInSpaceLow_00 = L'orbita bassa rivela piccoli gradienti rapidi che combaciano con le cicatrici di Tam, la luna non ha un campo, ma la sua crosta lascia impronte.
        #JNSQscience_bd_magScan_TamInSpaceHigh_00 = In quota la traccia si fa uniforme fino al quasi silenzio, con solo occasionali increspature dal meteo spaziale distante.
        #JNSQscience_bd_magScan_TamSrfLandedLowlands_00 = Una base piatta e assonnata, finché non sollevi polvere e l'ago per un attimo finge di aver trovato qualcosa di importante.
        #JNSQscience_bd_magScan_TamSrfLandedMidlands_00 = Lo strumento riporta "nessun campo significativo" con impressionante sicurezza e assoluta mancanza di entusiasmo.
        #JNSQscience_bd_magScan_TamSrfLandedHighlands_00 = Anomalie tenui e a chiazze sfarfallano vicino ad affioramenti più duri, e suggeriscono che alcune rocce ricordino ancora un magnetismo antico.
        #JNSQscience_bd_magScan_TamSrfLandedTwinCraters_00 = I due crateri non sono d'accordo su dove puntare le linee di campo: il risultato è un ondeggiamento confuso per tutto il tempo.
        #JNSQscience_bd_magScan_TamSrfLandedCraters_00 = Punti caldi appuntiti si addensano attorno al fuso d'impatto, come se i bordi del cratere avessero congelato un minuscolo capriccio magnetico.
        #JNSQscience_bd_magScan_TamSrfLandedPockmarks_00 = La scansione trema in piccole scariche, ogni vaiolatura sembra nascondere un granello di metallo che il sensore non riesce a smettere di notare.
        #JNSQscience_bd_magScan_HamekInSpaceLow_00 = Il magnetometro coglie distorsioni deboli e irregolari che si muovono con il terreno sotto, Hamek è quieta, ma non perfettamente uniforme.
        #JNSQscience_bd_magScan_HamekInSpaceHigh_00 = Più in alto, tutto svanisce in una sottile fluttuazione di fondo: qualunque "segnale" resti è soprattutto la tua astronave.
        #JNSQscience_bd_magScan_HamekSrfLandedLowlands_00 = La base resta vicino allo zero, ma l'ago pende leggermente come se Hamek avesse giusto abbastanza ferro da essere sospetta.
        #JNSQscience_bd_magScan_HamekSrfLandedMidlands_00 = Piccole anomalie vanno e vengono senza schema, come se la crosta fosse piena di minuscoli segreti magnetici mal organizzati.
        #JNSQscience_bd_magScan_HamekSrfLandedHighlands_00 = Il sensore trova picchi più netti vicino a pareti rocciose esposte, magnetismo residuo localizzato aggrappato alle alture.
        #JNSQscience_bd_magScan_HamekSrfLandedPoles_00 = La traccia ondeggia dolcemente e poi si assesta di nuovo, come se il suolo polare fosse carico e il magnetometro stesse cercando di non fissarlo.
        #JNSQscience_bd_magScan_NaraInSpaceLow_00 = Il campo di Nara appare pulito e sicuro in orbita bassa, un dipolo uniforme avvolto stretto contro il vento solare.
        #JNSQscience_bd_magScan_NaraInSpaceHigh_00 = Più lontano, la firma si indebolisce e si allunga in una lunga coda che svanisce, più "suggerimento" che scudo.
        #JNSQscience_bd_magScan_NaraSrfLandedLowlands_00 = L'aria densa aggiunge crepitii di statico, ma il campo di fondo resta stabile e grande quanto un pianeta.
        #JNSQscience_bd_magScan_NaraSrfLandedMidlands_00 = Una traccia calma e prevedibile, il Controllo Missione la dichiara sottovoce "ottimi dati di calibrazione".
        #JNSQscience_bd_magScan_NaraSrfLandedHighlands_00 = Le letture si fanno più nette nell'aria più sottile, e rivelano deboli stranezze crostali sotto il campo più ampio di Nara.
        #JNSQscience_bd_magScan_NaraSrfLandedMountains_00 = Picchi locali si sovrappongono alla base, come se le montagne stessero accumulando minerali magnetizzati.
        #JNSQscience_bd_magScan_NaraSrfLandedPolarLowlands_00 = Il campo si indebolisce e ondeggia: correnti sopra la testa fanno sfarfallare l'ago in lenti impulsi, tipo aurora.
        #JNSQscience_bd_magScan_NaraSrfLandedPoles_00 = I numeri danzano con le correnti polari, e ti ritrovi a fissare verso l'alto come se il cielo stesse facendo scienza su di te.
        #JNSQscience_bd_magScan_NaraSrfLandedPolarHighlands_00 = Basi pulite e fredde spezzate da impennate scintillanti, qui le linee di campo si fanno più ripide e i poli sembrano elettricamente vivi.
        #JNSQscience_bd_magScan_AmosInSpaceLow_00 = Non compare alcun campo intrinseco: il magnetismo di Nara si stende su Amos e scivola via in pieghe sfrangiate.
        #JNSQscience_bd_magScan_AmosInSpaceHigh_00 = In quota l'influenza si assottiglia fino al quasi silenzio, e lascia solo l'occasionale increspatura del meteo magnetico distante.
        #JNSQscience_bd_magScan_AmosSrfLandedLowlands_00 = Il magnetometro riporta uno zero eroico mentre la polvere scura prova a imitare "segnale" con lo statico.
        #JNSQscience_bd_magScan_AmosSrfLandedMidlands_00 = Una linea piatta così pulita da sembrare personale, Amos si rifiuta di avere un'opinione magnetica.
        #JNSQscience_bd_magScan_AmosSrfLandedHighlands_00 = Minuscoli segnali ostinati suggeriscono che alcune rocce ricordino ancora un campo antico che non è mai stato loro.
        #JNSQscience_bd_magScan_AmosSrfLandedMountains_00 = Vicino alla pietra esposta spuntano piccoli picchi netti, minuscole sacche di magnetismo residuo in una crosta altrimenti morta.
        #JNSQscience_bd_magScan_AmosSrfLandedPoles_00 = L'ago oscilla senza assestarsi, come se correnti indotte riscrivessero il "nord" ogni pochi minuti.
        #JNSQscience_bd_magScan_EnonInSpaceLow_00 = La scansione è dominata dal campo di Nara, con impulsi gentili che sembrano particelle cariche che scorrono sul guscio ghiacciato di Enon.
        #JNSQscience_bd_magScan_EnonInSpaceHigh_00 = La traccia svanisce in una quieta oscillazione di fondo, Enon contribuisce soprattutto intralciando.
        #JNSQscience_bd_magScan_EnonSrfLandedLowlands_00 = Il ghiaccio non restituisce nulla, letture quasi a zero con occasionali tremolii da brina carica.
        #JNSQscience_bd_magScan_EnonSrfLandedMidlands_00 = Piatto, freddo e totalmente non magnetico, lo strumento sembra quasi sollevato.
        #JNSQscience_bd_magScan_EnonSrfLandedHighlands_00 = Alcuni picchi tenui suggeriscono inclusioni rocciose nascoste sotto la patina bianca.
        #JNSQscience_bd_magScan_EnonSrfLandedPoles_00 = Fluttuazioni deboli e scintillanti suggeriscono induzione sopra la testa, come se correnti aurorali invisibili stessero ancora scrivendo nei dati.
        #JNSQscience_bd_magScan_PraxInSpaceLow_00 = Prax non mostra un campo tutto suo, ma torce il fondo in gradienti netti che combaciano con la sua forma irregolare.
        #JNSQscience_bd_magScan_PraxInSpaceHigh_00 = Più in alto le distorsioni si appianano, e il magnetometro ascolta soprattutto lo spazio vuoto.
        #JNSQscience_bd_magScan_PraxSrfLandedLowlands_00 = Punti caldi a chiazze sfarfallano dentro e fuori, come se macerie metalliche fossero sparse appena sotto la superficie.
        #JNSQscience_bd_magScan_PraxSrfLandedMidlands_00 = La base resta vicino allo zero mentre polvere ed elettronica discutono su chi debba essere misurato.
        #JNSQscience_bd_magScan_PraxSrfLandedHighlands_00 = Anomalie deboli e incoerenti suggeriscono che la crosta sia un miscuglio di ritagli magnetizzati e niente magnetico.
        #JNSQscience_bd_magScan_PraxSrfLandedMountains_00 = Brevi picchi netti restano attaccati alle dorsali esposte, piccole sacche concentrate che risultano davvero come "qualcosa".
        #JNSQscience_bd_magScan_PraxSrfLandedPoles_00 = The readings wander with slow, induced oscillations, giving the poles a faint, uneasy electrical restlessness.

        // bd_mapping
        #JNSQ_bd_mapping_SunInSpaceLowNorthPolarZone_00 = La vista è un arco accecante con una calotta appena più scura al bordo. La fotocamera insiste che il sole abbia un "terreno", e inizi a preoccuparti della fotocamera.
        #JNSQ_bd_mapping_SunInSpaceLowNorthSubpolarZone_00 = Le impostazioni di esposizione si arrendono quasi subito. L'immagine torna come "quasi tutto sole", con una nota gentile che suggerisce di smetterla.
        #JNSQ_bd_mapping_SunInSpaceLowNorthTemperateZone_00 = Per un attimo, un lieve bandeggio filtra attraverso l'abbagliamento, poi il sensore si arrende. La chiami una mappa riuscita se strizzi gli occhi abbastanza forte.
        #JNSQ_bd_mapping_SunInSpaceLowNorthTropicZone_00 = Cogli un breve gradiente spettrale sul disco. Il Controllo Missione chiede se questo significa "sicuro", e fai finta di non aver sentito.
        #JNSQ_bd_mapping_SunInSpaceLowEquatorialZone_00 = Il centro del disco è bianco puro con un bordo luminoso come una lama. Il team di mappatura lo etichetta "senza caratteristiche" e poi aggiunge altri tre adesivi di avvertimento.
        #JNSQ_bd_mapping_SunInSpaceLowSouthTropicZone_00 = Alcune macchie più scure guizzano in vista tra picchi di saturazione. La fotocamera fa un suono che non ricordi di aver installato.
        #JNSQ_bd_mapping_SunInSpaceLowSouthTemperateZone_00 = Qui il bordo del sole sembra leggermente meno arrabbiato, per circa mezzo secondo. Poi la lettura diventa arte moderna.
        #JNSQ_bd_mapping_SunInSpaceLowSouthSubpolarZone_00 = L'immagine mostra un lieve calo e un sacco di rimpianti. Il file della mappa viene etichettato "NON RIPETERE".
        #JNSQ_bd_mapping_SunInSpaceLowSouthPolarZone_00 = La regione polare risulta come una falce più tenue contro una luminosità impossibile. Aggiungi una nota: "Sì, anche i poli stanno cercando di uccidere la fotocamera".
        #JNSQ_bd_mapping_MohoInSpaceLow_00 = Passaggi di mappatura ripetuti mettono in evidenza lineamenti nitidi e giovani: scarpate e solchi stretti che tagliano il terreno più antico con bordi sorprendentemente taglienti. La geometria si adatta a una lenta contrazione globale con occasionali scorrimenti di faglia.
        #JNSQ_bd_mapping_MohoInSpaceLow_01 = Diverse creste proiettano ombre sottili come lame, e i pendii vicini mostrano striature dall'aria fresca di regolite disturbata. La spiegazione migliore è uno scuotimento recente e localizzato, non un rinnovamento su larga scala.
        #JNSQ_bd_mapping_MohoInSpaceLow_02 = In strisce ad alta risoluzione, alcuni fondi craterici appaiono lievemente "pettinati", con scie di massi e grembiuli di polvere allineati alle tracce di fratture vicine. Suggerisce vibrazioni intermittenti del suolo che nel tempo ordinano e ridistribuiscono dolcemente il materiale superficiale.
        #JNSQ_bd_mapping_MohoInSpaceLowPoles_00 = Il terreno polare si risolve in ombre nette e chiazze luminose. La mappa torna con una nota: "Possibili trappole fredde. Non leccare".
        #JNSQ_bd_mapping_MohoInSpaceLowLowlands_00 = Le pianure si distendono in distese scure e martoriate tra i bordi dei crateri. Tutto sembra sabbiato per divertimento.
        #JNSQ_bd_mapping_MohoInSpaceLowPolarIceCraters_00 = Piccoli riflessi luminosi restano attaccati ai fondi dei crateri in ombra. Il team di mappatura li evidenzia e scrive: "come fa a essere qui?".
        #JNSQ_bd_mapping_MohoInSpaceLowHighlands_00 = Le alture sono una rete aggrovigliata di creste e impatti. Le curve di livello iniziano a sembrare sudate.
        #JNSQ_bd_mapping_MohoInSpaceLowMidlands_00 = Lievi variazioni di quota emergono come ombre lunghe e dure. L'angolo del sole fa gran parte della cartografia al posto tuo.
        #JNSQ_bd_mapping_MohoInSpaceLowCraters_00 = Crateri sopra crateri finché la superficie diventa una trapunta di bordi. Ne segni diversi come "troppo rotondi per fidarsi".
        #JNSQ_bd_mapping_MohoInSpaceLowExoticCraters_00 = Strani schemi di crateri e ventagli di ejecta insoliti dominano l'inquadratura. Qualcuno propone "meteorologia", poi ricorda dove siete.
        #JNSQ_bd_mapping_MohoInSpaceLowRareCraters_00 = Alcuni crateri insolitamente ben conservati spiccano come se stessero posando. Li segni per lo studio e per evitarli ad alta velocità.
        #JNSQ_bd_mapping_MohoInSpaceLowVoronoiCraters_00 = Il campo craterico si spezza in zone a celle che sembrano quasi organizzate. Il team di mappatura discute se il pianeta li stia prendendo in giro.
        #JNSQ_bd_mapping_MohoInSpaceLowNotableCraters_00 = Diversi crateri enormi si prendono tutta l'immagine. I cartografi iniziano subito a chiamarli come gli snack.
        #JNSQ_bd_mapping_MohoInSpaceLowPeaks_00 = Picchi frastagliati proiettano ombre sottili come pugnali su pendii arsi. La mappa è bella nello stesso modo in cui è bello un cartello di pericolo.
        #JNSQ_bd_mapping_EveInSpaceLowPoles_00 = La fotocamera mappa soprattutto una calotta di nubi viola brillante, con alcune cuciture più scure che le girano attorno a spirale. La etichetti "probabilmente poli" e sottolinei "probabilmente".
        #JNSQ_bd_mapping_EveInSpaceLowLowlands_00 = Una coperta uniforme di foschia nasconde il suolo, ma il manto di nubi mostra grandi vortici pigri. Se le pianure sono laggiù, stanno tenendo i loro segreti.
        #JNSQ_bd_mapping_EveInSpaceLowMidlands_00 = L'immagine mostra bande di nubi stratificate con sottili cambi di texture. I cartografi iniziano a disegnare curve di livello sulle nuvole e fingono che sia normale.
        #JNSQ_bd_mapping_EveInSpaceLowHighlands_00 = Ciuffi più sottili e ombre più nette suggeriscono terreno più alto sotto la copertura. Ottieni un solo sguardo a qualcosa di solido prima che torni il viola.
        #JNSQ_bd_mapping_EveInSpaceLowPeaks_00 = Un breve varco nelle nubi rivela sagome frastagliate che spingono verso l'alto. La fotocamera prova a mettere a fuoco, poi ricorda che Eve non fa "cieli sereni".
        #JNSQ_bd_mapping_EveInSpaceLowMountains_00 = Lunghe ombre di nubi si allungano in motivi sospettosamente simili a creste. Non vedi le montagne, ma l'atmosfera sembra sapere dove sono.
        #JNSQ_bd_mapping_EveInSpaceLowShores_00 = Il bordo delle nubi cambia forma lungo un confine liscio e curvo. O è costa... oppure Eve disegna mappe false per divertimento.
        #JNSQ_bd_mapping_EveInSpaceLowExplodiumSea_00 = Un bagliore intenso sboccia sulle cime delle nubi sopra il presunto mare. Il team di mappatura lo chiama "riflessione speculare", e tutti concordano di non verificare la parola "Explodium".
        #JNSQ_bd_mapping_EveInSpaceLowPolarLakes_00 = Buchi di nubi a chiazze e gradienti dall'aria molto termica segnano la regione. I laghi restano invisibili, ma il meteo sembra orbitare attorno a loro.
        #JNSQ_bd_mapping_EveInSpaceLowPetrolLakes_00 = Macchie scure e lente di nubi restano sospese sopra l'area del bacino. Qualcuno scrive "oleoso" sulla mappa, poi lo cancella due volte.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofAkron_00 = Il manto nuvoloso forma una grande spirale con un arco esterno pulito. La segni come un bacino maggiore e l'atmosfera ricambia con dello statico.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofNessus_00 = Un ampio foglio di nubi liscio siede sulla regione come un coperchio. Qualunque cosa ci sia sotto, a quanto pare non è invitata nella foto.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofTaniwha_00 = La fotocamera coglie una linea frontale di nubi sfrangiata, come se stesse masticando la superficie. Mappare questo in luce visibile sembra compilare moduli durante un uragano.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofGigan_00 = Alte incudini di nubi brillanti si raggruppano qui in celle ripetute. Mappi le cime delle tempeste e lo chiami "abbastanza buono per l'orbita".
        #JNSQ_bd_mapping_EveInSpaceLowSeaofRodan_00 = Sottili strisce di nubi sfrecciano in bande parallele, come gallerie del vento dipinte nel cielo. La superficie potrebbe anche essere teorica.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofGojira_00 = Una massa di nubi densa e ondulata siede sopra il bacino con un nucleo più scuro. La foto è minacciosa in modo molto meteorologico.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofGhidorah_00 = Tre bracci di nubi distinti si attorcigliano da un nodo centrale. Lo segni come "circolazione trilobata" e ti trattieni dal dargli un nome.
        #JNSQ_bd_mapping_EveInSpaceLowSeaofBagorah_00 = La regione mostra una texture di nubi insolitamente liscia con deboli increspature ripetute. La mappa sembra calma, che è il risultato più sospetto finora.
        #JNSQ_bd_mapping_EveInSpaceLowKrakensWell_00 = Le nubi sprofondano in un grande vortice circolare, come se qualcosa le stesse tirando giù. Non vedi il "pozzo", ma vedi benissimo il cartello di avvertimento.
        #JNSQ_bd_mapping_GillyInSpaceLowLowlands_00 = Le "pianure" sembrano scavi poco profondi su un sassolino bitorzoluto. La fotocamera produce una mappa e un promemoria che qui "giù" è negoziabile.
        #JNSQ_bd_mapping_GillyInSpaceLowMidlands_00 = La texture della superficie cambia appena, ma le ombre no. Le tue curve di livello delle "regioni intermedie" sono soprattutto una discussione con la luce del sole.
        #JNSQ_bd_mapping_GillyInSpaceLowHighlands_00 = I punti alti sono nocche frastagliate e creste che sporgono come denti rotti. La mappa è al novanta per cento massi e al dieci per cento rimpianti.
        #JNSQ_bd_mapping_KerbinInSpaceLowArcticSea_00 = La fotocamera di mappatura cattura un mosaico di ghiaccio e acqua libera. Qualcuno cerchia in rosso una zona "non ammarare".
        #JNSQ_bd_mapping_KerbinInSpaceLowAridHighlands_00 = Creste affilate e tagli asciutti proiettano ombre lunghe. Questo posto sembra erodersi per dispetto.
        #JNSQ_bd_mapping_KerbinInSpaceLowAridLowlands_00 = Il terreno basso è un labirinto di pianure pallide e canali secchi. Ne segni diversi come "forse un tempo fiume?" per dopo.
        #JNSQ_bd_mapping_KerbinInSpaceLowAridMidlands_00 = Terreno ondulato e polveroso forma bande e vortici gentili. La mappa sembra come se qualcuno l'avesse sfumata con un guanto.
        #JNSQ_bd_mapping_KerbinInSpaceLowAridMountains_00 = Spine frastagliate e altipiani spezzati dominano l'inquadratura. Segni alcuni valichi che potrebbero essere sopravvivibili per un rover.
        #JNSQ_bd_mapping_KerbinInSpaceLowEasternSea_00 = Sottili scie bianche di scie di navi si incrociano sull'acqua. I Kerbal guidano davvero ovunque ci sia un orizzonte.
        #JNSQ_bd_mapping_KerbinInSpaceLowForemansSea_00 = La superficie del mare è piena di onde e linee di meteo. Quasi senti il Controllo Missione discutere "tempesta" contro "pausa snack".
        #JNSQ_bd_mapping_KerbinInSpaceLowGreatLake_00 = Un enorme specchio interno riempie l'immagine, bordato da coste irregolari. I cartografi iniziano subito a litigare su dove mettere il "Tu sei qui".
        #JNSQ_bd_mapping_KerbinInSpaceLowInlandWater_00 = Laghi e vie d'acqua brillano in chiazze scollegate. Il team di mappatura comincia a disegnare frecce e a chiedere dove siano finiti i fiumi.
        #JNSQ_bd_mapping_KerbinInSpaceLowKreenwichSea_00 = La costa qui ha troppe curve ordinate per essere rassicurante. Controlli due volte che la fotocamera non stia disegnando cartoni animati di nascosto.
        #JNSQ_bd_mapping_KerbinInSpaceLowLowlands_00 = Terreno ampio e gentile rende la mappatura facile. L'immagine è soprattutto fattorie, campi e l'occasionale puntino a forma di città.
        #JNSQ_bd_mapping_KerbinInSpaceLowMidlands_00 = Campagna ondulata si distende in bande testurizzate. Si vedono quasi le strade che fanno del loro meglio per essere dritte.
        #JNSQ_bd_mapping_KerbinInSpaceLowNorthernSea_00 = Le acque del nord sembrano più scure e fredde, con bordi di ghiaccio sparsi. La mappa torna etichettata "frizzante" per motivi poco chiari.
        #JNSQ_bd_mapping_KerbinInSpaceLowSub-ArcticSea_00 = La fotocamera cattura un confine inquieto tra banchisa e acqua libera. Sembra che il pianeta indossi un colletto bianco incrinato.
        #JNSQ_bd_mapping_KerbinInSpaceLowTriangulusSea_00 = Tre fronti distinti si incontrano in un cuneo ordinato di colore che cambia. Il team di mappatura insiste che sia naturale, tu non ne sei convinto.
        #JNSQ_bd_mapping_KerbinInSpaceLowWelcomeBackIsland_00 = Un minuscolo puntino di isola mostra linee sospettosamente dritte e terreno ripulito. Lo segni "accogliente" e anche "probabilmente una trappola per piloti distratti".
        #JNSQ_bd_mapping_KerbinInSpaceLowWesternSea_00 = Lunghe linee di onda attraversano il mare in strisce parallele. La mappa sembra serena, il che in qualche modo suona come un avvertimento.
        #JNSQ_bd_mapping_MunInSpaceLowExoticCraters_00 = Qui i crateri si accumulano sui crateri, con bordi che non sono d'accordo su dove sia l'alto. Etichetti la regione "geologicamente troppo diligente".
        #JNSQ_bd_mapping_MunInSpaceLowLowlands_00 = Pianure più scure tra gli impatti fanno sembrare la superficie quasi calma. "Quasi" fa un sacco di lavoro sul Mun.
        #JNSQ_bd_mapping_MunInSpaceLowMountains_00 = Picchi affilati come lame proiettano ombre come inchiostro rovesciato. Il team di mappatura aggiunge in silenzio curve di livello extra, giusto per sicurezza.
        #JNSQ_bd_mapping_MunInSpaceLowNotableCraters_00 = Due crateri notevoli dominano l'inquadratura, collegati da cicatrici e raggi di ejecta. Anche la fotocamera sembra impressionata.
        #JNSQ_bd_mapping_MunInSpaceLowPolarIceCraters_00 = I crateri polari si nascondono nell'ombra con piccoli riflessi luminosi lungo i bordi. Laggiù qualcosa non vuole proprio evaporare.
        #JNSQ_bd_mapping_MunInSpaceLowRareCraters_00 = Una coppia di crateri vecchi e malconci mostra bordi smussati e fondi disordinati. Sembrano prendere colpi da sempre.
        #JNSQ_bd_mapping_MunInSpaceLowVoronoiCraters_00 = I campi craterici formano motivi ripetuti simili a celle. Per un attimo sospetti che Mun stia tassellando di proposito.
        #JNSQ_bd_mapping_MinmusInSpaceLowBasins_00 = Grandi bacini lisci si distendono come glassa alla menta rovesciata. La mappa è così piatta che sembra che la fotocamera ti stia prendendo in giro.
        #JNSQ_bd_mapping_MinmusInSpaceLowBrownBasins_00 = Gli stessi bacini lisci, ma macchiati più scuri in ampie chiazze. Qualcuno scrive "vortice di cioccolato?" e riceve uno sguardo severo.
        #JNSQ_bd_mapping_MinmusInSpaceLowBrownHighlands_00 = Terreno alto scurito interrompe la solita superficie pallida. Il contrasto fa risaltare il rilievo come una cattiva idea.
        #JNSQ_bd_mapping_MinmusInSpaceLowBrownLowlands_00 = Le zone basse sembrano spolverate con qualcosa che non è color menta. Lo segnali per analisi della "terra misteriosa".
        #JNSQ_bd_mapping_MinmusInSpaceLowBrownMidlands_00 = Una fascia di terreno a chiazze interrompe i gradienti uniformi. I cartografi la chiamano "brutta", poi ricordano di essere scienziati.
        #JNSQ_bd_mapping_MinmusInSpaceLowMidlands_00 = Tra le pianure emergono creste lievi e dolci rialzi. È il tipo di terreno che ti sfuggirebbe senza una mappa fatta bene.
        #JNSQ_bd_mapping_MinmusInSpaceLowMountains_00 = Pendii ripidi e creste taglienti incidono la superficie in cunei drammatici. Il team di mappatura chiede più cautela e meno atterraggi di pura spavalderia.
        #JNSQ_bd_mapping_MinmusInSpaceLowPoles_00 = Il terreno polare sembra pulito e luminoso, con ombre lunghe da piccoli rialzi. La mappa torna etichettata "nitida", di nuovo per motivi poco chiari.
        #JNSQ_bd_mapping_DunaInSpaceLowIceCaps_00 = Le calotte polari brillano intense attraverso la foschia sottile, con bordi spazzati dal vento come carta strappata. Segni diverse zone "lisce" che probabilmente sono tutto tranne che lisce.
        #JNSQ_bd_mapping_DunaInSpaceLowHighlands_00 = Alture aspre formano creste spezzate e scarpate polverose. Le ombre sembrano abbastanza affilate da tagliare le funi del paracadute.
        #JNSQ_bd_mapping_DunaInSpaceLowMidlands_00 = Terreno ondulato sfuma tra vecchi impatti e ampie pianure. È il tipo di paesaggio che nasconde rocce in ogni punto "piatto".
        #JNSQ_bd_mapping_DunaInSpaceLowLowlands_00 = Bacini bassi e scuri si allargano come macchie di versato secco sulla ruggine. Il Controllo Missione chiede siti di atterraggio: proponi "un posto che non abbia la forma dei guai".
        #JNSQ_bd_mapping_DunaInSpaceLowCraters_00 = Conche sovrapposte e raggi di ejecta cuciono la superficie in una trapunta disordinata. Il team di mappatura comincia a chiamare i bordi come gli snack per restare calmo.
        #JNSQ_bd_mapping_DunaInSpaceLowRareCraters_00 = Alcuni crateri insolitamente nitidi spiccano come ammaccature fresche su uno scafo antico. Li segni "quasi nuovi" e ti senti subito vecchio.
        #JNSQ_bd_mapping_DunaInSpaceLowVoronoiCraters_00 = Gli impatti si dispongono in zone stranamente simili a celle. Il motivo sembra progettato, finché non ricordi che anche la natura si diverte con la geometria.
        #JNSQ_bd_mapping_DunaInSpaceLowNotableCraters_00 = Diversi crateri giganteschi dominano l'inquadratura, con fondi che sembrano sospettosamente livellati. Aggiungi una nota: "piatto non significa sicuro".
        #JNSQ_bd_mapping_DunaInSpaceLowExoticCraters_00 = Bordi strani, ejecta irregolare e cicatrici sbilanciate fanno sembrare questo campo come se avesse perso una rissa. La fotocamera si rifiuta educatamente di indovinare cos'è successo.
        #JNSQ_bd_mapping_DunaInSpaceLowTrenches_00 = Lunghi tagli scuri serpeggiano sul terreno come se qualcuno avesse trascinato un artiglio nella polvere. Evidenzi le linee più profonde e scrivi "niente rover".
        #JNSQ_bd_mapping_DunaInSpaceLowNotablePlains_00 = Ampie pianure aperte si stendono tra crateri sparsi, quasi invitanti. Ingrandisci e l'invito viene revocato dai massi.
        #JNSQ_bd_mapping_DunaInSpaceLowNotableMountains_00 = Una catena di picchi buca la foschia, proiettando drammatici raggi d'ombra. I cartografi discutono se la cresta sia una montagna o molte cattive decisioni.
        #JNSQ_bd_mapping_DunaInSpaceLowMountains_00 = Rilievo alto e frastagliato fa sembrare la mappa delle curve di livello uno scarabocchio stressato. Quasi senti le sospensioni del lander lamentarsi.
        #JNSQ_bd_mapping_DunaInSpaceLowVolcano_00 = Un ampio duomo e colate scure suggeriscono che la superficie un tempo abbia provato a essere liquida. Annoti la mappa con "probabilmente dormiente" e sottolinei "probabilmente".
        #JNSQ_bd_mapping_IkeInSpaceLowPoles_00 = I poli mostrano contrasti netti tra creste illuminate e ombra profonda. La mappa torna come cinquanta sfumature di grigio e una sfumatura di "guarda dove metti i piedi".
        #JNSQ_bd_mapping_IkeInSpaceLowMountains_00 = Catene frastagliate scolpiscono la superficie in cunei taglienti. Cerchi alcuni passaggi che sembrano percorribili, poi ricordi che qui la gravità è facoltativa.
        #JNSQ_bd_mapping_IkeInSpaceLowMidlands_00 = Le regioni intermedie sono un mosaico di terreno ruvido e bacini poco profondi. È come se il terreno non sapesse decidere se essere cratere o no.
        #JNSQ_bd_mapping_IkeInSpaceLowLowlands_00 = Pianure scure si raccolgono tra creste più alte in ampie chiazze dall'aria calma. Le chiazze calme sono dove si nascondono le rocce peggiori.
        #JNSQ_bd_mapping_IkeInSpaceLowHighlands_00 = Il terreno alto è molto eroso e bucherellato, con bordi sopra bordi. Ti chiedi quanti impatti servano prima che una luna presenti un reclamo.
        #JNSQ_bd_mapping_EdnaInSpaceLowLowlands_00 = Le pianure sono fioche, polverose e irregolari, con bacini dolci che svaniscono nel buio. Mappare sembra cercare di contornare un'ombra con un'altra ombra.
        #JNSQ_bd_mapping_EdnaInSpaceLowMidlands_00 = Creste lievi e lunghi pendii si vedono solo quando l'angolo del sole collabora. Fai tre passaggi e li cuci in qualcosa che somiglia alla certezza.
        #JNSQ_bd_mapping_EdnaInSpaceLowHighlands_00 = Le alture di Edna sono frastagliate e spezzate, con riflessi chiari sui bordi taglienti. La mappa sembra un foglio di carta al carbone accartocciato.
        #JNSQ_bd_mapping_EdnaInSpaceLowPolarIceCraters_00 = Crateri polari in ombra nascondono piccoli riflessi luminosi che si rifiutano di essere spiegati. Li segnali come "candidati trappola fredda" e "non disturbare".
        #JNSQ_bd_mapping_EdnaInSpaceLowWhites_00 = Una regione pallida spicca sulla superficie altrimenti scura come gesso su ardesia. Il team discute brina, sale o "Edna che fa la drammatica".
        #JNSQ_bd_mapping_DakInSpaceLowLowlands_00 = Le zone basse sembrano ammaccature scavate in una patata bitorzoluta. Ne segni diverse come "buone per atterrare" e poi aggiungi "forse" in lettere più piccole.
        #JNSQ_bd_mapping_DakInSpaceLowMidlands_00 = Le regioni intermedie ondulano in gobbe irregolari e buche poco profonde senza uno schema evidente. La griglia della mappa sembra più un suggerimento che un sistema di coordinate.
        #JNSQ_bd_mapping_DakInSpaceLowHighlands_00 = I punti alti sporgono come nocche appuntite con ombre esagerate. Non sai se stai mappando terreno o un giardino di rocce particolarmente arrabbiato.
        #JNSQ_bd_mapping_DresInSpaceLowPoles_00 = I poli mostrano contrasti di albedo netti e lunghe ombre fredde. La mappa è abbastanza ordinata da farti dimenticare per un attimo che Dres sta cercando di nascondersi.
        #JNSQ_bd_mapping_DresInSpaceLowHighlands_00 = Le alture si alzano in placche fratturate e creste, martoriate da vecchi impatti. Le curve di livello si accumulano come scartoffie.
        #JNSQ_bd_mapping_DresInSpaceLowMidlands_00 = Le regioni intermedie sembrano ingannevolmente lisce finché non ingrandisci e trovi infiniti microcrateri. La etichetti "quasi piatta" per motivi legali.
        #JNSQ_bd_mapping_DresInSpaceLowLowlands_00 = Le pianure formano bacini più scuri che raccolgono ejecta e polvere. La fotocamera cattura alcuni fondi sospettosamente livellati, perfetti per trappole o basi.
        #JNSQ_bd_mapping_DresInSpaceLowCanyon_00 = Un canyon profondo e tortuoso taglia la superficie come uno strappo. Il team di mappatura lo disegna con inchiostro spesso e lo chiama "impossibile da perdere".
        #JNSQ_bd_mapping_JoolInSpaceLowEquatorialBands_00 = Le bande equatoriali sembrano caramella verde tirata attorno al pianeta. Il team di mappatura discute su quale striscia sia "su".
        #JNSQ_bd_mapping_JoolInSpaceLowExposedLowerDeck_00 = Uno strappo più scuro nelle nubi superiori rivela uno strato più profondo che si muove nella direzione sbagliata. Lo etichetti "strato inferiore" e smetti di fare domande.
        #JNSQ_bd_mapping_JoolInSpaceLowSubpolarBands_00 = Le fasce subpolari si spezzano in chevron e festoni sfrangiati. Le linee della griglia ondeggiano come se il pianeta stesse respirando.
        #JNSQ_bd_mapping_JoolInSpaceLowNorthPole_00 = Il polo nord si avvolge in un vortice stretto e pallido. Sembra uno scarico vicino al quale non dovresti stare.
        #JNSQ_bd_mapping_JoolInSpaceLowSouthPole_00 = La calotta polare sud è una spirale disordinata con nodi luminosi. La fotocamera restituisce una mappa e un avviso di sicurezza non richiesto.
        #JNSQ_bd_mapping_JoolInSpaceLowStormComplex_00 = Un gruppo di tempeste forma ovali incastrati, come se qualcuno avesse premuto il pluriball nelle nuvole. Il "pop" è sottinteso.
        #JNSQ_bd_mapping_LaytheInSpaceLowShores_00 = Le coste tracciano frange di sabbia chiara attorno all'oceano scuro. Ogni baia sembra un sito di atterraggio invitante e un sito di atterraggio terribile.
        #JNSQ_bd_mapping_LaytheInSpaceLowShallows_00 = Il colore dell'acqua cambia vicino alle isole, delineando barriere e bassifondi. La mappa torna annotata: "non sottovalutare le onde".
        #JNSQ_bd_mapping_LaytheInSpaceLowInlandWater_00 = Mari interni scintillano tra le creste, collegati da canali che appaiono e scompaiono. Inizi a sospettare che le maree abbiano opinioni.
        #JNSQ_bd_mapping_LaytheInSpaceLowKrenwichSea_00 = Il mare è incorniciato da arcipelaghi sparsi, con lunghe strie di vento sulla superficie. I cartografi disegnano subito rotte di navigazione.
        #JNSQ_bd_mapping_LaytheInSpaceLowArcticSea_00 = L'acqua del nord è a chiazze per le zattere di ghiaccio lucente. La mappa è nitida finché un banco di nubi non prova a mangiarsi la costa.
        #JNSQ_bd_mapping_LaytheInSpaceLowJoolwardSea_00 = Un'ampia distesa d'acqua con pesanti ombre di nubi che scivolano verso Jool. È difficile capire dove finisca il mare e inizi il cielo.
        #JNSQ_bd_mapping_LaytheInSpaceLowPolwardSea_00 = L'acqua scura sfuma in pallidi campi di ghiaccio verso il polo. Segni un confine netto e scrivi "probabilmente sottile".
        #JNSQ_bd_mapping_LaytheInSpaceLowHighlands_00 = Il terreno elevato forma terrazze e scarpate sopra le coste. Le ombre fanno sembrare tutto più ripido di quanto piaccia alle tue gambe d'atterraggio.
        #JNSQ_bd_mapping_LaytheInSpaceLowMountains_00 = Catene di picchi bucano sottili veli di nubi, proiettando ombre da pugnale. Il team di mappatura aggiunge intervalli di quota extra per rispetto.
        #JNSQ_bd_mapping_LaytheInSpaceLowIceCaps_00 = Calotte luminose si riversano verso l'esterno in lobi, spezzate da fratture più scure. Qui qualcosa sta scorrendo senza il permesso di nessuno.
        #JNSQ_bd_mapping_LaytheInSpaceLowEnclosedFaults_00 = Una rete di fratture chiuse e graben delinea blocchi poligonali. La fotocamera lo fa sembrare una smaltatura ceramica grande quanto un pianeta.
        #JNSQ_bd_mapping_LaytheInSpaceLowLowlands_00 = Terreno basso e ondulato riempie lo spazio tra coste e alture, punteggiato da piccoli crateri. Cerchi diverse zone "piatte" e poi ingrandisci.
        #JNSQ_bd_mapping_LaytheInSpaceLowMidlands_00 = Il terreno a quota intermedia mostra creste intrecciate e bacini poco profondi. Si mappa pulito, che su Laythe sembra sospetto.
        #JNSQ_bd_mapping_VallInSpaceLowPoles_00 = I poli sono luminosi e lisci visti dall'alto, con deboli cicatrici che spiraleggiano verso l'esterno. La mappa sembra ghiaccio rimescolato.
        #JNSQ_bd_mapping_VallInSpaceLowHighlands_00 = Le alture mostrano creste e placche frantumate in azzurro pallido. Le ombre si allungano come dita fredde.
        #JNSQ_bd_mapping_VallInSpaceLowMidlands_00 = Le regioni intermedie alternano gobbe ruvide e pianure più lisce. Il terreno sembra essersi congelato a metà di un cedimento.
        #JNSQ_bd_mapping_VallInSpaceLowLowlands_00 = Pianure basse e scure si estendono tra sollevamenti più chiari, tagliate da lunghi solchi sinuosi. Le etichetti "canyon" e "non entrare".
        #JNSQ_bd_mapping_VallInSpaceLowMountains_00 = Le montagne si alzano bruscamente dalle pianure, con creste chiare e ombra blu profonda. Atterrare qui sarebbe una trattativa.
        #JNSQ_bd_mapping_TyloInSpaceLowPoles_00 = Le regioni polari sono craterizzate e spoglie, con ombre lunghe come rasoi. La mappa è perlopiù cerchi, alcuni dei quali circondano altri cerchi.
        #JNSQ_bd_mapping_TyloInSpaceLowMountains_00 = Fasce montuose risaltano in forte rilievo contro lisce coltri di ejecta. La topografia sembra fiera, e anche pesante.
        #JNSQ_bd_mapping_TyloInSpaceLowHighlands_00 = Le alture sono bucherellate e spezzate, un labirinto di creste e vecchi impatti. Le curve di livello si accumulano come un'etichetta di avvertimento.
        #JNSQ_bd_mapping_TyloInSpaceLowMidlands_00 = Le regioni intermedie si addolciscono quel tanto che basta per tentarti. Ingrandisci e trovi massi che potrebbero avere un proprio CAP.
        #JNSQ_bd_mapping_TyloInSpaceLowLowlands_00 = I bacini bassi sono più scuri e più piatti, con sottili texture simili a colate. Il team di mappatura li chiama "belli" e poi corregge in "meno terribili".
        #JNSQ_bd_mapping_BopInSpaceLowPoles_00 = Ai poli è sempre Bop, ma con un'illuminazione più strana. La griglia della mappa oscilla mentre la luna si rifiuta di sembrare sferica.
        #JNSQ_bd_mapping_BopInSpaceLowMountains_00 = Nocche e creste appuntite sporgono come schegge. Le ombre le fanno sembrare più alte di quanto abbiano diritto di essere.
        #JNSQ_bd_mapping_BopInSpaceLowLowlands_00 = Depressioni si raggruppano in chiazze bitorzolute, come impronte di pollice nell'argilla. Tracci un'ellisse di atterraggio e te ne penti subito.
        #JNSQ_bd_mapping_BopInSpaceLowMidlands_00 = Terreno in pendenza avvolge il corpo in fasce irregolari. È difficile capire se stai mappando colline o una coperta piegata male.
        #JNSQ_bd_mapping_BopInSpaceLowHighlands_00 = Alte creste disegnano una spina dorsale storta sulla superficie. La mappa suggerisce che Bop sia stata assemblata con pezzi di ricambio.
        #JNSQ_bd_mapping_PolInSpaceLowPoles_00 = I poli mostrano picchi e buche caotiche sotto una luce dura. La mappa ricorda lo schema di un riccio di mare.
        #JNSQ_bd_mapping_PolInSpaceLowLowlands_00 = Le pianure formano bacini polverosi tra creste frastagliate. Anche le parti "piatte" sembrano voler farti inciampare.
        #JNSQ_bd_mapping_PolInSpaceLowMidlands_00 = Le regioni intermedie sono un groviglio di gobbe e brevi scarpate. La fotocamera produce una mappa e un suggerimento di restare in orbita.
        #JNSQ_bd_mapping_PolInSpaceLowHighlands_00 = Le alture salgono in terrazze spezzate con pareti chiare e gessose. Il terreno sembra poroso, come se potesse sbriciolarsi a forza di guardarlo.
        #JNSQ_bd_mapping_PolInSpaceLowMountains_00 = Il bioma montano è un insieme di aghi e creste che sfida il buon senso. Lo etichetti "non toccare" e salvi il file.
        #JNSQ_bd_mapping_LindorInSpaceLowTemperateBands_00 = Il cartografo cattura ampie bande color crema avvolte attorno a Lindor come pennellate calme. Qualcuno chiede di nuovo se sia acqua o cioccolato.
        #JNSQ_bd_mapping_LindorInSpaceLowExposedLowerDeck_00 = Una frattura più scura nelle nubi rivela uno strato inferiore che scorre nella direzione sbagliata. L'immagine è splendida e leggermente inquietante.
        #JNSQ_bd_mapping_LindorInSpaceLowSubpolarBands_00 = Le bande sub-polari si sfilacciano in chevron e filamenti, come se il pianeta non sapesse scegliere un motivo. Le tue linee di griglia sembrano imbarazzate.
        #JNSQ_bd_mapping_LindorInSpaceLowNorthPole_00 = Un vortice polare compatto sta sotto una calotta pallida, così ordinato da sembrare intenzionale. Segni il centro e aggiungi "non scaricare".
        #JNSQ_bd_mapping_LindorInSpaceLowSouthPole_00 = Il vortice meridionale è più lasco e nodoso, con riccioli luminosi che si staccano come trucioli. Il team di mappatura lo definisce "dinamico" con tono preoccupato.
        #JNSQ_bd_mapping_LindorInSpaceLowStormComplex_00 = Un gruppo di tempeste forma ovali sovrapposti con bordi netti e interni disordinati. Il cartografo li etichetta tutti "da evitare", giusto per risparmiare tempo.
        #JNSQ_bd_mapping_LindorInSpaceLowUpperStormDeck_00 = Le sommità nuvolose alte e luminose sbocciano in incudini e increspature che quasi scintillano. È il cartello di pericolo più bello che tu abbia mai fotografato.
        #JNSQ_bd_mapping_KrelInSpaceLowLowlands_00 = I bassopiani di Krel sono pianure pallide attraversate da vene e giunture scure. Qui le maree hanno lavorato straordinari.
        #JNSQ_bd_mapping_KrelInSpaceLowMidlands_00 = Le pianure mostrano lunghe dorsali e conche poco profonde, come se la crosta avesse provato a incresparsi e poi si fosse congelata a metà pensiero. Tracci le faglie come fossero strade.
        #JNSQ_bd_mapping_KrelInSpaceLowHighlands_00 = Le colline sono luminose e molto craterizzate, con bordi ammucchiati su bordi. La mappa delle isoipse sembra tremare.
        #JNSQ_bd_mapping_KrelInSpaceLowPoles_00 = Ai poli, le ombre inghiottono crateri interi mentre un tenue bagliore sui bordi suggerisce brina. La mappa torna etichettata "freddo, più freddo, buco".
        #JNSQ_bd_mapping_AdenInSpaceLowLowlands_00 = I bassopiani di Aden sono bacini scuri, quasi lisci, fra cicatrici più chiare. Ogni zona "piatta" nasconde mille piccole ammaccature.
        #JNSQ_bd_mapping_AdenInSpaceLowMidlands_00 = Le pianure ondulate avvolgono il piccolo mondo in fasce irregolari. Il terreno sembra modellato a mano, poi lasciato cadere.
        #JNSQ_bd_mapping_AdenInSpaceLowHighlands_00 = Le colline sono ruvide e antiche, con segni d'impatto smussati in una texture granulosa. Quasi senti il regolite scricchiolare.
        #JNSQ_bd_mapping_AdenInSpaceLowMountains_00 = Una cresta frastagliata di montagne proietta ombre taglienti sulla superficie. La segni come punto di riferimento e come un posto terribile per atterrare.
        #JNSQ_bd_mapping_AdenInSpaceLowPoles_00 = Le regioni polari si schiariscono leggermente, come se polvere o brina preferissero fermarsi lì. Il cartografo non sa decidere quale, quindi sottolinea entrambe.
        #JNSQ_bd_mapping_HuygenInSpaceLowLowlands_00 = Attraverso la foschia ambrata di Huygen, i bassopiani appaiono come ampie macchie scure. Ecco com'è la "mappatura" quando l'atmosfera si rifiuta di collaborare.
        #JNSQ_bd_mapping_HuygenInSpaceLowMidlands_00 = Lievi dorsali e bande d'ombra lasciano intuire le pianure sotto il velo nuvoloso. Salvi il file come "probabilmente terreno".
        #JNSQ_bd_mapping_HuygenInSpaceLowHighlands_00 = La foschia si assottiglia quel tanto che basta per rivelare chiazze luminose di altopiani e bordi di crateri. Per un attimo, la superficie ammette di esistere.
        #JNSQ_bd_mapping_HuygenInSpaceLowMountains_00 = Le catene montuose appaiono come sagome sfocate con nette ombre di nubi stese sopra. La mappa è metà geologia, metà bollettino meteo.
        #JNSQ_bd_mapping_HuygenInSpaceLowPeaks_00 = Alcuni picchi spuntano dalla foschia come minuscole isole in un mare dorato. Il cartografo festeggia non saturando questa volta.
        #JNSQ_bd_mapping_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari sembrano più lisci e luminosi, con ampie zone di tono uniforme. Qualcosa qui si sta rimaneggiando in silenzio.
        #JNSQ_bd_mapping_HuygenInSpaceLowPoles_00 = Al polo, la foschia si avvolge in una calotta compatta con deboli striature radiali. Il cartografo la chiama vortice: tu la chiami un invito ad andartene.
        #JNSQ_bd_mapping_HuygenInSpaceLowPolarHighlands_00 = Gli altopiani polari mostrano blocchi luminosi macchiati fra ombre profonde, appena visibili attraverso la zuppa. Etichetti la regione "aspro, nascosto, interessante".
        #JNSQ_bd_mapping_HuygenInSpaceLowShores_00 = Lungo la costa, il tono della superficie cambia lungo un confine liscio e curvo sotto la foschia. Costa per implicazione resta comunque costa.
        #JNSQ_bd_mapping_HuygenInSpaceLowMethaneLakes_00 = Chiazze scure, simili a specchi, lampeggiano con qualche riflesso quando l'angolo è giusto. La mappa riceve una nota: "liquido confermato, sentore sconosciuto".
        #JNSQ_bd_mapping_RigaInSpaceLowLowlands_00 = I bassopiani di Riga si estendono in ampie pianure che sembrano quasi familiari, finché non noti quanto siano silenziose. La mappa sembra casa vista attraverso una finestra sbagliata.
        #JNSQ_bd_mapping_RigaInSpaceLowMidlands_00 = Le pianure ondulano in dolci dorsali e bacini poco profondi, facili da tracciare dall'orbita. I cartografi si rilassano, e così capisci che sta per succedere qualcosa.
        #JNSQ_bd_mapping_RigaInSpaceLowHighlands_00 = Le colline si alzano come altipiani spezzati e terrazze craterizzate. Aggiungi altre isoipse e un promemoria che la "bassa gravità" fa comunque male.
        #JNSQ_bd_mapping_RigaInSpaceLowMountains_00 = Le catene montuose tagliano ombre nette sulla superficie come pennellate d'inchiostro. I picchi sembrano solidi, fieri e del tutto disinteressati ai visitatori.
        #JNSQ_bd_mapping_RigaInSpaceLowPoles_00 = I poli si illuminano di brina a chiazze e di profonde ombre fredde. Alcuni crateri sono evidenziati come "forse utili" e "decisamente pericolosi".
        #JNSQ_bd_mapping_TalosInSpaceLowLowlands_00 = I bassopiani di Talos sono bacini scuri pieni di detriti fini e cicatrici antiche. La migliore caratteristica del cartografo qui è l'assenza di sorprese.
        #JNSQ_bd_mapping_TalosInSpaceLowMidlands_00 = Le pianure mostrano terreno grumoso e impatti sovrapposti senza una chiara direzione "principale". È una mappa di solitudine persistente.
        #JNSQ_bd_mapping_TalosInSpaceLowHighlands_00 = Le colline sono più luminose e più ruvide, con bordi netti che catturano la luce. Segni alcuni affioramenti per campionamenti futuri e per prudenza futura.
        #JNSQ_bd_mapping_TalosInSpaceLowMountains_00 = Le montagne si alzano in gruppi frastagliati che proiettano ombre lunghe e sottili. La mappa le etichetta "punti di riferimento" e "problemi" con la stessa sicurezza.
        #JNSQ_bd_mapping_TalosInSpaceLowPoles_00 = Ai poli, pozzi d'ombra inghiottono i dettagli mentre bordi luminosi suggeriscono brina o regolite fresca. Li cerchi e scrivi "controllare più tardi, con cautela".
        #JNSQ_bd_mapping_EelooInSpaceLowPoles_00 = I poli abbagliano di un bianco pulito e pungente, spezzato da fosse in ombra che sembrano non vedere mai il sole. Ne segni alcune come "trappole fredde" e passi oltre in fretta.
        #JNSQ_bd_mapping_EelooInSpaceLowHighlands_00 = Creste affilate e lastre di ghiaccio fratturate proiettano ombre lunghe e scure. La mappa sembra vetro incrinato che qualcuno ha provato a reincollare.
        #JNSQ_bd_mapping_EelooInSpaceLowMidlands_00 = Terreni ampi e ondulati mostrano deboli bande e rughe nel ghiaccio. È stranamente ordinato per un mondo così lontano.
        #JNSQ_bd_mapping_EelooInSpaceLowLowlands_00 = I bassopiani raccolgono derive più scure e depositi dall'aspetto morbido tra i bordi dei crateri. Da orbita sembra gentile: lo zoom dice il contrario.
        #JNSQ_bd_mapping_EelooInSpaceLowCanyon_00 = Una rete di canyon profondi taglia la superficie come una cucitura strappata. Il mapper la traccia con precisione e la etichetta "non guidarci dentro".
        #JNSQ_bd_mapping_CelesInSpaceLowLowlands_00 = I bassopiani si aprono in pianure lisce e pallide con lievi striature e deboli linee di flusso. Qualcuno scrive "troppo ordinato" sulla mappa.
        #JNSQ_bd_mapping_CelesInSpaceLowMidlands_00 = Le pianure sono un patchwork di lievi rialzi e bacini poco profondi, cuciti da vecchi impatti. Si mappano facilmente, e questo suona come una trappola.
        #JNSQ_bd_mapping_CelesInSpaceLowHighlands_00 = Colline luminose emergono in mensole spezzate e dorsali craterizzate. Le isoipse si impilano in fretta e non chiedono scusa.
        #JNSQ_bd_mapping_CelesInSpaceLowMountains_00 = Dorsali montuose proiettano ombre a lama che rendono la superficie più tagliente di quanto dovrebbe. Il team alza in silenzio il margine "da evitare".
        #JNSQ_bd_mapping_CelesInSpaceLowPoles_00 = I poli mostrano tasche d'ombra profonde con sottili orli brillanti, come brina aggrappata al bordo del buio. Il file torna con un tag extra "CONFERMA".
        #JNSQ_bd_mapping_TamInSpaceLowLowlands_00 = I bassopiani di Tam sono avvallamenti poco profondi su un corpo bitorzoluto che non riesce a scegliere una forma. Le tue "zone piatte" sono soprattutto ottimismo.
        #JNSQ_bd_mapping_TamInSpaceLowMidlands_00 = Le pianure avvolgono la superficie in bande irregolari di macerie e creste. Le griglie sembrano offese dalla geometria.
        #JNSQ_bd_mapping_TamInSpaceLowHighlands_00 = Le alture sono nodi frastagliati e pendii fratturati con ombre dure ed esagerate. È tutto "punto di riferimento" e zero conforto.
        #JNSQ_bd_mapping_TamInSpaceLowTwinCraters_00 = Due crateri dominanti siedono affiancati come lividi gemelli. Il mapper li evidenzia automaticamente, come se anche il software stesse fissando.
        #JNSQ_bd_mapping_TamInSpaceLowCraters_00 = I crateri si sovrappongono finché la superficie diventa una trapunta di orli ed ejecta. Inizi a dar loro nomi solo per ricordarti quale cerchio è quale.
        #JNSQ_bd_mapping_TamInSpaceLowPockmarks_00 = Piccoli pozzi punteggiano il terreno in cluster fitti, come se la superficie avesse preso una brutta "bolla". La mappa annota "appoggio instabile" pur non avendo piedi.
        #JNSQ_bd_mapping_HamekInSpaceLowLowlands_00 = Bacini più scuri formano ampie pozze contro la colorazione insolita di Hamek. La mappa sembra pigmento versato dove non dovrebbe esserci.
        #JNSQ_bd_mapping_HamekInSpaceLowMidlands_00 = Le pianure mostrano lunghi pendii e dorsali sottili, interrotti da impatti sparsi. Ogni dettaglio pare smorzato, come se il corpo stesse cercando di non farsi notare.
        #JNSQ_bd_mapping_HamekInSpaceLowHighlands_00 = Le colline si spezzano in scarpate luminose e altipiani ruvidi e fratturati. Il contrasto fa "saltare fuori" il rilievo in modo inquietante.
        #JNSQ_bd_mapping_HamekInSpaceLowPoles_00 = I poli svaniscono nell'ombra profonda con bordi sottilmente chiari che suggeriscono brina o polvere fresca. Cerchi diverse fosse e scrivi "controllare dopo, con cautela".
        #JNSQ_bd_mapping_NaraInSpaceLowLowlands_00 = Il mapper vede soprattutto bacini bassi, dim e scuri, attraverso una foschia fredda e pesante: le aree "piatte" sembrano voler sparire.
        #JNSQ_bd_mapping_NaraInSpaceLowMidlands_00 = Una lieve bandatura nel manto nuvoloso segue dolci rialzi sottostanti, come se l'atmosfera stesse tracciando il terreno controvoglia.
        #JNSQ_bd_mapping_NaraInSpaceLowHighlands_00 = Chiazze più luminose e ombre più nette lasciano intuire alture che spingono verso la parte "meno densa" del torbido.
        #JNSQ_bd_mapping_NaraInSpaceLowMountains_00 = Silhouette frastagliate bucano per un attimo il buio, poi spariscono di nuovo come se il pianeta avesse cambiato idea.
        #JNSQ_bd_mapping_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari appaiono come fasce lisce e pallide con lunghe ombre di crepuscolo: la mappa sembra più un'etichetta di pericolo che una carta.
        #JNSQ_bd_mapping_NaraInSpaceLowPoles_00 = Un tenue cappuccio polare di foschia vorticosa sta sopra terreno quasi nero: il punto centrale è marcato "qui ci sono rimpianti".
        #JNSQ_bd_mapping_NaraInSpaceLowPolarHighlands_00 = Creste spezzate e chiare si disperdono attorno al polo, catturando un sole basso in lampi duri attraverso l'atmosfera.
        #JNSQ_bd_mapping_AmosInSpaceLowLowlands_00 = Depressioni scure e poco profonde raccolgono detriti come pepe rovesciato: la mappa annota "atterrabile" e poi cancella in silenzio la parola.
        #JNSQ_bd_mapping_AmosInSpaceLowMidlands_00 = Pendii irregolari avvolgono un corpo che rifiuta di sembrare tondo: le tue griglie diventano un esercizio filosofico.
        #JNSQ_bd_mapping_AmosInSpaceLowHighlands_00 = Le alture sono un caos frastagliato di vecchi impatti e orli taglienti, disegnati in ombre abbastanza dense da poterci camminare sopra.
        #JNSQ_bd_mapping_AmosInSpaceLowMountains_00 = Una spina dorsale di picchi storti proietta ombre sottili come aghi: sembra che qualcuno abbia assemblato la luna con rocce avanzate.
        #JNSQ_bd_mapping_AmosInSpaceLowPoles_00 = I poli sono un groviglio di bordi chiari e fosse nere dove il sole si arrende: ne cerchi alcune e scrivi "non farlo".
        #JNSQ_bd_mapping_EnonInSpaceLowLowlands_00 = Pianure ghiacciate pallide si stendono tra orli martoriati, lisce da lontano e brutalmente testurizzate quando zoomi.
        #JNSQ_bd_mapping_EnonInSpaceLowMidlands_00 = Le pianure mostrano deboli creste e lunghe derive di materiale brillante, come onde congelate che non si rompono mai.
        #JNSQ_bd_mapping_EnonInSpaceLowHighlands_00 = Le colline scintillano con pareti di ghiaccio pulite e tagli d'ombra netti: la mappa è così "croccante" da poter tagliare un guanto.
        #JNSQ_bd_mapping_EnonInSpaceLowPoles_00 = Le regioni polari diventano un cappuccio stark con sacche d'ombra profonde che non vogliono mostrare i loro fondi: il mapper le etichetta "quasi-trappole fredde".
        #JNSQ_bd_mapping_PraxInSpaceLowLowlands_00 = Bacini scuri si raccolgono tra creste più chiare, con chiazze pallide sparse che sembrano brina indecisa.
        #JNSQ_bd_mapping_PraxInSpaceLowMidlands_00 = Terreno ondulato e cicatrici basse formano bande irregolari: si mappa bene finché cambia la luce e tutto mente.
        #JNSQ_bd_mapping_PraxInSpaceLowHighlands_00 = Le alture si spezzano in mensole ruvide e orli di crateri, illuminati da una spolverata sottile che fa risaltare il rilievo.
        #JNSQ_bd_mapping_PraxInSpaceLowMountains_00 = Gruppi montuosi emergono come denti rotti lungo una spina dorsale storta: li segni come punti di riferimento e problemi futuri.
        #JNSQ_bd_mapping_PraxInSpaceLowPoles_00 = I poli virano al contrasto duro: orli chiari, fosse nere e qualche deposito sospettosamente pallido aggrappato all'ombra.

        // bd_massSpec
        #JNSQscience_bd_massSpec_SunFlyingLow_00 = Lo spettrometro viene subito inondato di idrogeno ed elio. Registra il resto come "anche: rimorso estremo."
        #JNSQscience_bd_massSpec_SunFlyingHigh_00 = La presa annusa una miscela più rarefatta e più calda e i picchi si affinano in un messaggio chiarissimo: stai campionando il sole, e il sole sta campionando te a sua volta.
        #JNSQscience_bd_massSpec_MohoSrfLandedPoles_00 = Nelle ombre più fresche, un debole sussurro di volatili intrappolati compare tra i picchi rocciosi. Lo strumento rilegge il campione solo per essere sicuro di non aver sognato.
        #JNSQscience_bd_massSpec_MohoSrfLandedLowlands_00 = La fotocamera si riempie di polvere cotta e granelli ricchi di metalli. Tutto nello spettro dice "cotto dal sole".
        #JNSQscience_bd_massSpec_MohoSrfLandedPolarIceCraters_00 = Il campione è per lo più regolite sterile, ma le firme della trappola fredda stuzzicano qualche composto ostinato che si aggrappa al buio. Il Controllo Missione diventa improvvisamente molto interessato.
        #JNSQscience_bd_massSpec_MohoSrfLandedHighlands_00 = Qui dominano firme di silicati più grossolane e più pulite. Lo spettrometro apprezza la semplicità, anche se i tuoi stivali no.
        #JNSQscience_bd_massSpec_MohoSrfLandedMidlands_00 = Una miscela costante e noiosa di minerali scorre dentro, finché qualche atomo sputacchiato non fa schizzare il grafico come statica. Il sole ti sta facendo chimica di superficie.
        #JNSQscience_bd_massSpec_MohoSrfLandedCraters_00 = Roccia fresca polverizzata e polvere di vetro d'impatto ricoprono l'imbocco. I rapporti isotopici sembrano aver attraversato una discussione ad alta velocità.
        #JNSQscience_bd_massSpec_MohoSrfLandedExoticCraters_00 = Lo spettro è affollato di strani picchi in tracce e rapporti disordinati. Lo strumento etichetta il campione "tecnicamente valido, emotivamente disturbante".
        #JNSQscience_bd_massSpec_MohoSrfLandedRareCraters_00 = Compaiono alcuni picchi insoliti, poi scompaiono alla seconda passata. O il cratere è speciale, o il barattolo dei campioni ha appena battuto ciglio.
        #JNSQscience_bd_massSpec_MohoSrfLandedVoronoiCraters_00 = La composizione si ripete con inquietante coerenza da una palata all'altra. È come se la superficie fosse stata stampata da tessere identiche.
        #JNSQscience_bd_massSpec_MohoSrfLandedNotableCraters_00 = Il grafico è più ampio e più ricco del previsto per "solo roccia". Lo spettrometro aggiunge un piccolo segno che somiglia sospettosamente a una stella d'oro.
        #JNSQscience_bd_massSpec_MohoSrfLandedPeaks_00 = Dominano granuli appuntiti e minerali esposti, con una spolverata di atomi sputacchiati dal sole. Lo strumento nota che il "vuoto" non è un contaminante, ma ci va davvero vicino.
        #JNSQscience_bd_massSpec_KerbinSrfLandedBaikerbanur_00 = Lo spettro è per lo più polvere secca, con piccoli picchi netti di inchiostro per timbri e "gestione visitatori". Lo strumento richiede un passaporto.
        #JNSQscience_bd_massSpec_KerbinSrfLandedBaikerbanurLaunchpad_00 = Residui di scarico, sussurri di ossidante e una grossa firma "per favore campionare sopravento". L'addetto alla sicurezza aggiunge una nuova regola: niente annusate alla piattaforma.
        #JNSQscience_bd_massSpec_KerbinSrfLandedCrawlerway_00 = Domina la polvere di roccia frantumata, con gomma e fuliggine nelle note a piè di pagina. Un supervisore chiede se il tuo sensore ha un giubbotto riflettente.
        #JNSQscience_bd_massSpec_KerbinSrfLandedIslandAirfield_00 = Aerosol salino e granelli umidi compaiono subito, seguiti da un lieve retrogusto di carburante per jet. Il tuo vassoio campioni avvia una lenta, significativa corrosione.
        #JNSQscience_bd_massSpec_KerbinSrfLandedKSC_00 = Un meraviglioso miscuglio di polvere di cemento, sale da snack, toner e determinazione. Le Relazioni Pubbliche chiedono se puoi rinominarlo "Atmosfera ispirazionale".
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DCentralBuilding_00 = Sembra tutto sospettosamente pulito, finché non compare un minuscolo picco a "solvente classificato". Uno scienziato sorride e si mette tra te e il pulsante di stampa.
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DCornerLab_00 = I picchi di massa compongono "polimero sconosciuto" e "non chiedere". La porta del laboratorio scatta chiusa come se avesse un'opinione.
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DMainBuilding_00 = Fumi di vernice, refrigerante e caffè formano una stabile miscela a tre fasi. Un ingegnere ti chiede di smetterla di chiamarla "una miscela".
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DObservatory_00 = Aria frizzante, rugiada e un accenno di detergente per lenti scorrono nello spettro. L'operatore ti chiede di tenere "silenziosa" la ionizzazione.
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DSideLab_00 = Forte acetone, flussante da saldatura e l'inconfondibile aroma di "solo un test veloce". Il tuo rapporto torna indietro con un adesivo di calibrazione e senza contatto visivo.
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DSmallLab_00 = I picchi sono inquietantemente perfetti e ripetibili, come se l'aria fosse stata standardizzata. Qualcuno ti offre un modulo di riservatezza e un panno molto pulito.
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DTanks_00 = Tracce di vapori di propellente, ruggine e una nota severa di "fai un passo indietro". La sicurezza ti fornisce una checklist, un respiratore e il suggerimento di smettere di essere curioso.
        #JNSQscience_bd_massSpec_KerbinSrfLandedR&DWindTunnel_00 = Con le ventole spente, lo spettro è calmo: con le ventole accese, diventa "tutte le particelle ovunque e insieme". La galleria del vento vince la discussione semplicemente facendo più rumore.
        #JNSQscience_bd_massSpec_KerbinSrfLandedSPHMainBuilding_00 = Accenni di cherosene, fluido idraulico e polvere di alluminio: il classico bouquet da hangar. Un ingegnere irritato chiede se puoi filtrare "la realtà".
        #JNSQscience_bd_massSpec_KerbinSrfLandedSPHRoundTank_00 = Lo strumento rileva fibre d'isolamento e si pente subito di avere un'aspirazione. Un tecnico insiste che stai analizzando "lanugine non scientifica".
        #JNSQscience_bd_massSpec_KerbinSrfLandedSPHTanks_00 = Solventi, schegge di vernice e un minuscolo picco che tutti concordano sia "decisamente non ossidante". Il picco viene promosso a "rumore" per decreto ufficiale.
        #JNSQscience_bd_massSpec_KerbinSrfLandedSPHWaterTower_00 = Vapore acqueo, alghe e ioni di ruggine arrivano in allegri grumi. La torre contribuisce con un'autentica "colonia da manutenzione".
        #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishEast_00 = L'ozono dell'elettronica e il grasso delle parti mobili compaiono puntuali. L'antenna ruota e il tecnico dà la colpa al "fatto che lo spazio fa così".
        #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishNorth_00 = Lo spettro è pulito finché i motori non girano, poi ottieni una forte firma di "macchinari approvati". Ti ricordano di tenere il rivelatore lontano dai sentimenti del fascio.
        #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishSouth_00 = Picchi ordinati di polvere di ghiaia e plastica delle guaine dei cavi, disposti con disciplina inquietante. Il personale approva i tuoi dati e disapprova la tua presenza.
        #JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationHub_00 = Volatili del lucido per pavimenti, il caldo respiro dell'elettronica e antico sale da snack formano una fiera atmosfera interna. Il tuo campione viene confiscato come "detriti critici per la missione".
        #JNSQscience_bd_massSpec_KerbinSrfLandedVABMainBuilding_00 = Polvere di cemento e limature metalliche piovono nell'aspirazione come neve industriale. La gru si muove e il tuo spettro sviluppa una "urgenza dinamica".
        #JNSQscience_bd_massSpec_KerbinSrfLandedVABPodMemorial_00 = Una linea di base tranquilla: aria pulita, lieve polvere di pietra e rispettoso silenzio. Persino lo strumento sembra abbassare la voce.
        #JNSQscience_bd_massSpec_KerbinSrfLandedVABRoundTank_00 = Vernice di alta qualità, solvente e un picco marcato a "smettila di guardare". La sicurezza appare nello spettro prima di apparire nella tua visione periferica.
        #JNSQscience_bd_massSpec_KerbinSrfLandedVABSouthComplex_00 = Ioni di metallo caldo, residui di flussante e un pizzico piccante di fumo di saldatura dominano la scansione. La sicurezza ti chiede di smettere di campionare qualsiasi cosa sia ancora calda.
        #JNSQscience_bd_massSpec_KerbinSrfLandedVABTanks_00 = Polvere, gomma e una traccia di aroma di propellente si combinano in "operazioni normali". La raccomandazione ufficiale è registrare i dati e dimenticare l'sentore.
        #JNSQscience_bd_massSpec_KerbinSrfLandedWoomerang_00 = Lo spettro cambia a metà scansione quando il vento trasferisce tutto il tuo esperimento. I risultati indicano soprattutto aria, a tratti portablocco, sempre raffiche.
        #JNSQscience_bd_massSpec_KerbinFlyingLow_00 = La presa si riempie di aria umida, polline e qualcosa che si può descrivere solo come "briciole di snack in sospensione".
        #JNSQscience_bd_massSpec_KerbinFlyingHigh_00 = Lo spettrometro di massa conferma che l'atmosfera si sta assottigliando. Conferma anche che l'aria della tua cabina si sta facendo più stantia.
        #JNSQscience_bd_massSpec_KerbinSrfLandedHighlands_00 = Lo spettro mostra aria pulita con un morso secco di polvere e graniglia di roccia. Lo strumento lo etichetta "rinfrescante", che non è un'unità di misura.
        #JNSQscience_bd_massSpec_KerbinSrfLandedShores_00 = Spruzzi di sale e aria umida ricoprono l'imbocco. La lettura è per lo più acqua di mare... più una quantità sorprendente di crema solare.
        #JNSQscience_bd_massSpec_KerbinSrfLandedMidlands_00 = Un comodo miscuglio di aria e aerosol del suolo scivola nella fotocamera. I composti in tracce correlano fortemente con "qualcuno sta facendo un picnic qui vicino".
        #JNSQscience_bd_massSpec_KerbinSrfLandedLowlands_00 = Il campione è più caldo, più umido e pieno di minuscole tracce organiche. Lo strumento chiede cortesemente di smettere di respirargli direttamente dentro.
        #JNSQscience_bd_massSpec_KerbinSrfLandedAridLowlands_00 = Aria secca e polvere fine dominano lo spettro. Lo spettrometro valuta per un attimo di rinominarsi "contasabbia".
        #JNSQscience_bd_massSpec_KerbinSrfLandedAridMidlands_00 = Il campione è tutto graniglia portata dal vento e ostinata aridità. Il Controllo Missione chiede se l'imbocco è ostruito: rispondi che è ostruito tutto il bioma.
        #JNSQscience_bd_massSpec_KerbinSrfLandedAridHighlands_00 = Polvere minerale tagliente e aerosol cotti dal sole compaiono chiaramente. Lo strumento rileva "calanchi" nello spirito, anche se non nell'ortografia.
        #JNSQscience_bd_massSpec_KerbinSrfLandedAridMountains_00 = L'aria sottile trasporta roccia polverizzata come un distintivo d'onore. Lo spettrometro registra uno spettro pulito con un retrogusto granuloso.
        #JNSQscience_bd_massSpec_KerbinSrfLandedGreatLake_00 = L'imbocco beve nebbia e goccioline d'acqua dolce. I dati tornano soprattutto "bagnato", con una nota su "decisamente schizzato".
        #JNSQscience_bd_massSpec_KerbinSrfLandedInlandWater_00 = Lo spettro è ricco d'acqua e piacevolmente noioso. Il tuo rapporto è meno noioso perché l'attrezzatura ora è umida.
        #JNSQscience_bd_massSpec_KerbinSrfLandedKreenwichSea_00 = Spruzzi salmastri e aria umida inondano la fotocamera campioni. Lo strumento identifica "oceano", poi aggiunge: "anche sentore di barca, in qualche modo".
        #JNSQscience_bd_massSpec_KerbinSrfLandedArcticSea_00 = L'aria fredda porta cristalli di ghiaccio nell'imbocco come minuscoli coltelli. Lo spettrometro riporta un campione pulito e un rancore personale.
        #JNSQscience_bd_massSpec_KerbinSrfLandedForemansSea_00 = Spruzzi di mare, aria umida e un tenue accenno di residui di carburante vorticano insieme. La lettura suggerisce che qualcuno stia collaudando qualcosa qui vicino.
        #JNSQscience_bd_massSpec_KerbinSrfLandedTriangulusSea_00 = Il campione è salato, bagnato ed estremamente coerente. Il grafico è così perfetto che sospetti stia facendo lo spaccone.
        #JNSQscience_bd_massSpec_KerbinSrfLandedNorthernSea_00 = Lo spettro è carico di umidità e sale con un bordo gelido. Il riscaldatore dello strumento si accende e se ne pente immediatamente.
        #JNSQscience_bd_massSpec_KerbinSrfLandedSub-ArcticSea_00 = Aerosol di salamoia fredda e polvere di ghiaccio alla deriva dominano l'imbocco. Lo spettrometro dichiara le particelle "croccanti", poi si rifiuta di commentare oltre.
        #JNSQscience_bd_massSpec_KerbinSrfLandedEasternSea_00 = L'imbocco cattura un flusso costante di foschia marina. La firma è da manuale "oceano", con un picco extra etichettato "le onde hanno colpito l'alloggiamento".
        #JNSQscience_bd_massSpec_KerbinSrfLandedWesternSea_00 = Aria salata e spruzzi riempiono la fotocamera a impulsi ritmici. I picchi di massa si allineano a ogni spruzzo come se il mare stesse facendo tocchi di calibrazione.
        #JNSQscience_bd_massSpec_KerbinSrfLandedWelcomeBackIsland_00 = Lo spettro mostra aria marina pulita mescolata a strane tracce di scarico. È come se l'isola ti stesse ricordando con garbo dove di solito finiscono i razzi.
        #JNSQscience_bd_massSpec_MunSrfLandedHighlands_00 = La presa aspira polvere tagliente e secca con una testarda mancanza di volatili. Lo spettrometro conferma: sì, è ancora Mun.
        #JNSQscience_bd_massSpec_MunSrfLandedMidlands_00 = Sottili particelle di regolite scivolano nella fotocamera e ricoprono tutto immediatamente. I dati sono eccellenti finché lo strumento non diventa "parte della superficie".
        #JNSQscience_bd_massSpec_MunSrfLandedLowlands_00 = Il campione contiene polvere più densa e più scura e fini d'impatto. Lo spettro sembra dire che Mun si stia macinando in polvere per divertimento.
        #JNSQscience_bd_massSpec_MunSrfLandedPolarIceCraters_00 = Lo spettrometro intercetta deboli firme di volatili nascoste nella polvere fredda. Il Controllo Missione si entusiasma e tu fai finta di non sentirli.
        #JNSQscience_bd_massSpec_MunSrfLandedExoticCraters_00 = Il campione include strani granelli vetrosi ed ejecta mescolati. Lo strumento insiste che il cratere sia "chimicamente drammatico".
        #JNSQscience_bd_massSpec_MunSrfLandedRareCraters_00 = La polvere dall'aspetto fresco mostra picchi più puliti e più netti. È come se Mun avesse appena aperto un nuovo sacchetto di superficie.
        #JNSQscience_bd_massSpec_MunSrfLandedVoronoiCraters_00 = La composizione si ripete con inquietante regolarità da una palata all'altra. Lo spettrometro controlla due volte le impostazioni e poi smette di fare domande.
        #JNSQscience_bd_massSpec_MunSrfLandedNotableCraters_00 = I granuli qui mostrano una gamma di materiali più ampia del previsto. Il cratere si guadagna il nome risultando fastidiosamente interessante.
        #JNSQscience_bd_massSpec_MunSrfLandedMountains_00 = Particelle più grossolane e frammenti di roccia esposta dominano il campione. Lo strumento è contento di vedere qualcosa che, per una volta, non sia al 90% polvere.
        #JNSQscience_bd_massSpec_MinmusSrfLandedPoles_00 = Il campione è freddo e leggermente più ricco di volatili rispetto al terreno circostante. Lo spettrometro annota che "la brina non è un sapore".
        #JNSQscience_bd_massSpec_MinmusSrfLandedLowlands_00 = Granuli di superficie polverosi mostrano picchi luminosi e puliti con strani sali mescolati. Cerchi di non leccare niente per verificarlo.
        #JNSQscience_bd_massSpec_MinmusSrfLandedMidlands_00 = Un ordinato miscuglio di polvere e granelli scintillanti entra nella fotocamera. Lo strumento riporta "stabile", che è più di quanto si possa dire delle tue gambe d'atterraggio.
        #JNSQscience_bd_massSpec_MinmusSrfLandedHighlands_00 = Il campione contiene più frammenti rocciosi e meno polveri fini. Lo spettro sembra dire che Minmus lassù abbia deciso di fare sul serio.
        #JNSQscience_bd_massSpec_MinmusSrfLandedBasins_00 = La presa si riempie di materiale ultrafine e insolitamente uniforme. Lo spettrometro trova molti sali e volatili, e assolutamente nessuna guarnizione da dessert.
        #JNSQscience_bd_massSpec_MinmusSrfLandedBrownBasins_00 = Lo stesso materiale liscio del bacino, ma spolverato di contaminanti più scuri. Lo spettrometro lo definisce "condito", che di nuovo non è un'unità di misura.
        #JNSQscience_bd_massSpec_MinmusSrfLandedBrownLowlands_00 = Granelli più scuri spostano lo spettro verso minerali più pesanti. I dati suggeriscono che il "marrone" non sia solo un problema di illuminazione.
        #JNSQscience_bd_massSpec_MinmusSrfLandedBrownMidlands_00 = La fotocamera raccoglie particelle chiare e scure mescolate in strati ordinati. Lo strumento produce un grafico che sembra un panino disordinato.
        #JNSQscience_bd_massSpec_MinmusSrfLandedBrownHighlands_00 = Qui domina graniglia scura più grossolana. Lo spettrometro segnala "abrasivo" e tu smetti subito di scuotere il contenitore.
        #JNSQscience_bd_massSpec_MinmusSrfLandedMountains_00 = Il campione è per lo più polvere tagliente e schegge di roccia da pendii ripidi. Lo spettrometro approva, poi chiede se puoi per favore smettere di scivolare a valle.
        #JNSQscience_bd_massSpec_EveFlyingLow_00 = La presa ingoia aria densa e calda, piena di aerosol ostinatamente viola. Lo spettro è per lo più anidride carbonica e "foschia, in qualche modo".
        #JNSQscience_bd_massSpec_EveFlyingHigh_00 = L'aria in quota si assottiglia e i picchi si affinano. È ancora per lo più anidride carbonica e azoto, solo con meno cose che cercano di impastare l'imbocco.
        #JNSQscience_bd_massSpec_EveSrfLandedPoles_00 = L'aria più fredda trasporta meno aerosol pesanti, ma la fotocamera si riempie comunque in fretta. Lo strumento nota una miscela più pulita e un sacco di polvere di brina davvero poco amichevole.
        #JNSQscience_bd_massSpec_EveSrfLandedLowlands_00 = Il campione è denso, caldo e desideroso di stare ovunque tranne che nella fotocamera. La lettura è dominata dall'anidride carbonica, con un contorno di "problema di pressione".
        #JNSQscience_bd_massSpec_EveSrfLandedMidlands_00 = Passa una miscela più stabile, con deboli tracce minerali che viaggiano sulla polvere fine. Lo spettrometro la etichetta "respirabile solo dalle rocce".
        #JNSQscience_bd_massSpec_EveSrfLandedHighlands_00 = Qui i picchi sembrano più puliti, come se l'aria si prendesse una pausa dal fare la drammatica. Poi l'imbocco si intasa lo stesso, perché questa è pur sempre Eve.
        #JNSQscience_bd_massSpec_EveSrfLandedPeaks_00 = Per un momento lo spettro è quasi ordinato: meno aerosol, più linee di gas nette. Lo strumento salva la sessione come "Rara Vittoria".
        #JNSQscience_bd_massSpec_EveSrfLandedMountains_00 = La polvere di roccia domina il campione, con le linee dei gas pesanti che sfondano sotto. Il contenuto della fotocamera è ora ufficialmente "granuloso e opprimente".
        #JNSQscience_bd_massSpec_EveSrfLandedShores_00 = Lo spettro schizza con foschia umida e acida e aerosol salati sollevati dalla risacca vicina. Lo strumento chiede un ciclo di risciacquo che non hai.
        #JNSQscience_bd_massSpec_EveSrfLandedKrakensWell_00 = Il campione contiene i soliti gas densi... più strani picchi in tracce che si ripetono con troppa coerenza. Il Controllo Missione suggerisce di "registrare e andarsene".
        #JNSQscience_bd_massSpec_GillySrfLandedLowlands_00 = La polvere fine scivola dentro come se stesse cercando di sfuggire alla gravità di Gilly. Lo spettro è per lo più minerali, con un debole sentore del vicinato di Eve rimasto attaccato ai granelli.
        #JNSQscience_bd_massSpec_GillySrfLandedMidlands_00 = Un miscuglio insipido di roccia polverizzata riempie la fotocamera. Lo strumento conferma gentilmente che hai, di fatto, campionato "asteroide bitorzoluto".
        #JNSQscience_bd_massSpec_GillySrfLandedHighlands_00 = Graniglia più grossolana e frammenti cotti dal sole dominano la presa. La lettura è pulita, secca e impressionantemente poco collaborativa.
        #JNSQscience_bd_massSpec_DunaSrfLandedIceCaps_00 = La fotocamera si riempie di sottili granelli di brina e ghiaccio polveroso. L'acqua compare chiaramente, con l'anidride carbonica che si aggrappa come se si rifiutasse di sublimare.
        #JNSQscience_bd_massSpec_DunaSrfLandedHighlands_00 = Qui domina nello spettro una graniglia di roccia più grossolana. La firma della "polvere rugginosa" cala, sostituita da picchi di silicati più puliti.
        #JNSQscience_bd_massSpec_DunaSrfLandedMidlands_00 = Un cocktail familiare di anidride carbonica, azoto e fini rossi sospesi in aria inonda l'imbocco. La polvere ricca di ferro insiste per essere contata come "atmosfera".
        #JNSQscience_bd_massSpec_DunaSrfLandedLowlands_00 = Il campione è più denso, con polvere in sospensione e granelli più pesanti. I picchi suggeriscono fini selezionati dal vento con qualche sorpresa salata mescolata dentro.
        #JNSQscience_bd_massSpec_DunaSrfLandedCraters_00 = Granelli mescolati dagli impatti producono uno spettro confuso e allargato. Lo strumento segnala frammenti vetrosi e tutto polverizzato.
        #JNSQscience_bd_massSpec_DunaSrfLandedRareCraters_00 = Polvere dall'aspetto più fresco produce picchi più netti e meno stranezze alterate. Il cratere sembra orgoglioso del suo "sentore di materiale nuovo".
        #JNSQscience_bd_massSpec_DunaSrfLandedVoronoiCraters_00 = La composizione si ripete con inquietante coerenza da una palata all'altra. È come se la superficie fosse stata stampata da ricette identiche.
        #JNSQscience_bd_massSpec_DunaSrfLandedNotableCraters_00 = I rapporti sembrano leggermente "fuori" in un modo che continua a ripetersi. Il Controllo Missione dice "interessante", che di solito significa "prendi altri campioni".
        #JNSQscience_bd_massSpec_DunaSrfLandedExoticCraters_00 = Strani picchi in tracce spuntano tra le solite linee della polvere. Lo spettrometro etichetta il campione "valido", poi avvia in silenzio una seconda sessione.
        #JNSQscience_bd_massSpec_DunaSrfLandedTrenches_00 = Polvere in ombra e strati esposti aggiungono deboli indizi di volatili alla solita firma minerale. Qualcosa quaggiù è più bravo a nascondersi dal sole.
        #JNSQscience_bd_massSpec_DunaSrfLandedNotablePlains_00 = Fini estremamente uniformi danno uno spettro pulito e noioso, finché una raffica non scarica tutto in una volta un intero nuovo strato nell'imbocco.
        #JNSQscience_bd_massSpec_DunaSrfLandedNotableMountains_00 = Frammenti di roccia madre esposta spingono lo spettro verso minerali più pesanti. La polvere è ancora presente, ma deve condividere la scena.
        #JNSQscience_bd_massSpec_DunaSrfLandedMountains_00 = Aria sottile e graniglia tagliente si combinano in un campione molto croccante. Lo strumento riporta "rocce", con una sotto nota: "molte, molte rocce".
        #JNSQscience_bd_massSpec_DunaSrfLandedVolcano_00 = I picchi minerali schizzano insieme a deboli tracce contenenti zolfo e a un extra di anidride carbonica. Il grafico suggerisce con forza che il terreno stia ancora cercando di respirare.
        #JNSQscience_bd_massSpec_DunaFlyingLow_00 = Anidride carbonica densa e azoto entrano con abbastanza polvere in sospensione da valere come un secondo campione. Gli aerosol rossi si registrano come se stessero cercando di intasare i calcoli.
        #JNSQscience_bd_massSpec_DunaFlyingHigh_00 = Le linee dei gas si affinano mentre la polvere si dirada. Lo spettrometro rileva una miscela superiore più pulita e una forte tendenza "per favore non scendere di nuovo".
        #JNSQscience_bd_massSpec_IkeSrfLandedPoles_00 = Granelli intrappolati dal freddo aggiungono deboli firme di volatili a uno spettro altrimenti secco e roccioso. Lo strumento sembra sorpreso di trovare qualcosa anche solo vagamente disposto a evaporare.
        #JNSQscience_bd_massSpec_IkeSrfLandedMountains_00 = Schegge di roccia frastagliate dominano la presa. Lo spettro è carico di silicati e metalli, come se Ike ti sfidasse a chiamarla "solo una luna".
        #JNSQscience_bd_massSpec_IkeSrfLandedMidlands_00 = La fine polvere di regolite produce una lettura stabile e ripetitiva. Anche il rivestimento della fotocamera è stabile, ripetitivo e ormai permanente.
        #JNSQscience_bd_massSpec_IkeSrfLandedLowlands_00 = Granelli più morbidi e più fini mostrano minerali più mescolati e fini d'impatto. Il campione si comporta come polvere macinata per un tempo molto lungo.
        #JNSQscience_bd_massSpec_IkeSrfLandedHighlands_00 = Frammenti più chiari e più puliti spostano i picchi verso valori un po' più leggeri e più netti. Qui la superficie sembra meno "fusa insieme" rispetto alle pianure.
        #JNSQscience_bd_massSpec_EdnaInSpaceLow_00 = Lo spettrometro legge per lo più i tuoi stessi gas di sfiato, finché un granello scuro vagante non colpisce il rivelatore. Le poche particelle che cattura sembrano ricche di carbonio e ostinatamente fredde.
        #JNSQscience_bd_massSpec_EdnaSrfLandedLowlands_00 = Dominano granelli scuri e polverosi con forti firme di carbonio. Lo strumento evita cortesemente di chiamarla "fuliggine spaziale", ma ci sta pensando.
        #JNSQscience_bd_massSpec_EdnaSrfLandedMidlands_00 = Roccia mista e fini scuri producono uno spettro ampio e irregolare. Il campione sembra come se qualcuno avesse frullato "asteroide" al minimo.
        #JNSQscience_bd_massSpec_EdnaSrfLandedHighlands_00 = Frammenti più grossolani e minerali più puliti rendono i picchi più netti. Per un momento Edna sembra quasi organizzata.
        #JNSQscience_bd_massSpec_EdnaSrfLandedPolarIceCraters_00 = I volatili intrappolati dal freddo finalmente si mostrano nei dati. Lo strumento registra un debole cocktail di ghiacci nascosti sotto una coperta di polvere.
        #JNSQscience_bd_massSpec_EdnaSrfLandedWhites_00 = Granelli luminosi fanno impennare forti firme simili al ghiaccio con tracce minerali più leggere. Lo spettrometro lo etichetta "riflettente", poi chiede perché il pianeta scuro abbia una macchia bianca.
        #JNSQscience_bd_massSpec_DakInSpaceLow_00 = Il rivelatore intercetta sbuffi intermittenti di polvere e una sospetta quantità di "niente". Ogni volta che ottiene un colpo, i granelli sembrano chimicamente confusi, come se Dak non riuscisse a scegliere una sola storia.
        #JNSQscience_bd_massSpec_DakSrfLandedLowlands_00 = Regolite friabile produce uno spettro ricco di carbonio con picchi minerali sparsi. Il campione sembra assemblato con avanzi.
        #JNSQscience_bd_massSpec_DakSrfLandedMidlands_00 = Granelli misti producono picchi alternati che si rifiutano di fare una bella media. Lo strumento conclude che Dak è "a forma di patata" anche in chimica.
        #JNSQscience_bd_massSpec_DakSrfLandedHighlands_00 = Frammenti cotti dal sole e graniglia tagliente dominano la fotocamera. Lo spettro è semplice, abrasivo e stranamente fiero di sé.
        #JNSQscience_bd_massSpec_DresSrfLandedPoles_00 = La polvere fredda include deboli tracce di volatili incastrate tra i picchi minerali. Dres tiene le sue parti interessanti dove la luce del sole non può cacciarle via.
        #JNSQscience_bd_massSpec_DresSrfLandedHighlands_00 = Granelli più grossolani e minerali esposti rendono lo spettro più netto. Lo strumento apprezza il comportamento diretto di "roccia che fa la roccia".
        #JNSQscience_bd_massSpec_DresSrfLandedMidlands_00 = Un miscuglio costante di regolite e fini d'impatto produce una lettura affidabile. L'unica anomalia è quanta polvere possa esistere in un posto senza aria.
        #JNSQscience_bd_massSpec_DresSrfLandedLowlands_00 = Polveri fini alla deriva allargano i picchi e ricoprono l'imbocco. Lo spettrometro inizia a misurare "polvere per polvere" come meccanismo di difesa.
        #JNSQscience_bd_massSpec_DresSrfLandedCanyon_00 = Strati esposti aggiungono spostamenti distinti nelle firme minerali da un campione all'altro. Il grafico sembra una torta a strati che assolutamente non dovrebbe essere mangiata.
        #JNSQscience_bd_massSpec_JoolFlyingLow_00 = Idrogeno ed elio sommergono lo spettro così completamente che i picchi in tracce sembrano sussurrare sotto una tempesta.
        #JNSQscience_bd_massSpec_JoolFlyingHigh_00 = La miscela di gas risulta ancora "per lo più gigante", ma le linee si affinano quanto basta per distinguere qualche intruso più pesante trasportato dai venti.
        #JNSQscience_bd_massSpec_LaytheFlyingLow_00 = La presa ingoia aria umida piena di aerosol di spruzzi di mare. Ossigeno e azoto sono evidenti: il residuo salato appiccicoso è meno apprezzato.
        #JNSQscience_bd_massSpec_LaytheFlyingHigh_00 = Lo spettro si assesta in picchi puliti di ossigeno e azoto con meno goccioline. Lo strumento quasi si rilassa, poi ricorda dove si trova.
        #JNSQscience_bd_massSpec_LaytheSrfLandedShores_00 = Foschia salata e granelli bagnati inondano la fotocamera. La lettura sembra "oceano" che indossa un'atmosfera ricca di ossigeno come cappello.
        #JNSQscience_bd_massSpec_LaytheSrfLandedShallows_00 = Goccioline salmastre dominano il campione con un fine bordo sabbioso. Lo spettrometro registra "acqua, sali e schizzi continui".
        #JNSQscience_bd_massSpec_LaytheSrfLandedHighlands_00 = Aria più pulita e polvere portata dal vento producono picchi netti. È piacevolmente semplice finché la raffica successiva non sabbia l'imbocco a colpi.
        #JNSQscience_bd_massSpec_LaytheSrfLandedMountains_00 = Aria sottile e fredda e graniglia minerale tagliente fanno un campione molto appuntito. Lo spettro è ordinato, ma l'hardware sembra offeso.
        #JNSQscience_bd_massSpec_LaytheSrfLandedIceCaps_00 = Granelli di brina e tracce di vapore freddo compaiono insieme ai soliti gas. Lo strumento segna la sessione come "scivoloso".
        #JNSQscience_bd_massSpec_LaytheSrfLandedEnclosedFaults_00 = Il campione contiene la solita miscela d'aria, più strani picchi in tracce ripetitivi che suggeriscono che qualcosa stia sfiatando da sotto.
        #JNSQscience_bd_massSpec_LaytheSrfLandedLowlands_00 = L'aria umida trasporta fini in sospensione e deboli tracce organiche. La fotocamera odora di "filtro del supporto vitale", che non è un composto.
        #JNSQscience_bd_massSpec_LaytheSrfLandedMidlands_00 = Aria polverosa e sali secchi danno uno spettro più stabile del previsto. Lo strumento annota "meno acqua, più graniglia, stesso atteggiamento".
        #JNSQscience_bd_massSpec_VallSrfLandedPoles_00 = Il campione è per lo più granelli di ghiaccio puliti con qualche volatilo intrappolato e ostinato. I picchi sono netti, freddi e discretamente interessanti.
        #JNSQscience_bd_massSpec_VallSrfLandedHighlands_00 = Brina luminosa e frammenti rocciosi si mescolano in uno spettro semplice. Lo strumento apprezza la chiarezza, se non la temperatura.
        #JNSQscience_bd_massSpec_VallSrfLandedMidlands_00 = Fine polvere ghiacciata imbianca le pareti della fotocamera. La chimica è costante: la pulizia no.
        #JNSQscience_bd_massSpec_VallSrfLandedLowlands_00 = Granelli più scuri aggiungono picchi minerali extra tra quelli dell'acqua. La superficie qui sembra "condita" dagli impatti.
        #JNSQscience_bd_massSpec_VallSrfLandedMountains_00 = Schegge grossolane di ghiaccio e pietra producono picchi più ampi e più pesanti. Lo spettrometro lo definisce "croccante" e si rifiuta di elaborare.
        #JNSQscience_bd_massSpec_TyloFlyingLow_00 = L'azoto rarefatto domina la lettura con una firma di polvere persistente mescolata dentro. Lo strumento conferma: sì, anche l'aria qui è abrasiva.
        #JNSQscience_bd_massSpec_TyloFlyingHigh_00 = Le linee dell'azoto si affinano mentre la polvere cala. Per un momento lo spettro è quasi noioso, poi la turbolenza reintroduce graniglia.
        #JNSQscience_bd_massSpec_TyloSrfLandedPoles_00 = Granelli brinati e tracce intrappolate dal freddo viaggiano insieme ai picchi minerali. I dati suggeriscono che i poli stiano accumulando l'unica chimica "morbida" nei dintorni.
        #JNSQscience_bd_massSpec_TyloSrfLandedMountains_00 = Schegge di roccia e polvere ricca di metalli sommergono la fotocamera. Lo spettro sembra dire che il suolo sia fatto di ostinazione e spigoli vivi.
        #JNSQscience_bd_massSpec_TyloSrfLandedHighlands_00 = Regolite più pulita produce picchi più netti e meno fini mescolati. Lo strumento approva l'ordine, per un attimo.
        #JNSQscience_bd_massSpec_TyloSrfLandedMidlands_00 = Un manto uniforme di polvere produce uno spettro coerente e ripetitivo. Tylo sembra aver perfezionato "uguale, ma ovunque".
        #JNSQscience_bd_massSpec_TyloSrfLandedLowlands_00 = Granelli più fini e più scuri allargano i picchi con metalli in tracce extra. Il campione si comporta come se fosse stato macinato per ere.
        #JNSQscience_bd_massSpec_BopSrfLandedPoles_00 = Dominano polvere scura e granelli ricchi di carbonio, con un debole spruzzo di ioni estranei che arriva alla deriva dal vicinato.
        #JNSQscience_bd_massSpec_BopSrfLandedMountains_00 = Frammenti grossolani e frastagliati fanno impennare i picchi minerali pesanti. Il contenuto della fotocamera è ora ufficialmente "graffiante".
        #JNSQscience_bd_massSpec_BopSrfLandedLowlands_00 = La fine regolite riduce tutto in polvere e fa sembrare lo spettro sbavato. Lo strumento la definisce "polvere con ambizione".
        #JNSQscience_bd_massSpec_BopSrfLandedMidlands_00 = Granelli misti producono uno spettro irregolare che non si assesta mai del tutto. Bop sembra chimicamente indecisa.
        #JNSQscience_bd_massSpec_BopSrfLandedHighlands_00 = Schegge più pulite e meno fini rendono la lettura più netta. Il campione è ancora scuro, solo con più convinzione.
        #JNSQscience_bd_massSpec_PolSrfLandedPoles_00 = Granelli ricchi di zolfo accendono lo spettro con picchi netti e aggressivi. La fotocamera campioni dello strumento ora "profuma" di giallo.
        #JNSQscience_bd_massSpec_PolSrfLandedLowlands_00 = Depositi polverosi inondano la presa di composti di zolfo e strani picchi in tracce. Il grafico sembra un'etichetta di avvertimento.
        #JNSQscience_bd_massSpec_PolSrfLandedMidlands_00 = Un miscuglio equilibrato di minerali e polvere solforosa produce picchi coerenti. Coerente non significa rassicurante.
        #JNSQscience_bd_massSpec_PolSrfLandedHighlands_00 = Granelli più secchi rendono più nette le firme dello zolfo e aggiungono frammenti rocciosi. Il campione sembra meno appiccicoso e più dispettoso.
        #JNSQscience_bd_massSpec_PolSrfLandedMountains_00 = Briciole grossolane e chiazze di minerali luminosi scorrono sopra lo sfondo di zolfo. La fotocamera tintinna come se venisse condita.
        #JNSQscience_bd_massSpec_LindorFlyingLow_00 = Idrogeno ed elio schiacciano lo spettro in una linea di base ruggente. Un minuscolo picco di metano saluta dalla confusione, come se fosse fiero di essere stato notato.
        #JNSQscience_bd_massSpec_LindorFlyingHigh_00 = Le linee dei gas si affinano in una firma pulita idrogeno elio con una debole coda di idrocarburi. Lo strumento la chiama cortesemente "semplice", poi registra "inquietante".
        #JNSQscience_bd_massSpec_LindorInSpaceLow_00 = Ioni vaganti e granelli di polvere ghiacciata colpiscono il rivelatore a brevi raffiche. L'ambiente di Lindor sembra condire il tuo campione con elettricità.
        #JNSQscience_bd_massSpec_KrelInSpaceLow_00 = Lo spettrometro legge per lo più "vuoto", con colpi occasionali di polvere e atomi sputacchiati. Krel contribuisce con giusto abbastanza particelle da essere tecnicamente presente.
        #JNSQscience_bd_massSpec_KrelSrfLandedLowlands_00 = La fine regolite riduce la fotocamera in polvere e allarga ogni picco. La composizione è ostinatamente semplice: roccia fredda, macinata più fine.
        #JNSQscience_bd_massSpec_KrelSrfLandedMidlands_00 = Il campione è polvere uniforme con deboli tracce di metalli mescolate dentro. Lo strumento conferma che hai raccolto "graniglia standard da luna".
        #JNSQscience_bd_massSpec_KrelSrfLandedHighlands_00 = Schegge più grossolane e minerali esposti rendono lo spettro più netto. I granelli sembrano aver evitato di essere polverizzati... per ora.
        #JNSQscience_bd_massSpec_KrelSrfLandedPoles_00 = Granelli brinati aggiungono un sussurro di volatili intrappolati tra i picchi minerali. Krel tiene la sua chimica più interessante dove il sole non può discutere.
        #JNSQscience_bd_massSpec_AdenInSpaceLow_00 = Un sottile flusso di polvere in impatto si registra sul rivelatore come minuscoli tamburellii. Qualunque cosa componga Aden, la perde con entusiasmo.
        #JNSQscience_bd_massSpec_AdenSrfLandedLowlands_00 = Fini più scuri dominano la presa e sbavano i picchi minerali. Lo strumento annota "superficie vecchia", con un tono stranamente giudicante.
        #JNSQscience_bd_massSpec_AdenSrfLandedMidlands_00 = Granelli misti danno uno spettro ampio e stabile con poche sorprese. L'unica anomalia è quanto rapidamente la fotocamera diventi un museo della polvere.
        #JNSQscience_bd_massSpec_AdenSrfLandedHighlands_00 = Frammenti più puliti e minerali più leggeri rendono la lettura più netta. Il campione sembra meno "alterato" e più "scheggiato di fresco".
        #JNSQscience_bd_massSpec_AdenSrfLandedMountains_00 = Graniglia frastagliata fa impennare i picchi minerali più pesanti e fa tintinnare l'imbocco. Lo spettrometro concorda che il terreno sia, scientificamente parlando, "appuntito".
        #JNSQscience_bd_massSpec_AdenSrfLandedPoles_00 = Tracce intrappolate dal freddo compaiono debolmente insieme alla solita firma rocciosa. Lo strumento registra "possibili volatili" e il Controllo Missione smette all'improvviso di battere le palpebre.
        #JNSQscience_bd_massSpec_HuygenFlyingLow_00 = L'azoto domina lo spettro mentre il metano aggiunge un rigonfiamento grosso e inconfondibile. L'imbocco raccoglie anche una foschia appiccicosa che non è nell'elenco dei ricambi.
        #JNSQscience_bd_massSpec_HuygenFlyingHigh_00 = Le linee dei gas si affinano in azoto pulito con una coda di metano ordinata. I dati sembrano più calmi quassù, anche se il mondo sotto non lo è.
        #JNSQscience_bd_massSpec_HuygenInSpaceLow_00 = Una sottile scia di gas sfuggiti e particelle fini colpisce il rivelatore. Huygen sembra perdere chimica nello spazio una molecola prudente alla volta.
        #JNSQscience_bd_massSpec_HuygenSrfLandedLowlands_00 = La fotocamera si riempie di graniglia umida e polvere intrisa di idrocarburi. Lo spettro sembra roccia che ha marinato nell'atmosfera.
        #JNSQscience_bd_massSpec_HuygenSrfLandedMidlands_00 = Un miscuglio costante di granelli minerali e tracce organiche produce un grafico affollato. Lo strumento etichetta diversi picchi "sconosciuto, ma determinato".
        #JNSQscience_bd_massSpec_HuygenSrfLandedHighlands_00 = Granelli più freddi e più secchi rendono più netti i picchi minerali mentre restano tracce legate al metano. Il campione odora sospettosamente di "problemi futuri".
        #JNSQscience_bd_massSpec_HuygenSrfLandedMountains_00 = Frammenti grossolani e brina portata dal vento danno forti linee minerali con deboli firme di volatili. L'imbocco accumula abbastanza foschia da valere come un secondo esperimento.
        #JNSQscience_bd_massSpec_HuygenSrfLandedPolarLowlands_00 = Lo spettro mostra volatili intrappolati extra nascosti nella polvere fredda. I poli di Huygen stanno accumulando in silenzio le cose interessanti.
        #JNSQscience_bd_massSpec_HuygenSrfLandedPoles_00 = Granelli di brina fanno impennare la regione dei volatili del grafico mentre lo sfondo di azoto si rifiuta di andarsene. Lo strumento segna la sessione come "freddo, ma chimicamente rumoroso".
        #JNSQscience_bd_massSpec_HuygenSrfLandedPolarHighlands_00 = Granelli di ghiaccio più puliti e schegge di roccia più dure producono picchi netti con sottili tracce di idrocarburi. Il campione sembra ordinato per temperatura e atteggiamento.
        #JNSQscience_bd_massSpec_HuygenSrfLandedShores_00 = Aerosol bagnati e spruzzi granulosi inondano la fotocamera di residui ricchi di metano. Lo spettrometro registra "liquido nelle vicinanze" e i tuoi stivali registrano "rimorso".
        #JNSQscience_bd_massSpec_HuygenSrfLandedMethaneLakes_00 = La presa raccoglie goccioline e vapori che accendono subito i picchi degli idrocarburi. Lo strumento è entusiasta: le guarnizioni no.
        #JNSQscience_bd_massSpec_RigaFlyingLow_00 = Azoto rarefatto scorre nella fotocamera con una debole firma di polvere che ci viaggia sopra. Lo spettro sembra un'atmosfera che si impegna molto per farsi notare.
        #JNSQscience_bd_massSpec_RigaFlyingHigh_00 = La linea dell'azoto si stringe e tutto il resto scende verso lo zero. Lo strumento riporta "pulito", cosa rara e leggermente sospetta.
        #JNSQscience_bd_massSpec_RigaInSpaceLow_00 = Colpi occasionali di atomi sputacchiati e polvere fine interrompono la linea di base del vuoto. Riga contribuisce con giusto abbastanza particelle da tenere sveglio il rivelatore.
        #JNSQscience_bd_massSpec_RigaSrfLandedLowlands_00 = Granelli fini e polvere di brina allargano i picchi minerali. Il campione sembra roccia fredda con un ripensamento di azoto.
        #JNSQscience_bd_massSpec_RigaSrfLandedMidlands_00 = Regolite uniforme produce uno spettro stabile e ripetitivo. Anche il rivestimento della fotocamera è stabile, ripetitivo e ormai permanente.
        #JNSQscience_bd_massSpec_RigaSrfLandedHighlands_00 = Frammenti più grossolani rendono più nette le linee minerali e riducono lo sfondo di polvere sbavata. Lo strumento approva il miglior rapporto "croccantezza su polvere".
        #JNSQscience_bd_massSpec_RigaSrfLandedMountains_00 = Graniglia frastagliata e minerali esposti fanno impennare i picchi più pesanti. La presa sopravvive, ma solo perché si rifiuta di ammettere debolezza.
        #JNSQscience_bd_massSpec_RigaSrfLandedPoles_00 = Tracce intrappolate dal freddo compaiono debolmente nella regione dei volatili prima di svanire di nuovo. I poli sono una presa in giro chimica.
        #JNSQscience_bd_massSpec_TalosInSpaceLow_00 = Lo spettrometro legge per lo più vuoto con brevi impatti di polvere. Talos perde particelle come se stesse cercando di sfuggire alla propria gravità.
        #JNSQscience_bd_massSpec_TalosSrfLandedLowlands_00 = Polvere fine e secca sbava i picchi minerali in uno spettro ampio e spento. Lo strumento conferma che Talos è fatto di "terra molto determinata".
        #JNSQscience_bd_massSpec_TalosSrfLandedMidlands_00 = Granelli misti danno una lettura stabile con lievi metalli in tracce. Il campione è scientificamente utile ed emotivamente poco stimolante.
        #JNSQscience_bd_massSpec_TalosSrfLandedHighlands_00 = Frammenti più puliti rendono lo spettro più netto e riducono la foschia di polvere fine. I granelli sembrano spezzati di fresco, come se Talos avesse cambiato idea di recente.
        #JNSQscience_bd_massSpec_TalosSrfLandedMountains_00 = Schegge grossolane e graniglia tagliente dominano la fotocamera con pesanti picchi minerali. Lo spettrometro registra dati eccellenti e un silenzioso reclamo.
        #JNSQscience_bd_massSpec_TalosSrfLandedPoles_00 = Fini brinati aggiungono un sussurro di volatili tra i picchi rocciosi. Talos tiene la sua chimica rara chiusa nel freddo.
        #JNSQscience_bd_massSpec_EelooFlyingLow_00 = La presa cattura un respiro di gas sottilissimo e molta polvere di ghiaccio scintillante. Lo spettrometro lo archivia come "atmosfera, tecnicamente".
        #JNSQscience_bd_massSpec_EelooFlyingHigh_00 = Lo spettro è per lo più "quasi niente", con deboli picchi simili all'azoto e granelli di brina vaganti. Eeloo sembra deciso a restare misterioso per diluizione.
        #JNSQscience_bd_massSpec_EelooSrfLandedPoles_00 = La fotocamera si riempie di brina pulita e luminosa e di volatili intrappolati con ostinazione. I dati sono così nitidi da farti venire voglia di occhiali da sole.
        #JNSQscience_bd_massSpec_EelooSrfLandedHighlands_00 = Cristalli di ghiaccio più grossolani e schegge di roccia allargano i picchi minerali. Il campione scricchiola perfino nel grafico.
        #JNSQscience_bd_massSpec_EelooSrfLandedMidlands_00 = Fine polvere bianca ricopre subito l'imbocco. Lo spettro è stabile e lo strumento è ora spolverato in modo permanente.
        #JNSQscience_bd_massSpec_EelooSrfLandedLowlands_00 = Granelli più lisci mostrano sali più mescolati e inclusioni più scure. La lettura suggerisce che Eeloo sia stato "rimescolato" in silenzio dagli impatti.
        #JNSQscience_bd_massSpec_EelooSrfLandedCanyon_00 = Il campione sembra ghiaccio stratificato e polvere compattata, con sottili variazioni tra una palata e l'altra. Il canyon è un libro di chimica scritto nella brina.
        #JNSQscience_bd_massSpec_CelesInSpaceLow_00 = Il rivelatore registra deboli atomi sputacchiati e una sottile foschia di polvere. Celes contribuisce con particelle con l'entusiasmo di una luna silenziosa e lontana.
        #JNSQscience_bd_massSpec_CelesSrfLandedLowlands_00 = La fine regolite produce picchi minerali puliti con una linea di base fredda e secca. Il campione è semplice, ma il silenzio sembra affollato.
        #JNSQscience_bd_massSpec_CelesSrfLandedMidlands_00 = Granelli misti allargano lo spettro in un profilo stabile e affidabile. Il contenuto della fotocamera si descrive al meglio come "arido, ma competente".
        #JNSQscience_bd_massSpec_CelesSrfLandedHighlands_00 = Frammenti più grossolani rendono i picchi più netti e riducono la scia di polvere. La superficie qui sembra fratturata di fresco e senza scuse.
        #JNSQscience_bd_massSpec_CelesSrfLandedMountains_00 = Graniglia frastagliata e minerali più pesanti fanno impennare la lettura. Lo strumento registra dati eccellenti e una piccola lamentela sull'abrasione.
        #JNSQscience_bd_massSpec_CelesSrfLandedPoles_00 = Fini brinati aggiungono un debole sussurro di volatili tra le linee minerali. Qualunque chimica interessante esista si nasconde dove la luce del sole non può discutere.
        #JNSQscience_bd_massSpec_TamInSpaceLow_00 = Minuscoli impatti di polvere si registrano come picchi irregolari sulla linea di base del vuoto. Tam sembra perdere briciole come se temesse che tu lo possa dimenticare.
        #JNSQscience_bd_massSpec_TamSrfLandedLowlands_00 = Granelli scuri e polverosi sbavano i picchi minerali in uno spettro ampio. Il campione sembra alterato da una vita lunga e dura.
        #JNSQscience_bd_massSpec_TamSrfLandedMidlands_00 = Un miscuglio di regolite produce rapporti irregolari e mobili da una palata all'altra. Tam sembra chimicamente indeciso e fiero di esserlo.
        #JNSQscience_bd_massSpec_TamSrfLandedHighlands_00 = Schegge più pulite rendono lo spettro più netto e riducono la foschia di polvere fine. La superficie qui sembra meno "friabile" e più "tagliente".
        #JNSQscience_bd_massSpec_TamSrfLandedTwinCraters_00 = Granelli mescolati dagli impatti mostrano frammenti vetrosi e rapporti disordinati. Il grafico sembra dire che due collisioni stiano ancora litigando nel barattolo dei campioni.
        #JNSQscience_bd_massSpec_TamSrfLandedCraters_00 = Materiale fresco polverizzato produce picchi ampi con firme d'impatto ben distinte. Lo strumento lo etichetta "riordinato di recente".
        #JNSQscience_bd_massSpec_TamSrfLandedPockmarks_00 = Depositi fini e punteggiati creano un motivo ripetuto di minerali leggeri e pesanti. La chimica di superficie rispecchia il terreno: puntinata e ostinata.
        #JNSQscience_bd_massSpec_HamekInSpaceLow_00 = Lo spettrometro intercetta rari colpi di polvere e qualche atomo sputacchiato. L'ambiente è silenzioso, freddo e inutilmente vuoto.
        #JNSQscience_bd_massSpec_HamekSrfLandedLowlands_00 = La fotocamera si riempie di polvere con una tinta rossa e minerali misti. Lo spettro sembra chimica da mondo di ghiaccio con un travestimento dai colori caldi.
        #JNSQscience_bd_massSpec_HamekSrfLandedMidlands_00 = Fini uniformi danno una lettura stabile con sottili tracce di sali e volatili. I dati suggeriscono che la superficie abbia segreti, ma li tiene cortesemente deboli.
        #JNSQscience_bd_massSpec_HamekSrfLandedHighlands_00 = Frammenti più grossolani rendono più netti i picchi minerali e aggiungono picchi più pesanti. Qui il campione è più pulito, ma la storia continua a non tornare.
        #JNSQscience_bd_massSpec_HamekSrfLandedPoles_00 = I volatili intrappolati dal freddo compaiono più chiaramente tra le linee rocciose. I poli stanno accumulando le parti interessanti come fosse un hobby.
        #JNSQscience_bd_massSpec_NaraFlyingLow_00 = La presa ingoia una miscela pesante e fredda dominata da idrogeno ed elio. Le pompe dello spettrometro lavorano a pieno ritmo solo per evitare che i picchi diventino un'unica grande scrollata di spalle.
        #JNSQscience_bd_massSpec_NaraFlyingHigh_00 = I gas leggeri restano dominanti, ma le linee si affinano mentre l'aria si assottiglia. Qualche traccia più pesante si intrufola, come se non volesse farsi vedere quassù.
        #JNSQscience_bd_massSpec_NaraInSpaceLow_00 = Idrogeno in fuga e ioni vaganti picchiettano il rivelatore a raffiche irregolari. Lo spettro sembra pulito finché il vicinato di Nara non inizia a crepitare sullo sfondo.
        #JNSQscience_bd_massSpec_NaraSrfLandedLowlands_00 = Vicino al suolo, i gas leggeri raccolgono polvere e ostinati composti in tracce. La fotocamera ora contiene "atmosfera" e "qualunque cosa stesse pensando il terreno".
        #JNSQscience_bd_massSpec_NaraSrfLandedMidlands_00 = Lo spettro si assesta in idrogeno elio con una sottile foschia di graniglia di superficie. Lo strumento etichetta il campione "semplice", poi viene subito ricoperto lo stesso.
        #JNSQscience_bd_massSpec_NaraSrfLandedHighlands_00 = Le linee si affinano e la polvere cala leggermente. Lo spettrometro apprezza la presa più pulita e finge di non notare il freddo.
        #JNSQscience_bd_massSpec_NaraSrfLandedMountains_00 = Aria sottile e graniglia spazzata dal vento producono netti picchi di gas leggeri con affilati picchi minerali. Il campione è elegante, finché non graffia l'imbocco.
        #JNSQscience_bd_massSpec_NaraSrfLandedPolarLowlands_00 = Tracce intrappolate dal freddo compaiono debolmente tra i picchi dell'idrogeno. I poli stanno accumulando in silenzio chimica come fosse un hobby.
        #JNSQscience_bd_massSpec_NaraSrfLandedPoles_00 = Fini brinati e rari volatili si registrano chiaramente per un momento, poi spariscono di nuovo nel rumore. Lo strumento salva la sessione come "ti ho beccato".
        #JNSQscience_bd_massSpec_NaraSrfLandedPolarHighlands_00 = Granelli di ghiaccio più puliti e schegge di roccia dura aggiungono picchi distinti allo sfondo dei gas leggeri. Lo spettro sembra geologia fredda che prova a sussurrare attraverso una tempesta.
        #JNSQscience_bd_massSpec_AmosInSpaceLow_00 = Il rivelatore legge vuoto con colpi occasionali di polvere come piccoli tocchi sul vetro. Amos contribuisce con particelle a malincuore, ma con costanza.
        #JNSQscience_bd_massSpec_AmosSrfLandedLowlands_00 = La regolite scura riduce la fotocamera in polvere e sbava i picchi minerali. Lo spettrometro conferma: sì, è polvere: no, non smetterà.
        #JNSQscience_bd_massSpec_AmosSrfLandedMidlands_00 = Granelli misti producono uno spettro ampio e uniforme con deboli tracce di metalli. Il campione è noioso in un modo che sembra deliberato.
        #JNSQscience_bd_massSpec_AmosSrfLandedHighlands_00 = Frammenti più grossolani rendono i picchi più netti e riducono la foschia fine. I granelli sembrano scheggiati di fresco, come se Amos stesse cercando di sembrare interessante.
        #JNSQscience_bd_massSpec_AmosSrfLandedMountains_00 = Graniglia frastagliata fa impennare le linee minerali più pesanti e fa tintinnare l'imbocco. Lo strumento registra "dati eccellenti" e "per favore non scuotere".
        #JNSQscience_bd_massSpec_AmosSrfLandedPoles_00 = La polvere fredda nasconde un sussurro di volatili tra i picchi rocciosi. È il tipo di segnale che fa smettere di respirare all'improvviso il Controllo Missione.
        #JNSQscience_bd_massSpec_EnonInSpaceLow_00 = Un sottile spruzzo di polvere ghiacciata colpisce il rivelatore in picchi puliti e luminosi. Lo spettro è per lo più "niente", punteggiato da "qualcosa di molto freddo".
        #JNSQscience_bd_massSpec_EnonSrfLandedLowlands_00 = Fini granelli pallidi ricoprono la fotocamera e danno forti firme simili al ghiaccio con minerali leggeri mescolati. Il grafico sembra quasi troppo ordinato.
        #JNSQscience_bd_massSpec_EnonSrfLandedMidlands_00 = Un miscuglio costante di brina e regolite produce picchi coerenti da una palata all'altra. Lo strumento lo definisce "uniforme", cosa rara così lontano.
        #JNSQscience_bd_massSpec_EnonSrfLandedHighlands_00 = Frammenti più duri aggiungono picchi minerali più netti sopra la linea di base ghiacciata. Il campione sembra meno polveroso e più come se potesse reagire.
        #JNSQscience_bd_massSpec_EnonSrfLandedPoles_00 = Volatili intrappolati dal freddo illuminano la regione dei volatili dello spettro prima di svanire di nuovo. I poli di Enon sono una presa in giro chimica.
        #JNSQscience_bd_massSpec_PraxInSpaceLow_00 = Rari impatti di polvere e atomi sputacchiati interrompono la linea di base del vuoto. Prax sembra perdere briciole come se stesse segnando il territorio.
        #JNSQscience_bd_massSpec_PraxSrfLandedLowlands_00 = Polvere fine e fredda allarga i picchi in uno spettro spento e ostinato. Lo strumento conclude che Prax è fatto di "perseveranza macinata".
        #JNSQscience_bd_massSpec_PraxSrfLandedMidlands_00 = Granelli misti aggiungono picchi in tracce sparsi che si rifiutano di fare una bella media. La chimica di superficie sembra irregolare quanto il terreno.
        #JNSQscience_bd_massSpec_PraxSrfLandedHighlands_00 = Frammenti più puliti rendono la lettura più netta e riducono la scia di polvere. Lo spettro resta desolato, solo con più convinzione.
        #JNSQscience_bd_massSpec_PraxSrfLandedMountains_00 = Schegge grossolane e graniglia tagliente dominano con picchi minerali più pesanti. La fotocamera ora contiene "dati" e "abrasione".
        #JNSQscience_bd_massSpec_PraxSrfLandedPoles_00 = Fini brinati aggiungono un debole sussurro di volatili tra le linee rocciose. La chimica interessante è, come al solito, nascosta nel freddo.

        // bd_microwaveSpec
        #JNSQscience_bd_microwaveSpec_default_OvenGag_00 = L'equipaggio continua a chiedere dove hai messo l'esperimento del "popcorn". Spieghi, di nuovo, che questo microonde serve per l'astronomia.
        #JNSQscience_bd_microwaveSpec_default_OvenGag_01 = Il manuale dello strumento dice esplicitamente "NON SCALDARE CIBO". Qualcuno l'ha sottolineato e ha aggiunto "VIGLIACCO".
        #JNSQscience_bd_microwaveSpec_default_OvenGag_02 = Rilevi forti emissioni alle frequenze previste. Il Controllo Missione chiede se questo significa che la cena è pronta.
        #JNSQscience_bd_microwaveSpec_default_OvenGag_03 = Passi un'ora a eliminare interferenze prima di renderti conto che qualcuno sta davvero cercando di scaldare uno snack vicino all'antenna.
        #JNSQscience_bd_microwaveSpec_default_OvenGag_04 = I dati sembrano ottimi finché non compare un picco netto a "ora di pranzo". Lo archivi come "errore dell'operatore".
        #JNSQscience_bd_microwaveSpec_default_OvenGag_05 = L'esperimento si chiama spettroscopia a microonde. L'equipaggio insiste che questo significhi che almeno dovrebbe fare il tè.
        #JNSQscience_bd_microwaveSpec_default_OvenGag_06 = Annunci una calibrazione riuscita. L'ingegnere chiede se "calibrazione" è l'impostazione per i pasti surgelati o per la zuppa.
        #JNSQscience_bd_microwaveSpec_default_OvenGag_07 = Ruoti la parabola per un segnale più pulito. Qualcuno ruota il piatto nella cambusa e sostiene che sta "aiutando con la scienza".
        #JNSQscience_bd_microwaveSpec_default_OvenGag_08 = Confermi che lo strumento funziona. La delusione nella stanza è immediata e unanime: ancora niente pizza calda.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthPolarZone_00 = La zona polare restituisce una firma stabile, abbagliante. Per un attimo valuti di aggiungere un pulsante "OFF".
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthSubpolarZone_00 = Le letture subpolari tremolano con rumore a grana fine, come se il sole crepitasse in silenzio tra sé e sé.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthTemperateZone_00 = La banda temperata mostra una linea di base uniforme con occasionali raffiche nette che non vogliono essere messe su un grafico.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowNorthTropicZone_00 = La zona tropicale produce picchi forti e ritmici. Lo strumento insiste che sia "assolutamente normale".
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowEquatorialZone_00 = La fascia equatoriale è rumorosa e affollata, con caratteristiche ampie che sembrano indicare che il sole stia rimestando la propria superficie.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthTropicZone_00 = I tropici meridionali riecheggiano lo schema del nord, ma con tempi diversi, come due metà che discutono con garbo.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthTemperateZone_00 = Le letture temperate si assestano in una curva pulita finché una vampata improvvisa non scarabocchia sui dati.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthSubpolarZone_00 = I ritorni subpolari oscillano tra calma e caos, come se il sole non riuscisse a decidere in che umore essere.
        #JNSQscience_bd_microwaveSpec_SunInSpaceLowSouthPolarZone_00 = La banda del polo sud resta intensamente brillante e inquietantemente costante. Il Controllo Missione chiede di smetterla di fissarla.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowPoles_00 = I poli riflettono una firma nitida e fredda che accenna a materiale più brillante nascosto nelle sacche più oscure.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowLowlands_00 = Le pianure tornano scure e dense alle microonde, terreno cotto e compattato da un calore implacabile.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowPolarIceCraters_00 = I Crateri di Ghiaccio Polare fanno impennare la luminosità, suggerendo qualcosa di insolitamente riflettente annidato sotto i bordi in ombra.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowHighlands_00 = Gli altipiani diffondono forte e in modo irregolare: la superficie sembra abbastanza ruvida da fare da carta vetrata per un'antenna.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowMidlands_00 = I ritorni delle regioni intermedie mostrano una trama a strati, come se la polvere fosse stesa sottile sopra roccia più dura e più calda.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowCraters_00 = I bordi dei crateri disegnano anelli luminosi nella mappa: l'ejecta fresca è rumorosa, fiera e appuntita.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowExoticCraters_00 = I Crateri Esotici danno strani rapporti dielettrici: o fusione vetrosa, oppure Moho sta di nuovo facendo scherzi.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowRareCraters_00 = I Crateri Rari producono echi netti da campi di detriti a blocchi che si rifiutano di sembrare "assestati".
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowVoronoiCraters_00 = Il motivo Voronoi si ripete perfettamente nei dati a microonde, come se il pianeta stesse ostentando la propria geometria.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowNotableCraters_00 = I Crateri Notevoli producono ciascuno un'impronta distinta, come se Moho tenesse una collezione curata di ammaccature.
        #JNSQscience_bd_microwaveSpec_MohoInSpaceLowPeaks_00 = Le cime lanciano riflessi sottili come aghi che mandano fuori scala. Lo strumento presenta un reclamo sulle montagne.
        #JNSQscience_bd_microwaveSpec_EveInSpaceLowPoles_00 = Le microonde tagliano la foschia e trovano calotte luminose e fredde dall'aspetto stranamente liscio.
        #JNSQscience_bd_microwaveSpec_EveInSpaceLowLowlands_00 = Le pianure assorbono il segnale come una spugna umida: i valori dielettrici salgono.
        #JNSQscience_bd_microwaveSpec_EveInSpaceLowMidlands_00 = Terreno misto dà una risposta a chiazze, come se qualcuno avesse rovesciato polveri diverse e l'avesse chiamata geologia.
