        LaytheFlyingLowKrenwichSea* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowKrenwichSea_00 // Sea spray dominates the particle count, and the analyzer keeps filtering out “ocean” to find “air.” It eventually finds both and dislikes both.
