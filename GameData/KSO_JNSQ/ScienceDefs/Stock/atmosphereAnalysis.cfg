        LaytheSrfLandedHighlands* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedHighlands_00 // The atmosphere thins quickly with altitude, and the humidity drops with it. The analyzer reports cleaner air and a stronger urge to breathe harder.
        LaytheSrfLandedHighlands* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedHighlands_01 // Oxygen remains detectable, but the partial pressure is not doing you any favors. The instrument tags the highlands as “breathable components, impractical delivery.”
        LaytheSrfLandedMountains* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedMountains_00 // The analyzer confirms breathable gases, then immediately complains about how little of them there are. It’s cold, thin, and extremely confident about it.
        LaytheSrfLandedMountains* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedMountains_01 // Trace volatiles fall off sharply at this elevation, leaving mostly dry, biting air. The instrument concludes the mountains are “not for casual respiration.”
        LaytheSrfLandedIceCaps* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedIceCaps_00 // The intake pulls in air full of tiny ice grains and very little moisture vapor. The analyzer reports oxygen with a side of “why is this still an atmosphere?”
        LaytheSrfLandedIceCaps* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedIceCaps_01 // The composition is stable, but the cold makes everything feel chemically aggressive anyway. The instrument flags frost buildup as the primary contaminant.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedEnclosedFaults_00 // The analyzer detects layered pockets of air with different humidity and trace gases, as if the cracks are storing yesterday’s weather. It recommends “sampling elsewhere.”
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedEnclosedFaults_01 // Heavier traces seem to pool in the lowest trenches, while drier air skims above them. The instrument logs microclimates and you log “do not loiter.”
        LaytheSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedLowlands_00 // Warm haze and high humidity dominate the readout, with fine particulates that stick to everything. The analyzer calls it “good for clouds, bad for filters.”
        LaytheSrfLandedLowlands* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedLowlands_01 // Oxygen is present, nitrogen is present, and water vapor is doing most of the talking. The instrument reports a persistent dampness that refuses to be ventilated away.
        LaytheSrfLandedMidlands* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedMidlands_00 // The chemistry looks consistent, but the humidity oscillates in slow cycles as weather drifts by. The analyzer marks it “stable mix, unstable comfort.”
        LaytheSrfLandedMidlands* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedMidlands_01 // Trace reactive signatures rise and fall with the wind, like the atmosphere is being stirred in gentle layers. The instrument suggests additional samples “everywhere.”
        LaytheFlyingLowShallows* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowShallows_00 // Low-altitude air over the shallows is saturated with moisture and salt aerosols. The analyzer reports “breathable-ish” and “sticky” in equal measure.
