@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #CSS_surfaceSample_MohoSrfLandedNorthPole_00 // The ground is made up of old lava flows, suggesting periods of intense volcanic activity.
        MohoSrfLandedPoles* = #CSS_surfaceSample_MohoSrfLandedSouthPole_00 // This will make a great gift for little Werner Von Kerman Jr.!
        MohoSrfLandedPolarIceCraters* = #CSS_surfaceSample_MohoSrfLandedNorthernSinkholeRidge_00 // The sample shows signs of sodium, potassium and hydroxide. These are great resources for life support.
        MohoSrfLandedPolarIceCraters* = #CSS_surfaceSample_MohoSrfLandedNorthernSinkhole_00 // Ahah! You spot a familiar-looking rock a couple of meters away from you. It reminds you of the snack pack you've just eaten.
        MohoSrfLandedLowlands* = #CSS_surfaceSample_MohoSrfLandedWesternLowlands_00 // You perform an analysis of the local soil composition.
        MohoSrfLandedLowlands* = #CSS_surfaceSample_MohoSrfLandedCentralLowlands_00 // The sample shows signs of scorch marks and intense heat, but you already knew that.
        MohoSrfLandedLowlands* = #CSS_surfaceSample_MohoSrfLandedSouthWesternLowlands_00 // The sample reveals complex artificial polymers, often used in reinforced fabrics and plastics.
        MohoSrfLandedLowlands* = #CSS_surfaceSample_MohoSrfLandedSouthEasternLowlands_00 // Get this to the lab, stat!
        MohoSrfLandedCraters* = #CSS_surfaceSample_MohoSrfLandedMinorCraters_00 // Rocks all look the same to you. Wishing you had taken that geology course back on Kerbin, you try to break some stones by hitting them hard against each other. They seem to be very sturdy and don't break at all.
        
        EveSrfLandedPetrolLakes* = #CSS_surfaceSample_EveSrfLandedCraterLake_00 // You try to analyze the sample as thoroughly as possible, since it probably isn't going back.
        EveSrfLandedMountains* = #CSS_surfaceSample_EveSrfLandedOlympus_00 // The rock you pick off the ground seems to possess unnatural power.
        EveSrfLandedMountains* = #CSS_surfaceSample_EveSrfLandedOlympus_01 // The stone feels very warm in your hands as you turn it over and examine it.
        EveSrfLandedShores* = #CSS_surfaceSample_EveSrfLandedShallows_00 // The sample seems to be contaminated with explodium, since it acts like an eraser.
        EveSrfSplashedPetrolLakes* = #CSS_surfaceSample_EveSrfSplashedCraterLake_00 // This liquid looks an awful lot like mercury now that you've collected it in a bottle. You hope your suit is as waterproof as the manual promised.
        EveSrfSplashedPolarLakes* = #CSS_surfaceSample_EveSrfSplashedCraterLake_01 // You find traces of liquid blutonium.
        EveSrfSplashedShores* = #CSS_surfaceSample_EveSrfSplashedShallows_00 // The dense liquid is difficult to push the sample container into thanks to buoyancy.
        EveSrfSplashedShores* = #CSS_surfaceSample_EveSrfSplashedShallows_01 // The toxic mixture known as explodium should be toxic to all life, but you can't shake the feeling something is watching you under the surface.

        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_00 // You wonder why you put on a two-million-dollar spacesuit and got into a multi-billion dollar rocket just to pick up some dirt.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_01 // Yep. Looks like dirt.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_02 // Beautiful green grass.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_03 // Yep. Still dirt.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_04 // This is some quality grass.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_05 // I didn't sign up for this.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_06 // An incredibly long, furry, purple creature slithers bizarrely out of the grass. You rub your eyes and when you look again there is nothing in sight.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_07 // I got a jar o' dirt! I got a jar o' dirt!
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_08 // You pick at the dirt and discover a worm under the grass. You promptly name him Kelbin and attempt to hug him but end up squishing him in your arms. You feel bad so you open up a container and gently place him inside.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_09 // You notice that someone may have planted onions here once.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_10 // Years of training has brought kerbalkind here, to find this handful of soil! You hope you won't be fired for that.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_11 // The substance contains a remarkable amount of organic material. Excited, you inform Mission Control of this fact, but they seem less than thrilled.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_12 // You pick a likely-looking plant to put in a pot and be your companion as you journey across the stars.
        KerbinSrfLandedMidlands* = #CSS_surfaceSample_KerbinSrfLandedGrasslands_13 // You try to taste the ground, but realize that that would be silly. You kiss it instead, happy to be here alive, for once.
        KerbinSrfLandedAridMidlands* = #CSS_surfaceSample_KerbinSrfLandedDeserts_00 // Lots of sand and rocks here. You're thankful that you're in a climate-controlled suit, because it sure looks hot out there.
        KerbinSrfLandedAridMidlands* = #CSS_surfaceSample_KerbinSrfLandedDeserts_01 // Sand, sand, and more sand. A rock adds some badly needed variety to the landscape.
        KerbinSrfLandedAridMidlands* = #CSS_surfaceSample_KerbinSrfLandedDeserts_02 // You saw a blue box on the horizon, but it was just an illusion. Also, you picked up a stone.
        KerbinSrfLandedAridMidlands* = #CSS_surfaceSample_KerbinSrfLandedDeserts_03 // You remember your wilderness survival training... wait, do you need that training in space? What are you doing here in the desert? Someone is going to answer for this.
        KerbinSrfLandedAridMidlands* = #CSS_surfaceSample_KerbinSrfLandedDeserts_04 // The sand is dry and loose and it looks like it's going to take some effort to clean your gear afterwards.
        KerbinSrfLandedAridMidlands* = #CSS_surfaceSample_KerbinSrfLandedDeserts_05 // You build a sand castle to establish your dominance over the desert and demand that all nearby sand creatures swear fealty.
        KerbinSrfLandedAridHighlands* = #CSS_surfaceSample_KerbinSrfLandedBadlands_00 // The grass here is definitely not as green as it is in other places, but the knowledge that you've been at a place called the Badlands makes you feel cool.
        KerbinSrfLandedAridHighlands* = #CSS_surfaceSample_KerbinSrfLandedBadlands_01 // Rock, coal, and dead plant matter make up the sample.
        KerbinSrfLandedAridHighlands* = #CSS_surfaceSample_KerbinSrfLandedBadlands_02 // Your surface sample tries to bite you.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedNorthernIceShelf_00 // You pick up a piece of ice and lick it. It tastes cold and vaguely salty.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedNorthernIceShelf_01 // You take a sample of the ice. Its texture is brittle with watery attributes. Is this what happens when water gets too cold?
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedNorthernIceShelf_02 // You got a sample but feared to dig any deeper because of the cracking sounds. You try to not think back on how you landed here.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedSouthernIceShelf_00 // Even the top layer of ice is hard and glassy, and digging out a chunk takes a lot of effort.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedSouthernIceShelf_01 // The material appears to lower the surface temperature of whatever it comes in contact with.
        KerbinSrfLandedIceCaps* = #CSS_surfaceSample_KerbinSrfLandedSouthernIceShelf_02 // As you drill for a sample, you remember hearing from one of the scientists that the ice is very fragile this year, and then try to forget about it.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_00 // You scoop up a sample of the surface. It's a very humid sample, you hope the equipment has been properly waterproofed.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_01 // There seems to be a lot of a liquid substance. Surely this will be a huge advancement in science as we know it.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_02 // This material seems to take on the shape of what looks like a Kerbin container. More study is needed.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_03 // You make sure to include some plankton in your sample for the folks back at KSC.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_04 // Curious - something essential to life that isn't green, isn't explosive, and doesn't start with "K".
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_05 // You put the water into your pocket. It oozes and scroogles around for a bit. It gets in your nethers. Oops.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_06 // You find your pick and shovel rather ineffective here.
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_07 // "Di-hydrogen monoxide, sodium chloride... wait, did you just send us a sample of salt water?"
        KerbinSrfSplashed* = #CSS_surfaceSample_KerbinSrfSplashedWater_08 // You somehow managed to catch a fish. Unfortunately, it doesn't fit in your pocket.
        KerbinSrfSplashedMidlands* = #CSS_surfaceSample_KerbinSrfSplashedGrasslands_00 // At least this bottle of murky water will be useful for a water quality analysis.
        KerbinSrfSplashedAridMidlands* = #CSS_surfaceSample_KerbinSrfSplashedDeserts_00 // It looks like your normal gritty water. But this is no ordinary gritty water. It's desert water, and it's worth its weight in....well, water really.
        KerbinSrfSplashedAridMidlands* = #CSS_surfaceSample_KerbinSrfSplashedDeserts_01 // A brief chemical analysis of the water reveals high amounts of minerals associated with ancient fossil groundwater, presumably rained during wetter times aeons ago.
        KerbinSrfSplashedAridHighlands* = #CSS_surfaceSample_KerbinSrfSplashedBadlands_00 // The water will have cooled by the time it gets back, but it's still full of silt and dust.
        KerbinSrfSplashedIceCaps* = #CSS_surfaceSample_KerbinSrfSplashedNorthernIceShelf_00 // The water is salty and contains particles of ice.
        KerbinSrfSplashedIceCaps* = #CSS_surfaceSample_KerbinSrfSplashedSouthernIceShelf_00 // There's a large chunk of ice in it, so you have to grind it up before it fits in the tube with the water.

        MunSrfLandedNotableCraters* = #CSS_surfaceSample_MunSrfLandedEastCrater_00 // The sample contains a combination of breccia and melted materials.
        MunSrfLandedNotableCraters* = #CSS_surfaceSample_MunSrfLandedEastCrater_01 // There are high concentrations of metals in this crater.
        MunSrfLandedNotableCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_00 // Definitely not Cheddar. Winchester? No. Dorset Blue Vinney? Nah.
        MunSrfLandedNotableCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_01 // This area has a particularly high concentration of rare elements. Nice!
        MunSrfLandedNotableCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_02 // Continual samples of this area confirm it is rich in useful materials.
        MunSrfLandedNotableCraters* = #CSS_surfaceSample_MunSrfLandedTwinCraters_03 // You dig around for a nice sample of the crater, carefully selecting some of everything.
        MunSrfLandedRareCraters* = #CSS_surfaceSample_MunSrfLandedNorthwestCrater_00 // The ground materials appear to be a combination of basaltic rocks and breccia.
        MunSrfLandedRareCraters* = #CSS_surfaceSample_MunSrfLandedNorthwestCrater_01 // Deeper samples seems to contain more fragmented and shattered formations of rock.
        MunSrfLandedRareCraters* = #CSS_surfaceSample_MunSrfLandedSouthwestCrater_00 // The sample appears to be radioactive.
        MunSrfLandedRareCraters* = #CSS_surfaceSample_MunSrfLandedSouthwestCrater_01 // There appears to be layers of completely different materials here. It's possible this site has had multiple impacts.
        MunSrfLandedExoticCraters* = #CSS_surfaceSample_MunSrfLandedFarsideCrater_00 // Tiny flecks of purple flesh dot the mineral deposits here. The texture of the crater looks quite puckered. Is this evidence that this was once the home of the legendary Kraken?
        MunSrfLandedExoticCraters* = #CSS_surfaceSample_MunSrfLandedFarsideCrater_01 // Samples from this location appear to be similar in makeup to the powdery surface of the Mun.
        MunSrfLandedExoticCraters* = #CSS_surfaceSample_MunSrfLandedEastFarsideCrater_00 // This crater must have had a really nasty impact, the samples are heavier than normal.
        MunSrfLandedExoticCraters* = #CSS_surfaceSample_MunSrfLandedEastFarsideCrater_01 // You're glad that the Mun's gravity is so low. Digging is backbreaking work!
        MunSrfLandedPolarIceCraters* = #CSS_surfaceSample_MunSrfLandedPolarCrater_00 // To your surprise, you find a large lump of ice lodged in the center of the crater. Upon further analysis you find that it doesn't taste particularly well, and is too chunky for the snow-cone machine.
        MunSrfLandedPolarIceCraters* = #CSS_surfaceSample_MunSrfLandedPolarCrater_01 // Samples from this location seem to show intense shock patterns.
        MunSrfLandedPolarIceCraters* = #CSS_surfaceSample_MunSrfLandedPolarCrater_02 // You examine the sample you've collected, and throw it into the container for further testing.
        MunSrfLandedPolarIceCraters* = #CSS_surfaceSample_MunSrfLandedPolarCrater_03 // It appears that some of the samples are magnetic and show a faint alignment.
        MunSrfLandedPoles* = #CSS_surfaceSample_MunSrfLandedPolarLowlands_00 // The sample seems to contain frozen liquids... we should send them back to Kerbin for further analysis.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_00 // Seems muddy, in a waterless kind of way. You find it appropriate to remove your shoes before boarding the ship again, no thought given to the problems of removing space attire while still outside.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_01 // The crater seems to contain materials from lower layers of the surface.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_02 // These samples appear to be quite old compared to others we've taken.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_03 // You sample the dark surface of the crater. This should help determine what type of object hit here.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedHighlandCraters_04 // This crater seems to filled with useful materials in high concentration. What luck!
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_00 // The patterning of this surface sample is particularly interesting.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_01 // As you sample the crater you can't help but feel bad for the Mun. It's been beaten up pretty bad by these impacts.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_02 // You dig around in the surface of the crater, looking for something neat.
        MunSrfLandedVoronoiCraters* = #CSS_surfaceSample_MunSrfLandedMidlandCraters_03 // You find a really cool looking rock and decide to keep it. Then, you throw a less cool looking rock into the sample container.
        
        MinmusSrfLandedBasins* = #CSS_surfaceSample_MinmusSrfLandedFlats_00 // You want to get your helmet off and taste the sample. instead, you pull yourself together and continue with the mission.
        MinmusSrfLandedBasins* = #CSS_surfaceSample_MinmusSrfLandedFlats_01 // The surface is perfectly flat and smooth. You have to use your shovel to dig out some ice.
        MinmusSrfLandedBasins* = #CSS_surfaceSample_MinmusSrfLandedFlats_02 // The ground appears to be made of small, cyan crystals. It doesn't look like it would be enjoyable walking barefoot here.
        MinmusSrfLandedBasins* = #CSS_surfaceSample_MinmusSrfLandedGreatFlats_00 // It's just ice, with occasional snowflakes here and there.
        MinmusSrfLandedBasins* = #CSS_surfaceSample_MinmusSrfLandedGreaterFlats_00 // The sample consists of multiple layers of very reflective greenish ice. You wonder what compound gives it such a nice colour.
        MinmusSrfLandedBasins* = #CSS_surfaceSample_MinmusSrfLandedLesserFlats_00 // The sample contains several distinct types of ice frozen to form a complex, multi-layered pattern.
        MinmusSrfLandedMountains* = #CSS_surfaceSample_MinmusSrfLandedSlopes_00 // It's snow, ice, some loose dirt, and a couple of pebbles, frozen together in a strangely complicated way.

        DunaSrfLandedIceCaps* = #CSS_surfaceSample_DunaSrfLandedPoles_00 // The outer icy crust appears to be made of an unusually dense ice. It gives off wisps of white vapour when held against your warm suit.
        DunaSrfLandedIceCaps* = #CSS_surfaceSample_DunaSrfLandedPoles_01 // The ice is a mixture of dry ice and water ice. And those pesky percholorates are all over it.
        DunaSrfLandedIceCaps* = #CSS_surfaceSample_DunaSrfLandedPoles_02 // On closer inspection, the ice from under the crust appears to have a jumbled hexa-cubic crystal structure rather than the standard tesselating hexagons found on Kerbin.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlandSea_00 // You dig a little and find a perfectly preserved series of ripple marks from presumably billions of years ago.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlandSea_01 // The darker ground here is much more compacted than the windblown sediments of elsewhere on Duna, as if laid down and cemented by water.
        DunaSrfLandedMidlands* = #CSS_surfaceSample_DunaSrfLandedMidlandSea_02 // You start to dig with trepidation at the possibility of finding water before you realise you left your sample container on the ship and have to anticlimatically go and fetch it.
        DunaSrfLandedNotablePlains* = #CSS_surfaceSample_DunaSrfLandedNorthernBasin_00 // The dust grains here are very large, and feel very rough as you scoop them into a container.
        DunaSrfLandedNotablePlains* = #CSS_surfaceSample_DunaSrfLandedNorthernBasin_01 // The tough igneous rocks here hamper your attempts to drill a sample. It would be much easier if you had a machine to help.
        DunaSrfLandedNotablePlains* = #CSS_surfaceSample_DunaSrfLandedNorthernBasin_02 // The local rocks look like breccia and basalt, and contain evidence of significant shocking and fracturing.
        DunaSrfLandedNotablePlains* = #CSS_surfaceSample_DunaSrfLandedSouthernBasin_00 // There's a lot of frozen water in this basin, hidden under a thin layer of dust.
        DunaSrfLandedNotablePlains* = #CSS_surfaceSample_DunaSrfLandedSouthernBasin_01 // There's a lighter section among the basalt. It looks a bit like limestone. You consider it important and put some of it into your sample container.
        DunaSrfLandedNotablePlains* = #CSS_surfaceSample_DunaSrfLandedSouthernBasin_02 // Nearby rocks look consistent with flood basalts on Kerbin, suggesting this area was once a giant volcano.
        DunaSrfLandedNotableMountains* = #CSS_surfaceSample_DunaSrfLandedNorthernShelf_00 // You don't even have to scoop around for a sample, just hold up a container and it blows right in and collects at the back.
        DunaSrfLandedNotableMountains* = #CSS_surfaceSample_DunaSrfLandedNorthernShelf_01 // The sand here is much finer from being blown around, and looks to contain traces of tiny polar ice crystals.
        DunaSrfLandedNotableMountains* = #CSS_surfaceSample_DunaSrfLandedNorthernShelf_02 // There appears to be traces of water in amongst the fine soil and shifting sand.
        DunaSrfLandedNotableMountains* = #CSS_surfaceSample_DunaSrfLandedPolarHighlands_00 // The soil here is like tundra; dirt mixed with ice crystals, with a thin layer of fresh white frost on top.
        DunaSrfLandedNotableMountains* = #CSS_surfaceSample_DunaSrfLandedPolarHighlands_01 // Breaking through the thin crust, you find layers of dirt mixed with ice, laid down in countless cycles of thawing and freezing.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedMidlandCanyon_00 // The dust here contains traces of ice crystals, the concentrations of which increase with depth. You also find a random, perfectly rounded pebble amongst the sand.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedMidlandCanyon_01 // After an effort to dig a hole, you hit bedrock. It seems to be worn smooth, as if by water rather than dust.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedMidlandCanyon_02 // The small rock you pick up seems a variety of alluvial congomerate. You wonder if there was ever a river here.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedEasternCanyon_00 // The surface is mainly deep drifts of dust, so thick and fine that you can't dig deep enough to find solid ground. Dust will have to suffice.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedEasternCanyon_01 // You find a rare rock outcrop protruding from the dust, which is mostly basaltic and shows signs of extensive faulting.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedEasternCanyon_02 // You wonder if you need to take a sample considering there is so much dust on you that you could be considered a sample on your own right.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedWesternCanyon_00 // The dust here appears to be comprised of rock from multiple regions, as suggested by its varying degrees of fineness.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedWesternCanyon_01 // Lots of dust, but after some digging down you still can't find any bedrock.
        DunaSrfLandedTrenches* = #CSS_surfaceSample_DunaSrfLandedWesternCanyon_02 // You find a nice metal ruler in the sand! You're ready to proclaim the discovery of an alien civilization, but then you find that the one in your suit is missing.
        DunaSrfLandedExoticCraters* = #CSS_surfaceSample_DunaSrfLandedPolarCraters_00 // You put a sample of the crustal ice in a tube and put it in your pocket. You take it out again shortly afterwards to see a tubeful of vapour bfore the lid pops off in your face.
        DunaSrfLandedExoticCraters* = #CSS_surfaceSample_DunaSrfLandedPolarCraters_01 // Collecting a sample of the less dense ice under the crust, you sneak a taste. It's ice all right, if a little off-colour and gritty.

        IkeSrfLandedPoles* = #CSS_surfaceSample_IkeSrfLandedPolarLowlands_00 // Soil samples you take suggest a moderate water content.
        IkeSrfLandedPoles* = #CSS_surfaceSample_IkeSrfLandedPolarLowlands_01 // It's black and grainy...what's that in there? A small, transparent crystal? Looks like ice!
        IkeSrfLandedPoles* = #CSS_surfaceSample_IkeSrfLandedSouthPole_00 // You take several rock samples. They indicate a higher-than-average silica content.
        IkeSrfLandedPoles* = #CSS_surfaceSample_IkeSrfLandedSouthPole_01 // The sample doesn't want to go into the container, and sticks to it. You give it a solid bashing until it does.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedEasternMountainRidge_00 // You collect some sand, which glimmers in all shades of grey.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedEasternMountainRidge_01 // The regolith here seems very sticky, and clings to the side of the test box.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedWesternMountainRidge_00 // You're too busy rubbernecking to notice that patch of loose regolith, and almost lose your footing while you absent-mindledly scoop up some dust.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedWesternMountainRidge_01 // A rock jutting out of the dust makes for a rare sample of non-regolith bedrock as you chip at it with a hammer.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedSouthEasternMountainRange_00 // The white soil is distributed in layers several millimeters thick and seems to be a product of the impact events.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedSouthEasternMountainRange_01 // The regolith in the mountains in this area seems to have less carbon than the darker lowland material.
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedCentralMountainRange_00 // It's a piece of Ike. You like Ike. Everyone likes Ike. You will bring it back to Kerbin!
        IkeSrfLandedMountains* = #CSS_surfaceSample_IkeSrfLandedCentralMountainRange_01 // You're too distracted by lobbing rocks at Duna to remember to put one in the box.

        DresSrfLandedCanyon* = #CSS_surfaceSample_DresSrfLandedCanyons_00 // Well, THIS is a letdown.

        LaytheSrfLandedIceCaps* = #CSS_surfaceSample_LaytheSrfLandedPoles_00 // Sand is all over this moon. A shame it's not warmer...
        LaytheSrfLandedIceCaps* = #CSS_surfaceSample_LaytheSrfLandedPoles_01 // The water here is different from Kerbin, it does not freeze. Maybe there is salt in the sand?
        LaytheSrfLandedShores* = #CSS_surfaceSample_LaytheSrfLandedDunes_00 // The soil here contains no immediately identifiable organic chemicals.
        LaytheSrfSplashed* = #CSS_surfaceSample_LaytheSrfSplashedCrescentBay_00 // You go to sneak a sip of the sample, only to be nearly overwhelmed by the unpleasant odor. You spend the next few minutes recovering, wondering what possessed you to open your helmet.
        LaytheSrfSplashed* = #CSS_surfaceSample_LaytheSrfSplashedTheSagenSea_00 // You wish you had brought a boat.
        LaytheSrfSplashed* = #CSS_surfaceSample_LaytheSrfSplashedTheSagenSea_01 // You try a drink. It feels like a cold glacier and tastes like... well, tap water.
        LaytheSrfSplashed* = #CSS_surfaceSample_LaytheSrfSplashedTheSagenSea_02 // You decide to put some in your bottle but it is frozen shut.
        LaytheSrfSplashed* = #CSS_surfaceSample_LaytheSrfSplashedTheSagenSea_03 // This sample contains highly toxic levels of ammonia. Maybe you shouldn't have drank this...
        LaytheSrfSplashed* = #CSS_surfaceSample_LaytheSrfSplashedTheSagenSea_04 // You decide to cancel your proposal for a Laythe-sourced bottled water company.

        BopSrfLandedMountains* = #CSS_surfaceSample_BopSrfLandedPeaks_00 // Just under the brown surface you find a black, glassy material and put it in the sample bag. A volcanic residue perhaps?
        BopSrfLandedHighlands* = #CSS_surfaceSample_BopSrfLandedRidges_00 // The soil here is surprisingly soft, like play-koh.
        BopSrfLandedPoles* = #CSS_surfaceSample_BopSrfLandedPoles_00 // As you take a sample, it begins to glow... and starts shaking. It clearly does not like being contained.
        BopSrfLandedMidlands* = #CSS_surfaceSample_BopSrfLandedSlopes_00 // You pick up a rock from the ground. It looks somewhat unusual so you put it into the container.
