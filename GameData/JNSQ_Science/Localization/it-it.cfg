        #JNSQscience_bd_multiSpec_RigaInSpaceLowMountains_00 = Le creste montuose creano un contrasto d'ombra estremo, ma l'infrarosso delinea comunque i pendii più ripidi con dettaglio nitido. La mappa vale anche come lettera di rifiuto per i siti di atterraggio.
        #JNSQscience_bd_multiSpec_RigaInSpaceLowPoles_00 = Il terreno polare si raffredda rapidamente e mostra chiazze luminose che persistono per più passaggi. Se qui c'è brina, è sottile, ostinata e sempre nei posti più scomodi.
