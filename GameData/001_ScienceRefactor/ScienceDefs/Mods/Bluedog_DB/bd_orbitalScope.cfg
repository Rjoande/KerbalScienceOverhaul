@EXPERIMENT_DEFINITION:HAS[#id[bd_orbitalScope]]
{
	@title = #ScienceRefactor_bd_orbitalScope_title // Orbital Images
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_orbitalScope_default_00 // Surface images are taken in a mosaic for digital stitching.

        InSpace* = #ScienceRefactor_bd_orbitalScope_default_01 // A sequence of surface images are takes as the craft flies overhead
        InSpace* = #ScienceRefactor_bd_orbitalScope_default_02 // KSC Scientists eagerly start reviewing all the surface features on the pictures
        
        SunInSpace* = #ScienceRefactor_bd_orbitalScope_SunInSpace_00 // The image is completely washed out in white.
        SunInSpace* = #ScienceRefactor_bd_orbitalScope_SunInSpace_01 // Images are archived after an intern reviewed them and screamed "My eyes!"

        MohoInSpace* = #ScienceRefactor_bd_orbitalScope_MohoInSpace_00 // Varying colors pictured suggest Moho might have once been volcanically active.
        MohoInSpaceLow* = #ScienceRefactor_bd_orbitalScope_MohoInSpaceLow_00 // Surface features hint at an interesting past but now only a weathered wasteland is left, heavily battered by solar particles.
        MohoInSpaceHigh* = #ScienceRefactor_bd_orbitalScope_MohoInSpaceHigh_00 // Telescope images start coming in from Moho.
        MohoInSpaceLowNorthernSinkhole* = #ScienceRefactor_bd_orbitalScope_MohoInSpaceLowNorthernSinkhole_00 // A lot of surface erosion is visible in this huge topographic depression.
        MohoInSpaceLowNorthPole* = #ScienceRefactor_bd_orbitalScope_MohoInSpaceLowNorthPole_00 // A very sharp and dangerously deep depression is detected. Scientists discuss a future mission there.

        EveInSpace* = #ScienceRefactor_bd_orbitalScope_EveInSpace_00 // There are many intriguing purple features on the surface and atmosphere.
        EveInSpaceLowPoles* = #ScienceRefactor_bd_orbitalScope_EveInSpaceLowPoles_00 // Crystallized material covers the surface forming interesting patterns as it is buffeted by surface winds.
        EveInSpaceLowHighlands* = #ScienceRefactor_bd_orbitalScope_EveInSpaceLowHighlands_00 // Tall dunes of purple sand gentle break up large areas or mostly flat terrain.
        EveInSpaceLowPeaks* = #ScienceRefactor_bd_orbitalScope_EveInSpaceLowPeaks_00 // The mountain ranges challenge the heavy gravity to rise up high above sea level.
        EveInSpaceLowExplodiumSea* = #ScienceRefactor_bd_orbitalScope_EveInSpaceLowExplodiumSea_00 // The albedo of this intriguing liquid body gives rise to discussion as to its chemical composition.
        EveInSpaceLow* = #ScienceRefactor_bd_orbitalScope_EveInSpaceLow_00 // Varied topology is visible, from mountain ranges to large purple lakes.
        EveInSpaceHigh* = #ScienceRefactor_bd_orbitalScope_EveInSpaceHigh_00 // Eve's thick purple atmosphere allows little surface features to be seen at this distance.

		GillyInSpace* = #ScienceRefactor_bd_orbitalScope_GillyInSpace_00 // The telescope is slowly slewed into position to avoid scaring the tiny moon.
		GillyInSpaceLow* = #ScienceRefactor_bd_orbitalScope_GillyInSpaceLow_00 // Very small rocks are visible on the surface. Barely kept there by the weak gravity.
		GillyInSpaceHigh* = #ScienceRefactor_bd_orbitalScope_GillyInSpaceHigh_00 // No mayor craters are visible on Gilly's surface. The moon must be incapable of pulling anything down towards it.
		GillyInSpaceLowHighlands* = #ScienceRefactor_bd_orbitalScope_GillyInSpaceLowHighlands_00 // Gilly's taller areas form a very uneven terrain.

        KerbinInSpace* = #ScienceRefactor_bd_orbitalScope_KerbinInSpace_00 // Kerbin! Our home!
