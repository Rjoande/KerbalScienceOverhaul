        #JNSQscience_bd_multiSpec_LindorInSpaceLowTemperateBands_00 = Le bande temperate si separano nettamente tra le lunghezze d'onda, rivelando zone di shear che l'imaging normale impasta. L'atmosfera di Lindor sembra ordinata e silenziosamente violenta.
        #JNSQscience_bd_multiSpec_LindorInSpaceLowExposedLowerDeck_00 = I canali più profondi colgono uno strato tenue e più caldo che affiora tra i varchi della foschia superiore. Lo strumento lo etichetta "strato inferiore" e il tuo istinto lo etichetta "non visitare".
        #JNSQscience_bd_multiSpec_LindorInSpaceLowSubpolarBands_00 = Le striature subpolari si torcono in modo diverso in ogni banda, come se i venti non riuscissero a mettersi d'accordo su una direzione. La mappa in falsi colori sembra vernice mescolata con una turbina.
        #JNSQscience_bd_multiSpec_LindorInSpaceLowNorthPole_00 = L'ultravioletto mostra una sottile corona di foschia mentre l'infrarosso traccia sotto una spirale più fredda. Il polo sembra meteo con rancore.
        #JNSQscience_bd_multiSpec_LindorInSpaceLowSouthPole_00 = La regione del polo sud passa tra gradienti uniformi e turbolenza annodata a seconda della lunghezza d'onda. Lindor sembra cambiare idea a metà scansione.
        #JNSQscience_bd_multiSpec_LindorInSpaceLowStormComplex_00 = I filtri a banda stretta accendono una zona attiva che si rimodella tra un'esposizione e l'altra. Un canale va brevemente in saturazione, poi finge che non sia successo nulla.
        #JNSQscience_bd_multiSpec_LindorInSpaceLowUpperStormDeck_00 = Lo strato superiore delle tempeste riflette luminoso nelle bande a onda corta ma diventa bitorzoluto all'infrarosso. Qualunque cosa ci sia lassù è alta, fredda e sta ancora crescendo.
        #JNSQscience_bd_multiSpec_KrelInSpaceHigh_00 = Da un'orbita alta, il disco pallido di Krel resta ostinatamente uniforme finché non impili le bande. Poi compaiono le "vene" come deboli contrasti ripetuti che mettono a disagio tutti.
        #JNSQscience_bd_multiSpec_KrelInSpaceLowLowlands_00 = Le pianure risultano leggermente più scure e più calde, suggerendo polvere fine raccolta nei bacini. La gravità qui può essere debole, ma sa comunque mettere ordine nel caos.
        #JNSQscience_bd_multiSpec_KrelInSpaceLowMidlands_00 = Sottili spostamenti spettrali dipingono le Midlands in dolci gradienti che emergono solo dopo un'elaborazione aggressiva. Il team scientifico lo chiama "delicato", che significa "difficile".
        #JNSQscience_bd_multiSpec_KrelInSpaceLowHighlands_00 = Gli altipiani mostrano caratteristiche di assorbimento più nette, come se roccia più pulita fosse rimasta esposta allo spazio. La superficie sembra abbastanza vecchia da ricordare quando era più giovane.
        #JNSQscience_bd_multiSpec_KrelInSpaceLowPoles_00 = Il terreno polare restituisce contrasti nitidi e freddi con ombre profonde che si rifiutano di perdere dettaglio. I poli sembrano nascondere qualcosa per abitudine.
        #JNSQscience_bd_multiSpec_AdenInSpaceHigh_00 = Da molto in alto, Aden è un piccolo puntino marrone con uno spettro che tende fortemente verso "roccia polverosa". L'unica sorpresa è quanto resti così con sicurezza.
