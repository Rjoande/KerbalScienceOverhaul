        #GEPscience_bd_UVspec_CaireenInSpaceHigh_00 = From high orbit, Caireen is barely more than a jagged UV glint with a lot of black space around it. The emptiness dominates the dataset, and somehow that still counts as science.

        #GEPscience_bd_UVspec_SironaInSpaceLowDarkTropicalBands_00 = The UV spectrum over the dark tropical bands shows heavy absorption with bright, needle-thin emission spikes. Sirona’s extreme field makes the detector chatter like it’s eavesdropping on lightning.
        #GEPscience_bd_UVspec_SironaInSpaceLowLightTropicalBands_00 = Brighter clouds push more UV back into the sensor, but methane still bites big chunks out of the curve. Under Grannus’ dim glow, the planet somehow still looks electrically “awake.”
        #GEPscience_bd_UVspec_SironaInSpaceLowDarkTemperateBands_00 = A broad ultraviolet haze signature sits on top of the banding, as if the upper atmosphere is busy cooking new chemicals. The downlink notes arrive late, and they still feel urgent.
        #GEPscience_bd_UVspec_SironaInSpaceLowLightTemperateBands_00 = The UV lines sharpen and blur with each pass, hinting at layered clouds sliding past each other at rude speeds. You label the dataset “not calm” and hope that’s sufficiently scientific.
