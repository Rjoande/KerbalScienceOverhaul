@EXPERIMENT_DEFINITION:HAS[#id[sspxFishStudy]]
{
    %RESULTS
    {
        GrannusFlyingHigh* = #GEPscience_sspxFishStudy_GrannusFlyingHigh_00 // “Flying high” over a star feels like a paperwork error made real; the fish flatten into a worried school as the tank lights flicker red and the comms lag behind your panic.
        GrannusInSpaceLow* = #GEPscience_sspxFishStudy_GrannusInSpaceLow_00 // The tank lights up an unhealthy shade of red as Grannus fills the window; the fish respond by forming a very concerned-looking committee in the corner.
        GrannusInSpaceHigh* = #GEPscience_sspxFishStudy_GrannusInSpaceHigh_00 // From high above the dim red sun, the fish drift in slow circles as if listening for Mission Control—then remember the reply will take a while.

        TaranisSrfLanded* = #GEPscience_sspxFishStudy_TaranisSrfLanded_00 // Outside, the world can’t decide between glowing-hot and frozen-dark; inside, the fish vote unanimously for “neither” and resume stressed swimming laps.
        TaranisSrfSplashed* = #GEPscience_sspxFishStudy_TaranisSrfSplashed_00 // Mission log: we are “splashed” in something that is absolutely not fish-compatible; the tank heaters panic anyway, and the fish look offended by the comparison.
        TaranisInSpaceLow* = #GEPscience_sspxFishStudy_TaranisInSpaceLow_00 // Low over Taranis, the sharp divide between blistering light and endless shadow makes the fish’s day/night cycle give up entirely.
        TaranisInSpaceHigh* = #GEPscience_sspxFishStudy_TaranisInSpaceHigh_00 // From high orbit, Taranis is a split coin of fire and darkness; the fish cluster together like they’re trying to reduce the communications delay.

        ToutatisSrfLanded* = #GEPscience_sspxFishStudy_ToutatisSrfLanded_00 // The high gravity makes everything feel heavier, including the fish’s attitude; they stop floating theatrically and swim with serious, deliberate strokes.
        ToutatisFlyingHigh* = #GEPscience_sspxFishStudy_ToutatisFlyingHigh_00 // High above Toutatis, the thin air and long twilight make the habitat feel like it’s drifting between shifts; the fish circle the antenna end of the tank, as if waiting for Mission Control to catch up.
        ToutatisInSpaceLow* = #GEPscience_sspxFishStudy_ToutatisInSpaceLow_00 // Skimming low above Toutatis, the thin haze and harsh lighting turn the habitat into a slow-rolling dusk; the fish keep darting past the antenna like it can speed up the signal.
        ToutatisInSpaceHigh* = #GEPscience_sspxFishStudy_ToutatisInSpaceHigh_00 // From high orbit, Toutatis shows its baked face and cold face at once; the fish huddle mid-tank, as if trying to stay in the “comfortable zone” too.

        NodensSrfLanded* = #GEPscience_sspxFishStudy_NodensSrfLanded_00 // Under the dim red sun, the real water outside looks invitingly enormous; the fish press close to the glass like they’re trying to file a transfer request.
        NodensSrfSplashed* = #GEPscience_sspxFishStudy_NodensSrfSplashed_00 // A “local water sample” turns out to be mostly unfamiliar chemistry; the fish respond by swimming laps around the filter intake and judging your career choices.
        NodensFlyingHigh* = #GEPscience_sspxFishStudy_NodensFlyingHigh_00 // High in Nodens’ air, every bump and sway makes the tank slosh like a slow-motion wave machine; the fish ride it out with grim professionalism.
        NodensInSpaceLow* = #GEPscience_sspxFishStudy_NodensInSpaceLow_00 // In low orbit, the planet’s seas glint darkly while the radio delay stretches; the fish congregate near the antenna as if staring at it will make replies arrive sooner.
        NodensInSpaceHigh* = #GEPscience_sspxFishStudy_NodensInSpaceHigh_00 // From high above Nodens, the red daylight never feels quite “on time”; the fish drift in a sleepy spiral that matches the long cadence of far-away commands.

        BelisamaSrfLanded* = #GEPscience_sspxFishStudy_BelisamaSrfLanded_00 // The surface is silent and stark, but Nodens hangs fixed overhead like an unblinking eye; the fish pretend not to notice and practice synchronized anxiety.
        BelisamaInSpaceLow* = #GEPscience_sspxFishStudy_BelisamaInSpaceLow_00 // Close over Belisama, the locked face below never changes and the red sun’s glare feels wrong; the fish keep circling as if searching for a missing “normal.”
        BelisamaInSpaceHigh* = #GEPscience_sspxFishStudy_BelisamaInSpaceHigh_00 // From high orbit, Belisama and Nodens look like they’re glued together across the void; the fish huddle mid-tank, conserving energy for the next delayed instruction.

        SucellusSrfLanded* = #GEPscience_sspxFishStudy_SucellusSrfLanded_00 // The regolith outside looks metallic and thirsty, and the habitat feels like a lonely outpost; the fish cling to the warm side of the tank and refuse to explore.
        SucellusInSpaceLow* = #GEPscience_sspxFishStudy_SucellusInSpaceLow_00 // Low over Sucellus, the terrain is all sharp shadows in red light; the fish swim tight loops, as if the darkness outside might leak in.
        SucellusInSpaceHigh* = #GEPscience_sspxFishStudy_SucellusInSpaceHigh_00 // Far above this frontier dwarf, the star is small and dim and the wait for responses is longer than snack-time; the fish become very interested in the auto-feeder.

        CaireenSrfLanded* = #GEPscience_sspxFishStudy_CaireenSrfLanded_00 // Touchdown is gentle, gravity is questionable, and the world outside looks like it was assembled from leftovers; the fish bob slowly, clearly unimpressed by “landing.”
        CaireenInSpaceLow* = #GEPscience_sspxFishStudy_CaireenInSpaceLow_00 // In close orbit, Caireen barely holds a shape, just a tumbling lump in red-lit night; the fish keep bumping the tank walls as if trying to find “down.”
        CaireenInSpaceHigh* = #GEPscience_sspxFishStudy_CaireenInSpaceHigh_00 // From high above, Caireen is almost lost against the dark, and the comm delay feels personal; the fish pack together like they’re waiting out a storm that never arrives.

        SironaFlyingHigh* = #GEPscience_sspxFishStudy_SironaFlyingHigh_00 // High above Sirona’s banded clouds, the tank sloshes with every slow buffet of the air; the fish respond by forming a tight school and glaring at the long-range antenna.
        SironaInSpaceLow* = #GEPscience_sspxFishStudy_SironaInSpaceLow_00 // Sirona’s swirling stripes crawl beneath you in dim red light, and the radiation counter ticks a steady rhythm; the fish keep to the shadowed side of the tank as if it feels safer.
        SironaInSpaceHigh* = #GEPscience_sspxFishStudy_SironaInSpaceHigh_00 // From high over Sirona, everything looks distant and quiet, including Mission Control; the fish drift in lazy spirals, apparently resigned to the communications delay.

        AirmedSrfLanded* = #GEPscience_sspxFishStudy_AirmedSrfLanded_00 // Airmed’s battered, two-toned ground looks cold and unfriendly, but Sirona hangs huge in the sky; the fish press to the glass like they’re trying to watch the view too.
        AirmedInSpaceLow* = #GEPscience_sspxFishStudy_AirmedInSpaceLow_00 // Low orbit over Airmed reveals scars and sharp contrasts that never soften under the red sun; the fish become unusually still, as if waiting for the next delayed command.
        AirmedInSpaceHigh* = #GEPscience_sspxFishStudy_AirmedInSpaceHigh_00 // From high above Airmed, the moon feels like a chipped stone lost in the dark; the fish keep circling the feeder, perhaps deciding that snacks are the only reliable schedule out here.

        BorvoSrfLanded* = #GEPscience_sspxFishStudy_BorvoSrfLanded_00 // Borvo’s brown-beige ground could be dust, could be ice, could be something else entirely; the fish react to the unfamiliar chemistry sensors by swimming very politely away from them.
        BorvoFlyingHigh* = #GEPscience_sspxFishStudy_BorvoFlyingHigh_00 // In Borvo’s high atmosphere, the habitat creaks and the lighting never looks quite “day”; the fish swim in tight loops, adapting to a world where up and down are mostly suggestions.
        BorvoInSpaceLow* = #GEPscience_sspxFishStudy_BorvoInSpaceLow_00 // Low over Borvo, the atmospheric haze blurs the surface into soft bands under red sunlight; the fish school near the pump outlet, apparently preferring predictable currents to alien horizons.
        BorvoInSpaceHigh* = #GEPscience_sspxFishStudy_BorvoInSpaceHigh_00 // From high orbit, Borvo’s muted colors fade into the surrounding night; the fish drift nose-to-tail like a tiny convoy, maintaining formation for no clear reason.

        DamonaSrfLanded* = #GEPscience_sspxFishStudy_DamonaSrfLanded_00 // Damona is gray, pockmarked, and intensely unimpressed with visitors; the fish sink to the bottom of the tank and stare out at the cratered landscape with matching enthusiasm.
        DamonaInSpaceLow* = #GEPscience_sspxFishStudy_DamonaInSpaceLow_00 // Low orbit over Damona’s prominent scar feels like circling a bruise in the void; the fish keep bumping the tank wall gently, as if checking that “outside” stays outside.
        DamonaInSpaceHigh* = #GEPscience_sspxFishStudy_DamonaInSpaceHigh_00 // From high above Damona, Sirona’s system feels vast and far away, and the comms delay stretches thin; the fish huddle mid-tank, conserving energy for instructions that arrive late.

        EponaSrfLanded* = #GEPscience_sspxFishStudy_EponaSrfLanded_00 // The habitat sits on Epona’s frozen crust under a dim red sun; the fish gather by the heater, clearly preferring “warm ocean inside” to “mystery ice outside.”
        EponaFlyingHigh* = #GEPscience_sspxFishStudy_EponaFlyingHigh_00 // High in Epona’s cold air, the tank sloshes gently while methane-sniffers click; the fish respond by swimming tight, efficient laps like they’re on a strict energy budget.
        EponaInSpaceLow* = #GEPscience_sspxFishStudy_EponaInSpaceLow_00 // Low over Epona, the ice below looks unbroken and endless; the fish keep darting past the comm panel as if they can hurry up the long-distance ping.
        EponaInSpaceHigh* = #GEPscience_sspxFishStudy_EponaInSpaceHigh_00 // From high orbit, Epona is a dark coin in red light; the fish drift slowly, seemingly resigned to a day/night cycle that never feels on schedule out here.

        RosmertaSrfLanded* = #GEPscience_sspxFishStudy_RosmertaSrfLanded_00 // Rosmerta is lonely, airless, and far from anywhere comfortable; the fish stare out at the gray silence and decide the tank wall is an excellent place to hold a meeting.
        RosmertaInSpaceLow* = #GEPscience_sspxFishStudy_RosmertaInSpaceLow_00 // Skimming low over Rosmerta, the radiation counter chatters in the background; the fish cluster behind the thickest-looking part of the habitat, for entirely scientific reasons.
        RosmertaInSpaceHigh* = #GEPscience_sspxFishStudy_RosmertaInSpaceHigh_00 // From high above Rosmerta, Epona dominates the sky like a distant shelter; the fish keep circling the feeder, because snacks arrive more reliably than answers.

        RAB-58ESrfLanded* = #GEPscience_sspxFishStudy_RAB-58ESrfLanded_00 // Touching down on this captured oddball feels like parking on a question mark; the fish float motionless for a moment, then resume swimming as if to say, “Wake us when you’ve identified the rock.”
        RAB-58EInSpaceLow* = #GEPscience_sspxFishStudy_RAB-58EInSpaceLow_00 // In low orbit, RAB-58E tumbles beneath you with no obvious “right” side; the fish keep reorienting with each slow roll, looking mildly betrayed by physics.
        RAB-58EInSpaceHigh* = #GEPscience_sspxFishStudy_RAB-58EInSpaceHigh_00 // From high orbit, the moonlet is barely more than a speck in red-lit dark; the fish school tightly together, as if smaller targets are harder for the void to notice.

        CernunnosSrfLanded* = #GEPscience_sspxFishStudy_CernunnosSrfLanded_00 // On Cernunnos’ icy ground, the horizon feels too wide and too quiet; the fish stay close to the lights, refusing to acknowledge that “outside” is a real place.
        CernunnosInSpaceLow* = #GEPscience_sspxFishStudy_CernunnosInSpaceLow_00 // Low over Cernunnos, you scan the dark for any companion bodies it might have; the fish pace the tank in slow loops, matching the careful, methodical search.
        CernunnosInSpaceHigh* = #GEPscience_sspxFishStudy_CernunnosInSpaceHigh_00 // From high above this dwarf world, the system looks sparse and distant; the fish drift in formation, patiently waiting for instructions that take the scenic route through space.
    }
}