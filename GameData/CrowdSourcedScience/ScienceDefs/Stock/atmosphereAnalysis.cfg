@EXPERIMENT_DEFINITION:HAS[#id[atmosphereAnalysis]]
{
    %RESULTS
    {
        Srf* = #CSS_atmosphereAnalysis_default_00 // You look at the results and understand that you have no idea what these numbers mean.
        Srf* = #CSS_atmosphereAnalysis_default_01 // A note is taped to the side of the instrument: "Does not measure fear"
        Srf* = #CSS_atmosphereAnalysis_default_02 // The sensors detect trace amounts of the installing technician's sandwich.
        Srf* = #CSS_atmosphereAnalysis_default_03 // You'd like to run an atmospheric analysis, but all you can smell is the cheese from your snack last night. So you just push buttons and hope something valuable, or cheesy, will come of it.
        Srf* = #CSS_atmosphereAnalysis_default_04 // Aaron Kerman was best known for his heroic final efforts in discovering that the Mun has no atmosphere. Now we use these sensors instead.
        Srf* = #CSS_atmosphereAnalysis_default_05 // Yep. Works as specified.
        
        Flying* = #CSS_atmosphereAnalysis_default_00 // You look at the results and understand that you have no idea what these numbers mean.
        Flying* = #CSS_atmosphereAnalysis_default_01 // A note is taped to the side of the instrument: "Does not measure fear"
        Flying* = #CSS_atmosphereAnalysis_default_02 // The sensors detect trace amounts of the installing technician's sandwich.
        Flying* = #CSS_atmosphereAnalysis_default_03 // You'd like to run an atmospheric analysis, but all you can smell is the cheese from your snack last night. So you just push buttons and hope something valuable, or cheesy, will come of it.
        Flying* = #CSS_atmosphereAnalysis_default_04 // Aaron Kerman was best known for his heroic final efforts in discovering that the Mun has no atmosphere. Now we use these sensors instead.
        Flying* = #CSS_atmosphereAnalysis_default_05 // Yep. Works as specified.

        EveSrfLandedPoles* = #CSS_atmosphereAnalysis_EveSrfLandedPoles_00 // The air is acidic enough to wear away some of the labels on the sensors.
        EveSrfLandedPoles* = #CSS_atmosphereAnalysis_EveSrfLandedPoles_01 // The thick, cloying air is still just as oppressive vs everything at the poles.
        EveSrfLandedMidlands* = #CSS_atmosphereAnalysis_EveSrfLandedMidlands_00 // The air is heavy, hot, and not particularly friendly.
        EveSrfLandedMidlands* = #CSS_atmosphereAnalysis_EveSrfLandedMidlands_01 // You now are completely certain that purple is a weird color.
        EveSrfLandedExplodiumSea* = #CSS_atmosphereAnalysis_EveSrfLandedExplodiumSea_00 // The air is so thick the analyser has to push it into the chamber with a stick on a robo-arm.
        EveSrfLandedLowlands* = #CSS_atmosphereAnalysis_EveSrfLandedLowlands_00 // Extensive analysis reveals that Eve's atmosphere is not, in fact, grape flavored.
        EveSrfLandedLowlands* = #CSS_atmosphereAnalysis_EveSrfLandedLowlands_01 // Lots of carbon dioxide, and even more down here at low altitude.
        EveSrfLandedHighlands* = #CSS_atmosphereAnalysis_EveSrfLandedHighlands_00 // Taking a "fresh breath of air" is not the best idea according to this atmosphere analysis!
        EveSrfLandedHighlands* = #CSS_atmosphereAnalysis_EveSrfLandedHighlands_01 // Whether high or low; there are no traces of grape, aubergine or royalty to be found.
        EveSrfLandedPeaks* = #CSS_atmosphereAnalysis_EveSrfLandedPeaks_00 // Did the eggs in the drawer go off again? That's a lot of sulphur out there.
        EveSrfLandedPeaks* = #CSS_atmosphereAnalysis_EveSrfLandedPeaks_01 // Normally the air up so high might be refreshing, though on Eve it's anything but.
        EveSrfLandedPeaks* = #CSS_atmosphereAnalysis_EveSrfLandedPeaks_02 // You wonder if your tanks of oxygen could oxygenate the atmosphere here.
        EveSrfLandedImpactEjecta* = #CSS_atmosphereAnalysis_EveSrfLandedImpactEjecta_00 // As you analyze the pressure around you, you start to feel very hesitant about sending any Kerbals out there.
        EveErfLandedImpactEjecta* = #CSS_atmosphereAnalysis_EveErfLandedImpactEjecta_01 // A lazy air current slowly lifts a small amount of surface dust into the air, and the mixture gains "1% purple rock".
        EveSrfLandedCraterLake* = #CSS_atmosphereAnalysis_EveSrfLandedCraterLake_00 // You ask KSC to move whichever technician contaminated the sensor with paint scrubber to the experimental rocket testing program.
        EveSrfLandedWesternSea* = #CSS_atmosphereAnalysis_EveSrfLandedWesternSea_00 // Traces of Ar, He and Ne are detected in the noxious gas mix.
        EveSrfLandedOlympus* = #CSS_atmosphereAnalysis_EveSrfLandedOlympus_00 // On the top of the world, you're still not up high enough for the gases to separate yet.
        EveSrfLandedOlympus* = #CSS_atmosphereAnalysis_EveSrfLandedOlympus_01 // Still just as nasty as ever. Why can't these mountains be tall enough to get into the good bits?
        EveSrfLandedEasternSea* = #CSS_atmosphereAnalysis_EveSrfLandedEasternSea_00 // The sea air is very bracing, or at least it would be if it wasn't lethal.
        EveSrfLandedFoothills* = #CSS_atmosphereAnalysis_EveSrfLandedFoothills_00 // Why do they call these foothills? The air doesn't contain a cheesy smell at least.
        EveSrfLandedFoothills* = #CSS_atmosphereAnalysis_EveSrfLandedFoothills_01 // The designation of foothills seems like a mostly academic term, because the gas mix conforms perfectly to the Eve standard.
        EveSrfLandedShallows* = #CSS_atmosphereAnalysis_EveSrfLandedShallows_00 // Some of the mysterious chemicals that comprise explodium drift through the air near the coast.
        EveFlyingLowPoles* = #CSS_atmosphereAnalysis_EveFlyingLowPoles_00 // If not for the high gravity, you could fly aircraft here at very low speeds.
        EveFlyingLowPoles* = #CSS_atmosphereAnalysis_EveFlyingLowPoles_01 // No ice in the air up here. Come to think of it, you haven't detected a single water molecule at all so far.
        EveFlyingLowMidlands* = #CSS_atmosphereAnalysis_EveFlyingLowMidlands_00 // The thick purpleness clogs the sensor.
        EveFlyingLowMidlands* = #CSS_atmosphereAnalysis_EveFlyingLowMidlands_01 // It's dense, purple, and full of hot air. What did you expect?
        EveFlyingLowExplodiumSea* = #CSS_atmosphereAnalysis_EveFlyingLowExplodiumSea_00 // That's clearly not water, since there's no trace of it in the air.
        EveFlyingLowLowlands* = #CSS_atmosphereAnalysis_EveFlyingLowLowlands_00 // Still no indication as to why it's all so purple!
        EveFlyingLowHighlands* = #CSS_atmosphereAnalysis_EveFlyingLowHighlands_00 // The air is very dense here... and purple as well. You wonder why that is.
        EveFlyingLowPeaks* = #CSS_atmosphereAnalysis_EveFlyingLowPeaks_00 // To your surprise, the atmosphere contains a previously unknown compound that absorbs all but blue and red light.
        EveFlyingLowImpactEjecta* = #CSS_atmosphereAnalysis_EveFlyingLowImpactEjecta_00 // Why is the interior of the instrument turning purple?
        EveFlyingLowCraterLake* = #CSS_atmosphereAnalysis_EveFlyingLowCraterLake_00 // The composition of this "explodium" must be highly dense, since whatever it is doesn't leave the surface.
        EveFlyingLowWesternSea* = #CSS_atmosphereAnalysis_EveFlyingLowWesternSea_00 // Still no trace of what gives the planet its purple colour. You hope whatever it is isn't infectious, since you're seeing a lot of purple yourself.
        EveFlyingLowOlympus* = #CSS_atmosphereAnalysis_EveFlyingLowOlympus_00 // A few minute traces of elements made by interactions between the atmosphere and the solar wind trickle down through the clouds.
        EveFlyingLowEasternSea* = #CSS_atmosphereAnalysis_EveFlyingLowEasternSea_00 // For a beautiful planet and the pearl of the Kerbol system, such bad air is a complete disappointment.
        EveFlyingLowFoothills* = #CSS_atmosphereAnalysis_EveFlyingLowFoothills_00 // The trace acidic compounds in the air eat away worryingly at the sensitive equipment.
        EveFlyingLowShallows* = #CSS_atmosphereAnalysis_EveFlyingLowShallows_00 // The monitor flickers as the heat, pressure and acidity take their toll on the analyser. Fortunately, it remains operational.
        EveFlyingHighPoles* = #CSS_atmosphereAnalysis_EveFlyingHighPoles_00 // Faint traces of ionised gases associated with aurorae are detected.
        EveFlyingHighMidlands* = #CSS_atmosphereAnalysis_EveFlyingHighMidlands_00 // Heavy gases in high concentrations. Atmospheric entry takes quite a toll on ships here.
        EveFlyingHighExplodiumSea* = #CSS_atmosphereAnalysis_EveFlyingHighExplodiumSea_00 // The sensor is detecting a cloud of super-heated water vapor. Fascinating, considering there is none lower down at all.
        EveFlyingHighLowlands* = #CSS_atmosphereAnalysis_EveFlyingHighLowlands_00 // You eagerly stare at the readout but, sadly, it displays a list of deadly gases and not the grape flavored air you were hoping for.
        EveFlyingHighHighlands* = #CSS_atmosphereAnalysis_EveFlyingHighHighlands_00 // Some of the sensors indicate large concentrations of sulfur dioxide. Mission Control insists that, despite containing oxygen, this gas isn't breathable.
        EveFlyingHighPeaks* = #CSS_atmosphereAnalysis_EveFlyingHighPeaks_00 // Thick purpleness clogs the sensor as well as your senses.
        EveFlyingHighImpactEjecta* = #CSS_atmosphereAnalysis_EveFlyingHighImpactEjecta_00 // The highly corrosive gases start pocking and stripping the sensor array. You're thankful the engineers made it durable or it would have been torn apart by now.
        EveFlyingHighCraterLake* = #CSS_atmosphereAnalysis_EveFlyingHighCraterLake_00 // Up at the top of the atmosphere, the carbon dioxide gradually gives way to nitrogen.
        EveFlyingHighWesternSea* = #CSS_atmosphereAnalysis_EveFlyingHighWesternSea_00 // Ethereal wisps of purple clouds flow past the craft, but the analyser doesn't register them.
        EveFlyingHighOlympus* = #CSS_atmosphereAnalysis_EveFlyingHighOlympus_00 // A cocktail of strange molecules are being detected as complex compounds are constantly formed and broken apart in the upper atmosphere.
        EveFlyingHighEasternSea* = #CSS_atmosphereAnalysis_EveFlyingHighEasternSea_00 // Preliminary results from up high are not encouraging. You're not so enthusiastic about going to Eve's surface now.
        EveFlyingHighFoothills* = #CSS_atmosphereAnalysis_EveFlyingHighFoothills_00 // Eve's atmosphere isn't actually grape juice? What is this kowmulch!? Looks like we brought the empty bottles for nothing.
        EveFlyingHighShallows* = #CSS_atmosphereAnalysis_EveFlyingHighShallows_00 // One upshot of Eve's atmosphere being so thick is that the analyser has plenty to work with, even all the way up here. We don't actually have to go downstairs to know how nasty it is.

        KerbinSrfLandedKSC* = #CSS_atmosphereAnalysis_KerbinSrfLandedKSC_00 // A surprising amount of paint and ink volatiles, combined with ozone from welding and short circuits. About what you'd expect from a thriving space program.
        KerbinSrfLandedAdministration* = #CSS_atmosphereAnalysis_KerbinSrfLandedAdministration_00 // The atmosphere heats up as Montimer learns about how our funds have been spend lately.
        KerbinSrfLandedAstronautComplex* = #CSS_atmosphereAnalysis_KerbinSrfLandedAstronautComplex_00 // The sensor picks up fear and excitement in the atmosphere. Don't ask how.
        KerbinSrfLandedBaikerbanur* = #CSS_atmosphereAnalysis_KerbinSrfLandedBaikerbanur_00 // The air is clear and sweet. For a rocket launch complex, this is a very bad thing.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_atmosphereAnalysis_KerbinSrfLandedBaikerbanurLaunchpad_00 // There are a few faint traces of an array of toxic hypergols, their chemical secrets long since lost to time.
        KerbinSrfLandedCrawlerway* = #CSS_atmosphereAnalysis_KerbinSrfLandedCrawlerway_00 // It's surprisingly windy out in the open.
        KerbinSrfLandedFlagPole* = #CSS_atmosphereAnalysis_KerbinSrfLandedFlagPole_00 // You install the sensor on top of the flag pole.
        KerbinSrfLandedFlagPole* = #CSS_atmosphereAnalysis_KerbinSrfLandedFlagPole_01 // The sensor tells you that the flag is working as advertised.
        KerbinSrfLandedLaunchPad* = #CSS_atmosphereAnalysis_KerbinSrfLandedLaunchPad_00 // Apparently, the atmosphere is made of ash and rocket fuel. But that might be because you're on the launchpad.
        KerbinSrfLandedLaunchPad* = #CSS_atmosphereAnalysis_KerbinSrfLandedLaunchPad_01 // I think a fly just got in the research equipment... don't tell the scientists!
        KerbinSrfLandedLaunchPad* = #CSS_atmosphereAnalysis_KerbinSrfLandedLaunchPad_02 // The extremely expensive array of sensors, samplers, and detectors has confirmed that today is a very good day to go to space. Which is nice, considering we already have the rocket out and everything.
        KerbinSrfLandedLaunchPad* = #CSS_atmosphereAnalysis_KerbinSrfLandedLaunchPad_03 // The sensor detects an explosive atmosphere. Try getting off the launchpad.
        KerbinSrfLandedMissionControl* = #CSS_atmosphereAnalysis_KerbinSrfLandedMissionControl_00 // The atmosphere is always tense here. You didn't need a sensor to figure that out.
        KerbinSrfLandedR&D* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&D_00 // The atmosphere here is very contemplative.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DCentralBuilding_00 // All the blow-hards around here have caused the anemometer to fall off your instrument.
        KerbinSrfLandedR&DCornerLab* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DCornerLab_00 // The researchers confiscate your atmospheric sensor and disassemble it to see how it works.
        KerbinSrfLandedR&DMainBuilding* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DMainBuilding_00 // Having duct-taped your sensor back together you attempt to get an atmospheric reading, but it looks like your fix will require some bubblegum, superglue, and maybe a coat hanger as well.
        KerbinSrfLandedR&DObservatory* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DObservatory_00 // The sensor picks up faint traces of caffeine in the air. Makes sense with the hours that the R&D team puts in.
        KerbinSrfLandedR&DSideLab* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DSideLab_00 // The atmosphere here is thick with fumes of unknown chemicals from unknown reactions. Who would have known this R&D stuff could be dangerous?
        KerbinSrfLandedR&DSmallLab* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DSmallLab_00 // The atmosphere is heavy with an acrid smell. Who knows what those mad scientists are working on.
        KerbinSrfLandedR&DTanks* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DTanks_00 // The strange chemical concoction leaking from the tanks melts your atmospheric sensors into a puddle of goo. Hey look! It's not-as-much-of-a mystery goo!
        KerbinSrfLandedR&DWindTunnel* = #CSS_atmosphereAnalysis_KerbinSrfLandedR&DWindTunnel_00 // The sensor blew away. Duh. It's a wind tunnel. At least we got the grant money already.
        KerbinSrfLandedRunway* = #CSS_atmosphereAnalysis_KerbinSrfLandedRunway_00 // Wind speed changes slightly as a small insect passes in front of the sensor.
        KerbinSrfLandedRunway* = #CSS_atmosphereAnalysis_KerbinSrfLandedRunway_01 // Readings suggest today is as good a time for flying as any.
        KerbinSrfLandedRunway* = #CSS_atmosphereAnalysis_KerbinSrfLandedRunway_02 // Atmospheric conditions look good for takeoff. Punch it!
        KerbinSrfLandedSPH* = #CSS_atmosphereAnalysis_KerbinSrfLandedSPH_00 // The sensor registers a cool breeze coming from the spaceplane hangar. We always knew this was a cool place.
        KerbinSrfLandedSPHMainBuilding* = #CSS_atmosphereAnalysis_KerbinSrfLandedSPHMainBuilding_00 // The atmosphere here is pure awesomesauce. Really. It doesn't get much better.
        KerbinSrfLandedSPHRoundTank* = #CSS_atmosphereAnalysis_KerbinSrfLandedSPHRoundTank_00 // The sensor notes the slight venturi effect of the wind whipping around the SPH tank.
        KerbinSrfLandedSPHTanks* = #CSS_atmosphereAnalysis_KerbinSrfLandedSPHTanks_00 // The sensor cannot determine the wind direction with all the tanks around.
        KerbinSrfLandedSPHWaterTower* = #CSS_atmosphereAnalysis_KerbinSrfLandedSPHWaterTower_00 // The sensor reads less wind at the bottom of the tower than at the top.
        KerbinSrfLandedTrackingStation* = #CSS_atmosphereAnalysis_KerbinSrfLandedTrackingStation_00 // The staff at the tracking station shoo you off as you try to take atmospheric readings, saying that your sensor is interfering with operations.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_atmosphereAnalysis_KerbinSrfLandedTrackingStationDishEast_00 // You quickly take you readings, hoping that your tests don't interfere with the sensitive electronics here.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_atmosphereAnalysis_KerbinSrfLandedTrackingStationDishNorth_00 // You brazenly take your atmospheric readings, not caring less whether or not you are interfering with tracking operations.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_atmosphereAnalysis_KerbinSrfLandedTrackingStationDishSouth_00 // Quick, run! The tracking operators are running toward you with pitchforks for interfering with operations.
        KerbinSrfLandedTrackingStationHub* = #CSS_atmosphereAnalysis_KerbinSrfLandedTrackingStationHub_00 // You lock the door of the tracking station from the outside, knowing that the operators inside will be furious when your atmospheric test equipment interferes with tracking operations.
        KerbinSrfLandedVAB* = #CSS_atmosphereAnalysis_KerbinSrfLandedVAB_00 // The atmosphere here is abuzz with activity day and night.
        KerbinSrfLandedVABMainBuilding* = #CSS_atmosphereAnalysis_KerbinSrfLandedVABMainBuilding_00 // The atmosphere here is always cool.
        KerbinSrfLandedVABPodMemorial* = #CSS_atmosphereAnalysis_KerbinSrfLandedVABPodMemorial_00 // The atmosphere here is somber.
        KerbinSrfLandedVABRoundTank* = #CSS_atmosphereAnalysis_KerbinSrfLandedVABRoundTank_00 // You find yourself circling around the tank looking for a good place to set up your equipment.
        KerbinSrfLandedVABSouthComplex* = #CSS_atmosphereAnalysis_KerbinSrfLandedVABSouthComplex_00 // Metal shavings and offcuts from the VAB's workshops are everywhere in the air here.
        KerbinSrfLandedVABTanks* = #CSS_atmosphereAnalysis_KerbinSrfLandedVABTanks_00 // The tanks block the sensor from any useful analysis.
        KerbinSrfLandedIslandAirfield* = #CSS_atmosphereAnalysis_KerbinSrfLandedIslandAirfield_00 // The analyser gives you a very accurate breakdown of the sea breeze.
        KerbinSrfLandedWoomerang* = #CSS_atmosphereAnalysis_KerbinSrfLandedWoomerang_00 // You're pretty sure the atmosphere is the same over here as over there.
        KerbinFlyingLowKSC* = #CSS_atmosphereAnalysis_KerbinFlyingLowKSC_00 // Atmosphere analysis??? Let's worry about flying this thing first!
        KerbinFlyingHighKSC* = #CSS_atmosphereAnalysis_KerbinFlyingHighKSC_00 // The sensor picks up the distinct signature of rocket flight: traces of unburned hypergolics and hydrocarbons.

        KerbinSrfLandedWater* = #CSS_atmosphereAnalysis_KerbinSrfLandedWater_00 // The air here is very humid. Water keeps splashing into the sensor, creating inaccuracies and sending sparks flying everywhere.
        KerbinSrfLandedWater* = #CSS_atmosphereAnalysis_KerbinSrfLandedWater_01 // The air being more terrestrial or marine depends on the time of day and wind direction.
        KerbinSrfLandedGrasslands* = #CSS_atmosphereAnalysis_KerbinSrfLandedGrasslands_00 // There's lots of gaseous nitrogen and methane here - clear evidence of both greenery and cows to eat it.
        KerbinSrfLandedGrasslands* = #CSS_atmosphereAnalysis_KerbinSrfLandedGrasslands_01 // You decide to do one better and smell the air yourself. Ah, smells like home.
        KerbinSrfLandedHighlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedHighlands_00 // The analysis shows that it is often rainy and foggy here. There's a faint trace of ethanol mixed with oak.
        KerbinSrfLandedHighlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedHighlands_01 // The thick mist of Kerbin's Highlands is of much interest to the scientists back at Mission Control.
        KerbinSrfLandedShores* = #CSS_atmosphereAnalysis_KerbinSrfLandedShores_00 // The air here is very humid, and seems to have a bit of a fishy smell to it.
        KerbinSrfLandedShores* = #CSS_atmosphereAnalysis_KerbinSrfLandedShores_01 // A crab decides to wedge itself firmly inside the atmospheric sensor's housing. You end up having to reset the experiment.
        KerbinSrfLandedMountains* = #CSS_atmosphereAnalysis_KerbinSrfLandedMountains_00 // Not only is it cold up here, but the air is thin as well. The goat one peak over is shivering.
        KerbinSrfLandedMountains* = #CSS_atmosphereAnalysis_KerbinSrfLandedMountains_01 // The sensor tells you that you'll be gasping for breath soon after stepping out of your craft.
        KerbinSrfLandedDeserts* = #CSS_atmosphereAnalysis_KerbinSrfLandedDeserts_00 // It's very hot and dry out in the desert. The sensors are getting clogged up with dust.
        KerbinSrfLandedDeserts* = #CSS_atmosphereAnalysis_KerbinSrfLandedDeserts_01 // This would be a great place to work on your tan.
        KerbinSrfLandedDeserts* = #CSS_atmosphereAnalysis_KerbinSrfLandedDeserts_02 // This can't be right, the sensor is detecting the atmosphere as solid! Oh wait, it's just dust-clogged again.
        KerbinSrfLandedBadlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedBadlands_00 // The sensor complains about a mosquito dive-bombing it. Apparently it's carrying malaria.
        KerbinSrfLandedBadlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedBadlands_01 // It's not so bad here. You wonder what all the fuss was about.
        KerbinSrfLandedBadlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedBadlands_02 // The Gooey puddle you just stepped in appears to be eating through the material of your spacesuit. Better get back to the ship before the atmosphere outside is the same as inside your spacesuit.
        KerbinSrfLandedTundra* = #CSS_atmosphereAnalysis_KerbinSrfLandedTundra_00 // The atmosphere is very cold and very dry.
        KerbinSrfLandedTundra* = #CSS_atmosphereAnalysis_KerbinSrfLandedTundra_01 // The sensors report that the air is cold but otherwise nominal.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedIceCaps_00 // The polar atmosphere is very, very cold indeed. Some of the sensors have frozen shut, but we're reasonably sure this is still air.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedIceCaps_01 // It's a tiny bit nippy here.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedIceCaps_02 // The air is dry and cold here. It's almost like you are standing in a walk-in freezer.
        KerbinSrfLandedNorthernIceShelf* = #CSS_atmosphereAnalysis_KerbinSrfLandedNorthernIceShelf_00 // The air is mostly cold and dry, with a hint of freezing sea breeze.
        KerbinSrfLandedNorthernIceShelf* = #CSS_atmosphereAnalysis_KerbinSrfLandedNorthernIceShelf_01 // An unexpected squall of polar air hits the craft, and fills the analyser with ice crystals.
        KerbinSrfLandedSouthernIceShelf* = #CSS_atmosphereAnalysis_KerbinSrfLandedSouthernIceShelf_02 // No hint of any complex organic molecules. Just air and ice crystals.
        KerbinSrfLandedSouthernIceShelf* = #CSS_atmosphereAnalysis_KerbinSrfLandedSouthernIceShelf_03 // The freezing polar wind whistles past the craft as the sensor scoops it up. You're glad you're not out there.
        KerbinFlyingLowWater* = #CSS_atmosphereAnalysis_KerbinFlyingLowWater_00 // Spray from the water adds water and salt to the atmospheric composition.
        KerbinFlyingLowWater* = #CSS_atmosphereAnalysis_KerbinFlyingLowWater_01 // The humidity of the air seems to decrease with altitude.
        KerbinFlyingLowGrasslands* = #CSS_atmosphereAnalysis_KerbinFlyingLowGrasslands_00 // The atmosphere seems calm and peaceful here. Readings are nominal.
        KerbinFlyingLowGrasslands* = #CSS_atmosphereAnalysis_KerbinFlyingLowGrasslands_01 // Ah so this is what a life-supporting atmosphere is supposed to look like.
        KerbinFlyingLowHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowHighlands_00 // Even at this low altitude the atmosphere seems thin here. Thoughts of a space-sherpa come to mind.
        KerbinFlyingLowHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowHighlands_01 // The atmospheric sensor reports higher-than-average humidity. This is supported by the thick fog and the light sheen of wet grass.
        KerbinFlyingLowShores* = #CSS_atmosphereAnalysis_KerbinFlyingLowShores_00 // A nosy seagull gets its beak stuck in the atmosphere sensor's housing. You have to reset the experiment.
        KerbinFlyingLowShores* = #CSS_atmosphereAnalysis_KerbinFlyingLowShores_01 // Sand gets sucked into your instrument and you are unable to get an accurate reading. Oh well, snack time!
        KerbinFlyingLowMountains* = #CSS_atmosphereAnalysis_KerbinFlyingLowMountains_00 // The atmospheric analysis reads "refreshing" in the cool mountain air. You couldn't agree more.
        KerbinFlyingLowMountains* = #CSS_atmosphereAnalysis_KerbinFlyingLowMountains_01 // Strong mountain winds buffet your craft. The atmospheric sensor is beside itself with joy.
        KerbinFlyingLowDeserts* = #CSS_atmosphereAnalysis_KerbinFlyingLowDeserts_00 // You find that the air is much drier over the desert.
        KerbinFlyingLowDeserts* = #CSS_atmosphereAnalysis_KerbinFlyingLowDeserts_01 // Very little signs of precipitation. No wonder the place looks so thirsty.
        KerbinFlyingLowBadlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowBadlands_00 // The sensor records a sulfurous rotten egg smell in the atmosphere. So this is why they call it the Badlands.
        KerbinFlyingLowBadlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowBadlands_01 // Atmospheric analysis of the surrounding air makes you very glad that you brought your spacesuit.
        KerbinFlyingLowTundra* = #CSS_atmosphereAnalysis_KerbinFlyingLowTundra_00 // You try to avoid snowdrifts in order to give the atmosphere sensor a better reading.
        KerbinFlyingLowTundra* = #CSS_atmosphereAnalysis_KerbinFlyingLowTundra_01 // The atmosphere analysis sensor gets clogged up with all the dust flying around. You report this back to KSC.
        KerbinFlyingLowIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingLowIceCaps_00 // The cold air has caused some of the instruments to stop functioning. You send the results you can back to KSC and settle down with a mug of hot cocoa and some snacks.
        KerbinFlyingLowIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingLowIceCaps_01 // You feel sorry for the atmospheric sensor, exposed as it is to the subzero temperatures of Kerbin's polar regions.
        KerbinFlyingLowNorthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingLowNorthernIceShelf_00 // There are strong traces of windblown snow kicked up by the powerful winds that blow over the icy flats.
        KerbinFlyingLowNorthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingLowNorthernIceShelf_01 // At least in the absence of hills you don't have to pay attention to very much while the gadget does its thing.
        KerbinFlyingLowSouthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingLowSouthernIceShelf_00 // Water content of the air is low, despite the large amounts of frozen water not far below.
        KerbinFlyingLowSouthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingLowSouthernIceShelf_01 // You wonder how cold it would need to be for you to hold a pot out the window and scoop the air up like a solid.
        KerbinFlyingHighWater* = #CSS_atmosphereAnalysis_KerbinFlyingHighWater_00 // No salt and spray up here. Just the normal atmosphere-y....gassy....stuff.
        KerbinFlyingHighWater* = #CSS_atmosphereAnalysis_KerbinFlyingHighWater_01 // Upon examining the sensor's readouts from up high, you firmly decide against cracking open a window.
        KerbinFlyingHighGrasslands* = #CSS_atmosphereAnalysis_KerbinFlyingHighGrasslands_00 // As you read the atmospheric analysis report you glance down at the surface below. The gentle undulating motion of the breeze through the grass makes you feel sleepy.
        KerbinFlyingHighGrasslands* = #CSS_atmosphereAnalysis_KerbinFlyingHighGrasslands_01 // You let the atmospheric sensor do its thing. You don't anticipate any earth-shaking discoveries.
        KerbinFlyingHighHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighHighlands_00 // Pfft, Highlands yeah right. Whoever named this place must have pretty low standards.
        KerbinFlyingHighHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighHighlands_01 // The atmosphere here seems squeezed between the high altitude of the mountains below, and the invisible barrier of space above. You are somewhere between a rock and no-place.
        KerbinFlyingHighShores* = #CSS_atmosphereAnalysis_KerbinFlyingHighShores_00 // Atmospheric analysis reports humidity and trace amounts of salt in the air.
        KerbinFlyingHighShores* = #CSS_atmosphereAnalysis_KerbinFlyingHighShores_01 // The scanner registers a faint trace of seaweed and crabs, even way up here.
        KerbinFlyingHighMountains* = #CSS_atmosphereAnalysis_KerbinFlyingHighMountains_00 // The air here seems crisp and refreshing. Now time for a refreshing snack!
        KerbinFlyingHighMountains* = #CSS_atmosphereAnalysis_KerbinFlyingHighMountains_01 // The air gets progressively thinner as your craft climbs higher. You're happy you didn't have to do this experiment on your own two feet.
        KerbinFlyingHighDeserts* = #CSS_atmosphereAnalysis_KerbinFlyingHighDeserts_00 // The sensor reads 0 humidity. In fact it looks like the needle is bent as the gauge tries to register negative numbers.
        KerbinFlyingHighDeserts* = #CSS_atmosphereAnalysis_KerbinFlyingHighDeserts_01 // The humidity readings make you want to take off your spacesuit and lather yourself in lotion.
        KerbinFlyingHighBadlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighBadlands_00 // Analysis of the Badlands' atmosphere makes it difficult to believe that you're still on Kerbin.
        KerbinFlyingHighBadlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighBadlands_01 // Glancing nervously at the sensor's readouts, you sincerely hope that Mission Control doesn't tell you to go lower.
        KerbinFlyingHighBadlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighBadlands_02 // Ozone, check. Carbon Monoxide, check. Hydro-fluorocarbons, check. Yep, we're in the Badlands.
        KerbinFlyingHighTundra* = #CSS_atmosphereAnalysis_KerbinFlyingHighTundra_00 // The atmosphere here seems unforgiving. Kind of like you are about eating all of Bill's snacks.
        KerbinFlyingHighTundra* = #CSS_atmosphereAnalysis_KerbinFlyingHighTundra_01 // The data from the atmospheric analysis makes you happy that you're wearing layers under your spacesuit.
        KerbinFlyingHighIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingHighIceCaps_00 // Even this far away the Ice Caps seem to be sucking the heat and moisture from the atmosphere around you. We're not going to land down there, are we?
        KerbinFlyingHighIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingHighIceCaps_01 // Atmospheric analysis is complete. Can we go home now? It's cold.
        KerbinFlyingHighNorthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingHighNorthernIceShelf_00 // The ice has petered out by now, but there's still enough moisture in the air to glaze the sensor in ice.
        KerbinFlyingHighNorthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingHighNorthernIceShelf_01 // The gas mix high above the ice plains seems much the same as over the equator.
        KerbinFlyingHighSouthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingHighSouthernIceShelf_00 // Legends of wispy, shimmering clouds have been drifting around the polar kerbal communities for millennia. Turns out they are real, and made of ice crystals.
        KerbinFlyingHighSouthernIceShelf* = #CSS_atmosphereAnalysis_KerbinFlyingHighSouthernIceShelf_01 // The high-altitude polar vortex brings cold, dry, thin air from other parts of the poles, mixing their individual gas signatures.

        DunaSrfLanded* = #CSS_atmosphereAnalysis_DunaSrfLanded_00 // Lots of carbon dioxide... and not much else. Extremophile plants could potentially live here.
        DunaSrfLanded* = #CSS_atmosphereAnalysis_DunaSrfLanded_01 // 255. Definitely 255.
        DunaSrfLandedPoles* = #CSS_atmosphereAnalysis_DunaSrfLandedPoles_00 // The water ice crystals here contain levels of deuterium several times higher than on Kerbin.
        DunaSrfLandedMidlands* = #CSS_atmosphereAnalysis_DunaSrfLandedMidlands_00 // You notice the Atmosphere Analyzer says the warranty is void, but you still think using it was a good idea.
        DunaSrfLandedMidlands* = #CSS_atmosphereAnalysis_DunaSrfLandedMidlands_01 // After getting some strange readings, you open up the analysis chamber to check the instruments. A large amount of dust pours out onto the ground.
        DunaSrfLandedLowlands* = #CSS_atmosphereAnalysis_DunaSrfLandedLowlands_02 // The surface pressure seems to vary wildly as the levels of carbon dioxide and water vapour change with the seasons.
        DunaSrfLandedLowlands* = #CSS_atmosphereAnalysis_DunaSrfLandedLowlands_03 // The dust here is fine enough that the sensor doesn't get clogged for once! Rejoice!
        DunaSrfLandedCraters* = #CSS_atmosphereAnalysis_DunaSrfLandedCraters_00 // Mission Control says there's air here, but you can't breathe it. You wonder why Duna would even bother having one in that case. It's probably making fun of you or something.
        DunaSrfLandedCraters* = #CSS_atmosphereAnalysis_DunaSrfLandedCraters_01 // The natural bowl in the landscape means the sensor reads higher than average dust concentrations.
        DunaSrfLandedHighlands* = #CSS_atmosphereAnalysis_DunaSrfLandedHighlands_00 // You fear the dust will never quite come out.
        DunaSrfLandedHighlands* = #CSS_atmosphereAnalysis_DunaSrfLandedHighlands_01 // The more rarefied air up here displays marginally greater concentrations of argon and nitrogen over the denser carbon dioxide.
        DunaSrfLandedMidlandSea* = #CSS_atmosphereAnalysis_DunaSrfLandedMidlandSea_00 // The sensor beeps, clicks and whirrs as it works. You wish you had a protocol droid handy so you could tell what it was saying to itself.
        DunaSrfLandedMidlandSea* = #CSS_atmosphereAnalysis_DunaSrfLandedMidlandSea_01 // You put a small crystal from the subsurface ice into the analyser to see what would happen. It melts, and after more heating the analyser reports its vapour contains much more deuterium than Kerbin's.
        DunaSrfLandedNorthernBasin* = #CSS_atmosphereAnalysis_DunaSrfLandedNorthernBasin_00 // The dust is quite coarse here, and the gas mixtures are fairly Duna-standard.
        DunaSrfLandedSouthernBasin* = #CSS_atmosphereAnalysis_DunaSrfLandedSouthernBasin_01 // Here the dust of the lowlands mixes with ice crystals blowing off the ice caps, creating reddish snow.
        DunaSrfLandedNorthernShelf* = #CSS_atmosphereAnalysis_DunaSrfLandedNorthernShelf_00 // The winds blowing down the canyon from the north carry with them the faintest traces of ice crystals.
        DunaSrfLandedNorthernShelf* = #CSS_atmosphereAnalysis_DunaSrfLandedNorthernShelf_01 // The detector finds a tiny wisp of krypton-then it's gone. Superkerbal better stay away.
        DunaSrfLandedMidlandCanyon* = #CSS_atmosphereAnalysis_DunaSrfLandedMidlandCanyon_00 // The fine dust here means the analyser actually records the atmospheric composition for once without being filled with sand...let's see...lots of CO2, some Ar and N2...and not much else.
        DunaSrfLandedEasternCanyon* = #CSS_atmosphereAnalysis_DunaSrfLandedEasternCanyon_01 // There seems to be LOT more dust down here in the thicker canyon air, which acts as a dust sink for the surrounding hills.
        DunaFlyingHighWesternCanyon* = #CSS_atmosphereAnalysis_DunaFlyingHighWesternCanyon_00 // The computer asks you rather crossly why you're making it analyse a vacuum. Seems the air really is thin up here.
        DunaSrfLandedPolarHighlands* = #CSS_atmosphereAnalysis_DunaSrfLandedPolarHighlands_01 // The sensor registers the large amount of windblown ice crystals and lower dust count.
        DunaSrfLandedPolarCraters* = #CSS_atmosphereAnalysis_DunaSrfLandedPolarCraters_00 // Lots of airborne ices-analysis reports they consist of varying ratios of hydroxic acid and carbonic anhydride. Sounds scary.
        DunaFlyingLow* = #CSS_atmosphereAnalysis_DunaFlyingLow_00 // The atmosphere appears to be significantly less dense than that of Kerbin.
        DunaFlyingLowPoles* = #CSS_atmosphereAnalysis_DunaFlyingLowPoles_00 // Gas geysers firing below fill the atmosphere with dust and ice.
        DunaFlyingLowMidlands* = #CSS_atmosphereAnalysis_DunaFlyingLowMidlands_00 // The analyser develops a caking of dust, so you jolt the craft from side to side to shake it off.
        DunaFlyingLowMidlands* = #CSS_atmosphereAnalysis_DunaFlyingLowMidlands_01 // This air is thin at best. The fine grains of dust that get caught in the intake don't help the scanner.
        DunaFlyingLowLowlands* = #CSS_atmosphereAnalysis_DunaFlyingLowLowlands_00 // The air is so thin there's hardly any wind. You contemplate how well paper airplanes would work, absent-mindedly folding your mission papers into... *ahem*.
        DunaFlyingLowLowlands* = #CSS_atmosphereAnalysis_DunaFlyingLowLowlands_01 // You could get used to this, flying serenely through air-that's-not-really-there while scanning it with a gizmo.
        DunaFlyingLowCraters* = #CSS_atmosphereAnalysis_DunaFlyingLowCraters_00 // It's very hard to take readings, as every few minutes you have to clear iron oxide dust from the sensors.
        DunaFlyingLowCraters* = #CSS_atmosphereAnalysis_DunaFlyingLowCraters_01 // You get distracted by staring at the crater and miss the readings, so you just note down '100% dust'.
        DunaFlyingLowHighlands* = #CSS_atmosphereAnalysis_DunaFlyingLowHighlands_00 // Despite the dust storms, there's not much wind. The scanner indicates that the dust is incredibly small and easy to blow around.
        DunaFlyingLowHighlands* = #CSS_atmosphereAnalysis_DunaFlyingLowHighlands_01 // Not much air up here to carry the dust, but air currents from orographic lift carry the finest of particles over the summits.
        DunaFlyingLowMidlandSea* = #CSS_atmosphereAnalysis_DunaFlyingLowMidlandSea_00 // The inlet valve for the air has frozen shut yet again, reminding you that it's still freezing outside.
        DunaFlyingLowMidlandSea* = #CSS_atmosphereAnalysis_DunaFlyingLowMidlandSea_01 // CO2, Ar, N2 and...Fe2O3? You're pretty sure that last one isn't a gas.
        DunaFlyingLowNorthernBasin* = #CSS_atmosphereAnalysis_DunaFlyingLowNorthernBasin_00 // The dust seems to stay low to the ground here, as there's not much off it off the ground.
        DunaFlyingLowSouthernBasin* = #CSS_atmosphereAnalysis_DunaFlyingLowSouthernBasin_00 // The ice crystals appear to stay closer to the ground, up in the air it's mostly dust. And CO2. And N2. And Ar.
        DunaFlyingLowNorthernShelf* = #CSS_atmosphereAnalysis_DunaFlyingLowNorthernShelf_00 // The analyser bleeps loudly over the noise of the wind, signifying the completion of its analysis.
        DunaFlyingLowNorthernShelf* = #CSS_atmosphereAnalysis_DunaFlyingLowNorthernShelf_01 // The air here looks normal, if a little thicker thanks to the low altitude. And it's still really dusty.
        DunaFlyingLowMidlandCanyon* = #CSS_atmosphereAnalysis_DunaFlyingLowMidlandCanyon_00 // Faint traces of ice crystals are detected, perhaps being carried into the canyon by the Northern Shelf winds?
        DunaFlyingLowEasternCanyon* = #CSS_atmosphereAnalysis_DunaFlyingLowEasternCanyon_00 // Wow, that's a lot of dust down below. So much, it's still detectable in the air above.
        DunaFlyingLowWesternCanyon* = #CSS_atmosphereAnalysis_DunaFlyingLowWesternCanyon_00 // No significant traces of water vapour up here. Or on the ground. Or anywhere else on Duna, for that matter.
        DunaFlyingLowPolarHighlands* = #CSS_atmosphereAnalysis_DunaFlyingLowPolarHighlands_00 // Much of the atmosphere is particles that've blown off the surface. That, or we forgot to clean the sensor before departure.
        DunaFlyingLowPolarCraters* = #CSS_atmosphereAnalysis_DunaFlyingLowPolarCraters_00 // The wind picks up, and a cloud of water and carbon dioxide ice crystals fills the air.
        DunaFlyingHigh* = #CSS_atmosphereAnalysis_DunaFlyingHigh_00 // Carbon dioxide, with appreciable amounts of argon and nitrogen and traces of oxygen and carbon monoxide are detected through spectroscopic analysis of the local atmosphere.
        DunaFlyingHighPoles* = #CSS_atmosphereAnalysis_DunaFlyingHighPoles_00 // A sharp spike in airborne ice crystals is detected as you fly through one of Duna's wispy polar clouds.
        DunaFlyingHighMidlands* = #CSS_atmosphereAnalysis_DunaFlyingHighMidlands_00 // The concentrations of argon, nitrogen and other trace gases are significantly higher than the surface up here.
        DunaFlyingHighMidlands* = #CSS_atmosphereAnalysis_DunaFlyingHighMidlands_01 // The relative absence of dust up here allows for largely uninterrupted atmospheric sampling.
        DunaFlyingHighLowlands* = #CSS_atmosphereAnalysis_DunaFlyingHighLowlands_00 // The atmosphere here is largely devoid of the fine dust from the lower regions, but radiation levels are also almost certainly higher.
        DunaFlyingHighLowlands* = #CSS_atmosphereAnalysis_DunaFlyingHighLowlands_01 // Still CO2. Come to think of it, we're actually at the same altitude as everywhere else, just further off the ground. You think.
        DunaFlyingHighCraters* = #CSS_atmosphereAnalysis_DunaFlyingHighCraters_00 // Looks pretty normal from up here. Ground topography doesn't seem to affect the upper atmosphere much.
        DunaFlyingHighCraters* = #CSS_atmosphereAnalysis_DunaFlyingHighCraters_01 // Although thin, Duna's atmosphere can be more than thick enough to aerobrake in.
        DunaFlyingHighHighlands* = #CSS_atmosphereAnalysis_DunaFlyingHighHighlands_00 // Lots of carbon dioxide. The high compressibility and low density might make atmospheric entry heat less intense for landers.
        DunaFlyingHighHighlands* = #CSS_atmosphereAnalysis_DunaFlyingHighHighlands_01 // Higher even than the mountaintops, extremely faint and wispy strips of cloud flow behind the mountain. Flying through them shows they are made of ice.
        DunaFlyingHighMidlandSea* = #CSS_atmosphereAnalysis_DunaFlyingHighMidlandSea_00 // Duna's rarefied atmospheric gas mixture at these altitudes is starting to separate, and concentrations of gases fluctuate with altitude.
        DunaFlyingHighMidlandSea* = #CSS_atmosphereAnalysis_DunaFlyingHighMidlandSea_01 // Concentrations of water vapour up here are slightly higher than the rest of the planet, but it's a small enough difference to be a blip.
        DunaFlyingHighNorthernBasin* = #CSS_atmosphereAnalysis_DunaFlyingHighNorthernBasin_00 // You have to crank the sensitivity on the detector all the way up to get any readings in the extra-thin air.
        DunaFlyingHighSouthernBasin* = #CSS_atmosphereAnalysis_DunaFlyingHighSouthernBasin_00 // Climate cells and northerly air currents ensure no ice is detected up here.
        DunaFlyingHighNorthernShelf* = #CSS_atmosphereAnalysis_DunaFlyingHighNorthernShelf_00 // The Northern Shelf and its influence on the atmosphere is far below you.
        DunaFlyingHighNorthernShelf* = #CSS_atmosphereAnalysis_DunaFlyingHighNorthernShelf_01 // A dust particle that gets caught in the sensor turns out to be from the Northern Basin-is this evidence of global air currents?
        DunaFlyingHighMidlandCanyon* = #CSS_atmosphereAnalysis_DunaFlyingHighMidlandCanyon_00 // Now, the one time dust isn't an issue, the analyser blows a fuse and stops working anyway. Poxy thing.
        DunaFlyingHighEasternCanyon* = #CSS_atmosphereAnalysis_DunaFlyingHighEasternCanyon_00 // The canyon is so large, it even causes the streams of upper-atmosphere dust and denser gases to sink into it.
        DunaFlyingHighWesternCanyon* = #CSS_atmosphereAnalysis_DunaFlyingHighWesternCanyon_00 // The computer asks you rather crossly why you're making it analyse a vacuum. Seems the air really is thin up here.
        DunaFlyingHighPolarHighlands* = #CSS_atmosphereAnalysis_DunaFlyingHighPolarHighlands_00 // The atmosphere here seems the same as it is anywhere else.
        DunaFlyingHighPolarCraters* = #CSS_atmosphereAnalysis_DunaFlyingHighPolarCraters_00 // The inlet on the analyser develops a layer of frost in the lower regions of the upper atmosphere. Curious, considering it didn't have any water on it.

        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_00 // It's so incredibly dense.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_01 // Engineers scramble to adjust calculations to account for the new, very large crack in the instrument casing.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_02 // The drag and pressure almost shuts down the science machinery. The main report reads: "Pressure Warning: Gain altitude immediately!"
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_03 // The computer running the atmosphere analysis tool crashed. That's probably not good. Upon return, you plan to have a word with the engineers who designed this computer.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_04 // The atmosphere here is made of little but hydrogen and helium.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_05 // "Do you smell that? That smelly smell... it smells... smelly..."
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_06 // The atmosphere seems to be very thick here.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_07 // The atmosphere is getting much denser now. However, it appears to be unusually transparent.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_08 // Don't be silly.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_09 // The chlorine content is extremely high here, explaining how the planet got its distinctive green color.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_10 // The instrument housing is starting to buckle under the immense pressure.
        JoolFlyingLow* = #CSS_atmosphereAnalysis_JoolFlyingLow_11 // The instrument says "No refunds if crashed into a gas giant". Darn.
        JoolFlyingHigh* = #CSS_atmosphereAnalysis_JoolFlyingHigh_00 // The atmosphere seems to consist mostly of hydrogen and chlorine.
        JoolFlyingHigh* = #CSS_atmosphereAnalysis_JoolFlyingHigh_01 // The sensors detect high concentrations of chlorine and helium. You are fascinated, but suspect your findings will cause some headaches for planetary scientists back on Kerbin.
        JoolFlyingHigh* = #CSS_atmosphereAnalysis_JoolFlyingHigh_02 // The atmosphere analysis reveals unexpectedly high concentrations of molecular chlorine. You try not to think about what this corrosive gas might be doing to the spacecraft.
        JoolFlyingHigh* = #CSS_atmosphereAnalysis_JoolFlyingHigh_03 // Microscopic diamonds, tossed up from liquid carbon far below, are detected in the scanner.
        JoolFlyingHigh* = #CSS_atmosphereAnalysis_JoolFlyingHigh_04 // The Joolian clouds contain the expected hydrogen and helium, with substantial amounts of chlorine present.
        JoolFlyingHigh* = #CSS_atmosphereAnalysis_JoolFlyingHigh_05 // The atmosphere consists mostly of hydrogen and helium-3 with traces of chlorine. Don't breathe it!

        LaytheSrfLanded* = #CSS_atmosphereAnalysis_LaytheSrfLanded_00 // The cold temperatures and thin atmosphere appear to have balanced each other out. A layer of high humidity hangs just over the water.
        LaytheSrfLandedPoles* = #CSS_atmosphereAnalysis_LaytheSrfLandedPoles_00 // There's definitely some oxygen in the atmosphere, but not much. Hypoxia would set in after only a few minutes without a respirator.
        LaytheSrfLandedShores* = #CSS_atmosphereAnalysis_LaytheSrfLandedShores_00 // You are amazed by how similar the readings are to Kerbin.
        LaytheSrfLandedDunes* = #CSS_atmosphereAnalysis_LaytheSrfLandedDunes_00 // The air is thinner here than on the mountain peaks!
        LaytheFlyingLow* = #CSS_atmosphereAnalysis_LaytheFlyingLow_00 // According to these readings, the air here is not, in fact, breathable. You feel satisfied knowing that you won your bet with the science department.
        LaytheFlyingLowPoles* = #CSS_atmosphereAnalysis_LaytheFlyingLowPoles_00 // Black smoke, currants, cappuccino, and a hint of buttery beef.
        LaytheFlyingLowShores* = #CSS_atmosphereAnalysis_LaytheFlyingLowShores_00 // There's Oxygen, Nitrogen, Hydrogen, and lots of water. You scribble down a note: "Invest in colonization program."
        LaytheFlyingLowDunes* = #CSS_atmosphereAnalysis_LaytheFlyingLowDunes_00 // The atmosphere appears to be made up of oxygen and nitrogen. You wonder at the high chlorine content, though.
        LaytheFlyingHigh* = #CSS_atmosphereAnalysis_LaytheFlyingHigh_00 // The air has breathable elements, but they're very cold and very thin.
        LaytheFlyingHighPoles* = #CSS_atmosphereAnalysis_LaytheFlyingHighPoles_00 // The instruments detect hydrogen escaping into space. It would seem that the source of oxygen on Laythe is photo-dissociation of its water, and not photosynthesis.
        LaytheFlyingHighShores* = #CSS_atmosphereAnalysis_LaytheFlyingHighShores_00 // The preliminary readings show an atmosphere nearly identical to Kerbin.
        LaytheFlyingHighDunes* = #CSS_atmosphereAnalysis_LaytheFlyingHighDunes_00 // The atmosphere reminds you of Kerbin; although, you wonder where all the nitrogen came from.
    }
}