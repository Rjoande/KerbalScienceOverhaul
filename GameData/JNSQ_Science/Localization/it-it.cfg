        #JNSQscience_bd_soilScoop_PraxSrfLandedHighlands_00 = La benna riporta graniglia grossolana con puntini chiari sparsi dentro. I puntini fanno sembrare tutto il campione più importante di quanto dovrebbe.
        #JNSQscience_bd_soilScoop_PraxSrfLandedMountains_00 = La benna vibra su crosta dura e torna con schegge affilate e briciole ostinate. Le quote alte di Prax ti offrono esattamente un cucchiaio di fatica.
        #JNSQscience_bd_soilScoop_PraxSrfLandedPoles_00 = La benna raccoglie granelli chiari e freddi che si compattano in ordinati pellet. Il campione è ordinato in un modo in cui il suolo non dovrebbe esserlo.

        // bd_solarWind
        #JNSQscience_bd_solarWind_EdnaInSpaceLow_00 = Il vento solare rimbalza sulla superficie scura di Edna e torna indietro portando una tenue firma di polvere.
        #JNSQscience_bd_solarWind_EdnaInSpaceLow_01 = Ogni volta che Edna occulta Kerbol, il contatore di particelle scende quasi a zero, poi risale di colpo come se avesse trattenuto il fiato.
        #JNSQscience_bd_solarWind_EdnaInSpaceHigh_00 = Quassù il vento è sottile e costante: Edna ci resta in mezzo, raccogliendo una lenta pioggia di ioni.
        #JNSQscience_bd_solarWind_EdnaInSpaceHigh_01 = La direzione del flusso oscilla in lunghi cicli pigri... tutto il tempo per discutere se sia "vento" o "vuoto davvero molto veloce".
        #JNSQscience_bd_solarWind_DakInSpaceLow_00 = La piccola patata si carica in fretta: compaiono picchi netti ogni volta che la polvere illuminata dal sole viene smossa.
        #JNSQscience_bd_solarWind_DakInSpaceLow_01 = Nei dati compare un tenue "fischio" periodico. Il Controllo Missione insiste che sia solo l'umore dello strumento.
        #JNSQscience_bd_solarWind_DakInSpaceHigh_00 = Dak a malapena incide il flusso: il vento solare scorre via come se si fosse dimenticato del tutto di notare la luna.
        #JNSQscience_bd_solarWind_DakInSpaceHigh_01 = Calo occasionali coincidono con l'orbita di Dak attorno a Edna, suggerendo che a volte si nasconda nella scia del corpo più grande.
        #JNSQscience_bd_solarWind_JoolInSpaceLow_00 = Il contatore di particelle continua a "trovare" il vento solare, poi a perderlo di nuovo nel caos magnetico ribollente di Jool.
        #JNSQscience_bd_solarWind_LindorInSpaceLow_00 = Il vento solare si schianta contro la barriera magnetica di Lindor e investe il rivelatore con particelle turbolente e deviate.
        #JNSQscience_bd_solarWind_LindorInSpaceLow_01 = Le particelle cariche vengono incanalate in traiettorie ad anello: il tracciato sembra che il vento venga intrecciato.
        #JNSQscience_bd_solarWind_LindorInSpaceHigh_00 = Molto lontano il vento è debole ma costante, finché l'onda d'urto distante di Lindor rende il flusso improvvisamente grumoso.
        #JNSQscience_bd_solarWind_LindorInSpaceHigh_01 = Il flusso si piega attorno a Lindor ben prima di avvicinarti, come se il pianeta spingesse gentilmente lo spazio stesso.
        #JNSQscience_bd_solarWind_KrelInSpaceLow_00 = Qui sotto, quasi tutto ciò che misuri è la magnetosfera di Lindor che si agita, con un po' di vento solare mescolato giusto per dare sapore.
        #JNSQscience_bd_solarWind_KrelInSpaceLow_01 = La superficie di Krel si carica in fretta: le letture saltano ogni volta che la luce solare colpisce polvere fresca.
        #JNSQscience_bd_solarWind_KrelInSpaceHigh_00 = Il flusso è sottile e costante a questa distanza, come se Kerbol sussurrasse dall'altra parte del sistema.
        #JNSQscience_bd_solarWind_KrelInSpaceHigh_01 = Nel flusso dietro Krel si trascina una lunga scia asimmetrica.
        #JNSQscience_bd_solarWind_AdenInSpaceLow_00 = La gravità minuscola di Aden non trattiene quasi nulla, ma il vento solare riesce comunque a sabbiarlo con garbo.
        #JNSQscience_bd_solarWind_AdenInSpaceLow_01 = Il rivelatore registra picchi netti quando passa la linea d'ombra di Lindor. Calma improvvisa, poi una botta di particelle cariche.
        #JNSQscience_bd_solarWind_AdenInSpaceHigh_00 = Quassù vedi soprattutto un flusso debole e pulito, interrotto da occasionali scariche provenienti dall'ambiente di plasma di Lindor.
        #JNSQscience_bd_solarWind_AdenInSpaceHigh_01 = La direzione del vento oscilla lentamente, come se stesse cercando di ricordare dov'è Kerbol.
        #JNSQscience_bd_solarWind_HuygenInSpaceLow_00 = La foschia alta di Huygen si accende elettricamente: il vento solare lascia una firma chiara del tipo "qui inizia l'atmosfera".
        #JNSQscience_bd_solarWind_HuygenInSpaceLow_01 = Intercetti ioni di raccolta che si staccano dalla cima dell'atmosfera e si uniscono al flusso come palloncini in fuga.
        #JNSQscience_bd_solarWind_HuygenInSpaceHigh_00 = Nei dati compare un'onda d'urto ampia e gentile: vento solare incontra aria densa, aria densa si irrita.
        #JNSQscience_bd_solarWind_HuygenInSpaceHigh_01 = Il flusso diventa grumoso e turbolento vicino a Huygen, come se la luna stesse mescolando il vento con un cucchiaio invisibile.
        #JNSQscience_bd_solarWind_RigaInSpaceLow_00 = Il quasi vuoto di Riga non offre alcun cuscino: il vento solare colpisce forte e il sensore vede il rimbalzo come particelle sputterizzate.
        #JNSQscience_bd_solarWind_RigaInSpaceLow_01 = Le letture calano di colpo nella scia di Riga, poi recuperano con un'impennata irregolare mentre il flusso si ricollega.
        #JNSQscience_bd_solarWind_RigaInSpaceHigh_00 = Una tenue firma di foglio di plasma va e viene. La magnetocoda di Lindor fa sembrare questo "vento solare" un lavoro di gruppo.
        #JNSQscience_bd_solarWind_RigaInSpaceHigh_01 = Lo spettro energetico delle particelle cambia in cicli lenti, in linea con il passaggio di Riga attraverso diverse parti dell'ambiente magnetico di Lindor.
        #JNSQscience_bd_solarWind_TalosInSpaceLow_00 = Talos alterna flusso calmo e improvvisi scossoni: la sua orbita inclinata continua a entrare e uscire dai residui magnetici di Lindor.
        #JNSQscience_bd_solarWind_TalosInSpaceLow_01 = Il rivelatore vede un flusso pulito, poi uno disordinato, come se il vento solare non sapesse decidere se Talos conti come "in mezzo".
        #JNSQscience_bd_solarWind_TalosInSpaceHigh_00 = Più in alto, il vento è più debole ma più stabile.
        #JNSQscience_bd_solarWind_TalosInSpaceHigh_01 = Una scia sottile e allungata segue Talos, puntando come una freccia che si rifiuta di essere d'accordo con il navball.
        #JNSQscience_bd_solarWind_CelesInSpaceLow_00 = Senza alcuna schermatura, Celes prende il vento solare direttamente sulla superficie: il sensore intercetta uno spruzzo di particelle sputterizzate.
        #JNSQscience_bd_solarWind_CelesInSpaceLow_01 = Il terreno illuminato dal sole si carica e le letture saltano in raffiche nette e polverose ogni volta che attraversi il terminatore.
        #JNSQscience_bd_solarWind_CelesInSpaceHigh_00 = Quassù il vento è più pulito: cali occasionali suggeriscono la scia di Eeloo che oscilla nel flusso.
        #JNSQscience_bd_solarWind_CelesInSpaceHigh_01 = Registri una lenta pioggia di ioni e ti chiedi quanto tempo serva per "sabbiarsi" il ghiaccio con qualcosa che non si vede.
        #JNSQscience_bd_solarWind_TamInSpaceLow_00 = Le macerie sciolte di Tam crepitano di statico: il rivelatore registra piccoli picchi mentre i granelli di polvere si caricano e si sollevano.
        #JNSQscience_bd_solarWind_TamInSpaceLow_01 = Il vento solare si impianta nella superficie, lasciando una firma che si legge come "lo spazio è qui da un po'".
        #JNSQscience_bd_solarWind_TamInSpaceHigh_00 = Il vento è sottile e quieto, interrotto da brevi zone di flusso disturbato provenienti dai dintorni di Eeloo.
        #JNSQscience_bd_solarWind_TamInSpaceHigh_01 = Direzione ed energia oscillano in onde pigre: meteo spaziale, ma con una luna lontana e ghiacciata che detta le regole.
        #JNSQscience_bd_solarWind_HamekInSpaceLow_00 = Il vento solare punteggia la superficie di Hamek e solleva una tenue nube di ioni, come se il suolo stesse sprigionando scintille.
        #JNSQscience_bd_solarWind_HamekInSpaceLow_01 = Il sensore riporta un impianto costante nei granelli più superficiali, lo spazio che "insaporisce" lentamente la regolite.
        #JNSQscience_bd_solarWind_HamekInSpaceHigh_00 = Il flusso è debole a questa distanza, ma inarrestabile: il rivelatore conta le particelle come passi lenti e pazienti.
        #JNSQscience_bd_solarWind_HamekInSpaceHigh_01 = Lunghi tratti di calma vengono interrotti da brevi folate, quanto basta per ricordarti che Kerbol arriva ancora fin qui.
        #JNSQscience_bd_solarWind_NaraInSpaceLow_00 = Il vento solare si accumula davanti a Nara come un'onda di prua luminosa: le letture diventano ruvide e nervose in fretta.
        #JNSQscience_bd_solarWind_NaraInSpaceLow_01 = Le particelle cariche sfiorano la cima dell'aria densa di Nara e vengono scagliate di lato, lasciando nei dati una netta linea del tipo "vietato entrare".
        #JNSQscience_bd_solarWind_NaraInSpaceHigh_00 = Molto sopra Nara, il vento è debole ma si piega comunque in anticipo: qualcosa di grande e invisibile sta respingendo.
        #JNSQscience_bd_solarWind_NaraInSpaceHigh_01 = Il rivelatore registra un'ampia increspatura lenta che assomiglia sospettosamente al respiro della magnetosfera di Nara.
        #JNSQscience_bd_solarWind_AmosInSpaceLow_00 = Amos non ha alcuna schermatura: il vento solare colpisce la superficie e una sottile spruzzata di ioni risponde.
        #JNSQscience_bd_solarWind_AmosInSpaceLow_01 = Il flusso cala di colpo mentre Amos scivola nella scia di Nara, poi torna di scatto quando rientra nel flusso libero.
        #JNSQscience_bd_solarWind_AmosInSpaceHigh_00 = Quassù il flusso è pulito e costante, con occasionali tratti ruvidi provenienti dalla magnetocoda distante di Nara.
        #JNSQscience_bd_solarWind_AmosInSpaceHigh_01 = La direzione del vento oscilla quel tanto che basta per far ricominciare le discussioni sul navball.
        #JNSQscience_bd_solarWind_EnonInSpaceLow_00 = Il vento solare sputterizza materiale dalla superficie fredda di Enon: il sensore intercetta una tenue firma di "graniglia ghiacciata".
        #JNSQscience_bd_solarWind_EnonInSpaceLow_01 = Il terreno illuminato dal sole si carica e lo strumento segnala picchi netti, come se la luna crepitasse sotto un maglione di lana.
        #JNSQscience_bd_solarWind_EnonInSpaceHigh_00 = Un flusso sottile e veloce scivola oltre Enon con poco preavviso: i conteggi sembrano arrivare da molto lontano.
        #JNSQscience_bd_solarWind_EnonInSpaceHigh_01 = Una breve turbolenza suggerisce l'influenza di Nara anche quassù: meteo spaziale, per gentile concessione del pianeta madre.
        #JNSQscience_bd_solarWind_PraxInSpaceLow_00 = Il vento solare si comporta finché Prax non entra nella regione disturbata di Nara, dove i numeri diventano un caos rumoroso.
        #JNSQscience_bd_solarWind_PraxInSpaceLow_01 = Registri raffiche di particelle che sembrano polvere che si carica e si solleva, poi si assesta mentre passa la linea d'ombra.
        #JNSQscience_bd_solarWind_PraxInSpaceHigh_00 = Il flusso è debole ma inarrestabile: il rivelatore ticchetta come un metronomo impostato su "sistema esterno".
        #JNSQscience_bd_solarWind_PraxInSpaceHigh_01 = Una firma di scia allungata segue Prax, come se la luna stesse tracciando una linea nel vento con una matita spuntata.

        // bd_surveillance
        #JNSQscience_bd_surveillance_SunInSpaceLowNorthPolarZone_00 = La zona polare settentrionale appare stranamente attenuata attraverso il bagliore, con chiazze scure che fanno sussurrare agli strumenti "linee di campo aperte".
        #JNSQscience_bd_surveillance_SunInSpaceLowNorthSubpolarZone_00 = Segui brillanti streamers che si arricciano via dal bordo. È bello nello stesso modo in cui è bello un cannello da saldatura.
        #JNSQscience_bd_surveillance_SunInSpaceLowNorthTemperateZone_00 = La texture granulare ribolle nella vista come una mappa vivente: la fotocamera molla per un attimo e dichiara tutto "troppo luminoso".
        #JNSQscience_bd_surveillance_SunInSpaceLowNorthTropicZone_00 = Una catena di regioni attive scorre davanti, sfarfallando e riorganizzandosi più in fretta di quanto il Controllo Missione riesca a etichettarle.
        #JNSQscience_bd_surveillance_SunInSpaceLowEquatorialZone_00 = L'equatore è un caos di celle marezzate e luce ribollente. Ti rendi conto che "sorveglianza" è una parola generosa per "fissare la fornace".
        #JNSQscience_bd_surveillance_SunInSpaceLowSouthTropicZone_00 = Un arco ad anello si alza dal bordo e svanisce: le ottiche lo catturano, lo scudo termico fa finta di niente.
        #JNSQscience_bd_surveillance_SunInSpaceLowSouthTemperateZone_00 = Una larga fascia tenue taglia la luminosità, suggerendo flussi enormi che non vedi, puoi solo dedurre.
        #JNSQscience_bd_surveillance_SunInSpaceLowSouthSubpolarZone_00 = Il bagliore cala quel tanto che basta a rivelare filamenti aggrovigliati. Sembrano avvertimenti scritti nella luce.
        #JNSQscience_bd_surveillance_SunInSpaceLowSouthPolarZone_00 = La zona polare meridionale mostra contrasti netti e improvvisi sfarfallii. I sensori lo registrano fedelmente mentre tu rivaluti ogni scelta di vita.
        #JNSQscience_bd_surveillance_MohoInSpaceLowPoles_00 = I poli brillano netti con il sole basso sull'orizzonte: ogni ombra sembra abbastanza profonda da nascondere una pessima idea.
        #JNSQscience_bd_surveillance_MohoInSpaceLowLowlands_00 = I bassopiani, più scuri, raccolgono detriti fini, come se Moho stesse spazzando i suoi impatti negli stessi angolizi da secoli.
        #JNSQscience_bd_surveillance_MohoInSpaceLowPolarIceCraters_00 = Chiazze luminose restano attaccate ai fondi di crateri che non vedono mai la luce: il sensore le segnala come "ostinatamente persistenti".
        #JNSQscience_bd_surveillance_MohoInSpaceLowHighlands_00 = Le colline frastagliate proiettano ombre da lama: il terreno sembra temprato dal calore fino a diventare affilato.
        #JNSQscience_bd_surveillance_MohoInSpaceLowMidlands_00 = Le pianure mostrano creste stanche e pendii erosi, tutti puntati lontano da Kerbol come se si stessero preparando.
        #JNSQscience_bd_surveillance_MohoInSpaceLowCraters_00 = I crateri si sovrappongono in ogni taglia, un resoconto ordinatamente caotico di "stai troppo vicino al poligono di tiro del sistema".
        #JNSQscience_bd_surveillance_MohoInSpaceLowExoticCraters_00 = Diversi crateri sfoggiano aloni e striature strani: il software lo chiama "albedo insolita", il tuo istinto lo chiama "no".
        #JNSQscience_bd_surveillance_MohoInSpaceLowRareCraters_00 = Alcuni impatti restano nitidi e brillanti, come se fossero arrivati tardi a una festa finita miliardi di anni fa.
        #JNSQscience_bd_surveillance_MohoInSpaceLowVoronoiCraters_00 = Il campo di crateri si spezza in celle inquietantemente regolari, come se Moho avesse provato a organizzare il suo dolore in un motivo.
        #JNSQscience_bd_surveillance_MohoInSpaceLowNotableCraters_00 = Un bacino domina l'inquadratura con pareti terrazzate e colate. Le ombre all'interno sembrano un bioma a parte.
        #JNSQscience_bd_surveillance_MohoInSpaceLowPeaks_00 = Picchi sottili come aghi spuntano sopra le creste, catturano la prima luce e ti sfidano a scegliere un sito di atterraggio.
        #JNSQscience_bd_surveillance_EveInSpaceLowPoles_00 = Le regioni polari brillano di una tonalità più chiara attraverso la foschia, con striature che sembrano il pianeta intento a coprirsi di brina.
        #JNSQscience_bd_surveillance_EveInSpaceLowLowlands_00 = Ampi basopiani ondulano con sottili bande di colore, come se il suolo fosse stato dipinto e poi lasciato sotto la pioggia.
        #JNSQscience_bd_surveillance_EveInSpaceLowMidlands_00 = Le pianure mostrano lunghe creste stanche e canali serpeggianti che si rifiutano di spiegare cosa li abbia scavati.
        #JNSQscience_bd_surveillance_EveInSpaceLowHighlands_00 = Le ombre delle colline si accumulano in un rilievo drammatico: il tuo software di imaging chiede sottovoce un pianeta più sicuro.
        #JNSQscience_bd_surveillance_EveInSpaceLowPeaks_00 = Alcune cime spuntano dalla foschia come isole in un cielo viola, abbastanza affilate da farti sussultare anche dall'orbita.
        #JNSQscience_bd_surveillance_EveInSpaceLowExplodiumSea_00 = Il mare rimanda un accecante bagliore viola che per un attimo sovraccarica il sensore: decisamente non succo d'uva.
        #JNSQscience_bd_surveillance_EveInSpaceLowMountains_00 = Le catene montuose formano scure spine frastagliate con valli inghiottite dalle nuvole, nascondendo apposta tutti i dettagli interessanti.
        #JNSQscience_bd_surveillance_EveInSpaceLowShores_00 = Lungo la costa, bande schiumose e bassi fondali macchiati tracciano un brutto confine tra la terraferma e qualunque cosa sia quel liquido.
        #JNSQscience_bd_surveillance_EveInSpaceLowPolarLakes_00 = Piccoli laghi polari stanno sul paesaggio come macchie d'inchiostro, troppo immobili per stare tranquilli e troppo scuri per essere un semplice riflesso.
        #JNSQscience_bd_surveillance_EveInSpaceLowPetrolLakes_00 = Questi laghi brillano di una patina oleosa, creando luccichii geometrici così ordinati che gli occhi insistono siano artificiali.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofAkron_00 = Ombre di nuvole a chiazze corrono sul mare di Akron, mentre la superficie sotto resta inquietantemente liscia.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofNessus_00 = Il mare di Nessus mostra lunghe striature di superficie che si arricciano, come correnti che scrivono avvertimenti in corsivo.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofTaniwha_00 = Una cella temporalesca sul mare di Taniwha si avvolge in un perfetto mulinello: l'atmosfera si sta vantando di nuovo.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofGigan_00 = Sul mare di Gigan i sequenze d'onda avanzano in linee parallele, troppo ordinati finché il vento non li strappa.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofRodan_00 = Sopra il mare di Rodan, i lampi guizzano sotto le nubi in brevi flash silenziosi che la tua fotocamera coglie a malapena.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofGojira_00 = Il mare di Gojira ribolle vicino alla costa in vortici marezzati, come se laggiù qualcosa di enorme si fosse appena rigirato.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofGhidorah_00 = Più bande nuvolose convergono sul mare di Ghidorah, annodandosi in un intreccio a tre di meteo e pessime decisioni.
        #JNSQscience_bd_surveillance_EveInSpaceLowSeaofBagorah_00 = Il mare di Bagorah ha chiazze lucide e striature scure che si separano alla deriva come se non volessero mescolarsi.
        #JNSQscience_bd_surveillance_EveInSpaceLowKrakensWell_00 = Il Pozzo del Kraken forma una scura macchia a spirale sulla superficie. Più la guardi da vicino, meno al tuo cervello piace la geometria.
        #JNSQscience_bd_surveillance_GillyInSpaceLowLowlands_00 = I bassopiani sono solo un po' meno appuntiti: campi di massi e ombre dure fanno sembrare tutto instabile e provvisorio.
        #JNSQscience_bd_surveillance_GillyInSpaceLowMidlands_00 = Da orbita bassa, le pianure di Gilly ondeggiano sotto la rapida rotazione, trasformando ogni passaggio in un nuovo angolo dello stesso grumo.
        #JNSQscience_bd_surveillance_GillyInSpaceLowHighlands_00 = Le colline sono un caos di creste e buche con contrasti brutali. Quasi senti la regolite scivolare via.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowShores_00 = Le basse acque costiere rivelano banchi di sabbia, linee di kelp e più ombrellini di quanti il Controllo Missione voglia contare.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowIceCaps_00 = Le immagini polari mostrano lunghe fratture e creste di pressione che sembrano il risultato di qualcuno che abbia provato a piegare il pianeta.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowIceCaps_01 = Alcuni puntini scuri sul ghiaccio si risolvono in minuscoli avamposti di ricerca. Sono o coraggiosi o molto annoiati.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowMidlands_00 = Un terreno ampio e dolce rende facili le strade. Ne noti anche parecchie che finiscono di colpo nel nulla.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowMidlands_01 = I campi coltivati formano griglie ordinate sulle pianure. Laggiù qualcuno ama davvero gli angoli retti.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowMidlands_02 = Un tenue pennacchio di fumo indica un incendio controllato. La fotocamera etichetta con solerzia: decisamente non un lancio di razzo.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowLowlands_00 = I fiumi dei bassopiani si intrecciano e curvano come snack rovesciati. Le pianure alluvionali sembrano trafficate e ben percorse.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowLowlands_01 = Noti una fila di serbatoi di stoccaggio identici. O depositi di carburante o il progetto artistico più noioso del mondo.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowLowlands_02 = Il bagliore sul lato notturno suggerisce insediamenti densi. Lo archivi come: casa, ma sospettosamente luminosa.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridLowlands_00 = La foschia di calore fa tremolare la superficie, ma riesci comunque a cogliere una lunga traccia diritta che attraversa le sabbie.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridLowlands_01 = Diversi pannelli riflettenti nei bassopiani aridi formano un rettangolo perfetto. Parco solare o insegna segreta?
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridLowlands_02 = Un pennacchio di polvere segue qualcosa di veloce e vincolato al suolo. Ingrandisci e decidi di non fare domande.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMidlands_00 = Dorsali erose proiettano ombre nette che fanno sembrare le pianure aride come stagnola accartocciata.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMidlands_01 = Vecchi canali asciutti serpeggiano nel bacino. Se hanno mai portato acqua, è stato molto tempo fa.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMidlands_02 = Una pista solitaria appare nel mezzo del nulla. La segni come comodità inaspettata.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridHighlands_00 = Il terreno si spezza in mesas frastagliate e burroni. Ottimi nascondigli, pessimi posti per un picnic.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridHighlands_01 = Nella scansione compare una depressione stranamente circolare. Il Controllo Missione insiste che sia del tutto naturale.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridHighlands_02 = Segni di scavo recenti suggeriscono estrazione attiva. Qualcuno sta riorganizzando le colline aride un colpo di benna alla volta.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMountains_00 = Cime ripide di calanchi proiettano ombre a filo di coltello. La fotocamera fatica a decidere cosa conti come su.
        #JNSQscience_bd_surveillance_KerbinInSpaceLowAridMountains_01 = Una strada a tornanti resta aggrappata ai pendii. Ammiri l'ingegneria e temi i freni.
