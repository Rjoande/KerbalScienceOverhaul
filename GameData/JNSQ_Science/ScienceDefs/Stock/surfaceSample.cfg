@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]
{
    %RESULTS
    {
        MohoSrfLanded* = #JNSQscience_surfaceSample_MohoSrfLanded_00 // The sample shows odd clast sorting: sharper, denser fragments clustered along a subtle linear trace, with finer dust draped downslope. It looks like recent slip has been quietly winnowing and reworking the regolith.
		MohoSrfLanded* = #JNSQscience_surfaceSample_MohoSrfLanded_01 // Fresh-looking angular grains sit atop older, space-darkened fines, as if the ground was lightly “shaken” and reset. The distribution is consistent with intermittent microquakes disturbing a shallow fault zone.
		MohoSrfLanded* = #JNSQscience_surfaceSample_MohoSrfLanded_02 // Several fragments carry thin, bright fracture surfaces and a powdery halo of comminuted material. You label it “low-energy resurfacing” and try not to imagine the planet doing it again while you’re standing here.
		MohoSrfLandedExoticCraters* = #JNSQscience_surfaceSample_MohoSrfLandedExoticCraters_00 // The sample includes glossy beads and fused fragments. Something here melted rock and then forgot to put it back.
		MohoSrfLandedExoticCraters* = #JNSQscience_surfaceSample_MohoSrfLandedExoticCraters_01 // You find oddly colored specks among the regolith that don’t match nearby terrain. The lab requests more “weird glitter.”
		MohoSrfLandedRareCraters* = #JNSQscience_surfaceSample_MohoSrfLandedRareCraters_00 // This scoop has a surprising amount of dense, metallic-looking grains. Mission Control immediately asks if it’s valuable.
		MohoSrfLandedRareCraters* = #JNSQscience_surfaceSample_MohoSrfLandedRareCraters_01 // The chemistry scan spikes on trace elements that are scarce elsewhere. You label the container “rare” before anyone can argue.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_surfaceSample_MohoSrfLandedVoronoiCraters_00 // The regolith breaks into neat, polygonal crumbs as you collect it. Even the dirt on Moho likes geometry.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_surfaceSample_MohoSrfLandedVoronoiCraters_01 // Your sample is a mix of fine dust and plate-like fragments that crack along straight lines. The patterns look unnervingly organized.
		MohoSrfLandedNotableCraters* = #JNSQscience_surfaceSample_MohoSrfLandedNotableCraters_00 // You collect layered ejecta: dark melt bits, bright chips, and a lot of dust that looks thoroughly shocked.
		MohoSrfLandedNotableCraters* = #JNSQscience_surfaceSample_MohoSrfLandedNotableCraters_01 // The sample is a crater’s highlight reel in a jar. It contains material from depth, plus whatever got pulverized on the way out.
		MohoSrfLandedPeaks* = #JNSQscience_surfaceSample_MohoSrfLandedPeaks_00 // You chip off a jagged rock from exposed bedrock. It’s dense, dry, and feels like it has never known mercy.
		MohoSrfLandedPeaks* = #JNSQscience_surfaceSample_MohoSrfLandedPeaks_01 // The sample is mostly sharp fragments with only a trace of dust. Up here, Moho runs out of “soil” and just provides “edge.”

        EveSrfLandedKrakensWell* = #JNSQscience_surfaceSample_EveSrfLandedKrakensWell_00 // The ground here is coated in a slick purple crust. Your scoop comes back warm and faintly hissing.
		EveSrfLandedKrakensWell* = #JNSQscience_surfaceSample_EveSrfLandedKrakensWell_01 // The sample looks normal until it’s sealed, then it starts to fizz. Mission Control suggests double-bagging.
		EveSrfSplashedSeaofAkron* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofAkron_00 // The Sea of Akron sample makes the canister feel heavier than it should. The fluid seems to *like* pressure.
		EveSrfSplashedSeaofAkron* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofAkron_01 // A splash stains your gloves a cheerful purple. The stain appears to be permanent.
		EveSrfSplashedSeaofNessus* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofNessus_00 // You seal a Sea of Nessus sample; bubbles form and then vanish, as if the liquid is breathing.
		EveSrfSplashedSeaofNessus* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofNessus_01 // The acidity meter immediately gives up and resets itself. You label it “Nessus: no.”
		EveSrfSplashedSeaofTaniwha* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofTaniwha_00 // The Sea of Taniwha sample foams when agitated. You try not to agitate it again.
		EveSrfSplashedSeaofTaniwha* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofTaniwha_01 // The jar grows warm in your hands, as if the liquid is reacting to being contained.
		EveSrfSplashedSeaofGigan* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofGigan_00 // The Sea of Gigan clings to the sampler in thick sheets. Surface tension is doing overtime here.
		EveSrfSplashedSeaofGigan* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofGigan_01 // The purple fluid dyes the sample bag pink. This will not wash out. Ever.
		EveSrfSplashedSeaofRodan* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofRodan_00 // A Sea of Rodan sample sloshes like syrup and leaves faint etching lines where it touches metal.
		EveSrfSplashedSeaofRodan* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofRodan_01 // You note a sharp chemical bite and then remember you shouldn’t be able to smell anything. You check the seals.
		EveSrfSplashedSeaofGojira* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofGojira_00 // The Sea of Gojira fluid is so dense the container feels like it wants to sink through your hands.
		EveSrfSplashedSeaofGojira* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofGojira_01 // Mission Control advises “do not drink it” before you even ask. You claim you weren’t going to.
		EveSrfSplashedSeaofGhidorah* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofGhidorah_00 // Three instruments disagree violently about the Sea of Ghidorah sample. You file it under “argument in a jar.”
		EveSrfSplashedSeaofGhidorah* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofGhidorah_01 // The sample fizzes, then goes still, then fizzes again. You decide it’s best not to take it personally.
		EveSrfSplashedSeaofBagorah* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofBagorah_00 // The Sea of Bagorah sample looks deceptively smooth and reflective. Up close, it crawls with tiny bubbles.
		EveSrfSplashedSeaofBagorah* = #JNSQscience_surfaceSample_EveSrfSplashedSeaofBagorah_01 // A quick test says “not water” with impressive confidence. You store it away from anything important. Including you.

        KerbinSrfLandedLowlands* = #JNSQscience_surfaceSample_KerbinSrfLandedLowlands_00 // The dirt is damp, fine, and packs into the jar neatly. It’s almost like it *wants* to be studied.
        KerbinSrfLandedLowlands* = #JNSQscience_surfaceSample_KerbinSrfLandedLowlands_01 // The sample contains soft soil and bits of plant matter. The lab requests you stop “taste-testing” it.
        KerbinSrfLandedAridLowlands* = #JNSQscience_surfaceSample_KerbinSrfLandedAridLowlands_00 // Mostly sand, with a thin crust of dried minerals on top. The wind has done a very thorough job.
        KerbinSrfLandedAridLowlands* = #JNSQscience_surfaceSample_KerbinSrfLandedAridLowlands_01 // The grains are sharp and dry, and they immediately try to invade every seal on your suit.
        KerbinSrfLandedAridMountains* = #JNSQscience_surfaceSample_KerbinSrfLandedAridMountains_00 // The sample is mostly crushed stone with just enough sand to be annoying.
        KerbinSrfLandedAridMountains* = #JNSQscience_surfaceSample_KerbinSrfLandedAridMountains_01 // Wind-driven grit has polished everything smooth.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_surfaceSample_KerbinSrfLandedWelcomeBackIsland_00 // You scoop up dark volcanic sand mixed with shell fragments.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_surfaceSample_KerbinSrfLandedWelcomeBackIsland_01 // The sample contains salt, sand, and a mysterious bit of debris that reads “WELCOME BACK.” Nobody admits to placing it.
        KerbinSrfSplashedGreatLake* = #JNSQscience_surfaceSample_KerbinSrfSplashedGreatLake_00 // You bottle lake water with a soft layer of silt. The jar immediately fogs up from sheer humidity.
        KerbinSrfSplashedGreatLake* = #JNSQscience_surfaceSample_KerbinSrfSplashedGreatLake_01 // The sample has suspended particles and a faint green tint. The lab says that’s “probably fine.”
        KerbinSrfSplashedInlandWater* = #JNSQscience_surfaceSample_KerbinSrfSplashedInlandWater_00 // The water sample comes with fine mud and tiny plant bits. You try not to think about what else is in there.
        KerbinSrfSplashedInlandWater* = #JNSQscience_surfaceSample_KerbinSrfSplashedInlandWater_01 // You retrieve a surprisingly clear sample, then stir up the bottom and regret everything.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedKreenwichSea_00 // You collect seawater and a sprinkle of sand.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedKreenwichSea_01 // The sample contains water, foam, and something that might be algae. Mission Control recommends gloves.
        KerbinSrfSplashedArcticSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedArcticSea_00 // The water is frigid and full of fine ice crystals.
        KerbinSrfSplashedArcticSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedArcticSea_01 // You capture dark water with pale slush on top. It’s beautiful in a “don’t drop it” sort of way.
        KerbinSrfSplashedForemansSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedForemansSea_00 // You bottle a sample with gritty sediment that refuses to settle.
        KerbinSrfSplashedForemansSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedForemansSea_01 // The water is slightly murky and tastes— you stop yourself. Science requires restraint.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedTriangulusSea_00 // The surface foam clings to the sampler like it’s paid by the smear. You get a clean sample anyway. Mostly.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedTriangulusSea_01 // The water holds tiny suspended grains and a trace of salt. The lab calls it “excellent soup potential.” They are corrected.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedNorthernSea_00 // The water is cold and clear, with drifting bits of organic debris. It’s like the ocean is littering politely.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedNorthernSea_01 // A thin film on the surface suggests biological activity. The crew suggests naming it. The lab says no.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedSub-ArcticSea_00 // The sample comes up with cold brine and fine sediment. It sloshes like it’s plotting something.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedSub-ArcticSea_01 // You gather water with a faint haze of suspended particles. The sensors insist it’s “nutrient rich.”
        KerbinSrfSplashedEasternSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedEasternSea_00 // A straightforward seawater sample, complete with sand grains that hitchhiked into the container.
        KerbinSrfSplashedEasternSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedEasternSea_01 // The sample is salty and lively with tiny specks. You pretend not to notice them moving.
        KerbinSrfSplashedWesternSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedWesternSea_00 // You collect seawater with a darker tint than expected. The lab requests a second bottle “just in case.”
        KerbinSrfSplashedWesternSea* = #JNSQscience_surfaceSample_KerbinSrfSplashedWesternSea_01 // The sample contains water, salt, and microscopic grit. Your sampler now smells like ocean forever.

        MunSrfLandedLowlands* = #JNSQscience_surfaceSample_MunSrfLandedLowlands_00 // The sample is fine, dark regolith that clumps reluctantly in low gravity. It’s neat, dry, and deeply unwelcoming.
        MunSrfLandedLowlands* = #JNSQscience_surfaceSample_MunSrfLandedLowlands_01 // You scrape up a thin dust layer over harder ground. The grains are sharp and eager to get everywhere.
        MunSrfLandedMountains* = #JNSQscience_surfaceSample_MunSrfLandedMountains_00 // The regolith is thin and mixed with angular rock chips. Gravity has sorted the slope into “up” and “down.”
        MunSrfLandedMountains* = #JNSQscience_surfaceSample_MunSrfLandedMountains_01 // You bag a stubborn stone from the ridge line. Carrying it back is immediately reclassified as “future-you’s problem.”

        MinmusSrfLandedBrownBasins* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownBasins_00 // Beneath the green veneer is a darker, brown-stained layer. Your jar now contains “evidence” for one side of the great color debate.
		MinmusSrfLandedBrownBasins* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownBasins_01 // The basin dust is darker and heavier than it looks. The instruments insist you didn’t zero the scale (you did).
		MinmusSrfLandedBrownLowlands* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownLowlands_00 // The lowlands here trade minty frost for brown grit. It still crunches, but now it crunches ominously.
		MinmusSrfLandedBrownLowlands* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownLowlands_01 // Your scoop pulls up darkened grains mixed with stubborn ice crystals. The sample refuses to look “clean.”
		MinmusSrfLandedBrownMidlands* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownMidlands_00 // The sample is a messy blend of greenish frost and brown dust, as if two terrains argued and compromised.
		MinmusSrfLandedBrownMidlands* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownMidlands_01 // Layering in the jar suggests the ground keeps changing its mind. The lab labels it “compositionally indecisive.”
		MinmusSrfLandedBrownHighlands* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownHighlands_00 // The glare is muted up here; the frost is peppered with dark dust. The sample looks like it’s been lightly toasted.
		MinmusSrfLandedBrownHighlands* = #JNSQscience_surfaceSample_MinmusSrfLandedBrownHighlands_01 // You collect granular ice and stained regolith. It reflects less light and more questions.
		
        DunaSrfLandedRareCraters* = #JNSQscience_surfaceSample_DunaSrfLandedRareCraters_00 // The scoop turns up sharp fragments and glassy beads. Whatever hit here made a mess and forgot to clean it up.
		DunaSrfLandedRareCraters* = #JNSQscience_surfaceSample_DunaSrfLandedRareCraters_01 // Fresh-looking ejecta sits on top of the usual red dust. You label it “rare” before the wind can redecorate it.
		DunaSrfLandedVoronoiCraters* = #JNSQscience_surfaceSample_DunaSrfLandedVoronoiCraters_00 // The regolith comes out in oddly consistent grains, as if it was sorted into patterns first and deposited second.
		DunaSrfLandedVoronoiCraters* = #JNSQscience_surfaceSample_DunaSrfLandedVoronoiCraters_01 // Your sample contains dust, angular chips, and thin crust flakes that break along neat lines.
		DunaSrfLandedNotableCraters* = #JNSQscience_surfaceSample_DunaSrfLandedNotableCraters_00 // The sample is a mixed bag of melted bits and shattered rock. The crater has helpfully exposed the planet’s “inside pages.”
		DunaSrfLandedNotableCraters* = #JNSQscience_surfaceSample_DunaSrfLandedNotableCraters_01 // You find darker material among the red dust, packed with tiny inclusions. The lab requests you stop calling it “premium crater blend.”
		DunaSrfLandedExoticCraters* = #JNSQscience_surfaceSample_DunaSrfLandedExoticCraters_00 // The soil is streaked with pale grains that vanish if you warm them too long. You seal the jar quickly and pretend you meant to.
		DunaSrfLandedExoticCraters* = #JNSQscience_surfaceSample_DunaSrfLandedExoticCraters_01 // Frosty grit and dark regolith share the container in uneasy layers. The sample looks like it can’t decide whether it’s rock or ice.
		DunaSrfLandedMountains* = #JNSQscience_surfaceSample_DunaSrfLandedMountains_00 // The regolith is thin up here, mostly sharp rock chips with just enough dust to get into every seam on your suit.
		DunaSrfLandedMountains* = #JNSQscience_surfaceSample_DunaSrfLandedMountains_01 // You collect a stubborn clump of gritty soil that refuses to behave in low gravity. The mountain promptly tries to roll the rest downhill.
		DunaSrfLandedVolcano* = #JNSQscience_surfaceSample_DunaSrfLandedVolcano_00 // The ground is darker and rougher than the surrounding dust, full of tiny holes like it once held trapped gas. You collect a chunk and it feels oddly “recent.”
		DunaSrfLandedVolcano* = #JNSQscience_surfaceSample_DunaSrfLandedVolcano_01 // The sample contains brittle, glassy fragments mixed with red grit. The lab notes “volcanic processes,” and Mission Control says “don’t poke anything that looks active.”

        IkeSrfLandedMidlands* = #JNSQscience_surfaceSample_IkeSrfLandedMidlands_00 // A straightforward scoop of gray regolith comes back. It’s the classic “micrometeorite gardening” blend.
		IkeSrfLandedMidlands* = #JNSQscience_surfaceSample_IkeSrfLandedMidlands_01 // The sample is fine dust over compacted ground, with tiny glassy specks from constant impacts. Ike has been patiently sandblasted.
		IkeSrfLandedLowlands* = #JNSQscience_surfaceSample_IkeSrfLandedLowlands_00 // The lowland sample is deeper, softer dust that puffs up at the slightest touch.
		IkeSrfLandedLowlands* = #JNSQscience_surfaceSample_IkeSrfLandedLowlands_01 // You find darker grains mixed into the gray powder, like older material has pooled here. The jar looks heavier than it should.
		IkeSrfLandedHighlands* = #JNSQscience_surfaceSample_IkeSrfLandedHighlands_00 // The sample is bright, fractured crust with crisp edges, as if it was broken apart and never weathered back down.
		IkeSrfLandedHighlands* = #JNSQscience_surfaceSample_IkeSrfLandedHighlands_01 // You collect a mix of crumbly plate fragments and gritty dust that doesn’t match the lowlands. The lab tags it “uplifted and suspicious.”

        EdnaSrfLandedLowlands* = #JNSQscience_surfaceSample_EdnaSrfLandedLowlands_00 // The sample is dark, fine regolith that drifts like smoke when you scoop it. It immediately clings to the container walls.
		EdnaSrfLandedLowlands* = #JNSQscience_surfaceSample_EdnaSrfLandedLowlands_01 // You collect powdery grit with tiny sparkly flecks. The lab notes it’s “dry, ancient, and enthusiastic about static.”
		EdnaSrfLandedMidlands* = #JNSQscience_surfaceSample_EdnaSrfLandedMidlands_00 // The scoop turns up compacted dust over a harder crust. It breaks apart in crisp sheets, like dried mud that never met water.
		EdnaSrfLandedMidlands* = #JNSQscience_surfaceSample_EdnaSrfLandedMidlands_01 // The sample is a mix of fine powder and jagged grains. Everything about it says “ground down the hard way.”
		EdnaSrfLandedHighlands* = #JNSQscience_surfaceSample_EdnaSrfLandedHighlands_00 // Up here the “soil” is mostly sharp fragments with a thin dusting of fines.
		EdnaSrfLandedHighlands* = #JNSQscience_surfaceSample_EdnaSrfLandedHighlands_01 // You chip out a stubborn clump of gravelly regolith. In low gravity, half of it tries to become a flying sample.
		EdnaSrfLandedPolarIceCraters* = #JNSQscience_surfaceSample_EdnaSrfLandedPolarIceCraters_00 // Beneath the dark dust is pale, crunchy frost that fades as it warms. You seal the jar fast and pretend that was the plan.
		EdnaSrfLandedPolarIceCraters* = #JNSQscience_surfaceSample_EdnaSrfLandedPolarIceCraters_01 // The sample contains dusty ice grains mixed with gritty regolith. The instruments argue whether it’s “ice” or “volatile dust with dreams.”
		EdnaSrfLandedWhites* = #JNSQscience_surfaceSample_EdnaSrfLandedWhites_00 // The bright material is powdery and reflective, leaving a chalky film on your tools. It looks clean until you notice it staining everything.
		EdnaSrfLandedWhites* = #JNSQscience_surfaceSample_EdnaSrfLandedWhites_01 // You collect pale, crumbly grains that glitter harshly in the sun. The lab tags it as “likely salts or frost,” and “definitely messy.”

		DakSrfLandedLowlands* = #JNSQscience_surfaceSample_DakSrfLandedLowlands_00 // You scoop up loose, gray dust that behaves more like a suggestion than a solid. The jar fills, then the dust tries to float out.
		DakSrfLandedLowlands* = #JNSQscience_surfaceSample_DakSrfLandedLowlands_01 // The sample is fine and dry, with tiny pebbles mixed in like croutons. Someone on comms calls it “potato seasoning.”
		DakSrfLandedMidlands* = #JNSQscience_surfaceSample_DakSrfLandedMidlands_00 // The regolith is a rough blend of dust and rubble, as if Dak can’t decide between “rock” and “sand.”
		DakSrfLandedMidlands* = #JNSQscience_surfaceSample_DakSrfLandedMidlands_01 // You collect gritty fragments that rattle in the container. The sound is oddly satisfying for something so bleak.
		DakSrfLandedHighlands* = #JNSQscience_surfaceSample_DakSrfLandedHighlands_00 // The sample is mostly angular chips with barely any fines. It’s like the surface is made of shattered boulders and spite.
		DakSrfLandedHighlands* = #JNSQscience_surfaceSample_DakSrfLandedHighlands_01 // You bag a sharp fragment that looks freshly broken. Dak may be small, but it’s clearly still getting hit on a regular basis.

        LaytheSrfLandedShallows* = #JNSQscience_surfaceSample_LaytheSrfLandedShallows_00 // You scoop up damp, compacted sand from the shallow flats. It’s darker than Kerbin’s, and it smells faintly salty even through the filters.
		LaytheSrfLandedShallows* = #JNSQscience_surfaceSample_LaytheSrfLandedShallows_01 // The sample is a sticky mix of fine grains and crusty deposits, like the tide keeps rewriting the shoreline and never erases its notes.
		LaytheSrfSplashedShallows* = #JNSQscience_surfaceSample_LaytheSrfSplashedShallows_00 // The water here is clear enough to see the bottom, and the bottom is trying to escape into your sample jar.
		LaytheSrfSplashedShallows* = #JNSQscience_surfaceSample_LaytheSrfSplashedShallows_01 // Your sample contains cold seawater and a cloud of fine sand. The lab labels it “nearshore suspension,” which sounds less fun than it is.
		LaytheSrfSplashedShores* = #JNSQscience_surfaceSample_LaytheSrfSplashedShores_00 // The sample comes with foam, sand, and a persistent urge to splash back out of the container.
		LaytheSrfSplashedShores* = #JNSQscience_surfaceSample_LaytheSrfSplashedShores_01 // You bottle coastal water that looks harmless until it starts leaving a thin crust on the rim. Something here really likes evaporating.
		LaytheSrfSplashedInlandWater* = #JNSQscience_surfaceSample_LaytheSrfSplashedInlandWater_00 // The inland water tastes terrible, which is an impressive feat for water you are not supposed to taste.
		LaytheSrfSplashedInlandWater* = #JNSQscience_surfaceSample_LaytheSrfSplashedInlandWater_01 // The sample is colder and slightly murkier than the seas, with dissolved minerals that don’t match the shoreline deposits.
		LaytheSrfSplashedKrenwichSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedKrenwichSea_00 // The water sample forms a faint oily sheen that quickly breaks apart into tiny beads. Surface tension is doing strange work here.
		LaytheSrfSplashedKrenwichSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedKrenwichSea_01 // Instruments detect dissolved compounds that keep the water liquid at temperatures it really shouldn’t tolerate. The jar is labeled “Do Not Drink (Again).”
		LaytheSrfSplashedArcticSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedArcticSea_00 // The sample comes up with slushy crystals that vanish as soon as the container warms. You suddenly understand why the locals don’t have ice cubes.
		LaytheSrfSplashedArcticSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedArcticSea_01 // The water is clear, bitterly cold, and packed with impurities. The lab notes it’s “mostly water,” which is not as reassuring as it sounds.
		LaytheSrfSplashedJoolwardSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedJoolwardSea_00 // The water here seems slightly warmer and more active, full of tiny suspended particles that sparkle in the light.
		LaytheSrfSplashedJoolwardSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedJoolwardSea_01 // You collect a deep-sea sample that leaves stubborn residue on the canister. Mission Control suggests you stop rubbing it on things.
		LaytheSrfSplashedPolwardSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedPolwardSea_00 // The sample chills the container immediately, and a thin film forms on top before refusing to freeze any further.
		LaytheSrfSplashedPolwardSea* = #JNSQscience_surfaceSample_LaytheSrfSplashedPolwardSea_01 // Dissolved salts and other volatiles register higher here than expected.
		LaytheSrfLandedIceCaps* = #JNSQscience_surfaceSample_LaytheSrfLandedIceCaps_00 // The sample contains frozen deposits laced with salts and grit. The lab notes the “ice” behaves more like reluctant slush.
		LaytheSrfLandedHighlands* = #JNSQscience_surfaceSample_LaytheSrfLandedHighlands_00 // You collect coarse, wind-scoured grit with a surprising amount of volcanic ash mixed in. Laythe’s beaches clearly have an uphill supply chain.
		LaytheSrfLandedHighlands* = #JNSQscience_surfaceSample_LaytheSrfLandedHighlands_01 // The soil is dry, sharp, and silica-rich, with rounded pebbles that suggest water used to be much more ambitious up here.
		LaytheSrfLandedMountains* = #JNSQscience_surfaceSample_LaytheSrfLandedMountains_00 // The sample is mostly jagged fragments with only a dusting of fines. The mountains don’t do “sand,” they do “shards.”
		LaytheSrfLandedMountains* = #JNSQscience_surfaceSample_LaytheSrfLandedMountains_01 // You chip a dark rock from exposed bedrock and bag it with some gritty frost. The container now holds equal parts geology and regret.
		LaytheSrfLandedLowlands* = #JNSQscience_surfaceSample_LaytheSrfLandedLowlands_00 // The lowland soil is dark, dense sand with scattered pebbles shaped by water. You briefly consider building a castle, then remember the wind.
		LaytheSrfLandedLowlands* = #JNSQscience_surfaceSample_LaytheSrfLandedLowlands_01 // The sample includes layered sediments that look sorted by waves and time. The lab flags trace organics and immediately gets excited.
		LaytheSrfLandedMidlands* = #JNSQscience_surfaceSample_LaytheSrfLandedMidlands_00 // You collect compacted sand with crusty mineral patches, like the ground has been repeatedly soaked and dried over ages.
		LaytheSrfLandedMidlands* = #JNSQscience_surfaceSample_LaytheSrfLandedMidlands_01 // The regolith is a mixed bag of beach-like grains and volcanic dust.
		LaytheSrfLandedEnclosedFaults* = #JNSQscience_surfaceSample_LaytheSrfLandedEnclosedFaults_00 // The ground breaks into plate-like crumbs and sharp chips, as if the surface is still arguing about where it should crack next.
