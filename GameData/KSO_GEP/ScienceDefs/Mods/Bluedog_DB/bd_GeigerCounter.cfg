@EXPERIMENT_DEFINITION:HAS[#id[bd_GeigerCounter]]
{
    %RESULTS
    {
        GrannusFlyingLow* = #GEPscience_bd_GeigerCounter_GrannusFlyingLow_00 // The counter immediately pegs at “NOPE” as you skim the thin, angry glow. The data packet will be reassuringly delayed.
		GrannusFlyingHigh* = #GEPscience_bd_GeigerCounter_GrannusFlyingHigh_00 // The clicks settle into a steady, ominous rhythm. It feels like listening to a gargantuan campfire from very, very far away.
		GrannusInSpaceHigh* = #GEPscience_bd_GeigerCounter_GrannusInSpaceHigh_00 // Even out here, the detector never truly goes quiet. Mission Control’s reply arrives after you’ve already stopped staring at the red sun.
		GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthPolarZone_00 // The readings pulse as if the pole is breathing charged particles. The auroral glow looks wrong under a dim red sun.
		GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthSubpolarZone_00 // The counter chatters in short bursts, like someone tapping impatiently on a long-delay comm line.
		GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthTemperateZone_00 // Background radiation rises and falls with invisible structure. You label it “probably magnetic stuff” and feel very scientific.
		GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowNorthTropicZone_00 // A sharp spike races through the instrument and then vanishes. You wonder what else just passed through you.
		GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowEquatorialZone_00 // The detector clicks with annoying confidence while the star fills half the window. You try not to blink for too long.
		GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthTropicZone_00 // The count rate wobbles as the spacecraft drifts across faint bands. The light makes your sense of “day” feel optional.
		GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthTemperateZone_00 // A steady hiss of particles suggests you’re still much too close. You file the report as “working as intended (terrifying).”
		GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthSubpolarZone_00 // The counter’s rhythm stutters, then smooths out again. Somewhere, far away, someone will ask you to “repeat the experiment.”
		GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_GeigerCounter_GrannusInSpaceLowSouthPolarZone_00 // The readings climb with latitude, as if the pole is a funnel. You stop joking until the beeping calms down.

		TaranisInSpaceHigh* = #GEPscience_bd_GeigerCounter_TaranisInSpaceHigh_00 // The detector ticks like a metronome for bad decisions. The sun looks close enough to argue with.
		TaranisInSpaceLowMagmaSea* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowMagmaSea_00 // Over the glowing sea, the count rate surges hard enough to make you check the shielding twice.
		TaranisInSpaceLowMagmaShores* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowMagmaShores_00 // Radiation spikes trace the molten coastline like a warning label. You feel like the label.
		TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowScorchedLowlands_00 // The instrument crackles steadily over the baked plains. The red light makes everything look overheated, including your thoughts.
		TaranisInSpaceLowMidlands* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowMidlands_00 // The clicks are dense but orderly, as if Taranis is trying to be helpful while being hostile.
		TaranisInSpaceLowHighlands* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowHighlands_00 // The counter briefly saturates as you pass over bright ridges. You decide “high ground” is not always an advantage.
		TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowDarkSideMidlands_00 // On the frozen dark side the numbers drop, but never to comfort. The silence feels too intentional.
		TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowDarkSideHighlands_00 // The detector ticks softly in the shadowed highlands. Your internal clock gives up trying to call this “night.”
		TaranisInSpaceLowPoles* = #GEPscience_bd_GeigerCounter_TaranisInSpaceLowPoles_00 // The poles read strangely uneven, like the planet is patchy with invisible hazards. You make a note to pack more shielding than snacks. (Almost.)
		TaranisSrfLandedMagmaShores* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedMagmaShores_00 // The Geiger counter clicks through the suit like rain on a tin roof. The ground glows and you pretend that’s normal.
		TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedScorchedLowlands_00 // The readings are extreme and relentless, matching the incandescent landscape perfectly. You stop wondering why this planet has no tourists.
		TaranisSrfLandedMidlands* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedMidlands_00 // The instrument chatters constantly while the horizon shimmers with heat. Mission Control’s advice arrives long after you’ve followed your own.
		TaranisSrfLandedHighlands* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedHighlands_00 // Up here, the count rate stays high but less frantic. It’s the closest thing Taranis offers to “calm.”
		TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedDarkSideMidlands_00 // The dark side is cold enough to feel safe, which is a trick. The counter keeps ticking, reminding you where you really are.
		TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedDarkSideHighlands_00 // The numbers creep upward in the shadowed heights, as if the rock is quietly holding a grudge against your spacecraft.
		TaranisSrfLandedPoles* = #GEPscience_bd_GeigerCounter_TaranisSrfLandedPoles_00 // The poles are dim and harsh, with no helpful sunrise to reset your nerves. The detector’s steady chatter becomes your new clock.
		TaranisSrfSplashedMagmaSea* = #GEPscience_bd_GeigerCounter_TaranisSrfSplashedMagmaSea_00 // The counter goes wild while the sample container bravely pretends not to melt. You record the result as “very energetic lava (also everything).”
		TaranisSrfSplashedMagmaShores* = #GEPscience_bd_GeigerCounter_TaranisSrfSplashedMagmaShores_00 // The readings jump between “bad” and “worse” as the molten surf sloshes around. You briefly miss ordinary water.

		ToutatisFlyingLow* = #GEPscience_bd_GeigerCounter_ToutatisFlyingLow_00 // In the thin air, the counter clicks faster than you can count. The horizon looks like a border between two different worlds.
		ToutatisFlyingHigh* = #GEPscience_bd_GeigerCounter_ToutatisFlyingHigh_00 // Up high, the detector still won’t shut up, but at least the beeping has room to echo in your helmet.
		ToutatisInSpaceHigh* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceHigh_00 // Far above Toutatis, the radiation drops to merely “concerning.” The dim red sun makes the planet look like it’s lit from inside.
		ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowSunnyLowlands_00 // Over the baked lowlands, the count rate climbs as if the sunlight is adding teeth to the air.
		ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowSunnyHighlands_00 // The sunlit highlands throw back harsh light and harsher particles. You squint at the display like that helps.
		ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowTransitionalLowlands_00 // The numbers fluctuate in the twilight band, like the planet can’t decide what it wants to do to you.
		ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowTransitionalHighlands_00 // The detector’s clicks come in uneven clusters along the terminator ridges. You mark it “interesting” and feel small.
		ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowDarkSideLowlands_00 // The dark side looks peaceful until the counter reminds you it isn’t. The cold shadow still crackles with invisible noise.
		ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowDarkSideHighlands_00 // The readings stay stubbornly elevated over the shadowed highlands. Toutatis doesn’t believe in safe places.
		ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowSoutheasternMountains_00 // The count rate spikes as you pass over sharp relief. You wonder if the mountains are tall, or if the danger is.
		ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowWesternMountains_00 // The detector chatters steadily while jagged ranges slide beneath you. Your report includes the phrase “not recommended for picnics.”
		ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_GeigerCounter_ToutatisInSpaceLowDarkSideMountains_00 // The clicks sound loudest when the view is darkest. You realize you’ve been using beeps as companionship.
		ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedSunnyLowlands_00 // The counter ticks like popcorn in a pan while the ground bakes under the red sun. You try to stand in your own shadow.
		ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedSunnyHighlands_00 // The wind is thin, the light is harsh, and the detector is louder than your confidence. You log the site as “scenic, in a dangerous way.”
		ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedTransitionalLowlands_00 // In the narrow comfort band, the clicks slow just enough to tempt you into relaxing. You refuse to be fooled twice.
		ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedTransitionalHighlands_00 // The terminator highlands feel almost livable until the counter reminds you what “almost” means out here.
		ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedDarkSideLowlands_00 // The cold dark plains mute everything except the Geiger counter. It keeps time better than your brain does.
		ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedDarkSideHighlands_00 // The detector’s steady chatter follows you across shadowed rock. You start narrating your own footsteps to feel less alone.
		ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedSoutheasternMountains_00 // The count rate rises with altitude, or maybe with how exposed you feel. Either way, you decide not to linger.
		ToutatisSrfLandedWesternMountains* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedWesternMountains_00 // The mountains block the view of the sun, not the radiation. You note that on your checklist under “unfair.”
		ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_GeigerCounter_ToutatisSrfLandedDarkSideMountains_00 // In the pitch-black ranges, the counter becomes the only “weather report” you get. Forecast: still hostile, with long comm delays.

        NodensFlyingLow* = #GEPscience_bd_GeigerCounter_NodensFlyingLow_00 // The counter clicks faster in the thick air, then steadies like it’s found a new “normal.” The red sun makes “daytime” feel like a suggestion.
		NodensFlyingHigh* = #GEPscience_bd_GeigerCounter_NodensFlyingHigh_00 // Up high, the instrument stops arguing and starts quietly tallying. You send the packet and try not to think about the long wait for a thumbs-up.
		NodensInSpaceHigh* = #GEPscience_bd_GeigerCounter_NodensInSpaceHigh_00 // The background count is calm, but never silent. The dim star glares through the window like it’s watching you back.
		NodensSrfLandedShores* = #GEPscience_bd_GeigerCounter_NodensSrfLandedShores_00 // The detector chatters over damp sand and briny spray. The numbers look familiar enough to be unsettling this far from home.
		NodensSrfLandedTropicalLowlands* = #GEPscience_bd_GeigerCounter_NodensSrfLandedTropicalLowlands_00 // Warm air and alien light make the count rate feel like it’s “smiling.” You remind the instrument that it does not have a mouth.
		NodensSrfLandedTemperateLowlands* = #GEPscience_bd_GeigerCounter_NodensSrfLandedTemperateLowlands_00 // The readings sit comfortably in the middle, as if Nodens is trying to seem welcoming. You keep your helmet on anyway.
		NodensSrfLandedTropicalMidlands* = #GEPscience_bd_GeigerCounter_NodensSrfLandedTropicalMidlands_00 // A steady tick-tick accompanies the wind through unfamiliar trees-or-not-trees. You log it as “biologically suspicious.”
		NodensSrfLandedTemperateMidlands* = #GEPscience_bd_GeigerCounter_NodensSrfLandedTemperateMidlands_00 // The counter stays stable while your shadows look the wrong length under the red sun. Mission Control’s reassurance arrives eventually.
		NodensSrfLandedHighlands* = #GEPscience_bd_GeigerCounter_NodensSrfLandedHighlands_00 // The numbers dip slightly in the thin, cooler air, like the planet is giving you a tiny discount. You do not ask what the full price is.
		NodensSrfLandedTundra* = #GEPscience_bd_GeigerCounter_NodensSrfLandedTundra_00 // The clicks are crisp and regular in the cold. The silence between them feels bigger than it should.
		NodensSrfLandedIceCaps* = #GEPscience_bd_GeigerCounter_NodensSrfLandedIceCaps_00 // The detector ticks steadily over bright ice that reflects dim sunlight like a dull mirror. You suddenly miss the color green.
		NodensSrfSplashedSaltySeas* = #GEPscience_bd_GeigerCounter_NodensSrfSplashedSaltySeas_00 // The counter crackles as the probe bobs in dark water. You hope that’s “cosmic rays” and not “something in the sea.”
		NodensSrfSplashedFreshWater* = #GEPscience_bd_GeigerCounter_NodensSrfSplashedFreshWater_00 // The clicks slow a touch, then resume like nothing happened. Even the lake feels far away from anything that could help you.
		NodensSrfSplashedShores* = #GEPscience_bd_GeigerCounter_NodensSrfSplashedShores_00 // Wet foam laps at the hull while the detector keeps counting like a worried accountant. You label the sample jar “probably harmless (famous last words).”
		NodensInSpaceLowSaltySeas* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowSaltySeas_00 // Over the dark seas, the count rate rises and falls in smooth bands. The ocean looks endless under the dim red glare.
		NodensInSpaceLowFreshWater* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowFreshWater_00 // The detector ticks a little softer above the inland waters, as if the planet is hiding its sharp edges. You remain unconvinced.
		NodensInSpaceLowShores* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowShores_00 // Along coastlines, the readings jitter with every pass. The boundary between land and sea seems busy in ways you can’t see.
		NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowTropicalLowlands_00 // The counter chatters in warm, rhythmic bursts. Your internal clock can’t decide if it’s “morning,” “evening,” or “just red.”
		NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowTemperateLowlands_00 // A calm baseline persists over broad plains. It’s the kind of calm that makes you suspicious of what’s being averaged out.
		NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowTropicalMidlands_00 // The detector reports gentle spikes over rolling terrain. You picture invisible particles surfing the upper atmosphere.
		NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowTemperateMidlands_00 // The clicks come in neat clusters, almost like punctuation. You do not like what the sentence might be saying.
		NodensInSpaceLowHighlands* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowHighlands_00 // Over the high ground, the rate steadies and brightens slightly. You file it under “altitude effects (and mild dread).”
		NodensInSpaceLowTundra* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowTundra_00 // The counter keeps time over pale expanses where sunlight looks tired. The data feels colder than the numbers.
		NodensInSpaceLowIceCaps* = #GEPscience_bd_GeigerCounter_NodensInSpaceLowIceCaps_00 // Above the caps, the readings flatten into a clean plateau. You wish your comm link was as steady.

		BelisamaInSpaceHigh* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceHigh_00 // The detector never goes quiet around this moon, just less loud. Nodens hangs huge in the sky, reminding you which face you’ll never see from here.
		BelisamaSrfLandedFlats* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedFlats_00 // The counter ticks steadily over powdery ground that doesn’t look touched by anything warm, ever. Your shadow is sharp, and the silence is sharper.
		BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTropicalLowlands_00 // “Tropical” is apparently a naming conspiracy; the detector clicks in cold, hard sunlight. You add a note: “Bring a better sun next time.”
		BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTemperateLowlands_00 // The readings hover in a stubborn middle range with no atmosphere to blame. You suspect the rock is doing the talking.
		BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTropicalMidlands_00 // The instrument rattles in little bursts, like it’s reacting to stresses in the crust. You stand very still, just in case.
		BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedTemperateMidlands_00 // The count rate is steady, and the horizon never changes. Tidally locked scenery makes time feel stuck too.
		BelisamaSrfLandedHighlands* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedHighlands_00 // Up high, the detector ticks faster, as if elevation gets you closer to trouble. You look up and confirm: yes, space is still there.
		BelisamaSrfLandedPoles* = #GEPscience_bd_GeigerCounter_BelisamaSrfLandedPoles_00 // The clicks arrive in slow, patient rhythms near the pole. You realize you’ve been using them to measure “how alone” you are.
		BelisamaInSpaceLowFlats* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowFlats_00 // Over the flats, the detector draws a clean, repeatable pattern. The moon feels engineered by gravity and stubbornness.
		BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTropicalLowlands_00 // The count rate bumps upward over sun-facing terrain. “Day” here is just “the side that gets stared at.”
		BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTemperateLowlands_00 // Readings drift without atmosphere to smooth anything out. You decide Belisama is allergic to comfort.
		BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTropicalMidlands_00 // The instrument records sharp, narrow spikes over ridged ground. You imagine charged dust hopping in the weak field.
		BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowTemperateMidlands_00 // A steady hiss of particles follows your orbit like a tail. You wonder if Nodens is sharing, or if Belisama is hoarding.
		BelisamaInSpaceLowHighlands* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowHighlands_00 // Above the highlands, the detector clicks like it’s counting footsteps. You do not remember inviting anyone aboard.
		BelisamaInSpaceLowPoles* = #GEPscience_bd_GeigerCounter_BelisamaInSpaceLowPoles_00 // Polar passes make the counter twitch unpredictably, then settle. You file it and accept you’ll get the explanation after the next long comm delay.

        SucellusInSpaceHigh* = #GEPscience_bd_GeigerCounter_SucellusInSpaceHigh_00 // The detector never settles into silence out here; it just picks a new baseline and dares you to call it “safe.” The red sun looks small, but the numbers disagree.
		SucellusInSpaceLowBasins* = #GEPscience_bd_GeigerCounter_SucellusInSpaceLowBasins_00 // Over the basins the count rate climbs in smooth waves, like invisible weather. You tag it “radiation, probably” and feel only slightly reassured.
		SucellusInSpaceLowLowlands* = #GEPscience_bd_GeigerCounter_SucellusInSpaceLowLowlands_00 // The clicks thicken over the lowlands, as if the ground is quietly leaking bad news. The comm delay gives you time to worry creatively.
		SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_GeigerCounter_SucellusInSpaceLowTropicalMidlands_00 // The counter chatters in short bursts over the midlands. “Tropical” seems to mean “extra confusing” under a dim red sun.
		SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_GeigerCounter_SucellusInSpaceLowTemperateMidlands_00 // A steady hiss of particles follows your orbit. You start using the beep pattern as a clock because your eyes can’t trust the lighting.
		SucellusInSpaceLowHighlands* = #GEPscience_bd_GeigerCounter_SucellusInSpaceLowHighlands_00 // The readings spike above the highlands, then drop like nothing happened. You do not like planets that can change their mind that fast.
		SucellusInSpaceLowPoles* = #GEPscience_bd_GeigerCounter_SucellusInSpaceLowPoles_00 // Polar passes make the detector twitch unpredictably, then smooth out. You file it as “field effects” and try not to imagine what the field is doing.
		SucellusSrfLandedBasins* = #GEPscience_bd_GeigerCounter_SucellusSrfLandedBasins_00 // The counter ticks steadily on the basin floor, as if the rock has been storing radiation for later. You are, unfortunately, “later.”
		SucellusSrfLandedLowlands* = #GEPscience_bd_GeigerCounter_SucellusSrfLandedLowlands_00 // The instrument clicks with annoying confidence while the horizon stays the same shade of red. You label the site “quietly hazardous.”
		SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_GeigerCounter_SucellusSrfLandedTropicalMidlands_00 // The numbers drift upward and down again without any obvious cause. You decide the safest assumption is that Sucellus is laughing at you.
		SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_GeigerCounter_SucellusSrfLandedTemperateMidlands_00 // A calm, persistent count rate suggests you are not alone with your thoughts—just alone with your thoughts very far from home.
		SucellusSrfLandedHighlands* = #GEPscience_bd_GeigerCounter_SucellusSrfLandedHighlands_00 // The detector chatters faster at altitude, like you’ve climbed closer to the source. You briefly consider digging down instead, then remember the gravity.
		SucellusSrfLandedPoles* = #GEPscience_bd_GeigerCounter_SucellusSrfLandedPoles_00 // The clicks are crisp and regular in the cold polar light. With no familiar sunrise cues, the beeping becomes your new “day/night.”

		CaireenInSpaceHigh* = #GEPscience_bd_GeigerCounter_CaireenInSpaceHigh_00 // Background radiation is low enough to be tempting, but never low enough to be comforting. The dim red sun makes the capsule feel like a deep-sea can.
		CaireenInSpaceLowLowlands* = #GEPscience_bd_GeigerCounter_CaireenInSpaceLowLowlands_00 // The counter rises and falls over the lowlands in tight little bands. It’s like Caireen has stripes you can’t see, but your detector can.
		CaireenInSpaceLowMidlands* = #GEPscience_bd_GeigerCounter_CaireenInSpaceLowMidlands_00 // A steady tick-tick-tick follows you over the midlands. You start counting along, then stop when you realize you’re doing it for company.
		CaireenInSpaceLowHighlands* = #GEPscience_bd_GeigerCounter_CaireenInSpaceLowHighlands_00 // The detector spikes sharply above the highlands. You check the shielding twice and the window once, just in case space is leaking in.
		CaireenInSpaceLowPoles* = #GEPscience_bd_GeigerCounter_CaireenInSpaceLowPoles_00 // Polar passes make the count rate jitter like a nervous report. Mission Control will ask questions; the answers will arrive after everyone’s already worried.
		CaireenSrfLandedLowlands* = #GEPscience_bd_GeigerCounter_CaireenSrfLandedLowlands_00 // The counter clicks softly on dusty ground that looks untouched by anything warm. You suddenly miss the idea of “normal background radiation.”
		CaireenSrfLandedMidlands* = #GEPscience_bd_GeigerCounter_CaireenSrfLandedMidlands_00 // The readings sit stubbornly above “quiet” but below “panic.” You name the range “Caireen Standard” and pretend that explains it.
		CaireenSrfLandedHighlands* = #GEPscience_bd_GeigerCounter_CaireenSrfLandedHighlands_00 // Up on the highlands, the detector sounds more impatient. You write down “altitude effect” and keep your boots planted.
		CaireenSrfLandedPoles* = #GEPscience_bd_GeigerCounter_CaireenSrfLandedPoles_00 // The pole is dim, cold, and far too still. The Geiger counter’s steady chatter becomes the loudest thing on the whole moon.

		SironaFlyingLow* = #GEPscience_bd_GeigerCounter_SironaFlyingLow_00 // The counter rattles like it’s auditioning for an alarm. The red-lit clouds swallow the horizon, and the numbers politely suggest leaving.
		SironaFlyingHigh* = #GEPscience_bd_GeigerCounter_SironaFlyingHigh_00 // Up high the clicks ease, but they never stop. The faint glow below makes “up” and “down” feel like guesses.
		SironaInSpaceHigh* = #GEPscience_bd_GeigerCounter_SironaInSpaceHigh_00 // Even far out, Sirona’s environment won’t let the detector rest. You transmit the data and wait through the long, lonely silence for a reply.
		SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_GeigerCounter_SironaInSpaceLowDarkTropicalBands_00 // The count rate surges over the dark bands like a tide of charged particles. The detector sounds busy; you feel small.
		SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_GeigerCounter_SironaInSpaceLowLightTropicalBands_00 // Over the lighter bands the clicks settle into a steady drumbeat. It’s almost soothing, until you remember what it’s counting.
		SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_GeigerCounter_SironaInSpaceLowDarkTemperateBands_00 // The detector spikes in uneven clusters, then calms as you cross into brighter swirls. Sirona’s radiation belts feel… textured.
		SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_GeigerCounter_SironaInSpaceLowLightTemperateBands_00 // Readings stay high and clean, like the planet is giving you a tidy chart of danger. You appreciate the organization, not the content.
		SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_GeigerCounter_SironaInSpaceLowDarkPolarBands_00 // Near the poles, the counter jitters rapidly as if the field lines are fighting. You stop joking until the beeping slows down.
		SironaInSpaceLowLightPolarBands* = #GEPscience_bd_GeigerCounter_SironaInSpaceLowLightPolarBands_00 // The instrument clicks in sharp, regular bursts above the polar glow. You mark it “intense,” then add “beautiful,” then stare a little too long.

        AirmedInSpaceHigh* = #GEPscience_bd_GeigerCounter_AirmedInSpaceHigh_00 // The background count stays stubbornly elevated, as if space itself is closer here. You send the data and practice patience during the long red-lit silence.
		AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_GeigerCounter_AirmedInSpaceLowTropicalLowlands_00 // The detector chatters hard over the brighter lowlands, then spikes again for no reason you can see. “Extreme” is apparently a setting, not an opinion.
