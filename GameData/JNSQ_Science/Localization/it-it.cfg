        #JNSQscience_barometerScan_TyloFlyingHigh_00 = Il barometro passa un sacco di tempo a insistere che legge zero. Ogni tanto si ricorda che sotto c'è un sussurro di gas.
        #JNSQscience_barometerScan_TyloInSpaceLow_00 = Lo strumento segnala praticamente nessuna pressione e sembra sollevato di avere ragione per una volta. L'atmosfera di Tylo finisce di colpo.
        #JNSQscience_barometerScan_TyloInSpaceHigh_00 = La lettura resta inchiodata al vuoto, mentre l'elettronica cattura rumore lontano invece di aria. È il profilo di pressione più pulito che vedrai mai.
        #JNSQscience_barometerScan_BopSrfLanded_00 = Il barometro non sussulta nemmeno. Bop non offre assolutamente alcuna atmosfera, solo polvere fredda e un silenzio imbarazzante.
