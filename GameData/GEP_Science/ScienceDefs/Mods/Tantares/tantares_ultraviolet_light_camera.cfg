@EXPERIMENT_DEFINITION:HAS[#id[tantares_ultraviolet_light_camera]]
{
    %RESULTS
    {
        GrannusFlyingLow* = #GEPscience_tantares_ultraviolet_light_camera_GrannusFlyingLow_00 // The UV camera records a blinding, grainy violet haze as you skim the red dwarf’s outer layers; the feed arrives seconds late and still feels too close.
        GrannusFlyingHigh* = #GEPscience_tantares_ultraviolet_light_camera_GrannusFlyingHigh_00 // Faint UV ripples crawl across the star’s limb like slow lightning; Mission Control asks for “more contrast” from several minutes away.
        GrannusInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceHigh_00 // From high above, Grannus looks calm in visible light but mottled in UV, as if it’s quietly plotting something energetic.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthPolarZone_00 // The polar UV glow comes and goes in ragged patches, like a compass that can’t decide where “north” is anymore.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthSubpolarZone_00 // Thin UV filaments thread the subpolar zone, flickering in patterns that would be beautiful if they weren’t also alarming.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthTemperateZone_00 // The camera finds broad UV-dark lanes here, interrupted by sudden bright knots that make the exposure settings panic.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthTropicZone_00 // A band of UV brightness sweeps past beneath you; it looks like a storm you can’t hear, only measure.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowEquatorialZone_00 // The equator blooms in harsh UV glare that drowns out subtle features; you log “reduce staring at star” as a best practice.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthTropicZone_00 // The UV map shows scalloped edges along the banding, like heat scars traced into the light itself.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthTemperateZone_00 // You catch a brief UV flare signature; by the time the confirmation arrives, it’s already history.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthSubpolarZone_00 // The subpolar region looks quiet, then abruptly brightens in a way that makes you check the lens cap twice.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthPolarZone_00 // A pale UV crown rings the pole; it’s delicate, eerie, and definitely not something you’d want on your unshielded side.

        TaranisInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceHigh_00 // In UV, the tiny world splits cleanly into bright scorch and dead darkness; the terminator line is so sharp it feels like a warning label.
        TaranisInSpaceLowMagmaSea* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowMagmaSea_00 // The magma sea blazes in UV as if the planet is lit from within; you briefly consider using it to read tiny warning labels.
        TaranisInSpaceLowMagmaShores* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowMagmaShores_00 // The shores show UV-bright crust patterns that look freshly painted by heat, then promptly erased by it.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowScorchedLowlands_00 // UV-dark streaks cut through the lowlands like burned fingerprints; the delay in the downlink makes them feel even more alien.
        TaranisInSpaceLowMidlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowMidlands_00 // The midlands fluoresce in uneven patches, suggesting minerals that only admit their secrets under a harsh red sun.
        TaranisInSpaceLowHighlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowHighlands_00 // High ridges flash UV-bright along their edges, as if the rock is trying to glow away its own heat.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowDarkSideMidlands_00 // The dark side midlands barely reflect any UV at all; the camera spends most of the pass proving “yes, it’s still on.”
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowDarkSideHighlands_00 // The highlands on the night hemisphere show faint UV sparkles, like cold glass catching a distant, reluctant light.
        TaranisInSpaceLowPoles* = #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowPoles_00 // The poles alternate between brittle UV brightness and deep dimness, depending on which hemisphere is facing the furnace.
        TaranisSrfLandedMagmaShores* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedMagmaShores_00 // Close up, the shoreline crust fluoresces in spiderweb cracks; the camera also reveals a suspiciously glowing smear on a boot print.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedScorchedLowlands_00 // The UV image turns the lowlands into a map of baked minerals and darker ash; you note the ground is “actively unwelcoming.”
        TaranisSrfLandedMidlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedMidlands_00 // Fine dust here absorbs UV in wide swaths, leaving bright mineral flecks like stars on a black field.
        TaranisSrfLandedHighlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedHighlands_00 // Jagged rocks glow along fresh fracture faces, implying the surface is constantly being stress-tested by heat.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedDarkSideMidlands_00 // In the perpetual night, the camera relies on weak reflected UV and finds almost nothing but cold, matte silence.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedDarkSideHighlands_00 // A few stones fluoresce faintly, just enough to make you wonder what they’d do under full glare (and decide not to try).
        TaranisSrfLandedPoles* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedPoles_00 // The UV view shows frost-like coatings that don’t behave like frost; you label them “mystery shine” for the scientists to argue about.
        TaranisSrfSplashedMagmaSea* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfSplashedMagmaSea_00 // The surface roils with UV-bright eddies; the camera’s casing gets warm enough that the manual suggests “less magma.”
        TaranisSrfSplashedMagmaShores* = #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfSplashedMagmaShores_00 // Where liquid meets crust, UV highlights a thin film of newly formed minerals that seems to rewrite itself every few seconds.

        ToutatisFlyingLow* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisFlyingLow_00 // The thin air scatters UV in a dirty haze; you can’t tell if the camera is seeing atmosphere or just very enthusiastic dust.
        ToutatisFlyingHigh* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisFlyingHigh_00 // High above the twilight band, UV contrast improves and the horizon looks knife-sharp; the comm delay makes the view feel like it’s from someone else’s mission.
        ToutatisInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceHigh_00 // From far out, Toutatis shows a stark UV split between baked and frozen hemispheres, with a narrow, livable-looking seam that’s probably a trap.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowSunnyLowlands_00 // The sunny lowlands glare UV-bright, revealing bright salts and scoured textures like the surface has been sandblasted by light.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowSunnyHighlands_00 // UV picks out sharp ridge lines and fresh scars; the mountains look like they’ve been carved by heat and impatience.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowTransitionalLowlands_00 // In the transition zone, minerals fluoresce in patchwork bands, as if two climates are negotiating in slow motion.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowTransitionalHighlands_00 // The high transition terrain shows alternating UV-dark and UV-bright layers that resemble stacked pages of a burned book.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowDarkSideLowlands_00 // The dark side lowlands drink UV almost completely; the camera mostly confirms your own reflection isn’t the brightest thing in frame.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowDarkSideHighlands_00 // A few peaks glint faintly in UV, like cold rock reluctantly admitting it exists.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowSoutheasternMountains_00 // UV highlights long, linear fractures through the range, hinting at stresses from the planet’s extreme day-night divide.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowWesternMountains_00 // The western ridges show bright mineral seams that could be fluorescent deposits or just the universe being smug.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowDarkSideMountains_00 // The mountains on the night hemisphere show a rare UV shimmer along cliff faces, like frozen glass under a distant ember.
        ToutatisSrfLandedSunnyLowlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedSunnyLowlands_00 // Up close, the soil fluoresces in scattered grains; you also discover your suit patch is now the brightest object on the planet.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedSunnyHighlands_00 // The UV camera turns fresh rock faces into glowing stripes; you record the result while trying not to think about how hot “glowing” implies.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedTransitionalLowlands_00 // The ground alternates UV-dark crust and UV-bright dust, matching the uneasy balance between furnace and freezer.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedTransitionalHighlands_00 // UV reveals layered deposits in the slopes; the patterns look tidy enough to be suspicious, but are probably just geology being smug.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedDarkSideLowlands_00 // In the cold darkness, almost nothing fluoresces; the camera’s faint noise becomes the main feature in the image.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedDarkSideHighlands_00 // A few stones glow softly in UV as if storing yesterday’s sunlight; you note this and request “more yesterday.”
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedSoutheasternMountains_00 // The UV view traces bright veins across broken rock, suggesting minerals that only show their hand under harsh radiation.
        ToutatisSrfLandedWesternMountains* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedWesternMountains_00 // The camera catches a thin UV-bright dusting on windward faces; it looks like the planet tried to frost itself with light.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedDarkSideMountains_00 // Cliff edges fluoresce faintly against the void; you log it as beautiful, then remember you’re still far from home and stop romanticizing.

        NodensSrfLandedShores* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedShores_00 // The UV camera paints the shoreline in bright, salty streaks; someone notes the foam glows like it’s trying to signal home, but the reply arrives late.
        NodensSrfLandedTropicalLowlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTropicalLowlands_00 // Under the dim red sun, patches of the lowlands fluoresce in uneven blotches; either the minerals are exotic, or the camera has developed opinions.
        NodensSrfLandedTemperateLowlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTemperateLowlands_00 // The ground here alternates UV-dark soil and faintly glowing grit; it looks habitable in the cold, distant way only instruments can appreciate.
        NodensSrfLandedTropicalMidlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTropicalMidlands_00 // UV highlights thin bands across the midlands like tide marks without tides; Mission Control asks if the planet is “supposed to do that.”
        NodensSrfLandedTemperateMidlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTemperateMidlands_00 // The camera finds a gentle UV sheen on scattered rocks; the effect is subtle enough that you triple-check the lens cap anyway.
        NodensSrfLandedHighlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedHighlands_00 // Fresh fracture faces blaze UV-bright against dull slopes; the landscape looks carved by time, radiation, and a star that never feels quite nearby.
        NodensSrfLandedTundra* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTundra_00 // The tundra absorbs most UV like a sponge; occasional sparkles suggest icy grains that only confess themselves in this wavelength.
        NodensSrfLandedIceCaps* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedIceCaps_00 // The ice caps glare back in sharp UV highlights, etched with faint dark lines; you file it as “beautiful” and immediately regret the word choice.
        NodensSrfSplashedSaltySeas* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfSplashedSaltySeas_00 // The UV feed turns the sea surface into a shimmering sheet with bright scum lines; the science team calls it “interesting” and means “worrying.”
        NodensSrfSplashedFreshWater* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfSplashedFreshWater_00 // The water looks oddly UV-dark except for thin glowing threads; you quietly stop asking what, exactly, might be making them.
        NodensSrfSplashedShores* = #GEPscience_tantares_ultraviolet_light_camera_NodensSrfSplashedShores_00 // Where waves meet land, UV reveals a thin glowing film that reforms as fast as it breaks; the camera housing also notes it, by getting warmer.
        NodensFlyingLow* = #GEPscience_tantares_ultraviolet_light_camera_NodensFlyingLow_00 // In the thick air, UV scatters into a violet haze that hides details and amplifies every sensor smudge; comms delay makes it feel like you’re piloting someone else’s footage.
        NodensFlyingHigh* = #GEPscience_tantares_ultraviolet_light_camera_NodensFlyingHigh_00 // Above most of the murk, the surface snaps into UV contrast—bright seams, dark plains, and a red-sun glare that’s hard to look at even through filters.
        NodensInSpaceLowSaltySeas* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowSaltySeas_00 // From orbit, the salty seas show UV-bright swirls and long dark lanes like currents made of light; the patterns persist longer than you expect.
        NodensInSpaceLowFreshWater* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowFreshWater_00 // The freshwater basins appear as deep UV voids rimmed by faint fluorescence; it’s the kind of quiet signature that makes scientists talk softly.
        NodensInSpaceLowShores* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowShores_00 // The coasts form thin UV-bright ribbons that outline the continents with surgical precision; the planet looks mapped by radiation instead of paint.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTropicalLowlands_00 // Broad lowlands fluoresce in mottled patches, as if the ground has been sunburned unevenly by a distant red star.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTemperateLowlands_00 // The temperate lowlands read as mostly UV-dim with peppered bright flecks; the camera can’t tell you why, but it can make you wonder.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTropicalMidlands_00 // UV picks out banding across the midlands that doesn’t match visible maps; you label the feature “not in the brochure.”
        NodensInSpaceLowTemperateMidlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTemperateMidlands_00 // The midlands show faint UV halos around isolated outcrops; it’s like the rocks are wearing radiation auras.
        NodensInSpaceLowHighlands* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowHighlands_00 // Sharp ridges glow along their edges in UV, with dark shadowed bowls between; the terrain looks colder and farther away than it should.
        NodensInSpaceLowTundra* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTundra_00 // The tundra is a broad UV sink broken by scattered bright points; the distribution looks almost… intentional, so you stop staring at it.
        NodensInSpaceLowIceCaps* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowIceCaps_00 // The caps flare UV-bright, traced by thin dark fractures; the geometry is so clean it feels engineered, until the next delayed frame proves it isn’t.
        NodensInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceHigh_00 // At high altitude, Nodens becomes a calm disk with faint UV mottling; the signal arrives late enough that the planet feels like a postcard from the present.

        BelisamaSrfLandedFlats* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedFlats_00 // The flats return a dull, chalky UV reflection with occasional bright grains; it’s like the moon is hiding its secrets in the empty spaces.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTropicalLowlands_00 // UV reveals thin, bright streaks across the lowlands that don’t show in visible light; you wonder what “tropical” means without air to carry the heat.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTemperateLowlands_00 // The surface is mostly UV-dark, but fresh scuffs bloom bright; you mark the spot and try not to think about how long scuffs last here.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTropicalMidlands_00 // Broken rock faces fluoresce in sharp lines, like someone underlined the geology; the underlining does not explain itself.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTemperateMidlands_00 // The midlands show layered UV brightness in exposed slopes; the tidy bands look like pages in a book nobody can read from this far out.
        BelisamaSrfLandedHighlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedHighlands_00 // In the highlands, crater rims glow UV-bright against a dim plain; Nodens hangs fixed in the sky, watching you take measurements.
        BelisamaSrfLandedPoles* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedPoles_00 // The polar regolith glints with a cold UV sparkle, then goes dead again; the camera’s noise floor becomes your closest companion.
        BelisamaInSpaceLowFlats* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowFlats_00 // From orbit, the flats appear as a smooth UV-gray sheet with sporadic bright specks; it’s minimalistic in a very lonely way.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTropicalLowlands_00 // UV contrast outlines subtle flow-like textures in the lowlands; the patterns are real, but the delayed downlink makes them feel like rumors.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTemperateLowlands_00 // The lowlands show broad UV-dark fields with thin bright seams; you suspect mineral veins, and the scientists suspect everything.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTropicalMidlands_00 // A patchwork of UV-bright fractures crisscrosses the midlands; tidally locked stresses leave signatures even light can’t ignore.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTemperateMidlands_00 // UV highlights faint ridges and scarps that wrap around the moon; the geometry looks like it was pulled tight and never released.
        BelisamaInSpaceLowHighlands* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowHighlands_00 // The highlands flash UV-bright along crater ejecta rays; Nodens’ reflected light adds a second, ghostly illumination from one side.
        BelisamaInSpaceLowPoles* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowPoles_00 // The poles show a weak UV halo, then nothing; you log the data and briefly miss having an atmosphere to blame.
        BelisamaInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceHigh_00 // From high above, Belisama is a pale ember beside Nodens; the UV signature is crisp, airless, and uncomfortably permanent.

        SucellusSrfLandedBasins* = #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedBasins_00 // UV imaging turns the basin floor into a patchwork of dark dust and faintly glowing fracture lines; the delayed downlink makes it feel like the planet is reporting on you.
        SucellusSrfLandedLowlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedLowlands_00 // The lowlands come back mostly UV-dim with scattered bright grains, as if the ground is hiding its “valuable bits” between frames.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedTropicalMidlands_00 // Under Grannus’ dim red light, thin UV-bright streaks trace across the midlands like old flow marks; you label them “probably not paint.”
        SucellusSrfLandedTemperateMidlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedTemperateMidlands_00 // A gentle UV sheen outlines broken rocks and fresh scuffs; it’s the first time “dwarf planet” has looked this sharp and this far away.
        SucellusSrfLandedHighlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedHighlands_00 // Jagged highland faces fluoresce along fresh cracks, suggesting stressed, mineral-rich rock that never gets a warm, friendly sunrise.
        SucellusSrfLandedPoles* = #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedPoles_00 // The polar regolith reflects UV unevenly, flashing between glitter and void; you briefly miss having an atmosphere to blame for odd readings.
        SucellusInSpaceLowBasins* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowBasins_00 // From low orbit, the basins show UV-dark pools rimmed with brighter ejecta arcs; the patterns look like scars that still remember the impact.
        SucellusInSpaceLowLowlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowLowlands_00 // Broad lowlands read as a muted UV field with peppered highlights, hinting at resources Mission Control can argue about long after the signal arrives.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowTropicalMidlands_00 // The camera picks out long, faint UV bands that don’t match visible maps; “unfamiliar” becomes a measurable quantity.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowTemperateMidlands_00 // Subtle UV halos surround scattered outcrops, like the rock is wearing radiation as a thin coat in the red-dim daylight.
        SucellusInSpaceLowHighlands* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowHighlands_00 // Highland ridges glow along their edges in UV, while shadowed bowls stay stubbornly dark; the terrain looks carved by cold and time.
        SucellusInSpaceLowPoles* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceLowPoles_00 // The poles flare briefly in UV as you pass, then drop away into featureless dimness; the comm delay adds a second kind of silence.
        SucellusInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_SucellusInSpaceHigh_00 // At high altitude Sucellus becomes a calm disk with faint UV mottling, a quiet reminder that “nearby” is not a word used out here.

        CaireenSrfLandedLowlands* = #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedLowlands_00 // Up close, Caireen’s lowlands absorb UV like a sponge, except for a few bright flecks that glow as if they regret being captured.
        CaireenSrfLandedMidlands* = #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedMidlands_00 // The midlands show harsh UV contrast along fractured rocks; Sucellus hangs in the sky like a giant, patient supervisor.
        CaireenSrfLandedHighlands* = #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedHighlands_00 // UV highlights sharp, fresh-looking edges that shouldn’t look fresh at all; the little moon seems to keep its secrets in the cracks.
        CaireenSrfLandedPoles* = #GEPscience_tantares_ultraviolet_light_camera_CaireenSrfLandedPoles_00 // The polar ground returns a thin, cold UV sparkle that vanishes with each tiny shadow; you log it and stop imagining footsteps here.
        CaireenInSpaceLowLowlands* = #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowLowlands_00 // From low orbit, the lowlands appear nearly UV-black with scattered bright pinpricks; it’s a tiny world with a very loud silence.
        CaireenInSpaceLowMidlands* = #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowMidlands_00 // The midlands fluoresce in broken threads, like someone pulled a glowing wire through the rubble and left it there.
        CaireenInSpaceLowHighlands* = #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowHighlands_00 // Highland faces flash UV-bright as the sun angle changes; the delayed images make the moon look like it’s blinking.
        CaireenInSpaceLowPoles* = #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceLowPoles_00 // The poles show weak UV highlights with no clear pattern; the science team calls it “interesting” and you hear “mysterious” through the static.
        CaireenInSpaceHigh* = #GEPscience_tantares_ultraviolet_light_camera_CaireenInSpaceHigh_00 // High above, Caireen is a speck beside Sucellus, and the UV signal is mostly a reminder of how far your camera is willing to whisper.

        SironaFlyingLow* = #GEPscience_tantares_ultraviolet_light_camera_SironaFlyingLow_00 // In the deep atmosphere, UV scatters into a violet haze that overwhelms fine detail; the camera spends most of the pass proving it can still see anything at all.
        SironaFlyingHigh* = #GEPscience_tantares_ultraviolet_light_camera_SironaFlyingHigh_00 // Higher up, the UV view resolves into band edges and faint glows that shift beneath you; Mission Control’s reactions arrive late, like applause in a long hallway.
