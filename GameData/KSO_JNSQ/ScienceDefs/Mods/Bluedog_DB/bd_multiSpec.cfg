		KrelInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_KrelInSpaceLowHighlands_00 // The highlands show sharper absorption features, like cleaner rock has been left exposed to space. The surface looks old enough to remember when it was younger.
		KrelInSpaceLowPoles* = #JNSQscience_bd_multiSpec_KrelInSpaceLowPoles_00 // Polar terrain returns crisp, cold contrasts with deep shadows that refuse to give up detail. The poles look like they’re hiding something out of habit.

		AdenInSpaceHigh* = #JNSQscience_bd_multiSpec_AdenInSpaceHigh_00 // From far above, Aden is a small brown dot with a spectrum that leans heavily toward “dusty rock.” The only surprise is how confidently it stays that way.
