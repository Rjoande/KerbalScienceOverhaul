		#JNSQscience_crewReport_TamSrfLandedLowlands_00 = The surface drifts past in slow motion. You can’t tell if that’s the terrain or your sense of urgency leaving.
		#JNSQscience_crewReport_TamSrfLandedMidlands_00 = The cabin feels heavier than the world outside. Mission Control calls it “science,” you call it “unfair.”
