        #JNSQscience_gravityScan_RigaInSpaceLowPoles_00 = I passaggi polari mostrano una deviazione ampia e attenuata, meno "picco" e più "misteriosa coperta di numeri".
        #JNSQscience_gravityScan_RigaInSpaceHighLowlands_00 = Dall'orbita alta, i bassopiani si confondono nella media. Il rilevatore nota soprattutto Riga nel complesso, più un sussurro della trazione di Lindor.
        #JNSQscience_gravityScan_RigaInSpaceHighMidlands_00 = A questa quota il segnale delle pianure svanisce in un lieve rumore. I gravioli sembrano delusi ma continuano a lavorare.
