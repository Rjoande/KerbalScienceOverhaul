		HuygenInSpaceLowHighlands* = #JNSQscience_bd_multiSpec_HuygenInSpaceLowHighlands_00 // Highlands brighten slightly in the shortwave bands and cool sharply in infrared at local dusk. The relief finally shows itself once the haze stops arguing.
