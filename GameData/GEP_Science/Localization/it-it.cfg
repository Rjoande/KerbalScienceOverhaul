        #GEPscience_bd_camera_ToutatisInSpaceLowWesternMountains_01 = La fotocamera cattura creste che svaniscono in un tenue crepuscolo rosso, poi il segnale svanisce nell'attesa. Scrivi "ritardo nelle comunicazioni" ancora una volta, perché continua a essere vero.
