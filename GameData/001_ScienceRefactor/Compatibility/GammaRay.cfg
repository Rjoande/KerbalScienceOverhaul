// GammaRay canonicalization priority: Bluedog_DB > FarFutureTechnologies > TantaresSP > HabTech2
// Canon IDs:
// - Bluedog_DB:             bd_gammaRay
// - FarFutureTechnologies:  fftParticleDetector
// - TantaresSP:             tantares_sp_gamma_ray_spectrometer
// - HabTech2:               AMS


// --- Tier 1: Bluedog_DB present -> everything -> bd_gammaRay
@PART:HAS[@MODULE:HAS[#experimentID[fftParticleDetector]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[fftParticleDetector]]
  { @experimentID = bd_gammaRay }
}
@PART:HAS[@MODULE:HAS[#experimentID[tantares_sp_gamma_ray_spectrometer]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_sp_gamma_ray_spectrometer]]
  { @experimentID = bd_gammaRay }
}
@PART:HAS[@MODULE:HAS[#experimentID[AMS]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[AMS]]
  { @experimentID = bd_gammaRay }
}

// remove duplicates under Bluedog_DB
!EXPERIMENT_DEFINITION:HAS[#id[fftParticleDetector]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_gamma_ray_spectrometer]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[AMS]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}


// --- Tier 2: FFT present, Bluedog_DB absent -> TantaresSP/HabTech2 -> fftParticleDetector
@PART:HAS[@MODULE:HAS[#experimentID[tantares_sp_gamma_ray_spectrometer]]]:NEEDS[FarFutureTechnologies,!Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_sp_gamma_ray_spectrometer]]
  { @experimentID = fftParticleDetector }
}
@PART:HAS[@MODULE:HAS[#experimentID[AMS]]]:NEEDS[FarFutureTechnologies,!Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[AMS]]
  { @experimentID = fftParticleDetector }
}

// remove duplicates under FFT
!EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_gamma_ray_spectrometer]]:NEEDS[FarFutureTechnologies,!Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[AMS]]:NEEDS[FarFutureTechnologies,!Bluedog_DB]:FOR[zzz_ScienceRefactor] {}


// --- Tier 3: TantaresSP present, Bluedog_DB+FFT absent -> HabTech2 -> tantares_sp_gamma_ray_spectrometer
@PART:HAS[@MODULE:HAS[#experimentID[AMS]]]:NEEDS[TantaresSP,!Bluedog_DB,!FarFutureTechnologies]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[AMS]]
  { @experimentID = tantares_sp_gamma_ray_spectrometer }
}

// remove duplicates under TantaresSP
!EXPERIMENT_DEFINITION:HAS[#id[AMS]]:NEEDS[TantaresSP,!Bluedog_DB,!FarFutureTechnologies]:FOR[zzz_ScienceRefactor] {}
