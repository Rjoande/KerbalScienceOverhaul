        #JNSQscience_sspxFishStudy_DakInSpaceHigh_00 = Lontano da Dak, i pesci si assestano in un tranquillo schema di planata. È quasi sereno, finché non arriva l'ora dello snack.
        #JNSQscience_sspxFishStudy_DakInSpaceHigh_01 = L'efficienza del supporto vitale resta eccellente. I pesci, però, pretendono alloggi più grandi e un posto vicino al finestrino.
        #JNSQscience_sspxFishStudy_JoolFlyingHigh_00 = La cabina trema nei venti alti di Jool. I pesci formano un banco compatto e fanno finta che sia normale.
        #JNSQscience_sspxFishStudy_JoolFlyingHigh_01 = Una luce verde pulsa nella foschia là fuori. I pesci continuano a girare intorno al filtro, come se fosse l'unica cosa stabile dell'universo.
