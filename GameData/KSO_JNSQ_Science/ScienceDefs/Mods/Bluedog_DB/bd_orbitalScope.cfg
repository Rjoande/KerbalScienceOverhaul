@EXPERIMENT_DEFINITION:HAS[#id[bd_orbitalScope]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthPolarZone_00 // The scope tries to track the Sun’s northern polar band, but the glare keeps turning your pictures into modern art.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthSubpolarZone_00 // Fine mottling in the NorthSubpolarZone looks almost patterned, until it shifts and reminds you it’s all very much alive.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthTemperateZone_00 // The NorthTemperateZone shows long streaks and knots in the light; your optics report “too bright” with surprising emotion.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowNorthTropicZone_00 // Bright arcs and tangled texture in the NorthTropicZone make the image stabilizer work like it’s being paid per correction.
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowEquatorialZone_00 // The EquatorialZone is a sea of boiling detail; you collect enough data to heat the printer just by thinking about it.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthTropicZone_00 // The SouthTropicZone flickers with restless structure, and every frame looks different before it’s even finished downloading.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthTemperateZone_00 // The SouthTemperateZone shows broad bands that never quite stay put, as if the Sun is shuffling its own stripes.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthSubpolarZone_00 // The SouthSubpolarZone reveals subtle dimmer patches that the team argues about until someone remembers it’s the Sun.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_orbitalScope_SunInSpaceLowSouthPolarZone_00 // The southern polar region is all harsh contrast and strange texture; you add “do not stare” to the mission notes.

        MohoInSpaceLowPoles* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowPoles_00 // A dangerously deep depression at the poles keeps showing up in the scope’s images. Scientists immediately start proposing “careful” landings there.
        MohoInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowLowlands_00 // The lowlands look smoother from orbit, but the scope still catches countless small impacts hiding under a thin baked crust.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowPolarIceCraters_00 // Bright patches cling to shadowed crater walls; the scope flags them as unusually reflective, and nobody wants to guess why out loud.
        MohoInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowHighlands_00 // The highlands are a mess of ridges and terraces, like the surface tried to wrinkle away from the Sun and ran out of time.
        MohoInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowMidlands_00 // The midlands form broad, tired-looking steps between extremes, with subtle streaks that suggest the ground has been sandblasted for ages.
        MohoInSpaceLowCraters* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowCraters_00 // So many craters overlap that the scope’s edge-detection starts drawing circles on top of circles just to cope.
        MohoInSpaceLowExoticCraters* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowExoticCraters_00 // These craters don’t match their neighbors—odd rims, strange shading, and patterns that make the geologists hover over the zoom controls.
        MohoInSpaceLowRareCraters* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowRareCraters_00 // A few craters remain sharp and clean, as if they formed yesterday and immediately regretted picking this neighborhood.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowVoronoiCraters_00 // The crater field breaks into a weird cellular patchwork, convincing someone the camera is secretly doing geometry homework.
        MohoInSpaceLowNotableCraters* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowNotableCraters_00 // One crater stands out with a crisp rim and a dramatic ejecta splash, practically begging to be used as a navigation target.
        MohoInSpaceLowPeaks* = #JNSQscience_bd_orbitalScope_MohoInSpaceLowPeaks_00 // The tallest peaks cast needle-thin shadows across the rubble; the scope gets great contrast and your pilot gets great anxiety.

        EveInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_EveInSpaceLowLowlands_00 // The scope picks out broad purple flats with soft, drifting patterns—Eve’s surface seems to be constantly being repainted.
        EveInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_EveInSpaceLowMidlands_00 // Gentle rises and shallow basins in the Midlands show long wind-streaks, like the terrain is being combed by an invisible brush.
        EveInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_EveInSpaceLowMountains_00 // Dark, steep ridges cut through the haze; their shadows look heavy enough to have their own gravity.
        EveInSpaceLowShores* = #JNSQscience_bd_orbitalScope_EveInSpaceLowShores_00 // The shoreline forms messy scallops and bars, as if the purple seas can’t decide where the land is supposed to end.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_orbitalScope_EveInSpaceLowPolarLakes_00 // Bright lakes near the poles sparkle between darker crusts; you tag them as “interesting” and “probably not drinkable.”
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_orbitalScope_EveInSpaceLowPetrolLakes_00 // These lakes absorb light like spilled ink; the scope’s exposure settings complain the entire pass.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofAkron_00 // The SeaofAkron shows faint surface mottling and streaks that look like slow currents under a thick, stubborn haze.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofNessus_00 // The SeaofNessus reflects just enough to outline wave-like bands; the pattern repeats a little too neatly for comfort.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofTaniwha_00 // The SeaofTaniwha has a ragged edge of shallow shelves, suggesting the “sea” is doing its own geology.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofGigan_00 // Over the SeaofGigan the scope catches broad dark swaths, like something dragged a brush through the surface.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofRodan_00 // The SeaofRodan appears unusually uniform until the zoom reveals faint streaks running in parallel lines across it.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofGojira_00 // The SeaofGojira is a deep purple void with a few bright flecks; the team argues whether they’re foam, ice, or wishful thinking.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofGhidorah_00 // The SeaofGhidorah’s surface shows branching bands that look like flows, though it’s hard to tell what “flow” means here.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_orbitalScope_EveInSpaceLowSeaofBagorah_00 // The SeaofBagorah is framed by sharp coastal breaks; the scope logs it as an excellent reference for map stitching.
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_orbitalScope_EveInSpaceLowKrakensWell_00 // KrakensWell is an unsettling dark depression; even from orbit it looks like the planet forgot to fill in a piece of itself.

        GillyInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_GillyInSpaceLowLowlands_00 // The lowlands are a scatter of tiny boulders and shallow hollows, as if gravity politely asked everything to stay put.
        GillyInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_GillyInSpaceLowMidlands_00 // The midlands roll by in lumpy ridges with no clear pattern; the scope concludes Gilly was assembled from leftovers.

        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowArcticSea_00 // The scope resolves fractured ice pans on the ArcticSea, forcing the image software to work overtime.
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridHighlands_00 // Craters and dry ridgelines in the AridHighlands cast sharp shadows that make for excellent stereo measurements.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridLowlands_00 // Wind-sculpted dunes in the AridLowlands draw swirls and streaks like someone practiced calligraphy with sand.
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridMidlands_00 // The AridMidlands show broad dusty plains with faint channels that look suspiciously like dried-out shortcuts.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowAridMountains_00 // The AridMountains look jagged and thirsty; even the clouds avoid getting too close.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowEasternSea_00 // Sun glitter on the EasternSea keeps blowing out the highlights; Mission Control calls it “artistic”.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowForemansSea_00 // The ForemansSea is speckled with tiny wakes and wave patterns, perfect for calibrating motion blur.
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowGreatLake_00 // The GreatLake sits like a spilled snack drink in the middle of the continent, with shoreline curves you can trace frame by frame.
        KerbinInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowHighlands_00 // From this altitude the Highlands are a wrinkled blanket of hills and valleys, and the scope keeps catching new ridges every pass.
        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowIceCaps_00 // The IceCaps reflect so much light that the optics beg for a darker filter.
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowInlandWater_00 // InlandWater glints between landforms, looking more like scattered mirrors than a single body of water.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowKreenwichSea_00 // The KreenwichSea coastline draws a tidy reference line; the navigation team immediately starts arguing about where “zero” should be.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowLowlands_00 // The Lowlands look smooth and busy, with thin ribbons of terrain that might be roads—or just wishful thinking.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowMidlands_00 // The Midlands are a patchwork of gentle slopes that makes the altitude readout feel strangely personal.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowNorthernSea_00 // Cloud shadows race across the NorthernSea and turn your “simple” photo pass into a timing experiment.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowSub-ArcticSea_00 // The Sub-ArcticSea shows broken ice edging into darker water, like the planet is trying to doodle in two colors.
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowTriangulusSea_00 // The TriangulusSea is suspiciously geometric from up here; the crew tries to find the third point.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowWelcomeBackIsland_00 // WelcomeBackIsland is a tiny dot of land that keeps sneaking into the center of your shots like it knows the camera is on.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_orbitalScope_KerbinInSpaceLowWesternSea_00 // The WesternSea rolls under the craft in endless blue, and the scope catches a few oddly straight lines that are probably just waves.

        MunInSpaceLowExoticCraters* = #JNSQscience_bd_orbitalScope_MunInSpaceLowExoticCraters_00 // The scope picks out odd crater shapes in the ExoticCraters region; nothing looks like it hit at a reasonable angle.
        MunInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_MunInSpaceLowLowlands_00 // Munar Lowlands are smoother and darker, a welcome break from the endless pockmarks—almost.
        MunInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_MunInSpaceLowMountains_00 // The Mun Mountains throw long serrated shadows that make you glad you are observing from up here.
        MunInSpaceLowNotableCraters* = #JNSQscience_bd_orbitalScope_MunInSpaceLowNotableCraters_00 // NotableCraters stand out with bright rims and messy ejecta; you can almost hear the impacts echoing in the data.
        MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_orbitalScope_MunInSpaceLowPolarIceCraters_00 // Bright patches in the PolarIceCraters glitter at the edges of shadows, teasing the scientists with “maybe” and “probably”.
        MunInSpaceLowPoles* = #JNSQscience_bd_orbitalScope_MunInSpaceLowPoles_00 // At the Poles the Sun skims the horizon, turning every bump into a dramatic silhouette.
        MunInSpaceLowRareCraters* = #JNSQscience_bd_orbitalScope_MunInSpaceLowRareCraters_00 // RareCraters appear isolated and crisp, like the Mun saved its best dents for special occasions.
        MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_orbitalScope_MunInSpaceLowVoronoiCraters_00 // The VoronoiCraters region forms a strange polygon pattern that makes the map team check their rulers twice.

        MinmusInSpaceLowBasins* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBasins_00 // The Basins look like shallow scoops in the surface, perfect for landing—if you like boredom.
        MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownBasins_00 // BrownBasins are darker stains in otherwise bright terrain, as if Minmus spilled something and never cleaned it up.
        MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownHighlands_00 // The BrownHighlands are rougher and darker, with ridges that look like they were scraped by a giant spoon.
        MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownLowlands_00 // In the BrownLowlands the surface turns muted and blotchy, giving the altimeter a lot to apologize for.
        MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowBrownMidlands_00 // BrownMidlands show gentle rises with darker streaks, like someone dragged a snack wrapper across wet paint.
        MinmusInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowHighlands_00 // Minmus Highlands are lumpy and irregular, breaking the myth that this moon is all flats and easy landings.
        MinmusInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowLowlands_00 // The Lowlands curve into broad depressions that make your landing planners start circling spots with enthusiasm.
        MinmusInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowMidlands_00 // From orbit the Midlands are a messy transition zone, neither flat nor steep, but eager to trip up a careless pilot.
        MinmusInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_MinmusInSpaceLowMountains_00 // Minmus Mountains rise in abrupt shelves and ridges that look like they were built out of stacked plates.

        DunaInSpaceLowIceCaps* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowIceCaps_00 // The IceCaps glare back at the scope; layered frost fields suggest thick deposits of water and carbon dioxide ice.
        DunaInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowHighlands_00 // The Highlands look rough and wind-scoured, with dune shadows clinging to every ridge like soot.
        DunaInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowMidlands_00 // The Midlands form broad dusty steps, with subtle streaking that hints at persistent seasonal winds.
        DunaInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowLowlands_00 // The Lowlands are smoother, with dune fields pooled into basins like someone spilled the planet and never cleaned it up.
        DunaInSpaceLowRareCraters* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowRareCraters_00 // A few craters stay unusually crisp, their rims only lightly dusted compared to the usual sand-filled scars.
        DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowVoronoiCraters_00 // Craters cluster into a strange cellular pattern that makes the mosaic software question its life choices.
        DunaInSpaceLowNotableCraters* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowNotableCraters_00 // One crater’s rim and ejecta stand out sharply against the red; it gets flagged as a perfect navigation landmark.
        DunaInSpaceLowExoticCraters* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowExoticCraters_00 // These craters look wrong—odd overlaps, bright patches, and rim shapes that don’t match the surrounding terrain.
        DunaInSpaceLowTrenches* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowTrenches_00 // Long trenches slice the surface; the geometry supports old carving by flowing material, later widened by erosion.
        DunaInSpaceLowNotablePlains* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowNotablePlains_00 // The plains show faint braided lines and shallow depressions, like the ground is trying to remember being wet.
        DunaInSpaceLowNotableMountains* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowNotableMountains_00 // Sharp peaks rise above nearby frost fields; some ridges resemble collapsed shelves frozen in place.
        DunaInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowMountains_00 // Mountain ridges throw knife-edge shadows, and wind streaks cross the slopes in tidy bands.
        DunaInSpaceLowVolcano* = #JNSQscience_bd_orbitalScope_DunaInSpaceLowVolcano_00 // A lone volcanic mound rises from the dust; darker flow-like textures suggest it once oozed rather than exploded.

        IkeInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_IkeInSpaceLowMidlands_00 // The Midlands are a jumble of low ridges and shallow pits, with very few fresh impacts to explain the mess.
        IkeInSpaceLowPoles* = #JNSQscience_bd_orbitalScope_IkeInSpaceLowPoles_00 // Near the Poles, long shadows hide half the terrain; bright patches wink in and out as the lighting angle changes.
        IkeInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_IkeInSpaceLowMountains_00 // Mountain chains look like broken teeth; boulder trails mark where the slopes have been quietly collapsing.
        IkeInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_IkeInSpaceLowHighlands_00 // The Highlands show blocky terrain and sharp escarpments, as if the crust cracked and never fully settled.

        EdnaInSpaceHigh* = #JNSQscience_bd_orbitalScope_EdnaInSpaceHigh_00 // The scope stares into Edna’s dark neighborhood; the little world slips between starfields like it’s practicing vanishing tricks.
        EdnaInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_EdnaInSpaceLowLowlands_00 // Lowlands imagery shows gentle, dusty basins with faint streaks—as if slow, patient drift has been sanding them down for ages.
        EdnaInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_EdnaInSpaceLowMidlands_00 // The midlands look uneven and scabbed with small impacts; the mosaic stitches together into a map of stubborn survival.
        EdnaInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_EdnaInSpaceLowHighlands_00 // Highlands ridges cast sharp shadows that make the relief pop—finally, a place on Edna that doesn’t try to hide.
        EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_orbitalScope_EdnaInSpaceLowPolarIceCraters_00 // Bright patches cling to crater shadows near the poles; the scope flags them as unusually reflective and annoyingly coy.
        EdnaInSpaceLowWhites* = #JNSQscience_bd_orbitalScope_EdnaInSpaceLowWhites_00 // The “Whites” glow against the darker terrain, painting the map with pale blotches that don’t match any simple story.

        DakInSpaceHigh* = #JNSQscience_bd_orbitalScope_DakInSpaceHigh_00 // Dak is barely a speck until the scope locks on; suddenly it looks like a lumpy potato daring you to blink first.
        DakInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_DakInSpaceLowLowlands_00 // The lowlands are cluttered with shallow pits and scattered boulders, like the surface was assembled from spare parts and a shrug.
        DakInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_DakInSpaceLowMidlands_00 // Midlands frames show long, irregular grooves that make the navigators mutter about “handlebars” and “don’t land there.”
        DakInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_DakInSpaceLowHighlands_00 // The highlands rise in knobby bulges with steep edges; the shadows look like they’re trying to pull the terrain back down.

        DresInSpaceLowPoles* = #JNSQscience_bd_orbitalScope_DresInSpaceLowPoles_00 // The poles appear pale and quiet, with subtle texture changes that make the map team argue whether they’re deposits or just lighting tricks.
        DresInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_DresInSpaceLowHighlands_00 // Highlands shots reveal a rough, blocky surface—more like broken slabs than gentle hills.
        DresInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_DresInSpaceLowMidlands_00 // The midlands form broad stepped terrain, as if Dres tried to build a terrace world and forgot to finish.
        DresInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_DresInSpaceLowLowlands_00 // Lowlands imagery shows smoother plains interrupted by old scars; it’s the closest Dres gets to looking welcoming.
        DresInSpaceLowCanyon* = #JNSQscience_bd_orbitalScope_DresInSpaceLowCanyon_00 // The canyon cuts a long, dramatic line through the pale surface; the scope’s contrast settings finally get a day off.

        JoolInSpaceLowEquatorialBands* = #JNSQscience_bd_orbitalScope_JoolInSpaceLowEquatorialBands_00 // The scope resolves bright-and-dark equatorial bands into rippling turbulence, like someone stirred the atmosphere with a spoon.
        JoolInSpaceLowExposedLowerDeck* = #JNSQscience_bd_orbitalScope_JoolInSpaceLowExposedLowerDeck_00 // A break in the upper haze reveals a darker lower deck; the image team labels it “ominous, but excellent contrast.”
        JoolInSpaceLowSubpolarBands* = #JNSQscience_bd_orbitalScope_JoolInSpaceLowSubpolarBands_00 // Subpolar banding looks tangled and frayed, as if the winds are braiding the clouds for fun.
        JoolInSpaceLowNorthPole* = #JNSQscience_bd_orbitalScope_JoolInSpaceLowNorthPole_00 // The north polar region swirls in tight spirals; tracking it feels like trying to photograph a runaway paint mixer.
        JoolInSpaceLowSouthPole* = #JNSQscience_bd_orbitalScope_JoolInSpaceLowSouthPole_00 // The south pole shows a different swirl pattern entirely, which immediately starts a very loud argument in the science room.
        JoolInSpaceLowStormComplex* = #JNSQscience_bd_orbitalScope_JoolInSpaceLowStormComplex_00 // The storm complex has sharp edges and layered structure; the scope keeps catching new filaments between frames.

        LaytheInSpaceLowShores* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowShores_00 // The scope traces bright coastlines and dark shallows; it looks inviting until you remember it’s still Laythe.
        LaytheInSpaceLowShallows* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowShallows_00 // In the Shallows the seabed patterns show through in pale streaks, turning your “photo pass” into a bathymetry session.
        LaytheInSpaceLowInlandWater* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowInlandWater_00 // InlandWater glints between ridges like scattered mirrors, perfect for calibrating exposure and ruining it in the same moment.
        LaytheInSpaceLowKrenwichSea* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowKrenwichSea_00 // KrenwichSea shows subtle banding and faint wakes; the map stitcher marks it as “surprisingly cooperative.”
        LaytheInSpaceLowArcticSea* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowArcticSea_00 // The ArcticSea is mottled with bright patches and dark lanes, hinting at ice or foam that refuses to sit still.
        LaytheInSpaceLowJoolwardSea* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowJoolwardSea_00 // Over JoolwardSea the lighting shifts fast; the scope captures surface texture that looks like slow currents under haze.
        LaytheInSpaceLowPolwardSea* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowPolwardSea_00 // The PolwardSea appears darker and calmer, but the zoom reveals fine ripples that keep your stabilizer honest.
        LaytheInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowHighlands_00 // The Highlands look rugged and wind-scoured, with long shadows that make landing sites seem brave and questionable.
        LaytheInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowMountains_00 // Knife-edge mountain ridges cast dramatic shadows; the scope gets great relief detail and your pilot gets nervous.
        LaytheInSpaceLowIceCaps* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowIceCaps_00 // The IceCaps flare bright enough to make the optics squint; the team adds “bring sunglasses” to the checklist.
        LaytheInSpaceLowEnclosedFaults* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowEnclosedFaults_00 // EnclosedFaults carve angular scars into the terrain, like the crust tried to crack quietly and failed.
        LaytheInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowLowlands_00 // The Lowlands spread out smooth and dark, interrupted by faint streaks that suggest persistent winds and drifting deposits.
        LaytheInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_LaytheInSpaceLowMidlands_00 // The Midlands transition in messy steps between sea and high ground, ideal for mapping—and for confusing autopilots.

        VallInSpaceLowPoles* = #JNSQscience_bd_orbitalScope_VallInSpaceLowPoles_00 // Vall’s poles glow pale and smooth, with subtle texture changes that look like layered frost and compacted ice.
        VallInSpaceLowHighlands* = #JNSQscience_bd_orbitalScope_VallInSpaceLowHighlands_00 // The Highlands are lumpy and broken, casting jagged shadows that hint at stressed ice and old fractures.
        VallInSpaceLowMidlands* = #JNSQscience_bd_orbitalScope_VallInSpaceLowMidlands_00 // Midlands frames show broad rolling terrain with scattered pits, as if the surface keeps settling and then pretending it didn’t.
        VallInSpaceLowLowlands* = #JNSQscience_bd_orbitalScope_VallInSpaceLowLowlands_00 // The Lowlands are smoother and darker, collecting debris in gentle basins like a slow-motion snowdrift.
        VallInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_VallInSpaceLowMountains_00 // Vall’s mountains rise as abrupt ridges; the scope catches crisp crests that look too sharp for something made of ice.
        VallInSpaceHigh* = #JNSQscience_ValOnVall_06 // In the end, it looks like we really will have to send Val to Vall.
        VallInSpaceHigh* = #JNSQscience_ValOnVall_07 // You wonder if “Vall” is just short for “Vallentina.”

        TyloInSpaceLowPoles* = #JNSQscience_bd_orbitalScope_TyloInSpaceLowPoles_00 // The poles are stark and heavily cratered; every pass adds another circle to the “do not land here” list.
        TyloInSpaceLowMountains* = #JNSQscience_bd_orbitalScope_TyloInSpaceLowMountains_00 // Tylo’s mountains throw long, brutal shadows that make the terrain look like it was chiseled out of stone.
