        #CSS_crewReport_KerbinFlyingHigh_11 = Scopri di essere l'unico dell'intero equipaggio che crede ancora che i regali arrivino da Babbo Klaus.
        #CSS_crewReport_KerbinFlyingHigh_12 = Le montagne si alzano dalle praterie di Kerbin. Da quassù sembrano molto più piccole.
        #CSS_crewReport_KerbinFlyingHigh_13 = Anche da quassù, le montagne di Kerbin restano uno spettacolo imponente.
        #CSS_crewReport_KerbinFlyingHigh_14 = Ti prendi gioco dei gabbiani con le loro facce brutte, le voci buffe e il loro soffitto di volo così basso.
