@EXPERIMENT_DEFINITION:HAS[#id[bd_multiSpec]]
{
    @title = #ScienceRefactor_bd_multiSpec_title // Multispectral Imaging
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_multiSpec_default_00 // You take measurements in a variety of wavelengths across the electromagnetic spectrum.

        InSpace* = #ScienceRefactor_bd_multiSpec_default_01 // Multispectral data is collected, composited, and combined into usable information.
        InSpace* = #ScienceRefactor_bd_multiSpec_default_02 // Various wavelengths of light are collected and composited to create false-color images.
        
        SunInSpace* = #ScienceRefactor_bd_multiSpec_SunInSpace_00 // Multispectral data from around Kerbol is recorded.
        SunInSpaceLow* = #ScienceRefactor_bd_multiSpec_SunInSpaceLow_00 // Mission control messages "DO NOT LOOK DIRECTLY AT THE SUN".
        SunInSpaceLow* = #ScienceRefactor_bd_multiSpec_SunInSpaceLow_01 // Light measurements briefly go off the charts before the instrument enters safe-mode to prevent damage.
        SunInSpaceHigh* = #ScienceRefactor_bd_multiSpec_SunInSpaceHigh_00 // Kerbol's Corona is measured by deploying a coronagraph and reveal very high temperatures.

        MohoInSpace* = #ScienceRefactor_bd_multiSpec_MohoInSpace_00 // Multispectral images are taken around Moho.
        MohoInSpaceLow* = #ScienceRefactor_bd_multiSpec_MohoInSpaceLow_00 // Surface absorption analysis suggest the presence of iron and other metals.
        MohoInSpaceLow* = #ScienceRefactor_bd_multiSpec_MohoInSpaceLow_01 // Multispectral data reveals that Moho's surface is remarkably similar to the highlands of the Mun.
        MohoInSpaceLow* = #ScienceRefactor_bd_multiSpec_MohoInSpaceLow_02 // Multispectral data collected of Moho are used to create vivid false color images of Moho with regions that depict Moho with splotches of deep blue and streaks of bright yellow. These colors represent the concentrations of certain elements, but our scientists think it just looks cool.
        MohoInSpaceLowNorthernSinkhole* = #ScienceRefactor_bd_multiSpec_MohoInSpaceLowNorthernSinkhole_00 // Despite Moho's proximity to Kerbol, suprisingly deposits of ice are found in this deep sinkhole!
        MohoInSpaceLowNorthPole* = #ScienceRefactor_bd_multiSpec_MohoInSpaceLowNorthPole_00 // Despite Moho's proximity to Kerbol, suprisingly deposits of ice are found in polar craters!
        MohoInSpaceLowSouthPole* = #ScienceRefactor_bd_multiSpec_MohoInSpaceLowSouthPole_00 // Despite Moho's proximity to Kerbol, suprisingly deposits of ice are found in polar craters!
        MohoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MohoInSpaceHigh_00 // Multispectral data collected of Moho are used to create vivid false color images of Moho with regions that depict Moho with splotches of deep blue and streaks of bright yellow. These colors represent the concentrations of certain elements, but our scientists think it just looks cool.
        MohoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MohoInSpaceHigh_01 // Moho's thin exosphere is analyzed in multiple wavelengths of the electromagnetic spectrum.
        MohoInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MohoInSpaceHigh_02 // Light is measured in several spectral bands high above Moho.

        EveInSpace* = #ScienceRefactor_bd_multiSpec_EveInSpace_00 // Multispectral images are taken around Eve.
        EveInSpaceLow* = #ScienceRefactor_bd_multiSpec_EveInSpaceLow_00 // Eve's seems to largely absorb only ultraviolet radiation from the sun and reflects the rest, giving it a high albedo.
        EveInSpaceLow* = #ScienceRefactor_bd_multiSpec_EveInSpaceLow_01 // Eve's thick atmosphere and cloud layers seem to reflect a significant amount of light, making it difficult for this instrument to learn much about Eve's surface.
        EveInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EveInSpaceHigh_00 // The majority of the light collected from Eve seems to be reflected solar radiation and infrared radiation emitted from the depths of Eve's atmosphere. Interesting...
        EveInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EveInSpaceHigh_01 // Multispectral data collected from Eve provides deeper insight into Eve's complex weather systems and atmosphere.

		GillyInSpace* = #ScienceRefactor_bd_multiSpec_GillyInSpace_00 // The instrument collects multispectral data from around Gilly.
		GillyInSpaceLow* = #ScienceRefactor_bd_multiSpec_GillyInSpaceLow_00 // Spectrum analysis reveal some metal and ore formations on the surface.
		GillyInSpaceHigh* = #ScienceRefactor_bd_multiSpec_GillyInSpaceHigh_00 // Thermal reading indicate a lack of any volcanic activity.

        KerbinInSpace* = #ScienceRefactor_bd_multiSpec_KerbinInSpace_00 // Multispectral data is recorded from around Kerbin.
        KerbinInSpaceLow* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLow_00 // Images of cloud patterns are captured in multiple spectral bands and the data sent to the weather office.
        EarthInSpaceLow* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLow_00 // Multispectral analysis suggests that Earth's atmosphere is highly effective at reflecting UV light.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowGrasslands_00 // Light is collected from farmlands in near infrared, green, and red wavebands that can be used to study irrigation efficiency and methods to reduce fertilizer and pesticide runoff.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowGrasslands_01 // The instrument measures light reflected from farmlands to analyze crop health and drought effects.
        KerbinInSpaceLowGrasslands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowGrasslands_02 // Multispectral images are taken to study properties of ecosystems and plant life.
        KerbinInSpaceLowShores* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowShores_00 // Multispectral data is collected to study coastal errosion.
        KerbinInSpaceLowBadlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowBadlands_00 // Multispectral images are captured that can hopefully provide insight on how overgrazing, acid rain, and poor agricultural practices can cause the spread of anthropogenic badlands.
        KerbinInSpaceLowDeserts* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowDeserts_00 // The data collected from this instrument is used to collect data on errosion is contributing to the growth of deserts.
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowWater_00 // Multispectral analysis and thermal imagery provides insight oceanic weather formation, aquatic biology, rising sea temperatures, and the formation of algae blooms.
        KerbinInSpaceLowWater* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowWater_01 // This instrument collects data in multiple wavelengths that can be used to study rising sea levels.
        KerbinInSpaceLowHighlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowHighlands_00 // Multispectral data is collected to analyze vegetation density to study deforestation. 
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowIceCaps_00 // This instrument performs a thermal analysis to study the rate the polar ice caps are melting.
        KerbinInSpaceLowNorthernIceShelf* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowNorthernIceShelf_00 // This instrument performs a thermal analysis to study the rate the polar ice caps are melting.
        KerbinInSpaceLowSouthernIceShelf* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowSouthernIceShelf_00 // This instrument performs a thermal analysis to study the rate the polar ice caps are melting.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceHigh_00 // Multispectral analysis of Kerbin's atmosphere is conducted to closely study climate change and its impact on weather systems.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceHigh_01 // Infrared and thermal emissions are observed around populated areas. Perhaps this can aid in the search of biological activity on other planets.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceHigh_02 // Certain wavelengths of light are able to be used to penetrate the cloud layers of Kerbin and brighten different ground features.

		MunInSpace* = #ScienceRefactor_bd_multiSpec_MunInSpace_00 // Multispectral images are taken of the Mun.
		MunInSpaceLow* = #ScienceRefactor_bd_multiSpec_MunInSpaceLow_00 // Multispectral imaging reveals a great deal of insight on the compostion of the Munar surface.
		MoonInSpaceLow* = #ScienceRefactor_bd_multiSpec_MoonInSpaceLow_00 // Multispectral imagery shows the Munar surface is split between an older, lighter, heavily cratered regions, and younger, darker, less cratered regions.
		MunInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MunInSpaceHigh_00 // Many regions of the Mun have a high albedo, while others exhibit lower albedo.
		MunInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MunInSpaceHigh_01 // Thermal imagery makes it much easier to identify different terrain features.
		MunInSpaceLowCanyons* = #ScienceRefactor_bd_multiSpec_MunInSpaceLowCanyons_00 // Analysis shows that the canyon walls seems to provide enough shade for temperatures to noticeably decrease there.
		MunInSpaceLowNortheastBasin* = #ScienceRefactor_bd_multiSpec_MunInSpaceLowNortheastBasin_00 // Multispectral analysis reveals ancient lava flows that once dominated the basin had a high titanium content. 
		MunInSpaceLowFarsideBasin* = #ScienceRefactor_bd_multiSpec_MunInSpaceLowFarsideBasin_00 // Multispectral analysis reveals ancient lava flows that once dominated the basin had a high titanium content. 
		MunInSpaceLowPolarCrater* = #ScienceRefactor_bd_multiSpec_MunInSpaceLowPolarCrater_00 // Multispectral and thermal imaging reveal these polar craters are cold enough to be able to maintain water ice in their shadowed areas. Further investigation is needed!
		MunInSpaceLowPoles* = #ScienceRefactor_bd_multiSpec_MunInSpaceLowPoles_00 // Thermal emissions from the Mun's poles show lower temperatures which is to be expected with the lesser degree of solar exposure inherent to polar regions.
	
		MinmusInSpace* = #ScienceRefactor_bd_multiSpec_MinmusInSpace_00 // Multispectral analysis of Minmus' surface reveals that its elemental composition is quite similar to that of a comet, suggesting that Minmus could have been hit by a large comet in the past. 
		MinmusInSpaceLow* = #ScienceRefactor_bd_multiSpec_MinmusInSpaceLow_00 // Thermal emission data shows that Minmus is warmer than expected during day but colder in the night than expected. It's possible that the slow sublimation the surface ice undergoes during exposure to sunlight forms a thin exosphere (heating up the surface), which then freezes over during the night cycle.
		MinmusInSpaceLow* = #ScienceRefactor_bd_multiSpec_MinmusInSpaceLow_01 // According to the multispectral data, at this tempature pure water ice would instantly sublimate. It seems the salts in Minmus' icy surface have raised its sublimation temperature. 
		MinmusInSpaceLow* = #ScienceRefactor_bd_multiSpec_MinmusInSpaceLow_02 // Multispectral analysis can't decide if Minmus is made of Mint or Guacamole.
		MinmusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MinmusInSpaceHigh_00 // Multispectral spectrometry data reveals Minmus surface contains 
		MinmusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MinmusInSpaceHigh_01 // While different terrain levels or reflect different amounts of light, Minmus' surface overall has quite a high albedo, which likely helps prevent its surface ice from sublimating.

        DunaInSpace* = #ScienceRefactor_bd_multiSpec_DunaInSpace_00 // Multispectral imagery is taken of Duna.
        DunaInSpaceLow* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLow_00 // Geological features are imaged in varying spectral bands.
        DunaInSpaceLow* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLow_01 // Thermal emissions show temperatures on Mars tend to fluctuate a lot.
        DunaInSpaceLowPoles* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowPoles_00 // Multispectral analysis reveals high concentrations of surface water ice.
        DunaInSpaceLowPolarHighlands* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowPolarHighlands_00 // Multispectral analysis reveals higher levels of surface water ice.
        DunaInSpaceLowPolarCraters* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowPolarCraters_00 // Multispectral spectrometry shows exceedingly higher concentrations of water ice than expected!
        DunaInSpaceLowNorthernShelf* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowNorthernShelf_00 // Multispectral spectrometry shows exceedingly higher concentrations of water ice than expected!
        DunaInSpaceLowWesternCanyon* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowWesternCanyon_00 // Surface composition conducted from light emissions and reflections indicate water was formerly present in this canyon. This further supports that once was a route where water flowed to the Northeast Basin.
        DunaInSpaceLowNortheastBasin* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowNortheastBasin_00 // Multispectral analysis reveals higher levels of water ice, suggesting subterranean water ice not far below the surface.
        DunaInSpaceLowMidlandCanyon* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowMidlandCanyon_00 // Multispectral spectrometry analysis suggests traces of subsurface water ice underneath the canyon. Perhaps the melting of subterranean ice cause the surface to collapse forming the canyon?
        DunaInSpaceLowEasternCanyon* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowEasternCanyon_00 // Surface composition conducted from light emissions and reflections indicate Duna's Eastern Canyon penetrates beneath the typical regolith, exposing more ancient bedrock. 
        DunaInSpaceLowMidlandSea* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowMidlandSea_00 // While it is theorized this region was once filled with liquid water, multispectral analysis shows little water ice, suggesting it is long gone.
        DunaInSpaceLowHighlands* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowHighlands_00 // Multispectral spectrometry finds higher concentrations of silicates and trace amounts of aluminum, magnesium, iron, and potassium. This suggests active volcanoes once dominated this region.
        DunaInSpaceLowLowlands* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowLowlands_00 // Multispectral composition analysis results are consistent with those of ancient lava flows, presumably flowing down from Duna's ancient volcanoes and collecting in the lowlands. 
        DunaInSpaceLowLowlands* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowLowlands_01 // Multispectral images reveal fewer craters than expected, suggesting this region has a younger surface.
        DunaInSpaceLowSouthernBasin* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowSouthernBasin_00 // Scans reveal an unexpectedly high amount of subsurface water ice just a few meters beneath the surface!
        DunaInSpaceLowNorthernBasin* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowNorthernBasin_00 // Multispectral spectrometry suggests a higher than average concentration of subsurface water ice in this region.
        DunaInSpaceHigh* = #ScienceRefactor_bd_multiSpec_DunaInSpaceHigh_00 // Multispectral scans reveal information about the surface and atmospheric composition of Duna.
        DunaInSpaceHigh* = #ScienceRefactor_bd_multiSpec_DunaInSpaceHigh_01 // Despite its desert appearance, Duna is appears rather cold according to thermal emission analysis.

		IkeInSpace* = #ScienceRefactor_bd_multiSpec_IkeInSpace_00 // Multispectral data is recorded from around Ike.
		IkeInSpaceLow* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLow_00 // Data in multiple wavelength bands suggests a higher presence of metals than expected on the surface of Ike.
		IkeInSpaceLow* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLow_01 // Multispectral analysis reveals Ike's lighter and higher regions to contain greater levels of ice, whereas the darker regions seem to have a composition that suggests the presence of ancient lava flows. 
		IkeInSpaceLowEasternMountainRidge* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLowEasternMountainRidge_00 // Multispectral spectrometry data shows higher concentrations of water ice.
		IkeInSpaceLowWesternMountainRidge* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLowWesternMountainRidge_01 // Multispectral spectrometry data shows higher concentrations of water ice.
		IkeInSpaceLowCentralMountainRange* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLowCentralMountainRange_02 // Multispectral spectrometry data shows higher concentrations of water ice.
		IkeInSpaceLowSouthEasternMountainRange* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLowSouthEasternMountainRange_00 // Multispectral spectrometry data shows higher concentrations of water ice.
		IkeInSpaceLowLowlands* = #ScienceRefactor_bd_multiSpec_IkeInSpaceLowLowlands_00 // Surface composition data suggests the high presence of silicates and trace metals seem to show further evidence of ancient volcanism. 
		IkeInSpaceHigh* = #ScienceRefactor_bd_multiSpec_IkeInSpaceHigh_00 // Multispectral images show that Ike's surface albedo varies wildly between its lower and higher regions and thermal emission scans show these albedos cause surface temperatures to also fluctuate greatly.

        DresInSpace* = #ScienceRefactor_bd_multiSpec_DresInSpace_00 // Multispectral images are captured of Dres.
        DresInSpaceHigh* = #ScienceRefactor_bd_multiSpec_DresInSpaceHigh_00 // Light data recorded in several wavelength bands shows that small patches of ice seem to cause noticable variances in Dres' albedo.
        DresInSpaceLow* = #ScienceRefactor_bd_multiSpec_DresInSpaceLow_00 // Multispectral composition reveals a similar composition to the Mun.
        DresInSpaceLow* = #ScienceRefactor_bd_multiSpec_DresInSpaceLow_01 // Multispectral imagery shows a surface with less craters than expected. Perhaps Dres had some form of ancient volcanism?
        DresInSpaceLowCanyons* = #ScienceRefactor_bd_multiSpec_DresInSpaceLowCanyons_00 // Thermal emission analysis show cooler temperatures in this canyon, likely due to the shadows cast by the canyon walls.

        JoolInSpace* = #ScienceRefactor_bd_multiSpec_JoolInSpace_00 // Multispectral images are captured of Jool.
        JoolInSpace* = #ScienceRefactor_bd_multiSpec_JoolInSpace_01 // Multispectral images reveal Jool's vivid and bright aurorae.
        JoolInSpaceLow* = #ScienceRefactor_bd_multiSpec_JoolInSpaceLow_00 // Multispectral scans are unable to penetrate very deeply beneath Jool's clouds. However, the scans reveal a lot about the characteristics of Jool's complex weather systems.
        
        JoolInSpaceLow* = #ScienceRefactor_bd_multiSpec_JoolInSpaceLow_00 // Multispectral analysis indicates the brighter and higher cloud layers are composed primarily of methane and ammonia, whereas the lower, darker layers are composed of methane, hydrogen, and helium.
        JoolInSpaceLow* = #ScienceRefactor_bd_multiSpec_JoolInSpaceLow_01 // Multispectral images are captured of Jool's the beautiful and swirling vorticies in Jool's cloud structures.
        JoolInSpaceHigh* = #ScienceRefactor_bd_multiSpec_JoolInSpaceHigh_00 // UV wavelength bands show Jool to be bright and colorful, while IR wavelength bands show Jool to be dark and fiery. Interesting!
        JoolInSpaceHigh* = #ScienceRefactor_bd_multiSpec_JoolInSpaceHigh_01 // Jool's thick atmosphere seems to insulate Jool allowing it retain a great deal of heat according to thermal emission scans.
        JoolInSpaceHigh* = #ScienceRefactor_bd_multiSpec_JoolInSpaceHigh_02 // Thermal emission analysis shows that Jool emits a great deal more heat than it receives from Kerbol, suggesting some internal power source.

        LaytheInSpace* = #ScienceRefactor_bd_multiSpec_LaytheInSpace_00 // Images are taken of Laythe in a multitude of spectral bands.
        LaytheInSpaceLow* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLow_00 // Analysis indicate that the atmosphere is composed mostly of nitrogen and oxygen, with trace amounts of methane, ethane, and acetylene. The presense of oxygen is suprising as without a source to replenish it, there would be significantly less oxygen. This indicates there might be life on Laythe, or in the least a unique geological process that is capable of replenishing Laythe's oxygen.
        LaytheInSpaceLow* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLow_01 // Multispectral spectrometry shows Laythe's oceans to be composed of a highly salt-rich water with various trace elements.
        LaytheInSpaceLowPoles* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowPoles_00 // Multispectral spectrometry and thermal emission analyses suggest that Laythe's polar regions aren't cold enough to maintain consistently frozen polar ice caps. 
        LaytheInSpaceLowShallows* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowShallows_00 // Laythe's shallower regions seem to be emitting more heat than other regions, indicating possible active geological activity.
        LaytheInSpaceLowCraterBay* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowCraterBay_00 // Crater Bay seems to be emitting a great deal more heat relative to other regions. It is extremely likely that this region has highly active geological activity occuring beneath the surface.
        LaytheInSpaceLowCraterIsland* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowCraterIsland_00 // This region seems to emit the most heat in the Crater Bay region. Our scientists suggest that Crater Bay wasn't created by a meteorite impact, but actually a large volcano, which is possibly actice. This island seems to be the caldera.
        LaytheInSpaceLowTheDegrasseSea* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowTheDegrasseSea_00 // The Degrasse Sea is shallow enough for multispectral scanners to conduct a more detailled thermal emission measurements of Laythe's sea floor. A multitude of localized thermal hotspots are dotted across the seafloor, indicating hydrothermal vents, providing further evidence of an active core and volcanism.
        LaytheInSpaceHigh* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceHigh_00 // Laythe emits more heat than it receives, similar to Jool. This is likely generated due to Jool's strong tidal forces heating Laythe, but there is also a possibility that Laythe has an active core.

        VallInSpace* = #ScienceRefactor_bd_multiSpec_VallInSpace_00 // Multispectral imagery is taken of Vall.
        VallInSpaceLow* = #ScienceRefactor_bd_multiSpec_VallInSpaceLow_00 // Multispectral images reveal a very young surface with erroded craters. This indicates some sort of geological process is liking refreshing the surface.
        VallInSpaceLow* = #ScienceRefactor_bd_multiSpec_VallInSpaceLow_01 // Spectrometry data is collected in multiple wavelength bands that reveal high quantities of water ice. Make sure you brought a water filter!
        VallInSpaceLowMountains* = #ScienceRefactor_bd_multiSpec_VallInSpaceLowMountains_00 // Multispectral thermal emission analysis shows that many mountains seem to emit a lot of heat, indicating regions that have active cryovolcanism. 
        VallInSpaceHigh* = #ScienceRefactor_bd_multiSpec_VallInSpaceHigh_00 // Thermal imaging analysis shows many localized emission hot spots. Possible indication of cryovolcanism?
        VallInSpaceHigh* = #ScienceRefactor_bd_multiSpec_VallInSpaceHigh_01 // Multispectral analysis shows Vall has a thin exosphere that almost entirely of water vapor, with traces of nitrogen, carbon dioxide, and methane.

        BopInSpace* = #ScienceRefactor_bd_multiSpec_BopInSpace_00 // Multispectral images are taken around Bop.
        BopInSpaceLow* = #ScienceRefactor_bd_multiSpec_BopInSpaceLow_00 // The multispectral images taken by the instruments seem to possess a high amount of noise and artifacts. There seems to be some kind of interference emitting from the surface of Bop.
        BopInSpaceHigh* = #ScienceRefactor_bd_multiSpec_BopInSpaceHigh_00 // Thermal emission scans reveal Bop to be hotter than previously thought.

        TyloInSpace* = #ScienceRefactor_bd_multiSpec_TyloInSpace_00 // Multispectral imagery is taken of Tylo.
        TyloInSpaceLow* = #ScienceRefactor_bd_multiSpec_TyloInSpaceLow_00 // Multispectral spectrometry data show the surface contains ice, with traces of cobalt and nickel.
        TyloInSpaceLowMinorCraters* = #ScienceRefactor_bd_multiSpec_TyloInSpaceLowMinorCraters_00 // Multispectral spectrometry analysis show higher concentrations of rare metals like cobalt in this 
        TyloInSpaceHigh* = #ScienceRefactor_bd_multiSpec_TyloInSpaceHigh_00 // Scans show ice on the surface
        TyloInSpaceHigh* = #ScienceRefactor_bd_multiSpec_TyloInSpaceHigh_01 // Multispectral thermal imagery suggests that Tylo appears to emit more heat than it recieves from Kerbol or from tidal forces from Jool. Interesting...

        PolInSpace* = #ScienceRefactor_bd_multiSpec_PolInSpace_00 // Multispectral data is collected around Pol.
        PolInSpaceLow* = #ScienceRefactor_bd_multiSpec_PolInSpaceLow_00 // The collected multispectral spectrometry analysis data is puzzling our scientists. It's almost as if Pol is made of... pollen?
        PolInSpaceHigh* = #ScienceRefactor_bd_multiSpec_PolInSpaceHigh_00 // Multispectral images reveal a strangely colorful surface.

        EelooInSpace* = #ScienceRefactor_bd_multiSpec_EelooInSpace_00 // Multispectral imagery is taken of Eeloo. 
        EelooInSpaceLow* = #ScienceRefactor_bd_multiSpec_EelooInSpaceLow_00 // Multispectral spectrometry analysis shows a surface made of ice is found top make up the lower layers of Eeloo's icy surface.
        EelooInSpaceLow* = #ScienceRefactor_bd_multiSpec_EelooInSpaceLow_01 // Thermal emission analysis shows both that Eeloo is emitting more heat than it recieves from Kerbol and that there are several localized hotspots spread across the surface. This indicates an active core and cryovolcanism, respectively. Eeloo is a lot more active than we previously believed!
        EelooInSpaceLowIceCanyons* = #ScienceRefactor_bd_multiSpec_EelooInSpaceLowIceCanyons_00 // Spectral data collected from Eeloo's canyons puzzle scientists. While we expected tholins, it seems these brown regions might be radiation bombarded magnesium sulfate and sulfric acid salts, perhaps surfacing from a subterranean ocean.
        EelooInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EelooInSpaceHigh_00 // Spectrometry data suggests the sublimation of surface ice creates a thin nitrogen exosphere around Eeloo. 
        EelooInSpaceHigh* = #ScienceRefactor_bd_multiSpec_EelooInSpaceHigh_01 // Albedo data reveals Eeloo is mostly composed of highly reflective ice with streaks of a less reflective, brown material.

        MercuryInSpace* = #ScienceRefactor_bd_multiSpec_MercuryInSpace_00 // Multispectral images are taken around Mercury.
        MercuryInSpaceLow* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceLow_00 // Surface absorption analysis suggest the presence of iron and other metals.
        MercuryInSpaceLow* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceLow_01 // Multispectral data reveals that Mercury's surface is remarkably similar to the highlands of the Mun.
        MercuryInSpaceLow* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceLow_02 // Multispectral data collected of Mercury are used to create vivid false color images of Mercury with regions that depict Mercury with splotches of deep blue and streaks of bright yellow. These colors represent the concentrations of certain elements, but our scientists think it just looks cool.
        MercuryInSpaceLowPolarCraters* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceLowPolarCraters_00 // Despite Mercury's proximity to the Sun, suprisingly deposits of ice are found in polar craters!
        MercuryInSpaceLowPolarCraters* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceLowPolarCraters_01 // Despite Mercury's proximity to the Sun, suprisingly deposits of ice are found in polar craters!
        MercuryInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceHigh_00 // Multispectral data collected of Mercury are used to create vivid false color images of Mercury with regions that depict Mercury with splotches of deep blue and streaks of bright yellow. These colors represent the concentrations of certain elements, but our scientists think it just looks cool.
        MercuryInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceHigh_01 // Mercury's thin exosphere is analyzed in multiple wavelengths of the electromagnetic spectrum.
        MercuryInSpaceHigh* = #ScienceRefactor_bd_multiSpec_MercuryInSpaceHigh_02 // Light is measured in several spectral bands high above Mercury.

        VenusInSpace* = #ScienceRefactor_bd_multiSpec_VenusInSpace_00 // Multispectral images are taken around Venus.
        VenusInSpaceLow* = #ScienceRefactor_bd_multiSpec_VenusInSpaceLow_00 // Venus' cloud layer seems to largely absorb only ultraviolet radiation from the sun and reflects the rest, giving it a high albedo.
        VenusInSpaceLow* = #ScienceRefactor_bd_multiSpec_VenusInSpaceLow_01 // Venus' thick atmosphere and cloud layers seem to reflect a significant amount of light, making it difficult for this instrument to learn much about Venus' surface.
        VenusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_VenusInSpaceHigh_00 // The majority of the light collected from Venus seems to be reflected solar radiation and infrared radiation emitted from the depths of Venus' atmosphere. Interesting...
        VenusInSpaceHigh* = #ScienceRefactor_bd_multiSpec_VenusInSpaceHigh_01 // Multispectral data collected from Venus provides deeper insight into Venus's complex weather systems and atmosphere.

        EarthInSpace* = #ScienceRefactor_bd_multiSpec_EarthInSpace_00 // Multispectral data is recorded from around Earth.
        EarthInSpaceLow* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLow_00 // Images of cloud patterns are captured in multiple spectral bands and the data sent to the weather office.
        EarthInSpaceLow* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLow_01 // Multispectral analysis suggests that Earth's atmosphere is highly effective at reflecting UV light.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowGrasslands_00 // Light is collected from farmlands in near infrared, green, and red wavebands that can be used to study irrigation efficiency and methods to reduce fertilizer and pesticide runoff.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowGrasslands_01 // The instrument measures light reflected from farmlands to analyze crop health and drought effects.
        EarthInSpaceLowGrasslands* = #ScienceRefactor_bd_multiSpec_EarthInSpaceLowGrasslands_02 // Multispectral images are taken to study properties of ecosystems and plant life.
