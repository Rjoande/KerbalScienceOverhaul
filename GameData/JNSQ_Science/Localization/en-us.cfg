        #JNSQscience_crewReport_AmosInSpaceHigh_00 = Amos shrinks into a speck beside Nara, and the cabin gets quiet. Someone starts inventorying snacks for morale reasons.

        #JNSQscience_crewReport_EnonSrfLandedLowlands_00 = The surface is blindingly pale, like it’s trying to reflect your thoughts back at you. The crew squints and pretends this is fine.
