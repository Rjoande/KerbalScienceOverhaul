        #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowLightPolarBands_00 = Le fasce polari chiare oscillano tra "freddo" e "più freddo", con brevi lampi caldi da turbolenza. Le segni come "interessanti e allarmanti".
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedTropicalLowlands_00 = I bassopiani irradiano a chiazze irregolari, come se il terreno non riuscisse a decidere se trattenere il calore o regalarlo allo spazio.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedTemperateLowlands_00 = La vista termica mostra una netta spaccatura tra roccia scaldata dal sole e polvere in ombra. Il tuo lander è la "forma di vita" più calda per chilometri.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedTropicalMidlands_00 = Creste calde e conche fredde dipingono il terreno in rilievo infrarosso. La luce rossa sembra sottile, ma il freddo sembra fin troppo volenteroso.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedTemperateMidlands_00 = Le Midlands si raffreddano in fretta quando cambia l'angolo del sole, lasciando solo massi ostinatamente caldi. Cominci a dar loro un nome, per il morale.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedHighlands_00 = Le alture scaricano calore dritto nel cielo nero. La camera continua a beccare il bagliore della tua attrezzatura, come se volesse fare pettegolezzi.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedDarkenedLowlands_00 = Il terreno scurito assorbe calore e se lo tiene, rendendo la superficie bicolore ancora più "voluta".
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedDarkenedMidlands_00 = Le Midlands scurite mostrano lunghe strisce calde lungo i pendii, come se qualcuno avesse spennellato carbone sul paesaggio e fosse rimasto bollente.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedDarkenedHighlands_00 = Anche qui, il materiale scuro resta più caldo di quanto dovrebbe. Scrivi "composizione?" e lo sottolinei tre volte.
        #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedPoles_00 = I poli sono un vuoto quasi nero all'infrarosso. Le tue impronte e il pacco batteria diventano le cose più luminose, ed è un po' maleducato.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowTropicalLowlands_00 = Da bassa orbita, i bassopiani tropicali formano un campo di tepore maculato. È un mondo piccolo con grandi opinioni sulla temperatura.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowTemperateLowlands_00 = I bassopiani temperati si raffreddano in chiazze ampie e lisce, spezzate da pietre luminose. Le pietre luminose sembrano briciole di pane.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowTropicalMidlands_00 = La striatura termica segue più i crinali che la latitudine, tracciando vecchie cicatrici nella ritenzione del calore. Airmed si ricorda degli impatti.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowTemperateMidlands_00 = Le Midlands sembrano una trapunta di roccia e polvere, cucita dall'ombra. Le cuciture sono dove atterreresti—se fossi coraggioso.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowHighlands_00 = Le alture vanno fredde in fretta, diventando sagome nette contro il materiale basso più caldo. Il riflesso della tua nave prova a photobombare la mappa.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani scuriti brillano più caldi e più a lungo del terreno circostante, rendendo visibile il disegno bicolore anche sul lato verso la notte.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowDarkenedMidlands_00 = Le Midlands scurite mostrano strisce calde che non combaciano con la topografia. Tu sospetti la chimica, e poi sospetti la burocrazia.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowDarkenedHighlands_00 = Le alture scurite restano appena abbastanza calde da risaltare dallo spazio. La camera le segnala, il Controllo Missione risponde molto più tardi con "mh".
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceLowPoles_00 = Le regioni polari sfumano verso il freddo di fondo finché il sole non prende un pendio. Allora lampeggia caldo per un attimo, come un segnale non destinato a te.
        #GEPscience_tantares_infrared_light_camera_AirmedInSpaceHigh_00 = Da alta orbita, Airmed è una moneta fredda e segnata, con una metà scura ostinata che trattiene calore. Il bagliore di Sirona sullo sfondo ti fa sentire molto, molto lontano.
        #GEPscience_tantares_infrared_light_camera_BorvoFlyingLow_00 = Il feed all'infrarosso mostra strati di foschia più caldi che scorrono sopra un suolo più freddo. Il sole rosso sembra distante anche quando è "giorno".
        #GEPscience_tantares_infrared_light_camera_BorvoFlyingHigh_00 = In quota, le bande di temperatura di Borvo si smussano in gradienti ampi. Guardi i numeri arrivare in ritardo, come un bollettino meteo rimandato da un'altra vita.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceHigh_00 = Da alta orbita, Borvo è un tizzone smorzato sotto una stella fioca. Il bagliore dei tuoi radiatori continua a infilarsi nell'inquadratura.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedTropicalLowlands_00 = I bassopiani trattengono calore più a lungo del previsto, come se la superficie nascondesse qualcosa sotto la polvere—o sotto la brina.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedTemperateLowlands_00 = Il contrasto all'infrarosso è delicato e ostinatamente estraneo. Il freddo torna in fretta quando cambia l'angolo del sole.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedTropicalMidlands_00 = Le creste si raffreddano rapidamente mentre le conche restano leggermente calde. Il terreno sembra una carta topografica termica con le etichette mancanti.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedTemperateMidlands_00 = Il suolo diventa un patchwork di pietre calde e fini più fredde. I tuoi stivali risultano abbastanza luminosi da farti sentire accusato.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedHighlands_00 = Le alture irradiano dritto nello spazio nero, il tuo lander diventa la "sorgente termale" locale.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedTropicalCraquelure_00 = I campi fessurati brillano lungo i bordi, con giunture più calde che tracciano fratture come se stessero ancora assestandosi.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedTemperateCraquelure_00 = La craquelure sembra complessivamente più fredda, ma le crepe si accendono in sottili linee calde. Ti chiedi cosa ci sia sotto, poi lo annoti e basta.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedMajorCraters_00 = Le pareti dei crateri mostrano gradienti termici netti—pendii al sole luminosi, terrazze in ombra quasi fredde come lo spazio.
        #GEPscience_tantares_infrared_light_camera_BorvoSrfLandedPoles_00 = I poli sono un vuoto all'infrarosso con una sola cosa brillante: il tuo sistema di potenza che lavora in straordinario per dimostrare di essere ancora vivo.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowTropicalLowlands_00 = Da bassa orbita, i bassopiani tropicali restano debolmente caldi anche nel lungo crepuscolo. È confortante in un posto molto poco confortante.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowTemperateLowlands_00 = I bassopiani temperati si raffreddano in bacini ampi e lisci, spezzati da affioramenti più caldi come briciole sparse.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowTropicalMidlands_00 = Le Midlands mostrano dorsali calde e solchi freddi, come se il pianeta stesse evidenziando ogni cresta per tentarti con un sito d'atterraggio.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowTemperateMidlands_00 = La marezzatura termica suggerisce materiali misti—polvere qui, qualcosa di più denso là. Il Controllo Missione lo saprà più tardi. Molto più tardi.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowHighlands_00 = Le alture si raffreddano in fretta, diventando sagome nitide contro un suolo basso leggermente più caldo. Il riflesso della tua nave prova a photobombare la scienza.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowTropicalCraquelure_00 = Le reti di fratture si disegnano da sole all'infrarosso, linee più calde su una piastra più fredda. Il disegno è troppo ordinato per essere rassicurante.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowTemperateCraquelure_00 = Le regioni fessurate trattengono calore in fili sottili. L'auto-gain della camera lo chiama "interessante" e tu annuisci con cautela.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowMajorCraters_00 = I crateri sembrano ciotole termiche—bordi caldi, fondi freddi e ombre che paiono più profonde del dovuto.
        #GEPscience_tantares_infrared_light_camera_BorvoInSpaceLowPoles_00 = Le calotte polari (o solo terreno molto freddo) sfumano verso il fondo. Qualsiasi cosa calda risalta, soprattutto tu.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceHigh_00 = Da alta orbita, Damona è un puntino freddo e butterato. L'unico calore affidabile è quello della tua navicella che si rifiuta di confondersi.
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedTropicalLowlands_00 = I bassopiani sono gelidi, con piccoli puntini caldi dove la roccia guarda il sole rosso. "Tropicale" sembra una battuta raccontata molto tempo fa.
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedTemperateLowlands_00 = La superficie quasi non si scalda, ombra e sole differiscono per "sempre freddo" contro "anche freddo".
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedTropicalMidlands_00 = Le Midlands mostrano sottili bordi termici lungo massi e creste. Il resto è una linea piatta di determinazione prossima allo zero.
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedTemperateMidlands_00 = L'infrarosso trasforma il suolo in una mappa di texture: pietre calde, polvere fredda e un pacco batteria decisamente troppo caldo.
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedHighlands_00 = Le alture irradiano via il calore all'istante. La camera continua a controllarsi, come se l'incredulità fosse un'impostazione di calibrazione.
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedImpactBasin_00 = L'interno del bacino si raffredda fino a diventare un profondo pozzo termico, mentre i margini fratturati trattengono un tepore tenue e ostinato, come un livido.
        #GEPscience_tantares_infrared_light_camera_DamonaSrfLandedPoles_00 = I poli sono vicini alla temperatura dello spazio, con occasionali picchi di rumore che sembrano radiazioni che picchiettano sulla lente.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowTropicalLowlands_00 = Da bassa orbita, i bassopiani appaiono come pozze lisce e fredde tra terreno più ruvido e leggermente più caldo. Il "meteo" di Damona è solo silenzio.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowTemperateLowlands_00 = Il contrasto termico è minimo finché il sole non prende un pendio: allora lampeggia caldo per un attimo e torna subito intorpidito.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowTropicalMidlands_00 = Le Midlands mostrano contorni termici netti attorno a blocchi sparsi. È geologia a torcia, se la torcia è la tua camera.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowTemperateMidlands_00 = Una firma termica marezzata suggerisce regolite mista. I dati arrivano a casa abbastanza tardi da sembrare archeologia.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowHighlands_00 = Le alture sfumano verso il freddo di fondo, lasciando visibili in ritenzione termica solo le creste più taglienti.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowImpactBasin_00 = Il bacino disegna da orbita un confine termico chiaro: fondo più freddo, anello fratturato leggermente più caldo e una storia che non puoi sentire direttamente.
        #GEPscience_tantares_infrared_light_camera_DamonaInSpaceLowPoles_00 = I poli quasi scompaiono all'infrarosso. Il calore della tua navicella diventa la cosa più facile da mappare, e sembra il contrario di come dovrebbe andare.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedTropicalLowlands_00 = I bassopiani brillano dolcemente all'infrarosso, trattenendo calore più a lungo delle alture. Sotto il debole sole rosso, "caldo" resta un colore raro.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedTemperateLowlands_00 = La camera trova un tepore delicato nel suolo al sole e un crollo rapido in ogni ombra. Il tuo lander resta l'errore più luminoso della scena.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedTropicalUplands_00 = Le alture spazzate dal vento si raffreddano in fretta quando cambia la luce, lasciando strisce calde solo dove la roccia sbuca dalla polvere.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedTemperateUplands_00 = La mappa termica si risolve in creste che tengono il calore e conche che lo perdono subito. È come se il terreno razionasse il tepore.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedHighlands_00 = Le alture irradiano nello spazio con entusiasmo. La vista infrarossa rende l'orizzonte più tagliente, più freddo e più lontano da casa.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedGrandPeaks_00 = Le grandi cime mostrano gradienti di temperatura da lama: versanti al sole luminosi, pendii sottovento quasi neri. Puoi "vedere" il vento in ciò che si raffredda per primo.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedCraters_00 = I bordi dei crateri restano caldi mentre i fondi diventano freddi, formando ordinate ciotole termiche. Segni le macchie più scure come "niente campeggio".
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedVolcanoes_00 = Il terreno vulcanico porta firme di calore ostinate che non combaciano con la luce solare. Lo etichetti "geologia" e, con discrezione, mantieni le distanze.
        #GEPscience_tantares_infrared_light_camera_EponaSrfLandedPoles_00 = I poli sono un pozzo all'infrarosso, tutto sfuma verso il freddo di fondo. Le tue impronte risaltano come una confessione.
        #GEPscience_tantares_infrared_light_camera_EponaFlyingLow_00 = L'infrarosso trasforma il paesaggio in una mappa di rilievo termico, ma l'atmosfera lo spalma in lenti aloni caldi. Il ritardo di downlink fa sembrare che tu stia inseguendo ieri.
        #GEPscience_tantares_infrared_light_camera_EponaFlyingHigh_00 = Da quota alta nella foschia sottile, il contrasto termico di Epona diventa bande ampie e cicatrici appena accennate. La luce del sole rosso sembra stanca, e lo sembrano anche i numeri.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowTropicalLowlands_00 = Da bassa orbita, i bassopiani tropicali restano debolmente caldi anche nel lungo crepuscolo, delineando il terreno per ritenzione termica più che per colore.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowTemperateLowlands_00 = I bassopiani si raffreddano in pozze lisce e scure, spezzate da affioramenti più caldi. La camera continua a scambiare il bagliore termico della tua navicella per "caratteristiche interessanti".
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowTropicalUplands_00 = Le alture mostrano bordi termici netti lungo le creste, poi scompaiono nel freddo. Il pianeta sembra perdere calore il più in fretta possibile.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowTemperateUplands_00 = Le alture formano una trapunta marezzata di pietra calda e fini freddi. È una guida all'atterraggio scritta in temperature e brutte idee.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowHighlands_00 = Le alture diventano fredde rapidamente, lasciando visibili solo i pendii più caldi. Puoi quasi leggere il terreno da ciò che si rifiuta di raffreddarsi.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowGrandPeaks_00 = Le grandi cime tracciano linee sottili e luminose dove il sole colpisce per primo e resta più a lungo. Le segnali per studio e per evitamento.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowCraters_00 = I crateri appaiono come anelli termici: bordi più caldi, interni più freddi e ombre che sembrano più profonde del dovuto sotto un debole sole rosso.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowVolcanoes_00 = Le regioni vulcaniche risaltano con un tepore persistente che ignora l'ora locale. Il Controllo Missione se ne entusiasmerà più tardi—molto più tardi.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceLowPoles_00 = Le regioni polari sfumano verso il freddo di fondo finché il sole non prende un pendio: allora lampeggia caldo per un attimo e scompare di nuovo.
        #GEPscience_tantares_infrared_light_camera_EponaInSpaceHigh_00 = Da alta orbita, Epona è un tizzone smorzato sotto una stella fioca, con la firma termica della tua navicella che insiste ostinatamente nel far parte della scienza.
        #GEPscience_tantares_infrared_light_camera_RosmertaSrfLandedTropicalLowlands_00 = I bassopiani "tropicali" risultano appena-meno-freddi all'infrarosso. La camera continua a controllarsi, come se l'incredulità fosse una modalità di calibrazione valida.
        #GEPscience_tantares_infrared_light_camera_RosmertaSrfLandedTemperateLowlands_00 = La luce del sole crea una sottile pelle calda sul terreno, ma svanisce in fretta. Ogni ombra sembra una porta spalancata sullo spazio.
        #GEPscience_tantares_infrared_light_camera_RosmertaSrfLandedTropicalMidlands_00 = Le Midlands si risolvono in massi caldi e polvere fredda, una mappa di texture fatta di temperatura invece che di colore.
        #GEPscience_tantares_infrared_light_camera_RosmertaSrfLandedTemperateMidlands_00 = Un leggero marezzamento termico suggerisce materiali misti. Ti sembra di leggere una storia attraverso un lungo, ritardato sussurro radio.
        #GEPscience_tantares_infrared_light_camera_RosmertaSrfLandedHighlands_00 = Le alture stanno vicino alla temperatura dello spazio, trasformando l'orizzonte in una silhouette fredda e tagliente. Il tuo lander diventa l'unico "punto di riferimento termico".
        #GEPscience_tantares_infrared_light_camera_RosmertaSrfLandedPoles_00 = I poli sono quasi indistinguibili dallo sfondo. La cosa più luminosa nell'inquadratura è il tuo sistema di alimentazione che lotta contro il buio.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceLowTropicalLowlands_00 = Da bassa orbita, i bassopiani formano bacini lisci e scuri con occasionali puntini caldi dove la roccia guarda direttamente il sole rosso.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceLowTemperateLowlands_00 = Il contrasto termico è minimo finché il sole non colpisce un pendio: poi lampeggia caldo e si raffredda di nuovo come un segnale riluttante.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceLowTropicalMidlands_00 = Le Midlands mostrano punti caldi netti e sparsi—pietre al sole—circondati da regolite fredda che ingoia il calore.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceLowTemperateMidlands_00 = La mappa termica sembra ordinata e silenziosa, come se il mondo non avesse nulla da dire. I numeri dissentono in minuscoli dettagli.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceLowHighlands_00 = Le alture sfumano verso il nero infrarosso, lasciando visibili per la loro debole ritenzione termica solo le creste più taglienti.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceLowPoles_00 = I poli quasi scompaiono all'infrarosso, rendendo il calore della tua navicella la cosa più facile da misurare, e sembra il contrario di come dovrebbe andare.
        #GEPscience_tantares_infrared_light_camera_RosmertaInSpaceHigh_00 = Da alta orbita, Rosmerta è un puntino freddo con una sottile linea del terminatore che si sposta. Il vuoto tra i pacchetti sembra grande quanto il pianeta.
        #GEPscience_tantares_infrared_light_camera_RAB-58ESrfSplashedLowlands_00 = L'immagine infrarossa mostra un tepore debole e irregolare che filtra attraverso qualunque cosa sia quella in cui siete "ammarati". Nessuno vuole definire la parola troppo rigidamente, quassù.
        #GEPscience_tantares_infrared_light_camera_RAB-58ESrfSplashedEasternHighlands_00 = Le alture risultano come silhouette fredde con occasionali puntini caldi—perlopiù il tuo hardware che insiste nel dimostrare di esistere.
        #GEPscience_tantares_infrared_light_camera_RAB-58ESrfSplashedWesternHighlands_00 = Il contrasto termico va e viene come un segnale debole: un po' di calore, poi freddo profondo, poi la lunga attesa di conferma.
        #GEPscience_tantares_infrared_light_camera_RAB-58EFlyingLow_00 = Vicino alla superficie, la camera cattura bordi di temperatura netti che sembrano terreno, poi si sporcano nella foschia. Il sole rosso non si spiega.
        #GEPscience_tantares_infrared_light_camera_RAB-58EFlyingHigh_00 = In alto, tutto tende verso "freddo con eccezioni". Le eccezioni sei tu, e sembra un avvertimento.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedTropicalLowlands_00 = La regione "tropicale" è calda solo secondo gli standard locali, la vista infrarossa suggerisce che Cernunnos stia razionando il calore con cura.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedTemperateLowlands_00 = Gradienti termici morbidi scivolano sui bassopiani, poi si fermano. È come se il mondo stesse cercando di restare in silenzio per la lunga trasmissione.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedTropicalMidlands_00 = Le Midlands mostrano cuciture calde lungo le creste e pozze più fredde nelle conche. Il disegno sembra deliberato, anche se è solo fisica.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedTemperateMidlands_00 = Un sottile marezzamento suggerisce materiali misti sotto la superficie. Lo contrassegni per dopo, sapendo che "dopo" qui è relativo.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedHighlands_00 = Le alture sono quasi nere all'infrarosso finché la luce non sfiora un pendio: allora lampeggia caldo e svanisce di nuovo.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedSouthPolarHills_00 = Le colline polari risultano un freddo profondo con occasionali picchi di rumore. Dai la colpa alle particelle, ma abbassi comunque l'esposizione.
        #GEPscience_tantares_infrared_light_camera_CernunnosSrfSplashedNorthPole_00 = Il polo è quasi indistinguibile dal freddo di fondo, vicino alla temperatura dello spazio. La tua firma termica diventa il punto di riferimento più facile da mappare.
        #GEPscience_tantares_infrared_light_camera_CernunnosFlyingLow_00 = Il campo di temperatura della superficie appare nitido e inquietantemente vicino, come se la camera stesse leggendo l'umore del suolo invece del suo colore.
        #GEPscience_tantares_infrared_light_camera_CernunnosFlyingHigh_00 = Da quota alta, Cernunnos si divide in ampie zone termiche e in una sottile linea di confine incerta. Il ritardo fa sembrare che tu stia guardando un ricordo.

        // tantares_radiometer_scan
        #GEPscience_tantares_radiometer_scan_GrannusInSpaceLow_00 = Il radiometro fissa la debole stella rossa e si pente subito di quante cifre riesca a visualizzare. Perfino la calibrazione di "base" sembra arrivare da molto lontano.
        #GEPscience_tantares_radiometer_scan_GrannusInSpaceLow_01 = I canali a onde corte sono tutto abbagliamento, quelli a onde lunghe sono tutto calore. Il Controllo Missione chiede un riassunto semplice, tu gli mandi un numero lunghissimo.
        #GEPscience_tantares_radiometer_scan_GrannusInSpaceHigh_00 = Da questa distanza, Grannus è meno un disco e più una presenza rossa ostinata che satura tutto lì vicino. La sottrazione del fondo diventa una "negoziazione col fondo".
        #GEPscience_tantares_radiometer_scan_GrannusInSpaceHigh_01 = La scansione rileva lente variazioni sul volto della stella, come un battito che non riesci a sincronizzare con il ritardo delle comunicazioni. Fingi che sia rassicurante.
        #GEPscience_tantares_radiometer_scan_TaranisInSpaceLow_00 = L'emisfero caldo è accecante nelle bande termiche, mentre il lato in ombra a malapena sussurra qualcosa. Il confine tra giorno e notte sembra un taglio di lama nei dati.
        #GEPscience_tantares_radiometer_scan_TaranisInSpaceLow_01 = I canali a microonde accennano a roccia nuda e vuoto, senza vie di mezzo gentili. Etichetti il risultato "incandescente" e cerchi di non pensare all'atterraggio.
        #GEPscience_tantares_radiometer_scan_TaranisInSpaceHigh_00 = In quota, il radiometro media gli estremi in qualcosa che continua a sembrare pericoloso. Il lato rivolto alla stella domina ogni banda come se stesse cercando di vincere una discussione.
        #GEPscience_tantares_radiometer_scan_TaranisInSpaceHigh_01 = I grafici mostrano un mondo diviso tra "troppo caldo" e "troppo freddo", con una sottile linea di forse. La linea è più piccola del tuo ottimismo.
        #GEPscience_tantares_radiometer_scan_ToutatisInSpaceLow_00 = La scansione trova un lato al sole caldo e un lato in ombra freddo, con una fascia crepuscolare che cambia più in fretta della tua tabella di marcia. L'aria sottile compare come una firma debole e irregolare, che va e viene.
        #GEPscience_tantares_radiometer_scan_ToutatisInSpaceLow_01 = La luce riflessa dice "roccia e polvere", l'emissione termica dice "sempre roccia e polvere, ma più arrabbiate". Inizi a rispettare il concetto di ombra.
        #GEPscience_tantares_radiometer_scan_ToutatisInSpaceHigh_00 = Dall'orbita alta, il pianeta sembra due mondi diversi che condividono la stessa sfera, cuciti insieme da una stretta cucitura temperata. Naturalmente è lì che vorresti stare.
        #GEPscience_tantares_radiometer_scan_ToutatisInSpaceHigh_01 = Le temperature di brillanza a banda larga si rifiutano di assestarsi su qualcosa di familiare. Lo archivi sotto "lontano da casa" e ricontrolli l'aggancio dell'antenna.
        #GEPscience_tantares_radiometer_scan_NodensInSpaceLow_00 = Il radiometro mappa brillanti coltri di nubi e chiazze più scure che potrebbero essere acque libere. Sotto il sole rosso, le bande "blu" sembrano stranamente silenziose.
        #GEPscience_tantares_radiometer_scan_NodensInSpaceLow_01 = I canali termici mostrano un mondo che trattiene il calore più del previsto. Il Controllo Missione chiede se siano "buone notizie", la tua risposta arriva un po' troppo tardi per sembrare sicura.
        #GEPscience_tantares_radiometer_scan_NodensInSpaceHigh_00 = Dall'orbita alta, Nodens sembra temperato nelle medie e complicato nei dettagli. La scansione suggerisce sistemi meteo con i propri ritmi, e nessuno coincide con il tuo.
        #GEPscience_tantares_radiometer_scan_NodensInSpaceHigh_01 = Le bande in luce riflessa suggeriscono che un'atmosfera spessa sta facendo quasi tutto il lavoro. Ti chiedi cosa ne pensi la superficie, a essere ignorata.
        #GEPscience_tantares_radiometer_scan_BelisamaInSpaceLow_00 = Il lato diurno di Belisama si scalda in fretta e si raffredda altrettanto in fretta, come se la luce del sole la infastidisse. Il lato notturno è un freddo profondo e costante, senza atmosfera con cui discutere.
        #GEPscience_tantares_radiometer_scan_BelisamaInSpaceLow_01 = Il radiometro cattura cali periodici quando Nodens si mette in mezzo. I grafici sembrano qualcuno che ti strizza l'occhio, lentamente e con intenzione.
        #GEPscience_tantares_radiometer_scan_BelisamaInSpaceHigh_00 = In quota, la mappa termica della luna mostra un disegno ostinato che cambia a malapena nel tempo. Il blocco mareale lascia sempre la stessa faccia a subire sempre la stessa punizione.
        #GEPscience_tantares_radiometer_scan_BelisamaInSpaceHigh_01 = Le bande riflesse rilevano una luce tenue che non corrisponde al tono del sole rosso. Ci metti un attimo a capire che stai vedendo Nodens che brilla di rimando.
        #GEPscience_tantares_radiometer_scan_SucellusInSpaceLow_00 = La scansione restituisce una superficie scura, a bassa albedo, che beve la luce fioca e la riemette con riluttanza. L'inerzia termica suggerisce materiale denso sotto una pelle sottile di polvere.
        #GEPscience_tantares_radiometer_scan_SucellusInSpaceLow_01 = Il rumore di un ambiente ad alta energia continua a intrufolarsi nelle letture. Passi più tempo a sottrarre lo spazio che a misurare il pianeta nano.
        #GEPscience_tantares_radiometer_scan_SucellusInSpaceHigh_00 = Mediato sull'intero globo, Sucellus sembra "roccia fredda" con punti caldi sospettosamente interessanti. Se è ricco di metalli, sta facendo un ottimo lavoro a nascondersi in piena vista.
        #GEPscience_tantares_radiometer_scan_SucellusInSpaceHigh_01 = Le bande a onde lunghe mostrano una curva di raffreddamento irregolare che non si adatta a un modello semplice. La etichetti "dati di frontiera" e fai finta che sia una categoria.
        #GEPscience_tantares_radiometer_scan_CaireenInSpaceLow_00 = Caireen è così piccola che il radiometro continua a tentare di misurare lo sfondo, invece. Tiri fuori un segnale dal rumore e ti senti stranamente orgoglioso di un puntino minuscolo e gelido.
        #GEPscience_tantares_radiometer_scan_CaireenInSpaceLow_01 = Vicino a Sucellus, riflessi parassiti e ombreggiature rendono le curve nervose. La luna si comporta come una roccia catturata che non si è mai davvero sistemata.
        #GEPscience_tantares_radiometer_scan_CaireenInSpaceHigh_00 = Dall'orbita alta, Caireen è a malapena un bersaglio, più un fattore di correzione con un nome. Eppure le sue temperature di brillanza non corrispondono a "semplici detriti", e basta questo a preoccuparti.
        #GEPscience_tantares_radiometer_scan_CaireenInSpaceHigh_01 = La scansione coglie una lieve asimmetria che si ripete a ogni passaggio. O la superficie è a chiazze, oppure lo strumento ha sviluppato opinioni sulla solitudine.
        #GEPscience_tantares_radiometer_scan_SironaInSpaceLow_00 = Il radiometro scandisce le cime delle nubi e trova un contrasto brutale: bande luminose e roventi e avvallamenti più freddi che non dovrebbero esistere così vicino a un sole rosso.
        #GEPscience_tantares_radiometer_scan_SironaInSpaceLow_01 = Ogni canale è assordante di atmosfera e calore dei fulmini. Inizi a sottrarre il "meteo" e capisci che non è un numero solo.
        #GEPscience_tantares_radiometer_scan_SironaInSpaceHigh_00 = Dall'orbita alta, il bagliore di Sirona riempie tutta la gamma dinamica dello strumento come se fosse casa sua. Il riferimento è "rosso" e tutto il resto è "più rosso".
        #GEPscience_tantares_radiometer_scan_SironaInSpaceHigh_01 = Gli anelli aggiungono una firma sottile e mutevole che lampeggia e scompare mentre passi. È come se il pianeta provasse a comunicare con statico e ombre.
        #GEPscience_tantares_radiometer_scan_AirmedInSpaceLow_00 = La superficie di Airmed oscilla brutalmente tra il tepore al sole e il freddo da vuoto. La linea del terminatore striscia nei dati come una lama lenta e affilata.
        #GEPscience_tantares_radiometer_scan_AirmedInSpaceLow_01 = La riflettanza a chiazze suggerisce terreno segnato e affioramenti dall'aria fresca. Il Controllo Missione vuole una mappa ordinata, tu consegni qualcosa che sembra un livido.
        #GEPscience_tantares_radiometer_scan_AirmedInSpaceHigh_00 = Mediato, Airmed è solo roccia fredda sotto una debole lampada rossa. Da vicino, il radiometro continua a pescare minuscoli punti caldi che non vogliono farsi spiegare.
        #GEPscience_tantares_radiometer_scan_AirmedInSpaceHigh_01 = I numeri derivano con il bagliore riflesso di Sirona, poi tornano di colpo quando scivoli dietro la luna. Persino le calibrazioni sembrano orbitare attorno a qualcosa di enorme.
        #GEPscience_tantares_radiometer_scan_BorvoInSpaceLow_00 = L'atmosfera di Borvo domina la scansione con ampie bande di assorbimento e una foschia ostinata di fondo. La superficie è lì, da qualche parte, e fa la timida nelle bande termiche.
        #GEPscience_tantares_radiometer_scan_BorvoInSpaceLow_01 = Il lato diurno sembra smorzato, come se il sole filtrasse attraverso una tenda spessa. Etichetti il grafico "serra fredda" e speri che significhi ciò che credi.
        #GEPscience_tantares_radiometer_scan_BorvoInSpaceHigh_00 = In quota, Borvo è una biglia liscia e fioca con una mappa termica sorprendentemente uniforme. L'atmosfera distribuisce il calore con educazione, diversamente da tutto ciò a cui sei abituato.
        #GEPscience_tantares_radiometer_scan_BorvoInSpaceHigh_01 = I canali a onde lunghe suggeriscono lenti cicli meteorologici che non coincidono con il periodo orbitale. Con il ritardo delle comunicazioni, ti sembra di ascoltare sempre le previsioni di ieri.
        #GEPscience_tantares_radiometer_scan_DamonaInSpaceLow_00 = Damona si fa notare a malapena finché non ti avvicini abbastanza da smettere di misurare il vuoto. Il segnale che ottieni è freddo, scuro e ostinatamente costante.
        #GEPscience_tantares_radiometer_scan_DamonaInSpaceLow_01 = La scansione mostra bruschi crolli termici nei crateri in ombra. È il tipo di freddo che ti fa controllare se lo strumento sia ancora acceso.
        #GEPscience_tantares_radiometer_scan_DamonaInSpaceHigh_00 = In orbita alta, Damona diventa un minuscolo fattore di correzione con un nome. La sua temperatura di brillanza resta vicino al minimo e si rifiuta di essere interessante.
        #GEPscience_tantares_radiometer_scan_DamonaInSpaceHigh_01 = Una lieve asimmetria si ripete a ogni passaggio: o la superficie è a chiazze, oppure il radiometro sta sviluppando un gusto per la solitudine ai margini del sistema.
        #GEPscience_tantares_radiometer_scan_EponaInSpaceLow_00 = Il radiometro rileva forti bande atmosferiche e un bagliore freddo che non combacia con il tuo istinto. Qualunque meteo abbia Epona, sotto quel sole rosso debole sta facendo quasi tutto il lavoro.
        #GEPscience_tantares_radiometer_scan_EponaInSpaceLow_01 = I canali in luce riflessa tornano smorzati, come se il pianeta indossasse un velo. Le bande termiche suggeriscono un interno più caldo che sta facendo di tutto per non lasciar trapelare i suoi segreti.
        #GEPscience_tantares_radiometer_scan_EponaInSpaceHigh_00 = Dall'orbita alta, Epona si riduce a "freddo tranquillo" con sospette differenze regionali. Passi un intero passaggio a discutere con la calibrazione e perdi per via del ritardo radio.
        #GEPscience_tantares_radiometer_scan_EponaInSpaceHigh_01 = La scansione del lembo mostra un'atmosfera spessa che piega la luce in gradienti insoliti. Sembra di misurare un mondo attraverso gli occhiali di qualcun altro.
        #GEPscience_tantares_radiometer_scan_RosmertaInSpaceLow_00 = Il lato diurno di Rosmerta si scalda quel tanto che basta a dimostrare di esistere, poi ricade subito nel freddo profondo dell'ombra. I numeri sembrano soli e taglienti, come impronte fresche nel vuoto.
        #GEPscience_tantares_radiometer_scan_RosmertaInSpaceLow_01 = Il rumore ad alta energia continua a infiltrarsi nei canali mentre sfiori il corpo. Lo sottrai e hai comunque la sensazione che ti stia fissando alle spalle.
        #GEPscience_tantares_radiometer_scan_RosmertaInSpaceHigh_00 = In quota, Rosmerta è un puntino pallido e gelido con una curva termica che non si rilassa mai del tutto. Persino le parti "calde" sono solo meno fredde di quanto sperassi.
        #GEPscience_tantares_radiometer_scan_RosmertaInSpaceHigh_01 = Il radiometro coglie un lieve aumento quando Epona riempie il cielo sotto di te. Non è luce solare: è luce presa in prestito, e si vede.
        #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceLow_00 = Da vicino, la scansione oscilla tra chiazze luminose dall'aria ghiacciata e materiale più scuro che trattiene il calore. Non riesce a decidere se sia una roccia, una palla di neve o una discussione.
        #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceLow_01 = I minimi cambi di assetto cambiano tutto, perché il bersaglio è a malapena più grande della tua incertezza. Archivi il dataset come "piccola luna, grosso problema".
        #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceHigh_00 = In orbita alta, RAB-58E misura soprattutto come "sfondo con un nome". Il segnale è reale, ma è timido e continua a nascondersi nel pavimento di rumore.
        #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceHigh_01 = Compare un'asimmetria ricorrente una volta per passaggio, come una cicatrice che noti solo con l'angolo giusto. La segni per un controllo successivo e ti chiedi quanto lontano sia "successivo" da qui.
        #GEPscience_tantares_radiometer_scan_CernunnosInSpaceLow_00 = Il radiometro mappa una superficie che beve la luce rossa e la riemette con riluttanza. Chiazze brinose lampeggiano fredde nelle bande termiche come avvertimenti.
        #GEPscience_tantares_radiometer_scan_CernunnosInSpaceLow_01 = Alcune regioni si raffreddano più lentamente del resto, suggerendo materiale denso o volatili sepolti. Il Controllo Missione chiede una spiegazione semplice, tu gli mandi un silenzio complicato.
        #GEPscience_tantares_radiometer_scan_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos sembra una reliquia fredda ai confini: stabile, fioca e inutilmente calma. Persino il valore di riferimento sembra lontano da casa.
        #GEPscience_tantares_radiometer_scan_CernunnosInSpaceHigh_01 = I canali a onde lunghe mostrano una lieve inclinazione stagionale che non riesci a sincronizzare con l'orbita e il ritardo radio. Ti rendi conto che stai osservando un mondo lento da una macchina veloce.

        // tantares_sp_xray_spectrometer
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthPolarZone_00 = Lo spettro è tutto picchi roventi e rumore ostile, il rivelatore chiede educatamente un bersaglio meno "a forma di stella". L'attività polare fa deragliare la calibrazione, come se stesse cercando di scappare.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthSubpolarZone_00 = Le righe ai raggi X aumentano e calano a bande, come se Grannus respirasse attraverso lo strumento. La lettura arriva al Controllo Missione quando tutti hanno già finito di litigare sull'interpretazione.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthTemperateZone_00 = Il segnale si stabilizza quel tanto che basta per registrare qualche traccia di elementi più pesanti, poi un altro brillamento cancella ogni sicurezza. Qualcuno scrive "forse non è una roccia" a margine.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowNorthTropicZone_00 = Lo spettrometro cattura brevi impulsi netti, come se la stella stesse colpendo lo strumento con elettricità statica. Tieni le serrande a metà e speri che conti come coraggio.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowEquatorialZone_00 = La fascia equatoriale è luminosa, liscia e del tutto disinteressata alle tue belle baseline pulite. Lo spettro sembra un codice a barre fatto da qualcuno che scrive su un trampolino.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthTropicZone_00 = Una calda colata di emissione riempie i canali, poi crolla in una tempesta frastagliata di picchi. Il computer di bordo lo etichetta "normale" e tu ti senti giudicato.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthTemperateZone_00 = I ritorni suggeriscono una regione più calma, finché un picco improvviso non costringe lo strumento in modalità sicura. Registri l'evento come "luce solare inattesa, nello spazio".
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthSubpolarZone_00 = Lo spettrometro mappa sottili cambiamenti nella fasciatura, ma il ritardo fa sembrare che tu stia studiando la storia invece del meteo. Grannus resta orgogliosamente poco collaborativo.
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceLowSouthPolarZone_00 = Le letture polari salgono tanto da scaldare l'alloggiamento del rivelatore. Ora capisci perché la checklist di sicurezza ha tre righe separate per "non fissare".
        #GEPscience_tantares_sp_xray_spectrometer_GrannusInSpaceHigh_00 = Dall'orbita alta, Grannus è quasi solo una luminosità ai raggi X travolgente, con rari indizi che da qualche parte nel caos esista roba più pesante. Il rapporto finale conclude: "Stella confermata".
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowMagmaSea_00 = Sopra il mare di lava i picchi di fluorescenza saltano come se stessero cercando di uscire dal grafico. Il rivelatore festeggia per "aver trovato metalli luccicanti" finché il Controllo Missione non ti ricorda che è solo uno spettro.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowScorchedLowlands_00 = I bassopiani arsi, cotti dal sole, rimandano un segnale forte e pulito: silicati e metalli accesi sotto Grannus come un cartello di avvertimento. Lo strumento resta occupato, tu resti nervoso.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowMidlands_00 = Le pianure sembrano un miscuglio compositivo, come se la superficie non sapesse decidere se vuole essere basalto o qualcosa di più leggero. Qui i passaggi di mappatura volano, come se Taranis ti stesse mettendo fretta.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowHighlands_00 = I ritorni dalle colline tendono a firme crostali più leggere, con meno picchi pesanti rispetto alle pianure più calde. Lo segni come "interessante" e finisci subito il tempo sul terminatore.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowDarkSideMidlands_00 = Sul lato in ombra lo spettrometro registra soprattutto ritorni deboli e rumorosi, e parecchi dubbi esistenziali dello strumento. La notte del pianeta è così profonda che quasi senti i pacchetti dati rabbrividire.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowDarkSideHighlands_00 = Le colline in ombra danno appena abbastanza segnale da suggerire che la roccia esista, il che è rassicurante in modo molto minimale. Ricontrolli che il coperchio sia chiuso e lo chiami scan riuscito.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceLowPoles_00 = I passaggi sui poli mostrano una chimica a chiazze, come se lo stress termico avesse ordinato i minerali in bande. La mappa è brutta, ma è una brutta onesta.
        #GEPscience_tantares_sp_xray_spectrometer_TaranisInSpaceHigh_00 = Dall'orbita alta, Taranis si riduce alla media di due mondi diversi: una faccia luminosa e arsa e una fioca e quieta, con poco da restituire. Lo spettro globale urla "vicino alla stella" senza usare parole.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani illuminati fluorescono con forza, con caratteristiche di ferro e silicati che spiccano nonostante la foschia sottile e ricca di CO₂ rosicchi il segnale. Il lato diurno è così rumoroso che lo strumento continua a chiedere se per caso volevi puntare Grannus.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowSunnyHighlands_00 = Le colline illuminate tendono a essere più leggere nello spettro, con meno picchi pesanti rispetto ai bassopiani. Inizi a tracciare un confine compositivo e poi ricordi che lo stai facendo con ritardo e congetture.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowTransitionalLowlands_00 = La zona di transizione sembra uno spettro miscelato: alcune firme del lato caldo, un po' di quiete del lato buio. È l'equivalente chimico di restare sulla soglia senza decidersi.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowTransitionalHighlands_00 = Le colline crepuscolari mostrano sottili spostamenti da un passaggio all'altro, come se gli strati superficiali cambiassero a ogni ciclo termico. Il Controllo Missione suggerisce "altre orbite", come se avessi pazienza infinita.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani in ombra restituiscono una fluorescenza debole, sepolta sotto il rumore di fondo e i mugugni dello strumento. Registri "bassa illuminazione" e senti la solitudine di fare scienza al buio.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowDarkSideHighlands_00 = Le colline in ombra fluorescono a malapena attraverso l'atmosfera sottile, lasciando soprattutto indizi larghi e incertezza. Lo spettrometro produce un grafico bellissimo di quasi nulla.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowSoutheasternMountains_00 = Gli spettri delle montagne sud-orientali mostrano caratteristiche di elementi pesanti più nette del terreno circostante, suggerendo materiale più denso o strati esposti. Qualcuno chiede subito se questo significhi "minerale", e tu fai finta di non sentire.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowWesternMountains_00 = Le montagne occidentali danno una firma marezzata: possibile crosta mescolata da impatti con sacche di righe metalliche più forti. La mappa sembra assemblata da cartoline arrivate in ritardo.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne in ombra danno picchi intermittenti quando la geometria è quella giusta, poi ricadono nel silenzio. Ti senti stranamente orgoglioso di ogni fotone che arriva nel rivelatore.
        #GEPscience_tantares_sp_xray_spectrometer_ToutatisInSpaceHigh_00 = L'orbita alta media Toutatis in un contrasto emisferico netto: chimica luminosa e attiva sul lato arso e ritorni smorzati dalla notte gelata. L'adattamento globale finale include una nota: "Atmosfera presente, segnale leggermente rosicchiato".
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowSaltySeas_00 = I mari salati fluorescono in deboli sussurri salmastri sotto l'abbaglio rosso di Grannus, l'atmosfera ruba metà dei fotoni e tutta la tua sicurezza.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowFreshWater_00 = Sopra l'acqua dolce interna emerge una firma più morbida, come se il pianeta provasse a sembrare accogliente da molto lontano. I dati arrivano tardi, ma sembrano comunque stranamente vivi.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowShores_00 = Lo spettro della costa passa rapidamente tra chimica bagnata e asciutta mentre attraversi il confine. Il Controllo Missione lo chiama "interessante", lo strumento lo chiama "intenso".
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTropicalLowlands_00 = I bassopiani tropicali restituiscono righe metalliche più forti del previsto, come se la crosta fosse cotta dal sole appena sotto le nubi. Ti chiedi cosa significhi "tropicale" sotto un sole rosso così fioco.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTemperateLowlands_00 = Il segnale si stabilizza in un pratico mix di silicati e ferro, quasi familiare, finché un picco strano non ti ricorda che non sei a casa. Il ritardo delle comunicazioni fa sembrare tutto la lettura di una cartolina.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano una composizione a strati, come se tempo e meteo avessero ordinato la superficie al posto tuo. Lo spettrometro lo registra diligentemente mentre tu fissi il lembo illuminato di rosso.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTemperateMidlands_00 = Lo spettro suggerisce una crosta a mosaico con sacche di materiale più pesante. Provi a dare un nome ai disegni, poi ricordi che non hai mai visto un pianeta così prima.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowHighlands_00 = I ritorni dalle colline tendono a firme più leggere, con occasionali righe nette che accennano a roccia esposta e ostinata. Sembra che Nodens ti lasci sbirciare dietro le nubi, per un attimo.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowTundra_00 = Le regioni fredde danno una fluorescenza smorzata, come se la superficie trattenesse il respiro. Lo strumento compensa, tu aggiungi "quieto ma non vuoto" alle note.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate riflettono un segnale sottile e fragile, con abbastanza righe minerali da provare che c'è terreno sotto il ghiaccio. Sotto Grannus, perfino le parti più luminose sembrano attenuate.
        #GEPscience_tantares_sp_xray_spectrometer_NodensInSpaceHigh_00 = Dall'orbita alta, Nodens si riduce a uno spettro globale calmo con piccole anomalie ostinate che si rifiutano di smussarsi. Sulla carta il pianeta sembra abitabile, nella pratica resta misterioso.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowFlats_00 = I terreni piatti fluorescono puliti nel vuoto, picchi netti senza sfocature atmosferiche dietro cui nascondersi. La notte del blocco mareale lì vicino rende quella luminosità quasi invadente.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTropicalLowlands_00 = Le firme dei bassopiani tropicali tornano dense e metalliche a tratti, come se vecchi impatti avessero rimescolato la crosta lasciando le parti pesanti più vicino alla superficie. Lo archivi sotto "future discussioni sulle trivelle".
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTemperateLowlands_00 = Qui domina un disegno più stabile, simile al basalto, pratico e poco romantico. La luce rossa di Grannus fa comunque sembrare tutto il mondo illuminato da una lampada di avvertimento.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano righe minerali miste, come se Belisama non sapesse decidersi di cosa essere fatta. Il pacchetto dati arriva abbastanza tardi da sembrare preregistrato.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowTemperateMidlands_00 = Sottili spostamenti nello spettro scorrono attraverso le pianure temperate, suggerendo un'inarrestabile selezione superficiale dovuta ai cicli termici. Quasi senti la roccia scricchiolare.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowHighlands_00 = I picchi delle colline si fanno più netti e luminosi: materiale esposto e poco alterato, senza aria in cui nascondersi nel freddo del vuoto. Nodens incombe enorme nel cielo come un pubblico.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceLowPoles_00 = Le letture ai poli sono a chiazze, con strani picchi che compaiono e spariscono al cambiare della geometria di illuminazione. Lo strumento insiste che sia reale, tu ci credi, a malincuore.
        #GEPscience_tantares_sp_xray_spectrometer_BelisamaInSpaceHigh_00 = Dall'orbita alta, Belisama è uno spettro piccolo e duro: righe nitide, contrasti severi e la sensazione di essere molto lontani da qualunque cosa confortante. Persino il silenzio sembra misurato.
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowBasins_00 = Sopra i bacini, lo spettro si affila in picchi di elementi pesanti che sembrano quasi troppo ansiosi di essere reali. Sotto la debole luce rossa di Grannus, "ricco di risorse" somiglia meno a una promessa e più a una sfida.
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowLowlands_00 = I bassopiani restituiscono un mix più stabile di silicati e metalli, come se la superficie fosse stata macinata e selezionata per ere. La mappa arriva con grande ritardo, come se Sucellus ti stesse raccontando i segreti di ieri.
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano una chimica marezzata: chiazze di righe metalliche più luminose cucite dentro roccia più scura. Qualcuno cerchia le anomalie e scrive "catturato? collisione? infestato?" prima di ricordarsi che questo è uno spettrometro.
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowTemperateMidlands_00 = I picchi derivano lievemente da un passaggio all'altro, suggerendo strati con composizioni diverse che affiorano attraverso un regolite sottile. Lo strumento lo chiama "variazione", il Controllo Missione lo chiama "altre orbite, per favore".
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowHighlands_00 = Le firme delle colline tendono al leggero, con occasionali picchi nitidi da materiale esposto e ostinato. Il freddo senza aria mantiene le righe pulite, ma gli avvisi di radiazione rendono l'equipaggio più silenzioso del solito.
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceLowPoles_00 = Le letture ai poli saltano con l'angolo di illuminazione, accendendo brevi caratteristiche nette prima di ricadere nel rumore. Sembra che il pianeta nano stia girando un angolo riflettente lontano dalla tua scansione.
        #GEPscience_tantares_sp_xray_spectrometer_SucellusInSpaceHigh_00 = Dall'orbita alta, Sucellus si riduce alla media di uno spettro denso e tendente ai metalli, con abbastanza stranezze da impedire la fiducia. La conclusione arriva per prima, la spiegazione rassicurante non arriva mai.
        #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowLowlands_00 = I bassopiani della piccola luna fluorescono debolmente ma in modo pulito, una firma sottile con qualche riga metallica ostinata. Sembra una roccia catturata che si impegna molto a far finta di appartenere a questo posto.
        #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowMidlands_00 = I ritorni dalle pianure sono a chiazze, come se frammenti diversi fossero stati saldati insieme senza mai mescolarsi davvero. Lo spettro sembra assemblato, cosa appropriata per qualcosa che forse non si è formato qui.
        #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowHighlands_00 = I picchi delle colline si affilano in indizi più luminosi di elementi pesanti, suggerendo affioramenti più freschi o blocchi più densi vicino alla superficie. Festeggi "aver trovato pezzi luccicanti" finché il pacchetto successivo non arriva e complica tutto.
        #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceLowPoles_00 = Le scansioni ai poli riportano per lo più silenzio, con occasionali picchi stretti quando la geometria collabora. Perfino i fotoni sembrano riluttanti quassù, sotto Grannus.
        #GEPscience_tantares_sp_xray_spectrometer_CaireenInSpaceHigh_00 = L'orbita alta riduce Caireen a una tenue impronta da asteroide con qualche accento metallico. La scienza migliore è confermare che esiste, e che ancora non ti sta dicendo da dove viene.
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowDarkTropicalBands_00 = Le bande tropicali scure danno un bagliore ai raggi X rumoroso e atmosferico, senza alcun segno di qualcosa di "superficiale" che possa fluorescere. La magnetosfera aggiunge ulteriore agitazione che lo strumento non aveva richiesto.
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowLightTropicalBands_00 = Nelle bande tropicali chiare, lo spettro si illumina con emissione diffusa guidata dal sole e con alcune righe sconcertanti che si rifiutano di restare ferme. Annoti: "a quanto pare anche il gas può scintillare".
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowDarkTemperateBands_00 = Le bande temperate scure mostrano caratteristiche ampie, spalmate da profondità e pressione, come se il segnale venisse rosicchiato mentre esce. La lettura è metà fisica e metà meteo, tutta lontana da casa.
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowLightTemperateBands_00 = Le bande temperate chiare restituiscono conteggi più forti, poi impennano all'improvviso quando le particelle cariche scuotono il rivelatore. Il Controllo Missione suggerisce "schermatura", Sirona suggerisce "buona fortuna".
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowDarkPolarBands_00 = Le bande polari scure si accendono di raggi X aurorali e rumore guidato dalle particelle, uno spettro che somiglia più a telemetria di radiazione che a composizione. Chiudi piano lo sportello del rivelatore e fingi che serva.
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare brillano a raffiche che seguono i violenti sbalzi d'umore magnetici del pianeta. Sotto il sole rosso e fioco, i poli riescono comunque a sembrare luminosi e un po' sinistri.
        #GEPscience_tantares_sp_xray_spectrometer_SironaInSpaceHigh_00 = Dall'orbita alta, Sirona diventa una foschia globale di emissione atmosferica avvolta da un'interferenza magnetosferica estrema. Riassunto ufficiale: "spettacolare". Riassunto ufficioso: "per favore, trasmettere più lentamente".
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTropicalLowlands_00 = I bassopiani tropicali fluorescono con un bordo duro e metallico, la crosta malconcia di Airmed non si prende la briga di fingere delicatezza. Lo spettro arriva a casa molto dopo gli avvisi di brillamento.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTemperateLowlands_00 = I picchi si addensano in un mix inquieto di silicati e tracce più pesanti, come se qualcuno avesse scosso la luna e qui si fossero depositati i pezzi densi. La luce rossa fa sembrare la baseline perennemente "sbagliata".
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTropicalMidlands_00 = Le pianure tropicali sembrano cicatrici a strati: righe pulite, poi strani picchi improvvisi che spariscono al passaggio successivo. Il Controllo Missione chiede ripetizioni, Airmed risponde con rumore di radiazione.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowTemperateMidlands_00 = La fluorescenza è abbastanza stabile da mappare, finché i contatori del rivelatore non iniziano a salire per ragioni che non hanno nulla a che fare con la geologia. Annoti: "composizione probabilmente corretta, umore meno".
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowHighlands_00 = I ritorni dalle colline sono netti e radi, materiale esposto senza alcun posto dove nascondersi nel freddo senza aria. Allo strumento piace, l'equipaggio preferisce le serrande di sicurezza.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowDarkenedLowlands_00 = Sopra i bassopiani scuri lo spettro cambia come se la chimica della superficie avesse cambiato idea a metà orbita. Inizi a capire il problema "bicolore" in lunghezze d'onda decisamente poco amichevoli.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowDarkenedMidlands_00 = Il rivelatore cattura picchi stretti su un fondo ruvido, come se la luna sussurrasse attraverso lo statico. Il ritardo fa sembrare di ascoltare una vecchia registrazione di una cicatrice appena fatta.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowDarkenedHighlands_00 = Le colline scure danno righe nette che non corrispondono al disegno del lato più luminoso, e questa è la versione educata di ciò che dicono i dati. Qualcuno scrive "mescolamento da impatto?" e lo sottolinea tre volte.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceLowPoles_00 = I passaggi ai poli sfarfallano tra fluorescenza pulita e improvvisi picchi dei contatori, come se l'ambiente stesso stesse tirando sassolini contro il sensore. La mappa sembra cucita insieme da occhiate caute.
        #GEPscience_tantares_sp_xray_spectrometer_AirmedInSpaceHigh_00 = Dall'orbita alta, Airmed si riduce alla media di un'impronta dura e senza aria, con un persistente retrogusto da "qui è successo qualcosa". Sirona riempie il cielo, e lo spettro riesce comunque a sembrare solo.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTropicalCraquelure_00 = Il terreno crepato restituisce picchi ampi e smorzati, con l'assorbimento atmosferico che morde ogni bella caratteristica. Metano e distanza fanno arrivare persino i buoni dati con un accento nebuloso.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTemperateCraquelure_00 = Le firme della crettatura temperata variano da lastra a lastra, come se la superficie fosse stata stressata e ordinata dalla chimica. Lo strumento segnala "eterogeneo" e tu, in silenzio, concordi.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali fluorescono più del previsto attraverso l'aria sottile, suggerendo materiale più denso sotto un velo beige polveroso. Lo spettro sembra promettente, il ritardo radio lo fa sembrare una voce.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTemperateLowlands_00 = I ritorni si assestano in un pratico mix di silicati con righe metalliche ostinate che si rifiutano di smussarsi. Sospetti che c'entrino sia ghiaccio sia roccia, e nessuno dei due vuole parlare.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTropicalMidlands_00 = I picchi delle pianure tropicali derivano lievemente al cambiare della geometria, suggerendo stratificazione o copertura a chiazze sotto la foschia. Programmi un altro passaggio e fai finta che risolva il mistero.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowTemperateMidlands_00 = Una fascia più fresca produce caratteristiche più pulite, ma l'atmosfera sfoca comunque i dettagli più fini come una sbavatura accurata. La luna grande come un pianeta resta determinata a essere "qualcosa di inimmaginato".
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowHighlands_00 = Gli spettri delle colline si illuminano in firme più leggere con meno picchi pesanti, come se l'alta quota raccontasse tutt'altra storia. Il rivelatore lo registra, tu ti chiedi cosa stia facendo il meteo alle pagine.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowMajorCraters_00 = Sopra i crateri maggiori le righe si affilano e si intensificano, materiale esposto che buca il travestimento insipido della superficie. Qualcuno chiede di "risorse" e lo scienziato dentro di te sospira in modo udibile.
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceLowPoles_00 = Le scansioni polari mostrano fluorescenza a chiazze che va e viene con foschia e angolo, come se l'aria stesse montando i tuoi risultati. Il riassunto dice: "dati buoni, fiducia in attesa".
        #GEPscience_tantares_sp_xray_spectrometer_BorvoInSpaceHigh_00 = Dall'orbita alta, Borvo diventa uno spettro globale addolcito, grande, atmosferico e ostinatamente ambiguo. Sotto il sole rosso e fioco, perfino un mondo intero può sembrare un punto interrogativo.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali fluorescono debolmente ma in modo pulito nel vuoto, una firma sottile con qualche indizio pesante nascosto dentro. Il freddo rende le righe nette, la radiazione rende i contatori nervosi.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTemperateLowlands_00 = Domina un disegno stabile, simile al basalto, poi un picco vagante ti ricorda che Damona ha una storia violenta e nessuna intenzione di essere ordinata. Lo segni: "ripetere con meno radiazione".
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTropicalMidlands_00 = Le pianure tropicali sembrano regolite rimescolata sopra roccia più antica, firme miste che non si fondono del tutto. Quando lo spettro arriva, hai già cambiato ipotesi due volte.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowTemperateMidlands_00 = Sottili spostamenti suggeriscono strati diversi che affiorano attraverso una coperta superficiale sottile, come se la luna si stesse lentamente rivoltando. La luce rossa fa sembrare ogni grafico appena più minaccioso.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowHighlands_00 = Le colline mostrano picchi netti e radi, materiale esposto e butterato senza alcun posto dove nascondersi e senza aria che lo addolcisca. Il rivelatore è entusiasta, l'equipaggio no.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowImpactBasin_00 = Il bacino si accende di caratteristiche più nette e più pesanti, un livido chimico che non è ancora sbiadito. Fissi i picchi e senti la distanza più della scienza.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceLowPoles_00 = I passaggi ai poli sono quieti, quasi educati, finché una raffica di conteggi di fondo non interrompe la pace. La recita da "orbita sterile" di Damona ha ancora qualche spigolo.
        #GEPscience_tantares_sp_xray_spectrometer_DamonaInSpaceHigh_00 = Dall'orbita alta, Damona è un'impronta piccola e severa: senza aria, fredda e fastidiosamente intrigante. Il grafico finale arriva tardi e riesce comunque a sembrare immediato.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTropicalLowlands_00 = Lo spettro torna smorzato dall'aria fredda di Epona, ma i bassopiani tropicali fanno comunque lampeggiare righe di ferro e silicati quando il sole rosso e fioco colpisce nel modo giusto. Metà del segnale è "superficie", l'altra metà è "atmosfera che aiuta a modo suo".
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTemperateLowlands_00 = Una fluorescenza più stabile e più debole suggerisce ampie pianure ghiacciate con granelli minerali mescolati. Il passaggio di mappatura sembra leggere una firma tenue attraverso un vetro smerigliato.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTropicalUplands_00 = Gli altopiani tropicali mostrano picchi più netti dei bassopiani, come se materiale più pulito facesse capolino attraverso una brina più sottile. Il Controllo Missione festeggia per "aver trovato metalli luccicanti" dopo un lungo ritardo, come se fosse ancora una novità.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowTemperateUplands_00 = I ritorni cambiano lievemente attraverso gli altopiani temperati, accennando a stratificazioni sotto la crosta superficiale. I grafici sembrano sicuri finché non ricordi che qui il sole è rosso, lontano e per nulla prevedibile.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowHighlands_00 = La fluorescenza delle colline è a chiazze e attenuata, coerente con una crosta fredda e dura che non ha voglia di brillare per nessuno. L'atmosfera taglia le righe più deboli come se stesse revisionando il tuo rapporto.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowGrandPeaks_00 = Sopra i grandi picchi, il rivelatore cattura picchi nitidi che suggeriscono roccia esposta in lotta con il ghiaccio. Qualcuno chiede se sia "minerale di montagna", e lo strumento risponde con più dati che sarcasmo.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowCraters_00 = I bordi dei crateri si illuminano in caratteristiche di elementi più pesanti, come se gli impatti avessero scavato i pezzi interessanti e li avessero lasciati allo scoperto. La mappa arriva abbastanza tardi da sembrare un resoconto storico di cicatrici fresche.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowVolcanoes_00 = Le province vulcaniche mostrano una firma più calda e ricca di metalli del terreno circostante, come se l'interno di Epona si ricordasse ancora come si fa a essere attivo. Lo spettrometro consiglia un altro passaggio, i tuoi nervi consigliano un'orbita più sicura.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceLowPoles_00 = Le scansioni ai poli sono fioche e rumorose, con occasionali righe minerali che affiorano attraverso la foschia come confessioni riluttanti. Anche le regioni "luminose" sembrano stanche, così lontano sotto Grannus.
        #GEPscience_tantares_sp_xray_spectrometer_EponaInSpaceHigh_00 = Dall'orbita alta, Epona si riduce alla media di uno spettro da mondo ghiacciato, con fluorescenza superficiale attenuata e una forte influenza atmosferica. La conclusione è chiara, i dettagli impiegano molto ad arrivare.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceLowTropicalLowlands_00 = I bassopiani tropicali senza aria di Rosmerta danno picchi puliti e netti: nessuna atmosfera dietro cui nascondersi, solo regolite fredda e ciò di cui è fatta. I contatori di radiazione salgono comunque, come se lo spazio ti stesse spiando alle spalle.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano un pratico mix di silicati con alcune righe metalliche ostinate. È il tipo di spettro che dice "roccia ordinaria", in un sistema dove nulla sembra ordinario.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceLowTropicalMidlands_00 = I ritorni dalle pianure tropicali sembrano misti, come se polvere fine fosse stata sollevata e ridepositata su materiale più antico. Il segnale è nitido, l'interpretazione no.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceLowTemperateMidlands_00 = Sottili variazioni attraverso le pianure temperate suggeriscono un mosaico compositivo, come se Rosmerta fosse stata assemblata con avanzi e non si fosse mai omogeneizzata. I dati arrivano tardi, ma la solitudine sembra immediata.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceLowHighlands_00 = Le colline fluorescono un po' più luminose, con caratteristiche più nette che suggeriscono affioramenti più freschi. Qualcuno scherza sul "fare una radiografia a Rosmerta", e tutti smettono subito di scherzare.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceLowPoles_00 = I passaggi ai poli sono quieti, spettri sottili con abbastanza righe minerali da provare che il suolo è ancora lì sotto la brina. Il vuoto è così totale che sembra una misura.
        #GEPscience_tantares_sp_xray_spectrometer_RosmertaInSpaceHigh_00 = Dall'orbita alta, Rosmerta si riduce a una piccola impronta nitida: senza aria, fredda e chimicamente contenuta. Il rapporto è breve perché lo è anche la luna.
        #GEPscience_tantares_sp_xray_spectrometer_RAB-58EInSpaceLowLowlands_00 = I bassopiani danno uno spettro tenue, da asteroide, con alcuni picchi luminosi che non combaciano del tutto con "roccia" o "ghiaccio" in modo pulito. Il piccolo satellite tiene per sé la sua storia d'origine.
        #GEPscience_tantares_sp_xray_spectrometer_RAB-58EInSpaceLowEasternHighlands_00 = Le colline orientali mostrano picchi più netti e indizi leggermente più forti di elementi pesanti, come se frammenti più densi fossero concentrati qui. Cerchi il grafico e riscrivi "catturato... da dove?".
        #GEPscience_tantares_sp_xray_spectrometer_RAB-58EInSpaceLowWesternHighlands_00 = Le colline occidentali sembrano diverse nella composizione: meno collaborative, più marezzate e irritantemente interessanti. Il rivelatore insiste che sia reale, tu ci credi perché l'alternativa è la noia.
        #GEPscience_tantares_sp_xray_spectrometer_RAB-58EInSpaceHigh_00 = Dall'orbita alta, RAB-58E è una firma fioca e ambigua con abbastanza struttura da far nascere discussioni. Il ritardo delle comunicazioni garantisce che quelle discussioni avvengano due volte.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowTropicalLowlands_00 = La fluorescenza dei bassopiani tropicali è debole e ampia, coerente con suolo ghiacciato spolverato di materiale più scuro che mangia le righe più deboli. Sotto il sole rosso, perfino il ghiaccio "luminoso" sembra attenuato.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowTemperateLowlands_00 = Uno spettro sottile suggerisce ghiacci misti e granelli minerali, con solo occasionali picchi di elementi pesanti. Il passaggio di mappatura sembra ascoltare passi nella neve profonda.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowTropicalMidlands_00 = Le pianure tropicali mostrano una composizione a chiazze, come se la selezione superficiale avesse concentrato materiali diversi in bande tranquille. Il pacchetto dati arriva tardi, come se avesse fatto il giro lungo del sistema.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowTemperateMidlands_00 = I ritorni cambiano lievemente con l'angolo di illuminazione, accennando a depositi stratificati e sacche esposte di roba più densa. Lo spettrometro registra tutto con la calma di uno strumento che non prova isolamento.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowHighlands_00 = Le colline danno righe più nette e più pulite: meno sfocature, più fiducia, e comunque non abbastanza certezza da dormire tranquilli. Il materiale esposto sembra antico, freddo e pazientemente estraneo.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowSouthPolarHills_00 = Le colline polari meridionali producono picchi intermittenti che compaiono e spariscono con la geometria, come se la superficie ti stesse mostrando spigoli riflettenti. Lo consideri un successo quando il rivelatore non va in panico.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceLowNorthPole_00 = Il Polo Nord è quasi solo fluorescenza tenue su una baseline fredda, con alcune firme minerali ostinate che fanno capolino. È quieto in un modo che sembra intenzionale.
        #GEPscience_tantares_sp_xray_spectrometer_CernunnosInSpaceHigh_00 = Dall'orbita alta, Cernunnos diventa una media morbida da mondo ghiacciato con piccole anomalie che si rifiutano di smussarsi. Il riassunto dice "pianeta nano", ma lo spettro dice "non sei solo quassù".

        // tantares_ultraviolet_light_camera
        #GEPscience_tantares_ultraviolet_light_camera_GrannusFlyingLow_00 = La camera UV registra una foschia viola accecante e granulosa mentre sfiori gli strati esterni della nana rossa, il flusso arriva con pochi secondi di ritardo e sembra comunque troppo vicino.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusFlyingHigh_00 = Deboli increspature UV strisciano lungo il lembo della stella come fulmini lenti, il Controllo Missione chiede "più contrasto" da diversi minuti di distanza.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceHigh_00 = Da molto in alto, Grannus sembra calma alla luce visibile ma marezzata in UV, come se stesse pianificando in silenzio qualcosa di energetico.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthPolarZone_00 = Il bagliore UV polare va e viene a chiazze sfrangiate, come una bussola che non sa più decidere dove sia il "nord".
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthSubpolarZone_00 = Sottili filamenti UV attraversano la zona sub-polare settentrionale, sfarfallando in schemi che sarebbero bellissimi se non fossero anche allarmanti.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthTemperateZone_00 = Qui la camera trova ampie corsie scure in UV, interrotte da improvvisi nodi luminosi che mandano nel panico le impostazioni di esposizione.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowNorthTropicZone_00 = Una fascia di luminosità UV scorre sotto di te, sembra una tempesta che non puoi sentire, solo misurare.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowEquatorialZone_00 = La zona equatoriale sboccia in un duro abbaglio UV che soffoca i dettagli più sottili, registri "ridurre il fissare la stella" come buona pratica.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthTropicZone_00 = La mappa UV mostra bordi festonati lungo le bande, come cicatrici di calore tracciate dentro la luce stessa.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthTemperateZone_00 = Catturi la firma di un breve brillamento UV, quando arriva la conferma, è già storia.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthSubpolarZone_00 = La zona sub-polare meridionale sembra quieta, poi si illumina di colpo in un modo che ti fa controllare il tappo dell'obiettivo due volte.
        #GEPscience_tantares_ultraviolet_light_camera_GrannusInSpaceLowSouthPolarZone_00 = Un pallido alone UV incorona la zona polare meridionale, è delicato, inquietante e di certo non qualcosa che vorresti dal lato senza schermatura.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceHigh_00 = In UV, il piccolo mondo si divide nettamente tra bruciatura luminosa e oscurità morta, la linea del terminatore è così affilata che sembra un'etichetta di avvertimento.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowMagmaSea_00 = Il mare di lava brucia in UV come se il pianeta fosse illuminato dall'interno, per un attimo consideri di usarlo per leggere minuscole etichette di avvertimento.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowMagmaShores_00 = La costa lavica mostra disegni di crosta luminosi in UV che sembrano dipinti freschi dal calore, e poi prontamente cancellati da esso.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowScorchedLowlands_00 = Striature scure in UV tagliano i bassopiani arsi come impronte bruciate, il ritardo nel downlink le fa sembrare ancora più aliene.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowMidlands_00 = Le pianure fluorescono a chiazze irregolari, suggerendo minerali che ammettono i loro segreti solo sotto un sole rosso spietato.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowHighlands_00 = Creste elevate lampeggiano luminose in UV lungo i bordi, come se la roccia stesse cercando di far brillare via il proprio calore.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowDarkSideMidlands_00 = Le pianure in ombra non riflettono quasi alcun UV, la camera passa gran parte del giro a dimostrare "sì, è ancora accesa".
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowDarkSideHighlands_00 = Le colline in ombra sull'emisfero notturno mostrano deboli scintille UV, come vetro freddo che cattura una luce distante e riluttante.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisInSpaceLowPoles_00 = I poli alternano fragilità luminosa in UV e profonda penombra, a seconda di quale emisfero stia guardando la fornace.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedMagmaShores_00 = Da vicino, la crosta della costa lavica fluoresce in crepe a ragnatela, la camera rivela anche una striscia sospettosamente luminosa su un'impronta di stivale.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedScorchedLowlands_00 = L'immagine UV trasforma i bassopiani arsi in una mappa di minerali cotti e cenere più scura, annoti che il suolo è "attivamente poco accogliente".
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedMidlands_00 = Qui la polvere fine assorbe l'UV in ampie fasce, lasciando chiazze minerali luminose come stelle su un campo nero.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedHighlands_00 = Rocce frastagliate brillano lungo le facce di frattura fresche, suggerendo che la superficie sia costantemente messa alla prova dal calore.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedDarkSideMidlands_00 = Nella notte perpetua, la camera si affida a un debole UV riflesso e trova quasi nulla, solo freddo silenzio opaco.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedDarkSideHighlands_00 = Alcune pietre fluorescono debolmente, quanto basta per farti chiedere cosa farebbero sotto un abbaglio pieno, e decidere di non provarci.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfLandedPoles_00 = La vista UV mostra rivestimenti simili a brina che non si comportano come brina, li etichetti "luccichio misterioso" perché gli scienziati ci litighino sopra.
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfSplashedMagmaSea_00 = La superficie ribolle con gorghi luminosi in UV, l'involucro della camera si scalda abbastanza da far suggerire al manuale "meno magma".
        #GEPscience_tantares_ultraviolet_light_camera_TaranisSrfSplashedMagmaShores_00 = Dove il liquido incontra la crosta, l'UV mette in risalto un velo sottile di minerali appena formati che sembra riscriversi ogni pochi secondi.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisFlyingLow_00 = L'aria sottile diffonde l'UV in una foschia sporca, non capisci se la camera stia vedendo l'atmosfera o solo polvere fin troppo entusiasta.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisFlyingHigh_00 = Ben sopra la fascia crepuscolare, il contrasto UV migliora e l'orizzonte sembra affilato come un coltello, il ritardo radio fa sembrare la vista parte della missione di qualcun altro.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceHigh_00 = Da lontano, Toutatis mostra una netta spaccatura UV tra emisferi arsi e gelati, con una stretta cucitura dall'aria vivibile che probabilmente è una trappola.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowSunnyLowlands_00 = I bassopiani illuminati abbagliano luminosi in UV, rivelando sali chiari e texture scavate, come se la superficie fosse stata sabbiata dalla luce.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowSunnyHighlands_00 = L'UV mette in risalto creste nette e cicatrici fresche, le montagne sembrano scolpite dal calore e dall'impazienza.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowTransitionalLowlands_00 = Nella zona di transizione, i minerali fluorescono in bande a mosaico, come se due climi stessero negoziando al rallentatore.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowTransitionalHighlands_00 = Il terreno alto di transizione mostra strati alternati scuri e luminosi in UV che somigliano a pagine sovrapposte di un libro bruciato.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowDarkSideLowlands_00 = I bassopiani sul lato in ombra bevono l'UV quasi del tutto, la camera conferma soprattutto che il tuo riflesso non è la cosa più luminosa nell'inquadratura.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowDarkSideHighlands_00 = Alcune cime brillano debolmente in UV, come roccia fredda che ammette con riluttanza di esistere.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowSoutheasternMountains_00 = L'UV evidenzia lunghe fratture lineari attraverso la catena, suggerendo stress dovuti all'estremo divario tra giorno e notte del pianeta.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowWesternMountains_00 = Le creste occidentali mostrano vene minerali luminose in UV che potrebbero essere depositi fluorescenti, o solo l'universo che fa lo sbruffone.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisInSpaceLowDarkSideMountains_00 = Le montagne sull'emisfero notturno mostrano un raro tremolio UV lungo le pareti, come vetro gelato sotto una brace distante.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedSunnyLowlands_00 = Da vicino, il suolo fluoresce in granelli sparsi, scopri anche che la patch della tua tuta è ora l'oggetto più luminoso del pianeta.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedSunnyHighlands_00 = La camera UV trasforma le facce rocciose fresche in strisce luminose, registri il risultato cercando di non pensare a quanto caldo implichi "luminoso".
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedTransitionalLowlands_00 = Il suolo alterna crosta scura in UV e polvere luminosa in UV, rispecchiando l'equilibrio instabile tra fornace e congelatore.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedTransitionalHighlands_00 = L'UV rivela depositi stratificati sui pendii, i disegni sembrano abbastanza ordinati da essere sospetti, ma probabilmente è solo la geologia che fa lo sbruffone.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedDarkSideLowlands_00 = Nel buio gelido, quasi nulla fluoresce, il debole rumore della camera diventa la caratteristica principale dell'immagine.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedDarkSideHighlands_00 = Alcune pietre brillano dolcemente in UV come se conservassero la luce di ieri, lo annoti e richiedi "più ieri".
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedSoutheasternMountains_00 = La vista UV traccia vene luminose attraverso roccia spezzata, suggerendo minerali che mostrano la mano solo sotto radiazione dura.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedWesternMountains_00 = La camera cattura una sottile spolverata luminosa in UV sui versanti sopravvento, sembra che il pianeta abbia provato a brinarsi con la luce.
        #GEPscience_tantares_ultraviolet_light_camera_ToutatisSrfLandedDarkSideMountains_00 = I bordi delle scogliere fluorescono debolmente contro il vuoto, lo registri come bello, poi ricordi che sei ancora lontano da casa e smetti di romanticizzare.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedShores_00 = La camera UV dipinge la costa con striature luminose e salmastre, qualcuno nota che la schiuma brilla come se stesse cercando di segnalare casa, ma la risposta arriva in ritardo.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTropicalLowlands_00 = Sotto il sole rosso e fioco, chiazze dei bassopiani tropicali fluorescono in macchie irregolari, o i minerali sono esotici, oppure la camera ha sviluppato opinioni.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTemperateLowlands_00 = Qui il terreno alterna suolo scuro in UV e graniglia che brilla appena, sembra abitabile in quel modo freddo e distante che solo gli strumenti sanno apprezzare.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTropicalMidlands_00 = L'UV evidenzia sottili bande sulle pianure tropicali come segni di marea senza maree, il Controllo Missione chiede se il pianeta "dovrebbe fare una cosa del genere".
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTemperateMidlands_00 = La camera trova un lieve velo UV su rocce sparse nelle pianure temperate, l'effetto è abbastanza sottile da farti controllare il tappo dell'obiettivo tre volte.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedHighlands_00 = Facce di frattura fresche bruciano luminose in UV contro pendii spenti, il paesaggio sembra scolpito da tempo, radiazione e una stella che non si sente mai davvero vicina.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedTundra_00 = La tundra assorbe quasi tutto l'UV come una spugna, scintille occasionali suggeriscono granelli di ghiaccio che si confessano solo a questa lunghezza d'onda.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfLandedIceCaps_00 = Le calotte ghiacciate rimandano un abbaglio UV in risalti netti, incisi da deboli linee scure, lo archivi come "bello" e ti penti subito della scelta di parole.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfSplashedSaltySeas_00 = Il flusso UV trasforma la superficie dei mari salati in un foglio scintillante con linee luminose di schiuma, il team scientifico lo chiama "interessante" e intende "preoccupante".
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfSplashedFreshWater_00 = L'acqua dolce appare stranamente scura in UV, tranne per sottili fili luminosi, smetti piano di chiederti che cosa, esattamente, li stia producendo.
        #GEPscience_tantares_ultraviolet_light_camera_NodensSrfSplashedShores_00 = Dove le onde incontrano la terra, l'UV rivela un sottile film luminoso che si riforma veloce quanto si spezza, anche l'alloggiamento della camera se ne accorge, scaldandosi.
        #GEPscience_tantares_ultraviolet_light_camera_NodensFlyingLow_00 = Nell'aria densa, l'UV si diffonde in una foschia violacea che nasconde i dettagli e amplifica ogni macchia del sensore, il ritardo radio fa sembrare che tu stia pilotando il filmato di qualcun altro.
        #GEPscience_tantares_ultraviolet_light_camera_NodensFlyingHigh_00 = Sopra gran parte della foschia, la superficie scatta in contrasto UV: vene luminose, pianure scure e un abbaglio da sole rosso difficile da guardare anche con i filtri.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowSaltySeas_00 = Dall'orbita, i mari salati mostrano vortici luminosi in UV e lunghe corsie scure come correnti fatte di luce, i disegni persistono più di quanto ti aspetti.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowFreshWater_00 = I bacini di acqua dolce appaiono come profondi vuoti in UV, bordati da una tenue fluorescenza, è quel tipo di firma silenziosa che fa parlare gli scienziati a bassa voce.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowShores_00 = Le coste formano sottili nastri luminosi in UV che delineano i continenti con precisione chirurgica, il pianeta sembra mappato dalla radiazione invece che dalla pittura.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTropicalLowlands_00 = Ampi bassopiani tropicali fluorescono a chiazze marezzate, come se il suolo fosse stato scottato in modo irregolare da una stella rossa distante.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTemperateLowlands_00 = I bassopiani temperati risultano perlopiù fiocamente scuri in UV, punteggiati da piccoli punti luminosi, la camera non sa dirti perché, ma sa farti venire dei dubbi.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTropicalMidlands_00 = L'UV mette in evidenza una fasciatura sulle pianure tropicali che non coincide con le mappe nel visibile, etichetti la caratteristica "non è nella brochure".
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTemperateMidlands_00 = Le pianure temperate mostrano deboli aloni UV attorno ad affioramenti isolati, è come se le rocce indossassero aure di radiazione.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowHighlands_00 = Creste nette brillano lungo i bordi in UV, con conche scure in ombra tra loro, il terreno sembra più freddo e più lontano di quanto dovrebbe.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowTundra_00 = La tundra è un ampio pozzo di UV interrotto da punti luminosi sparsi, la distribuzione sembra quasi... intenzionale, quindi smetti di fissarla.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceLowIceCaps_00 = Le calotte ghiacciate si accendono luminose in UV, tracciate da sottili fratture scure, la geometria è così pulita che sembra progettata, finché il fotogramma successivo in ritardo non dimostra che non lo è.
        #GEPscience_tantares_ultraviolet_light_camera_NodensInSpaceHigh_00 = In alta quota, Nodens diventa un disco calmo con una lieve marezzatura UV, il segnale arriva abbastanza tardi da far sembrare il pianeta una cartolina del presente.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedFlats_00 = I terreni piatti restituiscono una riflessione UV opaca e gessosa con occasionali granelli luminosi, è come se la luna nascondesse i suoi segreti negli spazi vuoti.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTropicalLowlands_00 = L'UV rivela sottili striature luminose sui bassopiani tropicali che non compaiono alla luce visibile, ti chiedi cosa significhi "tropicale" senza aria che porti il calore.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTemperateLowlands_00 = La superficie è perlopiù scura in UV, ma graffi freschi sbocciano luminosi, segni il punto e cerchi di non pensare a quanto a lungo durino i graffi qui.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTropicalMidlands_00 = Facce di roccia spezzata fluorescono in righe nette, come se qualcuno avesse sottolineato la geologia, la sottolineatura non si spiega.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedTemperateMidlands_00 = Le pianure temperate mostrano luminosità UV a strati sui pendii esposti, le bande ordinate sembrano pagine di un libro che nessuno può leggere da quassù.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedHighlands_00 = Nelle colline, i bordi dei crateri brillano luminosi in UV contro una pianura fioca, Nodens resta fisso nel cielo, a guardarti mentre prendi misure.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaSrfLandedPoles_00 = La regolite polare scintilla di un freddo luccichio UV, poi si spegne di nuovo, il pavimento di rumore della camera diventa il tuo compagno più vicino.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowFlats_00 = Dall'orbita, i terreni piatti appaiono come un foglio liscio grigio UV con sporadici puntini luminosi, è minimalista in un modo molto solitario.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTropicalLowlands_00 = Il contrasto UV delinea sottili texture simili a colate nei bassopiani tropicali, i disegni sono reali, ma il downlink in ritardo li fa sembrare voci.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTemperateLowlands_00 = I bassopiani temperati mostrano ampi campi scuri in UV con sottili cuciture luminose, sospetti vene minerali, e gli scienziati sospettano tutto.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTropicalMidlands_00 = Un mosaico di fratture luminose in UV attraversa le pianure tropicali, le tensioni del blocco mareale lasciano firme che persino la luce non può ignorare.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowTemperateMidlands_00 = L'UV evidenzia deboli creste e scarpate che avvolgono la luna, la geometria sembra tirata a lucido e mai più rilasciata.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowHighlands_00 = Le colline lampeggiano luminose in UV lungo i raggi di eiezione dei crateri, la luce riflessa di Nodens aggiunge una seconda illuminazione spettrale da un lato.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceLowPoles_00 = I poli mostrano un debole alone UV, poi niente, registri i dati e per un attimo ti manca avere un'atmosfera da incolpare.
        #GEPscience_tantares_ultraviolet_light_camera_BelisamaInSpaceHigh_00 = Da molto in alto, Belisama è una brace pallida accanto a Nodens, la firma UV è nitida, senza aria e scomodamente permanente.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedBasins_00 = L'imaging UV trasforma il fondo dei bacini in un mosaico di polvere scura e linee di frattura che brillano appena, il downlink in ritardo fa sembrare che il pianeta stia facendo rapporto su di te.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedLowlands_00 = I bassopiani tornano per lo più fiocamente scuri in UV, con granelli luminosi sparsi, come se il suolo nascondesse i suoi "pezzi preziosi" tra un fotogramma e l'altro.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedTropicalMidlands_00 = Sotto la debole luce rossa di Grannus, sottili striature luminose in UV tracciano le pianure tropicali come vecchi segni di colata, le etichetti "probabilmente non vernice".
        #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedTemperateMidlands_00 = Un lieve velo UV delinea rocce spezzate e graffi freschi, è la prima volta che "pianeta nano" appare così nitido e così lontano.
        #GEPscience_tantares_ultraviolet_light_camera_SucellusSrfLandedHighlands_00 = Facce frastagliate delle colline fluorescono lungo crepe fresche, suggerendo roccia stressata e ricca di minerali che non vede mai un'alba calda e amichevole.
