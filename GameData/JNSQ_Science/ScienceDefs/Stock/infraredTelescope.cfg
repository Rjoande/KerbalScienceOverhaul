@EXPERIMENT_DEFINITION:HAS[#id[infraredTelescope]]
{
    %RESULTS
    {
        SunInSpaceHigh* = #JNSQscience_infraredTelescope_SunInSpaceHigh_00 // With the glare kept well out of frame, the telescope finally settles into a clean baseline. The infrared sky stops looking empty and starts looking quietly busy.
		SunInSpaceHigh* = #JNSQscience_infraredTelescope_SunInSpaceHigh_01 // You use the Sun only as a place to mount the instrument, then point into the dark between worlds. The detector reports faint warmth where you expected nothing, and demands a larger notebook.

        MohoInSpaceHigh* = #JNSQscience_infraredTelescope_MohoInSpaceHigh_00 // The telescope’s cooling system works overtime and still sounds offended. Every measurement begins with “hot,” then you subtract “hot,” and hope something remains.
		MohoInSpaceHigh* = #JNSQscience_infraredTelescope_MohoInSpaceHigh_01 // The background infrared is brighter than expected this close in. You manage a clean observation anyway, mostly by hiding the telescope behind every shade and panel you can find.
        
        EveInSpaceHigh* = #JNSQscience_infraredTelescope_EveInSpaceHigh_00 // Even from here, Eve tries to turn the telescope into a toaster. You spend most of the session telling the instrument to “please, just chill.”
		EveInSpaceHigh* = #JNSQscience_infraredTelescope_EveInSpaceHigh_01 // The infrared sky is busy, but the baffles keep catching a purple planet-shaped glare. Your best images come from aiming slightly away and hoping nobody notices.

		GillyInSpaceHigh* = #JNSQscience_infraredTelescope_GillyInSpaceHigh_00 // The platform is so quiet and small that the telescope’s own heat becomes the main problem. You feel personally attacked by the concept of “thermal management.”
		GillyInSpaceHigh* = #JNSQscience_infraredTelescope_GillyInSpaceHigh_01 // With careful pointing, you get long exposures without drift. The data is pristine until a gigantic warm crescent labeled “EVE” photobombs the edge again.

        KerbinInSpaceHigh* = #JNSQscience_infraredTelescope_KerbinInSpaceHigh_00 // The telescope keeps trying to subtract Kerbin’s warm glow out of every frame. Your calibration sheet now reads “CLOUDS: VERY BRIGHT.”
		KerbinInSpaceHigh* = #JNSQscience_infraredTelescope_KerbinInSpaceHigh_01 // Between the daylit clouds and the night side’s patchy warmth, you log a perfect test pattern for the instrument. Mission Control asks if “perfect” means “snack-shaped.”

		MunInSpaceHigh* = #JNSQscience_infraredTelescope_MunInSpaceHigh_00 // The Mun is cold and quiet in infrared, which is exactly what you want. The sky stops being “black” and starts being “full of things.”
		MunInSpaceHigh* = #JNSQscience_infraredTelescope_MunInSpaceHigh_01 // Sunlit crater rims flare like someone waved a heater in front of the lens. You point away, pretend it was intentional, and call it “dynamic range testing.”

		MinmusInSpaceHigh* = #JNSQscience_infraredTelescope_MinmusInSpaceHigh_00 // The background is so chill the detector complains it can’t find “zero” on the scale. You assure it this is, in fact, excellent.
		MinmusInSpaceHigh* = #JNSQscience_infraredTelescope_MinmusInSpaceHigh_01 // With the local glare minimized, you manage a long exposure without frying the sensor. The final image is sharp, clean, and immediately smudged by a celebratory fingerprint.

        DunaInSpaceHigh* = #JNSQscience_infraredTelescope_DunaInSpaceHigh_00 // The telescope finally gets a nice, cold baseline. The faint heat signatures out in the dark stop looking like noise and start looking like discoveries.
		DunaInSpaceHigh* = #JNSQscience_infraredTelescope_DunaInSpaceHigh_01 // A rust-colored crescent keeps sneaking into the edge of the frame and warming the optics. You log it as “local interference” and pretend it was part of the plan.

		IkeInSpaceHigh* = #JNSQscience_infraredTelescope_IkeInSpaceHigh_00 // With almost nothing nearby emitting warmth, the detector settles down and behaves. You catch a handful of tiny, steady points that refuse to be “just background.”
		IkeInSpaceHigh* = #JNSQscience_infraredTelescope_IkeInSpaceHigh_01 // Duna’s distant glow makes a handy reference source. The telescope calls it calibration; the crew calls it “the big warm blob.”

        EdnaInSpaceHigh* = #JNSQscience_infraredTelescope_EdnaInSpaceHigh_00 // Out here, the thermal background drops to a whisper. The telescope purrs happily and your faint targets stop hiding in the noise.
		EdnaInSpaceHigh* = #JNSQscience_infraredTelescope_EdnaInSpaceHigh_01 // The detector keeps insisting it has reached “absolute zero-ish.” You tell it to keep watching anyway; the best discoveries never shout.

		DakInSpaceHigh* = #JNSQscience_infraredTelescope_DakInSpaceHigh_00 // Dak’s lumpy little gravity field makes “stable pointing” feel like a polite suggestion. You still manage a clean exposure between attitude corrections.
		DakInSpaceHigh* = #JNSQscience_infraredTelescope_DakInSpaceHigh_01 // The telescope is thrilled with the cold, dark platform. The guidance system is less thrilled with the potato trying to lure it off target.

		DresInSpaceHigh* = #JNSQscience_infraredTelescope_DresInSpaceHigh_00 // You verify the lens cap is off, the shutters are open, and the readouts are sane. The sky remains stubbornly empty, which makes the calibration wonderfully easy.

        JoolInSpaceHigh* = #JNSQscience_infraredTelescope_JoolInSpaceHigh_00 // You keep the green giant out of frame, but its sheer bulk still warms the optics through stray light. The telescope calls it “background”; you call it “Jool being Jool.”
		JoolInSpaceHigh* = #JNSQscience_infraredTelescope_JoolInSpaceHigh_01 // Radiation hits pepper the detector with tiny false “stars.” After filtering, the remaining points look stubbornly real, which is the best kind of alarming.

		LaytheInSpaceHigh* = #JNSQscience_infraredTelescope_LaytheInSpaceHigh_00 // With the local platform relatively calm, the telescope settles into a steady, quiet run. Long exposures stop being a gamble and start being a plan.
		LaytheInSpaceHigh* = #JNSQscience_infraredTelescope_LaytheInSpaceHigh_01 // A bright, warm crescent keeps sneaking in from the side whenever you forget to lock the baffles. You pretend it’s a stress test for the glare shields.

		VallInSpaceHigh* = #JNSQscience_infraredTelescope_VallInSpaceHigh_00 // The cold surroundings make the instrument happy, but the data comes with occasional crackling noise. You mark the spikes as “not astrophysics” and move on.
		VallInSpaceHigh* = #JNSQscience_infraredTelescope_VallInSpaceHigh_01 // With minimal local heat, faint infrared points stand out cleanly. The sky looks less like darkness and more like a carefully cataloged mess.

		TyloInSpaceHigh* = #JNSQscience_infraredTelescope_TyloInSpaceHigh_00 // The telescope reports a faint, broad glow that doesn’t match any target list. You blame the local environment, recalibrate, and feel slightly judged by the readout.
		TyloInSpaceHigh* = #JNSQscience_infraredTelescope_TyloInSpaceHigh_01 // Stable pointing is easy from here, until a thin haze of “something” keeps adding a soft smear to the baseline. You file it under “platform character.”

		BopInSpaceHigh* = #JNSQscience_infraredTelescope_BopInSpaceHigh_00 // Holding still near this lumpy little moon takes constant nudges. Every time you correct attitude, the telescope sighs like you interrupted its masterpiece.
		BopInSpaceHigh* = #JNSQscience_infraredTelescope_BopInSpaceHigh_01 // The background is so cold that the instrument’s own warmth becomes the loudest signal. You learn a lot about your spacecraft by accidentally observing it.

		PolInSpaceHigh* = #JNSQscience_infraredTelescope_PolInSpaceHigh_00 // The telescope loves the near-zero thermal background. The detector finally stops arguing about what “dark” means and starts finding tiny, persistent sources.
		PolInSpaceHigh* = #JNSQscience_infraredTelescope_PolInSpaceHigh_01 // The platform is quiet, the sky is quiet, and the data is almost too clean. You double-check the lens cap anyway, just to be safe.

        LindorInSpaceHigh* = #JNSQscience_infraredTelescope_LindorInSpaceHigh_00 // You use Lindor as a convenient anchor point and aim into the dark. The telescope loves the cold background; the local magnetic tantrums are less lovable.
		LindorInSpaceHigh* = #JNSQscience_infraredTelescope_LindorInSpaceHigh_01 // Even with the planet kept off-axis, the instruments pick up periodic interference like a heartbeat. You label it “platform character” and keep collecting photons.

		KrelInSpaceHigh* = #JNSQscience_infraredTelescope_KrelInSpaceHigh_00 // The sky is beautifully cold, right up until Lindor’s presence starts leaking into the baffles. The telescope insists it can “feel” the giant nearby.
		KrelInSpaceHigh* = #JNSQscience_infraredTelescope_KrelInSpaceHigh_01 // Pointing is steady, the exposure is long, and the detector finally stops arguing about what “dark” means. The resulting map is full of tiny, stubborn points.

		AdenInSpaceHigh* = #JNSQscience_infraredTelescope_AdenInSpaceHigh_00 // Aden makes a quiet perch with almost no local heat to spoil the baseline. The telescope settles in and starts finding signals that aren’t from your own hardware.
		AdenInSpaceHigh* = #JNSQscience_infraredTelescope_AdenInSpaceHigh_01 // Every so often a broad glow creeps across the readings, like a reminder that Lindor is still right there. You adjust the aim and pretend it was intentional.

		HuygenInSpaceHigh* = #JNSQscience_infraredTelescope_HuygenInSpaceHigh_00 // Huygen’s hazy limb tries to paint the edge of every frame with a soft thermal smear. You keep it out of view and harvest clean, cold sky instead.
		HuygenInSpaceHigh* = #JNSQscience_infraredTelescope_HuygenInSpaceHigh_01 // The detector runs happily in the chill, but the background refuses to be perfectly quiet. You filter out the hiss and keep the remaining “definitely-not-hiss” entries.

		RigaInSpaceHigh* = #JNSQscience_infraredTelescope_RigaInSpaceHigh_00 // Riga provides a calm, cold platform where the telescope can finally do what it was built for. The data comes back so clean you immediately suspect the lens cap.
		RigaInSpaceHigh* = #JNSQscience_infraredTelescope_RigaInSpaceHigh_01 // With minimal stray warmth, long exposures stop being risky. You start building a catalog of faint infrared sources that don’t care about your optimism.

		TalosInSpaceHigh* = #JNSQscience_infraredTelescope_TalosInSpaceHigh_00 // Talos is barren, distant, and wonderfully unhelpful at adding heat to the optics. The telescope rewards you with a quiet baseline and a very busy sky.
		TalosInSpaceHigh* = #JNSQscience_infraredTelescope_TalosInSpaceHigh_01 // The only “bright” thing in the dataset is the occasional blip from your own spacecraft. After subtracting that, the remaining glow looks suspiciously like real astronomy.

        EelooInSpaceHigh* = #JNSQscience_infraredTelescope_EelooInSpaceHigh_00 // Out beyond the warm inner system, the telescope’s coolers finally keep up. Faint infrared points stop hiding in the noise and start looking like a catalog.
		EelooInSpaceHigh* = #JNSQscience_infraredTelescope_EelooInSpaceHigh_01 // Sunlight reflecting off Eeloo’s bright surface keeps trying to sneak into the baffles. You nudge the aim a fraction and the background drops to velvety black.

		CelesInSpaceHigh* = #JNSQscience_infraredTelescope_CelesInSpaceHigh_00 // Using Celes as a quiet platform, you take a long exposure with almost no stray warmth. The detector reports a suspicious number of “definitely not pixels.”
		CelesInSpaceHigh* = #JNSQscience_infraredTelescope_CelesInSpaceHigh_01 // A distant glow from the local system makes a handy calibration reference, kept carefully off-axis. It still manages to warm the optics just enough to be irritating.

		TamInSpaceHigh* = #JNSQscience_infraredTelescope_TamInSpaceHigh_00 // Tam’s lumpy gravity makes “steady pointing” feel optional. The first dataset is a beautiful streak until you remember the telescope prefers its stars not to move.
		TamInSpaceHigh* = #JNSQscience_infraredTelescope_TamInSpaceHigh_01 // Once stabilized, the cold environment gives you a clean baseline. Dim infrared glimmers show up that refuse to behave like random noise.

		HamekInSpaceHigh* = #JNSQscience_infraredTelescope_HamekInSpaceHigh_00 // The thermal background out here is so low the instrument starts measuring the spacecraft instead. You subtract “ship” from the data and keep going.
		HamekInSpaceHigh* = #JNSQscience_infraredTelescope_HamekInSpaceHigh_01 // With local glare minimized, you log a faint, wide haze between targets. Mission Control suggests you’ve discovered interplanetary crumbs.

        NaraInSpaceHigh* = #JNSQscience_infraredTelescope_NaraInSpaceHigh_00 // You point well away from Nara and let the telescope drink in the cold between worlds. The background drops low enough that “maybe real” signals start to appear.
		NaraInSpaceHigh* = #JNSQscience_infraredTelescope_NaraInSpaceHigh_01 // A faint, broad glow keeps sneaking into the baseline whenever the baffles slip. You tighten the pointing limits and declare victory over “local inconveniences.”

		AmosInSpaceHigh* = #JNSQscience_infraredTelescope_AmosInSpaceHigh_00 // Amos makes an excellent cold platform, mostly because it contributes almost nothing at all. The telescope promptly starts detecting things that are definitely not your spacecraft.
		AmosInSpaceHigh* = #JNSQscience_infraredTelescope_AmosInSpaceHigh_01 // The detector is happy with the chill, but the guidance system keeps nudging to stay steady. Your starfield is half astronomy, half proof you remembered to stabilize.

		EnonInSpaceHigh* = #JNSQscience_infraredTelescope_EnonInSpaceHigh_00 // The telescope runs so cleanly in this deep-cold environment that the calibration routine looks bored. Then the data fills up with faint points that refuse to be boring.
		EnonInSpaceHigh* = #JNSQscience_infraredTelescope_EnonInSpaceHigh_01 // Occasional off-axis glare from the local system warms the optics just enough to be irritating. You trim the exposure and keep the best frames for “real science.”

		PraxInSpaceHigh* = #JNSQscience_infraredTelescope_PraxInSpaceHigh_00 // From this quiet perch, the infrared sky stops being empty and starts being detailed. You log a long, steady exposure and a suspicious number of “tiny persistent sources.”
		PraxInSpaceHigh* = #JNSQscience_infraredTelescope_PraxInSpaceHigh_01 // The only warm thing in the dataset is your own vehicle. After subtracting it out, the remaining glow looks like the universe is leaving you breadcrumbs.
    }
}