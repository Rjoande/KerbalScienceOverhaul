        #GEPscience_bd_hydrometer_EponaSrfLandedVolcanoes_00 = Warm vents drive sudden humidity surges, followed by rapid drops as the vapor freezes out. The instrument loves the data; the rest of the craft prefers distance.
        #GEPscience_bd_hydrometer_EponaSrfLandedPoles_00 = The sensor reports high relative humidity that immediately becomes frost on everything important. Under a dim red sun, even “wet” feels lonely.
        #GEPscience_bd_hydrometer_EponaFlyingLow_00 = Moisture layers stack and shear, making a profile that looks nothing like homeworld weather. The hydrometer is confident; you are not.
        #GEPscience_bd_hydrometer_EponaFlyingHigh_00 = At altitude, condensables thin to near-zero and the sky turns hard and dark. The numbers are clean, but the comm delay makes the cockpit feel very far away.

        // bd_ionElec
        #GEPscience_bd_ionElec_GrannusFlyingHigh_00 = Ionization readings spike wildly; Grannus’ upper layers behave like an electrical storm with opinions about your antenna.
