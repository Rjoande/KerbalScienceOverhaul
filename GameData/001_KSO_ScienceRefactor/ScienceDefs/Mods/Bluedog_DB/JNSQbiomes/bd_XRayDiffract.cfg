@EXPERIMENT_DEFINITION:HAS[#id[bd_XRayDiffract]]
{
	%RESULTS
	{
        KerbinSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedGrasslands_00 // Analysis of Kerbin's grasslands reveals only the expected mixture of various silicate minerals and several different types of organic compounds.
        KerbinSrfLandedAridHighlands* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedBadlands_00 // This sample is composed primarily of what seems to be various organic compounds, producing a very noisy x-ray diffraction pattern.
        KerbinSrfLandedAridMidlands* = #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedDeserts_00 // Kerbin's desert sands are composed almost entirely of fine-grain quartz crystals, producing several sharp rings in the x-ray diffraction pattern.
        
        MunSrfLandedNotableCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedEastCrater_00 // A number of minerals laced with heavy metals are detected in the analysis of this sample; the asteroid that created this crater must have been rich in these metals.
        MunSrfLandedExoticCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedEastFarsideCrater_00 // A number of iridium compounds are detected in x-ray analysis of samples from this crater, most of which was likely deposited here by an asteroid impact.
        MunSrfLandedExoticCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedFarsideCrater_00 // The surface here is composed primarily of the iron-rich basaltic minerals expected in ancient craters such as this.
        MunSrfLandedVoronoiCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedHighlandCraters_00 // This sample contains a variety of glassy breccia minerals, formed when the violent impact of an asteroid fuses multiple minerals together.
        MunSrfLandedVoronoiCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedMidlandCraters_00 // The minerals in this crater show signs of the rapid melting associated with an asteroid or comet impact.
        MunSrfLandedNorthernBasin* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedNorthernBasin_00 // This large basin shows signs of igneous rock formations that are likely the result of ancient lava flows. The high levels of olivine and pyroxene minerals suggest this could be due to volcanism rather than an asteroid impact.
        MunSrfLandedRareCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedNorthwestCrater_00 // The dark surface of this crater is composed of various iron- and magnesium-rich basaltic minerals along with relatively high concentrations of magnetite and olivine.
        MunSrfLandedPolarIceCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPolarCrater_00 // Traces of nearly pure water ice are detected in analysis of this sample. The crater's high walls shelter this water from the sun, allowing it to persist.
        MunSrfLandedRareCraters* = #ScienceRefactor_bd_XRayDiffract_MunSrfLandedSouthwestCrater_00 // Several heavy metal compounds are discovered in x-ray analysis of this sample, a number of which are radioactive.

        MinmusSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedSlopes_00 // The steep slopes have a composition similar to the surrounding areas; this leads the curious observation that Minmus' surface geology is almost entirely dependent on elevation, as if successive layers of different materials have been added over time.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedFlats_00 // Hydrated calcium carbonite minerals, similar to loosely bound cement, are present in this flat region of Minmus' surface.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedGreatFlats_00 // A mixture of calcite and its polymorphs aragonite and vaterite are detected in x-ray analysis of this sample, giving the surface its somewhat sparkly appearance.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedGreaterFlats_00 // The green coloration here is due to a mixture of some chlorite minerals and the igneous olivine silicates, a sign that these flats may be the remains of some type of ancient volcanic activity.
        MinmusSrfLandedBasins* = #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedLesserFlats_00 // In addition to the calcite minerals common to Minmus' surface a small amount of quartz crystals are detected in x-ray analysis of this sample.
        
        MohoSrfLandedPolarCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedPolarCrater_00 // Moho's deep polar crater contains a number of basaltic minerals laced with various heavy metals.
        MohoSrfLandedCentralCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedCentralCrater_00 // The x-ray diffraction pattern generated by analysis of this sample reveals a high concentration of magnesium-rich basalt and a number of minerals generally found in the upper mantle layers, such as enstatite and kanoite.
        MohoSrfLandedDeepCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedDeepCrater_00 // Analysis of the composition of this crater reveals a number of minerals only formed under highly reducing conditions.
        MohoSrfLandedSouthernCrater* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedSouthernCrater_00 // The basin of this enormous crater appears to have been filled in with ancient lava flows; this lava is magnesium-rich and most likely formed at very high temperatures with very low viscosity.
        MohoSrfLandedMidlandCraters* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedMidlandCraters_00 // Analysis of this sample found in one of Moho's mid-sized craters suggests that is the product of a relatively recent impact.
        MohoSrfLandedHighlandCraters* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedHighlandCraters_00 // The surface of this shallow crater contains higher than expected levels of iron and other heavy metals; these elements were most likely seeded by the asteroid that impacted here.
        MohoSrfLandedPolarIceCraters* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedNorthernSinkhole_00 // Moho's deep polar crater contains a number of basaltic minerals laced with various heavy metals.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedCentralLowlands_00 // The x-ray diffraction pattern generated by analysis of this sample reveals a high concentration of magnesium-rich basalt and a number of minerals generally found in the upper mantle layers, such as enstatite and kanoite.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedSouthEasternLowlands_00 // The basin of this enormous crater appears to have been filled in with ancient lava flows; this lava is magnesium-rich and most likely formed at very high temperatures with very low viscosity.
        MohoSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_MohoSrfLandedSouthWesternLowlands_00 // Analysis of the composition of this crater reveals a number of minerals only formed under highly reducing conditions.
        
        EveSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedPlains_00 // X-ray analysis of the surface of Eve reveals the rare lithium silicates neptunite and sugilite, both of which give Eve its purple tint.
        EveSrfLandedPetrolLakes* = #ScienceRefactor_bd_XRayDiffract_EveSrfLandedCraterLake_00 // This sample contains a number of silicates common to Eve's sample, but there are relatively high levels of heavy metal impurities, suggesting that the lake and its nearby terrain are quite toxic.
        
        DunaSrfLandedIceCaps* = #ScienceRefactor_bd_XRayDiffract_DunaSrfLandedPoles_00 // The polar region of Duna is covered by a thick layer of water ice and carbon dioxide ice, obscuring any analysis of the soil below.
        
        IkeSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedPolarLowlands_00 // The aluminum-rich silicates present in this sample also contain a number of heavy metal impurities, possibly seeded here by an asteroid impact.
        IkeSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedSouthPole_00 // The x-ray diffraction pattern from this sample reveals several hydrated silicate minerals along with a few traces of pure water ice.
        IkeSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedWesternMountainRidge_00 // The brighter terrain in this region is composed primarily of feldspar minerals, but also contains relatively high concentrations of pyroxene, normally found in deeper mantle layers.
        IkeSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedSouthEasternMountainRange_00 // X-ray analysis of this sample reveals very high concentrations of igneous basaltic minerals which are most likely the result of ancient lava flows in this area.
        IkeSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_IkeSrfLandedEasternMountainRidge_00 // The loosely packed surface in this area is made up primarily of finely ground feldspar minerals.
        
        DresSrfLandedCanyon* = #ScienceRefactor_bd_XRayDiffract_DresSrfLandedCanyons_00 // These deep canyons in Dres' southern hemisphere are composed of various igneous rocks and are likely the remains of an ancient rift valley.
        
        LaytheSrfLandedIceCaps* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedSouthPole_00 // The sandy soil here is mostly quartz crystal along with several silicates and igneous rocks.
        LaytheSrfLandedIceCaps* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedPoles_00 // A few traces of pure water ice are discovered during analysis of this sample from Laythe's Poles.
        LaytheSrfLandedShores* = #ScienceRefactor_bd_XRayDiffract_LaytheSrfLandedDunes_00 // Several interesting tholin compounds, simple organic molecules, are discovered in this sample from Laythe's islands.
        
        BopSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedRidges_00 // A few bright, aluminum-rich silicates are mixed in along with Bop's more common, darker minerals; a few traces of complex organic molecules are detected as well, but these are surely nothing but Kerbin-based contaminates...
        BopSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedValley_00 // X-ray analysis of this sample reveals some very curious carbon and nitrogen compounds; further study is warranted...
        BopSrfLandedMountains* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedPeaks_00 // A few bright, aluminum-rich silicates are mixed in along with Bop's more common, darker minerals; a few traces of complex organic molecules are detected as well, but these are surely nothing but Kerbin-based contaminates...
        
        EelooSrfLandedCanyon* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedIceCanyons_00 // The dark scars scattered across Eeloo's surface are composed of nothing but alkali-rich silicate minerals, nothing out of the ordinary or unexpected.
    }
}