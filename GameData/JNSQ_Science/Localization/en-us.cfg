        #JNSQscience_crewReport_RigaInSpaceHigh_01 = You plot future landing sites by pointing at the screen and saying "there." Everyone agrees this is top-tier planning.

        #JNSQscience_crewReport_TalosSrfLandedLowlands_00 = You stare out at the lowlands and realize “featureless” can still feel intimidating.
