        #GEPscience_bd_SiteSurvey_AirmedSrfLandedPoles_00 = The polar ground glitters faintly and spikes the hazard map with tiny, sharp features. You approve a site for a quick stop, with a note about keeping exposure time short and schedules shorter.

        #GEPscience_bd_SiteSurvey_BorvoSrfLandedTropicalCraquelure_00 = The surface is split into a mosaic of plates like dried mud, except it’s cold and under a tired red sun. The survey labels it “structurally interesting” and “landing-leg hostile.”
