        #GEPscience_tantares_ultraviolet_light_camera_DamonaInSpaceHigh_00 = In alta quota, Damona è un piccolo puntino freddo con una cicatrice UV nitida dove sta il suo grande bacino, facile da registrare e difficile da dimenticare.
