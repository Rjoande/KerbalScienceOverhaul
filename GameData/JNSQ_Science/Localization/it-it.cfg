        #JNSQscience_sspxFishStudy_KerbinSrfSplashed_00 = I pesci si agitano visibilmente quando l'acqua della vasca "suona" come l'oceano là fuori. Nessuno sa spiegare come facciano a capirlo.
        #JNSQscience_sspxFishStudy_KerbinSrfSplashed_01 = Controllo Missione chiede se possiamo "semplicemente lasciarli uscire". I pesci si nascondono immediatamente dietro il filtro.
        #JNSQscience_sspxFishStudy_KerbinSrfSplashed_02 = I pesci sembrano deliziati dallo sciabordio familiare. Controllo Missione ti chiede di smetterla di chiamarli come i direttori di volo.
        #JNSQscience_sspxFishStudy_KerbinSrfSplashed_03 = Confronti l'acqua della vasca con l'oceano attorno. Conclusione: una è accuratamente bilanciata, l'altra contiene snack.
        #JNSQscience_sspxFishStudy_KerbinFlyingHigh_00 = La vasca sbatte con ogni piccolo sobbalzo. I pesci reagiscono formando un comitato compatto e disapprovante.
        #JNSQscience_sspxFishStudy_KerbinFlyingHigh_01 = La luce del sole lampeggia nella cabina mentre le nuvole scorrono sotto: i pesci inseguono le chiazze luminose come se fosse ora di mangiare.
        #JNSQscience_sspxFishStudy_DunaFlyingHigh_00 = I riscaldatori lavorano a pieno regime e i pesci rallentano fino a un'andatura sospettosamente da statue. Nessuno pronunci "ibernazione" alla radio.
        #JNSQscience_sspxFishStudy_DunaFlyingHigh_01 = La polvere fine si infila in ogni guarnizione tranne che, chissà come, nella vasca dei pesci. I pesci sembrano compiaciuti.
        #JNSQscience_sspxFishStudy_EdnaSrfLanded_00 = Senza una lampada solare la vasca sembra un vuoto nero. I pesci restano vicini e fanno finta che sia un esercizio di branco.
        #JNSQscience_sspxFishStudy_EdnaSrfLanded_01 = L'acqua prova a ghiacciarsi ai bordi dell'habitat. I pesci ti lanciano quello sguardo che dice "sistemalo".
        #JNSQscience_sspxFishStudy_EdnaInSpaceLow_00 = Il pianeta sotto è fioco e lontano: i pesci si orientano verso l'unica cosa luminosa in cabina: l'incarto dello snack.
        #JNSQscience_sspxFishStudy_EdnaInSpaceLow_01 = In bassa gravità, le correnti persistono più a lungo. I pesci surfano vortici invisibili come piccoli, serissimi astronauti.
        #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_00 = Qui fuori ci sono solo luce stellare e ventole ronzanti: i pesci smettono di scattare e si sistemano in lenti giri cauti.
        #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_01 = Un allarme radiazioni fa un singolo bip e tutti vanno in panico, tranne i pesci, che continuano a giudicare in silenzio.
        #JNSQscience_sspxFishStudy_DakSrfLanded_00 = La gravità quasi nulla trasforma la vasca in un globo galleggiante. I pesci iniziano subito a nuotare in ogni direzione, tutte insieme.
        #JNSQscience_sspxFishStudy_DakSrfLanded_01 = Ancori l'habitat a una roccia a forma di patata e i pesci continuano a urtare il "soffitto", perché ormai è facoltativo.
        #JNSQscience_sspxFishStudy_DakInSpaceLow_00 = L'asteroide ruota sotto e la luce fa effetto stroboscopico dalla finestra. I pesci lo interpretano come un rave.
        #JNSQscience_sspxFishStudy_DakInSpaceLow_01 = I pesci scoprono che possono fermarsi all'istante e semplicemente... restare sospesi. Lo fanno di continuo per mettersi in mostra.
        #JNSQscience_sspxFishStudy_DakInSpaceHigh_00 = Con Dak che si riduce a un sassolino, i pesci si comportano come se l'intero universo fosse ormai il loro acquario.
        #JNSQscience_sspxFishStudy_DakInSpaceHigh_01 = Le correnti della vasca si assestano finalmente in una simmetria perfetta. I pesci sembrano delusi che tu non l'abbia fatto apposta.
        #JNSQscience_sspxFishStudy_EdnaSrfLanded_00 = I riscaldatori vanno senza sosta mentre i pesci scivolano pigramente, come se risparmiassero ogni singolo colpo di coda. Invidi le loro scelte di vita.
        #JNSQscience_sspxFishStudy_EdnaSrfLanded_01 = Fuori è buio e silenzioso: dentro, i pesci ti fissano come se il campione fossi *tu*.
        #JNSQscience_sspxFishStudy_EdnaInSpaceLow_00 = I pesci si adattano alla microgravità inventando nuove direzioni. Su adesso è solo un suggerimento.
        #JNSQscience_sspxFishStudy_EdnaInSpaceLow_01 = Un'osservazione più lunga mostra meno attività e banchi più compatti. O è stress, o hanno formato un sindacato.
        #JNSQscience_sspxFishStudy_EdnaInSpaceHigh_00 = Con Edna che si rimpicciolisce sotto, l'acquario diventa la cosa più luminosa a bordo. I pesci si comportano come se fosse casa loro.
