        #JNSQscience_gravityScan_RigaInSpaceLowLowlands_00 = In orbita bassa la gravità è uniforme sopra le distese, con una lieve oscillazione mareale che fa ondeggiare i numeri a tempo con Lindor.
        #JNSQscience_gravityScan_RigaInSpaceLowMidlands_00 = Le pianure danno una firma gravitazionale morbida e ondulata, come se la superficie fosse raggrinzita fino in profondità.
        #JNSQscience_gravityScan_RigaInSpaceLowHighlands_00 = Lo strumento rileva superficiali concentrazioni di massa sotto le colline. Qualcuno al Controllo Missione emette un suono soddisfatto.
