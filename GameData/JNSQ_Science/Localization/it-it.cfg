        #JNSQscience_evaReport_EveInSpaceLowSeaofGigan_00 = Da qui il mare sembra calmo. Sai bene di non fidarti delle apparenze su Eve.
        #JNSQscience_evaReport_EveInSpaceLowSeaofGigan_01 = Ti sembra quasi di sentire la pressione attraverso il finestrino solo a guardarlo.
        #JNSQscience_evaReport_EveInSpaceLowSeaofRodan_00 = Striature di ombra delle nubi corrono veloci sul mare di Rodan.
        #JNSQscience_evaReport_EveInSpaceLowSeaofRodan_01 = Guardi le bande meteo e ricordi che anche i tuoi paracadute hanno dei sentimenti.
