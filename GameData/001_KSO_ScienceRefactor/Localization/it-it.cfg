        #ScienceRefactor_bd_UVspec_BopInSpaceHigh_00 = La telemetria della sonda riporta: Temo di non poterlo fare.
        #ScienceRefactor_bd_UVspec_PolInSpace_00 = Ulteriori analisi UV e ancora nessuna traccia di atmosfera.
        #ScienceRefactor_bd_UVspec_PolInSpaceLow_00 = Immagini UV ricevute. Da Pol, con affetto.
        #ScienceRefactor_bd_UVspec_PolInSpaceHigh_00 = Sulla superficie sembra esserci pochissimo ghiaccio.
        #ScienceRefactor_bd_UVspec_PolInSpaceHigh_01 = Nessuna atmosfera rilevata. Elaborazione delle immagini di superficie.
        #ScienceRefactor_bd_UVspec_EelooInSpace_00 = Lettura UV da Eeloo: COMPLETATA.
        #ScienceRefactor_bd_UVspec_EelooInSpaceLow_00 = Livelli UV registrati. Il Controllo Missione dà l'ok per fare a meno della crema solare.
        #ScienceRefactor_bd_UVspec_EelooInSpaceLow_01 = Sulla superficie c'è decisamente molto ghiaccio, forse metano.
        #ScienceRefactor_bd_UVspec_EelooInSpaceHigh_00 = Avrebbero dovuto mandare un poeta.

        // bd_weather
        #ScienceRefactor_bd_weather_default_00 = Hai raccolto un'osservazione del meteo sotto la navicella.
        #ScienceRefactor_bd_weather_default_01 = Le nuvole sotto di te disegnano un bel motivo... Guarda, quella sembra Jeb!
        #ScienceRefactor_bd_weather_default_02 = Niente di interessante qui. Magari più avanti nell'orbita vedrai qualche nuvola.
        #ScienceRefactor_bd_weather_default_03 = L'immagine è tutta bianca! La camera si è guastata? No, sono solo un sacco di nuvole.
        #ScienceRefactor_bd_weather_KerbinInSpaceHigh_00 = L'immagine che ottieni offre una visione d'insieme del meteo sull'intero pianeta. Il team di meteorologia la adorerà!
        #ScienceRefactor_bd_weather_KerbinInSpaceHigh_01 = Questa immagine dei modelli meteorologici su larga scala permette agli scienziati di vedere come interagiscono i diversi fronti. Ci aiuterà a migliorare i nostri modelli meteo.
        #ScienceRefactor_bd_weather_kerbinInSpaceHigh_02 = La foto che ottieni è davvero bella. Dovremmo appenderla al muro nella sala snack!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowIceCaps_00 = È difficile distinguere le nuvole dalle calotte di ghiaccio sotto di loro. Gli scienziati dovranno rifletterci ancora un po'...
        #ScienceRefactor_bd_weather_KerbinInSpaceLowIceCaps_01 = Quindi è così che appare una tormenta vista dallo spazio.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowIceCaps_02 = Sembra che un'altra bufera di neve stia scendendo verso il Sito di Lancio Woomerang. Dovremmo avvisarli che sta arrivando.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowNorthernIceShelf_00 = Non succede molto, a parte la copertura nuvolosa... Oh. Quello è ghiaccio, non nuvole. Accidenti!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowNorthernIceShelf_01 = Laggiù c'è una brutta bufera di neve... Meno male che siamo vicino all'equatore!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowNorthernIceShelf_02 = Sembra davvero freddo laggiù. Meno male che non dobbiamo presidiare quel posto di ricerca!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowSouthernIceShelf_00 = Sono nuvole quelle? Lo sono? Evviva! SCIENZA!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowSouthernIceShelf_01 = C'è un sacco di ghiaccio. Ma per il resto non succede molto, al momento.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowSouthernIceShelf_02 = Ehi, il ghiaccio si è spostato dall'ultima volta che abbiamo scattato foto qui sotto?
        #ScienceRefactor_bd_weather_KerbinInSpaceLowTundra_00 = Vedi diverse bufere di neve avanzare attraverso l'area.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowTundra_01 = Tutta quella neve che cade sembra gelida.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowTundra_02 = Sta piovendo? Sì? Accidenti... questa sì che è un'ondata di caldo.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowTundra_03 = I cieli sereni sotto di te sono accompagnati da temperature più basse del normale.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowHighlands_00 = Il meteo nell'area è molto instabile, cambia in modo imprevedibile nel corso della giornata.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowHighlands_01 = Ehi, dove sono finite le nuvole che c'erano nell'ultima orbita?
        #ScienceRefactor_bd_weather_KerbinInSpaceLowHighlands_02 = Aspetta, da dove è arrivata quella tempesta? E quella è neve?
        #ScienceRefactor_bd_weather_KerbinInSpaceLowMountains_00 = Il terreno impervio fa sì che le tempeste si formino lungo le montagne.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowMountains_01 = L'ampia copertura nuvolosa rende difficile capire cosa stia succedendo laggiù.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowMountains_02 = I cieli sereni ti fanno pensare alla tua ultima gita in campeggio in montagna.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowGrasslands_00 = I temporali primaverili possono diventare davvero imponenti. Dovremmo avvisare chi si trova sulla loro traiettoria.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowGrasslands_01 = Quindi è così che appare un temporale visto dallo spazio! Oooh, quello era un lampo?
        #ScienceRefactor_bd_weather_KerbinInSpaceLowGrasslands_02 = Com'era quel vecchio detto sulle piogge di aprile? Già... sta per piovere, perché me lo chiedi?
        #ScienceRefactor_bd_weather_KerbinInSpaceLowDeserts_00 = Neanche una nuvola in vista.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowDeserts_01 = Quindi è così che appare una tempesta di sabbia vista dallo spazio.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowDeserts_02 = I cieli sereni non ti dicono molto, ma puoi immaginare che laggiù farà caldo.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowBadlands_00 = È un temporale enorme. Forse dovremmo avvisare chi è nei dintorni di fare attenzione alle piene improvvise.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowBadlands_01 = La copertura nuvolosa invernale avvolge la regione sotto di te, impedendoti di vedere altro di utile.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowBadlands_02 = I cieli sereni non ti dicono molto, ma il terreno sotto di te sembra decisamente accidentato.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowShores_00 = Che giornata perfetta per andare in spiaggia!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowShores_01 = I cieli sereni non ti dicono molto, ma quella tempesta che hai visto al largo nell'ultima orbita dovrebbe regalare belle onde.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowShores_02 = Sulla costa è nuvoloso e piove. All'improvviso sei felice di dover coprire il turno di Tommatt al centro meteo oggi.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowWater_00 = Quindi è così che appare un uragano visto dallo spazio.
        #ScienceRefactor_bd_weather_KerbinInSpaceLowWater_01 = Uh oh. Quel ciclone è diretto verso la costa. Meglio avvisare tutti di stare alla larga!
        #ScienceRefactor_bd_weather_KerbinInSpaceLowWater_02 = I cieli sereni non ti dicono molto sul meteo, ma puoi vedere chiaramente le scie delle navi in transito laggiù.
        #ScienceRefactor_bd_weather_EveInSpaceHigh_00 = La tua posizione elevata sopra il Pianeta Viola ti offre un'ottima vista di... un sacco di nuvole.
        #ScienceRefactor_bd_weather_EveInSpaceHigh_01 = Un'osservazione ravvicinata rivela diverse differenze tra aree di copertura nuvolosa. Forse Eve è più di semplici nuvole.
        #ScienceRefactor_bd_weather_EveInSpaceLow_00 = Avvicinandoti riesci a trovare varchi tra le nuvole per sbirciare sotto.
        #ScienceRefactor_bd_weather_EveInSpaceLow_01 = Gli spazi tra le nubi rivelano una pioggia di un fluido sconosciuto e tempeste simili a quelle di Kerbin.
        #ScienceRefactor_bd_weather_EveInSpaceLowExplodiumSea_00 = Qui le nuvole sono davvero molto spesse. I pochi varchi che trovi ti permettono di vedere il mare sotto, che ribolle di vapore.
        #ScienceRefactor_bd_weather_EveInSpaceLowExplodiumSea_01 = Lo spessore delle nuvole qui sembra indicare una notevole fonte di umidità sottostante.
        #ScienceRefactor_bd_weather_EveInSpaceLowOlympus_00 = C'è una montagna che spunta tra le nuvole!
        #ScienceRefactor_bd_weather_DunaInSpaceHigh_00 = Dalla tua posizione in alto sopra Duna puoi individuare le tempeste di polvere molto prima che minaccino una delle nostre missioni.
        #ScienceRefactor_bd_weather_DunaInSpaceHigh_01 = Su Duna non ci sono molte nuvole. Forse c'entra qualcosa l'atmosfera più sottile.
        #ScienceRefactor_bd_weather_DunaInSpaceHigh_02 = Le tempeste di polvere che individui sembrano simili alle tempeste di sabbia su Kerbin. Forse studiando la più vicina possiamo capire meglio quella più lontana.
        #ScienceRefactor_bd_weather_DunaInSpaceLow_00 = Le poche nuvole che scorgi sembrano fatte interamente di cristalli di ghiaccio. Chi sperava di vedere vita su Duna resterà deluso nel sapere che non piove.
        #ScienceRefactor_bd_weather_DunaInSpaceLowPoles_00 = Le poche nuvole che trovi sopra Duna sembrano concentrarsi intorno ai poli. Forse le condizioni polari favoriscono la formazione delle nubi.
        #ScienceRefactor_bd_weather_DunaInSpaceLowPolarHighlands_00 = Ci sono alcune nuvole sparse ai bordi degli altopiani polari, ma non sopra di essi. Potrebbe essere un buon posto per una base a energia solare.
        #ScienceRefactor_bd_weather_DunaInSpaceLowPolarCraters_00 = Le nuvole o la foschia tendono a riempire i crateri al mattino presto, ma si diradano quando il sole li colpisce in pieno.
        #ScienceRefactor_bd_weather_DunaInSpaceLowHighlands_00 = I pochi filamenti di nuvole che noti scorrono per lo più attorno agli Altopiani, invece che sopra. Il team di meteorologia può usarlo per tracciare direzione e velocità dei venti.
        #ScienceRefactor_bd_weather_DunaInSpaceLowMidlands_00 = Nel tardo pomeriggio i venti tendono a sollevare tempeste di polvere localizzate.
        #ScienceRefactor_bd_weather_DunaInSpaceLowLowlands_00 = Ogni tanto una tempesta di polvere attraversa questa regione, ma per il resto non succede nulla di rilevante.
        #ScienceRefactor_bd_weather_DunaInSpaceLowCraters_00 = Le parti più basse dei crateri sembrano evitare i venti e si riempiono di polvere. Forse c'è un collegamento.
        #ScienceRefactor_bd_weather_DunaInSpaceLowMidlandSea_00 = Chi ha dato il nome a quest'area chiaramente non stava attento... qui non c'è acqua. Nemmeno molto meteo, ma da queste parti pare normale.
        #ScienceRefactor_bd_weather_DunaInSpaceLowNortheastBasin_00 = Ogni tanto si nota un po' di foschia che vortica nelle zone meridionali del cratere, ma non dura mai a lungo.
        #ScienceRefactor_bd_weather_DunaInSpaceLowSouthernBasin_00 = Ogni tanto si nota un po' di foschia che vortica nelle zone settentrionali del cratere, ma non dura mai a lungo.
        #ScienceRefactor_bd_weather_DunaInSpaceLowNorthernShelf_00 = Sul lato sottovento della scarpata si vedono spesso nuvole... aspetta, quella è neve laggiù?
        #ScienceRefactor_bd_weather_DunaInSpaceLowMidlandCanyon_00 = Continui a vedere al mattino la foschia che ristagna sul fondo del canyon, e nel pomeriggio tempeste di polvere attraversano il canyon.
        #ScienceRefactor_bd_weather_DunaInSpaceLowEasternCanyon_01 = Continui a vedere al mattino la foschia che ristagna sul fondo del canyon, e nel pomeriggio tempeste di polvere attraversano il canyon.
        #ScienceRefactor_bd_weather_DunaInSpaceLowWesternCanyon_02 = Continui a vedere al mattino la foschia che ristagna sul fondo del canyon, e nel pomeriggio tempeste di polvere attraversano il canyon.
        #ScienceRefactor_bd_weather_JoolInSpaceHigh_00 = Da molto sopra le cime delle nubi di Jool, il disegno delle bande è chiarissimo. Il resto un po' meno... gli scienziati avranno poco con cui lavorare.
        #ScienceRefactor_bd_weather_JoolInSpaceHigh_01 = Da molto sopra le cime delle nubi di Jool si vede qualche tempesta ogni tanto. Ma per via della distanza non si distinguono molti dettagli. Forse un'occhiata più da vicino dirà di più.
        #ScienceRefactor_bd_weather_JoolInSpaceLow_00 = Da appena sopra l'atmosfera di Jool non hai una grande visione d'insieme. I dettagli, però... non sono molto migliori. Solo tantissime nuvole.
        #ScienceRefactor_bd_weather_JoolInSpaceLow_01 = Ora che sei più vicino a Jool, l'enorme scala delle tempeste viste prima diventa evidente. Alcuni di questi uragani sono abbastanza grandi da coprire una buona parte della superficie di Kerbin!
        #ScienceRefactor_bd_weather_JoolInSpaceLow_02 = Non riesci a vedere molto oltre il primo strato di nubi, ma quel poco che osservi aiuterà gli scienziati a capire meglio cosa succede dentro Jool.
        #ScienceRefactor_bd_weather_LaytheInSpaceHigh_00 = Da molto sopra Laythe noti che non ci sono tempeste cicloniche. Il team di meteorologia si romperà la testa su questa cosa.
        #ScienceRefactor_bd_weather_LaytheInSpaceHigh_01 = Non c'è attività temporalesca significativa... perlopiù temporali sparsi intorno alle isole, vicino al pomeriggio locale.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowPoles_00 = Qui non c'è molto meteo... solo ogni tanto un temporale di pioggia che diventa una nevicata.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowShores_00 = L'assenza di uragani rende questo luogo attraente per un resort. Forse un giorno qualcuno ne aprirà uno qui.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowShores_01 = La bassa gravità e i venti costanti creano onde notevoli. Forse il primo equipaggio in visita dovrebbe portare una tavola da surf...
        #ScienceRefactor_bd_weather_LaytheInSpaceLowDunes_00 = I venti costanti di Laythe, uniti alla bassa gravità, creano dune di sabbia enormi.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowCrescentBay_00 = Qui le onde sono molto più basse rispetto al resto delle coste. Forse potrebbe essere un buon posto per fare il bagno.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowCraterBay_00 = Il bordo del cratere sembra deviare la parte peggiore del maltempo intorno alla baia. Potrebbe essere un punto ideale da cui far operare un idrovolante...
        #ScienceRefactor_bd_weather_LaytheInSpaceLowPeaks_00 = Le cime di Laythe sono coperte di neve e sferzate dai venti. Di certo non è un posto piacevole.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowShallows_00 = Gran parte dell'attività temporalesca su Laythe sembra originare dalle acque basse, dove l'acqua è più calda.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowCraterIsland_00 = L'isola è ben protetta dalla maggior parte del maltempo dal bordo del cratere.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowTheSagenSea_00 = Neanche un uragano in vista. Come mai?
        #ScienceRefactor_bd_weather_LaytheInSpaceLowTheSagenSea_01 = La grande distesa di acqua aperta e profonda sembra spegnere qualsiasi tempesta che la attraversi.
        #ScienceRefactor_bd_weather_LaytheInSpaceLowDegrasseSea_02 = L'acqua profonda e aperta non sembra favorire bene la formazione di tempeste.

        // bd_XRayDiffract
        #ScienceRefactor_bd_XRayDiffract_default_00 = In questo punto viene condotta un'analisi dettagliata della composizione della superficie.
        #ScienceRefactor_bd_XRayDiffract_default_01 = La diffrazione a raggi X su polveri di questo campione di superficie rivela l'esatta composizione minerale.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLanded_00 = Pur non essendo forse l'uso più efficace di questo costoso diffrattometro specializzato, l'analisi rivela comunque una scomposizione molto dettagliata della composizione minerale del suolo di Kerbin.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedLaunchPad_00 = L'analisi di diffrazione rivela soprattutto cemento, metallo e una strana miscela di quella che sembra materia organica coagulata.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedRunway_00 = L'analisi della superficie rivela, senza sorpresa, soprattutto cemento e le lunghe strutture di idrocarburi dell'asfalto.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedKSC_00 = In questo campione viene scoperta una curiosa raccolta di composti di ferro ben strutturati, silicati comuni del suolo e vari composti organici in diversi stadi di decomposizione.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedGrasslands_00 = L'analisi delle praterie di Kerbin rivela solo la prevista miscela di vari minerali silicati e diversi tipi di composti organici.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedTundra_00 = L'analisi di diffrazione di questo campione rileva una miscela complessa di minerali silicati, composti organici e ghiaccio d'acqua.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedMountains_00 = I campioni delle regioni montuose di Kerbin contengono diversi minerali ignei, principalmente granito con le sue varie componenti silicatiche.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedBadlands_00 = Questo campione è composto principalmente da quella che sembra essere una varietà di composti organici, producendo un diagramma di diffrazione a raggi X molto rumoroso.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedDeserts_00 = Le sabbie dei deserti di Kerbin sono composte quasi interamente da cristalli di quarzo a grana fine, che producono diversi anelli netti nel diagramma di diffrazione a raggi X.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedHighlands_00 = Gli altopiani di Kerbin continuano a mostrare una sorprendente somiglianza con le pianure di Kerbin.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedIceCaps_00 = Nell'analisi di questo campione non viene rilevato altro che il netto anello del ghiaccio d'acqua.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedShores_00 = Il terreno sabbioso e sciolto sembra composto soprattutto da biossido di silicio e cristalli di carbonato di calcio.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedWater_00 = Il campione sembra essere quasi interamente acqua, producendo un segnale molto poco utilizzabile nell'analisi di diffrazione a raggi X.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedTrackingStation_00 = Un'analisi dettagliata della composizione minerale della stazione di tracciamento rivela che stai davvero perdendo tempo...
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedVAB_00 = Difficile pensare a un uso migliore di questo costoso strumento.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedR&D_00 = Davvero? Torna al lavoro!
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedAdministration_00 = Condurre un'analisi dettagliata di questo campione è difficile con tutto quel vociare proveniente dagli amministratori del CSK.
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedSPHTanks_00 = Dopo aver perforato la superficie, lo strumento ora è ricoperto da una fine nebbiolina di quelli che sembrano semplici idrocarburi. Complimenti...
        #ScienceRefactor_bd_XRayDiffract_KerbinSrfLandedMissionControl_00 = Ti senti meglio dopo aver sprecato preziosi fondi e tempo dei Kerbal?
        #ScienceRefactor_bd_XRayDiffract_MunSrfLanded_00 = Viene condotta un'analisi dettagliata di diffrazione a raggi X della superficie di Mun.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedCanyons_00 = Le formazioni di roccia ignea trovate in questi canyon profondi suggeriscono che potrebbero essere i resti di antiche valli di rift munari, formazioni geologiche dei primi tempi di Mun.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedEastCrater_00 = Nell'analisi di questo campione vengono rilevati diversi minerali con metalli pesanti, l'asteroide che ha creato questo cratere doveva esserne ricco.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedEastFarsideCrater_00 = Nell'analisi a raggi X dei campioni di questo cratere vengono rilevati diversi composti di iridio, probabilmente depositati qui per lo più da un impatto asteroidale.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedFarsideCrater_00 = La superficie qui è composta principalmente dai minerali basaltici ricchi di ferro tipici di antichi crateri come questo.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedHighlandCraters_00 = Questo campione contiene una varietà di minerali di breccia vetrosa, formati quando il violento impatto di un asteroide fonde insieme più minerali.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedHighlands_00 = L'analisi rivela che i luminosi altopiani munari sono composti da cristalli di feldspato ricchi di alluminio e calcio, per lo più con pochissimo contenuto di ferro e titanio.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedMidlandCraters_00 = I minerali in questo cratere mostrano segni della rapida fusione associata a un impatto di un asteroide o di una cometa.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedMidlands_00 = La superficie munare in queste regioni relativamente basse mostra segni di antica attività vulcanica, insieme a concentrazioni molto più alte di olivina e pirosseno, normalmente attesi solo in profondità nello strato del mantello.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedNorthernBasin_00 = Questo grande bacino mostra segni di formazioni di roccia ignea probabilmente dovute ad antiche colate laviche. Gli alti livelli di olivina e pirosseno suggeriscono che potrebbe trattarsi di vulcanismo, più che di un impatto asteroidale.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedNorthwestCrater_00 = La superficie scura di questo cratere è composta da vari minerali basaltici ricchi di ferro e magnesio, insieme a concentrazioni relativamente alte di magnetite e olivina.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPolarCrater_00 = Nell'analisi di questo campione vengono rilevate tracce di ghiaccio d'acqua quasi puro. Le alte pareti del cratere lo riparano dal sole, permettendogli di persistere.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPolarLowlands_00 = In questo campione vengono scoperti diversi silicati idrati, un chiaro segno che quantità relativamente grandi di acqua esistono sulla superficie munare.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedPoles_00 = Piccoli ma distinti granuli di ghiaccio d'acqua vengono rilevati tra i luminosi silicati di anortosite comuni nella regolite munare.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedSouthwestCrater_00 = Nell'analisi a raggi X di questo campione vengono scoperti diversi composti di metalli pesanti, alcuni dei quali radioattivi.
        #ScienceRefactor_bd_XRayDiffract_MunSrfLandedTwinCraters_00 = Nonostante il nome, la composizione superficiale di questi due crateri suggerisce che siano stati creati da due impatti asteroidali molto diversi. Il cratere più grande sembra essere molto più antico e con un contenuto di minerali basaltici molto più elevato rispetto al più piccolo.
        #ScienceRefactor_bd_XRayDiffract_MinmusSrfLanded_00 = Viene condotta un'analisi dettagliata di diffrazione a raggi X della superficie di Minmus.
        #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedHighlands_00 = La superficie relativamente scura delle regioni più elevate di Minmus contiene diversi minerali basaltici mescolati ai minerali di clorite e calcite presenti in tutta la luna.
        #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedMidlands_00 = La distinta colorazione verde di questo campione è dovuta soprattutto alla presenza di minerali di clorite, principalmente della varietà chamosite ricca di ferro.
        #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedLowLands_00 = La brillante superficie bianca delle regioni più basse di Minmus ha alte concentrazioni di feldspato ricco di calcio e alluminio, insieme a minerali di calcite.
        #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedSlopes_00 = Le pendici hanno una composizione simile alle aree circostanti. Questo porta alla curiosa osservazione che la geologia superficiale di Minmus dipende quasi interamente dall'altitudine, come se nel tempo si fossero aggiunti strati successivi di materiali diversi.
        #ScienceRefactor_bd_XRayDiffract_MinmusSrfLandedFlats_00 = In questa regione pianeggiante della superficie di Minmus sono presenti minerali di carbonato di calcio idrati, simili a un cemento poco legato.
