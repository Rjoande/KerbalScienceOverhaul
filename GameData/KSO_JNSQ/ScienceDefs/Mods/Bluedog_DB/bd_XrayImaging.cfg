@EXPERIMENT_DEFINITION:HAS[#id[bd_XrayImaging]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_bd_XRayImaging_SunInSpaceLow_00 // The detector instantly regrets being pointed anywhere near Kerbol; coronal arcs blaze in X-rays until the instrument begs for safe-mode.
        SunInSpaceHigh* = #JNSQscience_bd_XRayImaging_SunInSpaceHigh_00 // Far from Kerbol’s immediate glare, the sky resolves into pinpricks of hard X-rays: energetic systems doing violent things very far away.

        MohoInSpaceLow* = #JNSQscience_bd_XRayImaging_MohoInSpaceLow_00 // Moho makes a surprisingly good sunshade; with Kerbol blocked, a few twitchy X-ray sources finally stand out from the background noise.
        MohoInSpaceHigh* = #JNSQscience_bd_XRayImaging_MohoInSpaceHigh_00 // The heat and radiation try to turn every pixel into “science”. After filtering the static, you’re left with a clean map of bright, angry objects.

        EveInSpaceLow* = #JNSQscience_bd_XRayImaging_EveInSpaceLow_00 // Eve’s upper atmosphere eats the soft X-rays, so you lean on the harder bands and still catch several brief, blistering bursts from distant targets.
        EveInSpaceHigh* = #JNSQscience_bd_XRayImaging_EveInSpaceHigh_00 // With Eve and Kerbol both behaving for once, the imager builds a crisp field of high-energy points that definitely aren’t visible-light stars.

        GillyInSpaceLow* = #JNSQscience_bd_XRayImaging_GillyInSpaceLow_00 // The tiny rock accidentally performs perfect occultations. Each time it drifts across the view, hidden X-ray sources pop into existence like magic.
        GillyInSpaceHigh* = #JNSQscience_bd_XRayImaging_GillyInSpaceHigh_00 // With little local interference, the imager logs faint, steady X-ray glows and a few sudden flashes. Somewhere out there, something is very hot.

        KerbinInSpaceLow* = #JNSQscience_bd_XRayImaging_KerbinInSpaceLow_00 // Kerbin’s own space environment keeps flicking the counters, but between the pops you still map a few stubborn hard X-ray points.
        KerbinInSpaceHigh* = #JNSQscience_bd_XRayImaging_KerbinInSpaceHigh_00 // Above most of the interference, the sky becomes a sparse constellation of violently hot sources that refuse to look “normal.”

        MunInSpaceLow* = #JNSQscience_bd_XRayImaging_MunInSpaceLow_00 // With Kerbin conveniently blocked, the background drops and faint X-ray sources emerge one careful exposure at a time.
        MunInSpaceHigh* = #JNSQscience_bd_XRayImaging_MunInSpaceHigh_00 // The Mun shrinks to a gray coin below while the detector counts a steady drizzle of photons from very distant trouble.

        MinmusInSpaceLow* = #JNSQscience_bd_XRayImaging_MinmusInSpaceLow_00 // Minmus makes a tidy little occulting disk; each pass hides one X-ray source and reveals another like a calibration trick.
        MinmusInSpaceHigh* = #JNSQscience_bd_XRayImaging_MinmusInSpaceHigh_00 // The emptiness is great for tuning the instrument, right up until a sudden flare spikes the readout and ruins your “quiet” run.

        DunaInSpaceLow* = #JNSQscience_bd_XRayImaging_DunaInSpaceLow_00 // The thin air still meddles with the softer bands, so you lean on harder X-rays and come away with a surprisingly clean field.
        DunaInSpaceHigh* = #JNSQscience_bd_XRayImaging_DunaInSpaceHigh_00 // With Duna far below, the imager builds a map of tiny, super-hot pinpricks that feel more like warnings than stars.

        IkeInSpaceLow* = #JNSQscience_bd_XRayImaging_IkeInSpaceLow_00 // Ike’s jagged horizon works like a shutter. The imager uses it to separate local noise from real X-ray sources.
        IkeInSpaceHigh* = #JNSQscience_bd_XRayImaging_IkeInSpaceHigh_00 // In the calm above Ike, a few points stay unreasonably bright. Whatever’s making them is running at absurd temperatures.

        EdnaInSpaceLow* = #JNSQscience_bd_XRayImaging_EdnaInSpaceLow_00 // Edna’s darkness makes a great backdrop; with the glare under control, you tease out a few faint X-ray points from objects running at absurd temperatures.
        EdnaInSpaceHigh* = #JNSQscience_bd_XRayImaging_EdnaInSpaceHigh_00 // Out here, the counts come slow and steady, until a sudden spike reminds you that “quiet” space still contains very hot surprises.

        DakInSpaceLow* = #JNSQscience_bd_XRayImaging_DakInSpaceLow_00 // The potato’s lumpy horizon jitters the view, but it also blocks stray light nicely; the imager picks up several hard X-ray sources hiding in the noise.
        DakInSpaceHigh* = #JNSQscience_bd_XRayImaging_DakInSpaceHigh_00 // With Dak reduced to a speck, the instrument paints a sparse map of energetic pinpricks. Tiny, distant furnaces burning in the dark.

        DresInSpaceLow* = #JNSQscience_bd_XRayImaging_DresInSpaceLow_00 // Dres is painfully bland in visible light, but the X-ray sky behind it is anything but; a few compact sources stand out like warning lights.
        DresInSpaceHigh* = #JNSQscience_bd_XRayImaging_DresInSpaceHigh_00 // Above the loneliest world, you log a thin drizzle of high-energy photons and wonder what kind of chaos it takes to shine like that.

        JoolInSpaceLow* = #JNSQscience_bd_XRayImaging_JoolInSpaceLow_00 // The imager keeps getting peppered by energetic particles, but between the “ow”s you catch bright auroral X-rays and a few distant, violently hot sources.
        JoolInSpaceHigh* = #JNSQscience_bd_XRayImaging_JoolInSpaceHigh_00 // Farther from Jool’s worst tantrums, the detector settles down enough to sketch a clean field of hard X-ray pinpricks from absurdly hot objects.

        LaytheInSpaceLow* = #JNSQscience_bd_XRayImaging_LaytheInSpaceLow_00 // Jool photobombs the entire survey with high-energy glow; after some creative pointing, you still snag a handful of distant X-ray burners.
        LaytheInSpaceHigh* = #JNSQscience_bd_XRayImaging_LaytheInSpaceHigh_00 // With Laythe steady below and Jool less in the way, the imager builds a crisp high-energy sky map: stars that only shine when they’re dangerously hot.

        VallInSpaceLow* = #JNSQscience_bd_XRayImaging_VallInSpaceLow_00 // Vall’s dark limb makes a perfect shutter; as the horizon slides past, faint X-ray sources pop in and out like a calibration check.
        VallInSpaceHigh* = #JNSQscience_bd_XRayImaging_VallInSpaceHigh_00 // In Vall’s quiet, cold neighborhood, the instrument counts a thin drizzle of photons from far-off furnaces running at millions of kelvin.

        TyloInSpaceLow* = #JNSQscience_bd_XRayImaging_TyloInSpaceLow_00 // Tylo’s massive bulk gives you a stable platform—and a handy sunshade—letting the imager tease real X-ray points out of Jool’s noisy neighborhood.
        TyloInSpaceHigh* = #JNSQscience_bd_XRayImaging_TyloInSpaceHigh_00 // Above Tylo, the background finally behaves; the detector records a sparse constellation of hard X-ray sources that look like trouble in a tidy grid.

        BopInSpaceLow* = #JNSQscience_bd_XRayImaging_BopInSpaceLow_00 // Bop’s lumpy horizon jitters the view, but it also blocks stray glare nicely; each occultation reveals another faint, hot X-ray emitter.
        BopInSpaceHigh* = #JNSQscience_bd_XRayImaging_BopInSpaceHigh_00 // With Bop reduced to a tumbling speck, the imager logs steady, faint X-ray glows: distant systems doing energetic things you’d rather not be near.

        PolInSpaceLow* = #JNSQscience_bd_XRayImaging_PolInSpaceLow_00 // Odd local interference keeps spiking the counts, yet the sky still resolves into sharp points of X-rays from extremely hot gas far beyond Jool.
        PolInSpaceHigh* = #JNSQscience_bd_XRayImaging_PolInSpaceHigh_00 // High above Pol, the detector runs smooth and quiet, right up until a sudden burst reminds you that the universe makes heat in dramatic ways.

        LindorInSpaceLow* = #JNSQscience_bd_XRayImaging_LindorInSpaceLow_00 // Lindor’s charged environment keeps peppering the detector, but the poles still glow with energetic X-rays like a warning label.
        LindorInSpaceHigh* = #JNSQscience_bd_XRayImaging_LindorInSpaceHigh_00 // Farther out, the noise finally drops and the sky resolves into hard X-ray pinpricks from systems hot enough to be doing something awful.

        KrelInSpaceLow* = #JNSQscience_bd_XRayImaging_KrelInSpaceLow_00 // Krel makes a handy little sunshade; with Lindor blocked, several faint X-ray sources pop out of the background like they were waiting.
        KrelInSpaceHigh* = #JNSQscience_bd_XRayImaging_KrelInSpaceHigh_00 // High above the pale moon, the imager logs steady photons from extremely hot gas far away, and feels strangely judged by the silence.

        AdenInSpaceLow* = #JNSQscience_bd_XRayImaging_AdenInSpaceLow_00 // Aden jitters across the view and accidentally performs perfect occultations, briefly revealing X-ray sources that were hidden in the glare.
        AdenInSpaceHigh* = #JNSQscience_bd_XRayImaging_AdenInSpaceHigh_00 // With Aden reduced to a speck, you get a clean, sparse X-ray field—tiny dots that only exist because something is millions of kelvin.

        HuygenInSpaceLow* = #JNSQscience_bd_XRayImaging_HuygenInSpaceLow_00 // The hazy moon adds its own soft absorption and stray glow, so you lean on harder bands and still catch a few sharp, violent emitters.
        HuygenInSpaceHigh* = #JNSQscience_bd_XRayImaging_HuygenInSpaceHigh_00 // Away from Huygen’s haze, the imager builds a crisp map of high-energy points that definitely aren’t “normal” starlight.

        RigaInSpaceLow* = #JNSQscience_bd_XRayImaging_RigaInSpaceLow_00 // Riga’s broad disk blocks the worst background and the detector immediately finds several stubborn X-ray sources that refuse to be quiet.
        RigaInSpaceHigh* = #JNSQscience_bd_XRayImaging_RigaInSpaceHigh_00 // High above the big brown marble, the counts come slow and clean—until a brief burst spikes the chart and ruins your calm.

        TalosInSpaceLow* = #JNSQscience_bd_XRayImaging_TalosInSpaceLow_00 // Talos provides almost no local interference, which is perfect—right up until the instrument catches a sudden flash from something unimaginably hot.
        TalosInSpaceHigh* = #JNSQscience_bd_XRayImaging_TalosInSpaceHigh_00 // Out in the cold, dark high orbit, the sky becomes a thin constellation of hard X-rays: distant furnaces burning with no visible flame.

        EelooInSpaceLow* = #JNSQscience_bd_XRayImaging_EelooInSpaceLow_00 // Eeloo makes an excellent sunshade; with the glare down, faint X-ray pinpricks appear—distant gas heated far beyond “reasonable.”
        EelooInSpaceHigh* = #JNSQscience_bd_XRayImaging_EelooInSpaceHigh_00 // Out in the cold dark, the detector counts a thin drizzle of hard X-rays from objects that must be running at millions of kelvin.

        CelesInSpaceLow* = #JNSQscience_bd_XRayImaging_CelesInSpaceLow_00 // Using Celes as a shutter, you isolate a stubborn high-energy source… then both analysis teams mark the file “NDA” and walk away.
        CelesInSpaceHigh* = #JNSQscience_bd_XRayImaging_CelesInSpaceHigh_00 // With local interference near zero, the imager builds a crisp field of sharp X-ray points—stars that only shine when they’re dangerously hot.

        TamInSpaceLow* = #JNSQscience_bd_XRayImaging_TamInSpaceLow_00 // Tam jitters across the view and accidentally performs perfect occultations, briefly revealing flashes from extremely hot, very distant targets.
        TamInSpaceHigh* = #JNSQscience_bd_XRayImaging_TamInSpaceHigh_00 // The readings are mostly quiet and faint—until a sudden spike reminds you that somewhere out there, something is boiling at absurd temperatures.

        HamekInSpaceLow* = #JNSQscience_bd_XRayImaging_HamekInSpaceLow_00 // Hamek’s strange color doesn’t matter in X-rays; the sky behind it still lights up with compact sources powered by blisteringly hot plasma.
        HamekInSpaceHigh* = #JNSQscience_bd_XRayImaging_HamekInSpaceHigh_00 // High above the red world, you map a sparse constellation of hard X-rays—tiny points that exist because something is violently, impossibly hot.

        NaraInSpaceLow* = #JNSQscience_bd_XRayImaging_NaraInSpaceLow_00 // Nara’s cold hydrogen envelope shouldn’t glow at all, yet faint X-ray arcs trace where energetic particles slam into the upper layers.
        NaraInSpaceHigh* = #JNSQscience_bd_XRayImaging_NaraInSpaceHigh_00 // With Nara a distant disk, the imager settles down and catalogs tiny hard X-ray pinpricks—distant systems running at ridiculous temperatures.

        AmosInSpaceLow* = #JNSQscience_bd_XRayImaging_AmosInSpaceLow_00 // Amos makes a handy shutter against Nara; as the moon drifts across the view, hidden X-ray sources blink on and off.
        AmosInSpaceHigh* = #JNSQscience_bd_XRayImaging_AmosInSpaceHigh_00 // High above Amos, the count rate is almost boring—until a sharp burst spikes the chart and everyone suddenly pays attention.

        EnonInSpaceLow* = #JNSQscience_bd_XRayImaging_EnonInSpaceLow_00 // Enon’s bright limb is perfect for occultations; the sky behind it reveals a few stubborn X-ray beacons that refuse to be “just stars.”
        EnonInSpaceHigh* = #JNSQscience_bd_XRayImaging_EnonInSpaceHigh_00 // Far from Enon, the imager builds a sparse constellation of hard X-rays—proof that something out there is boiling violently.

        PraxInSpaceLow* = #JNSQscience_bd_XRayImaging_PraxInSpaceLow_00 // Prax’s fringe orbit keeps things quiet enough to tune the detector; the background drops and faint X-ray points emerge one by one.
        PraxInSpaceHigh* = #JNSQscience_bd_XRayImaging_PraxInSpaceHigh_00 // With Prax reduced to a dot, the instrument logs a thin drizzle of high-energy photons from far-off hot gas and sudden catastrophes.
    }
}