        #JNSQscience_sspxFishStudy_TalosSrfLanded_01 = La luce qui è diversa, come se si fosse dimenticata come essere normale. I pesci inseguono i riflessi strani e lo chiamano ricerca.
        #JNSQscience_sspxFishStudy_TalosInSpaceLow_00 = Talos ruota sotto come una pietra dipinta. I pesci fluttuano in cerchi lenti, come se cercassero di abbinare la rotazione.
