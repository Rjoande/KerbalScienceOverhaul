@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #CSS_evaReport_MohoSrfLandedNorthPole_00 // The thermal systems of your suit protest as you move around in the bright sunlight. It's really hot out here.
        MohoSrfLandedPoles* = #CSS_evaReport_MohoSrfLandedSouthPole_00 // You hope to find the exact point of the south pole. Then you can plant a flag. But mission control might have other plans....
        MohoSrfLandedPolarIceCraters* = #CSS_evaReport_MohoSrfLandedNorthernSinkholeRidge_00 // So... Anything interesting around here?
        MohoSrfLandedPolarIceCraters* = #CSS_evaReport_MohoSrfLandedNorthernSinkhole_00 // Such heat, wow.
        MohoSrfLandedLowlands* = #CSS_evaReport_MohoSrfLandedWesternLowlands_00 // You trip over a small rock. Fortunately the gravity is low enough that you aren't hurt.
        MohoSrfLandedLowlands* = #CSS_evaReport_MohoSrfLandedCentralLowlands_00 // You are relieved to see that spacesuits have an SPF of one million.
        MohoSrfLandedLowlands* = #CSS_evaReport_MohoSrfLandedSouthWesternLowlands_00 // Gene was skeptical, but you're glad you brought an umbrella.
        MohoSrfLandedLowlands* = #CSS_evaReport_MohoSrfLandedSouthEasternLowlands_00 // Suddenly, you really want some ice cream. You ask mission control for the fastest transfer window to Minmus.
        MohoSrfLandedCraters* = #CSS_evaReport_MohoSrfLandedMinorCraters_00 // There's a hole around here somewhere.
        MohoSrfLandedCraters* = #CSS_evaReport_MohoSrfLandedMinorCraters_01 // Look! There's water on Moho! Oh, wait... that's just sweat that got on your visor.
        MohoInSpaceLowPoles* = #CSS_evaReport_MohoInSpaceLowNorthPole_00 // You pull out a energy bar, before realizing that you can't get it through your helmet. You compromise by smearing it on the visor.
        MohoInSpaceLowPoles* = #CSS_evaReport_MohoInSpaceLowSouthPole_00 // Surely you're safe from the Kraken here.
        MohoInSpaceLowPolarIceCraters* = #CSS_evaReport_MohoInSpaceLowNorthernSinkholeRidge_00 // The ridge looks like the lips of an enormous mouth.
        MohoInSpaceLowPolarIceCraters* = #CSS_evaReport_MohoInSpaceLowNorthernSinkhole_00 // That's a deep, dark hole down there. You've heard legends of a Kraken, and wonder if this is its den.
        MohoInSpaceLowLowlands* = #CSS_evaReport_MohoInSpaceLowWesternLowlands_00 // You feel dehydrated, but your suit says you're fine.
        MohoInSpaceLowLowlands* = #CSS_evaReport_MohoInSpaceLowCentralLowlands_00 // The scientists back home want to know if life could exist here. You decide that they should've come instead.
        MohoInSpaceLowLowlands* = #CSS_evaReport_MohoInSpaceLowSouthWesternLowlands_00 // It looks like the ship is covered in pollen. No, wait, it's just dust.
        MohoInSpaceLowCraters* = #CSS_evaReport_MohoInSpaceLowMinorCraters_00 // Are there many asteroids around? Any asteroid that made those craters could do a real number on a Kerbal.
        
        EveSrfLandedPetrolLakes* = #CSS_evaReport_EveSrfLandedCraterLake_00 // That water nearby would be looking quite inviting were it not for the fact that it is almost certainly not water or healthy for you.
        EveSrfLandedMountains* = #CSS_evaReport_EveSrfLandedOlympus_00 // If I have seen further, it is by standing on the shoulders of giants! Or gods.
        EveSrfLandedMountains* = #CSS_evaReport_EveSrfLandedOlympus_01 // *Huff* Must.... *huff* reach.... *huff* top.... *huff*
        EveSrfLandedShores* = #CSS_evaReport_EveSrfLandedShallows_00 // You've come all this way to Eve's coast, only for your bucket and spade to melt and dissolve instantly.
        EveSrfSplashedPetrolLakes* = #CSS_evaReport_EveSrfSplashedCraterLake_00 // You hope dearly that your suit has been properly sealed and corrosion-proofed.
        EveSrfSplashedPolarLakes* = #CSS_evaReport_EveSrfSplashedCraterLake_01 // The extremely dense liquid is hard to get your hands and legs into to swim with.
        EveSrfSplashedShores* = #CSS_evaReport_EveSrfSplashedShallows_00 // Mission Control assures you that there are definitely no monsters in the sea.
        EveSrfSplashedShores* = #CSS_evaReport_EveSrfSplashedShallows_01 // You try and light the explodium on fire, forgetting you're currently swimming in it. Fortunately, there's no oxygen to allow it to ignite.
        EveFlyingLowPetrolLakes* = #CSS_evaReport_EveFlyingLowCraterLake_00 // The thick atmosphere makes it difficult to move around. You swear that if not for the high gravity, you could hover a bit just by flapping your arms.
        EveFlyingLowPolarLakes* = #CSS_evaReport_EveFlyingLowCraterLake_01 // You wonder how far down the shimmering liquid filling the impact basin goes.
        EveFlyingLowMountains* = #CSS_evaReport_EveFlyingLowOlympus_00 // You're not sure you needed to be flying for this. You could just have climbed a bit higher up the mountain.
        EveFlyingLowMountains* = #CSS_evaReport_EveFlyingLowOlympus_01 // The view from the ground was amazing and this one's even better.
        EveFlyingLowShores* = #CSS_evaReport_EveFlyingLowShallows_00 // The set of tools you had clipped to your belt fall off and plummet out of sight.
        EveFlyingLowShores* = #CSS_evaReport_EveFlyingLowShallows_01 // You're not sure if you're near or far from the ocean surface. All the purple is playing havoc with your depth perception.
        EveInSpaceLowPolarLakes* = #CSS_evaReport_EveInSpaceLowCraterLake_01 // The rebound peak in the middle of the lake that fills the basin makes a prominent island in the centre.
        EveInSpaceLowShores* = #CSS_evaReport_EveInSpaceLowShallows_00 // Those oceans look flammable. You'd like to see the explosion if you dropped a match in.
        EveInSpaceLowShores* = #CSS_evaReport_EveInSpaceLowShallows_01 // Those shapes under the surface must be giant sea monsters. Mission Control gives their end of the radio a dope-slap.

        KerbinSrfLandedMidlands* = #CSS_evaReport_KerbinSrfLandedGrasslands_00 // As you go trudging through the grass you hope you don't step on a cow-patty. The spaceship will stink for the rest of the trip.
        KerbinSrfLandedMidlands* = #CSS_evaReport_KerbinSrfLandedGrasslands_01 // You free your potted plant and hope it does well in the wild.
        KerbinSrfLandedMidlands* = #CSS_evaReport_KerbinSrfLandedGrasslands_02 // You want to take your helmet off, and breathe the sweet air of your home planet.
        KerbinSrfLandedAridMidlands* = #CSS_evaReport_KerbinSrfLandedDeserts_00 // It is so hot here that your feet are burning even through the spacesuit.
        KerbinSrfLandedAridMidlands* = #CSS_evaReport_KerbinSrfLandedDeserts_01 // You pour your juice onto a small cactus. You decide to call it Mr. Prick and hope it grows up to be a beautiful palm tree. That's how it works, right?
        KerbinSrfLandedAridHighlands* = #CSS_evaReport_KerbinSrfLandedBadlands_00 // Your thoughts turn to running back to the capsule and hiding from whatever might live in the Badlands.
        KerbinSrfLandedAridHighlands* = #CSS_evaReport_KerbinSrfLandedBadlands_01 // You place some snacks on a makeshift altar. You hope that your offering pleases the denizens of the Badlands.
        KerbinSrfLandedAridHighlands* = #CSS_evaReport_KerbinSrfLandedBadlands_02 // Badlands, Shmadlands. It takes more than a bad name to scare this kerbonaut!
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedNorthernIceShelf_00 // Light from the ship and sky gleams off the shining white ground.
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedNorthernIceShelf_01 // The ground is white. The sky is white. Even the notepad paper is white.
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedSouthernIceShelf_00 // You're so close to the pole you could swear the compass needle changes orientation with every step.
        KerbinSrfLandedIceCaps* = #CSS_evaReport_KerbinSrfLandedSouthernIceShelf_01 // The ice here isn't snow, and what little loose stuff there is is no good for making snowballs.
        KerbinSrfSplashedKreenwichSea* = #CSS_evaReport_KerbinSrfSplashedWater_00 // You hope they made this spacesuit waterproof as well as space-proof.
        KerbinSrfSplashedForemansSea* = #CSS_evaReport_KerbinSrfSplashedWater_01 // You calculate the number of snacks you should bring to be able to swim to KSP.
        KerbinSrfSplashedTriangulusSea* = #CSS_evaReport_KerbinSrfSplashedWater_02 // Oh look a fishy! Then you remember what happened to your last goldfish and decide to let this one go.
        KerbinSrfSplashedEasternSea* = #CSS_evaReport_KerbinSrfSplashedWater_03 // You have trouble swimming because your helmet is more buoyant than the rest of your spacesuit.
        KerbinSrfSplashedWesternSea* = #CSS_evaReport_KerbinSrfSplashedWater_04 // Is that a shark over there?
        KerbinSrfSplashedInlandWater* = #CSS_evaReport_KerbinSrfSplashedWater_05 // Something nibbles on your foot.
        KerbinSrfSplashedGreatLake* = #CSS_evaReport_KerbinSrfSplashedWater_06 // Help! Help! Where's a lifeguard when you need them?
        KerbinSrfSplashedMidlands* = #CSS_evaReport_KerbinSrfSplashedGrasslands_00 // You peer down into the murky water. What could be lurking down there?
        KerbinSrfSplashedAridMidlands* = #CSS_evaReport_KerbinSrfSplashedDeserts_00 // It's not a mirage! There's actally water under you for once!
        KerbinSrfSplashedAridHighlands* = #CSS_evaReport_KerbinSrfSplashedBadlands_00 // You can feel the heat of the water through your suit. You don't really want to swim for much longer.
        KerbinSrfSplashedIceCaps* = #CSS_evaReport_KerbinSrfSplashedNorthernIceShelf_00 // You keep watch for the nearby icebergs to make sure none of them run you over as you swim.
        KerbinSrfSplashedIceCaps* = #CSS_evaReport_KerbinSrfSplashedSouthernIceShelf_00 // An iridescent sheen of ice forms on your helmet visor as water splashes freeze.
        KerbinFlyingLowMidlands* = #CSS_evaReport_KerbinFlyingLowGrasslands_00 // Mission Control assures you, "don't panic."
        KerbinFlyingLowMidlands* = #CSS_evaReport_KerbinFlyingLowGrasslands_01 // Oh dear.
        KerbinFlyingLowMidlands* = #CSS_evaReport_KerbinFlyingLowGrasslands_02 // "Why did I go outside? I really want to get back into the capsule!"
        KerbinFlyingLowMidlands* = #CSS_evaReport_KerbinFlyingLowGrasslands_03 // You suddenly realize that your space suit doesn't include a parachute.
        KerbinFlyingLowAridMidlands* = #CSS_evaReport_KerbinFlyingLowDeserts_00 // You can see the cactus and scrub brush clearly from here. Too clearly for comfort.
        KerbinFlyingLowAridMidlands* = #CSS_evaReport_KerbinFlyingLowDeserts_01 // The air is dusty and dry. Each breath leaves you wanting.
        KerbinFlyingLowAridHighlands* = #CSS_evaReport_KerbinFlyingLowBadlands_00 // Mission Control assures you reckless displays of bravery are well-received in the Badlands.
        KerbinFlyingLowAridHighlands* = #CSS_evaReport_KerbinFlyingLowBadlands_01 // As you hang on for dear life, you start to question your career choice.
        KerbinFlyingLowAridHighlands* = #CSS_evaReport_KerbinFlyingLowBadlands_02 // Are you really sure now is a good time?
        KerbinFlyingLowIceCaps* = #CSS_evaReport_KerbinFlyingLowNorthernIceShelf_00 // Even from this vantage point you can't see anything over the horizon.
        KerbinFlyingLowIceCaps* = #CSS_evaReport_KerbinFlyingLowNorthernIceShelf_01 // The solid white, flat surface makes it difficult to judge altitude. Don't think about the prospect you could be dangerously low.
        KerbinFlyingLowIceCaps* = #CSS_evaReport_KerbinFlyingLowSouthernIceShelf_00 // The rushing air somehow makes it even colder. Can we get back in now?
        KerbinFlyingLowIceCaps* = #CSS_evaReport_KerbinFlyingLowSouthernIceShelf_01 // Looking down at the flat ice you can't tell how fast you're moving, or even if you're moving at all. It's unnerving.
        KerbinInSpaceLowMidlands* = #CSS_evaReport_KerbinInSpaceLowGrasslands_00 // The hills and valleys of the grasslands seem even closer looking through a spacesuit visor. You begin to long for home. And snacks. Need more snacks.
        KerbinInSpaceLowMidlands* = #CSS_evaReport_KerbinInSpaceLowGrasslands_01 // If you squint really hard you can see some of the scattered debris from your discarded booster stages.
        KerbinInSpaceLowMidlands* = #CSS_evaReport_KerbinInSpaceLowGrasslands_02 // It's so big. You wonder if you can see your house from here. Probably not.
        KerbinInSpaceLowAridMidlands* = #CSS_evaReport_KerbinInSpaceLowDeserts_00 // You look down and contemplate the desert below. Then you contemplate having a snack when you return to the ship, because really, snacks are far more interesting than a dusty desert.
        KerbinInSpaceLowAridMidlands* = #CSS_evaReport_KerbinInSpaceLowDeserts_01 // Just looking down is making you thirsty.
        KerbinInSpaceLowAridMidlands* = #CSS_evaReport_KerbinInSpaceLowDeserts_02 // You contemplate the serene beauty of Kerbin's deserts, and long for solid ground.
        KerbinInSpaceLowAridHighlands* = #CSS_evaReport_KerbinInSpaceLowBadlands_00 // The badlands don't look so bad from up here. YOU HEAR THAT BADLANDS?! YOU DON'T SCARE US!!.....we're not going down there, are we?
        KerbinInSpaceLowAridHighlands* = #CSS_evaReport_KerbinInSpaceLowBadlands_01 // As you sigh in relief at the distance separating you from the Badlands, you find yourself thankful that there's no such thing as Badspace.
        KerbinInSpaceLowAridHighlands* = #CSS_evaReport_KerbinInSpaceLowBadlands_02 // Somehow you get the feeling that something down there is watching you.
        KerbinInSpaceLowIceCaps* = #CSS_evaReport_KerbinInSpaceLowNorthernIceShelf_00 // It looks flat, white and boring from up here.
        KerbinInSpaceLowIceCaps* = #CSS_evaReport_KerbinInSpaceLowNorthernIceShelf_01 // You squint, and struggle to tell where the land ends and sea ice begins.
        KerbinInSpaceLowIceCaps* = #CSS_evaReport_KerbinInSpaceLowSouthernIceShelf_00 // The ice caps gleam brilliantly in the sun. They have a splendent beauty from space, but you know how bad they are on the ground.
        KerbinInSpaceLowIceCaps* = #CSS_evaReport_KerbinInSpaceLowSouthernIceShelf_02 // The great ice platform below traces an outline through the sea that could easily be mistaken for a true continent.
        
        MunSrfLandedNotableCraters* = #CSS_evaReport_MunSrfLandedEastCrater_00 // You feel a peculiar quake. When you look behind you, there is a fresh meteor impacted where you were just walking.
        MunSrfLandedRareCraters* = #CSS_evaReport_MunSrfLandedNorthwestCrater_00 // You should have brought your golf club.
        MunSrfLandedRareCraters* = #CSS_evaReport_MunSrfLandedSouthwestCrater_01 // That dust is getting into everything! Now stop staring and help me clean my visor!
        MunSrfLandedExoticCraters* = #CSS_evaReport_MunSrfLandedFarsideCrater_00 // You wonder how that rock got into your spacesuit.
        MunSrfLandedPolarIceCraters* = #CSS_evaReport_MunSrfLandedPolarCrater_00 // Feeling slightly bored, you play peek-a-boo with Kerbin over the crater edges.
        MunSrfLandedExoticCraters* = #CSS_evaReport_MunSrfLandedEastFarsideCrater_00 // There was something you were going to say, and even though you spent the entire trip over here perfecting your delivery, you've somehow managed to forget it.
        MunSrfLandedLowlands* = #CSS_evaReport_MunSrfLandedPolarLowlands_00 // You confirm that the Mun is not made out of cheese. Mission Control is very sad.
        MunSrfLandedVoronoiCraters* = #CSS_evaReport_MunSrfLandedHighlandCraters_00 // It doesn't -taste- like it's made of dairy...
        MunSrfLandedVoronoiCraters* = #CSS_evaReport_MunSrfLandedMidlandCraters_00 // Yep, it's a crater all right. You've noted this down on your checklist with a smiley face. Science is fun!
        MunSrfLandedNotableCraters* = #CSS_evaReport_MunSrfLandedTwinCraters_00 // You really want to jump again, but last time Mission Control yelled at you.
        MunInSpaceLowNotableCraters* = #CSS_evaReport_MunInSpaceLowEastCrater_00 // You stare at the Mun amazed at how fast you are moving over the surface; maybe going out of the capsule was a bad decision.
        MunInSpaceLowNotableCraters* = #CSS_evaReport_MunInSpaceLowEastCrater_01 // It's hard to tell from outside the cockpit, but you think that you might be really low. You're not... in the crater, are you?
        MunInSpaceLowNotableCraters* = #CSS_evaReport_MunInSpaceLowEastCrater_02 // You Stare at the Mun amazed at how fast you are moving over the surface; maybe going out of the capsule was a bad decision.
        MunInSpaceLowNotableCraters* = #CSS_evaReport_MunInSpaceLowTwinCraters_00 // What an oddly-shaped crater. Are they two different impacts? Or perhaps the result of an impactor hitting at an angle and skipping across the surface.
        MunInSpaceLowExoticCraters* = #CSS_evaReport_MunInSpaceLowFarsideCrater_00 // Hmm not bad. Still, you'd like to see the West Nearside Crater before making the final decision on which crater is the fairest of them all.
        MunInSpaceLowPolarIceCraters* = #CSS_evaReport_MunInSpaceLowPolarCrater_00 // You wish you could've witnessed the devastating impact that created the Mun's vast Polar Crater. From a safe distance of course.
        MunInSpaceLowPoles* = #CSS_evaReport_MunInSpaceLowPolarLowlands_00 // If this was Kerbin, you'd be seeing ice sheets by now. Oh well, EVAs are still fun.
        MunInSpaceLowVoronoiCraters* = #CSS_evaReport_MunInSpaceLowHighlandCraters_00 // After you complete your allotted activities, you let go of the ship and float freely over the Mun's Highland Craters.
        MunInSpaceLowVoronoiCraters* = #CSS_evaReport_MunInSpaceLowMidlandCraters_00 // Holy crap there's a lot of them... which means there's plenty to go around when they start naming things after people!
        MunInSpaceLowExoticCraters* = #CSS_evaReport_MunInSpaceLowEastFarsideCrater_01 // You wish you brought a skateboard. Those crater walls would make an awesome halfpipe.
        
        MinmusSrfLandedBasins* = #CSS_evaReport_MinmusSrfLandedFlats_00 // As far as you can tell in the low gravity, the ground is firm underfoot, and not as slippery as you had expected.
        MinmusSrfLandedBasins* = #CSS_evaReport_MinmusSrfLandedGreatFlats_00 // You think you could drill some holes here and play golf... space golf, of course.
        MinmusSrfLandedBasins* = #CSS_evaReport_MinmusSrfLandedGreaterFlats_00 // As you exit your craft, you utter the words; "It's one small step for Kerbals, one giant leap for Kerbalkind."
        MinmusSrfLandedBasins* = #CSS_evaReport_MinmusSrfLandedLesserFlats_00 // Engine's exhaust seems to have melted the ice underneath.
        MinmusSrfLandedMountains* = #CSS_evaReport_MinmusSrfLandedSlopes_00 // You wonder how far you could slide down this hill...
        MinmusSrfLandedMountains* = #CSS_evaReport_MinmusSrfLandedSlopes_01 // You start to jury-rig a sled from spare parts, only to be interrupted by orders from Mission Control.
        MinmusSrfLandedMountains* = #CSS_evaReport_MinmusSrfLandedSlopes_02 // You could have sworn you saw a little boy and a tiger sledding down the hill in a toboggan. You check your O2 supply... Ah! Just hypoxia.
        MinmusInSpaceLowBasins* = #CSS_evaReport_MinmusInSpaceLowFlats_00 // These ice lakes are so flat and smooth, you suspect they would make an excellent drag strip.
        MinmusInSpaceLowBasins* = #CSS_evaReport_MinmusInSpaceLowGreatFlats_00 // If the spaceship fails, you could probably use the jetpack to get back into orbit.
        MinmusInSpaceLowBasins* = #CSS_evaReport_MinmusInSpaceLowGreaterFlats_00 // You need to do something about the lack of snacks here.
        MinmusInSpaceLowBasins* = #CSS_evaReport_MinmusInSpaceLowLesserFlats_00 // The low gravity would make driving around difficult.
        
        DunaSrfLandedIceCaps* = #CSS_evaReport_DunaSrfLandedPoles_00 // It feels as though a stiff breeze is tugging at your ankles. You suspect that this means gas is escaping from the ice caps, and this makes you slightly nervous.
        DunaSrfLandedIceCaps* = #CSS_evaReport_DunaSrfLandedPoles_01 // A sudden puff of gas makes you jump back from the geyser hole you were peering into.
        DunaSrfLandedMidlands* = #CSS_evaReport_DunaSrfLandedMidlandSea_00 // You look up at Ike overhead, and it reminds you of Dres. It's just as dull, too.
        DunaSrfLandedMidlands* = #CSS_evaReport_DunaSrfLandedMidlandSea_01 // You trudge on through the fine red sand, dust cascading off your boots with every step.
        DunaSrfLandedNotablePlains* = #CSS_evaReport_DunaSrfLandedNorthernBasin_00 // You can't see the other side of the basin. Whatever sort of basin it is, it's massive!
        DunaSrfLandedNotablePlains* = #CSS_evaReport_DunaSrfLandedNorthernBasin_01 // Your suit does a pretty good job of keeping you warm in the cold, but your toes are getting a bit chilly.
        DunaSrfLandedNotablePlains* = #CSS_evaReport_DunaSrfLandedSouthernBasin_00 // The ground is slushy underfoot, as though it can't make its mind up over whether it wants to be ice or rock.
        DunaSrfLandedNotablePlains* = #CSS_evaReport_DunaSrfLandedSouthernBasin_01 // A squall of freezing wind blows off the ice cap, briefly making you very cold indeed.
        DunaSrfLandedNotableMountains* = #CSS_evaReport_DunaSrfLandedNorthernShelf_00 // A blast of howling wind almost blows you off your feet as sand clatters against your visor plate.
        DunaSrfLandedNotableMountains* = #CSS_evaReport_DunaSrfLandedNorthernShelf_01 // The even-more-freezing-than-usual wind bites into your toes. Where could it possibly be coming from?
        DunaSrfLandedNotableMountains* = #CSS_evaReport_DunaSrfLandedNorthernShelf_02 // The sand grains flying past swirl and rub against each other as an even more huge dust storm front bears down on you from the north. The air around you crackles with static electricity that makes your hair stand up.
        DunaSrfLandedTrenches* = #CSS_evaReport_DunaSrfLandedMidlandCanyon_00 // On one side you can see rock face, on the other you can see the vast expanse of the Midland Sea.
        DunaSrfLandedTrenches* = #CSS_evaReport_DunaSrfLandedMidlandCanyon_01 // You look up at the walls, but lose your balance and tip over, landing on your back in the dust.
        DunaSrfLandedTrenches* = #CSS_evaReport_DunaSrfLandedEasternCanyon_00 // You want to stand on a rock and strike a dramatic pose, but you can't find a big enough one in the thick haze.
        DunaSrfLandedTrenches* = #CSS_evaReport_DunaSrfLandedEasternCanyon_01 // Dust-that's all you can see. You daren't wander too far from the ship in case you can't find it again.
        DunaSrfLandedTrenches* = #CSS_evaReport_DunaSrfLandedWesternCanyon_00 // You look down one end of the canyon, and then look down the other end. It's very disorienting, and you'd hate to get lost here.
        DunaSrfLandedTrenches* = #CSS_evaReport_DunaSrfLandedWesternCanyon_01 // You pull out a pair of binoculars and look at the wall just in time to see a huge boulder fall from the precipice and crash to the canyon floor. The sound doesn't make it to your position.
        DunaSrfLandedNotableMountains* = #CSS_evaReport_DunaSrfLandedPolarHighlands_00 // From this elevated vantage point you can see the dazzling pinkish hills stretching into the distance.
        DunaSrfLandedNotableMountains* = #CSS_evaReport_DunaSrfLandedPolarHighlands_01 // You look back at your ship and see large amounts of vapour hissing from under it. You hope it isn't about to sink into the ice.
        DunaSrfLandedExoticCraters* = #CSS_evaReport_DunaSrfLandedPolarCraters_00 // You step onto the ice and immediately almost slip over. Some things never change about ice.
        DunaSrfLandedExoticCraters* = #CSS_evaReport_DunaSrfLandedPolarCraters_01 // Thankfully, the suits have climate control. You try and stop yourself thinking about you freezing your ass off without it.
        DunaFlyingLowIceCaps* = #CSS_evaReport_DunaFlyingLowPoles_00 // You see a far-off gas plume eject a large chunk of ice into the thin air. You consider jumping into one to see how high you can get.
        DunaFlyingLowIceCaps* = #CSS_evaReport_DunaFlyingLowPoles_01 // Everywhere you look, you see white. The undulating icy plains stretch toward the steeply curving horizon.
        DunaFlyingLowMidlands* = #CSS_evaReport_DunaFlyingLowMidlandSea_00 // Airborne sand grains skitter off your visor glass, creating an almost hypnotic hissing noise.
        DunaFlyingLowMidlands* = #CSS_evaReport_DunaFlyingLowMidlandSea_01 // Despite moving at some speed through the air, you don't feel any kind of substantial wind resistance. The atmosphere must be extremely thin.
        DunaFlyingLowNotablePlains* = #CSS_evaReport_DunaFlyingLowNorthernBasin_00 // The wind tries its best to buffet you around, but you manage to stay steady and get a look around from a slightly higher vantage point.
        DunaFlyingLowNotablePlains* = #CSS_evaReport_DunaFlyingLowNorthernBasin_01 // The wind blowing around you is cold. Like, really cold. You long for the warmth of your seat on the ship.
        DunaFlyingLowNotablePlains* = #CSS_evaReport_DunaFlyingLowSouthernBasin_00 // You distract yourself from the effects of the rushing cold air by imagining sitting back in the Astronaut Complex breakroom with a cup of warm koffee and a biscuit.
        DunaFlyingLowNotablePlains* = #CSS_evaReport_DunaFlyingLowSouthernBasin_01 // It's even colder than usual up here at these high latitudes, and the wind chill from flying makes it even colder. You hope the airheads at the AC fixed your suit heater before you left.
        DunaFlyingLowNotableMountains* = #CSS_evaReport_DunaFlyingLowNorthernShelf_00 // You struggle to maintain your aerial position in the winds and consider tying yourself to the craft.
        DunaFlyingLowNotableMountains* = #CSS_evaReport_DunaFlyingLowNorthernShelf_01 // There is an eerie lull in the weather, and for a few seconds the dust clears enough for you to marvel at the canyon's vast scale.
        DunaFlyingLowTrenches* = #CSS_evaReport_DunaFlyingLowMidlandCanyon_00 // The sun is shining, but it's still cold here. Cold enough to make you wish you had brought some hot koffee with you.
        DunaFlyingLowTrenches* = #CSS_evaReport_DunaFlyingLowMidlandCanyon_01 // You're in the air but thanks to the looming walls, you don't feel like you're getting any higher or lower.
        DunaFlyingLowTrenches* = #CSS_evaReport_DunaFlyingLowEasternCanyon_00 // The dust is still thick, but does thin out a little when off the surface. Still can't see much, though.
        DunaFlyingLowTrenches* = #CSS_evaReport_DunaFlyingLowEasternCanyon_01 // You look down, and try to make out patterns in the swirling dust. That's a... swirly thing. That's another swirly thing.
        DunaFlyingLowTrenches* = #CSS_evaReport_DunaFlyingLowWesternCanyon_00 // From up here you can see both walls. Quite the narrow canyon indeed; perfect for some high-speed hovering-craft racing!
        DunaFlyingLowTrenches* = #CSS_evaReport_DunaFlyingLowWesternCanyon_01 // The straightness of the walls you can see makes your eyes start to water.
        DunaFlyingLowNotableMountains* = #CSS_evaReport_DunaFlyingLowPolarHighlands_00 // It looks much the same from up here as it does down there. Hilly and white.
        DunaFlyingLowNotableMountains* = #CSS_evaReport_DunaFlyingLowPolarHighlands_01 // The peaks are covered in ice, but as far as you can tell there are no glaciers to be found.
        DunaFlyingLowExoticCraters* = #CSS_evaReport_DunaFlyingLowPolarCraters_00 // From the air, you can clearly see the shape of the icy depression. Quite a large hole indeed.
        DunaFlyingLowExoticCraters* = #CSS_evaReport_DunaFlyingLowPolarCraters_01 // The hope you had of being able to have a snowball fight fade as you see it's all ice down there.
        DunaInSpaceLowIceCaps* = #CSS_evaReport_DunaInSpaceLowPoles_00 // The curving edge of the planet shows just a hint of red surrounding a sea of white ice below you. It's beautiful!
        DunaInSpaceLowIceCaps* = #CSS_evaReport_DunaInSpaceLowPoles_01 // The mountain chains are just visible as a series of wiggly lines stretching over the sea of white.
        DunaInSpaceLowMidlands* = #CSS_evaReport_DunaInSpaceLowMidlandSea_00 // You look down, and try to imagine the Midland Sea when it was still full of water. It's hard, given the state of the place now.
        DunaInSpaceLowMidlands* = #CSS_evaReport_DunaInSpaceLowMidlandSea_01 // The surface in the depression looks darker and the edges are clearly visible, especially in the great semicircular scar in the north.
        DunaInSpaceLowNotablePlains* = #CSS_evaReport_DunaInSpaceLowNorthernBasin_00 // From here, you can see the basin, with the huge rebound peak in the centre giving it away as a crater. It's enormous!
        DunaInSpaceLowNotablePlains* = #CSS_evaReport_DunaInSpaceLowNorthernBasin_01 // The huge basin below looks like a doughnut, to compliment the koffee stain canyon to the east.
        DunaInSpaceLowNotablePlains* = #CSS_evaReport_DunaInSpaceLowSouthernBasin_00 // It's easy to track the edges of the basin on the land, but where it disappears under the ice it's hard to make them out.
        DunaInSpaceLowNotablePlains* = #CSS_evaReport_DunaInSpaceLowSouthernBasin_01 // The depression is just about visible running under the ice as a darkened patch of lower elevation
        DunaInSpaceLowNotableMountains* = #CSS_evaReport_DunaInSpaceLowNorthernShelf_00 // That's a big scar. Duna must have been in a serious fight at some point.
        DunaInSpaceLowNotableMountains* = #CSS_evaReport_DunaInSpaceLowNorthernShelf_01 // The waves of airborne sand blowing through the canyon below form beautiful patterns over the surface.
        DunaInSpaceLowTrenches* = #CSS_evaReport_DunaInSpaceLowMidlandCanyon_00 // You trace the outline of the canyon in front of you. It reminds you of a koffee stain.
        DunaInSpaceLowTrenches* = #CSS_evaReport_DunaInSpaceLowMidlandCanyon_01 // It looks like someone had their koffee cup on the surface or tried to saw through the crust. Either way, it's impressive.
        DunaInSpaceLowTrenches* = #CSS_evaReport_DunaInSpaceLowEasternCanyon_00 // This canyon is by far the biggest of Duna's great scars, slicing through plains and hills alike.
        DunaInSpaceLowTrenches* = #CSS_evaReport_DunaInSpaceLowEasternCanyon_01 // If you tilt your head sideways, you could swear the canyon looks like a crooked smiley face. What do you mean, 'you're seeing things'?
        DunaInSpaceLowTrenches* = #CSS_evaReport_DunaInSpaceLowWesternCanyon_00 // The great scar in the landscape below links two of the biggest basins on Duna like some kind of great cutting.
        DunaInSpaceLowTrenches* = #CSS_evaReport_DunaInSpaceLowWesternCanyon_01 // Zooming in, you see half a crater on the edge of the canyon. Was it made by half a meteorite, or has the rest fallen into the canyon as it widened?
        DunaInSpaceLowNotableMountains* = #CSS_evaReport_DunaInSpaceLowPolarHighlands_00 // The icy hills glint in the sunlight far below you. You wonder if there are any UFOs buried down there.
        DunaInSpaceLowExoticCraters* = #CSS_evaReport_DunaInSpaceLowPolarCraters_00 // It's white, and it looks cold down there. If you're going down there, you should probably go and search for some warm gloves.
        DunaInSpaceLowExoticCraters* = #CSS_evaReport_DunaInSpaceLowPolarCraters_01 // The crater appears as a dark dot set against the slightly pinkish whiteness of the polar ice cap.
        
        IkeSrfLandedPoles* = #CSS_evaReport_IkeSrfLandedPolarLowlands_00 // You skip along, each step leaving a small cloud of black, carboniferous dust.
        IkeSrfLandedPoles* = #CSS_evaReport_IkeSrfLandedPolarLowlands_01 // You look around and marvel at the massive scale of this bowl in the landscape.
        IkeSrfLandedPoles* = #CSS_evaReport_IkeSrfLandedSouthPole_00 // The low sun angle at these latitudes illuminates the minute quantities of dust around Ike.
        IkeSrfLandedPoles* = #CSS_evaReport_IkeSrfLandedSouthPole_01 // You stop to shake the clumps of dust off your boot. This stuff really sticks!
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedEasternMountainRidge_00 // These mountains stretch right from the north pole to the south. Perfect for a long-distance Ike hike.
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedEasternMountainRidge_01 // The soil clings to your boots, and you lift up big clumps of it attached to your sole with every step.
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedWesternMountainRidge_00 // From your vantage point, all you can see is massive massifs as far as the horion goes.
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedWesternMountainRidge_01 // You feel on top of the world. Or at least as far as Ike can count as a "world".
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedSouthEasternMountainRange_00 // This grey dust sticks to everything, and soon you're caked in it head to toe.
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedSouthEasternMountainRange_01 // You contemplate climbing one of the mountains when you realise it would be much easier in the low gravity.
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedCentralMountainRange_00 // It seems like a hike would be nice. What might you see from the other side of this moon? Pack plenty of air!
        IkeSrfLandedMountains* = #CSS_evaReport_IkeSrfLandedCentralMountainRange_01 // Duna hangs in the sky overhead. You think back to the Mun landings, then realise looking at it has made you lose your balance.
        IkeInSpaceLowPoles* = #CSS_evaReport_IkeInSpaceLowPolarLowlands_00 // You squint into some binoculars placed on your suit visor and watch the shadows move across the surface of the depression.
        IkeInSpaceLowPoles* = #CSS_evaReport_IkeInSpaceLowSouthPole_00 // You long to build a snowman (dustman?) out of the huge amounts of clumpy dust down below.
        IkeInSpaceLowPoles* = #CSS_evaReport_IkeInSpaceLowSouthPole_01 // Craters far below cast long shadows over their basin floors.
        IkeInSpaceLowMountains* = #CSS_evaReport_IkeInSpaceLowEasternMountainRidge_00 // From space, you can see just how far the mountains extend. Crazy stuff.
        IkeInSpaceLowMountains* = #CSS_evaReport_IkeInSpaceLowWesternMountainRidge_01 // You almost feel as though you can reach out and touch the huge line of mountains below.
        IkeInSpaceLowMountains* = #CSS_evaReport_IkeInSpaceLowWesternMountainRidge_02 // You christen one of the mountains you can see "Kerman Massif". Mission Control doesn't seem to like it much.
        IkeInSpaceLowMountains* = #CSS_evaReport_IkeInSpaceLowSouthEasternMountainRange_00 // The mountains are grey and crinkled from space, as though Ike needs some skin cream.
        IkeInSpaceLowMountains* = #CSS_evaReport_IkeInSpaceLowCentralMountainRange_00 // While admiring the landscape, you notice that Duna is not moving or rotating. This could mean that Ike is tidally locked, or it could mean that you forgot your glasses.
        IkeInSpaceLowMountains* = #CSS_evaReport_IkeInSpaceLowCentralMountainRange_01 // That red ball is always on the edge of your vision, reminding you that you'd much rather be down there than up here.
        
        DresSrfLandedCanyon* = #CSS_evaReport_DresSrfLandedCanyons_00 // For a planet of this size and gravity, there are an awful lot of craters.
        
        LaytheSrfLandedIceCaps* = #CSS_evaReport_LaytheSrfLandedPoles_00 // Can I take off my spacesuit?
        LaytheSrfLandedShores* = #CSS_evaReport_LaytheSrfLandedDunes_00 // You wonder if you could swim to the next island from here.
        LaytheFlyingLowIceCaps* = #CSS_evaReport_LaytheFlyingLowPoles_00 // You realize that you forgot to bring sunscreen.
        LaytheFlyingLowHighlands* = #CSS_evaReport_LaytheFlyingLowDunes_00 // You feel comfortable, back at Kerbin after such a long sleep. Wait a minute...
        LaytheInSpaceLowJoolwardSea* = #CSS_evaReport_LaytheInSpaceLowPoles_00 // You search the sky, hoping to see Jool.
        LaytheInSpaceLowHighlands* = #CSS_evaReport_LaytheInSpaceLowDunes_00 // Your Geiger Counter is emitting a continuous hum. Time to flee.

        BopSrfLandedMountains* = #CSS_evaReport_BopSrfLandedPeaks_00 // The low gravity is counterbalanced by a strong attraction to Jool. It is very green.
        BopSrfLandedMountains* = #CSS_evaReport_BopSrfLandedPeaks_01 // Mission Control tells you not to take off your helmet.
        BopSrfLandedHighlands* = #CSS_evaReport_BopSrfLandedRidges_00 // You note that it seems boring here, and wish you'd been allowed to bring the beach ball you wanted to.
        BopSrfLandedPoles* = #CSS_evaReport_BopSrfLandedPoles_00 // There's something ominous lurking here... you just know it.
        BopSrfLandedMidlands* = #CSS_evaReport_BopSrfLandedSlopes_00 // The air feels murky and ominous. A second later, you remember there is no air on Bop, so it's probably just your suit being out of order.
        BopSrfLandedLowlands* = #CSS_evaReport_BopSrfLandedValley_00 // You look around at the tops of the round lumps around you and think you see a small flash in the distance. You put down "weird" in the mission report.
        BopInSpaceLowMountains* = #CSS_evaReport_BopInSpaceLowPeaks_00 // I wish that we were not here.
        BopInSpaceLowMountains* = #CSS_evaReport_BopInSpaceLowPeaks_01 // I can see the ship from up here!

        EelooSrfLandedCanyon* = #CSS_evaReport_EelooSrfLandedIceCanyons_00 // You step off the capsule to the crackling of ice under your boots. Your eyes adjust to the faint light. From way out here, Kerbol is just another star. You reflect upon the several year journey it took to get here.
        EelooInSpaceLowCanyon* = #CSS_evaReport_EelooInSpaceLowIceCanyons_00 // You discover it is very cold. You ask Mission Control if you can get back into your ship now.
    }
}