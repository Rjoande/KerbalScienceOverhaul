        LaytheSrfLandedShallows* = #JNSQscience_atmosphereAnalysis_LaytheSrfLandedShallows_00 // The analyzer reports plenty of oxygen, but it also reports you are standing in a cloud of salty mist. Everything nearby is “gently corrosive.”
