@EXPERIMENT_DEFINITION:HAS[#id[bd_hydrometer]]
{
	%RESULTS
	{
        KerbinSrfLandedMidlands* = #ScienceRefactor_bd_hydrometer_KerbinSrfLandedGrasslands_00 // Readings from here have revealed the presence of moisture in significant quantities.
        KerbinSrfLandedTundra* = #ScienceRefactor_bd_hydrometer_KerbinSrfLandedTundra_00 // Cold temperatures have decreased the levels of moisture in the atmosphere significantly.
        KerbinSrfLandedAridHighlands* = #ScienceRefactor_bd_hydrometer_KerbinSrfLandedBadlands_00 // The near desert conditions of the badlands causes a very low moisture reading.
        KerbinSrfLandedAridMidlands* = #ScienceRefactor_bd_hydrometer_KerbinSrfLandedDeserts_00 // It's the desert. What did you expect? A monsoon?
        
        DunaSrfLandedIceCaps* = #ScienceRefactor_bd_hydrometer_DunaSrfLandedPoles_00 // Water and frozen CO2 are present on the surface and sublimation causes this area to have far higher moisture readings than the rest of the planet.
        
        LaytheSrfLandedIceCaps* = #ScienceRefactor_bd_hydrometer_LaytheSrfLandedPoles_00 // Even at the poles water remains in liquid form and in high concentrations in the atmosphere lending support to the theory that high levels of salt are also present in the water. Spectroscopic readings might be able to prove this theory conclusively.
	}
}