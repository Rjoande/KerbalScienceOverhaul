        #GEPscience_bd_bioexp_DamonaSrfLandedTropicalLowlands_01 = Fuori c'è roccia nuda sotto luce rossa fioca, dentro ci sono anfibi che fanno pratica con la gravità come fosse una regola nuova.
        #GEPscience_bd_bioexp_DamonaSrfLandedTemperateLowlands_00 = I bassopiani sono abbastanza silenziosi da sentire i relè dell'habitat fare clic, le rane si fermano a ogni suono, poi riprendono a giudicare.
        #GEPscience_bd_bioexp_DamonaSrfLandedTemperateLowlands_01 = Senza atmosfera, i segnali giorno notte sono solo scelte di illuminazione, le rane non approvano le tue.
        #GEPscience_bd_bioexp_DamonaSrfLandedTropicalMidlands_00 = Le pianure tropicali si stendono tra ombre nette, le rane seguono l'ombra del lander come se potesse muoversi da sola.
        #GEPscience_bd_bioexp_DamonaSrfLandedTropicalMidlands_01 = Ogni piccolo sobbalzo in bassa gravità sembra drammatico, le rane tentano un salto eroico e danno un colpetto gentile al coperchio della vasca.
        #GEPscience_bd_bioexp_DamonaSrfLandedTemperateMidlands_00 = La cabina sembra una piccola isola in un posto enorme e freddo, le rane restano vicine e diventano l'unico movimento vivente per chilometri.
        #GEPscience_bd_bioexp_DamonaSrfLandedTemperateMidlands_01 = Registri respirazione stabile e attività ridotta, le rane registrano "perché il sole è rosso e stanco".
        #GEPscience_bd_bioexp_DamonaSrfLandedHighlands_00 = Dalle colline, Sirona è una presenza lontana, le rane lo fissano come fosse un promemoria enorme.
        #GEPscience_bd_bioexp_DamonaSrfLandedHighlands_01 = Il lander scricchiola mentre si assesta, le rane si immobilizzano, poi tornano a fluttuare come se nulla fosse successo.
        #GEPscience_bd_bioexp_DamonaSrfLandedImpactBasin_00 = Le pareti del bacino sembrano vecchie cicatrici, le rane reagiscono essendo estremamente educate e restando nella loro vasca.
        #GEPscience_bd_bioexp_DamonaSrfLandedImpactBasin_01 = I marcatori di stress salgono quando dici "profondità del cratere". Le rane non sono convinte che terrai la porta chiusa.
        #GEPscience_bd_bioexp_DamonaSrfLandedPoles_00 = Il suolo polare riflette la luce rossa fioca senza alcun calore, le rane si stringono e si rifiutano di essere d'ispirazione.
        #GEPscience_bd_bioexp_DamonaSrfLandedPoles_01 = Il riscaldatore cicla rapidamente, le rane migrano millimetro dopo millimetro verso il punto caldo come minuscole esploratrici testarde.
        #GEPscience_bd_bioexp_DamonaInSpaceLow_00 = In orbita bassa, Damona sparisce in fretta, le rane si aggrappano alla parete della vasca a ogni correzione di rotta, per sicurezza.
        #GEPscience_bd_bioexp_DamonaInSpaceLow_01 = Periodi orbitali brevi e lunghi ritardi nelle comunicazioni fanno sembrare il tempo storto, le rane risolvono dormendo quando capita.
        #GEPscience_bd_bioexp_DamonaInSpaceHigh_00 = Molto sopra, la luna è una piccola perla scura sotto un sole rosso fioco, le rane derivano in silenzio mentre la radio aspetta di essere ascoltata.
        #GEPscience_bd_bioexp_DamonaInSpaceHigh_01 = Il rapporto dell'esperimento recita "adattamento stabile". Il sottotesto recita "molto lontano da qualunque cosa familiare".
        #GEPscience_bd_bioexp_EponaSrfLandedTropicalLowlands_00 = Il termometro esterno insiste che faccia freddo, ma la nebbia al suolo dice altro, le rane si animano sotto la luce diurna rossa e fioca.
        #GEPscience_bd_bioexp_EponaSrfLandedTropicalLowlands_01 = Zone più calde nei bassopiani creano minuscole pozze di acqua di fusione, le rane le fissano come se avessero scoperto un lusso proibito.
        #GEPscience_bd_bioexp_EponaSrfLandedTemperateLowlands_00 = Le pianure dei bassopiani si stendono sotto un perpetuo crepuscolo rosso, le rane adottano una routine lenta e prudente e smettono di aspettarsi il "mattino".
        #GEPscience_bd_bioexp_EponaSrfLandedTemperateLowlands_01 = Le comunicazioni crepitano di statica mentre l'habitat ronza regolare, le rane sembrano più calme quando smetti di chiamarlo "giorno".
        #GEPscience_bd_bioexp_EponaSrfLandedTropicalUplands_00 = I crinali degli altopiani sfiatano un tenue calore attraverso il ghiaccio, le rane si premono contro il vetro della vasca, poi fanno finta di non essere interessate.
        #GEPscience_bd_bioexp_EponaSrfLandedTropicalUplands_01 = Il sole rosso illumina appena il paesaggio, ma il calore interno no, le rane rispondono con brevi scatti di attività e lunghi sguardi al pavimento.
        #GEPscience_bd_bioexp_EponaSrfLandedTemperateUplands_00 = Gli altopiani sembrano un freezer vuoto con un lucernario, le rane si stringono e lasciano che siano i riscaldatori a esplorare.
        #GEPscience_bd_bioexp_EponaSrfLandedTemperateUplands_01 = Ogni passo là fuori scricchiolerebbe e striderebbe, dentro, le rane fluttuano in silenzio e fanno sentire la cabina meno sola.
        #GEPscience_bd_bioexp_EponaSrfLandedHighlands_00 = Quassù il vento ha delle opinioni e la luce no, le rane migrano di due centimetri alla volta verso l'angolo più caldo.
        #GEPscience_bd_bioexp_EponaSrfLandedHighlands_01 = Il sole rosso resta basso e ostinato sulle alture, il ciclo di sonno delle rane diventa "quando finisce la checklist".
        #GEPscience_bd_bioexp_EponaSrfLandedGrandPeaks_00 = Dalle cime l'orizzonte sembra abbastanza affilato da tagliare, le rane reagiscono diventando invece estremamente interessate alle alghe della vasca.
        #GEPscience_bd_bioexp_EponaSrfLandedGrandPeaks_01 = Sottili bande di nubi strisciano sotto di te come fumo lento, le rane sbattono le palpebre davanti alla vista e riprendono a fluttuare con indifferenza professionale.
        #GEPscience_bd_bioexp_EponaSrfLandedCraters_00 = Le ombre dei crateri restano scure anche a "mezzogiorno", le rane reagiscono alla penombra diventando quiete e seguendo la tua lampada frontale.
        #GEPscience_bd_bioexp_EponaSrfLandedCraters_01 = Le cicatrici d'impatto intrappolano freddo e silenzio, i marcatori di stress salgono quando lo scafo ticchetta, poi si appiattiscono quando compaiono gli snack.
        #GEPscience_bd_bioexp_EponaSrfLandedVolcanoes_00 = Vicino agli sfiati, la brina lascia spazio a vapore caldo, le rane diventano abbastanza attive da ricordarti che hanno le zampe.
        #GEPscience_bd_bioexp_EponaSrfLandedVolcanoes_01 = Il suolo a volte sospira e fuma, le rane approvano il calore, ma non che tu lo chiami "spiaggia".
        #GEPscience_bd_bioexp_EponaSrfLandedPoles_00 = I poli riflettono il sole rosso come fuoco freddo, le rane strizzano gli occhi per la luminosità e poi giudicano le tue scelte di illuminazione.
        #GEPscience_bd_bioexp_EponaSrfLandedPoles_01 = Fuori c'è ghiaccio infinito e ombre lunghe, dentro, le rane si ammucchiano e ridefiniscono il "lavoro di squadra" come "condividere calore".
        #GEPscience_bd_bioexp_EponaFlyingLow_00 = La foschia tinta di metano trasforma il mondo in un acquario rosso e fioco, le rane ruotano dolcemente e si mostrano offese dalla turbolenza.
        #GEPscience_bd_bioexp_EponaFlyingLow_01 = Le nubi scorrono come lente tende color ruggine, le rane continuano a derivare verso la parete della vasca dal lato "più scuro".
        #GEPscience_bd_bioexp_EponaFlyingHigh_00 = In alto il cielo sfuma verso il nero, ma il sole resta rosso e stanco, le rane rallentano come se risparmiassero energia per il segnale di ritorno.
        #GEPscience_bd_bioexp_EponaFlyingHigh_01 = La pressione scende e la radio sibila, le rane restano il sistema più stabile a bordo, e sembra un commento.
        #GEPscience_bd_bioexp_EponaInSpaceLow_00 = L'orbita bassa mostra una brillante crosta di ghiaccio con crepe dall'aria sospettosamente calda, le rane si premono contro il vetro a ogni attraversamento dell'ombra.
        #GEPscience_bd_bioexp_EponaInSpaceLow_01 = Controllo Missione chiede aggiornamenti, le rane sbattono le palpebre davanti al ritardo e continuano a "nuotare" in microgravità come se nulla non andasse.
        #GEPscience_bd_bioexp_EponaInSpaceHigh_00 = Da molto sopra, Epona è una biglia pallida sotto una lampada rossa fioca, le rane restano immobili ogni volta che il trasmettitore fa un bip.
        #GEPscience_bd_bioexp_EponaInSpaceHigh_01 = Il pianeta si rimpicciolisce, l'oscurità cresce e il ritardo nelle comunicazioni cresce più in fretta, le rane dormono come se l'avessero già fatto.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTropicalLowlands_00 = "Tropicale" qui significa che la brina è solo un po' meno perfida, le rane restano al caldo nella vasca e si rifiutano di ammirare il panorama.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTropicalLowlands_01 = Il terreno è polveroso e silenzioso, le rane sbattono lentamente le palpebre, come se aspettassero che il sole rosso facesse qualcosa di utile.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTemperateLowlands_00 = I bassopiani sono piatti, freddi e abbastanza solitari da sentire la ventola della tua tuta, le rane sono l'unico movimento vivace per chilometri.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTemperateLowlands_01 = Fuori, i contatori di radiazioni gracchiano, dentro, le rane fanno finta di non notarlo fluttuando molto immobili.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTropicalMidlands_00 = Le ombre delle pianure tropicali non si muovono mai come ti aspetti, le rane le seguono come se potessero strisciare dentro l'habitat.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTropicalMidlands_01 = Abbassi le luci della cabina per abbinarle al cielo rosso, le rane si rilassano un po', dimostrando di avere più gusto dell'equipaggio.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTemperateMidlands_00 = L'habitat scricchiola mentre si raffredda, le rane si immobilizzano, poi riprendono come scienziate professioniste con un autocontrollo eccellente.
        #GEPscience_bd_bioexp_RosmertaSrfLandedTemperateMidlands_01 = Senza aria là fuori, ogni suono è dentro, le rane reagiscono a ogni clic dei relè come se potesse essere compagnia.
        #GEPscience_bd_bioexp_RosmertaSrfLandedHighlands_00 = Dalle alture, Epona riempie metà cielo come un proprietario di casa silenzioso, le rane lo fissano e poi fissano te, con aria sospettosa.
        #GEPscience_bd_bioexp_RosmertaSrfLandedHighlands_01 = La bassa gravità trasforma ogni salto in una decisione lenta, le rane la provano una volta, danno una botta al vetro e ci ripensano.
        #GEPscience_bd_bioexp_RosmertaSrfLandedPoles_00 = Ai poli la luce è più fioca e il freddo è più rumoroso, le rane si stringono e dichiarano il riscaldatore il loro nuovo sole.
        #GEPscience_bd_bioexp_RosmertaSrfLandedPoles_01 = Il mondo là fuori sembra intatto e poco accogliente, i marcatori di stress delle rane calano quando smetti di aprire le tende.
        #GEPscience_bd_bioexp_RosmertaInSpaceLow_00 = L'orbita bassa fa sembrare Rosmerta ancora più piccolo accanto a Epona, le rane si aggrappano alla parete della vasca a ogni accensione di correzione.
        #GEPscience_bd_bioexp_RosmertaInSpaceLow_01 = Orbite brevi, lunghi ritardi, perfetto per gli studi sullo stress, le rane reagiscono dormendo ogni volta che le radio smettono di parlare.
        #GEPscience_bd_bioexp_RosmertaInSpaceHigh_00 = Molto sopra, la luna è un puntino pallido sotto un sole rosso fioco, le rane derivano in silenzio come se il silenzio avesse peso.
        #GEPscience_bd_bioexp_RosmertaInSpaceHigh_01 = La telemetria arriva in ritardo ma pulita, alle rane non importa della latenza, solo del pranzo.
        #GEPscience_bd_bioexp_RAB-58ESrfLandedLowlands_00 = La superficie è un caos di forse roccia, forse ghiaccio, le rane fluttuano come se temessero che il mini satellite possa andarsene alla deriva senza di loro.
        #GEPscience_bd_bioexp_RAB-58ESrfLandedLowlands_01 = La gravità quasi zero fa sembrare la vasca l'unico "suolo" affidabile, le rane trattano ogni movimento come un esperimento prudente.
        #GEPscience_bd_bioexp_RAB-58ESrfLandedEasternHighlands_00 = Gli altopiani orientali si alzano in bozzi sgraziati, come se il mini satellite fosse stato assemblato di fretta, le rane fissano l'orizzonte e sbattono le palpebre due volte.
        #GEPscience_bd_bioexp_RAB-58ESrfLandedEasternHighlands_01 = La radiazione è rumorosa sugli strumenti e silenziosa ovunque altro, le rane rispondono diventando molto immobili e molto giudicanti.
        #GEPscience_bd_bioexp_RAB-58ESrfLandedWesternHighlands_00 = Sugli altopiani occidentali, le ombre si allungano in modo strano sul terreno spezzato, le rane le seguono come se stessero cercando di leggere il paesaggio.
        #GEPscience_bd_bioexp_RAB-58ESrfLandedWesternHighlands_01 = Il lander si assesta con un minuscolo scricchiolio che riecheggia nella tua immaginazione, le rane si irrigidiscono, poi riprendono le pattuglie fluttuanti.
        #GEPscience_bd_bioexp_RAB-58EInSpaceLow_00 = L'orbita bassa è praticamente una correzione di rotta continua, le rane si premono contro la parete della vasca ogni volta che i thruster sussurrano.
        #GEPscience_bd_bioexp_RAB-58EInSpaceLow_01 = Sotto di te, il mini satellite catturato ruota come se non sapesse dove appartiene, le rane guardano allo stesso modo il timer del ritardo.
        #GEPscience_bd_bioexp_RAB-58EInSpaceHigh_00 = Da più in alto, RAB-58E diventa un sassolino in un buio enorme, le rane derivano calme, come se la scala fosse un problema di qualcun altro.
        #GEPscience_bd_bioexp_RAB-58EInSpaceHigh_01 = Il sole rosso è una brace appena percettibile quassù, le rane sonnecchiano attraverso la solitudine come fosse routine.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTropicalLowlands_00 = "Tropicale" su Cernunnos significa che il ghiaccio è più morbido e il vento è più cattivo, le rane scelgono l'angolo caldo e lo difendono con diplomazia.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTropicalLowlands_01 = La luce rossa fioca dipinge i bassopiani in un crepuscolo permanente, le rane smettono di aspettarsi un vero giorno e iniziano ad aspettarsi snack.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTemperateLowlands_00 = I bassopiani sono ampi e pallidi, come un mare ghiacciato a cui hanno tolto l'acqua, le rane lo fissano e decidono che la vasca è meglio.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTemperateLowlands_01 = Neve di disturbi danza sulla radio, le rane fluttuano sul posto e fanno sentire la cabina meno come un punto su una mappa.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTropicalMidlands_00 = Le pianure tropicali salgono in crinali ruvidi e ghiacciati, le rane provano un salto in bassa gravità e scoprono che le pareti arrivano più tardi del previsto.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTropicalMidlands_01 = Gli strumenti giurano che il sole sia alto, il paesaggio non è d'accordo, le rane si assestano su un orario che ignora entrambi.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTemperateMidlands_00 = Le ombre scivolano lente sul terreno come se stessero pensando, le rane le guardano e poi guardano te, come se fossi tu a comandare le ombre.
        #GEPscience_bd_bioexp_CernunnosSrfLandedTemperateMidlands_01 = L'habitat ticchetta piano mentre si raffredda, le rane si fermano a ogni suono, poi continuano come se lo stoicismo fosse contagioso.
        #GEPscience_bd_bioexp_CernunnosSrfLandedHighlands_00 = Dalle alture, l'orizzonte sembra troppo vuoto, le rane diventano più quiete ogni volta che parli di quanto sei lontano.
        #GEPscience_bd_bioexp_CernunnosSrfLandedHighlands_01 = Il sole rosso resta basso e fioco, facendo sembrare ogni roccia più vecchia, le rane restano testardamente vive e lievemente offese.
        #GEPscience_bd_bioexp_CernunnosSrfLandedSouthPolarHills_00 = Le colline polari sono increspate e spazzate dal vento, le rane si stringono insieme e lo chiamano "ricerca di gruppo" per il rapporto.
        #GEPscience_bd_bioexp_CernunnosSrfLandedSouthPolarHills_01 = Fuori, le ombre sono così lunghe da sembrare terreno, dentro, le rane seguono la tua lampada frontale come se fosse l'intero cielo.
        #GEPscience_bd_bioexp_CernunnosSrfLandedNorthPole_00 = Al polo nord il ghiaccio riflette un tenue bagliore cremisi, le rane strizzano gli occhi per la luminosità e poi si ritirano in un mucchietto caldo.
        #GEPscience_bd_bioexp_CernunnosSrfLandedNorthPole_01 = Qui i livelli di luce cambiano a malapena, il ritmo circadiano delle rane diventa "quando la cabina è abbastanza silenziosa".
        #GEPscience_bd_bioexp_CernunnosInSpaceLow_00 = L'orbita bassa rivela un mondo nano ghiacciato e accenna ad altri piccoli corpi lì vicino, le rane si aggrappano alla parete della vasca a ogni passaggio di scansione.
        #GEPscience_bd_bioexp_CernunnosInSpaceLow_01 = Ogni volta che attraversi l'ombra, la cabina sembra più piccola, le rane reagiscono fluttuando più vicine tra loro senza che nessuno glielo chieda.
        #GEPscience_bd_bioexp_CernunnosInSpaceHigh_00 = Molto sopra, Cernunnos si riduce a una pallida perlina sotto una brace rossa fioca, le rane derivano quiete mentre la radio aspetta di essere ascoltata.
        #GEPscience_bd_bioexp_CernunnosInSpaceHigh_01 = I dati tornano puliti e in ritardo, le rane dormono durante l'attesa come se avessero imparato la pazienza dello spazio profondo.

        // bd_camera
        #GEPscience_bd_camera_GrannusFlyingLow_00 = Il mirino si riempie di un bagliore rosso fioco e le impostazioni di esposizione si arrendono subito. Etichetti la foto "decisamente una stella" e speri che il downlink sopravviva al calore.
        #GEPscience_bd_camera_GrannusFlyingLow_01 = La fotocamera cattura pattern ribollenti nella foschia cremisi, poi si rifiuta educatamente di tenere l'otturatore aperto. Il primo fotogramma compresso arriva a Controllo Missione molto dopo che hai smesso di sbattere le palpebre.
        #GEPscience_bd_camera_GrannusFlyingHigh_00 = Il sole rosso resta sotto di te come una lampada da officina che cova, ma la fotocamera trova finalmente un'impostazione che non sia "bianco incandescente". Il bilanciamento del colore sta ancora discutendo con se stesso.
        #GEPscience_bd_camera_GrannusFlyingHigh_01 = Scatti un panorama del vasto bagliore rossastro e ti rendi conto che non c'è un orizzonte a cui ancorare lo sguardo. Anche il timestamp sembra solo quassù.
        #GEPscience_bd_camera_GrannusInSpaceHigh_00 = A questa distanza il sole rosso sembra calmo, come se fingesse di non essere pericoloso. Il trasferimento del file dura così tanto che inizi a dare un nome ai pixel.
        #GEPscience_bd_camera_GrannusInSpaceHigh_01 = La fotocamera cattura un cielo scuro e vuoto attorno a un disco luminoso come brace. Il silenzio nell'immagine è quasi più forte della radio.
        #GEPscience_bd_camera_GrannusInSpaceLowNorthPolarZone_00 = L'obiettivo rileva deboli striature e una luminosità a chiazze vicino al polo, come se la stella si pettinasse la propria luce. Aggiungi una nota: "Non fissare le foto per conforto".
        #GEPscience_bd_camera_GrannusInSpaceLowNorthPolarZone_01 = Uno scatto polare nitido rivela una texture sottile nel bagliore rosso che si rifiuta di stare ferma. Il fotogramma scaricato arriva con un promemoria che i "fusi orari" qui non aiutano.
        #GEPscience_bd_camera_GrannusInSpaceLowNorthSubpolarZone_00 = La vista subpolare mostra un gradiente delicato dal granata profondo all'arancione furioso. La tua fotocamera insiste che sia arte, il tuo rapporto insiste che siano dati.
        #GEPscience_bd_camera_GrannusInSpaceLowNorthSubpolarZone_01 = Catturi un bordo sottile e tremolante in cui la luminosità cambia all'improvviso, poi sparisce. Il ritardo fa sì che Controllo Missione reagisca al tuo "wow" con qualche ora di ritardo.
        #GEPscience_bd_camera_GrannusInSpaceLowNorthTemperateZone_00 = L'immagine mostra un lucore irrequieto, dall'aspetto granuloso, sotto la luce rossa. Fai finta di aver voluto fotografare "caratteristiche dinamiche" fin dall'inizio.
        #GEPscience_bd_camera_GrannusInSpaceLowNorthTemperateZone_01 = Una serie di fotogrammi suggerisce che i pattern di superficie scorrano tra uno scatto e l'altro. Provi a fare un timelapse, ma la finestra di upload è più corta della tua pazienza.
        #GEPscience_bd_camera_GrannusInSpaceLowNorthTropicZone_00 = La zona tropicale sembra increspature congelate a metà movimento, tinte del colore di vecchie spie di avvertimento. Ti senti molto lontano da qualunque cosa chiamerebbe questo "soleggiato".
        #GEPscience_bd_camera_GrannusInSpaceLowNorthTropicZone_01 = Scatti due foto identiche e tornano comunque diverse. La stella sembra spostare la scena solo per dimostrare che può farlo.
        #GEPscience_bd_camera_GrannusInSpaceLowEquatorialZone_00 = La fascia equatoriale appare più luminosa e più turbolenta, come se il sole rosso si stesse stiracchiando. L'autofocus della fotocamera si arrende in silenzio e lascia a te decidere cosa sia "nitido".
        #GEPscience_bd_camera_GrannusInSpaceLowEquatorialZone_01 = Una lunga esposizione trasforma il bagliore rosso in un velo liscio con deboli vene più scure. Ti chiedi se la stella abbia un meteo, poi ti ricordi che te lo stai chiedendo mentre fluttui.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthTropicZone_00 = I tropici meridionali mostrano una texture morbida e ondulata che fa cercare al cervello nuvole familiari. Lo fermi prima che si inventi il familiare.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthTropicZone_01 = La fotocamera cattura un delicato gradiente di luminosità che sembra un respiro lento. È inquietante quanto qualcosa di così enorme possa sembrare quieto.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthTemperateZone_00 = Qui la luce rossa è più fioca, ma travolge comunque metà del sensore. Archivi il risultato come "con successo, non cieco".
        #GEPscience_bd_camera_GrannusInSpaceLowSouthTemperateZone_01 = Dopo l'elaborazione compare una sottile bandeggiatura, come se la stella avesse lasciato impronte sull'immagine. Controllo Missione chiede fotogrammi di calibrazione, tu chiedi un'antenna più veloce.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthSubpolarZone_00 = La regione subpolare sembra più liscia a prima vista, finché non fai zoom e la vedi brulicare di minuscole variazioni. Il ritardo radio fa sembrare di spedire cartoline attraverso un oceano.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthSubpolarZone_01 = Catturi il lembo rosso che sfuma nel nero dello spazio e all'improvviso ti manca un "su" normale. La fotocamera non si perde nulla, continua solo a scattare.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthPolarZone_00 = Lo scatto del polo sud torna con un contrasto netto tra rosso profondo e nero assoluto. È difficile credere che ci sia un intero universo fuori da questa brace.
        #GEPscience_bd_camera_GrannusInSpaceLowSouthPolarZone_01 = Vicino al polo compare una struttura fine, come leggere pennellate in vernice luminosa. Controlli l'obiettivo per la polvere e trovi solo il tuo disagio.
        #GEPscience_bd_camera_TaranisSrfLandedMagmaShores_00 = La linea di costa brilla come un cartello di avvertimento su cui puoi stare in piedi. Scatti una foto e ti penti subito di quanto sia calda la fotocamera.
