		#JNSQscience_bd_massSpec_EveSrfLandedPeaks_00 = For a moment the spectrum is almost tidy: less aerosol, more crisp gas lines. The instrument saves the run under “Rare Victory.”
		#JNSQscience_bd_massSpec_EveSrfLandedMountains_00 = Rock dust dominates the sample, with heavy-gas lines punching through underneath. The chamber contents are now officially “gritty and oppressive.”
