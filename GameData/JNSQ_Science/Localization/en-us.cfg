        #JNSQscience_evaReport_NaraSrfLandedLowlands_00 = The ground looks like it was vacuum-packed by cold and time. Your boots make a sound you can almost feel through the suit.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_01 = The air is thick enough to push back, but too cold to be friendly about it. You take a breath and remember you can’t.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_02 = The horizon is a long, flat reminder of how far you are from any rescue plan. You wave anyway, just in case.
        #JNSQscience_evaReport_NaraSrfLandedLowlands_03 = You try to kick up some dust for the camera, but it just slumps and settles. Even the dirt seems tired out here.
        #JNSQscience_evaReport_NaraSrfLandedMidlands_00 = The terrain rolls like frozen waves under a heavy sky. You suddenly appreciate how nice “boring” was.
        #JNSQscience_evaReport_NaraSrfLandedMidlands_01 = Your suit joints creak like they’re filing a complaint. You log it as “normal, probably.”
        #JNSQscience_evaReport_NaraSrfLandedMidlands_02 = The thick air makes everything look closer than it is, which is rude. You mark a distant ridge as “do not walk to.”
        #JNSQscience_evaReport_NaraSrfLandedMidlands_03 = You feel watched by nothing in particular. It’s an efficient kind of unsettling.
        #JNSQscience_evaReport_NaraSrfLandedHighlands_00 = Up here the wind has teeth, even through all this pressure. It finds every seam you hoped was airtight.
        #JNSQscience_evaReport_NaraSrfLandedHighlands_01 = The ground glittering in your lamp isn’t pretty so much as sharp-looking. You decide not to fall down.
        #JNSQscience_evaReport_NaraSrfLandedHighlands_02 = The sky has a dim, washed look, like the system forgot to load the bright textures. You make a note: “Still terrifying.”
        #JNSQscience_evaReport_NaraSrfLandedHighlands_03 = Every step feels historic, and also like a terrible idea. You record both feelings for the archive.
        #JNSQscience_evaReport_NaraSrfLandedMountains_00 = The peaks loom like they’re holding up the whole sky. You don’t trust them, but you respect the effort.
        #JNSQscience_evaReport_NaraSrfLandedMountains_01 = You can’t decide if the air is trying to cushion you or smother you. The suit votes “smother.”
        #JNSQscience_evaReport_NaraSrfLandedMountains_02 = From here, the lowlands look endless and the trip home looks theoretical. You take a photo anyway.
        #JNSQscience_evaReport_NaraSrfLandedMountains_03 = Your visor fogs for a moment and you panic, then realize it’s just you being dramatic. You log that too.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_00 = The cold is so intense it feels organized. You suspect it has a schedule.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_01 = The ground has a smooth crust that dares you to break it. You decline and shuffle politely.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_02 = Your footprints don’t look like footprints; they look like proof. You hurry to make a few more.
        #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_03 = The wind drags fine frost along the surface like smoke that forgot how to rise. It’s mesmerizing and alarming.
        #JNSQscience_evaReport_NaraSrfLandedPoles_00 = The compass behaves, the sky doesn’t. You watch faint curtains of light and feel very small inside a very expensive suit.
        #JNSQscience_evaReport_NaraSrfLandedPoles_01 = Official mission notes say “bring ruby slippers.” You check your boots twice and decide to keep your feet together, just in case.
        #JNSQscience_evaReport_NaraSrfLandedPoles_02 = The cold here isn’t just low; it’s smug. You write “smug cold at poles” in the log.
        #JNSQscience_evaReport_NaraSrfLandedPoles_03 = You raise your arm to point at something and the suit resists like it’s worried you’ll get ideas. It’s right.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_00 = The high polar ridges cut the wind into neat, sharp slices. You would like to file for hazard pay retroactively.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_01 = The surface crunches underfoot, then slowly relaxes back into place. Even the ground wants to forget you were here.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_02 = You look out over a frozen world that doesn’t care about flags. You plant one anyway, because that’s what you do.
        #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_03 = Your radio delay makes every sentence feel like a message in a bottle. You keep talking so the silence doesn’t win.
        #JNSQscience_evaReport_NaraFlyingLowLowlands_00 = You cling to the ladder while the dense air rumbles past like an angry ocean. You report: “EVA: windy in a very committed way.”
        #JNSQscience_evaReport_NaraFlyingLowLowlands_01 = The cold makes your suit feel like it’s shrinking around you. You try not to imagine what it’s doing to the craft.
        #JNSQscience_evaReport_NaraFlyingLowLowlands_02 = The ground below slides by slowly, as if Nara is reluctant to show you anything too fast. You agree with the pace.
        #JNSQscience_evaReport_NaraFlyingLowLowlands_03 = Static crackles across your visor and you taste fear through the headset. You log “possible electrical excitement.”
        #JNSQscience_evaReport_NaraFlyingLowMidlands_00 = The thick atmosphere tugs at your arms like it wants to keep you. You decide to be very aerodynamic and very still.
        #JNSQscience_evaReport_NaraFlyingLowMidlands_01 = The sky is pale and heavy, and your breathing is loud in your helmet. You pretend it’s confidence.
        #JNSQscience_evaReport_NaraFlyingLowMidlands_02 = You look down and realize a “short hop” on Nara still means a long way from the lander. You hold on tighter.
        #JNSQscience_evaReport_NaraFlyingLowMidlands_03 = Icing forms on exposed fittings in seconds. You add “do not lick anything” to the EVA checklist.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_00 = The air is turbulent over the ridges, and you bounce like a flag in a storm. You remember you are not, in fact, a flag.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_01 = The cold bites at your gloves through the suit’s heaters. You glare at it, which doesn’t help but feels scientific.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_02 = The mountains below look like they’re waiting for mistakes. You report no mistakes. None at all.
        #JNSQscience_evaReport_NaraFlyingLowHighlands_03 = Your radio pings arrive late, like Mission Control is calling from another lifetime. You answer anyway.
        #JNSQscience_evaReport_NaraFlyingLowMountains_00 = Hanging outside a flying craft over Nara’s mountains feels like a daring achievement and a paperwork error. You record both.
        #JNSQscience_evaReport_NaraFlyingLowMountains_01 = The wind tries to peel you off the ladder with professional confidence. You refuse with amateur stubbornness.
        #JNSQscience_evaReport_NaraFlyingLowMountains_02 = The peaks rush by beneath you like frozen waves, and you briefly forget where “up” is. You decide to not mention that.
        #JNSQscience_evaReport_NaraFlyingLowMountains_03 = The craft shudders in the thick air and you become intimately familiar with every handhold. You name one of them “Hope.”
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_00 = The low polar air is dense, cold, and full of fine crystals that ping your visor. It sounds like tiny applause for bad decisions.
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_01 = You can see your own shadow in the haze and it looks just as worried as you feel. You wave at it for morale.
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_02 = The surface below is smooth in a way that suggests it has never been disturbed. You apologize for the flyby.
        #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_03 = The cold turns the world monochrome, and the instruments do the same to your mood. You keep the report brief.
        #JNSQscience_evaReport_NaraFlyingLowPoles_00 = The sky near the pole flickers faintly, and your suit’s electronics complain in chorus. You tell them they’re not helping.
        #JNSQscience_evaReport_NaraFlyingLowPoles_01 = The atmosphere presses in, the temperature presses down, and your grip presses harder. You log “triple pressure.”
        #JNSQscience_evaReport_NaraFlyingLowPoles_02 = You can’t tell if the strange glow is aurora or just your visor doing something new. You politely request it stop.
        #JNSQscience_evaReport_NaraFlyingLowPoles_03 = Every comms reply comes back late, like it had to travel through the cold first. You start speaking slower out of respect.
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_00 = The wind over the polar ridges hits you in gusts that feel measured and mean. You report “highly optimized hostility.”
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_01 = Ice crystals streak past like slow stars, and for a second you forget you’re in atmosphere. Then the ladder rattles and you remember.
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_02 = The ground drops away beneath jagged slopes, and you feel the planet’s size in your stomach. You keep both hands on the craft.
        #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_03 = Your suit heater cycles nonstop and still loses the argument. You recommend “more heater” as future science.
        #JNSQscience_evaReport_NaraFlyingHigh_00 = Up here the sky is almost black, and the Sun is just a sharp reminder that warmth exists somewhere else. You feel very far from that somewhere.
        #JNSQscience_evaReport_NaraFlyingHigh_01 = The air thins but never really lets go. Nara seems determined to keep a hand on your shoulder.
        #JNSQscience_evaReport_NaraFlyingHigh_02 = The planet’s curve is visible beneath you, huge and quiet. You realize how long it would take to fall, and decide not to.
        #JNSQscience_evaReport_NaraFlyingHigh_03 = You speak a full sentence and wait for the reply, counting seconds like they’re a resource. They are.
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_00 = From low orbit the lowlands look like a frozen sheet pulled tight over secrets. You note the lack of anything that looks like an easy landing zone.
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_01 = The atmosphere’s haze clings to the surface, thick even from here. You record it as “stubborn.”
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_02 = The Sunlight is weak and slanted, and the shadows last forever. You don’t like how well that fits the mission mood.
        #JNSQscience_evaReport_NaraInSpaceLowLowlands_03 = You wave at the lander track and wonder if it’s still there. At this distance, “still there” feels like a luxury.
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_00 = The midlands show long ridges and faint bands, like the planet is trying to remember how to be active. You recommend more staring.
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_01 = You try to spot your landing site and realize how easy it is to lose anything on a world this big. Including yourself.
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_02 = The atmosphere blurs details into a soft threat. You make a note: “high pressure, low clarity, high worry.”
        #JNSQscience_evaReport_NaraInSpaceLowMidlands_03 = Your radio delay makes the orbit feel even quieter than it is. You report “silence increasing.”
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_00 = The highlands cast sharp shadows through the haze, like teeth behind frosted glass. You decide not to use the word “teeth” in the official report.
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_01 = The terrain looks rugged enough to challenge landing legs and confidence equally. You suggest bringing spares of both.
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_02 = You watch the sunlight crawl across ridges at a stubborn pace. Time feels heavier out here than gravity does.
        #JNSQscience_evaReport_NaraInSpaceLowHighlands_03 = The planet fills the window, and Kerbin fills your thoughts. You keep that last part off the recorder.
        #JNSQscience_evaReport_NaraInSpaceLowMountains_00 = The mountains rise like frozen waves trying to escape the atmosphere. You admit they are impressive, and then you shiver.
        #JNSQscience_evaReport_NaraInSpaceLowMountains_01 = Even from orbit, the peaks look hostile to landing and friendly to crashing. You highlight them as “photogenic hazards.”
        #JNSQscience_evaReport_NaraInSpaceLowMountains_02 = The air is thick enough to soften the edges of everything, except the feeling of distance. That stays crisp.
        #JNSQscience_evaReport_NaraInSpaceLowMountains_03 = You count the minutes until the next comms window like it’s oxygen. You have oxygen. It still feels like oxygen.
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_00 = The polar lowlands are a pale bowl of cold with a lid of haze. You can almost feel the pressure through the window.
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_01 = The Sun’s reflection is weak, and the shadows are strong. You label the region “excellent for hiding, terrible for living.”
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_02 = You see streaks that might be wind-driven frost. You remember being out there and decide orbit is fine.
        #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_03 = The landscape looks untouched, like a museum exhibit titled “Do Not Enter.” You entered anyway.
        #JNSQscience_evaReport_NaraInSpaceLowPoles_00 = The pole has faint glimmers that make the instruments happy and the crew nervous. You report “scientifically encouraging, emotionally not.”
        #JNSQscience_evaReport_NaraInSpaceLowPoles_01 = The haze over the pole has a strange sheen, as if the atmosphere is holding its breath. You find yourself doing the same.
        #JNSQscience_evaReport_NaraInSpaceLowPoles_02 = The polar region looks deceptively smooth until the shadows reveal sharp relief. Nara is good at surprises.
        #JNSQscience_evaReport_NaraInSpaceLowPoles_03 = You try to pick out your footprints from orbit and laugh at yourself. The laugh echoes in the cabin longer than it should.
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_00 = The polar highlands look like shattered glass under dim light. You recommend not skating there.
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_01 = From this altitude, the ridges look orderly, almost patterned. You dislike how intentional it feels.
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_02 = The Sun is far, the planet is huge, and you are a small machine in a big black ocean. You file the thought under “EVA impressions.”
        #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_03 = The shadows over the high polar terrain are so long they look permanent. You suggest better lamps and better courage.
        #JNSQscience_evaReport_NaraInSpaceHigh_00 = From high orbit, Nara looks less like a destination and more like a decision you can’t undo. You stare until the cabin feels smaller.
        #JNSQscience_evaReport_NaraInSpaceHigh_01 = The Sun is a bright dot that doesn’t warm your helmet at all. You record: “Confirmed: distance is real.”
        #JNSQscience_evaReport_NaraInSpaceHigh_02 = The handbook’s “ruby slippers” section is still unhelpful. You check the void below and confirm none are visible.
        #JNSQscience_evaReport_NaraInSpaceHigh_03 = The planet’s haze is a thin ring from here, a reminder that even emptiness can have weight. You keep your tether clipped twice.

        #JNSQscience_evaReport_AmosSrfLandedLowlands_00 = The ground is dark enough to make your helmet light feel shy. Your boots leave pale scuffs that look suspiciously like evidence.
        #JNSQscience_evaReport_AmosSrfLandedMidlands_00 = Every step kicks up a thin, smoky dust that refuses to settle quickly. Amos seems determined to keep its secrets airborne.
        #JNSQscience_evaReport_AmosSrfLandedHighlands_00 = The ridges are sharp and the shadows are sharper. You keep glancing over your shoulder, just in case the terrain is watching back.
        #JNSQscience_evaReport_AmosSrfLandedMountains_00 = The low gravity turns every hop into a tiny victory lap. The view is grand, grim, and completely uninterested in your feelings.
        #JNSQscience_evaReport_AmosSrfLandedPoles_00 = The light here feels wrong, like it arrived late and is trying to catch up. You stamp your feet to remind the universe you’re still warm inside the suit.
        #JNSQscience_evaReport_AmosInSpaceLowLowlands_00 = Floating over the lowlands, the surface looks like spilled ink with faint scratches. You wonder if Amos is actually a giant chalkboard.
        #JNSQscience_evaReport_AmosInSpaceLowMidlands_00 = From here the midlands have subtle bands and scuffs, like someone tried to polish the moon with sandpaper. You write “abrasive personality” in the report.
        #JNSQscience_evaReport_AmosInSpaceLowHighlands_00 = The highlands roll by beneath you in harsh contrasts. Your suit’s radio crackles and you pretend it’s just static.
        #JNSQscience_evaReport_AmosInSpaceLowMountains_00 = The mountains cast long, dramatic shadows that make you feel very small. You wave at them anyway, because bravery is mostly theater.
        #JNSQscience_evaReport_AmosInSpaceLowPoles_00 = Over the poles, Amos looks smoother and even darker, like it’s fading into space on purpose. You tighten your grip on the handrail and call it “data collection.”
        #JNSQscience_evaReport_AmosInSpaceHigh_00 = Amos shrinks to a charcoal pebble beside the black sky, and Nara dominates everything. You suddenly appreciate how much spacecraft have walls.

        #JNSQscience_evaReport_EnonSrfLandedLowlands_00 = The ground is bright enough to make you squint through the visor. It crunches underfoot like frozen sugar, and you immediately want to taste it (you do not).
        #JNSQscience_evaReport_EnonSrfLandedMidlands_00 = The surface is a patchwork of hard crust and loose grains that glitter in the light. You take a photo and it still just looks “white.”
        #JNSQscience_evaReport_EnonSrfLandedHighlands_00 = The highlands feel like standing on a frozen ocean that forgot how to move. The silence is so complete it feels like another layer of ice.
        #JNSQscience_evaReport_EnonSrfLandedPoles_00 = The polar ground is painfully pristine, broken only by your own clumsy footprints. You apologize to the landscape out loud, just in case.
        #JNSQscience_evaReport_EnonInSpaceLowLowlands_00 = From a short hop above Enon, the lowlands spread out like a blank page. You realize you’re the first smudge on it.
        #JNSQscience_evaReport_EnonInSpaceLowMidlands_00 = The midlands show faint textures and shallow scars beneath the glare. Enon’s “features” are subtle, but they’re definitely judging you.
        #JNSQscience_evaReport_EnonInSpaceLowHighlands_00 = The highlands gleam like carved ice under a lamp. You spin slowly to keep from staring too long at the endless white.
        #JNSQscience_evaReport_EnonInSpaceLowPoles_00 = Over the poles, the brightness falls into long blue shadows. Your suit’s temperature readout becomes your favorite piece of literature.
