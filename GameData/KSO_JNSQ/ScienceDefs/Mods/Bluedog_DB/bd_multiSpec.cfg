        LindorInSpaceHigh* = #JNSQscience_bd_multiSpec_LindorInSpaceHigh_00 // From high orbit, the multispectral composite reduces Lindor to pale rings of haze and shadow. The faintest bands still hint at layers stacked far below the clouds.
		LindorInSpaceLowTemperateBands* = #JNSQscience_bd_multiSpec_LindorInSpaceLowTemperateBands_00 // The temperate bands separate cleanly across wavelengths, revealing shear zones that plain imaging blurs away. Lindor’s atmosphere looks neatly organized and quietly violent.
