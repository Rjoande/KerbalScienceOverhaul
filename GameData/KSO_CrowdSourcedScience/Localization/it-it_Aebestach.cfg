        #CSS_Aebestach_mobileMaterialsLab_Minmus_03 = Orbita bassa di Minmus. I materiali fluttuano in microgravità.
        //   Dres
        #CSS_Aebestach_mobileMaterialsLab_Dres_01 = Poli di Dres. Materiali di ghiaccio.
        #CSS_Aebestach_mobileMaterialsLab_Dres_02 = Pianure di Dres. Materiali grigi.
        #CSS_Aebestach_mobileMaterialsLab_Dres_03 = Bassopiani di Dres. Materiali piatti.
        #CSS_Aebestach_mobileMaterialsLab_Dres_04 = Colline di Dres. Materiali collinari.
        #CSS_Aebestach_mobileMaterialsLab_Dres_05 = Crateri da impatto di Dres. Materiali da impatto.
        #CSS_Aebestach_mobileMaterialsLab_Dres_06 = Piroclasti da impatto di Dres. Materiali tra i piroclasti.
