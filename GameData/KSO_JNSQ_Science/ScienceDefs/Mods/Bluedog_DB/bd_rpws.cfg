@EXPERIMENT_DEFINITION:HAS[#id[bd_rpws]]
{
    %RESULTS
    {
        MohoInSpaceLow* = #JNSQscience_bd_rpws_MohoInSpaceLow_00 // The receiver is flooded with sharp chirps and angry whistlers; Moho is bathing in raw Kerbolar weather.
        MohoInSpaceHigh* = #JNSQscience_bd_rpws_MohoInSpaceHigh_00 // With a little distance, the noise settles into a steady hiss—thin plasma around Moho still crackles on the dial.

        GillyInSpaceLow* = #JNSQscience_bd_rpws_GillyInSpaceLow_00 // Every slow tumble of Gilly scrapes another burst of static into the antenna, like the rock is trying to tune itself.
        GillyInSpaceHigh* = #JNSQscience_bd_rpws_GillyInSpaceHigh_00 // Eve’s distant roar dominates the spectrum; Gilly only adds the occasional dusty pop.

        MunInSpaceHigh* = #JNSQscience_bd_rpws_MunInSpaceHigh_00 // Far from the surface, Kerbin’s broadcasts echo faintly through the void. Mission Control insists this still counts as science.

        MinmusInSpaceLow* = #JNSQscience_bd_rpws_MinmusInSpaceLow_00 // The readout shows gentle, lumpy wave packets—Kerbin’s influence is weak out here, but it’s not gone.
        MinmusInSpaceHigh* = #JNSQscience_bd_rpws_MinmusInSpaceHigh_00 // Mostly silence, punctuated by rare clicks of charged particles. The lab requests you “stop adjusting the volume.”

        DunaInSpaceHigh* = #JNSQscience_bd_rpws_DunaInSpaceHigh_00 // The thin air below flickers with faint radio crackle.
		IkeInSpaceLow* = #JNSQscience_bd_rpws_IkeInSpaceLow_00 // Mostly Duna’s weak hiss comes through. Ike itself contributes a stubborn silence.
		IkeInSpaceHigh* = #JNSQscience_bd_rpws_IkeInSpaceHigh_00 // Farther out, the spectrum smooths into plain solar wind with a few lonely pings off your own hardware.

		EdnaInSpaceLow* = #JNSQscience_bd_rpws_EdnaInSpaceLow_00 // Cold space around Edna carries sporadic pops of charged dust, like static from an invisible sweater.
		EdnaInSpaceHigh* = #JNSQscience_bd_rpws_EdnaInSpaceHigh_00 // Long stretches of quiet are broken by rare, sharp chirps. Something out here is brushing the antenna.
		DakInSpaceLow* = #JNSQscience_bd_rpws_DakInSpaceLow_00 // Dak reflects your own tones back slightly off-key. The lab insists this is “interesting” and not “mocking.”
		DakInSpaceHigh* = #JNSQscience_bd_rpws_DakInSpaceHigh_00 // The “potato” shrinks to a speck, but one stubborn blip hangs on as if trying to get your attention.

		DresInSpaceLow* = #JNSQscience_bd_rpws_DresInSpaceLow_00 // A weak chorus of plasma waves surrounds Dres. For a forgettable rock, it’s oddly chatty on the dial.
		DresInSpaceHigh* = #JNSQscience_bd_rpws_DresInSpaceHigh_00 // At distance, Dres fades into the background hiss of interplanetary space.

        LaytheInSpaceHigh* = #JNSQscience_bd_rpws_LaytheInSpaceHigh_00 // Jool’s distant roar fills the band; Laythe adds a faint, watery shimmer to the noise.
        LaytheInSpaceLow* = #JNSQscience_bd_rpws_LaytheInSpaceLow_00 // The receiver catches a steady, wet-sounding crackle. Jool’s trapped plasma and Laythe’s air are clearly not getting along.
		VallInSpaceLow* = #JNSQscience_bd_rpws_VallInSpaceLow_00 // The spectrum shows neat, repeating whistles—like something under Vall’s ice is ringing the plasma.
		VallInSpaceHigh* = #JNSQscience_bd_rpws_VallInSpaceHigh_00 // At altitude, Vall’s signature fades and Jool’s background hiss takes over the receiver.
		TyloInSpaceLow* = #JNSQscience_bd_rpws_TyloInSpaceLow_00 // Each pass behind Tylo cuts the signal hard, then it snaps back with a burst of crackling waves.
		TyloInSpaceHigh* = #JNSQscience_bd_rpws_TyloInSpaceHigh_00 // Tylo looks quiet from here; the only excitement is the slow, steady rumble of Jool’s magnetosphere.
		BopInSpaceLow* = #JNSQscience_bd_rpws_BopInSpaceLow_00 // The antenna picks up jumpy spikes that don’t repeat—either charged dust, or your cable is loose again.
		BopInSpaceHigh* = #JNSQscience_bd_rpws_BopInSpaceHigh_00 // Mostly static and distant Jovian tones; Bop contributes an eerie, empty gap in the readings.
		PolInSpaceLow* = #JNSQscience_bd_rpws_PolInSpaceLow_00 // Weak chirps drift through the receiver, like Pol is gently scuffing Jool’s trapped plasma.
		PolInSpaceHigh* = #JNSQscience_bd_rpws_PolInSpaceHigh_00 // Farther out, Pol is nearly silent; the instrument logs a wide, bland wash of radio noise from the system.

        LindorInSpaceLow* = #JNSQscience_bd_rpws_LindorInSpaceLow_00 // The receiver is overwhelmed by a roaring, warbling chorus. Lindor’s magnetic environment is very much awake.
		LindorInSpaceHigh* = #JNSQscience_bd_rpws_LindorInSpaceHigh_00 // The noise smooths into a steady hum with occasional sharp whistles, like distant auroras arguing politely.

		KrelInSpaceLow* = #JNSQscience_bd_rpws_KrelInSpaceLow_00 // Lindor’s loud radio storms dip and surge as Krel passes by, as if the moon is briefly “pinching” the signal.
		KrelInSpaceHigh* = #JNSQscience_bd_rpws_KrelInSpaceHigh_00 // Mostly you hear Lindor’s far-off rumble. Krel contributes a faint, repeating flutter and then goes quiet again.
		AdenInSpaceLow* = #JNSQscience_bd_rpws_AdenInSpaceLow_00 // The spectrum is mostly calm until sudden dust-pops snap across the band. Something around Aden is lightly charged.
		AdenInSpaceHigh* = #JNSQscience_bd_rpws_AdenInSpaceHigh_00 // A wide, thin hiss dominates—interrupted by rare clicks that the engineers swear are not the antenna.
		HuygenInSpaceLow* = #JNSQscience_bd_rpws_HuygenInSpaceLow_00 // A busy crackle fills the channels, like atmospheric static trying to tune a radio that refuses to cooperate.
		HuygenInSpaceHigh* = #JNSQscience_bd_rpws_HuygenInSpaceHigh_00 // The chatter fades into a low murmur. Whatever is making the noise is down in the haze, out of reach.
		RigaInSpaceLow* = #JNSQscience_bd_rpws_RigaInSpaceLow_00 // Weak, scratchy bursts come and go, as if you’re skimming a very thin envelope of charged grit.
		RigaInSpaceHigh* = #JNSQscience_bd_rpws_RigaInSpaceHigh_00 // Riga all but disappears from the readings; Lindor’s distant background dominates the entire dial.
		TalosInSpaceLow* = #JNSQscience_bd_rpws_TalosInSpaceLow_00 // Long, lonely silence—then a faint, delayed wobble from Lindor’s system drifts in like an old broadcast.
		TalosInSpaceHigh* = #JNSQscience_bd_rpws_TalosInSpaceHigh_00 // Almost nothing but the steady interplanetary hiss. Talos is far away, and it sounds like it.

        EelooInSpaceLow* = #JNSQscience_bd_rpws_EelooInSpaceLow_00 // Close in, the antenna hears tiny pops of charged ice dust—then, faintly, a far-away Kerbin tone sneaks into the log.
		EelooInSpaceHigh* = #JNSQscience_bd_rpws_EelooInSpaceHigh_00 // Almost nothing but the steady hiss of deep space. The instrument gets excited anyway and calls it “pristine.”

		CelesInSpaceLow* = #JNSQscience_bd_rpws_CelesInSpaceLow_00 // Skimming Celes, your own transmissions come back warped and delayed, as if the moon is politely refusing to answer directly.
		CelesInSpaceHigh* = #JNSQscience_bd_rpws_CelesInSpaceHigh_00 // From afar, Celes is a quiet bump in the noise floor. The only strong signals are the ones you brought with you.
		TamInSpaceLow* = #JNSQscience_bd_rpws_TamInSpaceLow_00 // The receiver fills with scratchy bursts as charged grit peppers the antenna. The engineers recommend “less grit.”
		TamInSpaceHigh* = #JNSQscience_bd_rpws_TamInSpaceHigh_00 // Tam fades to a weak flutter in the spectrum, like a pebble trying to whistle in a blizzard.

		HamekInSpaceLow* = #JNSQscience_bd_rpws_HamekInSpaceLow_00 // Low over Hamek, the spectrum shows slow, uneven wave packets—something is stirring the plasma for no obvious reason.
		HamekInSpaceHigh* = #JNSQscience_bd_rpws_HamekInSpaceHigh_00 // The dial is mostly calm, with rare, sharp clicks that feel like distant, uninvited footsteps in the dark.

        NaraInSpaceLow* = #JNSQscience_bd_rpws_NaraInSpaceLow_00 // The receiver fills with a roaring hiss and clean, repeating whistles; Nara’s charged upper air is putting on a show.
		NaraInSpaceHigh* = #JNSQscience_bd_rpws_NaraInSpaceHigh_00 // Farther out, the chaos settles into a steady hum, with distant storm-bursts riding the noise floor.

		AmosInSpaceLow* = #JNSQscience_bd_rpws_AmosInSpaceLow_00 // Nara’s background rumble dominates, but sharp little ticks suggest charged dust skittering around Amos.
		AmosInSpaceHigh* = #JNSQscience_bd_rpws_AmosInSpaceHigh_00 // Amos fades to near-silence; only a faint, warbling echo of Nara’s field lingers in the spectrum.
		EnonInSpaceLow* = #JNSQscience_bd_rpws_EnonInSpaceLow_00 // Tiny pops pepper the band like “static snow.” The antenna insists the moon is shedding electrified ice grit.
		EnonInSpaceHigh* = #JNSQscience_bd_rpws_EnonInSpaceHigh_00 // Clean interplanetary hiss, plus a slow, subtle beat that lines up with distant activity around Nara.
		PraxInSpaceLow* = #JNSQscience_bd_rpws_PraxInSpaceLow_00 // A sparse, lonely crackle marks Prax’s passage through thin plasma—quiet enough to hear your own electronics sigh.
		PraxInSpaceHigh* = #JNSQscience_bd_rpws_PraxInSpaceHigh_00 // Deep space dominates: thin hiss, rare chirps, and a barely-there reminder that Nara is still out there.
    }
}