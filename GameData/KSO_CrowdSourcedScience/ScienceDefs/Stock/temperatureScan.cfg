@EXPERIMENT_DEFINITION:HAS[#id[temperatureScan]]
{
    %RESULTS
    {
        Srf* = #CSS_temperatureScan_default_00 // The thermometer is busy right now. If you'd like to request a temperature reading, please leave your number after the tone.
        Srf* = #CSS_temperatureScan_default_01 // It doesn't say if it's in Celsius or Fahrenheit.
        Srf* = #CSS_temperatureScan_default_02 // Of course we use Kelvin. Everything must start with K.
        Srf* = #CSS_temperatureScan_default_03 // The screen displaying temperature information is continuously showing bad temperature puns. You note this strange behavior and hope it's not something serious.
        Srf* = #CSS_temperatureScan_default_04 // You read the temperature from the store-bought thermometer with a few wires stuck to it.
        Srf* = #CSS_temperatureScan_default_05 // Hotter than you expected.
        Srf* = #CSS_temperatureScan_default_06 // Colder than expected.
        Srf* = #CSS_temperatureScan_default_07 // More average than you expected.
        Srf* = #CSS_temperatureScan_default_08 // Temperature readings are nominal.
        Srf* = #CSS_temperatureScan_default_09 // Temperature reads 98.6. Looks normal.
        
        Flying* = #CSS_temperatureScan_default_00 // The thermometer is busy right now. If you'd like to request a temperature reading, please leave your number after the tone.
        Flying* = #CSS_temperatureScan_default_01 // It doesn't say if it's in Celsius or Fahrenheit.
        Flying* = #CSS_temperatureScan_default_02 // Of course we use Kelvin. Everything must start with K.
        Flying* = #CSS_temperatureScan_default_03 // The screen displaying temperature information is continuously showing bad temperature puns. You note this strange behavior and hope it's not something serious.
        Flying* = #CSS_temperatureScan_default_04 // You read the temperature from the store-bought thermometer with a few wires stuck to it.
        Flying* = #CSS_temperatureScan_default_05 // Hotter than you expected.
        Flying* = #CSS_temperatureScan_default_06 // Colder than expected.
        Flying* = #CSS_temperatureScan_default_07 // More average than you expected.
        Flying* = #CSS_temperatureScan_default_08 // Temperature readings are nominal.
        Flying* = #CSS_temperatureScan_default_09 // Temperature reads 98.6. Looks normal.
        
        InSpace* = #CSS_temperatureScan_default_00 // The thermometer is busy right now. If you'd like to request a temperature reading, please leave your number after the tone.
        InSpace* = #CSS_temperatureScan_default_01 // It doesn't say if it's in Celsius or Fahrenheit.
        InSpace* = #CSS_temperatureScan_default_02 // Of course we use Kelvin. Everything must start with K.
        InSpace* = #CSS_temperatureScan_default_03 // The screen displaying temperature information is continuously showing bad temperature puns. You note this strange behavior and hope it's not something serious.
        InSpace* = #CSS_temperatureScan_default_04 // You read the temperature from the store-bought thermometer with a few wires stuck to it.
        InSpace* = #CSS_temperatureScan_default_05 // Hotter than you expected.
        InSpace* = #CSS_temperatureScan_default_06 // Colder than expected.
        InSpace* = #CSS_temperatureScan_default_07 // More average than you expected.
        InSpace* = #CSS_temperatureScan_default_08 // Temperature readings are nominal.
        InSpace* = #CSS_temperatureScan_default_09 // Temperature reads 98.6. Looks normal.

        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_00 // The temperatures are off the chart. Check that, the chart just burned up. You wonder what it said...
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_01 // You look at the display and realize that you probably won't need the oven to heat your food.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_02 // It's hot. What did you expect?
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_03 // You come to the shocking conclusion that temperature readings here are considerably high.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_04 // The temperature is hard to read as the paint melts from the surface of the instrument.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_05 // The weather today is warm, with a risk of heat wave in the corona. Kerbals above the age of seventy are advised to stay inside if they wish their miraculous survival streak to continue.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_06 // The recording confirms your suspicion that it is in fact, very hot.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_07 // The wires in temperature read-outs have melted, giving blatantly incorrect readings.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_08 // Wow! This place is almost as hot as the surface of the... Oh, wait.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_09 // Your thermometer appears to be stuck at "MAX".
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_10 // The thermometer has exploded. You really wish you could've seen it.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_11 // I think it just broke.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_12 // It is quite hot. Mission Control asks if this experiment was necessary.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_13 // According to the thermometer, the Sun is hot. Fascinating.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_14 // I think the thermometer just exploded.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_15 // Though the thermometer has melted, you're able to take an guesstimated reading.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_16 // It seems the cookies are burning...
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_17 // The thermometer doesn't look like it was constructed to handle this kind of heat.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_18 // Mission Control assured you that the extremely high temperatures are perfectly harmless.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_19 // Hot stuff!
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_20 // "HOT!" Seems about right.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_21 // It's hot here. What a surprise!
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_22 // The thermometer seems to have melted. You can assume that it is rather toasty outside.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_23 // It's off the scale!
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_24 // The thermometer is on fire.
        SunInSpaceLow* = #CSS_temperatureScan_SunInSpaceLow_25 // Mission Controls observes the readings and formally requests the crew to back off a few million meters.

        MohoSrfLanded* = #CSS_temperatureScan_MohoSrfLanded_00 // It's cold. Wait...
        MohoSrfLandedNorthernSinkhole* = #CSS_temperatureScan_MohoSrfLandedNorthernSinkhole_00 // The thermal gradient data forms a very pretty chart.
        MohoSrfLandedMidlands* = #CSS_temperatureScan_MohoSrfLandedMidlands_00 // With every fan in the pod on, you don't need a thermometer to tell you it's hot.
        MohoSrfLandedCentralLowlands* = #CSS_temperatureScan_MohoSrfLandedCentralLowlands_00 // Temperature in the shadow seems to be quite low.
        MohoSrfLandedHighlands* = #CSS_temperatureScan_MohoSrfLandedHighlands_00 // The temperature here is so hot the thermometer has melted entirely. No matter, you send the data back anyway.
        MohoSrfLandedMinorCraters* = #CSS_temperatureScan_MohoSrfLandedMinorCraters_00 // The experiment is a success! The team predicted there would be numbers in the data!
        MohoSrfLandedCanyon* = #CSS_temperatureScan_MohoSrfLandedCanyon_00 // The melted thermometer makes you question the safety of this mission.
        MohoInSpaceLow* = #CSS_temperatureScan_MohoInSpaceLow_00 // You guessed it would be at least a million billion degrees this close to the Sun... but it isn't.
        MohoInSpaceLow* = #CSS_temperatureScan_MohoInSpaceLow_01 // This wasn't tested for such temperatures.

        EveSrfLandedPoles* = #CSS_temperatureScan_EveSrfLandedPoles_00 // It's slightly cooler, but still far too hot for anything to live.
        EveSrfLandedPoles* = #CSS_temperatureScan_EveSrfLandedPoles_01 // If the temperature could be cooled by sixty degrees, this might be a nice place. Ignoring the crushing atmosphere, toxic water and suspect chemicals in the dirt, that is.
        EveSrfLandedMidlands* = #CSS_temperatureScan_EveSrfLandedMidlands_00 // There's nothing middling about these burning temperatures at all.
        EveSrfLandedMidlands* = #CSS_temperatureScan_EveSrfLandedMidlands_01 // The ship bakes in the heat as the air around it shimmers with mirages.
        EveSrfLandedExplodiumSea* = #CSS_temperatureScan_EveSrfLandedExplodiumSea_00 // The liquid in the thermometer seems to be frothing angrily.
        EveSrfLandedLowlands* = #CSS_temperatureScan_EveSrfLandedLowlands_00 // Readings are off the charts, literally. Engineers in Mission Control hastily append another sheet of printer paper to them.
        EveSrfLandedHighlands* = #CSS_temperatureScan_EveSrfLandedHighlands_00 // The temperature is so hot that the thermometer wants to slap you in the face.
        EveSrfLandedHighlands* = #CSS_temperatureScan_EveSrfLandedHighlands_01 // Eve's proximity to Kerbol makes any kerbiforming effort doomed to failure as the planet is constantly blasted by heat.
        EveSrfLandedPeaks* = #CSS_temperatureScan_EveSrfLandedPeaks_00 // Perhaps that mountain over there is slightly cooler?
        EveSrfLandedPeaks* = #CSS_temperatureScan_EveSrfLandedPeaks_01 // A gentle wind blows up. Somehow it makes the air even hotter.
        EveSrfLandedPeaks* = #CSS_temperatureScan_EveSrfLandedPeaks_02 // Unlike Kerbin, the temperature seems to has risen. This planet seems like a recolour of "Venus" from "Human Space Program".
        EveSrfLandedImpactEjecta* = #CSS_temperatureScan_EveSrfLandedImpactEjecta_00 // That's far too pleasant to be right. Maybe if you jiggle the cord... aha! There it goes.
        EveSrfLandedImpactEjecta* = #CSS_temperatureScan_EveSrfLandedImpactEjecta_01 // Blackbody radiation from the ground and the hot air means it's still extremely hot in shadow.
        EveSrfLandedCraterLake* = #CSS_temperatureScan_EveSrfLandedCraterLake_00 // You consider dunking the thermometer in the lake to cool it off.
        EveSrfLandedWesternSea* = #CSS_temperatureScan_EveSrfLandedWesternSea_00 // A weak sea breeze does little to alleviate the oppressive, cloying heat.
        EveSrfLandedOlympus* = #CSS_temperatureScan_EveSrfLandedOlympus_00 // You're not sure whether you want to go any higher, lest you be burned by the sun as well as everything else.
        EveSrfLandedOlympus* = #CSS_temperatureScan_EveSrfLandedOlympus_01 // The temperature isn't as ludicrous all the way up here, but you're still not going outside without some ice packs.
        EveSrfLandedEasternSea* = #CSS_temperatureScan_EveSrfLandedEasternSea_00 // You start to worry that the liquid in the thermometer might boil soon.
        EveSrfLandedFoothills* = #CSS_temperatureScan_EveSrfLandedFoothills_00 // You're not sure if the temperature reading is accurate or if the gravity is so strong the mercury can't rise properly.
        EveSrfLandedShallows* = #CSS_temperatureScan_EveSrfLandedShallows_00 // Sun, sea and sand are all here, and the temperature is lovely and warm to boot.
        EveSrfSplashedPoles* = #CSS_temperatureScan_EveSrfSplashedPoles_00 // The liquid appears to be radiating heat.
        EveSrfSplashedExplodiumSea* = #CSS_temperatureScan_EveSrfSplashedExplodiumSea_00 // "Goooood morning ladies and gentlekerbs, it's going to be a real scorcher out at sea today, with surface highs of over a hundred and fifty degrees expected and sunny weather all day. Better take plenty of water with you when you go out, and dip to cool off. This is Jeb, for KSWN."
        EveSrfSplashedExplodiumSea* = #CSS_temperatureScan_EveSrfSplashedExplodiumSea_01 // It's pretty hot. The high pressure is the only thing stopping this ocean from boiling away.
        EveSrfSplashedLowlands* = #CSS_temperatureScan_EveSrfSplashedLowlands_00 // The sea is warm enough that any bathing in it is strongly discouraged.
        EveSrfSplashedImpactEjecta* = #CSS_temperatureScan_EveSrfSplashedImpactEjecta_00 // The crater walls radiate heat down onto the sea like a planetary solar oven.
        EveSrfSplashedCraterLake* = #CSS_temperatureScan_EveSrfSplashedCraterLake_00 // The data suggests a suitable temperature for frying kalamari.
        EveSrfSplashedCraterLake* = #CSS_temperatureScan_EveSrfSplashedCraterLake_01 // Despite the lack of not-water interchange, the temperature in this basin sea is the same as the rest.
        EveSrfSplashedWesternSea* = #CSS_temperatureScan_EveSrfSplashedWesternSea_00 // The grape soda is hot enough that you recommend leaving it in the fridge for a while before drinking it.
        EveSrfSplashedEasternSea* = #CSS_temperatureScan_EveSrfSplashedEasternSea_00 // The temperature readings vary widely as waves roll over the sensor.
        EveSrfSplashedEasternSea* = #CSS_temperatureScan_EveSrfSplashedEasternSea_01 // You should have brought a fishing rod, since anything you caught would be ready-cooked.
        EveSrfSplashedShallows* = #CSS_temperatureScan_EveSrfSplashedShallows_00 // The labels on the thermometer have dissolved, but the reading is all the way at the top anyway.
        EveSrfSplashedShallows* = #CSS_temperatureScan_EveSrfSplashedShallows_01 // Quite how this ocean doesn't boil is lost on you, since it's well above the boiling point of.....what was the ocean made of again?
        EveFlyingLowPoles* = #CSS_temperatureScan_EveFlyingLowPoles_00 // Temperatures are almost tolerable. For some people, that is. Ok, nobody.
        EveFlyingLowMidlands* = #CSS_temperatureScan_EveFlyingLowMidlands_00 // When life gives you lemons, send them to Eve. The heat will show those lemons who's boss.
        EveFlyingLowExplodiumSea* = #CSS_temperatureScan_EveFlyingLowExplodiumSea_00 // The shiny, flat ocean surface reflects heat back into the sky, and straight at you.
        EveFlyingLowLowlands* = #CSS_temperatureScan_EveFlyingLowLowlands_00 // The greenhouse effect is extremely powerful on Eve, as though it was subject to a runaway warming. 
        EveFlyingLowHighlands* = #CSS_temperatureScan_EveFlyingLowHighlands_00 // The thermometer has turned into a miniature lava lamp.
        EveFlyingLowPeaks* = #CSS_temperatureScan_EveFlyingLowPeaks_00 // Even above the highest mountains, it's still baking hot.
        EveFlyingLowImpactEjecta* = #CSS_temperatureScan_EveFlyingLowImpactEjecta_00 // In this heat, you could just hold your koffee outside the ship to keep it piping hot.
        EveFlyingLowCraterLake* = #CSS_temperatureScan_EveFlyingLowCraterLake_00 // If these aerial readings are anything to go by, dipping your toe in the sea would leave it charcoaled as well as dissolved and crushed.
        EveFlyingLowWesternSea* = #CSS_temperatureScan_EveFlyingLowWesternSea_00 // A wire comes loose on the thermometer, causing it to erroneously read the temperature as something nice.
        EveFlyingLowOlympus* = #CSS_temperatureScan_EveFlyingLowOlympus_00 // You hope whatever part is stopping you from slamming into the mountainside doesn't melt in these temperatures.
        EveFlyingLowEasternSea* = #CSS_temperatureScan_EveFlyingLowEasternSea_00 // The temperature is a balmy purple.
        EveFlyingLowFoothills* = #CSS_temperatureScan_EveFlyingLowFoothills_00 // Sluggish air currents carry heat up from the hotplate surface.
        EveFlyingLowShallows* = #CSS_temperatureScan_EveFlyingLowShallows_00 // I tell you what is shallow, and that's the atmosphere temperature gradient.
        EveFlyingHigh* = #CSS_temperatureScan_EveFlyingHigh_00 // You're nowhere near the ground, and it's warm already.
        EveFlyingHigh* = #CSS_temperatureScan_EveFlyingHigh_01 // KSC assures you it's nice and cool down there. You, and the thermometer, beg to differ.
        EveFlyingHigh* = #CSS_temperatureScan_EveFlyingHigh_02 // The red alcohol in the thermometer is turning purple.
        EveInSpaceLow* = #CSS_temperatureScan_EveInSpaceLow_00 // You detect a definite heat signature from the planet below.
        EveInSpaceLow* = #CSS_temperatureScan_EveInSpaceLow_01 // The planet and the atmosphere radiate heat into space.
        EveInSpaceLow* = #CSS_temperatureScan_EveInSpaceLow_02 // The thermometer outputs a significantly higher reading if rotated to face the planet.
        EveInSpaceHigh* = #CSS_temperatureScan_EveInSpaceHigh_00 // The thick atmosphere acts like a mirror for heat, causing Eve to shine bright with infrared radiation.
        EveInSpaceHigh* = #CSS_temperatureScan_EveInSpaceHigh_01 // Kerbol's rays are more powerful at this distance. It'll be hot down there.
        EveInSpaceHigh* = #CSS_temperatureScan_EveInSpaceHigh_01 // Just looking at Eve makes you want to turn the thermostat down a notch.

        GillySrfLanded* = #CSS_temperatureScan_GillySrfLanded_00 // Gilly is chilly.
        GillySrfLandedMidlands* = #CSS_temperatureScan_GillySrfLandedMidlands_00 // Dust from your movements has covered the thermometer. At least the dust seems friendly. You realize you want a hug.
        GillySrfLandedLowlands* = #CSS_temperatureScan_GillySrfLandedLowlands_00 // The temerature is about as low as your landing site.
        GillySrfLandedHighlands* = #CSS_temperatureScan_GillySrfLandedHighlands_00 // You were expecting Gilly to be a "Hot Potato"... You note your disappointment with the moon's cold surface.
        GillyInSpaceLow* = #CSS_temperatureScan_GillyInSpaceLow_00 // You didn't expect the temperature of space to be any different here than elsewhere. You weren't disappointed.
        GillyInSpaceHigh* = #CSS_temperatureScan_GillyInSpaceHigh_00 // The glare from Kerbol almosts blinds you as it flashes off of the thermometer.

        KerbinSrfLandedKSC* = #CSS_temperatureScan_KerbinSrfLandedKSC_00 // The temperature rises as an angry Gene Kerman comes over the radio and demands to know what you're still doing there.
        KerbinSrfLandedAdministration* = #CSS_temperatureScan_KerbinSrfLandedAdministration_00 // The temperature drops. Mortimer seems pleased with our spending of funds.
        KerbinSrfLandedAstronautComplex* = #CSS_temperatureScan_KerbinSrfLandedAstronautComplex_00 // The temperature here is elevated, but it's probably just due to the new recruits excitement to meet a real astronaut.
        KerbinSrfLandedBaikerbanur* = #CSS_temperatureScan_KerbinSrfLandedBaikerbanur_00 // The temperature is quite warm at this latitude and location.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_temperatureScan_KerbinSrfLandedBaikerbanurLaunchpad_00 // The concrete pad is uncomfortable warm beneath your feet from it's spell baking in the sun.
        KerbinSrfLandedCrawlerway* = #CSS_temperatureScan_KerbinSrfLandedCrawlerway_00 // The thermometer gets crushed under the wheels of the crawler. Oh well, time for some snacks.
        KerbinSrfLandedFlagPole* = #CSS_temperatureScan_KerbinSrfLandedFlagPole_00 // You realize that the temperature drops the higher you climb the pole.
        KerbinSrfLandedLaunchPad* = #CSS_temperatureScan_KerbinSrfLandedLaunchPad_00 // The temperature reading spikes suddenly. Did somebody start the engines?
        KerbinSrfLandedMissionControl* = #CSS_temperatureScan_KerbinSrfLandedMissionControl_00 // The temperature here is elevated from the tense atmosphere.
        KerbinSrfLandedR&D* = #CSS_temperatureScan_KerbinSrfLandedR&D_00 // The temperature here fluctuates wildly.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_temperatureScan_KerbinSrfLandedR&DCentralBuilding_00 // The thermometer is sucked into a wormhole by an advanced project here. You decide to write it off.
        KerbinSrfLandedR&DCornerLab* = #CSS_temperatureScan_KerbinSrfLandedR&DCornerLab_00 // You hide the thermometer in the corner hoping no-one will find it.
        KerbinSrfLandedR&DMainBuilding* = #CSS_temperatureScan_KerbinSrfLandedR&DMainBuilding_00 // The R&D personnel disassemble your thermometer before you can take a reading.
        KerbinSrfLandedR&DObservatory* = #CSS_temperatureScan_KerbinSrfLandedR&DObservatory_00 // You observe the temperature. How fitting.
        KerbinSrfLandedR&DSideLab* = #CSS_temperatureScan_KerbinSrfLandedR&DSideLab_00 // The temperature here is elevated due to the non-stop firing of neurons in this space.
        KerbinSrfLandedR&DSmallLab* = #CSS_temperatureScan_KerbinSrfLandedR&DSmallLab_00 // The size of the lab has no effect whatsoever on the temperature readings, contrary to your hypothesis.
        KerbinSrfLandedR&DTanks* = #CSS_temperatureScan_KerbinSrfLandedR&DTanks_00 // The material from the tanks oozes out onto your thermometer and dissolves it before you can get an accurate reading.
        KerbinSrfLandedR&DWindTunnel* = #CSS_temperatureScan_KerbinSrfLandedR&DWindTunnel_00 // The thermometer reads minus one million degrees. Probably from the wind chill.
        KerbinSrfLandedRunway* = #CSS_temperatureScan_KerbinSrfLandedRunway_00 // The jet exhaust skews the temperature reading, and you have to throw out the results.
        KerbinSrfLandedSPH* = #CSS_temperatureScan_KerbinSrfLandedSPH_00 // The temperature here is cool due to the breeze blowing through the SPH.
        KerbinSrfLandedSPHMainBuilding* = #CSS_temperatureScan_KerbinSrfLandedSPHMainBuilding_00 // You are unable to concentrate on taking a reading with the screaming of jet engines in the background.
        KerbinSrfLandedSPHRoundTank* = #CSS_temperatureScan_KerbinSrfLandedSPHRoundTank_00 // Seconds after being attached, the thermometer has frozen into place.
        KerbinSrfLandedSPHTanks* = #CSS_temperatureScan_KerbinSrfLandedSPHTanks_00 // Seconds after being attached, the thermometer has frozen into place.
        KerbinSrfLandedSPHWaterTower* = #CSS_temperatureScan_KerbinSrfLandedSPHWaterTower_00 // 3.983°C - You realize there is as much water in this tower as can be.
        KerbinSrfLandedTrackingStation* = #CSS_temperatureScan_KerbinSrfLandedTrackingStation_00 // Temperature here is: bored. Oops, that's just you. The temperature is nominal.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_temperatureScan_KerbinSrfLandedTrackingStationDishEast_00 // You position the thermometer in the direct center of the dish hoping for an exciting result. You are disappointed as usual.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_temperatureScan_KerbinSrfLandedTrackingStationDishNorth_00 // In your boredom you drop the thermometer and break it. No loss, it's not like there was anything worth reporting here anyway.
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_temperatureScan_KerbinSrfLandedTrackingStationDishSouth_00 // You wait in anguish for yet another temperature reading. What's the point?
        KerbinSrfLandedTrackingStationHub* = #CSS_temperatureScan_KerbinSrfLandedTrackingStationHub_00 // You explain the use of real scientific instruments like the thermometer to the staff at the tracking station.
        KerbinSrfLandedVAB* = #CSS_temperatureScan_KerbinSrfLandedVAB_00 // The ground spontaneously combusts from years of rocket fuel soaking into it, and the temperature spikes.
        KerbinSrfLandedVABMainBuilding* = #CSS_temperatureScan_KerbinSrfLandedVABMainBuilding_00 // The area here is warmer than usual due to all the nonstop activity.
        KerbinSrfLandedVABPodMemorial* = #CSS_temperatureScan_KerbinSrfLandedVABPodMemorial_00 // The temperature reading here is inspiring. Or sad. You can't decide which.
        KerbinSrfLandedVABRoundTank* = #CSS_temperatureScan_KerbinSrfLandedVABRoundTank_00 // Seconds after being attached, the thermometer has frozen into place.
        KerbinSrfLandedVABSouthComplex* = #CSS_temperatureScan_KerbinSrfLandedVABSouthComplex_00 // Something explodes in the VAB proper, and the temperature ticks up.
        KerbinSrfLandedVABTanks* = #CSS_temperatureScan_KerbinSrfLandedVABTanks_00 // Seconds after being attached, the thermometer has frozen into place.
        KerbinSrfLandedIslandAirfield* = #CSS_temperatureScan_KerbinSrfLandedIslandAirfield_00 // It's quite nice, and there aren't planes everywhere to mess it up.
        KerbinSrfLandedWoomerang* = #CSS_temperatureScan_KerbinSrfLandedWoomerang_00 // The mountain air is cool, and you suspect it would be quite refreshing to breathe.

        KerbinSrfLandedWater* = #CSS_temperatureScan_KerbinSrfLandedWater_00 // You ensure that the thermometer is adequately sealed near the water. You wouldn't want to release mercury into the sea.
        KerbinSrfLandedWater* = #CSS_temperatureScan_KerbinSrfLandedWater_01 // Spray from the salty water has encrusted the thermometer and you are unable to get an accurate reading. So you make something up.
        KerbinSrfLandedGrasslands* = #CSS_temperatureScan_KerbinSrfLandedGrasslands_00 // The temperature here is quite pleasant. This would be a nice place to live.
        KerbinSrfLandedGrasslands* = #CSS_temperatureScan_KerbinSrfLandedGrasslands_01 // You don't need any fancy measurements to tell you that it's nice outside.
        KerbinSrfLandedGrasslands* = #CSS_temperatureScan_KerbinSrfLandedGrasslands_02 // The temperature here is 'normal'. Guess the calibration worked.
        KerbinSrfLandedHighlands* = #CSS_temperatureScan_KerbinSrfLandedHighlands_00 // The thermometer tube seems to have exploded in the thin atmosphere here. We really shouldn't have bought the cheapest thermometer available. Oh well, no temperature reading today.
        KerbinSrfLandedHighlands* = #CSS_temperatureScan_KerbinSrfLandedHighlands_01 // It's quite chilly out here! The thermometer agrees.
        KerbinSrfLandedShores* = #CSS_temperatureScan_KerbinSrfLandedShores_00 // You wonder if there's a setting on the thermometer that allows it to warn you of sand-sharks.
        KerbinSrfLandedShores* = #CSS_temperatureScan_KerbinSrfLandedShores_01 // Just the right temperature to go for a swim in the sea right over there.
        KerbinSrfLandedMountains* = #CSS_temperatureScan_KerbinSrfLandedMountains_00 // The temperature reports a chilly -15 degrees. You are glad to be inside your nice warm spaceship. With snacks!
        KerbinSrfLandedMountains* = #CSS_temperatureScan_KerbinSrfLandedMountains_01 // It's cold sure, but the windchill is even worse! You hope it doesn't blow you off the mountain.
        KerbinSrfLandedDeserts* = #CSS_temperatureScan_KerbinSrfLandedDeserts_00 // It's hot here. That's not a reading, you learned it in primary school.
        KerbinSrfLandedDeserts* = #CSS_temperatureScan_KerbinSrfLandedDeserts_01 // Large plumes of heat are rising from the surface of the desert.
        KerbinSrfLandedDeserts* = #CSS_temperatureScan_KerbinSrfLandedDeserts_02 // The temperature here is very hot.
        KerbinSrfLandedDeserts* = #CSS_temperatureScan_KerbinSrfLandedDeserts_03 // The temperature is too hot to live here.
        KerbinSrfLandedDeserts* = #CSS_temperatureScan_KerbinSrfLandedDeserts_04 // The thermometer quickly rises beyond the scale limit. You put it back into the shadows before it bursts.
        KerbinSrfLandedBadlands* = #CSS_temperatureScan_KerbinSrfLandedBadlands_00 // The temperature here appears to fluctuate depending on the time of day.
        KerbinSrfLandedBadlands* = #CSS_temperatureScan_KerbinSrfLandedBadlands_01 // The temperature is bad, and it's getting worse every minute.
        KerbinSrfLandedBadlands* = #CSS_temperatureScan_KerbinSrfLandedBadlands_02 // Man the EVA is gonna suck.
        KerbinSrfLandedTundra* = #CSS_temperatureScan_KerbinSrfLandedTundra_00 // The thermometer reading makes you want to go home and snuggle under a blanket.
        KerbinSrfLandedTundra* = #CSS_temperatureScan_KerbinSrfLandedTundra_01 // It's cold enough to keep things permanently frozen here.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedIceCaps_00 // If this is normal, you hate to think of how cold it can get.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedIceCaps_01 // Welp. That explains all the ice.
        KerbinSrfLandedIceCaps* = #CSS_temperatureScan_KerbinSrfLandedIceCaps_02 // The temperature is higher than 30 years ago. You ponder why.
        KerbinSrfLandedNorthernIceShelf* = #CSS_temperatureScan_KerbinSrfLandedNorthernIceShelf_00 // It's cold enough to freeze even salty sea water completely solid.
        KerbinSrfLandedNorthernIceShelf* = #CSS_temperatureScan_KerbinSrfLandedNorthernIceShelf_01 // A rise in temperature would be very alarming, considering you are standing on something eminently meltable.
        KerbinSrfLandedSouthernIceShelf* = #CSS_temperatureScan_KerbinSrfLandedSouthernIceShelf_00 // A note at the back of the equipment manual states "Warranty void if exposed to temperatures below 0C". You're pretty sure it's colder than that.
        KerbinSrfLandedSouthernIceShelf* = #CSS_temperatureScan_KerbinSrfLandedSouthernIceShelf_01 // A thick layer of rime ice has formed on the thermometer, telling you all you need to know.
        KerbinSrfSplashedWater* = #CSS_temperatureScan_KerbinSrfSplashedWater_00 // The engineers hadn't planned on water, so the numbers have all washed off the thermometer, making it unreadable.
        KerbinSrfSplashedWater* = #CSS_temperatureScan_KerbinSrfSplashedWater_01 // The water is colder than the surrounding air.
        KerbinSrfSplashedWater* = #CSS_temperatureScan_KerbinSrfSplashedWater_02 // You have to stick your head underwater in order to see what the thermometer says.
        KerbinSrfSplashedGrasslands* = #CSS_temperatureScan_KerbinSrfSplashedGrasslands_00 // The water cools down the temperature a bit, and it's a bit cooler than would be comfortable.
        KerbinSrfSplashedShores* = #CSS_temperatureScan_KerbinSrfSplashedShores_00 // The water here is warmer than in the open ocean, perhaps because there's less of it for the Sun to warm up.
        KerbinSrfSplashedShores* = #CSS_temperatureScan_KerbinSrfSplashedShores_01 // Just the right temperature to be a lucrative shark mating area.
        KerbinSrfSplashedDeserts* = #CSS_temperatureScan_KerbinSrfSplashedDeserts_00 // The water is invitingly warm. This place would make a great inland beach resort.
        KerbinSrfSplashedBadlands* = #CSS_temperatureScan_KerbinSrfSplashedBadlands_00 // It's hot enough you could reheat some snacks by dunking them in the water.
        KerbinSrfSplashedTundra* = #CSS_temperatureScan_KerbinSrfSplashedTundra_00 // It's pretty cold, but not quite cold enough to freeze the water.
        KerbinSrfSplashedIceCaps* = #CSS_temperatureScan_KerbinSrfSplashedIceCaps_00 // It's cold enough to freeze water solid, so why is there liquid water here?
        KerbinSrfSplashedNorthernIceShelf* = #CSS_temperatureScan_KerbinSrfSplashedNorthernIceShelf_00 // The water is cold as ice. In fact, it is largely ice.
        KerbinSrfSplashedSouthernIceShelf* = #CSS_temperatureScan_KerbinSrfSplashedSouthernIceShelf_00 // Any creatures living in this frigid water would need some serious adaptations to not freeze to death.
        KerbinFlyingLowWater* = #CSS_temperatureScan_KerbinFlyingLowWater_00 // The air seems to be cooled by the water, and the temperature is lower that average here.
        KerbinFlyingLowWater* = #CSS_temperatureScan_KerbinFlyingLowWater_01 // You keep an eye out for sudden tsunamis as the thermometer takes its reading of the surrounding air.
        KerbinFlyingLowGrasslands* = #CSS_temperatureScan_KerbinFlyingLowGrasslands_00 // The temperature seems cool and comfortable. It is probably due to the acres of green grass that stretch to the horizon.
        KerbinFlyingLowGrasslands* = #CSS_temperatureScan_KerbinFlyingLowGrasslands_01 // As you perform temperature scans over the Grasslands, you take care not hit any trees.
        KerbinFlyingLowHighlands* = #CSS_temperatureScan_KerbinFlyingLowHighlands_00 // The snow and ice of the mountains has gotten stuck to the display of the thermometer. As you wipe it off and take a reading you are reminded of the snacks in your fridge back at home.
        KerbinFlyingLowHighlands* = #CSS_temperatureScan_KerbinFlyingLowHighlands_01 // The brisk wind of the Highlands is making you feel colder than what the thermometer suggests.
        KerbinFlyingLowShores* = #CSS_temperatureScan_KerbinFlyingLowShores_00 // Yep, the ambient temperature is the definition of "beach weather".
        KerbinFlyingLowShores* = #CSS_temperatureScan_KerbinFlyingLowShores_01 // The thermometer reads a balmy 'medium-hot'. Yep, another beautiful day at the shores. Too bad you're stuck in this rocket.
        KerbinFlyingLowMountains* = #CSS_temperatureScan_KerbinFlyingLowMountains_00 // It's cold, OK. Just look where you're going, and PLEASE don't turn off the SAS again.
        KerbinFlyingLowMountains* = #CSS_temperatureScan_KerbinFlyingLowMountains_01 // You're too busy dodging sudden mountains to pay attention to your latest temperature scan.
        KerbinFlyingLowMountains* = #CSS_temperatureScan_KerbinFlyingLowMountains_02 // Glancing back and forth between the mountains beneath you and the thermometer display, you realize that you are stuck between a rock and a cold place.
        KerbinFlyingLowDeserts* = #CSS_temperatureScan_KerbinFlyingLowDeserts_00 // Even here above the surface it is hot. The thermometer reads 270 degrees. You wonder if that is in Celsius, Fahrenheit, or Kelvin. Oh well, the scientist back at KSC will figure it out.
        KerbinFlyingLowDeserts* = #CSS_temperatureScan_KerbinFlyingLowDeserts_01 // Your temperature readings over the desert surprise exactly nobody back at KSC.
        KerbinFlyingLowBadlands* = #CSS_temperatureScan_KerbinFlyingLowBadlands_00 // It is HOT! You don't know whether it's the normal ambient temperature here or whether the spacecraft is burning up. Either way, we should have installed air conditioning.
        KerbinFlyingLowBadlands* = #CSS_temperatureScan_KerbinFlyingLowBadlands_01 // You pour the remains of your juice pack over the engines in a frantic attempt to keep them from overheating.
        KerbinFlyingLowTundra* = #CSS_temperatureScan_KerbinFlyingLowTundra_00 // It's normally cold at the surface, and now you're flying the wind chill just makes it even colder.
        KerbinFlyingLowTundra* = #CSS_temperatureScan_KerbinFlyingLowTundra_01 // The coldness must explain why the surface below is frozen and the plants are stunted. You feel like a genius.
        KerbinFlyingLowIceCaps* = #CSS_temperatureScan_KerbinFlyingLowIceCaps_00 // The temperature is a little higher than you measured last time. Is it a measurement error or a sign of kerbal warming?
        KerbinFlyingLowIceCaps* = #CSS_temperatureScan_KerbinFlyingLowIceCaps_01 // As you read off the temperature to Mission Control, you are envious of how warm they all sound over the radio.
        KerbinFlyingLowNorthernIceShelf* = #CSS_temperatureScan_KerbinFlyingLowNorthernIceShelf_00 // The temperature is extremely low. It has to be, to maintain such a colossal mass of ice like that below.
        KerbinFlyingLowNorthernIceShelf* = #CSS_temperatureScan_KerbinFlyingLowNorthernIceShelf_01 // Wind chill from the strong winds that howl across the flats drops the temperature even lower.
        KerbinFlyingLowSouthernIceShelf* = #CSS_temperatureScan_KerbinFlyingLowSouthernIceShelf_00 // The atmospheric drag causes a measurable, welcome increase in temperature.
        KerbinFlyingLowSouthernIceShelf* = #CSS_temperatureScan_KerbinFlyingLowSouthernIceShelf_01 // It's many degrees below zero. No wonder this place was so hazardous to early explorers.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_00 // Let's see...temperature. Slightly cooler than the fiery pits of hell. Yep, that covers it.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_01 // It is definitely cooler here than on the surface of Kerbin.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_02 // 82. Or is that 28? They never did tell you which side of this thing is up.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_03 // The thermometer is hanging on to the capsule by only one corner, and you are afraid if you touch it it will go flying off. We should have used the super-glue instead of the OK-glue.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_04 // You resist the urge to place your craft into a steep dive just to see how fast the thermometer changes.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_05 // Mission Control declares that they can't distinguish your craft from the background ambient temperature. This is a problem since your engines are currently firing...
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_06 // What is it about height that makes things colder?
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_07 // At this altitude, the warmth of the beach is a thing of the past.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_08 // It is chilly up here in the thin wisps of the upper atmosphere. You report this to KSC, and they laugh back something about being happy they aren't in your shoes.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_09 // The temperature reads -10, but in reality it is probably lower because that is as low as the thermometer can read.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_10 // The temperature outside is well into the negatives. You are silently thankful for you climate-controlled spacesuit.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_11 // It appears to be the perfect snack-eating temperature. You open a box just to be sure. For science.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_12 // Sitting inside your climate-controlled cockpit, you find that you don't really care what the thermometer thinks of the outside temperature.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_13 // Huh, it's pretty darn cold. Hard to believe you were just at the Grasslands.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_14 // The temperature here is higher than you expected, what with all the ice and snow. Maybe THAT's why they call it the Highlands.
        KerbinFlyingHigh* = #CSS_temperatureScan_KerbinFlyingHigh_15 // The temperature seems just about perfect here. You consider doing an EVA without your spacesuit.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_00 // The hellish climate of the Badlands can't touch you up here!
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_01 // The temperature scan is inconclusive, but you bet it's chilly out there. You tell KSC about your supposition.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_02 // You specifically bought one of those fancy low-gravity thermometers for this experiment.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_03 // The temperature readings fluctuates wildly as the sensor moves in and out of the shadows.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_04 // Seriously? You want to know the temperature now? We're in space; who cares!
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_05 // The residual heat of the spacecraft masks the coldness of the empty vacuum of space.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_06 // Well, not much heat to measure here.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_07 // As usual the thermometer here is unreliable. You write down its reading anyway for the scientists back at KSC.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_08 // Thermometer reading? Check. Space is cold? Check. Time for a snack? Check!
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_09 // Space is cold everywhere. Unless you are facing the sun or a supernova. Hey! We should go check out one of THOSE!!
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_10 // Snacks fall out of your mouth and garble your speech as you try to read off the temperature. KSC just regards it as a bad radio transmission, and waits for your next report.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_11 // And the temperature is: perfect for snacking! So how about a few snacks, and then we'll send this report off to KSC.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_12 // You wonder if the fact that you're over the Grasslands will affect your temperature readings. Probably not.
        KerbinInSpaceLow* = #CSS_temperatureScan_KerbinInSpaceLow_13 // The fact that you are over the Highlands does not change the thermometer's opinion on the coldness of space one bit.
        KerbinInSpaceHigh* = #CSS_temperatureScan_KerbinInSpaceHigh_00 // As you look down over the majestic mountains below you take yet another temperature reading. Stupid science. At least the view is nice.
        KerbinInSpaceHigh* = #CSS_temperatureScan_KerbinInSpaceHigh_01 // In high space over the planet, thermal back radiation from the warm planet is much diminished.
        KerbinInSpaceHigh* = #CSS_temperatureScan_KerbinInSpaceHigh_02 // The temperature is even lower than it would be if you were down in the Ice Caps. At least there's no wind chill.
        KerbinInSpaceHigh* = #CSS_temperatureScan_KerbinInSpaceHigh_02 // "Roses are red, violets are blue (apparently), the mountains are pretty, and space is cold." Mission Control doesn't seem to appreciate your poetry.

        MunSrfLanded* = #CSS_temperatureScan_MunSrfLanded_00 // The thermometer can't seem to make up its mind whether it's hot or cold here.
        MunSrfLandedMidlands* = #CSS_temperatureScan_MunSrfLandedMidlands_00 // The surface here seems to reflect much of the Sun's heat. As a result, it's slightly cooler here.
        MunSrfLandedNorthernBasin* = #CSS_temperatureScan_MunSrfLandedNorthernBasin_00 // The blackened rocks absorb and radiate large quantities of the Sun's heat. You briefly consider the idea of sunbathing, but realize you don't have a beach towel. Oh well...
        MunSrfLandedEastCrater* = #CSS_temperatureScan_MunSrfLandedEastCrater_00 // The temperature fluctuates wildly with the rotation of the moon, as the crater moves from day to night.
        MunSrfLandedNorthwestCrater* = #CSS_temperatureScan_MunSrfLandedNorthwestCrater_00 // The inclined angle of the solar radiation at this latitude has a marked effect on the temperature, which you make note of in your report.
        MunSrfLandedSouthwestCrater* = #CSS_temperatureScan_MunSrfLandedSouthwestCrater_00 // The temperature here is rather boring. That's right, I said it. Boring. B-O-R-I-N-G!
        MunSrfLandedFarsideCrater* = #CSS_temperatureScan_MunSrfLandedFarsideCrater_00 // Between the dusty atmosphere and the reduced light in the crater it is difficult to read the thermometer.
        MunSrfLandedCanyons* = #CSS_temperatureScan_MunSrfLandedCanyons_00 // The thermometer is shivering from the cold. With the high walls blocking all the sunlight, this is not surprising.
        MunSrfLandedPolarCrater* = #CSS_temperatureScan_MunSrfLandedPolarCrater_00 // It's pretty cold here. You'd almost think Kerbol hadn't shined in this crater since it was formed!
        MunSrfLandedPoles* = #CSS_temperatureScan_MunSrfLandedPoles_00 // The thermometer pressure vessel seems to have sprung a leak, and all the liquid inside boiled off into space. Hope the same thing doesn't happen to the rest of the ship.
        MunSrfLandedPolarLowlands* = #CSS_temperatureScan_MunSrfLandedPolarLowlands_00 // Seems like a great snack-time temperature. Let's make it happen!
        MunSrfLandedHighlands* = #CSS_temperatureScan_MunSrfLandedHighlands_00 // The temperature reminds you how nice it really is back on Kerbin.
        MunSrfLandedHighlandCraters* = #CSS_temperatureScan_MunSrfLandedHighlandCraters_00 // The long shadows cast by the crater rims make this region colder than the surrounding highlands.
        MunSrfLandedMidlandCraters* = #CSS_temperatureScan_MunSrfLandedMidlandCraters_00 // You're unsure about the surrounding area, but your temperature is definitely elevated after that landing. Wooohooo!
        MunSrfLandedEastFarsideCrater* = #CSS_temperatureScan_MunSrfLandedEastFarsideCrater_00 // It's chilly. You want to take a walk around the canyon rim to warm up.
        MunSrfLandedTwinCraters* = #CSS_temperatureScan_MunSrfLandedTwinCraters_00 // You aren't sure which crater to take the temperature in, so you pick one at random. After all they're twins, so the readings should be the same, right?
        MunInSpaceLow* = #CSS_temperatureScan_MunInSpaceLow_00 // While waiting for the temperature scan to finish, you sketch the patterns made by the Mun's canyons.
