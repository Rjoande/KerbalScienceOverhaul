@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]
{
    %RESULTS
    {
        Srf* = #CSS_mysteryGoo_default_00 // You sneak a taste of the Goo and stuff it in your spacesuit.
        Srf* = #CSS_mysteryGoo_default_01 // You start talking to the Goo to pass the time. The Goo doesn't appear to be very talkative.
        Srf* = #CSS_mysteryGoo_default_02 // The Goo somehow seems to resent this experimentation on it.
        Srf* = #CSS_mysteryGoo_default_03 // You cannot grasp the true form of the Goo.
        Srf* = #CSS_mysteryGoo_default_04 // You observe the Goo and it shapes in a small blob. You can't help but think to name it "Flubber".
        Srf* = #CSS_mysteryGoo_default_05 // The Goo seems to do a little dance as it bounces about the container.
        Srf* = #CSS_mysteryGoo_default_06 // The Goo seems to have copied your face. You think it must be mocking you.
        Srf* = #CSS_mysteryGoo_default_07 // You log a note: "Very gooey"
        Srf* = #CSS_mysteryGoo_default_08 // After the wacky events of the last few minutes, you are forced to conclude that the Goo is NOT, in fact, edible. At least under these circumstances... more testing may be required.
        Srf* = #CSS_mysteryGoo_default_09 // You discover, to your great surprise, that due to a mishap in the paperwork, the Goo is now the ranking officer on the ship.
        Srf* = #CSS_mysteryGoo_default_10 // The Goo appears to be sufficiently mysterious.
        Srf* = #CSS_mysteryGoo_default_11 // The power of the Goo compels you.
        Srf* = #CSS_mysteryGoo_default_12 // You wonder if the Goo also has feelings. You worry it might get angry for being launched into space without being asked first.
        Srf* = #CSS_mysteryGoo_default_13 // The Goo develops odd spires upon its surface.
        Srf* = #CSS_mysteryGoo_default_14 // Rather reluctantly, the Goo reacts to the situation.
        Srf* = #CSS_mysteryGoo_default_15 // The Goo vibrates at a rather pleasing frequency.
        Srf* = #CSS_mysteryGoo_default_16 // The Goo seems to have formed into the shape of a Kerbal's face. Mission Control tells you to look at the Goo, not the glass.
        Srf* = #CSS_mysteryGoo_default_17 // The Goo seems to be watching you.
        Srf* = #CSS_mysteryGoo_default_18 // The Goo clearly likes it here in a space can.
        Srf* = #CSS_mysteryGoo_default_19 // The Goo misses its brethren.
        Srf* = #CSS_mysteryGoo_default_20 // The Goo appears to have run out of ways to make itself funny.
        Srf* = #CSS_mysteryGoo_default_21 // The Goo seems like it would be fun to finger paint with, but Mission Control denies your request to test that theory.
        Srf* = #CSS_mysteryGoo_default_22 // The Goo performs a brief dance before settling back into a stable state. Upon reporting this, Mission Control tells you to stop eating astronaut cheese before going to bed.
        Srf* = #CSS_mysteryGoo_default_23 // You're pretty sure the Goo is mocking you.
        Srf* = #CSS_mysteryGoo_default_24 // The Goo stares solemnly out at you.
        Srf* = #CSS_mysteryGoo_default_25 // The Goo observes you for a while. It is rather irritating.
        Srf* = #CSS_mysteryGoo_default_26 // The Goo exudes a mysterious chemical.
        Srf* = #CSS_mysteryGoo_default_27 // The Goo emits chemical signatures of Sulfur, Nitrogen, Carbon, and Phosphorus.
        Srf* = #CSS_mysteryGoo_default_28 // After hearing whispers from the Goo canister you start thinking about going to a psychiatrist.
        Srf* = #CSS_mysteryGoo_default_29 // It's good the Goo is self-perpetuating, because it's always doing crazy stuff like exploding and escaping and breaking in half.
        
