@EXPERIMENT_DEFINITION:HAS[#id[logmmImpacts]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_logmmImpacts_SunInSpaceLow_00 // The impact counter chatters, but most of the “meteoroids” are dust grains that don’t survive their first taste of the Sun.
        SunInSpaceHigh* = #JNSQscience_logmmImpacts_SunInSpaceHigh_00 // Long stretches of silence are broken by a lonely ping. Interplanetary dust doesn’t care whose orbit you’re in.

        EdnaInSpaceLow* = #JNSQscience_logmmImpacts_EdnaInSpaceLow_00 // A gritty hail of tiny impacts suggests Edna is sweeping up more of the belt than anyone expected.
        EdnaInSpaceHigh* = #JNSQscience_logmmImpacts_EdnaInSpaceHigh_00 // The hits thin out to occasional strays, like pebbles wandering through the dark on their own.

        DakInSpaceLow* = #JNSQscience_logmmImpacts_DakInSpaceLow_00 // Dak seems to wear a faint halo of gravel: the sensor goes ping-ping-ping as you skim past the lumpy “surface.”
        DakInSpaceHigh* = #JNSQscience_logmmImpacts_DakInSpaceHigh_00 // Only a few impacts register out here, like someone flicking crumbs off a very distant snack.

        LindorInSpaceLow* = #JNSQscience_logmmImpacts_LindorInSpaceLow_00 // The impact counter chatters as stray ice grains and grit pepper the hull. Lindor’s neighborhood is anything but tidy.
        LindorInSpaceHigh* = #JNSQscience_logmmImpacts_LindorInSpaceHigh_00 // A rare tick echoes through the cabin. Even far from everything, the universe still throws crumbs.

        KrelInSpaceLow* = #JNSQscience_logmmImpacts_KrelInSpaceLow_00 // The sensor rattles in brief bursts, like Krel is towing a thin wake of pale dust along its tight orbit.
        KrelInSpaceHigh* = #JNSQscience_logmmImpacts_KrelInSpaceHigh_00 // Almost nothing hits out here. Krel looks small even to the drifting grit.

        AdenInSpaceLow* = #JNSQscience_logmmImpacts_AdenInSpaceLow_00 // A steady peppering suggests Aden’s track is littered with dark, stubborn grains that refuse to go away.
        AdenInSpaceHigh* = #JNSQscience_logmmImpacts_AdenInSpaceHigh_00 // Only a few soft taps register. The rest of space misses you by a very wide margin.

        HuygenInSpaceLow* = #JNSQscience_logmmImpacts_HuygenInSpaceLow_00 // The counter pings while fine, clingy particles smack the casing. Huygen’s haze seems determined to travel.
        HuygenInSpaceHigh* = #JNSQscience_logmmImpacts_HuygenInSpaceHigh_00 // Sparse impacts, each one a reminder that the dark between worlds is still full of wandering specks.

        RigaInSpaceLow* = #JNSQscience_logmmImpacts_RigaInSpaceLow_00 // A regular patter implies Riga is sweeping up more debris than its size deserves. Good thing you brought sturdy panels.
        RigaInSpaceHigh* = #JNSQscience_logmmImpacts_RigaInSpaceHigh_00 // The hits slow to occasional knocks. For once, your ship is the biggest target around.

        TalosInSpaceLow* = #JNSQscience_logmmImpacts_TalosInSpaceLow_00 // The detector spikes near Talos, as if its bold colors come with a matching cloud of tiny “souvenirs.”
        TalosInSpaceHigh* = #JNSQscience_logmmImpacts_TalosInSpaceHigh_00 // Long silence, then a single thud. Space is mostly empty, but never entirely polite.

        CelesInSpaceLow* = #JNSQscience_logmmImpacts_CelesInSpaceLow_00 // The counter rattles with tiny hits, as if Celes is wrapped in a thin cloud of grit. The data file helpfully labels the source “REDACTED.”
        CelesInSpaceHigh* = #JNSQscience_logmmImpacts_CelesInSpaceHigh_00 // Fewer impacts out here, just the occasional tap, like someone knocking on a door marked “NDA.”

        TamInSpaceLow* = #JNSQscience_logmmImpacts_TamInSpaceLow_00 // A staccato of pings suggests Tam is shedding crumbs into its own orbit. Hostile little rock, isn’t it?
        TamInSpaceHigh* = #JNSQscience_logmmImpacts_TamInSpaceHigh_00 // The hits come less often, but they feel sharper. Whatever’s out here has had time to pick up speed.

        HamekInSpaceLow* = #JNSQscience_logmmImpacts_HamekInSpaceLow_00 // The detector logs impacts and your shielding gains a faint, stubborn stain. Nobody can agree what color it is.
        HamekInSpaceHigh* = #JNSQscience_logmmImpacts_HamekInSpaceHigh_00 // A rare ping, then long silence. The mystery dust still finds you, eventually.

        NaraInSpaceLow* = #JNSQscience_logmmImpacts_NaraInSpaceLow_00 // The counter clicks steadily with tiny, fast grains. Nara’s upper reaches seem to be leaking glitter into space.
        NaraInSpaceHigh* = #JNSQscience_logmmImpacts_NaraInSpaceHigh_00 // Impacts are sparse, but each one arrives with a crackle of static, like the dust is carrying a charge.

        AmosInSpaceLow* = #JNSQscience_logmmImpacts_AmosInSpaceLow_00 // Soft taps register as dark specks pepper the hull. Amos doesn’t look like much, but it’s clearly collecting company.
        AmosInSpaceHigh* = #JNSQscience_logmmImpacts_AmosInSpaceHigh_00 // Almost nothing hits here.

        EnonInSpaceLow* = #JNSQscience_logmmImpacts_EnonInSpaceLow_00 // The sensor reports a flurry of bright, icy grains. It’s like orbiting through a very quiet snowstorm.
        EnonInSpaceHigh* = #JNSQscience_logmmImpacts_EnonInSpaceHigh_00 // Only a few impacts log out here, each one a tiny reminder that “clean” space is a myth.

        PraxInSpaceLow* = #JNSQscience_logmmImpacts_PraxInSpaceLow_00 // A slow, steady patter suggests Prax lives in the fringe where stray particles go to wander.
        PraxInSpaceHigh* = #JNSQscience_logmmImpacts_PraxInSpaceHigh_00 // Long gaps between impacts, then a single ping. Space saves its surprises for the patient.
    }
}