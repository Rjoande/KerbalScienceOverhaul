        #GEPscience_bd_camera_SironaInSpaceLowDarkTemperateBands_00 = Alle latitudini temperate compaiono corsie più scure intrecciate con sottile turbolenza. Sembra meteo, ma ingrandito fino a smettere di essere rassicurante.
        #GEPscience_bd_camera_SironaInSpaceLowLightTemperateBands_00 = Bande pallide si allungano all'infinito, con piccoli vortici che suggeriscono un moto enorme. La foto arriva nitida, il tuo senso della scala no.
        #GEPscience_bd_camera_SironaInSpaceLowDarkPolarBands_00 = Vicino ai poli, le bande scure si stringono in archi strani. Il pattern sembra deliberato, e non è mai una sensazione comoda.
        #GEPscience_bd_camera_SironaInSpaceLowLightPolarBands_00 = Le bande polari chiare sfumano verso un sottile bordo di foschia illuminata di rosso. Annota "bel bordo" e poi ti ricordi che stai scrivendo a persone molto lontane.
        #GEPscience_bd_camera_SironaInSpaceHigh_00 = Sirona resta appesa sotto un sole rosso fioco come un gigante quieto che non sbatte mai le palpebre. Invi l'immagine a casa e aspetti, e aspetti, e aspetti.
        #GEPscience_bd_camera_SironaInSpaceHigh_01 = Gli anelli arcuano nell'inquadratura come un alone pallido e impossibile, sparpagliando la luce rossa fioca in sottili nastri. Fissi l'immagine abbastanza a lungo da dimenticare quale sia il "giù".
        #GEPscience_bd_camera_SironaInSpaceHigh_02 = Uno scatto ampio cattura le deboli bande di Sirona e i suoi anelli che scintillano come vetro in polvere contro lo spazio nero. Controllo Missione lo definisce "stupefacente" diverse ore dopo che tu l'avevi già sussurrato.
        #GEPscience_bd_camera_AirmedSrfLandedTropicalLowlands_00 = Il terreno bicolore sembra come se qualcuno avesse rovesciato della vernice e si fosse dimenticato di sfumarla. Scatti la foto per "composizione superficiale" e perché è inquietante.
        #GEPscience_bd_camera_AirmedSrfLandedTemperateLowlands_00 = I bassopiani si stendono in una luce dura tinta di rosso, con cicatrici che corrono per chilometri. La fotocamera lo fa sembrare ordinato, ma non lo è.
        #GEPscience_bd_camera_AirmedSrfLandedTropicalMidlands_00 = Dalle pianure centrali, il terreno martoriato mostra segni d'impatto sovrapposti come vecchi lividi. Fai zoom e trovi ancora più motivi per cui sembra infelice.
        #GEPscience_bd_camera_AirmedSrfLandedTemperateMidlands_00 = Le ombre sono lunghe e nette, come se il giorno non iniziasse mai davvero. Etichetti lo scatto "geometria dell'illuminazione" e passi oltre in fretta.
        #GEPscience_bd_camera_AirmedSrfLandedHighlands_00 = Dorsali delle alture si alzano come denti spezzati contro un cielo che sembra troppo vuoto. Scatti un altro fotogramma solo per provare che c'eri davvero.
        #GEPscience_bd_camera_AirmedSrfLandedDarkenedLowlands_00 = I bassopiani in ombra bevono la luce rossa fioca e restituiscono quasi nulla. L'istogramma della fotocamera sembra fare il broncio.
        #GEPscience_bd_camera_AirmedSrfLandedDarkenedMidlands_00 = Nelle pianure centrali in ombra, ogni sassolino proietta un'ombra esagerata. È ottimo per la topografia e pessimo per il comfort.
        #GEPscience_bd_camera_AirmedSrfLandedDarkenedHighlands_00 = Le alture scure sembrano carbone spolverato su pietra fratturata. Valuti una panoramica, poi ti ricordi che anche le panoramiche richiedono tempo per essere trasmesse.
        #GEPscience_bd_camera_AirmedSrfLandedPoles_00 = Ai poli, la luce arriva di lato e resta sospettosamente bassa. La foto sembra un crepuscolo perpetuo con crateri.
        #GEPscience_bd_camera_AirmedInSpaceLowTropicalLowlands_00 = Dall'orbita, i bassopiani tropicali mostrano ampie chiazze di tono contrastante che non corrispondono a nessuna carta che ti sei portato. La fotocamera le registra comunque, con aria compiaciuta.
        #GEPscience_bd_camera_AirmedInSpaceLowTemperateLowlands_00 = I bassopiani temperati rivelano pianure martoriate e deboli striature tra vecchie cicatrici. Programmi un altro passaggio e accetti che "presto" è relativo.
        #GEPscience_bd_camera_AirmedInSpaceLowTropicalMidlands_00 = Le pianure centrali tropicali appaiono come un paese ruvido e spezzato, illuminato come un tardo pomeriggio perenne. La mappa sarà utile molto dopo che la sensazione sarà svanita.
        #GEPscience_bd_camera_AirmedInSpaceLowTemperateMidlands_00 = Da lassù, le pianure centrali temperate sono una coperta di dorsali e bacini poco profondi. La fotocamera lo fa sembrare risolvibile, la geologia non sarà d'accordo.
        #GEPscience_bd_camera_AirmedInSpaceLowHighlands_00 = Le alture spiccano come creste taglienti con bordi luminosi e interni neri. Segni "evitare atterraggio qui" come raccomandazione puramente scientifica.
        #GEPscience_bd_camera_AirmedInSpaceLowDarkenedLowlands_00 = I bassopiani in ombra formano chiazze pesanti quasi nere contro una luce rossa opaca. Ti rendi conto che stai fotografando "assenza" e la chiami dato.
        #GEPscience_bd_camera_AirmedInSpaceLowDarkenedMidlands_00 = Le pianure centrali in ombra mostrano un rilievo nitido senza foschia a smussare nulla. Il dettaglio è ottimo, l'atmosfera no.
        #GEPscience_bd_camera_AirmedInSpaceLowDarkenedHighlands_00 = Le alture scure sembrano pietra frantumata congelata sul posto. Scatti un altro fotogramma perché non riesci proprio a smettere di fissarle.
        #GEPscience_bd_camera_AirmedInSpaceLowPoles_00 = I passaggi polari mostrano ombre lunghe e oblique che fanno sembrare la superficie stirata. Le note includono "non fidarti dell'istinto sull'ora del giorno".
        #GEPscience_bd_camera_AirmedInSpaceHigh_00 = Airmed è una piccola moneta segnata da cicatrici in orbita attorno a un gigante più grande e più quieto, sotto luce rossa. La foto sembra una cartolina dal bordo di casa.
        #GEPscience_bd_camera_BorvoSrfLandedTropicalCraquelure_00 = Da vicino, la superficie è spezzata in placche come fango secco o ghiaccio frantumato. Scatti un primo piano e ancora non sai decidere quale dei due sia.
        #GEPscience_bd_camera_BorvoSrfLandedTemperateCraquelure_00 = Le fratture si diramano in pattern che sembrano quasi organizzati. Resistendo alla tentazione di dargli un nome, ti limiti a "rete di fratture".
        #GEPscience_bd_camera_BorvoSrfLandedTropicalLowlands_00 = I bassopiani sono distese beige marrone sotto un cielo sottile e poco familiare. La fotocamera coglie una lieve foschia che fa mentire le distanze.
