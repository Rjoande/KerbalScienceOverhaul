        EveSrfSplashedLowlands* = #CSS_mysteryGoo_EveSrfSplashedLowlands_00 // The Goo has donned a hazmat suit. Maybe you should too.
        EveSrfSplashedImpactEjecta* = #CSS_mysteryGoo_EveSrfSplashedImpactEjecta_00 // The Goo tentatively reaches out to the liquid, but recoils back.
