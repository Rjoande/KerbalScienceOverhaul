        #GEPscience_bd_camera_ToutatisSrfLandedSunnyLowlands_01 = Il suolo sembra cotto e polveroso, con un sole rosso troppo basso per farti sentire a tuo agio. Il log della fotocamera annota: "Le ombre fanno strani calcoli".
