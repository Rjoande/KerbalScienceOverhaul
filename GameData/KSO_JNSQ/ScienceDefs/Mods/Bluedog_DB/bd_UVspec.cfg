@EXPERIMENT_DEFINITION:HAS[#id[bd_UVspec]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_bd_UVspec_SunInSpaceLow_00 // The UV sensor saturates instantly, so you stack filters until the Sun looks almost polite. The remaining details are anything but.
        SunInSpaceLow* = #JNSQscience_bd_UVspec_SunInSpaceLow_01 // In ultraviolet, the Sun is all sharp edges and bright scars. Mission Control asks if you can please not anger it.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_UVspec_SunInSpaceLowNorthPolarZone_00 // The UV spectrum over the north polar zone is harsh and spiky, with bright arcs that come and go between readings.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_UVspec_SunInSpaceLowNorthSubpolarZone_00 // Fine UV ripples suggest turbulent layers here; the instrument keeps trying to “average out” the Sun.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_UVspec_SunInSpaceLowNorthTemperateZone_00 // The UV lines broaden slightly, as if the light is being smeared by restless hot plasma.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_UVspec_SunInSpaceLowNorthTropicZone_00 // A few emission peaks surge, then fade, like someone is flicking a cosmic light switch.
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_UVspec_SunInSpaceLowEquatorialZone_00 // The equatorial belt is a UV fireworks show; the spectrometer logs several “please stop” events.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_UVspec_SunInSpaceLowSouthTropicZone_00 // UV intensity rises and falls in slow pulses; it feels like listening to a star breathe.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_UVspec_SunInSpaceLowSouthTemperateZone_00 // The spectrum looks cleaner here, but still far too bright for any sane warranty policy.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_UVspec_SunInSpaceLowSouthSubpolarZone_00 // UV signatures smear into a glowing haze; even the shadows look luminous this close in.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_UVspec_SunInSpaceLowSouthPolarZone_00 // The south polar zone throws back sharp UV spikes; the data looks like it’s trying to cut through the paper.
        SunInSpaceHigh* = #JNSQscience_bd_UVspec_SunInSpaceHigh_00 // The camera surveys faint ultraviolet glow across interplanetary space. You start labeling patches as definitely not snacks.

        MohoInSpaceLow* = #JNSQscience_bd_UVspec_MohoInSpaceLow_00 // Ultraviolet images show Moho’s surface as a patchwork of scorched brightness and stubborn darkness. Even the shadows look tired.
        MohoInSpaceLow* = #JNSQscience_bd_UVspec_MohoInSpaceLow_01 // You try to pick out subtle UV reflections in the deepest crater shadows. The data hints at something reflective hiding from the heat.
        MohoInSpaceLowPoles* = #JNSQscience_bd_UVspec_MohoInSpaceLowPoles_00 // UV reflections near the poles hint at something bright tucked in permanent shadow; it sure isn’t an atmosphere.
        MohoInSpaceLowLowlands* = #JNSQscience_bd_UVspec_MohoInSpaceLowLowlands_00 // The lowlands return a flat, UV-dark spectrum, like heat-baked dust that’s given up on being interesting.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_UVspec_MohoInSpaceLowPolarIceCraters_00 // Deep polar craters show a crisp UV-bright edge—cold traps hiding reflective deposits in the dark.
        MohoInSpaceLowHighlands* = #JNSQscience_bd_UVspec_MohoInSpaceLowHighlands_00 // The highlands glitter faintly in UV, suggesting fresher, less cooked material exposed on the slopes.
        MohoInSpaceLowMidlands* = #JNSQscience_bd_UVspec_MohoInSpaceLowMidlands_00 // Midlands readings are steady and dull; just regolith, glare, and the quiet certainty of no air.
        MohoInSpaceLowCraters* = #JNSQscience_bd_UVspec_MohoInSpaceLowCraters_00 // Crater walls show patchy UV sheen, as if impact melt glass is still proud of itself.
        MohoInSpaceLowExoticCraters* = #JNSQscience_bd_UVspec_MohoInSpaceLowExoticCraters_00 // The exotic craters kick out odd UV fluorescence bands; the rocks seem to glow back, just to be difficult.
        MohoInSpaceLowRareCraters* = #JNSQscience_bd_UVspec_MohoInSpaceLowRareCraters_00 // Rare craters show unusually sharp UV contrasts, like their ejecta was sorted and sprinkled on purpose.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_UVspec_MohoInSpaceLowVoronoiCraters_00 // The geometric crater fields form a neat UV mosaic; the spectrometer approves of the symmetry.
        MohoInSpaceLowNotableCraters* = #JNSQscience_bd_UVspec_MohoInSpaceLowNotableCraters_00 // Notable craters outline themselves in UV with bright rims and darker floors—nature’s own annotation marks.
        MohoInSpaceLowPeaks* = #JNSQscience_bd_UVspec_MohoInSpaceLowPeaks_00 // Peaks flash brighter in UV where dust can’t cling, leaving bare, reflective crust exposed to the Sun.
        MohoInSpaceHigh* = #JNSQscience_bd_UVspec_MohoInSpaceHigh_00 // From high over Moho, the camera catches a thin, ghostly haze around the planet when it’s backlit. Everyone pretends they expected it.

        EveInSpaceLow* = #JNSQscience_bd_UVspec_EveInSpaceLow_00 // The upper cloud tops blaze in ultraviolet, revealing bands and swirls that don’t match anything visible-light cameras see. Eve is keeping secrets in plain sight.
        EveInSpaceLow* = #JNSQscience_bd_UVspec_EveInSpaceLow_01 // Dark UV blotches drift through the cloud layer like ink in water. The meteorologists begin arguing immediately.
        EveInSpaceLowPoles* = #JNSQscience_bd_UVspec_EveInSpaceLowPoles_00 // UV scans show oddly dark “holes” in the polar cloud tops, like something down there is drinking the light.
        EveInSpaceLowLowlands* = #JNSQscience_bd_UVspec_EveInSpaceLowLowlands_00 // A broad UV absorption band thickens over the lowlands; the haze is doing most of the science for you.
        EveInSpaceLowMidlands* = #JNSQscience_bd_UVspec_EveInSpaceLowMidlands_00 // The spectrum over the midlands looks uniform and relentless—Eve’s clouds are nothing if not consistent.
        EveInSpaceLowHighlands* = #JNSQscience_bd_UVspec_EveInSpaceLowHighlands_00 // Subtle shifts in the UV edge suggest the cloud chemistry changes with altitude, or with whatever’s below.
        EveInSpaceLowPeaks* = #JNSQscience_bd_UVspec_EveInSpaceLowPeaks_00 // Bright, sharp UV highlights trace high standing terrain beneath the clouds; the spectrometer swears it saw the ground wink.
        EveInSpaceLowExplodiumSea* = #JNSQscience_bd_UVspec_EveInSpaceLowExplodiumSea_00 // A violent UV glint flashes off the Explodium Sea; the instrument logs it as “reactive sparkle” and asks to turn away.
        EveInSpaceLowMountains* = #JNSQscience_bd_UVspec_EveInSpaceLowMountains_00 // Long, striped UV shadows ripple across the cloud deck—mountain waves drawing lines on a purple canvas.
        EveInSpaceLowShores* = #JNSQscience_bd_UVspec_EveInSpaceLowShores_00 // Coastal cloud bands show a crisp UV boundary; the shoreline announces itself with an overconfident glow.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_UVspec_EveInSpaceLowPolarLakes_00 // The polar lakes register as UV-dark pools with bright rims, hinting at a different condensate mix along the edges.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_UVspec_EveInSpaceLowPetrolLakes_00 // Deep UV absorption sits over the petrol lakes; whatever’s pooling there is very good at keeping secrets.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofAkron_00 // The Sea of Akron returns a smooth UV sheen, like a mirror someone forgot to clean.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofNessus_00 // UV mottling dances over the Sea of Nessus; the cloud tops look bruised in a very scientific way.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofTaniwha_00 // A thin, sharp UV line cuts across the Sea of Taniwha—either chemistry, or something making wakes.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofGigan_00 // The Sea of Gigan produces a glaring UV hotspot that drifts between passes, as if it refuses to stay mapped.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofRodan_00 // Turbulent UV streaks over the Sea of Rodan suggest strong updrafts punching the cloud deck from below.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofGojira_00 // The spectrum spikes and crackles over the Sea of Gojira; it feels like the planet is daring the sensor to blink.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofGhidorah_00 // Twin UV peaks show up over the Sea of Ghidorah, symmetrical enough to make engineers suspicious.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_UVspec_EveInSpaceLowSeaofBagorah_00 // A wide UV halo hangs over the Sea of Bagorah, like a permanent warning label on the atmosphere.
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_UVspec_EveInSpaceLowKrakensWell_00 // Over Kraken’s Well, the UV return twists into a swirl; the data looks like it’s trying to escape the clipboard.
        EveInSpaceHigh* = #JNSQscience_bd_UVspec_EveInSpaceHigh_00 // From far out, Eve’s UV brightness changes with angle and season, like it’s blinking slowly. You log it as unsettling but useful.
        EveInSpaceHigh* = #JNSQscience_bd_UVspec_EveInSpaceHigh_01 // A faint ultraviolet halo surrounds the planet in long exposures. Something in the upper atmosphere is glowing, and it’s not being modest about it.

        GillyInSpaceLow* = #JNSQscience_bd_UVspec_GillyInSpaceLow_00 // Gilly doesn’t do much in UV besides exist lopsidedly, but Eve nearby absolutely steals the frame. Your “moon survey” becomes a “purple glare survey.”
        GillyInSpaceLow* = #JNSQscience_bd_UVspec_GillyInSpaceLow_01 // The camera takes high-resolution UV shots of Gilly’s jagged surface while you try not to sneeze the craft out of orbit. The results are surprisingly sharp.
        GillyInSpaceLowLowlands* = #JNSQscience_bd_UVspec_GillyInSpaceLowLowlands_00 // Gilly’s lowlands reflect UV in a weak, dusty smear—mostly scattered sunlight and loose regolith.
        GillyInSpaceLowMidlands* = #JNSQscience_bd_UVspec_GillyInSpaceLowMidlands_00 // The midlands flicker in UV as shadows strobe across uneven ridges; the terrain is lumpy even by asteroid standards.
        GillyInSpaceLowHighlands* = #JNSQscience_bd_UVspec_GillyInSpaceLowHighlands_00 // UV reflectance climbs slightly over the highlands, suggesting fresher rock where dust can’t settle for long.

        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_UVspec_KerbinInSpaceLowIceCaps_00 // The UV return nearly blinds the spectrometer off the ice caps; faint auroral lines ride on top of the glare.
        KerbinInSpaceLowHighlands* = #JNSQscience_bd_UVspec_KerbinInSpaceLowHighlands_00 // UV absorption suggests thinner, drier air over the highlands, with a weaker surface signal.
        KerbinInSpaceLowMountains* = #JNSQscience_bd_UVspec_KerbinInSpaceLowMountains_00 // Cleaner air and sharp shadows make for a crisp spectrum. The rocks reflect more UV than expected.
        KerbinInSpaceLowShores* = #JNSQscience_bd_UVspec_KerbinInSpaceLowShores_00 // A bright UV edge marks the surf; salty spray adds a hazy absorption feature.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_UVspec_KerbinInSpaceLowMidlands_00 // A broad “leafy” UV signature shows up again. Plants are suspiciously good at this.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_UVspec_KerbinInSpaceLowLowlands_00 // The lowlands look hazier in UV. The extra air eats most of the signal before it can bounce back.
        KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_UVspec_KerbinInSpaceLowAridLowlands_00 // Arid sands blaze in ultraviolet. The instrument complains about “excessive shine.”
        KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_UVspec_KerbinInSpaceLowAridMidlands_00 // Dry basins show faint mineral fluorescence bands. Someone labels it “shiny dirt, confirmed.”
        KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_UVspec_KerbinInSpaceLowAridHighlands_00 // Jagged UV lines hint at exposed minerals in the badlands, with very little atmospheric smoothing.
        KerbinInSpaceLowAridMountains* = #JNSQscience_bd_UVspec_KerbinInSpaceLowAridMountains_00 // Dust lofted from the arid ridges tilts the whole spectrum like a gritty filter.
        KerbinInSpaceLowGreatLake* = #JNSQscience_bd_UVspec_KerbinInSpaceLowGreatLake_00 // Over the lake, the UV signal drops hard. Water is greedily swallowing the photons.
        KerbinInSpaceLowInlandWater* = #JNSQscience_bd_UVspec_KerbinInSpaceLowInlandWater_00 // The spectrum over inland water is smooth and dark; only a thin atmospheric rim shows up clearly.
        KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowKreenwichSea_00 // Odd UV streaks track across the sea, either blooms, boats, or a very artistic ocean.
        KerbinInSpaceLowArcticSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowArcticSea_00 // Patchy UV reflectance suggests drifting skim-ice. The spectrometer can’t decide if it’s sea or cap.
        KerbinInSpaceLowForemansSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowForemansSea_00 // A faint UV glimmer follows a curving band on the water. Science insists it’s “normal dynamics.”
        KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowTriangulusSea_00 // The UV map forms an almost perfect triangle here. Mission Control loudly calls it coincidence.
        KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowNorthernSea_00 // Higher-latitude air adds extra absorption. The spectrum comes back colder, cleaner, and quieter.
        KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowSub-ArcticSea_00 // The UV return flickers between open water and skim-ice like the sea can’t make up its mind.
        KerbinInSpaceLowEasternSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowEasternSea_00 // Broad UV scattering hints at spray and low cloud haze hanging over the eastern sea today.
        KerbinInSpaceLowWesternSea* = #JNSQscience_bd_UVspec_KerbinInSpaceLowWesternSea_00 // Calmer readings over the western sea: less haze, more deep absorption from clearer water.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_UVspec_KerbinInSpaceLowWelcomeBackIsland_00 // A tiny island pops in UV like a beacon—either the sand is very reflective or somebody left something on.

        MunInSpaceLow* = #JNSQscience_bd_UVspec_MunInSpaceLow_00 // In ultraviolet, the Mun’s crater rays pop like chalk lines on a blackboard. Someone quietly circles the “fresh-looking” ones.
        MunInSpaceLow* = #JNSQscience_bd_UVspec_MunInSpaceLow_01 // You scan the terminator in UV and find the shadows aren’t just dark: they’re different. The geologists start arguing with enthusiasm.
        MunInSpaceLowPoles* = #JNSQscience_bd_UVspec_MunInSpaceLowPoles_00 // The UV spectrum spikes with harsh glare off the polar regolith, and the shadows look ink-black.
        MunInSpaceLowHighlands* = #JNSQscience_bd_UVspec_MunInSpaceLowHighlands_00 // Sharper UV contrast suggests fresher, less weathered dust across the highlands.
        MunInSpaceLowMidlands* = #JNSQscience_bd_UVspec_MunInSpaceLowMidlands_00 // The midlands return a bland, steady spectrum. Textbook regolith with no surprises, sadly.
        MunInSpaceLowLowlands* = #JNSQscience_bd_UVspec_MunInSpaceLowLowlands_00 // UV-dark patches hint at smoother, finer grains pooled in the lowlands like flour in a bowl.
        MunInSpaceLowPolarIceCraters* = #JNSQscience_bd_UVspec_MunInSpaceLowPolarIceCraters_00 // A bright UV edge betrays hidden frost in the polar ice craters; someone whispers "snacks?"
        MunInSpaceLowExoticCraters* = #JNSQscience_bd_UVspec_MunInSpaceLowExoticCraters_00 // Odd fluorescent bands flicker over the exotic craters, as if the rocks are quietly glowing back.
        MunInSpaceLowRareCraters* = #JNSQscience_bd_UVspec_MunInSpaceLowRareCraters_00 // The rare craters show a glassy UV sheen; impact melt splashed and cooled in a hurry.
        MunInSpaceLowVoronoiCraters* = #JNSQscience_bd_UVspec_MunInSpaceLowVoronoiCraters_00 // Geometric crater fields make a neat UV mosaic. The spectrometer appreciates the organization.
        MunInSpaceLowNotableCraters* = #JNSQscience_bd_UVspec_MunInSpaceLowNotableCraters_00 // A crisp UV ring pattern outlines the notable craters, highlighting ejecta like chalk on slate.
        MunInSpaceLowMountains* = #JNSQscience_bd_UVspec_MunInSpaceLowMountains_00 // High peaks flash brighter in UV, suggesting exposed, cleaner material where dust can't settle.
        MunInSpaceHigh* = #JNSQscience_bd_UVspec_MunInSpaceHigh_00 // Kerbin’s glow sneaks into the frame as a soft UV smear. You pretend you meant to include it as a calibration target.

        MinmusInSpaceLow* = #JNSQscience_bd_UVspec_MinmusInSpaceLow_00 // Minmus’ bright flats blaze in UV, while nearby terrain stays stubbornly dim. The contrast is so sharp it looks painted on.
        MinmusInSpaceLow* = #JNSQscience_bd_UVspec_MinmusInSpaceLow_01 // Ultraviolet imaging makes the minty surface look less friendly and more… chemically opinionated. The lab requests “just one more pass.”
        MinmusInSpaceLowPoles* = #JNSQscience_bd_UVspec_MinmusInSpaceLowPoles_00 // The poles reflect UV like frosted candy. The instrument asks for a smaller gain and a bigger spoon.
        MinmusInSpaceLowLowlands* = #JNSQscience_bd_UVspec_MinmusInSpaceLowLowlands_00 // Minmus lowlands come back UV-bright and smooth, like someone polished them for the camera.
        MinmusInSpaceLowMidlands* = #JNSQscience_bd_UVspec_MinmusInSpaceLowMidlands_00 // Subtle UV absorption hints at mixed salts and dust in the midlands-minty, but not edible.
        MinmusInSpaceLowHighlands* = #JNSQscience_bd_UVspec_MinmusInSpaceLowHighlands_00 // The highlands look slightly UV-dimmer, as if a thin coating of darker grit has drifted uphill.
        MinmusInSpaceLowBasins* = #JNSQscience_bd_UVspec_MinmusInSpaceLowBasins_00 // Flat basins throw back a clean UV signature with sharp boundaries, perfect for mapping.
        MinmusInSpaceLowBrownBasins* = #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownBasins_00 // Brown basin patches soak up UV more than the surrounding flats; something here is less... cheerful.
        MinmusInSpaceLowBrownLowlands* = #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownLowlands_00 // The brown lowlands show muted UV return, suggesting darker grains settling into the lowest spots.
        MinmusInSpaceLowBrownMidlands* = #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownMidlands_00 // Brown midlands add a broad, featureless UV dip-dusty deposits with little reflective sparkle.
        MinmusInSpaceLowBrownHighlands* = #JNSQscience_bd_UVspec_MinmusInSpaceLowBrownHighlands_00 // Even the high brown regions stay UV-dark; whatever stains them seems stubbornly widespread.
        MinmusInSpaceLowMountains* = #JNSQscience_bd_UVspec_MinmusInSpaceLowMountains_00 // Mountain ridges glitter in UV where the surface is scoured clean, leaving bright crust exposed.
        MinmusInSpaceHigh* = #JNSQscience_bd_UVspec_MinmusInSpaceHigh_00 // The camera catches faint UV scatter from dust around the craft, either a real environment effect or someone’s snack crumbs. You log it anyway.

        DunaInSpaceLow* = #JNSQscience_bd_UVspec_DunaInSpaceLow_00 // Duna’s upper atmosphere shows delicate UV banding that visible cameras miss entirely. The weather team names the patterns after snacks.
        DunaInSpaceLow* = #JNSQscience_bd_UVspec_DunaInSpaceLow_01 // Dark UV patches track across the planet with the dust. Whatever is absorbing that light is doing it with confidence.
        DunaInSpaceLowIceCaps* = #JNSQscience_bd_UVspec_DunaInSpaceLowIceCaps_00 // The UV spectrum spikes off bright polar frost, with the thinnest hint of haze skimming the cap edge.
        DunaInSpaceLowHighlands* = #JNSQscience_bd_UVspec_DunaInSpaceLowHighlands_00 // Cleaner air over the highlands sharpens the UV return; the dust looks freshly scuffed and eager to glow.
        DunaInSpaceLowMidlands* = #JNSQscience_bd_UVspec_DunaInSpaceLowMidlands_00 // A broad, dusty UV dip says “suspended grit” louder than any instrument alarm ever could.
        DunaInSpaceLowLowlands* = #JNSQscience_bd_UVspec_DunaInSpaceLowLowlands_00 // Down in the lowlands, extra atmosphere and dust chew up the UV before it can bounce back.
        DunaInSpaceLowCraters* = #JNSQscience_bd_UVspec_DunaInSpaceLowCraters_00 // Crater rims flash brighter in UV than the floors, like the impacts helpfully sorted the surface for you.
        DunaInSpaceLowRareCraters* = #JNSQscience_bd_UVspec_DunaInSpaceLowRareCraters_00 // Rare craters show a crisp UV contrast banding; something about their ejecta is oddly reflective.
        DunaInSpaceLowVoronoiCraters* = #JNSQscience_bd_UVspec_DunaInSpaceLowVoronoiCraters_00 // The patterned crater fields make a tidy UV quilt, each cell slightly different in reflectance.
        DunaInSpaceLowNotableCraters* = #JNSQscience_bd_UVspec_DunaInSpaceLowNotableCraters_00 // Notable craters outline themselves in UV with clean rings and messy halos of thrown-out dust.
        DunaInSpaceLowExoticCraters* = #JNSQscience_bd_UVspec_DunaInSpaceLowExoticCraters_00 // A faint, weird fluorescence signature flickers over the exotic craters, as if the rock is answering back.
        DunaInSpaceLowTrenches* = #JNSQscience_bd_UVspec_DunaInSpaceLowTrenches_00 // The trenches read UV-dark in their deepest cuts, with bright rims that suggest dust slides and shadow frost.
        DunaInSpaceLowNotablePlains* = #JNSQscience_bd_UVspec_DunaInSpaceLowNotablePlains_00 // The plains return a smooth UV signature punctuated by streaks—wind-written dust trails you can see from orbit.
        DunaInSpaceLowNotableMountains* = #JNSQscience_bd_UVspec_DunaInSpaceLowNotableMountains_00 // Over the notable mountains, UV sharpens into high-contrast ridgelines where the air thins and the dust can’t hide.
        DunaInSpaceLowMountains* = #JNSQscience_bd_UVspec_DunaInSpaceLowMountains_00 // Peaks and valleys paint strong UV shadows; the high slopes look cleaner, like they’ve been sandblasted daily.
        DunaInSpaceLowVolcano* = #JNSQscience_bd_UVspec_DunaInSpaceLowVolcano_00 // The volcano region shows an unusual UV edge, hinting at fresh material (or a plume that really wants attention).
        DunaInSpaceHigh* = #JNSQscience_bd_UVspec_DunaInSpaceHigh_00 // From far out, Duna’s UV brightness shifts with season and angle like a slow pulse. You mark the curve and try not to read into it.
        DunaInSpaceHigh* = #JNSQscience_bd_UVspec_DunaInSpaceHigh_01 // Long-exposure UV shots reveal a thin halo around the planet’s limb. The atmosphere is faint, but it refuses to be ignored.

        IkeInSpaceLow* = #JNSQscience_bd_UVspec_IkeInSpaceLow_00 // Ike’s surface in UV looks eerily familiar, like the Mun, but with the lights turned down. The “why are you like this?” folder grows.
        IkeInSpaceLow* = #JNSQscience_bd_UVspec_IkeInSpaceLow_01 // Duna’s ultraviolet glow bleeds into the edge of the image, drowning Ike in backlight. You get a great silhouette and a mediocre survey.
        IkeInSpaceLowPoles* = #JNSQscience_bd_UVspec_IkeInSpaceLowPoles_00 // The poles show a bright UV sparkle in permanent shadows—cold-trapped frost playing hide-and-seek.
        IkeInSpaceLowMountains* = #JNSQscience_bd_UVspec_IkeInSpaceLowMountains_00 // Ike’s mountains return a sharper UV glint where bare rock peeks through the dust like exposed teeth.
        IkeInSpaceLowMidlands* = #JNSQscience_bd_UVspec_IkeInSpaceLowMidlands_00 // The midlands are flat, steady UV boredom: classic airless regolith with no tricks.
        IkeInSpaceLowLowlands* = #JNSQscience_bd_UVspec_IkeInSpaceLowLowlands_00 // Lowlands come back slightly UV-dimmer, as if finer grains have pooled there and swallowed the shine.
        IkeInSpaceLowHighlands* = #JNSQscience_bd_UVspec_IkeInSpaceLowHighlands_00 // Highlands reflect UV a bit more strongly, suggesting rougher, less weathered dust and fresher exposures.
        IkeInSpaceHigh* = #JNSQscience_bd_UVspec_IkeInSpaceHigh_00 // Ultraviolet images show subtle albedo streaks across Ike that don’t line up with the obvious terrain. Either it’s chemistry, or Ike is just being Ike.

        EdnaInSpaceLow* = #JNSQscience_bd_UVspec_EdnaInSpaceLow_00 // The UV camera stares at Edna’s charcoal surface and finds only faint, patchy highlights. Whatever’s reflecting that light is doing it quietly.
        EdnaInSpaceLow* = #JNSQscience_bd_UVspec_EdnaInSpaceLow_00 // Ultraviolet imaging makes Edna’s shadows look deeper than they should be. The analysis team files it under “probably normal” and doesn’t sound convinced.
        EdnaInSpaceLowLowlands* = #JNSQscience_bd_UVspec_EdnaInSpaceLowLowlands_00 // Edna’s lowlands come back UV-dim and featureless, like old dust that’s forgotten how to shine.
        EdnaInSpaceLowMidlands* = #JNSQscience_bd_UVspec_EdnaInSpaceLowMidlands_00 // A faint UV slope change suggests mixed grains in the midlands—nothing dramatic, just quietly different dirt.
        EdnaInSpaceLowHighlands* = #JNSQscience_bd_UVspec_EdnaInSpaceLowHighlands_00 // The highlands reflect a little more UV, as if the surface is rougher and less “settled.”
        EdnaInSpaceLowPolarIceCraters* = #JNSQscience_bd_UVspec_EdnaInSpaceLowPolarIceCraters_00 // Sharp UV-bright edges trace the polar ice craters; whatever’s hiding in the shadows is very reflective.
        EdnaInSpaceLowWhites* = #JNSQscience_bd_UVspec_EdnaInSpaceLowWhites_00 // The Whites blaze in UV like fresh powder; the spectrometer double-checks that it isn’t looking at its own calibration target.
        EdnaInSpaceHigh* = #JNSQscience_bd_UVspec_EdnaInSpaceHigh_00 // You time a long UV exposure as Edna drifts across the background stars. The occultation profile is crisp, and the loneliness is measurable.
        EdnaInSpaceHigh* = #JNSQscience_bd_UVspec_EdnaInSpaceHigh_01 // The UV background is quiet out here; Edna is just a dark speck with a few stubborn bright pixels.

        DakInSpaceLow* = #JNSQscience_bd_UVspec_DakInSpaceLow_00 // Dak’s lumpy “potato” shape shows sharp UV glints as it tumbles. The brightness spikes are so regular they feel like a wink.
        DakInSpaceLow* = #JNSQscience_bd_UVspec_DakInSpaceLow_01 // The camera maps Dak’s UV reflectance and gets a mottled pattern that refuses to match the visible-light images. Mission Control asks if it’s “singing” again.
        DakInSpaceLowLowlands* = #JNSQscience_bd_UVspec_DakInSpaceLowLowlands_00 // Dak’s lowlands show a dull UV return, like a baked potato skin that’s been out in space too long.
        DakInSpaceLowMidlands* = #JNSQscience_bd_UVspec_DakInSpaceLowMidlands_00 // Patchy UV flicker across the midlands makes Dak look like it’s trying to signal something—probably just rocks being rude.
        DakInSpaceLowHighlands* = #JNSQscience_bd_UVspec_DakInSpaceLowHighlands_00 // The highlands kick back a slightly brighter UV sheen, as if the “potato” has a crisp side and a soft side.
        DakInSpaceHigh* = #JNSQscience_bd_UVspec_DakInSpaceHigh_00 // From farther out, Dak becomes a tiny moving mask for UV stargazing. The results are excellent, despite the “potato interference.”
