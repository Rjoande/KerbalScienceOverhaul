        #ScienceRefactor_bd_UVspec_SunInSpace_00 = Tra radiazione intensa, calore e interferenze elettromagnetiche, lo strumento UV riesce a malapena a ottenere qualche lettura così vicino al Sole. Ci dicono che abbiamo annullato la garanzia.
