		LindorInSpaceLowNorthPole* = #JNSQscience_bd_multiSpec_LindorInSpaceLowNorthPole_00 // Ultraviolet shows a thin crown of haze while infrared traces a colder spiral underneath. The pole reads like weather with a grudge.
		LindorInSpaceLowSouthPole* = #JNSQscience_bd_multiSpec_LindorInSpaceLowSouthPole_00 // The south polar region flips between smooth gradients and knotted turbulence depending on wavelength. Lindor seems to be changing its mind mid-scan.
