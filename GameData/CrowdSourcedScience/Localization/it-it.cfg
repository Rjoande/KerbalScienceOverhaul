        #CSS_atmosphereAnalysis_EveSrfLandedOlympus_00 = Sulla cima del mondo sei ancora troppo in basso perché i gas inizino a separarsi.
        #CSS_atmosphereAnalysis_EveSrfLandedOlympus_01 = Sempre disgustosa come al solito. Perché queste montagne non possono essere abbastanza alte da arrivare alla parte buona?
        #CSS_atmosphereAnalysis_EveSrfLandedEasternSea_00 = L'aria di mare sarebbe molto frizzante, se non fosse letale.
