        #GEPscience_sspxTelescopeObservation_CaireenSrfLandedMidlands_00 = The sky is black, the red sun is a distant bruise, and Sucellus looms nearby. You take measurements and feel like a footnote in someone else’s system.
        #GEPscience_sspxTelescopeObservation_CaireenSrfLandedHighlands_00 = A tiny ridge makes a perfect glare shield. You capture a clean star field and wonder how many messages it will take to convince anyone.
