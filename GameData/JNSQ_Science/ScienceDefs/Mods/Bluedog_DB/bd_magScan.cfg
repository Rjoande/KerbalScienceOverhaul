@EXPERIMENT_DEFINITION:HAS[#id[bd_magScan]]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #JNSQscience_bd_magScan_MohoSrfLandedPoles_00 // In the long shadows, the magnetometer finally calms down enough to hear Moho’s faint, tired magnetic whisper.
        MohoSrfLandedLowlands* = #JNSQscience_bd_magScan_MohoSrfLandedLowlands_00 // The scan stays near-zero, but gritty iron-rich dust makes the needle twitch whenever you kick up regolith.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_magScan_MohoSrfLandedPolarIceCraters_00 // Cold-trap ground gives clean baselines, until a gust of charged particles skims the crater rim and the trace ripples.
        MohoSrfLandedHighlands* = #JNSQscience_bd_magScan_MohoSrfLandedHighlands_00 // Old rocks hold onto tiny pockets of remanent magnetism, like Moho remembers a field it never quite had.
        MohoSrfLandedMidlands* = #JNSQscience_bd_magScan_MohoSrfLandedMidlands_00 // The field is weak, smooth, and indifferent. Moho appears magnetically uninterested in your presence.
        MohoSrfLandedCraters* = #JNSQscience_bd_magScan_MohoSrfLandedCraters_00 // Sharp spikes pop up near impact melt. The sensor politely asks you not to park on anything “freshly cratered.”
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_magScan_MohoSrfLandedExoticCraters_00 // The signature is oddly strong for the area, suggesting an impactor with a lot of metal and a bad attitude.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_magScan_MohoSrfLandedRareCraters_00 // A small patch registers like a buried magnet. Either it’s a strange boulder, or the instrument is being dramatic.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_magScan_MohoSrfLandedVoronoiCraters_00 // The scan draws a repeating pattern of weak anomalies: fractures and rims acting like tiny, broken compass needles.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_magScan_MohoSrfLandedNotableCraters_00 // The rim and floor disagree about which way “north” should be, and the readout settles for nervous compromise.
        MohoSrfLandedPeaks* = #JNSQscience_bd_magScan_MohoSrfLandedPeaks_00 // Up high, Kerbol’s wind hits harder; the induced field strengthens just enough to look like Moho is pretending to have a magnetosphere.

        EveSrfSplashed* = #JNSQscience_bd_magScan_EveSrfSplashed_00 // The conductive purple soup smears the trace into a slow wobble; the magnetometer would like to go back to orbit now.
        EveSrfLandedPoles* = #JNSQscience_bd_magScan_EveSrfLandedPoles_00 // There’s no real field to speak of, but charged-particle gusts make the readout shimmer like the sky is trying to draw it for you.
        EveSrfLandedLowlands* = #JNSQscience_bd_magScan_EveSrfLandedLowlands_00 // The baseline stays near zero while the dense air and static charge try their best to impersonate “interesting data.”
        EveSrfLandedMidlands* = #JNSQscience_bd_magScan_EveSrfLandedMidlands_00 // A weak, uneven signal comes and goes, mostly from induced currents and the planet’s enthusiasm for electrical mischief.
        EveSrfLandedHighlands* = #JNSQscience_bd_magScan_EveSrfLandedHighlands_00 // The thinner air calms the noise, leaving a clean result: almost nothing, with the occasional twitch from space weather.
        EveSrfLandedPeaks* = #JNSQscience_bd_magScan_EveSrfLandedPeaks_00 // Up here the sensor mostly hears Kerbol’s wind washing over Eve, nudging the needle in slow, obedient ripples.
        EveSrfLandedMountains* = #JNSQscience_bd_magScan_EveSrfLandedMountains_00 // Tiny spikes suggest scattered magnetized minerals, like someone salted the rocks with just enough metal to be annoying.
        EveSrfLandedShores* = #JNSQscience_bd_magScan_EveSrfLandedShores_00 // Wet ground and strange chemistry turn the scan into a crackling mess; the “field” looks suspiciously like your lander leaking electrons.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_magScan_EveSrfLandedKrakensWell_00 // The instrument finds a tight cluster of sharp anomalies, as if something buried down there is quietly insisting on having a north.

        GillySrfLandedLowlands* = #JNSQscience_bd_magScan_GillySrfLandedLowlands_00 // The magnetometer reports a heroic zero, then adds a few jittery crumbs that are probably just charged dust.
        GillySrfLandedMidlands* = #JNSQscience_bd_magScan_GillySrfLandedMidlands_00 // The trace is flat enough to use as a ruler; any “field” you see is the sensor trying to stay awake.
        GillySrfLandedHighlands* = #JNSQscience_bd_magScan_GillySrfLandedHighlands_00 // A faint blip appears near a metal-rich pebble, then vanishes. Gilly’s entire magnetic personality in one moment.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_magScan_KerbinSrfLandedAdministration_00 // The magnetometer detects a powerful, steady field generated by computers and slide projectors.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_magScan_KerbinSrfLandedAstronautComplex_00 // Readings spike near the snack lockers, then wobble wildly near the “souvenir” collection. Nobody admits owning magnets.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_magScan_KerbinSrfLandedCrawlerway_00 // The rebar and crawler tracks bend the local field into a slow, determined march. The safety officer asks you to “scan less intensely.”
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_magScan_KerbinSrfLandedFlagPole_00 // The needle keeps trying to salute. A guard explains that “patriotic anomalies” require a separate permit.
        KerbinSrfLandedLaunchPad* = #JNSQscience_bd_magScan_KerbinSrfLandedLaunchPad_00 // The magnetometer screams near the pad wiring, then goes quiet when you step away from the big red cable. The pad crew applauds this discovery.
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_magScan_KerbinSrfLandedMissionControl_00 // Your data is immediately classified as “operationally magnetic.” You receive it back with half the numbers replaced by black bars.
        KerbinSrfLandedR&D* = #JNSQscience_bd_magScan_KerbinSrfLandedR&D_00 // The local field is a chaotic mix of shielding, prototypes, and something labeled “temporary.” A scientist asks you to stop asking what “temporary” means.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DCentralBuilding_00 // The field is suspiciously clean and well-behaved, like it has been reviewed by committee. Your report is returned with “please re-measure more safely.”
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DCornerLab_00 // The needle points directly at a locked cabinet. Someone coughs and says, “That cabinet is not part of the experiment.”
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DMainBuilding_00 // Every time a door opens, the readings jump as if startled. Engineers insist the building is not “haunted,” merely “well-equipped.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DObservatory_00 // The magnetometer keeps aligning with the rotating mount instead of north. The operator calls this “a feature” and closes the hatch.
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DSideLab_00 // A low hum makes the readings drift in perfect circles. A technician offers you a sticker that says “CALIBRATED (PROBABLY).”
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DSmallLab_00 // The sensor detects a strong dipole field emanating from a tool drawer. The drawer is immediately declared “non-scientific” and taped shut.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DTanks_00 // The tanks act like enormous prank magnets, pulling the needle into dramatic arcs. You are advised to “not antagonize the storage.”
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_magScan_KerbinSrfLandedR&DWindTunnel_00 // The airflow is not magnetic, but the enormous motor definitely is. The magnetometer files an official complaint about being near “spinning danger.”
        KerbinSrfLandedRunway* = #JNSQscience_bd_magScan_KerbinSrfLandedRunway_00 // A passing jet turns your graph into an abstract masterpiece. Ground crew suggests you publish it as “modern navigation.”
        KerbinSrfLandedSPH* = #JNSQscience_bd_magScan_KerbinSrfLandedSPH_00 // Half-built airframes create a patchwork of fields and sharp edges. The magnetometer points at three different “norths” and one embarrassed engineer.
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_magScan_KerbinSrfLandedSPHMainBuilding_00 // Door motors and overhead cranes make the readings jump on cue. A supervisor requests you time your science between scheduled lifting.
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_magScan_KerbinSrfLandedSPHRoundTank_00 // The needle sticks, unsticks, then sticks again near the curved metal. Someone mutters about “magnetic drama” and offers more shielding tape.
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_magScan_KerbinSrfLandedSPHTanks_00 // The stacked tanks quietly bias the local field like a pile of guilty secrets. Your chart is confiscated for being “too accurate.”
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_magScan_KerbinSrfLandedSPHWaterTower_00 // Water is not magnetic, but the tower’s ladder and bolts disagree loudly. The safety officer insists you scan from the approved side of the fence.
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationDishEast_00 // The dish drive motors tug the readings back and forth like a metronome. The technician calls it “synchronization with management.”
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationDishNorth_00 // The magnetometer twitches every time the dish slews. You are asked to stop measuring “while the big thing is doing big things.”
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationDishSouth_00 // Power conduits produce a neat, steady offset. Someone suggests filing it as “intentional” to avoid rewiring.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationHub_00 // The field inside is calm, grounded, and intensely supervised. The sensor logs “minimal variation; maximum suspicion.”
        KerbinSrfLandedVAB* = #JNSQscience_bd_magScan_KerbinSrfLandedVAB_00 // The entire building behaves like a gigantic, slightly annoyed magnet. The needle points toward the nearest crane and refuses to elaborate.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_magScan_KerbinSrfLandedVABMainBuilding_00 // As the gantry moves, the local field lurches in sympathy. An engineer asks if you can “magnetize it back to normal.”
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_magScan_KerbinSrfLandedVABPodMemorial_00 // The readings are quiet and steady, disturbed only by your respectful shuffling. The magnetometer chooses not to beep here.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_magScan_KerbinSrfLandedVABRoundTank_00 // The sensor detects a strong field and an even stronger desire for you to leave. Security recommends you “scan the air instead.”
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_magScan_KerbinSrfLandedVABSouthComplex_00 // Welders and power tools make the needle dance like it’s at a concert. The safety officer calls this “educational” and waves a clipboard.
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_magScan_KerbinSrfLandedVABTanks_00 // Rows of tanks create a tidy magnetic bias in the direction of “storage.” Your report is filed under “known, but inconvenient.”
        KerbinSrfLandedKSC* = #JNSQscience_bd_magScan_KerbinSrfLandedKSC_00 // A wide-area scan reveals the space center is a symphony of steel, cables, and questionable grounding. North is technically present, but outvoted.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_magScan_KerbinSrfLandedIslandAirfield_00 // Old equipment and hidden wiring add a charming wobble to the field. The magnetometer labels it “historic interference.”
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_magScan_KerbinSrfLandedBaikerbanur_00 // The magnetic field is steady, the paperwork is stronger. Your instrument is issued a visitor badge and a list of approved directions.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_magScan_KerbinSrfLandedBaikerbanurLaunchpad_00 // Massive pad structures bend the field into a sharp, practical angle: “away.” You comply and the needle relaxes.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_magScan_KerbinSrfLandedWoomerang_00 // The needle points somewhere between “north” and “over there.” The staff assures you it’s normal for this facility to be a little… sideways.

        KerbinSrfSplashed* = #JNSQscience_bd_magScan_KerbinSrfSplashed_00 // The magnetometer insists it is not a “marine instrument”, but it still logs a smooth, boringly healthy field through the waves.
        KerbinSrfLandedHighlands* = #JNSQscience_bd_magScan_KerbinSrfLandedHighlands_00 // The scan matches the textbook field almost perfectly, with just enough wobble to remind you there’s a whole planet under you.
        KerbinSrfLandedShores* = #JNSQscience_bd_magScan_KerbinSrfLandedShores_00 // Conductive salt and wet sand make the readings twitchy; the field lines seem to “hum” a little louder near the water.
        KerbinSrfLandedMidlands* = #JNSQscience_bd_magScan_KerbinSrfLandedMidlands_00 // A calm, consistent field rolls in like weather: predictable, dependable, and quietly reassuring.
        KerbinSrfLandedLowlands* = #JNSQscience_bd_magScan_KerbinSrfLandedLowlands_00 // The local field is steady and strong enough to make Mission Control sound pleased for no obvious reason.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_magScan_KerbinSrfLandedAridLowlands_00 // Dry ground and static cling make the needle jitter, but the underlying signal stays solidly Kerbin-normal.
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_magScan_KerbinSrfLandedAridMidlands_00 // Dust gets everywhere, including in the science. You tap the housing; the data immediately looks more cooperative.
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_magScan_KerbinSrfLandedAridHighlands_00 // Thin air, dry rock, and a crisp magnetic trace, like the planet is showing off how neatly it can behave.
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_magScan_KerbinSrfLandedAridMountains_00 // The field here is steady, but sharp little spikes appear whenever you set the sensor down on particularly stubborn-looking stones.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_magScan_KerbinSrfLandedWelcomeBackIsland_00 // The magnetometer reads a perfectly familiar signature. It’s almost like Kerbin is waving hello.
        KerbinSrfLanded* = #JNSQscience_bd_magScan_KerbinSrfLanded_00 // Bill claims tiny variations in Kerbin’s magnetic field can be harvested for “true randomness”. Mission Control suggests you return to “true mission objectives”.
        KerbinSrfLanded* = #JNSQscience_bd_magScan_KerbinSrfLanded_00 // You mention a profitable use-case for magnetometer noise. Mission Control responds by inventing several new checklist items, all titled “DO THE SCIENCE”.

        MunSrfLandedHighlands* = #JNSQscience_bd_magScan_MunSrfLandedHighlands_00 // The magnetometer traces a clean, near-zero baseline. The highlands are as magnetically quiet as they look.
        MunSrfLandedMidlands* = #JNSQscience_bd_magScan_MunSrfLandedMidlands_00 // The readings stay stubbornly flat, with only tiny twitches that feel more like instrument noise than a real field.
        MunSrfLandedLowlands* = #JNSQscience_bd_magScan_MunSrfLandedLowlands_00 // A faint, uneven signal comes and goes as you move. Old rocks remembering a field the Mun no longer makes.
        MunSrfLandedPolarIceCraters* = #JNSQscience_bd_magScan_MunSrfLandedPolarIceCraters_00 // The needle finally perks up; the crater’s exposed debris holds a surprisingly strong remanent magnetism.
        MunSrfLandedExoticCraters* = #JNSQscience_bd_magScan_MunSrfLandedExoticCraters_00 // Sharp magnetic spikes trace the crater floor, as if an impactor brought its own little piece of “elsewhere” with it.
        MunSrfLandedRareCraters* = #JNSQscience_bd_magScan_MunSrfLandedRareCraters_00 // Patchy anomalies flare at the rims and vanish in the flats, like someone sprinkled magnetized dust by hand.
        MunSrfLandedVoronoiCraters* = #JNSQscience_bd_magScan_MunSrfLandedVoronoiCraters_00 // The scan paints a repeating pattern of weak hotspots. Nested scars, nested bits of trapped magnetism.
        MunSrfLandedNotableCraters* = #JNSQscience_bd_magScan_MunSrfLandedNotableCraters_00 // Two distinct signatures show up here, each crater telling the same story in slightly different static.
        MunSrfLandedMountains* = #JNSQscience_bd_magScan_MunSrfLandedMountains_00 // Up on the ridge the field is almost nothing; the rocks only whisper of magnetism when you press the sensor close.

        MinmusSrfLandedPoles* = #JNSQscience_bd_magScan_MinmusSrfLandedPoles_00 // The field is so weak the magnetometer suggests switching to “imagination mode” to see anything at all.
        MinmusSrfLandedLowlands* = #JNSQscience_bd_magScan_MinmusSrfLandedLowlands_00 // The readout stays flat and bored. Minmus continues its proud tradition of not having a magnetic personality.
        MinmusSrfLandedMidlands* = #JNSQscience_bd_magScan_MinmusSrfLandedMidlands_00 // You wait for the needle to move. It does not. The instrument files a formal complaint.
        MinmusSrfLandedHighlands* = #JNSQscience_bd_magScan_MinmusSrfLandedHighlands_00 // Higher up, the result is the same: magnetically dead, just with a better view.
        MinmusSrfLandedBasins* = #JNSQscience_bd_magScan_MinmusSrfLandedBasins_00 // The trace is perfectly smooth, like someone ironed the magnetic field into a neat, empty sheet.
        MinmusSrfLandedBrownBasins* = #JNSQscience_bd_magScan_MinmusSrfLandedBrownBasins_00 // The “brown” doesn’t add magnetism. It just makes the nothingness look slightly more serious.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_magScan_MinmusSrfLandedBrownLowlands_00 // Still no field. Only a darker shade of disappointment in the data.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_magScan_MinmusSrfLandedBrownMidlands_00 // The readings remain flat. Whatever makes these areas brown, it isn’t magnetism.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_magScan_MinmusSrfLandedBrownHighlands_00 // The instrument detects exactly zero excitement, even at altitude.
        MinmusSrfLandedMountains* = #JNSQscience_bd_magScan_MinmusSrfLandedMountains_00 // Up on Minmus’ peaks, the magnetic field is as absent as common sense in the mission plan.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_magScan_DunaSrfLandedIceCaps_00 // The magnetometer finally finds something to do: a faint, wavering signal that comes and goes with charged particles over the caps.
        DunaSrfLandedHighlands* = #JNSQscience_bd_magScan_DunaSrfLandedHighlands_00 // Thin air, old rock, and a weak but measurable remanent trace, like Duna’s crust remembers a field it can’t make anymore.
        DunaSrfLandedMidlands* = #JNSQscience_bd_magScan_DunaSrfLandedMidlands_00 // The baseline stays low and steady until dust skitters past the sensor and makes the needle flinch.
        DunaSrfLandedLowlands* = #JNSQscience_bd_magScan_DunaSrfLandedLowlands_00 // Subtle, uneven anomalies suggest buried mineral patches hiding under a lot of very determined red dirt.
        DunaSrfLandedCraters* = #JNSQscience_bd_magScan_DunaSrfLandedCraters_00 // Sharp spikes cluster around the rim; impact melt seems to have frozen in a tiny, stubborn magnetic signature.
        DunaSrfLandedRareCraters* = #JNSQscience_bd_magScan_DunaSrfLandedRareCraters_00 // One patch reads stronger than it should, as if an iron-rich visitor left a souvenir in the regolith.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_magScan_DunaSrfLandedVoronoiCraters_00 // The scan maps a repeating pattern of weak hotspots, as though the fractured ground is quietly pointing in several directions at once.
        DunaSrfLandedNotableCraters* = #JNSQscience_bd_magScan_DunaSrfLandedNotableCraters_00 // The rim and floor disagree about “north”; the instrument settles on a compromised wobble and calls it science.
        DunaSrfLandedExoticCraters* = #JNSQscience_bd_magScan_DunaSrfLandedExoticCraters_00 // The signature doesn’t match the surroundings at all. Something here is magnetically out of place.
        DunaSrfLandedTrenches* = #JNSQscience_bd_magScan_DunaSrfLandedTrenches_00 // The trace bends and twists along the trench walls, hinting at layered material with different magnetic histories.
        DunaSrfLandedNotablePlains* = #JNSQscience_bd_magScan_DunaSrfLandedNotablePlains_00 // A broad, calm reading—weak, consistent, and perfect for calibrating everything you wish were more exciting.
        DunaSrfLandedNotableMountains* = #JNSQscience_bd_magScan_DunaSrfLandedNotableMountains_00 // Altitude quiets the ground noise, but the needle still ripples with space weather passing over the ridge.
        DunaSrfLandedMountains* = #JNSQscience_bd_magScan_DunaSrfLandedMountains_00 // Up high, the crust goes quiet and the sensor mostly hears induced flutter from Kerbol’s wind brushing past Duna.
        DunaSrfLandedVolcano* = #JNSQscience_bd_magScan_DunaSrfLandedVolcano_00 // Warm rock erases old magnetism, but cooled flows preserve thin stripes of it.

        IkeSrfLandedPoles* = #JNSQscience_bd_magScan_IkeSrfLandedPoles_00 // The reading is nearly flat, with a faint nudge that feels more like induced effects than anything Ike can claim as its own.
        IkeSrfLandedMountains* = #JNSQscience_bd_magScan_IkeSrfLandedMountains_00 // Pressed close to bedrock, the magnetometer catches tiny spikes. Little pockets of remanence clinging to the highs.
        IkeSrfLandedMidlands* = #JNSQscience_bd_magScan_IkeSrfLandedMidlands_00 // A clean, featureless baseline: magnetically dead, efficiently so.
        IkeSrfLandedLowlands* = #JNSQscience_bd_magScan_IkeSrfLandedLowlands_00 // The needle jitters whenever dust shifts, but the underlying signal remains an unambitious near-zero.
        IkeSrfLandedHighlands* = #JNSQscience_bd_magScan_IkeSrfLandedHighlands_00 // Weak, patchy anomalies flicker in and out, as if old impact melt remembered magnetism for a moment and then forgot again.

        EdnaInSpaceLow* = #JNSQscience_bd_magScan_EdnaInSpaceLow_00 // The magnetometer records a faint, stubborn trace—Edna’s little rock pile barely manages a magnetic “hello.”
        EdnaInSpaceHigh* = #JNSQscience_bd_magScan_EdnaInSpaceHigh_00 // Farther out, the signal flattens into near-perfect silence. If Edna has a field, it keeps it to itself.
        EdnaSrfLandedLowlands* = #JNSQscience_bd_magScan_EdnaSrfLandedLowlands_00 // The needle hovers near zero, drifting lazily over dark dust that seems magnetically uninterested in everything.
        EdnaSrfLandedMidlands* = #JNSQscience_bd_magScan_EdnaSrfLandedMidlands_00 // Tiny blips come and go, like scattered grains of old, weakly magnetized rubble hiding in the regolith.
        EdnaSrfLandedHighlands* = #JNSQscience_bd_magScan_EdnaSrfLandedHighlands_00 // Patchy spikes show up whenever the sensor gets close to exposed rock—small pockets of remanence in a mostly dead world.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_bd_magScan_EdnaSrfLandedPolarIceCraters_00 // The cold ground is quiet, but occasional charged-particle gusts make the readout ripple along the crater rim.
        EdnaSrfLandedWhites* = #JNSQscience_bd_magScan_EdnaSrfLandedWhites_00 // The bright surface gives clean baselines, then sudden little twitches—as if the “white” stuff is hoarding static.

        DakInSpaceLow* = #JNSQscience_bd_magScan_DakInSpaceLow_00 // The trace jitters as you pass over Dak’s lumpy bulk, then settles back to “no field detected, stop asking.”
        DakInSpaceHigh* = #JNSQscience_bd_magScan_DakInSpaceHigh_00 // Dak’s magnetic signature drops off fast; out here the instrument mostly measures empty space and your own electronics.
        DakSrfLandedLowlands* = #JNSQscience_bd_magScan_DakSrfLandedLowlands_00 // The magnetometer finds almost nothing, punctuated by brief spikes whenever you bump a particularly metal-looking pebble.
        DakSrfLandedMidlands* = #JNSQscience_bd_magScan_DakSrfLandedMidlands_00 // A flat baseline with occasional noise—Dak’s “siren call” is apparently not electromagnetic.
        DakSrfLandedHighlands* = #JNSQscience_bd_magScan_DakSrfLandedHighlands_00 // The readings are weak and erratic, like the surface can’t decide whether it ever met a magnetic field in the first place.

        DresSrfLandedPoles* = #JNSQscience_bd_magScan_DresSrfLandedPoles_00 // A low, steady signal appears in patches, suggesting the polar ground remembers magnetism in thin, frozen layers.
        DresSrfLandedHighlands* = #JNSQscience_bd_magScan_DresSrfLandedHighlands_00 // Small, sharp anomalies cling to exposed ridges—little compass-needles trapped in old stone.
        DresSrfLandedMidlands* = #JNSQscience_bd_magScan_DresSrfLandedMidlands_00 // The data is a nearly perfect flat line. Dres remains proudly, efficiently unmagnetic.
        DresSrfLandedLowlands* = #JNSQscience_bd_magScan_DresSrfLandedLowlands_00 // The needle lifts just a bit more here, hinting at denser minerals buried under Dres’ famously underwhelming scenery.
        DresSrfLandedCanyon* = #JNSQscience_bd_magScan_DresSrfLandedCanyon_00 // The canyon walls paint faint stripes of anomalies, like the geology is quietly leaving magnetic notes in the layers.

        LaytheInSpaceLow* = #JNSQscience_bd_magScan_LaytheInSpaceLow_00 // Low orbit is a tug-of-war: Laythe’s own field holds shape, while Jool’s influence keeps trying to scribble over it.
        LaytheInSpaceHigh* = #JNSQscience_bd_magScan_LaytheInSpaceHigh_00 // Farther out, Laythe’s signal thins and Jool’s magnetic weather starts doing most of the talking.
        LaytheSrfSplashed* = #JNSQscience_bd_magScan_LaytheSrfSplashed_00 // The salty water conducts beautifully, turning the scan into a smooth, rolling wobble that feels like the ocean is part of the circuit.
        LaytheSrfLandedShores* = #JNSQscience_bd_magScan_LaytheSrfLandedShores_00 // Wet ground and nearby surf add a gentle hiss of induction, but Laythe’s baseline field stays confidently present.
        LaytheSrfLandedShallows* = #JNSQscience_bd_magScan_LaytheSrfLandedShallows_00 // The magnetometer catches slow pulses from tides and currents, as if the sea is dragging field lines back and forth.
        LaytheSrfLandedLowlands* = #JNSQscience_bd_magScan_LaytheSrfLandedLowlands_00 // A steady surface field sits under faint, periodic ripples—Jool’s magnetosphere passing overhead like distant thunder.
