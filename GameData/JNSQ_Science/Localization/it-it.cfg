        #JNSQscience_barometerScan_HuygenSrfLandedMidlands_00 = La pressione è ancora robusta, ma "respira" in lenti impulsi con la foschia in deriva.
        #JNSQscience_barometerScan_HuygenSrfLandedMidlands_01 = Dai un colpetto al misuratore: si rifiuta di scendere. Le regioni intermedie sono decisamente atmosferiche.
        #JNSQscience_barometerScan_HuygenSrfLandedHighlands_00 = In quota la lancetta arretra un po', ma l'aria resta abbastanza densa da farsi sentire attraverso lo scafo.
        #JNSQscience_barometerScan_HuygenSrfLandedHighlands_01 = Il barometro segnala "alta" con un tono che sembra un'etichetta di pericolo.
        #JNSQscience_barometerScan_HuygenSrfLandedMountains_00 = Le raffiche fanno oscillare la pressione quel tanto che basta per ricordarti che l'atmosfera ha l'umore.
        #JNSQscience_barometerScan_HuygenSrfLandedMountains_01 = La lettura si stabilizza su una base schiacciante. Le montagne aggiungono dramma, non sollievo.
        #JNSQscience_barometerScan_HuygenSrfLandedPeaks_00 = In alto, la pressione finalmente si attenua fino a essere "solo seria". Il barometro sembra grato.
        #JNSQscience_barometerScan_HuygenSrfLandedPeaks_01 = La lancetta scende, poi risale lentamente mentre uno strato di foschia passa sulla cima come un'onda lenta.
        #JNSQscience_barometerScan_HuygenSrfLandedPolarLowlands_00 = Qui l'aria fredda si accumula e la pressione resta pesante e ostinata, come se non avesse altro posto dove andare.
        #JNSQscience_barometerScan_HuygenSrfLandedPolarLowlands_01 = Il barometro sfarfalla appena. Aria stabile e densa sta facendo del suo meglio per sembrare solida.
        #JNSQscience_barometerScan_HuygenSrfLandedPoles_00 = La pressione è alta e inquietantemente stabile, come se l'atmosfera stesse trattenendo il respiro.
        #JNSQscience_barometerScan_HuygenSrfLandedPoles_01 = La lancetta si assesta in una calma che sembra quasi intenzionale. Non lo contraddici.
        #JNSQscience_barometerScan_HuygenSrfLandedPolarHighlands_00 = La quota aiuta un po', ma l'aria polare preme ancora con quieta determinazione.
        #JNSQscience_barometerScan_HuygenSrfLandedPolarHighlands_01 = Il misuratore oscilla a piccoli gradini, suggerendo strati d'aria impilati come coperte.
        #JNSQscience_barometerScan_HuygenSrfLandedShores_00 = La pressione va a picchi e cali con la brezza costiera, come se il mare stesse espirando nel cielo.
        #JNSQscience_barometerScan_HuygenSrfLandedShores_01 = Il barometro registra aria densa che sa di "non acqua", perfino attraverso i filtri.
        #JNSQscience_barometerScan_HuygenSrfSplashedShores_00 = Le onde fanno dondolare il veicolo e la lancetta sobbalza con lui, lamentandosi di essere usata al livello del mare.
        #JNSQscience_barometerScan_HuygenSrfSplashedShores_01 = La pressione resta alta mentre spruzzi e foschia provano a intasare l'aspirazione. Il barometro presenta una protesta formale.
        #JNSQscience_barometerScan_HuygenSrfSplashedMethaneLakes_00 = La lancetta sta alta e stabile sopra il lago, come se l'aria venisse alimentata da sotto.
        #JNSQscience_barometerScan_HuygenSrfSplashedMethaneLakes_01 = Un'onda di passaggio spinge appena le letture. A quanto pare anche il liquido che sciaborda può partecipare alla pressione.
        #JNSQscience_barometerScan_HuygenFlyingLow_00 = La pressione cala con la quota, ma solo da "presente" a "ancora molto entusiasta".
        #JNSQscience_barometerScan_HuygenFlyingLow_01 = La turbolenza fa rimbalzare la lancetta come se stesse cercando di scappare dalla scala.
        #JNSQscience_barometerScan_HuygenFlyingHigh_00 = Più in alto, il misuratore finalmente smette di fare l'offeso e inizia a dare numeri puliti e stabili.
        #JNSQscience_barometerScan_HuygenFlyingHigh_01 = La pressione è più bassa, la foschia più sottile e il barometro sembra quasi compiaciuto di essere sopravvissuto.
        #JNSQscience_barometerScan_HuygenInSpaceLow_00 = La lancetta scende a niente e resta lì. Il barometro si gode la sua meritata vacanza.
        #JNSQscience_barometerScan_HuygenInSpaceLow_01 = Confermi che la pressione nello spazio è zero. Lo strumento conferma che sei molto scrupoloso.
        #JNSQscience_barometerScan_HuygenInSpaceHigh_00 = Nessuna atmosfera arriva fin quassù. Il barometro produce uno zero fiero e incrollabile.
        #JNSQscience_barometerScan_HuygenInSpaceHigh_01 = Il misuratore è così vuoto che sembra una misura di solitudine. Lo registri lo stesso.
        #JNSQscience_barometerScan_RigaSrfLandedLowlands_00 = Il barometro rileva un sottile sussurro che si raccoglie ne i bassopiani. Sembra comunque orgoglioso di aver trovato qualcosa.
        #JNSQscience_barometerScan_RigaSrfLandedMidlands_00 = La pressione resta stabile su "appena presente", con piccoli sfarfallii che potrebbero essere effetti del terreno o lo strumento che sbatte le palpebre.
        #JNSQscience_barometerScan_RigaSrfLandedHighlands_00 = Quassù la pressione scende ancora più vicina al vuoto. Il barometro continua a controllare di essere ancora acceso.
        #JNSQscience_barometerScan_RigaSrfLandedMountains_00 = Le letture restano sul limite di rilevabilità mentre le cime rubano quel poco d'aria che esiste. Il barometro presenta un reclamo.
        #JNSQscience_barometerScan_RigaSrfLandedPoles_00 = Strati d'aria fredda causano deboli picchi di pressione nervosi.
        #JNSQscience_barometerScan_RigaFlyingLow_00 = La lancetta oscilla nella foschia tenue di Riga, registrando una pressione reale, misurabile e comunque praticamente nulla.
        #JNSQscience_barometerScan_RigaFlyingHigh_00 = Quassù il barometro misura soprattutto rumore strumentale e ottimismo, con qualche molecola che passa ogni tanto.
        #JNSQscience_barometerScan_RigaInSpaceLow_00 = Il barometro legge "zero" con impressionante sicurezza, poi va brevemente in panico quando uno sbuffo residuo colpisce il sensore.
        #JNSQscience_barometerScan_RigaInSpaceHigh_00 = Vuoto perfetto. Il barometro si annoia e inizia invece a valutare le tue scelte di vita.
        #JNSQscience_barometerScan_TalosSrfLanded_00 = La lancetta non si muove affatto. Talos offre un vuoto fiero e ben mantenuto.
        #JNSQscience_barometerScan_TalosInSpace_00 = Il barometro conferma la sconvolgente scoperta che lo spazio contiene ancora meno aria di Talos.
        #JNSQscience_barometerScan_EelooSrfLandedPoles_00 = Il barometro sussulta e alla fine ammette che qui c'è una traccia di pressione, appena abbastanza da giustificare la lancetta.
        #JNSQscience_barometerScan_EelooSrfLandedHighlands_00 = Negli altopiani la pressione cala ancora. L'atmosfera è tecnicamente presente, ma chiaramente sta cercando di andarsene.
        #JNSQscience_barometerScan_EelooSrfLandedMidlands_00 = La lettura si assesta vicino allo zero con un piccolo rialzo ostinato, come se Eeloo stesse accumulando una sottile pelle di gas al livello del suolo.
        #JNSQscience_barometerScan_EelooSrfLandedLowlands_00 = i bassopiani danno la "migliore" pressione su Eeloo, che è come vincere la gara del cumulo di neve più caldo.
        #JNSQscience_barometerScan_EelooSrfLandedCanyon_00 = Riparato dalle pareti del canyon, il barometro riesce a ottenere una lettura un po' più stabile, ancora troppo sottile per chiamarla aria senza ridere.
        #JNSQscience_barometerScan_EelooFlyingLow_00 = La pressione sale da "nessuna" a "quasi nessuna". Lo strumento sembra personalmente offeso.
        #JNSQscience_barometerScan_EelooFlyingHigh_00 = Quassù il barometro torna al suo valore preferito: zero, con una nota che dice "te l'avevo detto".
        #JNSQscience_barometerScan_EelooInSpaceLow_00 = Il barometro legge vuoto perfetto e sembra sollevato di essere tornato nella sua zona di comfort.
        #JNSQscience_barometerScan_EelooInSpaceHigh_00 = Qui fuori c'è solo vuoto. Il barometro registra il risultato lo stesso, giusto per sentirsi utile.
        #JNSQscience_barometerScan_CelesSrfLandedLowlands_00 = Il barometro segnala uno zero sicuro. L'unica pressione è far finta che la cosa sorprenda.
        #JNSQscience_barometerScan_CelesSrfLandedMidlands_00 = Compare un piccolo blip quando la polvere picchietta l'aspirazione, poi torna al "vuoto" come se se ne vergognasse.
        #JNSQscience_barometerScan_CelesSrfLandedHighlands_00 = Ancora nessuna atmosfera. Tocchi il misuratore lo stesso, giusto per assicurarti che il niente sia reale.
        #JNSQscience_barometerScan_CelesSrfLandedMountains_00 = La graniglia intasa il foro e la lancetta ondeggia. Per un glorioso momento, misuri "un po' meno vuoto".
        #JNSQscience_barometerScan_CelesSrfLandedPoles_00 = La lettura resta inchiodata a zero. Scrivi "vuoto polare" per infastidire gli statistici.
        #JNSQscience_barometerScan_CelesSrfLanded_00 = La lancetta resta ostinatamente a zero. Tocchi l'involucro: resta impassibile.
        #JNSQscience_barometerScan_CelesInSpace_00 = La pressione è esattamente quella dello spazio: nessuna. Lo strumento sembra contento di avere ragione.
        #JNSQscience_barometerScan_CelesInSpaceLow_00 = Orbita bassa, stesso risultato: nessuna pressione. Lo spazio continua a essere molto spazio.
        #JNSQscience_barometerScan_CelesInSpaceHigh_00 = Il display mostra 0.00 e si rifiuta di aggiungere altri decimali. Anche gli strumenti hanno dei limiti.
        #JNSQscience_barometerScan_TamSrfLandedLowlands_00 = La lancetta resta inchiodata a zero e in qualche modo sembra nervosa.
        #JNSQscience_barometerScan_TamSrfLandedMidlands_00 = Il misuratore traballa a ogni minima vibrazione, ma la lettura resta ostinatamente "niente aria".
        #JNSQscience_barometerScan_TamSrfLandedHighlands_00 = Di nuovo vuoto. Tam non riesce nemmeno a offrire una brezza deludente.
        #JNSQscience_barometerScan_TamSrfLandedTwinCraters_00 = Controlli il bacino in ombra in cerca di aria intrappolata. Il barometro risponde con uno zero annoiato.
        #JNSQscience_barometerScan_TamSrfLandedCraters_00 = Con tutti questi buchi, il barometro rinuncia e segnala lo stesso niente ovunque.
        #JNSQscience_barometerScan_TamSrfLandedPockmarks_00 = Sbuffi di polvere causano falsi picchi sul grafico. Li etichetti "non atmosfera, solo atteggiamento".
        #JNSQscience_barometerScan_TamSrfLanded_00 = Il barometro segnala "vuoto" e si rifiuta di elaborare. Per un attimo accusi Tam di essersi rubato l'atmosfera.
        #JNSQscience_barometerScan_TamInSpace_00 = Ancora zero. Ruoti il veicolo, fulmini con lo sguardo il display e confermi che lo spazio resta spazio.
        #JNSQscience_barometerScan_TamInSpaceLow_00 = Orbita bassa: zero pressione. Il Controllo Missione si congratula per aver confermato cosa significhi "spazio".
        #JNSQscience_barometerScan_TamInSpaceHigh_00 = Da molto in alto, il barometro continua la sua eroica lotta contro assolutamente niente.
        #JNSQscience_barometerScan_HamekSrfLandedLowlands_00 = Il barometro legge vuoto, mentre la polvere rossa si impegna molto a diventare "qualcosa" nell'aspirazione.
        #JNSQscience_barometerScan_HamekSrfLandedMidlands_00 = Compare un breve salto mentre la polvere passa davanti al sensore, poi torna a uno zero pulito.
        #JNSQscience_barometerScan_HamekSrfLandedHighlands_00 = Neanche quassù c'è aria, solo terreno freddo e duro, e quel colore inquietante.
        #JNSQscience_barometerScan_HamekSrfLandedPoles_00 = Il misuratore resta inchiodato a zero. L'unica "pressione" è l'abbagliamento polare sulla tua visiera.
        #JNSQscience_barometerScan_HamekSrfLanded_00 = Il sensore non rileva alcuna pressione dell'aria. L'unico "sibilo" arriva dalle valvole della tua tuta.
        #JNSQscience_barometerScan_HamekInSpace_00 = La lettura è indistinguibile dal vuoto circostante. La registri come "coerente, poco utile".
        #JNSQscience_barometerScan_HamekInSpaceLow_00 = Lo strumento conferma che Hamek non ha atmosfera, solo misteri e un sacco di vuoto.
        #JNSQscience_barometerScan_HamekInSpaceHigh_00 = Ancora vuoto. Il barometro sembra sollevato che tu abbia chiesto da più lontano.
        #JNSQscience_barometerScan_NaraSrfLandedLowlands_00 = La lancetta sale e sale finché sembra compiaciuta. L'aria di Nara non è timida nell'essere pesante.
        #JNSQscience_barometerScan_NaraSrfLandedLowlands_01 = La pressione è così alta che quasi la senti appoggiarsi sullo scafo. Scrivi "scarpette rosse: preferibile".
        #JNSQscience_barometerScan_NaraSrfLandedMidlands_00 = Il barometro si assesta su un valore brutalmente stabile. L'atmosfera di Nara sembra una regola, non un meteo.
        #JNSQscience_barometerScan_NaraSrfLandedMidlands_01 = La lettura suggerisce che sei sul fondo di un oceano invisibile. Resisti all'impulso di cercare pesci.
        #JNSQscience_barometerScan_NaraSrfLandedHighlands_00 = La pressione cala un po' con la quota, ma non lontanamente quanto vorresti. Nara si rifiuta di "rarefarsi".
        #JNSQscience_barometerScan_NaraSrfLandedHighlands_01 = Confermi che gli altopiani sono ancora sotto un serio peso atmosferico. Il pianeta è molto convinto del concetto.
        #JNSQscience_barometerScan_NaraSrfLandedMountains_00 = Il barometro sfarfalla mentre vento e terreno rimescolano l'aria. Persino l'"aria di montagna" è abbastanza densa da discutere.
        #JNSQscience_barometerScan_NaraSrfLandedMountains_01 = Il profilo di pressione sembra sbagliato per qualcosa di così freddo, poi ti ricordi che a Nara non importa cosa sembri "giusto".
        #JNSQscience_barometerScan_NaraSrfLandedPolarLowlands_00 = Le bassure polari registrano alta pressione con rumore extra, come se l'aria fosse piena di graniglia fine e pungente.
        #JNSQscience_barometerScan_NaraSrfLandedPolarLowlands_01 = La lancetta trema e poi si stabilizza su "ancora troppo". Lo registri come: "aria polare, pesante e stizzosa".
        #JNSQscience_barometerScan_NaraSrfLandedPoles_00 = Il barometro segnala un muro di pressione poco accogliente e ti sfida a lamentarti.
        #JNSQscience_barometerScan_NaraSrfLandedPoles_01 = Tocchi il misuratore. Non si muove, come a dire: "No, è corretto".
        #JNSQscience_barometerScan_NaraSrfLandedPolarHighlands_00 = Qui la pressione è leggermente più bassa, ma l'atmosfera preme ancora come se avesse un lavoro da fare.
        #JNSQscience_barometerScan_NaraSrfLandedPolarHighlands_01 = La lettura conferma: anche le alture polari arrivano con un abbraccio incorporato dal cielo. Un abbraccio molto deciso.
        #JNSQscience_barometerScan_NaraFlyingLow_00 = A bassa quota la pressione cambia in fretta a ogni scossone di turbolenza. Il barometro si allena e anche tu.
        #JNSQscience_barometerScan_NaraFlyingLow_01 = La lancetta oscilla ma non va mai verso niente di confortante. "Volare" sembra nuotare in aria fredda e pesante.
        #JNSQscience_barometerScan_NaraFlyingHigh_00 = Quassù la pressione è più bassa, ma è ancora molto "atmosfera". Il cielo di Nara ha spessore e vuole che tu te ne accorga.
        #JNSQscience_barometerScan_NaraFlyingHigh_01 = Il barometro sostiene che questo sia "alto". Aggiungi una nota: "Alto rispetto a cosa, esattamente?"
        #JNSQscience_barometerScan_NaraInSpaceLow_00 = La pressione scende verso il niente mentre sali sopra la presa di Nara. La lettura finalmente sembra tranquilla.
        #JNSQscience_barometerScan_NaraInSpaceLow_01 = La lancetta sta vicino allo zero e, per una volta, è una buona notizia. Vorresti che il piano di rientro fosse semplice quanto questo numero.
        #JNSQscience_barometerScan_NaraInSpaceHigh_00 = Lo strumento è d'accordo: qui non c'è aria, solo distanza. Tanta, tantissima distanza.
        #JNSQscience_barometerScan_NaraInSpaceHigh_01 = Il barometro legge vuoto e la cabina sembra l'unico piccolo pezzo di "dentro" rimasto nell'universo.
        #JNSQscience_barometerScan_AmosSrfLanded_00 = La lancetta del barometro resta inchiodata a zero.
        #JNSQscience_barometerScan_AmosInSpace_00 = La lettura resta un vuoto perfetto. Lo strumento lo registra come "coerente" e tu lo registri come "ostile".
        #JNSQscience_barometerScan_EnonSrfLanded_00 = La pressione è esattamente niente, nonostante tutto quel ghiaccio brillante sembri così invitante.
        #JNSQscience_barometerScan_EnonInSpace_00 = Ancora vuoto. Tocchi il misuratore per sicurezza, poi ti ricordi che i colpetti non creano atmosfere.
        #JNSQscience_barometerScan_PraxSrfLanded_00 = Il barometro segnala uno zero fiero e incrollabile.
        #JNSQscience_barometerScan_PraxInSpace_00 = Nient'altro che vuoto e un sensore di pressione molto annoiato. Almeno il risultato è facile da mettere in grafico.

        // crewReport
        #JNSQscience_crewReport_SunFlyingHigh_00 = L'equipaggio riferisce che "volare" qui è un termine generoso. Fuori è tutto bagliore, vibrazioni e un coro costante di pompe di raffreddamento.
        #JNSQscience_crewReport_SunFlyingLowNorthPolarZone_00 = L'equipaggio osserva pallidi filamenti sferzare i finestrini e concorda che il "meteo polare" stia cercando di rubarsi la nave.
        #JNSQscience_crewReport_SunFlyingLowNorthSubpolarZone_00 = Le luci della cabina sfarfallano mentre particelle cariche martellano lo scafo. L'equipaggio lo chiama "intrattenimento gratuito" e poi smette di ridere.
        #JNSQscience_crewReport_SunFlyingLowNorthTemperateZone_00 = Fuori sembra calmo per mezzo secondo, poi torna a ribollire. L'equipaggio registra: "Luminosità: sì".
        #JNSQscience_crewReport_SunFlyingLowNorthTropicZone_00 = La nave trema attraversando strati in tumulto. L'equipaggio discute se la crema solare si possa applicare all'intero veicolo.
        #JNSQscience_crewReport_SunFlyingLowEquatorialZone_00 = La vista è una fornace infinita e contorta. L'equipaggio riferisce che le ombre sono ormai una preziosa risorsa scientifica.
        #JNSQscience_crewReport_SunFlyingLowSouthTropicZone_00 = La turbolenza sbatte la nave in giro come un giocattolo. L'equipaggio riferisce che i loro stomaci hanno presentato un reclamo al Controllo Missione.
        #JNSQscience_crewReport_SunFlyingLowSouthTemperateZone_00 = Gli strumenti insistono che sei ancora "in atmosfera". L'equipaggio insiste che sia un insulto alle atmosfere di tutto l'universo.
        #JNSQscience_crewReport_SunFlyingLowSouthSubpolarZone_00 = Lo scafo crepita di elettricità statica e i finestrini brillano. L'equipaggio riferisce che il concetto di "fuori" è diventato profondamente personale.
        #JNSQscience_crewReport_SunFlyingLowSouthPolarZone_00 = Ioni veloci colpiscono la nave da angolazioni strane. L'equipaggio riferisce che il polo è o affascinante, o attivamente offeso dai visitatori.
        #JNSQscience_crewReport_MohoSrfLandedCraters_00 = In ogni direzione c'è un'altra cicatrice d'impatto. Inizi a valutarle in base a quanto sarebbero buone per un salto col rover.
        #JNSQscience_crewReport_MohoSrfLandedCraters_01 = La polvere fluttua al rallentatore quando urti il portello. La chiami "catering per crateri".
        #JNSQscience_crewReport_MohoSrfLandedExoticCraters_00 = Il bordo di questo cratere zig-zaga come se fosse stato disegnato con un righello tremolante. L'equipaggio dà la colpa, in silenzio, alla "geologia spaziale".
        #JNSQscience_crewReport_MohoSrfLandedExoticCraters_01 = I pattern di ejecta sembrano sbagliati in un modo difficile da spiegare. Scatti foto extra, nel caso valgano la pena di vantarsene.
        #JNSQscience_crewReport_MohoSrfLandedRareCraters_00 = Finalmente trovi un cratere che non è mezzo cancellato da quelli più vecchi. È come scoprire un punto pulito sul pavimento di un'officina.
        #JNSQscience_crewReport_MohoSrfLandedRareCraters_01 = Le sue pareti sono più nette e più scure dei dintorni. Qualcuno suggerisce che "potrebbe essere ancora caldo" e tutti smettono di parlare.
        #JNSQscience_crewReport_MohoSrfLandedVoronoiCraters_00 = I crateri si incastrano come un pavimento piastrellato stranissimo. Ti chiedi se Moho stia cercando di fare l'ingegnere.
        #JNSQscience_crewReport_MohoSrfLandedVoronoiCraters_01 = Dal finestrino sembra ordinato: da vicino è comunque caos e rocce. Ordine, ma croccante.
        #JNSQscience_crewReport_MohoSrfLandedNotableCraters_00 = Il Controllo Missione è entusiasta perché questo ha un nome. L'equipaggio è entusiasta perché c'è ombra.
        #JNSQscience_crewReport_MohoSrfLandedNotableCraters_01 = Metti la bandiera dove la vista è più drammatica e fingi che il caldo non esista per ben cinque secondi.
        #JNSQscience_crewReport_MohoSrfLandedPeaks_00 = Le cime spuntano come denti pronti a mordere. Decidi che scalare è scienza facoltativa.
        #JNSQscience_crewReport_MohoSrfLandedPeaks_01 = Quassù la luce del sole è implacabile e le ombre sono affilate come coltelli. L'equipaggio concorda di ammirare la vista da dentro.
        #JNSQscience_crewReport_EveSrfLandedKrakensWell_00 = Il terreno sprofonda in un buco scuro lì vicino. Prendi nota di tenere il rover al guinzaglio corto.
        #JNSQscience_crewReport_EveSrfLandedKrakensWell_01 = La radio crepita di statica ogni volta che ti rivolgi verso il Pozzo. Fingi di non notarlo e continui a scrivere.
        #JNSQscience_crewReport_EveSrfSplashedPolarLakes_00 = Il lago è più calmo dei mari aperti, ma la capsula sembra comunque essere scossa dolcemente.
        #JNSQscience_crewReport_EveSrfSplashedPolarLakes_01 = Continui ad aspettarti ghiaccio vicino ai poli. Il termometro continua a dimostrarti il contrario.
        #JNSQscience_crewReport_EveSrfSplashedPetrolLakes_00 = Qualcuno propone di imbottigliare un campione. La proposta muore al primo sentore.
        #JNSQscience_crewReport_EveSrfSplashedSeaofAkron_00 = Il mare di Akron lambisce la fusoliera con un'onda pigra. Tu cadi lo stesso.
        #JNSQscience_crewReport_EveSrfSplashedSeaofAkron_01 = Anche con i filtri in funzione, in cabina torna quell'sentore acre di solvente.
        #JNSQscience_crewReport_EveSrfSplashedSeaofNessus_00 = Il mare di Nessus circonda la capsula con un viola infinito. Il piano di rientro all'improvviso sembra teorico.
        #JNSQscience_crewReport_EveSrfSplashedSeaofNessus_01 = Si propone una rapida prova d'assaggio e viene immediatamente bocciata da chiunque ami respirare.
        #JNSQscience_crewReport_EveSrfSplashedSeaofTaniwha_00 = Il mare di Taniwha sembra liscio, ma la superficie pare aggrapparsi allo scafo.
        #JNSQscience_crewReport_EveSrfSplashedSeaofTaniwha_01 = Guardi bolle salire e scoppiare, e decidi di tenere il portello sigillato per sempre.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGigan_00 = Il mare di Gigan muove lente, pesanti onde sotto l'aria schiacciante.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGigan_01 = Ogni spruzzo suona sbagliato, come se l'oceano fosse fatto di qualcosa di più denso dell'acqua.
        #JNSQscience_crewReport_EveSrfSplashedSeaofRodan_00 = Arriva una piccola onda. Con la gravità di Eve, vale come programma di allenamento.
        #JNSQscience_crewReport_EveSrfSplashedSeaofRodan_01 = La vista è bella in quel modo da "per favore non dissolveteci".
        #JNSQscience_crewReport_EveSrfSplashedSeaofGojira_00 = Il mare di Gojira è abbastanza silenzioso da farti sentire lo scafo scricchiolare.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGojira_01 = Il liquido viola lascia piccole perle sul finestrino, come se non volesse mollare la presa.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGhidorah_00 = Noti più correnti che si incontrano e decidi che il mare ha troppe opinioni.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGhidorah_01 = Qualcosa picchietta la capsula. Probabilmente sono solo detriti. Probabilmente.
        #JNSQscience_crewReport_EveSrfSplashedSeaofBagorah_00 = Il mare di Bagorah odora vagamente di diluente e cattive decisioni.
        #JNSQscience_crewReport_EveSrfSplashedSeaofBagorah_01 = Provi ad alzarti, fallisci, e registri l'esperimento come "yoga ad alta gravità".
        #JNSQscience_crewReport_EveFlyingLowPolarLakes_00 = Da bassa quota il lago sembra un livido nel paesaggio, perfettamente immobile nell'aria densa.
        #JNSQscience_crewReport_EveFlyingLowPolarLakes_01 = Ti chiedi perché non si chiami mare, poi ricordi che i mari di solito non stanno dentro le pareti di un cratere.
        #JNSQscience_crewReport_EveFlyingLowPetrolLakes_00 = Increspature si allargano al rallentatore sul lago, come se l'aria fosse sciroppo.
        #JNSQscience_crewReport_EveFlyingLowPetrolLakes_01 = Cerchi di non immaginare un ammaraggio in quella roba. Il briefing sulla sicurezza, all'improvviso, sembra troppo breve.
        #JNSQscience_crewReport_EveFlyingLowSeaofAkron_00 = Il mare viola luccica sotto la foschia. Tieni una mano sul pulsante di abort.
        #JNSQscience_crewReport_EveFlyingLowSeaofAkron_01 = Il finestrino è caldo al tatto, e non sai se sia colpa dell'aria o dei nervi.
        #JNSQscience_crewReport_EveFlyingLowSeaofNessus_00 = Una chiazza di increspature striscia sulla superficie, lenta come melassa.
        #JNSQscience_crewReport_EveFlyingLowSeaofNessus_01 = Cerchi di non immaginare un atterraggio a motori spenti qui. La tua immaginazione ti ignora.
        #JNSQscience_crewReport_EveFlyingLowSeaofTaniwha_00 = L'aria spessa smorza le onde fino a farle sembrare rughe gentili.
        #JNSQscience_crewReport_EveFlyingLowSeaofTaniwha_01 = Qualcosa di scuro si muove sotto la superficie. Controllo Missione dice che probabilmente non è nulla.
        #JNSQscience_crewReport_EveFlyingLowSeaofGigan_00 = Il mare riflette luce viola nella cabina, tingendo i volti di tutti.
        #JNSQscience_crewReport_EveFlyingLowSeaofGigan_01 = La quota "sembra sbagliata" in quest'atmosfera, come se Eve stesse spostando gli strumenti apposta.
        #JNSQscience_crewReport_EveFlyingLowSeaofRodan_00 = L'atmosfera è così densa che il mare sembra imbottito, come se non riuscisse a decidere se spruzzare.
        #JNSQscience_crewReport_EveFlyingLowSeaofRodan_01 = Inizi a progettare un dispositivo di galleggiamento fatto interamente di ottimismo.
        #JNSQscience_crewReport_EveFlyingLowSeaofGojira_00 = La superficie scintilla come metallo lucidato, e questo pensiero ti mette a disagio.
        #JNSQscience_crewReport_EveFlyingLowSeaofGojira_01 = Ricontrolli la temperatura dello scafo. Ancora troppo calda. Ancora tutto bene. Probabilmente.
        #JNSQscience_crewReport_EveFlyingLowSeaofGhidorah_00 = Più scie di increspature si incrociano, come se il mare avesse bande di traffico.
        #JNSQscience_crewReport_EveFlyingLowSeaofGhidorah_01 = Continui a cercare un sito d'atterraggio e continui a trovare altro mare.
        #JNSQscience_crewReport_EveFlyingLowSeaofBagorah_00 = La foschia trasforma l'orizzonte in una sbavatura viola. Volo strumentale e superstizione.
        #JNSQscience_crewReport_EveFlyingLowSeaofBagorah_01 = Il mare sotto sembra "desideroso". Decidi di non verificare la teoria.
        #JNSQscience_crewReport_EveFlyingLowKrakensWell_00 = Il Pozzo sembra un morso dato al pianeta, inghiottendo foschia e sicurezza.
        #JNSQscience_crewReport_EveFlyingLowKrakensWell_01 = Gli strumenti sfarfallano mentre passi sopra l'apertura. Qualcuno dice "Kraken" e tutti diventano molto professionali.
        #JNSQscience_crewReport_KerbinSrfLandedLowlands_00 = Dal finestrino i bassopiani sembrano morbidi e accoglienti. Controllo Missione ti ricorda che le gambe d'atterraggio non sono d'accordo.
        #JNSQscience_crewReport_KerbinSrfLandedLowlands_01 = Qualcuno propone un picnic. Qualcun altro indica i guanti della tuta e ride.
        #JNSQscience_crewReport_KerbinSrfLandedAridLowlands_00 = Immagini quanto farebbe caldo se la capsula non avesse l'aria condizionata.
        #JNSQscience_crewReport_KerbinSrfLandedAridLowlands_01 = L'equipaggio fissa i bassopiani aridi e decide all'unanimità di avere sete.
        #JNSQscience_crewReport_KerbinSrfLandedAridMountains_00 = Le montagne aride sembrano abbastanza appuntite da bucare la capsula. Stringi ogni cinghia a portata di mano.
        #JNSQscience_crewReport_KerbinSrfLandedAridMountains_01 = L'equipaggio discute se le rocce possano offendersi. Le rocce fuori restano silenziose e giudicanti.
        #JNSQscience_crewReport_KerbinSrfLandedWelcomeBackIsland_00 = Scorgi l'Isola del Ritorno all'orizzonte e senti subito come se qualcuno stesse valutando la tua tecnica d'atterraggio.
        #JNSQscience_crewReport_KerbinSrfLandedWelcomeBackIsland_01 = L'equipaggio scrive BENTORNATI sul finestrino appannato, poi ricorda che è ancora su Kerbin.
        #JNSQscience_crewReport_KerbinSrfSplashedGreatLake_00 = Ammaraggio nel grande lago. Ti proclami Capitano della Marina del Grande Lago.
        #JNSQscience_crewReport_KerbinSrfSplashedGreatLake_01 = Speri che il portello non si rompa e allaghi il pod. Il grande lago sembra molto desideroso.
        #JNSQscience_crewReport_KerbinSrfSplashedInlandWater_00 = La capsula dondola nelle acque interne come un giocattolo da bagno molto costoso.
        #JNSQscience_crewReport_KerbinSrfSplashedInlandWater_01 = Qualcuno ammette di non saper nuotare. Tutti concordano che questa informazione sarebbe dovuta arrivare prima.
        #JNSQscience_crewReport_KerbinSrfSplashedKreenwichSea_00 = Arr ciurma! Ammaraggio nel mare di Kreenwich. Il Controllo Missione ti chiede di smetterla di parlare così.
        #JNSQscience_crewReport_KerbinSrfSplashedKreenwichSea_01 = Guardi il mare di Kreenwich e ti chiedi quanti snack potresti pescare con un sacchetto campioni.
        #JNSQscience_crewReport_KerbinSrfSplashedArcticSea_00 = Il mare artico è così freddo che tutti concordano di tenere il portello chiuso.
        #JNSQscience_crewReport_KerbinSrfSplashedArcticSea_01 = Tocchi il finestrino e decidi che l'acqua sembra il tipo che potrebbe toccare indietro.
        #JNSQscience_crewReport_KerbinSrfSplashedForemansSea_00 = Ammaraggio nel mare di Foreman. Ti offri volontario perché qualcun altro vada a controllare eventuali perdite.
        #JNSQscience_crewReport_KerbinSrfSplashedForemansSea_01 = Conti le onde finché non ricordi che dovresti contare le checklist.
        #JNSQscience_crewReport_KerbinSrfSplashedTriangulusSea_00 = Provi a disegnare un triangolo sugli spruzzi. Il mare del Triangolo rifiuta di stare fermo.
        #JNSQscience_crewReport_KerbinSrfSplashedTriangulusSea_01 = Una piccola creatura urta la capsula. Decidi che si chiama Squishy ed è amichevole.
        #JNSQscience_crewReport_KerbinSrfSplashedNorthernSea_00 = Il mare settentrionale culla la capsula dolcemente. "Dolcemente" diventa meno dolcemente.
        #JNSQscience_crewReport_KerbinSrfSplashedNorthernSea_01 = Qui non devi preoccuparti dei pirati. Probabilmente.
        #JNSQscience_crewReport_KerbinSrfSplashedSub-ArcticSea_00 = Nel mare sub-artico prendi in considerazione di inventare una zattera riscaldata. Per la scienza.
        #JNSQscience_crewReport_KerbinSrfSplashedSub-ArcticSea_01 = L'equipaggio prova movimenti di nuoto d'emergenza. Sono tutti ancora allacciati.
        #JNSQscience_crewReport_KerbinSrfSplashedEasternSea_00 = Il mare orientale sembra pacifico da dentro la capsula. La capsula è anche molto sigillata.
        #JNSQscience_crewReport_KerbinSrfSplashedEasternSea_01 = Ascolti l'acqua sferzare lo scafo e fai finta che sia applauso.
        #JNSQscience_crewReport_KerbinSrfSplashedWesternSea_00 = Ammaraggio nel mare occidentale. Annunci un nuovo programma snack basato sulla longitudine.
        #JNSQscience_crewReport_KerbinSrfSplashedWesternSea_01 = Ti chiedi se la capsula conti come barca. La capsula non risponde.
        #JNSQscience_crewReport_KerbinFlyingLowLowlands_00 = I bassopiani si estendono come una pista di atterraggio senza fine. Allettante.
        #JNSQscience_crewReport_KerbinFlyingLowLowlands_01 = Qualcosa continua a picchiettare sul finestrino. Decidi che è solo vento e decisamente non un uccello.
        #JNSQscience_crewReport_KerbinFlyingLowAridLowlands_00 = Il calore che sale dai bassopiani aridi fa tremolare il suolo come un ologramma venuto male.
        #JNSQscience_crewReport_KerbinFlyingLowAridLowlands_01 = In previsione del caldo, accendi l'aria condizionata e fingi che serva a qualcosa.
        #JNSQscience_crewReport_KerbinFlyingLowAridMountains_00 = Hai un brutto presentimento sulle montagne aride e frastagliate là sotto.
        #JNSQscience_crewReport_KerbinFlyingLowAridMountains_01 = Schiantarsi qui non sarebbe una buona idea. Smetti di pensarci. Più o meno.
        #JNSQscience_crewReport_KerbinFlyingLowGreatLake_00 = Stai volando così basso sopra GreatLake che noti le increspature causate dal tuo velivolo.
        #JNSQscience_crewReport_KerbinFlyingLowGreatLake_01 = L'acqua sembra tranquilla da quassù. Ti chiedi se sia potabile, poi ricordi che sei in una capsula.
        #JNSQscience_crewReport_KerbinFlyingLowInlandWater_00 = Da questa prospettiva riesci a vedere la topologia subacquea nelle acque interne.
        #JNSQscience_crewReport_KerbinFlyingLowInlandWater_01 = Vedi uno spruzzo d'acqua sollevato dall'aria che si scansa al tuo passaggio.
        #JNSQscience_crewReport_KerbinFlyingLowKreenwichSea_00 = Il mare di Krenwich scintilla sotto di te. Qualcuno prova a far rotta seguendolo. Non è così che funziona.
        #JNSQscience_crewReport_KerbinFlyingLowKreenwichSea_01 = Immagini tutte le meravigliose creature che vivono sotto le onde, e smetti immediatamente di immaginarle.
        #JNSQscience_crewReport_KerbinFlyingLowArcticSea_00 = Sopra il mare artico, l'acqua sembra sul punto di gelare solo per dispetto.
        #JNSQscience_crewReport_KerbinFlyingLowArcticSea_01 = Volo abbastanza basso da vedere i disturbi sulla superficie causati dal tuo velivolo, e la condensa sul finestrino per via del tuo respiro.
        #JNSQscience_crewReport_KerbinFlyingLowForemansSea_00 = Il mare di Foreman rotola sotto di te come una mappa in movimento. La mappa vince.
        #JNSQscience_crewReport_KerbinFlyingLowForemansSea_01 = Vedi uno spruzzo d'acqua dalla tua scia e decidi di aver inventato il meteo oceanico.
        #JNSQscience_crewReport_KerbinFlyingLowTriangulusSea_00 = Sopra il mare del Triangolo, provi a individuare tre punti che si allineano. Ti distrai non schiantandoti.
        #JNSQscience_crewReport_KerbinFlyingLowTriangulusSea_01 = L'acqua sotto sembra calma. Sai bene che non c'è da fidarsi.
        #JNSQscience_crewReport_KerbinFlyingLowNorthernSea_00 = Il mare settentrionale sembra freddo e molto, molto bagnato.
        #JNSQscience_crewReport_KerbinFlyingLowNorthernSea_01 = Da quassù le onde sembrano minuscole. Ti ricordi che anche la capsula è minuscola.
        #JNSQscience_crewReport_KerbinFlyingLowSub-ArcticSea_00 = Volo basso sopra il mare sub-artico e senti la temperatura della cabina scendere per empatia.
        #JNSQscience_crewReport_KerbinFlyingLowSub-ArcticSea_01 = L'acqua sotto è di una bella tonalità di "no".
        #JNSQscience_crewReport_KerbinFlyingLowEasternSea_00 = Il mare orientale si estende fino all'orizzonte. Ti chiedi quanto ci vorrebbe a rimbalzare la capsula come un sasso.
        #JNSQscience_crewReport_KerbinFlyingLowEasternSea_01 = L'equipaggio parla di pesca. Il Controllo Missione vi ricorda che questo è un veicolo spaziale.
        #JNSQscience_crewReport_KerbinFlyingLowWesternSea_00 = Il mare occidentale sembra pacifico. Gli strumenti non sono d'accordo e lo chiamano un pericolo aerodinamico.
        #JNSQscience_crewReport_KerbinFlyingLowWesternSea_01 = Guardi il sole scintillare sull'acqua e quasi ti dimentichi che dovresti riportare qualcosa.
        #JNSQscience_crewReport_KerbinFlyingLowWelcomeBackIsland_00 = L'Isola del Ritorno entra in vista e l'equipaggio inizia a salutare nessuno in particolare.
        #JNSQscience_crewReport_KerbinFlyingLowWelcomeBackIsland_01 = Volo abbastanza basso da leggere il nome sulla mappa e all'improvviso ti senti giudicato dalla geografia.
        #JNSQscience_crewReport_MunSrfLandedPolarIceCraters_00 = Segni la situazione come "potenzialmente ghiacciata" nel rapporto, soprattutto per vedere se così ti approvano una granitiera la prossima volta.
        #JNSQscience_crewReport_MunSrfLandedMountains_00 = Provi a descrivere le montagne frastagliate con un tono calmo e professionale. Ne esce: "appuntite, appuntite, molto appuntite".
        #JNSQscience_crewReport_MunSrfLandedMountains_01 = Il Controllo Missione chiede un aggiornamento di stato. Rispondi "Nominale". Poi aggiungi, piano: "E anche: montagne. Un sacco di montagne".
        #JNSQscience_crewReport_MinmusSrfLandedBrownBasins_00 = Il fondo del bacino è macchiato di un colore più scuro, come se qualcuno avesse provato a "migliorare" Minmus col sciroppo. Il Controllo Missione insiste che sia geologia.
        #JNSQscience_crewReport_MinmusSrfLandedBrownBasins_01 = Le chiazze scure fanno sembrare il paesaggio meno un dessert e più guai. Prendi appunti comunque, nel caso sia entrambe le cose.
        #JNSQscience_crewReport_MinmusSrfLandedBrownLowlands_00 = I bassopiani marroni qui sono scuri e lisci, con polvere che si attacca a tutto. Persino la checklist sembra un po' più sporca.
        #JNSQscience_crewReport_MinmusSrfLandedBrownLowlands_01 = Il terreno ha una tinta marroncina e smorza l'illusione di menta. Ti senti stranamente deluso, poi sollevato.
        #JNSQscience_crewReport_MinmusSrfLandedBrownMidlands_00 = Le pianure marroni sono più scure e leggermente più ruvide del previsto. L'orizzonte ondeggia di creste come onde congelate.
        #JNSQscience_crewReport_MinmusSrfLandedBrownMidlands_01 = Fuori è "quasi tutto piatto" finché non provi a guidarci sopra. Annota che Minmus è bravo a mentire con sicurezza.
        #JNSQscience_crewReport_MinmusSrfLandedBrownHighlands_00 = Le colline marroni sono brune e dall'aria croccante, come biscotti alla menta troppo cotti. Non ti offri volontario per un assaggio.
        #JNSQscience_crewReport_MinmusSrfLandedBrownHighlands_01 = Da quassù, le distese sembrano enormi piatti apparecchiati per un picnic. Il suolo più scuro rende le ombre ancora più taglienti.
        #JNSQscience_crewReport_EdnaSrfLandedLowlands_00 = Le luci d'atterraggio tagliano i bassopiani di Edna e tornano a mani vuote, come se il terreno stesse cercando di non farsi vedere.
        #JNSQscience_crewReport_EdnaSrfLandedLowlands_01 = Compili un rapporto descrivendo un terreno "piatto", poi aggiungi una nota: anche le parti piatte sembrano tramare qualcosa.
        #JNSQscience_crewReport_EdnaSrfLandedMidlands_00 = La cabina è stranamente silenziosa, come se Edna assorbisse ogni suono e lo conservasse per dopo.
        #JNSQscience_crewReport_EdnaSrfLandedMidlands_01 = Guardi la polvere depositarsi al rallentatore e per un attimo valuti di fatturarla come "esperimento geologico a durata estesa".
        #JNSQscience_crewReport_EdnaSrfLandedHighlands_00 = Le alture incombono nel finestrino come denti seghettati: ricontrolli che i freni esistano ancora in bassa gravità.
        #JNSQscience_crewReport_EdnaSrfLandedHighlands_01 = Registro missione: il terreno fuori è tagliente, scuro e completamente disinteressato a essere amichevole.
        #JNSQscience_crewReport_EdnaSrfLandedPolarIceCraters_00 = Punta il termometro verso il cratere in ombra più vicino e ti penti subito di aver imparato numeri così piccoli.
        #JNSQscience_crewReport_EdnaSrfLandedPolarIceCraters_01 = La vista è tutta brina e buio: scrivi "freddo, silenzioso, sospetto" e sottolinei l'ultima parola.
        #JNSQscience_crewReport_EdnaSrfLandedWhites_00 = Le chiazze luminose fuori ti abbagliano come se qualcuno avesse rovesciato vernice su un mondo che ha dimenticato cos'è un colore.
        #JNSQscience_crewReport_EdnaSrfLandedWhites_01 = Noti lo strano terreno pallido e ti chiedi se Edna stia provando un travestimento, malamente.
        #JNSQscience_crewReport_EdnaInSpaceLow_00 = In orbita bassa, Edna sembra un livido fioco contro le stelle, e gli strumenti insistono che sia comunque un pianeta intero.
        #JNSQscience_crewReport_EdnaInSpaceLow_01 = Vedi la superficie entrare e uscire dall'ombra come se stesse facendo pratica per un'occultazione.
        #JNSQscience_crewReport_EdnaInSpaceHigh_00 = Da un'orbita alta, Edna è un puntino solitario con un notevole talento nel confondersi nel vuoto.
        #JNSQscience_crewReport_EdnaInSpaceHigh_01 = Registri che Edna appare calma, scura e molto lontana dalla lista dei problemi di chiunque. Tranne che dalla tua.
        #JNSQscience_crewReport_DakSrfLandedLowlands_00 = Confermi che le "lowlands" di Dak sono soprattutto "dove hai smesso di fluttuare". Il suolo sembra ancora opzionale.
        #JNSQscience_crewReport_DakSrfLandedLowlands_01 = La superficie sembra una patata malconcia che si è dimenticata di essere una luna. Ti senti stranamente invitato a restare.
        #JNSQscience_crewReport_DakSrfLandedMidlands_00 = Provi a camminare in linea retta. Dak non è d'accordo e ruota il tuo piano missione di qualche grado.
        #JNSQscience_crewReport_DakSrfLandedMidlands_01 = Il terreno scorre al rallentatore mentre fai saltelli. Archivi un rapporto sotto "gravità: educatamente assente".
        #JNSQscience_crewReport_DakSrfLandedHighlands_00 = Da quassù, l'orizzonte è tutto stelle e macerie. La "chiamata della sirena" di Dak potrebbe essere solo la tua radio che rimbalza sulle rocce.
        #JNSQscience_crewReport_DakSrfLandedHighlands_01 = Le alture sono affilate, fredde e silenziose. Continui a controllare il terreno per assicurarti che sia ancora attaccato.
        #JNSQscience_crewReport_DakInSpaceLow_00 = Orbitare questa piccola patata è come scortare uno snack in fuga. Fai piccole correzioni e prometti di smetterla di scherzarci sopra.
        #JNSQscience_crewReport_DakInSpaceLow_01 = Dak ruota pigramente sotto di te, tutto speroni e ombre. Non riesci a scrollarti di dosso la sensazione che stia osservando la nave a sua volta.
        #JNSQscience_crewReport_DakInSpaceHigh_00 = Da molto in alto, Dak è un puntino con un atteggiamento. I tuoi strumenti dicono "asteroide", la tua immaginazione dice "trappola".
        #JNSQscience_crewReport_DakInSpaceHigh_01 = La vista è perlopiù vuoto, con Dak che tiene il centro come se possedesse il nulla. Registri: "avvicinarsi con cautela, e snack".
        #JNSQscience_crewReport_DresSrfLandedPoles_00 = Le ombre qui sembrano permanenti. Per un attimo valuti di lasciare una torcia accesa solo per principio.
        #JNSQscience_crewReport_DresSrfLandedPoles_01 = La brina avanza lungo la guarnizione del finestrino e i tuoi snack diventano sospettosamente croccanti. La scienza dice "freddo". I tuoi denti concordano.
        #JNSQscience_crewReport_DresSrfLandedMidlands_00 = Niente è piatto, niente è ripido, e tutto sembra levigato dalla noia. È stranamente pacifico.
        #JNSQscience_crewReport_DresSrfLandedMidlands_01 = Provi a descrivere il panorama, ma il rapporto continua a trasformarsi in un elenco di grigi. Mission Control chiede "più aggettivi".
        #JNSQscience_crewReport_DresSrfLandedLowlands_00 = Il terreno sembra essere stato delicatamente compattato da un universo molto paziente. Fa comunque crunch quando ci cammini sopra.
        #JNSQscience_crewReport_DresSrfLandedLowlands_01 = La polvere si alza in sbuffi pigri attorno al carrello. Giureresti che impiega più tempo a posarsi di quanto te ne serva per pentirti di essere atterrato qui.
        #JNSQscience_crewReport_JoolFlyingLowEquatorialBands_00 = La nave continua a essere spinta di lato mentre attraversiamo bande di getto invisibili. Le bande non sono solo colori: sono muri d'aria in movimento.
        #JNSQscience_crewReport_JoolFlyingLowEquatorialBands_01 = Ogni volta che scendiamo in una striscia più scura, la turbolenza aumenta e la pressione sale lentamente. L'atmosfera è a strati come una torta molto arrabbiata.
        #JNSQscience_crewReport_JoolFlyingLowSubpolarBands_00 = Qui l'aria sembra più pesante e più fredda, e il movimento è fatto di ampie, lente rollate invece che di scossoni secchi. Come se il pianeta mescolasse una pentola con un cucchiaio grande quanto un continente.
        #JNSQscience_crewReport_JoolFlyingLowSubpolarBands_01 = Stiamo sfiorando sotto l'alta foschia e le nubi sono stirate in lunghi archi. Qualcosa lassù sta pilotando tutto quaggiù.
        #JNSQscience_crewReport_JoolFlyingLowNorthPole_00 = L'orizzonte è solo spirale su spirale. Tutto il cielo sembra stia cercando di scolare in un unico punto.
        #JNSQscience_crewReport_JoolFlyingLowNorthPole_01 = Il moto qui è stranamente costante: rotazione stabile, taglio stabile, finché all'improvviso non lo è più. Consigliamo di non scoprire dove finisce il "finché".
        #JNSQscience_crewReport_JoolFlyingLowSouthPole_00 = Questo polo ha un atteggiamento diverso: vortici stretti, raffiche brusche e una trazione persistente verso il centro del disegno di tempesta.
        #JNSQscience_crewReport_JoolFlyingLowSouthPole_01 = La visibilità va e viene in fogli di nube. Sembra di volare attraverso tende rotanti che non vogliono aprirsi.
        #JNSQscience_crewReport_JoolFlyingLowStormComplex_00 = Le correnti ascensionali colpiscono il veicolo come un pugno e poi provano a portarci via. Siamo entrati nella parte "perché" del piano di volo.
        #JNSQscience_crewReport_JoolFlyingLowStormComplex_01 = Lampi guizzano dentro le torri di nube e la turbolenza è ritmica, come se la tempesta respirasse. Preferiremmo che smettesse.
        #JNSQscience_crewReport_JoolFlyingLowExposedLowerDeck_00 = Qui la foschia superiore si assottiglia e si vede giù in strati più scuri. L'aria diventa densa in fretta, come se fossimo scivolati tra un ponte e l'altro.
        #JNSQscience_crewReport_JoolFlyingLowExposedLowerDeck_01 = Le nubi sono spezzate in varchi che rivelano una circolazione più profonda sotto. È inquietante realizzare che il "suolo" è solo altra atmosfera in attesa.
        #JNSQscience_crewReport_LaytheSrfLandedShallows_00 = Il livbello dell'acqua è scomodamente vicino al portello. Tutti concordano di smetterla di dondolare la capsula "solo per vedere che succede".
        #JNSQscience_crewReport_LaytheSrfLandedShallows_01 = Il fondale è visibile attraverso l'acqua limpida. Prendi appunti e speri in silenzio che resti così.
        #JNSQscience_crewReport_LaytheSrfLandedHighlands_00 = Da quassù i mari sembrano quasi invitanti, finché non ti ricordi attorno a cosa stanno orbitando. Registri la vista e ricontrolli i freni.
        #JNSQscience_crewReport_LaytheSrfLandedHighlands_01 = Il terreno precipita in lunghi pendii e creste affilate. L'equipaggio vota per tenere tutte le porte chiuse fino a nuovo ordine.
        #JNSQscience_crewReport_LaytheSrfLandedMountains_00 = Il sito d'atterraggio è soprattutto roccia, scogliera e rimpianto. Registri che l'orizzonte è spettacolare e il margine d'errore no.
        #JNSQscience_crewReport_LaytheSrfLandedMountains_01 = Le montagne gettano ombre lunghe e l'aria sembra sottile attraverso le prese della cabina. Qualcuno propone di piantare una bandiera: qualcun altro propone di non cadere prima.
        #JNSQscience_crewReport_LaytheSrfLandedIceCaps_00 = Il mondo fuori è abbastanza luminoso da farti strizzare gli occhi dietro il vetro. Noti il ghiaccio e ti chiedi perché i mari vicini siano ancora liquidi.
        #JNSQscience_crewReport_LaytheSrfLandedIceCaps_01 = Tutto sembra pulito, freddo e molto permanente. L'equipaggio inizia a pianificare una base e finisce subito lo spazio per gli snack.
        #JNSQscience_crewReport_LaytheSrfLandedEnclosedFaults_00 = Il terreno è una ragnatela di crepe e pareti ripide, come se la superficie avesse provato a ripiegarsi. Registri possibile stress mareale e tieni le luci di cabina accese.
        #JNSQscience_crewReport_LaytheSrfLandedEnclosedFaults_01 = Le ombre si raccolgono nelle fessure e il paesaggio sembra incompiuto. L'equipaggio concorda che "interessante" non è la stessa cosa di "sicuro".
        #JNSQscience_crewReport_LaytheSrfLandedLowlands_00 = La terra è ampia e piatta, con foschia umida che si aggrappa al suolo. Riporti che è un ottimo posto per atterrare e un pessimo posto per restare bloccati.
        #JNSQscience_crewReport_LaytheSrfLandedLowlands_01 = Tutto fuori sembra abbastanza morbido da inghiottire i piedi d'atterraggio. Ti annoti di non testare questa ipotesi.
        #JNSQscience_crewReport_LaytheSrfLandedMidlands_00 = Terreno ondulato si estende in ogni direzione, né alto né basso abbastanza da sentirsi sicuri. L'equipaggio discute se questo conti come "modalità facile".
        #JNSQscience_crewReport_LaytheSrfLandedMidlands_01 = Un mosaico di terra e acqua suggerisce meteo variabile lì vicino. Registri le condizioni e tieni d'occhio le nubi.
        #JNSQscience_crewReport_LaytheSrfSplashedShores_00 = La terra è proprio lì, abbastanza vicina da indicarla e abbastanza lontana da essere inutile. Archivi un rapporto intitolato "Per favore inviate barca".
        #JNSQscience_crewReport_LaytheSrfSplashedShores_01 = Le onde sferzano lo scafo con entusiasmo sorprendente. L'equipaggio inizia a cronometrare il dondolio e a far finta che sia scienza.
        #JNSQscience_crewReport_LaytheSrfSplashedShallows_00 = L'acqua è abbastanza bassa da far urtare ogni tanto qualcosa di solido. Registri la profondità come "troppo bassa per stare tranquilli".
        #JNSQscience_crewReport_LaytheSrfSplashedShallows_01 = Si vede il fondo e ha un aspetto allarmantemente graffiante. All'improvviso a tutti importa molto della qualità della vernice dello scafo.
        #JNSQscience_crewReport_LaytheSrfSplashedInlandWater_00 = Qui l'acqua è più calma, racchiusa dalla terra intorno. Registri l'immobilità e l'sentore insolito che filtra attraverso il sistema d'aria.
        #JNSQscience_crewReport_LaytheSrfSplashedInlandWater_01 = Le increspature si allargano in cerchi ordinati dalla capsula. L'equipaggio le guarda molto più del necessario.
        #JNSQscience_crewReport_LaytheSrfSplashedKrenwichSea_00 = La superficie è irrequieta e più scura del previsto, con creste bianche lontane che si formano in linee. Riporti che "nuotare" sarebbe una carriera breve.
        #JNSQscience_crewReport_LaytheSrfSplashedKrenwichSea_01 = L'umidità in cabina sale mentre gli spruzzi rivestono i finestrini. Registri le condizioni e aggiungi "asciugamani extra" al piano della prossima missione.
        #JNSQscience_crewReport_LaytheSrfSplashedArcticSea_00 = L'acqua è dolorosamente fredda, e l'aria sopra sembra più tagliente del resto della luna. Registri avvisi termici e tieni tutti i riscaldatori accesi.
        #JNSQscience_crewReport_LaytheSrfSplashedArcticSea_01 = Una sottile fanghiglia scorre accanto alla capsula come se fosse a casa sua. L'equipaggio concorda di non testare se sia commestibile.
        #JNSQscience_crewReport_LaytheSrfSplashedJoolwardSea_00 = Il gigante verde domina il cielo e l'acqua riflette il suo colore in modi inquietanti. Riporti che la vista è bellissima e moderatamente minacciosa.
        #JNSQscience_crewReport_LaytheSrfSplashedJoolwardSea_01 = Le onde rotolano sotto un cielo che non ti lascia mai dimenticare dove sei. Registri un forte impulso a puntare l'antenna lontano da "quella direzione".
        #JNSQscience_crewReport_LaytheSrfSplashedPolwardSea_00 = Il moto ondoso spinto dal vento scuote la capsula, e l'aria sa di più freddo attraverso i filtri. Registri che i mari polari non sono dell'umore giusto per accogliere.
        #JNSQscience_crewReport_LaytheSrfSplashedPolwardSea_01 = L'orizzonte è un mix di acqua e terreno pallido, sfocato dalla foschia. L'equipaggio presenta una lamentela unanime contro il "freddo bagnato".
        #JNSQscience_crewReport_LaytheSrfSplashedEnclosedFaults_00 = Sembra che siamo ammarati dentro un bacino fratturato, con pareti ripide tutt'intorno. Riporti che le opzioni di recupero sono "creative, nel migliore dei casi".
        #JNSQscience_crewReport_LaytheSrfSplashedEnclosedFaults_01 = L'acqua lambisce la roccia frastagliata come se stesse cercando di allargare le crepe. Registri la scena e decidi di restare ben sigillato.
        #JNSQscience_crewReport_LaytheFlyingLowShallows_00 = La luce del sole lampeggia sull'acqua in ampie lame abbaglianti, e quasi riesci a distinguere il fondo. Riporti visibilità eccellente e pessime idee di atterraggio.
        #JNSQscience_crewReport_LaytheFlyingLowShallows_01 = L'aria è umida e liscia, con qualche sobbalzo dovuto a sacche calde che risalgono sopra le basse acque. Registri turbolenza lieve e tentazione decisamente meno lieve.
        #JNSQscience_crewReport_LaytheFlyingLowInlandWater_00 = Il lago sotto di te sta come uno specchio tra forme di terra più scure. Noti aria più calma e una sospetta sensazione di familiarità.
        #JNSQscience_crewReport_LaytheFlyingLowInlandWater_01 = L'aria umida appanna per un attimo i finestrini inferiori. Annota i tassi di condensazione e asciughi comunque il vetro.
        #JNSQscience_crewReport_LaytheFlyingLowKrenwichSea_00 = Lunghe file di onde scorrono sotto di te come se qualcuno le avesse disegnate con un righello. Riporti venti costanti e un futuro che sembra molto, molto bagnato.
        #JNSQscience_crewReport_LaytheFlyingLowKrenwichSea_01 = La salsedine resta sospesa nell'aria vicino alla superficie, rendendo l'orizzonte velato. L'equipaggio chiude le prese d'aria e lo chiama "raccolta dati".
        #JNSQscience_crewReport_LaytheFlyingLowArcticSea_00 = Nubi basse e foschia gelida sfumano il confine tra mare e cielo. Riporti visibilità ridotta e una maggiore stima per gli strumenti.
        #JNSQscience_crewReport_LaytheFlyingLowArcticSea_01 = L'aria sembra più fredda e più pesante, e i motori suonano un po' meno allegri. Annota le prestazioni e mantieni quota.
        #JNSQscience_crewReport_LaytheFlyingLowJoolwardSea_00 = Il cielo ha una lieve tinta verde e Jool incombe come un pubblico. Registri la vista e cerchi di ignorare il fatto che sembri guardarti indietro.
        #JNSQscience_crewReport_LaytheFlyingLowJoolwardSea_01 = L'atmosfera scintilla a strati sopra l'acqua aperta. Annota il wind shear e tieni entrambe le mani molto vicino ai comandi.
        #JNSQscience_crewReport_LaytheFlyingLowPolwardSea_00 = Il mare sotto di te è scuro e agitato, e l'aria è piena di raffiche taglienti. Riporti: "non aprire nessun portello, mai".
        #JNSQscience_crewReport_LaytheFlyingLowPolwardSea_01 = Updraft freddi spingono il velivolo con scortesia e sicurezza. Registri turbolenza e aggiungi altre cinghie alla checklist.
        #JNSQscience_crewReport_LaytheFlyingLowHighlands_00 = Le correnti ascensionali del terreno alto sollevano il velivolo all'improvviso. Riporti che l'aria di Laythe è divertente finché non prova a lanciarti via.
        #JNSQscience_crewReport_LaytheFlyingLowHighlands_01 = Il terreno sale verso di te in modo lento e teatrale. Annota la topografia e prometti di rispettarla.
        #JNSQscience_crewReport_LaytheFlyingLowMountains_00 = Il ridge lift diventa downdraft improvvisi senza preavviso. Riporti che le montagne stanno partecipando attivamente al volo.
        #JNSQscience_crewReport_LaytheFlyingLowMountains_01 = Picchi e valli sfrecciano sotto il muso. L'equipaggio concorda che il turismo può aspettare, dopo la sopravvivenza.
        #JNSQscience_crewReport_LaytheFlyingLowIceCaps_00 = Il ghiaccio sotto di te è così luminoso che la cabina sembra troppo illuminata. Riporti condizioni di abbagliamento e un forte desiderio di vetri oscurati.
        #JNSQscience_crewReport_LaytheFlyingLowEnclosedFaults_00 = La superficie è un mosaico di fratture, con trincee in ombra che tagliano il paesaggio. Riporti che navigare è facile e atterrare no.
        #JNSQscience_crewReport_LaytheFlyingLowEnclosedFaults_01 = Filamenti di foschia si aggrappano alle fratture come se stessero respirando. Registri l'osservazione ed eviti di speculare via radio.
        #JNSQscience_crewReport_LaytheFlyingLowLowlands_00 = La foschia abbraccia il suolo e sfuma il terreno in forme morbide. Riporti che le pianure sono bravissime a nascondere le cose, compresa l'altitudine.
        #JNSQscience_crewReport_LaytheFlyingLowLowlands_01 = L'aria è abbastanza umida da appannare gli strumenti se li fissi troppo a lungo. Annota le condizioni di cabina e fai controlli extra.
        #JNSQscience_crewReport_LaytheFlyingLowMidlands_00 = Nubi a chiazze scorrono mentre il terreno alterna dolci rilievi e bacini poco profondi. Riporti volo stabile con qualche sorpresa.
        #JNSQscience_crewReport_LaytheFlyingLowMidlands_01 = L'equipaggio si alterna al finestrino, cercando dall'alto un "punto di atterraggio perfetto". Registri zero discussioni risolte.
        #JNSQscience_crewReport_VallSrfLandedPoles_00 = Fuori dal finestrino non c'è altro che ghiaccio azzurro e ombre dure: all'improvviso ti manca il suono del vento.
        #JNSQscience_crewReport_VallSrfLandedPoles_01 = Jool resta basso sull'orizzonte come un cartello verde di avvertimento, mentre il terreno scricchiola piano sotto il lander.
        #JNSQscience_crewReport_VallSrfLandedMountains_00 = Le montagne qui sono abbastanza affilate da limare una gamba d'atterraggio, e inizi a dubitare di ogni "perfettamente sicuro" mai sentito.
        #JNSQscience_crewReport_VallSrfLandedMountains_01 = La bassa gravità rende le scogliere invitanti, finché non ricordi che cadere funziona ancora allo stesso modo.
        #JNSQscience_crewReport_TyloSrfLandedPoles_00 = Il riscaldatore di cabina scatta mentre osservi il suolo pallido dei poli. L'aria fuori sembra sottile, fredda e del tutto disinteressata a essere respirabile.
        #JNSQscience_crewReport_TyloSrfLandedMountains_00 = Le montagne sembrano abbastanza appuntite da bucare il cielo. Tutti restano ben legati, nel caso la pendenza decida di continuare.
        #JNSQscience_crewReport_TyloSrfLandedMidlands_00 = Crateri che sfumano in crateri fino all'orizzonte. Annota che il paesaggio è molto fedele al suo tema.
        #JNSQscience_crewReport_TyloFlyingLowPoles_00 = Radente sopra le calotte brillanti, il manometro a malapena si muove. Il velivolo però vibra come se stesse davvero attraversando qualcosa.
        #JNSQscience_crewReport_TyloFlyingLowMountains_00 = Il terreno si alza in fretta e gli allarmi ancora più in fretta. Ti chiedi per un attimo se le montagne stiano cercando di riprendersi il loro spazio aereo.
        #JNSQscience_crewReport_TyloFlyingLowHighlands_00 = Terreno ruvido sotto, corsa ruvida dentro. Quasi senti il vento discutere con le ali.
        #JNSQscience_crewReport_TyloFlyingLowMidlands_00 = Le alture centrali scorrono in strisce polverose sotto una lieve foschia. È quasi tranquillo, finché il prossimo sobbalzo non ti ricorda che non lo è.
        #JNSQscience_crewReport_TyloFlyingLowLowlands_00 = Bacini ampi e ombre lunghe fanno sembrare le pianure ingannevolmente gentili. Gli strumenti non sono d'accordo e continuano a urlare numeri.
        #JNSQscience_crewReport_TyloFlyingHigh_00 = Da quassù Tylo sembra una biglia pallida con un tenue bordo d'aria. Jool resta lì vicino come un enorme promemoria verde di chi comanda in questo quartiere.
        #JNSQscience_crewReport_PolSrfLandedMidlands_00 = Dal portello si vede un mosaico di pianori giallastri e rilievi tozzi. Scrivi "alture centrali" e aggiungi: "Tutto sembra così polveroso da scricchiolare."
        #JNSQscience_crewReport_PolSrfLandedMidlands_01 = La nave si assesta con un lieve scricchiolio. Fuori, il terreno sembra scolpito con briciole e poi abbandonato a metà.
        #JNSQscience_crewReport_PolSrfLandedMountains_00 = Le gambe d'atterraggio si aggrappano a una pendenza che pare personalmente offesa dal concetto di "in piano". Registri il terreno come "montuoso" e il battito come "anche lui montuoso".
        #JNSQscience_crewReport_PolSrfLandedMountains_01 = Creste frastagliate incorniciano l'orizzonte come sagome di carta strappata. Riporti che il panorama locale è drammatico, ostile e molto orgoglioso delle sue punte.
        #JNSQscience_crewReport_LindorFlyingHigh_00 = L'equipaggio socchiude gli occhi osservando le fasce sotto di voi e concorda che sembra che Lindor stia cercando di nascondersi in piena vista.
        #JNSQscience_crewReport_LindorFlyingHigh_01 = È tutto freddo, luminoso e stranamente calmo. Continui a controllare l'indicatore di quota come se fosse uno scherzo.
        #JNSQscience_crewReport_LindorInSpaceLow_00 = Dall'orbita, i disegni di Lindor sembrano dipinti con cura. L'equipaggio sospetta che ciò significhi che qualcosa stia per diventare molto meno ordinato.
        #JNSQscience_crewReport_LindorInSpaceLow_01 = La nave fluttua attraverso deboli crepitii d'interferenza. Qualcuno suggerisce che Lindor stia "pensando a voce alta".
        #JNSQscience_crewReport_LindorInSpaceHigh_00 = Lindor si riduce a un disco pallido dall'atteggiamento complicato. L'equipaggio riferisce di sentirsi molto piccolo e un po' giudicato.
        #JNSQscience_crewReport_LindorInSpaceHigh_01 = Molto più in alto, gli strumenti tacciono. L'equipaggio approfitta di questa rara pace per litigare sugli snack.
        #JNSQscience_crewReport_LindorFlyingLowTemperateBands_00 = La vista diventa una foschia a strati e strisce che cambiano. L'equipaggio la chiama "la mimetica più grande del mondo".
        #JNSQscience_crewReport_LindorFlyingLowTemperateBands_01 = La cabina trema piano mentre i venti si scambiano di posto. Qualcuno avvia un giro di scommesse su cosa contenga il pianeta: acqua o cioccolato.
        #JNSQscience_crewReport_LindorFlyingLowSubpolarBands_00 = L'aria fuori sembra più densa e più cattiva rispetto alle bande temperate. L'equipaggio vota di smettere di scendere "per la scienza".
        #JNSQscience_crewReport_LindorFlyingLowSubpolarBands_01 = Minuscoli cristalli picchiettano lo scafo come proteste in miniatura. L'equipaggio presenta una richiesta ufficiale per un pianeta più caldo.
        #JNSQscience_crewReport_LindorFlyingLowNorthPole_00 = L'orizzonte si contorce sotto una luce spettrale e la statica. L'equipaggio concorda che il polo sembra "elettricamente offeso".
        #JNSQscience_crewReport_LindorFlyingLowNorthPole_01 = La nave sussulta attraversando una foschia fitta e gelida. Il rapporto dell'equipaggio include la frase "mai più" due volte.
        #JNSQscience_crewReport_LindorFlyingLowSouthPole_00 = La visibilità cala in un gradiente torbido. L'equipaggio fissa gli strumenti come se stessero raccontando una storia dell'orrore.
        #JNSQscience_crewReport_LindorFlyingLowSouthPole_01 = Strani bagliori guizzano sui finestrini. Qualcuno chiede se Lindor stia provando a salutare o a dire "vattene".
        #JNSQscience_crewReport_LindorFlyingLowStormComplex_00 = Le formazioni temporalesche riempiono i finestrini con strati in movimento e scossoni improvvisi. Il rapporto dell'equipaggio è fatto quasi solo di effetti sonori.
        #JNSQscience_crewReport_LindorFlyingLowStormComplex_01 = La turbolenza trasforma la cabina in un barattolo di monete. L'equipaggio nota che "pressione estrema" non è solo un numero.
        #JNSQscience_crewReport_LindorFlyingLowUpperStormDeck_00 = Sfiori la cima delle nubi ribollenti, che sembrano morbide finché non prendono a pugni la nave. L'equipaggio cambia idea su "morbide".
        #JNSQscience_crewReport_LindorFlyingLowUpperStormDeck_01 = L'atmosfera ribolle in slow motion attorno a voi. L'equipaggio suggerisce di chiamare il fenomeno "Nope".
        #JNSQscience_crewReport_LindorFlyingLowExposedLowerDeck_00 = Gli strati inferiori scoperti sembrano più scuri e più pesanti, come se Lindor si fosse dimenticato di alleggerirsi. L'equipaggio raccomanda con forza di non incontrarli di persona.
        #JNSQscience_crewReport_LindorFlyingLowExposedLowerDeck_01 = La nave scricchiola come se stesse rivalutando le proprie scelte di carriera. L'equipaggio concorda che gli strati bassi sono "dove i piani vanno a morire".
        #JNSQscience_crewReport_KrelSrfLandedLowlands_00 = Il terreno sembra come se qualcuno avesse stirato Krel fino a renderla piatta. La nave si sente troppo elegante.
        #JNSQscience_crewReport_KrelSrfLandedLowlands_01 = Gli stivali affondano in una polvere chiara che scintilla nella luce debole. Fingi che sia polvere di stelle.
        #JNSQscience_crewReport_KrelSrfLandedMidlands_00 = Creste e scanalature tagliano l'orizzonte in segmenti ordinati. Il terreno sembra assemblato in fretta.
        #JNSQscience_crewReport_KrelSrfLandedMidlands_01 = Bande stratificate scorrono oltre il finestrino come pagine di un libro. Provi a leggerle al contrario.
        #JNSQscience_crewReport_KrelSrfLandedHighlands_00 = Una parete rocciosa si alza come un'onda congelata. Annoti che l'idea di "pendio dolce" su Krel è uno scherzo.
        #JNSQscience_crewReport_KrelSrfLandedHighlands_01 = I bordi dei crateri sono abbastanza affilati da proiettare ombre drammatiche. Ti senti giudicato dalla geologia.
        #JNSQscience_crewReport_KrelSrfLandedPoles_00 = Il sole sfiora l'orizzonte e si rifiuta di aiutare. Gli strumenti brillano: il tuo umore no.
        #JNSQscience_crewReport_KrelSrfLandedPoles_01 = Polvere gelida si attacca alla guarnizione del portello. Aggiungi "portare una spazzola migliore" al rapporto ufficiale.
        #JNSQscience_crewReport_KrelInSpaceLow_00 = Da vicino, Krel è un mosaico pallido di cicatrici e terrazze. Sembra troppo complicata per le sue dimensioni.
        #JNSQscience_crewReport_KrelInSpaceLow_01 = Lindor riempie metà finestrino e Krel riempie l'altra metà. I tuoi appunti degenerano in cerchi.
        #JNSQscience_crewReport_KrelInSpaceHigh_00 = Krel si riduce a una scheggia luminosa vicino al suo genitore gigante. Controlli due volte di non averla persa.
        #JNSQscience_crewReport_KrelInSpaceHigh_01 = Da qui la luna sembra calma e liscia, il che è chiaramente una bugia. La archivi sotto "misterioso".
        #JNSQscience_crewReport_AdenSrfLandedLowlands_00 = Il terreno fuori è una lastra piatta e marrone di quiete. Le tue impronte sembrano stranamente sicure di sé per qualcosa fatto in bassa gravità.
        #JNSQscience_crewReport_AdenSrfLandedLowlands_01 = I bassopiani non fanno granché, e questo li fa sembrare come se lo facessero apposta.
        #JNSQscience_crewReport_AdenSrfLandedMidlands_00 = Il terreno ondula dolcemente oltre il finestrino, come se cercasse di essere interessante senza impegnarsi troppo.
        #JNSQscience_crewReport_AdenSrfLandedMidlands_01 = Registri diversi minuti di "colline" e "altre colline" prima di renderti conto che, in pratica, è tutto il rapporto.
        #JNSQscience_crewReport_AdenSrfLandedHighlands_00 = La vista si fa più netta in creste e terreno fratturato. Il riscaldamento della cabina all'improvviso sembra un sistema critico di missione.
        #JNSQscience_crewReport_AdenSrfLandedHighlands_01 = Annoti il terreno più elevato, poi annoti subito quanto preferiresti osservarlo dall'interno.
        #JNSQscience_crewReport_AdenSrfLandedMountains_00 = Le montagne sembrano assemblate con rocce avanzate e pessime decisioni. Controlli due volte che i freni esistano ancora.
        #JNSQscience_crewReport_AdenSrfLandedMountains_01 = I pendii fuori suggeriscono che quassù "parcheggiare" è più una teoria che una procedura.
        #JNSQscience_crewReport_AdenSrfLandedPoles_00 = Il terreno polare ha una lieve lucentezza polverosa che ti fa chiedere cosa si nasconda nelle tasche fredde in ombra.
        #JNSQscience_crewReport_AdenSrfLandedPoles_01 = È tutto ombre lunghe e pallidi riflessi. Cerchi di non pensare a quanto sia lontano il concetto di "caldo".
        #JNSQscience_crewReport_AdenInSpaceLow_00 = Aden scorre veloce sotto di te tra creste marroni e bacini poco profondi. È abbastanza piccola da sembrare gestibile, ed è allora che diventa sospetta.
        #JNSQscience_crewReport_AdenInSpaceLow_01 = L'orbita bassa fa sembrare importante ogni gobba. Il Controllo Missione concorda, a gran voce, ogni volta che ti allontani dalla rotta prevista.
        #JNSQscience_crewReport_AdenInSpaceHigh_00 = Da quassù, Aden è una biglia ordinata e Lindor si prende tutto il cielo. Lo registri come "ingiusto ma impressionante".
        #JNSQscience_crewReport_AdenInSpaceHigh_01 = In alto sopra Aden, la luna sembra calma e semplice. Il computer di navigazione non è d'accordo con nessuna di queste due parole.
        #JNSQscience_crewReport_HuygenSrfLandedLowlands_00 = La vista è una macchia arancione attenuata. Registri che Huygen sta facendo del suo meglio per nasconderti il terreno.
        #JNSQscience_crewReport_HuygenSrfLandedLowlands_01 = L'aria fuori sembra abbastanza densa da poterla masticare. Decidi di tenere il portello ben, ben sigillato.
        #JNSQscience_crewReport_HuygenSrfLandedMidlands_00 = Basse colline si allontanano nella foschia finché semplicemente smettono di esistere. La navigazione per punti di riferimento è ufficialmente annullata.
        #JNSQscience_crewReport_HuygenSrfLandedMidlands_01 = Un lento ticchettio tamburella sullo scafo. Qualunque cosa stia cadendo dal cielo, non ha alcuna fretta.
        #JNSQscience_crewReport_HuygenSrfLandedHighlands_00 = Da quassù la nebbia forma strati come coperte. Ti senti stranamente a tuo agio per un posto così alieno.
        #JNSQscience_crewReport_HuygenSrfLandedHighlands_01 = L'orizzonte è vicino e lontano allo stesso tempo. Sospetti che l'atmosfera stia di nuovo facendo scherzi.
        #JNSQscience_crewReport_HuygenSrfLandedMountains_00 = La capsula scricchiola mentre i venti la spingono. Segni le montagne come: panoramiche, piene di spifferi e leggermente giudicanti.
        #JNSQscience_crewReport_HuygenSrfLandedMountains_01 = Creste sottili svaniscono nella foschia ambrata. Provi a contare le cime, ma il pianeta continua a cambiare la risposta.
        #JNSQscience_crewReport_HuygenSrfLandedPeaks_00 = In cima al mondo, il cielo si rifiuta ancora di essere blu. È tutto oro e segreti.
        #JNSQscience_crewReport_HuygenSrfLandedPeaks_01 = Riesci quasi a vedere Lindor attraverso la foschia. Quasi.
        #JNSQscience_crewReport_HuygenSrfLandedPolarLowlands_00 = Il terreno sembra duro e scuro, come se preferisse essere ovunque altrove. Lo capisci.
        #JNSQscience_crewReport_HuygenSrfLandedPolarLowlands_01 = Nebbia fredda striscia lungo la superficie al rallentatore. Registri: meteo con problemi di costanza.
        #JNSQscience_crewReport_HuygenSrfLandedPoles_00 = Tutto è silenzioso, ovattato dall'aria densa. Persino la radio sembra sussurrare.
        #JNSQscience_crewReport_HuygenSrfLandedPoles_01 = Gli strumenti dicono che la pressione è alta. Le tue orecchie ci credono.
        #JNSQscience_crewReport_HuygenSrfLandedPolarHighlands_00 = La luce pallida fa sembrare irreali i pendii, come un bozzetto a carboncino dietro vetro colorato.
        #JNSQscience_crewReport_HuygenSrfLandedPolarHighlands_01 = Ti sorprendi a trattenere il respiro, poi ricordi che non è così che funziona la pressione.
        #JNSQscience_crewReport_HuygenSrfLandedShores_00 = La costa è scura e lucida. Non riesci a capire se sia terreno bagnato o terreno che finge di esserlo.
        #JNSQscience_crewReport_HuygenSrfLandedShores_01 = Onde leggere lambiscono qualcosa che decisamente non è acqua. Scrivi: niente assaggi.
        #JNSQscience_crewReport_HuygenSrfSplashedShores_00 = Il mezzo ondeggia su un rigonfiamento pesante e oleoso. La cabina odora vagamente di un set da chimica.
        #JNSQscience_crewReport_HuygenSrfSplashedShores_01 = Guardi le increspature allargarsi nella nebbia e sei molto contento che i finestrini siano spessi.
        #JNSQscience_crewReport_HuygenSrfSplashedMethaneLakes_00 = Stai galleggiando in un lago di metano. Il Controllo Missione insiste perché tu lo definisca 'entusiasmante' invece che 'preoccupante'.
        #JNSQscience_crewReport_HuygenSrfSplashedMethaneLakes_01 = Bolle salgono e scoppiano senza drammi. Registri il liquido come calmo, freddo e sospettosamente infiammabile.
        #JNSQscience_crewReport_HuygenFlyingLowLowlands_00 = Sfiorando i bassopiani, la foschia si infittisce finché il terreno diventa una voce di corridoio.
        #JNSQscience_crewReport_HuygenFlyingLowLowlands_01 = L'altimetro scende e la vista non migliora mai. Huygen è fedele all'ambiguità.
        #JNSQscience_crewReport_HuygenFlyingLowMidlands_00 = La turbolenza spinge il mezzo come un gigante annoiato. Presenti un reclamo nel registro.
        #JNSQscience_crewReport_HuygenFlyingLowMidlands_01 = Radure a chiazze si aprono per pochi secondi alla volta. Scatti foto e fai finta che contino come certezza.
        #JNSQscience_crewReport_HuygenFlyingLowHighlands_00 = Gli altipiani scorrono sotto di te come isole scure in un mare di nebbia.
        #JNSQscience_crewReport_HuygenFlyingLowHighlands_01 = Individui linee di cresta, poi le perdi di nuovo. L'atmosfera gioca a cucù.
        #JNSQscience_crewReport_HuygenFlyingLowMountains_00 = Le correnti ascensionali sopra le montagne sembrano lente ma inesorabili, come se il pianeta stesse respirando.
        #JNSQscience_crewReport_HuygenFlyingLowMountains_01 = Per un momento la foschia si assottiglia e vedi roccia frastagliata. Poi Huygen richiude la tenda.
        #JNSQscience_crewReport_HuygenFlyingLowPeaks_00 = Le cime spuntano in un'aria più sottile, ma anche qui il cielo resta ambrato e denso.
        #JNSQscience_crewReport_HuygenFlyingLowPeaks_01 = Sorvoli una vetta e ti sembra di interrompere una conversazione privata tra roccia e nuvola.
        #JNSQscience_crewReport_HuygenFlyingLowPolarLowlands_00 = Sotto di te, le pianure polari sono macchiate da disegni simili a brina che svaniscono quando sbatti le palpebre.
        #JNSQscience_crewReport_HuygenFlyingLowPolarLowlands_01 = Qui l'aria è più calma, ma più fredda. Il riscaldatore si guadagna una medaglia.
        #JNSQscience_crewReport_HuygenFlyingLowPoles_00 = Il polo siede sotto una cupola di luce fioca. Non sai decidere se sia tranquillo o semplicemente silenzioso.
        #JNSQscience_crewReport_HuygenFlyingLowPoles_01 = I finestrini si appannano dall'interno. Annota che l'atmosfera non è l'unica cosa ad essere nebulosa.
        #JNSQscience_crewReport_HuygenFlyingLowPolarHighlands_00 = Gli altipiani polari sembrano netti ai bordi e morbidi ovunque altro. Dai la colpa alla vista, non ai tuoi occhi.
        #JNSQscience_crewReport_HuygenFlyingLowPolarHighlands_01 = Il mezzo oscilla dolcemente mentre sale. La bassa gravità lo fa sembrare un volo in sogno.
        #JNSQscience_crewReport_HuygenFlyingLowShores_00 = La costa traccia una linea scura nella nebbia, come un tratto d'inchiostro su carta vecchia.
        #JNSQscience_crewReport_HuygenFlyingLowShores_01 = Voli lungo la costa e guardi le onde che ti inseguono. Decidi che è maleducazione.
        #JNSQscience_crewReport_HuygenFlyingLowMethaneLakes_00 = Il lago sotto di te non riflette quasi nulla. È come fissare un'ombra lucidata.
        #JNSQscience_crewReport_HuygenFlyingLowMethaneLakes_01 = Un lieve velo sulla superficie cattura la luce. In silenzio sposti tutti gli interruttori d'accensione su 'no'.
        #JNSQscience_crewReport_HuygenFlyingHigh_00 = Molto sopra l'aria densa, il mondo diventa una sfera ambrata liscia con un bordo morbido e luminoso.
        #JNSQscience_crewReport_HuygenFlyingHigh_01 = La cabina è silenziosa a parte qualche scarica di statica. Sospetti che Huygen stia cercando di tenere i suoi segreti persino dalle onde radio.
        #JNSQscience_crewReport_HuygenInSpaceLow_00 = Da un'orbita bassa, Huygen sembra una lanterna sigillata: bordo luminoso, centro scuro e una foschia che non riesci ad attraversare con lo sguardo.
        #JNSQscience_crewReport_HuygenInSpaceLow_01 = Guardi le bande di nubi scorrere lentamente. Qui tutto si muove come se anche il tempo fosse più denso.
        #JNSQscience_crewReport_HuygenInSpaceHigh_00 = Da un'orbita alta, Huygen è una piccola moneta ambrata accanto alla vasta presenza di Lindor. Ti senti molto piccolo.
        #JNSQscience_crewReport_HuygenInSpaceHigh_01 = Il bagliore del bordo è evidente anche da qui. Registri: atmosfera confermata, pazienza necessaria.
        #JNSQscience_crewReport_RigaSrfLandedLowlands_00 = L'orizzonte è una bassa linea grigio azzurra sotto una lieve foschia. Lindor incombe sopra come una lanterna congelata.
        #JNSQscience_crewReport_RigaSrfLandedMidlands_00 = Dolci rialzi scorrono oltre il finestrino. Ogni gobba sembra il posto perfetto per una base, finché non ricordi la temperatura.
        #JNSQscience_crewReport_RigaSrfLandedMidlands_01 = Il terreno fa sembrare facile orientarsi. Poi ti rendi conto di essere già perso, perché ogni cresta è identica.
        #JNSQscience_crewReport_RigaSrfLandedHighlands_00 = Altopiani fratturati proiettano ombre lunghe e nette. La luce del sole sembra lontana, ma il riverbero sulle rocce no.
        #JNSQscience_crewReport_RigaSrfLandedHighlands_01 = Un compagno di equipaggio sostiene che le colline siano "accoglienti". Il Controllo Missione suggerisce di smettere di dare nomi ai pericoli.
        #JNSQscience_crewReport_RigaSrfLandedMountains_00 = Cime esili trafiggono un cielo nero. Le gambe del lander scricchiolano, ricordandoti che la gravità è bassa, non assente.
        #JNSQscience_crewReport_RigaSrfLandedMountains_01 = Da quassù, Lindor domina metà del cielo. Per un attimo consideri di far pagare l'affitto per la vista.
        #JNSQscience_crewReport_RigaSrfLandedPoles_00 = Il suolo polare scintilla di granelli simili a brina. L'aria è così rarefatta da essere quasi decorativa.
        #JNSQscience_crewReport_RigaSrfLandedPoles_01 = Guardi un filo di foschia strisciare lungo la superficie. È il massimo del meteo che tu abbia visto tutto il giorno, e ne vai fiero.
        #JNSQscience_crewReport_RigaFlyingLowLowlands_00 = A bassa quota la foschia diventa una cosa vera, che sussurra contro lo scafo e minaccia di trasformarsi in aerodinamica.
        #JNSQscience_crewReport_RigaFlyingLowLowlands_01 = Sfiori pianure che sembrano perfettamente lisce finché l'altimetro non è in disaccordo, a gran voce.
        #JNSQscience_crewReport_RigaFlyingLowMidlands_00 = Il mezzo ondeggia sopra dolci rialzi: l'aria rarefatta dà appena abbastanza portanza da farti sentire in colpa.
        #JNSQscience_crewReport_RigaFlyingLowMidlands_01 = Noti ombre sinuose che potrebbero essere valli, o solo la luce di Lindor che ti fa scherzi.
        #JNSQscience_crewReport_RigaFlyingLowHighlands_00 = Gli altipiani scompigliano il flusso d'aria in piccoli sobbalzi fastidiosi. I piloti lo chiamano "carattere".
        #JNSQscience_crewReport_RigaFlyingLowHighlands_01 = Anche qui, il cielo resta scuro e freddo. Il terreno sembra abbastanza vicino da toccarlo, quindi non farlo.
        #JNSQscience_crewReport_RigaFlyingLowMountains_00 = Le cime montuose sfrecciano sotto di te e l'aria rarefatta si rifiuta di aiutarti se sbagli.
        #JNSQscience_crewReport_RigaFlyingLowMountains_01 = Dai un'occhiata in basso e decidi che le montagne dovrebbero avere etichette di avvertimento. Il terreno si rifiuta di collaborare.
        #JNSQscience_crewReport_RigaFlyingLowPoles_00 = Sopra i poli, la foschia si assottiglia e la superficie si illumina. I tuoi strumenti insistono che questo conti come "meteo".
        #JNSQscience_crewReport_RigaFlyingLowPoles_01 = Minuscoli scintillii simili a ghiaccio sferzano oltre il finestrino. Speri non siano gli stessi che stanno colpendo la presa d'aria.
        #JNSQscience_crewReport_RigaFlyingHigh_00 = "Volare" è un termine generoso quassù: stai soprattutto cadendo con stile attraverso un accenno di atmosfera.
        #JNSQscience_crewReport_RigaFlyingHigh_01 = Il cielo sfuma nello spazio mentre gli ultimi resti d'aria tirano il mezzo come se volessero trattenerti ancora un po'.
        #JNSQscience_crewReport_RigaInSpaceLow_00 = I dettagli della superficie di Riga si definiscono in fasce nette di luce e ombra. L'atmosfera è un contorno sottile, come se qualcuno si fosse dimenticato di finire il disegno.
        #JNSQscience_crewReport_RigaInSpaceLow_01 = Lindor riempie lo sfondo di pallidi vortici. Prendi appunti e poi fissi più a lungo del scientificamente necessario.
        #JNSQscience_crewReport_RigaInSpaceHigh_00 = Da un'orbita alta, Riga sembra una sfera quieta e gelida con un debole bordo di foschia. Il vuoto attorno suona rumoroso.
        #JNSQscience_crewReport_RigaInSpaceHigh_01 = Tracci i futuri siti d'atterraggio indicando lo schermo e dicendo "lì". Tutti concordano che sia pianificazione di altissimo livello.
        #JNSQscience_crewReport_TalosSrfLandedLowlands_00 = Fissi i bassopiani e ti rendi conto che anche "privo di caratteristiche" può risultare intimidatorio.
        #JNSQscience_crewReport_TalosSrfLandedLowlands_01 = La superficie sembra aver aspettato a lungo che qualcuno lasciasse impronte su di essa.
        #JNSQscience_crewReport_TalosSrfLandedMidlands_00 = Le terre di mezzo sono un patchwork di creste e cicatrici poco profonde, come se qualcuno avesse provato a cancellare il paesaggio e poi si fosse arreso.
        #JNSQscience_crewReport_TalosSrfLandedMidlands_01 = Registri una descrizione accurata del terreno, poi aggiungi una nota poco utile: "È tutto lo stesso tipo di freddo".
        #JNSQscience_crewReport_TalosSrfLandedHighlands_00 = Dagli altipiani, l'orizzonte è fatto di bordi netti e ombre lunghe che sembrano non finire mai.
        #JNSQscience_crewReport_TalosSrfLandedHighlands_01 = Non riesci a decidere se gli altipiani sembrino antichi, o solo stanchi.
        #JNSQscience_crewReport_TalosSrfLandedMountains_00 = Le montagne sembrano abbastanza vicine da toccarle attraverso il finestrino, e abbastanza lontane da mentire.
        #JNSQscience_crewReport_TalosSrfLandedMountains_01 = Riferisci "visibilità eccellente", soprattutto perché qui non c'è nulla che impedisca di vedere i guai arrivare.
        #JNSQscience_crewReport_TalosSrfLandedPoles_00 = Il terreno polare luccica debolmente nella luce bassa, come se Talos stesse fingendo di essere accogliente.
        #JNSQscience_crewReport_TalosSrfLandedPoles_01 = Le ombre ai poli sono così profonde che ti sembra che le luci della cabina si siano abbassate solo guardandole.
        #JNSQscience_crewReport_TalosInSpaceLow_00 = In orbita bassa, Talos scorre via in silenziosi dettagli craterizzati, come una mappa che si rifiuta di spiegarsi.
        #JNSQscience_crewReport_TalosInSpaceLow_01 = Indichi i dettagli della superficie mentre passano sotto di te, poi ti fermi quando ti rendi conto che stavi nominando la stessa forma più e più volte.
        #JNSQscience_crewReport_TalosInSpaceHigh_00 = Da un'orbita alta, Talos sembra piccolo e ostinatamente vuoto, con il resto dello spazio che fa gran parte della conversazione.
        #JNSQscience_crewReport_TalosInSpaceHigh_01 = Registri un rapporto calmo e professionale mentre, in privato, ti chiedi se "lontano" sia una risorsa misurabile.
        #JNSQscience_crewReport_EelooFlyingLowPoles_00 = Riferisci che stai "volando" sopra i poli. La quota è d'accordo. Il tuo istinto no.
        #JNSQscience_crewReport_EelooFlyingLowHighlands_00 = Gli altipiani scorrono sotto di te, affilati e luminosi. La cabina sembra sospesa sopra un congelatore con opinioni.
        #JNSQscience_crewReport_EelooFlyingLowMidlands_00 = Da qui le terre di mezzo sembrano calme, piatte e pallide, e determinate a farti ricontrollare l'altimetro ogni dieci secondi.
        #JNSQscience_crewReport_EelooFlyingLowLowlands_00 = Sopra i bassopiani, la foschia è appena abbastanza fitta da impastare l'orizzonte. Cerchi di non respirare con troppa sicurezza.
        #JNSQscience_crewReport_EelooFlyingLowCanyon_00 = Le pareti del canyon sfrecciano sotto di te e l'aria sottile non fa assolutamente nulla per addolcire la vista o i tuoi nervi.
        #JNSQscience_crewReport_EelooFlyingHigh_00 = Ad "alta quota" su Eeloo, il cielo è praticamente spazio. Archivi il rapporto nel caso qualcuno voglia mai discutere la differenza.
        #JNSQscience_crewReport_CelesSrfLandedLowlands_00 = I bassopiani sembrano come se qualcuno avesse stirato il paesaggio fino a renderlo piatto, poi si fosse dimenticato di metterlo via.
        #JNSQscience_crewReport_CelesSrfLandedMidlands_01 = Il terreno è un patchwork di placche pallide e giunture scure. Decidi di non chiedere cosa ci sia sotto le giunture.
        #JNSQscience_crewReport_CelesSrfLandedHighlands_00 = Creste frastagliate proiettano ombre lunghe sulla cabina. Sei contento che sia la nave a fare la fatica di stare in piedi al posto tuo.
        #JNSQscience_crewReport_CelesSrfLandedMountains_01 = Le montagne sembrano abbastanza affilate da bucare la fiducia. Stringi comunque le cinghie del sedile.
        #JNSQscience_crewReport_CelesSrfLandedPoles_00 = Fuori è tutto luminoso, freddo e silenzioso. L'equipaggio sussurra, nel caso il polo stia ascoltando.
        #JNSQscience_crewReport_CelesInSpaceLow_00 = Da un'orbita bassa, Celes è fatta di contrasti e graffi, come se fosse passata attraverso qualche "atterraggio di prova" di troppo.
        #JNSQscience_crewReport_CelesInSpaceHigh_00 = Celes si riduce a un sassolino pallido sotto un cielo fioco. All'improvviso ti mancano le esplosioni rumorose e rassicuranti.
        #JNSQscience_crewReport_TamSrfLandedLowlands_00 = La superficie scorre al rallentatore. Non sai dire se sia il terreno o il tuo senso d'urgenza che se ne sta andando.
        #JNSQscience_crewReport_TamSrfLandedMidlands_00 = La cabina sembra più pesante del mondo là fuori. Il Controllo Missione lo chiama "scienza", tu lo chiami "ingiusto".
        #JNSQscience_crewReport_TamSrfLandedHighlands_00 = Da quassù, l'orizzonte sembra piegato e bitorzoluto, come se Tam non avesse mai scelto una forma definitiva.
        #JNSQscience_crewReport_TamSrfLandedTwinCraters_00 = Due crateri ti fissano come occhi spalancati. L'equipaggio decide di smettere subito con le battute sui "gemelli". Quasi.
        #JNSQscience_crewReport_TamSrfLandedCraters_00 = Crateri su crateri su crateri. Inizi a classificarli in base al potenziale per una pausa snack.
        #JNSQscience_crewReport_TamSrfLandedPockmarks_00 = Minuscole buche punteggiano il suolo come se qualcuno avesse provato una nuova punta da trapano dappertutto. La nave si sente giudicata.
        #JNSQscience_crewReport_TamInSpaceLow_00 = Tam sembra un grumo malconcio che ruzzola nel buio. Tieni una mano vicino ai comandi "non ruzzolare".
        #JNSQscience_crewReport_TamInSpaceHigh_00 = Da un'orbita alta, Tam è a malapena un puntino, ma riesce comunque a sembrare ostile. Notevole.
        #JNSQscience_crewReport_HamekSrfLandedLowlands_00 = I bassopiani brillano di una strana tinta rugginosa. Controlli i finestrini in cerca di ketchup. Nessuna traccia.
        #JNSQscience_crewReport_HamekSrfLandedMidlands_00 = Le terre di mezzo scintillano tra il rosso e il pallido, come se il pianeta non riuscisse a decidere se essere gelido o polveroso.
        #JNSQscience_crewReport_HamekSrfLandedHighlands_00 = Gli altipiani sembrano fragili e antichi. Prometti alle gambe d'atterraggio una bella vacanza dopo questa.
        #JNSQscience_crewReport_HamekSrfLandedPoles_00 = I poli sono luminosi e spogli, con ombre che sembrano un po' troppo ordinate. Non esci per "raddrizzarle".
        #JNSQscience_crewReport_HamekInSpaceLow_00 = In orbita bassa, gli strani colori di Hamek formano fasce ampie e macchie. Lo registri come "scientificamente sospetto".
        #JNSQscience_crewReport_HamekInSpaceHigh_00 = Hamek resta nel vuoto come una biglia dipinta male. Ti chiedi chi abbia sbagliato la tabella dei colori.
        #JNSQscience_crewReport_NaraInSpaceHigh_00 = Kerbol è solo un altro punto luminoso, ormai. Verifichi il piano di rientro per la quinta volta e cerchi in silenzio la sezione etichettata "scarpette rosse".
        #JNSQscience_crewReport_NaraInSpaceHigh_01 = Il sistema interno è una debole, affollata strisciata scintillante. Ti senti fiero, e poi ricordi che devi anche tornare indietro.
        #JNSQscience_crewReport_NaraInSpaceHigh_02 = La capsula è una piccola bolla calda in mezzo a un sacco di niente. Anche le checklist suonano più serie quassù.
        #JNSQscience_crewReport_NaraInSpaceLow_00 = Nara si gonfia sotto di te: un cielo pallido e pesante sopra un mondo che sembra aver dimenticato cosa significhi "caldo".
        #JNSQscience_crewReport_NaraInSpaceLow_01 = L'orbita bassa sembra scomodamente vicina, come se il pianeta ti guardasse allineare un atterraggio e giudicasse i tuoi conti.
        #JNSQscience_crewReport_NaraInSpaceLow_02 = Una luce solare sottile sfiora campi di brina brillante e creste scure. Segni una zona d'atterraggio e sottolinei la parola "fuga".
        #JNSQscience_crewReport_NaraFlyingHigh_00 = Sei ancora in "atmosfera", in qualche modo. L'aria è fredda, densa e piena di un sibilo quieto, come una perdita enorme che non puoi riparare.
        #JNSQscience_crewReport_NaraFlyingHigh_01 = Molto sopra la superficie, le nubi brillano debolmente sotto una luce solare scarsa. È bellissimo, in un modo che suggerisce pericolo.
        #JNSQscience_crewReport_NaraFlyingHigh_02 = La cabina scricchiola mentre cavalchi i venti alti. Scrivi: "Il veicolo di rientro non dovrebbe essere opzionale".
        #JNSQscience_crewReport_NaraSrfLandedLowlands_00 = Il terreno scricchiola come zucchero vecchio sotto le gambe d'atterraggio. La pressione esterna fa lamentare lo scafo con lenti gemiti.
        #JNSQscience_crewReport_NaraSrfLandedLowlands_01 = La brina avanza sui bordi del finestrino mentre guardi. Decidi di non dire ad alta voce la parola "intrappolati".
        #JNSQscience_crewReport_NaraSrfLandedLowlands_02 = Il manuale menzione delle scarpette rosse. Controlli l'armadietto. Hai stivali, snack e rimpianti.
        #JNSQscience_crewReport_NaraSrfLandedMidlands_00 = Creste ondulate e fioche si allungano nella foschia. L'aria è così densa che l'orizzonte sembra stanco.
        #JNSQscience_crewReport_NaraSrfLandedMidlands_01 = Il suono si propaga in modo strano nel freddo denso. Ogni tintinnio di bullone fa sembrare il mezzo meno una macchina e più un paziente.
        #JNSQscience_crewReport_NaraSrfLandedMidlands_02 = Pianti una bandiera e resta rigida come un'asse. Inizi subito a pensare a come sradicare te stesso.
        #JNSQscience_crewReport_NaraSrfLandedHighlands_00 = Sei più in alto, ma la pressione pesa ancora su tutto. Nara non fa "aria rarefatta", fa "silenzio pesante".
        #JNSQscience_crewReport_NaraSrfLandedHighlands_01 = Il vento scava la brina in piccoli cumuli attorno al carrello d'atterraggio. Sembra ordinato, come se il pianeta stesse ripulendo dopo di te.
        #JNSQscience_crewReport_NaraSrfLandedHighlands_02 = Scrivi una nota ispiratrice sul traguardo, poi aggiungi: "Il traguardo non è la stessa cosa della sopravvivenza".
        #JNSQscience_crewReport_NaraSrfLandedMountains_00 = Cime frastagliate tagliano il cielo pallido come denti spezzati. Tieni le mani sui comandi qualche secondo più del necessario.
        #JNSQscience_crewReport_NaraSrfLandedMountains_01 = La gravità normale significa niente saltelli eroici, solo passi cauti e deliberati e il pensiero costante di cadere.
        #JNSQscience_crewReport_NaraSrfLandedMountains_02 = Il piano di ascesa all'improvviso sembra una fiaba. Inizi a capire perché fossero richieste le scarpette.
        #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_00 = Campi piatti e luminosi si estendono all'infinito, interrotti da giunture scure dove la superficie sembra sotto sforzo.
        #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_01 = Il finestrino si appanna e congela in delicati disegni. Ne raschi un pezzetto pulito e subito vorresti non averlo fatto.
        #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_02 = Provi a immaginare il verde di Kerbin. L'immagine sembra qualcosa che hai letto in un libro tanto tempo fa.
        #JNSQscience_crewReport_NaraSrfLandedPoles_00 = Il sole sfiora appena l'orizzonte, ammesso che si faccia vedere. Questo posto ha perfezionato l'arte di non curarsene.
        #JNSQscience_crewReport_NaraSrfLandedPoles_01 = Cristalli fini picchiettano lo scafo come sabbia, solo più silenziosi e in qualche modo più cattivi.
        #JNSQscience_crewReport_NaraSrfLandedPoles_02 = Stili un rapporto che inizia con "Ce l'abbiamo fatta". Ti fermi a lungo prima di scrivere la frase successiva.
        #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_00 = Il vento quassù trova ogni fessura e ogni punto debole. La nave trema come se volesse andarsene senza di te.
        #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_01 = Il ritardo radio fa sembrare il Controllo Missione una voce di corridoio. Inizi a leggere le checklist ad alta voce per farti compagnia.
        #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_02 = Batti gli stivali per scaldarti e ti chiedi se le scarpette rosse abbiano una fodera termica.
        #JNSQscience_crewReport_NaraFlyingLowLowlands_00 = L'aria è così densa che ti sembra di poterci remare dentro. La portanza è facile: il controllo no.
        #JNSQscience_crewReport_NaraFlyingLowLowlands_01 = La turbolenza fredda colpisce il mezzo con lenti pugni pesanti. Registri che il meteo di Nara è paziente e insistente.
        #JNSQscience_crewReport_NaraFlyingLowLowlands_02 = Cristalli di brina sfilano oltre il finestrino come glitter. Non apri nessuna presa d'aria, per quanto la curiosità ti stuzzichi.
        #JNSQscience_crewReport_NaraFlyingLowMidlands_00 = Le colline scorrono sotto di te in onde smorzate. Continui ad aspettarti che il terreno allunghi la mano e afferri il carrello d'atterraggio.
        #JNSQscience_crewReport_NaraFlyingLowMidlands_01 = Gli strumenti sibilano di statica mentre attraversi strati di foschia carica. Scrivi: "L'atmosfera reagisce".
        #JNSQscience_crewReport_NaraFlyingLowMidlands_02 = Le valli si riempiono di nebbia lattiginosa che nasconde profondità e distanza. Volo a numeri e pura testardaggine.
        #JNSQscience_crewReport_NaraFlyingLowHighlands_00 = I motori lavorano di più mentre il terreno sale, ma l'aria si rifiuta di assottigliarsi con garbo. Resta semplicemente pesante e fredda.
        #JNSQscience_crewReport_NaraFlyingLowHighlands_01 = Correnti ascensionali spingono il mezzo di lato senza preavviso. Stringi i comandi e prometti di non lamentarti mai più di Kerbin.
        #JNSQscience_crewReport_NaraFlyingLowHighlands_02 = Annota che qui gli errori non vengono puniti in fretta. Vengono puniti a fondo.
        #JNSQscience_crewReport_NaraFlyingLowMountains_00 = Onde orografiche sballottano il mezzo come un giocattolo, solo più lentamente e con conseguenze più costose.
        #JNSQscience_crewReport_NaraFlyingLowMountains_01 = Le nubi sfiorano le cime e fanno sparire e riapparire le linee di cresta. Decidi che non ti piacciono le sorprese.
        #JNSQscience_crewReport_NaraFlyingLowMountains_02 = Il terreno sembra vicino, poi più vicino, poi all'improvviso molto interessato a te. Ti allontani in salita ed espiri.
        #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_00 = La visibilità crolla in un bagliore indistinto. Il mondo diventa strumenti, supposizioni e molta fede nell'ingegneria.
        #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_01 = Diavoli di brina vorticano sulle pianure, sollevando cristalli scintillanti nell'aria. Sembrano belli finché non colpiscono la presa d'aria.
        #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_02 = Il mezzo crepita di piccoli scoppiettii di statica. Aggiungi "cinghia di messa a terra" alla lista delle cose che vorresti avere.
        #JNSQscience_crewReport_NaraFlyingLowPoles_00 = Un vortice polare afferra il mezzo e prova a farti cambiare carriera, trasformandoti in detriti.
        #JNSQscience_crewReport_NaraFlyingLowPoles_01 = Kerbol è una strisciata opaca tra nubi e foschia. Navighi a numeri e speri che i numeri siano onesti.
        #JNSQscience_crewReport_NaraFlyingLowPoles_02 = Per un secondo immagini di volare direttamente a casa. Poi ti ricordi che lo spazio è di mezzo.
        #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_00 = La foschia superraffreddata deposita brina dura su qualunque cosa esposta. La nave inizia a farsi i suoi dentini.
        #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_01 = I cambi di quota sembrano sbagliati in quest'aria densa. Ti fidi del radar e smetti di fidarti delle sensazioni.
        #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_02 = Scrivi una nota calma e professionale sul campionamento atmosferico, poi aggiungi una seconda riga: "Voglio ancora le mie scarpette".
        #JNSQscience_crewReport_AmosSrfLandedLowlands_00 = Il terreno è così scuro che la tua lampada frontale sembra inadeguata. L'equipaggio concorda che è "molto scientifico".
        #JNSQscience_crewReport_AmosSrfLandedMidlands_00 = La superficie scricchiola sotto il carrello d'atterraggio come una bruciatura da freezer di tempi antichi. Lo scrivi, perché puoi.
        #JNSQscience_crewReport_AmosSrfLandedHighlands_00 = Da quassù, il paesaggio sembra spolverato con cura di fuliggine. Cominci a sospettare che Amos si diverta a essere difficile da interpretare.
        #JNSQscience_crewReport_AmosSrfLandedMountains_00 = Ogni passo diventa un saltello al rallentatore che dura giusto il tempo di pentirsene. L'equipaggio lo chiama "allenamento a bassa gravità".
        #JNSQscience_crewReport_AmosSrfLandedPoles_00 = Le ombre ai poli sembrano andare avanti per sempre. Ricontrolli che Kerbol sia ancora parte del piano.
        #JNSQscience_crewReport_AmosInSpaceLow_00 = Da vicino, Amos è un piccolo mistero scuro con spigoli netti e nessuna etichetta utile. Archivi un rapporto e richiedi vernice più chiara.
        #JNSQscience_crewReport_AmosInSpaceHigh_00 = Amos si riduce a un puntino accanto a Nara e in cabina cala il silenzio. Qualcuno inizia a fare l'inventario degli snack per ragioni di morale.
        #JNSQscience_crewReport_EnonSrfLandedLowlands_00 = La superficie è accecantemente pallida, come se cercasse di rifletterti i pensieri addosso. L'equipaggio socchiude gli occhi e fa finta che vada tutto bene.
        #JNSQscience_crewReport_EnonSrfLandedMidlands_00 = Il terreno sembra liscio a distanza, ma da vicino è tutta crosta ruvida e graniglia tagliente. Smetti di fidarti di "a distanza".
        #JNSQscience_crewReport_EnonSrfLandedHighlands_00 = L'orizzonte sembra troppo grande per qualcosa che è "solo una luna". Annota che Enon, a quanto pare, prende il suo lavoro molto sul serio.
        #JNSQscience_crewReport_EnonSrfLandedPoles_00 = I poli sembrano intatti e immacolati, e ti fanno sentire come se stessi lasciando impronte sulla storia. Ti pulisci comunque i guanti.
        #JNSQscience_crewReport_EnonInSpaceLow_00 = Enon riempie il finestrino in un silenzio luminoso e gelido. Ti sorprendi a paragonarla a Duna e ti senti subito lontanissimo da entrambe.
        #JNSQscience_crewReport_EnonInSpaceHigh_00 = Il disco bianco svanisce nel nero e ti rendi conto di quanto poco conti il "bianco" quassù. L'equipaggio vota di tenere le luci accese.
        #JNSQscience_crewReport_PraxSrfLandedLowlands_00 = Le pianure sembrano il bordo della mappa: semplici, vuote e in attesa di una bandiera. Ne pianti una e controlli subito se è caduta nella bassa gravità.
        #JNSQscience_crewReport_PraxSrfLandedMidlands_00 = Il paesaggio è ripetitivo al punto da farti iniziare a dare nomi alle rocce. L'equipaggio chiede di smettere di dare nomi alle rocce.
        #JNSQscience_crewReport_PraxSrfLandedHighlands_00 = Il terreno si spezza in creste e altopiani scalfiti, come se Prax fosse stata assemblata senza istruzioni. Ammiri la dedizione all'estetica da frontiera.
        #JNSQscience_crewReport_PraxSrfLandedMountains_00 = Dalle cime, la vista sembra una promessa e un avvertimento allo stesso tempo. Registri entrambi, per sicurezza.
        #JNSQscience_crewReport_PraxSrfLandedPoles_00 = Il terreno polare sembra più freddo del tono del tuo briefing di missione. Ti chiedi se "mondo di confine" significhi anche "riscaldatore di confine".
        #JNSQscience_crewReport_PraxInSpaceLow_00 = Prax resta sotto di te come un punto di passaggio solitario accanto a Nara. Ti senti stranamente fiero di aver trovato un posto che sembrava voler nascondersi.
        #JNSQscience_crewReport_PraxInSpaceHigh_00 = Prax è un puntino minuscolo, ma l'idea di lei resta enorme nella tua testa. L'equipaggio concorda: questa è decisamente la periferia.

        // evaReport
        #JNSQscience_evaReport_SunFlyingLowNorthPolarZone_00 = Fluttui attraverso pallidi filamenti polari. Le spie di avvertimento della tuta sembrano cercare di formare una frase.
        #JNSQscience_evaReport_SunFlyingLowNorthSubpolarZone_00 = Una grandinata di particelle cariche ti tamburella sul casco. Registri la sensazione come "croccante".
        #JNSQscience_evaReport_SunFlyingLowNorthTemperateZone_00 = L'abbagliamento è totale e la turbolenza è peggiore. Decidi che da ora in poi sbattere le palpebre è facoltativo.
        #JNSQscience_evaReport_SunFlyingLowNorthTropicZone_00 = Il plasma si attorciglia in riccioli luminosi sotto di te. Cerchi di sembrare calmo mentre la tuta, in silenzio, non è d'accordo.
        #JNSQscience_evaReport_SunFlyingLowEquatorialZone_00 = Tutto è più luminoso di quanto dovrebbe e più caldo di quanto abbia il diritto di essere. Il tuo jetpack sembra una pessima battuta.
        #JNSQscience_evaReport_SunFlyingLowSouthTropicZone_00 = L'"aria" qui ti spinge in giro come se avesse opinioni. Registri uno squittio molto scientifico.
        #JNSQscience_evaReport_SunFlyingLowSouthTemperateZone_00 = Per un attimo sembra quasi liscio, poi l'ombra della nave svanisce e ti ricordi perché sei qui.
        #JNSQscience_evaReport_SunFlyingLowSouthSubpolarZone_00 = Il contatore di radiazioni della tuta si arrende e si mette solo a urlare. Valuti di presentare un reclamo al campo magnetico più vicino.
        #JNSQscience_evaReport_SunFlyingLowSouthPolarZone_00 = I flussi polari sferzano oltre in linee dure. Il tuo rapporto EVA è perlopiù un elenco di cose che ti mancano del vuoto.
        #JNSQscience_evaReport_SunFlyingHigh_00 = Gli allarmi della tuta si assestano in un ritmo costante, come un metronomo molto arrabbiato. Registri che il sole resta entusiasticamente caldo.
        #JNSQscience_evaReport_SunFlyingHigh_01 = La luce arriva da ogni angolo e la visiera si scurisce fino a "quasi confortevole". Decidi che, per una vita intera, basta così con i rapporti EVA.
        #JNSQscience_evaReport_MohoInSpaceLowCraters_00 = Il tuo cavo di sicurezza scricchiola mentre fluttui. Il terreno sotto è solo impatti e abbagliamento.
        #JNSQscience_evaReport_MohoSrfLandedExoticCraters_00 = Il materiale espulso di questo cratere è sbilenco, come se avesse rimbalzato. Prendi appunti e fai un passo indietro.
        #JNSQscience_evaReport_MohoSrfLandedExoticCraters_01 = Il bordo si contorce in angoli che non assomigliano agli altri. È inquietantemente geometrico.
        #JNSQscience_evaReport_MohoInSpaceLowExoticCraters_00 = Alcuni bordi sembrano stirati, come se il terreno fosse colato dopo l'impatto. Lo schema ti fa rivoltare lo stomaco.
        #JNSQscience_evaReport_MohoInSpaceLowExoticCraters_01 = Da qui, gli aloni di materiale espulso non sembrano simmetrici. C'è qualcosa di… strano.
        #JNSQscience_evaReport_MohoSrfLandedRareCraters_00 = Un cratere nitido e tagliente, che non è stato ancora cotto nella mediocrità.
        #JNSQscience_evaReport_MohoSrfLandedRareCraters_01 = Le pareti sono più scure e più pulite, come se la roccia non avesse avuto tempo di cuocere.
        #JNSQscience_evaReport_MohoInSpaceLowRareCraters_00 = Un cratere spicca con bordi netti e un fondo scuro, abbastanza fresco da essere ancora interessante.
        #JNSQscience_evaReport_MohoInSpaceLowRareCraters_01 = Segni un impatto particolarmente affilato come raccomandazione "non atterrare qui".
        #JNSQscience_evaReport_MohoSrfLandedVoronoiCraters_00 = I crateri si incastrano come un pavimento a piastrelle. La natura si sta mettendo in mostra.
        #JNSQscience_evaReport_MohoSrfLandedVoronoiCraters_01 = Da qui sembra a motivo: da vicino è un caos frastagliato disposto con ordine.
        #JNSQscience_evaReport_MohoInSpaceLowVoronoiCraters_00 = La superficie si spezza in chiazze poligonali di bordi craterici. È come un guscio incrinato fatto di impatti.
        #JNSQscience_evaReport_MohoInSpaceLowVoronoiCraters_01 = Da qui lo schema è quasi ordinato. Non mi fido di nulla di così preciso su Moho.
        #JNSQscience_evaReport_MohoSrfLandedNotableCraters_00 = Il Controllo Missione è entusiasta che questo buco abbia un nome. Tu sei entusiasta che abbia ombra.
        #JNSQscience_evaReport_MohoSrfLandedNotableCraters_01 = Ti metti in posa sul bordo per lo scatto "storico" e ti penti subito del caldo.
        #JNSQscience_evaReport_MohoInSpaceLowNotableCraters_00 = Individui un cratere famoso e capisci subito perché lo sia: è drammatico anche da qui.
        #JNSQscience_evaReport_MohoInSpaceLowNotableCraters_01 = Il cratere è facile da vedere anche da un'orbita bassa, un punto di riferimento scolpito nella roccia. Fa sembrare provvisorio tutto ciò che gli sta vicino.
        #JNSQscience_evaReport_MohoSrfLandedPeaks_00 = La linea di cresta è tutta lame e abbagliamento. Decidi che il "tentativo di vetta" è scienza facoltativa.
        #JNSQscience_evaReport_MohoSrfLandedPeaks_01 = Quassù l'orizzonte sembra vicino e tagliente. Un saltello sembra divertente finché non ti ricordi dell'atterraggio.
        #JNSQscience_evaReport_MohoInSpaceLowPeaks_00 = Le cime proiettano ombre sottili come aghi che corrono sul suolo mentre passi. È ipnotico.
        #JNSQscience_evaReport_MohoInSpaceLowPeaks_01 = Creste e spine spuntano nell'abbagliamento come un letto di chiodi. Atterrare in mezzo a loro sembra una pessima idea.
        #JNSQscience_evaReport_EveSrfLandedShores_00 = La battigia viola sfrigola contro le rocce. Tieni gli stivali ben lontani.
        #JNSQscience_evaReport_EveSrfLandedShores_01 = Valuti di costruire un castello di sabbia, poi ricordi che la sabbia potrebbe stare sciogliendo i tuoi attrezzi.
        #JNSQscience_evaReport_EveSrfLandedKrakensWell_00 = Poco lontano si apre nel terreno una cicatrice scura e circolare. Non ci urli dentro.
        #JNSQscience_evaReport_EveSrfLandedKrakensWell_01 = La radio crepita mentre ti avvicini al bordo. Ti allontani di nuovo.
        #JNSQscience_evaReport_EveSrfSplashedPolarLakes_00 = Nuotare qui è come farsi strada in gelatina calda. Smetti di chiamarlo nuotare.
        #JNSQscience_evaReport_EveSrfSplashedPetrolLakes_00 = Gli allarmi della tuta si lamentano per vapori che non puoi annusare attraverso i filtri.
        #JNSQscience_evaReport_EveSrfSplashedPetrolLakes_01 = Il liquido si attacca ai guanti in fogli lucidi, come se volesse venire con te.
        #JNSQscience_evaReport_EveSrfSplashedSeaofAkron_00 = Il mare di Akron gocciola dalla tua tuta in pesanti grumi.
        #JNSQscience_evaReport_EveSrfSplashedSeaofAkron_01 = Provi a guardare in basso oltre il bordo del casco e vedi soprattutto viola.
        #JNSQscience_evaReport_EveSrfSplashedSeaofNessus_00 = Il mare di Nessus si estende fino alla foschia. L'orizzonte è solo altro viola.
        #JNSQscience_evaReport_EveSrfSplashedSeaofNessus_01 = Galleggi più in alto di quanto ti aspetti, e non è rassicurante.
        #JNSQscience_evaReport_EveSrfSplashedSeaofTaniwha_00 = Increspature strisciano sul mare di Taniwha come se qualcosa di enorme stesse pensando là sotto.
        #JNSQscience_evaReport_EveSrfSplashedSeaofTaniwha_01 = Decidi che sguazzare è esplorazione sufficiente per oggi.
        #JNSQscience_evaReport_EveSrfSplashedSeaofGigan_00 = Il mare di Gigan solleva lente ondulate sotto l'aria densa.
        #JNSQscience_evaReport_EveSrfSplashedSeaofGigan_01 = Ogni onda sembra pesare una tonnellata. In un certo senso, probabilmente è così.
        #JNSQscience_evaReport_EveSrfSplashedSeaofRodan_00 = Il vento spinge la superficie in pigre grinze. Spinge anche te.
        #JNSQscience_evaReport_EveSrfSplashedSeaofRodan_01 = Prendi nota: non cadere di nuovo dentro. Ci sei già.
        #JNSQscience_evaReport_EveSrfSplashedSeaofGojira_00 = Non riesci a forzare il casco sotto la superficie. Vince la galleggiabilità.
        #JNSQscience_evaReport_EveSrfSplashedSeaofGojira_01 = Il liquido viola fa goccioline sulla visiera e impasta la vista in arte astratta.
        #JNSQscience_evaReport_EveSrfSplashedSeaofGhidorah_00 = Le correnti ti tirano in tre direzioni insieme. Decidi che il nome è azzeccato.
        #JNSQscience_evaReport_EveSrfSplashedSeaofGhidorah_01 = Smetti di scalciare e lasci che la tuta ti tenga a galla mentre ripensi alla tua vita.
        #JNSQscience_evaReport_EveSrfSplashedSeaofBagorah_00 = Il mare di Bagorah sembra propellente versato e pessime idee.
        #JNSQscience_evaReport_EveSrfSplashedSeaofBagorah_01 = Ti chiedi se questo conti come un bagno. La risposta è no.
        #JNSQscience_evaReport_EveFlyingLowPolarLakes_00 = La superficie del lago luccica dentro un pallido anello di terreno. Non riesci a capire quanto sia profondo.
        #JNSQscience_evaReport_EveFlyingLowPolarLakes_01 = Per un attimo pensi che potresti sbattere le braccia e restare sospeso. Poi ti ricordi che la fisica ti odia.
        #JNSQscience_evaReport_EveFlyingLowPetrolLakes_00 = Il lago riflette la luce come olio. Tieni il mezzo puntato verso l'alto, per sicurezza.
        #JNSQscience_evaReport_EveFlyingLowPetrolLakes_01 = Cerchi bolle o increspature e trovi entrambe. Non è rassicurante.
        #JNSQscience_evaReport_EveFlyingLowSeaofAkron_00 = Una spia di allerta climatica lampeggia e decidi che il mare di Akron non è un buon posto per perdere quota.
        #JNSQscience_evaReport_EveFlyingLowSeaofAkron_01 = Ti concentri sul non metterti a ruzzolare sopra l'oceano viola. A quanto pare è un lavoro a tempo pieno.
        #JNSQscience_evaReport_EveFlyingLowSeaofNessus_00 = Cerchi un punto d'atterraggio e trovi soprattutto altro mare.
        #JNSQscience_evaReport_EveFlyingLowSeaofNessus_01 = Qualcosa di scuro galleggia sotto. Fingi che non faccia parte della tua nave.
        #JNSQscience_evaReport_EveFlyingLowSeaofTaniwha_00 = L'aria è così densa che le onde sembrano ovattate, come se il mare indossasse una coperta.
        #JNSQscience_evaReport_EveFlyingLowSeaofTaniwha_01 = Preferiresti non finire di nuovo nel liquido. Il liquido aspetta pazientemente.
        #JNSQscience_evaReport_EveFlyingLowSeaofGigan_00 = Le ondulate sono ampie e lente. Le senti anche da quassù.
        #JNSQscience_evaReport_EveFlyingLowSeaofGigan_01 = L'abbagliamento viola rende difficile stimare le distanze. Ti fidi degli strumenti, a malincuore.
        #JNSQscience_evaReport_EveFlyingLowSeaofRodan_00 = Raffiche ti spingono in giro nonostante l'aria densa. Presenti un reclamo contro il meteo.
        #JNSQscience_evaReport_EveFlyingLowSeaofRodan_01 = Tieni una mano sulla scala e una sulla dignità. Entrambe stanno scivolando.
        #JNSQscience_evaReport_EveFlyingLowSeaofGojira_00 = Il mare sotto sembra abbastanza pesante da ammaccare il mezzo. Non lo metti alla prova.
        #JNSQscience_evaReport_EveFlyingLowSeaofGojira_01 = Controlli il cavo di sicurezza due volte e ti senti comunque poco assicurato.
        #JNSQscience_evaReport_EveFlyingLowSeaofGhidorah_00 = Striature sulla superficie si incrociano come bande di traffico. Il mare sembra trafficato.
        #JNSQscience_evaReport_EveFlyingLowSeaofGhidorah_01 = Ti chiedi cosa succederebbe se lasciassi cadere qualcosa. Decidi di non chiedertelo ad alta voce.
        #JNSQscience_evaReport_EveFlyingLowSeaofBagorah_00 = La foschia trasforma il mare di Bagorah in una macchia viola con occasionali bagliori.
        #JNSQscience_evaReport_EveFlyingLowSeaofBagorah_01 = Provi a segnare la tua posizione, ma tutto sembra della stessa tonalità di guai.
        #JNSQscience_evaReport_EveFlyingLowKrakensWell_00 = Il terreno sotto si apre in un cerchio scuro. Altimetro e nervi schizzano insieme.
        #JNSQscience_evaReport_EveFlyingLowKrakensWell_01 = Gli strumenti hanno un sussulto mentre passi sopra il Pozzo. Continui a muoverti.
        #JNSQscience_evaReport_EveInSpaceLowMountains_00 = Dall'orbita le montagne sembrano denti frastagliati. Le preferisci a distanza di sicurezza.
        #JNSQscience_evaReport_EveInSpaceLowMountains_01 = Ti chiedi se siano buoni siti d'atterraggio perché sono alti, o pessimi perché sono appuntiti.
        #JNSQscience_evaReport_EveInSpaceLow_00 = Da qui, Eve è una perla viola e liscia. Qualunque cosa ci sia laggiù è dietro una tenda che si rifiuta di aprirsi.
        #JNSQscience_evaReport_EveInSpaceLow_01 = Non distingui montagne, mari o altro, solo una foschia fitta e un abbagliamento grande quanto un pianeta.
        #JNSQscience_evaReport_EveInSpaceLow_02 = L'atmosfera diffonde la luce solare in una sfocatura morbida. Eve sembra dipinta, non mappata.
        #JNSQscience_evaReport_EveInSpaceLow_03 = Provi a individuare il tuo sito d'atterraggio. Eve risponde mostrandoti altre nubi, in nubi leggermente diverse.
        #JNSQscience_evaReport_EveInSpaceLow_04 = Il bordo del pianeta brilla con un alone viola profondo. La superficie potrebbe anche essere una voce di corridoio.
        #JNSQscience_evaReport_EveInSpaceLow_05 = Punti una fotocamera dritta verso il basso e ottieni una foto di... atmosfera. È molto atmosferica.
