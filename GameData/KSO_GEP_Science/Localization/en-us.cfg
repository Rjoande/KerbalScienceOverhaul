        #GEPscience_tantares_infrared_light_camera_ToutatisFlyingHigh_00 = At altitude, the camera sees the terminator like a thermal cliff. You file a note: “don’t fall off it.”
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowSunnyLowlands_00 = The sunlit lowlands blaze in infrared, outlining rough terrain by heat alone—useful, and slightly ominous at this distance.
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowSunnyHighlands_00 = The highlands run hotter along sun-facing slopes; you can practically read the topography in temperature.
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowTransitionalLowlands_00 = The transition band is full of subtle gradients, like the planet is trying to be reasonable and failing.
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowTransitionalHighlands_00 = Thermal striping suggests sharp relief near the twilight zone. It’s the only place that looks remotely negotiable.
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowDarkSideLowlands_00 = The nightside lowlands fade toward background cold; your spacecraft’s waste heat tries to photobomb the dataset.
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowDarkSideHighlands_00 = Cold highlands on the dark side sharpen into crisp silhouettes. The silence in the downlink is louder than usual.
        #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowSoutheasternMountains_00 = The mountains show warm spines and cold valleys, a thermal fingerprint that screams “tidal lock.”
