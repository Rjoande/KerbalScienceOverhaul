        #JNSQscience_gravityScan_DunaSrfLandedRareCraters_00 = La trazione distante di Ike compare come una lenta oscillazione nella traccia. Segni il cratere come un ottimo posto per nascondere una base dal vento, e per guardare i numeri comportarsi male.
