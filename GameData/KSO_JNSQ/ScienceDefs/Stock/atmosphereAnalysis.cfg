        LaytheFlyingLowJoolwardSea* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowJoolwardSea_00 // The analyzer detects breathable components alongside faint reactive traces that vary with wind bands. It labels the fluctuations “system-driven,” which is not comforting.
        LaytheFlyingLowJoolwardSea* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowJoolwardSea_01 // A subtle haze component shows up repeatedly, as if something is being formed and destroyed upwind. The instrument refuses to guess why, and so do you.
        LaytheFlyingLowPolwardSea* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowPolwardSea_00 // The air is cold, brisk, and loaded with wind-lifted particulates. The analyzer reports a clean gas mix and a dirty everything-else.
        LaytheFlyingLowPolwardSea* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowPolwardSea_01 // Moisture comes in sharp bursts, likely from spray ripped off the surface by gusts. The instrument records “intermittent wetness” with great precision.
        LaytheFlyingLowHighlands* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowHighlands_00 // Rising air off the highlands is drier and noticeably thinner than nearby lowlands. The analyzer marks it as “pleasant for instruments, harsh for lungs.”
        LaytheFlyingLowHighlands* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowHighlands_01 // The chemistry stays familiar while the pressure trend does not. The instrument politely reminds you that “composition” is not the same as “breathability.”
        LaytheFlyingLowMountains* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowMountains_00 // Turbulence mixes cold, thin air with occasional humid intrusions from below. The analyzer reports alternating layers like someone stacked climates in a hurry.
        LaytheFlyingLowMountains* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowMountains_01 // Trace volatiles appear in brief bursts near ridge lines, then disappear into dry flow. The instrument logs “mountain weather: chaotic.”
        LaytheFlyingLowIceCaps* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowIceCaps_00 // Air above the ice is cold and dry with drifting ice grains that confuse the particle sensor. The analyzer calls it “aerosols, but make them frozen.”
        LaytheFlyingLowIceCaps* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowIceCaps_01 // Oxygen remains present while humidity collapses with altitude and temperature. The instrument reports frost risk on anything that even thinks about being exposed.
        LaytheFlyingLowEnclosedFaults* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowEnclosedFaults_00 // The analyzer catches whiffs of trapped humid air spilling out of the cracks, mixing with drier flow above. It labels the pattern “patchy and suspicious.”
