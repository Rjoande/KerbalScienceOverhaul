        HuygenInSpaceLowMethaneLakes* = #JNSQ_bd_mapping_HuygenInSpaceLowMethaneLakes_00 // Dark, mirror-like patches flash with occasional glints when the angle is right. The map gets a note: "liquid confirmed, smell unknown."

        RigaInSpaceLowLowlands* = #JNSQ_bd_mapping_RigaInSpaceLowLowlands_00 // Riga's lowlands spread out in broad plains that look almost familiar-until you notice how quiet they are. The map feels like home seen through a wrong window.
