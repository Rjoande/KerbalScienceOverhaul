        #JNSQscience_gravityScan_VallInSpaceHighLowlands_00 = Un lieve cedimento nel campo suggerisce che i bassopiani siano più che semplice "ghiaccio piatto".
        #JNSQscience_gravityScan_VallInSpaceHighMountains_00 = A questa quota le montagne si notano a malapena: probabilmente sono offese.
        #JNSQscience_gravityScan_TyloSrfLandedPoles_00 = Il rilevatore di gravioli cala e risale come se il polo stesse nascondendo qualcosa di denso sotto tutta quella polvere pallida.
        #JNSQscience_gravityScan_TyloSrfLandedMountains_00 = Le letture hanno picchi vicino ai crinali. A quanto pare le montagne non sono solo decorative: servono anche per un po' di gravità extra.
        #JNSQscience_gravityScan_TyloSrfLandedHighlands_00 = Una trazione stabile con piccoli tremolii suggerisce una crosta spessa e molti vecchi impatti compattati in roccia ostinata.
        #JNSQscience_gravityScan_TyloSrfLandedMidlands_00 = La scansione trova dolci onde nella gravità che si allineano con catene di crateri. Tylo tiene le sue cicatrici pesanti.
        #JNSQscience_gravityScan_TyloSrfLandedLowlands_00 = Un'ampia anomalia positiva suggerisce che il bacino sia pieno di materiale più denso. L'idea di "basso" di Tylo è comunque piuttosto seria.
        #JNSQscience_gravityScan_TyloInSpaceLowPoles_00 = Sopra il polo i numeri ondeggiano, poi si stabilizzano. Le maree di Jool sembrano tirare tutta la luna come un lento metronomo.
