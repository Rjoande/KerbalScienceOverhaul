@EXPERIMENT_DEFINITION:HAS[#id[bd_multiSpec]]
{
    %RESULTS
    {
		GrannusInSpaceHigh* = #GEPscience_bd_multiSpec_GrannusInSpaceHigh_00 // From this far out, Grannus is a calm red disk—until the ultraviolet band betrays bright scars of active regions crawling across it.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthPolarZone_00 // Multispectral scans show the pole mottled with cooler patches and sudden hot flashes; Mission Control calls it “weather,” and then corrects themselves.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthSubpolarZone_00 // False-color imaging outlines a drifting band of magnetic turbulence. The antenna also outlines why the signal keeps dropping out.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthTemperateZone_00 // The “temperate” zone is still hot enough to make the detector complain in several languages. The compositional map is beautiful anyway.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowNorthTropicZone_00 // A bright ring of emission lines suggests a dense tangle of charged particles. You try not to think about what that means for your return trajectory.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowEquatorialZone_00 // The equator resolves into rolling granulation and thin, dark lanes where the spectrum shifts just enough to feel ominous.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthTropicZone_00 // The false-color pass paints the region in violent blues and yellows—apparently “just calibration,” but nobody sounds convinced over the long delay.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthTemperateZone_00 // Several bands agree on one thing: the surface isn’t “uniform,” it’s busy. Very busy. You log it as “science,” not “panic.”
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthSubpolarZone_00 // The spectral signature changes abruptly across a faint boundary, like a storm front made of plasma instead of clouds.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_multiSpec_GrannusInSpaceLowSouthPolarZone_00 // The pole looks deceptively calm in visible light; the infrared band disagrees loudly and continuously.

        TaranisInSpaceHigh* = #GEPscience_bd_multiSpec_TaranisInSpaceHigh_00 // Even from high orbit, the day-night split is stark under the dim red sun—your false-color composite looks like two different planets glued together.
        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_multiSpec_TaranisInSpaceLowMagmaSea_00 // The magma’s spectrum saturates the hot bands instantly. You switch filters and pretend you meant to do that.
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_multiSpec_TaranisInSpaceLowMagmaShores_00 // The shoreline resolves into chemical gradients—fresh flows, crusty rafts, and something that might be glass. Mission Control asks if it’s safe to sample; you laugh, eventually.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_multiSpec_TaranisInSpaceLowScorchedLowlands_00 // The baked plains reflect red light oddly and swallow other wavelengths entirely, producing a map that screams “recent melting” in polite scientific terms.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_multiSpec_TaranisInSpaceLowMidlands_00 // Multiband contrast suggests broken crust and thin dust veneers over darker rock. The terminator creeps by fast enough to keep everyone awake.
        TaranisInSpaceLowHighlands* = #GEPscience_bd_multiSpec_TaranisInSpaceLowHighlands_00 // The highlands show sharper spectral edges, like cleaner rock exposed by constant thermal cracking. The cold band is still not “cold,” just less furious.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_multiSpec_TaranisInSpaceLowDarkSideMidlands_00 // On the dark side, the infrared channel finds lingering warmth where there shouldn’t be any. You label it “interesting” and double-check your power budget.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_multiSpec_TaranisInSpaceLowDarkSideHighlands_00 // The dark highlands return a faint, flat spectrum—then spike briefly as a glint crosses the frame. Either frost, or you just found the shiniest rock in the system.
        TaranisInSpaceLowPoles* = #GEPscience_bd_multiSpec_TaranisInSpaceLowPoles_00 // The poles show subtle banding in multiple wavelengths, hinting at slow migration of volatiles trapped between blistering day and permanent night.

        ToutatisInSpaceHigh* = #GEPscience_bd_multiSpec_ToutatisInSpaceHigh_00 // The multispectral composite highlights a thin atmospheric edge on the sunlit limb, and a dark hemisphere that feels much farther from home than the numbers admit.
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowSunnyLowlands_00 // Bright dust and darker rock separate cleanly across bands, turning the lowlands into a tidy false-color geology lesson under a not-quite-friendly red sun.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowSunnyHighlands_00 // The highlands show strong mineral signatures and sharp thermal gradients, as if the ground can’t decide whether to roast or radiate.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowTransitionalLowlands_00 // The twilight zone has the strangest palette: warm enough for infrared glow, cool enough for muted visible reflectance. It looks like the planet is holding its breath.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowTransitionalHighlands_00 // Spectral ratios shift with altitude here, suggesting different rock or different dust—either way, it’s a neat find delivered with a long communications delay.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowDarkSideLowlands_00 // The dark lowlands return a cold, flat signature with occasional bright flecks. Mission Control calls them “anomalies”; you call them “don’t-lands.”
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowDarkSideHighlands_00 // The infrared band picks out faint residual heat in the highlands, implying the surface stores warmth longer than expected. The night side still looks endless.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowSoutheasternMountains_00 // Multispectral data makes the mountains pop with compositional stripes, like layered terrain exposed by stress fractures. It’s pretty in a slightly unsettling way.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowWesternMountains_00 // The western ridges show high-albedo streaks in the visible band and stubborn cold in the infrared, as if dust and rock are arguing about who owns the slope.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_multiSpec_ToutatisInSpaceLowDarkSideMountains_00 // The dark mountains are nearly featureless until a narrow band reveals faint haze pooling in valleys. You file the image, then re-check your antenna pointing.

        NodensInSpaceHigh* = #GEPscience_bd_multiSpec_NodensInSpaceHigh_00 // From high orbit, Nodens glows warmly in infrared, but the visible bands are muted by a thick haze that makes the whole world look half-remembered.
        NodensInSpaceLowSaltySeas* = #GEPscience_bd_multiSpec_NodensInSpaceLowSaltySeas_00 // The salty seas absorb red light greedily while the near-IR blooms with surface roughness; the spectrum says "wind" even if you can't feel it here.
        NodensInSpaceLowFreshWater* = #GEPscience_bd_multiSpec_NodensInSpaceLowFreshWater_00 // Fresh water patches reflect differently across bands, with a faint greenish tilt that might be algae-or just Nodens being tricky under a red sun.
        NodensInSpaceLowShores* = #GEPscience_bd_multiSpec_NodensInSpaceLowShores_00 // Along the shores, thermal bands trace warm shallows and cooler land like a tidy border drawn by physics instead of cartographers.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_NodensInSpaceLowTropicalLowlands_00 // The tropical lowlands show strong moisture signatures and strange color ratios; you mark them as "possibly lush" and try not to get attached.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_NodensInSpaceLowTemperateLowlands_00 // Temperate lowlands come out as layered tones in false color-thin clouds, thick air, and ground that keeps its secrets behind them.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_NodensInSpaceLowTropicalMidlands_00 // Midland ridges cast sharp spectral shadows; the UV band spikes at the crests, hinting at exposed minerals scrubbed clean by weather.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_NodensInSpaceLowTemperateMidlands_00 // Here the infrared map shows slow cooling after sunset, and the long delay makes the night feel like it arrives twice.
        NodensInSpaceLowHighlands* = #GEPscience_bd_multiSpec_NodensInSpaceLowHighlands_00 // Highlands read dry and bright across most bands, with pockets of cold that suggest sheltered ice hiding in places the sun can't reach.
        NodensInSpaceLowTundra* = #GEPscience_bd_multiSpec_NodensInSpaceLowTundra_00 // The tundra's spectrum is a patchwork of frost, dust, and something darker underneath-like the planet is wearing its winter coat inside out.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_multiSpec_NodensInSpaceLowIceCaps_00 // The ice caps are blinding in visible light and quiet in infrared, except for thin warm seams that look uncomfortably like cracks.

        BelisamaInSpaceHigh* = #GEPscience_bd_multiSpec_BelisamaInSpaceHigh_00 // Belisama hangs beside Nodens like a locked duet; multispectral frames show one bright face and one dark, as if the moon never quite wakes up.
        BelisamaInSpaceLowFlats* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowFlats_00 // Belisama's flats return a smooth, grey spectrum-fine regolith, heavily cooked by radiation, and not a single sign it ever had an atmosphere.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowTropicalLowlands_00 // In the "tropical" lowlands, the thermal band finds lingering warmth in dark patches, probably impact melt that refuses to let go.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowTemperateLowlands_00 // Temperate lowlands show subtle color shifts consistent with mixed grain sizes; basically, the dust has opinions about where it belongs.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowTropicalMidlands_00 // Midlands pop in ultraviolet with fresh, bright streaks-recent slides or small impacts, frozen in place by the long, cold night.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowTemperateMidlands_00 // The multispec composite highlights broad albedo swirls, like ancient tides in rock from when Belisama and Nodens first locked together.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowHighlands_00 // Highlands look brutally exposed: sharp mineral bands, hard edges, and a thermal signature that drops the moment the sun goes away.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_multiSpec_BelisamaInSpaceLowPoles_00 // At the poles, the spectrum flattens into pale frost and deep shadow; the only movement is your data crawling home at lightspeed.

        SucellusInSpaceHigh* = #GEPscience_bd_multiSpec_SucellusInSpaceHigh_00 // Even at this distance, Sucellus throws back sharp spectral edges-too clean, too metallic-like a tiny world built out of spare parts.
        SucellusInSpaceLowBasins* = #GEPscience_bd_multiSpec_SucellusInSpaceLowBasins_00 // Basins show dark, dense signatures with bright flecks in the visible band-metal-rich rubble glinting just enough to be suspicious.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_multiSpec_SucellusInSpaceLowLowlands_00 // Lowlands produce a jagged spectrum and a persistent background hiss; high radiation and exposed rock make the sensors feel jumpy.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_SucellusInSpaceLowTropicalMidlands_00 // Midlands trend warmer than they should in infrared, suggesting low thermal inertia-powdery regolith over something tougher.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_SucellusInSpaceLowTemperateMidlands_00 // In false color, temperate midlands separate into clean compositional stripes, like the dwarf planet was assembled in layers and never sanded down.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_multiSpec_SucellusInSpaceLowHighlands_00 // Highlands show crisp silicate bands and occasional reflective points; if those are metals, they're the kind that make engineers start budgeting.
        SucellusInSpaceLowPoles* = #GEPscience_bd_multiSpec_SucellusInSpaceLowPoles_00 // The poles are spectrally bland until a narrow band reveals faint volatiles trapped in shade-tiny prizes guarded by a harsh sky.

        CaireenInSpaceHigh* = #GEPscience_bd_multiSpec_CaireenInSpaceHigh_00 // Caireen is barely more than a moving speck until the filters separate it into colors: old rock, fresh scars, and a cold halo of nothing.
        CaireenInSpaceLowLowlands* = #GEPscience_bd_multiSpec_CaireenInSpaceLowLowlands_00 // Caireen's lowlands read as heavily space-weathered, with reddened slopes and a spectrum that screams "old surface, no mercy."
        CaireenInSpaceLowMidlands* = #GEPscience_bd_multiSpec_CaireenInSpaceLowMidlands_00 // Midlands show a surprising mix of colors for such a small rock-fresh fragments scattered among ancient, darkened boulders.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_multiSpec_CaireenInSpaceLowHighlands_00 // High ground reflects sharply in a few bands, like fractured stone catching the dim sun in just the right way to look alive.
        CaireenInSpaceLowPoles* = #GEPscience_bd_multiSpec_CaireenInSpaceLowPoles_00 // Near the poles, infrared drops to almost nothing while a faint bright line hints at frost tucked into permanent shadow pockets.

        SironaInSpaceHigh* = #GEPscience_bd_multiSpec_SironaInSpaceHigh_00 // Multispectral frames turn Sirona into a living weather map—methane bands, heat bloom, and auroral curtains—filed home a few seconds late from very far away.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_multiSpec_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands swallow red light and leak infrared from below, hinting at warm upwellings hidden under a thick, restless sky.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_multiSpec_SironaInSpaceLowLightTropicalBands_00 // Bright cloudtops glare in the visible channels while the methane band cuts them down to shape; the result looks like a storm system with an attitude.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_multiSpec_SironaInSpaceLowDarkTemperateBands_00 // Temperature gradients sharpen into long stripes, and the spectrum says “fast winds” even if all you can hear is the radio hiss.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_multiSpec_SironaInSpaceLowLightTemperateBands_00 // Higher, paler clouds reflect what little sunlight they get; the false-color composite makes the banding look almost neatly organized. Almost.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_multiSpec_SironaInSpaceLowDarkPolarBands_00 // Ultraviolet spikes trace a jagged auroral ring over the dark polar band—Sirona’s magnetic field signing the image in bright ink.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_multiSpec_SironaInSpaceLowLightPolarBands_00 // The light polar band looks calm in visible light, but the infrared channel shows churning heat beneath, like the planet refuses to cool down.

        AirmedInSpaceHigh* = #GEPscience_bd_multiSpec_AirmedInSpaceHigh_00 // From high orbit, Airmed’s two-toned face separates cleanly by wavelength—old bruises, newer scars, and a surface that’s been sandblasted by Sirona’s neighborhood.
        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowTropicalLowlands_00 // The lowlands split into fresh and weathered patches across the bands; the “fresh” parts still look hostile, just more photogenic.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowTemperateLowlands_00 // Thermal bands show rapid cooling as the long night comes on; the light-time delay makes the darkness feel like it arrives in installments.
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowTropicalMidlands_00 // Spectral edges sharpen over ridges, suggesting exposed rock with less dust cover—either recent impacts, or the surface simply refusing to stay tidy.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowTemperateMidlands_00 // The multispec composite highlights subtle compositional streaks, like layers of damage recorded in minerals instead of paperwork.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowHighlands_00 // Highlands reflect brightly in a few narrow bands, then vanish in others—clean stone and sharp shadows under a dim, red sun.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowDarkenedLowlands_00 // The darkened lowlands show flattened reflectance and a harsh UV response, consistent with heavy radiation cooking the top layer into something new.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowDarkenedMidlands_00 // False-color mapping reveals the darkened midlands creeping up-slope in fingers, as if the moon is slowly being “repainted” by space weather.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_multiSpec_AirmedInSpaceLowDarkenedHighlands_00 // Even the high ground isn’t spared: the spectrum reads scoured and altered, with bright micro-glints that might be fresh fragments—or sensor anxiety.
        AirmedInSpaceLowPoles* = #GEPscience_bd_multiSpec_AirmedInSpaceLowPoles_00 // Polar pockets stay colder in infrared, and a faint bright line in a narrow band hints at volatiles hiding where sunlight never quite commits.

        BorvoInSpaceHigh* = #GEPscience_bd_multiSpec_BorvoInSpaceHigh_00 // Borvo’s limb shows a thin atmospheric edge in multiple bands; the planet feels almost “alive” until you remember how far the signal has to travel.
        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_multiSpec_BorvoInSpaceLowTropicalCraquelure_00 // The cracked terrain lights up in thermal contrast, suggesting a brittle crust over something softer—ice, dust, or both arguing at once.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_multiSpec_BorvoInSpaceLowTemperateCraquelure_00 // Spectral ratios shift across the fractures, as if the cracks are exposing cleaner material beneath a stained surface film.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_BorvoInSpaceLowTropicalLowlands_00 // Lowlands absorb strongly in the methane-sensitive band, while near-IR hints at widespread frost or pale dust just under the haze.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_BorvoInSpaceLowTemperateLowlands_00 // The false-color composite shows muted browns and cold blues; the instrument can’t decide if it’s rocky warmth or icy patience.
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_BorvoInSpaceLowTropicalMidlands_00 // Midlands show a patchwork of reflectance consistent with mixed grain sizes—fine dust in hollows, coarser material on slopes.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_BorvoInSpaceLowTemperateMidlands_00 // In twilight lighting, the infrared channel keeps glowing long after the visible image fades, suggesting a surface that holds heat longer than expected.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_multiSpec_BorvoInSpaceLowHighlands_00 // Highlands come through cleaner in several bands, implying thinner atmosphere overhead and less haze—finally, a clear look at whatever Borvo is made of.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_multiSpec_BorvoInSpaceLowMajorCraters_00 // Crater floors and ejecta sort into distinct spectral signatures; something down there is different enough to be worth the extra data transmission.
        BorvoInSpaceLowPoles* = #GEPscience_bd_multiSpec_BorvoInSpaceLowPoles_00 // The poles show bright, cold patches that stay bright across multiple bands—if it’s ice, it’s stubborn; if it’s rock, it’s very committed to the bit.

        DamonaInSpaceHigh* = #GEPscience_bd_multiSpec_DamonaInSpaceHigh_00 // Damona is a gray, pockmarked dot until the filters separate it into age and composition—then it becomes a catalog of impacts written under red starlight.
        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_DamonaInSpaceLowTropicalLowlands_00 // Lowlands read dark and uniform across most bands, consistent with mature regolith that’s been micrometeoroid-processed into fine, tired dust.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_DamonaInSpaceLowTemperateLowlands_00 // Subtle color shifts outline buried structures beneath the dust; the surface looks simple until the spectrum insists it isn’t.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_DamonaInSpaceLowTropicalMidlands_00 // Midlands show brighter streaks in a narrow band, like fresh slides that haven’t had time to be “space-aged” yet.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_DamonaInSpaceLowTemperateMidlands_00 // Thermal imaging reveals sharp day-night contrast and almost no heat retention; the night side looks clinically empty.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_multiSpec_DamonaInSpaceLowHighlands_00 // Highlands reflect more strongly in several channels, suggesting cleaner rock exposure; it’s the closest thing to “new” you’ll find out here.
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_multiSpec_DamonaInSpaceLowImpactBasin_00 // The basin sorts into distinct ejecta zones by wavelength—deep excavated material, lighter veneers, and a center that looks like it remembers the event.
        DamonaInSpaceLowPoles* = #GEPscience_bd_multiSpec_DamonaInSpaceLowPoles_00 // Permanent shadow pockets stay cold in infrared and bright in a frost-friendly band; tiny reserves, patiently waiting for a mission that can afford the travel time.

        EponaInSpaceHigh* = #GEPscience_bd_multiSpec_EponaInSpaceHigh_00 // Multispectral passes separate Epona into cold ice, faint haze, and thin methane signatures—each packet arriving late enough to remind you how far “home” is.
        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_EponaInSpaceLowTropicalLowlands_00 // The tropical lowlands look smooth in visible light, but near-IR picks out frosty textures and subtle banding that hints at recent resurfacing under the dim red sun.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_EponaInSpaceLowTemperateLowlands_00 // Thermal channels show the lowlands bleeding heat slowly into the long night; whatever’s beneath the crust doesn’t cool like dead rock.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_multiSpec_EponaInSpaceLowTropicalUplands_00 // Upland spectra shift toward cleaner ice and harder minerals, like the wind (or something) has been sanding the surface for ages.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_multiSpec_EponaInSpaceLowTemperateUplands_00 // False-color mapping highlights broad, faint streaks—deposits laid down in layers, then quietly rewritten by frost and time.
        EponaInSpaceLowHighlands* = #GEPscience_bd_multiSpec_EponaInSpaceLowHighlands_00 // The highlands come back bright in ice-friendly bands and dull in others; the composition reads “frozen and complicated,” which is not very comforting.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_multiSpec_EponaInSpaceLowGrandPeaks_00 // The grand peaks cast razor thermal shadows and return crisp mineral edges, as if they’re freshly exposed in a world that should be fully coated in frost.
        EponaInSpaceLowCraters* = #GEPscience_bd_multiSpec_EponaInSpaceLowCraters_00 // Ejecta blankets sort cleanly by wavelength—dark, old surface on top, brighter excavated material underneath, and a rim that looks disturbingly “new.”
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_multiSpec_EponaInSpaceLowVolcanoes_00 // Localized hot spots flare in infrared where the visible image stays quiet; either Epona has a warm heart, or your instrument is trying to start rumors.
        EponaInSpaceLowPoles* = #GEPscience_bd_multiSpec_EponaInSpaceLowPoles_00 // Polar cold traps glow faintly in a narrow band consistent with volatiles; tiny reserves, waiting patiently for missions with better signal strength.

        RosmertaInSpaceHigh* = #GEPscience_bd_multiSpec_RosmertaInSpaceHigh_00 // From high orbit, Rosmerta is a pale, airless coin with harsh UV response—an unfriendly reminder of what radiation does this far from anything familiar.
        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_RosmertaInSpaceLowTropicalLowlands_00 // The lowlands read dark and weathered across most bands, with occasional bright specks that look like fresh fragments sprinkled over old dust.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_RosmertaInSpaceLowTemperateLowlands_00 // Thermal scans show rapid sunset cooling; the surface doesn’t hold warmth, it just stops having it.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_RosmertaInSpaceLowTropicalMidlands_00 // Midlands show a patchwork spectrum—mixed grain sizes and exposed rock—like the regolith can’t decide whether to hide the geology or advertise it.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_RosmertaInSpaceLowTemperateMidlands_00 // False-color composites reveal faint compositional stripes that run straight for kilometers, as if the moon was assembled in layers and never blended.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_multiSpec_RosmertaInSpaceLowHighlands_00 // The highlands return sharper mineral bands and deeper shadows; even the scanner feels like it’s squinting in the dim red light.
        RosmertaInSpaceLowPoles* = #GEPscience_bd_multiSpec_RosmertaInSpaceLowPoles_00 // Polar pockets stay colder and brighter in frost-sensitive channels, suggesting stubborn ice tucked into permanent shade.

        RAB-58EInSpaceHigh* = #GEPscience_bd_multiSpec_RAB-58EInSpaceHigh_00 // At distance, RAB-58E is just a drifting dot—until multispectral separation shows it’s either very icy, very rocky, or very good at lying.
        RAB-58EInSpaceLowLowlands* = #GEPscience_bd_multiSpec_RAB-58EInSpaceLowLowlands_00 // The lowlands lean toward a flatter, darker spectrum typical of mature rubble; if there’s ice, it’s keeping a low profile.
        RAB-58EInSpaceLowEasternHighlands* = #GEPscience_bd_multiSpec_RAB-58EInSpaceLowEasternHighlands_00 // The eastern highlands brighten in near-IR and drop in thermal emission, consistent with cleaner ice or freshly fractured material.
        RAB-58EInSpaceLowWesternHighlands* = #GEPscience_bd_multiSpec_RAB-58EInSpaceLowWesternHighlands_00 // The western highlands show a different color ratio than the east; captured body or not, it’s definitely not uniform.

        CernunnosInSpaceHigh* = #GEPscience_bd_multiSpec_CernunnosInSpaceHigh_00 // Cernunnos resolves into a cold, icy dwarf with faint albedo mottling—an entire world of “outskirts” transmitted across a very long silence.
        CernunnosInSpaceLowTropicalLowlands* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowTropicalLowlands_00 // The tropical lowlands absorb the red sunlight oddly and shine in ice bands, suggesting dirty frost layered over something darker.
        CernunnosInSpaceLowTemperateLowlands* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowTemperateLowlands_00 // Thermal imaging shows shallow temperature gradients and slow cooling; the surface behaves like packed ice mixed with fine dust.
        CernunnosInSpaceLowTropicalMidlands* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowTropicalMidlands_00 // Multispectral ratios shift with altitude, separating older, darkened terrain from brighter exposures that look freshly scoured.
        CernunnosInSpaceLowTemperateMidlands* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowTemperateMidlands_00 // False-color mapping paints long streaks that ignore topography—deposits laid down by ancient processes that didn’t ask permission from the landscape.
        CernunnosInSpaceLowHighlands* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowHighlands_00 // The highlands return crisp spectral edges and stark contrast; clean ice and hard minerals, lit by a sun that feels too far away to matter.
        CernunnosInSpaceLowSouthPolarHills* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowSouthPolarHills_00 // Polar hills show bright, cold signatures with faint volatile hints—small caches guarded by shadow and distance.
        CernunnosInSpaceLowNorthPole* = #GEPscience_bd_multiSpec_CernunnosInSpaceLowNorthPole_00 // The north pole is blinding in visible light and quiet in infrared, except for a few warm seams that look uncomfortably like recent disturbance.
	}
}