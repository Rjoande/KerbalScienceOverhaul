        #JNSQscience_bd_XRayImaging_HuygenInSpaceLow_00 = The hazy moon adds its own soft absorption and stray glow, so you lean on harder bands and still catch a few sharp, violent emitters.
        #JNSQscience_bd_XRayImaging_HuygenInSpaceHigh_00 = Away from Huygen’s haze, the imager builds a crisp map of high-energy points that definitely aren’t “normal” starlight.
        #JNSQscience_bd_XRayImaging_RigaInSpaceLow_00 = Riga’s broad disk blocks the worst background and the detector immediately finds several stubborn X-ray sources that refuse to be quiet.
        #JNSQscience_bd_XRayImaging_RigaInSpaceHigh_00 = High above the big brown marble, the counts come slow and clean—until a brief burst spikes the chart and ruins your calm.
        #JNSQscience_bd_XRayImaging_TalosInSpaceLow_00 = Talos provides almost no local interference, which is perfect—right up until the instrument catches a sudden flash from something unimaginably hot.
        #JNSQscience_bd_XRayImaging_TalosInSpaceHigh_00 = Out in the cold, dark high orbit, the sky becomes a thin constellation of hard X-rays: distant furnaces burning with no visible flame.
        #JNSQscience_bd_XRayImaging_EelooInSpaceLow_00 = Eeloo makes an excellent sunshade; with the glare down, faint X-ray pinpricks appear—distant gas heated far beyond “reasonable.”
