        #JNSQscience_sspxFishStudy_NaraInSpaceLow_00 = Le bande scure di Nara scorrono sotto come una biglia tempestosa. I pesci seguono le ombre in movimento e per un minuto si dimenticano di essere drammatici.
        #JNSQscience_sspxFishStudy_NaraInSpaceLow_01 = Le correnti della vasca si allineano con il controllo d'assetto della stazione. I pesci nuotano subito contro, giusto per dimostrare qualcosa.
