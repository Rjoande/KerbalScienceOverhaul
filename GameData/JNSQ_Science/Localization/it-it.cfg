        #JNSQscience_bd_cosmicRay_AdenSrfLandedPoles_00 = Vicino ai poli il contatore vibra in brevi scrosci, come se le particelle venissero incanalate lungo percorsi invisibili.
        #JNSQscience_bd_cosmicRay_AdenInSpaceLowLowlands_00 = In orbita bassa, intercetti primari sopra e un lieve rimbalzo rumoroso dalla superficie sotto.
