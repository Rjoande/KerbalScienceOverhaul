@EXPERIMENT_DEFINITION:HAS[#id[bd_SiteSurvey]]
{
	@title = #ScienceRefactor_bd_SiteSurvey_title // Site Survey Imagery
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_SiteSurvey_default_00 // Site Survey Complete.
        SrfLanded* = #ScienceRefactor_bd_SiteSurvey_default_01 // Finished taking pictures of the landing site.
        SrfLanded* = #ScienceRefactor_bd_SiteSurvey_default_02 // Sending landing site pictures for analysis.
        
        MohoSrfLanded* = #ScienceRefactor_bd_SiteSurvey_MohoSrfLanded_00 // That's not the landing leg melting, is it?
        MohoSrfLanded* = #ScienceRefactor_bd_SiteSurvey_MohoSrfLanded_01 // Moho has less impact craters than we expected. The relatively smooth surface should be safe for future landings.
        MohoSrfLandedNorthPole* = #ScienceRefactor_bd_SiteSurvey_MohoSrfLandedNorthPole_00 // Woah! Is that a hole on the surface? That looks unsafe.
        
        EveSrfLanded* = #ScienceRefactor_bd_SiteSurvey_EveSrfLanded_00 // Eve's terrain appears safe enough to land, but not safe enough to take off again.
        EveSrfLanded* = #ScienceRefactor_bd_SiteSurvey_EveSrfLanded_01 // Sending pictures from Eve, with love.
        EveSrfSplashed* = #ScienceRefactor_bd_SiteSurvey_EveSrfSplashed_00 // We'll need a chemical analysis of this liquid before we can determine its safety.
        EveSrfSplashed* = #ScienceRefactor_bd_SiteSurvey_EveSrfSplashed_01 // Landing here may pose an even greater challenge to ever leaving again.
	
		GillySrfLanded* = #ScienceRefactor_bd_SiteSurvey_GillySrfLanded_00 // Gilly's surface is mostly smooth with only small rocks scattered about.
		GillySrfLanded* = #ScienceRefactor_bd_SiteSurvey_GillySrfLanded_01 // Just looking at the rocks on the pictures almost sends them on a scape trajectory.
	
        KerbinSrfLanded* = #ScienceRefactor_bd_SiteSurvey_KerbinSrfLanded_00 // Kerbin looks safe enough to land a crew without their space suits.
        KerbinSrfSplashed* = #ScienceRefactor_bd_SiteSurvey_KerbinSrfSplashed_00 // Spacecraft will need to be both buoyant and waterproof to land out here.
        KerbinSrfLandedKSC* = #ScienceRefactor_bd_SiteSurvey_KerbinSrfLandedKSC_00 // The camera captures a lot of eager interns and test subjects gathering around gawking at the spacecraft.
	
		MunSrfLanded* = #ScienceRefactor_bd_SiteSurvey_MunSrfLanded_00 // The Mun's many craters create elevation changes challenging for manned landing, and shadows over solar panels when the sun is low on the horizon.
		MunSrfLanded* = #ScienceRefactor_bd_SiteSurvey_MunSrfLanded_01 // This mosaic of images from the surface will get lots of likes in social media.
		
		MinmusSrfLanded* = #ScienceRefactor_bd_SiteSurvey_MinmusSrfLanded_00 // Scientists look at the gray surface and think we've landed in the wrong moon. The engineers tell them that the camera does not take color pictures.
		MinmusSrfLanded* = #ScienceRefactor_bd_SiteSurvey_MinmusSrfLanded_01 // Images show lots of big hills with awkward angles for landing, but also large flat and smooth areas.
	
        DunaSrfLanded* = #ScienceRefactor_bd_SiteSurvey_DunaSrfLanded_00 // No aliens in sight. Who built those canals?
        DunaSrfLanded* = #ScienceRefactor_bd_SiteSurvey_DunaSrfLanded_01 // The surface appears very dusty but the terrain looks safe for Kerbonaut landings.
	
		IkeSrfLanded* = #ScienceRefactor_bd_SiteSurvey_IkeSrfLanded_00 // We like Ike. Very rocky surface with lots of smaller rocks scattered about for sampling.
		
        DresSrfLanded* = #ScienceRefactor_bd_SiteSurvey_DresSrfLanded_00 // The landing site is very moon-like but less dusty. KSC determines it safe but boring for Kerbonaut missions.
        DresSrfLanded* = #ScienceRefactor_bd_SiteSurvey_DresSrfLanded_01 // Images show many hills that could possibly impede safe manned landings. Val volunteers to land there anyway.
	
	    JoolSrfLanded* = #ScienceRefactor_bd_SiteSurvey_JoolSrfLanded_00 // If the survey lander made it safely, Kerbonauts should as well, right?
	
		LaytheSrfLanded* = #ScienceRefactor_bd_SiteSurvey_LaytheSrfLanded_00 // That's a lot of water! Careful trajectories will be needed to ensure a landing on ground.
		LaytheSrfLanded* = #ScienceRefactor_bd_SiteSurvey_LaytheSrfLanded_01 // Laythe looks like a perfect vacation spot! #Summer #Beaches #BringYourOwnAir.
		LaytheSrfSplashed* = #ScienceRefactor_bd_SiteSurvey_LaytheSrfSplashed_00 // That's a lot of water! Future missions should be water-proof and buoyant.
		
		VallSrfLanded* = #ScienceRefactor_bd_SiteSurvey_VallSrfLanded_00 // The terrain is very uneven with some tall connected ridges that could be signs of tectonic activity.
		VallSrfLanded* = #ScienceRefactor_bd_SiteSurvey_VallSrfLanded_01 // Uneven terrain should pose a challenge for a crewed landing. Be sure to send an experienced pilot.
		
		TyloSrfLanded* = #ScienceRefactor_bd_SiteSurvey_TyloSrfLanded_00 // The surface is very rocky and with some uneven terrain and big elevation changes.
		
		BopSrfLanded* = #ScienceRefactor_bd_SiteSurvey_BopSrfLanded_00 // Analysis of Bop's interesting and very irregular terrain is undermined by the fact that someone swears they saw a tentacle.
		BopSrfLanded* = #ScienceRefactor_bd_SiteSurvey_BopSrfLanded_01 // Some guys in black suits, hats and shades took one of the survey pictures before we could analyze it, said something about planetary safety.
		
		PolSrfLanded* = #ScienceRefactor_bd_SiteSurvey_PolSrfLanded_00 // The surface is very irregular and spiky. There a lots of mountains and uneven valleys. Bring enough fuel for Kerbonauts to find a safe spot.
		
	    EeelooSrfLanded* = #ScienceRefactor_bd_SiteSurvey_EeelooSrfLanded_00 // Eeloo's surface is relatively smooth. The high reflectiveness of the surface material confirms ice coverage. The crew should bring ice skates.
	}
}