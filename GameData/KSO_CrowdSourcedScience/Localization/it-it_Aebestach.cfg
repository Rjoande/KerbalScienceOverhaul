        //   Eeloo
        #CSS_Aebestach_mobileMaterialsLab_Eeloo_01 = Poli di Eeloo. Materiali di ghiaccio.
        #CSS_Aebestach_mobileMaterialsLab_Eeloo_02 = Fragipan di Eeloo. Materiali congelati.
        #CSS_Aebestach_mobileMaterialsLab_Eeloo_03 = Campo di Babbage di Eeloo. Materiali ghiacciati.
        #CSS_Aebestach_mobileMaterialsLab_Eeloo_04 = Ghiacciai australi di Eeloo. Materiali da ghiacciaio.
        #CSS_Aebestach_mobileMaterialsLab_Eeloo_05 = Ghiacciaio Mu di Eeloo. Materiali dal fiume di ghiaccio.

// --- temperatureScan ---
        //   Sun
        #CSS_Aebestach_temperatureScan_Sun_01 = Il termometro è esploso. Annotato: "molto caldo".
        #CSS_Aebestach_temperatureScan_Sun_02 = Lettura fuori scala. Conclusione scientifica: non avvicinarsi a Sole.
        //   Moho
        #CSS_Aebestach_temperatureScan_Moho_01 = Bassopiani occidentali di Moho. Superficie arrostita dal sole.
        #CSS_Aebestach_temperatureScan_Moho_02 = Bassopiani sud-occidentali di Moho. Ancora più caldo.
        #CSS_Aebestach_temperatureScan_Moho_03 = Polo sud di Moho. Abbastanza caldo da mettere in dubbio tutto.
        //   Eve
        #CSS_Aebestach_temperatureScan_Eve_01 = Lettura termica sul bordo del cratere. Il calore dell'impatto è svanito da tempo. Le rocce viola sono ancora tiepide per via del sole. O per qualcos'altro.
        //   Kerbin
        #CSS_Aebestach_temperatureScan_Kerbin_MiniBiomes_01 = Volo a bassa quota sul Centro Spaziale Kerbal. Il calore del motore altera le letture. Scienza comunque!
        #CSS_Aebestach_temperatureScan_Kerbin_MiniBiomes_02 = Alta quota sul Centro Spaziale Kerbal. Aria fredda e rarefatta. La pista sembra un giocattolo da quassù.
        //   Mun
        #CSS_Aebestach_temperatureScan_Mun_01 = Bassopiani di Mun: enorme escursione termica giorno-notte. Annotato.
        #CSS_Aebestach_temperatureScan_Mun_02 = Bacino Facciaoscura. La temperatura differisce dalla faccia visibile. Scienza!
        //   Minmus
        #CSS_Aebestach_temperatureScan_Minmus_01 = Pianure di Minmus. Temperature color menta.
        #CSS_Aebestach_temperatureScan_Minmus_02 = Declivi di Minmus. Gradiente termico.
        #CSS_Aebestach_temperatureScan_Minmus_03 = Orbita alta di Minmus. Al confine del mondo di ghiaccio.
        //   Dres
        #CSS_Aebestach_temperatureScan_Dres_01 = Poli di Dres. Freddo. Freddo da pianeta nano.
        #CSS_Aebestach_temperatureScan_Dres_02 = Pianure di Dres. Temperature grigie.
        #CSS_Aebestach_temperatureScan_Dres_03 = Bassopiani di Dres. Temperature grigie e piatte.
        #CSS_Aebestach_temperatureScan_Dres_04 = Crateri da impatto di Dres. Temperature nel bacino da impatto.
        #CSS_Aebestach_temperatureScan_Dres_05 = Piroclasti da impatto di Dres. Temperature tra i piroclasti.
        #CSS_Aebestach_temperatureScan_Dres_06 = Orbita bassa di Dres. Pianeta nano in basso.
        #CSS_Aebestach_temperatureScan_Dres_07 = Orbita alta di Dres. Pianeta nano solitario.
        //   Jool
        #CSS_Aebestach_temperatureScan_Jool_01 = Scansione termica in orbita alta. Jool irradia più calore di quanto ne riceva. Termodinamica dei giganti gassosi: confusa, ma verde.
        //   Vall
        #CSS_Aebestach_temperatureScan_Vall_01 = Poli di Vall. Freddo estremo.
        #CSS_Aebestach_temperatureScan_Vall_02 = Pianure di Vall. Temperature da mondo di ghiaccio.
        #CSS_Aebestach_temperatureScan_Vall_03 = Bassopiani e bacini di Vall. Temperature della crosta di ghiaccio.
        #CSS_Aebestach_temperatureScan_Vall_04 = Orbita alta di Vall. Vall brilla di blu in basso.
        //   Tylo
        #CSS_Aebestach_temperatureScan_Tylo_01 = Pianure di Tylo. Freddo. Freddo da Tylo.
        #CSS_Aebestach_temperatureScan_Tylo_02 = Colline di Tylo. Ancora più freddo.
        #CSS_Aebestach_temperatureScan_Tylo_03 = Bassopiani di Tylo. Temperature nel bacino da impatto.
        #CSS_Aebestach_temperatureScan_Tylo_04 = Orbita alta di Tylo. La grande luna da lontano.
        //   Bop
        #CSS_Aebestach_temperatureScan_Bop_01 = Lettura della temperatura sulle dorsali di Bop. Sospettosamente nella norma.
        #CSS_Aebestach_temperatureScan_Bop_02 = I declivi sono freddi. Il termometro concorda. Anche tu.
        #CSS_Aebestach_temperatureScan_Bop_03 = Il fondovalle è leggermente più caldo. Forse è un'illusione. Forse è Bop.
        #CSS_Aebestach_temperatureScan_Bop_04 = Scansione termica in orbita bassa. Bop irradia un calore inquietante dal basso. O forse no.
        #CSS_Aebestach_temperatureScan_Bop_05 = Scansione termica in orbita alta. Le radiazioni di Jool rendono tutte le letture inaffidabili. Annotato.
        //   Pol
        #CSS_Aebestach_temperatureScan_Pol_01 = Poli di Pol. Freddo: l'equilibrio termico porta la temperatura superficiale vicino alla sublimazione del ghiaccio di azoto. Freddo da Pol. Le tue dita lo sapevano già.
        #CSS_Aebestach_temperatureScan_Pol_02 = Temperature nei bassopiani di Pol. Temperature chiazzate su una superficie chiazzata.
        #CSS_Aebestach_temperatureScan_Pol_03 = Pianure di Pol. La temperatura sfida ogni classificazione. Come Pol.
        #CSS_Aebestach_temperatureScan_Pol_04 = Orbita alta di Pol. Il calore della piccola luna è trascurabile.
