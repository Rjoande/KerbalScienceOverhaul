        DakSrfLandedLowlands* = #JNSQscience_mysteryGoo_DakSrfLandedLowlands_00 // The Goo flattens itself against the container wall, as if trying to become “lowland” too. It does a very slow, dramatic wiggle of approval.
        DakSrfLandedLowlands* = #JNSQscience_mysteryGoo_DakSrfLandedLowlands_01 // The Goo gathers into a lopsided lump and stubbornly refuses to let go. You record this as “potato solidarity.”
        DakSrfLandedMidlands* = #JNSQscience_mysteryGoo_DakSrfLandedMidlands_00 // The Goo sprouts tiny ridges and valleys that rearrange whenever you blink. It seems proud of its uneven craftsmanship.
        DakSrfLandedMidlands* = #JNSQscience_mysteryGoo_DakSrfLandedMidlands_01 // The Goo repeatedly forms a little “mountain,” then topples it on purpose. It appears to be studying erosion through comedy.
        DakSrfLandedHighlands* = #JNSQscience_mysteryGoo_DakSrfLandedHighlands_00 // The Goo stretches into sharp points and presses them at the lid, like it’s listening for a call. You decide not to open it any wider.
        DakSrfLandedHighlands* = #JNSQscience_mysteryGoo_DakSrfLandedHighlands_01 // The Goo clings to one side of the container and stares at the rocks outside with unsettling focus. You log: “uncooperative, but motivated.”
        DakInSpaceLow* = #JNSQscience_mysteryGoo_DakInSpaceLow_00 // The Goo sloshes toward Dak’s side of the canister, as if trying to hug the moon from orbit. It leaves tiny smears that look suspiciously like handprints.
        DakInSpaceLow* = #JNSQscience_mysteryGoo_DakInSpaceLow_01 // The Goo spins into a neat spiral and refuses to wobble, unlike your orbit. You suspect it’s mocking the guidance computer.
        DakInSpaceHigh* = #JNSQscience_mysteryGoo_DakInSpaceHigh_00 // The Goo drifts into a small ball and sits very still, as if waiting for something to happen. You feel judged by a snack.
        DakInSpaceHigh* = #JNSQscience_mysteryGoo_DakInSpaceHigh_01 // The Goo stretches a thin strand toward the distant speck of Dak, then snaps it back inside like it got embarrassed. You record “homesick behavior.”

        DresSrfLandedPoles* = #JNSQscience_mysteryGoo_DresSrfLandedPoles_00 // The Goo huddles into a tight ball and develops a faint “don’t touch me” sheen. It seems to prefer the shadows here.
        DresSrfLandedPoles* = #JNSQscience_mysteryGoo_DresSrfLandedPoles_01 // The Goo grows tiny spikes that point away from the horizon. You record this as “defensive posturing” and also “mildly rude.”
