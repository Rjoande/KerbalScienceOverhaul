        #JNSQscience_gravityScan_LaytheSrfLandedMidlands_00 = Quasi tutto sembra normale finché il rilevatore non coglie sottili increspature che si allineano fin troppo bene con il terreno.
        #JNSQscience_gravityScan_LaytheSrfSplashedShores_00 = I gravioli non sanno decidere se stiano misurando la luna o l'onda su cui sei seduto in questo momento.
        #JNSQscience_gravityScan_LaytheSrfSplashedShallows_00 = Il rilevatore sussulta ogni volta che il mezzo ondeggia, poi si stabilizza quando percepisce un terreno solido, scomodamente vicino sotto.
        #JNSQscience_gravityScan_LaytheSrfSplashedInlandWater_00 = Le letture si assestano in un motivo quieto, suggerendo un bacino profondo con una massa sorprendentemente uniforme sotto.
        #JNSQscience_gravityScan_LaytheSrfSplashedKrenwichSea_00 = La gravità sale e scende in un lento impulso che sembra sospettosamente sincronizzato con la grande cosa verde in cielo.
        #JNSQscience_gravityScan_LaytheSrfSplashedArcticSea_00 = La scansione mostra un lieve bias persistente, come se acqua più fredda e ghiaccio nascosto stessero riorganizzando silenziosamente la massa locale.
        #JNSQscience_gravityScan_LaytheSrfSplashedJoolwardSea_00 = Il rilevatore registra una trazione sbilanciata che sembra inclinarsi verso Jool, come se il mare venisse delicatamente stirato in quella direzione.
        #JNSQscience_gravityScan_LaytheSrfSplashedPolwardSea_00 = I numeri derivano e ondeggiano, e i gravioli insistono che i poli non siano simmetrici quanto vorrebbero le mappe.
        #JNSQscience_gravityScan_LaytheSrfSplashedEnclosedFaults_00 = Le pareti del bacino creano netti gradienti gravitazionali che fanno sembrare il rilevatore come se stesse litigando con se stesso.
        #JNSQscience_gravityScan_LaytheInSpaceLowShallows_00 = Dall'orbita bassa, le basse acque tracciano la costa con un motivo gravitazionale ordinato, come un sottile strato drappeggiato su un terreno più pesante.
