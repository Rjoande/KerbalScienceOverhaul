        #JNSQscience_evaReport_PraxSrfLandedLowlands_00 = The flats are empty in a way that makes you feel like a trespasser. You plant your boots carefully, as if the dust might complain.
        #JNSQscience_evaReport_PraxSrfLandedMidlands_00 = The midlands are rough and uneven, full of small ridges that catch your toes mid-hop. You log it as “excellent for building character.”
        #JNSQscience_evaReport_PraxSrfLandedHighlands_00 = The highlands stretch out like unfinished construction. Prax looks assembled from spare parts, but it’s holding together impressively.
        #JNSQscience_evaReport_PraxSrfLandedMountains_00 = Up in the mountains, every jump threatens to turn into accidental flight. You decide to keep at least one hand near the ground at all times.
        #JNSQscience_evaReport_PraxSrfLandedPoles_00 = The poles feel like the edge of a very cold map. You stare out and understand why people call this a fringe world.
        #JNSQscience_evaReport_PraxInSpaceLowLowlands_00 = Hovering above the lowlands, Prax looks lonely and under-decorated. You consider drawing a smiley face in the dust, then remember “science.”
        #JNSQscience_evaReport_PraxInSpaceLowMidlands_00 = From just above the midlands, the surface shows scuffed bands and small breaks in the crust. It looks like Prax has been through things and never wrote home.
        #JNSQscience_evaReport_PraxInSpaceLowHighlands_00 = The highlands pass beneath you like worn stone waves. You feel a strange urge to explore every line, even though your suit strongly disagrees.
        #JNSQscience_evaReport_PraxInSpaceLowMountains_00 = Over the mountains, the terrain turns jagged and dramatic, like it’s trying to look important next to Nara. It succeeds a little.
        #JNSQscience_evaReport_PraxInSpaceLowPoles_00 = Above the poles, the shadows deepen and the horizon feels farther away than it should. You make a note to invent a better word than “remote.”
