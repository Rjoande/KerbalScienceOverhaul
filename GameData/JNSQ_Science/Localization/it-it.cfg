        #JNSQscience_bd_XRayDiffract_DresSrfLandedMidlands_00 = Minerali pallidi e secchi dominano la scansione con picchi attenuati, come se Dres avesse lisciviato con cura qualunque cosa interessante e tenuto solo l'essenziale.
        #JNSQscience_bd_XRayDiffract_DresSrfLandedCanyon_00 = Strati esposti restituiscono un tracciato più pulito e vario, cristalli rivelati di fresco e fasi di breccia che la polvere superficiale di solito nasconde.
        #JNSQscience_bd_XRayDiffract_LaytheSrfLandedShallows_00 = Il tracciato di diffrazione mostra croste salate mescolate a minerali di sabbia bagnata: Laythe sta facendo del suo meglio per trasformare il campione in cemento di salamoia.
        #JNSQscience_bd_XRayDiffract_LaytheSrfLandedHighlands_00 = Grani rimaneggiati dal vento dominano i picchi, con alcune fasi insolite che sembrano essere state bagnate, asciugate e macinate di nuovo più volte.
        #JNSQscience_bd_XRayDiffract_LaytheSrfLandedMountains_00 = Spiccano reticelle cristalline sotto sforzo e robuste fasi silicatate: qualunque cosa abbia costruito queste altitudini non l'ha fatto con delicatezza.
