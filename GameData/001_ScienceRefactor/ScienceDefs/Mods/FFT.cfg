// StockScienceRefactor — Wildcardize Stock Science Results
// Converts deterministic stock RESULTS into variant-enabled pools (*).
// This unlocks result alternation and full compatibility with CSS and extension packs.
// `default` entries are preserved without wildcard, per KSP fallback rules.
// No new science text is added; this patch refactors stock behavior only.

@EXPERIMENT_DEFINITION:HAS[#id[fftParticleDetector]]
{
	!RESULTS {}
	%RESULTS
	{
		default = #LOC_FFT_ScienceDef_fftParticleDetector_default

        SunInSpaceLow* = #LOC_FFT_ScienceDef_fftParticleDetector_SunInSpaceLow
        KerbinInSpaceLow* = #LOC_FFT_ScienceDef_fftParticleDetector_KerbinInSpaceLow
        KerbinInSpaceHigh* = #LOC_FFT_ScienceDef_fftParticleDetector_KerbinInSpaceHigh
        KerbinSrfLanded* = #LOC_FFT_ScienceDef_fftParticleDetector_KerbinSrfLanded
        MohoInSpaceLow* = #LOC_FFT_ScienceDef_fftParticleDetector_MohoInSpaceLow
        MohoInSpaceHigh* = #LOC_FFT_ScienceDef_fftParticleDetector_MohoInSpaceHigh
        EveSrfLanded* = #LOC_FFT_ScienceDef_fftParticleDetector_EveSrfLanded
        JoolInSpaceLow* = #LOC_FFT_ScienceDef_fftParticleDetector_JoolInSpaceLow
        JoolInSpaceHigh* = #LOC_FFT_ScienceDef_fftParticleDetector_JoolInSpaceHigh
        LaytheInSpaceLow* = #LOC_FFT_ScienceDef_fftParticleDetector_LaytheInSpaceLow
        LaytheInSpaceHigh* = #LOC_FFT_ScienceDef_fftParticleDetector_LaytheInSpaceHigh
        LaytheSrfLanded* = #LOC_FFT_ScienceDef_fftParticleDetector_LaytheSrfLanded
	}
}