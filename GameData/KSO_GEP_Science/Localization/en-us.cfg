        // sspxTelescopeObservation
        #GEPscience_sspxTelescopeObservation_GrannusFlyingHigh_00 = You try to steady the telescope while the red glare floods every sensor. The star does not cooperate with 'high-altitude' astronomy.
        #GEPscience_sspxTelescopeObservation_GrannusInSpaceLow_00 = With Grannus filling half the sky, you use it as a giant light shield and hunt for faint points that do not drift when you blink.
        #GEPscience_sspxTelescopeObservation_GrannusInSpaceHigh_00 = Farther out, the red ember still stains the optics, but the background finally goes dark enough to count galaxies between the comms pings.
        #GEPscience_sspxTelescopeObservation_GrannusInSpace_00 = You wonder whether pointing the telescope directly at Grannus counts as a deep-field observation.
        #GEPscience_sspxTelescopeObservation_GrannusInSpace_01 = You point at Grannus, which is technically a “far away” star… from Kerbin point of view. You are not helping its case.

        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedMagmaShores_00 = Heat ripples off the magma like a bad mirage. The telescope produces beautiful stars and a suspicious smell from the heat sink.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedScorchedLowlands_00 = The ground looks sunburned and slightly incandescent. Your long exposure turns into modern art the moment the mount warms up.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedMidlands_00 = The tripod sits on rock that never really cools. You log a careful star survey and a less careful note about sunblock.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedHighlands_00 = Above the worst of the shimmer, the sky sharpens up. The red sun is still too close for comfort, so you observe in short, nervous bursts.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedDarkSideMidlands_00 = No atmosphere, no twinkle, just a cold black sky and unfamiliar patterns. The best data arrives long before Mission Control can react to it.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedDarkSideHighlands_00 = The horizon is a jagged silhouette against a thin red glow from far away. You catch a transit and immediately wonder how long the results will take to get home.
        #GEPscience_sspxTelescopeObservation_TaranisSrfLandedPoles_00 = Long shadows make a perfect baffle for the telescope. You run a quiet sweep of the sky, listening to the radio delay answer itself.
        #GEPscience_sspxTelescopeObservation_TaranisSrfSplashedMagmaSea_00 = The telescope is technically deployed over liquid rock. The image is steady, the instrument is not, and you decide that counts as science.
        #GEPscience_sspxTelescopeObservation_TaranisSrfSplashedMagmaShores_00 = Half the mount is misted with glowing droplets. You get one crisp frame before the safety sensors insist on a cooling break.
        #GEPscience_sspxTelescopeObservation_TaranisInSpaceLow_00 = In low orbit, the bright day side blows out the view, so you swing over the night side and let the planet block Grannus like a giant shutter.
        #GEPscience_sspxTelescopeObservation_TaranisInSpaceHigh_00 = From high orbit you can watch the terminator crawl while the telescope stares past it. The sky looks wrong in a way you cannot quite calibrate.

        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSunnyLowlands_00 = The bright side dust reflects a harsh red tint into the tube. You manage a clean star field by pointing away from the glow and holding your breath.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSunnyHighlands_00 = From the high ground, the sunlit haze is thinner and the tracking is smoother. The red sun still tries to photobomb every exposure.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedTransitionalLowlands_00 = The twilight band gives you just enough darkness and just enough warmth. You take a long look at unfamiliar constellations and feel very far away.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedTransitionalHighlands_00 = Up here the boundary between fire and ice is a thin line on the horizon. The telescope loves it, and the comms delay does not.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideLowlands_00 = The stars do not twinkle at all, which is unsettling. Your log notes excellent seeing and a growing desire for a brighter cabin light.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideHighlands_00 = The dark side sky is so sharp it feels artificial. You capture a faint nebula and wait for the delayed applause from home.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedSoutheasternMountains_00 = Ridges and shadows keep stray glare out of the optics. You run a careful sweep and pretend the red sunrise is not creeping toward you.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedWesternMountains_00 = The rock underfoot is cold on one side and warm on the other. The telescope mount complains in creaks and still delivers a decent star chart.
        #GEPscience_sspxTelescopeObservation_ToutatisSrfLandedDarkSideMountains_00 = A mountain blocks the faint red horizon glow like a perfect observatory wall. The data is excellent and the silence is too.
