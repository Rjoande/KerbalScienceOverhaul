        #ScienceRefactor_bd_UVspec_DunaInSpace_00 = Lo spettrometro scatta immagini nell'ultravioletto di Duna.
        #ScienceRefactor_bd_UVspec_DunaInSpace_01 = L'analisi di riflettività e assorbimento conferma che le calotte contengono grandi quantità di anidride carbonica congelata.
