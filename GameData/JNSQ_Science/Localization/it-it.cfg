        #JNSQscience_gravityScan_TalosInSpaceLowPoles_00 = Il passaggio polare mostra una trazione spostata verso le estremità di Talos, come se i poli fossero leggermente sbilanciati rispetto al resto della luna.
        #JNSQscience_gravityScan_TalosInSpaceHighLowlands_00 = Dall'orbita alta, il segnale dei bassopiani si appiana in un debole rigonfiamento: Talos tiene i suoi segreti, ma non alla perfezione.
