        #JNSQscience_sspxFishStudy_EveSrfSplashed_01 = L'habitat dondola dolcemente sulle onde: i pesci lo trattano come una giostra e si rifiutano di sembrare impressionati.
        #JNSQscience_sspxFishStudy_EveSrfSplashed_02 = La pressione esterna fa sembrare l'acquario come se stesse cercando di diventare un cubo. I pesci votano per restare al chiuso.
