@EXPERIMENT_DEFINITION:HAS[#id[bd_magScan]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_magScan_GrannusInSpaceLow_00 // The magnetometer immediately regrets this career choice. The field surges and jitters like Grannus is trying to sign autographs in plasma.
        GrannusInSpaceHigh* = #GEPscience_bd_magScan_GrannusInSpaceHigh_00 // Even from here the readings stay uncomfortably strong. Mission Control asks if the instrument is broken, and the answer takes a while to get back.

        TaranisInSpaceLow* = #GEPscience_bd_magScan_TaranisInSpaceLow_00 // The trace stays mostly flat, then snaps with sharp spikes whenever the dim red sun sneezes. It feels like you are listening to space weather on a long delay.
        TaranisInSpaceHigh* = #GEPscience_bd_magScan_TaranisInSpaceHigh_00 // Very little intrinsic field shows up, just a faint, restless hiss from the star’s particles. “Night” and “day” don’t help much when the planet forgot how to rotate properly.
        TaranisSrfSplashed* = #GEPscience_bd_magScan_TaranisSrfSplashed_00 // The molten sea is so conductive the magnetometer picks up slow, sloshy variations. You note that “splashed” is a weird word when the splash is lava.
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_magScan_TaranisSrfLandedMagmaShores_00 // Readings jump in rhythm with the glowing shoreline, like the crust is being gently kneaded by heat. The red daylight makes the display look warmer than it is.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_magScan_TaranisSrfLandedScorchedLowlands_00 // A weak, patchy signal suggests old magnetized rock baked almost smooth. It still cannot hold your wrench to the ground, sadly.
        TaranisSrfLandedMidlands* = #GEPscience_bd_magScan_TaranisSrfLandedMidlands_00 // The field here is close to nothing, with one stubborn blip that refuses to explain itself. You label it “Probably A Rock” for now.
        TaranisSrfLandedHighlands* = #GEPscience_bd_magScan_TaranisSrfLandedHighlands_00 // Slight polarity shifts show up between ridges, as if the planet tried to be magnetic once and then got tired. The quiet is unsettling when the sun never sets and never rises.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_magScan_TaranisSrfLandedDarkSideMidlands_00 // The dark side gives a cleaner trace, but it is not comforting. The star’s influence still leaks in as faint pulses, like distant drumbeats through the ground.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_magScan_TaranisSrfLandedDarkSideHighlands_00 // Cold, brittle terrain produces a steady, minimal signal with tiny localized anomalies. You begin to miss the simple chaos of the sunlit side.
        TaranisSrfLandedPoles* = #GEPscience_bd_magScan_TaranisSrfLandedPoles_00 // The readings drift just enough to suggest odd currents under the surface. Mission Control suggests “try rotating it,” and you stare at the horizon that does not move.

        ToutatisInSpaceLow* = #GEPscience_bd_magScan_ToutatisInSpaceLow_00 // A weak field shows up with a lopsided shape, strongest over the baked hemisphere. The boundary between light and dark looks sharp even in the magnetics.
        ToutatisInSpaceHigh* = #GEPscience_bd_magScan_ToutatisInSpaceHigh_00 // The signal fades toward background noise, but the red sun still roughs it up with occasional static. The return ping from home feels like it arrives from a different week.
        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_magScan_ToutatisSrfLandedSunnyLowlands_00 // Warm ground and thin air make the readings wander slightly, like lazy electrical currents are taking the scenic route. You wonder if the planet is quietly charging itself.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_magScan_ToutatisSrfLandedSunnyHighlands_00 // The high ground shows small, consistent anomalies that hint at iron-rich rock. It is the closest thing to a “feature” the magnetometer is willing to admit.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_magScan_ToutatisSrfLandedTransitionalLowlands_00 // Right between day and night, the trace gets twitchy and indecisive. The planet can’t decide if it wants to be hot, cold, or magnetic.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_magScan_ToutatisSrfLandedTransitionalHighlands_00 // A narrow band of stronger readings suggests stressed crust along the twilight zone. The subtle gradient feels more like engineering than geology.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_magScan_ToutatisSrfLandedDarkSideLowlands_00 // The dark side is calmer, with a smooth near-zero field that makes you check the power switch twice. The silence is real, and that is the problem.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_magScan_ToutatisSrfLandedDarkSideHighlands_00 // Tiny spikes pop up as you cross exposed ridges, then vanish again. It is like the planet is hiding its metal in the cold.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_magScan_ToutatisSrfLandedSoutheasternMountains_00 // The mountains carry a faint but coherent signature, as if they were magnetized and then frozen in place. Your antenna points home out of habit, not confidence.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_magScan_ToutatisSrfLandedWesternMountains_00 // Oddly offset readings suggest layered rock with different magnetic histories. The red daylight never looks quite the right shade, even on the screen.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_magScan_ToutatisSrfLandedDarkSideMountains_00 // The strongest local anomalies so far appear in the cold mountains, sharp and brief. You mark the spot for later, assuming “later” still exists out here.

        NodensInSpaceLow* = #GEPscience_bd_magScan_NodensInSpaceLow_00 // The magnetometer draws clean, confident curves, then shudders when the star coughs out charged particles. Under a dim red sun, even “normal” feels unfamiliar.
        NodensInSpaceHigh* = #GEPscience_bd_magScan_NodensInSpaceHigh_00 // Farther out, the field smooths into a broad, steady envelope. The data packet takes ages to get home, as if the magnetosphere itself adds latency.
        NodensSrfSplashed* = #GEPscience_bd_magScan_NodensSrfSplashed_00 // The conductive water tugs at the readings in slow, heavy swells. It is oddly comforting to splash down—until you remember how far “home” is.
        NodensSrfLandedSaltySeas* = #GEPscience_bd_magScan_NodensSrfLandedSaltySeas_00 // Salt deposits make the local field look slightly warped, like the planet is wearing magnetic makeup. The instrument insists it is not a compass, but it still tries to point somewhere.
        NodensSrfLandedFreshWater* = #GEPscience_bd_magScan_NodensSrfLandedFreshWater_00 // The trace steadies into a gentle baseline with tiny fluttering noise. You wonder if the quiet is the lake… or just the long distance between you and Mission Control.
        NodensSrfLandedShores* = #GEPscience_bd_magScan_NodensSrfLandedShores_00 // Readings shift back and forth with the tide line, as if the shoreline is “breathing” electricity. The red daylight turns every indicator light into a warning.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_NodensSrfLandedTropicalLowlands_00 // A strong background field holds steady, but brief spikes suggest storms overhead are charging the air. The sun never looks the right color, even on the display.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_NodensSrfLandedTemperateLowlands_00 // The field is comfortably strong and annoyingly inconsistent from hill to hill. The team argues about geology while the reply time stretches into awkward silence.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_NodensSrfLandedTropicalMidlands_00 // A slight drop in intensity with altitude makes the curve look “tidier” than expected. It is still hard to relax when the only star is dim and red.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_NodensSrfLandedTemperateMidlands_00 // Subtle, repeating wiggles hint at buried magnetized layers. You label them “interesting” because “mildly unsettling” is not an approved technical term.
        NodensSrfLandedHighlands* = #GEPscience_bd_magScan_NodensSrfLandedHighlands_00 // Local anomalies pop up near exposed rock, sharp and stubborn. It feels like the crust kept old magnetic memories and forgot to file them away.
        NodensSrfLandedTundra* = #GEPscience_bd_magScan_NodensSrfLandedTundra_00 // Cold ground produces crisp, low-noise readings that almost seem too neat. The clean line makes the surrounding emptiness feel louder.
        NodensSrfLandedIceCaps* = #GEPscience_bd_magScan_NodensSrfLandedIceCaps_00 // The field stays steady over the ice, with occasional tiny spikes from dust-rich bands. Mission Control suggests “just move a meter,” and you laugh at the travel time of that advice.

        BelisamaInSpaceLow* = #GEPscience_bd_magScan_BelisamaInSpaceLow_00 // The field is weak on its own, but it twitches in rhythm with Nodens nearby, like a moon borrowing magnetism. Being tidally locked makes the pattern feel strangely fixed in the sky.
        BelisamaInSpaceHigh* = #GEPscience_bd_magScan_BelisamaInSpaceHigh_00 // Most of what you see is Nodens’ influence fading into background hiss. The numbers arrive home so late they feel like someone else’s mission log.
        BelisamaSrfLandedFlats* = #GEPscience_bd_magScan_BelisamaSrfLandedFlats_00 // The baseline is low and stubbornly flat, broken only by faint, drifting noise. Nodens hangs in the same spot overhead, a constant reminder you are not in a normal system.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_BelisamaSrfLandedTropicalLowlands_00 // “Tropical” is just a name here; the magnetometer agrees by staying cold and quiet. A thin, lopsided signal suggests induction from Nodens rather than anything inside Belisama.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_BelisamaSrfLandedTemperateLowlands_00 // The trace wobbles gently as if the ground is a sluggish electrical circuit. The red sun makes even the most boring graph look ominous.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_BelisamaSrfLandedTropicalMidlands_00 // Small, repeatable spikes appear when you pass dark boulders. The theory is metallic inclusions; the feeling is “this place is full of surprises.”
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_BelisamaSrfLandedTemperateMidlands_00 // The field drops almost to nothing between scattered anomalies. You keep checking the connector, because “low magnetic field” sounds too much like “no data.”
        BelisamaSrfLandedHighlands* = #GEPscience_bd_magScan_BelisamaSrfLandedHighlands_00 // Sharp little signatures cling to ridges like static on a sweater. The long comm delay turns every “is this real?” into a waiting game.
        BelisamaSrfLandedPoles* = #GEPscience_bd_magScan_BelisamaSrfLandedPoles_00 // The readings are faint but oddly coherent, as if the cold preserved a weak imprint. You log it carefully, since repeating the measurement out here is never guaranteed.

        SucellusInSpaceLow* = #GEPscience_bd_magScan_SucellusInSpaceLow_00 // The magnetometer reports near-zero field, then finds scattered spikes like passing over hidden scrap. If this dwarf is metal-rich, it is keeping its secrets close.
        SucellusInSpaceHigh* = #GEPscience_bd_magScan_SucellusInSpaceHigh_00 // Almost nothing registers except the star’s restless particle noise. The emptiness is so complete that the data feels like it could be from anywhere—until you remember where you are.
        SucellusSrfLandedBasins* = #GEPscience_bd_magScan_SucellusSrfLandedBasins_00 // Broad, shallow anomalies suggest old impacts stirred conductive material into messy layers. The red sun paints the basin walls like rust, which does not help morale.
        SucellusSrfLandedLowlands* = #GEPscience_bd_magScan_SucellusSrfLandedLowlands_00 // Small but frequent spikes hint at metallic grains in the regolith. You briefly imagine funding proposals writing themselves, then the delay timer snaps you back to reality.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_SucellusSrfLandedTropicalMidlands_00 // The field stays near zero, yet the curve keeps “catching” on dark outcrops. It is like running a magnet past a toolbox you cannot see.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_SucellusSrfLandedTemperateMidlands_00 // A weak, patchy signal suggests magnetized rock fragments mixed into fine dust. The instrument calls it “interesting”; you call it “another reason to keep your helmet on.”
        SucellusSrfLandedHighlands* = #GEPscience_bd_magScan_SucellusSrfLandedHighlands_00 // The strongest local anomalies show up on exposed high ground, brief and sharp. The planet might not have a field, but it certainly has opinions.
        SucellusSrfLandedPoles* = #GEPscience_bd_magScan_SucellusSrfLandedPoles_00 // The trace is quiet enough to hear the instrument’s own electronics, until a sudden blip insists the pole is hiding metal. Mission Control will love it—eventually.

        CaireenInSpaceLow* = #GEPscience_bd_magScan_CaireenInSpaceLow_00 // The magnetometer finds nothing resembling a global field, only irregular flickers as you pass lumpy terrain. Captured asteroids do not come with neat magnetic maps.
        CaireenInSpaceHigh* = #GEPscience_bd_magScan_CaireenInSpaceHigh_00 // Everything averages to near zero, with faint static from the star. The spacecraft feels very small, and the reply channel feels even smaller.
        CaireenSrfLandedLowlands* = #GEPscience_bd_magScan_CaireenSrfLandedLowlands_00 // A few scattered spikes suggest magnetized pebbles embedded in the rubble. You mark the spot, because “return later” is a bold promise this far out.
        CaireenSrfLandedMidlands* = #GEPscience_bd_magScan_CaireenSrfLandedMidlands_00 // The signal is mostly flat, interrupted by sharp blips when you roll past darker rocks. It is like the moon is made of leftovers with different histories.
        CaireenSrfLandedHighlands* = #GEPscience_bd_magScan_CaireenSrfLandedHighlands_00 // The magnetometer catches brief, coherent signatures along fractured ridges. For a tiny moon, it has a surprisingly complicated “personality.”
        CaireenSrfLandedPoles* = #GEPscience_bd_magScan_CaireenSrfLandedPoles_00 // Near-total silence, then one stubborn anomaly that refuses to go away. Under the dim red sun, even a single blip feels like a discovery.

        SironaInSpaceLow* = #GEPscience_bd_magScan_SironaInSpaceLow_00 // The magnetometer saturates so hard it draws a rectangle. Sirona’s magnetic field is not subtle, and neither is the long, crackly delay to Mission Control.
        SironaInSpaceHigh* = #GEPscience_bd_magScan_SironaInSpaceHigh_00 // Farther out, the readings resolve into a vast, lopsided magnetosphere fighting the red star’s wind. The “quiet” parts still feel loud when you’re this far from home.

        AirmedInSpaceLow* = #GEPscience_bd_magScan_AirmedInSpaceLow_00 // Sirona’s field dominates everything, with Airmed adding only faint, nervous ripples. It’s like trying to hear a whisper next to a very determined gas giant.
        AirmedInSpaceHigh* = #GEPscience_bd_magScan_AirmedInSpaceHigh_00 // The signal thins to a gentle gradient and a lot of charged-particle hiss. The data arrives home late enough that the graphs feel like postcards.
        AirmedSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_AirmedSrfLandedTropicalLowlands_00 // The trace stays near zero, interrupted by tiny spikes from scattered metallic grains. Under the dim red sun, even “nothing” looks suspicious.
        AirmedSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_AirmedSrfLandedTemperateLowlands_00 // Weak, patchy anomalies suggest old debris mixed into the dust. You mark them for follow-up and immediately remember how expensive “follow-up” is out here.
        AirmedSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_AirmedSrfLandedTropicalMidlands_00 // The magnetometer finds a faint induced signal that comes and goes, like Sirona’s field is breathing overhead. The ground itself refuses to take credit.
        AirmedSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_AirmedSrfLandedTemperateMidlands_00 // Short, sharp blips appear near darker patches of terrain. The instrument insists it’s geology, but your nerves insist it’s “something watching.”
        AirmedSrfLandedHighlands* = #GEPscience_bd_magScan_AirmedSrfLandedHighlands_00 // Exposed ridges give the cleanest readings: mostly silence with a few stubborn, repeatable peaks. Airmed doesn’t have a field, but it has opinions in the rock.
        AirmedSrfLandedDarkenedLowlands* = #GEPscience_bd_magScan_AirmedSrfLandedDarkenedLowlands_00 // The darker surface shows more frequent micro-anomalies, as if it’s dusted with magnetizable grit. The two-toned ground looks like a warning label.
        AirmedSrfLandedDarkenedMidlands* = #GEPscience_bd_magScan_AirmedSrfLandedDarkenedMidlands_00 // The baseline stays flat until one ridge produces a coherent signature, then vanishes again. You file it under “real” and “creepy” simultaneously.
        AirmedSrfLandedDarkenedHighlands* = #GEPscience_bd_magScan_AirmedSrfLandedDarkenedHighlands_00 // A thin line of stronger readings follows the crest, suggesting concentrated material in the high ground. Mission Control asks for a second pass; the request arrives after you’ve already left.
        AirmedSrfLandedPoles* = #GEPscience_bd_magScan_AirmedSrfLandedPoles_00 // Cold ground gives low-noise data that makes the emptiness feel bigger. One small anomaly stands out like a lone light in deep space.

        BorvoInSpaceLow* = #GEPscience_bd_magScan_BorvoInSpaceLow_00 // Borvo’s own magnetosphere shows up clearly, wrapped and tugged by Sirona’s giant field nearby. The boundary is messy, like two invisible storms colliding.
        BorvoInSpaceHigh* = #GEPscience_bd_magScan_BorvoInSpaceHigh_00 // At altitude the curves smooth out, and you can pick out Borvo’s field from the broader background. The red sun’s particle noise adds a constant, impatient static.
        BorvoSrfLandedTropicalCraquelure* = #GEPscience_bd_magScan_BorvoSrfLandedTropicalCraquelure_00 // The cracked ground produces jittery, localized signals, as if the surface is wired into small loops. The atmosphere above feels thin, but the planet still “answers” in magnetics.
        BorvoSrfLandedTemperateCraquelure* = #GEPscience_bd_magScan_BorvoSrfLandedTemperateCraquelure_00 // The magnetometer finds repeating spikes along the fractures, consistent enough to map. You briefly consider calling them “fault lines,” then remember you’re not sure what they’re made of.
        BorvoSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_BorvoSrfLandedTropicalLowlands_00 // A steady background field sits beneath a gentle wobble, likely induced currents from above. The sky’s brown haze makes every instrument light look too bright.
        BorvoSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_BorvoSrfLandedTemperateLowlands_00 // The signal strengthens slightly, then dips over darker soil patches. It feels like walking across a very old, very quiet electrical circuit.
        BorvoSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_BorvoSrfLandedTropicalMidlands_00 // Subtle polarity shifts suggest layered materials with different magnetic histories. The delay to home turns each hypothesis into a long, lonely wait.
        BorvoSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_BorvoSrfLandedTemperateMidlands_00 // The trace is clean and “normal” enough to be unsettling. Out here, normal is just another kind of unfamiliar.
        BorvoSrfLandedHighlands* = #GEPscience_bd_magScan_BorvoSrfLandedHighlands_00 // Exposed high ground shows crisp anomalies, sharp enough to triangulate. The hills might be hiding iron-rich rock—or just enjoying the attention.
        BorvoSrfLandedMajorCraters* = #GEPscience_bd_magScan_BorvoSrfLandedMajorCraters_00 // The crater floor gives a broader, smeared anomaly, like impact melt mixed everything into a magnetic stew. You label it “scientific” and resist calling it “soup.”
        BorvoSrfLandedPoles* = #GEPscience_bd_magScan_BorvoSrfLandedPoles_00 // The field steadies and the noise drops, leaving a calm line that’s almost comforting. Then a single spike appears, and the comfort evaporates.

        DamonaInSpaceLow* = #GEPscience_bd_magScan_DamonaInSpaceLow_00 // Damona contributes almost nothing; Sirona’s field and the star’s particles do all the talking. The magnetometer logs “induced effects” and you log “unease.”
        DamonaInSpaceHigh* = #GEPscience_bd_magScan_DamonaInSpaceHigh_00 // Farther out, the signal fades to a thin whisper plus intermittent static. It’s the kind of dataset that makes you double-check every cable twice.
        DamonaSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_DamonaSrfLandedTropicalLowlands_00 // Near-zero baseline with rare, needle-like spikes from scattered fragments. The ground feels old, quiet, and far too honest about it.
        DamonaSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_DamonaSrfLandedTemperateLowlands_00 // A weak anomaly drifts as you roll, suggesting buried debris rather than a true field. The red sun hangs dimly, offering light but no reassurance.
        DamonaSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_DamonaSrfLandedTropicalMidlands_00 // The magnetometer catches a short-lived signature along a ridge, then nothing again. Damona seems to ration its secrets.
        DamonaSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_DamonaSrfLandedTemperateMidlands_00 // The trace stays flat enough to hear the instrument’s own electronics in the data. Mission Control suggests “increase sensitivity,” which feels like tempting fate.
        DamonaSrfLandedHighlands* = #GEPscience_bd_magScan_DamonaSrfLandedHighlands_00 // Exposed rock shows slightly stronger, coherent spikes, likely magnetized remnants from ancient impacts. The numbers look sharp; the landscape looks sharper.
        DamonaSrfLandedImpactBasin* = #GEPscience_bd_magScan_DamonaSrfLandedImpactBasin_00 // The basin produces the broadest anomaly on the moon, smeared and complex, like the violence never fully cooled. You note that “feature” is an understatement.
        DamonaSrfLandedPoles* = #GEPscience_bd_magScan_DamonaSrfLandedPoles_00 // Clean, quiet readings with one stubborn blip that refuses to explain itself. Out here, a single blip is enough to feel like a discovery.

        EponaInSpaceLow* = #GEPscience_bd_magScan_EponaInSpaceLow_00 // The magnetometer finds a thin, tired magnetosphere struggling against Grannus’ wind. The readings come in slow waves, like even the field is moving on a long delay.
        EponaInSpaceHigh* = #GEPscience_bd_magScan_EponaInSpaceHigh_00 // Up here the signal nearly dissolves into particle hiss from the dim red sun. Epona’s “shield” is more of a polite suggestion.
        EponaSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_EponaSrfLandedTropicalLowlands_00 // A weak background field sits under the data like a faint heartbeat beneath ice. Every little spike makes you wonder what’s moving far below the crust.
        EponaSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_EponaSrfLandedTemperateLowlands_00 // The trace drifts lazily, then snaps when charged particles sweep through. You log it as “variation” and try not to call it “the sky growling.”
        EponaSrfLandedTropicalUplands* = #GEPscience_bd_magScan_EponaSrfLandedTropicalUplands_00 // The signal drops with altitude and gets cleaner, as if the thin air is less willing to carry stray currents. The red daylight still makes the screen feel too warm.
        EponaSrfLandedTemperateUplands* = #GEPscience_bd_magScan_EponaSrfLandedTemperateUplands_00 // Small, repeatable anomalies cling to darker outcrops. The planet might be mostly frozen, but it hasn’t forgotten its metals.
        EponaSrfLandedHighlands* = #GEPscience_bd_magScan_EponaSrfLandedHighlands_00 // The magnetometer catches crisp spikes along exposed ridges, then returns to near-nothing. It feels like reading scars in stone.
        EponaSrfLandedGrandPeaks* = #GEPscience_bd_magScan_EponaSrfLandedGrandPeaks_00 // Peaks give the strongest local signatures, sharp enough to map by hand. The view is spectacular, but the numbers remind you how thin your margin is out here.
        EponaSrfLandedCraters* = #GEPscience_bd_magScan_EponaSrfLandedCraters_00 // Broad, smeared anomalies suggest old impacts mixed conductive material into layers. The data looks like a messy history book with missing chapters.
        EponaSrfLandedVolcanoes* = #GEPscience_bd_magScan_EponaSrfLandedVolcanoes_00 // Buried currents or magnetized rock? The readings jump in slow pulses that make you picture heat working under the ice, quietly and relentlessly.
        EponaSrfLandedPoles* = #GEPscience_bd_magScan_EponaSrfLandedPoles_00 // Low noise, clean baseline, one stubborn blip that refuses to explain itself. In this far red light, even a single blip feels like company.

        RosmertaInSpaceLow* = #GEPscience_bd_magScan_RosmertaInSpaceLow_00 // The instrument finds no real field, just harsh radiation chatter and a faint tug from Epona nearby. Rosmerta is riding someone else’s magnetics.
        RosmertaInSpaceHigh* = #GEPscience_bd_magScan_RosmertaInSpaceHigh_00 // Almost pure background noise out here, with occasional spikes when Grannus gets cranky. The emptiness looks orderly until you zoom in.
        RosmertaSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_RosmertaSrfLandedTropicalLowlands_00 // Near-zero baseline, then tiny needle spikes from scattered fragments in the dust. The moon is quiet in magnetics, but loud in radiation.
        RosmertaSrfLandedTemperateLowlands* = #GEPscience_bd_magScan_RosmertaSrfLandedTemperateLowlands_00 // The trace stays flat enough to hear the instrument’s own electronics in the data. You resist the urge to tap it “just to be sure.”
        RosmertaSrfLandedTropicalMidlands* = #GEPscience_bd_magScan_RosmertaSrfLandedTropicalMidlands_00 // A faint induced wobble comes and goes, as if Epona’s presence is leaking through the ground. Rosmerta contributes nothing but silence.
        RosmertaSrfLandedTemperateMidlands* = #GEPscience_bd_magScan_RosmertaSrfLandedTemperateMidlands_00 // Small anomalies line up along shallow ridges, then vanish again. It’s like the terrain is hiding its metal in plain sight.
        RosmertaSrfLandedHighlands* = #GEPscience_bd_magScan_RosmertaSrfLandedHighlands_00 // Exposed rock produces the sharpest signatures, brief and coherent. You mark them for later and remember how far “later” is from here.
        RosmertaSrfLandedPoles* = #GEPscience_bd_magScan_RosmertaSrfLandedPoles_00 // Cold, airless stillness makes the data almost too clean. The long comm delay turns “interesting” into a lonely word.

        RAB-58EInSpaceLow* = #GEPscience_bd_magScan_RAB-58EInSpaceLow_00 // No intrinsic field at all—just jittery static from charged particles and a hint of Epona’s influence. The magnetometer calls it “environmental,” you call it “unfriendly.”
        RAB-58EInSpaceHigh* = #GEPscience_bd_magScan_RAB-58EInSpaceHigh_00 // The signal fades to nothing but background hiss. Even the data feels like it might drift away if you stop watching it.
        RAB-58ESrfLandedLowlands* = #GEPscience_bd_magScan_RAB-58ESrfLandedLowlands_00 // Flat line, sudden blip, flat line again—like stepping on invisible nails. Whatever this moonlet is, it’s stitched together from mismatched pieces.
        RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_magScan_RAB-58ESrfLandedEasternHighlands_00 // A few stubborn anomalies cling to darker boulders, coherent enough to triangulate. Captured or not, it brought its own magnetic baggage.
        RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_magScan_RAB-58ESrfLandedWesternHighlands_00 // The readings stay mostly silent, then spike sharply near fractured rock. You label it “metallic inclusion” because “mystery” isn’t a unit of measure.

        CernunnosInSpaceLow* = #GEPscience_bd_magScan_CernunnosInSpaceLow_00 // The magnetometer finds no global field, just a soft, low-radiation hush and faint particle flutter. It feels like orbiting the edge of a system that forgot to be noisy.
        CernunnosInSpaceHigh* = #GEPscience_bd_magScan_CernunnosInSpaceHigh_00 // Farther out, everything averages to nearly nothing. The dim red sun is a distant ember, and the data arrives home like a message in a bottle.
        CernunnosSrfLandedTropicalLowlands* = #GEPscience_bd_magScan_CernunnosSrfLandedTropicalLowlands_00 // Near-zero baseline with tiny, drifting noise—dust and static doing most of the work. You start to appreciate “boring” as a survival feature.
