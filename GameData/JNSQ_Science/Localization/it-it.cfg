        #JNSQscience_bd_orbitalScope_TalosInSpaceLowMidlands_00 = Il terreno delle pianure appare fratturato e irregolare, pieno di avvallamenti poco profondi che si allungano senza una direzione precisa.
        #JNSQscience_bd_orbitalScope_TalosInSpaceLowHighlands_00 = Le colline sono lastre e creste ruvide: le ombre rendono il rilievo più duro di quanto probabilmente sia.
