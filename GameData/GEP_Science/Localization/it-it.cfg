        #GEPscience_bd_camera_DamonaInSpaceLowPoles_00 = I passaggi polari mostrano ombra profonda con sottili bordi luminosi dove la luce arriva appena. Conservi l'immagine perché a volte "quasi niente" è il risultato.
        #GEPscience_bd_camera_DamonaInSpaceHigh_00 = Damona è un minuscolo puntino grigio in orbita lontano dal calore di qualunque cosa familiare. Invi la foto a casa e aspetti che la conferma si metta in pari.
