@EXPERIMENT_DEFINITION:HAS[#id[SEDA]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_SEDA_SunInSpaceLow_00 // The particle counters peg so hard you briefly suspect the numbers are just decorative. The electronics test board starts “passing” by turning itself off.
        SunInSpaceLow* = #JNSQscience_SEDA_SunInSpaceLow_01 // Plasma readings boil with constant activity, and the high-energy channels chatter without pause. The exposure panels begin aging in what can only be described as fast-forward.
        SunInSpaceHigh* = #JNSQscience_SEDA_SunInSpaceHigh_00 // SEDA logs a clean interplanetary baseline: steady solar wind, occasional energetic spikes, and a constant background that never truly goes away.
        SunInSpaceHigh* = #JNSQscience_SEDA_SunInSpaceHigh_01 // Away from any local interference, heavy-ions and high-energy particles make a tidy reference dataset. “Tidy” is a relative term; it still looks like space is trying to bite the hardware.

        MohoInSpaceLow* = #JNSQscience_SEDA_MohoInSpaceLow_01 // Low over Moho, radiation climbs while the near-nothing magnetic field offers no opinion on shielding. The materials rack collects tiny dust pings like microscopic hail.
        MohoInSpaceLow* = #JNSQscience_SEDA_MohoInSpaceLow_00 // The detectors map sharp particle bursts that arrive with rude timing. SEDA recommends rerouting sensitive electronics through “anywhere else.”
        MohoInSpaceHigh* = #JNSQscience_SEDA_MohoInSpaceHigh_01 // Higher up, the readings smooth into harsh, sunward space conditions: energetic ions, hard radiation, and very little forgiveness. The test board logs a few single-event upsets and then pretends it was fine.
        MohoInSpaceHigh* = #JNSQscience_SEDA_MohoInSpaceHigh_01 // Neutron and heavy-ion channels show a persistent elevated flux compared to calmer neighborhoods. The exposure samples remain intact, but look like they’ve reconsidered their career choice.

        EveInSpaceLow* = #JNSQscience_SEDA_EveInSpaceLow_00 // Skimming above Eve’s thick upper atmosphere, SEDA sees dense plasma structure and reactive particles nibbling at the exposure plates. The surface samples would be jealous of this much chemistry.
        EveInSpaceLow* = #JNSQscience_SEDA_EveInSpaceLow_01 // High-energy particle counts stay uncomfortably lively with no magnetic field to calm them down. The electronics evaluation notes “intermittent weirdness” and underlines it twice.
        EveInSpaceHigh* = #JNSQscience_SEDA_EveInSpaceHigh_00 // Farther out, Eve’s influence fades into a radiation-rich space environment with occasional surges. SEDA dutifully records every spike while you watch the error logs like a hawk.
        EveInSpaceHigh* = #JNSQscience_SEDA_EveInSpaceHigh_01 // The sensors catch faint signatures of atmospheric escape mixed into the particle background. The materials rack reports minor erosion and major indignation.

        GillyInSpaceLow* = #JNSQscience_SEDA_GillyInSpaceLow_00 // Near Gilly, the dust detector lights up whenever the tiny moon gets in the way of something moving fast. The exposure plates return with a few microscopic “souvenirs.”
        GillyInSpaceLow* = #JNSQscience_SEDA_GillyInSpaceLow_01 // With almost no gravity and no atmosphere, the environment is mostly raw particles plus whatever debris feels like wandering by. The electronics board passes the test, mostly by being too simple to argue.
        GillyInSpaceHigh* = #JNSQscience_SEDA_GillyInSpaceHigh_00 // High above Gilly, SEDA measures a clean space baseline with occasional variations from drifting through the broader Eve system. The plots look calm until you zoom in.
        GillyInSpaceHigh* = #JNSQscience_SEDA_GillyInSpaceHigh_01 // Heavy-ions and energetic particles provide a steady stress test for long-duration hardware. The material samples remain unchanged, which is either good news or a setup.

        KerbinInSpaceLow* = #JNSQscience_SEDA_KerbinInSpaceLow_00 // SEDA reports a steady stream of atomic oxygen and charged particles nibbling at the exposure panels. The electronics test board suggests better shielding and fewer snack crumbs in the connectors.
        KerbinInSpaceLow* = #JNSQscience_SEDA_KerbinInSpaceLow_01 // Plasma sensors catch faint “breaths” from Kerbin’s upper atmosphere, plus a steady pinging of tiny dust and debris. Mission Control files it under “normal operational excitement.”
        KerbinInSpaceHigh* = #JNSQscience_SEDA_KerbinInSpaceHigh_00 // Out near the edge of Kerbin’s magnetic comfort zone, the particle counters rise and fall in broad waves. You start timing sensitive checks for the quiet stretches.
        KerbinInSpaceHigh* = #JNSQscience_SEDA_KerbinInSpaceHigh_01 // Neutron and heavy-ion channels look a lot more like raw space up here. The materials rack looks fine, but the dosimeter looks personally offended.

        MunInSpaceLow* = #JNSQscience_SEDA_MunInSpaceLow_00 // With no air to hide behind, the Mun’s neighborhood is straight solar wind and impact-made dust. The witness plates come back with a respectable collection of tiny “sandblaster” hits.
        MunInSpaceLow* = #JNSQscience_SEDA_MunInSpaceLow_01 // The plasma package maps a sharp wake as you skim low over the grey surface. The particle track plot looks like a doodle until you realize it’s extremely repeatable.
        MunInSpaceHigh* = #JNSQscience_SEDA_MunInSpaceHigh_00 // High above the Mun, distant fields and drifting plasma occasionally change the ion mix in a hurry. The electronics evaluation logs it as “interesting” and “annoying,” in that order.
        MunInSpaceHigh* = #JNSQscience_SEDA_MunInSpaceHigh_01 // Radiation readings are mostly calm, punctuated by brief particle showers that make the counters chatter. You re-check every connector, just in case the universe is judging your wiring.

        MinmusInSpaceLow* = #JNSQscience_SEDA_MinmusInSpaceLow_00 // Dust counts stay near zero until a tiny surface flash sends a short-lived spike through the sensors. The exposure samples collect a faint coat of pale grit that looks suspiciously snack-flavored.
        MinmusInSpaceLow* = #JNSQscience_SEDA_MinmusInSpaceLow_01 // Plasma density is thin, but SEDA is delighted to record numbers that aren’t just “mostly nothing.” The electronics pass the boredom test with flying colors.
        MinmusInSpaceHigh* = #JNSQscience_SEDA_MinmusInSpaceHigh_00 // Farther out, the particle environment drifts between Kerbin-influenced readings and deep-space baselines. Minmus seems content to quietly exist while you do all the measuring.
        MinmusInSpaceHigh* = #JNSQscience_SEDA_MinmusInSpaceHigh_01 // Heavy-ion strikes trigger a couple of perfectly logged single-event hiccups in the test board. The materials tray remains stubbornly unchanged, like it’s trying to look professional.

        DunaInSpaceLow* = #JNSQscience_SEDA_DunaInSpaceLow_00 // SEDA’s particle counters start “crunching” as you skim the dusty edge of Duna’s air. The plasma sensors insist the red haze is electrically opinionated.
        DunaInSpaceLow* = #JNSQscience_SEDA_DunaInSpaceLow_01 // A faint exosphere and a lot of fine dust make for a messy signal. The exposure plates come back lightly peppered, like Duna tried to season the spacecraft.
        DunaInSpaceHigh* = #JNSQscience_SEDA_DunaInSpaceHigh_00 // Higher up, the readings shift toward hard radiation and energetic ions with fewer distractions. The electronics test board logs a few single-event hiccups and then pretends nothing happened.
        DunaInSpaceHigh* = #JNSQscience_SEDA_DunaInSpaceHigh_01 // Out here, Duna offers little shelter from particle storms and background radiation. SEDA recommends “more shielding” in a tone that suggests it has seen your budget.

        IkeInSpaceLow* = #JNSQscience_SEDA_IkeInSpaceLow_00 // The dust sensor registers a steady drizzle of tiny grains near Ike, likely kicked up by impacts and bad luck. Neutron counts jump whenever the surface comes into view.
        IkeInSpaceLow* = #JNSQscience_SEDA_IkeInSpaceLow_01 // Heavy-ion tracks paint clean lines across the detector, and the materials rack collects microscopic pings. The environment is quiet, but it’s the kind of quiet that still bites.
        IkeInSpaceHigh* = #JNSQscience_SEDA_IkeInSpaceHigh_00 // Farther from Ike, the data smooths into deep-space baselines with occasional spikes. The instrument notes them calmly while you check the power bus three times.
        IkeInSpaceHigh* = #JNSQscience_SEDA_IkeInSpaceHigh_01 // SEDA catches faint signatures of charged particles drifting through the Duna system. The exposure samples don’t change much, which somehow feels like a personal challenge.

        EdnaInSpaceLow* = #JNSQscience_SEDA_EdnaInSpaceLow_00 // SEDA confirms Edna’s neighborhood is cold, dark, and surprisingly sharp-edged: energetic particles drift through like they own the place. The electronics test board recommends “less exposed everything.”
        EdnaInSpaceLow* = #JNSQscience_SEDA_EdnaInSpaceLow_01 // Dust counts stay low until a faint band of debris decides you look interesting. The exposure plates come back with a few tiny impacts and a lot of quiet intimidation.
        EdnaInSpaceHigh* = #JNSQscience_SEDA_EdnaInSpaceHigh_00 // Far from Edna, the sensors settle into a deep-space baseline: thin plasma, persistent radiation, and long stretches of “nothing” that still adds up. Perfect for stress-testing parts you thought were sturdy.
        EdnaInSpaceHigh* = #JNSQscience_SEDA_EdnaInSpaceHigh_01 // Heavy-ion tracks appear like neat little signatures across the detector. The materials rack doesn’t change much—until you notice how quickly the dosimeter does.

        DakInSpaceLow* = #JNSQscience_SEDA_DakInSpaceLow_00 // Dak’s “potato zone” is a messy place: dust spikes whenever something taps the surface, and the counters light up like you kicked an anthill in slow motion. SEDA labels it “near-body particulate hazards.”
        DakInSpaceLow* = #JNSQscience_SEDA_DakInSpaceLow_01 // Plasma readings form a jittery wake as you skim past the lumpy rock. The electronics evaluation logs a few single-event hiccups and then pretends it was just blinking.
        DakInSpaceHigh* = #JNSQscience_SEDA_DakInSpaceHigh_00 // Higher up, the dust settles and the instrument package records mostly raw space plus the occasional drifting grit. It’s calm enough to hear every tiny particle hit the hull.
        DakInSpaceHigh* = #JNSQscience_SEDA_DakInSpaceHigh_01 // Radiation and heavy-ions provide a steady background that’s great for long-term exposure tests. The samples remain stoic, like they’ve accepted the job description.

        DresInSpaceLow* = #JNSQscience_SEDA_DresInSpaceLow_00 // Near Dres, SEDA’s dust sensor stays busy with a constant trickle of micrometeoroids from the surrounding debris. The exposure panels come back gently pitted, as if sandblasted by patience.
        DresInSpaceLow* = #JNSQscience_SEDA_DresInSpaceLow_01 // The plasma package reports thin, wandering streams that don’t care where your orbit is. Particle counters occasionally spike, just to make sure you’re paying attention.
        DresInSpaceHigh* = #JNSQscience_SEDA_DresInSpaceHigh_00 // Away from Dres, the environment smooths into a clean interplanetary profile with a stubborn radiation background. The electronics test board calls it “excellent for finding weak solder joints.”
        DresInSpaceHigh* = #JNSQscience_SEDA_DresInSpaceHigh_01 // Heavy-ion events arrive like tiny cosmic paperwork errors—rare, random, and always inconvenient. SEDA records them with satisfaction while you double-check the reboot procedure.

        JoolInSpaceLow* = #JNSQscience_SEDA_JoolInSpaceLow_00 // SEDA’s particle channels saturate in bursts as Jool’s trapped radiation belts hammer the detectors. The electronics evaluation logs several “unexpected decisions” from perfectly innocent circuits.
        JoolInSpaceLow* = #JNSQscience_SEDA_JoolInSpaceLow_01 // Plasma sensors map fast, twisting currents around the green giant. The exposure panels age noticeably in minutes, which is scientifically useful and emotionally upsetting.
        JoolInSpaceHigh* = #JNSQscience_SEDA_JoolInSpaceHigh_00 // Farther out, the readings relax into a steadier stream of solar wind and high-energy particles. SEDA is pleased to see numbers that don’t immediately scream.
        JoolInSpaceHigh* = #JNSQscience_SEDA_JoolInSpaceHigh_01 // Heavy-ion and neutron counts still run higher than you’d like, but at least they’re predictable. The test board stops rebooting itself out of sheer spite.

        LaytheInSpaceLow* = #JNSQscience_SEDA_LaytheInSpaceLow_00 // Atomic oxygen and charged particles team up to “polish” the exposure samples. SEDA recommends coatings that don’t react like they’re being personally insulted.
        LaytheInSpaceLow* = #JNSQscience_SEDA_LaytheInSpaceLow_01 // Plasma measurements show a busy interaction between Laythe’s atmosphere and Jool’s space weather. The particle counters chirp like excited birds, except the birds are radiation.
        LaytheInSpaceHigh* = #JNSQscience_SEDA_LaytheInSpaceHigh_00 // Higher above Laythe, the environment looks like Jool-system space with occasional spikes. The electronics evaluation catches a clean single-event upset and labels it “textbook,” while you label it “yikes.”
        LaytheInSpaceHigh* = #JNSQscience_SEDA_LaytheInSpaceHigh_01 // Dust stays low, but energetic ions remain stubbornly present. The materials rack reports slow erosion and fast anxiety.

        VallInSpaceLow* = #JNSQscience_SEDA_VallInSpaceLow_00 // SEDA records charged-particle sputtering as energetic ions skim Vall’s surface and kick up a thin haze of ions and grit. The exposure plates come back with microscopic frosting scars.
        VallInSpaceLow* = #JNSQscience_SEDA_VallInSpaceLow_01 // Neutron and heavy-ion channels rise whenever the surface is beneath you. The electronics board passes, but only after a dramatic moment of “did it just reset?”
        VallInSpaceHigh* = #JNSQscience_SEDA_VallInSpaceHigh_00 // Away from Vall, the plasma thins into smooth background flow with occasional sharp surges. SEDA notes the surges with calm professionalism you do not share.
        VallInSpaceHigh* = #JNSQscience_SEDA_VallInSpaceHigh_01 // Radiation remains a steady stress test for materials and components. The sample coupons look fine; the dosimeter looks smug.

        TyloInSpaceLow* = #JNSQscience_SEDA_TyloInSpaceLow_00 // Close to Tylo, dust impacts tick the sensors like tiny hailstones. The particle detectors stay busy, and the exposure panels collect pitting that’s annoyingly uniform.
        TyloInSpaceLow* = #JNSQscience_SEDA_TyloInSpaceLow_01 // The plasma package catches a crisp wake pattern as you skim low. The electronics evaluation logs induced noise and suggests routing cables “literally anywhere else.”
        TyloInSpaceHigh* = #JNSQscience_SEDA_TyloInSpaceHigh_00 // Higher up, SEDA sees a cleaner particle baseline with fewer dust spikes. The heavy-ion channel still lands occasional hits that make the test board blink like it’s thinking.
        TyloInSpaceHigh* = #JNSQscience_SEDA_TyloInSpaceHigh_01 // Long-duration exposure data looks excellent for component aging studies. The phrase “excellent for” is doing a lot of work here.

        BopInSpaceLow* = #JNSQscience_SEDA_BopInSpaceLow_00 // Near Bop, the dust sensor spikes whenever the lumpy surface gets nudged by anything moving fast. The exposure plates return with a few tiny dents and a lot of questions.
        BopInSpaceLow* = #JNSQscience_SEDA_BopInSpaceLow_01 // Plasma readings are thin and jittery, but measurable, especially in Bop’s patchy wake. SEDA insists this counts as “structure,” even if it looks like scribbles.
        BopInSpaceHigh* = #JNSQscience_SEDA_BopInSpaceHigh_00 // Farther out, the data smooths into Jool-system background with occasional energetic bursts. The electronics test board logs them politely and then quietly rechecks its own memory.
        BopInSpaceHigh* = #JNSQscience_SEDA_BopInSpaceHigh_01 // Heavy-ions provide a slow, steady stress test for the hardware. The materials rack stays unchanged, which feels suspicious.

        PolInSpaceLow* = #JNSQscience_SEDA_PolInSpaceLow_00 // Pol’s environment is mostly raw particles plus a faint, drifting haze of fine dust. SEDA collects it dutifully, like it’s building a very tiny garden.
        PolInSpaceLow* = #JNSQscience_SEDA_PolInSpaceLow_01 // Radiation stays moderate until a sudden spike makes every counter chatter at once. The electronics evaluation marks the event as “character-building.”
        PolInSpaceHigh* = #JNSQscience_SEDA_PolInSpaceHigh_00 // High above Pol, the sensors capture a clean baseline interrupted by brief particle surges from the wider Jool system. The plots look calm until you zoom in and start sweating.
        PolInSpaceHigh* = #JNSQscience_SEDA_PolInSpaceHigh_01 // Exposure samples show slow erosion from energetic particles and occasional micrometeoroid taps. SEDA declares the dataset “pristine,” which is not the same as “safe.”

        LindorInSpaceLow* = #JNSQscience_SEDA_LindorInSpaceLow_00 // SEDA reports a busy magnetospheric soup: charged particles surge in waves, then slam back without warning. The electronics test board quietly requests thicker shielding.
        LindorInSpaceLow* = #JNSQscience_SEDA_LindorInSpaceLow_01 // Plasma sensors sketch sweeping currents around Lindor, and the high-energy counters chatter like an excited Geiger counter. The exposure plates age fast enough to notice.
        LindorInSpaceHigh* = #JNSQscience_SEDA_LindorInSpaceHigh_00 // Higher out, the particle flux steadies into a cleaner baseline with occasional sharp spikes. The detectors seem relieved to count something other than “too much.”
        LindorInSpaceHigh* = #JNSQscience_SEDA_LindorInSpaceHigh_01 // Heavy-ion tracks appear as neat, isolated events instead of constant noise. The materials rack looks unchanged, but the dosimeter looks personally attacked.

        KrelInSpaceLow* = #JNSQscience_SEDA_KrelInSpaceLow_00 // Near Krel, SEDA catches thin plasma wakes that snap into shape as the moon slips through Lindor’s environment. Dust hits arrive in tiny, impatient taps.
        KrelInSpaceLow* = #JNSQscience_SEDA_KrelInSpaceLow_01 // The particle channels rise and fall in rhythmic bands, like Krel is orbiting through invisible weather. The electronics evaluation logs “intermittent weirdness” and keeps going.
        KrelInSpaceHigh* = #JNSQscience_SEDA_KrelInSpaceHigh_00 // Farther from Krel, readings drift back toward Lindor-system background with fewer dust spikes. The plasma sensors keep insisting they can still “see” the moon’s passage.
        KrelInSpaceHigh* = #JNSQscience_SEDA_KrelInSpaceHigh_01 // Radiation stays steady enough to make a good long-duration stress test. The test board passes, but it does so with suspiciously frequent self-checks.

        AdenInSpaceLow* = #JNSQscience_SEDA_AdenInSpaceLow_00 // Low over Aden, the dust sensor registers brief showers that look like impact-kicked grit wandering into orbit. The exposure coupons come back lightly peppered.
        AdenInSpaceLow* = #JNSQscience_SEDA_AdenInSpaceLow_01 // SEDA records energetic particles sweeping past in uneven pulses, as if Aden keeps dipping in and out of harsher bands. The electronics board catches a clean single-event upset and pretends it didn’t.
        AdenInSpaceHigh* = #JNSQscience_SEDA_AdenInSpaceHigh_00 // Higher up, the particle mix smooths out, leaving a calm-looking graph that still never reaches “safe.” The materials rack reports slow erosion and fast lesson-learning.
        AdenInSpaceHigh* = #JNSQscience_SEDA_AdenInSpaceHigh_01 // Plasma density drops, but high-energy channels remain stubbornly active. SEDA labels the dataset “excellent,” which is not the same as “pleasant.”

        HuygenInSpaceLow* = #JNSQscience_SEDA_HuygenInSpaceLow_00 // Near Huygen, SEDA measures a complicated plasma interaction around the hazy world. The counters spike in bursts, like the system can’t decide what it wants to do.
        HuygenInSpaceLow* = #JNSQscience_SEDA_HuygenInSpaceLow_01 // The exposure panels pick up a faint film and a few energetic-particle scars. The electronics evaluation recommends sealing anything that looks like it has a seam.
        HuygenInSpaceHigh* = #JNSQscience_SEDA_HuygenInSpaceHigh_00 // Farther out, the readings settle into Lindor-system background with occasional surges. The surges always arrive right when you stop watching.
        HuygenInSpaceHigh* = #JNSQscience_SEDA_HuygenInSpaceHigh_01 // Heavy-ions show up as crisp, isolated tracks through the detector stack. The instrument logs them with calm precision while you re-check the reboot procedure.

        RigaInSpaceLow* = #JNSQscience_SEDA_RigaInSpaceLow_00 // SEDA records dense, lively particle traffic near Riga, with plasma signatures that shift sharply over a single orbit. The radiation channels climb, then climb again.
        RigaInSpaceLow* = #JNSQscience_SEDA_RigaInSpaceLow_01 // Dust impacts tick the sensors like tiny hail, and the electronics test board logs noise in places that should be quiet. The materials rack takes the abuse with professional indifference.
        RigaInSpaceHigh* = #JNSQscience_SEDA_RigaInSpaceHigh_00 // Higher above Riga, dust falls off but energetic particles remain a steady presence. The exposure samples show slow, measurable wear—exactly what you were hoping not to measure.
        RigaInSpaceHigh* = #JNSQscience_SEDA_RigaInSpaceHigh_01 // Plasma readings become smoother, but the high-energy spikes still punch through at inconvenient times. SEDA politely calls them “events,” not “problems.”

        TalosInSpaceLow* = #JNSQscience_SEDA_TalosInSpaceLow_00 // Near Talos, the space environment feels thin and distant, until a sudden particle burst lights up every counter at once. The electronics evaluation marks it as “character-building.”
        TalosInSpaceLow* = #JNSQscience_SEDA_TalosInSpaceLow_01 // Dust stays low, but occasional micro-impacts leave clean little signatures on the plates. The sensors suggest Talos is quiet in the way that still keeps receipts.
        TalosInSpaceHigh* = #JNSQscience_SEDA_TalosInSpaceHigh_00 // Far above Talos, SEDA logs a clean baseline with long stretches of “nothing” that still add up over time. Perfect conditions for finding the slow failures.
        TalosInSpaceHigh* = #JNSQscience_SEDA_TalosInSpaceHigh_01 // Heavy-ion hits arrive rarely but decisively, flipping a bit here and there like cosmic punctuation. The test board passes, but it does so with a suspicious amount of humility.

        EelooInSpaceLow* = #JNSQscience_SEDA_EelooInSpaceLow_00 // SEDA reports a thin, sleepy plasma flow and a steady drizzle of high-energy particles. The exposure panels stay intact, but the dosimeter keeps quietly climbing.
        EelooInSpaceLow* = #JNSQscience_SEDA_EelooInSpaceLow_01 // With no magnetic shelter, cosmic radiation writes tidy little tracks through the detectors. The electronics test board passes—slowly, cautiously, and with extra error-checking.
        EelooInSpaceHigh* = #JNSQscience_SEDA_EelooInSpaceHigh_00 // Far above Eeloo, the environment smooths into a cold deep-space baseline with rare but decisive heavy-ion hits. The data is clean enough to make the engineers nervous.
        EelooInSpaceHigh* = #JNSQscience_SEDA_EelooInSpaceHigh_01 // Dust counts are near-zero for long stretches, then spike from a single tiny impact event. The witness plates come back with a few perfect pinpricks, like the void signed its work.

        CelesInSpaceLow* = #JNSQscience_SEDA_CelesInSpaceLow_00 // Near Celes, SEDA measures a crisp particle wake that snaps into place each orbit. The plasma plots look elegant, which is suspicious in space.
        CelesInSpaceLow* = #JNSQscience_SEDA_CelesInSpaceLow_01 // Radiation levels remain “normal,” yet still manage to flip a test bit at the worst possible time. The electronics evaluation labels it “expected” and you label it “rude.”
        CelesInSpaceHigh* = #JNSQscience_SEDA_CelesInSpaceHigh_01 // Higher up, the readings flatten into steady background radiation and sparse plasma. The materials rack reports “minimal change,” which is exactly why this is a good exposure test.
        CelesInSpaceHigh* = #JNSQscience_SEDA_CelesInSpaceHigh_00 // Heavy-ion events arrive rarely but leave unmistakable signatures across the detector stack. SEDA logs them like a proud accountant of tiny disasters.

        TamInSpaceLow* = #JNSQscience_SEDA_TamInSpaceLow_01 // SEDA’s dust sensor ticks constantly, as if Tam is surrounded by a personal cloud of grit and bad intentions. The exposure plates come back lightly sandblasted.
        TamInSpaceLow* = #JNSQscience_SEDA_TamInSpaceLow_00 // Particle counters show sharp, jittery spikes as you skim past the irregular moon. The electronics test board reboots once, then pretends it was just stretching.
        TamInSpaceHigh* = #JNSQscience_SEDA_TamInSpaceHigh_01 // Farther out, dust falls away but radiation remains a steady, patient stress test. The long-duration logs are excellent at finding the parts you over-trusted.
        TamInSpaceHigh* = #JNSQscience_SEDA_TamInSpaceHigh_00 // Plasma density is low, yet the instrument still catches faint structure in Tam’s wake. It’s the quiet kind of “interesting” that makes you double-check your orbit.

        HamekInSpaceLow* = #JNSQscience_SEDA_HamekInSpaceLow_01 // SEDA records a stubborn radiation background with occasional energetic surges that arrive without warning. The electronics evaluation notes “intermittent anomalies” and underlines it twice.
        HamekInSpaceLow* = #JNSQscience_SEDA_HamekInSpaceLow_00 // Dust impacts show up as isolated taps, followed by long silence. The witness plates return with a few microscopic dents, like Hamek flicked pebbles at the spacecraft.
        HamekInSpaceHigh* = #JNSQscience_SEDA_HamekInSpaceHigh_01 // High above Hamek, the environment settles into cold, clean deep-space measurements. The data looks calm, but the heavy-ion channel refuses to stop reminding you where you are.
        HamekInSpaceHigh* = #JNSQscience_SEDA_HamekInSpaceHigh_00 // The exposure samples change slowly—almost politely—while the detectors keep counting particles that never sleep. SEDA recommends “continued monitoring,” which is scientist code for “don’t get comfortable.”

        NaraInSpaceLow* = #JNSQscience_SEDA_NaraInSpaceLow_01 // SEDA tastes Nara’s upper ionosphere: thin plasma layers, drifting charged particles, and a steady fog of atomic hydrogen that wants to eat your coatings.
        NaraInSpaceLow* = #JNSQscience_SEDA_NaraInSpaceLow_01 // The sensors map broad, orderly currents that suggest a “normal” magnetic field doing its job. The electronics test board still logs a few grumpy bit-flips anyway.
        NaraInSpaceHigh* = #JNSQscience_SEDA_NaraInSpaceHigh_00 // Higher out, the readings flatten into a harsher baseline of solar wind and high-energy particles. The materials rack begins its slow, patient losing argument with radiation.
        NaraInSpaceHigh* = #JNSQscience_SEDA_NaraInSpaceHigh_01 // SEDA catches occasional heavy-ion strikes that arrive like cosmic punctuation. The device evaluation notes “single-event upsets” while you note “single-event heart attacks.”

        AmosInSpaceLow* = #JNSQscience_SEDA_AmosInSpaceLow_00 // Amos has no atmosphere and no mercy: dust taps the plates, and Nara’s particle environment does the rest. The counters chatter like they’re trying to warn you personally.
        AmosInSpaceLow* = #JNSQscience_SEDA_AmosInSpaceLow_01 // Plasma readings form a crisp wake as you skim low over the dark moon. The electronics board passes the test by repeatedly checking if it’s still alive.
        AmosInSpaceHigh* = #JNSQscience_SEDA_AmosInSpaceHigh_00 // Farther out, the dust quiets down, but the radiation background stays stubborn. SEDA labels it “ideal for long-duration exposure,” which is scientist for “please don’t.”
        AmosInSpaceHigh* = #JNSQscience_SEDA_AmosInSpaceHigh_01 // Particle flux rises and falls as if invisible space weather is sweeping through. The instrument logs it calmly; you schedule extra reboots just in case.

        EnonInSpaceLow* = #JNSQscience_SEDA_EnonInSpaceLow_00 // SEDA detects charged ice grains and sputtered particles skimming off Enon’s pale surface. The exposure samples return with tiny “frost-burn” scars.
        EnonInSpaceLow* = #JNSQscience_SEDA_EnonInSpaceLow_01 // High-energy channels spike whenever Enon passes through harsher bands around Nara. The electronics test board records a clean upset, then pretends it was just blinking.
        EnonInSpaceHigh* = #JNSQscience_SEDA_EnonInSpaceHigh_00 // Higher above Enon, plasma thins to a faint, steady flow with occasional surges. The detectors seem relieved to count something other than “cold silence.”
        EnonInSpaceHigh* = #JNSQscience_SEDA_EnonInSpaceHigh_01 // Cosmic rays and heavy ions leave neat tracks through the sensor stack. The materials rack barely changes; the dosimeter keeps climbing like it’s proud.

        PraxInSpaceLow* = #JNSQscience_SEDA_PraxInSpaceLow_00 // Near Prax, the dust sensor ticks in uneven bursts, as if the fringe moon is surrounded by wandering grit and bad timing. The witness plates come back lightly peppered.
        PraxInSpaceLow* = #JNSQscience_SEDA_PraxInSpaceLow_01 // Particle counters show a steady background with sudden sharp spikes that make the electronics board do a quick self-check. SEDA calls it “environmental variability.”
        PraxInSpaceHigh* = #JNSQscience_SEDA_PraxInSpaceHigh_00 // Far above Prax, the data smooths into clean deep-space baselines: thin plasma, persistent radiation, and long stretches of “nothing” that still add up.
        PraxInSpaceHigh* = #JNSQscience_SEDA_PraxInSpaceHigh_01 // Rare heavy-ion hits arrive with enough confidence to flip a bit and leave. The device evaluation recommends better shielding in the tone of a disappointed instructor.
    }
}