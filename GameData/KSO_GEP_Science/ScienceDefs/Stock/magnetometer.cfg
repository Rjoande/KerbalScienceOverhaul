@EXPERIMENT_DEFINITION:HAS[#id[magnetometer]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_magnetometer_GrannusInSpaceLow_00 // The needle pegs, then dances—Grannus’ field twists around the craft like an invisible storm. Mission Control asks for a re-read; you tell them you’ll hear that request in a few minutes.
        GrannusInSpaceHigh* = #GEPscience_magnetometer_GrannusInSpaceHigh_00 // Even out here the magnetometer still hums with activity; Grannus’ magnetic reach is bigger than your comfort zone. The trace looks like someone spilled spaghetti on the chart recorder.

        TaranisInSpaceLow* = #GEPscience_magnetometer_TaranisInSpaceLow_00 // Close to Taranis, the instrument reports almost nothing—just a nervous hiss of background noise. Every so often, a sharp spike says Grannus is stirring the space around it anyway.
        TaranisInSpaceHigh* = #GEPscience_magnetometer_TaranisInSpaceHigh_00 // Farther out, Taranis’ “signal” vanishes into Grannus’ restless field. By the time the data makes it home, you’ve forgotten what you were trying to prove.

        ToutatisInSpaceLow* = #GEPscience_magnetometer_ToutatisInSpaceLow_00 // Toutatis shows a modest, lopsided field that shifts as you pass from the baked hemisphere toward the dark side. The team argues whether it’s a real dynamo or the crust clinging to old magnetism.
        ToutatisInSpaceHigh* = #GEPscience_magnetometer_ToutatisInSpaceHigh_00 // At high orbit the field smooths out and stretches into a long tail pointing away from Grannus. It feels like you’re measuring the wind, not the world.

        NodensInSpaceLow* = #GEPscience_magnetometer_NodensInSpaceLow_00 // The magnetometer locks onto a confident, planet-sized signal—Nodens has a real field, not just wishful thinking. Under Grannus’ dim red glare, the readout still feels like it belongs to a much friendlier star.
        NodensInSpaceHigh* = #GEPscience_magnetometer_NodensInSpaceHigh_00 // Far above Nodens, the field lines stretch into a long, ragged tail pointing away from Grannus. The data drifts in late, like every answer out here: accurate, but never on time.

        BelisamaInSpaceLow* = #GEPscience_magnetometer_BelisamaInSpaceLow_00 // Belisama’s “field” is mostly Nodens shouting over it; the needle wobbles with every pass through the parent planet’s influence. You label the plot “Moon: Present, Magnetic: Questionable.”
        BelisamaInSpaceHigh* = #GEPscience_magnetometer_BelisamaInSpaceHigh_00 // Higher up, the magnetometer settles into a thin, low signal that comes confirmably from somewhere else. Belisama isn’t generating much—she’s borrowing whatever Nodens and Grannus will spare.

        SucellusInSpaceLow* = #GEPscience_magnetometer_SucellusInSpaceLow_00 // The instrument keeps insisting there’s almost nothing here, and the radiation counter loudly disagrees. Sucellus offers little magnetic shelter—just a cold rock and the long-distance weather of Grannus.
        SucellusInSpaceHigh* = #GEPscience_magnetometer_SucellusInSpaceHigh_00 // Out here the “Sucellus reading” fades into background and the space around it takes over. The magnetometer maps a restless, star-driven field that makes the whole system feel unsettled.

        CaireenInSpaceLow* = #GEPscience_magnetometer_CaireenInSpaceLow_00 // The magnetometer mostly measures the spacecraft’s own moods until a few sharp spikes interrupt it. Caireen’s a captured oddity—small enough to ignore, yet somehow still a complication under this red sun.
        CaireenInSpaceHigh* = #GEPscience_magnetometer_CaireenInSpaceHigh_00 // At altitude, Caireen disappears from the magnetic story entirely. What remains is a faint, distant pull and a lot of empty space between your probe and the next conversation.

        SironaInSpaceLow* = #GEPscience_magnetometer_SironaInSpaceLow_00 // The magnetometer needle slams over and stays there—Sirona’s field is a proper, planet-sized beast. The signal jitters in rhythmic bursts, like the rings are crackling with charged dust.
        SironaInSpaceHigh* = #GEPscience_magnetometer_SironaInSpaceHigh_00 // Far above Sirona, the field lines stretch into a long, messy tail pointing away from Grannus. The data arrives home late, but the shape is clear: this giant dominates the space around it.

        AirmedInSpaceLow* = #GEPscience_magnetometer_AirmedInSpaceLow_00 // Near Airmed, the readings flip between “moon” and “Sirona” every few seconds. You suspect Airmed isn’t making a field so much as wearing Sirona’s like an oversized coat.
        AirmedInSpaceHigh* = #GEPscience_magnetometer_AirmedInSpaceHigh_00 // Higher up, Airmed’s signature thins to almost nothing and the background takes over. It’s mostly Sirona’s magnetosphere out here, with Grannus quietly stirring the edges.

        BorvoInSpaceLow* = #GEPscience_magnetometer_BorvoInSpaceLow_00 // The instrument reports a weak, patchy signal that changes with altitude and attitude—either Borvo has magnetized crust, or your craft is picking up ring grit stuck to the hull again. You log it as “interesting” and “annoying.”
        BorvoInSpaceHigh* = #GEPscience_magnetometer_BorvoInSpaceHigh_00 // At distance, Borvo disappears into Sirona’s field and the general restlessness of this system. The magnetometer becomes a long-range weather vane for invisible space storms.

        DamonaInSpaceLow* = #GEPscience_magnetometer_DamonaInSpaceLow_00 // Damona’s local reading is subtle until a sharp spike cuts through—like passing a buried bar magnet the size of a continent. Mission Control asks for repeats; you reply that repeats will take a while out here.
        DamonaInSpaceHigh* = #GEPscience_magnetometer_DamonaInSpaceHigh_00 // From high orbit, Damona’s effect fades and the trace smooths into Sirona’s broad influence. The moon is a small interruption in a very large, very distant magnetic story.

        EponaInSpaceLow* = #GEPscience_magnetometer_EponaInSpaceLow_00 // The magnetometer finds a faint, steady field that shouldn’t be there—either Epona has a sleepy core, or the red-dwarf environment is “helping” in unsettling ways. The needle twitches like it’s cold.
        EponaInSpaceHigh* = #GEPscience_magnetometer_EponaInSpaceHigh_00 // Farther out, Epona’s signal thins into a barely-there curve and the instrument starts reporting the system itself. The emptiness between packets of data feels wider than the orbit.

        RosmertaInSpaceLow* = #GEPscience_magnetometer_RosmertaInSpaceLow_00 // The readout stays stubbornly near zero as Rosmerta drifts below, indifferent and airless. Once in a while the trace jumps—more like Epona’s influence brushing past than anything Rosmerta is doing.
        RosmertaInSpaceHigh* = #GEPscience_magnetometer_RosmertaInSpaceHigh_00 // At altitude, Rosmerta vanishes from the magnetic story entirely. It’s just quiet space, a dim red sun, and a sensor waiting for something worth measuring.

        RAB-58EInSpaceLow* = #GEPscience_magnetometer_RAB-58EInSpaceLow_00 // The magnetometer mostly measures the spacecraft until a brief wobble suggests a few magnetized rocks are hitching a ride on this captured oddity. You label the file “probably nothing” and keep it anyway.
        RAB-58EInSpaceHigh* = #GEPscience_magnetometer_RAB-58EInSpaceHigh_00 // From high orbit, RAB-58E is too small to leave a magnetic fingerprint. The instrument becomes a long-range listener for distant disturbances that arrive long after they happen.

        CernunnosInSpaceLow* = #GEPscience_magnetometer_CernunnosInSpaceLow_00 // Cernunnos offers almost perfect silence—no field, no shielding, just an icy dwarf and the raw, exposed space around it. For once, “nothing” is extremely useful calibration data.
        CernunnosInSpaceHigh* = #GEPscience_magnetometer_CernunnosInSpaceHigh_00 // High above Cernunnos, the trace is smooth and uneasy, like the system is holding its breath. The red sun’s invisible weather is the only thing left to map out here.
    }
}