@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        SunFlyingHigh* = #JNSQscience_crewReport_SunFlyingHigh_00 // The crew report that “flying” here is a generous term. Everything outside is glare, vibration, and a steady chorus of cooling pumps.
        SunFlyingLowNorthPolarZone* = #JNSQscience_crewReport_SunFlyingLowNorthPolarZone_00 // The crew watches pale streamers whip past the windows and agrees that the “polar weather” is trying to steal the ship.
        SunFlyingLowNorthSubpolarZone* = #JNSQscience_crewReport_SunFlyingLowNorthSubpolarZone_00 // The cabin lights flicker as charged particles rattle the hull. The crew calls it “free entertainment” and then stops laughing.
        SunFlyingLowNorthTemperateZone* = #JNSQscience_crewReport_SunFlyingLowNorthTemperateZone_00 // The outside looks calm for half a second, then boils again. The crew logs: “Brightness: yes.”
        SunFlyingLowNorthTropicZone* = #JNSQscience_crewReport_SunFlyingLowNorthTropicZone_00 // The ship shudders through roiling layers. The crew debates whether sunscreen can be applied to the entire spacecraft.
        SunFlyingLowEquatorialZone* = #JNSQscience_crewReport_SunFlyingLowEquatorialZone_00 // The view is an endless, writhing furnace. The crew report that shadows are now a treasured scientific resource.
        SunFlyingLowSouthTropicZone* = #JNSQscience_crewReport_SunFlyingLowSouthTropicZone_00 // Turbulence throws the ship around like a toy. The crew report that their stomachs have filed a complaint with Mission Control.
        SunFlyingLowSouthTemperateZone* = #JNSQscience_crewReport_SunFlyingLowSouthTemperateZone_00 // The instruments insist you are still “in atmosphere.” The crew insists this is an insult to atmospheres everywhere.
        SunFlyingLowSouthSubpolarZone* = #JNSQscience_crewReport_SunFlyingLowSouthSubpolarZone_00 // The hull crackles with static and the windows glow. The crew report that the concept of “outside” has become deeply personal.
        SunFlyingLowSouthPolarZone* = #JNSQscience_crewReport_SunFlyingLowSouthPolarZone_00 // Fast-moving ions pelt the ship from odd angles. The crew report that the pole is either fascinating, or actively offended by visitors.

        MohoSrfLandedCraters* = #JNSQscience_crewReport_MohoSrfLandedCraters_00 // Every direction is another impact scar. You start rating them by how good they’d be for a rover jump.
        MohoSrfLandedCraters* = #JNSQscience_crewReport_MohoSrfLandedCraters_01 // Dust drifts in slow motion when you bump the hatch. You call it “catering for craters.”
        MohoSrfLandedExoticCraters* = #JNSQscience_crewReport_MohoSrfLandedExoticCraters_00 // This crater’s rim zig-zags like it was drawn with a shaky ruler. The crew quietly blames “space geology.”
        MohoSrfLandedExoticCraters* = #JNSQscience_crewReport_MohoSrfLandedExoticCraters_01 // The ejecta patterns look wrong in a way that’s hard to explain. You take extra photos, just in case they’re worth bragging about.
        MohoSrfLandedRareCraters* = #JNSQscience_crewReport_MohoSrfLandedRareCraters_00 // You finally find a crater that isn’t half-erased by older ones. It feels like discovering a clean spot on a workshop floor.
        MohoSrfLandedRareCraters* = #JNSQscience_crewReport_MohoSrfLandedRareCraters_01 // Its walls are sharper and darker than the surroundings. Someone suggests it “might still be warm” and everyone stops talking.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_crewReport_MohoSrfLandedVoronoiCraters_00 // The craters fit together like a strange tiled floor. You wonder if Moho is trying to be an engineer.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_crewReport_MohoSrfLandedVoronoiCraters_01 // From the window it looks organized; up close it’s still chaos and rocks. Order, but crunchy.
        MohoSrfLandedNotableCraters* = #JNSQscience_crewReport_MohoSrfLandedNotableCraters_00 // Mission Control is excited because this one has a name. The crew is excited because it has shade.
        MohoSrfLandedNotableCraters* = #JNSQscience_crewReport_MohoSrfLandedNotableCraters_01 // You pose the flag where the view is most dramatic and pretend the heat doesn’t exist for a whole five seconds.
        MohoSrfLandedPeaks* = #JNSQscience_crewReport_MohoSrfLandedPeaks_00 // The peaks rise like melted teeth frozen mid-bite. You decide climbing is optional science.
        MohoSrfLandedPeaks* = #JNSQscience_crewReport_MohoSrfLandedPeaks_01 // Up here the sunlight is relentless and the shadows are knife-sharp. The crew agrees to admire the view from inside.

        EveSrfLandedKrakensWell* = #JNSQscience_crewReport_EveSrfLandedKrakensWell_00 // The ground drops away into a dark hole nearby. You make a note to keep the rover on a short leash.
        EveSrfLandedKrakensWell* = #JNSQscience_crewReport_EveSrfLandedKrakensWell_01 // Static crackles over the radio whenever you face the well. You pretend not to notice and keep writing.
        EveSrfSplashedPolarLakes* = #JNSQscience_crewReport_EveSrfSplashedPolarLakes_00 // The lake is calmer than the open seas, but the capsule still feels like it is being gently shaken.
        EveSrfSplashedPolarLakes* = #JNSQscience_crewReport_EveSrfSplashedPolarLakes_01 // You keep expecting ice near the poles. The thermometer keeps proving you wrong.
        EveSrfSplashedPetrolLakes* = #JNSQscience_crewReport_EveSrfSplashedPetrolLakes_00 // Someone suggests bottling a sample. The suggestion dies after the first whiff.
        EveSrfSplashedSeaofAkron* = #JNSQscience_crewReport_EveSrfSplashedSeaofAkron_00 // The Sea of Akron slaps the hull with a lazy wave. You fall over anyway.
        EveSrfSplashedSeaofAkron* = #JNSQscience_crewReport_EveSrfSplashedSeaofAkron_01 // Even with filters running, the cabin has that sharp solvent smell again.
        EveSrfSplashedSeaofNessus* = #JNSQscience_crewReport_EveSrfSplashedSeaofNessus_00 // The Sea of Nessus surrounds the capsule in endless purple. The return plan suddenly feels theoretical.
        EveSrfSplashedSeaofNessus* = #JNSQscience_crewReport_EveSrfSplashedSeaofNessus_01 // A quick taste test is proposed and immediately rejected by everyone who likes breathing.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_crewReport_EveSrfSplashedSeaofTaniwha_00 // The Sea of Taniwha looks smooth, but the surface seems to grab at the hull.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_crewReport_EveSrfSplashedSeaofTaniwha_01 // You watch bubbles rise and pop, and decide to keep the hatch sealed forever.
        EveSrfSplashedSeaofGigan* = #JNSQscience_crewReport_EveSrfSplashedSeaofGigan_00 // The Sea of Gigan rolls slow, heavy swells under the crushing air.
        EveSrfSplashedSeaofGigan* = #JNSQscience_crewReport_EveSrfSplashedSeaofGigan_01 // Every splash sounds wrong, like the ocean is made of something thicker than water.
        EveSrfSplashedSeaofRodan* = #JNSQscience_crewReport_EveSrfSplashedSeaofRodan_00 // A small wave hits. In Eve gravity that counts as an exercise program.
        EveSrfSplashedSeaofRodan* = #JNSQscience_crewReport_EveSrfSplashedSeaofRodan_01 // The view is pretty in a “please don’t dissolve us” sort of way.
        EveSrfSplashedSeaofGojira* = #JNSQscience_crewReport_EveSrfSplashedSeaofGojira_00 // The Sea of Gojira is quiet enough that you can hear the hull creak.
        EveSrfSplashedSeaofGojira* = #JNSQscience_crewReport_EveSrfSplashedSeaofGojira_01 // The purple liquid beads on the window like it does not want to let go.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_crewReport_EveSrfSplashedSeaofGhidorah_00 // You spot multiple currents meeting and decide the sea has too many opinions.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_crewReport_EveSrfSplashedSeaofGhidorah_01 // Something taps the capsule. It is probably just debris. Probably.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_crewReport_EveSrfSplashedSeaofBagorah_00 // The Sea of Bagorah smells faintly like paint thinner and bad decisions.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_crewReport_EveSrfSplashedSeaofBagorah_01 // You try to stand, fail, and log the experiment as “high-gravity yoga”.
        EveFlyingLowPolarLakes* = #JNSQscience_crewReport_EveFlyingLowPolarLakes_00 // From low altitude the lake looks like a bruise in the landscape, perfectly still in the thick air.
        EveFlyingLowPolarLakes* = #JNSQscience_crewReport_EveFlyingLowPolarLakes_01 // You wonder why it is not called a sea, then remember seas do not usually sit inside crater walls.
        EveFlyingLowPetrolLakes* = #JNSQscience_crewReport_EveFlyingLowPetrolLakes_00 // Ripples spread in slow motion across the lake, as if the air is syrup.
        EveFlyingLowPetrolLakes* = #JNSQscience_crewReport_EveFlyingLowPetrolLakes_01 // You try not to imagine ditching in that stuff. The safety briefing suddenly seems too short.
        EveFlyingLowSeaofAkron* = #JNSQscience_crewReport_EveFlyingLowSeaofAkron_00 // The purple sea shimmers beneath the haze. You keep one hand on the abort switch.
        EveFlyingLowSeaofAkron* = #JNSQscience_crewReport_EveFlyingLowSeaofAkron_01 // The window is warm to the touch, and you are not sure if that is the air or your nerves.
        EveFlyingLowSeaofNessus* = #JNSQscience_crewReport_EveFlyingLowSeaofNessus_00 // A patch of ripples crawls across the surface, slow as molasses.
        EveFlyingLowSeaofNessus* = #JNSQscience_crewReport_EveFlyingLowSeaofNessus_01 // You try not to imagine an engine-out landing here. Your imagination ignores you.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_crewReport_EveFlyingLowSeaofTaniwha_00 // The thick air mutes the waves into gentle wrinkles.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_crewReport_EveFlyingLowSeaofTaniwha_01 // Something dark shifts under the surface. Mission Control says it is likely nothing.
        EveFlyingLowSeaofGigan* = #JNSQscience_crewReport_EveFlyingLowSeaofGigan_00 // The sea reflects purple light into the cabin, tinting everyone’s faces.
        EveFlyingLowSeaofGigan* = #JNSQscience_crewReport_EveFlyingLowSeaofGigan_01 // Your altitude feels wrong in this atmosphere, like Eve is moving the gauges on purpose.
        EveFlyingLowSeaofRodan* = #JNSQscience_crewReport_EveFlyingLowSeaofRodan_00 // The atmosphere is so dense the sea looks padded, like it cannot decide to splash.
        EveFlyingLowSeaofRodan* = #JNSQscience_crewReport_EveFlyingLowSeaofRodan_01 // You start to design a flotation device made entirely of optimism.
        EveFlyingLowSeaofGojira* = #JNSQscience_crewReport_EveFlyingLowSeaofGojira_00 // The surface glints like polished metal, and that thought makes you uneasy.
        EveFlyingLowSeaofGojira* = #JNSQscience_crewReport_EveFlyingLowSeaofGojira_01 // You check the hull temperature again. Still too warm. Still fine. Probably.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_crewReport_EveFlyingLowSeaofGhidorah_00 // Multiple streaks of ripples cross each other, like the sea has traffic lanes.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_crewReport_EveFlyingLowSeaofGhidorah_01 // You keep scanning for a landing site and keep finding more sea.
        EveFlyingLowSeaofBagorah* = #JNSQscience_crewReport_EveFlyingLowSeaofBagorah_00 // The haze turns the horizon into a purple smear. You fly by instruments and superstition.
        EveFlyingLowSeaofBagorah* = #JNSQscience_crewReport_EveFlyingLowSeaofBagorah_01 // The sea below looks eager. You decide not to test that theory.
        EveFlyingLowKrakensWell* = #JNSQscience_crewReport_EveFlyingLowKrakensWell_00 // The well looks like a bite taken out of the planet, swallowing haze and confidence.
        EveFlyingLowKrakensWell* = #JNSQscience_crewReport_EveFlyingLowKrakensWell_01 // Instruments twitch as you pass over the opening. Someone says “Kraken” and everyone gets very professional.

        KerbinSrfLandedLowlands* = #JNSQscience_crewReport_KerbinSrfLandedLowlands_00 // From the window the lowlands look soft and welcoming. Mission Control reminds you the landing legs disagree.
        KerbinSrfLandedLowlands* = #JNSQscience_crewReport_KerbinSrfLandedLowlands_01 // Someone suggests a picnic. Someone else points at the suit gloves and laughs.
        KerbinSrfLandedAridLowlands* = #JNSQscience_crewReport_KerbinSrfLandedAridLowlands_00 // You imagine how hot it would be if the capsule did not have the A/C on.
        KerbinSrfLandedAridLowlands* = #JNSQscience_crewReport_KerbinSrfLandedAridLowlands_01 // The crew stares at the arid lowlands and collectively decides to be thirsty.
        KerbinSrfLandedAridMountains* = #JNSQscience_crewReport_KerbinSrfLandedAridMountains_00 // The arid mountains look sharp enough to pop the capsule. You tighten every strap you can reach.
        KerbinSrfLandedAridMountains* = #JNSQscience_crewReport_KerbinSrfLandedAridMountains_01 // The crew debates whether rocks can be offended. The rocks outside remain silent and judgmental.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_crewReport_KerbinSrfLandedWelcomeBackIsland_00 // You spot WelcomeBackIsland on the horizon and immediately feel like someone is watching your landing technique.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_crewReport_KerbinSrfLandedWelcomeBackIsland_01 // The crew writes WELCOME BACK on the fogged window, then remembers they are still on Kerbin.
        KerbinSrfSplashedGreatLake* = #JNSQscience_crewReport_KerbinSrfSplashedGreatLake_00 // Splashdown in GreatLake. You declare yourself Captain of the Great Lake Navy.
        KerbinSrfSplashedGreatLake* = #JNSQscience_crewReport_KerbinSrfSplashedGreatLake_01 // You hope the hatch does not break and flood the pod. GreatLake looks very eager.
        KerbinSrfSplashedInlandWater* = #JNSQscience_crewReport_KerbinSrfSplashedInlandWater_00 // The capsule bobs in InlandWater like a very expensive bath toy.
        KerbinSrfSplashedInlandWater* = #JNSQscience_crewReport_KerbinSrfSplashedInlandWater_01 // Someone admits they cannot swim. Everyone agrees that is information that should have arrived earlier.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_crewReport_KerbinSrfSplashedKreenwichSea_00 // Arr mateys! Splashdown in the Kreenwich Sea. Mission Control requests you stop talking like that.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_crewReport_KerbinSrfSplashedKreenwichSea_01 // You look out at the Kreenwich Sea and wonder how many snacks you could fish out with a sample bag.
        KerbinSrfSplashedArcticSea* = #JNSQscience_crewReport_KerbinSrfSplashedArcticSea_00 // The Arctic Sea is cold enough that everyone agrees to keep the hatch closed.
        KerbinSrfSplashedArcticSea* = #JNSQscience_crewReport_KerbinSrfSplashedArcticSea_01 // You poke the window and decide the water looks like it might poke back.
        KerbinSrfSplashedForemansSea* = #JNSQscience_crewReport_KerbinSrfSplashedForemansSea_00 // Splashdown in ForemansSea. You volunteer someone else to go check for leaks.
        KerbinSrfSplashedForemansSea* = #JNSQscience_crewReport_KerbinSrfSplashedForemansSea_01 // You count waves until you remember you should be counting checklists.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_crewReport_KerbinSrfSplashedTriangulusSea_00 // You try to draw a triangle on the splash marks. The TriangulusSea refuses to hold still.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_crewReport_KerbinSrfSplashedTriangulusSea_01 // A small creature bumps the capsule. You decide it is named Squishy and is friendly.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_crewReport_KerbinSrfSplashedNorthernSea_00 // The NorthernSea rocks the capsule gently. Gently becomes less gently.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_crewReport_KerbinSrfSplashedNorthernSea_01 // You do not need to worry about pirates here. Probably.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_crewReport_KerbinSrfSplashedSub-ArcticSea_00 // In the Sub-Arctic Sea, you consider inventing a heated life raft. For science.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_crewReport_KerbinSrfSplashedSub-ArcticSea_01 // The crew practices emergency swimming motions. Everyone is still strapped in.
        KerbinSrfSplashedEasternSea* = #JNSQscience_crewReport_KerbinSrfSplashedEasternSea_00 // EasternSea looks peaceful from inside the capsule. The capsule is also very sealed.
        KerbinSrfSplashedEasternSea* = #JNSQscience_crewReport_KerbinSrfSplashedEasternSea_01 // You listen to the water slap the hull and pretend it is applause.
        KerbinSrfSplashedWesternSea* = #JNSQscience_crewReport_KerbinSrfSplashedWesternSea_00 // Splashdown in WesternSea. You announce a new longitude-based snack schedule.
        KerbinSrfSplashedWesternSea* = #JNSQscience_crewReport_KerbinSrfSplashedWesternSea_01 // You wonder if the capsule counts as a boat. The capsule does not answer.
        KerbinFlyingLowLowlands* = #JNSQscience_crewReport_KerbinFlyingLowLowlands_00 // The lowlands stretch out like a landing strip that never ends. Tempting.
        KerbinFlyingLowLowlands* = #JNSQscience_crewReport_KerbinFlyingLowLowlands_01 // Something keeps tapping the window. You decide it is just wind and definitely not a bird.
        KerbinFlyingLowAridLowlands* = #JNSQscience_crewReport_KerbinFlyingLowAridLowlands_00 // The heat rising from the arid lowlands makes the ground shimmer like a bad hologram.
        KerbinFlyingLowAridLowlands* = #JNSQscience_crewReport_KerbinFlyingLowAridLowlands_01 // In anticipation of the heat, you turn on the air conditioning and pretend that helps.
        KerbinFlyingLowAridMountains* = #JNSQscience_crewReport_KerbinFlyingLowAridMountains_00 // You have a bad feeling about the jagged arid mountains below.
        KerbinFlyingLowAridMountains* = #JNSQscience_crewReport_KerbinFlyingLowAridMountains_01 // Crashing here would not be good. You stop thinking about it. Mostly.
        KerbinFlyingLowGreatLake* = #JNSQscience_crewReport_KerbinFlyingLowGreatLake_00 // You are flying so low over GreatLake you notice ripples from your craft.
        KerbinFlyingLowGreatLake* = #JNSQscience_crewReport_KerbinFlyingLowGreatLake_01 // The water looks peaceful from here. You wonder if it is safe to drink, and then remember you are in a capsule.
        KerbinFlyingLowInlandWater* = #JNSQscience_crewReport_KerbinFlyingLowInlandWater_00 // From this perspective you can see the underwater topology in InlandWater.
        KerbinFlyingLowInlandWater* = #JNSQscience_crewReport_KerbinFlyingLowInlandWater_01 // You see a spray of water whipped up by the air rushing out of your way.
        KerbinFlyingLowKreenwichSea* = #JNSQscience_crewReport_KerbinFlyingLowKreenwichSea_00 // The Kreenwich Sea glitters under you. Someone tries to set a course by it. That is not how that works.
        KerbinFlyingLowKreenwichSea* = #JNSQscience_crewReport_KerbinFlyingLowKreenwichSea_01 // You imagine all the wonderful creatures that live below the waves, and immediately stop imagining.
        KerbinFlyingLowArcticSea* = #JNSQscience_crewReport_KerbinFlyingLowArcticSea_00 // Over Arctic Sea, the water looks like it is thinking about freezing just to spite you.
        KerbinFlyingLowArcticSea* = #JNSQscience_crewReport_KerbinFlyingLowArcticSea_01 // You are flying low enough to see disturbances in the water from your craft, and fog on the window from your breath.
        KerbinFlyingLowForemansSea* = #JNSQscience_crewReport_KerbinFlyingLowForemansSea_00 // ForemansSea rolls beneath you like a moving map. The map wins.
        KerbinFlyingLowForemansSea* = #JNSQscience_crewReport_KerbinFlyingLowForemansSea_01 // You see a spray of water from your slipstream and decide you have invented ocean weather.
        KerbinFlyingLowTriangulusSea* = #JNSQscience_crewReport_KerbinFlyingLowTriangulusSea_00 // Over TriangulusSea, you try to spot three points that line up. You get distracted by not crashing.
        KerbinFlyingLowTriangulusSea* = #JNSQscience_crewReport_KerbinFlyingLowTriangulusSea_01 // The water below looks calm. You know better than to trust it.
        KerbinFlyingLowNorthernSea* = #JNSQscience_crewReport_KerbinFlyingLowNorthernSea_00 // The NorthernSea looks cold and very, very wet.
        KerbinFlyingLowNorthernSea* = #JNSQscience_crewReport_KerbinFlyingLowNorthernSea_01 // From here the waves look tiny. You remind yourself that the capsule is also tiny.
        KerbinFlyingLowSub-ArcticSea* = #JNSQscience_crewReport_KerbinFlyingLowSub-ArcticSea_00 // You fly low over the Sub-Arctic Sea and feel the cabin temperature drop in sympathy.
        KerbinFlyingLowSub-ArcticSea* = #JNSQscience_crewReport_KerbinFlyingLowSub-ArcticSea_01 // The water below is a nice shade of nope.
        KerbinFlyingLowEasternSea* = #JNSQscience_crewReport_KerbinFlyingLowEasternSea_00 // EasternSea stretches to the horizon. You wonder how long it would take to skip the capsule like a stone.
        KerbinFlyingLowEasternSea* = #JNSQscience_crewReport_KerbinFlyingLowEasternSea_01 // The crew discusses fishing. Mission Control reminds you this is a spacecraft.
        KerbinFlyingLowWesternSea* = #JNSQscience_crewReport_KerbinFlyingLowWesternSea_00 // The WesternSea looks peaceful. The instruments disagree and call it an aerodynamic hazard.
        KerbinFlyingLowWesternSea* = #JNSQscience_crewReport_KerbinFlyingLowWesternSea_01 // You watch the sun glitter on the water and almost forget you are supposed to be reporting anything.
        KerbinFlyingLowWelcomeBackIsland* = #JNSQscience_crewReport_KerbinFlyingLowWelcomeBackIsland_00 // Welcome Back Island comes into view and the crew starts waving at nobody in particular.
        KerbinFlyingLowWelcomeBackIsland* = #JNSQscience_crewReport_KerbinFlyingLowWelcomeBackIsland_01 // You fly low enough to read the name on the map and suddenly feel judged by geography.

        MunSrfLandedPolarIceCraters* = #JNSQscience_crewReport_MunSrfLandedPolarIceCraters_00 // You mark the situation as “potentially icy” in the report, mostly to see if that gets you approved for a snow-cone machine next time.
        MunSrfLandedMountains* = #JNSQscience_crewReport_MunSrfLandedMountains_00 // You try to describe the jagged mountains in a calm, professional tone. It comes out as “pointy, pointy, very pointy.”
        MunSrfLandedMountains* = #JNSQscience_crewReport_MunSrfLandedMountains_01 // Mission Control asks for a status update. You reply “Nominal.” Then you add, quietly, “Also: mountains. Lots of mountains.”

        MinmusSrfLandedBrownBasins* = #JNSQscience_crewReport_MinmusSrfLandedBrownBasins_00 // The basin floor is stained a darker color, like someone tried to “improve” Minmus with syrup. Mission Control insists it’s geology.
        MinmusSrfLandedBrownBasins* = #JNSQscience_crewReport_MinmusSrfLandedBrownBasins_01 // The darker patches make the landscape look less like dessert and more like trouble. You collect notes anyway, just in case it’s both.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_crewReport_MinmusSrfLandedBrownLowlands_00 // The lowlands here are dark and smooth, with dust that clings to everything. Even the checklist looks a little dirtier.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_crewReport_MinmusSrfLandedBrownLowlands_01 // The terrain has a muted, brownish tint that breaks the mint illusion. You feel oddly disappointed, then relieved.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_crewReport_MinmusSrfLandedBrownMidlands_00 // The midlands are darker and slightly rougher than expected. The horizon wiggles with ridges like frozen waves.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_crewReport_MinmusSrfLandedBrownMidlands_01 // Everything outside is “mostly flat” until you try to drive it. You note that Minmus is good at lying with confidence.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_crewReport_MinmusSrfLandedBrownHighlands_00 // The high ground is brown-tinted and crunchy-looking, like overbaked mint cookies. You do not volunteer to taste-test.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_crewReport_MinmusSrfLandedBrownHighlands_01 // From up here, the flats look like giant plates set out for a picnic. The darker soil makes the shadows look extra sharp.
        
        DunaSrfLandedRareCraters* = #JNSQscience_crewReport_DunaSrfLandedRareCraters_00 // A lonely crater sits on an otherwise plain stretch of ground, like a pothole on a perfectly paved road.
        DunaSrfLandedRareCraters* = #JNSQscience_crewReport_DunaSrfLandedRareCraters_01 // You peer over the rim through the porthole. The shadows look deeper than they have any right to be in this weak light.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_crewReport_DunaSrfLandedVoronoiCraters_00 // The ground is tiled with oddly even pits. It looks like someone tried to stamp the whole planet with a cookie cutter.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_crewReport_DunaSrfLandedVoronoiCraters_01 // You sketch the pattern in the logbook. It seems too organized to be random, which makes it extra unsettling.
        DunaSrfLandedNotableCraters* = #JNSQscience_crewReport_DunaSrfLandedNotableCraters_00 // This crater has crisp edges and a messy ejecta blanket. Something hit here and didn't bother cleaning up.
        DunaSrfLandedNotableCraters* = #JNSQscience_crewReport_DunaSrfLandedNotableCraters_01 // You can see layers in the wall from your seat. It's like the planet is showing off its cross-section on purpose.
        DunaSrfLandedExoticCraters* = #JNSQscience_crewReport_DunaSrfLandedExoticCraters_00 // The crater floor gleams with pale ice, but the rim is coated in red grit. It's a dessert with the toppings in the wrong place.
        DunaSrfLandedExoticCraters* = #JNSQscience_crewReport_DunaSrfLandedExoticCraters_01 // The radiator cycles more often here. You tell Mission Control it's "definitely science" and not "definitely cold".
        DunaSrfLandedMountains* = #JNSQscience_crewReport_DunaSrfLandedMountains_00 // The mountains loom close, and the thin air makes the view look too clear and too empty at the same time.
        DunaSrfLandedMountains* = #JNSQscience_crewReport_DunaSrfLandedMountains_01 // Loose rocks tap against the hull as a gust rolls down the slopes. You pretend that sound is comforting.
        DunaSrfLandedVolcano* = #JNSQscience_crewReport_DunaSrfLandedVolcano_00 // Dark ground and fractured rock surround the craft. You half-expect the planet to burp.
        DunaSrfLandedVolcano* = #JNSQscience_crewReport_DunaSrfLandedVolcano_01 // The surface looks baked, then dusted over again. You describe it as "freshly ruined" and feel oddly proud.
        DunaFlyingLowRareCraters* = #JNSQscience_crewReport_DunaFlyingLowRareCraters_00 // A single crater drifts under you, perfectly framed by red plains. You briefly consider dropping a snack for scale.
        DunaFlyingLowRareCraters* = #JNSQscience_crewReport_DunaFlyingLowRareCraters_01 // The rim throws a long shadow that makes the altimeter feel suddenly important.
        DunaFlyingLowVoronoiCraters* = #JNSQscience_crewReport_DunaFlyingLowVoronoiCraters_00 // Below you is a honeycomb of pits and ridges. Your brain insists it's an artificial pattern and you tell it to stop.
        DunaFlyingLowVoronoiCraters* = #JNSQscience_crewReport_DunaFlyingLowVoronoiCraters_01 // Turbulence bumps the capsule as you trace the repeating shapes. The planet refuses to hold still for your sketch.
        DunaFlyingLowNotableCraters* = #JNSQscience_crewReport_DunaFlyingLowNotableCraters_00 // The crater's ejecta fans out like a splash frozen in time. You note it would be a great place to not land.
        DunaFlyingLowNotableCraters* = #JNSQscience_crewReport_DunaFlyingLowNotableCraters_01 // Dust devils spiral along the rim, tossing red grit into the thin air as if showing off.
        DunaFlyingLowExoticCraters* = #JNSQscience_crewReport_DunaFlyingLowExoticCraters_00 // The ice-filled crater below glows pale against the rust-colored ground. It's the brightest thing you've seen on this planet.
        DunaFlyingLowExoticCraters* = #JNSQscience_crewReport_DunaFlyingLowExoticCraters_01 // A cold gust rattles the cabin as you pass the crater wall. You secure everything that can fly, including your lunch.
        DunaFlyingLowMountains* = #JNSQscience_crewReport_DunaFlyingLowMountains_00 // Sharp peaks pass uncomfortably close to your window. You make a note to request "more sky" for future flight plans.
        DunaFlyingLowMountains* = #JNSQscience_crewReport_DunaFlyingLowMountains_01 // Updrafts bounce the ship over the slopes. You record it as atmospheric data and not as mild panic.
        DunaFlyingLowVolcano* = #JNSQscience_crewReport_DunaFlyingLowVolcano_00 // Heat-dark rock forms branching lines below, half-buried by dust. You wonder how recently "recent" is on Duna.
        DunaFlyingLowVolcano* = #JNSQscience_crewReport_DunaFlyingLowVolcano_01 // The air here feels even thinner, as if it is avoiding the ground. You log a stable reading and an unstable stomach.

        IkeSrfLandedLowlands* = #JNSQscience_crewReport_IkeSrfLandedLowlands_00 // The ground is flat, dusty, and looks like it has been punched by every rock in the system. You note that “flat” is still a relative term on Ike.
		IkeSrfLandedLowlands* = #JNSQscience_crewReport_IkeSrfLandedLowlands_01 // The landing legs sink into powdery regolith with a worrying crunch. The crew reports that Ike is made of “mostly dust, plus more dust.”
		IkeSrfLandedMidlands* = #JNSQscience_crewReport_IkeSrfLandedMidlands_00 // The terrain rolls gently, until it suddenly doesn’t. You recommend that future missions pack extra patience and fewer expectations.
		IkeSrfLandedMidlands* = #JNSQscience_crewReport_IkeSrfLandedMidlands_01 // You try to describe the landscape as “featureless,” then notice three different kinds of boulders staring back at you. You amend the report to “aggressively rocky.”
		IkeSrfLandedHighlands* = #JNSQscience_crewReport_IkeSrfLandedHighlands_00 // The high ground gives a wide view of craters, ridges, and a suspicious amount of empty. Everyone agrees it’s beautiful in a bleak sort of way.
		IkeSrfLandedHighlands* = #JNSQscience_crewReport_IkeSrfLandedHighlands_01 // From up here, you can see Duna hanging in the sky like a warning label. The crew reports a sudden desire to double-check the ascent plan.
		IkeInSpaceLow* = #JNSQscience_crewReport_IkeInSpaceLow_00 // In low orbit, Ike’s surface looks like a dark, cratered bruise, and it keeps getting closer whenever you blink. You report that the moon is “uncomfortably detailed” at this altitude.
		IkeInSpaceLow* = #JNSQscience_crewReport_IkeInSpaceLow_01 // Duna looms nearby while Ike spins beneath you, quietly reminding everyone that there is no air to forgive mistakes. The crew reports that they are suddenly very fond of checklists.
		IkeInSpaceHigh* = #JNSQscience_crewReport_IkeInSpaceHigh_00 // From high orbit, Ike is just a small charcoal dot escorting Duna around the sun. You note that it still manages to look unwelcoming from this far away.
		IkeInSpaceHigh* = #JNSQscience_crewReport_IkeInSpaceHigh_01 // The moon is tiny, the system is vast, and the cabin is full of scribbled notes and snack wrappers. You file the report under “successful intimidation by space.”

        EdnaSrfLandedLowlands* = #JNSQscience_crewReport_EdnaSrfLandedLowlands_00 // The landing lights cut across Edna’s lowlands and come back empty-handed, as if the ground is trying not to be seen.
        EdnaSrfLandedLowlands* = #JNSQscience_crewReport_EdnaSrfLandedLowlands_01 // You file a report describing “flat” terrain, then add a note that even the flat parts look like they’re plotting something.
        EdnaSrfLandedMidlands* = #JNSQscience_crewReport_EdnaSrfLandedMidlands_00 // The cabin feels strangely quiet, like Edna is absorbing every sound you make and keeping it for later.
        EdnaSrfLandedMidlands* = #JNSQscience_crewReport_EdnaSrfLandedMidlands_01 // You watch dust settle in slow motion and briefly consider billing it as an “extended-duration geology experiment.”
        EdnaSrfLandedHighlands* = #JNSQscience_crewReport_EdnaSrfLandedHighlands_00 // The highlands loom in the window like jagged teeth; you double-check that the brakes are still a thing in low gravity.
        EdnaSrfLandedHighlands* = #JNSQscience_crewReport_EdnaSrfLandedHighlands_01 // Mission log: the terrain outside is sharp, dark, and entirely uninterested in being friendly.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_crewReport_EdnaSrfLandedPolarIceCraters_00 // You aim the thermometer at the nearest shadowed crater and immediately regret learning numbers that small.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_crewReport_EdnaSrfLandedPolarIceCraters_01 // The view is all frost and darkness; you write “cold, quiet, suspicious” and underline the last part.
        EdnaSrfLandedWhites* = #JNSQscience_crewReport_EdnaSrfLandedWhites_00 // The bright patches outside glare back at you like someone spilled paint on a world that forgot what color is.
        EdnaSrfLandedWhites* = #JNSQscience_crewReport_EdnaSrfLandedWhites_01 // You note the strange pale ground and wonder if Edna is trying a disguise, poorly.
        EdnaInSpaceLow* = #JNSQscience_crewReport_EdnaInSpaceLow_00 // In low orbit, Edna looks like a dim bruise against the stars, and the instruments insist it’s still a whole planet.
        EdnaInSpaceLow* = #JNSQscience_crewReport_EdnaInSpaceLow_01 // You catch the surface slipping in and out of shadow as if it’s practicing being an occultation.
        EdnaInSpaceHigh* = #JNSQscience_crewReport_EdnaInSpaceHigh_00 // From high orbit, Edna is a lonely speck with an impressive talent for blending into the void.
        EdnaInSpaceHigh* = #JNSQscience_crewReport_EdnaInSpaceHigh_01 // You record that Edna appears calm, dark, and very far from everyone’s problem list. Except yours.

        DakSrfLandedLowlands* = #JNSQscience_crewReport_DakSrfLandedLowlands_00 // You confirm that Dak’s “lowlands” are mostly just “where you stopped drifting.” The ground still feels optional.
        DakSrfLandedLowlands* = #JNSQscience_crewReport_DakSrfLandedLowlands_01 // The surface looks like a battered potato that forgot it was supposed to be a moon. You feel strangely invited to stay.
        DakSrfLandedMidlands* = #JNSQscience_crewReport_DakSrfLandedMidlands_00 // You try to walk a straight line. Dak gently disagrees and rotates your mission plan a few degrees.
        DakSrfLandedMidlands* = #JNSQscience_crewReport_DakSrfLandedMidlands_01 // The terrain rolls by in slow motion as you hop. You file a report under “gravity: politely absent.”
        DakSrfLandedHighlands* = #JNSQscience_crewReport_DakSrfLandedHighlands_00 // From up here, the horizon is all stars and rubble. Dak’s “siren’s call” might just be your radio echoing off the rocks.
        DakSrfLandedHighlands* = #JNSQscience_crewReport_DakSrfLandedHighlands_01 // The highlands are sharp, cold, and quiet. You keep checking the ground to make sure it’s still attached.
        DakInSpaceLow* = #JNSQscience_crewReport_DakInSpaceLow_00 // Orbiting this tiny potato feels like escorting a runaway snack. You make small correction burns and promise to stop joking about it.
        DakInSpaceLow* = #JNSQscience_crewReport_DakInSpaceLow_01 // Dak spins lazily beneath you, all crags and shadows. You can’t shake the feeling it’s watching the ship back.
        DakInSpaceHigh* = #JNSQscience_crewReport_DakInSpaceHigh_00 // From high above, Dak is a speck with an attitude. Your instruments call it “asteroid,” your imagination calls it “trap.”
        DakInSpaceHigh* = #JNSQscience_crewReport_DakInSpaceHigh_01 // The view is mostly emptiness, with Dak holding the center like it owns the void. You log: “approach with caution, and snacks.”

        DresSrfLandedPoles* = #JNSQscience_crewReport_DresSrfLandedPoles_00 // The shadows here feel permanent. You briefly consider leaving a flashlight on just to prove a point.
        DresSrfLandedPoles* = #JNSQscience_crewReport_DresSrfLandedPoles_01 // Frost creeps across the window seal and your snacks go suspiciously crunchy. Science says "cold." Your teeth agree.
        DresSrfLandedMidlands* = #JNSQscience_crewReport_DresSrfLandedMidlands_00 // Nothing is flat, nothing is steep, and everything looks like it was filed down by boredom. It's oddly peaceful.
        DresSrfLandedMidlands* = #JNSQscience_crewReport_DresSrfLandedMidlands_01 // You try to describe the scenery, but your report keeps turning into a list of grays. Mission Control requests "more adjectives."
        DresSrfLandedLowlands* = #JNSQscience_crewReport_DresSrfLandedLowlands_00 // The ground looks like it has been gently tamped into place by a very patient universe. It still crunches when you step on it.
        DresSrfLandedLowlands* = #JNSQscience_crewReport_DresSrfLandedLowlands_01 // Dust drifts in lazy puffs around the landing gear. You swear it takes longer to settle than it takes to regret landing here.
        
        JoolFlyingLowEquatorialBands* = #JNSQscience_crewReport_JoolFlyingLowEquatorialBands_00 // The ship keeps getting shoved sideways as we cross invisible jet lanes. The bands aren’t just colors; they’re moving walls of air.
        JoolFlyingLowEquatorialBands* = #JNSQscience_crewReport_JoolFlyingLowEquatorialBands_01 // Every time we dip into a darker stripe, turbulence spikes and the pressure creeps up. The atmosphere feels layered like a very angry cake.
        JoolFlyingLowSubpolarBands* = #JNSQscience_crewReport_JoolFlyingLowSubpolarBands_00 // The air feels heavier and colder here, and the motion is all broad, slow rolls instead of sharp jolts. Like the planet is stirring a pot with a continent-sized spoon.
        JoolFlyingLowSubpolarBands* = #JNSQscience_crewReport_JoolFlyingLowSubpolarBands_01 // We’re skimming under the high haze and the clouds are stretched into long arcs. Something up there is steering everything down here.
        JoolFlyingLowNorthPole* = #JNSQscience_crewReport_JoolFlyingLowNorthPole_00 // The horizon is just spiral upon spiral. The whole sky looks like it’s trying to drain into a single point.
        JoolFlyingLowNorthPole* = #JNSQscience_crewReport_JoolFlyingLowNorthPole_01 // The motion here is strangely consistent: steady spin, steady shear, until it suddenly isn’t. We recommend not testing where “until” ends.
        JoolFlyingLowSouthPole* = #JNSQscience_crewReport_JoolFlyingLowSouthPole_00 // This pole has a different attitude: tight swirls, abrupt gusts, and a persistent pull toward the center of the storm pattern.
        JoolFlyingLowSouthPole* = #JNSQscience_crewReport_JoolFlyingLowSouthPole_01 // Visibility comes and goes in sheets of cloud. It feels like flying through rotating curtains that don’t want to open.
        JoolFlyingLowStormComplex* = #JNSQscience_crewReport_JoolFlyingLowStormComplex_00 // Updrafts punch the craft like a fist and then try to carry us away. We have entered the “why” portion of the flight plan.
        JoolFlyingLowStormComplex* = #JNSQscience_crewReport_JoolFlyingLowStormComplex_01 // Lightning flashes inside the cloud towers and the turbulence is rhythmic, like the storm is breathing. We would prefer it stop.
        JoolFlyingLowExposedLowerDeck* = #JNSQscience_crewReport_JoolFlyingLowExposedLowerDeck_00 // The upper haze thins out here and you can see down into darker layers. The air gets denser fast, like we slipped between decks.
        JoolFlyingLowExposedLowerDeck* = #JNSQscience_crewReport_JoolFlyingLowExposedLowerDeck_01 // The clouds are broken into gaps that reveal deeper circulation beneath. It’s unsettling to realize the “ground” is just more atmosphere waiting.

        LaytheSrfLandedShallows* = #JNSQscience_crewReport_LaytheSrfLandedShallows_00 // The waterline is uncomfortably close to the hatch. Everyone agrees to stop rocking the capsule “just to see what happens.”
        LaytheSrfLandedShallows* = #JNSQscience_crewReport_LaytheSrfLandedShallows_01 // The seabed is visible through the clear water. You take notes and quietly hope it stays that way.
        LaytheSrfLandedHighlands* = #JNSQscience_crewReport_LaytheSrfLandedHighlands_00 // From up here the seas look almost inviting, right up until you remember what they are orbiting. You log the view and double-check the brakes.
        LaytheSrfLandedHighlands* = #JNSQscience_crewReport_LaytheSrfLandedHighlands_01 // The terrain drops away in long slopes and sharp ridges. The crew votes to keep all doors closed until further notice.
        LaytheSrfLandedMountains* = #JNSQscience_crewReport_LaytheSrfLandedMountains_00 // The landing site is mostly rock, cliff, and regret. You record that the horizon is spectacular and the margin for error is not.
        LaytheSrfLandedMountains* = #JNSQscience_crewReport_LaytheSrfLandedMountains_01 // The mountains throw long shadows and the air feels thin through the cabin vents. Someone suggests planting a flag; someone else suggests not falling first.
        LaytheSrfLandedIceCaps* = #JNSQscience_crewReport_LaytheSrfLandedIceCaps_00 // The world outside is bright enough to make you squint through the glass. You note the ice and wonder why the nearby seas are still liquid.
        LaytheSrfLandedIceCaps* = #JNSQscience_crewReport_LaytheSrfLandedIceCaps_01 // Everything looks clean, cold, and very permanent. The crew starts planning a base and immediately runs out of snack storage.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_crewReport_LaytheSrfLandedEnclosedFaults_00 // The ground is a web of cracks and steep walls, like the surface tried to fold itself. You log possible tidal stress and keep the cabin lights on.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_crewReport_LaytheSrfLandedEnclosedFaults_01 // Shadows pool in the fissures and the landscape feels unfinished. The crew agrees that “interesting” is not the same as “safe.”
        LaytheSrfLandedLowlands* = #JNSQscience_crewReport_LaytheSrfLandedLowlands_00 // The land is broad and flat, with damp haze clinging close to the ground. You report that it is an excellent place to land and a terrible place to get stuck.
        LaytheSrfLandedLowlands* = #JNSQscience_crewReport_LaytheSrfLandedLowlands_01 // Everything outside looks soft enough to swallow landing legs. You make a note to avoid testing that hypothesis.
        LaytheSrfLandedMidlands* = #JNSQscience_crewReport_LaytheSrfLandedMidlands_00 // Rolling terrain stretches out in every direction, neither high nor low enough to be confident about. The crew debates whether this counts as “easy mode.”
        LaytheSrfLandedMidlands* = #JNSQscience_crewReport_LaytheSrfLandedMidlands_01 // A patchwork of land and water hints at changing weather nearby. You record the conditions and keep an eye on the clouds.
        LaytheSrfSplashedShores* = #JNSQscience_crewReport_LaytheSrfSplashedShores_00 // Land is right there, close enough to point at and far enough to be useless. You file a report titled “Please Send Boat.”
        LaytheSrfSplashedShores* = #JNSQscience_crewReport_LaytheSrfSplashedShores_01 // Waves slap the hull with surprising enthusiasm. The crew begins timing the bobbing and pretending it is science.
        LaytheSrfSplashedShallows* = #JNSQscience_crewReport_LaytheSrfSplashedShallows_00 // The water is shallow enough that the craft occasionally bumps something solid. You log the depth as “too shallow for comfort.”
        LaytheSrfSplashedShallows* = #JNSQscience_crewReport_LaytheSrfSplashedShallows_01 // You can see the bottom and it looks alarmingly scratchy. Everyone suddenly cares about hull paint quality.
        LaytheSrfSplashedInlandWater* = #JNSQscience_crewReport_LaytheSrfSplashedInlandWater_00 // The water is calmer here, boxed in by surrounding land. You record the stillness and the unfamiliar smell seeping through the air system.
        LaytheSrfSplashedInlandWater* = #JNSQscience_crewReport_LaytheSrfSplashedInlandWater_01 // Ripples spread out in neat circles from the capsule. The crew watches them far longer than is necessary.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_crewReport_LaytheSrfSplashedKrenwichSea_00 // The surface is restless and darker than you expected, with distant whitecaps forming in lines. You report that “swimming” would be a short career.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_crewReport_LaytheSrfSplashedKrenwichSea_01 // The cabin humidity spikes as spray coats the windows. You log the conditions and add “extra towels” to the next mission plan.
        LaytheSrfSplashedArcticSea* = #JNSQscience_crewReport_LaytheSrfSplashedArcticSea_00 // The water is painfully cold, and the air above it feels sharper than the rest of the moon. You record thermal warnings and keep all heaters on.
        LaytheSrfSplashedArcticSea* = #JNSQscience_crewReport_LaytheSrfSplashedArcticSea_01 // Thin slush drifts past the capsule like it owns the place. The crew agrees not to test if it is edible.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_crewReport_LaytheSrfSplashedJoolwardSea_00 // The green giant dominates the sky and the water reflects its color in unsettling ways. You report that the view is beautiful and mildly threatening.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_crewReport_LaytheSrfSplashedJoolwardSea_01 // The waves roll under a sky that never lets you forget where you are. You log a strong urge to point the antenna away from “that direction.”
        LaytheSrfSplashedPolwardSea* = #JNSQscience_crewReport_LaytheSrfSplashedPolwardSea_00 // Wind-driven chop rattles the capsule, and the air tastes colder through the filters. You record that the polar seas are not in a welcoming mood.
        LaytheSrfSplashedPolwardSea* = #JNSQscience_crewReport_LaytheSrfSplashedPolwardSea_01 // The horizon is a mix of water and pale terrain, blurred by mist. The crew files a unanimous complaint against “wet cold.”
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_crewReport_LaytheSrfSplashedEnclosedFaults_00 // You appear to have splashed down inside a fractured basin, with steep walls on all sides. You report that rescue options are “creative at best.”
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_crewReport_LaytheSrfSplashedEnclosedFaults_01 // The water laps against jagged rock like it is trying to widen the cracks. You log the scene and decide to stay buttoned up.
        LaytheFlyingLowShallows* = #JNSQscience_crewReport_LaytheFlyingLowShallows_00 // Sunlight flashes off the water in bright sheets, and you can almost pick out the bottom. You report excellent visibility and poor landing ideas.
        LaytheFlyingLowShallows* = #JNSQscience_crewReport_LaytheFlyingLowShallows_01 // The air is damp and smooth, with occasional bumps from rising warm pockets over the shallows. You record mild turbulence and stronger temptation.
        LaytheFlyingLowInlandWater* = #JNSQscience_crewReport_LaytheFlyingLowInlandWater_00 // The lake below sits like a mirror between darker landforms. You note calmer air and a sudden, suspicious feeling of familiarity.
        LaytheFlyingLowInlandWater* = #JNSQscience_crewReport_LaytheFlyingLowInlandWater_01 // Moist air fogs the lower windows for a moment. You log condensation rates and wipe the glass anyway.
        LaytheFlyingLowKrenwichSea* = #JNSQscience_crewReport_LaytheFlyingLowKrenwichSea_00 // Long rows of waves run beneath you like someone drew them with a ruler. You report steady winds and a very wet-looking future.
        LaytheFlyingLowKrenwichSea* = #JNSQscience_crewReport_LaytheFlyingLowKrenwichSea_01 // Sea spray hangs in the air near the surface, turning the horizon hazy. The crew closes vents and calls it “data collection.”
        LaytheFlyingLowArcticSea* = #JNSQscience_crewReport_LaytheFlyingLowArcticSea_00 // Low clouds and icy haze blur the boundary between sea and sky. You report reduced visibility and increased appreciation for instruments.
        LaytheFlyingLowArcticSea* = #JNSQscience_crewReport_LaytheFlyingLowArcticSea_01 // The air feels colder and heavier, and the engines sound slightly less cheerful. You log performance notes and keep altitude.
        LaytheFlyingLowJoolwardSea* = #JNSQscience_crewReport_LaytheFlyingLowJoolwardSea_00 // The sky has a faint green cast and Jool looms like an audience. You record the view and attempt to ignore it staring back.
        LaytheFlyingLowJoolwardSea* = #JNSQscience_crewReport_LaytheFlyingLowJoolwardSea_01 // The atmosphere shimmers in layers over the open water. You log wind shear and keep both hands very close to the controls.
        LaytheFlyingLowPolwardSea* = #JNSQscience_crewReport_LaytheFlyingLowPolwardSea_00 // The sea below is dark and choppy, and the air is full of biting gusts. You report “do not open any hatches, ever.”
        LaytheFlyingLowPolwardSea* = #JNSQscience_crewReport_LaytheFlyingLowPolwardSea_01 // Cold updrafts shove the craft around with rude confidence. You record turbulence and add more straps to the checklist.
        LaytheFlyingLowHighlands* = #JNSQscience_crewReport_LaytheFlyingLowHighlands_00 // Updrafts off the high terrain lift the craft unexpectedly. You report that Laythe’s air is fun right up until it tries to throw you.
        LaytheFlyingLowHighlands* = #JNSQscience_crewReport_LaytheFlyingLowHighlands_01 // The ground climbs toward you in slow, dramatic fashion. You log the topography and promise to respect it.
        LaytheFlyingLowMountains* = #JNSQscience_crewReport_LaytheFlyingLowMountains_00 // Ridge lift turns into sudden downdrafts with no warning. You report that the mountains are actively participating in the flight.
        LaytheFlyingLowMountains* = #JNSQscience_crewReport_LaytheFlyingLowMountains_01 // Peaks and valleys rush by beneath the nose. The crew agrees that sightseeing should wait until after survival.
        LaytheFlyingLowIceCaps* = #JNSQscience_crewReport_LaytheFlyingLowIceCaps_00 // The ice below is so bright it makes the cockpit feel overlit. You report glare conditions and a strong desire for tinted windows.
        LaytheFlyingLowEnclosedFaults* = #JNSQscience_crewReport_LaytheFlyingLowEnclosedFaults_00 // The surface is a cracked mosaic, with shadowed trenches cutting across the landscape. You report that navigation is easy and landing is not.
        LaytheFlyingLowEnclosedFaults* = #JNSQscience_crewReport_LaytheFlyingLowEnclosedFaults_01 // Wisps of mist cling to the fissures like they are breathing. You record the observation and avoid speculating over the radio.
        LaytheFlyingLowLowlands* = #JNSQscience_crewReport_LaytheFlyingLowLowlands_00 // Haze hugs the ground and blurs the terrain into soft shapes. You report that the lowlands are excellent at hiding things, including altitude.
        LaytheFlyingLowLowlands* = #JNSQscience_crewReport_LaytheFlyingLowLowlands_01 // The air is humid enough to fog instruments if you stare at them too hard. You log cabin conditions and run extra checks.
        LaytheFlyingLowMidlands* = #JNSQscience_crewReport_LaytheFlyingLowMidlands_00 // Patchy clouds drift past while the terrain alternates between gentle rises and shallow basins. You report steady flight with occasional surprises.
        LaytheFlyingLowMidlands* = #JNSQscience_crewReport_LaytheFlyingLowMidlands_01 // The crew takes turns at the window, trying to spot a “perfect landing spot” from the air. You record zero successful arguments.

        VallSrfLandedPoles* = #JNSQscience_crewReport_VallSrfLandedPoles_00 // Out the window is nothing but blue ice and hard shadow; you suddenly miss the sound of wind.
		VallSrfLandedPoles* = #JNSQscience_crewReport_VallSrfLandedPoles_01 // Jool hangs low on the horizon like a green warning sign while the ground quietly creaks beneath the lander.
		VallSrfLandedMountains* = #JNSQscience_crewReport_VallSrfLandedMountains_00 // The mountains here are sharp enough to file a landing leg, and you start questioning every “perfectly safe” assurance.
		VallSrfLandedMountains* = #JNSQscience_crewReport_VallSrfLandedMountains_01 // Low gravity makes the cliffs look inviting right up until you remember that falling still works the same way.
        VallSrfLanded* = #JNSQscience_ValOnVall_05 // You rehearse the landing callouts carefully: “Vall. With two Ls.” Nobody listens.
        VallSrfLanded* = #JNSQscience_ValOnVall_02 // Mission Control asks for a status report. You answer “Val is on Vall—” and immediately hear muffled giggling on the channel.
        VallInSpaceHigh* = #JNSQscience_ValOnVall_06 // In the end, it looks like we really will have to send Val to Vall.
        VallInSpaceHigh* = #JNSQscience_ValOnVall_07 // You wonder if “Vall” is just short for “Vallentina.”
        VallInSpace* = #JNSQscience_ValOnVall_01 // You double-check the navigation computer. The target is Vall. The pilot writes “Val” on the checklist anyway.
        Vall* = #JNSQscience_ValOnVall_00 // Someone keeps saying “Val on Vall” over the radio, and now the whole crew can’t stop laughing.
        Vall* = #JNSQscience_ValOnVall_04 // The flight log autocorrects “Vall” to “Val”. You consider filing a bug report, then remember you’re the one holding the pen.

        TyloSrfLandedPoles* = #JNSQscience_crewReport_TyloSrfLandedPoles_00 // The cabin heater clicks on as you peer out at the pale polar ground. The air outside looks thin, cold, and completely uninterested in being breathable.
        TyloSrfLandedMountains* = #JNSQscience_crewReport_TyloSrfLandedMountains_00 // The mountains look sharp enough to puncture the sky. Everyone stays strapped in, just in case the slope decides to keep going.
        TyloSrfLandedMidlands* = #JNSQscience_crewReport_TyloSrfLandedMidlands_00 // Craters fade into craters all the way to the horizon. You make a note that the landscape is very committed to its theme.
        TyloFlyingLowPoles* = #JNSQscience_crewReport_TyloFlyingLowPoles_00 // Skimming over the bright caps, the pressure gauge barely twitches. The craft still rattles like it’s flying through something.
        TyloFlyingLowMountains* = #JNSQscience_crewReport_TyloFlyingLowMountains_00 // The terrain rises fast and the alarms rise faster. You briefly wonder if the mountains are trying to reclaim their airspace.
        TyloFlyingLowHighlands* = #JNSQscience_crewReport_TyloFlyingLowHighlands_00 // Rough ground below, rough ride inside. You can practically feel the wind arguing with the wings.
        TyloFlyingLowMidlands* = #JNSQscience_crewReport_TyloFlyingLowMidlands_00 // The midlands slide by in dusty streaks under a faint haze. It’s almost peaceful, until the next bump reminds you it’s not.
        TyloFlyingLowLowlands* = #JNSQscience_crewReport_TyloFlyingLowLowlands_00 // Wide basins and long shadows make the lowlands look deceptively gentle. The instruments disagree and keep shouting numbers at you.
        TyloFlyingHigh* = #JNSQscience_crewReport_TyloFlyingHigh_00 // From up here Tylo looks like a pale marble with a faint rim of air. Jool hangs nearby like a giant green reminder of who owns this neighborhood.

        PolSrfLandedMidlands* = #JNSQscience_crewReport_PolSrfLandedMidlands_00 // The view out the porthole is a patchwork of yellowish flats and lumpy rises. You write “midlands” and add a note: “Everything looks dusty enough to squeak.”
		PolSrfLandedMidlands* = #JNSQscience_crewReport_PolSrfLandedMidlands_01 // The ship settles with a soft creak. Outside, the ground looks like someone tried to sculpt a landscape out of crumbs and then changed their mind halfway through.
		PolSrfLandedMountains* = #JNSQscience_crewReport_PolSrfLandedMountains_00 // The landing legs cling to a slope that seems personally offended by the concept of “level.” You log the terrain as “mountainous” and your heartbeat as “also mountainous.”
		PolSrfLandedMountains* = #JNSQscience_crewReport_PolSrfLandedMountains_01 // Jagged ridges frame the horizon like torn paper silhouettes. You report that the local scenery is dramatic, hostile, and very proud of its pointy bits.

        LindorFlyingHigh* = #JNSQscience_crewReport_LindorFlyingHigh_00 // The crew squints at the banding below and agrees it looks like the planet is trying to hide in plain sight.
		LindorFlyingHigh* = #JNSQscience_crewReport_LindorFlyingHigh_01 // Everything is cold, bright, and strangely calm. You keep checking the altitude readout like it’s a prank.
		LindorInSpaceLow* = #JNSQscience_crewReport_LindorInSpaceLow_00 // From orbit, Lindor’s patterns look neatly painted. The crew suspects that means something is about to get un-neat.
		LindorInSpaceLow* = #JNSQscience_crewReport_LindorInSpaceLow_01 // The ship drifts through faint crackles of interference. Someone suggests the planet is “thinking loudly.”
		LindorInSpaceHigh* = #JNSQscience_crewReport_LindorInSpaceHigh_00 // Lindor shrinks to a pale disk with a complicated attitude. The crew reports feeling very small and slightly judged.
		LindorInSpaceHigh* = #JNSQscience_crewReport_LindorInSpaceHigh_01 // Far above, the instruments go quiet. The crew takes advantage of this rare peace to argue about snacks.
		LindorFlyingLowTemperateBands* = #JNSQscience_crewReport_LindorFlyingLowTemperateBands_00 // The view turns into layered haze and shifting stripes. The crew calls it “the world’s largest camouflage.”
		LindorFlyingLowTemperateBands* = #JNSQscience_crewReport_LindorFlyingLowTemperateBands_01 // The cabin trembles softly as winds trade places. Someone starts a pool on whether the planet contains water or chocolate.
		LindorFlyingLowSubpolarBands* = #JNSQscience_crewReport_LindorFlyingLowSubpolarBands_00 // The air outside looks thicker and meaner than the temperate bands. The crew votes to stop descending “for science.”
		LindorFlyingLowSubpolarBands* = #JNSQscience_crewReport_LindorFlyingLowSubpolarBands_01 // Fine crystals ping the hull like tiny complaints. The crew files an official request for a warmer planet.
		LindorFlyingLowNorthPole* = #JNSQscience_crewReport_LindorFlyingLowNorthPole_00 // The horizon twists under ghostly light and static. The crew agrees the pole feels “electrically offended.”
		LindorFlyingLowNorthPole* = #JNSQscience_crewReport_LindorFlyingLowNorthPole_01 // The ship shudders through dense, cold haze. The crew report includes the phrase “never again” twice.
		LindorFlyingLowSouthPole* = #JNSQscience_crewReport_LindorFlyingLowSouthPole_00 // Visibility drops into a murky gradient. The crew watches the gauges like they’re telling a scary story.
		LindorFlyingLowSouthPole* = #JNSQscience_crewReport_LindorFlyingLowSouthPole_01 // Strange flickers dance across the windows. Someone asks if the planet is trying to say hello or “leave.”
		LindorFlyingLowStormComplex* = #JNSQscience_crewReport_LindorFlyingLowStormComplex_00 // The storm complex fills the windows with rolling layers and sudden jolts. The crew report is mostly sound effects.
		LindorFlyingLowStormComplex* = #JNSQscience_crewReport_LindorFlyingLowStormComplex_01 // Turbulence turns the cabin into a coin jar. The crew notes that “extreme pressure” is not just a number.
		LindorFlyingLowUpperStormDeck* = #JNSQscience_crewReport_LindorFlyingLowUpperStormDeck_00 // You skim above roiling cloud tops that look soft until they punch the ship. The crew changes their mind about “soft.”
		LindorFlyingLowUpperStormDeck* = #JNSQscience_crewReport_LindorFlyingLowUpperStormDeck_01 // The atmosphere boils in slow motion around you. The crew suggests naming the phenomenon “Nope.”
		LindorFlyingLowExposedLowerDeck* = #JNSQscience_crewReport_LindorFlyingLowExposedLowerDeck_00 // The exposed lower deck looks darker and heavier, like the planet forgot to lighten up. The crew strongly recommends not meeting it in person.
		LindorFlyingLowExposedLowerDeck* = #JNSQscience_crewReport_LindorFlyingLowExposedLowerDeck_01 // The ship creaks as if reconsidering its career choices. The crew agrees the lower layers are “where plans go to die.”

        KrelSrfLandedLowlands* = #JNSQscience_crewReport_KrelSrfLandedLowlands_00 // The ground looks like someone ironed the moon flat. The ship feels overdressed.
		KrelSrfLandedLowlands* = #JNSQscience_crewReport_KrelSrfLandedLowlands_01 // Your boots sink into pale powder that sparkles in the weak light. You pretend its stardust.
		KrelSrfLandedMidlands* = #JNSQscience_crewReport_KrelSrfLandedMidlands_00 // Ridges and grooves slice the horizon into tidy segments. The terrain looks assembled in a hurry.
		KrelSrfLandedMidlands* = #JNSQscience_crewReport_KrelSrfLandedMidlands_01 // Layered bands run past the window like pages in a book. You try to read them upside down.
		KrelSrfLandedHighlands* = #JNSQscience_crewReport_KrelSrfLandedHighlands_00 // A cliff face rises like a frozen wave. You note that Krel’s idea of a “gentle slope” is a prank.
		KrelSrfLandedHighlands* = #JNSQscience_crewReport_KrelSrfLandedHighlands_01 // Crater rims are sharp enough to cast dramatic shadows. You feel judged by geology.
		KrelSrfLandedPoles* = #JNSQscience_crewReport_KrelSrfLandedPoles_00 // The sun skims the horizon and refuses to help. Instruments glow; your mood does not.
		KrelSrfLandedPoles* = #JNSQscience_crewReport_KrelSrfLandedPoles_01 // Frosty dust clings to the hatch seal. You add “bring better brush” to the official report.
		KrelInSpaceLow* = #JNSQscience_crewReport_KrelInSpaceLow_00 // Up close, Krel is a pale patchwork of scars and terraces. It looks too complicated for its size.
		KrelInSpaceLow* = #JNSQscience_crewReport_KrelInSpaceLow_01 // Lindor fills half the window and Krel fills the other half. Your notes devolve into circles.
		KrelInSpaceHigh* = #JNSQscience_crewReport_KrelInSpaceHigh_00 // Krel shrinks to a bright chip near its giant parent. You double-check you didn’t lose it.
		KrelInSpaceHigh* = #JNSQscience_crewReport_KrelInSpaceHigh_01 // From here the moon looks calm and smooth, which is clearly a lie. You file it under “mysterious.”

        AdenSrfLandedLowlands* = #JNSQscience_crewReport_AdenSrfLandedLowlands_00 // The ground outside is a flat, brown sheet of quiet. Your footprints look oddly confident for something made in low gravity.
        AdenSrfLandedLowlands* = #JNSQscience_crewReport_AdenSrfLandedLowlands_01 // The lowlands don’t do much, which somehow makes them feel like they’re doing it on purpose.
        AdenSrfLandedMidlands* = #JNSQscience_crewReport_AdenSrfLandedMidlands_00 // The terrain rolls gently past the window like it’s trying to be interesting without overcommitting.
        AdenSrfLandedMidlands* = #JNSQscience_crewReport_AdenSrfLandedMidlands_01 // You record several minutes of “hills” and “more hills” before realizing that’s basically the whole report.
        AdenSrfLandedHighlands* = #JNSQscience_crewReport_AdenSrfLandedHighlands_00 // The view sharpens into ridges and broken ground. The cabin heater suddenly feels like mission-critical equipment.
        AdenSrfLandedHighlands* = #JNSQscience_crewReport_AdenSrfLandedHighlands_01 // You note the higher terrain, then immediately note how much you’d prefer to observe it from inside.
        AdenSrfLandedMountains* = #JNSQscience_crewReport_AdenSrfLandedMountains_00 // The mountains look like they were assembled from spare rocks and bad decisions. You double-check that the brakes are still a thing.
        AdenSrfLandedMountains* = #JNSQscience_crewReport_AdenSrfLandedMountains_01 // The slopes outside suggest that “parking” is more of a theory than a procedure up here.
        AdenSrfLandedPoles* = #JNSQscience_crewReport_AdenSrfLandedPoles_00 // The polar ground has a faint, dusty sheen that makes you wonder what’s hiding in the cold shadowed pockets.
        AdenSrfLandedPoles* = #JNSQscience_crewReport_AdenSrfLandedPoles_01 // Everything is long shadows and pale glints. You try not to think about how far away “warm” is.
        AdenInSpaceLow* = #JNSQscience_crewReport_AdenInSpaceLow_00 // Aden rushes by beneath you in brown ridges and shallow basins. It’s small enough to feel manageable, which is when it gets suspicious.
        AdenInSpaceLow* = #JNSQscience_crewReport_AdenInSpaceLow_01 // Low orbit makes every bump look important. Mission Control agrees, loudly, whenever you drift off the planned track.
        AdenInSpaceHigh* = #JNSQscience_crewReport_AdenInSpaceHigh_00 // From up here, Aden is a tidy little marble and Lindor steals the whole sky. You log this as “unfair but impressive.”
        AdenInSpaceHigh* = #JNSQscience_crewReport_AdenInSpaceHigh_01 // High over Aden, the moon looks calm and simple. The navigation computer disagrees with both of those words.

        HuygenSrfLandedLowlands* = #JNSQscience_crewReport_HuygenSrfLandedLowlands_00 // The view is a muted orange smear. You log that Huygen is doing its best to hide the ground from you.
        HuygenSrfLandedLowlands* = #JNSQscience_crewReport_HuygenSrfLandedLowlands_01 // The air outside looks thick enough to chew. You decide to keep the hatch very, very sealed.
        HuygenSrfLandedMidlands* = #JNSQscience_crewReport_HuygenSrfLandedMidlands_00 // Low hills roll away into haze until they simply stop existing. Navigation by landmark is officially cancelled.
        HuygenSrfLandedMidlands* = #JNSQscience_crewReport_HuygenSrfLandedMidlands_01 // A slow patter taps the hull. Whatever is falling out of the sky, it is not in a hurry.
        HuygenSrfLandedHighlands* = #JNSQscience_crewReport_HuygenSrfLandedHighlands_00 // From up here the fog forms layers like blankets. You feel oddly cozy for somewhere so alien.
        HuygenSrfLandedHighlands* = #JNSQscience_crewReport_HuygenSrfLandedHighlands_01 // The horizon is close and far at the same time. You suspect the atmosphere is playing tricks again.
        HuygenSrfLandedMountains* = #JNSQscience_crewReport_HuygenSrfLandedMountains_00 // The capsule creaks as winds shove at it. You mark the mountains as: scenic, drafty, and slightly judgmental.
        HuygenSrfLandedMountains* = #JNSQscience_crewReport_HuygenSrfLandedMountains_01 // Thin ridges fade into amber mist. You try to count peaks, but the planet keeps changing the answer.
        HuygenSrfLandedPeaks* = #JNSQscience_crewReport_HuygenSrfLandedPeaks_00 // At the top of the world, the sky still refuses to be blue. It is all gold and secrets.
        HuygenSrfLandedPeaks* = #JNSQscience_crewReport_HuygenSrfLandedPeaks_01 // You can almost see Lindor through the murk. Almost.
        HuygenSrfLandedPolarLowlands* = #JNSQscience_crewReport_HuygenSrfLandedPolarLowlands_00 // The ground looks hard and dark, like it would rather be anywhere else. You sympathize.
        HuygenSrfLandedPolarLowlands* = #JNSQscience_crewReport_HuygenSrfLandedPolarLowlands_01 // Cold fog crawls along the surface in slow motion. You record: weather with commitment issues.
        HuygenSrfLandedPoles* = #JNSQscience_crewReport_HuygenSrfLandedPoles_00 // Everything is quiet, muffled by the thick air. Even the radio sounds like it is whispering.
        HuygenSrfLandedPoles* = #JNSQscience_crewReport_HuygenSrfLandedPoles_01 // The instruments say the pressure is high. Your ears believe them.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_crewReport_HuygenSrfLandedPolarHighlands_00 // The pale light makes the slopes look unreal, like a charcoal sketch behind tinted glass.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_crewReport_HuygenSrfLandedPolarHighlands_01 // You catch yourself holding your breath, then remember that is not how pressure works.
        HuygenSrfLandedShores* = #JNSQscience_crewReport_HuygenSrfLandedShores_00 // The shoreline is dark and glossy. You cannot tell if it is wet ground or ground pretending to be wet.
        HuygenSrfLandedShores* = #JNSQscience_crewReport_HuygenSrfLandedShores_01 // Gentle waves lap at something that is definitely not water. You write: do not taste test.
        HuygenSrfSplashedShores* = #JNSQscience_crewReport_HuygenSrfSplashedShores_00 // The craft bobs in a heavy, oily swell. The cabin smells faintly like a chemistry set.
        HuygenSrfSplashedShores* = #JNSQscience_crewReport_HuygenSrfSplashedShores_01 // You watch ripples spread away into fog and feel very glad the windows are thick.
        HuygenSrfSplashedMethaneLakes* = #JNSQscience_crewReport_HuygenSrfSplashedMethaneLakes_00 // You are floating in a methane lake. Mission Control insists you call this 'exciting' instead of 'concerning'.
        HuygenSrfSplashedMethaneLakes* = #JNSQscience_crewReport_HuygenSrfSplashedMethaneLakes_01 // Bubbles rise and pop without drama. You log the liquid as calm, cold, and suspiciously flammable.
        HuygenFlyingLowLowlands* = #JNSQscience_crewReport_HuygenFlyingLowLowlands_00 // Skimming the lowlands, the haze thickens until the ground becomes a rumor.
        HuygenFlyingLowLowlands* = #JNSQscience_crewReport_HuygenFlyingLowLowlands_01 // The altimeter ticks down and the view never improves. Huygen is committed to ambiguity.
        HuygenFlyingLowMidlands* = #JNSQscience_crewReport_HuygenFlyingLowMidlands_00 // Turbulence nudges the craft like a bored giant. You file a complaint in the log.
        HuygenFlyingLowMidlands* = #JNSQscience_crewReport_HuygenFlyingLowMidlands_01 // Patchy clearings open for seconds at a time. You snap pictures and pretend that counts as certainty.
        HuygenFlyingLowHighlands* = #JNSQscience_crewReport_HuygenFlyingLowHighlands_00 // The highlands drift beneath like dark islands in a sea of fog.
        HuygenFlyingLowHighlands* = #JNSQscience_crewReport_HuygenFlyingLowHighlands_01 // You spot ridgelines, then lose them again. The atmosphere is playing peekaboo.
        HuygenFlyingLowMountains* = #JNSQscience_crewReport_HuygenFlyingLowMountains_00 // Updrafts over the mountains feel slow but relentless, like the planet is breathing.
        HuygenFlyingLowMountains* = #JNSQscience_crewReport_HuygenFlyingLowMountains_01 // For a moment the haze thins and you see jagged rock. Then Huygen closes the curtain.
        HuygenFlyingLowPeaks* = #JNSQscience_crewReport_HuygenFlyingLowPeaks_00 // The peaks poke into thinner air, but even here the sky stays amber and thick.
        HuygenFlyingLowPeaks* = #JNSQscience_crewReport_HuygenFlyingLowPeaks_01 // You fly past a summit and feel like you are intruding on a private conversation between rock and cloud.
        HuygenFlyingLowPolarLowlands* = #JNSQscience_crewReport_HuygenFlyingLowPolarLowlands_00 // Below, the polar flats are smeared with frost-like patterns that vanish when you blink.
        HuygenFlyingLowPolarLowlands* = #JNSQscience_crewReport_HuygenFlyingLowPolarLowlands_01 // The air is calmer here, but colder. The heater wins a medal.
        HuygenFlyingLowPoles* = #JNSQscience_crewReport_HuygenFlyingLowPoles_00 // The pole sits under a dome of dim light. You cannot decide if it is peaceful or merely quiet.
        HuygenFlyingLowPoles* = #JNSQscience_crewReport_HuygenFlyingLowPoles_01 // Your windows fog on the inside. You note that the atmosphere is not the only thing that is hazy.
        HuygenFlyingLowPolarHighlands* = #JNSQscience_crewReport_HuygenFlyingLowPolarHighlands_00 // The polar highlands look sharp at the edges and soft everywhere else. You blame the view, not your eyes.
        HuygenFlyingLowPolarHighlands* = #JNSQscience_crewReport_HuygenFlyingLowPolarHighlands_01 // The craft rocks gently as it climbs. The low gravity makes it feel like flying in a dream.
        HuygenFlyingLowShores* = #JNSQscience_crewReport_HuygenFlyingLowShores_00 // The shoreline draws a dark line through the mist, like an ink stroke on old paper.
        HuygenFlyingLowShores* = #JNSQscience_crewReport_HuygenFlyingLowShores_01 // You fly along the coast and watch waves chasing you. You decide that is rude.
        HuygenFlyingLowMethaneLakes* = #JNSQscience_crewReport_HuygenFlyingLowMethaneLakes_00 // The lake below reflects almost nothing. It is like staring into a polished shadow.
        HuygenFlyingLowMethaneLakes* = #JNSQscience_crewReport_HuygenFlyingLowMethaneLakes_01 // A faint sheen on the surface catches the light. You quietly move all ignition switches to 'no'.
        HuygenFlyingHigh* = #JNSQscience_crewReport_HuygenFlyingHigh_00 // High above the thick air, the world becomes a smooth amber ball with a soft, glowing rim.
        HuygenFlyingHigh* = #JNSQscience_crewReport_HuygenFlyingHigh_01 // The cabin is quiet except for occasional static. You suspect Huygen is trying to keep its secrets even from radio waves.
        HuygenInSpaceLow* = #JNSQscience_crewReport_HuygenInSpaceLow_00 // From low orbit, Huygen looks like a sealed lantern: bright edge, dark center, and a haze you cannot see through.
        HuygenInSpaceLow* = #JNSQscience_crewReport_HuygenInSpaceLow_01 // You watch cloud bands drift slowly. Everything here moves as if time is thicker too.
        HuygenInSpaceHigh* = #JNSQscience_crewReport_HuygenInSpaceHigh_00 // From high orbit, Huygen is a tiny amber coin beside Lindor's vast presence. You feel very small.
        HuygenInSpaceHigh* = #JNSQscience_crewReport_HuygenInSpaceHigh_01 // The limb glow is obvious even from here. You log: atmosphere confirmed, patience required.

        RigaSrfLandedLowlands* = #JNSQscience_crewReport_RigaSrfLandedLowlands_00 // The horizon is a low, grey-blue line under a faint haze. Lindor hangs above like a frozen lantern.
        RigaSrfLandedMidlands* = #JNSQscience_crewReport_RigaSrfLandedMidlands_00 // Gentle rises roll past the window. Every bump looks like a perfect spot for a base-until you remember the temperature.
        RigaSrfLandedMidlands* = #JNSQscience_crewReport_RigaSrfLandedMidlands_01 // The terrain makes navigation feel easy. Then you realize you're already lost because every ridge looks identical.
        RigaSrfLandedHighlands* = #JNSQscience_crewReport_RigaSrfLandedHighlands_00 // Broken highlands cast long, sharp shadows. The sunlight feels distant, but the glare off the rocks is not.
        RigaSrfLandedHighlands* = #JNSQscience_crewReport_RigaSrfLandedHighlands_01 // Your crewmate claims the hills are "cozy." Mission Control suggests they stop naming hazards.
        RigaSrfLandedMountains* = #JNSQscience_crewReport_RigaSrfLandedMountains_00 // Spindly peaks stab into a black sky. The lander's legs creak, reminding you that gravity is low, not absent.
        RigaSrfLandedMountains* = #JNSQscience_crewReport_RigaSrfLandedMountains_01 // From up here, Lindor dominates half the sky. You briefly consider charging rent for the view.
        RigaSrfLandedPoles* = #JNSQscience_crewReport_RigaSrfLandedPoles_00 // The polar ground sparkles with frost-like grains. The air is thin enough to be mostly decorative.
        RigaSrfLandedPoles* = #JNSQscience_crewReport_RigaSrfLandedPoles_01 // You watch a wisp of haze crawl along the surface. It's the most weather you've seen all day, and you're proud of it.
        RigaFlyingLowLowlands* = #JNSQscience_crewReport_RigaFlyingLowLowlands_00 // At low altitude the haze becomes a real thing, whispering against the hull and threatening to become aerodynamics.
        RigaFlyingLowLowlands* = #JNSQscience_crewReport_RigaFlyingLowLowlands_01 // You skim over flats that look perfectly smooth until the altimeter disagrees very loudly.
        RigaFlyingLowMidlands* = #JNSQscience_crewReport_RigaFlyingLowMidlands_00 // The craft bobs over rolling rises; the thin air gives just enough lift to feel guilty about it.
        RigaFlyingLowMidlands* = #JNSQscience_crewReport_RigaFlyingLowMidlands_01 // You spot winding shadows that could be valleys, or just Lindorlight playing tricks on you.
        RigaFlyingLowHighlands* = #JNSQscience_crewReport_RigaFlyingLowHighlands_00 // The highlands churn the airflow into tiny, annoying bumps. The pilots call it "character."
        RigaFlyingLowHighlands* = #JNSQscience_crewReport_RigaFlyingLowHighlands_01 // Even here, the sky stays dark and cold. The ground looks close enough to touch-so don't.
        RigaFlyingLowMountains* = #JNSQscience_crewReport_RigaFlyingLowMountains_00 // Mountain peaks rush by below, and the thin air refuses to help if you make a mistake.
        RigaFlyingLowMountains* = #JNSQscience_crewReport_RigaFlyingLowMountains_01 // You glance down and decide mountains should come with warning labels. The ground declines to cooperate.
        RigaFlyingLowPoles* = #JNSQscience_crewReport_RigaFlyingLowPoles_00 // Over the poles, the haze thins and the surface brightens. Your instruments insist this counts as "weather."
        RigaFlyingLowPoles* = #JNSQscience_crewReport_RigaFlyingLowPoles_01 // Tiny ice-like sparkles whip past the window. You hope they're not the same ones hitting the intake.
        RigaFlyingHigh* = #JNSQscience_crewReport_RigaFlyingHigh_00 // "Flying" feels generous up here; you're mostly falling with style through a suggestion of atmosphere.
        RigaFlyingHigh* = #JNSQscience_crewReport_RigaFlyingHigh_01 // The sky fades to space while the last traces of air tug at the craft like it wants you to stay a little longer.
        RigaInSpaceLow* = #JNSQscience_crewReport_RigaInSpaceLow_00 // Riga's surface features sharpen into crisp bands of light and shadow. The atmosphere is a thin outline, like someone forgot to finish drawing it.
        RigaInSpaceLow* = #JNSQscience_crewReport_RigaInSpaceLow_01 // Lindor fills the background with pale swirls. You take notes and then stare longer than is scientifically necessary.
        RigaInSpaceHigh* = #JNSQscience_crewReport_RigaInSpaceHigh_00 // From high orbit, Riga looks like a quiet, cold ball with a faint rim of haze. The emptiness around it feels loud.
        RigaInSpaceHigh* = #JNSQscience_crewReport_RigaInSpaceHigh_01 // You plot future landing sites by pointing at the screen and saying "there." Everyone agrees this is top-tier planning.

        TalosSrfLandedLowlands* = #JNSQscience_crewReport_TalosSrfLandedLowlands_00 // You stare out at the lowlands and realize “featureless” can still feel intimidating.
        TalosSrfLandedLowlands* = #JNSQscience_crewReport_TalosSrfLandedLowlands_01 // The surface looks like it has been waiting a very long time for someone to leave footprints on it.
        TalosSrfLandedMidlands* = #JNSQscience_crewReport_TalosSrfLandedMidlands_00 // The midlands are a patchwork of ridges and shallow scars, like someone tried to erase the landscape and gave up.
        TalosSrfLandedMidlands* = #JNSQscience_crewReport_TalosSrfLandedMidlands_01 // You log a careful description of the terrain, then add an unhelpful note: “It’s all the same kind of cold.”
        TalosSrfLandedHighlands* = #JNSQscience_crewReport_TalosSrfLandedHighlands_00 // From the highlands, the horizon is all sharp rims and long shadows that never seem to end.
        TalosSrfLandedHighlands* = #JNSQscience_crewReport_TalosSrfLandedHighlands_01 // You can’t decide if the highlands look ancient, or just tired.
        TalosSrfLandedMountains* = #JNSQscience_crewReport_TalosSrfLandedMountains_00 // The mountains look close enough to touch through the window, and far enough away to be lying.
        TalosSrfLandedMountains* = #JNSQscience_crewReport_TalosSrfLandedMountains_01 // You report “excellent visibility,” mostly because there’s nothing here to get in the way of seeing trouble.
        TalosSrfLandedPoles* = #JNSQscience_crewReport_TalosSrfLandedPoles_00 // The polar ground glints faintly in the low light, as if Talos is pretending to be welcoming.
        TalosSrfLandedPoles* = #JNSQscience_crewReport_TalosSrfLandedPoles_01 // The shadows at the poles are so deep you feel like the cabin lights got dimmer just looking at them.
        TalosInSpaceLow* = #JNSQscience_crewReport_TalosInSpaceLow_00 // In low orbit, Talos scrolls by in silent, cratered detail, like a map that refuses to explain itself.
        TalosInSpaceLow* = #JNSQscience_crewReport_TalosInSpaceLow_01 // You call out surface features as they pass beneath you, then stop when you realize you’ve been naming the same shape over and over.
        TalosInSpaceHigh* = #JNSQscience_crewReport_TalosInSpaceHigh_00 // From high orbit, Talos looks small and stubbornly blank, with the rest of space doing most of the talking.
        TalosInSpaceHigh* = #JNSQscience_crewReport_TalosInSpaceHigh_01 // You record a calm, professional report while privately wondering if “far away” is a measurable resource.

        EelooFlyingLowPoles* = #JNSQscience_crewReport_EelooFlyingLowPoles_00 // You report that you are “flying” over the poles. The altitude agrees. Your instincts do not.
        EelooFlyingLowHighlands* = #JNSQscience_crewReport_EelooFlyingLowHighlands_00 // The highlands slide by below, sharp and bright. The cabin feels like it’s hovering over a freezer with opinions.
        EelooFlyingLowMidlands* = #JNSQscience_crewReport_EelooFlyingLowMidlands_00 // The midlands look calm from here—flat, pale, and determined to make you double-check the altimeter every ten seconds.
        EelooFlyingLowLowlands* = #JNSQscience_crewReport_EelooFlyingLowLowlands_00 // Over the lowlands, the haze is just thick enough to smear the horizon. You try not to breathe too confidently.
        EelooFlyingLowCanyon* = #JNSQscience_crewReport_EelooFlyingLowCanyon_00 // The canyon walls rush past beneath you, and the thin air does absolutely nothing to soften the view or your nerves.
        EelooFlyingHigh* = #JNSQscience_crewReport_EelooFlyingHigh_00 // At “high altitude” on Eeloo, the sky is basically space. You file the report in case anyone ever argues about the difference.

        CelesSrfLandedLowlands* = #JNSQscience_crewReport_CelesSrfLandedLowlands_00 // The lowlands look like someone ironed the landscape flat, then forgot to put it away.
		CelesSrfLandedMidlands* = #JNSQscience_crewReport_CelesSrfLandedMidlands_01 // The ground is a patchwork of pale plates and dark seams. You decide not to ask what’s under the seams.
		CelesSrfLandedHighlands* = #JNSQscience_crewReport_CelesSrfLandedHighlands_00 // Jagged ridges throw long shadows across the cabin. You’re glad the ship is doing the standing for you.
		CelesSrfLandedMountains* = #JNSQscience_crewReport_CelesSrfLandedMountains_01 // The mountains look sharp enough to puncture confidence. You tighten your seat straps anyway.
		CelesSrfLandedPoles* = #JNSQscience_crewReport_CelesSrfLandedPoles_00 // Everything outside is bright, cold, and quiet. The crew whispers, just in case the pole is listening.
		CelesInSpaceLow* = #JNSQscience_crewReport_CelesInSpaceLow_00 // From low orbit, Celes is all contrasts and scratches, like it’s been through a few too many “test landings.”
		CelesInSpaceHigh* = #JNSQscience_crewReport_CelesInSpaceHigh_00 // Celes shrinks to a pale pebble under a dim sky. You suddenly miss loud, comforting explosions.

		TamSrfLandedLowlands* = #JNSQscience_crewReport_TamSrfLandedLowlands_00 // The surface drifts past in slow motion. You can’t tell if that’s the terrain or your sense of urgency leaving.
		TamSrfLandedMidlands* = #JNSQscience_crewReport_TamSrfLandedMidlands_00 // The cabin feels heavier than the world outside. Mission Control calls it “science,” you call it “unfair.”
		TamSrfLandedHighlands* = #JNSQscience_crewReport_TamSrfLandedHighlands_00 // From up here, the horizon looks bent and lumpy, like Tam never decided on a final shape.
		TamSrfLandedTwinCraters* = #JNSQscience_crewReport_TamSrfLandedTwinCraters_00 // Two craters stare back like wide eyes. The crew agrees to stop making “twin” jokes immediately. Mostly.
		TamSrfLandedCraters* = #JNSQscience_crewReport_TamSrfLandedCraters_00 // Craters on craters on craters. You start ranking them by snack-break potential.
		TamSrfLandedPockmarks* = #JNSQscience_crewReport_TamSrfLandedPockmarks_00 // Tiny pits pepper the ground like someone tested a new drill bit everywhere. The ship feels judged.
		TamInSpaceLow* = #JNSQscience_crewReport_TamInSpaceLow_00 // Tam looks like a battered nugget tumbling through the dark. You keep one hand near the “don’t tumble” controls.
		TamInSpaceHigh* = #JNSQscience_crewReport_TamInSpaceHigh_00 // From high orbit, Tam is barely a dot, but still manages to look hostile. Impressive.

		HamekSrfLandedLowlands* = #JNSQscience_crewReport_HamekSrfLandedLowlands_00 // The lowlands glow with a strange, rusty tint. You check the windows for ketchup. None detected.
		HamekSrfLandedMidlands* = #JNSQscience_crewReport_HamekSrfLandedMidlands_00 // The midlands shimmer between red and pale, as if the planet can’t make up its mind about being icy or dusty.
		HamekSrfLandedHighlands* = #JNSQscience_crewReport_HamekSrfLandedHighlands_00 // The highlands look brittle and ancient. You promise the landing legs a nice vacation after this.
		HamekSrfLandedPoles* = #JNSQscience_crewReport_HamekSrfLandedPoles_00 // The poles are bright and stark, with shadows that seem a little too neat. You do not step outside to “straighten them.”
		HamekInSpaceLow* = #JNSQscience_crewReport_HamekInSpaceLow_00 // In low orbit, Hamek’s odd colors form sweeping bands and stains. You log it as “scientifically suspicious.”
		HamekInSpaceHigh* = #JNSQscience_crewReport_HamekInSpaceHigh_00 // Hamek hangs in the void like a mispainted marble. You wonder who got the color chart wrong.

        NaraInSpaceHigh* = #JNSQscience_crewReport_NaraInSpaceHigh_00 // Kerbol is just another bright point now. You verify the return plan for the fifth time and quietly look for the section labeled “ruby slippers.”
        NaraInSpaceHigh* = #JNSQscience_crewReport_NaraInSpaceHigh_01 // The inner system is a faint, crowded glitter smear. You feel proud, and then you remember you still have to go back.
        NaraInSpaceHigh* = #JNSQscience_crewReport_NaraInSpaceHigh_02 // The capsule is a tiny warm bubble in a lot of nothing. Even the checklists sound more serious this far out.
        NaraInSpaceLow* = #JNSQscience_crewReport_NaraInSpaceLow_00 // Nara swells beneath you: a pale, heavy sky over a world that looks like it has forgotten what “warm” means.
        NaraInSpaceLow* = #JNSQscience_crewReport_NaraInSpaceLow_01 // Low orbit feels uncomfortably close, like the planet is watching you line up a landing and judging your math.
        NaraInSpaceLow* = #JNSQscience_crewReport_NaraInSpaceLow_02 // Thin sunlight glances off bright frost fields and dark ridges. You mark a landing zone and underline the word “escape.”
        NaraFlyingHigh* = #JNSQscience_crewReport_NaraFlyingHigh_00 // You’re still in “atmosphere,” somehow. The air is cold, dense, and full of quiet hiss like a giant leak you can’t fix.
        NaraFlyingHigh* = #JNSQscience_crewReport_NaraFlyingHigh_01 // High above the surface, the clouds glow faintly with weak sunlight. It’s beautiful in a way that suggests danger.
        NaraFlyingHigh* = #JNSQscience_crewReport_NaraFlyingHigh_02 // The cabin creaks as you ride the upper winds. You write: “Return vehicle should not be optional.”
        NaraSrfLandedLowlands* = #JNSQscience_crewReport_NaraSrfLandedLowlands_00 // The ground crunches like old sugar under the landing legs. The pressure outside makes the hull complain in slow groans.
        NaraSrfLandedLowlands* = #JNSQscience_crewReport_NaraSrfLandedLowlands_01 // Frost creeps over the window edges while you watch. You decide not to say the word “trapped” out loud.
        NaraSrfLandedLowlands* = #JNSQscience_crewReport_NaraSrfLandedLowlands_02 // The manual mentioned ruby slippers. You check the locker. You have boots, snacks, and regret.
        NaraSrfLandedMidlands* = #JNSQscience_crewReport_NaraSrfLandedMidlands_00 // Rolling, dim ridges stretch into haze. The air is thick enough that the horizon looks tired.
        NaraSrfLandedMidlands* = #JNSQscience_crewReport_NaraSrfLandedMidlands_01 // Sound carries oddly through the dense cold. Every bolt ping makes the craft feel less like a machine and more like a patient.
        NaraSrfLandedMidlands* = #JNSQscience_crewReport_NaraSrfLandedMidlands_02 // You plant a flag and it stands stiff as a board. You immediately start thinking about how to un-plant yourself.
        NaraSrfLandedHighlands* = #JNSQscience_crewReport_NaraSrfLandedHighlands_00 // You’re higher up, but the pressure still leans on everything. Nara doesn’t do “thin air,” it does “heavy silence.”
        NaraSrfLandedHighlands* = #JNSQscience_crewReport_NaraSrfLandedHighlands_01 // Wind scours frost into little drifts around the landing gear. It looks tidy, like the planet is cleaning up after you.
        NaraSrfLandedHighlands* = #JNSQscience_crewReport_NaraSrfLandedHighlands_02 // You write an inspirational note about achievement, then add: “Achievement is not the same as survival.”
        NaraSrfLandedMountains* = #JNSQscience_crewReport_NaraSrfLandedMountains_00 // Jagged peaks cut the pale sky like broken teeth. You keep your hands on the controls a few seconds longer than necessary.
        NaraSrfLandedMountains* = #JNSQscience_crewReport_NaraSrfLandedMountains_01 // Normal gravity means no heroic hopping—just careful, deliberate steps and the constant thought of falling.
        NaraSrfLandedMountains* = #JNSQscience_crewReport_NaraSrfLandedMountains_02 // The ascent plan suddenly feels like a fairy tale. You begin to understand why the slippers were specified.
        NaraSrfLandedPolarLowlands* = #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_00 // Flat, bright fields stretch forever, interrupted by dark seams where the surface looks stressed.
        NaraSrfLandedPolarLowlands* = #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_01 // The window fogs and freezes in delicate patterns. You scrape a little clear and immediately wish you hadn’t.
        NaraSrfLandedPolarLowlands* = #JNSQscience_crewReport_NaraSrfLandedPolarLowlands_02 // You try to picture Kerbin’s green. The image feels like something you read in a book a long time ago.
        NaraSrfLandedPoles* = #JNSQscience_crewReport_NaraSrfLandedPoles_00 // The sun barely grazes the horizon, if it shows up at all. This place has mastered the art of not caring.
        NaraSrfLandedPoles* = #JNSQscience_crewReport_NaraSrfLandedPoles_01 // Fine crystals tap at the hull like sand, only quieter and somehow meaner.
        NaraSrfLandedPoles* = #JNSQscience_crewReport_NaraSrfLandedPoles_02 // You file a report that begins with “We made it.” You pause a long time before writing the next sentence.
        NaraSrfLandedPolarHighlands* = #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_00 // The wind up here finds every gap and every weakness. The ship shudders like it wants to leave without you.
        NaraSrfLandedPolarHighlands* = #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_01 // Radio delay makes Mission Control feel like a rumor. You start reading checklists out loud for company.
        NaraSrfLandedPolarHighlands* = #JNSQscience_crewReport_NaraSrfLandedPolarHighlands_02 // You stomp your boots for warmth and wonder if ruby slippers come with thermal lining.
        NaraFlyingLowLowlands* = #JNSQscience_crewReport_NaraFlyingLowLowlands_00 // The air is so thick you feel like you could paddle through it. Lift is easy; control is not.
        NaraFlyingLowLowlands* = #JNSQscience_crewReport_NaraFlyingLowLowlands_01 // Cold turbulence bumps the craft in slow, heavy punches. You log that Nara’s weather is patient and persistent.
        NaraFlyingLowLowlands* = #JNSQscience_crewReport_NaraFlyingLowLowlands_02 // Frost crystals stream past the window like glitter. You do not open any vents, no matter how curious you feel.
        NaraFlyingLowMidlands* = #JNSQscience_crewReport_NaraFlyingLowMidlands_00 // The hills slide under you in muted waves. You keep expecting the ground to reach up and grab the landing gear.
        NaraFlyingLowMidlands* = #JNSQscience_crewReport_NaraFlyingLowMidlands_01 // The instruments hiss with static as you pass through charged haze layers. You write: “Atmosphere fights back.”
        NaraFlyingLowMidlands* = #JNSQscience_crewReport_NaraFlyingLowMidlands_02 // Valleys fill with milky fog that hides depth and distance. You fly by numbers and sheer stubbornness.
        NaraFlyingLowHighlands* = #JNSQscience_crewReport_NaraFlyingLowHighlands_00 // Engines work harder as the terrain rises, but the air refuses to thin politely. It just stays heavy and cold.
        NaraFlyingLowHighlands* = #JNSQscience_crewReport_NaraFlyingLowHighlands_01 // Updrafts shove the craft sideways without warning. You grip the controls and promise to never complain about Kerbin again.
        NaraFlyingLowHighlands* = #JNSQscience_crewReport_NaraFlyingLowHighlands_02 // You note that mistakes here are not punished quickly. They are punished thoroughly.
        NaraFlyingLowMountains* = #JNSQscience_crewReport_NaraFlyingLowMountains_00 // Mountain waves toss the craft like a toy, only slower and with more expensive consequences.
        NaraFlyingLowMountains* = #JNSQscience_crewReport_NaraFlyingLowMountains_01 // Clouds scrape the peaks and make the ridgelines disappear and reappear. You decide you dislike surprises.
        NaraFlyingLowMountains* = #JNSQscience_crewReport_NaraFlyingLowMountains_02 // The ground looks close, then closer, then suddenly very interested in you. You climb away and exhale.
        NaraFlyingLowPolarLowlands* = #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_00 // Visibility drops to a bright blur. The world becomes instruments, guesses, and a lot of faith in engineering.
        NaraFlyingLowPolarLowlands* = #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_01 // Frost devils spin across the flats, lifting glittering crystals into the air. They look pretty right up until they hit the intake.
        NaraFlyingLowPolarLowlands* = #JNSQscience_crewReport_NaraFlyingLowPolarLowlands_02 // The craft crackles with tiny static pops. You add “grounding strap” to the list of things you wish you had.
        NaraFlyingLowPoles* = #JNSQscience_crewReport_NaraFlyingLowPoles_00 // A polar vortex grabs the craft and tries to spin you into a new career as debris.
        NaraFlyingLowPoles* = #JNSQscience_crewReport_NaraFlyingLowPoles_01 // Kerbol is a dull smear through cloud and haze. You navigate by numbers and hope the numbers are honest.
        NaraFlyingLowPoles* = #JNSQscience_crewReport_NaraFlyingLowPoles_02 // For a second you imagine just flying home. Then you remember space is in the way.
        NaraFlyingLowPolarHighlands* = #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_00 // Supercooled haze builds rime on anything exposed. The ship starts growing its own little teeth.
        NaraFlyingLowPolarHighlands* = #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_01 // Altitude changes feel wrong in this dense air. You trust radar and stop trusting feelings.
        NaraFlyingLowPolarHighlands* = #JNSQscience_crewReport_NaraFlyingLowPolarHighlands_02 // You write a calm, professional note about atmospheric sampling, then add a second line: “Still want my slippers.”

        AmosSrfLandedLowlands* = #JNSQscience_crewReport_AmosSrfLandedLowlands_00 // The ground is so dark your headlamp feels underqualified. The crew agrees it’s “very scientific.”
        AmosSrfLandedMidlands* = #JNSQscience_crewReport_AmosSrfLandedMidlands_00 // The surface crunches like ancient freezer burn under the landing gear. You write that down, because you can.
        AmosSrfLandedHighlands* = #JNSQscience_crewReport_AmosSrfLandedHighlands_00 // From up here, the landscape looks like it’s been carefully dusted with soot. You begin to suspect Amos enjoys being hard to read.
        AmosSrfLandedMountains* = #JNSQscience_crewReport_AmosSrfLandedMountains_00 // Every step turns into a slow-motion hop that lasts just long enough to regret it. The crew calls it “low-g conditioning.”
        AmosSrfLandedPoles* = #JNSQscience_crewReport_AmosSrfLandedPoles_00 // The shadows at the poles seem to go on forever. You double-check that Kerbol is still part of the plan.
        AmosInSpaceLow* = #JNSQscience_crewReport_AmosInSpaceLow_00 // Up close, Amos is a dark little mystery with sharp edges and no helpful labels. You file a report and request brighter paint.
        AmosInSpaceHigh* = #JNSQscience_crewReport_AmosInSpaceHigh_00 // Amos shrinks into a speck beside Nara, and the cabin gets quiet. Someone starts inventorying snacks for morale reasons.

        EnonSrfLandedLowlands* = #JNSQscience_crewReport_EnonSrfLandedLowlands_00 // The surface is blindingly pale, like it’s trying to reflect your thoughts back at you. The crew squints and pretends this is fine.
        EnonSrfLandedMidlands* = #JNSQscience_crewReport_EnonSrfLandedMidlands_00 // The terrain looks smooth from a distance, but up close it’s all rough crust and sharp grit. You stop trusting “from a distance.”
        EnonSrfLandedHighlands* = #JNSQscience_crewReport_EnonSrfLandedHighlands_00 // The horizon feels too big for something that’s “just a moon.” You note that Enon is apparently taking its job very seriously.
        EnonSrfLandedPoles* = #JNSQscience_crewReport_EnonSrfLandedPoles_00 // The poles look pristine and untouched, which makes you feel like you’re leaving fingerprints on history. You wipe your gloves anyway.
        EnonInSpaceLow* = #JNSQscience_crewReport_EnonInSpaceLow_00 // Enon fills the window in bright, cold silence. You catch yourself comparing it to Duna and immediately feel very far away from both.
        EnonInSpaceHigh* = #JNSQscience_crewReport_EnonInSpaceHigh_00 // The white disc fades into the black, and you realize how little “white” matters out here. The crew votes to keep the lights on.

        PraxSrfLandedLowlands* = #JNSQscience_crewReport_PraxSrfLandedLowlands_00 // The flats look like the edge of the map: simple, empty, and waiting for a flag. You plant one and immediately check if it fell over in the low gravity.
        PraxSrfLandedMidlands* = #JNSQscience_crewReport_PraxSrfLandedMidlands_00 // The landscape is repetitive in a way that makes you start naming rocks. The crew requests that you stop naming rocks.
        PraxSrfLandedHighlands* = #JNSQscience_crewReport_PraxSrfLandedHighlands_00 // The ground breaks into ridges and scuffed plateaus, like Prax was assembled without the instructions. You admire the dedication to frontier aesthetics.
        PraxSrfLandedMountains* = #JNSQscience_crewReport_PraxSrfLandedMountains_00 // From the peaks, the view feels like a promise and a warning at the same time. You log both, just to be safe.
        PraxSrfLandedPoles* = #JNSQscience_crewReport_PraxSrfLandedPoles_00 // The polar terrain looks colder than your mission brief’s tone. You wonder if “fringe world” also means “fringe heater.”
        PraxInSpaceLow* = #JNSQscience_crewReport_PraxInSpaceLow_00 // Prax hangs beneath you like a lonely waypoint beside Nara. You feel oddly proud of finding a place that looks like it was trying to hide.
        PraxInSpaceHigh* = #JNSQscience_crewReport_PraxInSpaceHigh_00 // Prax is a tiny dot, but the idea of it stays large in your head. The crew agrees: this is definitely the fringe.
    }
}