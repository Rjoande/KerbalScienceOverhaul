Localization
{
    en-us
    {
        // === STOCK ===
        // evaScience
        #GEPscience_evaScience_GrannusInSpaceLow_00 = You performed the EVA experiment while Grannus filled half the sky with a dull red glare and Mission Control answered several minutes later.
        #GEPscience_evaScience_GrannusInSpaceHigh_00 = You completed the EVA experiment in Grannus' high space, where the red sun felt more like a warning light than a sunrise.
        #GEPscience_evaScience_TaranisSrfLanded_00 = You carried out the EVA experiment on Taranis and immediately learned that “shade” was just another word for “still too hot” under a dim red sun.
        #GEPscience_evaScience_TaranisInSpaceLow_00 = You ran the EVA experiment in low orbit over Taranis, watching its glowing day-side and frozen night-side swap places with unsettling speed.
        #GEPscience_evaScience_TaranisInSpaceHigh_00 = You executed the EVA experiment in high space over Taranis and the silence between check-ins made the whole system feel uncomfortably empty.
        #GEPscience_evaScience_ToutatisSrfLanded_00 = You performed the EVA experiment on Toutatis and discovered the thin air was just thick enough to carry dust into everything you owned.
        #GEPscience_evaScience_ToutatisInSpaceLow_00 = You completed the EVA experiment in low orbit of Toutatis, jotting notes by the dim red sun while waiting out the long, scratchy reply from home.
        #GEPscience_evaScience_ToutatisInSpaceHigh_00 = You conducted the EVA experiment high above Toutatis, where the twilight band looked inviting until the comm delay reminded you how far away you really were.
        #GEPscience_evaScience_NodensSrfLanded_00 = You run the EVA experiment on Nodens. The dim red sun makes the horizon look permanently “late evening,” and the comm reply takes long enough to feel like a separate mission.
        #GEPscience_evaScience_NodensInSpaceLow_00 = You do the EVA experiment in low orbit of Nodens. The red sun glints off the suit, and Mission Control’s delayed “Copy” arrives like it was mailed.
        #GEPscience_evaScience_NodensInSpaceHigh_00 = You complete the EVA experiment in Nodens’ high space. The planet is small, the sun is dim, and the distance feels measurable in heartbeats between transmissions.
        #GEPscience_evaScience_BelisamaSrfLanded_00 = You run the EVA experiment on Belisama. The ground seems eager to keep your footprints forever, since no wind is in any hurry to erase them.
        #GEPscience_evaScience_BelisamaInSpaceLow_00 = You perform the EVA experiment in low orbit of Belisama. Nodens looms nearby like a silent companion, and your comm delay reminds you neither of you is home.
        #GEPscience_evaScience_BelisamaInSpaceHigh_00 = You conduct the EVA experiment high above Belisama. The moon’s shadow line is razor sharp in red light, and the darkness looks deeper than it should.
        #GEPscience_evaScience_SucellusSrfLanded_00 = You carry out the EVA experiment on Sucellus. Every motion is a little too floaty, and the dim red sun makes even your own shadow feel unfamiliar.
        #GEPscience_evaScience_SucellusInSpaceLow_00 = You perform the EVA experiment in low orbit over Sucellus. The surface below looks resource-rich or just misleadingly shiny—your instruments refuse to gossip.
        #GEPscience_evaScience_SucellusInSpaceHigh_00 = You run the EVA experiment in Sucellus’ high space. The world turns slowly beneath you, and the long wait for guidance makes you appreciate checklists more than ever.
        #GEPscience_evaScience_CaireenSrfLanded_00 = You do the EVA experiment on tiny Caireen. The horizon is close, the gravity is indecisive, and the red sun makes the whole place feel like a half-remembered dream.
        #GEPscience_evaScience_CaireenInSpaceLow_00 = You perform the EVA experiment in low orbit of Caireen. One gentle push sends you drifting, and the delayed comms make you careful about every “oops.”
        #GEPscience_evaScience_CaireenInSpaceHigh_00 = You complete the EVA experiment high above Caireen. It’s barely a speck, but it still manages to make you feel very, very far away.
        #GEPscience_evaScience_SironaInSpaceLow_00 = You complete the EVA experiment in low orbit of Sirona. Its immense, roiling disk reflects a tired red light, and Mission Control answers like they’re speaking from another century.
        #GEPscience_evaScience_SironaInSpaceHigh_00 = You conduct the EVA experiment in Sirona’s high space. The planet becomes a muted marble and the silence between transmissions feels longer than the eclipse line.
        #GEPscience_evaScience_AirmedSrfLanded_00 = You perform the EVA experiment on Airmed. The ground is cold, the shadows are the wrong color under the red sun, and you catch yourself listening for sounds that never arrive.
        #GEPscience_evaScience_AirmedInSpaceLow_00 = You run the EVA experiment in low orbit over Airmed. The surface below looks crisp and unfamiliar, and the delayed “Copy” turns simple observations into time capsules.
        #GEPscience_evaScience_AirmedInSpaceHigh_00 = You complete the EVA experiment high above Airmed. With Sirona hanging nearby, you feel very small and very far from any place that would call this “normal operations.”
        #GEPscience_evaScience_BorvoSrfLanded_00 = You conduct the EVA experiment on Borvo. The air is thin but present, just enough to carry a faint haze that makes the red sunlight feel filtered through old glass.
        #GEPscience_evaScience_BorvoInSpaceLow_00 = You complete the EVA experiment in low orbit of Borvo. The terminator line is sharp, the surface is quietly strange, and the comm delay makes jokes land several minutes late.
        #GEPscience_evaScience_BorvoInSpaceHigh_00 = You conduct the EVA experiment in Borvo’s high space. The moon shrinks to a dot, and the red sun turns your suit into a drifting warning label.
        #GEPscience_evaScience_DamonaSrfLanded_00 = You perform the EVA experiment on Damona. The landscape is stark, the red sun is unhelpful, and your footsteps sound louder than they should in the helmet.
        #GEPscience_evaScience_DamonaInSpaceLow_00 = You run the EVA experiment in low orbit over Damona. The surface looks like it was built from missing parts, and the long wait for guidance makes you appreciate “Proceed as planned.”
        #GEPscience_evaScience_DamonaInSpaceHigh_00 = You complete the EVA experiment high above Damona. The moon is barely there, but the distance is very real—measured in the time it takes for home to answer back.
        #GEPscience_evaScience_EponaSrfLanded_00 = You performed the EVA experiment on Epona, and the dim red sun turned the cool, wet air into a permanent dusk while the comm reply arrived late.
        #GEPscience_evaScience_EponaInSpaceLow_00 = You ran the EVA experiment in low orbit of Epona, watching unfamiliar weather patterns roll by like slow thoughts under red light.
        #GEPscience_evaScience_EponaInSpaceHigh_00 = You completed the EVA experiment in Epona’s high space, where the planet shrank and the long radio delay made your checklist feel strangely final.
        #GEPscience_evaScience_RosmertaSrfLanded_00 = You carried out the EVA experiment on Rosmerta, and the radiation counter chattered softly as Epona hung overhead like a distant lamp.
        #GEPscience_evaScience_RosmertaInSpaceLow_00 = You performed the EVA experiment in low orbit of Rosmerta, where every crater edge looked razor-sharp in the red sun’s tired glow.
        #GEPscience_evaScience_RosmertaInSpaceHigh_00 = You executed the EVA experiment in Rosmerta’s high space, and the silence between transmissions lasted long enough to be its own measurement.
        #GEPscience_evaScience_RAB-58E_SrfLanded_00 = You did the EVA experiment on RAB-58E, and the near-zero gravity made even careful steps feel like a plan to accidentally escape.
        #GEPscience_evaScience_RAB-58E_InSpaceLow_00 = You ran the EVA experiment in low orbit of RAB-58E, drifting past a moonlet that barely qualified as a destination and still felt far from home.
        #GEPscience_evaScience_RAB-58E_InSpaceHigh_00 = You completed the EVA experiment in high space over RAB-58E, and the suit’s warning pings sounded louder under the long, delayed “Copy.”
        #GEPscience_evaScience_CernunnosSrfLanded_00 = You performed the EVA experiment on Cernunnos, and the dim red sun cast a weak shadow that seemed unsure it belonged here either.
        #GEPscience_evaScience_CernunnosInSpaceLow_00 = You conducted the EVA experiment in low orbit of Cernunnos, watching its cold surface slide by while home responded minutes later.
        #GEPscience_evaScience_CernunnosInSpaceHigh_00 = You carried out the EVA experiment in Cernunnos’ high space, where the system felt empty enough that even your breathing sounded like a broadcast.

        // infraredTelescope
        #GEPscience_infraredTelescope_GrannusInSpaceHigh_00 = The dim red sun keeps flooding the sensors, so you hide in a long eclipse and watch the colder, quieter sky drift by while Mission Control’s replies arrive late.
		#GEPscience_infraredTelescope_GrannusInSpaceHigh_01 = You map thermal structure across the star and discover a new scientific unit: “very.”
		#GEPscience_infraredTelescope_GrannusInSpaceHigh_02 = The data suggests “a nearby heat source.” You file a second report clarifying that the heat source is, in fact, the star you are orbiting.
		#GEPscience_infraredTelescope_GrannusInSpaceHigh_03 = The IR imager confirms Grannus is hot. This is less a discovery and more a strongly worded reminder.
		#GEPscience_infraredTelescope_TaranisInSpaceHigh_00 = You time observations to the planet’s shadow to cool the optics, then catch faint heat-signatures of faraway targets before the red glare finds you again.
		#GEPscience_infraredTelescope_ToutatisInSpaceHigh_00 = Using the thin twilight as a reference, you subtract the baked and frozen halves from the background and discover the universe is full of cold things that still feel very far away.
        #GEPscience_infraredTelescope_NodensInSpaceHigh_00 = You tuck the telescope behind Nodens’ dark limb to let it cool, then stare into an unfamiliar, cold sky while the red sun keeps trying to photobomb the detectors and Mission Control answers late.
		#GEPscience_infraredTelescope_BelisamaInSpaceHigh_00 = Belisama and Nodens hang in the same places like they signed a contract, which makes pointing easy—until you realize the “stable” view is still under a dim red sun and every calibration ping has to travel a very long way.
		#GEPscience_infraredTelescope_SucellusInSpaceHigh_00 = Sucellus contributes almost nothing to the thermal background, which is somehow more unsettling than helpful; the universe looks colder out here, and your data packets feel like they take longer than physics should allow.
		#GEPscience_infraredTelescope_CaireenInSpaceHigh_00 = Tiny Caireen gives you quick, sharp eclipses for cooling the optics, and then it’s back to watching faint heat-signatures crawl across a sky that doesn’t resemble any star chart you grew up with.
        #GEPscience_infraredTelescope_SironaInSpaceHigh_00 = Sirona’s rings glow with their own faint warmth, throwing tricky reflections into the optics; you use the planet’s shadow to cool down, then watch the unfamiliar cold sky slide past under the dim red sun.
		#GEPscience_infraredTelescope_AirmedInSpaceHigh_00 = With Airmed below as a steady dark reference, you subtract its weak thermal haze and pick out distant, colder targets—by the time Mission Control replies, the telescope has already moved on.
		#GEPscience_infraredTelescope_BorvoInSpaceHigh_00 = Borvo’s surface contributes just enough warmth to complicate the background, so you spend most of the pass doing math and waiting for the detectors to settle in a sky that still doesn’t feel like home.
		#GEPscience_infraredTelescope_DamonaInSpaceHigh_00 = Damona gives you quick eclipses for calibration and cooling, then it’s back to staring into a strange infrared universe while the red sun keeps trying to saturate everything at the worst possible moment.
        #GEPscience_infraredTelescope_EponaInSpaceHigh_00 = You swing the telescope past Epona’s nightside and watch faint warmth leak from terrain that never seems to “cool right” under a dim red sun; the confirmation from home arrives after you’ve already taken the next set.
		#GEPscience_infraredTelescope_RosmertaInSpaceHigh_00 = Rosmerta’s broad shadow makes a perfect cold soak for the optics, and the sky beyond looks unfamiliar and deep; your timing notes include “wait for reply… still waiting.”
		#GEPscience_infraredTelescope_RAB-58EInSpaceHigh_00 = The little irregular moon spins its hot and cold faces through the field of view like a bad calibration target, but once the detectors settle you catch distant heat-signatures that feel impossibly far from any comfortingly normal star.
		#GEPscience_infraredTelescope_CernunnosInSpaceHigh_00 = Cernunnos contributes almost nothing to the infrared background, which should be good news; instead it makes the universe look colder and quieter, as if the red sun never really reaches out here.

        // magnetometer
        #GEPscience_magnetometer_GrannusInSpaceLow_00 = The needle pegs, then dances—Grannus’ field twists around the craft like an invisible storm. Mission Control asks for a re-read; you tell them you’ll hear that request in a few minutes.
        #GEPscience_magnetometer_GrannusInSpaceHigh_00 = Even out here the magnetometer still hums with activity; Grannus’ magnetic reach is bigger than your comfort zone. The trace looks like someone spilled spaghetti on the chart recorder.
        #GEPscience_magnetometer_TaranisInSpaceLow_00 = Close to Taranis, the instrument reports almost nothing—just a nervous hiss of background noise. Every so often, a sharp spike says Grannus is stirring the space around it anyway.
        #GEPscience_magnetometer_TaranisInSpaceHigh_00 = Farther out, Taranis’ “signal” vanishes into Grannus’ restless field. By the time the data makes it home, you’ve forgotten what you were trying to prove.
        #GEPscience_magnetometer_ToutatisInSpaceLow_00 = Toutatis shows a modest, lopsided field that shifts as you pass from the baked hemisphere toward the dark side. The team argues whether it’s a real dynamo or the crust clinging to old magnetism.
        #GEPscience_magnetometer_ToutatisInSpaceHigh_00 = At high orbit the field smooths out and stretches into a long tail pointing away from Grannus. It feels like you’re measuring the wind, not the world.
        #GEPscience_magnetometer_NodensInSpaceLow_00 = The magnetometer locks onto a confident, planet-sized signal—Nodens has a real field, not just wishful thinking. Under Grannus’ dim red glare, the readout still feels like it belongs to a much friendlier star.
        #GEPscience_magnetometer_NodensInSpaceHigh_00 = Far above Nodens, the field lines stretch into a long, ragged tail pointing away from Grannus. The data drifts in late, like every answer out here: accurate, but never on time.
        #GEPscience_magnetometer_BelisamaInSpaceLow_00 = Belisama’s “field” is mostly Nodens shouting over it; the needle wobbles with every pass through the parent planet’s influence. You label the plot “Moon: Present, Magnetic: Questionable.”
        #GEPscience_magnetometer_BelisamaInSpaceHigh_00 = Higher up, the magnetometer settles into a thin, low signal that comes confirmably from somewhere else. Belisama isn’t generating much—she’s borrowing whatever Nodens and Grannus will spare.
        #GEPscience_magnetometer_SucellusInSpaceLow_00 = The instrument keeps insisting there’s almost nothing here, and the radiation counter loudly disagrees. Sucellus offers little magnetic shelter—just a cold rock and the long-distance weather of Grannus.
        #GEPscience_magnetometer_SucellusInSpaceHigh_00 = Out here the “Sucellus reading” fades into background and the space around it takes over. The magnetometer maps a restless, star-driven field that makes the whole system feel unsettled.
        #GEPscience_magnetometer_CaireenInSpaceLow_00 = The magnetometer mostly measures the spacecraft’s own moods until a few sharp spikes interrupt it. Caireen’s a captured oddity—small enough to ignore, yet somehow still a complication under this red sun.
        #GEPscience_magnetometer_CaireenInSpaceHigh_00 = At altitude, Caireen disappears from the magnetic story entirely. What remains is a faint, distant pull and a lot of empty space between your probe and the next conversation.
        #GEPscience_magnetometer_SironaInSpaceLow_00 = The magnetometer needle slams over and stays there—Sirona’s field is a proper, planet-sized beast. The signal jitters in rhythmic bursts, like the rings are crackling with charged dust.
        #GEPscience_magnetometer_SironaInSpaceHigh_00 = Far above Sirona, the field lines stretch into a long, messy tail pointing away from Grannus. The data arrives home late, but the shape is clear: this giant dominates the space around it.
        #GEPscience_magnetometer_AirmedInSpaceLow_00 = Near Airmed, the readings flip between “moon” and “Sirona” every few seconds. You suspect Airmed isn’t making a field so much as wearing Sirona’s like an oversized coat.
        #GEPscience_magnetometer_AirmedInSpaceHigh_00 = Higher up, Airmed’s signature thins to almost nothing and the background takes over. It’s mostly Sirona’s magnetosphere out here, with Grannus quietly stirring the edges.
        #GEPscience_magnetometer_BorvoInSpaceLow_00 = The instrument reports a weak, patchy signal that changes with altitude and attitude—either Borvo has magnetized crust, or your craft is picking up ring grit stuck to the hull again. You log it as “interesting” and “annoying.”
        #GEPscience_magnetometer_BorvoInSpaceHigh_00 = At distance, Borvo disappears into Sirona’s field and the general restlessness of this system. The magnetometer becomes a long-range weather vane for invisible space storms.
        #GEPscience_magnetometer_DamonaInSpaceLow_00 = Damona’s local reading is subtle until a sharp spike cuts through—like passing a buried bar magnet the size of a continent. Mission Control asks for repeats; you reply that repeats will take a while out here.
        #GEPscience_magnetometer_DamonaInSpaceHigh_00 = From high orbit, Damona’s effect fades and the trace smooths into Sirona’s broad influence. The moon is a small interruption in a very large, very distant magnetic story.
        #GEPscience_magnetometer_EponaInSpaceLow_00 = The magnetometer finds a faint, steady field that shouldn’t be there—either Epona has a sleepy core, or the red-dwarf environment is “helping” in unsettling ways. The needle twitches like it’s cold.
        #GEPscience_magnetometer_EponaInSpaceHigh_00 = Farther out, Epona’s signal thins into a barely-there curve and the instrument starts reporting the system itself. The emptiness between packets of data feels wider than the orbit.
        #GEPscience_magnetometer_RosmertaInSpaceLow_00 = The readout stays stubbornly near zero as Rosmerta drifts below, indifferent and airless. Once in a while the trace jumps—more like Epona’s influence brushing past than anything Rosmerta is doing.
        #GEPscience_magnetometer_RosmertaInSpaceHigh_00 = At altitude, Rosmerta vanishes from the magnetic story entirely. It’s just quiet space, a dim red sun, and a sensor waiting for something worth measuring.
        #GEPscience_magnetometer_RAB-58EInSpaceLow_00 = The magnetometer mostly measures the spacecraft until a brief wobble suggests a few magnetized rocks are hitching a ride on this captured oddity. You label the file “probably nothing” and keep it anyway.
        #GEPscience_magnetometer_RAB-58EInSpaceHigh_00 = From high orbit, RAB-58E is too small to leave a magnetic fingerprint. The instrument becomes a long-range listener for distant disturbances that arrive long after they happen.
        #GEPscience_magnetometer_CernunnosInSpaceLow_00 = Cernunnos offers almost perfect silence—no field, no shielding, just an icy dwarf and the raw, exposed space around it. For once, “nothing” is extremely useful calibration data.
        #GEPscience_magnetometer_CernunnosInSpaceHigh_00 = High above Cernunnos, the trace is smooth and uneasy, like the system is holding its breath. The red sun’s invisible weather is the only thing left to map out here.

        // === Bluedog_DB ===
        // bd_ALSEP_LRRR
        #GEPscience_bd_ALSEP_LRRR_TaranisSrfLanded_00 = The reflector is technically aimed at Nodens, but most of the photons seem more interested in being instantly roasted. A few make the round trip anyway.
		#GEPscience_bd_ALSEP_LRRR_ToutatisSrfLanded_00 = The thin, hot haze turns the beam into a slightly wobbly pencil line, but the Nodens return still lands right on the detector. Someone writes “good enough for science” on the housing.
        #GEPscience_bd_ALSEP_LRRR_NodensSrfLanded_00 = You fire a laser toward Kerbin and wait. And wait. Mission Control starts taking snack orders before the first photons come back.
		#GEPscience_bd_ALSEP_LRRR_BelisamaSrfLanded_00 = With Belisama and Nodens locked face-to-face, the reflector has the easiest “moving target” problem in history. The return ping is so crisp it feels smug.
        #GEPscience_bd_ALSEP_LRRR_SucellusSrfLanded_00 = You bounce a laser off Nodens and back, just to prove this lumpy “not-quite-a-planet” is exactly where the math says it is. Sucellus looks offended.
		#GEPscience_bd_ALSEP_LRRR_CaireenSrfLanded_00 = The return signal jitters because the lander keeps doing tiny, dramatic shifts in the weak gravity. The laser does not appreciate performance art.
		#GEPscience_bd_ALSEP_LRRR_AirmedSrfLanded_00 = Scarred terrain, strange fractures, and a perfectly boring, perfectly reliable Nodens return. Science celebrates the one thing here that isn’t complicated.
		#GEPscience_bd_ALSEP_LRRR_BorvoSrfLanded_00 = If there’s anything hiding under all that ice, it still can’t stop you from ranging to Nodens. The reflector just keeps blinking like it knows a secret.
		#GEPscience_bd_ALSEP_LRRR_DamonaSrfLanded_00 = The Nodens ping takes long enough that the crew re-reads the checklist twice and invents a third snack break. Eventually the photons return, unapologetically.
		#GEPscience_bd_ALSEP_LRRR_EponaSrfLanded_00 = Methane haze tries to soften the beam, but the Nodens reflection still lands on the detector with satisfying precision. You write “mostly optically adequate” in the log.
		#GEPscience_bd_ALSEP_LRRR_RosmertaSrfLanded_00 = You send a laser toward Nodens and get back a crisp, regular pulse train. Rosmerta may be lonely, but the reflector is not.
		#GEPscience_bd_ALSEP_LRRR_RAB-58ESrfLanded_00 = In near-zero gravity, bolting down the reflector feels like negotiating with the concept of “down.” Once it stays put, Nodens answers right on schedule.
		#GEPscience_bd_ALSEP_LRRR_CernunnosSrfLanded_00 = Out here, Nodens is just a distant reference and the return is faint, but it matches the prediction. A very small dot of light makes a very big baseline.

        // bd_atm
        #GEPscience_bd_atm_GrannusInSpaceLow_00 = The mount insists it was built for “solar” work, then quietly admits this red dwarf is a different kind of solar. You begin a flare watch and label the file: “DO NOT LOOK AWAY.”
        #GEPscience_bd_atm_GrannusInSpaceHigh_00 = From far out, Grannus is a dim ember with a lot of empty around it. The flare log stays mostly calm, which somehow makes the silence feel louder.
        #GEPscience_bd_atm_TaranisInSpaceLow_00 = Grannus hangs low and red, and the mount needs longer exposures than anyone is comfortable with. You record flare activity and schedule the report for whenever the signal finally crawls home.
        #GEPscience_bd_atm_TaranisInSpaceHigh_00 = With Taranis below and a ruby star ahead, it’s hard to tell what “noon” is supposed to look like anymore. The instruments call it stable; you call it “stable, but unsettling.”
        #GEPscience_bd_atm_ToutatisInSpaceLow_00 = The mount watches Grannus flicker over Toutatis’ harsh day-side glare. You argue with the instruments about whether that was a flare or just the planet trying to cook the optics.
        #GEPscience_bd_atm_ToutatisInSpaceHigh_00 = At this altitude, Grannus is a dull ruby in a lot of black. You start a long flare watch and realize Mission Control will get the summary roughly one bedtime later.
        #GEPscience_bd_atm_NodensInSpaceLow_00 = The telescope mount locks onto Grannus. The star looks more ember than spotlight, so you crank up the exposure and note that any flare warning will reach home long after the flare does.
        #GEPscience_bd_atm_NodensInSpaceHigh_00 = From up here, Nodens’ thick limb haze glows faintly in Grannus’ red light. The mount reports “quiet conditions,” which is somehow less comforting this far from familiar skies.
        #GEPscience_bd_atm_BelisamaInSpaceLow_00 = The mount peers past Nodens’ glow at the small red sun that rules this system. You log a faint flare and wonder how many hours later Mission Control will learn you noticed.
        #GEPscience_bd_atm_BelisamaInSpaceHigh_00 = Grannus looks distant enough to be decorative, until the sensors remind you it still throws tantrums. You keep watching anyway—out here, forewarning is the closest thing to comfort.
        #GEPscience_bd_atm_SucellusInSpaceLow_00 = The telescope mount stares at Grannus and reports “low flare activity.” You add a note: “Low flare activity is still flare activity, and we are very, very far away.”
        #GEPscience_bd_atm_SucellusInSpaceHigh_00 = From high orbit, Sucellus is just a dark lump under an ember-red sun. Longer exposures tease out faint structure in the corona and a lot of empty space to think about.
        #GEPscience_bd_atm_CaireenInSpaceLow_00 = Caireen is small enough that the mount spends more time keeping steady than observing. When it finally locks onto Grannus, the flare log fills with “maybe” and “check again later.”
        #GEPscience_bd_atm_CaireenInSpaceHigh_00 = The mount uses Grannus as a calibration target because it’s the only thing that looks stable out here. The data packet is queued for transmission; the confirmation will arrive after everyone’s next snack cycle.
        #GEPscience_bd_atm_SironaInSpaceLow_00 = Sirona’s harsh environment makes the sensors complain in several new ways. Between the noise and the glare, the mount still manages to track Grannus and flag a brief flare event as “not our favorite.”
        #GEPscience_bd_atm_SironaInSpaceHigh_00 = High above Sirona, the red sun paints faint highlights on the cloud tops. The telescope mount logs a quiet interval and you realize “quiet” means “nothing happened yet.”
        #GEPscience_bd_atm_AirmedInSpaceLow_00 = The mount locks onto Grannus while Airmed’s battered surface spins below. The flare readout stays quiet, and you still double-check the radiation warnings out of habit.
        #GEPscience_bd_atm_AirmedInSpaceHigh_00 = From high above Airmed’s odd two-toned scars, Grannus looks like a distant ember. You log a long exposure and mark the data “worth the wait for downlink.”
        #GEPscience_bd_atm_BorvoInSpaceLow_00 = Borvo’s thin haze tries to paint the view with a faint tint, but the mount holds steady on Grannus. The instruments complain about “low signal,” which is accurate and not helpful.
        #GEPscience_bd_atm_BorvoInSpaceHigh_00 = The mount watches a dim red sun over a moon that can’t decide if it’s rock or ice. You record a minor flicker and wonder how many snack breaks away Mission Control is from hearing about it.
        #GEPscience_bd_atm_DamonaInSpaceLow_00 = The telescope mount tracks Grannus while Damona’s big scar drifts past beneath you. No big flares—just a steady, watchful glow that makes the silence feel scientific.
        #GEPscience_bd_atm_DamonaInSpaceHigh_00 = Damona shrinks to a gray speck and Grannus becomes the only “weather” worth monitoring. You file the flare log under “mostly calm,” and add “for now.”
        #GEPscience_bd_atm_EponaInSpaceLow_00 = The telescope mount tries to calibrate for a sun that’s red, dim, and still bossy. The readings say “stable,” and you write “stable, but weird” in the margin anyway.
        #GEPscience_bd_atm_EponaInSpaceHigh_00 = Epona rolls below with a day/night line that feels softer than it should. The mount logs a small flare event and you tag it “PLEASE FORWARD TO HOMEWORLD, EVENTUALLY.”
        #GEPscience_bd_atm_RosmertaInSpaceLow_00 = The mount tracks Grannus through Rosmerta’s limb haze; the red light makes every flare look like a slow smolder. You schedule longer exposures and try not to think about how “later” keeps getting later out here.
        #GEPscience_bd_atm_RosmertaInSpaceHigh_00 = From high above Rosmerta, Grannus is a lonely ember in a lot of black. The flare log stays calm, and you note that “calm” is not the same as “safe,” just quieter.
        #GEPscience_bd_atm_RAB-58EInSpaceLow_00 = Keeping a steady lock near RAB-58E takes more effort than the actual observing. Once the mount finally settles on Grannus, the data comes in faint and stubborn—like the sun is trying to keep secrets.
        #GEPscience_bd_atm_RAB-58EInSpaceHigh_00 = Up here, RAB-58E is a lumpy shadow and Grannus is a dim red dot with attitude. The mount flags a brief flicker; you tag the packet “important” and accept that the reply will arrive several snack cycles from now.
        #GEPscience_bd_atm_CernunnosInSpaceLow_00 = Cernunnos’ dark horizon makes Grannus’ red glow feel even more unnatural. The telescope mount logs minor flare activity and you write “minor” with very careful handwriting.
        #GEPscience_bd_atm_CernunnosInSpaceHigh_00 = At this altitude, Cernunnos looks small and the red sun looks smaller—yet it still runs the whole show. The mount keeps watch for sudden brightening and you keep watch for the mount getting ideas.

        // bd_bioexp
        #GEPscience_bd_bioexp_GrannusFlyingLow_00 = Inside the heat-shielded habitat, the frogs float in slow, confused loops while the windows glow a tired red.
