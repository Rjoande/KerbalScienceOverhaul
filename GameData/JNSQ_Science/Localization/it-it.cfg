        #JNSQscience_bd_magScan_EelooSrfLandedCanyon_00 = Le pareti del canyon disegnano sottili strisce di deboli anomalie, come se gli strati ricordassero diversi umori magnetici.
        #JNSQscience_bd_magScan_CelesInSpaceLow_00 = L'orbita ravvicinata mostra distorsioni sottili e a chiazze, Celes non può creare un campo, ma sa decisamente piegare il debole fondo attorno a sé.
        #JNSQscience_bd_magScan_CelesInSpaceHigh_00 = Più lontano il segnale si assottiglia in una fluttuazione pulita e debole: il magnetometro ascolta soprattutto lo spazio vuoto.
        #JNSQscience_bd_magScan_CelesSrfLandedLowlands_00 = La base resta vicino allo zero finché una zona granulosa non fa saltare l'ago, a quanto pare "qui non c'è nulla" ha qualche eccezione.
