		MinmusInSpaceLowPoles* = #JNSQscience_bd_IRspec_MinmusInSpaceLowPoles_00 // The poles are brutally cold, but glittery patches flare bright: reflective crystals are suspected.
		MinmusInSpaceLowLowlands* = #JNSQscience_bd_IRspec_MinmusInSpaceLowLowlands_00 // Lowlands return a smooth, bland spectrum: the flats behave like a giant heat sink.
