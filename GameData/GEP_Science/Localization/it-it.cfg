        #GEPscience_bd_camera_BorvoInSpaceLowTemperateCraquelure_00 = Le fratture temperate si intrecciano in pattern che sembrano intenzionali, finché non ti ricordi che la fisica può anche essere bella. Lo etichetti "morfologia delle fratture".
        #GEPscience_bd_camera_BorvoInSpaceLowTropicalLowlands_00 = I bassopiani tropicali appaiono come ampie pianure smorzate con sottili striature. La fotocamera li fa sembrare calmi, il sole rosso li fa sembrare sbagliati.
