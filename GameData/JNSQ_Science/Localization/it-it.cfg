        #JNSQscience_gravityScan_EveInSpaceHighShores_00 = A questa quota la costa è solo una sottile cucitura, ma il rilevatore coglie comunque un lieve ondeggiamento dove la terra incontra il mare.
        #JNSQscience_gravityScan_KerbinSrfLandedLowlands_00 = Il flusso di gravioli è stabile e tranquillo qui. O le pianure basse sono noiose, oppure sono molto brave a nascondere i loro segreti.
