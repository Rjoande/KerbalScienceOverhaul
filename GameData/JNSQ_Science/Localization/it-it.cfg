        #JNSQscience_bd_XRayDiffract_IkeSrfLandedHighlands_00 = Fasi minerali più luminose compaiono qui con maggiore forza, mescolate a materiale basaltico: le colline sembrano un po' più "pulite", ma restano molto Ike.
        #JNSQscience_bd_XRayDiffract_EdnaSrfLandedLowlands_00 = Il tracciato è dominato da silicati scuri a grana fine, con una "foschia di fondo" ricca di carbonio che fa sembrare Edna molto vecchia.
        #JNSQscience_bd_XRayDiffract_EdnaSrfLandedMidlands_00 = Picchi allargati suggeriscono polvere fortemente alterata e rimescolata dai micrometeoroidi: i minerali sono familiari, solo macinati senza fine.
        #JNSQscience_bd_XRayDiffract_EdnaSrfLandedHighlands_00 = Compaiono picchi più netti da fasi cristalline più tenaci, come se le alture fossero l'unico posto in cui la superficie non sia stata completamente ridotta in polvere.
        #JNSQscience_bd_XRayDiffract_EdnaSrfLandedPolarIceCraters_00 = Forti picchi del ghiaccio saltano fuori subito, con deboli firme di volatili intrappolati infilate nella miscela come un tesoro rubato.
        #JNSQscience_bd_XRayDiffract_EdnaSrfLandedWhites_00 = Depositi chiari producono picchi puliti e intensi, o brina incontaminata o sali pallidi, e entrambe le opzioni sono stranamente inquietanti quassù.
        #JNSQscience_bd_XRayDiffract_DakSrfLandedLowlands_00 = Il diffrattogramma sembra un sacchetto di ghiaia mista: silicati, scaglie metalliche e cristalli fratturati che urlano tutti insieme.
        #JNSQscience_bd_XRayDiffract_DakSrfLandedMidlands_00 = Picchi ampi e rumorosi suggeriscono un ammasso di macerie poco legato di roccia polverizzata: il campione si comporta come se stesse solo fingendo di essere "suolo".
