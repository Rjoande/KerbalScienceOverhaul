        #JNSQscience_bd_multiSpec_HuygenInSpaceLowMethaneLakes_00 = I laghi assorbono fortemente su più bande e trattengono calore più a lungo del previsto, come se la superficie fosse più spessa di quanto sembri. Lo strumento lo segnala come "liquido" e l'equipaggio lo segnala come "no".
        #JNSQscience_bd_multiSpec_RigaInSpaceHigh_00 = Da un'orbita alta, Riga risulta un mondo dall'aria familiare reso in temperature ostili. Il composito multispettrale dice "quasi casa" e poi si corregge.
        #JNSQscience_bd_multiSpec_RigaInSpaceLowLowlands_00 = Le pianure mostrano firme più scure e più uniformi con inerzia termica leggermente più alta, coerente con fini depositi. I bacini sembrano raccogliere qualunque cosa non riesca a tenersi su.
        #JNSQscience_bd_multiSpec_RigaInSpaceLowMidlands_00 = Le Midlands restituiscono spettri stabili con una debole striatura di composizione, come se la superficie fosse stata spolverata a strati nel tempo. È sottile, ma si ripete.
