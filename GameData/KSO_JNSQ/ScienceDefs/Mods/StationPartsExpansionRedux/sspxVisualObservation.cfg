@EXPERIMENT_DEFINITION:HAS[#id[sspxVisualObservation]]
{
    //@biomeMask = 3
    %RESULTS
    {
        SunFlyingHigh* = #JNSQscience_sspxVisualObservation_SunFlyingHigh_00 // The view is pure glare and roiling light; you can only watch for a heartbeat before your instincts demand you look away.
        SunFlyingHigh* = #JNSQscience_sspxVisualObservation_SunFlyingHigh_01 // You glimpse bright loops and boiling texture in the haze, like the Sun is trying to write weather across its own face.

        MohoSrfLandedPoles* = #JNSQscience_sspxVisualObservation_MohoSrfLandedPoles_00 // Even at the poles, the sunlight feels uncomfortably close. The shadows are the only thing that seems cool.
        MohoSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_MohoSrfLandedLowlands_00 // The lowlands look baked solid, a dark plain that has had too many close conversations with the sun.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_sspxVisualObservation_MohoSrfLandedPolarIceCraters_00 // Bright patches glare from crater floors like someone spilled powdered glass and dared you to stare.
        MohoSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_MohoSrfLandedHighlands_00 // The high ground is all sharp ridges and harsh contrast, like the planet is drawn with a blunt pencil.
        MohoSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_MohoSrfLandedMidlands_00 // Everything is the same shade of “hot rock,” just arranged in slightly different ways.
        MohoSrfLandedCraters* = #JNSQscience_sspxVisualObservation_MohoSrfLandedCraters_00 // Crater rims stack on crater rims, as if Moho has been keeping score and refusing to erase anything.
        MohoSrfLandedExoticCraters* = #JNSQscience_sspxVisualObservation_MohoSrfLandedExoticCraters_00 // The impacts here look odd and overlapping, like the surface couldn’t decide which direction was “down.”
        MohoSrfLandedRareCraters* = #JNSQscience_sspxVisualObservation_MohoSrfLandedRareCraters_00 // One big scar dominates the view, bold enough to make the rest of Moho look briefly subtle.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_sspxVisualObservation_MohoSrfLandedVoronoiCraters_00 // The ground breaks into a tiled pattern of pits and ridges, geometry that feels a little too intentional.
        MohoSrfLandedNotableCraters* = #JNSQscience_sspxVisualObservation_MohoSrfLandedNotableCraters_00 // This crater has personality: steep walls, deep shadow, and a floor that looks like it knows secrets.
        MohoSrfLandedPeaks* = #JNSQscience_sspxVisualObservation_MohoSrfLandedPeaks_00 // From the peaks, the horizon is a crisp arc of scorched terrain. It is beautiful in a “do not touch” sort of way.

        EveSrfLandedPoles* = #JNSQscience_sspxVisualObservation_EveSrfLandedPoles_00 // The light is harsh and the shadows are ink-black. Eve manages to look cold while feeling anything but.
        EveSrfLandedPoles* = #JNSQscience_sspxVisualObservation_EveSrfLandedPoles_01 // The horizon shimmers with violet glare, as if the planet is daring you to blink first.
        EveSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_EveSrfLandedLowlands_00 // The thick air turns distance into a rumor. Everything beyond the nearby rocks is just purple suggestion.
        EveSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_EveSrfLandedLowlands_01 // The landscape looks soft and sleepy, until you notice how eagerly it tries to ruin anything shiny.
        EveSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_EveSrfLandedMidlands_00 // Rolling terrain fades into a smoky lavender distance, like the planet is hiding its edges on purpose.
        EveSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_EveSrfLandedMidlands_01 // You watch slow-moving clouds cast bruised shadows across the ground. The whole world looks mildly offended.
        EveSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_EveSrfLandedHighlands_00 // The high ground gives you a wider view of endless violet gloom. It does not improve your confidence.
        EveSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_EveSrfLandedHighlands_01 // Peaks and ridges poke up through the haze like broken promises of clear air.
        EveSrfLandedPeaks* = #JNSQscience_sspxVisualObservation_EveSrfLandedPeaks_00 // Above the worst of the haze, the sky still feels heavy—just more honest about it.
        EveSrfLandedPeaks* = #JNSQscience_sspxVisualObservation_EveSrfLandedPeaks_01 // You can almost see forever from here, if “forever” is measured in layers of purple fog.
        EveSrfLandedMountains* = #JNSQscience_sspxVisualObservation_EveSrfLandedMountains_00 // The mountains look carved from dark stone and stubbornness, rising into air that refuses to be breathable.
        EveSrfLandedMountains* = #JNSQscience_sspxVisualObservation_EveSrfLandedMountains_01 // The slopes are dramatic and the view is spectacular, in the same way a sharp tool is “spectacular.”
        EveSrfLandedShores* = #JNSQscience_sspxVisualObservation_EveSrfLandedShores_00 // The coastline is a thin, bright line between hostile land and even more suspicious liquid.
        EveSrfLandedShores* = #JNSQscience_sspxVisualObservation_EveSrfLandedShores_01 // Waves flash silver under the clouds, making the sea look inviting for exactly one dangerous second.
        EveSrfLandedKrakensWell* = #JNSQscience_sspxVisualObservation_EveSrfLandedKrakensWell_00 // The ground dips away into a strange hollow, as if Eve has a secret it keeps swallowing.
        EveSrfLandedKrakensWell* = #JNSQscience_sspxVisualObservation_EveSrfLandedKrakensWell_01 // The haze pools here and clings to the terrain, giving the place the look of a planet-sized trap.
        EveSrfSplashedExplodiumSea* = #JNSQscience_sspxVisualObservation_EveSrfSplashedExplodiumSea_00 // The surface fizzes and gleams in ways water absolutely should not. You decide not to lean out.
        EveSrfSplashedExplodiumSea* = #JNSQscience_sspxVisualObservation_EveSrfSplashedExplodiumSea_01 // Every ripple looks like it wants to become a problem. You watch carefully, from behind several layers of hull.
        EveSrfSplashedShores* = #JNSQscience_sspxVisualObservation_EveSrfSplashedShores_00 // The craft bobs in purple surf while the shoreline watches in complete, judgmental silence.
        EveSrfSplashedShores* = #JNSQscience_sspxVisualObservation_EveSrfSplashedShores_01 // Foam gathers against the hull like it’s trying to get in. You suddenly appreciate sealed hatches.
        EveSrfSplashedPolarLakes* = #JNSQscience_sspxVisualObservation_EveSrfSplashedPolarLakes_00 // The lake is dark and still, reflecting a bruised sky with unsettling clarity.
        EveSrfSplashedPolarLakes* = #JNSQscience_sspxVisualObservation_EveSrfSplashedPolarLakes_01 // The surface barely moves, as if even the waves are trying not to disturb whatever this is.
        EveSrfSplashedPetrolLakes* = #JNSQscience_sspxVisualObservation_EveSrfSplashedPetrolLakes_00 // The liquid shines with an oily sheen that makes you want to wash your eyes.
        EveSrfSplashedPetrolLakes* = #JNSQscience_sspxVisualObservation_EveSrfSplashedPetrolLakes_01 // It looks thick, sluggish, and far too eager to cling to anything that touches it.
        EveSrfSplashedSeaofAkron* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofAkron_00 // Slow swells roll under the craft, lifting it like a toy in a very serious bath.
        EveSrfSplashedSeaofAkron* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofAkron_01 // The sea stretches to the horizon in dull violet bands, broken only by the occasional angry sparkle.
        EveSrfSplashedSeaofNessus* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofNessus_00 // The waves move in long, deliberate lines, like the sea is thinking before it acts.
        EveSrfSplashedSeaofNessus* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofNessus_01 // You keep expecting something to break the surface. The fact that nothing does is somehow worse.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofTaniwha_00 // The water’s color shifts with the light, from deep purple to metallic gray in a single swell.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofTaniwha_01 // The horizon is a soft blur of haze and sea, like the planet is smudged at the edges.
        EveSrfSplashedSeaofGigan* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofGigan_00 // The sea looks heavy, as if each wave is made from more than just liquid.
        EveSrfSplashedSeaofGigan* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofGigan_01 // You watch the swells thump against the hull and mentally file it under “planetary attitude.”
        EveSrfSplashedSeaofRodan* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofRodan_00 // Wind tears across the surface, shredding reflections into nervous, twitching highlights.
        EveSrfSplashedSeaofRodan* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofRodan_01 // The waves slap and pull at the craft in a way that feels less like weather and more like testing.
        EveSrfSplashedSeaofGojira* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofGojira_00 // The sea heaves in broad motions, making the craft feel small in a very personal way.
        EveSrfSplashedSeaofGojira* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofGojira_01 // The purple water and darker sky blend together until you can’t tell which one is more threatening.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofGhidorah_00 // The surface breaks into multiple lines of choppy swells that intersect like an argument.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofGhidorah_01 // You try to focus on “visual observation” while the sea demonstrates “visual intimidation.”
        EveSrfSplashedSeaofBagorah* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofBagorah_00 // The water here is calmer, which only makes it feel more deliberate.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_sspxVisualObservation_EveSrfSplashedSeaofBagorah_01 // The craft drifts on a glassy violet sheet, and you cannot shake the feeling you are being tolerated.
        EveFlyingHigh* = #JNSQscience_sspxVisualObservation_EveFlyingHigh_00 // From up here, the purple haze looks almost gentle. You know better.
        EveFlyingHigh* = #JNSQscience_sspxVisualObservation_EveFlyingHigh_01 // The clouds boil and fold beneath you like a slow-motion storm trying to remember your name.

        GillyInSpaceLow* = #JNSQscience_sspxVisualObservation_GillyInSpaceLow_00 // Gilly looks like a lumpy pebble someone forgot to finish, casually orbiting a world far too dramatic for it.
        GillyInSpaceHigh* = #JNSQscience_sspxVisualObservation_GillyInSpaceHigh_01 // From this distance, Eve is the main event and Gilly is an afterthought that somehow still has an orbit.
        GillySrfLandedLowlands* = #JNSQscience_sspxVisualObservation_GillySrfLandedLowlands_00 // The “lowlands” are just a slightly less pointy part of a very pointy rock. Gravity feels optional.
        GillySrfLandedMidlands* = #JNSQscience_sspxVisualObservation_GillySrfLandedMidlands_00 // The terrain rolls in uneven bumps, like the ground is trying to imitate hills but keeps losing track of the shape.
        GillySrfLandedHighlands* = #JNSQscience_sspxVisualObservation_GillySrfLandedHighlands_00 // Up high, the view barely changes—just more jagged lumps and the constant feeling you could hop into space.

        KerbinSrfLandedAdministration* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAdministration_00 // Through the window you observe a rare ecosystem of paper stacks in their natural habitat. A clerk asks you to stop staring at restricted forms.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAstronautComplex_00 // Your view includes training equipment, snack wrappers, and a suspiciously heroic pile of towels. The crew claims it is “field realism.”
        KerbinSrfLandedCrawlerway* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedCrawlerway_00 // The crawlerway stretches out like a perfectly straight “do not step here” sign. Someone radios to ask why your window is loitering.
        KerbinSrfLandedFlagPole* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedFlagPole_00 // You watch the flag flap majestically while security watches you flap suspiciously. The observation is rated “patriotic, pending approval.”
        KerbinSrfLandedLaunchPad* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedLaunchPad_00 // Everything outside is vents, cables, and drama. The pad crew requests you observe from a safer distance, like another continent.
        KerbinSrfLandedMissionControl* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedMissionControl_00 // You note multiple screens displaying your exact location and posture. The flight director asks if the window can please stop being “nonessential telemetry.”
        KerbinSrfLandedR&D* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&D_00 // The view is a blur of prototypes, warning labels, and scientists moving like you might ask questions. The window fogs up in self-defense.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DCentralBuilding_00 // The scene outside is tidy enough to look pre-reviewed. Your report is returned with a note: “Please observe within standard margins.”
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DCornerLab_00 // You spot a curtain, a locked cabinet, and a “nothing to see here” sign. The sign is, ironically, the most interesting thing you see.
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DMainBuilding_00 // You observe frantic pacing patterns consistent with a deadline approaching from orbit. Engineers request you label it “nominal activity.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DObservatory_00 // You observe the sky, the horizon, and a technician politely guarding the “no vibrations” area. You blink as gently as possible.
        KerbinSrfLandedR&DSideLab* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DSideLab_00 // The window frames a back door that opens only when you look away. Your notes include “probable shy experiment.”
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DSmallLab_00 // The view is mostly wall and a single vent that whispers secrets. A scientist asks why you are “visually sampling” the ventilation.
        KerbinSrfLandedR&DTanks* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DTanks_00 // Outside you see tanks, fences, and more fences, arranged in the shape of “absolutely not.” The window is cleared for “passive viewing only.”
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedR&DWindTunnel_00 // The scenery looks calm until the fans start, then everything becomes sideways at high speed. Someone suggests you observe with fewer loose items.
        KerbinSrfLandedRunway* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedRunway_00 // You observe a runway so flat it feels smug about it. Ground crew asks you to stop observing right where pilots aim.
        KerbinSrfLandedSPH* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPH_00 // The hangar view includes half-built aircraft and whole-built opinions. An engineer glares at your window like it is doing peer review.
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHMainBuilding_00 // You watch cranes glide overhead with the confidence of paperwork. Your window is asked to file a lift plan.
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHRoundTank_00 // The round tank looks rounder than expected, possibly on purpose. A technician reminds you the insulation is not a tourist attraction.
        KerbinSrfLandedSPHTanks* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHTanks_00 // Rows of tanks sit quietly, daring you to point at them. You point anyway; security points back.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedSPHWaterTower_00 // You observe a water tower dripping with the patience of maintenance budgets. The safety officer adds “no looking up without a hardhat.”
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedTrackingStationDishEast_00 // The dish tracks the sky with grace, then briefly tracks you with judgment. You log “unexpected observer acquisition.”
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedTrackingStationDishNorth_00 // The dish slews dramatically as if to underline your lack of clearance. Your window is advised to stop making the antenna feel watched.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedTrackingStationDishSouth_00 // Everything is orderly, quiet, and intensely monitored. You observe the horizon and the staff observing your observing.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedTrackingStationHub_00 // Inside the hub you can see screens showing what you could see outside. You conclude the safest view is the one already approved.
        KerbinSrfLandedVAB* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedVAB_00 // The VAB interior view features cranes, scaffolds, and gravity doing paperwork in real time. Your window requests a bigger neck.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedVABMainBuilding_00 // You observe a rocket-in-progress and a swarm of engineers pretending it is under control. The window is told to stop “adding pressure.”
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedVABPodMemorial_00 // The view is quiet and respectful, with no one yelling about schedules. You take one solemn look and keep your jokes in the capsule.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedVABRoundTank_00 // The round tank sits there looking extremely “not for looking at.” Your observation is logged as “curiosity incident, minor.”
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedVABSouthComplex_00 // Sparks fly, tools clatter, and someone waves a clipboard like it is a shield. You observe “active productivity” and “active liability.”
        KerbinSrfLandedVABTanks* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedVABTanks_00 // You see tank rows, tire tracks, and a clear path labeled “keep clear.” The window remains technically clear, but spiritually blocked.
        KerbinSrfLandedKSC* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedKSC_00 // A panoramic view reveals the KSC’s natural state: busy, loud, and slightly improvised. Public Affairs requests the report mention “inspiring” at least twice.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedIslandAirfield_00 // You observe salty air, damp tarmac, and hangars that smell like sea and shortcuts. The window immediately develops a light coating of “coastal science.”
        KerbinSrfLandedBaikerbanur* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedBaikerbanur_00 // The landscape is open, dry, and full of signs that say you are standing in the wrong place. Your window is issued a visitor badge.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedBaikerbanurLaunchpad_00 // You observe a launchpad with excellent visibility and even better restrictions. A guard asks if your window has been briefed on protocol.
        KerbinSrfLandedWoomerang* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedWoomerang_00 // The view shifts constantly because the wind keeps reclassifying “upwind.” You record the scenery in three directions at once and call it “comprehensive.”

        KerbinSrfLandedIceCaps* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedIceCaps_00 // The view is all white glare and sharp shadows, like Kerbin forgot to load its textures.
        KerbinSrfLandedIceCaps* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedIceCaps_01 // You press your face to the window and immediately regret it. The ice does not care about your enthusiasm.
        KerbinSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedHighlands_00 // Rolling hills stack into the distance in neat layers, like someone kept smoothing the planet with a giant hand.
        KerbinSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedHighlands_01 // Clouds drag their shadows across the ground, making the landscape look like it is slowly breathing.
        KerbinSrfLandedMountains* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedMountains_00 // Peaks and ridgelines carve the horizon into jagged teeth. You feel very small and very indoors.
        KerbinSrfLandedMountains* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedMountains_01 // From here, the valleys look gentle. The moment you step outside, you remember that perspective lies.
        KerbinSrfLandedShores* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedShores_00 // The coastline draws a clean line between everything you can swim in and everything you can trip over.
        KerbinSrfLandedShores* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedShores_01 // Waves sparkle in the sun and the sand looks inviting, right up until it starts getting into everything.
        KerbinSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedMidlands_00 // The scenery is comfortingly ordinary: green, brown, and full of places that probably have snacks.
        KerbinSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedMidlands_01 // You catch yourself looking for roads and rooftops, as if Kerbin is going to wave back.
        KerbinSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedLowlands_00 // Flat ground stretches out forever, making your lander look like it was placed on a tabletop for display.
        KerbinSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedLowlands_01 // Everything looks easy to walk across, which is exactly how you know it is not.
        KerbinSrfLandedAridLowlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridLowlands_00 // The terrain fades into dusty tans and muted reds, like Kerbin is practicing for life without rain.
        KerbinSrfLandedAridLowlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridLowlands_01 // Heat haze wobbles the horizon, turning distant hills into suspiciously liquid shapes.
        KerbinSrfLandedAridMidlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridMidlands_00 // Dry plains and scattered rock make the world look unfinished, but in a stylish way.
        KerbinSrfLandedAridMidlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridMidlands_01 // You stare out at the emptiness and briefly understand why explorers keep naming things after themselves.
        KerbinSrfLandedAridHighlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridHighlands_00 // Rugged ridges and broken ground give Kerbin an unexpectedly grumpy face.
        KerbinSrfLandedAridHighlands* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridHighlands_01 // The land looks tough and crumbly, like it would rather not be stepped on today.
        KerbinSrfLandedAridMountains* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridMountains_00 // Harsh slopes and sharp outcrops make you double-check that you really are still on Kerbin.
        KerbinSrfLandedAridMountains* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedAridMountains_01 // The view is spectacular, mostly because it looks like it is actively trying to remove your landing legs.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedWelcomeBackIsland_00 // There is land, there is water, and there is an oddly familiar feeling of being expected.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_sspxVisualObservation_KerbinSrfLandedWelcomeBackIsland_01 // You take a long look outside and realize this place has seen a lot of very relieved crews.
        KerbinSrfSplashedShores* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedShores_00 // The window is a moving collage of foam, spray, and sky as the craft bobs in the shallows.
        KerbinSrfSplashedShores* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedShores_01 // Being this close to home feels nice, right until a wave slaps the hull like an impatient technician.
        KerbinSrfSplashedGreatLake* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedGreatLake_00 // The lake surface is smooth enough to mirror the sky, which makes you feel like you are floating between worlds.
        KerbinSrfSplashedGreatLake* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedGreatLake_01 // Everything is calm and quiet, as if Kerbin is politely pretending not to notice you.
        KerbinSrfSplashedInlandWater* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedInlandWater_00 // Gentle ripples drift past, turning your reflection into a wiggly, heroic portrait.
        KerbinSrfSplashedInlandWater* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedInlandWater_01 // You watch the shoreline slide by and briefly consider naming your splashdown a successful docking.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedKreenwichSea_00 // The water rolls in long, steady swells that make the horizon feel strangely serious.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedKreenwichSea_01 // You try to look dignified while floating, and discover that floating has other plans.
        KerbinSrfSplashedArcticSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedArcticSea_00 // Gray water and drifting ice make the view feel colder than the numbers on the thermometer.
        KerbinSrfSplashedArcticSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedArcticSea_01 // The sea looks like it is deciding whether to freeze you in place or just stare silently.
        KerbinSrfSplashedForemansSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedForemansSea_00 // The waves march past in orderly lines, like someone issued them a schedule.
        KerbinSrfSplashedForemansSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedForemansSea_01 // You find yourself judging the craftsmanship of the ocean. It is solid work, very wet.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedTriangulusSea_00 // The surface breaks into sharp angles of light and dark as the craft rocks and turns.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedTriangulusSea_01 // Every direction looks the same until a wave proves you wrong by arriving from a new one.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedNorthernSea_00 // The water is darker here, and the sky feels bigger than it should.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedNorthernSea_01 // You watch distant clouds and wonder how many of them are looking at you right now.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedSub-ArcticSea_00 // Cold chop taps the hull in quick little knocks, like the sea wants to be let inside.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedSub-ArcticSea_01 // Ice flecks drift by like slow, indifferent confetti for your splashdown.
        KerbinSrfSplashedEasternSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedEasternSea_00 // Sunlight glitters across the waves in bright streaks that refuse to sit still for observation.
        KerbinSrfSplashedEasternSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedEasternSea_01 // You attempt a thoughtful stare into the distance and end up timing your blinks with the swell.
        KerbinSrfSplashedWesternSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedWesternSea_00 // The sea and sky blend into a wide band of blue-gray, broken only by the occasional whitecap.
        KerbinSrfSplashedWesternSea* = #JNSQscience_sspxVisualObservation_KerbinSrfSplashedWesternSea_01 // From this angle, Kerbin looks endless again, which is a neat trick for a planet you thought you knew.

        MunSrfLandedPoles* = #JNSQscience_sspxVisualObservation_MunSrfLandedPoles_00 // The sun hangs low over endless pale flats, throwing shadows that look sharper than they have any right to be.
        MunSrfLandedPoles* = #JNSQscience_sspxVisualObservation_MunSrfLandedPoles_01 // The horizon is a clean, cold arc. Kerbin sits above it like a promise you can’t cash yet.
        MunSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_MunSrfLandedHighlands_00 // The highlands roll by in dusty swells, like frozen waves that forgot how to stop.
        MunSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_MunSrfLandedHighlands_01 // From here, every ridge looks climbable until you remember you brought optimism, not traction.
        MunSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_MunSrfLandedMidlands_00 // The midlands are a patchwork of gentle slopes and shallow bowls, as if the Mun tried to be friendly once.
        MunSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_MunSrfLandedMidlands_01 // The terrain feels familiar for about three seconds, then the silence reminds you where you are.
        MunSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_MunSrfLandedLowlands_00 // The lowlands spread out like a landing pad the size of a continent.
        MunSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_MunSrfLandedLowlands_01 // You watch dust settle in slow motion and realize the Mun has all the time in the universe.
        MunSrfLandedPolarIceCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedPolarIceCraters_00 // Bright crater rims glare back at you, the inside walls etched with tiny, stubborn shadows.
        MunSrfLandedPolarIceCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedPolarIceCraters_01 // The crater floor looks deceptively smooth, like it’s waiting to trap a wheel for entertainment.
        MunSrfLandedExoticCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedExoticCraters_00 // The crater shapes here are odd and overlapping, as if the Mun kept changing its mind mid-impact.
        MunSrfLandedExoticCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedExoticCraters_01 // You try to pick the “best” crater to stare at, then notice there are too many to count.
        MunSrfLandedRareCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedRareCraters_00 // These scars are spaced out and dramatic, each one demanding to be the main feature.
        MunSrfLandedRareCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedRareCraters_01 // The rims look crisp, like the Mun is proud of its collection and keeps them polished.
        MunSrfLandedVoronoiCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedVoronoiCraters_00 // The surface breaks into a strange tiled pattern of pits and ridges, like a cracked ceramic plate.
        MunSrfLandedVoronoiCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedVoronoiCraters_01 // You can’t stop tracing the shapes with your eyes, as if there’s a secret map hidden in the geometry.
        MunSrfLandedNotableCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedNotableCraters_00 // Some craters have unmistakable character: sharp rims, deep shadows, and a look of permanent surprise.
        MunSrfLandedNotableCraters* = #JNSQscience_sspxVisualObservation_MunSrfLandedNotableCraters_01 // You find yourself naming them out loud, then remember the Mun does not do applause.
        MunSrfLandedMountains* = #JNSQscience_sspxVisualObservation_MunSrfLandedMountains_00 // Peaks rise out of the gray like broken teeth, daring you to pretend this is “just a moon.”
        MunSrfLandedMountains* = #JNSQscience_sspxVisualObservation_MunSrfLandedMountains_01 // The mountains make Kerbin look even farther away, which feels unfair given how close it is in the sky.

        MinmusSrfLandedPoles* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedPoles_00 // The green tint fades into pale frostiness near the poles, like Minmus is running out of color.
        MinmusSrfLandedPoles* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedPoles_01 // The land looks clean and crisp, as if someone scrubbed the whole biome with a mint brush.
        MinmusSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedLowlands_00 // Lowlands stretch out in gentle dips, an almost playful landscape pretending to be serious.
        MinmusSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedLowlands_01 // The horizon shimmers slightly, and for a moment you could swear the ground is looking back.
        MinmusSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedMidlands_00 // The midlands ripple with small rises and valleys, like a frozen sea of green sugar.
        MinmusSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedMidlands_01 // You keep expecting trees, rocks, anything—then remember Minmus is committed to minimalism.
        MinmusSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedHighlands_00 // High ground here feels like standing on the top of a very polite mountain.
        MinmusSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedHighlands_01 // From this height, the flats look like carefully poured paint, too smooth to be real.
        MinmusSrfLandedBasins* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBasins_00 // The basin floor is eerily level, like Minmus stamped it flat for your convenience.
        MinmusSrfLandedBasins* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBasins_01 // You watch the light slide across the surface and it looks more like a sheet than a landscape.
        MinmusSrfLandedBrownBasins* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownBasins_00 // The green gives way to a dusty brown, as if Minmus tried a new flavor and wasn’t sure about it.
        MinmusSrfLandedBrownBasins* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownBasins_01 // The flatness is still perfect, but the color makes it feel a bit more… secretive.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownLowlands_00 // Brown lowlands look warmer somehow, even though you know better.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownLowlands_01 // The gentle dips and slopes make it feel like you’re standing in a huge, quiet sandbox.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownMidlands_00 // The terrain shifts between brown ridges and shallow hollows in soft, orderly bands.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownMidlands_01 // You take notes on “subtle variations,” mostly because “it’s brown” feels unprofessional.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownHighlands_00 // The highlands are tinted brown and rugged enough to look like they’re trying to be taken seriously.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownHighlands_01 // From here, Kerbin looks like a bright marble, and you feel like you’re holding it at arm’s length.
        MinmusSrfLandedMountains* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedMountains_00 // Minmus mountains rise like small, stubborn wrinkles in an otherwise smooth world.
        MinmusSrfLandedMountains* = #JNSQscience_sspxVisualObservation_MinmusSrfLandedMountains_01 // The slopes look gentle until you spot the shadows and realize the “little hill” is still very much a hill.

        DunaSrfLandedIceCaps* = #JNSQscience_sspxVisualObservation_DunaSrfLandedIceCaps_00 // White frost and red dust fight over who gets to be the landscape today.
        DunaSrfLandedIceCaps* = #JNSQscience_sspxVisualObservation_DunaSrfLandedIceCaps_01 // The ice looks clean until a breeze paints it rusty. Even the cold parts are not safe from Duna.
        DunaSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_DunaSrfLandedHighlands_00 // The hills roll away in muted reds, like a world built from powdered bricks.
        DunaSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_DunaSrfLandedHighlands_01 // Every ridge has a sharp shadow. The thin air makes contrast feel personal.
        DunaSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_DunaSrfLandedMidlands_00 // The horizon is close, hazy, and stubbornly empty.
        DunaSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_DunaSrfLandedMidlands_01 // The ground looks almost walkable everywhere, which is exactly how it tricks you.
        DunaSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_DunaSrfLandedLowlands_00 // The lowlands spread out like a vast landing zone that never asked to be landed on.
        DunaSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_DunaSrfLandedLowlands_01 // Dust settles slowly, as if it is thinking about whether to stay on the ground or climb the hull.
        DunaSrfLandedCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedCraters_00 // Crater rims cut the plains into bowls and rings, like Duna keeps dropping the same tool.
        DunaSrfLandedCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedCraters_01 // You stare into the shadows and imagine how long they have been there, doing absolutely nothing.
        DunaSrfLandedRareCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedRareCraters_00 // A lone crater dominates the view, proud and inconvenient.
        DunaSrfLandedRareCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedRareCraters_01 // The rim looks crisp, like it happened yesterday. The rest of the planet disagrees.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedVoronoiCraters_00 // The surface breaks into strange tiled depressions, as if Duna tried to organize its damage.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedVoronoiCraters_01 // You trace the pattern with your eyes and start seeing shapes that probably are not messages.
        DunaSrfLandedNotableCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableCraters_00 // This crater has drama: steep walls, deep shadows, and a floor that looks suspiciously flat.
        DunaSrfLandedNotableCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableCraters_01 // It feels like a landmark, the kind explorers point at while pretending they are not lost.
        DunaSrfLandedExoticCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedExoticCraters_00 // The crater shapes overlap in odd ways, like the planet could not commit to a single impact.
        DunaSrfLandedExoticCraters* = #JNSQscience_sspxVisualObservation_DunaSrfLandedExoticCraters_01 // Nothing is symmetrical here, but it all looks deliberate enough to be unsettling.
        DunaSrfLandedTrenches* = #JNSQscience_sspxVisualObservation_DunaSrfLandedTrenches_00 // The land drops away into a long cut, a reminder that “flat” is just a local rumor.
        DunaSrfLandedTrenches* = #JNSQscience_sspxVisualObservation_DunaSrfLandedTrenches_01 // Shadows pool in the trench like spilled ink. You keep checking if it is moving.
        DunaSrfLandedNotablePlains* = #JNSQscience_sspxVisualObservation_DunaSrfLandedNotablePlains_00 // The plain stretches out in every direction, a red stage with no actors.
        DunaSrfLandedNotablePlains* = #JNSQscience_sspxVisualObservation_DunaSrfLandedNotablePlains_01 // The openness makes you feel watched, even though there is clearly nothing here to do the watching.
        DunaSrfLandedNotableMountains* = #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableMountains_00 // A few peaks stand out like punctuation marks on an otherwise quiet sentence.
        DunaSrfLandedNotableMountains* = #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableMountains_01 // They look climbable from here, which is the first sign you should not trust your eyes.
        DunaSrfLandedMountains* = #JNSQscience_sspxVisualObservation_DunaSrfLandedMountains_00 // Dark ridges rise against a pale sky, turning the horizon into jagged teeth.
        DunaSrfLandedMountains* = #JNSQscience_sspxVisualObservation_DunaSrfLandedMountains_01 // The view is spectacular, mostly because it keeps reminding you how thin the air is.
        DunaSrfLandedVolcano* = #JNSQscience_sspxVisualObservation_DunaSrfLandedVolcano_00 // The cone looks ancient and exhausted, as if it already did all its yelling long ago.
        DunaSrfLandedVolcano* = #JNSQscience_sspxVisualObservation_DunaSrfLandedVolcano_01 // The slopes are stained and rough. You get the feeling Duna is not finished being complicated.
        DunaFlyingHigh* = #JNSQscience_sspxVisualObservation_DunaFlyingHigh_00 // The thin air stains the sky a dusty peach, and the ground looks like it has been waiting a very long time.
        DunaFlyingHigh* = #JNSQscience_sspxVisualObservation_DunaFlyingHigh_01 // You can see scars that might be old riverbeds. Duna keeps its secrets in wide, quiet lines.

        IkeSrfLandedPoles* = #JNSQscience_sspxVisualObservation_IkeSrfLandedPoles_00 // The light is cold and flat, and Duna hangs in the sky like a red reminder of where you’re really headed.
        IkeSrfLandedMountains* = #JNSQscience_sspxVisualObservation_IkeSrfLandedMountains_00 // Dark ridges cut the horizon into teeth. The view is impressive, and the footing looks personally offended.
        IkeSrfLandedMidlands* = #JNSQscience_sspxVisualObservation_IkeSrfLandedMidlands_00 // Gray plains stretch out in quiet layers, as if Ike is trying very hard to be boring on purpose.
        IkeSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_IkeSrfLandedLowlands_00 // The low ground feels wide and empty, a perfect place to notice how loud your own breathing sounds.
        IkeSrfLandedHighlands* = #JNSQscience_sspxVisualObservation_IkeSrfLandedHighlands_00 // From the highlands, you can pick out distant craters and ridges with ease—nothing hides well on a world this stark.

        EdnaInSpaceLow* = #JNSQscience_sspxVisualObservation_EdnaInSpaceLow_00 // Edna hangs below like a dark coin in a sea of emptiness, quietly daring you to lose track of it.
        EdnaInSpaceHigh* = #JNSQscience_sspxVisualObservation_EdnaInSpaceHigh_00 // From far away, Edna is just a dim speck—still somehow the loneliest-looking thing in view.

        EdnaSrfLandedLowlands* = #JNSQscience_sspxVisualObservation_EdnaSrfLandedLowlands_00 // The low ground is a blanket of dark grit and long shadows, like the light is afraid to touch anything twice.
