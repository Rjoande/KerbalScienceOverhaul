@EXPERIMENT_DEFINITION:HAS[#id[bd_weather]]
{
	%RESULTS
	{
		KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_KerbinInSpaceLowNorthernIceShelf_00 // There's not much going on aside from cloud cover... Oh. That's ice, not clouds. Dang it!
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_KerbinInSpaceLowNorthernIceShelf_01 // That's a nasty snowstorm down there... Glad we're near the equator!
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_KerbinInSpaceLowNorthernIceShelf_02 // It sure looks cold down there. Glad we're not manning that research outpost!
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_KerbinInSpaceLowSouthernIceShelf_00 // Are those clouds? They are? Woohoo! SCIENCE!
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_KerbinInSpaceLowSouthernIceShelf_01 // That's a lot of ice. But not much else going on right now.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_KerbinInSpaceLowSouthernIceShelf_02 // Hey, did the ice shift from the last time we took pictures down here?
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowGrasslands_00 // The spring thunderstorms can get quite sizeable. We should warn people in the path of them.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowGrasslands_01 // So that's what a thunderstorm looks like from space! Oooh, was that lightning?
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowGrasslands_02 // What was that old saying about April showers? Yeah... it's about to rain, why do you ask?
        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowDeserts_00 // Not a cloud in sight.
        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowDeserts_01 // So that's what a sandstorm looks like from space.
        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowDeserts_02 // The clear skies don't tell you much, but you can guess it's going to be hot down there.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowBadlands_00 // That's a big thunderstorm. We might want to warn people nearby to watch out for flash floods.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowBadlands_01 // Winter cloud cover blankets the region below, preventing you from seeing anything else of value.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_weather_KerbinInSpaceLowBadlands_02 // The clear skies don't tell you much, but the terrain below sure looks rugged.
        KerbinInSpaceLowEasternSea* = #ScienceRefactor_bd_weather_KerbinInSpaceLowWater_00 // So that's what a hurricane looks like from space.
        KerbinInSpaceLowWesternSea* = #ScienceRefactor_bd_weather_KerbinInSpaceLowWater_01 // Uh-oh. That cyclone is headed for shore. We'd best warn everyone to get out of the way!
        KerbinInSpaceLowNorthernSea* = #ScienceRefactor_bd_weather_KerbinInSpaceLowWater_02 // The clear skies don't tell you much about the weather, but you can certainly see the wakes of passing ships below.

		EveInSpaceLowMountains* = #ScienceRefactor_bd_weather_EveInSpaceLowOlympus_00 // There's a mountain poking through the clouds!

		DunaInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_DunaInSpaceLowPoles_00 // What few clouds you do find over Duna seem to congregate around the poles. Perhaps something about the conditions at the poles is causing the clouds to form?
        DunaInSpaceLowExoticCraters* = #ScienceRefactor_bd_weather_DunaInSpaceLowPolarCraters_00 // Clouds or fog tend to fill the craters in the early morning, but they dissapate as the sun fully hits them.
        DunaInSpaceLowNotablePlains* = #ScienceRefactor_bd_weather_DunaInSpaceLowNortheastBasin_00 // There is the occasional bit of fog spotted swirling around in the southern reaches of the crater, but it never lasts long.
        DunaInSpaceLowNotablePlains* = #ScienceRefactor_bd_weather_DunaInSpaceLowSouthernBasin_00 // There is the occasional bit of fog spotted swirling around in the nothern reaches of the crater, but it never lasts long.
        DunaInSpaceLowNotableMountains* = #ScienceRefactor_bd_weather_DunaInSpaceLowNorthernShelf_00 // Clouds are frequently seen on the downwind side of the shelf... wait, is that snow there, too?
        
		LaytheInSpaceLowIceCaps* = #ScienceRefactor_bd_weather_LaytheInSpaceLowPoles_00 // There's not much weather here... only the occasional rainstorm turned snowstorm.
        LaytheInSpaceLowShores* = #ScienceRefactor_bd_weather_LaytheInSpaceLowDunes_00 // The steady winds of Laythe, combined with the low gravity, make for some massive sand dunes.
        LaytheInSpaceLowMountains* = #ScienceRefactor_bd_weather_LaytheInSpaceLowPeaks_00 // The peaks of Laythe are covered in snow and whipped by winds. Not a pleasant place to be, for sure.
    }
}