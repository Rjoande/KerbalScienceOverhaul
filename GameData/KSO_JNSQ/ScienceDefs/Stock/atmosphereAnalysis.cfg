        LaytheFlyingLowLowlands* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowLowlands_00 // Warm haze and heavy moisture load dominate the spectrum. The analyzer identifies breathable gases and then immediately starts complaining about clogged filters.
        LaytheFlyingLowLowlands* = #JNSQscience_atmosphereAnalysis_LaytheFlyingLowLowlands_01 // Chemical composition is stable, but the particulate profile is not—every gust brings a new blend of mist and grit. The instrument calls it “lowland soup.”
