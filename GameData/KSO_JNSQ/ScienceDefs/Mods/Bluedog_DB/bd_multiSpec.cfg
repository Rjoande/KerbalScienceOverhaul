		HuygenInSpaceHigh* = #JNSQscience_bd_multiSpec_HuygenInSpaceHigh_00 // From high orbit, Huygen’s amber haze dominates every channel and turns the surface into a rumor. The instrument insists there is detail down there, somewhere.
		HuygenInSpaceLowLowlands* = #JNSQscience_bd_multiSpec_HuygenInSpaceLowLowlands_00 // Through the haze, lowlands resolve as muted, heat-holding plains with gentle compositional shifts. The atmosphere makes everything look like it’s being viewed through syrup.
