// Camera experiment canonicalization priority:
// Bluedog_DB > Tantares > TantaresSP > UniversalStorage2
//
// Canon IDs:
// - Bluedog_DB:         bd_camera
// - Tantares:           tantares_visible_light_camera
// - TantaresSP:         tantares_sp_visible_light_camera
// - UniversalStorage2:  USCameraPicture


// --- Tier 1: Bluedog_DB present -> everything -> bd_camera
@PART:HAS[@MODULE:HAS[#experimentID[tantares_visible_light_camera]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_visible_light_camera]]
  { @experimentID = bd_camera }
}
@PART:HAS[@MODULE:HAS[#experimentID[tantares_sp_visible_light_camera]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_sp_visible_light_camera]]
  { @experimentID = bd_camera }
}
@PART:HAS[@MODULE:HAS[#experimentID[USCameraPicture]]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[USCameraPicture]]
  { @experimentID = bd_camera }
}

// remove duplicates under Bluedog_DB
!EXPERIMENT_DEFINITION:HAS[#id[tantares_visible_light_camera]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_visible_light_camera]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[USCameraPicture]]:NEEDS[Bluedog_DB]:FOR[zzz_ScienceRefactor] {}


// --- Tier 2: Tantares present, Bluedog_DB absent -> TantaresSP + US2 -> tantares_visible_light_camera
@PART:HAS[@MODULE:HAS[#experimentID[tantares_sp_visible_light_camera]]]:NEEDS[Tantares,!Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[tantares_sp_visible_light_camera]]
  { @experimentID = tantares_visible_light_camera }
}
@PART:HAS[@MODULE:HAS[#experimentID[USCameraPicture]]]:NEEDS[Tantares,!Bluedog_DB]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[USCameraPicture]]
  { @experimentID = tantares_visible_light_camera }
}

// remove duplicates under Tantares
!EXPERIMENT_DEFINITION:HAS[#id[tantares_sp_visible_light_camera]]:NEEDS[Tantares,!Bluedog_DB]:FOR[zzz_ScienceRefactor] {}
!EXPERIMENT_DEFINITION:HAS[#id[USCameraPicture]]:NEEDS[Tantares,!Bluedog_DB]:FOR[zzz_ScienceRefactor] {}


// --- Tier 3: TantaresSP present, Bluedog_DB+Tantares absent -> US2 -> tantares_sp_visible_light_camera
@PART:HAS[@MODULE:HAS[#experimentID[USCameraPicture]]]:NEEDS[UniversalStorage2,!Bluedog_DB,!Tantares]:FOR[zzz_ScienceRefactor]
{
  @MODULE:HAS[#experimentID[USCameraPicture]]
  { @experimentID = tantares_sp_visible_light_camera }
}

// remove duplicates under TantaresSP
!EXPERIMENT_DEFINITION:HAS[#id[USCameraPicture]]:NEEDS[UniversalStorage2,!Bluedog_DB,!Tantares]:FOR[zzz_ScienceRefactor] {}