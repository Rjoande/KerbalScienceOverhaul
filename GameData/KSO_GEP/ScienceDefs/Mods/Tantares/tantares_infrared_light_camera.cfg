@EXPERIMENT_DEFINITION:HAS[#id[tantares_infrared_light_camera]]
{
    %RESULTS
    {
        GrannusFlyingLow* = #GEPscience_tantares_infrared_light_camera_GrannusFlyingLow_00 // The infrared view is mostly “do not look directly at Grannus,” but you do spot warmer streaks sliding through the thin red haze.
        GrannusFlyingHigh* = #GEPscience_tantares_infrared_light_camera_GrannusFlyingHigh_00 // Above the ruddy glow, the camera keeps trying to measure “infinite hot.” You file it under “expected, but still alarming.”
        GrannusInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceHigh_00 // Even from high orbit, Grannus overwhelms the detector; you end up mapping the spacecraft’s own heat leaks instead.
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthPolarZone_00 // The polar zone looks slightly “less impossible” than the rest. You take what victories you can get this far from home.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthSubpolarZone_00 // The thermal gradient here shimmers like a living thing. Mission Control receives the data later, when “later” arrives.
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthTemperateZone_00 // The image is a careful balance between science and not setting the camera on fire. So far, science is winning.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowNorthTropicZone_00 // Heat ripples smear the picture into red velvet bands. You label it “tropics” and pretend you meant to do that.
        GrannusInSpaceLowEquatorialZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowEquatorialZone_00 // The equator is pure glare and fury; the only cool feature is the automatic shutter slamming shut in self-defense.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthTropicZone_00 // The camera resolves subtle texture in the glow, like currents made of light. You feel small, and then you log it.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthTemperateZone_00 // The thermal map settles into steady stripes. It’s oddly comforting, in a “giant star trying to cook you” way.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthSubpolarZone_00 // You catch fleeting cooler patches riding the turbulence. They’re gone before you can blink, but the recorder got them.
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_tantares_infrared_light_camera_GrannusInSpaceLowSouthPolarZone_00 // The far pole comes out crisp for a moment, then saturates again. You annotate: “briefly cooperative.”

        TaranisSrfLandedMagmaShores* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedMagmaShores_00 // The ground is hot enough to make your boots reconsider their career choices; the shoreline glows like a warning label.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedScorchedLowlands_00 // Even “lowlands” radiate heat like a stovetop left on. You quietly move your snack warmer somewhere else.
        TaranisSrfLandedMidlands* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedMidlands_00 // Dark patches cool faster than bright ones, painting the terrain in thermal camouflage under the dim red sun.
        TaranisSrfLandedHighlands* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedHighlands_00 // The high ground sheds heat into space like it’s eager to escape. You relate to that.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedDarkSideMidlands_00 // The infrared image is mostly cold silence, with occasional warm specks from your own equipment. Taranis does not forgive.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedDarkSideHighlands_00 // The dark-side highlands look brittle-cold; anything warm stands out immediately—especially you.
        TaranisSrfLandedPoles* = #GEPscience_tantares_infrared_light_camera_TaranisSrfLandedPoles_00 // The poles are a stark thermal “nope.” Your heater becomes the brightest feature in the whole panorama.
        TaranisSrfSplashedMagmaSea* = #GEPscience_tantares_infrared_light_camera_TaranisSrfSplashedMagmaSea_00 // The “sea” is a glaring sheet of molten brightness. You confirm it is, in fact, not suitable for swimming.
        TaranisSrfSplashedMagmaShores* = #GEPscience_tantares_infrared_light_camera_TaranisSrfSplashedMagmaShores_00 // The shoreline temperature gradient is sharp enough to draw with a ruler. You do, because you can’t touch it.
        TaranisInSpaceLowMagmaSea* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowMagmaSea_00 // From low orbit, the magma sea is a beacon in infrared, screaming “active.” The signal arrives home after a long, long wait.
        TaranisInSpaceLowMagmaShores* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowMagmaShores_00 // The shores trace a hot, jagged outline like a glowing coastline on a night map—except the night is permanent somewhere.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowScorchedLowlands_00 // The lowlands retain heat stubbornly, as if they’re hoarding it against the coming darkness.
        TaranisInSpaceLowMidlands* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowMidlands_00 // Patchy thermal textures hint at different rock types. The camera can’t tell you what they are, only that they’re angry.
        TaranisInSpaceLowHighlands* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowHighlands_00 // Highlands cool in broad plates, broken by warmer fractures. You flag the fractures and promise not to land on them.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowDarkSideMidlands_00 // The dark side is a cold sink with faint, wandering warm lines—likely thermal inertia, possibly your imagination.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowDarkSideHighlands_00 // The coldest regions turn the planet into a negative image: your spacecraft heat reflections become the landscape.
        TaranisInSpaceLowPoles* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceLowPoles_00 // The poles barely register above the background. The camera finally relaxes, then remembers the sunward side exists.
        TaranisInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_TaranisInSpaceHigh_00 // From high orbit, Taranis is a split personality: one hemisphere incandescent, the other nearly invisible in the cold.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedSunnyLowlands_00 // The sunward lowlands radiate like warmed metal; your shadow is the only thing that looks “cool” for once.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedSunnyHighlands_00 // The highlands glow with stored heat, and the camera finds hot edges where rock faces the endless day.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedTransitionalLowlands_00 // The twilight band shows gentle gradients and sharp surprises—warm pockets where heat clings and cold pockets where it doesn’t.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedTransitionalHighlands_00 // The transition-zone highlands show striping from slopes and ridges. You can almost see the day-night battle line.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedDarkSideLowlands_00 // The dark-side lowlands are brutally cold; your engine bells become the dominant thermal feature, which feels embarrassing.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedDarkSideHighlands_00 // The highlands on the dark side look like frozen stone teeth. The camera reports “very cold” in several enthusiastic formats.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedSoutheasternMountains_00 // The mountains trap and shed heat unevenly, making the thermal map look like wrinkled foil.
        ToutatisSrfLandedWesternMountains* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedWesternMountains_00 // Ridge shadows carve deep cold channels; you start to understand why this world feels like two planets stitched together.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_tantares_infrared_light_camera_ToutatisSrfLandedDarkSideMountains_00 // The mountains on the night side are almost the same temperature as space. You check the lens cap twice.
        ToutatisFlyingLow* = #GEPscience_tantares_infrared_light_camera_ToutatisFlyingLow_00 // The thin air does almost nothing for heat transfer, so the surface patterns stay sharp and unnervingly “close.”
        ToutatisFlyingHigh* = #GEPscience_tantares_infrared_light_camera_ToutatisFlyingHigh_00 // At altitude, the camera sees the terminator like a thermal cliff. You file a note: “don’t fall off it.”
        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowSunnyLowlands_00 // The sunlit lowlands blaze in infrared, outlining rough terrain by heat alone—useful, and slightly ominous at this distance.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowSunnyHighlands_00 // The highlands run hotter along sun-facing slopes; you can practically read the topography in temperature.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowTransitionalLowlands_00 // The transition band is full of subtle gradients, like the planet is trying to be reasonable and failing.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowTransitionalHighlands_00 // Thermal striping suggests sharp relief near the twilight zone. It’s the only place that looks remotely negotiable.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowDarkSideLowlands_00 // The nightside lowlands fade toward background cold; your spacecraft’s waste heat tries to photobomb the dataset.
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowDarkSideHighlands_00 // Cold highlands on the dark side sharpen into crisp silhouettes. The silence in the downlink is louder than usual.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowSoutheasternMountains_00 // The mountains show warm spines and cold valleys, a thermal fingerprint that screams “tidal lock.”
        ToutatisInSpaceLowWesternMountains* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowWesternMountains_00 // The western ranges hold heat in pockets, then dump it fast where the terrain drops away.
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceLowDarkSideMountains_00 // The dark-side mountains are near-black in infrared. You log it as “excellent for cooling,” then shiver.
        ToutatisInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_ToutatisInSpaceHigh_00 // From far up, Toutatis is a bright half and a dead half, with a thin twilight seam where the interesting questions live.

        NodensSrfLandedShores* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedShores_00 // The surf line shows up as a sharp thermal edge - warm water, cooler land, and one very warm camera operator.
        NodensSrfLandedTropicalLowlands* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTropicalLowlands_00 // The lowlands radiate all the day's heat back at you. The air is thick enough that even shadows feel warm.
        NodensSrfLandedTemperateLowlands* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTemperateLowlands_00 // Thermal contrast is subtle here; you end up calibrating the camera against your own helmet's hot spots.
        NodensSrfLandedTropicalMidlands* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTropicalMidlands_00 // Warm ridges and cooler gullies paint a topographic map in heat. The data packet will arrive... eventually.
        NodensSrfLandedTemperateMidlands* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTemperateMidlands_00 // The ground cools in neat patches, like different rocks are playing different games. The camera approves.
        NodensSrfLandedHighlands* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedHighlands_00 // The highlands dump heat fast into the thin upper air. Your lander, meanwhile, refuses to cool down at all.
        NodensSrfLandedTundra* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedTundra_00 // Cold ground, warmer wind, and a suspiciously warm toolbox. The camera helpfully identifies the toolbox as 'problem.'
        NodensSrfLandedIceCaps* = #GEPscience_tantares_infrared_light_camera_NodensSrfLandedIceCaps_00 // The ice is a dark void in infrared, broken only by your footprints and the lander's stubborn glow.
        NodensSrfSplashedSaltySeas* = #GEPscience_tantares_infrared_light_camera_NodensSrfSplashedSaltySeas_00 // The sea is a smooth thermal sheet with streaks of warmer current. You briefly wonder what else swims warm.
        NodensSrfSplashedFreshWater* = #GEPscience_tantares_infrared_light_camera_NodensSrfSplashedFreshWater_00 // Fresh water shows delicate temperature layers, like a planet-sized drink with too much ice. Mission Control asks for a sip.
        NodensSrfSplashedShores* = #GEPscience_tantares_infrared_light_camera_NodensSrfSplashedShores_00 // In the shallows, the heat map flickers with waves and sandbars. The camera insists this counts as 'dynamic geology.'
        NodensFlyingLow* = #GEPscience_tantares_infrared_light_camera_NodensFlyingLow_00 // Infrared turns the clouds into a warm, layered ceiling; the ocean below leaks heat through gaps like it's trying to signal us.
        NodensFlyingHigh* = #GEPscience_tantares_infrared_light_camera_NodensFlyingHigh_00 // At altitude, Nodens glows in broad, gentle bands - almost homey, until you remember the light delay on the radio.
        NodensInSpaceLowSaltySeas* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowSaltySeas_00 // The salty seas hold heat in broad pools, traced by cooler lines where currents meet. It looks alive, but it's just physics. Probably.
        NodensInSpaceLowFreshWater* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowFreshWater_00 // The lakes cool faster than the oceans, forming crisp, dark shapes. You can almost navigate by temperature alone.
        NodensInSpaceLowShores* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowShores_00 // Coastlines draw themselves in infrared: warm water, cool land, and a narrow, busy band of in-between.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowTropicalLowlands_00 // The tropics stay warm well into the night side. The camera suggests you could power a kettle with the ground.
        NodensInSpaceLowTemperateLowlands* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowTemperateLowlands_00 // Temperate plains show a tidy thermal quilt. It's oddly comforting under a star that looks wrong.
        NodensInSpaceLowTropicalMidlands* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowTropicalMidlands_00 // Midlands ridges glow like embers while valleys go dark. The contrast makes landing sites feel personal.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowTemperateMidlands_00 // Rock types reveal themselves as stripes of heat retention. You mark several 'interesting' and one 'probably lava.'
        NodensInSpaceLowHighlands* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowHighlands_00 // Highlands cool in sharp plates, with warm fractures webbing across them. The fractures get an enthusiastic checkmark.
        NodensInSpaceLowTundra* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowTundra_00 // The tundra is a cold smear with occasional warm vents - mostly from your spacecraft's reflection. Still counts.
        NodensInSpaceLowIceCaps* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceLowIceCaps_00 // The caps vanish into near-background cold. Anything warm stands out, including your antenna, which feels judged.
        NodensInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_NodensInSpaceHigh_00 // From high orbit, the night side outlines continents in leftover warmth. The terminator looks like a slow-moving burn line.

        BelisamaSrfLandedFlats* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedFlats_00 // The flats are uniformly cold, as if Belisama refuses to participate. Your landing legs provide the only excitement.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedTropicalLowlands_00 // Even the 'tropics' are cold here; the camera keeps double-checking its settings in quiet disbelief.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedTemperateLowlands_00 // Lowlands show faint warmth near sun-facing slopes. You label the brightest pixel 'hope.'
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedTropicalMidlands_00 // The midlands outline subtle ridges by heat retention alone. It's like reading braille with photons.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedTemperateMidlands_00 // Patchy thermal textures hint at mixed regolith. The radio delay makes every discovery feel like a message in a bottle.
        BelisamaSrfLandedHighlands* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedHighlands_00 // High ground bleeds heat straight into space. The camera reports 'very cold' with remarkable confidence.
        BelisamaSrfLandedPoles* = #GEPscience_tantares_infrared_light_camera_BelisamaSrfLandedPoles_00 // The poles are near-black in infrared; your rover's motor becomes a lighthouse. You promise it a shorter shift.
        BelisamaInSpaceLowFlats* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowFlats_00 // Low orbit shows the flats as a broad, cold plateau - perfect for thermal calibration and existential reflection.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowTropicalLowlands_00 // Slightly warmer patches hug the sub-Nodens side. Tidal locking leaves fingerprints in the heat map.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowTemperateLowlands_00 // The lowlands form a gentle thermal basin. Nothing moves, but the numbers still tell a story.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowTropicalMidlands_00 // Ridges glow a fraction brighter at local 'noon.' You can almost feel the slow rhythm of two locked worlds.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowTemperateMidlands_00 // Thermal striping follows terrain more than latitude. Belisama doesn't do 'normal' seasons out here.
        BelisamaInSpaceLowHighlands* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowHighlands_00 // Highlands cool in clean, sharp boundaries. The camera makes it look like a world carved from cold metal.
        BelisamaInSpaceLowPoles* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceLowPoles_00 // Polar regions fade into background cold. The only warm line is your orbit track's own waste heat reflection.
        BelisamaInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_BelisamaInSpaceHigh_00 // From high above, Belisama is a cold coin beside Nodens' warmer glow - two worlds locked in an endless stare.

        SucellusSrfLandedBasins* = #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedBasins_00 // The basins trap what little warmth there is, making shallow bowls of 'less cold.' You take what you can get.
        SucellusSrfLandedLowlands* = #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedLowlands_00 // Lowlands show uneven heat retention, like the ground is hiding different materials just under the dust.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedTropicalMidlands_00 // Midlands ridges cool fast, leaving warmer seams that might be metal-rich. The camera perks up; the drill perks up later.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedTemperateMidlands_00 // The thermal map looks mottled and impatient. Radiation warnings pop up, as if to hurry you along.
        SucellusSrfLandedHighlands* = #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedHighlands_00 // Highlands radiate straight into space; your lander becomes the warmest landmark for kilometers. Subtle, it is not.
        SucellusSrfLandedPoles* = #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedPoles_00 // The poles are brutally cold and strangely bright in noise. You blame charged particles and keep the lens cap handy.
        SucellusInSpaceLowBasins* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceLowBasins_00 // From low orbit, basins show as broad, darker patches - cool sinks that collect shadows and lost heat.
        SucellusInSpaceLowLowlands* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceLowLowlands_00 // Lowlands display sharp thermal borders that don't match the terrain. You suspect composition, and your budget suspects mining.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceLowTropicalMidlands_00 // Warm streaks trace old fracture lines. If Sucellus has riches, they're writing their address in infrared.
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceLowTemperateMidlands_00 // The midlands form a patchwork of heat retention, like someone spilled different rocks across the surface.
        SucellusInSpaceLowHighlands* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceLowHighlands_00 // Highlands cool in crisp plates with warm veins between. The pattern looks engineered, but it's just geology being smug.
        SucellusInSpaceLowPoles* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceLowPoles_00 // Polar regions barely rise above background cold. The camera still catches occasional flashes - likely your own reflections, hopefully.
        SucellusInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_SucellusInSpaceHigh_00 // High over Sucellus, infrared finds a cold rock with bright pinpricks - your own hotspots and maybe something metallic catching sunlight.

        CaireenSrfLandedLowlands* = #GEPscience_tantares_infrared_light_camera_CaireenSrfLandedLowlands_00 // The lowlands are a cold sponge of dust and rock. Your lander's shadow is indistinguishable from the ground - unsettling.
        CaireenSrfLandedMidlands* = #GEPscience_tantares_infrared_light_camera_CaireenSrfLandedMidlands_00 // Thermal contrast is all microterrain: boulders warm, regolith cool. The camera turns rubble into a map.
        CaireenSrfLandedHighlands* = #GEPscience_tantares_infrared_light_camera_CaireenSrfLandedHighlands_00 // The highlands cool instantly, like they never agreed to be warm in the first place. You respect the commitment.
        CaireenSrfLandedPoles* = #GEPscience_tantares_infrared_light_camera_CaireenSrfLandedPoles_00 // The poles read as deep cold with occasional static spikes. You file it under 'space is noisy out here.'
        CaireenInSpaceLowLowlands* = #GEPscience_tantares_infrared_light_camera_CaireenInSpaceLowLowlands_00 // Low orbit reveals the lowlands as smooth, cold pools between rougher warm rock. Captured or not, it has character.
        CaireenInSpaceLowMidlands* = #GEPscience_tantares_infrared_light_camera_CaireenInSpaceLowMidlands_00 // The midlands sparkle with tiny warm points - sunlit stones - and your own heat glare. Distinguishing them feels like a prank.
        CaireenInSpaceLowHighlands* = #GEPscience_tantares_infrared_light_camera_CaireenInSpaceLowHighlands_00 // Highlands show crisp, cold ridges and warmer boulder fields. You mark the boulders as 'avoid' and 'interesting' simultaneously.
        CaireenInSpaceLowPoles* = #GEPscience_tantares_infrared_light_camera_CaireenInSpaceLowPoles_00 // Polar areas fade toward background cold. Caireen practically disappears unless you squint at the numbers.
        CaireenInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_CaireenInSpaceHigh_00 // From high orbit, Caireen is mostly 'cold pebble.' The only warmth is your craft, stubbornly refusing to blend in.

        SironaFlyingLow* = #GEPscience_tantares_infrared_light_camera_SironaFlyingLow_00 // The infrared feed turns into a sea of warm swirls and colder upwellings. The red sun feels far away even through all this atmosphere.
        SironaFlyingHigh* = #GEPscience_tantares_infrared_light_camera_SironaFlyingHigh_00 // From high in the haze, Sirona’s banding becomes a thermal barcode. The downlink delay makes it feel like you’re watching yesterday happen.
        SironaInSpaceHigh* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceHigh_00 // At this distance, Sirona is mostly “too bright” and “too big.” You end up mapping your own radiator glow against her reflected red light.
        SironaInSpaceLowDarkTropicalBands* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowDarkTropicalBands_00 // The dark tropical bands hold their heat in wide, slow currents. It looks calm until you remember it’s a gas giant.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowLightTropicalBands_00 // The lighter tropics read warmer than expected, like a thin blanket over deeper motion. The camera auto-gains and sighs.
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowDarkTemperateBands_00 // Temperate dark bands show crisp thermal gradients, as if the atmosphere has neatly labeled its own layers for you.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowLightTemperateBands_00 // The light temperate bands smear into gentle warmth with sharp cool seams. You tag the seams and promise not to fly into them.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowDarkPolarBands_00 // The polar dark bands are a cold sink with faint warm streaks threading through. The data feels distant in a way numbers usually don’t.
        SironaInSpaceLowLightPolarBands* = #GEPscience_tantares_infrared_light_camera_SironaInSpaceLowLightPolarBands_00 // The light polar bands flicker between “cold” and “colder,” with brief warm flashes from turbulence. You mark them as “interesting and alarming.”

        AirmedSrfLandedTropicalLowlands* = #GEPscience_tantares_infrared_light_camera_AirmedSrfLandedTropicalLowlands_00 // The lowlands radiate in uneven patches, like the ground can’t decide whether to keep heat or give it to space.
