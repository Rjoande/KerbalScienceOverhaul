        #JNSQscience_bd_multiSpec_HamekInSpaceLowPoles_00 = Il terreno polare risulta più freddo con ritorni luminosi a chiazze che restano fermi tra più passaggi. Qualunque cosa ci sia lassù, è decisa a restare misteriosa.
        #JNSQscience_bd_multiSpec_NaraInSpaceHigh_00 = Da un'orbita alta, Nara è un globo tenue avvolto da una foschia pallida. Le bande concordano soprattutto su una cosa: è enorme, freddo e sta nascondendo i dettagli apposta.
