@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS
    {
        DresInSpaceLow* = #CinematicPack_Expanse_crewReport_DresInSpaceLow_00 // You look down at Dres and think it would make a great depot, once someone figures out how to stop “temporary” from becoming “permanent.”
        DresInSpaceLow* = #CinematicPack_Expanse_crewReport_DresInSpaceLow_01 // The thrusters puff in short, stingy bursts. Reaction mass is treated like water: measured, recycled, and argued over.

        DresInSpaceHigh* = #CinematicPack_Expanse_crewReport_DresInSpaceHigh_00 // From up here Dres is a pale dot with a long commute attached. The life-support readouts feel like the most important view.
        DresInSpaceHigh* = #CinematicPack_Expanse_crewReport_DresInSpaceHigh_01 // You catch yourself planning the next shipment: air filters, spare seals, and anything that can be repurposed twice before it breaks.

        DresSrfLanded* = #CinematicPack_Expanse_crewReport_DresSrfLanded_00 // Low gravity makes every step feel like working a shift on a trampoline. You recommend handrails before someone “accidentally” achieves orbit.
        DresSrfLanded* = #CinematicPack_Expanse_crewReport_DresSrfLanded_01 // The cabin smells like warmed insulation and recycled air. The crew debates whether the first real habitat is a module, a trench, or “just keep living in the lander.”
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        DresInSpaceLow* = #CinematicPack_Expanse_evaReport_DresInSpaceLow_00 // You hook a tether out of habit. The reel ticks like a metronome for “don’t drift, don’t waste.”
        DresInSpaceLow* = #CinematicPack_Expanse_evaReport_DresInSpaceLow_01 // Every puff of the suit jets feels like spending somebody’s air. You decide to move like you’re on a schedule.

        DresInSpaceHigh* = #CinematicPack_Expanse_evaReport_DresInSpaceHigh_00 // Dres is a pale rock with a lot of empty around it. The emptiness feels like the real terrain.
        DresInSpaceHigh* = #CinematicPack_Expanse_evaReport_DresInSpaceHigh_01 // You check your O2 again, then again. Out here, the suit is the only station you can count on.

        DresSrfLanded* = #CinematicPack_Expanse_evaReport_DresSrfLanded_00 // You do a gentle hop and immediately regret it. Low gravity is fun until you remember how far “up” is.
        DresSrfLanded* = #CinematicPack_Expanse_evaReport_DresSrfLanded_01 // The dust clings to everything like it owns the place. You start thinking in terms of seals, filters, and how long “temporary” can last.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_cosmicRay]]
{
    %RESULTS
    {
        DresInSpaceLow* = #CinematicPack_Expanse_bd_cosmicRay_DresInSpaceLow_00 // Cosmic ray counts spike as you skim above Dres. No field, no air, just raw flux. Someone notes that out here, “weather” comes through the hull.
		DresInSpaceHigh* = #CinematicPack_Expanse_bd_cosmicRay_DresInSpaceHigh_00 // The detector ticks like a bad metronome in the deep black around Dres. You file the numbers under “long-haul habitation problems” and try not to think about what “adaptation” might mean.
		DresSrfLanded* = #CinematicPack_Expanse_bd_cosmicRay_DresSrfLanded_00 // On the surface, the regolith buys you a little shielding and the count rate finally settles down. You start drafting a plan: thicker walls, buried modules, and a genetics lab nobody has to admit they wanted.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]
{
    %RESULTS
    {
        EveInSpaceHigh* = #CinematicPack_Expanse_mysteryGoo_EveInSpaceHigh_00 // Mission Control calls this a “safe orbit.” The crew calls it “quarantine range.” The sealed canisters stay strapped down, and the checklist has more “DO NOT OPEN” than “observe.”
        EveInSpaceHigh* = #CinematicPack_Expanse_mysteryGoo_EveInSpaceHigh_01 // The Goo draws itself into a tight, glossy purple skin and presses against the container like it’s trying to fall down faster. You add a note: “If disposal is suggested, pretend you didn’t hear it.”
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]
{
    %RESULTS
    {
        TyloSrfLanded* = #CinematicPack_Expanse_surfaceSample_TyloSrfLanded_00 // The sample is pale, dry, and stubbornly ordinary. You log it anyway—what matters is whether it can be turned into air, water, shielding, or brick.
        TyloSrfLanded* = #CinematicPack_Expanse_surfaceSample_TyloSrfLanded_01 // You bag the regolith like it’s inventory, not treasure. Notes focus on processing temps, contaminants, and how much habitat it could buy per ton.
        TyloSrfLanded* = #CinematicPack_Expanse_surfaceSample_TyloSrfLanded_02 // You sift the regolith and imagine planters instead of sample bags. If any tidal-driven heating or buried volcanism is leaking trace minerals upward, it might be the difference between “dust” and “soil.”
        TyloSrfLanded* = #CinematicPack_Expanse_surfaceSample_TyloSrfLanded_03 // The chemistry is stingy, but not hopeless. You flag the sample for nutrient assays—because if this can be coaxed into growing anything, it changes Tylo from “outpost” to “home.”
        TyloSrfLanded* = #CinematicPack_Expanse_surfaceSample_TyloSrfLanded_04 // You run a quick nutrient check and laugh at the result. As soil, it’s useless—but as a sterile substrate in a closed loop? Maybe. If you can afford the water.
        TyloSrfLanded* = #CinematicPack_Expanse_surfaceSample_TyloSrfLanded_05 // The regolith is sharp, dry, and chemically uninviting. You note that crops won’t grow in it—they’ll grow around it, under lamps, fed by tanks, with Tylo dirt only holding things in place.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_drill]]
{
    %RESULTS
    {
        TyloSrfLanded* = #CinematicPack_Expanse_bd_drill_TyloSrfLanded_00 // The drill bites through the dust into a crusty, salt-streaked layer. Deeper down, the core comes up with darker flecks that the lab flags as “interesting organics” and “please keep sealed.”
        TyloSrfLanded* = #CinematicPack_Expanse_bd_drill_TyloSrfLanded_01 // A few centimeters in, the cuttings change from pale grit to damp-ish clumps that smell faintly of old filters. You log “salts + complex carbon traces” and recommend a dedicated containment bin for the next sample run.
        TyloSrfLanded* = #CinematicPack_Expanse_bd_drill_TyloSrfLanded_02 // The drill chews through powdery dust, then bites into a crust that comes up faintly yellow. The analyzer flags salts-rich fines. Tylo’s “sterile” ground is hiding a chemical personality.
        TyloSrfLanded* = #CinematicPack_Expanse_bd_drill_TyloSrfLanded_03 // Your core sample has layers: gray dust on top, then a gritty band loaded with carbon compounds. The notes immediately drift from “geology” to “industry”: binders, processing feedstock, and what you can build if you can dig.
    }
}

