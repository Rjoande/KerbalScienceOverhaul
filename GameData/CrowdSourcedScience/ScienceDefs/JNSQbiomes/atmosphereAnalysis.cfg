@EXPERIMENT_DEFINITION:HAS[#id[atmosphereAnalysis]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        EveSrfLandedPetrolLakes* = #CSS_atmosphereAnalysis_EveSrfLandedCraterLake_00 // You ask KSC to move whichever technician contaminated the sensor with paint scrubber to the experimental rocket testing program.
        EveSrfLandedMountains* = #CSS_atmosphereAnalysis_EveSrfLandedOlympus_00 // On the top of the world, you're still not up high enough for the gases to separate yet.
        EveSrfLandedMountains* = #CSS_atmosphereAnalysis_EveSrfLandedOlympus_01 // Still just as nasty as ever. Why can't these mountains be tall enough to get into the good bits?
        EveSrfLandedShores* = #CSS_atmosphereAnalysis_EveSrfLandedShallows_00 // Some of the mysterious chemicals that comprise explodium drift through the air near the coast.
        EveFlyingLowPetrolLakes* = #CSS_atmosphereAnalysis_EveFlyingLowCraterLake_00 // The composition of this "explodium" must be highly dense, since whatever it is doesn't leave the surface.
        EveFlyingLowMountains* = #CSS_atmosphereAnalysis_EveFlyingLowOlympus_00 // A few minute traces of elements made by interactions between the atmosphere and the solar wind trickle down through the clouds.
        EveFlyingLowShores* = #CSS_atmosphereAnalysis_EveFlyingLowShallows_00 // The monitor flickers as the heat, pressure and acidity take their toll on the analyser. Fortunately, it remains operational.
        EveFlyingHigPetrolLakes* = #CSS_atmosphereAnalysis_EveFlyingHighCraterLake_00 // Up at the top of the atmosphere, the carbon dioxide gradually gives way to nitrogen.
        EveFlyingHighMountains* = #CSS_atmosphereAnalysis_EveFlyingHighOlympus_00 // A cocktail of strange molecules are being detected as complex compounds are constantly formed and broken apart in the upper atmosphere.
        EveFlyingHighShores* = #CSS_atmosphereAnalysis_EveFlyingHighShallows_00 // One upshot of Eve's atmosphere being so thick is that the analyser has plenty to work with, even all the way up here. We don't actually have to go downstairs to know how nasty it is.

        KerbinSrfLandedMidlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedGrasslands_00 // There's lots of gaseous nitrogen and methane here - clear evidence of both greenery and cows to eat it.
        KerbinSrfLandedMidlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedGrasslands_01 // You decide to do one better and smell the air yourself. Ah, smells like home.
        KerbinSrfLandedAridMidlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedDeserts_00 // It's very hot and dry out in the desert. The sensors are getting clogged up with dust.
        KerbinSrfLandedAridMidlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedDeserts_01 // This would be a great place to work on your tan.
        KerbinSrfLandedAridMidlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedDeserts_02 // This can't be right, the sensor is detecting the atmosphere as solid! Oh wait, it's just dust-clogged again.
        KerbinSrfLandedAridHighlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedBadlands_00 // The sensor complains about a mosquito dive-bombing it. Apparently it's carrying malaria.
        KerbinSrfLandedAridHighlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedBadlands_01 // It's not so bad here. You wonder what all the fuss was about.
        KerbinSrfLandedAridHighlands* = #CSS_atmosphereAnalysis_KerbinSrfLandedBadlands_02 // The Gooey puddle you just stepped in appears to be eating through the material of your spacesuit. Better get back to the ship before the atmosphere outside is the same as inside your spacesuit.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedNorthernIceShelf_00 // The air is mostly cold and dry, with a hint of freezing sea breeze.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedNorthernIceShelf_01 // An unexpected squall of polar air hits the craft, and fills the analyser with ice crystals.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedSouthernIceShelf_02 // No hint of any complex organic molecules. Just air and ice crystals.
        KerbinSrfLandedIceCaps* = #CSS_atmosphereAnalysis_KerbinSrfLandedSouthernIceShelf_03 // The freezing polar wind whistles past the craft as the sensor scoops it up. You're glad you're not out there.
        KerbinFlyingLowMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowGrasslands_00 // The atmosphere seems calm and peaceful here. Readings are nominal.
        KerbinFlyingLowMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowGrasslands_01 // Ah so this is what a life-supporting atmosphere is supposed to look like.
        KerbinFlyingLowAridMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowDeserts_00 // You find that the air is much drier over the desert.
        KerbinFlyingLowAridMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowDeserts_01 // Very little signs of precipitation. No wonder the place looks so thirsty.
        KerbinFlyingLowAridHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowBadlands_00 // The sensor records a sulfurous rotten egg smell in the atmosphere. So this is why they call it the Badlands.
        KerbinFlyingLowAridHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingLowBadlands_01 // Atmospheric analysis of the surrounding air makes you very glad that you brought your spacesuit.
        KerbinFlyingLowIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingLowNorthernIceShelf_00 // There are strong traces of windblown snow kicked up by the powerful winds that blow over the icy flats.
        KerbinFlyingLowIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingLowNorthernIceShelf_01 // At least in the absence of hills you don't have to pay attention to very much while the gadget does its thing.
        KerbinFlyingLowIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingLowSouthernIceShelf_00 // Water content of the air is low, despite the large amounts of frozen water not far below.
        KerbinFlyingLowIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingLowSouthernIceShelf_01 // You wonder how cold it would need to be for you to hold a pot out the window and scoop the air up like a solid.
        KerbinFlyingHighMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighGrasslands_00 // As you read the atmospheric analysis report you glance down at the surface below. The gentle undulating motion of the breeze through the grass makes you feel sleepy.
        KerbinFlyingHighMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighGrasslands_01 // You let the atmospheric sensor do its thing. You don't anticipate any earth-shaking discoveries.
        KerbinFlyingHighAridMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighDeserts_00 // The sensor reads 0 humidity. In fact it looks like the needle is bent as the gauge tries to register negative numbers.
        KerbinFlyingHighAridMidlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighDeserts_01 // The humidity readings make you want to take off your spacesuit and lather yourself in lotion.
        KerbinFlyingHighAridHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighBadlands_00 // Analysis of the Badlands' atmosphere makes it difficult to believe that you're still on Kerbin.
        KerbinFlyingHighAridHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighBadlands_01 // Glancing nervously at the sensor's readouts, you sincerely hope that Mission Control doesn't tell you to go lower.
        KerbinFlyingHighAridHighlands* = #CSS_atmosphereAnalysis_KerbinFlyingHighBadlands_02 // Ozone, check. Carbon Monoxide, check. Hydro-fluorocarbons, check. Yep, we're in the Badlands.
        KerbinFlyingHighIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingHighNorthernIceShelf_00 // The ice has petered out by now, but there's still enough moisture in the air to glaze the sensor in ice.
        KerbinFlyingHighIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingHighNorthernIceShelf_01 // The gas mix high above the ice plains seems much the same as over the equator.
        KerbinFlyingHighIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingHighSouthernIceShelf_00 // Legends of wispy, shimmering clouds have been drifting around the polar kerbal communities for millennia. Turns out they are real, and made of ice crystals.
        KerbinFlyingHighIceCaps* = #CSS_atmosphereAnalysis_KerbinFlyingHighSouthernIceShelf_01 // The high-altitude polar vortex brings cold, dry, thin air from other parts of the poles, mixing their individual gas signatures.

        DunaSrfLandedIceCaps* = #CSS_atmosphereAnalysis_DunaSrfLandedPoles_00 // The water ice crystals here contain levels of deuterium several times higher than on Kerbin.
        DunaSrfLandedNotablePlains* = #CSS_atmosphereAnalysis_DunaSrfLandedNorthernBasin_00 // The dust is quite coarse here, and the gas mixtures are fairly Duna-standard.
        DunaSrfLandedNotablePlains* = #CSS_atmosphereAnalysis_DunaSrfLandedSouthernBasin_01 // Here the dust of the lowlands mixes with ice crystals blowing off the ice caps, creating reddish snow.
        DunaSrfLandedNotableMountains* = #CSS_atmosphereAnalysis_DunaSrfLandedNorthernShelf_00 // The winds blowing down the canyon from the north carry with them the faintest traces of ice crystals.
        DunaSrfLandedNotableMountains* = #CSS_atmosphereAnalysis_DunaSrfLandedNorthernShelf_01 // The detector finds a tiny wisp of krypton-then it's gone. Superkerbal better stay away.
        DunaSrfLandedNotableMountains* = #CSS_atmosphereAnalysis_DunaSrfLandedPolarHighlands_01 // The sensor registers the large amount of windblown ice crystals and lower dust count.
        DunaSrfLandedTrenches* = #CSS_atmosphereAnalysis_DunaSrfLandedMidlandCanyon_00 // The fine dust here means the analyser actually records the atmospheric composition for once without being filled with sand...let's see...lots of CO2, some Ar and N2...and not much else.
        DunaSrfLandedTrenches* = #CSS_atmosphereAnalysis_DunaSrfLandedEasternCanyon_01 // There seems to be LOT more dust down here in the thicker canyon air, which acts as a dust sink for the surrounding hills.
        DunaFlyingHighTrenches* = #CSS_atmosphereAnalysis_DunaFlyingHighWesternCanyon_00 // The computer asks you rather crossly why you're making it analyse a vacuum. Seems the air really is thin up here.
        DunaSrfLandedExoticCraters* = #CSS_atmosphereAnalysis_DunaSrfLandedPolarCraters_00 // Lots of airborne ices-analysis reports they consist of varying ratios of hydroxic acid and carbonic anhydride. Sounds scary.
        DunaFlyingLowIceCaps* = #CSS_atmosphereAnalysis_DunaFlyingLowPoles_00 // Gas geysers firing below fill the atmosphere with dust and ice.
        DunaFlyingLowNotablePlains* = #CSS_atmosphereAnalysis_DunaFlyingLowNorthernBasin_00 // The dust seems to stay low to the ground here, as there's not much off it off the ground.
        DunaFlyingLowNotablePlains* = #CSS_atmosphereAnalysis_DunaFlyingLowSouthernBasin_00 // The ice crystals appear to stay closer to the ground, up in the air it's mostly dust. And CO2. And N2. And Ar.
        DunaFlyingLowNotableMountains* = #CSS_atmosphereAnalysis_DunaFlyingLowNorthernShelf_00 // The analyser bleeps loudly over the noise of the wind, signifying the completion of its analysis.
        DunaFlyingLowNotableMountains* = #CSS_atmosphereAnalysis_DunaFlyingLowNorthernShelf_01 // The air here looks normal, if a little thicker thanks to the low altitude. And it's still really dusty.
        DunaFlyingLowNotableMountains* = #CSS_atmosphereAnalysis_DunaFlyingLowPolarHighlands_00 // Much of the atmosphere is particles that've blown off the surface. That, or we forgot to clean the sensor before departure.
        DunaFlyingLowTrenches* = #CSS_atmosphereAnalysis_DunaFlyingLowMidlandCanyon_00 // Faint traces of ice crystals are detected, perhaps being carried into the canyon by the Northern Shelf winds?
        DunaFlyingLowTrenches* = #CSS_atmosphereAnalysis_DunaFlyingLowEasternCanyon_00 // Wow, that's a lot of dust down below. So much, it's still detectable in the air above.
        DunaFlyingLowTrenches* = #CSS_atmosphereAnalysis_DunaFlyingLowWesternCanyon_00 // No significant traces of water vapour up here. Or on the ground. Or anywhere else on Duna, for that matter.
        DunaFlyingLowExoticCraters* = #CSS_atmosphereAnalysis_DunaFlyingLowPolarCraters_00 // The wind picks up, and a cloud of water and carbon dioxide ice crystals fills the air.
        DunaFlyingHighIceCaps* = #CSS_atmosphereAnalysis_DunaFlyingHighPoles_00 // A sharp spike in airborne ice crystals is detected as you fly through one of Duna's wispy polar clouds.
        DunaFlyingHighNotablePlains* = #CSS_atmosphereAnalysis_DunaFlyingHighNorthernBasin_00 // You have to crank the sensitivity on the detector all the way up to get any readings in the extra-thin air.
        DunaFlyingHighNotablePlains* = #CSS_atmosphereAnalysis_DunaFlyingHighSouthernBasin_00 // Climate cells and northerly air currents ensure no ice is detected up here.
        DunaFlyingHigNotableMountains* = #CSS_atmosphereAnalysis_DunaFlyingHighNorthernShelf_00 // The Northern Shelf and its influence on the atmosphere is far below you.
        DunaFlyingHighNotableMountains* = #CSS_atmosphereAnalysis_DunaFlyingHighNorthernShelf_01 // A dust particle that gets caught in the sensor turns out to be from the Northern Basin-is this evidence of global air currents?
        DunaFlyingHighNotableMountains* = #CSS_atmosphereAnalysis_DunaFlyingHighPolarHighlands_00 // The atmosphere here seems the same as it is anywhere else.
        DunaFlyingHighTrenches* = #CSS_atmosphereAnalysis_DunaFlyingHighMidlandCanyon_00 // Now, the one time dust isn't an issue, the analyser blows a fuse and stops working anyway. Poxy thing.
        DunaFlyingHighTrenches* = #CSS_atmosphereAnalysis_DunaFlyingHighEasternCanyon_00 // The canyon is so large, it even causes the streams of upper-atmosphere dust and denser gases to sink into it.
        DunaFlyingHighTrenches* = #CSS_atmosphereAnalysis_DunaFlyingHighWesternCanyon_00 // The computer asks you rather crossly why you're making it analyse a vacuum. Seems the air really is thin up here.
        DunaFlyingHighExoticCraters* = #CSS_atmosphereAnalysis_DunaFlyingHighPolarCraters_00 // The inlet on the analyser develops a layer of frost in the lower regions of the upper atmosphere. Curious, considering it didn't have any water on it.

        LaytheSrfLandedIceCaps* = #CSS_atmosphereAnalysis_LaytheSrfLandedPoles_00 // There's definitely some oxygen in the atmosphere, but not much. Hypoxia would set in after only a few minutes without a respirator.
        LaytheSrfLandedHighlands* = #CSS_atmosphereAnalysis_LaytheSrfLandedDunes_00 // The air is thinner here than on the mountain peaks!
        LaytheFlyingLowIceCaps* = #CSS_atmosphereAnalysis_LaytheFlyingLowPoles_00 // Black smoke, currants, cappuccino, and a hint of buttery beef.
        LaytheFlyingLowHighlands* = #CSS_atmosphereAnalysis_LaytheFlyingLowDunes_00 // The atmosphere appears to be made up of oxygen and nitrogen. You wonder at the high chlorine content, though.
        LaytheFlyingHighIceCaps* = #CSS_atmosphereAnalysis_LaytheFlyingHighPoles_00 // The instruments detect hydrogen escaping into space. It would seem that the source of oxygen on Laythe is photo-dissociation of its water, and not photosynthesis.
        LaytheFlyingHighHighlands* = #CSS_atmosphereAnalysis_LaytheFlyingHighDunes_00 // The atmosphere reminds you of Kerbin; although, you wonder where all the nitrogen came from.
    }
}