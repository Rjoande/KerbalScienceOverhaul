        #GEPscience_bd_ionElec_CaireenInSpaceHigh_00 = Mostly silence, punctuated by sharp little bursts. You can practically hear the red sun tapping on the hull from very far away.
        #GEPscience_bd_ionElec_SironaFlyingHigh_00 = The ion sensor pegs instantly; charge layers, lightning, and crushing air all argue at once. The plots arrive later, still crackling with static.
        #GEPscience_bd_ionElec_SironaInSpaceLow_00 = Sirona’s extreme field turns nearby space into a humming cage of particles. The instrument starts counting faster than the comms can complain.
        #GEPscience_bd_ionElec_SironaInSpaceHigh_00 = Even out here, the plasma flow bends and snaps in slow motion under the red sun. “High orbit” feels like standing near a distant power line.
        #GEPscience_bd_ionElec_AirmedInSpaceLow_00 = Airmed has no air to ionize, but the surrounding particle storm doesn’t care. The sensor records sharp spikes that make the silence feel crowded.
