@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    %RESULTS:NEEDS[!GEP]
    {
        LaytheFlyingLow* = #DSS_Solaris_crewReport_LaytheFlyingLow_00 // The waves below march in neat rows that ignore the wind. The instruments are calm; the crew is not.
        LaytheFlyingLow* = #DSS_Solaris_crewReport_LaytheFlyingLow_01 // You bank to follow the whitecaps, but they drift a heartbeat behind the craft. Mission Control suggests “less poetry, more headings.”
        LaytheFlyingLow* = #DSS_Solaris_crewReport_LaytheFlyingLow_02 // Spray flashes like mirrors, but your reflection inside them turns its helmet a moment late. You log it as “optical illusion (probably).”

        LaytheFlyingHigh* = #DSS_Solaris_crewReport_LaytheFlyingHigh_00 // From the clouds, Laythe looks like the training simulator set to “Kerbin.” Then the storm cells blink in a pattern that isn’t weather.
        LaytheFlyingHigh* = #DSS_Solaris_crewReport_LaytheFlyingHigh_01 // Sunlight on the sea makes a perfect glint that follows the ship even when you turn away. The camera insists nothing is wrong.
        LaytheFlyingHigh* = #DSS_Solaris_crewReport_LaytheFlyingHigh_02 // The craft’s shadow slides over the ocean and seems to hesitate at the edges. You check the clock, then pretend you didn’t.

        LaytheInSpaceLow* = #DSS_Solaris_crewReport_LaytheInSpaceLow_00 // Orbit feels comfortable until you notice the day-night line is too clean, like someone drew it with a ruler.
        LaytheInSpaceLow* = #DSS_Solaris_crewReport_LaytheInSpaceLow_01 // The sea reflects Jool as a green smear, then the smear snaps into place, like it remembered to behave. You do not mention this on the radio.
        LaytheInSpaceLow* = #DSS_Solaris_crewReport_LaytheInSpaceLow_02 // Systems report “nominal.” The crew report “being observed by a large body of water.” Both are filed under “nominal.”

        LaytheInSpaceHigh* = #DSS_Solaris_crewReport_LaytheInSpaceHigh_00 // Laythe is a pale blue bead, almost friendly. It stays centered in the window a little too easily as you drift.
        LaytheInSpaceHigh* = #DSS_Solaris_crewReport_LaytheInSpaceHigh_01 // The ocean’s shine pulses slowly. Not with rotation, but with something that feels like attention. Mission Control asks for numbers; you give them silence.
        LaytheInSpaceHigh* = #DSS_Solaris_crewReport_LaytheInSpaceHigh_02 // You start to compare Laythe to home for morale, then stop. Similarities are easy; the differences feel deliberate.
    }

    %RESULTS:NEEDS[GEP]
    {
        NodensFlyingLow* = #DSS_Solaris_crewReport_LaytheFlyingLow_00 // The waves below march in neat rows that ignore the wind. The instruments are calm; the crew is not.
        NodensFlyingLow* = #DSS_Solaris_crewReport_LaytheFlyingLow_01 // You bank to follow the whitecaps, but they drift a heartbeat behind the craft. Mission Control suggests “less poetry, more headings.”
        NodensFlyingLow* = #DSS_Solaris_crewReport_LaytheFlyingLow_02 // Spray flashes like mirrors, but your reflection inside them turns its helmet a moment late. You log it as “optical illusion (probably).”

        NodensFlyingHigh* = #DSS_Solaris_crewReport_NodensFlyingHigh_00 // From the clouds, Nodens looks like the training simulator set to “Kerbin.” Then the storm cells blink in a pattern that isn’t weather.
        NodensFlyingHigh* = #DSS_Solaris_crewReport_LaytheFlyingHigh_01 // Sunlight on the sea makes a perfect glint that follows the ship even when you turn away. The camera insists nothing is wrong.
        NodensFlyingHigh* = #DSS_Solaris_crewReport_LaytheFlyingHigh_02 // The craft’s shadow slides over the ocean and seems to hesitate at the edges. You check the clock, then pretend you didn’t.

        NodensInSpaceLow* = #DSS_Solaris_crewReport_LaytheInSpaceLow_00 // Orbit feels comfortable until you notice the day-night line is too clean, like someone drew it with a ruler.
        NodensInSpaceLow* = #DSS_Solaris_crewReport_NodensInSpaceLow_01 // The sea reflects Grannus as a red smear, then the smear snaps into place, like it remembered to behave. You do not mention this on the radio.
        NodensInSpaceLow* = #DSS_Solaris_crewReport_LaytheInSpaceLow_02 // Systems report “nominal.” The crew report “being observed by a large body of water.” Both are filed under “nominal.”

        NodensInSpaceHigh* = #DSS_Solaris_crewReport_NodensInSpaceHigh_00 // Nodens is a pale blue bead, almost friendly. It stays centered in the window a little too easily as you drift.
        LaytheInSpaceHigh* = #DSS_Solaris_crewReport_LaytheInSpaceHigh_01 // The ocean’s shine pulses slowly. Not with rotation, but with something that feels like attention. Mission Control asks for numbers; you give them silence.
        NodensInSpaceHigh* = #DSS_Solaris_crewReport_NodensInSpaceHigh_02 // You start to compare Nodens to home for morale, then stop. Similarities are easy; the differences feel deliberate.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS:NEEDS[!GEP]
    {
        LaytheSrfLanded* = #DSS_Solaris_evaReport_LaytheSrfLanded_00 // You step onto Laythe’s ground and immediately feel like you’ve done this before. The suit logs “nominal,” while the ocean stares back.
        LaytheSrfLanded* = #DSS_Solaris_evaReport_LaytheSrfLanded_01 // Your visor catches a clean reflection in a shallow puddle. It copies your movements with a tiny delay, like it’s waiting for approval.
        LaytheSrfLanded* = #DSS_Solaris_evaReport_LaytheSrfLanded_02 // The wind says one thing, the waves do another. You plant a flag anyway, then notice the surf keeps time with your suit’s pumps.
    }

    %RESULTS:NEEDS[GEP]
    {
        NodensSrfLanded* = #DSS_Solaris_evaReport_NodensSrfLanded_00 // You step onto Nodens’s ground and immediately feel like you’ve done this before. The suit logs “nominal,” while the ocean stares back.
        NodensSrfLanded* = #DSS_Solaris_evaReport_LaytheSrfLanded_01 // Your visor catches a clean reflection in a shallow puddle. It copies your movements with a tiny delay, like it’s waiting for approval.
        NodensSrfLanded* = #DSS_Solaris_evaReport_LaytheSrfLanded_02 // The wind says one thing, the waves do another. You plant a flag anyway, then notice the surf keeps time with your suit’s pumps.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_camera]]
{
    %RESULTS:NEEDS[!GEP]
    {
        LaytheSrfLanded* = #DSS_Solaris_bd_camera_LaytheSrfLanded_00 // You shoot a careful panorama of the shoreline. In the preview, the ocean’s reflection shows something behind you that definitely isn’t there.
        LaytheSrfLanded* = #DSS_Solaris_bd_camera_LaytheSrfLanded_01 // Every photo looks normal until you compare timestamps. The camera insists you pressed the shutter a moment later than you remember.
        LaytheSrfSplashed* = #DSS_Solaris_bd_camera_LaytheSrfSplashed_00 // A surface shot of the waves comes back impossibly crisp. Crisper than what your visor can see. The water seems to be doing the focusing.
        LaytheSrfSplashed* = #DSS_Solaris_bd_camera_LaytheSrfSplashed_01 // Your lens catches a bright glint that doesn’t move with the sun angle. It tracks the camera like it’s trying to stay in frame.
        LaytheFlyingLow* = #DSS_Solaris_bd_camera_LaytheFlyingLow_00 // Low-altitude footage shows whitecaps lining up into tidy rows that ignore the wind. The motion looks staged, but the sea is not taking direction.
        LaytheFlyingLow* = #DSS_Solaris_bd_camera_LaytheFlyingLow_01 // You record spray off the crests. On playback, droplets drift upwind for several frames, then “remember” gravity and fall.
        LaytheFlyingHigh* = #DSS_Solaris_bd_camera_LaytheFlyingHigh_00 // From high altitude, cloud shadows slide the wrong way across the water. The stills are perfect; the scene is not.
        LaytheFlyingHigh* = #DSS_Solaris_bd_camera_LaytheFlyingHigh_01 // The autofocus keeps snapping to a blank patch of ocean, as if it’s a point of interest. You didn’t select a target.
        LaytheInSpaceLow* = #DSS_Solaris_bd_camera_LaytheInSpaceLow_00 // Orbital images show the specular highlight following your track, staying centered like a polite audience member.
        LaytheInSpaceLow* = #DSS_Solaris_bd_camera_LaytheInSpaceLow_01 // You try a long exposure of the night side. The sea returns faint, regular streaks. Too evenly spaced to be waves, too soft to be lights.
        LaytheInSpaceHigh* = #DSS_Solaris_bd_camera_LaytheInSpaceHigh_00 // Whole-disk photos look comforting until you stack them. Laythe’s features drift by a fraction, as if the planet is slightly out of sync with itself.
        LaytheInSpaceHigh* = #DSS_Solaris_bd_camera_LaytheInSpaceHigh_01 // The camera captures a clean, calm blue world. Then compression artifacts form a neat ring around the oceans, like the surface is outlining itself.
    }

    %RESULTS:NEEDS[GEP]
    {
        NodensSrfLanded* = #DSS_Solaris_bd_camera_LaytheSrfLanded_00 // You shoot a careful panorama of the shoreline. In the preview, the ocean’s reflection shows something behind you that definitely isn’t there.
        NodensSrfLanded* = #DSS_Solaris_bd_camera_LaytheSrfLanded_01 // Every photo looks normal until you compare timestamps. The camera insists you pressed the shutter a moment later than you remember.
        NodensSrfSplashed* = #DSS_Solaris_bd_camera_LaytheSrfSplashed_00 // A surface shot of the waves comes back impossibly crisp. Crisper than what your visor can see. The water seems to be doing the focusing.
        NodensSrfSplashed* = #DSS_Solaris_bd_camera_LaytheSrfSplashed_01 // Your lens catches a bright glint that doesn’t move with the sun angle. It tracks the camera like it’s trying to stay in frame.
        NodensFlyingLow* = #DSS_Solaris_bd_camera_LaytheFlyingLow_00 // Low-altitude footage shows whitecaps lining up into tidy rows that ignore the wind. The motion looks staged, but the sea is not taking direction.
        NodensFlyingLow* = #DSS_Solaris_bd_camera_LaytheFlyingLow_01 // You record spray off the crests. On playback, droplets drift upwind for several frames, then “remember” gravity and fall.
        NodensFlyingHigh* = #DSS_Solaris_bd_camera_LaytheFlyingHigh_00 // From high altitude, cloud shadows slide the wrong way across the water. The stills are perfect; the scene is not.
        NodensFlyingHigh* = #DSS_Solaris_bd_camera_LaytheFlyingHigh_01 // The autofocus keeps snapping to a blank patch of ocean, as if it’s a point of interest. You didn’t select a target.
        NodensInSpaceLow* = #DSS_Solaris_bd_camera_LaytheInSpaceLow_00 // Orbital images show the specular highlight following your track, staying centered like a polite audience member.
        NodensInSpaceLow* = #DSS_Solaris_bd_camera_LaytheInSpaceLow_01 // You try a long exposure of the night side. The sea returns faint, regular streaks. Too evenly spaced to be waves, too soft to be lights.
        NodensInSpaceHigh* = #DSS_Solaris_bd_camera_NodensInSpaceHigh_00 // Whole-disk photos look comforting until you stack them. Nodens’s features drift by a fraction, as if the planet is slightly out of sync with itself.
        NodensInSpaceHigh* = #DSS_Solaris_bd_camera_LaytheInSpaceHigh_01 // The camera captures a clean, calm blue world. Then compression artifacts form a neat ring around the oceans, like the surface is outlining itself.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS:NEEDS[!GEP]
    {
        LaytheInSpaceLow* = #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_00 // The receiver reports a clean, carrier-stable signal at multiple bands. It has no modulation, no source… and it follows your orbit perfectly.
        LaytheInSpaceLow* = #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_01 // You pick up faint echoes of your own transmissions, but the timing is wrong. Each reply arrives a fraction late, like the ocean is thinking before answering.
        LaytheInSpaceLow* = #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_02 // Background traffic looks normal until you subtract the noise floor. What remains is a slow, deliberate pulse that matches neither rotation nor known beacons.
    }

    %RESULTS:NEEDS[GEP]
    {
        NodensInSpaceLow* = #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_00 // The receiver reports a clean, carrier-stable signal at multiple bands. It has no modulation, no source… and it follows your orbit perfectly.
        NodensInSpaceLow* = #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_01 // You pick up faint echoes of your own transmissions, but the timing is wrong. Each reply arrives a fraction late, like the ocean is thinking before answering.
        NodensInSpaceLow* = #DSS_Solaris_bd_SIGINT_LaytheInSpaceLow_02 // Background traffic looks normal until you subtract the noise floor. What remains is a slow, deliberate pulse that matches neither rotation nor known beacons.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_weather]]
{
    %RESULTS:NEEDS[!GEP]
    {
        LaytheInSpaceLow* = #DSS_Solaris_bd_weather_LaytheInSpaceLow_00 // Cloud tops arrange themselves into tidy arcs that ignore the jet streams. The model calls it “stable,” but nothing about it looks accidental.
        LaytheInSpaceLow* = #DSS_Solaris_bd_weather_LaytheInSpaceLow_01 // You watch a storm cell split in two, then rejoin along the same seam a minute later. The sensor log reads “typical convective behavior.”
        LaytheInSpaceLow* = #DSS_Solaris_bd_weather_LaytheInSpaceLow_02 // A long, thin cloud band follows the terminator like a drawn line, adjusting speed to stay in place. The forecast insists it is simply “persisting.”
    }

    %RESULTS:NEEDS[GEP]
    {
        NodensInSpaceLow* = #DSS_Solaris_bd_weather_LaytheInSpaceLow_00 // Cloud tops arrange themselves into tidy arcs that ignore the jet streams. The model calls it “stable,” but nothing about it looks accidental.
        NodensInSpaceLow* = #DSS_Solaris_bd_weather_LaytheInSpaceLow_01 // You watch a storm cell split in two, then rejoin along the same seam a minute later. The sensor log reads “typical convective behavior.”
        NodensInSpaceLow* = #DSS_Solaris_bd_weather_LaytheInSpaceLow_02 // A long, thin cloud band follows the terminator like a drawn line, adjusting speed to stay in place. The forecast insists it is simply “persisting.”
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[MCE]]
{
    %RESULTS:NEEDS[!GEP]
    {
        LaytheInSpaceLow* = #DSS_Solaris_MCE_LaytheInSpaceLow_00 // The integrated suite stitches every sensor into a tidy orbital profile. Everything is “within limits,” but the channels twitch together whenever the ocean-facing track comes around.
        LaytheInSpaceLow* = #DSS_Solaris_MCE_LaytheInSpaceLow_01 // You run a complete sweep and the report looks textbook-clean. Then you notice the “random” noise repeats each orbit with the same spacing, like the data set is being politely rehearsed.
    }

    %RESULTS:NEEDS[GEP]
    {
        NodensInSpaceLow* = #DSS_Solaris_MCE_LaytheInSpaceLow_00 // The integrated suite stitches every sensor into a tidy orbital profile. Everything is “within limits,” but the channels twitch together whenever the ocean-facing track comes around.
        NodensInSpaceLow* = #DSS_Solaris_MCE_LaytheInSpaceLow_01 // You run a complete sweep and the report looks textbook-clean. Then you notice the “random” noise repeats each orbit with the same spacing, like the data set is being politely rehearsed.
