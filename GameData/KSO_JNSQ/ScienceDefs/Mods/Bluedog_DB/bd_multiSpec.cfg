		AdenInSpaceLowMountains* = #JNSQscience_bd_multiSpec_AdenInSpaceLowMountains_00 // Sharp shadows and steep slopes create noisy edges in several bands, but the ridges still trace clearly in infrared. The terrain looks like it was designed to snag landing legs.
