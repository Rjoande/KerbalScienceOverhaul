@EXPERIMENT_DEFINITION:HAS[#id[bd_ALSEP_LRRR]]
{
    %RESULTS
    {
        MohoSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_MohoSrfLanded_00 // You fire a pulse at the reflector and get it right back, crisp and clean. The numbers are excellent, which is suspicious on a planet this close to Kerbol.
        EveSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_EveSrfLanded_00 // The beam fights through the purple soup and still manages to find its way home. The return signal smells faintly of overconfidence.
        GillySrfLanded* = #JNSQscience_bd_ALSEP_LRRR_GillySrfLanded_00 // The reflector tries to recoil off the surface when the laser hits it, so you hold it down with a rock and a promise. The range data is so small you check twice to make sure you didn’t accidentally ping your own boot.
        DunaSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_DunaSrfLanded_00 // The thin air barely cares about the laser, but the dust does. The return pulse looks like it took a detour through a sandblaster.
        IkeSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_IkeSrfLanded_00 // The reflector answers promptly, but the numbers wobble as Ike pretends to be a sphere.
        EdnaSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_EdnaSrfLanded_00 // You fire the pulse and have time to reconsider your life choices before it returns.
        DakSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_DakSrfLanded_00 // The reflector tries to leave with the first ping, so you anchor it with pegs and stubbornness.
        DresSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_DresSrfLanded_00 // The signal comes back clean in the quiet.
        LaytheSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_LaytheSrfLanded_00 // The pulse takes its long trip through the Jool system and returns faint but coherent. The timing uncertainty is dominated by everything between here and home, not the reflector.
        VallSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_VallSrfLanded_00 // The return signal arrives clean and narrow, as if the cold helps keep the measurement honest. Even tiny shifts in position become noticeable at this range.
        TyloSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_TyloSrfLanded_00 // The reflector sits immovable under Tylo’s heavy pull, giving an unusually stable baseline. The long-distance solution locks in with a confidence you rarely see this far out.
        BopSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_BopSrfLanded_00 // The round-trip time is consistent, but the fit keeps needing extra terms for Bop’s irregular motion. At this distance, small wobbles stop being small.
        PolSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_PolSrfLanded_00 // The pulse comes back stretched and dim, but the pattern is unmistakable. The numbers underline the scale: the measurement is mostly empty space, carefully accounted for.
        KrelSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_KrelSrfLanded_00 // The return pulse is steady but the solution needs constant correction for Krel’s tight, fast motion around its parent. At this distance, the orbit shows up as a timing signature, not a diagram.
        AdenSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_AdenSrfLanded_00 // The reflector returns a clean pulse, yet tiny tilts in the surface mount drift into the numbers over long baselines. You end up measuring the ground’s patience as much as the range.
        HuygenSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_HuygenSrfLanded_00 // The thick haze turns each shot into a slightly different path, smearing the return by a little more than you would like. With enough repeats, the underlying distance still resolves with stubborn clarity.
        RigaSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_RigaSrfLanded_00 // The signal comes back narrow and consistent, with only a faint shimmer from the near-vacuum air. The dominant uncertainty is simply how much empty space you are asking a clock to count.
        TalosSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_TalosSrfLanded_00 // The pulse takes a long time to return, and the delay feels like a physical thing you have to manage. When the fit finally converges, it’s a reminder that the hardest part is staying synchronized with home.
        EelooSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_EelooSrfLanded_00 // The return pulse is faint, but the timing peak is unmistakable. Out here, most of the measurement is just counting empty space accurately.
        CelesSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_CelesSrfLanded_00 // The signal comes back with a narrow, steady profile, as if the cold keeps the optics honest. The range solution converges slowly, then locks in with quiet precision.
        TamSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_TamSrfLanded_00 // Keeping the reflector aligned is harder than firing the laser; Tam’s weak pull makes every tiny shift matter. Once it settles, the round-trip time draws a clean line across a very large distance.
        HamekSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_HamekSrfLanded_00 // The return is dim and stretched by geometry and sheer range, but repeat shots stack into a consistent answer. The numbers read like a map made of time delays.
        NaraSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_NaraSrfLanded_00 // The beam has to fight its way through a dense, cold atmosphere before it can even begin the long count home. The return is broadened by refraction, but the timing still resolves into a precise, distant baseline.
        AmosSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_AmosSrfLanded_00 // The reflector answers cleanly, yet the range solution keeps picking up subtle motion from Amos’ tight relationship with Nara. Over this distance, even small orbital tugs become measurable in the round-trip time.
        EnonSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_EnonSrfLanded_00 // The return pulse is sharp and consistent against the quiet background. With little to disturb the path, the challenge is simply maintaining synchronization across a very long span of space.
        PraxSrfLanded* = #JNSQscience_bd_ALSEP_LRRR_PraxSrfLanded_00 // The signal comes back faint but repeatable, each shot stacking into the same distant answer. The measurement feels less like “here to there” and more like a careful audit of empty space.
    }
}