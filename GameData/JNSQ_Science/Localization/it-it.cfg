        #JNSQscience_bd_poke_HuygenSrfLandedMountains_00 = Copertura sottile e granulosa, poi un arresto improvviso: la lettura schizza come se avesse colpito una piastra sepolta.
        #JNSQscience_bd_poke_HuygenSrfLandedPeaks_00 = L'asta entra appena prima di incontrare roccia: registri il risultato come "prestazioni di picco".
