@EXPERIMENT_DEFINITION:HAS[#id[bd_bioexp]]
{
    %RESULTS
    {
        GrannusFlyingLow* = #GEPscience_bd_bioexp_GrannusFlyingLow_00 // Inside the heat-shielded habitat, the frogs float in slow, confused loops while the windows glow a tired red.
        GrannusFlyingLow* = #GEPscience_bd_bioexp_GrannusFlyingLow_01 // Mission Control asks for a status report; by the time the reply arrives, the frogs have decided 'up' is a suggestion.
        GrannusFlyingHigh* = #GEPscience_bd_bioexp_GrannusFlyingHigh_00 // The dim red light never quite changes, so the frogs start croaking on a schedule only they understand.
        GrannusFlyingHigh* = #GEPscience_bd_bioexp_GrannusFlyingHigh_01 // Radiation ticks up, temperature alarms tick up, and the frogs remain professionally unimpressed.
        GrannusInSpaceLow* = #GEPscience_bd_bioexp_GrannusInSpaceLow_00 // In low orbit the star fills half the view; the frogs press against the tank wall like they’re trying to hide behind it.
        GrannusInSpaceLow* = #GEPscience_bd_bioexp_GrannusInSpaceLow_01 // Microgravity is easy to study when your subjects keep doing perfect, tiny somersaults.
        GrannusInSpaceHigh* = #GEPscience_bd_bioexp_GrannusInSpaceHigh_00 // Out here the star is smaller and the silence is bigger; the frogs get very quiet, and so do you.
        GrannusInSpaceHigh* = #GEPscience_bd_bioexp_GrannusInSpaceHigh_01 // The data suggests stress responses correlate strongly with communications delay and weakly with your singing.
        TaranisSrfLandedMagmaShores* = #GEPscience_bd_bioexp_TaranisSrfLandedMagmaShores_00 // The frogs cling to the shaded side of the tank while the outside world flickers like a furnace at the edge of the window.

        TaranisSrfLandedMagmaShores* = #GEPscience_bd_bioexp_TaranisSrfLandedMagmaShores_00 // Humidity control works overtime; the frogs keep trying to 'burrow' into anything that looks cooler than the air.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_bioexp_TaranisSrfLandedScorchedLowlands_00 // The frogs darken their skin under the red glare, as if they’re trying to become a smaller target.
        TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_bioexp_TaranisSrfLandedScorchedLowlands_01 // Every hop in low gravity is a leap of faith; thankfully, the habitat floor has very forgiving walls.
        TaranisSrfLandedMidlands* = #GEPscience_bd_bioexp_TaranisSrfLandedMidlands_00 // The frogs settle into a cautious routine: eat, float, stare at the timer, repeat.
        TaranisSrfLandedMidlands* = #GEPscience_bd_bioexp_TaranisSrfLandedMidlands_01 // They react more to the sudden dimming at local sunset than to any of the scientific prodding.
        TaranisSrfLandedHighlands* = #GEPscience_bd_bioexp_TaranisSrfLandedHighlands_00 // Even sealed inside, the temperature gradient across the habitat is noticeable; the frogs pick the 'least awful' corner and declare it home.
        TaranisSrfLandedHighlands* = #GEPscience_bd_bioexp_TaranisSrfLandedHighlands_01 // Observations show reduced activity cycles, possibly due to the strange day-night cues under a red sun.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideMidlands_00 // On the dark side, the only daylight is instrument glow; the frogs follow your headlamp like it’s the entire sky.
        TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideMidlands_01 // With nothing outside but black rock and distant red, the frogs’ sleep cycle becomes mostly naps and judgment.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideHighlands_00 // The frogs cling low and still, as if the long shadows outside might reach in.
        TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_bioexp_TaranisSrfLandedDarkSideHighlands_01 // Sudden thermal swings make the tank heater cycle rapidly; the frogs respond by refusing to move unless bribed with snacks.
        TaranisSrfLandedPoles* = #GEPscience_bd_bioexp_TaranisSrfLandedPoles_00 // The habitat heater keeps the frogs comfortable, but the window view looks like it forgot what 'morning' means.
        TaranisSrfLandedPoles* = #GEPscience_bd_bioexp_TaranisSrfLandedPoles_01 // Data shows increased huddling behavior; you log it as 'teamwork' to make the report sound nicer.
        TaranisSrfSplashedMagmaSea* = #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaSea_00 // The frogs insist on remaining in the tank and file a formal complaint about your definition of 'sea'.
        TaranisSrfSplashedMagmaSea* = #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaSea_01 // Buoyancy tests are postponed indefinitely; the frogs are happy with microgravity instead of whatever is outside.
        TaranisSrfSplashedMagmaShores* = #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaShores_00 // Between the glowing waves and the red sky, the frogs can't decide which direction to be alarmed in.
        TaranisSrfSplashedMagmaShores* = #GEPscience_bd_bioexp_TaranisSrfSplashedMagmaShores_01 // The life-support filters pick up odd traces; the frogs respond by attempting to climb the tank walls in unison.
        TaranisInSpaceLow* = #GEPscience_bd_bioexp_TaranisInSpaceLow_00 // Low orbit passes alternately over blazing day and deep night; the frogs start reacting to eclipses like they’re jump-scares.
        TaranisInSpaceLow* = #GEPscience_bd_bioexp_TaranisInSpaceLow_01 // Your notes say 'microgravity amphibian behavior stable' and then, in smaller writing, 'mostly'.
        TaranisInSpaceHigh* = #GEPscience_bd_bioexp_TaranisInSpaceHigh_00 // High orbit feels like drifting above a warning label; the frogs become quieter whenever the radiation counter chatters.
        TaranisInSpaceHigh* = #GEPscience_bd_bioexp_TaranisInSpaceHigh_01 // The long comm delay makes even routine check-ins feel like sending postcards; the frogs do not sign theirs.

        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyLowlands_00 // The thin air outside does nothing to soften the light; the frogs squint at the red glare like it offended them personally.
        ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyLowlands_01 // Activity increases when you dim the cabin lights, suggesting the frogs prefer 'not staring into a furnace' conditions.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyHighlands_00 // In higher terrain, the habitat creaks softly as it equalizes; the frogs pause, listen, and then resume floating as if nothing happened.
        ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedSunnyHighlands_01 // Their movement becomes more deliberate, likely reacting to higher gravity and a very unhelpful horizon.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalLowlands_00 // Here the lighting shifts subtly as the planet turns; the frogs keep adjusting, never quite convinced it's daytime.
        ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalLowlands_01 // Stress markers drop when the outside view includes both shadow and red glow, as if the compromise feels safer.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalHighlands_00 // The frogs choose the tank side facing the dimmer sky and refuse to explain their methodology.
        ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedTransitionalHighlands_01 // Periodic gusts rattle the lander; the frogs respond by inflating their throats in a tiny show of bravery.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideLowlands_00 // On the dark side, the only 'sunrise' is a faint red rim; the frogs stop croaking and start staring.
        ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideLowlands_01 // The experiment log notes increased stillness; your personal log notes increased imagination.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideHighlands_00 // Cold windows and thin atmosphere make the habitat feel like a well-insulated tin can; the frogs huddle anyway.
        ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideHighlands_01 // When you switch on external lights, the frogs immediately try to treat them as a new moon.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_bioexp_ToutatisSrfLandedSoutheasternMountains_00 // The terrain outside is jagged enough to look sharp; the frogs remain safely rounded and unbothered.
        ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_bioexp_ToutatisSrfLandedSoutheasternMountains_01 // Observations show reduced jumping and more careful climbing, as if even they respect the slopes.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_bioexp_ToutatisSrfLandedWesternMountains_00 // The red sun hangs low and long in this region, stretching shadows until they feel like extra terrain features.
        ToutatisSrfLandedWesternMountains* = #GEPscience_bd_bioexp_ToutatisSrfLandedWesternMountains_01 // The frogs’ feeding schedule drifts with the light cues; Mission Control suggests labeling it 'adaptive behavior'.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideMountains_00 // The outside is black rock against black sky; the frogs respond by becoming very interested in your checklist instead.
        ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_bioexp_ToutatisSrfLandedDarkSideMountains_01 // Low-level vibration from settling equipment triggers a chorus of tiny croaks that echo oddly in the cabin.
        ToutatisFlyingLow* = #GEPscience_bd_bioexp_ToutatisFlyingLow_00 // In the lower air, turbulence taps the capsule like impatient fingers; the frogs float, then drift, then pretend this is normal.
        ToutatisFlyingLow* = #GEPscience_bd_bioexp_ToutatisFlyingLow_01 // Every time the red sky brightens, the frogs press close to the tank wall, as if bracing for a delayed sunrise.
        ToutatisFlyingHigh* = #GEPscience_bd_bioexp_ToutatisFlyingHigh_00 // Up here the atmosphere is barely a rumor; the frogs handle it better than your antennas do.
        ToutatisFlyingHigh* = #GEPscience_bd_bioexp_ToutatisFlyingHigh_01 // Long, slow rolls of the craft make the frogs spin gently—excellent data, slightly nauseating for the observer.
        ToutatisInSpaceLow* = #GEPscience_bd_bioexp_ToutatisInSpaceLow_00 // Low orbit reveals sharp day-night boundaries; the frogs react to each terminator crossing with synchronized blinking.
        ToutatisInSpaceLow* = #GEPscience_bd_bioexp_ToutatisInSpaceLow_01 // Microgravity posture stabilizes after a few orbits, while your sense of time remains stuck back at home.
        ToutatisInSpaceHigh* = #GEPscience_bd_bioexp_ToutatisInSpaceHigh_00 // High orbit feels like watching a world from across a quiet room; the frogs become less active as the radio delay grows.
        ToutatisInSpaceHigh* = #GEPscience_bd_bioexp_ToutatisInSpaceHigh_01 // The data suggests the frogs can sleep through almost anything, including your attempts at encouragement.

        NodensSrfLandedShores* = #GEPscience_bd_bioexp_NodensSrfLandedShores_00 // The shoreline air is heavy and red-tinted; the frogs watch the waves and decide staying in the tank is an excellent life choice.
        NodensSrfLandedShores* = #GEPscience_bd_bioexp_NodensSrfLandedShores_01 // Filters log “salt aerosol present.” The frogs log “unimpressed,” mostly by staring at you.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_bioexp_NodensSrfLandedTropicalLowlands_00 // Warm, wet air and unfamiliar crimson daylight make the frogs active… until they realize “night” doesn’t look any different.
        NodensSrfLandedTropicalLowlands* = #GEPscience_bd_bioexp_NodensSrfLandedTropicalLowlands_01 // The habitat dehumidifier works overtime; the frogs treat the condensation as a new sport.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_bioexp_NodensSrfLandedTemperateLowlands_00 // Everything outside looks like late evening under a red lamp; the frogs adjust by doing nothing and judging quietly.
        NodensSrfLandedTemperateLowlands* = #GEPscience_bd_bioexp_NodensSrfLandedTemperateLowlands_01 // Activity cycles drift a little each day; Mission Control suggests it’s “adaptation,” not “confusion.”
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_bioexp_NodensSrfLandedTropicalMidlands_00 // Pressure stays high and the sky stays strange; the frogs keep croaking at the window like it will answer back.
        NodensSrfLandedTropicalMidlands* = #GEPscience_bd_bioexp_NodensSrfLandedTropicalMidlands_01 // A distant storm front makes the cabin lights flicker; the frogs immediately assume you planned this.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_bioexp_NodensSrfLandedTemperateMidlands_00 // The air feels steady, but the long comm delay makes routine checks feel like sending messages into the dark.
        NodensSrfLandedTemperateMidlands* = #GEPscience_bd_bioexp_NodensSrfLandedTemperateMidlands_01 // The frogs eat on schedule, then stare at the timer as if it personally betrayed them.
        NodensSrfLandedHighlands* = #GEPscience_bd_bioexp_NodensSrfLandedHighlands_00 // Cooler air and thinner pressure make the tank heaters cycle; the frogs pick the warmest corner and defend it diplomatically.
        NodensSrfLandedHighlands* = #GEPscience_bd_bioexp_NodensSrfLandedHighlands_01 // Outside, the red sun hangs low and stubborn; inside, the frogs perfect slow-motion “low-grav hops” against the glass.
        NodensSrfLandedTundra* = #GEPscience_bd_bioexp_NodensSrfLandedTundra_00 // Frost creeps up the exterior panels; the frogs respond by forming a tiny pile and calling it “research.”
        NodensSrfLandedTundra* = #GEPscience_bd_bioexp_NodensSrfLandedTundra_01 // The habitat is cozy, the world is not; stress markers rise when the wind rattles the lander and then refuses to stop.
        NodensSrfLandedIceCaps* = #GEPscience_bd_bioexp_NodensSrfLandedIceCaps_00 // The ice reflects the dim red light so strongly the exposure meters complain; the frogs blink like they’re reading fine print.
        NodensSrfLandedIceCaps* = #GEPscience_bd_bioexp_NodensSrfLandedIceCaps_01 // Every surface outside looks sharp and cold; the frogs remain soft, warm, and profoundly uninterested in going outside.
        NodensSrfSplashedSaltySeas* = #GEPscience_bd_bioexp_NodensSrfSplashedSaltySeas_00 // The capsule bobs in dark, salty water; the frogs float serenely, ignoring the ocean like it’s beneath them.
        NodensSrfSplashedSaltySeas* = #GEPscience_bd_bioexp_NodensSrfSplashedSaltySeas_01 // Salinity readings spike; the frogs’ enthusiasm does not.
        NodensSrfSplashedFreshWater* = #GEPscience_bd_bioexp_NodensSrfSplashedFreshWater_00 // Clear water sloshes softly outside; the frogs seem calmer, as if “less salty alien sea” is a measurable improvement.
        NodensSrfSplashedFreshWater* = #GEPscience_bd_bioexp_NodensSrfSplashedFreshWater_01 // You record improved respiration rates and a suspicious amount of amphibian side-eye.
        NodensSrfSplashedShores* = #GEPscience_bd_bioexp_NodensSrfSplashedShores_00 // The waterline shifts with every gentle wave; the frogs practice perfect synchronized drifting without being asked.
        NodensSrfSplashedShores* = #GEPscience_bd_bioexp_NodensSrfSplashedShores_01 // Brackish spray coats the viewport; the frogs flinch at every thump like the ocean is knocking.
        NodensFlyingLow* = #GEPscience_bd_bioexp_NodensFlyingLow_00 // In the thick lower air, turbulence taps the capsule like impatient fingers; the frogs spin slowly and refuse to look dizzy.
        NodensFlyingLow* = #GEPscience_bd_bioexp_NodensFlyingLow_01 // Mission Control requests “any anomalies.” By the time the reply arrives, the frogs have invented three new orientations.
        NodensFlyingHigh* = #GEPscience_bd_bioexp_NodensFlyingHigh_00 // The red haze thins to a dim glow; the frogs settle into stillness, as if waiting for daylight to finally commit to being daylight.
        NodensFlyingHigh* = #GEPscience_bd_bioexp_NodensFlyingHigh_01 // Pressure drops, radios hiss, and the frogs remain the most stable system onboard.
        NodensInSpaceLow* = #GEPscience_bd_bioexp_NodensInSpaceLow_00 // Low orbit turns Nodens into a vast map of unfamiliar colors; the frogs press to the tank wall when the red sun glares through.
        NodensInSpaceLow* = #GEPscience_bd_bioexp_NodensInSpaceLow_01 // Microgravity behavior is consistent: swim, pause, stare, repeat—science loves a reliable subject.
        NodensInSpaceHigh* = #GEPscience_bd_bioexp_NodensInSpaceHigh_00 // High above, the world shrinks and the silence grows; the frogs become quiet, and you find yourself matching them.
        NodensInSpaceHigh* = #GEPscience_bd_bioexp_NodensInSpaceHigh_01 // Long comm delays make every check-in feel like a postcard; the frogs do not sign theirs.

        BelisamaSrfLandedFlats* = #GEPscience_bd_bioexp_BelisamaSrfLandedFlats_00 // Nodens hangs in the sky like a constant reminder; the frogs react by pretending they didn’t notice, very professionally.
        BelisamaSrfLandedFlats* = #GEPscience_bd_bioexp_BelisamaSrfLandedFlats_01 // The light never quite looks “morning” here; the frogs’ sleep cycle becomes mostly naps and mild indignation.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTropicalLowlands_00 // Warm pockets near the surface keep the frogs active, until the red sun’s dim cue convinces them it’s always late.
        BelisamaSrfLandedTropicalLowlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTropicalLowlands_01 // The habitat thermostat wins the day; the frogs award it no medals.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTemperateLowlands_00 // Fine dust clings to everything outside; inside, the frogs track it on your gloves like tiny forensic scientists.
        BelisamaSrfLandedTemperateLowlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTemperateLowlands_01 // Heart rates spike briefly when the ground creaks under thermal strain, then return to “normal-ish.”
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTropicalMidlands_00 // The terrain rolls under a red-tinted sky; the frogs keep orienting toward the same window, as if one view is safer.
        BelisamaSrfLandedTropicalMidlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTropicalMidlands_01 // You write “behavioral preference observed.” The frogs write “keep the big planet where we can see it.”
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTemperateMidlands_00 // With no air outside, the cabin hum becomes the loudest weather; the frogs pause whenever the fans change pitch.
        BelisamaSrfLandedTemperateMidlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedTemperateMidlands_01 // They show steady appetite and steady confusion about why the day/night cues don’t behave.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedHighlands_00 // Low gravity makes every movement look dramatic; the frogs attempt a heroic leap and bump the tank lid with a tiny thud.
        BelisamaSrfLandedHighlands* = #GEPscience_bd_bioexp_BelisamaSrfLandedHighlands_01 // The outside horizon is stark and still; the frogs’ stress markers fall when you dim the lights and stop “encouraging” them.
        BelisamaSrfLandedPoles* = #GEPscience_bd_bioexp_BelisamaSrfLandedPoles_00 // The polar view is all hard shadow and dim red glow; the frogs huddle together and call it “teamwork.”
        BelisamaSrfLandedPoles* = #GEPscience_bd_bioexp_BelisamaSrfLandedPoles_01 // Cabin heaters cycle more often here; the frogs track the warm pulses like they’re listening to a slow heartbeat.
        BelisamaInSpaceLow* = #GEPscience_bd_bioexp_BelisamaInSpaceLow_00 // Belisama’s surface slides by in silent grayscale; Nodens dominates the background like a giant, watchful neighbor.
        BelisamaInSpaceLow* = #GEPscience_bd_bioexp_BelisamaInSpaceLow_01 // The frogs adjust quickly to microgravity, then glare at you as if you should have adjusted faster too.
        BelisamaInSpaceHigh* = #GEPscience_bd_bioexp_BelisamaInSpaceHigh_00 // Farther out, the red sun feels weaker and the radio delay feels longer; the frogs go still whenever the transmitter chirps.
        BelisamaInSpaceHigh* = #GEPscience_bd_bioexp_BelisamaInSpaceHigh_01 // Data suggests mild stress responses to isolation. No conclusions are drawn about the crew.

        SucellusSrfLandedBasins* = #GEPscience_bd_bioexp_SucellusSrfLandedBasins_00 // In the basin shadows, everything looks colder than it is; the frogs keep to the warmest corner and refuse interviews.
        SucellusSrfLandedBasins* = #GEPscience_bd_bioexp_SucellusSrfLandedBasins_01 // Low gravity makes even a twitch drift into a slow ballet; the frogs accidentally perform excellent science.
        SucellusSrfLandedLowlands* = #GEPscience_bd_bioexp_SucellusSrfLandedLowlands_00 // The surface looks dusty and old under the red sun; the frogs respond by being modern and offended.
        SucellusSrfLandedLowlands* = #GEPscience_bd_bioexp_SucellusSrfLandedLowlands_01 // Life-support logs stay stable while the outside stays alien; you mark the day’s result as “no surprises,” which feels like a surprise.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_bioexp_SucellusSrfLandedTropicalMidlands_00 // “Tropical” turns out to mean “less cold, still weird”; the frogs tolerate it with quiet resignation.
        SucellusSrfLandedTropicalMidlands* = #GEPscience_bd_bioexp_SucellusSrfLandedTropicalMidlands_01 // The long comm delay turns simple questions into time capsules; the frogs blink as if they understand.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_bioexp_SucellusSrfLandedTemperateMidlands_00 // Temperature gradients across the habitat make the frogs migrate two centimeters at a time toward comfort.
        SucellusSrfLandedTemperateMidlands* = #GEPscience_bd_bioexp_SucellusSrfLandedTemperateMidlands_01 // You observe reduced activity and increased staring at the window, as if the landscape is trying to stare back.
        SucellusSrfLandedHighlands* = #GEPscience_bd_bioexp_SucellusSrfLandedHighlands_00 // The lander settles with a soft crunch; the frogs freeze, then continue floating like nothing happened.
        SucellusSrfLandedHighlands* = #GEPscience_bd_bioexp_SucellusSrfLandedHighlands_01 // Radiation counters tick politely; the frogs remain the only onboard system that doesn’t beep at you.
        SucellusSrfLandedPoles* = #GEPscience_bd_bioexp_SucellusSrfLandedPoles_00 // The polar ground is pale and unforgiving; the frogs keep close and quiet, conserving heat and patience.
        SucellusSrfLandedPoles* = #GEPscience_bd_bioexp_SucellusSrfLandedPoles_01 // Light levels barely change; the frogs’ circadian rhythm becomes “whenever the snacks arrive.”
        SucellusInSpaceLow* = #GEPscience_bd_bioexp_SucellusInSpaceLow_00 // Low orbit reveals a small, stubborn world beneath a tired red sun; the frogs drift, unbothered by the scale of the journey.
        SucellusInSpaceLow* = #GEPscience_bd_bioexp_SucellusInSpaceLow_01 // You log consistent microgravity behavior and inconsistent feelings about being this far from anywhere familiar.
        SucellusInSpaceHigh* = #GEPscience_bd_bioexp_SucellusInSpaceHigh_00 // High above Sucellus, the darkness feels thicker; the frogs rest more, as if the void is con*

        CaireenSrfLandedLowlands* = #GEPscience_bd_bioexp_CaireenSrfLandedLowlands_00 // The horizon is lumpy and close, like landing on a potato with ambitions; the frogs seem to respect the geometry.
        CaireenSrfLandedLowlands* = #GEPscience_bd_bioexp_CaireenSrfLandedLowlands_01 // Every vibration travels through the tiny world; the frogs pause at each creak, then resume their slow, floating patrols.
        CaireenSrfLandedMidlands* = #GEPscience_bd_bioexp_CaireenSrfLandedMidlands_00 // Microgravity makes the frogs’ movements look effortless; you try it once, remember your helmet, and stop.
        CaireenSrfLandedMidlands* = #GEPscience_bd_bioexp_CaireenSrfLandedMidlands_01 // The dim red light makes the habitat feel like a night shift that never ends; the frogs cope by napping competitively.
        CaireenSrfLandedHighlands* = #GEPscience_bd_bioexp_CaireenSrfLandedHighlands_00 // The lander’s shadow stretches oddly across uneven ground; the frogs track it like it might move on its own.
        CaireenSrfLandedHighlands* = #GEPscience_bd_bioexp_CaireenSrfLandedHighlands_01 // Stress markers spike when reaction wheels twitch; on a tiny moon, even thinking about turning counts as “maneuvering.”
        CaireenSrfLandedPoles* = #GEPscience_bd_bioexp_CaireenSrfLandedPoles_00 // The poles are cold, still, and silent; the frogs huddle and make the only living sound for kilometers.
        CaireenSrfLandedPoles* = #GEPscience_bd_bioexp_CaireenSrfLandedPoles_01 // You record decreased activity and increased “togetherness,” then wonder who you’re really describing.
        CaireenInSpaceLow* = #GEPscience_bd_bioexp_CaireenInSpaceLow_00 // In low orbit, Caireen falls away quickly and Sucellus fills the view; the frogs cling to the tank wall during every course tweak.
        CaireenInSpaceLow* = #GEPscience_bd_bioexp_CaireenInSpaceLow_01 // Short orbits, long comm delays—excellent for stress studies, less excellent for relaxing.
        CaireenInSpaceHigh* = #GEPscience_bd_bioexp_CaireenInSpaceHigh_00 // Higher up, the moon looks even smaller and the trip feels even larger; the frogs drift as if they’ve accepted the scale problem.
        CaireenInSpaceHigh* = #GEPscience_bd_bioexp_CaireenInSpaceHigh_01 // Data quality is good, subject morale is stable, and the red sun stays dim enough to feel like it’s whispering.

        SironaFlyingLow* = #GEPscience_bd_bioexp_SironaFlyingLow_00 // The capsule bounces through dense red-lit clouds; the frogs float in tight little spirals like they’re trying to stay “inside” their own tank.
        SironaFlyingLow* = #GEPscience_bd_bioexp_SironaFlyingLow_01 // Outside is bands and murk, inside is amphibian aerobatics; the red sun makes everything feel like permanent late shift.
        SironaFlyingHigh* = #GEPscience_bd_bioexp_SironaFlyingHigh_00 // Up in the thin haze, the sky fades to a bruised maroon; the frogs slow down, as if waiting for daylight to make a decision.
        SironaFlyingHigh* = #GEPscience_bd_bioexp_SironaFlyingHigh_01 // Radiation ticks and the antenna crackles; the frogs remain the calmest system onboard, which is not reassuring.
        SironaInSpaceLow* = #GEPscience_bd_bioexp_SironaInSpaceLow_00 // Low orbit shows striped clouds and faint curtains of light; the frogs press to the glass, then pretend they didn’t.
