        SunInSpaceLowSouthTropicZone* = #JNSQscience_tantares_infrared_light_camera_SunInSpaceLowSouthTropicZone_01 // You record a sharp thermal boundary that slides sideways between frames, like the Sun is rearranging itself on purpose.
