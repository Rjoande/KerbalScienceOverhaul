        #GEPscience_bd_UVspec_EponaInSpaceLowTemperateUplands_00 = The UV signature steadies into repeatable absorption bands, then jitters as a haze layer shifts underneath. Mission Control calls it “interesting variability” after the data finally arrives.
        #GEPscience_bd_UVspec_EponaInSpaceLowHighlands_00 = The highlands return a brighter UV slope, as if cleaner air columns let more reflection through. You briefly feel closer to the ground, until the numbers remind you how far “close” is out here.
        #GEPscience_bd_UVspec_EponaInSpaceLowGrandPeaks_00 = Peaks punch through the haze enough to show crisp reflectance edges beneath the atmospheric blanket. The spectrometer logs “strong contrast,” which is its way of sounding impressed.
