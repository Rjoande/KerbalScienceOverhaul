@EXPERIMENT_DEFINITION:HAS[#id[bd_GeigerCounter]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_bd_GeigerCounter_SunFlyingLow_00 // The counter pegs instantly. It’s not clicking anymore so much as screaming in solid tone.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthPolarZone_00 // Radiation spikes hard over the polar zone. The Sun appears to be aiming.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthSubpolarZone_00 // The count rate surges in broad waves, like invisible surf breaking on the hull.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthTemperateZone_00 // Readings stay violently high, with brief dips that feel like the instrument blinking.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthTropicZone_00 // The detector registers rapid bursts, then saturates, then resumes as if nothing happened.
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowEquatorialZone_00 // The graph turns into a thick, angry band. “Background” is no longer a useful word.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthTropicZone_00 // Counts climb higher than the last pass. The Sun is apparently not done with you yet.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthTemperateZone_00 // A jittery pattern rides on top of the already extreme rate, like the star is crackling.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthSubpolarZone_00 // The detector logs sharp spikes in clusters. Somebody suggests turning the ship around with enthusiasm.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthPolarZone_00 // The counter hammers nonstop. You start counting seconds instead of particles.

        MohoSrfLandedPoles* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedPoles_00 // The counter rattles even in the cold shadow. Being this close to the Sun is a full-time job.
        MohoSrfLandedLowlands* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedLowlands_00 // Counts climb steadily; the ground offers heat, not shielding.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedPolarIceCraters_00 // A rare quiet patch appears—then the Sun remembers you exist.
        MohoSrfLandedHighlands* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedHighlands_00 // Higher terrain, higher counts. Less rock between you and the blaze.
        MohoSrfLandedMidlands* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedMidlands_00 // The detector ticks like a metronome set to “too fast.”
        MohoSrfLandedCraters* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedCraters_00 // Crater walls block the view, not the particles. Click click click.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedExoticCraters_00 // Short spikes pepper the log. The rocks down here are doing something rude.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedRareCraters_00 // A few hotspots in the ejecta stand out against an already nasty baseline.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedVoronoiCraters_00 // The rate rises and falls in a weirdly regular pattern. Geometry isn’t supposed to radiate.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedNotableCraters_00 // Passing the rim, the count jumps, then settles. You mark the spot and pretend it’s normal.
        MohoSrfLandedPeaks* = #JNSQscience_bd_GeigerCounter_MohoSrfLandedPeaks_00 // Up on the peaks, the counter is practically applauding. Stop applauding.
        MohoInSpaceLowPoles* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowPoles_00 // Over the poles the counter surges. The Sun has a direct line to your hull.
        MohoInSpaceLowLowlands* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowLowlands_00 // A steady storm of counts. The planet below looks like a poor excuse for shielding.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowPolarIceCraters_00 // A tiny dip over the shadowed craters, then back to full static.
        MohoInSpaceLowHighlands* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowHighlands_00 // Counts notch upward over the highlands. Altitude reaches up, even from orbit.
        MohoInSpaceLowMidlands* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowMidlands_00 // The graph is a thick band of bad news, with small ripples as terrain slides by.
        MohoInSpaceLowCraters* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowCraters_00 // Crater fields add little spikes to the already high rate, like teeth on the curve.
        MohoInSpaceLowExoticCraters* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowExoticCraters_00 // The detector spits out sharp bursts. You consider turning off the speaker, not the sensor.
        MohoInSpaceLowRareCraters* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowRareCraters_00 // Tiny peaks appear, vanish, and reappear, like the surface is blinking radioactive.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowVoronoiCraters_00 // Rhythmic bumps line up with the pattern below. The Mun never did this.
        MohoInSpaceLowNotableCraters* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowNotableCraters_00 // One big crater, one big blip. Correlation achieved, explanation postponed.
        MohoInSpaceLowPeaks* = #JNSQscience_bd_GeigerCounter_MohoInSpaceLowPeaks_00 // The counter climbs when you pass the peaks, as if the rock is trying to meet the radiation halfway.

        EveSrfSplashed* = #JNSQscience_bd_GeigerCounter_EveSrfSplashed_00 // The counter barely clicks. Eve’s atmosphere is doing most of the work, whether you asked it to or not.
        EveSrfLandedPoles* = #JNSQscience_bd_GeigerCounter_EveSrfLandedPoles_00 // The counter barely whispers. Even here, Eve’s air is doing most of the work.
        EveSrfLandedLowlands* = #JNSQscience_bd_GeigerCounter_EveSrfLandedLowlands_00 // Readings hover near zero. A thick atmosphere is a very persuasive shield.
        EveSrfLandedMidlands* = #JNSQscience_bd_GeigerCounter_EveSrfLandedMidlands_00 // The meter stays calm and steady. “Too calm” is not a number, but you write it anyway.
        EveSrfLandedHighlands* = #JNSQscience_bd_GeigerCounter_EveSrfLandedHighlands_00 // Counts rise just a little with altitude. Eve’s protection has a thickness gradient.
        EveSrfLandedPeaks* = #JNSQscience_bd_GeigerCounter_EveSrfLandedPeaks_00 // The counter clicks more often up here, but the air still smothers most of the incoming radiation.
        EveSrfLandedMountains* = #JNSQscience_bd_GeigerCounter_EveSrfLandedMountains_00 // Higher ground, higher counts. You start appreciating “sea level” as a safety feature.
        EveSrfLandedShores* = #JNSQscience_bd_GeigerCounter_EveSrfLandedShores_00 // Readings dip again near the waterline. Between air and liquid, space doesn’t get many votes.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_GeigerCounter_EveSrfLandedKrakensWell_00 // The detector goes quiet in the deep basin. Whatever the terrain is doing, it’s excellent at blocking the sky.
        EveSrfSplashedExplodiumSea* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedExplodiumSea_00 // The counter is almost silent. The ocean and the atmosphere team up to smother everything.
        EveSrfSplashedShores* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedShores_00 // Splashed near the coast, the readings flatten out to nearly nothing. It’s the safest place on the least friendly world.
        EveSrfSplashedPolarLakes* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedPolarLakes_00 // Calm water, calm counter. Your suit, however, is registering “concern.”
        EveSrfSplashedPetrolLakes* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedPetrolLakes_00 // The instrument reads near zero while the air smells like bad decisions.
        EveSrfSplashedSeaofAkron* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofAkron_00 // The meter barely clicks. You begin to suspect Eve’s seas are better shielding than your hull.
        EveSrfSplashedSeaofNessus* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofNessus_00 // Counts remain extremely low. The only thing rising is the dread of maintenance.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofTaniwha_00 // The detector stays quiet and obedient. Eve’s chemistry is the loud part.
        EveSrfSplashedSeaofGigan* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofGigan_00 // Almost no counts at all. Water is an excellent shield, even when it looks like trouble.
        EveSrfSplashedSeaofRodan* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofRodan_00 // The counter idles at near zero. You can’t decide if that’s comforting or suspicious.
        EveSrfSplashedSeaofGojira* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofGojira_00 // Background radiation is practically gone. Something this hostile should not feel this safe.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofGhidorah_00 // The meter stays pinned low. You double. Check the calibration and then the exit plan.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofBagorah_00 // The detector is quiet enough to hear your own breathing. You do not like that.
        EveInSpaceLowPoles* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowPoles_00 // The counter rattles at a high rate. Whatever shielding Eve has, it mostly stays down in the atmosphere.
        EveInSpaceLowLowlands* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowLowlands_00 // Strong counts persist in low orbit, with a slight dip when your track skims the thicker air below.
        EveInSpaceLowMidlands* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowMidlands_00 // Radiation stays high and steady. The planet looks calm; the particles do not.
        EveInSpaceLowHighlands* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowHighlands_00 // A modest uptick appears over the higher terrain, as if altitude works from orbit too.
        EveInSpaceLowPeaks* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowPeaks_00 // The numbers jump a notch over the peaks. Less atmosphere between you and space, even from here.
        EveInSpaceLowMountains* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowMountains_00 // The detector chatters continuously. The mountains below offer no help whatsoever.
        EveInSpaceLowShores* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowShores_00 // Counts fluctuate as the limb brightens and darkens. The atmosphere’s edge is doing the only noticeable filtering.
        EveInSpaceLowExplodiumSea* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowExplodiumSea_00 // The readout stays high, but the curve smooths slightly over the sea, like a thicker air column is helping.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowPolarLakes_00 // A small dip crosses the graph over the lakes, then the usual high background resumes.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowPetrolLakes_00 // Radiation remains high, with brief soft troughs over the dark patches.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofAkron_00 // The counter remains alarmingly enthusiastic. You consider turning off the sound, not the science.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofNessus_00 // The data stays high, with tiny ripples that line up with the coastlines below.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofTaniwha_00 // A steady storm of counts continues. Eve is close enough to the Sun to make a point about it.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofGigan_00 // High radiation, minor modulation. The ocean’s only talent is looking deceptively safe.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofRodan_00 // The detector spikes briefly, then returns to its already-high baseline. You label it “mystery, not panic.”
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofGojira_00 // Counts stay high and constant. The graph is a purple wall of bad news.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofGhidorah_00 // The counter chatters without pause. You start to feel like you’re being counted back.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofBagorah_00 // Radiation stays high; the planet below stays pretty. The universe is inconsistent like that.
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_GeigerCounter_EveInSpaceLowKrakensWell_00 // A sharp blip appears as you pass overhead, then disappears into the background roar.

        GillyInSpaceHigh* = #JNSQscience_bd_GeigerCounter_GillyInSpaceHigh_00 // The counter clicks steadily; Eve hangs nearby, but doesn’t block much of anything.
        GillySrfLandedLowlands* = #JNSQscience_bd_GeigerCounter_GillySrfLandedLowlands_00 // A handful of clicks drift in. This pebble has no idea how to shield anything.
        GillySrfLandedMidlands* = #JNSQscience_bd_GeigerCounter_GillySrfLandedMidlands_00 // Counts wobble when you rotate the instrument. On Gilly, “up” is a suggestion.
        GillySrfLandedHighlands* = #JNSQscience_bd_GeigerCounter_GillySrfLandedHighlands_00 // Slightly higher ticks on the exposed ridge. Space is basically everywhere here.
        GillyInSpaceLowLowlands* = #JNSQscience_bd_GeigerCounter_GillyInSpaceLowLowlands_00 // The rate stays steady and a bit too lively for such a tiny body.
        GillyInSpaceLowMidlands* = #JNSQscience_bd_GeigerCounter_GillyInSpaceLowMidlands_00 // Particles ping the hull at a casual pace. Gilly offers exactly zero cover.
        GillyInSpaceLowHighlands* = #JNSQscience_bd_GeigerCounter_GillyInSpaceLowHighlands_00 // A few extra bursts as the lumpy surface rolls beneath you. It’s not helping.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAdministration_00 // The counter stays quiet until you pass a “Do Not Scan” sign; then it clicks indignantly, like it also knows you forgot Form 12-B.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAstronautComplex_00 // Readings are normal, but the device registers a brief spike near the snack lockers; nobody agrees to discuss what’s stored behind the “protein” label.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedCrawlerway_00 // The clicks sync perfectly with the crawlerway vibrations; the Safety Officer calls it “resonance,” you call it “please stop walking so heavily.”
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedFlagPole_00 // The counter ticks politely at the base of the flag; a nearby engineer insists the radiation is “patriotic” and therefore within spec.
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedMissionControl_00 // The Geiger counter starts clicking faster the moment you enter; Gene assures you it’s just reacting to stress levels in the room.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DCentralBuilding_00 // Readings are “slightly elevated,” which R&D insists is the scientific term for “working as intended, don’t worry about it.”
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DCornerLab_00 // The counter spikes when you point it at a locked cabinet; a scientist appears instantly to inform you that cabinets are not a biome.
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DMainBuilding_00 // Every time you get near a prototype, the counter rattles like it’s trying to file a complaint; R&D calls this “valuable telemetry.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DObservatory_00 // The instrument remains calm until it’s aimed at the basement stairwell; the astronomers gently suggest you keep your curiosity pointed at the sky.
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DSideLab_00 // The display flickers between “SAFE” and “ASK PERMISSION”; the second reading seems oddly specific.
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DSmallLab_00 // Radiation is normal, but the counter keeps bumping into things; the lab is now officially classified as “high-collision environment.”
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DTanks_00 // The counter clicks at a steady pace and someone quietly moves three barrels behind a curtain labeled “definitely water.”
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DWindTunnel_00 // Wind noise makes the counter sound dramatic; Engineering insists the extra clicking is “aero-acoustic enhancement,” not panic.
        KerbinSrfLandedRunway* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedRunway_00 // The counter stays calm until you step onto the painted centerline; it immediately starts clicking like it just remembered the safety briefing.
        KerbinSrfLandedSPH* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPH_00 // Readings are normal until a mechanic rolls by with a “recovered” part; the counter clicks once, as if laughing.
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHMainBuilding_00 // The counter spikes near the paint booth; the crew blames “exotic pigments” and blocks your view with a clipboard.
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHRoundTank_00 // The device ticks louder around the round tank’s base; a technician explains it’s “just residual enthusiasm from testing.”
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHTanks_00 // You detect faint radiation near a stack of “empty” containers; the foreman assures you they’re empty in the *important* ways.
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHWaterTower_00 // Readings are normal, but the counter keeps clicking whenever you look up at the tower; you suspect it’s nervous about heights.
        KerbinSrfLandedTrackingStation* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStation_00 // The counter is quiet until you stand under a dish; then it chatters like it’s trying to phone home through bureaucracy.
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationDishEast_00 // The instrument clicks in bursts that match the dish sweep; the operators insist this is “signal processing,” not “suspiciously energetic.”
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationDishNorth_00 // The counter spikes and the tracking team immediately asks if you’re “introducing noise”; you reply that the noise introduced itself.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationDishSouth_00 // The reading jumps when the dish locks onto something invisible; the staff calls it “routine,” which is never comforting here.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationHub_00 // The counter stays normal, but the room’s coffee supply measures as “moderately radioactive to morale.”
        KerbinSrfLandedVAB* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVAB_00 // The counter clicks a little faster near the big doors; someone says it’s “historic residue,” which is apparently a certification.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABMainBuilding_00 // The instrument chatters near a sealed utility hatch; an engineer says “that’s not a hatch,” and you are escorted away from the not-hatch.
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABPodMemorial_00 // The counter remains respectfully quiet until someone whispers “experimental”; then it clicks once, like a solemn warning.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABRoundTank_00 // Radiation levels are low, but the counter keeps making tiny anxious noises; it may have read the staging notes.
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABSouthComplex_00 // The reading is slightly elevated and the foreman swears it’s “within the exciting range,” which is not a standard unit.
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABTanks_00 // The counter spikes briefly, then settles; everyone agrees the spike was a “calibration opportunity” and definitely not a leak.
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedIslandAirfield_00 // The counter ticks gently in the sea breeze; the local staff still insists you sign a waiver for “unexpected science.”
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedBaikerbanur_00 // The counter clicks through dusty corridors like it’s counting all the corners you’re not supposed to be in.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedBaikerbanurLaunchpad_00 // Readings bounce between “normal” and “legacy”; the pad seems proud of its past and mildly dangerous about it.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedWoomerang_00 // The Geiger counter chatters near the old equipment pads; the range staff insists it’s “historic character,” not “mildly enthusiastic radiation.”

        KerbinFlyingLow* = #JNSQscience_bd_GeigerCounter_KerbinFlyingLow_00 // The counter clicks politely; Kerbin's lower atmosphere does most of the shielding for you.
        KerbinFlyingHigh* = #JNSQscience_bd_GeigerCounter_KerbinFlyingHigh_00 // The clicks come a little faster this high up. Kerbin’s protection is starting to thin out.
        KerbinSrfLandedIceCaps* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedIceCaps_00 // The counter stays near baseline. The only thing glowing is your breath on the visor.
        KerbinSrfLandedHighlands* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedHighlands_00 // Readings are comfortably normal. Kerbin’s rocks are behaving like proper rocks.
        KerbinSrfLandedMidlands* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedMidlands_00 // Background radiation sits right on the textbook value. Someone actually smiles at the number.
        KerbinSrfLandedLowlands* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedLowlands_00 // The detector hardly clicks at all. Home feels well-shielded down here.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridLowlands_00 // Counts creep upward in the dry heat, but nothing worth sounding an alarm.
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridMidlands_00 // The meter ticks a little faster; you blame the sun, not the soil.
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridHighlands_00 // Thin air and bright ground make the counter livelier than you’d like.
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridMountains_00 // Higher counts than expected. You start eyeing every rock like it owes you an explanation.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_GeigerCounter_KerbinSrfLandedWelcomeBackIsland_00 // Radiation is normal. The island seems proud of its excellent safety record.
        KerbinSrfSplashedGreatLake* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedGreatLake_00 // Water makes a decent shield; the counter calms down as it bobs along.
        KerbinSrfSplashedInlandWater* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedInlandWater_00 // The readings are steady. The instrument now refuses to stop floating.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedKreenwichSea_00 // The sea does its part and the count rate stays pleasantly low.
        KerbinSrfSplashedArcticSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedArcticSea_00 // Cold water, cold air, quiet detector. Everything else is complaining.
        KerbinSrfSplashedForemansSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedForemansSea_00 // Background radiation stays normal; the salty spray does not improve electronics.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedTriangulusSea_00 // The counter’s rhythm matches the waves. You write down “probably coincidence.”
        KerbinSrfSplashedNorthernSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedNorthernSea_00 // A subtle dip suggests the ocean is doing its shielding thing again.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedSub-ArcticSea_00 // The readings are low and stable; your gloves are not.
        KerbinSrfSplashedEasternSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedEasternSea_00 // The meter stays calm, even if everyone else is seasick.
        KerbinSrfSplashedWesternSea* = #JNSQscience_bd_GeigerCounter_KerbinSrfSplashedWesternSea_00 // Normal radiation levels. Abnormal desire to take a nap.
        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_GeigerCounter_KerbinInSpaceLowIceCaps_00 // The counter ticks faster over the poles; field lines seem to funnel energetic particles down here.
        KerbinInSpaceLowHighlands* = #JNSQscience_bd_GeigerCounter_KerbinInSpaceLowHighlands_00 // A steady stream of clicks. Nothing dramatic. Just honest space doing space things.
        KerbinInSpaceLowMountains* = #JNSQscience_bd_GeigerCounter_KerbinInSpaceLowMountains_00 // The peaks look close enough to poke. The counter insists you keep your hands inside the capsule.
        KerbinInSpaceLowShores* = #JNSQscience_bd_GeigerCounter_KerbinInSpaceLowShores_00 // The readings drift as land turns to sea, like Kerbin can’t decide which background it prefers.
        KerbinInSpaceLowMidlands* = #JNSQscience_bd_GeigerCounter_KerbinInSpaceLowMidlands_00 // The meter settles into a boring cadence. You are weirdly proud of Kerbin for being boring.
        KerbinInSpaceLowLowlands* = #JNSQscience_bd_GeigerCounter_KerbinInSpaceLowLowlands_00 // Counts run a touch lower than average; the thick air below is pulling its weight.
