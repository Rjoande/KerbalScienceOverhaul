@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    %RESULTS
    {
        EveInSpaceLow* = #CinematicPack_Expanse_bd_SIGINT_EveInSpaceLow_00 // The receiver locks onto a tight burst pattern that looks almost like a handshake, then dissolves into static. Mission Control suggests you “log it and do not engage,” as if that’s a thing you can do with radio waves.
        EveInSpaceLow* = #CinematicPack_Expanse_bd_SIGINT_EveInSpaceLow_01 // A weak carrier rides the noise floor, repeating on a schedule, but the source is somewhere under Eve’s purple lid. The notes field quietly gains a new checkbox: “Possible disposal beacon.”
        DresInSpaceLow* = #CinematicPack_Expanse_bd_SIGINT_DresInSpaceLow_00 // The receivers sweep every band and find nothing but thermal hiss. Dres is quiet in the way that makes planners start drawing infrastructure charts.
		DresInSpaceLow* = #CinematicPack_Expanse_bd_SIGINT_DresInSpaceLow_01 // No chatter, no beacons, no stray pings, just empty spectrum. You tag the file “pristine baseline” and imagine how quickly it’ll vanish once the first big operators move in.
    }
}

