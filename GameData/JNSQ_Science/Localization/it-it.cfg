        #JNSQscience_bd_cosmicRay_TyloFlyingLow_00 = Nella foschia sottile di azoto il rivelatore si fa più quieto, ma non tace mai: Tylo filtra, non perdona.
        #JNSQscience_bd_cosmicRay_TyloFlyingHigh_00 = Sopra gran parte dell'aria, il tasso di conteggio risale verso lo spazio: l'"atmosfera" sembra un suggerimento educato.
        #JNSQscience_bd_cosmicRay_TyloSrfLandedPoles_00 = I poli gelidi mostrano una grandinata costante di impulsi: se pianifichi basi, inizia mettendo a budget la schermatura.
        #JNSQscience_bd_cosmicRay_TyloSrfLandedMountains_00 = Il contatore accelera sulle creste alte: panorami splendidi, politica sulle radiazioni pessima.
        #JNSQscience_bd_cosmicRay_TyloSrfLandedHighlands_00 = L'aria sottile sopra elimina la roba morbida: lo spettro duro resta ostinatamente entusiasta.
        #JNSQscience_bd_cosmicRay_TyloSrfLandedMidlands_00 = Un fondo stabile e alto: ottimo per medie a lungo termine, pessimo per residenti a lungo termine.
        #JNSQscience_bd_cosmicRay_TyloSrfLandedLowlands_00 = Conteggi un po' più calmi in basso: il miglior riparo di Tylo resta soprattutto una pia illusione.
        #JNSQscience_bd_cosmicRay_TyloInSpaceLowPoles_00 = Sopra i poli compare una lieve bandatura, come se deboli linee di campo stessero disegnando sulla tua traccia.
        #JNSQscience_bd_cosmicRay_TyloInSpaceLowMountains_00 = I passaggi sulle montagne aggiungono picchi eventi secondari netti: la superficie ti tira sassolini sui conteggi di particelle.
        #JNSQscience_bd_cosmicRay_TyloInSpaceLowHighlands_00 = Lo spettro si indurisce un poco: meno aria sotto significa meno aiuto che non ti sei guadagnato.
        #JNSQscience_bd_cosmicRay_TyloInSpaceLowMidlands_00 = Un altopiano luminoso e uniforme di impulsi: l'orbita di Tylo sembra progettata per "esposizione continua".
        #JNSQscience_bd_cosmicRay_TyloInSpaceLowLowlands_00 = I tassi dei eventi secondari calano leggermente sopra i bassopiani: il terreno assorbe di più, ma non abbastanza.
