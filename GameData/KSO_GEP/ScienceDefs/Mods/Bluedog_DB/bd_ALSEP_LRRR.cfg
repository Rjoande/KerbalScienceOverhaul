@EXPERIMENT_DEFINITION:HAS[#id[bd_ALSEP_LRRR]]
{
    %RESULTS
    {
		TaranisSrfLanded* = #GEPscience_bd_ALSEP_LRRR_TaranisSrfLanded_00 // The reflector is technically aimed at Nodens, but most of the photons seem more interested in being instantly roasted. A few make the round trip anyway.
		ToutatisSrfLanded* = #GEPscience_bd_ALSEP_LRRR_ToutatisSrfLanded_00 // The thin, hot haze turns the beam into a slightly wobbly pencil line, but the Nodens return still lands right on the detector. Someone writes “good enough for science” on the housing.
        NodensSrfLanded* = #GEPscience_bd_ALSEP_LRRR_NodensSrfLanded_00 // You fire a laser toward Nodens and wait. And wait. Mission Control starts taking snack orders before the first photons come back.
		BelisamaSrfLanded* = #GEPscience_bd_ALSEP_LRRR_BelisamaSrfLanded_00 // With Belisama and Nodens locked face-to-face, the reflector has the easiest “moving target” problem in history. The return ping is so crisp it feels smug.
        SucellusSrfLanded* = #GEPscience_bd_ALSEP_LRRR_SucellusSrfLanded_00 // You bounce a laser off Nodens and back, just to prove this lumpy “not-quite-a-planet” is exactly where the math says it is. Sucellus looks offended.
		CaireenSrfLanded* = #GEPscience_bd_ALSEP_LRRR_CaireenSrfLanded_00 // The return signal jitters because the lander keeps doing tiny, dramatic shifts in the weak gravity. The laser does not appreciate performance art.
		AirmedSrfLanded* = #GEPscience_bd_ALSEP_LRRR_AirmedSrfLanded_00 // Scarred terrain, strange fractures, and a perfectly boring, perfectly reliable Nodens return. Science celebrates the one thing here that isn’t complicated.
		BorvoSrfLanded* = #GEPscience_bd_ALSEP_LRRR_BorvoSrfLanded_00 // If there’s anything hiding under all that ice, it still can’t stop you from ranging to Nodens. The reflector just keeps blinking like it knows a secret.
		DamonaSrfLanded* = #GEPscience_bd_ALSEP_LRRR_DamonaSrfLanded_00 // The Nodens ping takes long enough that the crew re-reads the checklist twice and invents a third snack break. Eventually the photons return, unapologetically.
		EponaSrfLanded* = #GEPscience_bd_ALSEP_LRRR_EponaSrfLanded_00 // Methane haze tries to soften the beam, but the Nodens reflection still lands on the detector with satisfying precision. You write “mostly optically adequate” in the log.
		RosmertaSrfLanded* = #GEPscience_bd_ALSEP_LRRR_RosmertaSrfLanded_00 // You send a laser toward Nodens and get back a crisp, regular pulse train. Rosmerta may be lonely, but the reflector is not.
		RAB-58ESrfLanded* = #GEPscience_bd_ALSEP_LRRR_RAB-58ESrfLanded_00 // In near-zero gravity, bolting down the reflector feels like negotiating with the concept of “down.” Once it stays put, Nodens answers right on schedule.
		CernunnosSrfLanded* = #GEPscience_bd_ALSEP_LRRR_CernunnosSrfLanded_00 // Out here, Nodens is just a distant reference and the return is faint, but it matches the prediction. A very small dot of light makes a very big baseline.
    }
}