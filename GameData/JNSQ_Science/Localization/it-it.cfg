        #JNSQscience_barometerScan_DakInSpaceLow_00 = Il barometro segnala ciò che sapevi già: lo spazio è ancora spazio. Almeno è scrupoloso.
        #JNSQscience_barometerScan_DakInSpaceLow_01 = Il display elenca con orgoglio una pressione così bassa che servono zeri extra per spiegarla. Valuti di archiviarla sotto "vuoto: confermato di nuovo".
        #JNSQscience_barometerScan_DakInSpaceHigh_00 = Qui fuori c'è solo vuoto. Il barometro sembra quasi deluso dalla mancanza di dramma.
