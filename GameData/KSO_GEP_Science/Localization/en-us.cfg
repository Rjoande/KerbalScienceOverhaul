        #GEPscience_bd_UVspec_AirmedInSpaceLowTropicalMidlands_00 = Sharp UV edges suggest fresher material exposed by old impacts, then immediately fade as the viewing angle changes. Airmed makes you work for every clean curve.
        #GEPscience_bd_UVspec_AirmedInSpaceLowTemperateMidlands_00 = A faint, transient ultraviolet glow rides along the horizon, consistent with sputtered dust and charged particles. Mission Control asks for repeats; the delay answers with silence.
        #GEPscience_bd_UVspec_AirmedInSpaceLowHighlands_00 = Highlands reflect a harsher UV glare, like the surface has been sandblasted by radiation for ages. The spectrometer agrees, then asks if you’re sure you calibrated it.
        #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedLowlands_00 = The darkened terrain eats ultraviolet and gives almost nothing back, leaving a stubbornly flat spectrum. It feels like scanning a void that happens to be solid.
