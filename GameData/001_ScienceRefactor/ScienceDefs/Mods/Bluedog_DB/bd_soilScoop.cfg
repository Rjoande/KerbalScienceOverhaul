@EXPERIMENT_DEFINITION:HAS[#id[bd_soilScoop]]
{
    @title = #ScienceRefactor_bd_soilScoop_title // Surface Material Exposure
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_soilScoop_default_00 // The arm exposes some material underneath the surface
        SrfLanded* = #ScienceRefactor_bd_soilScoop_default_01 // The scoop scrapes off the surface layer for analysis
        SrfLanded* = #ScienceRefactor_bd_soilScoop_default_02 // Images are taken of the exposed regolith

        MohoSrfLanded* = #ScienceRefactor_bd_soilScoop_MohoSrfLanded_00 // That's the scoop beginning to melt.
        MohoSrfLanded* = #ScienceRefactor_bd_soilScoop_MohoSrfLanded_01 // KSC is more excited that the arm has not melted yet.
        MohoSrfLandedNorthPole* = #ScienceRefactor_bd_soilScoop_MohoSrfLandedNorthPole_00 // The scoop arm will have a hard reaching into the Mohole.

        EveSrfLanded* = #ScienceRefactor_bd_soilScoop_EveSrfLanded_00 // The soil has good composition for sampling, assuming you can take off and return one.
        EveSrfSplashed* = #ScienceRefactor_bd_soilScoop_EveSrfSplashed_00 // Sploosh!
        EveSrfSplashed* = #ScienceRefactor_bd_soilScoop_EveSrfSplashed_01 // The arms splashes into the ocean. The water starts fizzing and steaming.

		GillySrfLanded* = #ScienceRefactor_bd_soilScoop_GillySrfLanded_00 // The scoop disturbs a small amount of material which quickly floats away at escape velocity.

        KerbinSrf* = #ScienceRefactor_bd_soilScoop_KerbinSrf_00 // Mission Control notes that it will be cheaper to just send interns with shovels next time.
        KerbinSrfSplashed* = #ScienceRefactor_bd_soilScoop_KerbinSrfSplashed_00 // Sploosh!
        KerbinSrfSplashed* = #ScienceRefactor_bd_soilScoop_KerbinSrfSplashed_01 // The engineering team briefly considers using the scoop as an oar.
        KerbinSrfLandedKSC* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedKSC_00 // The extended arm trips over one of Dr. Kerman's assistants.
        KerbinSrfLandedKSC* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedKSC_01 // KSC Police fines Mission Control for disturbing the landscaping and structures around the Space Center.
        KerbinSrfLandedDeserts* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedDeserts_00 // There appears to be more sand under the sand.
        KerbinSrfLandedShores* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedShores_00 // Oh look, there's some shiny seasonal seashells showing!
        KerbinSrfLandedGrasslands* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedGrasslands_00 // The arm almost gets caught in some grass.
        KerbinSrfLandedMountains* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedMountains_00 // The scoop scratches the rocky surface.
        KerbinSrfLandedTundra* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedTundra_00 // There is thick ice under some fine snow.
        KerbinSrfLandedRunway* = #ScienceRefactor_bd_soilScoop_KerbinSrfLandedRunway_00 // The arm scoops up some shredded tire pieces and a strange green material.

		MunSrfLanded* = #ScienceRefactor_bd_soilScoop_MunSrfLanded_00 // Mun regolith is dusty with scattered larger particles.
		MunSrfLanded* = #ScienceRefactor_bd_soilScoop_MunSrfLanded_01 // The dusty topmost layer is several centimeters deep and could pose some difficulty for both walking and driving.

		MinmusSrfLanded* = #ScienceRefactor_bd_soilScoop_MinmusSrfLanded_00 // Mission Control realizes that this is just a REALLY expensive ice cream scoop.
		MinmusSrfLanded* = #ScienceRefactor_bd_soilScoop_MinmusSrfLanded_01 // Scientists ponder over images of the exposed material and conclude: Lime Sherbet.

        DunaSrfLanded* = #ScienceRefactor_bd_soilScoop_DunaSrfLanded_00 // The surface layer is very, very fine dust.
        DunaSrfLanded* = #ScienceRefactor_bd_soilScoop_DunaSrfLanded_01 // The scoop exposes darker dust just a few centimeters under the top layer.
        DunaSrfLanded* = #ScienceRefactor_bd_soilScoop_DunaSrfLanded_02 // Some bright material is exposed under the top layer, could it be ice?

		IkeSrfLanded* = #ScienceRefactor_bd_soilScoop_IkeSrfLanded_00 // Ike soil is less dusty and more rocky.
		IkeSrfLanded* = #ScienceRefactor_bd_soilScoop_IkeSrfLanded_01 // The scoop scratches away at rocky material. A strong drill will be required to sample beneath the surface.

        DresSrfLanded* = #ScienceRefactor_bd_soilScoop_DresSrfLanded_00 // There are striking similarities between Dres' and the Mun's  regolith.

        JoolSrfLanded* = #ScienceRefactor_bd_soilScoop_JoolSrfLanded_00 // The engineering team wins a top prize for developing a system that can scoop material from the surface of a gas giant!

		LaytheSrfLanded* = #ScienceRefactor_bd_soilScoop_LaytheSrfLanded_00 // The soil layers have similar properties to those of Kerbin.
		LaytheSrfLanded* = #ScienceRefactor_bd_soilScoop_LaytheSrfLanded_01 // Given the amount of water on Laythe, having some soil to interact with is actually somewhat rare.

        EeelooSrfLanded* = #ScienceRefactor_bd_soilScoop_EeelooSrfLanded_00 // The scratching noise made by the scoop confirms that this is an icy surface.
        EeelooSrfLanded* = #ScienceRefactor_bd_soilScoop_EeelooSrfLanded_01 // There are fine snowy particles on the surface, but it is mostly a solid chunk of ice.
	}
}