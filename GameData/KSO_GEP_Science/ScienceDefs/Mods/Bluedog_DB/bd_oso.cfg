@EXPERIMENT_DEFINITION:HAS[#id[bd_oso]]
{
    %RESULTS
    {
		GrannusInSpaceLow* = #GEPscience_bd_oso_GrannusInSpaceLow_00 // The sensors saturate in a deep red glare; the radiation counter files a complaint and the shutters snap shut.
        GrannusInSpaceLow* = #GEPscience_bd_oso_GrannusInSpaceLow_01 // A “quiet” flare rolls past and still kicks the instrument into safe-mode. Your data packet waits its turn in the long return queue.
        GrannusInSpaceHigh* = #GEPscience_bd_oso_GrannusInSpaceHigh_00 // Even from up here, Grannus is an angry ruby that keeps trying to cook your panels one photon at a time.
        GrannusInSpaceHigh* = #GEPscience_bd_oso_GrannusInSpaceHigh_01 // Long-baseline readings show slow, heavy pulses of activity. Mission Control requests “less poetry, more numbers” and receives both.

        TaranisInSpaceLow* = #GEPscience_bd_oso_TaranisInSpaceLow_00 // The day side reflects heat like a forge mirror; the solar spectrum comes back sharp, hot, and slightly insulting.
        TaranisInSpaceLow* = #GEPscience_bd_oso_TaranisInSpaceLow_01 // Crossing into the night hemisphere, the flux graph falls off a cliff. The sudden silence is almost worse than the glare.
        TaranisInSpaceHigh* = #GEPscience_bd_oso_TaranisInSpaceHigh_00 // From high orbit, Taranis looks like a coin split between ember and ink, and neither side offers much shelter from the particle stream.
        TaranisInSpaceHigh* = #GEPscience_bd_oso_TaranisInSpaceHigh_01 // The readings alternate between “too much” and “not enough” as the orbit watches the same brutal day-night divide repeat.

        ToutatisInSpaceLow* = #GEPscience_bd_oso_ToutatisInSpaceLow_00 // Over the twilight band, the thin air adds a faint smear to the measurements—like somebody breathed on the sensor window.
        ToutatisInSpaceLow* = #GEPscience_bd_oso_ToutatisInSpaceLow_01 // The baked side dumps heat upward while the dark side contributes mostly static and uncomfortable graphs.
        ToutatisInSpaceHigh* = #GEPscience_bd_oso_ToutatisInSpaceHigh_00 // Grannus is a dim red point from here, but the radiation counter refuses to accept the word “dim.”
        ToutatisInSpaceHigh* = #GEPscience_bd_oso_ToutatisInSpaceHigh_01 // Subtle scattering from Toutatis’ near-vacuum shows up in the data. Mission Control asks if you can “turn the sun down.” You pretend to try.

        NodensInSpaceLow* = #GEPscience_bd_oso_NodensInSpaceLow_00 // The red sun’s spectrum comes back with big bites missing where Nodens’ thick air drinks it in. The graph looks like it has teeth.
        NodensInSpaceLow* = #GEPscience_bd_oso_NodensInSpaceLow_01 // The planet’s clouds throw back a dull, rusty glare; the sensors keep asking if you parked too close. You did.
        NodensInSpaceHigh* = #GEPscience_bd_oso_NodensInSpaceHigh_00 // From high orbit, Nodens’ magnetic shielding shows up as a broad, steady “not as bad as it could be.” Everyone celebrates responsibly.
        NodensInSpaceHigh* = #GEPscience_bd_oso_NodensInSpaceHigh_01 // The long integration run finishes, then spends even longer waiting in the transmission queue. Distance adds latency to everything, even excitement.

        BelisamaInSpaceLow* = #GEPscience_bd_oso_BelisamaInSpaceLow_00 // The locked day side bakes under a dim crimson lamp while the night side stays stubbornly cold. The data is half blaze, half void.
        BelisamaInSpaceLow* = #GEPscience_bd_oso_BelisamaInSpaceLow_01 // A Nodens eclipse cuts the solar signal like a knife. The instrument logs it as “unexpected darkness event,” which feels accurate.
        BelisamaInSpaceHigh* = #GEPscience_bd_oso_BelisamaInSpaceHigh_00 // With only a weak field, the readings jitter whenever the star exhales. Mission Control recommends “less star, more calm.”
        BelisamaInSpaceHigh* = #GEPscience_bd_oso_BelisamaInSpaceHigh_01 // High above, Belisama and Nodens move like a paired clockwork. The sun’s output ticks against them with unsettling regularity.

        SucellusInSpaceLow* = #GEPscience_bd_oso_SucellusInSpaceLow_00 // The sensors report a harsh particle storm and then politely request a different assignment. Sucellus does not negotiate.
        SucellusInSpaceLow* = #GEPscience_bd_oso_SucellusInSpaceLow_01 // Without air to blur it, the red sun’s output is painfully clean and painfully strong. You can almost feel it through the numbers.
        SucellusInSpaceHigh* = #GEPscience_bd_oso_SucellusInSpaceHigh_00 // Farther out, the star is smaller but still mean. The counter insists the “dim” part is a rumor.
        SucellusInSpaceHigh* = #GEPscience_bd_oso_SucellusInSpaceHigh_01 // Long-baseline monitoring shows slow surges that line up with nothing you recognize. The unknowns are starting to feel like local weather.

        CaireenInSpaceLow* = #GEPscience_bd_oso_CaireenInSpaceLow_00 // The solar signal spikes and drops as Caireen tumbles through Sucellus’ shadow. It’s like taking measurements inside a blinking box.
        CaireenInSpaceLow* = #GEPscience_bd_oso_CaireenInSpaceLow_01 // The little moon reflects almost nothing—just a faint, dusty whisper of red light and a lot of radiation you’d rather not taste.
        CaireenInSpaceHigh* = #GEPscience_bd_oso_CaireenInSpaceHigh_00 // Up here, there’s no magnetic mercy at all. The instrument’s “normal” mode becomes a suggestion, not a setting.
        CaireenInSpaceHigh* = #GEPscience_bd_oso_CaireenInSpaceHigh_01 // The downlink takes ages, and the data arrives feeling older than when you recorded it. Even the sunlight seems delayed out here.

        SironaInSpaceLow* = #GEPscience_bd_oso_SironaInSpaceLow_00 // Sirona’s vast magnetic field twists the dim red sun’s wind into a snarling mess. The sensors log it anyway.
        SironaInSpaceLow* = #GEPscience_bd_oso_SironaInSpaceLow_01 // A flare spike hits the instruments first. The packet explaining it arrives later, somewhere behind the light.
        SironaInSpaceHigh* = #GEPscience_bd_oso_SironaInSpaceHigh_00 // From high orbit, Grannus is just a smoldering ember in a lot of black—still throwing particles with enthusiasm.
        SironaInSpaceHigh* = #GEPscience_bd_oso_SironaInSpaceHigh_01 // The radiation counter insists on being included in the solar report. You file it under “related concerns.”

        AirmedInSpaceLow* = #GEPscience_bd_oso_AirmedInSpaceLow_00 // Airmed’s sharp shadows make a perfect shutter; the sun’s limb looks jagged and unfriendly this far out.
        AirmedInSpaceLow* = #GEPscience_bd_oso_AirmedInSpaceLow_01 // The two-toned surface flashes by and the sensors briefly disagree about what counts as “sunlight.”
        AirmedInSpaceHigh* = #GEPscience_bd_oso_AirmedInSpaceHigh_00 // Out here, Airmed is a tiny marker under a red sky. Every solar gust gets a timestamp and a long silence.
        AirmedInSpaceHigh* = #GEPscience_bd_oso_AirmedInSpaceHigh_01 // Mission Control requests “real-time” solar activity. You send the most recent data you have—eventually.

        BorvoInSpaceLow* = #GEPscience_bd_oso_BorvoInSpaceLow_00 // Borvo’s thin haze steals a little of the red sun’s bite; the sensors measure what’s missing and call it “useful.”
        BorvoInSpaceLow* = #GEPscience_bd_oso_BorvoInSpaceLow_01 // Reflections off brown plains and pale clouds muddle the readings until you remember: everything down there is a filter.
        BorvoInSpaceHigh* = #GEPscience_bd_oso_BorvoInSpaceHigh_00 // High above Borvo, the solar data steadies; the star is dim, the background is quiet, and the numbers behave.
        BorvoInSpaceHigh* = #GEPscience_bd_oso_BorvoInSpaceHigh_01 // Subtle shifts appear as Borvo’s own field nudges charged particles into surprisingly tidy arcs.

        DamonaInSpaceLow* = #GEPscience_bd_oso_DamonaInSpaceLow_00 // Damona’s cratered horizon keeps eclipsing the sun; the sensors calmly keep counting through every blackout.
        DamonaInSpaceLow* = #GEPscience_bd_oso_DamonaInSpaceLow_01 // The red sun looks small from here, but the particle flux never got that message.
        DamonaInSpaceHigh* = #GEPscience_bd_oso_DamonaInSpaceHigh_00 // From high orbit, Damona is a grey speck and an ocean of night—excellent conditions for watching Grannus misbehave.
        DamonaInSpaceHigh* = #GEPscience_bd_oso_DamonaInSpaceHigh_01 // The data crawls home on a long link, but the flare signatures are unmistakable even at this distance.

        EponaInSpaceLow* = #GEPscience_bd_oso_EponaInSpaceLow_00 // Epona’s thin, cold air tints the red sunlight into a strange halo. The sensors insist it “counts.”
        EponaInSpaceLow* = #GEPscience_bd_oso_EponaInSpaceLow_01 // With only a weak field to help, the instruments log every charged gust and politely request thicker shielding.
        EponaInSpaceHigh* = #GEPscience_bd_oso_EponaInSpaceHigh_00 // From high over Epona, Grannus is a small ember with a big attitude. The particle graphs look offended.
        EponaInSpaceHigh* = #GEPscience_bd_oso_EponaInSpaceHigh_01 // The data packet takes ages to reach home. The flare it describes has already come and gone.

        RosmertaInSpaceLow* = #GEPscience_bd_oso_RosmertaInSpaceLow_00 // No air, no field, no mercy—just raw solar wind scraping across Rosmerta’s surface like sandpaper you can’t hear.
        RosmertaInSpaceLow* = #GEPscience_bd_oso_RosmertaInSpaceLow_01 // The sensors record a sharp spike during sunrise. “Sunrise” feels like an overstatement out here.
        RosmertaInSpaceHigh* = #GEPscience_bd_oso_RosmertaInSpaceHigh_00 // High above Rosmerta, Epona’s distant glow keeps sneaking into the optics and pretending it’s the sun.
        RosmertaInSpaceHigh* = #GEPscience_bd_oso_RosmertaInSpaceHigh_01 // The sun’s spectrum is clean and cold; the silence between updates is longer than the checklist.

        RAB-58EInSpaceLow* = #GEPscience_bd_oso_RAB-58EInSpaceLow_00 // RAB-58E flashes bright, then vanishes again. The observatory marks the glints as “unexpected calibration events.”
        RAB-58EInSpaceLow* = #GEPscience_bd_oso_RAB-58EInSpaceLow_01 // The star tracker loses confidence near the limb—this moonlet’s lumpy horizon keeps lying about where “up” is.
        RAB-58EInSpaceHigh* = #GEPscience_bd_oso_RAB-58EInSpaceHigh_00 // Out near the edge of Epona’s realm, the solar flux flickers oddly. Either the instruments drift, or something’s shadowing them.
        RAB-58EInSpaceHigh* = #GEPscience_bd_oso_RAB-58EInSpaceHigh_01 // The sun looks steady until you zoom in; tiny bursts ripple through the readings like someone tapping the line.

        CernunnosInSpaceLow* = #GEPscience_bd_oso_CernunnosInSpaceLow_00 // The dim red sun barely warms the detectors here, but the observatory still catches its tantrums—just smaller and lonelier.
        CernunnosInSpaceLow* = #GEPscience_bd_oso_CernunnosInSpaceLow_01 // You turn the gain way up and discover the universe has opinions in the noise floor.
        CernunnosInSpaceHigh* = #GEPscience_bd_oso_CernunnosInSpaceHigh_00 // From high orbit, Grannus is an ember in a black sea. The solar wind is thin, sharp, and patient.
        CernunnosInSpaceHigh* = #GEPscience_bd_oso_CernunnosInSpaceHigh_01 // The flare signature arrives after a long delay, like a postcard from a star that doesn’t know you’re listening.

        InSpaceHigh* = #GEPscience_TwoStarsDilemma_00 // You hesitate at the pointing controls. Which “sun” is the right one today? You ask Mission Control, then watch the comm timer tick upward.
        InSpaceHigh* = #GEPscience_TwoStarsDilemma_01 // Two suns, one telescope, and a narrow observation window. Mission Control promises an answer “as soon as possible,” which could be hours. Long enough for the opportunity to quietly move on without you.
	}
}