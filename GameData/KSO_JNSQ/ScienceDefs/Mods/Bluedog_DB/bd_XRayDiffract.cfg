@EXPERIMENT_DEFINITION:HAS[#id[bd_XRayDiffract]]
{
    %RESULTS
    {
        MohoSrfLanded* = #JNSQscience_bd_XRayDiffract_MohoSrfLanded_00 // The diffraction peaks are unusually sharp for a loose surface sample, with a higher fraction of coherent crystalline phases and less “smeared” background. You tag it as a relatively fresh exposure—either recently uncovered or recently compacted by intermittent shaking.
		MohoSrfLanded* = #JNSQscience_bd_XRayDiffract_MohoSrfLanded_01 // Multiple subsamples differ more than they should over such a short distance: one is dust-rich and peak-broadened, the next is clast-dominated with clean basaltic signatures. The transition fits a young fault trace that has been quietly sorting and reworking regolith.
		MohoSrfLanded* = #JNSQscience_bd_XRayDiffract_MohoSrfLanded_02 // A thin layer of bright grains shows minimal space-weathering features compared to the darker fines beneath. The mineral mix suggests newly fractured material mixed into the topmost surface during recent slip, then lightly dusted over again.
		MohoSrfLandedPoles* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedPoles_00 // The peaks come back sharp and stubbornly uniform—whatever frost survives here has been baked into a thin veneer over very tired rock.
		MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedPolarIceCraters_00 // Beneath the crusty dust, faint volatile signatures show up in the pattern as if the crater is hiding its “ice” in the crystal lattice itself.
		MohoSrfLandedCraters* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedCraters_00 // Pulverized impact breccia produces broad rings and smeared peaks; this crater has been ground down into a mineral smoothie.
		MohoSrfLandedExoticCraters* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedExoticCraters_00 // A few unexpected peaks spike out of the noise like they’ve got something to prove; the crater floor is keeping strange minerals on purpose.
		MohoSrfLandedRareCraters* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedRareCraters_00 // The diffractogram is mostly familiar silicates—until a set of tiny peaks appear that don’t want to be categorized.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedVoronoiCraters_00 // Recrystallized melt phases crowd the pattern with repeated, fractured signatures; whatever happened here cooled fast and stayed stressed.
		MohoSrfLandedNotableCraters* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedNotableCraters_00 // Several mineral families overlap in a messy chorus; this crater looks like it’s collected samples from half the planet.
		MohoSrfLandedPeaks* = #JNSQscience_bd_XRayDiffract_MohoSrfLandedPeaks_00 // High-pressure minerals and strained lattices suggest the peaks weren’t gently lifted—they were shoved upward and never forgave anyone.

		EveSrfLandedShores* = #JNSQscience_bd_XRayDiffract_EveSrfLandedShores_00 // Salty crystals and fine silicate grains dominate the plot, with a sticky haze in the background that implies the shoreline chemistry is “active.”
		EveSrfLandedKrakensWell* = #JNSQscience_bd_XRayDiffract_EveSrfLandedKrakensWell_00 // The pattern shows odd, unstable phases as if the sample was trying to rearrange itself mid-scan; you label the bag “DO NOT SHAKE.”

		KerbinSrfLandedAdministration* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAdministration_00 // Diffraction pattern reveals a complex lattice of toner, carpet grit, and tightly packed regret. The safety officer asks if “paperwork minerals” are on the approved list.
		KerbinSrfLandedAdministration* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAdministration_01 // You explain that “X-Ray Diffraction” will not let anyone see through walls, desks, or annual budgets. Administration requests you stop saying “X-Ray” in the lobby.
		KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAstronautComplex_00 // Your sample produces sharp peaks consistent with dried snack crystals and heroic amounts of lint. Someone requests you “diffract the couch” next, for science.
		KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAstronautComplex_01 // Several crew members line up asking if you can “just check the bones real quick.” You explain it’s for crystals, not Kerbals, and they look genuinely disappointed.
		KerbinSrfLandedCrawlerway* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedCrawlerway_00 // The crushed rock shows strong, orderly peaks—then a smeared band from mysterious track grease. You are told the grease is “structural” and therefore not to be analyzed.
		KerbinSrfLandedFlagPole* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedFlagPole_00 // The soil grains diffract neatly until the pattern suddenly aligns with the nearest guard’s glare. You label the anomaly “security-induced preferred orientation.”
		KerbinSrfLandedLaunchPad* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedLaunchPad_00 // The sample is half concrete dust, half scorched residue, all attitude. Radiation Control appears to remind you that “X-rays are not a visitor activity.”
		KerbinSrfLandedLaunchPad* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedLaunchPad_01 // The pad crew hears “X-ray” and immediately assumes you’re offering free diagnostics. You clarify it’s for dust; they point at the dust and ask if it has insurance.
		KerbinSrfLandedMissionControl* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMissionControl_00 // The diffraction peaks look normal until a supervisor leans in, then everything is classified as “operationally crystalline.” Your printout returns with the peaks blacked out.
		KerbinSrfLandedMissionControl* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMissionControl_01 // A flight controller asks if the unit can diagnose “pre-launch jitters.” You clarify it only diagnoses minerals; the room agrees minerals are less stressful.
		KerbinSrfLandedR&D* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&D_00 // Patterns indicate several known phases plus one that looks like it was invented yesterday. The scientist smiles and says, “Good, it’s still in one piece.”
		KerbinSrfLandedR&D* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&D_01 // Someone tries to wear the instrument like a visor “to see the hidden structure.” You demonstrate diffraction with a sample instead. They still ask if it works on snacks.
		KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DCentralBuilding_00 // The sample is so pure and uniform it feels pre-reviewed. Your results are rejected for not including Form 12-B: “Crystal Intent Declaration.”
		KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DCornerLab_00 // The diffraction pattern has extra peaks that only appear when nobody is watching. The lab door quietly locks itself as you reach for a second scan.
		KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DMainBuilding_00 // You find a confident signature of concrete, paint chips, and coffee grounds in a stable three-phase mixture. An engineer requests you “optimize the coffee phase.”
		KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DObservatory_00 // Fine dust yields delicate peaks that wobble with every footstep. The astronomer asks if you can diffract “more quietly.”
		KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DSideLab_00 // Your sample diffracts into a perfect pattern of “definitely normal,” which is extremely suspicious. Someone offers you a fresh sample and a nondisclosure form.
		KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DSmallLab_00 // Peaks are razor-sharp and unnervingly repeatable, as if the dirt was manufactured. The technician insists it is “artisan soil.”
		KerbinSrfLandedR&DTanks* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DTanks_00 // Diffraction shows metal oxides, dust, and a faint hint of “keep away.” The results are stamped and filed under “not a problem.”
		KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DWindTunnel_00 // The sample’s peaks smear into a beautiful arc the moment the fans spin up. You declare the new phase “aerodynamically distributed.”
		KerbinSrfLandedRunway* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedRunway_00 // Rubber flecks and runway grit produce broad peaks and a strong odor of landing. Ground crew asks whether the X-rays can also remove skid marks.
		KerbinSrfLandedSPH* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPH_00 // The pattern indicates aluminum shavings, primer dust, and a mysterious crystalline phase labeled “spare parts.” An engineer asks if it can be used to reinforce wings.
		KerbinSrfLandedSPH* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPH_01 // A technician asks if the machine can “X-ray the wing” to spot weak spots. You explain it’s not a medical device, nor a visor, nor a miracle. They quietly tape it near the wing anyway “just in case.”
		KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHMainBuilding_00 // Diffraction peaks jump every time a crane moves, like the sample is nervous. Safety declares your instrument “too curious for the hangar.”
		KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHRoundTank_00 // You diffract fluffy insulation fibers and get a pattern best described as “absolutely not.” A technician reminds you insulation is not a mineral deposit, legally.
		KerbinSrfLandedSPHTanks* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHTanks_00 // Paint chips yield a complex spectrum of pigments, binders, and questionable optimism. The foreman asks you to confirm the color is still “official.”
		KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHWaterTower_00 // Wet grit diffracts into clumpy, shifting peaks that change while you watch. You name the dominant phase “dripstone (KSC variant).”
		KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationDishEast_00 // Cable shielding dust gives clean peaks until the dish slews, then the whole pattern jitters. The technician blames “science interference.”
		KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationDishNorth_00 // The sample diffracts normally, but your radiation badge triggers three alarms anyway. The dish continues tracking you with professional disappointment.
		KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationDishSouth_00 // Gravel and compacted dust produce neat, disciplined peaks that refuse to surprise anyone. Your report is accepted immediately, which is unsettling.
		KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationHub_00 // Indoor dust yields peaks consistent with electronics, floor polish, and ancient snacks. The hub labels your sample “mission-critical debris” and reclaims it.
		KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationHub_01 // Security asks you to prove you’re not building an X-ray visor. You provide a diffraction pattern; they squint at it and say it still looks “too see-through.”
		KerbinSrfLandedVAB* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVAB_00 // Concrete powder and metal flakes produce a pattern with the strength of a thousand deadlines. An engineer asks if the diffraction peaks can be “made more vertical.”
		KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABMainBuilding_00 // The sample shows a classic signature of paint, steel, and hurry. Safety approves the result, then disapproves the method, then requests a copy.
		KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABMainBuilding_01 // An engineer requests an X-ray scan to find “mystery bolts” inside the rocket. You explain you can find crystal phases, not lost hardware. The engineer writes “crystals” on the missing-bolts checklist anyway.
		KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABPodMemorial_00 // Fine dust gives a quiet, steady pattern with no surprises. You take one respectful scan and put the machine away before anyone notices.
		KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABRoundTank_00 // The diffraction pattern contains a strong phase of “expensive coating” and a weak phase of “why are you here.” Security recommends you diffract something else.
		KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABSouthComplex_00 // Slag grains and grit produce jagged peaks that look like welding sparks on paper. You are handed a form titled “Hot Samples, Cold Excuses.”
		KerbinSrfLandedVABTanks* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABTanks_00 // Dust from the tank yard diffracts into a tidy record of traffic, storage, and panic. The result is filed as “normal operations, do not investigate.”
		KerbinSrfLandedKSC* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedKSC_00 // A general KSC sample yields an impossible mixture of concrete, paint, snack salt, and determination. Public Relations asks if you can make the peaks look “more inspiring.”
		KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedIslandAirfield_00 // Salty sand gives distinctive peaks plus a persistent damp background. The instrument begins to corrode in real time and requests a transfer.
		KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedBaikerbanur_00 // Dry dust produces crisp peaks and crisp paperwork. The local clerk stamps your diffraction plot for “authenticity.”
		KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedBaikerbanurLaunchpad_00 // Pad grit shows layered residues from many launches and many warnings. You are informed X-rays require a permit, a spotter, and fewer questions.
		KerbinSrfLandedWoomerang* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedWoomerang_00 // Windblown grit diffracts into peaks that wander between scans, as if trying to escape. You conclude the dominant mineral is “relocatable.”

        KerbinSrfLandedIceCaps* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedIceCaps_00 // The diffraction pattern is mostly sharp ice peaks with a gritty dust signature that suggests Kerbin is never really “clean.”
		KerbinSrfLandedHighlands* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedHighlands_00 // The scan shows familiar silicates with a stubborn mix of weathered grains; geology on Kerbin is surprisingly busy for such a comfy planet.
		KerbinSrfLandedMountains* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMountains_00 // Compressed, fractured rock throws slightly shifted peaks; the mountains look like they’ve been under stress for a very long time.
		KerbinSrfLandedShores* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedShores_00 // Sand-sized crystals line up beautifully in the data, plus a salty smear that Mission Control insists is “not from snacks.”
		KerbinSrfLandedMidlands* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMidlands_00 // A well-mixed spectrum of fine sediments and organic residue comes back; it’s basically dirt, but impressively catalogued dirt.
		KerbinSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedLowlands_00 // The instrument reports a clay-rich, water-worked signature; the lowlands seem to be where Kerbin keeps its best soil.
		KerbinSrfLandedAridLowlands* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridLowlands_00 // Dry powders produce broad, noisy peaks; whatever’s here has been ground down and sunbaked into stubborn uniformity.
		KerbinSrfLandedAridMidlands* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridMidlands_00 // Wind-sorted grains dominate the pattern, with a hint of evaporite minerals that scream “this used to be wetter.”
		KerbinSrfLandedAridHighlands* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridHighlands_00 // The diffractometer spots stressed crystal lattices and odd glassy phases; the bad-looking terrain has data to match.
		KerbinSrfLandedAridMountains* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridMountains_00 // High, dry rock shows multiple mineral phases as if it’s been cooked, cracked, and recooked; Kerbin’s “quiet” geology is bluffing.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_XRayDiffract_KerbinSrfLandedWelcomeBackIsland_00 // The sample is a chaotic mix of beach sand and young rock fragments; it’s like the island is saying hello in crystallography.

        MunSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_MunSrfLandedLowlands_00 // The diffraction peaks are broad and powdery, suggesting finely ground basaltic grains that have been pulverized into near-uniform dust.
		MunSrfLandedPolarIceCraters* = #JNSQscience_bd_XRayDiffract_MunSrfLandedPolarIceCraters_00 // Strong ice signatures jump out immediately; the shadows here seem to be hoarding volatiles like a very secret pantry.
		MunSrfLandedExoticCraters* = #JNSQscience_bd_XRayDiffract_MunSrfLandedExoticCraters_00 // The pattern shows impact-mixed silicates with an odd enrichment of heavy-metal phases, as if the crater kept a souvenir from whatever made it.
		MunSrfLandedRareCraters* = #JNSQscience_bd_XRayDiffract_MunSrfLandedRareCraters_00 // Dark, iron-heavy minerals dominate the scan, with faint traces of more exotic compounds that make the readout look uncomfortably confident.
		MunSrfLandedVoronoiCraters* = #JNSQscience_bd_XRayDiffract_MunSrfLandedVoronoiCraters_00 // Glassy impact melt and fused fragments smear several peaks; this sample clearly remembers being briefly liquid and very angry.
		MunSrfLandedNotableCraters* = #JNSQscience_bd_XRayDiffract_MunSrfLandedNotableCraters_00 // Multiple mineral populations overlap in the plot—one set metal-rich, another more basaltic—like two craters arguing in crystallography.
		MunSrfLandedMountains* = #JNSQscience_bd_XRayDiffract_MunSrfLandedMountains_00 // Stressed crystal lattices and jumbled breccia phases appear throughout; these “mountains” look like rubble that never got the memo to settle.

		MinmusSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedLowlands_00 // Bright, clean peaks indicate a calcium-and-aluminum-rich mix with plenty of carbonate phases; it’s almost suspiciously tidy for a moon.
		MinmusSrfLandedBasins* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBasins_00 // Hydrated carbonates and sparkly polymorphs dominate the flat terrain; the basins look like they were paved with mineral confetti.
		MinmusSrfLandedBrownBasins* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownBasins_00 // The familiar flatland carbonates are still here, but a darker silicate dust adds extra peaks and explains the “brown” attitude.
		MinmusSrfLandedBrownLowlands* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownLowlands_00 // The lowland carbonates persist, but they’re stained by iron-rich sheet minerals; the signature looks like mint rock with muddy fingerprints.
		MinmusSrfLandedBrownMidlands* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownMidlands_00 // Chlorite-like phases crowd the diffractogram with iron-heavy variations; whatever painted this region did it one crystal layer at a time.
		MinmusSrfLandedBrownHighlands* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownHighlands_00 // Dark grains carry both carbonate and iron-rich sheet minerals; the highlands read like the same recipe, just baked longer and dropped once.
		MinmusSrfLandedMountains* = #JNSQscience_bd_XRayDiffract_MinmusSrfLandedMountains_00 // Layered signals stack across the scan, suggesting deposits laid down in distinct episodes; Minmus’ slopes are a geological layer cake with bad frosting.

        DunaSrfLandedIceCaps* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedIceCaps_00 // The diffraction peaks shout “ice” first, then admit there’s dusty regolith and a thin crust of frozen volatiles trying to hide it.
		DunaSrfLandedCraters* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedCraters_00 // Shock-mixed fragments smear the pattern into a mess of glassy phases and pulverized rock; this crater has been processed thoroughly.
		DunaSrfLandedRareCraters* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedRareCraters_00 // A few small but stubborn peaks don’t match the usual crustal mix; either the impact dug deep, or Duna is keeping secrets down there.
		DunaSrfLandedVoronoiCraters* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedVoronoiCraters_00 // Recrystallized melt dominates the scan, with strained lattices that look like they cooled fast and never relaxed afterward.
		DunaSrfLandedNotableCraters* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedNotableCraters_00 // Several mineral families overlap as if the crater floor is a scrapbook of everything that’s landed here over time.
		DunaSrfLandedExoticCraters* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedExoticCraters_00 // The instrument detects unusual high-pressure phases mixed into the dust; whatever made this crater left a mineral signature with sharp edges.
		DunaSrfLandedTrenches* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedTrenches_00 // Fine-grained minerals line up like sorted sediments, with hints of altered phases that suggest this low path once moved more than just dust.
		DunaSrfLandedNotablePlains* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedNotablePlains_00 // The pattern is dominated by wind-sieved grains and crusty salts; the plains look like they’ve been patiently drying out for ages.
		DunaSrfLandedNotableMountains* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedNotableMountains_00 // Stressed crystals and tough, dark phases stand out; the mountains read like old rock that’s been lifted, cracked, and left to oxidize.
		DunaSrfLandedVolcano* = #JNSQscience_bd_XRayDiffract_DunaSrfLandedVolcano_00 // Fresh-looking crystalline peaks cut through the usual dusty background; this terrain seems less “weathered frontier” and more “recently assembled.”

		IkeSrfLandedPoles* = #JNSQscience_bd_XRayDiffract_IkeSrfLandedPoles_00 // Faint ice peaks ride on top of a plain silicate base; Ike’s poles are doing their best impression of “almost interesting.”
		IkeSrfLandedMountains* = #JNSQscience_bd_XRayDiffract_IkeSrfLandedMountains_00 // Fractured, stress-shifted peaks suggest hard rock that’s been shaken and shattered; these ridges look like they formed without any gentle steps.
		IkeSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_IkeSrfLandedLowlands_00 // Broad peaks from ultra-fine powder dominate the scan; the lowlands appear to be a deep blanket of regolith ground down by time.
		IkeSrfLandedHighlands* = #JNSQscience_bd_XRayDiffract_IkeSrfLandedHighlands_00 // Brighter mineral phases show up more strongly here, mixed with basaltic material; the highlands look slightly “cleaner,” but still very Ike.

        EdnaSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_EdnaSrfLandedLowlands_00 // The pattern is dominated by dark, fine-grained silicates with a carbon-rich “background haze” that makes Edna feel very old.
		EdnaSrfLandedMidlands* = #JNSQscience_bd_XRayDiffract_EdnaSrfLandedMidlands_00 // Broadened peaks suggest heavily weathered, micrometeoroid-churned powder; the minerals are familiar, just endlessly ground down.
		EdnaSrfLandedHighlands* = #JNSQscience_bd_XRayDiffract_EdnaSrfLandedHighlands_00 // Sharper peaks appear from tougher crystalline phases, as if the high ground is the only place the surface hasn’t been completely milled into dust.
		EdnaSrfLandedPolarIceCraters* = #JNSQscience_bd_XRayDiffract_EdnaSrfLandedPolarIceCraters_00 // Strong ice peaks jump out immediately, with faint signatures of trapped volatiles tucked into the mix like stolen treasure.
		EdnaSrfLandedWhites* = #JNSQscience_bd_XRayDiffract_EdnaSrfLandedWhites_00 // Bright deposits produce clean, intense peaks—either pristine frost or pale salts—both options are oddly unsettling out here.

		DakSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_DakSrfLandedLowlands_00 // The diffractogram looks like a bag of mixed gravel: silicates, metal flecks, and fractured crystals all shouting at once.
		DakSrfLandedMidlands* = #JNSQscience_bd_XRayDiffract_DakSrfLandedMidlands_00 // Broad, noisy peaks suggest a loosely bound rubble pile of pulverized rock; the sample behaves like it’s only pretending to be “ground.”
		DakSrfLandedHighlands* = #JNSQscience_bd_XRayDiffract_DakSrfLandedHighlands_00 // A few resilient mineral phases stand out with sharper peaks, hinting at tougher boulders poking through the otherwise chaotic regolith.

		DresSrfLandedMidlands* = #JNSQscience_bd_XRayDiffract_DresSrfLandedMidlands_00 // Pale, dry minerals dominate the scan with muted peaks, like Dres has carefully leached out anything interesting and kept only the basics.
		DresSrfLandedCanyon* = #JNSQscience_bd_XRayDiffract_DresSrfLandedCanyon_00 // Exposed layers return a cleaner, more varied pattern—freshly revealed crystals and breccia phases that the surface dust usually hides.

        LaytheSrfLandedShallows* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedShallows_00 // The diffraction pattern shows salty crusts mixed with wet sand minerals; Laythe is doing its best to turn your sample into brine-cement.
		LaytheSrfLandedHighlands* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedHighlands_00 // Wind-worked grains dominate the peaks, with a few odd phases that look like they’ve been repeatedly soaked, dried, and ground down again.
		LaytheSrfLandedMountains* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedMountains_00 // Stressed crystal lattices and tough silicate phases stand out; whatever built these heights didn’t do it gently.
		LaytheSrfLandedIceCaps* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedIceCaps_00 // Clean ice signatures tower over everything, but there’s a stubborn dust-and-salt fingerprint that says the caps aren’t as pure as they look.
		LaytheSrfLandedEnclosedFaults* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedEnclosedFaults_00 // Several peaks come back split and skewed, like the minerals are still “remembering” being bent, cracked, and shuffled along a fault.
		LaytheSrfLandedLowlands* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedLowlands_00 // Fine sediments produce broad, smooth peaks; the lowlands appear to be a deep blanket of well-mixed, water-processed grit.
		LaytheSrfLandedMidlands* = #JNSQscience_bd_XRayDiffract_LaytheSrfLandedMidlands_00 // A tidy mix of silicates and carbonate-like phases suggests long-term cycling; Laythe’s “middle ground” is quietly doing geology at scale.

		TyloSrfLandedPoles* = #JNSQscience_bd_XRayDiffract_TyloSrfLandedPoles_00 // The scan is mostly hard silicate minerals with faint volatile traces clinging on where the sunlight doesn’t; Tylo keeps its “soft” stuff well hidden.
