@EXPERIMENT_DEFINITION:HAS[#id[bd_multiSpec]]
{
	%RESULTS
	{
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowGrasslands_00 // Light is collected from farmlands in near infrared, green, and red wavebands that can be used to study irrigation efficiency and methods to reduce fertilizer and pesticide runoff.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowGrasslands_01 // The instrument measures light reflected from farmlands to analyze crop health and drought effects.
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowGrasslands_02 // Multispectral images are taken to study properties of ecosystems and plant life.
        KerbinInSpaceLowAridHighlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowBadlands_00 // Multispectral images are captured that can hopefully provide insight on how overgrazing, acid rain, and poor agricultural practices can cause the spread of anthropogenic badlands.
        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowDeserts_00 // The data collected from this instrument is used to collect data on errosion is contributing to the growth of deserts.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowNorthernIceShelf_00 // This instrument performs a thermal analysis to study the rate the polar ice caps are melting.
        KerbinInSpaceLowIceCaps* = #ScienceRefactor_bd_multiSpec_KerbinInSpaceLowSouthernIceShelf_00 // This instrument performs a thermal analysis to study the rate the polar ice caps are melting.
        
        MunInSpaceLowPolarIceCraters* = #ScienceRefactor_bd_multiSpec_MunInSpaceLowPolarCrater_00 // Multispectral and thermal imaging reveal these polar craters are cold enough to be able to maintain water ice in their shadowed areas. Further investigation is needed!
		
        DunaInSpaceLowIceCaps* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowPoles_00 // Multispectral analysis reveals high concentrations of surface water ice.
        DunaInSpaceLowMidlands* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowMidlandSea_00 // While it is theorized this region was once filled with liquid water, multispectral analysis shows little water ice, suggesting it is long gone.
        DunaInSpaceLowNotableMountains* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowNorthernShelf_00 // Multispectral spectrometry shows exceedingly higher concentrations of water ice than expected!
        DunaInSpaceLowNotablePlains* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowNortheastBasin_00 // Multispectral analysis reveals higher levels of water ice, suggesting subterranean water ice not far below the surface.
        DunaInSpaceLowNotablePlains* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowSouthernBasin_00 // Scans reveal an unexpectedly high amount of subsurface water ice just a few meters beneath the surface!
        DunaInSpaceLowNotablePlains* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowNorthernBasin_00 // Multispectral spectrometry suggests a higher than average concentration of subsurface water ice in this region.
        DunaInSpaceLowTrenches* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowWesternCanyon_00 // Surface composition conducted from light emissions and reflections indicate water was formerly present in this canyon. This further supports that once was a route where water flowed to the Northeast Basin.
        DunaInSpaceLowTrenches* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowMidlandCanyon_00 // Multispectral spectrometry analysis suggests traces of subsurface water ice underneath the canyon. Perhaps the melting of subterranean ice cause the surface to collapse forming the canyon?
        DunaInSpaceLowTrenches* = #ScienceRefactor_bd_multiSpec_DunaInSpaceLowEasternCanyon_00 // Surface composition conducted from light emissions and reflections indicate Duna's Eastern Canyon penetrates beneath the typical regolith, exposing more ancient bedrock. 
        
        DresInSpaceLowCanyon* = #ScienceRefactor_bd_multiSpec_DresInSpaceLowCanyons_00 // Thermal emission analysis show cooler temperatures in this canyon, likely due to the shadows cast by the canyon walls.

        LaytheInSpaceLowIceCaps* = #ScienceRefactor_bd_multiSpec_LaytheInSpaceLowPoles_00 // Multispectral spectrometry and thermal emission analyses suggest that Laythe's polar regions aren't cold enough to maintain consistently frozen polar ice caps. 
        
        EelooInSpaceLowCanyon* = #ScienceRefactor_bd_multiSpec_EelooInSpaceLowIceCanyons_00 // Spectral data collected from Eeloo's canyons puzzle scientists. While we expected tholins, it seems these brown regions might be radiation bombarded magnesium sulfate and sulfric acid salts, perhaps surfacing from a subterranean ocean.
    }
}