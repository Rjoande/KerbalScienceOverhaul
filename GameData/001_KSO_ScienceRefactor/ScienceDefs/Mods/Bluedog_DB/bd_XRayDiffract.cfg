        TyloSrfLandedCraters* = #ScienceRefactor_bd_XRayDiffract_TyloSrfLandedCraters_00 // Samples from the surface within this large crater are primarily fused breccia, a result of the extreme heating following a large impact event.
        TyloSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_TyloSrfLandedMidlands_00 // The bright coloring of Tylo's surface is caused by a combination of titanium dioxide and aluminum-rich silicates.
        TyloSrfLandedMaria* = #ScienceRefactor_bd_XRayDiffract_TyloSrfLandedMaria_00 // The darker surface composition of these low lying areas is made up primarily of iron- and titanium-rich basaltic minerals.
        TyloSrfLandedMara* = #ScienceRefactor_bd_XRayDiffract_TyloSrfLandedMara_00 // The darker surface composition of these low lying areas is made up primarily of iron- and titanium-rich basaltic minerals.
        TyloSrfLandedMajorCrater* = #ScienceRefactor_bd_XRayDiffract_TyloSrfLandedMajorCrater_00 // Samples from the surface within this large crater are primarily fused breccia, a result of the extreme heating following a large impact event.
        TyloSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_TyloSrfLandedHighlands_00 // A detailed x-ray diffraction analysis of this sample reveals mostly common silicate minerals.
        BopSrfLanded* = #ScienceRefactor_bd_XRayDiffract_BopSrfLanded_00 // Bop's surface is composed primarily of common silicates with no traces of any igneous rock, suggesting that it is most likely an asteroid captured by Jool's immense gravitational pull.
        BopSrfLandedWesternDepression* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedWesternDepression_00 // A very faint sign of several organic compounds is detected in analysis of this sample, it appears to present only in samples from the upper most layers of the surface; distributed similar to the way ejecta from an asteroid is scattered after impact.
        BopSrfLandedMinorDepressions* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedMinorDepressions_00 // X-ray analysis of this sample reveals some very curious carbon and nitrogen compounds; further study is warranted...
        BopSrfLandedRidges* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedRidges_00 // A few bright, aluminum-rich silicates are mixed in along with Bop's more common, darker minerals; a few traces of complex organic molecules are detected as well, but these are surely nothing but Kerbin-based contaminates...
        BopSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedPoles_00 // Hidden away in Bop's more recessed terrain are substantial amounts of water ice, kept in nearly constant shadow. A few curious carbon compounds are present here as well.
        BopSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedMidlands_00 // Bop's surface is composed primarily of common silicates with no traces of any igneous rock, suggesting that it is most likely an asteroid captured by Jool's immense gravitational pull.
        BopSrfLandedValley* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedValley_00 // X-ray analysis of this sample reveals some very curious carbon and nitrogen compounds; further study is warranted...
        BopSrfLandedPeaks* = #ScienceRefactor_bd_XRayDiffract_BopSrfLandedPeaks_00 // A few bright, aluminum-rich silicates are mixed in along with Bop's more common, darker minerals; a few traces of complex organic molecules are detected as well, but these are surely nothing but Kerbin-based contaminates...
        PolSrfLanded* = #ScienceRefactor_bd_XRayDiffract_PolSrfLanded_00 // Pol's vivid coloration is due to a number of interesting minerals found in its surface including the sulfur compounds gypsum and pyrite, calcite, iron oxide, and olivine.
        PolSrfLandedHeights* = #ScienceRefactor_bd_XRayDiffract_PolSrfLandedHeights_00 // Analysis of samples from Pol's mountainous regions reveal the presence of green and yellow calcite minerals along with traces of quartz.
        PolSrfLandedWastes* = #ScienceRefactor_bd_XRayDiffract_PolSrfLandedWastes_00 // X-ray analysis of this sample reveals the presence of the rare uranium mineral carnotite, which gives the surface a bright yellow coloring.
        PolSrfLandedDepressions* = #ScienceRefactor_bd_XRayDiffract_PolSrfLandedDepressions_00 // Several interesting components are discovered in this sample, including the blue-green phosphate mineral apatite, the sodium-rich silicate sodalite, and the sulfur compounds gypsum and pyrite.
        PolSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_PolSrfLandedLowlands_00 // Several interesting components are discovered in this sample, including the blue-green phosphate mineral apatite, the sodium-rich silicate sodalite, and the sulfur compounds gypsum and pyrite.
        PolSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_PolSrfLandedMidlands_00 // X-ray analysis of this sample reveals the presence of the rare uranium mineral carnotite, which gives the surface a bright yellow coloring.
        PolSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_PolSrfLandedHighlands_00 // Analysis of samples from Pol's mountainous regions reveal the presence of green and yellow calcite minerals along with traces of quartz.
        EelooSrfLanded* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLanded_00 // Analysis of Eeloo's surface shows a number of expected silicate minerals along with, well, now how something like that could be coating the entire planet...
        EelooSrfLandedScarring* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedScarring_00 // The dark scars scattered across Eeloo's surface are composed of nothing but alkali-rich silicate minerals, nothing out of the ordinary or unexpected.
        EelooSrfLandedCentralCrater* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedCentralCrater_00 // Analysis of this crater shows no signs typically expected in impact sites, such as surface melting or the presence of water or uncommon heavy metals.
        EelooSrfLandedPromontories* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedPromontories_00 // Only a very thin layer of the white powdery substance coats Eeloo's typical brownish surface; this layer should be returned home for... closer inspection.
        EelooSrfLandedAncientDepressions* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedAncientDepressions_00 // Samples from these low lying regions of Eeloo contain little remarkable features, they are mostly common silicate minerals.
        EelooSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedLowlands_00 // Hmm... that can't be right, something... odd is coating nearly the entire surface of the planet, there must be some interesting explanation for this...
        EelooSrfLandedGlaciers* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedGlaciers_00 // Samples from these low lying regions of Eeloo contain little remarkable features, they are mostly common silicate minerals.
        EelooSrfLandedIceCanyons* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedIceCanyons_00 // The dark scars scattered across Eeloo's surface are composed of nothing but alkali-rich silicate minerals, nothing out of the ordinary or unexpected.
        EelooSrfLandedCraters* = #ScienceRefactor_bd_XRayDiffract_EelooSrfLandedCraters_00 // Analysis of this crater shows no signs typically expected in impact sites, such as surface melting or the presence of water or uncommon heavy metals.

        HaleSrfLandedDarkRock* = #ScienceRefactor_bd_XRayDiffract_HaleSrfLandedDarkRock_00 // Analysis of a sample from Hale's surface reveals high concentrations of water ice mixed in with various silicates found in Sarnus' rings.
        HaleSrfLandedLightRock* = #ScienceRefactor_bd_XRayDiffract_HaleSrfLandedLightRock_00 // Samples from this area are composed mostly of water ice, probably accumulated from Sarnus' nearby rings.
        OvokSrfLandedDarkSurface* = #ScienceRefactor_bd_XRayDiffract_OvokSrfLandedDarkSurface_00 // The darker surface from a sample of Ovok's leading hemisphere is composed of highly charged water ice; the surface is most likely absorbing electrons that flow throughout Sarnus' magnetosphere.
        OvokSrfLandedPlains* = #ScienceRefactor_bd_XRayDiffract_OvokSrfLandedPlains_00 // X-ray analysis of Ovok's plains reveal nearly pure water ice, with only trace levels of some ammonia compounds.
        OvokSrfLandedScarring* = #ScienceRefactor_bd_XRayDiffract_OvokSrfLandedScarring_00 // Samples from this region consist mainly of water ice.
        SlateSrfLandedSlateanSupercontinent* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedSlateanSupercontinent_00 // A detailed X-ray analysis of this sample reveals a mix of sedimentary and igneous rocks; an expected finding in areas with volcanic activity and long-term exposure to liquids.
        SlateSrfLandedYahelMountains* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedYahelMountains_00 // The brown colored terrain contains the metamorphic minerals staurolite and garnet, rocks formed by the pressure created in tectonic processes.
        SlateSrfLandedSomborMountains* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedSomborMountains_00 // The surface is made up primarily of hard igneous minerals such as granite and other quartz rocks.
        SlateSrfLandedImpactCraters* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedImpactCraters_00 // The breccia found in this crater's basin contains minerals with several rare heavy metals.
        SlateSrfLandedSeabed* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedSeabed_00 // Analysis of the fine grained soil reveals it to be mostly quartz crystals, common sand, mixed in with various salts expected in a dried up seabed.
        SlateSrfLandedNorthernIslands* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedNorthernIslands_00 // Analysis of this sample reveals significant quantities of the igneous minerals olivine and pyroxene.
        SlateSrfLandedArchipelagos* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedArchipelagos_00 // The surface of this outcropping is composed almost entirely of basaltic magma.
        SlateSrfLandedMountNehelennia* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedMountNehelennia_00 // The diffraction patterns created during analysis of this sample reveal basaltic minerals that appear to still be in the process of cooling; this is a sign of very recent volcanic activity here.
        SlateSrfLandedFloodplains* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedFloodplains_00 // This sample contains a mixture of sedimentary and metamorphic minerals.
        SlateSrfLandedPoles* = #ScienceRefactor_bd_XRayDiffract_SlateSrfLandedPoles_00 // Samples drilled from below the surface contain a number of hydrated silicate minerals.
        TektoSrfLandedLakes* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedLakes_00 // Analysis of Tekto's oceans reveal they are composed primarily of ethane, with lower concentrations of methane and traces of propane, butane, nitrogen and benzene.
        TektoSrfLandedMudflats* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedMudflats_00 // The wet soil of these regions is composed of common silicates saturated with liquid ethane and methane.
        TektoSrfLandedCalderas* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedCalderas_00 // Various basaltic minerals are present in this sample, an indication of possible volcanic activity.
        TektoSrfLandedOutcrops* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedOutcrops_00 // X-ray analysis of this sample suggests that it is part of Tekto's exposed bedrock, with relatively little of the hydrocarbons present on most of the surface.
        TektoSrfLandedPlateaus* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedPlateaus_00 // The greenish color in the soil from this sample is due to relatively high levels of iron-rich chlorite and the igneous mineral olivine.
        TektoSrfLandedStrands* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedStrands_00 // Mixed in with various frozen hydrocarbons are several silicate minerals.
        TektoSrfLandedSlopes* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedSlopes_00 // The loose soil in this sample is primarily fine grained silicates, most likely weathered by liquid hydrocarbons.
        TektoSrfLandedGeologicalAnomaly* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedGeologicalAnomaly_00 // X-ray analysis of a sample from this oddly shaped island reveals several unexplainable diffraction patterns...
        TektoSrfLandedPolarRifts* = #ScienceRefactor_bd_XRayDiffract_TektoSrfLandedPolarRifts_00 // Analysis of a sample from Tekto's strange polar region reveals several basaltic silicate minerals, probably a result of some kind of tectonic activity.
        PoltaSrfLanded* = #ScienceRefactor_bd_XRayDiffract_PoltaSrfLanded_00 // X-ray analysis of Polta reveals the surface to be composed mostly of water ice mixed with various silicate minerals.
        PoltaSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_PoltaSrfLandedHighlands_00 // The surface here is composed mostly of water ice with traces of several sulfur compounds, giving it a faint green tint.
        PoltaSrfLandedHighlandDepressions* = #ScienceRefactor_bd_XRayDiffract_PoltaSrfLandedHighlandDepressions_00 // Several interesting components are discovered in this sample, including the blue-green phosphate mineral apatite, the sodium-rich silicate sodalite, and the sulfur compounds gypsum and pyrite.
        PriaxSrfLandedLeadingSide* = #ScienceRefactor_bd_XRayDiffract_PriaxSrfLandedLeadingSide_00 // Priax's leading hemisphere contains high concentrations of the relatively bright, aluminum-rich plagioclase feldspar minerals, which make this area somewhat lighter than other areas of the surface.
        PriaxSrfLandedLeadingCraters* = #ScienceRefactor_bd_XRayDiffract_PriaxSrfLandedLeadingCraters_00 // X-ray analysis of the heavily cratered terrain of Priax reveals mostly silicate minerals, along with a number of interesting sulfur compounds.
        PriaxSrfLandedTrailingSide* = #ScienceRefactor_bd_XRayDiffract_PriaxSrfLandedTrailingSide_00 // The loosely packed surface in this area is made up primarily of finely ground feldspar minerals.
        PriaxSrfLandedTrailingCraters* = #ScienceRefactor_bd_XRayDiffract_PriaxSrfLandedTrailingCraters_00 // The aluminum-rich silicates present in this sample also contain a number of heavy metal impurities, possibly seeded here by an asteroid impact.
        WalSrfLandedEquatorialRidge* = #ScienceRefactor_bd_XRayDiffract_WalSrfLandedEquatorialRidge_00 // Several mafic igneous minerals of the type normal found in a planet's mantle layer are discovered during analysis of Wal's equatorial ridge.
        WalSrfLanded* = #ScienceRefactor_bd_XRayDiffract_WalSrfLanded_00 // Wal's vivid coloration is due to a number of interesting minerals found in its surface including numerous sulfur compounds, calcite, iron oxide, and olivine.
        WalSrfLandedEquatorialCraters* = #ScienceRefactor_bd_XRayDiffract_WalSrfLandedEquatorialCraters_00 // A thin layer of bright, yellowish sulfur dioxide covers rocky terrain below, composed mostly of common terrestrial silicates.
        WalSrfLandedPolarCraters* = #ScienceRefactor_bd_XRayDiffract_WalSrfLandedPolarCraters_00 // X-ray analysis reveals numerous salt compounds along with several hydrated silicates and small amounts of pure water ice.
        TalSrfLanded* = #ScienceRefactor_bd_XRayDiffract_TalSrfLanded_00 // High levels of water ice and traces of various hydrated silicates are detected in X-ray analysis of this sample.
        ThatmoSrfLanded* = #ScienceRefactor_bd_XRayDiffract_ThatmoSrfLanded_00 // The surface of Thatmo has very high concentrations of water, both in relatively pure ice and in various hydrated minerals.
        NisseeSrfLanded* = #ScienceRefactor_bd_XRayDiffract_NisseeSrfLanded_00 // A number of common silicate minerals are detected in analysis of Nissee's surface. The lack of any hydrated minerals suggests that the moon has little to no sub-surface water.
        PlockSrfLanded* = #ScienceRefactor_bd_XRayDiffract_PlockSrfLanded_00 // Analysis of a sample from Plock's surface reveals high concentrations of water ice mixed in with various silicates.
        KarenSrfLanded* = #ScienceRefactor_bd_XRayDiffract_KarenSrfLanded_00 // Hydrated silicates and dark tholin compounds are detected in abundance on the surface of Karen.
        MercurySrfLanded* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLanded_00 // X-ray analysis of the surface of Mercury reveals a number of low-iron basaltic minerals which appear to have been formed under extremely reducing conditions.
        MercurySrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLandedLowlands_00 // The x-ray diffraction pattern generated by analysis of this sample reveals a high concentration of magnesium-rich basalt and a number of minerals generally found in the upper mantle layers, such as enstatite and kanoite.
        MercurySrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLandedHighlands_00 // This terrain is composed primarily of plagioclase feldspar and extremely iron-poor basalt, giving Mercury its dull brownish-grey coloration.
        MercurySrfLandedPolarCraters* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLandedPolarCraters_00 // Mercury's deep polar craters contains a number of basaltic minerals laced with various heavy metals.
        MercurySrfLandedPlanitia* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLandedPlanitia_00 // Mercury's high plains are composed of igneous material rich in iron-poor basalt and the reduced sulfur mineral oldhamite.
        MercurySrfLandedOldCraters* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLandedOldCraters_00 // The basin of this enormous crater appears to have been filled in with ancient lava flows; this lava is magnesium-rich and most likely formed at very high temperatures with very low viscosity.
        MercurySrfLandedYoungCraters* = #ScienceRefactor_bd_XRayDiffract_MercurySrfLandedYoungCraters_00 // The surface of this shallow crater contains higher than expected levels of iron and other heavy metals; these elements were most likely seeded by the asteroid that impacted here.
        VenusSrfLanded* = #ScienceRefactor_bd_XRayDiffract_VenusSrfLanded_00 // The mineral composition of Venus is broadly similar to other terrestrial planets; it is composed primarily of rocky silicates and magnesium- and iron-rich igneous rocks.
        VenusSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_VenusSrfLandedLowlands_00 // The surface here is mostly the remains of old lava flows, being composed primarily of iron-rich basaltic rock.
        VenusSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_VenusSrfLandedHighlands_00 // A coating of the iron minerals pyrite and magnetite are detected in x-ray analysis of this highland area, giving the surface a relatively bright color.
        VenusSrfLandedCanyons* = #ScienceRefactor_bd_XRayDiffract_VenusSrfLandedCanyons_00 // The canyons here may have been carved by very high viscosity lava flows made up of the magnesium-rich volcanic rock komatiite.
        VenusSrfLandedFortunaTessera* = #ScienceRefactor_bd_XRayDiffract_VenusSrfLandedFortunaTessera_00 // The surface here bears signs of ancient liquid sulfur lava flows.
        VenusSrfLandedVolcanicRise* = #ScienceRefactor_bd_XRayDiffract_VenusSrfLandedVolcanicRise_00 // High-potassium basaltic rocks are found in this area; these are a sign of differentiation in the planet's interior.
        MoonSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedLowlands_00 // Several heavy metal compounds are discovered in x-ray analysis of this sample, a number of which are radioactive.
        MoonSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedHighlands_00 // Analysis reveals that the bright Lunar highlands are made up of aluminum- and calcium-rich feldspar crystals, mostly with very little iron and titanium content.
        MoonSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedMidlands_00 // This sample contains a variety of glassy breccia minerals, formed when the violent impact of an asteroid fuses multiple minerals together.
        MoonSrfLandedLunarSeas* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedLunarSeas_00 // The Lunar surface in these low-elevation regions shows signs of ancient volcanic activity along with much higher concentrations of olivine and pyroxene, normally expected to be found only deep in the mantle layer.
        MoonSrfLandedMajorCraters* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedMajorCraters_00 // The minerals in this crater show signs of the rapid melting associated with an asteroid or comet impact.
        MoonSrfLandedFarSideBasin* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedFarSideBasin_00 // A number of iridium compounds are detected in x-ray analysis of samples from this basin, most of which was likely deposited here by an asteroid impact.
        MoonSrfLandedNorthPole* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedNorthPole_00 // Traces of nearly pure water ice are detected in analysis of this sample. This area is sheltered from the sun most of the time, allowing the water ice to persist.
        MoonSrfLandedSouthPole* = #ScienceRefactor_bd_XRayDiffract_MoonSrfLandedSouthPole_00 // A number of hydrated silicates are discovered in this sample, a sure sign that relatively large amounts of water exist on the Lunar surface.
        MarsSrfLanded* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLanded_00 // X-ray analysis of the surface reveals the presence of various so-called secondary, or alteration minerals, those formed in the presence of water, suggesting that this may have been part of an ancient lake bed.
        MarsSrfLandedMidlands* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedMidlands_00 // Initial analysis of Mars' surface reveals mostly basaltic rock along with several hydrated silicates, sulfates and a coating of iron oxide, giving the surface its rusty coloration.
        MarsSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedHighlands_00 // A number of interesting trace minerals are detected in x-ray analysis of this sample, including hematite and goethite, iron oxide minerals known to form in the presence of water.
        MarsSrfLandedOlympusMons* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedOlympusMons_00 // A thick coating of basaltic lava is found in during analysis of the volcano.
        MarsSrfLandedVallesMarineris* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedVallesMarineris_00 // Analysis of this sample reveals relatively few hydrated minerals, it is composed primarily of basaltic rock; this is possibly an indication that this deep fissure was formed by an ancient rift valley, a sign of a more geologically active past for Mars.
        MarsSrfLandedAreanMountains* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedAreanMountains_00 // Mars' mountainous areas are rich in basaltic minerals, a possible sign of volcanic origin.
        MarsSrfLandedAreanCanyons* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedAreanCanyons_00 // Very high concentrations of hydrated sulfur-rich minerals, primarily gypsum and kieserite, are found in analysis of this canyon area, an indication of an ancient body of surface water.
        MarsSrfLandedNorthIceCap* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedNorthIceCap_00 // Mars' North Pole consists mostly of pure water ice with a layer of frozen carbon dioxide on top
        MarsSrfLandedSouthIceCap* = #ScienceRefactor_bd_XRayDiffract_MarsSrfLandedSouthIceCap_00 // The southern polar region of Mars is covered by a thick layer of water ice and carbon dioxide ice, obscuring any analysis of the soil below.
        DeimosSrfLanded* = #ScienceRefactor_bd_XRayDiffract_DeimosSrfLanded_00 // A number of common silicate minerals are detected in analysis of Deimos' surface. The lack of any igneous rocks attests to the complete lack of any internal heating processes and suggest that it may be a captured asteroid.
        DeimosSrfLandedHighlands* = #ScienceRefactor_bd_XRayDiffract_DeimosSrfLandedHighlands_00 // Deimos' highland regions contain higher concentrations of the relatively bright, aluminum-rich plagioclase feldspar minerals, which make this area somewhat lighter than other areas of the surface.
        DeimosSrfLandedLowlands* = #ScienceRefactor_bd_XRayDiffract_DeimosSrfLandedLowlands_00 // A number of alkali feldspar silicates are present in this sample; these minerals provide Deimos' low lying areas with their dark brown coloration.
        PhobosSrfLanded* = #ScienceRefactor_bd_XRayDiffract_PhobosSrfLanded_00 // The loosely packed surface in this area is made up primarily of finely ground feldspar minerals.
        PhobosSrfLandedMajorCraters* = #ScienceRefactor_bd_XRayDiffract_PhobosSrfLandedMajorCraters_00 // The aluminum-rich silicates present in this sample also contain a number of heavy metal impurities, possibly seeded here by an asteroid impact.
        PhobosSrfLandedStickneyCrater* = #ScienceRefactor_bd_XRayDiffract_PhobosSrfLandedStickneyCrater_00 // The x-ray diffraction pattern from this sample reveals several hydrated silicate minerals along with a few traces of pure water ice.
        PhobosSrfLandedGrooves* = #ScienceRefactor_bd_XRayDiffract_PhobosSrfLandedGrooves_00 // The grooved terrain of this area is composed primarily of feldspar minerals, but also contains relatively high concentrations of pyroxene, normally found in deeper mantle layers.
