@EXPERIMENT_DEFINITION:HAS[#id[MCE]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_MCE_GrannusInSpaceLow_00 // The MCE suite tries to run a normal checkout, but the HDTV feed is nothing but red glare and optimistic static while the COTS boxes quietly start re-evaluating their life choices.
        GrannusInSpaceHigh* = #GEPscience_MCE_GrannusInSpaceHigh_00 // With Grannus smaller but still glaring, ISS-IMAP stitches together a respectable brightness map and GLIMS flags “transient flashes” that are mostly radiation hits arriving long before any reply from Mission Control.

        TaranisInSpaceLow* = #GEPscience_MCE_TaranisInSpaceLow_00 // Low over Taranis, the day side looks like it’s trying to glow through the camera housing while the night side is a black hole for exposure settings; the robotics test logs “lubricant uncertainty” and then stops elaborating.
        TaranisInSpaceHigh* = #GEPscience_MCE_TaranisInSpaceHigh_00 // From higher up, ISS-IMAP draws a clean line between incandescence and darkness, and the inflatable demo spends the whole pass alternately stiffening and relaxing like it can’t decide which hemisphere it prefers.

        ToutatisInSpaceLow* = #GEPscience_MCE_ToutatisInSpaceLow_00 // The HDTV system catches a thin, hazy limb and harsh surface contrast while GLIMS insists it saw a faint upper-atmosphere flicker; everyone agrees to call it “interesting” until the delayed telemetry says otherwise.
        ToutatisInSpaceHigh* = #GEPscience_MCE_ToutatisInSpaceHigh_00 // From high orbit the map looks orderly, but the MCE radiation logs keep adding little asterisks to every “COTS survived” note, as if Toutatis is grading the hardware with a very small, very stern pencil.

        NodensInSpaceLow* = #GEPscience_MCE_NodensInSpaceLow_00 // The MCE suite stares down at Nodens’ thick air and stubborn clouds; ISS-IMAP draws weather bands while GLIMS keeps “seeing sprites” that turn out to be the HDTV sensor complaining about the red sun’s glare.
        NodensInSpaceHigh* = #GEPscience_MCE_NodensInSpaceHigh_00 // From high orbit the mapping finally looks calm and global, but every packet takes ages to come back, so the COTS boxes finish their self-tests long before Mission Control finishes reading the first page.

        BelisamaInSpaceLow* = #GEPscience_MCE_BelisamaInSpaceLow_00 // Low over Belisama, the surface swings from blinding to pitch-black in a few minutes; the HDTV test footage is dramatic, and the robotics demo learns that “tidally-locked” still means the Sun can sneak up on you.
        BelisamaInSpaceHigh* = #GEPscience_MCE_BelisamaInSpaceHigh_00 // From high orbit, Belisama and Nodens sit like a paired exhibit under dim red light; ISS-IMAP maps contrasts cleanly, and the survivability log notes that “normal radiation” still feels personal out here.

        SucellusInSpaceLow* = #GEPscience_MCE_SucellusInSpaceLow_00 // Close to Sucellus, everything is sharp, cold, and very quiet; the inflatable structure test stays inflated, the camera stays focused, and GLIMS reports nothing at all—almost suspiciously.
        SucellusInSpaceHigh* = #GEPscience_MCE_SucellusInSpaceHigh_00 // Higher up, the planet-wide survey looks orderly until the radiation monitor starts adding extra digits; the COTS hardware keeps running anyway, as if stubbornness were a valid shielding strategy.

        CaireenInSpaceLow* = #GEPscience_MCE_CaireenInSpaceLow_00 // In low orbit of tiny Caireen, the spacecraft keeps nudging itself into “not-crashing” mode while the HDTV camera tries to track a lumpy horizon; the radiation hits make the image sparkle like it’s trying to be festive.
        CaireenInSpaceHigh* = #GEPscience_MCE_CaireenInSpaceHigh_00 // From far above, Caireen is barely a target and mostly a math problem; the MCE suite still produces a complete dataset, then waits in silence for the long, delayed “good job” from home.

        SironaInSpaceLow* = #GEPscience_MCE_SironaInSpaceLow_00 // Low over Sirona, ISS-IMAP tries to turn towering cloud bands into tidy tiles while the HDTV test keeps catching the ring-glint and washing the whole frame in dim red glare.
        SironaInSpaceHigh* = #GEPscience_MCE_SironaInSpaceHigh_00 // From high orbit, the suite finally gets a full-disk map; the COTS avionics pass their checks and then sit quietly for the long, delayed acknowledgement from far away.

        AirmedInSpaceLow* = #GEPscience_MCE_AirmedInSpaceLow_00 // Close to Airmed, the camera stares past a sharp horizon and keeps finding Sirona filling half the sky; REX-J logs steady actuator response while the instruments argue over whether “violent history” is a measurable parameter.
        AirmedInSpaceHigh* = #GEPscience_MCE_AirmedInSpaceHigh_00 // From higher up, the survey looks orderly until the environment monitor starts peppering the dataset with tiny errors; the report labels them “space weather” and hopes nobody asks which kind.

        BorvoInSpaceLow* = #GEPscience_MCE_BorvoInSpaceLow_00 // Low over Borvo, the HDTV test shows hard contrast and long shadows that don’t behave like home; the inflatable demo holds pressure, but the thermal readings insist the cold is trying to make a point.
        BorvoInSpaceHigh* = #GEPscience_MCE_BorvoInSpaceHigh_00 // From high orbit, ISS-IMAP outlines broad, pale swaths and darker seams while GLIMS reports nothing at all—just the quiet hum of hardware surviving under a distant red sun.

        DamonaInSpaceLow* = #GEPscience_MCE_DamonaInSpaceLow_00 // Damona’s lumpy horizon slips by quickly; REX-J compensates for tiny attitude nudges while the camera stretches exposures until the image starts sparkling with radiation hits.
        DamonaInSpaceHigh* = #GEPscience_MCE_DamonaInSpaceHigh_00 // From far above, Damona is mostly a target dot and a lot of empty; the MCE suite completes its checklist anyway, then waits in silence for the reply that takes forever to arrive.

        EponaInSpaceLow* = #GEPscience_MCE_EponaInSpaceLow_00 // The MCE suite runs its COTS checkout while ISS-IMAP traces broad cloud swirls; GLIMS flags a few sharp flashes on the nightside, and the HDTV test records them as “definitely something, probably not a bug.”
        EponaInSpaceHigh* = #GEPscience_MCE_EponaInSpaceHigh_00 // From high orbit, the full-disk map comes together under dim red light, and the survivability log notes that “commercial grade” still counts as “space grade” if you squint through enough radiation noise.

        RosmertaInSpaceLow* = #GEPscience_MCE_RosmertaInSpaceLow_00 // Low over Rosmerta, the surface looks brittle and ignored; SIMPLE stays inflated but creaks in the thermal swings, and REX-J moves like it’s afraid to wake the moon up.
        RosmertaInSpaceHigh* = #GEPscience_MCE_RosmertaInSpaceHigh_00 // From up here Rosmerta becomes a small, cold tally mark beside Epona; ISS-IMAP can only sketch broad contrast, and the telemetry delay makes even the “all systems nominal” feel lonely.

        RAB-58EInSpaceLow* = #GEPscience_MCE_RAB-58EInSpaceLow_00 // RAB-58E refuses to be a tidy target—its lumpy horizon whips past while the HDTV camera jitters, and the robotics demo quietly proves that “staying pointed” is also a survivability test.
        RAB-58EInSpaceHigh* = #GEPscience_MCE_RAB-58EInSpaceHigh_00 // High above the moonlet, the MCE instruments mostly measure emptiness and background hits; the report comes back with a neat dataset and a long pause where an explanation should be.

        CernunnosInSpaceLow* = #GEPscience_MCE_CernunnosInSpaceLow_00 // Close to Cernunnos, the scene is all dark expanses and stark seams; ISS-IMAP maps faint, uneven brightness while GLIMS keeps logging tiny flashes that might be real—or might just be the red sun and charged particles conspiring.
        CernunnosInSpaceHigh* = #GEPscience_MCE_CernunnosInSpaceHigh_00 // From high orbit, Cernunnos looks like a quiet border outpost of the system; the MCE suite finishes its checklist, then waits through the long comm lag for someone far away to agree it actually happened.
    }
}