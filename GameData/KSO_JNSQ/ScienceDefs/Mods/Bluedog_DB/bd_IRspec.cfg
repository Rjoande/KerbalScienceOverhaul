@EXPERIMENT_DEFINITION:HAS[#id[bd_IRspec]]
{
    %RESULTS
    {
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_IRspec_SunInSpaceLowNorthPolarZone_00 // The polar band reads slightly dimmer in IR: the star’s edge looks cooler and strangely calm.
		SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_IRspec_SunInSpaceLowNorthSubpolarZone_00 // A mottled pattern drifts through the scan, like warm freckles sliding under a brighter skin.
		SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_IRspec_SunInSpaceLowNorthTemperateZone_00 // The spectrum steadies out here—still extreme, but with fewer sudden spikes and dropouts.
		SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_IRspec_SunInSpaceLowNorthTropicZone_00 // Thin bright streaks flare in the instrument, forcing it to blink and pretend nothing happened.
		SunInSpaceLowEquatorialZone* = #JNSQscience_bd_IRspec_SunInSpaceLowEquatorialZone_00 // The IR signature is intense and noisy: it’s like trying to take a temperature with a blowtorch.
		SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_IRspec_SunInSpaceLowSouthTropicZone_00 // A chain of bright knots scrolls past: the readout writes “HOT” so many times it runs out of ink.
		SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_IRspec_SunInSpaceLowSouthTemperateZone_00 // The spectrum shows a broad, even glow with occasional dark dips.
		SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_IRspec_SunInSpaceLowSouthSubpolarZone_00 // The limb cools off faster than expected: the edge looks like it’s wearing an infrared coat.
		SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_IRspec_SunInSpaceLowSouthPolarZone_00 // The scan returns a stark gradient toward the pole: the numbers are still ridiculous, just more orderly.

		MohoInSpaceLowPoles* = #JNSQscience_bd_IRspec_MohoInSpaceLowPoles_00 // The poles flash between blistering sun and deep cold shadow: the spectrum can’t decide if it’s sweating or shivering.
		MohoInSpaceLowLowlands* = #JNSQscience_bd_IRspec_MohoInSpaceLowLowlands_00 // Broad flats hold heat longer: the IR curve suggests smoother, denser ground that likes to stay toasty.
		MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_IRspec_MohoInSpaceLowPolarIceCraters_00 // Shadowed crater interiors come back unnaturally dark in IR, with faint hints of something that does not want to warm up.
		MohoInSpaceLowHighlands* = #JNSQscience_bd_IRspec_MohoInSpaceLowHighlands_00 // The highlands heat fast and cool faster: the spectrum looks like a sawblade of day-night extremes.
		MohoInSpaceLowMidlands* = #JNSQscience_bd_IRspec_MohoInSpaceLowMidlands_00 // A messy mix of warm slopes and cold hollows paints the scan like a heat-map someone crumpled up.
		MohoInSpaceLowCraters* = #JNSQscience_bd_IRspec_MohoInSpaceLowCraters_00 // Crater rims glow while floors lag behind: thermal inertia draws every impact scar in crisp detail.
		MohoInSpaceLowExoticCraters* = #JNSQscience_bd_IRspec_MohoInSpaceLowExoticCraters_00 // The IR bands don’t match the surrounding terrain: either the rock is different or the crater is showing off.
		MohoInSpaceLowRareCraters* = #JNSQscience_bd_IRspec_MohoInSpaceLowRareCraters_00 // These craters stay cooler longer than they should: the regolith here seems unusually fluffy and insulating.
		MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_IRspec_MohoInSpaceLowVoronoiCraters_00 // Polygon patterns appear as alternating warm-cool cells, like the surface was tiled by a meticulous heat demon.
		MohoInSpaceLowNotableCraters* = #JNSQscience_bd_IRspec_MohoInSpaceLowNotableCraters_00 // One standout crater throws a sharp thermal shadow: the rim stays hot while the floor sulks in the cold.
		MohoInSpaceLowPeaks* = #JNSQscience_bd_IRspec_MohoInSpaceLowPeaks_00 // Peaks blaze in sunlight and vanish into cold the moment they cast a shadow: the spectrum looks offended by the contrast.

        EveInSpaceLowPoles* = #JNSQscience_bd_IRspec_EveInSpaceLowPoles_00 // The IR signature is muted and cold; the cloud tops here look like they’re holding their breath.
		EveInSpaceLowLowlands* = #JNSQscience_bd_IRspec_EveInSpaceLowLowlands_00 // Warmth leaks upward in broad bands, but most of the signal gets swallowed by the thick purple air.
		EveInSpaceLowMidlands* = #JNSQscience_bd_IRspec_EveInSpaceLowMidlands_00 // The spectrum shows a smeared thermal gradient, like someone tried to blur the planet with a heat gun.
		EveInSpaceLowHighlands* = #JNSQscience_bd_IRspec_EveInSpaceLowHighlands_00 // Cooler cloud-top temperatures dominate; whatever is down below is only hinted at through absorption bands.
		EveInSpaceLowPeaks* = #JNSQscience_bd_IRspec_EveInSpaceLowPeaks_00 // Sharp, bright spikes flicker in the scan—thin spots in the clouds briefly revealing hotter ground.
		EveInSpaceLowExplodiumSea* = #JNSQscience_bd_IRspec_EveInSpaceLowExplodiumSea_00 // The sea reads strangely uniform in IR; the atmosphere above it does a great job of hiding the details.
		EveInSpaceLowMountains* = #JNSQscience_bd_IRspec_EveInSpaceLowMountains_00 // Hot sunward slopes and cold shadows fight through the haze; the spectrometer reports “mostly fog, some rock.”
		EveInSpaceLowShores* = #JNSQscience_bd_IRspec_EveInSpaceLowShores_00 // A thin thermal rim outlines the coast, then vanishes under the next layer of cloud like it never existed.
		EveInSpaceLowPolarLakes* = #JNSQscience_bd_IRspec_EveInSpaceLowPolarLakes_00 // Small cold pools show up as dim patches beneath a frosty veil of cloud-top chill.
		EveInSpaceLowPetrolLakes* = #JNSQscience_bd_IRspec_EveInSpaceLowPetrolLakes_00 // The scan catches a faint, oily warmth signature; Mission Control writes “please don’t land in that.”
		EveInSpaceLowSeaofAkron* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofAkron_00 // Broad mid-IR bands suggest steady heat storage; the cloud deck smooths it into a calm glow.
		EveInSpaceLowSeaofNessus* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofNessus_00 // The spectrum dips and rises in slow waves, like the sea is breathing under the atmosphere.
		EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofTaniwha_00 // A mottled thermal texture appears, then gets erased by shifting cloud shadows.
		EveInSpaceLowSeaofGigan* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofGigan_00 // Bright streaks cut across the scan. Warm currents, or the instrument flinching. Hard to tell.
		EveInSpaceLowSeaofRodan* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofRodan_00 // The IR return is warmer along one edge, hinting at persistent winds or upwelling below.
		EveInSpaceLowSeaofGojira* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofGojira_00 // A broad hot spot winks through the haze; it looks like something down there is stubbornly not cooling off.
		EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofGhidorah_00 // Three distinct warm bands appear in sequence; everyone pretends it’s just coincidence.
		EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_IRspec_EveInSpaceLowSeaofBagorah_00 // The spectrum is oddly “clean” here: less noise, more signal. Like the clouds briefly stop being rude.
		EveInSpaceLowKrakensWell* = #JNSQscience_bd_IRspec_EveInSpaceLowKrakensWell_00 // A spiraling thermal anomaly curls under the cloud tops; the data file is automatically tagged “NOPE.”

		GillyInSpaceLowLowlands* = #JNSQscience_bd_IRspec_GillyInSpaceLowLowlands_00 // Gilly heats up instantly in sunlight; the IR curve jumps like it’s startled.
		GillyInSpaceLowMidlands* = #JNSQscience_bd_IRspec_GillyInSpaceLowMidlands_00 // Patchy temperatures trace the lumpy shape; the spectrometer basically maps “bump” versus “shadow.”
		GillyInSpaceLowHighlands* = #JNSQscience_bd_IRspec_GillyInSpaceLowHighlands_00 // Exposed ridges run hot, then drop to deep cold as soon as they turn away from the sun.

        KerbinInSpaceLowIceCaps* = #JNSQscience_bd_IRspec_KerbinInSpaceLowIceCaps_00 // The spectrum is mostly cold, bright ice: even the shadows look like they’re shivering.
		KerbinInSpaceLowHighlands* = #JNSQscience_bd_IRspec_KerbinInSpaceLowHighlands_00 // Cool ridges and warmer valleys paint stripes across the ground in neat thermal bands.
		KerbinInSpaceLowMountains* = #JNSQscience_bd_IRspec_KerbinInSpaceLowMountains_00 // Peaks radiate crisp chill while sunlit rock flashes hot: the sensor keeps recalibrating.
		KerbinInSpaceLowShores* = #JNSQscience_bd_IRspec_KerbinInSpaceLowShores_00 // Wet sand cools fast: shallow water stays warm longer. The coastline draws a clean thermal outline.
		KerbinInSpaceLowMidlands* = #JNSQscience_bd_IRspec_KerbinInSpaceLowMidlands_00 // Patchwork fields and towns glow in IR like a quilt left too close to a heater.
		KerbinInSpaceLowLowlands* = #JNSQscience_bd_IRspec_KerbinInSpaceLowLowlands_00 // Damp ground and thicker air smear the contrast: everything looks comfortably lukewarm.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_bd_IRspec_KerbinInSpaceLowAridLowlands_00 // Dry flats spike hot in sunlight and drop fast in shade: the spectrum screams “no moisture.”
		KerbinInSpaceLowAridMidlands* = #JNSQscience_bd_IRspec_KerbinInSpaceLowAridMidlands_00 // Dusty soil reflects heat in a broad band: you can almost hear it crackle.
		KerbinInSpaceLowAridHighlands* = #JNSQscience_bd_IRspec_KerbinInSpaceLowAridHighlands_00 // Thin air, bright sun: rocks heat up instantly, then cool just as fast when you blink.
		KerbinInSpaceLowAridMountains* = #JNSQscience_bd_IRspec_KerbinInSpaceLowAridMountains_00 // Knife-edge temperature swings across ridges: the spectrometer catches tiny pockets of frost.
		KerbinInSpaceLowGreatLake* = #JNSQscience_bd_IRspec_KerbinInSpaceLowGreatLake_00 // A huge cool blot dominates the map: warmer eddies curl along the edges like lazy noodles.
		KerbinInSpaceLowInlandWater* = #JNSQscience_bd_IRspec_KerbinInSpaceLowInlandWater_00 // Small lakes show up as cool freckles, with warm shorelines forming tiny halos.
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowKreenwichSea_00 // Wide-open water stays steady in temperature, until a warm wake scribbles across the scan.
		KerbinInSpaceLowArcticSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowArcticSea_00 // Ice floes and open leads alternate in sharp bands: IR makes it look like a barcode of cold.
		KerbinInSpaceLowForemansSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowForemansSea_00 // Cloud shadows race over the water, and the sea answers with dim, slow heat.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowTriangulusSea_00 // Three current lanes form faint thermal triangles. Mission Control argues about the angles.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowNorthernSea_00 // A long cool ribbon hugs the coast: persistent haze shows up as a weak infrared blanket.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowSub-ArcticSea_00 // Not quite ice, not quite sea. Slush returns a messy spectrum that confuses the algorithms.
		KerbinInSpaceLowEasternSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowEasternSea_00 // Sunrise warms the surface first: the IR gradient points east like an arrow you didn’t ask for.
		KerbinInSpaceLowWesternSea* = #JNSQscience_bd_IRspec_KerbinInSpaceLowWesternSea_00 // Late-day heating lingers: the spectrum is smoother here, like the ocean learned patience.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_bd_IRspec_KerbinInSpaceLowWelcomeBackIsland_00 // The island’s dark rock runs warmer than the surrounding sea, as if it’s saving your seat.

        MunInSpaceLowPoles* = #JNSQscience_bd_IRspec_MunInSpaceLowPoles_00 // The poles read as deep cold wells: tiny sunlit ridges look like hot pins.
		MunInSpaceLowHighlands* = #JNSQscience_bd_IRspec_MunInSpaceLowHighlands_00 // Jagged highlands show harsh thermal edges: the dust cools before the scan finishes.
		MunInSpaceLowMidlands* = #JNSQscience_bd_IRspec_MunInSpaceLowMidlands_00 // The midlands settle into a steady dull chill, like the regolith is trying to nap.
		MunInSpaceLowLowlands* = #JNSQscience_bd_IRspec_MunInSpaceLowLowlands_00 // The lowlands hold a little warmth after noon: the spectrum suggests finer, fluffier dust.
