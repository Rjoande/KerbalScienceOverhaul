        #JNSQscience_tantares_ultraviolet_light_camera_NaraSrfLandedPolarLowlands_00 = Le basseterre polari mostrano chiazze UV pallide che suggeriscono depositi più puliti o un sussurro di brina sottilissima che prova a sopravvivere.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraSrfLandedPoles_00 = I poli bruciano in UV, con minuscoli pozzi scuri che sembrano trappole fredde disegnate con una penna molto cattiva.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraSrfLandedPolarHighlands_00 = L'UV evidenzia creste polari nette, come se il freddo avesse conservato ogni spigolo vivo per la fotocamera.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraFlyingLow_00 = Volando basso, la fotocamera UV combatte bagliori e foschia, ma i bordi luminosi delle nubi risaltano come sagome di carta che brillano.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraFlyingHigh_00 = In alto, la diffusione ultravioletta disegna un alone di bordo pulito e bande di foschia stratificate che rifiutano di restare ferme per la misura.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowLowlands_00 = Da un'orbita bassa, le basseterre risultano cupe in UV con deboli striature più chiare, suggerendo un ampio e lento rimescolamento superficiale.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowMidlands_00 = Le scansioni UV orbitali mostrano gradienti gentili sulle regioni intermedie, come se il pianeta si stesse ombreggiando con toni accurati.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowHighlands_00 = Gli altopiani si risolvono in bordi luminosi e bacini scuri: Nara sembra incisa più che erosa.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowMountains_00 = Il contrasto UV delinea le catene montuose con lunghe scie d'ombra, dando al rilievo una definizione scomodamente affilata.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowPolarLowlands_00 = Le basseterre polari spiccano come chiazze persistentemente luminose in UV, ripetendosi orbita dopo orbita come un avvertimento silenzioso.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowPoles_00 = In UV, i poli sono ancore luminose in un mondo più cupo, incorniciate da un debole bagliore dell'atmosfera spessa.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceLowPolarHighlands_00 = La mappatura UV mette in risalto creste polari luminose e tasche più scure, suggerendo rivestimenti irregolari che il freddo non ridistribuisce.
        #JNSQscience_tantares_ultraviolet_light_camera_NaraInSpaceHigh_00 = Da un'orbita alta, Nara è un disco UV dal bagliore morbido con un alone netto e quel tanto di contrasto superficiale da farti continuare a indovinare.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosSrfLandedLowlands_00 = L'ultravioletto fa sembrare i bassopiani di Amos polvere opaca, interrotta da poche abrasioni luminose di roccia appena esposta.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosSrfLandedMidlands_00 = Le immagini UV trasformano le regioni intermedie in un mosaico puntinato: ogni masso sembra riflettere con una personalità tutta sua.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosSrfLandedHighlands_00 = Gli altopiani si illuminano in modo irregolare in UV, tracciando creste e bordi come se qualcuno li avesse contornati per una lezione di geologia.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosSrfLandedMountains_00 = In UV, le montagne di Amos sono puro contrasto: creste luminose, tagli neri, e nessuna transizione gentile.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosSrfLandedPoles_00 = I poli mostrano un bagliore UV duro con minuscoli pozzi d'ombra che sembrano abbastanza profondi da inghiottire una chiave inglese.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosInSpaceLowLowlands_00 = Da un'orbita bassa, i bassopiani restano cupi in UV mentre puntini luminosi ammiccano quando la luce intercetta frammenti esposti.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosInSpaceLowMidlands_00 = Le immagini UV orbitali sembrano un disturbo statico che fa sul serio, suggerendo detriti di dimensioni miste impacchettati a distanze brevissime.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosInSpaceLowHighlands_00 = La mappatura UV enfatizza bordi luminosi degli altopiani e cavità scure, affilando Amos in un piccolo mondo severo.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosInSpaceLowMountains_00 = Le montagne proiettano sacche d'ombra brutali in UV, facendo sembrare Amos ancora più irregolare di quanto già non sia.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosInSpaceLowPoles_00 = Le regioni polari spiccano come chiazze UV nette, come se Amos stesse cercando di etichettare i propri estremi per te.
        #JNSQscience_tantares_ultraviolet_light_camera_AmosInSpaceHigh_00 = Da un'orbita alta, Amos è una piccola moneta UV con ombre inflessibili e una forte sensazione di "lontano da casa".
        #JNSQscience_tantares_ultraviolet_light_camera_EnonSrfLandedLowlands_00 = L'ultravioletto mette in risalto una lieve lucentezza, quasi brinosa, sui bassopiani di Enon, con cuciture più scure dove la superficie è più ruvida.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonSrfLandedMidlands_00 = In UV, le regioni intermedie mostrano sottili striature, come se sottili strati superficiali fossero stati limati in corsie per un tempo lunghissimo.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonSrfLandedHighlands_00 = Gli altopiani divampano più luminosi in UV lungo le creste, mentre le tasche riparate restano fioche e ostinatamente "fredde" nell'aspetto.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonSrfLandedPoles_00 = I poli brillano duramente in UV, con pozzi d'ombra fredda che fanno sembrare la luna traforata.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonInSpaceLowLowlands_00 = Da un'orbita bassa, la mappatura UV mostra ampie basseterre cupe interrotte da chiazze più luminose che suggeriscono esposizioni più fresche e pulite.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonInSpaceLowMidlands_00 = Le scansioni UV orbitali rivelano gradienti dolci e una debole bandatura, dando a Enon una tessitura sorprendentemente "organizzata".
        #JNSQscience_tantares_ultraviolet_light_camera_EnonInSpaceLowHighlands_00 = Il contrasto UV delinea bordi luminosi e bacini più scuri: il rilievo di Enon si legge come una stampa ad alto contrasto.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonInSpaceLowPoles_00 = Le regioni polari spiccano come ancore luminose in UV, ripetendosi prevedibilmente mentre l'orbita scorre.
        #JNSQscience_tantares_ultraviolet_light_camera_EnonInSpaceHigh_00 = Da un'orbita alta, Enon è un puntino UV pallido dai bordi netti e con abbastanza marezzatura da far partire una discussione.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxSrfLandedLowlands_00 = L'ultravioletto rende i bassopiani di Prax uniformemente cupi, con granuli luminosi sparsi come stelle fuori posto nella polvere.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxSrfLandedMidlands_00 = Le immagini UV mostrano riflettività a chiazze nelle regioni intermedie, suggerendo sottili rivestimenti che non si sono mai assestati in modo uniforme.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxSrfLandedHighlands_00 = Gli altopiani si illuminano lungo le creste in UV, mentre i bacini assorbono la luce e si tengono i segreti.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxSrfLandedMountains_00 = In UV, le montagne sono solo abbaglio e ombra: creste luminose che precipitano nel nero senza preavviso.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxSrfLandedPoles_00 = I poli mostrano un contrasto UV netto e minuscoli pozzi scuri, come una checklist di posti in cui non dovresti mettere piede.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxInSpaceLowLowlands_00 = Da un'orbita bassa, i bassopiani risultano come una coperta liscia e cupa in UV, con occasionali abrasioni luminose dove il terreno più duro affiora.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxInSpaceLowMidlands_00 = Le immagini UV orbitali mostrano lievi cambi di tono sulle regioni intermedie, suggerendo una migrazione della polvere lenta e persistente.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxInSpaceLowHighlands_00 = La mappatura UV affila gli altopiani in creste luminose e cavità scure, dando a Prax un aspetto scolpito, da frontiera.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxInSpaceLowMountains_00 = Le montagne proiettano profonde sacche d'ombra in UV, facendo sembrare Prax abbastanza frastagliato da "impigliare" un'orbita.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxInSpaceLowPoles_00 = Le chiazze UV polari persistono tra i passaggi, pulite e ripetibili: esattamente quel tipo di ordine che, quassù, sembra sospetto.
        #JNSQscience_tantares_ultraviolet_light_camera_PraxInSpaceHigh_00 = Da un'orbita alta, Prax è una moneta UV sbiadita con ombre dure e una quantità di tessitura poco collaborativa.

        // === Val-Vall Jokes ===
        #JNSQscience_ValVall_00 = Qualcuno continua a dire "Val su Vall" alla radio, e adesso tutto l'equipaggio non riesce a smettere di ridere.
        #JNSQscience_ValVall_01 = Ricontrolli il computer di navigazione. Il bersaglio è Vall. Il pilota scrive "Val" sulla checklist lo stesso.
