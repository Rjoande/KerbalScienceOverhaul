        #CSS_seismicScan_MunSrfLandedTwinCraters_00 = Speri che la geologia qui concentri anche le più piccole vibrazioni provenienti dalle profondità del Mun.
        #CSS_seismicScan_MinmusSrfLanded_00 = Rilevi un po' di attività sismica, molto probabilmente causata dalle forze mareali.
        #CSS_seismicScan_MinmusSrfLandedHighlands_00 = I letti dei laghi rimbombano periodicamente. Forse le forze mareali stanno causando riscaldamento sotto tutto quel ghiaccio.
        #CSS_seismicScan_MinmusSrfLandedFlats_00 = Rilevi delle scosse piuttosto violente da qualche parte sul lato opposto di Minmus. Probabilmente sono state causate dall'impatto di un piccolo meteorite.
        #CSS_seismicScan_MinmusSrfLandedGreatFlats_00 = Osservi i dati mentre mostrano chiaramente che non sta succedendo assolutamente nulla di interessante.
        #CSS_seismicScan_MinmusSrfLandedGreaterFlats_00 = Il sismometro rileva alcuni piccoli terremoti e qualcosa che sembra gorgogliare. Forse queste aree vengono rinnovate da un'occasionale attività geologica.
        #CSS_seismicScan_MinmusSrfLandedGreaterFlats_01 = Un grande impatto nelle vicinanze invia onde d'urto attraverso tutto il pianeta. È l'occasione perfetta per mappare l'interno!
        #CSS_seismicScan_MinmusSrfLandedLesserFlats_00 = Le vibrazioni indicano che sotto tutto quel ghiaccio c'è della roccia.
        #CSS_seismicScan_MinmusSrfLandedSlopes_00 = Un masso che rotola giù dal pendio vicino interferisce con le tue letture.
        #CSS_seismicScan_MinmusSrfLandedSlopes_00 = C'è molta interferenza nel segnale del sensore. Stiamo scivolando giù per la collina?
        #CSS_seismicScan_DunaSrfLanded_00 = Il pianeta non sembra avere molta attività sismica.
        #CSS_seismicScan_DunaSrfLandedPoles_00 = La scansione sismica rileva alcune vibrazioni mentre del gas fuoriesce dalla calotta di ghiaccio sottostante.
        #CSS_seismicScan_DunaSrfLandedPoles_01 = La scansione rileva un po' di attività, probabilmente associata allo scioglimento della calotta polare.
        #CSS_seismicScan_DunaSrfLandedMidlands_00 = Le letture indicano un nucleo solido di ferro. Questo pianeta potrebbe aver avuto un geodinamo funzionante in un lontano passato, prima che il nucleo si raffreddasse del tutto.
        #CSS_seismicScan_DunaSrfLandedMidlands_01 = Un impulso rifratto viene ricevuto da una montagna antipodale. Questo rivela un interno ancora parzialmente fuso. Potrebbe essere un vulcano dormiente?
        #CSS_seismicScan_DunaSrfLandedLowlands_00 = Lo strumento rileva alcuni tremori molto deboli. Forse Duna non è poi così morto?
        #CSS_seismicScan_DunaSrfLandedLowlands_01 = Niente. Zero. Nada. Le uniche vibrazioni sono arrivate da te che fai cadere uno snack.
        #CSS_seismicScan_DunaSrfLandedCraters_00 = Non succede nulla di particolarmente interessante quando avvii la scansione sismica. Forse il pianeta è geologicamente morto, o forse si sta solo facendo un sonnellino.
        #CSS_seismicScan_DunaSrfLandedCraters_01 = Il terreno è immobile e silenzioso, come ovunque su questa gelida palla di ruggine. Ti chiedi come si sarebbe sentito l'impatto.
        #CSS_seismicScan_DunaSrfLandedHighlands_00 = Il sismografo reagisce a malapena. Se questo pianeta ha mai avuto attività sismica, ora non più.
        #CSS_seismicScan_DunaSrfLandedHighlands_01 = Solo piccole vibrazioni prodotte da rocce che scivolano sulla superficie compaiono sull'attrezzatura.
        #CSS_seismicScan_DunaSrfLandedMidlandSea_00 = La librazione di Ike sopra di te genera tremori quasi impercettibili dovuti a movimenti del suolo simili alle maree.
        #CSS_seismicScan_DunaSrfLandedMidlandSea_01 = L'intero pianeta sembra essere andato in linea piatta, o almeno il sismografo.
        #CSS_seismicScan_DunaSrfLandedNorthernBasin_00 = Gli impulsi inviati nel bedrock vengono dispersi e rifratti in tutte le direzioni, indicando la presenza di estese faglie e fratture nella roccia.
        #CSS_seismicScan_DunaSrfLandedNorthernBasin_01 = Qui non c'è attività rilevabile, il che significa nessuna tettonica attiva nell'area.
        #CSS_seismicScan_DunaSrfLandedSouthernBasin_00 = Il ghiaccio che si crepa e si sposta nel bacino crea alcune deboli onde superficiali.
        #CSS_seismicScan_DunaSrfLandedSouthernBasin_01 = La scarsa attività sismica sembra avere un picco durante il giorno, come se lo scioglimento del ghiaccio vicino fosse responsabile delle onde d'urto.
        #CSS_seismicScan_DunaSrfLandedNorthernShelf_00 = Il vento fa tremare così tanto il sismometro che è impossibile ottenere una lettura. A quanto pare, questo è un duna-terremoto di magnitudo VI, se una cosa del genere esiste.
        #CSS_seismicScan_DunaSrfLandedNorthernShelf_01 = In mezzo a tutto il rumore di vibrazioni, il misuratore rileva un piccolo rombo proveniente dalle profondità del terreno. Potrebbe essere il residuo di un'antica faglia?
        #CSS_seismicScan_DunaSrfLandedMidlandCanyon_00 = Qui il terreno è perfettamente immobile, salvo alcuni impulsi così deboli da svanire provenienti dall'altro lato del pianeta.
        #CSS_seismicScan_DunaSrfLandedMidlandCanyon_01 = La librazione di Ike sopra di te genera regolari sciami di minuscoli movimenti nella crosta.
        #CSS_seismicScan_DunaSrfLandedEasternCanyon_00 = Cos'era quello? L'avete sentito tutti? Il sismometro di certo sì, e pare che siamo atterrati in una zona di valle a rift.
        #CSS_seismicScan_DunaSrfLandedEasternCanyon_01 = Dopo un po', il sensore ha rilevato non meno di undici piccoli terremoti. Duna è ancora attivo, dopotutto!
        #CSS_seismicScan_DunaSrfLandedWesternCanyon_00 = Nessun segnale. O Duna sta sonnecchiando, oppure è davvero sismicamente morto.
        #CSS_seismicScan_DunaSrfLandedWesternCanyon_01 = Sconsolato, lasci il sensore in funzione per un po'. Quando torni, le uniche vibrazioni sono quelle dei tuoi piedi e del vento.
        #CSS_seismicScan_DunaSrfLandedPolarHighlands_00 = La dispersione degli impulsi sismici inviati verso il basso suggerisce la presenza di molteplici strati di ghiaccio e di roccia molto più in profondità.
        #CSS_seismicScan_DunaSrfLandedPolarHighlands_01 = La scansione registra alcuni piccoli tremori. Speriamo che non ci siano dinosauri di Duna.
        #CSS_seismicScan_DunaSrfLandedPolarCraters_00 = Il rilevatore capta le vibrazioni del ghiaccio che si crepa e si sposta sotto la nave. È piuttosto inquietante.
        #CSS_seismicScan_DunaSrfLandedPolarCraters_01 = Non molto, a parte qualche rumore del ghiaccio. O Duna è sismicamente morto, oppure il ghiaccio è un buon assorbitore di urti.
        #CSS_seismicScan_IkeSrfLandedPolarLowlands_00 = È silenzioso. Troppo silenzioso. Questo silenzio sismico è inquietante.
        #CSS_seismicScan_IkeSrfLandedPolarLowlands_01 = Forse le onde sismiche non raggiungono queste latitudini, visto che non rilevi quasi nulla.
        #CSS_seismicScan_IkeSrfLandedMidlands_00 = Il sismometro rileva deboli segnali di deformazione mareale che si riflettono all'interno della luna.
        #CSS_seismicScan_IkeSrfLandedMidlands_01 = Vengono rilevati più impulsi dal lato di Ike rivolto a Duna e ancora di più al periapside.
        #CSS_seismicScan_IkeSrfLandedEasternMountainRidge_00 = Non c'è alcun segno di attività vulcanica, ma la superficie subisce stress mareale per l'influenza gravitazionale di Duna.
        #CSS_seismicScan_IkeSrfLandedEasternMountainRidge_01 = Era un terremoto, o solo un sasso che rotola lentamente giù per la collina?
        #CSS_seismicScan_IkeSrfLandedWesternMountainRidge_00 = La struttura solida delle montagne rende questo un luogo stabile e chiaro da cui osservare le onde sismiche.
        #CSS_seismicScan_IkeSrfLandedWesternMountainRidge_01 = Nessun movimento associato alla formazione delle montagne. Ike deve essere morto da tempo e queste montagne devono essere antiche.
        #CSS_seismicScan_IkeSrfLandedLowlands_00 = Persino la scansione sismica sembra apprezzare Ike.
        #CSS_seismicScan_IkeSrfLandedLowlands_01 = Deboli onde sismiche dovute a deformazione mareale e impatti suggeriscono una struttura interna complessa.
        #CSS_seismicScan_IkeSrfLandedSouthEasternMountainRange_00 = Hai sentito quel piccolo sobbalzo? Perché il sismometro di certo sì.
        #CSS_seismicScan_IkeSrfLandedSouthEasternMountainRange_01 = I rombi amplificati dalle profondità della luna sembrano il ringhio di un grosso animale.
