        #CSS_crewReport_KerbinSrfLandedIceCaps_00 = Vorresti aver portato i pattini da ghiaccio.
        #CSS_crewReport_KerbinSrfLandedIceCaps_01 = Pensi che apprezzeresti di più la bellezza spoglia dei poli immacolati se non facesse così freddo.
        #CSS_crewReport_KerbinSrfLandedICeCaps_02 = Oh, quell'aurora è splendida! Chissà com'è vista dallo spazio.
        #CSS_crewReport_KerbinSrfLandedNorthernIceShelf_00 = Hai sentito le leggende di Babbo Klaus che vive al Polo Nord. Perché mai vivrebbe in un posto così gelido e desolato, per te è un mistero.
        #CSS_crewReport_KerbinSrfLandedNorthernIceShelf_01 = Siamo qui in questo posto terribile e non si vede nemmeno un igloo.
        #CSS_crewReport_KerbinSrfLandedSouthernIceShelf_00 = Le pianure di ghiaccio gelide, battute dal vento e senza tratti distintivi si estendono fino all'orizzonte.
        #CSS_crewReport_KerbinSrfLandedSouthernIceShelf_02 = L'equipaggio è deluso dalla totale assenza di uccelli in smoking.
        #CSS_crewReport_KerbinSrfSplashedWater_00 = Argh, marinai! Mostriamo a quei terricoli del CSK chi comanda davvero in alto mare!
        #CSS_crewReport_KerbinSrfSplashedWater_01 = Non devo preoccuparmi dei pirati, giusto? Di sicuro se la prendono solo con le navi normali, non con le astronavi.
        #CSS_crewReport_KerbinSrfSplashedWater_02 = Spero che il portello non si rompa e allaghi la capsula.
        #CSS_crewReport_KerbinSrfSplashedWater_03 = "Io non so nuotare!"
        #CSS_crewReport_KerbinSrfSplashedWater_04 = Ehi piccoletto! Lo chiamerò Spappolo e sarà mio, e sarà il mio Spappolo. Vieni qui, Spappolo...
        #CSS_crewReport_KerbinSrfSplashedGrasslands_00 = Stai galleggiando in uno stagno fangoso in mezzo a un campo. Di certo ci sono posti più glamour per un kerbonauta.
        #CSS_crewReport_KerbinSrfSplashedShores_00 = Chi ha bisogno del costume? Le ragazze vanno pazze per le tute spaziali.
        #CSS_crewReport_KerbinSrfSplashedShores_01 = No! Non l'acqua!
        #CSS_crewReport_KerbinSrfSplashedShores_02 = La nave è bagnata. Sospetti che se uscissi lo saresti anche tu.
        #CSS_crewReport_KerbinSrfSplashedShores_03 = L'equipaggio dubita fortemente delle capacità di galleggiamento di questo veicolo.
        #CSS_crewReport_KerbinSrfSplashedShores_04 = Vedi un pesce nuotare davanti al finestrino. Sembra proprio che tu sia sott'acqua.
        #CSS_crewReport_KerbinSrfSplashedDeserts_00 = Onde che lambiscono il finestrino sono una delle ultime cose che ti aspetteresti di trovare in un deserto, dopo "pinguini" e "uno Yeti" ma prima di "le mutande di Montimer".
        #CSS_crewReport_KerbinSrfSplashedBadlands_00 = L'acqua dev'essere calda, visto che l'interno della capsula si sta scaldando parecchio.
        #CSS_crewReport_KerbinSrfSplashedTundra_00 = Quell'acqua sembra proprio gelida. Sei felice di essere qui dentro e non là fuori.
        #CSS_crewReport_KerbinSrfSplashedIceCaps_00 = Un piccolo pezzo di ghiaccio ticchetta contro il finestrino. Senti il freddo attraverso il vetro ispessito.
        #CSS_crewReport_KerbinSrfSplashedNorthernIceShelf_00 = Guardi un grande iceberg accompagnato da uno sciame di growler scivolare solennemente oltre.
        #CSS_crewReport_KerbinSrfSplashedSouthernIceShelf_01 = Ti sembra che chiamare la nave Inaffondabile sia stata una cattiva idea in questo ambiente.
        #CSS_crewReport_KerbinFlyingLowWater_00 = Vedi spruzzi d'acqua sollevati dall'aria che si apre al passaggio del veicolo.
        #CSS_crewReport_KerbinFlyingLowWater_01 = Stai volando così basso che noti le increspature nell'acqua causate dal veicolo.
        #CSS_crewReport_KerbinFlyingLowWater_02 = Da questa prospettiva riesci a vedere la topografia sottomarina.
        #CSS_crewReport_KerbinFlyingLowWater_03 = Ti chiedi se sia sicuro bere quest'acqua.
        #CSS_crewReport_KerbinFlyingLowWater_04 = Da quassù l'acqua sembra così tranquilla.
        #CSS_crewReport_KerbinFlyingLowWater_05 = Immagini tutte le meravigliose creature che vivono sotto la superficie e che probabilmente ti mangerebbero. O almeno ti sfiorerebbero una gamba mentre nuoti.
        #CSS_crewReport_KerbinFlyingLowGrasslands_00 = C'è qualcosa sull'ala, qual...cosa...
        #CSS_crewReport_KerbinFlyingLowGrasslands_01 = È molto rassicurante vedere tutto questo verde sotto di te.
        #CSS_crewReport_KerbinFlyingLowGrasslands_02 = Il terreno qui è curato in modo impeccabile. Prendi nota del numero di giardinieri che il pianeta deve avere.
        #CSS_crewReport_KerbinFlyingLowHighlands_00 = Hai un'ottima vista degli altipiani.
        #CSS_crewReport_KerbinFlyingLowHighlands_01 = Dagli Altipiani può arrivare un solo rapporto!
        #CSS_crewReport_KerbinFlyingLowHighlands_02 = Qui fuori è piuttosto noioso. Dev'essere per questo che su Kerbin non ci sono molte città.
        #CSS_crewReport_KerbinFlyingLowShores_00 = L'equipaggio è deluso dall'assenza di bikini nella zona.
        #CSS_crewReport_KerbinFlyingLowShores_01 = Guardi fuori dal finestrino e vedi un pezzo del razzo che vola via. Tanto non era importante.
        #CSS_crewReport_KerbinFlyingLowShores_02 = "Rapporto dell'equipaggio. Vi richiameremo... stiamo per pranzare."
        #CSS_crewReport_KerbinFlyingLowMountains_00 = Calcoli la probabilità di impatto a questa quota. Non ti fa sentire al sicuro.
