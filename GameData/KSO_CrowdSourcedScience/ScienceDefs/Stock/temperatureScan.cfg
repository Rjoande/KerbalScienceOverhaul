        DunaSrfLandedLowlands* = #CSS_temperatureScan_DunaSrfLandedLowlands_00 // Duna is colder than you expected.
        DunaSrfLandedLowlands* = #CSS_temperatureScan_DunaSrfLandedLowlands_01 // It's even colder here than everywhere else at night.
        DunaSrfLandedCraters* = #CSS_temperatureScan_DunaSrfLandedCraters_00 // You wouldn't know it by looking, but it's actually really cold out here.
        DunaSrfLandedCraters* = #CSS_temperatureScan_DunaSrfLandedCraters_01 // The landscape sink means the crater floor is cold. And that's Duna-brand cold.
        DunaSrfLandedHighlands* = #CSS_temperatureScan_DunaSrfLandedHighlands_00 // The thin air is colder than anything you'd find on Kerbin.
        DunaSrfLandedHighlands* = #CSS_temperatureScan_DunaSrfLandedHighlands_01 // If the thermometer liquid wasn't in a pressurised tube, it'd freeze solid.
        DunaSrfLandedMidlandSea* = #CSS_temperatureScan_DunaSrfLandedMidlandSea_00 // You thought of desert worlds as hot, not places to freeze your everything off.
        DunaSrfLandedMidlandSea* = #CSS_temperatureScan_DunaSrfLandedMidlandSea_01 // Another cold day on Duna. Holidaying on the shores of the Great Western Desert seems very far away now.
        DunaSrfLandedNorthernBasin* = #CSS_temperatureScan_DunaSrfLandedNorthernBasin_00 // Coldness is taken as a given on Duna, and this place is no exception. It's freezing.
        DunaSrfLandedSouthernBasin* = #CSS_temperatureScan_DunaSrfLandedSouthernBasin_00 // The slushy ice-dust mixture found here cakes to the thermometer, insulating it from the wind.
        DunaSrfLandedNorthernShelf* = #CSS_temperatureScan_DunaSrfLandedNorthernShelf_00 // It's Duna, it's cold and it's even colder with the wind chill. What a surprise...and now the thermometer's blown away.
        DunaSrfLandedNorthernShelf* = #CSS_temperatureScan_DunaSrfLandedNorthernShelf_01 // These winds blow straight off the polar ice cap, bringing with them a savagely biting icy chill.
        DunaSrfLandedMidlandCanyon* = #CSS_temperatureScan_DunaSrfLandedMidlandCanyon_00 // A gentle breeze starts up, and even that is enough to drop the temperature and remind you of how cold it is.
        DunaSrfLandedEasternCanyon* = #CSS_temperatureScan_DunaSrfLandedEasternCanyon_00 // The sun breaks through the thick haze, warming the thermometer enough for it to defrost and the gauge to become clearly visible again.
        DunaSrfLandedEasternCanyon* = #CSS_temperatureScan_DunaSrfLandedEasternCanyon_01 // The cold sink nature of the canyon makes this place even more bitingly cold at nights.
        DunaSrfLandedWesternCanyon* = #CSS_temperatureScan_DunaSrfLandedWesternCanyon_00 // This canyon doesn't seem as cold as one would expect given its cold sink status.
        DunaSrfLandedWesternCanyon* = #CSS_temperatureScan_DunaSrfLandedWesternCanyon_01 // It's warmer than expected in here. Either it's radiation off the walls or lack of much wind chill.
        DunaSrfLandedPolarHighlands* = #CSS_temperatureScan_DunaSrfLandedPolarHighlands_00 // Temperatures range between bitterly cold and cold enough to freeze the very air solid.
        DunaSrfLandedPolarCraters* = #CSS_temperatureScan_DunaSrfLandedPolarCraters_00 // Temperatures fluctuate wildly as the sun changes position in the sky. The depression must act as a cold sink.
        DunaFlyingLowPoles* = #CSS_temperatureScan_DunaFlyingLowPoles_00 // You wish you could drink a cup of hot chocolate, but you can't take your helmet off. The thermometer seems to be frozen solid.
        DunaFlyingLowMidlands* = #CSS_temperatureScan_DunaFlyingLowMidlands_00 // Rotating the thermometer to face the sun gives a noticeable temperature increase.
        DunaFlyingLowLowlands* = #CSS_temperatureScan_DunaFlyingLowLowlands_00 // You wonder if the wind chill from flying here would be cold enough to freeze the ethanol in the thermometer. Sadly, no.
        DunaFlyingLowLowlands* = #CSS_temperatureScan_DunaFlyingLowLowlands_01 // Temperatures increase as you drop. But not much.
        DunaFlyingLowCraters* = #CSS_temperatureScan_DunaFlyingLowCraters_00 // Enough ice flakes off the thermometer display to see the reading spell 'COLD'
        DunaFlyingLowHighlands* = #CSS_temperatureScan_DunaFlyingLowHighlands_00 // The air is far too thin to conduct much heat away from the device.
        DunaFlyingLowHighlands* = #CSS_temperatureScan_DunaFlyingLowHighlands_01 // Rotating the thermometer away from the sun freezes the liquid, towards the sun warms it too much. Gah!
        DunaFlyingLowMidlandSea* = #CSS_temperatureScan_DunaFlyingLowMidlandSea_00 // Temperatures drop when the wind picks up. Drop more, that is.
        DunaFlyingLowMidlandSea* = #CSS_temperatureScan_DunaFlyingLowMidlandSea_01 // A dust haze drifts in front of Kerbol, and it gets just that little bit colder.
        DunaFlyingLowNorthernBasin* = #CSS_temperatureScan_DunaFlyingLowNorthernBasin_00 // Temperatures decrease noticeably near the basin floor, indicating the presence of a layer of cold air.
        DunaFlyingLowSouthernBasin* = #CSS_temperatureScan_DunaFlyingLowSouthernBasin_00 // Well done, Kerlock. You figured out that Duna is cold. Woot!
        DunaFlyingLowNorthernShelf* = #CSS_temperatureScan_DunaFlyingLowNorthernShelf_00 // That little bit of altitude doesn't protect you from the icy canyon wind.
        DunaFlyingLowMidlandCanyon* = #CSS_temperatureScan_DunaFlyingLowMidlandCanyon_00 // The thermometer has a bubble in it, so you gently tap it and end up making even more bubbles.
        DunaFlyingLowEasternCanyon* = #CSS_temperatureScan_DunaFlyingLowEasternCanyon_00 // Above the dust, you can finally see the effect sunlight has on the temperature, as though the craft is basking in the feeble warmth.
        DunaFlyingLowEasternCanyon* = #CSS_temperatureScan_DunaFlyingLowEasternCanyon_01 // The sinking cold air is below you up here, and mixes with slightly warmer air from other zones.
        DunaFlyingLowWesternCanyon* = #CSS_temperatureScan_DunaFlyingLowWesternCanyon_00 // The thicker air here wicks away heat from the thermometer more effectively than elsewhere.
        DunaFlyingLowWesternCanyon* = #CSS_temperatureScan_DunaFlyingLowWesternCanyon_01 // The canyon walls are channelling warmer air from the Midland Sea to the south, but at a relatively slow wind speed.
        DunaFlyingLowPolarHighlands* = #CSS_temperatureScan_DunaFlyingLowPolarHighlands_00 // A gust of even colder air buffets the craft. The temperature drops by another few degrees.
        DunaFlyingLowPolarCraters* = #CSS_temperatureScan_DunaFlyingLowPolarCraters_00 // The thermometer is encrusted with ice, obscuring the display. You note down "cold" as a substitute.
        DunaFlyingHigh* = #CSS_temperatureScan_DunaFlyingHigh_00 // The temperature rise from the planet's radiation isn't as much as expected. Perhaps the greenhouse effect here is rather weak.
        DunaFlyingHigh* = #CSS_temperatureScan_DunaFlyingHigh_01 // Turning up the thermostat in your climate controlled suit does little to keep the cold from creeping into your toes.
        DunaInSpaceLow* = #CSS_temperatureScan_DunaInSpaceLow_00 // Duna is cold, so thermal back radiation at night is limited. It's definitely there, though.
        DunaInSpaceLow* = #CSS_temperatureScan_DunaInSpaceLow_01 // You hope the atmosphere provides a bit more insulation at the surface than you get in space.
