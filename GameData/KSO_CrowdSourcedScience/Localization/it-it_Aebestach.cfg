        #CSS_Aebestach_evaReport_Eeloo_01 = Fragipan di Eeloo. Passeggiata ghiacciata.
        #CSS_Aebestach_evaReport_Eeloo_02 = Campo di Babbage di Eeloo. Camminata sul ghiaccio.
        #CSS_Aebestach_evaReport_Eeloo_03 = Ghiacciai australi di Eeloo. Trekking sul ghiacciaio.
        #CSS_Aebestach_evaReport_Eeloo_04 = Ghiacciaio Mu di Eeloo. Fiume di ghiaccio.
        #CSS_Aebestach_evaReport_Eeloo_05 = Fragipan di Eeloo in orbita bassa. Lembo ghiacciato in basso.
        #CSS_Aebestach_evaReport_Eeloo_06 = Campo di Babbage di Eeloo in orbita bassa. Terreno ghiacciato in basso.
        #CSS_Aebestach_evaReport_Eeloo_07 = Ghiacciai australi di Eeloo in orbita bassa. Ghiacciai in basso.
        #CSS_Aebestach_evaReport_Eeloo_08 = Ghiacciaio Mu di Eeloo in orbita bassa. Fiume di ghiaccio in basso.

// --- mysteryGoo ---
        //   Sun
        #CSS_Aebestach_mysteryGoo_Sun_01 = La melma evapora rapidamente vicino a Sole. Valore scientifico: dimostrato il punto di ebollizione della melma.
