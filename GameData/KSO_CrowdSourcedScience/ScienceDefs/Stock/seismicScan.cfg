@EXPERIMENT_DEFINITION:HAS[#id[seismicScan]]
{
    %RESULTS
    {
        SrfLanded* = #CSS_seismicScan_default_00 // The seismic scan records the movement (or lack thereof) of the tectonic plates.
        SrfLanded* = #CSS_seismicScan_default_01 // You observe a shocking result.
        SrfLanded* = #CSS_seismicScan_default_02 // You shake the device and, based on the readout, imagine an equivalent earthquake.
        SrfLanded* = #CSS_seismicScan_default_03 // You wonder if another location would give different readings.
        SrfLanded* = #CSS_seismicScan_default_04 // There is no reading.
        SrfLanded* = #CSS_seismicScan_default_05 // You can't help but imagine yourself sliding along the curve the data makes. Wee!

        MohoSrfLanded* = #CSS_seismicScan_MohoSrfLanded_00 // A small rumble shakes the cockpit before you can access the sensor.
        MohoSrfLandedNorthernSinkholeRidge* = #CSS_seismicScan_MohoSrfLandedNorthernSinkholeRidge_00 // The sensor picks up anomalous vibrations from deep within the planet. You wonder what could be down there.
        MohoSrfLandedNorthernSinkhole* = #CSS_seismicScan_MohoSrfLandedNorthernSinkhole_00 // Despite the tremendous heat of the sun, thermal expansion isn't causing any noteworthy movement.
        MohoSrfLandedMidlands* = #CSS_seismicScan_MohoSrfLandedMidlands_00 // Thermal expansion from the sun is causing geological activity.
        MohoSrfLandedCentralLowlands* = #CSS_seismicScan_MohoSrfLandedCentralLowlands_00 // The meter shows the maximum amount of force needed to jiggle Jebediah's love-handles for a fortnight.
        MohoSrfLandedHighlands* = #CSS_seismicScan_MohoSrfLandedHighlands_00 // This place seems much calmer than you would think. Tests indicate that there hasn't been any geologic activity in billions of years.
        MohoSrfLandedMinorCraters* = #CSS_seismicScan_MohoSrfLandedMinorCraters_00 // The shaking of the needle reminds you how cold the dark side of this planet gets.
        MohoSrfLandedCanyon* = #CSS_seismicScan_MohoSrfLandedCanyon_00 // There is a strong anomaly in the sensor that you can't determine the cause of. After much deliberation, you decide to ignore it.

        EveSrfLandedPoles* = #CSS_seismicScan_EveSrfLandedPoles_00 // It's very quiet up here. No local seismicity to be found.
        EveSrfLandedPoles* = #CSS_seismicScan_EveSrfLandedPoles_01 // Bored with the lack of results, you try to turn the seismometer into a makeshift heart monitor, only to realise how stressed you actually are.
        EveSrfLandedMidlands* = #CSS_seismicScan_EveSrfLandedMidlands_00 // A strange echoing effect is apparent. It could be a sign of underground cavities buried deep beneath the surface.
        EveSrfLandedMidlands* = #CSS_seismicScan_EveSrfLandedMidlands_01 // It sure is a mess down there, judging from the very confusing reponse to pings.
        EveSrfLandedExplodiumSea* = #CSS_seismicScan_EveSrfLandedExplodiumSea_00 // The shifting currents below the surface induce very faint vibrations in the rock.
        EveSrfLandedLowlands* = #CSS_seismicScan_EveSrfLandedLowlands_00 // The seismometer registers the creaks of the vessel as seismic events.
        EveSrfLandedLowlands* = #CSS_seismicScan_EveSrfLandedLowlands_01 // The device spits out an impressive array of sparks, but no data.
        EveSrfLandedHighlands* = #CSS_seismicScan_EveSrfLandedHighlands_00 // The scan yields a great deal of important information, but none of it says "purple".
        EveSrfLandedHighlands* = #CSS_seismicScan_EveSrfLandedHighlands_01 // Mission Control tells you to put the boom box away so the readout doesn't consist of your jammin' beats.
        EveSrfLandedPeaks* = #CSS_seismicScan_EveSrfLandedPeaks_00 // Very little activity is detected. The tectonic processes that formed the mountains must have long since ceased.
        EveSrfLandedPeaks* = #CSS_seismicScan_EveSrfLandedPeaks_01 // Some of those mountainsides look unstable. You hope an earthquake doesn't make them collapse while you're here.
        EveSrfLandedImpactEjecta* = #CSS_seismicScan_EveSrfLandedImpactEjecta_00 // Distorted seismic waves passing up through the rock outline the crater's breccia lens and shatter cones.
        EveSrfLandedImpactEjecta* = #CSS_seismicScan_EveSrfLandedImpactEjecta_01 // The scientists back at KSP would give their right hand to have been able to record the impact event on a seismograph.
        EveSrfLandedCraterLake* = #CSS_seismicScan_EveSrfLandedCraterLake_00 // The large circular lake causes seismic waves to reverberate and echo around the sea.
        EveSrfLandedWesternSea* = #CSS_seismicScan_EveSrfLandedWesternSea_00 // Waves slapping on the shore produce regular tiny pulses of movement.
        EveSrfLandedOlympus* = #CSS_seismicScan_EveSrfLandedOlympus_00 // Whatever seismic waves may be found lower down, up here they're very muffled by the great bulk of the mountain.
        EveSrfLandedOlympus* = #CSS_seismicScan_EveSrfLandedOlympus_01 // A number of skittering rocks on the steep slopes produce a swarm of noisy signatures.
        EveSrfLandedEasternSea* = #CSS_seismicScan_EveSrfLandedEasternSea_00 // A small number of shallow, genuine earthquakes are found to be coming from the seafloor.
        EveSrfLandedFoothills* = #CSS_seismicScan_EveSrfLandedFoothills_00 // The scan hints at the internal structure of Eve's crust.
        EveSrfLandedFoothills* = #CSS_seismicScan_EveSrfLandedFoothills_01 // As with any highly sensitive piece of scienctific equipment, the seismometer doesn't look like it will last much longer.
        EveSrfLandedShallows* = #CSS_seismicScan_EveSrfLandedShallows_00 // Can you use the seismometer to detect sea monsters bumping around in the ocean?

        GillySrfLanded* = #CSS_seismicScan_GillySrfLanded_00 // The moon is so small and dead that the only noteworthy reading you get is an echo of your own landing bouncing back from the far side.
        GillySrfLanded* = #CSS_seismicScan_GillySrfLanded_01 // There is no activity on this barren rock.
        GillySrfLandedMidlands* = #CSS_seismicScan_GillySrfLandedMidlands_00 // So far, the only seismic readings are those caused by you bouncing off the walls of the cabin.
        GillySrfLandedLowlands* = #CSS_seismicScan_GillySrfLandedLowlands_00 // You fear your vessel has altered Gilly's course.
        GillySrfLandedHighlands* = #CSS_seismicScan_GillySrfLandedHighlands_00 // Gilly seems to be seismically as dead as a doorknob.

        KerbinSrfLandedKSC* = #CSS_seismicScan_KerbinSrfLandedKSC_00 // After a series of rather nominal readings there is a massive quake that nearly breaks the instruments. Either a spacecraft just attempted take-off or the scientists made another "discovery."
        KerbinSrfLandedKSC* = #CSS_seismicScan_KerbinSrfLandedKSC_01 // The incredibly sensitive equipment detects footsteps of people in the VAB, and even Dilorf dropping a pitcher full of ice water. You decide that's not your problem right now.
        KerbinSrfLandedKSC* = #CSS_seismicScan_KerbinSrfLandedKSC_02 // The needle jumps and shakes violently; moments later, you hear a distant explosion. Looks like somebody let Bill into the cafeteria kitchen again.
        KerbinSrfLandedKSC* = #CSS_seismicScan_KerbinSrfLandedKSC_03 // The lack of geologic activity - explosions not counting - reminds you why they built the space center here.
        KerbinSrfLandedKSC* = #CSS_seismicScan_KerbinSrfLandedKSC_04 // The instrument indicates heavy surface-borne activity nearby.
        KerbinSrfLandedKSC* = #CSS_seismicScan_KerbinSrfLandedKSC_05 // The instrument indicates high levels of seismic activity coming from...the research lab.
        KerbinSrfLandedAdministration* = #CSS_seismicScan_KerbinSrfLandedAdministration_00 // The needle moves. Mortimer probably exploded again over the spending of funds.
        KerbinSrfLandedAstronautComplex* = #CSS_seismicScan_KerbinSrfLandedAstronautComplex_00 // You try to impress the new recruits with the word seismometer, but you're not sure if it worked.
        KerbinSrfLandedBaikerbanur* = #CSS_seismicScan_KerbinSrfLandedBaikerbanur_00 // The seismometer registers a boulder rolling towards the centre from the mountain. Perhaps this is why they moved to Cape Kerbal.
        KerbinSrfLandedBaikerbanurLaunchpad* = #CSS_seismicScan_KerbinSrfLandedBaikerbanurLaunchpad_00 // The vessel jolts very slightly as the decaying concrete slowly crumbles under it.
        KerbinSrfLandedCrawlerway* = #CSS_seismicScan_KerbinSrfLandedCrawlerway_00 // The Seismometer goes off the charts as the crawler slowly trundles by.
        KerbinSrfLandedFlagPole* = #CSS_seismicScan_KerbinSrfLandedFlagPole_00 // The needle moves as you drop down the pole.
        KerbinSrfLandedLaunchPad* = #CSS_seismicScan_KerbinSrfLandedLaunchPad_00 // The ground trembles with the ghosts of failed launches past.
        KerbinSrfLandedLaunchPad* = #CSS_seismicScan_KerbinSrfLandedLaunchPad_01 // You wonder if repeated rocket launches have caused the ground to become unstable.
        KerbinSrfLandedMissionControl* = #CSS_seismicScan_KerbinSrfLandedMissionControl_00 // All the stomping around here registers clearly on the seismometer.
        KerbinSrfLandedR&D* = #CSS_seismicScan_KerbinSrfLandedR&D_00 // The R&D scientists disassemble the seismometer for parts.
        KerbinSrfLandedR&DCentralBuilding* = #CSS_seismicScan_KerbinSrfLandedR&DCentralBuilding_00 // You miss the reading while explaining to one of the scientists how this thing works.
        KerbinSrfLandedR&DCornerLab* = #CSS_seismicScan_KerbinSrfLandedR&DCornerLab_00 // You stuff the seismometer into the corner, and hope that no one remembers it.
        KerbinSrfLandedR&DMainBuilding* = #CSS_seismicScan_KerbinSrfLandedR&DMainBuilding_00 // The R&D scientists interpret the data from the seismometer in real time, and you realize maybe this science stuff really IS useful.
        KerbinSrfLandedR&DObservatory* = #CSS_seismicScan_KerbinSrfLandedR&DObservatory_00 // Your observations are observed in the observatory by an observer.
        KerbinSrfLandedR&DSideLab* = #CSS_seismicScan_KerbinSrfLandedR&DSideLab_00 // The seismometer falls on its side and breaks. Oh well, time for some snacks anyway.
        KerbinSrfLandedR&DSmallLab* = #CSS_seismicScan_KerbinSrfLandedR&DSmallLab_00 // Despite the cramped conditions the seismometer performs perfectly and registers: absolutely nothing.
        KerbinSrfLandedR&DTanks* = #CSS_seismicScan_KerbinSrfLandedR&DTanks_00 // You recruit some friends to bang on all the tanks, and the reading goes off scale.
        KerbinSrfLandedR&DWindTunnel* = #CSS_seismicScan_KerbinSrfLandedR&DWindTunnel_00 // As usual, your instrument gets blown away here before you can take a reading. Why do you even try?
        KerbinSrfLandedRunway* = #CSS_seismicScan_KerbinSrfLandedRunway_00 // The ground here conducts vibrations about as effectively as concrete. You report your findings to the tower, but they don't seem very impressed.
        KerbinSrfLandedRunway* = #CSS_seismicScan_KerbinSrfLandedRunway_01 // You calibrate the detector one more time before lifting off.
        KerbinSrfLandedSPH* = #CSS_seismicScan_KerbinSrfLandedSPH_00 // The planes are too light to register anything on the seismometer here.
        KerbinSrfLandedSPHMainBuilding* = #CSS_seismicScan_KerbinSrfLandedSPHMainBuilding_00 // Nope, still nothing. Let's have some snacks while we're bored.
        KerbinSrfLandedSPHRoundTank* = #CSS_seismicScan_KerbinSrfLandedSPHRoundTank_00 // You bang on the side of the tank, which registers on the seismometer.
        KerbinSrfLandedSPHTanks* = #CSS_seismicScan_KerbinSrfLandedSPHTanks_00 // You recruit some friends to bang on all the tanks, and the reading goes off scale.
        KerbinSrfLandedSPHWaterTower* = #CSS_seismicScan_KerbinSrfLandedSPHWaterTower_00 // You wonder if dumping all the water will make the needle move.
        KerbinSrfLandedTrackingStation* = #CSS_seismicScan_KerbinSrfLandedTrackingStation_00 // Nothing happening here. No big surprise.
        KerbinSrfLandedTrackingStationDishEast* = #CSS_seismicScan_KerbinSrfLandedTrackingStationDishEast_00 // You consider what a waste of your time taking this measurement is.
        KerbinSrfLandedTrackingStationDishNorth* = #CSS_seismicScan_KerbinSrfLandedTrackingStationDishNorth_00 // Vibrations from the moving dish overwhelm everything. Why are we even taking this measurement?
        KerbinSrfLandedTrackingStationDishSouth* = #CSS_seismicScan_KerbinSrfLandedTrackingStationDishSouth_00 // Ugh, more seismometer measurements. Maybe you'll be nicer to Gene next time.
        KerbinSrfLandedTrackingStationHub* = #CSS_seismicScan_KerbinSrfLandedTrackingStationHub_00 // You throw the seismometer at the side of the building hoping that THAT might finally register a reading.
        KerbinSrfLandedVAB* = #CSS_seismicScan_KerbinSrfLandedVAB_00 // All the activity at the VAB registers clearly on the seismometer.
        KerbinSrfLandedVABMainBuilding* = #CSS_seismicScan_KerbinSrfLandedVABMainBuilding_00 // You get distracted looking at all the rockets and completely forget about taking a reading here.
        KerbinSrfLandedVABPodMemorial* = #CSS_seismicScan_KerbinSrfLandedVABPodMemorial_00 // Reading: nominal. Yep, that's really it.
        KerbinSrfLandedVABRoundTank* = #CSS_seismicScan_KerbinSrfLandedVABRoundTank_00 // You bang on the side of the tank, which registers on the seismometer.
        KerbinSrfLandedVABSouthComplex* = #CSS_seismicScan_KerbinSrfLandedVABSouthComplex_00 // Sawing and hammering from the workshop ripples out towards the sensor.
        KerbinSrfLandedVABTanks* = #CSS_seismicScan_KerbinSrfLandedVABTanks_00 // You recruit some friends to bang on all the tanks, and the reading goes off scale.
        KerbinSrfLandedIslandAirfield* = #CSS_seismicScan_KerbinSrfLandedIslandAirfield_00 // Waves hitting the island provide the majority of noise.
        KerbinSrfLandedWoomerang* = #CSS_seismicScan_KerbinSrfLandedWoomerang_00 // The framework of the pad vibrates very slightly as the wind whistles through it.

        KerbinSrfLandedWater* = #CSS_seismicScan_KerbinSrfLandedWater_00 // Wave impacts generate rythmic thumps on the seismograph.
        KerbinSrfLandedGrasslands* = #CSS_seismicScan_KerbinSrfLandedGrasslands_00 // The seismometer registers the gentle jostling of the blades of grass against it. Other than that it doesn't seem to be reading anything.
        KerbinSrfLandedGrasslands* = #CSS_seismicScan_KerbinSrfLandedGrasslands_01 // You wonder what it is about grass that keeps the earthquakes away.
        KerbinSrfLandedGrasslands* = #CSS_seismicScan_KerbinSrfLandedGrasslands_02 // You jump up and down a few times, just so the seismometer will have something to show to Mission Control.
        KerbinSrfLandedHighlands* = #CSS_seismicScan_KerbinSrfLandedHighlands_00 // With such a massive mountain below your feet you have little hope of the seismometer registering a reading. So you absentmindedly munch on some snacks to pass the time.
        KerbinSrfLandedHighlands* = #CSS_seismicScan_KerbinSrfLandedHighlands_01 // Seismographic readings give hints of the turbulent geologic history of the Highlands.
        KerbinSrfLandedHighlands* = #CSS_seismicScan_KerbinSrfLandedHighlands_02 // You roll the seismometer down the hill and laugh at how confused it gets.
        KerbinSrfLandedShores* = #CSS_seismicScan_KerbinSrfLandedShores_00 // The seismometer registers the force of waves hitting the shore and not much else.
        KerbinSrfLandedShores* = #CSS_seismicScan_KerbinSrfLandedShores_01 // The shallow water echoes vibrations from the muddy soil below.
        KerbinSrfLandedShores* = #CSS_seismicScan_KerbinSrfLandedShores_02 // Seismic waves reflecting within the subsurface reveal many layers of material comprising previous beaches from long ago.
        KerbinSrfLandedMountains* = #CSS_seismicScan_KerbinSrfLandedMountains_00 // The mountain seems far too large and sturdy to be shaken by anything, but you set up the sensor anyway to appease the folks back at KSC.
        KerbinSrfLandedMountains* = #CSS_seismicScan_KerbinSrfLandedMountains_01 // You send your seismic data back to KSC and glance nervously at the mountain beneath you. They'll tell you if there was an active volcano down there, right?
        KerbinSrfLandedMountains* = #CSS_seismicScan_KerbinSrfLandedMountains_02 // There's not much activity here beyond the odd rockfall. The titanic processes that built these great citadels of rock must have ceased aeons ago.
        KerbinSrfLandedDeserts* = #CSS_seismicScan_KerbinSrfLandedDeserts_00 // *singing* "I've been through the desert on a horse with no name, it feels good to be out of the rain". Oops! As you were singing you drop the accelerometer into one of the cracks in the dry ground, and can't reach it. Oh well, time to make something up for the scientists back at KSC again.
        KerbinSrfLandedDeserts* = #CSS_seismicScan_KerbinSrfLandedDeserts_01 // Seismic readings seem to indicate a large artificial structure directly underfoot. The lost tomb of an ancient Kerbal king perhaps?
        KerbinSrfLandedBadlands* = #CSS_seismicScan_KerbinSrfLandedBadlands_00 // The ground here rumbles with constant activity. Maybe this is why they call it the Badlands.
        KerbinSrfLandedBadlands* = #CSS_seismicScan_KerbinSrfLandedBadlands_01 // So here we are, the center of all earthquakes on the entire planet. Or so the scientists say, but who believes them anyway with their fancy 'hypotheses' and 'equations'.
        KerbinSrfLandedBadlands* = #CSS_seismicScan_KerbinSrfLandedBadlands_02 // You wonder if there used to be a 'Goodlands' here before the earthquakes.
        KerbinSrfLandedTundra* = #CSS_seismicScan_KerbinSrfLandedTundra_00 // The seismometer is sensitive enough to detect the subtle tremors cause by the nearby massive ice sheets grinding against rock.
        KerbinSrfLandedTundra* = #CSS_seismicScan_KerbinSrfLandedTundra_01 // The seismometer trembles at the thought of being left here.
        KerbinSrfLandedTundra* = #CSS_seismicScan_KerbinSrfLandedTundra_02 // It appears there is normal seismic activity under the layers of dirt.
        KerbinSrfLandedIceCaps* = #CSS_seismicScan_KerbinSrfLandedIceCaps_00 // The seismometer registers the distant ground impact of an avalanche. You look around nervously.
        KerbinSrfLandedIceCaps* = #CSS_seismicScan_KerbinSrfLandedIceCaps_01 // One of the nearby glaciers appears to be moving rather fast, judging from all the seismic noise it's making.
        KerbinSrfLandedNorthernIceShelf* = #CSS_seismicScan_KerbinSrfLandedNorthernIceShelf_00 // The seismometer registers the rumbling, cracking sounds that you can hear coming from underfoot. You are amazed by the power that the ice holds.
        KerbinSrfLandedNorthernIceShelf* = #CSS_seismicScan_KerbinSrfLandedNorthernIceShelf_01 // Seismic readings indicate that the ice beneath is undergoing movement and stress on an enormous scale.
        KerbinSrfLandedSouthernIceShelf* = #CSS_seismicScan_KerbinSrfLandedSouthernIceShelf_00 // Given the fragile state of the ice, an earthquake would be particularly bad right about now.
        KerbinSrfLandedSouthernIceShelf* = #CSS_seismicScan_KerbinSrfLandedSouthernIceShelf_01 // A long line of tensional signatures near the edge of the ice shelf suggests a major calving event is about to take place.

        MunSrfLanded* = #CSS_seismicScan_MunSrfLanded_00 // It just detected an impact somewhere on the Mun.
        MunSrfLanded* = #CSS_seismicScan_MunSrfLanded_01 // Nothing to worry about. Really!
        MunSrfLandedMidlands* = #CSS_seismicScan_MunSrfLandedMidlands_00 // The Mun appears to be geologically dead. All you can detect are the slight tremors generated by meteorite impacts.
        MunSrfLandedNorthernBasin* = #CSS_seismicScan_MunSrfLandedNorthernBasin_00 // The sensor seems clogged from all the Munar dust. You give up and have a snack.
        MunSrfLandedEastCrater* = #CSS_seismicScan_MunSrfLandedEastCrater_00 // There's an odd signature coming from the crater to the west. You report it to Mission Control, hoping they'll be proud of you.
        MunSrfLandedNorthwestCrater* = #CSS_seismicScan_MunSrfLandedNorthwestCrater_00 // The massive impact appears to have created a fault line.
        MunSrfLandedSouthwestCrater* = #CSS_seismicScan_MunSrfLandedSouthwestCrater_00 // The quakes stop suddenly. You start to get alarmed, then realize you knocked the plug loose.
        MunSrfLandedFarsideCrater* = #CSS_seismicScan_MunSrfLandedFarsideCrater_00 // The readings here are solid, but they might be better if we could do them in a canyon.
        MunSrfLandedCanyons* = #CSS_seismicScan_MunSrfLandedCanyons_00 // The readings indicate a massive rockfall nearby.
        MunSrfLandedCanyons* = #CSS_seismicScan_MunSrfLandedCanyons_01 // The periodic moon-quakes seem clear and easy to read here. The science team will want to see these numbers.
        MunSrfLandedPolarCrater* = #CSS_seismicScan_MunSrfLandedPolarCrater_00 // The permanently shaded areas in the corners of the craters have slightly less seismic activity than the rest of the Mun.
        MunSrfLandedPoles* = #CSS_seismicScan_MunSrfLandedPoles_00 // You wonder how long it would take an impact at the south pole to register at the north pole.
        MunSrfLandedPolarLowlands* = #CSS_seismicScan_MunSrfLandedPolarLowlands_00 // The scans indicate a large series of quakes incoming! Oh wait, your hand brushed the sensor. False alarm.
        MunSrfLandedHighlands* = #CSS_seismicScan_MunSrfLandedHighlands_00 // The instrument registers a small anomaly. You aren't sure if this was a genuine seismic event or just a false positive from you shuffling your feet.
        MunSrfLandedHighlandCraters* = #CSS_seismicScan_MunSrfLandedHighlandCraters_00 // The ground appears to have many small fractures from the multiple impacts, causing slight distortions in readings.
        MunSrfLandedMidlandCraters* = #CSS_seismicScan_MunSrfLandedMidlandCraters_00 // You carefully place the sensor down on the dusty surface and pat it on the top. 'Now there's a good little sensor.'
        MunSrfLandedEastFarsideCrater* = #CSS_seismicScan_MunSrfLandedEastFarsideCrater_00 // You set the seismometer down and it promptly tumbles down the embankment to the bottom of the crater. At least it registered something!
        MunSrfLandedTwinCraters* = #CSS_seismicScan_MunSrfLandedTwinCraters_00 // You hope that the geology here will concentrate any minute vibrations from deep within the Mun.

        MinmusSrfLanded* = #CSS_seismicScan_MinmusSrfLanded_00 // You detect some seismic activity, most likely caused by tidal forces.
        MinmusSrfLandedHighlands* = #CSS_seismicScan_MinmusSrfLandedHighlands_00 // The lake beds rumble periodically. Perhaps the tidal forces are causing heating under all that ice.
        MinmusSrfLandedFlats* = #CSS_seismicScan_MinmusSrfLandedFlats_00 // You detect somewhat violent shuddering somewhere on the opposite side of Minmus. It was likely caused by a small meteorite impact.
        MinmusSrfLandedGreatFlats* = #CSS_seismicScan_MinmusSrfLandedGreatFlats_00 // You watch the data as it clearly shows that nothing interesting is happening at all.
        MinmusSrfLandedGreaterFlats* = #CSS_seismicScan_MinmusSrfLandedGreaterFlats_00 // The seismometer detects some minor quakes, and what sounds like bubbling. Perhaps these areas are resurfaced by occasional geological activity.
        MinmusSrfLandedGreaterFlats* = #CSS_seismicScan_MinmusSrfLandedGreaterFlats_01 // A large impact nearby sends shockwaves throughout the planet. This is a perfect opportunity to map the interior!
        MinmusSrfLandedLesserFlats* = #CSS_seismicScan_MinmusSrfLandedLesserFlats_00 // The vibrations indicate there's some rock under all that ice.
        MinmusSrfLandedSlopes* = #CSS_seismicScan_MinmusSrfLandedSlopes_00 // A boulder rolling down the neighboring slope interferes with your readings.
        MinmusSrfLandedSlopes* = #CSS_seismicScan_MinmusSrfLandedSlopes_00 // There's a lot of static on the sensor feed. Are we sliding down the hill?

        DunaSrfLanded* = #CSS_seismicScan_DunaSrfLanded_00 // The planet doesn't seem to have much seismic activity.
        DunaSrfLandedPoles* = #CSS_seismicScan_DunaSrfLandedPoles_00 // The seismic scan picks up some vibrations as gas vents from the ice cap underneath.
        DunaSrfLandedPoles* = #CSS_seismicScan_DunaSrfLandedPoles_01 // The scan detects some activity, probably associated with melting of the polar cap.
        DunaSrfLandedMidlands* = #CSS_seismicScan_DunaSrfLandedMidlands_00 // The readings indicate a solid iron core. This planet might have had a functioning geodynamo in the distant past before its core fully cooled.
        DunaSrfLandedMidlands* = #CSS_seismicScan_DunaSrfLandedMidlands_01 // A refracted ping is recieved from an antipodal mountain. This reveals a still partially-molten interior. Could the mountain be a dormant volcano?
        DunaSrfLandedLowlands* = #CSS_seismicScan_DunaSrfLandedLowlands_00 // The instrument detects some very faint tremors. Maybe Duna isn't so dead after all?
        DunaSrfLandedLowlands* = #CSS_seismicScan_DunaSrfLandedLowlands_01 // Nothing. Zilch. Nada. The only vibrations have come from you dropping a snack.
        DunaSrfLandedCraters* = #CSS_seismicScan_DunaSrfLandedCraters_00 // Not much interesting happens when you run the seismic scan. Maybe the planet is geologically dead, or perhaps it is just having a nap.
        DunaSrfLandedCraters* = #CSS_seismicScan_DunaSrfLandedCraters_01 // The ground is still and silent, like everywhere else on this freezing rustball. You wonder what the impact would have felt like.
        DunaSrfLandedHighlands* = #CSS_seismicScan_DunaSrfLandedHighlands_00 // The seismograph barely responds. If this planet ever had seismic activity, it doesn't any more.
        DunaSrfLandedHighlands* = #CSS_seismicScan_DunaSrfLandedHighlands_01 // Tiny vibrations from skittering rocks on the surface are all that show up on the equipment.
        DunaSrfLandedMidlandSea* = #CSS_seismicScan_DunaSrfLandedMidlandSea_00 // The libration of Ike overhead generates almost undetectable tremors from ground movement akin to tides.
        DunaSrfLandedMidlandSea* = #CSS_seismicScan_DunaSrfLandedMidlandSea_01 // The entire planet looks to have flatlined, or at least the seismograph has.
        DunaSrfLandedNorthernBasin* = #CSS_seismicScan_DunaSrfLandedNorthernBasin_00 // Pings sent down into the bedrock are scattered and refracted in all directions, indicating the presence of extensive rock faulting and fracturing.
        DunaSrfLandedNorthernBasin* = #CSS_seismicScan_DunaSrfLandedNorthernBasin_01 // There's no detectable activity here, which means no active tectonics in the area.
        DunaSrfLandedSouthernBasin* = #CSS_seismicScan_DunaSrfLandedSouthernBasin_00 // Cracking and shifting ice in the basin creates some weak, shallow waves.
        DunaSrfLandedSouthernBasin* = #CSS_seismicScan_DunaSrfLandedSouthernBasin_01 // The sparse seismic activity seems to peak during the day, as though the nearby ice melting is resposible for shockwaves.
        DunaSrfLandedNorthernShelf* = #CSS_seismicScan_DunaSrfLandedNorthernShelf_00 // The wind rattles the seismometer so much it's impossible to get a reading. Apparently, this is a magnitude VI dunaquake, if such a thing exists.
        DunaSrfLandedNorthernShelf* = #CSS_seismicScan_DunaSrfLandedNorthernShelf_01 // In amongst all the vibration noise, the meter picks up a tiny rumble from deep beneath the ground. Could this place be a relic of an ancient fault line?
        DunaSrfLandedMidlandCanyon* = #CSS_seismicScan_DunaSrfLandedMidlandCanyon_00 // The ground is perfectly still here, save for some vanishingly faint pings from the other side of the planet.
        DunaSrfLandedMidlandCanyon* = #CSS_seismicScan_DunaSrfLandedMidlandCanyon_01 // Ike's libration overhead generates regular swarms of tiny movements in the crust.
        DunaSrfLandedEasternCanyon* = #CSS_seismicScan_DunaSrfLandedEasternCanyon_00 // What's that? Did everyone feel that? The seismometer certainly did, and we appear to have landed in a rift valley zone.
        DunaSrfLandedEasternCanyon* = #CSS_seismicScan_DunaSrfLandedEasternCanyon_01 // After a while, the sensor has detected no less than eleven small quakes. Duna is still active after all!
        DunaSrfLandedWesternCanyon* = #CSS_seismicScan_DunaSrfLandedWesternCanyon_00 // Not a peep. Either Duna is dozing, or it really is seismially dead.
        DunaSrfLandedWesternCanyon* = #CSS_seismicScan_DunaSrfLandedWesternCanyon_01 // Discouraged, you leave the sensor running for some time. When you return, the only vibrations are from your feet and the wind.
        DunaSrfLandedPolarHighlands* = #CSS_seismicScan_DunaSrfLandedPolarHighlands_00 // The scattering of seismic pings sent down suggests the presence of multiple ice layers and rock far below.
        DunaSrfLandedPolarHighlands* = #CSS_seismicScan_DunaSrfLandedPolarHighlands_01 // Your scan records a few small tremors. Hopefully there are no Duna dinosaurs.
        DunaSrfLandedPolarCraters* = #CSS_seismicScan_DunaSrfLandedPolarCraters_00 // The detector picks up the vibrations of ice cracking and shifting beneath the ship. It's quite disconcerting.
        DunaSrfLandedPolarCraters* = #CSS_seismicScan_DunaSrfLandedPolarCraters_01 // Not much, apart from some ice noises. Either Duna is seismically dead or ice is a good shock absorber.

        IkeSrfLandedPolarLowlands* = #CSS_seismicScan_IkeSrfLandedPolarLowlands_00 // It's quiet. Too quiet. The seismic silence is unsettling.
        IkeSrfLandedPolarLowlands* = #CSS_seismicScan_IkeSrfLandedPolarLowlands_01 // Perhaps seismic waves don't reach these latitudes, since you aren't getting much at all.
        IkeSrfLandedMidlands* = #CSS_seismicScan_IkeSrfLandedMidlands_00 // The seismometer picks up faint signals from tidal deformation reflecting around inside the moon.
        IkeSrfLandedMidlands* = #CSS_seismicScan_IkeSrfLandedMidlands_01 // More pings are detected from the Duna-facing side of Ike, and even more at periapsis.
        IkeSrfLandedEasternMountainRidge* = #CSS_seismicScan_IkeSrfLandedEasternMountainRidge_00 // There is no sign of volcanic activity, but the surface is undergoing tidal stress from Duna's gravitational influence.
        IkeSrfLandedEasternMountainRidge* = #CSS_seismicScan_IkeSrfLandedEasternMountainRidge_01 // Was that a quake, or just a stone rolling slowly down the hill?
        IkeSrfLandedWesternMountainRidge* = #CSS_seismicScan_IkeSrfLandedWesternMountainRidge_00 // The solid structure of the mountains makes here a stable and clear place to observe seismic waves from.
        IkeSrfLandedWesternMountainRidge* = #CSS_seismicScan_IkeSrfLandedWesternMountainRidge_01 // No movements associated with mountain-building. Ike must be long dead and these mountains must be ancient.
        IkeSrfLandedLowlands* = #CSS_seismicScan_IkeSrfLandedLowlands_00 // Even the seismic scan seems to like Ike.
        IkeSrfLandedLowlands* = #CSS_seismicScan_IkeSrfLandedLowlands_01 // Faint seismic waves from tidal deformation and impacts hint at a complex internal structure.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_seismicScan_IkeSrfLandedSouthEasternMountainRange_00 // Did you feel that little jolt? Because the seismometer certainly did.
        IkeSrfLandedSouthEasternMountainRange* = #CSS_seismicScan_IkeSrfLandedSouthEasternMountainRange_01 // The amplified rumbles from deep inside the moon sound like the growling of a large animal.
        IkeSrfLandedSouthPole* = #CSS_seismicScan_IkeSrfLandedSouthPole_00 // The thick layers of loose rubble on the surface muffle and distort seismic waves, making it difficult to pick them up.
        IkeSrfLandedSouthPole* = #CSS_seismicScan_IkeSrfLandedSouthPole_01 // A few faint vibrations are detected, generated by impact events at lower latitudes. None come from the polar regions.
        IkeSrfLandedCentralMountainRange* = #CSS_seismicScan_IkeSrfLandedCentralMountainRange_00 // The quakes appear to be coming at regular intervals. A check of your star chart confirms they match the periapsis and apoapsis of the moon's orbit.
        IkeSrfLandedCentralMountainRange* = #CSS_seismicScan_IkeSrfLandedCentralMountainRange_01 // As Duna gets bigger in the sky, so does the rate of seismic activity. You half expect to see a rock wave rolling towards you.

        DresSrfLanded* = #CSS_seismicScan_DresSrfLanded_00 // Seismic sensors show that this dwarf planet has little geologic activity. You wonder if detonating a fuel tank would somehow remedy the situation.
        DresSrfLandedPoles* = #CSS_seismicScan_DresSrfLandedPoles_00 // There is a faint pulsating vibration, like a heartbeat. But it's not a heartbeat, because that would be crazy.
        DresSrfLandedHighlands* = #CSS_seismicScan_DresSrfLandedHighlands_00 // You tap the ground a few times. Yep, it's on. This planet is just dead.
        DresSrfLandedCanyons* = #CSS_seismicScan_DresSrfLandedCanyons_00 // There's no internal movement. Aside from the impacts of meteors, the needle never moves.

        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_00 // The seismic graph is going crazy. The Joolian system seems to be subjecting Laythe to an unholy chiropractic session.
        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_01 // You notice the ground starting to shake. You might want to leave soon.
        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_02 // Laythe's surface stretches and flexes under the strain of tidal forces from Jool.
        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_03 // The sensor is detecting heavy seismic activity deep below the surface. Perhaps Laythe has previously undetected volcanic activity. Only time will tell.
        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_04 // You've set the craft right on top of a fault line! You find this both fascinating and absolutely terrifying.
        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_05 // Laythe shows some very important seismic activity. You're not sure the craft can survive a tsunami, but at least it keeps the moon temperate.
        LaytheSrfLanded* = #CSS_seismicScan_LaytheSrfLanded_06 // The readings fluctuate dramatically in conjunction with the waves. Perhaps it would be better to run this experiment on land.
        LaytheSrfLandedPoles* = #CSS_seismicScan_LaytheSrfLandedPoles_00 // Fluctuations within the planet's core are detected as signs of the tidal forces exerted by Jool.
        LaytheSrfLandedShores* = #CSS_seismicScan_LaytheSrfLandedShores_00 // The detector picks up a seismic anomaly! You feel shaken.
        LaytheSrfLandedShores* = #CSS_seismicScan_LaytheSrfLandedShores_00 // Waves breaking on the shore is interfering with the sensitivity of your instrument.
        LaytheSrfLandedDunes* = #CSS_seismicScan_LaytheSrfLandedDunes_00 // Seismic scan reports distant booms, both under the ocean and on the surface. They seem to be volcanoes.

        VallSrfLanded* = #CSS_seismicScan_VallSrfLanded_00 // You detect some underground tremors. You decide they are caused by cryovolcanic events.
        VallSrfLandedMidlands* = #CSS_seismicScan_VallSrfLandedMidlands_00 // This data would be very valuable in advancing science if the screen hadn't iced over.
        VallSrfLandedHighlands* = #CSS_seismicScan_VallSrfLandedHighlands_00 // The seismic scan indicates that there is a sudden density change a significant distance below the surface.
        VallSrfLandedLowlands* = #CSS_seismicScan_VallSrfLandedLowlands_00 // Wow, what a quake! Something big must have just shifted underground.
        VallSrfLandedNortheastBasin* = #CSS_seismicScan_VallSrfLandedNortheastBasin_00 // Using the power of electricity, the screen shows nothing. Not even if you believe.

        TyloSrfLanded* = #CSS_seismicScan_TyloSrfLanded_00 // This moon appears to be mostly inactive geologically. You detect little to no activity.
        TyloSrfLandedHighlands* = #CSS_seismicScan_TyloSrfLandedHighlands_00 // Periodic quakes roll through the moon, indicating the presence of massive cave networks.

        BopSrfLanded* = #CSS_seismicScan_BopSrfLanded_00 // The seismometer briefly goes off the charts, then seems to decide that Bop is geologically dead.
        BopSrfLanded* = #CSS_seismicScan_BopSrfLanded_01 // Some vibrations have been detected under your vessel. You start to think about the creepy stories your friends have told you.
        BopSrfLanded* = #CSS_seismicScan_BopSrfLanded_02 // Bop seems to be impacted often... what is hitting it?
        BopSrfLandedPeaks* = #CSS_seismicScan_BopSrfLandedPeaks_00 // The small moon is resonating with an odd musical frequency. Hooking the sensor feed up to some speakers, you recognize it as a toccata.
        BopSrfLandedRidges* = #CSS_seismicScan_BopSrfLandedRidges_00 // The planet gives off steady quakes which grow in intensity as Vall passes; as it leaves, they settle down again. This would be expected if the other moons did the same.
        BopSrfLandedPoles* = #CSS_seismicScan_BopSrfLandedPoles_00 // There are subtle vibrations that cannot be explained by Bop's physical characteristics.
        BopSrfLandedSlopes* = #CSS_seismicScan_BopSrfLandedSlopes_00 // How can it be that Bop is this rock-steady for such a small moon?
        BopSrfLandedValley* = #CSS_seismicScan_BopSrfLandedValley_00 // Among all the shakes and jitters, you notice a continual pulsing pattern. It makes you feel uneasy.

        PolSrfLanded* = #CSS_seismicScan_PolSrfLanded_00 // Apart from the occasional Kerbal falling down the cliff, there is nothing for the seismometer to detect.
        PolSrfLandedPoles* = #CSS_seismicScan_PolSrfLandedPoles_00 // There seems to be a lot of seismic activity around Pol's poles.
        PolSrfLandedLowlands* = #CSS_seismicScan_PolSrfLandedLowlands_00 // These results are gibberish! The interior of this little moon must be messier than Bob's office.
        PolSrfLandedHighlands* = #CSS_seismicScan_PolSrfLandedHighlands_00 // After squinting at the device, you can still see vibrations from your landing on the screen, circling the (very tiny) globe.
        PolSrfLandedMidlands* = #CSS_seismicScan_PolSrfLandedMidlands_00 // The sensor registers very weak vibrations, which could provide a clue as to why Pol is that crumbled up.

        EelooSrfLanded* = #CSS_seismicScan_EelooSrfLanded_00 // There's a slight quake every now and then, but not much noteworthy activity.
        EelooSrfLanded* = #CSS_seismicScan_EelooSrfLanded_01 // There's not much seismic activity out here.
        EelooSrfLanded* = #CSS_seismicScan_EelooSrfLanded_02 // Some seismic activity suggests that the interior of Eeloo is not completely frozen.
        EelooSrfLandedPoles* = #CSS_seismicScan_EelooSrfLandedPoles_00 // Darn it, Jim! I'm a doctor, not a geologist! How do I know if there's going to be an Eeloo quake?
        EelooSrfLandedNorthernGlaciers* = #CSS_seismicScan_EelooSrfLandedNorthernGlaciers_00 // Eeloo is silent.
        EelooSrfLandedLowlands* = #CSS_seismicScan_EelooSrfLandedLowlands_00 // Vibrations suggest that the surface of Eeloo is in fact moving over a liquid core.
        EelooSrfLandedHighlands* = #CSS_seismicScan_EelooSrfLandedHighlands_00 // Was that a small tremor, or did the planet just shiver?
        EelooSrfLandedIceCanyons* = #CSS_seismicScan_EelooSrfLandedIceCanyons_00 // The scans indicate that the ice below you is moving slightly.
        EelooSrfLandedCraters* = #CSS_seismicScan_EelooSrfLandedCraters_00 // The planet seems as still and dead as a rock right now. A large, frozen, ice-covered rock.
        EelooSrfLandedMidlands* = #CSS_seismicScan_EelooSrfLandedMidlands_00 // The ice and rock appear to be shifting slightly, indicating some internal heating.
    }
