        #JNSQscience_mobileMaterialsLab_EveSrfSplashedPetrolLakes_01 = Diversi polimeri si gonfiano come palloncini, poi cedono in grumi senza forma. Le note del laboratorio lo definiscono "non ideale".
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofAkron_00 = Una minuscola scintilla elettrica guizza sulla pellicola di superficie. Non esplode nulla, e questo è sospettosamente deludente.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofAkron_01 = I campioni più pesanti affondano con un movimento lento e deliberato, lasciando una scia oleosa che si appiccica a tutto.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofNessus_00 = Il vano si riempie di un sentore pungente di solvente mentre i rivestimenti si sciolgono nel mare. I filtri lavorano a ritmo continuo.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofNessus_01 = I metalli si vaiolano rapidamente, ma alcune ceramiche escono quasi intatte, come se il mare avesse dei preferiti.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofTaniwha_00 = Il liquido tira i campioni a piccoli impulsi. L'acciaio armonico fa "twang" come se avesse sentito una voce.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofTaniwha_01 = Polvere fine sale dal nulla e si attacca a ogni superficie bagnata. Ora hai dati "a prova di fango".
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGigan_00 = Il fluido è così denso che sciaborda come sciroppo. Le schiume si comprimono, rimbalzano e poi restano imbarazzate.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGigan_01 = Diverse vernici si staccano in fogli perfetti, rivelando metallo nudo che inizia subito a frizzare.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofRodan_00 = Gli spruzzi spinti dal vento tempestano il vano. I materiali morbidi vengono abrasi come in una sabbiatrice.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofRodan_01 = I campioni tornano ricoperti da un residuo granuloso che rifiuta di sciacquarsi via. Valuti di dargli un nome.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGojira_00 = Il mare lascia una pellicola pesante su tutto. Le cerniere si irrigidiscono e iniziano a lamentarsi in modo udibile.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGojira_01 = Alcuni campioni organici scoloriscono e si arricciano come snack troppo cotti. Non registri alcun test di assaggio.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGhidorah_00 = Il liquido sembra stratificato. Alcuni campioni galleggiano, poi si ribaltano e affondano come se fossero tirati da tre regole diverse.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofGhidorah_01 = I pattern di corrosione formano striature ramificate, come se il mare stesse disegnando una mappa sul metallo.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofBagorah_00 = Il vano si riempie di goccioline appiccicose che si attaccano a lenti e guarnizioni. La pulizia diventa un esperimento a parte.
        #JNSQscience_mobileMaterialsLab_EveSrfSplashedSeaofBagorah_01 = Diverse plastiche si ammorbidiscono in un pasticcio simile a catrame, mentre i compositi se la scrollano di dosso e sembrano compiaciuti.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedLowlands_00 = I bassopiani sono così umidi che la condensa si forma subito sui contenitori dei campioni. Diverse etichette si sciolgono in arte moderna.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedLowlands_01 = Il fango schizza sulle porte mentre il vano si apre. Un campione ora è ufficialmente classificato come perlopiù bassopiani.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridLowlands_00 = La sabbia fine e secca dei bassopiani aridi si infila in ogni cerniera e chiusura. Il laboratorio ora sembra masticare sabbia.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridLowlands_01 = I campioni cuociono al sole finché gli allarmi di temperatura non si offendono. Chiudi il vano e fai finta che fosse un test di calibrazione.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridMountains_00 = Nelle montagne aride, la porta del vano si apre e se ne pente subito. La polvere abrasiva tenta di sabbiare gli strumenti.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedAridMountains_01 = Un vassoio campioni allentato scivola in discesa al rallentatore. Registri i dati come prova che la gravità funziona ancora.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedWelcomeBackIsland_00 = L'Isola del Ritorno è piena di cinghie scolorite dal sole e misteriosi segni di bruciatura. I campioni sembrano perfettamente a loro agio.
        #JNSQscience_mobileMaterialsLab_KerbinSrfLandedWelcomeBackIsland_01 = Esegui un test di esposizione completo e raccogli subito un souvenir: una piccola conchiglia incollata alla guarnizione della porta. Conta come contaminazione e morale.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashed_00 = Dopo un tuffo rapido, il vano materiali riemerge gocciolante e leggermente offeso. Le letture suggeriscono che l'acqua è, di fatto, bagnata.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashed_01 = I portacampioni ondeggiano mentre galleggi. Il Controllo Missione ti ricorda che i test marini non sono un'attività ricreativa.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedGreatLake_00 = L'acqua dolce dei grandi laghi sciacqua il vano, poi lascia su tutto una patina verde. Le alghe sono molto scrupolose.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedGreatLake_01 = Fai ruotare i vassoi sott'acqua e guardi le bolle uscire da ogni fessura. Gli ingegneri rispondono: per favore, smettila.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedInlandWater_00 = Le acque interne sono abbastanza calme per test accurati. Poi un'onda si infila e riordina i campioni per colore.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedInlandWater_01 = Le porte del vano si aprono sott'acqua e un pesce curioso indaga. Lo registri come ispettore esterno.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedKreenwichSea_00 = Il mare di Krenwich sa di sale e rimpianto. I test di corrosione iniziano nel momento in cui le porte del vano si socchiudono.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedKreenwichSea_01 = Lo spray marino lascia motivi cristallini sulle piastre campione. Per un attimo pensi di chiamarla arte per giustificare i fondi extra.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedForemansSea_00 = Il mare di Foreman è agitato e il laboratorio riceve una bella scossa. Diversi campioni affrontano un test di resistenza accelerato.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedForemansSea_01 = L'acqua salata si infila in posti dove non dovrebbe proprio essere. Aggiungi una nuova categoria al rapporto: furtiva.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedTriangulusSea_00 = Qualcosa nel mare del Triangolo fa schiuma quando incontra i campioni. Decidi di non chiederti cos'altro ci sia nell'acqua.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedTriangulusSea_01 = Gli strumenti registrano un improvviso picco di conducibilità. Sembra che l'oceano stia vincendo l'esperimento.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedEasternSea_00 = Il mare orientale ricopre tutto con una patina salata che si asciuga in pochi secondi. I materiali ora sono ben conditi.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedEasternSea_01 = Un'onda lunga inclina l'astronave quanto basta per immergere il vano due volte. Sostieni che fosse un test di ripetizione controllato.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedWesternSea_00 = Il mare occidentale è più mosso del previsto e i vassoi campione sbattono come una scatola di bulloni. Dati ottimi, suono terribile.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedWesternSea_01 = A ogni onda l'acqua entra ed esce dal vano, strofinando i campioni come in una lavatrice. La scienza non è mai stata così rumorosa.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedNorthernSea_00 = Il mare settentrionale è abbastanza freddo da intorpidire le dita attraverso i guanti. Tra un test e l'altro il vano forma un sottile bordo di ghiaccio.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedNorthernSea_01 = Onde vivaci sferzano lo scafo e inzuppano il laboratorio. I campioni la prendono con stoicismo: tu no.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedSub-ArcticSea_00 = L'acqua del mare sub-artico è gelida e salmastra, e la porta del vano riemerge con fanghiglia nelle cerniere. Non sembra l'ideale.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedSub-ArcticSea_01 = Alcuni campioni si congelano per un attimo alla rastrelliera prima di staccarsi di colpo. Annoti la forza di adesione e la tua crescente irritazione.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedArcticSea_00 = Il mare artico prova a congelare il vano chiuso. Vinci applicando pazienza e una quantità preoccupante di potenza.
        #JNSQscience_mobileMaterialsLab_KerbinSrfSplashedArcticSea_01 = La salamoia fredda ricopre i campioni e cristallizza all'istante quando viene esposta all'aria. I motivi di brina risultanti sono stranamente belli.
        #JNSQscience_mobileMaterialsLab_MunSrfLandedMountains_00 = I pendii fanno sembrare il laboratorio sempre inclinato. Un contenitore scivola di ben un centimetro in un'ora. Praticamente, uno sprint.
        #JNSQscience_mobileMaterialsLab_MunSrfLandedMountains_01 = La fine polvere delle montagne graffia ogni superficie. I materiali iniziano a lucidarsi da soli in risposta, e la cosa è inquietante.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedPoles_00 = Diversi campioni sviluppano una brina luccicante che si rifiuta di sublimare. Il laboratorio ha un lieve sentore di "freddo".
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedPoles_01 = La polvere più fredda qui fa crepitare alcuni materiali con piccoli scoppiettii statici ogni volta che muovi il vassoio.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedLowlands_00 = La fine polvere verdognola si infila in ogni cerniera e giuntura. Il vassoio dei materiali ora si apre con "carattere".
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedLowlands_01 = Un campione di schiuma si gonfia leggermente, poi resta così come se ne fosse fiero. Lo registri come "inaspettatamente sicuro di sé".
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownBasins_00 = La polvere più scura macchia i campioni come se stesse marcando il territorio. La macchia non va via con la spazzolatura.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownBasins_01 = Diversi materiali si scaldano leggermente al sole diretto, poi si raffreddano all'istante all'ombra. La superficie marrone rende gli sbalzi più netti.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownLowlands_00 = La polvere marrone si attacca con ostinazione a polimeri e tessuti. Il tuo "campione di controllo" non sta più controllando niente.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownLowlands_01 = Un campione trasparente diventa opaco dove la graniglia più scura si incastra. Lo etichetti "otticamente offeso".
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownMidlands_00 = Il terreno variegato lascia sui campioni un rivestimento maculato, come se fossero stati pepati. Resistì alle battute sul condimento.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownMidlands_01 = Un campione placcato sviluppa piccole chiazze opache che si diffondono con un motivo ramificato. Annoti "possibile reazione chimica, o umore di Minmus".
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownHighlands_00 = La polvere delle colline marroni reagisce con un metallo formando una crosta piatta e opaca. Il campione sembra più vecchio di ieri.
        #JNSQscience_mobileMaterialsLab_MinmusSrfLandedBrownHighlands_01 = Un composito fragile rilascia una polvere fine al minimo tocco. Decidi di smettere di toccarlo, per scienza.
        #JNSQscience_mobileMaterialsLab_MinmusInSpaceLow_00 = I campioni fanno ping e clic mentre si raffreddano in modo irregolare tra sole e ombra. L'orbita bassa è un ciclo termico davvero maleducato.
        #JNSQscience_mobileMaterialsLab_MinmusInSpaceLow_01 = Alcuni materiali accumulano una lieve pellicola polverosa da particelle vicine. Anche nello spazio, Minmus trova un modo per finire dappertutto.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedRareCraters_00 = La polvere qui si infila in ogni cerniera e fessura, come se il cratere volesse reclamare la tua attrezzatura. Un contenitore inizia a cigolare in protesta.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedRareCraters_01 = Un sassolino rimbalza nel vano campioni con un arco pigro. La bassa gravità fa sembrare drammatici perfino i detriti.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedVoronoiCraters_00 = Il terreno a pattern sembra incoraggiare risultati a pattern: diversi campioni sviluppano crepe ordinate e increspature ripetute che risultano scomodamente "volute".
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedVoronoiCraters_01 = I sensori segnalano piccoli e regolari sbalzi di temperatura mentre il vano è aperto. Sospetti che micro correnti vorticose stiano sfilando tra le fosse laggiù.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedNotableCraters_00 = Il vassoio campioni vibra debolmente, poi si ferma, poi vibra di nuovo. Dai la colpa alle pareti del cratere che "incanalano il vento", perché l'alternativa è dare la colpa ai campioni.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedNotableCraters_01 = Una pellicola scura ricopre quasi subito le ottiche, trasformando ogni primo piano in arte astratta. I materiali cambiano poco, ma la tua fotocamera decisamente sì.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedExoticCraters_00 = I liquidi provano a congelare e a bollire nello stesso momento, lasciando un merletto di cristalli attorno ai contenitori. I solidi restano ostinatamente indifferenti.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedExoticCraters_01 = Granelli chiari rotolano nel vano e si attaccano a tutto, comprese le etichette. Lo archivi sotto "depositi interessanti" e "futuro problema di pulizia".
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedMountains_00 = I campioni si spostano e si assestano con angoli strani mentre il lander riposa su terreno irregolare. La bassa gravità trasforma ogni scivolata in un riassetto al rallentatore.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedMountains_01 = Roccia raffreddata a fondo irradia nel vano ogni volta che si aprono le porte. Diversi compositi diventano abbastanza fragili da spezzarsi quando la tavola vibrante li sfiora appena.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedVolcano_00 = La graniglia scura del terreno vulcanico stria il vano come fuliggine, e i sensori segnalano un leggero tepore rispetto alla polvere circostante. Le plastiche si rilassano quel tanto che basta per deformarsi e poi "ricordarsi" la deformazione.
        #JNSQscience_mobileMaterialsLab_DunaSrfLandedVolcano_01 = Granelli neri porosi si attaccano a un campione magnetizzato e costruiscono un rivestimento peloso. Scrivi "inaspettatamente collaborativo" e poi aggiungi "non inalare" in lettere più grandi.
        #JNSQscience_mobileMaterialsLab_IkeSrfLandedMidlands_00 = La polvere si infila nei vassoi dell'esperimento e trasforma alcuni liquidi in una pasta granulosa. Un contenitore ora fa un leggero ticchettio quando lo scuoti.
        #JNSQscience_mobileMaterialsLab_IkeSrfLandedLowlands_00 = I campioni raccolgono un rivestimento scuro di regolite che si rifiuta di staccarsi. Le note del laboratorio lo descrivono come "magneticamente irritante", che non è un'unità di misura.
        #JNSQscience_mobileMaterialsLab_IkeSrfLandedHighlands_00 = Sotto la luce intensa, le lamine riflettenti si increspano e crepitano, e un campione di gel forma spigoli vivi come se stesse cercando di diventare una roccia e integrarsi.
        #JNSQscience_mobileMaterialsLab_IkeInSpaceLow_00 = Nel vuoto spinto, diversi materiali bollono, congelano e sublimano in rapida successione, lasciando una fine polvere luccicante che vaga nel vano come se fosse casa sua.
        #JNSQscience_mobileMaterialsLab_IkeInSpaceHigh_00 = Con Ike che si restringe a un puntino color carbone laggiù, i campioni si assestano in un movimento lento e silenzioso, finché una vibrazione vagante non li riordina tutti in una nuova configurazione "stabile".
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedLowlands_00 = I campioni esposti sviluppano una fine spolverata scura. Il controllo "pulito" ora è quello più sporco.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedLowlands_01 = Una striscia di lamina diventa fragile e crepita quando la fletti, come se Edna stesse rubando calore a tutto con discrezione.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedMidlands_00 = Diversi materiali si contraggono abbastanza da far saltare i supporti. Il laboratorio suggerisce educatamente "meno entusiasmo" la prossima volta.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedMidlands_01 = Un campione di polimero diventa vetroso e fa clic quando lo picchietti, producendo un suono che qui sembra troppo forte.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedHighlands_00 = I campioni più ruvidi rilasciano granelli che si attaccano a tutto. Persino il rivestimento "antiaderente" si arrende.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedHighlands_01 = Una piastrella ceramica sopravvive alla perfezione, il che è sospetto. La segni come "troppo sicura di sé".
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedPolarIceCraters_00 = I campioni impregnati di freddo si coprono di brina all'ombra, poi si rifiutano di scongelare anche sotto luce diretta della lampada.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedPolarIceCraters_01 = Una lamina metallica torna con minuscole vaiolature, come se il buio senz'aria avesse comunque trovato un modo per "consumarla".
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedWhites_00 = Il terreno chiaro lascia un residuo pallido sulla rastrelliera dei campioni. Sembra pulito finché non ti accorgi che prima non c'era.
        #JNSQscience_mobileMaterialsLab_EdnaSrfLandedWhites_01 = Un rivestimento scolorisce verso lo stesso tono slavato della superficie esterna, come se stesse cercando di mimetizzarsi.
        #JNSQscience_mobileMaterialsLab_EdnaInSpaceLow_00 = I materiali esposti si raffreddano rapidamente all'ombra: il laboratorio annota uno sbalzo termico che sembra un insulto personale.
        #JNSQscience_mobileMaterialsLab_EdnaInSpaceLow_01 = Una pellicola sottile si incurva verso il pianeta mentre passi sul lato notturno, poi si appiattisce quando rientri nella luce.
        #JNSQscience_mobileMaterialsLab_EdnaInSpaceHigh_00 = Quassù i campioni perlopiù non fanno nulla, che il laboratorio interpreta come "dati eccellenti" e tu interpreti come "maleducazione".
        #JNSQscience_mobileMaterialsLab_EdnaInSpaceHigh_01 = Una finestrella del sensore accumula una lieve foschia che non si lascia pulire, come se perfino lo spazio vuoto attorno a Edna volesse lasciare un segno.
        #JNSQscience_mobileMaterialsLab_DakSrfLandedLowlands_00 = Il vano materiali si apre e tutto cerca subito di diventare tutt'uno con la polvere. Il vuoto fa sembrare i campioni stranamente "appena scartati".
        #JNSQscience_mobileMaterialsLab_DakSrfLandedLowlands_01 = Diverse strisce di test crepitano di staticità e attirano graniglia come un magnete che ha dimenticato che qui i magneti non funzionano. Lo etichetti "condimento elettrostatico di patata".
        #JNSQscience_mobileMaterialsLab_DakSrfLandedMidlands_00 = Micro impatti fanno ping sulle piastre esposte mentre guardi. I campioni più morbidi stanno già sviluppando un motivo di "crateri misteriosi".
        #JNSQscience_mobileMaterialsLab_DakSrfLandedMidlands_01 = Il campione adesivo si rifiuta di comportarsi senza aria, facendo lentamente bolle come se fosse imbarazzato a essere osservato. Annoti: "Il degassamento fa drama".
        #JNSQscience_mobileMaterialsLab_DakSrfLandedHighlands_00 = Granelli appuntiti sabbiano i campioni quando batti il vano. Le piastrelle antiabrasione ne sono compiaciute, che non è una proprietà che ti aspettavi dalle ceramiche.
        #JNSQscience_mobileMaterialsLab_DakSrfLandedHighlands_01 = I sensori termici mostrano rapidi sbalzi tra sole e ombra. Una lega flette quel tanto che basta per farti innervosire sulle "tolleranze a forma di patata".
        #JNSQscience_mobileMaterialsLab_DakInSpaceLow_00 = In orbita bassa, i campioni si raffreddano in fretta e restano così. L'isolante in schiuma funziona benissimo, ma il vetro sviluppa una lieve ragnatela di linee di stress.
        #JNSQscience_mobileMaterialsLab_DakInSpaceLow_01 = Il dosimetro di radiazione ticchetta mentre i metalli si coprono di brina in silenzio.
        #JNSQscience_mobileMaterialsLab_DakInSpaceHigh_00 = Ad alta quota, il vano segnala soprattutto vuoto e freddo, con un flusso costante di impatti di particelle. Il tessuto schermato regge: la pellicola non schermata diventa fragile e offesa.
        #JNSQscience_mobileMaterialsLab_DakInSpaceHigh_01 = I compositi esposti assumono un aspetto opaco e gessoso, come se lo spazio li stesse cancellando con delicatezza. Chiudi il vano prima che il "richiamo della sirena" di Dak convinca i campioni ad andarsene.
        #JNSQscience_mobileMaterialsLab_DresSrfLandedPoles_00 = I campioni più freddi si contraggono con un piccolo ping e si rifiutano di staccarsi dal vassoio. Annoti: "molto collaborativi, finché non li tocchi".
        #JNSQscience_mobileMaterialsLab_DresSrfLandedPoles_01 = Cristalli simili a brina strisciano sui bordi di diverse piastre, nonostante non ci sia una fonte evidente di alcunché. Lo etichetti "misterioso e pieno di spifferi".
        #JNSQscience_mobileMaterialsLab_DresSrfLandedHighlands_00 = La polvere abrasiva rende opache le superfici lucidate in pochi minuti. Un campione ora ha la finitura di "carta vetrata ben amata".
        #JNSQscience_mobileMaterialsLab_DresSrfLandedHighlands_01 = Un materiale fragile si spezza con un inquietante *tink* quando lo picchietti per misurarlo. Fai finta che fosse il test di stress previsto.
        #JNSQscience_mobileMaterialsLab_DresSrfLandedMidlands_00 = La maggior parte dei campioni reagisce non facendo assolutamente nulla. Sei costretto a scrivere "stabile" senza alcun sarcasmo.
        #JNSQscience_mobileMaterialsLab_DresSrfLandedMidlands_01 = La polvere fine si infila in ogni cerniera e guarnizione del vano. Il laboratorio la chiama "particolato penetrante". Tu la chiami "maleducata".
        #JNSQscience_mobileMaterialsLab_DresSrfLandedLowlands_00 = Il vassoio raccoglie una soffice coperta di polvere che si attacca a tutto tranne dove ti servirebbe. Le letture di staticità schizzano ogni volta che agiti un guanto lì vicino.
        #JNSQscience_mobileMaterialsLab_DresSrfLandedLowlands_01 = Diversi rivestimenti si scuriscono leggermente mentre la polvere si incastra nella loro trama superficiale. Il risultato è "più aderenza" o "peggio da pulire", a seconda del tuo ruolo.
        #JNSQscience_mobileMaterialsLab_DresSrfLandedCanyon_00 = I campioni sembrano non reagire all'ambiente, ma mentre li esamini ti pare di sentire un lieve urlo. Sono i campioni, o sei tu?
        #JNSQscience_mobileMaterialsLab_LaytheSrfLandedShallows_00 = Il laboratorio analizza diligentemente la sabbia umida e la dichiara "perlopiù minerali, in parte ottimismo". Prendi nota di tenerla lontana dalla linea di marea.
        #JNSQscience_mobileMaterialsLab_LaytheSrfLandedHighlands_00 = Il vassoio dei campioni si riempie di polvere granulosa delle colline: il laboratorio gira, bippeggia e alla fine riporta "non sabbia", come se questo chiudesse la questione.
        #JNSQscience_mobileMaterialsLab_LaytheSrfLandedMountains_00 = Schegge di roccia dei pendii tintinnano nel vano e il display segnala "alto stress" sia nel campione sia nell'operatore.
        #JNSQscience_mobileMaterialsLab_LaytheSrfLandedEnclosedFaults_00 = Gli strumenti continuano a registrare piccole vibrazioni ritmiche mentre i campioni si sistemano in strati ordinati. Lo etichetti "legato alle maree" e chiudi il vano.
        #JNSQscience_mobileMaterialsLab_LaytheSrfLandedLowlands_00 = Il terreno trasforma i filtri del laboratorio in un pasticcio appiccicoso e diversi campioni reagiscono fin troppo volentieri con l'umidità in tracce nell'aria.
        #JNSQscience_mobileMaterialsLab_LaytheSrfLandedMidlands_00 = La lettura del laboratorio oscilla tra "roccia", "sale" e "roccia che finge di essere sale". Decidi che Laythe sta facendo la misteriosa.
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedShores_00 = Uno spruzzo d'acqua di mare accende metà delle spie di avviso tutte insieme. Il laboratorio registra la reazione come "chimicamente entusiasta".
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedShallows_00 = Con il fondale vicino sotto, il vano alterna letture mentre l'astronave ondeggia, come se non riuscisse a scegliere tra "campione d'acqua" e "campione di suolo".
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedInlandWater_00 = Anche l'acqua più calma fa scolorire diversi materiali e li fa ritrarre dall'iniettore campioni. Il laboratorio lo archivia sotto "comportamento che evita l'acqua".
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedKrenwichSea_00 = Una lamina metallica inizia ad arrugginirsi prima che tu finisca di chiudere il portello. Il laboratorio suggerisce educatamente "meno oceano, più laboratorio".
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedArcticSea_00 = L'acqua fredda rallenta quasi tutte le reazioni fino a farle strisciare, poi un campione si scalda lo stesso giusto per restare interessante.
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedJoolwardSea_00 = Le letture mostrano sottili oscillazioni nelle misure del fluido, come se il mare stesso venisse stirato con delicatezza verso Jool.
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedPolwardSea_00 = Una fanghiglia fine contamina l'aspirazione e il vano si lamenta con un lungo bip offeso. Registri "ghiaccio presente" e "morale assente".
        #JNSQscience_mobileMaterialsLab_LaytheSrfSplashedEnclosedFaults_00 = I vassoi del vano sbattono mentre le pareti del bacino amplificano ogni onda e vibrazione. I campioni si sistemano in strisce che sembrano sospettosamente organizzate.
        #JNSQscience_mobileMaterialsLab_LaytheFlyingHigh_00 = Dentro il vano la condensa si forma più in fretta di quanto il laboratorio riesca a espellerla. I risultati sono perlopiù "umido" con un contorno di turbolenza.
        #JNSQscience_mobileMaterialsLab_LaytheInSpaceLow_00 = In microgravità, i campioni fluttuano in posti dove non avrebbero mai dovuto andare e il laboratorio passa gran parte della prova a reinventare il concetto di "giù".
        #JNSQscience_mobileMaterialsLab_LaytheInSpaceHigh_00 = Più lontano, le letture si smussano in una base quieta, finché il rivelatore non intercetta un debole tiro costante che continua a puntare verso l'oceano irrequieto di Laythe.
        #JNSQscience_mobileMaterialsLab_VallSrfLandedPoles_00 = Diversi campioni si congelano all'istante: uno diventa così fragile che si spezza solo a guardarlo.
        #JNSQscience_mobileMaterialsLab_VallSrfLandedMidlands_00 = Il vuoto risucchia il calore da ogni cosa: il materiale "flessibile" ora sostiene di essere sempre stato destinato a essere solido.
        #JNSQscience_mobileMaterialsLab_VallSrfLandedLowlands_00 = Fini granelli di ghiaccio blu si infilano in ogni cerniera e fessura. Il laboratorio dichiara che questo è "un prezioso test di abrasione".
        #JNSQscience_mobileMaterialsLab_VallSrfLandedMountains_00 = Le superfici esposte si vaiolano e si screpolano come se fossero sabbiate: a quanto pare le montagne lanciano minuscoli proiettili con entusiasmo.
        #JNSQscience_mobileMaterialsLab_VallInSpaceLow_00 = Fai passare i materiali nel vano. Tutto o congela, o si spacca, o prova a diventare "interessanti nuovi dati" tutto insieme.
        #JNSQscience_mobileMaterialsLab_VallInSpaceHigh_00 = Da alta quota sopra Vall, i campioni si comportano come se l'universo li stesse osservando. Etichetti la cartella "inquietante, ma riproducibile".
        #JNSQscience_mobileMaterialsLab_TyloSrfLandedPoles_00 = I campioni tornano freddi e fragili, con una spolverata chiara. Il laboratorio insiste che qui tutto pesa "un po' di più", persino la burocrazia.
        #JNSQscience_mobileMaterialsLab_TyloSrfLandedMountains_00 = La graniglia fine entra in ogni guarnizione, cerniera e speranza. Il tuo "ambiente controllato" ora è controllato soprattutto da Tylo.
        #JNSQscience_mobileMaterialsLab_TyloSrfLandedMidlands_00 = La regolite si sbriciola con facilità, come se si fosse allenata per secoli con gli impatti. Gli strumenti registrano "detriti processati" con una sicurezza inquietante.
        #JNSQscience_mobileMaterialsLab_TyloSrfLandedLowlands_00 = La polvere più scura si compatta in grumi ostinati che si rifiutano di collaborare. Il laboratorio la etichetta "interessante" e aumenta con discrezione gli avvisi di contenimento.
        #JNSQscience_mobileMaterialsLab_TyloFlyingLow_00 = Il laboratorio prova a campionare il sottile azoto e ottiene soprattutto polvere e staticità. Stampa comunque un rapporto, perché è quello che fa quando ha paura.
        #JNSQscience_mobileMaterialsLab_TyloFlyingHigh_00 = Quassù, "atmosfera" diventa una formalità. I materiali non sanno decidere se sono in volo o nello spazio, quindi scelgono di essere difficili.
        #JNSQscience_mobileMaterialsLab_TyloInSpaceLow_00 = La radiazione punteggia le letture e i campioni sviluppano una lieve carica sinistra. Il laboratorio chiede un universo più tranquillo in cui lavorare.
        #JNSQscience_mobileMaterialsLab_BopSrfLandedPoles_00 = I materiali provano a "ibernarsi", ma continuano a riordinarsi in piccoli cumuli di neve del destino dall'aria minacciosa.
        #JNSQscience_mobileMaterialsLab_BopSrfLandedLowlands_00 = I campioni si adagiano nella polvere come se avessero trovato casa. Poi iniziano a scavare minuscoli tunnel con un entusiasmo inquietante.
        #JNSQscience_mobileMaterialsLab_BopSrfLandedMidlands_00 = I materiali formano un piccolo cerchio ordinato e si rifiutano di essere separati. Lo registri come "coesione" e smetti di incrociare lo sguardo.
        #JNSQscience_mobileMaterialsLab_BopInSpaceHigh_00 = Lontano dalla superficie di Bop, i materiali si calmano, finché non si ricordano di Bop e riprendono a tramare in silenzio.
        #JNSQscience_mobileMaterialsLab_PolSrfLandedPoles_00 = I campioni sviluppano un rivestimento fragile e croccante. Sei abbastanza sicuro che non dovrebbe succedere nel vuoto.
        #JNSQscience_mobileMaterialsLab_PolSrfLandedMountains_00 = Il vano si riempie di graniglia gialla tagliente che prova subito a diventare parte di ogni cerniera e chiusura.
        #JNSQscience_mobileMaterialsLab_PolInSpaceLow_00 = In microgravità, i materiali vanno alla deriva in un piccolo grappolo ordinato, come se si stessero stringendo per conforto.
        #JNSQscience_mobileMaterialsLab_PolInSpaceHigh_00 = I campioni restano lì, rifiutandosi di reagire. In qualche modo sembra comunque una reazione.
        #JNSQscience_mobileMaterialsLab_LindorFlyingLow_00 = La pressione schiaccia i campioni di schiuma in piccoli dischi densi. Uno di loro squittisce in protesta.
        #JNSQscience_mobileMaterialsLab_LindorFlyingLow_01 = Diversi contenitori si coprono di brina all'istante, poi "scongelano" in una fanghiglia lenta che si rifiuta di restare nel vassoio.
        #JNSQscience_mobileMaterialsLab_LindorFlyingHigh_00 = L'aria più fredda e rarefatta disegna delicati pattern di brina di metano sulle piastre. Il laboratorio sembra essersi fatto le finestre da solo.
        #JNSQscience_mobileMaterialsLab_LindorFlyingHigh_01 = Alcuni campioni si caricano e si attaccano a qualunque cosa metallica. Per un attimo il vano materiali diventa una spazzola per capelli a tema scientifico.
        #JNSQscience_mobileMaterialsLab_LindorInSpaceLow_00 = Nel vuoto spinto, il campione di gel si gonfia come se stesse cercando di scappare, poi torna di colpo in un grumo raggrinzito.
        #JNSQscience_mobileMaterialsLab_LindorInSpaceLow_01 = Apri il vano e guardi minuscole scaglie staccarsi dai compositi fragili. Lo strumento registra "degradazione": tu registri "neve".
        #JNSQscience_mobileMaterialsLab_LindorInSpaceHigh_00 = I campioni smettono di muoversi del tutto. Ne tocchi uno con un attrezzo e ti penti subito del rumore che fa.
        #JNSQscience_mobileMaterialsLab_LindorInSpaceHigh_01 = Una pellicola sottile su una piastra striscia lentamente in strisce ordinate, come se stesse cercando di copiare lo stile del pianeta laggiù.
        #JNSQscience_mobileMaterialsLab_KrelSrfLandedLowlands_00 = Il campione di gomma diventa rigido e lucido nel gelo profondo, mentre la fine polvere chiara si infila in ogni cerniera come se fosse casa sua.
        #JNSQscience_mobileMaterialsLab_KrelSrfLandedMidlands_00 = Diverse leghe sviluppano crepe sottilissime che si allineano con le "vene" di Krel. Il laboratorio lo annota come "inquietantemente artistico".
        #JNSQscience_mobileMaterialsLab_KrelSrfLandedHighlands_00 = I pannelli compositi si delaminano con un leggero pop quando finiscono all'ombra, come se le colline fossero fatte di puro dispetto termico.
        #JNSQscience_mobileMaterialsLab_KrelSrfLandedPoles_00 = I lubrificanti congelano in grumi cerosi e il campione di lamina diventa stranamente croccante. Smetti di toccarlo con i guanti.
        #JNSQscience_mobileMaterialsLab_KrelInSpaceLow_00 = In orbita bassa, i rivestimenti degassano e poi ricongelano in una foschia sottile sulle superfici vicine. Il laboratorio chiede "materiali meno drammatici".
        #JNSQscience_mobileMaterialsLab_KrelInSpaceHigh_00 = Più lontano, i cicli ripetuti caldo freddo lasciano micro vaiolature e minuscole scaglie che vagano nel vano come glitter che non riuscirai mai ad aspirare.
        #JNSQscience_mobileMaterialsLab_AdenSrfLandedLowlands_00 = La polvere si infila in ogni cerniera e vassoio campioni. Diversi materiali sviluppano subito un "rivestimento protettivo" fatto di Aden.
        #JNSQscience_mobileMaterialsLab_AdenSrfLandedMidlands_00 = Nella gravità debole, le polveri si gonfiano e vanno alla deriva come minuscoli sistemi meteorologici. Il laboratorio lo registra come "clima interno inatteso".
        #JNSQscience_mobileMaterialsLab_AdenSrfLandedHighlands_00 = Vuoto gelido filtra in ogni compartimento aperto. Un campione diventa abbastanza fragile da spezzarsi solo a guardarlo.
        #JNSQscience_mobileMaterialsLab_AdenSrfLandedMountains_00 = Il terreno ruvido scuote via graniglia fine che si attacca a tutto. I materiali ora hanno consistenza, che la volessero o no.
        #JNSQscience_mobileMaterialsLab_AdenSrfLandedPoles_00 = Qui il freddo sembra più tagliente. Pellicole gelate avanzano sui contenitori e le letture insistono che i campioni siano "estremamente poco impressionati".
        #JNSQscience_mobileMaterialsLab_AdenInSpaceLow_00 = Esposti al vuoto spinto, i gel fanno bolle, i metalli fanno ping e un contenitore prova a scappare dalla propria etichetta. Stringi ogni chiusura due volte.
        #JNSQscience_mobileMaterialsLab_AdenInSpaceHigh_00 = Con Aden come una piccola perlina marrone laggiù, i materiali si comportano come se stessero risparmiando energia per malizie future. Non ti fidi di questa calma.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedLowlands_00 = Espone i campioni alla foschia densa: la piastra "anti corrosione" inizia un lento annerimento dall'aria offesa.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedMidlands_00 = Le piastrelle di polimero diventano rigide e cerose nell'aria fredda, poi si ammorbidiscono di nuovo mentre vapori ricchi di metano filtrano al loro interno.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedHighlands_00 = La brina avanza sul campione di vetro come se stesse cercando di scrivere qualcosa. Si ferma appena prima di essere utile.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedMountains_00 = I sigillanti reggono sotto la pressione, ma le schiume si comprimono in tristi frittelline e si rifiutano di riprendersi.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedPeaks_00 = Quassù il laboratorio gira in silenzio: perfino i materiali "inermi" degassano debolmente, come se l'aria stesse tirando fuori segreti da loro.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedPolarLowlands_00 = Il freddo rende tutto fragile: una piastrella ceramica fa un ping secco quando la tocchi, come se mancasse una sola flessione alla resa.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedPoles_00 = La condensa si forma al rallentatore, raccogliendosi in gocce perfette che non decidono mai del tutto se congelare o scorrere.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedPolarHighlands_00 = Un velo di sporco ricopre i campioni quasi subito: la piastra per test ottici perde brillantezza e guadagna carattere.
        #JNSQscience_mobileMaterialsLab_HuygenSrfLandedShores_00 = Una pellicola umida di idrocarburi si attacca a ogni superficie: il rivestimento idrorepellente funziona alla perfezione su tutto tranne sul "non acqua".
        #JNSQscience_mobileMaterialsLab_HuygenSrfSplashedShores_00 = Immersi sul bordo, alcune plastiche si gonfiano mentre i metalli restano compiaciutamente invariati: la striscia adesiva si stacca e galleggia via, orgogliosa della fuga.
        #JNSQscience_mobileMaterialsLab_HuygenSrfSplashedMethaneLakes_00 = Il bagno di metano rende rigide le gomme e rende alcuni compositi stranamente galleggianti: le note del laboratorio sembrano una lista di rancori.
        #JNSQscience_mobileMaterialsLab_HuygenFlyingLow_00 = Vibrazioni e gocce alla deriva martellano i vassoi esposti: i rivestimenti termici si coprono di ghiaccio, poi rilasciano cristalli come glitter con cattive intenzioni.
        #JNSQscience_mobileMaterialsLab_HuygenFlyingHigh_00 = Nell'aria più sottile i campioni si raffreddano rapidamente: i lubrificanti si addensano, le cerniere si lamentano e il laminato "flessibile" smette di fingere.
        #JNSQscience_mobileMaterialsLab_HuygenInSpaceLow_00 = Nel quasi vuoto i residui evaporano in un lampo: la piastra di riferimento pulita sembra impeccabile finché il rivelatore non trova un sussurro di contaminazione atmosferica.
        #JNSQscience_mobileMaterialsLab_HuygenInSpaceHigh_00 = Il gelo profondo fa contrarre le leghe e crepitare i polimeri: la linea di incollaggio "permanente" diventa "temporaneamente ottimista" in pochi minuti.
        #JNSQscience_mobileMaterialsLab_RigaSrfLandedLowlands_00 = Il vassoio dei campioni torna pieno di pellicole fragili e polvere che si appiccica. L'adesivo "omologato per il vuoto" ora suona ottimista.
        #JNSQscience_mobileMaterialsLab_RigaSrfLandedMidlands_00 = Alcuni polimeri diventano rigidi come snack lasciati fuori. Una lamina metallica ha preso una lieve brina che si rifiuta di essere educata.
        #JNSQscience_mobileMaterialsLab_RigaSrfLandedHighlands_00 = Granelli fini hanno sabbiato i provini esposti fino a una lucentezza opaca. I campioni più morbidi sembrano aver perso una discussione con il vento.
        #JNSQscience_mobileMaterialsLab_RigaSrfLandedMountains_00 = Microcrepe si diffondono in una piastrella ceramica mentre si raffredda. Il pannello composito sopravvive, ma si lamenta sonoramente con scricchiolii e schiocchi.
        #JNSQscience_mobileMaterialsLab_RigaSrfLandedPoles_00 = Una sottile glassa di azoto si forma sulle piastre fredde e fa attaccare tutto insieme. Il tuo rivestimento "anti ghiaccio" finisce nella lista delle battute.
        #JNSQscience_mobileMaterialsLab_RigaFlyingLow_00 = La foschia sottile porta via calore in fretta: i lubrificanti si addensano e una cerniera prova a diventare solida. La carica statica si accumula finché i sensori non iniziano a fare la spia.
        #JNSQscience_mobileMaterialsLab_RigaFlyingHigh_00 = Bolle di degassamento compaiono sotto uno strato di sigillante come se stesse bollendo senza permesso. I campioni sembrano a posto, ma il laboratorio odora di "pezzi nuovi".
        #JNSQscience_mobileMaterialsLab_RigaInSpaceLow_00 = Micro vaiolature compaiono sulle superfici lucidate dopo una breve esposizione. Una scaglia di vernice sparisce, presumibilmente per inseguire una carriera in orbita.
