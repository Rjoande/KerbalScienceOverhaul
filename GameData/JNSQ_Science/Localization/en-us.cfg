        #JNSQscience_evaReport_SunFlyingLowNorthTemperateZone_00 = The glare is absolute and the turbulence is worse. You decide blinking is optional from now on.
        #JNSQscience_evaReport_SunFlyingLowNorthTropicZone_00 = The plasma twists into bright curls below you. You try to sound calm while your suit quietly disagrees.
        #JNSQscience_evaReport_SunFlyingLowEquatorialZone_00 = Everything is brighter than it should be and hotter than it has any right to be. Your jetpack feels like a bad joke.
        #JNSQscience_evaReport_SunFlyingLowSouthTropicZone_00 = The “air” here shoves you around like it has opinions. You record a very scientific squeak.
        #JNSQscience_evaReport_SunFlyingLowSouthTemperateZone_00 = For a moment it seems almost smooth—then the ship’s shadow vanishes and you remember why you’re here.
        #JNSQscience_evaReport_SunFlyingLowSouthSubpolarZone_00 = The suit’s radiation counter gives up and just screams. You consider filing a complaint with the nearest magnetic field.
