@EXPERIMENT_DEFINITION:HAS[#id[bd_cosmicRay]]
{
    %RESULTS
    {
        SunFlyingLow* = #JNSQscience_bd_cosmicRay_SunFlyingLow_00 // The detector clicks like rain on a tin roof. Mission Control calls it “normal” and you call it “loud”.
        SunFlyingHigh* = #JNSQscience_bd_cosmicRay_SunFlyingHigh_00 // Up here the counts smooth out into a steady roar, as if space itself is leaning in.
        SunInSpaceLowNorthPolarZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthPolarZone_00 // Over the north polar zone the flux climbs and stays high; Kerbol’s field lines seem to point right at you.
        SunInSpaceLowNorthSubpolarZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthSubpolarZone_00 // The counter rattles through a brief storm, then settles into a bright, steady stream.
        SunInSpaceLowNorthTemperateZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthTemperateZone_00 // Readings are strong but stable, like the star is being scientific on purpose.
        SunInSpaceLowNorthTropicZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowNorthTropicZone_00 // A rolling uptick follows your track; the detector is clearly enjoying the warmth.
        SunInSpaceLowEquatorialZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowEquatorialZone_00 // The data spikes in tidy bursts, as if the equator is flicking particles at your orbit.
        SunInSpaceLowSouthTropicZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthTropicZone_00 // Counts dip, then surge again. Kerbol can’t decide if you’re shielded or targeted.
        SunInSpaceLowSouthTemperateZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthTemperateZone_00 // A clean plateau of high-energy hits; the instrument starts sounding confident.
        SunInSpaceLowSouthSubpolarZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthSubpolarZone_00 // The counter chatters faster as you drift poleward, like it knows what’s coming.
        SunInSpaceLowSouthPolarZone* = #JNSQscience_bd_cosmicRay_SunInSpaceLowSouthPolarZone_00 // A hard, persistent hail of particles, enough to make you double, check every layer of shielding.

        MohoSrfLandedPoles* = #JNSQscience_bd_cosmicRay_MohoSrfLandedPoles_00 // The count rate steadies in the long shadows, then surges the moment you step back into sunlight.
        MohoSrfLandedLowlands* = #JNSQscience_bd_cosmicRay_MohoSrfLandedLowlands_00 // The detector chatters nonstop; being this close to Kerbol feels like standing in a particle spray.
        MohoSrfLandedPolarIceCraters* = #JNSQscience_bd_cosmicRay_MohoSrfLandedPolarIceCraters_00 // Over the cold-trap ground the low-energy hits thin out, but the hard stuff still punches through.
        MohoSrfLandedHighlands* = #JNSQscience_bd_cosmicRay_MohoSrfLandedHighlands_00 // The regolith throws back a crisp shower of secondaries, as if the surface is answering every incoming ray.
        MohoSrfLandedMidlands* = #JNSQscience_bd_cosmicRay_MohoSrfLandedMidlands_00 // A high, steady flux—simple, brutal, and very difficult to ignore.
        MohoSrfLandedCraters* = #JNSQscience_bd_cosmicRay_MohoSrfLandedCraters_00 // The crater walls seem to “echo” the radiation; the graphs get busy the moment you look down.
        MohoSrfLandedExoticCraters* = #JNSQscience_bd_cosmicRay_MohoSrfLandedExoticCraters_00 // The spectrum shifts in a way that suggests the “exotic” part isn’t just the scenery.
        MohoSrfLandedRareCraters* = #JNSQscience_bd_cosmicRay_MohoSrfLandedRareCraters_00 // For a moment the counts calm down, like the universe forgot Moho was here.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_bd_cosmicRay_MohoSrfLandedVoronoiCraters_00 // The rate rises and falls in a repeating pattern that almost matches the ground’s strange geometry.
        MohoSrfLandedNotableCraters* = #JNSQscience_bd_cosmicRay_MohoSrfLandedNotableCraters_00 // A sharp burst arrives right on cue—either the crater is notable, or the cosmos is showing off.
        MohoSrfLandedPeaks* = #JNSQscience_bd_cosmicRay_MohoSrfLandedPeaks_00 // Up on the peaks the instrument sounds downright excited; there’s nothing between you and the incoming hail.
        MohoInSpaceLowPoles* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowPoles_00 // Passing over the poles, the flux flickers in bands. Moho’s faint field is trying very hard to be a shield.
        MohoInSpaceLowLowlands* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowLowlands_00 // Low orbit collects a strong primary stream with a faint bounce-back from the sunbaked ground.
        MohoInSpaceLowPolarIceCraters* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowPolarIceCraters_00 // Over the cold traps, secondary counts dip slightly, like the shadowed surface is swallowing the leftovers.
        MohoInSpaceLowHighlands* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowHighlands_00 // A noisy sprinkle of secondaries rides along the track; the high ground seems to “sparkle” in radiation.
        MohoInSpaceLowMidlands* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowMidlands_00 // The data forms a smooth, harsh plateau. Moho’s close-in environment doesn’t do subtle.
        MohoInSpaceLowCraters* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowCraters_00 // Crossing crater rims adds jagged spikes, as if the terrain is kicking particles back into your path.
        MohoInSpaceLowExoticCraters* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowExoticCraters_00 // A brief hardening of the spectrum hints at unusual material, or unusual luck, beneath the orbit.
        MohoInSpaceLowRareCraters* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowRareCraters_00 // A calm patch of orbit produces unusually tidy numbers; everyone immediately checks the power leads.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowVoronoiCraters_00 // The counts wobble with the cell-like terrain below; the plot starts looking suspiciously organized.
        MohoInSpaceLowNotableCraters* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowNotableCraters_00 // One tight burst, perfectly timed to the pass. You label it “interesting” and pretend that’s enough.
        MohoInSpaceLowPeaks* = #JNSQscience_bd_cosmicRay_MohoInSpaceLowPeaks_00 // Skimming above the peaks, the detector registers an extra splash of secondaries, like the surface is reaching up at you.

        EveSrfLandedPoles* = #JNSQscience_bd_cosmicRay_EveSrfLandedPoles_00 // The counter clicks through the cold haze; Eve's sky still rains energetic visitors.
        EveSrfLandedLowlands* = #JNSQscience_bd_cosmicRay_EveSrfLandedLowlands_00 // The air above is so thick it muffles everything, except the loudest cosmic rays.
        EveSrfLandedMidlands* = #JNSQscience_bd_cosmicRay_EveSrfLandedMidlands_00 // A steady patter of hits suggests the universe doesn't care about purple weather.
        EveSrfLandedHighlands* = #JNSQscience_bd_cosmicRay_EveSrfLandedHighlands_00 // With less atmosphere overhead, the detector rattles faster and sounds pleased about it.
        EveSrfLandedPeaks* = #JNSQscience_bd_cosmicRay_EveSrfLandedPeaks_00 // Up on the peaks, shielding is a suggestion; the counts climb accordingly.
        EveSrfLandedMountains* = #JNSQscience_bd_cosmicRay_EveSrfLandedMountains_00 // The mountains don't block space. They just give you a better view of it.
        EveSrfLandedShores* = #JNSQscience_bd_cosmicRay_EveSrfLandedShores_00 // Sea air and dense fog swirl around the sensor; cosmic rays ignore both and keep ticking.
        EveSrfLandedKrakensWell* = #JNSQscience_bd_cosmicRay_EveSrfLandedKrakensWell_00 // Near the Well, the data wobbles like someone nudged the universe's meter stick.
        EveSrfSplashedExplodiumSea* = #JNSQscience_bd_cosmicRay_EveSrfSplashedExplodiumSea_00 // The detector logs energetic hits while the sea makes its own threatening bubbles.
        EveSrfSplashedShores* = #JNSQscience_bd_cosmicRay_EveSrfSplashedShores_00 // Water slaps the hull, particles slap the detector; both leave a mess in the logs.
        EveSrfSplashedPolarLakes* = #JNSQscience_bd_cosmicRay_EveSrfSplashedPolarLakes_00 // Cold water, hot particles. Eve insists on mixing incompatible ingredients.
        EveSrfSplashedPetrolLakes* = #JNSQscience_bd_cosmicRay_EveSrfSplashedPetrolLakes_00 // The slick surface reflects the purple sky; the rays go straight through the picture.
        EveSrfSplashedSeaofAkron* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofAkron_00 // Counts drift up and down with the swells, as if the ocean is rocking the statistics.
        EveSrfSplashedSeaofNessus* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofNessus_00 // A calm patch of water gives calm data, until a sharp burst reminds you where you are.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofTaniwha_00 // The counter chatters steadily; whatever lurks below, space lurks above.
        EveSrfSplashedSeaofGigan* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofGigan_00 // A brief shower of secondaries suggests the water and air are teaming up against you.
        EveSrfSplashedSeaofRodan* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofRodan_00 // Spray coats the casing; the only thing penetrating deeper is the radiation.
        EveSrfSplashedSeaofGojira* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofGojira_00 // The instrument keeps perfect time while the sea tries to shake it loose.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofGhidorah_00 // Three distinct spikes arrive in quick succession. You do not name them.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_bd_cosmicRay_EveSrfSplashedSeaofBagorah_00 // The sea looks soft from orbit; up close, even the background counts feel sharp.
        EveInSpaceLowPoles* = #JNSQscience_bd_cosmicRay_EveInSpaceLowPoles_00 // Over the poles, the flux climbs; Eve offers little shielding up here.
        EveInSpaceLowLowlands* = #JNSQscience_bd_cosmicRay_EveInSpaceLowLowlands_00 // Low orbit over lowlands: fewer secondaries below, plenty of primaries above.
        EveInSpaceLowMidlands* = #JNSQscience_bd_cosmicRay_EveInSpaceLowMidlands_00 // The detector records a smooth, high background, like flying through a quiet storm.
        EveInSpaceLowHighlands* = #JNSQscience_bd_cosmicRay_EveInSpaceLowHighlands_00 // Counts tick up over the highlands as the thinner air below throws back less protection.
        EveInSpaceLowPeaks* = #JNSQscience_bd_cosmicRay_EveInSpaceLowPeaks_00 // Skimming the peaks, the counter rattles with crisp, high-energy hits.
        EveInSpaceLowExplodiumSea* = #JNSQscience_bd_cosmicRay_EveInSpaceLowExplodiumSea_00 // Over the Explodium Sea, the spectrum softens slightly. Then surges for no good reason.
        EveInSpaceLowMountains* = #JNSQscience_bd_cosmicRay_EveInSpaceLowMountains_00 // Mountain passes add a noisy sprinkle of bounce-back; rocks can be loud in space.
        EveInSpaceLowShores* = #JNSQscience_bd_cosmicRay_EveInSpaceLowShores_00 // Coastlines slide beneath you; the data stays stubbornly cosmic.
        EveInSpaceLowPolarLakes* = #JNSQscience_bd_cosmicRay_EveInSpaceLowPolarLakes_00 // A faint dip over the lakes suggests water helps, but only a little.
        EveInSpaceLowPetrolLakes* = #JNSQscience_bd_cosmicRay_EveInSpaceLowPetrolLakes_00 // The petrol lakes look glossy; the particles don't notice the shine.
        EveInSpaceLowSeaofAkron* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofAkron_00 // The counter's rhythm changes mid-pass, as if the atmosphere below is breathing.
        EveInSpaceLowSeaofNessus* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofNessus_00 // A clean plateau of counts makes you suspicious, so you check the wiring twice.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofTaniwha_00 // A short burst rides along your track; you log it as "space weather" and move on.
        EveInSpaceLowSeaofGigan* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofGigan_00 // The data spikes near the terminator; Eve's haze seems to glow with secondaries.
        EveInSpaceLowSeaofRodan* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofRodan_00 // Over Rodan, the detector catches a sharp hail of hits, then returns to its steady roar.
        EveInSpaceLowSeaofGojira* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofGojira_00 // The counts wobble with altitude changes; Eve punishes sloppy piloting with extra radiation.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofGhidorah_00 // A triple-peaked burst appears again. You refuse to give it a nickname.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_bd_cosmicRay_EveInSpaceLowSeaofBagorah_00 // Long, even clicks fill the cabin audio, like the universe is tapping on the hull.
        EveInSpaceLowKrakensWell* = #JNSQscience_bd_cosmicRay_EveInSpaceLowKrakensWell_00 // Right over the Well, the background shifts just enough to make everyone quiet.

        GillySrfLandedLowlands* = #JNSQscience_bd_cosmicRay_GillySrfLandedLowlands_00 // Even in the lowlands, the counter chatters; Eve’s magnetotail is a very thin umbrella.
        GillySrfLandedMidlands* = #JNSQscience_bd_cosmicRay_GillySrfLandedMidlands_00 // A steady hail of particles—this lumpy rock blocks nothing but your footing.
        GillySrfLandedHighlands* = #JNSQscience_bd_cosmicRay_GillySrfLandedHighlands_00 // Up on the highlands, the detector ticks faster, as if “altitude” matters on something this small.
        GillyInSpaceLowLowlands* = #JNSQscience_bd_cosmicRay_GillyInSpaceLowLowlands_00 // Skimming over the lowlands, you catch a faint splash of secondaries from the surface.
        GillyInSpaceLowMidlands* = #JNSQscience_bd_cosmicRay_GillyInSpaceLowMidlands_00 // The flux stays high and clean; with no air to blame, the numbers feel personal.
        GillyInSpaceLowHighlands* = #JNSQscience_bd_cosmicRay_GillyInSpaceLowHighlands_00 // Over the highlands, the spectrum hardens briefly—stone and space trading punches at close range.

        KerbinSrfLandedAdministration* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedAdministration_00 // The detector logs “cosmic ray activity” and “clipboard activity” at equal intensity. Only one of these has a clearance code.
        KerbinSrfLandedAstronautComplex* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedAstronautComplex_00 // Most particles are nicely filtered by the atmosphere, unlike whatever is happening in the lounge.
        KerbinSrfLandedBaikerbanur* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedBaikerbanur_00 // Clean ground readings, crisp counts, and a suspiciously strong field of “please stand over there.” Your cosmic rays get processed faster than your entry paperwork.
        KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedBaikerbanurLaunchpad_00 // The counter ticks steadily until a technician asks what it’s doing near the pad. It continues ticking, but now in a “nervous” way.
        KerbinSrfLandedCrawlerway* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedCrawlerway_00 // Secondary particles arrive in a slow, steady drizzle while the crawlerway radiates pure determination. The safety officer marks your detector as “trip hazard, cosmic.”
        KerbinSrfLandedFlagPole* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedFlagPole_00 // The instrument detects energetic particles from above and stern looks from nearby. You note a strong directional field pointing toward “move along.”
        KerbinSrfLandedIslandAirfield* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedIslandAirfield_00 // Cosmic rays trickle through the air while salty breeze coats everything in “marine calibration.” The detector is damp, but scientifically patriotic about it.
        KerbinSrfLandedKSC* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedKSC_00 // A baseline scan confirms Kerbin’s atmosphere blocks most primaries, leaving a respectable shower of secondaries and an unreasonable shower of rules.
        KerbinSrfLandedLaunchPad* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedLaunchPad_00 // The cosmic ray rate is normal until the pad vents and someone decides your instrument is the problem. Your data is filed under “don’t do that here.”
        KerbinSrfLandedMissionControl* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedMissionControl_00 // The detector logs a perfectly boring count rate, then gets asked to stop “making noise.” Mission Control promptly declares all cosmic rays “off-nominal.”
        KerbinSrfLandedR&D* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&D_00 // Readings are steady, but the background is mysteriously “enhanced” near a crate marked TEMPORARY. A scientist says that’s normal and closes the crate harder.
        KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DCentralBuilding_00 // Cosmic ray counts are stable and politely atmospheric, like they’ve been reviewed by committee. Your report is returned with a request for “less alarming radiation.”
        KerbinSrfLandedR&DCornerLab* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DCornerLab_00 // The detector sees a brief burst of something very energetic, then the lab door locks and the burst is officially reclassified as “dust.”
        KerbinSrfLandedR&DMainBuilding* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DMainBuilding_00 // The counter ticks along until someone wheels a prototype past and the graph develops “creative peaks.” You are told to stop standing near “breakthroughs.”
        KerbinSrfLandedR&DObservatory* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DObservatory_00 // The instrument enjoys a quiet view of the sky and a gentle rain of secondaries. The operator asks if cosmic rays can be detected without standing on the platform.
        KerbinSrfLandedR&DSideLab* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DSideLab_00 // Counts look fine until a test starts next door and your “cosmic ray” chart begins shouting. Everyone agrees it’s cosmic, because that’s the easiest form to file.
        KerbinSrfLandedR&DSmallLab* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DSmallLab_00 // The detector logs an oddly consistent rate, suspiciously consistent. Someone offers you a “calibration sticker” and a nondisclosure agreement.
        KerbinSrfLandedR&DTanks* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DTanks_00 // The atmosphere provides its usual shielding, while the tanks provide their usual “no.” The detector keeps ticking, but you keep backing away.
        KerbinSrfLandedR&DWindTunnel* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedR&DWindTunnel_00 // Cosmic rays remain cosmic, but the fans turn your cable run into modern art. The safety officer declares your experiment “aerodynamically unsafe.”
        KerbinSrfLandedRunway* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedRunway_00 // The detector counts particles from above while jets produce particles from below and paperwork from everywhere. Ground crew asks if you can measure cosmic rays somewhere less runway.
        KerbinSrfLandedSPH* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPH_00 // The count rate is normal, but every metal surface adds a delightful amount of “instrument bump.” Engineers insist the data spikes are “structural features.”
        KerbinSrfLandedSPHMainBuilding* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHMainBuilding_00 // Secondary particles register calmly until a crane moves and your detector learns what vibration feels like. You label the new noise source “heavy mechanics, low orbit.”
        KerbinSrfLandedSPHRoundTank* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHRoundTank_00 // Cosmic rays look ordinary, but the insulation berm looks very interested in your equipment. A technician reminds you that “round tank perimeter” is not a parking biome.
        KerbinSrfLandedSPHTanks* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHTanks_00 // The atmosphere filters primaries while the tank yard filters unauthorized curiosity. Your detector is allowed to keep running as long as it stops “looking investigative.”
        KerbinSrfLandedSPHWaterTower* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedSPHWaterTower_00 // Counts tick steadily under a dripping tower that insists on field-testing your waterproofing. The detector survives, then files a complaint about humidity-assisted science.
        KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationDishEast_00 // A clean shower of secondaries comes down while the dish keeps staring at your clipboard. The technician asks if cosmic rays have authorization to be here.
        KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationDishNorth_00 // The detector logs steady rates and one sudden spike when an alarm goes off for unrelated reasons. The dish continues tracking you like you caused space.
        KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationDishSouth_00 // Cosmic rays behave, the equipment behaves, and the staff behaves like you’re a loose bolt. You record excellent data and immediate suspicion.
        KerbinSrfLandedTrackingStationHub* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedTrackingStationHub_00 // Indoor shielding reduces the count a little, but the bureaucracy increases it a lot. Your “cosmic ray report” is routed to “signal compliance” for reasons.
        KerbinSrfLandedVAB* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedVAB_00 // The instrument detects atmospheric secondaries and a constant drizzle of metal dust. Engineers ask if you can tune it to only count particles that improve launch readiness.
        KerbinSrfLandedVABMainBuilding* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABMainBuilding_00 // Counts are stable until the crane moves, then your graph becomes a seismograph with ambition. The safety officer approves the result and disapproves the location.
        KerbinSrfLandedVABPodMemorial* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABPodMemorial_00 // The detector quietly logs the gentle surface-level flux and, for once, nobody interrupts. You leave the equipment running and your mouth shut.
        KerbinSrfLandedVABRoundTank* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABRoundTank_00 // The count rate is normal, but the security response is immediate. Your instrument is informed it is “not cleared to observe the tank’s cosmic environment.”
        KerbinSrfLandedVABSouthComplex* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABSouthComplex_00 // Readings tick along under a ceiling of sparks and scheduling pressure. Someone suggests labeling all bursts as “atmospheric” to keep the paperwork simple.
        KerbinSrfLandedVABTanks* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedVABTanks_00 // Secondary particles arrive on schedule; your access does not. The detector records good science while you practice very compliant standing.
        KerbinSrfLandedWoomerang* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedWoomerang_00 // Cosmic rays come down politely while the wind tries to relocate your entire setup. You log the flux, the gusts, and the sudden appearance of a safety cone.

        KerbinSrfLandedIceCaps* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedIceCaps_00 // Cosmic ray counts climb with the aurora; the detector hums under the ice sky.
        KerbinSrfLandedHighlands* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedHighlands_00 // Thinner air up here means a few more energetic hits than Mission Control promised.
        KerbinSrfLandedMountains* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedMountains_00 // A sharp spike coincides with crossing a ridge line; the rocks look unimpressed.
        KerbinSrfLandedShores* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedShores_00 // Salt spray isn't cosmic, but the detector clicks like it is.
        KerbinSrfLandedMidlands* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedMidlands_00 // Readings look “normal” until you remember normal includes visitors from deep space.
        KerbinSrfLandedLowlands* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedLowlands_00 // Thick air below, thick snacks aboard. The detector stays politely busy.
        KerbinSrfLandedAridLowlands* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridLowlands_00 // Clear skies, dry ground, and a slightly higher flux. Space has better aim here.
        KerbinSrfLandedAridMidlands* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridMidlands_00 // The counter ticks steady as a metronome. Deserts make great cosmic-ray backgrounds.
        KerbinSrfLandedAridHighlands* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridHighlands_00 // Higher altitude, fewer air molecules, more energetic surprises.
        KerbinSrfLandedAridMountains* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedAridMountains_00 // A brief burst suggests the mountains are channeling something you can’t see.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_bd_cosmicRay_KerbinSrfLandedWelcomeBackIsland_00 // For an island named like that, the detector keeps saying “welcome” in clicks.
        KerbinSrfSplashed* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashed_00 // Waterproofing holds. The detector records a steady drizzle of particles and a steady flood of splashes.
        KerbinSrfSplashedShores* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedShores_00 // Shallow water and wet electronics make the data look like it wants a towel.
        KerbinSrfSplashedGreatLake* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedGreatLake_00 // The lake damps the lower-energy counts; the big ones still punch through.
        KerbinSrfSplashedInlandWater* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedInlandWater_00 // The water calms the noise floor, but the universe refuses to be quiet.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedKreenwichSea_00 // Waves rock the instrument; the particle flux doesn’t care about your seasickness.
        KerbinSrfSplashedArcticSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedArcticSea_00 // Cold water, hot particles. An unfair trade, scientifically confirmed.
        KerbinSrfSplashedForemansSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedForemansSea_00 // Sunlight glares off the surface; the detector prefers the invisible kind from far away.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedTriangulusSea_00 // Three-direction swell, one-direction cosmic rays. Statistics win anyway.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedNorthernSea_00 // Counts creep upward as you drift north; Kerbin’s field lines are doing their thing.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedSub-ArcticSea_00 // The counter chatters, then calms. Like it’s listening to the ocean.
        KerbinSrfSplashedEasternSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedEasternSea_00 // A faint gradient appears along the drift path; someone files it under “interesting.”
        KerbinSrfSplashedWesternSea* = #JNSQscience_bd_cosmicRay_KerbinSrfSplashedWesternSea_00 // The readings stay stubbornly consistent, unlike the crew.
