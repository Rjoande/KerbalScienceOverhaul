        #JNSQscience_sspxVisualObservation_MunSrfLandedMidlands_01 = Il terreno sembra familiare per circa tre secondi, poi il silenzio ti ricorda dove sei.
        #JNSQscience_sspxVisualObservation_MunSrfLandedLowlands_00 = Le regioni basse si stendono come una piattaforma d'atterraggio grande quanto un continente.
        #JNSQscience_sspxVisualObservation_MunSrfLandedLowlands_01 = Guardi la polvere posarsi al rallentatore e capisci che Mun ha tutto il tempo dell'universo.
        #JNSQscience_sspxVisualObservation_MunSrfLandedPolarIceCraters_00 = Bordi di cratere luminosi ti abbagliano di rimando, con pareti interne incise da ombre minuscole e ostinate.
        #JNSQscience_sspxVisualObservation_MunSrfLandedPolarIceCraters_01 = Il fondo del cratere sembra ingannevolmente liscio, come se stesse aspettando di intrappolare una ruota per divertimento.
        #JNSQscience_sspxVisualObservation_MunSrfLandedExoticCraters_00 = Le forme dei crateri qui sono strane e sovrapposte, come se Mun cambiasse idea a metà impatto.
        #JNSQscience_sspxVisualObservation_MunSrfLandedExoticCraters_01 = Provi a scegliere il "miglior" cratere da fissare, poi noti che ce ne sono troppi da contare.
        #JNSQscience_sspxVisualObservation_MunSrfLandedRareCraters_00 = Queste cicatrici sono distanziate e drammatiche, ognuna pretende di essere la caratteristica principale.
        #JNSQscience_sspxVisualObservation_MunSrfLandedRareCraters_01 = I bordi sono nitidi, come se Mun fosse orgogliosa della sua collezione e li tenesse lucidati.
        #JNSQscience_sspxVisualObservation_MunSrfLandedVoronoiCraters_00 = La superficie si spezza in uno strano mosaico di fosse e creste, come un piatto di ceramica incrinato.
        #JNSQscience_sspxVisualObservation_MunSrfLandedVoronoiCraters_01 = Non riesci a smettere di seguire le forme con lo sguardo, come se nella geometria fosse nascosta una mappa segreta.
        #JNSQscience_sspxVisualObservation_MunSrfLandedNotableCraters_00 = Alcuni crateri hanno un carattere inconfondibile: bordi affilati, ombre profonde e un'aria di sorpresa permanente.
        #JNSQscience_sspxVisualObservation_MunSrfLandedNotableCraters_01 = Ti ritrovi a dar loro un nome ad alta voce, poi ricordi che Mun non fa applausi.
        #JNSQscience_sspxVisualObservation_MunSrfLandedMountains_00 = Le cime spuntano dal grigio come denti spezzati, sfidandoti a far finta che sia "solo una luna".
        #JNSQscience_sspxVisualObservation_MunSrfLandedMountains_01 = Le montagne fanno sembrare Kerbin ancora più lontano, il che è scorretto dato quanto è vicino nel cielo.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedPoles_00 = La tinta verde svanisce in una pallida brinatura verso i poli, come se Minmus stesse finendo il colore.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedPoles_01 = La terra sembra pulita e nitida, come se qualcuno avesse strofinato l'intero bioma con una spazzola alla menta.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedLowlands_00 = Le regioni basse si stendono in dolci avvallamenti, un paesaggio quasi giocoso che finge di essere serio.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedLowlands_01 = L'orizzonte tremola appena e, per un momento, potresti giurare che il suolo ti stia guardando.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedMidlands_00 = Le regioni intermedie increspano di piccoli rialzi e vallate, come un mare congelato di zucchero verde.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedMidlands_01 = Continui ad aspettarti alberi, rocce, qualsiasi cosa—poi ricordi che Minmus è devoto al minimalismo.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedHighlands_00 = Qui l'alta quota sembra stare in cima a una montagna molto educata.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedHighlands_01 = Da questa altezza, le distese sembrano vernice versata con cura, troppo liscia per essere reale.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBasins_00 = Il fondo dei bacini è inquietantemente in piano, come se Minmus l'avesse timbrato piatto per tua comodità.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBasins_01 = Guardi la luce scorrere sulla superficie e sembra più un foglio che un paesaggio.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownBasins_00 = Il verde lascia spazio a un marrone polveroso, come se Minmus avesse provato un nuovo gusto e non ne fosse sicuro.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownBasins_01 = La planarità è ancora perfetta, ma il colore lo fa sembrare un po' più… riservato.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownLowlands_00 = Le regioni basse marroni sembrano più calde, in qualche modo, anche se sai che non è vero.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownLowlands_01 = I dolci avvallamenti e pendii ti fanno sentire come se fossi in una gigantesca, silenziosa sabbiera.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownMidlands_00 = Il terreno alterna creste marroni e conche poco profonde in bande morbide e ordinate.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownMidlands_01 = Prendi appunti su "variazioni sottili", soprattutto perché "è marrone" suona poco professionale.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownHighlands_00 = Gli altipiani sono tinti di marrone e abbastanza accidentati da sembrare che stiano cercando di essere presi sul serio.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedBrownHighlands_01 = Da qui, Kerbin sembra una biglia luminosa e ti senti come se la stessi tenendo a distanza di un braccio.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedMountains_00 = Le montagne di Minmus si alzano come piccole, ostinate grinze in un mondo altrimenti liscio.
        #JNSQscience_sspxVisualObservation_MinmusSrfLandedMountains_01 = I pendii sembrano dolci finché non noti le ombre e capisci che quella "collinetta" è comunque una collina.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedIceCaps_00 = La brina bianca e la polvere rossa litigano su chi oggi debba essere il paesaggio.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedIceCaps_01 = Il ghiaccio sembra pulito finché una brezza non lo dipinge di ruggine. Anche le parti fredde non sono al sicuro da Duna.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedHighlands_00 = Le colline si allontanano in rossi smorzati, come un mondo costruito con mattoni in polvere.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedHighlands_01 = Ogni cresta ha un'ombra netta. L'aria sottile rende il contrasto una cosa personale.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedMidlands_00 = L'orizzonte è vicino, velato e ostinatamente vuoto.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedMidlands_01 = Il suolo sembra quasi camminabile ovunque, ed è proprio così che ti inganna.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedLowlands_00 = Le regioni basse si aprono come una vasta zona d'atterraggio che non ha mai chiesto di esserlo.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedLowlands_01 = La polvere si posa lentamente, come se stesse pensando se restare a terra o salire sullo scafo.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedCraters_00 = I bordi dei crateri tagliano le pianure in conche e anelli, come se Duna continuasse a far cadere lo stesso attrezzo.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedCraters_01 = Fissi le ombre e immagini da quanto tempo siano lì, a non fare assolutamente nulla.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedRareCraters_00 = Un cratere solitario domina la vista, fiero e scomodo.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedRareCraters_01 = Il bordo sembra appena inciso, come se fosse successo ieri. Il resto del pianeta non è d'accordo.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedVoronoiCraters_00 = La superficie si spezza in strane depressioni a tasselli, come se Duna avesse provato a organizzare i propri danni.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedVoronoiCraters_01 = Segui il disegno con lo sguardo e inizi a vedere forme che probabilmente non sono messaggi.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableCraters_00 = Questo cratere ha del teatro: pareti ripide, ombre profonde e un fondo sospettosamente piatto.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableCraters_01 = Sembra un punto di riferimento, di quelli che gli esploratori indicano mentre fingono di non essersi persi.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedExoticCraters_00 = Le forme dei crateri si sovrappongono in modo strano, come se il pianeta non riuscisse a decidersi per un singolo impatto.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedExoticCraters_01 = Non c'è nulla di simmetrico qui, ma tutto sembra abbastanza deliberato da mettere a disagio.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedTrenches_00 = Il terreno sprofonda in un taglio lungo, a ricordarti che "piatto" è solo una voce locale.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedTrenches_01 = Le ombre ristagnano nella trincea come inchiostro versato. Continui a controllare se si stiano muovendo.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedNotablePlains_00 = La pianura si stende in ogni direzione, un palco rosso senza attori.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedNotablePlains_01 = L'apertura ti fa sentire osservato, anche se qui non c'è chiaramente nulla che possa osservare.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableMountains_00 = Alcune cime spiccano come segni di punteggiatura in una frase altrimenti quieta.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedNotableMountains_01 = Da qui sembrano scalabili, che è il primo segnale che non dovresti fidarti dei tuoi occhi.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedMountains_00 = Creste scure si alzano contro un cielo pallido, trasformando l'orizzonte in denti frastagliati.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedMountains_01 = La vista è spettacolare, soprattutto perché continua a ricordarti quanto l'aria sia sottile.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedVolcano_00 = Il cono sembra antico e sfinito, come se avesse già urlato tutto molto tempo fa.
        #JNSQscience_sspxVisualObservation_DunaSrfLandedVolcano_01 = I pendii sono macchiati e ruvidi. Hai la sensazione che Duna non abbia finito di essere complicata.
        #JNSQscience_sspxVisualObservation_DunaFlyingHigh_00 = L'aria sottile macchia il cielo di un pesca polveroso, e il suolo sembra aspettare da un tempo lunghissimo.
        #JNSQscience_sspxVisualObservation_DunaFlyingHigh_01 = Si vedono cicatrici che potrebbero essere antichi letti di fiume. Duna tiene i suoi segreti in linee ampie e silenziose.
        #JNSQscience_sspxVisualObservation_IkeSrfLandedPoles_00 = La luce è fredda e piatta, e Duna resta appesa nel cielo come un promemoria rosso di dove sei davvero diretto.
        #JNSQscience_sspxVisualObservation_IkeSrfLandedMountains_00 = Creste scure intagliano l'orizzonte in denti. La vista è notevole, e l'appoggio sembra personalmente offeso.
        #JNSQscience_sspxVisualObservation_IkeSrfLandedMidlands_00 = Pianure grigie si stendono in strati quieti, come se Ike si stesse impegnando a essere noioso apposta.
        #JNSQscience_sspxVisualObservation_IkeSrfLandedLowlands_00 = Le regioni basse sembrano larghe e vuote, un posto perfetto per accorgersi di quanto forte suoni il tuo stesso respiro.
        #JNSQscience_sspxVisualObservation_IkeSrfLandedHighlands_00 = Dagli altipiani distingui facilmente crateri e creste lontane—nulla si nasconde bene su un mondo così spoglio.
        #JNSQscience_sspxVisualObservation_EdnaInSpaceLow_00 = Edna resta sotto come una moneta scura in un mare di vuoto, sfidandoti in silenzio a perderla di vista.
        #JNSQscience_sspxVisualObservation_EdnaInSpaceHigh_00 = Da molto lontano, Edna è solo un puntino dimesso—eppure, in qualche modo, la cosa più solitaria che vedi.
        #JNSQscience_sspxVisualObservation_EdnaSrfLandedLowlands_00 = Le regioni basse sono una coperta di graniglia scura e ombre lunghe, come se la luce avesse paura di toccare due volte la stessa cosa.
        #JNSQscience_sspxVisualObservation_EdnaSrfLandedMidlands_00 = Dolci rialzi sfumano in un orizzonte torbido: qui la distanza sembra più un'idea che una misura.
        #JNSQscience_sspxVisualObservation_EdnaSrfLandedHighlands_00 = Dall'alto, il cielo sembra più profondo e il silenzio sembra più rumoroso, per quanto possa avere senso.
        #JNSQscience_sspxVisualObservation_EdnaSrfLandedPolarIceCraters_00 = Un raro bagliore luminoso brilla dall'interno del cratere, come se qualcuno avesse nascosto qui un minuscolo pezzo di giorno.
        #JNSQscience_sspxVisualObservation_EdnaSrfLandedWhites_00 = La superficie diventa stranamente pallida, come se Edna si fosse messa una spolverata di gesso e si rifiutasse di spiegare perché.
        #JNSQscience_sspxVisualObservation_DakInSpaceLow_00 = Dak riempie il finestrino come una patata bitorzoluta con un atteggiamento: Edna incombe lì vicino come se stesse tenendo d'occhio il suo spuntino.
        #JNSQscience_sspxVisualObservation_DakInSpaceHigh_00 = Dak diventa un puntino quasi inesistente, il tipo di oggetto che "osservi" soprattutto evitando di sbattere le palpebre nel momento sbagliato.
        #JNSQscience_sspxVisualObservation_DakSrfLandedLowlands_00 = Il terreno è irregolare in ogni direzione e la gravità sembra prendersi pause frequenti.
        #JNSQscience_sspxVisualObservation_DakSrfLandedMidlands_00 = Fissi pendii nodosi e capisci che tutto questo corpo celeste è, in pratica, un enorme "guarda dove metti i piedi."
        #JNSQscience_sspxVisualObservation_DakSrfLandedHighlands_00 = Dai rilievi più alti, Edna domina il cielo—prova che anche una patata può avere un vicino ingombrante.
        #JNSQscience_sspxVisualObservation_JoolFlyingHigh_00 = Le nubi sfrecciano oltre in pareti verdi senza fine. Improvvisamente capisci perché ai piloti piace avere il "terreno" come opzione.
        #JNSQscience_sspxVisualObservation_JoolFlyingHigh_00 = Guardare fuori dal finestrino è come fissare una tempesta vivente. La turbolenza rende la vista "interattiva."
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedShores_00 = Sabbia chiara, risacca gentile e una costa sospettosamente invitante. Per un attimo quasi ti dimentichi dove sei.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedShores_01 = Il suono delle onde è familiare, finché l'ombra di quel gigantesco mondo verde scivola sulla spiaggia.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedShallows_00 = Banchi di sabbia e acqua fino al ginocchio si stendono come una pista naturale che continua a cercare di galleggiare via.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedShallows_01 = La marea entra ed esce con una quieta sicurezza, come se ormai possedesse le tue gambe d'atterraggio.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedHighlands_00 = Da terreno più alto, l'oceano sembra infinito e le isole sembrano briciole sparse.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedHighlands_01 = Il vento porta sale e spruzzi lontani, e il finestrino continua ad appannarsi perché fissi troppo a lungo.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedMountains_00 = Creste scure tagliano il cielo mentre il mare luccica molto più in basso come carburante versato.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedMountains_01 = Quassù l'aria sembra più tagliente, e la vista ti ricorda quanto sia piccolo il tuo habitat.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedIceCaps_00 = Ghiaccio bianco e cielo blu si incontrano sopra un orizzonte duro e brillante che ti fa strizzare gli occhi d'istinto.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedIceCaps_01 = La superficie gelata sembra calma, ma il freddo ha lo stesso atteggiamento dell'oceano: vuole i tuoi pezzi.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedEnclosedFaults_00 = Il terreno sprofonda in tagli ripidi e fratture in ombra, come se l'isola avesse provato a spaccarsi a metà e poi avesse rinunciato.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedEnclosedFaults_01 = Ti sporgi a guardare nella faglia e la immagini continuare all'infinito, appena fuori vista e fuori comfort.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedLowlands_00 = Terreno piatto e umido si stende verso il mare, un luogo quieto che riesce comunque a sembrare alieno.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedLowlands_01 = Tutto sembra morbido e facile finché non noti quanto in fretta l'aria trasformi i dettagli lontani in foschia.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedMidlands_00 = Terreno ondulato sale e scende in gobbe gentili, con l'oceano sempre in attesa al margine della vista.
        #JNSQscience_sspxVisualObservation_LaytheSrfLandedMidlands_01 = Il paesaggio sembra quasi casa, tranne per il costante promemoria sopra la testa che non lo è.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShores_00 = Il veicolo dondola nella risacca mentre la schiuma picchietta lo scafo come un tecnico impaziente.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShores_01 = Galleggi poco al largo e guardi la spiaggia scorrere, stranamente sereno pur essendo estremamente altrove.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShallows_00 = Acqua limpida increspa sopra sabbia e pietra, trasformando il fondale in un mosaico in movimento.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedShallows_01 = Ogni piccola onda ti culla piano, come se Laythe stesse cercando di farti abbassare la guardia.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedInlandWater_00 = Qui l'acqua è più calma e riflette il cielo in un modo che fa sembrare il mondo due volte più grande.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedInlandWater_01 = Guardi minuscole increspature allargarsi e capisci che sei la cosa più rumorosa di tutto il lago.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedKrenwichSea_00 = Lunghe onde ti scorrono sotto in linee regolari, e l'orizzonte è un arco pulito di blu e nuvole.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedKrenwichSea_01 = Il mare sembra aperto e vuoto, finché il gigante verde sopra di te non ti ricorda in quale sistema ti trovi.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedArcticSea_00 = Un moto ondoso freddo sferza lo scafo e l'acqua sembra più scura, più pesante e meno indulgente.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedArcticSea_01 = Scaglie di ghiaccio passano come coriandoli lenti, celebrando le tue capacità decisionali.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedJoolwardSea_00 = Le onde scintillano sotto un cielo che sembra più luminoso nella direzione del gigante verde.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedJoolwardSea_01 = Ti sorprendi a fissare in su più che fuori, come se il pianeta sopra la testa fosse parte del meteo.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedPolwardSea_00 = Qui la superficie del mare è inquieta, spezzata in piccole creste affilate da un vento insistente.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedPolwardSea_01 = Nuvole lontane si spalmano in bande pallide, e l'acqua sotto risponde con toni più scuri e più freddi.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedEnclosedFaults_00 = L'acqua riempie il taglio come un canale stretto, trasformando le pareti ripide in un corridoio foderato di specchi.
        #JNSQscience_sspxVisualObservation_LaytheSrfSplashedEnclosedFaults_01 = La faglia fa sembrare il cielo sottile e lontano, come se stessi galleggiando dentro una crepa del mondo.
        #JNSQscience_sspxVisualObservation_LaytheFlyingHigh_00 = La luce del sole lampeggia su acqua senza fine mentre catene di isole scorrono sotto banchi di nuvole sparse.
        #JNSQscience_sspxVisualObservation_LaytheFlyingHigh_01 = Qui il cielo è di un blu vivido, e il gigante verde sopra rende tutto come se stessi volando sotto un soffitto enorme.
        #JNSQscience_sspxVisualObservation_VallSrfLandedPoles_00 = Il ghiaccio continua all'infinito, tinto d'azzurro e silenzioso. Jool incombe sopra come un occhio che non sbatte mai.
        #JNSQscience_sspxVisualObservation_VallSrfLandedHighlands_00 = Creste frastagliate e ombre dure fanno sembrare il paesaggio ritagliato da una pietra vitrea.
        #JNSQscience_sspxVisualObservation_VallSrfLandedMidlands_00 = La superficie è un vuoto calmo blu-grigio che, in qualche modo, dà l'impressione di ascoltare.
        #JNSQscience_sspxVisualObservation_VallSrfLandedLowlands_00 = Distese lisce si allungano in ogni direzione, sfidandoti a credere che questo posto sia gentile.
        #JNSQscience_sspxVisualObservation_VallSrfLandedMountains_00 = Picchi scuri artigliano il cielo mentre l'orizzonte gelido si curva via, netto e irreale.
        #JNSQscience_sspxVisualObservation_TyloFlyingHigh_00 = La vista è tutta terra pallida e cielo sottile. Continui ad aspettare che la parte "in volo" smetta di essere vera.
        #JNSQscience_sspxVisualObservation_TyloSrfLandedPoles_00 = La luce è dura e il suolo è pallido e severo, come se Tylo stesse cercando con tutte le forze di sembrare importante.
        #JNSQscience_sspxVisualObservation_TyloSrfLandedMountains_00 = Le creste sono brutali e le ombre sono profonde. Senti il peso del mondo attraverso il finestrino.
        #JNSQscience_sspxVisualObservation_TyloSrfLandedHighlands_00 = Rilievi rocciosi senza fine si susseguono senza alcuna morbidezza: solo gravità e determinazione.
        #JNSQscience_sspxVisualObservation_TyloSrfLandedMidlands_00 = Le pianure sembrano semplici finché non noti come ogni piccolo dosso potrebbe rovinarti la giornata.
        #JNSQscience_sspxVisualObservation_TyloSrfLandedLowlands_00 = Un bacino ampio e vuoto di pietra giace sotto il bagliore di Jool, offrendo zero conforto e un'eccellente visibilità.
        #JNSQscience_sspxVisualObservation_BopSrfLandedPoles_00 = L'orizzonte è un pasticcio bitorzoluto di roccia bruna, e il vuoto sembra non invitato ma presente.
