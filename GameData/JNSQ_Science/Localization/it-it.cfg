        #JNSQscience_bd_multiSpec_TalosInSpaceLowMountains_00 = Il terreno ripido produce duri gradienti termici e bordi frastagliati in falsi colori, ma la rete di creste si mappa in modo splendido. Il pianeta è poco collaborativo, ma fotogenico.
