        #JNSQscience_crewReport_TalosSrfLandedMidlands_01 = You log a careful description of the terrain, then add an unhelpful note: “It’s all the same kind of cold.”
        #JNSQscience_crewReport_TalosSrfLandedHighlands_00 = From the highlands, the horizon is all sharp rims and long shadows that never seem to end.
