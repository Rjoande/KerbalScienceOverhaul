@EXPERIMENT_DEFINITION:HAS[#id[tantares_radiometer_scan]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_tantares_radiometer_scan_GrannusInSpaceLow_00 // The radiometer stares at the dim red star and immediately regrets how many digits it can display. Even your “baseline” calibration feels very far away.
        GrannusInSpaceLow* = #GEPscience_tantares_radiometer_scan_GrannusInSpaceLow_01 // Short-wave channels are all glare, long-wave channels are all heat. Mission Control asks for a simple summary; you send them a very long number.
        GrannusInSpaceHigh* = #GEPscience_tantares_radiometer_scan_GrannusInSpaceHigh_00 // From this distance, Grannus is less a disk and more a stubborn red presence that saturates everything nearby. Background subtraction turns into “background negotiation.”
        GrannusInSpaceHigh* = #GEPscience_tantares_radiometer_scan_GrannusInSpaceHigh_01 // The scan picks up slow variations across the star’s face, like a heartbeat you can’t quite time with your comm delay. You pretend that’s reassuring.

        TaranisInSpaceLow* = #GEPscience_tantares_radiometer_scan_TaranisInSpaceLow_00 // The hot hemisphere is blindingly bright in the thermal bands, while the dark side barely whispers back. The day-night boundary looks like a knife cut in your data.
        TaranisInSpaceLow* = #GEPscience_tantares_radiometer_scan_TaranisInSpaceLow_01 // Microwave channels hint at bare rock and vacuum with no polite middle ground. You label the result “incandescent” and try not to think about landing.
        TaranisInSpaceHigh* = #GEPscience_tantares_radiometer_scan_TaranisInSpaceHigh_00 // At altitude, the radiometer averages the extremes into something that still looks unsafe. The star-facing side dominates every band like it’s trying to win an argument.
        TaranisInSpaceHigh* = #GEPscience_tantares_radiometer_scan_TaranisInSpaceHigh_01 // Your plots show a world split between “too hot” and “too cold,” with a thin line of maybe. The line is smaller than your optimism.

        ToutatisInSpaceLow* = #GEPscience_tantares_radiometer_scan_ToutatisInSpaceLow_00 // The scan finds a warm sunward side and a cold shadow side, with a twilight belt that changes faster than your schedule. The thin air shows up as a faint, uneven signature that comes and goes.
        ToutatisInSpaceLow* = #GEPscience_tantares_radiometer_scan_ToutatisInSpaceLow_01 // Reflected light says “rock and dust,” thermal emission says “also rock and dust, but angrier.” You begin to respect the concept of shade.
        ToutatisInSpaceHigh* = #GEPscience_tantares_radiometer_scan_ToutatisInSpaceHigh_00 // From high orbit the planet looks like two different worlds sharing one sphere, stitched together by a narrow temperate seam. The seam is where you’d like to be, naturally.
        ToutatisInSpaceHigh* = #GEPscience_tantares_radiometer_scan_ToutatisInSpaceHigh_01 // Broad-band brightness temperatures refuse to settle into anything familiar. You file it under “far-from-home” and double-check the antenna lock.

        NodensInSpaceLow* = #GEPscience_tantares_radiometer_scan_NodensInSpaceLow_00 // The radiometer maps bright cloud decks and darker patches that might be open water. Under the red sun, the “blue” bands feel strangely quiet.
        NodensInSpaceLow* = #GEPscience_tantares_radiometer_scan_NodensInSpaceLow_01 // Thermal channels show a world that holds onto heat longer than expected. Mission Control asks if that’s “good news”; your reply arrives a little too late to sound confident.
        NodensInSpaceHigh* = #GEPscience_tantares_radiometer_scan_NodensInSpaceHigh_00 // From high orbit, Nodens looks temperate in the averages and complicated in the details. The scan suggests weather systems with their own schedules, none of them matching yours.
        NodensInSpaceHigh* = #GEPscience_tantares_radiometer_scan_NodensInSpaceHigh_01 // Reflected-light bands hint at a thick atmosphere doing most of the talking. You wonder what the surface thinks about being ignored.

        BelisamaInSpaceLow* = #GEPscience_tantares_radiometer_scan_BelisamaInSpaceLow_00 // Belisama’s dayside warms quickly and cools just as fast, like it’s offended by sunlight. The nightside is a deep, steady cold with no atmosphere to argue.
        BelisamaInSpaceLow* = #GEPscience_tantares_radiometer_scan_BelisamaInSpaceLow_01 // The radiometer catches periodic dips when Nodens gets in the way. Your charts look like someone is blinking at you—slowly, deliberately.
        BelisamaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_BelisamaInSpaceHigh_00 // From altitude, the moon’s thermal map shows a stubborn pattern that barely changes over time. Mutual locking leaves the same face taking the same punishment.
        BelisamaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_BelisamaInSpaceHigh_01 // Reflected bands pick up faint light that doesn’t match the red sun’s tone. It takes a moment to realize you’re seeing Nodens shine back.

        SucellusInSpaceLow* = #GEPscience_tantares_radiometer_scan_SucellusInSpaceLow_00 // The scan returns a dark, low-albedo surface that drinks in the dim light and reradiates it grudgingly. The thermal inertia hints at dense material under a thin, dusty skin.
        SucellusInSpaceLow* = #GEPscience_tantares_radiometer_scan_SucellusInSpaceLow_01 // High-energy environment noise keeps sneaking into the readings. You spend more time subtracting space than measuring the dwarf planet.
        SucellusInSpaceHigh* = #GEPscience_tantares_radiometer_scan_SucellusInSpaceHigh_00 // Averaged across the globe, Sucellus looks like “cold rock” with suspiciously interesting hotspots. If it’s metal-rich, it’s doing a good job of hiding in plain sight.
        SucellusInSpaceHigh* = #GEPscience_tantares_radiometer_scan_SucellusInSpaceHigh_01 // The long-wave bands show an uneven cooling curve that doesn’t fit a simple model. You label it “frontier-grade data” and pretend that’s a category.

        CaireenInSpaceLow* = #GEPscience_tantares_radiometer_scan_CaireenInSpaceLow_00 // Caireen is so small the radiometer keeps trying to measure the background instead. You coax a signal out of the noise and feel oddly proud of a tiny, cold dot.
        CaireenInSpaceLow* = #GEPscience_tantares_radiometer_scan_CaireenInSpaceLow_01 // Close to Sucellus, stray reflections and shadowing make the curves twitchy. The moon behaves like a captured rock that never quite settled down.
        CaireenInSpaceHigh* = #GEPscience_tantares_radiometer_scan_CaireenInSpaceHigh_00 // From high orbit, Caireen is barely a target—more a correction factor with a name. Still, its brightness temperatures don’t match “simple rubble,” and that’s enough to worry you.
        CaireenInSpaceHigh* = #GEPscience_tantares_radiometer_scan_CaireenInSpaceHigh_01 // The scan catches a faint asymmetry that repeats every pass. Either the surface is patchy, or your instrument has developed opinions about loneliness.

        SironaInSpaceLow* = #GEPscience_tantares_radiometer_scan_SironaInSpaceLow_00 // The radiometer sweeps the cloudtops and finds a brutal contrast: bright, hot bands and colder hollows that shouldn’t exist so close to a red sun.
        SironaInSpaceLow* = #GEPscience_tantares_radiometer_scan_SironaInSpaceLow_01 // Every channel is loud with atmosphere and lightning heat. You start subtracting “weather” and realize that is not a single number.
        SironaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_SironaInSpaceHigh_00 // From high orbit, Sirona’s glow fills the instrument’s dynamic range like it owns the place. The baseline is “red” and everything else is “redder.”
        SironaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_SironaInSpaceHigh_01 // The rings add a thin, shifting signature that flickers in and out as you pass. It’s like the planet is trying to communicate in static and shadows.

        AirmedInSpaceLow* = #GEPscience_tantares_radiometer_scan_AirmedInSpaceLow_00 // Airmed’s surface swings hard between sunlit warmth and vacuum cold. The terminator line crawls across the data like a slow, sharp blade.
        AirmedInSpaceLow* = #GEPscience_tantares_radiometer_scan_AirmedInSpaceLow_01 // Patchy reflectance suggests scarred terrain and fresh-looking exposures. Mission Control wants a neat map; you deliver something that looks like a bruise.
        AirmedInSpaceHigh* = #GEPscience_tantares_radiometer_scan_AirmedInSpaceHigh_00 // Averaged out, Airmed is just cold rock under a dim red lamp. Up close, the radiometer keeps catching tiny hotspots that don’t want to be explained.
        AirmedInSpaceHigh* = #GEPscience_tantares_radiometer_scan_AirmedInSpaceHigh_01 // The numbers drift with Sirona’s reflected glow, then snap back when you slip behind the moon. Even your calibrations feel like they’re orbiting something huge.

        BorvoInSpaceLow* = #GEPscience_tantares_radiometer_scan_BorvoInSpaceLow_00 // Borvo’s atmosphere dominates the scan with broad absorption features and a stubborn haze floor. The surface is there, somewhere, acting shy in the thermal bands.
        BorvoInSpaceLow* = #GEPscience_tantares_radiometer_scan_BorvoInSpaceLow_01 // The dayside looks muted, as if the sun is shining through a thick curtain. You label the plot “cold greenhouse” and hope that means what you think it means.
        BorvoInSpaceHigh* = #GEPscience_tantares_radiometer_scan_BorvoInSpaceHigh_00 // From altitude, Borvo is a smooth, dim marble with a surprisingly even temperature map. The atmosphere spreads heat politely, unlike anything you’re used to.
        BorvoInSpaceHigh* = #GEPscience_tantares_radiometer_scan_BorvoInSpaceHigh_01 // Long-wave channels hint at slow weather cycles that don’t match your orbit period. With the comm delay, you feel like you’re always hearing yesterday’s forecast.

        DamonaInSpaceLow* = #GEPscience_tantares_radiometer_scan_DamonaInSpaceLow_00 // Damona barely registers until you get close enough to stop measuring empty space. What signal you do get is cold, dark, and stubbornly consistent.
        DamonaInSpaceLow* = #GEPscience_tantares_radiometer_scan_DamonaInSpaceLow_01 // The scan shows sharp thermal drop-offs in shadowed craters. It’s the kind of cold that makes you check if your instrument is still turned on.
        DamonaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_DamonaInSpaceHigh_00 // At high orbit, Damona becomes a tiny correction factor with a name. Its brightness temperature sits near the floor and refuses to be interesting.
        DamonaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_DamonaInSpaceHigh_01 // A faint asymmetry repeats each pass—either the surface is patchy, or your radiometer is developing a preference for loneliness at the edge of the system.

        EponaInSpaceLow* = #GEPscience_tantares_radiometer_scan_EponaInSpaceLow_00 // The radiometer picks up strong atmospheric bands and a cold glow that doesn’t match your instincts. Whatever weather Epona has, it’s doing most of the talking under that dim red sun.
        EponaInSpaceLow* = #GEPscience_tantares_radiometer_scan_EponaInSpaceLow_01 // Reflected-light channels come back muted, like the planet is wearing a veil. Thermal bands hint at a warmer interior that’s trying very hard not to leak its secrets.
        EponaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_EponaInSpaceHigh_00 // From high orbit, Epona averages into “quietly cold” with suspicious regional differences. You spend a whole pass arguing with the calibration and lose on the comm delay.
        EponaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_EponaInSpaceHigh_01 // The limb scan shows a thick atmosphere bending the light into unfamiliar gradients. It feels like you’re measuring a world through someone else’s goggles.

        RosmertaInSpaceLow* = #GEPscience_tantares_radiometer_scan_RosmertaInSpaceLow_00 // Rosmerta’s dayside warms just enough to prove it exists, then drops straight back into deep shadow cold. The numbers look lonely and sharp, like fresh footprints in vacuum.
        RosmertaInSpaceLow* = #GEPscience_tantares_radiometer_scan_RosmertaInSpaceLow_01 // High-energy noise keeps creeping into the channels as you skim past. You subtract it out and still feel like it’s staring over your shoulder.
        RosmertaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_RosmertaInSpaceHigh_00 // From altitude, Rosmerta is a pale, frigid dot with a thermal curve that never quite relaxes. Even the “warm” parts are just less cold than you hoped.
        RosmertaInSpaceHigh* = #GEPscience_tantares_radiometer_scan_RosmertaInSpaceHigh_01 // The radiometer catches a faint brightening when Epona fills the sky below. It’s not sunlight—it’s borrowed light, and it shows.

        RAB-58EInSpaceLow* = #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceLow_00 // Close in, the scan flips between bright, icy-looking patches and darker, heat-holding material. It can’t decide whether it’s a rock, a snowball, or an argument.
        RAB-58EInSpaceLow* = #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceLow_01 // The tiniest shifts in attitude change everything, because the target is barely bigger than your uncertainty. You file the dataset as “small moon, big problem.”
        RAB-58EInSpaceHigh* = #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceHigh_00 // At high orbit, RAB-58E mostly measures as “background with a name.” The signal is real, but it’s shy and keeps hiding in the noise floor.
        RAB-58EInSpaceHigh* = #GEPscience_tantares_radiometer_scan_RAB-58EInSpaceHigh_01 // A repeating asymmetry shows up once per pass, like a scar you only notice at the right angle. You mark it for follow-up and wonder how far “follow-up” is from here.

        CernunnosInSpaceLow* = #GEPscience_tantares_radiometer_scan_CernunnosInSpaceLow_00 // The radiometer maps a surface that drinks in the red light and reradiates it grudgingly. Frosty spots flash cold in the thermal bands like warnings.
        CernunnosInSpaceLow* = #GEPscience_tantares_radiometer_scan_CernunnosInSpaceLow_01 // A few regions cool slower than the rest, hinting at dense material or buried volatiles. Mission Control asks for a simple explanation; you send them a complicated silence.
        CernunnosInSpaceHigh* = #GEPscience_tantares_radiometer_scan_CernunnosInSpaceHigh_00 // From high orbit, Cernunnos looks like a cold relic on the outskirts—steady, dim, and unhelpfully calm. Even your baseline feels far from home.
        CernunnosInSpaceHigh* = #GEPscience_tantares_radiometer_scan_CernunnosInSpaceHigh_01 // The long-wave channels show a faint seasonal tilt you can’t quite time with your orbit and comm delay. You realize you’re watching a slow world from a fast machine.
    }
}