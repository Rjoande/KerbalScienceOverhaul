@EXPERIMENT_DEFINITION:HAS[#id[bd_cosmicRay]]
{
    %RESULTS
    {
        GrannusFlyingLow* = #GEPscience_bd_cosmicRay_GrannusFlyingLow_00 // The counter spikes so hard the readout looks like modern art. Mission Control will see it after the next few light-minutes of arguing with the antenna.
		GrannusFlyingHigh* = #GEPscience_bd_cosmicRay_GrannusFlyingHigh_00 // Even skimming the ruddy glow, the detector keeps insisting “yes, that’s a lot.” The dim red sun does not care about your comfort.
		GrannusInSpaceHigh* = #GEPscience_bd_cosmicRay_GrannusInSpaceHigh_00 // Away from the star’s immediate tantrums, the flux steadies into a lonely drizzle from everywhere at once. You suddenly notice how quiet the cabin feels.
		GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthPolarZone_00 // A lopsided surge suggests particles are being funneled along polar fields. The auroral glow below is subtle, like it’s trying not to be seen.
		GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthSubpolarZone_00 // The count rate wobbles in a slow rhythm that doesn’t match any sane day/night cycle. You label it “red-sun weirdness” for later.
		GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthTemperateZone_00 // The instrument catches brief bursts that arrive in clumps, not streams. You wonder how many of them started their trip before you were born.
		GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowNorthTropicZone_00 // Particle energies climb, then drop, as if the star is breathing. The radio delay makes the breathing feel personal.
		GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowEquatorialZone_00 // The flux is high and strangely even, like a conveyor belt of protons. It’s the most “normal” thing you’ve seen out here, which is unsettling.
		GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthTropicZone_00 // A sharp spike coincides with a faint brightening of the red disk. You log it as a flare and try not to look impressed.
		GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthTemperateZone_00 // Counts dip slightly, then recover, hinting at patchy shielding in the star’s environment. “Patchy” is not a reassuring word in space.
		GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthSubpolarZone_00 // The detector records a spray of heavy nuclei that make the graphs look spiky and expensive. You promise to stop flying through whatever that was.
		GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_cosmicRay_GrannusInSpaceLowSouthPolarZone_00 // The polar channel lights up again, as if the star is aiming at you on purpose. You consider filing a complaint with physics.

		TaranisSrfLandedScorchedLowlands* = #GEPscience_bd_cosmicRay_TaranisSrfLandedScorchedLowlands_00 // With no air to hide behind, cosmic rays hit the detector like tiny hammer blows. The baked ground glows faintly, and the data feels hotter than the sunward horizon.
		TaranisSrfLandedMidlands* = #GEPscience_bd_cosmicRay_TaranisSrfLandedMidlands_00 // The count rate is brutal and steady, like the universe’s metronome. It’s hard to tell if it’s noon, midnight, or just “Taranis.”
		TaranisSrfLandedHighlands* = #GEPscience_bd_cosmicRay_TaranisSrfLandedHighlands_00 // Elevated terrain gives you a slightly clearer view of the sky and a slightly worse view of your odds. The detector agrees by ticking faster.
		TaranisSrfLandedDarkSideMidlands* = #GEPscience_bd_cosmicRay_TaranisSrfLandedDarkSideMidlands_00 // The cold, black landscape doesn’t reduce the radiation, it just makes it feel louder. Each click is a reminder that “night” isn’t a shield.
		TaranisSrfLandedDarkSideHighlands* = #GEPscience_bd_cosmicRay_TaranisSrfLandedDarkSideHighlands_00 // The instrument registers energetic particles with less thermal noise, producing beautifully crisp doom. You transmit the cleanest bad news you’ve ever measured.
		TaranisSrfLandedPoles* = #GEPscience_bd_cosmicRay_TaranisSrfLandedPoles_00 // The flux shifts with latitude, hinting at weak, reluctant field lines. The dim red sun stays low on the horizon, like it’s eavesdropping.
		TaranisSrfSplashedMagmaSea* = #GEPscience_bd_cosmicRay_TaranisSrfSplashedMagmaSea_00 // The detector is technically operational, but everything else is trying to become a puddle. The cosmic rays don’t care that you’re “splashed” in lava.
		TaranisInSpaceLowMagmaSea* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowMagmaSea_00 // Over the molten sheen, the instrument catches bursts that look like secondary particles from below. You decide not to ask how the “below” is making them.
		TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowScorchedLowlands_00 // Solar-origin counts are intense and slightly directional, as if the star is throwing gravel. The red-lit dayside looks incandescent and impatient.
		TaranisInSpaceLowMidlands* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowMidlands_00 // The spectrum shows a harsh mix of lighter ions with occasional heavy hits. You tag the file “bring more shielding next time.”
		TaranisInSpaceLowHighlands* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowHighlands_00 // The readings climb over the high ground, likely from reduced local shadowing. It’s nice to know even rocks can’t hide you.
		TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowDarkSideMidlands_00 // In the planet’s shadow, the solar component drops and the galactic background takes over. The numbers are calmer, but the feeling is not.
		TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowDarkSideHighlands_00 // A slow, persistent drizzle of high-energy nuclei arrives from deep space. It’s the kind of data that makes you remember you’re very far away.
		TaranisInSpaceLowPoles* = #GEPscience_bd_cosmicRay_TaranisInSpaceLowPoles_00 // Polar passes show small, uneven dips suggesting weak magnetic guidance. “Weak” is still better than “none,” you suppose.
		TaranisInSpaceHigh* = #GEPscience_bd_cosmicRay_TaranisInSpaceHigh_00 // From high orbit, the planet’s two-faced day/night split looks unreal. The detector’s steady click-track is the only thing that feels honest.

		ToutatisFlyingLow* = #GEPscience_bd_cosmicRay_ToutatisFlyingLow_00 // The thin air barely notices the particles passing through it, and neither does the detector. At least the radio delay gives you time to regret your altitude choice.
		ToutatisFlyingHigh* = #GEPscience_bd_cosmicRay_ToutatisFlyingHigh_00 // Particle counts rise as the atmosphere thins to almost nothing. The sky fades toward black, even under the dim red sun.
		ToutatisInSpaceHigh* = #GEPscience_bd_cosmicRay_ToutatisInSpaceHigh_00 // The flux settles into a mix of star-driven and truly distant sources. You stare at the planet’s terminator and realize “home” is not on the horizon.
		ToutatisSrfLandedSunnyLowlands* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedSunnyLowlands_00 // The surface is bright and hot, and the detector clicks like it’s applauding the radiation. You note that “sunny” is not the same as “safe.”
		ToutatisSrfLandedSunnyHighlands* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedSunnyHighlands_00 // The elevated, sunbaked ground adds heat noise, but the particle rate still shines through. Physics insists on being measured, even here.
		ToutatisSrfLandedTransitionalLowlands* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedTransitionalLowlands_00 // Near the comfort-zone line, the atmosphere offers the faintest hint of shielding. The data suggests “faintest hint” is a technical term.
		ToutatisSrfLandedTransitionalHighlands* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedTransitionalHighlands_00 // Counts fluctuate with local slope and horizon, as if terrain can cast a radiation shadow. It can’t, but it’s cute that you checked.
		ToutatisSrfLandedDarkSideLowlands* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedDarkSideLowlands_00 // In the cold darkness, the detector’s clicks feel like they echo. The universe is still throwing particles at you; you just notice them more.
		ToutatisSrfLandedDarkSideHighlands* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedDarkSideHighlands_00 // The spectrum shows fewer low-energy secondaries and more direct hits. It’s cleaner data, obtained in the least friendly lighting imaginable.
		ToutatisSrfLandedSoutheasternMountains* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedSoutheasternMountains_00 // The mountains frame a narrow strip of sky, but cosmic rays still arrive from everywhere. You begin to suspect “everywhere” is their biome.
		ToutatisSrfLandedWesternMountains* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedWesternMountains_00 // A cluster of high-energy events suggests a brief shower of heavy nuclei. You name it “The Western Mountain Welcome.”
		ToutatisSrfLandedDarkSideMountains* = #GEPscience_bd_cosmicRay_ToutatisSrfLandedDarkSideMountains_00 // The cold peaks offer no protection, only better contrast for the stars. The detector keeps time while you feel very small.
		ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowSunnyLowlands_00 // Over the bright dayside, the star-driven component dominates and the count rate swells. The planet below looks like it’s being slow-roasted.
		ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowSunnyHighlands_00 // The detector catches more secondaries, likely kicked off by the sunlit terrain. The graph spikes in a way that feels smug.
		ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowTransitionalLowlands_00 // The flux shows a gentle dip along the terminator region, hinting at minor atmospheric interaction. “Minor” is doing a lot of work in that sentence.
		ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowTransitionalHighlands_00 // Energies stay high, but the overall rate eases slightly as you track the twilight band. The view is beautiful in a way that makes you uneasy.
		ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowDarkSideLowlands_00 // In shadow, the solar contribution falls away and the galactic background becomes obvious. It’s like turning down one loudspeaker and hearing the other.
		ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowDarkSideHighlands_00 // The detector logs steady, hard radiation with minimal modulation. The dark hemisphere feels timeless, and the data agrees.
		ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowSoutheasternMountains_00 // A jagged pattern of counts suggests local geometry is affecting secondaries. You file it under “mountains make their own problems.”
		ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowWesternMountains_00 // The rate flickers as you pass over rugged terrain and thin air. You wonder if the planet is trying to shake the particles off.
		ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_cosmicRay_ToutatisInSpaceLowDarkSideMountains_00 // Shadowed mountains produce a colder, cleaner signal with the same relentless flux. The detector doesn’t care which side is “up.”

		NodensSrfLanded* = #GEPscience_bd_cosmicRay_NodensSrfLanded_00 // The cosmic ray counter chatters, even under Nodens' thick air. The return link lag makes it feel even farther from home.
		NodensSrfSplashedSaltySeas* = #GEPscience_bd_cosmicRay_NodensSrfSplashedSaltySeas_00 // Seawater slaps the hull while the detector counts straight through the "shielding." Salt spray is not a radiation strategy.
		NodensSrfSplashedFreshWater* = #GEPscience_bd_cosmicRay_NodensSrfSplashedFreshWater_00 // The lake is calm, but the counter still clicks with distant, energetic visitors. Fresh water tastes safer than it measures.
		NodensSrfSplashedShores* = #GEPscience_bd_cosmicRay_NodensSrfSplashedShores_00 // At the shoreline, waves and particles arrive in steady sets. The sky looks familiar--until you remember it's lit by a dim red sun.
		NodensFlyingLow* = #GEPscience_bd_cosmicRay_NodensFlyingLow_00 // Low clouds glow rust-red at sunset, and the counter spikes whenever they thin. You log it now; Mission Control will read it later.
		NodensFlyingHigh* = #GEPscience_bd_cosmicRay_NodensFlyingHigh_00 // High in Nodens' upper air, shielding fades and the numbers climb. The horizon is too curved, the sun too red, and the clicks too honest.
		NodensInSpaceLow* = #GEPscience_bd_cosmicRay_NodensInSpaceLow_00 // The flux shows a mix of stellar tantrums and truly ancient rays. The cabin feels small on the long delay back.
		NodensInSpaceHigh* = #GEPscience_bd_cosmicRay_NodensInSpaceHigh_00 // High above Nodens, the cosmic ray background settles into a steady hiss from everywhere. The dim red sun is just another distant lamp now.

		BelisamaSrfLanded* = #GEPscience_bd_cosmicRay_BelisamaSrfLanded_00 // The detector ticks relentlessly. Nodens hangs in the same spot, always. Day and night cues are optional this far out.
		BelisamaInSpaceLow* = #GEPscience_bd_cosmicRay_BelisamaInSpaceLow_00 // Low over Belisama, counts wobble as the moon and Nodens trade shadow. The dim red sun still finds you.
		BelisamaInSpaceHigh* = #GEPscience_bd_cosmicRay_BelisamaInSpaceHigh_00 // From high orbit, Belisama and Nodens look locked in a silent stare. The counter's steady clicking is the only conversation that arrives on time.

		SucellusSrfLanded* = #GEPscience_bd_cosmicRay_SucellusSrfLanded_00 // On Sucellus there's no air to argue with the data. The detector confirms the universe is not sparsely populated.
		SucellusInSpaceLow* = #GEPscience_bd_cosmicRay_SucellusInSpaceLow_00 // Skimming Sucellus, secondaries from the surface add extra spikes to the spectrum. Mining can wait; shielding can't.
		SucellusInSpaceHigh* = #GEPscience_bd_cosmicRay_SucellusInSpaceHigh_00 // High above Sucellus, the readings smooth into a cold, constant drizzle. It feels like space itself is doing quality control.

		CaireenSrfLanded* = #GEPscience_bd_cosmicRay_CaireenSrfLanded_00 // Caireen's weak gravity makes setup easy. Cosmic rays make staying harder. The dim red sun gives everything a worried tint.
		CaireenInSpaceLow* = #GEPscience_bd_cosmicRay_CaireenInSpaceLow_00 // Low over Caireen, the rate flickers as the lumpy moon alternately blocks and reveals the sky. It's the only 'weather' here.
		CaireenInSpaceHigh* = #GEPscience_bd_cosmicRay_CaireenInSpaceHigh_00 // From high orbit, Caireen is just a captured pebble escorting Sucellus. The detector disagrees, counting particles as if it were a target.

		SironaFlyingLow* = #GEPscience_bd_cosmicRay_SironaFlyingLow_00 // The atmosphere muffles some particles, but not enough to relax you. The detector keeps counting like nothing is strange about this place.
		SironaFlyingHigh* = #GEPscience_bd_cosmicRay_SironaFlyingHigh_00 // High in the upper air, shielding drops and the numbers climb. The horizon curves too much and the radio lag stretches too long.
		SironaInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_00 // The detector maps particle showers. Out here, even 'background' feels like weather.
		SironaInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_01 // Skimming low, the flux rises and falls as the body blocks parts of the sky. The red sun adds its own sharp edge to the numbers.
		SironaInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_02 // Low orbit shows bursts mixed with a cold drizzle from deep space. You transmit it now; the delay delivers it later.
		SironaInSpaceHigh* = #GEPscience_bd_cosmicRay_SironaInSpaceHigh_00 // High above Sirona, the readout becomes a quiet hiss from everywhere. It is the loneliest kind of steady.

		AirmedSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_00 // The instrument logs a clean stream of high-energy hits. The data is great; the sense of 'very far away' is better.
		AirmedSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_01 // You plant the detector on the ground and it immediately starts clicking like it's proud. Under the dim red sun, that is not comforting.
		AirmedSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_02 // The counter ticks steadily through the long silence between check-ins. The sky feels wrong in a way that graphs don't explain.
		AirmedInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_00
		AirmedInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_01
		AirmedInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_02
		AirmedInSpaceHigh* = #GEPscience_bd_cosmicRay_AirmedInSpaceHigh_00 // From high orbit, the cosmic-ray background steadies and the red sun shrinks to a sullen dot. The comms delay still feels big.

		BorvoSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_00
		BorvoSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_01
		BorvoSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_02
		BorvoFlyingLow* = #GEPscience_bd_cosmicRay_BorvoFlyingLow_00 // Low in the haze, the counter chatters whenever the clouds thin. The red-lit sky looks unfamiliar, even when it's trying to be pretty.
		BorvoFlyingHigh* = #GEPscience_bd_cosmicRay_BorvoFlyingHigh_00 // Near the top of the atmosphere, you can almost see space—and it is apparently full of energetic visitors.
		BorvoInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_00
		BorvoInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_01
		BorvoInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_02
		BorvoInSpaceHigh* = #GEPscience_bd_cosmicRay_BorvoInSpaceHigh_00 // High above Borvo, the readout becomes a quiet hiss from everywhere. It is the loneliest kind of steady.

		DamonaSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_00
		DamonaSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_01
		DamonaSrfLanded* = #GEPscience_bd_cosmicRay_GEPSrfLanded_02
		DamonaInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_00
		DamonaInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_01
		DamonaInSpaceLow* = #GEPscience_bd_cosmicRay_GEPInSpaceLow_02
		DamonaInSpaceHigh* = #GEPscience_bd_cosmicRay_DamonaInSpaceHigh_00 // From high orbit, the cosmic-ray background steadies and the red sun shrinks to a sullen dot. The comms delay still feels big.

		EponaFlyingHigh* = #GEPscience_bd_cosmicRay_EponaFlyingHigh_00 // High in Epona's upper air, protection fades and the rate climbs. The sky darkens fast under a dim red sun.
		EponaFlyingLow* = #GEPscience_bd_cosmicRay_EponaFlyingLow_00 // Low in Epona's red-lit air, the counter chatters whenever the shielding thins. Every spike arrives after a long radio pause.
		EponaInSpaceHigh* = #GEPscience_bd_cosmicRay_EponaInSpaceHigh_00 // High above Epona, the cosmic ray background steadies into a cold hiss from everywhere. The red sun is a sullen dot and the delay feels huge.
		EponaInSpaceLow* = #GEPscience_bd_cosmicRay_EponaInSpaceLow_00 // Counts rise when the thin limb lets the sky open up. The dim red sun adds a sharp edge to the plot.
		EponaInSpaceLow* = #GEPscience_bd_cosmicRay_EponaInSpaceLow_01 // The limb trims soft particles but hard ones sail through. Telemetry arrives late, as usual out here.
		EponaSrfLanded* = #GEPscience_bd_cosmicRay_EponaSrfLanded_00 // The counter ticks through cold nitrogen air. The dim red sun and weak field make the numbers feel personal.
		EponaSrfLandedCraters* = #GEPscience_bd_cosmicRay_EponaSrfLandedCraters_00 // In the craters, secondaries from the walls add extra spikes to the spectrum. The return signal takes its time.
		EponaSrfLandedGrandPeaks* = #GEPscience_bd_cosmicRay_EponaSrfLandedGrandPeaks_00 // On the grand peaks, the detector runs crisp and unforgiving. Epona's weak field offers only polite resistance.
		EponaSrfLandedPoles* = #GEPscience_bd_cosmicRay_EponaSrfLandedPoles_00 // At the poles, day and night blur under a dim red sun. The counter refuses to blur with them.
		EponaSrfLandedVolcanoes* = #GEPscience_bd_cosmicRay_EponaSrfLandedVolcanoes_00 // Near the volcanoes, warm vents meet cold air; the counter clicks anyway. Epona's weak field is not much of a shield.

		RosmertaInSpaceHigh* = #GEPscience_bd_cosmicRay_RosmertaInSpaceHigh_00 // High above Rosmerta, the clicks settle into steady deep-space drizzle. The moon looks lonely enough to match the data.
		RosmertaInSpaceLowHighlands* = #GEPscience_bd_cosmicRay_RosmertaInSpaceLowHighlands_00 // Low over Rosmerta's highlands, the counter barely ever rests. The red sun is small; the radiation isn't.
		RosmertaInSpaceLow* = #GEPscience_bd_cosmicRay_RosmertaInSpaceLow_00 // The detector maps an unfiltered drizzle of high-energy particles. The silence between check-ins feels longer.
		RosmertaSrfLanded* = #GEPscience_bd_cosmicRay_RosmertaSrfLanded_00 // On the highlands, the counter logs unfiltered hits from everywhere. No air, no field, no argument.
		
		RAB-58EInSpaceHigh* = #GEPscience_bd_cosmicRay_RAB-58EInSpaceHigh_00 // High above RAB-58E, counts smooth into a lonely extrasolar drizzle. The instrument keeps working; your nerves try to.
		RAB-58EInSpaceLow* = #GEPscience_bd_cosmicRay_RAB-58EInSpaceLow_00 // Bursts suggest secondaries from the surface. It is unclear what RAB-58E is, but it is helping.
		RAB-58EInSpaceLow* = #GEPscience_bd_cosmicRay_RAB-58EInSpaceLow_01 // The flux barely changes with position. It feels like the whole moonlet is one big target.
		RAB-58ESrfLandedLowlands* = #GEPscience_bd_cosmicRay_RAB-58ESrfLandedLowlands_00 // On the lowlands, the detector clicks steadily in near-zero gravity. Whatever this moonlet is, it isn't shielding you.
		RAB-58ESrfLandedEasternHighlands* = #GEPscience_bd_cosmicRay_RAB-58ESrfLandedHighlands_00 // Perched on the highlands, heavy hits punch straight through the readout. The ground looks calm; the sky does not.
		RAB-58ESrfLandedWesternHighlands* = #GEPscience_bd_cosmicRay_RAB-58ESrfLandedHighlands_00

		CernunnosInSpaceHigh* = #GEPscience_bd_cosmicRay_CernunnosInSpaceHigh_00 // High above Cernunnos, the readout becomes steady and cold, like deep space doing paperwork. You miss having anything 'nearby'.
		CernunnosInSpaceLow* = #GEPscience_bd_cosmicRay_CernunnosInSpaceLow_00 // The readout stays oddly calm for an airless world, then spikes hard. Calm is temporary out here.
		CernunnosInSpaceLow* = #GEPscience_bd_cosmicRay_CernunnosInSpaceLow_01 // Long smooth stretches break with rare heavy nuclei. The dim red sun doesn't improve the shielding.
		CernunnosSrfLanded* = #GEPscience_bd_cosmicRay_CernunnosSrfLanded_00 // The counter reports a thin, relentless rain from deep space. Out here, 'background' is company.
		CernunnosSrfLanded* = #GEPscience_bd_cosmicRay_CernunnosSrfLanded_01 // The rate stays modest, then spikes without warning. 'Modest' is doing a lot of work.
		CernunnosSrfLanded* = #GEPscience_bd_cosmicRay_CernunnosSrfLanded_02 // Long quiet stretches end with sudden heavy-ion jolts. The red sun does not warn you.
    }
}