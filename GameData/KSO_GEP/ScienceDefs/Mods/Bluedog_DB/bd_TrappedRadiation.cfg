@EXPERIMENT_DEFINITION:HAS[#id[bd_TrappedRadiation]]
{
    %RESULTS
    {
        GrannusInSpaceLow* = #GEPscience_bd_TrappedRadiation_GrannusInSpaceLow_00 // The detector saturates instantly; you hastily retract it and log the shape of a blistering belt clinging to Grannus' field lines under that dim red glare.
        GrannusInSpaceLow* = #GEPscience_bd_TrappedRadiation_GrannusInSpaceLow_01 // The trapped particle counts spike hard enough to make the warning beeper sound lonely. Even under the dim red glare, Grannus still feels very, very awake.
        GrannusInSpaceHigh* = #GEPscience_bd_TrappedRadiation_GrannusInSpaceHigh_00 // The belts thin out with altitude, but they never really go away. Mission Control’s reply arrives late and says, “Yep, that’s still radiation.”
        GrannusInSpaceHigh* = #GEPscience_bd_TrappedRadiation_GrannusInSpaceHigh_01 // Even out here the counters never stop chattering. The belt edges ripple like a storm, and the delayed data packet arrives just to tell you to stop staring at it.

        TaranisInSpaceLow* = #GEPscience_bd_TrappedRadiation_TaranisInSpaceLow_00 // Radiation spikes with every pass over the baked hemisphere, but nothing stays trapped—Taranis barely has a field to hold it.
        TaranisInSpaceLow* = #GEPscience_bd_TrappedRadiation_TaranisInSpaceLow_01 // You keep expecting a neat little belt, but the readings are mostly a screaming particle storm and a strong desire to leave. Taranis offers no shelter—just speed.
        TaranisInSpaceHigh* = #GEPscience_bd_TrappedRadiation_TaranisInSpaceHigh_00 // The flux smooths out a bit higher up, which is a fancy way of saying “still bad, just less exciting.” The instrument logs it anyway, because it can’t flinch.
        TaranisInSpaceHigh* = #GEPscience_bd_TrappedRadiation_TaranisInSpaceHigh_01 // The chart looks more like a particle “weather report” than a belt map: everything sweeps past and is gone, leaving only a thin, stubborn haze.

        ToutatisInSpaceLow* = #GEPscience_bd_TrappedRadiation_ToutatisInSpaceLow_00 // A thin, lopsided belt shows up, strongest over the hot side; it feels like someone assembled a magnetosphere from spare parts.
        ToutatisInSpaceLow* = #GEPscience_bd_TrappedRadiation_ToutatisInSpaceLow_01 // A weak, lopsided belt shows up like it’s being pushed around by the red sun. The thin air below looks like it’s just watching you take the hit.
        ToutatisInSpaceHigh* = #GEPscience_bd_TrappedRadiation_ToutatisInSpaceHigh_00 // The trapped radiation fades into a broad haze, with occasional bursts that don’t match any nice round theory. You label the file “probably fine” and double-check the shielding.
        ToutatisInSpaceHigh* = #GEPscience_bd_TrappedRadiation_ToutatisInSpaceHigh_01 // Higher up, the trapped population thins into patchy arcs. Mission Control asks for more data; your reply arrives late and slightly fried.

        NodensInSpaceLow* = #GEPscience_bd_TrappedRadiation_NodensInSpaceLow_00 // A tidy magnetospheric signature appears, almost comforting—until you remember how far the signal has to travel to get home. The belts look stable, like Nodens is trying to be reassuring.
        NodensInSpaceHigh* = #GEPscience_bd_TrappedRadiation_NodensInSpaceHigh_00 // At this altitude the counts drop toward background, and the quiet feels unfamiliar. You start missing the sound of real-time confirmation.

        BelisamaInSpaceLow* = #GEPscience_bd_TrappedRadiation_BelisamaInSpaceLow_00 // The radiation pattern is patchy and tugged out of shape, like Nodens is quietly taking credit for most of the protection. The numbers rise and fall as if the moon is breathing in someone else’s magnetic shadow.
        BelisamaInSpaceHigh* = #GEPscience_bd_TrappedRadiation_BelisamaInSpaceHigh_00 // Up here, Belisama’s own contribution gets hard to separate from Nodens’ influence. The instrument politely reports, “It’s complicated.”

        SucellusInSpaceLow* = #GEPscience_bd_TrappedRadiation_SucellusInSpaceLow_00 // No strong belts form, but the dose rate stays stubbornly high anyway. The detector logs “trapped” with quotation marks and a long, accusatory beep.
        SucellusInSpaceHigh* = #GEPscience_bd_TrappedRadiation_SucellusInSpaceHigh_00 // The environment evens out into a steady drizzle of energetic particles. It’s the kind of calm that still requires a lead apron.

        CaireenInSpaceLow* = #GEPscience_bd_TrappedRadiation_CaireenInSpaceLow_00 // The readings jump in short bursts, like a captured rock getting swatted by invisible fields it never asked for. You briefly consider capturing the data faster than it captures you.
        CaireenInSpaceHigh* = #GEPscience_bd_TrappedRadiation_CaireenInSpaceHigh_00 // Mostly background… until a sudden spike reminds you that “mostly” is not the same as “safe.” The logbook entry is smudged where you gripped the pen too hard.

        SironaInSpaceLow* = #GEPscience_bd_TrappedRadiation_SironaInSpaceLow_00 // The detector immediately regrets being extended. Sirona’s belts are dense, layered, and busy—like someone turned the dim red sun into a particle accelerator.
        SironaInSpaceHigh* = #GEPscience_bd_TrappedRadiation_SironaInSpaceHigh_00 // Higher up the belts thin into broad arcs that still hammer the counters. The map takes ages to transmit, mostly because it’s very large and very alarming.

        AirmedInSpaceLow* = #GEPscience_bd_TrappedRadiation_AirmedInSpaceLow_00 // Airmed has no field of its own, but Sirona provides more than enough “shared” radiation. The readings spike and dip as the battered, two-toned surface rolls beneath you.
        AirmedInSpaceHigh* = #GEPscience_bd_TrappedRadiation_AirmedInSpaceHigh_00 // You climb for safety and discover the definition of “relative.” The background is still Sirona’s belt environment, just with fewer moments that make the instrument squeal.

        BorvoInSpaceLow* = #GEPscience_bd_TrappedRadiation_BorvoInSpaceLow_00 // Borvo’s own field seems to gather a modest belt on top of Sirona’s constant particle rain. The upper atmosphere flickers faintly as your graphs try to decide what they’re seeing.
        BorvoInSpaceHigh* = #GEPscience_bd_TrappedRadiation_BorvoInSpaceHigh_00 // At altitude, Borvo’s trapped population resolves into tidy loops, surprisingly well-behaved for this far from home. Sirona’s influence is still there, looming like a second dataset you can’t delete.

        DamonaInSpaceLow* = #GEPscience_bd_TrappedRadiation_DamonaInSpaceLow_00 // No belt forms—just a harsh wash of particles and a few sharp spikes as you pass over Damona’s prominent scar. The gray little moon offers zero protection and plenty of attitude.
        DamonaInSpaceHigh* = #GEPscience_bd_TrappedRadiation_DamonaInSpaceHigh_00 // Outside the worst of it, counts drift toward “merely unpleasant,” then jump without warning in Sirona’s distant tail. The log notes a long communications delay and an even longer sigh.

        EponaInSpaceLow* = #GEPscience_bd_TrappedRadiation_EponaInSpaceLow_00 // The detector clicks into a steady, uneasy rhythm—Epona’s weak field gathers a faint belt, just enough to make you grateful for the long transmission delay.
        EponaInSpaceHigh* = #GEPscience_bd_TrappedRadiation_EponaInSpaceHigh_00 // Higher up, the “belt” thins into a broad haze that drifts with the red dwarf’s particle weather. It’s not intense, but it is persistent.

        RosmertaInSpaceLow* = #GEPscience_bd_TrappedRadiation_RosmertaInSpaceLow_00 // No trapped belt forms around Rosmerta; the readings are just a harsh ambient wash leaking through Epona’s neighborhood. The moon provides no shelter and no apologies.
        RosmertaInSpaceHigh* = #GEPscience_bd_TrappedRadiation_RosmertaInSpaceHigh_00 // The counts fall with altitude, then spike when you cross an invisible boundary you didn’t plan for. You label it “Epona influence” and pretend that explains it.

        RAB-58EInSpaceLow* = #GEPscience_bd_TrappedRadiation_RAB-58EInSpaceLow_00 // The instrument finds nothing to “trap,” only brief bursts as the little body tumbles through charged streams. It’s like measuring a storm by holding up a spoon.
        RAB-58EInSpaceHigh* = #GEPscience_bd_TrappedRadiation_RAB-58EInSpaceHigh_00 // Farther out, the environment steadies into a thin drizzle of energetic particles. The graph looks calm, which is suspicious this far from home.

        CernunnosInSpaceLow* = #GEPscience_bd_TrappedRadiation_CernunnosInSpaceLow_00 // No belts appear; Cernunnos seems magnetically quiet, and the detector has to work to find anything worth plotting. The silence feels louder under the dim red sun.
        CernunnosInSpaceHigh* = #GEPscience_bd_TrappedRadiation_CernunnosInSpaceHigh_00 // Background levels dominate, with only occasional flickers from the wider system. Mission Control asks if it’s “safe”; you send back, “safer than most,” hours later.
    }
}