        #GEPscience_sspxTelescopeObservation_NodensInSpaceHigh_00 = Far out, Nodens is a colored coin under a dim ember. You stare past it into a starfield that feels too quiet for how much data it holds.

        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedFlats_00 = The ground is still and the sky is not. Nodens hangs in the same place forever, making the telescope feel like it’s being watched back.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTropicalLowlands_00 = Warm terrain and a dim red sky make for strange lighting. You take calibration shots and realize “normal” is no longer a setting.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTemperateLowlands_00 = The stars are sharp, but your sense of direction isn’t. You mark a new reference grid and accept that it will be argued over later.
        #GEPscience_sspxTelescopeObservation_BelisamaSrfLandedTropicalMidlands_00 = You line up a long exposure and Nodens refuses to move out of frame. Tidal locking is great for stability and terrible for composition.
