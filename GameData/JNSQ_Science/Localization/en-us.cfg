        // bd_massSpec
        #JNSQscience_bd_massSpec_SunFlyingLow_00 = The spectrometer is immediately flooded with hydrogen and helium. It logs the rest as “also: extreme regret.”
		#JNSQscience_bd_massSpec_SunFlyingHigh_00 = The intake sniffs a thinner, hotter mix and the peaks sharpen into a very clear message: you are sampling the Sun, and the Sun is sampling you back.

		#JNSQscience_bd_massSpec_MohoSrfLandedPoles_00 = In the cooler shadows, a faint whisper of trapped volatiles shows up between the rock peaks. The instrument rereads the sample just to be sure it wasn’t dreaming.
		#JNSQscience_bd_massSpec_MohoSrfLandedLowlands_00 = The chamber fills with baked dust and metal-rich grains. Everything about the spectrum says “sun-cooked.”
		#JNSQscience_bd_massSpec_MohoSrfLandedPolarIceCraters_00 = The sample is mostly sterile regolith, but the cold trap signatures tease a few stubborn compounds clinging to the dark. Mission Control suddenly becomes very interested.
		#JNSQscience_bd_massSpec_MohoSrfLandedHighlands_00 = Coarser, cleaner silicate signatures dominate here. The spectrometer appreciates the simplicity, even if your boots do not.
		#JNSQscience_bd_massSpec_MohoSrfLandedMidlands_00 = A steady, boring mix of minerals rolls in—until a few sputtered atoms spike the plot like static. The Sun is doing surface chemistry for you.
		#JNSQscience_bd_massSpec_MohoSrfLandedCraters_00 = Fresh pulverized rock and impact glass dust coat the inlet. The isotope ratios look like they’ve been through an argument at high speed.
		#JNSQscience_bd_massSpec_MohoSrfLandedExoticCraters_00 = The spectrum is crowded with odd trace peaks and messy ratios. The instrument labels the sample “technically valid, emotionally upsetting.”
		#JNSQscience_bd_massSpec_MohoSrfLandedRareCraters_00 = A few unusual peaks appear, then vanish on the second pass. Either the crater is special, or the sample jar just blinked.
		#JNSQscience_bd_massSpec_MohoSrfLandedVoronoiCraters_00 = The composition repeats with uncanny consistency from scoop to scoop. It’s like the surface was stamped out of identical tiles.
		#JNSQscience_bd_massSpec_MohoSrfLandedNotableCraters_00 = The plot is broader and richer than expected for “just rock.” The spectrometer adds a little marker that looks suspiciously like a gold star.
		#JNSQscience_bd_massSpec_MohoSrfLandedPeaks_00 = Sharp grains and exposed minerals dominate, with a dusting of sun-sputtered atoms. The instrument notes that “vacuum” is not a contaminant, but it sure feels like one.

		#JNSQscience_bd_massSpec_KerbinSrfLandedBaikerbanur_00 = The spectrum is mostly dry dust, with sharp little peaks of stamp ink and “visitor processing.” The instrument requests a passport.
		#JNSQscience_bd_massSpec_KerbinSrfLandedBaikerbanurLaunchpad_00 = Exhaust residue, oxidizer whispers, and a big “please sample upwind” signature. The safety officer adds a new rule: no sniffing the pad.
		#JNSQscience_bd_massSpec_KerbinSrfLandedCrawlerway_00 = Crushed rock dust dominates, with rubber and soot in the fine print. A supervisor asks if your sensor has a reflective vest.
		#JNSQscience_bd_massSpec_KerbinSrfLandedIslandAirfield_00 = Salty aerosol and damp grit show up immediately, followed by a faint jet-fuel aftertaste. Your sample tray begins a slow, meaningful corrosion.
		#JNSQscience_bd_massSpec_KerbinSrfLandedKSC_00 = A wonderful blend of concrete dust, snack salt, toner, and determination. Public Relations asks if you can re-label it as “Inspirational Atmosphere.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DCentralBuilding_00 = Everything looks suspiciously clean—until a tiny peak appears at “classified solvent.” A scientist smiles and stands between you and the print button.
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DCornerLab_00 = The mass peaks spell out “unknown polymer” and “do not ask.” The lab door clicks shut like it has opinions.
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DMainBuilding_00 = Paint fumes, coolant, and coffee form a stable three-phase mixture. An engineer requests you stop calling it “a mixture.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DObservatory_00 = Crisp air, dew, and a hint of lens cleaner drift through the spectrum. The operator asks you to keep your ionization “quiet.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DSideLab_00 = Strong acetone, solder flux, and the unmistakable aroma of “just a quick test.” Your report is returned with a calibration sticker and no eye contact.
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DSmallLab_00 = The peaks are unnervingly perfect and repeatable, like the air was standardized. Someone offers you a nondisclosure form and a very clean rag.
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DTanks_00 = Trace propellant vapors, rust, and a stern note of “step back.” Safety provides a checklist, a respirator, and a suggestion to stop being curious.
		#JNSQscience_bd_massSpec_KerbinSrfLandedR&DWindTunnel_00 = With the fans off, the spectrum is calm; with the fans on, it becomes “all particles everywhere at once.” The wind tunnel wins the argument by being louder.
		#JNSQscience_bd_massSpec_KerbinSrfLandedSPHMainBuilding_00 = Kerosene hints, hydraulic fluid, and aluminum dust: the classic hangar bouquet. An annoyed engineer asks if you can filter out “reality.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedSPHRoundTank_00 = The instrument detects insulation fibers and immediately regrets having an intake. A technician insists you are analyzing “non-scientific fluff.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedSPHTanks_00 = Solvents, paint chips, and a tiny peak that everyone agrees is “definitely not oxidizer.” The peak is promoted to “noise” by official decree.
		#JNSQscience_bd_massSpec_KerbinSrfLandedSPHWaterTower_00 = Water vapor, algae, and rust ions arrive in cheerful clumps. The tower contributes an authentic “maintenance cologne.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishEast_00 = Ozone from electronics and grease from moving parts show up on cue. The dish slews and the tech blames “space doing that.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishNorth_00 = The spectrum is clean until the motors spin, then you get a strong signature of “approved machinery.” You are reminded to keep your detector out of the beam’s feelings.
		#JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationDishSouth_00 = Neat peaks of gravel dust and cable jacket plastic, arranged with uncomfortable discipline. The staff approves your data and disapproves your presence.
		#JNSQscience_bd_massSpec_KerbinSrfLandedTrackingStationHub_00 = Floor polish volatiles, warm electronics breath, and ancient snack salt form a proud indoor atmosphere. Your sample is confiscated as “mission-critical debris.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedVABMainBuilding_00 = Concrete dust and metal fines rain into the intake like industrial snowfall. The crane moves and your spectrum develops “dynamic urgency.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedVABPodMemorial_00 = A quiet baseline: clean air, faint stone dust, and respectful silence. Even the instrument seems to lower its voice.
		#JNSQscience_bd_massSpec_KerbinSrfLandedVABRoundTank_00 = High-grade paint, solvent, and a strong peak at “stop looking.” Security appears in the spectrum before they appear in your peripheral vision.
		#JNSQscience_bd_massSpec_KerbinSrfLandedVABSouthComplex_00 = Hot metal ions, flux residue, and a spicy hint of welding smoke dominate the scan. Safety asks you to stop sampling anything that is still warm.
		#JNSQscience_bd_massSpec_KerbinSrfLandedVABTanks_00 = Dust, rubber, and trace propellant aroma combine into “normal operations.” The official recommendation is to record the data and forget the smell.
		#JNSQscience_bd_massSpec_KerbinSrfLandedWoomerang_00 = The spectrum shifts mid-scan as the wind relocates your entire experiment. Results indicate mostly air, occasionally clipboard, always gust.

        #JNSQscience_bd_massSpec_KerbinFlyingLow_00 = The intake fills with humid air, pollen, and something that can only be described as “snack crumbs in suspension.”
		#JNSQscience_bd_massSpec_KerbinFlyingHigh_00 = The mass spectrometer confirms the atmosphere is getting thinner. It also confirms your cabin air is getting staler.
		#JNSQscience_bd_massSpec_KerbinSrfLandedHighlands_00 = The spectrum shows clean air with a sharp bite of dust and rock grit. The instrument labels it “refreshing,” which is not a measurement unit.
		#JNSQscience_bd_massSpec_KerbinSrfLandedShores_00 = Salt spray and damp air coat the inlet. The readout is mostly seawater… plus a surprising amount of sunscreen.
		#JNSQscience_bd_massSpec_KerbinSrfLandedMidlands_00 = A comfortable mix of air and soil aerosols drifts into the chamber. Trace compounds strongly correlate with “somebody is having a picnic nearby.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedLowlands_00 = The sample is warmer, wetter, and full of tiny organic traces. The instrument politely requests you stop breathing directly into it.
		#JNSQscience_bd_massSpec_KerbinSrfLandedAridLowlands_00 = Dry air and fine dust dominate the spectrum. The spectrometer briefly considers renaming itself a “sand counter.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedAridMidlands_00 = The sample is all windblown grit and stubborn dryness. Mission Control asks if the inlet is clogged; you reply that the whole biome is clogged.
		#JNSQscience_bd_massSpec_KerbinSrfLandedAridHighlands_00 = Sharp mineral dust and sun-baked aerosols show up clearly. The instrument detects “badlands” in spirit, if not in spelling.
		#JNSQscience_bd_massSpec_KerbinSrfLandedAridMountains_00 = Thin air carries powdered rock like a badge of honor. The spectrometer records a clean spectrum with a gritty aftertaste.
		#JNSQscience_bd_massSpec_KerbinSrfLandedGreatLake_00 = The inlet drinks in mist and freshwater droplets. The data comes back mostly “wet,” with a footnote about “definitely splashed.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedInlandWater_00 = The spectrum is water-rich and pleasantly boring. Your report is less boring because the equipment is now damp.
		#JNSQscience_bd_massSpec_KerbinSrfLandedKreenwichSea_00 = Briny spray and humid air flood the sample chamber. The instrument identifies “ocean,” then adds: “also boat smell, somehow.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedArcticSea_00 = Cold air carries ice crystals into the inlet like tiny knives. The spectrometer reports a clean sample and a personal grudge.
		#JNSQscience_bd_massSpec_KerbinSrfLandedForemansSea_00 = Sea spray, damp air, and a faint hint of fuel residue swirl together. The readout suggests someone has been testing something nearby.
		#JNSQscience_bd_massSpec_KerbinSrfLandedTriangulusSea_00 = The sample is salty, wet, and extremely consistent. The plot looks so perfect you suspect it’s showing off.
		#JNSQscience_bd_massSpec_KerbinSrfLandedNorthernSea_00 = The spectrum is heavy on moisture and salt with a chill edge. The instrument’s heater turns on and immediately regrets it.
		#JNSQscience_bd_massSpec_KerbinSrfLandedSub-ArcticSea_00 = Cold brine aerosols and drifting ice dust dominate the intake. The spectrometer declares the particles “crunchy,” then refuses further commentary.
		#JNSQscience_bd_massSpec_KerbinSrfLandedEasternSea_00 = The inlet catches a steady stream of sea mist. The signature is textbook “ocean,” with a bonus spike labeled “waves hit the housing.”
		#JNSQscience_bd_massSpec_KerbinSrfLandedWesternSea_00 = Salty air and spray fill the chamber in rhythmic bursts. The mass peaks line up with each splash like the sea is doing calibration taps.
		#JNSQscience_bd_massSpec_KerbinSrfLandedWelcomeBackIsland_00 = The spectrum shows clean sea air mixed with odd trace exhausts. It’s as if the island itself is politely reminding you where rockets usually end up.

		#JNSQscience_bd_massSpec_MunSrfLandedHighlands_00 = The intake pulls in sharp, dry dust with a stubborn lack of volatiles. The spectrometer confirms: yes, it’s still the Mun.
		#JNSQscience_bd_massSpec_MunSrfLandedMidlands_00 = Fine regolith particles drift into the chamber and coat everything immediately. The data is excellent right up until the instrument becomes “part of the surface.”
		#JNSQscience_bd_massSpec_MunSrfLandedLowlands_00 = The sample contains denser, darker dust and impact fines. The spectrum looks like the Mun has been grinding itself into powder for fun.
		#JNSQscience_bd_massSpec_MunSrfLandedPolarIceCraters_00 = The spectrometer catches faint volatile signatures hiding in the cold dust. Mission Control gets excited and you pretend you don’t hear them.
