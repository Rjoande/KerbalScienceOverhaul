@EXPERIMENT_DEFINITION:HAS[#id[MCE]]
{
    %RESULTS
    {
        SunInSpaceLow* = #JNSQscience_MCE_SunInSpaceLow_00 // MCE’s COTS boards get a first-hand lesson in “solar weather,” while HDTV tries to keep its sensor from cooking and SIMPLE tries not to turn into a very expensive kite.
        SunInSpaceLow* = #JNSQscience_MCE_SunInSpaceLow_01 // KSS-IMAP logs wild swings in charged particles; REX-J runs a self-check and politely suggests you stop calling this “near-space.”
        SunInSpaceHigh* = #JNSQscience_MCE_SunInSpaceHigh_00 // Far from any one world, MCE records the steady hKss and pop of interplanetary space; the survivability report becomes a long list of “still functioning.”
        SunInSpaceHigh* = #JNSQscience_MCE_SunInSpaceHigh_01 // KSS-IMAP can’t map “nothing,” so it maps trends instead; HDTV captures black-on-black calibration frames that the engineers insist are “beautiful.”

        MohoInSpaceLow* = #JNSQscience_MCE_MohoInSpaceLow_00 // Moho’s brutal thermal cycling turns the MCE bay into a stress test oven; COTS parts drift out of spec, wander back, and pretend nothing happened.
        MohoInSpaceLow* = #JNSQscience_MCE_MohoInSpaceLow_01 // HDTV gets razor-sharp terrain shots; KSS-IMAP confirms “no atmosphere detected,” and GLIMS files a formal complaint about the lack of storms.
        MohoInSpaceHigh* = #JNSQscience_MCE_MohoInSpaceHigh_00 // High over Moho, the instruments measure more environment than planet; the suite survives on careful power cycling and quiet prayers to the radiator panels.
        MohoInSpaceHigh* = #JNSQscience_MCE_MohoInSpaceHigh_01 // REX-J runs joint and lubricant tests in the cold shadow; SIMPLE stays inflated, but everyone agrees it looks nervous.

        EveInSpaceLow* = #JNSQscience_MCE_EveInSpaceLow_00 // GLIMS catches bright, fleeting flashes above Eve’s cloud tops; HDTV tests dynamic range until the whites bloom and MKssion Control argues about exposure.
        EveInSpaceLow* = #JNSQscience_MCE_EveInSpaceLow_01 // KSS-IMAP produces a global map of swirling systems; the COTS electronics endure constant humidity readings they can’t actually feel.
        EveInSpaceHigh* = #JNSQscience_MCE_EveInSpaceHigh_00 // From high orbit, KSS-IMAP stitches together a full atmospheric survey; the results are “complete,” “terrifying,” and “very purple.”
        EveInSpaceHigh* = #JNSQscience_MCE_EveInSpaceHigh_01 // GLIMS watches the night side for transient light; the suite logs repeated events and labels them “interesting” to avoid using the word “ominous.”

        GillyInSpaceLow* = #JNSQscience_MCE_GillyInSpaceLow_00 // Station-keeping around Gilly is half the mKssion; REX-J performs tiny corrections that feel heroic, and HDTV struggles to keep the lumpy horizon in frame.
        GillyInSpaceLow* = #JNSQscience_MCE_GillyInSpaceLow_01 // The suite records gentle dust impacts and extreme temperature swings; SIMPLE remains inflated, mostly because there’s hardly any gravity to argue with it.
        GillyInSpaceHigh* = #JNSQscience_MCE_GillyInSpaceHigh_00 // High above Gilly, MCE spends more time looking for the target than looking at it; KSS-IMAP files an atmospheric map consisting entirely of “none.”
        GillyInSpaceHigh* = #JNSQscience_MCE_GillyInSpaceHigh_01 // Long-duration COTS survivability testing yields the best kind of data: boring, consistent, and only slightly alarming when the radiation counters spike.

        KerbinInSpaceLow* = #JNSQscience_MCE_KerbinInSpaceLow_00 // MCE reports GLIMS flashes over the night side while KSS-IMAP stitches together an atmospheric map; the HDTV package calls it “pretty” and the engineers call it “data.”
        KerbinInSpaceLow* = #JNSQscience_MCE_KerbinInSpaceLow_01 // REX-J successfully performs a “precision adjustment” to the equipment rack; SIMPLE’s inflatable panel stays tight, and the COTS electronics don’t even complain much.
        KerbinInSpaceHigh* = #JNSQscience_MCE_KerbinInSpaceHigh_00 // Far above Kerbin, the suite logs a quieter microgravity environment but a noisier radiation background; survivability margins are recalculated with a lot more frowning.
        KerbinInSpaceHigh* = #JNSQscience_MCE_KerbinInSpaceHigh_01 // KSS-IMAP’s global coverage looks great until MKssion Control notices the lens cap in one HDTV calibration frame; GLIMS still catches transient flashes where the clouds are tallest.

        MunInSpaceLow* = #JNSQscience_MCE_MunInSpaceLow_00 // Low Munar orbit produces excellent HDTV contrast and terrible thermal cycling; the COTS parts pass, but only after several dramatic temperature graphs.
        MunInSpaceLow* = #JNSQscience_MCE_MunInSpaceLow_01 // GLIMS detects exactly zero lightning (surprise); KSS-IMAP maps a “thin nothing,” and REX-J keeps trying to grab dust that refuses to behave in vacuum.
        MunInSpaceHigh* = #JNSQscience_MCE_MunInSpaceHigh_00 // From high Munar orbit, MCE logs a harsher particle environment and a steady ping of micrometeoroid hits; the survivability report gains several new footnotes.
        MunInSpaceHigh* = #JNSQscience_MCE_MunInSpaceHigh_01 // HDTV testing captures a tidy crescent of Kerbin while SIMPLE’s inflatable structure stiffens into a very expensive-looking balloon; everyone agrees it is “nominal.”

        MinmusInSpaceLow* = #JNSQscience_MCE_MinmusInSpaceLow_00 // Minmus’ glare makes HDTV calibration tricky; KSS-IMAP returns clean, consistent maps while REX-J discovers that low gravity makes every task feel overconfident.
        MinmusInSpaceLow* = #JNSQscience_MCE_MinmusInSpaceLow_01 // MCE logs deep cold, gentle particulate impacts, and surprisingly cooperative COTS hardware; GLIMS again confirms that “no storms” is still a result.
        MinmusInSpaceHigh* = #JNSQscience_MCE_MinmusInSpaceHigh_00 // High over Minmus, the suite records a stable background with fewer local disturbances; the best outcome is that nothing unexpected happens for a long time.
        MinmusInSpaceHigh* = #JNSQscience_MCE_MinmusInSpaceHigh_01 // The long-duration run shows COTS systems slowly drifting out of spec, then settling back after a reboot; the official conclusion is “space is rude, but predictable.”

        DunaInSpaceLow* = #JNSQscience_MCE_DunaInSpaceLow_00 // KSS-IMAP paints Duna’s thin atmosphere in broad strokes; GLIMS watches the limb for sudden flashes, and mostly finds dust and disappointment.
        DunaInSpaceLow* = #JNSQscience_MCE_DunaInSpaceLow_01 // HDTV testing produces crisp terrain shots and a lot of “why is everything red?” SIMPLE stays inflated, while the COTS electronics quietly endure the cold cycles.
        DunaInSpaceHigh* = #JNSQscience_MCE_DunaInSpaceHigh_00 // In high orbit, MCE logs a harsh radiation environment and a weak magnetic shelter; survivability margins shrink faster than the snack supply.
        DunaInSpaceHigh* = #JNSQscience_MCE_DunaInSpaceHigh_01 // REX-J runs long-duration motions to check lubricants and joints; the report concludes that space is not a fan of “commercial grade.”

        IkeInSpaceLow* = #JNSQscience_MCE_IkeInSpaceLow_00 // HDTV calibration on Ike’s pale surface is easy—there’s nothing to distract it but craters; KSS-IMAP confirms the local atmosphere remains “absent.”
        IkeInSpaceLow* = #JNSQscience_MCE_IkeInSpaceLow_01 // REX-J tries delicate handling tests and immediately learns that low gravity makes every bump look intentional; SIMPLE remains rigidly inflated and smug.
        IkeInSpaceHigh* = #JNSQscience_MCE_IkeInSpaceHigh_00 // From high orbit, MCE compares Ike’s look to old Munar datasets; the numbers say “similar,” and the scientists say “suspicious.”
        IkeInSpaceHigh* = #JNSQscience_MCE_IkeInSpaceHigh_01 // GLIMS reports no transient light phenomena whatsoever; the only sparks come from COTS components whenever radiation decides to say hello.

        EdnaInSpaceLow* = #JNSQscience_MCE_EdnaInSpaceLow_00 // HDTV struggles with Edna’s “mostly black” aesthetic; KSS-IMAP confirms the atmosphere is still mKssing, and GLIMS files a report titled “No Sprites Detected.”
        EdnaInSpaceLow* = #JNSQscience_MCE_EdnaInSpaceLow_01 // REX-J runs fine-motor checks while the COTS boards soak in deep cold; SIMPLE stays inflated and everyone pretends they weren’t worried.
        EdnaInSpaceHigh* = #JNSQscience_MCE_EdnaInSpaceHigh_00 // From high above Edna, MCE watches background starlight wink during a distant occultation; the camera test calls it “art,” the analysts call it “alignment data.”
        EdnaInSpaceHigh* = #JNSQscience_MCE_EdnaInSpaceHigh_01 // The survivability log shows steady radiation and frequent tiny impacts—asteroid-belt ambience; the conclusion is “nominal, but crunchy.”

        DakInSpaceLow* = #JNSQscience_MCE_DakInSpaceLow_00 // In low Dak orbit, REX-J attempts a delicate procedure and nearly pushes the craft into a new career as a drifting satellite; near-zero gravity makes everything dramatic.
        DakInSpaceLow* = #JNSQscience_MCE_DakInSpaceLow_01 // HDTV captures Dak’s potato profile with unsettling clarity; KSS-IMAP returns an atmospheric map consisting of one word: “no.”
        DakInSpaceHigh* = #JNSQscience_MCE_DakInSpaceHigh_00 // High above Dak, GLIMS keeps watching for transient light and finds only instrument noise and regret; the “siren’s call” appears to be purely metaphorical.
        DakInSpaceHigh* = #JNSQscience_MCE_DakInSpaceHigh_01 // SIMPLE’s inflatable test structure holds pressure despite thermal cycling; the COTS parts survive by lowering performance expectations.

        DresInSpaceLow* = #JNSQscience_MCE_DresInSpaceLow_00 // Dres “hides in plain sight” until HDTV cranks the contrast; suddenly the pale surface looks busy, and MKssion Control asks why nobody noticed sooner.
        DresInSpaceLow* = #JNSQscience_MCE_DresInSpaceLow_01 // KSS-IMAP can’t map storms that don’t exist, so it maps surface proxies instead; GLIMS reports “no lightning,” again, with noticeable sarcasm.
        DresInSpaceHigh* = #JNSQscience_MCE_DresInSpaceHigh_00 // From high orbit, MCE runs long-duration COTS exposure tests on the loneliest world; the data is quiet, cold, and impressively unforgiving.
        DresInSpaceHigh* = #JNSQscience_MCE_DresInSpaceHigh_01 // REX-J executes endurance motions to check joints and lubricants; the report concludes that “commercial grade” becomes “character building” out here.

        JoolInSpaceLow* = #JNSQscience_MCE_JoolInSpaceLow_00 // KSS-IMAP struggles to decide where Jool ends and the clouds begin; HDTV logs several shades of green that were not on the calibration chart.
        JoolInSpaceLow* = #JNSQscience_MCE_JoolInSpaceLow_01 // GLIMS watches the night side and catches brief, violent flashes deep in the haze; the COTS boards immediately request hazard pay.
        JoolInSpaceHigh* = #JNSQscience_MCE_JoolInSpaceHigh_00 // MCE samples the outer layers of Jool’s vast influence; radiation counts rise, fall, then rise again as if the planet is breathing.
        JoolInSpaceHigh* = #JNSQscience_MCE_JoolInSpaceHigh_01 // KSS-IMAP maps broad atmospheric patterns from afar while REX-J runs endurance cycles; everything still works, but it works a bit more nervously.

        LaytheInSpaceLow* = #JNSQscience_MCE_LaytheInSpaceLow_00 // KSS-IMAP returns a crisp global weather map; GLIMS flags repeated transient flashes over storm bands and calls them very real and very loud.
        LaytheInSpaceLow* = #JNSQscience_MCE_LaytheInSpaceLow_01 // HDTV testing loves the contrast of ocean and ice; SIMPLE stays inflated and stable while the COTS sensors quietly soak up cold-shadow cycles.
        LaytheInSpaceHigh* = #JNSQscience_MCE_LaytheInSpaceHigh_00 // From high orbit, MCE watches Laythe’s atmosphere as a thin, bright shell; KSS-IMAP stitches long swaths into a tidy survey mosaic.
        LaytheInSpaceHigh* = #JNSQscience_MCE_LaytheInSpaceHigh_01 // GLIMS reports fewer events at this altitude, but the background noise from Jool’s neighborhood keeps the survivability log interesting.

        VallInSpaceLow* = #JNSQscience_MCE_VallInSpaceLow_00 // HDTV captures Vall’s blue glare and faint surface patterns; KSS-IMAP confirms the local atmosphere remains firmly imaginary.
        VallInSpaceLow* = #JNSQscience_MCE_VallInSpaceLow_01 // GLIMS detects no lightning, no sprites, and no excuses; REX-J performs delicate motions to prove the mechanisms still behave in deep cold.
        VallInSpaceHigh* = #JNSQscience_MCE_VallInSpaceHigh_00 // MCE rides through a particle-rich environment and watches the counters spike; the report concludes Vall is calm, but its neighborhood is not.
        VallInSpaceHigh* = #JNSQscience_MCE_VallInSpaceHigh_01 // KSS-IMAP runs broad-field mapping passes while the COTS electronics rack up cumulative dose; the hardware remains functional and increasingly grumpy.

        TyloInSpaceLow* = #JNSQscience_MCE_TyloInSpaceLow_00 // HDTV testing produces sharp, high-speed flyover footage; the exposure system works overtime to keep up with Tylo’s brutal day-night transitions.
        TyloInSpaceLow* = #JNSQscience_MCE_TyloInSpaceLow_01 // KSS-IMAP reports a hint of pressure and a lot of nothing; GLIMS keeps scanning anyway, just in case Tylo decides to be funny.
        TyloInSpaceHigh* = #JNSQscience_MCE_TyloInSpaceHigh_00 // From high orbit, MCE measures environment more than surface; radiation and impact ticks become the dominant “features” in the dataset.
        TyloInSpaceHigh* = #JNSQscience_MCE_TyloInSpaceHigh_01 // REX-J runs long-duration joint tests in shadow; the conclusion is that commercial-grade parts can survive Tylo, but they will complain about it.

        BopInSpaceLow* = #JNSQscience_MCE_BopInSpaceLow_00 // Orbiting Bop is mostly an exercise in not drifting away; REX-J performs tiny corrections while HDTV tries to keep the lumpy horizon centered.
        BopInSpaceLow* = #JNSQscience_MCE_BopInSpaceLow_01 // KSS-IMAP submits an atmospheric map that says none; GLIMS finds only instrument noise and a surprising amount of dust pinging the hull.
        BopInSpaceHigh* = #JNSQscience_MCE_BopInSpaceHigh_00 // High above Bop, the target shrinks into a brown speck; MCE switches to long-duration COTS exposure testing and calls it productive.
        BopInSpaceHigh* = #JNSQscience_MCE_BopInSpaceHigh_01 // HDTV calibration frames capture more stars than moon; the suite logs steady radiation with occasional spikes that arrive uninvited.

        PolInSpaceLow* = #JNSQscience_MCE_PolInSpaceLow_00 // HDTV struggles to pick a “true” color for Pol; KSS-IMAP confirms there is nothing to map but the surface and the confusion.
        PolInSpaceLow* = #JNSQscience_MCE_PolInSpaceLow_01 // Station-keeping is gentle but constant; REX-J runs fine-motor routines while SIMPLE stays inflated and suspiciously well-behaved.
        PolInSpaceHigh* = #JNSQscience_MCE_PolInSpaceHigh_00 // From high orbit, Pol looks like a crumb dropped in space; MCE’s dataset becomes mostly background environment and long-term survivability trends.
        PolInSpaceHigh* = #JNSQscience_MCE_PolInSpaceHigh_01 // GLIMS reports no transient light phenomena; the only flashes come from COTS electronics when radiation decides to tap the glass.

        LindorInSpaceLow* = #JNSQscience_MCE_LindorInSpaceLow_00 // KSS-IMAP sketches Lindor’s banded haze in broad, confident swaths; HDTV immediately saturates and labels the color “too much.”
        LindorInSpaceLow* = #JNSQscience_MCE_LindorInSpaceLow_01 // GLIMS flags faint, fleeting flashes deep in the cloud decks; the COTS boards log them as “transients” and everyone else calls them “don’t go there.”
        LindorInSpaceHigh* = #JNSQscience_MCE_LindorInSpaceHigh_00 // High over Lindor, the suite shifts from “weather” to “environment”; radiation dose and thermal balance become the main plot lines.
        LindorInSpaceHigh* = #JNSQscience_MCE_LindorInSpaceHigh_01 // Long-duration survivability testing yields calm, steady data—right up until a particle spike scribbles across the graphs like an autograph.

        KrelInSpaceLow* = #JNSQscience_MCE_KrelInSpaceLow_00 // HDTV delivers stark, pale terrain shots; REX-J runs fine-motor tests and discovers that “gentle tap” and “unplanned tumble” are close neighbors.
        KrelInSpaceLow* = #JNSQscience_MCE_KrelInSpaceLow_01 // KSS-IMAP submits an atmospheric map consisting entirely of “none”; GLIMS keeps watching anyway, just in case Krel decides to be interesting.
        KrelInSpaceHigh* = #JNSQscience_MCE_KrelInSpaceHigh_00 // From high orbit, Krel becomes a quiet target and the space around it becomes the experiment; COTS components collect dose like souvenirs.
        KrelInSpaceHigh* = #JNSQscience_MCE_KrelInSpaceHigh_01 // The camera test frames Lindor looming nearby while the rest of MCE runs diagnostics; the report concludes: “Eerie. Nominal. Eerie.”

        AdenInSpaceLow* = #JNSQscience_MCE_AdenInSpaceLow_00 // HDTV calibrates easily—Aden is a neat brown marble with sharp shadows; KSS-IMAP confirms there’s nothing to map but the surface.
        AdenInSpaceLow* = #JNSQscience_MCE_AdenInSpaceLow_01 // REX-J performs a slow, careful mechanism sweep; the survivability log approves, and the engineers stop holding their breath for almost a whole minute.
        AdenInSpaceHigh* = #JNSQscience_MCE_AdenInSpaceHigh_00 // High above Aden, the suite focuses on long-duration exposure; the best result is that everything keeps working without drama.
        AdenInSpaceHigh* = #JNSQscience_MCE_AdenInSpaceHigh_01 // GLIMS reports no transient light phenomena; the only “flashes” are the occasional radiation upsets that COTS hardware pretends not to notice.

        HuygenInSpaceLow* = #JNSQscience_MCE_HuygenInSpaceLow_00 // KSS-IMAP maps Huygen’s thick, hazy layers into tidy bands; HDTV tries to find the surface and mostly finds “more haze.”
        HuygenInSpaceLow* = #JNSQscience_MCE_HuygenInSpaceLow_01 // GLIMS watches the night side for sudden bright events; it logs a few suspicious spikes and labels them “possible” to keep everyone calm.
        HuygenInSpaceHigh* = #JNSQscience_MCE_HuygenInSpaceHigh_00 // From high orbit, Huygen’s amber glow becomes a thin shell; survey passes stack into a smooth global dataset.
        HuygenInSpaceHigh* = #JNSQscience_MCE_HuygenInSpaceHigh_01 // The survivability run notes steady thermal cycling and rising cumulative dose; the COTS parts remain functional and increasingly offended.

        RigaInSpaceLow* = #JNSQscience_MCE_RigaInSpaceLow_00 // HDTV returns sharp, high-contrast passes that make the surface look “landable”; MKssion Control immediately starts arguing about where to put a flag.
        RigaInSpaceLow* = #JNSQscience_MCE_RigaInSpaceLow_01 // REX-J runs precision handling tests for future operations; SIMPLE stays inflated and rigid, as if it knows it’s being judged.
        RigaInSpaceHigh* = #JNSQscience_MCE_RigaInSpaceHigh_00 // High over Riga, KSS-IMAP shifts to wide-area survey mode; the map is clean, consistent, and very good at making you feel far away.
        RigaInSpaceHigh* = #JNSQscience_MCE_RigaInSpaceHigh_01 // Long-duration COTS exposure testing produces satisfying stability—until a brief particle storm adds a scribble of noise and a page of new cautions.

        TalosInSpaceLow* = #JNSQscience_MCE_TalosInSpaceLow_00 // HDTV captures Talos as a stark, distant world with no distractions; KSS-IMAP confirms “no atmosphere,” with remarkable confidence.
        TalosInSpaceLow* = #JNSQscience_MCE_TalosInSpaceLow_01 // REX-J attempts delicate motions and learns that low gravity turns every correction into a performance; the log calls it “acceptable” in a tired voice.
        TalosInSpaceHigh* = #JNSQscience_MCE_TalosInSpaceHigh_00 // From high orbit, Talos shrinks into a quiet speck; the experiment becomes the space around it, and the space is not particularly friendly.
        TalosInSpaceHigh* = #JNSQscience_MCE_TalosInSpaceHigh_01 // GLIMS reports nothing but darkness; the only excitement is when COTS electronics glitch, recover, and insist they meant to do that.

        EelooInSpaceLow* = #JNSQscience_MCE_EelooInSpaceLow_00 // HDTV tries to pick an exposure setting for “bright ice on black space” and gives up; KSS-IMAP files a tidy map anyway.
        EelooInSpaceLow* = #JNSQscience_MCE_EelooInSpaceLow_01 // GLIMS watches for sprites and lightning and finds only glare; the COTS rack quietly proves it can survive the cold without panicking.
        EelooInSpaceHigh* = #JNSQscience_MCE_EelooInSpaceHigh_00 // The long-duration run over Eeloo shows steady thermal balance and slow radiation dose; SIMPLE stays inflated and stubbornly normal.
        EelooInSpaceHigh* = #JNSQscience_MCE_EelooInSpaceHigh_01 // REX-J cycles motors and joints in deep shadow; the report concludes that “commercial grade” is acceptable if you lower your expectations first.

        CelesInSpaceLow* = #JNSQscience_MCE_CelesInSpaceLow_00 // KSS-IMAP surveys Celes’ stark surface while HDTV keeps “discovering” suspiciously straight lines; MKssion Control responds, “That’s probably nothing. NDA.”
        CelesInSpaceLow* = #JNSQscience_MCE_CelesInSpaceLow_01 // GLIMS registers brief glints that look like flashes until the analysts call them reflections; the COTS electronics log the argument as a “data anomaly.”
        CelesInSpaceHigh* = #JNSQscience_MCE_CelesInSpaceHigh_00 // From high orbit, the suite focuses on survivability metrics: dose, drift, and micrometeoroid ticks; everything stays within limits, uneasily.
        CelesInSpaceHigh* = #JNSQscience_MCE_CelesInSpaceHigh_01 // HDTV calibration frames contain more stars than planet; KSS-IMAP declares the “atmosphere map” complete in a single word: none.

        TamInSpaceLow* = #JNSQscience_MCE_TamInSpaceLow_00 // Orbiting Tam is mostly a station-keeping exercise; REX-J performs tiny corrections that feel heroic in near-zero gravity.
        TamInSpaceLow* = #JNSQscience_MCE_TamInSpaceLow_01 // HDTV captures a small, unfriendly world with sharp shadows; KSS-IMAP confirms there is nothing to map above it but vacuum.
        TamInSpaceHigh* = #JNSQscience_MCE_TamInSpaceHigh_00 // High over Tam, the MCE bay becomes a pure space-exposure test; the COTS boards take radiation hits and recover like nothing happened.
        TamInSpaceHigh* = #JNSQscience_MCE_TamInSpaceHigh_01 // SIMPLE remains inflated through long thermal cycles; the official conclusion is “structure stable,” and the unofficial conclusion is “still cold.”

        HamekInSpaceLow* = #JNSQscience_MCE_HamekInSpaceLow_00 // HDTV can’t agree on what color Hamek is; the calibration chart runs out of options and politely stops trying.
        HamekInSpaceLow* = #JNSQscience_MCE_HamekInSpaceLow_01 // GLIMS watches the dark side for sudden flashes and logs a few suspicious spikes; the scientists call it “interesting” and the engineers call it “check the shielding.”
        HamekInSpaceHigh* = #JNSQscience_MCE_HamekInSpaceHigh_00 // In high orbit, KSS-IMAP stacks wide swaths into a global survey; the dataset is clean, crisp, and completely unhelpful about the redness.
        HamekInSpaceHigh* = #JNSQscience_MCE_HamekInSpaceHigh_01 // The survivability run shows slow parameter drift, then a reboot that fixes it; REX-J notes that space is mysterious, but firmware is consistent.

        NaraInSpaceLow* = #JNSQscience_MCE_NaraInSpaceLow_00 // KSS-IMAP struggles to draw clean borders in Nara’s thick haze; HDTV keeps re-calibrating and still ends up with “bright fog, but scientific.”
        NaraInSpaceLow* = #JNSQscience_MCE_NaraInSpaceLow_01 // GLIMS flags brief, deep flashes in the cloud layers; the COTS electronics log them as “transients” and everyone else calls them “don’t look directly at that.”
        NaraInSpaceHigh* = #JNSQscience_MCE_NaraInSpaceHigh_00 // High above Nara, the suite shifts to survivability metrics: steady radiation, long cold soaks, and the occasional upset that looks like a keyboard smash in the data.
        NaraInSpaceHigh* = #JNSQscience_MCE_NaraInSpaceHigh_01 // SIMPLE stays inflated through the quiet, freezing drift; REX-J runs slow endurance motions and reports that space is patient and unforgiving.

        AmosInSpaceLow* = #JNSQscience_MCE_AmosInSpaceLow_00 // Orbiting Amos feels like hovering near a lost tool; REX-J performs tiny corrections while HDTV tries to make “small and dark” look impressive.
        AmosInSpaceLow* = #JNSQscience_MCE_AmosInSpaceLow_01 // KSS-IMAP completes an atmospheric map in record time: none; GLIMS keeps watching anyway, just in case vacuum decides to surprise it.
        AmosInSpaceHigh* = #JNSQscience_MCE_AmosInSpaceHigh_00 // From high orbit, Amos becomes a speck and Nara becomes the real view; HDTV captures a looming backdrop while the COTS rack quietly accumulates dose.
        AmosInSpaceHigh* = #JNSQscience_MCE_AmosInSpaceHigh_01 // Long-duration exposure testing goes beautifully—right up until a radiation spike convinces the avionics to invent a new number format.

        EnonInSpaceLow* = #JNSQscience_MCE_EnonInSpaceLow_00 // HDTV battles Enon’s glare and wins a pile of overexposed “art”; KSS-IMAP confirms there’s nothing above the surface but emptiness.
        EnonInSpaceLow* = #JNSQscience_MCE_EnonInSpaceLow_01 // REX-J runs joint and lubricant checks in deep cold; the report concludes: mechanisms function, feelings are frozen.
        EnonInSpaceHigh* = #JNSQscience_MCE_EnonInSpaceHigh_00 // High over Enon, MCE records a calm background with relentless cold; SIMPLE remains inflated and extremely uninterested in the environment.
        EnonInSpaceHigh* = #JNSQscience_MCE_EnonInSpaceHigh_01 // GLIMS reports no transient light phenomena; the only flashes are occasional electronics upsets that recover and pretend it was planned.

        PraxInSpaceLow* = #JNSQscience_MCE_PraxInSpaceLow_00 // Station-keeping around Prax is mostly a negotiation with low gravity; REX-J makes gentle moves that still feel suspiciously dramatic.
        PraxInSpaceLow* = #JNSQscience_MCE_PraxInSpaceLow_01 // HDTV captures Prax’s rough, lonely profile; KSS-IMAP files its usual vacuum report and adds a small, sarcastic checksum.
        PraxInSpaceHigh* = #JNSQscience_MCE_PraxInSpaceHigh_00 // From high orbit, Prax fades into the frontier backdrop; MCE turns the mKssion into pure COTS survivability and keeps a very close eye on the error counters.
        PraxInSpaceHigh* = #JNSQscience_MCE_PraxInSpaceHigh_01 // The suite logs steady radiation and tiny impact ticks; the official conclusion is “nominal,” and the unofficial conclusion is “space is crunchy out here.”
    }
}