        #JNSQscience_gravityScan_TyloInSpaceLowHighlands_00 = Le alture sotto producono linee pulite e ripetibili. Il Controllo Missione sarà entusiasta di calibrare qualcosa, per una volta.
        #JNSQscience_gravityScan_TyloInSpaceLowMidlands_00 = Le letture rimbalzano tra bordi di crateri e pianori. Quasi riesci a mappare il sottosuolo da quanto si infastidisce l'ago.
        #JNSQscience_gravityScan_TyloInSpaceLowLowlands_00 = I bassopiani mostrano un'anomalia uniforme ma forte. Qualcosa di pesante si nasconde sotto la polvere e si rifiuta di essere sottile.
        #JNSQscience_gravityScan_TyloInSpaceHighPoles_00 = Dall'orbita alta l'anomalia polare è solo un lieve rigonfiamento nei dati, come se Tylo sussurrasse i suoi segreti invece di urlarli.
        #JNSQscience_gravityScan_TyloInSpaceHighMountains_00 = Le montagne si sfumano in una linea, ma la firma gravitazionale resta netta. Le rocce possono sgretolarsi: la massa no.
