        #JNSQscience_gravityScan_LaytheInSpaceHighArcticSea_00 = Il rilevatore segnala un lieve squilibrio polare, come se ghiaccio e oceano stessero negoziando di continuo chi ha il diritto di pesare di più.
        #JNSQscience_gravityScan_LaytheInSpaceHighJoolwardSea_00 = Anche dall'orbita alta, il campo pende sottilmente verso Jool, e i gravioli sembrano fin troppo sicuri di questo.
        #JNSQscience_gravityScan_LaytheInSpaceHighPolwardSea_00 = Le letture derivano con la latitudine, suggerendo che le regioni verso i poli non siano perfettamente rotonde o perfettamente uniformi.
        #JNSQscience_gravityScan_LaytheInSpaceHighHighlands_00 = Le colline si fondono in un ampio altopiano di "leggermente più pesante della media", con una debole sottostruttura sotto.
        #JNSQscience_gravityScan_LaytheInSpaceHighMountains_00 = Il segnale delle montagne si attenua, ma anomalie persistenti suggeriscono radici profonde che si rifiutano di farsi mediare.
        #JNSQscience_gravityScan_LaytheInSpaceHighIceCaps_00 = La firma delle calotte ghiacciate diventa una macchia pallida, tranne per alcuni picchi ostinati che suggeriscono creste sepolte o vuoti.
        #JNSQscience_gravityScan_LaytheInSpaceHighEnclosedFaults_00 = La rete di faglie diventa una sottile trama irregolare nel campo, come se la crosta fosse spaccata fino in fondo.
        #JNSQscience_gravityScan_LaytheInSpaceHighLowlands_00 = I bassopiani risultano come una depressione uniforme nel campo, comoda, insipida e probabilmente nasconde qualcosa di acquoso.
        #JNSQscience_gravityScan_LaytheInSpaceHighMidlands_00 = Le pianure hanno una media "normale", ma il rilevatore coglie ancora deboli motivi ripetuti, come se la crosta fosse sotto stress costante.
        #JNSQscience_gravityScan_VallSrfLandedPoles_00 = Il gravitometro insiste che il ghiaccio polare sia più spesso della tua sicurezza.
        #JNSQscience_gravityScan_VallSrfLandedHighlands_00 = Le letture rimbalzano: le alture sembrano un miscuglio disordinato di ghiaccio, roccia e segreti.
        #JNSQscience_gravityScan_VallSrfLandedMidlands_00 = Una lieve trazione suggerisce strati irregolari sotto. Dai la colpa a "geologia interessante", non agli spuntini.
        #JNSQscience_gravityScan_VallSrfLandedLowlands_00 = Nei dati i bassopiani risultano stranamente uniformi, come se un bacino sepolto stesse cercando di non farsi notare.
        #JNSQscience_gravityScan_VallSrfLandedMountains_00 = L'ago oscilla a ogni cresta: queste vette poggiano su qualcosa di denso e scontroso.
        #JNSQscience_gravityScan_VallInSpaceLowPoles_00 = Radendo i poli in orbita bassa, la tua orbita si inclina leggermente, come se Vall fosse silenziosamente fuori equilibrio.
        #JNSQscience_gravityScan_VallInSpaceLowHighlands_00 = Sopra le alture, la mappa diventa un mosaico di minuscole trazioni e depressioni.
        #JNSQscience_gravityScan_VallInSpaceLowMidlands_00 = Le pianure tirano quel tanto che basta per tenere onesta l'orbita, e quel tanto che basta per essere fastidiose.
        #JNSQscience_gravityScan_VallInSpaceLowLowlands_00 = I bassopiani danno un'ampia e costante depressione della gravità, suggerendo una vasta conca sotto il ghiaccio.
        #JNSQscience_gravityScan_VallInSpaceLowMountains_00 = Ogni dorsale montuosa dà alla tua traiettoria un piccolo colpetto, come se volesse il merito di esistere.
        #JNSQscience_gravityScan_VallInSpaceHighPoles_00 = Dall'orbita alta, l'anomalia polare si confonde in una lenta oscillazione che non riesci proprio a ignorare.
        #JNSQscience_gravityScan_VallInSpaceHighHighlands_00 = Da quassù le alture si mediano, ma Vall si rifiuta comunque di essere perfettamente rotondo.
