@EXPERIMENT_DEFINITION:HAS[#id[bd_UVspec]]
{
    %RESULTS
    {
        GrannusInSpaceLowNorthPolarZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowNorthPolarZone_00 // The UV spectrum from this latitude is laced with jittery emission spikes, like the star is quietly crackling at the edges. The data takes a while to get home, and somehow that makes it feel louder.
        GrannusInSpaceLowNorthSubpolarZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowNorthSubpolarZone_00 // A thin forest of ultraviolet lines rises and falls as you track the limb, hinting at turbulent layers you definitely did not pack for. Mission Control requests you stop calling them “spicy noodles.”
        GrannusInSpaceLowNorthTemperateZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowNorthTemperateZone_00 // The instrument resolves broad absorption bands and then immediately argues with itself about the baseline. You save the file as “Grannus_is_red_okay” for later scientific reconciliation.
        GrannusInSpaceLowNorthTropicZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowNorthTropicZone_00 // UV emission brightens in bursts that don’t match your timing marks, as if Grannus is running its own schedule. You add a note: “possible flarelet tantrums.”
        GrannusInSpaceLowEquatorialZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowEquatorialZone_00 // The equatorial scan shows a stronger ultraviolet glow than expected under a dim red sun, which feels unfair. The spectrometer insists the photons don’t care about your mood.
        GrannusInSpaceLowSouthTropicZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowSouthTropicZone_00 // A clean set of lines appears, then smears into a noisy haze as the spacecraft drifts through interference. Somewhere far away, a comms tech sighs loudly enough to be heard in the log.
        GrannusInSpaceLowSouthTemperateZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowSouthTemperateZone_00 // The UV spectrum has sharp, narrow features that look almost engineered until you remember nature is allowed to be rude. You re-check the calibration and pretend you didn’t doubt it.
        GrannusInSpaceLowSouthSubpolarZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowSouthSubpolarZone_00 // The limb scan shows faint ultraviolet fringes that suggest a complex, restless outer layer. You briefly consider sending it a postcard that says “please remain calm.”
        GrannusInSpaceLowSouthPolarZone* = #GEPscience_bd_UVspec_GrannusInSpaceLowSouthPolarZone_00 // Ultraviolet intensity drops and surges in a pattern that makes no sense until you stop expecting it to. The star does not provide explanations, only data.
        GrannusInSpaceHigh* = #GEPscience_bd_UVspec_GrannusInSpaceHigh_00 // From high above, Grannus becomes a single, austere signature: broad ultraviolet power with occasional needle-thin outbursts. The long delay makes each burst arrive like a late, unwelcome surprise.

        TaranisInSpaceLowMagmaSea* = #GEPscience_bd_UVspec_TaranisInSpaceLowMagmaSea_00 // The UV spectrum picks up a faint haze of hot-surface emissions, like the day side is trying to evaporate itself into space. The detector auto-dims and you thank past-you for enabling “coward mode.”
        TaranisInSpaceLowMagmaShores* = #GEPscience_bd_UVspec_TaranisInSpaceLowMagmaShores_00 // Over the glowing coastlines, the spectrometer catches intermittent lines consistent with sputtered minerals and angry dust. You label the region “do not inhale” even though nobody can.
        TaranisInSpaceLowScorchedLowlands* = #GEPscience_bd_UVspec_TaranisInSpaceLowScorchedLowlands_00 // Reflected UV is patchy and harsh, with odd fluorescent hints that come and go as the terrain rolls beneath you. It’s like the rocks are answering a question you didn’t ask.
        TaranisInSpaceLowMidlands* = #GEPscience_bd_UVspec_TaranisInSpaceLowMidlands_00 // The scan finds no stable atmosphere, just a thin, transient whisper that varies with lighting and altitude. Mission Control calls it an exosphere; you call it “the universe clearing its throat.”
        TaranisInSpaceLowHighlands* = #GEPscience_bd_UVspec_TaranisInSpaceLowHighlands_00 // The high ground shows cleaner reflectance and sharper spectral edges, as if the surface has been sandblasted by radiation for ages. You start missing boring, predictable vacuum.
        TaranisInSpaceLowDarkSideMidlands* = #GEPscience_bd_UVspec_TaranisInSpaceLowDarkSideMidlands_00 // On the cold side, UV reflectance plummets and the spectrum goes quiet, almost polite. The silence feels heavier out here, like the data is trying not to wake anything up.
        TaranisInSpaceLowDarkSideHighlands* = #GEPscience_bd_UVspec_TaranisInSpaceLowDarkSideHighlands_00 // A faint ultraviolet glow appears along the horizon line, possibly from charged particles skimming the boundary between night and day. You mark it as “pretty” and hope the scientists forgive you.
        TaranisInSpaceLowPoles* = #GEPscience_bd_UVspec_TaranisInSpaceLowPoles_00 // The poles show subtle spectral shifts that suggest cold-trapped residues hanging on despite everything. Under a red sun, “stable” still means “barely.”
        TaranisInSpaceHigh* = #GEPscience_bd_UVspec_TaranisInSpaceHigh_00 // From higher orbit, Taranis reduces to a brutal contrast: a bright, scorching hemisphere and a dark, frozen one with a thin seam between. The UV spectrum looks like a split decision.

        ToutatisInSpaceLowSunnyLowlands* = #GEPscience_bd_UVspec_ToutatisInSpaceLowSunnyLowlands_00 // The UV spectrum shows strong absorption from the thin atmosphere, with extra scattering over the hottest regions. You wonder how something so “almost-air” can still be so bossy.
        ToutatisInSpaceLowSunnyHighlands* = #GEPscience_bd_UVspec_ToutatisInSpaceLowSunnyHighlands_00 // Over elevated terrain, the lines sharpen slightly as the air thins even more, and the surface reflectance asserts itself. It’s the closest thing to clarity you’ve had since leaving home.
        ToutatisInSpaceLowTransitionalLowlands* = #GEPscience_bd_UVspec_ToutatisInSpaceLowTransitionalLowlands_00 // Near the twilight band, the spectrometer catches a shifting mix of surface reflection and tenuous atmospheric absorption. The planet can’t decide whether it’s burning or freezing, so it tries both.
        ToutatisInSpaceLowTransitionalHighlands* = #GEPscience_bd_UVspec_ToutatisInSpaceLowTransitionalHighlands_00 // UV features fluctuate with altitude and local shadowing, as if the terminator is breathing in slow motion. You file the data and then stare at it longer than is strictly professional.
        ToutatisInSpaceLowDarkSideLowlands* = #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideLowlands_00 // The dark side returns a dim, cold signature with occasional hints of sublimated gases that vanish as quickly as they appear. The instrument calls it “transient”; you call it “blink and you miss it.”
        ToutatisInSpaceLowDarkSideHighlands* = #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideHighlands_00 // Weak UV reflectance and a whisper of absorption suggest a thin veil of gases pooling in the cold. You note that “atmosphere” is a very generous word here.
        ToutatisInSpaceLowSoutheasternMountains* = #GEPscience_bd_UVspec_ToutatisInSpaceLowSoutheasternMountains_00 // The mountains throw long shadows, and the spectrum alternates between sharp surface edges and faint atmospheric bands as you pass over ridgelines. It feels like reading a barcode for a planet.
        ToutatisInSpaceLowWesternMountains* = #GEPscience_bd_UVspec_ToutatisInSpaceLowWesternMountains_00 // A slight increase in ultraviolet haze appears downwind of the day side, hinting at particles being nudged around by thin air and solar pressure. Mission Control asks if it’s weather; you answer “sort of.”
        ToutatisInSpaceLowDarkSideMountains* = #GEPscience_bd_UVspec_ToutatisInSpaceLowDarkSideMountains_00 // The UV scan catches a faint, ghostly glow along the upper limb, possibly charged-particle activity interacting with the tenuous air. You log it carefully, then quietly appreciate the view.
        ToutatisInSpaceHigh* = #GEPscience_bd_UVspec_ToutatisInSpaceHigh_00 // From high above, Toutatis’ thin atmosphere writes a subtle signature over a planet of extremes. The numbers arrive late, and somehow the delay makes the cold side feel even farther away.

        NodensInSpaceLowSaltySeas* = #GEPscience_bd_UVspec_NodensInSpaceLowSaltySeas_00 // The UV spectrum above the salty seas shows deep absorption bands and a bright scatter edge off the haze layer. Under Grannus’ dim red light, the instrument integrates longer and still comes back with “probably water.”
        NodensInSpaceLowFreshWater* = #GEPscience_bd_UVspec_NodensInSpaceLowFreshWater_00 // Over the darker freshwater patches, the UV reflectance drops while atmospheric absorption stays stubbornly thick. Something in the air is very good at eating ultraviolet.
        NodensInSpaceLowShores* = #GEPscience_bd_UVspec_NodensInSpaceLowShores_00 // The shoreline boundary draws a crisp UV contrast line, like someone traced it with a highlighter you can’t see. Thin coastal haze adds extra wiggles to the spectrum that take ages to confirm through the comm delay.
        NodensInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_NodensInSpaceLowTropicalLowlands_00 // The tropics show strong UV scattering from high clouds and a broad absorption dip that suggests a busy upper atmosphere. Mission Control asks if it’s “ozone-ish”; you respond “it’s definitely -ish.”
        NodensInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_NodensInSpaceLowTemperateLowlands_00 // Temperate lowlands return a steadier UV signature, with fewer cloud spikes but the same heavy atmospheric bite. The planet looks calm, but the spectrum keeps whispering “chemistry.”
        NodensInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_NodensInSpaceLowTropicalMidlands_00 // UV readings brighten over midland ridges as the air thins slightly and surface reflectance starts to matter. The line shapes shift with every pass, like the atmosphere is rearranging itself when you’re not looking.
        NodensInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_NodensInSpaceLowTemperateMidlands_00 // The spectrometer resolves a cleaner surface edge here, then immediately loses it to a passing veil of haze. Nodens is generous with data and stingy with certainty.
        NodensInSpaceLowHighlands* = #GEPscience_bd_UVspec_NodensInSpaceLowHighlands_00 // Highland terrain reflects more UV than expected for such a thick atmosphere, hinting at lighter rock or thinner haze columns. You tag the file “good signal, still far from home.”
        NodensInSpaceLowTundra* = #GEPscience_bd_UVspec_NodensInSpaceLowTundra_00 // The tundra’s UV return is muted and cold, with a subtle slope change that could be frost, dust, or “something else.” The long delay makes every ambiguous bump feel personal.
        NodensInSpaceLowIceCaps* = #GEPscience_bd_UVspec_NodensInSpaceLowIceCaps_00 // The ice caps flare bright in ultraviolet, but the absorption overhead stays strong enough to blur the edges. Even the brightest patches look subdued under a red sun.
        NodensInSpaceHigh* = #GEPscience_bd_UVspec_NodensInSpaceHigh_00 // From high orbit, Nodens is a single, heavy atmospheric signature draped over faint surface hints. The spectrum arrives late and thick, like a postcard that got damp on the way.

        BelisamaInSpaceLowFlats* = #GEPscience_bd_UVspec_BelisamaInSpaceLowFlats_00 // Belisama’s flats reflect ultraviolet in a flat, stubborn way: no air, no excuses, just rock. Now and then a faint glow flickers at the limb, likely dust getting excited by Grannus’ harsher moments.
        BelisamaInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_BelisamaInSpaceLowTropicalLowlands_00 // The “tropical” label feels optimistic, but the UV albedo does warm slightly on the brighter face. Nodens looms nearby, and the spectrometer catches a faint extra UV wash that wasn’t on the checklist.
        BelisamaInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_BelisamaInSpaceLowTemperateLowlands_00 // UV contrast bands trace subtle compositional changes across the lowlands, like someone spilled different powders and never cleaned up. The vacuum keeps everything honest and a little eerie.
        BelisamaInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_BelisamaInSpaceLowTropicalMidlands_00 // The midlands show sharper UV edges, suggesting fresher material or less space-weathering. The readings are clean enough that Mission Control briefly forgets you’re operating under a dim red sun.
        BelisamaInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_BelisamaInSpaceLowTemperateMidlands_00 // A thin set of spectral features appears and disappears with viewing angle, consistent with rough terrain throwing micro-shadows into the UV map. It’s geology, but it feels like the moon is blinking.
        BelisamaInSpaceLowHighlands* = #GEPscience_bd_UVspec_BelisamaInSpaceLowHighlands_00 // Highlands return a harsher UV glare with occasional fluorescent-looking spikes from bright outcrops. You consider naming the outcrops, then remember you can’t even pronounce “Belisama” consistently.
        BelisamaInSpaceLowPoles* = #GEPscience_bd_UVspec_BelisamaInSpaceLowPoles_00 // The poles are darker in UV, with a slight slope hinting at cold-trapped residues that don’t want to be seen. The instrument disagrees on the baseline, which is its way of showing respect.
        BelisamaInSpaceHigh* = #GEPscience_bd_UVspec_BelisamaInSpaceHigh_00 // From high orbit, Belisama is mostly a quiet, airless UV reflectance curve with a persistent, faint limb shimmer. The data’s clean, the sky is not, and the delay makes it feel farther still.

        SucellusInSpaceLowBasins* = #GEPscience_bd_UVspec_SucellusInSpaceLowBasins_00 // The basins show UV-dark material with sharp absorption edges, as if something metallic has been ground into the regolith. High radiation noise forces extra averaging, and the results still look a little angry.
        SucellusInSpaceLowLowlands* = #GEPscience_bd_UVspec_SucellusInSpaceLowLowlands_00 // Lowland passes reveal a faint ultraviolet emission component that doesn’t match simple reflection. It could be sputtered particles, or Sucellus just being dramatic under Grannus.
        SucellusInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_SucellusInSpaceLowTropicalMidlands_00 // The UV spectrum sharpens over midlands, with small line features consistent with mineral-rich dust. The instrument logs a warning: “signal good, vibes unsettling.”
        SucellusInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_SucellusInSpaceLowTemperateMidlands_00 // Subtle UV color differences map out compositional stripes that suggest mixing and resurfacing long ago. The patterns feel deliberate until you remember rocks also enjoy being weird.
        SucellusInSpaceLowHighlands* = #GEPscience_bd_UVspec_SucellusInSpaceLowHighlands_00 // Highlands flash brighter in UV, hinting at fresher fractures or exposed deposits with less weathered crust. Mission Control asks for “more passes”; the comm delay answers first with silence.
        SucellusInSpaceLowPoles* = #GEPscience_bd_UVspec_SucellusInSpaceLowPoles_00 // Polar regions show a slight brightening and a change in slope that could indicate thin frost or fine-grained residue. Under a dim red sun, even “ice” has to work overtime.
        SucellusInSpaceHigh* = #GEPscience_bd_UVspec_SucellusInSpaceHigh_00 // From high orbit, Sucellus reads as a hard, metallic reflectance signature wrapped in radiation fuzz. The spectrum is crisp enough to tempt conclusions, and distant enough to punish them.

        CaireenInSpaceLowLowlands* = #GEPscience_bd_UVspec_CaireenInSpaceLowLowlands_00 // Caireen’s lowlands are a patchwork of UV responses, like a captured asteroid wearing mismatched paint. The spectrometer keeps recalibrating, as if it doesn’t trust what it’s seeing.
        CaireenInSpaceLowMidlands* = #GEPscience_bd_UVspec_CaireenInSpaceLowMidlands_00 // UV scans across the midlands show faint, transient emission glints that track with sun angle more than terrain. Dust charging in the harsh environment is the leading suspect, and it is not cooperative.
        CaireenInSpaceLowHighlands* = #GEPscience_bd_UVspec_CaireenInSpaceLowHighlands_00 // The highlands return a sharper UV edge with occasional fluorescence-like bumps from bright spots. You mark them for follow-up, knowing follow-up will arrive after another long, lonely delay.
        CaireenInSpaceLowPoles* = #GEPscience_bd_UVspec_CaireenInSpaceLowPoles_00 // The poles are dim and steady in UV, with a slight slope change that suggests fine frost or just finer dust. On a tiny moon this far out, those two options feel unhelpfully similar.
        CaireenInSpaceHigh* = #GEPscience_bd_UVspec_CaireenInSpaceHigh_00 // From high orbit, Caireen is barely more than a jagged UV glint with a lot of black space around it. The emptiness dominates the dataset, and somehow that still counts as science.

        SironaInSpaceLowDarkTropicalBands* = #GEPscience_bd_UVspec_SironaInSpaceLowDarkTropicalBands_00 // The UV spectrum over the dark tropical bands shows heavy absorption with bright, needle-thin emission spikes. Sirona’s extreme field makes the detector chatter like it’s eavesdropping on lightning.
        SironaInSpaceLowLightTropicalBands* = #GEPscience_bd_UVspec_SironaInSpaceLowLightTropicalBands_00 // Brighter clouds push more UV back into the sensor, but methane still bites big chunks out of the curve. Under Grannus’ dim glow, the planet somehow still looks electrically “awake.”
        SironaInSpaceLowDarkTemperateBands* = #GEPscience_bd_UVspec_SironaInSpaceLowDarkTemperateBands_00 // A broad ultraviolet haze signature sits on top of the banding, as if the upper atmosphere is busy cooking new chemicals. The downlink notes arrive late, and they still feel urgent.
        SironaInSpaceLowLightTemperateBands* = #GEPscience_bd_UVspec_SironaInSpaceLowLightTemperateBands_00 // The UV lines sharpen and blur with each pass, hinting at layered clouds sliding past each other at rude speeds. You label the dataset “not calm” and hope that’s sufficiently scientific.
        SironaInSpaceLowDarkPolarBands* = #GEPscience_bd_UVspec_SironaInSpaceLowDarkPolarBands_00 // The polar region flares with ultraviolet emission that looks suspiciously like auroral activity on a grand scale. The instrument requests fewer excited particles; Sirona declines.
        SironaInSpaceLowLightPolarBands* = #GEPscience_bd_UVspec_SironaInSpaceLowLightPolarBands_00 // UV brightness rises along the limb and then collapses into deep absorption, like you’re skimming the edge of a glowing shell. The red sun makes it feel like you’re watching it through a warning light.
        SironaInSpaceHigh* = #GEPscience_bd_UVspec_SironaInSpaceHigh_00 // From high above, Sirona becomes a clean atmospheric signature with intermittent UV outbursts that punch through the average. The long communications delay makes each burst feel like it happened a lifetime ago.

        AirmedInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowTropicalLowlands_00 // The UV return is uneven, as if one half of the ground refuses to reflect politely. With no real air to smooth things out, every scar shows up in brutal detail.
        AirmedInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowTemperateLowlands_00 // The spectrum is mostly reflected sunlight, but the baseline wobbles under Sirona’s radiation storms. The instrument calls it “noise”; you call it “the neighborhood.”
        AirmedInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowTropicalMidlands_00 // Sharp UV edges suggest fresher material exposed by old impacts, then immediately fade as the viewing angle changes. Airmed makes you work for every clean curve.
        AirmedInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowTemperateMidlands_00 // A faint, transient ultraviolet glow rides along the horizon, consistent with sputtered dust and charged particles. Mission Control asks for repeats; the delay answers with silence.
        AirmedInSpaceLowHighlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowHighlands_00 // Highlands reflect a harsher UV glare, like the surface has been sandblasted by radiation for ages. The spectrometer agrees, then asks if you’re sure you calibrated it.
        AirmedInSpaceLowDarkenedLowlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedLowlands_00 // The darkened terrain eats ultraviolet and gives almost nothing back, leaving a stubbornly flat spectrum. It feels like scanning a void that happens to be solid.
        AirmedInSpaceLowDarkenedMidlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedMidlands_00 // A weak fluorescent bump appears and disappears over the two-toned boundary. You mark it “interesting” and immediately regret how small that word feels out here.
        AirmedInSpaceLowDarkenedHighlands* = #GEPscience_bd_UVspec_AirmedInSpaceLowDarkenedHighlands_00 // The UV curve is dim and jittery, not from the surface but from the particle environment hammering the sensor. Even the rocks seem tired.
        AirmedInSpaceLowPoles* = #GEPscience_bd_UVspec_AirmedInSpaceLowPoles_00 // The poles brighten slightly in UV, hinting at fine frost or dust that clings where it can. Under a dim red sun, “cold-trapped” sounds more like “desperate.”
        AirmedInSpaceHigh* = #GEPscience_bd_UVspec_AirmedInSpaceHigh_00 // From high orbit, Airmed is a tiny, two-toned fleck with a lot of empty space around it. The spectrum is cleanest when you stop expecting it to be comfortable.

        BorvoInSpaceLowTropicalCraquelure* = #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalCraquelure_00 // UV absorption bands deepen over the cracked terrain, suggesting a haze-rich atmosphere that loves swallowing short wavelengths. The surface below looks like it’s trying to peel away from the cold.
        BorvoInSpaceLowTemperateCraquelure* = #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateCraquelure_00 // The spectrometer catches subtle UV scattering changes that track with the crack patterns, as if gases pool and thin along them. Borvo’s “low pressure” still has plenty of opinions.
        BorvoInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalLowlands_00 // The atmosphere writes broad, smooth UV absorption over a muted surface reflectance. Methane signatures stand out even under Grannus’ dim light, which is unfairly efficient.
        BorvoInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateLowlands_00 // A faint ultraviolet haze shoulder appears, consistent with photochemical smog building up high above. You save the plot as “definitely not just fog.”
        BorvoInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_BorvoInSpaceLowTropicalMidlands_00 // Over higher ground the surface contributes more to the UV curve, sharpening the slope and exposing mineral hints. The planet still keeps most of its secrets behind a thin, cold veil.
        BorvoInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_BorvoInSpaceLowTemperateMidlands_00 // The UV spectrum steadies into repeatable bands, then drifts as winds move the upper haze around. You can almost hear the atmosphere shuffling papers.
        BorvoInSpaceLowHighlands* = #GEPscience_bd_UVspec_BorvoInSpaceLowHighlands_00 // The UV return brightens slightly, possibly from cleaner air columns or lighter surface material. For a moment, the data feels close—then the comm delay reminds you it isn’t.
        BorvoInSpaceLowMajorCraters* = #GEPscience_bd_UVspec_BorvoInSpaceLowMajorCraters_00 // The craters show a distinctive UV albedo pattern, as if excavated material reflects differently than the surrounding plains. The atmosphere softens the contrast, like it’s trying to be polite.
        BorvoInSpaceLowPoles* = #GEPscience_bd_UVspec_BorvoInSpaceLowPoles_00 // Polar scans show a shifted UV slope that could indicate cold-trapped residues or altered haze chemistry. The spectrometer labels it “anomaly,” which is basically its favorite word.
        BorvoInSpaceHigh* = #GEPscience_bd_UVspec_BorvoInSpaceHigh_00 // From high orbit, Borvo’s UV signature is dominated by nitrogen-diluted absorption with methane still clearly present. The whole world reads like a quiet lab experiment conducted very far from home.

        DamonaInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_DamonaInSpaceLowTropicalLowlands_00 // The UV spectrum is stark and simple—just reflection off gray, battered ground—with occasional spikes from charged-particle hits. Damona’s silence is only interrupted by radiation.
        DamonaInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_DamonaInSpaceLowTemperateLowlands_00 // Subtle UV contrast bands trace compositional patches across the lowlands. The detector keeps integrating longer, as if distance itself is lowering the signal.
        DamonaInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_DamonaInSpaceLowTropicalMidlands_00 // The midlands show sharper UV edges, consistent with fresher regolith exposed by impacts. You wonder how long “fresh” lasts under Sirona’s harsh environment.
        DamonaInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_DamonaInSpaceLowTemperateMidlands_00 // A faint limb glow appears and vanishes during the pass, likely dust or sputtered atoms briefly excited. It’s the closest thing Damona has to weather.
        DamonaInSpaceLowHighlands* = #GEPscience_bd_UVspec_DamonaInSpaceLowHighlands_00 // Highland surfaces reflect a slightly brighter UV curve, suggesting different material or less space-darkening. Mission Control asks what it means; you answer with a very long file name.
        DamonaInSpaceLowImpactBasin* = #GEPscience_bd_UVspec_DamonaInSpaceLowImpactBasin_00 // The big basin reads as a UV signature change with a rough, noisy edge—excavated stuff, fractured walls, and shadowing all at once. The scar tells its story without using words.
        DamonaInSpaceLowPoles* = #GEPscience_bd_UVspec_DamonaInSpaceLowPoles_00 // The poles are dimmer and steadier in UV, with a small slope change that could be fine frost or finer dust. Out here, those are functionally the same problem.
        DamonaInSpaceHigh* = #GEPscience_bd_UVspec_DamonaInSpaceHigh_00 // From high orbit, Damona is a pockmarked dot and a clean, airless reflectance curve. The emptiness around it takes up most of the dataset, and somehow that still counts.

        EponaInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_EponaInSpaceLowTropicalLowlands_00 // The UV spectrum shows broad atmospheric absorption with a stubborn methane bite, even this far under Grannus’ dim red light. The lowlands reflect just enough to prove there’s a surface under all that cold air.
        EponaInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_EponaInSpaceLowTemperateLowlands_00 // A smoother UV curve here suggests thicker haze and fewer sharp surface features making it through. The detector integrates longer, and the comm delay makes the planet feel even colder.
        EponaInSpaceLowTropicalUplands* = #GEPscience_bd_UVspec_EponaInSpaceLowTropicalUplands_00 // Over higher terrain the atmospheric bands thin slightly and the surface edge sharpens. Whatever’s down there—ice, dust, or both—still refuses to be obvious.
        EponaInSpaceLowTemperateUplands* = #GEPscience_bd_UVspec_EponaInSpaceLowTemperateUplands_00 // The UV signature steadies into repeatable absorption bands, then jitters as a haze layer shifts underneath. Mission Control calls it “interesting variability” after the data finally arrives.
        EponaInSpaceLowHighlands* = #GEPscience_bd_UVspec_EponaInSpaceLowHighlands_00 // The highlands return a brighter UV slope, as if cleaner air columns let more reflection through. You briefly feel closer to the ground, until the numbers remind you how far “close” is out here.
        EponaInSpaceLowGrandPeaks* = #GEPscience_bd_UVspec_EponaInSpaceLowGrandPeaks_00 // Peaks punch through the haze enough to show crisp reflectance edges beneath the atmospheric blanket. The spectrometer logs “strong contrast,” which is its way of sounding impressed.
        EponaInSpaceLowCraters* = #GEPscience_bd_UVspec_EponaInSpaceLowCraters_00 // Crater rims flash different UV albedo than their floors, like fresh material is peeking out from old scars. The atmosphere softens it all, as if Epona is trying to keep secrets.
        EponaInSpaceLowVolcanoes* = #GEPscience_bd_UVspec_EponaInSpaceLowVolcanoes_00 // The UV scan picks up odd, localized changes in slope that could be warmer material or transient gases. You label it “maybe active” and wait an uncomfortably long time for anyone to argue.
        EponaInSpaceLowPoles* = #GEPscience_bd_UVspec_EponaInSpaceLowPoles_00 // Polar regions brighten in UV, hinting at cleaner frost or finer-grained deposits. Even here, methane absorption keeps chewing through the short wavelengths like it owns them.
        EponaInSpaceHigh* = #GEPscience_bd_UVspec_EponaInSpaceHigh_00 // From high orbit, Epona becomes mostly atmosphere: nitrogen-dominated absorption with a clear methane signature riding on top. The surface is a faint afterthought, like a memory arriving late.

        RosmertaInSpaceLowTropicalLowlands* = #GEPscience_bd_UVspec_RosmertaInSpaceLowTropicalLowlands_00 // Rosmerta’s UV curve is pure vacuum reflection with a lot of radiation grit in the signal. The lowlands look worn-down and quietly resentful of being observed.
        RosmertaInSpaceLowTemperateLowlands* = #GEPscience_bd_UVspec_RosmertaInSpaceLowTemperateLowlands_00 // The spectrum stays flat and airless, but the baseline jitters under the high-radiation environment. You file it as “noise,” though it feels more like the moon is hissing at you.
        RosmertaInSpaceLowTropicalMidlands* = #GEPscience_bd_UVspec_RosmertaInSpaceLowTropicalMidlands_00 // Subtle UV differences map out compositional patches across the midlands. Each clean datapoint takes longer than it should, as if distance itself adds error bars.
        RosmertaInSpaceLowTemperateMidlands* = #GEPscience_bd_UVspec_RosmertaInSpaceLowTemperateMidlands_00 // The UV return dims slightly with rougher terrain and shadowing, giving the spectrum a chopped look. You start trusting the shadows more than the numbers.
        RosmertaInSpaceLowHighlands* = #GEPscience_bd_UVspec_RosmertaInSpaceLowHighlands_00 // Highland reflectance is sharper in UV, suggesting cleaner, less space-darkened material on exposed ridges. The instrument agrees, then gets smacked by another particle hit.
