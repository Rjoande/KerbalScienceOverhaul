        NeptuneInSpaceHigh* = #ScienceRefactor_bd_UVspec_NeptuneInSpaceHigh_01 // Neptune's bands just below each pole look to give off more UV light.
        NeptuneInSpaceLow* = #ScienceRefactor_bd_UVspec_NeptuneInSpaceLow_00 // Fresh UV images from Neptune are ready for analysis!
        NeptuneInSpaceLow* = #ScienceRefactor_bd_UVspec_NeptuneInSpaceLow_01 // Close-up UV emission measurements are used to make enhanced color images of Neptune.
	
