@EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]
{
    @title = #ScienceRefactor_bd_SIGINT_title // SIGINT Scan
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_SIGINT_default_00 // A complete radio surveillance sweep of this planet is completed.
        
        KerbinInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_KerbinInSpaceLowNorthernHemisphere_00 // Significant levels of radio chatter are picked up on Kerbin, a surprising amount of which seems to be focused on spacecraft communications.
        KerbinInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_KerbinInSpaceLowSouthernHemisphere_00 // Some strange, intermittent radio transmissions are detected from near Kerbin's south pole.
        MunInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_MunInSpaceLowNorthernHemisphere_00 // A number of short, repeating radio wave transmissions are detected coming from numerous locations on the Mun's surface.
        MunInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_MunInSpaceLowSouthernHemisphere_00 // Radio reconnaissance sweeps of the Mun's southern hemisphere record a long, repeating message coming from a very specific location on the surface.
        MinmusInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_MinmusInSpaceLowNorthernHemisphere_00 // A singe radio chirp is being broadcast from somewhere just above the surface on Minmus.
        MinmusInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_MinmusInSpaceLowSouthernHemisphere_00 // Only faint background radio chatter from Kerbin is picked up in scans of Minmus.
        SunInSpaceLow* = #ScienceRefactor_bd_SIGINT_SunInSpaceLow_00 // The sun emits a constant stream of radio emissions over a broad spectrum, with occasional spikes due to localized increases in solar activity.
        MohoInSpaceLow* = #ScienceRefactor_bd_SIGINT_MohoInSpaceLow_00 // Radio emissions from the sun swamp out any trace of transmissions coming from Moho.
        EveInSpaceLow* = #ScienceRefactor_bd_SIGINT_EveInSpaceLow_00 // Strong interactions between the solar wind and Eve's thick atmosphere are likely to be responsible for the constant blast of radio wave activity in this area.
        GillyInSpaceLow* = #ScienceRefactor_bd_SIGINT_GillyInSpaceLow_00 // Radio surveillance of the tiny moon Gilly is met with indifferent silence.
        DunaInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_DunaInSpaceLowNorthernHemisphere_00 // Some faint radio emission patterns are observed after repeated scans of Duna.
        DunaInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_DunaInSpaceLowSouthernHemisphere_00 // A fascinatingly complex radio transmission is recorded being broadcast from Duna's southern polar region.
        IkeInSpaceLow* = #ScienceRefactor_bd_SIGINT_IkeInSpaceLow_00 // Radio reconnaissance of Ike reveals little of interest, just a big dead rock.
        DresInSpaceLow* = #ScienceRefactor_bd_SIGINT_DresInSpaceLow_00 // Complete radio silence…
        JoolInSpaceLow* = #ScienceRefactor_bd_SIGINT_JoolInSpaceLow_00 // A symphony of radio emissions are detected in low Jool space, arising both from interactions with the solar wind and through internal mechanisms.
        LaytheInSpaceLow* = #ScienceRefactor_bd_SIGINT_LaytheInSpaceLow_00 // Laythe's atmosphere produces some interesting radio wave emissions.
        VallInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_VallInSpaceLowNorthernHemisphere_00 // Radio surveillance of Vall's northern hemisphere reveals nothing of interest.
        VallInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_VallInSpaceLowSouthernHemisphere_00 // An amazingly consistent radio wave transmission is detected in the southern polar region of Vall.
        TyloInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_TyloInSpaceLowNorthernHemisphere_00 // A very feint, but interesting radio transmission is detected somewhere in Tylo's northern hemisphere.
        TyloInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_TyloInSpaceLowSouthernHemisphere_00 // Nothing much of interest is detected after radio surveillance of Tylo, just a big scary rock.
        BopInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_BopInSpaceLowNorthernHemisphere_00 // Something very strange happened during radio surveillance of Bop, a tremendously powerful transmission was detected, then abruptly lost. Now nothing at all registers on the sensors.
        BopInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_BopInSpaceLowSouthernHemisphere_00 // The tiny lifeless moon Bop has little of interest to offer.
        PolInSpaceLow* = #ScienceRefactor_bd_SIGINT_PolInSpaceLow_00 // This tiny, colorful moon offers nothing of interest for radio reconnaissance.
        EelooInSpaceLow* = #ScienceRefactor_bd_SIGINT_EelooInSpaceLow_00 // Reconnaissance of lonely Eeloo reveals no signals of interest.

        SarnusInSpaceLow* = #ScienceRefactor_bd_SIGINT_SarnusInSpaceLow_00 // Electrical activity in the atmosphere of Sarnus produces a cacophony of radio wave emissions.
        HaleInSpaceLow* = #ScienceRefactor_bd_SIGINT_HaleInSpaceLow_00 // Radio sweeps of Hale reveal no secrets from the tiny moon.
        OvokInSpaceLow* = #ScienceRefactor_bd_SIGINT_OvokInSpaceLow_00 // Some persistent radio wave activity is received during reconnaissance sweeps of Ovok; most likely caused by an interaction with Sarnus' magnetic field.
        SlateInSpaceLow* = #ScienceRefactor_bd_SIGINT_SlateInSpaceLow_00 // The seemingly barren moon Slate produces no interesting radio wave emissions.
        TektoInSpaceLow* = #ScienceRefactor_bd_SIGINT_TektoInSpaceLow_00 // Interactions between Tekto's atmosphere and the surrounding magnetic field produce isolated signals during radio surveillance sweeps.
        UrlumInSpaceLow* = #ScienceRefactor_bd_SIGINT_UrlumInSpaceLow_00 // Radio surveillance of the ice giant Urlum reveals some interesting repeated patterns emitted from deep within the planet's atmosphere.
        PoltaInSpaceLow* = #ScienceRefactor_bd_SIGINT_PoltaInSpaceLow_00 // Faint radio wave emissions are detected during radio reconnaissance of Polta.
        PriaxInSpaceLow* = #ScienceRefactor_bd_SIGINT_PriaxInSpaceLow_00 // No radio signals are detected on Priax, most likely a captured asteroid.
        WalInSpaceLow* = #ScienceRefactor_bd_SIGINT_WalInSpaceLow_00 // Seemingly random, faint radio wave patterns are detected during reconnaissance of Wal.
        TalInSpaceLow* = #ScienceRefactor_bd_SIGINT_TalInSpaceLow_00 // The tiny sub-moon Tal produces some faint radio wave emissions which are easily picked up by the large dish.
        NeidonInSpaceLow* = #ScienceRefactor_bd_SIGINT_NeidonInSpaceLow_00 // The ice giant Neidon produces strong, chaotic radio wave emissions.
        ThatmoInSpaceLow* = #ScienceRefactor_bd_SIGINT_ThatmoInSpaceLow_00 // Thatmo's thin atmosphere seems to interact with Neidon's magnetic field to generate some strange radio wave signals.
        NisseeInSpaceLow* = #ScienceRefactor_bd_SIGINT_NisseeInSpaceLow_00 // The radio-dead moon Nissee is likely to be a large captured asteroid.
        PlockInSpaceLow* = #ScienceRefactor_bd_SIGINT_PlockInSpaceLow_00 // Only the faint background radio waves from the sun are detected in scans of Plock.
        KarenInSpaceLow* = #ScienceRefactor_bd_SIGINT_KarenInSpaceLow_00 // Surprisingly intense radio wave emissions are detected during surveillance of Karen, almost as a giant antenna was buried beneath the surface…
        MercuryInSpaceLow* = #ScienceRefactor_bd_SIGINT_MercuryInSpaceLow_00 // Radio emissions from the sun swamp out any traces of transmissions coming from Mercury.
        VenusInSpaceLow* = #ScienceRefactor_bd_SIGINT_VenusInSpaceLow_00 // Strong interactions between the solar wind and Venus' thick atmosphere are likely to be responsible for the constant blast of radio wave activity in this area.
        MoonInSpaceLow* = #ScienceRefactor_bd_SIGINT_MoonInSpaceLow_00 // Faint, repetitive radio pings are detected on the surface of the Moon.
        MarsInSpaceLow* = #ScienceRefactor_bd_SIGINT_MarsInSpaceLow_00 // Weak radio signals are detected from a number of disparate locations on the surface of Mars.
        DeimosInSpaceLow* = #ScienceRefactor_bd_SIGINT_DeimosInSpaceLow_00 // No radio signals are detected on Deimos, most likely a captured asteroid.
        PhobosInSpaceLow* = #ScienceRefactor_bd_SIGINT_PhobosInSpaceLow_00 // Radio reconnaissance of Phobos reveals little of interest, just a big dead rock.
        JupiterInSpaceLow* = #ScienceRefactor_bd_SIGINT_JupiterInSpaceLow_00 // A symphony of radio emissions are detected in low Jupiter space, arising both from interactions with the solar wind and through internal mechanisms.
        IoInSpaceLow* = #ScienceRefactor_bd_SIGINT_IoInSpaceLow_00 // Faint radio wave emissions are detected during radio reconnaissance of Io.
        EuropaInSpaceLowNorthernHemisphere* = #ScienceRefactor_bd_SIGINT_EuropaInSpaceLowNorthernHemisphere_00 // Radio surveillance of Europa's northern hemisphere reveals nothing of interest.
        EuropaInSpaceLowSouthernHemisphere* = #ScienceRefactor_bd_SIGINT_EuropaInSpaceLowSouthernHemisphere_00 // A curious, simple radio wave transmission is detected from Europa's southern hemisphere; probably nothing more than instrument noise…
        GanymedeInSpaceLow* = #ScienceRefactor_bd_SIGINT_GanymedeInSpaceLow_00 // This icy, dead moon produces no measurable signs of radio wave activity.
        CallistoInSpaceLow* = #ScienceRefactor_bd_SIGINT_CallistoInSpaceLow_00 // Surveillance of the battered moon Callisto reveals no signs of radio wave emissions.
        SaturnInSpaceLow* = #ScienceRefactor_bd_SIGINT_SaturnInSpaceLow_00 // Electrical activity in the atmosphere of Saturn produces a cacophony of radio wave emissions.
        TitanInSpaceLow* = #ScienceRefactor_bd_SIGINT_TitanInSpaceLow_00 // Interactions between Titan's atmosphere and the surrounding magnetic field produce isolated signals during radio surveillance sweeps.
        UranusInSpaceLow* = #ScienceRefactor_bd_SIGINT_UranusInSpaceLow_00 // Radio surveillance of the ice giant Uranus reveals some interesting repeated patterns emitted from deep within the planet's atmosphere.
        PlutoInSpaceLow* = #ScienceRefactor_bd_SIGINT_PlutoInSpaceLow_00 // Only the faint background radio waves from the sun are detected in scans of Pluto.
    }
}