        #JNSQscience_evaReport_TalosInSpaceLowPoles_00 = The poles are a study in harsh light and deeper shadow; the boundary between them looks razor-thin.
        #JNSQscience_evaReport_TalosInSpaceLowPoles_01 = You float over the polar regions and feel very small in a way your suit’s readouts can’t quantify.
        #JNSQscience_evaReport_TalosInSpaceHigh_00 = From high above, Talos shrinks to a stubborn little disk that still manages to feel heavy on your mind.
        #JNSQscience_evaReport_TalosInSpaceHigh_01 = You file a calm EVA report while staring at Talos far below, wondering how “home” can be a direction.

        #JNSQscience_evaReport_EelooFlyingLowPoles_00 = You float over the polar ice, helmet lights bouncing off a blinding white that makes “up” hard to prove.
        #JNSQscience_evaReport_EelooFlyingLowPoles_01 = The air is a thin, icy whisper. Your suit vents frost that immediately tries to become part of the landscape.
        #JNSQscience_evaReport_EelooFlyingLowHighlands_00 = The highlands look like frozen teeth. The thin haze does nothing to soften the view or the cold.
