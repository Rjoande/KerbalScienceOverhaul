        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTropicalLowlands_00 = From low orbit, the radar stitches the tropical lowlands into a wide, shallow basin. It looks like a world you could survey—if the radio didn’t take forever to answer.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTemperateLowlands_00 = Clean echoes outline temperate plains with subtle ridges, all under a dim red sunrise. You file the map and feel very far away.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTropicalUplands_00 = The uplands resolve into rolling rises like frozen waves across the crust. The “sea” is probably ice, and the thought doesn’t help.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowTemperateUplands_00 = The profile shows long terraces and shallow scarps, as if the surface settled in stages. The numbers arrive crisp; the situation remains unreal.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowHighlands_00 = Highlands punch upward in rugged blocks with steep edges and deep shadows in the return. Excellent science, excellent warning label.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowGrandPeaks_00 = The grand peaks stand proud in the elevation model, sharp enough to make your nav computer sigh. You resist naming them after anyone you like.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowCraters_00 = Craters carve neat bowls into the map, rimmed by bright returns. Someone will suggest “shelter in a crater,” and you will object loudly.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowVolcanoes_00 = The volcanic regions show raised domes and broken flanks that look too fresh for comfort. Epona’s “cold exterior” suddenly feels like a polite rumor.
        #GEPscience_bd_radarAltimeter_EponaInSpaceLowPoles_00 = Polar passes reveal a high cap with abrupt margins and subtle fractures. The red sun glints off nothing you can see, only what the radar insists is there.

        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTropicalLowlands_00 = The radar traces a small, low plain on Rosmerta that looks too smooth for something this battered. Lonely moons can still surprise you.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTemperateLowlands_00 = Lowland echoes come back steady and flat, like the surface is trying to be uninteresting. The distance from home makes “uninteresting” feel precious.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTropicalMidlands_00 = Midlands rise in gentle humps and shallow troughs, barely enough to call hills. You wonder who decided this deserved a name, and decide they were right.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowTemperateMidlands_00 = The altimeter sketches stepped slopes like old fractures worn down by time. No air, no weather—just patient cold.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowHighlands_00 = Highlands show up as jagged ridges with hard breaks and long radar shadows. The moon looks sharp, quiet, and completely indifferent.
        #GEPscience_bd_radarAltimeter_RosmertaInSpaceLowPoles_00 = Polar contours tilt oddly, making “north” feel like a suggestion. You save the dataset under “tiny world, big silence.”

        #GEPscience_bd_radarAltimeter_RAB-58EInSpaceLowLowlands_00 = The radar struggles to define “altitude” over a captured moonlet with a questionable shape. The readout is half science, half potato geometry.
        #GEPscience_bd_radarAltimeter_RAB-58EInSpaceLowEasternHighlands_00 = Eastern high ground spikes up abruptly, then drops away just as fast. It’s like mapping a rock that never agreed to be a moon.
        #GEPscience_bd_radarAltimeter_RAB-58EInSpaceLowWesternHighlands_00 = The western highs return uneven, lumpy contours that shift with every pass. You annotate: “either real topography, or the universe is teasing us.”

        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTropicalLowlands_00 = The radar maps broad, low plains of ice-darkened terrain under Grannus’ red light. The emptiness looks bigger when it has contours.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTemperateLowlands_00 = Lowland echoes come back smooth and consistent, suggesting wide frozen flats. You catch yourself wishing for roads, then remember there’s no one to drive them.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTropicalMidlands_00 = Midlands rise in slow swells, like the crust was kneaded and left to freeze. The data arrives late, but the cold is timeless.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowTemperateMidlands_00 = The profile shows long, shallow valleys and gentle ridges, barely carved into the ice. You file it as “navigable” and immediately regret tempting fate.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowHighlands_00 = Highlands stand out as rugged blocks with steep scarps and deep radar shadows. A dwarf planet with full-sized cliffs still feels unfair.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowSouthPolarHills_00 = The southern polar hills produce tight, irregular contours that look like frozen waves mid-break. The red sun hangs low and makes everything feel temporary.
        #GEPscience_bd_radarAltimeter_CernunnosInSpaceLowNorthPole_00 = The north pole reads as a broad, high cap with subtle fractures and sharp margins. Out here, even the poles feel like the edge of the map.

        // bd_rpws
        #GEPscience_bd_rpws_GrannusInSpaceLow_00 = The receiver is awash in low, growling radio noise from Grannus, like a distant engine you can't turn off.
        #GEPscience_bd_rpws_GrannusInSpaceLow_01 = Plasma wave bursts arrive in uneven clumps; Mission Control confirms the clumps are real, not a comms dropout.
        #GEPscience_bd_rpws_GrannusInSpaceHigh_00 = Farther out, the background thins to a steady hiss punctuated by sharp clicks from sporadic activity on the red sun.
        #GEPscience_bd_rpws_GrannusInSpaceHigh_01 = The instrument logs slow ripples in the charged particle stream; by the time the plot reaches home, it's already old news.
        #GEPscience_bd_rpws_TaranisInSpaceLow_00 = In low orbit, the spacecraft crackles with surface-charging events; the RPWS writes "static" in a surprisingly angry font.
        #GEPscience_bd_rpws_TaranisInSpaceLow_01 = Taranis offers no magnetic shelter—every plasma wave from Grannus hits the sensors directly, and your nerves second.
        #GEPscience_bd_rpws_TaranisInSpaceHigh_00 = Higher up, wave activity still spikes whenever the sunlit side swings into view, as if the world itself is ringing.
        #GEPscience_bd_rpws_TaranisInSpaceHigh_01 = The data suggest sputtered ions trailing away from Taranis; someone proposes calling it a "tail" and is immediately corrected.
        #GEPscience_bd_rpws_ToutatisInSpaceLow_00 = Low orbit catches faint, patchy ionospheric tones over the hot hemisphere; the cold side goes almost silent.
        #GEPscience_bd_rpws_ToutatisInSpaceLow_01 = The thin air and low field make for messy, intermittent wave reflections—like trying to listen through a crinkled snack wrapper.
        #GEPscience_bd_rpws_ToutatisInSpaceHigh_00 = From high orbit, the strongest signals cluster near the day-night boundary, where the atmosphere can't decide what it wants to be.
        #GEPscience_bd_rpws_ToutatisInSpaceHigh_01 = Long, slow plasma oscillations ride along Grannus' wind; the graphs look calm until you notice the radiation warnings.
        #GEPscience_bd_rpws_NodensInSpaceLow_00 = Nodens’ thick air and “normal” field make a busy ionosphere; the RPWS hears pops and crackles that don’t match any onboard equipment.
        #GEPscience_bd_rpws_NodensInSpaceLow_01 = The red sun’s wind stirs up wave trains that ride along Nodens’ magnetic lines like plucked strings… very far from home.
        #GEPscience_bd_rpws_NodensInSpaceHigh_00 = Higher up, Nodens casts a long, quiet shadow in the plasma flow, then suddenly the hiss returns as you cross into open space.
        #GEPscience_bd_rpws_NodensInSpaceHigh_01 = A faint, repeating tone shows up in the spectrum—by the time it’s confirmed on Kerbin, Nodens has already rotated away.
        #GEPscience_bd_rpws_BelisamaInSpaceLow_00 = Belisama has little of its own shielding; most of what you record is Nodens’ magnetosphere sloshing around a tidally locked moon.
        #GEPscience_bd_rpws_BelisamaInSpaceLow_01 = The waves sharpen and distort near the day-night boundary, as if the surface itself is charging and discharging in slow motion.
        #GEPscience_bd_rpws_BelisamaInSpaceHigh_00 = Leaving the strongest influence of Nodens, the signal thins to a thin whistle and distant rumble from Grannus’ particle stream.
        #GEPscience_bd_rpws_BelisamaInSpaceHigh_01 = The antenna catches brief, metallic pings—likely charged dust, or a reminder to stop touching the hull without gloves.
        #GEPscience_bd_rpws_SucellusInSpaceLow_00 = With a near-zero magnetic field, Sucellus takes the red sun’s plasma directly; the readout looks like a storm with no clouds.
        #GEPscience_bd_rpws_SucellusInSpaceLow_01 = The RPWS detects surface-sputtered ions forming a patchy, fleeting exosphere—there and gone before the next comms window.
        #GEPscience_bd_rpws_SucellusInSpaceHigh_00 = Farther out, Sucellus leaves only a faint wake in the flow; the loudest signals are the ones from Grannus you can’t escape.
        #GEPscience_bd_rpws_SucellusInSpaceHigh_01 = A slow oscillation repeats like a heartbeat, but the “patient” is a dwarf planet and the doctor is several light-minutes late.
        #GEPscience_bd_rpws_CaireenInSpaceLow_00 = Tiny Caireen has no field and no air, but it still disturbs the plasma—an irregular little knot in Sucellus’ shadow.
        #GEPscience_bd_rpws_CaireenInSpaceLow_01 = The spectrum flickers as the spacecraft passes over jagged terrain; even the waves seem uncertain of what they’re bouncing off.
        #GEPscience_bd_rpws_CaireenInSpaceHigh_00 = High above Caireen, most activity belongs to Sucellus and the red sun; Caireen’s contribution is a barely-there wobble.
        #GEPscience_bd_rpws_CaireenInSpaceHigh_01 = The RPWS logs a brief, clean band of silence… until the next packet of data arrives and reminds you how far away “quiet” really is.
        #GEPscience_bd_rpws_SironaInSpaceLow_00 = Sirona’s magnetosphere roars in the receiver—layered hisses and warbling tones that make the panels feel inadequate.
        #GEPscience_bd_rpws_SironaInSpaceLow_01 = Strong bursts line up with auroral regions; by the time the confirmation arrives, Sirona has already turned its lights elsewhere.
        #GEPscience_bd_rpws_SironaInSpaceHigh_00 = Farther out, the spectrum smooths into a heavy background growl from Grannus’ wind, with Sirona’s “signature” riding on top.
        #GEPscience_bd_rpws_SironaInSpaceHigh_01 = You record a long, slow oscillation like a distant siren—very pretty, very unsettling, and very much not home.
        #GEPscience_bd_rpws_AirmedInSpaceLow_00 = Airmed has no field to hide behind; the RPWS hears raw plasma noise slamming into the spacecraft like invisible sandblasting.
        #GEPscience_bd_rpws_AirmedInSpaceLow_01 = Sharp pops appear whenever sunlight hits the surface below—charging events that feel like the moon is quietly snapping at you.
        #GEPscience_bd_rpws_AirmedInSpaceHigh_00 = Higher up, Airmed fades into the static, leaving only a small notch in the noise where the moon blocks the flow.
        #GEPscience_bd_rpws_AirmedInSpaceHigh_01 = The quietest moments still aren’t quiet; they’re just “far away” quiet, delayed and thinned by the long link home.
        #GEPscience_bd_rpws_BorvoInSpaceLow_00 = Borvo’s thin air and modest field make a busy ionosphere; the RPWS picks up whistlers that bend like they’re taking the scenic route.
        #GEPscience_bd_rpws_BorvoInSpaceLow_01 = Occasional broadband bursts suggest distant lightning or charged dust—either way, the antenna insists it heard something.
        #GEPscience_bd_rpws_BorvoInSpaceHigh_00 = Above Borvo, Sirona’s influence returns as a steady chorus; Borvo adds faint harmonics that drift with the terminator.
        #GEPscience_bd_rpws_BorvoInSpaceHigh_01 = The plots show wave packets arriving in clusters—easy to mistake for comm dropouts until you remember the physics doesn’t care.
        #GEPscience_bd_rpws_DamonaInSpaceLow_00 = Damona is cold, airless, and unshielded; the RPWS records a harsh, brittle static like the plasma is scraping the hull.
        #GEPscience_bd_rpws_DamonaInSpaceLow_01 = A brief, clean band of silence appears over the night side—then vanishes as the red sun’s wind finds you again.
        #GEPscience_bd_rpws_DamonaInSpaceHigh_00 = From high orbit, Damona is mostly a quiet obstruction in the flow; the loudest signals belong to Sirona and Grannus.
        #GEPscience_bd_rpws_DamonaInSpaceHigh_01 = The receiver catches faint pings that could be charged dust or your imagination filling in the gaps between delayed packets.
        #GEPscience_bd_rpws_EponaInSpaceLow_00 = Epona’s thin magnetic shielding lets the red sun’s plasma write noisy squiggles all over the spectrum.
        #GEPscience_bd_rpws_EponaInSpaceLow_01 = The nitrogen-rich air below murmurs with faint, uneven whistlers; the methane traces make the receiver smell “interesting” (it can’t smell).
        #GEPscience_bd_rpws_EponaInSpaceHigh_00 = Higher up, Epona’s influence fades and the background hiss of the system takes over—steady, distant, and not comforting.
        #GEPscience_bd_rpws_EponaInSpaceHigh_01 = Slow wave trains drift past like tired tides; by the time you report them, the planet has already moved on.
        #GEPscience_bd_rpws_RosmertaInSpaceLow_00 = Rosmerta itself is quiet and airless, but Epona’s nearby plasma environment keeps the antenna busy with warped echoes.
        #GEPscience_bd_rpws_RosmertaInSpaceLow_01 = Crossing the moon’s shadow, the signal drops to near-silence… then snaps back with a sharp crackle as sunlight returns.
        #GEPscience_bd_rpws_RosmertaInSpaceHigh_00 = From higher orbit, Rosmerta is just a small notch in the flow—briefly blocking the charged wind and then gone.
        #GEPscience_bd_rpws_RosmertaInSpaceHigh_01 = The recorder catches distant bursts from the red sun and a faint, delayed reply from Epona’s ionosphere, like a call-and-echo across empty space.
        #GEPscience_bd_rpws_RAB-58EInSpaceLow_00 = The RPWS hears mostly pops and ticks—charged dust and surface-sputtered ions announcing every close pass.
        #GEPscience_bd_rpws_RAB-58EInSpaceLow_01 = Its odd orbit drags you through changing plasma conditions; the plot looks like it can’t decide what “normal” means out here.
        #GEPscience_bd_rpws_RAB-58EInSpaceHigh_00 = Farther out, the little moonlet leaves only a subtle wobble in the spectrum, easily lost in the system-wide static.
        #GEPscience_bd_rpws_RAB-58EInSpaceHigh_01 = A few clean tones appear and vanish; Mission Control asks if it’s interference, and you answer several minutes later.
        #GEPscience_bd_rpws_CernunnosInSpaceLow_00 = Cernunnos offers no atmosphere and no field—just raw, cold exposure to the red sun’s particle stream.
        #GEPscience_bd_rpws_CernunnosInSpaceLow_01 = The instrument detects a faint halo of sputtered material, thin enough that it feels impolite to call it an “exosphere.”
        #GEPscience_bd_rpws_CernunnosInSpaceHigh_00 = High above Cernunnos, “quiet” is just the steady hiss of distant plasma and the occasional sharp ping of charged dust.
        #GEPscience_bd_rpws_CernunnosInSpaceHigh_01 = The receiver logs sparse, slow oscillations with long pauses between them—an unsettling rhythm for a lonely edge-of-system world.

        // bd_Scatterometer
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthPolarZone_00 = The return signal flickers like it’s trying to measure “wind” inside a glowing soup. Mission Control suggests we write down “very fast” and never say the units out loud.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthSubpolarZone_00 = Scatter patterns smear into long streaks as the star’s surface churns beneath you. The data arrives late, as if the packets were also being blown sideways.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthTemperateZone_00 = The instrument insists it’s seeing layered flow bands, then reboots to make sure it’s not dreaming. You agree with the reboot and keep recording anyway.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowNorthTropicZone_00 = Reflections pulse in slow waves, like the “weather” is bubbling up from below and popping at the top. You briefly miss clouds that only rain.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowEquatorialZone_00 = The equatorial returns show the sharpest shear, with bright and dark ribbons sliding past each other. You label it “high-speed atmosphere,” because “star” won’t fit in the report form.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthTropicZone_00 = The backscatter spikes in irregular bursts, then settles into a steady hiss. Whatever is “down there” is busy, and it doesn’t care that you’re watching.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthTemperateZone_00 = The scatterometer detects broad circulation bands that drift during the time it takes to transmit the last reading. It’s like measuring wind with yesterday’s thermometer.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthSubpolarZone_00 = The signal gets noisy and gritty, as if the star is sanding its own surface. You consider adding a “do not touch” sticker to the data.
        #GEPscience_bd_Scatterometer_GrannusInSpaceLowSouthPolarZone_00 = Returns near the pole are oddly structured, with tight spirals that refuse to average out. The red light outside makes the whole thing feel like a warning label.
        #GEPscience_bd_Scatterometer_GrannusInSpaceHigh_00 = From high over Grannus, the scatterometer can only summarize: “everything is moving, everywhere, all at once.” The long delay makes it feel like you’re listening to a distant furnace through a tin can.

        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSunnyLowlands_00 = The sunny lowlands throw back strong, steady echoes—hot ground, thin air, and winds that behave like they’re late for an appointment. The numbers look real, which is somehow suspicious this far from home.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSunnyHighlands_00 = Over the sunlit high terrain, the scatter signal wobbles as heated air spills downslope in ragged waves. You can practically hear the planet sizzling through the antenna.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowTransitionalLowlands_00 = The terminator lowlands show sharp gradients: calm pockets next to sudden gust lanes. It’s the kind of “breeze” that would steal your checklist and your hat.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowTransitionalHighlands_00 = The transition-zone highlands produce messy backscatter, like two climates arguing over who owns the mountain. The instrument politely reports “variable” and refuses to pick a side.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideLowlands_00 = On the dark side, returns quiet down into faint, slow-moving flows hugging the ground. The atmosphere is so thin it feels like the wind is whispering to itself.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideHighlands_00 = The dark highlands show intermittent surges, as cold air slides and pools in invisible channels. You mark the spot for future pilots who enjoy surprises.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowSoutheasternMountains_00 = Mountain echoes show strong directional scatter, suggesting persistent downslope jets. The data packet arrives with a delay long enough to make you double-check which side is “down” today.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowWesternMountains_00 = The western ranges return broken bands of turbulence, as if the thin air is shredding on the ridgelines. You jot down: “mountains still doing mountain things.”
        #GEPscience_bd_Scatterometer_ToutatisInSpaceLowDarkSideMountains_00 = Dark-side mountain returns are sparse but sharp—cold flows, sudden gusts, then silence. It’s the kind of weather that makes you talk to your radio just to hear something.
        #GEPscience_bd_Scatterometer_ToutatisInSpaceHigh_00 = From high orbit, Toutatis looks split between a roaring bright hemisphere and a quiet dark one, with the boundary always restless. The scatterometer’s global map reads like a warning about living on the edge.

        #GEPscience_bd_Scatterometer_NodensInSpaceLowSaltySeas_00 = The sea surface kicks back a lively, noisy return—whitecaps, gusts, and a lot of “yes, there is definitely weather here.” The red sunlight makes the wave fields look like moving rust.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowFreshWater_00 = The reflections are smoother and more coherent than the salty basins, with wind streaks that line up like careful handwriting. Someone suggests Nodens is “almost comfortable,” and the comm delay lets that statement hang awkwardly.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowShores_00 = Land and water fight over the signal in a jagged border of mixed scatter. The instrument calls it “complex terrain,” which is polite for “stop flying over the confusing bit.”
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTropicalLowlands_00 = Strong, steady backscatter implies persistent low-level winds and warm convection. It’s the first time “tropical” has ever sounded slightly threatening in a mission log.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTemperateLowlands_00 = Broad wind bands drift slowly, as if the atmosphere is taking its time deciding on a direction. The data arrives late enough that you feel like you’re forecasting yesterday.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTropicalMidlands_00 = The return signal pulses with rising thermals and shifting gust fronts spilling off higher ground. You mark it as “breezy,” then add a note: “breezy, but far away.”
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTemperateMidlands_00 = Scatter patterns show alternating calm pockets and rough corridors, suggesting terrain-channeled flow. The planet is teaching you its wind map one delayed packet at a time.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowHighlands_00 = The backscatter drops and spikes in quick succession—thin air, strong shear, and turbulence along ridges. The instrument survives, but the plots look like they’re nervous.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowTundra_00 = Low sun angles and cold surfaces produce crisp returns with subtle wind signatures hugging the ground. The atmosphere feels present, but careful—like it’s trying not to wake something.
        #GEPscience_bd_Scatterometer_NodensInSpaceLowIceCaps_00 = The signal comes back bright and clean, with katabatic flows sliding off the ice in steady streams. You briefly envy the simplicity of frozen weather.
        #GEPscience_bd_Scatterometer_NodensInSpaceHigh_00 = From high above Nodens, the scatterometer sketches a global pattern of circulation and storm tracks. It’s strangely reassuring to see a whole planet behaving like a planet—under a sun that isn’t yours.

        #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkTropicalBands_00 = The dark bands return a strong, mottled signal—dense haze and violent shear moving in disciplined lanes. Mission Control calls it “beautiful,” several minutes after you’ve started worrying.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowLightTropicalBands_00 = The light bands scatter more evenly, suggesting higher, smoother cloud decks riding fast winds. The atmosphere looks calm only because it’s moving too quickly to argue.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkTemperateBands_00 = Backscatter flickers in wave trains, like the clouds are being folded and refolded by enormous jet streams. You wonder how many kilometers “near-surface” means on a gas giant, then stop wondering.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowLightTemperateBands_00 = The returns smear into long streaks aligned with the flow—persistent winds with fewer breaks. The data packet arrives like a postcard from a storm that never ends.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowDarkPolarBands_00 = Polar echoes show tight spirals and sudden bursts, hinting at vortices that don’t like being averaged. The red glow outside makes every swirl look like a warning sign.
        #GEPscience_bd_Scatterometer_SironaInSpaceLowLightPolarBands_00 = The light polar regions give clean, high-contrast scatter, with wind direction snapping between stable lanes and chaotic eddies. You label it “predictable-ish” and immediately regret it.
        #GEPscience_bd_Scatterometer_SironaInSpaceHigh_00 = From high orbit, Sirona resolves into a banded machine of winds and waves, marching under dim red light. The scatterometer’s global map feels less like weather and more like machinery.

        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalCraquelure_00 = The cracked plains return a busy, speckled signal—gusts keep finding new edges to trip over. The atmosphere is thin enough to be sneaky, but it still moves with purpose under the dim red light.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateCraquelure_00 = Wind streaks line up along the fractures like someone tried to comb the surface and gave up halfway through. The data arrives late, as if the comms also had to cross the cracks.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalLowlands_00 = Lowland echoes suggest persistent near-surface flow, with occasional bursts that look like fast-moving haze fronts. Mission Control asks for “a weather report,” and you send back “yes.”
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateLowlands_00 = The scatterometer sees broad, steady winds that don’t care about your local daylight schedule. Down here, “morning” is mostly a rumor.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTropicalMidlands_00 = The return pattern shifts in bands, hinting at terrain-guided jets sliding around the midlands. You annotate the plot with “wind tunnels, but the planet-sized kind.”
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowTemperateMidlands_00 = Patches of calm alternate with rough corridors, like the atmosphere is picking favorites. The red sun keeps everything looking slightly incorrect, including the numbers.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowHighlands_00 = Over the highlands the signal jitters—turbulence, shear, and abrupt lulls behind ridges. The instrument survives, but the graph looks startled.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowMajorCraters_00 = Crater basins show sheltered pockets and sudden spillover gusts at the rims. It’s the classic “nice in the bowl, terrible at the edge” problem.
        #GEPscience_bd_Scatterometer_BorvoInSpaceLowPoles_00 = Polar returns are bright and clean, with steady downslope flows that behave like cold air on a mission. The atmosphere keeps its methane quiet and its winds louder than expected.
        #GEPscience_bd_Scatterometer_BorvoInSpaceHigh_00 = From high orbit, Borvo’s winds sketch a thin, persistent circulation—subtle but planet-spanning. The long delay makes it feel like you’re watching yesterday’s weather through a keyhole.

        #GEPscience_bd_Scatterometer_EponaInSpaceLowTropicalLowlands_00 = The lowlands throw back smooth, coherent echoes, with wind streaks that drift slowly across the cold surface. Even here, far from home, the air insists on being counted.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTemperateLowlands_00 = Surface winds look steady but oddly layered, like different “floors” of the atmosphere are sliding past each other. You file it under “polite turbulence.”
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTropicalUplands_00 = Upland returns show stronger shear and intermittent gust lanes, as if cold air is being poured downhill in invisible sheets. The red sun makes every boundary look like a bruise.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowTemperateUplands_00 = The scatterometer catches wave-like patterns marching over the uplands—gravity waves, or the planet sighing, or both. Mission Control’s reply arrives several minutes after your joke does.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowHighlands_00 = Above the highlands, the signal flickers with turbulence along the ridgelines and calmer pockets in the lee. The atmosphere is thin on patience and thick on surprises.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowGrandPeaks_00 = The peaks generate sharp, directional scatter—strong jets and violent eddies where the flow is forced to choose a side. You recommend future landers choose neither.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowCraters_00 = Crater interiors look deceptively calm, then spike with rim-crossing gusts that spill in like they own the place. “Sheltered” is clearly a temporary condition.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowVolcanoes_00 = The returns brighten and smear near the volcanic regions, suggesting warm plumes punching into cold air and stirring messy winds. The planet may be frozen, but something underneath is definitely not.
        #GEPscience_bd_Scatterometer_EponaInSpaceLowPoles_00 = Polar echoes are crisp, with persistent katabatic flows sliding toward the low ground. The day/night cues are faint out here, but the cold knows exactly what time it is.
        #GEPscience_bd_Scatterometer_EponaInSpaceHigh_00 = From high orbit, Epona’s circulation looks slow, deliberate, and stubbornly global—driven by weak sunlight and stronger secrets. The map reads like weather written for a world that expects no visitors.

        // bd_SIGINT
