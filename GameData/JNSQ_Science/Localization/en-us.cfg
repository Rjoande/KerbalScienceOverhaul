        #JNSQscience_crewReport_SunFlyingLowSouthSubpolarZone_00 = The hull crackles with static and the windows glow. The crew report that the concept of “outside” has become deeply personal.
        #JNSQscience_crewReport_SunFlyingLowSouthPolarZone_00 = Fast-moving ions pelt the ship from odd angles. The crew report that the pole is either fascinating, or actively offended by visitors.

        #JNSQscience_crewReport_MohoSrfLandedCraters_00 = Every direction is another impact scar. You start rating them by how good they’d be for a rover jump.
        #JNSQscience_crewReport_MohoSrfLandedCraters_01 = Dust drifts in slow motion when you bump the hatch. You call it “catering for craters.”
        #JNSQscience_crewReport_MohoSrfLandedExoticCraters_00 = This crater’s rim zig-zags like it was drawn with a shaky ruler. The crew quietly blames “space geology.”
        #JNSQscience_crewReport_MohoSrfLandedExoticCraters_01 = The ejecta patterns look wrong in a way that’s hard to explain. You take extra photos, just in case they’re worth bragging about.
        #JNSQscience_crewReport_MohoSrfLandedRareCraters_00 = You finally find a crater that isn’t half-erased by older ones. It feels like discovering a clean spot on a workshop floor.
        #JNSQscience_crewReport_MohoSrfLandedRareCraters_01 = Its walls are sharper and darker than the surroundings. Someone suggests it “might still be warm” and everyone stops talking.
        #JNSQscience_crewReport_MohoSrfLandedVoronoiCraters_00 = The craters fit together like a strange tiled floor. You wonder if Moho is trying to be an engineer.
        #JNSQscience_crewReport_MohoSrfLandedVoronoiCraters_01 = From the window it looks organized; up close it’s still chaos and rocks. Order, but crunchy.
        #JNSQscience_crewReport_MohoSrfLandedNotableCraters_00 = Mission Control is excited because this one has a name. The crew is excited because it has shade.
        #JNSQscience_crewReport_MohoSrfLandedNotableCraters_01 = You pose the flag where the view is most dramatic and pretend the heat doesn’t exist for a whole five seconds.
        #JNSQscience_crewReport_MohoSrfLandedPeaks_00 = The peaks rise like melted teeth frozen mid-bite. You decide climbing is optional science.
        #JNSQscience_crewReport_MohoSrfLandedPeaks_01 = Up here the sunlight is relentless and the shadows are knife-sharp. The crew agrees to admire the view from inside.

        #JNSQscience_crewReport_EveSrfLandedKrakensWell_00 = The ground drops away into a dark hole nearby. You make a note to keep the rover on a short leash.
        #JNSQscience_crewReport_EveSrfLandedKrakensWell_01 = Static crackles over the radio whenever you face the well. You pretend not to notice and keep writing.
        #JNSQscience_crewReport_EveSrfSplashedPolarLakes_00 = The lake is calmer than the open seas, but the capsule still feels like it is being gently shaken.
        #JNSQscience_crewReport_EveSrfSplashedPolarLakes_01 = You keep expecting ice near the poles. The thermometer keeps proving you wrong.
        #JNSQscience_crewReport_EveSrfSplashedPetrolLakes_00 = Someone suggests bottling a sample. The suggestion dies after the first whiff.
        #JNSQscience_crewReport_EveSrfSplashedSeaofAkron_00 = The Sea of Akron slaps the hull with a lazy wave. You fall over anyway.
        #JNSQscience_crewReport_EveSrfSplashedSeaofAkron_01 = Even with filters running, the cabin has that sharp solvent smell again.
        #JNSQscience_crewReport_EveSrfSplashedSeaofNessus_00 = The Sea of Nessus surrounds the capsule in endless purple. The return plan suddenly feels theoretical.
        #JNSQscience_crewReport_EveSrfSplashedSeaofNessus_01 = A quick taste test is proposed and immediately rejected by everyone who likes breathing.
        #JNSQscience_crewReport_EveSrfSplashedSeaofTaniwha_00 = The Sea of Taniwha looks smooth, but the surface seems to grab at the hull.
        #JNSQscience_crewReport_EveSrfSplashedSeaofTaniwha_01 = You watch bubbles rise and pop, and decide to keep the hatch sealed forever.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGigan_00 = The Sea of Gigan rolls slow, heavy swells under the crushing air.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGigan_01 = Every splash sounds wrong, like the ocean is made of something thicker than water.
        #JNSQscience_crewReport_EveSrfSplashedSeaofRodan_00 = A small wave hits. In Eve gravity that counts as an exercise program.
        #JNSQscience_crewReport_EveSrfSplashedSeaofRodan_01 = The view is pretty in a “please don’t dissolve us” sort of way.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGojira_00 = The Sea of Gojira is quiet enough that you can hear the hull creak.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGojira_01 = The purple liquid beads on the window like it does not want to let go.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGhidorah_00 = You spot multiple currents meeting and decide the sea has too many opinions.
        #JNSQscience_crewReport_EveSrfSplashedSeaofGhidorah_01 = Something taps the capsule. It is probably just debris. Probably.
        #JNSQscience_crewReport_EveSrfSplashedSeaofBagorah_00 = The Sea of Bagorah smells faintly like paint thinner and bad decisions.
        #JNSQscience_crewReport_EveSrfSplashedSeaofBagorah_01 = You try to stand, fail, and log the experiment as “high-gravity yoga”.
        #JNSQscience_crewReport_EveFlyingLowPolarLakes_00 = From low altitude the lake looks like a bruise in the landscape, perfectly still in the thick air.
        #JNSQscience_crewReport_EveFlyingLowPolarLakes_01 = You wonder why it is not called a sea, then remember seas do not usually sit inside crater walls.
        #JNSQscience_crewReport_EveFlyingLowPetrolLakes_00 = Ripples spread in slow motion across the lake, as if the air is syrup.
        #JNSQscience_crewReport_EveFlyingLowPetrolLakes_01 = You try not to imagine ditching in that stuff. The safety briefing suddenly seems too short.
        #JNSQscience_crewReport_EveFlyingLowSeaofAkron_00 = The purple sea shimmers beneath the haze. You keep one hand on the abort switch.
        #JNSQscience_crewReport_EveFlyingLowSeaofAkron_01 = The window is warm to the touch, and you are not sure if that is the air or your nerves.
        #JNSQscience_crewReport_EveFlyingLowSeaofNessus_00 = A patch of ripples crawls across the surface, slow as molasses.
        #JNSQscience_crewReport_EveFlyingLowSeaofNessus_01 = You try not to imagine an engine-out landing here. Your imagination ignores you.
        #JNSQscience_crewReport_EveFlyingLowSeaofTaniwha_00 = The thick air mutes the waves into gentle wrinkles.
        #JNSQscience_crewReport_EveFlyingLowSeaofTaniwha_01 = Something dark shifts under the surface. Mission Control says it is likely nothing.
        #JNSQscience_crewReport_EveFlyingLowSeaofGigan_00 = The sea reflects purple light into the cabin, tinting everyone’s faces.
        #JNSQscience_crewReport_EveFlyingLowSeaofGigan_01 = Your altitude feels wrong in this atmosphere, like Eve is moving the gauges on purpose.
        #JNSQscience_crewReport_EveFlyingLowSeaofRodan_00 = The atmosphere is so dense the sea looks padded, like it cannot decide to splash.
        #JNSQscience_crewReport_EveFlyingLowSeaofRodan_01 = You start to design a flotation device made entirely of optimism.
        #JNSQscience_crewReport_EveFlyingLowSeaofGojira_00 = The surface glints like polished metal, and that thought makes you uneasy.
        #JNSQscience_crewReport_EveFlyingLowSeaofGojira_01 = You check the hull temperature again. Still too warm. Still fine. Probably.
        #JNSQscience_crewReport_EveFlyingLowSeaofGhidorah_00 = Multiple streaks of ripples cross each other, like the sea has traffic lanes.
        #JNSQscience_crewReport_EveFlyingLowSeaofGhidorah_01 = You keep scanning for a landing site and keep finding more sea.
        #JNSQscience_crewReport_EveFlyingLowSeaofBagorah_00 = The haze turns the horizon into a purple smear. You fly by instruments and superstition.
        #JNSQscience_crewReport_EveFlyingLowSeaofBagorah_01 = The sea below looks eager. You decide not to test that theory.
        #JNSQscience_crewReport_EveFlyingLowKrakensWell_00 = The well looks like a bite taken out of the planet, swallowing haze and confidence.
        #JNSQscience_crewReport_EveFlyingLowKrakensWell_01 = Instruments twitch as you pass over the opening. Someone says “Kraken” and everyone gets very professional.

        #JNSQscience_crewReport_KerbinSrfLandedLowlands_00 = From the window the lowlands look soft and welcoming. Mission Control reminds you the landing legs disagree.
        #JNSQscience_crewReport_KerbinSrfLandedLowlands_01 = Someone suggests a picnic. Someone else points at the suit gloves and laughs.
        #JNSQscience_crewReport_KerbinSrfLandedAridLowlands_00 = You imagine how hot it would be if the capsule did not have the A/C on.
        #JNSQscience_crewReport_KerbinSrfLandedAridLowlands_01 = The crew stares at the arid lowlands and collectively decides to be thirsty.
        #JNSQscience_crewReport_KerbinSrfLandedAridMountains_00 = The arid mountains look sharp enough to pop the capsule. You tighten every strap you can reach.
        #JNSQscience_crewReport_KerbinSrfLandedAridMountains_01 = The crew debates whether rocks can be offended. The rocks outside remain silent and judgmental.
        #JNSQscience_crewReport_KerbinSrfLandedWelcomeBackIsland_00 = You spot WelcomeBackIsland on the horizon and immediately feel like someone is watching your landing technique.
        #JNSQscience_crewReport_KerbinSrfLandedWelcomeBackIsland_01 = The crew writes WELCOME BACK on the fogged window, then remembers they are still on Kerbin.
        #JNSQscience_crewReport_KerbinSrfSplashedGreatLake_00 = Splashdown in GreatLake. You declare yourself Captain of the Great Lake Navy.
        #JNSQscience_crewReport_KerbinSrfSplashedGreatLake_01 = You hope the hatch does not break and flood the pod. GreatLake looks very eager.
        #JNSQscience_crewReport_KerbinSrfSplashedInlandWater_00 = The capsule bobs in InlandWater like a very expensive bath toy.
        #JNSQscience_crewReport_KerbinSrfSplashedInlandWater_01 = Someone admits they cannot swim. Everyone agrees that is information that should have arrived earlier.
        #JNSQscience_crewReport_KerbinSrfSplashedKreenwichSea_00 = Arr mateys! Splashdown in the Kreenwich Sea. Mission Control requests you stop talking like that.
        #JNSQscience_crewReport_KerbinSrfSplashedKreenwichSea_01 = You look out at the Kreenwich Sea and wonder how many snacks you could fish out with a sample bag.
        #JNSQscience_crewReport_KerbinSrfSplashedArcticSea_00 = The Arctic Sea is cold enough that everyone agrees to keep the hatch closed.
        #JNSQscience_crewReport_KerbinSrfSplashedArcticSea_01 = You poke the window and decide the water looks like it might poke back.
        #JNSQscience_crewReport_KerbinSrfSplashedForemansSea_00 = Splashdown in ForemansSea. You volunteer someone else to go check for leaks.
        #JNSQscience_crewReport_KerbinSrfSplashedForemansSea_01 = You count waves until you remember you should be counting checklists.
        #JNSQscience_crewReport_KerbinSrfSplashedTriangulusSea_00 = You try to draw a triangle on the splash marks. The TriangulusSea refuses to hold still.
        #JNSQscience_crewReport_KerbinSrfSplashedTriangulusSea_01 = A small creature bumps the capsule. You decide it is named Squishy and is friendly.
        #JNSQscience_crewReport_KerbinSrfSplashedNorthernSea_00 = The NorthernSea rocks the capsule gently. Gently becomes less gently.
        #JNSQscience_crewReport_KerbinSrfSplashedNorthernSea_01 = You do not need to worry about pirates here. Probably.
        #JNSQscience_crewReport_KerbinSrfSplashedSub-ArcticSea_00 = In the Sub-Arctic Sea, you consider inventing a heated life raft. For science.
        #JNSQscience_crewReport_KerbinSrfSplashedSub-ArcticSea_01 = The crew practices emergency swimming motions. Everyone is still strapped in.
        #JNSQscience_crewReport_KerbinSrfSplashedEasternSea_00 = EasternSea looks peaceful from inside the capsule. The capsule is also very sealed.
        #JNSQscience_crewReport_KerbinSrfSplashedEasternSea_01 = You listen to the water slap the hull and pretend it is applause.
        #JNSQscience_crewReport_KerbinSrfSplashedWesternSea_00 = Splashdown in WesternSea. You announce a new longitude-based snack schedule.
        #JNSQscience_crewReport_KerbinSrfSplashedWesternSea_01 = You wonder if the capsule counts as a boat. The capsule does not answer.
        #JNSQscience_crewReport_KerbinFlyingLowLowlands_00 = The lowlands stretch out like a landing strip that never ends. Tempting.
        #JNSQscience_crewReport_KerbinFlyingLowLowlands_01 = Something keeps tapping the window. You decide it is just wind and definitely not a bird.
        #JNSQscience_crewReport_KerbinFlyingLowAridLowlands_00 = The heat rising from the arid lowlands makes the ground shimmer like a bad hologram.
        #JNSQscience_crewReport_KerbinFlyingLowAridLowlands_01 = In anticipation of the heat, you turn on the air conditioning and pretend that helps.
        #JNSQscience_crewReport_KerbinFlyingLowAridMountains_00 = You have a bad feeling about the jagged arid mountains below.
        #JNSQscience_crewReport_KerbinFlyingLowAridMountains_01 = Crashing here would not be good. You stop thinking about it. Mostly.
        #JNSQscience_crewReport_KerbinFlyingLowGreatLake_00 = You are flying so low over GreatLake you notice ripples from your craft.
        #JNSQscience_crewReport_KerbinFlyingLowGreatLake_01 = The water looks peaceful from here. You wonder if it is safe to drink, and then remember you are in a capsule.
        #JNSQscience_crewReport_KerbinFlyingLowInlandWater_00 = From this perspective you can see the underwater topology in InlandWater.
        #JNSQscience_crewReport_KerbinFlyingLowInlandWater_01 = You see a spray of water whipped up by the air rushing out of your way.
        #JNSQscience_crewReport_KerbinFlyingLowKreenwichSea_00 = The Kreenwich Sea glitters under you. Someone tries to set a course by it. That is not how that works.
        #JNSQscience_crewReport_KerbinFlyingLowKreenwichSea_01 = You imagine all the wonderful creatures that live below the waves, and immediately stop imagining.
        #JNSQscience_crewReport_KerbinFlyingLowArcticSea_00 = Over Arctic Sea, the water looks like it is thinking about freezing just to spite you.
        #JNSQscience_crewReport_KerbinFlyingLowArcticSea_01 = You are flying low enough to see disturbances in the water from your craft, and fog on the window from your breath.
        #JNSQscience_crewReport_KerbinFlyingLowForemansSea_00 = ForemansSea rolls beneath you like a moving map. The map wins.
        #JNSQscience_crewReport_KerbinFlyingLowForemansSea_01 = You see a spray of water from your slipstream and decide you have invented ocean weather.
        #JNSQscience_crewReport_KerbinFlyingLowTriangulusSea_00 = Over TriangulusSea, you try to spot three points that line up. You get distracted by not crashing.
        #JNSQscience_crewReport_KerbinFlyingLowTriangulusSea_01 = The water below looks calm. You know better than to trust it.
        #JNSQscience_crewReport_KerbinFlyingLowNorthernSea_00 = The NorthernSea looks cold and very, very wet.
        #JNSQscience_crewReport_KerbinFlyingLowNorthernSea_01 = From here the waves look tiny. You remind yourself that the capsule is also tiny.
        #JNSQscience_crewReport_KerbinFlyingLowSub-ArcticSea_00 = You fly low over the Sub-Arctic Sea and feel the cabin temperature drop in sympathy.
        #JNSQscience_crewReport_KerbinFlyingLowSub-ArcticSea_01 = The water below is a nice shade of nope.
        #JNSQscience_crewReport_KerbinFlyingLowEasternSea_00 = EasternSea stretches to the horizon. You wonder how long it would take to skip the capsule like a stone.
        #JNSQscience_crewReport_KerbinFlyingLowEasternSea_01 = The crew discusses fishing. Mission Control reminds you this is a spacecraft.
        #JNSQscience_crewReport_KerbinFlyingLowWesternSea_00 = The WesternSea looks peaceful. The instruments disagree and call it an aerodynamic hazard.
        #JNSQscience_crewReport_KerbinFlyingLowWesternSea_01 = You watch the sun glitter on the water and almost forget you are supposed to be reporting anything.
        #JNSQscience_crewReport_KerbinFlyingLowWelcomeBackIsland_00 = Welcome Back Island comes into view and the crew starts waving at nobody in particular.
        #JNSQscience_crewReport_KerbinFlyingLowWelcomeBackIsland_01 = You fly low enough to read the name on the map and suddenly feel judged by geography.

        #JNSQscience_crewReport_MunSrfLandedPolarIceCraters_00 = You mark the situation as “potentially icy” in the report, mostly to see if that gets you approved for a snow-cone machine next time.
        #JNSQscience_crewReport_MunSrfLandedMountains_00 = You try to describe the jagged mountains in a calm, professional tone. It comes out as “pointy, pointy, very pointy.”
        #JNSQscience_crewReport_MunSrfLandedMountains_01 = Mission Control asks for a status update. You reply “Nominal.” Then you add, quietly, “Also: mountains. Lots of mountains.”

        #JNSQscience_crewReport_MinmusSrfLandedBrownBasins_00 = The basin floor is stained a darker color, like someone tried to “improve” Minmus with syrup. Mission Control insists it’s geology.
        #JNSQscience_crewReport_MinmusSrfLandedBrownBasins_01 = The darker patches make the landscape look less like dessert and more like trouble. You collect notes anyway, just in case it’s both.
        #JNSQscience_crewReport_MinmusSrfLandedBrownLowlands_00 = The lowlands here are dark and smooth, with dust that clings to everything. Even the checklist looks a little dirtier.
        #JNSQscience_crewReport_MinmusSrfLandedBrownLowlands_01 = The terrain has a muted, brownish tint that breaks the mint illusion. You feel oddly disappointed, then relieved.
        #JNSQscience_crewReport_MinmusSrfLandedBrownMidlands_00 = The midlands are darker and slightly rougher than expected. The horizon wiggles with ridges like frozen waves.
        #JNSQscience_crewReport_MinmusSrfLandedBrownMidlands_01 = Everything outside is “mostly flat” until you try to drive it. You note that Minmus is good at lying with confidence.
        #JNSQscience_crewReport_MinmusSrfLandedBrownHighlands_00 = The high ground is brown-tinted and crunchy-looking, like overbaked mint cookies. You do not volunteer to taste-test.
        #JNSQscience_crewReport_MinmusSrfLandedBrownHighlands_01 = From up here, the flats look like giant plates set out for a picnic. The darker soil makes the shadows look extra sharp.
        
        #JNSQscience_crewReport_DunaSrfLandedRareCraters_00 = A lonely crater sits on an otherwise plain stretch of ground, like a pothole on a perfectly paved road.
        #JNSQscience_crewReport_DunaSrfLandedRareCraters_01 = You peer over the rim through the porthole. The shadows look deeper than they have any right to be in this weak light.
        #JNSQscience_crewReport_DunaSrfLandedVoronoiCraters_00 = The ground is tiled with oddly even pits. It looks like someone tried to stamp the whole planet with a cookie cutter.
        #JNSQscience_crewReport_DunaSrfLandedVoronoiCraters_01 = You sketch the pattern in the logbook. It seems too organized to be random, which makes it extra unsettling.
        #JNSQscience_crewReport_DunaSrfLandedNotableCraters_00 = This crater has crisp edges and a messy ejecta blanket. Something hit here and didn't bother cleaning up.
        #JNSQscience_crewReport_DunaSrfLandedNotableCraters_01 = You can see layers in the wall from your seat. It's like the planet is showing off its cross-section on purpose.
        #JNSQscience_crewReport_DunaSrfLandedExoticCraters_00 = The crater floor gleams with pale ice, but the rim is coated in red grit. It's a dessert with the toppings in the wrong place.
        #JNSQscience_crewReport_DunaSrfLandedExoticCraters_01 = The radiator cycles more often here. You tell Mission Control it's "definitely science" and not "definitely cold".
        #JNSQscience_crewReport_DunaSrfLandedMountains_00 = The mountains loom close, and the thin air makes the view look too clear and too empty at the same time.
        #JNSQscience_crewReport_DunaSrfLandedMountains_01 = Loose rocks tap against the hull as a gust rolls down the slopes. You pretend that sound is comforting.
        #JNSQscience_crewReport_DunaSrfLandedVolcano_00 = Dark ground and fractured rock surround the craft. You half-expect the planet to burp.
        #JNSQscience_crewReport_DunaSrfLandedVolcano_01 = The surface looks baked, then dusted over again. You describe it as "freshly ruined" and feel oddly proud.
        #JNSQscience_crewReport_DunaFlyingLowRareCraters_00 = A single crater drifts under you, perfectly framed by red plains. You briefly consider dropping a snack for scale.
        #JNSQscience_crewReport_DunaFlyingLowRareCraters_01 = The rim throws a long shadow that makes the altimeter feel suddenly important.
        #JNSQscience_crewReport_DunaFlyingLowVoronoiCraters_00 = Below you is a honeycomb of pits and ridges. Your brain insists it's an artificial pattern and you tell it to stop.
        #JNSQscience_crewReport_DunaFlyingLowVoronoiCraters_01 = Turbulence bumps the capsule as you trace the repeating shapes. The planet refuses to hold still for your sketch.
        #JNSQscience_crewReport_DunaFlyingLowNotableCraters_00 = The crater's ejecta fans out like a splash frozen in time. You note it would be a great place to not land.
        #JNSQscience_crewReport_DunaFlyingLowNotableCraters_01 = Dust devils spiral along the rim, tossing red grit into the thin air as if showing off.
        #JNSQscience_crewReport_DunaFlyingLowExoticCraters_00 = The ice-filled crater below glows pale against the rust-colored ground. It's the brightest thing you've seen on this planet.
        #JNSQscience_crewReport_DunaFlyingLowExoticCraters_01 = A cold gust rattles the cabin as you pass the crater wall. You secure everything that can fly, including your lunch.
        #JNSQscience_crewReport_DunaFlyingLowMountains_00 = Sharp peaks pass uncomfortably close to your window. You make a note to request "more sky" for future flight plans.
        #JNSQscience_crewReport_DunaFlyingLowMountains_01 = Updrafts bounce the ship over the slopes. You record it as atmospheric data and not as mild panic.
        #JNSQscience_crewReport_DunaFlyingLowVolcano_00 = Heat-dark rock forms branching lines below, half-buried by dust. You wonder how recently "recent" is on Duna.
        #JNSQscience_crewReport_DunaFlyingLowVolcano_01 = The air here feels even thinner, as if it is avoiding the ground. You log a stable reading and an unstable stomach.

        #JNSQscience_crewReport_IkeSrfLandedLowlands_00 = The ground is flat, dusty, and looks like it has been punched by every rock in the system. You note that “flat” is still a relative term on Ike.
		#JNSQscience_crewReport_IkeSrfLandedLowlands_01 = The landing legs sink into powdery regolith with a worrying crunch. The crew reports that Ike is made of “mostly dust, plus more dust.”
		#JNSQscience_crewReport_IkeSrfLandedMidlands_00 = The terrain rolls gently, until it suddenly doesn’t. You recommend that future missions pack extra patience and fewer expectations.
		#JNSQscience_crewReport_IkeSrfLandedMidlands_01 = You try to describe the landscape as “featureless,” then notice three different kinds of boulders staring back at you. You amend the report to “aggressively rocky.”
		#JNSQscience_crewReport_IkeSrfLandedHighlands_00 = The high ground gives a wide view of craters, ridges, and a suspicious amount of empty. Everyone agrees it’s beautiful in a bleak sort of way.
		#JNSQscience_crewReport_IkeSrfLandedHighlands_01 = From up here, you can see Duna hanging in the sky like a warning label. The crew reports a sudden desire to double-check the ascent plan.
		#JNSQscience_crewReport_IkeInSpaceLow_00 = In low orbit, Ike’s surface looks like a dark, cratered bruise, and it keeps getting closer whenever you blink. You report that the moon is “uncomfortably detailed” at this altitude.
		#JNSQscience_crewReport_IkeInSpaceLow_01 = Duna looms nearby while Ike spins beneath you, quietly reminding everyone that there is no air to forgive mistakes. The crew reports that they are suddenly very fond of checklists.
		#JNSQscience_crewReport_IkeInSpaceHigh_00 = From high orbit, Ike is just a small charcoal dot escorting Duna around the sun. You note that it still manages to look unwelcoming from this far away.
		#JNSQscience_crewReport_IkeInSpaceHigh_01 = The moon is tiny, the system is vast, and the cabin is full of scribbled notes and snack wrappers. You file the report under “successful intimidation by space.”

        #JNSQscience_crewReport_EdnaSrfLandedLowlands_00 = The landing lights cut across Edna’s lowlands and come back empty-handed, as if the ground is trying not to be seen.
        #JNSQscience_crewReport_EdnaSrfLandedLowlands_01 = You file a report describing “flat” terrain, then add a note that even the flat parts look like they’re plotting something.
        #JNSQscience_crewReport_EdnaSrfLandedMidlands_00 = The cabin feels strangely quiet, like Edna is absorbing every sound you make and keeping it for later.
        #JNSQscience_crewReport_EdnaSrfLandedMidlands_01 = You watch dust settle in slow motion and briefly consider billing it as an “extended-duration geology experiment.”
        #JNSQscience_crewReport_EdnaSrfLandedHighlands_00 = The highlands loom in the window like jagged teeth; you double-check that the brakes are still a thing in low gravity.
        #JNSQscience_crewReport_EdnaSrfLandedHighlands_01 = Mission log: the terrain outside is sharp, dark, and entirely uninterested in being friendly.
        #JNSQscience_crewReport_EdnaSrfLandedPolarIceCraters_00 = You aim the thermometer at the nearest shadowed crater and immediately regret learning numbers that small.
        #JNSQscience_crewReport_EdnaSrfLandedPolarIceCraters_01 = The view is all frost and darkness; you write “cold, quiet, suspicious” and underline the last part.
        #JNSQscience_crewReport_EdnaSrfLandedWhites_00 = The bright patches outside glare back at you like someone spilled paint on a world that forgot what color is.
        #JNSQscience_crewReport_EdnaSrfLandedWhites_01 = You note the strange pale ground and wonder if Edna is trying a disguise, poorly.
        #JNSQscience_crewReport_EdnaInSpaceLow_00 = In low orbit, Edna looks like a dim bruise against the stars, and the instruments insist it’s still a whole planet.
        #JNSQscience_crewReport_EdnaInSpaceLow_01 = You catch the surface slipping in and out of shadow as if it’s practicing being an occultation.
        #JNSQscience_crewReport_EdnaInSpaceHigh_00 = From high orbit, Edna is a lonely speck with an impressive talent for blending into the void.
        #JNSQscience_crewReport_EdnaInSpaceHigh_01 = You record that Edna appears calm, dark, and very far from everyone’s problem list. Except yours.

        #JNSQscience_crewReport_DakSrfLandedLowlands_00 = You confirm that Dak’s “lowlands” are mostly just “where you stopped drifting.” The ground still feels optional.
        #JNSQscience_crewReport_DakSrfLandedLowlands_01 = The surface looks like a battered potato that forgot it was supposed to be a moon. You feel strangely invited to stay.
        #JNSQscience_crewReport_DakSrfLandedMidlands_00 = You try to walk a straight line. Dak gently disagrees and rotates your mission plan a few degrees.
        #JNSQscience_crewReport_DakSrfLandedMidlands_01 = The terrain rolls by in slow motion as you hop. You file a report under “gravity: politely absent.”
        #JNSQscience_crewReport_DakSrfLandedHighlands_00 = From up here, the horizon is all stars and rubble. Dak’s “siren’s call” might just be your radio echoing off the rocks.
        #JNSQscience_crewReport_DakSrfLandedHighlands_01 = The highlands are sharp, cold, and quiet. You keep checking the ground to make sure it’s still attached.
        #JNSQscience_crewReport_DakInSpaceLow_00 = Orbiting this tiny potato feels like escorting a runaway snack. You make small correction burns and promise to stop joking about it.
        #JNSQscience_crewReport_DakInSpaceLow_01 = Dak spins lazily beneath you, all crags and shadows. You can’t shake the feeling it’s watching the ship back.
        #JNSQscience_crewReport_DakInSpaceHigh_00 = From high above, Dak is a speck with an attitude. Your instruments call it “asteroid,” your imagination calls it “trap.”
        #JNSQscience_crewReport_DakInSpaceHigh_01 = The view is mostly emptiness, with Dak holding the center like it owns the void. You log: “approach with caution, and snacks.”

        #JNSQscience_crewReport_DresSrfLandedPoles_00 = The shadows here feel permanent. You briefly consider leaving a flashlight on just to prove a point.
        #JNSQscience_crewReport_DresSrfLandedPoles_01 = Frost creeps across the window seal and your snacks go suspiciously crunchy. Science says "cold." Your teeth agree.
        #JNSQscience_crewReport_DresSrfLandedMidlands_00 = Nothing is flat, nothing is steep, and everything looks like it was filed down by boredom. It's oddly peaceful.
        #JNSQscience_crewReport_DresSrfLandedMidlands_01 = You try to describe the scenery, but your report keeps turning into a list of grays. Mission Control requests "more adjectives."
        #JNSQscience_crewReport_DresSrfLandedLowlands_00 = The ground looks like it has been gently tamped into place by a very patient universe. It still crunches when you step on it.
        #JNSQscience_crewReport_DresSrfLandedLowlands_01 = Dust drifts in lazy puffs around the landing gear. You swear it takes longer to settle than it takes to regret landing here.
        
        #JNSQscience_crewReport_JoolFlyingLowEquatorialBands_00 = The ship keeps getting shoved sideways as we cross invisible jet lanes. The bands aren’t just colors; they’re moving walls of air.
        #JNSQscience_crewReport_JoolFlyingLowEquatorialBands_01 = Every time we dip into a darker stripe, turbulence spikes and the pressure creeps up. The atmosphere feels layered like a very angry cake.
        #JNSQscience_crewReport_JoolFlyingLowSubpolarBands_00 = The air feels heavier and colder here, and the motion is all broad, slow rolls instead of sharp jolts. Like the planet is stirring a pot with a continent-sized spoon.
        #JNSQscience_crewReport_JoolFlyingLowSubpolarBands_01 = We’re skimming under the high haze and the clouds are stretched into long arcs. Something up there is steering everything down here.
        #JNSQscience_crewReport_JoolFlyingLowNorthPole_00 = The horizon is just spiral upon spiral. The whole sky looks like it’s trying to drain into a single point.
        #JNSQscience_crewReport_JoolFlyingLowNorthPole_01 = The motion here is strangely consistent: steady spin, steady shear, until it suddenly isn’t. We recommend not testing where “until” ends.
        #JNSQscience_crewReport_JoolFlyingLowSouthPole_00 = This pole has a different attitude: tight swirls, abrupt gusts, and a persistent pull toward the center of the storm pattern.
        #JNSQscience_crewReport_JoolFlyingLowSouthPole_01 = Visibility comes and goes in sheets of cloud. It feels like flying through rotating curtains that don’t want to open.
        #JNSQscience_crewReport_JoolFlyingLowStormComplex_00 = Updrafts punch the craft like a fist and then try to carry us away. We have entered the “why” portion of the flight plan.
        #JNSQscience_crewReport_JoolFlyingLowStormComplex_01 = Lightning flashes inside the cloud towers and the turbulence is rhythmic, like the storm is breathing. We would prefer it stop.
        #JNSQscience_crewReport_JoolFlyingLowExposedLowerDeck_00 = The upper haze thins out here and you can see down into darker layers. The air gets denser fast, like we slipped between decks.
        #JNSQscience_crewReport_JoolFlyingLowExposedLowerDeck_01 = The clouds are broken into gaps that reveal deeper circulation beneath. It’s unsettling to realize the “ground” is just more atmosphere waiting.

        #JNSQscience_crewReport_LaytheSrfLandedShallows_00 = The waterline is uncomfortably close to the hatch. Everyone agrees to stop rocking the capsule “just to see what happens.”
        #JNSQscience_crewReport_LaytheSrfLandedShallows_01 = The seabed is visible through the clear water. You take notes and quietly hope it stays that way.
        #JNSQscience_crewReport_LaytheSrfLandedHighlands_00 = From up here the seas look almost inviting, right up until you remember what they are orbiting. You log the view and double-check the brakes.
        #JNSQscience_crewReport_LaytheSrfLandedHighlands_01 = The terrain drops away in long slopes and sharp ridges. The crew votes to keep all doors closed until further notice.
        #JNSQscience_crewReport_LaytheSrfLandedMountains_00 = The landing site is mostly rock, cliff, and regret. You record that the horizon is spectacular and the margin for error is not.
        #JNSQscience_crewReport_LaytheSrfLandedMountains_01 = The mountains throw long shadows and the air feels thin through the cabin vents. Someone suggests planting a flag; someone else suggests not falling first.
        #JNSQscience_crewReport_LaytheSrfLandedIceCaps_00 = The world outside is bright enough to make you squint through the glass. You note the ice and wonder why the nearby seas are still liquid.
        #JNSQscience_crewReport_LaytheSrfLandedIceCaps_01 = Everything looks clean, cold, and very permanent. The crew starts planning a base and immediately runs out of snack storage.
        #JNSQscience_crewReport_LaytheSrfLandedEnclosedFaults_00 = The ground is a web of cracks and steep walls, like the surface tried to fold itself. You log possible tidal stress and keep the cabin lights on.
        #JNSQscience_crewReport_LaytheSrfLandedEnclosedFaults_01 = Shadows pool in the fissures and the landscape feels unfinished. The crew agrees that “interesting” is not the same as “safe.”
        #JNSQscience_crewReport_LaytheSrfLandedLowlands_00 = The land is broad and flat, with damp haze clinging close to the ground. You report that it is an excellent place to land and a terrible place to get stuck.
        #JNSQscience_crewReport_LaytheSrfLandedLowlands_01 = Everything outside looks soft enough to swallow landing legs. You make a note to avoid testing that hypothesis.
        #JNSQscience_crewReport_LaytheSrfLandedMidlands_00 = Rolling terrain stretches out in every direction, neither high nor low enough to be confident about. The crew debates whether this counts as “easy mode.”
        #JNSQscience_crewReport_LaytheSrfLandedMidlands_01 = A patchwork of land and water hints at changing weather nearby. You record the conditions and keep an eye on the clouds.
        #JNSQscience_crewReport_LaytheSrfSplashedShores_00 = Land is right there, close enough to point at and far enough to be useless. You file a report titled “Please Send Boat.”
        #JNSQscience_crewReport_LaytheSrfSplashedShores_01 = Waves slap the hull with surprising enthusiasm. The crew begins timing the bobbing and pretending it is science.
        #JNSQscience_crewReport_LaytheSrfSplashedShallows_00 = The water is shallow enough that the craft occasionally bumps something solid. You log the depth as “too shallow for comfort.”
        #JNSQscience_crewReport_LaytheSrfSplashedShallows_01 = You can see the bottom and it looks alarmingly scratchy. Everyone suddenly cares about hull paint quality.
        #JNSQscience_crewReport_LaytheSrfSplashedInlandWater_00 = The water is calmer here, boxed in by surrounding land. You record the stillness and the unfamiliar smell seeping through the air system.
        #JNSQscience_crewReport_LaytheSrfSplashedInlandWater_01 = Ripples spread out in neat circles from the capsule. The crew watches them far longer than is necessary.
        #JNSQscience_crewReport_LaytheSrfSplashedKrenwichSea_00 = The surface is restless and darker than you expected, with distant whitecaps forming in lines. You report that “swimming” would be a short career.
        #JNSQscience_crewReport_LaytheSrfSplashedKrenwichSea_01 = The cabin humidity spikes as spray coats the windows. You log the conditions and add “extra towels” to the next mission plan.
        #JNSQscience_crewReport_LaytheSrfSplashedArcticSea_00 = The water is painfully cold, and the air above it feels sharper than the rest of the moon. You record thermal warnings and keep all heaters on.
        #JNSQscience_crewReport_LaytheSrfSplashedArcticSea_01 = Thin slush drifts past the capsule like it owns the place. The crew agrees not to test if it is edible.
        #JNSQscience_crewReport_LaytheSrfSplashedJoolwardSea_00 = The green giant dominates the sky and the water reflects its color in unsettling ways. You report that the view is beautiful and mildly threatening.
        #JNSQscience_crewReport_LaytheSrfSplashedJoolwardSea_01 = The waves roll under a sky that never lets you forget where you are. You log a strong urge to point the antenna away from “that direction.”
        #JNSQscience_crewReport_LaytheSrfSplashedPolwardSea_00 = Wind-driven chop rattles the capsule, and the air tastes colder through the filters. You record that the polar seas are not in a welcoming mood.
        #JNSQscience_crewReport_LaytheSrfSplashedPolwardSea_01 = The horizon is a mix of water and pale terrain, blurred by mist. The crew files a unanimous complaint against “wet cold.”
        #JNSQscience_crewReport_LaytheSrfSplashedEnclosedFaults_00 = You appear to have splashed down inside a fractured basin, with steep walls on all sides. You report that rescue options are “creative at best.”
        #JNSQscience_crewReport_LaytheSrfSplashedEnclosedFaults_01 = The water laps against jagged rock like it is trying to widen the cracks. You log the scene and decide to stay buttoned up.
        #JNSQscience_crewReport_LaytheFlyingLowShallows_00 = Sunlight flashes off the water in bright sheets, and you can almost pick out the bottom. You report excellent visibility and poor landing ideas.
        #JNSQscience_crewReport_LaytheFlyingLowShallows_01 = The air is damp and smooth, with occasional bumps from rising warm pockets over the shallows. You record mild turbulence and stronger temptation.
        #JNSQscience_crewReport_LaytheFlyingLowInlandWater_00 = The lake below sits like a mirror between darker landforms. You note calmer air and a sudden, suspicious feeling of familiarity.
        #JNSQscience_crewReport_LaytheFlyingLowInlandWater_01 = Moist air fogs the lower windows for a moment. You log condensation rates and wipe the glass anyway.
        #JNSQscience_crewReport_LaytheFlyingLowKrenwichSea_00 = Long rows of waves run beneath you like someone drew them with a ruler. You report steady winds and a very wet-looking future.
        #JNSQscience_crewReport_LaytheFlyingLowKrenwichSea_01 = Sea spray hangs in the air near the surface, turning the horizon hazy. The crew closes vents and calls it “data collection.”
        #JNSQscience_crewReport_LaytheFlyingLowArcticSea_00 = Low clouds and icy haze blur the boundary between sea and sky. You report reduced visibility and increased appreciation for instruments.
        #JNSQscience_crewReport_LaytheFlyingLowArcticSea_01 = The air feels colder and heavier, and the engines sound slightly less cheerful. You log performance notes and keep altitude.
        #JNSQscience_crewReport_LaytheFlyingLowJoolwardSea_00 = The sky has a faint green cast and Jool looms like an audience. You record the view and attempt to ignore it staring back.
        #JNSQscience_crewReport_LaytheFlyingLowJoolwardSea_01 = The atmosphere shimmers in layers over the open water. You log wind shear and keep both hands very close to the controls.
        #JNSQscience_crewReport_LaytheFlyingLowPolwardSea_00 = The sea below is dark and choppy, and the air is full of biting gusts. You report “do not open any hatches, ever.”
        #JNSQscience_crewReport_LaytheFlyingLowPolwardSea_01 = Cold updrafts shove the craft around with rude confidence. You record turbulence and add more straps to the checklist.
        #JNSQscience_crewReport_LaytheFlyingLowHighlands_00 = Updrafts off the high terrain lift the craft unexpectedly. You report that Laythe’s air is fun right up until it tries to throw you.
        #JNSQscience_crewReport_LaytheFlyingLowHighlands_01 = The ground climbs toward you in slow, dramatic fashion. You log the topography and promise to respect it.
        #JNSQscience_crewReport_LaytheFlyingLowMountains_00 = Ridge lift turns into sudden downdrafts with no warning. You report that the mountains are actively participating in the flight.
        #JNSQscience_crewReport_LaytheFlyingLowMountains_01 = Peaks and valleys rush by beneath the nose. The crew agrees that sightseeing should wait until after survival.
        #JNSQscience_crewReport_LaytheFlyingLowIceCaps_00 = The ice below is so bright it makes the cockpit feel overlit. You report glare conditions and a strong desire for tinted windows.
        #JNSQscience_crewReport_LaytheFlyingLowEnclosedFaults_00 = The surface is a cracked mosaic, with shadowed trenches cutting across the landscape. You report that navigation is easy and landing is not.
        #JNSQscience_crewReport_LaytheFlyingLowEnclosedFaults_01 = Wisps of mist cling to the fissures like they are breathing. You record the observation and avoid speculating over the radio.
        #JNSQscience_crewReport_LaytheFlyingLowLowlands_00 = Haze hugs the ground and blurs the terrain into soft shapes. You report that the lowlands are excellent at hiding things, including altitude.
        #JNSQscience_crewReport_LaytheFlyingLowLowlands_01 = The air is humid enough to fog instruments if you stare at them too hard. You log cabin conditions and run extra checks.
        #JNSQscience_crewReport_LaytheFlyingLowMidlands_00 = Patchy clouds drift past while the terrain alternates between gentle rises and shallow basins. You report steady flight with occasional surprises.
        #JNSQscience_crewReport_LaytheFlyingLowMidlands_01 = The crew takes turns at the window, trying to spot a “perfect landing spot” from the air. You record zero successful arguments.

        #JNSQscience_crewReport_VallSrfLandedPoles_00 = Out the window is nothing but blue ice and hard shadow; you suddenly miss the sound of wind.
		#JNSQscience_crewReport_VallSrfLandedPoles_01 = Jool hangs low on the horizon like a green warning sign while the ground quietly creaks beneath the lander.
		#JNSQscience_crewReport_VallSrfLandedMountains_00 = The mountains here are sharp enough to file a landing leg, and you start questioning every “perfectly safe” assurance.
		#JNSQscience_crewReport_VallSrfLandedMountains_01 = Low gravity makes the cliffs look inviting right up until you remember that falling still works the same way.

        #JNSQscience_crewReport_TyloSrfLandedPoles_00 = The cabin heater clicks on as you peer out at the pale polar ground. The air outside looks thin, cold, and completely uninterested in being breathable.
        #JNSQscience_crewReport_TyloSrfLandedMountains_00 = The mountains look sharp enough to puncture the sky. Everyone stays strapped in, just in case the slope decides to keep going.
        #JNSQscience_crewReport_TyloSrfLandedMidlands_00 = Craters fade into craters all the way to the horizon. You make a note that the landscape is very committed to its theme.
        #JNSQscience_crewReport_TyloFlyingLowPoles_00 = Skimming over the bright caps, the pressure gauge barely twitches. The craft still rattles like it’s flying through something.
        #JNSQscience_crewReport_TyloFlyingLowMountains_00 = The terrain rises fast and the alarms rise faster. You briefly wonder if the mountains are trying to reclaim their airspace.
        #JNSQscience_crewReport_TyloFlyingLowHighlands_00 = Rough ground below, rough ride inside. You can practically feel the wind arguing with the wings.
        #JNSQscience_crewReport_TyloFlyingLowMidlands_00 = The midlands slide by in dusty streaks under a faint haze. It’s almost peaceful, until the next bump reminds you it’s not.
        #JNSQscience_crewReport_TyloFlyingLowLowlands_00 = Wide basins and long shadows make the lowlands look deceptively gentle. The instruments disagree and keep shouting numbers at you.
        #JNSQscience_crewReport_TyloFlyingHigh_00 = From up here Tylo looks like a pale marble with a faint rim of air. Jool hangs nearby like a giant green reminder of who owns this neighborhood.

        #JNSQscience_crewReport_PolSrfLandedMidlands_00 = The view out the porthole is a patchwork of yellowish flats and lumpy rises. You write “midlands” and add a note: “Everything looks dusty enough to squeak.”
		#JNSQscience_crewReport_PolSrfLandedMidlands_01 = The ship settles with a soft creak. Outside, the ground looks like someone tried to sculpt a landscape out of crumbs and then changed their mind halfway through.
		#JNSQscience_crewReport_PolSrfLandedMountains_00 = The landing legs cling to a slope that seems personally offended by the concept of “level.” You log the terrain as “mountainous” and your heartbeat as “also mountainous.”
		#JNSQscience_crewReport_PolSrfLandedMountains_01 = Jagged ridges frame the horizon like torn paper silhouettes. You report that the local scenery is dramatic, hostile, and very proud of its pointy bits.

        #JNSQscience_crewReport_LindorFlyingHigh_00 = The crew squints at the banding below and agrees it looks like the planet is trying to hide in plain sight.
		#JNSQscience_crewReport_LindorFlyingHigh_01 = Everything is cold, bright, and strangely calm. You keep checking the altitude readout like it’s a prank.
		#JNSQscience_crewReport_LindorInSpaceLow_00 = From orbit, Lindor’s patterns look neatly painted. The crew suspects that means something is about to get un-neat.
		#JNSQscience_crewReport_LindorInSpaceLow_01 = The ship drifts through faint crackles of interference. Someone suggests the planet is “thinking loudly.”
		#JNSQscience_crewReport_LindorInSpaceHigh_00 = Lindor shrinks to a pale disk with a complicated attitude. The crew reports feeling very small and slightly judged.
		#JNSQscience_crewReport_LindorInSpaceHigh_01 = Far above, the instruments go quiet. The crew takes advantage of this rare peace to argue about snacks.
		#JNSQscience_crewReport_LindorFlyingLowTemperateBands_00 = The view turns into layered haze and shifting stripes. The crew calls it “the world’s largest camouflage.”
		#JNSQscience_crewReport_LindorFlyingLowTemperateBands_01 = The cabin trembles softly as winds trade places. Someone starts a pool on whether the planet contains water or chocolate.
		#JNSQscience_crewReport_LindorFlyingLowSubpolarBands_00 = The air outside looks thicker and meaner than the temperate bands. The crew votes to stop descending “for science.”
		#JNSQscience_crewReport_LindorFlyingLowSubpolarBands_01 = Fine crystals ping the hull like tiny complaints. The crew files an official request for a warmer planet.
		#JNSQscience_crewReport_LindorFlyingLowNorthPole_00 = The horizon twists under ghostly light and static. The crew agrees the pole feels “electrically offended.”
		#JNSQscience_crewReport_LindorFlyingLowNorthPole_01 = The ship shudders through dense, cold haze. The crew report includes the phrase “never again” twice.
		#JNSQscience_crewReport_LindorFlyingLowSouthPole_00 = Visibility drops into a murky gradient. The crew watches the gauges like they’re telling a scary story.
		#JNSQscience_crewReport_LindorFlyingLowSouthPole_01 = Strange flickers dance across the windows. Someone asks if the planet is trying to say hello or “leave.”
		#JNSQscience_crewReport_LindorFlyingLowStormComplex_00 = The storm complex fills the windows with rolling layers and sudden jolts. The crew report is mostly sound effects.
		#JNSQscience_crewReport_LindorFlyingLowStormComplex_01 = Turbulence turns the cabin into a coin jar. The crew notes that “extreme pressure” is not just a number.
		#JNSQscience_crewReport_LindorFlyingLowUpperStormDeck_00 = You skim above roiling cloud tops that look soft until they punch the ship. The crew changes their mind about “soft.”
		#JNSQscience_crewReport_LindorFlyingLowUpperStormDeck_01 = The atmosphere boils in slow motion around you. The crew suggests naming the phenomenon “Nope.”
		#JNSQscience_crewReport_LindorFlyingLowExposedLowerDeck_00 = The exposed lower deck looks darker and heavier, like the planet forgot to lighten up. The crew strongly recommends not meeting it in person.
		#JNSQscience_crewReport_LindorFlyingLowExposedLowerDeck_01 = The ship creaks as if reconsidering its career choices. The crew agrees the lower layers are “where plans go to die.”

        #JNSQscience_crewReport_KrelSrfLandedLowlands_00 = The ground looks like someone ironed the moon flat. The ship feels overdressed.
		#JNSQscience_crewReport_KrelSrfLandedLowlands_01 = Your boots sink into pale powder that sparkles in the weak light. You pretend its stardust.
		#JNSQscience_crewReport_KrelSrfLandedMidlands_00 = Ridges and grooves slice the horizon into tidy segments. The terrain looks assembled in a hurry.
		#JNSQscience_crewReport_KrelSrfLandedMidlands_01 = Layered bands run past the window like pages in a book. You try to read them upside down.
		#JNSQscience_crewReport_KrelSrfLandedHighlands_00 = A cliff face rises like a frozen wave. You note that Krel’s idea of a “gentle slope” is a prank.
		#JNSQscience_crewReport_KrelSrfLandedHighlands_01 = Crater rims are sharp enough to cast dramatic shadows. You feel judged by geology.
		#JNSQscience_crewReport_KrelSrfLandedPoles_00 = The sun skims the horizon and refuses to help. Instruments glow; your mood does not.
		#JNSQscience_crewReport_KrelSrfLandedPoles_01 = Frosty dust clings to the hatch seal. You add “bring better brush” to the official report.
		#JNSQscience_crewReport_KrelInSpaceLow_00 = Up close, Krel is a pale patchwork of scars and terraces. It looks too complicated for its size.
		#JNSQscience_crewReport_KrelInSpaceLow_01 = Lindor fills half the window and Krel fills the other half. Your notes devolve into circles.
		#JNSQscience_crewReport_KrelInSpaceHigh_00 = Krel shrinks to a bright chip near its giant parent. You double-check you didn’t lose it.
		#JNSQscience_crewReport_KrelInSpaceHigh_01 = From here the moon looks calm and smooth, which is clearly a lie. You file it under “mysterious.”

        #JNSQscience_crewReport_AdenSrfLandedLowlands_00 = The ground outside is a flat, brown sheet of quiet. Your footprints look oddly confident for something made in low gravity.
        #JNSQscience_crewReport_AdenSrfLandedLowlands_01 = The lowlands don’t do much, which somehow makes them feel like they’re doing it on purpose.
        #JNSQscience_crewReport_AdenSrfLandedMidlands_00 = The terrain rolls gently past the window like it’s trying to be interesting without overcommitting.
        #JNSQscience_crewReport_AdenSrfLandedMidlands_01 = You record several minutes of “hills” and “more hills” before realizing that’s basically the whole report.
        #JNSQscience_crewReport_AdenSrfLandedHighlands_00 = The view sharpens into ridges and broken ground. The cabin heater suddenly feels like mission-critical equipment.
        #JNSQscience_crewReport_AdenSrfLandedHighlands_01 = You note the higher terrain, then immediately note how much you’d prefer to observe it from inside.
        #JNSQscience_crewReport_AdenSrfLandedMountains_00 = The mountains look like they were assembled from spare rocks and bad decisions. You double-check that the brakes are still a thing.
        #JNSQscience_crewReport_AdenSrfLandedMountains_01 = The slopes outside suggest that “parking” is more of a theory than a procedure up here.
        #JNSQscience_crewReport_AdenSrfLandedPoles_00 = The polar ground has a faint, dusty sheen that makes you wonder what’s hiding in the cold shadowed pockets.
        #JNSQscience_crewReport_AdenSrfLandedPoles_01 = Everything is long shadows and pale glints. You try not to think about how far away “warm” is.
        #JNSQscience_crewReport_AdenInSpaceLow_00 = Aden rushes by beneath you in brown ridges and shallow basins. It’s small enough to feel manageable, which is when it gets suspicious.
        #JNSQscience_crewReport_AdenInSpaceLow_01 = Low orbit makes every bump look important. Mission Control agrees, loudly, whenever you drift off the planned track.
        #JNSQscience_crewReport_AdenInSpaceHigh_00 = From up here, Aden is a tidy little marble and Lindor steals the whole sky. You log this as “unfair but impressive.”
        #JNSQscience_crewReport_AdenInSpaceHigh_01 = High over Aden, the moon looks calm and simple. The navigation computer disagrees with both of those words.

        #JNSQscience_crewReport_HuygenSrfLandedLowlands_00 = The view is a muted orange smear. You log that Huygen is doing its best to hide the ground from you.
        #JNSQscience_crewReport_HuygenSrfLandedLowlands_01 = The air outside looks thick enough to chew. You decide to keep the hatch very, very sealed.
        #JNSQscience_crewReport_HuygenSrfLandedMidlands_00 = Low hills roll away into haze until they simply stop existing. Navigation by landmark is officially cancelled.
        #JNSQscience_crewReport_HuygenSrfLandedMidlands_01 = A slow patter taps the hull. Whatever is falling out of the sky, it is not in a hurry.
        #JNSQscience_crewReport_HuygenSrfLandedHighlands_00 = From up here the fog forms layers like blankets. You feel oddly cozy for somewhere so alien.
        #JNSQscience_crewReport_HuygenSrfLandedHighlands_01 = The horizon is close and far at the same time. You suspect the atmosphere is playing tricks again.
        #JNSQscience_crewReport_HuygenSrfLandedMountains_00 = The capsule creaks as winds shove at it. You mark the mountains as: scenic, drafty, and slightly judgmental.
        #JNSQscience_crewReport_HuygenSrfLandedMountains_01 = Thin ridges fade into amber mist. You try to count peaks, but the planet keeps changing the answer.
        #JNSQscience_crewReport_HuygenSrfLandedPeaks_00 = At the top of the world, the sky still refuses to be blue. It is all gold and secrets.
        #JNSQscience_crewReport_HuygenSrfLandedPeaks_01 = You can almost see Lindor through the murk. Almost.
        #JNSQscience_crewReport_HuygenSrfLandedPolarLowlands_00 = The ground looks hard and dark, like it would rather be anywhere else. You sympathize.
        #JNSQscience_crewReport_HuygenSrfLandedPolarLowlands_01 = Cold fog crawls along the surface in slow motion. You record: weather with commitment issues.
        #JNSQscience_crewReport_HuygenSrfLandedPoles_00 = Everything is quiet, muffled by the thick air. Even the radio sounds like it is whispering.
        #JNSQscience_crewReport_HuygenSrfLandedPoles_01 = The instruments say the pressure is high. Your ears believe them.
        #JNSQscience_crewReport_HuygenSrfLandedPolarHighlands_00 = The pale light makes the slopes look unreal, like a charcoal sketch behind tinted glass.
        #JNSQscience_crewReport_HuygenSrfLandedPolarHighlands_01 = You catch yourself holding your breath, then remember that is not how pressure works.
        #JNSQscience_crewReport_HuygenSrfLandedShores_00 = The shoreline is dark and glossy. You cannot tell if it is wet ground or ground pretending to be wet.
        #JNSQscience_crewReport_HuygenSrfLandedShores_01 = Gentle waves lap at something that is definitely not water. You write: do not taste test.
        #JNSQscience_crewReport_HuygenSrfSplashedShores_00 = The craft bobs in a heavy, oily swell. The cabin smells faintly like a chemistry set.
        #JNSQscience_crewReport_HuygenSrfSplashedShores_01 = You watch ripples spread away into fog and feel very glad the windows are thick.
        #JNSQscience_crewReport_HuygenSrfSplashedMethaneLakes_00 = You are floating in a methane lake. Mission Control insists you call this 'exciting' instead of 'concerning'.
        #JNSQscience_crewReport_HuygenSrfSplashedMethaneLakes_01 = Bubbles rise and pop without drama. You log the liquid as calm, cold, and suspiciously flammable.
        #JNSQscience_crewReport_HuygenFlyingLowLowlands_00 = Skimming the lowlands, the haze thickens until the ground becomes a rumor.
