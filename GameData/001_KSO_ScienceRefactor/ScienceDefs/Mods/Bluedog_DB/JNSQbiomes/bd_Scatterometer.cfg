@EXPERIMENT_DEFINITION:HAS[#id[bd_Scatterometer]]
{
	%RESULTS
	{
        KerbinInSpaceLowMidlands* = #ScienceRefactor_bd_Scatterometer_KerbinInSpaceLowGrasslands_00 // The flatter regions of Kerbin's grasslands allow for less resistance against the wind, leading to higher wind speeds and greater chances of tornado formation.
        KerbinInSpaceLowAridMidlands* = #ScienceRefactor_bd_Scatterometer_KerbinInSpaceLowDeserts_00 // Wind speeds fluctuate greatly in Kerbin's deserts; the wind can go from being a calming breeze to a violent sand storm very quickly and unexpectedly.
        
        EveInSpaceLowPetrolLakes* = #ScienceRefactor_bd_Scatterometer_EveInSpaceLowCraterLake_00 // Normally the wind speed over the oceans and lakes of a body will be stronger. But in this region the wind speed seems to be abnormally low. This is likely because the crater's walls are sheltering the lake from some of the wind.
    }
}