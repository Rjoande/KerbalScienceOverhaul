        #GEPscience_bd_SiteSurvey_EponaSrfLandedTropicalUplands_00 = The uplands break into ridges and shallow troughs that play tricks with the weak light. You flag a few stable shelves and add a note: “comm delay makes last-second heroics illegal.”
        #GEPscience_bd_SiteSurvey_EponaSrfLandedTemperateUplands_00 = The terrain looks firm, but the texture reads like crust over something that used to move. The survey recommends a conservative touchdown and minimal wandering.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedHighlands_00 = From the highlands, everything looks frozen and ancient—until the thermal readouts whisper otherwise. You pick a plateau with clear relay lines and promise not to ask what’s under the ice.
        #GEPscience_bd_SiteSurvey_EponaSrfLandedGrandPeaks_00 = Needle-like peaks cast long, unhelpful shadows that never match your instincts this far from home. The “best” landing spot is the one that exists on radar and not just in your imagination.
