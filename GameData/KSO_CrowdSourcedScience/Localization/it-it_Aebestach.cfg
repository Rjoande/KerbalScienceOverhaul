        #CSS_Aebestach_evaReport_Vall_03 = Bacino sud-occidentale di Vall. Fratture nella crosta di ghiaccio.
        #CSS_Aebestach_evaReport_Vall_04 = Vallate meridionali di Vall. Canyon scolpiti dal ghiaccio.
        #CSS_Aebestach_evaReport_Vall_05 = Montagne di Vall. Vette di montagne di ghiaccio.
        #CSS_Aebestach_evaReport_Vall_06 = Poli di Vall in orbita bassa. Calotta di ghiaccio in basso.
        #CSS_Aebestach_evaReport_Vall_07 = Bassopiani di Vall in orbita bassa. Bassopiani di un mondo di ghiaccio.
        #CSS_Aebestach_evaReport_Vall_08 = Bacini di Vall in orbita bassa. Segni di un oceano sotto la superficie.
        #CSS_Aebestach_evaReport_Vall_09 = Vallate di Vall in orbita bassa. Erosione glaciale.
        #CSS_Aebestach_evaReport_Vall_10 = Montagne di Vall in orbita bassa. Vette di ghiaccio in alto.
        //   Tylo
