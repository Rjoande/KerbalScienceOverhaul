		BelisamaInSpaceLowLowlands* = #GEPscience_bd_camera_BelisamaInSpaceLowLowlands_00 // From low orbit, the lowlands form broad, smooth patches with subtle streaks that hint at old flows. You mark the frame for follow-up and send it into the long radio tunnel.
