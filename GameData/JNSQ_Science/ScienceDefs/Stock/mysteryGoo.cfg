        EdnaSrfLandedLowlands* = #JNSQscience_mysteryGoo_EdnaSrfLandedLowlands_00 // The Goo flattens itself against the container floor, as if trying to look like “just a stain.”
        EdnaSrfLandedLowlands* = #JNSQscience_mysteryGoo_EdnaSrfLandedLowlands_01 // The Goo turns a dull charcoal color and refuses to wobble unless you threaten to take notes.
        EdnaSrfLandedMidlands* = #JNSQscience_mysteryGoo_EdnaSrfLandedMidlands_00 // The Goo forms little ridges that match the terrain outside, then smooths them out like it never happened.
        EdnaSrfLandedMidlands* = #JNSQscience_mysteryGoo_EdnaSrfLandedMidlands_01 // The Goo quivers at every vibration, then settles into a suspiciously perfect circle.
        EdnaSrfLandedHighlands* = #JNSQscience_mysteryGoo_EdnaSrfLandedHighlands_00 // The Goo stretches upward in jagged spikes, apparently impressed by the scenery’s commitment to sharpness.
        EdnaSrfLandedHighlands* = #JNSQscience_mysteryGoo_EdnaSrfLandedHighlands_01 // The Goo keeps trying to crawl up the container wall, then stops and pretends it was just “sloshing.”
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_mysteryGoo_EdnaSrfLandedPolarIceCraters_00 // The Goo stiffens into a frosty lump and gives you the emotional equivalent of a glare.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_mysteryGoo_EdnaSrfLandedPolarIceCraters_01 // The Goo huddles in the darkest corner of the container, as if the shadows are warmer.
        EdnaSrfLandedWhites* = #JNSQscience_mysteryGoo_EdnaSrfLandedWhites_00 // The Goo pales to match the bright ground outside, then immediately darkens again like it changed its mind.
        EdnaSrfLandedWhites* = #JNSQscience_mysteryGoo_EdnaSrfLandedWhites_01 // The Goo produces tiny sparkles, as if trying to compete with the glare, and then sulks when you notice.
        EdnaInSpaceLow* = #JNSQscience_mysteryGoo_EdnaInSpaceLow_00 // The Goo presses itself into a thin sheet and tracks Edna’s nightside like it’s waiting for something to disappear.
