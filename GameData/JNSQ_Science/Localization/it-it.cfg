        #JNSQscience_bd_poke_EelooSrfLandedMidlands_00 = Granuli soffici si comprimono in un tappo cigolante attorno all'asta, producendo numeri stabili e noiosi.
        #JNSQscience_bd_poke_EelooSrfLandedLowlands_00 = La sonda affonda in profondità in accumuli sciolti prima di trovare finalmente qualcosa di abbastanza solido da ribattere.
