        #JNSQscience_barometerScan_LaytheSrfSplashedJoolwardSea_00 = Il barometro mostra un lieve rialzo che va e viene come una lenta marea nell'aria stessa. Cerchi di non guardare in alto.
        #JNSQscience_barometerScan_LaytheSrfSplashedJoolwardSea_01 = La pressione sopra questo mare sembra stranamente "appesantita", come se l'atmosfera venisse stiracchiata dolcemente in una direzione.
        #JNSQscience_barometerScan_LaytheSrfSplashedPolwardSea_00 = La pressione è rispettabile, ma le raffiche la fanno oscillare come se stesse rivalutando le sue scelte di vita. Il meteo polare ha opinioni.
        #JNSQscience_barometerScan_LaytheSrfSplashedPolwardSea_01 = La lancetta oscilla a ogni ondata fredda, poi si stabilizza di nuovo. Il mare sotto è calmo solo nel senso che non ti sta ancora lanciando ghiaccio addosso.
        #JNSQscience_barometerScan_LaytheSrfSplashedEnclosedFaults_00 = Le pareti del bacino intrappolano l'aria e la pressione risulta un filo più alta che fuori. Il barometro approva i muri: tu no.
        #JNSQscience_barometerScan_LaytheSrfSplashedEnclosedFaults_01 = Le letture cambiano mentre il vento entra ed esce dalle fratture come un respiro. Lo strumento lo registra come "ventilazione", cosa poco rassicurante.
        #JNSQscience_barometerScan_LaytheInSpaceLow_00 = Il barometro legge "quasi niente" con grande sicurezza. L'atmosfera rimasta è laggiù, e si tiene i suoi segreti.
