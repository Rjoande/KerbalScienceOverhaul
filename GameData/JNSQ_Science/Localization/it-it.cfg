        #JNSQscience_bd_drill_HuygenSrfLandedMountains_00 = Il trapano martella roccia fratturata ed estrae pezzi taglienti invece di un cilindro ordinato. Le montagne di Huygen preferiscono le schegge.
        #JNSQscience_bd_drill_HuygenSrfLandedPeaks_00 = La punta fatica a fare presa, poi vince un piccolo carotaggio ostinato. Il motore del trapano sembra sollevato quando smetti.
        #JNSQscience_bd_drill_HuygenSrfLandedPolarLowlands_00 = Il carotaggio risale come graniglia fredda con inclusioni chiare e friabili che crepitano mentre si scaldano. Il manicotto del trapano si ghiaccia per un attimo.
        #JNSQscience_bd_drill_HuygenSrfLandedPoles_00 = Il trapano taglia una crosta polverosa che nasconde strati più duri e più freddi. Il campione si comporta come se volesse restare congelato per sempre.
        #JNSQscience_bd_drill_HuygenSrfLandedPolarHighlands_00 = Un substrato duro e ghiacciato resiste alla punta e restituisce un tappo rigido con sottili venature di polvere. Sembra progettato da un meteo che non si prende mai pause.
        #JNSQscience_bd_drill_HuygenSrfLandedShores_00 = Il terreno fradicio frana nel foro mentre il trapano lavora. Il carotaggio recuperato è graniglia salata avvolta in fango scuro e appiccicoso.
        #JNSQscience_bd_drill_RigaSrfLandedLowlands_00 = Il trapano porta su fini scuri e compattati con occasionali frammenti arrotondati. La "familiarità" finisce nel momento in cui senti l'sentore del campione.
        #JNSQscience_bd_drill_RigaSrfLandedMidlands_00 = Il carotaggio mostra una stratificazione ordinata, come se Riga stesse archiviando la superficie in ordine da tempo. Il laboratorio apprezza l'organizzazione.
        #JNSQscience_bd_drill_RigaSrfLandedHighlands_00 = La punta macina roccia più dura e restituisce un tappo frastagliato con pagliuzze minerali brillanti. I sensori lo definiscono "interessante" con sicurezza.
        #JNSQscience_bd_drill_RigaSrfLandedMountains_00 = Il trapano crepita su pietra densa e produce un carotaggio ostinato che a malapena entra nel manicotto. Riga non fa "campioni facili".
        #JNSQscience_bd_drill_RigaSrfLandedPoles_00 = Il campione risale più chiaro e più friabile, con deboli granuli cristallini. Sembra che il freddo stia riscrivendo la superficie.
        #JNSQscience_bd_drill_TalosSrfLandedLowlands_00 = Il trapano scivola nella polvere fine fino a uno strato più denso che si tiene bene insieme. Talos sarà anche quieto, ma non è vuoto.
        #JNSQscience_bd_drill_TalosSrfLandedMidlands_00 = Emerge un cilindro ordinato con una bandatura sottile e ciottoli sparsi. La geologia è discreta, finché non guardi da vicino.
        #JNSQscience_bd_drill_TalosSrfLandedHighlands_00 = La punta raschia terreno roccioso e restituisce un carotaggio ruvido e abrasivo. Il trapano ne esce sabbiato e fiero.
        #JNSQscience_bd_drill_TalosSrfLandedMountains_00 = Roccia dura, venature fratturate, poi roccia ancora più dura, e si ripete. Il carotaggio sembra un racconto breve scritto interamente in ostinazione.
        #JNSQscience_bd_drill_TalosSrfLandedPoles_00 = Il trapano tira su granuli freddi e aggrumati che resistono a essere versati. Il campione insiste per restare un unico grumo scomodo.
        #JNSQscience_bd_drill_EelooSrfLandedPoles_00 = Il trapano ricava un carotaggio chiaro e friabile che scintilla di polvere intrappolata. Sembra un dessert finché i sensori non ti ricordano che è roccia e rimpianti.
        #JNSQscience_bd_drill_EelooSrfLandedHighlands_00 = La punta macina duro ghiaccio-roccia sinterizzato e restituisce un tappo ostinato con una lieve bandatura. Qualunque cosa abbia formato questa crosta non conosce il "morbido".
        #JNSQscience_bd_drill_EelooSrfLandedMidlands_00 = Un cilindro ordinato di granuli bianchi finissimi scivola fuori e prova subito a diventare una nuvola. L'etichetta dice: "Polvere, tecnicamente strutturale".
        #JNSQscience_bd_drill_EelooSrfLandedLowlands_00 = Il carotaggio risale più scuro e più denso, con inclusioni granulari ovunque. È meno "neve" e più "storia macinata".
        #JNSQscience_bd_drill_EelooSrfLandedCanyon_00 = Il trapano tira su un carotaggio a strisce da strati inclinati, come una torta a strati congelata che non aveva accettato di essere tagliata. Il team scientifico inizia a discutere a vista.
        #JNSQscience_bd_drill_CelesSrfLandedLowlands_00 = Il trapano restituisce brina chiara compattata con puntini scuri che rifiutano ostinatamente una classificazione. Il barattolo del campione sembra dover arrivare con della burocrazia.
        #JNSQscience_bd_drill_CelesSrfLandedMidlands_00 = Bande alternate di ghiaccio e graniglia polverosa si impilano ordinate nel carotaggio. Celes sembra archiviare la superficie in strati ben ordinati.
        #JNSQscience_bd_drill_CelesSrfLandedHighlands_00 = La punta stride su terreno duro e compatto e produce un tappo pulito con fratture taglienti. Il carotaggio sembra "ufficiale", in qualche modo.
        #JNSQscience_bd_drill_CelesSrfLandedMountains_00 = Il substrato duro reagisce, poi alla fine cede un carotaggio frastagliato e pesante. Il Controllo Missione chiede dettagli: il campione sembra invocare "NDA".
        #JNSQscience_bd_drill_CelesSrfLandedPoles_00 = Il trapano taglia materiale arioso e friabile che si gonfia in cristalli mentre si scalda. È il tipo più silenzioso di dramma.
        #JNSQscience_bd_drill_TamSrfLandedLowlands_00 = Il trapano affonda in macerie sciolte e recupera una pila riluttante di ciottoli e granuli scuri. Chiamarlo "carotaggio" sembra ottimistico.
        #JNSQscience_bd_drill_TamSrfLandedMidlands_00 = La punta si impunta su roccia bitorzoluta e strappa via un campione misto di graniglia e frammenti. La superficie di Tam sembra assemblata di fretta.
        #JNSQscience_bd_drill_TamSrfLandedHighlands_00 = Una crosta sottile cede a vuoti e strati friabili sotto. Il carotaggio recuperato è pieno di buchi, come se il terreno si fosse dimenticato di finire di esistere.
        #JNSQscience_bd_drill_TamSrfLandedTwinCraters_00 = Il trapano tira su strati rimescolati da impatti con pezzi vetrosi e detriti frantumati. Due crateri, un unico pasticcio condiviso.
        #JNSQscience_bd_drill_TamSrfLandedCraters_00 = Il carotaggio è una miscela caotica di polvere, schegge di roccia e inclusioni strane. Ogni centimetro sembra una discussione diversa su cosa abbia colpito dove.
        #JNSQscience_bd_drill_TamSrfLandedPockmarks_00 = Il trapano attraversa materiale poroso crivellato di minuscole cavità. Il campione è più leggero di quanto dovrebbe, e questo mette a disagio tutti.
        #JNSQscience_bd_drill_HamekSrfLandedLowlands_00 = Il trapano porta su un carotaggio che macchia il manicotto di un rosso ruggine profondo sopra granuli chiari e ghiacciati. Il colore rifiuta di essere ignorato, o spiegato.
        #JNSQscience_bd_drill_HamekSrfLandedMidlands_00 = Emerge una colonna rossa granulosa con dentro una crosta più dura. Gli strumenti lo definiscono "irragionevolmente colorato" con disagio professionale.
        #JNSQscience_bd_drill_HamekSrfLandedHighlands_00 = La punta macina substrato duro attraversato da venature rosso scuro e restituisce un tappo frastagliato. Il carotaggio sembra avere segreti, e spigoli vivi.
        #JNSQscience_bd_drill_HamekSrfLandedPoles_00 = Il trapano estrae un campione più chiaro e ricco di brina, con solo un accenno di rossore. Il contrasto rende il resto del pianeta ancora più sospetto.
        #JNSQscience_bd_drill_NaraSrfLandedLowlands_00 = Il trapano porta su un carotaggio denso e scuro che libera un lieve sibilo mentre si scalda. Il foro odora di pressione fredda.
        #JNSQscience_bd_drill_NaraSrfLandedMidlands_00 = Graniglia ghiacciata stratificata scivola fuori in bande pulite, ognuna con minuscole bolle intrappolate. Il campione prova in silenzio a trasformarsi in foschia.
        #JNSQscience_bd_drill_NaraSrfLandedHighlands_00 = La punta stride su una crosta sinterizzata e alla fine estrae un tappo ostinato. Sembra neve che ha imparato la geologia.
        #JNSQscience_bd_drill_NaraSrfLandedMountains_00 = Materiale duro e friabile combatte il trapano fino in fondo. Il carotaggio recuperato è venato di brina, come se si fosse congelato di fretta.
        #JNSQscience_bd_drill_NaraSrfLandedPoles_00 = Il carotaggio risale chiaro e vetroso con polvere intrappolata dentro. Gela il contenitore prima che tu riesca a chiuderlo.
        #JNSQscience_bd_drill_AmosSrfLandedLowlands_00 = Il trapano quasi spinge il lander in salita, ma ottieni una colonna corta di macerie sciolte. Chiamarla "carotaggio" è generoso.
        #JNSQscience_bd_drill_AmosSrfLandedMidlands_00 = Polvere grigia fine lascia il posto a ciottoli granulosi che non restano impilati. La provetta sembra un mix di snack agitato.
        #JNSQscience_bd_drill_AmosSrfLandedHighlands_00 = Una crosta sottile si rompe e cede un tappo compattato con pagliuzze brillanti. Gli strumenti approvano quanto sia stato poco collaborativo.
        #JNSQscience_bd_drill_AmosSrfLandedMountains_00 = La punta crepita su roccia frastagliata e restituisce frammenti taglienti invece di un cilindro ordinato. La montagna insiste per "campioni, al plurale".
        #JNSQscience_bd_drill_AmosSrfLandedPoles_00 = Granuli freddi si aggrumano in cristalli friabili appena vengono disturbati. Lo statico fa attaccare il carotaggio a tutto tranne che all'etichetta.
        #JNSQscience_bd_drill_EnonSrfLandedLowlands_00 = Il trapano tira su regolite morbida e polverosa che si affloscia subito. La imbusti comunque come "polvere strutturale".
        #JNSQscience_bd_drill_EnonSrfLandedMidlands_00 = Strati alternati di polvere fine e graniglia più scura escono ordinati, per una volta. Sospetti che la luna stia cercando di sembrare organizzata.
        #JNSQscience_bd_drill_EnonSrfLandedHighlands_00 = Il trapano affronta un substrato più duro e produce un tappo pulito e denso. Atterra nel vassoio con un tonfo molto soddisfacente.
        #JNSQscience_bd_drill_EnonSrfLandedMountains_00 = Roccia fratturata trasforma il trapano in uno strumento a percussione. Il campione è un carotaggio frastagliato che finge a malapena di essere rotondo.
        #JNSQscience_bd_drill_EnonSrfLandedPoles_00 = Il materiale recuperato è chiaro, friabile e spiacevolmente freddo per i sensori. Crepita piano mentre si scalda.
        #JNSQscience_bd_drill_PraxSrfLandedLowlands_00 = Il trapano affonda in terreno poroso che collassa dietro la punta. Il carotaggio è per lo più briciole con qualche pezzo ostinato.
        #JNSQscience_bd_drill_PraxSrfLandedMidlands_00 = Un tappo stratificato risale pieno di minuscoli vuoti, come se la roccia si fosse dimenticata di finire di riempirsi. La lettura di massa sembra ottimistica.
        #JNSQscience_bd_drill_PraxSrfLandedHighlands_00 = La punta macina graniglia compattata e restituisce un carotaggio più scuro e più denso. Sembra pressato piatto da ere.
        #JNSQscience_bd_drill_PraxSrfLandedMountains_00 = Pietra dura e a blocchi rifiuta di farsi trivellare con garbo, poi alla fine cede un tappo fratturato. Il motore del trapano sembra sollevato quando smetti.
        #JNSQscience_bd_drill_PraxSrfLandedPoles_00 = Il carotaggio è freddo, chiaro e resta insieme in cristalli riluttanti. Prova a ghiacciare il tappo della provetta.

        // bd_dust
        #JNSQscience_bd_dust_SunFlyingLowNorthPolarZone_00 = Il collettore registra granelli carichi che fuiscono in archi ordinati, come se l'aria stesse disegnando con lo statico.
        #JNSQscience_bd_dust_SunFlyingLowNorthSubpolarZone_00 = Gli impatti dei granuli arrivano in brevi burst scintillanti. L'involucro odora vagamente di "metallo caldo".
        #JNSQscience_bd_dust_SunFlyingLowNorthTemperateZone_00 = Particolato fine arriva con un crepitio elettrico costante. Il filtro sembra leggermente tostato.
        #JNSQscience_bd_dust_SunFlyingLowNorthTropicZone_00 = L'ingresso viene tempestato da granuli rapidi e brillanti che rifiutano di restare fermi nel vassoio.
        #JNSQscience_bd_dust_SunFlyingLowEquatorialZone_00 = La densità di particelle aumenta e le cariche diventano rumorose. Il campionatore registra "glitter di plasma abrasivo".
        #JNSQscience_bd_dust_SunFlyingLowSouthTropicZone_00 = Una sottile foschia di polvere energetica colpisce a impulsi ritmici, come se l'atmosfera respirasse scintille.
        #JNSQscience_bd_dust_SunFlyingLowSouthTemperateZone_00 = Gli impatti sono meno, ma più netti. Qualunque cosa arrivi fin qui lo fa con intenzione.
        #JNSQscience_bd_dust_SunFlyingLowSouthSubpolarZone_00 = I granuli portano cariche irregolari e traiettorie nervose. I dati sembrano leggermente irritati.
        #JNSQscience_bd_dust_SunFlyingLowSouthPolarZone_00 = Granelli chiari dall'aria fredda entrano alla deriva, poi lampeggiano mentre si caricano. Il vassoio crepita in silenzio.
        #JNSQscience_bd_dust_SunFlyingHigh_00 = Il rivelatore trova solo granuli rari e veloci e un sacco di letture vuote. I pochi colpi che riceve sono molto entusiasti.
        #JNSQscience_bd_dust_SunInSpaceLowNorthPolarZone_00 = Scie di polvere rade passano con firme di carica intense, come se viaggiassero su bande invisibili.
        #JNSQscience_bd_dust_SunInSpaceLowNorthSubpolarZone_00 = Il campionatore cattura un lieve flusso di granuli fini che fa scoppiettare il contatore come minuscole scintille.
        #JNSQscience_bd_dust_SunInSpaceLowNorthTemperateZone_00 = Ticchettii bassi e regolari di impatto suggeriscono un alone sottile di particolato che fluisce appena sopra l'alta atmosfera.
        #JNSQscience_bd_dust_SunInSpaceLowNorthTropicZone_00 = Lo spettro di particelle mostra granuli brillanti ed energetici che non restano neutri a lungo.
        #JNSQscience_bd_dust_SunInSpaceLowEquatorialZone_00 = I tassi di impatto salgono a grumi, come se la polvere venisse radunata in bande prima di fuggire.
        #JNSQscience_bd_dust_SunInSpaceLowSouthTropicZone_00 = Un velo diffuso di granelli carichi scivola oltre.
        #JNSQscience_bd_dust_SunInSpaceLowSouthTemperateZone_00 = Il sensore registra burst intermittenti di granuli rapidi, poi lunghi vuoti silenziosi.
        #JNSQscience_bd_dust_SunInSpaceLowSouthSubpolarZone_00 = I colpi di polvere arrivano a impulsi doppi con carica simile.
        #JNSQscience_bd_dust_SunInSpaceLowSouthPolarZone_00 = Il contatore a malapena ticchetta, finché all'improvviso non smette più. Quassù qualcosa apprezza le rotte polari.
        #JNSQscience_bd_dust_SunInSpaceHigh_00 = Lo spazio interplanetario è quasi tutto vuoto, con polvere di micrometeoroidi che ogni tanto fa ping sul sensore come ghiaia lontana e solitaria.
        #JNSQscience_bd_dust_MohoInSpaceHigh_00 = Il contatore schizza per micrometeoroidi veloci e polvere arsa dal sole. Quassù tutto sembra tagliente e impaziente.
        #JNSQscience_bd_dust_MohoSrfLandedPoles_00 = Il collettore trova granuli chiari e polverosi che sembrano sbiancati dal calore, finché non colpiscono il vassoio e si comportano come sabbia calda.
        #JNSQscience_bd_dust_MohoSrfLandedLowlands_00 = Graniglia scura e pesante scivola dentro come se fosse stata fusa, frantumata e fusa di nuovo.
        #JNSQscience_bd_dust_MohoSrfLandedPolarIceCraters_00 = Buche in ombra sputano fuori granuli di brina polverosa che sublimano nel momento in cui guardi troppo da vicino.
        #JNSQscience_bd_dust_MohoSrfLandedHighlands_00 = Scaglie grossolane di regolite tintinnano nell'ingresso, suonando come minuscole piastrelle di ceramica.
        #JNSQscience_bd_dust_MohoSrfLandedMidlands_00 = Polvere fine e uniforme si deposita subito, come se il suolo fosse stato setacciato in anticipo dal calore.
        #JNSQscience_bd_dust_MohoSrfLandedCraters_00 = Schegge di vetro d'impatto e graniglia tagliente arrivano insieme. L'analizzatore la etichetta "appena offesa".
        #JNSQscience_bd_dust_MohoSrfLandedExoticCraters_00 = Granuli insolitamente riflettenti rotolano dentro, lampeggiando brillanti anche all'ombra dell'involucro.
        #JNSQscience_bd_dust_MohoSrfLandedRareCraters_00 = Compare un mix disordinato di dimensioni, che suggerisce ejecta più recente non ancora cotta liscia dal calore.
        #JNSQscience_bd_dust_MohoSrfLandedVoronoiCraters_00 = La polvere arriva con trame stranamente coerenti, come se la superficie fosse stata "modellata" prima di rompersi.
        #JNSQscience_bd_dust_MohoSrfLandedNotableCraters_00 = Il campionatore si riempie di polvere di ejecta caotica che rifiuta di compattarsi in modo uniforme, per quanto tu la picchietti.
        #JNSQscience_bd_dust_MohoSrfLandedPeaks_00 = Granuli affilati e angolosi fanno ping sull'ingresso con entusiasmo extra. Quota alta, carattere alto.
        #JNSQscience_bd_dust_MohoInSpaceLowPoles_00 = I colpi di polvere sono rari sopra i poli, ma ogni granello arriva elettricamente scontroso e molto, molto veloce.
        #JNSQscience_bd_dust_MohoInSpaceLowLowlands_00 = Una sottile foschia di particelle fini scivola oltre, come se i bassopiani si stessero spogliando in silenzio verso il vicino spazio.
        #JNSQscience_bd_dust_MohoInSpaceLowPolarIceCraters_00 = Minuscoli granuli ricchi di volatili compaiono in brevi burst, poi spariscono come se si fossero ricordati della temperatura.
        #JNSQscience_bd_dust_MohoInSpaceLowHighlands_00 = Impatti netti occasionali suggeriscono granuli più duri che riescono a salire e a tenersi gli spigoli.
        #JNSQscience_bd_dust_MohoInSpaceLowMidlands_00 = Il rivelatore registra un flusso costante di piccoli impatti fini. Quieto, persistente e fastidiosamente abrasivo.
        #JNSQscience_bd_dust_MohoInSpaceLowCraters_00 = Le firme d'impatto arrivano in cluster rumorosi, come se qualcuno stesse ancora lanciando ghiaia verso l'alto.
        #JNSQscience_bd_dust_MohoInSpaceLowExoticCraters_00 = Schegge riflettenti fluiscono in brevi scie. L'ottica si lamenta di "detriti luccicanti".
        #JNSQscience_bd_dust_MohoInSpaceLowRareCraters_00 = Alcuni granuli più pesanti colpiscono l'involucro, suggerendo polvere più fresca e grossolana che fugge per poco.
        #JNSQscience_bd_dust_MohoInSpaceLowVoronoiCraters_00 = Riappaiono micro-burst ripetuti. L'analizzatore la chiama "polvere organizzata" e si zittisce.
        #JNSQscience_bd_dust_MohoInSpaceLowNotableCraters_00 = Particelle miste arrivano con tempistiche irregolari. Comportamento classico dell'ejecta da cratere, solo al rallentatore.
        #JNSQscience_bd_dust_MohoInSpaceLowPeaks_00 = Pochissimi granuli raggiungono questa traccia, ma quelli che ci riescono arrivano come minuscoli proiettili.
        #JNSQscience_bd_dust_EveSrfLandedPoles_00 = Polvere chiara e friabile si attacca in minuscole scaglie, come se il freddo stesse cercando di tenere la foschia di Eve a terra.
        #JNSQscience_bd_dust_EveSrfLandedLowlands_00 = Il campione è una graniglia fine e pesante con una sensazione leggermente appiccicosa. Il filtro si macchia di viola.
        #JNSQscience_bd_dust_EveSrfLandedMidlands_00 = Una coperta uniforme di polvere si compatta nel vassoio. Si comporta come se fosse stata macinata molto, molto a fondo.
        #JNSQscience_bd_dust_EveSrfLandedHighlands_00 = Compaiono granuli più taglienti con superfici graffiate, come se fossero stati rullati da aria densa e cattive intenzioni.
        #JNSQscience_bd_dust_EveSrfLandedPeaks_00 = Il collettore si riempie di graniglia dura e angolosa. Anche su una vetta, Eve trova il modo di sabbiare tutto.
        #JNSQscience_bd_dust_EveSrfLandedMountains_00 = Particelle grossolane e scure tintinnano dentro e iniziano subito ad abrasare l'ingresso. Lo strumento registra "rimpianto in corso".
        #JNSQscience_bd_dust_EveSrfLandedShores_00 = Sabbia e residuo incrostato arrivano insieme. Il campione odora di "oceano", se gli oceani potessero fulminarti con lo sguardo.
        #JNSQscience_bd_dust_EveSrfLandedKrakensWell_00 = La polvere arriva in impulsi caldi e vorticosi, mescolata a puntini più scuri che suggeriscono che sotto qualcosa stia ancora lavorando.
        #JNSQscience_bd_dust_EveSrfSplashed_00 = Il sensore viene subito ricoperto da spruzzi violacei e graniglia sospesa. Chiede un asciugamano e un pianeta più sicuro.
        #JNSQscience_bd_dust_EveFlyingLowPoles_00 = Granelli sottili e luccicanti scorrono lenti. L'aria sembra calma, ma l'ingresso continua a riempirsi di polvere.
        #JNSQscience_bd_dust_EveFlyingLowLowlands_00 = Il conteggio delle particelle schizza in alto: foschia densa, granuli fini e aerosol appiccicosi tutti insieme. I filtri iniziano a fare i bronci.
        #JNSQscience_bd_dust_EveFlyingLowMidlands_00 = Una pioggia costante di micro-particelle picchietta l'involucro. Il suono è lieve: i dati no.
        #JNSQscience_bd_dust_EveFlyingLowHighlands_00 = La turbolenza solleva burst di graniglia nel campionatore. La densità schizza ogni volta che il terreno diventa interessante.
        #JNSQscience_bd_dust_EveFlyingLowPeaks_00 = Meno particelle in generale, ma colpiscono più forte e più taglienti. I granuli quassù hanno ambizione.
        #JNSQscience_bd_dust_EveFlyingLowExplodiumSea_00 = L'ingresso cattura gocce schiumose e puntini brillanti che nel flusso d'aria si comportano in modo inquietantemente "attivo".
        #JNSQscience_bd_dust_EveFlyingLowMountains_00 = Le raffiche trasportano graniglia abrasiva a ondate. Il sensore di usura aggiorna il proprio curriculum.
        #JNSQscience_bd_dust_EveFlyingLowShores_00 = Entra una miscela disordinata di sabbia, spruzzi e crosta in sospensione. Lo spettro sembra dire "spiaggia, ma minacciosa".
        #JNSQscience_bd_dust_EveFlyingLowPolarLakes_00 = Domina una foschia fine, che asciuga in minuscoli cristalli sull'ottica. La visibilità è opzionale: i residui no.
        #JNSQscience_bd_dust_EveFlyingLowPetrolLakes_00 = Il campionatore raccoglie aerosol oleosi che si attaccano a tutto. La polvere si incolla al film come se stesse cercando di nascondersi.
        #JNSQscience_bd_dust_EveFlyingLowSeaofAkron_00 = Foschia densa con granuli tipo sale in sospensione. Lo strumento conta impatti più in fretta di quanto riesca a lamentarsi.
        #JNSQscience_bd_dust_EveFlyingLowSeaofNessus_00 = La firma degli aerosol è densa e uniforme, come una coperta. Qualcosa di croccante continua comunque a viaggiare insieme.
        #JNSQscience_bd_dust_EveFlyingLowSeaofTaniwha_00 = La densità di particelle pulsa con i venti che cambiano. L'aria è "viva" di graniglia alla deriva.
        #JNSQscience_bd_dust_EveFlyingLowSeaofGigan_00 = Gocce più grandi sferzano l'ingresso, seguite da polvere fine che viaggia nella loro scia. Il vassoio sembra maculato.
        #JNSQscience_bd_dust_EveFlyingLowSeaofRodan_00 = Il campione alterna aerosol umido e graniglia secca, come se l'atmosfera non riuscisse a decidersi su una fase.
        #JNSQscience_bd_dust_EveFlyingLowSeaofGojira_00 = Il collettore registra impatti pesanti e frequenti.
        #JNSQscience_bd_dust_EveFlyingLowSeaofGhidorah_00 = Tre popolazioni distinte di particelle compaiono insieme: nebbia, polvere fine e graniglia tagliente. Nessuna è gentile.
        #JNSQscience_bd_dust_EveFlyingLowSeaofBagorah_00 = La foschia trasporta puntini scuri che non corrispondono all'aria circostante. Il registro annota "guai importati".
        #JNSQscience_bd_dust_EveFlyingLowKrakensWell_00 = Le correnti ascensionali alimentano il campionatore con flussi caldi di polvere a spirale. Il disegno sembra quasi deliberato.
        #JNSQscience_bd_dust_EveInSpaceLowPoles_00 = Sottili filamenti di granuli d'alta quota si registrano sopra i poli. La foschia di Eve lascia impronte perfino quassù.
        #JNSQscience_bd_dust_EveInSpaceLowLowlands_00 = Un'ampia e tenue strisciata di particolato segue la traccia d'orbita. Il pianeta sta ancora cercando di raggiungerti.
        #JNSQscience_bd_dust_EveInSpaceLowMidlands_00 = Impatti a bassa energia fanno ticchettare il contatore con regolarità. La polvere sembra contenta di limitarsi a... fluttuare e giudicare.
        #JNSQscience_bd_dust_EveInSpaceLowHighlands_00 = Picchi netti occasionali suggeriscono granuli più duri che riescono a risalire. Arrivano come minuscoli proiettili viola.
        #JNSQscience_bd_dust_EveInSpaceLowPeaks_00 = Pochi impatti di particelle, ma le letture di carica sembrano vivaci. Qualunque cosa siano questi granuli, si portano dietro un umore.
        #JNSQscience_bd_dust_EveInSpaceLowExplodiumSea_00 = Il rivelatore cattura micro-gocce riflettenti e puntini brillanti. La firma sembra inquietantemente "fresca".
        #JNSQscience_bd_dust_EveInSpaceLowMountains_00 = Alcuni granuli energetici fanno ping sull'involucro, poi silenzio. L'esosfera di Eve non spreca nulla.
        #JNSQscience_bd_dust_EveInSpaceLowShores_00 = Una tenue banda di particelle tipo sale traccia la costa sotto. I dati disegnano una curva sorprendentemente ordinata.
        #JNSQscience_bd_dust_EveInSpaceLowPolarLakes_00 = Minuscoli aerosol dall'aspetto ghiacciato compaiono come brevi burst luccicanti. Spariscono prima che tu possa sentirti soddisfatto.
        #JNSQscience_bd_dust_EveInSpaceLowPetrolLakes_00 = Lo spettro mostra particolati ostinati tipo pellicola che rifiutano di disperdersi. Anche nel vicino spazio, resta appiccicato.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofAkron_00 = Una sottile foschia di micro-gocce sale in deboli pennacchi. Il campionatore registra "nebbia viola, persistente".
        #JNSQscience_bd_dust_EveInSpaceLowSeaofNessus_00 = La densità di particelle è leggermente elevata, con una distribuzione regolare. Sembra di sorvolare una perdita lenta.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofTaniwha_00 = I conteggi di polvere salgono e scendono a bande, come se l'atmosfera respirasse. Lo strumento non si sente rassicurato.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofGigan_00 = Gli impatti arrivano in burst raggruppati, suggerendo una fuga di aerosol a chiazze. Il motivo si ripete in modo troppo ordinato.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofRodan_00 = Granuli fini e micro-gocce condividono il vassoio. Il campione sembra che la "polvere spaziale" abbia provato a diventare zuppa.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofGojira_00 = Il sensore registra impatti più pesanti e più veloci del previsto. Qualcosa laggiù sta lanciando graniglia verso l'alto.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofGhidorah_00 = Più firme di particelle si sovrappongono in uno spettro rumoroso. L'analizzatore lo etichetta "complicato" e smette di discutere.
        #JNSQscience_bd_dust_EveInSpaceLowSeaofBagorah_00 = Granuli scuri e non uniformi passano in brevi scie. Il tracciatore annota "sorgente localizzata, non chiara".
        #JNSQscience_bd_dust_EveInSpaceLowKrakensWell_00 = Nelle letture compare una tenue spirale di particolato, poi svanisce. Fai finta di non averlo notato.
        #JNSQscience_bd_dust_EveInSpaceHigh_00 = Qui fuori è per lo più quieta polvere fondo, con una tenue popolazione tinta di viola che insiste a seguirti comunque.
        #JNSQscience_bd_dust_GillyInSpaceHigh_00 = Il sensore trova per lo più vuoto, più qualche granello che sembra potrebbe essersi staccato con uno starnuto.
        #JNSQscience_bd_dust_GillySrfLandedLowlands_00 = La polvere è soffice e riluttante ad assestarsi. Probabilmente potresti raccoglierla con un gentile suggerimento.
        #JNSQscience_bd_dust_GillySrfLandedMidlands_00 = Granuli fini fluiscono nel collettore e poi restano sospesi, come se qui si fossero dimenticati che esiste la gravità.
        #JNSQscience_bd_dust_GillySrfLandedHighlands_00 = Graniglia più grossa arriva in impatti lenti e garbati. Anche le rocce sembrano camminare in punta di piedi.
        #JNSQscience_bd_dust_GillyInSpaceLowLowlands_00 = I colpi di particelle vanno e vengono in pigre sbuffate, come se le nuvole di polvere facessero il giro panoramico intorno alla roccia.
        #JNSQscience_bd_dust_GillyInSpaceLowMidlands_00 = Il rivelatore cattura un velo sottile di granuli alla deriva che sembra a una spinta dal diventare un anello.
        #JNSQscience_bd_dust_GillyInSpaceLowHighlands_00 = Alcuni puntini energetici fanno ping sull'involucro, poi se ne vanno alla deriva come se avessero chiuso con l'idea.
        #JNSQscience_bd_dust_KerbinSrfLandedAdministration_00 = Il collettore di polveri segnala una ricca miscela di fibre di carta e graniglia da moquette. La reception chiede se il particolato abbia il timbro di autorizzazione appropriato.
        #JNSQscience_bd_dust_KerbinSrfLandedAstronautComplex_00 = I campioni includono briciole di snack, magnesite da palestra e qualcosa che potrebbe essere "residuo di addestramento". Il rivelatore chiede una doccia e una liberatoria.
        #JNSQscience_bd_dust_KerbinSrfLandedBaikerbanur_00 = Polvere fine e secca scivola in piccole dune perfette intorno a ogni porta. L'impiegato locale insiste che l'unica analisi approvata sia "sì, c'è polvere".
        #JNSQscience_bd_dust_KerbinSrfLandedBaikerbanurLaunchpad_00 = Lo strumento si riempie di graniglia della rampa, fuliggine di scarico e silenzio a norma di regolamento. Un responsabile della sicurezza approva i dati e disapprova la tua posizione.
        #JNSQscience_bd_dust_KerbinSrfLandedCrawlerway_00 = Polvere di roccia frantumata fa ping sul sensore come minuscole note a piè di pagina di macchinari pesanti. Ti chiedono di smettere di "campionare la strada" e di iniziare a campionare "da qualche parte che non intralci".
        #JNSQscience_bd_dust_KerbinSrfLandedFlagPole_00 = Il rivelatore registra un nobile vortice di polvere, poi un calo improvviso quando ti dicono di allontanarti dalle fondamenta. A quanto pare anche la terra ha un perimetro, qui.
        #JNSQscience_bd_dust_KerbinSrfLandedIslandAirfield_00 = Sabbia salata e graniglia portata dal vento trasformano il collettore in una spiaggetta. La lettura è accurata, ma ora tutto ciò che possiedi è "costiero".
        #JNSQscience_bd_dust_KerbinSrfLandedKSC_00 = Una scansione generale trova polvere di cemento, fuliggine di lanci e tracce di passi frettolosi. La conclusione ufficiale è "operazioni normali", che al CSK significa "non indagare".
        #JNSQscience_bd_dust_KerbinSrfLandedLaunchPad_00 = Il particolato arriva a ondate: fuliggine, graniglia, poi una nube drammatica di "per favore allontanarsi dallo sfiato". Il sacchetto campione viene etichettato "storico".
        #JNSQscience_bd_dust_KerbinSrfLandedMissionControl_00 = Il rivelatore rileva fine polvere elettronica e sale da snack perfettamente stagionato. Il Controllo Missione lo riclassifica come "particolato operativo" e lo archivia dove tu non puoi arrivare.
        #JNSQscience_bd_dust_KerbinSrfLandedR&D_00 = La composizione della polvere include fini metallici, polvere ceramica e un "prototipo" sospettosamente luccicante. Uno scienziato ti chiede di smettere di raccogliere il loro budget.
        #JNSQscience_bd_dust_KerbinSrfLandedR&DCentralBuilding_00 = La filtrazione dell'aria rende il conteggio della polvere quasi troppo pulito per essere credibile. Più tardi lo strumento rivela un picco di "residuo di timbro di approvazione" vicino allo scivolo delle pratiche.
        #JNSQscience_bd_dust_KerbinSrfLandedR&DCornerLab_00 = Il collettore rileva polvere che si aggruma in sfere perfette, poi prova a rotolare via. La porta del laboratorio si chiude da sola e qualcuno dice: "Quella non è polvere, è una funzionalità."
        #JNSQscience_bd_dust_KerbinSrfLandedR&DMainBuilding_00 = Firme di polvere stratificate correlano con scadenze e consumo di caffè. Gli ingegneri discutono se questo la renda "sedimento prevedibile" o "gestione".
        #JNSQscience_bd_dust_KerbinSrfLandedR&DObservatory_00 = Graniglia fine del tetto e rugiada mattutina producono polvere delicata e appiccicosa. L'astronomo chiede di tenere l'"entusiasmo particellare" sotto l'ottica.
        #JNSQscience_bd_dust_KerbinSrfLandedR&DSideLab_00 = Il rivelatore registra una foschia costante di polvere di stampante e detriti da "test rapido". Un tecnico ti offre una scopa e la chiama "attrezzatura di supporto sul campo".
        #JNSQscience_bd_dust_KerbinSrfLandedR&DSmallLab_00 = La polvere è inquietantemente uniforme, come se fosse stata versata da un sacco con scritto POLVERE. Ti consegnano un modulo di riservatezza e uno straccio molto pulito.
        #JNSQscience_bd_dust_KerbinSrfLandedR&DTanks_00 = I campioni contengono polvere compattata del piazzale più un debole aroma di "non toccare". La squadra dei serbatoi consiglia di analizzare l'aria da dietro la recinzione.
        #JNSQscience_bd_dust_KerbinSrfLandedR&DWindTunnel_00 = Le particelle si comportano bene finché non partono le ventole, poi la polvere ottiene la certificazione al volo. Il grafico viene annotato con "evento di redistribuzione aerodinamica".
        #JNSQscience_bd_dust_KerbinSrfLandedRunway_00 = Il collettore si riempie di fini di gomma, scaglie di vernice e del fantasma del fumo di pneumatici. La squadra di terra chiede se la tua scienza possa anche rimuovere le strisciate.
        #JNSQscience_bd_dust_KerbinSrfLandedSPH_00 = Trucioli di alluminio e polvere di primer dominano il campione, con un bonus di "glitter misterioso da bulloni". Un ingegnere chiede se puoi rimetterla in ordine in pezzi riutilizzabili.
        #JNSQscience_bd_dust_KerbinSrfLandedSPHMainBuilding_00 = I livelli di polvere schizzano ogni volta che si aprono i portoni, come se l'hangar stesse inspirando. Ti dicono di tenere il sensore lontano dai velivoli "appena migliorati".
        #JNSQscience_bd_dust_KerbinSrfLandedSPHRoundTank_00 = Il collettore cattura fibre soffici di isolamento che rifiutano di restare nel contenitore. Un tecnico insiste che stai studiando "il tipo sbagliato di atmosfera".
        #JNSQscience_bd_dust_KerbinSrfLandedSPHTanks_00 = Polvere di vernice e polvere di ruggine creano uno spettro di "colori ufficiali" e "invecchiamento non ufficiale". Il tuo rapporto viene accettato e subito usato come checklist di pulizia.
        #JNSQscience_bd_dust_KerbinSrfLandedSPHWaterTower_00 = Graniglia umida si aggruma in minuscoli meteoriti di fango e si attacca a tutto. La sicurezza dichiara questa "scienza a rischio scivolata" e aggiunge altri coni.
        #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationDishEast_00 = Polvere di ghiaia e graniglia dei passacavi producono conteggi puliti e regolari, finché la parabola non ruota e tutti decidono che sia colpa tua. La polvere resta innocente.
        #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationDishNorth_00 = Il rivelatore registra polvere fine più una quantità sospetta di lanuggine "solo da interni". La parabola continua comunque a seguirti, forse per calibrazione.
        #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationDishSouth_00 = Il campione è ordinato, compatto e disciplinato, come lo staff. Il conteggio della polvere è basso: il conteggio degli sguardi di lato è alto.
        #JNSQscience_bd_dust_KerbinSrfLandedTrackingStationHub_00 = La polvere da interno include scaglie di cera per pavimenti e sale da snack antico dalle console. L'hub sostiene che il tuo campione sia "detrito mission-critical" e lo confisca.
        #JNSQscience_bd_dust_KerbinSrfLandedVAB_00 = Polvere di cemento e polvere metallica scendono da altezze impossibili come neve industriale. Lo strumento suggerisce di indossare un casco e un rispetto maggiore per la gravità.
        #JNSQscience_bd_dust_KerbinSrfLandedVABMainBuilding_00 = Il collettore cattura una pioggia costante di minuscole particelle scosse via da gru e ambizione. Il responsabile della sicurezza timbra il rapporto "CONDIZIONE NOTA".
        #JNSQscience_bd_dust_KerbinSrfLandedVABPodMemorial_00 = Raccogli un campione di polvere quieto e minimo e senti subito che dovresti sussurrare. Anche il rivelatore qui ticchetta con più rispetto.
        #JNSQscience_bd_dust_KerbinSrfLandedVABRoundTank_00 = Il conteggio della polvere è basso, ma ogni particella sembra costosa. La sicurezza chiede di smettere di "ispezionare forensicamente" i dintorni del serbatoio.
        #JNSQscience_bd_dust_KerbinSrfLandedVABSouthComplex_00 = Graniglia di saldatura e fuliggine aggiungono una nota piccante al mix di particolato. Ti consegnano un modulo intitolato "Procedure di gestione della polvere calda".
        #JNSQscience_bd_dust_KerbinSrfLandedVABTanks_00 = La polvere del piazzale arriva a strati: traffico, stoccaggio, panico, e si ripete. Il sacchetto campione viene etichettato "normale", che è in qualche modo il risultato più allarmante.
        #JNSQscience_bd_dust_KerbinSrfLandedWoomerang_00 = La polvere portata dal vento si sposta di continuo a metà misurazione. Il rapporto finale include tre siti campione diversi e una tavoletta portablocco scomparsa.
        #JNSQscience_bd_dust_KerbinSrfLandedIceCaps_00 = Il collettore si riempie di graniglia ghiacciata e polvere di neve compattata dal vento. Si lamenta per tutto il tempo.
        #JNSQscience_bd_dust_KerbinSrfLandedHighlands_00 = Per lo più fini minerali con un sottile condimento di soffice materiale organico. Il filtro diventa di un rispettabile color tan.
        #JNSQscience_bd_dust_KerbinSrfLandedMountains_00 = Granuli affilati e angolosi. Ottimi per la scienza, pessimi per qualunque cosa abbia parti in movimento.
        #JNSQscience_bd_dust_KerbinSrfLandedShores_00 = Granelli di sabbia e frammenti di crosta salina inceppano l'ingresso. Lo strumento odora vagamente di spiaggia.
        #JNSQscience_bd_dust_KerbinSrfLandedMidlands_00 = Un mix vivace di polline, polvere di suolo e qualunque cosa fosse attaccata ai tuoi stivali.
        #JNSQscience_bd_dust_KerbinSrfLandedLowlands_00 = Dominano particelle fini di terriccio, con abbastanza organico da far sembrare il campione "vivo".
        #JNSQscience_bd_dust_KerbinSrfLandedAridLowlands_00 = Limo secco e graniglia polverosa entrano come se qualcuno avesse aperto un sacco di farina in una galleria del vento.
        #JNSQscience_bd_dust_KerbinSrfLandedAridMidlands_00 = La polvere è estremamente desiderosa di attaccarsi a tutto. Le letture di carica statica sembrano compiaciute.
        #JNSQscience_bd_dust_KerbinSrfLandedAridHighlands_00 = Compaiono granuli più grossolani con superfici minerali graffiate, come se fossero stati sabbiati per divertimento.
        #JNSQscience_bd_dust_KerbinSrfLandedAridMountains_00 = Il campione è soprattutto farina di roccia e carattere. Il sensore di usura chiede un'indennità di rischio.
        #JNSQscience_bd_dust_KerbinSrfLandedWelcomeBackIsland_00 = La polvere è per lo più sabbia pulita, più una quantità sospetta di minuscole scaglie di vernice da "qualche parte".
