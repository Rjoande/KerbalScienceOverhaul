        #JNSQscience_sspxFishStudy_CelesInSpaceHigh_00 = Dall'orbita alta, Celes diventa un puntino con troppe domande senza risposta. I pesci rispondono con l'unico metodo scientifico valido: fissare.
        #JNSQscience_sspxFishStudy_CelesInSpaceHigh_01 = Le correnti della vasca si stabilizzano alla perfezione. I pesci le rovinano subito, dimostrando che il comportamento caotico è universale.
        #JNSQscience_sspxFishStudy_TamSrfLanded_00 = Il terreno là fuori sembra tagliente, gelido e inospitale. I pesci si raccolgono in un grumo compatto e fingono di essere un singolo pesce più grande.
        #JNSQscience_sspxFishStudy_TamSrfLanded_01 = Micro rimbalzi da colpi di attracco increspano la vasca per un'eternità. I pesci surfano le onde come se fosse addestramento per qualcosa di terribile.
