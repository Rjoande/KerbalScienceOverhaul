        #GEPscience_bd_solarWind_SironaInSpaceLow_00 = The detector saturates, then tries again, then politely pretends it meant to do that. Sirona’s brutal magnetic environment twists the red sun’s particle stream into something that feels actively personal.
		#GEPscience_bd_solarWind_SironaInSpaceHigh_00 = Farther out, the wind steadies into broad sheets, but the numbers still wobble with Sirona’s far-reaching field. The downlink arrives late, as if even the radio is tired of crossing this much empty.
		#GEPscience_bd_solarWind_AirmedInSpaceLow_00 = Close to Airmed, the wind flickers between harsh exposure and Sirona-cast shelter. Spikes in the log suggest the surface is being sandblasted into a thin cloud of charged grit.
		#GEPscience_bd_solarWind_AirmedInSpaceHigh_00 = The instrument catches long, quiet stretches punctuated by sudden jolts—like passing through invisible wakes. You save the data and wonder how something so “empty” can be so busy.
		#GEPscience_bd_solarWind_BorvoInSpaceLow_00 = The wind piles up and peels around Borvo, making a neat bow shock that the detector traces like a ruler line. Strange pickup ions hint that the thin air is donating molecules whether it wants to or not.
		#GEPscience_bd_solarWind_BorvoInSpaceHigh_00 = At altitude, the flow smooths out, but a faint, repeating ripple suggests Borvo is still dragging a tenuous interaction behind it. The red sun’s “breeze” is more of a long-distance shove.
		#GEPscience_bd_solarWind_DamonaInSpaceLow_00 = Tiny Damona offers no protection—just a clean hit of charged particles and a brief spray of freshly liberated ions. The counter ticks calmly, which somehow makes it feel lonelier.
		#GEPscience_bd_solarWind_DamonaInSpaceHigh_00 = Out here the wind is thin, fast, and stubbornly consistent, as if the system has settled into a quiet routine. Mission Control’s reply arrives after the interesting part is already over.
