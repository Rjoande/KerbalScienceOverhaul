        #CSS_atmosphereAnalysis_EveFlyingHighLowlands_00 = Fissi con entusiasmo il display ma, purtroppo, mostra un elenco di gas mortali e non l'aria al gusto d'uva che speravi di trovare.
        #CSS_atmosphereAnalysis_EveFlyingHighHighlands_00 = Alcuni sensori indicano grandi concentrazioni di anidride solforosa. Il controllo missione insiste che, pur contenendo ossigeno, questo gas non è respirabile.
