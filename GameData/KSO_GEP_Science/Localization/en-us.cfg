        #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowLowlands_00 = The lowlands are a smooth, dark smear punctuated by a few stubborn boulders that make good stitching anchors. If this is a snowball, it’s the grumpiest one you’ve ever seen.
        #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowEasternHighlands_00 = The eastern highlands show brighter material on steep slopes, like something fresher is exposed there. You zoom in, then remember you can’t ask the surface what it is for several light-minutes.
        #GEPscience_bd_orbitalScope_RAB-58EInSpaceLowWesternHighlands_00 = Western highlands resolve into lumpy ridges that change character with every sun angle, making the mosaic feel inconsistent on purpose. You file it under “captured body, captured patience.”

        #GEPscience_bd_orbitalScope_CernunnosInSpaceHigh_00 = From high orbit, Cernunnos is an icy dwarf drifting under the dim red sun, surrounded by the suspicion that it isn’t truly alone out here. The planet-wide mosaic arrives in slow strips, like the void is metering out permission to look.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTropicalLowlands_00 = Tropical lowlands appear as broad, pale plains with faint streaks that could be wind-sculpted frost or something stranger. Your stitcher behaves, but your imagination does not.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTemperateLowlands_00 = Temperate lowlands show gentle texture that makes mapping almost relaxing—until the silence and comms delay remind you how far “relaxing” had to travel to get here.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTropicalMidlands_00 = Tropical midlands break into low ridges and shallow basins, a quiet pattern repeated with unsettling consistency. The mosaic looks like a place that has been waiting a long time.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowTemperateMidlands_00 = Temperate midlands reveal mottled albedo patches that don’t correlate with obvious topography. You flag them for later analysis and accept that “later” will be argued across a very long link.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowHighlands_00 = The highlands throw long shadows that make every slope look steeper and colder than it already is. You capture extra overlap because the terrain feels like it’s daring your map to be wrong.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowSouthPolarHills_00 = The south polar hills form clustered lumps and ridges that read like frozen surf, stopped mid-motion. Your mosaic is technically excellent and emotionally unsettling.
        #GEPscience_bd_orbitalScope_CernunnosInSpaceLowNorthPole_00 = The north pole is a bright cap with subtle cracks that spider outward in thin lines. The camera resolves them cleanly; the thought of what they mean does not.

