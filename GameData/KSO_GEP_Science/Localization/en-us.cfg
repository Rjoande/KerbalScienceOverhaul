        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTropicalMidlands_00 = The midlands are a messy mix of small ridges and shallow basins, all rendered in dim red twilight. The survey suggests hopping in, grabbing data, and leaving before doubt catches up.
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedTemperateMidlands_00 = A few broad terraces offer stable geometry and good line-of-sight to relays—if the rotation cooperates. You approve a terrace and add: “do not chase the sun, it won’t help.”
        #GEPscience_bd_SiteSurvey_RosmertaSrfLandedHighlands_00 = The high ground provides a wide view of emptiness and a stronger dose of “why are we here.” The site is viable, but only for crews who enjoy cold silence and long uplinks.
