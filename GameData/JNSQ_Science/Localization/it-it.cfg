        #JNSQscience_bd_cosmicRay_BopSrfLandedMountains_00 = Terreno spigoloso, conteggi spigolosi: gli eventi secondari schizzano su ogni volta che la parete rocciosa "vede" il cielo.
        #JNSQscience_bd_cosmicRay_BopSrfLandedLowlands_00 = Una zona di dati più calma, finché uno ione pesante non attraversa tutto e rovina l'illusione.
        #JNSQscience_bd_cosmicRay_BopSrfLandedMidlands_00 = Il fondo è pulito e severo: lo spazio sembra vicinissimo su una luna così piccola.
