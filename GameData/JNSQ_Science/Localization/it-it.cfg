        #JNSQscience_bd_UVspec_EnonInSpaceLowPoles_00 = I poli mostrano intensi riflessi UV attorno alle ombre perenni: qualunque cosa sia nascosta lì dentro luccica parecchio.
        #JNSQscience_bd_UVspec_EnonInSpaceHigh_00 = Dall'orbita alta, Enon è un perfetto bersaglio di riferimento luminoso per la calibrazione UV. Lo spettrometro continua comunque a lamentarsi dell'abbagliamento.
        #JNSQscience_bd_UVspec_EnonInSpaceHigh_01 = Dall'orbita alta, Enon sembra una pallida perlina UV appesa nel buio, fin troppo brillante per stare tranquilli.
        #JNSQscience_bd_UVspec_PraxInSpaceLow_00 = Il terreno bitorzoluto di Prax restituisce UV in macchie irregolari, come se la superficie non riuscisse a mettersi d'accordo su cosa sia fatta. Il team di mappatura chiede subito un altro passaggio.
        #JNSQscience_bd_UVspec_PraxInSpaceLow_01 = L'imaging nell'ultravioletto coglie minuscoli lampi netti mentre Prax ruota. O sono grani riflettenti, oppure Prax sta cercando attenzione.
        #JNSQscience_bd_UVspec_PraxInSpaceLowLowlands_00 = I bassopiani risultano scuri in UV, suggerendo grani fini e sporchi accumulati nei bacini più bassi.
        #JNSQscience_bd_UVspec_PraxInSpaceLowMidlands_00 = Le pianure tornano marezzate in UV: chiazze di crosta luminosa interrotte da depositi ostinatamente opachi.
        #JNSQscience_bd_UVspec_PraxInSpaceLowHighlands_00 = Le colline luccicano più brillanti in UV, suggerendo terreno più ruvido e affioramenti più freschi sui pendii.
        #JNSQscience_bd_UVspec_PraxInSpaceLowMountains_00 = Le creste montuose lampeggiano nettamente in UV mentre le valli scompaiono nell'ombra: i contrasti sono quasi aggressivi.
        #JNSQscience_bd_UVspec_PraxInSpaceLowPoles_00 = Le regioni polari mostrano un nitido bordo UV attorno a tasche in ombra: riflettori intrappolati dal freddo che giocano a nascondino.
        #JNSQscience_bd_UVspec_PraxInSpaceHigh_00 = In orbita alta, Prax è un debole barlume con una firma UV sbilenca, come se non avesse mai finito di formarsi.

        // bd_weather
        #JNSQscience_bd_weather_SunInSpaceHigh_00 = Da così lontano, il bagliore esterno del sole si affievolisce e si intensifica in lenti impulsi: la "mappa del meteo" è solo turbolenza con troppa sicurezza.
        #JNSQscience_bd_weather_SunInSpaceLowNorthPolarZone_00 = La regione polare è intrecciata di deboli filamenti e strutture dall'aspetto aperto, come se il vento avesse trovato una scorciatoia per uscire dalla superficie.
        #JNSQscience_bd_weather_SunInSpaceLowNorthSubpolarZone_00 = Luminosi filamenti si attorcigliano e si sciolgono lungo la fascia, tracciando bande magnetiche che si rifiutano di restare dritte.
        #JNSQscience_bd_weather_SunInSpaceLowNorthTemperateZone_00 = Un campo marezzato di minuscole celle luminose ribolle sul posto: l'atmosfera laggiù non è mai, mai ferma.
        #JNSQscience_bd_weather_SunInSpaceLowNorthTropicZone_00 = Archi ad anello si alzano e svaniscono lungo la zona tropicale, come se il sole si esercitasse a fare nodi nel gas luminoso.
        #JNSQscience_bd_weather_SunInSpaceLowEquatorialZone_00 = La fascia equatoriale sembra più affollata e più stirata: le bande scorrono una accanto all'altra e tirano le strutture luminose in lunghi riccioli.
        #JNSQscience_bd_weather_SunInSpaceLowSouthTropicZone_00 = Una catena di chiazze luminose sboccia e collassa in sequenza, come se la superficie "facesse previsioni" a colpi di lampeggi.
        #JNSQscience_bd_weather_SunInSpaceLowSouthTemperateZone_00 = Delicate increspature e striature scivolano lungo la fascia: i motivi di flusso suggeriscono forti venti in strati che non riesci quasi a vedere.
        #JNSQscience_bd_weather_SunInSpaceLowSouthSubpolarZone_00 = Deboli pennacchi si sfilacciano verso l'esterno mentre si aprono varchi più scuri tra loro, suggerendo regioni in cui l'atmosfera sfoga più intensamente.
        #JNSQscience_bd_weather_SunInSpaceLowSouthPolarZone_00 = Il polo sud indossa una sottile calotta luminosa di filamenti che si allungano verso l'esterno e poi scattano indietro in nuove forme.
        #JNSQscience_bd_weather_EveInSpaceHigh_00 = Da questa quota, Eve sembra avvolta da infiniti strati di nubi viola, con luminose cicatrici dove le tempeste hanno sfondato verso l'alto.
        #JNSQscience_bd_weather_EveInSpaceHigh_01 = Un enorme vortice domina un emisfero: l'atmosfera sembra preferire il "drammatico" come stato predefinito.
        #JNSQscience_bd_weather_EveInSpaceLowPoles_00 = Una pallida foschia polare ruota lentamente, tracciando un vortice freddo che mantiene i suoi confini ordinati e ostili.
        #JNSQscience_bd_weather_EveInSpaceLowPoles_01 = Sottili bande di nubi luminose sfiorano il polo come motivi di brina, solo che sono fatte di guai.
        #JNSQscience_bd_weather_EveInSpaceLowLowlands_00 = I bassopiani ribollono sotto una spessa coperta di nubi: la convezione sboccia in lenti e pesanti impulsi.
        #JNSQscience_bd_weather_EveInSpaceLowLowlands_01 = Noti gruppi di celle temporalesche che si fondono, come se stessero condividendo un piano che non hai l'autorizzazione di leggere.
        #JNSQscience_bd_weather_EveInSpaceLowMidlands_00 = Le pianure mostrano campi nuvolosi spezzati e confini netti, fronti che sembrano puliti finché non ingrandisci.
        #JNSQscience_bd_weather_EveInSpaceLowMidlands_01 = Varchi sottili si aprono e si chiudono nella foschia come se il pianeta strizzasse l'occhio alla tua fotocamera.
        #JNSQscience_bd_weather_EveInSpaceLowHighlands_00 = Sopra le colline, le nubi si accumulano lungo i pendii, impilate in strati che si rifiutano di calmarsi.
        #JNSQscience_bd_weather_EveInSpaceLowHighlands_01 = Il terreno increspa il flusso d'aria in lunghi motivi ondulati: le sommità delle nubi sembrano pettinate, poi all'improvviso sfilacciate.
        #JNSQscience_bd_weather_EveInSpaceLowPeaks_00 = Le cime incidono nette ombre di vento nello strato di nubi, lasciando chiare firme "vietato volare" sottovento.
        #JNSQscience_bd_weather_EveInSpaceLowPeaks_01 = Sottili filamenti si staccano dalle vette e si srotolano in turbolenza, come nastri presi in un ventilatore.
        #JNSQscience_bd_weather_EveInSpaceLowExplodiumSea_00 = Sopra il mare Explodium, torri di nubi più luminose si raggruppano come se la superficie le alimentasse con energia extra.
        #JNSQscience_bd_weather_EveInSpaceLowExplodiumSea_01 = Un pennacchio umido sale, si espande e innesca un anello di tempeste che continuano a tornare in circolo per averne ancora.
        #JNSQscience_bd_weather_EveInSpaceLowMountains_00 = Le creste montuose incanalano il meteo in bande, strade di nubi che marciano in formazione nel cielo.
        #JNSQscience_bd_weather_EveInSpaceLowMountains_01 = Il lato sottovento ribolle di vortici caotici: qui l'atmosfera sta facendo del suo meglio per imitare una zuppa agitata.
        #JNSQscience_bd_weather_EveInSpaceLowShores_00 = Un netto confine costiero appare come un bordo di nubi ondulato che spinge verso l'interno, poi si spezza in rovesci sparsi.
        #JNSQscience_bd_weather_EveInSpaceLowShores_01 = La costa disegna una linea brillante nel campo nuvoloso: la brezza marina incontra il calore della terra e inizia una discussione.
        #JNSQscience_bd_weather_EveInSpaceLowPolarLakes_00 = Sopra i laghi polari, una foschia bassa simile a nebbia resta ostinatamente attaccata, assottigliandosi solo dove i venti la strappano.
        #JNSQscience_bd_weather_EveInSpaceLowPolarLakes_01 = Piccoli ma persistenti sbuffi di nube si formano in gruppi, come se i laghi espirassero piano nell'aria fredda.
        #JNSQscience_bd_weather_EveInSpaceLowPetrolLakes_00 = Le superfici scure dei laghi restano sotto un sottile velo di foschia: nubi locali spuntano e poi si appiattiscono in bande sfumate.
        #JNSQscience_bd_weather_EveInSpaceLowPetrolLakes_01 = Catturi uno strato limite dall'aspetto viscido che aderisce ai laghi, con filamenti che si staccano sottovento.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofAkron_00 = Lunghi archi di nubi curvano sopra il mare di Akron, delineando una vasta circolazione che si sta raccogliendo.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofAkron_01 = Le sommità delle nubi si incavano e si illuminano in motivi ripetuti: convezione organizzata con pazienza sinistra.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofNessus_00 = Un fitto cielo coperto avvolge il mare di Nessus, con occasionali aperture luminose dove celle torreggianti sfondano.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofNessus_01 = Il campo di tempeste è così uniforme che sembra fabbricato: gli strumenti insistono che sia "naturale", con riluttanza.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofTaniwha_00 = Strette bande temporalesche rastrellano il mare di Taniwha, allineate come graffi di un artiglio gigante.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofTaniwha_01 = Un gruppo rotante indugia al largo, oscillando sul posto come se stesse decidendo dove andare a creare guai dopo.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofGigan_00 = Il mare di Gigan ospita un ampio vortice di nubi, con le bande esterne che spiraleggiano nella foschia circostante.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofGigan_01 = Lampi simili a fulmini tremolano dentro le torri più luminose: qualunque cosa stia succedendo laggiù è piena di energia.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofRodan_00 = Sopra il mare di Rodan, ombre di nubi in rapido movimento suggeriscono forti venti che strappano più strati contemporaneamente.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofRodan_01 = Una linea di fronte pulita avanza sul mare, lasciando dietro di sé una scia marezzata e turbolenta.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofGojira_00 = Un enorme complesso temporalesco si estende sul mare di Gojira, con un nucleo denso e bande esterne sfilacciate.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofGojira_01 = Lo strato di nubi si gonfia in un'ampia cupola, convezione profonda che fa lavoro pesante in aria pesante.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofGhidorah_00 = Tre distinti gruppi temporaleschi sopra il mare di Ghidorah iniziano a fondersi, formando una catena di supercelle sbilenca.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofGhidorah_01 = Le immagini mostrano flussi a strati che si incrociano in direzioni diverse: l'atmosfera sta facendo multitasking in modo aggressivo.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofBagorah_00 = Il mare di Bagorah sembra ingannevolmente calmo, con fogli di nubi uniformi e solo poche torri isolate.
        #JNSQscience_bd_weather_EveInSpaceLowSeaofBagorah_01 = Un ampio velo di foschia scorre sull'acqua, assottigliandosi ai bordi in delicati filamenti.
        #JNSQscience_bd_weather_EveInSpaceLowKrakensWell_00 = Una spirale persistente staziona sopra KrakensWell, strettamente avvolta e fin troppo stabile per essere rassicurante.
        #JNSQscience_bd_weather_EveInSpaceLowKrakensWell_01 = L'occhio centrale si schiarisce per un attimo, poi si riempie di nuovo di nubi, come se la tempesta si fosse accorta che la stavi guardando e avesse chiuso le tende.
        #JNSQscience_bd_weather_KerbinInSpaceLowMidlands_00 = Ampie bande di nubi da bel tempo scorrono sulle pianure, tenendo i loro segreti e la loro ombra ben organizzati.
        #JNSQscience_bd_weather_KerbinInSpaceLowMidlands_01 = Perlopiù calmo, con sbuffi sparsi, e un'alta probabilità che il Controllo Missione dica "questa non è una previsione, è poesia".
        #JNSQscience_bd_weather_KerbinInSpaceLowMidlands_02 = Le sommità delle nubi sembrano morbide pennellate: i dati dicono "benigno", che per uno scienziato significa "finalmente, una pausa".
        #JNSQscience_bd_weather_KerbinInSpaceLowLowlands_00 = Aria calda e umida ristagna nei bassopiani e genera nebbia mattutina che si impegna molto a sembrare importante.
        #JNSQscience_bd_weather_KerbinInSpaceLowLowlands_01 = Scarsa visibilità all'alba, in miglioramento entro l'ora dello spuntino: possibili rovesci localizzati se qualcuno ride troppo forte.
        #JNSQscience_bd_weather_KerbinInSpaceLowLowlands_02 = I motivi meteo qui sono gentili ma insistenti, come un kerbal che cerca di aprire un portello bloccato.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridLowlands_00 = Sottili veli di polvere viaggiano col vento sopra i bassopiani aridi, dipingendo l'atmosfera in "beige con atteggiamento".
        #JNSQscience_bd_weather_KerbinInSpaceLowAridLowlands_01 = Cieli sereni, pomeriggi ventosi e una probabilità non nulla di polvere in posti dove la polvere non dovrebbe essere.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridLowlands_02 = La turbolenza guidata dal calore si vede chiaramente nelle immagini, ribollendo come una pentola che avrebbe dovuto essere sorvegliata.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridMidlands_00 = I diavoli di polvere disegnano rapide spirali sulle pianure aride, poi svaniscono come se si fossero ricordati di aver lasciato il forno acceso.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridMidlands_01 = Soleggiato, molto secco, con vortici isolati che migrano verso il rover più vicino e inconsapevole.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridMidlands_02 = La struttura dei pennacchi termici è perfetta da manuale, ammesso che il manuale sia stato scritto da qualcuno a cui piace il caos.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridHighlands_00 = Creste frastagliate agitano il flusso d'aria in onde spezzate: le nubi si formano, si sfilacciano e si riformano come burocrazia indecisa.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridHighlands_01 = Venti forti sul terreno accidentato, nubi alte sparse e un satellite meteo molto compiaciuto.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridHighlands_02 = Le immagini mostrano netta turbolenza sul lato sottovento: i tuoi strumenti chiedono cortesemente di non volare qui.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridMountains_00 = Le montagne aride scolpiscono il cielo in bande limpide e improvvise accumulazioni di nubi, come se l'aria venisse guidata a forza.
        #JNSQscience_bd_weather_KerbinInSpaceLowAridMountains_01 = Forti venti di cresta, occasionali nubi lenticolari e turbolenza valutata "piccante".
        #JNSQscience_bd_weather_KerbinInSpaceLowAridMountains_02 = Una serie fitta di onde si forma sottovento alle cime: i dati sembrano voler suonare la fisarmonica.
        #JNSQscience_bd_weather_KerbinInSpaceLowGreatLake_00 = Un netto confine di brezza lacustre si vede come una sottile linea di nubi che marcia verso l'interno con sorprendente disciplina.
        #JNSQscience_bd_weather_KerbinInSpaceLowGreatLake_01 = Accumulo di nubi nel pomeriggio vicino alla riva, con una possibilità di "perché adesso il lago fa meteo?"
        #JNSQscience_bd_weather_KerbinInSpaceLowGreatLake_02 = Pennacchi di umidità salgono dalla superficie del lago e alimentano ordinati piccoli rovesci che sembrano fieri di sé.
        #JNSQscience_bd_weather_KerbinInSpaceLowInlandWater_00 = Chiazze di acque interne lasciano impronte umide nell'aria, piccole ma inconfondibili nelle immagini.
        #JNSQscience_bd_weather_KerbinInSpaceLowInlandWater_01 = Nubicole sparse, piogge leggere e un pannello strumenti che continua a volerlo chiamare "meteo da piscina".
        #JNSQscience_bd_weather_KerbinInSpaceLowInlandWater_02 = L'atmosfera sopra queste acque è indaffarata ma educata, si scambia calore e vapore senza iniziare una discussione completa.
        #JNSQscience_bd_weather_KerbinInSpaceLowKreenwichSea_00 = Lungo il mare di Kreenwich, lunghe strade di nubi si allineano ai venti come se fossero in parata.
        #JNSQscience_bd_weather_KerbinInSpaceLowKreenwichSea_01 = Brezze costiere costanti, nubi spezzate e un 70% di probabilità che qualcuno dica "ahh, aria di mare" via radio.
        #JNSQscience_bd_weather_KerbinInSpaceLowKreenwichSea_02 = Un sistema a spirale si aggira al largo, non ancora una tempesta, più una tempesta che ci sta pensando.
        #JNSQscience_bd_weather_KerbinInSpaceLowArcticSea_00 = Il mare Artico è avvolto da foschia fredda e sottili bande di nubi che strisciano lungo il bordo del ghiaccio.
        #JNSQscience_bd_weather_KerbinInSpaceLowArcticSea_01 = Nebbia gelida, rovesci di neve sparsi e visibilità limitata a "sì, laggiù c'è sicuramente il mare".
        #JNSQscience_bd_weather_KerbinInSpaceLowArcticSea_02 = Ghiaccio brillante e acqua scura rendono più netti i fronti: il confine sembra disegnato con un righello.
        #JNSQscience_bd_weather_KerbinInSpaceLowForemansSea_00 = Un ampio fronte spazza il mare di Foremans, trascinando nubi a strati come una coperta che si rifiuta di restare piegata.
        #JNSQscience_bd_weather_KerbinInSpaceLowForemansSea_01 = Cielo coperto diffuso, rovesci incorporati e illuminazione drammatica occasionale inclusa nel prezzo.
        #JNSQscience_bd_weather_KerbinInSpaceLowForemansSea_02 = La struttura della tempesta è ben sviluppata e simmetrica, il che rende tutti nervosi senza alcun motivo scientifico.
        #JNSQscience_bd_weather_KerbinInSpaceLowTriangulusSea_00 = Sopra il mare di Triangulus, tre distinte bande di nubi convergono in un nodo disordinato dall'aspetto sospettosamente intenzionale.
        #JNSQscience_bd_weather_KerbinInSpaceLowTriangulusSea_01 = Venti variabili, tempeste sparse e geometria che non verrà valutata con indulgenza.
        #JNSQscience_bd_weather_KerbinInSpaceLowTriangulusSea_02 = Le immagini colgono celle rotanti che si formano e collassano in sequenza, come una prova generale per uno spettacolo più grande.
        #JNSQscience_bd_weather_KerbinInSpaceLowNorthernSea_00 = Il mare Settentrionale ospita lunghi archi di nubi arricciati che tracciano i venti dominanti con elegante sicurezza.
        #JNSQscience_bd_weather_KerbinInSpaceLowNorthernSea_01 = Aria fresca, mari vivaci e una possibilità di spruzzi così alti che vogliono candidarsi all'orbita.
        #JNSQscience_bd_weather_KerbinInSpaceLowNorthernSea_02 = Sottili gradienti di pressione sono visibili nelle texture delle sommità delle nubi: è l'atmosfera che lascia appunti ai margini.
        #JNSQscience_bd_weather_KerbinInSpaceLowSub-ArcticSea_00 = Il mare Sub-Artico alterna chiazze serene e improvvise pareti di nubi, come se sfogliasse le pagine troppo in fretta.
        #JNSQscience_bd_weather_KerbinInSpaceLowSub-ArcticSea_01 = Pioviggine fredda vicino al confine, banchi di nebbia in movimento e temperature che si rifiutano di scegliere da che parte stare.
        #JNSQscience_bd_weather_KerbinInSpaceLowSub-ArcticSea_02 = Una stretta pista di tempeste attraversa la regione, guidando l'umidità come se avesse una destinazione in mente.
        #JNSQscience_bd_weather_KerbinInSpaceLowEasternSea_00 = Sopra il mare Orientale, un netto fronte di brezza marina spinge verso l'interno, lasciandosi dietro un luminoso bordo di nubi ondulato.
        #JNSQscience_bd_weather_KerbinInSpaceLowEasternSea_01 = Bel tempo al largo, più nuvoloso vicino alla costa, con una piccola possibilità di "ops, abbiamo trovato un temporale".
        #JNSQscience_bd_weather_KerbinInSpaceLowEasternSea_02 = Il campo nuvoloso mostra convezione organizzata, piccole torri che salgono e scendono in file ordinate come reclute entusiaste.
        #JNSQscience_bd_weather_KerbinInSpaceLowWesternSea_00 = Il mare Occidentale è punteggiato da nubi spezzate e ombre in rapido movimento, suggerendo venti vivaci sotto.
        #JNSQscience_bd_weather_KerbinInSpaceLowWesternSea_01 = Ventoso, parzialmente nuvoloso e con probabilità crescente di rovesci sparsi dopo che il sole ha scaldato un po' le cose.
        #JNSQscience_bd_weather_KerbinInSpaceLowWesternSea_02 = Una sottile linea di tempeste si forma al largo: sembra che l'atmosfera abbia disegnato un confine e lo abbia sottolineato due volte.
        #JNSQscience_bd_weather_KerbinInSpaceLowWelcomeBackIsland_00 = WelcomeBack Island lascia sottovento un pennacchio di nubi persistente, come se l'isola salutasse con la condensazione.
        #JNSQscience_bd_weather_KerbinInSpaceLowWelcomeBackIsland_01 = Rovesci localizzati sopra l'isola, schiarite rapide e una probabilità del 100% che tu dica "welcome back" almeno una volta.
        #JNSQscience_bd_weather_KerbinInSpaceLowWelcomeBackIsland_02 = La scia dell'isola crea un varco ordinato nello strato di nubi, la freccia naturale "inserire qui il lander".
        #JNSQscience_bd_weather_DunaInSpaceLowIceCaps_00 = Sottili nubi pallide si aggrappano al bordo della calotta ghiacciata come se avessero paura di cadere dal pianeta.
        #JNSQscience_bd_weather_DunaInSpaceLowIceCaps_01 = Brina luminosa e suolo più scuro tracciano una netta linea di fronte: i venti sembrano pattugliarla fedelmente.
        #JNSQscience_bd_weather_DunaInSpaceLowHighlands_00 = Le colline trasformano l'aria sottile in lunghi e delicati motivi ondulati, belli ma poco rassicuranti per i piloti.
        #JNSQscience_bd_weather_DunaInSpaceLowHighlands_01 = Un tenue velo di polvere scorre sottovento alle creste, come se il terreno si stesse levigando da solo con gentilezza.
        #JNSQscience_bd_weather_DunaInSpaceLowMidlands_00 = Venti locali avviano vortici polverosi che vanno e vengono col sole, come una tabella oraria che nessuno ha scritto.
        #JNSQscience_bd_weather_DunaInSpaceLowMidlands_01 = Cogli una piccola tempesta di polvere che prova a diventare una grande tempesta di polvere, poi si ricorda che non ha un'atmosfera con cui lavorare.
        #JNSQscience_bd_weather_DunaInSpaceLowLowlands_00 = La foschia ristagna nei bassopiani, aderendo al terreno come se oggi la gravità stesse facendo gli straordinari.
        #JNSQscience_bd_weather_DunaInSpaceLowLowlands_01 = Lastre di polvere scorrono sul bacino al rallentatore, lasciando deboli striature che sembrano disegnate col gesso.
        #JNSQscience_bd_weather_DunaInSpaceLowCraters_00 = I fondi dei crateri trattengono una nebbia fredda e filiforme finché la luce del sole non la strappa via.
        #JNSQscience_bd_weather_DunaInSpaceLowCraters_01 = Derive di polvere si raccolgono in tasche riparate, poi traboccano in piccoli sbuffi quando il vento cambia idea.
        #JNSQscience_bd_weather_DunaInSpaceLowRareCraters_00 = Questi impatti spiccano anche dall'orbita: motivi freschi nella polvere che guidano i venti in strani riccioli.
        #JNSQscience_bd_weather_DunaInSpaceLowRareCraters_01 = Una sottile banda di nubi si forma lungo un bordo, poi si spezza come se si vergognasse di essere chiamata "meteo".
        #JNSQscience_bd_weather_DunaInSpaceLowVoronoiCraters_00 = Il campo di crateri ripetuto spezza il flusso d'aria in un mosaico di piccoli vortici e deboli pennacchi di polvere.
        #JNSQscience_bd_weather_DunaInSpaceLowVoronoiCraters_01 = La trama della superficie fa sembrare la foschia "pixelata": i meteorologi insistono che non sia un termine tecnico.
        #JNSQscience_bd_weather_DunaInSpaceLowNotableCraters_00 = Un'ampia foschia ad anello resta sul bordo come un'aureola fatta di polvere molto poco romantica.
        #JNSQscience_bd_weather_DunaInSpaceLowNotableCraters_01 = Contrasto di ombre e polvere rivelano un delicato schema di circolazione intrappolato dentro il bacino.
        #JNSQscience_bd_weather_DunaInSpaceLowExoticCraters_00 = Depositi dai toni strani illuminano le pareti dei crateri, e i venti li dipingono con sottili nastri di polvere migranti.
        #JNSQscience_bd_weather_DunaInSpaceLowExoticCraters_01 = Noti una fugace striatura di nubi alte e ghiacciate, più un indizio che una promessa.
        #JNSQscience_bd_weather_DunaInSpaceLowTrenches_00 = I venti vengono incanalati nelle trincee, lasciando lunghe e strette nubi di polvere che indicano la strada come frecce sulla superficie.
        #JNSQscience_bd_weather_DunaInSpaceLowTrenches_01 = L'incanalamento è così costante che potresti navigarci, ammesso che le frecce di polvere siano aiuti alla navigazione accettabili.
        #JNSQscience_bd_weather_DunaInSpaceLowNotablePlains_00 = Sopra le pianure, l'atmosfera sembra calma finché non noti l'intero strato di polvere che scivola di lato.
        #JNSQscience_bd_weather_DunaInSpaceLowNotablePlains_01 = Sottili increspature nella foschia tracciano venti stabili che non sembrano mai prendersi un giorno di riposo.
        #JNSQscience_bd_weather_DunaInSpaceLowNotableMountains_00 = Le montagne lasciano sottovento nubi di polvere come stendardi, come se le cime stessero cercando di segnalarti qualcosa.
        #JNSQscience_bd_weather_DunaInSpaceLowNotableMountains_01 = Sul lato sottovento si forma una netta linea di turbolenza: i dati dicono "non tentare acrobazie".
        #JNSQscience_bd_weather_DunaInSpaceLowMountains_00 = Onde orografiche increspano l'aria sottile, incidendo strisce ordinate nello strato di polvere.
        #JNSQscience_bd_weather_DunaInSpaceLowMountains_01 = Le cime bucano la foschia e lasciano nette ombre di vento, l'annotazione naturale del terreno.
        #JNSQscience_bd_weather_DunaInSpaceLowVolcano_00 = Il suolo caldo spinge l'aria verso l'alto quanto basta per raccogliere una ostinata colonna di foschia sopra il terreno vulcanico.
        #JNSQscience_bd_weather_DunaInSpaceLowVolcano_01 = Pennacchi di polvere salgono e vengono subito stirati via, come se l'atmosfera fosse impaziente verso qualsiasi ambizione verticale.
        #JNSQscience_bd_weather_JoolInSpaceLowEquatorialBands_00 = Le bande equatoriali sfrecciano in strati impilati: le correnti a getto sembrano voler levigare le nubi come carta vetrata.
        #JNSQscience_bd_weather_JoolInSpaceLowExposedLowerDeck_00 = Un varco sfilacciato nello strato superiore rivela vortici più scuri sotto. Il team meteo discute se questo conti come "cieli sereni".
        #JNSQscience_bd_weather_JoolInSpaceLowSubpolarBands_00 = Le bande sub-polari si stirano in riccioli e nodi ordinati, come se l'atmosfera si stesse intrecciando per divertimento.
        #JNSQscience_bd_weather_JoolInSpaceLowNorthPole_00 = Un vortice polare compatto sta sotto una pallida calotta di foschia, ruotando con calma come se lo facesse da sempre.
        #JNSQscience_bd_weather_JoolInSpaceLowSouthPole_00 = La regione polare sud è un labirinto di deboli striature e celle rotanti, ordinata a colpo d'occhio e caotica appena la misuri.
        #JNSQscience_bd_weather_JoolInSpaceLowStormComplex_00 = Il complesso temporalesco supera qualsiasi cosa tu abbia visto prima: le sue bande esterne potrebbero inghiottire interi continenti e avere ancora spazio per distendersi.
        #JNSQscience_bd_weather_LaytheInSpaceLowShores_00 = Un bordo di nubi luminoso e ondulato segna il fronte di brezza marina che spinge verso l'interno lungo le coste.
        #JNSQscience_bd_weather_LaytheInSpaceLowShores_01 = La terra scaldata dal sole avvia la convezione pomeridiana: piccole torri si formano poco all'interno, poi si spalmiano sottovento.
        #JNSQscience_bd_weather_LaytheInSpaceLowShallows_00 = Sopra le basse acque, il cambio di colore dell'acqua coincide con un sottile pennacchio di foschia che alimenta una linea di nubi soffici.
        #JNSQscience_bd_weather_LaytheInSpaceLowShallows_01 = Nubicole a chiazze spuntano nello strato limite umido, poi si appiattiscono in striature sotto venti costanti.
        #JNSQscience_bd_weather_LaytheInSpaceLowInlandWater_00 = Le acque interne lasciano impronte umide, piccoli gruppi di nubi sbocciano sopra di esse come un meccanismo a orologeria.
        #JNSQscience_bd_weather_LaytheInSpaceLowInlandWater_01 = Stretti banchi di nebbia restano attaccati ai bacini finché la luce del sole non li stacca e i venti non li fanno a brandelli.
        #JNSQscience_bd_weather_LaytheInSpaceLowKrenwichSea_00 = Lunghe strade di nubi si allineano sopra il mare di Krenwich, marciando con la corrente a getto come popcorn disciplinato.
        #JNSQscience_bd_weather_LaytheInSpaceLowKrenwichSea_01 = Un ampio fronte si arriccia sull'acqua: lo strato di nubi si increspa dove due masse d'aria non sono d'accordo.
        #JNSQscience_bd_weather_LaytheInSpaceLowArcticSea_00 = Il mare Artico è coperto da pallida foschia e sottili bande che strisciano lungo il bordo del ghiaccio.
        #JNSQscience_bd_weather_LaytheInSpaceLowArcticSea_01 = Celle di aria fredda punteggiano il campo nuvoloso in chiazze ordinate, come se l'atmosfera stesse organizzando la sua trapunta.
        #JNSQscience_bd_weather_LaytheInSpaceLowJoolwardSea_00 = Il mare di Jool mostra ombre di nubi in rapido movimento, suggerendo forti venti che strappano più strati contemporaneamente.
        #JNSQscience_bd_weather_LaytheInSpaceLowJoolwardSea_01 = Una linea di rovesci sfilacciata si forma al largo, poi si spezza in tempeste sparse mentre fluttua verso terra.
        #JNSQscience_bd_weather_LaytheInSpaceLowPolwardSea_00 = Sopra il mare di Pol, uno strato limite pulito appare come fogli di nubi uniformi con occasionali aperture torreggianti.
        #JNSQscience_bd_weather_LaytheInSpaceLowPolwardSea_01 = L'umidità spiraleggia in una circolazione lenta: non è ancora una tempesta, ma si sta allenando.
        #JNSQscience_bd_weather_LaytheInSpaceLowHighlands_00 = Le nubi si accumulano contro le colline e tracimano in lenti motivi ondulati.
        #JNSQscience_bd_weather_LaytheInSpaceLowHighlands_01 = La turbolenza sul lato sottovento sfilaccia le sommità delle nubi in striature luminose: i piloti lo chiamerebbero "formativo".
        #JNSQscience_bd_weather_LaytheInSpaceLowMountains_00 = Le creste montuose incanalano il meteo in bande: le bande di nubi si allungano come nastri presi in una forte brezza.
        #JNSQscience_bd_weather_LaytheInSpaceLowMountains_01 = Una serie di onde stazionarie si forma sottovento, incidendo strisce ripetute di chiaro e scuro nello strato di nubi.
        #JNSQscience_bd_weather_LaytheInSpaceLowIceCaps_00 = Le calotte ghiacciate brillano attraverso un sottile velo di nubi, delineando un fronte netto dove l'aria fredda tiene la posizione.
        #JNSQscience_bd_weather_LaytheInSpaceLowIceCaps_01 = Un anello compatto di foschia polare circonda il bordo della calotta: sembra calmo finché non misuri quanto si muove in fretta.
        #JNSQscience_bd_weather_LaytheInSpaceLowEnclosedFaults_00 = Le faglie racchiuse intrappolano bassa foschia nelle loro pieghe, formando ostinate chiazze di nebbia che si rifiutano di disperdersi.
        #JNSQscience_bd_weather_LaytheInSpaceLowEnclosedFaults_01 = Venti locali traboccano sul terreno spezzato, avviando piccoli vortici che intrecciano la foschia in filamenti.
        #JNSQscience_bd_weather_LaytheInSpaceLowLowlands_00 = I bassopiani raccolgono umidità e calore: la convezione sboccia a gruppi, poi si unisce in cieli coperti più estesi.
        #JNSQscience_bd_weather_LaytheInSpaceLowLowlands_01 = Uno strato di foschia alla deriva scivola lungo il fondo del bacino, con piccoli rovesci che si formano dove si addensa.
        #JNSQscience_bd_weather_LaytheInSpaceLowMidlands_00 = Campi nuvolosi spezzati sopra le pianure rivelano netti confini di vento che cambiano con la luce del giorno.
        #JNSQscience_bd_weather_LaytheInSpaceLowMidlands_01 = Sottili filamenti si trascinano dal terreno più alto e si srotolano in sbuffi sparsi sulle pianure.
        #JNSQscience_bd_weather_TyloInSpaceHigh_00 = Dall'orbita alta il "meteo" è soprattutto un sussurro di azoto e molto cielo vuoto: gli strumenti lo registrano comunque, per abitudine.
        #JNSQscience_bd_weather_TyloInSpaceLowPoles_00 = Una tenue foschia polare si raccoglie dove il freddo intrappola quel poco d'aria che c'è, formando un sottile alone che a malapena merita di essere chiamato previsione.
        #JNSQscience_bd_weather_TyloInSpaceLowMountains_00 = Le montagne incidono la tenue atmosfera in sottili striature sul lato sottovento. Più un suggerimento di vento che qualcosa che chiameresti vento.
        #JNSQscience_bd_weather_TyloInSpaceLowHighlands_00 = Deboli gradienti di pressione compaiono come una delicata trama nella foschia: l'atmosfera di Tylo sembra determinata a non fare storie.
        #JNSQscience_bd_weather_TyloInSpaceLowMidlands_00 = Un sottile velo di polvere scorre sulle pianure in lenti fogli pigri, come se il pianeta espirasse con la massima cautela.
        #JNSQscience_bd_weather_TyloInSpaceLowLowlands_00 = I bassopiani raccolgono l'aria più fredda e la nebbia più tenue: è quel tipo di "meteo" che puoi misurare ma non davvero vedere.
        #JNSQscience_bd_weather_LindorInSpaceHigh_00 = Dall'orbita alta, i pallidi vortici di Lindor sembrano calmi e ordinati, come se tutta l'atmosfera stesse cercando di sussurrare.
        #JNSQscience_bd_weather_LindorInSpaceLowTemperateBands_00 = Le bande temperate scorrono in ampi nastri deboli, con sottili linee di taglio che tracciano le correnti a getto più veloci.
        #JNSQscience_bd_weather_LindorInSpaceLowSubpolarBands_00 = Le bande sub-polari si spezzano in morbidi riccioli e nodi, come meteo al rallentatore mescolato con delicatezza.
        #JNSQscience_bd_weather_LindorInSpaceLowNorthPole_00 = Un vortice polare compatto sta sotto una sottile calotta di foschia, ruotando in silenzio con una pazienza inquietante.
        #JNSQscience_bd_weather_LindorInSpaceLowSouthPole_00 = Il polo sud mostra flussi a strati che si incrociano: perfino la "calma" di Lindor nasconde sotto una matematica complicata.
        #JNSQscience_bd_weather_LindorInSpaceLowUpperStormDeck_00 = Le sommità delle nubi alte si illuminano in cupole sparse, suggerendo convezione profonda che non mostra mai del tutto le sue carte.
        #JNSQscience_bd_weather_LindorInSpaceLowStormComplex_00 = Un vasto complesso temporalesco si estende sul campo nuvoloso, con le bande esterne che si sfilacciano nello strato circostante.
        #JNSQscience_bd_weather_LindorInSpaceLowExposedLowerDeck_00 = Un varco sfilacciato rivela vortici più scuri e lenti sotto. Un intero secondo mondo del meteo nascosto sotto il primo.
        #JNSQscience_bd_weather_HuygenInSpaceHigh_00 = Dall'orbita alta, Huygen è una biglia ambrata avvolta nella foschia: lo strato di nubi cambia lentamente, come se ci stesse riflettendo.
        #JNSQscience_bd_weather_HuygenInSpaceLowLowlands_00 = I bassopiani indossano uno spesso strato di foschia sfumata: deboli bande di nubi scorrono sopra in flussi costanti e senza fretta.
        #JNSQscience_bd_weather_HuygenInSpaceLowMidlands_00 = Campi nuvolosi spezzati punteggiano le pianure, poi si ricuciono come se all'atmosfera non piacesse mostrare varchi.
        #JNSQscience_bd_weather_HuygenInSpaceLowHighlands_00 = Sopra le colline, onde increspano le sommità delle nubi: il terreno sta modellando il vento in motivi ordinati e ripetuti.
        #JNSQscience_bd_weather_HuygenInSpaceLowMountains_00 = Le creste montuose incidono nette ombre di vento nella foschia, lasciando striature sottovento come se qualcuno avesse trascinato un dito nella nebbia.
        #JNSQscience_bd_weather_HuygenInSpaceLowPeaks_00 = Sottili filamenti si staccano dalle cime e si srotolano in turbolenza: qualunque cosa conti come "vento" qui sta facendo il giro panoramico.
        #JNSQscience_bd_weather_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari intrappolano un pallido cappuccio di foschia: ristagna, si ispessisce e lascia passare la luce del sole solo a malincuore.
        #JNSQscience_bd_weather_HuygenInSpaceLowPoles_00 = Un vortice polare compatto sta sotto una calotta più luminosa, ruotando con calma sicurezza e senza alcun riguardo per i tuoi piani di atterraggio.
        #JNSQscience_bd_weather_HuygenInSpaceLowPolarHighlands_00 = Le colline polari spezzano il flusso in filamenti: la foschia sembra pettinata in striature da persistenti venti trasversali.
        #JNSQscience_bd_weather_HuygenInSpaceLowShores_00 = Lungo le coste, una nitida linea di confine segna nubi da effetto lago che si formano e scorrono verso l'interno in sottili fogli bassi.
        #JNSQscience_bd_weather_HuygenInSpaceLowMethaneLakes_00 = Sopra i laghi di metano, sbuffi di nubi localizzati sbocciano e collassano a gruppi, come se la superficie stesse espirando meteo in silenzio.
        #JNSQscience_bd_weather_RigaInSpaceHigh_00 = Dall'orbita alta, il "meteo" di Riga è soprattutto una tenue lucentezza atmosferica e lenti cambiamenti sottili che entusiasmano solo gli strumenti.
        #JNSQscience_bd_weather_RigaInSpaceLowLowlands_00 = Una sottile foschia ristagna nei bassopiani, scorrendo in pigri fogli mentre venti deboli spingono in giro l'aria fredda.
        #JNSQscience_bd_weather_RigaInSpaceLowMidlands_00 = Filamenti a chiazze si formano e svaniscono sulle pianure, come se l'atmosfera non riuscisse a decidere se farsi vedere.
        #JNSQscience_bd_weather_RigaInSpaceLowHighlands_00 = Le colline increspano l'aria tenue in delicati motivi ondulati, deboli striature che tracciano il flusso dominante.
        #JNSQscience_bd_weather_RigaInSpaceLowMountains_00 = Le montagne incidono nette ombre di vento nella foschia, lasciando striature sottovento come se qualcuno avesse trascinato un dito nella nebbia.
        #JNSQscience_bd_weather_RigaInSpaceLowPoles_00 = Un pallido cappuccio polare si raccoglie e ruota lentamente, suggerendo un lieve vortice intrappolato nell'aria più fredda.
        #JNSQscience_bd_weather_EelooInSpaceHigh_00 = Dall'orbita alta, Eeloo mostra un tenue alone atmosferico e foschia lentissima, meteo nella sua forma più educata e minimale.
        #JNSQscience_bd_weather_EelooInSpaceLowPoles_00 = Un cappuccio polare spettrale si raccoglie nella trappola fredda, suggerendo un lieve vortice che a malapena trova l'energia per ruotare.
        #JNSQscience_bd_weather_EelooInSpaceLowHighlands_00 = Le colline scolpiscono l'aria sottile in sottili striature ondulate, linee delicate che solo gli strumenti osano chiamare "venti".
        #JNSQscience_bd_weather_EelooInSpaceLowMidlands_00 = Filamenti a chiazze scorrono sulle pianure, formandosi e svanendo come se l'atmosfera cercasse di non farsi notare.
        #JNSQscience_bd_weather_EelooInSpaceLowLowlands_00 = I bassopiani raccolgono la nebbia più tenue, che scivola in lenti fogli ogni volta che la luce del sole scalda anche solo un poco la superficie.
        #JNSQscience_bd_weather_EelooInSpaceLowCanyon_00 = Un nastro sottile di foschia aderisce alle pareti del canyon, intrappolato e incanalato in un pennacchio sottile che punta sottovento come una freccia.
        #JNSQscience_bd_weather_NaraInSpaceLowLowlands_00 = Una densa foschia pallida ristagna nei bassopiani, scivolando in lenti fogli sotto venti costanti e invisibili.
        #JNSQscience_bd_weather_NaraInSpaceLowLowlands_01 = Da qui le sommità delle nubi sembrano lisce, ma gli strumenti insistono che l'aria sotto stia facendo cose complicate.
        #JNSQscience_bd_weather_NaraInSpaceLowMidlands_00 = Striature luminose a chiazze si formano e svaniscono sulle pianure, tracciando strati di taglio nell'aria spessa e fredda.
        #JNSQscience_bd_weather_NaraInSpaceLowMidlands_01 = Mappi una dolce linea di confine che continua a ridisegnarsi, come se l'atmosfera non riuscisse a stare ferma per un ritratto.
        #JNSQscience_bd_weather_NaraInSpaceLowHighlands_00 = Le colline increspano la foschia bassa in lunghi sequenze d'onda, motivi ripetuti che gridano "flusso forte" senza alzare la voce.
        #JNSQscience_bd_weather_NaraInSpaceLowHighlands_01 = La turbolenza sul lato sottovento sfilaccia la foschia in filamenti: i piloti lo chiamerebbero "formativo".
        #JNSQscience_bd_weather_NaraInSpaceLowMountains_00 = Le creste montuose incidono nette ombre di vento attraverso la foschia, lasciando striature sottovento come se qualcuno avesse trascinato un dito nella nebbia.
        #JNSQscience_bd_weather_NaraInSpaceLowMountains_01 = Un pennacchio compatto si forma da una grande cresta e si stacca in una ampia fascia a spirale.
        #JNSQscience_bd_weather_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari indossano un cappuccio di foschia più luminoso, intrappolato nel freddo e riluttante a mescolarsi con qualunque altra cosa.
        #JNSQscience_bd_weather_NaraInSpaceLowPolarLowlands_01 = Sottili bande scorrono lungo il bordo del cappuccio, segnando un fronte persistente che si rifiuta di migrare.
        #JNSQscience_bd_weather_NaraInSpaceLowPoles_00 = Un vortice polare compatto ruota sotto una pallida calotta, abbastanza calmo da risultare inquietante.
        #JNSQscience_bd_weather_NaraInSpaceLowPoles_01 = La circolazione è così stabile che inizi a chiederti se al polo ci sia "meteo" o "meccanica".
        #JNSQscience_bd_weather_NaraInSpaceLowPolarHighlands_00 = Sopra le colline polari, la foschia si spezza in striature pettinate mentre forti venti trasversali rastrellano il terreno.
        #JNSQscience_bd_weather_NaraInSpaceLowPolarHighlands_01 = Onde stazionarie increspano il sottovento in linee ordinate e ripetute, motivi disciplinati creati da aria indisciplinata.

        // bd_XRayDiffract
        #JNSQscience_bd_XRayDiffract_MohoSrfLanded_00 = I picchi di diffrazione sono insolitamente netti per un campione superficiale sciolto, con una frazione più alta di fasi cristalline coerenti e un fondo meno "spalmato". Lo segnali come un affioramento relativamente fresco, scoperto di recente oppure ricompattato da scuotimenti intermittenti.
        #JNSQscience_bd_XRayDiffract_MohoSrfLanded_01 = Più sottocampioni differiscono più del dovuto su una distanza così breve: uno è ricco di polvere e con picchi allargati, quello successivo è dominato da clasti con pulite firme basaltiche. La transizione combacia con una traccia di faglia giovane che ha silenziosamente selezionato e rielaborato la regolite.
        #JNSQscience_bd_XRayDiffract_MohoSrfLanded_02 = Un sottile strato di grani chiari mostra minimi segni di alterazione spaziale rispetto alle frazioni fini più scure sotto. La miscela minerale suggerisce materiale fratturato di recente mescolato nello strato più superficiale durante uno scorrimento recente, poi di nuovo leggermente ricoperto di polvere.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedPoles_00 = I picchi tornano netti e ostinatamente uniformi: qualunque brina sopravviva qui è stata cotta in un sottile velo sopra roccia molto stanca.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedPolarIceCraters_00 = Sotto la polvere incrostata, deboli firme di volatili compaiono nel tracciato, come se il cratere stesse nascondendo il suo "ghiaccio" nella stessa reticella cristallina.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedCraters_00 = Breccia d'impatto polverizzata produce ampi anelli e picchi spalmati, questo cratere è stato macinato fino a diventare un frullato minerale.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedExoticCraters_00 = Alcuni picchi inattesi spuntano dal rumore come se avessero qualcosa da dimostrare: il fondo del cratere conserva apposta minerali strani.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedRareCraters_00 = Il diffrattogramma è per lo più di silicati familiari, finché non compare una serie di minuscoli picchi che non vuole farsi categorizzare.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedVoronoiCraters_00 = Fasi di fusione ricristallizzate affollano il tracciato con firme ripetute e fratturate: qualunque cosa sia successa qui si è raffreddata in fretta ed è rimasta sotto sforzo.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedNotableCraters_00 = Diverse famiglie minerali si sovrappongono in un coro disordinato: questo cratere sembra aver raccolto campioni da mezzo pianeta.
        #JNSQscience_bd_XRayDiffract_MohoSrfLandedPeaks_00 = Minerali da alta pressione e reticelle deformate suggeriscono che le cime non siano state sollevate con delicatezza, sono state spinte verso l'alto e non hanno mai perdonato nessuno.
        #JNSQscience_bd_XRayDiffract_EveSrfLandedShores_00 = Cristalli salini e fini grani di silicati dominano il grafico, con una foschia appiccicosa sullo sfondo che implica che la chimica costiera sia "attiva".
        #JNSQscience_bd_XRayDiffract_EveSrfLandedKrakensWell_00 = Il tracciato mostra fasi strane e instabili, come se il campione stesse cercando di riordinarsi a metà scansione: etichetti il sacchetto "NON SCUOTERE".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAdministration_00 = Il tracciato di diffrazione rivela una reticella complessa di toner, granelli di moquette e rimorso compattato. L'addetto alla sicurezza chiede se i "minerali da burocrazia" siano nella lista approvata.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAdministration_01 = Spieghi che la "diffrazione a raggi X" non permetterà a nessuno di vedere attraverso muri, scrivanie o bilanci annuali. L'Amministrazione ti chiede di smettere di dire "raggi X" nell'atrio.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAstronautComplex_00 = Il tuo campione produce picchi netti compatibili con cristalli di snack essiccati e quantità eroiche di lanugine. Qualcuno ti chiede di "diffrazionare il divano" come prossimo passo, per la scienza.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAstronautComplex_01 = Diversi membri dell'equipaggio fanno la fila chiedendo se puoi "solo controllare le ossa al volo". Spieghi che è per i cristalli, non per i Kerbal, e sembrano sinceramente delusi.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedCrawlerway_00 = La roccia frantumata mostra picchi forti e ordinati, poi una banda spalmata dovuta a un misterioso grasso dei cingoli. Ti dicono che il grasso è "strutturale" e quindi non va analizzato.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedFlagPole_00 = I granuli del suolo diffrangono in modo ordinato finché il tracciato non si allinea improvvisamente con l'occhiataccia della guardia più vicina. Etichetti l'anomalia "orientazione preferenziale indotta dalla sicurezza".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedLaunchPad_00 = Il campione è metà polvere di calcestruzzo, metà residui bruciati, e tutto atteggiamento. Il Controllo Radiazioni si presenta per ricordarti che "i raggi X non sono un'attività per visitatori".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedLaunchPad_01 = La squadra della rampa sente "raggi X" e presume subito che tu stia offrendo diagnosi gratuite. Chiarisci che è per la polvere: loro indicano la polvere e chiedono se ha un'assicurazione.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMissionControl_00 = I picchi di diffrazione sembrano normali finché un supervisore non si sporge, poi tutto viene classificato come "cristallino per esigenze operative". La stampa ti torna con i picchi oscurati.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMissionControl_01 = Un controllore di volo chiede se l'unità può diagnosticare il "tremolio da pre lancio". Chiarisci che diagnostica solo minerali: la stanza concorda che i minerali sono meno stressanti.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&D_00 = I tracciati indicano diverse fasi note più una che sembra inventata ieri. Lo scienziato sorride e dice: "Bene, è ancora in un pezzo".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&D_01 = Qualcuno prova a indossare lo strumento come una visiera "per vedere la struttura nascosta". Dimostri la diffrazione con un campione invece. Ti chiedono comunque se funziona sugli snack.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DCentralBuilding_00 = Il campione è così puro e uniforme che sembra già revisionato. I tuoi risultati vengono respinti perché non includono il Modulo 12 B: "Dichiarazione di intenzioni cristalline".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DCornerLab_00 = Il tracciato di diffrazione ha picchi extra che compaiono solo quando nessuno guarda. La porta del laboratorio si chiude a chiave da sola mentre ti avvicini per una seconda scansione.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DMainBuilding_00 = Trovi una firma sicura di calcestruzzo, schegge di vernice e fondi di caffè in una miscela stabile a tre fasi. Un ingegnere ti chiede di "ottimizzare la fase caffè".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DObservatory_00 = La polvere fine produce picchi delicati che oscillano a ogni passo. L'astronomo chiede se puoi diffrazionare "più silenziosamente".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DSideLab_00 = Il tuo campione si diffrazione in un tracciato perfetto di "decisamente normale", il che è estremamente sospetto. Qualcuno ti offre un campione fresco e un modulo di riservatezza.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DSmallLab_00 = I picchi sono affilati come rasoi e inquietantemente ripetibili, come se la terra fosse stata prodotta in fabbrica. Il tecnico insiste che sia "suolo artigianale".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DTanks_00 = La diffrazione mostra ossidi metallici, polvere e un debole sentore di "stare alla larga". I risultati vengono timbrati e archiviati come "non è un problema".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedR&DWindTunnel_00 = I picchi del campione si spalmiano in un arco magnifico nel momento in cui partono le ventole. Dichiari la nuova fase "distribuita aerodinamicamente".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedRunway_00 = Scaglie di gomma e graniglia di pista producono picchi ampi e un forte sentore di atterraggio. La squadra di terra chiede se i raggi X possono anche rimuovere i segni di frenata.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPH_00 = Il tracciato indica trucioli di alluminio, polvere di primer e una misteriosa fase cristallina etichettata "pezzi di ricambio". Un ingegnere chiede se si può usare per rinforzare le ali.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPH_01 = Un tecnico chiede se la macchina può "fare una radiografia dell'ala" per trovare i punti deboli. Spieghi che non è un dispositivo medico, né una visiera, né un miracolo. Lui la fissa comunque vicino all'ala "nel dubbio".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHMainBuilding_00 = I picchi di diffrazione saltano ogni volta che si muove una gru, come se il campione fosse nervoso. La Sicurezza dichiara il tuo strumento "troppo curioso per l'hangar".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHRoundTank_00 = Analizzi soffici fibre isolanti e ottieni un tracciato descrivibile solo come "assolutamente no". Un tecnico ti ricorda che l'isolante non è un deposito minerale, legalmente.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHTanks_00 = Le scaglie di vernice producono uno spettro complesso di pigmenti, leganti e ottimismo discutibile. Il caposquadra ti chiede di confermare che il colore sia ancora "ufficiale".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedSPHWaterTower_00 = La graniglia bagnata si diffrazione in picchi grumosi e mobili che cambiano mentre li guardi. Chiami la fase dominante "stalattite da gocciolamento (variante CSK)".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationDishEast_00 = La polvere della guaina dei cavi dà picchi puliti finché l'antenna non ruota, poi l'intero tracciato trema. Il tecnico incolpa "interferenze da scienza".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationDishNorth_00 = Il campione si diffrazione normalmente, ma il tuo dosimetro fa scattare tre allarmi lo stesso. L'antenna continua a seguirti con delusione professionale.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationDishSouth_00 = Ghiaia e polvere compattata producono picchi ordinati e disciplinati che si rifiutano di sorprendere chiunque. Il tuo rapporto viene accettato subito, e questo è inquietante.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationHub_00 = La polvere indoor produce picchi compatibili con elettronica, cera per pavimenti e snack antichi. L'hub etichetta il tuo campione "detriti critici per la missione" e se lo riprende.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedTrackingStationHub_01 = La sicurezza ti chiede di provare che non stai costruendo una visiera a raggi X. Mostri un tracciato di diffrazione: loro lo guardano strizzando gli occhi e dicono che sembra comunque "troppo trasparente".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVAB_00 = Polvere di calcestruzzo e scaglie metalliche producono un tracciato con la forza di mille scadenze. Un ingegnere chiede se i picchi si possano "rendere più verticali".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABMainBuilding_00 = Il campione mostra la classica firma di vernice, acciaio e fretta. La Sicurezza approva il risultato, poi disapprova il metodo, poi chiede una copia.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABMainBuilding_01 = Un ingegnere chiede una scansione a raggi X per trovare "bulloni misteriosi" dentro il razzo. Spieghi che puoi trovare fasi cristalline, non hardware perso. L'ingegnere scrive "cristalli" nella checklist dei bulloni mancanti lo stesso.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABPodMemorial_00 = La polvere fine dà un tracciato quieto e costante, senza sorprese. Fai una scansione rispettosa e riponi la macchina prima che qualcuno se ne accorga.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABRoundTank_00 = Il tracciato di diffrazione contiene una forte fase di "rivestimento costoso" e una debole fase di "perché sei qui". La sicurezza consiglia di diffrazionare qualcos'altro.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABSouthComplex_00 = Granuli di scoria e graniglia producono picchi frastagliati che sembrano scintille di saldatura su carta. Ti porgono un modulo intitolato "Campioni caldi, scuse fredde".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedVABTanks_00 = La polvere del piazzale serbatoi si diffrazione in un resoconto ordinato di traffico, stoccaggio e panico. Il risultato viene archiviato come "operazioni normali, non indagare".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedKSC_00 = Un campione generico del CSK restituisce una miscela impossibile di calcestruzzo, vernice, sale da snack e determinazione. Le Relazioni Pubbliche chiedono se puoi rendere i picchi "più ispiranti".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedIslandAirfield_00 = Sabbia salata produce picchi distintivi più un fondo umido persistente. Lo strumento inizia a corrodersi in tempo reale e chiede un trasferimento.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedBaikerbanur_00 = Polvere secca produce picchi nitidi e burocrazia nitida. L'impiegato locale timbra il tuo grafico di diffrazione "per autenticità".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedBaikerbanurLaunchpad_00 = La graniglia della rampa mostra residui stratificati di molti lanci e molti avvertimenti. Ti informano che i raggi X richiedono un permesso, un osservatore e meno domande.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedWoomerang_00 = Graniglia portata dal vento si diffrazione in picchi che vagano tra una scansione e l'altra, come se cercassero di scappare. Concludi che il minerale dominante è "ricollocabile".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedIceCaps_00 = Il tracciato di diffrazione è per lo più una serie di picchi netti del ghiaccio, con una firma polverosa e granulosa che suggerisce che Kerbin non è mai davvero "pulito".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedHighlands_00 = La scansione mostra silicati familiari con un ostinato miscuglio di grani alterati: la geologia su Kerbin è sorprendentemente attiva per un pianeta così comodo.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMountains_00 = Roccia compressa e fratturata produce picchi leggermente spostati: le montagne sembrano sotto sforzo da molto, molto tempo.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedShores_00 = Cristalli grandi quanto granelli di sabbia si allineano magnificamente nei dati, più una strisciata salata che il Controllo Missione insiste non venga "dagli snack".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedMidlands_00 = Torna uno spettro ben miscelato di sedimenti fini e residui organici: è praticamente terra, ma terra catalogata in modo impressionante.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedLowlands_00 = Lo strumento riporta una firma ricca di argille e rimaneggiata dall'acqua: i bassopiani sembrano il posto in cui Kerbin conserva il suo suolo migliore.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridLowlands_00 = Polveri secche producono picchi ampi e rumorosi: qualunque cosa ci sia qui è stata macinata e cotta al sole fino a un'ostinata uniformità.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridMidlands_00 = Grani selezionati dal vento dominano il tracciato, con un accenno di minerali evaporitici che gridano "qui una volta era più umido".
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridHighlands_00 = Il diffrattometro individua reticelle cristalline sotto sforzo e strane fasi vetrose: il terreno dall'aria "brutta" ha dati all'altezza.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedAridMountains_00 = Roccia alta e secca mostra più fasi minerali, come se fosse stata cotta, spaccata e ricotta: la geologia "quieta" di Kerbin sta bluffando.
        #JNSQscience_bd_XRayDiffract_KerbinSrfLandedWelcomeBackIsland_00 = Il campione è un miscuglio caotico di sabbia di spiaggia e giovani frammenti di roccia: è come se l'Isola del Ritorno stesse dicendo ciao in cristallografia.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedLowlands_00 = I picchi di diffrazione sono ampi e polverosi, suggerendo grani basaltici finemente macinati, polverizzati fino a diventare polvere quasi uniforme.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedPolarIceCraters_00 = Forti firme del ghiaccio saltano fuori subito: le ombre qui sembrano accumulare volatili come una dispensa molto segreta.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedExoticCraters_00 = Il tracciato mostra silicati mescolati dall'impatto con un curioso arricchimento di fasi di metalli pesanti, come se il cratere avesse tenuto un souvenir di ciò che lo ha creato.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedRareCraters_00 = Minerali scuri e ricchi di ferro dominano la scansione, con deboli tracce di composti più esotici che rendono il responso fin troppo sicuro di sé.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedVoronoiCraters_00 = Fusione d'impatto vetrosa e frammenti fusi spalmiano diversi picchi: questo campione ricorda chiaramente di essere stato liquido per un attimo e molto arrabbiato.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedNotableCraters_00 = Più popolazioni minerali si sovrappongono nel grafico, una ricca di metalli e un'altra più basaltica, come due crateri che litigano in cristallografia.
        #JNSQscience_bd_XRayDiffract_MunSrfLandedMountains_00 = Reticelle cristalline sotto sforzo e fasi di breccia confusa compaiono ovunque: queste "montagne" sembrano macerie che non hanno mai ricevuto il memo di assestarsi.
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedLowlands_00 = Picchi luminosi e puliti indicano una miscela ricca di calcio e alluminio con molte fasi carbonatiche: è quasi sospettosamente ordinata per una luna.
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBasins_00 = Carbonati idrati e polimorfi scintillanti dominano il terreno piatto: i bacini sembrano pavimentati con coriandoli minerali.
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownBasins_00 = I carbonati familiari delle pianure piatte sono ancora qui, ma una polvere silicatica più scura aggiunge picchi extra e spiega l'atteggiamento "marrone".
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownLowlands_00 = I carbonati dei bassopiani persistono, ma sono macchiati da minerali a strati ricchi di ferro: la firma sembra roccia alla menta con impronte di fango.
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownMidlands_00 = Fasi simili alla clorite affollano il diffrattogramma con varianti ricche di ferro: qualunque cosa abbia "dipinto" questa regione l'ha fatto uno strato cristallino alla volta.
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedBrownHighlands_00 = Grani scuri portano sia carbonati sia minerali a strati ricchi di ferro: le colline sembrano la stessa ricetta, solo cotta più a lungo e fatta cadere una volta.
        #JNSQscience_bd_XRayDiffract_MinmusSrfLandedMountains_00 = Segnali a strati si impilano nella scansione, suggerendo depositi messi giù in episodi distinti: i pendii di Minmus sono una torta a strati geologica con una glassa pessima.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedIceCaps_00 = I picchi di diffrazione gridano prima "ghiaccio", poi ammettono che ci sono regolite polverosa e una sottile crosta di volatili congelati che prova a nasconderla.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedCraters_00 = Frammenti mescolati dallo shock trasformano il tracciato in un pasticcio di fasi vetrose e roccia polverizzata: questo cratere è stato lavorato a fondo.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedRareCraters_00 = Alcuni picchi piccoli ma ostinati non corrispondono al solito miscuglio della crosta: o l'impatto ha scavato in profondità, oppure Duna sta tenendo dei segreti laggiù.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedVoronoiCraters_00 = Fusione ricristallizzata domina la scansione, con reticelle sotto sforzo che sembrano essersi raffreddate in fretta e non essersi mai rilassate dopo.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedNotableCraters_00 = Diverse famiglie minerali si sovrappongono come se il fondo del cratere fosse un album di ritagli di tutto ciò che è finito qui nel tempo.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedExoticCraters_00 = Lo strumento rileva insolite fasi da alta pressione mescolate alla polvere: qualunque cosa abbia creato questo cratere ha lasciato una firma minerale dai contorni netti.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedTrenches_00 = Minerali a grana fine si allineano come sedimenti selezionati, con indizi di fasi alterate che suggeriscono che questo passaggio basso abbia mosso più di semplice polvere.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedNotablePlains_00 = Il tracciato è dominato da grani setacciati dal vento e sali incrostati: le pianure sembrano essersi asciugate con pazienza per ere.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedNotableMountains_00 = Cristalli sotto sforzo e fasi dure e scure spiccano: le montagne sembrano roccia antica sollevata, spaccata e lasciata ossidare.
        #JNSQscience_bd_XRayDiffract_DunaSrfLandedVolcano_00 = Picchi cristallini dall'aria fresca tagliano il solito fondo polveroso: questo terreno sembra meno "frontiera consumata" e più "assemblato di recente".
        #JNSQscience_bd_XRayDiffract_IkeSrfLandedPoles_00 = Deboli picchi di ghiaccio si appoggiano su una base di silicati piuttosto semplice: i poli di Ike fanno del loro meglio per sembrare "quasi interessanti".
        #JNSQscience_bd_XRayDiffract_IkeSrfLandedMountains_00 = Picchi fratturati e spostati dallo sforzo suggeriscono roccia dura scossa e spaccata: queste dorsali sembrano essersi formate senza alcun passaggio delicato.
