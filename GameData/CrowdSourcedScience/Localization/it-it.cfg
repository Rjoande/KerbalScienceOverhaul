        #CSS_seismicScan_BopSrfLandedPeaks_00 = La piccola luna risuona con una strana frequenza musicale. Collegando il segnale del sensore ad alcuni altoparlanti, la riconosci come una toccata.
        #CSS_seismicScan_BopSrfLandedRidges_00 = Il pianeta emette terremoti costanti che aumentano d'intensità quando Vall passa; quando se ne va, si calmano di nuovo. Questo sarebbe previsto se anche le altre lune facessero lo stesso.
