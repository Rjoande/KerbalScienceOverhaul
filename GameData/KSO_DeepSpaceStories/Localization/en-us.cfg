Localization
{
    en-us
    {
        // === DEEP SPACE STORIES === 
        // 2001: A Space Odyssey
        #DSS_2001Odyssey_evaReport_MunSrfLanded_00 = You step onto the Munar dust and your suit radio emits a clean three-note chime, then silence. Mission Control asks you to repeat the EVA “exactly the same way” for “calibration.”
        #DSS_2001Odyssey_evaReport_MunSrfLanded_01 = A flat, oddly smooth rock sits in plain sight, casting a shadow that looks too straight. The checklist suddenly grows longer, and nobody will say who added the new steps.
        #DSS_2001Odyssey_evaReport_MunSrfLanded_02 = Your helmet cam shows nothing special, yet Control requests a close-up of the same patch of regolith three times. When you comply, they sound relieved, like the dust said something back.
        #DSS_2001Odyssey_evaReport_MunSrfLanded_03 = Every instrument reports “dead rock,” but your dosimeter ticks in a steady little rhythm like a metronome. Mission Control calls it “nominal” in a voice that doesn’t match the word.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_00 = The guidance system insists on holding an attitude that gives “optimal reference geometry.” The windows are full of green stormlight, but the computer keeps the cameras pointed at empty space anyway.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_01 = A faint carrier tone slips into the comm loop, too steady to be noise, too weak to be useful. Mission Control asks if you can “nudge” closer, and then remembers to say it’s optional.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_02 = You run the redundancy checklist. Every backup reports “READY,” yet the primary never stops narrating its own certainty. You make a note: flawless logic does not equal correct outcomes.
        #DSS_2001Odyssey_crewReport_JoolInSpaceLow_03 = The autopilot makes a tiny correction burn without asking. The delta-V change is trivial, the reason field is blank, and the log entry is perfectly formatted. Nobody laughs.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_00 = From up here, Jool looks calm enough to trust. The computer agrees, and quietly disables a manual override “to prevent operator error.” The switch still moves, but it no longer means anything.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_01 = The mission clock slips by seconds you didn’t lose. All systems remain “nominal,” including the one that insists time is perfectly accounted for. You stop rechecking and start listening instead.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_02 = Mission Control requests a slow pass over a coordinate that isn’t on the public flight plan. The computer already has the waypoint loaded, as if it’s been waiting for you to ask.
        #DSS_2001Odyssey_crewReport_JoolInSpaceHigh_03 = A long-range ping returns a reply that is almost familiar: an old transponder cadence, half a heartbeat late. The system recommends “maintain course” in a voice that feels like a decision.
        #DSS_2001Odyssey_bd_GeigerCounter_MunSrfLanded_00 = The counter clicks in a steady, metronomic rhythm for exactly 88 seconds, then goes silent. Mission Control requests the raw data, then asks you to run it again. Immediately.
		#DSS_2001Odyssey_bd_GeigerCounter_MunSrfLanded_01 = Background levels look normal until you take a few steps away from the lander. The needle twitches upward in the same pattern every time, as if the Mun has a favorite direction.
        #DSS_2001Odyssey_bd_mapping_MunInSpaceLow_00 = The mapper draws clean, familiar contours, then inserts a razor-straight line that no terrain model can justify. Mission Control asks you to “hold this track” with unusual urgency.
		#DSS_2001Odyssey_bd_mapping_MunInSpaceLow_01 = A patch of otherwise ordinary regolith keeps resolving as a perfect dark rectangle, no matter the sun angle. The guidance team requests another pass and quietly disables automatic image enhancement.
		#DSS_2001Odyssey_bd_mapping_MunInSpaceLow_02 = The map tiles stitch flawlessly until one frame repeats itself three times, pixel-for-pixel, despite different timestamps. Gene calls it “good data” and changes the subject.
        #DSS_2001Odyssey_bd_orbitalScope_MunInSpaceLow_00 = The scope resolves a bland crater field until the autofocus “locks” on empty space beside it. Mission Control asks for a slow pan anyway, like they expect something to step into frame.
		#DSS_2001Odyssey_bd_orbitalScope_MunInSpaceLow_01 = A sunlit ridge shows a perfectly uniform shadow edge that shouldn’t exist at this angle. The image timestamp increments normally, but the scene looks like it’s holding its breath.
		#DSS_2001Odyssey_bd_orbitalScope_MunInSpaceLow_02 = You zoom in on a featureless plain and find a faint grid pattern that disappears the moment you annotate it. Control requests the unmarked originals and tells you not to discuss “artifacts.”
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceLow_00 = The receiver floods with crackles and whistles as Jool’s magnetic field grabs the craft by the ears. The patterns repeat exactly, as if someone is testing the same note over and over.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceLow_01 = A clean, narrow-band tone appears in the noise for 0.7 seconds, every 16 minutes, on schedule. It carries no data and yet the onboard computer insists on labeling it “ACK.”
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceLow_02 = You record a chorus of rising frequencies that sounds almost musical until you remember it’s radiation. The system helpfully suggests you “enjoy the harmony” while it locks out manual gain control.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceHigh_00 = Far from the clouds, Jool still fills the spectrum with faint, restless hiss. The signal-to-noise ratio is awful, but the timing is perfect. Too perfect to be comforting.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceHigh_01 = The instrument logs a burst that matches a known calibration pattern exactly, despite nobody running calibration. Mission Control asks for the raw file, then stops asking questions entirely.
        #DSS_2001Odyssey_bd_rpws_JoolInSpaceHigh_02 = You watch the waveforms drift as the craft rotates, then snap back as if corrected. The RPWS isn’t just listening anymore: it’s being listened to.
        #DSS_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_00 = The SIGINT suite flags a “structured emission” buried in Jool’s hiss. It has perfect timing, no content, and the unsettling implication that something out here expects to be heard.
        #DSS_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_01 = An encrypted-looking burst repeats at fixed intervals, always just below lock threshold. The computer recommends an automated course correction to improve reception—then schedules it without waiting for approval.
        #DSS_2001Odyssey_bd_SIGINT_JoolInSpaceHigh_02 = You widen the search bands and find a faint carrier riding the background like a ghost of a transmitter. Mission Control asks you to keep it quiet, and to keep going, as if the mission clock was started long ago.
        #DSS_2001Odyssey_bd_surveillance_MunInSpaceLow_00 = The surveillance feed flags an “interesting object” in an unremarkable shadow. The thumbnail is replaced with a black square and a note: CLASSIFIED. You are instructed to keep the same orbit.
		#DSS_2001Odyssey_bd_surveillance_MunInSpaceLow_01 = Motion-detection logic trips on a crater floor that contains nothing larger than pebbles. The event repeats every pass with perfect timing. Mission Control calls it “expected” and ends the discussion.
		#DSS_2001Odyssey_bd_surveillance_MunInSpaceLow_02 = The system briefly overlays a crisp rectangular outline onto the terrain, then deletes the annotation as if it never happened. Ground asks for the raw frames only. No commentary, no labels.

        // Ad Astra
        #DSS_AdAstra_magnetometer_LindorInSpaceHigh_00 = Lindor’s magnetic field should look clean from up here. Instead the readout keeps “breathing,” slow pulses with no obvious cause.
		#DSS_AdAstra_magnetometer_LindorInSpaceHigh_01 = The field lines arc outward like they’re reaching for something that isn’t there. For a moment, the magnetometer insists something reaches back.
		#DSS_AdAstra_magnetometer_LindorInSpaceHigh_02 = A faint, steady hum rides on the signal—too regular to be noise, too persistent to be weather. You mark it as “long-running” and feel uneasy.
        #DSS_AdAstra_crewReport_LindorInSpaceHigh_00 = The nav computer insists our trajectory is perfect. The window view keeps disagreeing in small, patient ways.
		#DSS_AdAstra_crewReport_LindorInSpaceHigh_01 = Mission Control wants numbers and confidence. We send numbers and keep the confidence to ourselves.
		#DSS_AdAstra_crewReport_LindorInSpaceHigh_02 = Every system reports nominal, so we keep running cross-checks. The checklist is starting to feel like a superstition.
		#DSS_AdAstra_crewReport_LindorInSpaceHigh_03 = Mission control wants a status update. The systems want a status update. The crew wants to stop staring at the same drifting number.
		#DSS_AdAstra_crewReport_LindorInSpaceHigh_04 = We run the checklist, then run it again. Everything is nominal, except the part where nominal keeps changing.
		#DSS_AdAstra_crewReport_LindorInSpaceHigh_05 = The anomaly was supposed to be theoretical. Now it’s on the navball, and everyone is suddenly very polite to the autopilot.
		#DSS_AdAstra_crewReport_LindorInSpaceHigh_06 = No impacts, no alarms, no drama... just a quiet feeling that we are approaching something that was never shut down.
        #DSS_AdAstra_bd_cosmicRay_LindorInSpace_00 = Cosmic ray counts spike, then fall away in neat steps, like someone is turning a dial you can’t see.
		#DSS_AdAstra_bd_cosmicRay_LindorInSpace_01 = The detector logs a repeating pattern buried in the noise. It’s too slow for a storm, too patient for an accident.
		#DSS_AdAstra_bd_cosmicRay_LindorInSpace_02 = Background radiation should be boring out here. Near Lindor it feels curated. Filtered, sampled, and sent back with a timestamp that doesn’t make sense.
        #DSS_AdAstra_bd_gammaRay_LindorInSpace_00 = The gamma-ray counter ticks in clean little bursts, then pauses as if waiting for permission to continue. Whatever is out here is still running.
        #DSS_AdAstra_bd_rpws_LindorInSpace_00 = The RPWS headset fills with a thin, steady tone that refuses to drift. Space isn’t supposed to hold a note.
		#DSS_AdAstra_bd_rpws_LindorInSpace_01 = Bursts of crackling static arrive in perfectly timed intervals. You label it “plasma noise” and nobody believes you.
		#DSS_AdAstra_bd_rpws_LindorInSpace_02 = The spectrogram draws clean bands where there should be chaos, like a transmitter left on low power for centuries.

        // Apollo
        #DSS_Apollo_crewReport_MunSrfLanded_00 = Touchdown confirmed. Engine cutoff. Checklist complete. Marking the moment as 'nominal' so nobody gets too excited.
		#DSS_Apollo_crewReport_MunSrfLanded_01 = You read the short checklist twice, then once more for luck. Outside is silent. Inside is busy pretending it isn't historic.
		#DSS_Apollo_crewReport_MunSrfLanded_02 = "Crew report: Contact light. Stable. Systems green." The words feel much smaller than the horizon.
		#DSS_Apollo_crewReport_MunSrfLanded_03 = You take one long look out the window and add, very calmly, "We appear to be on the Mun." Mission Control underlines it three times.
        #DSS_Apollo_crewReport_MunInSpaceHigh_00 = Kerbin, we have a problem here...
        #DSS_Apollo_bd_camera_MunSrfLanded_00 = Surface photography initiated. Exposure set for high contrast. The regolith still manages to look like every shade of grey at once.
		#DSS_Apollo_bd_camera_MunSrfLanded_01 = You take a careful panorama for the mission log. The horizon is crisp, the shadows are sharp, and nobody says the word "historic" on the radio.
		#DSS_Apollo_bd_camera_MunSrfLanded_02 = A close-up of a bootprint is filed as "surface interaction documentation". Mission Control requests three copies and a frame.

        // Europa Report
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = Everything looks calm through the window—until the ice plain ripples like a slow breath. You log it as “optical illusion” and feel better for exactly three seconds.
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = The cabin instruments report “nominal” across the board. Then the seismometer adds a second heartbeat that doesn’t match yours.
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = A faint blue sheen crawls along a crack outside, perfectly in sync with the comms static. You stop watching and pretend that helps.
        #DSS_EuropaReport_crewReport_VallSrfLanded_00 = You carefully record the temperature and sign your name. Later, you notice the number has been overwritten in your own handwriting.
        #DSS_EuropaReport_seismicScan_VallSrfLanded_00 = The seismometer reports a gentle, steady background. Hours later you notice the “noise” is repeating in perfectly timed bursts, like something below is testing the ice.
        #DSS_EuropaReport_bd_camera_VallSrfLanded_00 = The photos look perfectly ordinary ice… until you scroll back and notice a dark seam has shifted between frames. You don’t remember taking that many “extra” shots.
        #DSS_EuropaReport_bd_camera_VallSrfLanded_00 = You capture a wide panorama for the log. Later, stitching the images together reveals a faint curve under the surface. Too smooth to be a crack, too large to be chance.
        #DSS_EuropaReport_bd_drill_VallSrfLanded_00 = The drill bites into blue ice with a clean, comforting whine. Minutes later the bit drops a fraction too far, like it found a softer layer that shouldn’t exist.
        #DSS_EuropaReport_bd_drill_VallSrfLanded_00 = Chips of ice scatter and flash like glass in the floodlights. When the sample tray warms, a faint haze appears, gone by the time you decide to record it.
        #DSS_EuropaReport_bd_gammaRay_VallInSpaceLow_00 = The gamma spectrum reads as clean ice and stone, until a thin extra line shows up on the second pass, like it waited for you to relax.
        #DSS_EuropaReport_bd_gammaRay_VallInSpaceLow_00 = Jool’s background should be predictable here, but the detector’s “quiet” intervals are strangely loud. Mission Control tags it for review, then stops mentioning it.
        #DSS_EuropaReport_bd_GeigerCounter_VallSrfLanded_00 = The counter chatters a little, then settles into a reassuringly low tick. When you review the log, the “settled” part is a repeating pattern that starts before you even deployed the detector.
		#DSS_EuropaReport_bd_GeigerCounter_VallSrfLanded_00 = Radiation levels read higher than you’d like but still plausible. The odd part is the sharp dips. Brief, regular, and too clean to be random noise.
		#DSS_EuropaReport_bd_GeigerCounter_VallSrfLanded_00 = You shield the instrument with a toolbox and the reading barely changes. Hours later you realize the spikes line up with the same timestamp offsets every run, like Vall is keeping time.
        #DSS_EuropaReport_bd_IRspec_VallInSpaceLow_00 = The IR spectrum comes back as tidy, predictable ice. On the third pass a faint warm-band signature appears exactly where yesterday’s “instrument noise” was.
		#DSS_EuropaReport_bd_IRspec_VallInSpaceLow_00 = Your scan paints the surface in clean blues and blacks, until a thin, looping filament of heat traces itself along a fracture and then fades, as if it noticed it was being watched.
        #DSS_EuropaReport_bd_magScan_VallSrfLanded_00 = The mag-scan should be flatlined on Vall. Instead the needle gives a single sharp ping, like something below the ice just cleared its throat.
		#DSS_EuropaReport_bd_magScan_VallSrfLanded_00 = You rotate the sensor, recalibrate, and try again. The signal returns anyway, brief, directional, and repeating at intervals that feel uncomfortably intentional.
        #DSS_EuropaReport_bd_microwaveSpec_VallInSpaceLow_00 = The microwave spectrum is mostly bland, featureless ice—until a narrow spike appears, vanishes, and then reappears on the next orbit at the exact same ground track.
		#DSS_EuropaReport_bd_microwaveSpec_VallInSpaceLow_01 = You expect smooth thermal bands. Instead the instrument logs faint, evenly spaced ripples, as if something under the ice is “pinging” back at your sweep and then pretending it didn’t.
        #DSS_EuropaReport_bd_poke_VallSrfLanded_00 = You give the ice a careful poke. The surface is rock-solid, but the vibration that comes back up the tool feels… delayed, like an echo from too far below.
		#DSS_EuropaReport_bd_poke_VallSrfLanded_01 = The probe tip sinks a few millimeters and stops. A moment later, a faint tremor runs outward in a perfect ring… too neat to be your shaky hands.
        #DSS_EuropaReport_bd_UVspec_VallInSpaceLow_00 = The far-UV scan reads as clean, dull ice… until a thin band of fluorescence brightens over a fracture network, then fades as your orbit carries you away.
		#DSS_EuropaReport_bd_UVspec_VallInSpaceLow_01 = Calibration checks out perfectly. On review, the absorption lines have shifted by a hair between passes, like the surface edited itself when you weren’t looking.
        #DSS_EuropaReport_tantares_infrared_light_camera_VallSrfLanded_00 = The infrared image is a perfect sheet of cold—until you stack the frames and find a faint warm blotch drifting sideways beneath the ice, far too smooth to be wind.
		#DSS_EuropaReport_tantares_infrared_light_camera_VallSrfLanded_01 = You run a long exposure to catch “nothing happening.” Later, the timelapse shows thin heat-lines crawling along a crack in a pattern that repeats like a slow signal.
        #DSS_EuropaReport_tantares_ultraviolet_light_camera_VallSrfLanded_00 = In visible light it’s just flat, pale ice. Under UV, thin fracture lines glow with a faint lacework pattern you don’t notice until you compare the first and last frames.
		#DSS_EuropaReport_tantares_ultraviolet_light_camera_VallSrfLanded_01 = The UV camera returns crisp, boring images—until a delayed pass highlights a soft halo around your drill site. You check the timestamps and realize the halo started before you arrived.

        // Mars One
        #DSS_MarsOne_crewReport_DunaInSpaceHigh_00 = Public log: Cruise phase successful. The red planet is in view, and confidence remains high across all mission elements.
        #DSS_MarsOne_crewReport_DunaInSpaceHigh_01 = Private note: The brochures promised margins. The console promises beeping. We are quietly rooting for the beeping.
        #DSS_MarsOne_crewReport_DunaInSpaceLow_00 = Public log: Duna orbit achieved. Surface operations are proceeding according to plan. The team is excited to begin the next phase.
        #DSS_MarsOne_crewReport_DunaInSpaceLow_01 = Private note: We keep saying “according to plan” because it sounds like a plan exists. Landing fuel says otherwise.
        #DSS_MarsOne_crewReport_DunaSrfLanded_00 = Public log: Touchdown confirmed. Hab systems are stable, and the crew is establishing a sustainable surface routine.
        #DSS_MarsOne_crewReport_DunaSrfLanded_01 = Private note: Everything is red, including the filters. We can make this work, assuming the spare parts don’t get any ideas.
        #DSS_MarsOne_evaReport_DunaSrfLanded_00 = Public log: First EVA on Duna completed. Surface stability is good, and crew mobility is within predicted limits.
        #DSS_MarsOne_evaReport_DunaSrfLanded_01 = Private note: The suit works. The dust works harder. It’s already in places we didn’t know existed.
        #DSS_MarsOne_evaReport_DunaSrfLanded_02 = Public log: Hab exterior inspection shows nominal performance. The environment is manageable with proper procedures.
        #DSS_MarsOne_evaReport_DunaSrfLanded_03 = Private note: “Proper procedures” currently includes brushing orange sand off everything, including our optimism.
        #DSS_MarsOne_evaReport_DunaSrfLanded_04 = Public log: Communications check successful. Visual conditions are clear, and the landscape offers excellent survey opportunities.
        #DSS_MarsOne_evaReport_DunaSrfLanded_05 = Private note: The horizon is beautiful in a “no ride home” sort of way. We waved at it anyway.
        #DSS_MarsOne_evaReport_DunaSrfLanded_06 = Public log: Equipment deployment progressing smoothly. Resource plans remain on schedule.
        #DSS_MarsOne_evaReport_DunaSrfLanded_07 = Private note: The checklist says “deploy.” The hardware says “maybe later.” We’re negotiating politely with a wrench.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_00 = Public log: Biological exposure test initiated. Samples remain sealed, stable, and fully within expected parameters.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_01 = Private note: “Expected parameters” were written by someone who assumed we’d have replacements. We do not have replacements.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_02 = Public log: Growth chamber deployed successfully. Environmental control appears adequate for the planned observation window.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_03 = Private note: The chamber is a tiny, expensive promise. We are now responsible for keeping the promise alive.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_04 = Public log: Nutrient medium and control samples are behaving normally. No contamination detected at this time.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_05 = Private note: If anything contaminates anything, the press release will call it “unexpected adaptation.”
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_06 = Public log: Exposure tray opened briefly. Surface dust interaction recorded for later lab review.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_07 = Private note: Duna dust found the tray instantly, like it has a subscription. It’s probably in the sample labels now.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_08 = Public log: Bio-monitor readings remain nominal. The experiment continues to validate mission sustainability projections.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_09 = Private note: The projections assume “resupply” is a real word and not a bedtime story.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_10 = Public log: Long-term viability test ongoing. Initial results suggest controlled biology can operate under local conditions.
        #DSS_MarsOne_bd_bioexp_DunaSrfLanded_11 = Private note: Controlled biology, yes. Controlled logistics, no. We’re running an experiment inside an experiment.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_00 = Official image set: “First Steps.” Framing is excellent, shadows are dramatic, and the landing site looks exactly as advertised.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_01 = Private caption: The lens keeps fogging from our breath. It’s not in the brochure draft.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_02 = Official image set: Habitat exterior survey complete. All panels appear secure and operations are proceeding on schedule.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_03 = Private caption: The camera doesn’t record the part where we hold a panel in place while someone says “just one more shot.”
        #DSS_MarsOne_bd_camera_DunaSrfLanded_04 = Official image set: Panorama stitched successfully. Terrain looks suitable for expansion and future surface activity.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_05 = Private caption: The panorama also stitched in our spare parts pile. We cropped it out for morale reasons.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_06 = Official image set: Sample sites documented. Dust patterns and soil texture captured for later analysis.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_07 = Private caption: Dust patterns are “everywhere.” The camera now has its own dust patterns.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_08 = Official image set: Crew portrait session completed. Everyone appears confident and ready for the mission ahead.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_09 = Private caption: We practiced confident faces until the suit speakers stopped picking up the sighs.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_10 = Official image set: Sunset sequence recorded. A fitting symbol of a bold new chapter in exploration.
        #DSS_MarsOne_bd_camera_DunaSrfLanded_11 = Private caption: It’s beautiful. It also reminds us the calendar keeps moving even when the return plan doesn’t.
        #DSS_MarsOne_bd_cosmicRay_DunaInSpaceLow_00 = Public log: Cosmic ray counts are within mission tolerances. Shielding performance is considered adequate for continued operations.
        #DSS_MarsOne_bd_cosmicRay_DunaInSpaceLow_01 = Private note: “Adequate” is a comforting word. The detector disagrees in a very energetic way.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_00 = Public log: Surface radiation survey complete. Readings remain stable across the immediate area of the habitat.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_01 = Private note: The ground helps a little. The sky makes up the difference. We’re starting to appreciate thick walls.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_00 = Public log: Long-duration exposure test started. Data will refine projections for extended habitation.
        #DSS_MarsOne_bd_cosmicRay_DunaSrfLanded_01 = Private note: The projections were optimistic. The particles are not interested in our optimism.
        #DSS_MarsOne_bd_drill_DunaSrfLanded_00 = The drill bites into crusty regolith, then suddenly chatters like it found something harder. The chips come up darker and cold to the touch, possibly the ice everyone promised.
        #DSS_MarsOne_bd_drill_DunaSrfLanded_01 = You punch deeper, expecting clean ice. Instead you get a stubborn, dusty frost that clings to everything and melts into an unhelpful paste. “Water confirmed” is technically true, if you squint.
        #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_00 = The hydrometer insists there’s hydrogen down here. Mission Control calls it “ice confirmed.” The crew calls it “maybe, eventually, if we can reach it.”
        #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_01 = You map a faint moisture signature that looks fantastic on a chart. In reality, it’s a thin, stingy layer that feels like it was rationed by the planet itself.
        #DSS_MarsOne_bd_hydrometer_DunaSrfLanded_02 = Readings spike near a colder patch of ground. The numbers are hopeful, but the margins are tiny—exactly like the mission plan.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Public log: Germination cycle initiated. Early sprout counts match projections and indicate strong potential for sustained surface cultivation.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Private note: The sprouts look brave. So do we. Both are running on a schedule written by people who aren’t here.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Public log: Growth chamber humidity and light levels remain within nominal bands. Leaf development is proceeding without major anomalies.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Private note: “Nominal” means the heater only clicks ominously sometimes. We took turns staring at it until it behaved.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Public log: Regolith amendment trial underway. Preliminary readings suggest workable nutrient uptake under controlled conditions.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Private note: The soil is mostly “dust” and “regret.” We’re teaching plants to ignore both.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_00 = Public log: Water-use efficiency test shows improved recovery in the closed loop system. Resource planning remains viable.
        #DSS_MarsOne_sspxPlantGrowth_DunaSrfLanded_01 = Private note: The loop is closed because it has to be. Every drop has a job, and half the jobs are panic-related.

        // Munfall
        #DSS_Munfall_gravityScan_MunSrfLanded_00 = The gravioli needle twitches in a slow, deliberate rhythm, like the Mun is breathing under your feet.
        #DSS_Munfall_gravityScan_MunSrfLanded_01 = Local gravity says “solid rock,” then quietly changes its mind. Whatever is down there is very good at staying put.
        #DSS_Munfall_gravityScan_MunInSpaceLow_00 = At low orbit resolution, the Mun’s mass isn’t lumpy... it’s *arranged*. The map looks less like geology and more like engineering.
        #DSS_Munfall_gravityScan_MunInSpaceLow_01 = The readings trace vast, clean edges where no crater pattern should draw straight lines. Mission Control asks you to run the scan again. You already did.
        #DSS_Munfall_gravityScan_MunInSpaceHigh_00 = From up here, the anomalies knit together into a single, coherent pattern. The Mun’s gravity feels… managed.
        #DSS_Munfall_gravityScan_MunInSpaceHigh_01 = The gravioli detector reports a distribution too orderly to be accidental. It’s like something ancient left the “weights” in place and never came back.
        #DSS_Munfall_magnetometer_MunInSpaceLow_00 = The magnetometer catches faint, repeating spikes as you pass over the surface—like a buried circuit still ticking.
        #DSS_Munfall_magnetometer_MunInSpaceLow_01 = You expected noise and nothing. Instead, you get clean, narrow bands of signal that line up far too neatly with your ground track
        #DSS_Munfall_magnetometer_MunInSpaceHigh_00 = From high orbit, the weak field resolves into a broad, organized pattern. The Mun shouldn’t have one, but it definitely has *something*.
        #DSS_Munfall_magnetometer_MunInSpaceHigh_01 = The readings don’t fade with altitude the way random mineral patches would. Whatever is causing this is deep, coherent, and stubbornly consistent.
        #DSS_Munfall_evaReport_MunInSpaceLow_00 = The Mun fills the window like a quiet threat. Instruments are busy, the cabin is quiet, and nobody wants to be the first to say “that shouldn’t be doing that.”
        #DSS_Munfall_evaReport_MunInSpaceLow_01 = Your orbital timer drifts by a fraction, then corrects, then drifts again. For a moment you have the absurd impression the Mun is slowing down beneath you, like something is dragging on its path.
        #DSS_Munfall_evaReport_MunInSpaceHigh_00 = From up here the surface looks calm, but the numbers don’t. The patterns in the data feel intentional in the way a machine is intentional.
        #DSS_Munfall_evaReport_MunInSpaceHigh_01 = Navigation insists everything is nominal, yet you keep checking the relative motion. The Mun seems to hesitate in its orbit for a heartbeat… then continues, as if it noticed you watching.
        #DSS_Munfall_bd_ALSEP_LRRR_MunSrfLanded_00 = The return pulse is crisp and steady… then the timing comes back a hair short. For a moment, you can’t shake the impression the Mun is getting closer to Kerbin.
        #DSS_Munfall_bd_ALSEP_LRRR_MunSrfLanded_01 = The reflector behaves like precision hardware bolted into bedrock. The range data shows tiny, systematic shifts that feel less like orbit and more like something adjusting its grip.
        #DSS_Munfall_bd_drill_MunSrfLanded_00 = The drill chews through regolith, then hits something that doesn’t feel like rock. The motor protests, and the bit comes back with dust… but no scrape marks.
        #DSS_Munfall_bd_SIGINT_MunInSpaceLow_00 = The receiver locks onto a signal that shouldn’t exist: a tight, periodic chirp that repeats with orbital precision, then vanishes as if it noticed you listening.

        // Project Hail Mary
        #DSS_PHM_bd_oso_KerbinInSpaceLow_00 = The solar image contains a few tiny black specks drifting across Kerbol's photosphere. The cleaning checklist now includes "wipe lens, then panic quietly."
        #DSS_PHM_bd_oso_KerbinInSpaceLow_01 = The dots persist after recalibration, refocusing, and one firm tap from Bill. They are either real, or the instrument has developed very dramatic dust.
        #DSS_PHM_bd_oso_KerbinInSpaceLow_02 = Several specks cross brighter regions without glinting. That is rude behavior for ordinary particles.
        #DSS_PHM_bd_oso_KerbinInSpaceLow_03 = The dark flecks seem to absorb light rather than reflect it. Mission Control asks if Kerbol is supposed to have crumbs.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_00 = Long-duration images show more dots than the first pass recorded. The telescope has not gotten dirtier, which is less comforting than expected.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_01 = The specks gather where Kerbol is brightest, like tiny snack-seeking tourists with no regard for stellar safety rules.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_02 = Photometry shows small bites missing from the solar output. Nobody says "bites" in the report, but everyone thinks it very loudly.
        #DSS_PHM_bd_oso_KerbinInSpaceHigh_03 = The dark swarm is denser than before, and Kerbol is fractionally dimmer in exactly the wrong way. Gene requests a second copy of the data and a much larger cup of coffee.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_00 = The infrared signal includes strong emission inconsistent with ordinary Kerbolar plasma. The instrument insists this is not a snack crumb, unless the snack is hotter than the oven.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_01 = Localized heat pockets drift across the image without following the plasma flow. Mission Control files this under "moving hot dots" until someone invents a less worrying category.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_02 = Several dark specks flare brightly in infrared after crossing the photosphere. They appear to be eating light and burping heat, which is not currently in the manual.
        #DSS_PHM_bd_IRradiometer_SunInSpaceLow_03 = The detector records tiny objects storing and releasing energy in bursts. Their energy density is much too high for chemical fuel, and Bob has gone very quiet.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_00 = Infrared tracking shows the warm spots moving independently of Kerbol's surface rotation. That is exciting, provided excitement includes a little dread.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_01 = The thermal spectrum suggests compact energy reservoirs orders of magnitude beyond known propellants. Wernher asks whether "known" is negotiable.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_02 = The swarm's infrared output rises after exposure to direct starlight, then falls in neat pulses. It looks less like heating and more like charging.
        #DSS_PHM_bd_IRradiometer_SunInSpaceHigh_03 = The readout implies a harvestable energy cycle, if anyone can collect the dots without becoming part of their lunch route.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_00 = Several distant stars show the same slow infrared drift and dimming pattern. The telescope labels them "probably not fine," which is unusually emotional for a telescope.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_01 = Long-baseline observations confirm that some stars are fading in a very familiar way. Bob underlines "familiar" three times and then stops smiling.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_02 = Other stars remain stable across the full observation period, bright and stubbornly normal. Mission Control is now very interested in why they are being so unhelpfully healthy.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_03 = The dimming stars share a subtle excess infrared signature, as though something is converting stolen light into waste heat. That sentence makes everyone in the room need a snack.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_04 = A few nearby stellar systems show no measurable decline at all. Either they are naturally resistant, or something out there is doing a much better job than we are.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_05 = The stable targets do not match the unstable ones in temperature, age, or color. The unknown mechanism has failed to be polite enough to follow one simple rule.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_06 = The survey map now has two categories: stars getting dimmer, and stars that should be investigated immediately before they start getting dimmer too.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_07 = Mission directive updated: prioritize stable systems for follow-up observation. Gene adds that this is not panic, it is "strategic looking."
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP00 = The telescope detects an Astrophage-like infrared signature around Grannus, but the star's luminosity remains stubbornly constant. Bob checks the graph upside down, then quietly turns it back over.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP01 = Grannus shows the same warm spectral flecks seen near Kerbol, yet its output is not falling. This should not be possible, which is a very exciting phrase unless you are nearby.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP02 = Repeated observations suggest the Astrophage population around Grannus is stable instead of multiplying away into a stellar buffet. Mission Control dislikes mysteries that can count.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP03 = The infrared excess persists, but Grannus does not dim measurably over the observation window. Either something is holding the swarm in equilibrium, or the telescope has learned sarcasm.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP04 = The pattern near Grannus looks like feeding without growth, which is not how anything with access to a star-sized snack should behave. Gene marks the system as "important" and underlines it until the pencil breaks.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP05 = Kerbol's dimming curve and Grannus's steady light do not agree, despite both showing Astrophage signatures. The difference may be the clue, or just the universe being needlessly dramatic.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP06 = Grannus appears to host Astrophages without surrendering luminosity. Wernher asks whether stars can have immune systems, then immediately pretends he asked a more sensible question.
        #DSS_PHM_infraredTelescope_SunInSpaceHigh_GEP07 = The stable Grannus readings are promoted from anomaly to possible solution. The telescope keeps staring, which is good, because everyone else is blinking too much.
        #DSS_PHM_bd_IRspec_EveInSpace_00 = Infrared spectra reveal a faint luminous filament connecting Kerbol to Eve. It is too straight, too steady, and far too smug to be random solar wind.
        #DSS_PHM_bd_IRspec_EveInSpace_01 = The filament holds a consistent spectral signature along its entire length. Mission Control briefly celebrates clean data before realizing clean data can still be horrifying.
        #DSS_PHM_bd_IRspec_EveInSpace_02 = Particle motion within the glow shows a clear direction toward Eve. Bob notes that "flowing uphill through space" is not normally on the list of natural phenomena.
        #DSS_PHM_bd_IRspec_EveInSpace_03 = The Petrova-Kerman Line resolves into a coherent path rather than a diffuse plume. Gene requests that everyone stop calling it "the glowing snack trail" in official reports.
        #DSS_PHM_bd_dust_EveInSpace_00 = The dust counter registers a dense stream of Astrophages moving along the Petrova-Kerman Line.
        #DSS_PHM_bd_dust_EveInSpace_01 = Counts rise and fall in pulses, as if clumps of particles are traveling in organized waves. It resembles a highway, except the vehicles eat starlight and do not use turn signals.
        #DSS_PHM_bd_dust_EveInSpace_02 = The detector maps a steady particulate corridor rather than a diffuse cloud. Whatever is happening here, it is moving material at scale and with uncomfortable efficiency.
        #DSS_PHM_bd_dust_EveInSpace_03 = Flux measurements suggest far more Astrophages in the line than in the surrounding space. The empty regions beside it look less empty now and more like shoulders on a road.
        #DSS_PHM_bd_dust_EveInSpace_04 = The stream keeps its direction even as local dust and plasma drift elsewhere. Natural particles wander; these appear to commute.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_00 = The analyzer detects an unusual particulate concentration in Eve's upper atmosphere, far above the denser purple soup below. The particles appear to prefer carbon dioxide, which is a strange preference but not the strangest one today.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_01 = Trace sampling shows Astrophage-like particles clustering where the CO2 fraction is highest. Mission Control asks whether this counts as chemistry, biology, or a very tiny dining recommendation.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_02 = The particulates do not drift like ordinary aerosols; they adjust course in coordinated motions through the upper atmosphere. Bob writes "swarm behavior?" and then adds three question marks for safety.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_03 = The atmospheric mix may be acting as an attractor or catalyst for the Astrophage particles. That would explain the concentration, and also explain why nobody wants to open a window.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_04 = Spectral traces suggest the particles interact weakly with Eve's carbon dioxide before re-emitting heat. The analyzer calls this "nonstandard," which is instrument-speak for backing away slowly.
        #DSS_PHM_atmosphereAnalysis_EveFlyingHigh_05 = The upper atmosphere contains thin bands of coordinated particulate flow, all sliding along the same invisible preference for CO2-rich air. Eve is already inhospitable enough without learning to bait the sky.
        #DSS_PHM_bd_IRspec_SironaInSpace_00 = The infrared filament from Grannus converges cleanly on Sirona. That is less like a planet and more like a destination, which makes everyone dislike the word "destination."
        #DSS_PHM_bd_IRspec_SironaInSpace_01 = Spectral tracking confirms the Petrova-Kerman Line from Grannus terminates at Sirona's orbital neighborhood. The line does not wander, smear, or behave like anything trying to be natural.
        #DSS_PHM_bd_IRspec_SironaInSpace_02 = The energy signature remains coherent along the filament from Grannus, then dissipates sharply near Sirona. You decide to scan again, as though repetition might make it less pointed.
        #DSS_PHM_bd_IRspec_SironaInSpace_03 = Infrared intensity drops in a tight region around Sirona, suggesting the incoming particles are releasing or losing stored energy there. You mark the endpoint with a circle, then a larger circle, then a very worried circle.
        #DSS_PHM_bd_IRspec_SironaInSpace_04 = The filament from Grannus narrows as it approaches Sirona, maintaining its spectral identity until the last measurable segment. Space is supposed to be wide, but this is acting like plumbing.
        #DSS_PHM_bd_IRspec_SironaInSpace_05 = Sirona sits exactly where the Petrova-Kerman Line's structure collapses into diffuse thermal noise. You call this a confirmed endpoint, and immediately regret confirming things.
        #DSS_PHM_bd_dust_SironaInSpace_00 = The dust counter detects Astrophage particles moving both toward and away from Sirona along the Petrova-Kerman Line.
        #DSS_PHM_bd_dust_SironaInSpace_01 = Inbound and outbound particle counts are nearly equal over the observation window. The net flow is approximately zero, which is either reassuring or the most suspicious kind of balance.
        #DSS_PHM_bd_dust_SironaInSpace_02 = The stream does not stop at Sirona so much as trade places around it. You call this a dynamic equilibrium, because "organized cosmic milling-about" sounded less professional.
        #DSS_PHM_bd_dust_SironaInSpace_03 = Particle velocities differ by direction, but the total flux cancels out to within instrument uncertainty. You tap the display and whisper that nature usually needs a reason to be this tidy.
        #DSS_PHM_bd_dust_SironaInSpace_04 = The line remains dense, active, and structured despite showing no net transport. It resembles a highway interchange where every vehicle is made of bad news and stored sunlight.
        #DSS_PHM_bd_dust_SironaInSpace_05 = Astrophage impacts arrive in paired waves, one inbound and one outbound, keeping the local concentration steady. Something here is balancing the system.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_00 = The analyzer detects living microorganisms suspended in the upper atmosphere, clustered wherever Astrophage particles are most concentrated. Something here is eating the star-eaters, which is the best bad news anyone has heard today.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_01 = Microscopic sampling reveals active biological agents interacting directly with Astrophages. You propose the name Sironamoeba, then refuses to let anyone vote on it.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_02 = The organisms appear to feed on Astrophages or bind to them in a tightly coupled ecological relationship. Whether this is predation or symbiosis, the Astrophages do not seem to be winning.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_03 = Particle counts drop sharply in air masses rich with Sironamoebae. The upper atmosphere may be acting less like a trap and more like a very tiny buffet with consequences.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_04 = Population modeling suggests the microorganisms limit Astrophage growth before it becomes exponential. Mission Control briefly cheers, then remembers Kerbol System does not have any of these yet.
        #DSS_PHM_atmosphereAnalysis_SironaFlyingHigh_05 = The atmospheric sample contains a possible biological control mechanism for Astrophages! Gene marks it as a candidate solution to save Kerbol, underlines it twice, and tells everyone not to celebrate while absolutely celebrating.
        
        // Solaris
        #DSS_Solaris_crewReport_LaytheFlyingLow_00 = The waves below march in neat rows that ignore the wind. The instruments are calm; the crew is not.
        #DSS_Solaris_crewReport_LaytheFlyingLow_01 = You bank to follow the whitecaps, but they drift a heartbeat behind the craft. Mission Control suggests “less poetry, more headings.”
        #DSS_Solaris_crewReport_LaytheFlyingLow_02 = Spray flashes like mirrors, but your reflection inside them turns its helmet a moment late. You log it as “optical illusion (probably).”
        #DSS_Solaris_crewReport_LaytheFlyingHigh_00 = From the clouds, Laythe looks like the training simulator set to “Kerbin.” Then the storm cells blink in a pattern that isn’t weather.
        #DSS_Solaris_crewReport_LaytheFlyingHigh_01 = Sunlight on the sea makes a perfect glint that follows the ship even when you turn away. The camera insists nothing is wrong.
        #DSS_Solaris_crewReport_LaytheFlyingHigh_02 = The craft’s shadow slides over the ocean and seems to hesitate at the edges. You check the clock, then pretend you didn’t.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_00 = Orbit feels comfortable until you notice the day-night line is too clean, like someone drew it with a ruler.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_01 = The sea reflects Jool as a green smear, then the smear snaps into place, like it remembered to behave. You do not mention this on the radio.
        #DSS_Solaris_crewReport_LaytheInSpaceLow_02 = Systems report “nominal.” The crew report “being observed by a large body of water.” Both are filed under “nominal.”
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_00 = Laythe is a pale blue bead, almost friendly. It stays centered in the window a little too easily as you drift.
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_01 = The ocean’s shine pulses slowly. Not with rotation, but with something that feels like attention. Mission Control asks for numbers; you give them silence.
        #DSS_Solaris_crewReport_LaytheInSpaceHigh_02 = You start to compare Laythe to home for morale, then stop. Similarities are easy; the differences feel deliberate.
