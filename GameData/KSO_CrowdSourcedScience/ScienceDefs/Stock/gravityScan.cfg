        DunaInSpaceLowNorthernShelf* = #CSS_gravityScan_DunaInSpaceLowNorthernShelf_01 // The various gravimetric lines go crazy, probably related to the giant canyon below. You didn't need this fancy kit to spot it.
        DunaInSpaceLowMidlandCanyon* = #CSS_gravityScan_DunaInSpaceLowMidlandCanyon_00 // No major variations are detected, aside from a tiny drop in overall gravity as you pass over the valley.
        DunaInSpaceLowEasternCanyon* = #CSS_gravityScan_DunaInSpaceLowEasternCanyon_00 // Readings scroll across the screen, and when you pass over the canyon gravity drops slightly while the Kouguer reading spikes.
