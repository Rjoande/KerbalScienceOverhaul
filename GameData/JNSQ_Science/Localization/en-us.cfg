		#JNSQscience_evaReport_TamInSpaceLowCraters_00 = Shadows pile into every dent and bowl. It’s like Tam is storing darkness for later.
		#JNSQscience_evaReport_TamInSpaceLowPockmarks_00 = The pockmarks blur into a freckled pattern from up here. You wonder who “tested” the surface so thoroughly.
