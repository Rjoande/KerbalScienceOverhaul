        #JNSQscience_bd_IRradiometer_AdenInSpaceLowPoles_00 = Le regioni polari sono una mappa di pozzi freddi e ombre lunghe, con minuscoli bordi caldi a mezzogiorno locale.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceHigh_00 = Da un'orbita alta, la foschia ambrata di Huygen brilla dolcemente: il radiometro misura soprattutto atmosfera, non suolo.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowLowlands_00 = I bassopiani trattengono calore più a lungo del previsto, come se l'aria densa rimboccasse la superficie di notte.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowMidlands_00 = Gradienti morbidi ovunque. Foschia e meteo levigano la mappa termica come un filtro scadente.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowHighlands_00 = Il terreno più alto risulta più freddo e più netto: le dorsali iniziano a comparire dove la nebbia si dirada.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowMountains_00 = Le montagne scavano ombre fredde accanto a pendii più caldi, e l'atmosfera sfuma ogni bordo duro.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowPeaks_00 = I picchi si raffreddano in fretta e impennano il grafico come aghi, spuntando per poco sopra la coperta calda dell'aria.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari sono freddi ma stabili, come se l'atmosfera stesse facendo tutta la media al posto tuo.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowPoles_00 = I poli risultano tenui e ostinatamente uniformi. Qualunque cosa significhi "stagione" qui, significa comunque "freddo".
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowPolarHighlands_00 = Le colline polari sono i pixel più freddi della mappa: lo strumento chiede in silenzio un trasferimento.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowShores_00 = Le coste si disegnano nell'infrarosso: terra più calda, liquido più fresco e una sottile fascia d'indecisione in mezzo.
        #JNSQscience_bd_IRradiometer_HuygenInSpaceLowMethaneLakes_00 = I laghi di metano appaiono come ovali scuri e freschi. Il radiometro aggiunge "non ammarare" alle note.
        #JNSQscience_bd_IRradiometer_RigaInSpaceHigh_00 = Da un'orbita alta, la mappa del calore di Riga sembra insolitamente liscia, come se un velo sottile stesse attenuando gli estremi.
        #JNSQscience_bd_IRradiometer_RigaInSpaceLowLowlands_00 = I bacini trattengono calore più a lungo del previsto: qualcosa sta distribuendo il calore con delicatezza.
        #JNSQscience_bd_IRradiometer_RigaInSpaceLowMidlands_00 = Le pianure irradiano un bagliore basso e uniforme: quieto, stabile e sospettosamente "confortevole".
        #JNSQscience_bd_IRradiometer_RigaInSpaceLowHighlands_00 = Le colline si raffreddano ancora in fretta, ma il contrasto è leggermente sfocato ai bordi.
        #JNSQscience_bd_IRradiometer_RigaInSpaceLowMountains_00 = Le montagne mostrano i classici pendii caldi e ombre fredde, ammorbiditi quanto basta per notarlo.
        #JNSQscience_bd_IRradiometer_RigaInSpaceLowPoles_00 = I poli restano freddi e stabili, come se Riga stesse centellinando ogni ultimo grado.
        #JNSQscience_bd_IRradiometer_TalosInSpaceHigh_00 = Talos è una brace tenue in mezzo a tanto nero: l'unico entusiasmo è lo scatto termico netto al terminatore.
        #JNSQscience_bd_IRradiometer_TalosInSpaceLowLowlands_00 = I bassopiani trattengono calore un po' più a lungo, e suggeriscono regolite fine che fa da coperta sottile.
        #JNSQscience_bd_IRradiometer_TalosInSpaceLowMidlands_00 = Le pianure risultano bitorzolute nell'infrarosso: texture miste, emissività mista, sensazioni miste.
        #JNSQscience_bd_IRradiometer_TalosInSpaceLowHighlands_00 = Le colline passano dal caldo al freddo in un istante: il radiometro disegna ogni dorsale senza bisogno di una fotocamera.
        #JNSQscience_bd_IRradiometer_TalosInSpaceLowMountains_00 = Picchi a spillo lampeggiano luminosi e poi svaniscono nell'ombra fredda, come se schivassero il sole.
        #JNSQscience_bd_IRradiometer_TalosInSpaceLowPoles_00 = Le letture polari sono per lo più "fredde", con occasionali bordi tiepidi dove la luce riesce a posarsi.
        #JNSQscience_bd_IRradiometer_EelooInSpaceLowPoles_00 = I poli sono una firma fredda tenue e ostinata. Ghiaccio che si rifiuta di "scaldarsi" per gli strumenti.
        #JNSQscience_bd_IRradiometer_EelooInSpaceLowHighlands_00 = Il ghiaccio mostra gradienti termici netti: le colline si raffreddano nell'istante in cui finiscono in ombra.
        #JNSQscience_bd_IRradiometer_EelooInSpaceLowMidlands_00 = Le pianure restituiscono un segnale liscio e costante. Inerzia termica che fa il suo lavoro, in silenzio e con pazienza.
        #JNSQscience_bd_IRradiometer_EelooInSpaceLowLowlands_00 = Le zone basse risultano leggermente "più calde" per Eeloo, e suggeriscono ghiaccio compattato o graniglia più scura mescolata.
        #JNSQscience_bd_IRradiometer_EelooInSpaceLowCanyon_00 = Il canyon è un taglio freddo sulla mappa, con sottili bordi tiepidi dove la luce riesce ad arrivare.
        #JNSQscience_bd_IRradiometer_CelesInSpaceHigh_00 = Celes è un puntino freddo: la traccia IR sale a malapena sopra il rumore finché il terminatore non scatta in vista.
        #JNSQscience_bd_IRradiometer_CelesInSpaceLowLowlands_00 = I bassopiani trattengono calore un po' più a lungo, come se la polvere fine facesse del suo meglio per imitare un isolante.
        #JNSQscience_bd_IRradiometer_CelesInSpaceLowMidlands_00 = Le pianure mostrano un disegno di emissività a chiazze. Ghiaccio e graniglia mescolati, opinioni mescolate in laboratorio.
        #JNSQscience_bd_IRradiometer_CelesInSpaceLowHighlands_00 = Le colline passano dal caldo al freddo con bordi affilati come rasoi: qui le ombre sono estremamente efficaci.
        #JNSQscience_bd_IRradiometer_CelesInSpaceLowMountains_00 = Spine fredde e pendii più caldi disegnano le montagne nell'infrarosso come un tratto di matita.
        #JNSQscience_bd_IRradiometer_CelesInSpaceLowPoles_00 = I poli restano ostinatamente scuri e freddi, e suggeriscono luoghi dove volatili vaganti potrebbero nascondersi.
        #JNSQscience_bd_IRradiometer_TamInSpaceHigh_00 = La firma termica di Tam sfarfalla mentre rotola: il radiometro registra un oggetto piccolo con grandi sbalzi d'umore.
        #JNSQscience_bd_IRradiometer_TamInSpaceLowLowlands_00 = I bassopiani scuri si scaldano in fretta e si raffreddano ancora più in fretta. Classico comportamento da "sasso piccolo, zero pazienza".
        #JNSQscience_bd_IRradiometer_TamInSpaceLowMidlands_00 = Le pianure risultano bitorzolute e rumorose, come una pila di macerie che litiga con la tua calibrazione.
        #JNSQscience_bd_IRradiometer_TamInSpaceLowHighlands_00 = Le dorsali al sole divampano luminose, poi svaniscono nell'ombra fredda non appena si voltano altrove.
        #JNSQscience_bd_IRradiometer_TamInSpaceLowTwinCraters_00 = I crateri gemelli si raffreddano a velocità diverse: o i materiali sono diversi, oppure un cratere fa semplicemente il difficile.
        #JNSQscience_bd_IRradiometer_TamInSpaceLowCraters_00 = Bordi caldi e fondi freddi fanno risaltare i crateri nell'infrarosso come segnali di avvertimento.
        #JNSQscience_bd_IRradiometer_TamInSpaceLowPockmarks_00 = Le vaiolature punteggiano la mappa di minuscoli punti caldo freddo, come se la superficie avesse uno sfogo termico.
        #JNSQscience_bd_IRradiometer_HamekInSpaceHigh_00 = Anche da un'orbita alta, lo strano rossore di Hamek porta con sé un bilanciamento infrarosso leggermente "sbagliato" che si rifiuta di fare una media.
        #JNSQscience_bd_IRradiometer_HamekInSpaceLowLowlands_00 = I bassopiani risultano appena più caldi del previsto. Materiale più scuro, migliore assorbimento del calore, più domande.
        #JNSQscience_bd_IRradiometer_HamekInSpaceLowMidlands_00 = Le pianure danno un bagliore liscio e costante: freddo, coerente e silenziosamente inquietante.
        #JNSQscience_bd_IRradiometer_HamekInSpaceLowHighlands_00 = Le colline mostrano gradienti termici netti dove il suolo chiaro di brina incontra la roccia più scura.
        #JNSQscience_bd_IRradiometer_HamekInSpaceLowPoles_00 = I poli risultano profondi pozzi di freddo con ombre longeve. Terreno ideale per qualunque cosa ami restare congelata.
        #JNSQscience_bd_IRradiometer_NaraInSpaceHigh_00 = Da un'orbita alta, il bagliore infrarosso di Nara si muove in onde lente, come se la sua aria densa stesse rimescolando il calore in silenzio.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowLowlands_00 = I bassopiani risultano caldi ma smorzati: l'atmosfera densa spalma la mappa termica come una coperta pesante.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowMidlands_00 = Qui dominano gradienti ampi e uniformi. Qualunque cosa ci sia sotto, l'aria insiste a farne una media.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowHighlands_00 = Le alture più fresche spiccano dove la colonna atmosferica si assottiglia e il radiometro riesce finalmente a vedere più chiaramente.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowMountains_00 = Le ombre delle montagne scavano cuciture fredde nei pendii più caldi: anche su Nara, l'ombra vince ancora.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari sembrano tenui e costanti, come se stessero conservando il calore per dopo.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowPoles_00 = I poli restano come calotte fredde con deboli archi tiepidi che sembrano più movimento in alta atmosfera che suolo.
        #JNSQscience_bd_IRradiometer_NaraInSpaceLowPolarHighlands_00 = Le alture polari sono i pixel più freddi che puoi trovare senza trasformare il guadagno in puro ottimismo.
        #JNSQscience_bd_IRradiometer_AmosInSpaceHigh_00 = Amos è un puntino scuro con un tremolio termico nervoso: piccolo, senz'aria, e rapido a cambiare idea sul calore.
        #JNSQscience_bd_IRradiometer_AmosInSpaceLowLowlands_00 = Le zone basse si scaldano in fretta e si raffreddano ancora più in fretta: la curva sembra roccia nuda senza pazienza.
        #JNSQscience_bd_IRradiometer_AmosInSpaceLowMidlands_00 = Le pianure restituiscono una firma bitorzoluta, come pile di macerie che litigano con la tua calibrazione.
        #JNSQscience_bd_IRradiometer_AmosInSpaceLowHighlands_00 = Le dorsali al sole divampano luminose, poi scendono di colpo nel freddo non appena si voltano altrove.
        #JNSQscience_bd_IRradiometer_AmosInSpaceLowMountains_00 = Le montagne disegnano un seghetto netto nell'infrarosso: pendii caldi, spine fredde e ombre crudeli.
        #JNSQscience_bd_IRradiometer_AmosInSpaceLowPoles_00 = I poli sono per lo più pozzi freddi e ombra lunga, con solo sottili bordi tiepidi a mezzogiorno locale.
        #JNSQscience_bd_IRradiometer_EnonInSpaceHigh_00 = Enon sembra modesto nell'infrarosso finché non entra in vista il lato notturno, poi è solo freddo puro e senza compromessi.
        #JNSQscience_bd_IRradiometer_EnonInSpaceLowLowlands_00 = I bassopiani mostrano un campo termico più uniforme, come se la brina fine stesse livellando tutto.
        #JNSQscience_bd_IRradiometer_EnonInSpaceLowMidlands_00 = Puntini più scuri nelle pianure trattengono calore più a lungo, e tradiscono graniglia mescolata nel ghiaccio.
        #JNSQscience_bd_IRradiometer_EnonInSpaceLowHighlands_00 = Le colline risultano nette e fredde: il radiometro disegna ogni dorsale senza bisogno di una fotocamera.
        #JNSQscience_bd_IRradiometer_EnonInSpaceLowPoles_00 = I poli salgono a malapena sopra il "freddo": le ombre più profonde sembrano un deposito permanente per l'inverno.
        #JNSQscience_bd_IRradiometer_PraxInSpaceHigh_00 = Da un'orbita alta, Prax è un puntino tenue di frontiera. Il tepore diurno arriva facile, quello notturno sparisce all'istante.
        #JNSQscience_bd_IRradiometer_PraxInSpaceLowLowlands_00 = I bacini bassi trattengono calore un soffio più a lungo, e suggeriscono polvere assestata spessa e isolante.
        #JNSQscience_bd_IRradiometer_PraxInSpaceLowMidlands_00 = Le pianure mostrano gradienti ampi e irregolari: texture miste, emissività mista, risposte miste.
        #JNSQscience_bd_IRradiometer_PraxInSpaceLowHighlands_00 = Le colline passano dal caldo al freddo con bordi affilati come rasoi: qui le ombre sono estremamente efficienti.
        #JNSQscience_bd_IRradiometer_PraxInSpaceLowMountains_00 = Spine fredde tagliano pendii più caldi: il profilo infrarosso sembra una dentatura.
        #JNSQscience_bd_IRradiometer_PraxInSpaceLowPoles_00 = I poli sono una calotta fredda con bordi tiepidi sparsi, come se alla luce fosse concesso solo di fare visite brevi.

        // bd_IRspec
        #JNSQscience_bd_IRspec_SunInSpaceLowNorthPolarZone_00 = La fascia polare risulta leggermente più tenue in IR: il bordo della stella sembra più fresco e stranamente calmo.
        #JNSQscience_bd_IRspec_SunInSpaceLowNorthSubpolarZone_00 = Un disegno a chiazze scorre nella scansione, come lentiggini calde che slittano sotto una pelle più luminosa.
        #JNSQscience_bd_IRspec_SunInSpaceLowNorthTemperateZone_00 = Qui lo spettro si stabilizza, resta estremo, ma con meno picchi improvvisi e interruzioni.
        #JNSQscience_bd_IRspec_SunInSpaceLowNorthTropicZone_00 = Sottili strisce luminose divampano nello strumento, costringendolo a sbattere le palpebre e a far finta di niente.
        #JNSQscience_bd_IRspec_SunInSpaceLowEquatorialZone_00 = La firma IR è intensa e rumorosa: è come provare a misurare una temperatura con una fiamma ossidrica.
        #JNSQscience_bd_IRspec_SunInSpaceLowSouthTropicZone_00 = Scorre una catena di nodi luminosi: la lettura scrive "CALDO" così tante volte che finisce l'inchiostro.
        #JNSQscience_bd_IRspec_SunInSpaceLowSouthTemperateZone_00 = Lo spettro mostra un bagliore ampio e uniforme con occasionali cali scuri.
        #JNSQscience_bd_IRspec_SunInSpaceLowSouthSubpolarZone_00 = Il bordo si raffredda più in fretta del previsto: sembra quasi indossare un cappotto a infrarossi.
        #JNSQscience_bd_IRspec_SunInSpaceLowSouthPolarZone_00 = La scansione restituisce un gradiente netto verso il polo: i numeri sono ancora ridicoli, solo più ordinati.
        #JNSQscience_bd_IRspec_MohoInSpaceLowPoles_00 = I poli passano dal sole rovente all'ombra gelida: lo spettro non sa se sta sudando o tremando.
        #JNSQscience_bd_IRspec_MohoInSpaceLowLowlands_00 = Le ampie distese trattengono calore più a lungo: la curva IR suggerisce suolo più liscio e più denso che ama restare ben caldo.
        #JNSQscience_bd_IRspec_MohoInSpaceLowPolarIceCraters_00 = Gli interni dei crateri in ombra risultano innaturalmente scuri in IR, con deboli indizi di qualcosa che non vuole scaldarsi.
        #JNSQscience_bd_IRspec_MohoInSpaceLowHighlands_00 = Le colline si scaldano in fretta e si raffreddano ancora più in fretta: lo spettro sembra una lama seghettata di estremi tra giorno e notte.
        #JNSQscience_bd_IRspec_MohoInSpaceLowMidlands_00 = Un mix caotico di pendii tiepidi e avvallamenti freddi colora la scansione come una mappa termica tutta stropicciata.
        #JNSQscience_bd_IRspec_MohoInSpaceLowCraters_00 = I bordi dei crateri brillano mentre i fondi restano indietro: l'inerzia termica disegna ogni cicatrice d'impatto con dettagli netti.
        #JNSQscience_bd_IRspec_MohoInSpaceLowExoticCraters_00 = Le bande IR non combaciano con il terreno circostante: o la roccia è diversa, o il cratere si sta mettendo in mostra.
        #JNSQscience_bd_IRspec_MohoInSpaceLowRareCraters_00 = Questi crateri restano più freschi più a lungo del dovuto: la regolite qui sembra insolitamente soffice e isolante.
        #JNSQscience_bd_IRspec_MohoInSpaceLowVoronoiCraters_00 = Compaiono motivi poligonali come celle alternate calde e fredde, come se la superficie fosse stata piastrellata da un meticoloso demone del calore.
        #JNSQscience_bd_IRspec_MohoInSpaceLowNotableCraters_00 = Un cratere che spicca getta una netta ombra termica: il bordo resta caldo mentre il fondo si chiude nel freddo.
        #JNSQscience_bd_IRspec_MohoInSpaceLowPeaks_00 = I picchi divampano al sole e svaniscono nel freddo non appena fanno ombra: lo spettro sembra offeso dal contrasto.
        #JNSQscience_bd_IRspec_EveInSpaceLowPoles_00 = La firma IR è smorzata e fredda: qui le cime delle nubi sembrano trattenere il fiato.
        #JNSQscience_bd_IRspec_EveInSpaceLowLowlands_00 = Il calore risale in ampie bande, ma gran parte del segnale viene inghiottita dall'aria viola e densa.
        #JNSQscience_bd_IRspec_EveInSpaceLowMidlands_00 = Lo spettro mostra un gradiente termico impastato, come se qualcuno avesse provato a sfocare il pianeta con una pistola termica.
        #JNSQscience_bd_IRspec_EveInSpaceLowHighlands_00 = Dominano temperature più basse alle cime delle nubi: ciò che sta sotto si intuisce appena attraverso le bande di assorbimento.
        #JNSQscience_bd_IRspec_EveInSpaceLowPeaks_00 = Picchi luminosi e netti sfarfallano nella scansione: buchi sottili nelle nubi rivelano per un attimo terreno più caldo.
        #JNSQscience_bd_IRspec_EveInSpaceLowExplodiumSea_00 = Il mare risulta stranamente uniforme in IR: l'atmosfera sopra fa un ottimo lavoro nel nascondere i dettagli.
        #JNSQscience_bd_IRspec_EveInSpaceLowMountains_00 = Pendii caldi verso il sole e ombre fredde lottano attraverso la foschia: lo spettrometro riporta "perlopiù nebbia, un po' di roccia".
        #JNSQscience_bd_IRspec_EveInSpaceLowShores_00 = Un sottile bordo termico delinea la costa, poi scompare sotto lo strato di nubi successivo come se non fosse mai esistito.
        #JNSQscience_bd_IRspec_EveInSpaceLowPolarLakes_00 = Piccole pozze fredde appaiono come chiazze tenui sotto un velo gelido di freddo alle cime delle nubi.
        #JNSQscience_bd_IRspec_EveInSpaceLowPetrolLakes_00 = La scansione coglie una tenue firma di calore oleoso: il Controllo Missione annota "per favore non atterrare lì".
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofAkron_00 = Ampie bande nel medio IR suggeriscono un accumulo di calore costante: il mantello di nubi lo leviga in un bagliore calmo.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofNessus_00 = Lo spettro cala e risale in onde lente, come se il mare respirasse sotto l'atmosfera.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofTaniwha_00 = Compare una texture termica a chiazze, poi viene cancellata da ombre di nubi in movimento.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofGigan_00 = Strisce luminose tagliano la scansione. Correnti calde, o lo strumento che sobbalza. Difficile dirlo.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofRodan_00 = Il ritorno IR è più caldo lungo un bordo, e suggerisce venti persistenti o risalite dal basso.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofGojira_00 = Un'ampia zona calda ammicca attraverso la foschia: sembra che laggiù sotto qualcosa si ostini a non raffreddarsi.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofGhidorah_00 = Tre bande calde distinte compaiono in sequenza: tutti fanno finta che sia solo una coincidenza.
        #JNSQscience_bd_IRspec_EveInSpaceLowSeaofBagorah_00 = Lo spettro qui è stranamente "pulito": meno rumore, più segnale. Come se le nubi smettessero per un attimo di essere scortesi.
        #JNSQscience_bd_IRspec_EveInSpaceLowKrakensWell_00 = Un'anomalia termica a spirale si arriccia sotto le cime delle nubi: il file dati viene etichettato automaticamente "NOPE".
        #JNSQscience_bd_IRspec_GillyInSpaceLowLowlands_00 = Gilly si scalda all'istante al sole: la curva IR fa un balzo come se si fosse spaventata.
        #JNSQscience_bd_IRspec_GillyInSpaceLowMidlands_00 = Temperature a chiazze seguono la forma bitorzoluta: lo spettrometro, in pratica, mappa "bozzo" contro "ombra".
        #JNSQscience_bd_IRspec_GillyInSpaceLowHighlands_00 = Le dorsali esposte risultano calde, poi crollano nel freddo profondo non appena si voltano via dal sole.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowIceCaps_00 = Lo spettro è per lo più ghiaccio freddo e luminoso: perfino le ombre sembrano tremare.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowHighlands_00 = Dorsali fresche e valli più calde dipingono strisce sul terreno in ordinate fasce termiche.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowMountains_00 = I picchi irradiano un gelo netto mentre la roccia al sole lampeggia calda: il sensore continua a ricalibrarsi.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowShores_00 = La sabbia bagnata si raffredda in fretta: l'acqua bassa resta calda più a lungo. La costa disegna un profilo termico pulito.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowMidlands_00 = Campi a chiazze e città brillano in IR come una trapunta lasciata troppo vicino a una stufa.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowLowlands_00 = Il terreno umido e l'aria più densa impastano il contrasto: tutto sembra comodamente tiepido.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowAridLowlands_00 = Le pianure aride impennano sul caldo al sole e calano in fretta all'ombra: lo spettro urla "niente umidità".
        #JNSQscience_bd_IRspec_KerbinInSpaceLowAridMidlands_00 = Il suolo polveroso restituisce calore in una fascia ampia: quasi lo senti crepitare.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowAridHighlands_00 = Aria sottile, sole brillante: le rocce si scaldano all'istante, poi si raffreddano altrettanto in fretta quando sbatti le palpebre.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowAridMountains_00 = Sbalzi di temperatura taglienti sulle dorsali: lo spettrometro coglie minuscole sacche di brina.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowGreatLake_00 = Una enorme macchia fresca domina la mappa: vortici più caldi si arricciano lungo i bordi come tagliatelle pigre.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowInlandWater_00 = I laghi piccoli appaiono come lentiggini fresche, con rive calde che formano minuscoli aloni.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowKreenwichSea_00 = L'acqua aperta resta stabile in temperatura, finché una scia calda non scarabocchia sulla scansione.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowArcticSea_00 = Banchi di ghiaccio e canali aperti si alternano in fasce nette: l'IR lo fa sembrare un codice a barre di freddo.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowForemansSea_00 = Le ombre delle nubi corrono sull'acqua, e il mare risponde con un calore tenue e lento.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowTriangulusSea_00 = Tre bande di corrente formano deboli triangoli termici. Il Controllo Missione discute sugli angoli.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowNorthernSea_00 = Un lungo nastro fresco aderisce alla costa: una foschia persistente appare come una debole coperta infrarossa.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowSub-ArcticSea_00 = Né ghiaccio né mare. La fanghiglia restituisce uno spettro confuso che manda in crisi gli algoritmi.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowEasternSea_00 = L'alba scalda per prima la superficie: il gradiente IR punta a est come una freccia che non avevi richiesto.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowWesternSea_00 = Il riscaldamento di fine giornata indugia: qui lo spettro è più uniforme, come se l'oceano avesse imparato la pazienza.
        #JNSQscience_bd_IRspec_KerbinInSpaceLowWelcomeBackIsland_00 = La roccia scura dell'isola risulta più calda del mare circostante, come se ti stesse tenendo il posto.
        #JNSQscience_bd_IRspec_MunInSpaceLowPoles_00 = I poli risultano profondi pozzi di freddo: minuscole dorsali al sole sembrano spilli roventi.
        #JNSQscience_bd_IRspec_MunInSpaceLowHighlands_00 = Colline frastagliate mostrano bordi termici duri: la polvere si raffredda prima che la scansione finisca.
        #JNSQscience_bd_IRspec_MunInSpaceLowMidlands_00 = Le pianure si assestano in un freddo opaco e costante, come se la regolite stesse cercando di fare un pisolino.
        #JNSQscience_bd_IRspec_MunInSpaceLowLowlands_00 = I bassopiani trattengono un po' di tepore dopo mezzogiorno: lo spettro suggerisce polvere più fine e più soffice.
        #JNSQscience_bd_IRspec_MunInSpaceLowPolarIceCraters_00 = I crateri polari in ombra risultano quasi neri in IR: laggiù sotto qualcosa si rifiuta di scaldarsi.
        #JNSQscience_bd_IRspec_MunInSpaceLowExoticCraters_00 = Questi crateri mostrano fasce che non combaciano: o la roccia è diversa, oppure Mun sta facendo la difficile.
        #JNSQscience_bd_IRspec_MunInSpaceLowRareCraters_00 = Le cavità restano più fresche dei vicini: il sensore le segnala come insolitamente isolanti.
        #JNSQscience_bd_IRspec_MunInSpaceLowVoronoiCraters_00 = Campi di crateri poligonali formano un favo di temperature alternate, come se la superficie fosse stata stampata.
        #JNSQscience_bd_IRspec_MunInSpaceLowNotableCraters_00 = Una parete di cratere brilla calda dal lato al sole e gela sottovento, puntuale come un orologio.
        #JNSQscience_bd_IRspec_MunInSpaceLowMountains_00 = I picchi impennano sul caldo al sole, ma le ombre lunghe trascinano la temperatura media giù con forza.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowPoles_00 = I poli sono brutalmente freddi, ma chiazze luccicanti divampano luminose: si sospettano cristalli riflettenti.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowLowlands_00 = I bassopiani restituiscono uno spettro liscio e anonimo: le distese si comportano come un enorme dissipatore di calore.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowMidlands_00 = Un lieve sbilanciamento verso il caldo suggerisce polvere più scura mescolata nella roba verde, come un condimento.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowHighlands_00 = Le colline si raffreddano in fretta: lo spettro suggerisce materiale poroso che non trattiene bene il calore.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowBasins_00 = I fondi dei bacini restano uniformemente freddi: la firma IR è così piatta che sembra voluta.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownBasins_00 = I bacini marroni assorbono più luce e brillano più caldi, come se qualcuno avesse rovesciato del cacao.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownLowlands_00 = I bassopiani marroni mostrano bande più forti nel medio IR: il Controllo Missione scrive "forse minerali, forse snack".
        #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownMidlands_00 = Le pianure marroni hanno punti caldi a chiazze che cambiano con l'angolo del sole, come specchi che si sono scordati di essere rocce.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowBrownHighlands_00 = Le colline marroni risultano più calde delle colline verdi: meno riflettenti, più oneste.
        #JNSQscience_bd_IRspec_MinmusInSpaceLowMountains_00 = Le dorsali montuose alternano caldo e freddo a ogni dosso: lo spettro sembra un codice a barre di scogliere.
        #JNSQscience_bd_IRspec_DunaInSpaceLowIceCaps_00 = Le bande IR mostrano ghiaccio d'acqua pulito sotto un velo di polvere: le calotte restano nettamente fredde anche a mezzogiorno.
        #JNSQscience_bd_IRspec_DunaInSpaceLowHighlands_00 = Dorsali fresche e bacini più caldi disegnano una mappa termica da aria sottile, con brina ostinata che si nasconde all'ombra.
        #JNSQscience_bd_IRspec_DunaInSpaceLowMidlands_00 = Lo spettro si impasta in gradienti polverosi: quassù c'è più graniglia fine che roccia compatta.
        #JNSQscience_bd_IRspec_DunaInSpaceLowLowlands_00 = I bassopiani trattengono il tepore più a lungo: sabbia compattata e pietre sepolte sono probabili.
        #JNSQscience_bd_IRspec_DunaInSpaceLowCraters_00 = Bordi caldi, fondi freddi, ogni cratere si legge come un manuale su isolamento e ombra.
        #JNSQscience_bd_IRspec_DunaInSpaceLowRareCraters_00 = Alcune cavità mostrano strane linee di assorbimento: minerali diversi, o qualcosa di appena esposto.
        #JNSQscience_bd_IRspec_DunaInSpaceLowVoronoiCraters_00 = I campi poligonali alternano celle calde e fredde come un piatto di ceramica crepato.
        #JNSQscience_bd_IRspec_DunaInSpaceLowNotableCraters_00 = Un cratere in evidenza resta termicamente drammatico: parete luminosa, ombra congelata, nessun compromesso.
        #JNSQscience_bd_IRspec_DunaInSpaceLowExoticCraters_00 = Nella scansione compaiono bande insolite: il Controllo Missione le etichetta "interessanti" e salva due volte.
        #JNSQscience_bd_IRspec_DunaInSpaceLowTrenches_00 = Le trincee restano più fredde del previsto, e suggeriscono pareti ripide e polvere sciolta che non vede mai il sole.
        #JNSQscience_bd_IRspec_DunaInSpaceLowNotablePlains_00 = Un tepore ampio e uniforme suggerisce una crosta sottile sopra la polvere, piatta, fragile e molto polverosa.
        #JNSQscience_bd_IRspec_DunaInSpaceLowNotableMountains_00 = I pendii al sole divampano caldi: deboli firme di ghiaccio restano attaccate a cenge riparate come se stessero barando.
        #JNSQscience_bd_IRspec_DunaInSpaceLowMountains_00 = Un netto contrasto termico su picchi frastagliati suggerisce roccia nuda che buca la coperta rossa.
        #JNSQscience_bd_IRspec_DunaInSpaceLowVolcano_00 = Un'anomalia calda si rifiuta di svanire: lo spettro sussurra "calore recente" e smette di spiegare.
        #JNSQscience_bd_IRspec_IkeInSpaceLowPoles_00 = Le ombre polari risultano profonde trappole di freddo: deboli fasce di brina suggeriscono polvere volatile mescolata alla roccia.
        #JNSQscience_bd_IRspec_IkeInSpaceLowMountains_00 = Le dorsali si scaldano in fretta e si raffreddano ancora più in fretta: lo spettro favorisce roccia esposta ricca di metalli.
        #JNSQscience_bd_IRspec_IkeInSpaceLowMidlands_00 = Dominano assorbimenti scuri e costanti: roccia affidabile con un sottile accenno di minerale.
        #JNSQscience_bd_IRspec_IkeInSpaceLowLowlands_00 = I bassopiani trattengono calore un soffio più a lungo: qui la polvere si è raccolta in una ordinata coperta termica.
        #JNSQscience_bd_IRspec_IkeInSpaceLowHighlands_00 = Linee nette nel medio IR suggeriscono roccia fresca e fratturata sparsa sulle alture.
        #JNSQscience_bd_IRspec_EdnaInSpaceLowLowlands_00 = Le zone basse assorbono la luce e la irradiano nell'infrarosso: lo spettro indica abbondanza di carbonio.
        #JNSQscience_bd_IRspec_EdnaInSpaceLowMidlands_00 = Bande IR a chiazze suggeriscono una superficie mista, ghiaia da una dozzina di fonti, ordinata dal tempo.
        #JNSQscience_bd_IRspec_EdnaInSpaceLowHighlands_00 = Le colline si raffreddano in modo brutale: roccia porosa e brina polverosa sono entrambe compatibili con la curva.
        #JNSQscience_bd_IRspec_EdnaInSpaceLowPolarIceCraters_00 = I crateri quasi polari risultano quasi neri in IR: volatili intrappolati lasciano deboli impronte di ghiaccio.
        #JNSQscience_bd_IRspec_EdnaInSpaceLowWhites_00 = Le chiazze luminose riflettono bene ma risultano fredde: brina pulita su roccia più scura è la risposta più semplice.
        #JNSQscience_bd_IRspec_EdnaInSpaceHigh_00 = Edna risulta un mondo freddo e scuro con occasionali indizi minerali netti, dati quieti con spigoli affilati.
        #JNSQscience_bd_IRspec_DakInSpaceLowLowlands_00 = I punti bassi del patatone restano più freschi: lì si raccoglie polvere e si comporta come una minuscola coperta.
        #JNSQscience_bd_IRspec_DakInSpaceLowMidlands_00 = Punti caldi a chiazze segnano dove la roccia nuda spunta dalla regolite come una barba di un giorno.
        #JNSQscience_bd_IRspec_DakInSpaceLowHighlands_00 = I punti alti lampeggiano caldi al sole e svaniscono in ombra: Dak ha quasi zero pazienza termica.
        #JNSQscience_bd_IRspec_DakInSpaceHigh_00 = Da più lontano, è soprattutto "roccia fredda", con uno spettro bitorzoluto che rispecchia perfettamente la forma.
        #JNSQscience_bd_IRspec_DresInSpaceLowPoles_00 = I poli restano freddi e ostinati: deboli firme di ghiaccio sfarfallano nelle ombre più lunghe.
        #JNSQscience_bd_IRspec_DresInSpaceLowHighlands_00 = Raffreddamento rapido e bande nette indicano roccia spezzata con pochissima "sofficezza".
        #JNSQscience_bd_IRspec_DresInSpaceLowMidlands_00 = Termicamente piatto e spettralmente banale: lo strumento lo chiama "uniforme" e sembra annoiato.
        #JNSQscience_bd_IRspec_DresInSpaceLowLowlands_00 = Ampie curve di riscaldamento suggeriscono polvere più spessa di quanto le foto di superficie ammettano.
        #JNSQscience_bd_IRspec_DresInSpaceLowCanyon_00 = Le pareti del canyon passano dal caldo al freddo in un battito: strati freschi appaiono come nuove strisce spettrali.
        #JNSQscience_bd_IRspec_DresInSpaceHigh_00 = Da un'orbita alta, Dres è un pallido freddo con deboli firme minerali, come una roccia che cerca di non farsi notare.
        #JNSQscience_bd_IRspec_JoolInSpaceLowEquatorialBands_00 = Le fasce equatoriali brillano in modo irregolare in IR: bande più calde spuntano attraverso una foschia più fredda.
        #JNSQscience_bd_IRspec_JoolInSpaceLowExposedLowerDeck_00 = Uno strato più profondo lascia filtrare calore extra nello spettro, come se le nubi si fossero dimenticate di chiudere le tende.
        #JNSQscience_bd_IRspec_JoolInSpaceLowSubpolarBands_00 = Le fasce subpolari risultano più fredde e più uniformi: alte cime di nubi appiattiscono la firma infrarossa.
        #JNSQscience_bd_IRspec_JoolInSpaceLowNorthPole_00 = La regione polare nord cala verso il freddo, poi impennano brevi strisce calde che si rifiutano di stare ferme.
        #JNSQscience_bd_IRspec_JoolInSpaceLowSouthPole_00 = Il polo sud mostra un nucleo freddo compatto avvolto da filamenti più caldi, come una tempesta che si annoda la propria sciarpa.
        #JNSQscience_bd_IRspec_JoolInSpaceLowStormComplex_00 = Un complesso di tempeste restituisce cime di nubi fredde con un cuore caldo: lo spettro disegna una spirale e sembra compiaciuto.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowShores_00 = La riva è un confine termico netto: acqua fresca da un lato, terra cotta dal sole dall'altro.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowShallows_00 = L'acqua bassa si scalda in fretta e brilla nel medio IR: i canali più profondi restano freschi e ostinati.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowInlandWater_00 = Le acque interne appaiono come chiazze fresche con bordi caldi, come minuscoli aloni di calore attorno ai laghi.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowKrenwichSea_00 = Il mare di Krenwich risulta stabile e mite: sottili nastri caldi suggeriscono correnti lente e ampie.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowArcticSea_00 = Ghiaccio e acqua libera si alternano in fasce IR nette, e trasformano il mare in un codice a barre di freddo.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowJoolwardSea_00 = Il calore sul lato notturno indugia sul mare verso Jool: lo spettro suggerisce una superficie che non si raffredda mai del tutto.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowPolwardSea_00 = Il mare verso il polo tende complessivamente al freddo, con deboli strisce calde che sembrano rotture nel ghiaccio sottile.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowHighlands_00 = Alture fresche e valli più calde formano contorni IR a strati, con affioramenti rocciosi che lampeggiano caldi al sole.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowMountains_00 = I picchi restano freddi mentre le pareti al sole divampano luminose: le ombre scolpiscono lo spettro in gradini netti.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowIceCaps_00 = Le calotte di ghiaccio sono luminose e fredde, ma chiazze scure sparse impennano più calde, come se provassero a sciogliersi in silenzio.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowEnclosedFaults_00 = Anomalie calde lineari tracciano le faglie chiuse, e suggeriscono terreno spaccato e calore intrappolato sotto.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowLowlands_00 = I bassopiani umidi sfocano il contrasto termico: l'aria aggiunge un assorbimento ampio che sa di meteo.
        #JNSQscience_bd_IRspec_LaytheInSpaceLowMidlands_00 = Le pianure mostrano una firma mista, terra, acqua e nubi che si alternano nello spettro.
        #JNSQscience_bd_IRspec_VallInSpaceLowPoles_00 = I poli risultano profondi pozzi di freddo: le zone in ombra diventano quasi nere nell'infrarosso.
        #JNSQscience_bd_IRspec_VallInSpaceLowHighlands_00 = Colline frastagliate oscillano dal caldo al freddo in fretta: qualunque polvere esista qui si rifiuta di trattenere calore.
        #JNSQscience_bd_IRspec_VallInSpaceLowMidlands_00 = Le pianure restituiscono un freddo costante e vitreo, come ghiaccio solido che finge di essere roccia.
        #JNSQscience_bd_IRspec_VallInSpaceLowLowlands_00 = I bacini bassi si raffreddano più lentamente: brina più fine e granuli compattati si adattano alla curva termica.
        #JNSQscience_bd_IRspec_VallInSpaceLowMountains_00 = Le dorsali montuose lampeggiano calde sotto il sole, poi calano di colpo in ombre blu-nere.
        #JNSQscience_bd_IRspec_TyloInSpaceLowPoles_00 = I poli restano freddi e puliti: un debole assorbimento suggerisce una foschia sottilissima sopra il suolo ghiacciato.
        #JNSQscience_bd_IRspec_TyloInSpaceLowMountains_00 = Le montagne scavano bordi termici duri: lo spettro alterna pendii roventi e ombre congelate.
        #JNSQscience_bd_IRspec_TyloInSpaceLowHighlands_00 = Le colline si raffreddano in fretta e risultano secche: bande ampie suggeriscono pietra nuda con poco isolamento.
        #JNSQscience_bd_IRspec_TyloInSpaceLowMidlands_00 = Le pianure restano in un freddo opaco e uniforme: l'atmosfera sottile smussa gli estremi giusto un poco.
        #JNSQscience_bd_IRspec_TyloInSpaceLowLowlands_00 = I bassopiani trattengono calore più a lungo, e suggeriscono polvere e ghiaia raccolte in una tenue coperta termica.
        #JNSQscience_bd_IRspec_BopInSpaceLowPoles_00 = I poli di Bop sono per lo più ombra e freddo, con minuscole pagliuzze calde dove la roccia nuda prende il sole.
        #JNSQscience_bd_IRspec_BopInSpaceLowMountains_00 = Le dorsali si scaldano all'istante e si raffreddano altrettanto in fretta: la curva IR sembra un monitor del battito.
        #JNSQscience_bd_IRspec_BopInSpaceLowLowlands_00 = I punti bassi risultano più freschi e più morbidi, coerenti con polvere che si raccoglie dove la gravità si ricorda di funzionare.
        #JNSQscience_bd_IRspec_BopInSpaceLowMidlands_00 = Le pianure mostrano bande a chiazze: macerie miste, composizione mista e zero interesse a essere uniformi.
        #JNSQscience_bd_IRspec_BopInSpaceLowHighlands_00 = Le colline risultano calde sui versanti al sole e spariscono nel freddo sottovento, come se tutta la luna sussultasse.
        #JNSQscience_bd_IRspec_PolInSpaceLowPoles_00 = I poli restano in un freddo profondo, ma lo spettro coglie comunque strani granelli caldi che scintillano al sole.
        #JNSQscience_bd_IRspec_PolInSpaceLowLowlands_00 = I bassopiani danno un ritorno più uniforme e più caldo: la polvere gialla fine sembra isolare il suolo.
        #JNSQscience_bd_IRspec_PolInSpaceLowMidlands_00 = Le pianure mostrano bande ampie e smorzate, materiale soffice con abbastanza stranezze minerali da tenere occupato il laboratorio.
        #JNSQscience_bd_IRspec_PolInSpaceLowHighlands_00 = Le colline si raffreddano rapidamente e sembrano porose: la firma infrarossa ha più buchi che fiducia.
        #JNSQscience_bd_IRspec_PolInSpaceLowMountains_00 = Guglie montuose proiettano lunghe ombre fredde: le punte al sole divampano luminose come se volessero segnalare l'orbita.
        #JNSQscience_bd_IRspec_LindorInSpaceHigh_00 = Da quassù, Lindor è per lo più un bagliore infrarosso calmo, con deboli bande di metano che scorrono nei dati.
        #JNSQscience_bd_IRspec_LindorInSpaceLowTemperateBands_00 = Le fasce temperate risultano lisce e costanti: un sottile assorbimento del metano scorre su un disegno di calore sorprendentemente riposante.
        #JNSQscience_bd_IRspec_LindorInSpaceLowExposedLowerDeck_00 = Gli strati inferiori lasciano filtrare tepore extra e caratteristiche di assorbimento più profonde, come se qualcuno avesse incrinato il coperchio di una pentola a pressione.
        #JNSQscience_bd_IRspec_LindorInSpaceLowSubpolarBands_00 = Cime di nubi più fredde e più alte appiattiscono lo spettro: le fasce subpolari sembrano quiete, ma non vuote.
        #JNSQscience_bd_IRspec_LindorInSpaceLowNorthPole_00 = Il polo risulta complessivamente più freddo, con sottili strisce tiepide che scivolano in giro come se fossero in ritardo a una riunione.
        #JNSQscience_bd_IRspec_LindorInSpaceLowSouthPole_00 = Un centro freddo compatto avvolto da filamenti più caldi fa sembrare lo spettro una sciarpa annodata di fretta.
        #JNSQscience_bd_IRspec_LindorInSpaceLowStormComplex_00 = Cime di nubi fredde con un nucleo più caldo si vedono chiaramente: la tempesta è praticamente una cipolla termica.
        #JNSQscience_bd_IRspec_LindorInSpaceLowUpperStormDeck_00 = Nubi alte e sottili aggiungono una foschia ampia alle bande IR: lo strumento scrive "perlopiù atmosfera" e sembra seccato.
        #JNSQscience_bd_IRspec_KrelInSpaceHigh_00 = Krel è un puntino pallido e freddo: la firma IR è semplice e ostinatamente poco utile a questa distanza.
        #JNSQscience_bd_IRspec_KrelInSpaceLowLowlands_00 = I bassopiani polverosi trattengono calore un po' più a lungo, e suggeriscono uno strato isolante fine raccolto nelle distese.
        #JNSQscience_bd_IRspec_KrelInSpaceLowMidlands_00 = Le pianure mostrano uno spettro a chiazze: macerie miste, composizione mista e zero interesse per la coerenza.
        #JNSQscience_bd_IRspec_KrelInSpaceLowHighlands_00 = Le alture esposte oscillano dal caldo al freddo in fretta: la curva urla "roccia nuda" con pochissima "sofficezza".
        #JNSQscience_bd_IRspec_KrelInSpaceLowPoles_00 = Le ombre polari sprofondano in un freddo profondo: deboli firme di brina restano attaccate ai luoghi che la luce evita.
        #JNSQscience_bd_IRspec_AdenInSpaceHigh_00 = Il segnale IR di Aden è tenue ma dal tono scuro, come una piccola biglia rocciosa che prova a confondersi nello spazio.
        #JNSQscience_bd_IRspec_AdenInSpaceLowLowlands_00 = Nei bassopiani il tepore indugia: lo spettro suggerisce polvere compattata sopra roccia più densa.
        #JNSQscience_bd_IRspec_AdenInSpaceLowMidlands_00 = Sottili linee di assorbimento suggeriscono minerali misti: la scansione sembra un rapporto di geologia scritto in stenografia.
        #JNSQscience_bd_IRspec_AdenInSpaceLowHighlands_00 = Le colline si raffreddano rapidamente e sembrano ruvide: fratture e detriti a blocchi appaiono come bordi termici netti.
        #JNSQscience_bd_IRspec_AdenInSpaceLowMountains_00 = Le dorsali montuose lampeggiano luminose al sole e calano di colpo in ombra, scolpendo lo spettro in scogliere.
        #JNSQscience_bd_IRspec_AdenInSpaceLowPoles_00 = I poli restano freddi e puliti: qualunque tepore è confinato a minuscoli dossi al sole che contano a malapena.
        #JNSQscience_bd_IRspec_HuygenInSpaceHigh_00 = Anche da quassù, la foschia lascia le sue impronte: ampie bande di assorbimento e un bagliore termico costante e smorzato.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowLowlands_00 = I bassopiani passano attraverso la foschia come una macchia calda: l'atmosfera fa del suo meglio per tenere i segreti.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowMidlands_00 = Un profilo IR a strati suggerisce foschie sovrapposte: la superficie fa solo una breve comparsa tra le bande di assorbimento.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowHighlands_00 = Qui dominano letture più fresche: il terreno alto sembra stare sotto foschia più sottile, con un contrasto termico più netto.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowMountains_00 = I pendii al sole divampano caldi attraverso il torbido, mentre i versanti in ombra spariscono nel freddo come se fossero stati cancellati.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowPeaks_00 = I picchi bucano abbastanza foschia da mostrare picchi netti: lo strumento finalmente si sente ascoltato.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowPolarLowlands_00 = I bassopiani polari risultano più freddi, con macchie scure ostinate che si rifiutano di scaldarsi: classico comportamento da trappola fredda.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowPoles_00 = Il polo mostra freddo profondo e forti bande atmosferiche: è come guardare attraverso vetro ambrato a strati.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowPolarHighlands_00 = Il terreno polare alto alterna caldo e freddo in strisce strette: la foschia si assottiglia, ma non il dramma.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowShores_00 = La costa disegna un confine termico pulito: la terra si scalda in fretta, i liquidi vicini restano stabili e freschi.
        #JNSQscience_bd_IRspec_HuygenInSpaceLowMethaneLakes_00 = Le bande di assorbimento del metano saltano fuori subito: i laghi risultano freschi, uniformi e estremamente sicuri di sé.
        #JNSQscience_bd_IRspec_RigaInSpaceHigh_00 = Lo spettro di Riga è calmo e leggibile: per lo più roccia fredda con una tenue firma di azoto che aleggia sopra.
        #JNSQscience_bd_IRspec_RigaInSpaceLowLowlands_00 = I bassopiani trattengono calore più a lungo: la curva suggerisce polvere e ghiaia assestate in una ordinata coperta.
        #JNSQscience_bd_IRspec_RigaInSpaceLowMidlands_00 = Le pianure mostrano ampie bande minerali con piccoli puntini caldi, roccia esposta che spunta da regolite più sottile.
        #JNSQscience_bd_IRspec_RigaInSpaceLowHighlands_00 = Le colline si raffreddano in fretta e sembrano secche: caratteristiche nette suggeriscono terreno fratturato e pendii freschi.
        #JNSQscience_bd_IRspec_RigaInSpaceLowMountains_00 = Le ombre delle montagne tagliano cunei di freddo profondo: le dorsali al sole brillano come se si stessero mettendo in mostra per lo scanner.
        #JNSQscience_bd_IRspec_RigaInSpaceLowPoles_00 = Le regioni polari tendono al freddo, con deboli accenni di ghiaccio nelle tasche più scure, come se i volatili si stessero nascondendo.
        #JNSQscience_bd_IRspec_TalosInSpaceHigh_00 = Talos risulta un mondo freddo con bande IR insolitamente "colorate": laggiù sotto qualcosa urla composizione.
        #JNSQscience_bd_IRspec_TalosInSpaceLowLowlands_00 = I bassopiani mostrano ritorni più caldi e più uniformi: materiale fine sembra raccogliersi dove può.
        #JNSQscience_bd_IRspec_TalosInSpaceLowMidlands_00 = Caratteristiche di assorbimento a chiazze suggeriscono depositi striati: lo spettro sembra come se qualcuno avesse versato minerali in movimento.
        #JNSQscience_bd_IRspec_TalosInSpaceLowHighlands_00 = Le alture si raffreddano in fretta e risaltano nette. Domina roccia esposta con poca polvere isolante.
        #JNSQscience_bd_IRspec_TalosInSpaceLowMountains_00 = Le dorsali alternano caldo e freddo a ogni svolta: il profilo IR diventa un seghetto frastagliato di scogliere.
        #JNSQscience_bd_IRspec_TalosInSpaceLowPoles_00 = I poli restano in un freddo profondo, con minuscoli spilli tiepidi colpiti da un sole che a malapena spezzano il gelo.
        #JNSQscience_bd_IRspec_EelooInSpaceLowPoles_00 = I poli tornano come una trappola IR pulita e fredda: le caratteristiche più forti sembrano brina fresca che non ha mai imparato a sciogliersi.
        #JNSQscience_bd_IRspec_EelooInSpaceLowHighlands_00 = Le alture mostrano sbalzi termici netti e asciutti, con bande di ghiaccio brillante stratificate sopra materiale più scuro.
        #JNSQscience_bd_IRspec_EelooInSpaceLowMidlands_00 = Qui domina uno spettro liscio e pallido: la superficie si comporta come neve compattata con un sottile condimento di polvere.
        #JNSQscience_bd_IRspec_EelooInSpaceLowLowlands_00 = I bassopiani trattengono calore solo un poco più a lungo, e suggeriscono grani più fini e un miscuglio di ghiaccio un po' meno "puro".
        #JNSQscience_bd_IRspec_EelooInSpaceLowCanyon_00 = Le pareti del canyon passano dal caldo al freddo in un battito: lo spettro mostra strati più freschi e più profondi che fanno capolino.
        #JNSQscience_bd_IRspec_CelesInSpaceHigh_00 = Da un'orbita alta, Celes è un puntino IR freddo e stabile, con quasi nessuna banda atmosferica: solo superficie, onesta.
        #JNSQscience_bd_IRspec_CelesInSpaceLowLowlands_00 = I bassopiani restituiscono una curva più calda e più uniforme, come se qui la polvere fine si fosse raccolta e avesse imparato a isolare.
        #JNSQscience_bd_IRspec_CelesInSpaceLowMidlands_00 = Le pianure mostrano ampie bande minerali sotto una sottile firma di brina: è un miscuglio ordinato, fastidiosamente ben educato.
        #JNSQscience_bd_IRspec_CelesInSpaceLowHighlands_00 = Le alture si raffreddano in fretta e risultano nette: i bordi della roccia esposta tagliano linee pulite nell'infrarosso.
        #JNSQscience_bd_IRspec_CelesInSpaceLowMountains_00 = Le dorsali montuose divampano dal lato al sole e svaniscono in ombre di freddo profondo, e scolpiscono lo spettro in denti.
        #JNSQscience_bd_IRspec_CelesInSpaceLowPoles_00 = I poli sono una profonda trappola di freddo in IR, con deboli caratteristiche di brina che sembrano accumularsi da secoli.
        #JNSQscience_bd_IRspec_TamInSpaceHigh_00 = Il profilo IR di Tam è tenue, bitorzoluto e impaziente, esattamente ciò che ti aspetti da un piccolo irregolare attaccabrighe.
        #JNSQscience_bd_IRspec_TamInSpaceLowLowlands_00 = I punti bassi risultano più freschi e più morbidi, coerenti con polvere che si raccoglie dove la debole gravità di Tam si ricorda di funzionare.
        #JNSQscience_bd_IRspec_TamInSpaceLowMidlands_00 = Le pianure mostrano linee di assorbimento a chiazze, macerie miste, minerali misti e nessuna storia coerente.
        #JNSQscience_bd_IRspec_TamInSpaceLowHighlands_00 = Le alture oscillano dal caldo al freddo in fretta: lo spettro favorisce roccia nuda e fratturata con pochissimo isolamento.
        #JNSQscience_bd_IRspec_TamInSpaceLowTwinCraters_00 = I crateri gemelli disegnano una coppia termica ordinata: bordi caldi, fondi freddi e ombre gemelle come discussioni allo specchio.
        #JNSQscience_bd_IRspec_TamInSpaceLowCraters_00 = Le cicatrici d'impatto spiccano in IR come anelli luminosi e conche scure: Tam è praticamente una mappa del calore di vecchie collisioni.
        #JNSQscience_bd_IRspec_TamInSpaceLowPockmarks_00 = Le vaiolature mostrano puntini caldi e pozzi freddi, come se la superficie fosse stata sabbiata e si fosse tenuta i lividi.
        #JNSQscience_bd_IRspec_HamekInSpaceHigh_00 = Il "colore" infrarosso di Hamek è stranamente ricco per un mondo così freddo: lo spettro sembra nascondere un motivo.
        #JNSQscience_bd_IRspec_HamekInSpaceLowLowlands_00 = I bassopiani trattengono calore più a lungo del previsto, e suggeriscono materiale più scuro mescolato nella superficie rossa.
        #JNSQscience_bd_IRspec_HamekInSpaceLowMidlands_00 = Le pianure restituiscono bande ampie con piccole anomalie persistenti, chiazze che non si raffreddano come i vicini.
        #JNSQscience_bd_IRspec_HamekInSpaceLowHighlands_00 = Le alture si raffreddano in modo brutale: la firma IR suggerisce terreno ruvido e poroso che si rifiuta di immagazzinare calore.
        #JNSQscience_bd_IRspec_HamekInSpaceLowPoles_00 = I poli sprofondano in un freddo profondo, ma deboli caratteristiche di brina restano nello spettro come un pensiero muto.
        #JNSQscience_bd_IRspec_NaraInSpaceHigh_00 = Da un'orbita alta, Nara è un bagliore tenue e freddo avvolto in ampie bande di assorbimento idrogeno-elio.
        #JNSQscience_bd_IRspec_NaraInSpaceLowLowlands_00 = I bassopiani irradiano un tepore appena più costante: lo spettro suggerisce suolo più uniforme sotto un'atmosfera spessa e affamata di IR.
        #JNSQscience_bd_IRspec_NaraInSpaceLowMidlands_00 = Le medie altitudini mostrano gradienti termici a strati, come se la superficie fosse vista attraverso coperte di gas sovrapposte.
        #JNSQscience_bd_IRspec_NaraInSpaceLowHighlands_00 = Le alture arrivano con bordi di temperatura più netti dove l'aria si assottiglia quanto basta da smettere di barare.
        #JNSQscience_bd_IRspec_NaraInSpaceLowMountains_00 = Le ombre delle montagne scavano profondi cunei di freddo nella scansione: le dorsali al sole divampano, poi spariscono dietro le bande atmosferiche.
        #JNSQscience_bd_IRspec_NaraInSpaceLowPolarLowlands_00 = I bassopiani polari risultano trappole fredde persistenti, con deboli caratteristiche stabili che si rifiutano di scaldarsi.
        #JNSQscience_bd_IRspec_NaraInSpaceLowPoles_00 = Il polo è una trappola IR pulita: l'atmosfera sopra sembra più calma, e in qualche modo è ancora più preoccupante.
        #JNSQscience_bd_IRspec_NaraInSpaceLowPolarHighlands_00 = Il terreno polare alto mostra strisce caldo-freddo nette, come se il pianeta fosse scansionato attraverso un pettine ghiacciato.
        #JNSQscience_bd_IRspec_AmosInSpaceHigh_00 = Amos è un punto IR freddo e tagliente, niente foschia, niente pietà, solo roccia e ombra.
        #JNSQscience_bd_IRspec_AmosInSpaceLowLowlands_00 = I bassopiani trattengono calore un soffio più a lungo: la polvere fine che si raccoglie qui crea una coperta termica sorprendentemente efficace.
        #JNSQscience_bd_IRspec_AmosInSpaceLowMidlands_00 = Lo spettro è a chiazze e affollato, e suggerisce macerie miste sparse senza alcun piano.
        #JNSQscience_bd_IRspec_AmosInSpaceLowHighlands_00 = Le alture oscillano dal caldo al freddo in fretta: materiale esposto e fratturato domina la firma infrarossa.
        #JNSQscience_bd_IRspec_AmosInSpaceLowMountains_00 = Le dorsali montuose lampeggiano luminose al sole e calano di colpo in ombra, trasformando la scansione in un seghetto frastagliato.
        #JNSQscience_bd_IRspec_AmosInSpaceLowPoles_00 = I poli sprofondano in un freddo profondo e ostinato, con solo minuscoli dossi al sole che risultano come spilli tiepidi.
        #JNSQscience_bd_IRspec_EnonInSpaceHigh_00 = Enon risulta un disco pallido e freddo con bande pulite simili al ghiaccio e quasi nessuna variazione termica a questa distanza.
        #JNSQscience_bd_IRspec_EnonInSpaceLowLowlands_00 = I bassopiani mostrano ritorni più uniformi e più freddi: lo spettro si adatta a brina compattata con una spolverata di graniglia.
        #JNSQscience_bd_IRspec_EnonInSpaceLowMidlands_00 = Le medie latitudini aggiungono sottili stranezze di assorbimento, come se ghiacci diversi fossero stratificati e ci litigassero sopra.
        #JNSQscience_bd_IRspec_EnonInSpaceLowHighlands_00 = Le alture si raffreddano all'istante: caratteristiche più nette suggeriscono terreno più ruvido e meno "sofficezza" isolante.
        #JNSQscience_bd_IRspec_EnonInSpaceLowPoles_00 = Le regioni polari sono quasi nere in IR dove l'ombra persiste, e suggeriscono trappole fredde di lunga durata.
        #JNSQscience_bd_IRspec_PraxInSpaceHigh_00 = Prax è un piccolo mondo freddo con una firma IR sorprendentemente "texturizzata", troppi dettagli per qualcosa di così quieto.
        #JNSQscience_bd_IRspec_PraxInSpaceLowLowlands_00 = I bassopiani restituiscono una curva più calda del previsto, e suggeriscono grani più scuri mescolati nella brina di superficie.
        #JNSQscience_bd_IRspec_PraxInSpaceLowMidlands_00 = Le pianure mostrano bande ampie e smorzate con minuscole anomalie persistenti che non si raffreddano come il resto.
        #JNSQscience_bd_IRspec_PraxInSpaceLowHighlands_00 = Le alture risultano secche e nette: i bordi della roccia esposta tagliano linee termiche pulite nella scansione.
        #JNSQscience_bd_IRspec_PraxInSpaceLowMountains_00 = I picchi alternano pendii roventi e ombre congelate, come se il terreno stesse provando a trasformarsi in un'onda.
        #JNSQscience_bd_IRspec_PraxInSpaceLowPoles_00 = I poli restano profondamente freddi, con deboli impronte di ghiaccio più forti nelle ombre più scure e più lunghe.

        // bd_magScan
        #JNSQscience_bd_magScan_MohoSrfLandedPoles_00 = Nelle ombre lunghe, il magnetometro finalmente si calma abbastanza da ascoltare il debole, stanco sussurro magnetico di Moho.
        #JNSQscience_bd_magScan_MohoSrfLandedLowlands_00 = La scansione resta vicino allo zero, ma la polvere granulosa ricca di ferro fa sussultare l'ago ogni volta che sollevi regolite.
        #JNSQscience_bd_magScan_MohoSrfLandedPolarIceCraters_00 = Il suolo da trappola fredda dà una base pulita, finché una raffica di particelle cariche non sfiora il bordo del cratere e la traccia increspa.
        #JNSQscience_bd_magScan_MohoSrfLandedHighlands_00 = Rocce antiche trattengono minuscole tasche di magnetismo residuo, come se Moho ricordasse un campo che non ha mai avuto davvero.
        #JNSQscience_bd_magScan_MohoSrfLandedMidlands_00 = Il campo è debole, uniforme e indifferente. Moho sembra magneticamente poco interessato alla tua presenza.
        #JNSQscience_bd_magScan_MohoSrfLandedCraters_00 = Picchi netti spuntano vicino al fuso d'impatto. Il sensore ti chiede educatamente di non parcheggiare su nulla di "appena craterizzato".
        #JNSQscience_bd_magScan_MohoSrfLandedExoticCraters_00 = La firma è insolitamente forte per la zona, e suggerisce un impattatore con molto metallo e un brutto carattere.
        #JNSQscience_bd_magScan_MohoSrfLandedRareCraters_00 = Una piccola area registra come un magnete sepolto. O è un masso strano, o lo strumento sta facendo teatro.
        #JNSQscience_bd_magScan_MohoSrfLandedVoronoiCraters_00 = La scansione disegna un motivo ripetuto di deboli anomalie: fratture e bordi che si comportano come minuscoli aghi di bussola spezzati.
        #JNSQscience_bd_magScan_MohoSrfLandedNotableCraters_00 = Bordo e fondo non sono d'accordo su quale debba essere il "nord", e la lettura si assesta su un compromesso nervoso.
        #JNSQscience_bd_magScan_MohoSrfLandedPeaks_00 = Quassù il vento di Kerbol picchia più forte: il campo indotto si rafforza quanto basta da far sembrare che Moho stia fingendo una magnetosfera.
        #JNSQscience_bd_magScan_EveSrfSplashed_00 = La zuppa viola conduttiva spalma la traccia in un lento ondeggiare: il magnetometro vorrebbe tornare in orbita, adesso.
        #JNSQscience_bd_magScan_EveSrfLandedPoles_00 = Non c'è un vero campo di cui parlare, ma raffiche di particelle cariche fanno tremolare la lettura, come se il cielo stesse cercando di disegnarla per te.
        #JNSQscience_bd_magScan_EveSrfLandedLowlands_00 = La base resta vicino allo zero mentre l'aria densa e la carica statica fanno del loro meglio per imitare "dati interessanti".
        #JNSQscience_bd_magScan_EveSrfLandedMidlands_00 = Un segnale debole e irregolare va e viene, soprattutto da correnti indotte e dall'entusiasmo del pianeta per i dispetti elettrici.
        #JNSQscience_bd_magScan_EveSrfLandedHighlands_00 = L'aria più sottile calma il rumore, e lascia un risultato pulito: quasi nulla, con occasionali scatti dovuti al meteo spaziale.
        #JNSQscience_bd_magScan_EveSrfLandedPeaks_00 = Quassù il sensore sente soprattutto il vento di Kerbol che scorre su Eve, e spinge l'ago in lenti increspature ubbidienti.
        #JNSQscience_bd_magScan_EveSrfLandedMountains_00 = Piccoli picchi suggeriscono minerali magnetizzati sparsi, come se qualcuno avesse salato le rocce con giusto abbastanza metallo da dare fastidio.
        #JNSQscience_bd_magScan_EveSrfLandedShores_00 = Suolo bagnato e chimica strana trasformano la scansione in un caos crepitante: il "campo" somiglia fin troppo al tuo lander che perde elettroni.
        #JNSQscience_bd_magScan_EveSrfLandedKrakensWell_00 = Lo strumento trova un gruppo compatto di anomalie taglienti, come se qualcosa sepolto laggiù insistesse silenziosamente nell'avere un nord.
        #JNSQscience_bd_magScan_GillySrfLandedLowlands_00 = Il magnetometro riporta uno zero eroico, poi aggiunge qualche briciola tremolante che probabilmente è solo polvere carica.
        #JNSQscience_bd_magScan_GillySrfLandedMidlands_00 = La traccia è così piatta da poterla usare come righello: qualunque "campo" tu veda è il sensore che prova a restare sveglio.
        #JNSQscience_bd_magScan_GillySrfLandedHighlands_00 = Un debole segnale compare vicino a un sassolino ricco di metalli, poi svanisce. Tutta la personalità magnetica di Gilly in un attimo.
        #JNSQscience_bd_magScan_KerbinSrfLandedAdministration_00 = Il magnetometro rileva un campo potente e stabile, generato da computer e proiettori di diapositive.
        #JNSQscience_bd_magScan_KerbinSrfLandedAstronautComplex_00 = Le letture impennano vicino agli armadietti degli snack, poi ondeggiano in modo folle vicino alla collezione di "souvenir". Nessuno ammette di possedere magneti.
        #JNSQscience_bd_magScan_KerbinSrfLandedCrawlerway_00 = Il tondino d'armatura e i cingoli del crawler piegano il campo locale in una lenta e determinata marcia. Il responsabile della sicurezza ti chiede di "scansionare meno intensamente".
        #JNSQscience_bd_magScan_KerbinSrfLandedFlagPole_00 = L'ago continua a provare a fare il saluto. Una guardia spiega che le "anomalie patriottiche" richiedono un permesso separato.
        #JNSQscience_bd_magScan_KerbinSrfLandedLaunchPad_00 = Il magnetometro urla vicino al cablaggio della rampa, poi tace quando ti allontani dal grosso cavo rosso. La squadra della rampa applaude questa scoperta.
        #JNSQscience_bd_magScan_KerbinSrfLandedMissionControl_00 = I tuoi dati vengono subito classificati come "operativamente magnetici". Ti tornano indietro con metà dei numeri sostituiti da barre nere.
        #JNSQscience_bd_magScan_KerbinSrfLandedR&D_00 = Il campo locale è un caos di schermature, prototipi e qualcosa etichettato "temporaneo". Uno scienziato ti chiede di smettere di domandare cosa significhi "temporaneo".
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DCentralBuilding_00 = Il campo è sospettosamente pulito e ben educato, come se fosse stato revisionato da un comitato. Il tuo rapporto torna con "per favore, rimisura in modo più sicuro".
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DCornerLab_00 = L'ago punta direttamente a un armadietto chiuso a chiave. Qualcuno tossisce e dice: "Quell'armadietto non fa parte dell'esperimento".
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DMainBuilding_00 = Ogni volta che si apre una porta, le letture saltano come se si fossero spaventate. Gli ingegneri insistono che l'edificio non è "infestato", ma semplicemente "ben attrezzato".
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DObservatory_00 = Il magnetometro continua ad allinearsi con la montatura rotante invece che con il nord. L'operatore lo definisce "una funzionalità" e chiude il portello.
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DSideLab_00 = Un ronzio basso fa deragliare le letture in cerchi perfetti. Un tecnico ti offre un adesivo con scritto "CALIBRATO (PROBABILMENTE)".
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DSmallLab_00 = Il sensore rileva un forte campo dipolare che proviene da un cassetto degli attrezzi. Il cassetto viene subito dichiarato "non scientifico" e sigillato con del nastro.
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DTanks_00 = I serbatoi agiscono come enormi magneti da scherzo, trascinando l'ago in archi drammatici. Ti viene consigliato di "non antagonizzare lo stoccaggio".
        #JNSQscience_bd_magScan_KerbinSrfLandedR&DWindTunnel_00 = Il flusso d'aria non è magnetico, ma l'enorme motore decisamente sì. Il magnetometro presenta una lamentela ufficiale per essere vicino a "pericolo rotante".
        #JNSQscience_bd_magScan_KerbinSrfLandedRunway_00 = Un jet di passaggio trasforma il tuo grafico in un capolavoro astratto. Il personale di terra suggerisce di pubblicarlo come "navigazione moderna".
        #JNSQscience_bd_magScan_KerbinSrfLandedSPH_00 = Cellule di velivoli a metà creano un mosaico di campi e spigoli netti. Il magnetometro indica tre diversi "nord" e un ingegnere imbarazzato.
        #JNSQscience_bd_magScan_KerbinSrfLandedSPHMainBuilding_00 = I motori dei portoni e le gru a ponte fanno saltare le letture a comando. Un supervisore chiede di far coincidere la scienza tra i sollevamenti programmati.
        #JNSQscience_bd_magScan_KerbinSrfLandedSPHRoundTank_00 = L'ago si blocca, si sblocca, poi si blocca di nuovo vicino al metallo curvo. Qualcuno borbotta di "dramma magnetico" e offre altro nastro schermante.
        #JNSQscience_bd_magScan_KerbinSrfLandedSPHTanks_00 = I serbatoi impilati influenzano silenziosamente il campo locale come una pila di segreti colpevoli. Il tuo grafico viene confiscato perché "troppo accurato".
        #JNSQscience_bd_magScan_KerbinSrfLandedSPHWaterTower_00 = L'acqua non è magnetica, ma la scala e i bulloni della torre dissentono con forza. Il responsabile della sicurezza insiste che tu scansioni dal lato approvato della recinzione.
        #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationDishEast_00 = I motori di azionamento dell'antenna tirano le letture avanti e indietro come un metronomo. Il tecnico lo chiama "sincronizzazione con la dirigenza".
        #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationDishNorth_00 = Il magnetometro sussulta ogni volta che l'antenna ruota. Ti viene chiesto di smettere di misurare "mentre la cosa grossa fa cose grosse".
        #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationDishSouth_00 = I condotti di alimentazione producono uno spostamento pulito e costante. Qualcuno suggerisce di archiviarlo come "intenzionale" per evitare di rifare i cavi.
        #JNSQscience_bd_magScan_KerbinSrfLandedTrackingStationHub_00 = All'interno il campo è calmo, ben ancorato e intensamente supervisionato. Il sensore registra "variazione minima: sospetto massimo".
        #JNSQscience_bd_magScan_KerbinSrfLandedVAB_00 = L'intero edificio si comporta come un gigantesco magnete leggermente irritato. L'ago punta verso la gru più vicina e si rifiuta di elaborare.
        #JNSQscience_bd_magScan_KerbinSrfLandedVABMainBuilding_00 = Quando la passerella si muove, il campo locale sobbalza in simpatia. Un ingegnere chiede se puoi "rimagnetizzarlo alla normalità".
        #JNSQscience_bd_magScan_KerbinSrfLandedVABPodMemorial_00 = Le letture sono quiete e stabili, disturbate solo dal tuo passo rispettoso. Qui il magnetometro sceglie di non bipare.
        #JNSQscience_bd_magScan_KerbinSrfLandedVABRoundTank_00 = Il sensore rileva un campo forte e un desiderio ancora più forte che tu te ne vada. La sicurezza consiglia di "scansionare l'aria, invece".
        #JNSQscience_bd_magScan_KerbinSrfLandedVABSouthComplex_00 = Saldatrici ed elettroutensili fanno ballare l'ago come se fosse a un concerto. Il responsabile della sicurezza lo definisce "istruttivo" e agita una clipboard.
        #JNSQscience_bd_magScan_KerbinSrfLandedVABTanks_00 = File di serbatoi creano un ordinato bias magnetico verso lo "stoccaggio". Il tuo rapporto finisce sotto "noto, ma scomodo".
        #JNSQscience_bd_magScan_KerbinSrfLandedKSC_00 = Una scansione ad area vasta rivela che il centro spaziale è una sinfonia di acciaio, cavi e messa a terra discutibile. Il nord è tecnicamente presente, ma messo in minoranza.
        #JNSQscience_bd_magScan_KerbinSrfLandedIslandAirfield_00 = Vecchie attrezzature e cablaggi nascosti aggiungono un simpatico ondeggiare al campo. Il magnetometro lo etichetta "interferenza storica".
        #JNSQscience_bd_magScan_KerbinSrfLandedBaikerbanur_00 = Il campo magnetico è stabile, la burocrazia è più forte. Al tuo strumento viene assegnato un badge da visitatore e un elenco di direzioni approvate.
        #JNSQscience_bd_magScan_KerbinSrfLandedBaikerbanurLaunchpad_00 = Enormi strutture della rampa piegano il campo in un angolo netto e pratico: "via". Tu ubbidisci e l'ago si rilassa.
        #JNSQscience_bd_magScan_KerbinSrfLandedWoomerang_00 = L'ago punta da qualche parte tra "nord" e "laggiù". Il personale assicura che è normale per questa struttura essere un po'... di traverso.
        #JNSQscience_bd_magScan_KerbinSrfSplashed_00 = Il magnetometro insiste che non è uno "strumento marino", ma registra comunque un campo liscio e noiosamente sano tra le onde.
        #JNSQscience_bd_magScan_KerbinSrfLandedHighlands_00 = La scansione coincide quasi perfettamente con il campo da manuale, con giusto quel tanto di ondeggiamento da ricordarti che sotto c'è un intero pianeta.
        #JNSQscience_bd_magScan_KerbinSrfLandedShores_00 = Sale conduttivo e sabbia bagnata rendono le letture nervose: le linee di campo sembrano "ronzare" un po' più forte vicino all'acqua.
        #JNSQscience_bd_magScan_KerbinSrfLandedMidlands_00 = Un campo calmo e costante arriva come il meteo: prevedibile, affidabile e silenziosamente rassicurante.
        #JNSQscience_bd_magScan_KerbinSrfLandedLowlands_00 = Il campo locale è stabile e abbastanza forte da far suonare il Controllo Missione compiaciuto senza un motivo evidente.
        #JNSQscience_bd_magScan_KerbinSrfLandedAridLowlands_00 = Suolo secco ed elettricità statica fanno tremolare l'ago, ma il segnale di fondo resta solidamente nella norma di Kerbin.
        #JNSQscience_bd_magScan_KerbinSrfLandedAridMidlands_00 = La polvere finisce ovunque, anche nella scienza. Dai un colpetto all'alloggiamento: i dati sembrano subito più collaborativi.
        #JNSQscience_bd_magScan_KerbinSrfLandedAridHighlands_00 = Aria sottile, roccia secca e una traccia magnetica nitida, come se il pianeta stesse mostrando quanto sa comportarsi ordinatamente.
        #JNSQscience_bd_magScan_KerbinSrfLandedAridMountains_00 = Il campo qui è stabile, ma piccoli picchi netti compaiono ogni volta che appoggi il sensore su pietre dall'aria particolarmente ostinata.
        #JNSQscience_bd_magScan_KerbinSrfLandedWelcomeBackIsland_00 = Il magnetometro legge una firma perfettamente familiare. È quasi come se Kerbin ti facesse ciao.
        #JNSQscience_bd_magScan_KerbinSrfLanded_00 = Bill sostiene che piccole variazioni del campo magnetico di Kerbin si possano sfruttare per la "vera casualità". Il Controllo Missione suggerisce di tornare ai "veri obiettivi della missione".
        #JNSQscience_bd_magScan_KerbinSrfLanded_00 = Accenni a un uso redditizio del rumore del magnetometro. Il Controllo Missione risponde inventando diverse nuove voci di checklist, tutte intitolate "FAI SCIENZA".
        #JNSQscience_bd_magScan_MunSrfLandedHighlands_00 = Il magnetometro traccia una base pulita, quasi a zero. Le alture sono magneticamente silenziose quanto sembrano.
        #JNSQscience_bd_magScan_MunSrfLandedMidlands_00 = Le letture restano ostinatamente piatte, con solo piccoli sussulti che sembrano più rumore dello strumento che un vero campo.
        #JNSQscience_bd_magScan_MunSrfLandedLowlands_00 = Un segnale debole e irregolare va e viene mentre ti muovi. Rocce antiche che ricordano un campo che Mun non produce più.
        #JNSQscience_bd_magScan_MunSrfLandedPolarIceCraters_00 = L'ago finalmente si rianima: i detriti esposti del cratere trattengono un magnetismo residuo sorprendentemente forte.
        #JNSQscience_bd_magScan_MunSrfLandedExoticCraters_00 = Picchi magnetici netti tracciano il fondo del cratere, come se un impattatore avesse portato con sé un pezzetto di "altrove".
        #JNSQscience_bd_magScan_MunSrfLandedRareCraters_00 = Anomalie a chiazze divampano ai bordi e svaniscono nelle distese, come se qualcuno avesse sparso polvere magnetizzata a mano.
        #JNSQscience_bd_magScan_MunSrfLandedVoronoiCraters_00 = La scansione dipinge un motivo ripetuto di deboli punti caldi. Cicatrici annidate, frammenti annidati di magnetismo intrappolato.
        #JNSQscience_bd_magScan_MunSrfLandedNotableCraters_00 = Qui compaiono due firme distinte, ciascun cratere racconta la stessa storia con una statica leggermente diversa.
        #JNSQscience_bd_magScan_MunSrfLandedMountains_00 = Sulla cresta il campo è quasi nulla: le rocce sussurrano di magnetismo solo quando avvicini il sensore.
        #JNSQscience_bd_magScan_MinmusSrfLandedPoles_00 = Il campo è così debole che il magnetometro suggerisce di passare alla "modalità immaginazione" per vedere qualcosa.
        #JNSQscience_bd_magScan_MinmusSrfLandedLowlands_00 = La lettura resta piatta e annoiata. Minmus continua la sua fiera tradizione di non avere una personalità magnetica.
        #JNSQscience_bd_magScan_MinmusSrfLandedMidlands_00 = Aspetti che l'ago si muova. Non si muove. Lo strumento presenta un reclamo formale.
        #JNSQscience_bd_magScan_MinmusSrfLandedHighlands_00 = Più in alto, il risultato è lo stesso: magneticamente morto, solo con una vista migliore.
        #JNSQscience_bd_magScan_MinmusSrfLandedBasins_00 = La traccia è perfettamente liscia, come se qualcuno avesse stirato il campo magnetico in un foglio ordinato e vuoto.
        #JNSQscience_bd_magScan_MinmusSrfLandedBrownBasins_00 = Il "marrone" non aggiunge magnetismo. Rende solo il nulla leggermente più serio.
        #JNSQscience_bd_magScan_MinmusSrfLandedBrownLowlands_00 = Ancora nessun campo. Solo una tonalità più scura di delusione nei dati.
        #JNSQscience_bd_magScan_MinmusSrfLandedBrownMidlands_00 = Le letture restano piatte. Qualunque cosa renda marroni queste aree, non è il magnetismo.
        #JNSQscience_bd_magScan_MinmusSrfLandedBrownHighlands_00 = Lo strumento rileva esattamente zero entusiasmo, anche in quota.
        #JNSQscience_bd_magScan_MinmusSrfLandedMountains_00 = Sulle cime di Minmus, il campo magnetico è assente quanto il buon senso nel piano di missione.
        #JNSQscience_bd_magScan_DunaSrfLandedIceCaps_00 = Il magnetometro finalmente trova qualcosa da fare: un segnale tenue e ondulante che va e viene con le particelle cariche sopra le calotte.
        #JNSQscience_bd_magScan_DunaSrfLandedHighlands_00 = Aria sottile, roccia antica e una traccia residua debole ma misurabile, come se la crosta di Duna ricordasse un campo che non può più generare.
        #JNSQscience_bd_magScan_DunaSrfLandedMidlands_00 = La base resta bassa e stabile finché un po' di polvere non scivola oltre il sensore e fa sussultare l'ago.
        #JNSQscience_bd_magScan_DunaSrfLandedLowlands_00 = Anomalie sottili e irregolari suggeriscono chiazze di minerali sepolte, nascoste sotto molta terra rossa decisamente determinata.
        #JNSQscience_bd_magScan_DunaSrfLandedCraters_00 = Picchi netti si addensano attorno al bordo: il fuso d'impatto sembra aver congelato una minuscola e ostinata firma magnetica.
        #JNSQscience_bd_magScan_DunaSrfLandedRareCraters_00 = Una zona risulta più forte del dovuto, come se un visitatore ricco di ferro avesse lasciato un souvenir nella regolite.
        #JNSQscience_bd_magScan_DunaSrfLandedVoronoiCraters_00 = La scansione mappa un motivo ripetuto di deboli punti caldi, come se il suolo fratturato stesse indicando in silenzio più direzioni allo stesso tempo.
        #JNSQscience_bd_magScan_DunaSrfLandedNotableCraters_00 = Bordo e fondo non sono d'accordo sul "nord": lo strumento si assesta su un ondeggiamento di compromesso e lo chiama scienza.
        #JNSQscience_bd_magScan_DunaSrfLandedExoticCraters_00 = La firma non combacia affatto con l'intorno. Qui qualcosa è magneticamente fuori posto.
        #JNSQscience_bd_magScan_DunaSrfLandedTrenches_00 = La traccia si piega e si attorciglia lungo le pareti delle trincee, e suggerisce materiale stratificato con storie magnetiche diverse.
        #JNSQscience_bd_magScan_DunaSrfLandedNotablePlains_00 = Una lettura ampia e calma, debole, coerente e perfetta per calibrare tutto ciò che vorresti fosse più eccitante.
        #JNSQscience_bd_magScan_DunaSrfLandedNotableMountains_00 = L'altitudine calma il rumore di fondo, ma l'ago increspa ancora con il meteo spaziale che passa sopra la cresta.
        #JNSQscience_bd_magScan_DunaSrfLandedMountains_00 = Quassù la crosta si fa silenziosa e il sensore sente soprattutto il tremolio indotto dal vento di Kerbol che sfiora Duna.
        #JNSQscience_bd_magScan_DunaSrfLandedVolcano_00 = La roccia calda cancella il vecchio magnetismo, ma le colate raffreddate ne conservano sottili strisce.
        #JNSQscience_bd_magScan_IkeSrfLandedPoles_00 = La lettura è quasi piatta, con un lieve spostamento che sembra più un effetto indotto che qualcosa che Ike possa rivendicare come suo.
        #JNSQscience_bd_magScan_IkeSrfLandedMountains_00 = Premuto vicino al bedrock, il magnetometro coglie minuscoli picchi. Piccole sacche di magnetismo residuo aggrappate alle alture.
        #JNSQscience_bd_magScan_IkeSrfLandedMidlands_00 = Una base pulita e senza caratteristiche: magneticamente morto, con efficienza.
        #JNSQscience_bd_magScan_IkeSrfLandedLowlands_00 = L'ago trema ogni volta che la polvere si muove, ma il segnale di fondo resta un poco ambizioso quasi-zero.
        #JNSQscience_bd_magScan_IkeSrfLandedHighlands_00 = Anomalie deboli e a chiazze sfarfallano dentro e fuori, come se il vecchio fuso d'impatto ricordasse il magnetismo per un attimo e poi lo dimenticasse di nuovo.
        #JNSQscience_bd_magScan_EdnaInSpaceLow_00 = Il magnetometro registra una traccia tenue e ostinata, il piccolo ammasso di rocce di Edna riesce a malapena a dire un "ciao" magnetico.
        #JNSQscience_bd_magScan_EdnaInSpaceHigh_00 = Più lontano, il segnale si appiattisce in un silenzio quasi perfetto. Se Edna ha un campo, se lo tiene per sé.
        #JNSQscience_bd_magScan_EdnaSrfLandedLowlands_00 = L'ago resta vicino allo zero, e passa pigramente sopra polvere scura che sembra magneticamente disinteressata a tutto.
        #JNSQscience_bd_magScan_EdnaSrfLandedMidlands_00 = Minuscoli segnali vanno e vengono, come granelli sparsi di macerie vecchie e debolmente magnetizzate nascoste nella regolite.
        #JNSQscience_bd_magScan_EdnaSrfLandedHighlands_00 = Picchi a chiazze compaiono quando il sensore si avvicina alla roccia esposta, piccole sacche di magnetismo residuo in un mondo per lo più morto.
        #JNSQscience_bd_magScan_EdnaSrfLandedPolarIceCraters_00 = Il suolo freddo è silenzioso, ma occasionali raffiche di particelle cariche fanno increspare la lettura lungo il bordo del cratere.
        #JNSQscience_bd_magScan_EdnaSrfLandedWhites_00 = La superficie luminosa dà basi pulite, poi improvvisi piccoli sussulti, come se la roba "bianca" stesse accumulando elettricità statica.
        #JNSQscience_bd_magScan_DakInSpaceLow_00 = La traccia trema mentre passi sopra la massa bitorzoluta di Dak, poi si assesta su "nessun campo rilevato, smettila di chiedere".
        #JNSQscience_bd_magScan_DakInSpaceHigh_00 = La firma magnetica di Dak cala in fretta: quassù lo strumento misura soprattutto spazio vuoto e la tua elettronica.
        #JNSQscience_bd_magScan_DakSrfLandedLowlands_00 = Il magnetometro non trova quasi nulla, punteggiato da brevi picchi ogni volta che urti un sassolino dall'aria particolarmente metallica.
        #JNSQscience_bd_magScan_DakSrfLandedMidlands_00 = Una base piatta con rumore occasionale, la "chiamata della sirena" di Dak a quanto pare non è elettromagnetica.
        #JNSQscience_bd_magScan_DakSrfLandedHighlands_00 = Le letture sono deboli e irregolari, come se la superficie non sapesse decidere se abbia mai incontrato un campo magnetico in vita sua.
        #JNSQscience_bd_magScan_DresSrfLandedPoles_00 = Un segnale basso e costante appare a chiazze, e suggerisce che il suolo polare ricordi il magnetismo in sottili strati congelati.
        #JNSQscience_bd_magScan_DresSrfLandedHighlands_00 = Piccole anomalie taglienti restano aggrappate alle dorsali esposte, minuscoli aghi di bussola intrappolati nella pietra antica.
        #JNSQscience_bd_magScan_DresSrfLandedMidlands_00 = I dati sono una linea piatta quasi perfetta. Dres resta fieramente, efficientemente non magnetico.
        #JNSQscience_bd_magScan_DresSrfLandedLowlands_00 = Qui l'ago si solleva un poco di più, e suggerisce minerali più densi sepolti sotto il paesaggio notoriamente poco entusiasmante di Dres.
        #JNSQscience_bd_magScan_DresSrfLandedCanyon_00 = Le pareti del canyon disegnano deboli strisce di anomalie, come se la geologia lasciasse in silenzio appunti magnetici negli strati.
        #JNSQscience_bd_magScan_LaytheInSpaceLow_00 = In orbita bassa è un tiro alla fune: il campo di Laythe mantiene la forma, mentre l'influenza di Jool prova continuamente a scarabocchiarci sopra.
        #JNSQscience_bd_magScan_LaytheInSpaceHigh_00 = Più lontano, il segnale di Laythe si assottiglia e il meteo magnetico di Jool fa la maggior parte del discorso.
        #JNSQscience_bd_magScan_LaytheSrfSplashed_00 = L'acqua salata conduce benissimo, e trasforma la scansione in un'ondulazione liscia e continua, come se l'oceano facesse parte del circuito.
        #JNSQscience_bd_magScan_LaytheSrfLandedShores_00 = Suolo bagnato e risacca vicina aggiungono un lieve sibilo di induzione, ma il campo di base di Laythe resta presente con sicurezza.
        #JNSQscience_bd_magScan_LaytheSrfLandedShallows_00 = Il magnetometro coglie lenti impulsi da maree e correnti, come se il mare trascinasse avanti e indietro le linee di campo.
        #JNSQscience_bd_magScan_LaytheSrfLandedLowlands_00 = Un campo superficiale stabile sta sotto deboli increspature periodiche, la magnetosfera di Jool che passa sopra come un tuono lontano.
        #JNSQscience_bd_magScan_LaytheSrfLandedMidlands_00 = La traccia è calma e leggibile, con ondulazioni occasionali che combaciano con "qualcosa in orbita ha appena fatto rumore".
        #JNSQscience_bd_magScan_LaytheSrfLandedHighlands_00 = Aria più sottile, segnale più pulito: il campo di Laythe arriva nitido, poi si piega leggermente quando le particelle cariche sfilano.
        #JNSQscience_bd_magScan_LaytheSrfLandedMountains_00 = Picchi locali compaiono e spariscono attorno alle rocce: il terreno sembra portare cicatrici magnetizzate da un interno attivo.
        #JNSQscience_bd_magScan_LaytheSrfLandedIceCaps_00 = Il campo si indebolisce e tremola ai poli: i numeri danzano come un'aurora che non riesci a vedere bene attraverso la lettura.
        #JNSQscience_bd_magScan_LaytheSrfLandedEnclosedFaults_00 = La scansione trema in scariche nette, e suggerisce strati conduttivi o fluidi in movimento in profondità che stanno agitando le linee di campo.
        #JNSQscience_bd_magScan_VallSrfLandedPoles_00 = Un segnale tenue e vagante suggerisce induzione, qualcosa sotto il ghiaccio si muove e il magnetometro quasi riesce a sentirlo.
        #JNSQscience_bd_magScan_VallSrfLandedHighlands_00 = Il campo resta debole, ma la direzione si sposta lentamente, come se Vall stesse prendendo magnetismo in prestito da Jool e lo restituisse un po' piegato.
        #JNSQscience_bd_magScan_VallSrfLandedMidlands_00 = Letture lisce e quasi a zero vengono interrotte da impulsi gentili, come una marea, ma per linee invisibili.
        #JNSQscience_bd_magScan_VallSrfLandedLowlands_00 = Sottili fluttuazioni si allineano con il suolo sotto di te: i dati suggeriscono ghiaccio stratificato che nasconde un segreto conduttivo.
        #JNSQscience_bd_magScan_VallSrfLandedMountains_00 = Qui l'ago sussulta di più, non più forte, solo più pignolo, come se la crosta fosse crepata e il campo indotto non sapesse dove andare.
        #JNSQscience_bd_magScan_TyloInSpaceLow_00 = Da vicino, Tylo deforma il campo di Jool in gradienti netti: il magnetometro sembra offeso per principio.
        #JNSQscience_bd_magScan_TyloInSpaceHigh_00 = In quota le distorsioni si ammorbidiscono, ma Tylo piega ancora il campo di fondo come un oggetto pesante appoggiato su un trampolino.
        #JNSQscience_bd_magScan_TyloSrfLandedPoles_00 = Letture forti, pessime maniere: il campo è intenso ma si rifiuta di assestarsi in un qualsiasi disegno educato allineato ai poli.
        #JNSQscience_bd_magScan_TyloSrfLandedMountains_00 = Il magnetometro va a fondo scala vicino alla roccia esposta, poi scatta indietro, la crosta di Tylo è piena di sorprese magnetiche.
        #JNSQscience_bd_magScan_TyloSrfLandedHighlands_00 = Anomalie ampie e forti scorrono sotto il sensore come dorsali sepolte, ciascuna con la propria idea di "nord".
        #JNSQscience_bd_magScan_TyloSrfLandedMidlands_00 = Il segnale resta potente ma caotico, come se Tylo fosse fatto di magneti lasciati cadere e mai più raccolti.
        #JNSQscience_bd_magScan_TyloSrfLandedLowlands_00 = Qui la traccia si fa un po' più uniforme, ma è ancora abbastanza forte da ricordarti che Tylo è fatto, in silenzio, di roba molto seria.
        #JNSQscience_bd_magScan_BopSrfLandedPoles_00 = L'ago si schianta verso il "nord" e ci resta, come se Bop insistesse personalmente perché tu smetta di fingere che esistano altre direzioni.
        #JNSQscience_bd_magScan_BopSrfLandedMountains_00 = La scansione è saturata di forza: spostare il sensore di un metro cambia tutto, come se la sorgente fosse insieme vicina e impossibile.
        #JNSQscience_bd_magScan_BopSrfLandedLowlands_00 = Il campo resta schiacciante, ma i gradienti si addolciscono, finché non incontri una zona che fa impennare la lettura come un urlo.
        #JNSQscience_bd_magScan_BopSrfLandedMidlands_00 = Una magnetosfera irregolare e sbilenca filtra dritta nel suolo: i numeri sembrano assemblati da ritagli.
        #JNSQscience_bd_magScan_BopSrfLandedHighlands_00 = Linee forti arcano sopra la testa e si tuffano nel terreno lì vicino: la "sorgente del polo nord" sembra troppo reale da quassù.
        #JNSQscience_bd_magScan_PolInSpaceLow_00 = Pol viaggia per lo più dentro il flusso magnetico di Jool: l'unica caratteristica "locale" è quanto Pol intralci il passaggio.
        #JNSQscience_bd_magScan_PolInSpaceHigh_00 = Quassù il campo diventa una deriva sottile di rumore carico, come se l'influenza di Jool stesse finalmente perdendo interesse per questa piccola luna.
        #JNSQscience_bd_magScan_PolSrfLandedPoles_00 = Le letture sono quasi interamente Jool, ma la traccia sfarfalla con polvere carica, minuscole tempeste statiche che provano a imitare il magnetismo.
        #JNSQscience_bd_magScan_PolSrfLandedLowlands_00 = Un campo di fondo debole e costante sta sotto continui piccoli tremolii, come se la superficie stesse crepitando in silenzio.
        #JNSQscience_bd_magScan_PolSrfLandedMidlands_00 = La scansione è gentile e vaga: Pol contribuisce soprattutto esistendo in mezzo alla corrente magnetica di Jool.
        #JNSQscience_bd_magScan_PolSrfLandedHighlands_00 = L'ago ondeggia un po' di più con la quota, probabilmente per particelle cariche che sfiorano il terreno.
        #JNSQscience_bd_magScan_PolSrfLandedMountains_00 = I dati sono sottili e rumorosi, meno "campo magnetico" e più "avanzi di Jool mescolati con polvere".
        #JNSQscience_bd_magScan_LindorInSpaceLow_00 = Gli aghi del magnetometro oscillano con decisione: il campo di Lindor è forte, uniforme e quasi fin troppo ben educato.
        #JNSQscience_bd_magScan_LindorInSpaceHigh_00 = Più lontano, il segnale si assottiglia in una coda allungata e indebolita, mentre la presa magnetica di Lindor alla fine lascia andare.
        #JNSQscience_bd_magScan_KrelInSpaceLow_00 = Krel non mostra una vera magnetosfera: le linee di campo di Lindor gli si stendono sopra come un cappotto preso in prestito.
        #JNSQscience_bd_magScan_KrelInSpaceHigh_00 = Sopra Krel, il fondo svanisce verso il silenzio, interrotto solo da occasionali raffiche del meteo magnetico di Lindor.
        #JNSQscience_bd_magScan_KrelSrfLandedLowlands_00 = La superficie risulta magneticamente morta: qualunque oscillazione sembra polvere carica e assetto dello strumento.
        #JNSQscience_bd_magScan_KrelSrfLandedMidlands_00 = Una base pulita, quasi a zero. Dai comunque un colpetto all'alloggiamento, giusto per essere sicuro che sia davvero acceso.
        #JNSQscience_bd_magScan_KrelSrfLandedHighlands_00 = Minuscoli picchi compaiono vicino alla roccia esposta, e suggeriscono pochi grani ostinati che trattengono antico magnetismo residuo.
        #JNSQscience_bd_magScan_KrelSrfLandedPoles_00 = Fluttuazioni deboli e vaganti suggeriscono correnti indotte sopra la testa, più che qualcosa che Krel stia producendo da solo.
        #JNSQscience_bd_magScan_AdenInSpaceLow_00 = La scansione rileva il campo di Lindor che si piega attorno ad Aden, con piccoli gradienti netti che seguono la sua forma bitorzoluta.
        #JNSQscience_bd_magScan_AdenInSpaceHigh_00 = Quassù l'influenza di Lindor cala e il magnetometro ascolta soprattutto lo spazio quieto, con qualche increspatura occasionale.
        #JNSQscience_bd_magScan_AdenSrfLandedLowlands_00 = Quasi nulla, finché una zona dall'aria metallica non fa saltare l'ago come se si fosse appena ricordato come funzionano i magneti.
        #JNSQscience_bd_magScan_AdenSrfLandedMidlands_00 = La lettura è piatta e affidabile, come se Aden stesse facendo del suo meglio per essere noioso, per una volta.
        #JNSQscience_bd_magScan_AdenSrfLandedHighlands_00 = Anomalie tenui e a chiazze restano aggrappate alle alture, e suggeriscono minerali più densi più vicini alla superficie.
        #JNSQscience_bd_magScan_AdenSrfLandedMountains_00 = Vicino alla roccia della cresta, il sensore rileva brevi picchi netti, piccole sacche di materiale magnetizzato nella crosta.
        #JNSQscience_bd_magScan_AdenSrfLandedPoles_00 = Una lieve oscillazione va e viene con il flusso carico del cielo, come se i poli fossero il posto migliore per prendere magnetismo in prestito.
        #JNSQscience_bd_magScan_HuygenInSpaceLow_00 = Non compare alcun campo intrinseco, ma l'alta atmosfera di Huygen è vivace, correnti indotte trascinano la traccia in lente onde.
        #JNSQscience_bd_magScan_HuygenInSpaceHigh_00 = In quota, il magnetismo distante di Lindor diventa una tenue deriva con impennate periodiche che non combaciano affatto con la luna.
        #JNSQscience_bd_magScan_HuygenSrfSplashed_00 = Il liquido conduce quanto basta da spalmarle le letture in un'ondulazione uniforme, come se il lago stesse generando in silenzio il proprio rumore.
        #JNSQscience_bd_magScan_HuygenSrfLandedLowlands_00 = La base resta vicino allo zero mentre l'aria fosca crepita di statico, aggiungendo un tremolio costante a bassa intensità.
        #JNSQscience_bd_magScan_HuygenSrfLandedMidlands_00 = Una traccia calma, poi piccoli segnali improvvisi, foschia carica e la tua elettronica che discutono su chi debba essere misurato.
        #JNSQscience_bd_magScan_HuygenSrfLandedHighlands_00 = Aria più sottile ripulisce la scansione: per lo più nulla, con occasionali increspature da correnti indotte sopra la testa.
        #JNSQscience_bd_magScan_HuygenSrfLandedMountains_00 = Il segnale è debole ma irrequieto, come se l'atmosfera stesse tirando linee invisibili che in realtà non ci sono.
        #JNSQscience_bd_magScan_HuygenSrfLandedPeaks_00 = In alto, il magnetometro sente soprattutto il meteo spaziale e chiude la giornata.
        #JNSQscience_bd_magScan_HuygenSrfLandedPolarLowlands_00 = Le letture polari scintillano in lenti impulsi, e suggeriscono che l'alta atmosfera stia facendo qualcosa di complicato sopra il suolo freddo.
        #JNSQscience_bd_magScan_HuygenSrfLandedPoles_00 = L'ago si sposta senza assestarsi: quasi riesci a immaginare deboli correnti aurorali che scrivono nella foschia.
        #JNSQscience_bd_magScan_HuygenSrfLandedPolarHighlands_00 = Basi pulite e fredde con lievi increspature ripetute, effetti di induzione che sembrano guidati più dal cielo che dalla roccia.
        #JNSQscience_bd_magScan_HuygenSrfLandedShores_00 = Suolo bagnato e liquido vicino rendono la traccia un po' più forte, come se la riva facesse parte del circuito.
        #JNSQscience_bd_magScan_HuygenSrfLandedMethaneLakes_00 = Vicino alle pozze scure, il magnetometro coglie oscillazioni uniformi, simili a maree, da liquido conduttivo che ondeggia sotto un campo preso in prestito.
        #JNSQscience_bd_magScan_RigaInSpaceLow_00 = Riga non ha un campo tutto suo, ma distorce molto quello di Lindor, come una pietra pesante premuta su un telo in movimento.
        #JNSQscience_bd_magScan_RigaInSpaceHigh_00 = Più in alto, le distorsioni si attenuano e la traccia si assesta in una deriva stabile dalla vasta magnetosfera di Lindor.
        #JNSQscience_bd_magScan_RigaSrfLandedLowlands_00 = La superficie registra quasi a zero, con occasionali deboli punti caldi che suggeriscono minerali magnetici sparsi.
        #JNSQscience_bd_magScan_RigaSrfLandedMidlands_00 = Domina una base uniforme: qualunque cosa renda Riga interessante, non è un campo magnetico vivace.
        #JNSQscience_bd_magScan_RigaSrfLandedHighlands_00 = Anomalie deboli e a chiazze sfarfallano dentro e fuori, come se diversi strati di roccia continuassero a litigare su cosa ricordano.
        #JNSQscience_bd_magScan_RigaSrfLandedMountains_00 = Vicino alla roccia esposta, lo strumento coglie picchi più netti, piccole firme residue intrappolate nel terreno alto.
        #JNSQscience_bd_magScan_RigaSrfLandedPoles_00 = I poli mostrano fluttuazioni leggermente più forti, probabilmente da correnti indotte allineate con il campo scorrente di Lindor.
        #JNSQscience_bd_magScan_TalosInSpaceLow_00 = Talos non contribuisce con alcuna magnetosfera: la scansione è dominata dal campo distante di Lindor, con alcune pieghe nette vicino alla luna.
        #JNSQscience_bd_magScan_TalosInSpaceHigh_00 = Più lontano, il segnale diventa sottile e quieto, come se Talos stesse cercando di non farsi notare affatto.
        #JNSQscience_bd_magScan_TalosSrfLandedLowlands_00 = Una traccia piatta e quieta, Talos è magneticamente morto, almeno finché non sollevi polvere carica.
        #JNSQscience_bd_magScan_TalosSrfLandedMidlands_00 = Il magnetometro registra un quasi-zero disciplinato, poi un breve sussulto che sembra fin troppo la tua attrezzatura.
        #JNSQscience_bd_magScan_TalosSrfLandedHighlands_00 = Minuscoli picchi compaiono sul terreno variopinto, e suggeriscono minerali in tracce capaci di trattenere una debole impronta residua.
        #JNSQscience_bd_magScan_TalosSrfLandedMountains_00 = Brevi anomalie taglienti spuntano vicino a pareti rocciose esposte, piccole sacche magnetiche che si nascondono nelle alture.
        #JNSQscience_bd_magScan_TalosSrfLandedPoles_00 = Le letture fluttuanono dolcemente con il flusso carico del cielo, e mostrano effetti di induzione più che un campo locale.
        #JNSQscience_bd_magScan_EelooSrfLandedPoles_00 = Il magnetometro non trova quasi nulla, ma l'ago sussulta comunque quando granelli di ghiaccio carichi sfrecciano nel freddo pungente.
        #JNSQscience_bd_magScan_EelooSrfLandedHighlands_00 = Le letture restano quasi a zero e meravigliosamente noiose, come se le alture fossero fieramente non magnetiche.
        #JNSQscience_bd_magScan_EelooSrfLandedMidlands_00 = Una lieve deriva irregolare suggerisce minuscole sacche di magnetismo residuo intrappolate in vecchio ghiaccio e roccia rimescolati.
