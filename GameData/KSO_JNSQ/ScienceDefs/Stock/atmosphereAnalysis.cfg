        DunaSrfLandedIceCaps* = #JNSQscience_atmosphereAnalysis_DunaSrfLandedIceCaps_00 // The analyser reports mostly CO2 with a little nitrogen, plus a sharp uptick in fine ice crystals that make the intake sound crunchy.
