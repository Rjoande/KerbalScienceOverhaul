        #JNSQscience_bd_dust_HamekSrfLandedHighlands_00 = Compaiono granelli più chiari mescolati a puntini taglienti, come se la superficie nascondesse sotto qualcosa di più luminoso.
        #JNSQscience_bd_dust_HamekSrfLandedPoles_00 = Granelli di brina si mescolano alla polvere rossa formando una crosta leggermente rosa. Il campione sembra sbagliato in modo molto ordinato.
        #JNSQscience_bd_dust_HamekInSpaceLowLowlands_00 = Una sottile foschia rossastra fluisce oltre, lasciando leggere macchie sull'ottimismo del rilevatore.
        #JNSQscience_bd_dust_HamekInSpaceLowMidlands_00 = Ticchettii a bassa energia arrivano in bande regolari, come se la polvere avesse imparato le regole del traffico locale.
        #JNSQscience_bd_dust_HamekInSpaceLowHighlands_00 = Impatti radi ed energetici: granelli delle alture che hanno mantenuto gli spigoli e il loro mistero.
        #JNSQscience_bd_dust_HamekInSpaceLowPoles_00 = Macchioline scintillanti di ghiaccio guizzano accanto a puntini rossi, poi entrambe svaniscono di nuovo nel silenzio.
        #JNSQscience_bd_dust_HamekInSpaceHigh_00 = La polvere interplanetaria fa ping sul sensore di tanto in tanto, con l'occasionale macchiolina rossa che ti segue senza un buon motivo.
        #JNSQscience_bd_dust_NaraSrfLandedLowlands_00 = La regolite fine si compatta in uno strato denso. L'alta pressione la fa sembrare più pesante di quanto dovrebbe.
        #JNSQscience_bd_dust_NaraSrfLandedMidlands_00 = Una polvere grigia uniforme si deposita all'istante, come se il suolo fosse già setacciato per essere immagazzinato.
        #JNSQscience_bd_dust_NaraSrfLandedHighlands_00 = Granelli più grossolani arrivano con spigoli levigati dal vento, come se la superficie fosse stata carteggiata al rallentatore.
        #JNSQscience_bd_dust_NaraSrfLandedMountains_00 = Granelli cristallini e taglienti tintinnano nell'imbocco. Il sensore di usura diventa molto loquace.
        #JNSQscience_bd_dust_NaraSrfLandedPolarLowlands_00 = Graniglia gelata e polvere si agglomerano, poi si sfaldano in una strisciata fredda e scintillante.
        #JNSQscience_bd_dust_NaraSrfLandedPoles_00 = Il collettore aspira polvere fine e pallida che resta tranquilla nel vassoio finché non la tocchi con un colpetto.
        #JNSQscience_bd_dust_NaraSrfLandedPolarHighlands_00 = Graniglia gelata e polvere si agglomerano, poi si sfaldano in una strisciata fredda e scintillante.
        #JNSQscience_bd_dust_NaraFlyingLowLowlands_00 = L'aria densa alimenta il campionatore con foschia fine e polvere. Il filtro comincia a sembrare "annebbiato".
        #JNSQscience_bd_dust_NaraFlyingLowMidlands_00 = Un flusso costante di granelli fini viaggia nella spessa atmosfera, come se il pianeta espirasse polvere.
        #JNSQscience_bd_dust_NaraFlyingLowHighlands_00 = I conteggi delle particelle balzano in raffiche ventose mentre il vento raschia le creste.
        #JNSQscience_bd_dust_NaraFlyingLowMountains_00 = La turbolenza porta impatti radi ma taglienti: graniglia d'alta quota che ha mantenuto gli spigoli.
        #JNSQscience_bd_dust_NaraFlyingLowPolarLowlands_00 = L'aspirazione cattura polvere di ghiaccio scintillante in lente spirali. Tutto sembra carico di elettricità statica e freddo.
        #JNSQscience_bd_dust_NaraFlyingLowPoles_00 = Aerosol freddi e minuscoli granelli entrano con quasi nessuna turbolenza. La lettura sembra assonnata.
        #JNSQscience_bd_dust_NaraFlyingLowPolarHighlands_00 = L'aspirazione cattura polvere di ghiaccio scintillante in lente spirali. Tutto sembra carico di elettricità statica e freddo.
        #JNSQscience_bd_dust_NaraInSpaceLowLowlands_00 = I ticchettii degli impatti arrivano con regolarità, suggerendo granelli fini sollevati e trasportati lungo bande invisibili.
        #JNSQscience_bd_dust_NaraInSpaceLowMidlands_00 = Il rilevatore intercetta una foschia diffusa di particelle minuscole, persistente, tenue e fastidiosamente misurabile.
        #JNSQscience_bd_dust_NaraInSpaceLowHighlands_00 = Un velo sottile di particolato compare in scie che seguono i venti sottostanti.
        #JNSQscience_bd_dust_NaraInSpaceLowMountains_00 = Pochissimi granelli arrivano a questa quota, ma quelli che ci riescono giungono veloci e ostinatamente taglienti.
        #JNSQscience_bd_dust_NaraInSpaceLowPolarLowlands_00 = Particelle scintillanti guizzano nel rilevatore, come se la polvere intrappolata dal freddo tentasse brevi saltelli in orbita.
        #JNSQscience_bd_dust_NaraInSpaceLowPoles_00 = Macchioline rade e cariche scivolano oltre in lunghi intervalli silenziosi, poi fanno scattare il contatore con minuscole scintille.
        #JNSQscience_bd_dust_NaraInSpaceLowPolarHighlands_00 = Particelle scintillanti guizzano nel rilevatore, come se la polvere intrappolata dal freddo tentasse brevi saltelli in orbita.
        #JNSQscience_bd_dust_NaraFlyingHigh_00 = Quassù il campionatore trova solo una foschia sottile e pochi granelli ostinati che si rifiutano di ricadere.
        #JNSQscience_bd_dust_NaraInSpaceHigh_00 = Per lo più polvere di fondo interplanetaria, con l'occasionale macchiolina carica che sembra ancora appartenere a Nara.
        #JNSQscience_bd_dust_AmosSrfLandedLowlands_00 = La polvere fine si accumula nel collettore e si deposita controvoglia, a un colpetto dal tornare a fluttuare.
        #JNSQscience_bd_dust_AmosSrfLandedMidlands_00 = Una polvere grigia anonima riempie il vassoio e si livella alla perfezione. Amos è bravissimo a restare silenzioso.
        #JNSQscience_bd_dust_AmosSrfLandedHighlands_00 = Schegge grossolane di regolite arrivano con facce segnate, come se strisciassero nel vuoto da secoli.
        #JNSQscience_bd_dust_AmosSrfLandedMountains_00 = Graniglia grossa e angolosa tintinna dentro come ghiaia al rallentatore. Riesce comunque a scalfire l'imbocco.
        #JNSQscience_bd_dust_AmosSrfLandedPoles_00 = Il campione è pallido e finissimo, si compatta nel vassoio come farina fredda senza alcuna elettricità statica.
        #JNSQscience_bd_dust_AmosInSpaceLowLowlands_00 = La densità di particelle è leggermente più alta qui, suggerendo che le zone basse siano il serbatoio di polvere della luna.
        #JNSQscience_bd_dust_AmosInSpaceLowMidlands_00 = Il contatore ticchetta in gruppi irregolari, come se la superficie venisse scossa delicatamente da lontano.
        #JNSQscience_bd_dust_AmosInSpaceLowHighlands_00 = Un velo sottile di granelli lenti passa oltre, come espulsi che non hanno mai deciso del tutto di tornare giù.
        #JNSQscience_bd_dust_AmosInSpaceLowMountains_00 = Ping radi ma energici suggeriscono granelli più duri che fanno ambiziosi saltelli sopra le cime.
        #JNSQscience_bd_dust_AmosInSpaceLowPoles_00 = Gli impatti di polvere sono rari e netti, arrivano in deboli raffiche quando il suolo sotto entra nella luce del sole.
        #JNSQscience_bd_dust_AmosInSpaceHigh_00 = Per lo più vuoto, più l'occasionale granello errante che sembra essere scappato senza un piano.
        #JNSQscience_bd_dust_EnonSrfLandedLowlands_00 = La polvere di brina fine si deposita in uno strato liscio, facendo sembrare il vassoio appena spolverato.
        #JNSQscience_bd_dust_EnonSrfLandedMidlands_00 = Granelli misti arrivano in strati tenui: polvere pulita con occasionali puntini più scuri nascosti all'interno.
        #JNSQscience_bd_dust_EnonSrfLandedHighlands_00 = Graniglia più grossolana e pallida sbatte nel vassoio, mantenendo spigoli vivi nonostante il freddo.
        #JNSQscience_bd_dust_EnonSrfLandedPoles_00 = Il collettore si riempie di polvere luminosa e ghiacciata che scricchiola piano quando picchietti l'involucro.
        #JNSQscience_bd_dust_EnonInSpaceLowLowlands_00 = Ticchettii a bassa energia suggeriscono granelli fini che fanno lenti saltelli appena sopra la superficie.
        #JNSQscience_bd_dust_EnonInSpaceLowMidlands_00 = Una tenue foschia di particelle minuscole passa oltre in bande, come se la luna si stesse rilasciando in silenzio in orbita.
        #JNSQscience_bd_dust_EnonInSpaceLowHighlands_00 = Pochissime particelle arrivano fin qui, ma ogni colpo è tagliente ed energetico.
        #JNSQscience_bd_dust_EnonInSpaceLowPoles_00 = Macchioline scintillanti guizzano nel rilevatore, poi svaniscono come se si fossero ricordate dov'è il "basso".
        #JNSQscience_bd_dust_EnonInSpaceHigh_00 = La polvere interplanetaria fa ping sul sensore di tanto in tanto, con l'occasionale macchiolina brillante che sa di casa.
        #JNSQscience_bd_dust_PraxSrfLandedLowlands_00 = La polvere fine di detriti si accumula nell'aspirazione e resta sospesa prima di depositarsi, come se la gravità fosse un suggerimento.
        #JNSQscience_bd_dust_PraxSrfLandedMidlands_00 = Una polvere uniforme grigio marrone si deposita all'istante. Sembra tristemente pratica.
        #JNSQscience_bd_dust_PraxSrfLandedHighlands_00 = Granelli grossolani arrivano con bordi segnati, come se rotolassero in discesa da moltissimo tempo.
        #JNSQscience_bd_dust_PraxSrfLandedMountains_00 = Graniglia tagliente e piccole schegge tintinnano dentro, polvere delle montagne che rifiuta di essere chiamata "fine".
        #JNSQscience_bd_dust_PraxSrfLandedPoles_00 = Polvere fredda e pallida si raccoglie in morbidi grumi, poi si sfalda in polvere non appena tocchi il vassoio.
        #JNSQscience_bd_dust_PraxInSpaceLowLowlands_00 = I conteggi sono leggermente elevati, suggerendo che le sacche delle pianure alimentino la maggior parte dei detriti vicino alla superficie.
        #JNSQscience_bd_dust_PraxInSpaceLowMidlands_00 = Il contatore ticchetta pigramente: granelli lenti che sembrano a una spinta dal formare un anello.
        #JNSQscience_bd_dust_PraxInSpaceLowHighlands_00 = Un velo sottile di granelli passa oltre con tempi regolari, come se la polvere avesse imparato le regole del traffico locale.
        #JNSQscience_bd_dust_PraxInSpaceLowMountains_00 = Impatti radi e taglienti suggeriscono granelli più duri che fanno ambiziosi saltelli sopra le cime.
        #JNSQscience_bd_dust_PraxInSpaceLowPoles_00 = Gli impatti di particelle arrivano a brevi raffiche vicino al terminatore, come se la polvere fredda si stesse svegliando e mettendo in giro.
        #JNSQscience_bd_dust_PraxInSpaceHigh_00 = Quasi nulla quassù, tranne granelli di fondo e alcune macchioline ostinate che si rifiutano di allontanarsi.

        // bd_gammaRay
        #JNSQscience_bd_gammaRay_MohoInSpaceLow_00 = Lo spettro dei raggi gamma mostra una stretta fascia di rapporti elementari distinti che segue una netta scarpata. L'anomalia è coerente con materiale relativamente fresco esposto da uno scivolamento recente, più che con fini superficiali alterate dall'esposizione spaziale.
        #JNSQscience_bd_gammaRay_MohoInSpaceLow_01 = Diversi fondi di crateri dall'aspetto giovane restituiscono una firma più pulita e a contrasto più elevato rispetto ai dintorni. I dati suggeriscono unità rimescolate dall'impatto, dove la regolite disturbata non si è ancora omogeneizzata nello strato superficiale più antico.
        #JNSQscience_bd_gammaRay_MohoInSpaceLow_02 = Un mosaico di piccoli punti caldi compare lungo dorsali e incroci di fratture, ripetendosi su più passaggi. La spiegazione più semplice è un rinnovamento localizzato della superficie: sottili veli di regolite selezionata che rivelano una chimica sottostante leggermente diversa.
        #JNSQscience_bd_gammaRay_EdnaInSpaceLow_00 = I passaggi in orbita bassa evidenziano firme luminose di idrogeno attorno ai crateri polari ghiacciati: il resto è ostinatamente scuro e secco.
        #JNSQscience_bd_gammaRay_EdnaInSpaceLow_01 = Le righe gamma suggeriscono polvere ricca di carbonio, punteggiata da alcuni punti caldi metallici: come se qualcuno avesse salato la regolite con minerale.
        #JNSQscience_bd_gammaRay_EdnaInSpaceHigh_00 = Dall'orbita alta lo spettro si media: un mondo freddo e ricco di carbonio, con abbastanza idrogeno da tenere oneste le chiazze bianche polari.
        #JNSQscience_bd_gammaRay_EdnaInSpaceHigh_01 = Raffiche di fondo continuano a imbucarsi nella scansione: Edna sembra contenta di nascondere la sua chimica dietro rumore e ombra.
        #JNSQscience_bd_gammaRay_DakInSpaceLow_00 = La forma bitorzoluta a "patata" di Dak fa oscillare i conteggi, ma lo spettro ritorna roccia e metallo con chiazze di minerali idrati.
        #JNSQscience_bd_gammaRay_DakInSpaceLow_01 = Una manciata di massi brilla con righe di potassio e torio: il resto è silenzioso, come un sassolino molto testardo.
        #JNSQscience_bd_gammaRay_DakInSpaceHigh_00 = A questa distanza la mappa gamma è praticamente un pixel: per lo più silicati, un po' di ferro, nessuna sorpresa. Sempre patata.
        #JNSQscience_bd_gammaRay_DakInSpaceHigh_01 = Anche in orbita alta, il segnale sfarfalla mentre Dak ruota: il rilevatore registra un canto di sirena di picchi ripetuti.
        #JNSQscience_bd_gammaRay_LindorInSpace_00 = Lo spettro è per lo più idrogeno ed elio, con una debole impronta di metano nascosta nel rumore.
        #JNSQscience_bd_gammaRay_LindorInSpace_01 = Picchi di radiazione cercano continuamente di rubare la scena: la lettura suggerisce che Lindor abbia opinioni sulle misure "silenziose".
        #JNSQscience_bd_gammaRay_LindorInSpaceLow_00 = In basso sopra le cime delle nubi, i conteggi aumentano e calano insieme alle bande sottostanti. Chimica fatta dal meteo.
        #JNSQscience_bd_gammaRay_LindorInSpaceLow_01 = Il rilevatore sfiora la saturazione vicino alle bande più luminose: annoti "interessante" e poi aggiungi altri tre punti esclamativi.
        #JNSQscience_bd_gammaRay_LindorInSpaceHigh_00 = Dall'orbita alta, Lindor si smussa in un gigante gassoso freddo e leggero, con una traccia di metano che non molla.
        #JNSQscience_bd_gammaRay_LindorInSpaceHigh_01 = Quasi tutto ciò che vedi è fondo, finché le fasce di radiazione di Lindor non bucano tutto come una firma.
        #JNSQscience_bd_gammaRay_KrelInSpace_00 = Krel risulta ricca di ghiaccio con una spina dorsale rocciosa: i picchi di idrogeno suggeriscono un sacco di qualcosa congelato.
        #JNSQscience_bd_gammaRay_KrelInSpace_01 = Alcuni punti caldi accennano a roccia esposta o materiale più fresco, come se Krel fosse stata leggermente sabbiata.
        #JNSQscience_bd_gammaRay_KrelInSpaceLow_00 = Da vicino, il segnale del ghiaccio si definisce e la mappa diventa a chiazze. Pianure pulite interrotte da cicatrici più scure e più sporche.
        #JNSQscience_bd_gammaRay_KrelInSpaceLow_01 = L'ambiente di Lindor continua a tempestare il rilevatore: quasi riesci a sentire Krel "invecchiare" senza tempo.
        #JNSQscience_bd_gammaRay_KrelInSpaceHigh_00 = In quota, Krel si riduce a "ghiaccio con un contorno di silicati", servito freddo.
        #JNSQscience_bd_gammaRay_KrelInSpaceHigh_01 = I picchi si ripetono con la rotazione di Krel, confermando con ordine che è davvero pallida quanto sembra.
        #JNSQscience_bd_gammaRay_AdenInSpace_00 = Lo spettro complessivo di Aden tende al roccioso e al buio carbonioso, come se qualcuno avesse scambiato il ghiaccio con polvere.
        #JNSQscience_bd_gammaRay_AdenInSpace_01 = Tracce di idrogeno compaiono in abbastanza punti da renderti sospettoso di brina sepolta.
        #JNSQscience_bd_gammaRay_AdenInSpaceLow_00 = I passaggi bassi rivelano righe sparse di torio e potassio. Piccoli punti "caldi" in un mondo molto freddo.
        #JNSQscience_bd_gammaRay_AdenInSpaceLow_01 = La mappa mostra chiazze più scure con chimica diversa, suggerendo che Aden non sia poi una biglia uniforme.
        #JNSQscience_bd_gammaRay_AdenInSpaceHigh_00 = Dall'orbita alta, Aden è per lo più tranquilla: roccia, carbonio e una testarda mancanza di drammi.
        #JNSQscience_bd_gammaRay_AdenInSpaceHigh_01 = Il segnale è talmente pulito che il team inizia a litigare sulla calibrazione invece che sulla geologia.
        #JNSQscience_bd_gammaRay_HuygenInSpace_00 = L'atmosfera si mangia gran parte del segnale di superficie: ciò che resta sembra azoto con un condimento di metano.
        #JNSQscience_bd_gammaRay_HuygenInSpace_01 = Lampi gamma da urti ad alta energia nella foschia fanno sembrare il pianeta come se scintillasse in silenzio.
        #JNSQscience_bd_gammaRay_HuygenInSpaceLow_00 = In orbita bassa, il rilevatore lotta con lo smog: lo spettro è dominato dalle interazioni atmosferiche, non dalla verità del suolo.
        #JNSQscience_bd_gammaRay_HuygenInSpaceLow_01 = Le righe legate al metano vanno e vengono con la foschia più densa. Chimica fatta dai banchi di nebbia.
        #JNSQscience_bd_gammaRay_HuygenInSpaceHigh_00 = Dall'orbita alta, Huygen diventa una firma liscia e nebulosa, con solo ampi indizi di ciò che c'è sotto.
        #JNSQscience_bd_gammaRay_HuygenInSpaceHigh_01 = Catturi un motivo ripetuto che potrebbe essere superficie... oppure potrebbe essere il tuo strumento che implora aria più limpida.
        #JNSQscience_bd_gammaRay_RigaInSpace_00 = Riga mostra una firma pulita di azoto, con abbastanza altre righe da suggerire una spolverata di micrometeore.
        #JNSQscience_bd_gammaRay_RigaInSpace_01 = La composizione complessiva sembra roccia e ghiaccio sotto un velo sottile, come un mondo con una maschera leggerissima.
        #JNSQscience_bd_gammaRay_RigaInSpaceLow_00 = L'orbita bassa finalmente tira fuori la chimica di superficie: silicati con chiazze che risultano un po' più ghiacciate del previsto.
        #JNSQscience_bd_gammaRay_RigaInSpaceLow_01 = Alcune aree mostrano picchi di elementi radioattivi: la mappa le etichetta "interessanti", che in scienza significa "andateci".
        #JNSQscience_bd_gammaRay_RigaInSpaceHigh_00 = A distanza, Riga si media in un profilo ordinato: per lo più roccia, un po' di ghiaccio, minimo disturbo atmosferico.
        #JNSQscience_bd_gammaRay_RigaInSpaceHigh_01 = I picchi si allineano puliti da un passaggio all'altro, come se Riga si stesse impegnando molto per essere collaborativa.
        #JNSQscience_bd_gammaRay_TalosInSpace_00 = Talos sembra un misto di ghiaccio e roccia, con una chimica che non combacia del tutto con quella dei suoi vicini.
        #JNSQscience_bd_gammaRay_TalosInSpace_01 = Lo spettro è stranamente attenuato: o Talos è insipida, oppure nasconde le cose buone sotto una superficie stanca.
        #JNSQscience_bd_gammaRay_TalosInSpaceLow_00 = I passaggi ravvicinati rivelano idrogeno a chiazze e zone rocciose più scure, come se Talos fosse stata costruita con avanzi e poi lucidata.
        #JNSQscience_bd_gammaRay_TalosInSpaceLow_01 = Alcuni punti dall'aspetto fresco spiccano con picchi distinti, suggerendo un'esposizione recente... o impatti davvero persistenti.
        #JNSQscience_bd_gammaRay_TalosInSpaceHigh_00 = Dall'orbita alta, Talos si fonde in una firma fredda a due toni: complessivamente ricca di ghiaccio, più rocciosa nei dettagli.
        #JNSQscience_bd_gammaRay_TalosInSpaceHigh_01 = Il rilevatore registra una serie di picchi stabile e ripetitiva. Nessuna sorpresa, solo una conferma a distanza che Talos è reale.
        #JNSQscience_bd_gammaRay_CelesInSpaceLow_00 = Le scansioni in orbita bassa accendono i poli con forti righe di idrogeno: le trappole fredde stanno facendo il loro lavoro.
        #JNSQscience_bd_gammaRay_CelesInSpaceLow_01 = La superficie risulta ghiaccio pulito sopra roccia, con alcune chiazze stranamente "piccanti" ricche di potassio e torio.
        #JNSQscience_bd_gammaRay_CelesInSpaceHigh_00 = Dall'orbita alta, Celes si riduce a "prima il ghiaccio, poi i silicati", con abbastanza idrogeno da tenere tutti ottimisti.
        #JNSQscience_bd_gammaRay_CelesInSpaceHigh_01 = Alcuni punti caldi ripetuti si rifiutano di spiegarsi: il team scientifico inizia a usare il termine "classificato" come unità di misura.
        #JNSQscience_bd_gammaRay_TamInSpaceLow_00 = I conteggi tremolano mentre Tam ruzzola sotto di te: il rilevatore conferma che è, di fatto, fatta di "bitorzoluto".
        #JNSQscience_bd_gammaRay_TamInSpaceLow_01 = I bordi di crateri dall'aspetto fresco mostrano picchi più netti delle pianure scure, come se Tam venisse rinnovata un impatto alla volta.
        #JNSQscience_bd_gammaRay_TamInSpaceHigh_00 = In quota lo spettro si smussa in roccia secca con firme metalliche sparse. Un asteroide che ha dimenticato di andarsene.
        #JNSQscience_bd_gammaRay_TamInSpaceHigh_01 = Le righe più forti si ripetono con la rotazione di Tam, dimostrando con ordine che ha giusto abbastanza regolarità da essere fastidiosa.
        #JNSQscience_bd_gammaRay_HamekInSpaceLow_00 = I passaggi bassi trovano picchi di elementi pesanti che non combaciano con l'esterno "rosso carino": il colore non sta facendo alcun favore alla chimica.
        #JNSQscience_bd_gammaRay_HamekInSpaceLow_01 = Diverse regioni mostrano picchi nelle righe di potassio e torio, come se la superficie di Hamek fosse stata spolverata con qualcosa che non si è meritata.
        #JNSQscience_bd_gammaRay_HamekInSpaceHigh_00 = Dall'orbita alta, lo spettro di Hamek resta ostinatamente strano: complessivamente roccioso, con ampi picchi che accennano a una miscela insolita.
        #JNSQscience_bd_gammaRay_HamekInSpaceHigh_01 = Il rilevatore registra un segnale pulito e stabile: qualunque cosa renda Hamek strana è parte del pacchetto, non un effetto passeggero.
        #JNSQscience_bd_gammaRay_NaraInSpaceLow_00 = In basso sopra le nubi di Nara, la maggior parte dei conteggi gamma è l'atmosfera che litiga con la radiazione in arrivo: riesci comunque a estrarre alcuni ostinati picchi di superficie.
        #JNSQscience_bd_gammaRay_NaraInSpaceLow_01 = La scansione accenna a "isole" più rocciose sotto la foschia, con ampie righe di potassio e torio che non combaciano con un mondo fatto solo di soffici strati.
        #JNSQscience_bd_gammaRay_NaraInSpaceHigh_00 = Dall'orbita alta, Nara si media in uno spettro liscio e tenue. Troppa atmosfera, troppo poca certezza e abbastanza segnale da mettere a disagio.
        #JNSQscience_bd_gammaRay_NaraInSpaceHigh_01 = Il rilevatore registra raffiche ripetute mentre Nara ruota: il team discute se sia composizione... o il pianeta che si rifiuta gentilmente di essere riassunto.
        #JNSQscience_bd_gammaRay_AmosInSpaceLow_00 = I passaggi ravvicinati mostrano che Amos è per lo più roccia silenziosa con picchi di idrogeno sparsi, brina a chiazze nascosta in ombre e fessure.
        #JNSQscience_bd_gammaRay_AmosInSpaceLow_01 = Alcuni minuscoli punti caldi mostrano picchi nelle righe di elementi pesanti: per una luna così anonima, Amos tiene segreti in posti piccoli.
        #JNSQscience_bd_gammaRay_AmosInSpaceHigh_00 = In quota, Amos diventa una firma semplice: silicati secchi, una traccia di metallo e un tenue sussurro di volatili.
        #JNSQscience_bd_gammaRay_AmosInSpaceHigh_01 = Lo spettro pulito la fa sembrare noiosa, finché non ricordi che "pulito" significa solo che non hai ancora guardato abbastanza da vicino.
        #JNSQscience_bd_gammaRay_EnonInSpaceLow_00 = L'orbita bassa illumina Enon con forti righe di idrogeno e ossigeno: è un mondo di ghiaccio che non ha paura di essere ghiaccio.
        #JNSQscience_bd_gammaRay_EnonInSpaceLow_01 = Le chiazze più scure risultano "più sporche", con picchi extra che suggeriscono una miscela di roccia e graniglia consegnata dagli impatti.
        #JNSQscience_bd_gammaRay_EnonInSpaceHigh_00 = Dall'orbita alta, Enon si smussa in una chimica luminosa e gelida: prima il ghiaccio, poi tutto il resto.
        #JNSQscience_bd_gammaRay_EnonInSpaceHigh_01 = Lo spettro resta stabile e pallido, come se Enon stesse cercando di convincerti che è semplice mentre la mappa dice altro.
        #JNSQscience_bd_gammaRay_PraxInSpaceLow_00 = I passaggi ravvicinati mostrano Prax come una miscela ruvida di roccia e ghiaccio: i picchi di idrogeno si addensano attorno a terreno segnato e bordi dall'aspetto fresco.
        #JNSQscience_bd_gammaRay_PraxInSpaceLow_01 = Diverse regioni mostrano picchi nelle righe di potassio e torio, come se Prax stesse raccogliendo polvere "interessante" da moltissimo tempo.
        #JNSQscience_bd_gammaRay_PraxInSpaceHigh_00 = A distanza, Prax si media in una miscela di frontiera: non abbastanza ghiacciata da essere gentile, non abbastanza rocciosa da essere lineare.
        #JNSQscience_bd_gammaRay_PraxInSpaceHigh_01 = I picchi ripetuti sono rassicuranti per la loro coerenza, finché non capisci che la coerenza significa solo che Prax è sempre stata così.

        // bd_GeigerCounter
        #JNSQscience_bd_GeigerCounter_SunFlyingLow_00 = Il contatore va subito a fondo scala. Non fa più tanto click quanto urla con un tono continuo.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthPolarZone_00 = La radiazione schizza in alto sopra la zona polare. Il sole sembra prenderti di mira.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthSubpolarZone_00 = Il tasso di conteggio aumenta in ampie ondate, come risacca invisibile che si infrange sullo scafo.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthTemperateZone_00 = Le letture restano violentemente alte, con brevi cali che sembrano il battito di ciglia dello strumento.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowNorthTropicZone_00 = Il rilevatore registra raffiche rapide, poi va in saturazione, poi riprende come se niente fosse.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowEquatorialZone_00 = Il grafico diventa una banda spessa e rabbiosa. "Fondo" non è più una parola utile.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthTropicZone_00 = I conteggi salgono più dell'ultimo passaggio. A quanto pare il sole non ha ancora finito con te.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthTemperateZone_00 = Un motivo tremolante si sovrappone a un tasso già estremo, come se la stella crepitasse.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthSubpolarZone_00 = Il rilevatore registra picchi netti a grappoli. Qualcuno propone con entusiasmo di girare la nave.
        #JNSQscience_bd_GeigerCounter_SunInSpaceLowSouthPolarZone_00 = Il contatore martella senza sosta. Inizi a contare i secondi invece delle particelle.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedPoles_00 = Il contatore crepita anche nell'ombra gelida. Essere così vicini al sole è un lavoro a tempo pieno.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedLowlands_00 = I conteggi aumentano con costanza: il suolo offre calore, non schermatura.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedPolarIceCraters_00 = Compare una rara zona tranquilla, poi il sole si ricorda che esisti.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedHighlands_00 = Terreno più alto, conteggi più alti. Meno roccia tra te e la fornace.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedMidlands_00 = Il rilevatore ticchetta come un metronomo impostato su "troppo veloce".
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedCraters_00 = Le pareti dei crateri bloccano la vista, non le particelle. Click click click.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedExoticCraters_00 = Brevi picchi punteggiano il registro. Le rocce quaggiù stanno facendo qualcosa di scortese.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedRareCraters_00 = Alcuni punti caldi negli espulsi spiccano contro un fondo già cattivo.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedVoronoiCraters_00 = Il tasso sale e scende con un motivo stranamente regolare. La geometria non dovrebbe irradiare.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedNotableCraters_00 = Superato il bordo, il conteggio salta e poi si stabilizza. Segni il punto e fai finta che sia normale.
        #JNSQscience_bd_GeigerCounter_MohoSrfLandedPeaks_00 = Sulle cime, il contatore praticamente applaude. Basta applaudire.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowPoles_00 = Sopra i poli il contatore aumenta di colpo. Il sole ha una linea diretta fino al tuo scafo.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowLowlands_00 = Una tempesta costante di conteggi. Il pianeta sotto sembra una scusa pessima per fare da scudo.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowPolarIceCraters_00 = Un piccolo calo sopra i crateri in ombra, poi di nuovo statica a tutto volume.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowHighlands_00 = I conteggi salgono di un gradino sopra le alture. L'altitudine arriva fin quassù, anche dall'orbita.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowMidlands_00 = Il grafico è una banda spessa di cattive notizie, con piccole increspature mentre il terreno scorre sotto.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowCraters_00 = I campi di crateri aggiungono piccoli picchi a un tasso già alto, come denti sulla curva.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowExoticCraters_00 = Il rilevatore spara raffiche nette. Prendi in considerazione di spegnere l'altoparlante, non il sensore.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowRareCraters_00 = Minuscoli picchi compaiono, svaniscono e ricompaiono, come se la superficie lampeggiasse radioattiva.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowVoronoiCraters_00 = Gobbe ritmiche si allineano con il motivo sottostante. Mun non faceva mai queste cose.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowNotableCraters_00 = Un cratere grande, un blip grande. Correlazione ottenuta, spiegazione rimandata.
        #JNSQscience_bd_GeigerCounter_MohoInSpaceLowPeaks_00 = Il contatore sale quando passi sulle cime, come se la roccia stesse tentando di incontrare la radiazione a metà strada.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashed_00 = Il contatore fa a malapena click. L'atmosfera di Eve fa quasi tutto il lavoro, che tu glielo abbia chiesto o no.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedPoles_00 = Il contatore sussurra appena. Anche qui l'aria di Eve fa quasi tutto il lavoro.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedLowlands_00 = Le letture restano vicino allo zero. Un'atmosfera spessa è uno scudo molto convincente.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedMidlands_00 = Il misuratore resta calmo e stabile. "Troppo calmo" non è un numero, ma lo scrivi lo stesso.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedHighlands_00 = I conteggi aumentano appena con l'altitudine. La protezione di Eve ha un gradiente di spessore.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedPeaks_00 = Quassù il contatore fa click più spesso, ma l'aria soffoca ancora la maggior parte della radiazione in arrivo.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedMountains_00 = Terreno più alto, conteggi più alti. Inizi ad apprezzare il "livello del mare" come funzione di sicurezza.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedShores_00 = Le letture calano di nuovo vicino alla linea dell'acqua. Tra aria e liquido, lo spazio non prende molti voti.
        #JNSQscience_bd_GeigerCounter_EveSrfLandedKrakensWell_00 = Il rilevatore si zittisce nel bacino profondo. Qualunque cosa stia facendo il terreno, è eccellente nel bloccare il cielo.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedExplodiumSea_00 = Il contatore è quasi muto. Oceano e atmosfera fanno squadra per soffocare tutto.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedShores_00 = Ammarato vicino alla costa, le letture si appiattiscono fino a quasi nulla. È il posto più sicuro sul mondo meno amichevole.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedPolarLakes_00 = Acqua calma, contatore calmo. La tua tuta, invece, registra "preoccupazione".
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedPetrolLakes_00 = Lo strumento segna quasi zero mentre l'aria sa di pessime decisioni.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofAkron_00 = Il misuratore fa a malapena click. Cominci a sospettare che i mari di Eve schermino meglio del tuo scafo.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofNessus_00 = I conteggi restano estremamente bassi. L'unica cosa che aumenta è l'angoscia della manutenzione.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofTaniwha_00 = Il rilevatore resta quieto e ubbidiente. La chimica di Eve è la parte rumorosa.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofGigan_00 = Quasi nessun conteggio. L'acqua è uno scudo eccellente, anche quando sembra guai.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofRodan_00 = Il contatore resta in minimo vicino allo zero. Non sai decidere se sia rassicurante o sospetto.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofGojira_00 = La radiazione di fondo è praticamente sparita. Qualcosa di così ostile non dovrebbe sembrare così sicuro.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofGhidorah_00 = Il misuratore resta inchiodato in basso. Controlli due volte la calibrazione e poi il piano di uscita.
        #JNSQscience_bd_GeigerCounter_EveSrfSplashedSeaofBagorah_00 = Il rilevatore è abbastanza silenzioso da sentire il tuo respiro. La cosa non ti piace.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowPoles_00 = Il contatore crepita a un tasso elevato. Qualunque schermatura abbia Eve resta per lo più giù nell'atmosfera.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowLowlands_00 = Conteggi robusti persistono in orbita bassa, con un lieve calo quando la traiettoria sfiora l'aria più spessa sotto.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowMidlands_00 = La radiazione resta alta e costante. Il pianeta sembra calmo: le particelle no.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowHighlands_00 = Compare un moderato aumento sopra il terreno più elevato, come se l'altitudine funzionasse anche dall'orbita.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowPeaks_00 = I numeri salgono di un gradino sopra le cime. Meno atmosfera tra te e lo spazio, anche da quassù.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowMountains_00 = Il rilevatore crepita senza sosta. Le montagne sotto non aiutano in alcun modo.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowShores_00 = I conteggi oscillano mentre il bordo del pianeta si illumina e si oscura. Il margine dell'atmosfera fa l'unico filtraggio percepibile.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowExplodiumSea_00 = La lettura resta alta, ma la curva si smussa leggermente sopra il mare, come se una colonna d'aria più spessa stesse aiutando.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowPolarLakes_00 = Un piccolo calo attraversa il grafico sopra i laghi, poi riprende il solito alto fondo.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowPetrolLakes_00 = La radiazione resta alta, con brevi avvallamenti morbidi sopra le chiazze scure.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofAkron_00 = Il contatore resta allarmantemente entusiasta. Prendi in considerazione di spegnere l'audio, non la scienza.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofNessus_00 = I dati restano alti, con minuscole increspature che si allineano alle linee di costa sotto.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofTaniwha_00 = Continua una tempesta costante di conteggi. Eve è abbastanza vicina al sole da volerlo sottolineare.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofGigan_00 = Radiazione alta, modulazione minima. L'unico talento dell'oceano è sembrare ingannevolmente sicuro.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofRodan_00 = Il rilevatore va brevemente in picco, poi torna al suo fondo già alto. Lo etichetti "mistero, non panico".
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofGojira_00 = I conteggi restano alti e costanti. Il grafico è un muro viola di cattive notizie.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofGhidorah_00 = Il contatore crepita senza pausa. Inizi a sentirti come se ti stessero contando a ritroso.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowSeaofBagorah_00 = La radiazione resta alta: il pianeta sotto resta bellissimo. L'universo è incoerente così.
        #JNSQscience_bd_GeigerCounter_EveInSpaceLowKrakensWell_00 = Compare un blip netto mentre passi sopra, poi scompare nel ruggito di fondo.
        #JNSQscience_bd_GeigerCounter_GillyInSpaceHigh_00 = Il contatore fa click con regolarità: Eve resta nei paraggi, ma non blocca quasi nulla.
        #JNSQscience_bd_GeigerCounter_GillySrfLandedLowlands_00 = Arriva una manciata di click. Questo sassolino non ha idea di come schermare alcunché.
        #JNSQscience_bd_GeigerCounter_GillySrfLandedMidlands_00 = I conteggi oscillano quando ruoti lo strumento. Su Gilly, "su" è un suggerimento.
        #JNSQscience_bd_GeigerCounter_GillySrfLandedHighlands_00 = Ticchettii leggermente più alti sulla cresta esposta. Qui lo spazio è praticamente ovunque.
        #JNSQscience_bd_GeigerCounter_GillyInSpaceLowLowlands_00 = Il tasso resta costante e un po' troppo vivace per un corpo così minuscolo.
        #JNSQscience_bd_GeigerCounter_GillyInSpaceLowMidlands_00 = Le particelle fanno ping sullo scafo a un ritmo disinvolto. Gilly offre esattamente zero copertura.
        #JNSQscience_bd_GeigerCounter_GillyInSpaceLowHighlands_00 = Alcune raffiche extra mentre la superficie bitorzoluta rotola sotto di te. Non sta aiutando.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAdministration_00 = Il contatore rimane in silenzio finché non si passa davanti al cartello "Non scansionare": poi scatta indignato, come se sapesse che si è dimenticato il Modulo 12-B.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAstronautComplex_00 = Le letture sono normali, ma il dispositivo registra un breve picco vicino agli armadietti degli snack: nessuno accetta di discutere cosa sia conservato dietro l'etichetta "proteine".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedCrawlerway_00 = I click si sincronizzano perfettamente con le vibrazioni della pista del cingolato: l'Ufficiale della Sicurezza lo chiama "risonanza", tu lo chiami "per favore smettete di camminare così pesante".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedFlagPole_00 = Il contatore ticchetta educatamente alla base della bandiera: un ingegnere lì vicino insiste che la radiazione è "patriottica" e quindi entro specifica.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedMissionControl_00 = Il contatore Geiger inizia a fare click più in fretta nel momento in cui entri: Gene ti assicura che sta solo reagendo ai livelli di stress nella stanza.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DCentralBuilding_00 = Le letture sono "leggermente elevate", che per R&S è il termine scientifico per "funziona come previsto, non preoccuparti".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DCornerLab_00 = Il contatore va in picco quando lo punti verso un armadietto chiuso a chiave: uno scienziato appare all'istante per informarti che gli armadietti non sono un bioma.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DMainBuilding_00 = Ogni volta che ti avvicini a un prototipo, il contatore crepita come se volesse sporgere reclamo: R&S lo chiama "telemetria preziosa".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DObservatory_00 = Lo strumento resta calmo finché non lo punti verso la scala del seminterrato: gli astronomi ti suggeriscono gentilmente di tenere la curiosità puntata al cielo.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DSideLab_00 = Il display sfarfalla tra "SICURO" e "NECESSARIO PERMESSO": la seconda lettura è stranamente specifica.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DSmallLab_00 = La radiazione è normale, ma il contatore continua a sbattere contro le cose: il laboratorio è ora ufficialmente classificato come "ambiente ad alta collisione".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DTanks_00 = Il contatore fa click a un ritmo costante e qualcuno sposta in silenzio tre barili dietro una tenda con scritto "decisamente acqua".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedR&DWindTunnel_00 = Il rumore del vento fa sembrare il contatore drammatico: l'Ingegneria insiste che i click extra sono "miglioramento aeroacustico", non panico.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedRunway_00 = Il contatore resta calmo finché non metti piede sulla linea centrale dipinta: allora inizia subito a fare click come se si fosse ricordato il briefing sulla sicurezza.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPH_00 = Le letture sono normali finché un meccanico non passa con un pezzo "recuperato": il contatore fa un solo click, come se ridesse.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHMainBuilding_00 = Il contatore va in picco vicino alla cabina di verniciatura: la squadra dà la colpa a "pigmenti esotici" e ti blocca la vista con una cartelletta.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHRoundTank_00 = Il dispositivo ticchetta più forte attorno alla base del serbatoio rotondo: un tecnico spiega che è "solo entusiasmo residuo dei test".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHTanks_00 = Rilevi una debole radiazione vicino a una pila di contenitori "vuoti": il caposquadra ti assicura che sono vuoti nei modi *importanti*.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedSPHWaterTower_00 = Le letture sono normali, ma il contatore continua a fare click ogni volta che guardi in alto verso la torre: sospetti che soffra di vertigini.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStation_00 = Il contatore è silenzioso finché non ti metti sotto una parabola: poi crepita come se cercasse di telefonare a casa passando per la burocrazia.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationDishEast_00 = Lo strumento fa click a raffiche che seguono la scansione della parabola: gli operatori insistono che sia "elaborazione del segnale", non "sospettosamente energetico".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationDishNorth_00 = Il contatore va in picco e il team di tracciamento chiede subito se stai "introducendo rumore": rispondi che il rumore si è introdotto da solo.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationDishSouth_00 = La lettura salta quando la parabola aggancia qualcosa di invisibile: lo staff lo chiama "di routine", che qui non consola mai.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedTrackingStationHub_00 = Il contatore resta normale, ma la scorta di caffè della stanza risulta "moderatamente radioattiva per il morale".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVAB_00 = Il contatore fa click un po' più in fretta vicino ai grandi portoni: qualcuno dice che è "residuo storico", che a quanto pare è una certificazione.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABMainBuilding_00 = Lo strumento crepita vicino a un portello di servizio sigillato: un ingegnere dice "quello non è un portello" e tu vieni scortato lontano dal non portello.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABPodMemorial_00 = Il contatore resta rispettosamente silenzioso finché qualcuno non sussurra "sperimentale": allora fa un solo click, come un avvertimento solenne.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABRoundTank_00 = I livelli di radiazione sono bassi, ma il contatore continua a fare piccoli rumori ansiosi: forse ha letto le note di staging.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABSouthComplex_00 = La lettura è leggermente elevata e il caposquadra giura che è "entro l'intervallo eccitante", che non è un'unità standard.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedVABTanks_00 = Il contatore va brevemente in picco, poi si stabilizza: tutti concordano che il picco fosse una "occasione di calibrazione" e decisamente non una perdita.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedIslandAirfield_00 = Il contatore ticchetta piano nella brezza marina: il personale locale insiste comunque perché tu firmi una liberatoria per "scienza imprevista".
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedBaikerbanur_00 = Il contatore fa click lungo corridoi polverosi come se stesse contando tutti gli angoli in cui non dovresti essere.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedBaikerbanurLaunchpad_00 = Le letture rimbalzano tra "normale" e "eredità": la piattaforma sembra orgogliosa del suo passato e moderatamente pericolosa per questo.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedWoomerang_00 = Il contatore Geiger crepita vicino alle vecchie piazzole dell'attrezzatura: il personale del poligono insiste che sia "carattere storico", non "radiazione lievemente entusiasta".
        #JNSQscience_bd_GeigerCounter_KerbinFlyingLow_00 = Il contatore fa click educatamente: la bassa atmosfera di Kerbin fa per te la maggior parte della schermatura.
        #JNSQscience_bd_GeigerCounter_KerbinFlyingHigh_00 = I click arrivano un po' più in fretta quassù. La protezione di Kerbin sta iniziando ad assottigliarsi.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedIceCaps_00 = Il contatore resta vicino al fondo. L'unica cosa che brilla è il tuo respiro sulla visiera.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedHighlands_00 = Le letture sono comodamente normali. Le rocce di Kerbin si comportano come rocce a modo.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedMidlands_00 = La radiazione di fondo è esattamente sul valore da manuale. Qualcuno sorride davvero al numero.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedLowlands_00 = Il rilevatore fa a malapena click. Qui sotto casa sembra ben schermata.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridLowlands_00 = I conteggi salgono lentamente nel caldo secco, ma niente che valga un allarme.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridMidlands_00 = Il misuratore ticchetta un po' più in fretta: dai la colpa al sole, non al suolo.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridHighlands_00 = Aria sottile e terreno brillante rendono il contatore più vivace di quanto vorresti.
        #JNSQscience_bd_GeigerCounter_KerbinSrfLandedAridMountains_00 = Conteggi più alti del previsto. Inizi a guardare ogni roccia come se ti dovesse una spiegazione.
