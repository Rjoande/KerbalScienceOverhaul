        #JNSQscience_bd_cosmicRay_LindorInSpaceHigh_00 = Lontano dal pianeta, il contatore si assesta nella pioggerellina dello spazio profondo, interrotta da brevi burst che suggeriscono che Lindor arrivi più lontano di quanto sembri.
        #JNSQscience_bd_cosmicRay_LindorInSpaceLowTemperateBands_00 = I conteggi calano sotto l'ampia schermatura di Lindor, poi sfarfallano in bande lievi come se stessi sfiorando bande invisibili.
