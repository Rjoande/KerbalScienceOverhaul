@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]:NEEDS[JNSQ]
{
    %RESULTS
    {
        MohoSrfLandedPoles* = #CSS_crewReport_MohoSrfLandedNorthPole_00 // Grey rocks and grey dirt. What a *great* location!
        MohoSrfLandedPoles* = #CSS_crewReport_MohoSrfLandedSouthPole_00 // This pole is much less interesting.
        MohoSrfLandedPoles* = #CSS_crewReport_MohoSrfLandedSouthPole_01 // You look for a big hole in the ground. Is this the wrong pole?
        MohoSrfLandedPolarIceCraters* = #CSS_crewReport_MohoSrfLandedNorthernSinkholeRidge_00 // You gaze in amazement at the sinkhole and wonder how it formed. You decide it was probably just an oversight.
        MohoSrfLandedPolarIceCraters* = #CSS_crewReport_MohoSrfLandedNorthernSinkhole_00 // You ponder the mystery of where Moho's atmosphere went. You're glad it doesn't have one anymore, because that would make coming back really hard.
        MohoSrfLandedLowlands* = #CSS_crewReport_MohoSrfLandedWesternLowlands_00 // You decide that it's hard to be an explorer.
        MohoSrfLandedLowlands* = #CSS_crewReport_MohoSrfLandedCentralLowlands_00 // The crew considers which snacks would taste best if cooked.
        MohoSrfLandedLowlands* = #CSS_crewReport_MohoSrfLandedSouthWesternLowlands_00 // You wonder how much ore could be mined here. You tell mission control that the mining rights are yours.
        MohoSrfLandedLowlands* = #CSS_crewReport_MohoSrfLandedSouthEasternLowlands_00 // Sure is lonely here on Moho.
        MohoSrfLandedCraters* = #CSS_crewReport_MohoSrfLandedMinorCraters_00 // Jeb wants to know if a rover would powerslide here. Badly.
        
        EveSrfLandedPetrolLakes* = #CSS_crewReport_EveSrfLandedCraterLake_00 // The purple sea sparkles nearby, looking innocent enough to those not in it.
        EveSrfLandedMountains* = #CSS_crewReport_EveSrfLandedOlympus_00 // There's a lot of sky out of the window. Even the terrain is intimidating here on Eve.
        EveSrfLandedMountains* = #CSS_crewReport_EveSrfLandedOlympus_01 // That altimeter is still reading awful high. Are you sure we've actually landed?
        EveSrfLandedShores* = #CSS_crewReport_EveSrfLandedShallows_00 // Flat coastal plains provide an ideal landing spot for craft, but not one for taking off from.
        EveSrfSplashedPetrolLakes* = #CSS_crewReport_EveSrfSplashedCraterLake_00 // You see the purple liquid that is Eve's ocean leak into the capsule. You get the suspicion that you may be in big trouble.
        EveSrfSplashedPolarLakes* = #CSS_crewReport_EveSrfSplashedCraterLake_01 // This reminds you of a time you saw a man get trapped in a vat of grape soda. Unfortunately, you can't drink your way out of this one.
        EveSrfSplashedShores* = #CSS_crewReport_EveSrfSplashedShallows_00 // We're bouncing a bit too much here.
        EveSrfSplashedShores* = #CSS_crewReport_EveSrfSplashedShallows_01 // You're pretty sure this (isn't) grape juice.
        EveFlyingLowPetrolLakes* = #CSS_crewReport_EveFlyingLowCraterLake_00 // The Crater Lake extends for miles towards the horizon. Why isn't it called the Crater Sea?
        EveFlyingLowPolarLakes* = #CSS_crewReport_EveFlyingLowCraterLake_01 // There's no alien sea monsters down there, right?
        EveFlyingLowMountains* = #CSS_crewReport_EveFlyingLowOlympus_00 // Please don't try and land here. We don't want to end up as debris on a mountainside.
        EveFlyingLowMountains* = #CSS_crewReport_EveFlyingLowOlympus_01 // The disconnect between the sea-level and radar altimeters is scarily large.
        EveFlyingLowShores* = #CSS_crewReport_EveFlyingLowShallows_00 // You could swear you see shapes lurking under the purple surface.
        EveFlyingLowShores* = #CSS_crewReport_EveFlyingLowShallows_01 // As you look out at the sea, its purple color reminds you of your favorite soft drink.

        KerbinSrfLandedMidlands* = #CSS_crewReport_KerbinSrfLandedGrasslands_00 // You look forward to opening the capsule door and smelling the fresh earthy smell of grass. Oh yeah, we have to wear these stupid spacesuits even on Kerbin. Who's great idea was that?
        KerbinSrfLandedMidlands* = #CSS_crewReport_KerbinSrfLandedGrasslands_01 // The crew is embroiled in an argument over whether the grass is in fact greener on the other side.
        KerbinSrfLandedAridMidlands* = #CSS_crewReport_KerbinSrfLandedDeserts_00 // You imagine how hot it would be if the capsule did not have the a/c on.
        KerbinSrfLandedAridMidlands* = #CSS_crewReport_KerbinSrfLandedDeserts_01 // Is that an oasis?
        KerbinSrfLandedAridMidlands* = #CSS_crewReport_KerbinSrfLandedDeserts_02 // You are so very thirsty.
        KerbinSrfLandedAridMidlands* = #CSS_crewReport_KerbinSrfLandedDeserts_03 // The crew complains about the heat.
        KerbinSrfLandedAridHighlands* = #CSS_crewReport_KerbinSrfLandedBadlands_00 // You start to feel very nervous about all the bad things you said about the Badlands.
        KerbinSrfLandedAridHighlands* = #CSS_crewReport_KerbinSrfLandedBadlands_01 // You became a kerbonaut specifically to get away from the Badlands. And now here you are. Congratulations.
        KerbinSrfLandedAridHighlands* = #CSS_crewReport_KerbinSrfLandedBadlands_02 // You try to have a good time. You fail.
        KerbinSrfLandedIceCaps* = #CSS_crewReport_KerbinSrfLandedNorthernIceShelf_01 // We're here in this terrible place, and there's not even an igloo to be seen.
        KerbinSrfLandedIceCaps* = #CSS_crewReport_KerbinSrfLandedSouthernIceShelf_00 // The freezing, windswept and featureless ice plains stretch over the horizon.
        KerbinSrfLandedIceCaps* = #CSS_crewReport_KerbinSrfLandedSouthernIceShelf_02 // The crew is disappointed at the distinct lack of tuxedo-wearing birds.
        KerbinSrfSplashedMidlands* = #CSS_crewReport_KerbinSrfSplashedGrasslands_00 // You're bobbing around in a muddy pond in a field. Surely there's more glamorous places for a kerbonaut to be.
        KerbinSrfSplashedAridMidlands* = #CSS_crewReport_KerbinSrfSplashedDeserts_00 // Waves lapping against the window are one of the last things you would expect to find in a desert, behind "penguins" and "a Yeti" but ahead of "Mortimer's underwear".
        KerbinSrfSplashedAridHighlands* = #CSS_crewReport_KerbinSrfSplashedBadlands_00 // The water must be hot, since the capsule interior is getting rather warm.
        KerbinSrfSplashedIceCaps* = #CSS_crewReport_KerbinSrfSplashedNorthernIceShelf_00 // You watch a large iceberg accompanied by a swarm of growlers make its stately way past.
        KerbinSrfSplashedIceCaps* = #CSS_crewReport_KerbinSrfSplashedSouthernIceShelf_01 // You feel naming your ship the Unsinkable may have been a bad idea in this environment.
        KerbinFlyingLowMidlands* = #CSS_crewReport_KerbinFlyingLowGrasslands_00 // There's something on the wing, some.....thing....
        KerbinFlyingLowMidlands* = #CSS_crewReport_KerbinFlyingLowGrasslands_01 // It's very comforting to see this much green below you.
        KerbinFlyingLowMidlands* = #CSS_crewReport_KerbinFlyingLowGrasslands_02 // The ground here has been highly manicured. You note the number of groundskeepers the planet must have.
        KerbinFlyingLowAridMidlands* = #CSS_crewReport_KerbinFlyingLowDeserts_00 // You look out the window hoping to find a tasty cake until you realize somebody made a slight spelling error in the flight plan.
        KerbinFlyingLowAridMidlands* = #CSS_crewReport_KerbinFlyingLowDeserts_01 // The heat rising from the sand causes the desert to move and shimmer.
        KerbinFlyingLowAridMidlands* = #CSS_crewReport_KerbinFlyingLowDeserts_02 // You look around and see no water for miles. You begin to wonder why you didn't bring more.
        KerbinFlyingLowAridMidlands* = #CSS_crewReport_KerbinFlyingLowDeserts_03 // You wonder if crashing here would create a glass crater. Then you realize how cool that would be.
        KerbinFlyingLowAridMidlands* = #CSS_crewReport_KerbinFlyingLowDeserts_04 // In anticipation of the heat, you turn on the air conditioning.
        KerbinFlyingLowAridHighlands* = #CSS_crewReport_KerbinFlyingLowBadlands_00 // You start to share scary stories about the strange things found in the Badlands, but Mission Control shushes you.
        KerbinFlyingLowAridHighlands* = #CSS_crewReport_KerbinFlyingLowBadlands_01 // This looks like a bad place to land.
        KerbinFlyingLowAridHighlands* = #CSS_crewReport_KerbinFlyingLowBadlands_02 // You bet this is where all the cool kids come to land.
        KerbinFlyingLowAridHighlands* = #CSS_crewReport_KerbinFlyingLowBadlands_03 // You have a bad feeling about this.
        KerbinFlyingLowAridHighlands* = #CSS_crewReport_KerbinFlyingLowBadlands_04 // Crashing here would not be good.
        KerbinFlyingLowIceCaps* = #CSS_crewReport_KerbinFlyingLowNorthernIceShelf_00 // Even flying above the cold, white plains, you're not free of its icy grip.
        KerbinFlyingLowIceCaps* = #CSS_crewReport_KerbinFlyingLowNorthernIceShelf_01 // You think you see some land on the horizon from your aerial vantage point, but the glare makes it difficult to see.
        KerbinFlyingLowIceCaps* = #CSS_crewReport_KerbinFlyingLowSouthernIceShelf_00 // You look down and see a sheet of shining white ice. If you stare at it too long, your eyes start to water.
        KerbinFlyingLowIceCaps* = #CSS_crewReport_KerbinFlyingLowSouthernIceShelf_01 // The ice sheet is strangely uniform from the air, with a total lack of major crevasses and joints.
        
        MunSrfLandedNotableCraters* = #CSS_crewReport_MunSrfLandedEastCrater_00 // One small step for man, one giant bill for mankind.
        MunSrfLandedNotableCraters* = #CSS_crewReport_MunSrfLandedTwinCraters_00 // The twin craters remind you of some other twin things. But we won't get into that here.
        MunSrfLandedRareCraters* = #CSS_crewReport_MunSrfLandedNorthwestCrater_00 // This would be an awesome spot to film a movie. "North by Northwest Crater".
        MunSrfLandedRareCraters* = #CSS_crewReport_MunSrfLandedSouthwestCrater_00 // This would be a great spot for the first Munar music festival. 'South by Southwest Crater'
        MunSrfLandedExoticCraters* = #CSS_crewReport_MunSrfLandedFarsideCrater_00 // Boy, the lighting up here sure looks weird. Almost as if you were on a sound stage or something.
        MunSrfLandedExoticCraters* = #CSS_crewReport_MunSrfLandedEastFarsideCrater_00 // You begin to indicate concerns regarding whether or not the landing was simply an elaborate hoax, but the communications are interrupted by a strange voice telling you to keep quiet.
        MunSrfLandedPolarIceCraters* = #CSS_crewReport_MunSrfLandedPolarCrater_00 // It feels strangely dangerous out there. Mission Control insists it's safe, but you don't think they would know very well.
        MunSrfLandedLowlands* = #CSS_crewReport_MunSrfLandedPolarLowlands_00 // You put on your polarized aviator sunglasses. Now you can look cool AND be situationally appropriate.
        MunSrfLandedVoronoiCraters* = #CSS_crewReport_MunSrfLandedHighlandCraters_00 // Struck by a sudden urge to say something witty, you nearly choke on your snack.
        MunSrfLandedVoronoiCraters* = #CSS_crewReport_MunSrfLandedMidlandCraters_00 // You muse on the chances of having landed in this specific crater. Oh yeah, we picked it from data from a pre-scan mission. There was a pre-scan mission, right?!
        
        MinmusSrfLandedBasins* = #CSS_crewReport_MinmusSrfLandedFlats_00 // You look up at Kerbin and it looks smaller than ever. You think you can just about make out the Mun, too.
        MinmusSrfLandedBasins* = #CSS_crewReport_MinmusSrfLandedGreatFlats_00 // You note that landing on a perfectly flat surface is somewhat boring.
        MinmusSrfLandedBasins* = #CSS_crewReport_MinmusSrfLandedGreaterFlats_00 // The ground here is completely flat. It's really boring.
        MinmusSrfLandedBasins* = #CSS_crewReport_MinmusSrfLandedLesserFlats_00 // "I could be bounded in a nutshell, and count myself a king of infinite space."
        MinmusSrfLandedMountains* = #CSS_crewReport_MinmusSrfLandedSlopes_00 // Don't fall over, don't fall over, don't fall over...
        MinmusSrfLandedMountains* = #CSS_crewReport_MinmusSrfLandedSlopes_01 // It's completely beyond your understanding why you decided to land here and not on the perfectly flat surface of the frozen lake below.
        
        DunaSrfLandedIceCaps* = #CSS_crewReport_DunaSrfLandedPoles_00 // Why did we land here again? There's nothing here but ice in all directions.
        DunaSrfLandedIceCaps* = #CSS_crewReport_DunaSrfLandedPoles_01 // A spiderweb of ice crystals spreads across the pod window as it cools.
        DunaSrfLandedMidlands* = #CSS_crewReport_DunaSrfLandedMidlandSea_00 // The gentle winds on the lowland plains deposit a fine coating of dust on the window, turning the world even redder.
        DunaSrfLandedMidlands* = #CSS_crewReport_DunaSrfLandedMidlandSea_01 // "Goooood morning ladies and gentlekerbs, the weather outlook for today features highs of a nippy -5 degrees with the dust storm hazard level at medium-high. If you're going out, be sure to bundle up warm and always carry a respirator. This is Jeb, for KSWN."
        DunaSrfLandedNotablePlains* = #CSS_crewReport_DunaSrfLandedNorthernBasin_00 // The red landscape outside the window doesn't look particularly inviting. Do you have to go out there?
        DunaSrfLandedNotablePlains* = #CSS_crewReport_DunaSrfLandedNorthernBasin_01 // Sand starts to pile up on the window ledge. That's right, sand! Not dust for once!
        DunaSrfLandedNotablePlains* = #CSS_crewReport_DunaSrfLandedSouthernBasin_00 // The ice is slowly creeping over the ancient lava field. You hope it doesn't creep over you, too.
        DunaSrfLandedNotablePlains* = #CSS_crewReport_DunaSrfLandedSouthernBasin_01 // One side of the basin is mostly ice, the other is mostly rock. You check the map to see which side you landed on.
        DunaSrfLandedNotableMountains* = #CSS_crewReport_DunaSrfLandedNorthernShelf_00 // You squint through the dust-are those mountains off in the distance? ...Those aren't mountains-they're canyon walls!
        DunaSrfLandedNotableMountains* = #CSS_crewReport_DunaSrfLandedNorthernShelf_01 // With the craft now still, the red Dunaian sand starts to pile up on the window. You try to tap the window to knock it off, until a wind gust does that for you.
        DunaSrfLandedTrenches* = #CSS_crewReport_DunaSrfLandedMidlandCanyon_00 // The canyon walls here look...curvy. Odd.
        DunaSrfLandedTrenches* = #CSS_crewReport_DunaSrfLandedMidlandCanyon_01 // The chasm looks ominous from down here, like any self-respecting canyon should.
        DunaSrfLandedTrenches* = #CSS_crewReport_DunaSrfLandedEasternCanyon_00 // The canyon is so huge and dusty you can't see the other wall. It makes you feel perticularly small. Well... OK, stop rubbing it in, Duna!
        DunaSrfLandedTrenches* = #CSS_crewReport_DunaSrfLandedEasternCanyon_01 // The air is thick with dust down here, and the haze reduces visibility to a couple of hundred metres or so.
        DunaSrfLandedTrenches* = #CSS_crewReport_DunaSrfLandedWesternCanyon_00 // This canyon looks pretty narrow and relatively dust free, letting you get a clear view of the walls.
        DunaSrfLandedTrenches* = #CSS_crewReport_DunaSrfLandedWesternCanyon_01 // You imagine the canyon as a groove in a giant, red vinyl record. Actually, maybe music-loving aliens built this?
        DunaSrfLandedNotableMountains* = #CSS_crewReport_DunaSrfLandedPolarHighlands_00 // You look out and see a network of tunnels running beneath the ice to a nearby hole, and try not to think about what this says about the ice.
        DunaSrfLandedNotableMountains* = #CSS_crewReport_DunaSrfLandedPoalrHighlands_01 // The craft briefly slides and judders over the ice before coming to a stop. It takes a while to let go of the grip handles.
        DunaSrfLandedExoticCraters* = #CSS_crewReport_DunaSrfLandedPolarCraters_00 // You look out at the vast icy bowl in the landscape and dearly hope the EVA suits are climate controlled.
        DunaSrfLandedExoticCraters* = #CSS_crewReport_DunaSrfLandedPolarCraters_01 // The cabin radiator clicks on, dispelling the cold seeping into the craft.
        DunaFlyingLowIceCaps* = #CSS_crewReport_DunaFlyingLowPoles_00 // A scattering of tiny ice crystals flows past the window like dust particles.
        DunaFlyingLowIceCaps* = #CSS_crewReport_DunaFlyingLowPoles_01 // The pod window is cold to the touch. Better hope there's some mittens in the cupboard.
        DunaFlyingLowMidlands* = #CSS_crewReport_DunaFlyingLowMidlandSea_00 // You spot a towering column of dust far off in the distance. Wonder what that could be?
        DunaFlyingLowMidlands* = #CSS_crewReport_DunaFlyingLowMidlandSea_01 // There's a monster dust storm bearing down on your landing spot. Might not want to spend too much time there.
        DunaFlyingLowNotablePlains* = #CSS_crewReport_DunaFlyingLowNorthernBasin_00 // The smell of the snacks you put on to warm up earlier starts to make you hungry at a bad time.
        DunaFlyingLowNotablePlains* = #CSS_crewReport_DunaFlyingLowNorthernBasin_01 // In the low Duna gravity, things fly further. You know that because you just got hit in the face by a boot thrown at you by turbulence.
        DunaFlyingLowNotablePlains* = #CSS_crewReport_DunaFlyingLowSouthernBasin_00 // A sudden gust of freezing wind almost blows the ship off course. Such are the hazards of being near the icy zones.
        DunaFlyingLowNotablePlains* = #CSS_crewReport_DunaFlyingLowSouthernBasin_01 // You want to do a barrel roll, until you realise KSC is closely monitoring all craft telemetry and you'd rather keep your job when you return.
        DunaFlyingLowNotableMountains* = #CSS_crewReport_DunaFlyingLowNorthernShelf_00 // The huge scar scraped out of the surface stretches all the way to the reddish, hazy horizon.
        DunaFlyingLowNotableMountains* = #CSS_crewReport_DunaFlyingLowNorthernShelf_01 // A powerful gust of wind shakes the capsule violently and a long-forgotten snack falls out of the overhead locker.
        DunaFlyingLowTrenches* = #CSS_crewReport_DunaFlyingLowMidlandCanyon_00 // This one will take some landing skill. You try to pick out a spot that isn't too steeply sloping.
        DunaFlyingLowTrenches* = #CSS_crewReport_DunaFlyingLowMidlandCanyon_01 // You can't see much more from here, as the canyon curves out of your view.
        DunaFlyingLowTrenches* = #CSS_crewReport_DunaFlyingLowEasternCanyon_00 // There's so much dust you can barely see the ground. You're flying blind with only the altimeter to tell you of the nearby ground.
        DunaFlyingLowTrenches* = #CSS_crewReport_DunaFlyingLowEasternCanyon_01 // The dust clouds roil past the window, as though the very air is alive with sand.
        DunaFlyingLowTrenches* = #CSS_crewReport_DunaFlyingLowWesternCanyon_00 // You look down, and hope you don't land on one of the steep walls. That would be... problematic.
        DunaFlyingLowTrenches* = #CSS_crewReport_DunaFlyingLowWesternCanyon_01 // The canyon stretches off to the hazy horizon in both directions. You feel like you've said something similar before.
        DunaFlyingLowNotableMountains* = #CSS_crewReport_DunaFlyingLowPolarHighlands_00 // The icy hills stretch out in all directions beneath you. The ice glare makes it difficult to look down.
        DunaFlyingLowNotableMountains* = #CSS_crewReport_DunaFlyingLowPolarHighlands_01 // You find a page in the safety manual on how to deal with space polar bear attacks. Unfortunately, all it says is "run away".
        DunaFlyingLowExoticCraters* = #CSS_crewReport_DunaFlyingLowPolarCraters_00 // All you can see is pinkish ice to the horizon, albeit lacking the dust haze of the lower latitudes.
        DunaFlyingLowExoticCraters* = #CSS_crewReport_DunaFlyingLowPolarCraters_01 // You fumble around the glovebox for a pair of sunglasses to protect from the ice glare, which is strong even in the weak Dunaian sun.
        
        IkeSrfLandedPoles* = #CSS_crewReport_IkeSrfLandedPolarLowlands_00 // Well, we're down in the big black bowl, the big black bowl...
        IkeSrfLandedPoles* = #CSS_crewReport_IkeSrfLandedPolarLowlands_01 // The high walls of the polar depression throw long shadows over the already-dark ground outside.
        IkeSrfLandedPoles* = #CSS_crewReport_IkeSrfLandedSouthPole_00 // You plant your foot on a smooth patch on the floor and almost slide over. You thank Ike's low gravity.
        IkeSrfLandedPoles* = #CSS_crewReport_IkeSrfLandedSouthPole_01 // By now, you're starting to think the grey of the surface has leached the colour from your vision. You hope you don't turn grey yourself.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedEasternMountainRidge_00 // Every moon has two sides, and you feel like you landed on the right one.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedEasternMountainRidge_01 // Even here, Duna is still peeking above the horizon to watch you.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedWesternMountainRidge_00 // That bit of ground looks wobbly. Maybe the Lowlands would have been a more stable place to land?
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedWesternMountainRidge_01 // You're itching to get out of the capsule and jump around on the mountain.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_00 // More grey mountains. How exciting.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedSouthEasternMountainRange_01 // These mountains are big. You look out and see them rising to the stars around you.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedCentralMountainRange_00 // You could sit in here forever, watching the dust storms roll across the Dunaian surface far away through the thickened glass.
        IkeSrfLandedMountains* = #CSS_crewReport_IkeSrfLandedCentralMountainRange_01 // You crane your neck against the window, trying to get a glimpse of Duna.

        DresSrfLandedCanyon* = #CSS_crewReport_DresSrfLandedCanyons_00 // You bask in the knowledge that you have successfully landed on the Mun. Wait.
        
        LaytheSrfLandedIceCaps* = #CSS_crewReport_LaytheSrfLandedPoles_00 // One day we will have a permanent base here. One day.
        LaytheSrfLandedShores* = #CSS_crewReport_LaytheSrfLandedDunes_00 // You wonder if you just could sit on the beach, relax, and have a margarita.
        LaytheFlyingLowIceCaps* = #CSS_crewReport_LaytheFlyingLowPoles_00 // You started daydreaming about being the captain of the Space Battleship 'Spirit of Kerbin', until being woken up by a beeping sound.
        LaytheFlyingLowHighlands* = #CSS_crewReport_LaytheFlyingLowDunes_00 // The crew deliberates heavily on the correct way to pronounce 'Laythe'.

        BopSrfLandedMountains* = #CSS_crewReport_BopSrfLandedPeaks_00 // I can see Kerbin from here! I wish I had a telescope...
        BopSrfLandedMountains* = #CSS_crewReport_BopSrfLandedPeaks_01 // Mission Control tells you that the amazing vista you see is just an optical illusion. You take some picture anyway.
        BopSrfLandedHighlands* = #CSS_crewReport_BopSrfLandedRidges_00 // You hear an odd noise on the radio, most probably caused by radiation from the host planet.
        BopSrfLandedMidlands* = #CSS_crewReport_BopSrfLandedSlopes_00 // From here Bop looks entirely untrustworthy.
        BopSrfLandedLowlands* = #CSS_crewReport_BopSrfLandedValley_00 // You smell squid. The pilot must be eating sushi. What else could it be?

        EelooSrfLandedCanyon* = #CSS_crewReport_EelooSrfLandedIceCanyons_00 // It seems you have eaten all of your snacks. You start weeping quietly in the corner.
        EelooSrfLandedCanyon* = #CSS_crewReport_EelooSrfLandedIceCanyons_01 // It's cold here.
    }
}