        LaytheSrfLandedShallows* = #JNSQscience_mobileMaterialsLab_LaytheSrfLandedShallows_00 // The lab dutifully analyzes the damp sand and declares it “mostly minerals, partly optimism.” You make a note to keep it away from the waterline.
        LaytheSrfLandedHighlands* = #JNSQscience_mobileMaterialsLab_LaytheSrfLandedHighlands_00 // The sample tray fills with gritty highland dust; the lab spins, beeps, and finally reports “not sand,” as if that settles everything.
        LaytheSrfLandedMountains* = #JNSQscience_mobileMaterialsLab_LaytheSrfLandedMountains_00 // Rock chips from the slopes rattle inside the bay, and the readout flags “high stress” in both the sample and the operator.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_mobileMaterialsLab_LaytheSrfLandedEnclosedFaults_00 // The instruments keep recording tiny rhythmic vibrations while the samples sort themselves into neat layers. You label it “tide-related” and close the bay.
        LaytheSrfLandedLowlands* = #JNSQscience_mobileMaterialsLab_LaytheSrfLandedLowlands_00 // The soil turns the lab’s filters into a sticky mess, and several samples react far too eagerly with trace moisture in the air.
