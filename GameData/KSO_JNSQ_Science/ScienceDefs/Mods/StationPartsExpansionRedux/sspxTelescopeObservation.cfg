@EXPERIMENT_DEFINITION:HAS[#id[sspxTelescopeObservation]]
{
    %RESULTS
    {
        SunFlyingHigh* = #JNSQscience_sspxTelescopeObservation_SunFlyingHigh_00 // You try to do astronomy next to the biggest light in the sky. The telescope mostly records “yes, it’s bright” with exquisite precision.

		MohoSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedPoles_00 // Long shadows and sharp contrast make alignment easy—until the temperature swings pull focus like it’s trying to escape.
		MohoSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedLowlands_00 // Heat ripples turn every star into a squiggle. You produce a flawless map of turbulence and call it “atmospheric-ish effects.”
		MohoSrfLandedPolarIceCraters* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedPolarIceCraters_00 // The pale ground throws glare straight into the optics. You log “mystery sparkle” and add an extra sunshade out of spite.
		MohoSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedHighlands_00 // Higher ground steadies the view a little, but the Sun still floods the sky with unwanted enthusiasm. You measure faint things the hard way.
		MohoSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedMidlands_00 // The sky is dark, the ground is bright, and the telescope can’t decide which to believe. You settle for short exposures and long sighs.
		MohoSrfLandedCraters* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedCraters_00 // The crater rim blocks the worst glare and wind. The stars finally hold still—right up until the rock you’re standing on creaks ominously.
		MohoSrfLandedExoticCraters* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedExoticCraters_00 // Strange colors on the ground keep tricking your sensors into thinking the sky is tinted. You recalibrate until “weird” becomes a baseline.
		MohoSrfLandedRareCraters* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedRareCraters_00 // Everything looks unusually clean and quiet here. The data comes back so perfect you immediately suspect sabotage by the universe.
		MohoSrfLandedVoronoiCraters* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedVoronoiCraters_00 // The patterned terrain makes the horizon feel geometric. Your tracking software tries to lock onto the ground and gets very confident about it.
		MohoSrfLandedNotableCraters* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedNotableCraters_00 // You use the huge crater as a reference point and feel clever. Then you realize you’ve been polar-aligning to a rock for ten minutes.
		MohoSrfLandedPeaks* = #JNSQscience_sspxTelescopeObservation_MohoSrfLandedPeaks_00 // Up high the stars sharpen nicely, but the slope makes the tripod slowly “walk” downhill. You invent a new discipline: mobile astronomy.

		EveSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedPoles_00 // The air is still and the horizon is a deep violet smear. You catch a few crisp stars between slow, stubborn cloud layers.
		EveSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedLowlands_00 // The thick air turns pinpoints into glowing blobs. You note excellent “purple fog” data and terrible astronomy.
		EveSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedMidlands_00 // For a few minutes the haze thins and the sky sharpens. You rush the exposures like the clouds are charging by the second.
		EveSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedHighlands_00 // Higher ground helps, but the atmosphere refuses to stop being an atmosphere. Your best images still look like they were painted with a mop.
		EveSrfLandedPeaks* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedPeaks_00 // Above some of the soup, the stars almost behave. Then a new wave of cloud rolls in and reminds you who owns the sky here.
		EveSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedMountains_00 // Wind tugs at the mount and the view swims in warm, dense air. You obtain a perfect measurement of “wobble.”
		EveSrfLandedShores* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedShores_00 // The surf hisses and the air is thick with misty droplets. You spend the session trying to keep the optics from becoming part of the ocean.
		EveSrfLandedKrakensWell* = #JNSQscience_sspxTelescopeObservation_EveSrfLandedKrakensWell_00 // The horizon feels wrong, like it’s watching back. The telescope keeps insisting your target is “moving,” and you decide not to argue.
		EveSrfSplashedExplodiumSea* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedExplodiumSea_00 // The spray is aggressive and the fog is constant. You manage exactly one usable frame before the telescope politely suggests retreat.
		EveSrfSplashedShores* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedShores_00 // Every wave rocks the platform just enough to ruin tracking. You confirm the stars are steady; you are not.
		EveSrfSplashedPolarLakes* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedPolarLakes_00 // Cold air steadies the view, but the surface exudes a purple haze that clings to everything. Your notes include “lens cap: never remove.”
		EveSrfSplashedPetrolLakes* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedPetrolLakes_00 // The slick surface reflects the sky beautifully. Unfortunately it also reflects into your telescope and turns every exposure into an abstract double-image.
		EveSrfSplashedSeaofAkron* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofAkron_00 // A dense cloud ceiling flattens the sky into a dim violet dome. You log “excellent at hiding the universe” as a local atmospheric trait.
		EveSrfSplashedSeaofNessus* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofNessus_00 // The haze breaks just long enough to grab a clean star field. Then it seals up again like you weren’t supposed to see that.
		EveSrfSplashedSeaofTaniwha* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofTaniwha_00 // Strange ripples in the air make the stars twinkle in slow motion. You collect valuable data on “twinkle, but ominous.”
		EveSrfSplashedSeaofGigan* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofGigan_00 // The sea is calm, the sky is not. A rolling fog bank drifts through your line of sight with perfect, infuriating timing.
		EveSrfSplashedSeaofRodan* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofRodan_00 // Gusts slap the surface and your tracking graph turns into modern art. You name the pattern “hostile atmosphere.”
		EveSrfSplashedSeaofGojira* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofGojira_00 // The purple overcast glows faintly even at night. Your long exposures come back bright, blurry, and deeply disappointed.
		EveSrfSplashedSeaofGhidorah* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofGhidorah_00 // You try multiple targets, multiple filters, multiple hopes. The atmosphere answers with the same result every time: “no.”
		EveSrfSplashedSeaofBagorah* = #JNSQscience_sspxTelescopeObservation_EveSrfSplashedSeaofBagorah_00 // The mist thins for a heartbeat and the stars snap into focus. You cheer, save the frame, and immediately lose the sky again.
		EveFlyingHigh* = #JNSQscience_sspxTelescopeObservation_EveFlyingHigh_00 // Above the worst of the haze, the stars finally sharpen into something measurable. You savor the clarity until turbulence shakes the telescope back into reality.

        GillySrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_GillySrfLandedLowlands_00 // The telescope works great, but the slightest bump sends you drifting. You take notes in midair and pretend it’s normal.
		GillySrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_GillySrfLandedMidlands_00 // The sky is wonderfully stable and wonderfully empty of distractions. The only issue is keeping the mount from hopping when you breathe.
		GillySrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_GillySrfLandedHighlands_00 // From up here you can see half the little world at once. The view is fantastic, but anchoring the tripod feels like negotiating with pebbles.

		KerbinSrfLandedAdministration* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAdministration_00 // You aim the telescope at a filing cabinet and discover a new constellation: Forms, Forms, and More Forms. Security asks you to stop observing “restricted paperwork at magnification.”
		KerbinSrfLandedAstronautComplex* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAstronautComplex_00 // The telescope resolves a rare sight: a perfectly intact snack, untouched, behind the couch. The crew requests your instrument be recalibrated to “less judgmental.”
		KerbinSrfLandedCrawlerway* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedCrawlerway_00 // Magnified pebbles stretch to the horizon like an endless, crunchy runway for the crawler. A supervisor asks if you’re “tracking rocks” without a rock-tracking license.
		KerbinSrfLandedFlagPole* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedFlagPole_00 // At full zoom, the flag’s stitching looks like engineering diagrams for patriotism. A guard insists you log the observation under “ceremonial, not scientific.”
		KerbinSrfLandedLaunchPad* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedLaunchPad_00 // You focus on the pad plumbing and watch valves twitch like they know you’re looking. The pad crew suggests the telescope should observe from “over there, behind several fences.”
		KerbinSrfLandedMissionControl* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedMissionControl_00 // The telescope view is mostly screens showing the telescope view. Flight requests you stop creating “recursive optics” during active operations.
		KerbinSrfLandedR&D* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&D_00 // At high magnification, every label reads either “Prototype” or “Do Not.” A scientist quietly closes a curtain and declares the curtain to be a biome.
		KerbinSrfLandedR&DCentralBuilding* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DCentralBuilding_00 // You zoom in on a spotless hallway and detect zero chaos, which is statistically impossible. Your report is returned with “please observe within approved uncertainty.”
		KerbinSrfLandedR&DCornerLab* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DCornerLab_00 // The telescope resolves a tiny handwritten sign: “NOT A WINDOW.” Someone immediately turns off the lights for “optical safety.”
		KerbinSrfLandedR&DMainBuilding* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DMainBuilding_00 // You observe an engineer pacing in perfectly periodic loops, suggesting a stable resonance with deadlines. The pattern is classified as “normal workflow.”
		KerbinSrfLandedR&DObservatory* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DObservatory_00 // The observatory’s telescope is “temporarily awaiting parts,” so you’re officially requested to use your portable one instead. The request form is three pages long.
		KerbinSrfLandedR&DObservatory* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DObservatory_01 // Wernher invites you to an “amateur astronomy session,” which is apparently a formal meeting with snacks and an informal ban on asking what the budget line item means.
		KerbinSrfLandedR&DObservatory* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DObservatory_02 // The staff asks you why you’re using a portable telescope in an actual observatory. You answer “because this one is portable”. No one argues.
		KerbinSrfLandedR&DObservatory* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DObservatory_03 // The staff insist you point the telescope at the sky, not at the VAB doors “to check alignment.” You write down that the local atmosphere is highly turbulent.
		KerbinSrfLandedR&DSideLab* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DSideLab_00 // At full zoom you see a door labeled “Quick Test” that never stops opening. You record continuous transient phenomena and a continuous sigh from staff.
		KerbinSrfLandedR&DSmallLab* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DSmallLab_00 // The telescope resolves dust motes arranged with suspicious uniformity. An intern explains the dust is “calibration particulate” and absolutely not just dust.
		KerbinSrfLandedR&DTanks* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DTanks_00 // You zoom in on tank stencils and learn the tanks have more warnings than you have funding. Security recommends you observe something “less pressurized.”
		KerbinSrfLandedR&DWindTunnel* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedR&DWindTunnel_00 // Through the telescope, loose papers achieve flight and immediately become an experiment. The wind tunnel wins by claiming your notes as “airborne data.”
		KerbinSrfLandedRunway* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedRunway_00 // At maximum magnification, the runway markings look like a polite request to stop standing there. Ground crew asks if your telescope can spot incoming complaints.
		KerbinSrfLandedSPH* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedSPH_00 // You observe a wing being “adjusted” with a wrench the size of optimism. The engineer waves and mouths, “Don’t write that down.”
		KerbinSrfLandedSPHMainBuilding* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedSPHMainBuilding_00 // The telescope catches a crane hook drifting like a patient predator. A supervisor asks you to stop “staring the equipment into motion.”
		KerbinSrfLandedSPHRoundTank* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedSPHRoundTank_00 // You zoom in on insulation seams and discover they are held together by tape and confidence. The technician requests you reclassify your finding as “aerodynamic texture.”
		KerbinSrfLandedSPHTanks* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedSPHTanks_00 // At full zoom, the paint chips form a mosaic reading “TOUCH NOTHING.” You comply heroically by only touching the focus knob.
		KerbinSrfLandedSPHWaterTower* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedSPHWaterTower_00 // You observe droplets forming, falling, and perfectly targeting your equipment. The water tower is either leaking or conducting accuracy tests.
		KerbinSrfLandedTrackingStationDishEast* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedTrackingStationDishEast_00 // The dish’s bolts and grease fittings look like a tiny mechanical ecosystem. The technician asks if your telescope has been cleared to see “that much detail.”
		KerbinSrfLandedTrackingStationDishNorth* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedTrackingStationDishNorth_00 // You zoom in as the dish slews and it feels like it’s zooming back. Your log notes “mutual observation” and “mild intimidation.”
		KerbinSrfLandedTrackingStationDishSouth* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedTrackingStationDishSouth_00 // The telescope reveals immaculate cable runs and immaculate suspicion. Staff approves your optics while disapproving your curiosity.
		KerbinSrfLandedTrackingStationHub* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedTrackingStationHub_00 // You observe monitors, then observe the reflection of your telescope in the monitors, then get asked to stop “creating additional monitoring.”
		KerbinSrfLandedVAB* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedVAB_00 // At full zoom, the VAB’s scaffolding looks like an orbiting city of ladders. A hardhat appears on your head as if by automatic procedure.
		KerbinSrfLandedVABMainBuilding* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedVABMainBuilding_00 // You zoom in on a rocket stack and witness an engineer whispering encouragement to a bolt. The bolt remains uncooperative, but morale improves.
		KerbinSrfLandedVABPodMemorial* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedVABPodMemorial_00 // You take a careful, respectful look and find everything quiet and steady. Even the telescope seems to focus more gently here.
		KerbinSrfLandedVABRoundTank* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedVABRoundTank_00 // The telescope resolves pristine paint and a security camera that resolves you back. Your observation is logged as “unnecessary precision.”
		KerbinSrfLandedVABSouthComplex* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedVABSouthComplex_00 // Magnified welding sparks look like tiny meteors with big attitudes. Safety requests you observe from a location with fewer “glowing things.”
		KerbinSrfLandedVABTanks* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedVABTanks_00 // You zoom in on tank yard tire tracks and reconstruct an entire timeline of panic. The official response is “that’s not a timeline, that’s routine.”
		KerbinSrfLandedIslandAirfield* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedIslandAirfield_00 // The telescope reveals salt crusts forming on every surface like a slow, determined invasion. The instrument begins to smell “coastal” immediately.
		KerbinSrfLandedBaikerbanur* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedBaikerbanur_00 // You zoom in on distant buildings and discover the region’s dominant feature is “open space for more signs.” A clerk asks if your telescope has the right stamp.
		KerbinSrfLandedBaikerbanurLaunchpad* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedBaikerbanurLaunchpad_00 // At high magnification, the pad’s warning labels have warning labels. You record the hierarchy until someone confiscates your clipboard for “excessive reading.”
		KerbinSrfLandedWoomerang* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedWoomerang_00 // You aim at a fixed landmark, then the wind moves you and the landmark becomes “somewhere else.” The telescope logs excellent data and terrible stability.

        KerbinSrfLandedIceCaps* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedIceCaps_00 // The air is sharp and clear, but the optics keep frosting over. You log a new observing mode: “defrost, focus, repeat.”
		KerbinSrfLandedShores* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedShores_00 // The horizon is gorgeous, but humidity turns every star into a wobbly smear. The ocean is applauding. Loudly.
		KerbinSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedMidlands_00 // Gentle terrain, gentle skies. You spend the night counting faint smudges and pretending you meant to do that.
		KerbinSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedLowlands_00 // Warm ground makes the air shimmer like soup. The telescope insists it is seeing three moons. It is seeing none.
		KerbinSrfLandedAridLowlands* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAridLowlands_00 // Dry air gives crisp starlight, right up until the heat haze starts dancing. You call it “atmospheric ballet” and try to sound professional.
		KerbinSrfLandedAridMidlands* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAridMidlands_01 // Transparency is excellent and the sky is dark. Unfortunately, the ground radiates “wiggle” straight into your image stack.
		KerbinSrfLandedAridMidlands* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAridMidlands_02 // From within Kerbin's atmosphere, the atmospheric turbulence causes the image to boil and shimmer, leading to a lower resolution. Planetary imaging must be done with extreme-short exposures and with digital processing to stack the image.
        KerbinSrfLandedAridHighlands* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAridHighlands_00 // Up on the dusty ridges the stars look steadier, but every gust tries to sandblast the mount. You invent a new term: “abrasive seeing.”
		KerbinSrfLandedAridMountains* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedAridMountains_00 // The thin air up here is almost cooperative. You snag clean transit timings until the wind reminds you who owns the tripod.
		KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_sspxTelescopeObservation_KerbinSrfLandedWelcomeBackIsland_00 // The skies are wonderfully empty of lights, radios, and common sense. You get the best data yet and the faintest feeling you’re being waved at.
		KerbinSrfSplashedShores* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedShores_00 // The platform rocks just enough to ruin every long exposure. You confirm the stars are not, in fact, doing barrel rolls.
		KerbinSrfSplashedGreatLake* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedGreatLake_00 // Calm water makes a perfect mirror—until you realize your “new nebula” is just your own reflection.
		KerbinSrfSplashedInlandWater* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedInlandWater_00 // The air is damp, the optics are damp, your notes are damp. The telescope records one clear result: “Bring towels.”
		KerbinSrfSplashedKreenwichSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedKreenwichSea_00 // You try to align on the “zero line” and immediately drift off it. The sea proves that it does not respect reference frames.
		KerbinSrfSplashedArcticSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedArcticSea_00 // The sky is dark and the water is cold enough to threaten the lubricants with surrender. The stars look sharp; your fingers do not.
		KerbinSrfSplashedForemansSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedForemansSea_00 // The waves keep time like a metronome set to “annoying.” You collect a beautiful dataset on how fast a target can leave the field of view.
		KerbinSrfSplashedTriangulusSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedTriangulusSea_00 // The chop hits in oddly regular patterns. You start naming the waves and stop when you realize you’re bargaining with the ocean.
		KerbinSrfSplashedNorthernSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedNorthernSea_00 // Low haze hugs the horizon while the zenith stays clear. You focus high and pretend the horizon does not exist.
		KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedSub-ArcticSea_00 // Cold air steadies the view, warm spray destabilizes everything else. The telescope is performing science; the mount is performing interpretive dance.
		KerbinSrfSplashedEasternSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedEasternSea_00 // Dawn creeps in early and bright. You rush the last exposures and discover a brand-new class of error: “sunrise panic.”
		KerbinSrfSplashedWesternSea* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashedWesternSea_00 // Sunset lingers and paints the sky in gradients the sensors adore. You waste a whole observing window taking “calibration art.”
		KerbinSrfSplashed* = #JNSQscience_sspxTelescopeObservation_KerbinSrfSplashed_00 // Sea spray and sand is getting into the instrument. That's going to be a maintenance nightmare. You attempt to do some imaging, but between the fog, the turbulent air, and the sea spray, this observing session's a wash.
        KerbinFlyingHigh* = #JNSQscience_sspxTelescopeObservation_KerbinFlyingHigh_00 // Above most of the soup, the stars finally hold still long enough to measure. Then the airframe shudders and reminds you this is still a vehicle, not an observatory.

        MunSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedPoles_00 // The sky is razor-sharp with no air to argue. Unfortunately, the pale ground keeps trying to photobomb your dark frames.
		MunSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedHighlands_00 // Good horizon, great stability, terrible footing. Every time you celebrate a clean exposure, the tripod sinks a millimeter into dust.
		MunSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedMidlands_00 // The view is steady enough to make you overconfident. You spend an hour “discovering” the same faint smudge because you forgot to unlock the mount.
		MunSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedLowlands_00 // Perfect seeing, imperfect patience. You can measure tiny star motions… and also the exact moment your visor fogs from excitement.
		MunSrfLandedPolarIceCraters* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedPolarIceCraters_00 // The ice glitter is beautiful right up until it scatters straight into the optics. You log the universe and an embarrassing amount of sparkle.
		MunSrfLandedExoticCraters* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedExoticCraters_00 // The crater rim blocks stray glare and the stars sit perfectly still. You start trusting the data, which is always when something goes wrong.
		MunSrfLandedRareCraters* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedRareCraters_00 // Everything here feels unusually quiet, even for the Mun. The images come back so clean you check twice to be sure the lens cap wasn’t on.
		MunSrfLandedVoronoiCraters* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedVoronoiCraters_00 // The patterned landscape makes the horizon look engineered. Your tracker keeps trying to lock onto the ground and calls it “a feature.”
		MunSrfLandedNotableCraters* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedNotableCraters_00 // You pick a famous rim as a reference and feel very official. Later you realize you’ve aligned your “north” to a rock with a nice silhouette.
		MunSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_MunSrfLandedMountains_00 // The stars are pinpoints, but the terrain fights every leveling attempt. You learn that “observatory grade” begins with “flat.”

		MinmusSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedPoles_00 // The sky is dark and still, but the surface glows faintly like it’s cheering you on. Your calibration notes contain the word “minty” far too often.
		MinmusSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedLowlands_00 // The ground sparkles and the stars sparkle and your sensors give up sorting them. You declare it a successful study of “sparkle density.”
		MinmusSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedMidlands_00 // The view is crisp enough to make you forget you’re on a tiny moonlet. Then you bump the tripod and hop three meters, mid-exposure.
		MinmusSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedHighlands_00 // You get the steadiest star field you’ve ever seen. The only blur in the dataset is from you trying not to float away while taking notes.
		MinmusSrfLandedBasins* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedBasins_00 // The basin floor is smooth, stable, and suspiciously perfect for an observatory. You start drafting plans until you remember the return fuel budget.
		MinmusSrfLandedBrownBasins* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedBrownBasins_00 // The darker ground cuts the glare and the stars finally pop. You celebrate by immediately overexposing your first “good” frame.
		MinmusSrfLandedBrownLowlands* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedBrownLowlands_00 // Less shine, more contrast, fewer excuses. The telescope behaves so well you begin blaming yourself for every tiny error.
		MinmusSrfLandedBrownMidlands* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedBrownMidlands_00 // The sky is cooperative and the ground is forgiving. You take a full set of measurements and feel uncomfortable at how easy it was.
		MinmusSrfLandedBrownHighlands* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedBrownHighlands_00 // High, dark, and steady—excellent observing conditions. You briefly consider staying forever, until the snacks inventory disagrees.
		MinmusSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_MinmusSrfLandedMountains_00 // The view is spectacular, but every “small adjustment” sends you into a slow-motion hop. You collect premium data and bargain-bin dignity.

        DunaSrfLandedIceCaps* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedIceCaps_00 // The sky is steady and brutally clear, but glare off the pale ground keeps sneaking into the optics. You log “polar sparkle” as a new kind of interference.
		DunaSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedHighlands_00 // Thin air makes the stars behave, but every gust tries to dust your mirrors. You spend half the session observing the universe and the other half cleaning it off your lens cap.
		DunaSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedMidlands_00 // The horizon looks calm and the tracking is perfect—until a faint haze turns your faintest targets into faint suggestions. You blame “atmosphere” and feel very scientific.
		DunaSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedLowlands_00 // Warm ground currents ripple through the view like invisible waves. The telescope produces a beautiful image of… turbulence.
		DunaSrfLandedCraters* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedCraters_00 // The crater walls block the worst of the wind, and the image steadies nicely. Unfortunately, you keep catching dust devils photobombing your star fields.
		DunaSrfLandedRareCraters* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedRareCraters_00 // You pick an unusually pristine bowl and run long exposures. The data comes back clean enough to make you suspicious of it.
		DunaSrfLandedVoronoiCraters* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedVoronoiCraters_00 // The fractured terrain gives you plenty of sheltered spots to set up. You end up mapping the ground by accident while trying to map the sky on purpose.
		DunaSrfLandedNotableCraters* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedNotableCraters_00 // You use a prominent rim as a landmark for alignment. It works great right up until you realize you’ve been aligning to the same rock for an hour.
		DunaSrfLandedExoticCraters* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedExoticCraters_00 // The strange shapes make the local horizon feel wrong, like the planet is leaning. Your star-tracker agrees, then immediately retracts its statement.
		DunaSrfLandedTrenches* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedTrenches_00 // Down in the trench the wind is quiet and the seeing is excellent. You briefly consider turning this into a permanent observatory, then remember how you got down here.
		DunaSrfLandedNotablePlains* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedNotablePlains_00 // Flat ground makes setup easy and the sky looks remarkably stable. The only problem is the dust that arrives precisely when your best target rises.
		DunaSrfLandedNotableMountains* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedNotableMountains_00 // High up, the air thins further and the stars sharpen. The mount shivers in the wind and you learn what “high-resolution” really costs.
		DunaSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedMountains_00 // Between peaks you find a pocket of calm and the telescope finally behaves. You collect pristine measurements until the temperature drop makes the focuser sulk.
		DunaSrfLandedVolcano* = #JNSQscience_sspxTelescopeObservation_DunaSrfLandedVolcano_00 // The ground trembles just enough to turn pinpoint stars into tiny commas. You record a groundbreaking discovery: unstable ground is, in fact, unstable.
		DunaFlyingHigh* = #JNSQscience_sspxTelescopeObservation_DunaFlyingHigh_00 // Above most of the dust, the sky goes dark and steady in a way you wish Kerbin could imitate. Then the craft bumps once and reminds you this is still “flying,” not “floating in space.”

        IkeSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_IkeSrfLandedPoles_00 // The stars are steady, and Duna hangs in the sky like a giant nightlight. Your “dark” exposures are not nearly as dark as promised.
		IkeSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_IkeSrfLandedMountains_00 // High ridges give a clean horizon and crisp tracking. The rocks, however, insist on being exactly where you need to put the tripod legs.
		IkeSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_IkeSrfLandedMidlands_00 // The sky is wonderfully calm, like the universe is holding its breath. Then Duna-rise arrives and your “background” becomes the main event.
		IkeSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_IkeSrfLandedLowlands_00 // A fine dust film finds its way onto everything, especially optics. You take one perfect image and immediately start cleaning to protect it.
		IkeSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_IkeSrfLandedHighlands_00 // Ike looks familiar enough to be comforting, and alien enough to be rude about it. You log excellent star positions and a lingering sense of déjà vu.

        EdnaSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLandedLowlands_00 // With no air to blur anything, the stars sit perfectly still. The hard part is convincing your hands to keep working in the cold.
		EdnaSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLandedMidlands_00 // The sky is so dark it feels like the telescope is looking into an endless storage closet. You label the session: “Deep, deeper, deepest.”
		EdnaSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLandedHighlands_00 // From up high, the horizon barely exists and the universe takes over. You catch yourself whispering, as if you might wake it.
		EdnaSrfLandedPolarIceCraters* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLandedPolarIceCraters_00 // The stars are crisp, but the bright ice keeps sneaking glare into your optics. You invent a new accessory: “anti-sparkle annoyance hood.”
		EdnaSrfLandedWhites* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLandedWhites_00 // The pale terrain reflects just enough light to ruin your night vision. The telescope doesn’t care; it keeps calmly counting distant points anyway.
        EdnaSrfLanded* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLanded_00 // With no air to shimmer, the telescope snaps to focus instantly. The sky is so sharp it feels like it could cut your visor.
        EdnaSrfLanded* = #JNSQscience_sspxTelescopeObservation_EdnaSrfLanded_01 // You track a distant star and watch it blink out behind Edna's limb, proof that even lonely worlds can make a grand entrance.
        EdnaInSpaceLow* = #JNSQscience_sspxTelescopeObservation_EdnaInSpaceLow_00 // At close range, Edna's bright patches wink in and out as the terrain rotates—like it's playing hide-and-seek with the stars it occludes.
        EdnaInSpaceLow* = #JNSQscience_sspxTelescopeObservation_EdnaInSpaceLow_01 // A grazing occultation turns a star into a stopwatch; Edna keeps surprisingly good time for a grumpy rock.
        EdnaInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_EdnaInSpaceHigh_00 // From high orbit, Edna looks properly round. Finally something in the asteroid belt that isn't pretending.
        EdnaInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_EdnaInSpaceHigh_01 // Wide-field survey catches Edna's shadow sweeping across the starfield. Mission Control calls it “a very polite eclipse.”

        DakSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_DakSrfLandedLowlands_00 // You set up the telescope and immediately drift an inch when you tighten a bolt. The sky is steady; you are hilariously not.
		DakSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_DakSrfLandedMidlands_00 // The mount keeps trying to “walk” as you nudge the focus. You get excellent data and a renewed respect for anchoring things to potatoes.
		DakSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_DakSrfLandedHighlands_00 // From the highest bumps on this tiny rock, the stars look impossibly sharp. You spend half the session chasing your own tripod across the surface.
        DakSrfLanded* = #JNSQscience_sspxTelescopeObservation_DakSrfLanded_00 // Edna dominates half the sky, making every deep-space exposure a two-body problem.
        DakSrfLanded* = #JNSQscience_sspxTelescopeObservation_DakSrfLanded_01 // The horizon is so close you can almost see yourself curve around it. You take long exposures anyway; nobody will believe the scale.
        DakInSpaceLow* = #JNSQscience_sspxTelescopeObservation_DakInSpaceLow_00 // Close-up imaging confirms Dak is, scientifically speaking, a potato. A very pointy potato.
        DakInSpaceLow* = #JNSQscience_sspxTelescopeObservation_DakInSpaceLow_01 // The albedo map looks like someone took a bite out of it. Engineers suggest classifying the missing part as “snack.”
        DakInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_DakInSpaceHigh_00 // From afar, Dak is a speck pirouetting around Edna. The telescope keeps losing it because it keeps trying to be a star.
        DakInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_DakInSpaceHigh_01 // You time its wobble against background galaxies; the results are filed under “siren's call: rotational dynamics.”

		DresSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_DresSrfLandedPoles_00 // The stars are perfect pinpoints in the airless dark. You take a long exposure and realize the loudest thing out here is your own checklist.
		DresSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_DresSrfLandedHighlands_00 // A clean horizon and dead-still sky make the telescope feel unfairly powerful. You keep looking for something to blame when the data comes back pristine.
		DresSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_DresSrfLandedMidlands_00 // The ground is dull, the sky is sharp, and everything is quiet enough to hear your thoughts echo. You log “excellent observing conditions; unsettling silence.”
		DresSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_DresSrfLandedLowlands_00 // Dust puffs up with every tiny movement and settles onto the optics like it owns the place. You discover a new routine: observe, wipe, pretend that counts as calibration.
		DresSrfLandedCanyon* = #JNSQscience_sspxTelescopeObservation_DresSrfLandedCanyon_00 // The canyon walls cut off stray glare and give you a narrow, perfect slice of sky. You feel like you’re peeking at the universe through a keyhole you installed yourself.

		JoolFlyingHigh* = #JNSQscience_sspxTelescopeObservation_JoolFlyingHigh_00 // Turbulence keeps smearing the star field, and the ever-present green glow won’t stay out of your frames. You log the session as “mostly sky, partly planet.”

        LaytheSrfLandedShores* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedShores_00 // The salty air softens every pinpoint into a glow. You conclude the stars are fine; it’s your atmosphere that’s showing off.
		LaytheSrfLandedShallows* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedShallows_00 // Heat rising off the shallows turns the view into a shimmering mess. You accidentally invent “wave-based adaptive optics.”
		LaytheSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedHighlands_00 // The air is thinner and steadier up here, and the sky behaves for once. You get crisp data until Jool photobombs the frame.
		LaytheSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedMountains_00 // You finally have stable seeing—right up until the wind starts testing your mount’s will to live. The stars remain unmoved; the telescope does not.
		LaytheSrfLandedIceCaps* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedIceCaps_00 // The sky is dark and clean, but frost keeps sneaking onto your optics. You log a new cycle: scrape, focus, observe, repeat.
		LaytheSrfLandedEnclosedFaults* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedEnclosedFaults_00 // The fissures shelter you from the wind, and the tracking is perfect. Unfortunately, the horizon is so jagged you keep “discovering” rocks.
		LaytheSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedLowlands_00 // Warm air currents crawl over the ground and smear your targets into little commas. You produce an excellent turbulence survey and a terrible star catalog.
		LaytheSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_LaytheSrfLandedMidlands_00 // Conditions are almost Kerbin-nice, minus the city lights. You find yourself missing lampposts until you remember why you came here.
		LaytheSrfSplashedShores* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedShores_00 // Sea spray coats the lens faster than you can wipe it. Every exposure becomes a study of “salt crystals at infinity.”
		LaytheSrfSplashedShallows* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedShallows_00 // The platform bobs gently and ruins everything gently. You confirm the universe is not wobbling—just your telescope.
		LaytheSrfSplashedInlandWater* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedInlandWater_00 // The air is damp, the optics are damp, and your notes are damp. The telescope records one clear conclusion: moisture always wins.
		LaytheSrfSplashedKrenwichSea* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedKrenwichSea_00 // The waves are calm enough to tempt long exposures. Then a gust arrives and your guiding graph turns into modern art.
		LaytheSrfSplashedArcticSea* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedArcticSea_00 // Cold air steadies the stars, but cold spray tries to freeze your mechanisms solid. You alternate between astronomy and emergency maintenance.
		LaytheSrfSplashedJoolwardSea* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedJoolwardSea_00 // Jool dominates the sky and blows out half your dynamic range. You take a “perfect” image of the glare and pretend that was the plan.
		LaytheSrfSplashedPolwardSea* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedPolwardSea_00 // The horizon stays dark for a long time, and the stars sharpen nicely. The sea disagrees with your tripod and begins negotiations.
		LaytheSrfSplashedEnclosedFaults* = #JNSQscience_sspxTelescopeObservation_LaytheSrfSplashedEnclosedFaults_00 // Sheltered water means smoother tracking, but the surrounding walls trap haze. You get a beautifully stable view of not much at all.
		LaytheFlyingHigh* = #JNSQscience_sspxTelescopeObservation_LaytheFlyingHigh_00 // Above most of the moisture, the sky snaps into crisp focus. For a brief moment, this feels like cheating—then turbulence reminds you it’s still flying.

		VallSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_VallSrfLandedPoles_00 // The sky is needle-sharp, but faint charged glitter crawls across your sensors. You get great data and a new respect for radiation shielding.
		VallSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_VallSrfLandedHighlands_00 // Jagged ridges make alignment tricky, but once the mount settles the stars freeze into perfect points. The tracker still insists it hears “static.”
		VallSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_VallSrfLandedMidlands_00 // Flat ice, black sky, and no atmosphere to argue with your optics. The only thing drifting is your confidence as the noise floor creeps up.
		VallSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_VallSrfLandedLowlands_00 // The horizon is smooth and the view is steady enough to count pinpricks all night. You realize you’ve started using “quiet” as a measurement unit.
		VallSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_VallSrfLandedMountains_00 // You wedge the tripod between hard blue outcrops and finally get stable tracking. The stars look pristine; your instruments look nervous.

		TyloSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_TyloSrfLandedPoles_00 // Long shadows and a dim sky make for excellent pointing references. The telescope behaves, until the thin air shifts and steals your focus a millimeter at a time.
		TyloSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_TyloSrfLandedMountains_00 // Up high the seeing improves, but the wind insists on testing every bolt. You capture crisp star images and a complete vibration spectrum.
		TyloSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_TyloSrfLandedHighlands_00 // The ground is solid and the sky is nearly perfect, with just a whisper of haze. You take exposures long enough to forget you’re holding your breath.
		TyloSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_TyloSrfLandedMidlands_00 // Great stability, great darkness, great temptation to overdo it. You run a deep survey and only later notice the guiding log looks like a heartbeat.
		TyloSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_TyloSrfLandedLowlands_00 // A faint atmospheric shimmer turns your finest targets into soft pearls. You declare it “data on local seeing” and pretend you’re not annoyed.
		TyloFlyingHigh* = #JNSQscience_sspxTelescopeObservation_TyloFlyingHigh_00 // Above most of the thin haze, the stars sharpen beautifully—until buffeting and instrument noise start arguing over who gets to ruin the exposure.

		BopSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_BopSrfLandedPoles_00 // The sky is perfect, but the horizon is so lumpy your alignment routine keeps getting offended. You end up star-aligning by pure stubbornness.
		BopSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_BopSrfLandedMountains_00 // You anchor the mount against jagged rock and discover “secure” is relative in low gravity. The telescope tracks flawlessly while you slowly drift around it.
		BopSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_BopSrfLandedLowlands_00 // Dark ground and darker sky make everything look like a calibration frame. You still manage to find a galaxy, then nearly float into the tripod.
		BopSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_BopSrfLandedMidlands_00 // The mount settles, the stars settle, and your notes settle into existential questions. You record a pristine image and an unsettling silence.
		BopSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_BopSrfLandedHighlands_00 // Higher terrain gives you a clean horizon and stable footing—briefly. One tiny adjustment later, the whole setup “hops” and you call it a controlled relocation.

		PolSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_PolSrfLandedPoles_00 // Fine dust clings to everything, including your patience. The stars are crisp, but your optics collect a new speckle pattern every minute.
		PolSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_PolSrfLandedLowlands_00 // The surface looks soft enough to swallow tripod feet, yet the sky is brutally clear. You get excellent observations between careful, slow repositioning.
		PolSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_PolSrfLandedMidlands_00 // Every small movement raises a faint dust puff that refuses to fall quickly. You log the universe, plus a growing catalog of “not-a-star” particles.
		PolSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_PolSrfLandedHighlands_00 // The view is magnificent, but the ground feels like it’s made of crumbs. You secure the mount, then spend the rest of the session not touching anything.
		PolSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_PolSrfLandedMountains_00 // Perched among strange ridges, you finally escape the worst dust drift. The data is clean enough to make you suspect the mountain is doing the observing.

        LindorFlyingHigh* = #JNSQscience_sspxTelescopeObservation_LindorFlyingHigh_00 // The calm, dim bands below make a soft backdrop for sharp starlight. You briefly forget you’re flying through an ice-giant’s weather system, then the instruments remind you.
		LindorInSpaceLow* = #JNSQscience_sspxTelescopeObservation_LindorInSpaceLow_00 // The telescope skims the top of Lindor's cloud deck; pale bands fold into each other like slow-moving taffy.
        LindorInSpaceLow* = #JNSQscience_sspxTelescopeObservation_LindorInSpaceLow_01 // A bright storm knot stares back for hours, then simply isn't there. You mark it as "noted, and rude."
        LindorInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_LindorInSpaceHigh_00 // From far out, Lindor is a calm blue coin. Up close you know it's all lies and weather.
        LindorInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_LindorInSpaceHigh_01 // Deep-space exposures catch a faint halo around Lindor. The team argues whether it's rings, haze, or wishful thinking.

		KrelSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_KrelSrfLandedLowlands_00 // Airless darkness gives perfect pinpoints, but the pale ground keeps sneaking light into your sensors. You log “ground-glow contamination” and pretend it’s normal.
		KrelSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_KrelSrfLandedMidlands_00 // The stars hold perfectly still. You keep waiting for turbulence that never comes, and start blaming any error on “operator wobble.”
		KrelSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_KrelSrfLandedHighlands_00 // Up on the higher terrain, the sky feels impossibly deep. You run a careful survey until the tripod shifts in the powdery surface by a fraction of a fraction.
		KrelSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_KrelSrfLandedPoles_00 // The night here is quiet enough to be unsettling. The telescope performs flawlessly while your notes become increasingly philosophical.
        KrelSrfLanded* = #JNSQscience_sspxTelescopeObservation_KrelSrfLanded_00 // The sky over Krel is brutally clear. Stars look pinned in place, as if someone forgot to turn on twinkling.
        KrelSrfLanded* = #JNSQscience_sspxTelescopeObservation_KrelSrfLanded_01 // You aim at Lindor and watch its bright limb crawl across the field of view. It feels like living inside a clock.
        KrelInSpaceLow* = #JNSQscience_sspxTelescopeObservation_KrelInSpaceLow_00 // Close-in imaging reveals pale ridges and dark "veins" threading the surface. Krel seems to have terrible circulation.
        KrelInSpaceLow* = #JNSQscience_sspxTelescopeObservation_KrelInSpaceLow_01 // You time an occultation of a background star and get a wobble in the curve - Krel may be lumpier than advertised.
        KrelInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_KrelInSpaceHigh_00 // From high orbit, Krel's shine is all geometry: bright edge, dark middle, and a suspiciously symmetrical scar.
        KrelInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_KrelInSpaceHigh_01 // Wide-field survey finds faint dust in Krel's path. Either it's shedding, or it's sweeping up someone else's mess.

		AdenSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_AdenSrfLandedLowlands_00 // The sky is razor-sharp, but the ground radiates cold into your equipment like it’s personal. Focus drift becomes your new hobby.
		AdenSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_AdenSrfLandedMidlands_00 // Perfect seeing, perfect tracking, perfectly nowhere to put your feet comfortably. You get excellent data and a sore suit.
		AdenSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_AdenSrfLandedHighlands_00 // The horizon is clean and the star field is crisp enough to count forever. You stop when you remember you only packed so many storage drives.
		AdenSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_AdenSrfLandedMountains_00 // Between jagged slopes you find a sheltered spot and the telescope finally relaxes. You record pristine points and vow never to bump the mount again.
		AdenSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_AdenSrfLandedPoles_00 // The darkness is absolute and the stars look close enough to poke. You do not poke them, but you do write it down.
        AdenSrfLanded* = #JNSQscience_sspxTelescopeObservation_AdenSrfLanded_00 // The telescope keeps drifting as Aden rotates; the ground itself feels like it's quietly disagreeing with roundness.
        AdenSrfLanded* = #JNSQscience_sspxTelescopeObservation_AdenSrfLanded_01 // You photograph Lindor's auroral glow above the horizon. It makes Aden's brown plain look almost cozy.
        AdenInSpaceLow* = #JNSQscience_sspxTelescopeObservation_AdenInSpaceLow_00 // High-magnification shots show mottled tones that don't match the lighting. Aden's surface refuses to be a simple rock.
        AdenInSpaceLow* = #JNSQscience_sspxTelescopeObservation_AdenInSpaceLow_01 // A specular glint flashes and vanishes. Mission Control asks if you saw ice, metal, or your own reflection.
        AdenInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_AdenInSpaceHigh_00 // From up high, Aden is a neat brown marble - until you stretch the contrast and find patches that look... too organized.
        AdenInSpaceHigh* = #JNSQscience_sspxTelescopeObservation_AdenInSpaceHigh_01 // Long exposures catch a faint lightcurve asymmetry. The old "different inside" rumor gets filed under "maybe".

		HuygenSrfLandedLowlands* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedLowlands_00 // The amber haze turns the night sky into a dim smear. You take a long exposure and discover a new constellation: “Noise.”
		HuygenSrfLandedMidlands* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedMidlands_00 // A faint clearing teases you with a handful of sharp stars. It closes again before you can finish saying “calibration.”
		HuygenSrfLandedHighlands* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedHighlands_00 // The air is still thick, but noticeably kinder up here. Your star tracker stops complaining and starts quietly judging you instead.
		HuygenSrfLandedMountains* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedMountains_00 // The sky is darker and the seeing steadier, but the cold makes the focus drift like it’s sleepy. You keep refocusing and pretending it’s scientific.
		HuygenSrfLandedPeaks* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedPeaks_00 // Above the worst of the soup, you finally get clean, pin-sharp points. The view is so good you forget to breathe—briefly.
		HuygenSrfLandedPolarLowlands* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedPolarLowlands_00 // The air settles into a slow, heavy calm and the stars hold still longer than expected. You’re suspicious of how cooperative it feels.
		HuygenSrfLandedPoles* = #JNSQscience_sspxTelescopeObservation_HuygenSrfLandedPoles_00 // The sky is dark, the haze is stubborn, and the optics keep fogging anyway. You record the first confirmed observation of “frost, but orange.”
