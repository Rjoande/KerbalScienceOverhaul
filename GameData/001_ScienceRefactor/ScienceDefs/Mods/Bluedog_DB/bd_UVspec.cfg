@EXPERIMENT_DEFINITION:HAS[#id[bd_UVspec]]
{
    @title = #ScienceRefactor_bd_UVspec_title // Ultraviolet and Atmospheric Analysis
	!RESULTS{}
    %RESULTS
	{
        default = #ScienceRefactor_bd_UVspec_default_00 // You collect ultraviolet spectrometry data.
	    InSpace* = #ScienceRefactor_bd_UVspec_default_01 // The UV instrument collects data, looking to complete an atmospheric and emission survey.

        SunInSpace* = #ScienceRefactor_bd_UVspec_SunInSpace_00 // Given the intense radiation, heat, and EM interference, the UV instrument barely manages to get some readings this close to the Sun. We are told we voided the warranty.
        SunInSpaceLow* = #ScienceRefactor_bd_UVspec_SunInSpaceLow_00 // UV measurements briefly go off the charts before the instrument enters safe-mode to prevent damage.
        SunInSpaceLow* = #ScienceRefactor_bd_UVspec_SunInSpaceLow_01 // Despite the incredibly high levels of UV radiation detected, Mission Control denies renaming it to "Ultra-Violent" Radiation.
        SunInSpaceHigh* = #ScienceRefactor_bd_UVspec_SunInSpaceHigh_00 // High UV radiation detected emanating from the Sun.
        SunInSpaceHigh* = #ScienceRefactor_bd_UVspec_SunInSpaceHigh_01 // You wonder if the engineers covered the spacecraft in enough sunscreen.
        SunInSpaceHigh* = #ScienceRefactor_bd_UVspec_SunInSpaceHigh_02 // The UV instruments takes images of the Sun's Corona.

        MohoInSpace* = #ScienceRefactor_bd_UVspec_MohoInSpace_00 // UV images are taken from around Moho.
        MohoInSpaceLow* = #ScienceRefactor_bd_UVspec_MohoInSpaceLow_00 // UV reflections suggest the presence of ice in deep craters near the poles.
        MohoInSpaceHigh* = #ScienceRefactor_bd_UVspec_MohoInSpaceHigh_00 // No atmosphere is detected around Moho.
        MohoInSpaceHigh* = #ScienceRefactor_bd_UVspec_MohoInSpaceHigh_01 // UV radiation is very prominent this close to Kerbol.

        EveInSpace* = #ScienceRefactor_bd_UVspec_EveInSpace_00 // The Spectrometer begins Eve's atmospheric survey.
        EveInSpaceLow* = #ScienceRefactor_bd_UVspec_EveInSpaceLow_00 // Dark, spooky, patches are detected in the UV spectrum above the poles.
        EveInSpaceLow* = #ScienceRefactor_bd_UVspec_EveInSpaceLow_01 // UV light is detected to be absorbed at certain points in the cloud layer more than others.
        EveInSpaceHigh* = #ScienceRefactor_bd_UVspec_EveInSpaceHigh_00 // Eve's Atmosphere is found to be very thick and reflective.
        EveInSpaceHigh* = #ScienceRefactor_bd_UVspec_EveInSpaceHigh_01 // Eve's atmosphere appears composed of mostly Carbon Dioxide and Iodine gas. It is inconclusive whether or not it is grape flavored.

		GillyInSpace* = #ScienceRefactor_bd_UVspec_GillyInSpace_00 // Gilly's UV reflections are measured.
		GillyInSpaceLow* = #ScienceRefactor_bd_UVspec_GillyInSpaceLow_00 // Gilly's surface appears to be a rocky composition.
		GillyInSpaceHigh* = #ScienceRefactor_bd_UVspec_GillyInSpaceHigh_00 // Not atmosphere is detected around the tiny moon.

        KerbinInSpaceLow* = #ScienceRefactor_bd_UVspec_KerbinInSpaceLow_00 // Kerbin's atmosphere absorbs a great amount of UV radiation.
        KerbinInSpaceLow* = #ScienceRefactor_bd_UVspec_KerbinInSpaceLow_01 // UV index is high. Mission Control cancels today's picnic.
        KerbinInSpaceHigh* = #ScienceRefactor_bd_UVspec_KerbinInSpaceHigh_00 // Kerbin's cloud layers are mapped in the UV wavelength, looking for weather patterns
        KerbinInSpaceHigh* = #ScienceRefactor_bd_UVspec_KerbinInSpaceHigh_01 // Kerbin's organics compounds absorb a great deal of UV radiation.

		MunInSpace* = #ScienceRefactor_bd_UVspec_MunInSpace_00 // The Mun's UV spectrum is recorded.
		MunInSpaceLow* = #ScienceRefactor_bd_UVspec_MunInSpaceLow_00 // Analysis of the location and distribution of water ice suggest that it was deposited by asteroid or comet impacts.
		MunInSpaceLow* = #ScienceRefactor_bd_UVspec_MunInSpaceLow_01 // Reflectivity levels inside deep craters match those known for water ice.
		MunInSpaceHigh* = #ScienceRefactor_bd_UVspec_MunInSpaceHigh_00 // Surface analysis of some craters reveal rays emanating from their centers, caused by plumes of material ejected after impact.

		MinmusInSpace* = #ScienceRefactor_bd_UVspec_MinmusInSpace_00 // UV spectrometry readings are recorded from Minmus.
		MinmusInSpace* = #ScienceRefactor_bd_UVspec_MinmusInSpace_01 // UV Surface analysis complete: Peppermint.
		MinmusInSpaceHigh* = #ScienceRefactor_bd_UVspec_MinmusInSpaceHigh_00 // The surface of Minmus reflects a lot of UV light, but less than expected.

        DunaInSpace* = #ScienceRefactor_bd_UVspec_DunaInSpace_00 // Ultraviolet images of Duna are taken by the spectrometer.
        DunaInSpace* = #ScienceRefactor_bd_UVspec_DunaInSpace_01 // Reflectivity and absorption analysis confirm the ice caps contain large amounts of frozen Carbon Dioxide.
        DunaInSpaceLow* = #ScienceRefactor_bd_UVspec_DunaInSpaceLow_00 // Small amounts of Water ice has been detected near the poles.
        DunaInSpaceLow* = #ScienceRefactor_bd_UVspec_DunaInSpaceLow_01 // Atmospheric data suggests a thin atmosphere composed of mostly Carbon Dioxide.
        DunaInSpaceLow* = #ScienceRefactor_bd_UVspec_DunaInSpaceLow_02 // Duna's auroras are detected in certain areas around the planet.
        DunaInSpaceHigh* = #ScienceRefactor_bd_UVspec_DunaInSpaceHigh_00 // Duna's atmosphere appears to be faintly evaporating behind the planet.

		IkeInSpace* = #ScienceRefactor_bd_UVspec_IkeInSpace_00 // Faint reflections around the poles could suggest the presence of ice.
		IkeInSpace* = #ScienceRefactor_bd_UVspec_IkeInSpace_01 // UV maps of Ike are generated.
		IkeInSpaceLow* = #ScienceRefactor_bd_UVspec_IkeInSpaceLow_00 // Ike's surface is not very reflective composed of very rocky material.
		IkeInSpaceHigh* = #ScienceRefactor_bd_UVspec_IkeInSpaceHigh_00 // The UV instrument's atmospheric tools do not detect any around Ike.

        DresInSpace* = #ScienceRefactor_bd_UVspec_DresInSpace_00 // UV readings are taken from around Dres
        DresInSpace* = #ScienceRefactor_bd_UVspec_DresInSpace_01 // Reflectivity analysis shows the possible presence of ice on its surface.
        DresInSpaceLow* = #ScienceRefactor_bd_UVspec_DresInSpaceLow_00 // Surface scattering analysis reveals a very prominent canyon on the surface.
        DresInSpaceHigh* = #ScienceRefactor_bd_UVspec_DresInSpaceHigh_00 // UV imaging sweeps confirm the lack of atmosphere around Dres
        DresInSpaceHigh* = #ScienceRefactor_bd_UVspec_DresInSpaceHigh_01 // Other reflective objects are detected in the vicinity of Dres. Mission control begins debating whether or not to raise the DEFCON level.

        JoolInSpace* = #ScienceRefactor_bd_UVspec_JoolInSpace_00 // A great deal of images are taken to map Jool's UV emissions.
        JoolInSpace* = #ScienceRefactor_bd_UVspec_JoolInSpace_01 // Jool's auroras are easily seen in the Ultraviolet wavelength.
        JoolInSpaceLow* = #ScienceRefactor_bd_UVspec_JoolInSpaceLow_00 // Atmospheric analysis reveals water steam present in thunderclouds at the lower layer.
        JoolInSpaceLow* = #ScienceRefactor_bd_UVspec_JoolInSpaceLow_01 // Atmospheric compositional analysis discover Hydrogen and Helium in the atmosphere.

		LaytheInSpace* = #ScienceRefactor_bd_UVspec_LaytheInSpace_00 // The instrument snaps UV photos of Laythe
		LaytheInSpaceLow* = #ScienceRefactor_bd_UVspec_LaytheInSpaceLow_00 // Atmosphere: Check, Exotic Islands: Check, "Sick waves, dude": Check, KSC-funded Vacation: Denied.
		LaytheInSpaceLow* = #ScienceRefactor_bd_UVspec_LaytheInSpaceLow_01 // UV images show large bodies of liquid water and faint, distant archipelagos.
		LaytheInSpaceHigh* = #ScienceRefactor_bd_UVspec_LaytheInSpaceHigh_00 // UV spectroscopy research verifies the presence of water and a healthy atmosphere with favorable conditions for flight.
		LaytheInSpaceHigh* = #ScienceRefactor_bd_UVspec_LaytheInSpaceHigh_01 // Reflectivity analysis confirms an atmosphere and large quantities of water.

		VallInSpace* = #ScienceRefactor_bd_UVspec_VallInSpace_00 // Fresh UV images from Vall are ready for analysis.
		VallInSpaceLow* = #ScienceRefactor_bd_UVspec_VallInSpaceLow_00 // Vall has a very icy surface, likely containing phyllosilicates.
		VallInSpaceLow* = #ScienceRefactor_bd_UVspec_VallInSpaceLow_01 // The instrument detects a faint water vapor plume, or it could be a small cryovolcano.
		VallInSpaceHigh* = #ScienceRefactor_bd_UVspec_VallInSpaceHigh_00 // No atmosphere is detected around Vall.

		TyloInSpace* = #ScienceRefactor_bd_UVspec_TyloInSpace_00 // No atmosphere is detected around Tylo.
		TyloInSpaceLow* = #ScienceRefactor_bd_UVspec_TyloInSpaceLow_00 // Ice pockets detected in craters. These are likely deposited by impacts with comets and asteroids deflected by Jool's gravity.
		TyloInSpaceHigh* = #ScienceRefactor_bd_UVspec_TyloInSpaceHigh_00 // Patches of highly reflective material could very well be ice deposits.
		TyloInSpaceHigh* = #ScienceRefactor_bd_UVspec_TyloInSpaceHigh_01 // Close examination confirm the lack of atmosphere around Tylo.

		BopInSpace* = #ScienceRefactor_bd_UVspec_BopInSpace_00 // Bop reads negative for an atmosphere.
		BopInSpaceLow* = #ScienceRefactor_bd_UVspec_BopInSpaceLow_00 // Surface imagery suggest a rocky and possibly metallic composition, similar to asteroids.
		BopInSpaceHigh* = #ScienceRefactor_bd_UVspec_BopInSpaceHigh_00 // The probe telemetry reads "I'm afraid I can't do that".

		PolInSpace* = #ScienceRefactor_bd_UVspec_PolInSpace_00 // Further UV analysis and still not a trace of atmosphere to be found.
		PolInSpaceLow* = #ScienceRefactor_bd_UVspec_PolInSpaceLow_00 // UV imagery received. From Pol, with LUV.
		PolInSpaceHigh* = #ScienceRefactor_bd_UVspec_PolInSpaceHigh_00 // There appears to be very little ice on the surface.
		PolInSpaceHigh* = #ScienceRefactor_bd_UVspec_PolInSpaceHigh_01 // No atmosphere detected. Processing surface imagery.

        EelooInSpace* = #ScienceRefactor_bd_UVspec_EelooInSpace_00 // UV reading from Eeloo: COMPLETE.
        EelooInSpaceLow* = #ScienceRefactor_bd_UVspec_EelooInSpaceLow_00 // UV levels recorded. Mission Control gives the OK to forgo the sunscreen.
        EelooInSpaceLow* = #ScienceRefactor_bd_UVspec_EelooInSpaceLow_01 // There is definitely a lot of ice on the surface, possibly Methane.
        EelooInSpaceHigh* = #ScienceRefactor_bd_UVspec_EelooInSpaceHigh_00 // They should have sent a poet.

        SarnusInSpace* = #ScienceRefactor_bd_UVspec_SarnusInSpace_00 // UV spectra images captured from Sarnus.
        SarnusInSpaceLow* = #ScienceRefactor_bd_UVspec_SarnusInSpaceLow_00 // Atmospheric image analysis hint at a top cloud layer composed of ammonia ice.
        SarnusInSpaceLow* = #ScienceRefactor_bd_UVspec_SarnusInSpaceLow_01 // Clouds appear to form at different altitudes and have different elemental compositions.
        SarnusInSpaceHigh* = #ScienceRefactor_bd_UVspec_SarnusInSpaceHigh_00 // Images confirm the rings to be composed primarily of ice particles of varying sizes.
        SarnusInSpaceHigh* = #ScienceRefactor_bd_UVspec_SarnusInSpaceHigh_01 // The outer rings' particles appear to have more ice exposed than inner ring particles.

		TektoInSpaceHigh* = #ScienceRefactor_bd_UVspec_TektoInSpaceHigh_00 // Analysis of light scattering on the upper atmosphere is indicating a composition of mostly Nitrogen.
		TektoInSpaceLow* = #ScienceRefactor_bd_UVspec_TektoInSpaceLow_00 // Tekto's atmosphere is found to be a very dense mix of Nitrogen with other organic compounds.
		TektoInSpaceLow* = #ScienceRefactor_bd_UVspec_TektoInSpaceLow_01 // Organics compounds are detected on the atmosphere. The presence of Chlorine could explain its green hue.
		TektoInSpaceHigh* = #ScienceRefactor_bd_UVspec_TektoInSpaceHigh_00 // Some clouds imaged through the haze are found to be much higher in altitude than the rest and suggests that they have a different chemical composition.
		TektoInSpaceHigh* = #ScienceRefactor_bd_UVspec_TektoInSpaceHigh_01 // Closer analysis shows a very dense atmosphere. Much of its upper layer interacts with UV light from Kerbol.

		SlateInSpace* = #ScienceRefactor_bd_UVspec_SlateInSpace_00 // UV spectrometry readings are recorded from Slate.
		SlateInSpaceHigh* = #ScienceRefactor_bd_UVspec_SlateInSpaceHigh_00 // UV images are taken from around Slate.
		SlateInSpaceLow* = #ScienceRefactor_bd_UVspec_SlateInSpaceLow_00 // The principal investigator is frustrated that the lack of atmosphere will make for a boring report.
		SlateInSpaceLow* = #ScienceRefactor_bd_UVspec_SlateInSpaceLow_01 // The surface albedo affirms a rocky composition with little to no icy materials.

		HaleInSpace* = #ScienceRefactor_bd_UVspec_HaleInSpace_00 // Reflectivity analysis show a lot ice on the surface.
		HaleInSpaceHigh* = #ScienceRefactor_bd_UVspec_HaleInSpaceHigh_00 // There is definitely a lot of ice on the surface, likely the same as the rings.
		HaleInSpaceLow* = #ScienceRefactor_bd_UVspec_HaleInSpaceLow_00 // Dark, spooky, patches are detected breaking up the otherwise icy surface.

		OvokInSpaceHigh* = #ScienceRefactor_bd_UVspec_OvokInSpaceHigh_00 // No atmosphere detected. Processing surface imagery.
		OvokInSpaceHigh* = #ScienceRefactor_bd_UVspec_OvokInSpaceHigh_01 // Highly reflective material detected all over the moon's surface.
		OvokInSpaceLow* = #ScienceRefactor_bd_UVspec_OvokInSpaceLow_00 // The UV spectrometer shows no significant difference across Ovok's different features.
		OvokInSpaceLow* = #ScienceRefactor_bd_UVspec_OvokInSpaceLow_01 // UV images cannot differentiate the biomes, if it has any...

        UrlumInSpace* = #ScienceRefactor_bd_UVspec_UrlumInSpace_00 // Fresh UV images from Urlum are ready for analysis!
        UrlumInSpaceLow* = #ScienceRefactor_bd_UVspec_UrlumInSpaceLow_00 // UV spectra show the presence of ammonia ice crystals in the cloud layers.
        UrlumInSpaceLow* = #ScienceRefactor_bd_UVspec_UrlumInSpaceLow_01 // The spectrometer detects varying cloud composition.
        UrlumInSpaceHigh* = #ScienceRefactor_bd_UVspec_UrlumInSpaceHigh_00 // Some cloud compositional data is detected in UV wavelength, but there is little differentiation between the planet's bands.
        UrlumInSpaceHigh* = #ScienceRefactor_bd_UVspec_UrlumInSpaceHigh_01 // The planets bands begin to show some difference only after extensive tweaking of the spectrometer's settings.

		WalInSpaceHigh* = #ScienceRefactor_bd_UVspec_WalInSpaceHigh_00 // Wal appears as a mostly rocky body, although there are some signs of minerals or metals.
		WalInSpaceHigh* = #ScienceRefactor_bd_UVspec_WalInSpaceHigh_01 // Reflectivity analysis shows the possible presence of tiny pockets of ice on Wal's surface.
		WalInSpaceLow* = #ScienceRefactor_bd_UVspec_WalInSpaceLow_00 // There are signs of some chemical diversity on the surface.
		WalInSpaceLow* = #ScienceRefactor_bd_UVspec_WalInSpaceLow_01 // The moon appears to have little ice covering the surface, which is rather unexpected given its distance from Kerbol.

        TalInSpace* = #ScienceRefactor_bd_UVspec_TalInSpace_00 // Ultraviolet images of Tal are taken by the spectrometer.
        TalInSpace* = #ScienceRefactor_bd_UVspec_TalInSpace_01 // The UV spectrometer shows a lot of ice on the surface.
        TalInSpace* = #ScienceRefactor_bd_UVspec_TalInSpace_02 // A very high surface albedo confirms an icy and smooth surface.

		PriaxInSpaceHigh* = #ScienceRefactor_bd_UVspec_PriaxInSpaceHigh_00 // Images show a relatively dark asteroid-like moon
		PriaxInSpaceLow* = #ScienceRefactor_bd_UVspec_PriaxInSpaceLow_00 // Priax looks like a rocky rarity in the outer solar system where many icy bodies are found
		PriaxInSpace* = #ScienceRefactor_bd_UVspec_PriaxInSpace_00 // Priax does have significant UV emissions or reflections. Just a boring rock

		PoltaInSpaceHigh* = #ScienceRefactor_bd_UVspec_PoltaInSpaceHigh_00 // The spectrometer is picking up the high albedo measurements that always come with a very icy surface.
		PoltaInSpaceHigh* = #ScienceRefactor_bd_UVspec_PoltaInSpaceHigh_01 // Some water vapor material is detected above the horizon which could have been ejected by either a cryo-volcano or a geiser.
		PoltaInSpaceLow* = #ScienceRefactor_bd_UVspec_PoltaInSpaceLow_00 // The instrument detects a UV signature that could indicate the presence of both chlorine and silicates on the surface.
		PoltaInSpaceLow* = #ScienceRefactor_bd_UVspec_PoltaInSpaceLow_01 // Polta sure has a lot of ice.

        NeidonInSpace* = #ScienceRefactor_bd_UVspec_NeidonInSpace_00 // Some of the bands glow in ultraviolet light, giving some hints as to their chemical make up.
        NeidonInSpaceHigh* = #ScienceRefactor_bd_UVspec_NeidonInSpaceHigh_00 // UV images show Methane to be more prevalent at higher altitudes on the southern hemisphere.
        NeidonInSpaceHigh* = #ScienceRefactor_bd_UVspec_NeidonInSpaceHigh_01 // Neidon's bands just below each pole look to give off more UV light.
        NeidonInSpaceLow* = #ScienceRefactor_bd_UVspec_NeidonInSpaceLow_00 // Close-up UV emission measurements are used to make enhanced color images of Neidon.

		ThatmoInSpaceHigh* = #ScienceRefactor_bd_UVspec_ThatmoInSpaceHigh_00 // Thatmo's atmosphere is found to be very tenuous and fainter than even that of Duna.
		ThatmoInSpaceHigh* = #ScienceRefactor_bd_UVspec_ThatmoInSpaceHigh_01 // The instrument detects a composition of mostly Nitrogen.
		ThatmoInSpaceLow* = #ScienceRefactor_bd_UVspec_ThatmoInSpaceLow_00 // UV analysis up close is less effective in the very bright and reflective Nitrogen ice surface.
		ThatmoInSpaceLow* = #ScienceRefactor_bd_UVspec_ThatmoInSpaceLow_01 // Thatmo continues to dazzle with its bright ice and active geology. Spectra from methane is also detected near cryo-volcanic vents.

        MercuryInSpace* = #ScienceRefactor_bd_UVspec_MercuryInSpace_00 // UV images are taken from around Mercury.
        MercuryInSpaceLow* = #ScienceRefactor_bd_UVspec_MercuryInSpaceLow_00 // UV reflections suggest the presence of ice in deep craters near the poles.
        MercuryInSpaceLow* = #ScienceRefactor_bd_UVspec_MercuryInSpaceLow_01 // The UV radiation is very intense. Hope you brought sun screen!
        MercuryInSpaceHigh* = #ScienceRefactor_bd_UVspec_MercuryInSpaceHigh_00 // No atmosphere is detected around Mercury.
        MercuryInSpaceHigh* = #ScienceRefactor_bd_UVspec_MercuryInSpaceHigh_01 // UV radiation is very prominent this close to the Sun. 
        
        VenusInSpace* = #ScienceRefactor_bd_UVspec_VenusInSpace_00 // The spectrometer begins Venus' atmospheric survey.
        VenusInSpaceLow* = #ScienceRefactor_bd_UVspec_VenusInSpaceLow_00 // Dark, spooky, patches are detected in the UV spectrum above the poles.
        VenusInSpaceLow* = #ScienceRefactor_bd_UVspec_VenusInSpaceLow_01 // UV light is detected to be absorbed at certain points in the cloud layer more than others.
        VenusInSpaceHigh* = #ScienceRefactor_bd_UVspec_VenusInSpaceHigh_00 // Venus' Atmosphere is found to be very thick and reflective.
        VenusInSpaceHigh* = #ScienceRefactor_bd_UVspec_VenusInSpaceHigh_01 // Venus' atmosphere appears composed of mostly carbon dioxide and nitrogen gas.

        EarthInSpace* = #ScienceRefactor_bd_UVspec_EarthInSpace_00 // Earth's UV spectrum is recorded.
        EarthInSpaceLow* = #ScienceRefactor_bd_UVspec_EarthInSpaceLow_00 // Earth's atmosphere absorbs a great amount of UV radiation.
        EarthInSpaceLow* = #ScienceRefactor_bd_UVspec_EarthInSpaceLow_01 // UV index is high. Mission Control cancels today's picnic.
        EarthInSpaceHigh* = #ScienceRefactor_bd_UVspec_EarthInSpaceHigh_00 // Earth's cloud layers are mapped in the UV wavelength, looking for weather patterns.
        EarthInSpaceHigh* = #ScienceRefactor_bd_UVspec_EarthInSpaceHigh_01 // Earth's organics compounds absorb a great deal of UV radiation.

		MoonInSpace* = #ScienceRefactor_bd_UVspec_MoonInSpace_00 // The Moon's UV spectrum is recorded.
		MoonInSpaceLow* = #ScienceRefactor_bd_UVspec_MoonInSpaceLow_00 // Analysis of the location and distribution of water ice suggest that it was deposited by asteroid or comet impacts.
		MoonInSpaceLow* = #ScienceRefactor_bd_UVspec_MoonInSpaceLow_01 // Reflectivity levels inside deep craters match those known for water ice.
		MoonInSpaceHigh* = #ScienceRefactor_bd_UVspec_MoonInSpaceHigh_00 // Surface analysis of some craters reveal rays emanating from their centers, caused by plumes of material ejected after impact.

        MarsInSpace* = #ScienceRefactor_bd_UVspec_MarsInSpace_00 // Ultraviolet images of Mars are taken by the spectrometer.
