        #CSS_evaReport_EveSrfLandedPoles_00 = Why can't the R&D eggheads invent a suit with movement-assisting servomotors already?
        #CSS_evaReport_EveSrfLandedPoles_01 = Poles, schmoles, this the planetary oven all right.
        #CSS_evaReport_EveSrfLandedMidlands_00 = You should have done more exercise back on Kerbin.
        #CSS_evaReport_EveSrfLandedMidlands_01 = "Welcome to hell, weather's great here. Pull up a chair, have a cold beer....."
        #CSS_evaReport_EveSrfLandedExplodiumSea_00 = You decide to take a short walk, but think better of it after the first few steps.
        #CSS_evaReport_EveSrfLandedLowlands_00 = You wonder what jerk put lead weights in your suit.
        #CSS_evaReport_EveSrfLandedLowlands_01 = The toss of a pebble suggests that the atmosphere is REALLY, REALLY thick.
        #CSS_evaReport_EveSrfLandedHighlands_00 = You feel like you may have put on some weight.
        #CSS_evaReport_EveSrfLandedHighlands_01 = "Should I take the left foot or the right foot?" The decision weighs heavy on your shoulders - literally.
        #CSS_evaReport_EveSrfLandedPeaks_00 = "Help! I've fallen and I can't get up!"
        #CSS_evaReport_EveSrfLandedPeaks_01 = The steep, gravelly ground makes walking up the slope torturously slow as you slide back constantly.
        #CSS_evaReport_EveSrfLandedImpactEjecta_00 = The extreme pressure is making it hard to move. Thankfully, you can still wiggle your toes.
        #CSS_evaReport_EveSrfLandedImpactEjecta_01 = You step on a loose stone and fall hard on your face. That hurts here!
        #CSS_evaReport_EveSrfLandedCraterLake_00 = That water nearby would be looking quite inviting were it not for the fact that it is almost certainly not water or healthy for you.
        #CSS_evaReport_EveSrfLandedWesternSea_00 = Everything about this place makes you want to get back into the capsule and lie down.
        #CSS_evaReport_EveSrfLandedOlympus_00 = If I have seen further, it is by standing on the shoulders of giants! Or gods.
        #CSS_evaReport_EveSrfLandedOlympus_01 = *Huff* Must.... *huff* reach.... *huff* top.... *huff*
        #CSS_evaReport_EveSrfLandedEasternSea_00 = The liquid in the seas has contaminated the soil around here. You know this because your boot has been bleached of colour.
        #CSS_evaReport_EveSrfLandedFoothills_00 = This planet was certainly not made with kerbals in mind, and vice versa.
