        #JNSQscience_gravityScan_EveInSpaceLowSeaofTaniwha_00 = La scansione mostra hotspot erranti sopra il mare di Taniwha, come se la massa fosse distribuita in modo irregolare sotto le onde.
        #JNSQscience_gravityScan_EveInSpaceLowSeaofTaniwha_01 = Registri un'oscillazione ripetuta nel campo che segue il bacino, come una struttura sepolta che corre sotto il mare.
