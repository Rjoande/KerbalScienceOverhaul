        #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedTemperateMidlands_00 = The thermal map looks mottled and impatient. Radiation warnings pop up, as if to hurry you along.
        #GEPscience_tantares_infrared_light_camera_SucellusSrfLandedHighlands_00 = Highlands radiate straight into space; your lander becomes the warmest landmark for kilometers. Subtle, it is not.
