        MarsInSpaceLow* = #ScienceRefactor_bd_UVspec_MarsInSpaceLow_00 // Small amounts of water ice has been detected near the poles.
        MarsInSpaceLow* = #ScienceRefactor_bd_UVspec_MarsInSpaceLow_01 // Atmospheric data suggests a thin atmosphere composed of mostly carbon dioxide.
        MarsInSpaceLow* = #ScienceRefactor_bd_UVspec_MarsInSpaceLow_02 // Mars' aurorae are detected in certain areas around the planet.
        MarsInSpaceHigh* = #ScienceRefactor_bd_UVspec_MarsInSpaceHigh_00 // Mars' atmosphere appears to be faintly evaporating behind the planet.
	
		PhobosInSpace* = #ScienceRefactor_bd_UVspec_PhobosInSpace_00 // UV measurements of Phobos are taken.
		
		DeimosInSpace* = #ScienceRefactor_bd_UVspec_DeimosInSpace_00 // UV measurements of Deimos are taken.
		
        CeresInSpace* = #ScienceRefactor_bd_UVspec_CeresInSpace_00 // UV measurements of Ceres are taken.
        
        VestaInSpace* = #ScienceRefactor_bd_UVspec_VestaInSpace_00 // UV measurements of Vesta are taken.
        
        JupiterInSpace* = #ScienceRefactor_bd_UVspec_JupiterInSpace_00 // A great deal of images are taken to map Jupiter's UV emissions.
        JupiterInSpace* = #ScienceRefactor_bd_UVspec_JupiterInSpace_01 // Jupiter's auroras are easily seen in the ultraviolet wavelength.
        JupiterInSpaceHigh* = #ScienceRefactor_bd_UVspec_JupiterInSpaceHigh_00 // In our false-color images generated from Jupiter's UV emissions, the bright pink and blue make Jupiter look like cotton candy.
        JupiterInSpaceLow* = #ScienceRefactor_bd_UVspec_JupiterInSpaceLow_00 // Atmospheric analysis reveals water steam present in thunderclouds at the lower layer.
        JupiterInSpaceLow* = #ScienceRefactor_bd_UVspec_JupiterInSpaceLow_01 // Atmospheric compositional analysis discover hydrogen and helium in the atmosphere.
	
		IoInSpace* = #ScienceRefactor_bd_UVspec_IoInSpace_00 // UV measurements of Io are taken.
		IoInSpaceHigh* = #ScienceRefactor_bd_UVspec_IoInSpaceHigh_00 // Interestingly, areas that appear bright in visible light are dark in UV light. The best explanation for this is that large swaths of area on Io are covered in sulfur dioxide frost.
		IoInSpaceLow* = #ScienceRefactor_bd_UVspec_IoInSpaceLow_00 // Ultraviolet data reveals that Io has faint aurorae! Auroral data indicates that Io's electron flow is strongly rotated and shielded around Io.
		
		EuropaInSpace* = #ScienceRefactor_bd_UVspec_EuropaInSpace_00 // UV measurements of Europa are taken.
		EuropaInSpaceLow* = #ScienceRefactor_bd_UVspec_EuropaInSpaceLow_00 // The composition of Europa's geysers and plumes are analyzed in the ultraviolet spectrum.
		EuropaInSpaceHigh* = #ScienceRefactor_bd_UVspec_EuropaInSpaceHigh_00 // The UV instrument is used to analyze the composition of Europa's thin exosphere. Interestingly, Europa's exosphere appears to be solely made up of oxygen.
		
		GanymedeInSpace* = #ScienceRefactor_bd_UVspec_GanymedeInSpace_00 // UV measurements of Ganymede are taken.
		
		CallistoInSpace* = #ScienceRefactor_bd_UVspec_CallistoInSpace_00 // UV measurements of Callisto are taken.
	
        SaturnInSpace* = #ScienceRefactor_bd_UVspec_SaturnInSpace_00 // UV spectra images captured from Saturn.
        SaturnInSpaceLow* = #ScienceRefactor_bd_UVspec_SaturnInSpaceLow_00 // Atmospheric image analysis hint at a top cloud layer composed of ammonia ice.
        SaturnInSpaceLow* = #ScienceRefactor_bd_UVspec_SaturnInSpaceLow_01 // Clouds appear to form at different altitudes and have different elemental compositions.
        SaturnInSpaceHigh* = #ScienceRefactor_bd_UVspec_SaturnInSpaceHigh_00 // Images confirm the rings to be composed primarily of ice particles of varying sizes.
        SaturnInSpaceHigh* = #ScienceRefactor_bd_UVspec_SaturnInSpaceHigh_01 // The outer rings' particles appear to have more ice exposed than inner ring particles.
	
		TitanInSpaceHigh* = #ScienceRefactor_bd_UVspec_TitanInSpaceHigh_00 // Analysis of light scattering on the upper atmosphere is indicating a composition of mostly nitrogen and methane.
		TitanInSpaceLow* = #ScienceRefactor_bd_UVspec_TitanInSpaceLow_00 // Titan's atmosphere is found to be a very dense mix of Nitrogen with other organic compounds.
		TitanInSpaceLow* = #ScienceRefactor_bd_UVspec_TitanInSpaceLow_01 // Organics compounds are detected on the atmosphere. The presence of methane could explain its orange-brown hue.
		TitanInSpaceHigh* = #ScienceRefactor_bd_UVspec_TitanInSpaceHigh_00 // Some clouds imaged through the haze are found to be much higher in altitude than the rest and suggests that they have a different chemical composition.
		TitanInSpaceHigh* = #ScienceRefactor_bd_UVspec_TitanInSpaceHigh_01 // Closer analysis shows a very dense atmosphere. Much of its upper layer interacts with UV light from the Sun.
		
		EnceladusInSpace* = #ScienceRefactor_bd_UVspec_EnceladusInSpace_00 // UV measurements of Enceladus are taken.
		
        UranusInSpace* = #ScienceRefactor_bd_UVspec_UranusInSpace_00 // Fresh UV images from Uranus are ready for analysis!
        UranusInSpaceLow* = #ScienceRefactor_bd_UVspec_UranusInSpaceLow_00 // UV spectra show the presence of ammonia ice crystals in the cloud layers.
        UranusInSpaceLow* = #ScienceRefactor_bd_UVspec_UranusInSpaceLow_01 // The spectrometer detects varying cloud composition.
        UranusInSpaceHigh* = #ScienceRefactor_bd_UVspec_UranusInSpaceHigh_00 // Some cloud compositional data is detected in UV wavelength, but there is little differentiation between the planet's bands.
        UranusInSpaceHigh* = #ScienceRefactor_bd_UVspec_UranusInSpaceHigh_01 // The planets bands begin to show some difference only after extensive tweaking of the spectrometer's settings.
        
        NeptuneInSpace* = #ScienceRefactor_bd_UVspec_NeptuneInSpace_00 // Some of the bands glow in ultraviolet light, giving some hints as to their chemical make up.
