        #JNSQscience_bd_multiSpec_AdenInSpaceLowMidlands_00 = Le Midlands tornano come chiazze di materiali misti, come se più superfici fossero state frullate senza permesso. I falsi colori lo fanno sembrare commestibile, cosa poco utile.
