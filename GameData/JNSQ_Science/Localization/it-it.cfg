        #JNSQscience_bd_multiSpec_NaraInSpaceLowMountains_00 = Ombre nette e brutali gradienti termici delineano creste ripide attraverso la foschia. Lo spettro accenna a materiale più duro che affiora da un velo sottile e mutevole.
        #JNSQscience_bd_multiSpec_NaraInSpaceLowPolarLowlands_00 = Le pianure polari mostrano chiazze luminose persistenti che non si comportano come nubi in movimento. Lassù qualcosa si sta accumulando e si rifiuta di migrare.
        #JNSQscience_bd_multiSpec_NaraInSpaceLowPoles_00 = L'ultravioletto cattura una debole corona mentre l'infrarosso mappa profonde sacche di gelo. La firma polare sembra meteo e magnetismo che litigano in pubblico.
        #JNSQscience_bd_multiSpec_NaraInSpaceLowPolarHighlands_00 = Le quote polari mostrano caratteristiche di assorbimento più nitide delle distese circostanti. I dati sembrano materiale più pulito e più freddo con meno sfocatura atmosferica.
        #JNSQscience_bd_multiSpec_AmosInSpaceHigh_00 = Amos ruota come un puntino color carbone con uno spettro per lo più "scuro e vecchio". Alcune chiazze luminose continuano a rovinare il riassunto ordinato.
