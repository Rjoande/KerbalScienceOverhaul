@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    %RESULTS
    {
        SunFlyingLowNorthPolarZone* = #JNSQscience_evaReport_SunFlyingLowNorthPolarZone_00 // You drift through pale polar streamers. Your suit’s warning lights look like they’re trying to form a sentence.
        SunFlyingLowNorthSubpolarZone* = #JNSQscience_evaReport_SunFlyingLowNorthSubpolarZone_00 // A hail of charged particles rattles your helmet. You log the sensation as “crispy.”
        SunFlyingLowNorthTemperateZone* = #JNSQscience_evaReport_SunFlyingLowNorthTemperateZone_00 // The glare is absolute and the turbulence is worse. You decide blinking is optional from now on.
        SunFlyingLowNorthTropicZone* = #JNSQscience_evaReport_SunFlyingLowNorthTropicZone_00 // The plasma twists into bright curls below you. You try to sound calm while your suit quietly disagrees.
        SunFlyingLowEquatorialZone* = #JNSQscience_evaReport_SunFlyingLowEquatorialZone_00 // Everything is brighter than it should be and hotter than it has any right to be. Your jetpack feels like a bad joke.
        SunFlyingLowSouthTropicZone* = #JNSQscience_evaReport_SunFlyingLowSouthTropicZone_00 // The “air” here shoves you around like it has opinions. You record a very scientific squeak.
        SunFlyingLowSouthTemperateZone* = #JNSQscience_evaReport_SunFlyingLowSouthTemperateZone_00 // For a moment it seems almost smooth—then the ship’s shadow vanishes and you remember why you’re here.
        SunFlyingLowSouthSubpolarZone* = #JNSQscience_evaReport_SunFlyingLowSouthSubpolarZone_00 // The suit’s radiation counter gives up and just screams. You consider filing a complaint with the nearest magnetic field.
        SunFlyingLowSouthPolarZone* = #JNSQscience_evaReport_SunFlyingLowSouthPolarZone_00 // Polar flows whip past in harsh lines. Your EVA report is mostly a list of things you miss about vacuum.
        SunFlyingHigh* = #JNSQscience_evaReport_SunFlyingHigh_00 // The suit alarms settle into a steady rhythm, like a very angry metronome. You record that the Sun remains enthusiastically hot.
        SunFlyingHigh* = #JNSQscience_evaReport_SunFlyingHigh_01 // Light pours in from every angle and your visor darkens to “almost comfortable.” You decide that’s enough EVA report for one lifetime.

        MohoInSpaceLowCraters* = #JNSQscience_evaReport_MohoInSpaceLowCraters_00 // Your tether creaks as you drift. The ground below is nothing but impacts and glare.
        MohoSrfLandedExoticCraters* = #JNSQscience_evaReport_MohoSrfLandedExoticCraters_00 // This crater’s ejecta is lopsided, like it bounced. You take notes and a step back.
        MohoSrfLandedExoticCraters* = #JNSQscience_evaReport_MohoSrfLandedExoticCraters_01 // The rim twists in angles that don’t match the others. It’s unsettlingly geometric.
        MohoInSpaceLowExoticCraters* = #JNSQscience_evaReport_MohoInSpaceLowExoticCraters_00 // Some rims look stretched, like the ground flowed after impact. The pattern makes your stomach flip.
        MohoInSpaceLowExoticCraters* = #JNSQscience_evaReport_MohoInSpaceLowExoticCraters_01 // The ejecta halos don’t look symmetric from here. Something about them is… off.
        MohoSrfLandedRareCraters* = #JNSQscience_evaReport_MohoSrfLandedRareCraters_00 // A crisp, sharp crater, one that hasn’t been cooked into mediocrity yet.
        MohoSrfLandedRareCraters* = #JNSQscience_evaReport_MohoSrfLandedRareCraters_01 // The walls are darker and cleaner, like the rock hasn’t had time to bake.
        MohoInSpaceLowRareCraters* = #JNSQscience_evaReport_MohoInSpaceLowRareCraters_00 // One crater stands out with crisp edges and a dark floor—fresh enough to still be interesting.
        MohoInSpaceLowRareCraters* = #JNSQscience_evaReport_MohoInSpaceLowRareCraters_01 // You mark a particularly sharp impact as a “do not land here” recommendation.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_evaReport_MohoSrfLandedVoronoiCraters_00 // The craters interlock like a tiled floor. Nature is showing off.
        MohoSrfLandedVoronoiCraters* = #JNSQscience_evaReport_MohoSrfLandedVoronoiCraters_01 // From here it looks patterned; up close it’s jagged chaos arranged neatly.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_evaReport_MohoInSpaceLowVoronoiCraters_00 // The surface breaks into polygon patches of rims. It’s like a cracked shell made of impacts.
        MohoInSpaceLowVoronoiCraters* = #JNSQscience_evaReport_MohoInSpaceLowVoronoiCraters_01 // From here the pattern is almost orderly. You don’t trust anything that neat on Moho.
        MohoSrfLandedNotableCraters* = #JNSQscience_evaReport_MohoSrfLandedNotableCraters_00 // Mission Control is thrilled this hole has a name. You’re thrilled it has shade.
        MohoSrfLandedNotableCraters* = #JNSQscience_evaReport_MohoSrfLandedNotableCraters_01 // You pose by the rim for the “historic” shot and immediately regret the heat.
        MohoInSpaceLowNotableCraters* = #JNSQscience_evaReport_MohoInSpaceLowNotableCraters_00 // You spot the famous crater and immediately see why it’s famous: it’s dramatic even from here.
        MohoInSpaceLowNotableCraters* = #JNSQscience_evaReport_MohoInSpaceLowNotableCraters_01 // The crater is easy to spot even from low orbit, a landmark cut into the rock. It makes everything nearby look temporary.
		MohoSrfLandedPeaks* = #JNSQscience_evaReport_MohoSrfLandedPeaks_00 // The ridge line is all knives and glare. You decide “summit attempt” is optional science.
        MohoSrfLandedPeaks* = #JNSQscience_evaReport_MohoSrfLandedPeaks_01 // Up here the horizon feels close and sharp. A hop sounds fun until you remember the landing.
        MohoInSpaceLowPeaks* = #JNSQscience_evaReport_MohoInSpaceLowPeaks_00 // The peaks cast needle-thin shadows that race across the ground as you pass. It’s mesmerizing.
        MohoInSpaceLowPeaks* = #JNSQscience_evaReport_MohoInSpaceLowPeaks_01 // Ridges and spines poke up from the glare like a bed of nails. Landing among them sounds like a bad idea.

        EveSrfLandedShores* = #JNSQscience_evaReport_EveSrfLandedShores_00 // The purple surf hisses at the rocks. You keep your boots well away from it.
        EveSrfLandedShores* = #JNSQscience_evaReport_EveSrfLandedShores_01 // You consider building a sandcastle, then remember the sand may be dissolving your tools.
        EveSrfLandedKrakensWell* = #JNSQscience_evaReport_EveSrfLandedKrakensWell_00 // A dark, circular scar opens in the ground nearby. You do not shout into it.
        EveSrfLandedKrakensWell* = #JNSQscience_evaReport_EveSrfLandedKrakensWell_01 // Your radio crackles as you edge toward the rim. You edge back.
        EveSrfSplashedPolarLakes* = #JNSQscience_evaReport_EveSrfSplashedPolarLakes_00 // Swimming here is like pushing through warm jelly. You stop calling it swimming.
        EveSrfSplashedPetrolLakes* = #JNSQscience_evaReport_EveSrfSplashedPetrolLakes_00 // Your suit alarms complain about vapors you cannot smell through the filters.
        EveSrfSplashedPetrolLakes* = #JNSQscience_evaReport_EveSrfSplashedPetrolLakes_01 // The liquid clings to your gloves in glossy sheets, like it wants to come along.
        EveSrfSplashedSeaofAkron* = #JNSQscience_evaReport_EveSrfSplashedSeaofAkron_00 // The Sea of Akron drips off your suit in heavy blobs.
        EveSrfSplashedSeaofAkron* = #JNSQscience_evaReport_EveSrfSplashedSeaofAkron_01 // You try to look down past your helmet rim and mostly see purple.
        EveSrfSplashedSeaofNessus* = #JNSQscience_evaReport_EveSrfSplashedSeaofNessus_00 // Sea of Nessus stretches to the haze. The horizon is just more purple.
        EveSrfSplashedSeaofNessus* = #JNSQscience_evaReport_EveSrfSplashedSeaofNessus_01 // You float higher than you expect, and that is not comforting.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_evaReport_EveSrfSplashedSeaofTaniwha_00 // Ripples crawl across the Sea of Taniwha as if something huge is thinking below.
        EveSrfSplashedSeaofTaniwha* = #JNSQscience_evaReport_EveSrfSplashedSeaofTaniwha_01 // You decide that splashing is enough exploration for one day.
        EveSrfSplashedSeaofGigan* = #JNSQscience_evaReport_EveSrfSplashedSeaofGigan_00 // The Sea of Gigan heaves slow swells under the thick air.
        EveSrfSplashedSeaofGigan* = #JNSQscience_evaReport_EveSrfSplashedSeaofGigan_01 // Every wave feels like it weighs a ton. In a way, it probably does.
        EveSrfSplashedSeaofRodan* = #JNSQscience_evaReport_EveSrfSplashedSeaofRodan_00 // The wind pushes the surface into lazy wrinkles. You get pushed too.
        EveSrfSplashedSeaofRodan* = #JNSQscience_evaReport_EveSrfSplashedSeaofRodan_01 // You make a note: do not fall in again. You are currently in.
        EveSrfSplashedSeaofGojira* = #JNSQscience_evaReport_EveSrfSplashedSeaofGojira_00 // You cannot force your helmet under the surface. Buoyancy wins.
        EveSrfSplashedSeaofGojira* = #JNSQscience_evaReport_EveSrfSplashedSeaofGojira_01 // The purple liquid beads on the visor and smears the view into abstract art.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_evaReport_EveSrfSplashedSeaofGhidorah_00 // Currents tug you in three directions at once. You decide the name fits.
        EveSrfSplashedSeaofGhidorah* = #JNSQscience_evaReport_EveSrfSplashedSeaofGhidorah_01 // You stop kicking and let the suit keep you afloat while you rethink your life.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_evaReport_EveSrfSplashedSeaofBagorah_00 // The Sea of Bagorah looks like spilled propellant and bad ideas.
        EveSrfSplashedSeaofBagorah* = #JNSQscience_evaReport_EveSrfSplashedSeaofBagorah_01 // You wonder if this counts as a bath. The answer is no.
        EveFlyingLowPolarLakes* = #JNSQscience_evaReport_EveFlyingLowPolarLakes_00 // The lake surface gleams inside a pale ring of terrain. You cannot tell how deep it goes.
        EveFlyingLowPolarLakes* = #JNSQscience_evaReport_EveFlyingLowPolarLakes_01 // For a moment you think you could flap your arms and hover. Then you remember physics hates you.
        EveFlyingLowPetrolLakes* = #JNSQscience_evaReport_EveFlyingLowPetrolLakes_00 // The lake reflects light like oil. You keep the craft pointed up, just in case.
        EveFlyingLowPetrolLakes* = #JNSQscience_evaReport_EveFlyingLowPetrolLakes_01 // You watch for bubbles or ripples and find both. That is not reassuring.
        EveFlyingLowSeaofAkron* = #JNSQscience_evaReport_EveFlyingLowSeaofAkron_00 // A climate warning light blinks and you decide the Sea of Akron is not a good place to lose altitude.
        EveFlyingLowSeaofAkron* = #JNSQscience_evaReport_EveFlyingLowSeaofAkron_01 // You focus on not tumbling over the purple ocean. This is apparently a full-time job.
        EveFlyingLowSeaofNessus* = #JNSQscience_evaReport_EveFlyingLowSeaofNessus_00 // You scan for a landing spot and mostly find more sea.
        EveFlyingLowSeaofNessus* = #JNSQscience_evaReport_EveFlyingLowSeaofNessus_01 // Something dark floats below. You pretend it is not part of your ship.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_evaReport_EveFlyingLowSeaofTaniwha_00 // The air is so thick the waves look muffled, like the sea is wearing a blanket.
        EveFlyingLowSeaofTaniwha* = #JNSQscience_evaReport_EveFlyingLowSeaofTaniwha_01 // You would rather not end up in the drink again. The drink waits patiently.
        EveFlyingLowSeaofGigan* = #JNSQscience_evaReport_EveFlyingLowSeaofGigan_00 // The swells are broad and slow. You feel them even from up here.
        EveFlyingLowSeaofGigan* = #JNSQscience_evaReport_EveFlyingLowSeaofGigan_01 // The purple glare makes it hard to judge distance. You trust the instruments, reluctantly.
        EveFlyingLowSeaofRodan* = #JNSQscience_evaReport_EveFlyingLowSeaofRodan_00 // Gusts shove you around despite the dense air. You file a complaint against weather.
        EveFlyingLowSeaofRodan* = #JNSQscience_evaReport_EveFlyingLowSeaofRodan_01 // You keep one hand on the ladder and one on your dignity. Both are slipping.
        EveFlyingLowSeaofGojira* = #JNSQscience_evaReport_EveFlyingLowSeaofGojira_00 // The sea below looks heavy enough to dent the craft. You do not test this.
        EveFlyingLowSeaofGojira* = #JNSQscience_evaReport_EveFlyingLowSeaofGojira_01 // You check your tether twice and still feel under-secured.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_evaReport_EveFlyingLowSeaofGhidorah_00 // Streaks on the surface intersect like traffic lanes. The sea seems busy.
        EveFlyingLowSeaofGhidorah* = #JNSQscience_evaReport_EveFlyingLowSeaofGhidorah_01 // You wonder what would happen if you dropped something. You decide not to wonder out loud.
        EveFlyingLowSeaofBagorah* = #JNSQscience_evaReport_EveFlyingLowSeaofBagorah_00 // The haze turns the Sea of Bagorah into a purple smear with occasional glints.
        EveFlyingLowSeaofBagorah* = #JNSQscience_evaReport_EveFlyingLowSeaofBagorah_01 // You try to mark your position, but everything looks the same shade of trouble.
        EveFlyingLowKrakensWell* = #JNSQscience_evaReport_EveFlyingLowKrakensWell_00 // The ground below opens into a dark circle. Your altimeter and your nerves spike together.
        EveFlyingLowKrakensWell* = #JNSQscience_evaReport_EveFlyingLowKrakensWell_01 // Your instruments twitch as you pass over the Well. You keep moving.
        EveInSpaceLowMountains* = #JNSQscience_evaReport_EveInSpaceLowMountains_00 // From orbit the mountains look like jagged teeth. You prefer them from a safe distance.
        EveInSpaceLowMountains* = #JNSQscience_evaReport_EveInSpaceLowMountains_01 // You wonder if they are good landing sites because they are high, or terrible because they are pointy.
        EveInSpaceLow* = #JNSQscience_evaReport_EveInSpaceLow_00 // From here, Eve is a smooth purple pearl. Whatever is down there is behind a curtain that refuses to open.
        EveInSpaceLow* = #JNSQscience_evaReport_EveInSpaceLow_01 // You can’t pick out mountains, seas, or anything else—just thick haze and a planet-sized glare.
        EveInSpaceLow* = #JNSQscience_evaReport_EveInSpaceLow_02 // The atmosphere scatters the sunlight into a soft blur. Eve looks painted, not mapped.
        EveInSpaceLow* = #JNSQscience_evaReport_EveInSpaceLow_03 // You try to spot your landing site. Eve responds by showing you more cloud, in slightly different cloud.
        EveInSpaceLow* = #JNSQscience_evaReport_EveInSpaceLow_04 // The edge of the planet glows with a deep violet halo. The surface might as well be a rumor.
        EveInSpaceLow* = #JNSQscience_evaReport_EveInSpaceLow_05 // You aim a camera straight down and get a photo of… atmosphere. It’s very atmospheric.
        EveInSpaceLowPolarLakes* = #JNSQscience_evaReport_EveInSpaceLowPolarLakes_00 // A small dark lake sits near the pole like an ink stain. Eve does not do subtle.
        EveInSpaceLowPetrolLakes* = #JNSQscience_evaReport_EveInSpaceLowPetrolLakes_00 // The lake gleams like spilled fuel under the sunlight.
        EveInSpaceLowPetrolLakes* = #JNSQscience_evaReport_EveInSpaceLowPetrolLakes_01 // You imagine the smell and immediately appreciate sealed cabin air.
        EveInSpaceLowSeaofAkron* = #JNSQscience_evaReport_EveInSpaceLowSeaofAkron_00 // The Sea of Akron cuts a bold purple patch into the land below.
        EveInSpaceLowSeaofAkron* = #JNSQscience_evaReport_EveInSpaceLowSeaofAkron_01 // Light sparkles off the surface in a way that almost makes it look inviting. Almost.
        EveInSpaceLowSeaofNessus* = #JNSQscience_evaReport_EveInSpaceLowSeaofNessus_00 // Sea of Nessus fades into haze at the edges, as if Eve is trying to hide it.
        EveInSpaceLowSeaofNessus* = #JNSQscience_evaReport_EveInSpaceLowSeaofNessus_01 // You track the coastline and keep losing it in the purple glare.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_evaReport_EveInSpaceLowSeaofTaniwha_00 // Swirls on the surface make patterns that look like something moving. Mission Control calls it 'waves'.
        EveInSpaceLowSeaofTaniwha* = #JNSQscience_evaReport_EveInSpaceLowSeaofTaniwha_01 // You decide the name fits anyway.
        EveInSpaceLowSeaofGigan* = #JNSQscience_evaReport_EveInSpaceLowSeaofGigan_00 // The sea looks calm from here. You know better than to trust appearances on Eve.
        EveInSpaceLowSeaofGigan* = #JNSQscience_evaReport_EveInSpaceLowSeaofGigan_01 // You can almost feel the pressure through the window just looking at it.
        EveInSpaceLowSeaofRodan* = #JNSQscience_evaReport_EveInSpaceLowSeaofRodan_00 // Streaks of cloud shadow race across the Sea of Rodan.
        EveInSpaceLowSeaofRodan* = #JNSQscience_evaReport_EveInSpaceLowSeaofRodan_01 // You watch the weather bands and remember your parachutes have feelings too.
        EveInSpaceLowSeaofGojira* = #JNSQscience_evaReport_EveInSpaceLowSeaofGojira_00 // The Sea of Gojira reflects sunlight like polished metal.
        EveInSpaceLowSeaofGojira* = #JNSQscience_evaReport_EveInSpaceLowSeaofGojira_01 // You picture splashing down there and immediately stop picturing it.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_evaReport_EveInSpaceLowSeaofGhidorah_00 // Multiple currents meet and twist into a tangled pattern. It looks like three seas arguing.
        EveInSpaceLowSeaofGhidorah* = #JNSQscience_evaReport_EveInSpaceLowSeaofGhidorah_01 // You sketch the shape for the report and label it 'do not visit'.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_evaReport_EveInSpaceLowSeaofBagorah_00 // The Sea of Bagorah is just another purple expanse until you remember what it is made of.
        EveInSpaceLowSeaofBagorah* = #JNSQscience_evaReport_EveInSpaceLowSeaofBagorah_01 // You swear the planet looks smug when you stare at it long enough.
        EveInSpaceLowKrakensWell* = #JNSQscience_evaReport_EveInSpaceLowKrakensWell_00 // Krakens Well is a dark puncture in the surface. Even from orbit it looks wrong.
        EveInSpaceLowKrakensWell* = #JNSQscience_evaReport_EveInSpaceLowKrakensWell_01 // You keep expecting something to look back. Nothing does. That is worse.

        KerbinSrfLandedLowlands* = #JNSQscience_evaReport_KerbinSrfLandedLowlands_00 // The Lowlands feels warmer and softer than the high ground. You log 'pleasant' and immediately get mud on the suit.
        KerbinSrfLandedLowlands* = #JNSQscience_evaReport_KerbinSrfLandedLowlands_01 // In the Lowlands, everything looks flat until you trip over it. The terrain wins again.
        KerbinSrfLandedAridLowlands* = #JNSQscience_evaReport_KerbinSrfLandedAridLowlands_00 // The Arid Lowlands is hot, dry, and very committed to getting dust into every joint of your suit.
        KerbinSrfLandedAridLowlands* = #JNSQscience_evaReport_KerbinSrfLandedAridLowlands_01 // You do an EVA in the Arid Lowlands. The horizon shimmers, and Mission Control asks if you're sure you're not standing on a stove.
        KerbinSrfLandedAridMountains* = #JNSQscience_evaReport_KerbinSrfLandedAridMountains_00 // In the Arid Mountains, every ridge looks like a climb. You make a note to start liking climbs.
        KerbinSrfLandedAridMountains* = #JNSQscience_evaReport_KerbinSrfLandedAridMountains_01 // The Arid Mountains has dramatic peaks and dramatic gravel. You are adding dramatic to the report.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_evaReport_KerbinSrfLandedWelcomeBackIsland_00 // You step out onto Welcome Back Island. The waves sound friendly, but you can feel every camera in Mission Control watching you.
        KerbinSrfLandedWelcomeBackIsland* = #JNSQscience_evaReport_KerbinSrfLandedWelcomeBackIsland_01 // Welcome Back Island is small, lonely, and extremely proud of its fresh air. You take a big breath, then remember you're in a suit.
        KerbinSrfSplashedGreatLake* = #JNSQscience_evaReport_KerbinSrfSplashedGreatLake_00 // You splash down in the Great Lake. It's quiet, inland, and far too peaceful for this kind of suit.
        KerbinSrfSplashedGreatLake* = #JNSQscience_evaReport_KerbinSrfSplashedGreatLake_01 // In the Great Lake, the water is calmer than the ocean. That just makes you notice every tiny leak-seeking drip.
        KerbinSrfSplashedInlandWater* = #JNSQscience_evaReport_KerbinSrfSplashedInlandWater_00 // You splash down in the Inland Water. It's quiet, inland, and far too peaceful for this kind of suit.
        KerbinSrfSplashedInlandWater* = #JNSQscience_evaReport_KerbinSrfSplashedInlandWater_01 // In the Inland Water, the water is calmer than the ocean. That just makes you notice every tiny leak-seeking drip.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_evaReport_KerbinSrfSplashedKreenwichSea_00 // Floating in the Kreenwich Sea, you realize that 'EVA' stands for 'Extremely Vulnerable Activity' when you can't touch anything solid.
        KerbinSrfSplashedKreenwichSea* = #JNSQscience_evaReport_KerbinSrfSplashedKreenwichSea_01 // The Kreenwich Sea is calm for exactly three seconds. Then the suit starts bobbing like a science buoy with feelings.
        KerbinSrfSplashedArcticSea* = #JNSQscience_evaReport_KerbinSrfSplashedArcticSea_00 // The Arctic Sea is cold enough that you start imagining hot snacks. You log 'thermal discomfort' and paddle faster.
        KerbinSrfSplashedArcticSea* = #JNSQscience_evaReport_KerbinSrfSplashedArcticSea_01 // In the Arctic Sea, the water feels like it's trying to freeze your thoughts. You decide thinking is optional.
        KerbinSrfSplashedForemansSea* = #JNSQscience_evaReport_KerbinSrfSplashedForemansSea_00 // Floating in the Foremans Sea, you realize that 'EVA' stands for 'Extremely Vulnerable Activity' when you can't touch anything solid.
        KerbinSrfSplashedForemansSea* = #JNSQscience_evaReport_KerbinSrfSplashedForemansSea_01 // The Foremans Sea is calm for exactly three seconds. Then the suit starts bobbing like a science buoy with feelings.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_evaReport_KerbinSrfSplashedTriangulusSea_00 // Floating in the Triangulus Sea, you realize that 'EVA' stands for 'Extremely Vulnerable Activity' when you can't touch anything solid.
        KerbinSrfSplashedTriangulusSea* = #JNSQscience_evaReport_KerbinSrfSplashedTriangulusSea_01 // The Triangulus Sea is calm for exactly three seconds. Then the suit starts bobbing like a science buoy with feelings.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_evaReport_KerbinSrfSplashedNorthernSea_00 // Floating in the Northern Sea, you realize that 'EVA' stands for 'Extremely Vulnerable Activity' when you can't touch anything solid.
        KerbinSrfSplashedNorthernSea* = #JNSQscience_evaReport_KerbinSrfSplashedNorthernSea_01 // The Northern Sea is calm for exactly three seconds. Then the suit starts bobbing like a science buoy with feelings.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_evaReport_KerbinSrfSplashedSub-ArcticSea_00 // The Sub Arctic Sea is cold enough that you start imagining hot snacks. You log 'thermal discomfort' and paddle faster.
        KerbinSrfSplashedSub-ArcticSea* = #JNSQscience_evaReport_KerbinSrfSplashedSub-ArcticSea_01 // In the Sub Arctic Sea, the water feels like it's trying to freeze your thoughts. You decide thinking is optional.
        KerbinSrfSplashedEasternSea* = #JNSQscience_evaReport_KerbinSrfSplashedEasternSea_00 // Floating in the Eastern Sea, you realize that 'EVA' stands for 'Extremely Vulnerable Activity' when you can't touch anything solid.
        KerbinSrfSplashedEasternSea* = #JNSQscience_evaReport_KerbinSrfSplashedEasternSea_01 // The Eastern Sea is calm for exactly three seconds. Then the suit starts bobbing like a science buoy with feelings.
        KerbinSrfSplashedWesternSea* = #JNSQscience_evaReport_KerbinSrfSplashedWesternSea_00 // Floating in the Western Sea, you realize that 'EVA' stands for 'Extremely Vulnerable Activity' when you can't touch anything solid.
        KerbinSrfSplashedWesternSea* = #JNSQscience_evaReport_KerbinSrfSplashedWesternSea_01 // The Western Sea is calm for exactly three seconds. Then the suit starts bobbing like a science buoy with feelings.
        KerbinFlyingLowAridLowlands* = #JNSQscience_evaReport_KerbinFlyingLowAridLowlands_00 // Over the Arid Lowlands, hot air and dust buffet your suit. You log "thermal bumps" and "sand everywhere."
        KerbinFlyingLowAridLowlands* = #JNSQscience_evaReport_KerbinFlyingLowAridLowlands_01 // Over the Arid Lowlands, the air is warm and gritty. You wonder if your suit warranty covers 'desert'.
        KerbinFlyingLowAridMountains* = #JNSQscience_evaReport_KerbinFlyingLowAridMountains_00 // Low above the Arid Mountains, the peaks feel uncomfortably close. You consider apologizing to the parachute.
        KerbinFlyingLowAridMountains* = #JNSQscience_evaReport_KerbinFlyingLowAridMountains_01 // In the Arid Mountains, the updrafts are rude and the rocks are sharper than your sense of direction.
		KerbinFlyingLowAridMountains* = #JNSQscience_evaReport_KerbinFlyingLowAridMountains_02 // The Arid Mountains are too close for comfort while you're on EVA. You record "gusts, ridges, and poor life choices."
        KerbinFlyingLowGreatLake* = #JNSQscience_evaReport_KerbinFlyingLowGreatLake_00 // Flying low over the Great Lake, you see smooth water bordered by land. It looks like a perfect landing site. It is a trap.
        KerbinFlyingLowGreatLake* = #JNSQscience_evaReport_KerbinFlyingLowGreatLake_01 // The Great Lake is an inland mirror from up here. You use it to check if your helmet is still attached.
		KerbinFlyingLowInlandWater* = #JNSQscience_evaReport_KerbinFlyingLowInlandWater_00 // You observe wind patterns drawing temporary maps on the water below while you try not to become part of them.
        KerbinFlyingLowInlandWater* = #JNSQscience_evaReport_KerbinFlyingLowInlandWater_01 // The Inland Water is an inland mirror from up here. You use it to check if your helmet is still attached.
        KerbinFlyingLowKreenwichSea* = #JNSQscience_evaReport_KerbinFlyingLowKreenwichSea_00 // Low over the Kreenwich Sea, the surface flashes sunlight into your visor. You call it 'beautiful' and immediately start squinting.
		KerbinFlyingLowKreenwichSea* = #JNSQscience_evaReport_KerbinFlyingLowKreenwichSea_01 // The Kreenwich Sea throws salt haze into the airflow. You record reduced visibility and increased stickiness on the suit.
		KerbinFlyingLowArcticSea* = #JNSQscience_evaReport_KerbinFlyingLowArcticSea_00 // Low flight EVA over the Arctic Sea is a lesson in cold air and colder spray. You report crisp visibility and numb hands.
		KerbinFlyingLowArcticSea* = #JNSQscience_evaReport_KerbinFlyingLowArcticSea_01 // You note patches of ice and sharp gusts. The suit heater gets a star in the mission log.
		KerbinFlyingLowForemansSea* = #JNSQscience_evaReport_KerbinFlyingLowForemansSea_00 // You write that the ocean below looks inviting until you remember you're on the outside of the craft.
        KerbinFlyingLowForemansSea* = #JNSQscience_evaReport_KerbinFlyingLowForemansSea_01 // You skim above the Foremans Sea. The spray looks refreshing until you remember it's hitting your life support system.
		KerbinFlyingLowTriangulusSea* = #JNSQscience_evaReport_KerbinFlyingLowTriangulusSea_00 // Over the Triangulus Sea the air bumps like it can't sit still. You log shifting gusts and choppy patterns below.
		KerbinFlyingLowTriangulusSea* = #JNSQscience_evaReport_KerbinFlyingLowTriangulusSea_01 // You attempt a calm EVA report and the wind responds with punctuation. Lots of punctuation.
		KerbinFlyingLowNorthernSea* = #JNSQscience_evaReport_KerbinFlyingLowNorthernSea_00 // Low flight EVA above the Northern Sea comes with brisk winds and long swells. You record steady spray in the intake flow.
		KerbinFlyingLowNorthernSea* = #JNSQscience_evaReport_KerbinFlyingLowNorthernSea_01 // The report notes cold maritime air and a strong desire to climb higher, preferably inside the cabin.
        KerbinFlyingLowSub-ArcticSea* = #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_00 // Over the Sub Arctic Sea, you spot pale patches and chilly-looking waves. Your suit insists the temperature is 'nope'.
        KerbinFlyingLowSub-ArcticSea* = #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_01 // Skimming the Sub Arctic Sea, you wonder how water can look this cold from the air. Then you feel the wind and remember.
		KerbinFlyingLowSub-ArcticSea* = #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_02 // Over the Sub-Arctic Sea the wind is sharp and the spray is sharper. You report "cold turbulence, salty mist."
		KerbinFlyingLowSub-ArcticSea* = #JNSQscience_evaReport_KerbinFlyingLowSub-ArcticSea_03 // You log visibility changes as mist bands drift past. The craft shudders as if it agrees with you.
		KerbinFlyingLowEasternSea* = #JNSQscience_evaReport_KerbinFlyingLowEasternSea_00 // The Eastern Sea sits under a thin haze. You report moist air, salt aerosols, and occasional jolts over the water.
		KerbinFlyingLowEasternSea* = #JNSQscience_evaReport_KerbinFlyingLowEasternSea_01 // You watch your shadow skim the waves while you scribble data. The waves look unimpressed.
		KerbinFlyingLowWesternSea* = #JNSQscience_evaReport_KerbinFlyingLowWesternSea_00 // Low flight EVA over the Western Sea is mesmerizing until a gust hits. You log "steady swells, sudden bumps."
		KerbinFlyingLowWesternSea* = #JNSQscience_evaReport_KerbinFlyingLowWesternSea_01 // You record salt haze and rolling seas below. The outside of a craft is a terrible place for sightseeing.
        KerbinFlyingLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_00 // Circling Welcome Back Island, you count sandy edges and exactly one good landing spot.
        KerbinFlyingLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_01 // Flying low over Welcome Back Island, you wave at the beach. It doesn't wave back.
		KerbinFlyingLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_02 // Low flight EVA over Welcome Back Island feels oddly familiar. You note radio chatter and the smell of "recent rockets."
		KerbinFlyingLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinFlyingLowWelcomeBackIsland_03 // You write that the terrain looks like home, then cross it out and replace it with "scientifically significant familiarity."
        KerbinInSpaceLowAridLowlands* = #JNSQscience_evaReport_KerbinInSpaceLowAridLowlands_00 // The Arid Lowlands shine pale and dusty beneath you. You report strong reflectivity and a strong desire for water.
		KerbinInSpaceLowAridLowlands* = #JNSQscience_evaReport_KerbinInSpaceLowAridLowlands_01 // You note that deserts look peaceful from orbit, which is clearly the atmosphere lying on their behalf.
		KerbinInSpaceLowAridMountains* = #JNSQscience_evaReport_KerbinInSpaceLowAridMountains_00 // The Arid Mountains cast long, sharp shadows. You report significant elevation changes and significant awe.
		KerbinInSpaceLowAridMountains* = #JNSQscience_evaReport_KerbinInSpaceLowAridMountains_01 // You perform an EVA over the Arid Mountains and watch the ridgelines slide by beneath you like slow waves of rock.
		KerbinInSpaceLowGreatLake* = #JNSQscience_evaReport_KerbinInSpaceLowGreatLake_00 // The Great Lake reads as a bright, calm patch among land. You log a clean shoreline signature and a tempting blue tone.
		KerbinInSpaceLowGreatLake* = #JNSQscience_evaReport_KerbinInSpaceLowGreatLake_01 // You note that even one lake can look enormous from orbit. Perspective is a powerful scientific instrument.
		KerbinInSpaceLowInlandWater* = #JNSQscience_evaReport_KerbinInSpaceLowInlandWater_00 // Inland waters glint between clouds. You report specular highlights and a reminder that Kerbin is mostly liquid somewhere.
		KerbinInSpaceLowInlandWater* = #JNSQscience_evaReport_KerbinInSpaceLowInlandWater_01 // You watch sunlight flash off Inland Water below and log it as "unexpectedly shiny, repeatedly."
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_evaReport_KerbinInSpaceLowKreenwichSea_00 // The Kreenwich Sea dominates the view with deep blue and scattered clouds. You log "oceanic vastness confirmed."
		KerbinInSpaceLowKreenwichSea* = #JNSQscience_evaReport_KerbinInSpaceLowKreenwichSea_01 // You wonder how many stories the Kreenwich Sea is hiding. The report remains officially noncommittal.
		KerbinInSpaceLowArcticSea* = #JNSQscience_evaReport_KerbinInSpaceLowArcticSea_00 // Over the Arctic Sea, pale ice and cold cloud bands show up clearly. You log high albedo and high chill vibes.
		KerbinInSpaceLowArcticSea* = #JNSQscience_evaReport_KerbinInSpaceLowArcticSea_01 // You float in low orbit and watch the Arctic Sea's ice patterns drift past like slow, broken mirrors.
		KerbinInSpaceLowForemansSea* = #JNSQscience_evaReport_KerbinInSpaceLowForemansSea_00 // The Foremans Sea looks darker and warmer, with thicker cloud streaks. You log moisture and active weather below.
		KerbinInSpaceLowForemansSea* = #JNSQscience_evaReport_KerbinInSpaceLowForemansSea_01 // You report ocean color variations over the Foremans Sea and briefly miss the idea of standing on something solid.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_evaReport_KerbinInSpaceLowTriangulusSea_00 // The Triangulus Sea sits under shifting cloud swirls. You log turbulent weather structures and triangular naming confidence.
		KerbinInSpaceLowTriangulusSea* = #JNSQscience_evaReport_KerbinInSpaceLowTriangulusSea_01 // You perform an EVA over the Triangulus Sea and note that waves are invisible from here, but the storms are not.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_evaReport_KerbinInSpaceLowNorthernSea_00 // The Northern Sea appears cold and busy with cloud bands. You log brisk weather patterns and plenty of open water.
		KerbinInSpaceLowNorthernSea* = #JNSQscience_evaReport_KerbinInSpaceLowNorthernSea_01 // You report that the Northern Sea looks like it's always in a hurry. The clouds agree and keep moving.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_evaReport_KerbinInSpaceLowSub-ArcticSea_00 // The Sub-Arctic Sea shows a mix of dark water and thin ice. You log transitional patterns and chilly cloud streaks.
		KerbinInSpaceLowSub-ArcticSea* = #JNSQscience_evaReport_KerbinInSpaceLowSub-ArcticSea_01 // You float above the Sub-Arctic Sea and appreciate that cold regions are easiest to admire from very far away.
		KerbinInSpaceLowEasternSea* = #JNSQscience_evaReport_KerbinInSpaceLowEasternSea_00 // The Eastern Sea lies under a persistent haze. You log widespread moisture and a soft, misty look from orbit.
		KerbinInSpaceLowEasternSea* = #JNSQscience_evaReport_KerbinInSpaceLowEasternSea_01 // You record long swaths of cloud cover over the Eastern Sea and suspect it's hiding the waves on purpose.
		KerbinInSpaceLowWesternSea* = #JNSQscience_evaReport_KerbinInSpaceLowWesternSea_00 // The Western Sea rolls out beneath you in deep blue. You log wide open water and broad, sweeping cloud arcs.
		KerbinInSpaceLowWesternSea* = #JNSQscience_evaReport_KerbinInSpaceLowWesternSea_01 // You do an EVA over the Western Sea and decide that "endless ocean" is both accurate and unhelpful, so you write it anyway.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinInSpaceLowWelcomeBackIsland_00 // From low orbit, Welcome Back Island is a bright little punctuation mark in the sea. You salute it anyway.
		KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinInSpaceLowWelcomeBackIsland_01 // Welcome Back Island is easy to spot when you know where to look. You log "familiar landmarks" and pretend it's objective.
        KerbinInSpaceLowWelcomeBackIsland* = #JNSQscience_evaReport_KerbinInSpaceLowWelcomeBackIsland_02 // You drift over Welcome Back Island and mark it on the map with a big circle. Mission Control asks if that's scientific. You say yes.

        MunSrfLandedLowlands* = #JNSQscience_evaReport_MunSrfLandedLowlands_00 // The lowlands are flatter than you expected. Every footprint feels like a permanent autograph in gray powder.
        MunSrfLandedLowlands* = #JNSQscience_evaReport_MunSrfLandedLowlands_01 // You attempt a graceful hop across the plain. The Mun responds by slowly, politely letting you fall over.
        MunInSpaceLowLowlands* = #JNSQscience_evaReport_MunInSpaceLowLowlands_00 // From up here the lowlands look like spilled soot between brighter ridges. You label them “navigation-friendly” and hope that becomes true.
        MunInSpaceLowLowlands* = #JNSQscience_evaReport_MunInSpaceLowLowlands_01 // You try to call out landmarks, but everything is a crater. You settle for “the smoother bit” and pretend that helps.
        MunSrfLandedExoticCraters* = #JNSQscience_evaReport_MunSrfLandedExoticCraters_00 // You wonder how that rock got into your suit. You blame the crater, because the crater can’t file a complaint.
        MunInSpaceLowRareCraters* = #JNSQscience_evaReport_MunInSpaceLowRareCraters_00 // This crater is oddly neat and round. You suggest a near-perfect impact and hope the math people are impressed.
        MunInSpaceLowRareCraters* = #JNSQscience_evaReport_MunInSpaceLowRareCraters_01 // Something about the rim feels uneven. You write down a very scientific theory: “the Mun did it on purpose.”
        MunSrfLandedNotableCraters* = #JNSQscience_evaReport_MunSrfLandedNotableCraters_00 // Two overlapping scars in the ground make you wonder what hit here, and whether it was indecisive.
        MunSrfLandedMountains* = #JNSQscience_evaReport_MunSrfLandedMountains_00 // The mountains rise like jagged teeth against the black sky. You report “excellent climbing,” then immediately stop climbing.
        MunSrfLandedMountains* = #JNSQscience_evaReport_MunSrfLandedMountains_01 // Every step sends pebbles drifting downhill in slow motion. You decide to stand very still and call it “observational science.”
        MunInSpaceLowMountains* = #JNSQscience_evaReport_MunInSpaceLowMountains_00 // The ridges cast knife-sharp shadows across the slopes. You describe them as “dramatic” and “probably trying to trip us.”
        MunInSpaceLowMountains* = #JNSQscience_evaReport_MunInSpaceLowMountains_01 // From orbit the mountains look like a crumpled sheet of gray foil. You recommend landing somewhere flatter, in the interest of “crew morale.”

        MinmusSrfLandedBrownBasins* = #JNSQscience_evaReport_MinmusSrfLandedBrownBasins_00 // The ground here has a darker stain, like Minmus got spilled on. You carefully avoid tracking it into the cabin.
        MinmusSrfLandedBrownBasins* = #JNSQscience_evaReport_MinmusSrfLandedBrownBasins_01 // The “brown” in the basin makes the place look less like dessert and more like a warning label. You take notes anyway.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_evaReport_MinmusSrfLandedBrownLowlands_00 // The low terrain is darker and the dust clings stubbornly to your boots. You consider naming it “boot-dust” and claiming discovery.
        MinmusSrfLandedBrownLowlands* = #JNSQscience_evaReport_MinmusSrfLandedBrownLowlands_01 // The surface crunches softly underfoot, then settles like it’s embarrassed. Your EVA suit now has a fashionable gray-brown trim.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_evaReport_MinmusSrfLandedBrownMidlands_00 // The midlands roll by in gentle ridges that try to trip you at low gravity speeds. You declare victory over the terrain after not falling.
        MinmusSrfLandedBrownMidlands* = #JNSQscience_evaReport_MinmusSrfLandedBrownMidlands_01 // There’s a strange mottled pattern in the ground here. You suspect Minmus is trying out camouflage, poorly.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_evaReport_MinmusSrfLandedBrownHighlands_00 // Up here, the darker ground makes the shadows look extra sharp. You feel like you’re walking on a badly lit stage.
        MinmusSrfLandedBrownHighlands* = #JNSQscience_evaReport_MinmusSrfLandedBrownHighlands_01 // The highlands are rougher and the dust is thinner, but it still finds a way into every seam. You salute its dedication.
        MinmusInSpaceLowPoles* = #JNSQscience_evaReport_MinmusInSpaceLowPoles_00 // The poles shine brightly below, almost too bright to stare at for long. You adjust your visor and try not to drift while gawking.
        MinmusInSpaceLowPoles* = #JNSQscience_evaReport_MinmusInSpaceLowPoles_01 // The shadows stretch out in long, dramatic lines across the polar terrain. You wonder if Minmus is trying to look mysterious.
        MinmusInSpaceLowMidlands* = #JNSQscience_evaReport_MinmusInSpaceLowMidlands_00 // From up here, the midlands look like wrinkled frosting with occasional cracks. You confirm that your jetpack is still attached.
        MinmusInSpaceLowMidlands* = #JNSQscience_evaReport_MinmusInSpaceLowMidlands_01 // The surface below is a patchwork of ridges and smooth spots. Your brain insists it’s a map of something important, but it won’t say what.
        MinmusInSpaceLowBasins* = #JNSQscience_evaReport_MinmusInSpaceLowBasins_00 // The basins below look like giant bowls carved into the minty surface. You briefly consider how many snacks would fit in one.
        MinmusInSpaceLowBasins* = #JNSQscience_evaReport_MinmusInSpaceLowBasins_01 // Wide depressions drift past beneath you, smooth and oddly inviting. You remind yourself that “inviting” is not a scientific measurement.
        MinmusInSpaceLowBrownLowlands* = #JNSQscience_evaReport_MinmusInSpaceLowBrownLowlands_00 // The lowlands are darker and blotchier than expected, breaking up the usual minty look. You feel slightly less hungry now.
        MinmusInSpaceLowBrownLowlands* = #JNSQscience_evaReport_MinmusInSpaceLowBrownLowlands_01 // Dusty streaks and smudges run across the low terrain. You suspect Minmus has been skidding around when nobody’s watching.
        MinmusInSpaceLowBrownMidlands* = #JNSQscience_evaReport_MinmusInSpaceLowBrownMidlands_00 // The midlands have a muted, dusty tone from above, like the color got turned down. You wonder if that’s normal or just Minmus being Minmus.
        MinmusInSpaceLowBrownMidlands* = #JNSQscience_evaReport_MinmusInSpaceLowBrownMidlands_01 // You watch darker ridges slide under the ship and try to pick out patterns. The best you can do is “lumpy.”
        MinmusInSpaceLowBrownHighlands* = #JNSQscience_evaReport_MinmusInSpaceLowBrownHighlands_00 // The high ground looks harsher and darker in places, with sharp lines between light and shadow. It seems determined to look rugged.
        MinmusInSpaceLowBrownHighlands* = #JNSQscience_evaReport_MinmusInSpaceLowBrownHighlands_01 // From orbit, the brown highlands resemble overbaked crust on an otherwise pleasant-looking world. You add “do not eat” to the report.
        MinmusInSpaceLowMountains* = #JNSQscience_evaReport_MinmusInSpaceLowMountains_00 // The mountain ridges look like they’re reaching up to grab your ship. You keep a respectful distance and a firm grip.
        MinmusInSpaceLowMountains* = #JNSQscience_evaReport_MinmusInSpaceLowMountains_01 // Jagged terrain races by beneath you in slow motion. You decide Minmus is prettier when it can’t poke you.

        DunaSrfLandedRareCraters* = #JNSQscience_evaReport_DunaSrfLandedRareCraters_00 // A lone crater breaks the endless rust flats. You walk the rim and start picking where the first comms mast should go.
        DunaSrfLandedRareCraters* = #JNSQscience_evaReport_DunaSrfLandedRareCraters_01 // The wind drops inside the crater like it forgot to follow you. For a moment it feels like a tiny frontier shelter carved into the planet.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_evaReport_DunaSrfLandedVoronoiCraters_00 // The ground is patterned with repeating pits like a stamped metal sheet. You try not to think about what could make a planet look “organized”.
        DunaSrfLandedVoronoiCraters* = #JNSQscience_evaReport_DunaSrfLandedVoronoiCraters_01 // Every step lands on another identical edge. You log the terrain as “great for grids” and “terrible for sleeping”.
        DunaSrfLandedNotableCraters* = #JNSQscience_evaReport_DunaSrfLandedNotableCraters_00 // The crater walls show layers like a sliced cake of red dust and darker rock. You take notes and also a careful step back.
        DunaSrfLandedNotableCraters* = #JNSQscience_evaReport_DunaSrfLandedNotableCraters_01 // You shout and hear your voice come back thin and late. It’s a big, empty place... perfect for science, unsettling for pioneers.
        DunaSrfLandedExoticCraters* = #JNSQscience_evaReport_DunaSrfLandedExoticCraters_00 // The crater floor is brighter here, as if the planet is hiding something cold under the rust. Your visor fogs for a second and you get very alert.
        DunaSrfLandedExoticCraters* = #JNSQscience_evaReport_DunaSrfLandedExoticCraters_01 // You kneel to scoop a sample and it squeaks like frozen grit. You mark it as “resources” and “slip hazard”.
        DunaSrfLandedMountains* = #JNSQscience_evaReport_DunaSrfLandedMountains_00 // The slope steals your traction and the thin air steals your patience. You keep going anyway, because that’s what frontier reports are for.
        DunaSrfLandedMountains* = #JNSQscience_evaReport_DunaSrfLandedMountains_01 // Dark rock pokes through the red dust like bones. You collect a chunk and imagine future drills chewing straight into the mountain.
        DunaSrfLandedVolcano* = #JNSQscience_evaReport_DunaSrfLandedVolcano_00 // The ground turns dark and broken, like the planet remembered a hotter age. You tap the rock and it answers with a hollow, ancient sound.
        DunaSrfLandedVolcano* = #JNSQscience_evaReport_DunaSrfLandedVolcano_01 // Red dust clings to black stone in stubborn patches. You mark it as a potential base site: solid footing, good cover, and it looks dramatic in photos.
        DunaFlyingLowHighlands* = #JNSQscience_evaReport_DunaFlyingLowHighlands_00 // The air barely helps at all; you’re riding jets and stubbornness. The high ground rolls beneath you like a red wilderness waiting for its first flag.
        DunaFlyingLowMidlands* = #JNSQscience_evaReport_DunaFlyingLowMidlands_00 // The midlands drift by in endless shades of burnt orange. You catch yourself picking spots for roads before you remember you’re still just a lone speck in the sky.
        DunaFlyingLowLowlands* = #JNSQscience_evaReport_DunaFlyingLowLowlands_00 // The lowlands look flat enough to build a runway on, if you can keep the dust from eating everything. The frontier is wide open and completely unforgiving.
        DunaFlyingLowCraters* = #JNSQscience_evaReport_DunaFlyingLowCraters_00 // From up here the crater rims form dark rings in the sand, ancient scars you can’t ignore. You feel small, then stubborn, then small again.
        DunaFlyingLowRareCraters* = #JNSQscience_evaReport_DunaFlyingLowRareCraters_00 // A single crater breaks the monotony like a promise of shelter. You circle once and imagine a habitat tucked inside its walls, safe from the planet’s moods.
        DunaFlyingLowVoronoiCraters* = #JNSQscience_evaReport_DunaFlyingLowVoronoiCraters_00 // The ground is pocked in a repeating pattern, like the planet is wearing armor. You get a brief, primal urge to leave before you decide it’s probably fine.
        DunaFlyingLowNotableCraters* = #JNSQscience_evaReport_DunaFlyingLowNotableCraters_00 // The big crater below has layered walls and a shadowed floor that looks deeper than it should. You can almost hear future drills chewing into those exposed seams.
        DunaFlyingLowExoticCraters* = #JNSQscience_evaReport_DunaFlyingLowExoticCraters_00 // An icy bowl gleams against the red like a wound that never healed. You mark it as “supplies” and try not to think about how cold it will feel up close.
        DunaFlyingLowMountains* = #JNSQscience_evaReport_DunaFlyingLowMountains_00 // Peaks slide past close enough to feel personal. Something in you wants to climb them all, just to prove this planet can’t keep its heights.
        DunaFlyingLowVolcano* = #JNSQscience_evaReport_DunaFlyingLowVolcano_00 // Black rock breaks through the red dust like old bones. You drift over it in silence, feeling like you’re reading the planet’s oldest, harshest chapter.
        DunaInSpaceLowRareCraters* = #JNSQscience_evaReport_DunaInSpaceLowRareCraters_00 // A single crater sits alone in the rust like a scar with no other wounds nearby. You mark it as a future landmark—the kind pioneers navigate by when everything else looks the same.
        DunaInSpaceLowVoronoiCraters* = #JNSQscience_evaReport_DunaInSpaceLowVoronoiCraters_00 // The surface is tiled with repeating pits, like the world grew scales and then forgot why. Your instincts whisper “ancient” while your mission clock insists “keep observing”.
        DunaInSpaceLowNotableCraters* = #JNSQscience_evaReport_DunaInSpaceLowNotableCraters_00 // The big crater’s rim throws a shadow that looks deep enough to swallow your sense of scale. You can almost see the layers from here, and you wonder what a colony could mine from that exposed history.
        DunaInSpaceLowExoticCraters* = #JNSQscience_evaReport_DunaInSpaceLowExoticCraters_00 // A bright, strange patch gleams inside the crater, refusing to be the right shade of red. You tag it as “unusual deposits” and feel that primal pull of resources—and the equal pull of caution.
        DunaInSpaceLowMountains* = #JNSQscience_evaReport_DunaInSpaceLowMountains_00 // Jagged ranges roll beneath you like frozen waves of stone. Hanging here with nothing but a jetpack and the void, you feel the urge to climb anyway—just to prove you can.
        DunaInSpaceLowVolcano* = #JNSQscience_evaReport_DunaInSpaceLowVolcano_00 // Dark volcanic ground cuts through the rust like old burn marks that never healed. You hover over it and swear the planet still remembers fire, waiting for the next brave mistake to wake it.

        IkeSrfLandedLowlands* = #JNSQscience_evaReport_IkeSrfLandedLowlands_00 // The dust here is so fine it tries to cling to the suit through pure determination. You leave crisp bootprints that look permanent.
		IkeSrfLandedLowlands* = #JNSQscience_evaReport_IkeSrfLandedLowlands_01 // The terrain is flat enough to feel suspicious. You make a note that “flat” on Ike still includes plenty of rocks waiting for ankles.
		IkeSrfLandedMidlands* = #JNSQscience_evaReport_IkeSrfLandedMidlands_00 // From here, the surface alternates between gentle slopes and sudden crater rims. You recommend describing it as “mostly safe” only to people you don’t like.
		IkeSrfLandedMidlands* = #JNSQscience_evaReport_IkeSrfLandedMidlands_01 // You hop over a ridge and nearly drift into a boulder field. The report is mostly a reminder to stop celebrating before you land.
		IkeSrfLandedHighlands* = #JNSQscience_evaReport_IkeSrfLandedHighlands_00 // The view is expansive: craters, ridges, and Duna looming overhead like a giant red reminder. You take a moment to enjoy the dramatic emptiness.
		IkeSrfLandedHighlands* = #JNSQscience_evaReport_IkeSrfLandedHighlands_01 // The ground is rough and bright in the harsh light, with shadows that look deep enough to swallow a rover. You decide to stay on the sunny side.
		IkeInSpaceLowLowlands* = #JNSQscience_evaReport_IkeInSpaceLowLowlands_00 // Floating outside the craft, you watch the Lowlands slide beneath you like a dusty bruise. You wonder if the ground is judging your orbit.
		IkeInSpaceLowLowlands* = #JNSQscience_evaReport_IkeInSpaceLowLowlands_01 // The surface details whip past faster than your brain can label them. You try anyway, and end up with a lot of notes that just say “crater.”
		IkeInSpaceLowMidlands* = #JNSQscience_evaReport_IkeInSpaceLowMidlands_00 // The Midlands look deceptively calm from up here, right until the light catches a jagged ridge. You add “don’t trust it” to the map.
		IkeInSpaceLowMidlands* = #JNSQscience_evaReport_IkeInSpaceLowMidlands_01 // You point out landmarks to yourself for navigation practice, then realize everything is a landmark. Ike’s organizational system appears to be “more holes.”
		IkeInSpaceLowHighlands* = #JNSQscience_evaReport_IkeInSpaceLowHighlands_00 // The Highlands are a maze of bright rims and black shadows. You report that the contrast is sharp enough to cut confidence.
		IkeInSpaceLowHighlands* = #JNSQscience_evaReport_IkeInSpaceLowHighlands_01 // You drift along the ladder and stare down at the broken terrain. It feels like looking into a giant gravel tray someone shook too hard.
		IkeInSpaceHigh* = #JNSQscience_evaReport_IkeInSpaceHigh_00 // From this far out, Ike is a dark speck escorting Duna around the sun. You wave anyway, just in case it waves back.
		IkeInSpaceHigh* = #JNSQscience_evaReport_IkeInSpaceHigh_01 // High above the moon, everything looks small except the void. You file the report as “spacious, silent, and mildly insulting.”

        EdnaSrfLandedLowlands* = #JNSQscience_evaReport_EdnaSrfLandedLowlands_00 // You step out onto the lowlands and the darkness feels close enough to trip over.
        EdnaSrfLandedLowlands* = #JNSQscience_evaReport_EdnaSrfLandedLowlands_01 // Your boots crunch softly; Edna answers by doing absolutely nothing, very confidently.
        EdnaSrfLandedMidlands* = #JNSQscience_evaReport_EdnaSrfLandedMidlands_00 // The midlands look like they were assembled from leftover rocks and a strict “no warmth” policy.
        EdnaSrfLandedMidlands* = #JNSQscience_evaReport_EdnaSrfLandedMidlands_01 // You wave at the horizon. The horizon does not wave back.
        EdnaSrfLandedHighlands* = #JNSQscience_evaReport_EdnaSrfLandedHighlands_00 // Up here the ground gets sharper, as if Edna is trying to be more dramatic for no reason.
        EdnaSrfLandedHighlands* = #JNSQscience_evaReport_EdnaSrfLandedHighlands_01 // You note that “highlands” is just “lowlands” with more opportunities to fall stylishly.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_evaReport_EdnaSrfLandedPolarIceCraters_00 // The polar crater shadows swallow your headlamp beam like it was never yours to begin with.
        EdnaSrfLandedPolarIceCraters* = #JNSQscience_evaReport_EdnaSrfLandedPolarIceCraters_01 // The ice looks ancient and offended. Your suit insists you stop staring at it.
        EdnaSrfLandedWhites* = #JNSQscience_evaReport_EdnaSrfLandedWhites_00 // The pale patches glare through your visor, the brightest thing on a world that prefers dim.
        EdnaSrfLandedWhites* = #JNSQscience_evaReport_EdnaSrfLandedWhites_01 // You collect a little of the whitish material and decide it’s either frost or Edna’s idea of decoration.
        EdnaInSpaceLowLowlands* = #JNSQscience_evaReport_EdnaInSpaceLowLowlands_00 // Hanging over the lowlands on EVA, you can’t tell where Edna ends and the void begins.
        EdnaInSpaceLowLowlands* = #JNSQscience_evaReport_EdnaInSpaceLowLowlands_01 // The lowlands slide beneath you like a dark map with all the labels rubbed off.
        EdnaInSpaceLowMidlands* = #JNSQscience_evaReport_EdnaInSpaceLowMidlands_00 // From low orbit, the midlands look like rough, cold wrinkles on a planet-sized pebble.
        EdnaInSpaceLowMidlands* = #JNSQscience_evaReport_EdnaInSpaceLowMidlands_01 // You try to pick out landmarks; Edna keeps rearranging the shadows as you pass.
        EdnaInSpaceLowHighlands* = #JNSQscience_evaReport_EdnaInSpaceLowHighlands_00 // The highlands cast long knife-edge shadows that make the surface look even less welcoming.
        EdnaInSpaceLowHighlands* = #JNSQscience_evaReport_EdnaInSpaceLowHighlands_01 // You report “jagged terrain” and add that it appears to be jagged on purpose.
        EdnaInSpaceLowPolarIceCraters* = #JNSQscience_evaReport_EdnaInSpaceLowPolarIceCraters_00 // The polar region flashes bright, then drops into black pits that feel deeper than they should.
        EdnaInSpaceLowPolarIceCraters* = #JNSQscience_evaReport_EdnaInSpaceLowPolarIceCraters_01 // You drift over the icy craters and suddenly understand why helmets are fully enclosed.
        EdnaInSpaceLowWhites* = #JNSQscience_evaReport_EdnaInSpaceLowWhites_00 // The bright whites below look like spilled chalk on a blackboard someone refuses to clean.
        EdnaInSpaceLowWhites* = #JNSQscience_evaReport_EdnaInSpaceLowWhites_01 // You watch the pale patches slide past and wonder if Edna is trying to signal, badly.
        EdnaInSpaceHigh* = #JNSQscience_evaReport_EdnaInSpaceHigh_00 // From high above, Edna is a shy speck that seems to practice disappearing when you blink.
        EdnaInSpaceHigh* = #JNSQscience_evaReport_EdnaInSpaceHigh_01 // You log that Edna is dark, lonely, and suspiciously good at looking like “nothing important.”

        DakSrfLandedLowlands* = #JNSQscience_evaReport_DakSrfLandedLowlands_00 // You hop off the ladder and nearly miss the ground. Dak feels like a suggestion with a rocky texture.
        DakSrfLandedLowlands* = #JNSQscience_evaReport_DakSrfLandedLowlands_01 // The lowlands are a jumbled field of rubble and shadows. Your boots make no sound, but you swear Dak is listening.
        DakSrfLandedMidlands* = #JNSQscience_evaReport_DakSrfLandedMidlands_00 // Every step turns into a slow-motion leap. You try to look confident while your trajectory looks like a doodle.
        DakSrfLandedMidlands* = #JNSQscience_evaReport_DakSrfLandedMidlands_01 // The midlands are all sharp edges and drifting dust. The radio hisses softly, like it’s trying to hum a tune.
        DakSrfLandedHighlands* = #JNSQscience_evaReport_DakSrfLandedHighlands_00 // From up here, the sky is mostly stars and the ground is mostly “don’t slip.” You cling to the idea of traction.
        DakSrfLandedHighlands* = #JNSQscience_evaReport_DakSrfLandedHighlands_01 // The highlands have a strange pull that isn’t gravity. You double-check your tether and tell yourself it’s just nerves.
        DakInSpaceLowLowlands* = #JNSQscience_evaReport_DakInSpaceLowLowlands_00 // Floating outside the ship, you watch the lowlands crawl beneath you. Orbiting a potato this close feels like cheating.
        DakInSpaceLowLowlands* = #JNSQscience_evaReport_DakInSpaceLowLowlands_01 // Dak spins lazily under your boots. The terrain seems to slide past in silence, inviting you to step off and follow.
        DakInSpaceLowMidlands* = #JNSQscience_evaReport_DakInSpaceLowMidlands_00 // You drift along the hull and look down at the midlands’ crags. It’s hard to tell where “up” ends and “Dak” begins.
        DakInSpaceLowMidlands* = #JNSQscience_evaReport_DakInSpaceLowMidlands_01 // The midlands pass below like a rotating maze. You catch yourself staring too long, as if it might whisper instructions.
        DakInSpaceLowHighlands* = #JNSQscience_evaReport_DakInSpaceLowHighlands_00 // The highlands look close enough to kick. You decide not to test that theory.
        DakInSpaceLowHighlands* = #JNSQscience_evaReport_DakInSpaceLowHighlands_01 // From this altitude, the highlands are dark ridges against darker space. You feel a tug to go lower, and firmly ignore it.
        DakInSpaceHigh* = #JNSQscience_evaReport_DakInSpaceHigh_00 // Out here, Dak is a tiny speck with an outsized presence. You log that its “siren call” is probably just your imagination.
        DakInSpaceHigh* = #JNSQscience_evaReport_DakInSpaceHigh_01 // You can barely see Dak at all, but you still feel oddly watched. You end the EVA before curiosity wins.

        DresSrfLandedPoles* = #JNSQscience_evaReport_DresSrfLandedPoles_00 // The sun hangs low and every pebble casts a dramatic shadow. You hop in place and the silence hops with you.
        DresSrfLandedPoles* = #JNSQscience_evaReport_DresSrfLandedPoles_01 // Your boots squeak on powdery dust that looks untouched since forever. You leave a footprint and immediately feel judged by history.
        DresSrfLandedHighlands* = #JNSQscience_evaReport_DresSrfLandedHighlands_00 // The ground is all sharp ridges and stubborn rocks, like Dres is trying to look busy. Your knees file a complaint with Mission Control.
        DresSrfLandedHighlands* = #JNSQscience_evaReport_DresSrfLandedHighlands_01 // From up here you can see how pale and lonely this world really is. You wave anyway, just in case someone is watching from nowhere.
        DresSrfLandedMidlands* = #JNSQscience_evaReport_DresSrfLandedMidlands_00 // The terrain rolls on in every direction with very little enthusiasm. You take a long, floaty step and call it “field work.”
        DresSrfLandedMidlands* = #JNSQscience_evaReport_DresSrfLandedMidlands_01 // Dust puffs around your boots and takes its time settling back down. You narrate the action for the report, because the landscape won’t.
        DresInSpaceLowPoles* = #JNSQscience_evaReport_DresInSpaceLowPoles_00 // You drift above Dres’ pole, watching the light fade into long, sharp shadows. The surface looks like it’s holding its breath.
        DresInSpaceLowPoles* = #JNSQscience_evaReport_DresInSpaceLowPoles_01 // From up here the polar terrain is all harsh contrast and quiet. Your visor fogs a little as you try to sound impressed.
        DresInSpaceLowHighlands* = #JNSQscience_evaReport_DresInSpaceLowHighlands_00 // You float over the highlands and see endless ridges and battered peaks. It’s like the planet tried to wrinkle itself into relevance.
        DresInSpaceLowHighlands* = #JNSQscience_evaReport_DresInSpaceLowHighlands_01 // The high ground looks rough, fractured, and stubbornly old. You take notes while gently spinning like a confused satellite.
        DresInSpaceLowMidlands* = #JNSQscience_evaReport_DresInSpaceLowMidlands_00 // The midlands roll by in a steady parade of gray. Mission Control asks what you see; you answer, “More gray, but differently.”
        DresInSpaceLowMidlands* = #JNSQscience_evaReport_DresInSpaceLowMidlands_01 // You orbit over terrain that can’t decide whether it’s interesting. Your report contains several synonyms for “dusty.”
        DresInSpaceLowLowlands* = #JNSQscience_evaReport_DresInSpaceLowLowlands_00 // The lowlands look smoother from orbit, like someone tried to sweep the craters into tidy piles. They did not succeed.
        DresInSpaceLowLowlands* = #JNSQscience_evaReport_DresInSpaceLowLowlands_01 // From EVA you can trace faint basins and old scars beneath the dust. You briefly wonder if Dres is trying to hide from attention.
        DresInSpaceLowCanyon* = #JNSQscience_evaReport_DresInSpaceLowCanyon_00 // The canyon cuts across the surface like a scratch on a well-worn helmet. Even from orbit it looks unreasonably deep.
        DresInSpaceLowCanyon* = #JNSQscience_evaReport_DresInSpaceLowCanyon_01 // You drift above the canyon and get the unsettling feeling it’s staring back. You tug the tether twice, just to be sure it’s still there.

        JoolFlyingLowEquatorialBands* = #JNSQscience_evaReport_JoolFlyingLowEquatorialBands_00 // The suit immediately regrets this decision. The wind slams you across an invisible boundary and the bands trade places beneath your boots.
        JoolFlyingLowEquatorialBands* = #JNSQscience_evaReport_JoolFlyingLowEquatorialBands_01 // Turbulence comes in stripes; calm, then violent, then calm again. You are beginning to understand why these lanes stay so neatly separated.
        JoolInSpaceLowEquatorialBands* = #JNSQscience_evaReport_JoolInSpaceLowEquatorialBands_00 // From low orbit the equatorial bands look like fast-moving conveyor belts wrapped around the planet. You can almost see where the shear lines begin.
        JoolInSpaceLowEquatorialBands* = #JNSQscience_evaReport_JoolInSpaceLowEquatorialBands_01 // The bands slide past each other at different speeds, and you realize “weather” can be an entire hemisphere-wide machine.
        JoolFlyingLowSubpolarBands* = #JNSQscience_evaReport_JoolFlyingLowSubpolarBands_00 // The air here rolls in broad, heavy swells instead of sharp punches. You float between cloud layers that seem to be exchanging places very slowly.
        JoolFlyingLowSubpolarBands* = #JNSQscience_evaReport_JoolFlyingLowSubpolarBands_01 // The suit reads colder gas and higher pressure, and you feel it in every joint seal. The planet’s circulation is doing big, quiet work.
        JoolInSpaceLowSubpolarBands* = #JNSQscience_evaReport_JoolInSpaceLowSubpolarBands_00 // In orbit above the subpolar bands, the cloud textures stretch into sweeping curves that hint at huge circulation cells.
        JoolInSpaceLowSubpolarBands* = #JNSQscience_evaReport_JoolInSpaceLowSubpolarBands_01 // The boundary between bands is softer here, but it spans hundreds of kilometers. You note that “subtle” can still be gigantic.
        JoolFlyingLowExposedLowerDeck* = #JNSQscience_evaReport_JoolFlyingLowExposedLowerDeck_00 // The haze thins and the view drops into darker layers below. The suit’s pressure alarms become very enthusiastic, very quickly.
        JoolFlyingLowExposedLowerDeck* = #JNSQscience_evaReport_JoolFlyingLowExposedLowerDeck_01 // With fewer upper clouds to buffer things, the air feels denser and meaner. You keep the jetpack pointed “up” out of pure habit.
        JoolInSpaceLowExposedLowerDeck* = #JNSQscience_evaReport_JoolInSpaceLowExposedLowerDeck_00 // From low orbit, this region looks like someone peeled back a cloud layer and forgot to put it back. Darker circulation patterns show through.
        JoolInSpaceLowExposedLowerDeck* = #JNSQscience_evaReport_JoolInSpaceLowExposedLowerDeck_01 // The edges of the “opening” shift and curl, suggesting the lower decks are always trying to reclaim the gap.
        JoolFlyingLowNorthPole* = #JNSQscience_evaReport_JoolFlyingLowNorthPole_00 // Everything turns. The clouds spiral beneath you like a drain that forgot it doesn’t have a bottom.
        JoolFlyingLowNorthPole* = #JNSQscience_evaReport_JoolFlyingLowNorthPole_01 // The motion is smooth right up until a sudden gust tries to spin you end-over-end. You file a second complaint, louder.
        JoolInSpaceLowNorthPole* = #JNSQscience_evaReport_JoolInSpaceLowNorthPole_00 // The polar vortex is a perfect swirl from orbit, a storm with the patience of a planet. You watch it rotate and feel watched back.
        JoolInSpaceLowNorthPole* = #JNSQscience_evaReport_JoolInSpaceLowNorthPole_01 // Thin high clouds trace tight circles around the pole, marking the boundaries of the vortex like warning paint.
        JoolFlyingLowSouthPole* = #JNSQscience_evaReport_JoolFlyingLowSouthPole_00 // The southern spiral is tighter and more aggressive, and the wind changes direction faster than your jetpack can argue.
        JoolFlyingLowSouthPole* = #JNSQscience_evaReport_JoolFlyingLowSouthPole_01 // Visibility comes in rotating curtains of cloud. You keep one hand on the ladder and the other on your dignity.
        JoolInSpaceLowSouthPole* = #JNSQscience_evaReport_JoolInSpaceLowSouthPole_00 // From orbit, the south polar circulation looks like a braided coil, constantly tightening and loosening.
        JoolInSpaceLowSouthPole* = #JNSQscience_evaReport_JoolInSpaceLowSouthPole_01 // Bright high-altitude streaks wrap the vortex like a bandage. You suspect the planet is not healing.
        JoolFlyingLowStormComplex* = #JNSQscience_evaReport_JoolFlyingLowStormComplex_00 // The storm towers around you, and the updrafts try to promote you into the stratosphere without paperwork.
        JoolFlyingLowStormComplex* = #JNSQscience_evaReport_JoolFlyingLowStormComplex_01 // You catch flashes deep in the clouds and decide to stop being the tallest conductive object in the area.
        JoolInSpaceLowStormComplex* = #JNSQscience_evaReport_JoolInSpaceLowStormComplex_00 // From low orbit, the storm complex is a sprawling bruise in the cloud deck with bright towers and dark cores.
        JoolInSpaceLowStormComplex* = #JNSQscience_evaReport_JoolInSpaceLowStormComplex_01 // The storm’s edges ripple and fold as new cells rise and old ones collapse. You note that it is growing in all the wrong directions.

        LaytheSrfLandedShallows* = #JNSQscience_evaReport_LaytheSrfLandedShallows_00 // You step onto a damp sandbar and immediately regret not bringing longer boots. The water keeps trying to reclaim your footprints.
        LaytheSrfLandedShallows* = #JNSQscience_evaReport_LaytheSrfLandedShallows_01 // The sea laps at the edge of the land like it’s politely asking to come in. You decide to keep your “outside” time brief.
        LaytheSrfLandedHighlands* = #JNSQscience_evaReport_LaytheSrfLandedHighlands_00 // The wind up here is sharp and enthusiastic. You log the view, then hold onto something that looks trustworthy.
        LaytheSrfLandedHighlands* = #JNSQscience_evaReport_LaytheSrfLandedHighlands_01 // From this height the coast looks calm and inviting, which is suspicious. You note the altitude and your sudden appreciation for handrails.
        LaytheSrfLandedMountains* = #JNSQscience_evaReport_LaytheSrfLandedMountains_00 // The ground is rock, slope, and unhelpful angles. You record that the scenery is stunning and the landing choice was bold.
        LaytheSrfLandedMountains* = #JNSQscience_evaReport_LaytheSrfLandedMountains_01 // The air feels thin through the suit systems, and every step sounds loud on bare stone. You take a photo and avoid looking down.
        LaytheSrfLandedIceCaps* = #JNSQscience_evaReport_LaytheSrfLandedIceCaps_00 // Everything is blindingly bright and painfully cold. You report that the ice is solid, the wind is not, and your toes have filed a complaint.
        LaytheSrfLandedIceCaps* = #JNSQscience_evaReport_LaytheSrfLandedIceCaps_01 // The frozen ground crunches under your boots in a very official-sounding way. You note the temperature and wonder how the nearby seas stay liquid.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_evaReport_LaytheSrfLandedEnclosedFaults_00 // The terrain is split into deep cracks that swallow shadows. You record the fractures and keep your jumps strictly theoretical.
        LaytheSrfLandedEnclosedFaults* = #JNSQscience_evaReport_LaytheSrfLandedEnclosedFaults_01 // The air down in the breaks feels damp and still, like the planet is holding its breath. You decide not to test what’s at the bottom.
        LaytheSrfLandedLowlands* = #JNSQscience_evaReport_LaytheSrfLandedLowlands_00 // Warm mist clings to your visor and turns the horizon into a smudge. You report “high humidity” and “low confidence in the ground.”
        LaytheSrfLandedLowlands* = #JNSQscience_evaReport_LaytheSrfLandedLowlands_01 // The soil looks soft enough to eat landing legs for breakfast. You take a careful step and immediately plan your careful retreat.
        LaytheSrfLandedMidlands* = #JNSQscience_evaReport_LaytheSrfLandedMidlands_00 // Rolling terrain stretches away in all directions with no clear “best” direction. You log the landscape and pick the flattest-looking path anyway.
        LaytheSrfLandedMidlands* = #JNSQscience_evaReport_LaytheSrfLandedMidlands_01 // The air is calm for once, which makes you notice how loud your suit pumps are. You report stable conditions and mild unease.
        LaytheSrfSplashedShores* = #JNSQscience_evaReport_LaytheSrfSplashedShores_00 // You bob beside the coastline, close enough to smell land and far enough to be insulted by it. You file an observation: “Water is still wet.”
        LaytheSrfSplashedShores* = #JNSQscience_evaReport_LaytheSrfSplashedShores_01 // The waves keep nudging you toward the beach and then pulling you back out again. You record the motion and add “boat” to the shopping list.
        LaytheSrfSplashedShallows* = #JNSQscience_evaReport_LaytheSrfSplashedShallows_00 // You can almost stand, which makes the water feel even more determined to trip you. You log the depth as “ankle-to-pride level.”
        LaytheSrfSplashedShallows* = #JNSQscience_evaReport_LaytheSrfSplashedShallows_01 // The bottom is visible and unpleasantly textured. You report excellent clarity and terrible footing.
        LaytheSrfSplashedInlandWater* = #JNSQscience_evaReport_LaytheSrfSplashedInlandWater_00 // The water here is calmer, tucked away from the open seas. You take notes while trying not to drift into anything embarrassing.
        LaytheSrfSplashedInlandWater* = #JNSQscience_evaReport_LaytheSrfSplashedInlandWater_01 // Ripples spread out in neat rings from every movement you make. You report low wave action and high suit dampness.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_evaReport_LaytheSrfSplashedKrenwichSea_00 // The open water rolls in long swells that make your stomach argue with your helmet. You record sea state and reconsider every life choice.
        LaytheSrfSplashedKrenwichSea* = #JNSQscience_evaReport_LaytheSrfSplashedKrenwichSea_01 // The waves slap your suit with surprising force for such a pretty moon. You report strong winds and an urgent desire for shore.
        LaytheSrfSplashedArcticSea* = #JNSQscience_evaReport_LaytheSrfSplashedArcticSea_00 // The water is so cold you can feel it through the suit, which seems unfair. You log the temperature and keep all heaters on maximum.
        LaytheSrfSplashedArcticSea* = #JNSQscience_evaReport_LaytheSrfSplashedArcticSea_01 // Thin slush drifts past like it owns the place. You report ice presence and refuse to identify it more closely.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_evaReport_LaytheSrfSplashedJoolwardSea_00 // The green giant dominates the sky and stains the waves with strange color. You record the reflection and try not to stare back.
        LaytheSrfSplashedJoolwardSea* = #JNSQscience_evaReport_LaytheSrfSplashedJoolwardSea_01 // Spray coats your visor while Jool hangs overhead like an audience. You report rough water and unexpected stage fright.
        LaytheSrfSplashedPolwardSea* = #JNSQscience_evaReport_LaytheSrfSplashedPolwardSea_00 // The air bites harder here, and the chop feels meaner. You record polar conditions and keep your tether short.
        LaytheSrfSplashedPolwardSea* = #JNSQscience_evaReport_LaytheSrfSplashedPolwardSea_01 // The horizon is a blur of gray water and pale land under low haze. You report reduced visibility and increased grumbling.
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_evaReport_LaytheSrfSplashedEnclosedFaults_00 // You seem to have splashed down inside a fractured basin with steep walls all around. You report “limited exit options” and “lots of echoes.”
        LaytheSrfSplashedEnclosedFaults* = #JNSQscience_evaReport_LaytheSrfSplashedEnclosedFaults_01 // The water laps against jagged rock like it’s slowly widening the cracks. You log active erosion and stay well away from the edges.
        LaytheFlyingLowShallows* = #JNSQscience_evaReport_LaytheFlyingLowShallows_00 // Hanging outside in the damp air makes your suit feel like a very expensive sail. You report clear water below and unhelpful wind above.
        LaytheFlyingLowShallows* = #JNSQscience_evaReport_LaytheFlyingLowShallows_01 // Sunlight flashes off the shallows in bright sheets, making it hard to judge distance. You record glare conditions and keep a tight grip.
        LaytheFlyingLowInlandWater* = #JNSQscience_evaReport_LaytheFlyingLowInlandWater_00 // The lake below sits like a mirror between darker landforms. You report calmer air and the unsettling feeling of flying over “somewhere pleasant.”
        LaytheFlyingLowInlandWater* = #JNSQscience_evaReport_LaytheFlyingLowInlandWater_01 // Humid air beads on your suit and tries to fog your visor. You log condensation and decide that inside was underrated.
        LaytheFlyingLowKrenwichSea* = #JNSQscience_evaReport_LaytheFlyingLowKrenwichSea_00 // The waves below march in long lines while the wind tries to remove you from the ladder. You report steady airflow and very poor comfort.
        LaytheFlyingLowKrenwichSea* = #JNSQscience_evaReport_LaytheFlyingLowKrenwichSea_01 // Sea spray hangs in the air near the surface and turns everything hazy. You record visibility loss and taste-test nothing.
        LaytheFlyingLowArcticSea* = #JNSQscience_evaReport_LaytheFlyingLowArcticSea_00 // The air grows colder and heavier, and the chill seems to seep into your thoughts. You report polar turbulence and an urgent desire for hot snacks.
        LaytheFlyingLowArcticSea* = #JNSQscience_evaReport_LaytheFlyingLowArcticSea_01 // Low haze smears the boundary between sea and sky. You record instrument reliance and keep your boots pointed inward.
        LaytheFlyingLowJoolwardSea* = #JNSQscience_evaReport_LaytheFlyingLowJoolwardSea_00 // The sky has a faint green cast, and Jool fills a truly unreasonable amount of it. You report the view and pretend it isn’t watching.
        LaytheFlyingLowJoolwardSea* = #JNSQscience_evaReport_LaytheFlyingLowJoolwardSea_01 // Layers of air shimmer over the open water, making the horizon wobble. You log wind shear and tighten every strap you can reach.
        LaytheFlyingLowPolwardSea* = #JNSQscience_evaReport_LaytheFlyingLowPolwardSea_00 // Gusts slam into you like they have personal opinions about your mission. You report rough air and a newfound respect for seatbelts.
        LaytheFlyingLowPolwardSea* = #JNSQscience_evaReport_LaytheFlyingLowPolwardSea_01 // The sea below is dark and choppy, matching the mood of the weather. You record strong winds and keep your helmet firmly closed.
        LaytheFlyingLowHighlands* = #JNSQscience_evaReport_LaytheFlyingLowHighlands_00 // Rising air off the high terrain bumps you around with rude confidence. You report strong updrafts and stubborn terrain.
        LaytheFlyingLowHighlands* = #JNSQscience_evaReport_LaytheFlyingLowHighlands_01 // The land climbs toward you in slow, dramatic fashion. You log the elevation change and avoid testing how dramatic it can get.
        LaytheFlyingLowMountains* = #JNSQscience_evaReport_LaytheFlyingLowMountains_00 // Ridge lift turns into downdrafts with no warning, just to stay interesting. You report turbulent flow and refuse to enjoy the scenery.
        LaytheFlyingLowMountains* = #JNSQscience_evaReport_LaytheFlyingLowMountains_01 // Peaks rush by beneath your feet, sharp enough to look offended. You log the topography and keep both hands on something solid.
        LaytheFlyingLowIceCaps* = #JNSQscience_evaReport_LaytheFlyingLowIceCaps_00 // Bright ice below turns the world into a glare machine. You report visibility issues and a strong desire for tinted visors.
        LaytheFlyingLowIceCaps* = #JNSQscience_evaReport_LaytheFlyingLowIceCaps_01 // Cold pockets of air drop out of nowhere and yank at the craft. You record the instability and keep your movements minimal.
        LaytheFlyingLowEnclosedFaults* = #JNSQscience_evaReport_LaytheFlyingLowEnclosedFaults_00 // Dark cracks slash across the landscape like someone scribbled on the terrain. You report tricky navigation and very uninviting landing prospects.
        LaytheFlyingLowEnclosedFaults* = #JNSQscience_evaReport_LaytheFlyingLowEnclosedFaults_01 // Airflow over the broken ground produces sudden bumps and sideways shoves. You log chaotic turbulence and hold on tighter.
        LaytheFlyingLowLowlands* = #JNSQscience_evaReport_LaytheFlyingLowLowlands_00 // Haze hugs the ground and makes altitude feel like a suggestion. You report poor visibility and excellent reasons to stay higher.
        LaytheFlyingLowLowlands* = #JNSQscience_evaReport_LaytheFlyingLowLowlands_01 // Warm, humid air presses against your suit and tries to fog everything. You log sticky conditions and reconsider outside activities.
        LaytheFlyingLowMidlands* = #JNSQscience_evaReport_LaytheFlyingLowMidlands_00 // The terrain below alternates between gentle rises and shallow basins, never committing to a shape. You report steady air with occasional surprises.
        LaytheFlyingLowMidlands* = #JNSQscience_evaReport_LaytheFlyingLowMidlands_01 // Patchy cloud wisps drift past your helmet while the ground scrolls by like a map. You record fair conditions and mild dizziness.
        LaytheInSpaceLowShallows* = #JNSQscience_evaReport_LaytheInSpaceLowShallows_00 // From orbit, the shallows outline coastlines in pale bands like someone traced them carefully. You report clear water and a sudden urge to go “just a little lower.”
        LaytheInSpaceLowShallows* = #JNSQscience_evaReport_LaytheInSpaceLowShallows_01 // Sun glints off the shallow regions in sharp flashes that make the sea look metallic. You log albedo changes and blink a lot.
        LaytheInSpaceLowInlandWater* = #JNSQscience_evaReport_LaytheInSpaceLowInlandWater_00 // The inland water bodies look calm and dark, neatly boxed by land. You report distinct basins and a suspiciously inviting scene.
        LaytheInSpaceLowInlandWater* = #JNSQscience_evaReport_LaytheInSpaceLowInlandWater_01 // Thin clouds drift over the lakes like lazy brushstrokes. You record partial cover and attempt not to daydream about swimming.
        LaytheInSpaceLowKrenwichSea* = #JNSQscience_evaReport_LaytheInSpaceLowKrenwichSea_00 // The open sea below shows long wave patterns that run for kilometers. You report strong winds and an ocean that refuses to sit still.
        LaytheInSpaceLowKrenwichSea* = #JNSQscience_evaReport_LaytheInSpaceLowKrenwichSea_01 // Sunlight skitters across the water in moving patches. You log surface roughness and decide it’s a good day to stay in orbit.
        LaytheInSpaceLowArcticSea* = #JNSQscience_evaReport_LaytheInSpaceLowArcticSea_00 // Near the colder waters, haze and pale streaks gather at the edge of the ice. You report a sharp boundary and a very chilly-looking planet.
        LaytheInSpaceLowArcticSea* = #JNSQscience_evaReport_LaytheInSpaceLowArcticSea_01 // The polar air looks thicker with cloud and mist, softening everything into gradients. You record reduced contrast and increased appreciation for heaters.
        LaytheInSpaceLowJoolwardSea* = #JNSQscience_evaReport_LaytheInSpaceLowJoolwardSea_00 // Jool’s glow tints the atmosphere and the sea beneath it, like the whole moon is under a green lamp. You report unusual lighting and refuse to call it “pretty.”
        LaytheInSpaceLowJoolwardSea* = #JNSQscience_evaReport_LaytheInSpaceLowJoolwardSea_01 // The ocean reflects Jool in broken, shimmering patches through the thin cloud cover. You log the reflections and try not to feel small.
        LaytheInSpaceLowPolwardSea* = #JNSQscience_evaReport_LaytheInSpaceLowPolwardSea_00 // The sea darkens toward the poles, with weather bands smearing the surface detail. You report harsher conditions and a very active atmosphere.
        LaytheInSpaceLowPolwardSea* = #JNSQscience_evaReport_LaytheInSpaceLowPolwardSea_01 // You can see wind-driven texture on the water even from here. You record surface patterns and tighten your tether out of habit.
        LaytheInSpaceLowHighlands* = #JNSQscience_evaReport_LaytheInSpaceLowHighlands_00 // Highland ridges cast long shadows that make the terrain look sharper than it probably is. You report strong relief and an excellent place to not fall.
        LaytheInSpaceLowHighlands* = #JNSQscience_evaReport_LaytheInSpaceLowHighlands_01 // Thin cloud wisps snag on the higher ground and stretch into streamers. You log airflow indicators and keep the camera rolling.
        LaytheInSpaceLowMountains* = #JNSQscience_evaReport_LaytheInSpaceLowMountains_00 // The mountains puncture the landscape in jagged lines that look almost too dramatic to be natural. You report extreme topography and a strong “nope.”
        LaytheInSpaceLowMountains* = #JNSQscience_evaReport_LaytheInSpaceLowMountains_01 // Shadows pool in valleys while peaks catch the sun. You record contrast and imagine what that view would do to a landing trajectory.
        LaytheInSpaceLowIceCaps* = #JNSQscience_evaReport_LaytheInSpaceLowIceCaps_00 // The icecaps shine so brightly they make the rest of the moon look dim. You report high reflectivity and wonder how anything survives down there.
        LaytheInSpaceLowIceCaps* = #JNSQscience_evaReport_LaytheInSpaceLowIceCaps_01 // Pale sheets of ice sit under thin cloud like a lid on the poles. You log coverage and feel cold just looking at it.
        LaytheInSpaceLowEnclosedFaults* = #JNSQscience_evaReport_LaytheInSpaceLowEnclosedFaults_00 // Dark fractures crisscross the surface, some wide enough to notice even through haze. You report extensive cracking and possible tidal stress.
        LaytheInSpaceLowEnclosedFaults* = #JNSQscience_evaReport_LaytheInSpaceLowEnclosedFaults_01 // The faulted regions form sharp lines that ignore the surrounding terrain. You log the geometry and decide to keep your boots far away.
        LaytheInSpaceLowLowlands* = #JNSQscience_evaReport_LaytheInSpaceLowLowlands_00 // The lowlands look soft and smudged under a blanket of haze. You report heavy humidity and terrain that hides its details.
        LaytheInSpaceLowLowlands* = #JNSQscience_evaReport_LaytheInSpaceLowLowlands_01 // Cloud shadows drift over flat expanses, making the ground seem to move. You log atmospheric activity and resist naming shapes.
        LaytheInSpaceLowMidlands* = #JNSQscience_evaReport_LaytheInSpaceLowMidlands_00 // The midlands show a patchwork of gentle textures between the extremes of ice and sea. You report moderate relief and widespread variability.
        LaytheInSpaceLowMidlands* = #JNSQscience_evaReport_LaytheInSpaceLowMidlands_01 // Light cloud bands slide over the terrain without fully obscuring it. You record partial visibility and a calm moment in a very not-calm system.

        VallSrfLandedMountains* = #JNSQscience_evaReport_VallSrfLandedMountains_00 // The ridge under your boots is a frozen staircase; every crunch feels like it travels for kilometers.
		VallInSpaceLowPoles* = #JNSQscience_evaReport_VallInSpaceLowPoles_00 // The polar ice glares back like a signal mirror. You squint heroically at science.
		VallInSpaceLowMidlands* = #JNSQscience_evaReport_VallInSpaceLowMidlands_00 // The midlands look stitched with pale fracture lines, like Vall is trying to zip itself back together.
		VallInSpaceLowLowlands* = #JNSQscience_evaReport_VallInSpaceLowLowlands_00 // The lowlands are darker and smoother, as if something once flowed there and then panicked and froze.
		VallInSpaceLowMountains* = #JNSQscience_evaReport_VallInSpaceLowMountains_00 // The mountain spines cast knife-thin shadows. You briefly consider orbiting a little higher out of respect.
        VallSrfLanded* = #JNSQscience_ValOnVall_02 // Mission Control asks for a status report. You answer “Val is on Vall—” and immediately hear muffled giggling on the channel.
        Vall* = #JNSQscience_ValOnVall_00 // Someone keeps saying “Val on Vall” over the radio, and now the whole crew can’t stop laughing.

        TyloSrfLandedPoles* = #JNSQscience_evaReport_TyloSrfLandedPoles_00 // The ground is pale and painfully quiet. A faint, cold haze clings to the horizon like it forgot how to leave.
        TyloSrfLandedMountains* = #JNSQscience_evaReport_TyloSrfLandedMountains_00 // The peaks loom overhead in sharp, dusty ridges. You take one step and feel like you could accidentally hop into trouble.
        TyloSrfLandedHighlands* = #JNSQscience_evaReport_TyloSrfLandedHighlands_00 // Broken uplands stretch out in every direction, all scuffed rock and fine powder. Your footprints look permanent.
        TyloSrfLandedMidlands* = #JNSQscience_evaReport_TyloSrfLandedMidlands_00 // Craters overlap like someone kept dropping the same problem on the same place. The suit’s radiation counter sounds impatient.
        TyloSrfLandedLowlands* = #JNSQscience_evaReport_TyloSrfLandedLowlands_00 // The lowlands are smoother, darker, and oddly inviting. You kick dust anyway, just to prove it’s still hostile.
        TyloFlyingLowPoles* = #JNSQscience_evaReport_TyloFlyingLowPoles_00 // Your jetpack stirs a whisper of air that immediately gives up. Below, the bright caps slide past like a blank page.
        TyloFlyingLowMountains* = #JNSQscience_evaReport_TyloFlyingLowMountains_00 // The thin air barely counts as air, but the mountains still rush up at you. You decide to trust the jetpack a little less.
        TyloFlyingLowHighlands* = #JNSQscience_evaReport_TyloFlyingLowHighlands_00 // You drift through a cold trace atmosphere while dust trails lazily behind your boots. Tylo’s “wind” feels mostly theoretical.
        TyloFlyingLowMidlands* = #JNSQscience_evaReport_TyloFlyingLowMidlands_00 // The craters below make a lumpy shadow-map. Your suit reads a hint of nitrogen and a lot of “keep your helmet on.”
        TyloFlyingLowLowlands* = #JNSQscience_evaReport_TyloFlyingLowLowlands_00 // Over the basins, the haze looks slightly thicker—until you check the numbers. Tylo remains unimpressed by your optimism.
        TyloInSpaceLowPoles* = #JNSQscience_evaReport_TyloInSpaceLowPoles_00 // From just overhead, the polar ground shines flat and featureless until a crater rim catches the light. It’s a very tidy kind of desolation.
        TyloInSpaceLowMountains* = #JNSQscience_evaReport_TyloInSpaceLowMountains_00 // The mountain chain cuts long, hard shadows across the surface. You can almost feel the cold through the glove.
        TyloInSpaceLowHighlands* = #JNSQscience_evaReport_TyloInSpaceLowHighlands_00 // Highlands textures blur into dusty swirls and scattered scars. The horizon looks too crisp for comfort.
        TyloInSpaceLowMidlands* = #JNSQscience_evaReport_TyloInSpaceLowMidlands_00 // The midlands are a dense quilt of impacts, stitched with faint ejecta rays. You wonder what Tylo did to deserve this.
        TyloInSpaceLowLowlands* = #JNSQscience_evaReport_TyloInSpaceLowLowlands_00 // Wide low basins pool darkness and dust, with rims like shallow bowls. It looks calmer from here, which is suspicious.
        TyloFlyingHigh* = #JNSQscience_evaReport_TyloFlyingHigh_00 // The last hints of atmosphere thin to nothing, but your jetpack still insists on making noise. Tylo offers no explanation.
        TyloInSpaceHigh* = #JNSQscience_evaReport_TyloInSpaceHigh_00 // Tylo shrinks to a pale coin beneath you while Jool looms nearby. The sky feels busy, like it’s full of invisible arguments.

        BopInSpaceLowPoles* = #JNSQscience_evaReport_BopInSpaceLowPoles_00 // Over the poles, Bop looks like it’s trying to hide under a darker stain of nothing. Your helmet light feels laughable.
		BopInSpaceLowLowlands* = #JNSQscience_evaReport_BopInSpaceLowLowlands_00 // The lowlands below are smooth and empty, like Bop tried to erase its own surface and gave up halfway through.
		BopInSpaceLowMidlands* = #JNSQscience_evaReport_BopInSpaceLowMidlands_00 // From low orbit the midlands are gentle curves and soft contours. The radio static makes them feel anything but gentle.
		BopInSpaceLowHighlands* = #JNSQscience_evaReport_BopInSpaceLowHighlands_00 // The highlands cast shadows that stretch toward you in low orbit. You decide to hurry back inside the spacecraft.

        PolSrfLandedLowlands* = #JNSQscience_evaReport_PolSrfLandedLowlands_00 // You tap a “rock” with your boot. It answers by crumbling into sharp glittery crumbs that try very hard to become part of your suit.
		PolSrfLandedHighlands* = #JNSQscience_evaReport_PolSrfLandedHighlands_00 // The horizon is all spikes and ridges. You make a note that “high ground” on Pol is mostly a suggestion made by jagged geology.
		PolSrfLandedMidlands* = #JNSQscience_evaReport_PolSrfLandedMidlands_00 // Your helmet light turns the dust into a field of tiny sparkles. You decide Pol is either beautiful or actively trying to give you a headache.
		PolSrfLandedMountains* = #JNSQscience_evaReport_PolSrfLandedMountains_00 // You take a careful step and drift farther than expected. Pol’s mountains feel less like climbing and more like politely negotiating with gravity.
		PolSrfLandedMountains* = #JNSQscience_evaReport_PolSrfLandedMountains_01 // The ground drops away into steep, broken slopes. You report that the terrain is “pointy,” “crumbly,” and “very proud of it.”
		PolInSpaceLow* = #JNSQscience_evaReport_PolInSpaceLow_00 // From up here, Pol looks like a lumpy crumb of yellowish candy. You are mildly concerned it might try to stick to the ship.
		PolInSpaceLowPoles* = #JNSQscience_evaReport_PolInSpaceLowPoles_00 // The pole region looks like someone dusted the top of the moon with brighter powder. You wonder if planting a flag counts as adding a “pole” to Pol.
		PolInSpaceLowPoles* = #JNSQscience_evaReport_PolInSpaceLowPoles_01 // The surface below is mottled and uneven, like a half-finished model. You note that even the “flat bits” refuse to stay flat.
		PolInSpaceLowLowlands* = #JNSQscience_evaReport_PolInSpaceLowLowlands_00 // The lowlands look smoother from orbit, until the shadows give away the sharp edges everywhere. You revise “smooth” to “less aggressively jagged.”
		PolInSpaceLowLowlands* = #JNSQscience_evaReport_PolInSpaceLowLowlands_01 // You watch your shadow skim over the surface and realize it keeps catching on tiny ridges. The moon looks like it was assembled from leftovers.
		PolInSpaceLowMidlands* = #JNSQscience_evaReport_PolInSpaceLowMidlands_00 // Sunlight flashes off the surface in tiny sparkles. You report a high likelihood of “space glitter” and an even higher likelihood it will get everywhere.
		PolInSpaceLowMidlands* = #JNSQscience_evaReport_PolInSpaceLowMidlands_01 // The terrain below looks speckled, like someone sprinkled crumbs across a darker base. You make a note to stop thinking about snacks.
		PolInSpaceLowHighlands* = #JNSQscience_evaReport_PolInSpaceLowHighlands_00 // The highlands cast long, sharp shadows that make the landscape look even pointier than it already is. You decide Pol is determined to be difficult in every lighting condition.
		PolInSpaceLowMountains* = #JNSQscience_evaReport_PolInSpaceLowMountains_00 // The mountains look like crooked teeth from this altitude. You quietly promise to keep the ship well above the bitey parts.
		PolInSpaceLowMountains* = #JNSQscience_evaReport_PolInSpaceLowMountains_01 // Shadowed ridges crawl across the surface as you pass overhead. You note that Pol’s “mountain range” appears to be a range of bad ideas.
		PolInSpaceHigh* = #JNSQscience_evaReport_PolInSpaceHigh_00 // You sneeze inside the helmet and immediately regret every life choice that led here.

        LindorFlyingHigh* = #JNSQscience_evaReport_LindorFlyingHigh_00 // Lindor’s blue cloud bands scroll beneath you in endless stripes. You try not to think too hard about what “down” means here.
		LindorFlyingHigh* = #JNSQscience_evaReport_LindorFlyingHigh_01 // A hard gust yanks you sideways and your stomach drops anyway. Mission Control calls it “valuable wind data” and not “terrifying.”
		LindorInSpaceLowTemperateBands* = #JNSQscience_evaReport_LindorInSpaceLowTemperateBands_00 // From low orbit, the temperate bands look calm and neatly arranged, which feels suspicious.
		LindorInSpaceLowTemperateBands* = #JNSQscience_evaReport_LindorInSpaceLowTemperateBands_01 // You watch stripes slide beneath you while the magnetics tick softly in the background.
		LindorInSpaceLowSubpolarBands* = #JNSQscience_evaReport_LindorInSpaceLowSubpolarBands_00 // The subpolar regions look muted and cold, with haze gathered like bruises under the clouds.
		LindorInSpaceLowSubpolarBands* = #JNSQscience_evaReport_LindorInSpaceLowSubpolarBands_01 // Your suit registers a slightly harsher particle environment here, as if the pole is leaking trouble outward.
		LindorInSpaceLowNorthPole* = #JNSQscience_evaReport_LindorInSpaceLowNorthPole_00 // Curtains of faint glow ripple near the pole, and your radio adds an extra layer of static for atmosphere.
		LindorInSpaceLowNorthPole* = #JNSQscience_evaReport_LindorInSpaceLowNorthPole_01 // The view is beautiful in a “do not touch” sort of way. You keep your hands on the handrails.
		LindorInSpaceLowSouthPole* = #JNSQscience_evaReport_LindorInSpaceLowSouthPole_00 // The southern pole is wrapped in dim light and soft noise, like the planet is whispering into your headset.
		LindorInSpaceLowSouthPole* = #JNSQscience_evaReport_LindorInSpaceLowSouthPole_01 // You drift above the glow and try not to think about how deep the atmosphere goes.
		LindorInSpaceLowStormComplex* = #JNSQscience_evaReport_LindorInSpaceLowStormComplex_00 // The storm complex churns below like a living machine, rearranging itself while you watch.
		LindorInSpaceLowStormComplex* = #JNSQscience_evaReport_LindorInSpaceLowStormComplex_01 // You take notes on structure and motion, then add a personal note: “stay up here.”
		LindorInSpaceLowUpperStormDeck* = #JNSQscience_evaReport_LindorInSpaceLowUpperStormDeck_00 // The upper deck looks smooth from orbit, but the patterns betray fast motion underneath.
		LindorInSpaceLowUpperStormDeck* = #JNSQscience_evaReport_LindorInSpaceLowUpperStormDeck_01 // You can almost track the winds by eye. The planet is helpfully showing off.
		LindorInSpaceLowExposedLowerDeck* = #JNSQscience_evaReport_LindorInSpaceLowExposedLowerDeck_00 // A darker window into the lower layers makes the planet look deeper than it has any right to be.
		LindorInSpaceLowExposedLowerDeck* = #JNSQscience_evaReport_LindorInSpaceLowExposedLowerDeck_01 // You stare at the break and imagine the pressure beneath it. Your imagination files a complaint.
		LindorInSpaceHigh* = #JNSQscience_evaReport_LindorInSpaceHigh_00 // Lindor shrinks to a striped jewel with an icy tint, and the silence returns to something manageable.
		LindorInSpaceHigh* = #JNSQscience_evaReport_LindorInSpaceHigh_01 // Far above, the planet’s glow is just a suggestion. You feel very far from home, and oddly relieved.

        KrelSrfLandedLowlands* = #JNSQscience_evaReport_KrelSrfLandedLowlands_00 // The pale flats look dusted with powdered sugar, if sugar could be this unfriendly.
		KrelSrfLandedLowlands* = #JNSQscience_evaReport_KrelSrfLandedLowlands_00 // Every footprint stays crisp in the cold grit. Krel keeps excellent records of your mistakes.
		KrelSrfLandedMidlands* = #JNSQscience_evaReport_KrelSrfLandedMidlands_01 // Dark grooves run through the ground like wrinkles in old paint. You try not to stare back.
		KrelSrfLandedMidlands* = #JNSQscience_evaReport_KrelSrfLandedMidlands_00 // The terrain is all bands and seams, as if someone stitched the moon together in a hurry.
		KrelSrfLandedHighlands* = #JNSQscience_evaReport_KrelSrfLandedHighlands_00 // The high ground is jagged and oddly textured, like frozen waves made of stone.
		KrelSrfLandedHighlands* = #JNSQscience_evaReport_KrelSrfLandedHighlands_01 // You hop once and immediately regret it. Low gravity makes bravery look effortless.
		KrelSrfLandedPoles* = #JNSQscience_evaReport_KrelSrfLandedPoles_00 // The light barely skims the horizon, turning every ridge into a long, suspicious shadow.
		KrelSrfLandedPoles* = #JNSQscience_evaReport_KrelSrfLandedPoles_01 // Your visor fogs, then clears to reveal more empty cold. Krel is consistent, at least.
		KrelInSpaceLowLowlands* = #JNSQscience_evaReport_KrelInSpaceLowLowlands_00 // From here the lowlands look smooth until you notice the faint “veins” running through them.
		KrelInSpaceLowLowlands* = #JNSQscience_evaReport_KrelInSpaceLowLowlands_01 // The flats form neat patches around old scars. You wonder what Krel collided with to get that attitude.
		KrelInSpaceLowMidlands* = #JNSQscience_evaReport_KrelInSpaceLowMidlands_00 // The midlands are a messy lattice of ridges and troughs, like someone dragged a comb through rock.
		KrelInSpaceLowMidlands* = #JNSQscience_evaReport_KrelInSpaceLowMidlands_01 // You trace lines on the window and pretend you’ve discovered a grand pattern. Mission Control pretends too.
		KrelInSpaceLowHighlands* = #JNSQscience_evaReport_KrelInSpaceLowHighlands_00 // The highlands throw sharp shadows that make Krel look carved rather than formed.
		KrelInSpaceLowHighlands* = #JNSQscience_evaReport_KrelInSpaceLowHighlands_01 // Up close, the cliffs and terraces look impossibly steep. You decide to admire them from a safe distance.
		KrelInSpaceLowPoles* = #JNSQscience_evaReport_KrelInSpaceLowPoles_00 // The polar regions fade into harsh contrast, bright frost beside pitch-black cracks.
		KrelInSpaceLowPoles* = #JNSQscience_evaReport_KrelInSpaceLowPoles_01 // The terminator crawls across the poles like a closing eyelid. You feel politely unwelcome.
		KrelInSpaceHigh* = #JNSQscience_evaReport_KrelInSpaceHigh_00 // Krel becomes a pale chip glued to Lindor’s side. You check twice to make sure it’s still there.
		KrelInSpaceHigh* = #JNSQscience_evaReport_KrelInSpaceHigh_01 // From this far out, the moon’s strange texture vanishes into a simple dot. It’s clearly hiding something.

        AdenSrfLandedLowlands* = #JNSQscience_evaReport_AdenSrfLandedLowlands_00 // You hop down onto the lowlands and immediately overestimate how much traction “dust” provides.
        AdenSrfLandedLowlands* = #JNSQscience_evaReport_AdenSrfLandedLowlands_01 // The ground is flat, brown, and silent. Your boots are now officially the loudest thing on Aden.
        AdenSrfLandedMidlands* = #JNSQscience_evaReport_AdenSrfLandedMidlands_00 // The midlands roll away in gentle humps, like the moon is trying to look busy without doing any work.
        AdenSrfLandedMidlands* = #JNSQscience_evaReport_AdenSrfLandedMidlands_01 // You practice a heroic stance for the camera, then wobble because low gravity and dignity don’t mix.
        AdenSrfLandedHighlands* = #JNSQscience_evaReport_AdenSrfLandedHighlands_00 // The highlands are all broken ridges and sharp shadows. You decide to admire them from a safe distance of “right here.”
        AdenSrfLandedHighlands* = #JNSQscience_evaReport_AdenSrfLandedHighlands_01 // Your suit’s heater earns a formal commendation as the cold creeps in through every pause.
        AdenSrfLandedMountains* = #JNSQscience_evaReport_AdenSrfLandedMountains_00 // The mountains look steep enough to qualify as a procedural error. You test a foothold and immediately regret the idea.
        AdenSrfLandedMountains* = #JNSQscience_evaReport_AdenSrfLandedMountains_01 // Every step sends pebbles drifting away like they’re trying to escape the mission.
        AdenSrfLandedPoles* = #JNSQscience_evaReport_AdenSrfLandedPoles_00 // The polar ground glints faintly in places, as if the cold is polishing the dust when nobody’s looking.
        AdenSrfLandedPoles* = #JNSQscience_evaReport_AdenSrfLandedPoles_01 // You stare into a patch of shadow and get the distinct feeling Aden is hiding snacks in there. It is not.
        AdenInSpaceLowLowlands* = #JNSQscience_evaReport_AdenInSpaceLowLowlands_00 // Floating over the lowlands, you watch your shadow race across the brown flats and feel weirdly competitive about it.
        AdenInSpaceLowLowlands* = #JNSQscience_evaReport_AdenInSpaceLowLowlands_01 // You cling to the ladder and do a quick helmet tap-test. Still no air. Still cold. Science!
        AdenInSpaceLowMidlands* = #JNSQscience_evaReport_AdenInSpaceLowMidlands_00 // From above the midlands, the terrain looks like someone crumpled a sheet of paper and forgot to uncrumple it.
        AdenInSpaceLowMidlands* = #JNSQscience_evaReport_AdenInSpaceLowMidlands_01 // You try to point out landmarks, but everything is the same color of “old cookie.”
        AdenInSpaceLowHighlands* = #JNSQscience_evaReport_AdenInSpaceLowHighlands_00 // The highlands pass beneath in jagged bands. You note the dramatic shadows and the total lack of anywhere comfy to sit.
        AdenInSpaceLowHighlands* = #JNSQscience_evaReport_AdenInSpaceLowHighlands_01 // Your suit drifts a little too freely, and you remember that “let go” is not a valid navigation plan.
        AdenInSpaceLowMountains* = #JNSQscience_evaReport_AdenInSpaceLowMountains_00 // Over the mountains, the horizon rises and falls in sharp teeth. You keep one hand on the ship, just in case space gets ideas.
        AdenInSpaceLowMountains* = #JNSQscience_evaReport_AdenInSpaceLowMountains_01 // You record an EVA report, then immediately record a second report about how hard it is to write while floating.
        AdenInSpaceLowPoles* = #JNSQscience_evaReport_AdenInSpaceLowPoles_00 // The polar region looks colder from here, which is impressive because “colder than vacuum” should not be possible.
        AdenInSpaceLowPoles* = #JNSQscience_evaReport_AdenInSpaceLowPoles_01 // You watch the shadows stretch across the pole and decide the darkness is winning.
        AdenInSpaceHigh* = #JNSQscience_evaReport_AdenInSpaceHigh_00 // From high above, Aden shrinks to a brown bead while Lindor dominates the sky like it owns the place.
        AdenInSpaceHigh* = #JNSQscience_evaReport_AdenInSpaceHigh_01 // You spin slowly in the void and file a report that is mostly “quiet,” with a footnote that says “very, very quiet.”

        HuygenSrfLanded* = #JNSQscience_evaReport_HuygenSrfLanded_00 // You take a careful step; the lands disappear into orange haze. Your suit reports high pressure outside and you believe it.
        HuygenSrfLanded* = #JNSQscience_evaReport_HuygenSrfLanded_01 // The ground feels solid underfoot, but flat, dark ground stretches under a dim sky. You log: visibility poor, atmosphere stubborn, morale acceptable.
        HuygenSrfLandedLowlands* = #JNSQscience_evaReport_HuygenSrfLandedLowlands_00 // The ground squishes a little under your boots, then stubbornly pretends it didn't.
        HuygenSrfLandedLowlands* = #JNSQscience_evaReport_HuygenSrfLandedLowlands_01 // A cold, dense haze clings to your suit like it pays rent.
        HuygenSrfLandedMidlands* = #JNSQscience_evaReport_HuygenSrfLandedMidlands_00 // You can see the landscape rolling away... until it fades into a featureless amber wall.
        HuygenSrfLandedMidlands* = #JNSQscience_evaReport_HuygenSrfLandedMidlands_01 // Your helmet lights illuminate fog, then more fog, and then the concept of fog.
        HuygenSrfLandedHighlands* = #JNSQscience_evaReport_HuygenSrfLandedHighlands_00 // The wind feels slow but strong, like the air is thinking hard about pushing you over.
        HuygenSrfLandedHighlands* = #JNSQscience_evaReport_HuygenSrfLandedHighlands_01 // Distant dark ridges appear and vanish as the haze shifts. You write "mostly ridges" in the report.
        HuygenSrfLandedMountains* = #JNSQscience_evaReport_HuygenSrfLandedMountains_00 // Low gravity encourages heroic poses. High pressure immediately humbles them.
        HuygenSrfLandedMountains* = #JNSQscience_evaReport_HuygenSrfLandedMountains_01 // You hop, drift, and land like a feather. The mountain replies with a gust and a creak of your suit seals.
        HuygenSrfLandedPeaks* = #JNSQscience_evaReport_HuygenSrfLandedPeaks_00 // Up here the haze thins just enough to show how much haze there still is.
        HuygenSrfLandedPeaks* = #JNSQscience_evaReport_HuygenSrfLandedPeaks_01 // The sky is a muted gold, and the horizon looks close enough to poke. You decide not to test that.
        HuygenSrfLandedPolarLowlands* = #JNSQscience_evaReport_HuygenSrfLandedPolarLowlands_00 // The ground is dark and brittle, patterned like cracked paint left out in the cold.
        HuygenSrfLandedPolarLowlands* = #JNSQscience_evaReport_HuygenSrfLandedPolarLowlands_01 // Frost gathers on your suit fittings almost immediately. You log it as "enthusiastic condensation."
        HuygenSrfLandedPoles* = #JNSQscience_evaReport_HuygenSrfLandedPoles_00 // Everything is muffled here; even your footsteps sound like they are wearing mittens.
        HuygenSrfLandedPoles* = #JNSQscience_evaReport_HuygenSrfLandedPoles_01 // Your compass makes a confident suggestion, then remembers there is no magnetic field and gives up.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_evaReport_HuygenSrfLandedPolarHighlands_00 // The slope rises into a dim glow, like the sun is trying not to bother anyone.
        HuygenSrfLandedPolarHighlands* = #JNSQscience_evaReport_HuygenSrfLandedPolarHighlands_01 // Wind-carved rock and frozen grime compete for the title of "most unwelcoming."
        HuygenSrfLandedShores* = #JNSQscience_evaReport_HuygenSrfLandedShores_00 // The shoreline is glossy and black, as if the planet spilled something and never cleaned it up.
        HuygenSrfLandedShores* = #JNSQscience_evaReport_HuygenSrfLandedShores_01 // Little ripples lick at the edge of the land. Your suit sensors politely ask you to stop staring and step back.
        HuygenSrfSplashed* = #JNSQscience_evaReport_HuygenSrfSplashed_00 // You float with your pack keeping you barely upright; a black, glossy lake swallows reflections. You set every switch to 'no sparks'.
        HuygenSrfSplashed* = #JNSQscience_evaReport_HuygenSrfSplashed_01 // The liquid surface ripples like slow-moving oil. The liquid beads on your boots and runs away like it knows you are trouble.
        HuygenSrfSplashedShores* = #JNSQscience_evaReport_HuygenSrfSplashedShores_00 // You float higher than you should, bobbing in cold liquid that refuses to behave like water.
        HuygenSrfSplashedShores* = #JNSQscience_evaReport_HuygenSrfSplashedShores_01 // The suit stays sealed, but the sound of slow sloshing is unsettlingly loud in your helmet.
        HuygenSrfSplashedMethaneLakes* = #JNSQscience_evaReport_HuygenSrfSplashedMethaneLakes_00 // You are in a methane lake. You record this fact several times, just to make sure it is real.
        HuygenSrfSplashedMethaneLakes* = #JNSQscience_evaReport_HuygenSrfSplashedMethaneLakes_01 // The surface is dark and smooth, broken by lazy bubbles. You keep your thoughts far away from "sparks."
        HuygenFlyingLow* = #JNSQscience_evaReport_HuygenFlyingLow_00 // Flying here feels like swimming through syrup. your radio crackles; the silence outside does not care, and your jetpack over-corrects like it is proud of itself.
        HuygenFlyingLow* = #JNSQscience_evaReport_HuygenFlyingLow_01 // You try an EVA hop and the thick air catches you. Icy ridges poke through low cloud like dark teeth, so you navigate by instruments and optimism.
        HuygenFlyingLowLowlands* = #JNSQscience_evaReport_HuygenFlyingLowLowlands_00 // Hanging onto the ladder, you watch the lowlands blur beneath a thick amber soup.
        HuygenFlyingLowLowlands* = #JNSQscience_evaReport_HuygenFlyingLowLowlands_01 // The air buffets you with slow punches. You log "wind: determined."
        HuygenFlyingLowMidlands* = #JNSQscience_evaReport_HuygenFlyingLowMidlands_00 // The ground comes in brief, blurry glimpses between drifting curtains of haze.
        HuygenFlyingLowMidlands* = #JNSQscience_evaReport_HuygenFlyingLowMidlands_01 // Turbulence nudges you like a bored giant flicking your helmet.
        HuygenFlyingLowHighlands* = #JNSQscience_evaReport_HuygenFlyingLowHighlands_00 // Dark highlands loom out of the fog, then sink back into it like shy sea monsters.
        HuygenFlyingLowHighlands* = #JNSQscience_evaReport_HuygenFlyingLowHighlands_01 // You can almost believe you see detail down there, until the haze laughs and rearranges itself.
        HuygenFlyingLowMountains* = #JNSQscience_evaReport_HuygenFlyingLowMountains_00 // Updrafts over the mountains lift you gently, as if the planet is trying to inhale you.
        HuygenFlyingLowMountains* = #JNSQscience_evaReport_HuygenFlyingLowMountains_01 // The air is thick enough to feel with your gloves. You write "do not remove gloves" just in case.
        HuygenFlyingLowPeaks* = #JNSQscience_evaReport_HuygenFlyingLowPeaks_00 // Peaks stab upward through the haze, trying their best to reach cleaner air.
        HuygenFlyingLowPeaks* = #JNSQscience_evaReport_HuygenFlyingLowPeaks_01 // The view is jagged rock, amber sky, and a lot of "maybe" in between.
        HuygenFlyingLowPolarLowlands* = #JNSQscience_evaReport_HuygenFlyingLowPolarLowlands_00 // The polar flats below are streaked with dark patches and pale crust, like spilled ink on snow.
        HuygenFlyingLowPolarLowlands* = #JNSQscience_evaReport_HuygenFlyingLowPolarLowlands_01 // Your suit creaks softly as pressure and cold argue about who gets to be uncomfortable.
        HuygenFlyingLowPoles* = #JNSQscience_evaReport_HuygenFlyingLowPoles_00 // The pole is a dim target beneath a heavy sky. It feels like flying through a muted painting.
        HuygenFlyingLowPoles* = #JNSQscience_evaReport_HuygenFlyingLowPoles_01 // Static crackles in your comms as if the atmosphere is chewing on the signal.
        HuygenFlyingLowPolarHighlands* = #JNSQscience_evaReport_HuygenFlyingLowPolarHighlands_00 // The polar highlands look sharp at the edges and soft everywhere else, thanks to the ever-present haze.
        HuygenFlyingLowPolarHighlands* = #JNSQscience_evaReport_HuygenFlyingLowPolarHighlands_01 // You cling tighter as a slow gust rolls you sideways. The report includes the word "wheee" crossed out.
        HuygenFlyingLowShores* = #JNSQscience_evaReport_HuygenFlyingLowShores_00 // The coastline below draws a dark, wavering line where land and strange sea negotiate.
        HuygenFlyingLowShores* = #JNSQscience_evaReport_HuygenFlyingLowShores_01 // You watch waves chase the shore at a leisurely pace. Even the water here takes its time.
        HuygenFlyingLowMethaneLakes* = #JNSQscience_evaReport_HuygenFlyingLowMethaneLakes_00 // The lake surface reflects almost nothing; it is like staring at a polished shadow.
        HuygenFlyingLowMethaneLakes* = #JNSQscience_evaReport_HuygenFlyingLowMethaneLakes_01 // A faint sheen glints, then disappears. You decide the lake is being intentionally dramatic.
        HuygenFlyingHigh* = #JNSQscience_evaReport_HuygenFlyingHigh_00 // Up here the haze glows amber and your visor stays almost clear. Higher ground gives you a slightly better view, briefly. You call this 'progress'.
        HuygenFlyingHigh* = #JNSQscience_evaReport_HuygenFlyingHigh_01 // The wind changes its mind every few seconds. Wind scrapes across uplands with a steady shove. You write: atmosphere has layers, each with opinions.
        HuygenInSpaceLow* = #JNSQscience_evaReport_HuygenInSpaceLow_00 // You drift over the terminator and watch the limb glow. Dark ground stretches under a dim sky. You log: beautiful, frustrating, scientifically useful.
        HuygenInSpaceLowLowlands* = #JNSQscience_evaReport_HuygenInSpaceLowLowlands_00 // From low orbit, the lowlands are a dark stain under a glowing atmospheric rim.
        HuygenInSpaceLowLowlands* = #JNSQscience_evaReport_HuygenInSpaceLowLowlands_01 // You try to pick out details, but the haze turns everything into an impressionist painting.
        HuygenInSpaceLowMidlands* = #JNSQscience_evaReport_HuygenInSpaceLowMidlands_00 // The midlands form gentle gradients that fade into the planet-wide amber veil.
        HuygenInSpaceLowMidlands* = #JNSQscience_evaReport_HuygenInSpaceLowMidlands_01 // You record the boundary lines with confidence, and then watch them vanish under drifting haze.
        HuygenInSpaceLowHighlands* = #JNSQscience_evaReport_HuygenInSpaceLowHighlands_00 // The highlands appear as darker blotches, like bruises under translucent skin.
        HuygenInSpaceLowHighlands* = #JNSQscience_evaReport_HuygenInSpaceLowHighlands_01 // The atmosphere scatters the light into a soft glow that makes the terrain look unreal.
        HuygenInSpaceLowMountains* = #JNSQscience_evaReport_HuygenInSpaceLowMountains_00 // Mountain chains show up as jagged shadows that the haze tries very hard to erase.
        HuygenInSpaceLowMountains* = #JNSQscience_evaReport_HuygenInSpaceLowMountains_01 // You log the peaks by their silhouettes, because the planet refuses to provide surface clarity.
        HuygenInSpaceLowPeaks* = #JNSQscience_evaReport_HuygenInSpaceLowPeaks_00 // The peaks are tiny dark points that barely win against the haze.
        HuygenInSpaceLowPeaks* = #JNSQscience_evaReport_HuygenInSpaceLowPeaks_01 // You wonder how something so tall can still look so shy from orbit.
        HuygenInSpaceLowPolarLowlands* = #JNSQscience_evaReport_HuygenInSpaceLowPolarLowlands_00 // The polar lowlands are mottled with pale patches that might be frost, or might be the atmosphere lying again.
        HuygenInSpaceLowPolarLowlands* = #JNSQscience_evaReport_HuygenInSpaceLowPolarLowlands_01 // The limb glow near the pole is bright and thick, like the air is piled up there.
        HuygenInSpaceLowPoles* = #JNSQscience_evaReport_HuygenInSpaceLowPoles_00 // The pole is a muted bullseye under a dome of amber light.
        HuygenInSpaceLowPoles* = #JNSQscience_evaReport_HuygenInSpaceLowPoles_01 // You note the lack of sharp contrast and suspect the atmosphere is smoothing everything on purpose.
        HuygenInSpaceLowPolarHighlands* = #JNSQscience_evaReport_HuygenInSpaceLowPolarHighlands_00 // The polar highlands cast faint shadows that look smudged at the edges.
        HuygenInSpaceLowPolarHighlands* = #JNSQscience_evaReport_HuygenInSpaceLowPolarHighlands_01 // You track ridgelines for a moment before haze bands drift over and politely end the observation.
        HuygenInSpaceLowShores* = #JNSQscience_evaReport_HuygenInSpaceLowShores_00 // The shores are a thin dark outline where land meets unfamiliar seas.
        HuygenInSpaceLowShores* = #JNSQscience_evaReport_HuygenInSpaceLowShores_01 // You can almost see waves. You can definitely see the atmosphere doing its best to hide them.
        HuygenInSpaceLowMethaneLakes* = #JNSQscience_evaReport_HuygenInSpaceLowMethaneLakes_00 // The methane lakes are perfect dark pools, absorbing light like they are hoarding it.
        HuygenInSpaceLowMethaneLakes* = #JNSQscience_evaReport_HuygenInSpaceLowMethaneLakes_01 // You log the lakes as "present" and resist the urge to add "menacingly."
        HuygenInSpaceHigh* = #JNSQscience_evaReport_HuygenInSpaceHigh_00 // From high orbit, Huygen is a small amber world with a bright rim and a secretive surface.
        HuygenInSpaceHigh* = #JNSQscience_evaReport_HuygenInSpaceHigh_01 // The planet looks sealed under its thick atmosphere. You write that you feel watched, then delete that sentence.
        HuygenInSpaceHigh* = #JNSQscience_evaReport_HuygenInSpaceHigh_02 // From high above, Huygen is an amber marble wrapped in a thick veil. You wave anyway; it does not wave back.
        HuygenInSpaceHigh* = #JNSQscience_evaReport_HuygenInSpaceHigh_03 // You double-check your tether and stare down at a world that refuses to show its surface. The science team calls that 'interesting'.

        RigaSrfLandedLowlands* = #JNSQscience_evaReport_RigaSrfLandedLowlands_00 // The lowlands look like Kerbin forgot to finish painting. Your boots crunch into powder that refuses to stay down.
        RigaSrfLandedLowlands* = #JNSQscience_evaReport_RigaSrfLandedLowlands_01 // You take a confident step and immediately regret the word “confident.” Low gravity turns walking into interpretive dance.
        RigaSrfLandedMidlands* = #JNSQscience_evaReport_RigaSrfLandedMidlands_00 // The midlands roll on forever, subtle and stubbornly familiar. You keep expecting grass to appear and apologize.
        RigaSrfLandedMidlands* = #JNSQscience_evaReport_RigaSrfLandedMidlands_01 // You kick a pebble. It arcs away like it’s filing for orbital citizenship.
        RigaSrfLandedHighlands* = #JNSQscience_evaReport_RigaSrfLandedHighlands_00 // The highlands are sharp and cold, with shadows that look deeper than they should be. Your suit feels like the only warm thing in the universe.
        RigaSrfLandedHighlands* = #JNSQscience_evaReport_RigaSrfLandedHighlands_01 // You pause to admire the view and immediately fog your visor with excited breathing. Mission Control calls that “data.”
        RigaSrfLandedMountains* = #JNSQscience_evaReport_RigaSrfLandedMountains_00 // The mountains loom close, jagged and stubborn. You double-check your footing and still drift a little when you hop.
        RigaSrfLandedMountains* = #JNSQscience_evaReport_RigaSrfLandedMountains_01 // Every step sounds loud in your helmet and silent everywhere else. The thin air is mostly there for decoration.
        RigaSrfLandedPoles* = #JNSQscience_evaReport_RigaSrfLandedPoles_00 // Frosty grains glitter at the poles, too bright against the dark sky. You try to brush some off and it clings like static.
        RigaSrfLandedPoles* = #JNSQscience_evaReport_RigaSrfLandedPoles_01 // You feel like you should shiver, but the suit handles that part. Your brain does the rest anyway.
        RigaFlyingLowLowlands* = #JNSQscience_evaReport_RigaFlyingLowLowlands_00 // You jet along just above the flats, “flying” through a haze that barely counts as atmosphere. The ground scrolls by like a very cold conveyor belt.
        RigaFlyingLowLowlands* = #JNSQscience_evaReport_RigaFlyingLowLowlands_01 // The air tugs at you in tiny, unhelpful ways. Your pack does all the real work and demands overtime pay.
        RigaFlyingLowMidlands* = #JNSQscience_evaReport_RigaFlyingLowMidlands_00 // The midlands rise and dip beneath you while you try to pretend this is controlled flight. The suit politely refuses to agree.
        RigaFlyingLowMidlands* = #JNSQscience_evaReport_RigaFlyingLowMidlands_01 // You skim over ridges that look soft from above and cruel up close. You decide to stay above.
        RigaFlyingLowHighlands* = #JNSQscience_evaReport_RigaFlyingLowHighlands_00 // Thin air and broken terrain make for bumpy “aerodynamics.” You wobble, stabilize, and call it a successful maneuver.
        RigaFlyingLowHighlands* = #JNSQscience_evaReport_RigaFlyingLowHighlands_01 // The haze catches the light in faint bands as you pass. For a moment, it almost feels like weather.
        RigaFlyingLowMountains* = #JNSQscience_evaReport_RigaFlyingLowMountains_00 // You cruise past rocky spines and try not to think about how little air there is to slow you down. Gravity seems eager to participate.
        RigaFlyingLowMountains* = #JNSQscience_evaReport_RigaFlyingLowMountains_01 // The peaks rush by under your boots. You file a report describing it as “exciting” to avoid admitting “terrifying.”
        RigaFlyingLowPoles* = #JNSQscience_evaReport_RigaFlyingLowPoles_00 // Over the poles, everything gets brighter and harsher at once. Even the tiny haze looks brittle.
        RigaFlyingLowPoles* = #JNSQscience_evaReport_RigaFlyingLowPoles_01 // Icy grains swirl up in slow motion when you pass low. You watch them float as if they’re unsure where “down” is.
        RigaFlyingHighLowlands* = #JNSQscience_evaReport_RigaFlyingHighLowlands_00 // Up high, the last threads of air brush your suit and then give up. The lowlands blur into broad, quiet shapes below.
        RigaFlyingHighLowlands* = #JNSQscience_evaReport_RigaFlyingHighLowlands_01 // You can almost forget you’re still in an atmosphere—until your instruments insist you are, technically.
        RigaFlyingHighMidlands* = #JNSQscience_evaReport_RigaFlyingHighMidlands_00 // The midlands flatten into gentle bands as you climb. Lindor hangs huge in the sky, supervising your “flight.”
        RigaFlyingHighMidlands* = #JNSQscience_evaReport_RigaFlyingHighMidlands_01 // The suit jets hiss softly, the only sound that matters. Everything else is cold silence and slow motion.
        RigaFlyingHighHighlands* = #JNSQscience_evaReport_RigaFlyingHighHighlands_00 // From high altitude, the highlands look like shattered stone laid out with care. The haze is so thin it feels like a rumor.
        RigaFlyingHighHighlands* = #JNSQscience_evaReport_RigaFlyingHighHighlands_01 // You drift, correct, and drift again. Aerodynamics offers a brief shrug and leaves.
        RigaFlyingHighMountains* = #JNSQscience_evaReport_RigaFlyingHighMountains_00 // The mountain chain becomes a jagged line beneath you. You keep your movements small; big mistakes travel far here.
        RigaFlyingHighMountains* = #JNSQscience_evaReport_RigaFlyingHighMountains_01 // Your shadow isn’t just on the ground—it’s on your confidence. You log that as “situational awareness.”
        RigaFlyingHighPoles* = #JNSQscience_evaReport_RigaFlyingHighPoles_00 // The polar caps glitter under distant sunlight. The air up here is almost nothing, and it still manages to be cold.
        RigaFlyingHighPoles* = #JNSQscience_evaReport_RigaFlyingHighPoles_01 // You watch the pole slide under you and wonder how something can be so bright and so empty at the same time.
        RigaInSpaceLowLowlands* = #JNSQscience_evaReport_RigaInSpaceLowLowlands_00 // You float above the lowlands and can see every little scar and smooth patch without the cockpit glass. Riga’s haze draws a faint outline around it.
        RigaInSpaceLowLowlands* = #JNSQscience_evaReport_RigaInSpaceLowLowlands_01 // Below, the flats look calm and easy. You know that’s a lie because you’ve tried walking there.
        RigaInSpaceLowMidlands* = #JNSQscience_evaReport_RigaInSpaceLowMidlands_00 // The midlands spread out beneath you in gentle folds. It looks almost welcoming, which is suspicious for a place this cold.
        RigaInSpaceLowMidlands* = #JNSQscience_evaReport_RigaInSpaceLowMidlands_01 // Lindor fills the background like a guardian giant. You wave anyway, just in case.
        RigaInSpaceLowHighlands* = #JNSQscience_evaReport_RigaInSpaceLowHighlands_00 // From here the highlands are a maze of shadows and sharp light. You drift and feel very small and very employed.
        RigaInSpaceLowHighlands* = #JNSQscience_evaReport_RigaInSpaceLowHighlands_01 // You compare the terrain to Kerbin out loud and immediately get corrected by three different scientists.
        RigaInSpaceLowMountains* = #JNSQscience_evaReport_RigaInSpaceLowMountains_00 // The mountain peaks look even meaner without the ship between you and them. You keep one hand on the rail and pretend it helps.
        RigaInSpaceLowMountains* = #JNSQscience_evaReport_RigaInSpaceLowMountains_01 // Your suit jets puff gently as you translate along the hull. The mountains below look like they’re reaching up for you.
        RigaInSpaceLowPoles* = #JNSQscience_evaReport_RigaInSpaceLowPoles_00 // The poles shine like sprinkled sugar against dark rock. The thin haze makes a faint halo at the limb.
        RigaInSpaceLowPoles* = #JNSQscience_evaReport_RigaInSpaceLowPoles_01 // You spot tiny bright streaks and decide they’re “interesting deposits.” That sounds better than “mysterious glitter.”
        RigaInSpaceHigh* = #JNSQscience_evaReport_RigaInSpaceHigh_00 // From high above, Riga is a brown-grey marble with a whisper-thin rim of haze. Lindor sits nearby like it owns the view.
        RigaInSpaceHigh* = #JNSQscience_evaReport_RigaInSpaceHigh_01 // The whole moon looks quietly familiar and completely inhospitable. You record the paradox and then stare at it a little longer.

        TalosSrfLandedLowlands* = #JNSQscience_evaReport_TalosSrfLandedLowlands_00 // Your boots barely sink in before the dust decides it wants to follow you home.
        TalosSrfLandedLowlands* = #JNSQscience_evaReport_TalosSrfLandedLowlands_01 // The lowlands are so flat you briefly suspect your visor is stuck on “map mode.”
        TalosSrfLandedMidlands* = #JNSQscience_evaReport_TalosSrfLandedMidlands_00 // Every step kicks up a slow, lazy puff that hangs around like it’s waiting for applause.
        TalosSrfLandedMidlands* = #JNSQscience_evaReport_TalosSrfLandedMidlands_01 // The midlands look cracked and tired, as if Talos has been holding its breath for ages.
        TalosSrfLandedHighlands* = #JNSQscience_evaReport_TalosSrfLandedHighlands_00 // The ground here is sharper, darker, and far more interested in your suit’s finish than you are.
        TalosSrfLandedHighlands* = #JNSQscience_evaReport_TalosSrfLandedHighlands_01 // You hop once and float a little too long, suddenly very aware of how far away “down” can feel.
        TalosSrfLandedMountains* = #JNSQscience_evaReport_TalosSrfLandedMountains_00 // Low gravity makes climbing easy—right up until you remember you still have to come back down.
        TalosSrfLandedMountains* = #JNSQscience_evaReport_TalosSrfLandedMountains_01 // The peaks loom over you in perfect silence, like they’re waiting to see if you’ll make a mistake.
        TalosSrfLandedPoles* = #JNSQscience_evaReport_TalosSrfLandedPoles_00 // The polar ground glitters faintly, as if the dust has been polishing itself out of boredom.
        TalosSrfLandedPoles* = #JNSQscience_evaReport_TalosSrfLandedPoles_01 // Shadows stretch forever here; you take notes and try not to imagine what’s hiding in all that darkness.
        TalosInSpaceLowLowlands* = #JNSQscience_evaReport_TalosInSpaceLowLowlands_00 // You drift above the lowlands on your tether, watching featureless plains slide past like an unfinished blueprint.
        TalosInSpaceLowLowlands* = #JNSQscience_evaReport_TalosInSpaceLowLowlands_01 // From here the lowlands look smooth and harmless—until you remember you just walked on them.
        TalosInSpaceLowMidlands* = #JNSQscience_evaReport_TalosInSpaceLowMidlands_00 // The midlands draw thin lines and wrinkles across the surface, like Talos is trying to scribble a warning.
        TalosInSpaceLowMidlands* = #JNSQscience_evaReport_TalosInSpaceLowMidlands_01 // You call out ridges and fractures below while your suit gently reminds you that space is not a floor.
        TalosInSpaceLowHighlands* = #JNSQscience_evaReport_TalosInSpaceLowHighlands_00 // The highlands look bruised and ancient from orbit, with scars that refuse to fade.
        TalosInSpaceLowHighlands* = #JNSQscience_evaReport_TalosInSpaceLowHighlands_01 // You spin slowly, taking in the highlands below and the emptiness above, and decide neither one is blinking first.
        TalosInSpaceLowMountains* = #JNSQscience_evaReport_TalosInSpaceLowMountains_00 // Jagged mountains pass underneath like teeth; you instinctively pull your legs in, which helps absolutely nothing.
        TalosInSpaceLowMountains* = #JNSQscience_evaReport_TalosInSpaceLowMountains_01 // You log the mountain chains below and wonder how something so still can look so hostile.
        TalosInSpaceLowPoles* = #JNSQscience_evaReport_TalosInSpaceLowPoles_00 // The poles are a study in harsh light and deeper shadow; the boundary between them looks razor-thin.
        TalosInSpaceLowPoles* = #JNSQscience_evaReport_TalosInSpaceLowPoles_01 // You float over the polar regions and feel very small in a way your suit’s readouts can’t quantify.
        TalosInSpaceHigh* = #JNSQscience_evaReport_TalosInSpaceHigh_00 // From high above, Talos shrinks to a stubborn little disk that still manages to feel heavy on your mind.
        TalosInSpaceHigh* = #JNSQscience_evaReport_TalosInSpaceHigh_01 // You file a calm EVA report while staring at Talos far below, wondering how “home” can be a direction.

        EelooFlyingLowPoles* = #JNSQscience_evaReport_EelooFlyingLowPoles_00 // You float over the polar ice, helmet lights bouncing off a blinding white that makes “up” hard to prove.
        EelooFlyingLowPoles* = #JNSQscience_evaReport_EelooFlyingLowPoles_01 // The air is a thin, icy whisper. Your suit vents frost that immediately tries to become part of the landscape.
        EelooFlyingLowHighlands* = #JNSQscience_evaReport_EelooFlyingLowHighlands_00 // The highlands look like frozen teeth. The thin haze does nothing to soften the view or the cold.
        EelooFlyingLowHighlands* = #JNSQscience_evaReport_EelooFlyingLowHighlands_01 // Your jetpack puffs send you drifting over glittering ridges. Everything down there looks sharp enough to cut a timeline.
        EelooFlyingLowMidlands* = #JNSQscience_evaReport_EelooFlyingLowMidlands_00 // The midlands pass beneath in pale, quiet sheets. You report that it’s beautiful, and also unsettlingly empty.
        EelooFlyingLowMidlands* = #JNSQscience_evaReport_EelooFlyingLowMidlands_01 // You can’t shake the feeling you’re “flying” through the world’s faintest breath, over snow that never learned to melt.
        EelooFlyingLowLowlands* = #JNSQscience_evaReport_EelooFlyingLowLowlands_00 // The lowlands hold a slightly thicker ground-hugging haze. It feels like the planet is trying, politely, to have weather.
        EelooFlyingLowLowlands* = #JNSQscience_evaReport_EelooFlyingLowLowlands_01 // You drift above broad, smooth frostfields. Your boots swing in slow motion, as if even gravity is being careful.
        EelooFlyingLowCanyon* = #JNSQscience_evaReport_EelooFlyingLowCanyon_00 // The canyon yawns beneath you, dark and deep. Your jetpack echoes back as a dull thump through the suit.
        EelooFlyingLowCanyon* = #JNSQscience_evaReport_EelooFlyingLowCanyon_01 // Along the canyon walls, wisps of cold haze cling and swirl. It’s the closest thing to wind you’ve met out here.
        EelooFlyingHigh* = #JNSQscience_evaReport_EelooFlyingHigh_00 // You wave your arms around and declare yourself officially “flying” in Eeloo’s almost-not-atmosphere.
        EelooFlyingHigh* = #JNSQscience_evaReport_EelooFlyingHigh_01 // The air is so thin it feels like space wearing a light jacket. Your suit heaters disagree with the fashion choice.

        CelesSrfLandedLowlands* = #JNSQscience_evaReport_CelesSrfLandedLowlands_00 // The lowlands are flat, brittle, and painfully quiet. Your boots make the only “weather” here.
		CelesSrfLandedMidlands* = #JNSQscience_evaReport_CelesSrfLandedMidlands_00 // The ground is a messy quilt of pale plates and dark seams. You step carefully between the seams.
		CelesSrfLandedHighlands* = #JNSQscience_evaReport_CelesSrfLandedHighlands_00 // From the high ground, the horizon looks sharp and close. You briefly consider waving at it.
		CelesSrfLandedMountains* = #JNSQscience_evaReport_CelesSrfLandedMountains_00 // The mountains cast long, thin shadows that seem to follow you. You decide not to race them.
		CelesSrfLandedPoles* = #JNSQscience_evaReport_CelesSrfLandedPoles_00 // The polar glare is bright enough to feel loud. You check your suit for a “dim” setting.
		CelesInSpaceLowLowlands* = #JNSQscience_evaReport_CelesInSpaceLowLowlands_00 // From just above the lowlands, the surface looks scuffed and dusty, like it’s been sanded by time.
		CelesInSpaceLowMidlands* = #JNSQscience_evaReport_CelesInSpaceLowMidlands_00 // The midlands drift by in slow motion, all cracks and stains. It looks fragile from up here, too.
		CelesInSpaceLowHighlands* = #JNSQscience_evaReport_CelesInSpaceLowHighlands_00 // Jagged ridges pass beneath you like frozen waves. You keep your tether extra close.
		CelesInSpaceLowMountains* = #JNSQscience_evaReport_CelesInSpaceLowMountains_00 // The peaks reach up like they’re trying to grab your boots. You remind them you’re only visiting.
		CelesInSpaceLowPoles* = #JNSQscience_evaReport_CelesInSpaceLowPoles_00 // The poles shine like polished ice under a distant sun. You squint and log “very shiny.”
		CelesInSpaceHigh* = #JNSQscience_evaReport_CelesInSpaceHigh_00 // Celes dwindles to a pale speck with sharp edges. It still feels like it’s watching you leave.

		TamSrfLandedLowlands* = #JNSQscience_evaReport_TamSrfLandedLowlands_00 // The lowlands are lumpy in a way that feels personal. You hop once and immediately regret it.
		TamSrfLandedMidlands* = #JNSQscience_evaReport_TamSrfLandedMidlands_00 // Every step kicks up grit that never really settles. Tam seems determined to stay untidy forever.
		TamSrfLandedHighlands* = #JNSQscience_evaReport_TamSrfLandedHighlands_00 // The highlands are steep, jagged, and unapologetic. You take pictures to prove you survived them.
		TamSrfLandedTwinCraters* = #JNSQscience_evaReport_TamSrfLandedTwinCraters_00 // Two crater bowls loom on either side like giant eyes. You stand in the middle and feel judged.
		TamSrfLandedCraters* = #JNSQscience_evaReport_TamSrfLandedCraters_00 // Craters overlap craters until you lose count. You start naming them after snacks to stay focused.
		TamSrfLandedPockmarks* = #JNSQscience_evaReport_TamSrfLandedPockmarks_00 // Tiny pits pepper the surface like hail damage on a very old rock. You try not to add a new one.
		TamInSpaceLowLowlands* = #JNSQscience_evaReport_TamInSpaceLowLowlands_00 // Skimming over the lowlands, Tam looks like a badly packed suitcase of terrain. Nothing lines up.
		TamInSpaceLowMidlands* = #JNSQscience_evaReport_TamInSpaceLowMidlands_00 // The midlands crawl beneath you in slow tumble. You swear the whole moon is trying to roll away.
		TamInSpaceLowHighlands* = #JNSQscience_evaReport_TamInSpaceLowHighlands_00 // From low orbit, the highlands look like broken teeth. You keep your helmet firmly attached.
		TamInSpaceLowTwinCraters* = #JNSQscience_evaReport_TamInSpaceLowTwinCraters_00 // The twin craters are two perfect dark circles in an imperfect world. You drift over them and feel very small.
		TamInSpaceLowCraters* = #JNSQscience_evaReport_TamInSpaceLowCraters_00 // Shadows pile into every dent and bowl. It’s like Tam is storing darkness for later.
		TamInSpaceLowPockmarks* = #JNSQscience_evaReport_TamInSpaceLowPockmarks_00 // The pockmarks blur into a freckled pattern from up here. You wonder who “tested” the surface so thoroughly.
		TamInSpaceHigh* = #JNSQscience_evaReport_TamInSpaceHigh_00 // From high up, Tam is just a scarred pebble in the black. It still manages to look mean.

		HamekSrfLandedLowlands* = #JNSQscience_evaReport_HamekSrfLandedLowlands_00 // Your boots come up dusted with a stubborn red powder. Whatever Hamek is made of, it wants to come with you.
		HamekSrfLandedMidlands* = #JNSQscience_evaReport_HamekSrfLandedMidlands_00 // The midlands shift between pale crust and rusty stains. You report the color as “scientifically confusing.”
		HamekSrfLandedHighlands* = #JNSQscience_evaReport_HamekSrfLandedHighlands_00 // The highlands feel hard and ancient underfoot. You tap a ridge and decide it’s not in a friendly mood.
		HamekSrfLandedPoles* = #JNSQscience_evaReport_HamekSrfLandedPoles_00 // The poles are brighter and cleaner, like the planet tried to wipe itself off here. It didn’t quite work.
		HamekInSpaceLowLowlands* = #JNSQscience_evaReport_HamekInSpaceLowLowlands_00 // The lowlands smear into broad red patches below you. You check your suit for paint leaks anyway.
		HamekInSpaceLowMidlands* = #JNSQscience_evaReport_HamekInSpaceLowMidlands_00 // From low orbit, the midlands look like someone mixed two worlds and forgot to stir. You take notes and back away.
		HamekInSpaceLowHighlands* = #JNSQscience_evaReport_HamekInSpaceLowHighlands_00 // The highlands show sharp edges and darker tones. They look tough enough to survive your opinions.
		HamekInSpaceLowPoles* = #JNSQscience_evaReport_HamekInSpaceLowPoles_00 // The poles gleam pale against the red body, like frosty punctuation. You log it as “cold accent marks.”
		HamekInSpaceHigh* = #JNSQscience_evaReport_HamekInSpaceHigh_00 // Hamek hangs below like a red coin in deep space. It looks wrong in a way that feels important.

        NaraSrfLandedLowlands* = #JNSQscience_evaReport_NaraSrfLandedLowlands_00 // The ground looks like it was vacuum-packed by cold and time. Your boots make a sound you can almost feel through the suit.
        NaraSrfLandedLowlands* = #JNSQscience_evaReport_NaraSrfLandedLowlands_01 // The air is thick enough to push back, but too cold to be friendly about it. You take a breath and remember you can’t.
        NaraSrfLandedLowlands* = #JNSQscience_evaReport_NaraSrfLandedLowlands_02 // The horizon is a long, flat reminder of how far you are from any rescue plan. You wave anyway, just in case.
        NaraSrfLandedLowlands* = #JNSQscience_evaReport_NaraSrfLandedLowlands_03 // You try to kick up some dust for the camera, but it just slumps and settles. Even the dirt seems tired out here.
        NaraSrfLandedMidlands* = #JNSQscience_evaReport_NaraSrfLandedMidlands_00 // The terrain rolls like frozen waves under a heavy sky. You suddenly appreciate how nice “boring” was.
        NaraSrfLandedMidlands* = #JNSQscience_evaReport_NaraSrfLandedMidlands_01 // Your suit joints creak like they’re filing a complaint. You log it as “normal, probably.”
        NaraSrfLandedMidlands* = #JNSQscience_evaReport_NaraSrfLandedMidlands_02 // The thick air makes everything look closer than it is, which is rude. You mark a distant ridge as “do not walk to.”
        NaraSrfLandedMidlands* = #JNSQscience_evaReport_NaraSrfLandedMidlands_03 // You feel watched by nothing in particular. It’s an efficient kind of unsettling.
        NaraSrfLandedHighlands* = #JNSQscience_evaReport_NaraSrfLandedHighlands_00 // Up here the wind has teeth, even through all this pressure. It finds every seam you hoped was airtight.
        NaraSrfLandedHighlands* = #JNSQscience_evaReport_NaraSrfLandedHighlands_01 // The ground glittering in your lamp isn’t pretty so much as sharp-looking. You decide not to fall down.
        NaraSrfLandedHighlands* = #JNSQscience_evaReport_NaraSrfLandedHighlands_02 // The sky has a dim, washed look, like the system forgot to load the bright textures. You make a note: “Still terrifying.”
        NaraSrfLandedHighlands* = #JNSQscience_evaReport_NaraSrfLandedHighlands_03 // Every step feels historic, and also like a terrible idea. You record both feelings for the archive.
        NaraSrfLandedMountains* = #JNSQscience_evaReport_NaraSrfLandedMountains_00 // The peaks loom like they’re holding up the whole sky. You don’t trust them, but you respect the effort.
        NaraSrfLandedMountains* = #JNSQscience_evaReport_NaraSrfLandedMountains_01 // You can’t decide if the air is trying to cushion you or smother you. The suit votes “smother.”
        NaraSrfLandedMountains* = #JNSQscience_evaReport_NaraSrfLandedMountains_02 // From here, the lowlands look endless and the trip home looks theoretical. You take a photo anyway.
        NaraSrfLandedMountains* = #JNSQscience_evaReport_NaraSrfLandedMountains_03 // Your visor fogs for a moment and you panic, then realize it’s just you being dramatic. You log that too.
        NaraSrfLandedPolarLowlands* = #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_00 // The cold is so intense it feels organized. You suspect it has a schedule.
        NaraSrfLandedPolarLowlands* = #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_01 // The ground has a smooth crust that dares you to break it. You decline and shuffle politely.
        NaraSrfLandedPolarLowlands* = #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_02 // Your footprints don’t look like footprints; they look like proof. You hurry to make a few more.
        NaraSrfLandedPolarLowlands* = #JNSQscience_evaReport_NaraSrfLandedPolarLowlands_03 // The wind drags fine frost along the surface like smoke that forgot how to rise. It’s mesmerizing and alarming.
        NaraSrfLandedPoles* = #JNSQscience_evaReport_NaraSrfLandedPoles_00 // The compass behaves, the sky doesn’t. You watch faint curtains of light and feel very small inside a very expensive suit.
        NaraSrfLandedPoles* = #JNSQscience_evaReport_NaraSrfLandedPoles_01 // Official mission notes say “bring ruby slippers.” You check your boots twice and decide to keep your feet together, just in case.
        NaraSrfLandedPoles* = #JNSQscience_evaReport_NaraSrfLandedPoles_02 // The cold here isn’t just low; it’s smug. You write “smug cold at poles” in the log.
        NaraSrfLandedPoles* = #JNSQscience_evaReport_NaraSrfLandedPoles_03 // You raise your arm to point at something and the suit resists like it’s worried you’ll get ideas. It’s right.
        NaraSrfLandedPolarHighlands* = #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_00 // The high polar ridges cut the wind into neat, sharp slices. You would like to file for hazard pay retroactively.
        NaraSrfLandedPolarHighlands* = #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_01 // The surface crunches underfoot, then slowly relaxes back into place. Even the ground wants to forget you were here.
        NaraSrfLandedPolarHighlands* = #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_02 // You look out over a frozen world that doesn’t care about flags. You plant one anyway, because that’s what you do.
        NaraSrfLandedPolarHighlands* = #JNSQscience_evaReport_NaraSrfLandedPolarHighlands_03 // Your radio delay makes every sentence feel like a message in a bottle. You keep talking so the silence doesn’t win.
        NaraFlyingLowLowlands* = #JNSQscience_evaReport_NaraFlyingLowLowlands_00 // You cling to the ladder while the dense air rumbles past like an angry ocean. You report: “EVA: windy in a very committed way.”
        NaraFlyingLowLowlands* = #JNSQscience_evaReport_NaraFlyingLowLowlands_01 // The cold makes your suit feel like it’s shrinking around you. You try not to imagine what it’s doing to the craft.
        NaraFlyingLowLowlands* = #JNSQscience_evaReport_NaraFlyingLowLowlands_02 // The ground below slides by slowly, as if Nara is reluctant to show you anything too fast. You agree with the pace.
        NaraFlyingLowLowlands* = #JNSQscience_evaReport_NaraFlyingLowLowlands_03 // Static crackles across your visor and you taste fear through the headset. You log “possible electrical excitement.”
        NaraFlyingLowMidlands* = #JNSQscience_evaReport_NaraFlyingLowMidlands_00 // The thick atmosphere tugs at your arms like it wants to keep you. You decide to be very aerodynamic and very still.
        NaraFlyingLowMidlands* = #JNSQscience_evaReport_NaraFlyingLowMidlands_01 // The sky is pale and heavy, and your breathing is loud in your helmet. You pretend it’s confidence.
        NaraFlyingLowMidlands* = #JNSQscience_evaReport_NaraFlyingLowMidlands_02 // You look down and realize a “short hop” on Nara still means a long way from the lander. You hold on tighter.
        NaraFlyingLowMidlands* = #JNSQscience_evaReport_NaraFlyingLowMidlands_03 // Icing forms on exposed fittings in seconds. You add “do not lick anything” to the EVA checklist.
        NaraFlyingLowHighlands* = #JNSQscience_evaReport_NaraFlyingLowHighlands_00 // The air is turbulent over the ridges, and you bounce like a flag in a storm. You remember you are not, in fact, a flag.
        NaraFlyingLowHighlands* = #JNSQscience_evaReport_NaraFlyingLowHighlands_01 // The cold bites at your gloves through the suit’s heaters. You glare at it, which doesn’t help but feels scientific.
        NaraFlyingLowHighlands* = #JNSQscience_evaReport_NaraFlyingLowHighlands_02 // The mountains below look like they’re waiting for mistakes. You report no mistakes. None at all.
        NaraFlyingLowHighlands* = #JNSQscience_evaReport_NaraFlyingLowHighlands_03 // Your radio pings arrive late, like Mission Control is calling from another lifetime. You answer anyway.
        NaraFlyingLowMountains* = #JNSQscience_evaReport_NaraFlyingLowMountains_00 // Hanging outside a flying craft over Nara’s mountains feels like a daring achievement and a paperwork error. You record both.
        NaraFlyingLowMountains* = #JNSQscience_evaReport_NaraFlyingLowMountains_01 // The wind tries to peel you off the ladder with professional confidence. You refuse with amateur stubbornness.
        NaraFlyingLowMountains* = #JNSQscience_evaReport_NaraFlyingLowMountains_02 // The peaks rush by beneath you like frozen waves, and you briefly forget where “up” is. You decide to not mention that.
        NaraFlyingLowMountains* = #JNSQscience_evaReport_NaraFlyingLowMountains_03 // The craft shudders in the thick air and you become intimately familiar with every handhold. You name one of them “Hope.”
        NaraFlyingLowPolarLowlands* = #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_00 // The low polar air is dense, cold, and full of fine crystals that ping your visor. It sounds like tiny applause for bad decisions.
        NaraFlyingLowPolarLowlands* = #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_01 // You can see your own shadow in the haze and it looks just as worried as you feel. You wave at it for morale.
        NaraFlyingLowPolarLowlands* = #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_02 // The surface below is smooth in a way that suggests it has never been disturbed. You apologize for the flyby.
        NaraFlyingLowPolarLowlands* = #JNSQscience_evaReport_NaraFlyingLowPolarLowlands_03 // The cold turns the world monochrome, and the instruments do the same to your mood. You keep the report brief.
        NaraFlyingLowPoles* = #JNSQscience_evaReport_NaraFlyingLowPoles_00 // The sky near the pole flickers faintly, and your suit’s electronics complain in chorus. You tell them they’re not helping.
        NaraFlyingLowPoles* = #JNSQscience_evaReport_NaraFlyingLowPoles_01 // The atmosphere presses in, the temperature presses down, and your grip presses harder. You log “triple pressure.”
        NaraFlyingLowPoles* = #JNSQscience_evaReport_NaraFlyingLowPoles_02 // You can’t tell if the strange glow is aurora or just your visor doing something new. You politely request it stop.
        NaraFlyingLowPoles* = #JNSQscience_evaReport_NaraFlyingLowPoles_03 // Every comms reply comes back late, like it had to travel through the cold first. You start speaking slower out of respect.
        NaraFlyingLowPolarHighlands* = #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_00 // The wind over the polar ridges hits you in gusts that feel measured and mean. You report “highly optimized hostility.”
        NaraFlyingLowPolarHighlands* = #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_01 // Ice crystals streak past like slow stars, and for a second you forget you’re in atmosphere. Then the ladder rattles and you remember.
        NaraFlyingLowPolarHighlands* = #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_02 // The ground drops away beneath jagged slopes, and you feel the planet’s size in your stomach. You keep both hands on the craft.
        NaraFlyingLowPolarHighlands* = #JNSQscience_evaReport_NaraFlyingLowPolarHighlands_03 // Your suit heater cycles nonstop and still loses the argument. You recommend “more heater” as future science.
        NaraFlyingHigh* = #JNSQscience_evaReport_NaraFlyingHigh_00 // Up here the sky is almost black, and the Sun is just a sharp reminder that warmth exists somewhere else. You feel very far from that somewhere.
        NaraFlyingHigh* = #JNSQscience_evaReport_NaraFlyingHigh_01 // The air thins but never really lets go. Nara seems determined to keep a hand on your shoulder.
        NaraFlyingHigh* = #JNSQscience_evaReport_NaraFlyingHigh_02 // The planet’s curve is visible beneath you, huge and quiet. You realize how long it would take to fall, and decide not to.
        NaraFlyingHigh* = #JNSQscience_evaReport_NaraFlyingHigh_03 // You speak a full sentence and wait for the reply, counting seconds like they’re a resource. They are.
        NaraInSpaceLowLowlands* = #JNSQscience_evaReport_NaraInSpaceLowLowlands_00 // From low orbit the lowlands look like a frozen sheet pulled tight over secrets. You note the lack of anything that looks like an easy landing zone.
        NaraInSpaceLowLowlands* = #JNSQscience_evaReport_NaraInSpaceLowLowlands_01 // The atmosphere’s haze clings to the surface, thick even from here. You record it as “stubborn.”
        NaraInSpaceLowLowlands* = #JNSQscience_evaReport_NaraInSpaceLowLowlands_02 // The Sunlight is weak and slanted, and the shadows last forever. You don’t like how well that fits the mission mood.
        NaraInSpaceLowLowlands* = #JNSQscience_evaReport_NaraInSpaceLowLowlands_03 // You wave at the lander track and wonder if it’s still there. At this distance, “still there” feels like a luxury.
        NaraInSpaceLowMidlands* = #JNSQscience_evaReport_NaraInSpaceLowMidlands_00 // The midlands show long ridges and faint bands, like the planet is trying to remember how to be active. You recommend more staring.
        NaraInSpaceLowMidlands* = #JNSQscience_evaReport_NaraInSpaceLowMidlands_01 // You try to spot your landing site and realize how easy it is to lose anything on a world this big. Including yourself.
        NaraInSpaceLowMidlands* = #JNSQscience_evaReport_NaraInSpaceLowMidlands_02 // The atmosphere blurs details into a soft threat. You make a note: “high pressure, low clarity, high worry.”
        NaraInSpaceLowMidlands* = #JNSQscience_evaReport_NaraInSpaceLowMidlands_03 // Your radio delay makes the orbit feel even quieter than it is. You report “silence increasing.”
        NaraInSpaceLowHighlands* = #JNSQscience_evaReport_NaraInSpaceLowHighlands_00 // The highlands cast sharp shadows through the haze, like teeth behind frosted glass. You decide not to use the word “teeth” in the official report.
        NaraInSpaceLowHighlands* = #JNSQscience_evaReport_NaraInSpaceLowHighlands_01 // The terrain looks rugged enough to challenge landing legs and confidence equally. You suggest bringing spares of both.
        NaraInSpaceLowHighlands* = #JNSQscience_evaReport_NaraInSpaceLowHighlands_02 // You watch the sunlight crawl across ridges at a stubborn pace. Time feels heavier out here than gravity does.
        NaraInSpaceLowHighlands* = #JNSQscience_evaReport_NaraInSpaceLowHighlands_03 // The planet fills the window, and Kerbin fills your thoughts. You keep that last part off the recorder.
        NaraInSpaceLowMountains* = #JNSQscience_evaReport_NaraInSpaceLowMountains_00 // The mountains rise like frozen waves trying to escape the atmosphere. You admit they are impressive, and then you shiver.
        NaraInSpaceLowMountains* = #JNSQscience_evaReport_NaraInSpaceLowMountains_01 // Even from orbit, the peaks look hostile to landing and friendly to crashing. You highlight them as “photogenic hazards.”
        NaraInSpaceLowMountains* = #JNSQscience_evaReport_NaraInSpaceLowMountains_02 // The air is thick enough to soften the edges of everything, except the feeling of distance. That stays crisp.
        NaraInSpaceLowMountains* = #JNSQscience_evaReport_NaraInSpaceLowMountains_03 // You count the minutes until the next comms window like it’s oxygen. You have oxygen. It still feels like oxygen.
        NaraInSpaceLowPolarLowlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_00 // The polar lowlands are a pale bowl of cold with a lid of haze. You can almost feel the pressure through the window.
        NaraInSpaceLowPolarLowlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_01 // The Sun’s reflection is weak, and the shadows are strong. You label the region “excellent for hiding, terrible for living.”
        NaraInSpaceLowPolarLowlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_02 // You see streaks that might be wind-driven frost. You remember being out there and decide orbit is fine.
        NaraInSpaceLowPolarLowlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarLowlands_03 // The landscape looks untouched, like a museum exhibit titled “Do Not Enter.” You entered anyway.
        NaraInSpaceLowPoles* = #JNSQscience_evaReport_NaraInSpaceLowPoles_00 // The pole has faint glimmers that make the instruments happy and the crew nervous. You report “scientifically encouraging, emotionally not.”
        NaraInSpaceLowPoles* = #JNSQscience_evaReport_NaraInSpaceLowPoles_01 // The haze over the pole has a strange sheen, as if the atmosphere is holding its breath. You find yourself doing the same.
        NaraInSpaceLowPoles* = #JNSQscience_evaReport_NaraInSpaceLowPoles_02 // The polar region looks deceptively smooth until the shadows reveal sharp relief. Nara is good at surprises.
        NaraInSpaceLowPoles* = #JNSQscience_evaReport_NaraInSpaceLowPoles_03 // You try to pick out your footprints from orbit and laugh at yourself. The laugh echoes in the cabin longer than it should.
        NaraInSpaceLowPolarHighlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_00 // The polar highlands look like shattered glass under dim light. You recommend not skating there.
        NaraInSpaceLowPolarHighlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_01 // From this altitude, the ridges look orderly, almost patterned. You dislike how intentional it feels.
        NaraInSpaceLowPolarHighlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_02 // The Sun is far, the planet is huge, and you are a small machine in a big black ocean. You file the thought under “EVA impressions.”
        NaraInSpaceLowPolarHighlands* = #JNSQscience_evaReport_NaraInSpaceLowPolarHighlands_03 // The shadows over the high polar terrain are so long they look permanent. You suggest better lamps and better courage.
        NaraInSpaceHigh* = #JNSQscience_evaReport_NaraInSpaceHigh_00 // From high orbit, Nara looks less like a destination and more like a decision you can’t undo. You stare until the cabin feels smaller.
        NaraInSpaceHigh* = #JNSQscience_evaReport_NaraInSpaceHigh_01 // The Sun is a bright dot that doesn’t warm your helmet at all. You record: “Confirmed: distance is real.”
        NaraInSpaceHigh* = #JNSQscience_evaReport_NaraInSpaceHigh_02 // The handbook’s “ruby slippers” section is still unhelpful. You check the void below and confirm none are visible.
        NaraInSpaceHigh* = #JNSQscience_evaReport_NaraInSpaceHigh_03 // The planet’s haze is a thin ring from here, a reminder that even emptiness can have weight. You keep your tether clipped twice.

        AmosSrfLandedLowlands* = #JNSQscience_evaReport_AmosSrfLandedLowlands_00 // The ground is dark enough to make your helmet light feel shy. Your boots leave pale scuffs that look suspiciously like evidence.
        AmosSrfLandedMidlands* = #JNSQscience_evaReport_AmosSrfLandedMidlands_00 // Every step kicks up a thin, smoky dust that refuses to settle quickly. Amos seems determined to keep its secrets airborne.
        AmosSrfLandedHighlands* = #JNSQscience_evaReport_AmosSrfLandedHighlands_00 // The ridges are sharp and the shadows are sharper. You keep glancing over your shoulder, just in case the terrain is watching back.
        AmosSrfLandedMountains* = #JNSQscience_evaReport_AmosSrfLandedMountains_00 // The low gravity turns every hop into a tiny victory lap. The view is grand, grim, and completely uninterested in your feelings.
        AmosSrfLandedPoles* = #JNSQscience_evaReport_AmosSrfLandedPoles_00 // The light here feels wrong, like it arrived late and is trying to catch up. You stamp your feet to remind the universe you’re still warm inside the suit.
        AmosInSpaceLowLowlands* = #JNSQscience_evaReport_AmosInSpaceLowLowlands_00 // Floating over the lowlands, the surface looks like spilled ink with faint scratches. You wonder if Amos is actually a giant chalkboard.
        AmosInSpaceLowMidlands* = #JNSQscience_evaReport_AmosInSpaceLowMidlands_00 // From here the midlands have subtle bands and scuffs, like someone tried to polish the moon with sandpaper. You write “abrasive personality” in the report.
        AmosInSpaceLowHighlands* = #JNSQscience_evaReport_AmosInSpaceLowHighlands_00 // The highlands roll by beneath you in harsh contrasts. Your suit’s radio crackles and you pretend it’s just static.
        AmosInSpaceLowMountains* = #JNSQscience_evaReport_AmosInSpaceLowMountains_00 // The mountains cast long, dramatic shadows that make you feel very small. You wave at them anyway, because bravery is mostly theater.
        AmosInSpaceLowPoles* = #JNSQscience_evaReport_AmosInSpaceLowPoles_00 // Over the poles, Amos looks smoother and even darker, like it’s fading into space on purpose. You tighten your grip on the handrail and call it “data collection.”
        AmosInSpaceHigh* = #JNSQscience_evaReport_AmosInSpaceHigh_00 // Amos shrinks to a charcoal pebble beside the black sky, and Nara dominates everything. You suddenly appreciate how much spacecraft have walls.

        EnonSrfLandedLowlands* = #JNSQscience_evaReport_EnonSrfLandedLowlands_00 // The ground is bright enough to make you squint through the visor. It crunches underfoot like frozen sugar, and you immediately want to taste it (you do not).
        EnonSrfLandedMidlands* = #JNSQscience_evaReport_EnonSrfLandedMidlands_00 // The surface is a patchwork of hard crust and loose grains that glitter in the light. You take a photo and it still just looks “white.”
        EnonSrfLandedHighlands* = #JNSQscience_evaReport_EnonSrfLandedHighlands_00 // The highlands feel like standing on a frozen ocean that forgot how to move. The silence is so complete it feels like another layer of ice.
        EnonSrfLandedPoles* = #JNSQscience_evaReport_EnonSrfLandedPoles_00 // The polar ground is painfully pristine, broken only by your own clumsy footprints. You apologize to the landscape out loud, just in case.
        EnonInSpaceLowLowlands* = #JNSQscience_evaReport_EnonInSpaceLowLowlands_00 // From a short hop above Enon, the lowlands spread out like a blank page. You realize you’re the first smudge on it.
        EnonInSpaceLowMidlands* = #JNSQscience_evaReport_EnonInSpaceLowMidlands_00 // The midlands show faint textures and shallow scars beneath the glare. Enon’s “features” are subtle, but they’re definitely judging you.
        EnonInSpaceLowHighlands* = #JNSQscience_evaReport_EnonInSpaceLowHighlands_00 // The highlands gleam like carved ice under a lamp. You spin slowly to keep from staring too long at the endless white.
        EnonInSpaceLowPoles* = #JNSQscience_evaReport_EnonInSpaceLowPoles_00 // Over the poles, the brightness falls into long blue shadows. Your suit’s temperature readout becomes your favorite piece of literature.
        EnonInSpaceHigh* = #JNSQscience_evaReport_EnonInSpaceHigh_00 // Enon becomes a pale coin against the void, almost too clean to be real. Far below, Nara looks like the only thing with a personality.

        PraxSrfLandedLowlands* = #JNSQscience_evaReport_PraxSrfLandedLowlands_00 // The flats are empty in a way that makes you feel like a trespasser. You plant your boots carefully, as if the dust might complain.
        PraxSrfLandedMidlands* = #JNSQscience_evaReport_PraxSrfLandedMidlands_00 // The midlands are rough and uneven, full of small ridges that catch your toes mid-hop. You log it as “excellent for building character.”
        PraxSrfLandedHighlands* = #JNSQscience_evaReport_PraxSrfLandedHighlands_00 // The highlands stretch out like unfinished construction. Prax looks assembled from spare parts, but it’s holding together impressively.
        PraxSrfLandedMountains* = #JNSQscience_evaReport_PraxSrfLandedMountains_00 // Up in the mountains, every jump threatens to turn into accidental flight. You decide to keep at least one hand near the ground at all times.
        PraxSrfLandedPoles* = #JNSQscience_evaReport_PraxSrfLandedPoles_00 // The poles feel like the edge of a very cold map. You stare out and understand why people call this a fringe world.
        PraxInSpaceLowLowlands* = #JNSQscience_evaReport_PraxInSpaceLowLowlands_00 // Hovering above the lowlands, Prax looks lonely and under-decorated. You consider drawing a smiley face in the dust, then remember “science.”
        PraxInSpaceLowMidlands* = #JNSQscience_evaReport_PraxInSpaceLowMidlands_00 // From just above the midlands, the surface shows scuffed bands and small breaks in the crust. It looks like Prax has been through things and never wrote home.
        PraxInSpaceLowHighlands* = #JNSQscience_evaReport_PraxInSpaceLowHighlands_00 // The highlands pass beneath you like worn stone waves. You feel a strange urge to explore every line, even though your suit strongly disagrees.
        PraxInSpaceLowMountains* = #JNSQscience_evaReport_PraxInSpaceLowMountains_00 // Over the mountains, the terrain turns jagged and dramatic, like it’s trying to look important next to Nara. It succeeds a little.
        PraxInSpaceLowPoles* = #JNSQscience_evaReport_PraxInSpaceLowPoles_00 // Above the poles, the shadows deepen and the horizon feels farther away than it should. You make a note to invent a better word than “remote.”
        PraxInSpaceHigh* = #JNSQscience_evaReport_PraxInSpaceHigh_00 // Prax becomes a tiny marker beside Nara, easy to lose if you blink. You don’t blink, because that’s how the fringe wins.
    }
}